document_id: ISA.59,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Evil and Oppression
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 50:2; Num. 11:23
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand is not shortened, that it cannot save,
  - type: text
    content: or his ear dull, that it cannot hear;
  '10':
  - type: text
    content: ' '
  - type: note
    content: Deut. 28:29; Job 5:14; 12:25; See ch. 42:18-20
  - type: text
    content: We grope for the wall like the blind;
  - type: text
    content: we grope like those who have no eyes;
  - type: text
    content: we stumble at noon as in the twilight,
  - type: note
    content: '[ 1 Cor. 4:9, 10 ]'
  - type: text
    content: among those in full vigor we are like dead men.
  '11':
  - type: text
    content: We all growl like bears;
  - type: note
    content: ch. 38:14
  - type: text
    content: we moan and moan like doves;
  - type: note
    content: '[ver. 9; ch. 46:13; 56:1 ]'
  - type: text
    content: we hope for justice, but there is none;
  - type: text
    content: for salvation, but it is far from us.
  '12':
  - type: text
    content: For our transgressions are multiplied before you,
  - type: text
    content: and our sins testify against us;
  - type: text
    content: for our transgressions are with us,
  - type: text
    content: 'and we know our iniquities:'
  '13':
  - type: text
    content: 'transgressing, and denying the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and turning back from following our God,
  - type: note
    content: '[ver. 3, 4 ]'
  - type: text
    content: speaking oppression and revolt,
  - type: text
    content: conceiving and uttering from the heart lying words.
  - type: heading
    content: Judgment and Redemption
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:4, 5 ]'
  - type: text
    content: Justice is turned back,
  - type: text
    content: and righteousness stands far away;
  - type: text
    content: for truth has stumbled in the public squares,
  - type: text
    content: and uprightness cannot enter.
  '15':
  - type: text
    content: Truth is lacking,
  - type: text
    content: and he who departs from evil makes himself a prey.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' saw it, and it displeased him'
  - type: note
    content: Hebrew and it was evil in his eyes
  - type: text
    content: that there was no justice.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:18; 63:5 ]'
  - type: text
    content: He saw that there was no man,
  - type: text
    content: and wondered that there was no one to intercede;
  - type: text
    content: then his own arm brought him salvation,
  - type: text
    content: and his righteousness upheld him.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 1 Thess. 5:8; See Eph. 6:13-17
  - type: text
    content: He put on righteousness as a breastplate,
  - type: text
    content: and a helmet of salvation on his head;
  - type: text
    content: he put on garments of vengeance for clothing,
  - type: text
    content: 'and wrapped himself in '
  - type: note
    content: '[ch. 9:7]'
  - type: text
    content: zeal as a cloak.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 63:4, 6
  - type: text
    content: According to their deeds, so will he repay,
  - type: text
    content: wrath to his adversaries, repayment to his enemies;
  - type: note
    content: '[ch. 41:1, 5 ]'
  - type: text
    content: to the coastlands he will render repayment.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 113:3 ]'
  - type: text
    content: 'So they shall fear the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' from the west,'
  - type: text
    content: and his glory from the rising of the sun;
  - type: note
    content: '[ch. 30:27, 28 ]'
  - type: text
    content: for he will come like a rushing stream,
  - type: note
    content: Hebrew a narrow river
  - type: text
    content: 'which the wind of the '
  - type: text
    content: Lord
  - type: text
    content: ' drives.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: Jer. 5:25
  - type: text
    content: but your iniquities have made a separation
  - type: text
    content: between you and your God,
  - type: text
    content: and your sins have hidden his face from you
  - type: text
    content: so that he does not hear.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cited Rom. 11:26, 27; [ch. 40:9 ; Joel 2:32]
  - type: text
    content: '“And '
  - type: note
    content: ch. 43:14
  - type: text
    content: a Redeemer will come to Zion,
  - type: text
    content: 'to those in Jacob who turn from transgression,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: '“And as for me, '
  - type: note
    content: Jer. 31:31; Heb. 8:10; 10:16
  - type: text
    content: 'this is my covenant with them,” says the '
  - type: text
    content: Lord
  - type: text
    content: ': “My Spirit that is upon you, '
  - type: note
    content: ch. 51:16; [Deut. 4:10]
  - type: text
    content: 'and my words that I have put in your mouth, shall not depart out of your mouth, or out of the mouth of your offspring, or out of the mouth of your children’s offspring,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “from this time forth and forevermore.”'
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:15
  - type: text
    content: For your hands are defiled with blood
  - type: text
    content: and your fingers with iniquity;
  - type: text
    content: your lips have spoken lies;
  - type: text
    content: your tongue mutters wickedness.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 14 ]'
  - type: text
    content: No one enters suit justly;
  - type: text
    content: no one goes to law honestly;
  - type: text
    content: they rely on empty pleas, they speak lies,
  - type: note
    content: Job 15:35; Ps. 7:14
  - type: text
    content: they conceive mischief and give birth to iniquity.
  '5':
  - type: text
    content: They hatch adders’ eggs;
  - type: text
    content: they weave the spider’s web;
  - type: text
    content: he who eats their eggs dies,
  - type: text
    content: and from one that is crushed a viper is hatched.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 8:14
  - type: text
    content: Their webs will not serve as clothing;
  - type: text
    content: men will not cover themselves with what they make.
  - type: text
    content: Their works are works of iniquity,
  - type: text
    content: and deeds of violence are in their hands.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Prov. 1:16; Cited Rom. 3:15-17
  - type: text
    content: Their feet run to evil,
  - type: text
    content: and they are swift to shed innocent blood;
  - type: text
    content: their thoughts are thoughts of iniquity;
  - type: text
    content: desolation and destruction are in their highways.
  '8':
  - type: text
    content: The way of peace they do not know,
  - type: text
    content: and there is no justice in their paths;
  - type: text
    content: they have made their roads crooked;
  - type: note
    content: ch. 48:22; 57:21
  - type: text
    content: no one who treads on them knows peace.
  '9':
  - type: text
    content: Therefore justice is far from us,
  - type: text
    content: and righteousness does not overtake us;
  - type: note
    content: '[ver. 11; ch. 60:2 ]'
  - type: text
    content: we hope for light, and behold, darkness,
  - type: text
    content: and for brightness, but we walk in gloom.
