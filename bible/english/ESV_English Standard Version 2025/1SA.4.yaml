document_id: 1SA.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Philistines Capture the Ark
  - type: text
    content: And the word of Samuel came to all Israel.
  - type: text
    content: 'Now Israel went out to battle against the Philistines. They encamped at '
  - type: note
    content: '[ch. 5:1; 7:12]'
  - type: text
    content: 'Ebenezer, and the Philistines encamped at '
  - type: note
    content: ch. 29:1; Josh. 12:18
  - type: text
    content: 'Aphek. '
  '10':
  - type: text
    content: 'So the Philistines fought, '
  - type: note
    content: ver. 2; Ps. 78:62; [Lev. 26:17; Deut. 28:25]
  - type: text
    content: 'and Israel was defeated, '
  - type: note
    content: 2 Sam. 18:17; 19:8; 2 Kgs. 14:12; 2 Chr. 25:22
  - type: text
    content: 'and they fled, every man to his home. And there was a very great slaughter, for thirty thousand foot soldiers of Israel fell. '
  '11':
  - type: note
    content: '[ch. 2:32; Ps. 78:60, 61]'
  - type: text
    content: 'And the ark of God was captured, '
  - type: note
    content: ch. 2:34; Ps. 78:64
  - type: text
    content: and the two sons of Eli, Hophni and Phinehas, died.
  - type: heading
    content: The Death of Eli
  '12':
  - type: text
    content: 'A man of Benjamin ran from the battle line and came to Shiloh the same day, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'with his clothes torn and with dirt on his head. '
  '13':
  - type: text
    content: 'When he arrived, '
  - type: note
    content: ver. 18; ch. 1:9
  - type: text
    content: 'Eli was sitting on his seat by the road watching, for his heart trembled for the ark of God. And when the man came into the city and told the news, all the city cried out. '
  '14':
  - type: text
    content: 'When Eli heard the sound of the outcry, he said, “What is this uproar?” Then the man hurried and came and told Eli. '
  '15':
  - type: text
    content: 'Now Eli was ninety-eight years old '
  - type: note
    content: 1 Kgs. 14:4; [ch. 3:2]
  - type: text
    content: 'and his eyes were set so that he could not see. '
  '16':
  - type: text
    content: 'And the man said to Eli, “I am he who has come from the battle; I fled from the battle today.” And he said, '
  - type: note
    content: 2 Sam. 1:4
  - type: text
    content: '“How did it go, my son?” '
  '17':
  - type: text
    content: 'He who brought the news answered and said, “Israel has fled before the Philistines, and there has also been a great defeat among the people. Your two sons also, Hophni and Phinehas, are dead, and the ark of God has been captured.” '
  '18':
  - type: text
    content: 'As soon as he mentioned the ark of God, Eli fell over backward '
  - type: note
    content: ver. 13
  - type: text
    content: from his seat by the side of the gate, and his neck was broken and he died, for the man was old and heavy. He had judged Israel forty years.
  '19':
  - type: text
    content: 'Now his daughter-in-law, the wife of Phinehas, was pregnant, about to give birth. And when she heard the news that the ark of God was captured, and that her father-in-law and her husband were dead, she bowed and gave birth, for her pains came upon her. '
  '2':
  - type: text
    content: 'The Philistines drew up in line against Israel, and when the battle spread, Israel was defeated before the Philistines, who killed about four thousand men on the field of battle. '
  '20':
  - type: text
    content: 'And about the time of her death the women attending her said to her, '
  - type: note
    content: Gen. 35:17
  - type: text
    content: '“Do not be afraid, for you have borne a son.” But she did not answer or pay attention. '
  '21':
  - type: text
    content: 'And she named the child '
  - type: note
    content: ch. 14:3
  - type: text
    content: 'Ichabod, saying, '
  - type: note
    content: Ps. 78:61; [Ps. 26:8]
  - type: text
    content: “The glory has departed
  - type: note
    content: Or gone into exile; also verse 22
  - type: text
    content: ' from Israel!” because '
  - type: note
    content: ver. 11
  - type: text
    content: 'the ark of God had been captured and because of her father-in-law and her husband. '
  '22':
  - type: text
    content: 'And she said, “The glory has departed from Israel, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: for the ark of God has been captured.”
  '3':
  - type: text
    content: 'And when the people came to the camp, the elders of Israel said, “Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' defeated us today before the Philistines? Let us bring the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' here '
  - type: note
    content: Josh. 18:1
  - type: text
    content: from Shiloh, that it
  - type: note
    content: Or he
  - type: text
    content: ' may come among us and save us from the power of our enemies.” '
  '4':
  - type: text
    content: 'So the people sent to Shiloh and brought from there the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: Ex. 25:22; 2 Sam. 6:2; Ps. 80:1; 99:1; [Num. 7:89]
  - type: text
    content: who is enthroned on the cherubim. And the two sons of Eli, Hophni and Phinehas, were there with the ark of the covenant of God.
  '5':
  - type: text
    content: 'As soon as the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' came into the camp, all Israel '
  - type: note
    content: Josh. 6:5, 20
  - type: text
    content: 'gave a mighty shout, so that the earth resounded. '
  '6':
  - type: text
    content: 'And when the Philistines heard the noise of the shouting, they said, “What does this great shouting in the camp of the Hebrews mean?” And when they learned that the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had come to the camp, '
  '7':
  - type: text
    content: 'the Philistines were afraid, for they said, “A god has come into the camp.” And they said, “Woe to us! For nothing like this has happened before. '
  '8':
  - type: text
    content: 'Woe to us! Who can deliver us from the power of these mighty gods? These are the gods who struck the Egyptians with every sort of plague in the wilderness. '
  '9':
  - type: note
    content: '[2 Sam. 10:12; 1 Cor. 16:13]'
  - type: text
    content: 'Take courage, and be men, O Philistines, lest you become slaves to the Hebrews '
  - type: note
    content: Judg. 13:1
  - type: text
    content: as they have been to you; be men and fight.”
