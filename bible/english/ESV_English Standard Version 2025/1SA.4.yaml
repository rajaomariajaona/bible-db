      metadata:
        usfm: 1SA.1.9
    marker-yv: yv-n
  - type: text
    text: 'Eli was sitting on his seat by the road watching, for his heart trembled for the ark of God. And when the man came into the city and told the news, all the city cried out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
