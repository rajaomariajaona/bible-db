  - type: text
    text: 'Amaziah was twenty-five years old when he began to reign, and he reigned twenty-nine years in Jerusalem. His mother’s name was Jehoaddan of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
