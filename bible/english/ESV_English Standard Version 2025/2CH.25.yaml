        text: 14, 15
      metadata:
        usfm: 2CH.25.14
    marker-yv: yv-n
  - type: text
    text: 'because they had sought the gods of Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So Joash king of Israel went up, and he and Amaziah king of Judah faced one another in battle at Beth-shemesh, which belongs to Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Judah was defeated by Israel, and every man fled to his home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And Joash king of Israel captured Amaziah king of Judah, the son of Joash, son of '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
