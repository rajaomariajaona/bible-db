      children:
      - type: text
        text: 2 Kgs. 14:7
      metadata:
        usfm: 2KI.14.7
    marker-yv: yv-n
  - type: text
    text: 'Valley of Salt and struck down '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:10
      metadata:
        usfm: 2CH.20.10
    marker-yv: yv-n
  - type: text
    text: '10,000 men of Seir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The men of Judah captured another 10,000 alive and took them to the top of a rock and threw them down from the top of the rock, and they were all dashed to pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the men of the army whom Amaziah sent back, not letting them go with him to battle, raided the cities of Judah, '
  - type: usfm
