    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:16
      metadata:
        usfm: 2CH.26.16
    marker-yv: yv-n
  - type: text
    text: your heart has lifted you up in boastfulness. But now stay at home. Why should you provoke trouble so that you fall, you and Judah with you?”
- type: usfm
