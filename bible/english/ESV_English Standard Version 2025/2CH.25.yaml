      metadata:
        usfm: 2KI.14.8+2KI.14.9+2KI.14.10+2KI.14.11+2KI.14.12+2KI.14.13+2KI.14.14
    marker-yv: yv-n
  - type: text
    text: 'Then Amaziah king of Judah took counsel and sent to Joash the son of Jehoahaz, son of Jehu, king of Israel, saying, “Come, let us look one another in the face.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Joash the king of Israel sent word to Amaziah king of Judah, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
