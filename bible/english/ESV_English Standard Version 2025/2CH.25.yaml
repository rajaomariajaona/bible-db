    children:
    - type: text
      text: '8'
  - type: text
    text: 'But go, act, be strong for the battle. Why should you suppose that God will cast you down before the enemy? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
