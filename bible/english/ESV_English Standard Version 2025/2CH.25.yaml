document_id: 2CH.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Amaziah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see 2 Kgs. 14:1-6
  - type: text
    content: 'Amaziah was twenty-five years old when he began to reign, and he reigned twenty-nine years in Jerusalem. His mother’s name was Jehoaddan of Jerusalem. '
  '10':
  - type: text
    content: 'Then Amaziah discharged the army that had come to him from Ephraim to go home again. And they became very angry with Judah and returned home in fierce anger. '
  '11':
  - type: text
    content: 'But Amaziah took courage and led out his people and went to the '
  - type: note
    content: 2 Kgs. 14:7
  - type: text
    content: 'Valley of Salt and struck down '
  - type: note
    content: ch. 20:10
  - type: text
    content: '10,000 men of Seir. '
  '12':
  - type: text
    content: 'The men of Judah captured another 10,000 alive and took them to the top of a rock and threw them down from the top of the rock, and they were all dashed to pieces. '
  '13':
  - type: text
    content: 'But the men of the army whom Amaziah sent back, not letting them go with him to battle, raided the cities of Judah, '
  - type: note
    content: '[ch. 15:8; 19:4]'
  - type: text
    content: from Samaria to Beth-horon, and struck down 3,000 people in them and took much spoil.
  - type: heading
    content: Amaziah’s Idolatry
  '14':
  - type: text
    content: 'After Amaziah came from striking down the Edomites, '
  - type: note
    content: '[ch. 28:23]'
  - type: text
    content: 'he brought the gods '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'of the men of Seir and set them up as his gods and worshiped them, making offerings to them. '
  '15':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with Amaziah and sent to him a prophet, who said to him, “Why have you sought the gods of a people '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'who did not deliver their own people from your hand?” '
  '16':
  - type: text
    content: 'But as he was speaking, the king said to him, “Have we made you a royal counselor? Stop! Why should you be struck down?” So the prophet stopped, but said, “I know that '
  - type: note
    content: '[Josh. 11:20]'
  - type: text
    content: God has determined to destroy you, because you have done this and have not listened to my counsel.”
  - type: heading
    content: Israel Defeats Amaziah
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-24, see 2 Kgs. 14:8-14
  - type: text
    content: 'Then Amaziah king of Judah took counsel and sent to Joash the son of Jehoahaz, son of Jehu, king of Israel, saying, “Come, let us look one another in the face.” '
  '18':
  - type: text
    content: 'And Joash the king of Israel sent word to Amaziah king of Judah, '
  - type: note
    content: '[Judg. 9:8]'
  - type: text
    content: '“A thistle on Lebanon sent to a cedar on Lebanon, saying, ‘Give your daughter to my son for a wife,’ and a wild beast of Lebanon passed by and trampled down the thistle. '
  '19':
  - type: text
    content: You say, ‘See, I
  - type: note
    content: Hebrew you
  - type: text
    content: ' have struck down Edom,’ and '
  - type: note
    content: See ch. 26:16
  - type: text
    content: your heart has lifted you up in boastfulness. But now stay at home. Why should you provoke trouble so that you fall, you and Judah with you?”
  '2':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'yet not with a whole heart. '
  '20':
  - type: text
    content: 'But Amaziah would not listen, for it was of God, in order that he might give them into the hand of their enemies, '
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'because they had sought the gods of Edom. '
  '21':
  - type: text
    content: 'So Joash king of Israel went up, and he and Amaziah king of Judah faced one another in battle at Beth-shemesh, which belongs to Judah. '
  '22':
  - type: text
    content: 'And Judah was defeated by Israel, and every man fled to his home. '
  '23':
  - type: text
    content: 'And Joash king of Israel captured Amaziah king of Judah, the son of Joash, son of '
  - type: note
    content: ch. 21:17
  - type: text
    content: Ahaziah, at Beth-shemesh, and brought him to Jerusalem and broke down the wall of Jerusalem for 400 cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' from '
  - type: note
    content: Neh. 8:16
  - type: text
    content: 'the Ephraim Gate to the Corner Gate. '
  '24':
  - type: text
    content: 'And he seized all the gold and silver, and all the vessels that were found in the house of God, in the care of '
  - type: note
    content: 1 Chr. 26:15
  - type: text
    content: Obed-edom. He seized also the treasuries of the king’s house, also hostages, and he returned to Samaria.
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ch. 25:25–26:2, see 2 Kgs. 14:17-22
  - type: text
    content: 'Amaziah the son of Joash, king of Judah, lived fifteen years after the death of Joash the son of Jehoahaz, king of Israel. '
  '26':
  - type: text
    content: 'Now the rest of the deeds of Amaziah, from first to last, are they not written in the Book of the Kings of Judah and Israel? '
  '27':
  - type: text
    content: 'From the time when he turned away from the '
  - type: text
    content: Lord
  - type: text
    content: ' they made a conspiracy against him in Jerusalem, and he fled to Lachish. But they sent after him to Lachish and put him to death there. '
  '28':
  - type: text
    content: And they brought him upon horses, and he was buried with his fathers in the city of David.
  - type: note
    content: Hebrew of Judah
  '3':
  - type: text
    content: 'And as soon as the royal power was firmly his, he killed his servants who had struck down the king his father. '
  '4':
  - type: text
    content: 'But he did not put their children to death, according to what is written in the Law, in the Book of Moses, where the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded, '
  - type: note
    content: Deut. 24:16; [Jer. 31:30; Ezek. 18:20]
  - type: text
    content: “Fathers shall not die because of their children, nor children die because of their fathers, but each one shall die for his own sin.”
  - type: heading
    content: Amaziah’s Victories
  '5':
  - type: text
    content: 'Then Amaziah assembled the men of Judah and set them by fathers’ houses under commanders of thousands and of hundreds for all Judah and Benjamin. He mustered those '
  - type: note
    content: Num. 1:3
  - type: text
    content: 'twenty years old and upward, and found that they were '
  - type: note
    content: '[ch. 11:1; 13:3; 17:14-18; 26:13]'
  - type: text
    content: '300,000 choice men, fit for war, '
  - type: note
    content: 1 Chr. 12:8
  - type: text
    content: 'able to handle spear and shield. '
  '6':
  - type: text
    content: He hired also 100,000 mighty men of valor from Israel for 100 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 33:1
  - type: text
    content: 'a man of God came to him and said, “O king, do not let the army of Israel go with you, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is not with Israel, with all these Ephraimites. '
  '8':
  - type: text
    content: 'But go, act, be strong for the battle. Why should you suppose that God will cast you down before the enemy? '
  - type: note
    content: '[ch. 20:6]'
  - type: text
    content: 'For God has power to help or to cast down.” '
  '9':
  - type: text
    content: 'And Amaziah said to the man of God, “But what shall we do about the hundred talents that I have given to the army of Israel?” The man of God answered, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is able to give you much more than this.” '
