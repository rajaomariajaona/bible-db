    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was angry with Amaziah and sent to him a prophet, who said to him, “Why have you sought the gods of a people '
  - type: usfm
