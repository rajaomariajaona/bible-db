        usfm: 2KI.14.17+2KI.14.18+2KI.14.19+2KI.14.20+2KI.14.21+2KI.14.22
    marker-yv: yv-n
  - type: text
    text: 'Amaziah the son of Joash, king of Judah, lived fifteen years after the death of Joash the son of Jehoahaz, king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the rest of the deeds of Amaziah, from first to last, are they not written in the Book of the Kings of Judah and Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'From the time when he turned away from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
