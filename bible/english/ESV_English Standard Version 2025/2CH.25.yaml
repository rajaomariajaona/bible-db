      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'yet not with a whole heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And as soon as the royal power was firmly his, he killed his servants who had struck down the king his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But he did not put their children to death, according to what is written in the Law, in the Book of Moses, where the '
  - type: usfm
