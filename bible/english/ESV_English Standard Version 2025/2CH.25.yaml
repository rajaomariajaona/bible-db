  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But as he was speaking, the king said to him, “Have we made you a royal counselor? Stop! Why should you be struck down?” So the prophet stopped, but said, “I know that '
  - type: usfm
    marker: x
    children:
    - type: usfm
