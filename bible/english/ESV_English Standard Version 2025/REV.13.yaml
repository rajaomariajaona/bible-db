document_id: REV.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The First Beast
  - type: text
    content: 'And I saw a beast rising out of the sea, '
  - type: note
    content: Dan. 7:3; See ch. 12:3
  - type: text
    content: 'with ten horns and seven heads, with ten diadems on its horns and '
  - type: note
    content: ch. 17:3
  - type: text
    content: 'blasphemous names on its heads. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 33:1; Jer. 15:2; 43:11 ]'
  - type: text
    content: If anyone is to be taken captive,
  - type: text
    content: to captivity he goes;
  - type: note
    content: See Gen. 9:6
  - type: text
    content: if anyone is to be slain with the sword,
  - type: text
    content: with the sword must he be slain.
  - type: note
    content: ch. 14:12
  - type: text
    content: Here is a call for the endurance and faith of the saints.
  - type: heading
    content: The Second Beast
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: '[ver. 1, 14; ch. 16:13]'
  - type: text
    content: 'I saw another beast rising out of the earth. It had two horns like a lamb and it spoke like a dragon. '
  '12':
  - type: text
    content: It exercises all the authority of the first beast in its presence,
  - type: note
    content: Or on its behalf
  - type: text
    content: ' and makes the earth and its inhabitants worship the first beast, '
  - type: note
    content: ver. 3
  - type: text
    content: 'whose mortal wound was healed. '
  '13':
  - type: note
    content: ch. 16:14; 19:20; Deut. 13:1-3; Matt. 24:24; 2 Thess. 2:9-11
  - type: text
    content: 'It performs great signs, even '
  - type: note
    content: ch. 20:9; 1 Kgs. 18:38; 2 Kgs. 1:10, 12; Luke 9:54
  - type: text
    content: 'making fire come down from heaven to earth in front of people, '
  '14':
  - type: text
    content: and by the signs that it is allowed to work in the presence of
  - type: note
    content: Or on behalf of
  - type: text
    content: ' the beast '
  - type: note
    content: '[ch. 12:9]'
  - type: text
    content: 'it deceives those who dwell on earth, telling them to make an image for the beast '
  - type: note
    content: ver. 3, 12
  - type: text
    content: 'that was wounded by the sword and yet lived. '
  '15':
  - type: text
    content: 'And it was allowed to give breath to the image of the beast, so that the image of the beast might even speak and might cause those who would not '
  - type: note
    content: ch. 14:9, 11; 16:2; 19:20; 20:4
  - type: text
    content: 'worship the image of the beast '
  - type: note
    content: '[ch. 16:6]'
  - type: text
    content: 'to be slain. '
  '16':
  - type: text
    content: Also it causes all, both small and great, both rich and poor, both free and slave,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' '
  - type: note
    content: '[ch. 7:3]; See Gal. 6:17'
  - type: text
    content: 'to be marked on the right hand or the forehead, '
  '17':
  - type: text
    content: 'so that no one can buy or sell unless he has the mark, that is, '
  - type: note
    content: ch. 14:11
  - type: text
    content: 'the name of the beast or '
  - type: note
    content: ch. 15:2
  - type: text
    content: 'the number of its name. '
  '18':
  - type: note
    content: '[ch. 17:9]'
  - type: text
    content: 'This calls for wisdom: let the one who has understanding calculate the number of the beast, for it is the number '
  - type: note
    content: '[ch. 21:17]'
  - type: text
    content: of a man, and his number is 666.
  - type: note
    content: Some manuscripts 616
  '2':
  - type: text
    content: 'And the beast that I saw was '
  - type: note
    content: Dan. 7:6
  - type: text
    content: 'like a leopard; its feet were like '
  - type: note
    content: Dan. 7:5
  - type: text
    content: 'a bear’s, and its mouth was like '
  - type: note
    content: Dan. 7:4
  - type: text
    content: 'a lion’s mouth. And to it '
  - type: note
    content: ver. 4, 11; [Luke 4:6]
  - type: text
    content: 'the dragon gave his power and '
  - type: note
    content: ch. 16:10
  - type: text
    content: 'his throne and great authority. '
  '3':
  - type: text
    content: 'One of its heads seemed to have a mortal wound, but its mortal wound was healed, and '
  - type: note
    content: '[ch. 17:8]'
  - type: text
    content: 'the whole earth marveled as they followed the beast. '
  '4':
  - type: text
    content: 'And they worshiped the dragon, for he had given his authority to the beast, and they worshiped the beast, saying, '
  - type: note
    content: '[ch. 18:18]'
  - type: text
    content: “Who is like the beast, and who can fight against it?”
  '5':
  - type: text
    content: 'And the beast was given '
  - type: note
    content: Dan. 7:8, 11, 20; 11:36; [2 Thess. 2:4]
  - type: text
    content: 'a mouth uttering haughty and blasphemous words, and it was allowed to exercise authority for '
  - type: note
    content: ch. 11:2; 12:6
  - type: text
    content: 'forty-two months. '
  '6':
  - type: text
    content: It opened its mouth to utter blasphemies against God, blaspheming his name and his dwelling,
  - type: note
    content: Or tabernacle
  - type: text
    content: ' that is, those who dwell in heaven. '
  '7':
  - type: text
    content: 'Also it was allowed '
  - type: note
    content: ch. 11:7; 12:17; Dan. 7:21
  - type: text
    content: to make war on the saints and to conquer them.
  - type: note
    content: Some manuscripts omit this sentence
  - type: text
    content: ' And authority was given it over every tribe and people and language and nation, '
  '8':
  - type: text
    content: 'and all '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'who dwell on earth will worship it, everyone whose name has not been written from the foundation of the world in '
  - type: note
    content: See ch. 3:5
  - type: text
    content: 'the book of life of '
  - type: note
    content: See ch. 5:6
  - type: text
    content: 'the Lamb '
  - type: note
    content: '[Acts 2:23; 1 Pet. 1:19, 20]'
  - type: text
    content: 'who was slain. '
  '9':
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'If anyone has an ear, let him hear:'
