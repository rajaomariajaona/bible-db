document_id: 1CH.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ammonites Disgrace David’s Men
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-19, see 2 Sam. 10:1-19
  - type: text
    content: 'Now after this Nahash the king of the Ammonites died, and his son reigned in his place. '
  '10':
  - type: text
    content: 'When Joab saw that the battle was set against him both in front and in the rear, he chose some of the best men of Israel and arrayed them against the Syrians. '
  '11':
  - type: text
    content: 'The rest of his men he put in the charge of '
  - type: note
    content: ch. 18:12
  - type: text
    content: 'Abishai his brother, and they were arrayed against the Ammonites. '
  '12':
  - type: text
    content: 'And he said, “If the Syrians are too strong for me, then you shall help me, but if the Ammonites are too strong for you, then I will help you. '
  '13':
  - type: text
    content: 'Be strong, and let us use our strength for our people and for the cities of our God, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' do what seems good to him.” '
  '14':
  - type: text
    content: 'So Joab and the people who were with him drew near before the Syrians for battle, and they fled before him. '
  '15':
  - type: text
    content: 'And when the Ammonites saw that the Syrians fled, they likewise fled before '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: Abishai, Joab’s brother, and entered the city. Then Joab came to Jerusalem.
  '16':
  - type: text
    content: But when the Syrians saw that they had been defeated by Israel, they sent messengers and brought out the Syrians who were beyond the Euphrates,
  - type: note
    content: Hebrew the River
  - type: text
    content: ' with '
  - type: note
    content: '[2 Sam. 10:16, 18]'
  - type: text
    content: 'Shophach the commander of the army of '
  - type: note
    content: 2 Sam. 10:16
  - type: text
    content: 'Hadadezer at their head. '
  '17':
  - type: text
    content: 'And when it was told to David, he gathered all Israel together and crossed the Jordan and came to them and drew up his forces against them. And when David set the battle in array against the Syrians, they fought with him. '
  '18':
  - type: text
    content: 'And the Syrians fled before Israel, and David killed of the Syrians the men of '
  - type: note
    content: '[2 Sam. 10:18]'
  - type: text
    content: '7,000 chariots and 40,000 '
  - type: note
    content: '[2 Sam. 10:18]'
  - type: text
    content: 'foot soldiers, and put to death also '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'Shophach the commander of their army. '
  '19':
  - type: text
    content: 'And when the servants of '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: Hadadezer saw that they had been defeated by Israel, they made peace with David and became subject to him. So the Syrians were not willing to save the Ammonites anymore.
  '2':
  - type: text
    content: 'And David said, “I will deal kindly with Hanun the son of Nahash, for his father dealt kindly with me.” So David sent messengers to console him concerning his father. And David’s servants came to the land of the Ammonites to Hanun to console him. '
  '3':
  - type: text
    content: 'But the princes of the Ammonites said to Hanun, “Do you think, because David has sent comforters to you, that he is honoring your father? Have not his servants come to you to search and to overthrow and to spy out the land?” '
  '4':
  - type: text
    content: 'So Hanun took David’s servants and shaved them and cut off their garments in the middle, at their hips, and sent them away; '
  '5':
  - type: text
    content: and they departed. When David was told concerning the men, he sent messengers to meet them, for the men were greatly ashamed. And the king said, “Remain at Jericho until your beards have grown and then return.”
  '6':
  - type: text
    content: When the Ammonites saw that they had become a stench to David, Hanun and the Ammonites sent 1,000 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver to hire chariots and horsemen '
  - type: note
    content: '[2 Sam. 10:6]'
  - type: text
    content: 'from Mesopotamia, from Aram-maacah, and from '
  - type: note
    content: ch. 18:5, 9
  - type: text
    content: 'Zobah. '
  '7':
  - type: text
    content: 'They hired 32,000 chariots and the king of Maacah with his army, who came and encamped before '
  - type: note
    content: Num. 21:30; Josh. 13:9, 16
  - type: text
    content: 'Medeba. And the Ammonites were mustered from their cities and came to battle. '
  '8':
  - type: text
    content: 'When David heard of it, he sent Joab and all the army of the mighty men. '
  '9':
  - type: text
    content: And the Ammonites came out and drew up in battle array at the entrance of the city, and the kings who had come were by themselves in the open country.
  - type: heading
    content: Ammonites and Syrians Defeated
