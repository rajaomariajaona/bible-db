  - type: note
    content: '[Ezra 2:57]'
  - type: text
    content: Amon.
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-73, see Ezra 2:1-70
  - type: text
    content: 'These were the people of the province who came up out of the captivity of those exiles whom Nebuchadnezzar the king of Babylon had carried into exile. They returned to Jerusalem and Judah, each to his town. '
  '60':
  - type: text
    content: All the temple servants and the sons of Solomon’s servants were 392.
  '61':
  - type: text
    content: ' '
  - type: note
    content: Ezra 2:59
  - type: text
    content: 'The following were those who came up from Tel-melah, Tel-harsha, Cherub, '
  - type: note
    content: '[Ezra 2:59]'
  - type: text
    content: 'Addon, and Immer, but they could not prove their fathers’ houses nor their descent, whether they belonged to Israel: '
  '62':
  - type: text
    content: 'the sons of Delaiah, the sons of Tobiah, the sons of Nekoda, 642. '
  '63':
  - type: text
    content: 'Also, of the priests: the sons of Hobaiah, the sons of Hakkoz, the sons of Barzillai (who had taken a wife of the daughters of Barzillai the Gileadite and was called by their name). '
  '64':
  - type: text
    content: 'These sought their registration among those enrolled in the genealogies, but it was not found there, so they were excluded from the priesthood as unclean. '
  '65':
  - type: note
    content: Ezra 2:63
  - type: text
    content: 'The '
  - type: note
    content: ch. 8:9; 10:1
  - type: text
    content: governor told them that they were not to partake of the most holy food until a priest with Urim and Thummim should arise.
  - type: heading
    content: Totals of People and Gifts
  '66':
  - type: text
    content: 'The whole assembly together was 42,360, '
  '67':
  - type: text
    content: 'besides their male and female servants, of whom there were 7,337. And they had 245 singers, male and female. '
  '68':
  - type: text
    content: Their horses were 736, their mules 245,
  - type: note
    content: Compare Ezra 2:66 and the margins of some Hebrew manuscripts; Hebrew lacks Their horses . . . 245
  - type: text
    content: ' '
  '69':
  - type: text
    content: their camels 435, and their donkeys 6,720.
  '7':
  - type: text
    content: 'They came with Zerubbabel, Jeshua, Nehemiah, '
  - type: note
    content: '[Ezra 2:2]'
  - type: text
    content: Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum, Baanah.
  - type: text
    content: 'The number of the men of the people of Israel: '
  '70':
  - type: text
    content: 'Now some of the heads of fathers’ houses gave to the work. The '
  - type: note
    content: '[See ver. 65 above]'
  - type: text
    content: governor gave to the treasury 1,000 darics
  - type: note
    content: A daric was a coin weighing about 1/4 ounce or 8.5 grams
  - type: text
    content: ' of gold, 50 basins, 30 priests’ garments and 500 minas'
  - type: note
    content: A mina was about 1 1/4 pounds or 0.6 kilogram
  - type: text
    content: ' of silver.'
  - type: note
    content: Probable reading; Hebrew lacks minas of silver
  - type: text
    content: ' '
  '71':
  - type: text
    content: 'And some of the heads of fathers’ houses gave into the treasury of the work 20,000 darics of gold and 2,200 minas of silver. '
  '72':
  - type: note
    content: '[Ezra 2:69]'
  - type: text
    content: And what the rest of the people gave was 20,000 darics of gold, 2,000 minas of silver, and 67 priests’ garments.
  '73':
  - type: text
    content: So the priests, the Levites, the gatekeepers, the singers, some of the people, the temple servants, and all Israel, lived in their towns.
  - type: note
    content: Ezra 3:1
  - type: text
    content: And when the seventh month had come, the people of Israel were in their towns.
  '8':
  - type: text
    content: 'the sons of Parosh, 2,172. '
  '9':
  - type: text
    content: 'The sons of Shephatiah, 372. '
