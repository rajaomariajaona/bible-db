  '5':
  - type: text
    content: 'Then my God put it into my heart to assemble the nobles and the officials and the people to be enrolled by genealogy. And I found the book of the genealogy of '
  - type: note
    content: Ezra 1:11
  - type: text
    content: 'those who came up at the first, and I found written in it:'
  '50':
  - type: text
    content: 'the sons of Reaiah, the sons of Rezin, the sons of Nekoda, '
  '51':
  - type: text
    content: 'the sons of Gazzam, the sons of Uzza, the sons of Paseah, '
  '52':
  - type: text
    content: 'the sons of Besai, the sons of Meunim, the sons of '
  - type: note
    content: '[Ezra 2:50]'
  - type: text
    content: 'Nephushesim, '
  '53':
  - type: text
    content: 'the sons of Bakbuk, the sons of Hakupha, the sons of Harhur, '
  '54':
  - type: text
    content: 'the sons of '
  - type: note
    content: '[Ezra 2:52]'
  - type: text
    content: 'Bazlith, the sons of Mehida, the sons of Harsha, '
  '55':
