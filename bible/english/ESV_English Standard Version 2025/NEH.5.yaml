      marker-yv: yv-n
    - type: text
      text: 'the twentieth year to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:6
      marker-yv: yv-n
    - type: text
      text: 'the thirty-second year of Artaxerxes the king, twelve years, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Thess. 3:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'neither I nor my brothers ate the food allowance of the governor. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The former governors who were before me laid heavy burdens on the people and took from them for their daily ration
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare Vulgate; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: took from them for food and wine after
      marker-yv: yv-n
    - type: text
      text: ' forty shekels'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 2/5 ounce or 11 grams
      marker-yv: yv-n
    - type: text
      text: ' of silver. Even their servants lorded it over the people. But I did not do so, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'because of the fear of God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also persevered in the work on this wall, and we acquired no land, and all my servants were gathered there for the work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, there were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 9:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 18:19
      marker-yv: yv-n
    - type: text
      text: 'at my table 150 men, Jews and officials, besides those who came to us from the nations that were around us. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 4:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: Now what was prepared at my expense
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prepared for me
      marker-yv: yv-n
    - type: text
      text: ' for each day was one ox and six choice sheep and birds, and every ten days all kinds of wine in abundance. Yet for all this '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'I did not demand the food allowance of the governor, because the service was too heavy on this people. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      marker-yv: yv-n
    - type: text
      text: Remember for my good, O my God, all that I have done for this people.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For there were those who said, “With our sons and our daughters, we are many. So let us get grain, that we may eat and keep alive.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were also those who said, “We are mortgaging our fields, our vineyards, and our houses to get grain because of the famine.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there were those who said, “We have borrowed money for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 4:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:24
      marker-yv: yv-n
    - type: text
      text: 'the king’s tax on our fields and our vineyards. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 58:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 29:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'our flesh is as the flesh of our brothers, our children are as their children. Yet '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 25:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 4:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: we are forcing our sons and our daughters to be slaves, and some of our daughters have already been enslaved, but it is not in our power to help it, for other men have our fields and our vineyards.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was very angry when I heard '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
