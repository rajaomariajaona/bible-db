      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:48
      marker-yv: yv-n
    - type: text
      text: 'And all the assembly said “Amen” and praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
