document_id: NEH.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nehemiah Stops Oppression of the Poor
  - type: text
    content: 'Now there arose '
  - type: note
    content: '[Ex. 3:9; Isa. 5:7]'
  - type: text
    content: 'a great outcry of the people and of their wives '
  - type: note
    content: Lev. 25:35, 37; Deut. 15:7
  - type: text
    content: 'against their Jewish brothers. '
  '10':
  - type: text
    content: 'Moreover, I and my brothers and my servants are lending them money and grain. Let us abandon this exacting of interest. '
  '11':
  - type: text
    content: 'Return to them this very day their fields, their vineyards, their olive orchards, and their houses, and the percentage of money, grain, wine, and oil that you have been exacting from them.” '
  '12':
  - type: text
    content: 'Then they said, “We will restore these and '
  - type: note
    content: '[ch. 10:31]'
  - type: text
    content: 'require nothing from them. We will do as you say.” And I called the priests and '
  - type: note
    content: Ezra 10:5
  - type: text
    content: 'made them swear '
  - type: note
    content: '[Jer. 34:8, 9]'
  - type: text
    content: 'to do as they had promised. '
  '13':
  - type: note
    content: '[Acts 18:6]'
  - type: text
    content: I also shook out the fold
  - type: note
    content: Hebrew bosom
  - type: text
    content: ' of my garment and said, “So may God shake out every man from his house and from his labor who does not keep this promise. So may he be shaken out and emptied.” '
  - type: note
    content: ch. 8:6; [Deut. 27:15]; 1 Chr. 16:36; Ps. 106:48
  - type: text
    content: 'And all the assembly said “Amen” and praised the '
  - type: text
    content: Lord
  - type: text
    content: . And the people did as they had promised.
  - type: heading
    content: Nehemiah’s Generosity
  '14':
  - type: text
    content: 'Moreover, from the time that I was appointed to be their governor in the land of Judah, from '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'the twentieth year to '
  - type: note
    content: ch. 13:6
  - type: text
    content: 'the thirty-second year of Artaxerxes the king, twelve years, '
  - type: note
    content: '[2 Thess. 3:8]'
  - type: text
    content: 'neither I nor my brothers ate the food allowance of the governor. '
  '15':
  - type: text
    content: The former governors who were before me laid heavy burdens on the people and took from them for their daily ration
  - type: note
    content: Compare Vulgate; Hebrew took from them for food and wine after
  - type: text
    content: ' forty shekels'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver. Even their servants lorded it over the people. But I did not do so, '
  - type: note
    content: ver. 9
  - type: text
    content: 'because of the fear of God. '
  '16':
  - type: text
    content: 'I also persevered in the work on this wall, and we acquired no land, and all my servants were gathered there for the work. '
  '17':
  - type: text
    content: 'Moreover, there were '
  - type: note
    content: '[2 Sam. 9:7, 10]; 1 Kgs. 18:19'
  - type: text
    content: 'at my table 150 men, Jews and officials, besides those who came to us from the nations that were around us. '
  '18':
  - type: note
    content: '[1 Kgs. 4:22, 23]'
  - type: text
    content: Now what was prepared at my expense
  - type: note
    content: Or prepared for me
  - type: text
    content: ' for each day was one ox and six choice sheep and birds, and every ten days all kinds of wine in abundance. Yet for all this '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'I did not demand the food allowance of the governor, because the service was too heavy on this people. '
  '19':
  - type: note
    content: ch. 13:14, 22, 31
  - type: text
    content: Remember for my good, O my God, all that I have done for this people.
  '2':
  - type: text
    content: 'For there were those who said, “With our sons and our daughters, we are many. So let us get grain, that we may eat and keep alive.” '
  '3':
  - type: text
    content: 'There were also those who said, “We are mortgaging our fields, our vineyards, and our houses to get grain because of the famine.” '
  '4':
  - type: text
    content: 'And there were those who said, “We have borrowed money for '
  - type: note
    content: Ezra 4:13, 20; 7:24
  - type: text
    content: 'the king’s tax on our fields and our vineyards. '
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: Isa. 58:7; [Gen. 29:14]
  - type: text
    content: 'our flesh is as the flesh of our brothers, our children are as their children. Yet '
  - type: note
    content: '[Ex. 21:7; Lev. 25:39; 2 Kgs. 4:1]'
  - type: text
    content: we are forcing our sons and our daughters to be slaves, and some of our daughters have already been enslaved, but it is not in our power to help it, for other men have our fields and our vineyards.”
  '6':
  - type: text
    content: 'I was very angry when I heard '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'their outcry and these words. '
  '7':
  - type: text
    content: 'I took counsel with myself, and I brought charges against the nobles and the officials. I said to them, '
  - type: note
    content: '[Ex. 22:25; Lev. 25:36; Ps. 15:5; Ezek. 22:12]'
  - type: text
    content: '“You are exacting interest, each from his brother.” And I held a great assembly against them '
  '8':
  - type: text
    content: 'and said to them, “We, as far as we are able, '
  - type: note
    content: Lev. 25:48, 49
  - type: text
    content: 'have bought back our Jewish brothers who have been sold to the nations, but you even sell your brothers that they may be sold to us!” They were silent and could not find a word to say. '
  '9':
  - type: text
    content: 'So I said, “The thing that you are doing is not good. Ought you not to walk '
  - type: note
    content: Lev. 25:36
  - type: text
    content: 'in the fear of our God '
  - type: note
    content: ch. 4:4; [2 Sam. 12:14]
  - type: text
    content: 'to prevent the taunts of the nations our enemies? '
