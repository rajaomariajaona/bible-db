  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, I and my brothers and my servants are lending them money and grain. Let us abandon this exacting of interest. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Return to them this very day their fields, their vineyards, their olive orchards, and their houses, and the percentage of money, grain, wine, and oil that you have been exacting from them.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
