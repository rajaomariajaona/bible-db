        - type: text
          text: 31:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the men who have been mentioned by name rose and took the captives, and with the spoil they clothed all who were naked among them. They clothed them, gave them sandals, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 6:22
      - type: text
