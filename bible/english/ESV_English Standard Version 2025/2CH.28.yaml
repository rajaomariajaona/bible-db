        children:
        - type: text
          text: Prov. 25:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:20
      marker-yv: yv-n
    - type: text
      text: 'provided them with food and drink, and anointed them, and carrying all the feeble among them on donkeys, they brought them to their kinsfolk at Jericho, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
