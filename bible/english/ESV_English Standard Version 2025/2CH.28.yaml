document_id: 2CH.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaz Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see 2 Kgs. 16:2-4
  - type: text
    content: 'Ahaz was twenty years old when he began to reign, and he reigned sixteen years in Jerusalem. And he did not do what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his father David had done, '
  '10':
  - type: text
    content: 'And now you intend to subjugate the people of Judah and Jerusalem, male and female, as your slaves. Have you not sins of your own against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God? '
  '11':
  - type: text
    content: 'Now hear me, and send back the captives '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'from your relatives whom you have taken, for the fierce wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' is upon you.”'
  '12':
  - type: text
    content: 'Certain chiefs also of the men of Ephraim, Azariah the son of Johanan, Berechiah the son of Meshillemoth, Jehizkiah the son of Shallum, and Amasa the son of Hadlai, stood up against those who were coming from the war '
  '13':
  - type: text
    content: 'and said to them, “You shall not bring the captives in here, for you propose to bring upon us guilt against the '
  - type: text
    content: Lord
  - type: text
    content: ' in addition to our present sins and guilt. For our guilt is already great, and there is fierce wrath against Israel.” '
  '14':
  - type: text
    content: 'So the armed men left the captives and the spoil before the princes and all the assembly. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: ver. 12; [ch. 31:19; Num. 1:17]
  - type: text
    content: 'the men who have been mentioned by name rose and took the captives, and with the spoil they clothed all who were naked among them. They clothed them, gave them sandals, '
  - type: note
    content: 2 Kgs. 6:22; Prov. 25:21, 22; Rom. 12:20
  - type: text
    content: 'provided them with food and drink, and anointed them, and carrying all the feeble among them on donkeys, they brought them to their kinsfolk at Jericho, '
  - type: note
    content: Deut. 34:3; Judg. 1:16
  - type: text
    content: the city of palm trees. Then they returned to Samaria.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 16:7, 8 ]'
  - type: text
    content: At that time King Ahaz sent to the king
  - type: note
    content: Septuagint, Syriac, Vulgate (compare 2 Kings 16:7); Hebrew kings
  - type: text
    content: ' of Assyria for help. '
  '17':
  - type: text
    content: 'For the Edomites had again invaded and defeated Judah and carried away captives. '
  '18':
  - type: note
    content: '[Ezek. 16:27, 57]'
  - type: text
    content: 'And the Philistines had made raids on '
  - type: note
    content: See Josh. 15:33-36
  - type: text
    content: 'the cities in the Shephelah and the Negeb of Judah, and had taken Beth-shemesh, Aijalon, Gederoth, Soco '
  - type: note
    content: '[Num. 21:25]'
  - type: text
    content: 'with its villages, Timnah with its villages, and Gimzo with its villages. And they settled there. '
  '19':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' humbled Judah because of Ahaz king of Israel, for he had made '
  - type: note
    content: See ch. 21:2
  - type: text
    content: Judah act sinfully
  - type: note
    content: Or wildly
  - type: text
    content: ' and had been very unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'but he walked in the ways of the kings of Israel. He even made '
  - type: note
    content: '[Ex. 34:17]'
  - type: text
    content: 'metal images for '
  - type: note
    content: Judg. 2:11
  - type: text
    content: 'the Baals, '
  '20':
  - type: text
    content: 'So '
  - type: note
    content: '[2 Kgs. 15:29; 16:7]'
  - type: text
    content: Tiglath-pileser
  - type: note
    content: Hebrew Tilgath-pilneser
  - type: text
    content: ' king of Assyria came against him and afflicted him instead of strengthening him. '
  '21':
  - type: note
    content: 2 Kgs. 16:8, 9
  - type: text
    content: 'For Ahaz took a portion from the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the house of the king and of the princes, and gave tribute to the king of Assyria, but it did not help him.'
  - type: heading
    content: Ahaz’s Idolatry
  '22':
  - type: text
    content: 'In the time of his distress he became yet more faithless to the '
  - type: text
    content: Lord
  - type: text
    content: '—this same King Ahaz. '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 25:14]'
  - type: text
    content: 'he sacrificed to the gods of Damascus that had defeated him and said, '
  - type: note
    content: '[Jer. 44:17, 18]'
  - type: text
    content: '“Because the gods of the kings of Syria helped them, I will sacrifice to them that they may help me.” But they were the ruin of him and of all Israel. '
  '24':
  - type: text
    content: 'And Ahaz gathered together the vessels of the house of God and '
  - type: note
    content: '[2 Kgs. 16:17]'
  - type: text
    content: 'cut in pieces the vessels of the house of God, and he shut up the doors of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he made himself '
  - type: note
    content: '[ch. 30:14]'
  - type: text
    content: 'altars in every corner of Jerusalem. '
  '25':
  - type: text
    content: 'In every city of Judah he made high places to '
  - type: note
    content: ver. 3
  - type: text
    content: 'make offerings to other gods, provoking to anger the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his fathers. '
  '26':
  - type: note
    content: For ver. 26, 27, see 2 Kgs. 16:19, 20
  - type: text
    content: 'Now the rest of his acts and all his ways, from first to last, behold, they are written in the Book of the Kings of Judah and Israel. '
  '27':
  - type: text
    content: 'And Ahaz slept with his fathers, and they buried him in the city, in Jerusalem, for '
  - type: note
    content: '[ch. 21:20; 24:25]'
  - type: text
    content: they did not bring him into the tombs of the kings of Israel. And Hezekiah his son reigned in his place.
  '3':
  - type: text
    content: 'and '
  - type: note
    content: ver. 25
  - type: text
    content: 'he made offerings in the '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'Valley of the Son of Hinnom and '
  - type: note
    content: ch. 33:6; [Lev. 18:21]
  - type: text
    content: burned his sons as an offering,
  - type: note
    content: Hebrew made his sons pass through the fire
  - type: text
    content: ' according to '
  - type: note
    content: ch. 33:2; Deut. 18:9
  - type: text
    content: 'the abominations of the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel. '
  '4':
  - type: text
    content: 'And he sacrificed and '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: made offerings on the high places and on the hills and under every green tree.
  - type: heading
    content: Judah Defeated
  '5':
  - type: text
    content: ' '
  - type: note
    content: Isa. 7:1; [ 2 Kgs. 16:5, 6 ]
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' his God gave him into the hand of the king of Syria, who defeated him and took captive a great number of his people and brought them to Damascus. He was also given into the hand of the king of Israel, who struck him with great force. '
  '6':
  - type: text
    content: 'For '
  - type: note
    content: 2 Kgs. 15:27; 16:5
  - type: text
    content: 'Pekah the son of Remaliah killed 120,000 from Judah in one day, all of them men of valor, because they had forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers. '
  '7':
  - type: text
    content: And Zichri, a mighty man of Ephraim, killed Maaseiah the king’s son and Azrikam the commander of the palace and Elkanah the next in authority to the king.
  '8':
  - type: text
    content: 'The men of Israel took captive 200,000 '
  - type: note
    content: ch. 11:4
  - type: text
    content: 'of their relatives, women, sons, and daughters. They also took much spoil from them and brought the spoil to Samaria. '
  '9':
  - type: text
    content: 'But a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' was there, whose name was Oded, and he went out to meet the army that came to Samaria and said to them, “Behold, because the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, '
  - type: note
    content: Isa. 47:6; Ezek. 25:12, 15; 26:2
  - type: text
    content: 'was angry with Judah, he gave them into your hand, but you have killed them in a rage '
  - type: note
    content: Ezra 9:6; Rev. 18:5
  - type: text
    content: 'that has reached up to heaven. '
