document_id: GEN.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham’s Death and His Descendants
  - type: text
    content: 'Abraham took another wife, whose name was Keturah. '
  '10':
  - type: text
    content: 'the field '
  - type: note
    content: ch. 23:16; 50:13
  - type: text
    content: 'that Abraham purchased from the Hittites. '
  - type: note
    content: ch. 49:30, 31
  - type: text
    content: 'There Abraham was buried, with Sarah his wife. '
  '11':
  - type: text
    content: 'After the death of Abraham, God blessed Isaac his son. And Isaac settled at '
  - type: note
    content: ch. 16:14; 24:62
  - type: text
    content: Beer-lahai-roi.
  '12':
  - type: text
    content: 'These are the generations of Ishmael, Abraham’s son, '
  - type: note
    content: ch. 16:15
  - type: text
    content: 'whom Hagar the Egyptian, Sarah’s servant, bore to Abraham. '
  '13':
  - type: note
    content: 1 Chr. 1:29-31
  - type: text
    content: 'These are the names of the sons of Ishmael, named in the order of their birth: '
  - type: note
    content: Isa. 60:7
  - type: text
    content: 'Nebaioth, the firstborn of Ishmael; and '
  - type: note
    content: Isa. 60:7
  - type: text
    content: 'Kedar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Dumah, Massa, '
  '15':
  - type: text
    content: 'Hadad, '
  - type: note
    content: Job 6:19; Isa. 21:14
  - type: text
    content: 'Tema, '
  - type: note
    content: 1 Chr. 5:19
  - type: text
    content: 'Jetur, '
  - type: note
    content: 1 Chr. 5:19
  - type: text
    content: 'Naphish, and Kedemah. '
  '16':
  - type: text
    content: 'These are the sons of Ishmael and these are their names, by their villages and by their encampments, '
  - type: note
    content: ch. 17:20
  - type: text
    content: 'twelve princes according to their tribes. '
  '17':
  - type: text
    content: '(These are the years of the life of Ishmael: 137 years. He '
  - type: note
    content: ver. 8
  - type: text
    content: 'breathed his last and died, and was gathered to his people.) '
  '18':
  - type: note
    content: 1 Sam. 15:7
  - type: text
    content: 'They settled from Havilah to '
  - type: note
    content: ch. 16:7; 20:1; Ex. 15:22
  - type: text
    content: Shur, which is opposite Egypt in the direction of Assyria. He settled
  - type: note
    content: Hebrew fell
  - type: text
    content: ' over against all his kinsmen.'
  - type: heading
    content: The Birth of Esau and Jacob
  '19':
  - type: text
    content: 'These are the generations of Isaac, Abraham’s son: '
  - type: note
    content: Matt. 1:2
  - type: text
    content: 'Abraham fathered Isaac, '
  '2':
  - type: note
    content: 1 Chr. 1:32, 33
  - type: text
    content: 'She bore him Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  '20':
  - type: text
    content: 'and Isaac was forty years old when he took Rebekah, '
  - type: note
    content: ch. 22:23
  - type: text
    content: 'the daughter of Bethuel the Aramean of '
  - type: note
    content: See ch. 28:2
  - type: text
    content: 'Paddan-aram, '
  - type: note
    content: ch. 24:29
  - type: text
    content: 'the sister of Laban the Aramean, to be his wife. '
  '21':
  - type: text
    content: 'And Isaac prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' for his wife, because she was barren. And '
  - type: note
    content: 2 Sam. 21:14; 24:25; 1 Chr. 5:20; 2 Chr. 33:13; Ezra 8:23
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' granted his prayer, and Rebekah his wife conceived. '
  '22':
  - type: text
    content: The children struggled together within her, and she said, “If it is thus, why is this happening to me?”
  - type: note
    content: Or why do I live?
  - type: text
    content: ' So she went '
  - type: note
    content: '[1 Sam. 9:9]'
  - type: text
    content: 'to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to her,'
  - type: note
    content: ch. 17:16; 24:60
  - type: text
    content: “Two nations are in your womb,
  - type: text
    content: and two peoples from within you
  - type: note
    content: Or from birth
  - type: text
    content: ' shall be divided;'
  - type: note
    content: '[ 2 Sam. 8:14 ]; See Obad. 18-21'
  - type: text
    content: the one shall be stronger than the other,
  - type: note
    content: ch. 27:29, 40; Cited Rom. 9:12
  - type: text
    content: the older shall serve the younger.”
  '24':
  - type: text
    content: 'When her days to give birth were completed, behold, there were twins in her womb. '
  '25':
  - type: text
    content: 'The first came out red, '
  - type: note
    content: ch. 27:11, 16, 23
  - type: text
    content: 'all his body like a hairy cloak, so they called his name Esau. '
  '26':
  - type: text
    content: 'Afterward his brother came out with '
  - type: note
    content: Hos. 12:3
  - type: text
    content: 'his hand holding Esau’s heel, so '
  - type: note
    content: ch. 27:36
  - type: text
    content: his name was called Jacob.
  - type: note
    content: Jacob means He takes by the heel, or He cheats
  - type: text
    content: ' Isaac was sixty years old when she bore them.'
  '27':
  - type: text
    content: 'When the boys grew up, Esau was '
  - type: note
    content: ch. 27:3, 5
  - type: text
    content: 'a skillful hunter, a man of the field, while Jacob was a quiet man, '
  - type: note
    content: Heb. 11:9
  - type: text
    content: 'dwelling in tents. '
  '28':
  - type: text
    content: 'Isaac loved Esau because '
  - type: note
    content: ch. 27:4, 7, 9
  - type: text
    content: he ate of his game, but Rebekah loved Jacob.
  - type: heading
    content: Esau Sells His Birthright
  '29':
  - type: text
    content: 'Once when Jacob was cooking stew, Esau came in from the field, and he was exhausted. '
  '3':
  - type: text
    content: 'Jokshan fathered Sheba and Dedan. The sons of Dedan were Asshurim, Letushim, and Leummim. '
  '30':
  - type: text
    content: And Esau said to Jacob, “Let me eat some of that red stew, for I am exhausted!” (Therefore his name was called Edom.
  - type: note
    content: Edom sounds like the Hebrew for red
  - type: text
    content: ') '
  '31':
  - type: text
    content: 'Jacob said, “Sell me your birthright now.” '
  '32':
  - type: text
    content: 'Esau said, “I am about to die; of what use is a birthright to me?” '
  '33':
  - type: text
    content: 'Jacob said, “Swear to me now.” So he swore to him and '
  - type: note
    content: Heb. 12:16
  - type: text
    content: 'sold his birthright to Jacob. '
  '34':
  - type: text
    content: Then Jacob gave Esau bread and lentil stew, and he ate and drank and rose and went his way. Thus Esau despised his birthright.
  '4':
  - type: text
    content: 'The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah. All these were the children of Keturah. '
  '5':
  - type: note
    content: ch. 24:36
  - type: text
    content: 'Abraham gave all he had to Isaac. '
  '6':
  - type: text
    content: 'But to the sons of his concubines Abraham gave gifts, and while he was still living he '
  - type: note
    content: ch. 21:14
  - type: text
    content: 'sent them away from his son Isaac, eastward '
  - type: note
    content: '[Judg. 6:3]'
  - type: text
    content: to the east country.
  '7':
  - type: text
    content: 'These are the days of the years of Abraham’s life, 175 years. '
  '8':
  - type: text
    content: 'Abraham '
  - type: note
    content: ver. 17; ch. 35:29; 49:33
  - type: text
    content: 'breathed his last and '
  - type: note
    content: ch. 15:15
  - type: text
    content: 'died in a good old age, an old man and full of years, and was gathered to his people. '
  '9':
  - type: text
    content: 'Isaac and Ishmael '
  - type: note
    content: ch. 35:29
  - type: text
    content: 'his sons buried him in the cave of Machpelah, in the field of Ephron the son of Zohar the Hittite, east of Mamre, '
