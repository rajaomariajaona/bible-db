        - type: text
          text: 39:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'fine twined linen and blue and purple and scarlet yarns; you shall make them with cherubim '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31, 36
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'skillfully worked into them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall make fifty loops on the edge of the curtain that is outermost in one set, and fifty loops on the edge of the curtain that is outermost in the second set.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make fifty clasps of bronze, and put the clasps into the loops, and couple the tent together that it may be a single whole. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the part that remains of the curtains of the tent, the half curtain that remains, shall hang over the back of the tabernacle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the extra that remains in the length of the curtains, the cubit on the one side, and the cubit on the other side, shall hang over the sides of the tabernacle, on this side and that side, to cover it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:19
      marker-yv: yv-n
    - type: text
      text: 'And you shall make for the tent a covering of tanned '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:5
      marker-yv: yv-n
    - type: text
      text: rams’ skins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of rams’ skins dyed red
      marker-yv: yv-n
    - type: text
      text: ' and a covering of goatskins on top.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make upright frames for the tabernacle of acacia wood. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ten cubits shall be the length of a frame, and a cubit and a half the breadth of each frame. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There shall be two tenons in each frame, for fitting together. So shall you do for all the frames of the tabernacle. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make the frames for the tabernacle: twenty frames for the south side; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and forty bases of silver you shall make under the twenty frames, two bases under one frame for its two tenons, and two bases under the next frame for its two tenons; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The length of each curtain shall be twenty-eight cubits,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' and the breadth of each curtain four cubits; all the curtains shall be the same size. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and for the second side of the tabernacle, on the north side twenty frames, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their forty bases of silver, two bases under one frame, and two bases under the next frame. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the rear of the tabernacle westward you shall make six frames. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make two frames for corners of the tabernacle in the rear; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they shall be separate beneath, but joined at the top, at the first ring. Thus shall it be with both of them; they shall form the two corners. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there shall be eight frames, with their bases of silver, sixteen bases; two bases under one frame, and two bases under another frame.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make bars of acacia wood, five for the frames of the one side of the tabernacle, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and five bars for the frames of the other side of the tabernacle, and five bars for the frames of the side of the tabernacle at the rear westward. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The middle bar, halfway up the frames, shall run from end to end. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall overlay the frames with gold and shall make their rings of gold for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:27
      marker-yv: yv-n
    - type: text
      text: 'holders for the bars, and you shall overlay the bars with gold. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Five curtains shall be coupled to one another, and the other five curtains shall be coupled to one another. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you shall erect the tabernacle '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:40
      marker-yv: yv-n
    - type: text
      text: according to the plan for it that you were shown on the mountain.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:35
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 16:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 3:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 9:3
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“And you shall make a veil of blue and purple and scarlet yarns and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: 'fine twined linen. It shall be made with cherubim '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: 'skillfully worked into it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall hang it on four pillars of acacia overlaid with gold, with hooks of gold, on four bases of silver. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall hang '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the veil from the clasps, and bring '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:34
      marker-yv: yv-n
    - type: text
      text: 'the ark of the testimony in there within the veil. And the veil shall separate for you the Holy Place from the Most Holy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:20
      marker-yv: yv-n
    - type: text
      text: 'You shall put the mercy seat on the ark of the testimony in the Most Holy Place. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 9:2
      marker-yv: yv-n
    - type: text
      text: 'you shall set the table outside the veil, and the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:24
      marker-yv: yv-n
    - type: text
      text: lampstand on the south side of the tabernacle opposite the table, and you shall put the table on the north side.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall make a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:37
      marker-yv: yv-n
    - type: text
      text: 'screen for the entrance of the tent, of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1, 31
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:4
      marker-yv: yv-n
    - type: text
      text: 'blue and purple and scarlet yarns and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'fine twined linen, embroidered with needlework. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you shall make for the screen five pillars of acacia, and overlay them with gold. Their hooks shall be of gold, and you shall cast five bases of bronze for them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make loops of blue on the edge of the outermost curtain in the first set. Likewise you shall make loops on the edge of the outermost curtain in the second set. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fifty loops you shall make on the one curtain, and fifty loops you shall make on the edge of the curtain that is in the second set; the loops shall be opposite one another. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you shall make fifty clasps of gold, and couple the curtains one to the other with the clasps, so that the tabernacle may be a single whole.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall also make '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:14
      marker-yv: yv-n
    - type: text
      text: 'curtains of goats’ hair for a tent over the tabernacle; eleven curtains shall you make. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of each curtain shall be thirty cubits, and the breadth of each curtain four cubits. The eleven curtains shall be the same size. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall couple five curtains by themselves, and six curtains by themselves, and the sixth curtain you shall double over at the front of the tent. '
