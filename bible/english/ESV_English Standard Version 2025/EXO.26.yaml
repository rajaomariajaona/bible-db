document_id: EXO.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle
  - type: text
    content: '“Moreover, '
  - type: note
    content: For ver. 1-37, see ch. 36:8-38
  - type: text
    content: 'you shall make the '
  - type: note
    content: ch. 25:9
  - type: text
    content: 'tabernacle with ten curtains of '
  - type: note
    content: ver. 31, 36; ch. 28:6, 15; 36:8, 35; 39:3, 8
  - type: text
    content: 'fine twined linen and blue and purple and scarlet yarns; you shall make them with cherubim '
  - type: note
    content: ver. 31, 36; ch. 28:6, 15; 36:8, 35; 39:3, 8
  - type: text
    content: 'skillfully worked into them. '
  '10':
  - type: text
    content: You shall make fifty loops on the edge of the curtain that is outermost in one set, and fifty loops on the edge of the curtain that is outermost in the second set.
  '11':
  - type: text
    content: '“You shall make fifty clasps of bronze, and put the clasps into the loops, and couple the tent together that it may be a single whole. '
  '12':
  - type: text
    content: 'And the part that remains of the curtains of the tent, the half curtain that remains, shall hang over the back of the tabernacle. '
  '13':
  - type: text
    content: 'And the extra that remains in the length of the curtains, the cubit on the one side, and the cubit on the other side, shall hang over the sides of the tabernacle, on this side and that side, to cover it. '
  '14':
  - type: note
    content: ch. 36:19
  - type: text
    content: 'And you shall make for the tent a covering of tanned '
  - type: note
    content: ch. 25:5
  - type: text
    content: rams’ skins
  - type: note
    content: Or of rams’ skins dyed red
  - type: text
    content: ' and a covering of goatskins on top.'
  '15':
  - type: text
    content: '“You shall make upright frames for the tabernacle of acacia wood. '
  '16':
  - type: text
    content: 'Ten cubits shall be the length of a frame, and a cubit and a half the breadth of each frame. '
  '17':
  - type: text
    content: 'There shall be two tenons in each frame, for fitting together. So shall you do for all the frames of the tabernacle. '
  '18':
  - type: text
    content: 'You shall make the frames for the tabernacle: twenty frames for the south side; '
  '19':
  - type: text
    content: 'and forty bases of silver you shall make under the twenty frames, two bases under one frame for its two tenons, and two bases under the next frame for its two tenons; '
  '2':
  - type: text
    content: The length of each curtain shall be twenty-eight cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and the breadth of each curtain four cubits; all the curtains shall be the same size. '
  '20':
  - type: text
    content: 'and for the second side of the tabernacle, on the north side twenty frames, '
  '21':
  - type: text
    content: 'and their forty bases of silver, two bases under one frame, and two bases under the next frame. '
  '22':
  - type: text
    content: 'And for the rear of the tabernacle westward you shall make six frames. '
  '23':
  - type: text
    content: 'And you shall make two frames for corners of the tabernacle in the rear; '
  '24':
  - type: text
    content: 'they shall be separate beneath, but joined at the top, at the first ring. Thus shall it be with both of them; they shall form the two corners. '
  '25':
  - type: text
    content: And there shall be eight frames, with their bases of silver, sixteen bases; two bases under one frame, and two bases under another frame.
  '26':
  - type: text
    content: '“You shall make bars of acacia wood, five for the frames of the one side of the tabernacle, '
  '27':
  - type: text
    content: 'and five bars for the frames of the other side of the tabernacle, and five bars for the frames of the side of the tabernacle at the rear westward. '
  '28':
  - type: text
    content: 'The middle bar, halfway up the frames, shall run from end to end. '
  '29':
  - type: text
    content: 'You shall overlay the frames with gold and shall make their rings of gold for '
  - type: note
    content: See ch. 25:27
  - type: text
    content: 'holders for the bars, and you shall overlay the bars with gold. '
  '3':
  - type: text
    content: 'Five curtains shall be coupled to one another, and the other five curtains shall be coupled to one another. '
  '30':
  - type: text
    content: 'Then you shall erect the tabernacle '
  - type: note
    content: See ch. 25:40
  - type: text
    content: according to the plan for it that you were shown on the mountain.
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 36:35; [ Lev. 16:2; 2 Chr. 3:14; Matt. 27:51; Heb. 9:3 ]
  - type: text
    content: '“And you shall make a veil of blue and purple and scarlet yarns and '
  - type: note
    content: ver. 1
  - type: text
    content: 'fine twined linen. It shall be made with cherubim '
  - type: note
    content: ver. 1
  - type: text
    content: 'skillfully worked into it. '
  '32':
  - type: text
    content: 'And you shall hang it on four pillars of acacia overlaid with gold, with hooks of gold, on four bases of silver. '
  '33':
  - type: text
    content: 'And you shall hang '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'the veil from the clasps, and bring '
  - type: note
    content: See ch. 16:34
  - type: text
    content: 'the ark of the testimony in there within the veil. And the veil shall separate for you the Holy Place from the Most Holy. '
  '34':
  - type: note
    content: ch. 25:21; 40:20
  - type: text
    content: 'You shall put the mercy seat on the ark of the testimony in the Most Holy Place. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: ch. 40:22; Heb. 9:2
  - type: text
    content: 'you shall set the table outside the veil, and the '
  - type: note
    content: ch. 40:24
  - type: text
    content: lampstand on the south side of the tabernacle opposite the table, and you shall put the table on the north side.
  '36':
  - type: text
    content: '“You shall make a '
  - type: note
    content: ch. 27:16; 36:37
  - type: text
    content: 'screen for the entrance of the tent, of '
  - type: note
    content: ver. 1, 31; ch. 25:4
  - type: text
    content: 'blue and purple and scarlet yarns and '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'fine twined linen, embroidered with needlework. '
  '37':
  - type: text
    content: And you shall make for the screen five pillars of acacia, and overlay them with gold. Their hooks shall be of gold, and you shall cast five bases of bronze for them.
  '4':
  - type: text
    content: 'And you shall make loops of blue on the edge of the outermost curtain in the first set. Likewise you shall make loops on the edge of the outermost curtain in the second set. '
  '5':
  - type: text
    content: 'Fifty loops you shall make on the one curtain, and fifty loops you shall make on the edge of the curtain that is in the second set; the loops shall be opposite one another. '
  '6':
  - type: text
    content: And you shall make fifty clasps of gold, and couple the curtains one to the other with the clasps, so that the tabernacle may be a single whole.
  '7':
  - type: text
    content: '“You shall also make '
  - type: note
    content: ch. 36:14
  - type: text
    content: 'curtains of goats’ hair for a tent over the tabernacle; eleven curtains shall you make. '
  '8':
  - type: text
    content: 'The length of each curtain shall be thirty cubits, and the breadth of each curtain four cubits. The eleven curtains shall be the same size. '
  '9':
  - type: text
    content: 'You shall couple five curtains by themselves, and six curtains by themselves, and the sixth curtain you shall double over at the front of the tent. '
