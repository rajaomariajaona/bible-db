document_id: REV.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Prostitute and the Beast
  - type: text
    content: 'Then '
  - type: note
    content: ch. 21:9
  - type: text
    content: 'one of the seven angels who had '
  - type: note
    content: ch. 15:7
  - type: text
    content: 'the seven bowls came and said to me, “Come, I will show you the judgment of '
  - type: note
    content: ch. 19:2; Nah. 3:4; [Isa. 1:21; Jer. 2:20]
  - type: text
    content: 'the great prostitute '
  - type: note
    content: ver. 15; [Jer. 51:13]
  - type: text
    content: 'who is seated on many waters, '
  '10':
  - type: text
    content: 'they are also seven kings, five of whom have fallen, one is, the other has not yet come, and when he does come he must remain only a little while. '
  '11':
  - type: text
    content: 'As for the beast '
  - type: note
    content: ver. 8; [ch. 11:17]
  - type: text
    content: 'that was and is not, it is an eighth but it belongs to the seven, and it goes to destruction. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ver. 16; Dan. 7:24; [ch. 13:1; Zech. 1:18-21]
  - type: text
    content: 'the ten horns that you saw are ten kings who have not yet received royal power, but they are to receive authority as kings '
  - type: note
    content: '[ch. 18:10, 17, 19]'
  - type: text
    content: 'for one hour, together with the beast. '
  '13':
  - type: text
    content: 'These are of one mind, and they hand over their power and authority to the beast. '
  '14':
  - type: text
    content: 'They '
  - type: note
    content: See ch. 16:14
  - type: text
    content: 'will make war on the Lamb, and '
  - type: note
    content: See ch. 3:21
  - type: text
    content: 'the Lamb will conquer them, for he is '
  - type: note
    content: ch. 19:16; Deut. 10:17; Ps. 136:3; Dan. 2:47; 1 Tim. 6:15; [ch. 1:5; Matt. 28:18; Acts 10:36]
  - type: text
    content: 'Lord of lords and '
  - type: note
    content: ch. 19:16; Deut. 10:17; Ps. 136:3; Dan. 2:47; 1 Tim. 6:15; [ch. 1:5; Matt. 28:18; Acts 10:36]
  - type: text
    content: 'King of kings, and those with him are '
  - type: note
    content: See ch. 2:10; Luke 18:7 (Gk.); Rom. 1:6
  - type: text
    content: called and chosen and faithful.”
  '15':
  - type: text
    content: And the angel
  - type: note
    content: Greek he
  - type: text
    content: ' said to me, '
  - type: note
    content: ver. 1; [Isa. 8:7]
  - type: text
    content: '“The waters that you saw, where the prostitute is seated, are peoples and multitudes and nations and languages. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: See ver. 12
  - type: text
    content: 'the ten horns that you saw, they and the beast '
  - type: note
    content: '[Jer. 50:41, 42]'
  - type: text
    content: 'will hate the prostitute. They will make her '
  - type: note
    content: ch. 18:17, 19
  - type: text
    content: 'desolate and '
  - type: note
    content: Ezek. 16:37, 39
  - type: text
    content: 'naked, and '
  - type: note
    content: '[ch. 19:18]'
  - type: text
    content: 'devour her flesh and '
  - type: note
    content: ch. 18:8; [Lev. 21:9]
  - type: text
    content: 'burn her up with fire, '
  '17':
  - type: text
    content: 'for '
  - type: note
    content: 2 Cor. 8:16
  - type: text
    content: 'God has put it into their hearts to carry out his purpose by being of one mind and '
  - type: note
    content: '[2 Thess. 2:11]'
  - type: text
    content: 'handing over their royal power to the beast, until the words of God are fulfilled. '
  '18':
  - type: text
    content: 'And the woman that you saw is '
  - type: note
    content: ch. 16:19
  - type: text
    content: the great city that has dominion over the kings of the earth.”
  '2':
  - type: note
    content: ch. 18:3, 9; [Isa. 23:17]
  - type: text
    content: 'with whom the kings of the earth have committed sexual immorality, and '
  - type: note
    content: ch. 14:8; Jer. 51:7
  - type: text
    content: 'with the wine of whose sexual immorality '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'the dwellers on earth have become drunk.” '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: ch. 21:10
  - type: text
    content: 'he carried me away in the Spirit '
  - type: note
    content: ch. 12:6, 14
  - type: text
    content: 'into a wilderness, and I saw a woman sitting on '
  - type: note
    content: '[ch. 12:3]'
  - type: text
    content: 'a scarlet beast that was full of '
  - type: note
    content: ch. 13:1
  - type: text
    content: 'blasphemous names, and '
  - type: note
    content: ver. 7, 9, 12
  - type: text
    content: 'it had seven heads and ten horns. '
  '4':
  - type: text
    content: 'The woman '
  - type: note
    content: ch. 18:16
  - type: text
    content: 'was arrayed in purple and scarlet, and adorned '
  - type: note
    content: Dan. 11:38
  - type: text
    content: 'with gold and jewels and pearls, holding in her hand '
  - type: note
    content: Jer. 51:7; [ch. 18:6]
  - type: text
    content: 'a golden cup full of abominations and the impurities of her sexual immorality. '
  '5':
  - type: text
    content: 'And on her forehead was written a name of '
  - type: note
    content: ver. 7; 2 Thess. 2:7
  - type: text
    content: 'mystery: '
  - type: note
    content: See ch. 14:8
  - type: text
    content: '“Babylon the great, mother of prostitutes and of earth’s abominations.” '
  '6':
  - type: text
    content: 'And I saw the woman, drunk '
  - type: note
    content: ch. 16:6; [ch. 13:15]
  - type: text
    content: 'with the blood of the saints, the blood of '
  - type: note
    content: ch. 2:13
  - type: text
    content: the martyrs of Jesus.
  - type: note
    content: Greek the witnesses to Jesus
  - type: text
    content: 'When I saw her, I marveled greatly. '
  '7':
  - type: text
    content: 'But the angel said to me, “Why do you marvel? I will tell you '
  - type: note
    content: ver. 5
  - type: text
    content: 'the mystery of the woman, and of the beast with seven heads and ten horns that carries her. '
  '8':
  - type: text
    content: 'The beast that you saw '
  - type: note
    content: ver. 11; [ch. 1:4; 13:3]
  - type: text
    content: 'was, and is not, and '
  - type: note
    content: ch. 11:7
  - type: text
    content: 'is about to rise from '
  - type: note
    content: See ch. 9:1
  - type: text
    content: the bottomless pit
  - type: note
    content: Greek the abyss
  - type: text
    content: ' and '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'go to destruction. And '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'the dwellers on earth whose names have not been written in '
  - type: note
    content: See ch. 3:5
  - type: text
    content: 'the book of life from the foundation of the world will marvel to see the beast, because '
  - type: note
    content: ver. 11; [ch. 1:4; 13:3]
  - type: text
    content: 'it was and is not and is to come. '
  '9':
  - type: note
    content: '[ch. 13:18]'
  - type: text
    content: 'This calls for a mind with wisdom: the seven heads are seven mountains on which the woman is seated; '
