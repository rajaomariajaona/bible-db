document_id: JDG.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Midian Oppresses Israel
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'The people of Israel did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into the hand of '
  - type: note
    content: Gen. 25:2; Num. 25:17, 18; Hab. 3:7
  - type: text
    content: 'Midian seven years. '
  '10':
  - type: text
    content: 'And I said to you, ‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God; '
  - type: note
    content: Josh. 24:15; See 2 Kgs. 17:35-38
  - type: text
    content: you shall not fear the gods of the Amorites in whose land you dwell.’ But you have not obeyed my voice.”
  - type: heading
    content: The Call of Gideon
  '11':
  - type: text
    content: 'Now the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' came and sat under the terebinth at Ophrah, which belonged to Joash '
  - type: note
    content: ch. 8:2; Josh. 17:2
  - type: text
    content: 'the Abiezrite, while his son '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Gideon was beating out wheat in the winepress to hide it from the Midianites. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:3; Luke 1:11; [Acts 10:3]
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him and said to him, '
  - type: note
    content: Josh. 1:5
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is with you, O mighty man of valor.” '
  '13':
  - type: text
    content: 'And Gideon said to him, “Please, my lord, if the '
  - type: text
    content: Lord
  - type: text
    content: ' is with us, why then has all this happened to us? And where are '
  - type: note
    content: Ps. 89:49; Isa. 63:15
  - type: text
    content: 'all his wonderful deeds '
  - type: note
    content: Ps. 44:1
  - type: text
    content: 'that our fathers recounted to us, saying, ‘Did not the '
  - type: text
    content: Lord
  - type: text
    content: ' bring us up from Egypt?’ But now the '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken us and given us into the hand of Midian.” '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: note
    content: Septuagint the angel of the Lord; also verse 16
  - type: text
    content: ' turned to him and said, “Go in this might of yours and save Israel from the hand of Midian; '
  - type: note
    content: 1 Sam. 12:11; [Josh. 1:9]
  - type: text
    content: 'do not I send you?” '
  '15':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: '[Ex. 3:11]'
  - type: text
    content: '“Please, Lord, how can I save Israel? Behold, '
  - type: note
    content: 1 Sam. 9:21; 18:18
  - type: text
    content: 'my clan is the weakest in Manasseh, and I am the least in my father’s house.” '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: Ex. 3:12; Josh. 1:5
  - type: text
    content: '“But I will be with you, and you shall strike the Midianites as one man.” '
  '17':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: Ex. 33:13
  - type: text
    content: '“If now I have found favor in your eyes, then '
  - type: note
    content: 2 Kgs. 20:8, 9; Isa. 7:11; [ver. 36, 37]; See Ex. 4:1-8
  - type: text
    content: 'show me a sign that it is you who speak with me. '
  '18':
  - type: text
    content: 'Please '
  - type: note
    content: ch. 13:15; Gen. 18:3-5
  - type: text
    content: do not depart from here until I come to you and bring out my present and set it before you.” And he said, “I will stay till you return.”
  '19':
  - type: text
    content: 'So Gideon went into his house '
  - type: note
    content: Gen. 18:6-8
  - type: text
    content: and prepared a young goat and unleavened cakes from an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of flour. The meat he put in a basket, and the broth he put in a pot, and brought them to him under the terebinth and presented them. '
  '2':
  - type: text
    content: 'And the hand of Midian overpowered Israel, and because of Midian the people of Israel made for themselves the dens that are in the mountains and '
  - type: note
    content: 1 Sam. 13:6; Heb. 11:38
  - type: text
    content: 'the caves and the strongholds. '
  '20':
  - type: text
    content: 'And the angel of God said to him, “Take the meat and the unleavened cakes, and put them '
  - type: note
    content: ch. 13:19
  - type: text
    content: 'on this rock, and '
  - type: note
    content: '[1 Kgs. 18:33, 34]'
  - type: text
    content: 'pour the broth over them.” And he did so. '
  '21':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' reached out the tip of the staff that was in his hand and touched the meat and the unleavened cakes. '
  - type: note
    content: Lev. 9:24; 1 Kgs. 18:38; 2 Chr. 7:1
  - type: text
    content: 'And fire sprang up from the rock and consumed the meat and the unleavened cakes. And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' vanished from his sight. '
  '22':
  - type: text
    content: 'Then Gideon perceived that he was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: '. And Gideon said, '
  - type: note
    content: ch. 13:21, 22; [Gen. 32:30; Ex. 33:20; Deut. 5:26]
  - type: text
    content: '“Alas, O Lord '
  - type: text
    content: God
  - type: text
    content: '! For now I have seen the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' face to face.” '
  '23':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: Dan. 10:19
  - type: text
    content: '“Peace be to you. Do not fear; you shall not die.” '
  '24':
  - type: text
    content: 'Then Gideon built an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: ' and called it, '
  - type: note
    content: '[Gen. 22:14; Ex. 17:15; Ezek. 48:35]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Is Peace. To this day it still stands at '
  - type: note
    content: ver. 11; ch. 8:27, 32
  - type: text
    content: Ophrah, which belongs to the Abiezrites.
  '25':
  - type: text
    content: 'That night the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Take your father’s bull, and the second bull seven years old, and pull down the altar of Baal that your father has, and cut down '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'the Asherah that is beside it '
  '26':
  - type: text
    content: 'and build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God on the top of the '
  - type: note
    content: Dan. 11:7, 10, 31 (Heb.)
  - type: text
    content: 'stronghold here, with stones laid in due order. Then take the second bull and offer it as a burnt offering with the wood of the Asherah that you shall cut down.” '
  '27':
  - type: text
    content: 'So Gideon took ten men of his servants and did as the '
  - type: text
    content: Lord
  - type: text
    content: ' had told him. But because he was too afraid of his family and the men of the town to do it by day, he did it by night.'
  - type: heading
    content: Gideon Destroys the Altar of Baal
  '28':
  - type: text
    content: 'When the men of the town rose early in the morning, behold, the altar of Baal was broken down, and the Asherah beside it was cut down, and the second bull was offered on the altar that had been built. '
  '29':
  - type: text
    content: 'And they said to one another, “Who has done this thing?” And after they had searched and inquired, they said, “Gideon the son of Joash has done this thing.” '
  '3':
  - type: text
    content: 'For whenever the Israelites planted crops, the Midianites and '
  - type: note
    content: ch. 3:13
  - type: text
    content: 'the Amalekites and '
  - type: note
    content: ver. 33; ch. 7:12; 8:10; Gen. 29:1; 1 Kgs. 4:30; Job 1:3
  - type: text
    content: 'the people of the East would come up against them. '
  '30':
  - type: text
    content: 'Then the men of the town said to Joash, “Bring out your son, that he may die, for he has broken down the altar of Baal and cut down the Asherah beside it.” '
  '31':
  - type: text
    content: 'But Joash said to all who stood against him, “Will you contend for Baal? Or will you save him? Whoever contends for him shall be put to death by morning. If he is a god, let him contend for himself, because his altar has been broken down.” '
  '32':
  - type: text
    content: Therefore on that day Gideon
  - type: note
    content: Hebrew he
  - type: text
    content: ' was called '
  - type: note
    content: ch. 7:1; 1 Sam. 12:11; [2 Sam. 11:21]
  - type: text
    content: Jerubbaal, that is to say, “Let Baal contend against him,” because he broke down his altar.
  '33':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 3
  - type: text
    content: 'all the Midianites and the Amalekites and the people of the East came together, and they crossed the Jordan and encamped in '
  - type: note
    content: Josh. 17:16
  - type: text
    content: 'the Valley of Jezreel. '
  '34':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' clothed Gideon, '
  - type: note
    content: ch. 3:27
  - type: text
    content: 'and he sounded the trumpet, and the Abiezrites were called out to follow him. '
  '35':
  - type: note
    content: ch. 7:24
  - type: text
    content: 'And he sent messengers throughout all Manasseh, and they too were called out to follow him. '
  - type: note
    content: ch. 7:24
  - type: text
    content: And he sent messengers to Asher, Zebulun, and Naphtali, and they went up to meet them.
  - type: heading
    content: The Sign of the Fleece
  '36':
  - type: text
    content: ' '
  - type: note
    content: For ver. 36-40, see Ex. 4:1-7
  - type: text
    content: 'Then Gideon said to God, “If you will save Israel by my hand, as you have said, '
  '37':
  - type: text
    content: 'behold, I am laying a fleece of wool on the threshing floor. If there is dew on the fleece alone, and it is dry on all the ground, then I shall know that you will save Israel by my hand, as you have said.” '
  '38':
  - type: text
    content: 'And it was so. When he rose early next morning and squeezed the fleece, he wrung enough dew from the fleece to fill a bowl with water. '
  '39':
  - type: text
    content: 'Then Gideon said to God, '
  - type: note
    content: Gen. 18:32
  - type: text
    content: '“Let not your anger burn against me; let me speak just once more. Please let me test just once more with the fleece. Please let it be dry on the fleece only, and on all the ground let there be dew.” '
  '4':
  - type: text
    content: 'They would encamp against them '
  - type: note
    content: '[Lev. 26:16]; See Deut. 28:30-33, 51; Mic. 6:15'
  - type: text
    content: 'and devour the produce of the land, as far as Gaza, and leave no sustenance in Israel and no sheep or ox or donkey. '
  '40':
  - type: text
    content: And God did so that night; and it was dry on the fleece only, and on all the ground there was dew.
  '5':
  - type: text
    content: 'For they would come up with their livestock and their tents; they would come '
  - type: note
    content: ch. 7:12
  - type: text
    content: 'like locusts in number—both they and their camels could not be counted—so that they laid waste the land as they came in. '
  '6':
  - type: text
    content: 'And Israel was brought very low because of Midian. And the people of Israel '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'cried out for help to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'When the people of Israel cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' on account of the Midianites, '
  '8':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a prophet to the people of Israel. And he said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  - type: note
    content: 1 Sam. 10:18
  - type: text
    content: 'I led you up from Egypt and brought you out of the house of slavery. '
  '9':
  - type: text
    content: 'And I delivered you from the hand of the Egyptians and from the hand of all who oppressed you, and '
  - type: note
    content: Ps. 44:2, 3
  - type: text
    content: 'drove them out before you and gave you their land. '
