  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Naaman had gone from him a short distance, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the Syrians on '
    - type: usfm
