document_id: 2KI.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Naaman Healed of Leprosy
  - type: text
    content: ' '
  - type: note
    content: Luke 4:27
  - type: text
    content: 'Naaman, '
  - type: note
    content: '[ch. 4:13]'
  - type: text
    content: 'commander of the army of the king of Syria, was a great man with his master and in high favor, because by him the '
  - type: text
    content: Lord
  - type: text
    content: ' had given victory to Syria. He was a mighty man of valor, but he was a leper.'
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And Elisha sent a messenger to him, saying, '
  - type: note
    content: '[John 9:7]'
  - type: text
    content: '“Go and wash in the Jordan seven times, and your flesh shall be restored, and you shall be clean.” '
  '11':
  - type: text
    content: 'But Naaman was angry and went away, saying, “Behold, I thought that he would surely come out to me and stand and call upon the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, and wave his hand over the place and cure the leper. '
  '12':
  - type: text
    content: Are not Abana
  - type: note
    content: Or Amana
  - type: text
    content: ' and Pharpar, the rivers of '
  - type: note
    content: '[1 Kgs. 11:24]'
  - type: text
    content: 'Damascus, better than all the waters of Israel? Could I not wash in them and be clean?” So he turned and went away in a rage. '
  '13':
  - type: text
    content: 'But his servants came near and said to him, '
  - type: note
    content: '[ch. 6:21; 8:9; Judg. 17:10]'
  - type: text
    content: '“My father, it is a great word the prophet has spoken to you; will you not do it? Has he actually said to you, ‘Wash, and be clean’?” '
  '14':
  - type: text
    content: 'So he went down and dipped himself seven times in the Jordan, according to the word of the man of God, '
  - type: note
    content: ver. 10; [Job 33:25]
  - type: text
    content: 'and his flesh was restored like the flesh of a little child, '
  - type: note
    content: Luke 4:27
  - type: text
    content: and he was clean.
  - type: heading
    content: Gehazi’s Greed and Punishment
  '15':
  - type: text
    content: 'Then he returned to the man of God, he and all his company, and he came and stood before him. And he said, “Behold, I know that '
  - type: note
    content: '[Dan. 2:47; 3:29; 6:26, 27]'
  - type: text
    content: 'there is no God in all the earth but in Israel; so '
  - type: note
    content: '[Gen. 33:11]'
  - type: text
    content: 'accept now a present from your servant.” '
  '16':
  - type: text
    content: 'But he said, '
  - type: note
    content: ch. 3:14; 1 Kgs. 17:1
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, before whom I stand, '
  - type: note
    content: '[Gen. 14:23]'
  - type: text
    content: 'I will receive none.” And he urged him to take it, but he refused. '
  '17':
  - type: text
    content: 'Then Naaman said, “If not, please let there be given to your servant two mule loads of earth, for from now on your servant will not offer burnt offering or sacrifice to any god but the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'In this matter may the '
  - type: text
    content: Lord
  - type: text
    content: ' pardon your servant: when my master goes into the house of '
  - type: note
    content: '[1 Kgs. 15:18; Zech. 12:11]'
  - type: text
    content: 'Rimmon to worship there, '
  - type: note
    content: ch. 7:2, 17
  - type: text
    content: 'leaning on my arm, and I bow myself in the house of Rimmon, when I bow myself in the house of Rimmon, the '
  - type: text
    content: Lord
  - type: text
    content: ' pardon your servant in this matter.” '
  '19':
  - type: text
    content: 'He said to him, '
  - type: note
    content: 1 Sam. 1:17
  - type: text
    content: “Go in peace.”
  - type: text
    content: 'But when Naaman had gone from him a short distance, '
  '2':
  - type: text
    content: 'Now the Syrians on '
  - type: note
    content: ch. 6:23
  - type: text
    content: 'one of their raids had carried off a little girl from the land of Israel, and she worked in the service of Naaman’s wife. '
  '20':
  - type: note
    content: ch. 4:12
  - type: text
    content: 'Gehazi, the servant of Elisha the man of God, said, “See, my master has spared this Naaman the Syrian, in not accepting from his hand what he brought. '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I will run after him and get something from him.” '
  '21':
  - type: text
    content: 'So Gehazi followed Naaman. And when Naaman saw someone running after him, he got down from the chariot to meet him and said, '
  - type: note
    content: ch. 9:11
  - type: text
    content: '“Is all well?” '
  '22':
  - type: text
    content: 'And he said, “All is well. My master has sent me to say, ‘There have just now come to me from '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim two young men of the sons of the prophets. Please give them a talent of silver and '
  - type: note
    content: ver. 5
  - type: text
    content: 'two changes of clothing.’” '
  '23':
  - type: text
    content: 'And Naaman said, '
  - type: note
    content: ch. 6:3
  - type: text
    content: '“Be pleased to accept two talents.” And he urged him and tied up two talents of silver in two bags, with two changes of clothing, and laid them on two of his servants. And they carried them before Gehazi. '
  '24':
  - type: text
    content: 'And when he came to the hill, he took them from their hand and put them in the house, and he sent the men away, and they departed. '
  '25':
  - type: text
    content: 'He went in and stood before his master, and Elisha said to him, “Where have you been, Gehazi?” And he said, “Your servant went nowhere.” '
  '26':
  - type: text
    content: 'But he said to him, “Did not my heart go when the man turned from his chariot to meet you? Was it a time to accept money and garments, olive orchards and vineyards, sheep and oxen, male servants and female servants? '
  '27':
  - type: text
    content: 'Therefore the leprosy of Naaman shall cling to you and to your descendants forever.” So he went out from his presence '
  - type: note
    content: Ex. 4:6; Num. 12:10; [ch. 15:5]
  - type: text
    content: a leper, like snow.
  '3':
  - type: text
    content: 'She said to her mistress, “Would that my lord were with the prophet who is in Samaria! He would cure him of his leprosy.” '
  '4':
  - type: text
    content: 'So Naaman went in and told his lord, “Thus and so spoke the girl from the land of Israel.” '
  '5':
  - type: text
    content: And the king of Syria said, “Go now, and I will send a letter to the king of Israel.”
  - type: text
    content: 'So he went, '
  - type: note
    content: '[ch. 4:42; 8:8, 9; 1 Sam. 9:7]'
  - type: text
    content: taking with him ten talents of silver, six thousand shekels
  - type: note
    content: A talent was about 75 pounds or 34 kilograms; a shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of gold, and ten '
  - type: note
    content: ver. 22, 23; [Judg. 14:12]
  - type: text
    content: 'changes of clothing. '
  '6':
  - type: text
    content: 'And he brought the letter to the king of Israel, which read, “When this letter reaches you, know that I have sent to you Naaman my servant, that you may cure him of his leprosy.” '
  '7':
  - type: text
    content: 'And when the king of Israel read the letter, '
  - type: note
    content: See Gen. 44:13
  - type: text
    content: 'he tore his clothes and said, '
  - type: note
    content: '[Gen. 30:2; Deut. 32:39; 1 Sam. 2:6]'
  - type: text
    content: '“Am I God, to kill and to make alive, that this man sends word to me to cure a man of his leprosy? Only '
  - type: note
    content: '[1 Kgs. 20:7]'
  - type: text
    content: consider, and see how he is seeking a quarrel with me.”
  '8':
  - type: text
    content: 'But when Elisha the '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: 'man of God heard that the king of Israel had torn his clothes, he sent to the king, saying, “Why have you torn your clothes? Let him come now to me, that he may know that there is a prophet in Israel.” '
  '9':
  - type: text
    content: 'So Naaman came with his horses and chariots and stood at the door of Elisha’s house. '
