document_id: ECC.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Vanity of Self-Indulgence
  - type: text
    content: 'I '
  - type: note
    content: Luke 12:19
  - type: text
    content: said in my heart, “Come now, I will test you with pleasure; enjoy yourself.” But behold, this also was vanity.
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath”; also verses 11, 15, 17, 19, 21, 23, 26 (see note on 1:2)
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And whatever my eyes desired I did not keep from them. I kept my heart from no pleasure, for my heart '
  - type: note
    content: '[Prov. 8:31]'
  - type: text
    content: 'found pleasure in all my toil, and this was my '
  - type: note
    content: ch. 3:22; 5:18; 9:9
  - type: text
    content: 'reward for all my toil. '
  '11':
  - type: text
    content: 'Then I considered all that my hands had done and the toil I had expended in doing it, and behold, all was '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'vanity and a striving after wind, and there was nothing '
  - type: note
    content: See ch. 1:3
  - type: text
    content: to be gained under the sun.
  - type: heading
    content: The Vanity of Living Wisely
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:25
  - type: text
    content: 'So I turned to consider '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'wisdom and madness and folly. For what can the man do who comes after the king? Only '
  - type: note
    content: ch. 1:9, 10
  - type: text
    content: 'what has already been done. '
  '13':
  - type: text
    content: 'Then I saw that there is more gain in wisdom than in folly, as there is more gain in light than in darkness. '
  '14':
  - type: note
    content: '[Prov. 17:24]'
  - type: text
    content: 'The wise person has his eyes in his head, but the fool walks in darkness. And yet I perceived that the '
  - type: note
    content: ch. 3:19; 9:2, 3; Ps. 49:10
  - type: text
    content: 'same event happens to all of them. '
  '15':
  - type: text
    content: 'Then I said in my heart, '
  - type: note
    content: '[ver. 16; ch. 6:8]'
  - type: text
    content: '“What happens to the fool will happen to me also. Why then have I been so very wise?” And I said in my heart that this also is vanity. '
  '16':
  - type: text
    content: 'For of the wise as of the fool there is '
  - type: note
    content: ch. 1:11; See ch. 9:5
  - type: text
    content: 'no enduring remembrance, seeing that in the days to come all will have been long forgotten. '
  - type: note
    content: See ver. 14
  - type: text
    content: 'How the wise dies just like the fool! '
  '17':
  - type: text
    content: 'So I hated life, because what is done under the sun was grievous to me, for '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: all is vanity and a striving after wind.
  - type: heading
    content: The Vanity of Toil
  '18':
  - type: text
    content: 'I hated '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'all my toil in which I toil under the sun, seeing that I must '
  - type: note
    content: Ps. 39:6; 49:10
  - type: text
    content: 'leave it to the man who will come after me, '
  '19':
  - type: text
    content: 'and who knows whether he will be wise or a fool? Yet he will be master of all for which I toiled and used my wisdom under the sun. This also is vanity. '
  '2':
  - type: text
    content: 'I '
  - type: note
    content: '[Prov. 14:13]'
  - type: text
    content: 'said of laughter, “It is mad,” and of pleasure, “What use is it?” '
  '20':
  - type: text
    content: 'So I '
  - type: note
    content: ch. 7:25
  - type: text
    content: 'turned about and gave my heart up to despair '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'over all the toil of my labors under the sun, '
  '21':
  - type: text
    content: 'because sometimes a person who has toiled with wisdom and knowledge and skill must leave everything to be enjoyed by someone who did not toil for it. This also is vanity and a great evil. '
  '22':
  - type: text
    content: 'What has a man from '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'all the toil and striving of heart with which he toils beneath the sun? '
  '23':
  - type: text
    content: 'For '
  - type: note
    content: Job 5:7; 14:1
  - type: text
    content: 'all his days are full of sorrow, and his '
  - type: note
    content: See ch. 1:13
  - type: text
    content: work is a vexation. Even in the night his heart does not rest. This also is vanity.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:12, 13, 22; 5:18; 8:15; [ 1 Tim. 6:17 ]
  - type: text
    content: 'There is nothing better for a person than that he should '
  - type: note
    content: '[ch. 9:7; Luke 12:19; 1 Cor. 15:32]'
  - type: text
    content: eat and drink and find enjoyment
  - type: note
    content: Or and make his soul see good
  - type: text
    content: ' in his toil. This also, I saw, is '
  - type: note
    content: '[ch. 3:13; 5:19]'
  - type: text
    content: 'from the hand of God, '
  '25':
  - type: text
    content: for apart from him
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Syriac; most Hebrew manuscripts apart from me
  - type: text
    content: ' who can eat or who can have enjoyment? '
  '26':
  - type: text
    content: 'For to the one who pleases him '
  - type: note
    content: Job 32:8
  - type: text
    content: 'God has given wisdom and knowledge and joy, but to the sinner he has given '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the business of gathering and collecting, '
  - type: note
    content: '[Job 27:16, 17; Prov. 13:22]'
  - type: text
    content: 'only to give to one who pleases God. '
  - type: note
    content: See ch. 1:14
  - type: text
    content: This also is vanity and a striving after wind.
  '3':
  - type: text
    content: 'I '
  - type: note
    content: '[ch. 1:17]'
  - type: text
    content: 'searched with my heart how to cheer my body with wine—my heart still guiding me with wisdom—and how to lay hold on '
  - type: note
    content: ch. 7:25
  - type: text
    content: 'folly, till I might see what was good for the children of man to do under heaven during the few days of their life. '
  '4':
  - type: text
    content: 'I made great works. I '
  - type: note
    content: See 1 Kgs. 7:1-12
  - type: text
    content: 'built houses and planted '
  - type: note
    content: Song 8:11
  - type: text
    content: 'vineyards for myself. '
  '5':
  - type: text
    content: 'I made myself '
  - type: note
    content: Song 4:16; 5:1
  - type: text
    content: 'gardens and parks, and planted in them all kinds of fruit trees. '
  '6':
  - type: text
    content: 'I made myself pools from which to water the forest of growing trees. '
  '7':
  - type: text
    content: 'I bought male and female slaves, and had '
  - type: note
    content: Gen. 14:14; 15:3
  - type: text
    content: 'slaves who were born in my house. I had also great possessions of '
  - type: note
    content: '[1 Kgs. 4:23]'
  - type: text
    content: 'herds and flocks, more than any who had been before me in Jerusalem. '
  '8':
  - type: text
    content: 'I also gathered for myself silver and '
  - type: note
    content: 1 Kgs. 9:28; 10:10, 14, 21
  - type: text
    content: 'gold and the treasure of '
  - type: note
    content: '[1 Kgs. 4:21; 10:15]'
  - type: text
    content: 'kings and '
  - type: note
    content: 1 Kgs. 20:14; Ezek. 19:8
  - type: text
    content: 'provinces. I got '
  - type: note
    content: 2 Sam. 19:35; 2 Chr. 35:25
  - type: text
    content: 'singers, both men and women, and many '
  - type: note
    content: 1 Kgs. 11:3
  - type: text
    content: concubines,
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' the delight of the sons of man.'
  '9':
  - type: text
    content: 'So I became great and '
  - type: note
    content: 1 Chr. 29:25; See ch. 1:16
  - type: text
    content: 'surpassed all who were before me in Jerusalem. Also my '
  - type: note
    content: 1 Chr. 29:25; See ch. 1:16
  - type: text
    content: 'wisdom remained with me. '
