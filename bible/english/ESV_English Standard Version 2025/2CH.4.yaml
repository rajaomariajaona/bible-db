document_id: 2CH.4,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple’s Furnishings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'He made '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:12
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:64
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 16:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Ezek. 43:13-17'
      marker-yv: yv-n
    - type: text
      text: an altar of bronze, twenty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' long and twenty cubits wide and ten cubits high. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:39
      marker-yv: yv-n
    - type: text
      text: And he set the sea at the southeast corner of the house.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ch. 4:11–5:1, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:40-51
      marker-yv: yv-n
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Hiram also made the pots, the shovels, and the basins. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'So Hiram finished the work that he did for King Solomon on the house of God: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the two pillars, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:41
      marker-yv: yv-n
    - type: text
      text: 'the bowls, and the two capitals on the top of the pillars; and the two latticeworks to cover the two bowls of the capitals that were on the top of the pillars; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the 400 pomegranates for the two latticeworks, two rows of pomegranates for each latticework, to cover the two bowls of the capitals that were on the pillars. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'He made the stands also, and the basins on the stands, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the one sea, and the twelve oxen underneath it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The pots, the shovels, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 28:17
      marker-yv: yv-n
    - type: text
      text: 'the forks, and all the equipment for these '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:13
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Huram-abi made of burnished bronze for King Solomon for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: In the plain of the Jordan the king cast them, in the clay ground between Succoth and Zeredah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Spelled '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zarethan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in 1 Kings 7:46
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:47
      marker-yv: yv-n
    - type: text
      text: Solomon made all these things in great quantities, for the weight of the bronze was not sought.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Solomon made all the vessels that were in the house of God: the golden altar, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'the tables for the bread of the Presence, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 2-5, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:23-26
      marker-yv: yv-n
    - type: text
      text: 'Then he made the sea of cast metal. It was round, ten cubits from brim to brim, and five cubits high, and a line of thirty cubits measured its circumference. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'the lampstands and their lamps of pure gold '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'to burn before the inner sanctuary, as prescribed; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'the flowers, the lamps, and the tongs, of purest gold; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: the snuffers, basins, dishes for incense, and fire pans, of pure gold, and the sockets
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare 1 Kings 7:50; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the entrance of the house
      marker-yv: yv-n
    - type: text
      text: ' of the temple, for the inner doors to the Most Holy Place and for the doors of the nave of the temple were of gold.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Under it were figures of gourds,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: oxen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; twice in this verse; compare 1 Kings 7:24
      marker-yv: yv-n
    - type: text
      text: ' for ten cubits, compassing the sea all around. The gourds were in two rows, cast with it when it was cast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'It stood on twelve oxen, three facing north, three facing west, three facing south, and three facing east. The sea was set on them, and all their rear parts were inward. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Its thickness was a handbreadth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 3 inches or 7.5 centimeters
      marker-yv: yv-n
    - type: text
      text: ' And its brim was made like the brim of a cup, like the flower of a lily. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: It held 3,000 baths.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 6 gallons or 22 liters
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:38
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      marker-yv: yv-n
    - type: text
      text: He also made ten basins in which to wash, and set five on the south side, and five on the north side. In these they were to rinse off what was used for the burnt offering, and the sea was for the priests to wash in.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he made ten golden lampstands '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:49
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:31-39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'as prescribed, and set them in the temple, five on the south side and five on the north. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 7:48
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'He also made ten tables and placed them in the temple, five on the south side and five on the north. And he made a hundred basins of gold. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He made '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 6:36
      marker-yv: yv-n
    - type: text
      text: 'the court of the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 21:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the great court and doors for the court and overlaid their doors with bronze. '
