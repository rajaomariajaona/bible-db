document_id: 2CH.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple’s Furnishings
  - type: text
    content: 'He made '
  - type: note
    content: ch. 7:7; 8:12; [ch. 15:8; 1 Kgs. 8:64; 2 Kgs. 16:14]; See Ezek. 43:13-17
  - type: text
    content: an altar of bronze, twenty cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' long and twenty cubits wide and ten cubits high. '
  '10':
  - type: note
    content: 1 Kgs. 7:39
  - type: text
    content: And he set the sea at the southeast corner of the house.
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ch. 4:11–5:1, see 1 Kgs. 7:40-51
  - type: note
    content: '[ 1 Kgs. 7:13, 14 ]'
  - type: text
    content: 'Hiram also made the pots, the shovels, and the basins. '
  - type: note
    content: '[1 Kgs. 7:13, 14]'
  - type: text
    content: 'So Hiram finished the work that he did for King Solomon on the house of God: '
  '12':
  - type: text
    content: 'the two pillars, '
  - type: note
    content: 1 Kgs. 7:41
  - type: text
    content: 'the bowls, and the two capitals on the top of the pillars; and the two latticeworks to cover the two bowls of the capitals that were on the top of the pillars; '
  '13':
  - type: note
    content: '[1 Kgs. 7:20]'
  - type: text
    content: 'and the 400 pomegranates for the two latticeworks, two rows of pomegranates for each latticework, to cover the two bowls of the capitals that were on the pillars. '
  '14':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'He made the stands also, and the basins on the stands, '
  '15':
  - type: text
    content: 'and the one sea, and the twelve oxen underneath it. '
  '16':
  - type: text
    content: 'The pots, the shovels, '
  - type: note
    content: 1 Chr. 28:17
  - type: text
    content: 'the forks, and all the equipment for these '
  - type: note
    content: '[See ver. 11 above]'
  - type: note
    content: ch. 2:13; [1 Kgs. 7:14]
  - type: text
    content: 'Huram-abi made of burnished bronze for King Solomon for the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: In the plain of the Jordan the king cast them, in the clay ground between Succoth and Zeredah.
  - type: note
    content: Spelled Zarethan in 1 Kings 7:46
  - type: text
    content: ' '
  '18':
  - type: note
    content: 1 Kgs. 7:47
  - type: text
    content: Solomon made all these things in great quantities, for the weight of the bronze was not sought.
  '19':
  - type: text
    content: 'So Solomon made all the vessels that were in the house of God: the golden altar, '
  - type: note
    content: ver. 8
  - type: text
    content: 'the tables for the bread of the Presence, '
  '2':
  - type: note
    content: For ver. 2-5, see 1 Kgs. 7:23-26
  - type: text
    content: 'Then he made the sea of cast metal. It was round, ten cubits from brim to brim, and five cubits high, and a line of thirty cubits measured its circumference. '
  '20':
  - type: text
    content: 'the lampstands and their lamps of pure gold '
  - type: note
    content: ver. 7
  - type: text
    content: 'to burn before the inner sanctuary, as prescribed; '
  '21':
  - type: text
    content: 'the flowers, the lamps, and the tongs, of purest gold; '
  '22':
  - type: text
    content: the snuffers, basins, dishes for incense, and fire pans, of pure gold, and the sockets
  - type: note
    content: Compare 1 Kings 7:50; Hebrew the entrance of the house
  - type: text
    content: ' of the temple, for the inner doors to the Most Holy Place and for the doors of the nave of the temple were of gold.'
  '3':
  - type: text
    content: Under it were figures of gourds,
  - type: note
    content: Hebrew oxen; twice in this verse; compare 1 Kings 7:24
  - type: text
    content: ' for ten cubits, compassing the sea all around. The gourds were in two rows, cast with it when it was cast. '
  '4':
  - type: text
    content: 'It stood on twelve oxen, three facing north, three facing west, three facing south, and three facing east. The sea was set on them, and all their rear parts were inward. '
  '5':
  - type: text
    content: Its thickness was a handbreadth.
  - type: note
    content: A handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' And its brim was made like the brim of a cup, like the flower of a lily. '
  - type: note
    content: '[1 Kgs. 7:26]'
  - type: text
    content: It held 3,000 baths.
  - type: note
    content: A bath was about 6 gallons or 22 liters
  - type: text
    content: ' '
  '6':
  - type: note
    content: 1 Kgs. 7:38, 39
  - type: text
    content: He also made ten basins in which to wash, and set five on the south side, and five on the north side. In these they were to rinse off what was used for the burnt offering, and the sea was for the priests to wash in.
  '7':
  - type: text
    content: 'And he made ten golden lampstands '
  - type: note
    content: ver. 20; 1 Kgs. 7:49; See Ex. 25:31-39; 27:20, 21
  - type: text
    content: 'as prescribed, and set them in the temple, five on the south side and five on the north. '
  '8':
  - type: note
    content: ver. 19; [1 Kgs. 7:48]
  - type: text
    content: 'He also made ten tables and placed them in the temple, five on the south side and five on the north. And he made a hundred basins of gold. '
  '9':
  - type: text
    content: 'He made '
  - type: note
    content: 1 Kgs. 6:36
  - type: text
    content: 'the court of the priests '
  - type: note
    content: '[ch. 6:13; 2 Kgs. 21:5]'
  - type: text
    content: 'and the great court and doors for the court and overlaid their doors with bronze. '
