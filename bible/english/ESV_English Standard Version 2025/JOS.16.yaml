document_id: JOS.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Allotment for Ephraim and Manasseh
  - type: text
    content: 'The allotment of the people of Joseph went from the Jordan by Jericho, east of the waters of Jericho, '
  - type: note
    content: ch. 8:15; 18:12
  - type: text
    content: 'into the wilderness, going up from Jericho into the hill country to Bethel. '
  '10':
  - type: text
    content: 'However, '
  - type: note
    content: Judg. 1:29; 1 Kgs. 9:16
  - type: text
    content: 'they did not drive out the Canaanites who lived in Gezer, so the Canaanites have lived in the midst of Ephraim to this day but have been made '
  - type: note
    content: ch. 17:13; Gen. 49:15
  - type: text
    content: to do forced labor.
  '2':
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 18:13; Gen. 28:19; Judg. 1:23, 26]'
  - type: text
    content: 'going from Bethel to Luz, it passes along to Ataroth, the territory of the Archites. '
  '3':
  - type: text
    content: 'Then it goes down westward to the territory of the Japhletites, as far as the territory of Lower '
  - type: note
    content: See ch. 10:10
  - type: text
    content: 'Beth-horon, then to '
  - type: note
    content: See ch. 10:33
  - type: text
    content: Gezer, and it ends at the sea.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 17:14 ]'
  - type: text
    content: The people of Joseph, Manasseh and Ephraim, received their inheritance.
  '5':
  - type: text
    content: 'The territory of the people of Ephraim by their clans was as follows: the boundary of their inheritance on the east was '
  - type: note
    content: ch. 18:13
  - type: text
    content: 'Ataroth-addar as far as Upper Beth-horon, '
  '6':
  - type: text
    content: 'and the boundary goes from there to the sea. On the north is '
  - type: note
    content: ch. 17:7
  - type: text
    content: 'Michmethath. Then on the east the boundary turns around toward Taanath-shiloh and passes along beyond it on the east to Janoah, '
  '7':
  - type: text
    content: 'then it goes down from Janoah to Ataroth and '
  - type: note
    content: 1 Chr. 7:28
  - type: text
    content: 'to Naarah, and touches Jericho, ending at the Jordan. '
  '8':
  - type: text
    content: 'From '
  - type: note
    content: ch. 17:8, 9
  - type: text
    content: 'Tappuah the boundary goes westward to the brook Kanah and ends at the sea. Such is the inheritance of the tribe of the people of Ephraim by their clans, '
  '9':
  - type: text
    content: 'together with '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the towns that were set apart for the people of Ephraim within the inheritance of the Manassites, all those towns with their villages. '
