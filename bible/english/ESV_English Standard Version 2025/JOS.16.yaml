segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Allotment for Ephraim and Manasseh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The allotment of the people of Joseph went from the Jordan by Jericho, east of the waters of Jericho, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:15
      metadata:
        usfm: JOS.8.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:12
      metadata:
        usfm: JOS.18.12
    marker-yv: yv-n
  - type: text
    text: 'into the wilderness, going up from Jericho into the hill country to Bethel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:13
      metadata:
        usfm: JOS.18.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 28:19
      metadata:
        usfm: GEN.28.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 1:23
      metadata:
        usfm: JDG.1.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: JDG.1.26
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'going from Bethel to Luz, it passes along to Ataroth, the territory of the Archites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then it goes down westward to the territory of the Japhletites, as far as the territory of Lower '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:10
      metadata:
        usfm: JOS.10.10
    marker-yv: yv-n
  - type: text
    text: 'Beth-horon, then to '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:33
      metadata:
        usfm: JOS.10.33
    marker-yv: yv-n
  - type: text
    text: Gezer, and it ends at the sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:14
      metadata:
        usfm: JOS.17.14
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: The people of Joseph, Manasseh and Ephraim, received their inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The territory of the people of Ephraim by their clans was as follows: the boundary of their inheritance on the east was '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:13
      metadata:
        usfm: JOS.18.13
    marker-yv: yv-n
  - type: text
    text: 'Ataroth-addar as far as Upper Beth-horon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the boundary goes from there to the sea. On the north is '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:7
      metadata:
        usfm: JOS.17.7
    marker-yv: yv-n
  - type: text
    text: 'Michmethath. Then on the east the boundary turns around toward Taanath-shiloh and passes along beyond it on the east to Janoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'then it goes down from Janoah to Ataroth and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 7:28
      metadata:
        usfm: 1CH.7.28
    marker-yv: yv-n
  - type: text
    text: 'to Naarah, and touches Jericho, ending at the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'From '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8
      metadata:
        usfm: JOS.17.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: JOS.17.9
    marker-yv: yv-n
  - type: text
    text: 'Tappuah the boundary goes westward to the brook Kanah and ends at the sea. Such is the inheritance of the tribe of the people of Ephraim by their clans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'together with '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[See ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: JOS.8
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'the towns that were set apart for the people of Ephraim within the inheritance of the Manassites, all those towns with their villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'However, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 1:29
      metadata:
        usfm: JDG.1.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 9:16
      metadata:
        usfm: 1KI.9.16
    marker-yv: yv-n
  - type: text
    text: 'they did not drive out the Canaanites who lived in Gezer, so the Canaanites have lived in the midst of Ephraim to this day but have been made '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:13
      metadata:
        usfm: JOS.17.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 49:15
      metadata:
        usfm: GEN.49.15
    marker-yv: yv-n
  - type: text
    text: to do forced labor.
