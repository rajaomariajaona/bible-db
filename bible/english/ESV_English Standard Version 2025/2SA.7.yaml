document_id: 2SA.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant with David
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-29, see 1 Chr. 17:1-27
  - type: text
    content: 'Now when the king lived in his house and the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Josh. 11:23
  - type: text
    content: 'had given him rest from all his surrounding enemies, '
  '10':
  - type: text
    content: 'And I will appoint a place for my people Israel '
  - type: note
    content: Ps. 44:2; 80:8; Jer. 24:6; Amos 9:15
  - type: text
    content: 'and will plant them, so that they may dwell in their own place '
  - type: note
    content: 2 Kgs. 21:8
  - type: text
    content: 'and be disturbed no more. '
  - type: note
    content: '[Ps. 89:22]'
  - type: text
    content: 'And violent men shall afflict them no more, as formerly, '
  '11':
  - type: note
    content: See Judg. 2:14-16; 1 Sam. 12:9-11
  - type: text
    content: 'from the time that I appointed judges over my people Israel. And '
  - type: note
    content: ver. 1; See Josh. 11:23
  - type: text
    content: 'I will give you rest from all your enemies. Moreover, the '
  - type: text
    content: Lord
  - type: text
    content: ' declares to you that '
  - type: note
    content: ver. 27; 1 Kgs. 11:38; [Ex. 1:21; 1 Sam. 2:35]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will make you a house. '
  '12':
  - type: note
    content: '[1 Kgs. 2:1]'
  - type: text
    content: 'When your days are fulfilled and '
  - type: note
    content: 1 Kgs. 1:21; 2:10; Acts 13:36; [Deut. 31:16]
  - type: text
    content: 'you lie down with your fathers, '
  - type: note
    content: 1 Kgs. 8:20; Ps. 132:11
  - type: text
    content: I will raise up your offspring after you, who shall come from your body,
  - type: note
    content: Hebrew loins
  - type: text
    content: ' and I will establish his kingdom. '
  '13':
  - type: note
    content: 1 Kgs. 5:5; 6:12; 8:19; 1 Chr. 22:10; 28:6
  - type: text
    content: 'He shall build a house for my name, and '
  - type: note
    content: ver. 16; Ps. 89:4, 29, 36, 37
  - type: text
    content: 'I will establish the throne of his kingdom forever. '
  '14':
  - type: note
    content: Ps. 89:26, 27; Cited Heb. 1:5
  - type: text
    content: 'I will be to him a father, and he shall be to me a son. When he commits iniquity, '
  - type: note
    content: Ps. 89:32, 33
  - type: text
    content: 'I will discipline him with the rod of men, with the stripes of the sons of men, '
  '15':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'but my steadfast love will not depart from him, '
  - type: note
    content: 1 Sam. 15:23, 28; [1 Kgs. 11:13, 34]
  - type: text
    content: 'as I took it from Saul, whom I put away from before you. '
  '16':
  - type: note
    content: ver. 13; Ps. 89:36, 37; [Luke 1:33]
  - type: text
    content: And your house and your kingdom shall be made sure forever before me.
  - type: note
    content: Septuagint; Hebrew you
  - type: text
    content: ' '
  - type: note
    content: ver. 13; Ps. 89:36, 37; [Luke 1:33]
  - type: text
    content: 'Your throne shall be established forever.’” '
  '17':
  - type: text
    content: In accordance with all these words, and in accordance with all this vision, Nathan spoke to David.
  - type: heading
    content: David’s Prayer of Gratitude
  '18':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, '
  - type: note
    content: '[Gen. 32:10]'
  - type: text
    content: '“Who am I, O Lord '
  - type: text
    content: God
  - type: text
    content: ', and what is my house, that you have brought me thus far? '
  '19':
  - type: text
    content: 'And yet this was a small thing in your eyes, O Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: note
    content: ver. 12, 13; 1 Chr. 17:17
  - type: text
    content: 'You have spoken also of your servant’s house for a great while to come, and this is instruction for mankind, O Lord '
  - type: text
    content: God
  - type: text
    content: '! '
  '2':
  - type: text
    content: 'the king said to '
  - type: note
    content: ver. 17; ch. 12:1
  - type: text
    content: 'Nathan the prophet, “See now, I dwell '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'in a house of cedar, but the ark of God dwells '
  - type: note
    content: Ex. 26:1
  - type: text
    content: 'in a tent.” '
  '20':
  - type: text
    content: 'And what more can David say to you? '
  - type: note
    content: See Ps. 139:1-4
  - type: text
    content: 'For you know your servant, O Lord '
  - type: text
    content: God
  - type: text
    content: '! '
  '21':
  - type: text
    content: 'Because of your promise, and according to your own heart, you have brought about all this greatness, to make your servant know it. '
  '22':
  - type: note
    content: 1 Chr. 16:25; 2 Chr. 2:5
  - type: text
    content: 'Therefore you are great, O Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: note
    content: Ex. 15:11; Deut. 3:24; Ps. 86:8; 89:6, 8; Isa. 45:5; Jer. 10:6
  - type: text
    content: 'For there is none like you, and there is no God besides you, according to all that we have heard with our ears. '
  '23':
  - type: note
    content: Deut. 4:7, 34; 33:29; Ps. 147:20
  - type: text
    content: 'And who is like your people Israel, the one nation on earth whom God went to redeem to be his people, making himself a name '
  - type: note
    content: Deut. 10:21
  - type: text
    content: and doing for them
  - type: note
    content: With a few Targums, Vulgate, Syriac; Hebrew you
  - type: text
    content: ' great and awesome things by driving out before your people,'
  - type: note
    content: Septuagint (compare 1 Chronicles 17:21); Hebrew awesome things for your land, before your people
  - type: text
    content: ' whom '
  - type: note
    content: Deut. 9:26; Neh. 1:10
  - type: text
    content: 'you redeemed for yourself from Egypt, a nation and its gods? '
  '24':
  - type: note
    content: ver. 13, 16, 26; Deut. 26:18
  - type: text
    content: 'And you established for yourself your people Israel to be your people forever. And you, O '
  - type: text
    content: Lord
  - type: text
    content: ', became their God. '
  '25':
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, confirm forever the word that you have spoken concerning your servant and concerning his house, and do as you have spoken. '
  '26':
  - type: text
    content: 'And your name will be magnified forever, saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is God over Israel,’ and the house of your servant David will be established before you. '
  '27':
  - type: text
    content: 'For you, O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, have made this revelation to your servant, saying, ‘I will build you a house.’ Therefore your servant has found courage to pray this prayer to you. '
  '28':
  - type: text
    content: 'And now, O Lord '
  - type: text
    content: God
  - type: text
    content: ', you are God, and '
  - type: note
    content: John 17:17
  - type: text
    content: 'your words are true, and you have promised this good thing to your servant. '
  '29':
  - type: text
    content: 'Now therefore may it please you to bless the house of your servant, so that it may continue forever before you. For you, O Lord '
  - type: text
    content: God
  - type: text
    content: ', have spoken, '
  - type: note
    content: ch. 22:51; Ps. 89:28, 29
  - type: text
    content: and with your blessing shall the house of your servant be blessed forever.”
  '3':
  - type: text
    content: 'And Nathan said to the king, '
  - type: note
    content: 1 Kgs. 8:17, 18; 1 Chr. 22:7; 28:2; [Acts 7:46]
  - type: text
    content: '“Go, do all that is in your heart, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is with you.”'
  '4':
  - type: text
    content: 'But that same night the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Nathan, '
  '5':
  - type: text
    content: '“Go and tell my servant David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: 1 Kgs. 5:3; 8:19; 1 Chr. 22:8; 28:3
  - type: text
    content: 'Would you build me a house to dwell in? '
  '6':
  - type: text
    content: 'I have not lived in a house '
  - type: note
    content: 1 Kgs. 8:16
  - type: text
    content: 'since the day I brought up the people of Israel from Egypt to this day, but I have been moving about '
  - type: note
    content: Ex. 40:18, 19, 34
  - type: text
    content: 'in a tent for my dwelling. '
  '7':
  - type: text
    content: 'In all places where '
  - type: note
    content: Lev. 26:11, 12; Deut. 23:14
  - type: text
    content: 'I have moved with all the people of Israel, did I speak a word with '
  - type: note
    content: '[1 Chr. 17:6]'
  - type: text
    content: any of the judges
  - type: note
    content: Compare 1 Chronicles 17:6; Hebrew tribes
  - type: text
    content: ' of Israel, whom I commanded '
  - type: note
    content: See ch. 5:2
  - type: text
    content: 'to shepherd my people Israel, saying, “Why have you not built me a house of cedar?”’ '
  '8':
  - type: text
    content: 'Now, therefore, thus you shall say to my servant David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: 1 Sam. 16:11; Ps. 78:70
  - type: text
    content: I took you from the pasture, from following the sheep, that you should be prince
  - type: note
    content: Or leader
  - type: text
    content: ' over my people Israel. '
  '9':
  - type: note
    content: ch. 5:10; 8:6, 14; 1 Sam. 18:14
  - type: text
    content: 'And I have been with you wherever you went and have cut off all your enemies from before you. And I will make for you a great name, like the name of the great ones of the earth. '
