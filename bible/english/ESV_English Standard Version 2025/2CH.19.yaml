      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      marker-yv: yv-n
    - type: text
      text: 'in all matters of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and Zebadiah the son of Ishmael, the governor of the house of Judah, in all the king’s matters, and the Levites will serve you as officers. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 28:10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 10:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Deal courageously, and may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with the upright!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:11 '
      - type: usfm
