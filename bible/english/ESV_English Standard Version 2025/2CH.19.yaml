document_id: 2CH.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat’s Reforms
  - type: text
    content: 'Jehoshaphat the king of Judah returned in safety to his house in Jerusalem. '
  '10':
  - type: note
    content: See Deut. 17:8
  - type: text
    content: 'whenever a case comes to you from your brothers who live in their cities, concerning bloodshed, law or commandment, statutes or rules, then you shall warn them, that they may not incur guilt before the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: ver. 2
  - type: text
    content: 'wrath may not come upon you and your brothers. Thus you shall do, and you will not incur guilt. '
  '11':
  - type: text
    content: 'And behold, Amariah the chief priest is over you '
  - type: note
    content: 1 Chr. 26:30, 32
  - type: text
    content: 'in all matters of the '
  - type: text
    content: Lord
  - type: text
    content: '; and Zebadiah the son of Ishmael, the governor of the house of Judah, in all the king’s matters, and the Levites will serve you as officers. '
  - type: note
    content: 1 Chr. 28:10; [Ezra 10:4]
  - type: text
    content: 'Deal courageously, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with the upright!”'
  - type: note
    content: Hebrew the good
  '2':
  - type: text
    content: 'But '
  - type: note
    content: ch. 20:34; 1 Kgs. 16:1
  - type: text
    content: 'Jehu the son of '
  - type: note
    content: ch. 16:7
  - type: text
    content: 'Hanani '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'the seer went out to meet him and said to King Jehoshaphat, “Should you '
  - type: note
    content: '[ch. 18:1; 20:37; Ps. 139:21]'
  - type: text
    content: 'help the wicked and love those who hate the '
  - type: text
    content: Lord
  - type: text
    content: '? Because of this, '
  - type: note
    content: ver. 10; ch. 24:18; 32:25
  - type: text
    content: 'wrath has gone out against you from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: ch. 12:12; 1 Kgs. 14:13
  - type: text
    content: 'some good is found in you, for '
  - type: note
    content: ch. 17:6
  - type: text
    content: 'you destroyed the Asheroth out of the land, and have '
  - type: note
    content: ch. 30:19; Ezra 7:10
  - type: text
    content: set your heart to seek God.”
  '4':
  - type: text
    content: 'Jehoshaphat lived at Jerusalem. And he went out again among the people, from Beersheba to '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, and brought them back to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers. '
  '5':
  - type: text
    content: 'He appointed '
  - type: note
    content: '[Deut. 16:18]'
  - type: text
    content: 'judges in the land in all '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'the fortified cities of Judah, city by city, '
  '6':
  - type: text
    content: 'and said to the judges, “Consider what you do, '
  - type: note
    content: Deut. 1:17
  - type: text
    content: 'for you judge not for man but for the '
  - type: text
    content: Lord
  - type: text
    content: '. He is with you in giving judgment. '
  '7':
  - type: text
    content: 'Now then, let the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' be upon you. Be careful what you do, for '
  - type: note
    content: Deut. 32:4; Job 8:3; 34:10; [Gen. 18:25; Rom. 9:14]
  - type: text
    content: 'there is no injustice with the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: See Deut. 10:17
  - type: text
    content: or partiality or taking bribes.”
  '8':
  - type: text
    content: 'Moreover, in Jerusalem Jehoshaphat '
  - type: note
    content: ch. 17:8, 9
  - type: text
    content: 'appointed certain Levites and priests and heads of families of Israel, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'to give judgment for the '
  - type: text
    content: Lord
  - type: text
    content: ' and to decide disputed cases. They had their seat at Jerusalem. '
  '9':
  - type: text
    content: 'And he charged them: '
  - type: note
    content: 2 Sam. 23:3
  - type: text
    content: '“Thus you shall do in the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ', in faithfulness, '
  - type: note
    content: 1 Kgs. 8:61
  - type: text
    content: 'and with your whole heart: '
