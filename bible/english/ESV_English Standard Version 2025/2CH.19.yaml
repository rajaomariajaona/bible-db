        - type: text
          text: 2 Sam. 23:3
      marker-yv: yv-n
    - type: text
      text: '“Thus you shall do in the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in faithfulness, '
    - type: usfm
      marker: x
      children:
      - type: usfm
