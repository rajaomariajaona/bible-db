      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 7:10
      marker-yv: yv-n
    - type: text
      text: set your heart to seek God.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat lived at Jerusalem. And he went out again among the people, from Beersheba to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:33
      marker-yv: yv-n
    - type: text
      text: 'the hill country of Ephraim, and brought them back to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their fathers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He appointed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 16:18
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'judges in the land in all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:5
      marker-yv: yv-n
    - type: text
      text: 'the fortified cities of Judah, city by city, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to the judges, “Consider what you do, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:17
      marker-yv: yv-n
    - type: text
      text: 'for you judge not for man but for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He is with you in giving judgment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then, let the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be upon you. Be careful what you do, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 32:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 18:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 9:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'there is no injustice with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 10:17
      marker-yv: yv-n
    - type: text
      text: or partiality or taking bribes.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, in Jerusalem Jehoshaphat '
    - type: usfm
      marker: x
      children:
      - type: usfm
