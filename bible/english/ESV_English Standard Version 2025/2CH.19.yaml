        children:
        - type: text
          text: 17:6
      marker-yv: yv-n
    - type: text
      text: 'you destroyed the Asheroth out of the land, and have '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
