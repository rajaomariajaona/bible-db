      text: Jehoshaphat’s Reforms
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat the king of Judah returned in safety to his house in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 17:8
      marker-yv: yv-n
    - type: text
      text: 'whenever a case comes to you from your brothers who live in their cities, concerning bloodshed, law or commandment, statutes or rules, then you shall warn them, that they may not incur guilt before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'wrath may not come upon you and your brothers. Thus you shall do, and you will not incur guilt. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, Amariah the chief priest is over you '
    - type: usfm
      marker: x
      children:
