        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:25
      marker-yv: yv-n
    - type: text
      text: 'wrath has gone out against you from the '
    - type: usfm
