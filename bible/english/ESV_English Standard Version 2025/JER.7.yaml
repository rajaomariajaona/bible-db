document_id: JER.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Evil in the Land
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'and then come and stand before me in this house, '
  - type: note
    content: ch. 32:34; 34:15
  - type: text
    content: 'which is called by my name, and say, ‘We are delivered!’—only to go on doing all these abominations? '
  '11':
  - type: note
    content: Isa. 56:7
  - type: text
    content: 'Has this house, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'which is called by my name, '
  - type: note
    content: Cited Matt. 21:13; Mark 11:17; Luke 19:46; [Ezek. 7:22]
  - type: text
    content: 'become a den of robbers in your eyes? Behold, I myself have seen it, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Go now to '
  - type: note
    content: Judg. 18:31; 1 Sam. 1:3
  - type: text
    content: 'my place that was in Shiloh, '
  - type: note
    content: Deut. 12:11
  - type: text
    content: 'where I made my name dwell at first, and '
  - type: note
    content: ch. 26:6; Ps. 78:60; See 1 Sam. 4:3-12
  - type: text
    content: 'see what I did to it because of the evil of my people Israel. '
  '13':
  - type: text
    content: 'And now, because you have done all these things, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ver. 25; 2 Chr. 36:15
  - type: text
    content: 'when I spoke to you persistently you did not listen, and '
  - type: note
    content: Prov. 1:24; [ver. 27; Isa. 50:2; 65:12]
  - type: text
    content: 'when I called you, you did not answer, '
  '14':
  - type: text
    content: 'therefore I will do to '
  - type: note
    content: Deut. 12:5; 1 Kgs. 9:7
  - type: text
    content: 'the house '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'that is called by my name, and in which you trust, and to the place that I gave to you and to your fathers, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'as I did to Shiloh. '
  '15':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'And I will cast you out of my sight, '
  - type: note
    content: 2 Kgs. 17:6, 23
  - type: text
    content: 'as I cast out all your kinsmen, all the offspring of '
  - type: note
    content: Ps. 78:67; Hos. 4:17; 5:3, 9; 6:4; 12:1
  - type: text
    content: Ephraim.
  '16':
  - type: text
    content: '“As for you, '
  - type: note
    content: ch. 11:14; 14:11; [Ex. 32:10; Deut. 9:14; 1 John 5:16]
  - type: text
    content: 'do not pray for this people, or lift up a cry or prayer for them, and do not intercede with me, for I will not hear you. '
  '17':
  - type: text
    content: 'Do you not see what they are doing in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: text
    content: 'The children gather wood, the fathers kindle fire, '
  - type: note
    content: Hos. 7:4
  - type: text
    content: 'and the women knead dough, to '
  - type: note
    content: ch. 44:17, 19
  - type: text
    content: 'make cakes for '
  - type: note
    content: '[2 Kgs. 23:13]'
  - type: text
    content: 'the queen of heaven. And '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'they pour out drink offerings to other gods, '
  - type: note
    content: ch. 11:17; Deut. 32:16, 21; 1 Kgs. 14:9; 16:2; 2 Chr. 34:25
  - type: text
    content: 'to provoke me to anger. '
  '19':
  - type: note
    content: '[Job 35:6]'
  - type: text
    content: 'Is it I whom they provoke? declares the '
  - type: text
    content: Lord
  - type: text
    content: '. Is it not themselves, '
  - type: note
    content: ch. 51:51
  - type: text
    content: 'to their own shame? '
  '2':
  - type: note
    content: ch. 26:2
  - type: text
    content: '“Stand in the gate of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house, and proclaim there this word, and say, Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', all you men of Judah who enter these gates to worship the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, '
  - type: note
    content: ch. 42:18; 44:6; 2 Chr. 34:25; Lam. 4:11
  - type: text
    content: 'my anger and my wrath will be poured out on this place, upon man and beast, upon the trees of the field and the fruit of the ground; '
  - type: note
    content: ch. 17:27
  - type: text
    content: it will burn and not be quenched.”
  '21':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: See ch. 6:20
  - type: text
    content: '“Add your burnt offerings to your sacrifices, and eat the flesh. '
  '22':
  - type: text
    content: 'For in the day that I brought them out of the land of Egypt, I did not speak to your fathers or command them '
  - type: note
    content: Hos. 6:6
  - type: text
    content: 'concerning burnt offerings and sacrifices. '
  '23':
  - type: text
    content: 'But this command I gave them: '
  - type: note
    content: ch. 11:4, 7; Ex. 15:26; Deut. 6:3
  - type: text
    content: '‘Obey my voice, and '
  - type: note
    content: Lev. 26:12
  - type: text
    content: 'I will be your God, and you shall be my people. '
  - type: note
    content: Deut. 5:33
  - type: text
    content: 'And walk in all the way that I command you, '
  - type: note
    content: ch. 42:6; Deut. 4:40
  - type: text
    content: 'that it may be well with you.’ '
  '24':
  - type: note
    content: Ps. 81:11
  - type: text
    content: 'But they did not obey or incline their ear, '
  - type: note
    content: Ps. 81:12
  - type: text
    content: 'but walked in their own counsels and '
  - type: note
    content: '[ch. 3:17; Hos. 4:16]'
  - type: text
    content: 'the stubbornness of their evil hearts, and '
  - type: note
    content: ch. 2:19, 27; 8:5; 15:6; 32:33
  - type: text
    content: 'went backward and not forward. '
  '25':
  - type: text
    content: 'From the day that your fathers came out of the land of Egypt to this day, '
  - type: note
    content: 2 Chr. 36:15, 16
  - type: text
    content: 'I have persistently sent all my servants the prophets to them, day after day. '
  '26':
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'Yet they did not listen to me or incline their ear, '
  - type: note
    content: 2 Chr. 30:8
  - type: text
    content: 'but stiffened their neck. '
  - type: note
    content: ch. 16:12
  - type: text
    content: They did worse than their fathers.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:17
  - type: text
    content: '“So you shall speak all these words to them, but they will not listen to you. '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'You shall call to them, but they will not answer you. '
  '28':
  - type: text
    content: 'And you shall say to them, ‘This is the nation that did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and did not accept discipline; '
  - type: note
    content: ch. 9:3
  - type: text
    content: truth has perished; it is cut off from their lips.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 1:20 ]'
  - type: text
    content: “‘Cut off your hair and cast it away;
  - type: text
    content: 'raise a lamentation on '
  - type: note
    content: See ch. 3:2
  - type: text
    content: the bare heights,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected and forsaken'
  - type: text
    content: the generation of his wrath.’
  - type: heading
    content: The Valley of Slaughter
  '3':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: ch. 18:11; 26:13
  - type: text
    content: 'Amend your ways and your deeds, and I will let you dwell in this place. '
  '30':
  - type: text
    content: '“For the sons of Judah have done evil in my sight, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. They have set '
  - type: note
    content: ch. 32:34; Ezek. 5:11; 7:20; [ch. 19:5; 2 Kgs. 21:4, 7]
  - type: text
    content: 'their detestable things in the house '
  - type: note
    content: See ver. 10
  - type: text
    content: 'that is called by my name, to '
  - type: note
    content: ch. 32:34; Ezek. 5:11; 7:20; [ch. 19:5; 2 Kgs. 21:4, 7]
  - type: text
    content: 'defile it. '
  '31':
  - type: text
    content: 'And they have built the high places of '
  - type: note
    content: 2 Kgs. 23:10
  - type: text
    content: 'Topheth, which is in '
  - type: note
    content: '[ch. 31:40; Josh. 18:16]'
  - type: text
    content: 'the Valley of the Son of Hinnom, '
  - type: note
    content: Ps. 106:38
  - type: text
    content: 'to burn their sons and their daughters in the fire, '
  - type: note
    content: Deut. 17:3; [ver. 21, 22]
  - type: text
    content: 'which I did not command, nor did it come into my mind. '
  '32':
  - type: note
    content: ch. 19:6
  - type: text
    content: 'Therefore, behold, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when it will no more be called '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'Topheth, or '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'the Valley of the Son of Hinnom, but the Valley of Slaughter; '
  - type: note
    content: ch. 19:11; [Ezek. 6:5]
  - type: text
    content: 'for they will bury in Topheth, because there is no room elsewhere. '
  '33':
  - type: note
    content: ch. 12:9; 16:4; 19:7; 34:20; Deut. 28:26; Ps. 79:2
  - type: text
    content: 'And the dead bodies of this people will be food for the birds of the air, and for the beasts of the earth, '
  - type: note
    content: '[Isa. 17:2]'
  - type: text
    content: 'and none will frighten them away. '
  '34':
  - type: note
    content: ch. 16:9; 25:10; Ps. 78:63; Isa. 24:7, 8; Rev. 18:22, 23; [Ezek. 26:13; Hos. 2:11]
  - type: text
    content: 'And I will silence in the cities of Judah and in the streets of Jerusalem the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride, '
  - type: note
    content: ch. 27:17; 44:2, 6; Lev. 26:31, 33
  - type: text
    content: for the land shall become a waste.
  '4':
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'Do not trust in these deceptive words: ‘This is the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '5':
  - type: text
    content: '“For if you truly '
  - type: note
    content: ch. 22:3
  - type: text
    content: 'amend your ways and your deeds, if you truly '
  - type: note
    content: Deut. 24:14
  - type: text
    content: 'execute justice one with another, '
  '6':
  - type: text
    content: 'if you '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'do not oppress the sojourner, the fatherless, or the widow, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'or shed innocent blood in this place, '
  - type: note
    content: ch. 13:10; 25:6; Deut. 6:14
  - type: text
    content: 'and if you do not go after other gods to your own harm, '
  '7':
  - type: note
    content: Deut. 4:40
  - type: text
    content: 'then I will let you dwell in this place, '
  - type: note
    content: ch. 3:18
  - type: text
    content: in the land that I gave of old to your fathers forever.
  '8':
  - type: text
    content: '“Behold, you trust in deceptive words to no avail. '
  '9':
  - type: note
    content: Hos. 4:1, 2
  - type: text
    content: 'Will you steal, murder, commit adultery, '
  - type: note
    content: ch. 5:2
  - type: text
    content: 'swear falsely, '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'make offerings to Baal, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'and go after other gods that you have not known, '
