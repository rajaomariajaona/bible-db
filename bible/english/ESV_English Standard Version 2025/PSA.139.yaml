document_id: PSA.139,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Search Me, O God, and Know My Heart
  - type: text
    content: To the choirmaster. A Psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you have '
  - type: note
    content: Jer. 12:3; See Ps. 7:9; 17:3; 44:21
  - type: text
    content: searched me and known me!
  '10':
  - type: text
    content: 'even there your hand shall '
  - type: note
    content: ver. 24; Ps. 23:3
  - type: text
    content: lead me,
  - type: text
    content: and your right hand shall hold me.
  '11':
  - type: text
    content: 'If I say, '
  - type: note
    content: '[Job 22:14]'
  - type: text
    content: “Surely the darkness shall cover me,
  - type: text
    content: and the light about me be night,”
  '12':
  - type: text
    content: ' '
  - type: note
    content: Job 34:22; [ Dan. 2:22 ]
  - type: text
    content: even the darkness is not dark to you;
  - type: text
    content: the night is bright as the day,
  - type: text
    content: for darkness is as light with you.
  '13':
  - type: text
    content: 'For you '
  - type: note
    content: Deut. 32:6
  - type: text
    content: formed my inward parts;
  - type: text
    content: 'you '
  - type: note
    content: '[Job 10:11]'
  - type: text
    content: knitted me together in my mother’s womb.
  '14':
  - type: text
    content: I praise you, for I am fearfully and wonderfully made.
  - type: note
    content: Or for I am fearfully set apart
  - type: note
    content: See Ps. 72:18
  - type: text
    content: Wonderful are your works;
  - type: text
    content: my soul knows it very well.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 10:8-10; Eccles. 11:5 ]'
  - type: text
    content: My frame was not hidden from you,
  - type: text
    content: when I was being made in secret,
  - type: text
    content: 'intricately woven in '
  - type: note
    content: Ps. 63:9
  - type: text
    content: the depths of the earth.
  '16':
  - type: text
    content: Your eyes saw my unformed substance;
  - type: text
    content: 'in your '
  - type: note
    content: Ps. 56:8
  - type: text
    content: book were written, every one of them,
  - type: text
    content: the days that were formed for me,
  - type: text
    content: when as yet there was none of them.
  '17':
  - type: text
    content: 'How precious to me are your '
  - type: note
    content: Ps. 92:5
  - type: text
    content: thoughts, O God!
  - type: text
    content: How vast is the sum of them!
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 40:5
  - type: text
    content: 'If I would count them, they are more than '
  - type: note
    content: Gen. 22:17
  - type: text
    content: the sand.
  - type: text
    content: I awake, and I am still with you.
  '19':
  - type: text
    content: 'Oh that you would '
  - type: note
    content: Isa. 11:4; [Ps. 9:17]
  - type: text
    content: slay the wicked, O God!
  - type: text
    content: 'O '
  - type: note
    content: Ps. 5:6
  - type: text
    content: 'men of blood, '
  - type: note
    content: See Ps. 6:8
  - type: text
    content: depart from me!
  '2':
  - type: text
    content: 'You '
  - type: note
    content: 2 Kgs. 19:27; Lam. 3:63
  - type: text
    content: know when I sit down and when I rise up;
  - type: text
    content: 'you '
  - type: note
    content: '[Job 14:16; 31:4; Matt. 9:4; John 2:24, 25]'
  - type: text
    content: discern my thoughts from afar.
  '20':
  - type: text
    content: 'They '
  - type: note
    content: '[Jude 15]'
  - type: text
    content: speak against you with malicious intent;
  - type: text
    content: 'your enemies '
  - type: note
    content: Ex. 20:7
  - type: text
    content: take your name in vain.
  - type: note
    content: Hebrew lacks your name
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 26:5
  - type: text
    content: 'Do I not hate those who hate you, O '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'And do I not '
  - type: note
    content: Ps. 119:158
  - type: text
    content: 'loathe those who '
  - type: note
    content: Ps. 59:1
  - type: text
    content: rise up against you?
  '22':
  - type: text
    content: I hate them with complete hatred;
  - type: text
    content: I count them my enemies.
  '23':
  - type: text
    content: Search me, O God, and know my heart!
  - type: note
    content: Ps. 26:2
  - type: text
    content: Try me and know my thoughts!
  - type: note
    content: Or cares
  '24':
  - type: text
    content: And see if there be any grievous way in me,
  - type: text
    content: 'and '
  - type: note
    content: ver. 10
  - type: text
    content: 'lead me in '
  - type: note
    content: '[Jer. 6:16; 18:15]'
  - type: text
    content: the way everlasting!
  - type: note
    content: Or in the ancient way (compare Jeremiah 6:16)
  '3':
  - type: text
    content: You search out my path and my lying down
  - type: text
    content: and are acquainted with all my ways.
  '4':
  - type: text
    content: Even before a word is on my tongue,
  - type: text
    content: 'behold, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Heb. 4:13
  - type: text
    content: you know it altogether.
  '5':
  - type: text
    content: 'You '
  - type: note
    content: Job 19:8
  - type: text
    content: hem me in, behind and before,
  - type: text
    content: 'and '
  - type: note
    content: Job 9:33
  - type: text
    content: lay your hand upon me.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Rom. 11:33
  - type: text
    content: 'Such knowledge is '
  - type: note
    content: Job 42:3
  - type: text
    content: too wonderful for me;
  - type: text
    content: it is high; I cannot attain it.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 23:24 ]'
  - type: text
    content: Where shall I go from your Spirit?
  - type: text
    content: 'Or where '
  - type: note
    content: Jonah 1:3
  - type: text
    content: shall I flee from your presence?
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 9:2 ]'
  - type: text
    content: If I ascend to heaven, you are there!
  - type: note
    content: '[ Job 26:6 ]'
  - type: text
    content: If I make my bed in Sheol, you are there!
  '9':
  - type: text
    content: If I take the wings of the morning
  - type: text
    content: and dwell in the uttermost parts of the sea,
