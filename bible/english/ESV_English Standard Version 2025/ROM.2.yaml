document_id: ROM.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Righteous Judgment
  - type: text
    content: 'Therefore you have '
  - type: note
    content: ch. 1:20
  - type: text
    content: 'no excuse, O man, every one of you who judges. For '
  - type: note
    content: 2 Sam. 12:5-7; [John 8:7]; See Matt. 7:2
  - type: text
    content: 'in passing judgment on another you condemn yourself, because you, the judge, practice the very same things. '
  '10':
  - type: text
    content: 'but glory and honor and '
  - type: note
    content: Isa. 57:19
  - type: text
    content: 'peace for everyone who does good, '
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'the Jew first and also the Greek. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: See Acts 10:34
  - type: text
    content: God shows no partiality.
  - type: heading
    content: God’s Judgment and the Law
  '12':
  - type: text
    content: 'For all who have sinned '
  - type: note
    content: 1 Cor. 9:21
  - type: text
    content: 'without the law will also perish without the law, and all who have sinned under the law will be judged by the law. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: See James 1:22, 23
  - type: text
    content: 'it is not the hearers of the law who are righteous before God, but the doers of the law who will be justified. '
  '14':
  - type: text
    content: 'For when Gentiles, who do not have the law, '
  - type: note
    content: See ch. 1:19
  - type: text
    content: 'by nature do what the law requires, they are a law to themselves, even though they do not have the law. '
  '15':
  - type: text
    content: 'They show that the work of the law is '
  - type: note
    content: Jer. 31:33
  - type: text
    content: 'written on their hearts, while their conscience also bears witness, and their conflicting thoughts accuse or even excuse them '
  '16':
  - type: note
    content: '[ch. 3:6; 14:10; 1 Cor. 4:5]; See Acts 10:42; 17:31'
  - type: text
    content: 'on that day when, '
  - type: note
    content: ch. 16:25; 2 Tim. 2:8; [Gal. 1:11; 1 Tim. 1:11]
  - type: text
    content: 'according to my gospel, God judges '
  - type: note
    content: Eccles. 12:14
  - type: text
    content: 'the secrets of men '
  - type: note
    content: ch. 16:25; [1 Tim. 1:11; 2 Tim. 2:8]
  - type: text
    content: by Christ Jesus.
  '17':
  - type: text
    content: 'But if you call yourself a Jew and '
  - type: note
    content: ver. 23; Mic. 3:11; [ch. 9:4; John 5:45]
  - type: text
    content: 'rely on the law and boast in God '
  '18':
  - type: text
    content: 'and know his will and approve what is excellent, because you are instructed from the law; '
  '19':
  - type: text
    content: 'and if you are sure that you yourself are '
  - type: note
    content: '[Job 29:15; Matt. 15:14; 23:16; John 9:39-41]'
  - type: text
    content: 'a guide to the blind, a light to those who are in darkness, '
  '2':
  - type: text
    content: 'We know that the judgment of God rightly falls on those who practice such things. '
  '20':
  - type: text
    content: 'an instructor of the foolish, a teacher of children, having in the law '
  - type: note
    content: 2 Tim. 3:5; [Gal. 4:19; 2 Tim. 1:13]
  - type: text
    content: 'the embodiment of '
  - type: note
    content: Luke 11:52
  - type: text
    content: 'knowledge and truth— '
  '21':
  - type: note
    content: Matt. 23:3-28; [Ps. 50:16-21; Matt. 15:1-9]
  - type: text
    content: 'you then who teach others, do you not teach yourself? While you preach against stealing, do you steal? '
  '22':
  - type: text
    content: 'You who say that one must not commit adultery, do you commit adultery? You who abhor idols, do you '
  - type: note
    content: Acts 19:37; [Mal. 3:8]
  - type: text
    content: 'rob temples? '
  '23':
  - type: text
    content: 'You who '
  - type: note
    content: See ver. 17; ch. 3:27
  - type: text
    content: 'boast in the law '
  - type: note
    content: '[Mal. 1:6]'
  - type: text
    content: 'dishonor God by breaking the law. '
  '24':
  - type: text
    content: 'For, '
  - type: note
    content: Cited from Isa. 52:5
  - type: text
    content: 'as it is written, “The name of God is blasphemed '
  - type: note
    content: '[2 Sam. 12:14; Ezek. 36:20, 23; 2 Pet. 2:2]'
  - type: text
    content: among the Gentiles because of you.”
  '25':
  - type: text
    content: 'For circumcision indeed is of value '
  - type: note
    content: Gal. 5:3
  - type: text
    content: 'if you obey the law, but if you break the law, your circumcision becomes uncircumcision. '
  '26':
  - type: text
    content: 'So, if '
  - type: note
    content: Eph. 2:11; [ch. 3:30]
  - type: text
    content: 'a man who is uncircumcised keeps '
  - type: note
    content: ch. 1:32; 8:4
  - type: text
    content: the precepts of the law, will not his uncircumcision be regarded
  - type: note
    content: Or counted
  - type: text
    content: ' as circumcision? '
  '27':
  - type: text
    content: Then he who is physically
  - type: note
    content: Or is by nature
  - type: text
    content: ' uncircumcised but keeps the law '
  - type: note
    content: See Matt. 12:41
  - type: text
    content: 'will condemn you who have '
  - type: note
    content: ver. 29; ch. 7:6; 2 Cor. 3:6
  - type: text
    content: the written code
  - type: note
    content: Or the letter
  - type: text
    content: ' and circumcision but break the law. '
  '28':
  - type: text
    content: 'For '
  - type: note
    content: ch. 9:6-8; [Gal. 6:15]
  - type: text
    content: 'no one is a Jew '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'who is merely one outwardly, nor is circumcision outward and physical. '
  '29':
  - type: text
    content: 'But a Jew is one '
  - type: note
    content: See 1 Pet. 3:4
  - type: text
    content: 'inwardly, and '
  - type: note
    content: '[Deut. 10:16; 30:6; Jer. 4:4; Acts 7:51; Phil. 3:3; Col. 2:11]'
  - type: text
    content: 'circumcision is a matter of the heart, by the Spirit, not by the letter. '
  - type: note
    content: 2 Cor. 10:18; 1 Thess. 2:4; [Gal. 1:10]
  - type: text
    content: His praise is not from man but from God.
  '3':
  - type: text
    content: 'Do you suppose, O man—you who judge those who practice such things and yet do them yourself—that you will escape the judgment of God? '
  '4':
  - type: text
    content: 'Or do you presume on '
  - type: note
    content: ch. 9:23; 10:12
  - type: text
    content: 'the riches of his kindness and '
  - type: note
    content: ch. 3:25
  - type: text
    content: 'forbearance and '
  - type: note
    content: ch. 9:22; [Ex. 34:6]
  - type: text
    content: 'patience, '
  - type: note
    content: Isa. 30:18; 2 Pet. 3:9, 15; Rev. 2:21
  - type: text
    content: 'not knowing that God’s kindness is meant to lead you to repentance? '
  '5':
  - type: text
    content: 'But because of your hard and impenitent heart you are '
  - type: note
    content: '[Deut. 32:34]; See James 5:3'
  - type: text
    content: 'storing up '
  - type: note
    content: Ps. 110:5
  - type: text
    content: wrath for yourself on the day of wrath when God’s righteous judgment will be revealed.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 34:11; Ps. 62:12; Prov. 24:12; Jer. 17:10; 32:19; See Matt. 16:27
  - type: text
    content: 'He will render to each one according to his works: '
  '7':
  - type: text
    content: 'to those who '
  - type: note
    content: See Luke 8:15
  - type: text
    content: 'by patience in well-doing seek for glory and honor and immortality, he will give eternal life; '
  '8':
  - type: text
    content: but for those who are self-seeking
  - type: note
    content: Or contentious
  - type: text
    content: ' and '
  - type: note
    content: 2 Thess. 2:12
  - type: text
    content: 'do not obey the truth, but obey unrighteousness, there will be wrath and fury. '
  '9':
  - type: text
    content: 'There will be tribulation and distress '
  - type: note
    content: Ezek. 18:20
  - type: text
    content: 'for every human being who does evil, the Jew '
  - type: note
    content: See 1 Pet. 4:17
  - type: text
    content: 'first and also the Greek, '
