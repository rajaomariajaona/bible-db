  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: '[Isa. 24:23]'
  - type: text
    content: great in Zion;
  - type: text
    content: 'he is '
  - type: note
