  - type: text
    content: loves justice.
  - type: note
    content: Or The might of the King loves justice
  - type: text
    content: You have established equity;
  - type: text
    content: you have executed justice
  - type: text
    content: and righteousness in Jacob.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps. 107:32; 118:28; Ex. 15:2; Isa. 25:1
  - type: text
    content: 'Exalt the '
  - type: text
    content: Lord
  - type: text
    content: ' our God;'
  - type: note
    content: Ps. 132:7; 1 Chr. 28:2
  - type: text
    content: 'worship at his '
  - type: note
    content: Isa. 60:13; Lam. 2:1; Ezek. 43:7
  - type: text
    content: footstool!
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: Holy is he!
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 15:1 ]'
  - type: text
    content: 'Moses and Aaron were among his '
