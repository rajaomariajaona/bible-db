  - type: text
    content: called upon his name.
  - type: text
    content: 'They '
  - type: note
    content: Ps. 106:23; Ex. 14:15; 17:11, 12; 32:30; Num. 12:13; 16:48; Deut. 9:18
  - type: text
    content: 'called to the '
  - type: text
