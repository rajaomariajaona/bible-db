document_id: 2CH.11,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam Secures His Kingdom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-4, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 12:21-24
      marker-yv: yv-n
    - type: text
      text: 'When Rehoboam came to Jerusalem, he assembled the house of Judah and Benjamin, 180,000 chosen warriors, to fight against Israel, to restore the kingdom to Rehoboam. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorah, Aijalon, and Hebron, fortified cities that are in Judah and in Benjamin. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made the fortresses strong, and put commanders in them, and stores of food, oil, and wine. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he put shields and spears in all the cities and made them very strong. So he held Judah and Benjamin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Priests and Levites Come to Jerusalem
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priests and the Levites who were in all Israel presented themselves to him from all places where they lived. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Levites left '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:2
      marker-yv: yv-n
    - type: text
      text: 'their common lands and their holdings and came to Judah and Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:9
      marker-yv: yv-n
    - type: text
      text: 'because Jeroboam and his sons cast them out from serving as priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he appointed his own '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 12:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:33
      marker-yv: yv-n
    - type: text
      text: 'priests for the high places and for the goat idols and for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 12:28
      marker-yv: yv-n
    - type: text
      text: 'the calves that he had made. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:9
      marker-yv: yv-n
    - type: text
      text: 'And those who had set their hearts to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel came after them from all the tribes of Israel to Jerusalem to sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their fathers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: They strengthened the kingdom of Judah, and for three years they made Rehoboam the son of Solomon secure, for they walked for three years in the way of David and Solomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam’s Family
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam took as wife Mahalath the daughter of Jerimoth the son of David, and of Abihail the daughter of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 16:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 27:18
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Eliab the son of Jesse, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and she bore him sons, Jeush, Shemariah, and Zaham. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'Shemaiah the man of God: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After her he took '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 15:2
      marker-yv: yv-n
    - type: text
      text: 'Maacah the daughter of Absalom, who bore him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 14:31
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Abijah, Attai, Ziza, and Shelomith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam loved Maacah the daughter of Absalom above all his wives and concubines (he took eighteen wives and sixty concubines, and fathered twenty-eight sons and sixty daughters). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 21:15-17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'And Rehoboam appointed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Abijah the son of Maacah as chief prince among his brothers, for he intended to make him king. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he dealt wisely and distributed some of his sons through all the districts of Judah and Benjamin, in all the fortified cities, and he gave them abundant provisions and procured wives for them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and sought a multitude of wives
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Say to Rehoboam the son of Solomon, king of Judah, and to all Israel in Judah and Benjamin, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', You shall not go up or fight against '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: 'your relatives. Return every man to his home, for this thing is from me.’” So they listened to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and returned and did not go against Jeroboam.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam lived in Jerusalem, and he built '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:3
      marker-yv: yv-n
    - type: text
      text: 'cities for defense in Judah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built Bethlehem, Etam, Tekoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-zur, Soco, Adullam, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gath, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:9
      marker-yv: yv-n
    - type: text
      text: 'Mareshah, Ziph, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoraim, Lachish, Azekah, '
