document_id: 2CH.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rehoboam Secures His Kingdom
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see 1 Kgs. 12:21-24
  - type: text
    content: 'When Rehoboam came to Jerusalem, he assembled the house of Judah and Benjamin, 180,000 chosen warriors, to fight against Israel, to restore the kingdom to Rehoboam. '
  '10':
  - type: text
    content: 'Zorah, Aijalon, and Hebron, fortified cities that are in Judah and in Benjamin. '
  '11':
  - type: text
    content: 'He made the fortresses strong, and put commanders in them, and stores of food, oil, and wine. '
  '12':
  - type: text
    content: And he put shields and spears in all the cities and made them very strong. So he held Judah and Benjamin.
  - type: heading
    content: Priests and Levites Come to Jerusalem
  '13':
  - type: text
    content: 'And the priests and the Levites who were in all Israel presented themselves to him from all places where they lived. '
  '14':
  - type: text
    content: 'For the Levites left '
  - type: note
    content: Num. 35:2
  - type: text
    content: 'their common lands and their holdings and came to Judah and Jerusalem, '
  - type: note
    content: ch. 13:9
  - type: text
    content: 'because Jeroboam and his sons cast them out from serving as priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '15':
  - type: text
    content: 'and he appointed his own '
  - type: note
    content: 1 Kgs. 12:31; 13:33
  - type: text
    content: 'priests for the high places and for the goat idols and for '
  - type: note
    content: See 1 Kgs. 12:28
  - type: text
    content: 'the calves that he had made. '
  '16':
  - type: note
    content: ch. 15:9
  - type: text
    content: 'And those who had set their hearts to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel came after them from all the tribes of Israel to Jerusalem to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers. '
  '17':
  - type: note
    content: '[ch. 12:1]'
  - type: text
    content: They strengthened the kingdom of Judah, and for three years they made Rehoboam the son of Solomon secure, for they walked for three years in the way of David and Solomon.
  - type: heading
    content: Rehoboam’s Family
  '18':
  - type: text
    content: 'Rehoboam took as wife Mahalath the daughter of Jerimoth the son of David, and of Abihail the daughter of '
  - type: note
    content: 1 Sam. 16:6; 17:13, 28; [1 Chr. 27:18]
  - type: text
    content: 'Eliab the son of Jesse, '
  '19':
  - type: text
    content: 'and she bore him sons, Jeush, Shemariah, and Zaham. '
  '2':
  - type: text
    content: 'But the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to '
  - type: note
    content: ch. 12:5, 15
  - type: text
    content: 'Shemaiah the man of God: '
  '20':
  - type: text
    content: 'After her he took '
  - type: note
    content: 1 Kgs. 15:2
  - type: text
    content: 'Maacah the daughter of Absalom, who bore him '
  - type: note
    content: '[1 Kgs. 14:31]'
  - type: text
    content: 'Abijah, Attai, Ziza, and Shelomith. '
  '21':
  - type: text
    content: 'Rehoboam loved Maacah the daughter of Absalom above all his wives and concubines (he took eighteen wives and sixty concubines, and fathered twenty-eight sons and sixty daughters). '
  '22':
  - type: note
    content: '[Deut. 21:15-17]'
  - type: text
    content: 'And Rehoboam appointed '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'Abijah the son of Maacah as chief prince among his brothers, for he intended to make him king. '
  '23':
  - type: text
    content: And he dealt wisely and distributed some of his sons through all the districts of Judah and Benjamin, in all the fortified cities, and he gave them abundant provisions and procured wives for them.
  - type: note
    content: Hebrew and sought a multitude of wives
  '3':
  - type: text
    content: '“Say to Rehoboam the son of Solomon, king of Judah, and to all Israel in Judah and Benjamin, '
  '4':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', You shall not go up or fight against '
  - type: note
    content: ch. 28:8, 11
  - type: text
    content: 'your relatives. Return every man to his home, for this thing is from me.’” So they listened to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and returned and did not go against Jeroboam.'
  '5':
  - type: text
    content: 'Rehoboam lived in Jerusalem, and he built '
  - type: note
    content: ver. 23; ch. 8:5; 12:4; 14:6; 17:2, 19; 21:3
  - type: text
    content: 'cities for defense in Judah. '
  '6':
  - type: text
    content: 'He built Bethlehem, Etam, Tekoa, '
  '7':
  - type: text
    content: 'Beth-zur, Soco, Adullam, '
  '8':
  - type: text
    content: 'Gath, '
  - type: note
    content: ch. 14:9
  - type: text
    content: 'Mareshah, Ziph, '
  '9':
  - type: text
    content: 'Adoraim, Lachish, Azekah, '
