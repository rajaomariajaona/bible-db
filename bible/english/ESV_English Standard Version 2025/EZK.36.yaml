document_id: EZK.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy to the Mountains of Israel
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, prophesy to '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'the mountains of Israel, and say, O mountains of Israel, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ver. 37; ch. 37:26; Jer. 30:19
  - type: text
    content: 'I will multiply people on you, the whole house of Israel, all of it. '
  - type: note
    content: '[ver. 33, 35]'
  - type: text
    content: 'The cities shall be inhabited and the waste places rebuilt. '
  '11':
  - type: text
    content: 'And I will multiply on you '
  - type: note
    content: Jer. 31:27; [Jer. 33:12]
  - type: text
    content: 'man and beast, and '
  - type: note
    content: '[Gen. 1:28]'
  - type: text
    content: 'they shall multiply and be fruitful. And I will cause you to be inhabited as in '
  - type: note
    content: '[ch. 16:55]'
  - type: text
    content: 'your former times, and '
  - type: note
    content: '[Job 42:12]'
  - type: text
    content: 'will do more good to you than ever before. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'I will let people walk on you, even my people Israel. '
  - type: note
    content: Obad. 17
  - type: text
    content: 'And they shall possess you, and you shall be their inheritance, and you shall no longer '
  - type: note
    content: '[ch. 5:17]'
  - type: text
    content: 'bereave them of children. '
  '13':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because they say to you, '
  - type: note
    content: '[Num. 13:32]'
  - type: text
    content: '‘You devour people, and you bereave your nation of children,’ '
  '14':
  - type: text
    content: 'therefore you shall no longer devour people and no longer bereave your nation of children, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And I will not let you hear anymore '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the reproach of the nations, and you shall no longer bear the disgrace of the peoples and no longer cause your nation to stumble, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  - type: heading
    content: The Lord’s Concern for His Holy Name
  '16':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '17':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, when the house of Israel lived in their own land, '
  - type: note
    content: See Lev. 18:25
  - type: text
    content: 'they defiled it by their ways and their deeds. Their ways before me were '
  - type: note
    content: See Lev. 18:19
  - type: text
    content: 'like the uncleanness of a woman in her menstrual impurity. '
  '18':
  - type: text
    content: 'So '
  - type: note
    content: See ch. 7:8
  - type: text
    content: 'I poured out my wrath upon them '
  - type: note
    content: ch. 16:36; 22:3
  - type: text
    content: 'for the blood that they had shed in the land, for the idols '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'with which they had defiled it. '
  '19':
  - type: note
    content: See ch. 5:10
  - type: text
    content: 'I scattered them among the nations, and they were dispersed through the countries. '
  - type: note
    content: See ch. 18:30
  - type: text
    content: 'In accordance with their ways and their deeds I judged them. '
  '2':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because '
  - type: note
    content: ver. 5; ch. 35:10, 12
  - type: text
    content: 'the enemy said of you, '
  - type: note
    content: ch. 25:3; 26:2
  - type: text
    content: '‘Aha!’ and, ‘The ancient '
  - type: note
    content: Deut. 32:13
  - type: text
    content: 'heights have become our possession,’ '
  '20':
  - type: text
    content: 'But when they came to the nations, wherever they came, '
  - type: note
    content: Isa. 52:5; [ch. 22:26; Rom. 2:24]
  - type: text
    content: 'they profaned my holy name, in that people said of them, ‘These are the people of the '
  - type: text
    content: Lord
  - type: text
    content: ', and yet they had to go out of his land.’ '
  '21':
  - type: text
    content: 'But I had concern '
  - type: note
    content: '[ch. 20:9; Isa. 43:25; 48:11]'
  - type: text
    content: for my holy name, which the house of Israel had profaned among the nations to which they came.
  - type: heading
    content: I Will Put My Spirit Within You
  '22':
  - type: text
    content: '“Therefore say to the house of Israel, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ver. 32; [Deut. 9:5]
  - type: text
    content: 'It is not for your sake, O house of Israel, that I am about to act, but for the sake of my holy name, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'which you have profaned among the nations to which you came. '
  '23':
  - type: note
    content: See ch. 20:41
  - type: text
    content: 'And I will vindicate the holiness of my great name, which has been profaned among the nations, and which you have profaned among them. '
  - type: note
    content: '[ch. 30:19, 26; 38:23; 39:7, 21]; See ch. 6:7'
  - type: text
    content: 'And the nations will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', when through you I vindicate my holiness before their eyes. '
  '24':
  - type: note
    content: See ch. 11:17
  - type: text
    content: 'I will take you '
  - type: note
    content: See Ps. 44:11
  - type: text
    content: 'from the nations and gather you from all the countries and '
  - type: note
    content: ch. 37:12, 21
  - type: text
    content: 'bring you into your own land. '
  '25':
  - type: note
    content: '[Isa. 52:15; Heb. 10:22]'
  - type: text
    content: 'I will sprinkle clean water on you, and you shall be clean from '
  - type: note
    content: Isa. 4:4; [ver. 17]
  - type: text
    content: 'all your uncleannesses, and '
  - type: note
    content: ch. 37:23
  - type: text
    content: 'from all your idols '
  - type: note
    content: Jer. 33:8
  - type: text
    content: 'I will cleanse you. '
  '26':
  - type: text
    content: 'And I will give you '
  - type: note
    content: See ch. 11:19, 20
  - type: text
    content: 'a new heart, and '
  - type: note
    content: See ch. 11:19, 20
  - type: text
    content: 'a new spirit I will put within you. '
  - type: note
    content: See ch. 11:19, 20
  - type: text
    content: 'And I will remove the heart of stone from your flesh and give you a heart of flesh. '
  '27':
  - type: note
    content: ch. 37:14
  - type: text
    content: 'And I will put my Spirit within you, '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'and cause you to walk in my statutes and '
  - type: note
    content: ch. 37:24
  - type: text
    content: be careful to obey my rules.
  - type: note
    content: Or my just decrees
  - type: text
    content: ' '
  '28':
  - type: note
    content: ch. 28:25
  - type: text
    content: 'You shall dwell in the land that I gave to your fathers, and '
  - type: note
    content: See ch. 11:20
  - type: text
    content: 'you shall be my people, and I will be your God. '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: ch. 37:23; [Matt. 1:21]
  - type: text
    content: 'I will deliver you from all your uncleannesses. And '
  - type: note
    content: Joel 2:19; [Zech. 9:17]
  - type: text
    content: 'I will summon the grain and make it abundant and '
  - type: note
    content: ch. 34:29
  - type: text
    content: 'lay no famine upon you. '
  '3':
  - type: text
    content: 'therefore prophesy, and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Precisely because '
  - type: note
    content: '[ch. 6:3, 4]'
  - type: text
    content: 'they made you desolate and crushed you from all sides, so that you became the possession of the rest of the nations, and '
  - type: note
    content: '[Lam. 2:15, 16]'
  - type: text
    content: 'you became the talk and evil gossip of the people, '
  '30':
  - type: note
    content: ch. 34:27
  - type: text
    content: 'I will make the fruit of the tree and the increase of the field abundant, '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'that you may never again suffer the disgrace of famine among the nations. '
  '31':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 6:9
  - type: text
    content: 'you will remember your evil ways, and your deeds that were not good, and you will loathe yourselves for your iniquities and your abominations. '
  '32':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'It is not for your sake that I will act, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ; let that be known to you. Be ashamed and confounded for your ways, O house of Israel.
  '33':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': On the day that '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'I cleanse you from all your iniquities, '
  - type: note
    content: '[ver. 9, 10]'
  - type: text
    content: 'I will cause the cities to be inhabited, and the waste places shall be rebuilt. '
  '34':
  - type: text
    content: 'And the land that was desolate shall be tilled, instead of being the desolation that it was in the sight of all who passed by. '
  '35':
  - type: text
    content: 'And they will say, ‘This land that was desolate has become like '
  - type: note
    content: See Isa. 51:3
  - type: text
    content: 'the garden of Eden, and the waste and desolate and ruined cities are now fortified and inhabited.’ '
  '36':
  - type: text
    content: 'Then '
  - type: note
    content: '[Ps. 126:2]'
  - type: text
    content: 'the nations that are left all around you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '; I have rebuilt the ruined places and '
  - type: note
    content: '[ch. 34:29]'
  - type: text
    content: 'replanted that which was desolate. '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ; I have spoken, and I will do it.
  '37':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': This also '
  - type: note
    content: '[ch. 14:3]'
  - type: text
    content: 'I will let the house of Israel ask me to do for them: '
  - type: note
    content: See ver. 10
  - type: text
    content: 'to increase their people like '
  - type: note
    content: '[ch. 34:31]'
  - type: text
    content: 'a flock. '
  '38':
  - type: text
    content: Like the flock for sacrifices,
  - type: note
    content: Hebrew flock of holy things
  - type: text
    content: ' '
  - type: note
    content: '[2 Chr. 35:7]'
  - type: text
    content: 'like the flock at Jerusalem during her appointed feasts, so '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: 'shall the waste cities be filled with flocks of people. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'therefore, O mountains of Israel, hear the word of the Lord '
  - type: text
    content: God
  - type: text
    content: ': Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to '
  - type: note
    content: ch. 6:3
  - type: text
    content: 'the mountains and the hills, the ravines and the valleys, '
  - type: note
    content: '[ch. 33:24, 27]'
  - type: text
    content: 'the desolate wastes and the deserted cities, which have become '
  - type: note
    content: '[ch. 7:21]'
  - type: text
    content: 'a prey and derision to the rest of the nations all around, '
  '5':
  - type: text
    content: 'therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Surely I have spoken in '
  - type: note
    content: Deut. 4:24
  - type: text
    content: 'my hot jealousy against the rest of the nations and '
  - type: note
    content: ch. 35:15
  - type: text
    content: 'against all Edom, who '
  - type: note
    content: '[ver. 3; ch. 35:10]'
  - type: text
    content: 'gave my land to themselves as a possession '
  - type: note
    content: ch. 35:15
  - type: text
    content: 'with wholehearted joy and '
  - type: note
    content: ch. 25:6
  - type: text
    content: 'utter contempt, that they might make its pasturelands a prey. '
  '6':
  - type: text
    content: 'Therefore prophesy concerning the land of Israel, and say to '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the mountains and hills, to the ravines and valleys, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'Behold, I have spoken in my jealous wrath, because you have suffered '
  - type: note
    content: See ch. 32:24
  - type: text
    content: 'the reproach of the nations. '
  '7':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 20:5
  - type: text
    content: 'I swear that the nations that are all around you '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: shall themselves suffer reproach.
  '8':
  - type: text
    content: '“But you, O mountains of Israel, '
  - type: note
    content: See ch. 17:23
  - type: text
    content: 'shall shoot forth your branches and yield your fruit to my people Israel, for '
  - type: note
    content: ch. 12:23; [Isa. 56:1]
  - type: text
    content: 'they will soon come home. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 5:8]'
  - type: text
    content: 'behold, I am for you, and I will turn to you, and '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'you shall be tilled and sown. '
