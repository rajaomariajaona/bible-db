document_id: EXO.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Confirmed
  - type: text
    content: 'Then he said to Moses, “Come up to the '
  - type: text
    content: Lord
  - type: text
    content: ', you and Aaron, '
  - type: note
    content: ch. 28:1; See ch. 6:23
  - type: text
    content: 'Nadab, and Abihu, and '
  - type: note
    content: Num. 11:16
  - type: text
    content: 'seventy of the elders of Israel, and worship from afar. '
  '10':
  - type: text
    content: 'and they '
  - type: note
    content: Gen. 32:30; Judg. 13:22; Isa. 6:1, 5; [ch. 33:20, 23; John 1:18; 1 Tim. 6:16; 1 John 4:12, 20]
  - type: text
    content: 'saw the God of Israel. There was under his feet as it were a pavement of '
  - type: note
    content: Ezek. 1:26; 10:1
  - type: text
    content: 'sapphire stone, like the very heaven for clearness. '
  '11':
  - type: text
    content: 'And he did not lay his hand on the chief men of the people of Israel; they beheld God, and '
  - type: note
    content: '[ch. 18:12; Gen. 31:54]'
  - type: text
    content: ate and drank.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ver. 2, 15, 18
  - type: text
    content: '“Come up to me on the mountain and wait there, that I may give you the '
  - type: note
    content: ch. 31:18; 32:15, 16; Deut. 5:22
  - type: text
    content: 'tablets of stone, with the law and the commandment, which I have written for their instruction.” '
  '13':
  - type: text
    content: 'So Moses rose with his assistant '
  - type: note
    content: ch. 33:11; [ch. 17:9, 10]
  - type: text
    content: 'Joshua, and Moses went up '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'into the mountain of God. '
  '14':
  - type: text
    content: 'And he said to the elders, “Wait here for us until we return to you. And behold, Aaron and '
  - type: note
    content: ch. 17:10, 12; 31:2
  - type: text
    content: Hur are with you. Whoever has a dispute, let him go to them.”
  '15':
  - type: text
    content: 'Then Moses went up on the mountain, and '
  - type: note
    content: ch. 19:9, 16; [Matt. 17:5]
  - type: text
    content: 'the cloud covered the mountain. '
  '16':
  - type: note
    content: ch. 16:10; Lev. 9:23; Num. 14:10; 16:42
  - type: text
    content: 'The glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' dwelt on Mount Sinai, and the cloud covered it six days. And on the seventh day he called to Moses out of the midst of the cloud. '
  '17':
  - type: text
    content: 'Now the appearance of the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' was like a '
  - type: note
    content: ch. 3:2; 19:18; Deut. 4:36; Heb. 12:18, 29
  - type: text
    content: 'devouring fire on the top of the mountain in the sight of the people of Israel. '
  '18':
  - type: text
    content: 'Moses entered the cloud and went up on the mountain. And Moses '
  - type: note
    content: ch. 34:28; Deut. 9:9, 18, 25; 10:10
  - type: text
    content: was on the mountain forty days and forty nights.
  '2':
  - type: text
    content: 'Moses '
  - type: note
    content: ver. 13, 15, 18
  - type: text
    content: 'alone shall come near to the '
  - type: text
    content: Lord
  - type: text
    content: ', but the others shall not come near, and the people shall not come up with him.”'
  '3':
  - type: text
    content: 'Moses came and told the people all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: ch. 21:1
  - type: text
    content: all the rules.
  - type: note
    content: Or all the just decrees
  - type: text
    content: ' And all the people answered with one voice and said, '
  - type: note
    content: ch. 19:8; Deut. 5:27
  - type: text
    content: '“All the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken we will do.” '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 31:9
  - type: text
    content: 'Moses wrote down all the words of the '
  - type: text
    content: Lord
  - type: text
    content: '. He rose early in the morning and built an altar at the foot of the mountain, and twelve '
  - type: note
    content: Gen. 28:18; 31:45; [ch. 23:24]
  - type: text
    content: 'pillars, according to the twelve tribes of Israel. '
  '5':
  - type: text
    content: 'And he sent young men of the people of Israel, who offered burnt offerings and sacrificed peace offerings of oxen to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Heb. 9:18, 19
  - type: text
    content: 'Moses took half of the blood and put it in basins, and half of the blood he threw against the altar. '
  '7':
  - type: text
    content: 'Then he took the Book of the Covenant and read it in the hearing of the people. And they said, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '“All that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken we will do, and we will be obedient.” '
  '8':
  - type: note
    content: Cited Heb. 9:19, 20; [Heb. 13:20; 1 Pet. 1:2]
  - type: text
    content: 'And Moses took the blood and threw it on the people and said, “Behold the blood of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' has made with you in accordance with all these words.”'
  '9':
  - type: text
    content: 'Then Moses and Aaron, Nadab, and Abihu, and '
  - type: note
    content: Num. 11:16
  - type: text
    content: 'seventy of the elders of Israel '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'went up, '
