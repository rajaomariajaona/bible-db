document_id: JER.37,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Warns Zedekiah
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 24:17; 2 Chr. 36:10
  - type: text
    content: 'Zedekiah the son of Josiah, '
  - type: note
    content: '[Ezek. 17:13]'
  - type: text
    content: 'whom Nebuchadnezzar king of Babylon made king in the land of Judah, reigned instead of '
  - type: note
    content: ch. 22:24
  - type: text
    content: 'Coniah the son of Jehoiakim. '
  '10':
  - type: note
    content: '[ch. 21:4]'
  - type: text
    content: 'For even if you should defeat the whole army of Chaldeans who are fighting against you, and there remained of them only wounded men, every man in his tent, they would rise up and '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: burn this city with fire.’”
  - type: heading
    content: Jeremiah Imprisoned
  '11':
  - type: text
    content: 'Now when '
  - type: note
    content: ver. 5
  - type: text
    content: 'the Chaldean army had withdrawn from Jerusalem at the approach of Pharaoh’s army, '
  '12':
  - type: text
    content: 'Jeremiah set out from Jerusalem to go to '
  - type: note
    content: ch. 1:1; 32:8
  - type: text
    content: 'the land of Benjamin '
  - type: note
    content: '[ch. 32:9]'
  - type: text
    content: 'to receive his portion there '
  - type: note
    content: ver. 4; ch. 39:14
  - type: text
    content: 'among the people. '
  '13':
  - type: text
    content: 'When he was at '
  - type: note
    content: ch. 38:7; Zech. 14:10
  - type: text
    content: 'the Benjamin Gate, a sentry there named Irijah the son of '
  - type: note
    content: ver. 3; ch. 38:1
  - type: text
    content: 'Shelemiah, son of Hananiah, seized Jeremiah the prophet, saying, '
  - type: note
    content: '[ch. 21:9; 38:19; 39:9; 52:15]'
  - type: text
    content: '“You are deserting to the Chaldeans.” '
  '14':
  - type: text
    content: 'And Jeremiah said, “It is a lie; I am not deserting to the Chaldeans.” But Irijah would not listen to him, and seized Jeremiah and brought him to '
  - type: note
    content: ch. 36:12
  - type: text
    content: 'the officials. '
  '15':
  - type: text
    content: 'And the officials were enraged at Jeremiah, and they beat him '
  - type: note
    content: '[Heb. 11:36]'
  - type: text
    content: and imprisoned him in the house of Jonathan the secretary, for it had been made a prison.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See ch. 38:6-14
  - type: text
    content: 'When Jeremiah had come to the dungeon cells and remained there many days, '
  '17':
  - type: text
    content: 'King Zedekiah sent for him and received him. The king questioned him '
  - type: note
    content: ch. 38:16
  - type: text
    content: 'secretly in his house and said, “Is there any word from the '
  - type: text
    content: Lord
  - type: text
    content: '?” Jeremiah said, “There is.” Then he said, '
  - type: note
    content: See ch. 21:7
  - type: text
    content: '“You shall be delivered into the hand of the king of Babylon.” '
  '18':
  - type: text
    content: 'Jeremiah also said to King Zedekiah, “What wrong have I done to you or your servants or this people, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'that you have put me in prison? '
  '19':
  - type: note
    content: '[ch. 28:2, 11, 17]'
  - type: text
    content: 'Where are your prophets who prophesied to you, saying, ‘The king of Babylon will not come against you and against this land’? '
  '2':
  - type: note
    content: See 2 Chr. 36:12-14
  - type: text
    content: 'But neither he nor his servants nor the people of the land listened to the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke through Jeremiah the prophet.'
  '20':
  - type: text
    content: 'Now hear, please, O my lord the king: '
  - type: note
    content: '[ch. 38:26]'
  - type: text
    content: 'let my humble plea come before you and '
  - type: note
    content: '[ch. 38:28]'
  - type: text
    content: 'do not send me back to the house of Jonathan the secretary, lest I die there.” '
  '21':
  - type: text
    content: 'So King Zedekiah gave orders, and they committed Jeremiah to '
  - type: note
    content: See ch. 32:2
  - type: text
    content: 'the court of the guard. And a loaf of bread was given him daily from the bakers’ street, '
  - type: note
    content: ch. 38:9; 52:6; Ezek. 4:10, 16
  - type: text
    content: 'until all the bread of the city was gone. So Jeremiah remained in '
  - type: note
    content: See ch. 32:2
  - type: text
    content: the court of the guard.
  '3':
  - type: text
    content: 'King Zedekiah sent '
  - type: note
    content: '[ch. 38:1]'
  - type: text
    content: 'Jehucal the son of '
  - type: note
    content: ver. 13; ch. 38:1
  - type: text
    content: 'Shelemiah, and '
  - type: note
    content: See ch. 21:1
  - type: text
    content: 'Zephaniah the priest, the son of '
  - type: note
    content: See ch. 35:4
  - type: text
    content: 'Maaseiah, to Jeremiah the prophet, saying, “Please '
  - type: note
    content: '[ch. 21:2]'
  - type: text
    content: 'pray for us to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.” '
  '4':
  - type: note
    content: '[Num. 27:17]'
  - type: text
    content: 'Now Jeremiah was still going in and out among the people, '
  - type: note
    content: '[ch. 32:2; 33:1]'
  - type: text
    content: 'for he had not yet been put in prison. '
  '5':
  - type: note
    content: '[Ezek. 17:15]'
  - type: text
    content: 'The army of Pharaoh had come out of Egypt. And when '
  - type: note
    content: ch. 32:2
  - type: text
    content: 'the Chaldeans who were besieging Jerusalem heard news about them, '
  - type: note
    content: ver. 11; ch. 34:21
  - type: text
    content: they withdrew from Jerusalem.
  '6':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah the prophet: '
  '7':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel: Thus shall you say to the king of Judah who '
  - type: note
    content: '[ch. 21:2]'
  - type: text
    content: 'sent you to me to inquire of me, ‘Behold, '
  - type: note
    content: '[Ezek. 29:2, 6]'
  - type: text
    content: 'Pharaoh’s army that came to help you is about to '
  - type: note
    content: '[ch. 46:17; 2 Kgs. 24:7; Lam. 4:17]'
  - type: text
    content: 'return to Egypt, to its own land. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 34:22
  - type: text
    content: 'the Chaldeans shall come back and fight against this city. '
  - type: note
    content: ch. 34:22
  - type: text
    content: 'They shall capture it and burn it with fire. '
  '9':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Do not deceive yourselves, saying, “The Chaldeans will surely go away from us,” for they will not go away. '
