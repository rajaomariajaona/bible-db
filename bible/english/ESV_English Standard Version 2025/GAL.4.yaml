document_id: GAL.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sons and Heirs
  - type: text
    content: I mean that the heir, as long as he is a child, is no different from a slave,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; also verse 7
  - type: text
    content: ' though he is the owner of everything, '
  '10':
  - type: note
    content: Rom. 14:5; Col. 2:16
  - type: text
    content: 'You observe days and months and seasons and years! '
  '11':
  - type: text
    content: 'I am afraid '
  - type: note
    content: ch. 2:2; 5:2, 4; 1 Thess. 3:5
  - type: text
    content: I may have labored over you in vain.
  '12':
  - type: text
    content: Brothers,
  - type: note
    content: Or Brothers and sisters; also verses 28, 31
  - type: text
    content: ' '
  - type: note
    content: '[2 Cor. 6:13]'
  - type: text
    content: 'I entreat you, become as I am, for I also have become as you are. '
  - type: note
    content: '[2 Cor. 2:5]'
  - type: text
    content: 'You did me no wrong. '
  '13':
  - type: text
    content: 'You know it was '
  - type: note
    content: See 1 Cor. 2:3
  - type: text
    content: 'because of a bodily ailment that I preached the gospel to you '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: 'at first, '
  '14':
  - type: text
    content: 'and though my condition was a trial to you, you did not scorn or despise me, but received me '
  - type: note
    content: 1 Sam. 29:9; [Mal. 2:7 (Gk.); 2 Cor. 5:20]
  - type: text
    content: 'as an angel of God, '
  - type: note
    content: See Matt. 10:40
  - type: text
    content: 'as Christ Jesus. '
  '15':
  - type: text
    content: 'What then has become of your blessedness? For I testify to you that, if possible, you would have gouged out your eyes and given them to me. '
  '16':
  - type: text
    content: 'Have I then become your enemy by '
  - type: note
    content: See ch. 2:5
  - type: text
    content: telling you the truth?
  - type: note
    content: Or by dealing truthfully with you
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'They make much of you, but for no good purpose. They want to shut you out, that you may make much of them. '
  '18':
  - type: text
    content: 'It is always good to be made much of for a good purpose, and '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'not only when I am present with you, '
  '19':
  - type: note
    content: '[1 Cor. 4:15; Philem. 10]'
  - type: text
    content: 'my little children, '
  - type: note
    content: '[James 1:18]'
  - type: text
    content: 'for whom I am again in the anguish of childbirth until Christ '
  - type: note
    content: Rom. 8:10
  - type: text
    content: 'is formed in you! '
  '2':
  - type: text
    content: 'but he is under guardians and managers until the date set by his father. '
  '20':
  - type: text
    content: I wish I could be present with you now and change my tone, for I am perplexed about you.
  - type: heading
    content: Example of Hagar and Sarah
  '21':
  - type: text
    content: 'Tell me, you who desire to be under the law, do you not listen to the law? '
  '22':
  - type: text
    content: 'For it is written that Abraham had two sons, '
  - type: note
    content: Gen. 16:5
  - type: text
    content: 'one by a slave woman and '
  - type: note
    content: Gen. 21:2
  - type: text
    content: 'one by a free woman. '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ver. 29; [Rom. 9:7]
  - type: text
    content: 'the son of the slave was born according to the flesh, while '
  - type: note
    content: ver. 28; Gen. 17:16-19; 18:10, 14; 21:1, 2; Heb. 11:11
  - type: text
    content: 'the son of the free woman was born through promise. '
  '24':
  - type: text
    content: 'Now this may be interpreted allegorically: these women are two '
  - type: note
    content: See Rom. 9:4
  - type: text
    content: 'covenants. '
  - type: note
    content: Deut. 33:2
  - type: text
    content: 'One is from Mount Sinai, bearing children for slavery; she is Hagar. '
  '25':
  - type: text
    content: Now Hagar is Mount Sinai in Arabia;
  - type: note
    content: Some manuscripts For Sinai is a mountain in Arabia
  - type: text
    content: ' she corresponds to the present Jerusalem, for she is in slavery with her children. '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: '[Heb. 12:22; Rev. 3:12; 21:2, 10]'
  - type: text
    content: 'the Jerusalem above is free, and she is our mother. '
  '27':
  - type: text
    content: For it is written,
  - type: note
    content: Cited from Isa. 54:1
  - type: text
    content: “Rejoice, O barren one who does not bear;
  - type: text
    content: break forth and cry aloud, you who are not in labor!
  - type: text
    content: For the children of the desolate one will be more
  - type: text
    content: than those of the one who has a husband.”
  '28':
  - type: text
    content: Now you,
  - type: note
    content: Some manuscripts we
  - type: text
    content: ' brothers, '
  - type: note
    content: See ver. 23
  - type: text
    content: 'like Isaac, '
  - type: note
    content: Rom. 9:8; See ch. 3:29
  - type: text
    content: 'are children of promise. '
  '29':
  - type: text
    content: 'But just as at that time he who was born according to the flesh '
  - type: note
    content: Gen. 21:9
  - type: text
    content: 'persecuted him who was born according to the Spirit, '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'so also it is now. '
  '3':
  - type: text
    content: 'In the same way we also, when we were children, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: were enslaved to the elementary principles
  - type: note
    content: Or elemental spirits; also verse 9
  - type: text
    content: ' of the world. '
  '30':
  - type: text
    content: 'But what does the Scripture say? '
  - type: note
    content: Cited from Gen. 21:10; [John 8:35]
  - type: text
    content: '“Cast out the slave woman and her son, for the son of the slave woman shall not inherit with the son of the free woman.” '
  '31':
  - type: text
    content: 'So, brothers, we are not children of the slave but '
  - type: note
    content: '[1 Pet. 3:6]'
  - type: text
    content: of the free woman.
  '4':
  - type: text
    content: 'But '
  - type: note
    content: '[1 Tim. 2:6]; See Mark 1:15'
  - type: text
    content: 'when the fullness of time had come, God sent forth his Son, '
  - type: note
    content: Phil. 2:7; See John 1:14
  - type: text
    content: 'born '
  - type: note
    content: '[1 Tim. 2:15]; See Gen. 3:15'
  - type: text
    content: 'of woman, born '
  - type: note
    content: '[Luke 2:21, 22, 27]'
  - type: text
    content: 'under the law, '
  '5':
  - type: note
    content: See ch. 3:13
  - type: text
    content: 'to redeem those who were under the law, so that we might receive '
  - type: note
    content: ch. 3:26; See Rom. 8:15
  - type: text
    content: 'adoption as sons. '
  '6':
  - type: text
    content: 'And because you are sons, God has sent '
  - type: note
    content: '[Rom. 5:5; 2 Cor. 3:17]; See Acts 16:7'
  - type: text
    content: 'the Spirit of his Son into our hearts, crying, “Abba! Father!” '
  '7':
  - type: text
    content: 'So you are no longer a slave, but a son, and if a son, then '
  - type: note
    content: See ch. 3:29
  - type: text
    content: an heir through God.
  - type: heading
    content: Paul’s Concern for the Galatians
  '8':
  - type: text
    content: 'Formerly, when you '
  - type: note
    content: 1 Cor. 1:21; 1 Thess. 4:5; 2 Thess. 1:8; 1 John 4:8
  - type: text
    content: 'did not know God, you '
  - type: note
    content: '[Eph. 2:11, 12; 1 Thess. 1:9]'
  - type: text
    content: 'were enslaved to those that by nature '
  - type: note
    content: 2 Chr. 13:9; Isa. 37:19; Jer. 2:11; 5:7; 16:20; [1 Cor. 8:4]
  - type: text
    content: 'are not gods. '
  '9':
  - type: text
    content: 'But now that you have come to know God, or rather '
  - type: note
    content: See 1 Cor. 8:3
  - type: text
    content: 'to be known by God, '
  - type: note
    content: '[ch. 3:3]'
  - type: text
    content: 'how can you turn back again to '
  - type: note
    content: Rom. 8:3; Heb. 7:18
  - type: text
    content: 'the weak and worthless elementary principles of the world, whose slaves you want to be once more? '
