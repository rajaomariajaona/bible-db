      marker-yv: yv-n
    - type: text
      text: you shall be gathered to your grave in peace, and your eyes shall not see all the disaster that I will bring upon this place.’” And they brought back word to the king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighteenth year of King Josiah, the king sent Shaphan the son of Azaliah, son of Meshullam, the secretary, to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go up to '
    - type: usfm
