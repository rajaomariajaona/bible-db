          text: '26'
      marker-yv: yv-n
    - type: text
      text: 'Because they have forsaken me and have made offerings to other gods, that they might provoke me to anger with all the work of their hands, therefore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
