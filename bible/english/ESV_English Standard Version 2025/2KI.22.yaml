document_id: 2KI.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: See 2 Chr. 34:1, 2
  - type: text
    content: 'Josiah was eight years old when he began to reign, and he reigned thirty-one years in Jerusalem. His mother’s name was Jedidah the daughter of Adaiah of '
  - type: note
    content: Josh. 15:39
  - type: text
    content: 'Bozkath. '
  '10':
  - type: text
    content: Then Shaphan the secretary told the king, “Hilkiah the priest has given me a book.” And Shaphan read it before the king.
  '11':
  - type: text
    content: 'When the king heard the words of the Book of the Law, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'he tore his clothes. '
  '12':
  - type: text
    content: 'And the king commanded Hilkiah the priest, and '
  - type: note
    content: ch. 25:22; Jer. 26:24; 39:14; 40:5
  - type: text
    content: 'Ahikam the son of Shaphan, and '
  - type: note
    content: '[2 Chr. 34:20]'
  - type: text
    content: 'Achbor the son of '
  - type: note
    content: '[2 Chr. 34:20]'
  - type: text
    content: 'Micaiah, and Shaphan the secretary, and Asaiah the king’s servant, saying, '
  '13':
  - type: text
    content: '“Go, inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ' for me, and for the people, and for all Judah, concerning the words of this book that has been found. For great is '
  - type: note
    content: Deut. 29:27
  - type: text
    content: 'the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' that is kindled against us, because our fathers have not obeyed the words of this book, to do according to all that is written concerning us.”'
  '14':
  - type: text
    content: 'So Hilkiah the priest, and Ahikam, and Achbor, and Shaphan, and Asaiah went to Huldah the prophetess, the wife of Shallum the son of '
  - type: note
    content: '[2 Chr. 34:22]'
  - type: text
    content: 'Tikvah, son of '
  - type: note
    content: '[2 Chr. 34:22]'
  - type: text
    content: 'Harhas, keeper of the wardrobe (now she lived in Jerusalem in '
  - type: note
    content: Zeph. 1:10
  - type: text
    content: 'the Second Quarter), and they talked with her. '
  '15':
  - type: text
    content: 'And she said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: ‘Tell the man who sent you to me, '
  '16':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Behold, I will bring disaster upon this place and upon its inhabitants, all the words of the book that the king of Judah has read. '
  '17':
  - type: note
    content: ch. 21:22; Deut. 29:25, 26
  - type: text
    content: 'Because they have forsaken me and have made offerings to other gods, that they might provoke me to anger with all the work of their hands, therefore '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'my wrath will be kindled against this place, and it will not be quenched. '
  '18':
  - type: text
    content: 'But to the king of Judah, who sent you to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', thus shall you say to him, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Regarding the words that you have heard, '
  '19':
  - type: note
    content: '[Ps. 51:17; Isa. 57:15]'
  - type: text
    content: 'because your heart was penitent, and you '
  - type: note
    content: 1 Kgs. 21:29
  - type: text
    content: 'humbled yourself before the '
  - type: text
    content: Lord
  - type: text
    content: ', when you heard how I spoke against this place and against its inhabitants, that they should become '
  - type: note
    content: Lev. 26:31, 32; 2 Chr. 30:7; Jer. 25:18; 44:22; Mic. 6:16
  - type: text
    content: 'a desolation and '
  - type: note
    content: Jer. 24:9; 26:6; 44:22
  - type: text
    content: 'a curse, and you '
  - type: note
    content: ver. 11
  - type: text
    content: 'have torn your clothes and wept before me, I also have heard you, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and walked in all the way of David his father, '
  - type: note
    content: See Deut. 5:32
  - type: text
    content: and he did not turn aside to the right or to the left.
  - type: heading
    content: Josiah Repairs the Temple
  '20':
  - type: text
    content: 'Therefore, behold, I will gather you to your fathers, and '
  - type: note
    content: Ps. 37:37; Isa. 57:1, 2
  - type: text
    content: you shall be gathered to your grave in peace, and your eyes shall not see all the disaster that I will bring upon this place.’” And they brought back word to the king.
  '3':
  - type: text
    content: 'In the eighteenth year of King Josiah, the king sent Shaphan the son of Azaliah, son of Meshullam, the secretary, to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, '
  '4':
  - type: text
    content: '“Go up to '
  - type: note
    content: '[ch. 12:10]'
  - type: text
    content: 'Hilkiah the high priest, that he may count the money '
  - type: note
    content: ch. 12:4
  - type: text
    content: 'that has been brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', which '
  - type: note
    content: ch. 12:9
  - type: text
    content: 'the keepers of the threshold have collected from the people. '
  '5':
  - type: note
    content: ch. 12:11, 12, 14
  - type: text
    content: 'And let it be given into the hand of the workmen who have the oversight of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and let them give it to the workmen who are at the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', repairing the house '
  '6':
  - type: text
    content: '(that is, to the carpenters, and to the builders, and to the masons), and let them use it for buying timber and quarried stone to repair the house. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: ch. 12:15
  - type: text
    content: no accounting shall be asked from them for the money that is delivered into their hand, for they deal honestly.”
  - type: heading
    content: Hilkiah Finds the Book of the Law
  '8':
  - type: text
    content: 'And Hilkiah the high priest said to Shaphan the secretary, “I have found '
  - type: note
    content: Deut. 31:24-26; 2 Chr. 34:14
  - type: text
    content: 'the Book of the Law in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” And Hilkiah gave the book to Shaphan, and he read it. '
  '9':
  - type: text
    content: 'And Shaphan the secretary came to the king, and reported to the king, “Your servants have emptied out the money that was found in the house and have delivered it into the hand of the workmen who have the oversight of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
