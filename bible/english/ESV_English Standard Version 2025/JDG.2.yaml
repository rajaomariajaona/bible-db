document_id: JDG.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Disobedience
  - type: text
    content: 'Now the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up from Gilgal to '
  - type: note
    content: ver. 5
  - type: text
    content: 'Bochim. And he said, “I brought you up from Egypt and brought you into the land that I swore to give to your fathers. I said, '
  - type: note
    content: Gen. 17:7; Ex. 6:4; Deut. 31:16
  - type: text
    content: '‘I will never break my covenant with you, '
  '10':
  - type: text
    content: 'And all that generation also were gathered to their fathers. And there arose another generation after them who did not know the '
  - type: text
    content: Lord
  - type: text
    content: ' or the work that he had done for Israel.'
  - type: heading
    content: Israel’s Unfaithfulness
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:7; 4:1; 6:1; 10:6; 13:1
  - type: text
    content: 'And the people of Israel did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' and served the Baals. '
  '12':
  - type: note
    content: Deut. 31:16
  - type: text
    content: 'And they abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, who had brought them out of the land of Egypt. '
  - type: note
    content: '[Deut. 6:14]'
  - type: text
    content: 'They went after other gods, from among the gods of the peoples who were around them, and '
  - type: note
    content: ver. 17, 19; [Ex. 20:5]
  - type: text
    content: 'bowed down to them. '
  - type: note
    content: Deut. 31:29
  - type: text
    content: 'And they provoked the '
  - type: text
    content: Lord
  - type: text
    content: ' to anger. '
  '13':
  - type: text
    content: 'They abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 3:7; 10:6; Ps. 106:36; [1 Sam. 7:4]
  - type: text
    content: 'and served the Baals and the Ashtaroth. '
  '14':
  - type: note
    content: ver. 20
  - type: text
    content: 'So the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, and he '
  - type: note
    content: 2 Kgs. 17:20
  - type: text
    content: 'gave them over to plunderers, who plundered them. '
  - type: note
    content: ch. 3:8; 4:2; [Deut. 32:30; 1 Sam. 12:9]
  - type: text
    content: 'And he sold them into the hand of their surrounding enemies, '
  - type: note
    content: Lev. 26:37; Josh. 7:12, 13
  - type: text
    content: 'so that they could no longer withstand their enemies. '
  '15':
  - type: text
    content: 'Whenever they marched out, the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against them for harm, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had warned, '
  - type: note
    content: See Lev. 26:14-46; Deut. 28:15-68
  - type: text
    content: 'and as the '
  - type: text
    content: Lord
  - type: text
    content: ' had sworn to them. And they were in terrible distress.'
  - type: heading
    content: The Lord Raises Up Judges
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:9, 15; 1 Sam. 12:11; Acts 13:20
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up judges, '
  - type: note
    content: ch. 3:31; 10:1, 12, 13; 12:2, 3; 13:5; [ch. 3:9; Neh. 9:27]
  - type: text
    content: 'who saved them out of the hand of those who plundered them. '
  '17':
  - type: text
    content: 'Yet they did not listen to their judges, for '
  - type: note
    content: ch. 8:33; Ex. 34:15
  - type: text
    content: 'they whored after other gods and bowed down to them. '
  - type: note
    content: Deut. 9:12
  - type: text
    content: 'They soon turned aside from the way in which their fathers had walked, who had obeyed the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ', and they did not do so. '
  '18':
  - type: text
    content: 'Whenever the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up judges for them, '
  - type: note
    content: '[Josh. 1:5]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with the judge, and he saved them from the hand of their enemies all the days of the judge. '
  - type: note
    content: Gen. 6:6; Deut. 32:36; Ps. 106:45; Jer. 18:8; 26:3; [Num. 23:19]
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' was moved to pity by '
  - type: note
    content: Ex. 2:24; 6:5
  - type: text
    content: 'their groaning because of those who afflicted and oppressed them. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 3:12; 4:1; 6:1; 8:33]'
  - type: text
    content: 'whenever the judge died, they turned back and were more corrupt than their fathers, going after other gods, serving them and bowing down to them. They did not drop any of their practices or their stubborn ways. '
  '2':
  - type: note
    content: Deut. 7:2
  - type: text
    content: 'and you shall make no covenant with the inhabitants of this land; '
  - type: note
    content: Deut. 12:3
  - type: text
    content: 'you shall break down their altars.’ But you have not obeyed my voice. What is this you have done? '
  '20':
  - type: note
    content: ver. 14
  - type: text
    content: 'So the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, and he said, “Because this people '
  - type: note
    content: Deut. 17:2; Josh. 23:16
  - type: text
    content: 'have transgressed my covenant that I commanded their fathers and have not obeyed my voice, '
  '21':
  - type: note
    content: ver. 3; Josh. 23:13
  - type: text
    content: 'I will no longer drive out before them any of the nations that Joshua left when he died, '
  '22':
  - type: text
    content: 'in order '
  - type: note
    content: ch. 3:1, 4; Ex. 15:25; [Deut. 8:2, 16; 13:3]
  - type: text
    content: 'to test Israel by them, whether they will take care to walk in the way of the '
  - type: text
    content: Lord
  - type: text
    content: ' as their fathers did, or not.” '
  '23':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' left those nations, not driving them out quickly, and he did not give them into the hand of Joshua.'
  '3':
  - type: text
    content: 'So now I say, '
  - type: note
    content: ver. 21
  - type: text
    content: 'I will not drive them out before you, but they shall become '
  - type: note
    content: Num. 33:55; Josh. 23:13
  - type: text
    content: 'thorns in your sides, and their gods shall be a snare to you.” '
  '4':
  - type: text
    content: 'As soon as the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke these words to all the people of Israel, the people lifted up their voices and wept. '
  '5':
  - type: text
    content: And they called the name of that place Bochim.
  - type: note
    content: Bochim means weepers
  - type: text
    content: ' And they sacrificed there to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Death of Joshua
  '6':
  - type: text
    content: 'When Joshua dismissed the people, the people of Israel went each to his inheritance to take possession of the land. '
  '7':
  - type: note
    content: For ver. 7-9, see Josh. 24:29-31
  - type: text
    content: 'And the people served the '
  - type: text
    content: Lord
  - type: text
    content: ' all the days of Joshua, and all the days of the elders who outlived Joshua, who had seen all the great work that the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel. '
  '8':
  - type: text
    content: 'And Joshua the son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died at the age of 110 years. '
  '9':
  - type: text
    content: 'And they buried him within the boundaries of '
  - type: note
    content: Josh. 19:50
  - type: text
    content: 'his inheritance in Timnath-heres, '
  - type: note
    content: Josh. 24:33
  - type: text
    content: 'in the hill country of Ephraim, north of the mountain of Gaash. '
