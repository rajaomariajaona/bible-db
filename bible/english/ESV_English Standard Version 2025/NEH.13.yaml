document_id: NEH.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nehemiah’s Final Reforms
  - type: text
    content: 'On that day '
  - type: note
    content: ch. 8:3, 8, 9, 18; 9:3; [Deut. 31:11, 12; 2 Kgs. 23:2]
  - type: text
    content: 'they read from the Book of Moses in the hearing of the people. And in it was found written '
  - type: note
    content: See Deut. 23:3-5
  - type: text
    content: 'that no Ammonite or Moabite should ever enter the assembly of God, '
  '10':
  - type: text
    content: 'I also found out that '
  - type: note
    content: 2 Chr. 31:4; [Mal. 3:8]
  - type: text
    content: 'the portions of the Levites had not been given to them, so that the Levites and the singers, who did the work, had fled each '
  - type: note
    content: ch. 12:28, 29
  - type: text
    content: 'to his field. '
  '11':
  - type: note
    content: ver. 17, 25
  - type: text
    content: 'So I confronted the officials and said, '
  - type: note
    content: '[ch. 10:39]'
  - type: text
    content: '“Why is the house of God forsaken?” And I gathered them together and set them in their stations. '
  '12':
  - type: text
    content: 'Then all Judah brought '
  - type: note
    content: '[ch. 10:38, 39; 12:44]'
  - type: text
    content: 'the tithe of the grain, wine, and oil into the storehouses. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Chr. 31:12, 13]'
  - type: text
    content: 'I appointed as treasurers over the storehouses Shelemiah the priest, Zadok the scribe, and Pedaiah of the Levites, and as their assistant Hanan the son of Zaccur, son of Mattaniah, '
  - type: note
    content: ch. 7:2; [1 Cor. 4:2]
  - type: text
    content: 'for they were considered reliable, and their duty was to distribute to their brothers. '
  '14':
  - type: note
    content: ver. 22, 31; ch. 5:19
  - type: text
    content: Remember me, O my God, concerning this, and do not wipe out my good deeds that I have done for the house of my God and for his service.
  '15':
  - type: text
    content: 'In those days I saw in Judah people treading winepresses '
  - type: note
    content: '[Ex. 20:10]'
  - type: text
    content: 'on the Sabbath, and bringing in heaps of grain and loading them on donkeys, and also wine, grapes, figs, and all kinds of loads, '
  - type: note
    content: See ch. 10:31
  - type: text
    content: 'which they brought into Jerusalem on the Sabbath day. And '
  - type: note
    content: ver. 21
  - type: text
    content: 'I warned them on the day when they sold food. '
  '16':
  - type: text
    content: 'Tyrians also, who lived in the city, brought in fish and all kinds of goods and sold them on the Sabbath to the people of Judah, in Jerusalem itself! '
  '17':
  - type: note
    content: ver. 11
  - type: text
    content: 'Then I confronted the nobles of Judah and said to them, “What is this evil thing that you are doing, '
  - type: note
    content: '[Matt. 12:5]'
  - type: text
    content: 'profaning the Sabbath day? '
  '18':
  - type: note
    content: See Jer. 17:19-23
  - type: text
    content: Did not your fathers act in this way, and did not our God bring all this disaster
  - type: note
    content: The Hebrew word can mean evil, harm, or disaster, depending on the context
  - type: text
    content: ' on us and on this city? Now you are bringing more wrath on Israel by profaning the Sabbath.”'
  '19':
  - type: text
    content: 'As soon as it '
  - type: note
    content: Lev. 23:32
  - type: text
    content: 'began to grow dark at the gates of Jerusalem before the Sabbath, I commanded that the doors should be shut and gave orders that they should not be opened until after the Sabbath. And I stationed some of my servants at the gates, that no load might be brought in on the Sabbath day. '
  '2':
  - type: text
    content: 'for they did not meet the people of Israel with bread and water, but hired Balaam against them to curse them—yet our God turned the curse into a blessing. '
  '20':
  - type: text
    content: 'Then the merchants and sellers of all kinds of wares lodged outside Jerusalem once or twice. '
  '21':
  - type: note
    content: ver. 15
  - type: text
    content: 'But I warned them and said to them, “Why do you lodge outside the wall? If you do so again, I will lay hands on you.” From that time on they did not come on the Sabbath. '
  '22':
  - type: text
    content: 'Then I commanded the Levites '
  - type: note
    content: ch. 12:30
  - type: text
    content: 'that they should purify themselves and come and guard the gates, to keep the Sabbath day holy. '
  - type: note
    content: '[ver. 14, 31]'
  - type: text
    content: Remember this also in my favor, O my God, and spare me according to the greatness of your steadfast love.
  '23':
  - type: text
    content: 'In those days also I saw the Jews '
  - type: note
    content: Ezra 9:2; 10:10
  - type: text
    content: 'who had married women '
  - type: note
    content: '[ch. 4:7]'
  - type: text
    content: 'of Ashdod, '
  - type: note
    content: '[ver. 1; Ezra 9:1]'
  - type: text
    content: 'Ammon, and '
  - type: note
    content: '[ver. 1; Ezra 9:1]'
  - type: text
    content: 'Moab. '
  '24':
  - type: text
    content: 'And half of their children spoke the language of Ashdod, and they could not speak the language of Judah, but only the language of each people. '
  '25':
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'And I confronted them and cursed them and beat some of them and pulled out their hair. '
  - type: note
    content: Ezra 10:5; [ch. 10:29, 30]
  - type: text
    content: 'And I made them take an oath in the name of God, saying, “You shall not give your daughters to their sons, or take their daughters for your sons or for yourselves. '
  '26':
  - type: note
    content: See 1 Kgs. 11:1-8
  - type: text
    content: 'Did not Solomon king of Israel sin on account of such women? '
  - type: note
    content: 1 Kgs. 3:13; 2 Chr. 1:12
  - type: text
    content: 'Among the many nations there was no king like him, and he was '
  - type: note
    content: '[2 Sam. 12:24]'
  - type: text
    content: 'beloved by his God, and God made him king over all Israel. Nevertheless, foreign women made even him to sin. '
  '27':
  - type: text
    content: 'Shall we then listen to you and do all this great evil and '
  - type: note
    content: Ezra 10:2
  - type: text
    content: act treacherously against our God by marrying foreign women?”
  '28':
  - type: text
    content: 'And one of the sons of '
  - type: note
    content: ch. 12:10, 11, 22
  - type: text
    content: 'Jehoiada, the son of '
  - type: note
    content: ver. 4, 7; ch. 3:1
  - type: text
    content: 'Eliashib the high priest, was the son-in-law of '
  - type: note
    content: ch. 2:10, 19
  - type: text
    content: 'Sanballat the Horonite. Therefore I chased him from me. '
  '29':
  - type: note
    content: '[ch. 6:14]'
  - type: text
    content: 'Remember them, O my God, because they have desecrated the priesthood '
  - type: note
    content: Mal. 2:4
  - type: text
    content: and the covenant of the priesthood and the Levites.
  '3':
  - type: text
    content: 'As soon as the people heard the law, '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'they separated from Israel all '
  - type: note
    content: '[Ex. 12:38; Num. 11:4]'
  - type: text
    content: those of foreign descent.
  '30':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:30
  - type: text
    content: 'Thus I cleansed them from everything foreign, and I established the duties of the priests and Levites, each in his work; '
  '31':
  - type: text
    content: 'and I provided '
  - type: note
    content: ch. 10:34
  - type: text
    content: 'for the wood offering '
  - type: note
    content: Ezra 10:14
  - type: text
    content: at appointed times, and for the firstfruits.
  - type: note
    content: ver. 14, 22
  - type: text
    content: Remember me, O my God, for good.
  '4':
  - type: text
    content: 'Now before this, '
  - type: note
    content: ver. 28; ch. 3:1
  - type: text
    content: 'Eliashib the priest, who '
  - type: note
    content: '[ch. 12:44]'
  - type: text
    content: 'was appointed over the chambers of the house of our God, and who was related to '
  - type: note
    content: ch. 2:10
  - type: text
    content: 'Tobiah, '
  '5':
  - type: text
    content: 'prepared for Tobiah a large chamber where they had previously put the grain offering, the frankincense, the vessels, and the tithes of grain, wine, and oil, '
  - type: note
    content: Num. 18:21, 24
  - type: text
    content: 'which were given by commandment to the Levites, singers, and gatekeepers, and the contributions for the priests. '
  '6':
  - type: text
    content: 'While this was taking place, I was not in Jerusalem, for '
  - type: note
    content: ch. 5:14
  - type: text
    content: 'in the thirty-second year of Artaxerxes '
  - type: note
    content: Ezra 6:22
  - type: text
    content: 'king of Babylon I went to the king. And after some time I asked leave of the king '
  '7':
  - type: text
    content: 'and came to Jerusalem, and I then discovered the evil that Eliashib had done for Tobiah, '
  - type: note
    content: ver. 5
  - type: text
    content: 'preparing for him a chamber in the courts of the house of God. '
  '8':
  - type: text
    content: 'And I was very angry, and I threw all the household furniture of Tobiah out of the chamber. '
  '9':
  - type: text
    content: 'Then I gave orders, and they '
  - type: note
    content: 2 Chr. 29:15, 16, 18
  - type: text
    content: cleansed the chambers, and I brought back there the vessels of the house of God, with the grain offering and the frankincense.
