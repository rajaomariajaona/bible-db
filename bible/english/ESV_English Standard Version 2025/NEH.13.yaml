    marker-yv: yv-n
  - type: text
    text: 'Eliashib the priest, who '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:44
      metadata:
        usfm: NEH.12.44
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'was appointed over the chambers of the house of our God, and who was related to '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:10
      metadata:
        usfm: NEH.2.10
    marker-yv: yv-n
  - type: text
    text: 'Tobiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'prepared for Tobiah a large chamber where they had previously put the grain offering, the frankincense, the vessels, and the tithes of grain, wine, and oil, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 18:21
      metadata:
        usfm: NUM.18.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: NUM.18.24
    marker-yv: yv-n
  - type: text
    text: 'which were given by commandment to the Levites, singers, and gatekeepers, and the contributions for the priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'While this was taking place, I was not in Jerusalem, for '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:14
      metadata:
        usfm: NEH.5.14
    marker-yv: yv-n
  - type: text
    text: 'in the thirty-second year of Artaxerxes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezra 6:22
      metadata:
        usfm: EZR.6.22
    marker-yv: yv-n
  - type: text
    text: 'king of Babylon I went to the king. And after some time I asked leave of the king '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and came to Jerusalem, and I then discovered the evil that Eliashib had done for Tobiah, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: NEH.13.5
    marker-yv: yv-n
  - type: text
    text: 'preparing for him a chamber in the courts of the house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I was very angry, and I threw all the household furniture of Tobiah out of the chamber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I gave orders, and they '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 29:15
      metadata:
        usfm: 2CH.29.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: 2CH.29.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: 2CH.29.18
    marker-yv: yv-n
  - type: text
    text: cleansed the chambers, and I brought back there the vessels of the house of God, with the grain offering and the frankincense.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I also found out that '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 31:4
      metadata:
        usfm: 2CH.31.4
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 3:8
      metadata:
        usfm: MAL.3.8
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the portions of the Levites had not been given to them, so that the Levites and the singers, who did the work, had fled each '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:28
      metadata:
        usfm: NEH.12.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: NEH.12.29
    marker-yv: yv-n
  - type: text
    text: 'to his field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17, 25
      metadata:
        usfm: NEH.13.17
    marker-yv: yv-n
  - type: text
    text: 'So I confronted the officials and said, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:39
      metadata:
        usfm: NEH.10.39
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '“Why is the house of God forsaken?” And I gathered them together and set them in their stations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then all Judah brought '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:38
      metadata:
        usfm: NEH.10.38
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: NEH.10.39
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:44
      metadata:
        usfm: NEH.12.44
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the tithe of the grain, wine, and oil into the storehouses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 31:12
      metadata:
        usfm: 2CH.31.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: 2CH.31.13
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'I appointed as treasurers over the storehouses Shelemiah the priest, Zadok the scribe, and Pedaiah of the Levites, and as their assistant Hanan the son of Zaccur, son of Mattaniah, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:2
      metadata:
        usfm: NEH.7.2
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 4:2
      metadata:
        usfm: 1CO.4.2
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'for they were considered reliable, and their duty was to distribute to their brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22, 31
      metadata:
        usfm: NEH.13.22
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:19
      metadata:
        usfm: NEH.5.19
    marker-yv: yv-n
  - type: text
    text: Remember me, O my God, concerning this, and do not wipe out my good deeds that I have done for the house of my God and for his service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In those days I saw in Judah people treading winepresses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 20:10
      metadata:
        usfm: EXO.20.10
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'on the Sabbath, and bringing in heaps of grain and loading them on donkeys, and also wine, grapes, figs, and all kinds of loads, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:31
      metadata:
        usfm: NEH.10.31
    marker-yv: yv-n
  - type: text
    text: 'which they brought into Jerusalem on the Sabbath day. And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: NEH.13.21
    marker-yv: yv-n
  - type: text
    text: 'I warned them on the day when they sold food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tyrians also, who lived in the city, brought in fish and all kinds of goods and sold them on the Sabbath to the people of Judah, in Jerusalem itself! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: NEH.13.11
    marker-yv: yv-n
  - type: text
    text: 'Then I confronted the nobles of Judah and said to them, “What is this evil thing that you are doing, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 12:5
      metadata:
        usfm: MAT.12.5
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'profaning the Sabbath day? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 17:19-23
      metadata:
        usfm: JER.17.19+JER.17.20+JER.17.21+JER.17.22+JER.17.23
    marker-yv: yv-n
  - type: text
    text: Did not your fathers act in this way, and did not our God bring all this disaster
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew word can mean '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: evil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: harm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', or '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: disaster
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', depending on the context'
    marker-yv: yv-n
  - type: text
    text: ' on us and on this city? Now you are bringing more wrath on Israel by profaning the Sabbath.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'As soon as it '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lev. 23:32
      metadata:
        usfm: LEV.23.32
    marker-yv: yv-n
  - type: text
    text: 'began to grow dark at the gates of Jerusalem before the Sabbath, I commanded that the doors should be shut and gave orders that they should not be opened until after the Sabbath. And I stationed some of my servants at the gates, that no load might be brought in on the Sabbath day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then the merchants and sellers of all kinds of wares lodged outside Jerusalem once or twice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: NEH.13.15
    marker-yv: yv-n
  - type: text
    text: 'But I warned them and said to them, “Why do you lodge outside the wall? If you do so again, I will lay hands on you.” From that time on they did not come on the Sabbath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then I commanded the Levites '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:30
      metadata:
        usfm: NEH.12.30
    marker-yv: yv-n
  - type: text
    text: 'that they should purify themselves and come and guard the gates, to keep the Sabbath day holy. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14, 31
      metadata:
        usfm: NEH.13.14
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: Remember this also in my favor, O my God, and spare me according to the greatness of your steadfast love.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In those days also I saw the Jews '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
