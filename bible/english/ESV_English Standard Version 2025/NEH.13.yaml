      metadata:
        usfm: DEU.23.3+DEU.23.4+DEU.23.5
    marker-yv: yv-n
  - type: text
    text: 'that no Ammonite or Moabite should ever enter the assembly of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'for they did not meet the people of Israel with bread and water, but hired Balaam against them to curse them—yet our God turned the curse into a blessing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As soon as the people heard the law, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:2
      metadata:
        usfm: NEH.9.2
    marker-yv: yv-n
  - type: text
    text: 'they separated from Israel all '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
