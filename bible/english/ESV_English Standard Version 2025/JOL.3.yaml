  '1':
  - type: heading
    content: The Lord Judges the Nations
  - type: text
    content: ' '
  - type: note
    content: Ch 4:1 in Hebrew
  - type: text
    content: '“For behold, '
  - type: note
    content: Jer. 30:3
  - type: text
    content: 'in those days and at that time, when I restore the fortunes of Judah and Jerusalem, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 2:4 ]'
  - type: text
    content: Beat your plowshares into swords,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 2:4]'
  - type: text
    content: your pruning hooks into spears;
  - type: text
    content: let the weak say, “I am a warrior.”
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 54:15 ]'
  - type: text
    content: Hasten and come,
  - type: text
    content: all you surrounding nations,
  - type: text
    content: and gather yourselves there.
  - type: note
    content: '[ Zech. 14:5 ]'
  - type: text
    content: 'Bring down your warriors, O '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: Let the nations stir themselves up
  - type: text
    content: 'and come up to '
  - type: note
    content: ver. 2
  - type: text
    content: the Valley of Jehoshaphat;
  - type: note
    content: Ps. 96:13; 98:9; 110:6; Isa. 2:4; 3:13; Mic. 4:3
  - type: text
    content: for there I will sit to judge
  - type: text
    content: all the surrounding nations.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Rev. 14:15
  - type: text
    content: Put in the sickle,
  - type: note
    content: '[ Jer. 51:33; Hos. 6:11; Matt. 13:30, 39; Mark 4:29; John 4:35; Rev. 14:15, 18 ]'
  - type: text
    content: for the harvest is ripe.
  - type: note
    content: Rev. 14:20; [ Isa. 63:2, 3 ]
  - type: text
    content: Go in, tread,
  - type: note
    content: Rev. 14:20; [ Isa. 63:2, 3 ]
  - type: text
    content: for the winepress is full.
  - type: text
    content: The vats overflow,
  - type: text
    content: for their evil is great.
  '14':
  - type: text
    content: Multitudes, multitudes,
  - type: text
    content: in the valley of decision!
  - type: text
    content: 'For '
  - type: note
    content: See ch. 1:15
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near'
  - type: text
    content: in the valley of decision.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:10
  - type: text
    content: The sun and the moon are darkened,
  - type: text
    content: and the stars withdraw their shining.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:11; Amos 1:2; [ Jer. 25:30 ]
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' roars from Zion,'
  - type: text
    content: 'and '
  - type: note
    content: ch. 2:11; Amos 1:2; [Jer. 25:30]
  - type: text
    content: utters his voice from Jerusalem,
  - type: note
    content: ch. 2:10
  - type: text
    content: and the heavens and the earth quake.
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Isa. 4:6; 25:4
  - type: text
    content: a refuge to his people,
  - type: text
    content: a stronghold to the people of Israel.
  - type: heading
    content: The Glorious Future of Judah
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:27; [ Ezek. 6:7 ]
  - type: text
    content: '“So you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: note
    content: ver. 21 ; [Ezek. 43:7]
  - type: text
    content: 'who dwells in Zion, '
  - type: note
    content: ch. 2:1; Ps. 48:1; Isa. 65:11; Jer. 31:23
  - type: text
    content: my holy mountain.
  - type: text
    content: And Jerusalem shall be holy,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 52:1; Nah. 1:15; Zech. 14:21; [Rev. 21:27; 22:15]
  - type: text
    content: strangers shall never again pass through it.
  '18':
  - type: text
    content: “And in that day
  - type: note
    content: Jer. 31:12; Amos 9:13
  - type: text
    content: the mountains shall drip sweet wine,
  - type: text
    content: and the hills shall flow with milk,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 30:25
  - type: text
    content: all the streambeds of Judah
  - type: text
    content: shall flow with water;
  - type: note
    content: Ezek. 47:1
  - type: text
    content: 'and a fountain shall come forth from the house of the '
  - type: text
    content: Lord
  - type: text
    content: 'and water the Valley of '
  - type: note
    content: See Num. 25:1
  - type: text
    content: Shittim.
  '19':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 19:1-17
  - type: text
    content: “Egypt shall become a desolation
  - type: text
    content: 'and '
  - type: note
    content: See Isa. 34:5
  - type: text
    content: Edom a desolate wilderness,
  - type: note
    content: Obad. 10
  - type: text
    content: for the violence done to the people of Judah,
  - type: text
    content: because they have shed innocent blood in their land.
  '2':
  - type: note
    content: '[Zeph. 3:8]; See Zech. 14:2-4'
  - type: text
    content: 'I will gather all the nations and bring them down to the Valley of Jehoshaphat. And '
  - type: note
    content: Isa. 66:16; Jer. 25:31
  - type: text
    content: 'I will enter into judgment with them there, on behalf of my people and my heritage Israel, because they have scattered them among the nations and have divided up my land, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps. 125:1, 2; Ezek. 37:25
  - type: text
    content: But Judah shall be inhabited forever,
  - type: text
    content: and Jerusalem to all generations.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Isa. 4:4; Ezek. 36:25, 29
  - type: text
    content: I will avenge their blood,
  - type: text
    content: blood I have not avenged,
  - type: note
    content: Or I will acquit their bloodguilt that I have not acquitted
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' dwells in Zion.”'
  '3':
  - type: text
    content: 'and '
  - type: note
    content: Obad. 11; Nah. 3:10
  - type: text
    content: have cast lots for my people, and have traded a boy for a prostitute, and have sold a girl for wine and have drunk it.
  '4':
  - type: text
    content: '“What are you to me, '
  - type: note
    content: Isa. 23:1, 2; Jer. 47:4; Amos 1:9
  - type: text
    content: 'O Tyre and Sidon, and all '
  - type: note
    content: '[Ezek. 25:15, 16]'
  - type: text
    content: 'the regions of Philistia? Are you paying me back for something? If you are paying me back, '
  - type: note
    content: '[Obad. 15]'
  - type: text
    content: 'I will return your payment on your own head swiftly and speedily. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: '[2 Chr. 21:16, 17]'
  - type: text
    content: you have taken my silver and my gold, and have carried my rich treasures into your temples.
  - type: note
    content: Or palaces
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'You have sold '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'the people of Judah and Jerusalem to the Greeks in order to remove them far from their own border. '
  '7':
  - type: text
    content: 'Behold, I will stir them up from the place to which you have sold them, and '
  - type: note
    content: '[See ver. 4above]'
  - type: text
    content: 'I will return your payment on your own head. '
  '8':
  - type: text
    content: 'I will sell your sons and your daughters into the hand of the people of Judah, and they will sell them to the '
  - type: note
    content: See 1 Kgs. 10:1
  - type: text
    content: 'Sabeans, to a nation far away, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  '9':
  - type: text
    content: 'Proclaim this among the nations:'
  - type: note
    content: '[ Mic. 3:5 ]'
  - type: text
    content: Consecrate for war;
  - type: note
    content: Or Consecrate a war
  - type: text
    content: stir up the mighty men.
  - type: text
    content: Let all the men of war draw near;
  - type: text
    content: let them come up.
