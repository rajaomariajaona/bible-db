document_id: HEB.4,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore, while the promise of entering his rest still stands, let us fear lest any of you should seem '
  - type: note
    content: ch. 12:15
  - type: text
    content: 'to have failed to reach it. '
  '10':
  - type: text
    content: 'for whoever has entered God’s rest has also '
  - type: note
    content: '[Rev. 14:13]'
  - type: text
    content: rested from his works as God did from his.
  '11':
  - type: text
    content: 'Let us therefore strive to enter that rest, so '
  - type: note
    content: '[ch. 3:12]'
  - type: text
    content: 'that no one may fall by the same sort of disobedience. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: 1 Pet. 1:23
  - type: text
    content: 'the word of God is living and '
  - type: note
    content: '[Jer. 23:29; 1 Thess. 2:13]'
  - type: text
    content: 'active, '
  - type: note
    content: Isa. 49:2; Eph. 6:17
  - type: text
    content: 'sharper than any '
  - type: note
    content: Prov. 5:4; Rev. 1:16; 2:12
  - type: text
    content: 'two-edged sword, piercing to the division of soul and of spirit, of joints and of marrow, and '
  - type: note
    content: '[1 Cor. 14:24, 25]'
  - type: text
    content: 'discerning the thoughts and intentions of the heart. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 16:9; Job 34:21; Ps. 33:13-15
  - type: text
    content: 'no creature is hidden from his sight, but all are '
  - type: note
    content: Job 26:6
  - type: text
    content: naked and exposed to the eyes of him to whom we must give account.
  - type: heading
    content: Jesus the Great High Priest
  '14':
  - type: text
    content: 'Since then we have '
  - type: note
    content: ch. 2:17, 18; [ch. 10:21]
  - type: text
    content: 'a great high priest '
  - type: note
    content: Eph. 4:10
  - type: text
    content: 'who has passed through the heavens, Jesus, the Son of God, '
  - type: note
    content: ch. 10:23
  - type: text
    content: 'let us hold fast our confession. '
  '15':
  - type: text
    content: 'For we do not have a high priest '
  - type: note
    content: '[ch. 5:2; Isa. 53:3]'
  - type: text
    content: 'who is unable to sympathize with our weaknesses, but one who in every respect has been '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'tempted as we are, '
  - type: note
    content: ch. 9:28; 1 Pet. 2:22; 1 John 3:5; [ch. 7:26; John 8:46; 14:30]
  - type: text
    content: 'yet without sin. '
  '16':
  - type: note
    content: ch. 10:19; Eph. 3:12; [ch. 7:19, 25]
  - type: text
    content: Let us then with confidence draw near to the throne of grace, that we may receive mercy and find grace to help in time of need.
  '2':
  - type: text
    content: 'For good news came to us just as to them, but the message they heard did not benefit them, because '
  - type: note
    content: Rom. 3:3
  - type: text
    content: they were not united by faith with those who listened.
  - type: note
    content: Some manuscripts it did not meet with faith in the hearers
  - type: text
    content: ' '
  '3':
  - type: text
    content: For we who have believed enter that rest, as he has said,
  - type: note
    content: ch. 3:11; Cited from Ps. 95:11
  - type: text
    content: “As I swore in my wrath,
  - type: text
    content: ‘They shall not enter my rest,’”
  - type: text
    content: 'although his works were finished from the foundation of the world. '
  '4':
  - type: text
    content: 'For he has somewhere spoken of the seventh day in this way: '
  - type: note
    content: Cited from Gen. 2:2; [Ex. 20:11; 31:17]
  - type: text
    content: '“And God rested on the seventh day from all his works.” '
  '5':
  - type: text
    content: And again in this passage he said,
  - type: note
    content: ver. 3
  - type: text
    content: “They shall not enter my rest.”
  '6':
  - type: text
    content: 'Since therefore it remains for some to enter it, and those who formerly received the good news '
  - type: note
    content: See ch. 3:19
  - type: text
    content: 'failed to enter because of disobedience, '
  '7':
  - type: text
    content: again he appoints a certain day, “Today,” saying through David so long afterward, in the words already quoted,
  - type: note
    content: See ch. 3:7, 8
  - type: text
    content: “Today, if you hear his voice,
  - type: text
    content: do not harden your hearts.”
  '8':
  - type: text
    content: For if Joshua had given them rest, God
  - type: note
    content: Greek he
  - type: text
    content: ' would not have spoken of another day later on. '
  '9':
  - type: text
    content: 'So then, there remains a Sabbath rest for the people of God, '
