document_id: JOS.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Allotment for Judah
  - type: text
    content: 'The allotment for the tribe of the people of Judah according to their clans reached southward '
  - type: note
    content: Num. 34:3
  - type: text
    content: 'to the boundary of Edom, to '
  - type: note
    content: Num. 33:36
  - type: text
    content: 'the wilderness of Zin at the farthest south. '
  '10':
  - type: text
    content: 'And the boundary circles west of Baalah to Mount Seir, passes along to the northern shoulder of Mount Jearim (that is, Chesalon), and goes down to '
  - type: note
    content: 1 Sam. 6:9, 12
  - type: text
    content: 'Beth-shemesh and passes along by '
  - type: note
    content: Gen. 38:12-14; Judg. 14:1
  - type: text
    content: 'Timnah. '
  '11':
  - type: text
    content: 'The boundary goes out '
  - type: note
    content: ch. 13:3
  - type: text
    content: 'to the shoulder of the hill north of Ekron, then the boundary bends around to Shikkeron and passes along to Mount '
  - type: note
    content: ver. 9
  - type: text
    content: 'Baalah and goes out to Jabneel. Then the boundary comes to an end at the sea. '
  '12':
  - type: text
    content: 'And the west boundary was '
  - type: note
    content: ver. 47; ch. 23:4; Num. 34:6, 7; Ezek. 47:20
  - type: text
    content: the Great Sea with its coastline. This is the boundary around the people of Judah according to their clans.
  '13':
  - type: text
    content: 'According to the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Joshua, he gave to Caleb the son of Jephunneh a portion among the people of Judah, '
  - type: note
    content: ver. 54; See ch. 14:13-15
  - type: text
    content: 'Kiriath-arba, that is, '
  - type: note
    content: ver. 54; See ch. 14:13-15
  - type: text
    content: 'Hebron (Arba was the father of Anak). '
  '14':
  - type: text
    content: 'And Caleb drove out from there the three sons of Anak, '
  - type: note
    content: Num. 13:22; Judg. 1:10, 20
  - type: text
    content: 'Sheshai and Ahiman and Talmai, the descendants of Anak. '
  '15':
  - type: text
    content: 'And he went up from there against the inhabitants of Debir. '
  - type: note
    content: Judg. 1:11; [ver. 49]
  - type: text
    content: 'Now the name of Debir formerly was Kiriath-sepher. '
  '16':
  - type: text
    content: 'And Caleb said, “He who attacks Kiriath-sepher and captures it, I will give him Achsah my daughter as wife.” '
  '17':
  - type: note
    content: See Judg. 1:13
  - type: text
    content: 'And Othniel the son of Kenaz, '
  - type: note
    content: See ch. 14:6, 13
  - type: text
    content: 'the brother of Caleb, captured it. And he gave him Achsah his daughter as wife. '
  '18':
  - type: text
    content: 'When she came to him, she urged him to ask her father for a field. And she dismounted from her donkey, and Caleb said to her, “What do you want?” '
  '19':
  - type: text
    content: She said to him, “Give me a blessing. Since you have given me the land of the Negeb, give me also springs of water.” And he gave her the upper springs and the lower springs.
  '2':
  - type: text
    content: 'And their south boundary ran from the end of the '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Salt Sea, from the bay that faces southward. '
  '20':
  - type: text
    content: 'This is the inheritance of the tribe of the people of Judah according to their clans. '
  '21':
  - type: text
    content: 'The cities belonging to the tribe of the people of Judah in the extreme south, toward the boundary of Edom, were Kabzeel, '
  - type: note
    content: Gen. 35:21
  - type: text
    content: 'Eder, Jagur, '
  '22':
  - type: text
    content: 'Kinah, Dimonah, Adadah, '
  '23':
  - type: text
    content: 'Kedesh, Hazor, Ithnan, '
  '24':
  - type: note
    content: 1 Sam. 23:14, 15, 19, 24; 26:1, 2
  - type: text
    content: 'Ziph, Telem, Bealoth, '
  '25':
  - type: text
    content: 'Hazor-hadattah, Kerioth-hezron (that is, Hazor), '
  '26':
  - type: text
    content: 'Amam, Shema, Moladah, '
  '27':
  - type: text
    content: 'Hazar-gaddah, Heshmon, Beth-pelet, '
  '28':
  - type: text
    content: 'Hazar-shual, '
  - type: note
    content: Gen. 21:31; 26:23, 33
  - type: text
    content: 'Beersheba, Biziothiah, '
  '29':
  - type: text
    content: 'Baalah, Iim, Ezem, '
  '3':
  - type: text
    content: 'It goes out southward of '
  - type: note
    content: Num. 34:4; Judg. 1:36
  - type: text
    content: 'the ascent of Akrabbim, passes along to Zin, and goes up south of Kadesh-barnea, along by Hezron, up to Addar, turns about to Karka, '
  '30':
  - type: text
    content: 'Eltolad, Chesil, Hormah, '
  '31':
  - type: note
    content: 1 Sam. 27:6; 30:1
  - type: text
    content: 'Ziklag, Madmannah, Sansannah, '
  '32':
  - type: text
    content: 'Lebaoth, Shilhim, Ain, and Rimmon: in all, twenty-nine cities with their villages.'
  '33':
  - type: text
    content: 'And in the lowland, '
  - type: note
    content: '[Num. 13:23]'
  - type: text
    content: 'Eshtaol, Zorah, Ashnah, '
  '34':
  - type: text
    content: 'Zanoah, En-gannim, Tappuah, Enam, '
  '35':
  - type: note
    content: ch. 10:3
  - type: text
    content: 'Jarmuth, '
  - type: note
    content: 1 Sam. 22:1
  - type: text
    content: 'Adullam, '
  - type: note
    content: 1 Sam. 17:1
  - type: text
    content: 'Socoh, '
  - type: note
    content: 1 Sam. 17:1
  - type: text
    content: 'Azekah, '
  '36':
  - type: text
    content: 'Shaaraim, Adithaim, Gederah, Gederothaim: fourteen cities with their villages.'
  '37':
  - type: text
    content: 'Zenan, Hadashah, Migdal-gad, '
  '38':
  - type: text
    content: 'Dilean, Mizpeh, Joktheel, '
  '39':
  - type: note
    content: ch. 10:3, 31, 32
  - type: text
    content: 'Lachish, Bozkath, '
  - type: note
    content: ch. 10:3, 36, 37
  - type: text
    content: 'Eglon, '
  '4':
  - type: text
    content: 'passes along to Azmon, goes out by '
  - type: note
    content: ver. 47; Num. 34:5; [ch. 13:3]
  - type: text
    content: 'the Brook of Egypt, and comes to its end at the sea. This shall be your south boundary. '
  '40':
  - type: text
    content: 'Cabbon, Lahmam, Chitlish, '
  '41':
  - type: text
    content: 'Gederoth, Beth-dagon, Naamah, and '
  - type: note
    content: ch. 10:10, 21
  - type: text
    content: 'Makkedah: sixteen cities with their villages.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:29, 30
  - type: text
    content: 'Libnah, Ether, Ashan, '
  '43':
  - type: text
    content: 'Iphtah, Ashnah, Nezib, '
  '44':
  - type: note
    content: 1 Sam. 23:1, 2
  - type: text
    content: 'Keilah, Achzib, and Mareshah: nine cities with their villages.'
  '45':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:3
  - type: text
    content: 'Ekron, with its towns and its villages; '
  '46':
  - type: text
    content: from Ekron to the sea, all that were by the side of Ashdod, with their villages.
  '47':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 45 above]'
  - type: text
    content: 'Ashdod, its towns and its villages; '
  - type: note
    content: '[See ver. 45 above]'
  - type: text
    content: 'Gaza, its towns and its villages; to '
  - type: note
    content: See ver. 4
  - type: text
    content: 'the Brook of Egypt, and '
  - type: note
    content: See ver. 12
  - type: text
    content: the Great Sea with its coastline.
  '48':
  - type: text
    content: 'And in the hill country, Shamir, Jattir, Socoh, '
  '49':
  - type: text
    content: Dannah, Kiriath-sannah (
  - type: note
    content: '[ver. 15]'
  - type: text
    content: 'that is, Debir), '
  '5':
  - type: text
    content: 'And the east boundary is the '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Salt Sea, to the mouth of the Jordan. And the boundary on the north side runs from the bay of the sea at the mouth of the Jordan. '
  '50':
  - type: text
    content: 'Anab, Eshtemoh, Anim, '
  '51':
  - type: note
    content: ch. 10:41; 11:16
  - type: text
    content: 'Goshen, Holon, and '
  - type: note
    content: 2 Sam. 15:12
  - type: text
    content: 'Giloh: eleven cities with their villages.'
  '52':
  - type: text
    content: 'Arab, Dumah, Eshan, '
  '53':
  - type: text
    content: 'Janim, Beth-tappuah, Aphekah, '
  '54':
  - type: text
    content: 'Humtah, '
  - type: note
    content: ver. 13
  - type: text
    content: 'Kiriath-arba (that is, '
  - type: note
    content: ver. 13
  - type: text
    content: 'Hebron), and Zior: nine cities with their villages.'
  '55':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 23:24, 25; 25:2
  - type: text
    content: 'Maon, '
  - type: note
    content: 1 Sam. 23:24, 25; 25:2
  - type: text
    content: 'Carmel, '
  - type: note
    content: ver. 24
  - type: text
    content: 'Ziph, Juttah, '
  '56':
  - type: text
    content: 'Jezreel, Jokdeam, Zanoah, '
  '57':
  - type: text
    content: 'Kain, Gibeah, and '
  - type: note
    content: ver. 10
  - type: text
    content: 'Timnah: ten cities with their villages.'
  '58':
  - type: text
    content: 'Halhul, Beth-zur, Gedor, '
  '59':
  - type: text
    content: 'Maarath, Beth-anoth, and Eltekon: six cities with their villages.'
  '6':
  - type: text
    content: 'And the boundary goes up to '
  - type: note
    content: ch. 18:19, 21
  - type: text
    content: 'Beth-hoglah and passes along north of '
  - type: note
    content: ch. 18:18, 22
  - type: text
    content: 'Beth-arabah. And the boundary goes up to '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'the stone of Bohan the son of Reuben. '
  '60':
  - type: text
    content: ' '
  - type: note
    content: ver. 9
  - type: text
    content: 'Kiriath-baal (that is, Kiriath-jearim), and Rabbah: two cities with their villages.'
  '61':
  - type: text
    content: 'In the wilderness, '
  - type: note
    content: ver. 6
  - type: text
    content: 'Beth-arabah, Middin, Secacah, '
  '62':
  - type: text
    content: 'Nibshan, the City of Salt, and '
  - type: note
    content: 1 Sam. 23:29; 24:1
  - type: text
    content: 'Engedi: six cities with their villages.'
  '63':
  - type: text
    content: 'But the '
  - type: note
    content: See ver. 8
  - type: text
    content: 'Jebusites, the inhabitants of Jerusalem, '
  - type: note
    content: '[Judg. 1:8, 21; 2 Sam. 5:6]'
  - type: text
    content: 'the people of Judah could not drive out, '
  - type: note
    content: '[Judg. 1:8, 21; 2 Sam. 5:6]'
  - type: text
    content: so the Jebusites dwell with the people of Judah at Jerusalem to this day.
  '7':
  - type: text
    content: 'And the boundary goes up to Debir from '
  - type: note
    content: ch. 7:26
  - type: text
    content: 'the Valley of Achor, and so northward, turning toward Gilgal, which is opposite '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'the ascent of Adummim, which is on the south side of the valley. And the boundary passes along to the waters of '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'En-shemesh and ends at '
  - type: note
    content: ch. 18:16; 2 Sam. 17:17; 1 Kgs. 1:9
  - type: text
    content: 'En-rogel. '
  '8':
  - type: text
    content: 'Then the boundary goes up by '
  - type: note
    content: ch. 18:16; 2 Kgs. 23:10
  - type: text
    content: the Valley of the Son of Hinnom at the southern shoulder of the Jebusite (
  - type: note
    content: ver. 63; ch. 18:28; [Judg. 19:10; 1 Chr. 11:4]
  - type: text
    content: 'that is, Jerusalem). And the boundary goes up to the top of the mountain that lies over against the Valley of Hinnom, on the west, at the northern end of the Valley '
  - type: note
    content: ch. 18:16; See ch. 12:4
  - type: text
    content: 'of Rephaim. '
  '9':
  - type: text
    content: 'Then the boundary extends from the top of the mountain '
  - type: note
    content: ch. 18:15
  - type: text
    content: to the spring of the waters of Nephtoah, and from there to the cities of Mount Ephron. Then the boundary bends around to Baalah (
  - type: note
    content: ver. 60; 1 Chr. 13:6
  - type: text
    content: 'that is, Kiriath-jearim). '
