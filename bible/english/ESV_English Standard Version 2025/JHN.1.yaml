document_id: JHN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Word Became Flesh
  - type: text
    content: ' '
  - type: note
    content: Gen. 1:1; [ Col. 1:17; 1 John 1:1; Rev. 1:4, 8, 17; 3:14; 21:6; 22:13 ]
  - type: text
    content: 'In the beginning was '
  - type: note
    content: Rev. 19:13; [Heb. 4:12; 1 John 1:1]
  - type: text
    content: 'the Word, and '
  - type: note
    content: 1 John 1:2; [ch. 17:5]
  - type: text
    content: 'the Word was with God, and '
  - type: note
    content: Phil. 2:6
  - type: text
    content: 'the Word was God. '
  '10':
  - type: text
    content: 'He was in the world, and the world was made through him, yet '
  - type: note
    content: '[ch. 16:3; 1 John 3:1]'
  - type: text
    content: 'the world did not know him. '
  '11':
  - type: text
    content: 'He came to '
  - type: note
    content: Matt. 21:38
  - type: text
    content: his own,
  - type: note
    content: Greek to his own things; that is, to his own domain, or to his own people
  - type: text
    content: ' and '
  - type: note
    content: ch. 13:1
  - type: text
    content: his own people
  - type: note
    content: People is implied in Greek
  - type: text
    content: ' '
  - type: note
    content: ch. 5:43; [ch. 3:11, 32]
  - type: text
    content: 'did not receive him. '
  '12':
  - type: text
    content: 'But to all who did receive him, '
  - type: note
    content: See 1 John 5:13
  - type: text
    content: 'who believed in his name, '
  - type: note
    content: 1 John 5:1
  - type: text
    content: 'he gave the right '
  - type: note
    content: 1 John 3:1; [Matt. 5:45]
  - type: text
    content: 'to become '
  - type: note
    content: '[Gal. 3:26]; See ch. 11:52'
  - type: text
    content: 'children of God, '
  '13':
  - type: text
    content: 'who '
  - type: note
    content: James 1:18; [ch. 3:3; 1 Pet. 1:3]
  - type: text
    content: 'were born, '
  - type: note
    content: 1 Pet. 1:23
  - type: text
    content: 'not of blood '
  - type: note
    content: ch. 3:6
  - type: text
    content: nor of the will of the flesh nor of the will of man, but of God.
  '14':
  - type: text
    content: 'And '
  - type: note
    content: ver. 1
  - type: text
    content: 'the Word '
  - type: note
    content: Rom. 1:3; 8:3; Gal. 4:4; Phil. 2:7, 8; Col. 1:22; 1 Tim. 3:16; Heb. 2:14; 1 John 4:2; 2 John 7; [ch. 6:51]
  - type: text
    content: 'became flesh and '
  - type: note
    content: Rev. 7:15; 21:3
  - type: text
    content: 'dwelt among us, '
  - type: note
    content: ch. 2:11; Luke 9:32; 2 Pet. 1:16, 17; 1 John 1:1; 4:14
  - type: text
    content: and we have seen his glory, glory as of the only Son
  - type: note
    content: Or only One, or unique One
  - type: text
    content: ' from the Father, full of '
  - type: note
    content: See ver. 7
  - type: text
    content: 'grace and '
  - type: note
    content: '[ch. 14:6]'
  - type: text
    content: 'truth. '
  '15':
  - type: text
    content: (
  - type: note
    content: See ver. 7
  - type: text
    content: 'John bore witness about him, and cried out, “This was he of whom I said, '
  - type: note
    content: ver. 27, 30; See Matt. 3:11
  - type: text
    content: '‘He who comes after me ranks before me, because he was before me.’”) '
  '16':
  - type: text
    content: 'For from '
  - type: note
    content: Eph. 1:23; 3:19; 4:13; Col. 1:19; 2:9
  - type: text
    content: 'his fullness we have all received, '
  - type: note
    content: '[Matt. 25:29]'
  - type: text
    content: grace upon grace.
  - type: note
    content: Or grace in place of grace
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ch. 7:19; Ex. 20:1
  - type: text
    content: 'the law was given through Moses; '
  - type: note
    content: ver. 14; [Rom. 5:21]
  - type: text
    content: 'grace and truth came through Jesus Christ. '
  '18':
  - type: note
    content: ch. 5:37; 6:46; Ex. 33:20; Col. 1:15; 1 Tim. 6:16; 1 John 4:12, 20; [ch. 12:45]
  - type: text
    content: 'No one has ever seen God; '
  - type: note
    content: ver. 14; See ch. 3:16
  - type: text
    content: God the only Son, who
  - type: note
    content: Or seen God; the only God who; some manuscripts seen God; the only Son, who (see verse 14)
  - type: text
    content: ' is at the Father’s side,'
  - type: note
    content: Greek in the bosom of the Father
  - type: text
    content: ' '
  - type: note
    content: '[Matt. 11:27]; See ch. 3:32'
  - type: text
    content: he has made him known.
  - type: heading
    content: The Testimony of John the Baptist
  '19':
  - type: text
    content: 'And this is the '
  - type: note
    content: ch. 3:26
  - type: text
    content: 'testimony of John, when the Jews sent priests and Levites from Jerusalem to ask him, '
  - type: note
    content: '[ch. 8:25]'
  - type: text
    content: '“Who are you?” '
  '2':
  - type: text
    content: 'He was in the beginning with God. '
  '20':
  - type: note
    content: ver. 8; ch. 3:28; Acts 13:25; [Luke 3:15]
  - type: text
    content: 'He confessed, and did not deny, but confessed, “I am not the Christ.” '
  '21':
  - type: text
    content: 'And they asked him, “What then? '
  - type: note
    content: '[Matt. 11:14; 16:14]'
  - type: text
    content: 'Are you Elijah?” He said, “I am not.” “Are you '
  - type: note
    content: See Deut. 18:15, 18
  - type: text
    content: 'the Prophet?” And he answered, “No.” '
  '22':
  - type: text
    content: 'So they said to him, “Who are you? We need to give an answer to those who sent us. What do you say about yourself?” '
  '23':
  - type: text
    content: 'He said, “I am '
  - type: note
    content: Cited from Isa. 40:3; See Matt. 3:3
  - type: text
    content: the voice of one crying out in the wilderness, ‘Make straight
  - type: note
    content: Or crying out, ‘In the wilderness make straight
  - type: text
    content: ' the way of the Lord,’ as the prophet Isaiah said.”'
  '24':
  - type: text
    content: '(Now they had been sent from the Pharisees.) '
  '25':
  - type: text
    content: 'They asked him, '
  - type: note
    content: Matt. 3:6; Mark 1:4; Luke 3:3, 7
  - type: text
    content: '“Then why are you baptizing, if you are neither the Christ, nor Elijah, nor the Prophet?” '
  '26':
  - type: text
    content: 'John answered them, '
  - type: note
    content: Matt. 3:11; Mark 1:7, 8; Luke 3:16; Acts 1:5; 13:25
  - type: text
    content: '“I baptize with water, but among you stands one you do not know, '
  '27':
  - type: text
    content: 'even '
  - type: note
    content: ver. 15, 30
  - type: text
    content: 'he who comes after me, the strap of whose sandal I am not worthy to untie.” '
  '28':
  - type: text
    content: These things took place in Bethany across the Jordan, where John was baptizing.
  - type: heading
    content: Behold, the Lamb of God
  '29':
  - type: text
    content: 'The next day he saw Jesus coming toward him, and said, “Behold, '
  - type: note
    content: ver. 36; Ex. 12:3; Isa. 53:7; Acts 8:32; 1 Pet. 1:19; [Gen. 22:8; Rev. 5:6]
  - type: text
    content: 'the Lamb of God, who '
  - type: note
    content: 1 John 3:5; [Heb. 10:4, 11]
  - type: text
    content: 'takes away the sin '
  - type: note
    content: '[ch. 3:16, 17; 4:42; 12:47; 1 John 2:2; 4:14]'
  - type: text
    content: 'of the world! '
  '3':
  - type: note
    content: ver. 10; Ps. 33:6; 1 Cor. 8:6; Col. 1:16; Heb. 1:2
  - type: text
    content: 'All things were made through him, and without him was not any thing made that was made. '
  '30':
  - type: text
    content: 'This is he of whom I said, '
  - type: note
    content: ver. 15, 27
  - type: text
    content: '‘After me comes a man who ranks before me, because he was before me.’ '
  '31':
  - type: text
    content: 'I myself did not know him, but '
  - type: note
    content: Luke 1:17, 76, 77
  - type: text
    content: 'for this purpose I came baptizing with water, that he might be revealed to Israel.” '
  '32':
  - type: text
    content: 'And John '
  - type: note
    content: See ver. 7
  - type: text
    content: 'bore witness: '
  - type: note
    content: Matt. 3:16; Mark 1:10; Luke 3:22
  - type: text
    content: '“I saw the Spirit descend from heaven like a dove, and '
  - type: note
    content: '[Isa. 11:2; Acts 10:38]'
  - type: text
    content: 'it remained on him. '
  '33':
  - type: text
    content: 'I myself did not know him, but '
  - type: note
    content: ver. 6; Luke 3:2
  - type: text
    content: 'he who sent me to baptize '
  - type: note
    content: '[ch. 3:5]'
  - type: text
    content: 'with water said to me, ‘He on whom you see the Spirit descend and remain, '
  - type: note
    content: Matt. 3:11; Mark 1:8; Luke 3:16; Acts 1:5
  - type: text
    content: 'this is he who baptizes '
  - type: note
    content: '[ch. 3:5]'
  - type: text
    content: 'with the Holy Spirit.’ '
  '34':
  - type: text
    content: And I have seen and have borne witness that this is the Son
  - type: note
    content: Some manuscripts the Chosen One
  - type: text
    content: ' of God.”'
  - type: heading
    content: Jesus Calls the First Disciples
  '35':
  - type: text
    content: 'The next day again John was standing with two of his disciples, '
  '36':
  - type: text
    content: 'and he looked at Jesus as he walked by and said, “Behold, '
  - type: note
    content: See ver. 29
  - type: text
    content: 'the Lamb of God!” '
  '37':
  - type: text
    content: 'The two disciples heard him say this, and they followed Jesus. '
  '38':
  - type: text
    content: 'Jesus turned and saw them following and said to them, '
  - type: note
    content: ch. 18:4, 7; 20:15
  - type: text
    content: “What are you seeking?”
  - type: text
    content: ' And they said to him, '
  - type: note
    content: ver. 49; ch. 3:2, 26; 6:25; [ch. 20:16; Mark 10:51]
  - type: text
    content: '“Rabbi” (which means Teacher), “where are you staying?” '
  '39':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Come and you will see.”
  - type: text
    content: ' So they came and saw where he was staying, and they stayed with him that day, for it was about the tenth hour.'
  - type: note
    content: That is, about 4 p.m.
  - type: text
    content: ' '
  '4':
  - type: note
    content: ch. 5:26; 11:25; 1 John 1:2; 5:11
  - type: text
    content: In him was life,
  - type: note
    content: Or was not any thing made. That which has been made was life in him
  - type: text
    content: ' and '
  - type: note
    content: ch. 8:12; 9:5; 12:46
  - type: text
    content: 'the life was the light of men. '
  '40':
  - type: note
    content: For ver. 40-42, [Matt. 4:18-22; Mark 1:16-20; Luke 5:2-11]
  - type: text
    content: One of the two who heard John speak and followed Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' was Andrew, Simon Peter’s brother. '
  '41':
  - type: text
    content: 'He first found his own brother Simon and said to him, “We have found '
  - type: note
    content: ch. 4:25
  - type: text
    content: 'the Messiah” (which means Christ). '
  '42':
  - type: text
    content: 'He brought him to Jesus. Jesus looked at him and said, '
  - type: text
    content: '“You are Simon the son of '
  - type: note
    content: ch. 21:15-17
  - type: text
    content: 'John. You shall be called '
  - type: note
    content: 1 Cor. 1:12; 3:22
  - type: text
    content: Cephas”
  - type: text
    content: ' (which means '
  - type: note
    content: Matt. 16:18
  - type: text
    content: Peter
  - type: note
    content: Cephas and Peter are from the word for rock in Aramaic and Greek, respectively
  - type: text
    content: ).
  - type: heading
    content: Jesus Calls Philip and Nathanael
  '43':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 35 ; ch. 2:1]'
  - type: text
    content: 'The next day Jesus decided '
  - type: note
    content: '[ver. 28]'
  - type: text
    content: 'to go to Galilee. He found Philip and said to him, '
  - type: text
    content: “Follow me.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 12:21
  - type: text
    content: 'Philip was from Bethsaida, the city of Andrew and Peter. '
  '45':
  - type: text
    content: 'Philip found '
  - type: note
    content: ch. 21:2
  - type: text
    content: 'Nathanael and said to him, “We have found him of whom '
  - type: note
    content: See Luke 16:16; 24:27
  - type: text
    content: 'Moses in the Law and also the prophets wrote, Jesus '
  - type: note
    content: See Matt. 2:23
  - type: text
    content: 'of Nazareth, '
  - type: note
    content: ch. 6:42; Luke 3:23
  - type: text
    content: 'the son of Joseph.” '
  '46':
  - type: text
    content: 'Nathanael said to him, '
  - type: note
    content: '[ch. 7:41, 52]'
  - type: text
    content: '“Can anything good come out of Nazareth?” Philip said to him, “Come and see.” '
  '47':
  - type: text
    content: 'Jesus saw Nathanael coming toward him and said of him, '
  - type: text
    content: '“Behold, '
  - type: note
    content: Ps. 73:1; Rom. 9:4, 6
  - type: text
    content: 'an Israelite indeed, '
  - type: note
    content: Ps. 32:2; [Zeph. 3:13; Rev. 14:5]
  - type: text
    content: in whom there is no deceit!”
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Nathanael said to him, “How '
  - type: note
    content: ch. 2:24, 25
  - type: text
    content: 'do you know me?” Jesus answered him, '
  - type: text
    content: “Before Philip called you, when you were under the fig tree, I saw you.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Nathanael answered him, '
  - type: note
    content: See ver. 38
  - type: text
    content: '“Rabbi, '
  - type: note
    content: '[ch. 6:69; 11:27; 20:28]'
  - type: text
    content: 'you are the Son of God! You are the '
  - type: note
    content: ch. 12:13; Zeph. 3:15; Matt. 27:11, 42; [Zech. 9:9]
  - type: text
    content: 'King of Israel!” '
  '5':
  - type: note
    content: '[ch. 3:19]'
  - type: text
    content: The light shines in the darkness, and the darkness has not overcome it.
  '50':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “Because I said to you, ‘I saw you under the fig tree,’ do you believe? You will see greater things than these.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And he said to him, '
  - type: text
    content: “Truly, truly, I say to you,
  - type: note
    content: The Greek for you is plural; twice in this verse
  - type: text
    content: ' '
  - type: text
    content: 'you will see '
  - type: note
    content: Ezek. 1:1; Matt. 3:16; Luke 3:21
  - type: text
    content: 'heaven opened, and '
  - type: note
    content: '[Gen. 28:12]'
  - type: text
    content: 'the angels of God ascending and descending on '
  - type: note
    content: See Dan. 7:13
  - type: text
    content: the Son of Man.”
  '6':
  - type: text
    content: 'There was a man '
  - type: note
    content: ver. 33; ch. 3:28; Mal. 3:1
  - type: text
    content: 'sent from God, whose name was '
  - type: note
    content: Matt. 3:1; Mark 1:4; Luke 3:2
  - type: text
    content: 'John. '
  '7':
  - type: text
    content: 'He came as a '
  - type: note
    content: ch. 3:26; 5:33
  - type: text
    content: 'witness, to bear witness about the light, '
  - type: note
    content: Acts 19:4
  - type: text
    content: 'that all might believe through him. '
  '8':
  - type: note
    content: ver. 20
  - type: text
    content: He was not the light, but came to bear witness about the light.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Isa. 49:6; 1 John 2:8
  - type: text
    content: 'The true light, which gives light to everyone, was coming into the world. '
