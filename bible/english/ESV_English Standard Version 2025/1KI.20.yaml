document_id: 1KI.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahab’s Wars with Syria
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 6:24; 8:7; [ch. 15:18 ]
  - type: text
    content: 'Ben-hadad the king of Syria gathered all his army together. '
  - type: note
    content: ch. 22:31
  - type: text
    content: 'Thirty-two kings were with him, and horses and chariots. And he went up and closed in on '
  - type: note
    content: ch. 16:24
  - type: text
    content: 'Samaria and fought against it. '
  '10':
  - type: text
    content: 'Ben-hadad sent to him and said, '
  - type: note
    content: ch. 19:2
  - type: text
    content: '“The gods do so to me and more also, if the dust of Samaria shall suffice for handfuls for all the people '
  - type: note
    content: '[Ex. 11:8]'
  - type: text
    content: 'who follow me.” '
  '11':
  - type: text
    content: 'And the king of Israel answered, “Tell him, ‘Let not him who straps on his armor boast himself as he who takes it off.’” '
  '12':
  - type: text
    content: 'When Ben-hadad heard this message as '
  - type: note
    content: '[ch. 16:9]'
  - type: text
    content: he was drinking with the kings in the booths, he said to his men, “Take your positions.” And they took their positions against the city.
  - type: heading
    content: Ahab Defeats Ben-hadad
  '13':
  - type: text
    content: 'And behold, a prophet came near to Ahab king of Israel and said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Have you seen all this great multitude? Behold, '
  - type: note
    content: ver. 28
  - type: text
    content: 'I will give it into your hand this day, '
  - type: note
    content: '[ch. 18:36]'
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '14':
  - type: text
    content: 'And Ahab said, “By whom?” He said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', By the servants of the governors of the districts.” Then he said, “Who shall begin the battle?” He answered, “You.” '
  '15':
  - type: text
    content: Then he mustered the servants of the governors of the districts, and they were 232. And after them he mustered all the people of Israel, seven thousand.
  '16':
  - type: text
    content: 'And they went out at noon, while Ben-hadad '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'was drinking himself drunk in the booths, he and the thirty-two kings who helped him. '
  '17':
  - type: text
    content: 'The servants of the governors of the districts went out first. And Ben-hadad sent out scouts, and they reported to him, “Men are coming out from Samaria.” '
  '18':
  - type: text
    content: He said, “If they have come out for peace, take them alive. Or if they have come out for war, take them alive.”
  '19':
  - type: text
    content: 'So these went out of the city, the servants of the governors of the districts and the army that followed them. '
  '2':
  - type: text
    content: 'And he sent messengers into the city to Ahab king of Israel and said to him, “Thus says Ben-hadad: '
  '20':
  - type: text
    content: 'And each struck down his man. The Syrians fled, and Israel pursued them, but Ben-hadad king of Syria escaped on a horse with horsemen. '
  '21':
  - type: text
    content: And the king of Israel went out and struck the horses and chariots, and struck the Syrians with a great blow.
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 13
  - type: text
    content: 'the prophet came near to the king of Israel and said to him, “Come, strengthen yourself, and consider well what you have to do, for '
  - type: note
    content: 2 Sam. 11:1
  - type: text
    content: in the spring the king of Syria will come up against you.”
  '23':
  - type: text
    content: 'And the servants of the king of Syria said to him, “Their gods are gods of the hills, and so they were stronger than we. But let us fight against them in the plain, and surely we shall be stronger than they. '
  '24':
  - type: text
    content: 'And do this: remove the kings, each from his post, and put commanders in their places, '
  '25':
  - type: text
    content: and muster an army like the army that you have lost, horse for horse, and chariot for chariot. Then we will fight against them in the plain, and surely we shall be stronger than they.” And he listened to their voice and did so.
  - type: heading
    content: Ahab Defeats Ben-hadad Again
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'In the spring, Ben-hadad mustered the Syrians and went up to '
  - type: note
    content: 2 Kgs. 13:17
  - type: text
    content: 'Aphek to fight against Israel. '
  '27':
  - type: text
    content: 'And the people of Israel were mustered and were provisioned and went against them. The people of Israel encamped before them like two little flocks of goats, but the Syrians filled the country. '
  '28':
  - type: text
    content: 'And a '
  - type: note
    content: ch. 17:18
  - type: text
    content: 'man of God came near and said to the king of Israel, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Because the Syrians have said, '
  - type: note
    content: ver. 23
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is a god of the hills but he is not a god of the valleys,” therefore '
  - type: note
    content: ver. 13
  - type: text
    content: 'I will give all this great multitude into your hand, and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '.’” '
  '29':
  - type: text
    content: 'And they encamped opposite one another seven days. Then on the seventh day the battle was joined. And the people of Israel struck down of the Syrians 100,000 foot soldiers in one day. '
  '3':
  - type: text
    content: '‘Your silver and your gold are mine; your best wives and children also are mine.’” '
  '30':
  - type: text
    content: 'And the rest fled into the city of '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: Aphek, and the wall fell upon 27,000 men who were left.
  - type: text
    content: 'Ben-hadad also fled and entered '
  - type: note
    content: ch. 22:25; 2 Kgs. 9:2; 2 Chr. 18:24
  - type: text
    content: 'an inner chamber in the city. '
  '31':
  - type: text
    content: 'And his servants said to him, “Behold now, we have heard that the kings of the house of Israel are merciful kings. Let us '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: 'put sackcloth around our waists and ropes on our heads and go out to the king of Israel. Perhaps he will spare your life.” '
  '32':
  - type: text
    content: 'So they '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'tied sackcloth around their waists and put ropes on their heads and went to the king of Israel and said, “Your servant Ben-hadad says, ‘Please, let me live.’” And he said, “Does he still live? He is my brother.” '
  '33':
  - type: text
    content: 'Now the men were watching for a sign, and they quickly took it up from him and said, “Yes, your brother Ben-hadad.” Then he said, “Go and bring him.” Then Ben-hadad came out to him, and he caused him to come up into the chariot. '
  '34':
  - type: text
    content: 'And Ben-hadad said to him, '
  - type: note
    content: ch. 15:20
  - type: text
    content: '“The cities that my father took from your father I will restore, and you may establish bazaars for yourself in '
  - type: note
    content: '[ch. 11:24]'
  - type: text
    content: Damascus, as my father did in Samaria.” And Ahab said, “I will let you go on these terms.” So he made a covenant with him and let him go.
  - type: heading
    content: A Prophet Condemns Ben-hadad’s Release
  '35':
  - type: text
    content: 'And a certain man of '
  - type: note
    content: 2 Kgs. 2:3, 5, 7, 15
  - type: text
    content: 'the sons of the prophets said to his fellow '
  - type: note
    content: ch. 13:17, 18
  - type: text
    content: 'at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Strike me, please.” But the man refused to strike him. '
  '36':
  - type: text
    content: 'Then he said to him, “Because you have not obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ', behold, as soon as you have gone from me, a lion shall strike you down.” And as soon as he had departed from him, '
  - type: note
    content: '[ch. 13:24]'
  - type: text
    content: 'a lion met him and struck him down. '
  '37':
  - type: text
    content: 'Then he found another man and said, “Strike me, please.” And the man struck him—struck him and wounded him. '
  '38':
  - type: text
    content: 'So the prophet departed and waited for the king by the way, '
  - type: note
    content: 1 Sam. 28:8
  - type: text
    content: 'disguising himself with a bandage over his eyes. '
  '39':
  - type: text
    content: 'And as the king passed, he cried to the king and said, “Your servant went out into the midst of the battle, and behold, a soldier turned and brought a man to me and said, ‘Guard this man; if by any means he is missing, '
  - type: note
    content: '[2 Kgs. 10:24]'
  - type: text
    content: your life shall be for his life, or else you shall pay a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver.’ '
  '4':
  - type: text
    content: 'And the king of Israel answered, “As you say, my lord, O king, I am yours, and all that I have.” '
  '40':
  - type: text
    content: 'And as your servant was busy here and there, he was gone.” The king of Israel said to him, “So shall your judgment be; you yourself have decided it.” '
  '41':
  - type: text
    content: 'Then he hurried to take the bandage away from his eyes, and the king of Israel recognized him as one of the prophets. '
  '42':
  - type: text
    content: 'And he said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Because you have let go out of your hand the man whom I had devoted to destruction,'
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' therefore '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: 'your life shall be for his life, and your people for his people.’” '
  '43':
  - type: text
    content: 'And the king of Israel '
  - type: note
    content: ch. 21:4
  - type: text
    content: went to his house vexed and sullen and came to Samaria.
  '5':
  - type: text
    content: 'The messengers came again and said, “Thus says Ben-hadad: ‘I sent to you, saying, “Deliver to me your silver and your gold, your wives and your children.” '
  '6':
  - type: text
    content: Nevertheless I will send my servants to you tomorrow about this time, and they shall search your house and the houses of your servants and lay hands on whatever pleases you and take it away.’”
  '7':
  - type: text
    content: 'Then the king of Israel called all the '
  - type: note
    content: ch. 21:8, 11
  - type: text
    content: 'elders of the land and said, '
  - type: note
    content: '[2 Kgs. 5:7]'
  - type: text
    content: '“Mark, now, and see how this man is seeking trouble, for he sent to me for my wives and my children, and for my silver and my gold, and I did not refuse him.” '
  '8':
  - type: text
    content: 'And all the elders and all the people said to him, “Do not listen or consent.” '
  '9':
  - type: text
    content: 'So he said to the messengers of Ben-hadad, “Tell my lord the king, ‘All that you first demanded of your servant I will do, but this thing I cannot do.’” And the messengers departed and brought him word again. '
