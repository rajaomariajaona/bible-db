    - type: text
      text: 'tied sackcloth around their waists and put ropes on their heads and went to the king of Israel and said, “Your servant Ben-hadad says, ‘Please, let me live.’” And he said, “Does he still live? He is my brother.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the men were watching for a sign, and they quickly took it up from him and said, “Yes, your brother Ben-hadad.” Then he said, “Go and bring him.” Then Ben-hadad came out to him, and he caused him to come up into the chariot. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ben-hadad said to him, '
    - type: usfm
