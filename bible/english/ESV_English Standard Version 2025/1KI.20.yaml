      marker-yv: yv-n
    - type: text
      text: ' of silver.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king of Israel answered, “As you say, my lord, O king, I am yours, and all that I have.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as your servant was busy here and there, he was gone.” The king of Israel said to him, “So shall your judgment be; you yourself have decided it.” '
  '41':
