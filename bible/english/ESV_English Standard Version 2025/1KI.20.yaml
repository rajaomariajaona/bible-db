  - type: text
    text: 'And all the elders and all the people said to him, “Do not listen or consent.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he said to the messengers of Ben-hadad, “Tell my lord the king, ‘All that you first demanded of your servant I will do, but this thing I cannot do.’” And the messengers departed and brought him word again. '
  - type: usfm
    marker: vlbl
