        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:20
      marker-yv: yv-n
    - type: text
      text: '“The cities that my father took from your father I will restore, and you may establish bazaars for yourself in '
    - type: usfm
