      text: Then he mustered the servants of the governors of the districts, and they were 232. And after them he mustered all the people of Israel, seven thousand.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went out at noon, while Ben-hadad '
