          text: '13'
      marker-yv: yv-n
    - type: text
      text: 'the prophet came near to the king of Israel and said to him, “Come, strengthen yourself, and consider well what you have to do, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 11:1
      marker-yv: yv-n
    - type: text
      text: in the spring the king of Syria will come up against you.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the servants of the king of Syria said to him, “Their gods are gods of the hills, and so they were stronger than we. But let us fight against them in the plain, and surely we shall be stronger than they. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do this: remove the kings, each from his post, and put commanders in their places, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and muster an army like the army that you have lost, horse for horse, and chariot for chariot. Then we will fight against them in the plain, and surely we shall be stronger than they.” And he listened to their voice and did so.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahab Defeats Ben-hadad Again
