  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The servants of the governors of the districts went out first. And Ben-hadad sent out scouts, and they reported to him, “Men are coming out from Samaria.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “If they have come out for peace, take them alive. Or if they have come out for war, take them alive.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So these went out of the city, the servants of the governors of the districts and the army that followed them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent messengers into the city to Ahab king of Israel and said to him, “Thus says Ben-hadad: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And each struck down his man. The Syrians fled, and Israel pursued them, but Ben-hadad king of Syria escaped on a horse with horsemen. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king of Israel went out and struck the horses and chariots, and struck the Syrians with a great blow.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
