document_id: 1SA.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Samuel
  - type: text
    content: ' '
  - type: note
    content: ch. 28:3
  - type: text
    content: 'Now Samuel died. And all Israel assembled '
  - type: note
    content: Gen. 50:10; [Num. 20:29; Deut. 34:8]
  - type: text
    content: 'and mourned for him, and they buried him '
  - type: note
    content: '[1 Kgs. 2:34]'
  - type: text
    content: 'in his house at '
  - type: note
    content: ch. 1:19
  - type: text
    content: Ramah.
  - type: heading
    content: David and Abigail
  - type: text
    content: 'Then David rose and went down to '
  - type: note
    content: Num. 10:12
  - type: text
    content: 'the wilderness of Paran. '
  '10':
  - type: text
    content: 'And Nabal answered David’s servants, '
  - type: note
    content: '[Judg. 9:28]'
  - type: text
    content: '“Who is David? Who is the son of Jesse? '
  - type: note
    content: '[Judg. 12:4]'
  - type: text
    content: 'There are many servants these days who are breaking away from their masters. '
  '11':
  - type: text
    content: 'Shall I take '
  - type: note
    content: '[Judg. 8:6]'
  - type: text
    content: 'my bread and my water and my meat that I have killed for my shearers and give it to '
  - type: note
    content: '[ch. 22:2]'
  - type: text
    content: 'men who come from I do not know where?” '
  '12':
  - type: text
    content: 'So David’s young men turned away and came back and told him all this. '
  '13':
  - type: text
    content: 'And David said to his men, “Every man strap on his sword!” And every man of them strapped on his sword. David also strapped on his sword. And '
  - type: note
    content: ch. 23:13; 27:2; [ch. 22:2]
  - type: text
    content: 'about four hundred men went up after David, '
  - type: note
    content: ch. 23:13; 27:2; [ch. 22:2]
  - type: text
    content: 'while two hundred '
  - type: note
    content: ch. 30:24
  - type: text
    content: remained with the baggage.
  '14':
  - type: text
    content: 'But one of the young men told Abigail, Nabal’s wife, “Behold, David sent messengers out of the wilderness to greet our master, and he railed at them. '
  '15':
  - type: text
    content: 'Yet the men were very good to us, and we suffered no harm, '
  - type: note
    content: ver. 7, 21
  - type: text
    content: 'and we did not miss anything when we were in the fields, as long as we went with them. '
  '16':
  - type: text
    content: 'They were '
  - type: note
    content: '[Job 1:10]'
  - type: text
    content: 'a wall to us both by night and by day, all the while we were with them keeping the sheep. '
  '17':
  - type: text
    content: 'Now therefore know this and consider what you should do, '
  - type: note
    content: '[ch. 20:7]'
  - type: text
    content: 'for harm is determined against our master and against all his house, and he is such '
  - type: note
    content: Deut. 13:13
  - type: text
    content: a worthless man that one cannot speak to him.”
  '18':
  - type: text
    content: Then Abigail made haste and took two hundred loaves and two skins of wine and five sheep already prepared and five seahs
  - type: note
    content: A seah was about 7.7 quarts or 7.3 liters
  - type: text
    content: ' of parched grain and a hundred clusters of raisins and two hundred cakes of figs, and laid them on donkeys. '
  '19':
  - type: text
    content: 'And she said to her young men, “Go on before me; behold, I come after you.” But she did not tell her husband Nabal. '
  '2':
  - type: text
    content: 'And there was a man in '
  - type: note
    content: ch. 23:24
  - type: text
    content: 'Maon whose business was in '
  - type: note
    content: Josh. 15:55
  - type: text
    content: 'Carmel. The man was very rich; he had three thousand sheep and a thousand goats. '
  - type: note
    content: '[Gen. 38:13; 2 Sam. 13:23]'
  - type: text
    content: 'He was shearing his sheep in Carmel. '
  '20':
  - type: text
    content: 'And as she rode on the donkey and came down under cover of the mountain, behold, David and his men came down toward her, and she met them. '
  '21':
  - type: text
    content: 'Now David had said, “Surely in vain have I guarded all that this fellow has in the wilderness, '
  - type: note
    content: ver. 7, 15
  - type: text
    content: 'so that nothing was missed of all that belonged to him, and he has '
  - type: note
    content: Ps. 109:5; [Prov. 17:13]
  - type: text
    content: 'returned me evil for good. '
  '22':
  - type: note
    content: See Ruth 1:17
  - type: text
    content: God do so to the enemies of David
  - type: note
    content: Septuagint to David
  - type: text
    content: ' and more also, if by morning I leave so much as one male of all who belong to him.”'
  '23':
  - type: text
    content: 'When Abigail saw David, she hurried '
  - type: note
    content: Josh. 15:18; Judg. 1:14; [Gen. 24:64]
  - type: text
    content: 'and got down from the donkey '
  - type: note
    content: ver. 41; Ruth 2:10
  - type: text
    content: 'and fell before David on her face and bowed to the ground. '
  '24':
  - type: text
    content: 'She fell at his feet and said, '
  - type: note
    content: '[2 Sam. 14:9]'
  - type: text
    content: '“On me alone, my lord, be the guilt. Please let your servant speak in your ears, and hear the words of your servant. '
  '25':
  - type: text
    content: 'Let not my lord regard '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: this worthless fellow, Nabal, for as his name is, so is he. Nabal
  - type: note
    content: Nabal means fool
  - type: text
    content: ' is his name, and folly is with him. But I your servant did not see the young men of my lord, whom you sent. '
  '26':
  - type: text
    content: 'Now then, my lord, '
  - type: note
    content: See ch. 20:3
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and as your soul lives, because '
  - type: note
    content: '[Gen. 20:6]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has restrained you from bloodguilt and from '
  - type: note
    content: '[Rom. 12:19; Heb. 10:30]'
  - type: text
    content: 'saving with your own hand, now then '
  - type: note
    content: '[2 Sam. 18:32]'
  - type: text
    content: 'let your enemies and those who seek to do evil to my lord be as Nabal. '
  '27':
  - type: text
    content: 'And now let this '
  - type: note
    content: ch. 30:26; Gen. 33:11; [2 Kgs. 5:15]
  - type: text
    content: 'present that your servant has brought to my lord be given to the young men who follow my lord. '
  '28':
  - type: text
    content: 'Please forgive the trespass of your servant. For the '
  - type: text
    content: Lord
  - type: text
    content: ' will certainly make my lord '
  - type: note
    content: 1 Kgs. 11:38; [ch. 2:35; 2 Sam. 7:11, 27; 1 Kgs. 9:5; 1 Chr. 17:10, 25]
  - type: text
    content: 'a sure house, because my lord '
  - type: note
    content: ch. 18:17
  - type: text
    content: 'is fighting the battles of the '
  - type: text
    content: Lord
  - type: text
    content: ', and evil shall not be found in you so long as you live. '
  '29':
  - type: text
    content: 'If men rise up to pursue you and to seek your life, the life of my lord shall be bound in the bundle of the living in the care of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. And the lives of your enemies '
  - type: note
    content: Jer. 10:18
  - type: text
    content: 'he shall sling out as from the hollow of a sling. '
  '3':
  - type: text
    content: 'Now the name of the man was Nabal, and the name of his wife Abigail. The woman was discerning and beautiful, but the man was harsh and badly behaved; '
  - type: note
    content: '[ch. 30:14]'
  - type: text
    content: 'he was a Calebite. '
  '30':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' has done to my lord according to all the good that he has spoken concerning you and has appointed you prince'
  - type: note
    content: Or leader
  - type: text
    content: ' over Israel, '
  '31':
  - type: text
    content: 'my lord shall have no cause of grief or pangs of conscience for having shed blood without cause or for my lord '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'working salvation himself. And when the '
  - type: text
    content: Lord
  - type: text
    content: ' has dealt well with my lord, then remember your servant.”'
  '32':
  - type: text
    content: 'And David said to Abigail, '
  - type: note
    content: Gen. 24:27; Ps. 41:13; 72:18; Luke 1:68
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who sent you this day to meet me! '
  '33':
  - type: text
    content: 'Blessed be your discretion, and blessed be you, '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'who have kept me this day from bloodguilt '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'and from working salvation with my own hand! '
  '34':
  - type: text
    content: 'For as surely '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, lives, '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'who has restrained me from hurting you, unless you had hurried and come to meet me, truly by morning there had not been left to Nabal so much as one male.” '
  '35':
  - type: text
    content: 'Then David received from her hand what she had brought him. And he said to her, '
  - type: note
    content: See ch. 1:17
  - type: text
    content: “Go up in peace to your house. See, I have obeyed your voice, and I have granted your petition.”
  '36':
  - type: text
    content: 'And Abigail came to Nabal, and behold, '
  - type: note
    content: '[2 Sam. 13:23]'
  - type: text
    content: 'he was holding a feast in his house, like the feast of a king. And Nabal’s heart '
  - type: note
    content: '[2 Sam. 13:28; 1 Kgs. 21:7]'
  - type: text
    content: 'was merry within him, for he was very drunk. So she told him nothing '
  - type: note
    content: ch. 22:15
  - type: text
    content: 'at all until the morning light. '
  '37':
  - type: text
    content: 'In the morning, when the wine had gone out of Nabal, his wife told him these things, and his heart died within him, and he became as a stone. '
  '38':
  - type: text
    content: 'And about ten days later '
  - type: note
    content: ch. 26:10
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' struck Nabal, and he died.'
  '39':
  - type: text
    content: 'When David heard that Nabal was dead, he said, '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' who has '
  - type: note
    content: See ch. 24:15
  - type: text
    content: 'avenged the insult I received at the hand of Nabal, '
  - type: note
    content: ver. 26, 33, 34
  - type: text
    content: 'and has kept back his servant from wrongdoing. '
  - type: note
    content: 1 Kgs. 2:44; [Ps. 7:16; Ezek. 17:19]
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has returned the evil of Nabal on his own head.” Then David sent and '
  - type: note
    content: '[Song 8:8]'
  - type: text
    content: 'spoke to Abigail, to take her as his wife. '
  '4':
  - type: text
    content: 'David heard in the wilderness that Nabal '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'was shearing his sheep. '
  '40':
  - type: text
    content: 'When the servants of David came to Abigail at Carmel, they said to her, “David has sent us to you to take you to him as his wife.” '
  '41':
  - type: text
    content: 'And she rose '
  - type: note
    content: '[Ruth 2:10]'
  - type: text
    content: 'and bowed with her face to the ground and said, “Behold, your handmaid is a servant to wash the feet of the servants of my lord.” '
  '42':
  - type: text
    content: And Abigail hurried and rose and mounted a donkey, and her five young women attended her. She followed the messengers of David and became his wife.
  '43':
  - type: text
    content: 'David also took Ahinoam of '
  - type: note
    content: Josh. 15:56
  - type: text
    content: 'Jezreel, '
  - type: note
    content: ch. 27:3; 30:5; 2 Sam. 2:2; 3:2, 3; 1 Chr. 3:1
  - type: text
    content: 'and both of them became his wives. '
  '44':
  - type: text
    content: Saul had given Michal his daughter, David’s wife, to Palti the son of Laish, who was of Gallim.
  '5':
  - type: text
    content: 'So David sent ten young men. And David said to the young men, “Go up to Carmel, and go to Nabal and greet him in my name. '
  '6':
  - type: text
    content: 'And thus you shall greet him:'
  - type: note
    content: Or shall say to him who lives
  - type: text
    content: ' '
  - type: note
    content: '[1 Chr. 12:18; Matt. 10:13; Luke 10:5]'
  - type: text
    content: '‘Peace be to you, and peace be to your house, and peace be to all that you have. '
  '7':
  - type: text
    content: 'I hear that you have shearers. Now your shepherds have been with us, and we did them no harm, '
  - type: note
    content: ver. 15, 21
  - type: text
    content: 'and they missed nothing all the time they were in Carmel. '
  '8':
  - type: text
    content: 'Ask your young men, and they will tell you. Therefore let my young men find favor in your eyes, for we come '
  - type: note
    content: Esth. 8:17; 9:19, 22
  - type: text
    content: on a feast day. Please give whatever you have at hand to your servants and to your son David.’”
  '9':
  - type: text
    content: 'When David’s young men came, they said all this to Nabal in the name of David, and then they waited. '
