document_id: ECC.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: All Is Vanity
  - type: text
    content: 'The words of '
  - type: note
    content: ver. 12; ch. 7:27; 12:8-10
  - type: text
    content: the Preacher,
  - type: note
    content: Or Convener, or Collector; Hebrew Qoheleth (so throughout Ecclesiastes)
  - type: text
    content: ' the son of David, '
  - type: note
    content: ver. 12
  - type: text
    content: king in Jerusalem.
  '10':
  - type: text
    content: Is there a thing of which it is said,
  - type: text
    content: “See, this is new”?
  - type: text
    content: 'It has been '
  - type: note
    content: ch. 3:15
  - type: text
    content: already
  - type: text
    content: in the ages before us.
  '11':
  - type: text
    content: 'There is no '
  - type: note
    content: ch. 2:16; See ch. 9:5
  - type: text
    content: remembrance of former things,
  - type: note
    content: Or former people
  - type: text
    content: nor will there be any remembrance
  - type: text
    content: of later things
  - type: note
    content: Or later people
  - type: text
    content: ' yet to be'
  - type: text
    content: among those who come after.
  - type: heading
    content: The Vanity of Wisdom
  '12':
  - type: text
    content: 'I '
  - type: note
    content: ver. 1
  - type: text
    content: 'the Preacher have been king over Israel in Jerusalem. '
  '13':
  - type: text
    content: 'And I '
  - type: note
    content: ver. 17; [1 Kgs. 4:33]
  - type: text
    content: applied my heart
  - type: note
    content: The Hebrew term denotes the center of one’s inner life, including mind, will, and emotions
  - type: text
    content: ' to seek and to search out by wisdom all that is done under heaven. It is an unhappy '
  - type: note
    content: ch. 2:23, 26; 3:10; [Gen. 3:19]
  - type: text
    content: 'business that God has given to the children of man to be busy with. '
  '14':
  - type: text
    content: 'I have seen everything that is done under the sun, and behold, all is '
  - type: note
    content: ver. 2; ch. 2:11, 17, 26; 4:4; 6:9
  - type: text
    content: vanity
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (see note on 1:2)
  - type: text
    content: ' and a striving after wind.'
  - type: note
    content: Or a feeding on wind; compare Hosea 12:1 (also in Ecclesiastes 1:17; 2:11, 17, 26; 4:4, 6, 16; 6:9)
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 7:13
  - type: text
    content: What is crooked cannot be made straight,
  - type: text
    content: and what is lacking cannot be counted.
  '16':
  - type: text
    content: 'I said in my heart, “I have acquired great '
  - type: note
    content: ch. 2:9; [1 Kgs. 3:12, 13; 4:30; 10:7, 23]
  - type: text
    content: 'wisdom, surpassing all who were over Jerusalem before me, and my heart has had great experience of wisdom and knowledge.” '
  '17':
  - type: text
    content: 'And I '
  - type: note
    content: ver. 13; [ch. 2:3, 12; 7:23, 25]
  - type: text
    content: 'applied my heart to know wisdom and to know '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'madness and folly. I perceived that this also is but '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: a striving after wind.
  '18':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 12:12]'
  - type: text
    content: in much wisdom is much vexation,
  - type: text
    content: and he who increases knowledge increases sorrow.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:8
  - type: text
    content: Vanity
  - type: note
    content: The Hebrew term hebel, translated vanity or vain, refers concretely to a “mist,” “vapor,” or “mere breath,” and metaphorically to something that is fleeting or elusive (with different nuances depending on the context). It appears five times in this verse and in 29 other verses in Ecclesiastes
  - type: text
    content: ' of vanities, says '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: the Preacher,
  - type: note
    content: ch. 12:8
  - type: text
    content: 'vanity of vanities! '
  - type: note
    content: '[Rom. 8:20]'
  - type: text
    content: All is vanity.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ver. 14 ; Ps. 144:4; See Job 7:16; Ps. 39:5
  - type: text
    content: 'What '
  - type: note
    content: ch. 2:11, 22; 3:9; 5:16
  - type: text
    content: does man gain by all the toil
  - type: text
    content: at which he toils under the sun?
  '4':
  - type: text
    content: A generation goes, and a generation comes,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 104:5; 119:90
  - type: text
    content: the earth remains forever.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 19:4-6 ]'
  - type: text
    content: The sun rises, and the sun goes down,
  - type: text
    content: and hastens
  - type: note
    content: Or and returns panting
  - type: text
    content: ' to the place where it rises.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:5; John 3:8 ]'
  - type: text
    content: The wind blows to the south
  - type: text
    content: and goes around to the north;
  - type: text
    content: around and around goes the wind,
  - type: text
    content: and on its circuits the wind returns.
  '7':
  - type: text
    content: 'All '
  - type: note
    content: Ps. 104:8, 9
  - type: text
    content: streams run to the sea,
  - type: text
    content: but the sea is not full;
  - type: text
    content: to the place where the streams flow,
  - type: text
    content: there they flow again.
  '8':
  - type: text
    content: All things are full of weariness;
  - type: text
    content: a man cannot utter it;
  - type: note
    content: ch. 4:8; Prov. 27:20
  - type: text
    content: the eye is not satisfied with seeing,
  - type: text
    content: nor the ear filled with hearing.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:15; 6:10; [ch. 2:12 ]
  - type: text
    content: What has been is what will be,
  - type: text
    content: and what has been done is what will be done,
  - type: text
    content: and there is nothing new under the sun.
