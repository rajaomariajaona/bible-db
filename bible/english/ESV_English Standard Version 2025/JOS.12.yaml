document_id: JOS.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Kings Defeated by Moses
  - type: text
    content: 'Now these are the kings of the land whom the people of Israel defeated and took possession of their land beyond the Jordan toward the sunrise, from '
  - type: note
    content: Num. 21:13, 24; Deut. 3:8, 9
  - type: text
    content: 'the Valley of the Arnon to Mount Hermon, with all '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'the Arabah eastward: '
  '10':
  - type: note
    content: ch. 10:23
  - type: text
    content: 'the king of Jerusalem, one; '
  - type: note
    content: ch. 10:23
  - type: text
    content: 'the king of Hebron, one; '
  '11':
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the king of Jarmuth, one; '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the king of Lachish, one; '
  '12':
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the king of Eglon, one; '
  - type: note
    content: ch. 10:33
  - type: text
    content: 'the king of Gezer, one; '
  '13':
  - type: note
    content: ch. 10:38, 39
  - type: text
    content: 'the king of Debir, one; the king of Geder, one; '
  '14':
  - type: text
    content: 'the king of Hormah, one; the king of Arad, one; '
  '15':
  - type: note
    content: ch. 10:29
  - type: text
    content: 'the king of Libnah, one; the king of Adullam, one; '
  '16':
  - type: note
    content: ch. 10:28
  - type: text
    content: 'the king of Makkedah, one; '
  - type: note
    content: ch. 8:17; Judg. 1:22
  - type: text
    content: 'the king of Bethel, one; '
  '17':
  - type: text
    content: 'the king of Tappuah, one; the king of Hepher, one; '
  '18':
  - type: text
    content: 'the king of Aphek, one; the king of Lasharon, one; '
  '19':
  - type: note
    content: ch. 11:1
  - type: text
    content: 'the king of Madon, one; '
  - type: note
    content: ch. 11:1, 10
  - type: text
    content: 'the king of Hazor, one; '
  '2':
  - type: note
    content: Deut. 2:32, 33; 3:6, 16; See Num. 21:21-26
  - type: text
    content: 'Sihon king of the Amorites who lived at Heshbon and ruled from Aroer, which is on the edge of the Valley of the Arnon, and '
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'from the middle of the valley as far as the '
  - type: note
    content: Gen. 32:22
  - type: text
    content: 'river Jabbok, the boundary of the Ammonites, that is, half of Gilead, '
  '20':
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'the king of Shimron-meron, one; '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'the king of Achshaph, one; '
  '21':
  - type: note
    content: ch. 17:11
  - type: text
    content: 'the king of Taanach, one; '
  - type: note
    content: ch. 17:11
  - type: text
    content: 'the king of Megiddo, one; '
  '22':
  - type: text
    content: 'the king of Kedesh, one; the king of Jokneam in Carmel, one; '
  '23':
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the king of Dor in '
  - type: note
    content: ch. 11:2
  - type: text
    content: Naphath-dor, one; the king of Goiim in Galilee,
  - type: note
    content: Septuagint; Hebrew Gilgal
  - type: text
    content: ' one; '
  '24':
  - type: text
    content: 'the king of Tirzah, one: in all, thirty-one kings.'
  '3':
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the Arabah '
  - type: note
    content: ch. 11:2
  - type: text
    content: 'to the Sea of Chinneroth eastward, and in the direction of Beth-jeshimoth, to the Sea of the Arabah, the Salt Sea, southward to the foot of '
  - type: note
    content: ch. 13:20; Deut. 3:17; 4:49
  - type: text
    content: 'the slopes of Pisgah; '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 3:3, 10; See Num. 21:33-35
  - type: text
    content: Og
  - type: note
    content: Septuagint; Hebrew the boundary of Og
  - type: text
    content: ' king of Bashan, one of the remnant of '
  - type: note
    content: ch. 13:12; 15:8; 18:16
  - type: text
    content: 'the Rephaim, '
  - type: note
    content: ch. 9:10; Deut. 1:4
  - type: text
    content: 'who lived at Ashtaroth and at Edrei '
  '5':
  - type: text
    content: 'and ruled over '
  - type: note
    content: Deut. 3:8, 9
  - type: text
    content: 'Mount Hermon and '
  - type: note
    content: ch. 13:11; Deut. 3:10
  - type: text
    content: 'Salecah and all Bashan '
  - type: note
    content: Deut. 3:14
  - type: text
    content: 'to the boundary of the Geshurites and the Maacathites, and over half of Gilead to the boundary of Sihon king of Heshbon. '
  '6':
  - type: note
    content: See Num. 21:23, 24, 33-35
  - type: text
    content: 'Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the people of Israel defeated them. And Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 13:8; Num. 32:29, 33; Deut. 3:11, 12
  - type: text
    content: gave their land for a possession to the Reubenites and the Gadites and the half-tribe of Manasseh.
  - type: heading
    content: Kings Defeated by Joshua
  '7':
  - type: text
    content: 'And these are the kings of the land whom Joshua and the people of Israel defeated on the west side of the Jordan, from Baal-gad in the Valley of Lebanon to '
  - type: note
    content: ch. 11:17
  - type: text
    content: 'Mount Halak, that rises toward Seir (and Joshua gave their land to the tribes of Israel as a possession '
  - type: note
    content: ch. 11:23; 18:10
  - type: text
    content: 'according to their allotments, '
  '8':
  - type: note
    content: ch. 10:40; 11:16
  - type: text
    content: 'in the hill country, in the lowland, in the Arabah, in the slopes, in the wilderness, and in the Negeb, the land of '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites): '
  '9':
  - type: note
    content: '[ch. 6:2]'
  - type: text
    content: 'the king of Jericho, one; '
  - type: note
    content: ch. 8:29
  - type: text
    content: 'the king of Ai, which is beside Bethel, one; '
