document_id: JOB.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Satan Attacks Job’s Health
  - type: text
    content: 'Again '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'there was a day when the sons of God came to present themselves before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Satan also came among them to present himself before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'But he said to her, “You speak as one of the '
  - type: note
    content: '[Ps. 74:18, 22]'
  - type: text
    content: 'foolish women would speak. '
  - type: note
    content: '[James 5:10, 11]'
  - type: text
    content: Shall we receive good from God, and shall we not receive evil?”
  - type: note
    content: Or disaster; also verse 11
  - type: text
    content: ' '
  - type: note
    content: ch. 1:22
  - type: text
    content: 'In all this Job did not '
  - type: note
    content: '[Ps. 39:1]'
  - type: text
    content: sin with his lips.
  - type: heading
    content: Job’s Three Friends
  '11':
  - type: text
    content: 'Now when Job’s three '
  - type: note
    content: '[Prov. 17:17]'
  - type: text
    content: 'friends heard of all this evil that had come upon him, they came each from his own place, Eliphaz '
  - type: note
    content: See 1 Chr. 1:45
  - type: text
    content: 'the Temanite, Bildad '
  - type: note
    content: Gen. 25:2; 1 Chr. 1:32
  - type: text
    content: 'the Shuhite, and Zophar the Naamathite. They made an appointment together to come to '
  - type: note
    content: ch. 42:11; [Rom. 12:15]
  - type: text
    content: 'show him sympathy and comfort him. '
  '12':
  - type: text
    content: 'And when they saw him from a distance, they did not recognize him. And they raised their voices and wept, and they '
  - type: note
    content: See Gen. 37:29
  - type: text
    content: 'tore their robes and sprinkled '
  - type: note
    content: See Josh. 7:6; Neh. 9:1; Lam. 2:10; Ezek. 27:30
  - type: text
    content: 'dust on their heads toward heaven. '
  '13':
  - type: text
    content: 'And they sat with him on the ground '
  - type: note
    content: Ezek. 3:15; [Gen. 50:10]
  - type: text
    content: seven days and seven nights, and no one spoke a word to him, for they saw that his suffering was very great.
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “From where have you come?” Satan answered the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “From going to and fro on the earth, and from walking up and down on it.” '
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “Have you considered my servant Job, that there is none like him on the earth, a blameless and upright man, who fears God and turns away from evil? He still '
  - type: note
    content: ver. 9; [ch. 27:5, 6]
  - type: text
    content: 'holds fast his integrity, although you incited me against him to destroy him '
  - type: note
    content: ch. 9:17
  - type: text
    content: 'without reason.” '
  '4':
  - type: text
    content: 'Then Satan answered the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Skin for skin! All that a man has he will give for his life. '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:11
  - type: text
    content: 'stretch out your hand and touch his bone and his flesh, and he will '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'curse you to your face.” '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “Behold, he is in your hand; only spare his life.”'
  '7':
  - type: text
    content: 'So Satan went out from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and struck Job with loathsome '
  - type: note
    content: Ex. 9:9; Lev. 13:18; [Deut. 28:27]
  - type: text
    content: 'sores from '
  - type: note
    content: Deut. 28:35; Isa. 1:6
  - type: text
    content: 'the sole of his foot to the crown of his head. '
  '8':
  - type: text
    content: 'And he took '
  - type: note
    content: ch. 41:30
  - type: text
    content: 'a piece of broken pottery with which to scrape himself while he sat in '
  - type: note
    content: ch. 42:6; Ezek. 27:30; Jonah 3:6; Matt. 11:21
  - type: text
    content: the ashes.
  '9':
  - type: text
    content: 'Then his wife said to him, “Do you still '
  - type: note
    content: ver. 3
  - type: text
    content: 'hold fast your integrity? '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Curse God and die.” '
