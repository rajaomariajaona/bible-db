document_id: LUK.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'In the fifteenth year of the reign of '
  - type: note
    content: '[ch. 2:1]'
  - type: text
    content: 'Tiberius Caesar, '
  - type: note
    content: See Matt. 27:2
  - type: text
    content: 'Pontius Pilate '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'being governor of Judea, and '
  - type: note
    content: ver. 3:19; ch. 8:3; 9:7, 9; 13:31; 23:7; Matt. 14:1; Acts 4:27; 13:1; [Mark 6:14]
  - type: text
    content: 'Herod being tetrarch of Galilee, and his brother Philip tetrarch of the region of Ituraea and Trachonitis, and Lysanias tetrarch of Abilene, '
  '10':
  - type: text
    content: 'And the crowds asked him, '
  - type: note
    content: Acts 2:37; 16:30; 22:10
  - type: text
    content: '“What then shall we do?” '
  '11':
  - type: text
    content: 'And he answered them, '
  - type: note
    content: Isa. 58:7; Dan. 4:27; Eph. 4:28; James 2:15, 16; 1 John 3:17; [ch. 18:22]
  - type: text
    content: “Whoever has two tunics
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' is to share with him who has none, and whoever has food is to do likewise.” '
  '12':
  - type: note
    content: ch. 7:29; Matt. 21:32
  - type: text
    content: 'Tax collectors also came to be baptized and said to him, “Teacher, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'what shall we do?” '
  '13':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: ch. 19:8
  - type: text
    content: '“Collect no more than you are authorized to do.” '
  '14':
  - type: text
    content: 'Soldiers also asked him, “And we, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'what shall we do?” And he said to them, '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: '“Do not extort money from anyone by threats or by false accusation, and be content with your '
  - type: note
    content: 1 Cor. 9:7 (Gk.)
  - type: text
    content: wages.”
  '15':
  - type: text
    content: 'As the people were in expectation, and all were questioning in their hearts concerning John, '
  - type: note
    content: John 1:19, 20
  - type: text
    content: 'whether he might be '
  - type: note
    content: See Matt. 1:17
  - type: text
    content: 'the Christ, '
  '16':
  - type: note
    content: John 1:26; Acts 1:5
  - type: text
    content: 'John answered them all, saying, “I baptize you with water, but '
  - type: note
    content: John 1:15, 27; 3:30, 31; Acts 13:25
  - type: text
    content: 'he who is mightier than I is coming, '
  - type: note
    content: Isa. 5:27
  - type: text
    content: 'the strap of whose sandals I am not worthy to untie. He will baptize you '
  - type: note
    content: John 1:33; Acts 11:16
  - type: text
    content: 'with the Holy Spirit and '
  - type: note
    content: '[Mal. 3:2, 3; Acts 2:3]'
  - type: text
    content: 'fire. '
  '17':
  - type: text
    content: 'His '
  - type: note
    content: Isa. 30:24
  - type: text
    content: 'winnowing fork is in his hand, to clear his threshing floor and to '
  - type: note
    content: Matt. 13:30
  - type: text
    content: 'gather the wheat into his barn, '
  - type: note
    content: Mal. 4:1
  - type: text
    content: 'but the chaff he will burn with '
  - type: note
    content: Mark 9:43, 48
  - type: text
    content: unquenchable fire.”
  '18':
  - type: text
    content: 'So '
  - type: note
    content: '[John 20:30; 21:25]'
  - type: text
    content: 'with many other exhortations he preached good news to the people. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 14:3; Mark 6:17, 18; See ver. 1
  - type: text
    content: 'Herod the tetrarch, who had been reproved by him for Herodias, his brother’s wife, and for all the evil things that Herod had done, '
  '2':
  - type: text
    content: 'during '
  - type: note
    content: John 18:13, 24; Acts 4:6
  - type: text
    content: 'the high priesthood of Annas and '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'Caiaphas, '
  - type: note
    content: For ver. 2-17, see Matt. 3:1-12; Mark 1:2-8
  - type: text
    content: 'the word of God came to '
  - type: note
    content: John 1:6, 7
  - type: text
    content: 'John the son of Zechariah in '
  - type: note
    content: ch. 1:80; Josh. 15:61; [Judg. 1:16]
  - type: text
    content: 'the wilderness. '
  '20':
  - type: text
    content: 'added this to them all, that '
  - type: note
    content: '[John 3:24]'
  - type: text
    content: he locked up John in prison.
  '21':
  - type: text
    content: 'Now when all the people were baptized, and when '
  - type: note
    content: For ver. 21, 22, see Matt. 3:13-17; Mark 1:9-11; [John 1:32-34]
  - type: text
    content: 'Jesus also had been baptized and was praying, '
  - type: note
    content: Acts 7:56
  - type: text
    content: 'the heavens were opened, '
  '22':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 4:18, 21; Acts 10:38]'
  - type: text
    content: 'the Holy Spirit descended on him in bodily form, like a dove; and '
  - type: note
    content: John 12:28
  - type: text
    content: 'a voice came from heaven, '
  - type: note
    content: '[ch. 9:35; Ps. 2:7; Isa. 42:1; Eph. 1:6; Col. 1:13; 2 Pet. 1:17; 1 John 5:9]'
  - type: text
    content: “You are my beloved Son;
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' with you I am well pleased.”'
  - type: note
    content: Some manuscripts beloved Son; today I have begotten you
  - type: heading
    content: The Genealogy of Jesus Christ
  '23':
  - type: text
    content: 'Jesus, '
  - type: note
    content: Matt. 4:17; Acts 1:1, 22
  - type: text
    content: 'when he began his ministry, was about '
  - type: note
    content: '[Num. 4:3]'
  - type: text
    content: 'thirty years of age, being '
  - type: note
    content: ch. 4:22; Matt. 13:55; John 1:45; 6:42; For ver. 23-38, [Matt. 1:1-16]
  - type: text
    content: 'the son (as was supposed) of Joseph, the son of Heli, '
  '24':
  - type: text
    content: 'the son of Matthat, the son of Levi, the son of Melchi, the son of Jannai, the son of Joseph, '
  '25':
  - type: text
    content: 'the son of Mattathias, the son of Amos, the son of Nahum, the son of Esli, the son of Naggai, '
  '26':
  - type: text
    content: 'the son of Maath, the son of Mattathias, the son of Semein, the son of Josech, the son of Joda, '
  '27':
  - type: text
    content: 'the son of Joanan, the son of Rhesa, '
  - type: note
    content: Matt. 1:12
  - type: text
    content: 'the son of Zerubbabel, the son '
  - type: note
    content: Ezra 3:2
  - type: text
    content: of Shealtiel,
  - type: note
    content: Greek Salathiel
  - type: text
    content: ' the son of Neri, '
  '28':
  - type: text
    content: 'the son of Melchi, the son of Addi, the son of Cosam, the son of Elmadam, the son of Er, '
  '29':
  - type: text
    content: 'the son of Joshua, the son of Eliezer, the son of Jorim, the son of Matthat, the son of Levi, '
  '3':
  - type: text
    content: 'And he went into all the region around the Jordan, proclaiming '
  - type: note
    content: Acts 2:38
  - type: text
    content: 'a baptism of repentance '
  - type: note
    content: Matt. 26:28; [ch. 1:77]
  - type: text
    content: 'for the forgiveness of sins. '
  '30':
  - type: text
    content: 'the son of Simeon, the son of Judah, the son of Joseph, the son of Jonam, the son of Eliakim, '
  '31':
  - type: text
    content: 'the son of Melea, the son of Menna, the son of Mattatha, the son of '
  - type: note
    content: 2 Sam. 5:14; 1 Chr. 3:5; 14:4; Zech. 12:12
  - type: text
    content: 'Nathan, the son of David, '
  '32':
  - type: note
    content: 1 Sam. 16:1; 17:12; [Ruth 4:18-22; 1 Chr. 2:1-15]
  - type: text
    content: 'the son of Jesse, the son of Obed, the son of Boaz, the son of Sala, the son of Nahshon, '
  '33':
  - type: text
    content: 'the son of Amminadab, the son of Admin, the son of Arni, the son of Hezron, the son of Perez, the son of Judah, '
  '34':
  - type: note
    content: Gen. 29:35
  - type: text
    content: 'the son of Jacob, '
  - type: note
    content: Gen. 25:26
  - type: text
    content: 'the son of Isaac, '
  - type: note
    content: Gen. 21:3
  - type: text
    content: 'the son of Abraham, '
  - type: note
    content: For ver. 34-38, see Gen. 5:3-32; 11:10-26; 1 Chr. 1:1-4, 24-27
  - type: text
    content: 'the son of Terah, the son of Nahor, '
  '35':
  - type: text
    content: 'the son of Serug, the son of Reu, the son of Peleg, the son of Eber, the son of Shelah, '
  '36':
  - type: text
    content: 'the son of Cainan, the son of Arphaxad, the son of Shem, the son of Noah, the son of Lamech, '
  '37':
  - type: text
    content: 'the son of Methuselah, the son of Enoch, the son of Jared, the son of Mahalaleel, the son of Cainan, '
  '38':
  - type: text
    content: the son of Enos, the son of Seth, the son of Adam, the son of God.
  '4':
  - type: text
    content: 'As it is written in '
  - type: note
    content: ch. 4:17; [Acts 8:28]
  - type: text
    content: the book of the words of Isaiah the prophet,
  - type: note
    content: John 1:23; Cited from Isa. 40:3-5
  - type: text
    content: '“The voice of one crying in the wilderness:'
  - type: note
    content: ch. 1:76
  - type: text
    content: ‘Prepare the way of the Lord,
  - type: note
    content: Or crying, Prepare in the wilderness the way of the Lord
  - type: text
    content: make his paths straight.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 57:14 ]'
  - type: text
    content: Every valley shall be filled,
  - type: note
    content: Isa. 49:11; Zech. 4:7
  - type: text
    content: and every mountain and hill shall be made low,
  - type: note
    content: Isa. 42:16; 45:2
  - type: text
    content: and the crooked shall become straight,
  - type: text
    content: and the rough places shall become level ways,
  '6':
  - type: text
    content: ' '
  - type: note
    content: Isa. 52:10; [ Ps. 98:2, 3 ]
  - type: text
    content: 'and all flesh shall see '
  - type: note
    content: ch. 2:30; Acts 28:28; [ch. 1:69, 71, 77; Titus 2:11]
  - type: text
    content: the salvation of God.’”
  '7':
  - type: text
    content: 'He said therefore to the crowds that came out to be baptized by him, '
  - type: note
    content: Matt. 12:34; 23:33
  - type: text
    content: '“You brood of '
  - type: note
    content: Ps. 140:3
  - type: text
    content: 'vipers! Who warned you to flee from '
  - type: note
    content: Rom. 5:9; Eph. 5:6; Col. 3:6; 1 Thess. 1:10
  - type: text
    content: 'the wrath to come? '
  '8':
  - type: text
    content: 'Bear fruits '
  - type: note
    content: Acts 26:20
  - type: text
    content: 'in keeping with repentance. And do not begin to say to yourselves, '
  - type: note
    content: John 8:39
  - type: text
    content: '‘We have Abraham as our father.’ For I tell you, God is able from '
  - type: note
    content: '[ch. 4:3]'
  - type: text
    content: 'these stones to raise up children for Abraham. '
  '9':
  - type: text
    content: 'Even now the axe is laid to the root of the trees. '
  - type: note
    content: ch. 13:7, 9; Matt. 7:19; John 15:2, 6
  - type: text
    content: Every tree therefore that does not bear good fruit is cut down and thrown into the fire.”
