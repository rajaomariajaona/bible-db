verses:
  '1':
  - type: heading
    content: Water Flowing from the Temple
  - type: text
    content: 'Then he brought me back to '
  - type: note
    content: '[ch. 43:1, 2]'
  - type: text
    content: 'the door of the temple, and behold, '
  - type: note
    content: Ps. 46:4; Joel 3:18; [Zech. 14:8; Rev. 22:1]
  - type: text
    content: 'water was issuing from below '
  - type: note
    content: See ch. 9:3
  - type: text
    content: 'the threshold of the temple toward the east (for the temple faced east). The water was flowing down from below the south end of the threshold of the temple, south of '
  - type: note
    content: See ch. 43:13
  - type: text
    content: 'the altar. '
  '10':
  - type: text
    content: 'Fishermen will stand beside the sea. From '
  - type: note
    content: See 1 Sam. 23:29
  - type: text
    content: 'Engedi to '
  - type: note
    content: Isa. 15:8
  - type: text
    content: 'Eneglaim it will be a place for the spreading of nets. Its fish will be of very many kinds, like the fish of '
  - type: note
    content: See Josh. 15:12
  - type: text
    content: the Great Sea.
  - type: note
    content: That is, the Mediterranean Sea; also verses 15, 19, 20
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'But its swamps and marshes will not become fresh; they are to be left for salt. '
  '12':
  - type: text
    content: 'And on the banks, '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'on both sides of the river, there will grow '
  - type: note
    content: '[Gen. 2:9]'
  - type: text
    content: 'all kinds of trees for food. '
  - type: note
    content: Ps. 1:3; [Jer. 17:8]
  - type: text
    content: 'Their leaves will not wither, nor their fruit fail, '
  - type: note
    content: '[Rev. 22:2]'
  - type: text
    content: 'but they will bear fresh fruit every month, because the water for them flows from the sanctuary. Their fruit will be for food, and '
  - type: note
    content: '[Rev. 22:2]'
  - type: text
    content: their leaves for healing.”
  - type: heading
    content: Division of the Land
  '13':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': “This is the boundary'
  - type: note
    content: Probable reading; Hebrew The valley of the boundary
  - type: text
    content: ' by which '
  - type: note
    content: ch. 45:8; See ch. 48:1-7, 23-28
  - type: text
    content: 'you shall divide the land for inheritance among the twelve tribes of Israel. '
  - type: note
    content: '[ch. 48:4, 5]; See Josh. 17:14-18'
  - type: text
    content: 'Joseph shall have two portions. '
  '14':
  - type: text
    content: 'And you shall divide equally what '
  - type: note
    content: See ch. 20:5
  - type: text
    content: 'I swore '
  - type: note
    content: See Gen. 12:7
  - type: text
    content: 'to give to your fathers. '
  - type: note
    content: '[ch. 48:29]'
  - type: text
    content: This land shall fall to you as your inheritance.
  '15':
  - type: text
    content: '“This shall be the boundary of the land: On the north side, from '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the Great Sea '
  - type: note
    content: ch. 48:1
  - type: text
    content: 'by way of Hethlon to Lebo-hamath, and on to '
  - type: note
    content: Num. 34:8
  - type: text
    content: Zedad,
  - type: note
    content: Septuagint; Hebrew the entrance of Zedad, Hamath
  - type: text
    content: ' '
  '16':
  - type: note
    content: 2 Sam. 8:8
  - type: text
    content: 'Berothah, Sibraim (which lies on the border between '
  - type: note
    content: ch. 48:1; Isa. 7:8
  - type: text
    content: 'Damascus and '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'Hamath), as far as Hazer-hatticon, which is on the border of Hauran. '
  '17':
  - type: text
    content: 'So the boundary shall run from the sea to '
  - type: note
    content: '[ch. 48:1]'
  - type: text
    content: Hazar-enan, which is on the northern border of Damascus, with the border of Hamath to the north.
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' This shall be the north side.'
  - type: note
    content: Probable reading; Hebrew and as for the north side
  '18':
  - type: text
    content: '“On the east side, the boundary shall run between Hauran and Damascus; along the Jordan between '
  - type: note
    content: Josh. 13:11
  - type: text
    content: 'Gilead and the land of Israel; to '
  - type: note
    content: Joel 2:20
  - type: text
    content: the eastern sea and as far as Tamar.
  - type: note
    content: Compare Syriac; Hebrew to the eastern sea you shall measure
  - type: text
    content: ' This shall be the east side.'
  '19':
  - type: text
    content: '“On the south side, it shall run from '
  - type: note
    content: Gen. 14:7; 2 Chr. 20:2
  - type: text
    content: 'Tamar as far as '
  - type: note
    content: Num. 20:13
  - type: text
    content: 'the waters of Meribah-kadesh, from there along '
  - type: note
    content: Num. 34:5
  - type: text
    content: the Brook of Egypt
  - type: note
    content: Hebrew lacks of Egypt
  - type: text
    content: ' to '
  - type: note
    content: See Josh. 15:12
  - type: text
    content: the Great Sea. This shall be the south side.
  '2':
  - type: text
    content: 'Then he brought me out by way of '
  - type: note
    content: ch. 40:35
  - type: text
    content: 'the north gate and led me around on the outside to '
  - type: note
    content: '[ch. 40:6]'
  - type: text
    content: the outer gate that faces toward the east; and behold, the water was trickling out on the south side.
  '20':
  - type: text
    content: '“On the west side, the Great Sea shall be the boundary to a point '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: opposite Lebo-hamath. This shall be the west side.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ver. 13
  - type: text
    content: '“So you shall divide this land among you according to the tribes of Israel. '
  '22':
  - type: note
    content: ch. 45:1; 48:29
  - type: text
    content: 'You shall allot it as an inheritance for yourselves and '
  - type: note
    content: Isa. 14:1; [Eph. 3:6]
  - type: text
    content: 'for the sojourners who reside among you and have had children among you. '
  - type: note
    content: Ex. 12:19, 48, 49; [Rom. 10:12; Gal. 3:28; Col. 3:11]
  - type: text
    content: 'They shall be to you as native-born children of Israel. With you they shall be allotted an inheritance among the tribes of Israel. '
  '23':
  - type: text
    content: 'In whatever tribe the sojourner resides, there you shall assign him his inheritance, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '3':
  - type: text
    content: 'Going on eastward with a measuring line in his hand, '
  - type: note
    content: '[ch. 40:3]'
  - type: text
    content: the man measured a thousand cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a long cubit (see 40:5) was about 21 inches or 53 centimeters
  - type: text
    content: ' and then led me through the water, and it was ankle-deep. '
  '4':
  - type: text
    content: 'Again he measured a thousand, and led me through the water, and it was knee-deep. Again he measured a thousand, and led me through the water, and it was waist-deep. '
  '5':
  - type: text
    content: 'Again he measured a thousand, and it was a river that I could not pass through, for the water had risen. It was deep enough to swim in, a river that could not be passed through. '
  '6':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[ch. 8:6]'
  - type: text
    content: have you seen this?”
  - type: text
    content: 'Then he led me back to the bank of the river. '
  '7':
  - type: text
    content: 'As I went back, I saw on the bank of the river '
  - type: note
    content: ver. 12; [Rev. 22:2]
  - type: text
    content: 'very many trees on the one side and on the other. '
  '8':
  - type: text
    content: 'And he said to me, “This water flows toward the eastern region and goes down into '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: the Arabah, and enters the sea;
  - type: note
    content: That is, the Dead Sea
  - type: text
    content: ' when the water flows into '
  - type: note
    content: Deut. 3:17; 4:49; Josh. 3:16
  - type: text
    content: the sea, the water will become fresh.
  - type: note
    content: Hebrew will be healed; also verses 9, 11
  - type: text
    content: ' '
  '9':
  - type: text
    content: And wherever the river goes,
  - type: note
    content: Septuagint, Syriac, Vulgate, Targum; Hebrew the two rivers go
  - type: text
    content: ' every living creature that swarms will live, and there will be very many fish. For this water goes there, that the waters of the sea'
  - type: note
    content: Hebrew lacks the waters of the sea
  - type: text
    content: ' may become fresh; so everything will live where the river goes. '
