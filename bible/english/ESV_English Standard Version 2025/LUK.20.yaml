document_id: LUK.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Authority of Jesus Challenged
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see Matt. 21:23-27; Mark 11:27-33
  - type: text
    content: 'One day, '
  - type: note
    content: ch. 19:47
  - type: text
    content: as Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' was teaching the people in the temple and preaching the gospel, '
  - type: note
    content: Acts 4:1; 6:12
  - type: text
    content: 'the chief priests and the scribes with the elders came up '
  '10':
  - type: text
    content: When the time came, he sent a servant
  - type: note
    content: Or bondservant; also verse 11
  - type: text
    content: ' '
  - type: text
    content: 'to the tenants, so that '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'they would give him some of the fruit of the vineyard. '
  - type: note
    content: Matt. 5:12; 22:6; 23:34, 37; [2 Chr. 24:19; 36:15, 16; Neh. 9:26; Jer. 37:15; 38:6; Acts 7:52; 2 Cor. 11:24-26; 1 Thess. 2:15; Heb. 11:36, 37]
  - type: text
    content: But the tenants beat him and sent him away empty-handed.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 22:4
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'he sent another servant. But they also beat and '
  - type: note
    content: Acts 5:41 (Gk.)
  - type: text
    content: treated him shamefully, and sent him away empty-handed.
  - type: text
    content: ' '
  '12':
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: And he sent yet a third. This one also they wounded and cast out.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then the owner of the vineyard said, ‘What shall I do? I will send my '
  - type: note
    content: See Matt. 3:17
  - type: text
    content: beloved son; perhaps they will respect him.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But when the tenants saw him, they said to themselves, '
  - type: note
    content: Heb. 1:2; [John 1:11; Rom. 8:17]
  - type: text
    content: '‘This is the heir. '
  - type: note
    content: '[1 Kgs. 21:19]'
  - type: text
    content: Let us kill him, so that the inheritance may be ours.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And they '
  - type: note
    content: Heb. 13:12
  - type: text
    content: threw him out of the vineyard and killed him. What then will the owner of the vineyard do to them?
  - type: text
    content: ' '
  '16':
  - type: note
    content: '[ch. 19:27]'
  - type: text
    content: 'He will '
  - type: note
    content: '[Matt. 24:50; 25:19]'
  - type: text
    content: 'come and destroy those tenants and '
  - type: note
    content: Matt. 21:43; Acts 13:46; 18:6; 28:28; [Matt. 8:11, 12]
  - type: text
    content: give the vineyard to others.”
  - type: text
    content: ' When they heard this, they said, “Surely not!” '
  '17':
  - type: text
    content: 'But he '
  - type: note
    content: See Mark 10:21
  - type: text
    content: 'looked directly at them and said, '
  - type: text
    content: '“What then is this that is written:'
  - type: note
    content: Acts 4:11; 1 Pet. 2:7; Cited from Ps. 118:22
  - type: text
    content: “‘The stone that the builders rejected
  - type: text
    content: has become the cornerstone’?
  - type: note
    content: Greek the head of the corner
  '18':
  - type: text
    content: ' '
  - type: note
    content: Isa. 8:14, 15; Rom. 9:32, 33; 1 Pet. 2:8
  - type: text
    content: 'Everyone who falls on that stone will be broken to pieces, and when it falls '
  - type: note
    content: Dan. 2:34, 35, 44, 45
  - type: text
    content: on anyone, it will crush him.”
  - type: heading
    content: Paying Taxes to Caesar
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:47, 48
  - type: text
    content: 'The scribes and the chief priests sought to lay hands on him at that very hour, for they perceived that he had told this parable against them, but they feared the people. '
  '2':
  - type: text
    content: 'and said to him, “Tell us '
  - type: note
    content: '[Ex. 2:14; John 1:25; Acts 4:7]'
  - type: text
    content: 'by what authority you do these things, or who it is that gave you this authority.” '
  '20':
  - type: note
    content: For ver. 20-38, see Matt. 22:15-32; Mark 12:13-27
  - type: text
    content: 'So they '
  - type: note
    content: ch. 14:1; Mark 3:2
  - type: text
    content: 'watched him and sent spies, who '
  - type: note
    content: '[1 Kgs. 14:6]'
  - type: text
    content: 'pretended to be sincere, that they might '
  - type: note
    content: ver. 26; ch. 11:54
  - type: text
    content: 'catch him in something he said, so as to deliver him up to the authority and jurisdiction of '
  - type: note
    content: Matt. 27:2, 11; 28:14; See Acts 23:24
  - type: text
    content: 'the governor. '
  '21':
  - type: text
    content: 'So they asked him, “Teacher, we know that you speak and teach rightly, and '
  - type: note
    content: See Acts 10:34
  - type: text
    content: show no partiality,
  - type: note
    content: Greek and do not receive a face
  - type: text
    content: ' but truly teach '
  - type: note
    content: Acts 18:25, 26; [Acts 13:10]
  - type: text
    content: 'the way of God. '
  '22':
  - type: text
    content: 'Is it lawful for us to give '
  - type: note
    content: Matt. 17:25
  - type: text
    content: 'tribute to '
  - type: note
    content: ch. 2:1; 3:1
  - type: text
    content: 'Caesar, or not?” '
  '23':
  - type: text
    content: 'But he perceived their '
  - type: note
    content: 1 Cor. 3:19; 2 Cor. 4:2; 11:3; Eph. 4:14; [2 Cor. 12:16]
  - type: text
    content: 'craftiness, and said to them, '
  '24':
  - type: text
    content: '“Show me '
  - type: note
    content: See Matt. 18:28
  - type: text
    content: a denarius.
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  - type: text
    content: Whose likeness and inscription does it have?”
  - type: text
    content: ' They said, “Caesar’s.” '
  '25':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“Then '
  - type: note
    content: Rom. 13:7
  - type: text
    content: render to Caesar the things that are Caesar’s, and to God the things that are God’s.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And they were not able in the presence of the people '
  - type: note
    content: ver. 20
  - type: text
    content: to catch him in what he said, but marveling at his answer they became silent.
  - type: heading
    content: Sadducees Ask About the Resurrection
  '27':
  - type: text
    content: 'There came to him '
  - type: note
    content: Matt. 3:7; 16:1; 22:34; Acts 4:1; 5:17; 23:6
  - type: text
    content: 'some Sadducees, '
  - type: note
    content: Acts 23:8; [Acts 4:2]
  - type: text
    content: 'those who deny that there is a resurrection, '
  '28':
  - type: text
    content: 'and they asked him a question, saying, “Teacher, Moses wrote for us '
  - type: note
    content: '[Deut. 25:5]'
  - type: text
    content: that if a man’s brother dies, having a wife but no children, the man
  - type: note
    content: Greek his brother
  - type: text
    content: ' must take the widow and raise up offspring for his brother. '
  '29':
  - type: text
    content: 'Now there were seven brothers. The first took a wife, and died without children. '
  '3':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “I also will ask you a question. Now tell me,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And the second '
  '31':
  - type: text
    content: 'and the third took her, and likewise all seven left no children and died. '
  '32':
  - type: text
    content: 'Afterward the woman also died. '
  '33':
  - type: text
    content: In the resurrection, therefore, whose wife will the woman be? For the seven had her as wife.”
  '34':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: ch. 16:8; See ch. 10:6
  - type: text
    content: '“The sons of this age '
  - type: note
    content: ch. 17:27; Matt. 24:38; [ver. 35]
  - type: text
    content: 'marry and '
  - type: note
    content: ch. 17:27; Matt. 24:38; [ver. 35]
  - type: text
    content: are given in marriage,
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'but those who are '
  - type: note
    content: Acts 5:41; 2 Thess. 1:5, 11; See Matt. 22:8
  - type: text
    content: 'considered worthy to attain to '
  - type: note
    content: '[ch. 18:30]; See Mark 10:30'
  - type: text
    content: 'that age and to the resurrection from the dead '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'neither marry '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: nor are given in marriage,
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'for '
  - type: note
    content: 1 Cor. 15:54, 55; Rev. 21:4
  - type: text
    content: 'they cannot die anymore, because they are '
  - type: note
    content: '[Heb. 2:7, 9]'
  - type: text
    content: 'equal to angels and '
  - type: note
    content: '[Gen. 1:26; Ps. 82:6]'
  - type: text
    content: 'are '
  - type: note
    content: '[Rom. 8:19, 23; 1 Cor. 15:52]'
  - type: text
    content: 'sons of God, being '
  - type: note
    content: See ch. 10:6
  - type: text
    content: sons
  - type: note
    content: Greek huioi; see Preface
  - type: text
    content: ' '
  - type: text
    content: of the resurrection.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But that the dead are raised, '
  - type: note
    content: ver. 28
  - type: text
    content: 'even Moses showed, in '
  - type: note
    content: Ex. 3:1–4:17
  - type: text
    content: 'the passage about the bush, where he calls '
  - type: note
    content: Acts 7:32; Cited from Ex. 3:15; [Ex. 3:6]
  - type: text
    content: the Lord the God of Abraham and the God of Isaac and the God of Jacob.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Now he is not God of the dead, but of the living, for all '
  - type: note
    content: Rom. 6:11; 14:7, 8; 2 Cor. 5:15; Gal. 2:19; 1 Thess. 5:10; 1 Pet. 4:2; [Heb. 9:14]
  - type: text
    content: live to him.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Then some of the scribes '
  - type: note
    content: Mark 12:28; [Matt. 22:34]
  - type: text
    content: 'answered, “Teacher, you have spoken well.” '
  '4':
  - type: text
    content: 'was the baptism of John '
  - type: note
    content: ch. 15:18, 21; John 3:27
  - type: text
    content: from heaven or from man?”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 22:46; Mark 12:34
  - type: text
    content: they no longer dared to ask him any question.
  - type: heading
    content: Whose Son Is the Christ?
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-44, see Matt. 22:41-45; Mark 12:35-37
  - type: text
    content: 'But he said to them, '
  - type: text
    content: '“How can they say that '
  - type: note
    content: See Matt. 1:1, 17
  - type: text
    content: 'the Christ is '
  - type: note
    content: See Matt. 1:1, 17
  - type: text
    content: David’s son?
  - type: text
    content: ' '
  '42':
  - type: text
    content: For David himself says in the Book of Psalms,
  - type: note
    content: Acts 2:34, 35; Heb. 1:13; Cited from Ps. 110:1; [ 1 Cor. 15:25; Heb. 10:13 ]
  - type: text
    content: “‘The Lord said to my Lord,
  - type: text
    content: “Sit at my right hand,
  '43':
  - type: text
    content: ' '
  - type: text
    content: 'until I make your enemies '
  - type: note
    content: '[ Acts 7:49 ]'
  - type: text
    content: your footstool.”’
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'David thus calls him Lord, so '
  - type: note
    content: '[ Rom. 1:3, 4 ]'
  - type: text
    content: how is he his son?”
  - type: heading
    content: Beware of the Scribes
  '45':
  - type: text
    content: ' '
  - type: note
    content: For ver. 45, 46, see Matt. 23:1, 2, 5-7; Mark 12:38, 39; [ch. 11:43 ]
  - type: text
    content: 'And in the hearing of all the people he said to his disciples, '
  '46':
  - type: text
    content: '“Beware of the scribes, who like to walk around in long robes, and love greetings in the marketplaces and the best seats in the synagogues and '
  - type: note
    content: ch. 14:7, 8
  - type: text
    content: the places of honor at feasts,
  - type: text
    content: ' '
  '47':
  - type: note
    content: '[ch. 11:39; 16:14]'
  - type: text
    content: 'who devour widows’ houses and '
  - type: note
    content: '[Matt. 6:5, 7]'
  - type: text
    content: for a pretense make long prayers. They will receive the greater condemnation.”
  '5':
  - type: text
    content: 'And they discussed it with one another, saying, “If we say, ‘From heaven,’ he will say, '
  - type: note
    content: ch. 7:30; Matt. 21:32
  - type: text
    content: '‘Why did you not believe him?’ '
  '6':
  - type: text
    content: 'But if we say, ‘From man,’ all the people will stone us to death, for they are convinced that John was '
  - type: note
    content: '[John 5:35]; See Matt. 11:9'
  - type: text
    content: 'a prophet.” '
  '7':
  - type: text
    content: 'So they answered that they did not know where it came from. '
  '8':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.”
  - type: heading
    content: The Parable of the Wicked Tenants
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-19, see Matt. 21:33-46; Mark 12:1-12
  - type: text
    content: 'And he began to tell the people this parable: '
  - type: text
    content: '“A man planted '
  - type: note
    content: Ps. 80:8; Isa. 5:1; Matt. 21:28
  - type: text
    content: 'a vineyard and '
  - type: note
    content: Song 8:11, 12
  - type: text
    content: 'let it out to tenants and '
  - type: note
    content: Matt. 25:14, 15; [Mark 13:34]
  - type: text
    content: went into another country for a long while.
  - type: text
    content: ' '
