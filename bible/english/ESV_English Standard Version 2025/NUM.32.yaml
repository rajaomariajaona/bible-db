document_id: NUM.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Reuben and Gad Settle in Gilead
  - type: text
    content: 'Now the people of Reuben and the people of Gad had a very great number of livestock. And they saw the land of '
  - type: note
    content: ver. 3, 35; See ch. 21:32
  - type: text
    content: 'Jazer and the land of Gilead, and behold, the place was a place for livestock. '
  '10':
  - type: note
    content: For ver. 10-12, see Deut. 1:34-36
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger was kindled on that day, and he swore, saying, '
  '11':
  - type: text
    content: '‘Surely none of the men who came up out of Egypt, '
  - type: note
    content: ch. 14:29
  - type: text
    content: 'from twenty years old and upward, shall see the land that I swore to give '
  - type: note
    content: See Gen. 50:24
  - type: text
    content: 'to Abraham, to Isaac, and to Jacob, because they have not wholly followed me, '
  '12':
  - type: text
    content: 'none except Caleb the son of Jephunneh the '
  - type: note
    content: Josh. 14:6; 15:17
  - type: text
    content: 'Kenizzite and Joshua the son of Nun, for '
  - type: note
    content: ch. 14:24; Deut. 1:36; Josh. 14:8, 9
  - type: text
    content: 'they have wholly followed the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger was kindled against Israel, and he made them '
  - type: note
    content: See ch. 14:33-35
  - type: text
    content: 'wander in the wilderness forty years, until '
  - type: note
    content: ch. 26:64, 65
  - type: text
    content: 'all the generation that had done evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' was gone. '
  '14':
  - type: text
    content: 'And behold, you have risen in your fathers’ place, a brood of sinful men, to increase still more the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' against Israel! '
  '15':
  - type: text
    content: 'For if you '
  - type: note
    content: '[Deut. 30:17; Josh. 22:16, 18; 2 Chr. 7:19, 20; 15:2]'
  - type: text
    content: turn away from following him, he will again abandon them in the wilderness, and you will destroy all this people.”
  '16':
  - type: text
    content: 'Then they came near to him and said, '
  - type: note
    content: ver. 24
  - type: text
    content: '“We will build sheepfolds here for our livestock, and cities for our little ones, '
  '17':
  - type: text
    content: 'but '
  - type: note
    content: Josh. 4:12, 13
  - type: text
    content: 'we will take up arms, ready to go before the people of Israel, until we have brought them to their place. And our little ones shall live in the fortified cities because of the inhabitants of the land. '
  '18':
  - type: note
    content: Josh. 22:4
  - type: text
    content: 'We will not return to our homes until each of the people of Israel has gained his inheritance. '
  '19':
  - type: text
    content: 'For we will not inherit with them on the other side of the Jordan and beyond, '
  - type: note
    content: ver. 33; Josh. 12:1; 13:8
  - type: text
    content: 'because our inheritance has come to us on this side of the Jordan to the east.” '
  '2':
  - type: text
    content: 'So the people of Gad and the people of Reuben came and said to Moses and to Eleazar the priest and to the chiefs of the congregation, '
  '20':
  - type: text
    content: 'So '
  - type: note
    content: Deut. 3:18; Josh. 1:13, 14; 4:12, 13
  - type: text
    content: 'Moses said to them, “If you will do this, if you will take up arms to go before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the war, '
  '21':
  - type: text
    content: 'and every armed man of you will pass over the Jordan before the '
  - type: text
    content: Lord
  - type: text
    content: ', until he has '
  - type: note
    content: ch. 33:52
  - type: text
    content: 'driven out his enemies from before him '
  '22':
  - type: text
    content: 'and the land is subdued before the '
  - type: text
    content: Lord
  - type: text
    content: '; then after that you shall return and be free of obligation to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to Israel, and '
  - type: note
    content: Deut. 3:12, 15, 16, 18; Josh. 1:15; 13:8, 32; 22:4, 9
  - type: text
    content: 'this land shall be your possession before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'But if you will not do so, behold, you have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: '[Gen. 44:16; Isa. 59:12]'
  - type: text
    content: 'be sure your sin will find you out. '
  '24':
  - type: note
    content: ver. 16; See ver. 34-38
  - type: text
    content: 'Build cities for your little ones and folds for your sheep, and do what you have promised.” '
  '25':
  - type: text
    content: 'And the people of Gad and the people of Reuben said to Moses, “Your servants will do as my lord commands. '
  '26':
  - type: note
    content: Josh. 1:14
  - type: text
    content: 'Our little ones, our wives, our livestock, and all our cattle shall remain there in the cities of Gilead, '
  '27':
  - type: note
    content: Josh. 4:12, 13
  - type: text
    content: 'but your servants will pass over, every man who is '
  - type: note
    content: ch. 31:5
  - type: text
    content: 'armed for war, before the '
  - type: text
    content: Lord
  - type: text
    content: ' to battle, as my lord orders.”'
  '28':
  - type: text
    content: 'So '
  - type: note
    content: Josh. 1:13
  - type: text
    content: 'Moses gave command concerning them to Eleazar the priest and to '
  - type: note
    content: ch. 27:18
  - type: text
    content: 'Joshua the son of Nun and to the heads of the fathers’ houses of the tribes of the people of Israel. '
  '29':
  - type: text
    content: 'And Moses said to them, “If the people of Gad and the people of Reuben, every man who is armed to battle before the '
  - type: text
    content: Lord
  - type: text
    content: ', will pass with you over the Jordan and the land shall be subdued before you, then you shall give them the land of Gilead for a possession. '
  '3':
  - type: note
    content: ver. 34
  - type: text
    content: '“Ataroth, '
  - type: note
    content: ver. 34; See ch. 21:30
  - type: text
    content: 'Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, '
  - type: note
    content: ver. 38; ch. 33:47; Deut. 32:49; 1 Chr. 5:8; Isa. 15:2; 46:1; Jer. 48:1, 22
  - type: text
    content: 'Nebo, and Beon, '
  '30':
  - type: text
    content: 'However, if they will not pass over with you armed, they shall have possessions among you in the land of Canaan.” '
  '31':
  - type: text
    content: 'And the people of Gad and the people of Reuben answered, “What the '
  - type: text
    content: Lord
  - type: text
    content: ' has said to your servants, we will do. '
  '32':
  - type: text
    content: 'We will pass over armed before the '
  - type: text
    content: Lord
  - type: text
    content: ' into the land of Canaan, and the possession of our inheritance shall remain with us beyond the Jordan.”'
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 29:8; Josh. 12:6; 13:8; 22:4; See Deut. 3:12-17
  - type: text
    content: 'Moses gave to them, to the people of Gad and to the people of Reuben and to the half-tribe of Manasseh the son of Joseph, the kingdom of Sihon king of the Amorites and the kingdom of Og king of Bashan, the land and its cities with their territories, the cities of the land throughout the country. '
  '34':
  - type: text
    content: 'And the people of Gad built '
  - type: note
    content: ver. 3
  - type: text
    content: 'Dibon, '
  - type: note
    content: ver. 3
  - type: text
    content: 'Ataroth, '
  - type: note
    content: See Deut. 2:36
  - type: text
    content: 'Aroer, '
  '35':
  - type: text
    content: 'Atroth-shophan, '
  - type: note
    content: ver. 1; See ch. 21:32
  - type: text
    content: 'Jazer, Jogbehah, '
  '36':
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'Beth-nimrah and Beth-haran, '
  - type: note
    content: ver. 17
  - type: text
    content: 'fortified cities, and folds for sheep. '
  '37':
  - type: text
    content: 'And the people of Reuben built '
  - type: note
    content: ver. 3; ch. 21:27
  - type: text
    content: 'Heshbon, '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'Elealeh, Kiriathaim, '
  '38':
  - type: note
    content: See ver. 3
  - type: text
    content: 'Nebo, and '
  - type: note
    content: '[ver. 3; Josh. 13:17; Jer. 48:23]'
  - type: text
    content: Baal-meon (
  - type: note
    content: '[Ex. 23:13; Josh. 23:7]'
  - type: text
    content: 'their names were changed), and '
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'Sibmah. And they gave other names to the cities that they built. '
  '39':
  - type: text
    content: 'And the sons of '
  - type: note
    content: Gen. 50:23; 1 Chr. 7:14, 15
  - type: text
    content: 'Machir the son of Manasseh went to Gilead and captured it, and dispossessed the Amorites who were in it. '
  '4':
  - type: text
    content: 'the land '
  - type: note
    content: ch. 21:24, 34; [ver. 33]
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' struck down before the congregation of Israel, is a land for livestock, and your servants have livestock.” '
  '40':
  - type: text
    content: 'And Moses '
  - type: note
    content: Deut. 3:13, 15; Josh. 13:31; 17:1
  - type: text
    content: 'gave Gilead to Machir the son of Manasseh, and he settled in it. '
  '41':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 3:14; See 1 Chr. 2:21-23
  - type: text
    content: Jair the son of Manasseh went and captured their villages, and called them Havvoth-jair.
  - type: note
    content: Havvoth-jair means the villages of Jair
  - type: text
    content: ' '
  '42':
  - type: text
    content: And Nobah went and captured Kenath and its villages, and called it Nobah, after his own name.
  '5':
  - type: text
    content: And they said, “If we have found favor in your sight, let this land be given to your servants for a possession. Do not take us across the Jordan.”
  '6':
  - type: text
    content: 'But Moses said to the people of Gad and to the people of Reuben, “Shall your brothers go to the war while you sit here? '
  '7':
  - type: text
    content: 'Why will you discourage the heart of the people of Israel from going over into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them? '
  '8':
  - type: text
    content: 'Your fathers did this, '
  - type: note
    content: See ch. 13:3, 21-33; Deut. 1:22-28
  - type: text
    content: 'when I sent them from Kadesh-barnea to see the land. '
  '9':
  - type: text
    content: 'For when they went up to the Valley of Eshcol and saw the land, they discouraged the heart of the people of Israel from going into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them. '
