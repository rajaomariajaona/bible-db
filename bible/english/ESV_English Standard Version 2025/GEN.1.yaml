document_id: GEN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Creation of the World
  - type: text
    content: 'In the '
  - type: note
    content: Job 38:4-7; Ps. 33:6; 136:5; Isa. 42:5; 45:18; John 1:1-3; Acts 14:15; 17:24; Col. 1:16, 17; Heb. 1:10; 11:3; Rev. 4:11
  - type: text
    content: 'beginning, God created the heavens and the earth. '
  '10':
  - type: text
    content: God called the dry land Earth,
  - type: note
    content: Or Land; also verses 11, 12, 22, 24, 25, 26, 28, 30; 2:1
  - type: text
    content: ' and the waters that were gathered together he called Seas. And God saw that it was good.'
  '11':
  - type: text
    content: 'And God said, '
  - type: note
    content: Ps. 104:14
  - type: text
    content: “Let the earth sprout vegetation, plants
  - type: note
    content: Or small plants; also verses 12, 29
  - type: text
    content: ' yielding seed, and fruit trees bearing fruit in which is their seed, each according to its kind, on the earth.” And it was so. '
  '12':
  - type: text
    content: 'The earth brought forth vegetation, plants yielding seed according to their own kinds, and trees bearing fruit in which is their seed, each according to its kind. And God saw that it was good. '
  '13':
  - type: text
    content: And there was evening and there was morning, the third day.
  '14':
  - type: text
    content: 'And God said, “Let there be lights in the expanse of the heavens to separate the day from the night. And let them be for '
  - type: note
    content: Jer. 10:2; Ezek. 32:7, 8; Joel 2:30, 31; 3:15; Matt. 24:29; Luke 21:25
  - type: text
    content: 'signs and for '
  - type: note
    content: Ps. 104:19
  - type: text
    content: seasons,
  - type: note
    content: Or appointed times
  - type: text
    content: ' and for days and years, '
  '15':
  - type: text
    content: 'and let them be lights in the expanse of the heavens to give light upon the earth.” And it was so. '
  '16':
  - type: text
    content: 'And God '
  - type: note
    content: Deut. 4:19; Ps. 136:7-9
  - type: text
    content: 'made the two great lights—the greater light to rule the day and the lesser light to rule the night—and the stars. '
  '17':
  - type: text
    content: 'And God set them in the expanse of the heavens to give light on the earth, '
  '18':
  - type: text
    content: 'to '
  - type: note
    content: Jer. 31:35
  - type: text
    content: 'rule over the day and over the night, and to separate the light from the darkness. And God saw that it was good. '
  '19':
  - type: text
    content: And there was evening and there was morning, the fourth day.
  '2':
  - type: text
    content: 'The earth was '
  - type: note
    content: Jer. 4:23
  - type: text
    content: without form and void, and darkness was over the face of the deep. And the Spirit of God was hovering over the face of the waters.
  '20':
  - type: text
    content: And God said, “Let the waters swarm with swarms of living creatures, and let birds
  - type: note
    content: Or flying things; see Leviticus 11:19–20
  - type: text
    content: ' fly above the earth across the expanse of the heavens.” '
  '21':
  - type: text
    content: 'So '
  - type: note
    content: Ps. 104:25, 26
  - type: text
    content: 'God created the great sea creatures and every living creature that moves, with which the waters swarm, according to their kinds, and every winged bird according to its kind. And God saw that it was good. '
  '22':
  - type: text
    content: 'And God blessed them, saying, '
  - type: note
    content: ch. 8:17; 9:1
  - type: text
    content: '“Be fruitful and multiply and fill the waters in the seas, and let birds multiply on the earth.” '
  '23':
  - type: text
    content: And there was evening and there was morning, the fifth day.
  '24':
  - type: text
    content: 'And God said, “Let the earth bring forth living creatures according to their kinds—livestock and creeping things and beasts of the earth according to their kinds.” And it was so. '
  '25':
  - type: text
    content: And God made the beasts of the earth according to their kinds and the livestock according to their kinds, and everything that creeps on the ground according to its kind. And God saw that it was good.
  '26':
  - type: text
    content: 'Then God said, '
  - type: note
    content: ch. 3:22; 11:7; Isa. 6:8
  - type: text
    content: “Let us make man
  - type: note
    content: The Hebrew word for man(adam) is the generic term for mankind and becomes the proper name Adam
  - type: text
    content: ' in our image, '
  - type: note
    content: ch. 5:1; 9:6; 1 Cor. 11:7; Eph. 4:24; Col. 3:10; James 3:9
  - type: text
    content: 'after our likeness. And '
  - type: note
    content: ch. 9:2; Ps. 8:6-8; James 3:7
  - type: text
    content: let them have dominion over the fish of the sea and over the birds of the heavens and over the livestock and over all the earth and over every creeping thing that creeps on the earth.”
  '27':
  - type: text
    content: So God created man in his own image,
  - type: text
    content: in the image of God he created him;
  - type: note
    content: ch. 2:18, 21-23; 5:2; Mal. 2:15; Matt. 19:4; Mark 10:6
  - type: text
    content: male and female he created them.
  '28':
  - type: text
    content: 'And God blessed them. And God said to them, '
  - type: note
    content: ch. 9:1, 7
  - type: text
    content: '“Be fruitful and multiply and fill the earth and subdue it, and have dominion over the fish of the sea and over the birds of the heavens and over every living thing that moves on the earth.” '
  '29':
  - type: text
    content: 'And God said, “Behold, I have given you every plant yielding seed that is on the face of all the earth, and every tree with seed in its fruit. '
  - type: note
    content: ch. 9:3; Ps. 104:14, 15; 145:15, 16
  - type: text
    content: 'You shall have them for food. '
  '3':
  - type: text
    content: 'And God said, '
  - type: note
    content: 2 Cor. 4:6
  - type: text
    content: '“Let there be light,” and there was light. '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 147:9
  - type: text
    content: 'to every beast of the earth and to every bird of the heavens and to everything that creeps on the earth, everything that has the breath of life, I have given every green plant for food.” And it was so. '
  '31':
  - type: note
    content: Eccles. 7:29; 1 Tim. 4:4
  - type: text
    content: And God saw everything that he had made, and behold, it was very good. And there was evening and there was morning, the sixth day.
  '4':
  - type: text
    content: 'And God saw that the light was good. And God separated the light from the darkness. '
  '5':
  - type: text
    content: God called the light Day, and the darkness he called Night. And there was evening and there was morning, the first day.
  '6':
  - type: text
    content: 'And God said, '
  - type: note
    content: Job 37:18; Ps. 136:5; Jer. 10:12; 51:15
  - type: text
    content: “Let there be an expanse
  - type: note
    content: Or a canopy; also verses 7, 8, 14, 15, 17, 20
  - type: text
    content: ' in the midst of the waters, and let it separate the waters from the waters.” '
  '7':
  - type: text
    content: And God made
  - type: note
    content: Or fashioned; also verse 16
  - type: text
    content: ' the expanse and '
  - type: note
    content: Prov. 8:27-29
  - type: text
    content: 'separated the waters that were under the expanse from the waters that were '
  - type: note
    content: Ps. 148:4
  - type: text
    content: 'above the expanse. And it was so. '
  '8':
  - type: text
    content: And God called the expanse Heaven.
  - type: note
    content: Or Sky; also verses 9, 14, 15, 17, 20, 26, 28, 30; 2:1
  - type: text
    content: ' And there was evening and there was morning, the second day.'
  '9':
  - type: text
    content: 'And God said, '
  - type: note
    content: Job 38:8-11; Ps. 33:7; 136:6; Jer. 5:22; 2 Pet. 3:5
  - type: text
    content: '“Let the waters under the heavens be gathered together into one place, and let the dry land appear.” And it was so. '
