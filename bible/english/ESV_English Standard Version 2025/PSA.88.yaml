verses:
  '1':
  - type: heading
    content: I Cry Out Day and Night Before You
  - type: text
    content: 'A Song. A Psalm of '
  - type: note
    content: Ps. 42, title
  - type: text
    content: 'the Sons of Korah. To the choirmaster: according to '
  - type: note
    content: Ps. 53, title
  - type: text
    content: Mahalath Leannoth. A Maskil
  - type: note
    content: Probably musical or liturgical terms
  - type: text
    content: ' of '
  - type: note
    content: 1 Kgs. 4:31; 1 Chr. 2:6
  - type: text
    content: Heman the Ezrahite.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ps. 24:5
  - type: text
    content: God of my salvation,
  - type: text
    content: 'I '
  - type: note
    content: Ps. 22:2; Luke 18:7
  - type: text
    content: cry out day and night before you.
  '10':
  - type: text
    content: Do you work wonders for the dead?
  - type: note
    content: '[ Ps. 6:5 ]'
  - type: text
    content: 'Do the departed rise up to praise you? '
  - type: text
    content: Selah
  '11':
  - type: text
    content: Is your steadfast love declared in the grave,
  - type: text
    content: or your faithfulness in Abaddon?
  '12':
  - type: text
    content: 'Are your '
  - type: note
    content: Ps. 89:5
  - type: text
    content: 'wonders known in '
  - type: note
    content: ver. 6; Job 10:21
  - type: text
    content: the darkness,
  - type: text
    content: 'or your righteousness in the land of '
  - type: note
    content: '[Eccles. 9:5]'
  - type: text
    content: forgetfulness?
  '13':
  - type: text
    content: 'But I, O '
  - type: text
    content: Lord
  - type: text
    content: ', cry '
  - type: note
    content: Ps. 30:2
  - type: text
    content: to you;
  - type: note
    content: See Ps. 5:3
  - type: text
    content: in the morning my prayer comes before you.
  '14':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', why '
  - type: note
    content: See Ps. 44:9
  - type: text
    content: do you cast my soul away?
  - type: text
    content: 'Why '
  - type: note
    content: See Job 13:24
  - type: text
    content: do you hide your face from me?
  '15':
  - type: text
    content: Afflicted and close to death from my youth up,
  - type: text
    content: I suffer your terrors; I am helpless.
  - type: note
    content: The meaning of the Hebrew word is uncertain
  '16':
  - type: text
    content: Your wrath has swept over me;
  - type: text
    content: 'your '
  - type: note
    content: Job 6:4; 9:34
  - type: text
    content: dreadful assaults destroy me.
  '17':
  - type: text
    content: 'They '
  - type: note
    content: See Ps. 118:10-12
  - type: text
    content: 'surround me like a flood '
  - type: note
    content: Ps. 86:3
  - type: text
    content: all day long;
  - type: text
    content: 'they '
  - type: note
    content: Ps. 18:4; 22:16; [Ps. 118:10]
  - type: text
    content: close in on me together.
  '18':
  - type: text
    content: 'You have caused '
  - type: note
    content: See Job 19:13, 14
  - type: text
    content: my beloved and my friend to shun me;
  - type: text
    content: my companions have become darkness.
  - type: note
    content: Or darkness has become my only companion
  '2':
  - type: text
    content: Let my prayer come before you;
  - type: note
    content: See Ps. 31:2
  - type: text
    content: incline your ear to my cry!
  '3':
  - type: text
    content: For my soul is full of troubles,
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 107:18]'
  - type: text
    content: 'my life draws near to '
  - type: note
    content: See Ps. 16:10
  - type: text
    content: Sheol.
  '4':
  - type: text
    content: 'I am counted among those who '
  - type: note
    content: See Ps. 28:1
  - type: text
    content: go down to the pit;
  - type: text
    content: I am a man who has no strength,
  '5':
  - type: text
    content: like one set loose among the dead,
  - type: text
    content: like the slain that lie in the grave,
  - type: text
    content: 'like those whom '
  - type: note
    content: '[Ps. 31:12]'
  - type: text
    content: you remember no more,
  - type: text
    content: 'for they are '
  - type: note
    content: Isa. 53:8
  - type: text
    content: cut off from your hand.
  '6':
  - type: text
    content: 'You have put me in '
  - type: note
    content: '[Ps. 63:9]'
  - type: text
    content: the depths of the pit,
  - type: text
    content: 'in the '
  - type: note
    content: ver. 12, 18; Ps. 143:3; Lam. 3:6
  - type: text
    content: 'regions dark and '
  - type: note
    content: Ps. 69:15
  - type: text
    content: deep.
  '7':
  - type: text
    content: 'Your wrath '
  - type: note
    content: '[Ps. 32:4]'
  - type: text
    content: lies heavy upon me,
  - type: text
    content: 'and you overwhelm me with '
  - type: note
    content: Ps. 42:7
  - type: text
    content: 'all your waves. '
  - type: text
    content: Selah
  '8':
  - type: text
    content: 'You have caused '
  - type: note
    content: ver. 18; Ps. 142:4; See Job 19:13
  - type: text
    content: my companions to shun me;
  - type: text
    content: 'you have made me '
  - type: note
    content: Job 30:10
  - type: text
    content: a horror
  - type: note
    content: Or an abomination
  - type: text
    content: ' to them.'
  - type: text
    content: 'I am '
  - type: note
    content: Jer. 32:2
  - type: text
    content: shut in so that I cannot escape;
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 6:7 ]'
  - type: text
    content: my eye grows dim through sorrow.
  - type: text
    content: 'Every day I call upon you, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'I '
  - type: note
    content: See Job 11:13
  - type: text
    content: spread out my hands to you.
