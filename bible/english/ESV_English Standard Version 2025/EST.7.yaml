document_id: EST.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'So the king and Haman went in to feast with Queen Esther. '
  '10':
  - type: note
    content: '[Ps. 7:16; Prov. 11:5, 6; Dan. 6:24]'
  - type: text
    content: 'So they hanged Haman on the gallows that he had prepared for Mordecai. '
  - type: note
    content: '[ch. 2:1]'
  - type: text
    content: Then the wrath of the king abated.
  '2':
  - type: text
    content: 'And on the second day, as they were drinking wine after the feast, the king again said to Esther, '
  - type: note
    content: ch. 5:6; 9:12
  - type: text
    content: '“What is your wish, Queen Esther? It shall be granted you. And what is your request? '
  - type: note
    content: ch. 5:3
  - type: text
    content: 'Even to the half of my kingdom, it shall be fulfilled.” '
  '3':
  - type: text
    content: 'Then Queen Esther answered, '
  - type: note
    content: ch. 5:8
  - type: text
    content: '“If I have found favor in your sight, O king, and if it please the king, let my life be granted me for my wish, and my people for my request. '
  '4':
  - type: note
    content: ch. 3:9; 4:7
  - type: text
    content: 'For we have been sold, I and my people, '
  - type: note
    content: ch. 3:13; 8:11
  - type: text
    content: 'to be destroyed, to be killed, and to be annihilated. If we had been sold merely as slaves, men and women, I would have been silent, for our affliction is not to be compared with the loss to the king.” '
  '5':
  - type: text
    content: Then King Ahasuerus said to Queen Esther, “Who is he, and where is he, who has dared
  - type: note
    content: Hebrew whose heart has filled him
  - type: text
    content: ' to do this?” '
  '6':
  - type: text
    content: 'And Esther said, '
  - type: note
    content: See ch. 3:10
  - type: text
    content: “A foe and enemy! This wicked Haman!” Then Haman was terrified before the king and the queen.
  - type: heading
    content: Haman Is Hanged
  '7':
  - type: text
    content: 'And the king arose in his wrath from the wine-drinking and went into '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'the palace garden, but Haman stayed to beg for his life from Queen Esther, for he saw that harm was determined against him by the king. '
  '8':
  - type: text
    content: 'And the king returned from '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the palace garden to the place where they were drinking wine, as Haman was falling on '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: 'the couch where Esther was. And the king said, “Will he even assault the queen in my presence, in my own house?” As the word left the mouth of the king, they covered Haman’s face. '
  '9':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 1:10
  - type: text
    content: 'Harbona, one of the eunuchs in attendance on the king, said, “Moreover, '
  - type: note
    content: See ch. 5:14
  - type: text
    content: the gallows
  - type: note
    content: Or wooden beam; also verse 10 (see note on 2:23)
  - type: text
    content: ' that Haman has prepared for Mordecai, '
  - type: note
    content: '[ch. 2:22]'
  - type: text
    content: whose word saved the king, is standing at Haman’s house, fifty cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' high.” And the king said, “Hang him on that.” '
