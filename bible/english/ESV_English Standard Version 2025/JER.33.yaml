document_id: JER.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Promises Peace
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah a second time, while he was still '
  - type: note
    content: See ch. 32:2
  - type: text
    content: 'shut up in the court of the guard: '
  '10':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': In this place '
  - type: note
    content: ch. 32:43
  - type: text
    content: 'of which you say, ‘It is a waste without man or beast,’ in the cities of Judah and the streets of Jerusalem that are desolate, without man or inhabitant or beast, there shall be heard again '
  '11':
  - type: note
    content: See ch. 7:34
  - type: text
    content: 'the voice of mirth and the voice of gladness, the voice of the bridegroom and the voice of the bride, the voices of those who sing, as they bring '
  - type: note
    content: 1 Chr. 16:34; Ps. 106:1; 107:1; Isa. 12:4
  - type: text
    content: 'thank offerings to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: ch. 30:19; Lev. 7:12; Ps. 107:22
  - type: text
    content: '“‘Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is good,'
  - type: text
    content: for his steadfast love endures forever!’
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'For I will restore the fortunes of the land as at first, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: '[Ezek. 36:11]'
  - type: text
    content: 'In this place that is waste, without man or beast, and in all of its cities, there shall again be '
  - type: note
    content: '[ch. 31:24; 50:19; Isa. 65:10; Ezek. 34:14, 15]'
  - type: text
    content: 'habitations of shepherds '
  - type: note
    content: Song 1:7
  - type: text
    content: 'resting their flocks. '
  '13':
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'In the cities of the hill country, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'in the cities of the Shephelah, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'and in the cities of the Negeb, in the land of Benjamin, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'the places about Jerusalem, '
  - type: note
    content: See ch. 17:26
  - type: text
    content: 'and in the cities of Judah, '
  - type: note
    content: '[Lev. 27:32]'
  - type: text
    content: 'flocks shall again pass under the hands '
  - type: note
    content: '[John 10:3]'
  - type: text
    content: 'of the one who counts them, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Lord’s Eternal Covenant with David
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-16, see ch. 23:5, 6
  - type: text
    content: '“Behold, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when '
  - type: note
    content: ch. 29:10
  - type: text
    content: 'I will fulfill the promise I made to the house of Israel and the house of Judah. '
  '15':
  - type: text
    content: 'In those days and at that time I will cause a righteous '
  - type: note
    content: ch. 23:5; [Isa. 4:2; 11:1]
  - type: text
    content: 'Branch to spring up for David, and he shall execute justice and righteousness in the land. '
  '16':
  - type: text
    content: 'In those days Judah will be saved, '
  - type: note
    content: ch. 23:6; 32:37
  - type: text
    content: 'and Jerusalem will dwell securely. And this is the name by which it will be called: '
  - type: note
    content: ch. 23:6
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is our righteousness.’'
  '17':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: 2 Sam. 7:16; 1 Kgs. 2:4; Ps. 89:3, 4
  - type: text
    content: 'David shall never lack a man to sit on the throne of the house of Israel, '
  '18':
  - type: note
    content: '[Isa. 66:21]'
  - type: text
    content: and the Levitical priests shall never lack a man in my presence to offer burnt offerings, to burn grain offerings, and to make sacrifices forever.”
  '19':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '2':
  - type: text
    content: '“Thus says '
  - type: note
    content: '[Isa. 37:26]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' who made the earth,'
  - type: note
    content: Septuagint; Hebrew it
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' who formed it to establish it—'
  - type: note
    content: '[ch. 16:21; Ex. 6:3; Ps. 83:18; Amos 4:13]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name: '
  '20':
  - type: note
    content: For ver. 20-26, see ch. 31:36, 37
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ver. 25; [Isa. 54:9]
  - type: text
    content: 'If you can break my covenant with the day and my covenant with the night, '
  - type: note
    content: Gen. 8:22; Ps. 72:5
  - type: text
    content: 'so that day and night will not come at their appointed time, '
  '21':
  - type: note
    content: Ps. 89:34
  - type: text
    content: 'then also my covenant with David my servant may be broken, so that he shall not have a son to reign on his throne, and my covenant with the Levitical priests my ministers. '
  '22':
  - type: text
    content: 'As '
  - type: note
    content: Gen. 22:17
  - type: text
    content: 'the host of heaven cannot be numbered and '
  - type: note
    content: Gen. 22:17
  - type: text
    content: the sands of the sea cannot be measured, so I will multiply the offspring of David my servant, and the Levitical priests who minister to me.”
  '23':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '24':
  - type: text
    content: '“Have you not observed that these people are saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected the two clans that he chose’? Thus they have despised my people so that they are no longer a nation in their sight. '
  '25':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Ps. 74:16, 17; 104:19
  - type: text
    content: 'If I have not established my covenant with day and night and the fixed order of heaven and earth, '
  '26':
  - type: text
    content: 'then I will reject the offspring of Jacob and David my servant and will not choose one of his offspring to rule over the offspring of Abraham, Isaac, and Jacob. '
  - type: note
    content: ver. 7, 11; See ch. 30:3
  - type: text
    content: For I will restore their fortunes and will have mercy on them.”
  '3':
  - type: note
    content: ch. 29:12; Ps. 91:15
  - type: text
    content: 'Call to me and I will answer you, '
  - type: note
    content: Isa. 48:6
  - type: text
    content: 'and will tell you great and hidden things that you have not known. '
  '4':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, concerning the houses of this city and the houses of the kings of Judah that were torn down to make a defense against '
  - type: note
    content: ch. 32:24
  - type: text
    content: 'the siege mounds and against the sword: '
  '5':
  - type: text
    content: 'They are coming in '
  - type: note
    content: '[ch. 32:5]'
  - type: text
    content: to fight against the Chaldeans and to fill them
  - type: note
    content: That is, the torn-down houses
  - type: text
    content: ' with the dead bodies of men whom I shall strike down '
  - type: note
    content: Ezek. 22:20
  - type: text
    content: 'in my anger and my wrath, '
  - type: note
    content: Deut. 31:17, 18
  - type: text
    content: 'for I have hidden my face from this city because of all their evil. '
  '6':
  - type: note
    content: ch. 30:17
  - type: text
    content: 'Behold, I will bring to it health and healing, and I will heal them and reveal to them abundance of prosperity and security. '
  '7':
  - type: note
    content: See ch. 30:3
  - type: text
    content: 'I will restore the fortunes of Judah and the fortunes of Israel, '
  - type: note
    content: See ch. 24:6
  - type: text
    content: 'and rebuild them as they were '
  - type: note
    content: Isa. 1:26
  - type: text
    content: 'at first. '
  '8':
  - type: note
    content: Ezek. 36:25; [Ps. 51:2, 7; Heb. 9:13, 14]
  - type: text
    content: 'I will cleanse them from all the guilt of their sin against me, '
  - type: note
    content: See ch. 31:34
  - type: text
    content: 'and I will forgive all the guilt of their sin and rebellion against me. '
  '9':
  - type: note
    content: See ch. 13:11
  - type: text
    content: And this city
  - type: note
    content: Hebrew And it
  - type: text
    content: ' shall be to me a name of joy, a praise and a glory before all the nations of the earth who shall hear of all the good that I do for them. They shall '
  - type: note
    content: '[Ps. 130:4; Isa. 60:5]'
  - type: text
    content: fear and tremble because of all the good and all the prosperity I provide for it.
