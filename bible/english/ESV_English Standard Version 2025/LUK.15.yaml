document_id: LUK.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Lost Sheep
  - type: text
    content: 'Now '
  - type: note
    content: See Matt. 11:19
  - type: text
    content: 'the tax collectors and sinners were all drawing near to hear him. '
  '10':
  - type: text
    content: 'Just so, I tell you, there is joy before '
  - type: note
    content: See ch. 12:8
  - type: text
    content: the angels of God over one sinner who repents.”
  - type: heading
    content: The Parable of the Prodigal Son
  '11':
  - type: text
    content: 'And he said, '
  - type: text
    content: “There was a man who had two sons.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And the younger of them said to his father, ‘Father, give me '
  - type: note
    content: Deut. 21:17
  - type: text
    content: 'the share of property that is coming to me.’ And he divided '
  - type: note
    content: ver. 30; Mark 12:44
  - type: text
    content: his property between them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Not many days later, the younger son gathered all he had and took a journey into a far country, and there he squandered his property in '
  - type: note
    content: '[Eph. 5:18; Titus 1:6; 1 Pet. 4:4]'
  - type: text
    content: reckless living.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And when he had spent everything, a severe famine arose in that country, and he began to be in need.
  - type: text
    content: ' '
  '15':
  - type: text
    content: So he went and hired himself out to
  - type: note
    content: Greek joined himself to
  - type: text
    content: ' '
  - type: text
    content: one of the citizens of that country, who sent him into his fields to feed pigs.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he '
  - type: note
    content: '[ch. 16:21]'
  - type: text
    content: was longing to be fed with the pods that the pigs ate, and no one gave him anything.
  '17':
  - type: text
    content: ' '
  - type: text
    content: '“But '
  - type: note
    content: '[ 1 Kgs. 8:47 ]'
  - type: text
    content: 'when he '
  - type: note
    content: '[ Acts 12:11 ]'
  - type: text
    content: came to himself, he said, ‘How many of my father’s hired servants have more than enough bread, but I perish here with hunger!
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I will arise and go to my father, and I will say to him, “Father, '
  - type: note
    content: '[Ex. 10:16]'
  - type: text
    content: 'I have sinned against '
  - type: note
    content: Matt. 21:25; John 3:27
  - type: text
    content: heaven and before you.
  - type: text
    content: ' '
  '19':
  - type: note
    content: '[ch. 7:6, 7]'
  - type: text
    content: I am no longer worthy to be called your son. Treat me as one of your hired servants.”’
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And the Pharisees and the scribes '
  - type: note
    content: ch. 19:7; [Ex. 16:2, 7, 8; Num. 14:2; Josh. 9:18]
  - type: text
    content: 'grumbled, saying, '
  - type: note
    content: '[ch. 7:39]'
  - type: text
    content: '“This man receives sinners and '
  - type: note
    content: ch. 5:30; Matt. 9:11; 11:19; Mark 2:16; [Acts 11:3; 1 Cor. 5:11; Gal. 2:12]
  - type: text
    content: eats with them.”
  '20':
  - type: text
    content: 'And he arose and came to his father. But while he was still a long way off, his father saw him and felt compassion, and '
  - type: note
    content: '[James 4:8]'
  - type: text
    content: 'ran and '
  - type: note
    content: Gen. 33:4; Acts 20:37
  - type: text
    content: 'embraced him and '
  - type: note
    content: 2 Sam. 14:33
  - type: text
    content: kissed him.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the son said to him, ‘Father, I have sinned against heaven and before you. '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: I am no longer worthy to be called your son.’
  - type: note
    content: Some manuscripts add treat me as one of your hired servants
  - type: text
    content: ' '
  '22':
  - type: text
    content: But the father said to his servants,
  - type: note
    content: Or bondservants
  - type: text
    content: ' '
  - type: text
    content: '‘Bring quickly '
  - type: note
    content: Zech. 3:3-5
  - type: text
    content: 'the best robe, and put it on him, and put '
  - type: note
    content: Gen. 41:42; Esth. 3:10; 8:2
  - type: text
    content: 'a ring on his hand, and '
  - type: note
    content: Ezek. 16:10
  - type: text
    content: shoes on his feet.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And bring '
  - type: note
    content: '[1 Sam. 28:24]'
  - type: text
    content: 'the fattened calf and kill it, and '
  - type: note
    content: '[ch. 12:19]'
  - type: text
    content: let us eat and celebrate.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For this my son '
  - type: note
    content: ver. 32; [Rom. 11:15; Eph. 2:1; Col. 2:13; Rev. 3:1]
  - type: text
    content: was dead, and is alive again; he was lost, and is found.’ And they began to celebrate.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Now his older son was in the field, and as he came and drew near to the house, he heard music and dancing.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And he called one of the servants and asked what these things meant.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he said to him, ‘Your brother has come, and your father has killed the fattened calf, because he has received him back safe and sound.’
  - type: text
    content: ' '
  '28':
  - type: text
    content: But he was angry and refused to go in. His father came out and entreated him,
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'but he answered his father, ‘Look, these many years I have served you, and I never disobeyed your command, yet you never gave me a young goat, that I might '
  - type: note
    content: ver. 23
  - type: text
    content: celebrate with my friends.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'So he told them this parable: '
  '30':
  - type: text
    content: 'But when this son of yours came, '
  - type: note
    content: Prov. 29:3
  - type: text
    content: 'who has devoured '
  - type: note
    content: ver. 12
  - type: text
    content: your property with prostitutes, you killed the fattened calf for him!’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And he said to him, ‘Son, '
  - type: note
    content: John 8:35
  - type: text
    content: you are always with me, and all that is mine is yours.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'It was fitting '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'to celebrate and be glad, for this your brother '
  - type: note
    content: ver. 24
  - type: text
    content: was dead, and is alive; he was lost, and is found.’”
  '4':
  - type: note
    content: For ver. 4-7, [Matt. 18:12-14]
  - type: text
    content: '“What man of you, having a hundred sheep, '
  - type: note
    content: Ezek. 34:6; [1 Pet. 2:25]
  - type: text
    content: 'if he has lost one of them, does not leave the ninety-nine '
  - type: note
    content: '[Ex. 3:1; 1 Sam. 17:28]'
  - type: text
    content: 'in the open country, and '
  - type: note
    content: Ezek. 34:4, 11, 12, 16; [ch. 19:10]
  - type: text
    content: go after the one that is lost, until he finds it?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And when he has found it, '
  - type: note
    content: '[Isa. 40:11; 49:22; 60:4; 66:12]'
  - type: text
    content: he lays it on his shoulders, rejoicing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And when he comes home, he calls together his friends and his neighbors, saying to them, ‘Rejoice with me, for '
  - type: note
    content: 1 Pet. 2:25
  - type: text
    content: I have found my sheep that was lost.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Just so, I tell you, there will be more joy in heaven over one sinner who '
  - type: note
    content: ver. 10; See ch. 5:32
  - type: text
    content: 'repents than over ninety-nine '
  - type: note
    content: '[ch. 5:32; Matt. 9:13]'
  - type: text
    content: righteous persons who need no repentance.
  - type: heading
    content: The Parable of the Lost Coin
  '8':
  - type: text
    content: ' '
  - type: text
    content: “Or what woman, having ten silver coins,
  - type: text
    content: ' '
  - type: note
    content: Greek ten drachmas ; a drachma was a Greek coin approximately equal in value to a Roman denarius , worth about a day’s wage for a laborer
  - type: text
    content: if she loses one coin, does not light a lamp and sweep the house and seek diligently until she finds it?
  - type: text
    content: ' '
  '9':
  - type: text
    content: And when she has found it, she calls together her friends and neighbors, saying, ‘Rejoice with me, for I have found the coin that I had lost.’
  - type: text
    content: ' '
