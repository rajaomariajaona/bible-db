document_id: ZEC.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Return to the Lord
  - type: text
    content: 'In the eighth month, '
  - type: note
    content: See Hag. 1:1
  - type: text
    content: 'in the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet '
  - type: note
    content: Ezra 6:14; Matt. 23:35
  - type: text
    content: 'Zechariah, the son of '
  - type: note
    content: 1 Chr. 6:39
  - type: text
    content: 'Berechiah, son of '
  - type: note
    content: Neh. 12:4, 16
  - type: text
    content: 'Iddo, saying, '
  '10':
  - type: text
    content: 'So '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the man who was standing among the myrtle trees answered, '
  - type: note
    content: '[Heb. 1:14]'
  - type: text
    content: '‘These are they whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent to '
  - type: note
    content: ch. 6:7; [Job 1:7]
  - type: text
    content: 'patrol the earth.’ '
  '11':
  - type: text
    content: 'And they answered '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' who was standing among the myrtle trees, and said, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: '‘We have patrolled the earth, and behold, all the earth '
  - type: note
    content: '[ver. 15]'
  - type: text
    content: 'remains at rest.’ '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Ps. 80:4; 89:46; Hab. 2:6; Rev. 6:10
  - type: text
    content: '‘O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: Ps. 80:4; 89:46; Hab. 2:6; Rev. 6:10
  - type: text
    content: 'how long will you '
  - type: note
    content: Ps. 102:13
  - type: text
    content: 'have no mercy on Jerusalem and the cities of Judah, against which you have been angry these '
  - type: note
    content: ch. 7:5; Jer. 25:11; 29:10
  - type: text
    content: 'seventy years?’ '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' answered '
  - type: note
    content: See Jer. 29:10, 11
  - type: text
    content: 'gracious and comforting words to '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'the angel who talked with me. '
  '14':
  - type: text
    content: 'So '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'the angel who talked with me said to me, ‘Cry out, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: ch. 8:2; Joel 2:18
  - type: text
    content: 'I am exceedingly jealous for Jerusalem and for Zion. '
  '15':
  - type: note
    content: '[Joel 3:2]'
  - type: text
    content: 'And I am exceedingly angry with the nations that are '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'at ease; '
  - type: note
    content: '[Isa. 54:7, 8]'
  - type: text
    content: 'for while I was angry but a little, '
  - type: note
    content: '[Isa. 47:6]'
  - type: text
    content: 'they furthered the disaster. '
  '16':
  - type: text
    content: 'Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 8:3
  - type: text
    content: 'I have returned to Jerusalem with mercy; '
  - type: note
    content: '[ch. 4:9; Ezra 6:14]'
  - type: text
    content: 'my house shall be built in it, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and '
  - type: note
    content: Jer. 31:39; Ezek. 40:3; 47:3
  - type: text
    content: 'the measuring line shall be stretched out over Jerusalem. '
  '17':
  - type: text
    content: 'Cry out again, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'My cities shall again overflow with prosperity, '
  - type: note
    content: Isa. 40:1; 51:3
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will again comfort Zion and again '
  - type: note
    content: ch. 2:12
  - type: text
    content: choose Jerusalem.’”
  - type: heading
    content: A Vision of Horns and Craftsmen
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ch 2:1 in Hebrew
  - type: text
    content: 'And I lifted my eyes and saw, and behold, '
  - type: note
    content: '[1 Kgs. 22:11]'
  - type: text
    content: 'four horns! '
  '19':
  - type: text
    content: 'And I said to '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'the angel who talked with me, “What are these?” And he said to me, '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: '“These are the horns that have scattered Judah, Israel, and Jerusalem.” '
  '2':
  - type: note
    content: '[Jer. 2:5]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with your fathers. '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' showed me four craftsmen. '
  '21':
  - type: text
    content: 'And I said, “What are these coming to do?” He said, '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: '“These are the horns that scattered Judah, so that no one raised his head. And these have come '
  - type: note
    content: Deut. 28:26; Jer. 7:33
  - type: text
    content: 'to terrify them, to cast down the horns of the nations '
  - type: note
    content: '[Ps. 75:4, 5]'
  - type: text
    content: who lifted up their horns against the land of Judah to scatter it.”
  '3':
  - type: text
    content: 'Therefore say to them, Thus declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: Isa. 31:6; Jer. 3:1, 22; Ezek. 18:30; Mal. 3:7
  - type: text
    content: 'Return to me, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and '
  - type: note
    content: Jer. 12:15; Mic. 7:19
  - type: text
    content: 'I will return to you, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '4':
  - type: note
    content: '[Ps. 78:8]'
  - type: text
    content: 'Do not be like your fathers, '
  - type: note
    content: See 2 Chr. 36:15
  - type: text
    content: 'to whom the former prophets cried out, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Return from your evil ways and from your evil deeds.’ But '
  - type: note
    content: ch. 7:11; 2 Chr. 36:16; See Jer. 35:15
  - type: text
    content: 'they did not hear or pay attention to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Your fathers, where are they? And '
  - type: note
    content: '[John 8:52]'
  - type: text
    content: 'the prophets, do they live forever? '
  '6':
  - type: note
    content: '[Isa. 40:8; Matt. 24:35]'
  - type: text
    content: 'But my words and my statutes, which I commanded '
  - type: note
    content: See Dan. 9:6
  - type: text
    content: 'my servants the prophets, did they not '
  - type: note
    content: Deut. 28:2, 15
  - type: text
    content: 'overtake your fathers? So they repented and said, '
  - type: note
    content: Lam. 2:17
  - type: text
    content: '‘As the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts purposed to deal with us for '
  - type: note
    content: '[Ezek. 36:31]'
  - type: text
    content: 'our ways and '
  - type: note
    content: '[Ezek. 36:31]'
  - type: text
    content: deeds, so has he dealt with us.’”
  - type: heading
    content: A Vision of a Horseman
  '7':
  - type: text
    content: 'On the twenty-fourth day of the eleventh month, which is the month of Shebat, in the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Zechariah, the son of '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Berechiah, son of '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Iddo, saying, '
  '8':
  - type: text
    content: '“I saw in the night, and behold, '
  - type: note
    content: '[Rev. 6:4]'
  - type: text
    content: 'a man riding on a red horse! He was standing among the myrtle trees in the glen, and behind him were '
  - type: note
    content: '[Rev. 6:4, 5, 8]; See ch. 6:2-7'
  - type: text
    content: 'red, sorrel, and white horses. '
  '9':
  - type: text
    content: 'Then I said, ‘What are these, my lord?’ '
  - type: note
    content: '[Rev. 22:6]'
  - type: text
    content: 'The angel who talked with me said to me, ‘I will show you what they are.’ '
