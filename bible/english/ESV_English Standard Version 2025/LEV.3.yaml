document_id: LEV.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Peace Offerings
  - type: text
    content: '“If his offering is '
  - type: note
    content: ch. 17:5; 22:21; 23:19; Amos 5:22; See ch. 7:11-21, 29-34
  - type: text
    content: 'a sacrifice of peace offering, if he offers an animal from the herd, male or female, '
  - type: note
    content: ver. 7, 12
  - type: text
    content: 'he shall offer it '
  - type: note
    content: See Ex. 12:5
  - type: text
    content: 'without blemish before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'and the two kidneys with the fat that is on them at the loins and the long lobe of the liver that he shall remove '
  - type: note
    content: ver. 4
  - type: text
    content: 'with the kidneys. '
  '11':
  - type: text
    content: 'And the priest shall burn it on the altar as '
  - type: note
    content: ch. 21:6, 8, 17, 21, 22; 22:7, 25; Num. 28:2; Ezek. 44:7; Mal. 1:7
  - type: text
    content: 'a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“If his offering is a goat, then he shall offer it before the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'and lay his hand on its head and kill it in front of the tent of meeting, and the sons of Aaron shall throw its blood against the sides of the altar. '
  '14':
  - type: text
    content: 'Then he shall offer from it, as his offering for a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', the fat covering the entrails and all the fat that is on the entrails '
  '15':
  - type: text
    content: 'and the two kidneys with the fat that is on them at the loins and the long lobe of the liver that he shall remove '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'with the kidneys. '
  '16':
  - type: text
    content: 'And the priest shall burn them on the altar as a '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'food offering with a pleasing aroma. '
  - type: note
    content: ch. 7:23-25; 1 Sam. 2:15; Ezek. 44:7, 15
  - type: text
    content: 'All fat is the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '17':
  - type: text
    content: 'It shall be a statute forever throughout your generations, in all your dwelling places, that you eat neither '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'fat nor '
  - type: note
    content: ch. 7:26; 17:10, 14; 19:26; Gen. 9:4; Deut. 12:16, 23; 15:23; 1 Sam. 14:33; Acts 15:20, 29
  - type: text
    content: blood.”
  '2':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'he shall lay his hand on the head of his offering and kill it at the entrance of the tent of meeting, and Aaron’s sons the priests shall throw the blood against the sides of the altar. '
  '3':
  - type: text
    content: 'And from the sacrifice of the peace offering, as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', he shall offer '
  - type: note
    content: ch. 4:8, 9; Ex. 29:13, 22
  - type: text
    content: 'the fat covering the entrails and all the fat that is on the entrails, '
  '4':
  - type: note
    content: ver. 10
  - type: text
    content: 'and the two kidneys with the fat that is on them at the loins, and the long lobe of the liver that he shall remove with the kidneys. '
  '5':
  - type: text
    content: 'Then Aaron’s sons '
  - type: note
    content: ch. 6:12
  - type: text
    content: 'shall burn it on the altar on top of the burnt offering, which is on the wood on the fire; it is a food offering with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '“If his offering for a sacrifice of peace offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' is an animal from the flock, male or female, he shall offer it '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'without blemish. '
  '7':
  - type: text
    content: 'If he offers a lamb for his offering, then he shall offer it before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'lay his hand on the head of his offering, and kill it in front of the tent of meeting; and Aaron’s sons shall throw its blood against the sides of the altar. '
  '9':
  - type: text
    content: 'Then from the sacrifice of the peace offering he shall offer as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' its fat; he shall remove the whole '
  - type: note
    content: ch. 9:19; Ex. 29:22
  - type: text
    content: 'fat tail, cut off close to the backbone, and the fat that covers the entrails and all the fat that is on the entrails '
