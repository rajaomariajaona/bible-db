document_id: DEU.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua to Succeed Moses
  - type: text
    content: 'So Moses continued to speak these words to all Israel. '
  '10':
  - type: text
    content: 'And Moses commanded them, '
  - type: note
    content: See ch. 15:1
  - type: text
    content: '“At the end of every seven years, at the set time in the year of release, at '
  - type: note
    content: See Lev. 23:34
  - type: text
    content: 'the Feast of Booths, '
  '11':
  - type: text
    content: 'when all Israel comes '
  - type: note
    content: ch. 16:16; Ex. 23:14, 17; 34:23
  - type: text
    content: 'to appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place that he will choose, '
  - type: note
    content: Josh. 8:34, 35; 2 Kgs. 23:2; See Neh. 8:1-3
  - type: text
    content: 'you shall read this law before all Israel in their hearing. '
  '12':
  - type: note
    content: ch. 4:10
  - type: text
    content: 'Assemble the people, men, women, and little ones, and the sojourner within your towns, that they may hear and learn to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and be careful to do all the words of this law, '
  '13':
  - type: text
    content: 'and that their children, '
  - type: note
    content: ch. 11:2
  - type: text
    content: 'who have not known it, '
  - type: note
    content: Ps. 78:5, 6
  - type: text
    content: 'may hear and learn to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: See ch. 4:10
  - type: text
    content: as long as you live in the land that you are going over the Jordan to possess.”
  - type: heading
    content: Joshua Commissioned to Lead Israel
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: '[ch. 34:5; Num. 27:13]'
  - type: text
    content: '“Behold, the days approach when you must die. Call Joshua and present yourselves in the tent of meeting, that '
  - type: note
    content: '[ver. 23; Num. 27:19]'
  - type: text
    content: 'I may commission him.” And Moses and Joshua went and presented themselves in the tent of meeting. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 33:9; Num. 12:5
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared in the tent in a pillar of cloud. And the pillar of cloud stood over the entrance of the tent.'
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: '“Behold, you are about to lie down with your fathers. Then this people will rise and '
  - type: note
    content: Ex. 34:15, 16; Lev. 20:5; Num. 15:39
  - type: text
    content: 'whore after the foreign gods among them in the land that they are entering, and they will '
  - type: note
    content: ch. 32:15; Judg. 2:12; 10:6, 13
  - type: text
    content: 'forsake me and '
  - type: note
    content: Judg. 2:20
  - type: text
    content: 'break my covenant that I have made with them. '
  '17':
  - type: text
    content: 'Then my anger will be kindled against them in that day, and '
  - type: note
    content: 2 Chr. 12:5; 15:2; 24:20
  - type: text
    content: 'I will forsake them and '
  - type: note
    content: ch. 32:20; Ps. 30:7; 104:29; Isa. 8:17; 64:7; [Isa. 59:2]
  - type: text
    content: 'hide my face from them, and they will be devoured. And many evils and troubles will come upon them, so that they will say in that day, '
  - type: note
    content: Judg. 6:13
  - type: text
    content: '‘Have not these evils come upon us because '
  - type: note
    content: Num. 14:42
  - type: text
    content: 'our God is not among us?’ '
  '18':
  - type: text
    content: 'And I will surely hide my face in that day because of all the evil that they have done, because '
  - type: note
    content: ver. 20
  - type: text
    content: they have turned to other gods.
  '19':
  - type: text
    content: '“Now therefore write '
  - type: note
    content: See ch. 32:1-43
  - type: text
    content: 'this song and '
  - type: note
    content: '[2 Sam. 1:18]'
  - type: text
    content: 'teach it to the people of Israel. Put it in their mouths, that this song may be '
  - type: note
    content: ver. 21, 26
  - type: text
    content: 'a witness for me against the people of Israel. '
  '2':
  - type: text
    content: 'And he said to them, “I am '
  - type: note
    content: ch. 34:7; [Ex. 7:7]
  - type: text
    content: '120 years old today. I am no longer able to '
  - type: note
    content: See Num. 27:17
  - type: text
    content: 'go out and come in. The '
  - type: text
    content: Lord
  - type: text
    content: ' has said to me, '
  - type: note
    content: ch. 3:27; See ch. 1:37
  - type: text
    content: '‘You shall not go over this Jordan.’ '
  '20':
  - type: text
    content: 'For when I have brought them into the land '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'flowing with milk and honey, which I swore to give to their fathers, and they have eaten and are full and '
  - type: note
    content: ch. 32:15; Neh. 9:25, 26; Jer. 5:28; Hos. 13:6
  - type: text
    content: 'grown fat, '
  - type: note
    content: ver. 18
  - type: text
    content: 'they will turn to other gods and serve them, and '
  - type: note
    content: Num. 14:11, 23; 16:30
  - type: text
    content: 'despise me and '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'break my covenant. '
  '21':
  - type: text
    content: 'And when many evils and troubles have come upon them, this song shall confront them as '
  - type: note
    content: ver. 19, 26
  - type: text
    content: 'a witness (for it will live unforgotten in the mouths of their offspring). For '
  - type: note
    content: '[Hos. 5:3; 13:5]'
  - type: text
    content: 'I know what they are inclined to do even today, before I have brought them into the land that I swore to give.” '
  '22':
  - type: text
    content: So Moses wrote this song the same day and taught it to the people of Israel.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 14 ]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he
  - type: text
    content: ' commissioned Joshua the son of Nun and said, '
  - type: note
    content: See ver. 6
  - type: text
    content: '“Be strong and courageous, for you shall bring the people of Israel into the land that I swore to give them. '
  - type: note
    content: ver. 8; Josh. 1:5; 3:7
  - type: text
    content: I will be with you.”
  '24':
  - type: text
    content: 'When Moses had finished '
  - type: note
    content: ver. 9
  - type: text
    content: 'writing the words of this law in a book to the very end, '
  '25':
  - type: text
    content: 'Moses commanded '
  - type: note
    content: See ver. 9
  - type: text
    content: 'the Levites who carried the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '26':
  - type: text
    content: '“Take this Book of the Law '
  - type: note
    content: '[2 Kgs. 22:8]'
  - type: text
    content: 'and put it by the side of the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, that it may be there for '
  - type: note
    content: ver. 19, 21
  - type: text
    content: 'a witness against you. '
  '27':
  - type: text
    content: 'For I know how rebellious and '
  - type: note
    content: See ch. 9:6
  - type: text
    content: 'stubborn you are. Behold, even today while I am yet alive with you, '
  - type: note
    content: See ch. 9:7
  - type: text
    content: 'you have been rebellious against the '
  - type: text
    content: Lord
  - type: text
    content: '. How much more after my death! '
  '28':
  - type: text
    content: 'Assemble to me all the elders of your tribes and your officers, that I may speak '
  - type: note
    content: See ch. 32:1-43
  - type: text
    content: 'these words in their ears and '
  - type: note
    content: See ch. 4:26
  - type: text
    content: 'call heaven and earth to witness against them. '
  '29':
  - type: text
    content: 'For I know that after my death '
  - type: note
    content: Judg. 2:19; Hos. 9:9
  - type: text
    content: 'you will surely act corruptly and turn aside from the way that I have commanded you. And '
  - type: note
    content: See Gen. 49:1
  - type: text
    content: 'in the days to come '
  - type: note
    content: '[Jer. 44:23]'
  - type: text
    content: 'evil will befall you, because you will do what is evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 4:25; 9:18; 32:16, 21; 1 Kgs. 16:7; 2 Kgs. 22:17
  - type: text
    content: provoking him to anger through the work of your hands.”
  - type: heading
    content: The Song of Moses
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'himself will go over before you. He will destroy these nations before you, so that you shall dispossess them, and Joshua will go over at your head, '
  - type: note
    content: ch. 1:38; 3:28; Num. 27:18, 21
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken. '
  '30':
  - type: text
    content: 'Then Moses spoke the words of this song until they were finished, in the ears of all the assembly of Israel:'
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will do to them '
  - type: note
    content: See ch. 2:31-35; Num. 21:21-25
  - type: text
    content: 'as he did to Sihon '
  - type: note
    content: See ch. 3:1-7; Num. 21:33-35
  - type: text
    content: 'and Og, the kings of the Amorites, and to their land, when he destroyed them. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will give them over to you, and you shall do to them '
  - type: note
    content: See ch. 7:2
  - type: text
    content: 'according to the whole commandment that I have commanded you. '
  '6':
  - type: note
    content: ver. 23; Josh. 1:6, 7; 10:25; 1 Chr. 22:13; 28:20
  - type: text
    content: 'Be strong and courageous. Do not fear or be in dread of them, '
  - type: note
    content: See ch. 20:4
  - type: text
    content: 'for it is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who goes with you. '
  - type: note
    content: Josh. 1:5
  - type: text
    content: He will not leave you or forsake you.”
  '7':
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 3:28]'
  - type: text
    content: 'Moses summoned Joshua and said to him in the sight of all Israel, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: '“Be strong and courageous, for you shall go with this people into the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn to their fathers to give them, and you shall put them in possession of it. '
  '8':
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'who goes before you. He will be with you; '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'he will not leave you or forsake you. '
  - type: note
    content: ch. 1:21; 7:18; Josh. 1:9; 8:1; 10:25
  - type: text
    content: Do not fear or be dismayed.”
  - type: heading
    content: The Reading of the Law
  '9':
  - type: text
    content: 'Then Moses '
  - type: note
    content: '[ch. 17:18]'
  - type: text
    content: 'wrote this law and gave it to the priests, the sons of Levi, '
  - type: note
    content: Num. 4:15; Josh. 3:3; 8:33; 1 Chr. 15:15
  - type: text
    content: 'who carried the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and to all the elders of Israel. '
