document_id: MAT.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Foretells Destruction of the Temple
  - type: text
    content: ' '
  - type: note
    content: '[ch. 21:23 ]; For ver. 1-51, see Mark 13:1-37; Luke 21:5-36'
  - type: text
    content: 'Jesus left the temple and was going away, when his disciples came to point out to him the buildings of the temple. '
  '10':
  - type: text
    content: And then many will fall away
  - type: note
    content: Or stumble
  - type: text
    content: ' '
  - type: text
    content: 'and '
  - type: note
    content: ch. 10:21
  - type: text
    content: betray one another and hate one another.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And many '
  - type: note
    content: See ch. 7:15
  - type: text
    content: 'false prophets will arise '
  - type: note
    content: ver. 5, 24
  - type: text
    content: and lead many astray.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And because lawlessness will be increased, '
  - type: note
    content: '[Rev. 2:4]'
  - type: text
    content: the love of many will grow cold.
  - type: text
    content: ' '
  '13':
  - type: note
    content: See ch. 10:22
  - type: text
    content: But the one who endures to the end will be saved.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And this gospel of the kingdom '
  - type: note
    content: Rom. 10:18; Col. 1:6, 23; [Mark 14:9]
  - type: text
    content: 'will be proclaimed throughout the whole world '
  - type: note
    content: ch. 10:18
  - type: text
    content: 'as a testimony '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'to all nations, and '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: then the end will come.
  - type: heading
    content: The Abomination of Desolation
  '15':
  - type: text
    content: ' '
  - type: text
    content: '“So when you see the abomination of desolation '
  - type: note
    content: Dan. 9:27; 11:31; 12:11
  - type: text
    content: 'spoken of by the prophet Daniel, standing in '
  - type: note
    content: '[ John 11:48; Acts 6:13; 21:28 ]'
  - type: text
    content: the holy place (
  - type: text
    content: ' '
  - type: note
    content: '[ Dan. 9:22, 23, 25; Rev. 1:3 ]'
  - type: text
    content: let the reader understand),
  - type: text
    content: ' '
  '16':
  - type: text
    content: then let those who are in Judea flee to the mountains.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Luke 17:31
  - type: text
    content: 'Let the one who is on '
  - type: note
    content: See Luke 5:19
  - type: text
    content: the housetop not go down to take what is in his house,
  - type: text
    content: ' '
  '18':
  - type: text
    content: and let the one who is in the field not turn back to take his cloak.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: Luke 23:29
  - type: text
    content: alas for women who are pregnant and for those who are nursing infants in those days!
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'But he answered them, '
  - type: text
    content: '“You see all these, do you not? Truly, I say to you, '
  - type: note
    content: Luke 19:44
  - type: text
    content: there will not be left here one stone upon another that will not be thrown down.”
  - type: heading
    content: Signs of the End of the Age
  '20':
  - type: text
    content: Pray that your flight may not be in winter or on a Sabbath.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'For then there will be '
  - type: note
    content: ver. 29; Dan. 12:1; [Rev. 7:14]
  - type: text
    content: 'great tribulation, '
  - type: note
    content: Rev. 16:18
  - type: text
    content: such as has not been from the beginning of the world until now, no, and never will be.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And if those days had not been cut short, no human being would be saved. But for '
  - type: note
    content: ver. 24, 31; Isa. 65:8, 9; Luke 18:7; [ch. 22:14]
  - type: text
    content: the sake of the elect those days will be cut short.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Luke 17:23; [ver. 5, 26]
  - type: text
    content: Then if anyone says to you, ‘Look, here is the Christ!’ or ‘There he is!’ do not believe it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: '[1 John 2:18]'
  - type: text
    content: 'false christs and '
  - type: note
    content: ver. 11
  - type: text
    content: 'false prophets will arise and '
  - type: note
    content: Deut. 13:1-3; 2 Thess. 2:9-11; Rev. 13:13, 14; 16:14; 19:20; [Acts 8:9]
  - type: text
    content: 'perform great signs and wonders, '
  - type: note
    content: ver. 11
  - type: text
    content: so as to lead astray, if possible, even the elect.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'See, '
  - type: note
    content: John 13:19; 14:29; [2 Pet. 3:17]
  - type: text
    content: I have told you beforehand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'So, if they say to you, ‘Look, '
  - type: note
    content: Acts 21:38
  - type: text
    content: he is in the wilderness,’ do not go out. If they say, ‘Look, he is in the inner rooms,’ do not believe it.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Luke 17:24
  - type: text
    content: 'For as the lightning comes from the east and shines as far as the west, so will be '
  - type: note
    content: ver. 3, 37, 39
  - type: text
    content: the coming of the Son of Man.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Luke 17:37; [Job 39:30]
  - type: text
    content: Wherever the corpse is, there the vultures will gather.
  - type: heading
    content: The Coming of the Son of Man
  '29':
  - type: text
    content: ' '
  - type: text
    content: '“Immediately after '
  - type: note
    content: ver. 21
  - type: text
    content: 'the tribulation of those days '
  - type: note
    content: Isa. 13:10; 24:23; Ezek. 32:7; Joel 2:10, 31; 3:15; Acts 2:20; [ Amos 5:20; 8:9; Zeph. 1:15; Rev. 6:12; 8:12 ]
  - type: text
    content: 'the sun will be darkened, and the moon will not give its light, and '
  - type: note
    content: Rev. 6:13; [ Isa. 14:12; 34:4 ]
  - type: text
    content: the stars will fall from heaven, and the powers of the heavens will be shaken.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'As he sat on '
  - type: note
    content: See ch. 21:1
  - type: text
    content: 'the Mount of Olives, the disciples came to him '
  - type: note
    content: '[Mark 4:34]'
  - type: text
    content: 'privately, saying, “Tell us, '
  - type: note
    content: '[Acts 1:6, 7]'
  - type: text
    content: 'when will these things be, and what will be the sign of your '
  - type: note
    content: ver. 27, 37, 39; See 1 Thess. 2:19
  - type: text
    content: 'coming and of '
  - type: note
    content: See ch. 13:39
  - type: text
    content: 'the end of the age?” '
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: Dan. 7:13
  - type: text
    content: 'will appear in heaven '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'the sign of the Son of Man, and then '
  - type: note
    content: Rev. 1:7; [Zech. 12:12]
  - type: text
    content: 'all the tribes of the earth will mourn, and '
  - type: note
    content: See ch. 16:27
  - type: text
    content: 'they will see the Son of Man coming on the clouds of heaven '
  - type: note
    content: ch. 26:64; Mark 9:1; [ch. 25:31]
  - type: text
    content: with power and great glory.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:41
  - type: text
    content: 'he will send out his angels with a loud '
  - type: note
    content: 1 Cor. 15:52; 1 Thess. 4:16
  - type: text
    content: 'trumpet call, and they will '
  - type: note
    content: '[ch. 23:37; 2 Thess. 2:1]'
  - type: text
    content: 'gather '
  - type: note
    content: ver. 22, 24
  - type: text
    content: 'his elect from '
  - type: note
    content: Dan. 7:2; Zech. 2:6; Rev. 7:1
  - type: text
    content: 'the four winds, '
  - type: note
    content: Deut. 4:32; 30:4
  - type: text
    content: from one end of heaven to the other.
  - type: heading
    content: The Lesson of the Fig Tree
  '32':
  - type: text
    content: ' '
  - type: text
    content: '“From the fig tree learn its lesson: as soon as its branch becomes tender and puts out its leaves, you know that summer is near.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'So also, when you see all these things, you know that he is near, '
  - type: note
    content: James 5:9; Rev. 3:20
  - type: text
    content: at the very gates.
  - type: text
    content: ' '
  '34':
  - type: note
    content: See ch. 16:28
  - type: text
    content: Truly, I say to you, this generation will not pass away until all these things take place.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Ps. 102:26; Isa. 51:6; 2 Pet. 3:10; [ch. 5:18; Heb. 12:27]
  - type: text
    content: 'Heaven and earth will pass away, but '
  - type: note
    content: Ps. 119:89; Isa. 40:8; 1 Pet. 1:23, 25
  - type: text
    content: my words will not pass away.
  - type: heading
    content: No One Knows That Day and Hour
  '36':
  - type: text
    content: ' '
  - type: text
    content: '“But concerning that day and hour '
  - type: note
    content: ch. 25:13; 1 Thess. 5:1, 2
  - type: text
    content: 'no one knows, not even the angels of heaven, '
  - type: note
    content: '[ Phil. 2:6, 7 ]'
  - type: text
    content: nor the Son,
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts omit nor the Son
  - type: note
    content: '[Zech. 14:7; Acts 1:7]'
  - type: text
    content: but the Father only.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Luke 17:26, 27
  - type: text
    content: 'For as were the days of Noah, '
  - type: note
    content: ver. 27
  - type: text
    content: so will be the coming of the Son of Man.
  - type: text
    content: ' '
  '38':
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: 'For as in those days before the flood they were eating and drinking, '
  - type: note
    content: ch. 22:30
  - type: text
    content: 'marrying and giving in marriage, until '
  - type: note
    content: Gen. 7:7-16
  - type: text
    content: the day when Noah entered the ark,
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'and they were unaware until the flood came and swept them all away, '
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: so will be the coming of the Son of Man.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And Jesus answered them, '
  - type: note
    content: Jer. 29:8; Eph. 5:6; Col. 2:8; 2 Thess. 2:3; 1 John 3:7
  - type: text
    content: “See that no one leads you astray.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Then two men will be in the field; one will be taken and one left.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Luke 17:35
  - type: text
    content: 'Two women will be grinding '
  - type: note
    content: Ex. 11:5; Isa. 47:2
  - type: text
    content: at the mill; one will be taken and one left.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Mark 14:34-38; Luke 12:37; 21:36; Acts 20:31; 1 Thess. 5:6
  - type: text
    content: 'stay awake, for you do not know on what day '
  - type: note
    content: John 13:13
  - type: text
    content: your Lord is coming.
  - type: text
    content: ' '
  '43':
  - type: note
    content: For ver. 43-51, [Luke 12:39-46]
  - type: text
    content: 'But know this, that if the master of the house had known in what part of the night '
  - type: note
    content: '[1 Thess. 5:2; 2 Pet. 3:10; Rev. 3:3]'
  - type: text
    content: the thief was coming, he would have stayed awake and would not have let his house be broken into.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Therefore you also must be '
  - type: note
    content: ch. 25:10
  - type: text
    content: 'ready, for '
  - type: note
    content: ver. 27
  - type: text
    content: the Son of Man is coming at an hour you do not expect.
  '45':
  - type: text
    content: ' '
  - type: text
    content: '“Who then is '
  - type: note
    content: ch. 25:21; 1 Cor. 4:2; Heb. 3:5
  - type: text
    content: 'the faithful and '
  - type: note
    content: ch. 7:24; 10:16; 25:2
  - type: text
    content: wise servant,
  - type: text
    content: ' '
  - type: note
    content: Or bondservant ; also verses 46, 48, 50
  - type: text
    content: whom his master has set over his household, to give them their food at the proper time?
  - type: text
    content: ' '
  '46':
  - type: note
    content: John 13:17; Rev. 16:15
  - type: text
    content: Blessed is that servant whom his master will find so doing when he comes.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Truly, I say to you, '
  - type: note
    content: ch. 25:21, 23
  - type: text
    content: he will set him over all his possessions.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'But if that wicked servant says to himself, ‘My master '
  - type: note
    content: ch. 25:5
  - type: text
    content: is delayed,’
  - type: text
    content: ' '
  '49':
  - type: text
    content: and begins to beat his fellow servants
  - type: note
    content: Or bondservants
  - type: text
    content: ' '
  - type: text
    content: 'and eats and drinks with '
  - type: note
    content: 1 Thess. 5:7
  - type: text
    content: drunkards,
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: ver. 11, 24; Jer. 14:14; 1 John 2:18
  - type: text
    content: 'many will come in my name, saying, ‘I am '
  - type: note
    content: See ch. 1:17
  - type: text
    content: the Christ,’ and they will lead many astray.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'the master of that servant will come '
  - type: note
    content: 2 Pet. 3:12; [ch. 25:13]
  - type: text
    content: on a day when he does not expect him and at an hour he does not know
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'and will cut him in pieces and put him with the hypocrites. In that place '
  - type: note
    content: See ch. 8:12
  - type: text
    content: there will be weeping and gnashing of teeth.
  '6':
  - type: text
    content: 'And you will hear of wars and rumors of wars. See that you '
  - type: note
    content: 2 Thess. 2:2
  - type: text
    content: 'are not alarmed, for this '
  - type: note
    content: Rev. 1:1
  - type: text
    content: must take place, but the end is not yet.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 2 Chr. 15:6; [Rev. 6:4]
  - type: text
    content: 'nation will rise against nation, and '
  - type: note
    content: Isa. 19:2
  - type: text
    content: 'kingdom against kingdom, and there will be '
  - type: note
    content: Acts 11:28; Rev. 6:8, 12
  - type: text
    content: famines and earthquakes in various places.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'All these are but the beginning of '
  - type: note
    content: John 16:21; Acts 2:24 (Gk.); Rom. 8:22
  - type: text
    content: the birth pains.
  '9':
  - type: text
    content: ' '
  - type: text
    content: '“Then '
  - type: note
    content: ch. 10:17, 21
  - type: text
    content: 'they will deliver you up '
  - type: note
    content: ver. 21, 29 ; Rev. 2:10
  - type: text
    content: 'to tribulation and '
  - type: note
    content: ch. 23:34; John 16:2
  - type: text
    content: 'put you to death, and '
  - type: note
    content: See ch. 10:22
  - type: text
    content: you will be hated by all nations for my name’s sake.
  - type: text
    content: ' '
