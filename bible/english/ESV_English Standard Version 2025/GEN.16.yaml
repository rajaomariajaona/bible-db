document_id: GEN.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sarai and Hagar
  - type: text
    content: ' '
  - type: note
    content: ch. 15:2, 3
  - type: text
    content: 'Now Sarai, Abram’s wife, had borne him no children. She had a female Egyptian servant whose name was '
  - type: note
    content: ch. 21:9; Gal. 4:24
  - type: text
    content: 'Hagar. '
  '10':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' also said to her, '
  - type: note
    content: ch. 17:20; 21:18; See ch. 25:12-18
  - type: text
    content: '“I will surely multiply your offspring so that they cannot be numbered for multitude.” '
  '11':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to her,'
  - type: text
    content: “Behold, you are pregnant
  - type: text
    content: and shall bear a son.
  - type: text
    content: You shall call his name Ishmael,
  - type: note
    content: Ishmael means God hears
  - type: note
    content: '[ch. 29:32 ]'
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has listened to your affliction.'
  '12':
  - type: text
    content: 'He shall be '
  - type: note
    content: Job 39:5-8; [ch. 21:20]
  - type: text
    content: a wild donkey of a man,
  - type: text
    content: his hand against everyone
  - type: text
    content: and everyone’s hand against him,
  - type: text
    content: 'and he shall dwell '
  - type: note
    content: ch. 25:18
  - type: text
    content: over against all his kinsmen.”
  '13':
  - type: text
    content: 'So she called the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' who spoke to her, “You are a God of seeing,”'
  - type: note
    content: Or You are a God who sees me
  - type: text
    content: ' for she said, '
  - type: note
    content: '[ch. 32:30; Ex. 19:21; 33:20; Judg. 13:22]'
  - type: text
    content: “Truly here I have seen him who looks after me.”
  - type: note
    content: Hebrew Have I really seen him here who sees me? or Would I have looked here for the one who sees me?
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Therefore the well was called '
  - type: note
    content: ch. 24:62; 25:11
  - type: text
    content: Beer-lahai-roi;
  - type: note
    content: Beer-lahai-roi means the well of the Living One who sees me
  - type: text
    content: ' it lies between '
  - type: note
    content: ch. 14:7; 20:1; Num. 13:26
  - type: text
    content: Kadesh and Bered.
  '15':
  - type: text
    content: 'And Hagar bore Abram a son, and Abram called the name of his son, whom Hagar bore, Ishmael. '
  '16':
  - type: text
    content: Abram was eighty-six years old when Hagar bore Ishmael to Abram.
  '2':
  - type: text
    content: 'And Sarai said to Abram, “Behold now, the '
  - type: text
    content: Lord
  - type: text
    content: ' has prevented me from bearing children. Go in to my servant; it may be that I shall obtain children'
  - type: note
    content: Hebrew be built up, which sounds like the Hebrew for children
  - type: text
    content: ' by her.” And Abram listened to the voice of Sarai. '
  '3':
  - type: text
    content: 'So, after Abram '
  - type: note
    content: ch. 12:5
  - type: text
    content: 'had lived ten years in the land of Canaan, Sarai, Abram’s wife, took Hagar the Egyptian, her servant, and gave her to Abram her husband as a wife. '
  '4':
  - type: text
    content: 'And he went in to Hagar, and she conceived. And when she saw that she had conceived, '
  - type: note
    content: '[1 Sam. 1:6, 7]'
  - type: text
    content: she looked with contempt on her mistress.
  - type: note
    content: Hebrew her mistress was dishonorable in her eyes; similarly in verse 5
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And Sarai said to Abram, “May the wrong done to me be on you! I gave my servant to your embrace, and when she saw that she had conceived, she looked on me with contempt. May '
  - type: note
    content: ch. 31:53; 1 Sam. 24:12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' judge between you and me!” '
  '6':
  - type: text
    content: But Abram said to Sarai, “Behold, your servant is in your power; do to her as you please.” Then Sarai dealt harshly with her, and she fled from her.
  '7':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' found her by a spring of water in the wilderness, the spring on the way to '
  - type: note
    content: ch. 25:18; Ex. 15:22
  - type: text
    content: 'Shur. '
  '8':
  - type: text
    content: 'And he said, “Hagar, servant of Sarai, where have you come from and where are you going?” She said, “I am fleeing from my mistress Sarai.” '
  '9':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to her, “Return to your mistress and submit to her.” '
