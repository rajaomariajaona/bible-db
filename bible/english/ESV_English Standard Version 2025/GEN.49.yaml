document_id: GEN.49,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Blesses His Sons
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-27, see Deut. 33:6-25
  - type: text
    content: 'Then Jacob called his sons and said, “Gather yourselves together, that I may tell you what shall happen to you '
  - type: note
    content: Num. 24:14; Deut. 4:30; 31:29; Isa. 2:2; Jer. 23:20; Dan. 2:28; 10:14; Hos. 3:5
  - type: text
    content: in days to come.
  '10':
  - type: text
    content: 'The '
  - type: note
    content: Num. 24:17; Zech. 10:11
  - type: text
    content: scepter shall not depart from Judah,
  - type: text
    content: 'nor the ruler’s staff '
  - type: note
    content: Deut. 28:57
  - type: text
    content: from between his feet,
  - type: text
    content: until tribute comes to him;
  - type: note
    content: By a slight revocalization; a slight emendation yields (compare Septuagint, Syriac, Targum) until he comes to whom it belongs; Hebrew until Shiloh comes, or until he comes to Shiloh
  - type: text
    content: and to him shall be the obedience of the peoples.
  '11':
  - type: text
    content: Binding his foal to the vine
  - type: text
    content: and his donkey’s colt to the choice vine,
  - type: text
    content: he has washed his garments in wine
  - type: text
    content: and his vesture in the blood of grapes.
  '12':
  - type: text
    content: 'His '
  - type: note
    content: Prov. 23:29
  - type: text
    content: eyes are darker than wine,
  - type: text
    content: and his teeth whiter than milk.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 33:18, 19 ]; Josh. 19:10, 11'
  - type: text
    content: '“Zebulun shall dwell at the '
  - type: note
    content: '[Deut. 1:7; Josh. 9:1; Judg. 5:17]'
  - type: text
    content: shore of the sea;
  - type: text
    content: he shall become a haven for ships,
  - type: text
    content: and his border shall be at Sidon.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Judg. 5:16; [ 1 Chr. 12:32 ]
  - type: text
    content: “Issachar is a strong donkey,
  - type: text
    content: crouching between the sheepfolds.
  - type: note
    content: Or between its saddlebags
  '15':
  - type: text
    content: He saw that a resting place was good,
  - type: text
    content: and that the land was pleasant,
  - type: text
    content: so he bowed his shoulder to bear,
  - type: text
    content: 'and '
  - type: note
    content: Josh. 16:10
  - type: text
    content: became a servant at forced labor.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 33:22 ]'
  - type: text
    content: '“Dan shall '
  - type: note
    content: ch. 30:6
  - type: text
    content: judge his people
  - type: text
    content: as one of the tribes of Israel.
  '17':
  - type: text
    content: 'Dan '
  - type: note
    content: Judg. 18:27
  - type: text
    content: shall be a serpent in the way,
  - type: text
    content: a viper by the path,
  - type: text
    content: that bites the horse’s heels
  - type: text
    content: so that his rider falls backward.
  '18':
  - type: text
    content: 'I '
  - type: note
    content: Ps. 25:5; 119:166, 174; Isa. 25:9; Mic. 7:7; [Luke 2:25]
  - type: text
    content: 'wait for your salvation, O '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 33:20 ]'
  - type: text
    content: '“Raiders shall raid '
  - type: note
    content: See 1 Chr. 5:18-22
  - type: text
    content: Gad,
  - type: note
    content: Gad sounds like the Hebrew for raiders and raid
  - type: text
    content: but he shall raid at their heels.
  '2':
  - type: text
    content: “Assemble and listen, O sons of Jacob,
  - type: text
    content: listen to Israel your father.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 33:24 ]'
  - type: text
    content: “Asher’s food shall be rich,
  - type: text
    content: and he shall yield royal delicacies.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 33:23 ]'
  - type: text
    content: “Naphtali is a doe let loose
  - type: text
    content: that bears beautiful fawns.
  - type: note
    content: Or he gives beautiful words, or that bears fawns of the fold
  '22':
  - type: text
    content: '“Joseph is '
  - type: note
    content: ch. 41:52; Josh. 17:14, 18
  - type: text
    content: a fruitful bough,
  - type: text
    content: a fruitful bough by a spring;
  - type: text
    content: his branches run over the wall.
  - type: note
    content: Or Joseph is a wild donkey, a wild donkey beside a spring, his wild colts beside the wall
  '23':
  - type: text
    content: 'The archers '
  - type: note
    content: '[ch. 37:24, 28; 39:20]'
  - type: text
    content: bitterly attacked him,
  - type: text
    content: shot at him, and harassed him severely,
  '24':
  - type: text
    content: 'yet '
  - type: note
    content: Job 29:20
  - type: text
    content: his bow remained unmoved;
  - type: text
    content: his arms
  - type: note
    content: Hebrew the arms of his hands
  - type: text
    content: ' were made agile'
  - type: text
    content: 'by the hands of the '
  - type: note
    content: Ps. 132:2, 5; Isa. 1:24
  - type: text
    content: Mighty One of Jacob
  - type: text
    content: '(from there is '
  - type: note
    content: Ps. 23:1; 80:1
  - type: text
    content: the Shepherd,
  - type: note
    content: Or by the name of the Shepherd
  - type: text
    content: ' '
  - type: note
    content: Isa. 28:16; Eph. 2:20; 1 Pet. 2:4; [Deut. 32:4]
  - type: text
    content: the Stone of Israel),
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:3; 50:17
  - type: text
    content: by the God of your father who will help you,
  - type: text
    content: 'by '
  - type: note
    content: ch. 17:1; 35:11
  - type: text
    content: the Almighty
  - type: note
    content: Hebrew Shaddai
  - type: text
    content: ' '
  - type: note
    content: Deut. 33:13
  - type: text
    content: who will bless you
  - type: text
    content: with blessings of heaven above,
  - type: text
    content: blessings of the deep that crouches beneath,
  - type: text
    content: blessings of the breasts and of the womb.
  '26':
  - type: text
    content: The blessings of your father
  - type: text
    content: are mighty beyond the blessings of my parents,
  - type: text
    content: 'up to the bounties '
  - type: note
    content: Deut. 33:15; Hab. 3:6
  - type: text
    content: of the everlasting hills.
  - type: note
    content: A slight emendation yields (compare Septuagint) the blessings of the eternal mountains, the bounties of the everlasting hills
  - type: text
    content: 'May they be '
  - type: note
    content: Deut. 33:16
  - type: text
    content: on the head of Joseph,
  - type: text
    content: and on the brow of him who was set apart from his brothers.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ Judg. 20:21, 25; Ezek. 22:27 ]'
  - type: text
    content: “Benjamin is a ravenous wolf,
  - type: text
    content: in the morning devouring the prey
  - type: text
    content: 'and at evening '
  - type: note
    content: Zech. 14:1; [Ezek. 39:10]
  - type: text
    content: dividing the spoil.”
  - type: heading
    content: Jacob’s Death and Burial
  '28':
  - type: text
    content: 'All these are the twelve tribes of Israel. This is what their father said to them as he blessed them, blessing each with the blessing suitable to him. '
  '29':
  - type: text
    content: 'Then he commanded them and said to them, “I am to be '
  - type: note
    content: ver. 33; ch. 25:8
  - type: text
    content: 'gathered to my people; '
  - type: note
    content: ch. 47:30
  - type: text
    content: 'bury me with my fathers '
  - type: note
    content: ch. 50:13; [ch. 23:9]
  - type: text
    content: 'in the cave that is in the field of Ephron the Hittite, '
  '3':
  - type: text
    content: '“Reuben, you are '
  - type: note
    content: ch. 29:32
  - type: text
    content: my firstborn,
  - type: text
    content: 'my might, and the '
  - type: note
    content: Deut. 21:17
  - type: text
    content: firstfruits of my strength,
  - type: text
    content: preeminent in dignity and preeminent in power.
  '30':
  - type: text
    content: 'in the cave that is in the field at Machpelah, to the east of Mamre, in the land of Canaan, '
  - type: note
    content: See ch. 23:16-18
  - type: text
    content: 'which Abraham bought with the field from Ephron the Hittite to possess as a burying place. '
  '31':
  - type: note
    content: ch. 23:19; 25:9
  - type: text
    content: 'There they buried Abraham and Sarah his wife. There '
  - type: note
    content: ch. 35:29
  - type: text
    content: 'they buried Isaac and Rebekah his wife, and there I buried Leah— '
  '32':
  - type: text
    content: 'the field and the cave that is in it were bought from the Hittites.” '
  '33':
  - type: text
    content: 'When Jacob finished commanding his sons, he drew up his feet into the bed and breathed his last and '
  - type: note
    content: ver. 29
  - type: text
    content: was gathered to his people.
  '4':
  - type: text
    content: Unstable as water, you shall not have preeminence,
  - type: text
    content: 'because you '
  - type: note
    content: ch. 35:22; 1 Chr. 5:1
  - type: text
    content: went up to your father’s bed;
  - type: text
    content: then you defiled it—he went up to my couch!
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 29:33, 34
  - type: text
    content: “Simeon and Levi are brothers;
  - type: text
    content: 'weapons '
  - type: note
    content: ch. 34:25, 26
  - type: text
    content: of violence are their swords.
  '6':
  - type: text
    content: Let my soul come not into their council;
  - type: note
    content: '[ Ps. 16:9; 57:8 ]'
  - type: text
    content: 'O my glory, '
  - type: note
    content: '[Ps. 26:9]'
  - type: text
    content: be not joined to their company.
  - type: text
    content: For in their anger they killed men,
  - type: text
    content: 'and in their willfulness they '
  - type: note
    content: Josh. 11:6, 9; 2 Sam. 8:4
  - type: text
    content: hamstrung oxen.
  '7':
  - type: text
    content: Cursed be their anger, for it is fierce,
  - type: text
    content: and their wrath, for it is cruel!
  - type: text
    content: 'I will '
  - type: note
    content: See Num. 3:5-13; Josh. 19:1-9; 1 Chr. 4:24-39
  - type: text
    content: divide them in Jacob
  - type: text
    content: and scatter them in Israel.
  '8':
  - type: text
    content: '“Judah, '
  - type: note
    content: ch. 29:35; [ch. 27:29]
  - type: text
    content: your brothers shall praise you;
  - type: note
    content: '[ Job 16:12 ]'
  - type: text
    content: your hand shall be on the neck of your enemies;
  - type: note
    content: 1 Chr. 5:2
  - type: text
    content: your father’s sons shall bow down before you.
  '9':
  - type: text
    content: 'Judah is '
  - type: note
    content: Rev. 5:5; [Deut. 33:22; Hos. 5:14]
  - type: text
    content: a lion’s cub;
  - type: text
    content: from the prey, my son, you have gone up.
  - type: note
    content: '[ Num. 23:24; 24:9 ]'
  - type: text
    content: He stooped down; he crouched as a lion
  - type: text
    content: and as a lioness; who dares rouse him?
