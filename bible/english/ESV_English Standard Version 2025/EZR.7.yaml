document_id: EZR.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Sent to Teach the People
  - type: text
    content: 'Now after this, '
  - type: note
    content: Neh. 2:1
  - type: text
    content: 'in the reign of '
  - type: note
    content: Neh. 2:1
  - type: text
    content: 'Artaxerxes king of Persia, '
  - type: note
    content: For ver. 1-5, see 1 Chr. 6:4-14
  - type: text
    content: 'Ezra the son of Seraiah, son of Azariah, son of Hilkiah, '
  '10':
  - type: text
    content: 'For Ezra had set his heart to study the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', and to do it '
  - type: note
    content: ver. 25; [Deut. 33:10]
  - type: text
    content: 'and to '
  - type: note
    content: '[2 Chr. 17:7; Mal. 2:7; Matt. 23:2, 3]; See Neh. 8:1-8'
  - type: text
    content: teach his statutes and rules in Israel.
  '11':
  - type: text
    content: 'This is a copy of the letter that King Artaxerxes gave to Ezra the priest, the scribe, a man learned in matters of the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' and his statutes for Israel:'
  - type: note
    content: The text of Ezra 7:12–26 is in Aramaic
  - type: text
    content: ' '
  '12':
  - type: text
    content: '“Artaxerxes, '
  - type: note
    content: Ezek. 26:7; Dan. 2:37
  - type: text
    content: 'king of kings, to Ezra the priest, the '
  - type: note
    content: See ver. 6
  - type: text
    content: scribe of the Law of the God of heaven. Peace.
  - type: note
    content: Aramaic Perfect (probably a greeting)
  - type: text
    content: ' '
  - type: note
    content: ch. 4:11, 17
  - type: text
    content: 'And now '
  '13':
  - type: note
    content: ch. 6:8
  - type: text
    content: 'I make a decree that anyone of the people of Israel or their priests or Levites in my kingdom, who freely offers to go to Jerusalem, may go with you. '
  '14':
  - type: text
    content: 'For you are sent by the king '
  - type: note
    content: ver. 15, 28; ch. 8:25; [Esth. 1:14]
  - type: text
    content: 'and his seven counselors to make inquiries about Judah and Jerusalem according to the Law of your God, which is in your hand, '
  '15':
  - type: text
    content: 'and also to carry the silver and gold that the king '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'and his counselors have freely offered to the God of Israel, '
  - type: note
    content: 2 Chr. 6:2; [Ps. 135:21]
  - type: text
    content: 'whose dwelling is in Jerusalem, '
  '16':
  - type: note
    content: ch. 8:25
  - type: text
    content: 'with all the silver and gold that you shall find in the whole province of Babylonia, and '
  - type: note
    content: 1 Chr. 29:6, 9
  - type: text
    content: 'with the freewill offerings of the people and the priests, vowed willingly for the house of their God that is in Jerusalem. '
  '17':
  - type: text
    content: 'With this money, then, you shall with all diligence buy bulls, rams, and lambs, with their grain offerings and their drink offerings, and '
  - type: note
    content: Deut. 12:5, 11
  - type: text
    content: 'you shall offer them on the altar of the house of your God that is in Jerusalem. '
  '18':
  - type: text
    content: 'Whatever seems good to you and your brothers to do with the rest of the silver and gold, you may do, according to the will of your God. '
  '19':
  - type: text
    content: 'The vessels that have been given you for the service of the house of your God, you shall deliver before the God of Jerusalem. '
  '2':
  - type: text
    content: 'son of Shallum, son of Zadok, son of Ahitub, '
  '20':
  - type: text
    content: And whatever else is required for the house of your God, which it falls to you to provide, you may provide it out of the king’s treasury.
  '21':
  - type: text
    content: '“And I, Artaxerxes the king, make a decree to all the treasurers in the province Beyond the River: Whatever Ezra the priest, the scribe of the Law of the God of heaven, requires of you, let it be done with all diligence, '
  '22':
  - type: text
    content: up to 100 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver, 100 cors'
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' of wheat, 100 baths'
  - type: note
    content: A bath was about 6 gallons or 22 liters
  - type: text
    content: ' of wine, 100 baths of oil, and salt without prescribing how much. '
  '23':
  - type: text
    content: 'Whatever is decreed by the God of heaven, let it be done in full for the house of the God of heaven, lest his wrath be against the realm of the king and his sons. '
  '24':
  - type: text
    content: 'We also notify you that it shall not be lawful to impose '
  - type: note
    content: ch. 4:13, 20
  - type: text
    content: tribute, custom, or toll on anyone of the priests, the Levites, the singers, the doorkeepers, the temple servants, or other servants of this house of God.
  '25':
  - type: text
    content: '“And you, Ezra, according to the wisdom of your God that is in your hand, '
  - type: note
    content: Ex. 18:21, 22; Deut. 16:18
  - type: text
    content: 'appoint magistrates and judges who may judge all the people in the province Beyond the River, all such as know the laws of your God. '
  - type: note
    content: See ver. 10
  - type: text
    content: 'And those who do not know them, you shall teach. '
  '26':
  - type: text
    content: Whoever will not obey the law of your God and the law of the king, let judgment be strictly executed on him, whether for death or for banishment or for confiscation of his goods or for imprisonment.”
  '27':
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 29:10
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our fathers, '
  - type: note
    content: ch. 6:22
  - type: text
    content: 'who put such a thing as this into the heart of the king, to beautify the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' that is in Jerusalem, '
  '28':
  - type: note
    content: ch. 9:9
  - type: text
    content: 'and who extended to me his steadfast love before the king and his counselors, and before all the king’s mighty officers. I took courage, for the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God was on me, and I gathered leading men from Israel to go up with me.'
  '3':
  - type: text
    content: 'son of Amariah, son of Azariah, son of Meraioth, '
  '4':
  - type: text
    content: 'son of Zerahiah, son of Uzzi, son of Bukki, '
  '5':
  - type: text
    content: 'son of Abishua, son of Phinehas, son of Eleazar, son of Aaron the chief priest— '
  '6':
  - type: text
    content: 'this Ezra went up from Babylonia. He was a scribe '
  - type: note
    content: ver. 11, 12, 21; Neh. 8:1-3, 13; 12:26, 36
  - type: text
    content: 'skilled in the Law of Moses that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, had given, and the king granted him all that he asked, '
  - type: note
    content: ver. 9, 28; ch. 8:18, 22, 31; Neh. 2:8, 18; [ch. 5:5]
  - type: text
    content: 'for the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was on him.'
  '7':
  - type: text
    content: 'And there went up also to Jerusalem, in the seventh year of Artaxerxes the king, some of the people of Israel, and '
  - type: note
    content: See ch. 8:1-14
  - type: text
    content: 'some of the priests and '
  - type: note
    content: ch. 8:15-19
  - type: text
    content: 'Levites, the singers and gatekeepers, and the temple '
  - type: note
    content: ch. 8:17, 20; [ch. 2:43]
  - type: text
    content: 'servants. '
  '8':
  - type: text
    content: And Ezra
  - type: note
    content: Hebrew he
  - type: text
    content: ' came to Jerusalem in the fifth month, which was in the seventh year of the king. '
  '9':
  - type: text
    content: 'For on the first day of the first month he began to go up from Babylonia, and on the first day of the fifth month he came to Jerusalem, '
  - type: note
    content: See ver. 6
  - type: text
    content: 'for the good hand of his God was on him. '
