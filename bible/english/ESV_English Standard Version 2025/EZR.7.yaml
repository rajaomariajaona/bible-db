document_id: EZR.7,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezra Sent to Teach the People
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now after this, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'in the reign of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'Artaxerxes king of Persia, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-5, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:4-14
      marker-yv: yv-n
    - type: text
      text: 'Ezra the son of Seraiah, son of Azariah, son of Hilkiah, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Ezra had set his heart to study the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and to do it '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 33:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 17:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 23:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Neh. 8:1-8'
      marker-yv: yv-n
    - type: text
      text: teach his statutes and rules in Israel.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is a copy of the letter that King Artaxerxes gave to Ezra the priest, the scribe, a man learned in matters of the commandments of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his statutes for Israel:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text of Ezra 7:12–26 is in Aramaic
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Artaxerxes, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 26:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 2:37
      marker-yv: yv-n
    - type: text
      text: 'king of kings, to Ezra the priest, the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: scribe of the Law of the God of heaven. Peace.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Perfect '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (probably a greeting)
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: 'And now '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:8
      marker-yv: yv-n
    - type: text
      text: 'I make a decree that anyone of the people of Israel or their priests or Levites in my kingdom, who freely offers to go to Jerusalem, may go with you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are sent by the king '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15, 28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:25
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esth. 1:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and his seven counselors to make inquiries about Judah and Jerusalem according to the Law of your God, which is in your hand, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also to carry the silver and gold that the king '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'and his counselors have freely offered to the God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 6:2
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 135:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'whose dwelling is in Jerusalem, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:25
      marker-yv: yv-n
    - type: text
      text: 'with all the silver and gold that you shall find in the whole province of Babylonia, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 29:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'with the freewill offerings of the people and the priests, vowed willingly for the house of their God that is in Jerusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With this money, then, you shall with all diligence buy bulls, rams, and lambs, with their grain offerings and their drink offerings, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 12:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: 'you shall offer them on the altar of the house of your God that is in Jerusalem. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever seems good to you and your brothers to do with the rest of the silver and gold, you may do, according to the will of your God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The vessels that have been given you for the service of the house of your God, you shall deliver before the God of Jerusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son of Shallum, son of Zadok, son of Ahitub, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And whatever else is required for the house of your God, which it falls to you to provide, you may provide it out of the king’s treasury.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And I, Artaxerxes the king, make a decree to all the treasurers in the province Beyond the River: Whatever Ezra the priest, the scribe of the Law of the God of heaven, requires of you, let it be done with all diligence, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: up to 100 talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 75 pounds or 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver, 100 cors'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 6 bushels or 220 liters
      marker-yv: yv-n
    - type: text
      text: ' of wheat, 100 baths'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 6 gallons or 22 liters
      marker-yv: yv-n
    - type: text
      text: ' of wine, 100 baths of oil, and salt without prescribing how much. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever is decreed by the God of heaven, let it be done in full for the house of the God of heaven, lest his wrath be against the realm of the king and his sons. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We also notify you that it shall not be lawful to impose '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      marker-yv: yv-n
    - type: text
      text: tribute, custom, or toll on anyone of the priests, the Levites, the singers, the doorkeepers, the temple servants, or other servants of this house of God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you, Ezra, according to the wisdom of your God that is in your hand, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 18:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 16:18
      marker-yv: yv-n
    - type: text
      text: 'appoint magistrates and judges who may judge all the people in the province Beyond the River, all such as know the laws of your God. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'And those who do not know them, you shall teach. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever will not obey the law of your God and the law of the king, let judgment be strictly executed on him, whether for death or for banishment or for confiscation of his goods or for imprisonment.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 29:10
      marker-yv: yv-n
    - type: text
      text: 'Blessed be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of our fathers, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:22
      marker-yv: yv-n
    - type: text
      text: 'who put such a thing as this into the heart of the king, to beautify the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that is in Jerusalem, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:9
      marker-yv: yv-n
    - type: text
      text: 'and who extended to me his steadfast love before the king and his counselors, and before all the king’s mighty officers. I took courage, for the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God was on me, and I gathered leading men from Israel to go up with me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son of Amariah, son of Azariah, son of Meraioth, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son of Zerahiah, son of Uzzi, son of Bukki, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son of Abishua, son of Phinehas, son of Eleazar, son of Aaron the chief priest— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'this Ezra went up from Babylonia. He was a scribe '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11, 12, 21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 8:1-3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      marker-yv: yv-n
    - type: text
      text: 'skilled in the Law of Moses that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, had given, and the king granted him all that he asked, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9, 28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God was on him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there went up also to Jerusalem, in the seventh year of Artaxerxes the king, some of the people of Israel, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1-14
      marker-yv: yv-n
    - type: text
      text: 'some of the priests and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:15-19
      marker-yv: yv-n
    - type: text
      text: 'Levites, the singers and gatekeepers, and the temple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:43
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'servants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Ezra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' came to Jerusalem in the fifth month, which was in the seventh year of the king. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For on the first day of the first month he began to go up from Babylonia, and on the first day of the fifth month he came to Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
