document_id: 1SA.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'And the men of Kiriath-jearim came and took up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and brought it to the house of '
  - type: note
    content: 2 Sam. 6:3
  - type: text
    content: 'Abinadab on the hill. And they consecrated his son Eleazar to have charge of the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'As Samuel was offering up the burnt offering, the Philistines drew near to attack Israel. '
  - type: note
    content: ch. 2:10; [2 Sam. 22:14, 15; Ps. 18:13]
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' thundered with a mighty sound that day against the Philistines and threw them into confusion, and they were defeated before Israel. '
  '11':
  - type: text
    content: And the men of Israel went out from Mizpah and pursued the Philistines and struck them, as far as below Beth-car.
  '12':
  - type: text
    content: 'Then Samuel '
  - type: note
    content: Gen. 28:18; 31:45; 35:14; Josh. 4:9; 24:26
  - type: text
    content: took a stone and set it up between Mizpah and Shen
  - type: note
    content: Hebrew; Septuagint, Syriac Jeshanah
  - type: text
    content: ' and called its name Ebenezer;'
  - type: note
    content: Ebenezer means stone of help
  - type: text
    content: ' for he said, “Till now the '
  - type: text
    content: Lord
  - type: text
    content: ' has helped us.” '
  '13':
  - type: note
    content: '[Judg. 13:1]'
  - type: text
    content: 'So the Philistines were subdued and did not again enter the territory of Israel. And the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against the Philistines all the days of Samuel. '
  '14':
  - type: text
    content: The cities that the Philistines had taken from Israel were restored to Israel, from Ekron to Gath, and Israel delivered their territory from the hand of the Philistines. There was peace also between Israel and the Amorites.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ver. 6 ; ch. 12:11; [Judg. 2:16]
  - type: text
    content: 'Samuel judged Israel all the days of his life. '
  '16':
  - type: text
    content: 'And he went on a circuit year by year to Bethel, Gilgal, and Mizpah. And he judged Israel in all these places. '
  '17':
  - type: text
    content: 'Then he would return to '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'Ramah, for his home was there, and there also he judged Israel. '
  - type: note
    content: '[ch. 14:35; Judg. 21:4]'
  - type: text
    content: 'And he built there an altar to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'From the day that the ark was lodged at Kiriath-jearim, a long time passed, some twenty years, and all the house of Israel lamented after the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Samuel Judges Israel
  '3':
  - type: text
    content: 'And Samuel said to all the house of Israel, '
  - type: note
    content: 1 Kgs. 8:48; Isa. 55:7; Hos. 6:1; Joel 2:12; See Deut. 30:2-10
  - type: text
    content: '“If you are returning to the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart, then '
  - type: note
    content: Gen. 35:2; Josh. 24:14, 23; [Judg. 10:16]
  - type: text
    content: 'put away the foreign gods and the '
  - type: note
    content: Judg. 2:13
  - type: text
    content: 'Ashtaroth from among you and '
  - type: note
    content: '[2 Chr. 19:3; 30:19; Ezra 7:10]'
  - type: text
    content: 'direct your heart to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Deut. 6:13; 10:20; 13:4; Cited Matt. 4:10; Luke 4:8
  - type: text
    content: 'and serve him only, and he will deliver you out of the hand of the Philistines.” '
  '4':
  - type: text
    content: 'So the people of Israel put away the Baals and the Ashtaroth, and they served the '
  - type: text
    content: Lord
  - type: text
    content: ' only.'
  '5':
  - type: text
    content: 'Then Samuel said, “Gather all Israel at '
  - type: note
    content: '[Judg. 20:1]'
  - type: text
    content: 'Mizpah, and I will pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' for you.” '
  '6':
  - type: text
    content: 'So they gathered at '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Mizpah '
  - type: note
    content: '[2 Sam. 14:14]'
  - type: text
    content: 'and drew water and poured it out before the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 31:13; Neh. 9:1
  - type: text
    content: 'and fasted on that day and said there, '
  - type: note
    content: Judg. 10:10
  - type: text
    content: '“We have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: '.” And Samuel judged the people of Israel at Mizpah. '
  '7':
  - type: text
    content: 'Now when the Philistines heard that the people of Israel had gathered at Mizpah, the lords of the Philistines went up against Israel. And when the people of Israel heard of it, they were afraid of the Philistines. '
  '8':
  - type: text
    content: 'And the people of Israel said to Samuel, “Do not cease to cry out to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for us, that he may save us from the hand of the Philistines.” '
  '9':
  - type: text
    content: 'So Samuel took a nursing lamb and offered it as a whole burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. And '
  - type: note
    content: Ps. 99:6; Jer. 15:1
  - type: text
    content: 'Samuel cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for Israel, and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him. '
