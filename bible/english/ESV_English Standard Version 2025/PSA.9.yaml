  '1':
  - type: heading
    content: I Will Recount Your Wonderful Deeds
  - type: note
    content: Psalms 9 and 10 together follow an acrostic pattern, each stanza beginning with the successive letters of the Hebrew alphabet. In the Septuagint they form one psalm
  - type: text
    content: 'To the choirmaster: according to Muth-labben.'
  - type: note
    content: Probably a musical or liturgical term
  - type: text
    content: ' A Psalm of David.'
  - type: text
    content: 'I will give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' with my whole heart;'
  - type: text
    content: 'I will recount all of your '
  - type: note
    content: Ps. 26:7; 40:5; 96:3; 105:5
  - type: text
    content: wonderful deeds.
