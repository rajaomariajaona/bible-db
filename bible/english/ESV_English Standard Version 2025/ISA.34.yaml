document_id: ISA.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on the Nations
  - type: text
    content: 'Draw near, '
  - type: note
    content: Ps. 49:1; [Joel 3:1, 2]
  - type: text
    content: O nations, to hear,
  - type: text
    content: and give attention, O peoples!
  - type: text
    content: Let the earth hear, and all that fills it;
  - type: text
    content: the world, and all that comes from it.
  '10':
  - type: text
    content: 'Night and day '
  - type: note
    content: ch. 66:24
  - type: text
    content: it shall not be quenched;
  - type: note
    content: '[ Rev. 14:11; 18:18; 19:3 ]'
  - type: text
    content: its smoke shall go up forever.
  - type: note
    content: Mal. 1:4
  - type: text
    content: From generation to generation it shall lie waste;
  - type: text
    content: none shall pass through it forever and ever.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:23; Zeph. 2:14; [ Rev. 18:2 ]
  - type: text
    content: But the hawk and the porcupine
  - type: note
    content: The identity of the animals rendered hawk and porcupine is uncertain
  - type: text
    content: ' shall possess it,'
  - type: text
    content: the owl and the raven shall dwell in it.
  - type: note
    content: 2 Kgs. 21:13; Lam. 2:8; See Amos 7:7-9
  - type: text
    content: 'He shall stretch the line of '
  - type: note
    content: '[ch. 24:10]'
  - type: text
    content: confusion
  - type: note
    content: Hebrew formlessness
  - type: text
    content: ' over it,'
  - type: text
    content: and the plumb line of emptiness.
  '12':
  - type: text
    content: Its nobles—there is no one there to call it a kingdom,
  - type: text
    content: and all its princes shall be nothing.
  '13':
  - type: text
    content: ' '
  - type: note
    content: See ch. 32:13
  - type: text
    content: Thorns shall grow over its strongholds,
  - type: text
    content: nettles and thistles in its fortresses.
  - type: text
    content: 'It shall be the haunt of '
  - type: note
    content: ch. 13:22; Ps. 44:19; Mal. 1:3
  - type: text
    content: jackals,
  - type: text
    content: an abode for ostriches.
  - type: note
    content: Or owls
  '14':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:21
  - type: text
    content: And wild animals shall meet with hyenas;
  - type: text
    content: the wild goat shall cry to his fellow;
  - type: text
    content: indeed, there the night bird
  - type: note
    content: Identity uncertain
  - type: text
    content: ' settles'
  - type: text
    content: and finds for herself a resting place.
  '15':
  - type: text
    content: There the owl nests and lays
  - type: text
    content: and hatches and gathers her young in her shadow;
  - type: text
    content: 'indeed, there '
  - type: note
    content: Deut. 14:13
  - type: text
    content: the hawks are gathered,
  - type: text
    content: each one with her mate.
  '16':
  - type: text
    content: 'Seek and read from the book of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: Not one of these shall be missing;
  - type: text
    content: none shall be without her mate.
  - type: text
    content: 'For the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded,'
  - type: text
    content: and his Spirit has gathered them.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 78:55 ]'
  - type: text
    content: He has cast the lot for them;
  - type: text
    content: his hand has portioned it out to them with the line;
  - type: text
    content: they shall possess it forever;
  - type: text
    content: from generation to generation they shall dwell in it.
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is enraged against all the nations,'
  - type: text
    content: and furious against all their host;
  - type: text
    content: 'he has '
  - type: note
    content: '[Josh. 6:21]'
  - type: text
    content: devoted them to destruction,
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction); also verse 5
  - type: text
    content: ' has given them over for slaughter.'
  '3':
  - type: text
    content: Their slain shall be cast out,
  - type: text
    content: 'and '
  - type: note
    content: Joel 2:20
  - type: text
    content: the stench of their corpses shall rise;
  - type: note
    content: '[ Ezek. 39:4 ]'
  - type: text
    content: the mountains shall flow with their blood.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Joel 2:31; 3:15; Matt. 24:29; Acts 2:20; Rev. 6:13, 14; [ Ps. 102:26; Heb. 1:11 ]
  - type: text
    content: All the host of heaven shall rot away,
  - type: text
    content: and the skies roll up like a scroll.
  - type: text
    content: All their host shall fall,
  - type: text
    content: as leaves fall from the vine,
  - type: text
    content: like leaves falling from the fig tree.
  '5':
  - type: text
    content: For my sword has drunk its fill in the heavens;
  - type: text
    content: 'behold, it descends for judgment upon '
  - type: note
    content: See ch. 63:1-6; Jer. 49:7-22; Obad. 1-21; Mal. 1:2-4
  - type: text
    content: Edom,
  - type: text
    content: 'upon the people '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: I have devoted to destruction.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has a sword; it is sated with blood;'
  - type: text
    content: it is gorged with fat,
  - type: text
    content: with the blood of lambs and goats,
  - type: text
    content: with the fat of the kidneys of rams.
  - type: note
    content: ch. 63:1
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has a sacrifice in Bozrah,'
  - type: text
    content: a great slaughter in the land of Edom.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Num. 23:22
  - type: text
    content: 'Wild oxen shall '
  - type: note
    content: ch. 47:1
  - type: text
    content: fall with them,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 22:12
  - type: text
    content: 'young steers with '
  - type: note
    content: Ps. 22:12
  - type: text
    content: the mighty bulls.
  - type: text
    content: Their land shall drink its fill of blood,
  - type: text
    content: and their soil shall be gorged with fat.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 61:2; 63:4; Ps. 137:7
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has a day of vengeance,'
  - type: text
    content: a year of recompense for the cause of Zion.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Deut. 29:23
  - type: text
    content: And the streams of Edom
  - type: note
    content: Hebrew her streams
  - type: text
    content: ' shall be turned into pitch,'
  - type: text
    content: and her soil into sulfur;
  - type: text
    content: her land shall become burning pitch.
