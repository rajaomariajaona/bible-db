document_id: 1KI.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Naboth’s Vineyard
  - type: text
    content: 'Now Naboth the Jezreelite had a vineyard in '
  - type: note
    content: ch. 18:45, 46
  - type: text
    content: 'Jezreel, beside the palace of Ahab king of Samaria. '
  '10':
  - type: text
    content: 'And set two '
  - type: note
    content: See Deut. 13:13
  - type: text
    content: 'worthless men opposite him, and let them bring a charge against him, saying, '
  - type: note
    content: Ex. 22:28; Lev. 24:16; [Acts 6:11; 23:5]
  - type: text
    content: ‘You have cursed
  - type: note
    content: Hebrew blessed; also verse 13
  - type: text
    content: ' God and the king.’ Then take him out and stone him to death.” '
  '11':
  - type: text
    content: 'And the men of his city, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the elders and the leaders who lived in his city, did as Jezebel had sent word to them. As it was written in the letters that she had sent to them, '
  '12':
  - type: note
    content: '[Isa. 58:4]'
  - type: text
    content: 'they proclaimed a fast and set Naboth at the head of the people. '
  '13':
  - type: text
    content: 'And the two worthless men came in and sat opposite him. And the worthless men brought a charge against Naboth in the presence of the people, saying, “Naboth cursed God and the king.” So they took him outside the city and stoned him to death with stones. '
  '14':
  - type: text
    content: Then they sent to Jezebel, saying, “Naboth has been stoned; he is dead.”
  '15':
  - type: text
    content: 'As soon as Jezebel heard that Naboth had been stoned and was dead, Jezebel said to Ahab, “Arise, take possession of the vineyard of Naboth the Jezreelite, which he refused to give you for money, for Naboth is not alive, but dead.” '
  '16':
  - type: text
    content: And as soon as Ahab heard that Naboth was dead, Ahab arose to go down to the vineyard of Naboth the Jezreelite, to take possession of it.
  - type: heading
    content: The Lord Condemns Ahab
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 9:12 ]'
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '18':
  - type: text
    content: '“Arise, go down to meet Ahab king of Israel, who is in '
  - type: note
    content: ch. 16:24
  - type: text
    content: 'Samaria; behold, he is in the vineyard of Naboth, where he has gone to take possession. '
  '19':
  - type: text
    content: 'And you shall say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', “Have you killed and also taken possession?”’ And you shall say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 22:38; 2 Kgs. 9:26
  - type: text
    content: “In the place where dogs licked up the blood of Naboth shall dogs lick your own blood.”’”
  '2':
  - type: text
    content: 'And after this Ahab said to Naboth, '
  - type: note
    content: '[1 Sam. 8:14]'
  - type: text
    content: '“Give me your vineyard, that I may have it for a vegetable garden, because it is near my house, and I will give you a better vineyard for it; or, if it seems good to you, I will give you its value in money.” '
  '20':
  - type: text
    content: 'Ahab said to Elijah, '
  - type: note
    content: '[ch. 18:17]'
  - type: text
    content: '“Have you found me, O my enemy?” He answered, “I have found you, because '
  - type: note
    content: ver. 25; 2 Kgs. 17:17; Rom. 7:14
  - type: text
    content: 'you have sold yourself to do what is evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Behold, I will bring disaster upon you. I will utterly burn you up, and '
  - type: note
    content: 2 Kgs. 9:8; [ch. 14:10]
  - type: text
    content: 'will cut off from Ahab every male, bond or free, in Israel. '
  '22':
  - type: text
    content: 'And I will make your house like '
  - type: note
    content: ch. 15:29
  - type: text
    content: 'the house of Jeroboam the son of Nebat, and like '
  - type: note
    content: ch. 16:3, 11
  - type: text
    content: 'the house of Baasha the son of Ahijah, for the anger to which you have provoked me, and because you '
  - type: note
    content: ch. 14:16
  - type: text
    content: 'have made Israel to sin. '
  '23':
  - type: text
    content: 'And of Jezebel the '
  - type: text
    content: Lord
  - type: text
    content: ' also said, '
  - type: note
    content: 2 Kgs. 9:36
  - type: text
    content: '‘The dogs shall eat Jezebel within '
  - type: note
    content: '[2 Sam. 20:15]'
  - type: text
    content: 'the walls of Jezreel.’ '
  '24':
  - type: note
    content: '[ch. 14:11; 16:4]'
  - type: text
    content: Anyone belonging to Ahab who dies in the city the dogs shall eat, and anyone of his who dies in the open country the birds of the heavens shall eat.”
  - type: heading
    content: Ahab’s Repentance
  '25':
  - type: text
    content: (
  - type: note
    content: See ch. 16:30-33
  - type: text
    content: 'There was none who sold himself to do what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' like Ahab, whom Jezebel his wife incited. '
  '26':
  - type: text
    content: 'He acted very abominably in going after '
  - type: note
    content: '[ch. 15:12; 2 Kgs. 17:12; 21:11]'
  - type: text
    content: 'idols, as '
  - type: note
    content: Gen. 15:16
  - type: text
    content: 'the Amorites had done, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' cast out before the people of Israel.)'
  '27':
  - type: text
    content: 'And when Ahab heard those words, he '
  - type: note
    content: 2 Kgs. 6:30
  - type: text
    content: 'tore his clothes and '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: 'put sackcloth on his flesh and '
  - type: note
    content: 2 Sam. 12:16
  - type: text
    content: 'fasted and lay in sackcloth and went about dejectedly. '
  '28':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: text
    content: '“Have you seen how Ahab has humbled himself before me? Because he has humbled himself before me, I will not bring the disaster in his days; '
  - type: note
    content: 2 Kgs. 9:25
  - type: text
    content: but in his son’s days I will bring the disaster upon his house.”
  '3':
  - type: text
    content: 'But Naboth said to Ahab, “The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid '
  - type: note
    content: Lev. 25:23; Num. 36:7; Ezek. 46:18
  - type: text
    content: 'that I should give you the inheritance of my fathers.” '
  '4':
  - type: text
    content: 'And Ahab '
  - type: note
    content: ch. 20:43
  - type: text
    content: went into his house vexed and sullen because of what Naboth the Jezreelite had said to him, for he had said, “I will not give you the inheritance of my fathers.” And he lay down on his bed and turned away his face and would eat no food.
  '5':
  - type: text
    content: 'But Jezebel his wife came to him and said to him, “Why is your spirit so vexed that you eat no food?” '
  '6':
  - type: text
    content: 'And he said to her, “Because I spoke to Naboth the Jezreelite and said to him, ‘Give me your vineyard for money, or else, if it please you, I will give you another vineyard for it.’ And he answered, ‘I will not give you my vineyard.’” '
  '7':
  - type: text
    content: And Jezebel his wife said to him, “Do you now govern Israel? Arise and eat bread and let your heart be cheerful; I will give you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Esth. 3:12 ]'
  - type: text
    content: 'So she wrote letters in Ahab’s name and sealed them with his seal, and she sent the letters to '
  - type: note
    content: ch. 20:7; Ruth 4:2
  - type: text
    content: 'the elders and the leaders who lived with Naboth in his city. '
  '9':
  - type: text
    content: 'And she wrote in the letters, “Proclaim a fast, and set Naboth at the head of the people. '
