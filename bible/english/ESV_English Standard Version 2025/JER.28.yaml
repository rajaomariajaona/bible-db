document_id: JER.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hananiah the False Prophet
  - type: text
    content: 'In that same year, at the beginning of the reign of '
  - type: note
    content: ch. 27:12
  - type: text
    content: 'Zedekiah king of Judah, in the fifth month of the fourth year, Hananiah the son of '
  - type: note
    content: Ezek. 11:1
  - type: text
    content: 'Azzur, the prophet from '
  - type: note
    content: Josh. 9:3; 21:17
  - type: text
    content: 'Gibeon, spoke to me in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', in the presence of the priests and all the people, saying, '
  '10':
  - type: text
    content: 'Then the prophet Hananiah took the '
  - type: note
    content: ch. 27:2
  - type: text
    content: 'yoke-bars from the neck of Jeremiah the prophet and broke them. '
  '11':
  - type: text
    content: 'And Hananiah spoke in the presence of all the people, saying, '
  - type: note
    content: '[1 Kgs. 22:11]'
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'Even so will I break the yoke of Nebuchadnezzar king of Babylon from the neck of '
  - type: note
    content: ch. 27:7
  - type: text
    content: all the nations within two years.” But Jeremiah the prophet went his way.
  '12':
  - type: text
    content: 'Sometime after the prophet '
  - type: note
    content: ver. 1, 10
  - type: text
    content: 'Hananiah had broken the yoke-bars from off the neck of Jeremiah the prophet, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '13':
  - type: text
    content: '“Go, tell Hananiah, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': You have broken wooden bars, but you have made in their place bars of iron. '
  '14':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: I have put upon the neck of all these nations '
  - type: note
    content: Deut. 28:48
  - type: text
    content: 'an iron yoke to serve Nebuchadnezzar king of Babylon, '
  - type: note
    content: '[ch. 25:11]'
  - type: text
    content: 'and they shall serve him, '
  - type: note
    content: See ch. 27:6
  - type: text
    content: 'for I have given to him even the beasts of the field.’” '
  '15':
  - type: text
    content: 'And Jeremiah the prophet said to the prophet Hananiah, “Listen, Hananiah, '
  - type: note
    content: ch. 29:31; Deut. 18:20; [Ezek. 13:22, 23]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent you, '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'and you have made this people trust in a lie. '
  '16':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': ‘Behold, I will remove you from the face of the earth. This year you shall die, '
  - type: note
    content: ch. 29:32; Deut. 13:5
  - type: text
    content: 'because you have uttered rebellion against the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '17':
  - type: text
    content: In that same year, in the seventh month, the prophet Hananiah died.
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: '[ch. 27:2, 11, 12]'
  - type: text
    content: 'I have broken the yoke of the king of Babylon. '
  '3':
  - type: note
    content: ch. 27:16
  - type: text
    content: 'Within '
  - type: note
    content: ver. 11
  - type: text
    content: 'two years I will bring back to this place all the vessels of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house, which Nebuchadnezzar king of Babylon took away from this place and carried to Babylon. '
  '4':
  - type: text
    content: 'I will also bring back to this place '
  - type: note
    content: '[ch. 22:10, 12, 26]'
  - type: text
    content: 'Jeconiah the son of Jehoiakim, king of Judah, and all the exiles from Judah who went to Babylon, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: for I will break the yoke of the king of Babylon.”
  '5':
  - type: text
    content: 'Then the prophet Jeremiah spoke to Hananiah the prophet in the presence of the priests and all the people who were standing in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'and the prophet Jeremiah said, '
  - type: note
    content: 1 Kgs. 1:36
  - type: text
    content: '“Amen! May the '
  - type: text
    content: Lord
  - type: text
    content: ' do so; may the '
  - type: text
    content: Lord
  - type: text
    content: ' make the words that you have prophesied come true, and bring back to this place from Babylon the vessels of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and all the exiles. '
  '7':
  - type: text
    content: 'Yet hear now this word that I speak in your hearing and in the hearing of all the people. '
  '8':
  - type: note
    content: '[ch. 26:18]'
  - type: text
    content: 'The prophets who preceded you and me from ancient times prophesied war, famine, and pestilence against many countries and great kingdoms. '
  '9':
  - type: note
    content: Deut. 18:22; See ch. 6:14
  - type: text
    content: 'As for the prophet who prophesies peace, when the word of that prophet comes to pass, then it will be known that the '
  - type: text
    content: Lord
  - type: text
    content: ' has truly sent the prophet.”'
