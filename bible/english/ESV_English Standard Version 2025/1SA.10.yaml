document_id: 1SA.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Anointed King
  - type: text
    content: ' '
  - type: note
    content: ch. 9:16; 16:13; 2 Sam. 2:4; 1 Kgs. 1:34, 39; 2 Kgs. 9:1, 3, 6
  - type: text
    content: 'Then Samuel took a flask of oil and poured it on his head '
  - type: note
    content: '[Ps. 2:12]'
  - type: text
    content: 'and kissed him and said, “Has not the '
  - type: text
    content: Lord
  - type: text
    content: ' anointed you to be prince'
  - type: note
    content: Or leader
  - type: text
    content: ' over '
  - type: note
    content: Deut. 32:9; Ps. 78:71
  - type: text
    content: 'his people Israel? And you shall reign over the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' and you will save them from the hand of their surrounding enemies. And this shall be the sign to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' has anointed you to be prince'
  - type: note
    content: Septuagint; Hebrew lacks over his people Israel? And you shall . . . . to be prince
  - type: text
    content: ' over his heritage. '
  '10':
  - type: text
    content: 'When they came to '
  - type: note
    content: ver. 5
  - type: text
    content: Gibeah,
  - type: note
    content: Gibeah means the hill
  - type: text
    content: ' behold, a group of prophets met him, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'and the Spirit of God rushed upon him, and he prophesied among them. '
  '11':
  - type: text
    content: 'And when all who knew him previously saw how he prophesied with the prophets, the people said to one another, “What has come over the son of Kish? '
  - type: note
    content: ch. 19:24; [Matt. 13:54, 55; John 7:15]
  - type: text
    content: 'Is Saul also among the prophets?” '
  '12':
  - type: text
    content: 'And a man of the place answered, '
  - type: note
    content: '[Isa. 54:13; John 6:45]'
  - type: text
    content: '“And who is their father?” Therefore it became a proverb, '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: '“Is Saul also among the prophets?” '
  '13':
  - type: text
    content: When he had finished prophesying, he came to the high place.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:50
  - type: text
    content: 'Saul’s uncle said to him and to his servant, “Where did you go?” And he said, '
  - type: note
    content: See ch. 9:4-6
  - type: text
    content: '“To seek the donkeys. And when we saw they were not to be found, we went to Samuel.” '
  '15':
  - type: text
    content: 'And Saul’s uncle said, “Please tell me what Samuel said to you.” '
  '16':
  - type: text
    content: 'And Saul said to his uncle, '
  - type: note
    content: ch. 9:20
  - type: text
    content: “He told us plainly that the donkeys had been found.” But about the matter of the kingdom, of which Samuel had spoken, he did not tell him anything.
  - type: heading
    content: Saul Proclaimed King
  '17':
  - type: text
    content: 'Now Samuel called the people together '
  - type: note
    content: '[ch. 11:15]'
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 7:5, 6
  - type: text
    content: 'at Mizpah. '
  '18':
  - type: text
    content: 'And he said to the people of Israel, '
  - type: note
    content: Judg. 6:8, 9; [ch. 12:8]
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, ‘I brought up Israel out of Egypt, and I delivered you from the hand of the Egyptians and from the hand of all the kingdoms that were oppressing you.’ '
  '19':
  - type: note
    content: ch. 8:7, 19; 12:12
  - type: text
    content: 'But today you have rejected your God, who saves you from all your calamities and your distresses, and you have said to him, ‘Set a king over us.’ Now therefore '
  - type: note
    content: Josh. 24:1
  - type: text
    content: 'present yourselves before the '
  - type: text
    content: Lord
  - type: text
    content: ' by your tribes and by your thousands.”'
  '2':
  - type: text
    content: 'When you depart from me today, you will meet two men by '
  - type: note
    content: Gen. 35:19, 20
  - type: text
    content: 'Rachel’s tomb in the territory of Benjamin at Zelzah, and they will say to you, '
  - type: note
    content: ch. 9:3, 4
  - type: text
    content: '‘The donkeys that you went to seek are found, and now '
  - type: note
    content: ch. 9:5
  - type: text
    content: 'your father has ceased to care about the donkeys and is anxious about you, saying, “What shall I do about my son?”’ '
  '20':
  - type: text
    content: 'Then Samuel '
  - type: note
    content: Josh. 7:14, 16, 17
  - type: text
    content: 'brought all the tribes of Israel near, and the tribe of Benjamin was taken by lot. '
  '21':
  - type: text
    content: He brought the tribe of Benjamin near by its clans, and the clan of the Matrites was taken by lot;
  - type: note
    content: Septuagint adds finally he brought the family of the Matrites near, man by man
  - type: text
    content: ' and Saul the son of Kish was taken by lot. But when they sought him, he could not be found. '
  '22':
  - type: note
    content: See ch. 22:10
  - type: text
    content: 'So they inquired again of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Is there a man still to come?” and the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Behold, he has hidden himself among the baggage.” '
  '23':
  - type: text
    content: 'Then they ran and took him from there. And when he stood among the people, '
  - type: note
    content: ch. 9:2
  - type: text
    content: 'he was taller than any of the people from his shoulders upward. '
  '24':
  - type: text
    content: 'And Samuel said to all the people, “Do you see him '
  - type: note
    content: 2 Sam. 21:6
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen? There is none like him among all the people.” And all the people shouted, '
  - type: note
    content: 2 Sam. 16:16; 1 Kgs. 1:25, 39; 2 Kgs. 11:12; 2 Chr. 23:11
  - type: text
    content: “Long live the king!”
  '25':
  - type: text
    content: 'Then Samuel told the people '
  - type: note
    content: See ch. 8:11-18; Deut. 17:14-20
  - type: text
    content: 'the rights and duties of the kingship, and he wrote them in a book and laid it up before the '
  - type: text
    content: Lord
  - type: text
    content: '. Then Samuel sent all the people away, each one to his home. '
  '26':
  - type: text
    content: 'Saul also went to his home '
  - type: note
    content: ch. 11:4
  - type: text
    content: 'at Gibeah, and with him went men of valor whose hearts God had touched. '
  '27':
  - type: text
    content: 'But some '
  - type: note
    content: ch. 2:12; Deut. 13:13
  - type: text
    content: worthless fellows said, “How can this man save us?” And they despised him and brought him no present. But he held his peace.
  '3':
  - type: text
    content: 'Then you shall go on from there farther and come to the '
  - type: note
    content: Gen. 13:18
  - type: text
    content: 'oak of Tabor. Three men '
  - type: note
    content: '[Judg. 20:31]'
  - type: text
    content: 'going up '
  - type: note
    content: Gen. 28:22; 35:1, 3, 7
  - type: text
    content: 'to God at Bethel will meet you there, one carrying three young goats, another carrying three loaves of bread, and another carrying a skin of wine. '
  '4':
  - type: text
    content: 'And they will greet you and give you two loaves of bread, which you shall accept from their hand. '
  '5':
  - type: text
    content: 'After that you shall come to '
  - type: note
    content: ver. 10
  - type: text
    content: Gibeath-elohim,
  - type: note
    content: Gibeath-elohim means the hill of God
  - type: text
    content: ' '
  - type: note
    content: ch. 13:3, 4
  - type: text
    content: 'where there is a garrison of the Philistines. And there, as soon as you come to the city, you will meet a group of prophets coming down '
  - type: note
    content: '[ch. 9:12]'
  - type: text
    content: 'from the high place with harp, tambourine, flute, and lyre before them, prophesying. '
  '6':
  - type: note
    content: ver. 10; ch. 11:6; 16:13; [Num. 11:25; Judg. 3:10; 14:6, 19]
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' will rush upon you, '
  - type: note
    content: ver. 10; ch. 19:23, 24
  - type: text
    content: 'and you will prophesy with them and be turned into another man. '
  '7':
  - type: text
    content: 'Now when '
  - type: note
    content: Ex. 4:8; Judg. 6:17; Luke 2:12
  - type: text
    content: 'these signs meet you, do what your hand finds to do, '
  - type: note
    content: Josh. 1:5; Judg. 6:12
  - type: text
    content: 'for God is with you. '
  '8':
  - type: text
    content: 'Then go down before me '
  - type: note
    content: ch. 11:14, 15; 13:4
  - type: text
    content: 'to Gilgal. And behold, I am coming down to you to offer burnt offerings and '
  - type: note
    content: ch. 11:15
  - type: text
    content: 'to sacrifice peace offerings. '
  - type: note
    content: ch. 13:8
  - type: text
    content: Seven days you shall wait, until I come to you and show you what you shall do.”
  '9':
  - type: text
    content: 'When he turned his back to leave Samuel, God gave him another heart. And all these signs came to pass that day. '
