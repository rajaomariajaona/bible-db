document_id: 2TH.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Man of Lawlessness
  - type: text
    content: 'Now concerning '
  - type: note
    content: See 1 Thess. 2:19
  - type: text
    content: 'the coming of our Lord Jesus Christ and our '
  - type: note
    content: '[Matt. 24:31; 1 Thess. 4:15-17]'
  - type: text
    content: being gathered together to him, we ask you, brothers,
  - type: note
    content: Or brothers and sisters; also verses 13, 15
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'and with all wicked deception for '
  - type: note
    content: See 1 Cor. 1:18
  - type: text
    content: 'those who are perishing, because they refused to love the truth and so be saved. '
  '11':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[1 Kgs. 22:22; Ezek. 14:9; Rev. 17:17]'
  - type: text
    content: 'God sends them a strong delusion, so that they may believe '
  - type: note
    content: '[1 Thess. 2:3; 1 Tim. 4:2]; See Rom. 1:25'
  - type: text
    content: 'what is false, '
  '12':
  - type: text
    content: 'in order that all may be condemned '
  - type: note
    content: Rom. 2:8
  - type: text
    content: 'who did not believe the truth but '
  - type: note
    content: See Rom. 1:32
  - type: text
    content: had pleasure in unrighteousness.
  - type: heading
    content: Stand Firm
  '13':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'we ought always to give thanks to God for you, '
  - type: note
    content: 1 Thess. 1:4; [Deut. 33:12]
  - type: text
    content: 'brothers beloved by the Lord, because God chose you '
  - type: note
    content: Eph. 1:4
  - type: text
    content: as the firstfruits
  - type: note
    content: Some manuscripts chose you from the beginning
  - type: text
    content: ' '
  - type: note
    content: 1 Thess. 5:9; [2 Tim. 1:9]
  - type: text
    content: 'to be saved, '
  - type: note
    content: See 1 Thess. 4:3
  - type: text
    content: 'through sanctification by the Spirit and belief in the truth. '
  '14':
  - type: text
    content: 'To this he called you through '
  - type: note
    content: 1 Thess. 1:5
  - type: text
    content: 'our gospel, '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'so that you may obtain the glory of our Lord Jesus Christ. '
  '15':
  - type: text
    content: 'So then, brothers, '
  - type: note
    content: See 1 Cor. 16:13
  - type: text
    content: 'stand firm and hold to '
  - type: note
    content: ch. 3:6; 1 Cor. 11:2
  - type: text
    content: 'the traditions that you were taught by us, either '
  - type: note
    content: ver. 2
  - type: text
    content: 'by our spoken word or by '
  - type: note
    content: ver. 2
  - type: text
    content: our letter.
  '16':
  - type: text
    content: 'Now may our Lord Jesus Christ himself, and God our Father, '
  - type: note
    content: John 3:16; 1 John 4:10; Rev. 1:5
  - type: text
    content: 'who loved us and gave us eternal comfort and good '
  - type: note
    content: 1 Pet. 1:3
  - type: text
    content: 'hope through grace, '
  '17':
  - type: text
    content: 'comfort your hearts and '
  - type: note
    content: ch. 3:3; 1 Thess. 3:13
  - type: text
    content: establish them in every good work and word.
  '2':
  - type: text
    content: 'not to be quickly shaken in mind or '
  - type: note
    content: Matt. 24:6; Mark 13:7
  - type: text
    content: 'alarmed, either '
  - type: note
    content: '[1 John 4:1]'
  - type: text
    content: 'by a spirit or a '
  - type: note
    content: ver. 15; [1 Thess. 5:2]
  - type: text
    content: 'spoken word, or '
  - type: note
    content: ver. 15; [1 Thess. 5:2]
  - type: text
    content: 'a letter seeming to be from us, to the effect that '
  - type: note
    content: See 1 Cor. 1:8
  - type: text
    content: 'the day of the Lord has come. '
  '3':
  - type: note
    content: Eph. 5:6
  - type: text
    content: 'Let no one deceive you in any way. For that day will not come, '
  - type: note
    content: 1 Tim. 4:1
  - type: text
    content: 'unless the rebellion comes first, and '
  - type: note
    content: '[ver. 8; Dan. 7:25; 8:25; 11:36; Rev. 13:5, 6]'
  - type: text
    content: the man of lawlessness
  - type: note
    content: Some manuscripts sin
  - type: text
    content: ' is revealed, '
  - type: note
    content: John 17:12; [Matt. 23:15]
  - type: text
    content: the son of destruction,
  - type: note
    content: Greek the son of perdition (a Hebrew idiom)
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'who opposes and exalts himself against every so-called god or object of worship, so that he takes his seat in the temple of God, '
  - type: note
    content: '[Isa. 14:14; Ezek. 28:2]'
  - type: text
    content: 'proclaiming himself to be God. '
  '5':
  - type: text
    content: 'Do you not remember that when I was still with you I told you these things? '
  '6':
  - type: text
    content: 'And you know what is restraining him now so that he may be revealed in his time. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: Rev. 17:5, 7
  - type: text
    content: 'the mystery of lawlessness '
  - type: note
    content: 1 John 2:18; 4:3
  - type: text
    content: 'is already at work. Only he who now restrains it will do so until he is out of the way. '
  '8':
  - type: text
    content: 'And then '
  - type: note
    content: See ver. 3
  - type: text
    content: 'the lawless one will be revealed, whom the Lord Jesus '
  - type: note
    content: '[Dan. 7:10, 11]'
  - type: text
    content: 'will kill with '
  - type: note
    content: Isa. 11:4
  - type: text
    content: 'the breath of his mouth and bring to nothing by '
  - type: note
    content: '[1 Tim. 6:14; 2 Tim. 1:10; 4:1, 8; Titus 2:13]'
  - type: text
    content: 'the appearance of his coming. '
  '9':
  - type: text
    content: 'The coming of the lawless one is by the activity of Satan '
  - type: note
    content: '[Rev. 13:14]; See Matt. 24:24'
  - type: text
    content: 'with all power and false signs and wonders, '
