document_id: 1SA.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Spares Saul Again
  - type: text
    content: ' '
  - type: note
    content: ch. 23:19; See Ps. 54
  - type: text
    content: 'Then the Ziphites came to Saul at Gibeah, saying, “Is not David hiding himself on the hill of Hachilah, which is on the east of Jeshimon?” '
  '10':
  - type: text
    content: 'And David said, '
  - type: note
    content: '[Ruth 3:13]'
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, '
  - type: note
    content: '[ch. 25:38]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike him, or '
  - type: note
    content: '[Gen. 47:29; Deut. 31:14]'
  - type: text
    content: 'his day will come to die, '
  - type: note
    content: ch. 31:6
  - type: text
    content: 'or he will go down into battle and perish. '
  '11':
  - type: note
    content: ch. 24:6
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should put out my hand against the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed. But take now the spear that is '
  - type: note
    content: ver. 7, 16
  - type: text
    content: 'at his head and the jar of water, and let us go.” '
  '12':
  - type: text
    content: 'So David took the spear and the jar of water from Saul’s head, and they went away. No man saw it or knew it, nor did any awake, for they were all asleep, because '
  - type: note
    content: Gen. 2:21; 15:12
  - type: text
    content: 'a deep sleep from the '
  - type: text
    content: Lord
  - type: text
    content: ' had fallen upon them.'
  '13':
  - type: text
    content: 'Then David went over to the other side and stood far off on the top of the hill, with a great space between them. '
  '14':
  - type: text
    content: 'And David called to the army, and to Abner the son of Ner, saying, “Will you not answer, Abner?” Then Abner answered, “Who are you who calls to the king?” '
  '15':
  - type: text
    content: 'And David said to Abner, “Are you not a man? Who is like you in Israel? Why then have you not kept watch over your lord the king? For one of the people came in to destroy the king your lord. '
  '16':
  - type: text
    content: 'This thing that you have done is not good. '
  - type: note
    content: '[Ruth 3:13]'
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, you deserve to die, because you have not kept watch over your lord, the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed. And now see where the king’s spear is and the jar of water that was '
  - type: note
    content: ver. 7, 11
  - type: text
    content: at his head.”
  '17':
  - type: text
    content: 'Saul recognized David’s voice and said, '
  - type: note
    content: ch. 24:16
  - type: text
    content: '“Is this your voice, my son David?” And David said, “It is my voice, my lord, O king.” '
  '18':
  - type: text
    content: 'And he said, '
  - type: note
    content: ch. 24:9, 11
  - type: text
    content: '“Why does my lord pursue after his servant? For what have I done? What evil is on my hands? '
  '19':
  - type: text
    content: 'Now therefore let my lord the king hear the words of his servant. If it is the '
  - type: text
    content: Lord
  - type: text
    content: ' who has stirred you up against me, may he accept an offering, but if it is men, may they be cursed before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ps. 120:5]'
  - type: text
    content: 'for they have driven me out this day that I should have no share in '
  - type: note
    content: 2 Sam. 14:16; 20:19; 21:3
  - type: text
    content: 'the heritage of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, ‘Go, serve other gods.’ '
  '2':
  - type: text
    content: 'So Saul arose and went down to '
  - type: note
    content: ch. 23:14
  - type: text
    content: 'the wilderness of Ziph with '
  - type: note
    content: ch. 24:2
  - type: text
    content: 'three thousand chosen men of Israel to seek David in the wilderness of Ziph. '
  '20':
  - type: text
    content: 'Now therefore, let not my blood fall to the earth away from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', for the king of Israel has come out to seek '
  - type: note
    content: ch. 24:14
  - type: text
    content: a single flea like one who hunts a partridge in the mountains.”
  '21':
  - type: text
    content: 'Then Saul said, '
  - type: note
    content: ch. 15:24; [ch. 24:17, 18]
  - type: text
    content: '“I have sinned. Return, my son David, for I will no more do you harm, because my life was precious in your eyes this day. Behold, I have acted foolishly, and have made a great mistake.” '
  '22':
  - type: text
    content: 'And David answered and said, “Here is the spear, O king! Let one of the young men come over and take it. '
  '23':
  - type: note
    content: '[Ps. 7:8; 18:20]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rewards every man for his righteousness and his faithfulness, for the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you into my hand today, and I would not put out my hand against the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed. '
  '24':
  - type: text
    content: 'Behold, as your life was precious this day in my sight, so may my life be precious in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and may he deliver me out of all tribulation.” '
  '25':
  - type: text
    content: 'Then Saul said to David, “Blessed be you, my son David! You will do many things and will '
  - type: note
    content: '[Gen. 32:28]'
  - type: text
    content: succeed in them.” So David went his way, and Saul returned to his place.
  '3':
  - type: text
    content: 'And Saul encamped on the hill of Hachilah, which is beside the road on the east of Jeshimon. But David remained in the wilderness. When he saw that Saul came after him into the wilderness, '
  '4':
  - type: text
    content: 'David sent out spies and learned that Saul had indeed come. '
  '5':
  - type: text
    content: 'Then David rose and came to the place where Saul had encamped. And David saw the place where Saul lay, with '
  - type: note
    content: ch. 14:50; 17:55; 2 Sam. 2:8
  - type: text
    content: 'Abner the son of Ner, the commander of his army. Saul was lying within '
  - type: note
    content: ch. 17:20
  - type: text
    content: the encampment, while the army was encamped around him.
  '6':
  - type: text
    content: 'Then David said to Ahimelech the Hittite, and to Joab’s brother '
  - type: note
    content: 2 Sam. 2:18; 3:39; 16:10; 19:22; 1 Chr. 2:16
  - type: text
    content: 'Abishai the son of Zeruiah, '
  - type: note
    content: '[Judg. 7:9-11]'
  - type: text
    content: '“Who will go down with me into the camp to Saul?” And Abishai said, “I will go down with you.” '
  '7':
  - type: text
    content: 'So David and Abishai went to the army by night. And there lay Saul sleeping within '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the encampment, with his spear stuck in the ground '
  - type: note
    content: ver. 11, 16
  - type: text
    content: 'at his head, and Abner and the army lay around him. '
  '8':
  - type: text
    content: 'Then Abishai said to David, '
  - type: note
    content: '[ch. 24:4, 18]'
  - type: text
    content: '“God has given your enemy into your hand this day. Now please let me pin him to the earth with one stroke of the spear, and I will not strike him twice.” '
  '9':
  - type: text
    content: 'But David said to Abishai, “Do not destroy him, for who can put out his hand '
  - type: note
    content: ver. 11, 16, 23; ch. 24:6, 10; [2 Sam. 1:16]
  - type: text
    content: 'against the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed and be guiltless?” '
