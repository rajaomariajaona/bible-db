document_id: JER.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Letter to the Exiles
  - type: text
    content: 'These are the words of the letter that Jeremiah the prophet sent from Jerusalem to '
  - type: note
    content: Ezek. 8:1
  - type: text
    content: 'the surviving elders of the exiles, and to '
  - type: note
    content: '[ch. 23:33]'
  - type: text
    content: 'the priests, '
  - type: note
    content: '[ch. 23:33]'
  - type: text
    content: 'the prophets, and '
  - type: note
    content: '[ch. 23:33]'
  - type: text
    content: 'all the people, whom Nebuchadnezzar had taken into exile from Jerusalem to Babylon. '
  '10':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See ch. 25:12
  - type: text
    content: 'When seventy years are completed for Babylon, '
  - type: note
    content: ch. 27:22
  - type: text
    content: 'I will visit you, '
  - type: note
    content: ch. 33:14; [ch. 24:6]
  - type: text
    content: 'and I will fulfill to you my promise '
  - type: note
    content: ch. 33:14; [ch. 24:6]
  - type: text
    content: 'and bring you back to this place. '
  '11':
  - type: note
    content: '[Isa. 55:8, 9]'
  - type: text
    content: 'For I know the plans I have for you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', plans for welfare'
  - type: note
    content: Or peace
  - type: text
    content: ' and not for evil, '
  - type: note
    content: ch. 31:17
  - type: text
    content: 'to give you a future and a hope. '
  '12':
  - type: note
    content: ch. 33:3; Dan. 9:3
  - type: text
    content: 'Then you will call upon me and come and pray to me, '
  - type: note
    content: ch. 33:3; Dan. 9:3
  - type: text
    content: 'and I will hear you. '
  '13':
  - type: note
    content: 2 Chr. 15:2; Ps. 32:6; 78:34; Prov. 8:17; Isa. 55:6; Hos. 3:5; See Lev. 26:39-42; Deut. 30:1-3
  - type: text
    content: 'You will seek me and find me, when you seek me '
  - type: note
    content: ch. 24:7; Deut. 4:29
  - type: text
    content: 'with all your heart. '
  '14':
  - type: text
    content: 'I will be found by you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 30:3
  - type: text
    content: 'and I will restore your fortunes and '
  - type: note
    content: See ch. 23:3
  - type: text
    content: 'gather you from all the nations and all the places '
  - type: note
    content: See ch. 8:3
  - type: text
    content: 'where I have driven you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and I will bring you back to the place from which I sent you into exile.'
  '15':
  - type: text
    content: '“Because you have said, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has raised up prophets for us in Babylon,’ '
  '16':
  - type: text
    content: 'thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning '
  - type: note
    content: See ch. 22:2
  - type: text
    content: 'the king who sits on the throne of David, and concerning all the people who dwell in this city, your kinsmen who did not go out with you into exile: '
  '17':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, behold, I am sending on them '
  - type: note
    content: See ch. 24:10
  - type: text
    content: 'sword, famine, and pestilence, and I will make them like '
  - type: note
    content: ch. 24:8
  - type: text
    content: 'vile figs that are so rotten they cannot be eaten. '
  '18':
  - type: text
    content: 'I will pursue them with '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'sword, famine, and pestilence, '
  - type: note
    content: See ch. 15:4
  - type: text
    content: 'and will make them a horror to all the kingdoms of the earth, '
  - type: note
    content: ch. 18:16; 42:18; See ch. 24:9
  - type: text
    content: 'to be a curse, a terror, a hissing, and a reproach among all the nations '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'where I have driven them, '
  '19':
  - type: text
    content: 'because they did not pay attention to my words, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 25:4
  - type: text
    content: 'that I persistently sent to you by my servants the prophets, but you would not listen, declares the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '2':
  - type: text
    content: 'This was after '
  - type: note
    content: ch. 24:1; 2 Kgs. 24:12, 14
  - type: text
    content: 'King Jeconiah and the queen mother, the eunuchs, the officials of Judah and Jerusalem, the craftsmen, and the metal workers had departed from Jerusalem. '
  '20':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', all you exiles '
  - type: note
    content: ch. 24:5
  - type: text
    content: 'whom I sent away from Jerusalem to Babylon: '
  '21':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, concerning Ahab the son of Kolaiah and Zedekiah the son of Maaseiah, '
  - type: note
    content: ver. 9; See ch. 14:14
  - type: text
    content: 'who are prophesying a lie to you in my name: Behold, I will deliver them into the hand of Nebuchadnezzar king of Babylon, and he shall strike them down before your eyes. '
  '22':
  - type: note
    content: See Isa. 65:15
  - type: text
    content: 'Because of them '
  - type: note
    content: See ch. 24:9
  - type: text
    content: 'this curse shall be used by all the exiles from Judah in Babylon: “The '
  - type: text
    content: Lord
  - type: text
    content: ' make you like Zedekiah and Ahab, '
  - type: note
    content: '[Dan. 3:6]'
  - type: text
    content: 'whom the king of Babylon roasted in the fire,” '
  '23':
  - type: text
    content: 'because they have done an outrageous thing in Israel, '
  - type: note
    content: ch. 23:14
  - type: text
    content: 'they have committed adultery with their neighbors’ wives, and '
  - type: note
    content: ch. 23:14
  - type: text
    content: 'they have spoken in my name lying words that I did not command them. '
  - type: note
    content: Mal. 3:5
  - type: text
    content: 'I am the one who knows, '
  - type: note
    content: Mal. 3:5
  - type: text
    content: 'and I am witness, declares the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  - type: heading
    content: Shemaiah’s False Prophecy
  '24':
  - type: text
    content: 'To '
  - type: note
    content: ver. 31, 32
  - type: text
    content: 'Shemaiah of Nehelam you shall say: '
  '25':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: You have sent letters in your name to all the people who are in Jerusalem, and to '
  - type: note
    content: ch. 21:1; 2 Kgs. 25:18
  - type: text
    content: 'Zephaniah the son of '
  - type: note
    content: ch. 35:4
  - type: text
    content: 'Maaseiah the priest, and to all the priests, saying, '
  '26':
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has made you priest instead of Jehoiada the priest, to have '
  - type: note
    content: '[ch. 20:1]'
  - type: text
    content: 'charge in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[2 Kgs. 9:11; Acts 26:24]'
  - type: text
    content: 'over every madman who prophesies, to put him in '
  - type: note
    content: ch. 20:2
  - type: text
    content: 'the stocks and neck irons. '
  '27':
  - type: text
    content: 'Now why have you not rebuked Jeremiah '
  - type: note
    content: ch. 1:1; 32:7
  - type: text
    content: 'of Anathoth who is prophesying to you? '
  '28':
  - type: text
    content: 'For he has sent to us in Babylon, saying, “Your exile will be long; '
  - type: note
    content: ver. 5
  - type: text
    content: build houses and live in them, and plant gardens and eat their produce.”’”
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'Zephaniah the priest read this letter in the hearing of Jeremiah the prophet. '
  '3':
  - type: text
    content: 'The letter was sent by the hand of Elasah the son of '
  - type: note
    content: 2 Chr. 34:8
  - type: text
    content: 'Shaphan and Gemariah the son of '
  - type: note
    content: 1 Chr. 6:13
  - type: text
    content: 'Hilkiah, whom Zedekiah king of Judah sent to Babylon to Nebuchadnezzar king of Babylon. It said: '
  '30':
  - type: note
    content: ver. 1, 20
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '31':
  - type: text
    content: '“Send to all the exiles, saying, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning '
  - type: note
    content: ver. 24
  - type: text
    content: 'Shemaiah of Nehelam: Because '
  - type: note
    content: ver. 24
  - type: text
    content: 'Shemaiah had prophesied to you '
  - type: note
    content: ver. 9; See ch. 5:31
  - type: text
    content: 'when I did not send him, and has made you trust in a lie, '
  '32':
  - type: text
    content: 'therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Behold, I will punish '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'Shemaiah of Nehelam and his descendants. He shall not have anyone living among this people, '
  - type: note
    content: See ch. 17:6
  - type: text
    content: 'and he shall not see the good that I will do to my people, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 28:16
  - type: text
    content: 'for he has spoken rebellion against the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '4':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, to all the exiles whom I have sent into exile from Jerusalem to Babylon: '
  '5':
  - type: note
    content: ver. 28
  - type: text
    content: 'Build houses and live in them; plant gardens and eat their produce. '
  '6':
  - type: text
    content: 'Take wives and have sons and daughters; take wives for your sons, and give your daughters in marriage, that they may bear sons and daughters; multiply there, and do not decrease. '
  '7':
  - type: text
    content: 'But seek the welfare of the city where I have sent you into exile, and '
  - type: note
    content: '[Ezra 6:10; 1 Tim. 2:1, 2]'
  - type: text
    content: 'pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' on its behalf, for in its welfare you will find your welfare. '
  '8':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: '[ch. 5:31; 6:14]'
  - type: text
    content: 'Do not let your prophets and '
  - type: note
    content: ch. 27:9, 15
  - type: text
    content: your diviners who are among you deceive you, and do not listen to the dreams that they dream,
  - type: note
    content: Hebrew your dreams, which you cause to dream
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'for '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'it is a lie that they are prophesying to you in my name; '
  - type: note
    content: ver. 31
  - type: text
    content: 'I did not send them, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
