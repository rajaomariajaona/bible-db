document_id: EZK.39,59
type_code: eng
verses:
  '1':
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, '
  - type: note
    content: ch. 38:2, 3
  - type: text
    content: 'prophesy against '
  - type: note
    content: ch. 38:2
  - type: text
    content: 'Gog and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Behold, '
  - type: note
    content: ch. 38:3; See ch. 13:8
  - type: text
    content: 'I am against you, O Gog, '
  - type: note
    content: ch. 38:2, 3
  - type: text
    content: 'chief prince of '
  - type: note
    content: ch. 38:2
  - type: text
    content: Meshech
  - type: note
    content: Or Gog, prince of Rosh, Meshech
  - type: text
    content: ' and '
  - type: note
    content: ch. 38:2
  - type: text
    content: 'Tubal. '
  '10':
  - type: text
    content: 'so that they will not need to take wood out of the field or cut down any out of the forests, for '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'they will make their fires of the weapons. '
  - type: note
    content: '[Isa. 33:1]'
  - type: text
    content: 'They will seize the spoil of those who despoiled them, and plunder those who plundered them, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '11':
  - type: text
    content: '“On that day I will give to '
  - type: note
    content: ch. 38:2
  - type: text
    content: 'Gog a place for burial in Israel, the Valley of the Travelers, east of the sea. It will block the travelers, for there Gog and all his multitude will be buried. It will be called the Valley of '
  - type: note
    content: ver. 15
  - type: text
    content: Hamon-gog.
  - type: note
    content: Hamon-gog means the multitude of Gog
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'seven months the house of Israel will be burying them, in order '
  - type: note
    content: '[Deut. 21:23]'
  - type: text
    content: 'to cleanse the land. '
  '13':
  - type: text
    content: 'All the people of the land will bury them, and it will bring them renown on the day that '
  - type: note
    content: ch. 28:22
  - type: text
    content: 'I show my glory, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'They will set apart men to travel through the land regularly and bury those travelers remaining on the face of the land, so as '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: to cleanse it. At
  - type: note
    content: Or Until
  - type: text
    content: ' the end of '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'seven months they will make their search. '
  '15':
  - type: text
    content: 'And when these travel through the land and anyone sees a human bone, then he shall set up a sign by it, till the buriers have buried it in the Valley of '
  - type: note
    content: ver. 11
  - type: text
    content: 'Hamon-gog. '
  '16':
  - type: text
    content: (Hamonah
  - type: note
    content: Hamonah means multitude
  - type: text
    content: ' is also the name of the city.) Thus shall they cleanse the land.'
  '17':
  - type: text
    content: '“As for you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[Rev. 19:17]'
  - type: text
    content: 'Speak to '
  - type: note
    content: ver. 4; [Jer. 12:9]
  - type: text
    content: 'the birds of every sort and to '
  - type: note
    content: ver. 4; [Jer. 12:9]
  - type: text
    content: 'all beasts of the field: ‘Assemble and come, gather from all around to '
  - type: note
    content: '[Isa. 34:6; Zeph. 1:7]'
  - type: text
    content: 'the sacrificial feast that I am preparing for you, a great sacrificial feast on the mountains of Israel, and you shall eat flesh and drink blood. '
  '18':
  - type: note
    content: '[Rev. 19:18]'
  - type: text
    content: 'You shall eat the flesh of the mighty, and drink the blood of the princes of the earth—of rams, of lambs, and of he-goats, of bulls, all of them '
  - type: note
    content: '[Ps. 22:12]'
  - type: text
    content: 'fat beasts of Bashan. '
  '19':
  - type: text
    content: 'And you shall eat fat till you are filled, and drink blood till you are drunk, at the sacrificial feast that I am preparing for you. '
  '2':
  - type: note
    content: ch. 38:4
  - type: text
    content: And I will turn you about and drive you forward,
  - type: note
    content: Or and drag you along
  - type: text
    content: ' and bring you up from '
  - type: note
    content: ch. 38:6, 15; [ch. 32:30]
  - type: text
    content: 'the uttermost parts of the north, and lead you against the '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'mountains of Israel. '
  '20':
  - type: text
    content: 'And you shall be filled at my table with horses and charioteers, with mighty men and all kinds of warriors,’ declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '21':
  - type: text
    content: '“And '
  - type: note
    content: ver. 7, 13; [ch. 28:22; 37:28; 38:23]; See ch. 36:23
  - type: text
    content: 'I will set my glory among the nations, and all the nations shall see '
  - type: note
    content: '[Ex. 7:4]'
  - type: text
    content: 'my judgment that I have executed, and '
  - type: note
    content: '[Ex. 7:4]'
  - type: text
    content: 'my hand that I have laid on them. '
  '22':
  - type: note
    content: ver. 28; Joel 2:27; See ch. 6:7
  - type: text
    content: 'The house of Israel shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, from that day forward. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: See Deut. 29:24-28
  - type: text
    content: 'the nations shall know that the house of Israel went into captivity for their iniquity, because they dealt so treacherously with me that '
  - type: note
    content: Deut. 31:17
  - type: text
    content: 'I hid my face from them and '
  - type: note
    content: '[Lev. 26:25]'
  - type: text
    content: 'gave them into the hand of their adversaries, and they all fell by the sword. '
  '24':
  - type: text
    content: 'I dealt with them '
  - type: note
    content: '[See ch. 18:30]'
  - type: text
    content: according to their uncleanness and their transgressions, and hid my face from them.
  - type: heading
    content: The Lord Will Restore Israel
  '25':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Now '
  - type: note
    content: See Jer. 30:3
  - type: text
    content: 'I will restore the fortunes of Jacob and have mercy on '
  - type: note
    content: ch. 20:40
  - type: text
    content: 'the whole house of Israel, and '
  - type: note
    content: '[ch. 20:9]; See ch. 5:13'
  - type: text
    content: 'I will be jealous for my holy name. '
  '26':
  - type: text
    content: 'They shall '
  - type: note
    content: See ch. 32:24
  - type: text
    content: 'forget their shame and all the treachery they have practiced against me, when '
  - type: note
    content: ch. 34:25, 27, 28; 38:8
  - type: text
    content: 'they dwell securely in their land with '
  - type: note
    content: ch. 34:28
  - type: text
    content: 'none to make them afraid, '
  '27':
  - type: note
    content: ch. 28:25; See ch. 11:17
  - type: text
    content: 'when I have brought them back from the peoples and gathered them from their enemies’ lands, '
  - type: note
    content: See ch. 20:41
  - type: text
    content: 'and through them have vindicated my holiness in the sight of many nations. '
  '28':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Then they shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, because I sent them into exile among the nations and then assembled them into their own land. I will leave none of them remaining among the nations anymore. '
  '29':
  - type: note
    content: '[ver. 23]'
  - type: text
    content: 'And I will not hide my face anymore from them, when '
  - type: note
    content: '[Joel 2:28]'
  - type: text
    content: 'I pour out my Spirit upon the house of Israel, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Then '
  - type: note
    content: '[Ps. 76:3]'
  - type: text
    content: 'I will strike your bow from your left hand, and '
  - type: note
    content: '[Ps. 76:3]'
  - type: text
    content: 'will make your arrows drop out of your right hand. '
  '4':
  - type: note
    content: '[ch. 38:21]'
  - type: text
    content: 'You shall fall on '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the mountains of Israel, you and all your '
  - type: note
    content: ch. 38:6, 9, 22
  - type: text
    content: 'hordes and the peoples who are with you. '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'I will give you to birds of prey of every sort and to the beasts of the field to be devoured. '
  '5':
  - type: text
    content: 'You shall fall in the open field, for '
  - type: note
    content: See ch. 17:21
  - type: text
    content: 'I have spoken, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '6':
  - type: note
    content: '[ch. 28:18; 30:8, 14, 16; 38:22]'
  - type: text
    content: 'I will send fire on '
  - type: note
    content: ch. 38:2
  - type: text
    content: 'Magog and on those '
  - type: note
    content: ch. 38:8, 14
  - type: text
    content: 'who dwell securely in '
  - type: note
    content: ch. 27:3, 6, 7, 15
  - type: text
    content: 'the coastlands, and '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'they shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“And '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'my holy name I will make known in the midst of my people Israel, and '
  - type: note
    content: See ch. 20:39
  - type: text
    content: 'I will not let my holy name be profaned anymore. And '
  - type: note
    content: See ch. 36:23
  - type: text
    content: 'the nations shall know that I am '
  - type: note
    content: Isa. 45:11
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the Holy One in Israel. '
  '8':
  - type: note
    content: ch. 21:7
  - type: text
    content: 'Behold, it is coming and it will be brought about, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. That is the day '
  - type: note
    content: ch. 38:17
  - type: text
    content: of which I have spoken.
  '9':
  - type: text
    content: '“Then those who dwell in the cities of Israel will go out and '
  - type: note
    content: '[Ps. 46:9; Isa. 9:5]'
  - type: text
    content: 'make fires of the weapons and burn them, shields and bucklers, bow and arrows, '
  - type: note
    content: '[1 Sam. 17:40]'
  - type: text
    content: clubs
  - type: note
    content: Or javelins
  - type: text
    content: ' and spears; and they will make fires of them for seven years, '
