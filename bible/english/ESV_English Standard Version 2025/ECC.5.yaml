document_id: ECC.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Fear God
  - type: text
    content: ' '
  - type: note
    content: Ch 4:17 in Hebrew
  - type: note
    content: '[Ex. 3:5; Isa. 1:12]'
  - type: text
    content: 'Guard your steps when you go to '
  - type: note
    content: '[Gen. 28:17]'
  - type: text
    content: 'the house of God. To draw near to listen is better than to '
  - type: note
    content: Prov. 15:8; See 1 Sam. 15:22
  - type: text
    content: 'offer the sacrifice of fools, for they do not know that they are doing evil. '
  '10':
  - type: text
    content: 'He who loves money will not be satisfied with money, nor he who loves wealth with his income; this also is vanity. '
  '11':
  - type: text
    content: 'When goods increase, they increase who eat them, and what advantage has their owner but to see them with his eyes? '
  '12':
  - type: text
    content: Sweet is the sleep of a laborer, whether he eats little or much, but the full stomach of the rich will not let him sleep.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:1
  - type: text
    content: 'There is a grievous evil that I have seen under the sun: riches were kept by their owner to his hurt, '
  '14':
  - type: text
    content: 'and those riches were lost in a bad venture. And he is father of a son, but he has nothing in his hand. '
  '15':
  - type: note
    content: See Job 1:21
  - type: text
    content: 'As he came from his mother’s womb he shall go again, naked as he came, and shall take nothing for his toil that he may carry away in his hand. '
  '16':
  - type: text
    content: 'This also is a grievous evil: just as he came, so shall he go, and what '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'gain is there to him who '
  - type: note
    content: '[Prov. 11:29]'
  - type: text
    content: 'toils for the wind? '
  '17':
  - type: text
    content: 'Moreover, all his days he '
  - type: note
    content: '[Ps. 127:2]'
  - type: text
    content: eats in darkness in much vexation and sickness and anger.
  '18':
  - type: text
    content: 'Behold, what I have seen to be '
  - type: note
    content: See ch. 2:24
  - type: text
    content: good and fitting is to eat and drink and find enjoyment
  - type: note
    content: Or and see good
  - type: text
    content: ' in all the toil with which one toils under the sun the few days of his life that God has given him, for this is his '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'lot. '
  '19':
  - type: text
    content: 'Everyone also to whom '
  - type: note
    content: ch. 6:2; [ch. 2:24]
  - type: text
    content: 'God has given '
  - type: note
    content: 2 Chr. 1:11
  - type: text
    content: 'wealth and possessions '
  - type: note
    content: '[ch. 6:2]'
  - type: text
    content: 'and power to enjoy them, and to accept his lot and rejoice in his toil—this is '
  - type: note
    content: See ch. 3:13
  - type: text
    content: 'the gift of God. '
  '2':
  - type: note
    content: Ch 5:1 in Hebrew
  - type: text
    content: ' Be not rash with your mouth, nor let your heart be hasty to utter a word before God, for God is in heaven and you are on earth. Therefore '
  - type: note
    content: '[Matt. 6:7]'
  - type: text
    content: 'let your words be few. '
  '20':
  - type: text
    content: For he will not much remember the days of his life because God keeps him occupied with joy in his heart.
  '3':
  - type: text
    content: 'For a dream comes with much business, and a fool’s voice with '
  - type: note
    content: Prov. 10:19; [Job 11:2]
  - type: text
    content: many words.
  '4':
  - type: text
    content: 'When '
  - type: note
    content: Num. 30:2
  - type: text
    content: 'you vow a vow to God, '
  - type: note
    content: Deut. 23:21; Ps. 50:14; 76:11
  - type: text
    content: 'do not delay paying it, for he has no pleasure in fools. '
  - type: note
    content: '[Ps. 66:13, 14]'
  - type: text
    content: 'Pay what you vow. '
  '5':
  - type: note
    content: '[Prov. 20:25; Acts 5:4]'
  - type: text
    content: 'It is better that you should not vow than that you should vow and not pay. '
  '6':
  - type: text
    content: Let not your mouth lead you
  - type: note
    content: Hebrew your flesh
  - type: text
    content: ' into sin, and do not say before '
  - type: note
    content: '[1 Cor. 11:10]'
  - type: text
    content: the messenger
  - type: note
    content: Or angel
  - type: text
    content: ' that it was '
  - type: note
    content: ch. 10:5; Num. 15:25, 26
  - type: text
    content: 'a mistake. Why should God be angry at your voice and destroy the work of your hands? '
  '7':
  - type: text
    content: For when dreams increase and words grow many, there is vanity;
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath”; also verse 10 (see note on 1:2)
  - type: text
    content: ' but'
  - type: note
    content: Or For when dreams and vanities increase, words also grow many; but
  - type: text
    content: ' '
  - type: note
    content: ch. 12:13
  - type: text
    content: God is the one you must fear.
  - type: heading
    content: The Vanity of Wealth and Honor
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:16; 4:1
  - type: text
    content: 'If you see in a province the oppression of the poor and the violation of justice and righteousness, '
  - type: note
    content: '[1 Pet. 4:12]'
  - type: text
    content: 'do not be amazed at the matter, '
  - type: note
    content: '[Ps. 12:5; 58:11; 82:1]'
  - type: text
    content: 'for the high official is watched by a higher, and there are yet higher ones over them. '
  '9':
  - type: text
    content: 'But this is gain for a land in every way: a king committed to cultivated fields.'
  - type: note
    content: The meaning of the Hebrew verse is uncertain
