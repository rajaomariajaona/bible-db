document_id: GEN.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Meets Esau
  - type: text
    content: 'And Jacob lifted up his eyes and looked, and behold, '
  - type: note
    content: ch. 32:6
  - type: text
    content: 'Esau was coming, and four hundred men with him. So he divided the children among Leah and Rachel and the two female servants. '
  '10':
  - type: text
    content: 'Jacob said, “No, please, if I have found favor in your sight, then accept my present from my hand. '
  - type: note
    content: ch. 18:1; 19:1
  - type: text
    content: 'For I have seen your face, which is like seeing the face of God, and you have accepted me. '
  '11':
  - type: text
    content: 'Please accept my '
  - type: note
    content: 2 Kgs. 5:15
  - type: text
    content: 'blessing that is brought to you, because God has dealt graciously with me, and because I have enough.” Thus he '
  - type: note
    content: '[2 Sam. 13:25, 27; 2 Kgs. 5:23]'
  - type: text
    content: urged him, and he took it.
  '12':
  - type: text
    content: Then Esau said, “Let us journey on our way, and I will go ahead of
  - type: note
    content: Or along with
  - type: text
    content: ' you.” '
  '13':
  - type: text
    content: 'But Jacob said to him, “My lord knows that the children are frail, and that the nursing flocks and herds are a care to me. If they are driven hard for one day, all the flocks will die. '
  '14':
  - type: text
    content: 'Let my lord pass on ahead of his servant, and I will lead on slowly, at the pace of the livestock that are ahead of me and at the pace of the children, until I come to my lord '
  - type: note
    content: ch. 32:3
  - type: text
    content: in Seir.”
  '15':
  - type: text
    content: 'So Esau said, “Let me leave with you some of the people who are with me.” But he said, “What need is there? '
  - type: note
    content: ver. 8; ch. 34:11; 47:25; Ruth 2:13
  - type: text
    content: 'Let me find favor in the sight of my lord.” '
  '16':
  - type: text
    content: 'So Esau returned that day on his way to '
  - type: note
    content: ch. 32:3
  - type: text
    content: 'Seir. '
  '17':
  - type: text
    content: 'But Jacob journeyed to '
  - type: note
    content: Josh. 13:27; Judg. 8:5; Ps. 60:6
  - type: text
    content: Succoth, and built himself a house and made booths for his livestock. Therefore the name of the place is called Succoth.
  - type: note
    content: Succoth means booths
  '18':
  - type: text
    content: And Jacob came safely
  - type: note
    content: Or peacefully
  - type: text
    content: ' to the city of '
  - type: note
    content: Josh. 24:1; Judg. 9:1; Ps. 60:6; Acts 7:16
  - type: text
    content: 'Shechem, which is in the land of Canaan, on his way from Paddan-aram, and he camped before the city. '
  '19':
  - type: text
    content: 'And from the sons of '
  - type: note
    content: Acts 7:16
  - type: text
    content: 'Hamor, Shechem’s father, '
  - type: note
    content: Josh. 24:32; John 4:5
  - type: text
    content: he bought for a hundred pieces of money
  - type: note
    content: Hebrew a hundred qesitah; a unit of money of uncertain value
  - type: text
    content: ' the piece of land on which he had pitched his tent. '
  '2':
  - type: text
    content: 'And he put the servants with their children in front, then Leah with her children, and Rachel and Joseph last of all. '
  '20':
  - type: text
    content: There he erected an altar and called it El-Elohe-Israel.
  - type: note
    content: El-Elohe-Israel means God, the God of Israel
  '3':
  - type: text
    content: 'He himself went on before them, '
  - type: note
    content: ch. 18:2; 42:6; 43:26
  - type: text
    content: bowing himself to the ground seven times, until he came near to his brother.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 32:28
  - type: text
    content: 'But Esau ran to meet him and embraced him '
  - type: note
    content: ch. 45:14
  - type: text
    content: 'and fell on his neck and kissed him, and they wept. '
  '5':
  - type: text
    content: 'And when Esau lifted up his eyes and saw the women and children, he said, “Who are these with you?” Jacob said, '
  - type: note
    content: ch. 48:9; Ps. 127:3; Isa. 8:18
  - type: text
    content: '“The children whom God has graciously given your servant.” '
  '6':
  - type: text
    content: 'Then the servants drew near, they and their children, and bowed down. '
  '7':
  - type: text
    content: 'Leah likewise and her children drew near and bowed down. And last Joseph and Rachel drew near, and they bowed down. '
  '8':
  - type: text
    content: 'Esau said, “What do you mean by '
  - type: note
    content: ch. 32:16
  - type: text
    content: all this company
  - type: note
    content: Hebrew camp
  - type: text
    content: ' that I met?” Jacob answered, '
  - type: note
    content: ver. 15; ch. 32:5
  - type: text
    content: '“To find favor in the sight of my lord.” '
  '9':
  - type: text
    content: 'But Esau said, “I have enough, my brother; keep what you have for yourself.” '
