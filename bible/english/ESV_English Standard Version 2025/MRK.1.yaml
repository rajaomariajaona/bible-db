document_id: MRK.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'The beginning of the gospel of Jesus Christ, '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: the Son of God.
  - type: note
    content: Some manuscripts omit the Son of God
  '10':
  - type: text
    content: 'And when he came up out of the water, immediately he '
  - type: note
    content: Acts 7:56
  - type: text
    content: 'saw '
  - type: note
    content: Isa. 64:1
  - type: text
    content: 'the heavens being torn open '
  - type: note
    content: John 1:32, 33; [Luke 4:18, 21; Acts 10:38]
  - type: text
    content: 'and the Spirit descending on him like a dove. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: John 12:28
  - type: text
    content: 'a voice came from heaven, '
  - type: note
    content: '[ch. 9:7; Ps. 2:7; Isa. 42:1; Eph. 1:6; Col. 1:13; 2 Pet. 1:17; 1 John 5:9]'
  - type: text
    content: “You are my beloved Son;
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' with you I am well pleased.”'
  - type: heading
    content: The Temptation of Jesus
  '12':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 4:1-11; Luke 4:1-13
  - type: text
    content: 'The Spirit immediately drove him out into the wilderness. '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'And he was in the wilderness forty days, being '
  - type: note
    content: '[Heb. 2:18; 4:15]'
  - type: text
    content: 'tempted by '
  - type: note
    content: See 1 Chr. 21:1
  - type: text
    content: 'Satan. And he was with the wild animals, and '
  - type: note
    content: Matt. 26:53; Luke 22:43
  - type: text
    content: the angels were ministering to him.
  - type: heading
    content: Jesus Begins His Ministry
  '14':
  - type: text
    content: ' '
  - type: note
    content: Matt. 4:12; 14:3; Luke 3:20; [ John 3:24 ]
  - type: text
    content: 'Now after John was arrested, Jesus '
  - type: note
    content: Matt. 4:17, 23
  - type: text
    content: 'came into Galilee, proclaiming the gospel of God, '
  '15':
  - type: text
    content: 'and saying, '
  - type: note
    content: Dan. 9:25; Gal. 4:4; Eph. 1:10; [Luke 21:8; John 7:8]
  - type: text
    content: '“The time is fulfilled, and '
  - type: note
    content: See Matt. 3:2
  - type: text
    content: the kingdom of God is at hand;
  - type: note
    content: Or the kingdom of God has come near
  - type: text
    content: ' '
  - type: note
    content: Acts 19:4; 20:21; Heb. 6:1
  - type: text
    content: repent and believe in the gospel.”
  - type: heading
    content: Jesus Calls the First Disciples
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-20, see Matt. 4:18-22; [ Luke 5:2-11; John 1:40-42 ]
  - type: text
    content: 'Passing alongside the Sea of Galilee, he saw Simon and Andrew the brother of Simon casting a net into the sea, for they were fishermen. '
  '17':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Follow me, and I will make you become '
  - type: note
    content: Matt. 13:47
  - type: text
    content: fishers of men.”
  - type: note
    content: The Greek word anthropoi refers here to both men and women
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And immediately they left their nets and followed him. '
  '19':
  - type: text
    content: 'And going on a little farther, he saw James the son of Zebedee and John his brother, who were in their boat mending the nets. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-8, see Matt. 3:1-11; Luke 3:2-16
  - type: text
    content: As it is written in Isaiah the prophet,
  - type: note
    content: Some manuscripts in the prophets
  - type: note
    content: Matt. 11:10; Luke 1:17, 76; 7:27; Cited from Mal. 3:1
  - type: text
    content: “Behold, I send my messenger before your face,
  - type: text
    content: who will prepare your way,
  '20':
  - type: text
    content: And immediately he called them, and they left their father Zebedee in the boat with the hired servants and followed him.
  - type: heading
    content: Jesus Heals a Man with an Unclean Spirit
  '21':
  - type: text
    content: ' '
  - type: note
    content: Matt. 4:13; For ver. 21-28, see Luke 4:31-37
  - type: text
    content: 'And they went into Capernaum, and immediately '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'on the Sabbath '
  - type: note
    content: ver. 39; See Matt. 4:23
  - type: text
    content: 'he entered the synagogue and was teaching. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: See Matt. 7:28, 29
  - type: text
    content: 'they were astonished at his teaching, '
  - type: note
    content: See Matt. 7:28, 29
  - type: text
    content: 'for he taught them as one who had authority, and not as the scribes. '
  '23':
  - type: text
    content: 'And immediately there was in their synagogue a man with an unclean spirit. And he cried out, '
  '24':
  - type: note
    content: See Matt. 8:29
  - type: text
    content: '“What have you to do with us, Jesus of Nazareth? Have you come to destroy us? '
  - type: note
    content: '[ver. 34; Acts 19:15; James 2:19]'
  - type: text
    content: I know who you are—
  - type: note
    content: John 6:69; Acts 3:14; Rev. 3:7; [Luke 1:35; Heb. 7:26; 1 John 2:20]
  - type: text
    content: 'the Holy One of God.” '
  '25':
  - type: text
    content: 'But Jesus '
  - type: note
    content: See Matt. 12:16
  - type: text
    content: 'rebuked him, saying, '
  - type: text
    content: “Be silent, and come out of him!”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And the unclean spirit, '
  - type: note
    content: ch. 9:26
  - type: text
    content: 'convulsing him and '
  - type: note
    content: ch. 5:7; Acts 8:7
  - type: text
    content: 'crying out with a loud voice, came out of him. '
  '27':
  - type: text
    content: 'And they were all '
  - type: note
    content: '[Matt. 8:27]'
  - type: text
    content: 'amazed, so that they questioned among themselves, saying, “What is this? '
  - type: note
    content: Acts 17:19
  - type: text
    content: 'A new teaching with authority! He commands even the unclean spirits, and they obey him.” '
  '28':
  - type: text
    content: And at once his fame spread everywhere throughout all the surrounding region of Galilee.
  - type: heading
    content: Jesus Heals Many
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-34, see Matt. 8:14-16; Luke 4:38-41
  - type: text
    content: And immediately he
  - type: note
    content: Some manuscripts they
  - type: text
    content: ' '
  - type: note
    content: ver. 21, 23
  - type: text
    content: 'left the synagogue and entered the house of Simon and Andrew, with James and John. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: John 1:23; Cited from Isa. 40:3
  - type: text
    content: 'the voice of one crying in the wilderness:'
  - type: note
    content: Luke 1:76
  - type: text
    content: ‘Prepare
  - type: note
    content: 'Or crying: Prepare in the wilderness'
  - type: text
    content: ' the way of the Lord,'
  - type: text
    content: make his paths straight,’”
  '30':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Cor. 9:5
  - type: text
    content: 'Simon’s mother-in-law lay ill with a fever, and immediately they told him about her. '
  '31':
  - type: text
    content: 'And he came and '
  - type: note
    content: ch. 9:27; Acts 3:7; 9:41
  - type: text
    content: took her by the hand and lifted her up, and the fever left her, and she began to serve them.
  '32':
  - type: text
    content: 'That evening at sundown they brought to him all who were sick or '
  - type: note
    content: See Matt. 4:24
  - type: text
    content: 'oppressed by demons. '
  '33':
  - type: text
    content: 'And the whole city was gathered together at the door. '
  '34':
  - type: note
    content: See Matt. 4:23
  - type: text
    content: 'And he healed many who were sick with various diseases, and cast out many demons. And '
  - type: note
    content: ch. 3:11, 12; [Acts 16:17, 18]
  - type: text
    content: he would not permit the demons to speak, because they knew him.
  - type: heading
    content: Jesus Preaches in Galilee
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-38, see Luke 4:42, 43
  - type: text
    content: 'And rising very early in the morning, while it was still dark, he departed and went out to a desolate place, and '
  - type: note
    content: Luke 5:16; See Matt. 14:23
  - type: text
    content: 'there he prayed. '
  '36':
  - type: text
    content: 'And Simon and those who were with him searched for him, '
  '37':
  - type: text
    content: 'and they found him and said to him, '
  - type: note
    content: '[John 12:19]'
  - type: text
    content: '“Everyone is looking for you.” '
  '38':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Let us go on to the next towns, that I may preach there also, for '
  - type: note
    content: Isa. 61:1
  - type: text
    content: that is why I came out.”
  - type: text
    content: ' '
  '39':
  - type: note
    content: '[Luke 4:44]'
  - type: text
    content: 'And '
  - type: note
    content: ver. 21
  - type: text
    content: he went throughout all Galilee, preaching in their synagogues and casting out demons.
  - type: heading
    content: Jesus Cleanses a Leper
  '4':
  - type: text
    content: ' '
  - type: note
    content: John 1:6, 7
  - type: text
    content: 'John appeared, baptizing in '
  - type: note
    content: Josh. 15:61; [Judg. 1:16]
  - type: text
    content: 'the wilderness and proclaiming '
  - type: note
    content: Acts 2:38
  - type: text
    content: 'a baptism of '
  - type: note
    content: ver. 15
  - type: text
    content: 'repentance '
  - type: note
    content: Matt. 26:28; [Luke 1:77]
  - type: text
    content: 'for the forgiveness of sins. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: For ver. 40-44, see Matt. 8:2-4; Luke 5:12-14
  - type: text
    content: And a leper
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' came to him, imploring him, and '
  - type: note
    content: ch. 10:17; Matt. 17:14; 27:29
  - type: text
    content: 'kneeling said to him, '
  - type: note
    content: '[ch. 9:22, 23; Matt. 9:28]'
  - type: text
    content: '“If you will, you can make me clean.” '
  '41':
  - type: text
    content: 'Moved with pity, he stretched out his hand and touched him and said to him, '
  - type: text
    content: “I will; be clean.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And immediately the leprosy left him, and he was made clean. '
  '43':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 9:30
  - type: text
    content: Jesus
  - type: note
    content: Greek he; also verse 45
  - type: text
    content: ' sternly charged him and sent him away at once, '
  '44':
  - type: text
    content: 'and said to him, '
  - type: note
    content: ver. 34; ch. 5:43; 7:36; 8:26; Matt. 9:30; 17:9; See Matt. 12:16
  - type: text
    content: '“See that you say nothing to anyone, but go, '
  - type: note
    content: Luke 17:14
  - type: text
    content: 'show yourself to the priest and '
  - type: note
    content: Lev. 14:2-32
  - type: text
    content: 'offer for your cleansing what Moses commanded, '
  - type: note
    content: ch. 6:11; Luke 9:5; James 5:3
  - type: text
    content: for a proof to them.”
  - type: text
    content: ' '
  '45':
  - type: note
    content: ch. 7:36; Matt. 9:31; [Luke 5:15, 16]
  - type: text
    content: 'But he went out and began to talk freely about it, and to spread the news, so that Jesus could no longer openly enter '
  - type: note
    content: 2 Cor. 11:26
  - type: text
    content: 'a town, but was out in '
  - type: note
    content: 2 Cor. 11:26
  - type: text
    content: 'desolate places, and '
  - type: note
    content: ch. 2:2, 13; 3:7; [John 6:2]
  - type: text
    content: people were coming to him from every quarter.
  '5':
  - type: text
    content: 'And all the country of Judea and all Jerusalem were going out to him and were being baptized by him in the river Jordan, '
  - type: note
    content: Acts 19:18
  - type: text
    content: 'confessing their sins. '
  '6':
  - type: text
    content: 'Now John was '
  - type: note
    content: '[2 Kgs. 1:8; Zech. 13:4; Heb. 11:37]'
  - type: text
    content: 'clothed with camel’s hair and '
  - type: note
    content: '[2 Kgs. 1:8; Zech. 13:4; Heb. 11:37]'
  - type: text
    content: 'wore a leather belt around his waist and ate '
  - type: note
    content: Lev. 11:22
  - type: text
    content: 'locusts and '
  - type: note
    content: 1 Sam. 14:26
  - type: text
    content: 'wild honey. '
  '7':
  - type: text
    content: 'And he preached, saying, '
  - type: note
    content: John 1:15, 27; 3:30, 31; Acts 13:25
  - type: text
    content: '“After me comes he who is mightier than I, the strap of whose sandals I am not worthy to stoop down and untie. '
  '8':
  - type: note
    content: John 1:26; Acts 1:5; 11:16
  - type: text
    content: 'I have baptized you with water, but '
  - type: note
    content: See John 1:33
  - type: text
    content: he will baptize you with the Holy Spirit.”
  - type: heading
    content: The Baptism of Jesus
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-11, see Matt. 3:13-17; Luke 3:21, 22; [ John 1:32-34 ]
  - type: text
    content: 'In those days Jesus '
  - type: note
    content: Matt. 2:23
  - type: text
    content: 'came from Nazareth of Galilee and was baptized by John in the Jordan. '
