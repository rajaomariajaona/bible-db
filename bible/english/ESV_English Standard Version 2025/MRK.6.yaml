document_id: MRK.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Rejected at Nazareth
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see Matt. 13:54-58; [ Luke 4:16-30 ]
  - type: text
    content: 'He went away from there and came to '
  - type: note
    content: Matt. 2:23; Luke 4:23
  - type: text
    content: 'his hometown, and his disciples followed him. '
  '10':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Whenever you enter a house, stay there until you depart from there.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And if any place will not receive you and they will not listen to you, when you leave, '
  - type: note
    content: Acts 13:51; [Neh. 5:13; Acts 18:6]
  - type: text
    content: 'shake off the dust that is on your feet '
  - type: note
    content: See ch. 1:44
  - type: text
    content: as a testimony against them.”
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 9:6
  - type: text
    content: 'So they went out and '
  - type: note
    content: Matt. 10:7, 8
  - type: text
    content: 'proclaimed '
  - type: note
    content: Matt. 3:2; 4:17
  - type: text
    content: 'that people should repent. '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'And they cast out many demons and '
  - type: note
    content: James 5:14
  - type: text
    content: anointed with oil many who were sick and healed them.
  - type: heading
    content: The Death of John the Baptist
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-29, see Matt. 14:1-12; Luke 9:7-9
  - type: text
    content: King Herod heard of it, for Jesus’
  - type: note
    content: Greek his
  - type: text
    content: ' name had become known. Some'
  - type: note
    content: Some manuscripts He
  - type: text
    content: ' said, '
  - type: note
    content: ch. 8:28; Matt. 16:14
  - type: text
    content: “John the Baptist
  - type: note
    content: Greek baptizer; also verse 24
  - type: text
    content: ' has been raised from the dead. That is why these miraculous powers are at work in him.” '
  '15':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'But others said, “He is Elijah.” And others said, “He is '
  - type: note
    content: See Matt. 21:11
  - type: text
    content: 'a prophet, like one of the prophets of old.” '
  '16':
  - type: text
    content: 'But when Herod heard of it, he said, “John, whom I beheaded, has been raised.” '
  '17':
  - type: note
    content: Luke 3:19, 20
  - type: text
    content: 'For it was Herod who had sent and seized John and '
  - type: note
    content: Matt. 11:2; John 3:24
  - type: text
    content: 'bound him in prison for the sake of Herodias, his brother Philip’s wife, because he had married her. '
  '18':
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'For John had been saying to Herod, '
  - type: note
    content: Lev. 18:16; 20:21
  - type: text
    content: '“It is not lawful for you to have your brother’s wife.” '
  '19':
  - type: text
    content: 'And Herodias had a grudge against him and wanted to put him to death. But she could not, '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:21; Luke 4:31; 6:6; 13:10; [Acts 13:14]; See Matt. 4:23
  - type: text
    content: 'on the Sabbath he began to teach in the synagogue, and '
  - type: note
    content: See Matt. 7:28
  - type: text
    content: 'many who heard him were astonished, saying, “Where did this man get these things? What is the wisdom given to him? How are such mighty works done by his hands? '
  '20':
  - type: text
    content: 'for Herod '
  - type: note
    content: '[Matt. 14:5; 21:26]'
  - type: text
    content: 'feared John, knowing that he was a righteous and holy man, and he kept him safe. When he heard him, he was greatly perplexed, and yet he '
  - type: note
    content: ch. 12:37; [ch. 4:16]
  - type: text
    content: heard him gladly.
  '21':
  - type: text
    content: 'But an opportunity came when Herod '
  - type: note
    content: Gen. 40:20
  - type: text
    content: 'on his birthday '
  - type: note
    content: 1 Kgs. 3:15; Esth. 1:3; 2:18
  - type: text
    content: 'gave a banquet for his nobles and military commanders and the leading men of Galilee. '
  '22':
  - type: text
    content: 'For when Herodias’s daughter came in and danced, she pleased Herod and his guests. And the king said to the girl, “Ask me for whatever you wish, and I will give it to you.” '
  '23':
  - type: text
    content: 'And he vowed to her, “Whatever you ask me, I will give you, '
  - type: note
    content: Esth. 5:3; 7:2
  - type: text
    content: 'up to half of my kingdom.” '
  '24':
  - type: text
    content: 'And she went out and said to her mother, “For what should I ask?” And she said, “The head of John the Baptist.” '
  '25':
  - type: text
    content: 'And she came in immediately with haste to the king and asked, saying, “I want you to give me at once the head of John the Baptist on a platter.” '
  '26':
  - type: text
    content: 'And the king was exceedingly sorry, but because of his oaths and his guests he did not want to break his word to her. '
  '27':
  - type: text
    content: And immediately the king sent an executioner with orders to bring John’s
  - type: note
    content: Greek his
  - type: text
    content: ' head. He went and beheaded him in the prison '
  '28':
  - type: text
    content: 'and brought his head on a platter and gave it to the girl, and the girl gave it to her mother. '
  '29':
  - type: text
    content: 'When his '
  - type: note
    content: See Matt. 9:14
  - type: text
    content: disciples heard of it, they came and took his body and laid it in a tomb.
  - type: heading
    content: Jesus Feeds the Five Thousand
  '3':
  - type: note
    content: '[Luke 4:22; John 6:42]'
  - type: text
    content: 'Is not this '
  - type: note
    content: '[Matt. 13:55]'
  - type: text
    content: the carpenter,
  - type: note
    content: Or builder
  - type: text
    content: ' the son of Mary and '
  - type: note
    content: See ch. 3:31
  - type: text
    content: 'brother of James and Joses and Judas and Simon? And are not his sisters here with us?” And '
  - type: note
    content: See Matt. 11:6
  - type: text
    content: 'they took offense at him. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Luke 9:10
  - type: note
    content: Matt. 10:2; Luke 6:13; 17:5; 22:14; 24:10
  - type: text
    content: 'The apostles returned to Jesus and told him all that they had done and taught. '
  '31':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Come away by yourselves to a desolate place and rest a while.”
  - type: text
    content: ' For many were coming and going, and '
  - type: note
    content: ch. 3:20
  - type: text
    content: 'they had no leisure even to eat. '
  '32':
  - type: note
    content: For ver. 32-44, see Matt. 14:13-21; Luke 9:10-17; John 6:1-13; [ch. 8:2-9]
  - type: text
    content: 'And they went away in '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'the boat to a desolate place by themselves. '
  '33':
  - type: text
    content: 'Now many saw them going and '
  - type: note
    content: ver. 54
  - type: text
    content: 'recognized them, and they ran there on foot from all the towns and got there ahead of them. '
  '34':
  - type: text
    content: 'When he went ashore he '
  - type: note
    content: '[Matt. 9:36]'
  - type: text
    content: 'saw a great crowd, and '
  - type: note
    content: '[Matt. 9:36]'
  - type: text
    content: 'he had compassion on them, because they were like sheep without a shepherd. And he began to teach them many things. '
  '35':
  - type: text
    content: 'And when it grew late, his disciples came to him and said, “This is a desolate place, and the hour is now late. '
  '36':
  - type: note
    content: ver. 45; [Matt. 15:23]
  - type: text
    content: 'Send them away to go into the surrounding countryside and villages and buy themselves something to eat.” '
  '37':
  - type: text
    content: 'But he answered them, '
  - type: note
    content: '[2 Kgs. 4:42-44]'
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: ' And '
  - type: note
    content: '[John 6:7]'
  - type: text
    content: 'they said to him, '
  - type: note
    content: '[Num. 11:13, 21, 22]'
  - type: text
    content: “Shall we go and buy two hundred denarii
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' worth of bread and give it to them to eat?” '
  '38':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “How many loaves do you have? Go and see.”
  - type: text
    content: ' And when they had found out, they said, '
  - type: note
    content: ch. 8:19
  - type: text
    content: '“Five, and two fish.” '
  '39':
  - type: text
    content: 'Then he commanded them all to sit down in groups on the green grass. '
  '4':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: Luke 4:24; John 4:44; [Jer. 11:21; 12:6; John 7:5]
  - type: text
    content: “A prophet is not without honor, except in his hometown and among his relatives and in his own household.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'So they sat down in groups, by hundreds and by fifties. '
  '41':
  - type: text
    content: 'And taking the five loaves and the two fish, he '
  - type: note
    content: ch. 7:34; John 11:41; 17:1
  - type: text
    content: 'looked up to heaven and '
  - type: note
    content: ch. 8:7; 14:22; 1 Sam. 9:13; Matt. 26:26; Luke 24:30; [1 Cor. 14:16]
  - type: text
    content: 'said a blessing and broke the loaves and gave them to the disciples to set before the people. And he divided the two fish among them all. '
  '42':
  - type: text
    content: 'And they all ate and were satisfied. '
  '43':
  - type: text
    content: 'And they took up twelve baskets full of broken pieces and of the fish. '
  '44':
  - type: text
    content: And those who ate the loaves were five thousand men.
  - type: heading
    content: Jesus Walks on the Water
  '45':
  - type: text
    content: ' '
  - type: note
    content: For ver. 45-51, see Matt. 14:22-32; John 6:15-21
  - type: text
    content: 'Immediately he '
  - type: note
    content: '[Matt. 8:18]'
  - type: text
    content: 'made his disciples get into '
  - type: note
    content: ver. 32
  - type: text
    content: 'the boat and go before him to the other side, '
  - type: note
    content: ch. 8:22; [Luke 9:10]
  - type: text
    content: 'to Bethsaida, while he dismissed the crowd. '
  '46':
  - type: text
    content: 'And after he had taken leave of them, '
  - type: note
    content: Luke 6:12; 9:28; [ch. 1:35; Luke 5:16]
  - type: text
    content: 'he went up on the mountain to pray. '
  '47':
  - type: text
    content: 'And when '
  - type: note
    content: '[ch. 13:35]'
  - type: text
    content: 'evening came, the boat was out on the sea, and he was alone on the land. '
  '48':
  - type: text
    content: 'And he saw that they were making headway painfully, for the wind was against them. And about '
  - type: note
    content: '[See ver. 47 above]'
  - type: text
    content: the fourth watch of the night
  - type: note
    content: That is, between 3 a.m. and 6 a.m.
  - type: text
    content: ' he came to them, walking on the sea. '
  - type: note
    content: '[Luke 24:28]'
  - type: text
    content: 'He meant to pass by them, '
  '49':
  - type: text
    content: 'but when they saw him walking on the sea they thought it was a ghost, and cried out, '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 9:23; Gen. 19:22]'
  - type: text
    content: 'he could do no mighty work there, except that '
  - type: note
    content: See ch. 5:23
  - type: text
    content: 'he laid his hands on a few sick people and healed them. '
  '50':
  - type: text
    content: 'for they all saw him and '
  - type: note
    content: '[Luke 24:37]'
  - type: text
    content: 'were terrified. But immediately he spoke to them and said, '
  - type: note
    content: Matt. 17:7; [Deut. 31:6; Isa. 41:13; 43:1, 2; John 16:33]
  - type: text
    content: '“Take heart; it is I. '
  - type: note
    content: Matt. 17:7; [Deut. 31:6; Isa. 41:13; 43:1, 2; John 16:33]
  - type: text
    content: Do not be afraid.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And he got into the boat with them, and the wind ceased. And they were utterly astounded, '
  '52':
  - type: text
    content: 'for '
  - type: note
    content: ch. 8:17-21
  - type: text
    content: 'they did not understand about the loaves, but their hearts '
  - type: note
    content: John 12:40; Rom. 11:7; 2 Cor. 3:14; See ch. 3:5
  - type: text
    content: were hardened.
  - type: heading
    content: Jesus Heals the Sick in Gennesaret
  '53':
  - type: text
    content: ' '
  - type: note
    content: For ver. 53-56, see Matt. 14:34-36; [ John 6:24, 25 ]
  - type: text
    content: 'When they had crossed over, they came to land at '
  - type: note
    content: Luke 5:1
  - type: text
    content: 'Gennesaret and moored to the shore. '
  '54':
  - type: text
    content: 'And when they got out of the boat, the people immediately '
  - type: note
    content: ver. 33
  - type: text
    content: 'recognized him '
  '55':
  - type: text
    content: 'and ran about the whole region and began to bring '
  - type: note
    content: Matt. 4:24
  - type: text
    content: 'the sick people '
  - type: note
    content: Luke 5:18
  - type: text
    content: 'on their beds to wherever they heard he was. '
  '56':
  - type: text
    content: 'And wherever he came, in villages, cities, or countryside, '
  - type: note
    content: Acts 5:15
  - type: text
    content: 'they laid the sick in the marketplaces and implored him that they might touch even '
  - type: note
    content: See Matt. 9:20
  - type: text
    content: 'the fringe of his garment. And '
  - type: note
    content: ch. 3:10; Luke 6:19
  - type: text
    content: as many as touched it were made well.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: '[Matt. 8:10]'
  - type: text
    content: he marveled because of their unbelief.
  - type: note
    content: Matt. 9:35; 11:1; Luke 8:1; 13:22
  - type: text
    content: And he went about among the villages teaching.
  - type: heading
    content: Jesus Sends Out the Twelve Apostles
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:13-15; For ver. 7-11, see Matt. 10:1, 5, 9-14; Luke 9:1, 3-5; [ Luke 10:4-11; 22:35 ]
  - type: text
    content: 'And he called the twelve and began to send them out two by two, and gave them authority over the unclean spirits. '
  '8':
  - type: text
    content: 'He charged them to take nothing for their journey except a staff—no bread, no bag, no money in their belts— '
  '9':
  - type: text
    content: 'but to '
  - type: note
    content: Acts 12:8
  - type: text
    content: wear sandals and not put on two tunics.
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' '
