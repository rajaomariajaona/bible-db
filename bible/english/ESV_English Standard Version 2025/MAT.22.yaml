document_id: MAT.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Wedding Feast
  - type: text
    content: 'And again Jesus '
  - type: note
    content: ch. 13:34
  - type: text
    content: 'spoke to them in parables, saying, '
  '10':
  - type: text
    content: 'And those servants went out into the roads and '
  - type: note
    content: See ch. 13:47
  - type: text
    content: gathered all whom they found, both bad and good. So the wedding hall was filled with guests.
  '11':
  - type: text
    content: ' '
  - type: text
    content: '“But when the king came in to look at the guests, he saw there '
  - type: note
    content: '[ Rev. 19:8; 22:14 ]'
  - type: text
    content: a man who had no wedding garment.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: ch. 20:13; 26:50
  - type: text
    content: ‘Friend, how did you get in here without a wedding garment?’ And he was speechless.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then the king said to the attendants, ‘Bind him hand and foot and '
  - type: note
    content: See ch. 8:12
  - type: text
    content: 'cast him into the outer darkness. In that place '
  - type: note
    content: See ch. 8:12
  - type: text
    content: there will be weeping and gnashing of teeth.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'For many are '
  - type: note
    content: Rev. 17:14
  - type: text
    content: 'called, but few are '
  - type: note
    content: Rev. 17:14
  - type: text
    content: chosen.”
  - type: heading
    content: Paying Taxes to Caesar
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-32, see Mark 12:13-27; Luke 20:20-38
  - type: text
    content: 'Then the Pharisees went and plotted how '
  - type: note
    content: '[Luke 11:54]'
  - type: text
    content: 'to entangle him in his words. '
  '16':
  - type: text
    content: 'And they sent '
  - type: note
    content: Mark 2:18
  - type: text
    content: 'their disciples to him, along with '
  - type: note
    content: Mark 3:6; [Mark 8:15]
  - type: text
    content: 'the Herodians, saying, “Teacher, '
  - type: note
    content: '[John 3:2]'
  - type: text
    content: 'we know that you are true and teach '
  - type: note
    content: Acts 18:26; [Acts 13:10]
  - type: text
    content: 'the way of God truthfully, and you do not care about anyone’s opinion, for '
  - type: note
    content: See Acts 10:34
  - type: text
    content: you are not swayed by appearances.
  - type: note
    content: Greek for you do not look at people’s faces
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Tell us, then, what you think. Is it lawful to pay '
  - type: note
    content: ch. 17:25
  - type: text
    content: 'taxes to '
  - type: note
    content: Luke 2:1; 3:1
  - type: text
    content: 'Caesar, or not?” '
  '18':
  - type: text
    content: 'But Jesus, aware of their malice, said, '
  - type: text
    content: '“Why '
  - type: note
    content: See John 8:6
  - type: text
    content: put me to the test, you hypocrites?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Show me the coin for the tax.”
  - type: text
    content: ' And they brought him a denarius.'
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  '2':
  - type: note
    content: For ver. 2-14, [Luke 14:16-24]
  - type: text
    content: '“The kingdom of heaven may be compared to a king who gave '
  - type: note
    content: See Rev. 19:7
  - type: text
    content: a wedding feast for his son,
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “Whose likeness and inscription is this?”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'They said, “Caesar’s.” Then he said to them, '
  - type: note
    content: Rom. 13:7
  - type: text
    content: “Therefore render to Caesar the things that are Caesar’s, and to God the things that are God’s.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'When they heard it, they marveled. And they '
  - type: note
    content: Mark 12:12
  - type: text
    content: left him and went away.
  - type: heading
    content: Sadducees Ask About the Resurrection
  '23':
  - type: text
    content: 'The same day '
  - type: note
    content: ver. 34; ch. 3:7; 16:1; Acts 4:1; 5:17; 23:6
  - type: text
    content: 'Sadducees came to him, '
  - type: note
    content: Acts 23:8; [Acts 4:2]
  - type: text
    content: 'who say that there is no resurrection, and they asked him a question, '
  '24':
  - type: text
    content: 'saying, “Teacher, Moses said, '
  - type: note
    content: '[Deut. 25:5]'
  - type: text
    content: '‘If a man dies having no children, his brother must marry the widow and raise up offspring for his brother.’ '
  '25':
  - type: text
    content: 'Now there were seven brothers among us. The first married and died, and having no offspring left his wife to his brother. '
  '26':
  - type: text
    content: 'So too the second and third, down to the seventh. '
  '27':
  - type: text
    content: 'After them all, the woman died. '
  '28':
  - type: text
    content: In the resurrection, therefore, of the seven, whose wife will she be? For they all had her.”
  '29':
  - type: text
    content: 'But Jesus answered them, '
  - type: text
    content: '“You are wrong, '
  - type: note
    content: John 20:9
  - type: text
    content: 'because you know neither the Scriptures nor '
  - type: note
    content: 1 Cor. 6:14
  - type: text
    content: the power of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: '[Esth. 6:14; Prov. 9:3, 5]'
  - type: text
    content: sent his servants
  - type: note
    content: Or bondservants; also verses 4, 6, 8, 10
  - type: text
    content: ' '
  - type: text
    content: to call those who were invited to the wedding feast, but they would not come.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'For in the resurrection they neither '
  - type: note
    content: ch. 24:38; Luke 17:27
  - type: text
    content: 'marry nor '
  - type: note
    content: ch. 24:38; Luke 17:27
  - type: text
    content: are given in marriage, but are like angels in heaven.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And as for the resurrection of the dead, '
  - type: note
    content: See ch. 21:16
  - type: text
    content: 'have you not read what was said to you by God:'
  - type: text
    content: ' '
  '32':
  - type: note
    content: Acts 7:32; Cited from Ex. 3:6
  - type: text
    content: ‘I am the God of Abraham, and the God of Isaac, and the God of Jacob’? He is not God of the dead, but of the living.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And when the crowd heard it, '
  - type: note
    content: See ch. 7:28
  - type: text
    content: they were astonished at his teaching.
  - type: heading
    content: The Great Commandment
  '34':
  - type: text
    content: ' '
  - type: note
    content: For ver. 34-40, see Mark 12:28-33
  - type: text
    content: 'But when the Pharisees heard that he had silenced '
  - type: note
    content: ver. 23
  - type: text
    content: 'the Sadducees, they gathered together. '
  '35':
  - type: note
    content: '[Luke 10:25-28]'
  - type: text
    content: 'And one of them, '
  - type: note
    content: See Luke 7:30
  - type: text
    content: 'a lawyer, asked him a question '
  - type: note
    content: ver. 18
  - type: text
    content: 'to test him. '
  '36':
  - type: text
    content: '“Teacher, which is the great commandment in the Law?” '
  '37':
  - type: text
    content: 'And he said to him, '
  - type: note
    content: Luke 10:27; Cited from Deut. 6:5
  - type: text
    content: “You shall love the Lord your God with all your heart and with all your soul and with all your mind.
  - type: text
    content: ' '
  '38':
  - type: text
    content: This is the great and first commandment.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And '
  - type: note
    content: '[1 John 4:21]'
  - type: text
    content: 'a second is like it: '
  - type: note
    content: Cited from Lev. 19:18; See ch. 19:19
  - type: text
    content: You shall love your neighbor as yourself.
  - type: text
    content: ' '
  '4':
  - type: note
    content: ch. 21:36
  - type: text
    content: 'Again he sent other servants, saying, ‘Tell those who are invited, “See, I have prepared my '
  - type: note
    content: Luke 11:38; John 21:12, 15 (Gk.)
  - type: text
    content: 'dinner, '
  - type: note
    content: Prov. 9:2
  - type: text
    content: my oxen and my fat calves have been slaughtered, and everything is ready. Come to the wedding feast.”’
  - type: text
    content: ' '
  '40':
  - type: note
    content: '[Rom. 13:8, 10]'
  - type: text
    content: 'On these two commandments depend '
  - type: note
    content: ch. 7:12; [Gal. 5:14]
  - type: text
    content: all the Law and the Prophets.”
  - type: heading
    content: Whose Son Is the Christ?
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-45, see Mark 12:35-37; Luke 20:41-44
  - type: text
    content: 'Now while the Pharisees '
  - type: note
    content: ver. 34
  - type: text
    content: 'were gathered together, Jesus asked them a question, '
  '42':
  - type: text
    content: 'saying, '
  - type: text
    content: '“What do you think about '
  - type: note
    content: See ch. 1:1, 17
  - type: text
    content: the Christ? Whose son is he?”
  - type: text
    content: ' They said to him, '
  - type: note
    content: See ch. 1:1, 17
  - type: text
    content: '“The son of David.” '
  '43':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“How is it then that David, '
  - type: note
    content: Rev. 1:10; 4:2; [2 Sam. 23:2]
  - type: text
    content: in the Spirit, calls him Lord, saying,
  '44':
  - type: text
    content: ' '
  - type: note
    content: Acts 2:34, 35; Heb. 1:13; Cited from Ps. 110:1; [ 1 Cor. 15:25; Heb. 10:13 ]
  - type: text
    content: “‘The Lord said to my Lord,
  - type: text
    content: “Sit at my right hand,
  - type: text
    content: until I put your enemies under your feet”’?
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'If then David calls him Lord, '
  - type: note
    content: '[ Rom. 1:3, 4 ]'
  - type: text
    content: how is he his son?”
  - type: text
    content: ' '
  '46':
  - type: note
    content: '[Luke 14:6]'
  - type: text
    content: 'And no one was able to answer him a word, '
  - type: note
    content: Mark 12:34; Luke 20:40
  - type: text
    content: nor from that day did anyone dare to ask him any more questions.
  '5':
  - type: text
    content: 'But '
  - type: note
    content: '[Heb. 2:3]'
  - type: text
    content: they paid no attention and went off, one to his farm, another to his business,
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'while the rest seized his servants, '
  - type: note
    content: Luke 18:32; Acts 14:5; 1 Thess. 2:2
  - type: text
    content: 'treated them shamefully, and '
  - type: note
    content: See ch. 21:35
  - type: text
    content: killed them.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The king was angry, and he sent his troops and '
  - type: note
    content: ch. 21:41; Luke 19:27
  - type: text
    content: destroyed those murderers and burned their city.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Then he said to his servants, ‘The wedding feast is ready, but those invited were not '
  - type: note
    content: ch. 10:11; Acts 13:46; Rev. 3:4; [Luke 20:35]
  - type: text
    content: worthy.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Go therefore to the main roads and invite to the wedding feast as many as you find.’
  - type: text
    content: ' '
