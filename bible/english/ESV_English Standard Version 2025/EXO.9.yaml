      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:20
      marker-yv: yv-n
    - type: text
      text: '“Rise up early in the morning and present yourself before Pharaoh and say to him, ‘Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, “Let my people go, that they may serve me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For this time I will send all my plagues on you yourself,
    - type: usfm
