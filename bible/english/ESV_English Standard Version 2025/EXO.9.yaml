  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took soot from the kiln and stood before Pharaoh. And Moses threw it in the air, and it became boils breaking out in sores on man and beast. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
