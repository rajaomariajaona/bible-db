document_id: EXO.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Fifth Plague: Egyptian Livestock Die'
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ch. 8:1, 2
  - type: text
    content: '“Go in to Pharaoh and say to him, ‘Thus says '
  - type: note
    content: See ch. 7:16
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, “Let my people go, that they may serve me. '
  '10':
  - type: text
    content: 'So they took soot from the kiln and stood before Pharaoh. And Moses threw it in the air, and it became boils breaking out in sores on man and beast. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:11; 2 Tim. 3:9
  - type: text
    content: 'the magicians could not stand before Moses because of the boils, for the boils came upon the magicians and upon all the Egyptians. '
  '12':
  - type: note
    content: See ch. 4:21
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened the heart of Pharaoh, and he did not listen to them, as '
  - type: note
    content: ch. 4:21
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to Moses.'
  - type: heading
    content: 'The Seventh Plague: Hail'
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ch. 7:15; 8:20
  - type: text
    content: '“Rise up early in the morning and present yourself before Pharaoh and say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, “Let my people go, that they may serve me. '
  '14':
  - type: text
    content: For this time I will send all my plagues on you yourself,
  - type: note
    content: Hebrew on your heart
  - type: text
    content: ' and on your servants and your people, so '
  - type: note
    content: ch. 8:10
  - type: text
    content: 'that you may know that there is none like me in all the earth. '
  '15':
  - type: text
    content: 'For by now I could have put out my hand and struck you and your people with pestilence, and you would have been cut off from the earth. '
  '16':
  - type: note
    content: Cited Rom. 9:17; [ch. 10:1, 2; 11:9; 14:17; Prov. 16:4]
  - type: text
    content: 'But for this purpose I have raised you up, to show you my power, so '
  - type: note
    content: '[Ps. 83:18]; Isa. 63:12'
  - type: text
    content: 'that my name may be proclaimed in all the earth. '
  '17':
  - type: note
    content: '[Neh. 9:10]'
  - type: text
    content: 'You are still exalting yourself against my people and will not let them go. '
  '18':
  - type: text
    content: 'Behold, about this time tomorrow I will cause very heavy hail to fall, such as never has been in Egypt from the day it was founded until now. '
  '19':
  - type: text
    content: 'Now therefore send, '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'get your livestock and all that you have in the field into safe shelter, for every man and beast that is in the field and is not brought home will die when the hail falls on them.”’” '
  '2':
  - type: text
    content: 'For if you refuse to let them go and still hold them, '
  '20':
  - type: text
    content: 'Then whoever feared the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' among the servants of Pharaoh hurried his slaves and his livestock into the houses, '
  '21':
  - type: text
    content: 'but whoever did not pay attention to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' left his slaves and his livestock in the field.'
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand toward heaven, so that there may be '
  - type: note
    content: Rev. 16:21
  - type: text
    content: 'hail in all the land of Egypt, on man and beast and every plant of the field, in the land of Egypt.” '
  '23':
  - type: text
    content: 'Then Moses stretched out his staff toward heaven, and the '
  - type: note
    content: Ps. 78:47, 48; 105:32; [Josh. 10:11; 1 Sam. 12:17; Ps. 18:13; 148:8; Isa. 30:30; Ezek. 38:22; Rev. 8:7]
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and hail, and fire ran down to the earth. And the '
  - type: text
    content: Lord
  - type: text
    content: ' rained hail upon the land of Egypt. '
  '24':
  - type: text
    content: 'There was hail and fire flashing continually in the midst of the hail, very heavy hail, such as had never been in all the land of Egypt since it became a nation. '
  '25':
  - type: text
    content: 'The hail struck down everything that was in the field in all the land of Egypt, both man and beast. And the hail '
  - type: note
    content: Ps. 78:47; 105:33
  - type: text
    content: 'struck down every plant of the field and broke every tree of the field. '
  '26':
  - type: note
    content: ver. 4, 6; ch. 8:22; 10:23; 11:7; 12:13; [Isa. 32:18]
  - type: text
    content: Only in the land of Goshen, where the people of Israel were, was there no hail.
  '27':
  - type: text
    content: 'Then Pharaoh sent and called Moses and Aaron and said to them, “This time '
  - type: note
    content: ch. 10:16
  - type: text
    content: 'I have sinned; the '
  - type: note
    content: 2 Chr. 12:6; Ps. 129:4; 145:17; Lam. 1:18; Dan. 9:14
  - type: text
    content: Lord
  - type: text
    content: ' is in the right, and I and my people are in the wrong. '
  '28':
  - type: note
    content: See ch. 8:8
  - type: text
    content: 'Plead with the '
  - type: text
    content: Lord
  - type: text
    content: ', for there has been enough of God’s thunder and hail. I will let you go, and you shall stay no longer.” '
  '29':
  - type: text
    content: 'Moses said to him, “As soon as I have gone out of the city, '
  - type: note
    content: 1 Kgs. 8:22, 38; Ps. 143:6; Isa. 1:15
  - type: text
    content: 'I will stretch out my hands to the '
  - type: text
    content: Lord
  - type: text
    content: '. The thunder will cease, and there will be no more hail, so that you may know that '
  - type: note
    content: Ps. 24:1; 1 Cor. 10:26; [Deut. 10:14]
  - type: text
    content: 'the earth is the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '3':
  - type: text
    content: 'behold, '
  - type: note
    content: ch. 7:4
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will fall with a very severe plague upon your livestock that are in the field, the horses, the donkeys, the camels, the herds, and the flocks. '
  '30':
  - type: text
    content: 'But as for you and your servants, '
  - type: note
    content: Isa. 26:10
  - type: text
    content: 'I know that you do not yet fear the '
  - type: text
    content: Lord
  - type: text
    content: ' God.” '
  '31':
  - type: text
    content: '(The flax and the barley were struck down, for the barley was in the ear and the flax was in bud. '
  '32':
  - type: text
    content: But the wheat and the emmer
  - type: note
    content: A type of wheat
  - type: text
    content: ' were not struck down, for they are late in coming up.) '
  '33':
  - type: text
    content: 'So Moses went out of the city from Pharaoh and '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'stretched out his hands to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the thunder and the hail ceased, and the rain no longer poured upon the earth. '
  '34':
  - type: text
    content: 'But when Pharaoh saw that the rain and the hail and the thunder had ceased, he sinned yet again and '
  - type: note
    content: See ch. 7:14
  - type: text
    content: 'hardened his heart, '
  - type: note
    content: 1 Sam. 6:6
  - type: text
    content: 'he and his servants. '
  '35':
  - type: text
    content: 'So '
  - type: note
    content: See ch. 4:21
  - type: text
    content: 'the heart of Pharaoh was hardened, and he did not let the people of Israel go, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken through Moses.'
  '4':
  - type: note
    content: ch. 8:22; 11:7
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will make a distinction between the livestock of Israel and the livestock of Egypt, so that nothing of all that belongs to the people of Israel shall die.”’” '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' set a time, saying, “Tomorrow the '
  - type: text
    content: Lord
  - type: text
    content: ' will do this thing in the land.” '
  '6':
  - type: text
    content: 'And the next day the '
  - type: text
    content: Lord
  - type: text
    content: ' did this thing. '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'All the livestock of the Egyptians died, but not one of the livestock of the people of Israel died. '
  '7':
  - type: text
    content: 'And Pharaoh sent, and behold, not one of the livestock of Israel was dead. But '
  - type: note
    content: ch. 7:14
  - type: text
    content: the heart of Pharaoh was hardened, and he did not let the people go.
  - type: heading
    content: 'The Sixth Plague: Boils'
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Take handfuls of soot from the kiln, and let Moses throw them in the air in the sight of Pharaoh. '
  '9':
  - type: text
    content: 'It shall become fine dust over all the land of Egypt, and become '
  - type: note
    content: Lev. 13:18; Deut. 28:27; 2 Kgs. 20:7; Job 2:7; Isa. 38:21; Rev. 16:2
  - type: text
    content: 'boils breaking out in sores on man and beast throughout all the land of Egypt.” '
