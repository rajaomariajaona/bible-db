        - type: text
          text: 4:21
      marker-yv: yv-n
    - type: text
      text: 'the heart of Pharaoh was hardened, and he did not let the people of Israel go, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
