        children:
        - type: text
          text: 8:8
      marker-yv: yv-n
    - type: text
      text: 'Plead with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for there has been enough of God’s thunder and hail. I will let you go, and you shall stay no longer.” '
  '29':
  - type: usfm
