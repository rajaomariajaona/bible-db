  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was hail and fire flashing continually in the midst of the hail, very heavy hail, such as had never been in all the land of Egypt since it became a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hail struck down everything that was in the field in all the land of Egypt, both man and beast. And the hail '
