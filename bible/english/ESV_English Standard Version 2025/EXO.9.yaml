      marker-yv: yv-n
    - type: text
      text: 'stretched out his hands to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the thunder and the hail ceased, and the rain no longer poured upon the earth. '
  '34':
  - type: usfm
    marker: p
