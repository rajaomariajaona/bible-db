      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 3:9
      marker-yv: yv-n
    - type: text
      text: 'the magicians could not stand before Moses because of the boils, for the boils came upon the magicians and upon all the Egyptians. '
  '12':
  - type: usfm
