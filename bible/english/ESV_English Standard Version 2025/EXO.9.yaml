      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:14
      marker-yv: yv-n
    - type: text
      text: 'hardened his heart, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 6:6
      marker-yv: yv-n
    - type: text
      text: 'he and his servants. '
  '35':
