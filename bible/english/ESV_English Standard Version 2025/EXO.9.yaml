        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on your heart
      marker-yv: yv-n
    - type: text
      text: ' and on your servants and your people, so '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:10
      marker-yv: yv-n
    - type: text
      text: 'that you may know that there is none like me in all the earth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by now I could have put out my hand and struck you and your people with pestilence, and you would have been cut off from the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
