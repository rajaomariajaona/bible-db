        children:
        - type: text
          text: ']; Isa. 63:12'
      marker-yv: yv-n
    - type: text
      text: 'that my name may be proclaimed in all the earth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 9:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'You are still exalting yourself against my people and will not let them go. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, about this time tomorrow I will cause very heavy hail to fall, such as never has been in Egypt from the day it was founded until now. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore send, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'get your livestock and all that you have in the field into safe shelter, for every man and beast that is in the field and is not brought home will die when the hail falls on them.”’” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you refuse to let them go and still hold them, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then whoever feared the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' among the servants of Pharaoh hurried his slaves and his livestock into the houses, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but whoever did not pay attention to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' left his slaves and his livestock in the field.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Stretch out your hand toward heaven, so that there may be '
    - type: usfm
