        marker: fr
        children:
        - type: text
          text: '9:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A type of wheat
      marker-yv: yv-n
    - type: text
      text: ' were not struck down, for they are late in coming up.) '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses went out of the city from Pharaoh and '
    - type: usfm
