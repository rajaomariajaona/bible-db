  children:
  - type: text
    text: Laws Concerning Warfare
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“When you go out to war against your enemies, and see '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 17:18
      metadata:
        usfm: JOS.17.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 20:7
      metadata:
        usfm: PSA.20.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 31:1
      metadata:
        usfm: ISA.31.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'horses and chariots and an army larger than your own, you shall not be afraid of them, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:6
      metadata:
        usfm: DEU.31.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.31.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 13:12
      metadata:
        usfm: 2CH.13.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:8
      metadata:
        usfm: 2CH.32.8
    marker-yv: yv-n
  - type: text
    text: 'with you, who brought you up out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And when you draw near to the battle, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 10:8
      metadata:
        usfm: NUM.10.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: NUM.10.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:6
      metadata:
        usfm: NUM.31.6
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the priest shall come forward and speak to the people '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and shall say to them, ‘Hear, O Israel, today you are drawing near for battle against your enemies: let not your heart faint. Do not fear or panic or be in dread of them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is he who goes with you '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:30
      metadata:
        usfm: DEU.1.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:22
      metadata:
        usfm: DEU.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 23:10
      metadata:
        usfm: JOS.23.10
    marker-yv: yv-n
  - type: text
    text: 'to fight for you against your enemies, to give you the victory.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the officers shall speak to the people, saying, ‘Is there any man who has built a new house and has not dedicated it? Let him go back to his house, lest he die in the battle and another man dedicate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And is there any man who has planted a vineyard and has not '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:30
      metadata:
        usfm: DEU.28.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lev. 19:23-25
      metadata:
        usfm: LEV.19.23+LEV.19.24+LEV.19.25
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 9:7
      metadata:
        usfm: 1CO.9.7
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'enjoyed its fruit? Let him go back to his house, lest he die in the battle and another man enjoy its fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:5
      metadata:
        usfm: DEU.24.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:30
      metadata:
        usfm: DEU.28.30
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'And is there any man who has betrothed a wife and has not taken her? Let him go back to his house, lest he die in the battle and another man take her.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the officers shall speak further to the people, and say, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 7:3
      metadata:
        usfm: JDG.7.3
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '‘Is there any man who is fearful and fainthearted? Let him go back to his house, lest he make the heart of his fellows melt like his own.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And when the officers have finished speaking to the people, then commanders shall be appointed at the head of the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“When you draw near to a city to fight against it, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 21:13
      metadata:
        usfm: JDG.21.13
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: text
      text: '2:26; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 20:18
      metadata:
        usfm: 2SA.20.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: 2SA.20.20
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'offer terms of peace to it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And if it responds to you peaceably and it opens to you, then all the people who are found in it shall do forced labor for you and shall serve you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But if it makes no peace with you, but makes war against you, then you shall besiege it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God gives it into your hand, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 31:7
      metadata:
        usfm: NUM.31.7
    marker-yv: yv-n
  - type: text
    text: 'you shall put all its males to the sword, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 31:9
      metadata:
        usfm: NUM.31.9
    marker-yv: yv-n
  - type: text
    text: 'but the women and the little ones, the livestock, and everything else in the city, all its spoil, you '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 8:2
      metadata:
        usfm: JOS.8.2
    marker-yv: yv-n
  - type: text
    text: 'shall take as plunder for yourselves. And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 22:8
      metadata:
        usfm: JOS.22.8
    marker-yv: yv-n
  - type: text
    text: 'you shall enjoy the spoil of your enemies, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has given you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus you shall do to all the cities that are very far from you, which are not cities of the nations here. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:1
      metadata:
        usfm: DEU.7.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DEU.7.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 33:52
      metadata:
        usfm: NUM.33.52
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 11:14
      metadata:
        usfm: JOS.11.14
    marker-yv: yv-n
  - type: text
    text: 'in the cities of these peoples that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you for an inheritance, you shall save alive nothing that breathes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:2
      metadata:
        usfm: DEU.7.2
    marker-yv: yv-n
  - type: text
    text: you shall devote them to complete destruction,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, set apart (devote) as an offering to the Lord (for destruction)
    marker-yv: yv-n
  - type: text
    text: ' the Hittites and the Amorites, the Canaanites and the Perizzites, the Hivites and the Jebusites, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has commanded, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'that '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:4
      metadata:
        usfm: DEU.7.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:30
      metadata:
        usfm: DEU.12.30
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: DEU.12.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:9
      metadata:
        usfm: DEU.18.9
    marker-yv: yv-n
  - type: text
    text: 'they may not teach you to do according to all their abominable practices that they have done for their gods, and so you '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 23:33
      metadata:
        usfm: EXO.23.33
    marker-yv: yv-n
  - type: text
    text: 'sin against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“When you besiege a city for a long time, making war against it in order to take it, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Kgs. 3:19
      metadata:
        usfm: 2KI.3.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: 2KI.3.25
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'you shall not destroy its trees by wielding an axe against them. You may eat from them, but you shall not cut them down. Are the trees in the field human, that they should be besieged by you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Only the trees that you know are not trees for food you may destroy and cut down, that you may build siegeworks against the city that makes war with you, until it falls.
