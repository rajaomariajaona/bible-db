document_id: DEU.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws Concerning Warfare
  - type: text
    content: '“When you go out to war against your enemies, and see '
  - type: note
    content: '[Josh. 17:18; Ps. 20:7; Isa. 31:1]'
  - type: text
    content: 'horses and chariots and an army larger than your own, you shall not be afraid of them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is '
  - type: note
    content: ch. 31:6, 8; 2 Chr. 13:12; 32:8
  - type: text
    content: 'with you, who brought you up out of the land of Egypt. '
  '10':
  - type: text
    content: '“When you draw near to a city to fight against it, '
  - type: note
    content: Judg. 21:13; [ch. 2:26; 2 Sam. 20:18, 20]
  - type: text
    content: 'offer terms of peace to it. '
  '11':
  - type: text
    content: 'And if it responds to you peaceably and it opens to you, then all the people who are found in it shall do forced labor for you and shall serve you. '
  '12':
  - type: text
    content: 'But if it makes no peace with you, but makes war against you, then you shall besiege it. '
  '13':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives it into your hand, '
  - type: note
    content: Num. 31:7
  - type: text
    content: 'you shall put all its males to the sword, '
  '14':
  - type: note
    content: Num. 31:9
  - type: text
    content: 'but the women and the little ones, the livestock, and everything else in the city, all its spoil, you '
  - type: note
    content: Josh. 8:2
  - type: text
    content: 'shall take as plunder for yourselves. And '
  - type: note
    content: Josh. 22:8
  - type: text
    content: 'you shall enjoy the spoil of your enemies, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you. '
  '15':
  - type: text
    content: 'Thus you shall do to all the cities that are very far from you, which are not cities of the nations here. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: ch. 7:1, 2; Num. 33:52; Josh. 11:14
  - type: text
    content: 'in the cities of these peoples that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance, you shall save alive nothing that breathes, '
  '17':
  - type: text
    content: 'but '
  - type: note
    content: See ch. 7:2
  - type: text
    content: you shall devote them to complete destruction,
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction)
  - type: text
    content: ' the Hittites and the Amorites, the Canaanites and the Perizzites, the Hivites and the Jebusites, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded, '
  '18':
  - type: text
    content: 'that '
  - type: note
    content: ch. 7:4; 12:30, 31; 18:9
  - type: text
    content: 'they may not teach you to do according to all their abominable practices that they have done for their gods, and so you '
  - type: note
    content: Ex. 23:33
  - type: text
    content: 'sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: '“When you besiege a city for a long time, making war against it in order to take it, '
  - type: note
    content: '[2 Kgs. 3:19, 25]'
  - type: text
    content: 'you shall not destroy its trees by wielding an axe against them. You may eat from them, but you shall not cut them down. Are the trees in the field human, that they should be besieged by you? '
  '2':
  - type: text
    content: 'And when you draw near to the battle, '
  - type: note
    content: '[Num. 10:8, 9; 31:6]'
  - type: text
    content: 'the priest shall come forward and speak to the people '
  '20':
  - type: text
    content: Only the trees that you know are not trees for food you may destroy and cut down, that you may build siegeworks against the city that makes war with you, until it falls.
  '3':
  - type: text
    content: 'and shall say to them, ‘Hear, O Israel, today you are drawing near for battle against your enemies: let not your heart faint. Do not fear or panic or be in dread of them, '
  '4':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is he who goes with you '
  - type: note
    content: ch. 1:30; 3:22; Josh. 23:10
  - type: text
    content: 'to fight for you against your enemies, to give you the victory.’ '
  '5':
  - type: text
    content: 'Then the officers shall speak to the people, saying, ‘Is there any man who has built a new house and has not dedicated it? Let him go back to his house, lest he die in the battle and another man dedicate it. '
  '6':
  - type: text
    content: 'And is there any man who has planted a vineyard and has not '
  - type: note
    content: ch. 28:30; Lev. 19:23-25; [1 Cor. 9:7]
  - type: text
    content: 'enjoyed its fruit? Let him go back to his house, lest he die in the battle and another man enjoy its fruit. '
  '7':
  - type: note
    content: '[ch. 24:5; 28:30]'
  - type: text
    content: 'And is there any man who has betrothed a wife and has not taken her? Let him go back to his house, lest he die in the battle and another man take her.’ '
  '8':
  - type: text
    content: 'And the officers shall speak further to the people, and say, '
  - type: note
    content: '[Judg. 7:3]'
  - type: text
    content: '‘Is there any man who is fearful and fainthearted? Let him go back to his house, lest he make the heart of his fellows melt like his own.’ '
  '9':
  - type: text
    content: And when the officers have finished speaking to the people, then commanders shall be appointed at the head of the people.
