document_id: EXO.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Making Bricks Without Straw
  - type: text
    content: 'Afterward Moses and Aaron went and said to Pharaoh, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, ‘Let my people go, that they may hold '
  - type: note
    content: ch. 10:9
  - type: text
    content: 'a feast to me in the wilderness.’” '
  '10':
  - type: text
    content: 'So the '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'taskmasters and the foremen of the people went out and said to the people, “Thus says Pharaoh, ‘I will not give you straw. '
  '11':
  - type: text
    content: 'Go and get your straw yourselves wherever you can find it, but your work will not be reduced in the least.’” '
  '12':
  - type: text
    content: 'So the people were scattered throughout all the land of Egypt to gather stubble for straw. '
  '13':
  - type: text
    content: 'The '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'taskmasters were urgent, saying, “Complete your work, your daily task each day, as when there was straw.” '
  '14':
  - type: text
    content: 'And the foremen of the people of Israel, whom Pharaoh’s '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: taskmasters had set over them, were beaten and were asked, “Why have you not done all your task of making bricks today and yesterday, as in the past?”
  '15':
  - type: text
    content: 'Then the foremen of the people of Israel came and cried to Pharaoh, “Why do you treat your servants like this? '
  '16':
  - type: text
    content: 'No straw is given to your servants, yet they say to us, ‘Make bricks!’ And behold, your servants are beaten; but the fault is in your own people.” '
  '17':
  - type: text
    content: 'But he said, “You are idle, you are idle; that is why you say, ‘Let us go and sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '18':
  - type: text
    content: 'Go now and work. No straw will be given you, but you must still deliver the same number of bricks.” '
  '19':
  - type: text
    content: 'The foremen of the people of Israel saw that they were in trouble when they said, “You shall by no means reduce your number of bricks, your daily task each day.” '
  '2':
  - type: text
    content: 'But Pharaoh said, '
  - type: note
    content: '[2 Kgs. 18:35; Job 21:15]'
  - type: text
    content: '“Who is the '
  - type: text
    content: Lord
  - type: text
    content: ', that I should obey his voice and let Israel go? I do not know the '
  - type: text
    content: Lord
  - type: text
    content: ', and moreover, '
  - type: note
    content: ch. 3:19
  - type: text
    content: 'I will not let Israel go.” '
  '20':
  - type: text
    content: 'They met Moses and Aaron, who were waiting for them, as they came out from Pharaoh; '
  '21':
  - type: text
    content: 'and '
  - type: note
    content: ch. 6:9
  - type: text
    content: 'they said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' look on you and judge, because you have made us stink in the sight of Pharaoh and his servants, and have put a sword in their hand to kill us.”'
  '22':
  - type: text
    content: 'Then Moses turned to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “O Lord, why have you done evil to this people? Why did you ever send me? '
  '23':
  - type: text
    content: For since I came to Pharaoh to speak in your name, he has done evil to this people, and you have not delivered your people at all.”
  '3':
  - type: text
    content: 'Then they said, “The '
  - type: note
    content: ch. 3:18; 7:16; 9:1, 13
  - type: text
    content: 'God of the Hebrews has met with us. Please let us go a three days’ journey into the wilderness that we may sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, lest he fall upon us with pestilence or with the sword.” '
  '4':
  - type: text
    content: 'But the king of Egypt said to them, “Moses and Aaron, why do you take the people away from their work? Get back to your '
  - type: note
    content: ch. 1:11
  - type: text
    content: 'burdens.” '
  '5':
  - type: text
    content: 'And Pharaoh said, “Behold, '
  - type: note
    content: ch. 1:7, 9
  - type: text
    content: the people of the land are now many,
  - type: note
    content: Samaritan they are now more numerous than the people of the land
  - type: text
    content: ' and you make them rest from their burdens!” '
  '6':
  - type: text
    content: 'The same day Pharaoh commanded the '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'taskmasters of the people and their '
  - type: note
    content: ver. 14, 15, 19
  - type: text
    content: 'foremen, '
  '7':
  - type: text
    content: '“You shall no longer give the people straw to make bricks, as in the past; let them go and gather straw for themselves. '
  '8':
  - type: text
    content: 'But the number of bricks that they made in the past you shall impose on them, you shall by no means reduce it, for they are idle. Therefore they cry, ‘Let us go and offer sacrifice to our God.’ '
  '9':
  - type: text
    content: Let heavier work be laid on the men that they may labor at it and pay no regard to lying words.”
