document_id: 2KI.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu Slaughters Ahab’s Descendants
  - type: text
    content: 'Now Ahab had seventy sons in '
  - type: note
    content: 1 Kgs. 16:24
  - type: text
    content: Samaria. So Jehu wrote letters and sent them to Samaria, to the rulers of the city,
  - type: note
    content: Septuagint, Vulgate; Hebrew rulers of Jezreel
  - type: text
    content: ' to the elders, and to '
  - type: note
    content: '[Esth. 2:7]'
  - type: text
    content: the guardians of the sons
  - type: note
    content: Hebrew lacks of the sons
  - type: text
    content: ' of Ahab, saying, '
  '10':
  - type: text
    content: 'Know then that there shall '
  - type: note
    content: '[1 Sam. 3:19]'
  - type: text
    content: 'fall to the earth nothing of the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', which the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning the house of Ahab, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has done '
  - type: note
    content: 1 Kgs. 21:19, 21, 29
  - type: text
    content: 'what he said by his servant Elijah.” '
  '11':
  - type: text
    content: So Jehu struck down all who remained of the house of Ahab in Jezreel, all his great men and his close friends and his priests, until he left him none remaining.
  '12':
  - type: text
    content: 'Then he set out and went to Samaria. On the way, when he was at Beth-eked of the Shepherds, '
  '13':
  - type: text
    content: 'Jehu met '
  - type: note
    content: '[ch. 8:29; 9:16; 2 Chr. 22:8]'
  - type: text
    content: 'the relatives of Ahaziah king of Judah, and he said, “Who are you?” And they answered, “We are the relatives of Ahaziah, and we came down to visit the royal princes and the sons of the queen mother.” '
  '14':
  - type: text
    content: He said, “Take them alive.” And they took them alive and slaughtered them at the pit of Beth-eked, forty-two persons, and he spared none of them.
  '15':
  - type: text
    content: 'And when he departed from there, he met '
  - type: note
    content: See Jer. 35:6-10, 14, 16, 18
  - type: text
    content: 'Jehonadab the son of '
  - type: note
    content: 1 Chr. 2:55
  - type: text
    content: Rechab coming to meet him. And he greeted him and said to him, “Is your heart true to my heart as mine is to yours?” And Jehonadab answered, “It is.” Jehu said,
  - type: note
    content: Septuagint; Hebrew lacks Jehu said
  - type: text
    content: ' “If it is, '
  - type: note
    content: Ezra 10:19; Ezek. 17:18
  - type: text
    content: 'give me your hand.” So he gave him his hand. And Jehu took him up with him into the chariot. '
  '16':
  - type: text
    content: 'And he said, “Come with me, and see '
  - type: note
    content: '[1 Kgs. 19:10]'
  - type: text
    content: 'my zeal for the '
  - type: text
    content: Lord
  - type: text
    content: .” So he
  - type: note
    content: Septuagint, Syriac, Targum; Hebrew they
  - type: text
    content: ' had him ride in his chariot. '
  '17':
  - type: text
    content: 'And when he came to Samaria, '
  - type: note
    content: ch. 9:8; 2 Chr. 22:8
  - type: text
    content: 'he struck down all who remained to Ahab in Samaria, till he had wiped them out, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: that he spoke to Elijah.
  - type: heading
    content: Jehu Strikes Down the Prophets of Baal
  '18':
  - type: text
    content: 'Then Jehu assembled all the people and said to them, '
  - type: note
    content: 1 Kgs. 16:31, 32
  - type: text
    content: '“Ahab served Baal a little, but Jehu will serve him much. '
  '19':
  - type: text
    content: 'Now therefore call to me all the '
  - type: note
    content: 1 Kgs. 18:19; 22:6
  - type: text
    content: 'prophets of Baal, all his worshipers and all his priests. Let none be missing, for I have a great sacrifice to offer to Baal. Whoever is missing shall not live.” But Jehu did it with cunning in order to destroy the worshipers of Baal. '
  '2':
  - type: text
    content: '“Now then, as soon as this letter comes to you, seeing your master’s sons are with you, and there are with you chariots and horses, fortified cities also, and weapons, '
  '20':
  - type: text
    content: 'And Jehu ordered, '
  - type: note
    content: '[Joel 1:14]'
  - type: text
    content: '“Sanctify '
  - type: note
    content: '[Lev. 23:36]'
  - type: text
    content: 'a solemn assembly for Baal.” So '
  - type: note
    content: '[Ex. 32:5]'
  - type: text
    content: 'they proclaimed it. '
  '21':
  - type: text
    content: 'And Jehu sent throughout all Israel, and all the worshipers of Baal came, so that there was not a man left who did not come. And they entered '
  - type: note
    content: ch. 11:18; 1 Kgs. 16:32
  - type: text
    content: 'the house of Baal, and the house of Baal was filled from one end to the other. '
  '22':
  - type: text
    content: 'He said to him who was in charge of the wardrobe, “Bring out the vestments for all the worshipers of Baal.” So he brought out the vestments for them. '
  '23':
  - type: text
    content: 'Then Jehu went into the house of Baal with Jehonadab the son of Rechab, and he said to the worshipers of Baal, “Search, and see that there is no servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' here among you, but only the worshipers of Baal.” '
  '24':
  - type: text
    content: Then they
  - type: note
    content: Septuagint he (compare verse 25)
  - type: text
    content: ' went in to offer sacrifices and burnt offerings.'
  - type: text
    content: 'Now Jehu had stationed eighty men outside and said, “The man who allows any of those whom I give into your hands to escape '
  - type: note
    content: '[1 Kgs. 20:39, 42]'
  - type: text
    content: 'shall forfeit his life.” '
  '25':
  - type: text
    content: 'So as soon as he had made an end of offering the burnt offering, Jehu said to the guard and to the officers, '
  - type: note
    content: '[1 Kgs. 18:40]'
  - type: text
    content: '“Go in and strike them down; let not a man escape.” So when they put them to the sword, the guard and the officers cast them out and went into the inner room of the house of Baal, '
  '26':
  - type: text
    content: 'and they brought out the '
  - type: note
    content: ch. 3:2; 1 Kgs. 14:23
  - type: text
    content: 'pillar that was in '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the house of Baal and burned it. '
  '27':
  - type: text
    content: 'And they demolished the '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'pillar of Baal, and demolished the house of Baal, and made it '
  - type: note
    content: '[Ezra 6:11; Dan. 2:5; 3:29]'
  - type: text
    content: a latrine to this day.
  - type: heading
    content: Jehu Reigns in Israel
  '28':
  - type: text
    content: 'Thus Jehu wiped out Baal from Israel. '
  '29':
  - type: text
    content: 'But Jehu did not turn aside from '
  - type: note
    content: See 1 Kgs. 12:28-31
  - type: text
    content: 'the sins of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'which he made Israel to sin—that is, the golden calves that were in Bethel and in Dan. '
  '3':
  - type: text
    content: 'select the best and fittest of your master’s sons and set him on his father’s throne and fight for your master’s house.” '
  '30':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Jehu, “Because you have done well in carrying out what is right in my eyes, and have done to the house of Ahab according to all that was in my heart, '
  - type: note
    content: ch. 15:12; [ver. 35; ch. 13:1, 10; 14:23; 15:8]
  - type: text
    content: 'your sons of the fourth generation shall sit on the throne of Israel.” '
  '31':
  - type: text
    content: 'But Jehu was not careful to walk in the law of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with all his heart. '
  - type: note
    content: ver. 29
  - type: text
    content: He did not turn from the sins of Jeroboam, which he made Israel to sin.
  '32':
  - type: text
    content: 'In those days the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 13:25; 14:25]'
  - type: text
    content: 'began to cut off parts of Israel. '
  - type: note
    content: '[ch. 8:12; 1 Kgs. 19:17]'
  - type: text
    content: 'Hazael defeated them throughout the territory of Israel: '
  '33':
  - type: text
    content: 'from the Jordan eastward, all the land of Gilead, the Gadites, and the Reubenites, and the Manassites, from '
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'Aroer, which is by the Valley of the Arnon, that is, '
  - type: note
    content: '[Amos 1:3, 4]'
  - type: text
    content: 'Gilead and Bashan. '
  '34':
  - type: text
    content: 'Now the rest of the acts of Jehu and all that he did, and all his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '35':
  - type: text
    content: 'So Jehu slept with his fathers, and they buried him in Samaria. And Jehoahaz his son reigned in his place. '
  '36':
  - type: text
    content: The time that Jehu reigned over Israel in Samaria was twenty-eight years.
  '4':
  - type: text
    content: 'But they were exceedingly afraid and said, “Behold, the two kings could not stand before him. How then can we stand?” '
  '5':
  - type: text
    content: 'So he who was over the palace, and he who was over the city, together with the elders and the guardians, sent to Jehu, saying, '
  - type: note
    content: Josh. 9:8, 11
  - type: text
    content: '“We are your servants, and we will do all that you tell us. We will not make anyone king. Do whatever is good in your eyes.” '
  '6':
  - type: text
    content: 'Then he wrote to them a second letter, saying, “If you are on my side, and if you are ready to obey me, take the heads of your master’s sons and come to me at Jezreel tomorrow at this time.” Now the king’s sons, seventy persons, were with the great men of the city, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'who were bringing them up. '
  '7':
  - type: text
    content: 'And as soon as the letter came to them, they took the king’s sons '
  - type: note
    content: '[1 Kgs. 21:21]'
  - type: text
    content: 'and slaughtered them, seventy persons, and put their heads in baskets and sent them to him at Jezreel. '
  '8':
  - type: text
    content: 'When the messenger came and told him, “They have brought the heads of the king’s sons,” he said, “Lay them in two heaps at the entrance of the gate until the morning.” '
  '9':
  - type: text
    content: 'Then in the morning, when he went out, he stood and said to all the people, “You are innocent. '
  - type: note
    content: ch. 9:14, 24
  - type: text
    content: 'It was I who conspired against my master and killed him, but who struck down all these? '
