document_id: MAT.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'That same day Jesus went out of the house '
  - type: note
    content: For ver. 1-15, see Mark 4:1-12; Luke 8:4-10
  - type: text
    content: 'and sat beside the sea. '
  '10':
  - type: text
    content: 'Then the disciples came and said to him, “Why do you speak to them in parables?” '
  '11':
  - type: text
    content: 'And he answered them, '
  - type: note
    content: ch. 19:11; Col. 1:27; [1 Cor. 2:6-10; 1 John 2:20, 27]; See ch. 11:25
  - type: text
    content: '“To you it has been given to know '
  - type: note
    content: See Rom. 16:25
  - type: text
    content: the secrets of the kingdom of heaven, but to them it has not been given.
  - type: text
    content: ' '
  '12':
  - type: note
    content: ch. 25:29; Mark 4:25; Luke 8:18; 19:26; [John 15:2; James 4:6]
  - type: text
    content: 'For to the one who has, more will be given, and he will have an abundance, but from the one who has not, '
  - type: note
    content: '[Rev. 2:5]'
  - type: text
    content: even what he has will be taken away.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'This is why I speak to them in parables, because '
  - type: note
    content: Deut. 29:4; Jer. 5:21; Ezek. 12:2; Rom. 11:8; 2 Cor. 3:14; 4:4; [Isa. 42:19, 20]
  - type: text
    content: 'seeing they do not see, and hearing they do not hear, '
  - type: note
    content: ver. 19, 51; ch. 15:10; 16:12; Mark 8:21
  - type: text
    content: nor do they understand.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Indeed, in their case the prophecy of Isaiah is fulfilled that says:'
  - type: note
    content: John 12:40; Acts 28:26, 27; Cited from Isa. 6:9, 10
  - type: text
    content: “‘“You will indeed hear but never understand,
  - type: text
    content: and you will indeed see but never perceive.”
  '15':
  - type: text
    content: ' '
  - type: text
    content: For this people’s heart has grown dull,
  - type: text
    content: and with their ears
  - type: text
    content: ' '
  - type: note
    content: '[Heb. 5:11]'
  - type: text
    content: they can barely hear,
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: '[John 9:39, 41]'
  - type: text
    content: their eyes they have closed,
  - type: text
    content: lest they should see with their eyes
  - type: text
    content: and hear with their ears
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: '[Rom. 10:10]'
  - type: text
    content: understand with their heart
  - type: text
    content: 'and '
  - type: note
    content: See Luke 22:32
  - type: text
    content: turn, and I would heal them.’
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'But '
  - type: note
    content: Luke 10:23, 24; [ch. 16:17 ]
  - type: text
    content: blessed are your eyes, for they see, and your ears, for they hear.
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'For truly, I say to you, '
  - type: note
    content: Heb. 11:13; 1 Pet. 1:10-12; [John 8:56]
  - type: text
    content: many prophets and righteous people longed to see what you see, and did not see it, and to hear what you hear, and did not hear it.
  - type: heading
    content: The Parable of the Sower Explained
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-23, see Mark 4:13-20; Luke 8:11-15
  - type: text
    content: '“Hear then the parable of the sower:'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'When anyone hears the word of '
  - type: note
    content: ver. 38; ch. 4:23; 8:12
  - type: text
    content: 'the kingdom and '
  - type: note
    content: See ver. 13
  - type: text
    content: 'does not understand it, '
  - type: note
    content: John 17:15; Eph. 6:16; 2 Thess. 3:3; 1 John 2:13, 14; 3:12; 5:18, 19
  - type: text
    content: the evil one comes and snatches away what has been sown in his heart. This is what was sown along the path.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And great crowds gathered about him, '
  - type: note
    content: '[Mark 3:9; Luke 5:1-3]'
  - type: text
    content: 'so that he got into a boat and sat down. And the whole crowd stood on the beach. '
  '20':
  - type: text
    content: 'As for what was sown on rocky ground, this is the one who hears the word and immediately '
  - type: note
    content: '[Isa. 58:2; Ezek. 33:31, 32; Mark 6:20; John 5:35]'
  - type: text
    content: receives it with joy,
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'yet he has no root in himself, but '
  - type: note
    content: Gal. 1:6; [Hos. 6:4; Gal. 5:7]
  - type: text
    content: 'endures for a while, and when tribulation or persecution arises on account of the word, immediately '
  - type: note
    content: See ch. 11:6
  - type: text
    content: he falls away.
  - type: note
    content: Or stumbles
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'As for what was sown among thorns, this is the one who hears the word, but '
  - type: note
    content: See ch. 6:25
  - type: text
    content: 'the cares of '
  - type: note
    content: 2 Tim. 4:10
  - type: text
    content: 'the world and '
  - type: note
    content: 1 Tim. 6:9, 10, 17; [ch. 19:23; Mark 10:23; Acts 5:1-11; Heb. 3:13]
  - type: text
    content: the deceitfulness of riches choke the word, and it proves unfruitful.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'As for what was sown on good soil, this is the one who hears the word and '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'understands it. He indeed '
  - type: note
    content: Hos. 14:8; John 15:5, 16; Phil. 1:11; Col. 1:6
  - type: text
    content: 'bears fruit and yields, in one case '
  - type: note
    content: ver. 8
  - type: text
    content: a hundredfold, in another sixty, and in another thirty.”
  - type: heading
    content: The Parable of the Weeds
  '24':
  - type: text
    content: 'He put another parable before them, saying, '
  - type: note
    content: ver. 37-42; [Mark 4:26-29]
  - type: text
    content: “The kingdom of heaven may be compared to a man who sowed good seed in his field,
  - type: text
    content: ' '
  '25':
  - type: text
    content: but while his men were sleeping, his enemy came and sowed weeds
  - type: note
    content: Probably darnel, a wheat-like weed
  - type: text
    content: ' '
  - type: text
    content: among the wheat and went away.
  - type: text
    content: ' '
  '26':
  - type: text
    content: So when the plants came up and bore grain, then the weeds appeared also.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And the servants
  - type: note
    content: Or bondservants; also verse 28
  - type: text
    content: ' '
  - type: text
    content: of the master of the house came and said to him, ‘Master, did you not sow good seed in your field? How then does it have weeds?’
  - type: text
    content: ' '
  '28':
  - type: text
    content: He said to them, ‘An enemy has done this.’ So the servants said to him, ‘Then do you want us to go and gather them?’
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But he said, '
  - type: note
    content: '[1 Cor. 4:5]'
  - type: text
    content: ‘No, lest in gathering the weeds you root up the wheat along with them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: ver. 34
  - type: text
    content: 'he told them many things in parables, saying: '
  - type: note
    content: '[Isa. 55:10; Amos 9:13]'
  - type: text
    content: “A sower went out to sow.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Let both grow together until the harvest, and at harvest time I will tell the reapers, '
  - type: note
    content: ch. 3:12
  - type: text
    content: “Gather the weeds first and bind them in bundles to be burned, but gather the wheat into my barn.”’”
  - type: heading
    content: The Mustard Seed and the Leaven
  '31':
  - type: text
    content: 'He put another parable before them, saying, '
  - type: note
    content: For ver. 31, 32, see Mark 4:30-32; Luke 13:18, 19
  - type: text
    content: '“The kingdom of heaven is like '
  - type: note
    content: ch. 17:20; Luke 17:6
  - type: text
    content: a grain of mustard seed that a man took and sowed in his field.
  - type: text
    content: ' '
  '32':
  - type: text
    content: It is the smallest of all seeds, but when it has grown it is larger than all the garden plants and becomes a tree, so that the birds of the air come and make nests in its branches.”
  '33':
  - type: text
    content: 'He told them another parable. '
  - type: note
    content: Luke 13:20, 21
  - type: text
    content: '“The kingdom of heaven is like leaven that a woman took and hid in '
  - type: note
    content: Gen. 18:6
  - type: text
    content: 'three measures of flour, till it was '
  - type: note
    content: 1 Cor. 5:6; Gal. 5:9
  - type: text
    content: all leavened.”
  - type: heading
    content: Prophecy and Parables
  '34':
  - type: text
    content: ' '
  - type: note
    content: ver. 3 ; Mark 4:33, 34; [John 16:25, 29]
  - type: text
    content: 'All these things Jesus said to the crowds in parables; indeed, he said nothing to them without a parable. '
  '35':
  - type: text
    content: 'This was to fulfill what was spoken by the prophet:'
  - type: note
    content: Some manuscripts Isaiah the prophet
  - type: note
    content: Cited from Ps. 78:2
  - type: text
    content: “I will open my mouth in parables;
  - type: note
    content: '[ver. 11; Rom. 16:25, 26; 1 Cor. 2:7 ]'
  - type: text
    content: 'I will utter what has been hidden '
  - type: note
    content: ch. 25:34; Luke 11:50; [John 17:24; Eph. 1:4; 1 Pet. 1:20]
  - type: text
    content: since the foundation of the world.”
  - type: heading
    content: The Parable of the Weeds Explained
  '36':
  - type: text
    content: 'Then he left the crowds and went into '
  - type: note
    content: ver. 1
  - type: text
    content: 'the house. And his disciples came to him, saying, '
  - type: note
    content: ver. 24-30; [ch. 15:15]
  - type: text
    content: '“Explain to us the parable of the weeds of the field.” '
  '37':
  - type: text
    content: 'He answered, '
  - type: text
    content: “The one who sows the good seed is the Son of Man.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'The field is the world, and the good seed is '
  - type: note
    content: '[ver. 43]'
  - type: text
    content: 'the sons of the kingdom. The weeds are '
  - type: note
    content: John 8:44; Acts 13:10; 1 John 3:10; [ch. 23:15]; See ver. 19
  - type: text
    content: the sons of the evil one,
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'and the enemy who sowed them is the devil. '
  - type: note
    content: Joel 3:13; Rev. 14:15
  - type: text
    content: 'The harvest is '
  - type: note
    content: ver. 49; ch. 24:3; 28:20; [Dan. 12:13; Heb. 9:26]
  - type: text
    content: the end of the age, and the reapers are angels.
  - type: text
    content: ' '
  '4':
  - type: text
    content: And as he sowed, some seeds fell along the path, and the birds came and devoured them.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Just as the weeds '
  - type: note
    content: John 15:6; [ch. 3:12]
  - type: text
    content: 'are gathered and burned with fire, so will it be at '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: the end of the age.
  - type: text
    content: ' '
  '41':
  - type: note
    content: ch. 24:31
  - type: text
    content: 'The Son of Man will send his angels, and they will gather out of his kingdom all '
  - type: note
    content: ch. 18:7; [Zeph. 1:3]
  - type: text
    content: 'causes of sin and '
  - type: note
    content: ch. 7:23
  - type: text
    content: all law-breakers,
  - type: text
    content: ' '
  '42':
  - type: note
    content: ver. 50; Rev. 9:2; [Rev. 19:20; 20:10]
  - type: text
    content: 'and throw them into the fiery furnace. In that place '
  - type: note
    content: See ch. 8:12
  - type: text
    content: there will be weeping and gnashing of teeth.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Then '
  - type: note
    content: Prov. 4:18; Dan. 12:3; [1 Cor. 15:41, 42]
  - type: text
    content: 'the righteous will shine like the sun '
  - type: note
    content: '[ver. 38; ch. 25:34; 26:29; Luke 12:32]'
  - type: text
    content: 'in the kingdom of their Father. '
  - type: note
    content: See ch. 11:15
  - type: text
    content: He who has ears, let him hear.
  - type: heading
    content: The Parable of the Hidden Treasure
  '44':
  - type: text
    content: ' '
  - type: text
    content: '“The kingdom of heaven '
  - type: note
    content: Prov. 2:4
  - type: text
    content: 'is like treasure hidden in a field, which a man found and covered up. Then in his joy '
  - type: note
    content: '[ch. 25:9; Prov. 23:23; Phil. 3:7, 8 ]'
  - type: text
    content: 'he goes and sells all that he has and '
  - type: note
    content: '[ Isa. 55:1; Rev. 3:18 ]'
  - type: text
    content: buys that field.
  - type: heading
    content: The Parable of the Pearl of Great Value
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Again, the kingdom of heaven is like a merchant in search of fine pearls,
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'who, on finding '
  - type: note
    content: ch. 7:6
  - type: text
    content: 'one pearl of great value, '
  - type: note
    content: '[See ver. 44 above]'
  - type: text
    content: 'went and sold all that he had and '
  - type: note
    content: '[See ver. 44 above]'
  - type: text
    content: bought it.
  - type: heading
    content: The Parable of the Net
  '47':
  - type: text
    content: ' '
  - type: text
    content: '“Again, the kingdom of heaven is '
  - type: note
    content: ch. 4:19
  - type: text
    content: 'like a net that was thrown into the sea and '
  - type: note
    content: '[ver. 38; ch. 22:10; 25:2 ]'
  - type: text
    content: gathered fish of every kind.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'When it was full, '
  - type: note
    content: John 21:11
  - type: text
    content: men drew it ashore and sat down and sorted the good into containers but threw away the bad.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'So it will be at '
  - type: note
    content: See ver. 39
  - type: text
    content: 'the end of the age. The angels will come out and '
  - type: note
    content: ch. 25:32; [ver. 41]
  - type: text
    content: separate the evil from the righteous
  - type: text
    content: ' '
  '5':
  - type: text
    content: Other seeds fell on rocky ground, where they did not have much soil, and immediately they sprang up, since they had no depth of soil,
  - type: text
    content: ' '
  '50':
  - type: note
    content: See ver. 42
  - type: text
    content: 'and throw them into the fiery furnace. In that place '
  - type: note
    content: See ver. 42
  - type: text
    content: there will be weeping and gnashing of teeth.
  - type: heading
    content: New and Old Treasures
  '51':
  - type: text
    content: ' '
  - type: note
    content: ver. 10-16 ; [John 10:6; 16:29]
  - type: text
    content: “Have you understood all these things?”
  - type: text
    content: ' They said to him, “Yes.” '
  '52':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Therefore every '
  - type: note
    content: ch. 23:34
  - type: text
    content: 'scribe '
  - type: note
    content: ch. 28:19
  - type: text
    content: 'who has been trained for the kingdom of heaven is like a master of a house, who '
  - type: note
    content: '[ch. 12:35]'
  - type: text
    content: brings out of his treasure what is new and what is old.”
  - type: heading
    content: Jesus Rejected at Nazareth
  '53':
  - type: text
    content: 'And when Jesus had finished these parables, he went away from there, '
  '54':
  - type: note
    content: For ver. 54-58, see Mark 6:1-6; [Luke 4:16-30]
  - type: text
    content: 'and coming to '
  - type: note
    content: ch. 2:23; Luke 4:23
  - type: text
    content: 'his hometown '
  - type: note
    content: See ch. 4:23
  - type: text
    content: 'he taught them in their synagogue, so that '
  - type: note
    content: See ch. 7:28
  - type: text
    content: 'they were astonished, and said, “Where did this man get this wisdom and these mighty works? '
  '55':
  - type: note
    content: '[Luke 4:22; John 6:42]'
  - type: text
    content: 'Is not this '
  - type: note
    content: '[Mark 6:3]'
  - type: text
    content: the carpenter’s
  - type: note
    content: Or builder’s
  - type: text
    content: ' son? Is not his mother called Mary? And are not '
  - type: note
    content: See ch. 12:46
  - type: text
    content: 'his brothers James and Joseph and Simon and Judas? '
  '56':
  - type: text
    content: 'And are not all his sisters with us? Where then did this man get all these things?” '
  '57':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 11:6
  - type: text
    content: 'they took offense at him. But Jesus said to them, '
  - type: note
    content: Luke 4:24; John 4:44; [Jer. 11:21; 12:6; John 7:5]
  - type: text
    content: “A prophet is not without honor except in his hometown and in his own household.”
  - type: text
    content: ' '
  '58':
  - type: text
    content: 'And he did not do many mighty works there, '
  - type: note
    content: '[ch. 17:20]'
  - type: text
    content: because of their unbelief.
  '6':
  - type: text
    content: 'but '
  - type: note
    content: James 1:11
  - type: text
    content: 'when the sun rose they were scorched. And since they had no root, '
  - type: note
    content: John 15:6
  - type: text
    content: they withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Other seeds fell among '
  - type: note
    content: Jer. 4:3
  - type: text
    content: thorns, and the thorns grew up and choked them.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Other seeds fell on good soil and produced grain, some '
  - type: note
    content: ver. 23; Gen. 26:12
  - type: text
    content: a hundredfold, some sixty, some thirty.
  - type: text
    content: ' '
  '9':
  - type: note
    content: See ch. 11:15
  - type: text
    content: He who has ears,
  - type: note
    content: Some manuscripts add here and in verse 43 to hear
  - type: text
    content: ' '
  - type: text
    content: let him hear.”
  - type: heading
    content: The Purpose of the Parables
