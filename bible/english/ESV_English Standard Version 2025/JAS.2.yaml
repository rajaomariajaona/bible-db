document_id: JAS.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sin of Partiality
  - type: text
    content: My brothers,
  - type: note
    content: Or brothers and sisters; also verses 5, 14
  - type: text
    content: ' '
  - type: note
    content: ver. 9; Lev. 19:15; Deut. 1:17; 16:19; Prov. 24:23; Rom. 2:11; Eph. 6:9
  - type: text
    content: 'show no partiality as you hold the faith in our Lord Jesus Christ, '
  - type: note
    content: 1 Cor. 2:8; [Acts 7:2]
  - type: text
    content: 'the Lord of glory. '
  '10':
  - type: text
    content: 'For whoever keeps the whole law but fails in one point '
  - type: note
    content: Matt. 5:19; Gal. 3:10
  - type: text
    content: 'has become guilty of all of it. '
  '11':
  - type: text
    content: 'For he who said, '
  - type: note
    content: Cited from Ex. 20:13, 14
  - type: text
    content: '“Do not commit adultery,” also said, '
  - type: note
    content: Cited from Ex. 20:13, 14
  - type: text
    content: '“Do not murder.” If you do not commit adultery but do murder, you have become a transgressor of the law. '
  '12':
  - type: text
    content: 'So speak and so act as those who are to be judged under '
  - type: note
    content: See ch. 1:25
  - type: text
    content: 'the law of liberty. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Job 22:6-11; Ps. 18:25, 26; Prov. 21:13; Ezek. 25:11-14; Matt. 6:15; 18:32-35; Luke 6:38
  - type: text
    content: judgment is without mercy to one who has shown no mercy. Mercy triumphs over judgment.
  - type: heading
    content: Faith Without Works Is Dead
  '14':
  - type: text
    content: 'What good is it, my brothers, if someone says he has faith '
  - type: note
    content: '[ch. 1:22]'
  - type: text
    content: 'but does not have works? Can that faith save him? '
  '15':
  - type: note
    content: '[Job 31:19, 20]; See Luke 3:11'
  - type: text
    content: 'If a brother or sister is poorly clothed and lacking in daily food, '
  '16':
  - type: note
    content: 1 John 3:17, 18
  - type: text
    content: and one of you says to them, “Go in peace, be warmed and filled,” without giving them the things needed for the body, what good
  - type: note
    content: Or benefit
  - type: text
    content: ' is that? '
  '17':
  - type: text
    content: So also faith by itself, if it does not have works, is dead.
  '18':
  - type: text
    content: 'But someone will say, “You have faith and I have works.” Show me your faith '
  - type: note
    content: '[Rom. 3:28; 4:6; Heb. 11:33]'
  - type: text
    content: 'apart from your works, and I will show you my faith '
  - type: note
    content: Matt. 7:16, 17; Gal. 5:6
  - type: text
    content: 'by my works. '
  '19':
  - type: note
    content: Deut. 6:4; [Rom. 2:17-25]
  - type: text
    content: 'You believe that God is one; you do well. Even '
  - type: note
    content: Matt. 8:29; Mark 1:24; 5:7; Luke 4:33, 34; Acts 16:17; 19:15
  - type: text
    content: 'the demons believe—and shudder! '
  '2':
  - type: text
    content: 'For if a man wearing a gold ring and fine clothing comes into your assembly, and a poor man in shabby clothing also comes in, '
  '20':
  - type: text
    content: 'Do you want to be shown, you foolish person, that faith apart from works is useless? '
  '21':
  - type: note
    content: Gen. 22:9, 12, 16-18
  - type: text
    content: 'Was not Abraham our father justified by works when he offered up his son Isaac on the altar? '
  '22':
  - type: text
    content: 'You see that '
  - type: note
    content: Heb. 11:17
  - type: text
    content: 'faith was active along with his works, and faith was completed '
  - type: note
    content: See 1 Thess. 1:3
  - type: text
    content: 'by his works; '
  '23':
  - type: text
    content: 'and the Scripture was fulfilled that says, '
  - type: note
    content: Rom. 4:3; Gal. 3:6; Cited from Gen. 15:6
  - type: text
    content: '“Abraham believed God, and it was counted to him as righteousness”—and he was called a '
  - type: note
    content: 2 Chr. 20:7; Isa. 41:8
  - type: text
    content: 'friend of God. '
  '24':
  - type: text
    content: 'You see that a person is justified by works and not by faith alone. '
  '25':
  - type: text
    content: 'And in the same way was not also '
  - type: note
    content: Heb. 11:31
  - type: text
    content: 'Rahab the prostitute justified by works '
  - type: note
    content: Josh. 2:1-22; 6:23
  - type: text
    content: 'when she received the messengers and sent them out by another way? '
  '26':
  - type: text
    content: For as the body apart from the spirit is dead, so also faith apart from works is dead.
  '3':
  - type: text
    content: 'and if you pay attention to the one who wears the fine clothing and say, “You sit here in a good place,” '
  - type: note
    content: '[Prov. 18:23]'
  - type: text
    content: 'while you say to the poor man, “You stand over there,” or, “Sit down at my feet,” '
  '4':
  - type: text
    content: 'have you not then made distinctions among yourselves and become '
  - type: note
    content: John 7:24
  - type: text
    content: 'judges with evil thoughts? '
  '5':
  - type: text
    content: 'Listen, my beloved brothers, '
  - type: note
    content: 1 Cor. 1:27, 28; [Job 34:19]
  - type: text
    content: 'has not God chosen those who are poor in the world to be '
  - type: note
    content: 2 Cor. 8:9; Rev. 2:9; See Luke 12:21
  - type: text
    content: 'rich in faith and heirs of '
  - type: note
    content: Matt. 5:3; Luke 6:20; 12:32
  - type: text
    content: 'the kingdom, '
  - type: note
    content: See ch. 1:12
  - type: text
    content: 'which he has promised to those who love him? '
  '6':
  - type: text
    content: 'But you '
  - type: note
    content: '[1 Cor. 11:22]'
  - type: text
    content: 'have dishonored the poor man. Are not the rich the ones who oppress you, and the ones who '
  - type: note
    content: Acts 16:19
  - type: text
    content: 'drag you '
  - type: note
    content: Acts 8:3; 17:6; 18:12; [ch. 5:6]
  - type: text
    content: 'into court? '
  '7':
  - type: text
    content: 'Are they not the ones who blaspheme the honorable '
  - type: note
    content: '[Isa. 63:19; 65:1; Amos 9:12; Acts 15:17]'
  - type: text
    content: name by which you were called?
  '8':
  - type: text
    content: 'If you really fulfill the royal law according to the Scripture, '
  - type: note
    content: Cited from Lev. 19:18
  - type: text
    content: '“You shall love your neighbor as yourself,” you are doing well. '
  '9':
  - type: text
    content: 'But if you '
  - type: note
    content: ver. 1
  - type: text
    content: 'show partiality, you are committing sin and are convicted by the law as transgressors. '
