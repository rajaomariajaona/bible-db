      marker-yv: yv-n
    - type: text
      text: 'Machir the son of Ammiel from Lo-debar, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
