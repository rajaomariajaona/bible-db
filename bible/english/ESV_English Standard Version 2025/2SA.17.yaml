document_id: 2SA.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hushai Saves David
  - type: text
    content: 'Moreover, Ahithophel said to Absalom, “Let me choose twelve thousand men, and I will arise and pursue David tonight. '
  '10':
  - type: text
    content: 'Then even the valiant man, whose heart is like the heart of a lion, will utterly '
  - type: note
    content: See Josh. 2:11
  - type: text
    content: 'melt with fear, for all Israel knows that your father is a mighty man, and that those who are with him are valiant men. '
  '11':
  - type: text
    content: 'But my counsel is that all Israel be gathered to you, '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'from Dan to Beersheba, '
  - type: note
    content: See Gen. 22:17
  - type: text
    content: 'as the sand by the sea for multitude, and that you go to battle in person. '
  '12':
  - type: text
    content: 'So we shall come upon him in some place where he is to be found, and we shall light upon him as the dew falls on the ground, and of him and all the men with him not one will be left. '
  '13':
  - type: text
    content: 'If he withdraws into a city, then all Israel will bring ropes to that city, and we shall drag it into the valley, until not even a pebble is to be found there.” '
  '14':
  - type: text
    content: 'And Absalom and all the men of Israel said, “The counsel of Hushai the Archite is better than the counsel of Ahithophel.” '
  - type: note
    content: ch. 15:31, 34
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had ordained'
  - type: note
    content: Hebrew commanded
  - type: text
    content: ' to defeat the good counsel of Ahithophel, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' might bring harm upon Absalom.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:35, 36
  - type: text
    content: 'Then Hushai said to Zadok and Abiathar the priests, “Thus and so did Ahithophel counsel Absalom and the elders of Israel, and thus and so have I counseled. '
  '16':
  - type: text
    content: 'Now therefore send quickly and tell David, ‘Do not stay tonight at '
  - type: note
    content: ch. 15:28
  - type: text
    content: 'the fords of the wilderness, but by all means pass over, lest the king and all the people who are with him be '
  - type: note
    content: ch. 20:19
  - type: text
    content: 'swallowed up.’” '
  '17':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 15:27, 36
  - type: text
    content: 'Jonathan and Ahimaaz were waiting at '
  - type: note
    content: Josh. 15:7; 18:16
  - type: text
    content: 'En-rogel. A female servant was to go and tell them, and they were to go and tell King David, for they were not to be seen entering the city. '
  '18':
  - type: text
    content: 'But a young man saw them and told Absalom. So both of them went away quickly and came to the house of a man at '
  - type: note
    content: See ch. 3:16
  - type: text
    content: 'Bahurim, who had a well in his courtyard. And they went down into it. '
  '19':
  - type: note
    content: '[Josh. 2:6]'
  - type: text
    content: 'And the woman took and spread a covering over the well’s mouth and scattered grain on it, and nothing was known of it. '
  '2':
  - type: text
    content: 'I will come upon him while he is '
  - type: note
    content: ch. 16:14; [Deut. 25:18]
  - type: text
    content: 'weary and discouraged and throw him into a panic, and all the people who are with him will flee. '
  - type: note
    content: '[1 Kgs. 22:31]'
  - type: text
    content: 'I will strike down only the king, '
  '20':
  - type: text
    content: When Absalom’s servants came to the woman at the house, they said, “Where are Ahimaaz and Jonathan?” And the woman said to them, “They have gone over the brook
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' of water.” And when they had sought and could not find them, they returned to Jerusalem.'
  '21':
  - type: text
    content: 'After they had gone, the men came up out of the well, and went and told King David. They said to David, '
  - type: note
    content: ver. 15, 16
  - type: text
    content: '“Arise, and go quickly over the water, for thus and so has Ahithophel counseled against you.” '
  '22':
  - type: text
    content: Then David arose, and all the people who were with him, and they crossed the Jordan. By daybreak not one was left who had not crossed the Jordan.
  '23':
  - type: text
    content: 'When Ahithophel saw that his counsel was not followed, he saddled his donkey and went off home to '
  - type: note
    content: ch. 15:12
  - type: text
    content: 'his own city. He '
  - type: note
    content: '[2 Kgs. 20:1]'
  - type: text
    content: 'set his house in order and '
  - type: note
    content: '[Matt. 27:5]'
  - type: text
    content: hanged himself, and he died and was buried in the tomb of his father.
  '24':
  - type: text
    content: 'Then David came to '
  - type: note
    content: See Josh. 13:26
  - type: text
    content: 'Mahanaim. And Absalom crossed the Jordan with all the men of Israel. '
  '25':
  - type: text
    content: 'Now Absalom had set '
  - type: note
    content: ch. 19:13; 20:9, 12; 1 Kgs. 2:5, 32
  - type: text
    content: Amasa over the army instead of Joab. Amasa was the son of a man named Ithra the Ishmaelite,
  - type: note
    content: Compare 1 Chronicles 2:17; Hebrew Israelite
  - type: text
    content: ' who had married Abigal the daughter of '
  - type: note
    content: '[1 Chr. 2:13, 16]'
  - type: text
    content: 'Nahash, sister of Zeruiah, Joab’s mother. '
  '26':
  - type: text
    content: And Israel and Absalom encamped in the land of Gilead.
  '27':
  - type: text
    content: 'When David came to Mahanaim, '
  - type: note
    content: '[ch. 10:1, 2]'
  - type: text
    content: 'Shobi the son of Nahash from '
  - type: note
    content: ch. 12:26, 29
  - type: text
    content: 'Rabbah of the Ammonites, and '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'Machir the son of Ammiel from Lo-debar, and '
  - type: note
    content: ch. 19:31, 32; 1 Kgs. 2:7; [Ezra 2:61]
  - type: text
    content: 'Barzillai the Gileadite from Rogelim, '
  '28':
  - type: text
    content: brought beds, basins, and earthen vessels, wheat, barley, flour, parched grain, beans and lentils,
  - type: note
    content: Hebrew adds and parched grain
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'honey and curds and sheep and cheese from the herd, for David and the people with him to eat, for they said, “The people are hungry and '
  - type: note
    content: ch. 16:2
  - type: text
    content: 'weary and thirsty '
  - type: note
    content: ch. 15:23
  - type: text
    content: in the wilderness.”
  '3':
  - type: text
    content: and I will bring all the people back to you as a bride comes home to her husband. You seek the life of only one man,
  - type: note
    content: Septuagint; Hebrew back to you. Like the return of the whole is the man whom you seek
  - type: text
    content: ' and all the people will be at peace.” '
  '4':
  - type: text
    content: And the advice seemed right in the eyes of Absalom and all the elders of Israel.
  '5':
  - type: text
    content: 'Then Absalom said, “Call '
  - type: note
    content: ch. 16:16-18
  - type: text
    content: 'Hushai the Archite also, and let us hear what he has to say.” '
  '6':
  - type: text
    content: 'And when Hushai came to Absalom, Absalom said to him, “Thus has Ahithophel spoken; shall we do as he says? If not, you speak.” '
  '7':
  - type: text
    content: 'Then Hushai said to Absalom, “This time the counsel that Ahithophel has given is not good.” '
  '8':
  - type: text
    content: Hushai said, “You know that your father and his men are mighty men, and that they are enraged,
  - type: note
    content: Hebrew bitter of soul
  - type: text
    content: ' '
  - type: note
    content: Prov. 17:12; Hos. 13:8
  - type: text
    content: 'like a bear robbed of her cubs in the field. Besides, your father is expert in war; he will not spend the night with the people. '
  '9':
  - type: text
    content: Behold, even now he has hidden himself in one of the pits or in some other place. And as soon as some of the people fall
  - type: note
    content: Or And as he falls on them
  - type: text
    content: ' at the first attack, whoever hears it will say, ‘There has been a slaughter among the people who follow Absalom.’ '
