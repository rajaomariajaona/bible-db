document_id: EXO.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sabbath Regulations
  - type: text
    content: 'Moses assembled all the congregation of the people of Israel and said to them, '
  - type: note
    content: ch. 34:32
  - type: text
    content: '“These are the things that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded you to do. '
  '10':
  - type: text
    content: '“Let '
  - type: note
    content: ver. 25; ch. 28:3; 31:6; 36:1, 2
  - type: text
    content: 'every skillful craftsman among you come and make all that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '11':
  - type: note
    content: See ch. 26:1-30
  - type: text
    content: 'the tabernacle, its tent and its covering, its hooks and its frames, its bars, its pillars, and its bases; '
  '12':
  - type: note
    content: See ch. 25:10-16
  - type: text
    content: 'the ark with its poles, the mercy seat, and the '
  - type: note
    content: ch. 26:31, 33; 39:34; 40:3, 21; Num. 4:5
  - type: text
    content: 'veil of the screen; '
  '13':
  - type: note
    content: See ch. 25:23-29
  - type: text
    content: 'the table with its poles and all its utensils, and the '
  - type: note
    content: ch. 25:30
  - type: text
    content: 'bread of the Presence; '
  '14':
  - type: note
    content: See ch. 25:31-39
  - type: text
    content: 'the lampstand also for the light, with its utensils and its lamps, and the '
  - type: note
    content: ch. 27:20
  - type: text
    content: 'oil for the light; '
  '15':
  - type: note
    content: See ch. 30:1-10
  - type: text
    content: 'and the altar of incense, with its poles, '
  - type: note
    content: See ch. 30:23-33
  - type: text
    content: 'and the anointing oil and the '
  - type: note
    content: See ch. 30:34-38
  - type: text
    content: 'fragrant incense, and '
  - type: note
    content: ch. 26:36
  - type: text
    content: 'the screen for the door, at the door of the tabernacle; '
  '16':
  - type: note
    content: See ch. 27:1-8
  - type: text
    content: 'the altar of burnt offering, with its grating of bronze, its poles, and all its utensils, the '
  - type: note
    content: See ch. 30:18-21
  - type: text
    content: 'basin and its stand; '
  '17':
  - type: note
    content: See ch. 27:9-17
  - type: text
    content: 'the hangings of the court, its pillars and its bases, and the screen for the gate of the court; '
  '18':
  - type: note
    content: ch. 27:19
  - type: text
    content: 'the pegs of the tabernacle and the pegs of the court, and their '
  - type: note
    content: ch. 39:40
  - type: text
    content: 'cords; '
  '19':
  - type: text
    content: 'the '
  - type: note
    content: ch. 31:10
  - type: text
    content: finely worked garments for ministering
  - type: note
    content: Or garments for worship; see 31:10
  - type: text
    content: ' in the Holy Place, the holy garments for Aaron the priest, and the garments of his sons, for their service as priests.”'
  '2':
  - type: note
    content: ch. 31:15; See ch. 20:9
  - type: text
    content: 'Six days work shall be done, but on the seventh day you shall have a Sabbath of solemn rest, holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. Whoever does any work on it shall be put to death. '
  '20':
  - type: text
    content: 'Then all the congregation of the people of Israel departed from the presence of Moses. '
  '21':
  - type: text
    content: 'And they came, '
  - type: note
    content: See ch. 25:2
  - type: text
    content: 'everyone whose heart stirred him, and everyone whose spirit moved him, '
  - type: note
    content: ch. 36:3
  - type: text
    content: 'and brought the '
  - type: text
    content: Lord
  - type: text
    content: '’s contribution to be used for the tent of meeting, and for all its service, and for the holy garments. '
  '22':
  - type: text
    content: 'So they came, both men and women. All who were of a willing heart brought brooches and earrings and signet rings and armlets, all sorts of gold objects, every man dedicating an offering of gold to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: '[1 Chr. 29:8]'
  - type: text
    content: 'every one who possessed '
  - type: note
    content: ver. 6, 7; ch. 25:4, 5
  - type: text
    content: 'blue or purple or scarlet yarns or fine linen or goats’ hair or tanned rams’ skins or goatskins brought them. '
  '24':
  - type: note
    content: ch. 36:3, 6
  - type: text
    content: 'Everyone who could make a contribution of silver or bronze brought it as the '
  - type: text
    content: Lord
  - type: text
    content: '’s contribution. And every one who possessed acacia wood of any use in the work brought it. '
  '25':
  - type: text
    content: 'And every '
  - type: note
    content: ver. 10
  - type: text
    content: 'skillful woman spun with her hands, and they all brought what they had spun in blue and purple and scarlet yarns and fine twined linen. '
  '26':
  - type: text
    content: 'All the women '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'whose hearts stirred them to use their skill spun the goats’ hair. '
  '27':
  - type: text
    content: 'And the '
  - type: note
    content: '[1 Chr. 29:6-8; Ezra 2:68]'
  - type: text
    content: 'leaders brought onyx stones and stones to be set, for the ephod and for the breastpiece, '
  '28':
  - type: text
    content: 'and spices and oil for the light, and for the anointing oil, and for the fragrant incense. '
  '29':
  - type: note
    content: ch. 36:3
  - type: text
    content: 'All the men and women, the people of Israel, whose heart moved them to bring anything for the work that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded by Moses to be done brought it as a freewill offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Construction of the Tabernacle
  '3':
  - type: note
    content: ch. 16:23
  - type: text
    content: You shall kindle no fire in all your dwelling places on the Sabbath day.”
  - type: heading
    content: Contributions for the Tabernacle
  '30':
  - type: text
    content: ' '
  - type: note
    content: For ver. 30-34, see ch. 31:1-6
  - type: text
    content: 'Then Moses said to the people of Israel, “See, the '
  - type: text
    content: Lord
  - type: text
    content: ' has called by name Bezalel the son of Uri, son of Hur, of the tribe of Judah; '
  '31':
  - type: text
    content: 'and he has filled him with the Spirit of God, with '
  - type: note
    content: '[1 Kgs. 7:14; 2 Chr. 2:14]'
  - type: text
    content: 'skill, with intelligence, with knowledge, and with all craftsmanship, '
  '32':
  - type: text
    content: 'to devise artistic designs, to work in gold and silver and bronze, '
  '33':
  - type: text
    content: 'in cutting stones for setting, and in carving wood, for work in every skilled craft. '
  '34':
  - type: text
    content: 'And he has inspired him to teach, both him and Oholiab the son of Ahisamach of the tribe of Dan. '
  '35':
  - type: text
    content: 'He has '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: filled them with skill to do every sort of work done by an engraver or by a designer or by an embroiderer in blue and purple and scarlet yarns and fine twined linen, or by a weaver—by any sort of workman or skilled designer.
  '4':
  - type: text
    content: 'Moses said to all the congregation of the people of Israel, “This is the thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded. '
  '5':
  - type: note
    content: For ver. 5-9, see ch. 25:2-7
  - type: text
    content: 'Take from among you a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: See ch. 25:2
  - type: text
    content: 'Whoever is of a generous heart, let him bring the '
  - type: text
    content: Lord
  - type: text
    content: '’s contribution: gold, silver, and bronze; '
  '6':
  - type: text
    content: 'blue and purple and scarlet yarns and fine twined linen; goats’ hair, '
  '7':
  - type: text
    content: tanned rams’ skins, and goatskins;
  - type: note
    content: The meaning of the Hebrew word is uncertain; also verse 23; compare 25:5
  - type: text
    content: ' acacia wood, '
  '8':
  - type: text
    content: 'oil for the light, spices for the anointing oil and for the fragrant incense, '
  '9':
  - type: text
    content: and onyx stones and stones for setting, for the ephod and for the breastpiece.
