document_id: NUM.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Census of Israel’s Warriors
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses '
  - type: note
    content: ch. 10:11, 12; Ex. 19:1
  - type: text
    content: 'in the wilderness of Sinai, '
  - type: note
    content: Ex. 25:22
  - type: text
    content: 'in the tent of meeting, on the first day of the second month, in the second year after they had come out of the land of Egypt, saying, '
  '10':
  - type: text
    content: 'from the sons of Joseph, from Ephraim, '
  - type: note
    content: ch. 7:48; 1 Chr. 7:26
  - type: text
    content: 'Elishama the son of Ammihud, and from Manasseh, '
  - type: note
    content: ch. 7:54
  - type: text
    content: 'Gamaliel the son of Pedahzur; '
  '11':
  - type: text
    content: 'from Benjamin, '
  - type: note
    content: ch. 7:60
  - type: text
    content: 'Abidan the son of Gideoni; '
  '12':
  - type: text
    content: 'from Dan, '
  - type: note
    content: ch. 7:66
  - type: text
    content: 'Ahiezer the son of Ammishaddai; '
  '13':
  - type: text
    content: 'from Asher, '
  - type: note
    content: ch. 7:72
  - type: text
    content: 'Pagiel the son of Ochran; '
  '14':
  - type: text
    content: 'from Gad, Eliasaph the son of '
  - type: note
    content: ch. 7:42
  - type: text
    content: 'Deuel; '
  '15':
  - type: text
    content: 'from Naphtali, '
  - type: note
    content: ch. 7:78
  - type: text
    content: 'Ahira the son of Enan.” '
  '16':
  - type: text
    content: 'These were the ones '
  - type: note
    content: ch. 26:9
  - type: text
    content: 'chosen from the congregation, '
  - type: note
    content: ch. 7:2; [Ex. 18:21, 25]; See 1 Chr. 27:16-22
  - type: text
    content: the chiefs of their ancestral tribes, the heads of the clans of Israel.
  '17':
  - type: text
    content: 'Moses and Aaron took these men '
  - type: note
    content: 1 Chr. 12:31; 16:41; 2 Chr. 28:15; 31:19; Ezra 8:20
  - type: text
    content: 'who had been named, '
  '18':
  - type: text
    content: 'and on the first day of the second month, they assembled the whole congregation together, who registered themselves by clans, by fathers’ houses, according to the number of names from twenty years old and upward, head by head, '
  '19':
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. So he listed them in the wilderness of Sinai.'
  '2':
  - type: note
    content: Ex. 30:12; 38:26; 2 Sam. 24:2; 1 Chr. 21:2; See ch. 26:2-51
  - type: text
    content: '“Take a census of all the congregation of the people of Israel, by clans, '
  - type: note
    content: ver. 18, 20, 22; ch. 3:47; 1 Chr. 23:3, 24
  - type: text
    content: 'by fathers’ houses, according to the number of names, every male, head by head. '
  '20':
  - type: text
    content: 'The people of '
  - type: note
    content: For ver. 20-46, see ch. 2:3-32
  - type: text
    content: 'Reuben, Israel’s firstborn, their generations, by their clans, by their fathers’ houses, according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war: '
  '21':
  - type: text
    content: 'those listed of the tribe of Reuben were '
  - type: note
    content: '[ch. 26:7]'
  - type: text
    content: 46,500.
  '22':
  - type: text
    content: 'Of the people of Simeon, their generations, by their clans, by their fathers’ houses, those of them who were listed, according to the number of names, head by head, every male from twenty years old and upward, all who were able to go to war: '
  '23':
  - type: text
    content: 'those listed of the tribe of Simeon were '
  - type: note
    content: '[ch. 26:14]'
  - type: text
    content: 59,300.
  '24':
  - type: text
    content: 'Of the people of Gad, their generations, by their clans, by their fathers’ houses, according to the number of the names, from twenty years old and upward, all who were able to go to war: '
  '25':
  - type: text
    content: 'those listed of the tribe of Gad were '
  - type: note
    content: '[ch. 26:18]'
  - type: text
    content: 45,650.
  '26':
  - type: text
    content: 'Of the people of Judah, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '27':
  - type: text
    content: 'those listed of the tribe of Judah were '
  - type: note
    content: '[ch. 26:22; 2 Sam. 24:9]'
  - type: text
    content: 74,600.
  '28':
  - type: text
    content: 'Of the people of Issachar, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '29':
  - type: text
    content: 'those listed of the tribe of Issachar were '
  - type: note
    content: '[ch. 26:25]'
  - type: text
    content: 54,400.
  '3':
  - type: note
    content: ch. 14:29; Ex. 30:14
  - type: text
    content: 'From twenty years old and upward, all in Israel who are able to go to war, you and Aaron shall list them, '
  - type: note
    content: Ex. 12:51
  - type: text
    content: 'company by company. '
  '30':
  - type: text
    content: 'Of the people of Zebulun, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '31':
  - type: text
    content: 'those listed of the tribe of Zebulun were '
  - type: note
    content: '[ch. 26:27]'
  - type: text
    content: 57,400.
  '32':
  - type: text
    content: 'Of the people of Joseph, namely, of the people of Ephraim, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '33':
  - type: text
    content: 'those listed of the tribe of Ephraim were '
  - type: note
    content: '[ch. 26:37]'
  - type: text
    content: 40,500.
  '34':
  - type: text
    content: 'Of the people of Manasseh, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '35':
  - type: text
    content: 'those listed of the tribe of Manasseh were '
  - type: note
    content: '[ch. 26:34]'
  - type: text
    content: 32,200.
  '36':
  - type: text
    content: 'Of the people of Benjamin, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '37':
  - type: text
    content: 'those listed of the tribe of Benjamin were '
  - type: note
    content: '[ch. 26:41]'
  - type: text
    content: 35,400.
  '38':
  - type: text
    content: 'Of the people of Dan, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '39':
  - type: text
    content: 'those listed of the tribe of Dan were '
  - type: note
    content: '[ch. 26:43]'
  - type: text
    content: 62,700.
  '4':
  - type: text
    content: 'And there shall be with you a man from each tribe, each man being the head of the house of his fathers. '
  '40':
  - type: text
    content: 'Of the people of Asher, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '41':
  - type: text
    content: 'those listed of the tribe of Asher were '
  - type: note
    content: '[ch. 26:47]'
  - type: text
    content: 41,500.
  '42':
  - type: text
    content: 'Of the people of Naphtali, their generations, by their clans, by their fathers’ houses, according to the number of names, from twenty years old and upward, every man able to go to war: '
  '43':
  - type: text
    content: 'those listed of the tribe of Naphtali were '
  - type: note
    content: '[ch. 26:50]'
  - type: text
    content: 53,400.
  '44':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:64
  - type: text
    content: 'These are those who were listed, whom Moses and Aaron listed with the help of the chiefs of Israel, twelve men, each representing his fathers’ house. '
  '45':
  - type: text
    content: 'So all those listed of the people of Israel, by their fathers’ houses, from twenty years old and upward, every man able to go to war in Israel— '
  '46':
  - type: text
    content: 'all those listed were '
  - type: note
    content: Ex. 38:26; [ch. 11:21; 26:51; Ex. 12:37]
  - type: text
    content: 603,550.
  - type: heading
    content: Levites Exempted
  '47':
  - type: text
    content: 'But '
  - type: note
    content: ch. 2:33; [ch. 26:57, 58, 62]; See ch. 3; ch. 4; 1 Chr. 6
  - type: text
    content: 'the Levites were not listed along with them by their ancestral tribe. '
  '48':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '49':
  - type: text
    content: '“Only the tribe of Levi you shall not list, and you shall not take a census of them among the people of Israel. '
  '5':
  - type: text
    content: 'And these are the names of the men who shall assist you. From Reuben, '
  - type: note
    content: ch. 7:30
  - type: text
    content: 'Elizur the son of Shedeur; '
  '50':
  - type: note
    content: ch. 3:7, 8; Ex. 38:21; See ch. 4:15-33
  - type: text
    content: 'But appoint the Levites over the tabernacle of the testimony, and over all its furnishings, and over all that belongs to it. They are to carry the tabernacle and all its furnishings, and they shall take care of it '
  - type: note
    content: See ch. 3:23-38
  - type: text
    content: 'and shall camp around the tabernacle. '
  '51':
  - type: note
    content: ch. 10:17, 21
  - type: text
    content: 'When the tabernacle is to set out, the Levites shall take it down, and when the tabernacle is to be pitched, the Levites shall set it up. '
  - type: note
    content: ch. 3:10, 38; 18:22; [1 Sam. 6:19; 2 Sam. 6:6, 7; 1 Chr. 13:10]
  - type: text
    content: 'And if any outsider comes near, he shall be put to death. '
  '52':
  - type: text
    content: 'The people of Israel shall pitch their tents by their companies, each man in his own camp and '
  - type: note
    content: ch. 2:2, 34
  - type: text
    content: 'each man by his own standard. '
  '53':
  - type: text
    content: 'But the Levites shall camp around the tabernacle of the testimony, so that there may be no '
  - type: note
    content: ch. 8:19; 16:46; 18:5
  - type: text
    content: 'wrath on the congregation of the people of Israel. '
  - type: note
    content: ch. 3:7, 8, 38; 8:26; 9:19, 23; 18:3-5; 31:30, 47; 1 Chr. 23:32; [2 Chr. 13:11]
  - type: text
    content: 'And the Levites shall keep guard over the tabernacle of the testimony.” '
  '54':
  - type: text
    content: 'Thus did the people of Israel; they did according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: text
    content: 'from Simeon, '
  - type: note
    content: ch. 7:36
  - type: text
    content: 'Shelumiel the son of Zurishaddai; '
  '7':
  - type: text
    content: 'from Judah, '
  - type: note
    content: See Ex. 6:23
  - type: text
    content: 'Nahshon the son of Amminadab; '
  '8':
  - type: text
    content: 'from Issachar, '
  - type: note
    content: ch. 7:18
  - type: text
    content: 'Nethanel the son of Zuar; '
  '9':
  - type: text
    content: 'from Zebulun, '
  - type: note
    content: ch. 7:24
  - type: text
    content: 'Eliab the son of Helon; '
