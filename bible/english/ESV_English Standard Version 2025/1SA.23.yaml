          text: Deut. 1:1
      marker-yv: yv-n
    - type: text
      text: 'in the Arabah to the south of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
