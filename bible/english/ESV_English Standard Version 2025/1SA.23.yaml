      children:
      - type: text
        text: '15'
    - type: text
      text: 'David saw that Saul had come out to seek his life. David was in the wilderness of Ziph at Horesh. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
