      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 54
      marker-yv: yv-n
    - type: text
      text: 'Then the Ziphites went up to Saul at Gibeah, saying, “Is not David hiding among us in the strongholds at Horesh, on the hill of Hachilah, which is south of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 21:20
      marker-yv: yv-n
    - type: text
      text: 'Jeshimon? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Therefore David '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
