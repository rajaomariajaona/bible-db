      marker-yv: yv-n
    - type: text
      text: 'inquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Shall I go and attack these Philistines?” And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
