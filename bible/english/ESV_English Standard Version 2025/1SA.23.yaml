        - type: text
          text: Song 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 47:10
      marker-yv: yv-n
    - type: text
      text: Engedi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But David’s men said to him, “Behold, we are afraid here in Judah; how much more then if we go to Keilah against the armies of the Philistines?” '
  '4':
  - type: usfm
