    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Will the men of Keilah surrender me into his hand? Will Saul come down, as your servant has heard? O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, please tell your servant.” And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “He will come down.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then David said, “Will the men of Keilah surrender me and my men into the hand of Saul?” And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
