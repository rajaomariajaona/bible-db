document_id: 1SA.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Saves the City of Keilah
  - type: text
    content: 'Now they told David, “Behold, the Philistines are fighting against '
  - type: note
    content: Josh. 15:44
  - type: text
    content: 'Keilah and are robbing the threshing floors.” '
  '10':
  - type: text
    content: 'Then David said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, your servant has surely heard that Saul seeks to come to Keilah, to destroy the city on my account. '
  '11':
  - type: text
    content: 'Will the men of Keilah surrender me into his hand? Will Saul come down, as your servant has heard? O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, please tell your servant.” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “He will come down.” '
  '12':
  - type: text
    content: 'Then David said, “Will the men of Keilah surrender me and my men into the hand of Saul?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: ver. 20
  - type: text
    content: '“They will surrender you.” '
  '13':
  - type: text
    content: 'Then David and his men, '
  - type: note
    content: ch. 25:13; 27:2; [ch. 22:2; 30:9, 10]
  - type: text
    content: 'who were about six hundred, arose and departed from Keilah, and they went '
  - type: note
    content: '[2 Sam. 15:20]'
  - type: text
    content: 'wherever they could go. When Saul was told that David had escaped from Keilah, he gave up the expedition. '
  '14':
  - type: text
    content: 'And David remained in the strongholds in the wilderness, in the hill country '
  - type: note
    content: See Ps. 63
  - type: text
    content: 'of the wilderness of '
  - type: note
    content: Josh. 15:24
  - type: text
    content: Ziph. And Saul sought him every day, but God did not give him into his hand.
  - type: heading
    content: Saul Pursues David
  '15':
  - type: text
    content: 'David saw that Saul had come out to seek his life. David was in the wilderness of Ziph at Horesh. '
  '16':
  - type: text
    content: 'And Jonathan, Saul’s son, rose and went to David at Horesh, and strengthened his hand in God. '
  '17':
  - type: text
    content: 'And he said to him, “Do not fear, for the hand of Saul my father shall not find you. You shall be king over Israel, and I shall be next to you. '
  - type: note
    content: ch. 24:20; [ch. 20:31]
  - type: text
    content: 'Saul my father also knows this.” '
  '18':
  - type: note
    content: ch. 18:3; 20:8, 16, 42; [2 Sam. 21:7]
  - type: text
    content: 'And the two of them made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: . David remained at Horesh, and Jonathan went home.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:1; See Ps. 54
  - type: text
    content: 'Then the Ziphites went up to Saul at Gibeah, saying, “Is not David hiding among us in the strongholds at Horesh, on the hill of Hachilah, which is south of '
  - type: note
    content: Num. 21:20
  - type: text
    content: 'Jeshimon? '
  '2':
  - type: text
    content: 'Therefore David '
  - type: note
    content: See ch. 22:10
  - type: text
    content: 'inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I go and attack these Philistines?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David, “Go and attack the Philistines and save Keilah.” '
  '20':
  - type: text
    content: 'Now come down, O king, according to all your heart’s desire to come down, '
  - type: note
    content: ver. 12
  - type: text
    content: 'and our part shall be to surrender him into the king’s hand.” '
  '21':
  - type: text
    content: 'And Saul said, '
  - type: note
    content: See Ruth 2:20
  - type: text
    content: '“May you be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 22:8]'
  - type: text
    content: 'for you have had compassion on me. '
  '22':
  - type: text
    content: 'Go, make yet more sure. Know and see the place where his foot is, and who has seen him there, for it is told me that he is very cunning. '
  '23':
  - type: text
    content: 'See therefore and take note of all the lurking places where he hides, and come back to me with sure information. Then I will go with you. And if he is in the land, I will search him out among all the thousands of Judah.” '
  '24':
  - type: text
    content: And they arose and went to Ziph ahead of Saul.
  - type: text
    content: 'Now David and his men were '
  - type: note
    content: ch. 25:2; Josh. 15:55
  - type: text
    content: 'in the wilderness of Maon, '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'in the Arabah to the south of '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'Jeshimon. '
  '25':
  - type: text
    content: 'And Saul and his men went to seek him. And David was told, so he went down to the rock and lived in the wilderness of Maon. And when Saul heard that, he pursued after David in the wilderness of Maon. '
  '26':
  - type: text
    content: 'Saul went on one side of the mountain, and David and his men on the other side of the mountain. And David was hurrying to get away from Saul. As Saul and his men were closing in on David and his men to capture them, '
  '27':
  - type: text
    content: 'a messenger came to Saul, saying, “Hurry and come, for the Philistines have made a raid against the land.” '
  '28':
  - type: text
    content: So Saul returned from pursuing after David and went against the Philistines. Therefore that place was called the Rock of Escape.
  - type: note
    content: Or Rock of Divisions
  - type: text
    content: ' '
  '29':
  - type: note
    content: Ch 24:1 in Hebrew
  - type: text
    content: ' And David went up from there and lived in the strongholds of '
  - type: note
    content: Josh. 15:62; 2 Chr. 20:2; Song 1:14; Ezek. 47:10
  - type: text
    content: Engedi.
  '3':
  - type: text
    content: 'But David’s men said to him, “Behold, we are afraid here in Judah; how much more then if we go to Keilah against the armies of the Philistines?” '
  '4':
  - type: text
    content: 'Then David '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ' again. And the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him, “Arise, go down to Keilah, '
  - type: note
    content: ver. 14; Josh. 24:11; Judg. 7:7; 20:28
  - type: text
    content: 'for I will give the Philistines into your hand.” '
  '5':
  - type: text
    content: And David and his men went to Keilah and fought with the Philistines and brought away their livestock and struck them with a great blow. So David saved the inhabitants of Keilah.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 22:20
  - type: text
    content: 'When Abiathar the son of Ahimelech had fled to David to Keilah, he had come down with an ephod in his hand. '
  '7':
  - type: text
    content: 'Now it was told Saul that David had come to Keilah. And Saul said, “God has given him into my hand, for he has shut himself in by entering a town that has gates and bars.” '
  '8':
  - type: text
    content: 'And Saul summoned all the people to war, to go down to Keilah, to besiege David and his men. '
  '9':
  - type: text
    content: 'David knew that Saul was plotting harm against him. And he said to Abiathar the priest, '
  - type: note
    content: ch. 30:7; [Num. 27:21]
  - type: text
    content: '“Bring the ephod here.” '
