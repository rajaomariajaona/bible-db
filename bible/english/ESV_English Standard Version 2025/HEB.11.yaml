document_id: HEB.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: By Faith
  - type: text
    content: 'Now faith is the assurance of things hoped for, the conviction of '
  - type: note
    content: Rom. 8:24; 2 Cor. 4:18; 5:7; 1 Pet. 1:8
  - type: text
    content: 'things not seen. '
  '10':
  - type: text
    content: 'For he was looking forward to '
  - type: note
    content: ch. 12:22; [ch. 13:14]
  - type: text
    content: 'the city that has '
  - type: note
    content: Ps. 87:1; Rev. 21:14
  - type: text
    content: 'foundations, '
  - type: note
    content: Rev. 21:2, 10
  - type: text
    content: 'whose designer and builder is God. '
  '11':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 17:19; 18:11-14; 21:2
  - type: text
    content: 'Sarah herself received power to conceive, even when she was past the age, since she considered '
  - type: note
    content: ch. 10:23
  - type: text
    content: 'him faithful who had promised. '
  '12':
  - type: text
    content: 'Therefore from one man, and '
  - type: note
    content: Rom. 4:19
  - type: text
    content: 'him as good as dead, were born descendants '
  - type: note
    content: Gen. 22:17; 32:12; See Gen. 15:5
  - type: text
    content: as many as the stars of heaven and as many as the innumerable grains of sand by the seashore.
  '13':
  - type: text
    content: 'These all died in faith, '
  - type: note
    content: ver. 39
  - type: text
    content: 'not having received the things promised, but '
  - type: note
    content: ver. 27; John 8:56; [Matt. 13:17]
  - type: text
    content: 'having seen them and greeted them from afar, and '
  - type: note
    content: Gen. 23:4; 47:9; [1 Chr. 29:15; Ps. 39:12]
  - type: text
    content: 'having acknowledged that they were '
  - type: note
    content: Eph. 2:19
  - type: text
    content: 'strangers and exiles on the earth. '
  '14':
  - type: text
    content: 'For people who speak thus make it clear that they are seeking a homeland. '
  '15':
  - type: text
    content: 'If they had been thinking of that land from which they had gone out, '
  - type: note
    content: '[Gen. 24:6-8]'
  - type: text
    content: 'they would have had opportunity to return. '
  '16':
  - type: text
    content: 'But as it is, they desire a better country, that is, a heavenly one. Therefore God is not ashamed '
  - type: note
    content: Gen. 26:24; 28:13; Ex. 3:6; 4:5; [ch. 2:11]
  - type: text
    content: 'to be called their God, for '
  - type: note
    content: '[ver. 10; Matt. 25:34; John 14:2]'
  - type: text
    content: he has prepared for them a city.
  '17':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 22:1-10; James 2:21
  - type: text
    content: 'Abraham, when he was tested, offered up Isaac, and he who had received the promises was in the act of offering up his only son, '
  '18':
  - type: text
    content: 'of whom it was said, '
  - type: note
    content: Rom. 9:7; Cited from Gen. 21:12
  - type: text
    content: '“Through Isaac shall your offspring be named.” '
  '19':
  - type: note
    content: Rom. 4:17-21
  - type: text
    content: 'He considered that God was able even to raise him from the dead, from which, figuratively speaking, he did receive him back. '
  '2':
  - type: text
    content: 'For by it the people of old received their commendation. '
  '20':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 27:27-29, 39, 40
  - type: text
    content: 'Isaac invoked future blessings on Jacob and Esau. '
  '21':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 48:16, 20
  - type: text
    content: 'Jacob, when dying, blessed each of the sons of Joseph, '
  - type: note
    content: '[Gen. 47:31]'
  - type: text
    content: 'bowing in worship over the head of his staff. '
  '22':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 50:24, 25; Ex. 13:19
  - type: text
    content: Joseph, at the end of his life, made mention of the exodus of the Israelites and gave directions concerning his bones.
  '23':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 2:2, 3; Acts 7:20
  - type: text
    content: 'Moses, when he was born, was hidden for three months by his parents, because they saw that the child was beautiful, and they were not afraid of '
  - type: note
    content: Ex. 1:16, 22
  - type: text
    content: 'the king’s edict. '
  '24':
  - type: text
    content: 'By faith Moses, when he was grown up, '
  - type: note
    content: Ex. 2:10, 11
  - type: text
    content: 'refused to be called the son of Pharaoh’s daughter, '
  '25':
  - type: note
    content: '[Job 36:21; Ps. 84:10]'
  - type: text
    content: 'choosing rather to be mistreated with the people of God than to enjoy '
  - type: note
    content: 1 John 2:17
  - type: text
    content: 'the fleeting pleasures of sin. '
  '26':
  - type: note
    content: ch. 13:13; [Ps. 89:50, 51; Phil. 3:7, 8; 1 Pet. 4:14]
  - type: text
    content: 'He considered the reproach of Christ greater wealth than the treasures of Egypt, for he was looking to '
  - type: note
    content: ch. 2:2; 10:35
  - type: text
    content: 'the reward. '
  '27':
  - type: text
    content: 'By faith he '
  - type: note
    content: Ex. 12:37; 13:17, 18
  - type: text
    content: 'left Egypt, '
  - type: note
    content: Ex. 10:28, 29
  - type: text
    content: 'not being afraid of the anger of the king, for he endured '
  - type: note
    content: ver. 13; See 1 Tim. 1:17
  - type: text
    content: 'as seeing him who is invisible. '
  '28':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 12:21-30
  - type: text
    content: he kept the Passover and sprinkled the blood, so that the Destroyer of the firstborn might not touch them.
  '29':
  - type: text
    content: 'By faith '
  - type: note
    content: Ex. 14:21-30
  - type: text
    content: 'the people crossed the Red Sea as on dry land, but the Egyptians, when they attempted to do the same, were drowned. '
  '3':
  - type: text
    content: 'By faith we understand that the universe was created by '
  - type: note
    content: See Gen. 1:1
  - type: text
    content: 'the word of God, so that what is seen was not made out of '
  - type: note
    content: '[Rom. 4:17]'
  - type: text
    content: things that are visible.
  '30':
  - type: text
    content: 'By faith '
  - type: note
    content: Josh. 6:15, 16, 20
  - type: text
    content: 'the walls of Jericho fell down after they had been encircled for seven days. '
  '31':
  - type: text
    content: 'By faith '
  - type: note
    content: Josh. 6:25; James 2:25
  - type: text
    content: 'Rahab the prostitute did not perish with those who were disobedient, because she '
  - type: note
    content: Josh. 2:1, 8-13
  - type: text
    content: had given a friendly welcome to the spies.
  '32':
  - type: text
    content: 'And what more shall I say? For time would fail me to tell of '
  - type: note
    content: Judg. 6:11
  - type: text
    content: 'Gideon, '
  - type: note
    content: Judg. 4:6
  - type: text
    content: 'Barak, '
  - type: note
    content: Judg. 13:24
  - type: text
    content: 'Samson, '
  - type: note
    content: Judg. 11:1
  - type: text
    content: 'Jephthah, of '
  - type: note
    content: 1 Sam. 16:1, 13
  - type: text
    content: 'David and '
  - type: note
    content: 1 Sam. 1:20
  - type: text
    content: 'Samuel and the prophets— '
  '33':
  - type: text
    content: 'who through faith conquered kingdoms, enforced justice, obtained promises, '
  - type: note
    content: Judg. 14:6; 1 Sam. 17:35; Dan. 6:22
  - type: text
    content: 'stopped the mouths of lions, '
  '34':
  - type: note
    content: Dan. 3:25
  - type: text
    content: 'quenched the power of fire, escaped the edge of the sword, were made strong out of weakness, '
  - type: note
    content: Judg. 7:21; 1 Sam. 17:51; 2 Sam. 12:29
  - type: text
    content: 'became mighty in war, '
  - type: note
    content: Judg. 7:21; 1 Sam. 17:51; 2 Sam. 12:29
  - type: text
    content: 'put foreign armies to flight. '
  '35':
  - type: note
    content: 1 Kgs. 17:22; 2 Kgs. 4:35
  - type: text
    content: 'Women received back their dead by resurrection. Some were tortured, refusing to accept release, so that they might rise again to a better life. '
  '36':
  - type: text
    content: 'Others suffered mocking and flogging, and even '
  - type: note
    content: Gen. 39:20; Jer. 20:2; 37:15
  - type: text
    content: 'chains and imprisonment. '
  '37':
  - type: note
    content: 1 Kgs. 21:13; 2 Chr. 24:21
  - type: text
    content: They were stoned, they were sawn in two,
  - type: note
    content: Some manuscripts add they were tempted
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 19:10; Jer. 26:23
  - type: text
    content: 'they were killed with the sword. '
  - type: note
    content: 2 Kgs. 1:8
  - type: text
    content: 'They went about in skins of sheep and goats, destitute, afflicted, mistreated— '
  '38':
  - type: text
    content: of whom the world was not worthy—
  - type: note
    content: 1 Sam. 22:1; 1 Kgs. 18:4; 19:9
  - type: text
    content: wandering about in deserts and mountains, and in dens and caves of the earth.
  '39':
  - type: text
    content: 'And all these, '
  - type: note
    content: ver. 2, 13; [1 Pet. 1:12]
  - type: text
    content: 'though commended through their faith, '
  - type: note
    content: ver. 2, 13; [1 Pet. 1:12]
  - type: text
    content: 'did not receive what was promised, '
  '4':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 4:4-8; 1 John 3:12
  - type: text
    content: 'Abel offered to God '
  - type: note
    content: Prov. 15:8
  - type: text
    content: 'a more acceptable sacrifice than Cain, through which he was commended as righteous, God commending him by accepting his gifts. And '
  - type: note
    content: Gen. 4:10
  - type: text
    content: 'through his faith, though he died, he '
  - type: note
    content: ch. 12:24
  - type: text
    content: 'still speaks. '
  '40':
  - type: text
    content: 'since God had provided something better for us, '
  - type: note
    content: '[Rev. 6:11]'
  - type: text
    content: that apart from us they should not be made perfect.
  '5':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 5:22-24; [2 Kgs. 2:11]
  - type: text
    content: 'Enoch was taken up so that he should not see death, and he was not found, because God had taken him. Now before he was taken he was commended as having pleased God. '
  '6':
  - type: text
    content: 'And without faith it is impossible to please him, for whoever would draw near to God '
  - type: note
    content: 1 Chr. 28:9; Jer. 29:12-14; [John 4:24]
  - type: text
    content: 'must believe that he exists and '
  - type: note
    content: 1 Chr. 28:9; Jer. 29:12-14; [John 4:24]
  - type: text
    content: 'that he rewards those who seek him. '
  '7':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 6:13-22; Luke 17:26; 1 Pet. 3:20
  - type: text
    content: 'Noah, being warned by God concerning '
  - type: note
    content: ver. 1
  - type: text
    content: 'events as yet unseen, in reverent fear constructed an ark for the saving of his household. By this he condemned the world and became an heir of '
  - type: note
    content: Rom. 4:13; [Gen. 6:9; Ezek. 14:14, 20]
  - type: text
    content: the righteousness that comes by faith.
  '8':
  - type: text
    content: 'By faith '
  - type: note
    content: Gen. 12:1-4; Acts 7:2-4
  - type: text
    content: 'Abraham obeyed when he was called to go out to a place '
  - type: note
    content: Gen. 12:7
  - type: text
    content: 'that he was to receive as an inheritance. And he went out, not knowing where he was going. '
  '9':
  - type: text
    content: 'By faith he went to live in '
  - type: note
    content: Acts 7:5
  - type: text
    content: 'the land of promise, as in a foreign land, '
  - type: note
    content: Gen. 12:8; 13:3, 18; 18:1, 9
  - type: text
    content: 'living in tents '
  - type: note
    content: Gen. 35:27
  - type: text
    content: 'with Isaac and Jacob, heirs with him of the same promise. '
