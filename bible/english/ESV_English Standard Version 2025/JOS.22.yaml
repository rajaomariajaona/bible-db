document_id: JOS.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Eastern Tribes Return Home
  - type: text
    content: 'At that time Joshua summoned the Reubenites and the Gadites and the half-tribe of Manasseh, '
  '10':
  - type: text
    content: 'And when they came to the region of the Jordan that is in the land of Canaan, the people of Reuben and the people of Gad and the half-tribe of Manasseh built there an altar by the Jordan, an altar of imposing size. '
  '11':
  - type: text
    content: 'And the people of Israel '
  - type: note
    content: See Deut. 13:12-15
  - type: text
    content: 'heard it said, “Behold, the people of Reuben and the people of Gad and the half-tribe of Manasseh have built the altar at the frontier of the land of Canaan, in the region about the Jordan, on the side that belongs to the people of Israel.” '
  '12':
  - type: text
    content: 'And when the people of Israel heard of it, '
  - type: note
    content: Judg. 20:1
  - type: text
    content: the whole assembly of the people of Israel gathered at Shiloh to make war against them.
  '13':
  - type: text
    content: 'Then the people of Israel sent to the people of Reuben and the people of Gad and the half-tribe of Manasseh, in the land of Gilead, '
  - type: note
    content: Ex. 6:25; Num. 25:7; Judg. 20:28
  - type: text
    content: 'Phinehas the son of Eleazar the priest, '
  '14':
  - type: text
    content: 'and with him ten chiefs, one from each of the tribal families of Israel, '
  - type: note
    content: Num. 1:4
  - type: text
    content: 'every one of them the head of a family among the clans of Israel. '
  '15':
  - type: text
    content: 'And they came to the people of Reuben, the people of Gad, and the half-tribe of Manasseh, in the land of Gilead, and they said to them, '
  '16':
  - type: text
    content: '“Thus says the whole congregation of the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘What is this breach of faith that you have committed against the God of Israel in turning away this day from following the '
  - type: text
    content: Lord
  - type: text
    content: ' by building yourselves an altar this day '
  - type: note
    content: ver. 18, 19; Num. 14:9; [Lev. 17:8, 9; Deut. 12:13, 14]
  - type: text
    content: 'in rebellion against the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  '17':
  - type: text
    content: 'Have we not had enough of '
  - type: note
    content: Num. 25:3; Deut. 4:3; Ps. 106:28
  - type: text
    content: 'the sin at Peor from which even yet we have not cleansed ourselves, and for which there came a plague upon the congregation of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'that you too must turn away this day from following the '
  - type: text
    content: Lord
  - type: text
    content: '? And if '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'you too rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' today then tomorrow '
  - type: note
    content: Num. 16:22
  - type: text
    content: 'he will be angry with the whole congregation of Israel. '
  '19':
  - type: text
    content: 'But now, if the land of your possession is unclean, pass over into the '
  - type: text
    content: Lord
  - type: text
    content: '’s land '
  - type: note
    content: ch. 18:1
  - type: text
    content: 'where the '
  - type: text
    content: Lord
  - type: text
    content: '’s tabernacle stands, and take for yourselves a possession among us. '
  - type: note
    content: ver. 16, 18
  - type: text
    content: 'Only do not rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' or make us as rebels by building for yourselves an altar other than the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '2':
  - type: text
    content: 'and said to them, “You have kept '
  - type: note
    content: See Num. 32:20-22; Deut. 3:18-20
  - type: text
    content: 'all that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded you '
  - type: note
    content: ch. 1:16, 17
  - type: text
    content: 'and have obeyed my voice in all that I have commanded you. '
  '20':
  - type: note
    content: ch. 7:1, 5
  - type: text
    content: 'Did not Achan the son of Zerah break faith in the matter of the devoted things, and '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: wrath fell upon all the congregation of Israel? And he did not perish alone for his iniquity.’”
  '21':
  - type: text
    content: 'Then the people of Reuben, the people of Gad, and the half-tribe of Manasseh said in answer to the heads of the families of Israel, '
  '22':
  - type: text
    content: '“The Mighty One, '
  - type: note
    content: Deut. 10:17
  - type: text
    content: 'God, the '
  - type: text
    content: Lord
  - type: text
    content: '! The Mighty One, God, the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  - type: note
    content: 1 Kgs. 8:39
  - type: text
    content: 'He knows; and let Israel itself know! If it was in rebellion or in breach of faith against the '
  - type: text
    content: Lord
  - type: text
    content: ', do not spare us today '
  '23':
  - type: text
    content: 'for building an altar to turn away from following the '
  - type: text
    content: Lord
  - type: text
    content: '. Or if we did so to offer burnt offerings or grain offerings or peace offerings on it, may the '
  - type: text
    content: Lord
  - type: text
    content: ' himself '
  - type: note
    content: Deut. 18:19; 1 Sam. 20:16
  - type: text
    content: 'take vengeance. '
  '24':
  - type: text
    content: 'No, but we did it from fear that '
  - type: note
    content: See ch. 4:6, 21
  - type: text
    content: 'in time to come your children might say to our children, ‘What have you to do with the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel? '
  '25':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has made the Jordan a boundary between us and you, you people of Reuben and people of Gad. You have no portion in the '
  - type: text
    content: Lord
  - type: text
    content: '.’ So your children might make our children cease to worship the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Therefore we said, ‘Let us now build an altar, not for burnt offering, nor for sacrifice, '
  '27':
  - type: text
    content: 'but to be '
  - type: note
    content: ver. 34; ch. 24:27; Gen. 31:48
  - type: text
    content: 'a witness between us and you, and between our generations after us, that we '
  - type: note
    content: Deut. 12:5, 6, 17, 18
  - type: text
    content: 'do perform the service of the '
  - type: text
    content: Lord
  - type: text
    content: ' in his presence with our burnt offerings and sacrifices and peace offerings, so your children will not say to our children in time to come, “You have no portion in the '
  - type: text
    content: Lord
  - type: text
    content: '.”’ '
  '28':
  - type: text
    content: 'And we thought, ‘If this should be said to us or to our descendants in time to come, we should say, “Behold, the copy of the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', which our fathers made, not for burnt offerings, nor for sacrifice, but to be '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'a witness between us and you.”’ '
  '29':
  - type: text
    content: 'Far be it from us that we should '
  - type: note
    content: See ver. 16
  - type: text
    content: 'rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' and turn away this day from following the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ver. 16
  - type: text
    content: 'by building an altar for burnt offering, grain offering, or sacrifice, other than the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God that stands before his tabernacle!”'
  '3':
  - type: text
    content: 'You have not forsaken your brothers these many days, down to this day, but have been careful to keep the charge of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '30':
  - type: text
    content: 'When '
  - type: note
    content: ver. 13, 14
  - type: text
    content: 'Phinehas the priest and the chiefs of the congregation, the heads of the families of Israel who were with him, heard the words that the people of Reuben and the people of Gad and the people of Manasseh spoke, '
  - type: note
    content: ver. 33
  - type: text
    content: 'it was good in their eyes. '
  '31':
  - type: text
    content: 'And Phinehas the son of Eleazar the priest said to the people of Reuben and the people of Gad and the people of Manasseh, “Today we know that '
  - type: note
    content: Lev. 26:11, 12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is in our midst, because you have not committed this breach of faith against the '
  - type: text
    content: Lord
  - type: text
    content: '. Now you have delivered the people of Israel from the hand of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '32':
  - type: text
    content: 'Then Phinehas the son of Eleazar the priest, and the chiefs, returned from the people of Reuben and the people of Gad '
  - type: note
    content: ver. 10, 11, 15
  - type: text
    content: 'in the land of Gilead to the land of Canaan, to the people of Israel, and brought back word to them. '
  '33':
  - type: text
    content: 'And the report '
  - type: note
    content: ver. 30
  - type: text
    content: 'was good in the eyes of the people of Israel. And the people of Israel '
  - type: note
    content: 1 Chr. 29:20; Neh. 8:6; Dan. 2:19; Luke 2:28
  - type: text
    content: 'blessed God and spoke no more of making war against them to destroy the land where the people of Reuben and the people of Gad were settled. '
  '34':
  - type: text
    content: 'The people of Reuben and the people of Gad called the altar Witness, “For,” they said, '
  - type: note
    content: ver. 27
  - type: text
    content: '“it is a witness between us that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God.”'
  '4':
  - type: note
    content: See ch. 11:23
  - type: text
    content: 'And now the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given rest to your brothers, as he promised them. Therefore turn and go to your tents in the land where your possession lies, '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'which Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you on the other side of the Jordan. '
  '5':
  - type: note
    content: Deut. 6:6, 17; 11:22
  - type: text
    content: 'Only be very careful to observe the commandment and the law that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded you, '
  - type: note
    content: ch. 23:11; Deut. 6:5; 10:12; 11:1, 13, 22
  - type: text
    content: 'to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and to walk in all his ways and to keep his commandments and to cling to him and to serve him with all your heart and with all your soul.” '
  '6':
  - type: text
    content: 'So Joshua '
  - type: note
    content: ch. 14:13
  - type: text
    content: blessed them and sent them away, and they went to their tents.
  '7':
  - type: text
    content: 'Now to the one half of the tribe of Manasseh Moses had given a possession in Bashan, '
  - type: note
    content: ch. 17:5
  - type: text
    content: 'but to the other half Joshua had given a possession beside their brothers in the land west of the Jordan. And when Joshua sent them away to their homes and blessed them, '
  '8':
  - type: text
    content: 'he said to them, “Go back to your tents with much wealth and with very much livestock, with silver, gold, bronze, and iron, and with much clothing. '
  - type: note
    content: Num. 31:27; 1 Sam. 30:24
  - type: text
    content: 'Divide the spoil of your enemies with your brothers.” '
  '9':
  - type: text
    content: 'So the people of Reuben and the people of Gad and the half-tribe of Manasseh returned home, parting from the people of Israel at Shiloh, which is in the land of Canaan, to go '
  - type: note
    content: Num. 32:1, 26, 29
  - type: text
    content: 'to the land of Gilead, their own land of which they had possessed themselves by command of the '
  - type: text
    content: Lord
  - type: text
    content: ' through Moses.'
  - type: heading
    content: The Eastern Tribes’ Altar of Witness
