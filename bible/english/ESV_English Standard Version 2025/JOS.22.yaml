document_id: JOS.22,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Eastern Tribes Return Home
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Joshua summoned the Reubenites and the Gadites and the half-tribe of Manasseh, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they came to the region of the Jordan that is in the land of Canaan, the people of Reuben and the people of Gad and the half-tribe of Manasseh built there an altar by the Jordan, an altar of imposing size. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 13:12-15
      marker-yv: yv-n
    - type: text
      text: 'heard it said, “Behold, the people of Reuben and the people of Gad and the half-tribe of Manasseh have built the altar at the frontier of the land of Canaan, in the region about the Jordan, on the side that belongs to the people of Israel.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people of Israel heard of it, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 20:1
      marker-yv: yv-n
    - type: text
      text: the whole assembly of the people of Israel gathered at Shiloh to make war against them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Israel sent to the people of Reuben and the people of Gad and the half-tribe of Manasseh, in the land of Gilead, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 6:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 25:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 20:28
      marker-yv: yv-n
    - type: text
      text: 'Phinehas the son of Eleazar the priest, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with him ten chiefs, one from each of the tribal families of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:4
      marker-yv: yv-n
    - type: text
      text: 'every one of them the head of a family among the clans of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came to the people of Reuben, the people of Gad, and the half-tribe of Manasseh, in the land of Gilead, and they said to them, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says the whole congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘What is this breach of faith that you have committed against the God of Israel in turning away this day from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by building yourselves an altar this day '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18, 19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:9
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 17:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 12:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in rebellion against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have we not had enough of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 25:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 4:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:28
      marker-yv: yv-n
    - type: text
      text: 'the sin at Peor from which even yet we have not cleansed ourselves, and for which there came a plague upon the congregation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you too must turn away this day from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? And if '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'you too rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' today then tomorrow '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 16:22
      marker-yv: yv-n
    - type: text
      text: 'he will be angry with the whole congregation of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, if the land of your possession is unclean, pass over into the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s land '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      marker-yv: yv-n
    - type: text
      text: 'where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s tabernacle stands, and take for yourselves a possession among us. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16, 18
      marker-yv: yv-n
    - type: text
      text: 'Only do not rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or make us as rebels by building for yourselves an altar other than the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to them, “You have kept '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 32:20-22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 3:18-20
      marker-yv: yv-n
    - type: text
      text: 'all that Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: 'and have obeyed my voice in all that I have commanded you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      marker-yv: yv-n
    - type: text
      text: 'Did not Achan the son of Zerah break faith in the matter of the devoted things, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: wrath fell upon all the congregation of Israel? And he did not perish alone for his iniquity.’”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Reuben, the people of Gad, and the half-tribe of Manasseh said in answer to the heads of the families of Israel, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The Mighty One, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 10:17
      marker-yv: yv-n
    - type: text
      text: 'God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! The Mighty One, God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:39
      marker-yv: yv-n
    - type: text
      text: 'He knows; and let Israel itself know! If it was in rebellion or in breach of faith against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not spare us today '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for building an altar to turn away from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Or if we did so to offer burnt offerings or grain offerings or peace offerings on it, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' himself '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 18:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 20:16
      marker-yv: yv-n
    - type: text
      text: 'take vengeance. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, but we did it from fear that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'in time to come your children might say to our children, ‘What have you to do with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made the Jordan a boundary between us and you, you people of Reuben and people of Gad. You have no portion in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ So your children might make our children cease to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore we said, ‘Let us now build an altar, not for burnt offering, nor for sacrifice, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but to be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 31:48
      marker-yv: yv-n
    - type: text
      text: 'a witness between us and you, and between our generations after us, that we '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 12:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      marker-yv: yv-n
    - type: text
      text: 'do perform the service of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in his presence with our burnt offerings and sacrifices and peace offerings, so your children will not say to our children in time to come, “You have no portion in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.”’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we thought, ‘If this should be said to us or to our descendants in time to come, we should say, “Behold, the copy of the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which our fathers made, not for burnt offerings, nor for sacrifice, but to be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'a witness between us and you.”’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Far be it from us that we should '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and turn away this day from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'by building an altar for burnt offering, grain offering, or sacrifice, other than the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God that stands before his tabernacle!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have not forsaken your brothers these many days, down to this day, but have been careful to keep the charge of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13, 14
      marker-yv: yv-n
    - type: text
      text: 'Phinehas the priest and the chiefs of the congregation, the heads of the families of Israel who were with him, heard the words that the people of Reuben and the people of Gad and the people of Manasseh spoke, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      marker-yv: yv-n
    - type: text
      text: 'it was good in their eyes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Phinehas the son of Eleazar the priest said to the people of Reuben and the people of Gad and the people of Manasseh, “Today we know that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 26:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is in our midst, because you have not committed this breach of faith against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Now you have delivered the people of Israel from the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Phinehas the son of Eleazar the priest, and the chiefs, returned from the people of Reuben and the people of Gad '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10, 11, 15
      marker-yv: yv-n
    - type: text
      text: 'in the land of Gilead to the land of Canaan, to the people of Israel, and brought back word to them. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the report '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      marker-yv: yv-n
    - type: text
      text: 'was good in the eyes of the people of Israel. And the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 29:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 8:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 2:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:28
      marker-yv: yv-n
    - type: text
      text: 'blessed God and spoke no more of making war against them to destroy the land where the people of Reuben and the people of Gad were settled. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
