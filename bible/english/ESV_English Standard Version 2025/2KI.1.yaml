        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in the second year of Jehoram the son of Jehoshaphat, king of Judah, because Ahaziah had no son. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the acts of Ahaziah that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Ahaziah fell through the lattice in his upper chamber in Samaria, and lay sick; so he sent messengers, telling them, “Go, inquire of '
