  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the king sent to him another captain of fifty men with his fifty. And he answered and said to him, “O man of God, this is the king’s order, ‘Come down quickly!’” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elijah answered them, “If I am a man of God, '
