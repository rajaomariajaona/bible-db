  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the king sent the captain of a third fifty with his fifty. And the third captain of fifty went up and came and fell on his knees before Elijah and entreated him, “O man of God, please let my life, and the life of these fifty servants of yours, '
