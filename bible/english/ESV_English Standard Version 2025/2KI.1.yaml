  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The messengers returned to the king, and he said to them, “Why have you returned?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to him, “There came a man to meet us, and said to us, ‘Go back to the king who sent you, and say to him, Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Is it because there is no God in Israel that you are sending to inquire of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Baal-zebub, the god of Ekron? Therefore you shall not come down from the bed to which you have gone up, but you shall surely die.’” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “What kind of man was he who came to meet you and told you these things?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 13:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 1:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: “He wore a garment of hair, with a belt of leather about his waist.” And he said, “It is Elijah the Tishbite.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king sent to him a captain of fifty men with his fifty. He went up to Elijah, who was sitting on the top of a hill, and said to him, '
