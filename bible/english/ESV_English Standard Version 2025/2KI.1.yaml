document_id: 2KI.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Denounces Ahaziah
  - type: text
    content: ' '
  - type: note
    content: ch. 3:5
  - type: text
    content: 'After the death of Ahab, Moab '
  - type: note
    content: '[2 Sam. 8:2]'
  - type: text
    content: rebelled against Israel.
  '10':
  - type: text
    content: 'But Elijah answered the captain of fifty, “If I am a man of God, '
  - type: note
    content: Luke 9:54
  - type: text
    content: let fire come down from heaven and consume you and your fifty.” Then fire came down from heaven and consumed him and his fifty.
  '11':
  - type: text
    content: 'Again the king sent to him another captain of fifty men with his fifty. And he answered and said to him, “O man of God, this is the king’s order, ‘Come down quickly!’” '
  '12':
  - type: text
    content: 'But Elijah answered them, “If I am a man of God, '
  - type: note
    content: Job 1:16
  - type: text
    content: let fire come down from heaven and consume you and your fifty.” Then the fire of God came down from heaven and consumed him and his fifty.
  '13':
  - type: text
    content: 'Again the king sent the captain of a third fifty with his fifty. And the third captain of fifty went up and came and fell on his knees before Elijah and entreated him, “O man of God, please let my life, and the life of these fifty servants of yours, '
  - type: note
    content: '[1 Sam. 26:21; Ps. 72:14]'
  - type: text
    content: 'be precious in your sight. '
  '14':
  - type: text
    content: 'Behold, fire came down from heaven and consumed the two former captains of fifty men with their fifties, but now let my life be precious in your sight.” '
  '15':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah, “Go down with him; do not be afraid of him.” So he arose and went down with him to the king '
  '16':
  - type: text
    content: 'and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Because you have sent messengers to inquire of '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: Baal-zebub, the god of Ekron—is it because there is no God in Israel to inquire of his word?—therefore you shall not come down from the bed to which you have gone up, but you shall surely die.’”
  '17':
  - type: text
    content: 'So he died according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that Elijah had spoken. Jehoram became king in his place '
  - type: note
    content: '[ch. 3:1; 8:16]'
  - type: text
    content: 'in the second year of Jehoram the son of Jehoshaphat, king of Judah, because Ahaziah had no son. '
  '18':
  - type: text
    content: Now the rest of the acts of Ahaziah that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  '2':
  - type: text
    content: 'Now Ahaziah fell through the lattice in his upper chamber in Samaria, and lay sick; so he sent messengers, telling them, “Go, inquire of '
  - type: note
    content: '[Matt. 10:25; 12:24, 27; Mark 3:22; Luke 11:15, 18, 19]'
  - type: text
    content: 'Baal-zebub, the god of Ekron, '
  - type: note
    content: '[ch. 8:8]'
  - type: text
    content: 'whether I shall recover from this sickness.” '
  '3':
  - type: text
    content: 'But the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah '
  - type: note
    content: 1 Kgs. 17:1; 21:17
  - type: text
    content: 'the Tishbite, “Arise, go up to meet the messengers of the king of Samaria, and say to them, ‘Is it because there is no God in Israel that you are going to inquire of '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Baal-zebub, the god of Ekron? '
  '4':
  - type: text
    content: 'Now therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 6, 16
  - type: text
    content: You shall not come down from the bed to which you have gone up, but you shall surely die.’” So Elijah went.
  '5':
  - type: text
    content: 'The messengers returned to the king, and he said to them, “Why have you returned?” '
  '6':
  - type: text
    content: 'And they said to him, “There came a man to meet us, and said to us, ‘Go back to the king who sent you, and say to him, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Is it because there is no God in Israel that you are sending to inquire of '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Baal-zebub, the god of Ekron? Therefore you shall not come down from the bed to which you have gone up, but you shall surely die.’” '
  '7':
  - type: text
    content: 'He said to them, “What kind of man was he who came to meet you and told you these things?” '
  '8':
  - type: text
    content: 'They answered him, '
  - type: note
    content: '[Zech. 13:4; Matt. 3:4; Mark 1:6]'
  - type: text
    content: “He wore a garment of hair, with a belt of leather about his waist.” And he said, “It is Elijah the Tishbite.”
  '9':
  - type: text
    content: 'Then the king sent to him a captain of fifty men with his fifty. He went up to Elijah, who was sitting on the top of a hill, and said to him, '
  - type: note
    content: Deut. 33:1; Judg. 13:6; 1 Sam. 2:27; 9:6
  - type: text
    content: '“O man of God, the king says, ‘Come down.’” '
