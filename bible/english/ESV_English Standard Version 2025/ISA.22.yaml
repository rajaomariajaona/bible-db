document_id: ISA.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: An Oracle Concerning Jerusalem
  - type: text
    content: 'The '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'oracle concerning '
  - type: note
    content: ver. 5; Jer. 21:13; [Joel 3:12, 14]
  - type: text
    content: the valley of vision.
  - type: text
    content: What do you mean that you have gone up,
  - type: text
    content: all of you, to the housetops,
  '10':
  - type: text
    content: 'and you counted the houses of Jerusalem, and you broke down the houses to fortify the wall. '
  '11':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'You made a reservoir between '
  - type: note
    content: '[2 Kgs. 25:4]'
  - type: text
    content: 'the two walls for the water of '
  - type: note
    content: '[ch. 7:3; 2 Kgs. 20:20; 2 Chr. 32:3, 4]'
  - type: text
    content: 'the old pool. But '
  - type: note
    content: '[ch. 5:12]'
  - type: text
    content: you did not look to him who did it, or see him who planned it long ago.
  '12':
  - type: text
    content: 'In that day '
  - type: note
    content: '[Joel 2:17]'
  - type: text
    content: 'the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts'
  - type: text
    content: called for weeping and mourning,
  - type: text
    content: 'for '
  - type: note
    content: See ch. 3:24
  - type: text
    content: 'baldness and '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: wearing sackcloth;
  '13':
  - type: text
    content: and behold, joy and gladness,
  - type: text
    content: killing oxen and slaughtering sheep,
  - type: text
    content: eating flesh and drinking wine.
  - type: note
    content: ch. 56:12; Cited 1 Cor. 15:32
  - type: text
    content: “Let us eat and drink,
  - type: text
    content: for tomorrow we die.”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'has revealed himself in my ears:'
  - type: text
    content: '“Surely '
  - type: note
    content: '[ch. 27:9; 1 Sam. 3:14]'
  - type: text
    content: 'this iniquity will not be atoned for you '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: until you die,”
  - type: text
    content: 'says the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts.'
  '15':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts, “Come, go to this steward, to '
  - type: note
    content: ch. 36:3, 11, 22; 37:2; 2 Kgs. 18:18, 26, 37; 19:2
  - type: text
    content: 'Shebna, who is over the household, and say to him: '
  '16':
  - type: text
    content: 'What have you to do here, and whom have you here, '
  - type: note
    content: 2 Chr. 16:14
  - type: text
    content: 'that you have cut out here a tomb for yourself, you '
  - type: note
    content: Matt. 27:60
  - type: text
    content: 'who cut out a tomb on the height and carve a dwelling for yourself in the rock? '
  '17':
  - type: text
    content: 'Behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' will hurl you away violently, O you strong man. '
  - type: note
    content: '[Dan. 3:21]'
  - type: text
    content: 'He will seize firm hold on you '
  '18':
  - type: text
    content: 'and whirl you around and around, and throw you like a ball into a wide land. There you shall die, and there shall be '
  - type: note
    content: '[ch. 36:9]'
  - type: text
    content: 'your glorious chariots, you shame of your master’s house. '
  '19':
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'I will thrust you from your office, and you will be pulled down from your station. '
  '2':
  - type: text
    content: you who are full of shoutings,
  - type: text
    content: 'tumultuous city, '
  - type: note
    content: ch. 32:13
  - type: text
    content: exultant town?
  - type: text
    content: 'Your slain are '
  - type: note
    content: Lam. 4:9
  - type: text
    content: not slain with the sword
  - type: text
    content: or dead in battle.
  '20':
  - type: text
    content: 'In that day I will call my servant '
  - type: note
    content: ch. 36:3; 37:2; 2 Kgs. 18:18, 26, 37; 19:2
  - type: text
    content: 'Eliakim the son of Hilkiah, '
  '21':
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'I will clothe him with your robe, and will bind your sash on him, and will commit your authority to his hand. And he shall be '
  - type: note
    content: Gen. 45:8
  - type: text
    content: 'a father to the inhabitants of Jerusalem and to the house of Judah. '
  '22':
  - type: text
    content: 'And I will place '
  - type: note
    content: ch. 9:6
  - type: text
    content: 'on his shoulder '
  - type: note
    content: Rev. 3:7
  - type: text
    content: 'the key of the house of David. '
  - type: note
    content: '[Job 12:14]'
  - type: text
    content: 'He shall open, and none shall shut; and he shall shut, and none shall open. '
  '23':
  - type: text
    content: 'And I will fasten him '
  - type: note
    content: '[ch. 33:20; 54:2; Eccles. 12:11]'
  - type: text
    content: 'like a peg in a secure place, and he will become '
  - type: note
    content: '[Rev. 3:21]'
  - type: text
    content: 'a throne of honor to his father’s house. '
  '24':
  - type: text
    content: 'And they will hang on him the whole honor of his father’s house, the offspring and issue, every small vessel, from the cups to all the flagons. '
  '25':
  - type: text
    content: 'In that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'the peg that was fastened in a secure place will give way, and it will be cut down and fall, and the load that was on it will be cut off, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:10 ]'
  - type: text
    content: All your leaders have fled together;
  - type: text
    content: without the bow they were captured.
  - type: text
    content: All of you who were found were captured,
  - type: text
    content: though they had fled far away.
  '4':
  - type: text
    content: 'Therefore I said:'
  - type: text
    content: “Look away from me;
  - type: note
    content: Jer. 9:1; Mic. 1:8
  - type: text
    content: let me weep bitter tears;
  - type: text
    content: do not labor to comfort me
  - type: text
    content: concerning the destruction of the daughter of my people.”
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:12-17
  - type: text
    content: 'For the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts has '
  - type: note
    content: '[ch. 37:3]'
  - type: text
    content: a day
  - type: text
    content: 'of tumult and '
  - type: note
    content: ch. 10:6; 18:2
  - type: text
    content: 'trampling and '
  - type: note
    content: Mic. 7:4
  - type: text
    content: confusion
  - type: text
    content: 'in '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: the valley of vision,
  - type: text
    content: a battering down of walls
  - type: text
    content: and a shouting to the mountains.
  '6':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 11:11
  - type: text
    content: Elam bore the quiver
  - type: text
    content: with chariots and horsemen,
  - type: text
    content: 'and '
  - type: note
    content: 2 Kgs. 16:9
  - type: text
    content: Kir uncovered the shield.
  '7':
  - type: text
    content: Your choicest valleys were full of chariots,
  - type: text
    content: and the horsemen took their stand at the gates.
  '8':
  - type: text
    content: 'He has taken away '
  - type: note
    content: ch. 30:1
  - type: text
    content: the covering of Judah.
  - type: text
    content: 'In that day you looked to '
  - type: note
    content: 1 Kgs. 10:17
  - type: text
    content: 'the weapons of the House of the Forest, '
  '9':
  - type: text
    content: 'and you saw that '
  - type: note
    content: ver. 5, 10; [2 Chr. 32:5]
  - type: text
    content: 'the breaches of the city of David were many. '
  - type: note
    content: '[Neh. 3:16]'
  - type: text
    content: 'You collected the waters of the lower pool, '
