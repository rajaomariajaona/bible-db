          text: ']'
      marker-yv: yv-n
    - type: text
      text: '‘Who knows whether the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be gracious to me, that the child may live?’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now he is dead. Why should I fast? Can I bring him back again? I shall go to him, '
