        text: Lord
    - type: text
      text: ' lives, the man who has done this deserves to die, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall restore the lamb '
    - type: usfm
      marker: x
      children:
      - type: usfm
