document_id: 2SA.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nathan Rebukes David
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent '
  - type: note
    content: ver. 7, 13, 15, 25; ch. 7:2, 4, 17; 1 Kgs. 1:10, 22, 34; 4:5; 1 Chr. 29:29; 2 Chr. 9:29
  - type: text
    content: 'Nathan to David. He came to him and said to him, '
  - type: note
    content: '[ch. 14:5-7; Judg. 9:8-15]; 1 Kgs. 20:35-41'
  - type: text
    content: '“There were two men in a certain city, the one rich and the other poor. '
  '10':
  - type: text
    content: 'Now therefore the sword shall never depart from your house, because you have despised me and have taken the wife of Uriah the Hittite to be your wife.’ '
  '11':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘Behold, I will raise up evil against you out of your own house. And I will take your wives before your eyes and give them to your neighbor, and he shall lie with your wives in the sight of this sun. '
  '12':
  - type: text
    content: 'For you did it secretly, '
  - type: note
    content: ch. 16:22
  - type: text
    content: 'but I will do this thing before all Israel and before the sun.’” '
  '13':
  - type: note
    content: '[1 Sam. 15:24]'
  - type: text
    content: 'David said to Nathan, '
  - type: note
    content: ch. 24:10; Ps. 32:5; 51:4
  - type: text
    content: '“I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: '.” And Nathan said to David, '
  - type: note
    content: Ps. 32:1; Mic. 7:18; Zech. 3:4
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' also has put away your sin; you shall not die. '
  '14':
  - type: text
    content: 'Nevertheless, because by this deed you have utterly '
  - type: note
    content: Isa. 52:5; [Ezek. 36:20, 23; Rom. 2:24]
  - type: text
    content: 'scorned the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Masoretic Text the enemies of the Lord; Dead Sea Scroll the word of the Lord
  - type: text
    content: 'the child who is born to you shall die.” '
  '15':
  - type: text
    content: Then Nathan went to his house.
  - type: heading
    content: David’s Child Dies
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' afflicted the child that Uriah’s wife bore to David, and he became sick. '
  '16':
  - type: text
    content: 'David therefore sought God on behalf of the child. And David '
  - type: note
    content: '[1 Kgs. 21:27]'
  - type: text
    content: 'fasted and went in '
  - type: note
    content: ch. 13:31
  - type: text
    content: 'and lay all night on the ground. '
  '17':
  - type: text
    content: 'And the elders of his house stood beside him, to raise him from the ground, but he would not, nor did he eat food with them. '
  '18':
  - type: text
    content: 'On the seventh day the child died. And the servants of David were afraid to tell him that the child was dead, for they said, “Behold, while the child was yet alive, we spoke to him, and he did not listen to us. How then can we say to him the child is dead? He may do himself some harm.” '
  '19':
  - type: text
    content: 'But when David saw that his servants were whispering together, David understood that the child was dead. And David said to his servants, “Is the child dead?” They said, “He is dead.” '
  '2':
  - type: text
    content: 'The rich man had very many flocks and herds, '
  '20':
  - type: text
    content: 'Then David arose from the earth '
  - type: note
    content: Ruth 3:3
  - type: text
    content: 'and washed and anointed himself and changed his clothes. And he went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Job 1:20
  - type: text
    content: 'and worshiped. He then went to his own house. And when he asked, they set food before him, and he ate. '
  '21':
  - type: text
    content: 'Then his servants said to him, “What is this thing that you have done? You fasted and wept for the child while he was alive; but when the child died, you arose and ate food.” '
  '22':
  - type: text
    content: 'He said, “While the child was still alive, I fasted and wept, for I said, '
  - type: note
    content: '[Jonah 3:9]'
  - type: text
    content: '‘Who knows whether the '
  - type: text
    content: Lord
  - type: text
    content: ' will be gracious to me, that the child may live?’ '
  '23':
  - type: text
    content: 'But now he is dead. Why should I fast? Can I bring him back again? I shall go to him, '
  - type: note
    content: Job 7:8-10
  - type: text
    content: but he will not return to me.”
  - type: heading
    content: Solomon’s Birth
  '24':
  - type: text
    content: 'Then David comforted his wife, Bathsheba, and went in to her and lay with her, and '
  - type: note
    content: Matt. 1:6
  - type: text
    content: 'she bore a son, and he called his name '
  - type: note
    content: 1 Chr. 22:9
  - type: text
    content: 'Solomon. And the '
  - type: text
    content: Lord
  - type: text
    content: ' loved him '
  '25':
  - type: text
    content: and sent a message by Nathan the prophet. So he called his name Jedidiah,
  - type: note
    content: Jedidiah means beloved of the Lord
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Rabbah Is Captured
  '26':
  - type: text
    content: ' '
  - type: note
    content: For ver. 26-31, see 1 Chr. 20:1-3
  - type: text
    content: 'Now Joab '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'fought against '
  - type: note
    content: Deut. 3:11
  - type: text
    content: 'Rabbah of the Ammonites and took the royal city. '
  '27':
  - type: text
    content: 'And Joab sent messengers to David and said, “I have fought against Rabbah; moreover, I have taken the city of waters. '
  '28':
  - type: text
    content: 'Now then gather the rest of the people together and encamp against the city and take it, lest I take the city and it be called by my name.” '
  '29':
  - type: text
    content: 'So David gathered all the people together and went to Rabbah and fought against it and took it. '
  '3':
  - type: text
    content: but the poor man had nothing but one little ewe lamb, which he had bought. And he brought it up, and it grew up with him and with his children. It used to eat of his morsel and drink from his cup and lie in his arms,
  - type: note
    content: Hebrew bosom; also verse 8
  - type: text
    content: ' and it was like a daughter to him. '
  '30':
  - type: text
    content: And he took the crown of their king from his head. The weight of it was a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, and in it was a precious stone, and it was placed on David’s head. And he brought out the spoil of the city, a very great amount. '
  '31':
  - type: text
    content: And he brought out the people who were in it and set them to labor with saws and iron picks and iron axes and made them toil at
  - type: note
    content: Hebrew pass through
  - type: text
    content: ' the brick kilns. And thus he did to all the cities of the Ammonites. Then David and all the people returned to Jerusalem.'
  '4':
  - type: text
    content: 'Now there came a traveler to the rich man, and he was unwilling to take one of his own flock or herd to prepare for the guest who had come to him, but he took the poor man’s lamb and prepared it for the man who had come to him.” '
  '5':
  - type: text
    content: 'Then David’s anger was greatly kindled against the man, and he said to Nathan, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, the man who has done this deserves to die, '
  '6':
  - type: text
    content: 'and he shall restore the lamb '
  - type: note
    content: '[Ex. 22:1; Luke 19:8]'
  - type: text
    content: fourfold, because he did this thing, and because he had no pity.”
  '7':
  - type: text
    content: 'Nathan said to David, “You are the man! Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: 1 Sam. 16:13
  - type: text
    content: '‘I anointed you king over Israel, and I delivered you out of the hand of Saul. '
  '8':
  - type: text
    content: 'And I gave you your master’s house and your master’s wives into your arms and gave you the house of Israel and of Judah. And if this were too little, I would add to you as much more. '
  '9':
  - type: note
    content: Num. 15:31
  - type: text
    content: 'Why have you despised the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Sam. 15:19
  - type: text
    content: 'to do what is evil in his sight? '
  - type: note
    content: ch. 11:15, 17
  - type: text
    content: 'You have struck down Uriah the Hittite with the sword and '
  - type: note
    content: ch. 11:27
  - type: text
    content: 'have taken his wife to be your wife and have killed him with the sword of the Ammonites. '
