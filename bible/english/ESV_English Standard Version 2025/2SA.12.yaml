  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there came a traveler to the rich man, and he was unwilling to take one of his own flock or herd to prepare for the guest who had come to him, but he took the poor man’s lamb and prepared it for the man who had come to him.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David’s anger was greatly kindled against the man, and he said to Nathan, '
    - type: usfm
