        text: Lord
    - type: text
      text: ', the God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 16:13
      marker-yv: yv-n
    - type: text
      text: '‘I anointed you king over Israel, and I delivered you out of the hand of Saul. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I gave you your master’s house and your master’s wives into your arms and gave you the house of Israel and of Judah. And if this were too little, I would add to you as much more. '
  '9':
  - type: usfm
    marker: p
