  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the elders of his house stood beside him, to raise him from the ground, but he would not, nor did he eat food with them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day the child died. And the servants of David were afraid to tell him that the child was dead, for they said, “Behold, while the child was yet alive, we spoke to him, and he did not listen to us. How then can we say to him the child is dead? He may do himself some harm.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when David saw that his servants were whispering together, David understood that the child was dead. And David said to his servants, “Is the child dead?” They said, “He is dead.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rich man had very many flocks and herds, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David arose from the earth '
