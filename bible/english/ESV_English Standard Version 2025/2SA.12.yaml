  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his servants said to him, “What is this thing that you have done? You fasted and wept for the child while he was alive; but when the child died, you arose and ate food.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “While the child was still alive, I fasted and wept, for I said, '
