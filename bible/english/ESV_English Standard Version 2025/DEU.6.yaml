document_id: DEU.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Greatest Commandment
  - type: text
    content: '“Now this is '
  - type: note
    content: ch. 4:1; 5:31; 12:1
  - type: text
    content: the commandment—the statutes and the rules
  - type: note
    content: Or just decrees; also verse 20
  - type: text
    content: '—that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded me to teach you, that you may do them in the land to which you are going over, to possess it, '
  '10':
  - type: text
    content: '“And when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land that he swore to your fathers, to Abraham, to Isaac, and to Jacob, to give you—with great and good cities '
  - type: note
    content: Josh. 24:13; [Josh. 11:13; Neh. 9:25; Ps. 105:44]
  - type: text
    content: 'that you did not build, '
  '11':
  - type: text
    content: 'and houses full of all good things that you did not fill, and cisterns that you did not dig, and vineyards and olive trees that you did not plant—and when you eat and are full, '
  '12':
  - type: note
    content: '[Prov. 30:8, 9]'
  - type: text
    content: 'then take care lest you forget the '
  - type: text
    content: Lord
  - type: text
    content: ', who brought you out of the land of Egypt, out of the house of slavery. '
  '13':
  - type: text
    content: 'It is '
  - type: note
    content: Cited Matt. 4:10; Luke 4:8
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God you shall fear. Him you shall serve and '
  - type: note
    content: ch. 10:20; Josh. 2:12; Ps. 63:11; Isa. 45:23; 65:16; Jer. 12:16
  - type: text
    content: 'by his name you shall swear. '
  '14':
  - type: text
    content: 'You shall not '
  - type: note
    content: ch. 8:19; 11:16, 28; 13:2, 3; 28:14; Jer. 25:6
  - type: text
    content: 'go after other gods, '
  - type: note
    content: ch. 13:7
  - type: text
    content: 'the gods of the peoples who are around you— '
  '15':
  - type: text
    content: 'for '
  - type: note
    content: ch. 7:21
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in your midst '
  - type: note
    content: See Ex. 20:5
  - type: text
    content: is a jealous God—
  - type: note
    content: ch. 7:4; 11:17
  - type: text
    content: 'lest the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God be kindled against you, and he destroy you from off the face of the earth.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 4:7; Luke 4:12
  - type: text
    content: '“You shall not put the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to the test, '
  - type: note
    content: ch. 9:22; 33:8; Ps. 95:8; [1 Cor. 10:9]; See Ex. 17:2-7
  - type: text
    content: 'as you tested him at Massah. '
  '17':
  - type: text
    content: 'You shall '
  - type: note
    content: ch. 11:22; Ps. 119:4
  - type: text
    content: 'diligently keep the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and his testimonies and his statutes, which he has commanded you. '
  '18':
  - type: note
    content: See ch. 12:25
  - type: text
    content: 'And you shall do what is right and good in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', that it may go well with you, and that you may go in and take possession of the good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give to your fathers '
  '19':
  - type: note
    content: Ex. 23:28-30; Num. 33:52, 53
  - type: text
    content: 'by thrusting out all your enemies from before you, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised.'
  '2':
  - type: text
    content: 'that '
  - type: note
    content: ch. 5:29; 10:12, 20; 13:4; Ps. 128:1; Eccles. 12:13
  - type: text
    content: 'you may fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you and your son and your son’s son, by keeping all his statutes and his commandments, which I command you, all the days of your life, and '
  - type: note
    content: See ch. 4:40
  - type: text
    content: 'that your days may be long. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex. 12:26; 13:14
  - type: text
    content: '“When your son asks you in time to come, ‘What is the meaning of the testimonies and the statutes and the rules that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has commanded you?’ '
  '21':
  - type: text
    content: 'then you shall say to your son, '
  - type: note
    content: '[Ex. 20:2]'
  - type: text
    content: '‘We were Pharaoh’s slaves in Egypt. And the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with a mighty hand. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 135:9; See ch. 4:34
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' showed signs and wonders, great and grievous, against Egypt and against Pharaoh and all his household, before our eyes. '
  '23':
  - type: text
    content: 'And he brought us out from there, that he might bring us in and give us the land that he swore to give to our fathers. '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded us to do all these statutes, '
  - type: note
    content: ver. 2, 13
  - type: text
    content: 'to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: ch. 10:13; Jer. 32:39
  - type: text
    content: 'for our good always, that '
  - type: note
    content: ch. 4:1; 8:1; [Lev. 18:5; Ps. 41:2]
  - type: text
    content: 'he might preserve us alive, as we are this day. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: ch. 24:13
  - type: text
    content: 'it will be righteousness for us, if we are careful to do all this commandment before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, as he has commanded us.’'
  '3':
  - type: text
    content: 'Hear therefore, O Israel, and be careful to do them, that it may go well with you, and that you may multiply greatly, '
  - type: note
    content: Gen. 15:5; 22:17; 26:4; 28:14; Ex. 32:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, has promised you, in a land flowing with milk and honey.'
  '4':
  - type: text
    content: '“Hear, O Israel: '
  - type: note
    content: Cited Mark 12:29; [Isa. 42:8; Zech. 14:9; John 17:3; 1 Cor. 8:4, 6]
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' our God, the '
  - type: text
    content: Lord
  - type: text
    content: ' is one.'
  - type: note
    content: Or The Lord our God is one Lord; or The Lord is our God, the Lord is one; or The Lord is our God, the Lord alone
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'You '
  - type: note
    content: Cited Matt. 22:37; Mark 12:30; Luke 10:27; [2 Kgs. 23:25]
  - type: text
    content: 'shall love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul and with all your might. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:18; 32:46; Ps. 37:31; Isa. 51:7; Jer. 31:33
  - type: text
    content: 'these words that I command you today shall be on your heart. '
  '7':
  - type: note
    content: See ch. 4:9
  - type: text
    content: 'You shall teach them diligently to your children, and shall talk of them when you sit in your house, and when you walk by the way, and when you lie down, and when you rise. '
  '8':
  - type: note
    content: ch. 11:18; Prov. 3:3; 6:21; 7:3; See Ex. 13:9
  - type: text
    content: 'You shall bind them as a sign on your hand, and they shall be as frontlets between your eyes. '
  '9':
  - type: note
    content: ch. 11:20; [Isa. 57:8]
  - type: text
    content: You shall write them on the doorposts of your house and on your gates.
