document_id: HEB.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ’s Sacrifice Once for All
  - type: text
    content: 'For since the law has but '
  - type: note
    content: ch. 8:5; Col. 2:17
  - type: text
    content: 'a shadow '
  - type: note
    content: ch. 9:11
  - type: text
    content: 'of the good things to come instead of the true form of these realities, '
  - type: note
    content: '[ch. 9:9]'
  - type: text
    content: 'it can never, by the same sacrifices that are continually offered every year, make perfect those who draw near. '
  '10':
  - type: text
    content: 'And by that will '
  - type: note
    content: ch. 2:11; 13:12
  - type: text
    content: 'we have been sanctified through the offering of '
  - type: note
    content: Matt. 26:26; Mark 14:22; Luke 22:19; 1 Cor. 11:24; [ver. 5]
  - type: text
    content: 'the body of Jesus Christ '
  - type: note
    content: ch. 7:27; 9:12
  - type: text
    content: once for all.
  '11':
  - type: text
    content: 'And every priest stands '
  - type: note
    content: '[Num. 28:3]'
  - type: text
    content: 'daily at his service, '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'offering repeatedly the same sacrifices, '
  - type: note
    content: ver. 1, 4; [ch. 9:9]
  - type: text
    content: 'which can never take away sins. '
  '12':
  - type: text
    content: But when Christ
  - type: note
    content: Greek this one
  - type: text
    content: ' had offered for all time a single sacrifice for sins, he '
  - type: note
    content: ch. 1:3; See Mark 16:19
  - type: text
    content: 'sat down at the right hand of God, '
  '13':
  - type: text
    content: 'waiting from that time '
  - type: note
    content: ch. 1:13; [1 Cor. 15:25-28]
  - type: text
    content: 'until his enemies should be made a footstool for his feet. '
  '14':
  - type: text
    content: 'For by a single offering '
  - type: note
    content: ver. 1
  - type: text
    content: he has perfected for all time those who are being sanctified.
  '15':
  - type: text
    content: And the Holy Spirit also bears witness to us; for after saying,
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:10; Rom. 11:27; Cited from Jer. 31:33
  - type: text
    content: “This is the covenant that I will make with them
  - type: text
    content: 'after those days, declares the Lord:'
  - type: text
    content: I will put my laws on their hearts,
  - type: text
    content: and write them on their minds,”
  '17':
  - type: text
    content: then he adds,
  - type: note
    content: ch. 8:12; Cited from Jer. 31:34
  - type: text
    content: “I will remember their sins and their lawless deeds no more.”
  '18':
  - type: text
    content: Where there is forgiveness of these, there is no longer any offering for sin.
  - type: heading
    content: The Full Assurance of Faith
  '19':
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:16
  - type: text
    content: Therefore, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' since we have confidence to enter '
  - type: note
    content: ch. 9:25
  - type: text
    content: 'the holy places by the blood of Jesus, '
  '2':
  - type: text
    content: 'Otherwise, would they not have ceased to be offered, since the worshipers, having once been cleansed, would no longer have any consciousness of sins? '
  '20':
  - type: text
    content: 'by '
  - type: note
    content: ch. 9:8; [John 10:9; 14:6]
  - type: text
    content: 'the new and living way that he opened for us through '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'the curtain, that is, through his flesh, '
  '21':
  - type: text
    content: 'and since we have '
  - type: note
    content: Zech. 6:11-13; [ch. 4:14]; See ch. 2:17
  - type: text
    content: 'a great priest over the house of God, '
  '22':
  - type: text
    content: 'let us draw near with a true heart in full assurance of faith, with our hearts '
  - type: note
    content: Ezek. 36:25; [ch. 12:24; 2 Cor. 7:1; 1 Pet. 1:2]
  - type: text
    content: 'sprinkled clean '
  - type: note
    content: ch. 9:14
  - type: text
    content: 'from an evil conscience and our bodies '
  - type: note
    content: '[1 Cor. 6:11]'
  - type: text
    content: 'washed with pure water. '
  '23':
  - type: note
    content: ch. 4:14
  - type: text
    content: 'Let us hold fast the confession of our hope without wavering, for '
  - type: note
    content: ch. 11:11; See 1 Cor. 1:9
  - type: text
    content: 'he who promised is faithful. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 3:13]'
  - type: text
    content: 'let us consider how to stir up one another to love and good works, '
  '25':
  - type: note
    content: '[Acts 2:42]'
  - type: text
    content: 'not neglecting to meet together, as is the habit of some, but encouraging one another, and '
  - type: note
    content: Rom. 13:11-13
  - type: text
    content: 'all the more as you see '
  - type: note
    content: See 1 Cor. 3:13
  - type: text
    content: the Day drawing near.
  '26':
  - type: text
    content: 'For '
  - type: note
    content: Num. 15:30; Deut. 17:12
  - type: text
    content: 'if we go on sinning deliberately '
  - type: note
    content: ch. 6:4; 2 Pet. 2:20, 21
  - type: text
    content: 'after receiving the knowledge of the truth, '
  - type: note
    content: '[ch. 6:6; 1 John 5:16]'
  - type: text
    content: 'there no longer remains a sacrifice for sins, '
  '27':
  - type: note
    content: ch. 2:3; 12:25
  - type: text
    content: 'but a fearful expectation of judgment, and '
  - type: note
    content: Ps. 79:5; Isa. 26:11; Zeph. 1:18; 3:8; [Ezek. 36:5; Zech. 8:2]; See 2 Thess. 1:8
  - type: text
    content: 'a fury of fire that will consume the adversaries. '
  '28':
  - type: note
    content: Deut. 17:2-6
  - type: text
    content: 'Anyone who has set aside the law of Moses dies without mercy '
  - type: note
    content: See Num. 35:30
  - type: text
    content: 'on the evidence of two or three witnesses. '
  '29':
  - type: text
    content: 'How much worse punishment, do you think, will be deserved by the one '
  - type: note
    content: '[ch. 6:6]'
  - type: text
    content: 'who has trampled underfoot the Son of God, and has profaned '
  - type: note
    content: ch. 13:20; Zech. 9:11
  - type: text
    content: 'the blood of the covenant '
  - type: note
    content: ch. 9:13, 14
  - type: text
    content: 'by which he was sanctified, and has '
  - type: note
    content: '[Matt. 12:31, 32; Eph. 4:30]'
  - type: text
    content: 'outraged the Spirit of grace? '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 9:7
  - type: text
    content: 'in these sacrifices '
  - type: note
    content: Lev. 16:21
  - type: text
    content: 'there is a reminder of sins every year. '
  '30':
  - type: text
    content: 'For we know him who said, '
  - type: note
    content: Rom. 12:19; Cited from Deut. 32:35
  - type: text
    content: '“Vengeance is mine; I will repay.” And again, '
  - type: note
    content: Ps. 50:4; 135:14; Cited from Deut. 32:36
  - type: text
    content: '“The Lord will judge his people.” '
  '31':
  - type: note
    content: Isa. 33:14; Luke 12:5
  - type: text
    content: It is a fearful thing to fall into the hands of the living God.
  '32':
  - type: text
    content: 'But recall the former days when, after '
  - type: note
    content: ch. 6:4
  - type: text
    content: 'you were enlightened, you endured '
  - type: note
    content: See Phil. 1:30
  - type: text
    content: 'a hard struggle with sufferings, '
  '33':
  - type: text
    content: 'sometimes being '
  - type: note
    content: 1 Cor. 4:9 (Gk.)
  - type: text
    content: 'publicly exposed to reproach and affliction, and sometimes being partners with those so treated. '
  '34':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 13:3; Matt. 25:36; 2 Tim. 1:16]'
  - type: text
    content: 'you had compassion on those in prison, and '
  - type: note
    content: See Matt. 5:12
  - type: text
    content: 'you joyfully accepted the plundering of your property, since you knew that you yourselves had '
  - type: note
    content: 1 Pet. 1:4
  - type: text
    content: 'a better possession and an abiding one. '
  '35':
  - type: text
    content: 'Therefore do not throw away your confidence, which has '
  - type: note
    content: ch. 2:2; 11:26
  - type: text
    content: 'a great reward. '
  '36':
  - type: text
    content: 'For '
  - type: note
    content: ch. 12:1-7; Luke 21:19; Rom. 2:7; 12:12; See Matt. 10:22
  - type: text
    content: 'you have need of endurance, so that '
  - type: note
    content: ch. 13:21; [1 John 2:17]
  - type: text
    content: 'when you have done the will of God you may '
  - type: note
    content: ch. 11:39
  - type: text
    content: 'receive what is promised. '
  '37':
  - type: text
    content: For,
  - type: note
    content: Isa. 26:20; Hag. 2:6; Luke 18:8
  - type: text
    content: “Yet a little while,
  - type: text
    content: 'and '
  - type: note
    content: Cited from Hab. 2:3, 4
  - type: text
    content: the coming one will come and will not delay;
  '38':
  - type: text
    content: ' '
  - type: note
    content: Rom. 1:17; Gal. 3:11
  - type: text
    content: but my righteous one shall live by faith,
  - type: text
    content: and if he shrinks back,
  - type: text
    content: my soul has no pleasure in him.”
  '39':
  - type: text
    content: But we are not of those who shrink back and are destroyed, but of those who have faith and preserve their souls.
  '4':
  - type: text
    content: 'For '
  - type: note
    content: ver. 11
  - type: text
    content: it is impossible for the blood of bulls and goats to take away sins.
  '5':
  - type: text
    content: 'Consequently, '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: when Christ
  - type: note
    content: Greek he
  - type: text
    content: ' came into the world, he said,'
  - type: note
    content: Cited from Ps. 40:6-8
  - type: text
    content: “Sacrifices and offerings you have not desired,
  - type: text
    content: but a body have you prepared for me;
  '6':
  - type: text
    content: in burnt offerings and sin offerings
  - type: text
    content: you have taken no pleasure.
  '7':
  - type: text
    content: Then I said, ‘Behold, I have come to do your will, O God,
  - type: text
    content: as it is written of me in the scroll of the book.’”
  '8':
  - type: text
    content: 'When he said above, “You have neither desired nor taken pleasure in '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'sacrifices and offerings and burnt offerings and sin offerings” (these are offered according to the law), '
  '9':
  - type: text
    content: 'then he added, '
  - type: note
    content: ver. 7
  - type: text
    content: '“Behold, I have come to do your will.” He does away with the first in order to establish the second. '
