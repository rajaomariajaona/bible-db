document_id: EXO.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Contributions for the Sanctuary
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 37:1-3; Deut. 10:3; Heb. 9:4
  - type: text
    content: “They shall make an ark of acacia wood. Two cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and a half shall be its length, a cubit and a half its breadth, and a cubit and a half its height. '
  '11':
  - type: text
    content: 'You shall overlay it with '
  - type: note
    content: ver. 24, 25; ch. 30:3, 4; 37:2
  - type: text
    content: 'pure gold, inside and outside shall you overlay it, and you shall make on it a molding of gold around it. '
  '12':
  - type: text
    content: 'You shall cast four rings of gold for it and put them on its '
  - type: note
    content: ch. 37:3
  - type: text
    content: 'four feet, two rings on the one side of it, and two rings on the other side of it. '
  '13':
  - type: text
    content: 'You shall make poles of acacia wood and overlay them with gold. '
  '14':
  - type: text
    content: 'And you shall put the poles into the rings on the sides of the ark to carry the ark by them. '
  '15':
  - type: text
    content: 'The '
  - type: note
    content: 1 Kgs. 8:8
  - type: text
    content: 'poles shall remain in the rings of the ark; they shall not be taken from it. '
  '16':
  - type: note
    content: '[Deut. 31:26; 1 Kgs. 8:9]'
  - type: text
    content: 'And you shall put into the ark the '
  - type: note
    content: See ch. 16:34
  - type: text
    content: testimony that I shall give you.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 37:6; Heb. 9:5
  - type: text
    content: “You shall make a mercy seat
  - type: note
    content: Or cover
  - type: text
    content: ' of pure gold. Two cubits and a half shall be its length, and a cubit and a half its breadth. '
  '18':
  - type: text
    content: 'And you shall make two cherubim of gold; of '
  - type: note
    content: ver. 31; ch. 37:7, 17, 22; Num. 8:4; 10:2
  - type: text
    content: 'hammered work shall you make them, on the two ends of the mercy seat. '
  '19':
  - type: text
    content: 'Make one cherub on the one end, and one cherub on the other end. '
  - type: note
    content: ch. 37:8
  - type: text
    content: 'Of one piece with the mercy seat shall you make the cherubim on its two ends. '
  '2':
  - type: note
    content: For ver. 1-7, see ch. 35:4-9
  - type: text
    content: '“Speak to the people of Israel, that they take for me a contribution. From '
  - type: note
    content: ch. 35:5, 21, 29; 36:2; Judg. 5:2; 1 Chr. 29:5; [Ezra 1:6; 2:68; 3:5; 7:16]; Neh. 11:2; [2 Cor. 8:12; 9:7]
  - type: text
    content: 'every man whose heart moves him you shall receive the contribution for me. '
  '20':
  - type: note
    content: 1 Kgs. 8:7; 1 Chr. 28:18; Heb. 9:5
  - type: text
    content: 'The cherubim shall spread out their wings above, overshadowing the mercy seat with their wings, their faces one to another; toward the mercy seat shall the faces of the cherubim be. '
  '21':
  - type: text
    content: 'And you shall put the mercy seat on the top of the ark, and in the ark you shall put the testimony that I shall give you. '
  '22':
  - type: note
    content: ch. 29:42, 43; 30:6, 36; Lev. 16:2; Num. 17:4
  - type: text
    content: 'There I will meet with you, and from above the mercy seat, from '
  - type: note
    content: Num. 7:89
  - type: text
    content: between the two cherubim that are on the ark of the testimony, I will speak with you about all that I will give you in commandment for the people of Israel.
  - type: heading
    content: The Table for Bread
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-29, see ch. 37:10-16; [ 1 Kgs. 7:48; 2 Chr. 4:8; Heb. 9:2 ]
  - type: text
    content: '“You shall make a table of acacia wood. Two cubits shall be its length, a cubit its breadth, and a cubit and a half its height. '
  '24':
  - type: text
    content: 'You shall overlay it with '
  - type: note
    content: ver. 11
  - type: text
    content: 'pure gold and make a molding of gold around it. '
  '25':
  - type: text
    content: And you shall make a rim around it a handbreadth
  - type: note
    content: A handbreadth was about 3 inches or 7.5 centimeters
  - type: text
    content: ' wide, and a molding of gold around the rim. '
  '26':
  - type: text
    content: 'And you shall make for it four rings of gold, and fasten the rings to the four corners at its four legs. '
  '27':
  - type: text
    content: 'Close to the frame the rings shall lie, as '
  - type: note
    content: ch. 26:29; 30:4; 36:34; 37:14, 27; 38:5
  - type: text
    content: 'holders for the poles to carry the table. '
  '28':
  - type: text
    content: 'You shall make the poles of acacia wood, and overlay them with gold, and the table shall be carried with these. '
  '29':
  - type: text
    content: 'And you shall make its plates and '
  - type: note
    content: ch. 37:16; Num. 4:7
  - type: text
    content: 'dishes for incense, and its flagons and bowls with which to pour drink offerings; you shall make them of pure gold. '
  '3':
  - type: text
    content: 'And this is the contribution that you shall receive from them: gold, silver, and bronze, '
  '30':
  - type: text
    content: 'And you shall set the '
  - type: note
    content: Lev. 24:5, 6
  - type: text
    content: bread of the Presence on the table before me regularly.
  - type: heading
    content: The Golden Lampstand
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-39, see ch. 37:17-24; [ 1 Kgs. 7:49; Zech. 4:2; Heb. 9:2; Rev. 1:12 ]
  - type: text
    content: '“You shall make a lampstand of pure gold. The lampstand shall be made of hammered work: its base, its stem, its cups, its calyxes, and its flowers shall be of one piece with it. '
  '32':
  - type: text
    content: 'And there shall be six branches going out of its sides, three branches of the lampstand out of one side of it and three branches of the lampstand out of the other side of it; '
  '33':
  - type: text
    content: 'three cups made like almond blossoms, each with calyx and flower, on one branch, and three cups made like almond blossoms, each with calyx and flower, on the other branch—so for the six branches going out of the lampstand. '
  '34':
  - type: text
    content: 'And on the lampstand itself there shall be four cups made like almond blossoms, with their calyxes and flowers, '
  '35':
  - type: text
    content: 'and a calyx of one piece with it under each pair of the six branches going out from the lampstand. '
  '36':
  - type: text
    content: 'Their calyxes and their branches shall be of one piece with it, the whole of it a single piece of hammered work of pure gold. '
  '37':
  - type: text
    content: 'You shall make seven lamps for it. And the lamps '
  - type: note
    content: Lev. 24:2-4; 2 Chr. 13:11
  - type: text
    content: 'shall be set up so as '
  - type: note
    content: Num. 8:2
  - type: text
    content: 'to give light on the space in front of it. '
  '38':
  - type: text
    content: 'Its tongs and their trays shall be of pure gold. '
  '39':
  - type: text
    content: It shall be made, with all these utensils, out of a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of pure gold. '
  '4':
  - type: note
    content: ch. 26:1, 31, 36
  - type: text
    content: 'blue and purple and scarlet yarns and fine twined linen, goats’ hair, '
  '40':
  - type: text
    content: 'And '
  - type: note
    content: ver. 9; ch. 26:30; 27:8; Num. 8:4; Acts 7:44; Cited Heb. 8:5; [1 Chr. 28:11, 19]
  - type: text
    content: see that you make them after the pattern for them, which is being shown you on the mountain.
  '5':
  - type: text
    content: 'tanned '
  - type: note
    content: ch. 26:14
  - type: text
    content: rams’ skins, goatskins,
  - type: note
    content: Uncertain; possibly dolphin skins, or dugong skins; compare 26:14
  - type: text
    content: ' acacia wood, '
  '6':
  - type: note
    content: ch. 27:20
  - type: text
    content: 'oil for the lamps, '
  - type: note
    content: ch. 30:7, 23, 34; 31:11
  - type: text
    content: 'spices for the anointing oil and for the fragrant incense, '
  '7':
  - type: text
    content: 'onyx stones, and stones for setting, for the '
  - type: note
    content: ch. 28:4, 15
  - type: text
    content: 'ephod and for the breastpiece. '
  '8':
  - type: text
    content: 'And let them make me a '
  - type: note
    content: Heb. 9:1, 2; See ch. 36:1-4
  - type: text
    content: 'sanctuary, that '
  - type: note
    content: ch. 29:45; 1 Kgs. 6:13; 2 Cor. 6:16; Rev. 21:3
  - type: text
    content: 'I may dwell in their midst. '
  '9':
  - type: note
    content: ver. 40
  - type: text
    content: 'Exactly as I show you concerning the pattern of the '
  - type: note
    content: ch. 26:1
  - type: text
    content: tabernacle, and of all its furniture, so you shall make it.
  - type: heading
    content: The Ark of the Covenant
