document_id: 2KI.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Athaliah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-3, see 2 Chr. 22:10-12
  - type: text
    content: 'Now when '
  - type: note
    content: ch. 8:26
  - type: text
    content: 'Athaliah the mother of Ahaziah saw that her son was dead, she arose and destroyed all the royal family. '
  '10':
  - type: text
    content: 'And the priest gave to the captains the spears and '
  - type: note
    content: 2 Sam. 8:7; 1 Chr. 18:7
  - type: text
    content: 'shields that had been King David’s, which were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And the guards stood, every man with his weapons in his hand, from the south side of the house to the north side of the house, around the altar and the house on behalf of the king. '
  '12':
  - type: text
    content: 'Then he brought out the king’s son and put '
  - type: note
    content: '[2 Sam. 1:10]'
  - type: text
    content: 'the crown on him and gave him '
  - type: note
    content: Ex. 25:16; 31:18; See Deut. 17:18-20
  - type: text
    content: 'the testimony. And they proclaimed him king and anointed him, and they clapped their hands and said, '
  - type: note
    content: 1 Sam. 10:24; 2 Sam. 16:16; 1 Kgs. 1:39
  - type: text
    content: “Long live the king!”
  '13':
  - type: text
    content: 'When Athaliah heard the noise of the guard and of the people, she went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the people. '
  '14':
  - type: text
    content: 'And when she looked, there was the king standing '
  - type: note
    content: ch. 23:3; [2 Chr. 34:31]
  - type: text
    content: 'by the pillar, according to the custom, and the captains and the trumpeters beside the king, and all the people of the land rejoicing and '
  - type: note
    content: 1 Kgs. 1:34
  - type: text
    content: 'blowing trumpets. And Athaliah '
  - type: note
    content: See Gen. 44:13
  - type: text
    content: 'tore her clothes and cried, “Treason! Treason!” '
  '15':
  - type: text
    content: 'Then Jehoiada the priest commanded the captains who were set over the army, “Bring her out between the ranks, and put to death with the sword anyone who follows her.” For the priest said, “Let her not be put to death in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '16':
  - type: text
    content: So they laid hands on her; and she went through the horses’ entrance to the king’s house, and there she was put to death.
  '17':
  - type: text
    content: 'And Jehoiada '
  - type: note
    content: '[Josh. 24:25]'
  - type: text
    content: 'made a covenant between the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king and people, that they should be the '
  - type: text
    content: Lord
  - type: text
    content: '’s people, and also '
  - type: note
    content: 2 Sam. 5:3
  - type: text
    content: 'between the king and the people. '
  '18':
  - type: text
    content: 'Then all the people of the land went to '
  - type: note
    content: ch. 10:21, 23, 26
  - type: text
    content: 'the house of Baal and tore it down; '
  - type: note
    content: '[Deut. 12:3]'
  - type: text
    content: 'his altars and his images they broke in pieces, and they killed Mattan the priest of Baal before the altars. And the priest posted watchmen over the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And he took the captains, '
  - type: note
    content: ver. 4
  - type: text
    content: 'the Carites, the guards, and all the people of the land, and they brought the king down from the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', marching through '
  - type: note
    content: ver. 6; [2 Chr. 23:20]
  - type: text
    content: 'the gate of the guards to the king’s house. And he took his seat on the throne of the kings. '
  '2':
  - type: text
    content: 'But Jehosheba, the daughter of King Joram, sister of Ahaziah, took '
  - type: note
    content: '[ver. 21; ch. 12:1]'
  - type: text
    content: Joash the son of Ahaziah and stole him away from among the king’s sons who were being put to death, and she put
  - type: note
    content: Compare 2 Chronicles 22:11; Hebrew lacks and she put
  - type: text
    content: ' him and his nurse in a bedroom. Thus they'
  - type: note
    content: Septuagint, Syriac, Vulgate (compare 2 Chronicles 22:11) she
  - type: text
    content: ' hid him from Athaliah, so that he was not put to death. '
  '20':
  - type: text
    content: So all the people of the land rejoiced, and the city was quiet after Athaliah had been put to death with the sword at the king’s house.
  - type: heading
    content: Jehoash Reigns in Judah
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ch 12:1 in Hebrew
  - type: note
    content: For ch. 11:21–12:15, see 2 Chr. 24:1-14
  - type: text
    content: Jehoash
  - type: note
    content: Jehoash is an alternate spelling of Joash (son of Ahaziah) as in verse 2
  - type: text
    content: ' was seven years old when he began to reign.'
  '3':
  - type: text
    content: 'And he remained with her six years, hidden in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', while Athaliah reigned over the land.'
  - type: heading
    content: Joash Anointed King in Judah
  '4':
  - type: text
    content: ' '
  - type: note
    content: For ver. 4-20, see 2 Chr. 23:1-21
  - type: text
    content: 'But in the seventh year '
  - type: note
    content: ver. 9
  - type: text
    content: 'Jehoiada sent and brought the captains of '
  - type: note
    content: ver. 19
  - type: text
    content: 'the Carites and of the guards, and had them come to him in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And he made a covenant with them and put them under oath in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he showed them the king’s son. '
  '5':
  - type: text
    content: 'And he commanded them, “This is the thing that you shall do: one third of you, '
  - type: note
    content: '[1 Chr. 9:25]'
  - type: text
    content: 'those who come off duty on the Sabbath and guard the king’s house '
  '6':
  - type: text
    content: (
  - type: note
    content: '[2 Chr. 23:5]'
  - type: text
    content: another third being at the gate Sur and a third at the gate behind the guards) shall guard the palace.
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And the two divisions of you, which come on duty in force on the Sabbath and guard the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' on behalf of the king, '
  '8':
  - type: text
    content: 'shall surround the king, each with his weapons in his hand. And whoever approaches the ranks is to be put to death. Be with the king '
  - type: note
    content: '[Num. 27:17]'
  - type: text
    content: when he goes out and when he comes in.”
  '9':
  - type: text
    content: 'The captains did according to all that Jehoiada the priest commanded, and they each brought his men who were to go off duty on the Sabbath, with those who were to come on duty on the Sabbath, and came to Jehoiada the priest. '
