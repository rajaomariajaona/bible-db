document_id: REV.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Church in Ephesus
  - type: text
    content: ' '
  - type: text
    content: '“To the angel of the church in Ephesus write: ‘The words of '
  - type: note
    content: ch. 1:16, 20
  - type: text
    content: 'him who holds the seven stars in his right hand, '
  - type: note
    content: ch. 1:13
  - type: text
    content: who walks among the seven golden lampstands.
  '10':
  - type: text
    content: 'Do not fear what you are about to suffer. Behold, the devil is about to throw some of you into prison, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'that you may be tested, and for '
  - type: note
    content: '[Gen. 24:55; Dan. 1:12, 14]'
  - type: text
    content: 'ten days '
  - type: note
    content: Matt. 24:9
  - type: text
    content: 'you will have tribulation. '
  - type: note
    content: See Matt. 10:22; Heb. 3:6
  - type: text
    content: 'Be faithful '
  - type: note
    content: ch. 12:11
  - type: text
    content: 'unto death, and I will give you '
  - type: note
    content: See James 1:12
  - type: text
    content: the crown of life.
  - type: text
    content: ' '
  '11':
  - type: note
    content: See ver. 7
  - type: text
    content: 'He who has an ear, let him hear what the Spirit says to the churches. '
  - type: note
    content: See ver. 7
  - type: text
    content: 'The one who conquers will not be hurt by '
  - type: note
    content: ch. 20:6, 14; 21:8
  - type: text
    content: the second death.’
  - type: heading
    content: To the Church in Pergamum
  '12':
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Pergamum write: ‘The words of him who has '
  - type: note
    content: ver. 16 ; ch. 1:16
  - type: text
    content: the sharp two-edged sword.
  '13':
  - type: text
    content: ' '
  - type: text
    content: '“‘I know where you dwell, '
  - type: note
    content: ver. 9
  - type: text
    content: 'where Satan’s throne is. Yet you hold fast my name, and you did not '
  - type: note
    content: See 1 Tim. 5:8
  - type: text
    content: deny my faith
  - type: text
    content: ' '
  - type: note
    content: Or your faith in me
  - type: text
    content: 'even in the days of Antipas '
  - type: note
    content: Acts 22:20
  - type: text
    content: my faithful witness, who was killed among you, where Satan dwells.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But I have a few things against you: you have some there who hold the teaching of '
  - type: note
    content: See 2 Pet. 2:15
  - type: text
    content: 'Balaam, who taught Balak to put a stumbling block before the sons of Israel, so that they might '
  - type: note
    content: ver. 20; Acts 15:29; 1 Cor. 8:10; 10:19
  - type: text
    content: 'eat food sacrificed to idols and '
  - type: note
    content: Num. 25:1; 31:16; 1 Cor. 10:8
  - type: text
    content: practice sexual immorality.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So also you have some who hold the teaching of '
  - type: note
    content: ver. 6
  - type: text
    content: the Nicolaitans.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Therefore repent. If not, '
  - type: note
    content: '[ch. 22:7]'
  - type: text
    content: 'I will come to you soon and '
  - type: note
    content: See 2 Thess. 2:8
  - type: text
    content: 'war against them with '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: the sword of my mouth.
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'He who has an ear, let him hear what the Spirit says to the churches. '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'To the one who conquers I will give some of '
  - type: note
    content: '[John 6:48-50]'
  - type: text
    content: 'the hidden manna, and I will give him a white stone, with '
  - type: note
    content: ch. 3:12; Isa. 62:2; 65:15
  - type: text
    content: 'a new name written on the stone '
  - type: note
    content: ch. 19:12; [ch. 14:3]
  - type: text
    content: that no one knows except the one who receives it.’
  - type: heading
    content: To the Church in Thyatira
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Thyatira write: ‘The words of the Son of God, '
  - type: note
    content: ch. 1:14, 15
  - type: text
    content: who has eyes like a flame of fire, and whose feet are like burnished bronze.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ver. 2
  - type: text
    content: “‘I know your works, your love and faith and service and patient endurance, and that your latter works exceed the first.
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: ver. 19 ; ch. 3:1, 8, 15
  - type: text
    content: '“‘I know your works, your toil and your patient endurance, and how you cannot bear with those who are evil, but '
  - type: note
    content: See 1 John 4:1
  - type: text
    content: 'have tested those '
  - type: note
    content: See 2 Cor. 11:13
  - type: text
    content: who call themselves apostles and are not, and found them to be false.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But I have this against you, that you tolerate that woman '
  - type: note
    content: 1 Kgs. 16:31; 21:25; 2 Kgs. 9:7
  - type: text
    content: 'Jezebel, who calls herself a prophetess and is teaching and seducing my servants '
  - type: note
    content: See ver. 14
  - type: text
    content: 'to practice sexual immorality and '
  - type: note
    content: See ver. 14
  - type: text
    content: to eat food sacrificed to idols.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'I gave her time to repent, but '
  - type: note
    content: '[ch. 9:20, 21; 16:9, 11]; See Rom. 2:4'
  - type: text
    content: she refuses to repent of her sexual immorality.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Behold, I will throw her onto a sickbed, and those who commit adultery with her I will throw into great tribulation, unless they repent of her works,
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'and I will strike her children dead. And all the churches will know that I am he '
  - type: note
    content: Ps. 7:9; 26:2; Jer. 20:12; See Rom. 8:27
  - type: text
    content: 'who searches mind and heart, and '
  - type: note
    content: See Matt. 16:27
  - type: text
    content: I will give to each of you according to your works.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'But to the rest of you in Thyatira, who do not hold this teaching, who have not learned what some call '
  - type: note
    content: '[1 Cor. 2:10]'
  - type: text
    content: 'the deep things of Satan, to you I say, I '
  - type: note
    content: '[Acts 15:28]'
  - type: text
    content: do not lay on you any other burden.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Only hold fast '
  - type: note
    content: ch. 3:11
  - type: text
    content: what you have until I come.
  - type: text
    content: ' '
  '26':
  - type: note
    content: See ver. 7
  - type: text
    content: 'The one who conquers and who keeps my works '
  - type: note
    content: See Heb. 3:6
  - type: text
    content: 'until the end, '
  - type: note
    content: Ps. 2:8; [ch. 3:21; 20:4]
  - type: text
    content: to him I will give authority over the nations,
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 2:9
  - type: text
    content: 'he will '
  - type: note
    content: ch. 12:5; 19:15
  - type: text
    content: rule
  - type: note
    content: Greek shepherd
  - type: text
    content: ' '
  - type: text
    content: 'them with a rod of iron, '
  - type: note
    content: Isa. 30:14; Jer. 19:11
  - type: text
    content: as when earthen pots are broken in pieces, even as I myself have received authority from my Father.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And I will give him '
  - type: note
    content: '[2 Pet. 1:19]; See ch. 22:16'
  - type: text
    content: the morning star.
  - type: text
    content: ' '
  '29':
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: He who has an ear, let him hear what the Spirit says to the churches.’
  '3':
  - type: text
    content: 'I know you are enduring patiently and bearing up '
  - type: note
    content: John 15:21
  - type: text
    content: 'for my name’s sake, and you '
  - type: note
    content: '[Heb. 12:3, 5]'
  - type: text
    content: have not grown weary.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'But I have this against you, that you have abandoned '
  - type: note
    content: Jer. 2:2
  - type: text
    content: the love you had at first.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Remember therefore from where you have fallen; repent, and do '
  - type: note
    content: ver. 2; [Heb. 10:32]
  - type: text
    content: 'the works you did at first. If not, '
  - type: note
    content: ch. 3:3, 19
  - type: text
    content: I will come to you and remove your lampstand from its place, unless you repent.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Yet this you have: you hate the works of '
  - type: note
    content: ver. 15
  - type: text
    content: the Nicolaitans, which I also hate.
  - type: text
    content: ' '
  '7':
  - type: note
    content: ver. 11, 17, 29; ch. 3:6, 13, 22; 13:9
  - type: text
    content: 'He who has an ear, let him hear what the Spirit says to the churches. '
  - type: note
    content: ch. 3:5; 21:7
  - type: text
    content: 'To the one who conquers I will grant to eat of '
  - type: note
    content: See Gen. 2:9
  - type: text
    content: 'the tree of life, which is in '
  - type: note
    content: Ezek. 28:13; 31:8 (Gk.)
  - type: text
    content: the paradise of God.’
  - type: heading
    content: To the Church in Smyrna
  '8':
  - type: text
    content: ' '
  - type: text
    content: '“And to the angel of the church in Smyrna write: ‘The words of '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the first and the last, '
  - type: note
    content: ch. 1:18
  - type: text
    content: who died and came to life.
  '9':
  - type: text
    content: ' '
  - type: text
    content: '“‘I know your tribulation and '
  - type: note
    content: James 2:5; [ 1 Tim. 6:18; Heb. 10:34; 11:26 ]
  - type: text
    content: your poverty (
  - type: text
    content: ' '
  - type: note
    content: James 2:5; [ 1 Tim. 6:18; Heb. 10:34; 11:26 ]
  - type: text
    content: but you are rich) and the slander
  - type: text
    content: ' '
  - type: note
    content: Greek blasphemy
  - type: text
    content: 'of '
  - type: note
    content: ch. 3:9, 10
  - type: text
    content: those who say that they are Jews and are not, but are a synagogue of Satan.
  - type: text
    content: ' '
