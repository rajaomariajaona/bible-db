document_id: EZK.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Wicked Counselors
  - type: text
    content: ' '
  - type: note
    content: ver. 24 ; See ch. 3:12
  - type: text
    content: 'The Spirit lifted me up and brought me to '
  - type: note
    content: ch. 10:19
  - type: text
    content: 'the east gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', which faces east. And behold, at the entrance of the gateway there were '
  - type: note
    content: ch. 8:16
  - type: text
    content: 'twenty-five men. And I saw among them Jaazaniah '
  - type: note
    content: Jer. 28:1
  - type: text
    content: 'the son of Azzur, and '
  - type: note
    content: ver. 13
  - type: text
    content: 'Pelatiah the son of Benaiah, princes of the people. '
  '10':
  - type: note
    content: Jer. 39:6; See 2 Kgs. 25:18-21
  - type: text
    content: 'You shall fall by the sword. I will judge you at the border of Israel, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: note
    content: '[ver. 3, 7]'
  - type: text
    content: 'This city shall not be your cauldron, nor shall you be the meat in the midst of it. I will judge you at the border of Israel, '
  '12':
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. For you have not walked in my statutes, nor obeyed my rules, '
  - type: note
    content: '[ch. 8:10, 14, 16]'
  - type: text
    content: but have acted according to the rules of the nations that are around you.”
  '13':
  - type: text
    content: 'And it came to pass, while I was prophesying, '
  - type: note
    content: '[Acts 5:5]'
  - type: text
    content: 'that '
  - type: note
    content: ver. 1
  - type: text
    content: 'Pelatiah the son of Benaiah died. '
  - type: note
    content: ch. 9:8
  - type: text
    content: 'Then I fell down on my face and cried out with a loud voice and said, '
  - type: note
    content: ch. 9:8
  - type: text
    content: '“Ah, Lord '
  - type: text
    content: God
  - type: text
    content: '! '
  - type: note
    content: '[ch. 20:17]'
  - type: text
    content: Will you make a full end of the remnant of Israel?”
  - type: heading
    content: Israel’s New Heart and Spirit
  '14':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '15':
  - type: note
    content: See ch. 2:1
  - type: text
    content: “Son of man, your brothers, even your brothers, your kinsmen,
  - type: note
    content: Hebrew the men of your redemption
  - type: text
    content: ' the whole house of Israel, all of them, are those of whom the inhabitants of Jerusalem have said, '
  - type: note
    content: '[1 Sam. 26:19]'
  - type: text
    content: '‘Go far from the '
  - type: text
    content: Lord
  - type: text
    content: '; to us this land is given for a possession.’ '
  '16':
  - type: text
    content: 'Therefore say, ‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Though I removed them far off among the nations, and though I scattered them among the countries, yet '
  - type: note
    content: '[ch. 37:26, 28; Isa. 8:14; Rev. 21:22]'
  - type: text
    content: I have been a sanctuary to them for a while
  - type: note
    content: Or in small measure
  - type: text
    content: ' in the countries where they have gone.’ '
  '17':
  - type: text
    content: 'Therefore say, ‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 20:41; 28:25; 34:13; 36:24; 37:21; [ch. 38:8; 39:27; Isa. 11:12]
  - type: text
    content: 'I will gather you from the peoples and assemble you out of the countries where you have been scattered, '
  - type: note
    content: ch. 20:41; 28:25; 34:13; 36:24; 37:21; [ch. 38:8; 39:27; Isa. 11:12]
  - type: text
    content: 'and I will give you the land of Israel.’ '
  '18':
  - type: text
    content: 'And when they come there, '
  - type: note
    content: ch. 37:23
  - type: text
    content: 'they will remove from it all its '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'detestable things and all its abominations. '
  '19':
  - type: note
    content: Jer. 32:39; [Acts 4:32]
  - type: text
    content: 'And I will give them one heart, and '
  - type: note
    content: ch. 36:26; [ch. 18:31; Ps. 51:10; Jer. 31:33]
  - type: text
    content: 'a new spirit I will put within them. '
  - type: note
    content: '[Zech. 7:12]'
  - type: text
    content: 'I will remove the heart of stone from their flesh '
  - type: note
    content: '[2 Cor. 3:3]'
  - type: text
    content: 'and give them a heart of flesh, '
  '2':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, these are the men who devise iniquity and who give wicked counsel in this city; '
  '20':
  - type: note
    content: Ps. 105:45
  - type: text
    content: 'that they may walk in my statutes and keep my rules and obey them. '
  - type: note
    content: ch. 14:11; 36:28; Lev. 26:12; See Jer. 30:22; 31:33
  - type: text
    content: 'And they shall be my people, and I will be their God. '
  '21':
  - type: note
    content: See ch. 9:4-6
  - type: text
    content: 'But as for those whose heart goes after their detestable things and their abominations, '
  - type: note
    content: See ch. 7:4
  - type: text
    content: I will
  - type: note
    content: Hebrew To the heart of their detestable things and their abominations their heart goes; I will
  - type: text
    content: ' bring their deeds upon their own heads, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:19
  - type: text
    content: 'Then the cherubim lifted up their wings, with the wheels beside them, '
  - type: note
    content: ch. 10:19
  - type: text
    content: 'and the glory of the God of Israel was over them. '
  '23':
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up from the midst of the city and '
  - type: note
    content: Zech. 14:4; [ch. 43:2]
  - type: text
    content: 'stood on the mountain that is on the east side of the city. '
  '24':
  - type: note
    content: ver. 1; See ch. 3:12
  - type: text
    content: 'And the Spirit lifted me up and brought me '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'in the vision by the Spirit of God '
  - type: note
    content: '[ch. 1:3]'
  - type: text
    content: 'into Chaldea, to the exiles. Then the vision that I had seen went up from me. '
  '25':
  - type: text
    content: 'And I told the exiles all the things that the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown me.'
  '3':
  - type: note
    content: '[Jer. 29:28]'
  - type: text
    content: 'who say, '
  - type: note
    content: '[ch. 12:22, 27]'
  - type: text
    content: ‘The time is not near
  - type: note
    content: Or Is not the time near . . . ?
  - type: text
    content: ' to build houses. '
  - type: note
    content: ch. 24:3, 6
  - type: text
    content: 'This city is the cauldron, and we are the meat.’ '
  '4':
  - type: text
    content: Therefore prophesy against them; prophesy, O son of man.”
  '5':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell upon me, and he said to me, “Say, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': So you think, O house of Israel. '
  - type: note
    content: ch. 20:32; 38:10; [Isa. 29:15]
  - type: text
    content: 'For I know the things that come into your mind. '
  '6':
  - type: note
    content: '[ch. 7:23]'
  - type: text
    content: 'You have multiplied your slain in this city and have filled its streets with the slain. '
  '7':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 24:7
  - type: text
    content: 'Your slain whom you have laid in the midst of it, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'they are the meat, and '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'this city is the cauldron, but you shall be brought out of the midst of it. '
  '8':
  - type: note
    content: Jer. 42:16
  - type: text
    content: 'You have feared the sword, and I will bring the sword upon you, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And I will bring you out of the midst of it, and '
  - type: note
    content: ch. 7:21
  - type: text
    content: 'give you into the hands of foreigners, and '
  - type: note
    content: See ch. 5:8
  - type: text
    content: 'execute judgments upon you. '
