document_id: JER.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Broken Flask
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', “Go, buy '
  - type: note
    content: See ch. 18:2
  - type: text
    content: 'a potter’s earthenware '
  - type: note
    content: ver. 10
  - type: text
    content: 'flask, and take some of '
  - type: note
    content: 2 Kgs. 19:2; 23:1; Ezek. 8:1
  - type: text
    content: 'the elders of the people and some of '
  - type: note
    content: 2 Kgs. 19:2; 23:1; Ezek. 8:1
  - type: text
    content: 'the elders of the priests, '
  '10':
  - type: text
    content: '“Then '
  - type: note
    content: '[ch. 51:63, 64]'
  - type: text
    content: 'you shall break '
  - type: note
    content: ver. 1
  - type: text
    content: 'the flask in the sight of the men who go with you, '
  '11':
  - type: text
    content: 'and shall say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: So will I break this people and this city, '
  - type: note
    content: Ps. 2:9; Isa. 30:14; Lam. 4:2
  - type: text
    content: 'as one breaks a potter’s vessel, '
  - type: note
    content: '[Prov. 6:15]'
  - type: text
    content: 'so that it can never be mended. '
  - type: note
    content: ch. 7:32
  - type: text
    content: 'Men shall bury in Topheth because there will be no place else to bury. '
  '12':
  - type: text
    content: 'Thus will I do to this place, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and to its inhabitants, making this city '
  - type: note
    content: '[2 Kgs. 23:10]'
  - type: text
    content: 'like Topheth. '
  '13':
  - type: text
    content: The houses of Jerusalem and the houses of the kings of Judah—
  - type: note
    content: ch. 32:29; 44:18; 2 Kgs. 23:12; Zeph. 1:5
  - type: text
    content: 'all the houses on whose '
  - type: note
    content: 2 Sam. 11:2
  - type: text
    content: 'roofs offerings have been offered '
  - type: note
    content: Deut. 4:19; Acts 7:42
  - type: text
    content: 'to all the host of heaven, and '
  - type: note
    content: ch. 7:18; 44:18
  - type: text
    content: 'drink offerings have been poured out to other gods—shall be defiled '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: like the place of Topheth.’”
  '14':
  - type: text
    content: 'Then Jeremiah came from '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'Topheth, where the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent him to prophesy, '
  - type: note
    content: ch. 26:2; [2 Chr. 20:5]
  - type: text
    content: 'and he stood in the court of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house and said to all the people: '
  '15':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, behold, I am bringing upon this city and upon all its towns all the disaster that I have pronounced against it, '
  - type: note
    content: ch. 7:26; 2 Chr. 30:8
  - type: text
    content: 'because they have stiffened their neck, '
  - type: note
    content: ch. 25:3
  - type: text
    content: refusing to hear my words.”
  '2':
  - type: text
    content: 'and go out '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'to the Valley of the Son of Hinnom at the entry of the Potsherd Gate, and proclaim there the words that I tell you. '
  '3':
  - type: text
    content: 'You shall say, '
  - type: note
    content: ch. 17:20
  - type: text
    content: '‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 13:13
  - type: text
    content: 'O kings of Judah and inhabitants of Jerusalem. Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Behold, I am bringing such disaster upon this place that '
  - type: note
    content: 1 Sam. 3:11; 2 Kgs. 21:12
  - type: text
    content: 'the ears of everyone who hears of it will tingle. '
  '4':
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'Because the people have forsaken me and have profaned this place by making offerings in it to other gods whom neither they nor their fathers nor the kings of Judah have known; '
  - type: note
    content: 2 Kgs. 21:16; See ch. 2:34
  - type: text
    content: 'and because they have filled this place with the blood of innocents, '
  '5':
  - type: note
    content: ch. 7:31; 32:35; Lev. 18:21
  - type: text
    content: 'and have built the high places of Baal '
  - type: note
    content: ch. 7:31; 32:35; Lev. 18:21
  - type: text
    content: 'to burn their sons in the fire as burnt offerings to Baal, '
  - type: note
    content: ch. 7:31; 32:35; Deut. 17:3
  - type: text
    content: 'which I did not command or decree, nor did it come into my mind— '
  '6':
  - type: text
    content: 'therefore, '
  - type: note
    content: ch. 7:32
  - type: text
    content: 'behold, days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when this place shall no more be called Topheth, or '
  - type: note
    content: ver. 2
  - type: text
    content: 'the Valley of the Son of Hinnom, but the Valley of Slaughter. '
  '7':
  - type: text
    content: 'And in this place '
  - type: note
    content: '[Isa. 19:3]'
  - type: text
    content: 'I will make void the plans of Judah and Jerusalem, '
  - type: note
    content: '[Lev. 26:17]'
  - type: text
    content: 'and will cause their people to fall by the sword before their enemies, and by the hand of those who seek their life. '
  - type: note
    content: See ch. 7:33
  - type: text
    content: 'I will give their dead bodies for food to the birds of the air and to the beasts of the earth. '
  '8':
  - type: text
    content: 'And I will make this city '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'a horror, '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'a thing to be hissed at. Everyone who passes by it will be horrified and will hiss because of all its wounds. '
  '9':
  - type: note
    content: Lev. 26:29; Deut. 28:53; Isa. 9:20; Lam. 2:20; 4:10; Ezek. 5:10
  - type: text
    content: 'And I will make them eat the flesh of their sons and their daughters, and everyone shall eat the flesh of his neighbor '
  - type: note
    content: Deut. 28:53, 55, 57
  - type: text
    content: in the siege and in the distress, with which their enemies and those who seek their life afflict them.’
