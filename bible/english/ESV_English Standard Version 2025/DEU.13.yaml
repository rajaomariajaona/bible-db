document_id: DEU.13,59
type_code: eng
verses:
  '1':
  - type: text
    content: '“If a prophet or '
  - type: note
    content: Jer. 23:25, 32; 27:9; 29:8; Zech. 10:2
  - type: text
    content: 'a dreamer of dreams arises among you and gives you a sign or a wonder, '
  '10':
  - type: note
    content: ch. 17:5; See Josh. 7:25
  - type: text
    content: 'You shall stone him to death with stones, because he sought to draw you away from the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, out of the house of slavery. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ch. 17:13; 19:20; 21:21
  - type: text
    content: all Israel shall hear and fear and never again do any such wickedness as this among you.
  '12':
  - type: text
    content: '“If you hear in one of your cities, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to dwell there, '
  '13':
  - type: text
    content: 'that certain '
  - type: note
    content: Judg. 19:22; 20:13; 1 Sam. 2:12; 25:17; 2 Sam. 16:7; 20:1; 1 Kgs. 21:10, 13
  - type: text
    content: 'worthless fellows have gone out among you and have drawn away the inhabitants of their city, saying, ‘Let us go and serve other gods,’ which you have not known, '
  '14':
  - type: text
    content: 'then you shall inquire and make search and ask '
  - type: note
    content: ch. 17:4; 19:18
  - type: text
    content: 'diligently. And behold, if it be true and certain that such an abomination has been done among you, '
  '15':
  - type: text
    content: you shall surely put the inhabitants of that city to the sword, devoting it to destruction,
  - type: note
    content: That is, setting apart (devoting) as an offering to the Lord (for destruction)
  - type: text
    content: ' all who are in it and its cattle, with the edge of the sword. '
  '16':
  - type: text
    content: 'You shall gather all its spoil into the midst of its open square and '
  - type: note
    content: Josh. 6:24
  - type: text
    content: 'burn the city and all its spoil with fire, as a whole burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. It shall be a '
  - type: note
    content: Josh. 8:28; Jer. 49:2; [Isa. 17:1; 25:2; Jer. 30:18]
  - type: text
    content: 'heap forever. It shall not be built again. '
  '17':
  - type: note
    content: Josh. 6:18
  - type: text
    content: 'None of the devoted things shall stick to your hand, '
  - type: note
    content: Josh. 7:26
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' may turn from the fierceness of his anger and show you mercy and have compassion on you and multiply you, '
  - type: note
    content: See Gen. 50:24
  - type: text
    content: 'as he swore to your fathers, '
  '18':
  - type: text
    content: 'if you obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: ch. 12:25, 28
  - type: text
    content: 'keeping all his commandments that I am commanding you today, and doing what is right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '2':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 18:22; Jer. 28:9]'
  - type: text
    content: 'the sign or wonder that he tells you comes to pass, and if he says, ‘Let us go after other gods,’ which you have not known, ‘and let us serve them,’ '
  '3':
  - type: text
    content: 'you shall not listen to the words of that prophet or that dreamer of dreams. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ch. 8:2
  - type: text
    content: 'is testing you, to know whether you love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul. '
  '4':
  - type: text
    content: 'You shall '
  - type: note
    content: 2 Kgs. 23:3; 2 Chr. 34:31
  - type: text
    content: 'walk after the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and fear him and keep his commandments and obey his voice, and you shall serve him and '
  - type: note
    content: See ch. 10:20
  - type: text
    content: 'hold fast to him. '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: ch. 18:20; [Jer. 2:8; 14:14, 15; Zech. 13:3]
  - type: text
    content: 'that prophet or that dreamer of dreams shall be put to death, because he has taught rebellion against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt and redeemed you out of the house of slavery, to make you leave the way in which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you to walk. '
  - type: note
    content: ch. 17:7; 19:19; 21:21; 22:21; 24:7; [1 Cor. 5:13]
  - type: text
    content: So you shall purge the evil
  - type: note
    content: Or evil person
  - type: text
    content: ' from your midst.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:2
  - type: text
    content: '“If your brother, the son of your mother, or your son or your daughter or '
  - type: note
    content: ch. 28:54, 56; Mic. 7:5
  - type: text
    content: the wife you embrace
  - type: note
    content: Hebrew the wife of your bosom
  - type: text
    content: ' or your friend '
  - type: note
    content: '[1 Sam. 18:1, 3; 20:17]'
  - type: text
    content: 'who is as your own soul entices you secretly, saying, ‘Let us go and serve other gods,’ '
  - type: note
    content: ch. 28:64
  - type: text
    content: 'which neither you nor your fathers have known, '
  '7':
  - type: text
    content: 'some '
  - type: note
    content: ch. 6:14
  - type: text
    content: 'of the gods of the peoples who are around you, whether near you or far off from you, from the one end of the earth to the other, '
  '8':
  - type: text
    content: 'you shall '
  - type: note
    content: Prov. 1:10
  - type: text
    content: 'not yield to him or listen to him, nor '
  - type: note
    content: See ch. 7:16
  - type: text
    content: 'shall your eye pity him, nor shall you spare him, nor shall you conceal him. '
  '9':
  - type: text
    content: 'But you shall kill him. '
  - type: note
    content: ch. 17:7
  - type: text
    content: 'Your hand shall be first against him to put him to death, and afterward the hand of all the people. '
