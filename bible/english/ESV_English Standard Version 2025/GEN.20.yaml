document_id: GEN.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham and Abimelech
  - type: text
    content: 'From there Abraham journeyed toward the territory of the Negeb and lived between '
  - type: note
    content: ch. 16:7, 14
  - type: text
    content: 'Kadesh and Shur; and he '
  - type: note
    content: ch. 26:3
  - type: text
    content: 'sojourned in '
  - type: note
    content: ch. 26:6
  - type: text
    content: 'Gerar. '
  '10':
  - type: text
    content: 'And Abimelech said to Abraham, “What did you see, that you did this thing?” '
  '11':
  - type: text
    content: 'Abraham said, “I did it because I thought, '
  - type: note
    content: Prov. 16:6
  - type: text
    content: '‘There is no fear of God at all in this place, and '
  - type: note
    content: ch. 12:12; 26:7
  - type: text
    content: 'they will kill me because of my wife.’ '
  '12':
  - type: text
    content: 'Besides, '
  - type: note
    content: '[ch. 11:29]'
  - type: text
    content: 'she is indeed my sister, the daughter of my father though not the daughter of my mother, and she became my wife. '
  '13':
  - type: text
    content: 'And when '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'God caused me to wander from my father’s house, I said to her, ‘This is the kindness you must do me: at every place to which we come, '
  - type: note
    content: ch. 12:13
  - type: text
    content: say of me, “He is my brother.”’”
  '14':
  - type: text
    content: 'Then Abimelech '
  - type: note
    content: ch. 12:16
  - type: text
    content: 'took sheep and oxen, and male servants and female servants, and gave them to Abraham, and returned Sarah his wife to him. '
  '15':
  - type: text
    content: 'And Abimelech said, “Behold, '
  - type: note
    content: ch. 13:9; 34:10
  - type: text
    content: 'my land is before you; dwell where it pleases you.” '
  '16':
  - type: text
    content: 'To Sarah he said, “Behold, I have given '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'your brother a thousand pieces of silver. It is '
  - type: note
    content: '[ch. 24:65]'
  - type: text
    content: a sign of your innocence in the eyes of all
  - type: note
    content: Hebrew It is a covering of eyes for all
  - type: text
    content: ' who are with you, and before everyone you are vindicated.” '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: '[James 5:16]'
  - type: text
    content: 'Abraham prayed to God, and God healed Abimelech, and also healed his wife and female slaves so that they bore children. '
  '18':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:17]'
  - type: text
    content: had closed all the wombs of the house of Abimelech because of Sarah, Abraham’s wife.
  '2':
  - type: text
    content: 'And Abraham said of Sarah his wife, '
  - type: note
    content: See ch. 12:13-20; 26:7-11
  - type: text
    content: '“She is my sister.” And Abimelech king of Gerar sent and took Sarah. '
  '3':
  - type: note
    content: Ps. 105:14
  - type: text
    content: 'But God came to Abimelech '
  - type: note
    content: Job 33:15, 16; Matt. 1:20; 2:12
  - type: text
    content: 'in a dream by night and said to him, “Behold, you are a dead man because of the woman whom you have taken, for she is a man’s wife.” '
  '4':
  - type: text
    content: 'Now Abimelech had not approached her. So he said, '
  - type: note
    content: ch. 18:23; [1 Chr. 21:17]
  - type: text
    content: '“Lord, will you kill an innocent people? '
  '5':
  - type: text
    content: 'Did he not himself say to me, ‘She is my sister’? And she herself said, ‘He is my brother.’ In the integrity of my heart and the innocence of my hands I have done this.” '
  '6':
  - type: text
    content: 'Then God said to him in the dream, “Yes, I know that you have done this in the integrity of your heart, and it was I who kept you from sinning '
  - type: note
    content: ch. 39:9; Ps. 51:4
  - type: text
    content: 'against me. Therefore I did not let you touch her. '
  '7':
  - type: text
    content: 'Now then, return the man’s wife, '
  - type: note
    content: 1 Sam. 7:5; Job 42:8
  - type: text
    content: 'for he is a prophet, so that he will pray for you, and you shall live. But if you do not return her, know that you shall surely die, you '
  - type: note
    content: '[Num. 16:32, 33]'
  - type: text
    content: and all who are yours.”
  '8':
  - type: text
    content: 'So Abimelech rose early in the morning and called all his servants and told them all these things. And the men were very much afraid. '
  '9':
  - type: text
    content: 'Then Abimelech called Abraham and said to him, “What have you done to us? And how have I sinned against you, that you have brought on me and my kingdom a great sin? You have done to me things that ought not to be done.” '
