document_id: NUM.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Aaron’s Staff Buds
  - type: text
    content: ' '
  - type: note
    content: Ch 17:16 in Hebrew
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Put back '
  - type: note
    content: Heb. 9:4
  - type: text
    content: 'the staff of Aaron before the testimony, to be kept '
  - type: note
    content: ch. 16:38
  - type: text
    content: 'as a sign for the rebels, '
  - type: note
    content: ver. 5
  - type: text
    content: 'that you may make an end of their grumblings against me, lest they die.” '
  '11':
  - type: text
    content: 'Thus did Moses; as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, so he did.'
  '12':
  - type: text
    content: 'And the people of Israel said to Moses, “Behold, we perish, we are undone, we are all undone. '
  '13':
  - type: note
    content: See ch. 1:51
  - type: text
    content: 'Everyone who comes near, who comes near to the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', shall die. Are we all to perish?”'
  '2':
  - type: note
    content: '[Ezek. 37:16]'
  - type: text
    content: '“Speak to the people of Israel, and get from them staffs, one for each fathers’ house, from all their chiefs according to their fathers’ houses, twelve staffs. Write each man’s name on his staff, '
  '3':
  - type: text
    content: 'and write Aaron’s name on the staff of Levi. For there shall be one staff for the head of each fathers’ house. '
  '4':
  - type: text
    content: 'Then you shall deposit them in the tent of meeting before the testimony, '
  - type: note
    content: See Ex. 25:22
  - type: text
    content: 'where I meet with you. '
  '5':
  - type: text
    content: 'And the staff of the man '
  - type: note
    content: ch. 16:5
  - type: text
    content: 'whom I choose shall sprout. Thus I will make to cease from me '
  - type: note
    content: ch. 16:11
  - type: text
    content: 'the grumblings of the people of Israel, which they grumble against you.” '
  '6':
  - type: text
    content: 'Moses spoke to the people of Israel. And all their chiefs gave him staffs, one for each chief, according to their fathers’ houses, twelve staffs. And the staff of Aaron was among their staffs. '
  '7':
  - type: text
    content: 'And Moses deposited the staffs before the '
  - type: text
    content: Lord
  - type: text
    content: ' in '
  - type: note
    content: ch. 18:2; Ex. 38:21; 2 Chr. 24:6; Acts 7:44
  - type: text
    content: the tent of the testimony.
  '8':
  - type: text
    content: 'On the next day Moses went into the tent of the testimony, and behold, the staff of Aaron for the house of Levi had sprouted and put forth buds and produced blossoms, and it bore ripe almonds. '
  '9':
  - type: text
    content: 'Then Moses brought out all the staffs from before the '
  - type: text
    content: Lord
  - type: text
    content: ' to all the people of Israel. And they looked, and each man took his staff. '
