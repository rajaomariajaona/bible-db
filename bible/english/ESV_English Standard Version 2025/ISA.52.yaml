verses:
  '1':
  - type: heading
    content: The Lord’s Coming Salvation
  - type: text
    content: ' '
  - type: note
    content: ch. 51:17
  - type: text
    content: Awake, awake,
  - type: text
    content: put on your strength, O Zion;
  - type: note
    content: '[ Ex. 28:2, 40 ]; See Zech. 3:1-4'
  - type: text
    content: put on your beautiful garments,
  - type: text
    content: 'O Jerusalem, '
  - type: note
    content: ch. 48:2; Neh. 11:1
  - type: text
    content: the holy city;
  - type: note
    content: ch. 60:21; Joel 3:17; [ch. 35:8; Rev. 21:27 ]
  - type: text
    content: for there shall no more come into you
  - type: text
    content: the uncircumcised and the unclean.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See ch. 51:9
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has bared his holy arm'
  - type: text
    content: before the eyes of all the nations,
  - type: note
    content: Ps. 98:3; [ Luke 3:6 ]
  - type: text
    content: and all the ends of the earth shall see
  - type: text
    content: the salvation of our God.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:20; Jer. 50:8; 51:6, 45; Zech. 2:6, 7; Cited 2 Cor. 6:17; [ Rev. 18:4 ]
  - type: text
    content: Depart, depart, go out from there;
  - type: text
    content: touch no unclean thing;
  - type: text
    content: go out from the midst of her; purify yourselves,
  - type: note
    content: See Ezra 1:7-11
  - type: text
    content: 'you who bear the vessels of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: 'For you shall not '
  - type: note
    content: '[Ex. 12:11, 33, 39]'
  - type: text
    content: go out in haste,
  - type: text
    content: and you shall not go in flight,
  - type: note
    content: Mic. 2:13; [ Ex. 14:19 ]
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will go before you,'
  - type: note
    content: '[ch. 58:8 ]'
  - type: text
    content: and the God of Israel will be your rear guard.
  - type: heading
    content: He Was Pierced for Our Transgressions
  '13':
  - type: text
    content: 'Behold, '
  - type: note
    content: See ch. 42:1
  - type: text
    content: my servant shall act wisely;
  - type: note
    content: Or shall prosper
  - type: text
    content: he shall be high and lifted up,
  - type: text
    content: and shall be exalted.
  '14':
  - type: text
    content: As many were astonished at you—
  - type: note
    content: '[ch. 53:2, 3 ]'
  - type: text
    content: his appearance was so marred, beyond human semblance,
  - type: text
    content: and his form beyond that of the children of mankind—
  '15':
  - type: text
    content: 'so '
  - type: note
    content: Lev. 4:6, 17
  - type: text
    content: shall he sprinkle
  - type: note
    content: Or startle
  - type: text
    content: ' many nations.'
  - type: note
    content: ch. 49:7, 23
  - type: text
    content: Kings shall shut their mouths because of him,
  - type: note
    content: Cited Rom. 15:21; [ Rom. 16:25 ]
  - type: text
    content: for that which has not been told them they see,
  - type: text
    content: and that which they have not heard they understand.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 51:23 ]'
  - type: text
    content: Shake yourself from the dust and arise;
  - type: text
    content: be seated, O Jerusalem;
  - type: note
    content: ch. 51:14
  - type: text
    content: loose the bonds from your neck,
  - type: text
    content: O captive daughter of Zion.
  '3':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 45:13; 50:1
  - type: text
    content: '“You were sold for nothing, and '
  - type: note
    content: '[1 Pet. 1:18]'
  - type: text
    content: 'you shall be redeemed without money.” '
  '4':
  - type: text
    content: 'For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: Gen. 46:6
  - type: text
    content: “My people went down at the first into Egypt to sojourn there, and the Assyrian oppressed them for nothing.
  - type: note
    content: Or the Assyrian has oppressed them of late
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Now therefore what have I here,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “seeing that my people are taken away for nothing? Their rulers wail,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and '
  - type: note
    content: Cited Rom. 2:24; [Ezek. 36:20, 23]
  - type: text
    content: 'continually all the day my name is despised. '
  '6':
  - type: text
    content: 'Therefore my people shall know my name. '
  - type: note
    content: '[ch. 49:26]'
  - type: text
    content: Therefore in that day they shall know that it is I who speak; here I am.”
  '7':
  - type: text
    content: ' '
  - type: note
    content: Nah. 1:15; Cited Rom. 10:15
  - type: text
    content: How beautiful upon the mountains
  - type: text
    content: are the feet of him who brings good news,
  - type: text
    content: 'who publishes peace, '
  - type: note
    content: ch. 40:9
  - type: text
    content: who brings good news of happiness,
  - type: text
    content: who publishes salvation,
  - type: text
    content: who says to Zion, “Your God reigns.”
  '8':
  - type: text
    content: 'The voice of '
  - type: note
    content: See ch. 62:6
  - type: text
    content: your watchmen—they lift up their voice;
  - type: text
    content: together they sing for joy;
  - type: note
    content: '[ch. 33:17, 22; 1 Cor. 13:12; 1 John 3:2; Rev. 22:4 ]'
  - type: text
    content: for eye to eye they see
  - type: text
    content: 'the return of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Zion.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 98:4
  - type: text
    content: Break forth together into singing,
  - type: note
    content: ch. 58:12
  - type: text
    content: you waste places of Jerusalem,
  - type: text
    content: 'for '
  - type: note
    content: ch. 40:1; 51:3, 12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has comforted his people;'
  - type: text
    content: he has redeemed Jerusalem.
