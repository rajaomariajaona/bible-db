document_id: JER.52,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem Recounted
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-27, see 2 Kgs. 24:18–25:21
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name was Hamutal the daughter of Jeremiah of Libnah. '
  '10':
  - type: text
    content: 'The king of Babylon slaughtered the sons of Zedekiah before his eyes, and also slaughtered all the officials of Judah at '
  - type: note
    content: ver. 26, 27
  - type: text
    content: 'Riblah. '
  '11':
  - type: note
    content: '[Ezek. 12:13]'
  - type: text
    content: 'He put out the eyes of Zedekiah, and bound him in chains, and the king of Babylon took him to Babylon, and put him in prison '
  - type: note
    content: '[Ezek. 12:13]'
  - type: text
    content: till the day of his death.
  - type: heading
    content: The Temple Burned
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'In the fifth month, on '
  - type: note
    content: '[2 Kgs. 25:8]'
  - type: text
    content: 'the tenth day of the month—that was '
  - type: note
    content: '[ver. 29]'
  - type: text
    content: 'the nineteenth year of King Nebuchadnezzar, king of Babylon—Nebuzaradan the captain of the bodyguard, who '
  - type: note
    content: ch. 40:10
  - type: text
    content: 'served the king of Babylon, entered Jerusalem. '
  '13':
  - type: text
    content: 'And he burned the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the king’s house and all the houses of Jerusalem; every great house he burned down. '
  '14':
  - type: text
    content: 'And all the army of the Chaldeans, who were with the captain of the guard, broke down all the walls around Jerusalem. '
  '15':
  - type: text
    content: 'And Nebuzaradan the captain of the guard carried away captive some of the poorest of the people and the rest of the people who were left in the city and '
  - type: note
    content: See ch. 37:13
  - type: text
    content: 'the deserters who had deserted to the king of Babylon, together with the rest of the artisans. '
  '16':
  - type: text
    content: But Nebuzaradan the captain of the guard left some of the poorest of the land to be vinedressers and plowmen.
  '17':
  - type: text
    content: 'And the '
  - type: note
    content: ch. 27:19; See 2 Chr. 4:12-15
  - type: text
    content: 'pillars of bronze that were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the stands and the '
  - type: note
    content: 2 Chr. 4:2, 10
  - type: text
    content: 'bronze sea that were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the Chaldeans broke in pieces, and '
  - type: note
    content: See ch. 27:22
  - type: text
    content: 'carried all the bronze to Babylon. '
  '18':
  - type: text
    content: 'And they took away '
  - type: note
    content: 2 Kgs. 25:14
  - type: text
    content: 'the pots and the shovels and the snuffers and the basins and the dishes for incense and all the vessels of bronze used in the temple service; '
  '19':
  - type: note
    content: 1 Kgs. 7:50; 2 Kgs. 25:15
  - type: text
    content: 'also the small bowls and the fire pans and the basins and the pots and '
  - type: note
    content: 1 Kgs. 7:49
  - type: text
    content: 'the lampstands and '
  - type: note
    content: Ex. 25:29; 37:16
  - type: text
    content: 'the dishes for incense '
  - type: note
    content: Ex. 25:29; 37:16
  - type: text
    content: 'and the bowls for drink offerings. What was of gold the captain of the guard took away as gold, and what was of silver, as silver. '
  '2':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Kgs. 23:37; See ch. 22:13-17
  - type: text
    content: 'according to all that Jehoiakim had done. '
  '20':
  - type: text
    content: 'As for the two pillars, the one sea, '
  - type: note
    content: 1 Kgs. 7:25, 44
  - type: text
    content: the twelve bronze bulls that were under the sea,
  - type: note
    content: Hebrew lacks the sea
  - type: text
    content: ' and the stands, which Solomon the king had made for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the bronze of all these things was beyond weight. '
  '21':
  - type: text
    content: As for the pillars, the height of the one pillar was eighteen cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 7:15
  - type: text
    content: 'its circumference was twelve cubits, and its thickness was four fingers, and it was hollow. '
  '22':
  - type: text
    content: 'On it was a capital of bronze. The height of the one capital was '
  - type: note
    content: 1 Kgs. 7:16; [2 Kgs. 25:17]
  - type: text
    content: 'five cubits. A network and pomegranates, all of bronze, were around the capital. And the second pillar had the same, with pomegranates. '
  '23':
  - type: text
    content: There were ninety-six pomegranates on the sides; all the pomegranates were a hundred upon the network all around.
  - type: heading
    content: The People Exiled to Babylon
  '24':
  - type: text
    content: 'And the captain of the guard took '
  - type: note
    content: '[1 Chr. 6:14, 15]'
  - type: text
    content: 'Seraiah the chief priest, and '
  - type: note
    content: '[ch. 29:25]'
  - type: text
    content: 'Zephaniah the second priest and the three keepers of the threshold; '
  '25':
  - type: text
    content: 'and from the city he took an officer who had been in command of the men of war, and '
  - type: note
    content: '[Esth. 1:14]'
  - type: text
    content: 'seven men of the king’s council, who were found in the city; and the secretary of the commander of the army, who mustered the people of the land; and sixty men of the people of the land, who were found in the midst of the city. '
  '26':
  - type: text
    content: 'And Nebuzaradan the captain of the guard took them and brought them to the king of Babylon at '
  - type: note
    content: ver. 9, 10
  - type: text
    content: 'Riblah. '
  '27':
  - type: text
    content: 'And the king of Babylon struck them down and put them to death at '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: Riblah in the land of Hamath. So Judah was taken into exile out of its land.
  '28':
  - type: text
    content: 'This is the number of the people whom Nebuchadnezzar carried away captive: '
  - type: note
    content: '[2 Kgs. 24:12, 14]'
  - type: text
    content: 'in the seventh year, 3,023 Judeans; '
  '29':
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'in the eighteenth year of Nebuchadnezzar he carried away captive from Jerusalem 832 persons; '
  '3':
  - type: text
    content: 'For because of the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' it came to the point in Jerusalem and Judah that he cast them out from his presence.'
  - type: text
    content: 'And Zedekiah rebelled against the king of Babylon. '
  '30':
  - type: text
    content: in the twenty-third year of Nebuchadnezzar, Nebuzaradan the captain of the guard carried away captive of the Judeans 745 persons; all the persons were 4,600.
  - type: heading
    content: Jehoiachin Released from Prison
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-34, see 2 Kgs. 25:27-30
  - type: text
    content: And in the thirty-seventh year of the exile of Jehoiachin king of Judah, in the twelfth month, on the twenty-fifth day of the month, Evil-merodach king of Babylon, in the year that he began to reign, graciously freed
  - type: note
    content: Hebrew reign, lifted up the head of
  - type: text
    content: ' '
  - type: note
    content: ch. 37:1; See ch. 22:24-30
  - type: text
    content: 'Jehoiachin king of Judah and brought him out of prison. '
  '32':
  - type: text
    content: 'And he spoke kindly to him and gave him a seat above the seats of '
  - type: note
    content: '[ch. 27:3]'
  - type: text
    content: 'the kings who were with him in Babylon. '
  '33':
  - type: text
    content: 'So Jehoiachin put off his prison garments. And every day of his life he dined regularly at the king’s table, '
  '34':
  - type: text
    content: and for his allowance, a regular allowance was given him by the king, according to his daily needs, until the day of his death, as long as he lived.
  '4':
  - type: note
    content: For ver. 4-16, see ch. 39:1-10
  - type: text
    content: 'And in the ninth year of his reign, in the tenth month, on the tenth day of the month, Nebuchadnezzar king of Babylon came with all his army against Jerusalem, and laid siege to it. And they built siegeworks all around it. '
  '5':
  - type: text
    content: 'So the city was besieged till the eleventh year of King Zedekiah. '
  '6':
  - type: text
    content: 'On the ninth day of the fourth month the famine was so severe in the city that there was no food for the people of the land. '
  '7':
  - type: text
    content: 'Then a breach was made in the city, and all the men of war fled and went out from the city by night by the way of a gate between the two walls, by the king’s garden, and the Chaldeans were around the city. And they went in the direction of the Arabah. '
  '8':
  - type: text
    content: 'But the army of the Chaldeans pursued the king and overtook Zedekiah in the plains of Jericho, and all his army was scattered from him. '
  '9':
  - type: text
    content: 'Then they captured the king and brought him up to the king of Babylon at Riblah in the land of Hamath, and he passed sentence on him. '
