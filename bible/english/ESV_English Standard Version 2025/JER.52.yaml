      text: 'For because of the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' it came to the point in Jerusalem and Judah that he cast them out from his presence.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Zedekiah rebelled against the king of Babylon. '
