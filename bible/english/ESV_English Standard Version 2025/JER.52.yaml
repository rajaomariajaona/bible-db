      metadata:
        usfm: JER.40.10
    marker-yv: yv-n
  - type: text
    text: 'served the king of Babylon, entered Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he burned the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the king’s house and all the houses of Jerusalem; every great house he burned down. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And all the army of the Chaldeans, who were with the captain of the guard, broke down all the walls around Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Nebuzaradan the captain of the guard carried away captive some of the poorest of the people and the rest of the people who were left in the city and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
