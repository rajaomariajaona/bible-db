        children:
        - type: text
          text: 'For ver. 1-27, see '
      - type: text
        text: 2 Kgs. 24:18–25:21
      marker-yv: yv-n
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name was Hamutal the daughter of Jeremiah of Libnah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The king of Babylon slaughtered the sons of Zedekiah before his eyes, and also slaughtered all the officials of Judah at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26, 27
      marker-yv: yv-n
    - type: text
      text: 'Riblah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
