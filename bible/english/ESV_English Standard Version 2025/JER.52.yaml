    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And all the army of the Chaldeans, who were with the captain of the guard, broke down all the walls around Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Nebuzaradan the captain of the guard carried away captive some of the poorest of the people and the rest of the people who were left in the city and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:13
      marker-yv: yv-n
    - type: text
      text: 'the deserters who had deserted to the king of Babylon, together with the rest of the artisans. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But Nebuzaradan the captain of the guard left some of the poorest of the land to be vinedressers and plowmen.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
