      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'He put out the eyes of Zedekiah, and bound him in chains, and the king of Babylon took him to Babylon, and put him in prison '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
