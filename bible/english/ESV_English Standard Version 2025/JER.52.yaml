      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'five cubits. A network and pomegranates, all of bronze, were around the capital. And the second pillar had the same, with pomegranates. '
  '23':
