    children:
    - type: text
      text: '3'
  - type: text
    text: 'For because of the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' it came to the point in Jerusalem and Judah that he cast them out from his presence.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Zedekiah rebelled against the king of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 4-16, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 39:1-10
      metadata:
        usfm: JER.39.1+JER.39.2+JER.39.3+JER.39.4+JER.39.5+JER.39.6+JER.39.7+JER.39.8+JER.39.9+JER.39.10
    marker-yv: yv-n
  - type: text
    text: 'And in the ninth year of his reign, in the tenth month, on the tenth day of the month, Nebuchadnezzar king of Babylon came with all his army against Jerusalem, and laid siege to it. And they built siegeworks all around it. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the city was besieged till the eleventh year of King Zedekiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On the ninth day of the fourth month the famine was so severe in the city that there was no food for the people of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then a breach was made in the city, and all the men of war fled and went out from the city by night by the way of a gate between the two walls, by the king’s garden, and the Chaldeans were around the city. And they went in the direction of the Arabah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the army of the Chaldeans pursued the king and overtook Zedekiah in the plains of Jericho, and all his army was scattered from him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then they captured the king and brought him up to the king of Babylon at Riblah in the land of Hamath, and he passed sentence on him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The king of Babylon slaughtered the sons of Zedekiah before his eyes, and also slaughtered all the officials of Judah at '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26, 27
      metadata:
        usfm: JER.52.26
    marker-yv: yv-n
  - type: text
    text: 'Riblah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
