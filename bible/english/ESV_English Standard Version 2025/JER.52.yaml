        text: 37:13
      metadata:
        usfm: JER.37.13
    marker-yv: yv-n
  - type: text
    text: 'the deserters who had deserted to the king of Babylon, together with the rest of the artisans. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Nebuzaradan the captain of the guard left some of the poorest of the land to be vinedressers and plowmen.
