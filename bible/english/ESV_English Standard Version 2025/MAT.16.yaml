document_id: MAT.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Pharisees and Sadducees Demand Signs
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see Mark 8:11-21
  - type: text
    content: 'And the Pharisees and Sadducees came, and '
  - type: note
    content: John 8:6
  - type: text
    content: 'to test him '
  - type: note
    content: 1 Cor. 1:22; See ch. 12:38
  - type: text
    content: 'they asked him to show them '
  - type: note
    content: Luke 11:16; 21:11
  - type: text
    content: 'a sign from heaven. '
  '10':
  - type: text
    content: 'Or '
  - type: note
    content: ch. 15:34-38
  - type: text
    content: the seven loaves for the four thousand, and how many baskets you gathered?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'How is it that you fail to understand that I did not speak about bread? '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: Beware of the leaven of the Pharisees and Sadducees.”
  - type: text
    content: ' '
  '12':
  - type: note
    content: ch. 17:13
  - type: text
    content: 'Then they understood that he did not tell them to beware of the leaven of bread, but of '
  - type: note
    content: '[ch. 5:20; 23:3]'
  - type: text
    content: the teaching of the Pharisees and Sadducees.
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-16, see Mark 8:27-29; Luke 9:18-20
  - type: text
    content: 'Now when Jesus came into the district of Caesarea Philippi, he asked his disciples, '
  - type: text
    content: “Who do people say that the Son of Man is?”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And they said, “Some say '
  - type: note
    content: ch. 14:2; Mark 6:14; Luke 9:7
  - type: text
    content: 'John the Baptist, others say '
  - type: note
    content: Mark 6:15; Luke 9:8; [ch. 17:10; Mark 9:11; John 1:21]
  - type: text
    content: 'Elijah, and others Jeremiah or one of the prophets.” '
  '15':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “But who do you say that I am?”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Simon Peter replied, '
  - type: note
    content: John 11:27
  - type: text
    content: '“You are '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the Christ, '
  - type: note
    content: See ch. 14:33
  - type: text
    content: 'the Son of '
  - type: note
    content: Deut. 5:26; Josh. 3:10; Ps. 42:2; Jer. 10:10; Dan. 6:20; Hos. 1:10; Acts 14:15; 2 Cor. 3:3; 1 Tim. 4:10
  - type: text
    content: 'the living God.” '
  '17':
  - type: text
    content: 'And Jesus answered him, '
  - type: note
    content: '[ch. 13:16]'
  - type: text
    content: '“Blessed are you, '
  - type: note
    content: '[John 1:42; 21:15-17]'
  - type: text
    content: 'Simon Bar-Jonah! For '
  - type: note
    content: 1 Cor. 15:50; Gal. 1:16 (Gk.); Eph. 6:12; Heb. 2:14
  - type: text
    content: 'flesh and blood has not revealed this to you, '
  - type: note
    content: 1 Cor. 2:10; 12:3; [ch. 11:25; John 6:45]
  - type: text
    content: but my Father who is in heaven.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And I tell you, '
  - type: note
    content: '[ch. 10:2; John 1:42]'
  - type: text
    content: 'you are Peter, and '
  - type: note
    content: Eph. 2:20; Rev. 21:14; [ch. 7:24]
  - type: text
    content: on this rock
  - type: note
    content: The Greek words for Peter and rock sound similar
  - type: text
    content: ' '
  - type: text
    content: 'I will build my church, and '
  - type: note
    content: Job 38:17; Isa. 38:10
  - type: text
    content: 'the gates of '
  - type: note
    content: See ch. 11:23
  - type: text
    content: hell
  - type: note
    content: Greek the gates of Hades
  - type: text
    content: ' '
  - type: text
    content: shall not prevail against it.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'I will give you '
  - type: note
    content: '[Isa. 22:22; Rev. 1:18; 3:7]'
  - type: text
    content: 'the keys of the kingdom of heaven, and '
  - type: note
    content: '[ch. 18:18; John 20:23]'
  - type: text
    content: whatever you bind on earth shall be bound in heaven, and whatever you loose on earth shall be loosed
  - type: note
    content: Or shall have been bound . . . shall have been loosed
  - type: text
    content: ' '
  - type: text
    content: in heaven.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: He answered them,
  - type: note
    content: Some manuscripts omit the following words to the end of verse 3
  - type: text
    content: ' '
  - type: note
    content: '[Luke 12:54, 55]'
  - type: text
    content: “When it is evening, you say, ‘It will be fair weather, for the sky is red.’
  - type: text
    content: ' '
  '20':
  - type: note
    content: Mark 8:30; Luke 9:21; [ch. 17:9]; See ch. 12:16
  - type: text
    content: Then he strictly charged the disciples to tell no one that he was the Christ.
  - type: heading
    content: Jesus Foretells His Death and Resurrection
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21-28, see Mark 8:31–9:1; Luke 9:22-27; [ch. 17:12, 22, 23; 20:17-19 ]
  - type: text
    content: 'From that time Jesus began to show his disciples that '
  - type: note
    content: ch. 20:18; [Luke 13:33]
  - type: text
    content: 'he must go to Jerusalem and '
  - type: note
    content: ch. 17:12, 22, 23; Luke 24:7
  - type: text
    content: 'suffer many things from the elders and chief priests and scribes, and be killed, and on '
  - type: note
    content: See ch. 27:63; John 2:19
  - type: text
    content: 'the third day be raised. '
  '22':
  - type: text
    content: And Peter took him aside and began to rebuke him, saying, “Far be it from you, Lord!
  - type: note
    content: Or “[May God be] merciful to you, Lord!”
  - type: text
    content: ' This shall never happen to you.” '
  '23':
  - type: text
    content: 'But he turned and said to Peter, '
  - type: note
    content: '[ch. 4:10]'
  - type: text
    content: '“Get behind me, Satan! You are '
  - type: note
    content: See ch. 13:41
  - type: text
    content: a hindrance
  - type: note
    content: Greek stumbling block
  - type: text
    content: ' '
  - type: text
    content: 'to me. For you '
  - type: note
    content: Rom. 8:5; Phil. 3:19; Col. 3:2; [Phil. 2:5]
  - type: text
    content: are not setting your mind on the things of God, but on the things of man.”
  - type: heading
    content: Take Up Your Cross and Follow Jesus
  '24':
  - type: text
    content: 'Then Jesus told his disciples, '
  - type: text
    content: '“If anyone would come after me, let him '
  - type: note
    content: '[2 Tim. 2:12, 13]'
  - type: text
    content: 'deny himself and '
  - type: note
    content: See ch. 10:38, 39
  - type: text
    content: take up his cross and follow me.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: whoever would save his life
  - type: note
    content: The same Greek word can mean either soul or life, depending on the context; twice in this verse and twice in verse 26
  - type: text
    content: ' '
  - type: text
    content: will lose it, but whoever loses his life for my sake will find it.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'For '
  - type: note
    content: '[Luke 12:20]'
  - type: text
    content: 'what will it profit a man if he gains the whole world and forfeits his soul? Or '
  - type: note
    content: '[Ps. 49:7, 8]'
  - type: text
    content: what shall a man give in return for his soul?
  - type: text
    content: ' '
  '27':
  - type: note
    content: ch. 24:30; 25:31; 26:64; Dan. 7:10, 13; Zech. 14:5; John 1:51; Acts 1:11; 1 Thess. 1:10; 4:16; Jude 14; Rev. 1:7; [Deut. 33:2]
  - type: text
    content: 'For the Son of Man is going to come with '
  - type: note
    content: ch. 13:41
  - type: text
    content: 'his angels in the glory of his Father, and '
  - type: note
    content: Rom. 2:6; 14:12; 2 Cor. 5:10; Heb. 9:27; 1 Pet. 1:17; Rev. 2:23; 20:12; 22:12; See Acts 10:42; 1 Cor. 3:8
  - type: text
    content: then he will repay each person according to what he has done.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Truly, I say to you, there are some standing here who will not '
  - type: note
    content: John 8:52; Heb. 2:9
  - type: text
    content: 'taste death '
  - type: note
    content: '[ch. 10:23; 23:36; 24:34]'
  - type: text
    content: 'until they see the Son of Man '
  - type: note
    content: Luke 23:42
  - type: text
    content: coming in his kingdom.”
  '3':
  - type: text
    content: 'And in the morning, ‘It will be stormy today, for the sky is red and threatening.’ '
  - type: note
    content: Luke 12:56
  - type: text
    content: 'You know how to interpret the appearance of the sky, but you cannot interpret '
  - type: note
    content: '[ch. 12:28; Luke 19:44]'
  - type: text
    content: the signs of the times.
  - type: text
    content: ' '
  '4':
  - type: note
    content: See ch. 12:39
  - type: text
    content: An evil and adulterous generation seeks for a sign, but no sign will be given to it except the sign of Jonah.”
  - type: text
    content: ' So '
  - type: note
    content: ch. 4:13; 21:17
  - type: text
    content: he left them and departed.
  - type: heading
    content: The Leaven of the Pharisees and Sadducees
  '5':
  - type: text
    content: 'When the disciples reached the other side, they had forgotten to bring any bread. '
  '6':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Watch and '
  - type: note
    content: Luke 12:1
  - type: text
    content: 'beware of '
  - type: note
    content: 1 Cor. 5:6-8; Gal. 5:9
  - type: text
    content: the leaven of the Pharisees and Sadducees.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And they began discussing it among themselves, saying, “We brought no bread.” '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: ch. 26:10
  - type: text
    content: 'Jesus, aware of this, said, '
  - type: note
    content: See ch. 6:30
  - type: text
    content: “O you of little faith, why are you discussing among yourselves the fact that you have no bread?
  - type: text
    content: ' '
  '9':
  - type: note
    content: ch. 15:16
  - type: text
    content: 'Do you not yet perceive? Do you not remember '
  - type: note
    content: ch. 14:17-21
  - type: text
    content: the five loaves for the five thousand, and how many baskets you gathered?
  - type: text
    content: ' '
