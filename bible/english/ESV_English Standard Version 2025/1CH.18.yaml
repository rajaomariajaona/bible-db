document_id: 1CH.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Defeats His Enemies
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-17, see 2 Sam. 8:1-18
  - type: text
    content: After this David defeated the Philistines and subdued them, and he took Gath and its villages out of the hand of the Philistines.
  '10':
  - type: text
    content: 'he sent his son '
  - type: note
    content: '[2 Sam. 8:10]'
  - type: text
    content: 'Hadoram to King David, to ask about his health and to bless him because he had fought against '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Hadadezer and defeated him; for '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Hadadezer had often been at war with Tou. And he sent all sorts of articles of gold, of silver, and of bronze. '
  '11':
  - type: text
    content: 'These also King David dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ', together with the silver and gold that he had carried off from all the nations, from '
  - type: note
    content: '[2 Sam. 8:12]'
  - type: text
    content: Edom, Moab, the Ammonites, the Philistines, and Amalek.
  '12':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 26:6; [2 Sam. 8:13]
  - type: text
    content: 'Abishai, the son of Zeruiah, killed 18,000 Edomites in the Valley of Salt. '
  '13':
  - type: text
    content: 'Then he put garrisons in Edom, and all the Edomites became David’s servants. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave victory to David wherever he went.'
  - type: heading
    content: David’s Administration
  '14':
  - type: text
    content: 'So David reigned over all Israel, and he administered justice and equity to all his people. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 11:6]'
  - type: text
    content: 'Joab the son of Zeruiah was over the army; and Jehoshaphat the son of Ahilud was recorder; '
  '16':
  - type: note
    content: '[2 Sam. 8:17; 20:25]'
  - type: text
    content: 'and Zadok the son of Ahitub and '
  - type: note
    content: '[ch. 24:3, 6]'
  - type: text
    content: 'Ahimelech the son of Abiathar were priests; and '
  - type: note
    content: '[2 Sam. 8:17; 1 Kgs. 4:3]'
  - type: text
    content: 'Shavsha was secretary; '
  '17':
  - type: text
    content: 'and Benaiah the son of Jehoiada was over the Cherethites and the Pelethites; and David’s sons were the '
  - type: note
    content: '[2 Sam. 8:18]'
  - type: text
    content: chief officials in the service of the king.
  '2':
  - type: text
    content: And he defeated Moab, and the Moabites became servants to David and brought tribute.
  '3':
  - type: text
    content: 'David also defeated '
  - type: note
    content: '[2 Sam. 8:3]'
  - type: text
    content: 'Hadadezer king of '
  - type: note
    content: See 1 Kgs. 8:65
  - type: text
    content: Zobah-Hamath, as he went to set up his monument
  - type: note
    content: Hebrew hand
  - type: text
    content: ' at the river Euphrates. '
  '4':
  - type: text
    content: 'And David took from him 1,000 chariots, '
  - type: note
    content: '[2 Sam. 8:4]'
  - type: text
    content: '7,000 horsemen, and 20,000 foot soldiers. And David hamstrung all the chariot horses, but left enough for 100 chariots. '
  '5':
  - type: text
    content: 'And when the Syrians of Damascus came to help Hadadezer king '
  - type: note
    content: ch. 19:6
  - type: text
    content: 'of Zobah, David struck down 22,000 men of the Syrians. '
  '6':
  - type: text
    content: Then David put garrisons
  - type: note
    content: Septuagint, Vulgate, 2 Samuel 8:6 (compare Syriac); Hebrew lacks garrisons
  - type: text
    content: ' in Syria of Damascus, and the Syrians became servants to David and brought tribute. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave victory to David'
  - type: note
    content: Hebrew the Lord saved David; also verse 13
  - type: text
    content: ' wherever he went. '
  '7':
  - type: text
    content: 'And David took the shields of gold that were carried by the servants of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: text
    content: 'And from '
  - type: note
    content: '[2 Sam. 8:8]'
  - type: text
    content: 'Tibhath and from Cun, cities of Hadadezer, David took a large amount of bronze. '
  - type: note
    content: 1 Kgs. 7:15, 23; 2 Chr. 4:12, 15, 16
  - type: text
    content: With it Solomon made the bronze sea and the pillars and the vessels of bronze.
  '9':
  - type: text
    content: 'When '
  - type: note
    content: '[2 Sam. 8:9]'
  - type: text
    content: 'Tou king of Hamath heard that David had defeated the whole army of Hadadezer, king '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'of Zobah, '
