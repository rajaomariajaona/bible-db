document_id: NUM.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Men and Vows
  - type: text
    content: 'Moses spoke to '
  - type: note
    content: ch. 1:4, 16; 7:2
  - type: text
    content: 'the heads of the tribes of the people of Israel, saying, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded. '
  '10':
  - type: text
    content: 'And if she vowed in her husband’s house or bound herself by a pledge with an oath, '
  '11':
  - type: text
    content: 'and her husband heard of it and said nothing to her and did not oppose her, then all her vows shall stand, and every pledge by which she bound herself shall stand. '
  '12':
  - type: text
    content: 'But if her husband makes them null and void on the day that he hears them, then whatever proceeds out of her lips concerning her vows or concerning her pledge of herself shall not stand. Her husband has made them void, and '
  - type: note
    content: ver. 8
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her. '
  '13':
  - type: text
    content: Any vow and any binding oath to afflict herself,
  - type: note
    content: Or to fast
  - type: text
    content: ' her husband may establish,'
  - type: note
    content: Or may allow to stand
  - type: text
    content: ' or her husband may make void. '
  '14':
  - type: text
    content: 'But if her husband says nothing to her from day to day, then he establishes all her vows or all her pledges that are upon her. He has established them, because he said nothing to her on the day that he heard of them. '
  '15':
  - type: text
    content: 'But if he makes them null and void after he has heard of them, then '
  - type: note
    content: See Lev. 5:1
  - type: text
    content: he shall bear her iniquity.”
  '16':
  - type: text
    content: 'These are the statutes that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses about a man and his wife and about a father and his daughter while she is in her youth within her father’s house.'
  '2':
  - type: note
    content: Deut. 23:21; Eccles. 5:4; See Lev. 27:2
  - type: text
    content: 'If a man vows a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ', or '
  - type: note
    content: See Lev. 5:4
  - type: text
    content: 'swears an oath to bind himself by a pledge, he shall not break his word. '
  - type: note
    content: Job 22:27; Ps. 22:25; 50:14; 66:13, 14; 116:14, 18; Nah. 1:15
  - type: text
    content: He shall do according to all that proceeds out of his mouth.
  - type: heading
    content: Women and Vows
  '3':
  - type: text
    content: '“If a woman vows a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' and binds herself by a pledge, while within her father’s house in her youth, '
  '4':
  - type: text
    content: 'and her father hears of her vow and of her pledge by which she has bound herself and says nothing to her, then all her vows shall stand, and every pledge by which she has bound herself shall stand. '
  '5':
  - type: text
    content: 'But if her father opposes her on the day that he hears of it, no vow of hers, no pledge by which she has bound herself shall stand. And the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her, because her father opposed her.'
  '6':
  - type: text
    content: '“If she marries a husband, while under her '
  - type: note
    content: Ps. 56:12
  - type: text
    content: 'vows or any thoughtless utterance of her lips by which she has bound herself, '
  '7':
  - type: text
    content: 'and her husband hears of it and says nothing to her on the day that he hears, then her vows shall stand, and her pledges by which she has bound herself shall stand. '
  '8':
  - type: text
    content: 'But if, on the day that her husband comes to hear of it, he opposes her, then he makes void her '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'vow that was on her, and the thoughtless utterance of her lips by which she bound herself. '
  - type: note
    content: ver. 12
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her. '
  '9':
  - type: text
    content: '(But any vow of a widow or of a divorced woman, anything by which she has bound herself, shall stand against her.) '
