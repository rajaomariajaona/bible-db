      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'vow that was on her, and the thoughtless utterance of her lips by which she bound herself. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
