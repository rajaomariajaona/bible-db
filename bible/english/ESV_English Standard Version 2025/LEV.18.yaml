document_id: LEV.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Unlawful Sexual Relations
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'You shall not uncover the nakedness of your son’s daughter or of your daughter’s daughter, for their nakedness is your own nakedness. '
  '11':
  - type: text
    content: 'You shall not uncover the nakedness of your father’s wife’s daughter, brought up in your father’s family, since she is your sister. '
  '12':
  - type: text
    content: 'You shall not uncover the nakedness of your father’s sister; she is your father’s relative. '
  '13':
  - type: text
    content: 'You shall not uncover the nakedness of your mother’s sister, for she is your mother’s relative. '
  '14':
  - type: text
    content: 'You shall not uncover the nakedness of your father’s brother, that is, you shall not approach his wife; she is your aunt. '
  '15':
  - type: note
    content: '[Gen. 38:26; Ezek. 22:11]'
  - type: text
    content: 'You shall not uncover the nakedness of your daughter-in-law; she is your son’s wife, you shall not uncover her nakedness. '
  '16':
  - type: note
    content: '[Gen. 38:8; Deut. 25:5; Matt. 22:24; Mark 12:19; Luke 20:28]'
  - type: text
    content: 'You shall not uncover the nakedness of your brother’s wife; it is your brother’s nakedness. '
  '17':
  - type: text
    content: 'You shall not uncover the nakedness of a woman and of her daughter, and you shall not take her son’s daughter or her daughter’s daughter to uncover her nakedness; they are relatives; it is depravity. '
  '18':
  - type: text
    content: 'And you shall not take a woman as a '
  - type: note
    content: '[1 Sam. 1:6]'
  - type: text
    content: 'rival wife to her sister, uncovering her nakedness '
  - type: note
    content: '[Gen. 31:50]'
  - type: text
    content: while her sister is still alive.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 15:24; 20:18; Ezek. 18:6; 22:10 ]'
  - type: text
    content: '“You shall not approach a woman to uncover her nakedness while she is in her menstrual uncleanness. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: ch. 11:44; 19:4; 20:7; Ex. 6:6, 7
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '20':
  - type: note
    content: See Ex. 20:14
  - type: text
    content: 'And you shall not lie sexually with your neighbor’s wife and so make yourself unclean with her. '
  '21':
  - type: text
    content: 'You shall not give any of your children to '
  - type: note
    content: ch. 20:2-5; Deut. 18:10
  - type: text
    content: offer them
  - type: note
    content: Hebrew to make them pass through [the fire]
  - type: text
    content: ' to '
  - type: note
    content: '[1 Kgs. 11:7, 33; Acts 7:43]'
  - type: text
    content: 'Molech, and so '
  - type: note
    content: ch. 19:12; 20:3; 21:6; 22:2, 32; Ezek. 36:20, 22; Mal. 1:12
  - type: text
    content: 'profane the name of your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: note
    content: ch. 20:13; [Gen. 19:5; Judg. 19:22; Rom. 1:27; 1 Cor. 6:9, 10; 1 Tim. 1:9, 10]
  - type: text
    content: 'You shall not lie with a male as with a woman; it is an abomination. '
  '23':
  - type: note
    content: ch. 20:15, 16; Ex. 22:19
  - type: text
    content: 'And you shall not lie with any animal and so make yourself unclean with it, neither shall any woman give herself to an animal to lie with it: it is '
  - type: note
    content: ch. 20:12
  - type: text
    content: perversion.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ver. 30 ; [Matt. 15:19, 20; Mark 7:21-23]
  - type: text
    content: '“Do not make yourselves unclean by any of these things, '
  - type: note
    content: ch. 20:23; [Deut. 18:12]
  - type: text
    content: 'for by all these the nations I am driving out before you have become unclean, '
  '25':
  - type: text
    content: 'and the '
  - type: note
    content: Num. 35:34; Jer. 2:7; Ezek. 36:17
  - type: text
    content: 'land became unclean, so that I punished its iniquity, and the land '
  - type: note
    content: ch. 20:22
  - type: text
    content: 'vomited out its inhabitants. '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: See ver. 4, 5
  - type: text
    content: 'you shall keep my statutes and my rules and do none of these abominations, either the '
  - type: note
    content: See ch. 16:29
  - type: text
    content: 'native or the stranger who sojourns among you '
  '27':
  - type: text
    content: '(for the people of the land, who were before you, did all of these abominations, so that the land became unclean), '
  '28':
  - type: text
    content: 'lest the land vomit you out when you make it unclean, as it vomited out the nation that was before you. '
  '29':
  - type: text
    content: 'For everyone who does any of these abominations, the persons who do them shall be cut off from among their people. '
  '3':
  - type: note
    content: Ezek. 20:7, 8; 23:8
  - type: text
    content: 'You shall not do as they do in the land of Egypt, where you lived, and '
  - type: note
    content: Ex. 23:24; Deut. 12:30, 31
  - type: text
    content: 'you shall not do as they do in the land of Canaan, to which I am bringing you. You shall not walk in their statutes. '
  '30':
  - type: note
    content: ch. 22:9
  - type: text
    content: 'So keep my charge never to practice '
  - type: note
    content: ver. 3, 26; ch. 20:23; Deut. 18:9
  - type: text
    content: 'any of these abominable customs that were practiced before you, and never to make yourselves unclean by them: '
  - type: note
    content: See ver. 2
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '4':
  - type: note
    content: ver. 26; ch. 19:19, 37; 20:8, 22; 25:18; Deut. 4:1, 6; 5:1; 6:1; 12:1; Ezek. 20:19
  - type: text
    content: You shall follow my rules
  - type: note
    content: Or my just decrees; also verse 5
  - type: text
    content: ' and keep my statutes and walk in them. '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '5':
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'You shall therefore keep my statutes and my rules; '
  - type: note
    content: Ezek. 20:11, 13, 21; Cited Rom. 10:5; Gal. 3:12; [Luke 10:28]
  - type: text
    content: 'if a person does them, he shall live by them: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '“None of you shall approach any one of his close relatives to uncover nakedness. I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: note
    content: For ver. 7-16, see ch. 20:11-21
  - type: text
    content: 'You shall not uncover the nakedness of your father, which is the nakedness of your mother; she is your mother, you shall not uncover her nakedness. '
  '8':
  - type: note
    content: Deut. 22:30; 27:20; 1 Cor. 5:1; [Gen. 49:4; Amos 2:7]
  - type: text
    content: 'You shall not uncover the nakedness of your father’s wife; it is your father’s nakedness. '
  '9':
  - type: note
    content: '[2 Sam. 13:12; Ezek. 22:11]'
  - type: text
    content: 'You shall not uncover the nakedness of your sister, your father’s daughter or your mother’s daughter, whether brought up in the family or in another home. '
