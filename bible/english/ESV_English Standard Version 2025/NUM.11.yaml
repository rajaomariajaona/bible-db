document_id: NUM.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Complain
  - type: text
    content: 'And '
  - type: note
    content: Deut. 9:22
  - type: text
    content: 'the people complained in the hearing of the '
  - type: text
    content: Lord
  - type: text
    content: ' about their misfortunes, and when the '
  - type: text
    content: Lord
  - type: text
    content: ' heard it, '
  - type: note
    content: Ps. 78:21
  - type: text
    content: 'his anger was kindled, and '
  - type: note
    content: '[ch. 16:35; Lev. 10:2; 2 Kgs. 1:12; Ps. 106:18; Rev. 13:13]'
  - type: text
    content: 'the fire of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned among them and consumed some outlying parts of the camp. '
  '10':
  - type: text
    content: 'Moses heard the people '
  - type: note
    content: '[Zech. 12:12-14]'
  - type: text
    content: 'weeping throughout their clans, everyone at the door of his tent. And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' blazed hotly, and Moses was displeased. '
  '11':
  - type: note
    content: '[1 Kgs. 19:4; Jonah 4:1-4, 9]'
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Why have you dealt ill with your servant? And why have I not found favor in your sight, that you lay the burden of all this people on me? '
  '12':
  - type: text
    content: 'Did I conceive all this people? Did I give them birth, that you should say to me, '
  - type: note
    content: Isa. 40:11; [Deut. 1:31]
  - type: text
    content: '‘Carry them in your bosom, as a '
  - type: note
    content: '[Isa. 49:23; 1 Thess. 2:7]'
  - type: text
    content: 'nurse carries a nursing child,’ to the land '
  - type: note
    content: Gen. 50:24; Ex. 13:5
  - type: text
    content: 'that you swore to give their fathers? '
  '13':
  - type: note
    content: '[2 Kgs. 7:2; Matt. 15:33; Mark 8:4; John 6:7, 9]'
  - type: text
    content: 'Where am I to get meat to give to all this people? For they weep before me and say, ‘Give us meat, that we may eat.’ '
  '14':
  - type: note
    content: Ex. 18:18; Deut. 1:9, 12
  - type: text
    content: 'I am not able to carry all this people alone; the burden is too heavy for me. '
  '15':
  - type: text
    content: If you will treat me like this, kill me at once, if I find favor in your sight, that I may not see my wretchedness.”
  - type: heading
    content: Elders Appointed to Aid Moses
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Gather for me '
  - type: note
    content: '[Ex. 24:1, 9]'
  - type: text
    content: 'seventy men of the elders of Israel, whom you know to be the elders of the people and '
  - type: note
    content: Deut. 1:15; 16:18
  - type: text
    content: 'officers over them, and bring them to the tent of meeting, and let them take their stand there with you. '
  '17':
  - type: note
    content: ver. 25; ch. 12:5; Gen. 11:5; 18:21; Ex. 19:20
  - type: text
    content: 'And I will come down and talk with you there. And '
  - type: note
    content: '[2 Kgs. 2:9, 15; Neh. 9:20]'
  - type: text
    content: 'I will take some of the Spirit that is on you and put it on them, and '
  - type: note
    content: Ex. 18:22
  - type: text
    content: 'they shall bear the burden of the people with you, so that you may not bear it yourself alone. '
  '18':
  - type: text
    content: 'And say to the people, '
  - type: note
    content: Ex. 19:10
  - type: text
    content: '‘Consecrate yourselves for tomorrow, and you shall eat meat, for you have wept in the hearing of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “Who will give us meat to eat? '
  - type: note
    content: See ver. 5
  - type: text
    content: 'For it was better for us in Egypt.” Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you meat, and you shall eat. '
  '19':
  - type: text
    content: 'You shall not eat just one day, or two days, or five days, or ten days, or twenty days, '
  '2':
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 21:7]'
  - type: text
    content: 'the people cried out to Moses, '
  - type: note
    content: '[James 5:16]; See ch. 16:45-48'
  - type: text
    content: 'and Moses prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the fire died down. '
  '20':
  - type: text
    content: 'but a whole month, '
  - type: note
    content: '[Ps. 78:29; 106:15]'
  - type: text
    content: 'until it comes out at your nostrils and becomes loathsome to you, because you have rejected the '
  - type: text
    content: Lord
  - type: text
    content: ' who is among you and have wept before him, saying, '
  - type: note
    content: ch. 21:5
  - type: text
    content: '“Why did we come out of Egypt?”’” '
  '21':
  - type: text
    content: 'But Moses said, '
  - type: note
    content: Ex. 12:37; [ch. 1:46; Ex. 38:26]
  - type: text
    content: '“The people among whom I am number six hundred thousand on foot, and you have said, ‘I will give them meat, that they may eat a whole month!’ '
  '22':
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'Shall flocks and herds be slaughtered for them, and be enough for them? Or shall all the fish of the sea be gathered together for them, and be enough for them?” '
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Isa. 50:2; 59:1
  - type: text
    content: '“Is the '
  - type: text
    content: Lord
  - type: text
    content: '’s hand shortened? Now you shall see whether '
  - type: note
    content: ch. 23:19; Ezek. 12:25; 24:14
  - type: text
    content: my word will come true for you or not.”
  '24':
  - type: text
    content: 'So Moses went out and told the people the words of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: ver. 16
  - type: text
    content: 'And he gathered seventy men of the elders of the people and placed them around the tent. '
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 17
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' came down in the cloud and spoke to him, and took some of the Spirit that was on him and put it on the seventy elders. And as soon as the Spirit rested on them, they prophesied. But they did not continue doing it.'
  '26':
  - type: text
    content: 'Now two men remained in the camp, one named Eldad, and the other named Medad, and the Spirit rested on them. They were among those registered, but they '
  - type: note
    content: '[1 Sam. 20:26; Jer. 36:5]'
  - type: text
    content: 'had not gone out to the tent, and so they prophesied in the camp. '
  '27':
  - type: text
    content: 'And a young man ran and told Moses, “Eldad and Medad are prophesying in the camp.” '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ch. 26:65; Ex. 24:13; [ch. 13:8]; See ch. 13:16
  - type: text
    content: 'Joshua the son of Nun, the assistant of Moses from his youth, said, “My lord Moses, '
  - type: note
    content: '[Mark 9:38; Luke 9:49]'
  - type: text
    content: 'stop them.” '
  '29':
  - type: text
    content: 'But Moses said to him, “Are you jealous for my sake? '
  - type: note
    content: '[1 Cor. 14:5]'
  - type: text
    content: 'Would that all the '
  - type: text
    content: Lord
  - type: text
    content: '’s people were prophets, that the '
  - type: text
    content: Lord
  - type: text
    content: ' would put his Spirit on them!” '
  '3':
  - type: text
    content: 'So the name of that place was called '
  - type: note
    content: Deut. 9:22
  - type: text
    content: Taberah,
  - type: note
    content: Taberah means burning
  - type: text
    content: ' because the fire of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned among them.'
  '30':
  - type: text
    content: And Moses and the elders of Israel returned to the camp.
  - type: heading
    content: Quail and a Plague
  '31':
  - type: text
    content: 'Then a '
  - type: note
    content: Ex. 16:13; Ps. 78:26-28; 105:40
  - type: text
    content: 'wind from the '
  - type: text
    content: Lord
  - type: text
    content: ' sprang up, and it brought quail from the sea and let them fall beside the camp, about a day’s journey on this side and a day’s journey on the other side, around the camp, and about two cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' above the ground. '
  '32':
  - type: text
    content: 'And the people rose all that day and all night and all the next day, and gathered the quail. Those who gathered least gathered ten '
  - type: note
    content: Ex. 16:36; [Ezek. 45:11]
  - type: text
    content: homers.
  - type: note
    content: A homer was about 6 bushels or 220 liters
  - type: text
    content: ' And they spread them out for themselves all around the camp. '
  '33':
  - type: note
    content: Ps. 78:30, 31
  - type: text
    content: 'While the meat was yet between their teeth, before it was consumed, the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against the people, and '
  - type: note
    content: '[ch. 16:49]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' struck down the people with a very great plague. '
  '34':
  - type: text
    content: 'Therefore the name of that place was called '
  - type: note
    content: Deut. 9:22
  - type: text
    content: Kibroth-hattaavah,
  - type: note
    content: Kibroth-hattaavah means graves of craving
  - type: text
    content: ' because there they buried the people who had the craving. '
  '35':
  - type: note
    content: ch. 33:17
  - type: text
    content: 'From Kibroth-hattaavah the people journeyed to '
  - type: note
    content: ch. 12:16; 33:17, 18
  - type: text
    content: 'Hazeroth, and they remained at '
  - type: note
    content: ch. 12:16; 33:17, 18
  - type: text
    content: Hazeroth.
  '4':
  - type: text
    content: 'Now the '
  - type: note
    content: See Ex. 12:38
  - type: text
    content: 'rabble that was among them had a strong craving. And the people of Israel also '
  - type: note
    content: ch. 14:1
  - type: text
    content: 'wept again and said, '
  - type: note
    content: Ps. 78:18; 106:14; 1 Cor. 10:6
  - type: text
    content: '“Oh that we had meat to eat! '
  '5':
  - type: note
    content: '[ch. 21:5; Ex. 16:3; Acts 7:39]'
  - type: text
    content: 'We remember the fish we ate in Egypt that cost nothing, the cucumbers, the melons, the leeks, the onions, and the garlic. '
  '6':
  - type: text
    content: But now our strength is dried up, and there is nothing at all but this manna to look at.”
  '7':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 16:14, 31
  - type: text
    content: 'the manna was like coriander seed, and its appearance like that of bdellium. '
  '8':
  - type: note
    content: Ex. 16:16-18
  - type: text
    content: 'The people went about and gathered it and ground it in handmills or beat it in mortars and boiled it in pots and made cakes of it. '
  - type: note
    content: '[Ex. 16:31]'
  - type: text
    content: 'And the taste of it was like the taste of cakes baked with oil. '
  '9':
  - type: note
    content: Ex. 16:13, 14
  - type: text
    content: When the dew fell upon the camp in the night, the manna fell with it.
