document_id: 1CH.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Capture of Rabbah
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 11:1
  - type: text
    content: 'In the spring of the year, the time when kings go out to battle, Joab led out the army and ravaged the country of the Ammonites and came and besieged Rabbah. But David remained at Jerusalem. And '
  - type: note
    content: 2 Sam. 12:26
  - type: text
    content: 'Joab struck down Rabbah and overthrew it. '
  '2':
  - type: note
    content: For ver. 2, 3, see 2 Sam. 12:30, 31
  - type: text
    content: And David took the crown of their king from his head. He found that it weighed a talent
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, and in it was a precious stone. And it was placed on David’s head. And he brought out the spoil of the city, a very great amount. '
  '3':
  - type: text
    content: And he brought out the people who were in it and set them to labor
  - type: note
    content: Compare 2 Samuel 12:31; Hebrew he sawed
  - type: text
    content: ' '
  - type: note
    content: '[2 Sam. 12:31]'
  - type: text
    content: with saws and iron picks and axes.
  - type: note
    content: Compare 2 Samuel 12:31; Hebrew saws
  - type: text
    content: ' And thus David did to all the cities of the Ammonites. Then David and all the people returned to Jerusalem.'
  - type: heading
    content: Philistine Giants Killed
  '4':
  - type: text
    content: ' '
  - type: note
    content: For ver. 4-8, see 2 Sam. 21:18-22
  - type: text
    content: 'And after this there arose war with the Philistines at Gezer. Then Sibbecai the Hushathite struck down Sippai, who was one of the descendants of the giants, and the Philistines were subdued. '
  '5':
  - type: text
    content: 'And there was again war with the Philistines, and Elhanan the son of '
  - type: note
    content: '[2 Sam. 21:19]'
  - type: text
    content: 'Jair struck down Lahmi '
  - type: note
    content: '[2 Sam. 21:19]'
  - type: text
    content: 'the brother of Goliath the Gittite, the shaft of whose spear was like a weaver’s beam. '
  '6':
  - type: text
    content: 'And there was again war at Gath, where there was a man of great stature, who had six fingers on each hand and six toes on each foot, twenty-four in number, and he also was descended from the giants. '
  '7':
  - type: text
    content: 'And when he taunted Israel, Jonathan the son of '
  - type: note
    content: ch. 2:13; 2 Sam. 13:3; [1 Sam. 16:9; 17:13]
  - type: text
    content: 'Shimea, David’s brother, struck him down. '
  '8':
  - type: text
    content: These were descended from the giants in Gath, and they fell by the hand of David and by the hand of his servants.
