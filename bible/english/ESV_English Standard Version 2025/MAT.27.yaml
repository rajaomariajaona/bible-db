document_id: MAT.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Delivered to Pilate
  - type: text
    content: ' '
  - type: note
    content: Mark 15:1; Luke 22:66
  - type: text
    content: 'When morning came, all the chief priests and the elders of the people '
  - type: note
    content: See ch. 26:4
  - type: text
    content: 'took counsel against Jesus to put him to death. '
  '10':
  - type: text
    content: and they gave them for the potter’s field, as the Lord directed me.”
  - type: heading
    content: Jesus Before Pilate
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-14, see Mark 15:2-5; Luke 23:2, 3; John 18:29-38
  - type: text
    content: 'Now Jesus stood before the governor, and the governor asked him, “Are you '
  - type: note
    content: ver. 29, 37; ch. 2:2; John 18:39; 19:3; [ver. 42]
  - type: text
    content: 'the King of the Jews?” Jesus said, '
  - type: note
    content: '[1 Tim. 6:13]; See Luke 22:70'
  - type: text
    content: “You have said so.”
  - type: text
    content: ' '
  '12':
  - type: note
    content: See ch. 26:63
  - type: text
    content: 'But when he was accused by the chief priests and elders, he gave no answer. '
  '13':
  - type: text
    content: 'Then Pilate said to him, '
  - type: note
    content: John 19:10
  - type: text
    content: '“Do you not hear how many things they testify against you?” '
  '14':
  - type: text
    content: But he gave him no answer, not even to a single charge, so that the governor was greatly amazed.
  - type: heading
    content: The Crowd Chooses Barabbas
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-26, see Mark 15:6-15; Luke 23:18-25; John 18:39, 40; 19:16
  - type: text
    content: 'Now at the feast the governor was accustomed to release for the crowd any one prisoner whom they wanted. '
  '16':
  - type: text
    content: 'And they had then a notorious prisoner called Barabbas. '
  '17':
  - type: text
    content: 'So when they had gathered, Pilate said to them, “Whom do you want me to release for you: Barabbas, or '
  - type: note
    content: ver. 22
  - type: text
    content: 'Jesus who is called Christ?” '
  '18':
  - type: text
    content: 'For he knew that it was out '
  - type: note
    content: '[John 12:19]'
  - type: text
    content: 'of envy that they had delivered him up. '
  '19':
  - type: text
    content: 'Besides, while he was sitting on '
  - type: note
    content: John 19:13
  - type: text
    content: 'the judgment seat, his wife sent word to him, “Have nothing to do with '
  - type: note
    content: ver. 24; [Luke 23:47]
  - type: text
    content: 'that righteous man, for I have suffered much because of him today '
  - type: note
    content: See ch. 2:12
  - type: text
    content: 'in a dream.” '
  '2':
  - type: text
    content: 'And they bound him and '
  - type: note
    content: Luke 23:1; John 18:28
  - type: text
    content: 'led him away and '
  - type: note
    content: See ch. 20:19
  - type: text
    content: 'delivered him over to '
  - type: note
    content: Luke 3:1; 13:1; Acts 3:13; 4:27; 1 Tim. 6:13
  - type: text
    content: Pilate the governor.
  - type: heading
    content: Judas Hangs Himself
  '20':
  - type: text
    content: 'Now the chief priests and the elders persuaded the crowd to '
  - type: note
    content: Acts 3:14
  - type: text
    content: 'ask for Barabbas and destroy Jesus. '
  '21':
  - type: text
    content: 'The governor again said to them, “Which of the two do you want me to release for you?” And they said, “Barabbas.” '
  '22':
  - type: text
    content: 'Pilate said to them, “Then what shall I do with Jesus who is called Christ?” '
  - type: note
    content: Acts 13:28
  - type: text
    content: 'They all said, “Let him be crucified!” '
  '23':
  - type: text
    content: 'And he said, “Why? '
  - type: note
    content: '[Luke 23:41; John 8:46]'
  - type: text
    content: What evil has he done?” But they shouted all the more, “Let him be crucified!”
  - type: heading
    content: Pilate Delivers Jesus to Be Crucified
  '24':
  - type: text
    content: 'So when Pilate saw that he was gaining nothing, but rather that '
  - type: note
    content: ch. 26:5
  - type: text
    content: 'a riot was beginning, he took water and '
  - type: note
    content: '[Deut. 21:6-8; Ps. 26:6; 73:13]'
  - type: text
    content: 'washed his hands before the crowd, saying, “I am innocent of '
  - type: note
    content: ver. 19
  - type: text
    content: this man’s blood;
  - type: note
    content: Some manuscripts this righteous blood, or this righteous man’s blood
  - type: text
    content: ' '
  - type: note
    content: ver. 4
  - type: text
    content: 'see to it yourselves.” '
  '25':
  - type: text
    content: 'And all the people answered, '
  - type: note
    content: '[ch. 23:35, 36; Josh. 2:19; Acts 5:28]'
  - type: text
    content: '“His blood be on us and '
  - type: note
    content: '[Ex. 20:5; Lam. 5:7]'
  - type: text
    content: 'on our children!” '
  '26':
  - type: text
    content: 'Then he released for them Barabbas, and having '
  - type: note
    content: ch. 20:19; Isa. 50:6; 53:5; [Luke 23:16; John 19:1]
  - type: text
    content: scourged
  - type: note
    content: A Roman judicial penalty, consisting of a severe beating with a multi-lashed whip containing embedded pieces of bone and metal
  - type: text
    content: ' Jesus, delivered him to be crucified.'
  - type: heading
    content: Jesus Is Mocked
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-31, see Mark 15:16-20; John 19:2, 3
  - type: text
    content: 'Then the soldiers of the governor took Jesus into the '
  - type: note
    content: John 18:28, 33; 19:9; Acts 23:35; Phil. 1:13 (Gk.)
  - type: text
    content: governor’s headquarters,
  - type: note
    content: Greek the praetorium
  - type: text
    content: ' and they gathered the whole '
  - type: note
    content: See Acts 10:1 (Gk.)
  - type: text
    content: battalion
  - type: note
    content: Greek cohort; a tenth of a Roman legion, usually about 600 men
  - type: text
    content: ' before him. '
  '28':
  - type: text
    content: 'And they stripped him and put '
  - type: note
    content: Rev. 18:12, 16; [Luke 23:11]
  - type: text
    content: 'a scarlet robe on him, '
  '29':
  - type: text
    content: 'and twisting together a crown of thorns, they put it on his head and put a reed in his right hand. And kneeling before him, they '
  - type: note
    content: ch. 20:19
  - type: text
    content: 'mocked him, saying, “Hail, '
  - type: note
    content: See ver. 11
  - type: text
    content: 'King of the Jews!” '
  '3':
  - type: text
    content: 'Then when '
  - type: note
    content: See ch. 26:14
  - type: text
    content: Judas, his betrayer, saw that Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' was condemned, '
  - type: note
    content: ch. 21:29
  - type: text
    content: 'he changed his mind and brought back '
  - type: note
    content: ch. 26:15
  - type: text
    content: 'the thirty pieces of silver to the chief priests and the elders, '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 26:67
  - type: text
    content: 'they spit on him and took the reed and struck him on the head. '
  '31':
  - type: text
    content: 'And when they had mocked him, they stripped him of the robe and put his own clothes on him and '
  - type: note
    content: Isa. 53:7
  - type: text
    content: led him away to crucify him.
  - type: heading
    content: The Crucifixion
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mark 15:21; Luke 23:26; [ John 19:17 ]
  - type: note
    content: Heb. 13:12; [ch. 21:39; Num. 15:35 ]
  - type: text
    content: 'As they went out, they found a man of Cyrene, Simon by name. They compelled this man to '
  - type: note
    content: Mark 15:21; Luke 23:26; [John 19:17]
  - type: text
    content: 'carry his cross. '
  '33':
  - type: note
    content: For ver. 33-51, see Mark 15:22-38; Luke 23:32-38, 44-46; John 19:17-19, 23, 24, 28-30
  - type: text
    content: 'And when they came to a place called Golgotha (which means Place of a Skull), '
  '34':
  - type: note
    content: '[Ps. 69:21]'
  - type: text
    content: 'they offered him wine to drink, mixed with '
  - type: note
    content: Acts 8:23
  - type: text
    content: 'gall, but when he tasted it, he would not drink it. '
  '35':
  - type: text
    content: 'And when they had crucified him, '
  - type: note
    content: Ps. 22:18
  - type: text
    content: 'they divided his garments among them by casting lots. '
  '36':
  - type: text
    content: 'Then they sat down and '
  - type: note
    content: ver. 54; [Ps. 22:17]
  - type: text
    content: 'kept watch over him there. '
  '37':
  - type: text
    content: 'And over his head they put the charge against him, which read, “This is Jesus, '
  - type: note
    content: ver. 11, 29
  - type: text
    content: 'the King of the Jews.” '
  '38':
  - type: text
    content: 'Then two '
  - type: note
    content: '[John 18:40]'
  - type: text
    content: 'robbers were crucified with him, '
  - type: note
    content: '[ch. 20:21]'
  - type: text
    content: 'one on the right and one on the left. '
  '39':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:7; 109:25; [Lam. 1:12]
  - type: text
    content: 'those who passed by '
  - type: note
    content: Luke 22:65; 23:39; [James 2:7]
  - type: text
    content: 'derided him, '
  - type: note
    content: Job 16:4; Isa. 37:22; Jer. 18:16; Lam. 2:15
  - type: text
    content: 'wagging their heads '
  '4':
  - type: text
    content: 'saying, “I have sinned by betraying innocent blood.” They said, “What is that to us? '
  - type: note
    content: ver. 24
  - type: text
    content: 'See to it yourself.” '
  '40':
  - type: text
    content: 'and saying, '
  - type: note
    content: ch. 26:61
  - type: text
    content: '“You who would destroy the temple and rebuild it in three days, save yourself! '
  - type: note
    content: ch. 4:3, 6
  - type: text
    content: 'If you are '
  - type: note
    content: ver. 43; ch. 26:63; See ch. 14:33
  - type: text
    content: 'the Son of God, come down from the cross.” '
  '41':
  - type: text
    content: 'So also the chief priests, with the scribes and elders, mocked him, saying, '
  '42':
  - type: note
    content: '[Luke 4:23]'
  - type: text
    content: '“He saved others; '
  - type: note
    content: '[ch. 26:53, 54; John 10:18]'
  - type: text
    content: 'he cannot save himself. '
  - type: note
    content: John 1:49; 12:13; [ver. 37]
  - type: text
    content: 'He is the King of Israel; let him come down now from the cross, and we will believe in him. '
  '43':
  - type: note
    content: Cited from Ps. 22:8
  - type: text
    content: 'He trusts in God; let God deliver him now, if he desires him. For he said, ‘I am the Son of God.’” '
  '44':
  - type: note
    content: '[Luke 23:39-43]'
  - type: text
    content: And the robbers who were crucified with him also reviled him in the same way.
  - type: heading
    content: The Death of Jesus
  '45':
  - type: text
    content: Now from the sixth hour
  - type: note
    content: That is, noon
  - type: text
    content: ' there was darkness over all the land'
  - type: note
    content: Or earth
  - type: text
    content: ' until the ninth hour.'
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'And about the ninth hour Jesus '
  - type: note
    content: '[Heb. 5:7]'
  - type: text
    content: 'cried out with a loud voice, saying, '
  - type: note
    content: Cited from Ps. 22:1
  - type: text
    content: “Eli, Eli, lema sabachthani?”
  - type: text
    content: ' that is, '
  - type: text
    content: “My God, my God, why have you forsaken me?”
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And some of the bystanders, hearing it, said, “This man is calling Elijah.” '
  '48':
  - type: text
    content: 'And one of them at once ran and took a sponge, filled it with '
  - type: note
    content: Ruth 2:14
  - type: text
    content: 'sour wine, and put it on a reed and '
  - type: note
    content: Ps. 69:21
  - type: text
    content: 'gave it to him to drink. '
  '49':
  - type: text
    content: 'But the others said, “Wait, let us see whether Elijah will come to save him.” '
  '5':
  - type: text
    content: 'And throwing down the pieces of silver into the temple, '
  - type: note
    content: '[2 Sam. 17:23; Acts 1:18]'
  - type: text
    content: 'he departed, and he went and hanged himself. '
  '50':
  - type: text
    content: 'And Jesus '
  - type: note
    content: ver. 46
  - type: text
    content: 'cried out again with a loud voice and '
  - type: note
    content: '[John 10:18]'
  - type: text
    content: yielded up his spirit.
  '51':
  - type: text
    content: 'And behold, '
  - type: note
    content: Ex. 26:31-33; 2 Chr. 3:14
  - type: text
    content: 'the curtain of the temple was torn in two, from top to bottom. And '
  - type: note
    content: ver. 54
  - type: text
    content: 'the earth shook, and the rocks were split. '
  '52':
  - type: text
    content: 'The tombs also were opened. And many bodies of '
  - type: note
    content: '[Dan. 7:18, 22]'
  - type: text
    content: 'the saints '
  - type: note
    content: John 11:11-13; Acts 7:60; 13:36; 1 Cor. 15:6, 18, 20; 1 Thess. 4:13-15; 2 Pet. 3:4
  - type: text
    content: 'who had fallen asleep were raised, '
  '53':
  - type: text
    content: 'and coming out of the tombs after his resurrection they went into '
  - type: note
    content: See ch. 4:5
  - type: text
    content: 'the holy city and appeared to many. '
  '54':
  - type: note
    content: For ver. 54-56, see Mark 15:39-41; Luke 23:47, 49
  - type: text
    content: 'When the centurion and those who were with him, '
  - type: note
    content: ver. 36
  - type: text
    content: 'keeping watch over Jesus, saw the earthquake and what took place, they were filled with awe and said, '
  - type: note
    content: ver. 43
  - type: text
    content: “Truly this was the Son
  - type: note
    content: Or a son
  - type: text
    content: ' of God!”'
  '55':
  - type: text
    content: 'There were also '
  - type: note
    content: John 19:25
  - type: text
    content: 'many women there, looking on '
  - type: note
    content: Ps. 38:11
  - type: text
    content: 'from a distance, who had followed Jesus from Galilee, '
  - type: note
    content: See Luke 8:2, 3
  - type: text
    content: 'ministering to him, '
  '56':
  - type: text
    content: 'among whom were '
  - type: note
    content: '[See ver. 55 above]'
  - type: text
    content: 'Mary Magdalene and Mary the mother of James and Joseph and '
  - type: note
    content: ch. 20:20; [Mark 15:40]
  - type: text
    content: the mother of the sons of Zebedee.
  - type: heading
    content: Jesus Is Buried
  '57':
  - type: text
    content: ' '
  - type: note
    content: For ver. 57-61, see Mark 15:42-47; Luke 23:50-56; John 19:38-42
  - type: text
    content: 'When it was evening, there came a rich man from Arimathea, named Joseph, who also was a disciple of Jesus. '
  '58':
  - type: text
    content: 'He went to Pilate and asked for the body of Jesus. Then Pilate ordered it to be given to him. '
  '59':
  - type: text
    content: 'And Joseph took the body and wrapped it in a clean linen shroud '
  '6':
  - type: text
    content: 'But the chief priests, taking the pieces of silver, said, “It is not lawful to put them into '
  - type: note
    content: Mark 12:41, 43; Luke 21:1; John 8:20
  - type: text
    content: 'the treasury, since it is blood money.” '
  '60':
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 53:9]'
  - type: text
    content: 'laid it in his own new tomb, '
  - type: note
    content: Isa. 22:16
  - type: text
    content: 'which he had cut in the rock. And he rolled '
  - type: note
    content: Mark 16:4; [John 11:38]
  - type: text
    content: 'a great stone to the entrance of the tomb and went away. '
  '61':
  - type: text
    content: 'Mary Magdalene and '
  - type: note
    content: ver. 56; ch. 28:1
  - type: text
    content: the other Mary were there, sitting opposite the tomb.
  - type: heading
    content: The Guard at the Tomb
  '62':
  - type: text
    content: 'The next day, that is, after the day of '
  - type: note
    content: Mark 15:42; Luke 23:54; John 19:14, 31, 42
  - type: text
    content: 'Preparation, the chief priests and the Pharisees gathered before Pilate '
  '63':
  - type: text
    content: 'and said, “Sir, we remember how '
  - type: note
    content: '[ver. 64; John 7:12]'
  - type: text
    content: 'that impostor said, while he was still alive, '
  - type: note
    content: ch. 16:21; 17:23; 20:19; 28:6; Mark 8:31; 10:34; Luke 9:22; 18:33; 24:6, 7; [ch. 26:61; John 2:19]
  - type: text
    content: '‘After three days I will rise.’ '
  '64':
  - type: text
    content: 'Therefore order the tomb to be made secure until the third day, '
  - type: note
    content: '[ch. 28:13]'
  - type: text
    content: 'lest his disciples go and steal him away and tell the people, ‘He has risen from the dead,’ and the last fraud will be worse than the first.” '
  '65':
  - type: text
    content: 'Pilate said to them, “You have '
  - type: note
    content: ch. 28:11
  - type: text
    content: a guard
  - type: note
    content: Or Take a guard
  - type: text
    content: ' of soldiers. Go, make it as secure as you can.” '
  '66':
  - type: text
    content: 'So they went and made the tomb secure by '
  - type: note
    content: Dan. 6:17
  - type: text
    content: sealing the stone and setting a guard.
  '7':
  - type: text
    content: 'So they took counsel and bought with them the potter’s field as a burial place for strangers. '
  '8':
  - type: text
    content: 'Therefore '
  - type: note
    content: Acts 1:19
  - type: text
    content: 'that field has been called the Field of Blood '
  - type: note
    content: ch. 28:15
  - type: text
    content: 'to this day. '
  '9':
  - type: note
    content: See ch. 1:22
  - type: text
    content: 'Then was fulfilled what had been spoken by the prophet Jeremiah, saying, '
  - type: note
    content: Cited from Zech. 11:13
  - type: text
    content: '“And they took the thirty pieces of silver, the price of him on whom a price had been set by some of the sons of Israel, '
