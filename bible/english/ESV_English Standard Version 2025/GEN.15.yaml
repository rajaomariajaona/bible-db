document_id: GEN.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Covenant with Abram
  - type: text
    content: 'After these things the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Abram in a vision: '
  - type: note
    content: ch. 26:24; Dan. 10:12; Luke 1:13, 30
  - type: text
    content: '“Fear not, Abram, I am '
  - type: note
    content: Ps. 3:3; 18:2; 84:11; 119:114
  - type: text
    content: 'your shield; your reward shall be very great.” '
  '10':
  - type: text
    content: 'And he brought him all these, '
  - type: note
    content: Jer. 34:18, 19
  - type: text
    content: 'cut them in half, and laid each half over against the other. But '
  - type: note
    content: Lev. 1:17
  - type: text
    content: 'he did not cut the birds in half. '
  '11':
  - type: text
    content: And when birds of prey came down on the carcasses, Abram drove them away.
  '12':
  - type: text
    content: 'As the sun was going down, a '
  - type: note
    content: ch. 2:21
  - type: text
    content: 'deep sleep fell on Abram. And behold, dreadful and great darkness fell upon him. '
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abram, “Know for certain '
  - type: note
    content: Acts 7:6, 7
  - type: text
    content: 'that your offspring will be sojourners in a land that is not theirs and will be servants there, and '
  - type: note
    content: Ex. 1:11, 12; 3:7
  - type: text
    content: 'they will be afflicted for '
  - type: note
    content: Acts 7:6; [Ex. 12:40, 41; Gal. 3:17]
  - type: text
    content: 'four hundred years. '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 6:6
  - type: text
    content: 'I will bring judgment on the nation that they serve, and afterward '
  - type: note
    content: Ex. 12:36; Ps. 105:37
  - type: text
    content: 'they shall come out with great possessions. '
  '15':
  - type: text
    content: 'As for you, you shall go to your fathers in peace; '
  - type: note
    content: ch. 25:8
  - type: text
    content: 'you shall be buried in a good old age. '
  '16':
  - type: text
    content: 'And they shall come back here in the fourth generation, for '
  - type: note
    content: 1 Kgs. 21:26; Amos 2:9
  - type: text
    content: 'the iniquity of the Amorites '
  - type: note
    content: '[Dan. 8:23; Matt. 23:32; 1 Thess. 2:16]'
  - type: text
    content: is not yet complete.”
  '17':
  - type: text
    content: 'When the sun had gone down and it was dark, behold, a smoking fire pot and a flaming torch passed between these pieces. '
  '18':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with Abram, saying, '
  - type: note
    content: ch. 12:7; 13:15; 24:7; 26:4; Num. 34:2; Deut. 34:4; Neh. 9:8
  - type: text
    content: “To your offspring I give
  - type: note
    content: Or have given
  - type: text
    content: ' this land, from '
  - type: note
    content: Ex. 23:31; Deut. 1:7; Josh. 1:4
  - type: text
    content: 'the river of Egypt to the great river, the river Euphrates, '
  '19':
  - type: text
    content: 'the land of the Kenites, the Kenizzites, the Kadmonites, '
  '2':
  - type: text
    content: 'But Abram said, “O Lord '
  - type: text
    content: God
  - type: text
    content: ', what will you give me, for I continue'
  - type: note
    content: Or I shall die
  - type: text
    content: ' childless, and the heir of my house is Eliezer of Damascus?” '
  '20':
  - type: text
    content: 'the Hittites, the Perizzites, the Rephaim, '
  '21':
  - type: text
    content: the Amorites, the Canaanites, the Girgashites and the Jebusites.”
  '3':
  - type: text
    content: 'And Abram said, “Behold, you have given me no offspring, and '
  - type: note
    content: ch. 14:14
  - type: text
    content: 'a member of my household will be my heir.” '
  '4':
  - type: text
    content: 'And behold, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: “This man shall not be your heir; '
  - type: note
    content: ch. 17:16
  - type: text
    content: your very own son
  - type: note
    content: Hebrew what will come out of your own loins
  - type: text
    content: ' shall be your heir.” '
  '5':
  - type: text
    content: 'And he brought him outside and said, “Look toward heaven, and '
  - type: note
    content: Ps. 147:4
  - type: text
    content: 'number the stars, if you are able to number them.” Then he said to him, '
  - type: note
    content: ch. 22:17; 26:4; Ex. 32:13; Deut. 1:10; 10:22; 1 Chr. 27:23; Heb. 11:12; Cited Rom. 4:18
  - type: text
    content: '“So shall your offspring be.” '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Rom. 4:9, 22; Gal. 3:6; James 2:23
  - type: text
    content: 'he believed the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Cited Rom. 4:3; [Ps. 106:31]
  - type: text
    content: he counted it to him as righteousness.
  '7':
  - type: text
    content: 'And he said to him, “I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who '
  - type: note
    content: ch. 11:31; 12:1; Neh. 9:7, 8; Acts 7:2-4
  - type: text
    content: 'brought you out from Ur of the Chaldeans '
  - type: note
    content: Ps. 105:42, 44
  - type: text
    content: 'to give you this land to possess.” '
  '8':
  - type: text
    content: 'But he said, “O Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: '[Judg. 6:17; 2 Kgs. 20:8; Ps. 86:17; Isa. 7:11-13; Luke 1:18]'
  - type: text
    content: 'how am I to know that I shall possess it?” '
  '9':
  - type: text
    content: 'He said to him, “Bring me a heifer three years old, a female goat three years old, a ram three years old, a turtledove, and a young pigeon.” '
