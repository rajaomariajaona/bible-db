document_id: ROM.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Sovereign Choice
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 11:10; 1 Tim. 2:7; [ 2 Cor. 12:19; Gal. 1:20 ]; See ch. 1:9
  - type: text
    content: 'I am speaking the truth in Christ—I am not lying; my conscience bears me witness in the Holy Spirit— '
  '10':
  - type: text
    content: 'And not only so, but '
  - type: note
    content: Gen. 25:21
  - type: text
    content: 'also when Rebekah had conceived children by one man, our forefather Isaac, '
  '11':
  - type: text
    content: 'though they were not yet born and had done nothing either good or bad—in order that God’s purpose of election might continue, not because of works but because of '
  - type: note
    content: '[ch. 4:17]; See ch. 8:28'
  - type: text
    content: 'him who calls— '
  '12':
  - type: text
    content: 'she was told, '
  - type: note
    content: Cited from Gen. 25:23
  - type: text
    content: '“The older will serve the younger.” '
  '13':
  - type: text
    content: 'As it is written, '
  - type: note
    content: Cited from Mal. 1:2, 3
  - type: text
    content: “Jacob I loved, but Esau I hated.”
  '14':
  - type: text
    content: 'What shall we say then? '
  - type: note
    content: Deut. 32:4; 2 Chr. 19:7; Job 8:3; 34:10; Ps. 92:15
  - type: text
    content: 'Is there injustice on God’s part? By no means! '
  '15':
  - type: text
    content: 'For he says to Moses, '
  - type: note
    content: Cited from Ex. 33:19
  - type: text
    content: '“I will have mercy on whom I have mercy, and I will have compassion on whom I have compassion.” '
  '16':
  - type: text
    content: So then it depends not on human will or exertion,
  - type: note
    content: Greek not of him who wills or runs
  - type: text
    content: ' but on God, who has mercy. '
  '17':
  - type: text
    content: 'For the Scripture says to Pharaoh, '
  - type: note
    content: Cited from Ex. 9:16
  - type: text
    content: '“For this very purpose I have raised you up, that I might show my power in you, and that my name might be proclaimed in all the earth.” '
  '18':
  - type: text
    content: So then he has mercy on whomever he wills, and he hardens whomever he wills.
  '19':
  - type: text
    content: 'You will say to me then, “Why does he still find fault? For '
  - type: note
    content: 2 Chr. 20:6; Job 9:12; Dan. 4:35
  - type: text
    content: 'who can resist his will?” '
  '2':
  - type: text
    content: 'that I have great sorrow and unceasing anguish in my heart. '
  '20':
  - type: text
    content: 'But who are you, O man, '
  - type: note
    content: Job 33:13
  - type: text
    content: 'to answer back to God? '
  - type: note
    content: Isa. 29:16; 45:9
  - type: text
    content: 'Will what is molded say to its molder, “Why have you made me like this?” '
  '21':
  - type: note
    content: Isa. 64:8; Jer. 18:6
  - type: text
    content: 'Has the potter no right over the clay, to make out of the same lump '
  - type: note
    content: 2 Tim. 2:20
  - type: text
    content: 'one vessel for honorable use and another for dishonorable use? '
  '22':
  - type: text
    content: 'What if God, desiring to show his wrath and to make known his power, has endured with much patience '
  - type: note
    content: '[ver. 21, 23; Acts 9:15]'
  - type: text
    content: 'vessels of wrath '
  - type: note
    content: '[Prov. 16:4; 1 Pet. 2:8]'
  - type: text
    content: 'prepared for destruction, '
  '23':
  - type: text
    content: 'in order to make known '
  - type: note
    content: Eph. 3:16; See ch. 2:4
  - type: text
    content: 'the riches of his glory for vessels of mercy, which he '
  - type: note
    content: '[ch. 8:29]'
  - type: text
    content: 'has prepared beforehand for glory— '
  '24':
  - type: text
    content: 'even us whom he '
  - type: note
    content: See ch. 8:28
  - type: text
    content: 'has called, '
  - type: note
    content: See ch. 3:29
  - type: text
    content: 'not from the Jews only but also from the Gentiles? '
  '25':
  - type: text
    content: As indeed he says in Hosea,
  - type: note
    content: Cited from Hos. 2:23; [ 1 Pet. 2:10 ]
  - type: text
    content: “Those who were not my people I will call ‘my people,’
  - type: text
    content: and her who was not beloved I will call ‘beloved.’”
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cited from Hos. 1:10
  - type: text
    content: “And in the very place where it was said to them, ‘You are not my people,’
  - type: text
    content: 'there they will be called '
  - type: note
    content: See ch. 8:14; Matt. 16:16
  - type: text
    content: ‘sons of the living God.’”
  '27':
  - type: text
    content: 'And Isaiah cries out concerning Israel: '
  - type: note
    content: Cited from Isa. 10:22, 23; [Hos. 1:10]
  - type: text
    content: “Though the number of the sons of Israel
  - type: note
    content: Or children of Israel
  - type: text
    content: ' be as the sand of the sea, '
  - type: note
    content: ch. 11:5
  - type: text
    content: 'only a remnant of them will be saved, '
  '28':
  - type: text
    content: 'for the Lord will carry out his sentence upon the earth fully and without delay.” '
  '29':
  - type: text
    content: And as Isaiah predicted,
  - type: note
    content: Cited from Isa. 1:9
  - type: note
    content: James 5:4
  - type: text
    content: “If the Lord of hosts had not left us offspring,
  - type: note
    content: Deut. 29:23; Isa. 13:19; Jer. 49:18; 50:40; Amos 4:11
  - type: text
    content: we would have been like Sodom
  - type: text
    content: and become like Gomorrah.”
  - type: heading
    content: Israel’s Unbelief
  '3':
  - type: text
    content: 'For '
  - type: note
    content: '[Ex. 32:32]'
  - type: text
    content: 'I could wish that I myself were '
  - type: note
    content: 1 Cor. 12:3; 16:22; Gal. 1:8, 9
  - type: text
    content: accursed and cut off from Christ for the sake of my brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' my kinsmen '
  - type: note
    content: '[ch. 11:14]'
  - type: text
    content: 'according to the flesh. '
  '30':
  - type: text
    content: 'What shall we say, then? '
  - type: note
    content: '[ch. 10:20]'
  - type: text
    content: 'That Gentiles who did not pursue righteousness have attained it, that is, '
  - type: note
    content: ch. 1:17; 3:21, 22; 10:6; Gal. 2:16; 3:24; Phil. 3:9; Heb. 11:7
  - type: text
    content: 'a righteousness that is by faith; '
  '31':
  - type: text
    content: 'but that Israel '
  - type: note
    content: '[ch. 10:2, 3; 11:7]'
  - type: text
    content: who pursued a law that would lead to righteousness
  - type: note
    content: Greek a law of righteousness
  - type: text
    content: ' '
  - type: note
    content: '[Gal. 5:4]'
  - type: text
    content: 'did not succeed in reaching that law. '
  '32':
  - type: text
    content: 'Why? Because they did not pursue it by faith, but as if it were based on works. They have stumbled over the '
  - type: note
    content: See 1 Pet. 2:8
  - type: text
    content: 'stumbling stone, '
  '33':
  - type: text
    content: as it is written,
  - type: note
    content: 1 Pet. 2:6, 7; Cited from Isa. 28:16; [ Ps. 118:22 ]
  - type: text
    content: '“Behold, I am laying in Zion '
  - type: note
    content: Isa. 8:14
  - type: text
    content: a stone of stumbling, and a rock of offense;
  - type: note
    content: ch. 10:11
  - type: text
    content: 'and whoever believes in him will not be '
  - type: note
    content: Isa. 49:23; Joel 2:26, 27
  - type: text
    content: put to shame.”
  '4':
  - type: text
    content: 'They are '
  - type: note
    content: '[ver. 6; ch. 2:28, 29; Gal. 6:16]'
  - type: text
    content: 'Israelites, and to them belong '
  - type: note
    content: '[Ex. 4:22]; See ch. 8:15'
  - type: text
    content: 'the adoption, '
  - type: note
    content: Ex. 40:34; 1 Sam. 4:21; 1 Kgs. 8:11
  - type: text
    content: 'the glory, '
  - type: note
    content: Gen. 17:2; Deut. 29:14; Gal. 4:24; Eph. 2:12
  - type: text
    content: 'the covenants, '
  - type: note
    content: Deut. 4:14; [Ps. 147:19]
  - type: text
    content: 'the giving of the law, '
  - type: note
    content: Heb. 9:1 (Gk.); [ch. 12:1]
  - type: text
    content: 'the worship, and '
  - type: note
    content: '[Eph. 2:12]; See John 4:22; Acts 13:32'
  - type: text
    content: 'the promises. '
  '5':
  - type: text
    content: 'To them belong '
  - type: note
    content: ch. 11:28
  - type: text
    content: 'the patriarchs, and from their race, according to the flesh, is the Christ, '
  - type: note
    content: '[Eph. 4:6; Col. 1:16-19]'
  - type: text
    content: 'who is God over all, '
  - type: note
    content: ch. 1:25; John 1:1; 2 Cor. 11:31; Heb. 1:8
  - type: text
    content: blessed forever. Amen.
  '6':
  - type: text
    content: 'But it is not as though the word of God has failed. For not all who are descended from Israel belong to Israel, '
  '7':
  - type: text
    content: 'and not all are children of Abraham '
  - type: note
    content: '[Gal. 4:23]; See John 8:33'
  - type: text
    content: 'because they are his offspring, but '
  - type: note
    content: Heb. 11:18; Cited from Gen. 21:12; [Gal. 3:29]
  - type: text
    content: '“Through Isaac shall your offspring be named.” '
  '8':
  - type: text
    content: 'This means that it is not the children of the flesh who are the children of God, but '
  - type: note
    content: Gal. 4:23, 28
  - type: text
    content: 'the children of the promise are counted as offspring. '
  '9':
  - type: text
    content: 'For this is what the promise said: '
  - type: note
    content: Cited from Gen. 18:10, 14; [Gen. 17:21]
  - type: text
    content: '“About this time next year I will return, and Sarah shall have a son.” '
