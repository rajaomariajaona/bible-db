document_id: HAG.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Glory of the Temple
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 23:34, 36 ]'
  - type: text
    content: 'In the seventh month, on the twenty-first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came by the hand of Haggai the prophet: '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ver. 18, 20
  - type: text
    content: 'On the twenty-fourth day of the ninth month, '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'in the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came by Haggai the prophet, '
  '11':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: See Lev. 10:10, 11
  - type: text
    content: 'Ask the priests about the law: '
  '12':
  - type: text
    content: '‘If someone carries '
  - type: note
    content: Jer. 11:15
  - type: text
    content: 'holy meat in the fold of his garment and touches with his fold bread or stew or wine or oil or any kind of food, does it become holy?’” The priests answered and said, '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: '“No.” '
  '13':
  - type: text
    content: 'Then Haggai said, '
  - type: note
    content: Lev. 22:4, 6
  - type: text
    content: '“If someone who is unclean by contact with a dead body '
  - type: note
    content: '[Num. 19:22]'
  - type: text
    content: 'touches any of these, does it become unclean?” The priests answered and said, “It does become unclean.” '
  '14':
  - type: text
    content: 'Then Haggai answered and said, '
  - type: note
    content: '[Isa. 64:6]'
  - type: text
    content: '“So is it with this people, and with this nation before me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and so with every work of their hands. And what they offer there is unclean. '
  '15':
  - type: text
    content: 'Now then, '
  - type: note
    content: '[ch. 1:5]'
  - type: text
    content: consider from this day onward.
  - type: note
    content: Or backward; also verse 18
  - type: text
    content: ' Before stone was placed upon stone in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '16':
  - type: text
    content: 'how did you fare? '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: When
  - type: note
    content: Probable reading (compare Septuagint); Hebrew Lord, since they were. When
  - type: text
    content: ' one came to a heap of twenty measures, there were but ten. When one came to the wine vat to draw fifty measures, there were but twenty. '
  '17':
  - type: note
    content: Amos 4:9; [ch. 1:9; Deut. 28:22]
  - type: text
    content: 'I struck you and all the products of your toil with blight and with mildew and with hail, '
  - type: note
    content: Jer. 5:3; Amos 4:6
  - type: text
    content: 'yet you did not turn to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'Consider from this day onward, '
  - type: note
    content: ver. 10
  - type: text
    content: 'from the twenty-fourth day of the ninth month. Since '
  - type: note
    content: Ezra 3:10; Zech. 8:9
  - type: text
    content: 'the day that the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple was laid, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'consider: '
  '19':
  - type: note
    content: '[Zech. 8:12]'
  - type: text
    content: 'Is the seed yet in the barn? Indeed, the vine, the fig tree, the pomegranate, and the olive tree have yielded nothing. But from this day on '
  - type: note
    content: Joel 2:14
  - type: text
    content: I will bless you.”
  - type: heading
    content: Zerubbabel Chosen as a Signet
  '2':
  - type: text
    content: '“Speak now to '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'Zerubbabel the son of Shealtiel, governor of Judah, and to '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'Joshua the son of Jehozadak, the high priest, and to all the remnant of the people, and say, '
  '20':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came a second time to Haggai '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'on the twenty-fourth day of the month, '
  '21':
  - type: text
    content: '“Speak to '
  - type: note
    content: ch. 1:1; [Zech. 4:6]
  - type: text
    content: 'Zerubbabel, governor of Judah, saying, '
  - type: note
    content: ver. 6
  - type: text
    content: 'I am about to shake the heavens and the earth, '
  '22':
  - type: text
    content: 'and '
  - type: note
    content: Dan. 2:44; Zech. 12:9; [Matt. 24:7]
  - type: text
    content: 'to overthrow the throne of kingdoms. I am about to destroy the strength of the kingdoms of the nations, and '
  - type: note
    content: '[Mic. 5:10]'
  - type: text
    content: 'overthrow the chariots and their riders. And the horses and their riders shall go down, '
  - type: note
    content: '[Zech. 14:13]'
  - type: text
    content: 'every one by the sword of his brother. '
  '23':
  - type: text
    content: 'On that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, I will take you, O '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'Zerubbabel '
  - type: note
    content: '[Isa. 43:10]'
  - type: text
    content: 'my servant, the son of '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'Shealtiel, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and make you '
  - type: note
    content: Jer. 22:24
  - type: text
    content: like a
  - type: note
    content: Hebrew the
  - type: text
    content: ' signet ring, '
  - type: note
    content: '[Isa. 43:10]'
  - type: text
    content: 'for I have chosen you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.”'
  '3':
  - type: note
    content: '[Ezra 3:12]'
  - type: text
    content: '‘Who is left among you who saw this house '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'in its former glory? How do you see it now? '
  - type: note
    content: '[Zech. 4:10]'
  - type: text
    content: 'Is it not as nothing in your eyes? '
  '4':
  - type: text
    content: 'Yet now '
  - type: note
    content: Zech. 8:9; [Zech. 4:6, 7]
  - type: text
    content: 'be strong, O '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Zerubbabel, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Zech. 8:9; [Zech. 4:6, 7]
  - type: text
    content: 'Be strong, O '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Joshua, son of Jehozadak, the high priest. '
  - type: note
    content: Zech. 8:9; [Zech. 4:6, 7]
  - type: text
    content: 'Be strong, all you people of the land, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[ch. 1:14]'
  - type: text
    content: 'Work, for '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'I am with you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  '5':
  - type: note
    content: See Ex. 29:45
  - type: text
    content: 'according to the covenant that I made with you when you came out of Egypt. '
  - type: note
    content: Neh. 9:20
  - type: text
    content: 'My Spirit remains in your midst. '
  - type: note
    content: Zech. 8:13, 15
  - type: text
    content: 'Fear not. '
  '6':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  - type: note
    content: Cited Heb. 12:26
  - type: text
    content: 'Yet once more, in a little while, '
  - type: note
    content: ver. 21
  - type: text
    content: 'I will shake the heavens and the earth and the sea and the dry land. '
  '7':
  - type: text
    content: 'And I will shake all nations, so that the treasures of all nations shall come in, and '
  - type: note
    content: '[Isa. 60:1]'
  - type: text
    content: 'I will fill this house with glory, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '8':
  - type: note
    content: '[1 Chr. 29:14, 16]'
  - type: text
    content: 'The silver is mine, and the gold is mine, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '9':
  - type: note
    content: '[ch. 1:8]'
  - type: text
    content: 'The latter glory of this house shall be greater than the former, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. And '
  - type: note
    content: '[Zech. 6:13; Eph. 2:14]'
  - type: text
    content: 'in this place I will give peace, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.’”'
  - type: heading
    content: Blessings for a Defiled People
