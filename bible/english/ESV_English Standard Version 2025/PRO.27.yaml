document_id: PRO.27,59
type_code: eng
verses:
  '1':
  - type: text
    content: Do not boast about tomorrow,
  - type: note
    content: Luke 12:19, 20; James 4:13, 14
  - type: text
    content: for you do not know what a day may bring.
  '10':
  - type: text
    content: 'Do not forsake your friend and '
  - type: note
    content: See 1 Kgs. 12:6-8; 2 Chr. 10:6-8
  - type: text
    content: your father’s friend,
  - type: text
    content: and do not go to your brother’s house in the day of your calamity.
  - type: note
    content: See ch. 17:17
  - type: text
    content: Better is a neighbor who is near
  - type: text
    content: than a brother who is far away.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:6
  - type: text
    content: 'Be wise, '
  - type: note
    content: ch. 10:1; 23:15, 24
  - type: text
    content: 'my son, and '
  - type: note
    content: See ch. 29:3
  - type: text
    content: make my heart glad,
  - type: text
    content: 'that I may '
  - type: note
    content: Ps. 119:42; [Ps. 127:5]
  - type: text
    content: answer him who reproaches me.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 22:3
  - type: text
    content: The prudent sees danger and hides himself,
  - type: text
    content: 'but '
  - type: note
    content: See ch. 1:4
  - type: text
    content: the simple go on and suffer for it.
  '13':
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:16
  - type: text
    content: Take a man’s garment when he has put up security for a stranger,
  - type: text
    content: and hold it in pledge when he puts up security for an adulteress.
  - type: note
    content: Hebrew a foreign woman; a slight emendation yields (compare Vulgate; see also 20:16) foreigners
  '14':
  - type: text
    content: Whoever blesses his neighbor with a loud voice,
  - type: text
    content: rising early in the morning,
  - type: text
    content: will be counted as cursing.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:13
  - type: text
    content: A continual dripping on a rainy day
  - type: text
    content: and a quarrelsome wife are alike;
  '16':
  - type: text
    content: to restrain her is to restrain the wind
  - type: text
    content: or to grasp
  - type: note
    content: Hebrew to meet with
  - type: text
    content: ' oil in one’s right hand.'
  '17':
  - type: text
    content: Iron sharpens iron,
  - type: text
    content: and one man sharpens another.
  - type: note
    content: Hebrew sharpens the face of another
  '18':
  - type: text
    content: ' '
  - type: note
    content: Song 8:12; 1 Cor. 3:8; 9:7; 2 Tim. 2:6
  - type: text
    content: Whoever tends a fig tree will eat its fruit,
  - type: text
    content: 'and he who '
  - type: note
    content: '[Matt. 25:21]'
  - type: text
    content: guards his master will be honored.
  '19':
  - type: text
    content: As in water face reflects face,
  - type: text
    content: so the heart of man reflects the man.
  '2':
  - type: text
    content: 'Let '
  - type: note
    content: 2 Cor. 10:12, 18; [ch. 25:27; 2 Cor. 12:11]
  - type: text
    content: another praise you, and not your own mouth;
  - type: text
    content: a stranger, and not your own lips.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:11; See Job 26:6
  - type: text
    content: 'Sheol and Abaddon are '
  - type: note
    content: ch. 30:15, 16; Hab. 2:5; [ch. 1:12]
  - type: text
    content: never satisfied,
  - type: text
    content: 'and '
  - type: note
    content: Eccles. 1:8; 4:8
  - type: text
    content: never satisfied are the eyes of man.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:3
  - type: text
    content: The crucible is for silver, and the furnace is for gold,
  - type: text
    content: and a man is tested by his praise.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 23:35; Isa. 1:5; Jer. 5:3 ]'
  - type: text
    content: Crush a fool in a mortar with a pestle
  - type: text
    content: along with crushed grain,
  - type: text
    content: yet his folly will not depart from him.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ John 10:3, 14; Acts 20:28; 1 Pet. 5:2, 4 ]'
  - type: text
    content: Know well the condition of your flocks,
  - type: text
    content: 'and '
  - type: note
    content: '[John 10:3, 14; Acts 20:28; 1 Pet. 5:2, 4]'
  - type: text
    content: give attention to your herds,
  '24':
  - type: text
    content: 'for '
  - type: note
    content: ch. 23:5
  - type: text
    content: riches do not last forever;
  - type: text
    content: and does a crown endure to all generations?
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:2; 90:5, 6
  - type: text
    content: When the grass is gone and the new growth appears
  - type: text
    content: and the vegetation of the mountains is gathered,
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Tim. 6:8 ]'
  - type: text
    content: the lambs will provide your clothing,
  - type: text
    content: and the goats the price of a field.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: There will be enough goats’ milk for your food,
  - type: text
    content: for the food of your household
  - type: text
    content: and maintenance for your girls.
  '3':
  - type: text
    content: A stone is heavy, and sand is weighty,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 12:16; 17:12]'
  - type: text
    content: a fool’s provocation is heavier than both.
  '4':
  - type: text
    content: Wrath is cruel, anger is overwhelming,
  - type: text
    content: 'but who can stand before '
  - type: note
    content: ch. 6:34
  - type: text
    content: jealousy?
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 28:23 ]'
  - type: text
    content: Better is open rebuke
  - type: text
    content: than hidden love.
  '6':
  - type: text
    content: 'Faithful are '
  - type: note
    content: Ps. 141:5
  - type: text
    content: the wounds of a friend;
  - type: text
    content: profuse are the kisses of an enemy.
  '7':
  - type: text
    content: 'One who is full loathes '
  - type: note
    content: '[ch. 25:16]'
  - type: text
    content: honey,
  - type: text
    content: but to one who is hungry everything bitter is sweet.
  '8':
  - type: text
    content: 'Like '
  - type: note
    content: ch. 26:2
  - type: text
    content: a bird that strays from its nest
  - type: text
    content: is a man who strays from his home.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 23:5 ]'
  - type: text
    content: Oil and perfume make the heart glad,
  - type: text
    content: and the sweetness of a friend comes from his earnest counsel.
  - type: note
    content: Or and so does the sweetness of a friend that comes from his earnest counsel
