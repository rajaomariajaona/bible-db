document_id: ISA.38,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Sickness and Recovery
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see 2 Kgs. 20:1-6, 9-11
  - type: text
    content: 'In those days Hezekiah became '
  - type: note
    content: 2 Chr. 32:24
  - type: text
    content: 'sick and was at the point of death. And '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'Isaiah the prophet the son of Amoz came to him, and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Set your house in order, for you shall die, you shall not recover.”'
  - type: note
    content: Or live; also verses 9, 21
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'I said, '
  - type: note
    content: '[Ps. 102:24]'
  - type: text
    content: In the middle
  - type: note
    content: Or In the quiet
  - type: text
    content: ' of my days'
  - type: text
    content: I must depart;
  - type: text
    content: I am consigned to the gates of Sheol
  - type: text
    content: for the rest of my years.
  '11':
  - type: text
    content: 'I said, I shall not see the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 27:13; [Ps. 88:5]
  - type: text
    content: in the land of the living;
  - type: text
    content: I shall look on man no more
  - type: text
    content: among the inhabitants of the world.
  '12':
  - type: text
    content: My dwelling is plucked up and removed from me
  - type: note
    content: '[ 2 Cor. 5:1 ]'
  - type: text
    content: like a shepherd’s tent;
  - type: note
    content: Job 7:6
  - type: text
    content: 'like a weaver '
  - type: note
    content: '[Heb. 1:12]'
  - type: text
    content: I have rolled up my life;
  - type: note
    content: Job 6:9
  - type: text
    content: he cuts me off from the loom;
  - type: note
    content: '[ Job 4:20; Ps. 73:14 ]'
  - type: text
    content: from day to night you bring me to an end;
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 30:5 ]'
  - type: text
    content: I calmed myself
  - type: note
    content: Or (with Targum) I cried for help
  - type: text
    content: ' until morning;'
  - type: text
    content: 'like a lion '
  - type: note
    content: '[Ps. 38:3]'
  - type: text
    content: he breaks all my bones;
  - type: text
    content: from day to night you bring me to an end.
  '14':
  - type: text
    content: 'Like '
  - type: note
    content: '[Jer. 8:7]'
  - type: text
    content: a swallow or a crane I chirp;
  - type: note
    content: ch. 59:11
  - type: text
    content: I moan like a dove.
  - type: note
    content: Ps. 69:3
  - type: text
    content: My eyes are weary with looking upward.
  - type: text
    content: 'O Lord, I am oppressed; '
  - type: note
    content: Ps. 119:122; [Ps. 86:17; Heb. 7:22]
  - type: text
    content: be my pledge of safety!
  '15':
  - type: text
    content: What shall I say? For he has spoken to me,
  - type: text
    content: and he himself has done it.
  - type: note
    content: 1 Kgs. 21:27
  - type: text
    content: I walk slowly all my years
  - type: text
    content: because of the bitterness of my soul.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Deut. 8:3
  - type: text
    content: O Lord, by these things men live,
  - type: text
    content: and in all these is the life of my spirit.
  - type: text
    content: Oh restore me to health and make me live!
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:67, 75
  - type: text
    content: Behold, it was for my welfare
  - type: text
    content: that I had great bitterness;
  - type: note
    content: '[ Ps. 103:12; Mic. 7:19 ]'
  - type: text
    content: but in love you have delivered my life
  - type: text
    content: from the pit of destruction,
  - type: note
    content: '[ Ps. 103:12; Mic. 7:19 ]'
  - type: text
    content: for you have cast all my sins
  - type: text
    content: behind your back.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 88:10-12; 115:17; [ Eccles. 9:10 ]
  - type: text
    content: For Sheol does not thank you;
  - type: text
    content: death does not praise you;
  - type: text
    content: those who go down to the pit do not hope
  - type: text
    content: for your faithfulness.
  '19':
  - type: text
    content: The living, the living, he thanks you,
  - type: text
    content: as I do this day;
  - type: note
    content: Deut. 4:9; 6:7; Ps. 78:3, 4
  - type: text
    content: the father makes known to the children
  - type: text
    content: your faithfulness.
  '2':
  - type: text
    content: 'Then Hezekiah turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will save me,'
  - type: text
    content: and we will play my music on stringed instruments
  - type: text
    content: all the days of our lives,
  - type: note
    content: 2 Kgs. 20:5
  - type: text
    content: 'at the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 20:7, 8
  - type: text
    content: 'Now Isaiah had said, “Let them take a cake of figs and apply it to the boil, that he may recover.” '
  '22':
  - type: text
    content: 'Hezekiah also had said, “What is the sign that I shall go up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '3':
  - type: text
    content: 'and said, “Please, O '
  - type: text
    content: Lord
  - type: text
    content: ', remember how '
  - type: note
    content: 2 Kgs. 18:5, 6
  - type: text
    content: I have walked before you in faithfulness and with a whole heart, and have done what is good in your sight.” And Hezekiah wept bitterly.
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Isaiah: '
  '5':
  - type: text
    content: '“Go and say to Hezekiah, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of David your father: I have heard your prayer; I have seen your tears. Behold, I will add '
  - type: note
    content: 2 Kgs. 18:2, 13
  - type: text
    content: fifteen years to your life.
  - type: note
    content: Hebrew to your days
  - type: text
    content: ' '
  '6':
  - type: note
    content: ch. 37:35
  - type: text
    content: I will deliver you and this city out of the hand of the king of Assyria, and will defend this city.
  '7':
  - type: text
    content: '“This shall be the sign to you from the '
  - type: text
    content: Lord
  - type: text
    content: ', that the '
  - type: text
    content: Lord
  - type: text
    content: ' will do this thing that he has promised: '
  '8':
  - type: note
    content: '[2 Kgs. 20:9, 10]'
  - type: text
    content: Behold, I will make the shadow cast by the declining sun on the dial of Ahaz turn back ten steps.” So the sun turned back on the dial the ten steps by which it had declined.
  - type: note
    content: The meaning of the Hebrew verse is uncertain
  '9':
  - type: text
    content: 'A writing of Hezekiah king of Judah, after he had been sick and had recovered from his sickness:'
