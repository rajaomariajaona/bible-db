document_id: 1CH.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Genealogy of David
  - type: text
    content: 'These are the sons of '
  - type: note
    content: ch. 1:34
  - type: text
    content: 'Israel: '
  - type: note
    content: Gen. 29:32-35
  - type: text
    content: 'Reuben, Simeon, Levi, Judah, '
  - type: note
    content: Gen. 30:18-20
  - type: text
    content: 'Issachar, Zebulun, '
  '10':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Ram fathered Amminadab, and '
  - type: note
    content: Ruth 4:19; Matt. 1:4
  - type: text
    content: 'Amminadab fathered '
  - type: note
    content: Num. 1:7; 2:3
  - type: text
    content: 'Nahshon, prince of the sons of Judah. '
  '11':
  - type: text
    content: 'Nahshon fathered '
  - type: note
    content: '[Ruth 4:20, 21; Matt. 1:4]'
  - type: text
    content: Salmon,
  - type: note
    content: Septuagint (compare Ruth 4:21); Hebrew Salma
  - type: text
    content: ' Salmon fathered '
  - type: note
    content: Ruth 4:21, 22; Matt. 1:5, 6
  - type: text
    content: 'Boaz, '
  '12':
  - type: text
    content: 'Boaz fathered Obed, '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'Obed fathered Jesse. '
  '13':
  - type: note
    content: 1 Sam. 16:6, 8; 17:13
  - type: text
    content: 'Jesse fathered Eliab his firstborn, Abinadab the second, '
  - type: note
    content: '[1 Sam. 16:9; 17:13]'
  - type: text
    content: 'Shimea the third, '
  '14':
  - type: text
    content: 'Nethanel the fourth, Raddai the fifth, '
  '15':
  - type: text
    content: 'Ozem the sixth, '
  - type: note
    content: '[1 Sam. 16:10; 17:12, 14]'
  - type: text
    content: 'David the seventh. '
  '16':
  - type: text
    content: 'And their sisters were Zeruiah and Abigail. '
  - type: note
    content: 2 Sam. 2:18
  - type: text
    content: 'The sons of Zeruiah: Abishai, Joab, and Asahel, three. '
  '17':
  - type: note
    content: '[2 Sam. 17:25]'
  - type: text
    content: 'Abigail bore Amasa, and the father of Amasa was '
  - type: note
    content: '[2 Sam. 17:25]'
  - type: text
    content: Jether the Ishmaelite.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 9 ]'
  - type: text
    content: 'Caleb the son of Hezron fathered children by his wife Azubah, and by Jerioth; and these were her sons: Jesher, Shobab, and Ardon. '
  '19':
  - type: text
    content: 'When Azubah died, '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Caleb married '
  - type: note
    content: '[ver. 50]'
  - type: text
    content: 'Ephrath, who bore him '
  - type: note
    content: Ex. 17:10, 12; 24:14
  - type: text
    content: 'Hur. '
  '2':
  - type: note
    content: Gen. 30:6
  - type: text
    content: 'Dan, '
  - type: note
    content: Gen. 30:22-24
  - type: text
    content: 'Joseph, '
  - type: note
    content: Gen. 35:18
  - type: text
    content: 'Benjamin, '
  - type: note
    content: Gen. 30:8
  - type: text
    content: 'Naphtali, '
  - type: note
    content: Gen. 30:10-13
  - type: text
    content: 'Gad, and Asher. '
  '20':
  - type: text
    content: 'Hur fathered Uri, and Uri fathered '
  - type: note
    content: Ex. 31:2
  - type: text
    content: Bezalel.
  '21':
  - type: text
    content: 'Afterward Hezron went in to the daughter of '
  - type: note
    content: Num. 27:1
  - type: text
    content: 'Machir the father of Gilead, whom he married when he was sixty years old, and she bore him Segub. '
  '22':
  - type: text
    content: 'And Segub fathered Jair, who had twenty-three cities in the land of Gilead. '
  '23':
  - type: note
    content: '[Num. 32:41, 42; Deut. 3:14; Josh. 13:30]'
  - type: text
    content: 'But Geshur and Aram took from them Havvoth-jair, Kenath, and its villages, sixty towns. All these were descendants of Machir, the father of Gilead. '
  '24':
  - type: text
    content: 'After the death of Hezron, '
  - type: note
    content: ver. 19, 50
  - type: text
    content: Caleb went in to Ephrathah,
  - type: note
    content: Septuagint, Vulgate; Hebrew in Caleb Ephrathah
  - type: text
    content: ' the wife of Hezron his father, and she bore him '
  - type: note
    content: ch. 4:5
  - type: text
    content: Ashhur, the father of Tekoa.
  '25':
  - type: text
    content: 'The sons of '
  - type: note
    content: ver. 9
  - type: text
    content: 'Jerahmeel, the firstborn of Hezron: Ram, his firstborn, Bunah, Oren, Ozem, and Ahijah. '
  '26':
  - type: text
    content: 'Jerahmeel also had another wife, whose name was Atarah; she was the mother of Onam. '
  '27':
  - type: text
    content: 'The sons of Ram, the firstborn of Jerahmeel: Maaz, Jamin, and Eker. '
  '28':
  - type: text
    content: 'The sons of Onam: Shammai and Jada. The sons of Shammai: Nadab and Abishur. '
  '29':
  - type: text
    content: 'The name of Abishur’s wife was Abihail, and she bore him Ahban and Molid. '
  '3':
  - type: note
    content: Gen. 38:2-5; 46:12
  - type: text
    content: 'The sons of Judah: '
  - type: note
    content: Gen. 38:7
  - type: text
    content: 'Er, Onan and Shelah; these three Bath-shua the Canaanite bore to him. Now Er, Judah’s firstborn, was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he put him to death. '
  '30':
  - type: text
    content: 'The sons of Nadab: Seled and Appaim; and Seled died childless. '
  '31':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons; three times in this verse
  - type: text
    content: ' of Appaim: Ishi. '
  - type: note
    content: '[ver. 34, 35]'
  - type: text
    content: 'The son of Ishi: Sheshan. The son of Sheshan: Ahlai. '
  '32':
  - type: text
    content: 'The sons of Jada, Shammai’s brother: Jether and Jonathan; and Jether died childless. '
  '33':
  - type: text
    content: 'The sons of Jonathan: Peleth and Zaza. These were the descendants of Jerahmeel. '
  '34':
  - type: text
    content: 'Now Sheshan had no sons, only daughters, but Sheshan had an Egyptian slave whose name was Jarha. '
  '35':
  - type: text
    content: 'So Sheshan gave his daughter in marriage to Jarha his slave, and she bore him Attai. '
  '36':
  - type: text
    content: 'Attai fathered Nathan, and Nathan fathered '
  - type: note
    content: ch. 11:41
  - type: text
    content: 'Zabad. '
  '37':
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'Zabad fathered Ephlal, and Ephlal fathered '
  - type: note
    content: '[2 Chr. 23:1]'
  - type: text
    content: 'Obed. '
  '38':
  - type: text
    content: 'Obed fathered Jehu, and Jehu fathered Azariah. '
  '39':
  - type: text
    content: 'Azariah fathered Helez, and Helez fathered Eleasah. '
  '4':
  - type: text
    content: 'His daughter-in-law '
  - type: note
    content: Gen. 38:11, 14, 29, 30; Ruth 4:12; Matt. 1:3
  - type: text
    content: Tamar also bore him Perez and Zerah. Judah had five sons in all.
  '40':
  - type: text
    content: 'Eleasah fathered Sismai, and Sismai fathered Shallum. '
  '41':
  - type: text
    content: 'Shallum fathered Jekamiah, and Jekamiah fathered '
  - type: note
    content: 2 Kgs. 25:25
  - type: text
    content: Elishama.
  '42':
  - type: text
    content: 'The sons of '
  - type: note
    content: ver. 9
  - type: text
    content: 'Caleb the brother of Jerahmeel: Mareshah'
  - type: note
    content: Septuagint; Hebrew Mesha
  - type: text
    content: ' his firstborn, who fathered Ziph. The son'
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Mareshah: '
  - type: note
    content: See Josh. 14:13
  - type: text
    content: Hebron.
  - type: note
    content: Hebrew the father of Hebron
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'The sons of Hebron: Korah, Tappuah, Rekem and Shema. '
  '44':
  - type: text
    content: 'Shema fathered Raham, the father of Jorkeam; and Rekem fathered Shammai. '
  '45':
  - type: text
    content: 'The son of Shammai: Maon; and Maon fathered Beth-zur. '
  '46':
  - type: text
    content: 'Ephah also, Caleb’s concubine, bore Haran, Moza, and Gazez; and Haran fathered Gazez. '
  '47':
  - type: text
    content: 'The sons of Jahdai: Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph. '
  '48':
  - type: text
    content: 'Maacah, Caleb’s concubine, bore Sheber and Tirhanah. '
  '49':
  - type: text
    content: 'She also bore Shaaph the father of Madmannah, Sheva the father of Machbenah and the father of Gibea; and the '
  - type: note
    content: '[Josh. 15:17; Judg. 1:13]'
  - type: text
    content: 'daughter of Caleb was Achsah. '
  '5':
  - type: text
    content: 'The '
  - type: note
    content: Gen. 46:12; Ruth 4:18
  - type: text
    content: 'sons of Perez: Hezron and Hamul. '
  '50':
  - type: text
    content: These were the descendants of Caleb.
  - type: text
    content: The sons
  - type: note
    content: Septuagint, Vulgate; Hebrew son
  - type: text
    content: ' of Hur the firstborn of '
  - type: note
    content: ch. 4:4; [ver. 19]
  - type: text
    content: 'Ephrathah: Shobal the father of Kiriath-jearim, '
  '51':
  - type: note
    content: '[ch. 4:4]'
  - type: text
    content: 'Salma, the father of Bethlehem, and Hareph the father of Beth-gader. '
  '52':
  - type: text
    content: 'Shobal the father of Kiriath-jearim had other sons: '
  - type: note
    content: '[ch. 4:2]'
  - type: text
    content: 'Haroeh, half of the Menuhoth. '
  '53':
  - type: text
    content: 'And the clans of Kiriath-jearim: the Ithrites, the Puthites, the Shumathites, and the Mishraites; from these came the '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'Zorathites and the Eshtaolites. '
  '54':
  - type: text
    content: 'The sons of Salma: Bethlehem, the Netophathites, Atroth-beth-joab and half of the Manahathites, the Zorites. '
  '55':
  - type: text
    content: 'The clans also of the scribes who lived at Jabez: the Tirathites, the Shimeathites and the Sucathites. These are the '
  - type: note
    content: Judg. 1:16
  - type: text
    content: 'Kenites who came from Hammath, the father of '
  - type: note
    content: 2 Kgs. 10:15; Jer. 35:2
  - type: text
    content: the house of Rechab.
  '6':
  - type: text
    content: 'The sons of Zerah: Zimri, Ethan, Heman, Calcol, and Dara, five in all. '
  '7':
  - type: text
    content: The son
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Carmi: Achan, the troubler of Israel, who '
  - type: note
    content: Josh. 6:18; 7:1
  - type: text
    content: 'broke faith in the matter of the devoted thing; '
  '8':
  - type: text
    content: and Ethan’s son was Azariah.
  '9':
  - type: text
    content: 'The sons of Hezron that were born to him: Jerahmeel, '
  - type: note
    content: Ruth 4:19; Matt. 1:3, 4
  - type: text
    content: 'Ram, and '
  - type: note
    content: '[ver. 13, 42]'
  - type: text
    content: 'Chelubai. '
