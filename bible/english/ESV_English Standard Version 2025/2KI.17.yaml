document_id: 2KI.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hoshea Reigns in Israel
  - type: text
    content: 'In the twelfth year of Ahaz king of Judah, '
  - type: note
    content: '[ch. 15:30]'
  - type: text
    content: 'Hoshea the son of Elah began to reign in Samaria over Israel, and he reigned nine years. '
  '10':
  - type: text
    content: 'They set up for themselves '
  - type: note
    content: See Ex. 23:24
  - type: text
    content: 'pillars and Asherim on every high hill and under every green tree, '
  '11':
  - type: text
    content: 'and there they made offerings on all the high places, as the nations did whom the '
  - type: text
    content: Lord
  - type: text
    content: ' carried away before them. And they did wicked things, provoking the '
  - type: text
    content: Lord
  - type: text
    content: ' to anger, '
  '12':
  - type: text
    content: 'and they served idols, '
  - type: note
    content: See Ex. 20:4
  - type: text
    content: 'of which the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to them, “You shall not do this.” '
  '13':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Neh. 9:30
  - type: text
    content: 'warned Israel and Judah '
  - type: note
    content: ver. 23
  - type: text
    content: 'by every prophet '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'and every seer, saying, '
  - type: note
    content: Jer. 18:11; 25:5; 35:15
  - type: text
    content: “Turn from your evil ways and keep my commandments and my statutes, in accordance with all the Law that I commanded your fathers, and that I sent to you by my servants the prophets.”
  '14':
  - type: text
    content: 'But they would not listen, '
  - type: note
    content: Deut. 9:6; 2 Chr. 30:8; [Deut. 31:27; Acts 7:51]
  - type: text
    content: 'but were stubborn, as their fathers had been, who did not believe in the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '15':
  - type: text
    content: 'They despised his statutes '
  - type: note
    content: Deut. 29:25
  - type: text
    content: 'and his covenant that he made with their fathers and the warnings that he gave them. They went after '
  - type: note
    content: Deut. 32:21; [1 Kgs. 16:13]
  - type: text
    content: 'false idols '
  - type: note
    content: Jer. 2:5; Rom. 1:21
  - type: text
    content: 'and became false, and they followed the nations that were around them, concerning whom the '
  - type: note
    content: Deut. 12:30, 31
  - type: text
    content: Lord
  - type: text
    content: ' had commanded them that they should not do like them. '
  '16':
  - type: text
    content: 'And they abandoned all the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and made for themselves metal images of '
  - type: note
    content: See 1 Kgs. 12:28
  - type: text
    content: 'two calves; and they '
  - type: note
    content: 1 Kgs. 14:15, 23; 15:13; 16:33
  - type: text
    content: 'made an Asherah and '
  - type: note
    content: ch. 21:3; 23:5; [Deut. 4:19]
  - type: text
    content: 'worshiped all the host of heaven and served '
  - type: note
    content: ch. 11:18; 1 Kgs. 16:31; 22:53
  - type: text
    content: 'Baal. '
  '17':
  - type: note
    content: ch. 16:3; [Lev. 18:21; Ezek. 23:37]
  - type: text
    content: And they burned their sons and their daughters as offerings
  - type: note
    content: Or made their sons and their daughters pass through the fire
  - type: text
    content: ' and used '
  - type: note
    content: '[Deut. 18:10]'
  - type: text
    content: 'divination and '
  - type: note
    content: '[Lev. 19:26]'
  - type: text
    content: 'omens and '
  - type: note
    content: See 1 Kgs. 21:20
  - type: text
    content: 'sold themselves to do evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', provoking him to anger. '
  '18':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Israel and removed them out of his sight. None was left but '
  - type: note
    content: '[1 Kgs. 11:13, 32; 12:20]'
  - type: text
    content: the tribe of Judah only.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 3:8 ]'
  - type: text
    content: 'Judah also did not keep the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, but walked in the customs that Israel had introduced. '
  '2':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', yet not as the kings of Israel who were before him. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' rejected all the descendants of Israel and afflicted them '
  - type: note
    content: Judg. 2:14; [ch. 13:3; 15:29]
  - type: text
    content: and gave them into the hand of plunderers, until he had cast them out of his sight.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 11:11, 31
  - type: text
    content: 'When he had torn Israel from the house of David, '
  - type: note
    content: 1 Kgs. 12:20
  - type: text
    content: 'they made Jeroboam the son of Nebat king. And Jeroboam drove Israel from following the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'and made them commit great sin. '
  '22':
  - type: text
    content: 'The people of Israel walked in all the sins that Jeroboam did. They did not depart from them, '
  '23':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' removed Israel out of his sight, '
  - type: note
    content: ver. 13
  - type: text
    content: 'as he had spoken by all his servants the prophets. '
  - type: note
    content: ver. 6
  - type: text
    content: So Israel was exiled from their own land to Assyria until this day.
  - type: heading
    content: Assyria Resettles Samaria
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ezra 4:2, 10
  - type: text
    content: 'And the king of Assyria brought people from '
  - type: note
    content: ver. 30
  - type: text
    content: 'Babylon, Cuthah, '
  - type: note
    content: '[ch. 18:34]'
  - type: text
    content: 'Avva, '
  - type: note
    content: See 1 Kgs. 8:65
  - type: text
    content: 'Hamath, and '
  - type: note
    content: ver. 31; ch. 18:34; 19:13
  - type: text
    content: 'Sepharvaim, and placed them in the cities of Samaria instead of the people of Israel. And they took possession of Samaria and lived in its cities. '
  '25':
  - type: text
    content: 'And at the beginning of their dwelling there, they did not fear the '
  - type: text
    content: Lord
  - type: text
    content: '. Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' sent lions among them, which killed some of them. '
  '26':
  - type: text
    content: 'So the king of Assyria was told, “The nations that you have carried away and placed in the cities of Samaria do not know the law of the god of the land. Therefore he has sent lions among them, and behold, they are killing them, because they do not know the law of the god of the land.” '
  '27':
  - type: text
    content: Then the king of Assyria commanded, “Send there one of the priests whom you carried away from there, and let him
  - type: note
    content: Syriac, Vulgate; Hebrew them
  - type: text
    content: ' go and dwell there and teach them the law of the god of the land.” '
  '28':
  - type: text
    content: 'So one of the priests whom they had carried away from Samaria came and lived in '
  - type: note
    content: 1 Kgs. 12:29
  - type: text
    content: 'Bethel and taught them how they should fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: 'But every nation still made gods of its own and put them '
  - type: note
    content: 1 Kgs. 12:31; 13:32
  - type: text
    content: 'in the shrines of the high places that the Samaritans had made, every nation in the cities in which they lived. '
  '3':
  - type: note
    content: For ver. 3-7, see ch. 18:9-12
  - type: text
    content: 'Against him came up '
  - type: note
    content: '[Hos. 10:14]'
  - type: text
    content: 'Shalmaneser king of Assyria. And Hoshea became his vassal and paid him tribute. '
  '30':
  - type: text
    content: 'The men of '
  - type: note
    content: ver. 24
  - type: text
    content: 'Babylon made Succoth-benoth, the men of Cuth made Nergal, the men of Hamath made Ashima, '
  '31':
  - type: text
    content: 'and the Avvites made Nibhaz and Tartak; and the Sepharvites '
  - type: note
    content: See ver. 17
  - type: text
    content: 'burned their children in the fire to '
  - type: note
    content: '[ch. 19:37]'
  - type: text
    content: 'Adrammelech and Anammelech, the gods of '
  - type: note
    content: ver. 24
  - type: text
    content: 'Sepharvaim. '
  '32':
  - type: note
    content: '[Zeph. 1:5]'
  - type: text
    content: 'They also feared the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See 1 Kgs. 12:31
  - type: text
    content: 'and appointed from among themselves all sorts of people as priests of the high places, who sacrificed for them in the shrines of '
  - type: note
    content: ver. 29
  - type: text
    content: 'the high places. '
  '33':
  - type: text
    content: 'So they feared the '
  - type: text
    content: Lord
  - type: text
    content: ' but also served their own gods, after the manner of the nations from among whom they had been carried away.'
  '34':
  - type: text
    content: 'To this day they do according to the former manner. They do not fear the '
  - type: text
    content: Lord
  - type: text
    content: ', and they do not follow the statutes or the rules or the law or the commandment that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded the children of Jacob, '
  - type: note
    content: Gen. 32:28; 35:10; 1 Kgs. 18:31
  - type: text
    content: 'whom he named Israel. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with them and commanded them, '
  - type: note
    content: Judg. 6:10
  - type: text
    content: '“You shall not fear other gods '
  - type: note
    content: See Ex. 20:5
  - type: text
    content: 'or bow yourselves to them or serve them or sacrifice to them, '
  '36':
  - type: text
    content: 'but '
  - type: note
    content: Deut. 6:13
  - type: text
    content: 'you shall fear the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 7
  - type: text
    content: 'who brought you out of the land of Egypt with great power and '
  - type: note
    content: Ex. 6:6; Deut. 4:34
  - type: text
    content: 'with an outstretched arm. You shall bow yourselves to him, and to him you shall sacrifice. '
  '37':
  - type: text
    content: 'And the statutes and the rules and the law and the commandment that he wrote for you, '
  - type: note
    content: Deut. 5:32
  - type: text
    content: 'you shall always be careful to do. '
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: 'You shall not fear other gods, '
  '38':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 4:23
  - type: text
    content: 'you shall not forget the covenant that I have made with you. '
  - type: note
    content: '[See ver. 35 above]'
  - type: text
    content: 'You shall not fear other gods, '
  '39':
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'you shall fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and he will deliver you out of the hand of all your enemies.” '
  '4':
  - type: text
    content: 'But the king of Assyria found treachery in Hoshea, for he had sent messengers to So, king of Egypt, and offered no tribute to the king of Assyria, as he had done year by year. Therefore the king of Assyria shut him up and bound him in prison. '
  '40':
  - type: text
    content: However, they would not listen, but they did according to their former manner.
  '41':
  - type: text
    content: ' '
  - type: note
    content: '[ Zeph. 1:5 ]'
  - type: text
    content: 'So these nations feared the '
  - type: text
    content: Lord
  - type: text
    content: ' and also served their carved images. Their children did likewise, and their children’s children—as their fathers did, so they do to this day.'
  '5':
  - type: text
    content: Then the king of Assyria invaded all the land and came to Samaria, and for three years he besieged it.
  - type: heading
    content: The Fall of Israel
  '6':
  - type: text
    content: 'In the ninth year of Hoshea, the king of Assyria '
  - type: note
    content: '[Hos. 13:16]'
  - type: text
    content: 'captured Samaria, '
  - type: note
    content: '[Lev. 26:32, 33; Deut. 28:36, 64; 29:27, 28]'
  - type: text
    content: 'and he carried the Israelites away to Assyria '
  - type: note
    content: ch. 18:11; [1 Chr. 5:26]
  - type: text
    content: 'and placed them in Halah, and on the Habor, the river of '
  - type: note
    content: Isa. 37:12
  - type: text
    content: 'Gozan, and in the cities of '
  - type: note
    content: Ezra 6:2; Isa. 13:17; 21:2; Jer. 51:11, 28
  - type: text
    content: the Medes.
  - type: heading
    content: Exile Because of Idolatry
  '7':
  - type: text
    content: 'And this occurred because the people of Israel had sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, '
  - type: note
    content: ver. 36; Lev. 25:38; See Ex. 20:2
  - type: text
    content: 'who had brought them up out of the land of Egypt from under the hand of Pharaoh king of Egypt, and had feared other gods '
  '8':
  - type: note
    content: Lev. 18:3; Deut. 18:9
  - type: text
    content: 'and walked in the customs of the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel, '
  - type: note
    content: ver. 19; ch. 16:3
  - type: text
    content: 'and in the customs that the kings of Israel had practiced. '
  '9':
  - type: text
    content: 'And the people of Israel did secretly against the '
  - type: text
    content: Lord
  - type: text
    content: ' their God things that were not right. They built for themselves high places in all their towns, '
  - type: note
    content: ch. 18:8
  - type: text
    content: 'from watchtower to fortified city. '
