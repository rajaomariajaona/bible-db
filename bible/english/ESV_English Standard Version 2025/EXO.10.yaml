document_id: EXO.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Eighth Plague: Locusts'
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go in to Pharaoh, for I have hardened his heart and the heart of his servants, that I may show these signs of mine among them, '
  '10':
  - type: text
    content: 'But he said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' be with you, if ever I let you and your '
  - type: note
    content: ver. 24
  - type: text
    content: little ones go! Look, you have some evil purpose in mind.
  - type: note
    content: Hebrew before your face
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'No! Go, the men among you, and serve the '
  - type: text
    content: Lord
  - type: text
    content: ', for that is what you are asking.” And they were driven out from Pharaoh’s presence.'
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: See ch. 7:19
  - type: text
    content: '“Stretch out your hand over the land of Egypt for the locusts, so that they may come upon the land of Egypt and '
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'eat every plant in the land, all that the hail has left.” '
  '13':
  - type: text
    content: 'So Moses stretched out his staff over the land of Egypt, and the '
  - type: text
    content: Lord
  - type: text
    content: ' brought an east wind upon the land all that day and all that night. When it was morning, the east wind had brought the locusts. '
  '14':
  - type: note
    content: Ps. 78:46; 105:34
  - type: text
    content: 'The locusts came up over all the land of Egypt and settled on the whole country of Egypt, '
  - type: note
    content: Joel 2:2
  - type: text
    content: 'such a dense swarm of locusts as had never been before, nor ever will be again. '
  '15':
  - type: text
    content: 'They covered the face of the whole land, so that the land was darkened, and '
  - type: note
    content: Ps. 105:35
  - type: text
    content: 'they ate all the plants in the land and all the fruit of the trees that the hail had left. Not a green thing remained, neither tree nor plant of the field, through all the land of Egypt. '
  '16':
  - type: text
    content: 'Then Pharaoh hastily called Moses and Aaron and said, '
  - type: note
    content: ch. 9:27
  - type: text
    content: '“I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and against you. '
  '17':
  - type: text
    content: 'Now therefore, forgive my sin, please, only this once, and '
  - type: note
    content: See ch. 8:8
  - type: text
    content: 'plead with the '
  - type: text
    content: Lord
  - type: text
    content: ' your God only to remove this death from me.” '
  '18':
  - type: text
    content: 'So '
  - type: note
    content: ch. 8:30; 9:33
  - type: text
    content: 'he went out from Pharaoh and pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' turned the wind into a very strong west wind, which lifted the locusts and drove them '
  - type: note
    content: '[Joel 2:20]'
  - type: text
    content: 'into the Red Sea. Not a single locust was left in all the country of Egypt. '
  '2':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 13:8, 14; Deut. 4:9; 6:20-22; Ps. 78:5-7; Joel 1:3]'
  - type: text
    content: 'that you may tell in the hearing of your son and of your grandson how I have dealt harshly with the Egyptians and what signs I have done among them, '
  - type: note
    content: ch. 7:17
  - type: text
    content: 'that you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '20':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 4:21
  - type: text
    content: hardened Pharaoh’s heart, and he did not let the people of Israel go.
  - type: heading
    content: 'The Ninth Plague: Darkness'
  '21':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ver. 12
  - type: text
    content: '“Stretch out your hand toward heaven, that there may be '
  - type: note
    content: Ps. 105:28
  - type: text
    content: 'darkness over the land of Egypt, a darkness to be felt.” '
  '22':
  - type: text
    content: 'So Moses stretched out his hand toward heaven, and there was pitch darkness in all the land of Egypt three days. '
  '23':
  - type: text
    content: 'They did not see one another, nor did anyone rise from his place for three days, but '
  - type: note
    content: '[ch. 8:22; 9:4, 6]'
  - type: text
    content: 'all the people of Israel had light where they lived. '
  '24':
  - type: text
    content: 'Then Pharaoh called Moses and said, '
  - type: note
    content: ver. 8
  - type: text
    content: '“Go, serve the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: ver. 10
  - type: text
    content: 'your little ones also may go with you; only let your flocks and your herds remain behind.” '
  '25':
  - type: text
    content: 'But Moses said, “You must also let us have sacrifices and burnt offerings, that we may sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '26':
  - type: text
    content: 'Our livestock also must go with us; not a hoof shall be left behind, for we must take of them to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, and we do not know with what we must serve the '
  - type: text
    content: Lord
  - type: text
    content: ' until we arrive there.” '
  '27':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 20
  - type: text
    content: 'hardened Pharaoh’s heart, and he would not let them go. '
  '28':
  - type: text
    content: 'Then Pharaoh said to him, “Get away from me; take care never to see my face again, for on the day you see my face you shall die.” '
  '29':
  - type: text
    content: 'Moses said, “As you say! '
  - type: note
    content: '[Heb. 11:27]'
  - type: text
    content: I will not see your face again.”
  '3':
  - type: text
    content: 'So Moses and Aaron went in to Pharaoh and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, ‘How long will you refuse to '
  - type: note
    content: 1 Kgs. 21:29
  - type: text
    content: 'humble yourself before me? Let my people go, that they may serve me. '
  '4':
  - type: text
    content: 'For if you refuse to let my people go, behold, tomorrow I will bring '
  - type: note
    content: Lev. 11:22; Prov. 30:27; Joel 1:4; 2:25; Rev. 9:3
  - type: text
    content: 'locusts into your country, '
  '5':
  - type: text
    content: 'and they shall cover the face of the land, so that no one can see the land. And they shall '
  - type: note
    content: ch. 9:32
  - type: text
    content: 'eat what is left to you after the hail, and they shall eat every tree of yours that grows in the field, '
  '6':
  - type: text
    content: 'and they shall fill '
  - type: note
    content: '[ch. 8:3, 21; Joel 2:9]'
  - type: text
    content: your houses and the houses of all your servants and of all the Egyptians, as neither your fathers nor your grandfathers have seen, from the day they came on earth to this day.’” Then he turned and went out from Pharaoh.
  '7':
  - type: text
    content: 'Then Pharaoh’s servants said to him, “How long shall this man be a snare to us? Let the men go, that they may serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. Do you not yet understand that Egypt is ruined?” '
  '8':
  - type: text
    content: 'So Moses and Aaron were brought back to Pharaoh. And he said to them, '
  - type: note
    content: ver. 24
  - type: text
    content: '“Go, serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. But which ones are to go?” '
  '9':
  - type: text
    content: 'Moses said, “We will go with our young and our old. We will go with our sons and daughters and with our flocks and herds, for '
  - type: note
    content: ch. 5:1; [ch. 3:18]
  - type: text
    content: 'we must hold a feast to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
