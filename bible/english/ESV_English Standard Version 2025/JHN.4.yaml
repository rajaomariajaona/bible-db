document_id: JHN.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and the Woman of Samaria
  - type: text
    content: 'Now when Jesus learned that the Pharisees had heard that Jesus was making and '
  - type: note
    content: ch. 3:22, 26
  - type: text
    content: 'baptizing more disciples than John '
  '10':
  - type: text
    content: 'Jesus answered her, '
  - type: text
    content: '“If you knew the gift of God, and who it is that is saying to you, ‘Give me a drink,’ you would have asked him, and he would have given you '
  - type: note
    content: ch. 7:38; Jer. 2:13; 17:13
  - type: text
    content: living water.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The woman said to him, “Sir, you have nothing to draw water with, and the well is deep. Where do you get that living water? '
  '12':
  - type: note
    content: '[ch. 8:53]'
  - type: text
    content: 'Are you greater than our father Jacob? '
  - type: note
    content: ver. 5
  - type: text
    content: 'He gave us the well and drank from it himself, as did his sons and his livestock.” '
  '13':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Everyone who drinks of this water will be thirsty again,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 6:35, 51, 58; 7:37]'
  - type: text
    content: 'whoever drinks of the water that I will give him '
  - type: note
    content: '[Isa. 49:10; Rev. 7:16]'
  - type: text
    content: will never be thirsty again.
  - type: note
    content: Greek forever
  - type: text
    content: ' '
  - type: text
    content: 'The water that I will give him will become '
  - type: note
    content: ch. 7:38
  - type: text
    content: in him a spring of water welling up to eternal life.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The woman said to him, “Sir, '
  - type: note
    content: '[ch. 6:34]'
  - type: text
    content: give me this water, so that I will not be thirsty or have to come here to draw water.”
  '16':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“Go, '
  - type: note
    content: ch. 16:8
  - type: text
    content: call your husband, and come here.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'The woman answered him, “I have no husband.” Jesus said to her, '
  - type: text
    content: “You are right in saying, ‘I have no husband’;
  - type: text
    content: ' '
  '18':
  - type: text
    content: for you have had five husbands, and the one you now have is not your husband. What you have said is true.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'The woman said to him, “Sir, I perceive that '
  - type: note
    content: ch. 9:17; [ch. 6:14]
  - type: text
    content: 'you are '
  - type: note
    content: Luke 7:16, 39; See Matt. 21:11
  - type: text
    content: 'a prophet. '
  '2':
  - type: text
    content: '(although Jesus himself did not baptize, but only his disciples), '
  '20':
  - type: note
    content: Gen. 12:6, 7; 33:18, 20; Deut. 11:29; 27:12; Josh. 8:33
  - type: text
    content: 'Our fathers worshiped on '
  - type: note
    content: Judg. 9:7
  - type: text
    content: 'this mountain, but you say that '
  - type: note
    content: See Deut. 12:5
  - type: text
    content: 'in Jerusalem is '
  - type: note
    content: '[ch. 11:48]'
  - type: text
    content: 'the place where people ought to worship.” '
  '21':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: ch. 2:4
  - type: text
    content: '“Woman, believe me, '
  - type: note
    content: ver. 23; ch. 5:25, 28; 16:2, 25, 32
  - type: text
    content: 'the hour is coming when '
  - type: note
    content: Zeph. 2:11; Mal. 1:11; 1 Tim. 2:8
  - type: text
    content: neither on this mountain nor in Jerusalem will you worship the Father.
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[2 Kgs. 17:28-34; Acts 17:23]'
  - type: text
    content: 'You worship what you do not know; '
  - type: note
    content: Ps. 147:19, 20; Isa. 2:3; Rom. 3:1, 2; 9:4, 5
  - type: text
    content: 'we worship what we know, for '
  - type: note
    content: Ps. 147:19, 20; Isa. 2:3; Rom. 3:1, 2; 9:4, 5
  - type: text
    content: 'salvation is '
  - type: note
    content: Matt. 2:4, 5; Acts 13:23; Rom. 11:26
  - type: text
    content: from the Jews.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ver. 21
  - type: text
    content: 'the hour is coming, and is now here, when the true worshipers will worship the Father '
  - type: note
    content: '[Rom. 8:15; Eph. 2:18; 6:18; Phil. 3:3]'
  - type: text
    content: 'in spirit and '
  - type: note
    content: Ps. 145:18; [ch. 1:17]
  - type: text
    content: 'truth, for the Father '
  - type: note
    content: '[ch. 6:44]'
  - type: text
    content: is seeking such people to worship him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: God is spirit, and those who worship him must worship in spirit and truth.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The woman said to him, “I know that '
  - type: note
    content: See ch. 1:41
  - type: text
    content: 'Messiah is coming (he who is called Christ). When he comes, '
  - type: note
    content: Deut. 18:18; [ver. 29]
  - type: text
    content: 'he will tell us all things.” '
  '26':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: ch. 9:35-37
  - type: text
    content: “I who speak to you am he.”
  '27':
  - type: text
    content: 'Just then '
  - type: note
    content: ver. 8
  - type: text
    content: 'his disciples came back. They marveled that he was talking with a woman, but no one said, “What do you seek?” or, “Why are you talking with her?” '
  '28':
  - type: text
    content: 'So the woman left her water jar and went away into town and said to the people, '
  '29':
  - type: text
    content: '“Come, see a man '
  - type: note
    content: ver. 17, 18; [ver. 25]
  - type: text
    content: 'who told me all that I ever did. Can this be the Christ?” '
  '3':
  - type: text
    content: 'he left Judea and departed '
  - type: note
    content: ch. 2:11, 12
  - type: text
    content: 'again for Galilee. '
  '30':
  - type: text
    content: They went out of the town and were coming to him.
  '31':
  - type: text
    content: 'Meanwhile the disciples were urging him, saying, '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabbi, eat.” '
  '32':
  - type: text
    content: 'But he said to them, '
  - type: text
    content: “I have food to eat that you do not know about.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'So the disciples said to one another, '
  - type: note
    content: '[ver. 11, 15; ch. 3:4; 6:34, 52]'
  - type: text
    content: '“Has anyone brought him something to eat?” '
  '34':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: '[Job 23:12]'
  - type: text
    content: '“My food is '
  - type: note
    content: ch. 5:30; 6:38; 14:31
  - type: text
    content: 'to do the will of him who sent me and '
  - type: note
    content: ch. 5:36; 17:4
  - type: text
    content: to accomplish his work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Do you not say, ‘There are yet four months, then comes the harvest’? Look, I tell you, lift up your eyes, and see that '
  - type: note
    content: Matt. 9:37; Luke 10:2; [ver. 25, 30]
  - type: text
    content: the fields are white for harvest.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Already the one who reaps is receiving wages and gathering fruit for eternal life, so that '
  - type: note
    content: '[Matt. 13:37; Mark 4:14]'
  - type: text
    content: 'sower and '
  - type: note
    content: ver. 38
  - type: text
    content: 'reaper '
  - type: note
    content: Isa. 9:3; [Amos 9:13]
  - type: text
    content: may rejoice together.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For here the saying holds true, '
  - type: note
    content: '[Job 31:8]'
  - type: text
    content: ‘One sows and another reaps.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'I sent you to reap '
  - type: note
    content: Josh. 24:13
  - type: text
    content: 'that for which you did not labor. Others have labored, '
  - type: note
    content: '[Acts 8:5-17, 25]'
  - type: text
    content: and you have entered into their labor.”
  '39':
  - type: text
    content: 'Many Samaritans '
  - type: note
    content: ver. 5, 8
  - type: text
    content: 'from that town believed in him '
  - type: note
    content: '[ch. 17:20]'
  - type: text
    content: 'because of '
  - type: note
    content: ver. 29
  - type: text
    content: 'the woman’s testimony, “He told me all that I ever did.” '
  '4':
  - type: note
    content: '[Luke 13:33]'
  - type: text
    content: 'And he had to pass through Samaria. '
  '40':
  - type: text
    content: 'So when the Samaritans came to him, they asked him to stay with them, and he stayed there two days. '
  '41':
  - type: text
    content: 'And many more believed '
  - type: note
    content: ch. 8:30
  - type: text
    content: 'because of his word. '
  '42':
  - type: text
    content: 'They said to the woman, “It is no longer because of what you said that we believe, for we have heard for ourselves, '
  - type: note
    content: '[1 John 5:20]'
  - type: text
    content: 'and we know that this is indeed '
  - type: note
    content: 1 John 4:14; [ch. 3:17; 12:47; 1 Tim. 4:10]
  - type: text
    content: 'the Savior '
  - type: note
    content: See ch. 1:29
  - type: text
    content: of the world.”
  '43':
  - type: text
    content: 'After '
  - type: note
    content: ver. 40
  - type: text
    content: 'the two days he departed for Galilee. '
  '44':
  - type: text
    content: '(For Jesus himself had testified '
  - type: note
    content: See Matt. 13:57
  - type: text
    content: 'that a prophet has no honor in his own hometown.) '
  '45':
  - type: text
    content: 'So when he came to Galilee, the Galileans welcomed him, '
  - type: note
    content: ch. 2:23; 3:2
  - type: text
    content: 'having seen all that he had done in Jerusalem at the feast. For '
  - type: note
    content: ver. 20
  - type: text
    content: they too had gone to the feast.
  - type: heading
    content: Jesus Heals an Official’s Son
  '46':
  - type: text
    content: 'So he came again to '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'Cana in Galilee, '
  - type: note
    content: ch. 2:9
  - type: text
    content: 'where he had made the water wine. And at Capernaum there was an official whose son was ill. '
  '47':
  - type: text
    content: 'When this man heard that Jesus '
  - type: note
    content: ver. 3, 54
  - type: text
    content: 'had come from Judea to Galilee, he went to him and asked him to come down and heal his son, for he was at the point of death. '
  '48':
  - type: text
    content: 'So Jesus said to him, '
  - type: note
    content: ch. 2:18; 6:30; [ch. 20:29]
  - type: text
    content: “Unless you
  - type: note
    content: The Greek for you is plural; twice in this verse
  - type: text
    content: ' '
  - type: text
    content: see signs and wonders you will not believe.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'The official said to him, “Sir, come down '
  - type: note
    content: '[ch. 11:21, 32; Mark 5:35; Luke 8:49]'
  - type: text
    content: 'before my child dies.” '
  '5':
  - type: text
    content: 'So he came to a town of Samaria called Sychar, near the field '
  - type: note
    content: ver. 12; Gen. 33:19; 48:22; Josh. 24:32
  - type: text
    content: 'that Jacob had given to his son Joseph. '
  '50':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Go; your son will live.”
  - type: text
    content: ' The man believed the word that Jesus spoke to him and went on his way. '
  '51':
  - type: text
    content: As he was going down, his servants
  - type: note
    content: Or bondservants
  - type: text
    content: ' met him and told him that his son was recovering. '
  '52':
  - type: text
    content: So he asked them the hour when he began to get better, and they said to him, “Yesterday at the seventh hour
  - type: note
    content: That is, at 1 p.m.
  - type: text
    content: ' the fever left him.” '
  '53':
  - type: text
    content: 'The father knew that was the hour when Jesus had said to him, '
  - type: text
    content: “Your son will live.”
  - type: text
    content: ' And he himself believed, '
  - type: note
    content: Acts 16:34; 18:8; See Acts 11:14
  - type: text
    content: 'and all his household. '
  '54':
  - type: note
    content: '[ch. 2:11 with ver. 45, 46]'
  - type: text
    content: This was now the second sign that Jesus did when he had come from Judea to Galilee.
  '6':
  - type: text
    content: 'Jacob’s well was there; so Jesus, '
  - type: note
    content: ch. 19:28; [Matt. 4:2; 8:24; 21:18]
  - type: text
    content: wearied as he was from his journey, was sitting beside the well. It was about the sixth hour.
  - type: note
    content: That is, about noon
  '7':
  - type: text
    content: 'A woman from Samaria came to draw water. Jesus said to her, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: “Give me a drink.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: '(For his disciples had gone away into the city to buy food.) '
  '9':
  - type: text
    content: The Samaritan woman said to him, “How is it that you, a Jew, ask for a drink from me, a woman of Samaria?” (
  - type: note
    content: Luke 9:53; [ch. 8:48; Ezra 4:3, 10]; See Matt. 10:5
  - type: text
    content: 'For Jews have no dealings with Samaritans.) '
