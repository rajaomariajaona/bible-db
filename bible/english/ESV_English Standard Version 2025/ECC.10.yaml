document_id: ECC.10,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Dead flies make '
  - type: note
    content: Ex. 30:25
  - type: text
    content: the perfumer’s ointment give off a stench;
  - type: text
    content: so a little folly outweighs wisdom and honor.
  '10':
  - type: text
    content: If the iron is blunt, and one does not sharpen the edge,
  - type: text
    content: he must use more strength,
  - type: text
    content: but wisdom helps one to succeed.
  - type: note
    content: Or wisdom is an advantage for success
  '11':
  - type: text
    content: 'If the serpent bites before it is '
  - type: note
    content: '[Jer. 8:17]'
  - type: text
    content: charmed,
  - type: text
    content: there is no advantage to the charmer.
  '12':
  - type: text
    content: 'The words of a wise man’s mouth '
  - type: note
    content: Prov. 10:32; 22:11; [Luke 4:22]
  - type: text
    content: win him favor,
  - type: note
    content: Or are gracious
  - type: text
    content: 'but '
  - type: note
    content: See Prov. 18:7
  - type: text
    content: the lips of a fool consume him.
  '13':
  - type: text
    content: The beginning of the words of his mouth is foolishness,
  - type: text
    content: and the end of his talk is evil madness.
  '14':
  - type: text
    content: ' '
  - type: note
    content: See Prov. 15:2
  - type: text
    content: A fool multiplies words,
  - type: text
    content: though no man knows what is to be,
  - type: text
    content: 'and who can tell him '
  - type: note
    content: See ch. 3:22
  - type: text
    content: what will be after him?
  '15':
  - type: text
    content: The toil of a fool wearies him,
  - type: text
    content: 'for he does not know '
  - type: note
    content: '[Isa. 35:8]'
  - type: text
    content: the way to the city.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Isa. 3:4, 12; [ 2 Chr. 13:7 ]
  - type: text
    content: Woe to you, O land, when your king is a child,
  - type: text
    content: and your princes feast in the morning!
  '17':
  - type: text
    content: Happy are you, O land, when your king is the son of the nobility,
  - type: text
    content: and your princes feast at the proper time,
  - type: text
    content: 'for strength, and not for '
  - type: note
    content: '[Prov. 31:4; Isa. 5:11]'
  - type: text
    content: drunkenness!
  '18':
  - type: text
    content: Through sloth the roof sinks in,
  - type: text
    content: and through indolence the house leaks.
  '19':
  - type: text
    content: Bread is made for laughter,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 104:15
  - type: text
    content: wine gladdens life,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 7:12]'
  - type: text
    content: money answers everything.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:14 ]'
  - type: text
    content: A wise man’s heart inclines him to the right,
  - type: text
    content: but a fool’s heart to the left.
  '20':
  - type: text
    content: 'Even in your thoughts, '
  - type: note
    content: Ex. 22:28
  - type: text
    content: do not curse the king,
  - type: text
    content: 'nor in your '
  - type: note
    content: See 2 Kgs. 6:12; Luke 12:3
  - type: text
    content: bedroom curse the rich,
  - type: text
    content: for a bird of the air will carry your voice,
  - type: text
    content: or some winged creature tell the matter.
  '3':
  - type: text
    content: Even when the fool walks on the road, he lacks sense,
  - type: text
    content: 'and he '
  - type: note
    content: '[Prov. 13:16; 18:2]'
  - type: text
    content: says to everyone that he is a fool.
  '4':
  - type: text
    content: 'If the anger of the ruler rises against you, '
  - type: note
    content: '[ch. 8:3]'
  - type: text
    content: do not leave your place,
  - type: note
    content: '[ 1 Sam. 25:24, 32, 33 ]; See Prov. 25:15'
  - type: text
    content: for calmness
  - type: note
    content: Hebrew healing
  - type: text
    content: ' will lay great offenses to rest.'
  '5':
  - type: text
    content: 'There is an evil that I have seen under the sun, as it were '
  - type: note
    content: ch. 5:6
  - type: text
    content: 'an error proceeding from the ruler: '
  '6':
  - type: note
    content: '[Esth. 3:1; Prov. 28:12; 29:2]'
  - type: text
    content: 'folly is set in many high places, and the rich sit in a low place. '
  '7':
  - type: note
    content: Prov. 19:10; [Prov. 30:22]
  - type: text
    content: 'I have seen slaves '
  - type: note
    content: '[Esth. 6:8]'
  - type: text
    content: on horses, and princes walking on the ground like slaves.
  '8':
  - type: text
    content: 'He who '
  - type: note
    content: See Ps. 7:15
  - type: text
    content: digs a pit will fall into it,
  - type: text
    content: 'and '
  - type: note
    content: Amos 5:19
  - type: text
    content: a serpent will bite him who breaks through a wall.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Chr. 22:2 ]'
  - type: text
    content: He who quarries stones is hurt by them,
  - type: text
    content: 'and he who '
  - type: note
    content: '[Deut. 19:5]'
  - type: text
    content: splits logs is endangered by them.
