document_id: MAT.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Transfiguration
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see Mark 9:2-8; Luke 9:28-36
  - type: text
    content: 'And after six days Jesus took with him '
  - type: note
    content: ch. 26:37; Mark 5:37
  - type: text
    content: 'Peter and James, and John his brother, and led them up a high mountain by themselves. '
  '10':
  - type: text
    content: 'And the disciples asked him, “Then why do the scribes say '
  - type: note
    content: See ch. 11:14; Mal. 4:5, 6
  - type: text
    content: 'that first Elijah must come?” '
  '11':
  - type: text
    content: 'He answered, '
  - type: text
    content: '“Elijah does come, and '
  - type: note
    content: Luke 1:16, 17; [Acts 1:6; 3:21]
  - type: text
    content: he will restore all things.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But I tell you that Elijah has already come, and they did not recognize him, but '
  - type: note
    content: ch. 14:3, 10
  - type: text
    content: 'did to him whatever they pleased. '
  - type: note
    content: ch. 16:21
  - type: text
    content: So also the Son of Man will certainly suffer at their hands.”
  - type: text
    content: ' '
  '13':
  - type: note
    content: ch. 16:12
  - type: text
    content: Then the disciples understood that he was speaking to them of John the Baptist.
  - type: heading
    content: Jesus Heals a Boy with a Demon
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-19, see Mark 9:14-28; Luke 9:37-42
  - type: text
    content: 'And when they came to the crowd, a man came up to him and, kneeling before him, '
  '15':
  - type: text
    content: 'said, “Lord, have mercy on my son, for he has '
  - type: note
    content: ch. 4:24
  - type: text
    content: 'seizures and he suffers terribly. For often he falls into the fire, and often into the water. '
  '16':
  - type: text
    content: 'And I brought him to your disciples, and '
  - type: note
    content: '[ch. 10:1; Mark 6:7; Luke 10:17]'
  - type: text
    content: 'they could not heal him.” '
  '17':
  - type: text
    content: 'And Jesus answered, '
  - type: text
    content: '“O faithless and '
  - type: note
    content: Phil. 2:15; [John 20:27]
  - type: text
    content: 'twisted generation, how long am I to be with you? '
  - type: note
    content: '[John 14:9]'
  - type: text
    content: How long am I to bear with you? Bring him here to me.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And Jesus '
  - type: note
    content: ch. 8:26; Zech. 3:2; Mark 1:25; Luke 4:35, 39; Jude 9
  - type: text
    content: rebuked the demon,
  - type: note
    content: Greek it
  - type: text
    content: ' and it'
  - type: note
    content: Greek the demon
  - type: text
    content: ' came out of him, and '
  - type: note
    content: See ch. 9:22
  - type: text
    content: the boy was healed instantly.
  - type: note
    content: Greek from that hour
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then the disciples came to Jesus privately and said, “Why could we not cast it out?” '
  '2':
  - type: text
    content: 'And he was '
  - type: note
    content: '[2 Cor. 3:18 (Gk.)]'
  - type: text
    content: 'transfigured before them, and '
  - type: note
    content: Rev. 1:16; 10:1
  - type: text
    content: 'his face shone like the sun, and '
  - type: note
    content: Dan. 7:9; [ch. 28:3; Ps. 104:2]
  - type: text
    content: 'his clothes became white as light. '
  '20':
  - type: text
    content: 'He said to them, '
  - type: note
    content: '[John 11:40]; See ch. 6:30'
  - type: text
    content: '“Because of your little faith. For '
  - type: note
    content: ch. 21:21, 22; Mark 11:23
  - type: text
    content: 'truly, I say to you, '
  - type: note
    content: Luke 17:6; [ch. 13:31]
  - type: text
    content: 'if you have faith like a grain of mustard seed, '
  - type: note
    content: ver. 9; [1 Cor. 13:2]
  - type: text
    content: 'you will say to this mountain, ‘Move from here to there,’ and it will move, and '
  - type: note
    content: Mark 9:23
  - type: text
    content: nothing will be impossible for you.”
  - type: note
    content: 'Some manuscripts insert verse 21: But this kind never comes out except by prayer and fasting'
  - type: heading
    content: Jesus Again Foretells Death, Resurrection
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22, 23, see Mark 9:30-32; Luke 9:43-45; [ch. 16:21-28; 20:17-19 ]
  - type: text
    content: As they were gathering
  - type: note
    content: Some manuscripts remained
  - type: text
    content: ' in Galilee, Jesus said to them, '
  - type: text
    content: “The Son of Man is about to be delivered into the hands of men,
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'and they will kill him, and he will be raised on '
  - type: note
    content: See Mark 8:31
  - type: text
    content: the third day.”
  - type: text
    content: ' And they were greatly distressed.'
  - type: heading
    content: The Temple Tax
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mark 9:33
  - type: text
    content: 'When they came to Capernaum, the collectors of '
  - type: note
    content: Ex. 30:13; 38:26
  - type: text
    content: 'the two-drachma tax went up to Peter and said, “Does your teacher not pay the tax?” '
  '25':
  - type: text
    content: 'He said, “Yes.” And when he came into the house, Jesus spoke to him first, saying, '
  - type: note
    content: ch. 18:12; 21:28
  - type: text
    content: '“What do you think, Simon? From whom do kings of the earth take toll or '
  - type: note
    content: ch. 22:17, 19; Mark 12:14; Rom. 13:7
  - type: text
    content: tax? From their sons or from others?”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And when he said, “From others,” Jesus said to him, '
  - type: text
    content: “Then the sons are free.
  - type: text
    content: ' '
  '27':
  - type: text
    content: However, not to give offense to them, go to the sea and cast a hook and take the first fish that comes up, and when you open its mouth you will find a shekel.
  - type: note
    content: Greek stater, a silver coin worth four drachmas or approximately one shekel
  - type: text
    content: ' '
  - type: text
    content: Take that and give it to them for me and for yourself.”
  '3':
  - type: text
    content: 'And behold, there appeared to them Moses and Elijah, talking with him. '
  '4':
  - type: text
    content: 'And Peter said to Jesus, “Lord, it is good that we are here. If you wish, I will make three tents here, one for you and one for Moses and one for '
  - type: note
    content: '[Mal. 4:5]'
  - type: text
    content: 'Elijah.” '
  '5':
  - type: text
    content: 'He was still speaking when, behold, '
  - type: note
    content: 2 Pet. 1:17; [Ex. 24:15, 16]
  - type: text
    content: 'a bright cloud overshadowed them, and '
  - type: note
    content: 2 Pet. 1:17; [Ex. 24:15, 16]
  - type: text
    content: 'a voice from the cloud said, '
  - type: note
    content: See ch. 3:17
  - type: text
    content: “This is my beloved Son,
  - type: note
    content: Or my Son, my (or the) Beloved
  - type: text
    content: ' with whom I am well pleased; '
  - type: note
    content: Acts 3:22
  - type: text
    content: 'listen to him.” '
  '6':
  - type: text
    content: 'When '
  - type: note
    content: 2 Pet. 1:18
  - type: text
    content: 'the disciples heard this, '
  - type: note
    content: '[Gen. 17:3; Ezek. 1:28; Rev. 1:17]'
  - type: text
    content: 'they fell on their faces and were terrified. '
  '7':
  - type: text
    content: 'But Jesus came and '
  - type: note
    content: Dan. 8:18; 10:10, 18
  - type: text
    content: 'touched them, saying, '
  - type: text
    content: '“Rise, and '
  - type: note
    content: ch. 14:27
  - type: text
    content: have no fear.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: And when they lifted up their eyes, they saw no one but Jesus only.
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-13, see Mark 9:9-13
  - type: text
    content: 'And as they were coming down the mountain, Jesus commanded them, '
  - type: note
    content: See ch. 8:4; 12:16
  - type: text
    content: “Tell no one the vision, until the Son of Man is raised from the dead.”
  - type: text
    content: ' '
