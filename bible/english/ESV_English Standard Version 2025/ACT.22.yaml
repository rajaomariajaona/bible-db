document_id: ACT.22,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:2
  - type: text
    content: “Brothers and fathers, hear the defense that I now make before you.”
  '10':
  - type: text
    content: 'And I said, '
  - type: note
    content: See ch. 16:30
  - type: text
    content: '‘What shall I do, Lord?’ And the Lord said to me, '
  - type: text
    content: ‘Rise, and go into Damascus, and there you will be told all that is appointed for you to do.’
  - type: text
    content: ' '
  '11':
  - type: text
    content: And since I could not see because of the brightness of that light, I was led by the hand by those who were with me, and came into Damascus.
  '12':
  - type: text
    content: '“And '
  - type: note
    content: ch. 9:10
  - type: text
    content: 'one Ananias, a devout man '
  - type: note
    content: ch. 24:14
  - type: text
    content: 'according to the law, '
  - type: note
    content: ch. 10:22
  - type: text
    content: 'well spoken of by all the Jews who lived there, '
  '13':
  - type: note
    content: ch. 9:17
  - type: text
    content: 'came to me, and standing by me said to me, ‘Brother Saul, receive your sight.’ And '
  - type: note
    content: ch. 9:18
  - type: text
    content: 'at that very hour I received my sight and saw him. '
  '14':
  - type: text
    content: 'And he said, '
  - type: note
    content: See ch. 3:13
  - type: text
    content: '‘The God of our fathers '
  - type: note
    content: ch. 9:15; 26:16
  - type: text
    content: 'appointed you to know his will, '
  - type: note
    content: ver. 18; ch. 9:17; 26:16; 1 Cor. 9:1; 15:8; [ver. 15]
  - type: text
    content: 'to see '
  - type: note
    content: See ch. 3:14
  - type: text
    content: 'the Righteous One and '
  - type: note
    content: '[Gal. 1:12]'
  - type: text
    content: 'to hear a voice from his mouth; '
  '15':
  - type: text
    content: 'for '
  - type: note
    content: ch. 23:11
  - type: text
    content: 'you will be a witness for him to everyone of what '
  - type: note
    content: ver. 14; ch. 4:20
  - type: text
    content: 'you have seen and heard. '
  '16':
  - type: text
    content: 'And now why do you wait? '
  - type: note
    content: ch. 9:18
  - type: text
    content: 'Rise and be baptized and '
  - type: note
    content: 1 Cor. 6:11; Heb. 10:22; [Ps. 51:2]; See ch. 2:38
  - type: text
    content: 'wash away your sins, '
  - type: note
    content: See ch. 9:14
  - type: text
    content: calling on his name.’
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:26; 26:20
  - type: text
    content: '“When I had returned to Jerusalem and '
  - type: note
    content: ch. 3:1; Luke 18:10
  - type: text
    content: 'was praying in the temple, I fell into '
  - type: note
    content: ch. 10:10; 11:5; [2 Cor. 12:1-4]
  - type: text
    content: 'a trance '
  '18':
  - type: text
    content: 'and saw him saying to me, '
  - type: note
    content: '[ch. 9:29]'
  - type: text
    content: ‘Make haste and get out of Jerusalem quickly, because they will not accept your testimony about me.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I said, ‘Lord, they themselves know that in one synagogue after another '
  - type: note
    content: ver. 4
  - type: text
    content: 'I imprisoned and '
  - type: note
    content: ch. 26:11; See Matt. 10:17
  - type: text
    content: 'beat those who believed in you. '
  '2':
  - type: text
    content: 'And when they heard that he was addressing them in '
  - type: note
    content: ch. 21:40
  - type: text
    content: the Hebrew language,
  - type: note
    content: Or the Hebrew dialect (probably Aramaic)
  - type: text
    content: ' they became even more quiet. And he said:'
  '20':
  - type: text
    content: 'And when the blood of Stephen '
  - type: note
    content: '[Rev. 2:13]'
  - type: text
    content: 'your witness was being shed, '
  - type: note
    content: ch. 7:58
  - type: text
    content: 'I myself was standing by and '
  - type: note
    content: ch. 8:1; [ch. 26:10]; See Rom. 1:32
  - type: text
    content: 'approving and '
  - type: note
    content: ch. 7:58
  - type: text
    content: 'watching over the garments of those who killed him.’ '
  '21':
  - type: text
    content: 'And he said to me, '
  - type: text
    content: '‘Go, for I will send you '
  - type: note
    content: See ch. 2:39; 9:15
  - type: text
    content: far away to the Gentiles.’
  - type: text
    content: ”
  - type: heading
    content: Paul and the Roman Tribune
  '22':
  - type: text
    content: 'Up to this word they listened to him. Then they raised their voices and said, '
  - type: note
    content: See ch. 21:36
  - type: text
    content: '“Away with such a fellow from the earth! For '
  - type: note
    content: ch. 25:24
  - type: text
    content: 'he should not be allowed to live.” '
  '23':
  - type: text
    content: 'And as they were shouting and throwing off their cloaks and flinging dust into the air, '
  '24':
  - type: text
    content: 'the tribune ordered him to be brought into '
  - type: note
    content: ch. 21:34; 23:10
  - type: text
    content: 'the barracks, saying that he should be '
  - type: note
    content: ver. 29
  - type: text
    content: 'examined by flogging, to find out why they were shouting against him like this. '
  '25':
  - type: text
    content: But when they had stretched him out for the whips,
  - type: note
    content: Or when they had tied him up with leather strips
  - type: text
    content: ' Paul said to the centurion who was standing by, “Is it lawful for you to flog '
  - type: note
    content: ch. 16:37
  - type: text
    content: 'a man who is a Roman citizen and uncondemned?” '
  '26':
  - type: text
    content: 'When the centurion heard this, he went to the tribune and said to him, “What are you about to do? For this man is a Roman citizen.” '
  '27':
  - type: text
    content: 'So the tribune came and said to him, “Tell me, are you a Roman citizen?” And he said, “Yes.” '
  '28':
  - type: text
    content: 'The tribune answered, “I bought this citizenship for a large sum.” Paul said, “But I am a citizen by birth.” '
  '29':
  - type: text
    content: 'So those who were about '
  - type: note
    content: ver. 24
  - type: text
    content: 'to examine him withdrew from him immediately, and the tribune also '
  - type: note
    content: ch. 16:38
  - type: text
    content: 'was afraid, '
  - type: note
    content: '[ch. 23:27]'
  - type: text
    content: 'for he realized that Paul was a Roman citizen and that '
  - type: note
    content: ch. 21:33
  - type: text
    content: he had bound him.
  - type: heading
    content: Paul Before the Council
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:11; 21:39; Rom. 11:1; 2 Cor. 11:22; Phil. 3:5
  - type: text
    content: '“I am a Jew, born in Tarsus in Cilicia, but brought up in this city, educated '
  - type: note
    content: Deut. 33:3; 2 Kgs. 4:38; [Luke 10:39]
  - type: text
    content: 'at the feet of '
  - type: note
    content: ch. 5:34
  - type: text
    content: Gamaliel
  - type: note
    content: Or city at the feet of Gamaliel, educated
  - type: text
    content: ' '
  - type: note
    content: ch. 26:5
  - type: text
    content: 'according to the strict manner of the law of our fathers, '
  - type: note
    content: '[John 16:2; Phil. 3:6]; See ch. 21:20'
  - type: text
    content: 'being zealous for God '
  - type: note
    content: Rom. 10:2
  - type: text
    content: 'as all of you are this day. '
  '30':
  - type: text
    content: 'But on the next day, '
  - type: note
    content: ver. 24; ch. 23:28
  - type: text
    content: desiring to know the real reason why he was being accused by the Jews, he unbound him and commanded the chief priests and all the council to meet, and he brought Paul down and set him before them.
  '4':
  - type: note
    content: ver. 19; See ch. 8:3
  - type: text
    content: 'I persecuted '
  - type: note
    content: '[ch. 5:20]; See ch. 9:2'
  - type: text
    content: 'this Way '
  - type: note
    content: ch. 26:10; [ver. 20; ch. 8:1]
  - type: text
    content: 'to the death, binding and delivering to prison both men and women, '
  '5':
  - type: text
    content: 'as '
  - type: note
    content: ch. 9:1
  - type: text
    content: 'the high priest and '
  - type: note
    content: Luke 22:66 (Gk.); 1 Tim. 4:14 (Gk.)
  - type: text
    content: 'the whole council of elders can bear me witness. From them I received letters to '
  - type: note
    content: ch. 28:21
  - type: text
    content: the brothers, and I journeyed toward Damascus to take those also who were there and bring them in bonds to Jerusalem to be punished.
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-11, see ch. 9:3-8; 26:12-18
  - type: text
    content: '“As I was on my way and drew near to Damascus, about noon a great light from heaven suddenly shone around me. '
  '7':
  - type: text
    content: 'And I fell to the ground and heard a voice saying to me, '
  - type: text
    content: ‘Saul, Saul, why are you persecuting me?’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And I answered, ‘Who are you, Lord?’ And he said to me, '
  - type: text
    content: '‘I am '
  - type: note
    content: ch. 26:9
  - type: text
    content: Jesus of Nazareth, whom you are persecuting.’
  - type: text
    content: ' '
  '9':
  - type: note
    content: '[Dan. 10:7]; See ch. 9:7'
  - type: text
    content: Now those who were with me saw the light but did not understand
  - type: note
    content: Or hear with understanding
  - type: text
    content: ' the voice of the one who was speaking to me. '
