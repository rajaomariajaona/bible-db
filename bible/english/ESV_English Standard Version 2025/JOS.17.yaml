document_id: JOS.17,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then allotment was made to the people of Manasseh, for he was '
  - type: note
    content: Gen. 41:51; 46:20; 48:18
  - type: text
    content: 'the firstborn of Joseph. To '
  - type: note
    content: Gen. 50:23; Num. 26:29; 32:39, 40; 1 Chr. 7:14
  - type: text
    content: 'Machir the firstborn of Manasseh, the father of Gilead, '
  - type: note
    content: Deut. 3:13, 15
  - type: text
    content: 'were allotted Gilead and Bashan, because he was a man of war. '
  '10':
  - type: text
    content: 'the land to the south being Ephraim’s and that to the north being Manasseh’s, with the sea forming its boundary. On the north Asher is reached, and on the east Issachar. '
  '11':
  - type: text
    content: 'Also in Issachar and in Asher '
  - type: note
    content: 1 Chr. 7:29; [1 Kgs. 4:11, 12]
  - type: text
    content: 'Manasseh had Beth-shean and its villages, and Ibleam and its villages, and the inhabitants of '
  - type: note
    content: 1 Chr. 7:29; [1 Kgs. 4:11, 12]
  - type: text
    content: 'Dor and its villages, and the inhabitants of En-dor and its villages, and the inhabitants of '
  - type: note
    content: 1 Chr. 7:29; [1 Kgs. 4:11, 12]
  - type: text
    content: 'Taanach and its villages, and the inhabitants of '
  - type: note
    content: 1 Chr. 7:29; [1 Kgs. 4:11, 12]
  - type: text
    content: 'Megiddo and its villages; '
  - type: note
    content: '[ch. 11:2; 12:23]'
  - type: text
    content: the third is Naphath.
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' '
  '12':
  - type: note
    content: Judg. 1:27, 28
  - type: text
    content: 'Yet the people of Manasseh could not take possession of those cities, but the Canaanites persisted in dwelling in that land. '
  '13':
  - type: text
    content: 'Now when the people of Israel grew strong, they put the Canaanites '
  - type: note
    content: ch. 16:10; Gen. 49:15
  - type: text
    content: to forced labor, but did not utterly drive them out.
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 16:4
  - type: text
    content: 'the people of Joseph spoke to Joshua, saying, “Why have you given me but '
  - type: note
    content: '[Gen. 48:22]'
  - type: text
    content: 'one lot and one portion as an inheritance, although I am '
  - type: note
    content: Gen. 48:19; [Num. 26:34, 37]
  - type: text
    content: 'a numerous people, since all along the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed me?” '
  '15':
  - type: text
    content: 'And Joshua said to them, “If you are a numerous people, go up by yourselves to the forest, and there clear ground for yourselves in the land of the Perizzites and '
  - type: note
    content: See ch. 12:4
  - type: text
    content: 'the Rephaim, since '
  - type: note
    content: ch. 24:33; Judg. 3:27
  - type: text
    content: 'the hill country of Ephraim is too narrow for you.” '
  '16':
  - type: text
    content: 'The people of Joseph said, “The hill country is not enough for us. Yet all the Canaanites who dwell in the plain have '
  - type: note
    content: See ch. 11:6
  - type: text
    content: 'chariots of iron, both those in Beth-shean and its villages and those in '
  - type: note
    content: Judg. 6:33
  - type: text
    content: 'the Valley of Jezreel.” '
  '17':
  - type: text
    content: 'Then Joshua said to the house of Joseph, to Ephraim and Manasseh, “You are a numerous people and have great power. You shall not have one allotment only, '
  '18':
  - type: text
    content: 'but the hill country shall be yours, for though it is a forest, you shall clear it and possess it to its farthest borders. For you shall drive out the Canaanites, '
  - type: note
    content: Deut. 20:1; See ch. 11:6
  - type: text
    content: though they have chariots of iron, and though they are strong.”
  '2':
  - type: text
    content: 'And allotments were made '
  - type: note
    content: See Num. 26:29-32
  - type: text
    content: to the rest of the people of Manasseh by their clans, Abiezer, Helek, Asriel, Shechem, Hepher, and Shemida. These were the male descendants of Manasseh the son of Joseph, by their clans.
  '3':
  - type: text
    content: 'Now '
  - type: note
    content: Num. 26:33; 27:1; 36:2, 11
  - type: text
    content: 'Zelophehad the son of Hepher, son of Gilead, son of Machir, son of Manasseh, had no sons, but only daughters, and these are the names of his daughters: '
  - type: note
    content: Num. 26:33; 27:1; 36:2, 11
  - type: text
    content: 'Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '4':
  - type: text
    content: 'They approached '
  - type: note
    content: ch. 14:1; 21:1; Num. 34:17
  - type: text
    content: 'Eleazar the priest and Joshua the son of Nun and the leaders and said, '
  - type: note
    content: Num. 27:6, 7; 36:2
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses to give us an inheritance along with our brothers.” So according to the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' he gave them an inheritance among the brothers of their father. '
  '5':
  - type: text
    content: 'Thus there fell to Manasseh ten portions, besides '
  - type: note
    content: ver. 1; ch. 13:30, 31
  - type: text
    content: 'the land of Gilead and Bashan, which is on the other side of the Jordan, '
  '6':
  - type: text
    content: because the daughters of Manasseh received an inheritance along with his sons. The land of Gilead was allotted to the rest of the people of Manasseh.
  '7':
  - type: text
    content: 'The territory of Manasseh reached from Asher to '
  - type: note
    content: ch. 16:6
  - type: text
    content: 'Michmethath, which is east of Shechem. Then the boundary goes along southward to the inhabitants of En-tappuah. '
  '8':
  - type: text
    content: 'The land of '
  - type: note
    content: ch. 16:8, 9
  - type: text
    content: 'Tappuah belonged to Manasseh, but the town of Tappuah on the boundary of Manasseh belonged to the people of Ephraim. '
  '9':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Then the boundary went down to the brook Kanah. These cities, to the south of the brook, among the cities of Manasseh, belong to Ephraim. Then the boundary of Manasseh goes on the north side of the brook and ends at the sea, '
