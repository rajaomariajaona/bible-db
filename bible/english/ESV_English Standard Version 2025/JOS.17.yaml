    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'but the hill country shall be yours, for though it is a forest, you shall clear it and possess it to its farthest borders. For you shall drive out the Canaanites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 20:1
      - type: text
