document_id: JER.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Figs and the Bad Figs
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 24:12; 2 Chr. 36:10
  - type: text
    content: 'After Nebuchadnezzar king of Babylon had taken into exile from Jerusalem '
  - type: note
    content: Matt. 1:11; [ch. 22:18, 24, 28]
  - type: text
    content: 'Jeconiah the son of Jehoiakim, king of Judah, together with '
  - type: note
    content: ch. 29:2; 2 Kgs. 24:12, 14
  - type: text
    content: 'the officials of Judah, the craftsmen, and the metal workers, and had brought them to Babylon, the '
  - type: text
    content: Lord
  - type: text
    content: ' showed me this vision: behold, '
  - type: note
    content: Amos 8:1, 2
  - type: text
    content: 'two baskets of figs placed before the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And I will send '
  - type: note
    content: See ch. 14:12
  - type: text
    content: sword, famine, and pestilence upon them, until they shall be utterly destroyed from the land that I gave to them and their fathers.”
  '2':
  - type: text
    content: 'One basket had very good figs, '
  - type: note
    content: '[Isa. 28:4]'
  - type: text
    content: 'like first-ripe figs, but the other basket had '
  - type: note
    content: ch. 29:17
  - type: text
    content: 'very bad figs, so bad that they could not be eaten. '
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “What do you see, Jeremiah?” I said, “Figs, the good figs very good, and the bad figs very bad, so bad that they cannot be eaten.”'
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '5':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Like these good figs, so I will regard as good the exiles from Judah, '
  - type: note
    content: ch. 29:20
  - type: text
    content: 'whom I have sent away from this place to the land of the Chaldeans. '
  '6':
  - type: note
    content: '[Amos 9:4]'
  - type: text
    content: 'I will set my eyes on them for good, and I will bring them back to this land. '
  - type: note
    content: ch. 12:15; 29:10
  - type: text
    content: 'I will build them up, and not tear them down; '
  - type: note
    content: ch. 31:28; 42:10; [ch. 1:10; Amos 9:15]
  - type: text
    content: 'I will plant them, and not pluck them up. '
  '7':
  - type: note
    content: ch. 32:39; Deut. 30:6; Ezek. 11:19; 36:26, 27
  - type: text
    content: 'I will give them a heart to know me, that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 30:22; 31:33
  - type: text
    content: 'and they shall be my people '
  - type: note
    content: See ch. 30:22; 31:33
  - type: text
    content: 'and I will be their God, '
  - type: note
    content: ch. 29:13; Joel 2:12, 13
  - type: text
    content: for they shall return to me with their whole heart.
  '8':
  - type: text
    content: '“But thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Like '
  - type: note
    content: ver. 2; ch. 29:17
  - type: text
    content: 'the bad figs that are so bad they cannot be eaten, so will I treat '
  - type: note
    content: ch. 21:1
  - type: text
    content: 'Zedekiah the king of Judah, his officials, the remnant of Jerusalem who remain in this land, and those who '
  - type: note
    content: See ch. 43–44
  - type: text
    content: 'dwell in the land of Egypt. '
  '9':
  - type: text
    content: 'I will make them '
  - type: note
    content: See ch. 15:4
  - type: text
    content: a horror
  - type: note
    content: Compare Septuagint; Hebrew horror for evil
  - type: text
    content: ' to all the kingdoms of the earth, to be '
  - type: note
    content: ch. 29:18; 49:13; Neh. 2:17; Isa. 43:28
  - type: text
    content: 'a reproach, '
  - type: note
    content: Deut. 28:37; 2 Chr. 7:20
  - type: text
    content: 'a byword, '
  - type: note
    content: ch. 29:18; 49:13; Neh. 2:17; Isa. 43:28
  - type: text
    content: 'a taunt, and '
  - type: note
    content: ch. 25:18; 26:6; 29:22; 2 Kgs. 22:19
  - type: text
    content: 'a curse in all the places where I shall drive them. '
