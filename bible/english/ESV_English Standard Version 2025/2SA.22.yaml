document_id: 2SA.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Song of Deliverance
  - type: text
    content: 'And David spoke '
  - type: note
    content: '[Ex. 15:1; Judg. 5:1; 1 Chr. 16:7]'
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ' the words of this song on the day when the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered him from the hand of all his enemies, and from the hand of Saul. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 144:5
  - type: text
    content: 'He bowed the heavens and '
  - type: note
    content: Isa. 64:1
  - type: text
    content: came down;
  - type: note
    content: '[ Ex. 20:21; 1 Kgs. 8:12; Ps. 97:2 ]'
  - type: text
    content: thick darkness was under his feet.
  '11':
  - type: text
    content: He rode on a cherub and flew;
  - type: text
    content: 'he was seen on '
  - type: note
    content: Ps. 104:3
  - type: text
    content: the wings of the wind.
  '12':
  - type: text
    content: 'He made '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'darkness around him '
  - type: note
    content: Job 36:29
  - type: text
    content: his canopy,
  - type: text
    content: thick clouds, a gathering of water.
  '13':
  - type: text
    content: Out of the brightness before him
  - type: note
    content: ver. 9
  - type: text
    content: coals of fire flamed forth.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Job 37:4; Ps. 29:3
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' thundered from heaven,'
  - type: text
    content: and the Most High uttered his voice.
  '15':
  - type: text
    content: 'And he sent out '
  - type: note
    content: Deut. 32:23; Ps. 7:13; 77:17; 144:6; Hab. 3:11
  - type: text
    content: arrows and scattered them;
  - type: text
    content: lightning, and routed them.
  '16':
  - type: text
    content: Then the channels of the sea were seen;
  - type: text
    content: the foundations of the world were laid bare,
  - type: text
    content: 'at the rebuke of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'at the '
  - type: note
    content: Ex. 15:8
  - type: text
    content: blast of the breath of his nostrils.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 144:7
  - type: text
    content: “He sent from on high, he took me;
  - type: text
    content: he drew me out of many waters.
  '18':
  - type: text
    content: He rescued me from my strong enemy,
  - type: text
    content: from those who hated me,
  - type: text
    content: for they were too mighty for me.
  '19':
  - type: text
    content: They confronted me in the day of my calamity,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' was my support.'
  '2':
  - type: note
    content: For ver. 1-51, see Ps. 18:2-50
  - type: text
    content: He said,
  - type: note
    content: Deut. 32:4; Ps. 31:3; 71:3; 91:2; 144:2
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is my rock and my fortress and my deliverer,'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:8; 118:5
  - type: text
    content: He brought me out into a broad place;
  - type: text
    content: 'he rescued me, because '
  - type: note
    content: See ch. 15:26
  - type: text
    content: he delighted in me.
  '21':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 26:23; 1 Kgs. 8:32; Ps. 7:8
  - type: text
    content: dealt with me according to my righteousness;
  - type: text
    content: 'according to the '
  - type: note
    content: '[Ps. 24:4]'
  - type: text
    content: cleanness of my hands he rewarded me.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Gen. 18:19; Prov. 8:32
  - type: text
    content: 'For I have kept the ways of the '
  - type: text
    content: Lord
  - type: text
    content: and have not wickedly departed from my God.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:30, 102
  - type: text
    content: For all his rules were before me,
  - type: text
    content: and from his statutes I did not turn aside.
  '24':
  - type: text
    content: 'I was '
  - type: note
    content: '[Gen. 6:9; 17:1; Job 1:1]'
  - type: text
    content: blameless before him,
  - type: text
    content: and I kept myself from guilt.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' has rewarded me according to my righteousness,'
  - type: text
    content: according to my cleanness in his sight.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 5:7 ]'
  - type: text
    content: “With the merciful you show yourself merciful;
  - type: text
    content: 'with the '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: blameless man you show yourself blameless;
  '27':
  - type: text
    content: with the purified you deal purely,
  - type: text
    content: and with the crooked you make yourself seem tortuous.
  '28':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 72:12, 13 ]'
  - type: text
    content: You save a humble people,
  - type: note
    content: '[ Isa. 2:11, 12, 17; Luke 1:51 ]'
  - type: text
    content: but your eyes are on the haughty to bring them down.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Job 29:3; Ps. 27:1; [ch. 21:17 ]
  - type: text
    content: 'For you are my lamp, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and my God lightens my darkness.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ver. 32, 47
  - type: text
    content: my
  - type: note
    content: Septuagint (compare Psalm 18:2); Hebrew lacks my
  - type: text
    content: ' God, my rock, '
  - type: note
    content: '[Heb. 2:13]'
  - type: text
    content: in whom I take refuge,
  - type: note
    content: ver. 31 ; Gen. 15:1
  - type: text
    content: 'my shield, and '
  - type: note
    content: Luke 1:69
  - type: text
    content: the horn of my salvation,
  - type: note
    content: Ps. 9:9; 59:9, 16, 17; 62:2, 6; [ Prov. 18:10 ]
  - type: text
    content: 'my stronghold and '
  - type: note
    content: Ps. 14:6; 46:7, 11; 71:7; Jer. 16:19
  - type: text
    content: my refuge,
  - type: text
    content: my savior; you save me from violence.
  '30':
  - type: text
    content: For by you I can run against a troop,
  - type: text
    content: and by my God I can leap over a wall.
  '31':
  - type: text
    content: This God—
  - type: note
    content: Deut. 32:4; Matt. 5:48
  - type: text
    content: his way is perfect;
  - type: text
    content: 'the '
  - type: note
    content: Prov. 30:5
  - type: text
    content: 'word of the '
  - type: text
    content: Lord
  - type: text
    content: ' proves true;'
  - type: text
    content: 'he is '
  - type: note
    content: ver. 3; Ps. 5:12; 33:20; 59:11; 84:9
  - type: text
    content: a shield for all those who take refuge in him.
  '32':
  - type: text
    content: '“For who is God, but the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: note
    content: See ver. 2
  - type: text
    content: And who is a rock, except our God?
  '33':
  - type: text
    content: 'This God is my '
  - type: note
    content: ver. 2; Ps. 28:8; 31:3, 4
  - type: text
    content: strong refuge
  - type: text
    content: and has made my
  - type: note
    content: Or his; also verse 34
  - type: text
    content: ' way blameless.'
  - type: note
    content: Compare Psalm 18:32; Hebrew he has blamelessly set my way free, or he has made my way spring up blamelessly
  '34':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:18
  - type: text
    content: He made my feet like the feet of a deer
  - type: text
    content: 'and set me secure '
  - type: note
    content: Deut. 32:13; 33:29; Isa. 58:14
  - type: text
    content: on the heights.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Ps. 144:1
  - type: text
    content: He trains my hands for war,
  - type: text
    content: so that my arms can bend a bow of bronze.
  '36':
  - type: text
    content: You have given me the shield of your salvation,
  - type: text
    content: and your gentleness made me great.
  '37':
  - type: text
    content: ' '
  - type: note
    content: Prov. 4:12
  - type: text
    content: You gave a wide place for my steps under me,
  - type: text
    content: and my feet
  - type: note
    content: Hebrew ankles
  - type: text
    content: ' did not slip;'
  '38':
  - type: text
    content: I pursued my enemies and destroyed them,
  - type: text
    content: and did not turn back until they were consumed.
  '39':
  - type: text
    content: I consumed them; I thrust them through, so that they did not rise;
  - type: text
    content: 'they fell '
  - type: note
    content: '[Mal. 4:3]'
  - type: text
    content: under my feet.
  '4':
  - type: text
    content: 'I call upon the '
  - type: text
    content: Lord
  - type: text
    content: ', who is '
  - type: note
    content: 1 Chr. 16:25; Ps. 48:1; 96:4
  - type: text
    content: worthy to be praised,
  - type: text
    content: and I am saved from my enemies.
  '40':
  - type: text
    content: For you equipped me with strength for the battle;
  - type: text
    content: 'you made '
  - type: note
    content: Ps. 44:5; 59:1
  - type: text
    content: those who rise against me sink under me.
  '41':
  - type: text
    content: 'You '
  - type: note
    content: Ex. 23:27
  - type: text
    content: made my enemies turn their backs to me,
  - type: note
    content: Or You gave me my enemies’ necks
  - type: text
    content: those who hated me, and I destroyed them.
  '42':
  - type: text
    content: They looked, but there was none to save;
  - type: text
    content: 'they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ', but '
  - type: note
    content: 1 Sam. 28:6; Prov. 1:28; [Isa. 1:15; Mic. 3:4]
  - type: text
    content: he did not answer them.
  '43':
  - type: text
    content: 'I beat them fine '
  - type: note
    content: 2 Kgs. 13:7
  - type: text
    content: as the dust of the earth;
  - type: text
    content: 'I crushed them and stamped them down '
  - type: note
    content: Isa. 10:6; Mic. 7:10; Zech. 10:5
  - type: text
    content: like the mire of the streets.
  '44':
  - type: text
    content: “You delivered me from strife with my people;
  - type: note
    content: Septuagint with the peoples
  - type: text
    content: 'you kept me as the head of '
  - type: note
    content: See ch. 8:1-14
  - type: text
    content: the nations;
  - type: note
    content: Isa. 55:5
  - type: text
    content: people whom I had not known served me.
  '45':
  - type: text
    content: Foreigners came cringing to me;
  - type: text
    content: as soon as they heard of me, they obeyed me.
  '46':
  - type: text
    content: Foreigners lost heart
  - type: text
    content: and came trembling
  - type: note
    content: Compare Psalm 18:45; Hebrew equipped themselves
  - type: text
    content: ' '
  - type: note
    content: Mic. 7:17
  - type: text
    content: out of their fortresses.
  '47':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and blessed be my rock,'
  - type: text
    content: 'and exalted be '
  - type: note
    content: ver. 3, 32
  - type: text
    content: 'my God, '
  - type: note
    content: Deut. 32:15; Ps. 89:26; 95:1
  - type: text
    content: the rock of my salvation,
  '48':
  - type: text
    content: the God who gave me vengeance
  - type: text
    content: 'and '
  - type: note
    content: Ps. 144:2
  - type: text
    content: brought down peoples under me,
  '49':
  - type: text
    content: who brought me out from my enemies;
  - type: text
    content: 'you exalted me above '
  - type: note
    content: '[See ver. 40 above]'
  - type: text
    content: those who rose against me;
  - type: text
    content: 'you delivered me from '
  - type: note
    content: Ps. 140:1
  - type: text
    content: men of violence.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 42:7; 93:4; Jonah 2:3 ]'
  - type: text
    content: “For the waves of death encompassed me,
  - type: text
    content: the torrents of destruction assailed me;
  - type: note
    content: Or terrified me
  '50':
  - type: text
    content: ' '
  - type: note
    content: Cited Rom. 15:9
  - type: text
    content: '“For this I will praise you, O '
  - type: text
    content: Lord
  - type: text
    content: ', among the nations,'
  - type: text
    content: and sing praises to your name.
  '51':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 144:10 ]'
  - type: text
    content: Great salvation he brings
  - type: note
    content: Or He is a tower of salvation
  - type: text
    content: ' to his king,'
  - type: text
    content: 'and shows steadfast love to '
  - type: note
    content: '[1 Sam. 16:12, 13; Ps. 89:20]'
  - type: text
    content: his anointed,
  - type: text
    content: 'to David and his offspring '
  - type: note
    content: ch. 7:12, 13; Ps. 89:29
  - type: text
    content: forever.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 116:3
  - type: text
    content: the cords of Sheol entangled me;
  - type: text
    content: the snares of death confronted me.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 116:4; 120:1; Jonah 2:2
  - type: text
    content: '“In my distress I called upon the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: to my God I called.
  - type: text
    content: From his temple he heard my voice,
  - type: text
    content: 'and my cry '
  - type: note
    content: Ps. 18:6
  - type: text
    content: came to his ears.
  '8':
  - type: text
    content: '“Then '
  - type: note
    content: Judg. 5:4; Ps. 77:18; 97:4
  - type: text
    content: the earth reeled and rocked;
  - type: note
    content: '[ Job 26:11 ]'
  - type: text
    content: the foundations of the heavens trembled
  - type: text
    content: and quaked, because he was angry.
  '9':
  - type: text
    content: Smoke went up from his nostrils,
  - type: note
    content: Or in his wrath
  - type: text
    content: and devouring fire from his mouth;
  - type: note
    content: ver. 13
  - type: text
    content: glowing coals flamed forth from him.
