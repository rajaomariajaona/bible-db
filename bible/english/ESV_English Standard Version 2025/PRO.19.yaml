  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:11
  - type: text
    content: 'Strike '
  - type: note
    content: See Ps. 1:1
  - type: text
    content: 'a scoffer, and the simple will '
  - type: note
