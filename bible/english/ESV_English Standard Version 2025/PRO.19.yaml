  - type: text
    content: deed.
  '18':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:24
  - type: text
    content: Discipline your son, for there is hope;
  - type: text
    content: 'do not set your heart on '
  - type: note
    content: '[ch. 23:13]; See Deut. 21:18-21'
  - type: text
    content: putting him to death.
  '19':
  - type: text
    content: A man of great wrath will pay the penalty,
  - type: text
    content: for if you deliver him, you will only have to do it again.
  '2':
  - type: text
    content: Desire
  - type: note
    content: Or A soul
  - type: text
    content: ' without knowledge is not good,'
  - type: text
    content: 'and whoever '
  - type: note
    content: '[ch. 21:5; 28:20; 29:20]'
  - type: text
    content: makes haste with his feet misses his way.
  '20':
  - type: text
