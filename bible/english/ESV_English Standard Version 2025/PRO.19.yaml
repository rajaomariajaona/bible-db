    content: an idle person will suffer hunger.
  '16':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[ch. 13:13; Luke 10:28]'
  - type: text
    content: keeps the commandment keeps his life;
  - type: text
    content: he who despises his ways will die.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 22:9; 28:27; Eccles. 11:1; Matt. 10:42; Heb. 6:10 ]; See Deut. 15:7-10; Matt. 25:40; 2 Cor. 9:6-8'
  - type: text
    content: 'Whoever is generous to the poor lends to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and he '
  - type: note
    content: '[Luke 6:38]'
  - type: text
    content: 'will repay him for his '
  - type: note
