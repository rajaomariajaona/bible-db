  - type: text
    content: that will stand.
  '22':
  - type: text
    content: What is desired in a man is steadfast love,
  - type: text
    content: and a poor man is better than a liar.
  '23':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 10:16; 11:19; [Isa. 38:5; Mark 10:30]
  - type: text
    content: leads to life,
  - type: text
    content: 'and whoever has it rests '
  - type: note
