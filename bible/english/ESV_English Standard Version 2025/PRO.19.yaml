  - type: text
    content: learn prudence;
  - type: note
    content: '[ch. 9:8 ]'
  - type: text
    content: reprove a man of understanding, and he will gain knowledge.
  '26':
  - type: text
    content: He who does violence to his father and chases away his mother
  - type: text
    content: 'is '
  - type: note
    content: ch. 10:5; 17:2
  - type: text
    content: a son who brings shame and reproach.
  '27':
  - type: text
    content: Cease to hear instruction, my son,
  - type: note
    content: '[ 2 Pet. 2:21 ]'
  - type: text
    content: and you will stray from the words of knowledge.
  '28':
  - type: text
    content: A worthless witness mocks at justice,
  - type: text
    content: 'and the mouth of the wicked '
  - type: note
    content: Job 15:16; [ch. 18:8; Job 34:7]
  - type: text
    content: devours iniquity.
  '29':
  - type: text
    content: 'Condemnation is ready for '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: scoffers,
  - type: text
    content: 'and '
  - type: note
    content: ch. 10:13; 18:6; 26:3
  - type: text
    content: beating for the backs of fools.
  '3':
  - type: text
    content: 'When a man’s folly '
  - type: note
    content: '[ch. 11:3]'
  - type: text
    content: brings his way to ruin,
  - type: text
    content: 'his heart '
  - type: note
    content: '[Ps. 37:7; Isa. 8:21; Rev. 16:11]'
  - type: text
    content: 'rages against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:20
  - type: text
    content: Wealth brings many new friends,
  - type: note
    content: ch. 14:20
  - type: text
    content: but a poor man is deserted by his friend.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:19; 21:28 ]; See Deut. 19:16-19'
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: 'and he who '
  - type: note
