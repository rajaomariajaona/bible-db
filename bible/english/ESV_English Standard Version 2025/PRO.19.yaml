  '1':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:6
  - type: text
    content: 'Better is a poor person who '
  - type: note
    content: ch. 14:2; 20:7; Ps. 26:1, 11
  - type: text
    content: walks in his integrity
  - type: text
    content: than one who is crooked in speech and is a fool.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 17:7; 26:1 ]'
  - type: text
    content: It is not fitting for a fool to live in luxury,
  - type: text
    content: 'much less for '
  - type: note
    content: ch. 30:22; Eccles. 10:6, 7
  - type: text
    content: a slave to rule over princes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: See ch. 14:29
  - type: text
    content: Good sense makes one slow to anger,
  - type: text
    content: and it is his glory to overlook an offense.
  '12':
  - type: text
    content: 'A king’s wrath is like '
  - type: note
    content: ch. 20:2; [ch. 16:14, 15; 28:15]
