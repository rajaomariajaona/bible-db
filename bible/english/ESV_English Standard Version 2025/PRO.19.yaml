  - type: text
    content: breathes out lies will not escape.
  '6':
  - type: text
    content: Many seek the favor of a generous man,
  - type: note
    content: Or of a noble
  - type: text
    content: 'and everyone is a friend to a man who gives '
  - type: note
    content: See ch. 17:8
  - type: text
    content: gifts.
  '7':
  - type: text
    content: ' '
  - type: note
