document_id: ACT.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul on Malta
  - type: text
    content: 'After we were brought safely through, '
  - type: note
    content: '[ch. 27:39]'
  - type: text
    content: 'we then learned that '
  - type: note
    content: ch. 27:26
  - type: text
    content: 'the island was called Malta. '
  '10':
  - type: text
    content: They also honored us greatly,
  - type: note
    content: Greek honored us with many honors
  - type: text
    content: ' and when we were about to sail, they put on board whatever we needed.'
  - type: heading
    content: Paul Arrives at Rome
  '11':
  - type: text
    content: 'After three months we set sail in '
  - type: note
    content: ch. 27:6
  - type: text
    content: a ship that had wintered in the island, a ship of Alexandria, with the twin gods
  - type: note
    content: That is, the Greek gods Castor and Pollux
  - type: text
    content: ' as a figurehead. '
  '12':
  - type: text
    content: 'Putting in at Syracuse, we stayed there for three days. '
  '13':
  - type: text
    content: 'And from there we made a circuit and arrived at Rhegium. And after one day a south wind sprang up, and on the second day we came to Puteoli. '
  '14':
  - type: text
    content: 'There we found '
  - type: note
    content: See John 21:23
  - type: text
    content: brothers
  - type: note
    content: Or brothers and sisters; also verses 15, 21
  - type: text
    content: ' and were invited to stay with them for seven days. And so we came to Rome. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'the brothers there, when they heard about us, came as far as the Forum of Appius and Three Taverns to meet us. On seeing them, '
  - type: note
    content: '[Rom. 1:9-12]'
  - type: text
    content: 'Paul thanked God and took courage. '
  '16':
  - type: text
    content: 'And when we came into Rome, '
  - type: note
    content: '[ch. 24:23; 27:3]'
  - type: text
    content: Paul was allowed to stay by himself, with the soldier who guarded him.
  - type: heading
    content: Paul in Rome
  '17':
  - type: text
    content: 'After three days he called together the local leaders of the Jews, and when they had gathered, he said to them, “Brothers, '
  - type: note
    content: '[ch. 25:8]'
  - type: text
    content: 'though I had done nothing against our people or '
  - type: note
    content: ch. 6:14; 15:1; 21:21
  - type: text
    content: 'the customs of our fathers, yet I was delivered as a prisoner from Jerusalem into the hands of the Romans. '
  '18':
  - type: text
    content: 'When they had examined me, they '
  - type: note
    content: ch. 26:31, 32
  - type: text
    content: 'wished to set me at liberty, '
  - type: note
    content: See ch. 23:29
  - type: text
    content: 'because there was no reason for the death penalty in my case. '
  '19':
  - type: text
    content: 'But because the Jews objected, I was compelled '
  - type: note
    content: ch. 25:11; 26:32
  - type: text
    content: 'to appeal to Caesar—though I had no charge to bring against '
  - type: note
    content: ch. 24:17; 26:4
  - type: text
    content: 'my nation. '
  '2':
  - type: note
    content: ver. 4; Rom. 1:14; 1 Cor. 14:11; Col. 3:11
  - type: text
    content: The native people
  - type: note
    content: Greek barbaroi (that is, non–Greek speakers); also verse 4
  - type: text
    content: ' showed us unusual '
  - type: note
    content: ch. 27:3
  - type: text
    content: 'kindness, for they kindled a fire and welcomed us all, because it had begun to rain and was cold. '
  '20':
  - type: text
    content: 'For this reason, therefore, I have asked to see you and speak with you, since it is '
  - type: note
    content: See ch. 23:6
  - type: text
    content: 'because of '
  - type: note
    content: '[Luke 2:25]'
  - type: text
    content: 'the hope of Israel that I am wearing '
  - type: note
    content: ch. 26:29
  - type: text
    content: 'this '
  - type: note
    content: Eph. 6:20; 2 Tim. 1:16; See ch. 21:33; Phil. 1:7
  - type: text
    content: 'chain.” '
  '21':
  - type: text
    content: 'And they said to him, “We have received no letters from Judea about you, and none of '
  - type: note
    content: ch. 22:5
  - type: text
    content: 'the brothers coming here has reported or spoken any evil about you. '
  '22':
  - type: text
    content: 'But we desire to hear from you what your views are, for with regard to this '
  - type: note
    content: See ch. 24:5
  - type: text
    content: 'sect we know that everywhere '
  - type: note
    content: Luke 2:34; [1 Pet. 2:12; 3:16; 4:14, 16]
  - type: text
    content: it is spoken against.”
  '23':
  - type: text
    content: 'When they had appointed a day for him, they came to him at his lodging in greater numbers. From morning till evening '
  - type: note
    content: '[ch. 17:2, 3]'
  - type: text
    content: 'he expounded to them, testifying to '
  - type: note
    content: ver. 31
  - type: text
    content: 'the kingdom of God and '
  - type: note
    content: '[ch. 19:8]'
  - type: text
    content: 'trying to convince them about Jesus '
  - type: note
    content: ch. 8:35; 24:14; 26:22
  - type: text
    content: 'both from the Law of Moses and from the Prophets. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 14:4; 17:4, 5; 19:9; 23:7]'
  - type: text
    content: 'some were convinced by what he said, but others disbelieved. '
  '25':
  - type: text
    content: 'And disagreeing among themselves, they departed after Paul had made one statement: '
  - type: note
    content: Matt. 15:7
  - type: text
    content: '“The Holy Spirit was right in saying to your fathers through Isaiah the prophet:'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 6:9, 10
  - type: text
    content: “‘Go to this people, and say,
  - type: note
    content: Matt. 13:14, 15; Mark 4:12; [ Luke 8:10 ]
  - type: text
    content: “You will indeed hear but never understand,
  - type: text
    content: and you will indeed see but never perceive.”
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ John 12:40; Rom. 11:8 ]'
  - type: text
    content: For this people’s heart has grown dull,
  - type: text
    content: and with their ears they can barely hear,
  - type: text
    content: and their eyes they have closed;
  - type: text
    content: lest they should see with their eyes
  - type: text
    content: and hear with their ears
  - type: text
    content: and understand with their heart
  - type: text
    content: 'and '
  - type: note
    content: See Luke 22:32
  - type: text
    content: turn, and I would heal them.’
  '28':
  - type: text
    content: 'Therefore let it be known to you that '
  - type: note
    content: ch. 13:26
  - type: text
    content: 'this '
  - type: note
    content: Ps. 67:2; Isa. 40:5; Luke 2:30; 3:6; [Rom. 11:11]
  - type: text
    content: 'salvation of God '
  - type: note
    content: See ch. 13:46
  - type: text
    content: 'has been sent to the Gentiles; '
  - type: note
    content: John 10:16; [ch. 13:48; Matt. 8:11; 21:43]
  - type: text
    content: they will listen.”
  - type: note
    content: 'Some manuscripts add verse 29: And when he had said these words, the Jews departed, having much dispute among themselves'
  '3':
  - type: text
    content: 'When Paul had gathered a bundle of sticks and put them on the fire, a viper came out because of the heat and fastened on his hand. '
  '30':
  - type: text
    content: He lived there two whole years at his own expense,
  - type: note
    content: Or in his own hired dwelling
  - type: text
    content: ' and '
  - type: note
    content: '[Phil. 1:13]'
  - type: text
    content: 'welcomed all who came to him, '
  '31':
  - type: note
    content: '[ch. 8:12; 20:25]'
  - type: text
    content: 'proclaiming '
  - type: note
    content: ver. 23; See Matt. 12:28; 13:19
  - type: text
    content: 'the kingdom of God and teaching about the Lord Jesus Christ '
  - type: note
    content: See ch. 4:29
  - type: text
    content: 'with all boldness and '
  - type: note
    content: '[Phil. 1:12, 13; 2 Tim. 2:9]'
  - type: text
    content: without hindrance.
  '4':
  - type: text
    content: 'When '
  - type: note
    content: ver. 2
  - type: text
    content: 'the native people saw the creature hanging from his hand, they said to one another, '
  - type: note
    content: '[Job 4:7; Luke 13:2, 4; John 9:2]'
  - type: text
    content: '“No doubt this man is a murderer. Though he has escaped from the sea, '
  - type: note
    content: '[Num. 32:23; Amos 5:19; 9:3]'
  - type: text
    content: Justice
  - type: note
    content: Or justice
  - type: text
    content: ' has not allowed him to live.” '
  '5':
  - type: text
    content: 'He, however, '
  - type: note
    content: Mark 16:18; Luke 10:19
  - type: text
    content: 'shook off the creature into the fire and suffered no harm. '
  '6':
  - type: text
    content: 'They were waiting for him to swell up or suddenly fall down dead. But when they had waited a long time and saw no misfortune come to him, '
  - type: note
    content: '[ch. 14:11, 19]'
  - type: text
    content: 'they changed their minds and '
  - type: note
    content: '[ch. 8:10; 14:11]'
  - type: text
    content: said that he was a god.
  '7':
  - type: text
    content: 'Now in the neighborhood of that place were lands belonging to the chief man of the island, named Publius, who received us and entertained us hospitably for three days. '
  '8':
  - type: text
    content: 'It happened that the father of Publius lay sick with fever and dysentery. And Paul visited him and '
  - type: note
    content: ch. 9:40; [James 5:14, 15]
  - type: text
    content: 'prayed, and '
  - type: note
    content: See Mark 5:23
  - type: text
    content: 'putting his hands on him, healed him. '
  '9':
  - type: text
    content: 'And when this had taken place, the rest of the people on the island who had diseases also came and were cured. '
