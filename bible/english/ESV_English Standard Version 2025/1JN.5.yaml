document_id: 1JN.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Overcoming the World
  - type: text
    content: ' '
  - type: note
    content: John 1:12
  - type: text
    content: 'Everyone who believes that '
  - type: note
    content: ch. 2:22
  - type: text
    content: 'Jesus is the Christ has been born of God, and '
  - type: note
    content: John 8:42
  - type: text
    content: 'everyone who loves the Father loves whoever has been born of him. '
  '10':
  - type: text
    content: 'Whoever believes in the Son of God '
  - type: note
    content: '[Rom. 8:16; Gal. 4:6; Rev. 12:17; 19:10]'
  - type: text
    content: 'has the testimony in himself. Whoever does not believe God '
  - type: note
    content: ch. 1:10; [John 3:33]
  - type: text
    content: 'has made him a liar, '
  - type: note
    content: '[John 5:38]'
  - type: text
    content: 'because he has not believed in the testimony that God has borne concerning his Son. '
  '11':
  - type: text
    content: 'And this is the testimony, that God gave us '
  - type: note
    content: ch. 2:25; [ch. 4:9]
  - type: text
    content: 'eternal life, and '
  - type: note
    content: See John 1:4
  - type: text
    content: 'this life is in his Son. '
  '12':
  - type: note
    content: '[John 3:15, 36; 5:24; 6:40, 47]'
  - type: text
    content: Whoever has the Son has life; whoever does not have the Son of God does not have life.
  - type: heading
    content: That You May Know
  '13':
  - type: text
    content: 'I write '
  - type: note
    content: John 20:31
  - type: text
    content: 'these things to you who '
  - type: note
    content: John 1:12
  - type: text
    content: 'believe in the name of the Son of God, that you may know that you have eternal life. '
  '14':
  - type: text
    content: 'And this is '
  - type: note
    content: ch. 2:28; 3:21; 4:17
  - type: text
    content: 'the confidence that we have toward him, that '
  - type: note
    content: ch. 3:22; [Prov. 10:24]
  - type: text
    content: 'if we ask anything according to his will he hears us. '
  '15':
  - type: text
    content: And if we know that he hears us in whatever we ask, we know that we have the requests that we have asked of him.
  '16':
  - type: text
    content: 'If anyone sees his brother committing a sin not leading to death, he shall ask, and '
  - type: note
    content: '[Job 42:8; James 5:15]'
  - type: text
    content: God
  - type: note
    content: Greek he
  - type: text
    content: ' will give him life—to those who commit sins that do not lead to death. '
  - type: note
    content: Matt. 12:31, 32; Mark 3:29; Luke 12:10; Heb. 6:4-6; 10:26
  - type: text
    content: 'There is sin that leads to death; '
  - type: note
    content: '[Jer. 7:16; 14:11]'
  - type: text
    content: 'I do not say that one should pray for that. '
  '17':
  - type: note
    content: '[ch. 3:4]'
  - type: text
    content: All wrongdoing is sin, but there is sin that does not lead to death.
  '18':
  - type: text
    content: 'We know that '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'everyone who has been born of God does not keep on sinning, but '
  - type: note
    content: John 1:18
  - type: text
    content: 'he who was born of God '
  - type: note
    content: John 17:12
  - type: text
    content: protects him, and the evil one does not touch him.
  '19':
  - type: text
    content: 'We know that we are from God, and '
  - type: note
    content: '[Luke 4:6; Gal. 1:4]'
  - type: text
    content: the whole world lies in the power of the evil one.
  '2':
  - type: note
    content: ch. 2:5; 3:24; 4:13
  - type: text
    content: 'By this we know that we love the children of God, when we love God and obey his commandments. '
  '20':
  - type: text
    content: 'And we know that the Son of God has come and '
  - type: note
    content: '[Luke 24:45]'
  - type: text
    content: 'has given us understanding, so that we may know '
  - type: note
    content: See John 17:3; Rev. 3:7
  - type: text
    content: 'him who is true; and we are in him who is true, in his Son Jesus Christ. He is the true God and '
  - type: note
    content: ver. 11-13
  - type: text
    content: 'eternal life. '
  '21':
  - type: text
    content: 'Little children, '
  - type: note
    content: 1 Cor. 10:7, 14
  - type: text
    content: keep yourselves from idols.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: 2 John 6; See John 14:15
  - type: text
    content: 'this is the love of God, that we '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'keep his commandments. And '
  - type: note
    content: Matt. 11:30
  - type: text
    content: 'his commandments are not burdensome. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: ch. 3:9; 4:4; John 16:33
  - type: text
    content: everyone who has been born of God overcomes the world. And this is the victory that has overcome the world—
  - type: note
    content: '[1 Cor. 15:57; Eph. 6:16]'
  - type: text
    content: 'our faith. '
  '5':
  - type: text
    content: 'Who is it that overcomes the world except the one who believes '
  - type: note
    content: ch. 4:15
  - type: text
    content: that Jesus is the Son of God?
  - type: heading
    content: Testimony Concerning the Son of God
  '6':
  - type: text
    content: 'This is he who came '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'by water and blood—Jesus Christ; not by the water only but by the water and the blood. And '
  - type: note
    content: John 15:26; [Acts 5:32]
  - type: text
    content: 'the Spirit is the one who testifies, because '
  - type: note
    content: John 14:17; 15:26; 16:13
  - type: text
    content: 'the Spirit is the truth. '
  '7':
  - type: text
    content: 'For there are three that testify: '
  '8':
  - type: text
    content: 'the Spirit and the water and the blood; and these three agree. '
  '9':
  - type: note
    content: John 5:34, 36, 37; 8:17, 18
  - type: text
    content: 'If we receive the testimony of men, the testimony of God is greater, for this is the testimony of God '
  - type: note
    content: See Matt. 3:17
  - type: text
    content: 'that he has borne concerning his Son. '
