document_id: 2TI.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Preach the Word
  - type: text
    content: ' '
  - type: note
    content: ch. 2:14; 1 Tim. 5:21; 6:13
  - type: text
    content: 'I charge you in the presence of God and of Christ Jesus, '
  - type: note
    content: See Acts 10:42
  - type: text
    content: 'who is to judge the living and the dead, and by '
  - type: note
    content: ver. 8; See 2 Thess. 2:8
  - type: text
    content: 'his appearing and his kingdom: '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Col. 4:14; Philem. 24
  - type: text
    content: 'Demas, '
  - type: note
    content: See 1 John 2:15
  - type: text
    content: 'in love with '
  - type: note
    content: 1 Tim. 6:17; Titus 2:12
  - type: text
    content: 'this present world, '
  - type: note
    content: '[ch. 1:15]'
  - type: text
    content: has deserted me and gone to Thessalonica. Crescens has gone to Galatia,
  - type: note
    content: Some manuscripts Gaul
  - type: text
    content: ' '
  - type: note
    content: '[Titus 3:12]'
  - type: text
    content: 'Titus to Dalmatia. '
  '11':
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Luke alone is with me. Get '
  - type: note
    content: See Acts 12:12
  - type: text
    content: 'Mark and bring him with you, for he is very useful to me for ministry. '
  '12':
  - type: note
    content: Acts 20:4; Eph. 6:21; Col. 4:7; Titus 3:12
  - type: text
    content: 'Tychicus I have sent to Ephesus. '
  '13':
  - type: text
    content: 'When you come, bring the cloak that I left with Carpus at Troas, also the books, and above all the parchments. '
  '14':
  - type: note
    content: See 1 Tim. 1:20
  - type: text
    content: 'Alexander the coppersmith did me great harm; '
  - type: note
    content: Ps. 62:12; Prov. 24:12; [Neh. 6:14; 13:29; Ps. 28:4; Rev. 18:6]
  - type: text
    content: 'the Lord will repay him according to his deeds. '
  '15':
  - type: text
    content: 'Beware of him yourself, for he strongly opposed our message. '
  '16':
  - type: text
    content: 'At my first defense no one came to stand by me, but all deserted me. '
  - type: note
    content: '[Acts 7:60]'
  - type: text
    content: 'May it not be charged against them! '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: Acts 23:11; 27:23; [Matt. 10:19]
  - type: text
    content: 'the Lord stood by me and '
  - type: note
    content: See 1 Tim. 1:12
  - type: text
    content: 'strengthened me, so that through me the message might be fully proclaimed and '
  - type: note
    content: See Acts 9:15
  - type: text
    content: 'all the Gentiles might hear it. So '
  - type: note
    content: ch. 3:11
  - type: text
    content: 'I was rescued '
  - type: note
    content: Ps. 22:21; [1 Sam. 17:37]
  - type: text
    content: 'from the lion’s mouth. '
  '18':
  - type: text
    content: 'The Lord will rescue me from every evil deed and bring me safely into his heavenly kingdom. '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: To him be the glory forever and ever. Amen.
  - type: heading
    content: Final Greetings
  '19':
  - type: text
    content: 'Greet '
  - type: note
    content: See Acts 18:2
  - type: text
    content: 'Prisca and Aquila, and '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'the household of Onesiphorus. '
  '2':
  - type: text
    content: 'preach the word; be ready in season and out of season; '
  - type: note
    content: 1 Tim. 5:20; Titus 1:13; 2:15
  - type: text
    content: 'reprove, rebuke, and '
  - type: note
    content: 1 Tim. 4:13
  - type: text
    content: 'exhort, with complete patience and teaching. '
  '20':
  - type: text
    content: 'Erastus remained at Corinth, and I left '
  - type: note
    content: Acts 20:4; 21:29
  - type: text
    content: 'Trophimus, who was ill, at Miletus. '
  '21':
  - type: note
    content: ver. 9
  - type: text
    content: Do your best to come before winter. Eubulus sends greetings to you, as do Pudens and Linus and Claudia and all the brothers.
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  '22':
  - type: text
    content: 'The Lord be '
  - type: note
    content: Gal. 6:18; Philem. 25
  - type: text
    content: 'with your spirit. '
  - type: note
    content: See Col. 4:18
  - type: text
    content: Grace be with you.
  - type: note
    content: The Greek for you is plural
  '3':
  - type: note
    content: ch. 3:1
  - type: text
    content: 'For the time is coming when people will not endure '
  - type: note
    content: See 1 Tim. 1:10
  - type: text
    content: sound
  - type: note
    content: Or healthy
  - type: text
    content: ' teaching, but having itching ears they will accumulate for themselves teachers to suit their own passions, '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: See 1 Tim. 6:20
  - type: text
    content: 'will turn away from listening to the truth and '
  - type: note
    content: See 1 Tim. 1:4, 6
  - type: text
    content: 'wander off into myths. '
  '5':
  - type: text
    content: 'But as for you, '
  - type: note
    content: 1 Pet. 1:13
  - type: text
    content: 'always be sober-minded, '
  - type: note
    content: ch. 1:8; 2:3, 9
  - type: text
    content: 'endure suffering, do the work of '
  - type: note
    content: Acts 21:8; Eph. 4:11
  - type: text
    content: 'an evangelist, '
  - type: note
    content: Col. 4:17
  - type: text
    content: fulfill your ministry.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Phil. 2:17
  - type: text
    content: 'I am already being poured out as a drink offering, and the time of my '
  - type: note
    content: Phil. 1:23; [2 Pet. 1:14]
  - type: text
    content: 'departure has come. '
  '7':
  - type: note
    content: See 1 Tim. 6:12
  - type: text
    content: 'I have fought the good fight, '
  - type: note
    content: Acts 20:24
  - type: text
    content: 'I have finished the race, I have kept the faith. '
  '8':
  - type: text
    content: 'Henceforth there is '
  - type: note
    content: Col. 1:5; 1 Pet. 1:4
  - type: text
    content: 'laid up for me '
  - type: note
    content: See James 1:12
  - type: text
    content: 'the crown of righteousness, which the Lord, '
  - type: note
    content: Ps. 7:11
  - type: text
    content: 'the righteous judge, will award to me on '
  - type: note
    content: ch. 1:12
  - type: text
    content: 'that day, and not only to me but also to all '
  - type: note
    content: '[Rev. 22:20]'
  - type: text
    content: who have loved his appearing.
  - type: heading
    content: Personal Instructions
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:4
  - type: text
    content: 'Do your best to come to me soon. '
