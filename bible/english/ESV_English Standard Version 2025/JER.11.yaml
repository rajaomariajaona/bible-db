document_id: JER.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Broken Covenant
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'They have turned back to '
  - type: note
    content: '[ch. 17:23; Ps. 78:8; 79:8; Ezek. 20:18]'
  - type: text
    content: 'the iniquities of their forefathers, who refused to hear my words. '
  - type: note
    content: '[ch. 17:23; Ps. 78:8; 79:8; Ezek. 20:18]'
  - type: text
    content: 'They have gone after other gods to serve them. '
  - type: note
    content: Deut. 31:16, 20
  - type: text
    content: 'The house of Israel and the house of Judah have broken my covenant that I made with their fathers. '
  '11':
  - type: text
    content: 'Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Behold, I am bringing disaster upon them that they cannot escape. '
  - type: note
    content: Prov. 1:28; Isa. 1:15; Ezek. 8:18; Mic. 3:4
  - type: text
    content: 'Though they cry to me, I will not listen to them. '
  '12':
  - type: text
    content: 'Then the cities of Judah and the inhabitants of Jerusalem '
  - type: note
    content: ch. 2:28; [Acts 17:16]
  - type: text
    content: 'will go and cry to the gods to whom they make offerings, '
  - type: note
    content: ch. 2:28; [Acts 17:16]
  - type: text
    content: 'but they cannot save them in the time of their trouble. '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'For your gods have become as many as your cities, O Judah, and as many as the streets of Jerusalem are the altars you have set up to shame, '
  - type: note
    content: '[Hos. 9:10]; See Judg. 6:25-32'
  - type: text
    content: altars to make offerings to Baal.
  '14':
  - type: text
    content: '“Therefore '
  - type: note
    content: ch. 7:16; [Heb. 10:26; 1 John 5:16]
  - type: text
    content: 'do not pray for this people, or lift up a cry or prayer on their behalf, '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'for I will not listen when they call to me in the time of their trouble. '
  '15':
  - type: note
    content: Isa. 1:11, 12
  - type: text
    content: 'What right has my beloved in my house, '
  - type: note
    content: '[Ezek. 16:25]'
  - type: text
    content: 'when she has done many vile deeds? Can even sacrificial flesh avert your doom? '
  - type: note
    content: Prov. 2:14
  - type: text
    content: 'Can you then exult? '
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' once called you '
  - type: note
    content: Ps. 52:8; [Hos. 14:6]
  - type: text
    content: '‘a green olive tree, beautiful with good fruit.’ But '
  - type: note
    content: '[Ps. 83:2]'
  - type: text
    content: 'with the roar of a great tempest he will set fire to it, and '
  - type: note
    content: Rom. 11:17, 20
  - type: text
    content: 'its branches will be consumed. '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: ch. 2:21; Isa. 5:2
  - type: text
    content: 'who planted you, has decreed disaster against you, because of the evil that the house of Israel and the house of Judah have done, '
  - type: note
    content: See ch. 7:18
  - type: text
    content: provoking me to anger by making offerings to Baal.”
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' made it known to me and I knew;'
  - type: text
    content: then you showed me their deeds.
  '19':
  - type: text
    content: 'But I was '
  - type: note
    content: Isa. 53:7; [Rev. 5:6]
  - type: text
    content: like a gentle lamb
  - type: text
    content: led to the slaughter.
  - type: text
    content: 'I did not know '
  - type: note
    content: ch. 18:18; Lam. 3:60, 61
  - type: text
    content: it was against me
  - type: text
    content: they devised schemes, saying,
  - type: text
    content: “Let us destroy the tree with its fruit,
  - type: note
    content: Ps. 83:4; Isa. 53:8
  - type: text
    content: 'let us cut him off from '
  - type: note
    content: Ps. 27:13
  - type: text
    content: the land of the living,
  - type: text
    content: that his name be remembered no more.”
  '2':
  - type: note
    content: ver. 6, 8; [2 Kgs. 23:3]
  - type: text
    content: '“Hear the words of this covenant, and speak to the men of Judah and the inhabitants of Jerusalem. '
  '20':
  - type: text
    content: 'But, O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, who judges righteously,'
  - type: text
    content: 'who '
  - type: note
    content: ch. 17:10; 20:12; Ps. 7:9; Rev. 2:23
  - type: text
    content: 'tests '
  - type: note
    content: See 1 Sam. 16:7
  - type: text
    content: the heart and the mind,
  - type: note
    content: ch. 15:15; 17:18; 20:12; Lam. 3:64
  - type: text
    content: let me see your vengeance upon them,
  - type: text
    content: for to you have I committed my cause.
  '21':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the men of '
  - type: note
    content: Josh. 21:18
  - type: text
    content: 'Anathoth, '
  - type: note
    content: '[ch. 12:6; Matt. 13:57]'
  - type: text
    content: 'who seek your life, and say, '
  - type: note
    content: Isa. 30:10
  - type: text
    content: '“Do not prophesy in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', or you will die by our hand”— '
  '22':
  - type: text
    content: 'therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: “Behold, I will punish them. The young men shall die by the sword, their sons and their daughters shall die by famine, '
  '23':
  - type: text
    content: 'and none of them shall be left. For I will bring disaster upon the men of '
  - type: note
    content: Josh. 21:18
  - type: text
    content: 'Anathoth, '
  - type: note
    content: ch. 23:12
  - type: text
    content: the year of their punishment.”
  '3':
  - type: text
    content: 'You shall say to them, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  - type: note
    content: Deut. 27:26; Gal. 3:10
  - type: text
    content: 'Cursed be the man who does not hear the words of this covenant '
  '4':
  - type: text
    content: 'that I commanded your fathers when I brought them out of the land of Egypt, '
  - type: note
    content: Deut. 4:20
  - type: text
    content: 'from the iron furnace, saying, '
  - type: note
    content: ch. 7:22, 23; Lev. 26:3, 12
  - type: text
    content: 'Listen to my voice, and do all that I command you. '
  - type: note
    content: ch. 7:22, 23; Lev. 26:3, 12
  - type: text
    content: 'So shall you be my people, and I will be your God, '
  '5':
  - type: note
    content: Deut. 7:12, 13; Ps. 105:9, 10
  - type: text
    content: 'that I may confirm the oath that I swore to your fathers, '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'to give them a land flowing with milk and honey, as at this day.” Then I answered, “So be it, '
  - type: text
    content: Lord
  - type: text
    content: .”
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: '[ch. 19:2]'
  - type: text
    content: '“Proclaim all these words in the cities of Judah and in the streets of Jerusalem: '
  - type: note
    content: ver. 2, 8; [2 Kgs. 23:3]
  - type: text
    content: 'Hear the words of this covenant and do them. '
  '7':
  - type: text
    content: 'For I solemnly warned your fathers when I brought them up out of the land of Egypt, '
  - type: note
    content: ch. 7:25; See 2 Chr. 36:15
  - type: text
    content: 'warning them persistently, even to this day, saying, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'Obey my voice. '
  '8':
  - type: note
    content: ch. 7:26; 32:23
  - type: text
    content: 'Yet they did not obey or incline their ear, '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'but everyone walked in the stubbornness of his evil heart. Therefore I brought upon them all '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: the words of this covenant, which I commanded them to do, but they did not.”
  '9':
  - type: text
    content: 'Again the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Ezek. 22:25; [Isa. 8:12; Hos. 6:9]
  - type: text
    content: '“A conspiracy exists among the men of Judah and the inhabitants of Jerusalem. '
