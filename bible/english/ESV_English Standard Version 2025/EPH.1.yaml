document_id: EPH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: See 2 Cor. 1:1
  - type: text
    content: 'an apostle of Christ Jesus '
  - type: note
    content: See 1 Cor. 1:1
  - type: text
    content: by the will of God,
  - type: text
    content: 'To the saints who are in Ephesus, and '
  - type: note
    content: Col. 1:2
  - type: text
    content: are faithful
  - type: note
    content: Some manuscripts saints who are also faithful (omitting in Ephesus)
  - type: text
    content: ' in Christ Jesus:'
  '10':
  - type: text
    content: 'as a plan for '
  - type: note
    content: See Mark 1:15
  - type: text
    content: 'the fullness of time, '
  - type: note
    content: Col. 1:16, 20; [ch. 3:15; Phil. 2:9, 10]
  - type: text
    content: to unite all things in Christ, things in heaven and things on earth in him.
  '11':
  - type: text
    content: 'In him we have obtained '
  - type: note
    content: Deut. 4:20; 32:9; See ver. 14
  - type: text
    content: 'an inheritance, '
  - type: note
    content: ver. 5
  - type: text
    content: 'having been predestined '
  - type: note
    content: ch. 3:11; [Rev. 4:11]; See Rom. 8:28
  - type: text
    content: 'according to the purpose of him who works all things according to '
  - type: note
    content: '[Acts 20:27]'
  - type: text
    content: 'the counsel of his will, '
  '12':
  - type: text
    content: 'so that we who were the first to hope in Christ might be '
  - type: note
    content: ver. 6, 14; [Phil. 1:11]
  - type: text
    content: 'to the praise of his glory. '
  '13':
  - type: text
    content: 'In him you also, when you heard '
  - type: note
    content: 2 Cor. 6:7; Col. 1:5; 2 Tim. 2:15; [Acts 13:26; 15:7]
  - type: text
    content: 'the word of truth, the gospel of your salvation, and believed in him, '
  - type: note
    content: ch. 4:30
  - type: text
    content: 'were sealed with the '
  - type: note
    content: See Acts 1:4
  - type: text
    content: 'promised Holy Spirit, '
  '14':
  - type: text
    content: 'who is '
  - type: note
    content: 2 Cor. 1:22
  - type: text
    content: the guarantee
  - type: note
    content: Or down payment
  - type: text
    content: ' of our '
  - type: note
    content: Acts 20:32; [ver. 18]
  - type: text
    content: 'inheritance until '
  - type: note
    content: Titus 2:14; See ver. 7
  - type: text
    content: 'we acquire '
  - type: note
    content: See 1 Pet. 2:9
  - type: text
    content: possession of it,
  - type: note
    content: Or until God redeems his possession
  - type: text
    content: ' '
  - type: note
    content: ver. 6, 12
  - type: text
    content: to the praise of his glory.
  - type: heading
    content: Thanksgiving and Prayer
  '15':
  - type: text
    content: 'For this reason, '
  - type: note
    content: Col. 1:4; Philem. 5; See Rom. 1:8
  - type: text
    content: because I have heard of your faith in the Lord Jesus and your love
  - type: note
    content: Some manuscripts omit your love
  - type: text
    content: ' toward all the saints, '
  '16':
  - type: text
    content: 'I '
  - type: note
    content: Col. 1:9
  - type: text
    content: 'do not cease to give thanks for you, '
  - type: note
    content: Rom. 1:9; 2 Tim. 1:3
  - type: text
    content: 'remembering you in my prayers, '
  '17':
  - type: text
    content: 'that '
  - type: note
    content: See Rom. 15:6
  - type: text
    content: 'the God of our Lord Jesus Christ, the Father of glory, '
  - type: note
    content: '[Col. 1:9]'
  - type: text
    content: 'may give you the Spirit of wisdom and of revelation in the knowledge of him, '
  '18':
  - type: note
    content: '[Heb. 6:4; 10:32; Rev. 3:17, 18]; See Acts 26:18'
  - type: text
    content: 'having the eyes of your hearts enlightened, that you may know what is '
  - type: note
    content: ch. 4:4; [ch. 2:12]
  - type: text
    content: 'the hope to which he has called you, what are '
  - type: note
    content: ch. 3:8, 16; Col. 1:27; See ver. 7
  - type: text
    content: 'the riches of his glorious inheritance in the saints, '
  '19':
  - type: text
    content: 'and what is the immeasurable greatness of his power toward us who believe, '
  - type: note
    content: ch. 3:7; Phil. 3:21; Col. 1:29; 2:12
  - type: text
    content: 'according to the working of '
  - type: note
    content: ch. 6:10; [Dan. 4:30]
  - type: text
    content: 'his great might '
  '2':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Spiritual Blessings in Christ
  '20':
  - type: text
    content: 'that he worked in Christ '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'when he raised him from the dead and '
  - type: note
    content: See Mark 16:19; Acts 2:33; 1 Pet. 3:22
  - type: text
    content: 'seated him at his right hand '
  - type: note
    content: See ver. 3
  - type: text
    content: 'in the heavenly places, '
  '21':
  - type: note
    content: ch. 4:10; Col. 2:10; See John 3:31
  - type: text
    content: 'far above '
  - type: note
    content: 1 Cor. 15:24
  - type: text
    content: 'all rule and authority and power and dominion, and above '
  - type: note
    content: ch. 3:15; Phil. 2:9; [Heb. 1:4]
  - type: text
    content: 'every name that is named, not only in '
  - type: note
    content: '[Matt. 12:32]'
  - type: text
    content: 'this age but also in the one to come. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Cited from Ps. 8:6; See 1 Cor. 15:27
  - type: text
    content: 'he put all things under his feet and gave him as '
  - type: note
    content: ch. 4:15; 5:23; Col. 1:18; 2:19; [1 Cor. 11:3; Col. 2:10]
  - type: text
    content: 'head over all things to the church, '
  '23':
  - type: note
    content: ch. 4:12, 16; 5:30; Col. 1:18, 24; [ch. 5:23; 1 Cor. 12:27]
  - type: text
    content: 'which is his body, '
  - type: note
    content: ch. 3:19; See John 1:16
  - type: text
    content: 'the fullness of him '
  - type: note
    content: ch. 4:10
  - type: text
    content: 'who fills '
  - type: note
    content: '[Jer. 23:24; Col. 3:11]'
  - type: text
    content: all in all.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 1:3; 1 Pet. 1:3
  - type: text
    content: 'Blessed be '
  - type: note
    content: See Rom. 15:6
  - type: text
    content: 'the God and Father of our Lord Jesus Christ, who has blessed us in Christ with every spiritual blessing '
  - type: note
    content: ver. 20; ch. 2:6; 3:10; 6:12
  - type: text
    content: 'in the heavenly places, '
  '4':
  - type: note
    content: '[ch. 2:10; 2 Thess. 2:13; 1 Pet. 1:2]'
  - type: text
    content: 'even as he '
  - type: note
    content: James 2:5; [Deut. 7:6; 26:18]
  - type: text
    content: 'chose us in him '
  - type: note
    content: '[2 Tim. 1:9]; See Matt. 13:35'
  - type: text
    content: 'before the foundation of the world, that we should be '
  - type: note
    content: ch. 5:27; Col. 1:22; 1 Thess. 4:7
  - type: text
    content: 'holy and blameless before him. In love '
  '5':
  - type: note
    content: ver. 11; Rom. 8:29, 30
  - type: text
    content: he predestined us
  - type: note
    content: Or before him in love, 5having predestined us
  - type: text
    content: ' for '
  - type: note
    content: See Rom. 8:15
  - type: text
    content: 'adoption to himself as sons through Jesus Christ, '
  - type: note
    content: ver. 9; [Luke 2:14; Heb. 2:4]; See Luke 12:32
  - type: text
    content: 'according to the purpose of his will, '
  '6':
  - type: note
    content: ver. 12, 14
  - type: text
    content: 'to the praise of his glorious grace, with which he has blessed us in '
  - type: note
    content: '[John 3:35; 10:17; Col. 1:13]; See Matt. 3:17'
  - type: text
    content: 'the Beloved. '
  '7':
  - type: note
    content: Col. 1:14
  - type: text
    content: 'In him we have '
  - type: note
    content: Rom. 3:24; 1 Cor. 1:30; [ch. 4:30]
  - type: text
    content: 'redemption '
  - type: note
    content: See Acts 20:28
  - type: text
    content: 'through his blood, '
  - type: note
    content: See Acts 2:38
  - type: text
    content: 'the forgiveness of our trespasses, '
  - type: note
    content: '[ch. 3:8, 16; Col. 1:27]; See Rom. 2:4'
  - type: text
    content: 'according to the riches of his grace, '
  '8':
  - type: text
    content: 'which he lavished upon us, in all wisdom and insight '
  '9':
  - type: note
    content: See Rom. 16:25
  - type: text
    content: making known
  - type: note
    content: Or he lavished upon us in all wisdom and insight, making known
  - type: text
    content: ' to us the mystery of his will, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'according to his purpose, which he '
  - type: note
    content: '[ver. 11; Rom. 8:28; 9:11]'
  - type: text
    content: set forth in Christ
  - type: note
    content: Greek him
  - type: text
    content: ' '
