    content: Give ear, and hear my voice;
  - type: text
    content: give attention, and hear my speech.
  '24':
  - type: text
    content: Does he who plows for sowing plow continually?
  - type: text
    content: Does he continually open and harrow his ground?
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 55:10, 11 ]'
  - type: text
    content: When he has leveled its surface,
  - type: text
    content: does he not scatter dill, sow cumin,
  - type: text
    content: and put in wheat in rows
  - type: text
    content: and barley in its proper place,
  - type: text
    content: and emmer
  - type: note
    content: A type of wheat
  - type: text
    content: ' as the border?'
