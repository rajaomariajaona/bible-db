    content: ' '
  - type: note
    content: '[ch. 21:10 ]'
  - type: text
    content: For he is rightly instructed;
  - type: text
    content: his God teaches him.
  '27':
  - type: text
    content: Dill is not threshed with a threshing sledge,
  - type: text
    content: nor is a cart wheel rolled over cumin,
  - type: text
    content: but dill is beaten out with a stick,
  - type: text
    content: and cumin with a rod.
  '28':
  - type: text
    content: Does one crush grain for bread?
  - type: text
    content: No, he does not thresh it forever;
  - type: note
    content: Or Grain is crushed for bread; he will surely thresh it, but not forever
  - type: text
    content: when he drives his cart wheel over it
  - type: text
    content: with his horses, he does not crush it.
