document_id: GEN.41,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Interprets Pharaoh’s Dreams
  - type: text
    content: 'After two whole years, Pharaoh dreamed that he was standing by the Nile, '
  '10':
  - type: text
    content: 'When Pharaoh was '
  - type: note
    content: ch. 40:2, 3
  - type: text
    content: 'angry with his servants '
  - type: note
    content: '[ch. 39:20]'
  - type: text
    content: 'and put me and the chief baker in custody in the house of the captain of the guard, '
  '11':
  - type: note
    content: ch. 40:5
  - type: text
    content: 'we dreamed on the same night, he and I, each having a dream with its own interpretation. '
  '12':
  - type: text
    content: 'A young Hebrew was there with us, a servant of the captain of the guard. When we told him, '
  - type: note
    content: See ch. 40:12-19
  - type: text
    content: 'he interpreted our dreams to us, giving an interpretation to each man according to his dream. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: ch. 40:21, 22
  - type: text
    content: as he interpreted to us, so it came about. I was restored to my office, and the baker was hanged.”
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 105:20
  - type: text
    content: 'Then Pharaoh sent and called Joseph, and they '
  - type: note
    content: '[Dan. 2:25]'
  - type: text
    content: 'quickly brought him '
  - type: note
    content: '[1 Sam. 2:8; Ps. 113:7, 8]'
  - type: text
    content: 'out of the pit. And when he had shaved himself and changed his clothes, he came in before Pharaoh. '
  '15':
  - type: text
    content: 'And Pharaoh said to Joseph, “I have had a dream, and there is no one who can interpret it. '
  - type: note
    content: ver. 12; Dan. 5:16
  - type: text
    content: 'I have heard it said of you that when you hear a dream you can interpret it.” '
  '16':
  - type: text
    content: 'Joseph answered Pharaoh, '
  - type: note
    content: Dan. 2:30
  - type: text
    content: '“It is not in me; '
  - type: note
    content: ch. 40:8; Dan. 2:22, 28, 47
  - type: text
    content: God will give Pharaoh a favorable answer.”
  - type: note
    content: Or (compare Samaritan, Septuagint) Without God it is not possible to give Pharaoh an answer about his welfare
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Behold, '
  - type: note
    content: See ver. 1-7
  - type: text
    content: 'in my dream I was standing on the banks of the Nile. '
  '18':
  - type: text
    content: 'Seven cows, plump and attractive, came up out of the Nile and fed in the reed grass. '
  '19':
  - type: text
    content: 'Seven other cows came up after them, poor and very ugly and thin, such as I had never seen in all the land of Egypt. '
  '2':
  - type: text
    content: 'and behold, there came up out of the Nile seven cows, attractive and plump, and they fed in the reed grass. '
  '20':
  - type: text
    content: 'And the thin, ugly cows ate up the first seven plump cows, '
  '21':
  - type: text
    content: 'but when they had eaten them no one would have known that they had eaten them, for they were still as ugly as at the beginning. Then I awoke. '
  '22':
  - type: text
    content: 'I also saw in my dream seven ears growing on one stalk, full and good. '
  '23':
  - type: text
    content: 'Seven ears, withered, thin, and blighted by the east wind, sprouted after them, '
  '24':
  - type: text
    content: 'and the thin ears swallowed up the seven good ears. And '
  - type: note
    content: ver. 8; [Dan. 4:7]
  - type: text
    content: I told it to the magicians, but there was no one who could explain it to me.”
  '25':
  - type: text
    content: 'Then Joseph said to Pharaoh, “The dreams of Pharaoh are one; '
  - type: note
    content: '[Dan. 2:28, 29, 45; Rev. 4:1]'
  - type: text
    content: 'God has revealed to Pharaoh what he is about to do. '
  '26':
  - type: text
    content: 'The seven good cows are seven years, and the seven good ears are seven years; the dreams are one. '
  '27':
  - type: text
    content: 'The seven lean and ugly cows that came up after them are seven years, and the seven empty ears blighted by the east wind are also '
  - type: note
    content: '[2 Kgs. 8:1]'
  - type: text
    content: 'seven years of famine. '
  '28':
  - type: text
    content: 'It is as I told Pharaoh; '
  - type: note
    content: ver. 25
  - type: text
    content: 'God has shown to Pharaoh what he is about to do. '
  '29':
  - type: text
    content: 'There will come '
  - type: note
    content: ver. 47
  - type: text
    content: 'seven years of great plenty throughout all the land of Egypt, '
  '3':
  - type: text
    content: 'And behold, seven other cows, ugly and thin, came up out of the Nile after them, and stood by the other cows on the bank of the Nile. '
  '30':
  - type: text
    content: 'but after them there will arise '
  - type: note
    content: ver. 54; ch. 45:6
  - type: text
    content: 'seven years of famine, and all the plenty will be forgotten in the land of Egypt. '
  - type: note
    content: ch. 47:13
  - type: text
    content: 'The famine will consume the land, '
  '31':
  - type: text
    content: 'and the plenty will be unknown in the land by reason of the famine that will follow, for it will be very severe. '
  '32':
  - type: text
    content: 'And the doubling of Pharaoh’s dream means that the '
  - type: note
    content: Num. 23:19; Isa. 14:24; 46:10, 11
  - type: text
    content: 'thing is fixed by God, and God will shortly bring it about. '
  '33':
  - type: text
    content: 'Now therefore let Pharaoh select a discerning and wise man, and set him over the land of Egypt. '
  '34':
  - type: text
    content: Let Pharaoh proceed to appoint overseers over the land and take one-fifth of the produce of the land
  - type: note
    content: Or over the land and organize the land
  - type: text
    content: ' of Egypt during the seven plentiful years. '
  '35':
  - type: text
    content: 'And '
  - type: note
    content: ver. 48
  - type: text
    content: 'let them gather all the food of these good years that are coming and store up grain under the authority of Pharaoh for food in the cities, and let them keep it. '
  '36':
  - type: text
    content: That food shall be a reserve for the land against the seven years of famine that are to occur in the land of Egypt, so that the land may not perish through the famine.”
  - type: heading
    content: Joseph Rises to Power
  '37':
  - type: text
    content: 'This proposal pleased Pharaoh and all his servants. '
  '38':
  - type: text
    content: 'And Pharaoh said to his servants, “Can we find a man like this, '
  - type: note
    content: Num. 27:18; Dan. 4:8, 18; 5:11, 14
  - type: text
    content: in whom is the Spirit of God?”
  - type: note
    content: Or of the gods
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Since God has shown you all this, there is none so discerning and wise as you are. '
  '4':
  - type: text
    content: 'And the ugly, thin cows ate up the seven attractive, plump cows. And Pharaoh awoke. '
  '40':
  - type: note
    content: Ps. 105:21; Acts 7:10
  - type: text
    content: You shall be over my house, and all my people shall order themselves as you command.
  - type: note
    content: Hebrew and according to your command all my people shall kiss the ground
  - type: text
    content: ' Only as regards the throne will I be greater than you.” '
  '41':
  - type: text
    content: 'And Pharaoh said to Joseph, “See, '
  - type: note
    content: ch. 42:6
  - type: text
    content: 'I have set you over all the land of Egypt.” '
  '42':
  - type: text
    content: 'Then Pharaoh '
  - type: note
    content: Esth. 3:10; 8:2, 8, 10
  - type: text
    content: 'took his signet ring from his hand and put it on Joseph’s hand, and '
  - type: note
    content: '[Esth. 8:15]'
  - type: text
    content: 'clothed him in garments of fine linen '
  - type: note
    content: Ezek. 16:11; [Dan. 5:7, 29]
  - type: text
    content: 'and put a gold chain about his neck. '
  '43':
  - type: text
    content: 'And he made him ride in his second chariot. '
  - type: note
    content: '[Esth. 6:9]'
  - type: text
    content: And they called out before him, “Bow the knee!”
  - type: note
    content: Abrek, probably an Egyptian word, similar in sound to the Hebrew word meaning to kneel
  - type: text
    content: ' Thus he set him '
  - type: note
    content: ver. 40; ch. 42:6; 45:8, 9, 26
  - type: text
    content: 'over all the land of Egypt. '
  '44':
  - type: text
    content: 'Moreover, Pharaoh said to Joseph, “I am Pharaoh, and '
  - type: note
    content: '[Ps. 105:21, 22]'
  - type: text
    content: 'without your consent no one shall lift up hand or foot in all the land of Egypt.” '
  '45':
  - type: text
    content: And Pharaoh called Joseph’s name Zaphenath-paneah. And he gave him in marriage Asenath, the daughter of Potiphera priest of On. So Joseph went out over the land of Egypt.
  '46':
  - type: text
    content: 'Joseph was thirty years old when he '
  - type: note
    content: 1 Sam. 16:21; 1 Kgs. 12:6, 8; Dan. 1:19
  - type: text
    content: 'entered the service of Pharaoh king of Egypt. And Joseph went out from the presence of Pharaoh and went through all the land of Egypt. '
  '47':
  - type: text
    content: 'During the seven plentiful years the earth produced abundantly, '
  '48':
  - type: text
    content: 'and he gathered up all the food of these seven years, which occurred in the land of Egypt, and put the food in the cities. He put in every city the food from the fields around it. '
  '49':
  - type: text
    content: 'And Joseph stored up grain in great abundance, '
  - type: note
    content: ch. 22:17; Judg. 7:12; 1 Sam. 13:5; Ps. 78:27
  - type: text
    content: like the sand of the sea, until he ceased to measure it, for it could not be measured.
  '5':
  - type: text
    content: 'And he fell asleep and dreamed a second time. And behold, seven ears of grain, plump and good, were growing on one stalk. '
  '50':
  - type: text
    content: 'Before the year of famine came, '
  - type: note
    content: ch. 46:20; 48:5
  - type: text
    content: 'two sons were born to Joseph. Asenath, the daughter of Potiphera priest of On, bore them to him. '
  '51':
  - type: text
    content: Joseph called the name of the firstborn Manasseh. “For,” he said, “God has made me forget all my hardship and all my father’s house.”
  - type: note
    content: Manasseh sounds like the Hebrew for making to forget
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'The name of the second he called Ephraim, “For God has '
  - type: note
    content: '[ch. 49:22; Hos. 13:15]'
  - type: text
    content: made me fruitful in the land of my affliction.”
  - type: note
    content: Ephraim sounds like the Hebrew for making fruitful
  '53':
  - type: text
    content: 'The seven years of plenty that occurred in the land of Egypt came to an end, '
  '54':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 105:16; Acts 7:11
  - type: text
    content: 'the seven years of famine began to come, '
  - type: note
    content: ver. 30
  - type: text
    content: 'as Joseph had said. There was famine in all lands, but in all the land of Egypt there was bread. '
  '55':
  - type: text
    content: When all the land of Egypt was famished, the people cried to Pharaoh for bread. Pharaoh said to all the Egyptians, “Go to Joseph. What he says to you, do.”
  '56':
  - type: text
    content: So when the famine had spread over all the land, Joseph opened all the storehouses
  - type: note
    content: Hebrew all that was in them
  - type: text
    content: ' and '
  - type: note
    content: ch. 42:6; [ch. 47:14, 20, 24]
  - type: text
    content: 'sold to the Egyptians, for the famine was severe in the land of Egypt. '
  '57':
  - type: text
    content: 'Moreover, all the earth came to Egypt to Joseph to buy grain, because the famine was severe '
  - type: note
    content: ver. 54, 56
  - type: text
    content: over all the earth.
  '6':
  - type: text
    content: 'And behold, after them sprouted seven ears, thin and '
  - type: note
    content: '[Ezek. 17:10; 19:12]; Hos. 13:15'
  - type: text
    content: 'blighted by the east wind. '
  '7':
  - type: text
    content: 'And the thin ears swallowed up the seven plump, full ears. And Pharaoh awoke, and behold, it was a dream. '
  '8':
  - type: text
    content: 'So in the morning '
  - type: note
    content: Ps. 77:4; Dan. 2:1, 3
  - type: text
    content: 'his spirit was troubled, and he sent and called for all the '
  - type: note
    content: ver. 24; Ex. 7:11, 22; [Dan. 1:20; 2:2; 4:7; Matt. 2:1]
  - type: text
    content: magicians of Egypt and all its wise men. Pharaoh told them his dreams, but there was none who could interpret them to Pharaoh.
  '9':
  - type: text
    content: 'Then the chief cupbearer said to Pharaoh, “I remember my offenses today. '
