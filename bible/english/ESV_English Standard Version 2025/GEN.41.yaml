    marker-yv: yv-n
  - type: text
    text: magicians of Egypt and all its wise men. Pharaoh told them his dreams, but there was none who could interpret them to Pharaoh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the chief cupbearer said to Pharaoh, “I remember my offenses today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Pharaoh was '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:2
      metadata:
        usfm: GEN.40.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: GEN.40.3
    marker-yv: yv-n
  - type: text
    text: 'angry with his servants '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 39:20
      metadata:
        usfm: GEN.39.20
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'and put me and the chief baker in custody in the house of the captain of the guard, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:5
      metadata:
        usfm: GEN.40.5
    marker-yv: yv-n
  - type: text
    text: 'we dreamed on the same night, he and I, each having a dream with its own interpretation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A young Hebrew was there with us, a servant of the captain of the guard. When we told him, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:12-19
      metadata:
        usfm: GEN.40.12+GEN.40.13+GEN.40.14+GEN.40.15+GEN.40.16+GEN.40.17+GEN.40.18+GEN.40.19
    marker-yv: yv-n
  - type: text
    text: 'he interpreted our dreams to us, giving an interpretation to each man according to his dream. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:21
      metadata:
        usfm: GEN.40.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: GEN.40.22
    marker-yv: yv-n
  - type: text
    text: as he interpreted to us, so it came about. I was restored to my office, and the baker was hanged.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 105:20
      metadata:
        usfm: PSA.105.20
    marker-yv: yv-n
  - type: text
    text: 'Then Pharaoh sent and called Joseph, and they '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:25
      metadata:
        usfm: DAN.2.25
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'quickly brought him '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Sam. 2:8
      metadata:
        usfm: 1SA.2.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 113:7
      metadata:
        usfm: PSA.113.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: PSA.113.8
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'out of the pit. And when he had shaved himself and changed his clothes, he came in before Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Pharaoh said to Joseph, “I have had a dream, and there is no one who can interpret it. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: GEN.41.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 5:16
      metadata:
        usfm: DAN.5.16
    marker-yv: yv-n
  - type: text
    text: 'I have heard it said of you that when you hear a dream you can interpret it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph answered Pharaoh, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:30
      metadata:
        usfm: DAN.2.30
    marker-yv: yv-n
  - type: text
    text: '“It is not in me; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:8
      metadata:
        usfm: GEN.40.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:22
      metadata:
        usfm: DAN.2.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: DAN.2.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '47'
      metadata:
        usfm: DAN.2.47
    marker-yv: yv-n
  - type: text
    text: God will give Pharaoh a favorable answer.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or (compare Samaritan, Septuagint) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Without God it is not possible to give Pharaoh an answer about his welfare
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Pharaoh said to Joseph, “Behold, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1-7
      metadata:
        usfm: GEN.41.1
    marker-yv: yv-n
  - type: text
    text: 'in my dream I was standing on the banks of the Nile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Seven cows, plump and attractive, came up out of the Nile and fed in the reed grass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seven other cows came up after them, poor and very ugly and thin, such as I had never seen in all the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the thin, ugly cows ate up the first seven plump cows, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but when they had eaten them no one would have known that they had eaten them, for they were still as ugly as at the beginning. Then I awoke. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I also saw in my dream seven ears growing on one stalk, full and good. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Seven ears, withered, thin, and blighted by the east wind, sprouted after them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and the thin ears swallowed up the seven good ears. And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: GEN.41.8
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 4:7
      metadata:
        usfm: DAN.4.7
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: I told it to the magicians, but there was no one who could explain it to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joseph said to Pharaoh, “The dreams of Pharaoh are one; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:28
      metadata:
        usfm: DAN.2.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: DAN.2.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '45'
      metadata:
        usfm: DAN.2.45
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 4:1
      metadata:
        usfm: REV.4.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'God has revealed to Pharaoh what he is about to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The seven good cows are seven years, and the seven good ears are seven years; the dreams are one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The seven lean and ugly cows that came up after them are seven years, and the seven empty ears blighted by the east wind are also '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Kgs. 8:1
      metadata:
        usfm: 2KI.8.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'seven years of famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'It is as I told Pharaoh; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: GEN.41.25
    marker-yv: yv-n
  - type: text
    text: 'God has shown to Pharaoh what he is about to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'There will come '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '47'
      metadata:
        usfm: GEN.41.47
    marker-yv: yv-n
  - type: text
    text: 'seven years of great plenty throughout all the land of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'but after them there will arise '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '54'
      metadata:
        usfm: GEN.41.54
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 45:6
      metadata:
        usfm: GEN.45.6
    marker-yv: yv-n
  - type: text
    text: 'seven years of famine, and all the plenty will be forgotten in the land of Egypt. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 47:13
      metadata:
        usfm: GEN.47.13
    marker-yv: yv-n
  - type: text
    text: 'The famine will consume the land, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and the plenty will be unknown in the land by reason of the famine that will follow, for it will be very severe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the doubling of Pharaoh’s dream means that the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Num. 23:19
      metadata:
        usfm: NUM.23.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 14:24
      metadata:
        usfm: ISA.14.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:10
      metadata:
        usfm: ISA.46.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: ISA.46.11
    marker-yv: yv-n
  - type: text
    text: 'thing is fixed by God, and God will shortly bring it about. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now therefore let Pharaoh select a discerning and wise man, and set him over the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Let Pharaoh proceed to appoint overseers over the land and take one-fifth of the produce of the land
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: over the land and organize the land
    marker-yv: yv-n
  - type: text
    text: ' of Egypt during the seven plentiful years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
