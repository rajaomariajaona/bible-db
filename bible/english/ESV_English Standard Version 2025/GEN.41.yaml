  children:
  - type: text
    text: Joseph Interprets Pharaoh’s Dreams
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After two whole years, Pharaoh dreamed that he was standing by the Nile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and behold, there came up out of the Nile seven cows, attractive and plump, and they fed in the reed grass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And behold, seven other cows, ugly and thin, came up out of the Nile after them, and stood by the other cows on the bank of the Nile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the ugly, thin cows ate up the seven attractive, plump cows. And Pharaoh awoke. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he fell asleep and dreamed a second time. And behold, seven ears of grain, plump and good, were growing on one stalk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And behold, after them sprouted seven ears, thin and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 17:10
      metadata:
        usfm: EZK.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:12
      metadata:
        usfm: EZK.19.12
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']; Hos. 13:15'
    marker-yv: yv-n
  - type: text
    text: 'blighted by the east wind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the thin ears swallowed up the seven plump, full ears. And Pharaoh awoke, and behold, it was a dream. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So in the morning '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 77:4
      metadata:
        usfm: PSA.77.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:1
      metadata:
        usfm: DAN.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: DAN.2.3
    marker-yv: yv-n
  - type: text
    text: 'his spirit was troubled, and he sent and called for all the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
