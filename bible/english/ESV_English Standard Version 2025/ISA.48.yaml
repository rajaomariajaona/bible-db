document_id: ISA.48,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Refined for God’s Glory
  - type: text
    content: Hear this, O house of Jacob,
  - type: note
    content: ch. 43:1
  - type: text
    content: who are called by the name of Israel,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 68:26
  - type: text
    content: who came from the waters of Judah,
  - type: note
    content: Jer. 7:9
  - type: text
    content: 'who swear by the name of the '
  - type: text
    content: Lord
  - type: text
    content: and confess the God of Israel,
  - type: text
    content: but not in truth or right.
  '10':
  - type: text
    content: 'Behold, I have refined you, '
  - type: note
    content: '[1 Pet. 1:7]'
  - type: text
    content: but not as silver;
  - type: note
    content: '[ Deut. 4:20; Ezek. 22:18, 20, 22 ]'
  - type: text
    content: I have tried
  - type: note
    content: Or I have chosen
  - type: text
    content: ' you in the furnace of affliction.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 43:25; Ezek. 20:9
  - type: text
    content: For my own sake, for my own sake, I do it,
  - type: text
    content: for how should my name
  - type: note
    content: Hebrew lacks my name
  - type: text
    content: ' be profaned?'
  - type: note
    content: ch. 42:8
  - type: text
    content: My glory I will not give to another.
  - type: heading
    content: The Lord’s Call to Israel
  '12':
  - type: text
    content: “Listen to me, O Jacob,
  - type: text
    content: and Israel, whom I called!
  - type: text
    content: 'I am he; '
  - type: note
    content: See ch. 41:4
  - type: text
    content: I am the first,
  - type: text
    content: and I am the last.
  '13':
  - type: text
    content: 'My hand '
  - type: note
    content: ch. 51:13; [Ps. 102:25; Heb. 1:10]
  - type: text
    content: laid the foundation of the earth,
  - type: text
    content: 'and my right hand '
  - type: note
    content: ch. 51:13; [Ps. 102:25; Heb. 1:10]
  - type: text
    content: spread out the heavens;
  - type: note
    content: '[ch. 40:26 ]'
  - type: text
    content: when I call to them,
  - type: text
    content: they stand forth together.
  '14':
  - type: text
    content: “Assemble, all of you, and listen!
  - type: note
    content: '[ch. 41:26 ]'
  - type: text
    content: Who among them has declared these things?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' loves him;'
  - type: note
    content: ch. 46:10, 11
  - type: text
    content: he shall perform his purpose on Babylon,
  - type: text
    content: 'and his arm shall be against '
  - type: note
    content: ch. 23:13; 47:1
  - type: text
    content: the Chaldeans.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 45:1-3
  - type: text
    content: I, even I, have spoken and called him;
  - type: text
    content: I have brought him, and he will prosper in his way.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 45:19
  - type: text
    content: 'Draw near to me, hear this:'
  - type: text
    content: from the beginning I have not spoken in secret,
  - type: text
    content: from the time it came to be I have been there.”
  - type: text
    content: 'And now '
  - type: note
    content: ch. 61:1
  - type: text
    content: 'the Lord '
  - type: text
    content: God
  - type: text
    content: ' has sent me, and his Spirit.'
  '17':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'your Redeemer, the Holy One of Israel:'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who teaches you to profit,
  - type: text
    content: who leads you in the way you should go.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 81:13; Luke 19:42; [ Deut. 32:29 ]
  - type: text
    content: Oh that you had paid attention to my commandments!
  - type: note
    content: ch. 66:12
  - type: text
    content: Then your peace would have been like a river,
  - type: text
    content: and your righteousness like the waves of the sea;
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:22; Gen. 22:17; Hos. 1:10
  - type: text
    content: your offspring would have been like the sand,
  - type: text
    content: and your descendants like its grains;
  - type: text
    content: their name would never be cut off
  - type: text
    content: or destroyed from before me.”
  '2':
  - type: text
    content: For they call themselves after the holy city,
  - type: note
    content: '[ Mic. 3:11 ]'
  - type: text
    content: and stay themselves on the God of Israel;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is his name.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 52:11; Jer. 50:8; 51:6, 45; Zech. 2:6, 7
  - type: text
    content: 'Go out from Babylon, flee from '
  - type: note
    content: ch. 23:13; 47:1
  - type: text
    content: Chaldea,
  - type: text
    content: 'declare this '
  - type: note
    content: '[ch. 35:10; 52:9]'
  - type: text
    content: with a shout of joy, proclaim it,
  - type: text
    content: send it out to the end of the earth;
  - type: text
    content: 'say, '
  - type: note
    content: ch. 44:23; [Ex. 19:4-6]
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed his servant Jacob!”'
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 35:6; 44:3; Deut. 8:15 ]'
  - type: text
    content: They did not thirst when he led them through the deserts;
  - type: note
    content: ch. 43:19; Ex. 17:6; Num. 20:11
  - type: text
    content: he made water flow for them from the rock;
  - type: text
    content: he split the rock and the water gushed out.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 57:21
  - type: text
    content: '“There is no peace,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “for the wicked.”'
  '3':
  - type: text
    content: '“The former things '
  - type: note
    content: ch. 41:26
  - type: text
    content: I declared of old;
  - type: text
    content: they went out from my mouth, and I announced them;
  - type: text
    content: then suddenly I did them, and they came to pass.
  '4':
  - type: text
    content: 'Because I know that '
  - type: note
    content: '[Ex. 32:9]'
  - type: text
    content: you are obstinate,
  - type: text
    content: and your neck is an iron sinew
  - type: text
    content: and your forehead brass,
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: I declared them to you from of old,
  - type: text
    content: before they came to pass I announced them to you,
  - type: text
    content: 'lest you should say, '
  - type: note
    content: See Jer. 44:15-17
  - type: text
    content: ‘My idol did them,
  - type: text
    content: my carved image and my metal image commanded them.’
  '6':
  - type: text
    content: “You have heard; now see all this;
  - type: text
    content: and will you not declare it?
  - type: text
    content: 'From this time forth '
  - type: note
    content: See ch. 43:19
  - type: text
    content: I announce to you new things,
  - type: text
    content: hidden things that you have not known.
  '7':
  - type: text
    content: They are created now, not long ago;
  - type: text
    content: before today you have never heard of them,
  - type: text
    content: lest you should say, ‘Behold, I knew them.’
  '8':
  - type: text
    content: You have never heard, you have never known,
  - type: text
    content: from of old your ear has not been opened.
  - type: text
    content: For I knew that you would surely deal treacherously,
  - type: text
    content: 'and that '
  - type: note
    content: ch. 46:8
  - type: text
    content: from before birth you were called a rebel.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Mal. 3:6 ]'
  - type: text
    content: “For my name’s sake I defer my anger;
  - type: text
    content: for the sake of my praise I restrain it for you,
  - type: text
    content: that I may not cut you off.
