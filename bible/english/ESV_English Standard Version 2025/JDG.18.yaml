document_id: JDG.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Danites Take the Levite and the Idol
  - type: text
    content: ' '
  - type: note
    content: ch. 17:6; 21:25
  - type: text
    content: 'In those days there was no king in Israel. And in those days '
  - type: note
    content: '[ch. 1:34; Josh. 19:47, 48]'
  - type: text
    content: 'the tribe of the people of Dan was seeking for itself an inheritance to dwell in, for until then no inheritance among the tribes of Israel had fallen to them. '
  '10':
  - type: text
    content: 'As soon as you go, you will come to an '
  - type: note
    content: ver. 7, 27
  - type: text
    content: 'unsuspecting people. The land is spacious, for God has given it into your hands, '
  - type: note
    content: '[ch. 19:19; Deut. 8:9]'
  - type: text
    content: a place where there is no lack of anything that is in the earth.”
  '11':
  - type: text
    content: 'So 600 men of the tribe of Dan, '
  - type: note
    content: ver. 16
  - type: text
    content: 'armed with weapons of war, set out from Zorah and Eshtaol, '
  '12':
  - type: text
    content: 'and went up and encamped at Kiriath-jearim in Judah. On this account that place is called '
  - type: note
    content: ch. 13:25
  - type: text
    content: Mahaneh-dan
  - type: note
    content: Mahaneh-dan means camp of Dan
  - type: text
    content: ' to this day; behold, it is west of '
  - type: note
    content: Josh. 15:60
  - type: text
    content: 'Kiriath-jearim. '
  '13':
  - type: text
    content: 'And they passed on from there to '
  - type: note
    content: ver. 2
  - type: text
    content: the hill country of Ephraim, and came to the house of Micah.
  '14':
  - type: text
    content: 'Then the five men who had gone to scout out the country of Laish said to their brothers, “Do you know that '
  - type: note
    content: ch. 17:4, 5
  - type: text
    content: 'in these houses there are an ephod, household gods, a carved image, and a metal image? Now therefore consider what you will do.” '
  '15':
  - type: text
    content: 'And they turned aside there and came to the house of the young Levite, at the home of Micah, and '
  - type: note
    content: Gen. 43:27
  - type: text
    content: 'asked him about his welfare. '
  '16':
  - type: text
    content: 'Now the 600 men of the Danites, '
  - type: note
    content: ver. 11
  - type: text
    content: 'armed with their weapons of war, stood by the entrance of the gate. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: ver. 2, 14
  - type: text
    content: 'the five men who had gone to scout out the land went up and entered and took '
  - type: note
    content: ver. 14; ch. 17:4, 5
  - type: text
    content: 'the carved image, the ephod, the household gods, and the metal image, while the priest stood by the entrance of the gate with the 600 men armed with weapons of war. '
  '18':
  - type: text
    content: 'And when these went into Micah’s house and took '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the carved image, the ephod, the household gods, and the metal image, the priest said to them, “What are you doing?” '
  '19':
  - type: text
    content: 'And they said to him, “Keep quiet; '
  - type: note
    content: Job 21:5; 29:9; 40:4; Prov. 30:32; Mic. 7:16
  - type: text
    content: 'put your hand on your mouth and come with us and be to us '
  - type: note
    content: ch. 17:10
  - type: text
    content: 'a father and a priest. Is it better for you to be priest to the house of one man, or to be priest to a tribe and clan in Israel?” '
  '2':
  - type: text
    content: 'So the people of Dan sent five able men from the whole number of their tribe, '
  - type: note
    content: ver. 8, 11; ch. 13:25
  - type: text
    content: 'from Zorah and from Eshtaol, '
  - type: note
    content: '[Num. 13:17; Josh. 2:1]'
  - type: text
    content: 'to spy out the land and to explore it. And they said to them, “Go and explore the land.” And they came '
  - type: note
    content: ch. 17:1, 8; See Josh. 24:33
  - type: text
    content: 'to the hill country of Ephraim, to the house of Micah, and lodged there. '
  '20':
  - type: text
    content: And the priest’s heart was glad. He took the ephod and the household gods and the carved image and went along with the people.
  '21':
  - type: text
    content: 'So they turned and departed, putting the little ones and the livestock and '
  - type: note
    content: '[1 Sam. 17:22; Isa. 10:28]'
  - type: text
    content: 'the goods in front of them. '
  '22':
  - type: text
    content: 'When they had gone a distance from the home of Micah, the men who were in the houses near Micah’s house were called out, and they overtook the people of Dan. '
  '23':
  - type: text
    content: 'And they shouted to the people of Dan, who turned around and said to Micah, “What is the matter with you, that you come with such a company?” '
  '24':
  - type: text
    content: 'And he said, '
  - type: note
    content: '[Gen. 31:30]'
  - type: text
    content: '“You take my gods that I made and the priest, and go away, and what have I left? How then do you ask me, ‘What is the matter with you?’” '
  '25':
  - type: text
    content: 'And the people of Dan said to him, “Do not let your voice be heard among us, lest angry fellows fall upon you, and you lose your life with the lives of your household.” '
  '26':
  - type: text
    content: Then the people of Dan went their way. And when Micah saw that they were too strong for him, he turned and went back to his home.
  '27':
  - type: text
    content: 'But the people of Dan took what Micah had made, and the priest who belonged to him, and they came to Laish, to a people '
  - type: note
    content: ver. 7, 10
  - type: text
    content: 'quiet and unsuspecting, and '
  - type: note
    content: Josh. 19:47
  - type: text
    content: 'struck them with the edge of the sword and burned the city with fire. '
  '28':
  - type: text
    content: 'And there was no deliverer because it was '
  - type: note
    content: ver. 7
  - type: text
    content: 'far from Sidon, and they had no dealings with anyone. It was in the valley that belongs to '
  - type: note
    content: 2 Sam. 10:6; [Num. 13:21; Josh. 19:28]
  - type: text
    content: 'Beth-rehob. Then they rebuilt the city and lived in it. '
  '29':
  - type: text
    content: 'And they named the city '
  - type: note
    content: ch. 20:1; Gen. 14:14; 1 Kgs. 12:29, 30; 15:20
  - type: text
    content: 'Dan, after the name of Dan their ancestor, who was born to Israel; but '
  - type: note
    content: ver. 7
  - type: text
    content: 'the name of the city was Laish at the first. '
  '3':
  - type: text
    content: 'When they were by the house of Micah, they recognized the voice of the young Levite. And they turned aside and said to him, “Who brought you here? What are you doing in this place? What is your business here?” '
  '30':
  - type: text
    content: 'And the people of Dan set up the carved image for themselves, and Jonathan the son of Gershom, '
  - type: note
    content: Ex. 2:22; 18:3
  - type: text
    content: son of Moses,
  - type: note
    content: Or Manasseh
  - type: text
    content: ' '
  - type: note
    content: '[ch. 17:12]'
  - type: text
    content: 'and his sons were priests to the tribe of the Danites until the day '
  - type: note
    content: ch. 13:1; 1 Sam. 4:2, 3, 10, 11; See Ps. 78:60-64
  - type: text
    content: 'of the captivity of the land. '
  '31':
  - type: text
    content: 'So they set up Micah’s carved image that he made, '
  - type: note
    content: Josh. 18:1; 1 Sam. 1:3
  - type: text
    content: as long as the house of God was at Shiloh.
  '4':
  - type: text
    content: 'And he said to them, “This is how Micah dealt with me: '
  - type: note
    content: ch. 17:10
  - type: text
    content: 'he has hired me, and I have become his priest.” '
  '5':
  - type: text
    content: 'And they said to him, '
  - type: note
    content: Num. 27:21
  - type: text
    content: '“Inquire of God, please, that we may know whether the journey on which we are setting out will succeed.” '
  '6':
  - type: text
    content: 'And the priest said to them, '
  - type: note
    content: 1 Sam. 1:17; [1 Kgs. 22:6]
  - type: text
    content: '“Go in peace. The journey on which you go is under the eye of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '7':
  - type: text
    content: 'Then the five men departed and came to '
  - type: note
    content: '[Josh. 19:47]'
  - type: text
    content: 'Laish and saw the people who were there, how they lived in security, after the manner of the Sidonians, '
  - type: note
    content: ver. 10, 27
  - type: text
    content: quiet and unsuspecting, lacking
  - type: note
    content: Compare 18:10; the meaning of the Hebrew word is uncertain
  - type: text
    content: ' nothing that is in the earth and possessing wealth, and how '
  - type: note
    content: ver. 28
  - type: text
    content: 'they were far from the Sidonians and had no dealings with anyone. '
  '8':
  - type: text
    content: 'And when they came to their brothers at '
  - type: note
    content: ver. 2, 11
  - type: text
    content: 'Zorah and Eshtaol, their brothers said to them, “What do you report?” '
  '9':
  - type: text
    content: 'They said, '
  - type: note
    content: '[Num. 13:20; Josh. 2:23, 24]'
  - type: text
    content: '“Arise, and let us go up against them, for we have seen the land, and behold, it is very good. '
  - type: note
    content: 1 Kgs. 22:3
  - type: text
    content: 'And will you do nothing? '
  - type: note
    content: '[Josh. 18:3]'
  - type: text
    content: 'Do not be slow to go, to enter in and possess the land. '
