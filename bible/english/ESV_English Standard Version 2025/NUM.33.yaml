document_id: NUM.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Recounting Israel’s Journey
  - type: text
    content: 'These are the stages of the people of Israel, when they went out of the land of Egypt by their companies under the leadership of Moses and Aaron. '
  '10':
  - type: text
    content: 'And they set out from Elim and camped by the Red Sea. '
  '11':
  - type: text
    content: 'And they set out from the Red Sea and camped in '
  - type: note
    content: Ex. 16:1
  - type: text
    content: 'the wilderness of Sin. '
  '12':
  - type: text
    content: 'And they set out from the wilderness of Sin and camped at Dophkah. '
  '13':
  - type: text
    content: 'And they set out from Dophkah and camped at Alush. '
  '14':
  - type: text
    content: 'And they set out from Alush and camped at '
  - type: note
    content: Ex. 17:1
  - type: text
    content: 'Rephidim, where there was no water for the people to drink. '
  '15':
  - type: text
    content: 'And they set out from Rephidim and camped in the '
  - type: note
    content: Ex. 19:1, 2
  - type: text
    content: 'wilderness of Sinai. '
  '16':
  - type: text
    content: 'And they set out from the wilderness of Sinai and camped at '
  - type: note
    content: ch. 11:34
  - type: text
    content: 'Kibroth-hattaavah. '
  '17':
  - type: text
    content: 'And they set out from Kibroth-hattaavah and camped at '
  - type: note
    content: ch. 11:35; 12:16
  - type: text
    content: 'Hazeroth. '
  '18':
  - type: text
    content: 'And they '
  - type: note
    content: ch. 12:16
  - type: text
    content: 'set out from Hazeroth and camped at Rithmah. '
  '19':
  - type: text
    content: 'And they set out from Rithmah and camped at Rimmon-perez. '
  '2':
  - type: text
    content: 'Moses wrote down their starting places, '
  - type: note
    content: See ch. 9:17-23
  - type: text
    content: 'stage by stage, by command of the '
  - type: text
    content: Lord
  - type: text
    content: ', and these are their stages according to their starting places. '
  '20':
  - type: text
    content: 'And they set out from Rimmon-perez and camped at Libnah. '
  '21':
  - type: text
    content: 'And they set out from Libnah and camped at Rissah. '
  '22':
  - type: text
    content: 'And they set out from Rissah and camped at Kehelathah. '
  '23':
  - type: text
    content: 'And they set out from Kehelathah and camped at Mount Shepher. '
  '24':
  - type: text
    content: 'And they set out from Mount Shepher and camped at Haradah. '
  '25':
  - type: text
    content: 'And they set out from Haradah and camped at Makheloth. '
  '26':
  - type: text
    content: 'And they set out from Makheloth and camped at Tahath. '
  '27':
  - type: text
    content: 'And they set out from Tahath and camped at Terah. '
  '28':
  - type: text
    content: 'And they set out from Terah and camped at Mithkah. '
  '29':
  - type: text
    content: 'And they set out from Mithkah and camped at Hashmonah. '
  '3':
  - type: text
    content: 'They '
  - type: note
    content: Ex. 12:37
  - type: text
    content: 'set out from Rameses in '
  - type: note
    content: Ex. 12:2; 13:4
  - type: text
    content: 'the first month, on the fifteenth day of the first month. On the day after the Passover, the people of Israel went out '
  - type: note
    content: Ex. 14:8
  - type: text
    content: 'triumphantly in the sight of all the Egyptians, '
  '30':
  - type: text
    content: 'And they set out from Hashmonah and camped at Moseroth. '
  '31':
  - type: text
    content: 'And they set out from Moseroth and camped at '
  - type: note
    content: '[Deut. 10:6]'
  - type: text
    content: 'Bene-jaakan. '
  '32':
  - type: text
    content: 'And they set out from Bene-jaakan and camped at '
  - type: note
    content: Deut. 10:7
  - type: text
    content: 'Hor-haggidgad. '
  '33':
  - type: text
    content: 'And they set out from Hor-haggidgad and camped at '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'Jotbathah. '
  '34':
  - type: text
    content: 'And they set out from Jotbathah and camped at Abronah. '
  '35':
  - type: text
    content: 'And they set out from Abronah and camped at '
  - type: note
    content: Deut. 2:8; 1 Kgs. 9:26; 22:48; 2 Chr. 8:17
  - type: text
    content: 'Ezion-geber. '
  '36':
  - type: text
    content: 'And they set out from Ezion-geber and camped in the '
  - type: note
    content: ch. 20:1; 27:14
  - type: text
    content: 'wilderness of Zin (that is, Kadesh). '
  '37':
  - type: text
    content: 'And they set out from '
  - type: note
    content: ch. 20:1, 14, 22
  - type: text
    content: 'Kadesh and camped at '
  - type: note
    content: ch. 20:23; 21:4; 34:7, 8
  - type: text
    content: Mount Hor, on the edge of the land of Edom.
  '38':
  - type: text
    content: 'And Aaron the priest went up '
  - type: note
    content: ch. 20:25-28; Deut. 32:50; [Deut. 10:6]
  - type: text
    content: 'Mount Hor at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' and died there, in the fortieth year after the people of Israel had come out of the land of Egypt, on the first day of the fifth month. '
  '39':
  - type: text
    content: 'And Aaron was '
  - type: note
    content: '[Ex. 7:7]'
  - type: text
    content: 123 years old when he died on Mount Hor.
  '4':
  - type: text
    content: 'while the Egyptians were burying all their firstborn, '
  - type: note
    content: Ex. 12:29
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck down among them. '
  - type: note
    content: Ex. 12:12; [Isa. 19:1]
  - type: text
    content: 'On their gods also the '
  - type: text
    content: Lord
  - type: text
    content: ' executed judgments.'
  '40':
  - type: text
    content: 'And '
  - type: note
    content: ch. 21:1
  - type: text
    content: the Canaanite, the king of Arad, who lived in the Negeb in the land of Canaan, heard of the coming of the people of Israel.
  '41':
  - type: text
    content: 'And they set out from Mount Hor and camped at Zalmonah. '
  '42':
  - type: text
    content: 'And they set out from Zalmonah and camped at Punon. '
  '43':
  - type: text
    content: 'And they set out from Punon and camped at '
  - type: note
    content: ch. 21:10
  - type: text
    content: 'Oboth. '
  '44':
  - type: text
    content: 'And they set out from Oboth and camped at '
  - type: note
    content: ch. 21:11
  - type: text
    content: 'Iye-abarim, in the territory of Moab. '
  '45':
  - type: text
    content: 'And they set out from Iyim and camped at '
  - type: note
    content: ch. 21:30; [ch. 32:34]
  - type: text
    content: 'Dibon-gad. '
  '46':
  - type: text
    content: 'And they set out from Dibon-gad and camped at Almon-diblathaim. '
  '47':
  - type: text
    content: 'And they set out from Almon-diblathaim '
  - type: note
    content: Deut. 32:49
  - type: text
    content: 'and camped in the mountains of Abarim, before Nebo. '
  '48':
  - type: text
    content: 'And they set out from the mountains of Abarim and camped in '
  - type: note
    content: ch. 22:1
  - type: text
    content: 'the plains of Moab by the Jordan at Jericho; '
  '49':
  - type: text
    content: 'they camped by the Jordan from Beth-jeshimoth as far as '
  - type: note
    content: See ch. 25:1
  - type: text
    content: Abel-shittim in the plains of Moab.
  - type: heading
    content: Drive Out the Inhabitants
  '5':
  - type: text
    content: 'So the people of Israel set out from Rameses and camped at '
  - type: note
    content: Ex. 12:37
  - type: text
    content: 'Succoth. '
  '50':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the plains of Moab by the Jordan at Jericho, saying, '
  '51':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: Deut. 9:1; [Josh. 3:17]
  - type: text
    content: 'When you pass over the Jordan into the land of Canaan, '
  '52':
  - type: text
    content: 'then '
  - type: note
    content: ch. 32:21
  - type: text
    content: 'you shall drive out '
  - type: note
    content: Ex. 23:24, 33; 34:13; Deut. 7:2, 5; 12:3
  - type: text
    content: 'all the inhabitants of the land from before you and destroy all their '
  - type: note
    content: Lev. 26:1
  - type: text
    content: 'figured stones and destroy all their metal images and demolish all their high places. '
  '53':
  - type: text
    content: 'And you shall take possession of the land and settle in it, for I have given the land to you to possess it. '
  '54':
  - type: note
    content: ch. 26:53, 55
  - type: text
    content: 'You shall inherit the land by lot according to your clans. '
  - type: note
    content: ch. 26:54; 35:8
  - type: text
    content: 'To a large tribe you shall give a large inheritance, and to a small tribe you shall give a small inheritance. Wherever the lot falls for anyone, that shall be his. According to the tribes of your fathers you shall inherit. '
  '55':
  - type: text
    content: 'But if you do not drive out the inhabitants of the land from before you, then those of them whom you let remain shall be as '
  - type: note
    content: Josh. 23:13; Judg. 2:3; Ps. 106:34, 36
  - type: text
    content: 'barbs in your eyes and thorns in your sides, and they shall trouble you in the land where you dwell. '
  '56':
  - type: text
    content: 'And I will do to you '
  - type: note
    content: '[Deut. 28:63]'
  - type: text
    content: as I thought to do to them.”
  '6':
  - type: text
    content: 'And they set out from Succoth and camped at '
  - type: note
    content: Ex. 13:20
  - type: text
    content: 'Etham, which is on the edge of the wilderness. '
  '7':
  - type: text
    content: 'And they set out from Etham and turned back to '
  - type: note
    content: Ex. 14:2, 9
  - type: text
    content: 'Pi-hahiroth, which is east of Baal-zephon, and they camped before Migdol. '
  '8':
  - type: text
    content: And they set out from before Hahiroth
  - type: note
    content: Some manuscripts and versions Pi-hahiroth
  - type: text
    content: ' and '
  - type: note
    content: Ex. 14:22
  - type: text
    content: 'passed through the midst of the sea into the wilderness, and they '
  - type: note
    content: Ex. 15:22, 23
  - type: text
    content: 'went a three days’ journey in the wilderness of Etham and camped at Marah. '
  '9':
  - type: text
    content: 'And they set out from Marah and came to '
  - type: note
    content: Ex. 15:27
  - type: text
    content: 'Elim; at Elim there were twelve springs of water and seventy palm trees, and they camped there. '
