  - type: text
    content: the autumn rain and the spring rain,
  - type: text
    content: and keeps for us
  - type: note
    content: Gen. 8:22
  - type: text
    content: the weeks appointed for the harvest.’
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:3
  - type: text
    content: Your iniquities have turned these away,
  - type: text
    content: and your sins have kept good from you.
  '26':
