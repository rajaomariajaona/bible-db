  - type: text
    content: though the waves toss, they cannot prevail;
  - type: text
    content: 'though '
  - type: note
    content: ch. 51:55; [Ps. 46:3]
  - type: text
    content: they roar, they cannot pass over it.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:28
  - type: text
    content: But this people has a stubborn and rebellious heart;
  - type: text
    content: they have turned aside and gone away.
  '24':
  - type: text
    content: They do not say in their hearts,
  - type: text
    content: '‘Let us fear the '
  - type: text
    content: Lord
  - type: text
