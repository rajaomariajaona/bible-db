  - type: note
    content: ch. 13:22; 16:10, 11; 22:8, 9; Deut. 29:24, 25; 1 Kgs. 9:8, 9
  - type: text
    content: '‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' our God done all these things to us?’ you shall say to them, ‘As you have forsaken me and served foreign gods in your land, '
  - type: note
    content: Deut. 4:27, 28; 28:47, 48, 68
  - type: text
    content: so you shall serve foreigners in a land that is not yours.’”
  '2':
  - type: text
    content: ' '
  - type: note
