  - type: text
    content: they are all mighty warriors.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:16; Deut. 28:31, 33, 51
  - type: text
    content: They shall eat up your harvest and your food;
  - type: text
    content: they shall eat up your sons and your daughters;
  - type: text
    content: they shall eat up your flocks and your herds;
  - type: text
    content: they shall eat up your vines and your fig trees;
  - type: text
    content: 'your '
