    content: Declare this in the house of Jacob;
  - type: text
    content: 'proclaim it in Judah:'
  '21':
  - type: text
    content: '“Hear this, '
  - type: note
    content: Deut. 32:6; Isa. 6:9
  - type: text
    content: O foolish and senseless people,
  - type: note
    content: '[ Matt. 13:14 ]'
  - type: text
