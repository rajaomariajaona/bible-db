  - type: text
    content: who have ears, but hear not.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:7
  - type: text
    content: 'Do you not fear me? declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Do you not tremble before me?
  - type: text
    content: 'I placed the sand '
