  - type: text
    content: their houses are full of deceit;
  - type: text
    content: therefore they have become great and rich;
  '28':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:15
  - type: text
    content: they have grown fat and sleek.
  - type: text
    content: They know no bounds in deeds of evil;
  - type: note
    content: '[ch. 7:6; Isa. 1:23; Zech. 7:10 ]'
  - type: text
    content: they judge not with justice
  - type: text
    content: the cause of the fatherless, to make it prosper,
  - type: text
    content: and they do not defend the rights of the needy.
