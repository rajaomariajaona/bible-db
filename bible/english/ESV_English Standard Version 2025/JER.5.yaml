  - type: text
    content: they shall beat down with the sword.”
  '18':
  - type: text
    content: '“But even in those days, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'I will not make a full end of you. '
