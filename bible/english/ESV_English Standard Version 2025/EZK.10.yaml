document_id: EZK.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Glory of the Lord Leaves the Temple
  - type: text
    content: 'Then I looked, and behold, '
  - type: note
    content: '[ch. 1:22]'
  - type: text
    content: 'on the expanse that was over the heads of the cherubim there appeared above them something '
  - type: note
    content: See ch. 1:26
  - type: text
    content: like a sapphire,
  - type: note
    content: Or lapis lazuli
  - type: text
    content: ' in appearance like a throne. '
  '10':
  - type: text
    content: 'And as for their appearance, the four had the same likeness, as if a wheel were within a wheel. '
  '11':
  - type: note
    content: ch. 1:17
  - type: text
    content: When they went, they went in any of their four directions
  - type: note
    content: Hebrew to their four sides
  - type: text
    content: ' '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'without turning as they went, '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: but in whatever direction the front wheel
  - type: note
    content: Hebrew the head
  - type: text
    content: ' faced, the others followed without turning as they went. '
  '12':
  - type: note
    content: '[ch. 1:18]'
  - type: text
    content: And their whole body, their rims, and their spokes, their wings,
  - type: note
    content: Or their whole body, their backs, their hands, and their wings
  - type: text
    content: ' and the wheels were full of eyes all around—the wheels that the four of them had. '
  '13':
  - type: text
    content: 'As for the wheels, they were called in my hearing '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: '“the whirling wheels.” '
  '14':
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: 'And every one had four faces: '
  - type: note
    content: '[ch. 1:10]'
  - type: text
    content: 'the first face was the face of the cherub, and the second face was '
  - type: note
    content: '[ch. 1:5, 10; 41:19]'
  - type: text
    content: a human face, and the third the face of a lion, and the fourth the face of an eagle.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ver. 17, 19
  - type: text
    content: 'And the cherubim mounted up. These were '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'the living creatures that I saw by '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'the Chebar canal. '
  '16':
  - type: note
    content: ch. 1:19
  - type: text
    content: 'And when the cherubim went, the wheels went beside them. And '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'when the cherubim lifted up their wings to mount up from the earth, the wheels did not turn from beside them. '
  '17':
  - type: note
    content: ch. 1:20
  - type: text
    content: When they stood still, these stood still, and when they mounted up, these mounted up with them, for the spirit of the living creatures
  - type: note
    content: Or spirit of life
  - type: text
    content: ' was in them.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 4 ]'
  - type: text
    content: 'Then '
  - type: note
    content: ch. 43:2; See ch. 1:28
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out from the threshold of the house, and stood over the cherubim. '
  '19':
  - type: note
    content: ch. 11:22
  - type: text
    content: 'And the cherubim lifted up their wings and mounted up from the earth '
  - type: note
    content: ver. 2
  - type: text
    content: 'before my eyes as they went out, with the wheels beside them. And they stood at the entrance of the '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'east gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ch. 43:2; See ch. 1:28
  - type: text
    content: the glory of the God of Israel was over them.
  '2':
  - type: text
    content: 'And he said to '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'the man clothed in linen, “Go in among '
  - type: note
    content: ver. 6, 13
  - type: text
    content: 'the whirling wheels underneath the cherubim. Fill your hands with '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'burning coals from between the cherubim, and '
  - type: note
    content: '[Rev. 8:5]'
  - type: text
    content: scatter them over the city.”
  - type: text
    content: 'And he went in '
  - type: note
    content: ver. 19
  - type: text
    content: 'before my eyes. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'These were the living creatures that I saw '
  - type: note
    content: ch. 1:22, 26
  - type: text
    content: 'underneath the God of Israel by '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'the Chebar canal; and I knew that they were cherubim. '
  '21':
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: 'Each had four faces, and each four wings, and underneath their wings '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'the likeness of human hands. '
  '22':
  - type: note
    content: ch. 1:10
  - type: text
    content: 'And as for the likeness of their faces, they were the same faces whose appearance I had seen by the Chebar canal. '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: Each one of them went straight forward.
  '3':
  - type: text
    content: 'Now the cherubim were standing '
  - type: note
    content: '[Luke 1:11]'
  - type: text
    content: 'on the south side of the house, when the man went in, and '
  - type: note
    content: See 1 Kgs. 8:10
  - type: text
    content: 'a cloud filled '
  - type: note
    content: See ch. 8:16
  - type: text
    content: 'the inner court. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 18, 19
  - type: text
    content: 'went up from the cherub to the threshold of the house, and the house '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'was filled with the cloud, and the court was filled with '
  - type: note
    content: '[ch. 43:2]'
  - type: text
    content: 'the brightness of the glory of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:24
  - type: text
    content: 'the sound of the wings of the cherubim was heard as far as the outer court, '
  - type: note
    content: ch. 1:24
  - type: text
    content: like the voice of God Almighty when he speaks.
  '6':
  - type: text
    content: 'And when he commanded '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'the man clothed in linen, '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: '“Take fire from between '
  - type: note
    content: ver. 2
  - type: text
    content: 'the whirling wheels, from between the cherubim,” he went in and stood beside a wheel. '
  '7':
  - type: text
    content: 'And a cherub stretched out his hand from between the cherubim to the fire that was between the cherubim, and took some of it and put it into the hands of the man clothed in linen, who took it and went out. '
  '8':
  - type: text
    content: 'The cherubim appeared to have '
  - type: note
    content: '[ver. 21; ch. 1:8; 8:3]'
  - type: text
    content: the form of a human hand under their wings.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:15 ]'
  - type: text
    content: 'And I looked, and behold, there were four wheels beside the cherubim, one beside each cherub, and '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'the appearance of the wheels was '
  - type: note
    content: '[ch. 1:4]'
  - type: text
    content: 'like sparkling '
  - type: note
    content: '[ch. 1:16; Dan. 10:6]'
  - type: text
    content: 'beryl. '
