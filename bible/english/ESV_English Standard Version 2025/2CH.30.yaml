document_id: 2CH.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Passover Celebrated
  - type: text
    content: 'Hezekiah sent to all Israel and Judah, and wrote letters also to Ephraim and Manasseh, that they should come to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Jerusalem to keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'So the couriers went from city to city through the country of '
  - type: note
    content: ver. 1
  - type: text
    content: 'Ephraim and Manasseh, and as far as Zebulun, but '
  - type: note
    content: '[ch. 36:16]'
  - type: text
    content: 'they laughed them to scorn and mocked them. '
  '11':
  - type: text
    content: 'However, '
  - type: note
    content: ver. 18, 21, 25
  - type: text
    content: 'some men of Asher, of Manasseh, and of Zebulun humbled themselves and came to Jerusalem. '
  '12':
  - type: text
    content: 'The hand of God was also on Judah to give them one heart to do what the king and the princes commanded '
  - type: note
    content: '[ch. 29:15]'
  - type: text
    content: 'by the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: 'And many people came together in Jerusalem to keep the Feast of Unleavened Bread '
  - type: note
    content: ver. 2
  - type: text
    content: 'in the second month, a very great assembly. '
  '14':
  - type: text
    content: 'They set to work and removed '
  - type: note
    content: ch. 28:24
  - type: text
    content: 'the altars that were in Jerusalem, and all the altars for burning incense they took away '
  - type: note
    content: '[ch. 15:16; 2 Kgs. 23:6]'
  - type: text
    content: 'and threw into the brook Kidron. '
  '15':
  - type: note
    content: ch. 35:11
  - type: text
    content: 'And they slaughtered the Passover lamb on the fourteenth day of the second month. '
  - type: note
    content: '[ch. 29:34]'
  - type: text
    content: 'And the priests and the Levites were ashamed, '
  - type: note
    content: '[Ezra 6:20]'
  - type: text
    content: 'so that they consecrated themselves and brought burnt offerings into the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: note
    content: ch. 35:10
  - type: text
    content: 'They took their accustomed posts according to the Law of Moses '
  - type: note
    content: Deut. 33:1
  - type: text
    content: 'the man of God. The priests threw the blood that they received from the hand of the Levites. '
  '17':
  - type: text
    content: 'For there were many in the assembly who had not consecrated themselves. Therefore the Levites had to slaughter the Passover lamb for everyone who was not clean, to consecrate it to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'For a majority of the people, '
  - type: note
    content: ver. 11, 25
  - type: text
    content: 'many of them from Ephraim, Manasseh, Issachar, and Zebulun, had not cleansed themselves, yet they ate the Passover otherwise '
  - type: note
    content: See Ex. 12:43-49
  - type: text
    content: 'than as prescribed. For Hezekiah had prayed for them, saying, “May the good '
  - type: text
    content: Lord
  - type: text
    content: ' pardon everyone '
  '19':
  - type: note
    content: ch. 19:3
  - type: text
    content: 'who sets his heart to seek God, the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his fathers, even though not according to the sanctuary’s rules of cleanness.”'
  - type: note
    content: Hebrew not according to the cleanness of holiness
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'For the king and his princes and all the assembly in Jerusalem had taken counsel to keep the Passover '
  - type: note
    content: ver. 13, 15; Num. 9:10, 11
  - type: text
    content: 'in the second month— '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' heard Hezekiah and healed the people. '
  '21':
  - type: text
    content: 'And the people of Israel who were present at Jerusalem kept '
  - type: note
    content: Ex. 12:15; 13:6; Ezra 6:22
  - type: text
    content: 'the Feast of Unleavened Bread seven days with great gladness, and the Levites and the priests praised the '
  - type: text
    content: Lord
  - type: text
    content: ' day by day, singing with all their might'
  - type: note
    content: Compare 1 Chronicles 13:8; Hebrew with instruments of might
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And Hezekiah spoke '
  - type: note
    content: ch. 32:6; Isa. 40:2
  - type: text
    content: 'encouragingly to all the Levites who showed good skill in the service of the '
  - type: text
    content: Lord
  - type: text
    content: '. So they ate the food of the festival for seven days, sacrificing '
  - type: note
    content: '[Lev. 5]'
  - type: text
    content: 'peace offerings and giving thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers.'
  '23':
  - type: text
    content: 'Then the whole assembly agreed together to keep the feast '
  - type: note
    content: '[1 Kgs. 8:65]'
  - type: text
    content: 'for another seven days. So they kept it for another seven days with gladness. '
  '24':
  - type: text
    content: 'For Hezekiah king of Judah '
  - type: note
    content: '[ch. 35:7-9]'
  - type: text
    content: 'gave the assembly 1,000 bulls and 7,000 sheep for offerings, and the princes gave the assembly 1,000 bulls and 10,000 sheep. And the priests '
  - type: note
    content: ver. 3; ch. 29:34
  - type: text
    content: 'consecrated themselves in great numbers. '
  '25':
  - type: text
    content: 'The whole assembly of Judah, and the priests and the Levites, '
  - type: note
    content: ver. 11, 18
  - type: text
    content: 'and the whole assembly that came out of Israel, and the sojourners who came out of the land of Israel, and the sojourners who lived in Judah, rejoiced. '
  '26':
  - type: text
    content: 'So there was great joy in Jerusalem, for '
  - type: note
    content: See ch. 7:8-10
  - type: text
    content: 'since the time of Solomon the son of David king of Israel there had been nothing like this in Jerusalem. '
  '27':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 5:5; 23:18
  - type: text
    content: 'the priests and the Levites arose and '
  - type: note
    content: See Num. 6:23-27
  - type: text
    content: 'blessed the people, and their voice was heard, and their prayer came to '
  - type: note
    content: Deut. 26:15; Ps. 68:5
  - type: text
    content: his holy habitation in heaven.
  '3':
  - type: text
    content: 'for they could not keep it '
  - type: note
    content: '[ch. 29:17; Ex. 12:6, 18]'
  - type: text
    content: 'at that time '
  - type: note
    content: ch. 29:34; [ver. 24]
  - type: text
    content: 'because the priests had not consecrated themselves in sufficient number, nor had the people assembled in Jerusalem— '
  '4':
  - type: text
    content: 'and the plan seemed right to the king and all the assembly. '
  '5':
  - type: text
    content: 'So they decreed to make a proclamation throughout all Israel, '
  - type: note
    content: See 2 Sam. 3:10
  - type: text
    content: 'from Beersheba to Dan, that the people should come and keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, at Jerusalem, for they had not kept it as often as prescribed. '
  '6':
  - type: note
    content: '[Esth. 3:13, 15; 8:10, 14; Jer. 51:31]'
  - type: text
    content: 'So couriers went throughout all Israel and Judah with letters from the king and his princes, as the king had commanded, saying, “O people of Israel, '
  - type: note
    content: Jer. 4:1; Joel 2:12, 13
  - type: text
    content: 'return to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham, Isaac, and Israel, that he may turn again to the remnant of you who have escaped from the hand of '
  - type: note
    content: 2 Kgs. 15:19, 29
  - type: text
    content: 'the kings of Assyria. '
  '7':
  - type: note
    content: '[Ezek. 20:18]'
  - type: text
    content: 'Do not be like your fathers and your brothers, who were faithless to the '
  - type: text
    content: Lord
  - type: text
    content: ' God of their fathers, so that he made them a desolation, as you see. '
  '8':
  - type: note
    content: Ex. 32:9; Deut. 9:6; 10:16; 2 Kgs. 17:14; Neh. 9:16, 29; Jer. 7:26; 17:23; [Acts 7:51]
  - type: text
    content: 'Do not now be stiff-necked as your fathers were, but yield yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' and come to his sanctuary, which he has consecrated forever, and serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: ch. 29:10
  - type: text
    content: 'that his fierce anger may turn away from you. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'if you return to the '
  - type: text
    content: Lord
  - type: text
    content: ', your brothers and your children '
  - type: note
    content: '[Ps. 106:46]'
  - type: text
    content: 'will find compassion with their captors and return to this land. For '
  - type: note
    content: Ex. 34:6; Dan. 9:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is gracious and merciful and will not turn away his face from you, '
  - type: note
    content: See 1 Sam. 7:3
  - type: text
    content: if you return to him.”
