document_id: 2CH.21,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoram Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:50
      marker-yv: yv-n
    - type: text
      text: 'Jehoshaphat slept with his fathers and was buried with his fathers in the city of David, and Jehoram his son reigned in his place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Edom revolted from '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      marker-yv: yv-n
    - type: text
      text: 'the rule of Judah to this day. At that time Libnah also revolted from his rule, because he had forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of his fathers.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, he made high places in the hill country of Judah and led the inhabitants of Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 34:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 17:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:5
      marker-yv: yv-n
    - type: text
      text: 'into whoredom and made Judah go astray. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a letter came to him from Elijah the prophet, saying, “Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of David your father, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:3
      marker-yv: yv-n
    - type: text
      text: '‘Because you have not walked in the ways of Jehoshaphat your father, or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2-5
      marker-yv: yv-n
    - type: text
      text: 'in the ways of Asa king of Judah, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'but have walked in the way of the kings of Israel and have enticed Judah and the inhabitants of Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'into whoredom, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 16:31-33
      marker-yv: yv-n
    - type: text
      text: 'as the house of Ahab led Israel into whoredom, and also you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'have killed your brothers, of your father’s house, who were better than you, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'behold, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring a great plague on your people, your children, your wives, and all your possessions, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you yourself will have a severe sickness '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18, 19
      marker-yv: yv-n
    - type: text
      text: with a disease of your bowels, until your bowels come out because of the disease, day by day.’”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 11:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up against Jehoram the anger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: spirit
      marker-yv: yv-n
    - type: text
      text: ' of the Philistines and of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:7
      marker-yv: yv-n
    - type: text
      text: 'the Arabians who are near the Ethiopians. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they came up against Judah and invaded it and carried away all the possessions they found that belonged to the king’s house, and also his sons and his wives, so that no son was left to him except '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:23
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: Jehoahaz, his youngest son.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after all this the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'in his bowels with an incurable disease. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the course of time, at the end of two years, his bowels came out because of the disease, and he died in great agony. His people made no fire in his honor, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:14
      marker-yv: yv-n
    - type: text
      text: 'like the fires made for his fathers. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, Azariah, Michael, and Shephatiah; all these were the sons of Jehoshaphat king of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Judah
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'He was thirty-two years old when he began to reign, and he reigned eight years in Jerusalem. And he departed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 22:18
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'with no one’s regret. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:27
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: They buried him in the city of David, but not in the tombs of the kings.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their father gave them great gifts of silver, gold, and valuable possessions, together with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:5
      marker-yv: yv-n
    - type: text
      text: 'fortified cities in Judah, but he gave the kingdom to Jehoram, because he was the firstborn. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jehoram had ascended the throne of his father and was established, he killed all his brothers with the sword, and also some of the princes of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 5-10, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 8:17-22
      marker-yv: yv-n
    - type: text
      text: 'Jehoram was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 12:28-30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:31-33
      marker-yv: yv-n
    - type: text
      text: 'And he walked in the way of the kings of Israel, as the house of Ahab had done, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 8:18
      marker-yv: yv-n
    - type: text
      text: 'the daughter of Ahab was his wife. And he did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not willing to destroy the house of David, because of the covenant that he had made with David, and since he had promised to give '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 11:36
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 21:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: a lamp to him and to his sons forever.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his days Edom revolted from the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'rule of Judah and set up a king of their own. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoram passed over with his commanders and all his chariots, and he rose by night and struck the Edomites who had surrounded him and his chariot commanders. '
