document_id: 2CH.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoram Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 22:50
  - type: text
    content: 'Jehoshaphat slept with his fathers and was buried with his fathers in the city of David, and Jehoram his son reigned in his place. '
  '10':
  - type: text
    content: 'So Edom revolted from '
  - type: note
    content: ver. 8
  - type: text
    content: 'the rule of Judah to this day. At that time Libnah also revolted from his rule, because he had forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his fathers.'
  '11':
  - type: text
    content: 'Moreover, he made high places in the hill country of Judah and led the inhabitants of Jerusalem '
  - type: note
    content: Ex. 34:16; Lev. 17:7; 20:5
  - type: text
    content: 'into whoredom and made Judah go astray. '
  '12':
  - type: text
    content: 'And a letter came to him from Elijah the prophet, saying, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of David your father, '
  - type: note
    content: ch. 17:3
  - type: text
    content: '‘Because you have not walked in the ways of Jehoshaphat your father, or '
  - type: note
    content: ch. 14:2-5
  - type: text
    content: 'in the ways of Asa king of Judah, '
  '13':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'but have walked in the way of the kings of Israel and have enticed Judah and the inhabitants of Jerusalem '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'into whoredom, '
  - type: note
    content: See 1 Kgs. 16:31-33
  - type: text
    content: 'as the house of Ahab led Israel into whoredom, and also you '
  - type: note
    content: ver. 4
  - type: text
    content: 'have killed your brothers, of your father’s house, who were better than you, '
  '14':
  - type: text
    content: 'behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring a great plague on your people, your children, your wives, and all your possessions, '
  '15':
  - type: text
    content: 'and you yourself will have a severe sickness '
  - type: note
    content: ver. 18, 19
  - type: text
    content: with a disease of your bowels, until your bowels come out because of the disease, day by day.’”
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Kgs. 11:14, 23 ]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up against Jehoram the anger'
  - type: note
    content: Hebrew spirit
  - type: text
    content: ' of the Philistines and of '
  - type: note
    content: ch. 17:11; 22:1; 26:7
  - type: text
    content: 'the Arabians who are near the Ethiopians. '
  '17':
  - type: text
    content: 'And they came up against Judah and invaded it and carried away all the possessions they found that belonged to the king’s house, and also his sons and his wives, so that no son was left to him except '
  - type: note
    content: ch. 25:23; [ch. 22:6]
  - type: text
    content: Jehoahaz, his youngest son.
  '18':
  - type: text
    content: 'And after all this the '
  - type: text
    content: Lord
  - type: text
    content: ' struck him '
  - type: note
    content: ver. 15
  - type: text
    content: 'in his bowels with an incurable disease. '
  '19':
  - type: text
    content: 'In the course of time, at the end of two years, his bowels came out because of the disease, and he died in great agony. His people made no fire in his honor, '
  - type: note
    content: ch. 16:14
  - type: text
    content: 'like the fires made for his fathers. '
  '2':
  - type: text
    content: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, Azariah, Michael, and Shephatiah; all these were the sons of Jehoshaphat king of '
  - type: note
    content: '[ch. 24:5]'
  - type: text
    content: Israel.
  - type: note
    content: That is, Judah
  - type: text
    content: ' '
  '20':
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'He was thirty-two years old when he began to reign, and he reigned eight years in Jerusalem. And he departed '
  - type: note
    content: '[Jer. 22:18]'
  - type: text
    content: 'with no one’s regret. '
  - type: note
    content: '[ch. 24:25; 28:27]'
  - type: text
    content: They buried him in the city of David, but not in the tombs of the kings.
  '3':
  - type: text
    content: 'Their father gave them great gifts of silver, gold, and valuable possessions, together with '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'fortified cities in Judah, but he gave the kingdom to Jehoram, because he was the firstborn. '
  '4':
  - type: text
    content: 'When Jehoram had ascended the throne of his father and was established, he killed all his brothers with the sword, and also some of the princes of '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Israel. '
  '5':
  - type: note
    content: For ver. 5-10, see 2 Kgs. 8:17-22
  - type: text
    content: 'Jehoram was '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '6':
  - type: note
    content: See 1 Kgs. 12:28-30; 16:31-33
  - type: text
    content: 'And he walked in the way of the kings of Israel, as the house of Ahab had done, for '
  - type: note
    content: ch. 18:1; 2 Kgs. 8:18
  - type: text
    content: 'the daughter of Ahab was his wife. And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' was not willing to destroy the house of David, because of the covenant that he had made with David, and since he had promised to give '
  - type: note
    content: See 1 Kgs. 11:36; [2 Sam. 21:17]
  - type: text
    content: a lamp to him and to his sons forever.
  '8':
  - type: text
    content: 'In his days Edom revolted from the '
  - type: note
    content: ver. 10
  - type: text
    content: 'rule of Judah and set up a king of their own. '
  '9':
  - type: text
    content: 'Then Jehoram passed over with his commanders and all his chariots, and he rose by night and struck the Edomites who had surrounded him and his chariot commanders. '
