verses:
  '1':
  - type: heading
    content: Great Is the Lord
  - type: note
    content: This psalm is an acrostic poem, each verse beginning with the successive letters of the Hebrew alphabet
  - type: text
    content: A Song of Praise. Of David.
  - type: text
    content: ' '
  - type: note
    content: Ps. 99:5, 9
  - type: text
    content: 'I will extol you, my God and '
  - type: note
    content: Ps. 98:6
  - type: text
    content: King,
  - type: text
    content: and bless your name forever and ever.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 19:1; 103:22 ]'
  - type: text
    content: 'All your works shall give thanks to you, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and all your '
  - type: note
    content: '[Ps. 132:9, 16]'
  - type: text
    content: saints shall bless you!
  '11':
  - type: text
    content: They shall speak of the glory of your kingdom
  - type: text
    content: and tell of your power,
  '12':
  - type: text
    content: 'to '
  - type: note
    content: Ps. 105:1
  - type: text
    content: make known to the children of man your
  - type: note
