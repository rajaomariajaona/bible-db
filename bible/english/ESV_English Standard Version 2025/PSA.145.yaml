  - type: text
    content: 'he also '
  - type: note
    content: Ps. 31:22
  - type: text
    content: hears their cry and saves them.
  '2':
  - type: text
    content: Every day I will bless you
  - type: note
    content: '[ Ps. 146:2 ]'
  - type: text
    content: and praise your name forever and ever.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ps. 97:10
  - type: text
    content: preserves all who love him,
  - type: text
    content: but all the wicked he will destroy.
