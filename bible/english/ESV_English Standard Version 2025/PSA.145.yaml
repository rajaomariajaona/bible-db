  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 48:1
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: ', and greatly to be praised,'
  - type: text
    content: 'and his '
  - type: note
    content: Job 5:9; [Isa. 40:28]
  - type: text
    content: greatness is unsearchable.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Isa. 38:19
  - type: text
    content: One generation shall commend your works to another,
  - type: text
    content: and shall declare your mighty acts.
  '5':
  - type: text
    content: 'On '
  - type: note
    content: ver. 12
  - type: text
    content: the glorious splendor of your majesty,
  - type: text
    content: and on your wondrous works, I will meditate.
  '6':
  - type: text
    content: 'They shall speak of '
  - type: note
    content: '[Ps. 78:4]'
  - type: text
    content: the might of your awesome deeds,
  - type: text
    content: and I will declare your greatness.
  '7':
  - type: text
    content: 'They shall pour forth the fame of your '
  - type: note
    content: Isa. 63:7
  - type: text
    content: abundant goodness
  - type: text
    content: and shall sing aloud of your righteousness.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: See Ps. 86:5, 15
  - type: text
    content: gracious and merciful,
  - type: text
    content: slow to anger and abounding in steadfast love.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: See Ps. 100:5
  - type: text
    content: good to all,
  - type: text
    content: and his mercy is over all that he has made.
