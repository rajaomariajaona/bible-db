    content: ver. 4; Ps. 150:2; Deut. 3:24
  - type: text
    content: mighty deeds,
  - type: text
    content: 'and '
  - type: note
    content: ver. 5
  - type: text
    content: the glorious splendor of your kingdom.
  '13':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 10:16
  - type: text
    content: Your kingdom is an everlasting kingdom,
  - type: text
    content: and your dominion endures throughout all generations.
  - type: text
    content: '[The '
  - type: text
    content: Lord
  - type: text
    content: ' is faithful in all his words'
  - type: text
    content: and kind in all his works.
  - type: note
    content: These two lines are supplied by one Hebrew manuscript, Septuagint, Syriac (compare Dead Sea Scroll)
  - type: text
    content: ']'
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Ps. 37:17, 24]'
  - type: text
    content: upholds all who are falling
  - type: text
    content: 'and '
  - type: note
    content: Ps. 146:8
  - type: text
    content: raises up all who are bowed down.
  '15':
  - type: text
    content: 'The eyes of all '
  - type: note
    content: Ps. 104:27
  - type: text
    content: look to you,
  - type: text
    content: and you give them their food in due season.
  '16':
  - type: text
    content: 'You '
  - type: note
    content: Ps. 104:28
  - type: text
    content: open your hand;
  - type: text
    content: 'you '
  - type: note
    content: '[Ps. 104:21; 147:8]'
  - type: text
    content: satisfy the desire of every living thing.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
