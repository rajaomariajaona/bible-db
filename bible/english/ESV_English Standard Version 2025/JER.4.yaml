document_id: JER.4,59
type_code: eng
verses:
  '1':
  - type: text
    content: “If you return, O Israel,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Joel 2:12
  - type: text
    content: to me you should return.
  - type: text
    content: If you remove your detestable things from my presence,
  - type: note
    content: '[ 1 Kgs. 14:15 ]'
  - type: text
    content: and do not waver,
  '10':
  - type: text
    content: 'Then I said, “Ah, Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: Ezek. 14:9; [1 Kgs. 22:22]
  - type: text
    content: surely you have utterly deceived this people and Jerusalem, saying, ‘It shall be well with you,’ whereas the sword has reached their very life.”
  '11':
  - type: text
    content: 'At that time it will be said to this people and to Jerusalem, “A hot wind from '
  - type: note
    content: See ch. 3:2
  - type: text
    content: 'the bare heights in the desert toward the daughter of my people, not to winnow or cleanse, '
  '12':
  - type: text
    content: 'a wind too full for this comes for me. Now it is I who '
  - type: note
    content: ch. 1:16
  - type: text
    content: speak in judgment upon them.”
  '13':
  - type: text
    content: Behold, he comes up like clouds;
  - type: note
    content: Isa. 5:28
  - type: text
    content: his chariots like the whirlwind;
  - type: text
    content: 'his horses are '
  - type: note
    content: 2 Sam. 1:23; Lam. 4:19
  - type: text
    content: swifter than eagles—
  - type: text
    content: 'woe to us, '
  - type: note
    content: ch. 9:19
  - type: text
    content: for we are ruined!
  '14':
  - type: text
    content: 'O Jerusalem, '
  - type: note
    content: Ps. 51:2, 7; Isa. 1:16; James 4:8
  - type: text
    content: wash your heart from evil,
  - type: text
    content: that you may be saved.
  - type: text
    content: How long shall your wicked thoughts
  - type: text
    content: lodge within you?
  '15':
  - type: text
    content: 'For a voice '
  - type: note
    content: ch. 8:16
  - type: text
    content: declares from Dan
  - type: text
    content: 'and proclaims trouble from '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: Mount Ephraim.
  '16':
  - type: text
    content: Warn the nations that he is coming;
  - type: text
    content: announce to Jerusalem,
  - type: text
    content: '“Besiegers come '
  - type: note
    content: ch. 5:15
  - type: text
    content: from a distant land;
  - type: text
    content: they shout against the cities of Judah.
  '17':
  - type: text
    content: 'Like keepers of a field '
  - type: note
    content: ch. 6:3; See 2 Kgs. 25:1-4
  - type: text
    content: are they against her all around,
  - type: text
    content: because she has rebelled against me,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: Your ways and your deeds
  - type: text
    content: have brought this upon you.
  - type: text
    content: 'This is your doom, and '
  - type: note
    content: ch. 2:19
  - type: text
    content: it is bitter;
  - type: text
    content: it has reached your very heart.”
  - type: heading
    content: Anguish over Judah’s Desolation
  '19':
  - type: text
    content: ' '
  - type: note
    content: Isa. 16:11; Hab. 3:16; [ch. 9:1; Isa. 22:4 ]
  - type: text
    content: My anguish, my anguish! I writhe in pain!
  - type: text
    content: Oh the walls of my heart!
  - type: text
    content: My heart is beating wildly;
  - type: text
    content: I cannot keep silent,
  - type: text
    content: for I hear the sound of the trumpet,
  - type: text
    content: the alarm of war.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Deut. 6:13
  - type: text
    content: 'and if you swear, ‘As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’'
  - type: text
    content: in truth, in justice, and in righteousness,
  - type: text
    content: 'then '
  - type: note
    content: Isa. 65:16
  - type: text
    content: nations shall bless themselves in him,
  - type: note
    content: 1 Cor. 1:31; 2 Cor. 10:17
  - type: text
    content: and in him shall they glory.”
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 7:26
  - type: text
    content: Crash follows hard on crash;
  - type: text
    content: the whole land is laid waste.
  - type: note
    content: ch. 10:20; 49:29
  - type: text
    content: Suddenly my tents are laid waste,
  - type: text
    content: my curtains in a moment.
  '21':
  - type: text
    content: How long must I see the standard
  - type: text
    content: and hear the sound of the trumpet?
  '22':
  - type: text
    content: '“For '
  - type: note
    content: Ps. 82:5; Isa. 1:3
  - type: text
    content: my people are foolish;
  - type: text
    content: they know me not;
  - type: text
    content: they are stupid children;
  - type: text
    content: they have no understanding.
  - type: note
    content: Ps. 36:3; Isa. 1:16, 17; Rom. 16:19
  - type: text
    content: They are ‘wise’—in doing evil!
  - type: text
    content: But how to do good they know not.”
  '23':
  - type: text
    content: 'I looked on the earth, and behold, it was '
  - type: note
    content: Gen. 1:2
  - type: text
    content: without form and void;
  - type: note
    content: Isa. 5:30
  - type: text
    content: and to the heavens, and they had no light.
  '24':
  - type: text
    content: 'I looked on '
  - type: note
    content: Nah. 1:5
  - type: text
    content: the mountains, and behold, they were quaking,
  - type: text
    content: and all the hills moved to and fro.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ Zeph. 1:3 ]'
  - type: text
    content: I looked, and behold, there was no man,
  - type: text
    content: and all the birds of the air had fled.
  '26':
  - type: text
    content: 'I looked, and behold, the '
  - type: note
    content: Ps. 107:34
  - type: text
    content: fruitful land was a desert,
  - type: text
    content: and all its cities were laid in ruins
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', before '
  - type: note
    content: See ver. 8
  - type: text
    content: his fierce anger.
  '27':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', “The whole land shall be a desolation; '
  - type: note
    content: ch. 5:10, 18; 30:11; 46:28; Neh. 9:31; Ezek. 11:13
  - type: text
    content: yet I will not make a full end.
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:4; Hos. 4:3
  - type: text
    content: “For this the earth shall mourn,
  - type: note
    content: Isa. 50:3
  - type: text
    content: and the heavens above be dark;
  - type: text
    content: for I have spoken; I have purposed;
  - type: note
    content: '[ Num. 23:19 ]'
  - type: text
    content: I have not relented, nor will I turn back.”
  '29':
  - type: text
    content: At the noise of horseman and archer
  - type: text
    content: every city takes to flight;
  - type: text
    content: they enter thickets; they climb among rocks;
  - type: text
    content: all the cities are forsaken,
  - type: text
    content: 'and '
  - type: note
    content: See ver. 7
  - type: text
    content: no man dwells in them.
  '3':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' to the men of Judah and Jerusalem:'
  - type: note
    content: Hos. 10:12
  - type: text
    content: “Break up your fallow ground,
  - type: text
    content: 'and '
  - type: note
    content: Matt. 13:7, 22; Mark 4:7, 18; Luke 8:7, 14
  - type: text
    content: sow not among thorns.
  '30':
  - type: text
    content: And you, O desolate one,
  - type: text
    content: what do you mean that you dress in scarlet,
  - type: note
    content: '[ Isa. 61:10 ]'
  - type: text
    content: that you adorn yourself with ornaments of gold,
  - type: note
    content: '[ 2 Kgs. 9:30 ]'
  - type: text
    content: that you enlarge your eyes with paint?
  - type: text
    content: In vain you beautify yourself.
  - type: note
    content: Lam. 1:2, 19; Ezek. 23:22
  - type: text
    content: Your lovers despise you;
  - type: text
    content: they seek your life.
  '31':
  - type: text
    content: 'For I heard '
  - type: note
    content: ch. 6:24; See Isa. 13:8
  - type: text
    content: a cry as of a woman in labor,
  - type: text
    content: anguish as of one giving birth to her first child,
  - type: text
    content: the cry of the daughter of Zion gasping for breath,
  - type: note
    content: Isa. 1:15; Lam. 1:17
  - type: text
    content: stretching out her hands,
  - type: text
    content: “Woe is me! I am fainting before murderers.”
  '4':
  - type: text
    content: ' '
  - type: note
    content: Deut. 10:16; [ch. 9:26; Rom. 2:28, 29 ]
  - type: text
    content: 'Circumcise yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: remove the foreskin of your hearts,
  - type: text
    content: O men of Judah and inhabitants of Jerusalem;
  - type: note
    content: ch. 21:12
  - type: text
    content: lest my wrath go forth like fire,
  - type: text
    content: and burn with none to quench it,
  - type: note
    content: Deut. 28:20
  - type: text
    content: because of the evil of your deeds.”
  - type: heading
    content: Disaster from the North
  '5':
  - type: text
    content: Declare in Judah, and proclaim in Jerusalem, and say,
  - type: note
    content: '[ch. 6:1; Hos. 5:8; Joel 2:1 ]'
  - type: text
    content: “Blow the trumpet through the land;
  - type: text
    content: cry aloud and say,
  - type: note
    content: ch. 8:14
  - type: text
    content: ‘Assemble, and let us go
  - type: text
    content: into the fortified cities!’
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 50:2; 51:12, 27 ]'
  - type: text
    content: Raise a standard toward Zion,
  - type: text
    content: flee for safety, stay not,
  - type: text
    content: 'for I bring disaster from '
  - type: note
    content: See ch. 1:13
  - type: text
    content: the north,
  - type: note
    content: '[ Isa. 1:28 ]'
  - type: text
    content: and great destruction.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:15; 5:6; 49:19
  - type: text
    content: A lion has gone up from his thicket,
  - type: text
    content: a destroyer of nations has set out;
  - type: text
    content: he has gone out from his place
  - type: text
    content: to make your land a waste;
  - type: text
    content: your cities will be ruins
  - type: note
    content: ch. 33:10; 34:22; 46:19; Isa. 5:9; 6:11
  - type: text
    content: without inhabitant.
  '8':
  - type: text
    content: 'For this '
  - type: note
    content: ch. 6:26; Isa. 22:12; 32:11
  - type: text
    content: put on sackcloth,
  - type: text
    content: lament and wail,
  - type: text
    content: 'for '
  - type: note
    content: Num. 25:4; Ps. 78:49; See Isa. 13:9-13
  - type: text
    content: 'the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: has not turned back from us.”
  '9':
  - type: text
    content: '“In that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ps. 48:4, 5]'
  - type: text
    content: 'courage shall fail both king and officials. The priests shall be appalled and the prophets astounded.” '
