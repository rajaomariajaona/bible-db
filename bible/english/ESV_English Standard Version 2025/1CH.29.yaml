document_id: 1CH.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings for the Temple
  - type: text
    content: 'And David the king said to all the assembly, “Solomon my son, whom alone God has chosen, is '
  - type: note
    content: ch. 22:5; [1 Kgs. 3:7]
  - type: text
    content: 'young and inexperienced, and the work is great, for '
  - type: note
    content: ver. 19
  - type: text
    content: 'the palace will not be for man but for the '
  - type: text
    content: Lord
  - type: text
    content: ' God. '
  '10':
  - type: text
    content: 'Therefore David blessed the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of all the assembly. And David said: '
  - type: note
    content: Luke 1:68
  - type: text
    content: '“Blessed are you, O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel our father, forever and ever. '
  '11':
  - type: note
    content: '[1 Tim. 1:17; Rev. 5:13]'
  - type: text
    content: 'Yours, O '
  - type: text
    content: Lord
  - type: text
    content: ', is the greatness and the power and the glory and the victory and the majesty, for all that is in the heavens and in the earth is yours. Yours is the kingdom, O '
  - type: text
    content: Lord
  - type: text
    content: ', and you are exalted as head above all. '
  '12':
  - type: note
    content: '[1 Kgs. 3:13; 2 Chr. 1:12; Rom. 11:36]'
  - type: text
    content: 'Both riches and honor come from you, and you rule over all. '
  - type: note
    content: 2 Chr. 20:6
  - type: text
    content: 'In your hand are power and might, and in your hand it is to make great and to give strength to all. '
  '13':
  - type: text
    content: And now we thank you, our God, and praise your glorious name.
  '14':
  - type: text
    content: '“But who am I, and what is my people, that we should be able thus to offer willingly? For all things come from you, and of your own have we given you. '
  '15':
  - type: note
    content: See Lev. 25:23
  - type: text
    content: 'For we are strangers before you and sojourners, as all our fathers were. Our days on the earth are '
  - type: note
    content: Job 14:2; Ps. 102:11; 144:4
  - type: text
    content: like a shadow, and there is no abiding.
  - type: note
    content: Septuagint, Vulgate; Hebrew hope, or prospect
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, all this abundance that we have provided for building you a house for your holy name comes from your hand and is all your own. '
  '17':
  - type: text
    content: 'I know, my God, '
  - type: note
    content: ch. 28:9; Prov. 17:3; [1 Sam. 16:7]
  - type: text
    content: 'that you test the heart and '
  - type: note
    content: '[Prov. 11:20]'
  - type: text
    content: 'have pleasure in uprightness. In the uprightness of my heart I have freely offered all these things, and now I have seen your people, who are present here, offering freely and joyously to you. '
  '18':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham, Isaac, and Israel, our fathers, keep forever such purposes and thoughts in the hearts of your people, and direct their hearts toward you. '
  '19':
  - type: note
    content: '[Ps. 72:1]'
  - type: text
    content: 'Grant to Solomon my son a whole heart that he may keep your commandments, your testimonies, and your statutes, performing all, and that he may '
  - type: note
    content: ver. 1, 2
  - type: text
    content: 'build the palace '
  - type: note
    content: ch. 22:14
  - type: text
    content: for which I have made provision.”
  '2':
  - type: text
    content: 'So I have provided for the house of my God, so far as I was able, the gold for the things of gold, the silver for the things of silver, and the bronze for the things of bronze, the iron for the things of iron, and wood for the things of wood, besides great quantities of '
  - type: note
    content: '[Isa. 54:11, 12; Rev. 21:19-21]'
  - type: text
    content: 'onyx and stones for setting, antimony, colored stones, all sorts of precious stones and marble. '
  '20':
  - type: text
    content: 'Then David said to all the assembly, '
  - type: note
    content: See Josh. 22:33
  - type: text
    content: '“Bless the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” And all the assembly blessed the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, '
  - type: note
    content: See Ex. 4:31
  - type: text
    content: 'and bowed their heads and paid homage to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to the king. '
  '21':
  - type: text
    content: 'And they offered sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ', and on the next day offered burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', 1,000 bulls, 1,000 rams, and 1,000 lambs, with their '
  - type: note
    content: Gen. 35:14
  - type: text
    content: 'drink offerings, and sacrifices in abundance for all Israel. '
  '22':
  - type: text
    content: 'And they ate and drank before the '
  - type: text
    content: Lord
  - type: text
    content: ' on that day with great gladness.'
  - type: heading
    content: Solomon Anointed King
  - type: text
    content: 'And they made Solomon the son of David king '
  - type: note
    content: '[ch. 23:1]'
  - type: text
    content: 'the second time, and they '
  - type: note
    content: See 1 Kgs. 1:38, 39
  - type: text
    content: 'anointed him as prince for the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Kgs. 2:35
  - type: text
    content: Zadok as priest.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 2:12
  - type: text
    content: 'Then Solomon sat on the '
  - type: note
    content: ch. 28:5; [2 Chr. 9:8]
  - type: text
    content: 'throne of the '
  - type: text
    content: Lord
  - type: text
    content: ' as king in place of David his father. And he prospered, and all Israel obeyed him. '
  '24':
  - type: text
    content: 'All the leaders and the mighty men, and also all the sons of King David, pledged their allegiance to King Solomon. '
  '25':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' made Solomon very '
  - type: note
    content: 2 Chr. 1:1; [Josh. 3:7]
  - type: text
    content: 'great in the sight of all Israel and '
  - type: note
    content: 1 Kgs. 3:13; 2 Chr. 1:12; [Eccles. 2:9]
  - type: text
    content: bestowed on him such royal majesty as had not been on any king before him in Israel.
  - type: heading
    content: The Death of David
  '26':
  - type: text
    content: 'Thus David the son of Jesse reigned over all Israel. '
  '27':
  - type: text
    content: 'The '
  - type: note
    content: 2 Sam. 5:4, 5; 1 Kgs. 2:11
  - type: text
    content: 'time that he reigned over Israel was forty years. He reigned seven years in Hebron and thirty-three years in Jerusalem. '
  '28':
  - type: text
    content: 'Then he died '
  - type: note
    content: '[Gen. 15:15; 25:8]'
  - type: text
    content: 'at a good age, '
  - type: note
    content: ch. 23:1
  - type: text
    content: 'full of days, riches, and honor. And Solomon his son reigned in his place. '
  '29':
  - type: text
    content: 'Now the acts of King David, from first to last, are written in the Chronicles '
  - type: note
    content: ch. 26:28; [1 Sam. 9:9]
  - type: text
    content: 'of Samuel the seer, and in the Chronicles of '
  - type: note
    content: See 2 Sam. 12:1
  - type: text
    content: 'Nathan the prophet, and in the Chronicles of '
  - type: note
    content: See 1 Sam. 22:5
  - type: text
    content: 'Gad the seer, '
  '3':
  - type: text
    content: 'Moreover, in addition to all that I have provided for the holy house, I have a treasure of my own of gold and silver, and because of my devotion to the house of my God I give it to the house of my God: '
  '30':
  - type: text
    content: 'with accounts of all his rule and his might and of the circumstances '
  - type: note
    content: '[Dan. 4:23, 25]'
  - type: text
    content: that came upon him and upon Israel and upon all the kingdoms of the countries.
  '4':
  - type: note
    content: '[ch. 22:14]'
  - type: text
    content: 3,000 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, of the gold of '
  - type: note
    content: See 1 Kgs. 9:28
  - type: text
    content: Ophir, and 7,000 talents of refined silver, for overlaying the walls of the house,
  - type: note
    content: Septuagint; Hebrew houses
  - type: text
    content: ' '
  '5':
  - type: text
    content: and for all the work to be done by craftsmen, gold for the things of gold and silver for the things of silver. Who then will offer willingly, consecrating himself
  - type: note
    content: Or ordaining himself; Hebrew filling his hand
  - type: text
    content: ' today to the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '6':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 27:1; 28:1
  - type: text
    content: 'the leaders of fathers’ houses made their freewill offerings, as did also the leaders of the tribes, the commanders of thousands and of hundreds, and '
  - type: note
    content: See ch. 27:25-31
  - type: text
    content: 'the officers over the king’s work. '
  '7':
  - type: text
    content: 'They gave for the service of the house of God 5,000 talents and 10,000 '
  - type: note
    content: Ezra 2:69; 8:27; Neh. 7:70-72
  - type: text
    content: darics
  - type: note
    content: A daric was a coin weighing about 1/4 ounce or 8.5 grams
  - type: text
    content: ' of gold, 10,000 talents of silver, 18,000 talents of bronze and 100,000 talents of iron. '
  '8':
  - type: text
    content: 'And whoever had precious stones gave them to the treasury of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', in the care of '
  - type: note
    content: ch. 23:8; [ch. 26:21]
  - type: text
    content: 'Jehiel the Gershonite. '
  '9':
  - type: text
    content: 'Then the people rejoiced because they had given willingly, for with a '
  - type: note
    content: '[2 Kgs. 12:4; 2 Cor. 9:7]'
  - type: text
    content: 'whole heart they had offered freely to the '
  - type: text
    content: Lord
  - type: text
    content: . David the king also rejoiced greatly.
  - type: heading
    content: David Prays in the Assembly
