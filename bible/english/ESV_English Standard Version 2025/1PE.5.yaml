document_id: 1PE.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Shepherd the Flock of God
  - type: text
    content: 'So I exhort the elders among you, '
  - type: note
    content: '[2 John 1; 3 John 1]'
  - type: text
    content: 'as a fellow elder and '
  - type: note
    content: See Luke 24:48
  - type: text
    content: 'a witness of the sufferings of Christ, as well as a partaker in the glory that is going to be revealed: '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'after you have suffered a little while, the God of all grace, '
  - type: note
    content: 1 Cor. 1:9; 1 Thess. 2:12; 1 Tim. 6:12
  - type: text
    content: 'who has called you to his '
  - type: note
    content: 2 Tim. 2:10
  - type: text
    content: 'eternal glory in Christ, will himself '
  - type: note
    content: Heb. 13:21
  - type: text
    content: 'restore, '
  - type: note
    content: Luke 22:32; Rom. 16:25
  - type: text
    content: 'confirm, strengthen, and establish you. '
  '11':
  - type: note
    content: See ch. 4:11
  - type: text
    content: To him be the dominion forever and ever. Amen.
  - type: heading
    content: Final Greetings
  '12':
  - type: text
    content: 'By '
  - type: note
    content: Acts 15:22; 2 Cor. 1:19; 1 Thess. 1:1; 2 Thess. 1:1
  - type: text
    content: 'Silvanus, a faithful brother as I regard him, '
  - type: note
    content: '[Heb. 13:22]'
  - type: text
    content: 'I have written briefly to you, exhorting and declaring that this is '
  - type: note
    content: See Acts 11:23
  - type: text
    content: 'the true grace of God. '
  - type: note
    content: See 1 Cor. 15:1
  - type: text
    content: 'Stand firm in it. '
  '13':
  - type: text
    content: 'She who is at Babylon, who is likewise chosen, sends you greetings, and so does '
  - type: note
    content: See Acts 12:12
  - type: text
    content: 'Mark, my son. '
  '14':
  - type: note
    content: See Rom. 16:16
  - type: text
    content: Greet one another with the kiss of love.
  - type: note
    content: Eph. 6:23
  - type: text
    content: Peace to all of you who are in Christ.
  '2':
  - type: note
    content: '[Jude 12]; See John 21:16'
  - type: text
    content: shepherd the flock of God that is among you, exercising oversight,
  - type: note
    content: Some manuscripts omit exercising oversight
  - type: text
    content: ' '
  - type: note
    content: '[Philem. 14]'
  - type: text
    content: not under compulsion, but willingly, as God would have you;
  - type: note
    content: Some manuscripts omit as God would have you
  - type: text
    content: ' '
  - type: note
    content: 1 Tim. 3:8; Titus 1:7
  - type: text
    content: 'not for shameful gain, but eagerly; '
  '3':
  - type: text
    content: 'not '
  - type: note
    content: Ezek. 34:4; Matt. 20:25; Mark 10:42; 2 Cor. 1:24
  - type: text
    content: 'domineering over those in your charge, but '
  - type: note
    content: Phil. 3:17; 2 Thess. 3:9; 1 Tim. 4:12; Titus 2:7
  - type: text
    content: 'being examples to the flock. '
  '4':
  - type: text
    content: 'And when '
  - type: note
    content: Heb. 13:20
  - type: text
    content: 'the chief Shepherd appears, you will receive the '
  - type: note
    content: '[ch. 1:4]'
  - type: text
    content: 'unfading '
  - type: note
    content: 1 Cor. 9:25; See James 1:12
  - type: text
    content: 'crown of glory. '
  '5':
  - type: text
    content: 'Likewise, you who are younger, be subject to the elders. '
  - type: note
    content: '[Matt. 20:26, 27; John 13:4, 5, 14]'
  - type: text
    content: 'Clothe yourselves, all of you, with humility toward one another, for '
  - type: note
    content: See James 4:6, 10
  - type: text
    content: “God opposes the proud but gives grace to the humble.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Humble yourselves, therefore, under the mighty hand of God so that at the proper time he may exalt you, '
  '7':
  - type: note
    content: '[Ps. 37:5; 55:22]; See Matt. 6:25'
  - type: text
    content: 'casting all your anxieties on him, because '
  - type: note
    content: Ps. 40:17
  - type: text
    content: 'he cares for you. '
  '8':
  - type: note
    content: See ch. 1:13
  - type: text
    content: 'Be sober-minded; '
  - type: note
    content: See Matt. 24:42
  - type: text
    content: 'be watchful. Your '
  - type: note
    content: Eph. 4:27; 6:11; Rev. 12:9, 12; [Job 1:9-12; Luke 22:31; 2 Cor. 2:11]
  - type: text
    content: 'adversary the devil '
  - type: note
    content: Job 1:7; 2:2
  - type: text
    content: 'prowls around '
  - type: note
    content: '[Ps. 22:21]'
  - type: text
    content: 'like a roaring lion, seeking someone to devour. '
  '9':
  - type: note
    content: James 4:7
  - type: text
    content: 'Resist him, '
  - type: note
    content: Col. 2:5
  - type: text
    content: 'firm in your faith, knowing that '
  - type: note
    content: Acts 14:22; 1 Thess. 3:3; 2 Tim. 3:12
  - type: text
    content: 'the same kinds of suffering are being experienced by your brotherhood throughout the world. '
