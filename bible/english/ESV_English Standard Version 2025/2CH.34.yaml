document_id: 2CH.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see 2 Kgs. 22:1, 2
  - type: text
    content: 'Josiah was eight years old when he began to reign, and he reigned thirty-one years in Jerusalem. '
  '10':
  - type: text
    content: 'And they gave it to the workmen who were working in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And the workmen who were working in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave it for repairing and restoring the house. '
  '11':
  - type: text
    content: 'They gave it to the carpenters and the builders to buy quarried stone, and timber for binders and '
  - type: note
    content: Neh. 2:8
  - type: text
    content: 'beams for the buildings that the kings of Judah had let go to ruin. '
  '12':
  - type: text
    content: 'And the men did the work faithfully. Over them were set Jahath and Obadiah the Levites, of the sons of Merari, and Zechariah and Meshullam, of the sons of the Kohathites, to have oversight. '
  - type: note
    content: 1 Chr. 23:5
  - type: text
    content: 'The Levites, all who were skillful with instruments of music, '
  '13':
  - type: text
    content: 'were over '
  - type: note
    content: ch. 2:2, 18; Neh. 4:10
  - type: text
    content: the burden-bearers and directed all who did work in every kind of service, and some of the Levites were scribes and officials and gatekeepers.
  '14':
  - type: text
    content: 'While they were bringing out the money that had been brought into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Hilkiah the priest found the Book of the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' given through'
  - type: note
    content: Hebrew by the hand of
  - type: text
    content: ' Moses. '
  '15':
  - type: text
    content: 'Then Hilkiah answered and said to Shaphan the secretary, “I have found the Book of the Law in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” And Hilkiah gave the book to Shaphan. '
  '16':
  - type: text
    content: 'Shaphan brought the book to the king, and further reported to the king, “All that was committed to your servants they are doing. '
  '17':
  - type: text
    content: 'They have emptied out the money that was found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and have given it into the hand of the overseers and the workmen.” '
  '18':
  - type: text
    content: Then Shaphan the secretary told the king, “Hilkiah the priest has given me a book.” And Shaphan read from it before the king.
  '19':
  - type: text
    content: 'And when the king heard the words of the Law, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'he tore his clothes. '
  '2':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', and walked in the ways of David his father; and he did not turn aside to the right hand or to the left. '
  '20':
  - type: text
    content: 'And the king commanded Hilkiah, Ahikam the son of Shaphan, Abdon the son of Micah, Shaphan the secretary, and Asaiah the king’s servant, saying, '
  '21':
  - type: text
    content: '“Go, inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ' for me and for those who are left in Israel and in Judah, concerning the words of the book that has been found. For great is '
  - type: note
    content: ch. 12:7
  - type: text
    content: 'the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' that is poured out on us, because our fathers have not kept the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', to do according to all that is written in this book.”'
  - type: heading
    content: Huldah Prophesies Disaster
  '22':
  - type: text
    content: So Hilkiah and those whom the king had sent
  - type: note
    content: Syriac, Vulgate; Hebrew lacks had sent
  - type: text
    content: ' went to Huldah the prophetess, the wife of Shallum the son of Tokhath, son of Hasrah, keeper of the wardrobe (now she lived in Jerusalem in the Second Quarter) and spoke to her to that effect. '
  '23':
  - type: text
    content: 'And she said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: ‘Tell the man who sent you to me, '
  '24':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Behold, I will bring disaster upon this place and upon its inhabitants, all the curses that are written in the book that was read before the king of Judah. '
  '25':
  - type: text
    content: 'Because they have forsaken me and '
  - type: note
    content: ch. 28:3, 4, 25
  - type: text
    content: 'have made offerings to other gods, that they might provoke me to anger with all the works of their hands, therefore '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'my wrath will be poured out on this place and will not be quenched. '
  '26':
  - type: text
    content: 'But to the king of Judah, who sent you to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', thus shall you say to him, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Regarding the words that you have heard, '
  '27':
  - type: text
    content: 'because your heart was tender and you humbled yourself before God when you heard his words against this place and its inhabitants, and you have humbled yourself before me and have torn your clothes and wept before me, I also have heard you, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: Behold, I will gather you to your fathers, and you shall be gathered to your grave in peace, and your eyes shall not see all the disaster that I will bring upon this place and its inhabitants.’” And they brought back word to the king.
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-32, see 2 Kgs. 23:1-3
  - type: text
    content: 'Then the king sent and gathered together all the elders of Judah and Jerusalem. '
  '3':
  - type: text
    content: 'For in the eighth year of his reign, while he was yet a boy, he began to seek the God of David his father, and in the twelfth year he began to purge Judah and Jerusalem of the high places, the '
  - type: note
    content: See ch. 14:3
  - type: text
    content: 'Asherim, and the carved and the metal images. '
  '30':
  - type: text
    content: 'And the king went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', with all the men of Judah and the inhabitants of Jerusalem and the priests and the Levites, all the people both great and small. And he read in their hearing all the words of the Book of the Covenant that had been found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'And the king '
  - type: note
    content: ch. 6:13; 2 Kgs. 11:14; [ch. 30:16]
  - type: text
    content: 'stood in his place '
  - type: note
    content: See ch. 15:12
  - type: text
    content: 'and made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: ', to walk after the '
  - type: text
    content: Lord
  - type: text
    content: ' and to keep his commandments and his testimonies and his statutes, with all his heart and all his soul, to perform the words of the covenant that were written in this book. '
  '32':
  - type: text
    content: 'Then he made all who were present in Jerusalem and in Benjamin join in it. And the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  '33':
  - type: text
    content: 'And Josiah took away '
  - type: note
    content: ch. 28:3; 33:2
  - type: text
    content: 'all the abominations from all the territory that belonged to the people of Israel and made all who were present in Israel serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. All his days they did not turn away from following the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers.'
  '4':
  - type: text
    content: 'And they chopped down the altars of the Baals in his presence, and he cut down the '
  - type: note
    content: '[2 Kgs. 23:6]'
  - type: text
    content: 'incense altars that stood above them. And he broke in pieces the '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Asherim and the carved and the metal images, and he made dust of them and '
  - type: note
    content: '[2 Kgs. 23:6]'
  - type: text
    content: 'scattered it over the graves of those who had sacrificed to them. '
  '5':
  - type: note
    content: 2 Kgs. 23:20; [1 Kgs. 13:2]
  - type: text
    content: 'He also burned the bones of the priests on their altars and cleansed Judah and Jerusalem. '
  '6':
  - type: text
    content: 'And in the '
  - type: note
    content: 2 Kgs. 23:15, 19
  - type: text
    content: cities of Manasseh, Ephraim, and Simeon, and as far as Naphtali, in their ruins
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' all around, '
  '7':
  - type: text
    content: 'he broke down the altars and beat the '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Asherim and the images '
  - type: note
    content: '[Deut. 9:21]'
  - type: text
    content: into powder and cut down all the incense altars throughout all the land of Israel. Then he returned to Jerusalem.
  - type: heading
    content: The Book of the Law Found
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-28, see 2 Kgs. 22:3-20
  - type: text
    content: 'Now in the eighteenth year of his reign, when he had cleansed the land and the house, he sent Shaphan the son of Azaliah, and Maaseiah the '
  - type: note
    content: ch. 18:25
  - type: text
    content: 'governor of the city, and Joah the son of Joahaz, '
  - type: note
    content: 2 Sam. 8:16
  - type: text
    content: 'the recorder, to repair the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '9':
  - type: text
    content: 'They came to '
  - type: note
    content: ch. 35:8
  - type: text
    content: 'Hilkiah the high priest and gave him the money that had been brought into the house of God, which the Levites, the keepers of the threshold, had collected from '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Manasseh and Ephraim and from all the remnant of Israel and from all Judah and Benjamin and from the inhabitants of Jerusalem. '
