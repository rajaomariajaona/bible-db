      marker-yv: yv-n
    - type: text
      text: 'beams for the buildings that the kings of Judah had let go to ruin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men did the work faithfully. Over them were set Jahath and Obadiah the Levites, of the sons of Merari, and Zechariah and Meshullam, of the sons of the Kohathites, to have oversight. '
    - type: usfm
      marker: x
