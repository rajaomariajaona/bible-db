  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said to them, “Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel: ‘Tell the man who sent you to me, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Behold, I will bring disaster upon this place and upon its inhabitants, all the curses that are written in the book that was read before the king of Judah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they have forsaken me and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
