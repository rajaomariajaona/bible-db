        children:
        - type: text
          text: 2 Kgs. 23:1-3
      marker-yv: yv-n
    - type: text
      text: 'Then the king sent and gathered together all the elders of Judah and Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in the eighth year of his reign, while he was yet a boy, he began to seek the God of David his father, and in the twelfth year he began to purge Judah and Jerusalem of the high places, the '
