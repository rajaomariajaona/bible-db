    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to keep his commandments and his testimonies and his statutes, with all his heart and all his soul, to perform the words of the covenant that were written in this book. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he made all who were present in Jerusalem and in Benjamin join in it. And the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  '33':
