    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave it for repairing and restoring the house. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They gave it to the carpenters and the builders to buy quarried stone, and timber for binders and '
