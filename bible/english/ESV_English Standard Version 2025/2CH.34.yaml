  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hilkiah answered and said to Shaphan the secretary, “I have found the Book of the Law in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” And Hilkiah gave the book to Shaphan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shaphan brought the book to the king, and further reported to the king, “All that was committed to your servants they are doing. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have emptied out the money that was found in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and have given it into the hand of the overseers and the workmen.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Shaphan the secretary told the king, “Hilkiah the priest has given me a book.” And Shaphan read from it before the king.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the king heard the words of the Law, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 7:6
      marker-yv: yv-n
    - type: text
      text: 'he tore his clothes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and walked in the ways of David his father; and he did not turn aside to the right hand or to the left. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king commanded Hilkiah, Ahikam the son of Shaphan, Abdon the son of Micah, Shaphan the secretary, and Asaiah the king’s servant, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for me and for those who are left in Israel and in Judah, concerning the words of the book that has been found. For great is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      marker-yv: yv-n
    - type: text
      text: 'the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that is poured out on us, because our fathers have not kept the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to do according to all that is written in this book.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Huldah Prophesies Disaster
    marker-yv: yv-h
