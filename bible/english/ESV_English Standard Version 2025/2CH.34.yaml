      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'Josiah was eight years old when he began to reign, and he reigned thirty-one years in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they gave it to the workmen who were working in the house of the '
    - type: usfm
      marker: nd
