document_id: ROM.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Life in the Spirit
  - type: text
    content: There is therefore now no condemnation for those who are in Christ Jesus.
  - type: note
    content: Some manuscripts add who walk not according to the flesh (but according to the Spirit)
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'But if Christ is in you, although the body is dead because of sin, the Spirit is life because of righteousness. '
  '11':
  - type: text
    content: 'If the Spirit of '
  - type: note
    content: See Acts 2:24
  - type: text
    content: him who raised Jesus from the dead dwells in you, he who raised Christ Jesus
  - type: note
    content: Some manuscripts lack Jesus
  - type: text
    content: ' from the dead will also give life to your mortal bodies '
  - type: note
    content: '[2 Cor. 3:6]'
  - type: text
    content: through his Spirit who dwells in you.
  - type: heading
    content: Heirs with Christ
  '12':
  - type: text
    content: So then, brothers,
  - type: note
    content: Or brothers and sisters; also verse 29
  - type: text
    content: ' we are debtors, '
  - type: note
    content: See ver. 2
  - type: text
    content: 'not to the flesh, to live according to the flesh. '
  '13':
  - type: text
    content: 'For if you live according to the flesh you will die, but if by the Spirit you '
  - type: note
    content: Col. 3:5
  - type: text
    content: 'put to death the deeds of the body, you will live. '
  '14':
  - type: text
    content: 'For all who are '
  - type: note
    content: Gal. 5:18
  - type: text
    content: 'led by the Spirit of God are '
  - type: note
    content: ver. 16, 19; ch. 9:8, 26; Deut. 14:1; Hos. 1:10; John 1:12
  - type: text
    content: sons
  - type: note
    content: See discussion on “sons” in the Preface
  - type: text
    content: ' of God. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 2:12
  - type: text
    content: 'you did not receive '
  - type: note
    content: 2 Tim. 1:7; [Gal. 2:4; Heb. 2:15; 1 John 4:18]
  - type: text
    content: 'the spirit of slavery to fall back into fear, but you have received the Spirit of '
  - type: note
    content: ver. 23; Gal. 4:5; [ch. 9:4; Isa. 56:5; Jer. 31:9]
  - type: text
    content: 'adoption as sons, by whom we cry, '
  - type: note
    content: Gal. 4:6; [Mark 14:36]
  - type: text
    content: '“Abba! Father!” '
  '16':
  - type: note
    content: 2 Cor. 1:22; 5:5; Eph. 1:13, 14; 1 John 3:24
  - type: text
    content: 'The Spirit himself bears witness with our spirit that we are children of God, '
  '17':
  - type: text
    content: 'and if children, then '
  - type: note
    content: Gal. 3:29; 4:7; Titus 3:7
  - type: text
    content: 'heirs—heirs of God and fellow heirs with Christ, '
  - type: note
    content: 2 Cor. 1:7; 2 Tim. 2:12; See Acts 14:22
  - type: text
    content: provided we suffer with him in order that we may also be glorified with him.
  - type: heading
    content: Future Glory
  '18':
  - type: text
    content: 'For I consider that the sufferings of this present time '
  - type: note
    content: 2 Cor. 4:17; [1 Pet. 1:5, 6]
  - type: text
    content: 'are not worth comparing with the glory that is to be revealed to us. '
  '19':
  - type: text
    content: 'For the creation waits with eager longing for '
  - type: note
    content: 1 Pet. 4:13; 5:1; 1 John 3:2; [ch. 2:7]
  - type: text
    content: 'the revealing of the sons of God. '
  '2':
  - type: text
    content: 'For the law of '
  - type: note
    content: 1 Cor. 15:45; 2 Cor. 3:6
  - type: text
    content: 'the Spirit of life '
  - type: note
    content: ver. 12; See ch. 6:14, 18; 7:4
  - type: text
    content: has set you
  - type: note
    content: Some manuscripts me
  - type: text
    content: ' free in Christ Jesus from the law of sin and death. '
  '20':
  - type: text
    content: 'For the creation '
  - type: note
    content: Gen. 3:18, 19; Eccles. 1:2
  - type: text
    content: 'was subjected to futility, not willingly, but '
  - type: note
    content: Gen. 3:17
  - type: text
    content: 'because of him who subjected it, in hope '
  '21':
  - type: text
    content: 'that '
  - type: note
    content: '[Acts 3:21]'
  - type: text
    content: 'the creation itself will be set free from its bondage to corruption and obtain the freedom of the glory of the children of God. '
  '22':
  - type: text
    content: 'For we know that '
  - type: note
    content: Mark 16:15
  - type: text
    content: 'the whole creation '
  - type: note
    content: Jer. 12:4, 11
  - type: text
    content: 'has been groaning together in the pains of childbirth until now. '
  '23':
  - type: text
    content: 'And not only the creation, but we ourselves, who have '
  - type: note
    content: '[2 Cor. 5:5; James 1:18]'
  - type: text
    content: 'the firstfruits of the Spirit, '
  - type: note
    content: 2 Cor. 5:2, 4
  - type: text
    content: 'groan inwardly as '
  - type: note
    content: ver. 19, 25; Isa. 25:9; Gal. 5:5
  - type: text
    content: 'we wait eagerly for adoption as sons, '
  - type: note
    content: See ch. 7:24; Luke 21:28
  - type: text
    content: 'the redemption of our bodies. '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: '[1 Thess. 1:3; 5:8]'
  - type: text
    content: 'in this hope we were saved. Now '
  - type: note
    content: 2 Cor. 4:18; Heb. 11:1
  - type: text
    content: 'hope that is seen is not hope. For who hopes for what he sees? '
  '25':
  - type: text
    content: 'But if we hope for what we do not see, we '
  - type: note
    content: '[1 Thess. 1:3; 5:8]'
  - type: text
    content: wait for it with patience.
  '26':
  - type: text
    content: 'Likewise the Spirit helps us in our weakness. For '
  - type: note
    content: '[Matt. 20:22; James 4:3]'
  - type: text
    content: 'we do not know what to pray for as we ought, but '
  - type: note
    content: Zech. 12:10; Eph. 6:18; See John 14:16
  - type: text
    content: 'the Spirit himself intercedes for us with groanings too deep for words. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 16:7; 1 Chr. 28:9; Prov. 15:11; 17:3; Jer. 11:20; 17:10; Luke 16:15; 1 Thess. 2:4
  - type: text
    content: 'he who searches hearts knows what is '
  - type: note
    content: See ver. 6
  - type: text
    content: the mind of the Spirit, because
  - type: note
    content: Or that
  - type: text
    content: ' the Spirit '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'intercedes for the saints '
  - type: note
    content: '[1 John 5:14]'
  - type: text
    content: 'according to the will of God. '
  '28':
  - type: text
    content: 'And we know that for those who love God all things work together '
  - type: note
    content: Ezra 8:22; [Eccles. 8:12]
  - type: text
    content: for good,
  - type: note
    content: Some manuscripts God works all things together for good, or God works in all things for the good
  - type: text
    content: ' for '
  - type: note
    content: ch. 9:24; 1 Cor. 1:9; 7:15, 17; Gal. 1:15; 5:8; Eph. 4:1, 4; 2 Tim. 1:9
  - type: text
    content: 'those who are called according to his purpose. '
  '29':
  - type: text
    content: 'For those whom he '
  - type: note
    content: ch. 11:2; 1 Pet. 1:2
  - type: text
    content: 'foreknew he also '
  - type: note
    content: 1 Cor. 2:7; Eph. 1:5, 11; [ch. 9:23]
  - type: text
    content: 'predestined '
  - type: note
    content: Phil. 3:21; [1 Cor. 15:49; Col. 3:10]; See 1 John 3:2
  - type: text
    content: 'to be conformed to the image of his Son, in order that he might be '
  - type: note
    content: Col. 1:15, 18; Heb. 1:6; Rev. 1:5
  - type: text
    content: 'the firstborn among many brothers. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: Heb. 10:1, 2, 10, 14; See Acts 13:39
  - type: text
    content: 'God has done what the law, '
  - type: note
    content: Gal. 4:9; Heb. 7:18
  - type: text
    content: 'weakened by the flesh, '
  - type: note
    content: Heb. 10:6, 8
  - type: text
    content: 'could not do. '
  - type: note
    content: 2 Cor. 5:21
  - type: text
    content: 'By sending his own Son '
  - type: note
    content: Phil. 2:7; See John 1:14
  - type: text
    content: 'in the likeness of sinful flesh and '
  - type: note
    content: Lev. 16:5; Heb. 10:6, 8; 13:11
  - type: text
    content: for sin,
  - type: note
    content: Or and as a sin offering
  - type: text
    content: ' he condemned sin in the flesh, '
  '30':
  - type: text
    content: 'And those whom he predestined he also called, and those whom he called he also '
  - type: note
    content: 1 Cor. 6:11
  - type: text
    content: 'justified, and those whom he justified he also '
  - type: note
    content: John 17:22; [Heb. 2:10]
  - type: text
    content: glorified.
  - type: heading
    content: God’s Everlasting Love
  '31':
  - type: text
    content: 'What then shall we say to these things? '
  - type: note
    content: Num. 14:9; 2 Kgs. 6:16; Ps. 118:6; 1 John 4:4
  - type: text
    content: If God is for us, who can be
  - type: note
    content: Or who is
  - type: text
    content: ' against us? '
  '32':
  - type: note
    content: John 3:16
  - type: text
    content: 'He who did not spare his own Son but '
  - type: note
    content: See ch. 4:25
  - type: text
    content: 'gave him up for us all, how will he not also with him graciously give us all things? '
  '33':
  - type: text
    content: 'Who shall bring any charge against God’s elect? '
  - type: note
    content: Isa. 50:8, 9; [Rev. 12:10, 11]
  - type: text
    content: 'It is God who justifies. '
  '34':
  - type: note
    content: ver. 1
  - type: text
    content: Who is to condemn? Christ Jesus is the one who died—more than that, who was raised—
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'who is at the right hand of God, '
  - type: note
    content: Heb. 7:25; 1 John 2:1; [ver. 27]
  - type: text
    content: who indeed is interceding for us.
  - type: note
    content: Or Is it Christ Jesus who died . . . for us?
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Who shall separate us from the love of Christ? Shall tribulation, or distress, or persecution, or famine, or nakedness, or danger, or sword? '
  '36':
  - type: text
    content: As it is written,
  - type: note
    content: Cited from Ps. 44:22
  - type: text
    content: '“For your sake '
  - type: note
    content: 1 Cor. 4:9; 15:30, 31; 2 Cor. 4:10, 11; See Acts 20:24
  - type: text
    content: we are being killed all the day long;
  - type: text
    content: we are regarded as sheep to be slaughtered.”
  '37':
  - type: text
    content: 'No, in all these things we are more than '
  - type: note
    content: 1 Cor. 15:57; See John 16:33
  - type: text
    content: 'conquerors through '
  - type: note
    content: Gal. 2:20; Eph. 5:2; Rev. 1:5; 3:9
  - type: text
    content: 'him who loved us. '
  '38':
  - type: text
    content: 'For I am sure that neither death nor life, nor angels nor rulers, nor things present nor things to come, nor powers, '
  '39':
  - type: text
    content: nor height nor depth, nor anything else in all creation, will be able to separate us from the love of God in Christ Jesus our Lord.
  '4':
  - type: text
    content: 'in order that '
  - type: note
    content: ch. 1:32; 2:26
  - type: text
    content: 'the righteous requirement of the law might be fulfilled in us, '
  - type: note
    content: Gal. 5:16, 25
  - type: text
    content: 'who walk not according to the flesh but according to the Spirit. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: '[Gal. 6:8]'
  - type: text
    content: 'those who live according to the flesh set their minds on '
  - type: note
    content: Gal. 5:19-21
  - type: text
    content: 'the things of the flesh, but those who live according to the Spirit set their minds on '
  - type: note
    content: Gal. 5:22, 23, 25
  - type: text
    content: 'the things of the Spirit. '
  '6':
  - type: text
    content: 'For to set '
  - type: note
    content: ver. 13; [Col. 2:18]; See ch. 6:21
  - type: text
    content: 'the mind on the flesh is death, but to set the mind on the Spirit is life and peace. '
  '7':
  - type: text
    content: 'For the mind that is set on the flesh is '
  - type: note
    content: James 4:4
  - type: text
    content: 'hostile to God, for it does not submit to God’s law; '
  - type: note
    content: 1 Cor. 2:14
  - type: text
    content: 'indeed, it cannot. '
  '8':
  - type: text
    content: Those who are in the flesh cannot please God.
  '9':
  - type: text
    content: 'You, however, are not in the flesh but in the Spirit, if in fact '
  - type: note
    content: ver. 11; 1 Cor. 3:16; 6:19; 2 Cor. 6:16; 2 Tim. 1:14
  - type: text
    content: 'the Spirit of God dwells in you. '
  - type: note
    content: Jude 19; [John 14:17]
  - type: text
    content: 'Anyone who does not have '
  - type: note
    content: See Acts 16:7
  - type: text
    content: 'the Spirit of Christ does not belong to him. '
