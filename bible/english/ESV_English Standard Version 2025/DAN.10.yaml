document_id: DAN.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Terrifying Vision of a Man
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:21 ]; See ch. 6:28'
  - type: text
    content: 'In the third year of Cyrus king of Persia a word was revealed to Daniel, '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'who was named Belteshazzar. And '
  - type: note
    content: '[ch. 8:26]'
  - type: text
    content: the word was true, and it was a great conflict.
  - type: note
    content: Or and it was about a great conflict
  - type: text
    content: ' And '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'he understood the word and '
  - type: note
    content: See ch. 1:17
  - type: text
    content: had understanding of the vision.
  '10':
  - type: text
    content: 'And behold, '
  - type: note
    content: See Ezek. 2:9
  - type: text
    content: 'a hand touched me and set me trembling on my hands and knees. '
  '11':
  - type: text
    content: 'And he said to me, “O Daniel, '
  - type: note
    content: ver. 19; ch. 9:23
  - type: text
    content: 'man greatly loved, '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'understand the words that I speak to you, and '
  - type: note
    content: Ezek. 2:1
  - type: text
    content: 'stand upright, for '
  - type: note
    content: '[Heb. 1:14]'
  - type: text
    content: 'now I have been sent to you.” And when he had spoken this word to me, I stood up trembling. '
  '12':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: ver. 19; [Judg. 6:23; Rev. 1:17]
  - type: text
    content: '“Fear not, Daniel, for from the first day that you '
  - type: note
    content: '[ch. 9:3]'
  - type: text
    content: 'set your heart to understand and '
  - type: note
    content: '[ch. 9:3]'
  - type: text
    content: 'humbled yourself before your God, '
  - type: note
    content: '[Acts 10:4]'
  - type: text
    content: 'your words have been heard, '
  - type: note
    content: '[ch. 9:23]'
  - type: text
    content: 'and I have come because of your words. '
  '13':
  - type: note
    content: ver. 20
  - type: text
    content: 'The prince of the kingdom of Persia withstood me '
  - type: note
    content: '[ver. 2, 3]'
  - type: text
    content: 'twenty-one days, but '
  - type: note
    content: ver. 21; ch. 12:1; Jude 9; Rev. 12:7
  - type: text
    content: 'Michael, one of the chief princes, came to help me, for I was left there with the kings of Persia, '
  '14':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'and came to make you understand what is to happen to your people '
  - type: note
    content: ch. 2:28
  - type: text
    content: 'in the latter days. For '
  - type: note
    content: ch. 8:26; [Hab. 2:3]
  - type: text
    content: the vision is for days yet to come.”
  '15':
  - type: text
    content: 'When he had spoken to me according to these words, '
  - type: note
    content: ver. 9; ch. 8:18
  - type: text
    content: 'I turned my face toward the ground '
  - type: note
    content: Ps. 39:2, 9
  - type: text
    content: 'and was mute. '
  '16':
  - type: text
    content: 'And behold, '
  - type: note
    content: See ch. 8:15
  - type: text
    content: 'one in the likeness of the children of man '
  - type: note
    content: Isa. 6:7
  - type: text
    content: 'touched my lips. Then I opened my mouth and spoke. I said to him who stood before me, “O my lord, by reason of the vision pains have come upon me, and '
  - type: note
    content: ver. 8
  - type: text
    content: 'I retain no strength. '
  '17':
  - type: text
    content: How can my lord’s servant talk with my lord? For now no strength remains in me, and no breath is left in me.”
  '18':
  - type: text
    content: 'Again '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'one having the appearance of a man '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'touched me and strengthened me. '
  '19':
  - type: text
    content: 'And he said, '
  - type: note
    content: ver. 11; ch. 9:23
  - type: text
    content: '“O man greatly loved, '
  - type: note
    content: See ver. 12
  - type: text
    content: 'fear not, peace be with you; be strong and of good courage.” And as he spoke to me, I was strengthened and said, “Let my lord speak, for you have strengthened me.” '
  '2':
  - type: text
    content: 'In those days I, Daniel, was mourning for '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'three weeks. '
  '20':
  - type: text
    content: 'Then he said, “Do you know why I have come to you? But now I will return to fight against the '
  - type: note
    content: ver. 13
  - type: text
    content: 'prince of Persia; and when I go out, behold, the prince of '
  - type: note
    content: ch. 8:21
  - type: text
    content: 'Greece will come. '
  '21':
  - type: text
    content: 'But I will tell you '
  - type: note
    content: ch. 12:1, 4; [Ex. 32:32]
  - type: text
    content: 'what is inscribed in the book of truth: there is none who contends by my side against these except '
  - type: note
    content: See ver. 13
  - type: text
    content: Michael, your prince.
  '3':
  - type: text
    content: 'I ate no delicacies, no meat or wine entered my mouth, nor did I '
  - type: note
    content: '[Amos 6:6; Matt. 6:17]'
  - type: text
    content: 'anoint myself at all, for '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the full three weeks. '
  '4':
  - type: text
    content: 'On the twenty-fourth day of the first month, as I was standing '
  - type: note
    content: '[ch. 12:5]'
  - type: text
    content: on the bank of the great river (
  - type: note
    content: Gen. 2:14
  - type: text
    content: 'that is, the Tigris) '
  '5':
  - type: note
    content: '[Josh. 5:13]'
  - type: text
    content: 'I lifted up my eyes and looked, and behold, '
  - type: note
    content: Ezek. 9:2
  - type: text
    content: 'a man clothed in linen, '
  - type: note
    content: '[Rev. 1:13; 15:6]'
  - type: text
    content: 'with a belt of fine '
  - type: note
    content: Jer. 10:9
  - type: text
    content: 'gold from Uphaz around his waist. '
  '6':
  - type: text
    content: 'His body was like '
  - type: note
    content: '[Ezek. 1:16; 10:9]'
  - type: text
    content: 'beryl, his face '
  - type: note
    content: Ezek. 1:14; Matt. 28:3
  - type: text
    content: 'like the appearance of lightning, '
  - type: note
    content: Rev. 1:14
  - type: text
    content: 'his eyes like flaming torches, his arms and '
  - type: note
    content: Rev. 1:15
  - type: text
    content: 'legs like the gleam of burnished bronze, and '
  - type: note
    content: Rev. 1:15
  - type: text
    content: 'the sound of his words like the sound of a multitude. '
  '7':
  - type: note
    content: '[Acts 9:7]'
  - type: text
    content: 'And I, Daniel, alone saw the vision, for the men who were with me did not see the vision, but a great trembling fell upon them, and they fled to hide themselves. '
  '8':
  - type: text
    content: 'So I was left alone and saw this great vision, and '
  - type: note
    content: '[ch. 7:28]'
  - type: text
    content: no strength was left in me. My radiant appearance was fearfully changed,
  - type: note
    content: Hebrew My splendor was changed to ruin
  - type: text
    content: ' '
  - type: note
    content: ver. 16
  - type: text
    content: 'and I retained no strength. '
  '9':
  - type: text
    content: 'Then I heard the sound of his words, '
  - type: note
    content: ch. 8:18
  - type: text
    content: 'and as I heard the sound of his words, I fell on my face in deep sleep '
  - type: note
    content: ch. 8:18
  - type: text
    content: with my face to the ground.
