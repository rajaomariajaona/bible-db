document_id: PHM.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: ver. 9; See Eph. 3:1
  - type: text
    content: 'a prisoner for Christ Jesus, and '
  - type: note
    content: See 1 Thess. 3:2
  - type: text
    content: Timothy our brother,
  - type: text
    content: 'To Philemon our beloved fellow worker '
  '10':
  - type: text
    content: 'I appeal to you for '
  - type: note
    content: See 3 John 4
  - type: text
    content: 'my child, '
  - type: note
    content: Col. 4:9
  - type: text
    content: Onesimus,
  - type: note
    content: Onesimus means useful (see verse 11) or beneficial (see verse 20)
  - type: text
    content: ' '
  - type: note
    content: ver. 13; 1 Cor. 4:15; [Gal. 4:19]
  - type: text
    content: 'whose father I became in my imprisonment. '
  '11':
  - type: text
    content: '(Formerly he was useless to you, but now he is indeed useful to you and to me.) '
  '12':
  - type: text
    content: 'I am sending him back to you, sending my very heart. '
  '13':
  - type: text
    content: 'I would have been glad to keep him with me, in order that he might serve me '
  - type: note
    content: See 1 Cor. 16:17
  - type: text
    content: 'on your behalf '
  - type: note
    content: ver. 10; See Phil. 1:7
  - type: text
    content: 'during my imprisonment for the gospel, '
  '14':
  - type: text
    content: 'but I preferred to do nothing without your consent in order that your goodness might not be '
  - type: note
    content: '[2 Cor. 9:7; 1 Pet. 5:2]'
  - type: text
    content: 'by compulsion but of your own accord. '
  '15':
  - type: text
    content: 'For this perhaps is why '
  - type: note
    content: '[Gen. 45:5, 8]'
  - type: text
    content: 'he was parted from you for a while, that you might have him back forever, '
  '16':
  - type: note
    content: See 1 Cor. 7:22
  - type: text
    content: no longer as a bondservant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; twice in this verse
  - type: text
    content: ' but more than a bondservant, as '
  - type: note
    content: Matt. 23:8; Col. 4:9; 1 Tim. 6:2
  - type: text
    content: 'a beloved brother—especially to me, but how much more to you, '
  - type: note
    content: Col. 3:22, 23; [Eph. 6:5]
  - type: text
    content: both in the flesh and in the Lord.
  '17':
  - type: text
    content: 'So if you consider me '
  - type: note
    content: 2 Cor. 8:23
  - type: text
    content: 'your partner, receive him as you would receive me. '
  '18':
  - type: text
    content: 'If he has wronged you at all, or owes you anything, charge that to my account. '
  '19':
  - type: note
    content: See 1 Cor. 16:21
  - type: text
    content: 'I, Paul, write this with my own hand: I will repay it—to say nothing of your owing me even your own self. '
  '2':
  - type: text
    content: 'and Apphia our sister and '
  - type: note
    content: Col. 4:17
  - type: text
    content: 'Archippus our '
  - type: note
    content: Phil. 2:25
  - type: text
    content: 'fellow soldier, and '
  - type: note
    content: See Rom. 16:5
  - type: text
    content: 'the church in your house:'
  '20':
  - type: text
    content: 'Yes, brother, I want some benefit from you in the Lord. '
  - type: note
    content: See ver. 7
  - type: text
    content: Refresh my heart in Christ.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See 2 Cor. 2:3
  - type: text
    content: 'Confident of your obedience, I write to you, knowing that you will do even more than I say. '
  '22':
  - type: text
    content: 'At the same time, prepare a guest room for me, for '
  - type: note
    content: Phil. 1:25; 2:24
  - type: text
    content: 'I am hoping that '
  - type: note
    content: See 2 Cor. 1:11
  - type: text
    content: 'through your prayers '
  - type: note
    content: '[Heb. 13:19]'
  - type: text
    content: I will be graciously given to you.
  - type: heading
    content: Final Greetings
  '23':
  - type: text
    content: ' '
  - type: note
    content: See Col. 1:7
  - type: text
    content: 'Epaphras, my '
  - type: note
    content: Rom. 16:7
  - type: text
    content: 'fellow prisoner in Christ Jesus, sends greetings to you, '
  '24':
  - type: text
    content: 'and so do '
  - type: note
    content: See Col. 4:10
  - type: text
    content: 'Mark, '
  - type: note
    content: See Col. 4:10
  - type: text
    content: 'Aristarchus, '
  - type: note
    content: See Col. 4:14; 2 Tim. 4:10, 11
  - type: text
    content: 'Demas, and '
  - type: note
    content: See Col. 4:14; 2 Tim. 4:10, 11
  - type: text
    content: Luke, my fellow workers.
  '25':
  - type: text
    content: ' '
  - type: note
    content: See Gal. 6:18
  - type: text
    content: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Philemon’s Love and Faith
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:8, 9
  - type: text
    content: 'I thank my God always when I remember you in my prayers, '
  '5':
  - type: text
    content: 'because I '
  - type: note
    content: Col. 1:4
  - type: text
    content: 'hear of your love and '
  - type: note
    content: Eph. 1:15
  - type: text
    content: 'of the faith that you have toward the Lord Jesus and for all the saints, '
  '6':
  - type: text
    content: 'and I pray that the sharing of your faith may become effective for the full '
  - type: note
    content: Phil. 1:9; Col. 1:9
  - type: text
    content: knowledge of every good thing that is in us for the sake of Christ.
  - type: note
    content: Or for Christ’s service
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For I have derived much joy and '
  - type: note
    content: '[2 Cor. 7:4, 13; Col. 4:11]'
  - type: text
    content: 'comfort from your love, my brother, because the hearts of the saints '
  - type: note
    content: ver. 20; 2 Tim. 1:16; [Rom. 15:32; 2 Cor. 7:13]
  - type: text
    content: have been refreshed through you.
  - type: heading
    content: Paul’s Plea for Onesimus
  '8':
  - type: text
    content: 'Accordingly, '
  - type: note
    content: '[1 Thess. 2:6]'
  - type: text
    content: 'though I am bold enough in Christ to command you to do '
  - type: note
    content: Eph. 5:4
  - type: text
    content: 'what is required, '
  '9':
  - type: text
    content: 'yet for love’s sake I prefer to appeal to you—I, Paul, an old man and now '
  - type: note
    content: ver. 1
  - type: text
    content: 'a prisoner also for Christ Jesus— '
