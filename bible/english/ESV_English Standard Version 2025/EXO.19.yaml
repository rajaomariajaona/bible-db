document_id: EXO.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel at Mount Sinai
  - type: text
    content: 'On the third new moon after the people of Israel had gone out of the land of Egypt, on that day they '
  - type: note
    content: Num. 33:15
  - type: text
    content: 'came into the wilderness of Sinai. '
  '10':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go to the people and '
  - type: note
    content: Lev. 11:44, 45; [Josh. 3:5]
  - type: text
    content: 'consecrate them today and tomorrow, and let them '
  - type: note
    content: '[Gen. 35:2; Lev. 15:5]'
  - type: text
    content: 'wash their garments '
  '11':
  - type: text
    content: 'and be ready for the third day. For on the third day '
  - type: note
    content: ch. 34:5; [Deut. 33:2]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will come down on Mount Sinai in the sight of all the people. '
  '12':
  - type: text
    content: 'And you shall set limits for the people all around, saying, ‘Take care not to go up into the mountain or touch the edge of it. '
  - type: note
    content: Cited Heb. 12:20
  - type: text
    content: 'Whoever touches the mountain shall be put to death. '
  '13':
  - type: text
    content: No hand shall touch him, but he shall be stoned or shot;
  - type: note
    content: That is, shot with an arrow
  - type: text
    content: ' whether beast or man, he shall not live.’ When '
  - type: note
    content: ver. 16, 19
  - type: text
    content: 'the trumpet sounds a long blast, they shall come up to the mountain.” '
  '14':
  - type: text
    content: 'So Moses '
  - type: note
    content: ver. 3
  - type: text
    content: 'went down from the mountain to the people and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'consecrated the people; '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'and they washed their garments. '
  '15':
  - type: text
    content: 'And he said to the people, “Be ready for the '
  - type: note
    content: ver. 11
  - type: text
    content: 'third day; '
  - type: note
    content: '[1 Sam. 21:4, 5; 1 Cor. 7:5]'
  - type: text
    content: do not go near a woman.”
  '16':
  - type: text
    content: 'On the morning of the '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'third day there were '
  - type: note
    content: Ps. 77:18; Heb. 12:18; Rev. 4:5; 8:5; 11:19
  - type: text
    content: 'thunders and lightnings and '
  - type: note
    content: ver. 9
  - type: text
    content: 'a thick cloud on the mountain and a very loud '
  - type: note
    content: ver. 13
  - type: text
    content: 'trumpet blast, so that all the people in the camp '
  - type: note
    content: Heb. 12:21
  - type: text
    content: 'trembled. '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: Deut. 4:10
  - type: text
    content: 'Moses brought the people out of the camp to meet God, and they took their stand at the foot of the mountain. '
  '18':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 24:17; Judg. 5:5; [Ps. 144:5; Isa. 6:4; Rev. 15:8]
  - type: text
    content: 'Mount Sinai was wrapped in smoke because the '
  - type: text
    content: Lord
  - type: text
    content: ' had descended on it in fire. The smoke of it went up like the smoke of a kiln, and '
  - type: note
    content: Ps. 68:8; Heb. 12:26
  - type: text
    content: 'the whole mountain trembled greatly. '
  '19':
  - type: text
    content: 'And as the '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'sound of the trumpet grew louder and louder, Moses spoke, and '
  - type: note
    content: Neh. 9:13; Ps. 81:7
  - type: text
    content: 'God answered him in thunder. '
  '2':
  - type: text
    content: 'They set out from '
  - type: note
    content: ch. 17:1, 8
  - type: text
    content: 'Rephidim and came into the wilderness of Sinai, and they encamped in the wilderness. There Israel encamped before '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'the mountain, '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' came down on Mount Sinai, to the top of the mountain. And the '
  - type: text
    content: Lord
  - type: text
    content: ' called Moses to the top of the mountain, and Moses went up.'
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go down and warn the people, lest they break through to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:6; 1 Sam. 6:19]'
  - type: text
    content: 'to look and many of them perish. '
  '22':
  - type: text
    content: 'Also let the priests who come near to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Lev. 10:3
  - type: text
    content: 'consecrate themselves, lest the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 6:8; 1 Chr. 13:11
  - type: text
    content: 'break out against them.” '
  '23':
  - type: text
    content: 'And Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “The people cannot come up to Mount Sinai, for you yourself warned us, saying, '
  - type: note
    content: ver. 12; [Josh. 3:4]
  - type: text
    content: '‘Set limits around the mountain and consecrate it.’” '
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go down, and come up bringing Aaron with you. But do not let the priests and the people '
  - type: note
    content: 2 Sam. 6:8; 1 Chr. 13:11
  - type: text
    content: 'break through to come up to the '
  - type: text
    content: Lord
  - type: text
    content: ', lest he break out against them.” '
  '25':
  - type: text
    content: So Moses went down to the people and told them.
  '3':
  - type: text
    content: 'while '
  - type: note
    content: ch. 20:21; [Acts 7:38]
  - type: text
    content: 'Moses went up to God. '
  - type: note
    content: ch. 3:4
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called to him out of the mountain, saying, “Thus you shall say to the house of Jacob, and tell the people of Israel: '
  '4':
  - type: note
    content: Deut. 29:2
  - type: text
    content: '‘You yourselves have seen what I did to the Egyptians, and how '
  - type: note
    content: Deut. 32:11, 12; Isa. 63:9; Rev. 12:14
  - type: text
    content: 'I bore you on eagles’ wings and brought you to myself. '
  '5':
  - type: text
    content: 'Now therefore, if you will indeed obey my voice and keep my covenant, you shall be '
  - type: note
    content: Deut. 7:6; 14:2; 26:18; Ps. 135:4; Mal. 3:17; Titus 2:14
  - type: text
    content: 'my treasured possession among all peoples, for '
  - type: note
    content: ch. 9:29; Deut. 10:14; Job 41:11; Ps. 24:1; 50:12; 1 Cor. 10:26
  - type: text
    content: 'all the earth is mine; '
  '6':
  - type: text
    content: 'and you shall be to me a '
  - type: note
    content: 1 Pet. 2:5, 9; Rev. 1:6; 5:10; 20:6
  - type: text
    content: 'kingdom of priests and '
  - type: note
    content: Lev. 20:26; Deut. 7:6; 14:21; 26:19; 28:9; Isa. 62:12; 1 Pet. 2:9
  - type: text
    content: a holy nation.’ These are the words that you shall speak to the people of Israel.”
  '7':
  - type: text
    content: 'So Moses came and called the elders of the people and set before them all these words that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him. '
  '8':
  - type: note
    content: ch. 24:3, 7; Deut. 5:27; 26:17
  - type: text
    content: 'All the people answered together and said, “All that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken we will do.” And Moses reported the words of the people to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Behold, I am coming to you '
  - type: note
    content: ch. 20:21; 24:16; Deut. 4:11; Ps. 18:11; 97:2; [Matt. 17:5]
  - type: text
    content: 'in a thick cloud, that '
  - type: note
    content: Deut. 4:12, 36; [John 12:28, 29]
  - type: text
    content: 'the people may hear when I speak with you, and may also '
  - type: note
    content: ch. 14:31
  - type: text
    content: believe you forever.”
  - type: text
    content: 'When Moses told the words of the people to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
