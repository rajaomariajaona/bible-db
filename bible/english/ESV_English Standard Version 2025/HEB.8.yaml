document_id: HEB.8,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, High Priest of a Better Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the point in what we are saying is this: we have such a high priest, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 16:19
      marker-yv: yv-n
    - type: text
      text: 'one who is seated at the right hand of the throne of the Majesty in heaven, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 11:27
      marker-yv: yv-n
    - type: text
      text: For this is the covenant that I will make with the house of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'after those days, declares the Lord:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my laws into their minds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: write them on their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will be their God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they shall be my people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And they shall not teach, each one his neighbor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and each one his brother, saying, ‘Know the Lord,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they shall '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 54:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 6:45
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 2:27
      marker-yv: yv-n
    - type: text
      text: all know me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the least of them to the greatest.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For I will be merciful toward their iniquities,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 11:27
      marker-yv: yv-n
    - type: text
      text: and I will remember their sins no more.”
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'In speaking of a new covenant, he makes the first one obsolete. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 5:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: what is becoming obsolete and growing old is ready to vanish away.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'a minister in the holy places, in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:24
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: the true tent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tabernacle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 5
      marker-yv: yv-n
    - type: text
      text: ' that the Lord '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 33:7
      marker-yv: yv-n
    - type: text
      text: 'set up, not man. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      marker-yv: yv-n
    - type: text
      text: 'every high priest is appointed to offer gifts and sacrifices; thus '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:12-14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:9-12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:2
      marker-yv: yv-n
    - type: text
      text: 'it is necessary for this priest also to have something to offer. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now if he were on earth, he would not be a priest at all, since there are priests who offer gifts according to the law. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They serve '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:23
      marker-yv: yv-n
    - type: text
      text: 'a copy and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:17
      marker-yv: yv-n
    - type: text
      text: 'shadow of the heavenly things. For when Moses was about to erect the tent, he was instructed by God, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited from '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:40
      marker-yv: yv-n
    - type: text
      text: '“See that you make everything according to the pattern that was shown you on the mountain.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But as it is, Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' has obtained a ministry that is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:6-11
      marker-yv: yv-n
    - type: text
      text: 'as much more excellent than the old as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:22
      marker-yv: yv-n
    - type: text
      text: 'the covenant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:24
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:19
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he mediates is better, since it is enacted on better promises. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:11
      marker-yv: yv-n
    - type: text
      text: For if that first covenant had been faultless, there would have been no occasion to look for a second.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For he finds fault with them when he says:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: For finding fault with it he says to them
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited from '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:31-34
      marker-yv: yv-n
    - type: text
      text: “Behold, the days are coming, declares the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I will establish a new covenant with the house of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the house of Judah,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: not like the covenant that I made with their fathers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the day when I took them by the hand to bring them out of the land of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they did not continue in my covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so I showed no concern for them, declares the Lord.
