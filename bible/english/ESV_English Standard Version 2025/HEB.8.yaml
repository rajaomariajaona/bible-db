document_id: HEB.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, High Priest of a Better Covenant
  - type: text
    content: 'Now the point in what we are saying is this: we have such a high priest, '
  - type: note
    content: See Mark 16:19
  - type: text
    content: 'one who is seated at the right hand of the throne of the Majesty in heaven, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:16; Rom. 11:27
  - type: text
    content: For this is the covenant that I will make with the house of Israel
  - type: text
    content: 'after those days, declares the Lord:'
  - type: text
    content: I will put my laws into their minds,
  - type: text
    content: 'and '
  - type: note
    content: '[2 Cor. 3:3]'
  - type: text
    content: write them on their hearts,
  - type: text
    content: and I will be their God,
  - type: text
    content: and they shall be my people.
  '11':
  - type: text
    content: And they shall not teach, each one his neighbor
  - type: text
    content: and each one his brother, saying, ‘Know the Lord,’
  - type: text
    content: 'for they shall '
  - type: note
    content: Isa. 54:13; John 6:45; 1 John 2:27
  - type: text
    content: all know me,
  - type: text
    content: from the least of them to the greatest.
  '12':
  - type: text
    content: For I will be merciful toward their iniquities,
  - type: note
    content: ch. 10:17; Rom. 11:27
  - type: text
    content: and I will remember their sins no more.”
  '13':
  - type: text
    content: 'In speaking of a new covenant, he makes the first one obsolete. And '
  - type: note
    content: '[2 Cor. 5:17]'
  - type: text
    content: what is becoming obsolete and growing old is ready to vanish away.
  '2':
  - type: text
    content: 'a minister in the holy places, in '
  - type: note
    content: ch. 9:24; [ch. 9:11]
  - type: text
    content: the true tent
  - type: note
    content: Or tabernacle; also verse 5
  - type: text
    content: ' that the Lord '
  - type: note
    content: Ex. 33:7
  - type: text
    content: 'set up, not man. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'every high priest is appointed to offer gifts and sacrifices; thus '
  - type: note
    content: ch. 9:12-14; 10:9-12; Eph. 5:2
  - type: text
    content: 'it is necessary for this priest also to have something to offer. '
  '4':
  - type: text
    content: 'Now if he were on earth, he would not be a priest at all, since there are priests who offer gifts according to the law. '
  '5':
  - type: text
    content: 'They serve '
  - type: note
    content: ch. 9:23
  - type: text
    content: 'a copy and '
  - type: note
    content: ch. 10:1; Col. 2:17
  - type: text
    content: 'shadow of the heavenly things. For when Moses was about to erect the tent, he was instructed by God, saying, '
  - type: note
    content: Cited from Ex. 25:40
  - type: text
    content: '“See that you make everything according to the pattern that was shown you on the mountain.” '
  '6':
  - type: text
    content: But as it is, Christ
  - type: note
    content: Greek he
  - type: text
    content: ' has obtained a ministry that is '
  - type: note
    content: ch. 1:4; 2 Cor. 3:6-11
  - type: text
    content: 'as much more excellent than the old as '
  - type: note
    content: ch. 7:22
  - type: text
    content: 'the covenant '
  - type: note
    content: ch. 9:15; 12:24; [Gal. 3:19]
  - type: text
    content: 'he mediates is better, since it is enacted on better promises. '
  '7':
  - type: note
    content: See ch. 7:11
  - type: text
    content: For if that first covenant had been faultless, there would have been no occasion to look for a second.
  '8':
  - type: text
    content: 'For he finds fault with them when he says:'
  - type: note
    content: Some manuscripts For finding fault with it he says to them
  - type: note
    content: Cited from Jer. 31:31-34
  - type: text
    content: “Behold, the days are coming, declares the Lord,
  - type: text
    content: when I will establish a new covenant with the house of Israel
  - type: text
    content: and with the house of Judah,
  '9':
  - type: text
    content: not like the covenant that I made with their fathers
  - type: text
    content: on the day when I took them by the hand to bring them out of the land of Egypt.
  - type: text
    content: For they did not continue in my covenant,
  - type: text
    content: and so I showed no concern for them, declares the Lord.
