        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'you must set him free from your service.’ But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
