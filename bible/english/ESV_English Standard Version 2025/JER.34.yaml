  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they obeyed, all the officials and all the people who had entered into the covenant that everyone would set free his slave, male or female, so that they would not be enslaved again. They obeyed and set them free. '
  '11':
  - type: usfm
    marker: p
