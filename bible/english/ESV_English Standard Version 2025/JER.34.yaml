document_id: JER.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Zedekiah to Die in Babylon
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ', when '
  - type: note
    content: ch. 39:1; 52:4; 2 Kgs. 25:1
  - type: text
    content: 'Nebuchadnezzar king of Babylon and all his army '
  - type: note
    content: ch. 1:15; [ch. 51:28]
  - type: text
    content: 'and all the kingdoms of the earth under his dominion and all the peoples were fighting against Jerusalem and all of its cities: '
  '10':
  - type: text
    content: 'And they obeyed, all the officials and all the people who had entered into the covenant that everyone would set free his slave, male or female, so that they would not be enslaved again. They obeyed and set them free. '
  '11':
  - type: text
    content: 'But afterward they turned around and took back the male and female slaves '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'they had set free, and brought them into subjection as slaves. '
  '12':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '13':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: I myself made a covenant with your fathers when '
  - type: note
    content: Ex. 20:2
  - type: text
    content: 'I brought them out of the land of Egypt, out of the house of slavery, saying, '
  '14':
  - type: note
    content: Ex. 21:2; Deut. 15:12
  - type: text
    content: '‘At the end of seven years each of you must set free the fellow Hebrew who has been sold to you and has served you six years; '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'you must set him free from your service.’ But '
  - type: note
    content: ch. 7:24, 26; 11:8; 17:23; 25:4; 35:15; 44:5
  - type: text
    content: 'your fathers did not listen to me or incline their ears to me. '
  '15':
  - type: text
    content: 'You recently repented and did what was right in my eyes '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'by proclaiming liberty, each to his neighbor, and '
  - type: note
    content: ver. 8; [2 Kgs. 23:3]
  - type: text
    content: 'you made a covenant before me in the '
  - type: note
    content: See ch. 7:10
  - type: text
    content: 'house that is called by my name, '
  '16':
  - type: text
    content: 'but then you turned around '
  - type: note
    content: Lev. 18:21; 19:12
  - type: text
    content: 'and profaned my name when each of you took back his male and female slaves, '
  - type: note
    content: ver. 11
  - type: text
    content: whom you had set free according to their desire, and you brought them into subjection to be your slaves.
  '17':
  - type: text
    content: '“Therefore, thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': You have not obeyed me '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'by proclaiming liberty, every one to his brother and to his neighbor; '
  - type: note
    content: '[Matt. 7:2; Gal. 6:7; James 2:13]'
  - type: text
    content: 'behold, I proclaim to you liberty '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'to the sword, to pestilence, and to famine, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: See ch. 15:4
  - type: text
    content: 'I will make you a horror to all the kingdoms of the earth. '
  '18':
  - type: text
    content: 'And the men who transgressed my covenant and did not keep the terms of '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: the covenant that they made before me, I will make them like
  - type: note
    content: Hebrew lacks them like
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 15:10]'
  - type: text
    content: 'the calf that they cut in two and passed between its parts— '
  '19':
  - type: text
    content: 'the officials of Judah, the officials of Jerusalem, '
  - type: note
    content: ch. 29:2
  - type: text
    content: 'the eunuchs, the priests, and all the people of the land who passed between the parts of the calf. '
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Go and speak to '
  - type: note
    content: 2 Kgs. 25:2
  - type: text
    content: 'Zedekiah king of Judah and say to him, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'Behold, I am giving this city into the hand of the king of Babylon, and he shall burn it with fire. '
  '20':
  - type: text
    content: 'And I will give them into the hand of their enemies '
  - type: note
    content: See ch. 22:25
  - type: text
    content: 'and into the hand of those who seek their lives. '
  - type: note
    content: See ch. 7:33
  - type: text
    content: 'Their dead bodies shall be food for the birds of the air and the beasts of the earth. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 2, 4, 8]'
  - type: text
    content: 'Zedekiah king of Judah and his officials I will give into the hand of their enemies and into the hand of those who seek their lives, into the hand of the army of the king of Babylon '
  - type: note
    content: ch. 37:5, 11
  - type: text
    content: 'which has withdrawn from you. '
  '22':
  - type: text
    content: 'Behold, '
  - type: note
    content: Isa. 10:6
  - type: text
    content: 'I will command, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and will '
  - type: note
    content: ch. 37:8; 38:3
  - type: text
    content: 'bring them back to this city. '
  - type: note
    content: ch. 37:8; 38:3
  - type: text
    content: 'And they will fight against it and take it and burn it with fire. '
  - type: note
    content: ch. 9:11
  - type: text
    content: 'I will make the cities of Judah a desolation '
  - type: note
    content: See ch. 4:7
  - type: text
    content: without inhabitant.”
  '3':
  - type: note
    content: See ch. 32:4
  - type: text
    content: 'You shall not escape from his hand but shall surely be captured and delivered into his hand. '
  - type: note
    content: See ch. 32:4
  - type: text
    content: 'You shall see the king of Babylon eye to eye and speak with him face to face. And you shall go to Babylon.’ '
  '4':
  - type: text
    content: 'Yet hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', O Zedekiah king of Judah! '
  - type: note
    content: '[ch. 38:17, 20; 39:4, 7]'
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning you: '
  - type: note
    content: '[ch. 38:17, 20; 39:4, 7]'
  - type: text
    content: '‘You shall not die by the sword. '
  '5':
  - type: text
    content: 'You shall die in peace. '
  - type: note
    content: 1 Sam. 31:12; 2 Chr. 21:19
  - type: text
    content: 'And as spices were burned for your fathers, the former kings who were before you, so people shall '
  - type: note
    content: 2 Chr. 16:14
  - type: text
    content: 'burn spices for you '
  - type: note
    content: '[ch. 22:18]'
  - type: text
    content: 'and lament for you, saying, “Alas, lord!”’ For I have spoken the word, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '6':
  - type: text
    content: 'Then Jeremiah the prophet spoke all these words to Zedekiah king of Judah, in Jerusalem, '
  '7':
  - type: text
    content: 'when the army of the king of Babylon was fighting against Jerusalem and against all the cities of Judah that were left, '
  - type: note
    content: Josh. 10:3
  - type: text
    content: 'Lachish and '
  - type: note
    content: Josh. 10:10; 15:35
  - type: text
    content: 'Azekah, '
  - type: note
    content: 2 Kgs. 18:13
  - type: text
    content: 'for these were the only '
  - type: note
    content: ch. 4:5
  - type: text
    content: fortified cities of Judah that remained.
  '8':
  - type: text
    content: 'The word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ', after King Zedekiah '
  - type: note
    content: ver. 15
  - type: text
    content: 'had made a covenant with all the people in Jerusalem '
  - type: note
    content: ver. 15, 17; Ex. 21:2; Lev. 25:10; [Isa. 61:1]
  - type: text
    content: 'to make a proclamation of liberty to them, '
  '9':
  - type: note
    content: See Lev. 25:39-46
  - type: text
    content: 'that everyone should set free his Hebrew slaves, male and female, '
  - type: note
    content: '[Neh. 5:8]'
  - type: text
    content: 'so that no one should enslave a Jew, his brother. '
