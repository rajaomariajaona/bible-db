document_id: GAL.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: By Faith, or by Works of the Law?
  - type: text
    content: 'O foolish Galatians! Who has bewitched you? '
  - type: note
    content: '[Num. 21:9]'
  - type: text
    content: 'It was before your eyes that Jesus Christ was publicly '
  - type: note
    content: '[1 Cor. 1:23]'
  - type: text
    content: 'portrayed as crucified. '
  '10':
  - type: text
    content: 'For all who rely on works of the law are '
  - type: note
    content: '[ch. 5:4]; See Rom. 4:15'
  - type: text
    content: 'under a curse; for it is written, '
  - type: note
    content: Cited from Deut. 27:26; [Jer. 11:3; Ezek. 18:4]
  - type: text
    content: '“Cursed be everyone who does not '
  - type: note
    content: '[Matt. 5:19]'
  - type: text
    content: 'abide by all things written in the Book of the Law, and do them.” '
  '11':
  - type: text
    content: 'Now it is evident that '
  - type: note
    content: See ch. 2:16
  - type: text
    content: 'no one is justified before God by the law, for '
  - type: note
    content: Rom. 1:17; Heb. 10:38; Cited from Hab. 2:4
  - type: text
    content: “The righteous shall live by faith.”
  - type: note
    content: Or The one who by faith is righteous will live
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But the law is not of faith, rather '
  - type: note
    content: Cited from Lev. 18:5; See Rom. 10:5
  - type: text
    content: '“The one who does them shall live by them.” '
  '13':
  - type: text
    content: 'Christ '
  - type: note
    content: ch. 4:5; [Rev. 22:3]; See 2 Pet. 2:1
  - type: text
    content: 'redeemed us from the curse of the law by becoming a curse for us—for it is written, '
  - type: note
    content: Cited from Deut. 21:23
  - type: text
    content: '“Cursed is everyone who is hanged '
  - type: note
    content: See Acts 5:30
  - type: text
    content: 'on a tree”— '
  '14':
  - type: text
    content: 'so that in Christ Jesus the blessing of Abraham might '
  - type: note
    content: Rom. 4:9, 16; [ver. 28]
  - type: text
    content: 'come to the Gentiles, so that '
  - type: note
    content: ver. 2
  - type: text
    content: 'we might receive '
  - type: note
    content: Acts 2:33; [Isa. 32:15; 44:3; Joel 2:28; John 7:39; Eph. 1:13]
  - type: text
    content: the promised Spirit
  - type: note
    content: Greek receive the promise of the Spirit
  - type: text
    content: ' through faith.'
  - type: heading
    content: The Law and the Promise
  '15':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 3:5
  - type: text
    content: 'To give a human example, brothers:'
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  - type: note
    content: '[Heb. 9:17]'
  - type: text
    content: 'even with a man-made covenant, no one annuls it or adds to it once it has been ratified. '
  '16':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 4:13, 16; See Luke 1:55
  - type: text
    content: 'the promises were made '
  - type: note
    content: Gen. 12:7; Acts 13:32
  - type: text
    content: 'to Abraham and to his offspring. It does not say, “And to offsprings,” referring to many, but referring to one, '
  - type: note
    content: Acts 3:25
  - type: text
    content: '“And to your offspring,” who is Christ. '
  '17':
  - type: text
    content: 'This is what I mean: the law, which came '
  - type: note
    content: Ex. 12:40, 41; [Gen. 15:13; Acts 7:6]
  - type: text
    content: '430 years afterward, does not annul a covenant previously ratified by God, so as '
  - type: note
    content: Rom. 4:14
  - type: text
    content: 'to make the promise void. '
  '18':
  - type: text
    content: 'For if the inheritance comes by the law, it no longer comes by promise; but '
  - type: note
    content: '[Heb. 6:13, 14]'
  - type: text
    content: God gave it to Abraham by a promise.
  '19':
  - type: text
    content: 'Why then the law? '
  - type: note
    content: '[Rom. 4:15]'
  - type: text
    content: 'It was added because of transgressions, '
  - type: note
    content: ver. 16
  - type: text
    content: 'until the offspring should come to whom the promise had been made, and it was '
  - type: note
    content: Acts 7:53; Heb. 2:2
  - type: text
    content: 'put in place through angels '
  - type: note
    content: Ex. 20:19, 21, 22; Deut. 5:5, 22, 23, 27, 31; Acts 7:38
  - type: text
    content: 'by an intermediary. '
  '2':
  - type: text
    content: 'Let me ask you only this: '
  - type: note
    content: ver. 14; Eph. 1:13; Heb. 6:4; See Acts 15:8
  - type: text
    content: 'Did you receive the Spirit by works of the law or by '
  - type: note
    content: Rom. 10:17
  - type: text
    content: 'hearing with faith? '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Tim. 2:5; Heb. 8:6; 9:15; 12:24; [Heb. 6:17]
  - type: text
    content: 'an intermediary implies more than one, but '
  - type: note
    content: Rom. 3:30
  - type: text
    content: God is one.
  '21':
  - type: text
    content: 'Is the law then contrary to the promises of God? Certainly not! For '
  - type: note
    content: See ch. 2:21
  - type: text
    content: 'if a law had been given that could give life, then righteousness would indeed be by the law. '
  '22':
  - type: text
    content: 'But the Scripture '
  - type: note
    content: Rom. 11:32; See Rom. 3:9
  - type: text
    content: 'imprisoned everything under sin, so that '
  - type: note
    content: Rom. 4:16
  - type: text
    content: 'the promise by faith in Jesus Christ might be given '
  - type: note
    content: See Acts 10:43
  - type: text
    content: to those who believe.
  '23':
  - type: text
    content: 'Now before faith came, we were held captive under the law, '
  - type: note
    content: '[1 Pet. 1:5]'
  - type: text
    content: 'imprisoned until the coming faith would be revealed. '
  '24':
  - type: text
    content: 'So then, '
  - type: note
    content: '[Matt. 5:17; Rom. 10:4; Col. 2:17; Heb. 9:9, 10]'
  - type: text
    content: 'the law was our '
  - type: note
    content: 1 Cor. 4:15 (Gk.)
  - type: text
    content: 'guardian until Christ came, '
  - type: note
    content: ver. 11; See ch. 2:16
  - type: text
    content: 'in order that we might be justified by faith. '
  '25':
  - type: text
    content: 'But now that faith has come, we are no longer under a guardian, '
  '26':
  - type: text
    content: 'for in Christ Jesus '
  - type: note
    content: ch. 4:5, 6; [John 1:12]; See Rom. 8:14-16
  - type: text
    content: 'you are all sons of God, through faith. '
  '27':
  - type: text
    content: 'For as many of you as '
  - type: note
    content: Rom. 6:3
  - type: text
    content: 'were baptized '
  - type: note
    content: See Acts 8:16
  - type: text
    content: 'into Christ have '
  - type: note
    content: See Rom. 13:14
  - type: text
    content: 'put on Christ. '
  '28':
  - type: note
    content: '[ver. 14; ch. 5:6; 6:15]; See Rom. 3:30; 1 Cor. 12:13'
  - type: text
    content: There is neither Jew nor Greek, there is neither slave
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' nor free, '
  - type: note
    content: 1 Cor. 11:11
  - type: text
    content: 'there is no male and female, for you are all one in Christ Jesus. '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: See Rom. 9:7; 1 Cor. 3:23
  - type: text
    content: 'if you are Christ’s, then you are Abraham’s offspring, '
  - type: note
    content: ch. 4:1, 7; Rom. 8:17; Eph. 3:6; [ch. 4:28; 2 Tim. 1:1; Titus 1:2; Heb. 9:15]
  - type: text
    content: heirs according to promise.
  '3':
  - type: text
    content: 'Are you so foolish? '
  - type: note
    content: Phil. 1:6; [ch. 4:9]
  - type: text
    content: Having begun by the Spirit, are you now being perfected by
  - type: note
    content: Or now ending with
  - type: text
    content: ' the flesh? '
  '4':
  - type: note
    content: 1 Cor. 15:2; [Heb. 10:35; 2 John 8]
  - type: text
    content: Did you suffer
  - type: note
    content: Or experience
  - type: text
    content: ' so many things in vain—if indeed it was in vain? '
  '5':
  - type: text
    content: 'Does he who supplies the Spirit to you and '
  - type: note
    content: '[1 Cor. 12:10]'
  - type: text
    content: 'works miracles among you do so '
  - type: note
    content: ver. 2
  - type: text
    content: 'by works of the law, or by hearing with faith— '
  '6':
  - type: text
    content: 'just as '
  - type: note
    content: Cited from Gen. 15:6; [Rom. 4:9, 21, 22]; See Rom. 4:3
  - type: text
    content: Abraham “believed God, and it was counted to him as righteousness”?
  '7':
  - type: text
    content: 'Know then that it is '
  - type: note
    content: ver. 9
  - type: text
    content: 'those of faith who are '
  - type: note
    content: See Luke 19:9
  - type: text
    content: 'the sons of Abraham. '
  '8':
  - type: text
    content: 'And the Scripture, foreseeing that '
  - type: note
    content: See Rom. 3:30
  - type: text
    content: God would justify
  - type: note
    content: Or count righteous; also verses 11, 24
  - type: text
    content: ' the Gentiles by faith, preached the gospel beforehand to Abraham, saying, '
  - type: note
    content: Cited from Gen. 12:3
  - type: text
    content: '“In you shall all the nations be blessed.” '
  '9':
  - type: text
    content: So then, those who are of faith are blessed along with Abraham, the man of faith.
  - type: heading
    content: The Righteous Shall Live by Faith
