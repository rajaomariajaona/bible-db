        - type: text
          text: Hos. 11:3
      marker-yv: yv-n
    - type: text
      text: 'carried you, as a man carries his son, all the way that you went until you came to this place.’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet in spite of this word '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
