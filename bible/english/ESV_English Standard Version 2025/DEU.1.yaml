        - type: text
          text: 28:62
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Gen. 15:5'
      marker-yv: yv-n
    - type: text
      text: 'you are today as numerous as the stars of heaven. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
