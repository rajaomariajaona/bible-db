document_id: DEU.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Command to Leave Horeb
  - type: text
    content: 'These are the words that Moses spoke to all Israel beyond the Jordan in the wilderness, in '
  - type: note
    content: ch. 3:17
  - type: text
    content: 'the Arabah opposite '
  - type: note
    content: '[Num. 21:14]'
  - type: text
    content: 'Suph, between '
  - type: note
    content: 1 Sam. 25:1
  - type: text
    content: 'Paran and Tophel, Laban, Hazeroth, and Dizahab. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has multiplied you, and behold, '
  - type: note
    content: '[ch. 10:22; 28:62]; See Gen. 15:5'
  - type: text
    content: 'you are today as numerous as the stars of heaven. '
  '11':
  - type: note
    content: '[2 Sam. 24:3]'
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, make you a thousand times as many as you are and bless you, '
  - type: note
    content: Gen. 12:2; 22:17; 26:3, 24
  - type: text
    content: 'as he has promised you! '
  '12':
  - type: note
    content: '[1 Kgs. 3:8, 9]'
  - type: text
    content: 'How can I bear by myself the weight and burden of you and your strife? '
  '13':
  - type: note
    content: '[Ex. 18:21; Num. 11:16, 17]'
  - type: text
    content: 'Choose for your tribes wise, understanding, and experienced men, and I will appoint them as your heads.’ '
  '14':
  - type: text
    content: 'And you answered me, ‘The thing that you have spoken is good for us to do.’ '
  '15':
  - type: text
    content: 'So I took the heads of your tribes, wise and experienced men, '
  - type: note
    content: Ex. 18:25
  - type: text
    content: 'and set them as heads over you, commanders of thousands, commanders of hundreds, commanders of fifties, commanders of tens, and officers, throughout your tribes. '
  '16':
  - type: text
    content: 'And I charged your judges at that time, ‘Hear the cases between your brothers, and '
  - type: note
    content: ch. 16:18; John 7:24
  - type: text
    content: 'judge righteously between a man and his brother or the alien who is with him. '
  '17':
  - type: note
    content: ch. 16:19; Ex. 23:2, 3; Lev. 19:15; 2 Chr. 19:7; Prov. 24:23; 28:21; Mal. 2:9; James 2:1, 9
  - type: text
    content: 'You shall not be partial in judgment. You shall hear the small and the great alike. You shall not be intimidated by anyone, for '
  - type: note
    content: 2 Chr. 19:6; [Ex. 21:6]
  - type: text
    content: 'the judgment is God’s. And the case that is too hard for you, you shall '
  - type: note
    content: Ex. 18:22, 26
  - type: text
    content: 'bring to me, and I will hear it.’ '
  '18':
  - type: text
    content: And I commanded you at that time all the things that you should do.
  - type: heading
    content: Israel’s Refusal to Enter the Land
  '19':
  - type: text
    content: '“Then we set out from Horeb and '
  - type: note
    content: ch. 8:15; 32:10; Jer. 2:6; [Num. 10:12]
  - type: text
    content: 'went through all that great and terrifying wilderness that you saw, on the way to the hill country of the Amorites, as the '
  - type: text
    content: Lord
  - type: text
    content: ' our God commanded us. And '
  - type: note
    content: See ver. 2
  - type: text
    content: 'we came to Kadesh-barnea. '
  '2':
  - type: text
    content: 'It is eleven days’ journey from Horeb by the way of Mount Seir to '
  - type: note
    content: ch. 2:14; 9:23; Num. 13:26; 32:8; 34:4
  - type: text
    content: 'Kadesh-barnea. '
  '20':
  - type: text
    content: 'And I said to you, ‘You have come to the hill country of the Amorites, which the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is giving us. '
  '21':
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has set the land before you. Go up, take possession, as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, has told you. '
  - type: note
    content: ch. 31:8; Josh. 1:9
  - type: text
    content: 'Do not fear or be dismayed.’ '
  '22':
  - type: text
    content: 'Then all of you came near me and said, ‘Let us send men before us, that they may explore the land for us and bring us word again of the way by which we must go up and the cities into which we shall come.’ '
  '23':
  - type: text
    content: 'The thing seemed good to me, and '
  - type: note
    content: Num. 13:3
  - type: text
    content: 'I took twelve men from you, one man from each tribe. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: See Num. 13:22-27
  - type: text
    content: 'they turned and went up into the hill country, and came to the Valley of Eshcol and spied it out. '
  '25':
  - type: text
    content: 'And they took in their hands some of the fruit of the land and brought it down to us, and brought us word again and said, ‘It is a good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is giving us.’'
  '26':
  - type: text
    content: '“Yet you would not go up, but rebelled against the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 106:25; See Num. 14:1-4
  - type: text
    content: 'you murmured in your tents and said, ‘Because the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 9:28
  - type: text
    content: 'hated us he has brought us out of the land of Egypt, '
  - type: note
    content: '[Josh. 7:7]'
  - type: text
    content: 'to give us into the hand of the Amorites, to destroy us. '
  '28':
  - type: text
    content: 'Where are we going up? '
  - type: note
    content: Josh. 14:8
  - type: text
    content: 'Our brothers have made our hearts melt, saying, '
  - type: note
    content: ch. 9:1, 2; See Num. 13:28-33
  - type: text
    content: '“The people are greater and taller than we. The cities are great and fortified up to heaven. And besides, we have seen '
  - type: note
    content: See Num. 13:22
  - type: text
    content: 'the sons of the Anakim there.”’ '
  '29':
  - type: text
    content: 'Then I said to you, ‘Do not be in dread or afraid of them. '
  '3':
  - type: note
    content: '[Num. 33:38]'
  - type: text
    content: 'In the fortieth year, on the first day of the eleventh month, Moses spoke to the people of Israel according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him in commandment to them, '
  '30':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God who goes before you '
  - type: note
    content: ch. 3:22; Ex. 14:14, 25; Josh. 10:14, 42; 23:3, 10; [Neh. 4:20]
  - type: text
    content: 'will himself fight for you, just as he did for you in Egypt before your eyes, '
  '31':
  - type: text
    content: 'and in the wilderness, where you have seen how the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ch. 32:11, 12; Ex. 19:4; Isa. 46:3, 4; 63:9; Hos. 11:3
  - type: text
    content: 'carried you, as a man carries his son, all the way that you went until you came to this place.’ '
  '32':
  - type: text
    content: 'Yet in spite of this word '
  - type: note
    content: Ps. 106:24; Jude 5
  - type: text
    content: 'you did not believe the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '33':
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'who went before you in the way '
  - type: note
    content: Num. 10:33
  - type: text
    content: to seek you out a place to pitch your tents, in fire by night and in the cloud by day, to show you by what way you should go.
  - type: heading
    content: The Penalty for Israel’s Rebellion
  '34':
  - type: text
    content: '“And the '
  - type: text
    content: Lord
  - type: text
    content: ' heard your words and was angered, and he swore, '
  '35':
  - type: note
    content: See ch. 2:15; Num. 14:20-30
  - type: text
    content: '‘Not one of these men of this evil generation shall see the good land that I swore to give to your fathers, '
  '36':
  - type: note
    content: Num. 14:30; Josh. 14:9
  - type: text
    content: 'except Caleb the son of Jephunneh. He shall see it, and to him and to his children I will give the land on which he has trodden, because he has wholly followed the '
  - type: text
    content: Lord
  - type: text
    content: '!’ '
  '37':
  - type: text
    content: 'Even with me '
  - type: note
    content: ch. 4:21; 32:51; 34:4; Num. 20:12; 27:13, 14; [Ps. 106:32]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry on your account and said, ‘You also shall not go in there. '
  '38':
  - type: note
    content: ch. 31:3, 7; Ex. 24:13; [1 Sam. 16:22]
  - type: text
    content: 'Joshua the son of Nun, '
  - type: note
    content: ch. 31:3, 7; Ex. 24:13; [1 Sam. 16:22]
  - type: text
    content: 'who stands before you, he shall enter. '
  - type: note
    content: ch. 31:7, 23; Num. 27:18-20
  - type: text
    content: 'Encourage him, for he shall cause Israel to inherit it. '
  '39':
  - type: text
    content: 'And as for '
  - type: note
    content: Num. 14:3, 31
  - type: text
    content: 'your little ones, who you said would become a prey, and your children, who today '
  - type: note
    content: Isa. 7:15, 16
  - type: text
    content: 'have no knowledge of good or evil, they shall go in there. And to them I will give it, and they shall possess it. '
  '4':
  - type: text
    content: 'after '
  - type: note
    content: See Num. 21:21-32
  - type: text
    content: 'he had defeated Sihon the king of the Amorites, who lived in Heshbon, and '
  - type: note
    content: See Num. 21:33-35
  - type: text
    content: 'Og the king of Bashan, who lived in Ashtaroth and in '
  - type: note
    content: ch. 3:1, 10; Josh. 12:4; 13:12
  - type: text
    content: 'Edrei. '
  '40':
  - type: text
    content: 'But as for you, '
  - type: note
    content: ch. 2:1; Num. 14:25
  - type: text
    content: turn, and journey into the wilderness in the direction of the Red Sea.’
  '41':
  - type: text
    content: '“Then you answered me, '
  - type: note
    content: Num. 14:40
  - type: text
    content: '‘We have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: '. We ourselves will go up and fight, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' our God commanded us.’ And every one of you fastened on his weapons of war and thought it easy to go up into the hill country. '
  '42':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Num. 14:42
  - type: text
    content: '‘Say to them, Do not go up or fight, '
  - type: note
    content: '[ch. 31:17]'
  - type: text
    content: 'for I am not in your midst, lest you be defeated before your enemies.’ '
  '43':
  - type: text
    content: 'So I spoke to you, and you would not listen; but you rebelled against the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Num. 14:44
  - type: text
    content: 'presumptuously went up into the hill country. '
  '44':
  - type: note
    content: Num. 14:45
  - type: text
    content: 'Then the Amorites who lived in that hill country came out against you and chased you '
  - type: note
    content: '[Ps. 118:12; Isa. 7:18]'
  - type: text
    content: 'as bees do and beat you down in Seir as far as '
  - type: note
    content: See Num. 21:3
  - type: text
    content: 'Hormah. '
  '45':
  - type: text
    content: 'And you returned and wept before the '
  - type: text
    content: Lord
  - type: text
    content: ', but the '
  - type: text
    content: Lord
  - type: text
    content: ' did not listen to your voice or give ear to you. '
  '46':
  - type: text
    content: 'So '
  - type: note
    content: Num. 20:1, 22; Judg. 11:17
  - type: text
    content: you remained at Kadesh many days, the days that you remained there.
  '5':
  - type: text
    content: 'Beyond the Jordan, '
  - type: note
    content: ch. 29:1
  - type: text
    content: 'in the land of Moab, Moses undertook to explain this law, saying, '
  '6':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' our God said to us in Horeb, '
  - type: note
    content: ch. 2:3; [Ex. 19:1; Num. 10:11]
  - type: text
    content: '‘You have stayed long enough at this mountain. '
  '7':
  - type: text
    content: 'Turn and take your journey, and go to '
  - type: note
    content: '[Num. 13:29]'
  - type: text
    content: 'the hill country of the Amorites and to all their neighbors in '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the Arabah, '
  - type: note
    content: Josh. 9:1
  - type: text
    content: 'in the hill country and in the lowland and in the Negeb and '
  - type: note
    content: Josh. 9:1
  - type: text
    content: 'by the seacoast, the land of the Canaanites, and Lebanon, as far as the great river, the river Euphrates. '
  '8':
  - type: text
    content: 'See, I have set the land before you. Go in and take possession of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers, '
  - type: note
    content: Gen. 12:7; 13:14, 15; 15:18; 17:7, 8; 26:3, 4; 28:13, 14; 50:24
  - type: text
    content: to Abraham, to Isaac, and to Jacob, to give to them and to their offspring after them.’
  - type: heading
    content: Leaders Appointed
  '9':
  - type: text
    content: '“At that time '
  - type: note
    content: Num. 11:14; [Ex. 18:18]
  - type: text
    content: 'I said to you, ‘I am not able to bear you by myself. '
