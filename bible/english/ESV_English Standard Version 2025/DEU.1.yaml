      marker-yv: yv-n
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers, make you a thousand times as many as you are and bless you, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 12:2
      - type: text
        text: '; '
      - type: usfm
