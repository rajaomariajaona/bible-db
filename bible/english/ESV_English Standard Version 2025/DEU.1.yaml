      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:4
      marker-yv: yv-n
    - type: text
      text: 'Kadesh-barnea. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I said to you, ‘You have come to the hill country of the Amorites, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is giving us. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has set the land before you. Go up, take possession, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers, has told you. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 1:9
      marker-yv: yv-n
    - type: text
      text: 'Do not fear or be dismayed.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all of you came near me and said, ‘Let us send men before us, that they may explore the land for us and bring us word again of the way by which we must go up and the cities into which we shall come.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The thing seemed good to me, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:3
      marker-yv: yv-n
    - type: text
      text: 'I took twelve men from you, one man from each tribe. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:22-27
      marker-yv: yv-n
    - type: text
      text: 'they turned and went up into the hill country, and came to the Valley of Eshcol and spied it out. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took in their hands some of the fruit of the land and brought it down to us, and brought us word again and said, ‘It is a good land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is giving us.’'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet you would not go up, but rebelled against the command of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:25
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:1-4
      marker-yv: yv-n
    - type: text
      text: 'you murmured in your tents and said, ‘Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:28
      marker-yv: yv-n
    - type: text
      text: 'hated us he has brought us out of the land of Egypt, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 7:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to give us into the hand of the Amorites, to destroy us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where are we going up? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 14:8
      marker-yv: yv-n
    - type: text
      text: 'Our brothers have made our hearts melt, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:28-33
      marker-yv: yv-n
    - type: text
      text: '“The people are greater and taller than we. The cities are great and fortified up to heaven. And besides, we have seen '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 13:22
      marker-yv: yv-n
    - type: text
      text: 'the sons of the Anakim there.”’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said to you, ‘Do not be in dread or afraid of them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 33:38
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'In the fortieth year, on the first day of the eleventh month, Moses spoke to the people of Israel according to all that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him in commandment to them, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God who goes before you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 10:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
