          text: Ex. 18:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 11:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Choose for your tribes wise, understanding, and experienced men, and I will appoint them as your heads.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you answered me, ‘The thing that you have spoken is good for us to do.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I took the heads of your tribes, wise and experienced men, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 18:25
      marker-yv: yv-n
    - type: text
      text: 'and set them as heads over you, commanders of thousands, commanders of hundreds, commanders of fifties, commanders of tens, and officers, throughout your tribes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I charged your judges at that time, ‘Hear the cases between your brothers, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 7:24
      marker-yv: yv-n
    - type: text
      text: 'judge righteously between a man and his brother or the alien who is with him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 23:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 19:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 19:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 24:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 2:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 2:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'You shall not be partial in judgment. You shall hear the small and the great alike. You shall not be intimidated by anyone, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 19:6
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the judgment is God’s. And the case that is too hard for you, you shall '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 18:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      marker-yv: yv-n
    - type: text
      text: 'bring to me, and I will hear it.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I commanded you at that time all the things that you should do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Refusal to Enter the Land
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then we set out from Horeb and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
