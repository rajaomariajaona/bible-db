document_id: PSA.85,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Revive Us Again
  - type: text
    content: 'To the choirmaster. A Psalm of '
  - type: note
    content: Ps. 42, title
  - type: text
    content: the Sons of Korah.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you were '
  - type: note
    content: Ps. 77:7
  - type: text
    content: favorable to your land;
  - type: text
    content: 'you '
  - type: note
    content: Ps. 14:7
  - type: text
    content: restored the fortunes of Jacob.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 89:14; See Ps. 40:11
  - type: text
    content: Steadfast love and faithfulness meet;
  - type: note
    content: '[ Isa. 45:8 ]; See Ps. 72:3'
  - type: text
    content: righteousness and peace kiss each other.
  '11':
  - type: text
    content: Faithfulness springs up from the ground,
  - type: text
    content: and righteousness looks down from the sky.
  '12':
  - type: text
    content: 'Yes, '
  - type: note
    content: Ps. 84:11; [James 1:17]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will give what is good,'
  - type: text
    content: 'and our land '
  - type: note
    content: See Ps. 67:6
  - type: text
    content: will yield its increase.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps. 89:14; Isa. 58:8
  - type: text
    content: Righteousness will go before him
  - type: text
    content: and make his footsteps a way.
  '2':
  - type: text
    content: 'You '
  - type: note
    content: Ps. 32:1
  - type: text
    content: forgave the iniquity of your people;
  - type: text
    content: 'you '
  - type: note
    content: Ps. 32:1
  - type: text
    content: 'covered all their sin. '
  - type: text
    content: Selah
  '3':
  - type: text
    content: You withdrew all your wrath;
  - type: text
    content: 'you '
  - type: note
    content: Ps. 78:38; 106:23; Ex. 32:12; Deut. 13:17; Jonah 3:9
  - type: text
    content: turned from your hot anger.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 80:3
  - type: text
    content: Restore us again, O God of our salvation,
  - type: text
    content: and put away your indignation toward us!
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 79:5 ]'
  - type: text
    content: Will you be angry with us forever?
  - type: text
    content: Will you prolong your anger to all generations?
  '6':
  - type: text
    content: 'Will you not '
  - type: note
    content: Ps. 71:20
  - type: text
    content: revive us again,
  - type: text
    content: 'that your people may '
  - type: note
    content: Ps. 90:14; 149:2
  - type: text
    content: rejoice in you?
  '7':
  - type: text
    content: 'Show us your steadfast love, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and grant us your salvation.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Hab. 2:1 ]'
  - type: text
    content: 'Let me hear what God the '
  - type: text
    content: Lord
  - type: text
    content: ' will speak,'
  - type: text
    content: 'for he will '
  - type: note
    content: Zech. 9:10; [Hag. 2:9]
  - type: text
    content: 'speak peace to his people, to his '
  - type: note
    content: See Ps. 50:5
  - type: text
    content: saints;
  - type: text
    content: 'but let them not '
  - type: note
    content: '[2 Pet. 2:21]'
  - type: text
    content: 'turn back to '
  - type: note
    content: '[Ps. 49:13]'
  - type: text
    content: folly.
  '9':
  - type: text
    content: 'Surely his '
  - type: note
    content: Isa. 46:13
  - type: text
    content: salvation is near to those who fear him,
  - type: text
    content: 'that '
  - type: note
    content: Zech. 2:5; [John 1:14]
  - type: text
    content: glory may dwell in our land.
