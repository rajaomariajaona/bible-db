document_id: EST.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The King’s Banquets
  - type: text
    content: 'Now in the days of Ahasuerus, the Ahasuerus who reigned '
  - type: note
    content: ch. 8:9
  - type: text
    content: 'from India to Ethiopia over '
  - type: note
    content: ch. 8:9; 9:30; [Dan. 6:1]
  - type: text
    content: '127 provinces, '
  '10':
  - type: text
    content: 'On the seventh day, '
  - type: note
    content: '[2 Sam. 13:28]'
  - type: text
    content: 'when the heart of the king was merry with wine, he commanded Mehuman, Biztha, '
  - type: note
    content: ch. 7:9
  - type: text
    content: 'Harbona, '
  - type: note
    content: '[ch. 2:21; 6:2]'
  - type: text
    content: 'Bigtha and Abagtha, Zethar and Carkas, the seven eunuchs who served in the presence of King Ahasuerus, '
  '11':
  - type: text
    content: 'to bring Queen Vashti before the king with '
  - type: note
    content: ch. 2:17; 6:8
  - type: text
    content: her royal crown,
  - type: note
    content: Or headdress
  - type: text
    content: ' in order to show the peoples and the princes her beauty, for she was lovely to look at. '
  '12':
  - type: text
    content: But Queen Vashti refused to come at the king’s command delivered by the eunuchs. At this the king became enraged, and his anger burned within him.
  '13':
  - type: text
    content: 'Then the king said to '
  - type: note
    content: Jer. 10:7; Dan. 2:12, 13; Matt. 2:1
  - type: text
    content: 'the wise men '
  - type: note
    content: 1 Chr. 12:32
  - type: text
    content: 'who knew the times (for this was the king’s procedure toward all who were versed in law and judgment, '
  '14':
  - type: text
    content: 'the men next to him being Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and '
  - type: note
    content: ver. 16, 21
  - type: text
    content: 'Memucan, '
  - type: note
    content: Ezra 7:14
  - type: text
    content: 'the seven princes of Persia and Media, '
  - type: note
    content: 2 Kgs. 25:19
  - type: text
    content: 'who saw the king’s face, and sat first in the kingdom): '
  '15':
  - type: text
    content: '“According to the law, what is to be done to Queen Vashti, because she has not performed the command of King Ahasuerus delivered by the eunuchs?” '
  '16':
  - type: text
    content: 'Then Memucan said in the presence of the king and the officials, “Not only against the king has Queen Vashti done wrong, but also against all the officials and all the peoples who are in all the provinces of King Ahasuerus. '
  '17':
  - type: text
    content: For the queen’s behavior will be made known to all women, causing them to look at their husbands with contempt,
  - type: note
    content: Hebrew to disdain their husbands in their eyes
  - type: text
    content: ' since they will say, ‘King Ahasuerus commanded Queen Vashti to be brought before him, and she did not come.’ '
  '18':
  - type: text
    content: 'This very day the noble women of Persia and Media who have heard of the queen’s behavior will say the same to all the king’s officials, and there will be contempt and wrath in plenty. '
  '19':
  - type: text
    content: 'If it please the king, let a royal order go out from him, and let it be written among the laws of the Persians and the Medes so '
  - type: note
    content: ch. 8:8; Dan. 6:8, 12, 15
  - type: text
    content: 'that it may not be repealed, that Vashti is never again to come before King Ahasuerus. And let the king give her royal position to another who is better than she. '
  '2':
  - type: text
    content: 'in those days when King Ahasuerus '
  - type: note
    content: 1 Kgs. 1:46
  - type: text
    content: 'sat on his royal throne in '
  - type: note
    content: See Neh. 1:1
  - type: text
    content: 'Susa, the citadel, '
  '20':
  - type: text
    content: 'So when the decree made by the king is proclaimed throughout all his kingdom, for it is vast, '
  - type: note
    content: '[Eph. 5:22, 24, 33; Col. 3:18; 1 Tim. 2:12; 1 Pet. 3:1]'
  - type: text
    content: 'all women will give honor to their husbands, high and low alike.” '
  '21':
  - type: text
    content: 'This advice pleased the king and the princes, and the king did as Memucan proposed. '
  '22':
  - type: text
    content: 'He sent letters to all the royal provinces, '
  - type: note
    content: ch. 3:12; 8:9
  - type: text
    content: to every province in its own script and to every people in its own language, that every man be master in his own household and speak according to the language of his people.
  '3':
  - type: text
    content: 'in the third year of his reign '
  - type: note
    content: ch. 2:18; [Gen. 40:20; 1 Kgs. 3:15; Mark 6:21]
  - type: text
    content: 'he gave a feast for all his officials and servants. The army of Persia and Media and the nobles and governors of the provinces were before him, '
  '4':
  - type: text
    content: 'while he showed the riches of his royal glory and the splendor and pomp of his greatness for many days, 180 days. '
  '5':
  - type: text
    content: 'And when these days were completed, the king gave for all the people present in Susa the citadel, both great and small, a feast lasting for seven days in the court of '
  - type: note
    content: ch. 7:7, 8
  - type: text
    content: 'the garden of the king’s palace. '
  '6':
  - type: text
    content: There were white cotton curtains and violet hangings fastened with cords of fine linen and purple to silver rods
  - type: note
    content: Or rings
  - type: text
    content: ' and marble pillars, and also '
  - type: note
    content: '[Ezek. 23:41; Amos 6:4]'
  - type: text
    content: 'couches of gold and silver on a mosaic pavement of porphyry, marble, mother-of-pearl, and precious stones. '
  '7':
  - type: text
    content: 'Drinks were served in golden vessels, vessels of different kinds, and the royal wine was lavished according to the bounty of the king. '
  '8':
  - type: text
    content: 'And drinking was according to this edict: “There is no compulsion.” For the king had given orders to all the staff of his palace to do as each man desired. '
  '9':
  - type: text
    content: Queen Vashti also gave a feast for the women in the palace that belonged to King Ahasuerus.
  - type: heading
    content: Queen Vashti’s Refusal
