  - type: text
    text: The King’s Banquets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in the days of Ahasuerus, the Ahasuerus who reigned '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:9
      metadata:
        usfm: EST.8.9
    marker-yv: yv-n
  - type: text
    text: 'from India to Ethiopia over '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:9
      metadata:
        usfm: EST.8.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:30
      metadata:
        usfm: EST.9.30
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 6:1
      metadata:
        usfm: DAN.6.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '127 provinces, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in those days when King Ahasuerus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 1:46
      metadata:
        usfm: 1KI.1.46
    marker-yv: yv-n
  - type: text
    text: 'sat on his royal throne in '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Neh. 1:1
      metadata:
        usfm: NEH.1.1
    marker-yv: yv-n
  - type: text
    text: 'Susa, the citadel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in the third year of his reign '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:18
      metadata:
        usfm: EST.2.18
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 40:20
      metadata:
        usfm: GEN.40.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 3:15
      metadata:
        usfm: 1KI.3.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 6:21
      metadata:
        usfm: MRK.6.21
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'he gave a feast for all his officials and servants. The army of Persia and Media and the nobles and governors of the provinces were before him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'while he showed the riches of his royal glory and the splendor and pomp of his greatness for many days, 180 days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when these days were completed, the king gave for all the people present in Susa the citadel, both great and small, a feast lasting for seven days in the court of '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:7
      metadata:
        usfm: EST.7.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: EST.7.8
    marker-yv: yv-n
  - type: text
    text: 'the garden of the king’s palace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There were white cotton curtains and violet hangings fastened with cords of fine linen and purple to silver rods
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rings
    marker-yv: yv-n
  - type: text
    text: ' and marble pillars, and also '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 23:41
      metadata:
        usfm: EZK.23.41
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 6:4
      metadata:
        usfm: AMO.6.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'couches of gold and silver on a mosaic pavement of porphyry, marble, mother-of-pearl, and precious stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Drinks were served in golden vessels, vessels of different kinds, and the royal wine was lavished according to the bounty of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And drinking was according to this edict: “There is no compulsion.” For the king had given orders to all the staff of his palace to do as each man desired. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Queen Vashti also gave a feast for the women in the palace that belonged to King Ahasuerus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Queen Vashti’s Refusal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the seventh day, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 13:28
      metadata:
        usfm: 2SA.13.28
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'when the heart of the king was merry with wine, he commanded Mehuman, Biztha, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:9
      metadata:
        usfm: EST.7.9
    marker-yv: yv-n
  - type: text
    text: 'Harbona, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:21
      metadata:
        usfm: EST.2.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:2
      metadata:
        usfm: EST.6.2
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'Bigtha and Abagtha, Zethar and Carkas, the seven eunuchs who served in the presence of King Ahasuerus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'to bring Queen Vashti before the king with '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:17
      metadata:
        usfm: EST.2.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:8
      metadata:
        usfm: EST.6.8
    marker-yv: yv-n
  - type: text
    text: her royal crown,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: headdress
    marker-yv: yv-n
  - type: text
    text: ' in order to show the peoples and the princes her beauty, for she was lovely to look at. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But Queen Vashti refused to come at the king’s command delivered by the eunuchs. At this the king became enraged, and his anger burned within him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the king said to '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 10:7
      metadata:
        usfm: JER.10.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:12
      metadata:
        usfm: DAN.2.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: DAN.2.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 2:1
      metadata:
        usfm: MAT.2.1
    marker-yv: yv-n
  - type: text
    text: 'the wise men '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 12:32
      metadata:
        usfm: 1CH.12.32
    marker-yv: yv-n
  - type: text
    text: 'who knew the times (for this was the king’s procedure toward all who were versed in law and judgment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the men next to him being Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16, 21
      metadata:
        usfm: EST.1.16
    marker-yv: yv-n
  - type: text
    text: 'Memucan, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezra 7:14
      metadata:
        usfm: EZR.7.14
    marker-yv: yv-n
  - type: text
    text: 'the seven princes of Persia and Media, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Kgs. 25:19
      metadata:
        usfm: 2KI.25.19
    marker-yv: yv-n
  - type: text
    text: 'who saw the king’s face, and sat first in the kingdom): '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“According to the law, what is to be done to Queen Vashti, because she has not performed the command of King Ahasuerus delivered by the eunuchs?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Memucan said in the presence of the king and the officials, “Not only against the king has Queen Vashti done wrong, but also against all the officials and all the peoples who are in all the provinces of King Ahasuerus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the queen’s behavior will be made known to all women, causing them to look at their husbands with contempt,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: to disdain their husbands in their eyes
    marker-yv: yv-n
  - type: text
    text: ' since they will say, ‘King Ahasuerus commanded Queen Vashti to be brought before him, and she did not come.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This very day the noble women of Persia and Media who have heard of the queen’s behavior will say the same to all the king’s officials, and there will be contempt and wrath in plenty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If it please the king, let a royal order go out from him, and let it be written among the laws of the Persians and the Medes so '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:8
      metadata:
        usfm: EST.8.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 6:8
      metadata:
        usfm: DAN.6.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: DAN.6.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: DAN.6.15
    marker-yv: yv-n
  - type: text
    text: 'that it may not be repealed, that Vashti is never again to come before King Ahasuerus. And let the king give her royal position to another who is better than she. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So when the decree made by the king is proclaimed throughout all his kingdom, for it is vast, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 5:22
      metadata:
        usfm: EPH.5.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: EPH.5.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: EPH.5.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 3:18
      metadata:
        usfm: COL.3.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 2:12
      metadata:
        usfm: 1TI.2.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pet. 3:1
      metadata:
        usfm: 1PE.3.1
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'all women will give honor to their husbands, high and low alike.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This advice pleased the king and the princes, and the king did as Memucan proposed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He sent letters to all the royal provinces, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: EST.3.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:9
      metadata:
        usfm: EST.8.9
    marker-yv: yv-n
  - type: text
    text: to every province in its own script and to every people in its own language, that every man be master in his own household and speak according to the language of his people.
