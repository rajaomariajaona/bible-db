document_id: ISA.10,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Woe to those who '
  - type: note
    content: '[Ps. 94:20]'
  - type: text
    content: decree iniquitous decrees,
  - type: text
    content: 'and the writers who '
  - type: note
    content: Jer. 8:8
  - type: text
    content: keep writing oppression,
  '10':
  - type: text
    content: 'As my hand has reached to '
  - type: note
    content: '[2 Kgs. 19:17, 18]'
  - type: text
    content: the kingdoms of the idols,
  - type: text
    content: whose carved images were greater than those of Jerusalem and Samaria,
  '11':
  - type: text
    content: 'shall I not do to Jerusalem and '
  - type: note
    content: ch. 2:8
  - type: text
    content: her idols
  - type: note
    content: 2 Kgs. 18:34
  - type: text
    content: as I have done to Samaria and her images?”
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 29:4, 5; 30:18; 2 Kgs. 19:31 ]'
  - type: text
    content: 'When the Lord has finished all his work on Mount Zion and on Jerusalem, '
  - type: note
    content: See 2 Kgs. 19:35-37
  - type: text
    content: he
  - type: note
    content: Hebrew I
  - type: text
    content: ' will punish the speech'
  - type: note
    content: Hebrew fruit
  - type: text
    content: ' of the arrogant heart of the king of Assyria and the boastful look in his eyes. '
  '13':
  - type: note
    content: ch. 37:23-25; 2 Kgs. 19:22-24
  - type: text
    content: 'For he says:'
  - type: text
    content: “By the strength of my hand I have done it,
  - type: text
    content: and by my wisdom, for I have understanding;
  - type: text
    content: I remove the boundaries of peoples,
  - type: text
    content: and plunder their treasures;
  - type: text
    content: like a bull I bring down those who sit on thrones.
  '14':
  - type: text
    content: My hand has found like a nest
  - type: text
    content: the wealth of the peoples;
  - type: text
    content: and as one gathers eggs that have been forsaken,
  - type: text
    content: so I have gathered all the earth;
  - type: text
    content: and there was none that moved a wing
  - type: text
    content: or opened the mouth or chirped.”
  '15':
  - type: text
    content: 'Shall '
  - type: note
    content: '[ver. 5; ch. 29:16; 45:9; Rom. 9:17]'
  - type: text
    content: the axe boast over him who hews with it,
  - type: text
    content: or the saw magnify itself against him who wields it?
  - type: text
    content: As if a rod should wield him who lifts it,
  - type: text
    content: or as if a staff should lift him who is not wood!
  '16':
  - type: text
    content: 'Therefore the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts'
  - type: text
    content: 'will send wasting sickness among his '
  - type: note
    content: Ps. 78:31
  - type: text
    content: stout warriors,
  - type: text
    content: 'and under his glory '
  - type: note
    content: '[ch. 30:33]'
  - type: text
    content: a burning will be kindled,
  - type: text
    content: like the burning of fire.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Obad. 18 ]'
  - type: text
    content: The light of Israel will become a fire,
  - type: text
    content: 'and '
  - type: note
    content: ch. 37:23
  - type: text
    content: his Holy One a flame,
  - type: text
    content: 'and '
  - type: note
    content: ch. 27:4; [ch. 9:18; Nah. 1:10]
  - type: text
    content: it will burn and devour
  - type: text
    content: 'his thorns and briers '
  - type: note
    content: '[ch. 9:14; 2 Kgs. 19:35]'
  - type: text
    content: in one day.
  '18':
  - type: text
    content: 'The glory of '
  - type: note
    content: ver. 33; [ch. 2:13]
  - type: text
    content: 'his forest and of his '
  - type: note
    content: '[Ps. 107:33-34]'
  - type: text
    content: fruitful land
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy, both soul and body,'
  - type: text
    content: and it will be as when a sick man wastes away.
  '19':
  - type: text
    content: The remnant of the trees of his forest will be so few
  - type: text
    content: that a child can write them down.
  - type: heading
    content: The Remnant of Israel Will Return
  '2':
  - type: text
    content: to turn aside the needy from justice
  - type: text
    content: 'and '
  - type: note
    content: ch. 5:23
  - type: text
    content: to rob the poor of my people of their right,
  - type: text
    content: that widows may be their spoil,
  - type: text
    content: and that they may make the fatherless their prey!
  '20':
  - type: text
    content: ' '
  - type: note
    content: ver. 27 ; ch. 2:11
  - type: text
    content: 'In that day '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'the remnant of Israel and the survivors of the house of Jacob will no more '
  - type: note
    content: '[2 Kgs. 16:7; 2 Chr. 28:20, 21]'
  - type: text
    content: 'lean on him who struck them, but '
  - type: note
    content: 2 Kgs. 19:14
  - type: text
    content: 'will lean on the '
  - type: text
    content: Lord
  - type: text
    content: ', the Holy One of Israel, in truth. '
  '21':
  - type: text
    content: 'A remnant will return, the remnant of Jacob, '
  - type: note
    content: ch. 9:6
  - type: text
    content: 'to the mighty God. '
  '22':
  - type: note
    content: Cited Rom. 9:27, 28
  - type: text
    content: 'For though your people Israel be as the sand of the sea, '
  - type: note
    content: '[ch. 6:13]'
  - type: text
    content: 'only a remnant of them will return. '
  - type: note
    content: ch. 28:22
  - type: text
    content: 'Destruction is decreed, overflowing with righteousness. '
  '23':
  - type: text
    content: 'For the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts will make a full end, as decreed, in the midst of all the earth.'
  '24':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts: “O my people, '
  - type: note
    content: '[ch. 31:5]'
  - type: text
    content: 'who dwell in Zion, '
  - type: note
    content: 2 Kgs. 19:6
  - type: text
    content: 'be not afraid of the Assyrians when they strike with the rod and lift up their staff against you as '
  - type: note
    content: Ex. 2:23
  - type: text
    content: 'the Egyptians did. '
  '25':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 17:14]'
  - type: text
    content: 'in a very little while my fury will come to an end, and my anger will be directed to their destruction. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: 2 Kgs. 19:35
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts will wield against them a whip, as when he struck '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'Midian '
  - type: note
    content: Judg. 7:25; [ch. 9:4]
  - type: text
    content: 'at the rock of Oreb. And his staff will be over the sea, and he will lift it '
  - type: note
    content: '[Ex. 14:30]'
  - type: text
    content: 'as he did in Egypt. '
  '27':
  - type: text
    content: 'And in that day '
  - type: note
    content: 2 Kgs. 18:14
  - type: text
    content: 'his burden will depart from your shoulder, and '
  - type: note
    content: '[ch. 9:4; Nah. 1:13]'
  - type: text
    content: his yoke from your neck; and the yoke will be broken because of the fat.”
  - type: note
    content: The meaning of the Hebrew is uncertain
  '28':
  - type: text
    content: He has come to Aiath;
  - type: text
    content: 'he has passed through '
  - type: note
    content: 1 Sam. 14:2
  - type: text
    content: Migron;
  - type: text
    content: 'at Michmash he stores '
  - type: note
    content: Judg. 18:21; 1 Sam. 17:22; Acts 21:15; [ch. 46:1]
  - type: text
    content: his baggage;
  '29':
  - type: text
    content: 'they have crossed over '
  - type: note
    content: 1 Sam. 13:23
  - type: text
    content: the pass;
  - type: text
    content: 'at '
  - type: note
    content: 1 Sam. 13:16
  - type: text
    content: Geba they lodge for the night;
  - type: note
    content: 1 Sam. 7:17
  - type: text
    content: Ramah trembles;
  - type: note
    content: 1 Sam. 11:4
  - type: text
    content: Gibeah of Saul has fled.
  '3':
  - type: text
    content: 'What will you do on '
  - type: note
    content: Jer. 5:29; Hos. 9:7; [Luke 19:44]
  - type: text
    content: the day of punishment,
  - type: text
    content: 'in the ruin that will come '
  - type: note
    content: ch. 5:26
  - type: text
    content: from afar?
  - type: text
    content: To whom will you flee for help,
  - type: text
    content: and where will you leave your wealth?
  '30':
  - type: text
    content: 'Cry aloud, O daughter of '
  - type: note
    content: 1 Sam. 25:44
  - type: text
    content: Gallim!
  - type: text
    content: Give attention, O Laishah!
  - type: text
    content: 'O poor '
  - type: note
    content: Jer. 1:1
  - type: text
    content: Anathoth!
  '31':
  - type: text
    content: Madmenah is in flight;
  - type: text
    content: the inhabitants of Gebim flee for safety.
  '32':
  - type: text
    content: 'This very day he will halt at '
  - type: note
    content: 1 Sam. 21:1; 22:19
  - type: text
    content: Nob;
  - type: text
    content: he will shake his fist
  - type: text
    content: 'at the mount of '
  - type: note
    content: ch. 1:8; 37:22
  - type: text
    content: the daughter of Zion,
  - type: text
    content: the hill of Jerusalem.
  '33':
  - type: text
    content: 'Behold, the Lord '
  - type: text
    content: God
  - type: text
    content: ' of hosts'
  - type: note
    content: '[ Nah. 1:12 ]'
  - type: text
    content: 'will lop '
  - type: note
    content: ver. 18
  - type: text
    content: the boughs with terrifying power;
  - type: text
    content: the great in height will be hewn down,
  - type: text
    content: and the lofty will be brought low.
  '34':
  - type: text
    content: 'He will cut down '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: the thickets of the forest with an axe,
  - type: text
    content: 'and '
  - type: note
    content: '[Ezek. 31:3; Amos 2:9]'
  - type: text
    content: Lebanon will fall by the Majestic One.
  '4':
  - type: text
    content: Nothing remains but to crouch among the prisoners
  - type: text
    content: or fall among the slain.
  - type: note
    content: See ch. 9:12
  - type: text
    content: For all this his anger has not turned away,
  - type: text
    content: and his hand is stretched out still.
  - type: heading
    content: Judgment on Arrogant Assyria
  '5':
  - type: text
    content: 'Woe to Assyria, '
  - type: note
    content: ver. 24; ch. 9:4; [Mic. 5:1; 6:9]
  - type: text
    content: the rod of my anger;
  - type: text
    content: the staff in their hands is my fury!
  '6':
  - type: text
    content: 'Against a '
  - type: note
    content: ch. 9:17
  - type: text
    content: godless nation I send him,
  - type: text
    content: and against the people of my wrath I command him,
  - type: text
    content: 'to take '
  - type: note
    content: See 2 Kgs. 18:14-16
  - type: text
    content: spoil and seize plunder,
  - type: text
    content: 'and to '
  - type: note
    content: ch. 5:5
  - type: text
    content: tread them down like the mire of the streets.
  '7':
  - type: text
    content: 'But he '
  - type: note
    content: '[Mic. 4:12]'
  - type: text
    content: does not so intend,
  - type: text
    content: and his heart does not so think;
  - type: text
    content: but it is in his heart to destroy,
  - type: text
    content: and to cut off nations not a few;
  '8':
  - type: text
    content: 'for he says:'
  - type: note
    content: '[ 2 Kgs. 18:24 ]'
  - type: text
    content: “Are not my commanders all kings?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 19:12, 13
  - type: text
    content: 'Is not '
  - type: note
    content: '[Gen. 10:10; Amos 6:2]'
  - type: text
    content: 'Calno like '
  - type: note
    content: 2 Chr. 35:20; Jer. 46:2
  - type: text
    content: Carchemish?
  - type: text
    content: 'Is not '
  - type: note
    content: ch. 11:11; Amos 6:2; Zech. 9:2
  - type: text
    content: 'Hamath like '
  - type: note
    content: 2 Kgs. 18:34
  - type: text
    content: Arpad?
  - type: note
    content: '[ 2 Kgs. 16:9; 17:6 ]'
  - type: text
    content: 'Is not '
  - type: note
    content: ch. 7:9
  - type: text
    content: Samaria like Damascus?
