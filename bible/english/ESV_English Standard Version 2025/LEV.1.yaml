document_id: LEV.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Burnt Offerings
  - type: text
    content: ' '
  - type: note
    content: Ex. 19:3
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called Moses and spoke to him '
  - type: note
    content: Ex. 40:34, 35
  - type: text
    content: 'from the tent of meeting, saying, '
  '10':
  - type: text
    content: '“If his gift for a burnt offering is from the flock, from the sheep or goats, he shall bring a male without blemish, '
  '11':
  - type: note
    content: ver. 5
  - type: text
    content: 'and he shall kill it on the north side of the altar before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Aaron’s sons the priests shall throw its blood against the sides of the altar. '
  '12':
  - type: text
    content: 'And he shall cut it into pieces, with its head and its fat, and the priest shall arrange them on the wood that is on the fire on the altar, '
  '13':
  - type: text
    content: 'but the entrails and the legs he shall wash with water. And the priest shall offer all of it and burn it on the altar; it is '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'a burnt offering, a food offering with '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“If his offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' is a burnt offering of birds, then he shall bring his offering of '
  - type: note
    content: ch. 5:7; 12:8; [Luke 2:24]
  - type: text
    content: 'turtledoves or pigeons. '
  '15':
  - type: text
    content: 'And the priest shall bring it to the altar and wring off its head and burn it on the altar. Its blood shall be drained out on the side of the altar. '
  '16':
  - type: text
    content: He shall remove its crop with its contents
  - type: note
    content: Or feathers
  - type: text
    content: ' and cast it '
  - type: note
    content: ch. 6:10
  - type: text
    content: 'beside the altar on the east side, in the place for ashes. '
  '17':
  - type: text
    content: 'He shall tear it open by its wings, but '
  - type: note
    content: '[Gen. 15:10]'
  - type: text
    content: 'shall not sever it completely. And the priest shall burn it on the altar, on the wood that is on the fire. It is a burnt offering, a food offering with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: ch. 22:18, 19
  - type: text
    content: 'When any one of you brings an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', you shall bring your offering of livestock from the herd or from the flock.'
  '3':
  - type: text
    content: '“If his offering is a burnt offering from the herd, he shall offer '
  - type: note
    content: See Ex. 12:5
  - type: text
    content: 'a male without blemish. He shall bring it to the entrance of the tent of meeting, that he may be accepted before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: note
    content: ch. 3:2, 8, 13; 4:4, 15, 24, 29, 33; 8:14, 18, 22; 16:21; Ex. 29:10, 15, 19
  - type: text
    content: 'He shall lay his hand on the head of the burnt offering, and it shall be '
  - type: note
    content: ch. 22:21, 27; [Isa. 56:7; Rom. 12:1; Phil. 4:18]
  - type: text
    content: 'accepted for him '
  - type: note
    content: ch. 4:20, 26, 31, 35; Num. 15:25; 2 Chr. 29:23, 24; [ch. 9:7; 16:24]
  - type: text
    content: 'to make atonement for him. '
  '5':
  - type: text
    content: 'Then he shall kill the bull before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Aaron’s sons the priests shall bring the blood '
  - type: note
    content: ch. 3:8; 2 Chr. 35:11; Heb. 12:24; 1 Pet. 1:2
  - type: text
    content: 'and throw the blood against the sides of the altar that is at the entrance of the tent of meeting. '
  '6':
  - type: text
    content: 'Then he shall flay the burnt offering and cut it into pieces, '
  '7':
  - type: text
    content: 'and the sons of Aaron the priest shall put fire on the altar and '
  - type: note
    content: '[Gen. 22:9]'
  - type: text
    content: 'arrange wood on the fire. '
  '8':
  - type: text
    content: 'And Aaron’s sons the priests shall arrange the pieces, the head, and the fat, on the wood that is on the fire on the altar; '
  '9':
  - type: text
    content: 'but its entrails and its legs he shall wash with water. And the priest shall burn all of it on the altar, as '
  - type: note
    content: ch. 2:3, 9, 10, 11, 16; 3:5, 9, 11, 14, 16; 4:35; Ex. 29:18, 25, 41
  - type: text
    content: a burnt offering, a food offering
  - type: note
    content: Or an offering by fire; so throughout Leviticus
  - type: text
    content: ' with a '
  - type: note
    content: See Gen. 8:21
  - type: text
    content: 'pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
