document_id: DEU.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Commands Obedience
  - type: text
    content: '“And now, O Israel, listen to '
  - type: note
    content: See Lev. 18:4
  - type: text
    content: the statutes and the rules
  - type: note
    content: Or just decrees; also verses 5, 8, 14, 45
  - type: text
    content: ' that I am teaching you, and do them, '
  - type: note
    content: ch. 6:24; 8:1
  - type: text
    content: 'that you may live, and go in and take possession of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, is giving you. '
  '10':
  - type: text
    content: 'how on '
  - type: note
    content: Ex. 19:9, 16; Heb. 12:18, 19
  - type: text
    content: 'the day that you stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at Horeb, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: ch. 31:12
  - type: text
    content: '‘Gather the people to me, that I may let them hear my words, '
  - type: note
    content: ch. 14:23; 17:19
  - type: text
    content: 'so that they may learn to fear '
  - type: note
    content: ch. 12:1; 31:13; 1 Kgs. 8:40
  - type: text
    content: 'me all the days that they live on the earth, and that they may teach their children so.’ '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 19:17
  - type: text
    content: 'you came near and stood at the foot of the mountain, while '
  - type: note
    content: ch. 5:22, 23; Ex. 19:18; 20:18, 21; [Ex. 24:16, 17]
  - type: text
    content: 'the mountain burned with fire to the heart of heaven, wrapped in darkness, cloud, and gloom. '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 33, 36; ch. 5:4, 22; Ex. 20:1, 19
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you out of the midst of the fire. You heard the sound of words, '
  - type: note
    content: ver. 15
  - type: text
    content: 'but saw no form; '
  - type: note
    content: Ex. 20:22; [1 Kgs. 19:12; Job 4:16]
  - type: text
    content: 'there was only a voice. '
  '13':
  - type: note
    content: ch. 9:9, 11
  - type: text
    content: 'And he declared to you his covenant, which he commanded you to perform, that is, '
  - type: note
    content: Ex. 34:28
  - type: text
    content: the Ten Commandments,
  - type: note
    content: Hebrew the ten words
  - type: text
    content: ' '
  - type: note
    content: See Ex. 24:12
  - type: text
    content: 'and he wrote them on two tablets of stone. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: See Ex. 21–23
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me at that time to teach you statutes and rules, that you might do them in the land that you are going over to possess.'
  - type: heading
    content: Idolatry Forbidden
  '15':
  - type: text
    content: ' '
  - type: note
    content: Josh. 23:11
  - type: text
    content: '“Therefore watch yourselves very carefully. Since '
  - type: note
    content: ver. 12
  - type: text
    content: 'you saw no form on the day that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you at Horeb out of the midst of the fire, '
  '16':
  - type: text
    content: 'beware '
  - type: note
    content: ver. 25
  - type: text
    content: 'lest you act corruptly '
  - type: note
    content: ver. 23; ch. 5:8; Ex. 20:4; [Acts 17:29]
  - type: text
    content: 'by making a carved image for yourselves, in the form of any figure, '
  - type: note
    content: Rom. 1:23
  - type: text
    content: 'the likeness of male or female, '
  '17':
  - type: text
    content: 'the likeness of any animal that is on the earth, the likeness of any winged bird that flies in the air, '
  '18':
  - type: text
    content: 'the likeness of anything that creeps on the ground, the likeness of any fish that is in the water under the earth. '
  '19':
  - type: text
    content: 'And beware lest you raise your eyes to heaven, and when you see '
  - type: note
    content: ch. 17:3; Job 31:26-28
  - type: text
    content: 'the sun and the moon and the stars, '
  - type: note
    content: 2 Kgs. 17:16; 21:3; [Gen. 2:1]
  - type: text
    content: 'all the host of heaven, you be drawn away and bow down to them and serve them, things that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has allotted to all the peoples under the whole heaven. '
  '2':
  - type: note
    content: ch. 12:32; [Josh. 1:7; Prov. 30:6; Rev. 22:18, 19]
  - type: text
    content: 'You shall not add to the word that I command you, nor take from it, that you may keep the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I command you. '
  '20':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' has taken you and '
  - type: note
    content: 1 Kgs. 8:51; Jer. 11:4
  - type: text
    content: 'brought you out of the iron furnace, out of Egypt, '
  - type: note
    content: ch. 9:29; 32:9
  - type: text
    content: 'to be a people of his own inheritance, as you are this day. '
  '21':
  - type: text
    content: 'Furthermore, '
  - type: note
    content: See ch. 1:37
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me because of you, and he swore that I should not cross the Jordan, and that I should not enter the good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance. '
  '22':
  - type: text
    content: 'For I must die in this land; '
  - type: note
    content: ch. 3:27
  - type: text
    content: 'I must not go over the Jordan. But you shall go over and take possession of '
  - type: note
    content: ch. 3:25
  - type: text
    content: 'that good land. '
  '23':
  - type: note
    content: ver. 9
  - type: text
    content: 'Take care, lest you forget the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which he made with you, and '
  - type: note
    content: ch. 5:8; Ex. 20:4; [Acts 17:29]
  - type: text
    content: 'make a carved image, the form of anything that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has forbidden you. '
  '24':
  - type: text
    content: 'For '
  - type: note
    content: Ex. 24:17; Cited Heb. 12:29; [ch. 9:3; Isa. 10:16-18; 29:6; 30:27, 30; Zeph. 1:18]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is a consuming fire, '
  - type: note
    content: '[Isa. 42:8]; See Ex. 20:5'
  - type: text
    content: a jealous God.
  '25':
  - type: text
    content: '“When you father children and children’s children, and have grown old in the land, '
  - type: note
    content: ver. 16
  - type: text
    content: 'and you act corruptly by making a carved image in the form of anything, and '
  - type: note
    content: ch. 9:18; 2 Kgs. 17:17
  - type: text
    content: 'by doing what is evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, so as to provoke him to anger, '
  '26':
  - type: text
    content: 'I '
  - type: note
    content: ch. 30:18, 19; 31:28; 32:1; Isa. 1:2; Jer. 2:12; 6:19; Mic. 6:2
  - type: text
    content: 'call heaven and earth to witness against you today, that you will soon utterly perish from the land that you are going over the Jordan to possess. You will not live long in it, but will be utterly destroyed. '
  '27':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Lev. 26:33
  - type: text
    content: 'will scatter you among the peoples, '
  - type: note
    content: ch. 28:62
  - type: text
    content: 'and you will be left few in number among the nations where the '
  - type: text
    content: Lord
  - type: text
    content: ' will drive you. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ch. 28:36, 64; Jer. 16:13
  - type: text
    content: 'there you will serve gods of wood and stone, the work of human hands, '
  - type: note
    content: Ps. 115:4-7; 135:15-17; Isa. 44:9; 46:7
  - type: text
    content: 'that neither see, nor hear, nor eat, nor smell. '
  '29':
  - type: note
    content: ch. 30:2, 3; Lev. 26:40-42; 2 Chr. 15:4; Neh. 1:9; Isa. 55:6, 7; Jer. 29:13, 14
  - type: text
    content: 'But from there you will seek the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and you will find him, if you search after him with all your heart and with all your soul. '
  '3':
  - type: text
    content: 'Your eyes have seen what the '
  - type: text
    content: Lord
  - type: text
    content: ' did '
  - type: note
    content: See Num. 23:28; 25:3-9
  - type: text
    content: 'at Baal-peor, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God destroyed from among you all the men who followed the Baal of Peor. '
  '30':
  - type: text
    content: 'When you are in tribulation, and all these things come upon you '
  - type: note
    content: See Gen. 49:1
  - type: text
    content: 'in the latter days, you will return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and obey his voice. '
  '31':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is '
  - type: note
    content: Ex. 34:6; 2 Chr. 30:9; Neh. 9:31; Jonah 4:2
  - type: text
    content: 'a merciful God. '
  - type: note
    content: ch. 31:6, 8; Josh. 1:5; 1 Chr. 28:20
  - type: text
    content: He will not leave you or destroy you or forget the covenant with your fathers that he swore to them.
  - type: heading
    content: The Lord Alone Is God
  '32':
  - type: text
    content: '“For '
  - type: note
    content: Job 8:8
  - type: text
    content: 'ask now of the days that are past, which were before you, since the day that God created man on the earth, and ask from one end of heaven to the other, whether such a great thing as this has ever happened or was ever heard of. '
  '33':
  - type: note
    content: ver. 12; ch. 5:24, 26; Ex. 3:6; 19:21; [Gen. 32:30; Ex. 24:11; 33:20, 23; Judg. 6:22, 23; 13:22]
  - type: text
    content: 'Did any people ever hear the voice of a god speaking out of the midst of the fire, as you have heard, and still live? '
  '34':
  - type: text
    content: 'Or has any god ever attempted to go and take a nation for himself from the midst of another nation, by trials, '
  - type: note
    content: ch. 26:8; Ex. 7:3; Jer. 32:21
  - type: text
    content: 'by signs, by wonders, and '
  - type: note
    content: See Ex. 15:3-10
  - type: text
    content: 'by war, '
  - type: note
    content: ch. 7:8; 11:2; 26:8; 34:12
  - type: text
    content: 'by a mighty hand and '
  - type: note
    content: Ex. 6:6; Jer. 32:21
  - type: text
    content: 'an outstretched arm, and by great deeds of terror, all of which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did for you in Egypt before your eyes? '
  '35':
  - type: text
    content: 'To you it was shown, '
  - type: note
    content: '[Ex. 10:2]'
  - type: text
    content: 'that you might know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God; '
  - type: note
    content: ver. 39; 1 Sam. 2:2; 2 Sam. 22:32; Isa. 45:5, 18, 22; 46:9; Cited Mark 12:32
  - type: text
    content: 'there is no other besides him. '
  '36':
  - type: note
    content: Ex. 19:9, 19; Neh. 9:13
  - type: text
    content: 'Out of heaven he let you hear his voice, that he might discipline you. And on earth he let you see his great fire, and '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: 'you heard his words out of the midst of the fire. '
  '37':
  - type: text
    content: 'And because '
  - type: note
    content: ch. 10:15
  - type: text
    content: he loved your fathers and chose their offspring after them
  - type: note
    content: Hebrew his offspring after him
  - type: text
    content: ' and brought you out of Egypt '
  - type: note
    content: Ex. 33:14; [Isa. 63:9]
  - type: text
    content: 'with his own presence, by his great power, '
  '38':
  - type: note
    content: ch. 7:1; 11:23; Ex. 23:27, 28; 34:24; See ch. 9:1-5
  - type: text
    content: 'driving out before you nations greater and mightier than you, to bring you in, to give you their land for an inheritance, as it is this day, '
  '39':
  - type: text
    content: 'know therefore today, and lay it to your heart, that '
  - type: note
    content: Josh. 2:11; 1 Kgs. 8:23; 2 Chr. 20:6; Eccles. 5:2
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is God in heaven above and on the earth beneath; '
  - type: note
    content: 1 Sam. 2:2; 2 Sam. 22:32; Isa. 45:5, 18, 22; 46:9; Cited Mark 12:32
  - type: text
    content: 'there is no other. '
  '4':
  - type: text
    content: 'But you who held fast to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God are all alive today. '
  '40':
  - type: note
    content: Lev. 22:31
  - type: text
    content: 'Therefore you shall keep his statutes and his commandments, which I command you today, '
  - type: note
    content: ch. 5:16; 6:2, 3; 11:9; 12:25, 28; 22:7; [Prov. 3:1, 2; 10:27]
  - type: text
    content: 'that it may go well with you and with your children after you, and that you may prolong your days in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for all time.”'
  - type: heading
    content: Cities of Refuge
  '41':
  - type: text
    content: 'Then Moses '
  - type: note
    content: Num. 35:6, 14
  - type: text
    content: 'set apart three cities in the east beyond the Jordan, '
  '42':
  - type: text
    content: 'that '
  - type: note
    content: ch. 19:4
  - type: text
    content: 'the manslayer might flee there, anyone who kills his neighbor unintentionally, without being at enmity with him in time past; he may flee to one of these cities and save his life: '
  '43':
  - type: note
    content: Josh. 20:8; 21:36; 1 Chr. 6:78
  - type: text
    content: 'Bezer in the wilderness on the '
  - type: note
    content: See ch. 3:10
  - type: text
    content: tableland for the Reubenites, Ramoth in Gilead for the Gadites, and Golan in Bashan for the Manassites.
  - type: heading
    content: Introduction to the Law
  '44':
  - type: text
    content: 'This is the law that Moses set before the people of Israel. '
  '45':
  - type: text
    content: 'These are the testimonies, the statutes, and the rules, which Moses spoke to the people of Israel when they came out of Egypt, '
  '46':
  - type: text
    content: 'beyond the Jordan '
  - type: note
    content: ch. 3:29
  - type: text
    content: 'in the valley opposite Beth-peor, in the land of Sihon the king of the Amorites, who lived at Heshbon, '
  - type: note
    content: ch. 1:4; Num. 21:24
  - type: text
    content: 'whom Moses and the people of Israel defeated when they came out of Egypt. '
  '47':
  - type: text
    content: 'And they took possession of his land and the land '
  - type: note
    content: ch. 3:3, 4; Num. 21:33, 35
  - type: text
    content: 'of Og, the king of Bashan, the two kings of the Amorites, who lived to the east beyond the Jordan; '
  '48':
  - type: note
    content: See ch. 2:36
  - type: text
    content: 'from Aroer, which is on the edge of the Valley of the Arnon, as far as Mount '
  - type: note
    content: '[ch. 3:9]'
  - type: text
    content: Sirion
  - type: note
    content: Syriac; Hebrew Sion
  - type: text
    content: ' (that is, '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'Hermon), '
  '49':
  - type: text
    content: 'together with all the Arabah on the east side of the Jordan as far as '
  - type: note
    content: See ch. 3:17
  - type: text
    content: the Sea of the Arabah, under the slopes of Pisgah.
  '5':
  - type: text
    content: 'See, I have taught you statutes and rules, as the '
  - type: text
    content: Lord
  - type: text
    content: ' my God commanded me, that you should do them in the land that you are entering to take possession of it. '
  '6':
  - type: note
    content: ch. 29:9
  - type: text
    content: 'Keep them and do them, for '
  - type: note
    content: Job 28:28; Ps. 111:10; Prov. 1:7; 9:10
  - type: text
    content: 'that will be your wisdom and your understanding in the sight of the peoples, who, when they hear all these statutes, will say, ‘Surely this great nation is a wise and understanding people.’ '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 2 Sam. 7:23
  - type: text
    content: 'what great nation is there that has '
  - type: note
    content: Ps. 34:18; 46:1; 145:18; 148:14; [James 4:8]
  - type: text
    content: 'a god so near to it as the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is to us, whenever we call upon him? '
  '8':
  - type: text
    content: 'And what great nation is there, that has statutes and rules so '
  - type: note
    content: Rom. 7:12
  - type: text
    content: righteous as all this law that I set before you today?
  '9':
  - type: text
    content: ' '
  - type: note
    content: ver. 23
  - type: text
    content: '“Only take care, and '
  - type: note
    content: '[Prov. 4:23]'
  - type: text
    content: 'keep your soul diligently, lest you forget the things that your eyes have seen, and lest they depart from your heart all the days of your life. '
  - type: note
    content: ch. 6:7; 11:19; 32:46; Gen. 18:19; See Ps. 78:4-6
  - type: text
    content: 'Make them known to your children and your children’s children— '
