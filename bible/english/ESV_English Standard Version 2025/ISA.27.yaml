  '1':
  - type: heading
    content: The Redemption of Israel
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' with his hard and great and strong '
  - type: note
    content: '[Jer. 47:6]'
  - type: text
    content: 'sword will punish '
  - type: note
    content: Ps. 74:14
  - type: text
    content: 'Leviathan the fleeing serpent, '
  - type: note
    content: Ps. 74:14
  - type: text
    content: 'Leviathan the twisting serpent, and he will slay '
  - type: note
    content: ch. 51:9; Ezek. 29:3
  - type: text
    content: the dragon that is in the sea.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:9; 32:14, 19; [ Hos. 8:14; Mic. 5:11 ]
  - type: text
    content: For the fortified city is solitary,
  - type: text
    content: a habitation deserted and forsaken, like the wilderness;
  - type: text
    content: there the calf grazes;
  - type: text
    content: there it lies down and strips its branches.
  '11':
  - type: text
    content: When its boughs are dry, they are broken;
  - type: text
    content: women come and make a fire of them.
  - type: note
    content: Deut. 32:28; See ch. 30:16-18
  - type: text
    content: For this is a people without discernment;
  - type: text
    content: therefore he who made them will not have compassion on them;
  - type: text
    content: he who formed them will show them no favor.
  '12':
  - type: text
    content: 'In that day '
  - type: note
    content: See Gen. 15:18
  - type: text
    content: from the river Euphrates
  - type: note
    content: Hebrew from the River
  - type: text
    content: ' to the Brook of Egypt the '
  - type: text
    content: Lord
  - type: text
    content: ' will thresh out the grain, and you will be gleaned one by one, O people of Israel. '
  '13':
  - type: text
    content: 'And in that day '
  - type: note
    content: Lev. 25:9; [Matt. 24:31; Rev. 11:15]
  - type: text
    content: 'a great trumpet will be blown, '
  - type: note
    content: ch. 11:11, 16; Mic. 7:12
  - type: text
    content: 'and those who were lost in the land of Assyria and those who were driven out to the land of Egypt '
  - type: note
    content: '[ch. 2:2]'
  - type: text
    content: 'will come and worship the '
  - type: text
    content: Lord
  - type: text
    content: ' on the holy mountain at Jerusalem.'
  '2':
  - type: text
    content: In that day,
  - type: note
    content: ch. 5:7
  - type: text
    content: “A pleasant vineyard,
  - type: note
    content: Many Hebrew manuscripts A vineyard of wine
  - type: text
    content: ' '
  - type: note
    content: '[ch. 26:1]'
  - type: text
    content: sing of it!
  '3':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am its keeper;'
  - type: text
    content: every moment I water it.
  - type: text
    content: Lest anyone punish it,
  - type: text
    content: I keep it night and day;
  '4':
  - type: text
    content: I have no wrath.
  - type: note
    content: '[ch. 10:17 ]'
  - type: text
    content: Would that I had thorns and briers to battle!
  - type: text
    content: I would march against them,
  - type: text
    content: I would burn them up together.
  '5':
  - type: text
    content: Or let them lay hold of my protection,
  - type: text
    content: let them make peace with me,
  - type: text
    content: let them make peace with me.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 37:31; Hos. 14:5, 6
  - type: text
    content: In days to come
  - type: note
    content: Hebrew In those to come
  - type: text
    content: ' Jacob shall take root,'
  - type: text
    content: Israel shall blossom and put forth shoots
  - type: text
    content: and fill the whole world with fruit.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Hos. 6:1, 2
  - type: text
    content: 'Has he struck them '
  - type: note
    content: See ch. 37:36-38
  - type: text
    content: as he struck those who struck them?
  - type: text
    content: 'Or have they been slain '
  - type: note
    content: ch. 37:18, 19
  - type: text
    content: as their slayers were slain?
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 10:24 ]'
  - type: text
    content: Measure by measure,
  - type: note
    content: Or By driving her away; the meaning of the Hebrew word is uncertain
  - type: text
    content: ' by exile you contended with them;'
  - type: note
    content: '[ Jer. 18:17 ]'
  - type: text
    content: he removed them with his fierce breath
  - type: note
    content: Or wind
  - type: text
    content: ' in the day of the east wind.'
  '9':
  - type: text
    content: 'Therefore by this '
  - type: note
    content: '[ch. 22:14]'
  - type: text
    content: the guilt of Jacob will be atoned for,
  - type: text
    content: 'and this will be the full fruit of the removal of his sin:'
  - type: note
    content: Septuagint and this is the blessing when I take away his sin
  - type: note
    content: '[ 2 Kgs. 18:4 ]'
  - type: text
    content: when he makes all the stones of the altars
  - type: text
    content: like chalkstones crushed to pieces,
  - type: text
    content: 'no '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: Asherim or incense altars will remain standing.
