document_id: LEV.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Cleansing Lepers
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“And on the eighth day he '
  - type: note
    content: '[Matt. 8:4]; Mark 1:44; Luke 5:14'
  - type: text
    content: 'shall take two male lambs without blemish, and one ewe lamb a year old without blemish, and a '
  - type: note
    content: Num. 15:4; See ch. 2
  - type: text
    content: grain offering of three tenths of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour mixed with oil, and one log'
  - type: note
    content: A log was about 1/3 quart or 0.3 liter
  - type: text
    content: ' of oil. '
  '11':
  - type: text
    content: 'And the priest who cleanses him shall set the man who is to be cleansed and these things before the '
  - type: text
    content: Lord
  - type: text
    content: ', at the entrance of the tent of meeting. '
  '12':
  - type: text
    content: 'And the priest shall take one of the male lambs and '
  - type: note
    content: ch. 5:18; 6:6, 7
  - type: text
    content: 'offer it for a guilt offering, along with the log of oil, and '
  - type: note
    content: See Ex. 29:24
  - type: text
    content: 'wave them for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he shall kill the lamb '
  - type: note
    content: ch. 1:5, 11; 4:4, 24
  - type: text
    content: 'in the place where they kill the sin offering and the burnt offering, in the place of the sanctuary. For '
  - type: note
    content: ch. 7:7
  - type: text
    content: 'the guilt offering, like the sin offering, belongs to the priest; '
  - type: note
    content: ch. 2:3; 7:6
  - type: text
    content: 'it is most holy. '
  '14':
  - type: text
    content: 'The priest shall take some of the blood of the guilt offering, and the priest shall put it '
  - type: note
    content: '[ch. 8:23; Ex. 29:20]'
  - type: text
    content: 'on the lobe of the right ear of him who is to be cleansed and on the thumb of his right hand and on the big toe of his right foot. '
  '15':
  - type: text
    content: 'Then the priest shall take some of the log of oil and pour it into the palm of his own left hand '
  '16':
  - type: text
    content: 'and dip his right finger in the oil that is in his left hand and sprinkle some oil with his finger seven times before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'And some of the oil that remains in his hand the priest shall put on the lobe of the right ear of him who is to be cleansed and on the thumb of his right hand and on the big toe of his right foot, on top of the blood of the guilt offering. '
  '18':
  - type: text
    content: 'And the rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed. '
  - type: note
    content: See ch. 4:26
  - type: text
    content: 'Then the priest shall make atonement for him before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'The priest shall offer the sin offering, to make atonement for him who is to be cleansed from his uncleanness. And afterward he shall kill the burnt offering. '
  '2':
  - type: text
    content: '“This shall be the law of the leprous person for the day of his cleansing. '
  - type: note
    content: Matt. 8:2, 4; Mark 1:40, 44; Luke 5:12, 14; 17:14
  - type: text
    content: 'He shall be brought to the priest, '
  '20':
  - type: text
    content: 'And the priest shall offer the burnt offering and the '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'grain offering on the altar. '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: Thus the priest shall make atonement for him, and he shall be clean.
  '21':
  - type: text
    content: '“But '
  - type: note
    content: ch. 5:7, 11; 12:8
  - type: text
    content: 'if he is poor and cannot afford so much, then he shall take one male lamb for a guilt offering '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'to be waved, to make atonement for him, and a tenth of an ephah of fine flour mixed with oil for a grain offering, and a log of oil; '
  '22':
  - type: note
    content: See ch. 12:8
  - type: text
    content: 'also two turtledoves or two pigeons, whichever he can afford. The one shall be a sin offering and the other a burnt offering. '
  '23':
  - type: note
    content: ver. 10, 11
  - type: text
    content: 'And on the eighth day he shall bring them for his cleansing to the priest, to the entrance of the tent of meeting, before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: note
    content: ver. 12
  - type: text
    content: 'And the priest shall take the lamb of the guilt offering and the log of oil, and the priest shall wave them for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'And he shall kill the lamb of the guilt offering. '
  - type: note
    content: For ver. 25-29, see ver. 14-18
  - type: text
    content: 'And the priest shall take some of the blood of the guilt offering and put it on the lobe of the right ear of him who is to be cleansed, and on the thumb of his right hand and on the big toe of his right foot. '
  '26':
  - type: text
    content: 'And the priest shall pour some of the oil into the palm of his own left hand, '
  '27':
  - type: text
    content: 'and shall sprinkle with his right finger some of the oil that is in his left hand seven times before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And the priest shall put some of the oil that is in his hand on the lobe of the right ear of him who is to be cleansed and on the thumb of his right hand and on the big toe of his right foot, in the place where the blood of the guilt offering was put. '
  '29':
  - type: text
    content: 'And the rest of the oil that is in the priest’s hand he shall put on the head of him who is to be cleansed, to make atonement for him before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'and the priest shall go '
  - type: note
    content: '[2 Kgs. 7:10; Luke 17:12]'
  - type: text
    content: 'out of the camp, and the priest shall look. Then, if the case of leprous disease is healed in the leprous person, '
  '30':
  - type: text
    content: 'And he shall offer, of the '
  - type: note
    content: ver. 22; ch. 15:15
  - type: text
    content: 'turtledoves or pigeons, whichever he can afford, '
  '31':
  - type: text
    content: one
  - type: note
    content: Septuagint, Syriac; Hebrew afford, 31 such as he can afford, one
  - type: text
    content: ' for a sin offering and the other for a burnt offering, along with a grain offering. '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'And the priest shall make atonement before the '
  - type: text
    content: Lord
  - type: text
    content: ' for him who is being cleansed. '
  '32':
  - type: text
    content: 'This is the law for him in whom is a case of leprous disease, who cannot afford '
  - type: note
    content: ver. 10
  - type: text
    content: the offerings for his cleansing.”
  - type: heading
    content: Laws for Cleansing Houses
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '34':
  - type: text
    content: '“When you come into the land of Canaan, which I give you '
  - type: note
    content: Gen. 17:8; Num. 32:22; Deut. 32:49
  - type: text
    content: 'for a possession, and I put a case of leprous disease in a house in the land of your possession, '
  '35':
  - type: text
    content: 'then he who owns the house shall come and tell the priest, ‘There seems to me to be some case of '
  - type: note
    content: '[Ps. 91:10; Zech. 5:4]'
  - type: text
    content: 'disease in my house.’ '
  '36':
  - type: text
    content: 'Then the priest shall command that they empty the house before the priest goes to examine the disease, lest all that is in the house be declared unclean. And afterward the priest shall go in to see the house. '
  '37':
  - type: text
    content: 'And he shall examine the disease. And if the disease is in the walls of the house with greenish or reddish spots, and if it appears to be deeper than the surface, '
  '38':
  - type: text
    content: 'then the priest shall go out of the house to the door of the house and shut up the house seven days. '
  '39':
  - type: text
    content: 'And the priest shall come again on the seventh day, and look. If the disease has spread in the walls of the house, '
  '4':
  - type: text
    content: the priest shall command them to take for him who is to be cleansed two live
  - type: note
    content: Or wild
  - type: text
    content: ' clean birds and '
  - type: note
    content: Num. 19:6
  - type: text
    content: 'cedarwood and '
  - type: note
    content: Heb. 9:19
  - type: text
    content: 'scarlet yarn and '
  - type: note
    content: See Ex. 12:22
  - type: text
    content: 'hyssop. '
  '40':
  - type: text
    content: 'then the priest shall command that they take out the stones in which is the disease and throw them into an unclean place outside the city. '
  '41':
  - type: text
    content: 'And he shall have the inside of the house scraped all around, and the plaster that they scrape off they shall pour out in an unclean place outside the city. '
  '42':
  - type: text
    content: Then they shall take other stones and put them in the place of those stones, and he shall take other plaster and plaster the house.
  '43':
  - type: text
    content: '“If the disease breaks out again in the house, after he has taken out the stones and scraped the house and plastered it, '
  '44':
  - type: text
    content: 'then the priest shall go and look. And if the disease has spread in the house, it is a '
  - type: note
    content: ch. 13:51, 52
  - type: text
    content: 'persistent leprous disease in the house; it is unclean. '
  '45':
  - type: text
    content: 'And he shall break down the house, its stones and timber and all the plaster of the house, and he shall carry them out of the city to an unclean place. '
  '46':
  - type: text
    content: 'Moreover, whoever enters the house while it is shut up shall be unclean until the evening, '
  '47':
  - type: text
    content: 'and whoever sleeps in the house '
  - type: note
    content: See ch. 11:25
  - type: text
    content: shall wash his clothes, and whoever eats in the house shall wash his clothes.
  '48':
  - type: text
    content: '“But if the priest comes and looks, and if the disease has not spread in the house after the house was plastered, then the priest shall pronounce the house clean, for the disease is healed. '
  '49':
  - type: text
    content: 'And for the '
  - type: note
    content: ver. 52
  - type: text
    content: 'cleansing of the house he shall take '
  - type: note
    content: '[ver. 4-6]'
  - type: text
    content: 'two small birds, with cedarwood and scarlet yarn and hyssop, '
  '5':
  - type: text
    content: And the priest shall command them to kill one of the birds in an earthenware vessel over fresh
  - type: note
    content: Or running; Hebrew living; also verses 6, 50, 51, 52
  - type: text
    content: ' water. '
  '50':
  - type: text
    content: 'and shall kill one of the birds in an earthenware vessel over fresh water '
  '51':
  - type: text
    content: 'and shall take the cedarwood and the hyssop and the scarlet yarn, along with the live bird, and dip them in the blood of the bird that was killed and in the fresh water and sprinkle the house seven times. '
  '52':
  - type: text
    content: 'Thus he shall cleanse the house with the blood of the bird and with the fresh water and with the live bird and with the cedarwood and hyssop and scarlet yarn. '
  '53':
  - type: text
    content: 'And he shall let the live bird go out of the city '
  - type: note
    content: See ver. 7
  - type: text
    content: 'into the open country. So he shall '
  - type: note
    content: ver. 19, 20
  - type: text
    content: make atonement for the house, and it shall be clean.”
  '54':
  - type: text
    content: 'This is the law for any case of leprous disease: for '
  - type: note
    content: ch. 13:30
  - type: text
    content: 'an itch, '
  '55':
  - type: text
    content: 'for '
  - type: note
    content: ch. 13:47
  - type: text
    content: 'leprous disease in a garment or in '
  - type: note
    content: ver. 34
  - type: text
    content: 'a house, '
  '56':
  - type: text
    content: 'and '
  - type: note
    content: ch. 13:2
  - type: text
    content: 'for a swelling or an eruption or a spot, '
  '57':
  - type: text
    content: 'to '
  - type: note
    content: See ch. 10:10, 11
  - type: text
    content: show when it is unclean and when it is clean. This is the law for leprous disease.
  '6':
  - type: text
    content: 'He shall take the live bird with the cedarwood and the scarlet yarn and the hyssop, and dip them and the live bird in the blood of the bird that was killed over the fresh water. '
  '7':
  - type: text
    content: 'And he shall '
  - type: note
    content: Heb. 9:13
  - type: text
    content: 'sprinkle it '
  - type: note
    content: '[2 Kgs. 5:10, 14]'
  - type: text
    content: 'seven times on him who is to be cleansed of the leprous disease. Then he shall pronounce him clean and shall '
  - type: note
    content: '[ch. 16:22]'
  - type: text
    content: 'let the living bird go '
  - type: note
    content: ver. 53; [ch. 17:5]
  - type: text
    content: 'into the open field. '
  '8':
  - type: text
    content: 'And he who is to be cleansed '
  - type: note
    content: ver. 47; See ch. 11:25
  - type: text
    content: 'shall wash his clothes and shave off all his hair and bathe himself in water, and he shall be clean. And after that he may come into the camp, but '
  - type: note
    content: Num. 12:15
  - type: text
    content: 'live outside his tent seven days. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: '[Num. 31:19]'
  - type: text
    content: 'on the seventh day he shall shave off all his hair from his head, his beard, and his eyebrows. He shall shave off all his hair, and then he '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: shall wash his clothes and bathe his body in water, and he shall be clean.
