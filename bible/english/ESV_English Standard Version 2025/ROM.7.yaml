  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Did that which is good, then, bring death to me? By no means! It was sin, producing death in me through what is good, in order that sin might be shown to be sin, and through the commandment might become sinful beyond measure. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we know that the law is spiritual, but I am of the flesh, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 21:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 17:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 50:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52:3
      marker-yv: yv-n
    - type: text
      text: 'sold under sin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I do not understand my own actions. For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18, 19
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'I do not do what I want, but I do the very thing I hate. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if I do what I do not want, I agree with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 1:8
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the law, that it is good. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      marker-yv: yv-n
    - type: text
      text: 'it is no longer I who do it, but sin that dwells within me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that nothing good dwells '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 6:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 14:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 51:5
      marker-yv: yv-n
    - type: text
      text: 'in me, that is, in my flesh. For I have the desire to do what is right, but not the ability to carry it out. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'For I do not do the good I want, but the evil I do not want is what I keep on doing. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 7:39
      marker-yv: yv-n
    - type: text
      text: a married woman is bound by law to her husband while he lives, but if her husband dies she is released from the law of marriage.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: law concerning the husband
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if I do what I do not want, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: it is no longer I who do it, but sin that dwells within me.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I find it to be a law that when I want to do right, evil lies close at hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 1:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 112:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:35
      marker-yv: yv-n
    - type: text
      text: 'I delight in the law of God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 4:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
