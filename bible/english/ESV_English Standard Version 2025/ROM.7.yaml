      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:14
      marker-yv: yv-n
    - type: text
      text: 'to the law '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 1:22
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'through the body of Christ, so that you may belong to another, to him who has been raised from the dead, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:9
      marker-yv: yv-n
    - type: text
      text: 'in order that we may bear fruit for God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For while we were living in the flesh, our sinful passions, aroused by the law, were at work '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:13
      marker-yv: yv-n
    - type: text
      text: 'in our members '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      marker-yv: yv-n
    - type: text
      text: 'to bear fruit for death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now we are released from the law, having died to that which held us captive, so that we serve in the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:4
      marker-yv: yv-n
    - type: text
      text: 'new way of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:6
      marker-yv: yv-n
    - type: text
      text: the Spirit and not in the old way of the written code.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: of the letter
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law and Sin
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then shall we say? That the law is sin? By no means! Yet if it had not been for the law, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:20
      marker-yv: yv-n
    - type: text
      text: 'I would not have known sin. For I would not have known what it is to covet if '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 20:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 5:21
      marker-yv: yv-n
    - type: text
      text: 'the law had not said, “You shall not covet.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But sin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'seizing an opportunity through the commandment, produced in me all kinds of covetousness. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:56
      marker-yv: yv-n
    - type: text
      text: 'For apart from the law, sin lies dead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was once alive apart from the law, but when the commandment came, sin came alive and I died. '
