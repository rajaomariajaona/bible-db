    - type: text
      text: Released from the Law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or do you not know, brothers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers and sisters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 4
      marker-yv: yv-n
    - type: text
      text: '—for I am speaking to those who know the law—that the law is binding on a person only as long as he lives? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The very commandment '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:5
      marker-yv: yv-n
    - type: text
      text: 'that promised life proved to be death to me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For sin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
