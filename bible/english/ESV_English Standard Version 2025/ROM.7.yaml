  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I see in my members '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:17
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 4:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'another law waging war against the law of my mind and making me captive to the law of sin that dwells in my members. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wretched man that I am! Who will deliver me from '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:23
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'this body of death? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thanks be to God through Jesus Christ our Lord! So then, I myself serve the law of God with my mind, but with my flesh I serve the law of sin.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Accordingly, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:32
      marker-yv: yv-n
    - type: text
      text: she will be called an adulteress if she lives with another man while her husband is alive. But if her husband dies, she is free from that law, and if she marries another man she is not an adulteress.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise, my brothers, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:2
      marker-yv: yv-n
    - type: text
      text: 'you also have died '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
