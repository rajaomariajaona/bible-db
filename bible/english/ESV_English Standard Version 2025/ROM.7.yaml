document_id: ROM.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Released from the Law
  - type: text
    content: Or do you not know, brothers
  - type: note
    content: Or brothers and sisters; also verse 4
  - type: text
    content: '—for I am speaking to those who know the law—that the law is binding on a person only as long as he lives? '
  '10':
  - type: text
    content: 'The very commandment '
  - type: note
    content: See ch. 10:5
  - type: text
    content: 'that promised life proved to be death to me. '
  '11':
  - type: text
    content: 'For sin, '
  - type: note
    content: ver. 8
  - type: text
    content: 'seizing an opportunity through the commandment, '
  - type: note
    content: '[Gen. 3:13; Heb. 3:13]'
  - type: text
    content: 'deceived me and through it killed me. '
  '12':
  - type: text
    content: 'So '
  - type: note
    content: Ps. 19:8, 9; 119:137; 2 Pet. 2:21; [ver. 16]
  - type: text
    content: the law is holy, and the commandment is holy and righteous and good.
  '13':
  - type: text
    content: 'Did that which is good, then, bring death to me? By no means! It was sin, producing death in me through what is good, in order that sin might be shown to be sin, and through the commandment might become sinful beyond measure. '
  '14':
  - type: text
    content: 'For we know that the law is spiritual, but I am of the flesh, '
  - type: note
    content: 1 Kgs. 21:20, 25; 2 Kgs. 17:17; Isa. 50:1; 52:3
  - type: text
    content: 'sold under sin. '
  '15':
  - type: text
    content: 'For I do not understand my own actions. For '
  - type: note
    content: ver. 18, 19; [Gal. 5:17]
  - type: text
    content: 'I do not do what I want, but I do the very thing I hate. '
  '16':
  - type: text
    content: 'Now if I do what I do not want, I agree with '
  - type: note
    content: 1 Tim. 1:8; [ver. 12]
  - type: text
    content: 'the law, that it is good. '
  '17':
  - type: text
    content: 'So now '
  - type: note
    content: ver. 20
  - type: text
    content: 'it is no longer I who do it, but sin that dwells within me. '
  '18':
  - type: text
    content: 'For I know that nothing good dwells '
  - type: note
    content: Gen. 6:5; 8:21; Job 14:4; 15:14; Ps. 51:5
  - type: text
    content: 'in me, that is, in my flesh. For I have the desire to do what is right, but not the ability to carry it out. '
  '19':
  - type: note
    content: ver. 15
  - type: text
    content: 'For I do not do the good I want, but the evil I do not want is what I keep on doing. '
  '2':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 7:39
  - type: text
    content: a married woman is bound by law to her husband while he lives, but if her husband dies she is released from the law of marriage.
  - type: note
    content: Greek law concerning the husband
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now if I do what I do not want, '
  - type: note
    content: ver. 17
  - type: text
    content: it is no longer I who do it, but sin that dwells within me.
  '21':
  - type: text
    content: 'So I find it to be a law that when I want to do right, evil lies close at hand. '
  '22':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 1:2; 112:1; 119:35
  - type: text
    content: 'I delight in the law of God, '
  - type: note
    content: 2 Cor. 4:16; Eph. 3:16; [1 Pet. 3:4]
  - type: text
    content: 'in my inner being, '
  '23':
  - type: text
    content: 'but I see in my members '
  - type: note
    content: Gal. 5:17; [James 4:1]
  - type: text
    content: 'another law waging war against the law of my mind and making me captive to the law of sin that dwells in my members. '
  '24':
  - type: text
    content: 'Wretched man that I am! Who will deliver me from '
  - type: note
    content: '[ch. 6:6; 8:23]'
  - type: text
    content: 'this body of death? '
  '25':
  - type: text
    content: Thanks be to God through Jesus Christ our Lord! So then, I myself serve the law of God with my mind, but with my flesh I serve the law of sin.
  '3':
  - type: text
    content: 'Accordingly, '
  - type: note
    content: Matt. 5:32
  - type: text
    content: she will be called an adulteress if she lives with another man while her husband is alive. But if her husband dies, she is free from that law, and if she marries another man she is not an adulteress.
  '4':
  - type: text
    content: 'Likewise, my brothers, '
  - type: note
    content: ver. 6; See ch. 6:2
  - type: text
    content: 'you also have died '
  - type: note
    content: ch. 8:2; Gal. 2:19; 5:18; Eph. 2:15; Col. 2:14
  - type: text
    content: 'to the law '
  - type: note
    content: '[Eph. 2:16; Col. 1:22]'
  - type: text
    content: 'through the body of Christ, so that you may belong to another, to him who has been raised from the dead, '
  - type: note
    content: ch. 6:22; Gal. 5:22; Eph. 5:9
  - type: text
    content: 'in order that we may bear fruit for God. '
  '5':
  - type: text
    content: 'For while we were living in the flesh, our sinful passions, aroused by the law, were at work '
  - type: note
    content: ch. 6:13
  - type: text
    content: 'in our members '
  - type: note
    content: See ch. 6:21, 23
  - type: text
    content: 'to bear fruit for death. '
  '6':
  - type: text
    content: 'But now we are released from the law, having died to that which held us captive, so that we serve in the '
  - type: note
    content: See ch. 6:4
  - type: text
    content: 'new way of '
  - type: note
    content: ch. 2:27, 29; 2 Cor. 3:6
  - type: text
    content: the Spirit and not in the old way of the written code.
  - type: note
    content: Greek of the letter
  - type: heading
    content: The Law and Sin
  '7':
  - type: text
    content: 'What then shall we say? That the law is sin? By no means! Yet if it had not been for the law, '
  - type: note
    content: See ch. 3:20
  - type: text
    content: 'I would not have known sin. For I would not have known what it is to covet if '
  - type: note
    content: ch. 13:9; Ex. 20:17; Deut. 5:21
  - type: text
    content: 'the law had not said, “You shall not covet.” '
  '8':
  - type: text
    content: 'But sin, '
  - type: note
    content: ver. 11; [Gal. 5:13]
  - type: text
    content: 'seizing an opportunity through the commandment, produced in me all kinds of covetousness. '
  - type: note
    content: 1 Cor. 15:56
  - type: text
    content: 'For apart from the law, sin lies dead. '
  '9':
  - type: text
    content: 'I was once alive apart from the law, but when the commandment came, sin came alive and I died. '
