document_id: LUK.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Widow’s Offering
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see Mark 12:41-44
  - type: text
    content: Jesus
  - type: note
    content: Greek He
  - type: text
    content: ' looked up and saw the rich '
  - type: note
    content: 2 Kgs. 12:9
  - type: text
    content: 'putting their gifts into '
  - type: note
    content: John 8:20 (Gk.)
  - type: text
    content: 'the offering box, '
  '10':
  - type: text
    content: 'Then he said to them, '
  - type: note
    content: 2 Chr. 15:6; [Rev. 6:4]
  - type: text
    content: '“Nation will rise against nation, and '
  - type: note
    content: Isa. 19:2
  - type: text
    content: kingdom against kingdom.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'There will be great '
  - type: note
    content: Rev. 6:12
  - type: text
    content: 'earthquakes, and in various places '
  - type: note
    content: Acts 11:28; Rev. 6:8
  - type: text
    content: 'famines and pestilences. And there will be '
  - type: note
    content: Isa. 19:17
  - type: text
    content: 'terrors and great '
  - type: note
    content: ch. 11:16; Matt. 16:1; Mark 8:11; [ver. 25; Rev. 12:1, 3; 13:13; 15:1]
  - type: text
    content: signs from heaven.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But before all this '
  - type: note
    content: For ver. 12-17, [Matt. 10:17-22]
  - type: text
    content: 'they will lay their hands on you and persecute you, delivering you up to '
  - type: note
    content: Acts 22:19; 26:11
  - type: text
    content: 'the synagogues and '
  - type: note
    content: Acts 4:3; 5:18; 8:3; 12:4; 16:24; 24:27; 2 Cor. 11:23
  - type: text
    content: 'prisons, and you '
  - type: note
    content: See Acts 16:19
  - type: text
    content: 'will be brought before '
  - type: note
    content: '[Acts 27:24]'
  - type: text
    content: 'kings and '
  - type: note
    content: Acts 17:6; 18:12; 24:1; 25:6
  - type: text
    content: governors for my name’s sake.
  - type: text
    content: ' '
  '13':
  - type: note
    content: '[Phil. 1:13, 14, 19]'
  - type: text
    content: This will be your opportunity to bear witness.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Settle it therefore in your minds '
  - type: note
    content: ch. 12:11
  - type: text
    content: not to meditate beforehand how to answer,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'for '
  - type: note
    content: '[Ex. 4:12; Jer. 1:9]'
  - type: text
    content: 'I will give you a mouth and '
  - type: note
    content: Acts 6:10
  - type: text
    content: 'wisdom, which none of your adversaries will be able to withstand or '
  - type: note
    content: '[Acts 4:14]'
  - type: text
    content: contradict.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'You will be delivered up '
  - type: note
    content: '[ch. 12:53; Matt. 10:35]'
  - type: text
    content: even by parents and brothers
  - type: note
    content: Or parents and brothers and sisters
  - type: text
    content: ' '
  - type: text
    content: and relatives and friends, and some of you they will put to death.
  - type: text
    content: ' '
  '17':
  - type: note
    content: John 15:18-21; [ch. 6:22]
  - type: text
    content: You will be hated by all for my name’s sake.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: '[ver. 16; John 10:28]; See 1 Sam. 14:45'
  - type: text
    content: not a hair of your head will perish.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'By your '
  - type: note
    content: Rom. 5:3; [Matt. 10:22; 24:13]; See Heb. 10:36
  - type: text
    content: endurance you will gain your lives.
  - type: heading
    content: Jesus Foretells Destruction of Jerusalem
  '2':
  - type: text
    content: 'and he saw a poor widow put in two '
  - type: note
    content: ch. 12:59
  - type: text
    content: small copper coins.
  - type: note
    content: Greek two lepta; a lepton was a Jewish bronze or copper coin worth about 1/128 of a denarius (which was a day’s wage for a laborer)
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: '“But '
  - type: note
    content: See ch. 19:43
  - type: text
    content: 'when you see Jerusalem surrounded by armies, then know that '
  - type: note
    content: Dan. 9:27
  - type: text
    content: its desolation has come near.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then let those who are in Judea flee to the mountains, and let those who are inside the city depart, and let not those who are out in the country enter it,
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'for these are '
  - type: note
    content: Isa. 34:8; 63:4; Hos. 9:7
  - type: text
    content: 'days of '
  - type: note
    content: '[ch. 18:7, 8]'
  - type: text
    content: 'vengeance, to fulfill '
  - type: note
    content: See Matt. 1:22
  - type: text
    content: all that is written.
  - type: text
    content: ' '
  '23':
  - type: note
    content: ch. 23:29
  - type: text
    content: 'Alas for women who are pregnant and for those who are nursing infants in those days! For there will be great distress upon the earth and '
  - type: note
    content: 1 Thess. 2:16
  - type: text
    content: wrath against this people.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'They will fall by the edge of the sword and '
  - type: note
    content: '[Deut. 28:64]'
  - type: text
    content: 'be led captive among all nations, and '
  - type: note
    content: Rev. 11:2; [Ps. 79:1; Isa. 63:3, 18; Dan. 8:13; Zech. 12:3]
  - type: text
    content: 'Jerusalem will be trampled underfoot by the Gentiles, '
  - type: note
    content: '[Dan. 12:7; Rom. 11:25]'
  - type: text
    content: until the times of the Gentiles are fulfilled.
  - type: heading
    content: The Coming of the Son of Man
  '25':
  - type: text
    content: ' '
  - type: text
    content: '“And '
  - type: note
    content: Isa. 13:10; 24:23; Ezek. 32:7; Joel 2:10, 31; 3:15; Acts 2:20; [ Amos 5:20; 8:9; Zeph. 1:15; Rev. 6:12; 8:12 ]
  - type: text
    content: 'there will be signs in sun and moon '
  - type: note
    content: Rev. 6:13; [ Isa. 14:12; 34:4 ]
  - type: text
    content: 'and stars, and on the earth '
  - type: note
    content: '[ Ps. 65:7 ]'
  - type: text
    content: distress of nations in perplexity because of the roaring of the sea and the waves,
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'people fainting with fear and with foreboding of what is coming on the world. For '
  - type: note
    content: '[Isa. 34:4]'
  - type: text
    content: the powers of the heavens will be shaken.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And then they will see '
  - type: note
    content: See Dan. 7:13
  - type: text
    content: 'the Son of Man coming in a cloud '
  - type: note
    content: Matt. 26:64; Mark 9:1; [Matt. 25:31]
  - type: text
    content: with power and great glory.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Now when these things begin to take place, straighten up and '
  - type: note
    content: Job 10:15
  - type: text
    content: 'raise your heads, because '
  - type: note
    content: Rom. 8:23; Eph. 4:30; [Rom. 13:11]; See ch. 1:68
  - type: text
    content: your redemption is drawing near.”
  - type: heading
    content: The Lesson of the Fig Tree
  '29':
  - type: text
    content: 'And he told them a parable: '
  - type: text
    content: “Look at the fig tree, and all the trees.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And he said, '
  - type: text
    content: '“Truly, I tell you, '
  - type: note
    content: '[2 Cor. 8:2, 12]'
  - type: text
    content: this poor widow has put in more than all of them.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'As soon as they come out in leaf, you see '
  - type: note
    content: ch. 12:57; [Matt. 16:3]
  - type: text
    content: for yourselves and know that the summer is already near.
  - type: text
    content: ' '
  '31':
  - type: text
    content: So also, when you see these things taking place, you know that the kingdom of God is near.
  - type: text
    content: ' '
  '32':
  - type: note
    content: See ch. 9:27
  - type: text
    content: Truly, I say to you, this generation will not pass away until all has taken place.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Ps. 102:26; Isa. 51:6; 2 Pet. 3:10; [Matt. 5:18; Heb. 12:27]
  - type: text
    content: 'Heaven and earth will pass away, but '
  - type: note
    content: Ps. 119:89; Isa. 40:8; 1 Pet. 1:23, 25
  - type: text
    content: my words will not pass away.
  - type: heading
    content: Watch Yourselves
  '34':
  - type: text
    content: ' '
  - type: text
    content: '“But watch yourselves '
  - type: note
    content: '[ Rom. 13:13; 1 Thess. 5:6, 7; 1 Pet. 4:7 ]'
  - type: text
    content: 'lest '
  - type: note
    content: James 5:5
  - type: text
    content: 'your hearts be weighed down with dissipation and drunkenness and '
  - type: note
    content: '[ Matt. 13:22 ]'
  - type: text
    content: 'cares of this life, and '
  - type: note
    content: 1 Thess. 5:3, 4; [ch. 12:40 ]
  - type: text
    content: 'that day come upon you suddenly '
  - type: note
    content: Eccles. 9:12; Isa. 24:17
  - type: text
    content: like a trap.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For it will come upon all who dwell on the face of the whole earth.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'But '
  - type: note
    content: ch. 12:37; Matt. 25:13; 26:41; Mark 14:34-38; Acts 20:31; 1 Cor. 16:13; 1 Thess. 5:6; 1 Pet. 5:8
  - type: text
    content: 'stay awake at all times, '
  - type: note
    content: See ch. 18:1
  - type: text
    content: 'praying that you may '
  - type: note
    content: '[Hos. 12:4]'
  - type: text
    content: 'have strength to escape all these things that are going to take place, and '
  - type: note
    content: See Rev. 6:17
  - type: text
    content: to stand before the Son of Man.”
  '37':
  - type: text
    content: 'And '
  - type: note
    content: See Matt. 26:55
  - type: text
    content: 'every day he was teaching in the temple, but '
  - type: note
    content: ch. 22:39; Matt. 21:17; Mark 11:19; [John 8:1; 18:2]
  - type: text
    content: 'at night he went out and lodged on '
  - type: note
    content: See Matt. 21:1
  - type: text
    content: 'the mount called Olivet. '
  '38':
  - type: text
    content: 'And early in the morning '
  - type: note
    content: '[See ver. 37above]'
  - type: text
    content: all the people came to him in the temple to hear him.
  '4':
  - type: text
    content: 'For they all contributed out of their abundance, but she out of her '
  - type: note
    content: '[Phil. 4:11]'
  - type: text
    content: 'poverty put in all '
  - type: note
    content: ch. 8:43
  - type: text
    content: she had to live on.”
  - type: heading
    content: Jesus Foretells Destruction of the Temple
  '5':
  - type: text
    content: ' '
  - type: note
    content: For ver. 5-36, see Matt. 24:1-51; Mark 13:1-37
  - type: text
    content: 'And while some were speaking of the temple, how it was adorned with noble stones and offerings, he said, '
  '6':
  - type: text
    content: '“As for these things that you see, '
  - type: note
    content: ch. 19:43, 44; See ch. 17:22
  - type: text
    content: the days will come when there will not be left here one stone upon another that will not be thrown down.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And they asked him, “Teacher, '
  - type: note
    content: '[Acts 1:6, 7]'
  - type: text
    content: 'when will these things be, and what will be the sign when these things are about to take place?” '
  '8':
  - type: text
    content: 'And he said, '
  - type: note
    content: Jer. 29:8; Eph. 5:6; Col. 2:8; 2 Thess. 2:3; 1 John 3:7
  - type: text
    content: '“See that you are not led astray. For '
  - type: note
    content: Jer. 14:14; 1 John 2:18
  - type: text
    content: 'many will come in my name, saying, '
  - type: note
    content: See John 8:24
  - type: text
    content: '‘I am he!’ and, '
  - type: note
    content: '[Matt. 3:2; 4:17; Mark 1:15]'
  - type: text
    content: ‘The time is at hand!’ Do not go after them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And when you hear of wars and tumults, do not be '
  - type: note
    content: ch. 24:37
  - type: text
    content: 'terrified, for these things '
  - type: note
    content: Rev. 1:1
  - type: text
    content: must first take place, but the end will not be at once.”
  - type: heading
    content: Jesus Foretells Wars and Persecution
