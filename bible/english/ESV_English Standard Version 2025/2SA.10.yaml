document_id: 2SA.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Defeats Ammon and Syria
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-19, see 1 Chr. 19:1-19
  - type: text
    content: 'After this the king of the Ammonites died, and Hanun his son reigned in his place. '
  '10':
  - type: text
    content: 'The rest of his men he put in the charge of Abishai his brother, and he arrayed them against the Ammonites. '
  '11':
  - type: text
    content: 'And he said, “If the Syrians are too strong for me, then you shall help me, but if the Ammonites are too strong for you, then I will come and help you. '
  '12':
  - type: note
    content: See Deut. 31:6
  - type: text
    content: 'Be of good courage, and '
  - type: note
    content: 1 Sam. 4:9; [1 Cor. 16:13]
  - type: text
    content: 'let us be courageous for our people, and for the cities of our God, and '
  - type: note
    content: 1 Sam. 3:18
  - type: text
    content: 'may the '
  - type: text
    content: Lord
  - type: text
    content: ' do what seems good to him.” '
  '13':
  - type: text
    content: 'So Joab and the people who were with him drew near to battle against the Syrians, and they fled before him. '
  '14':
  - type: text
    content: And when the Ammonites saw that the Syrians fled, they likewise fled before Abishai and entered the city. Then Joab returned from fighting against the Ammonites and came to Jerusalem.
  '15':
  - type: text
    content: 'But when the Syrians saw that they had been defeated by Israel, they gathered themselves together. '
  '16':
  - type: text
    content: 'And Hadadezer sent and brought out the Syrians who were beyond '
  - type: note
    content: '[ch. 8:3]'
  - type: text
    content: the Euphrates.
  - type: note
    content: Hebrew the River
  - type: text
    content: ' They came to Helam, with '
  - type: note
    content: '[1 Chr. 19:16]'
  - type: text
    content: 'Shobach the commander of the army of Hadadezer at their head. '
  '17':
  - type: text
    content: 'And when it was told David, he gathered all Israel together and crossed the Jordan and came to Helam. The Syrians arrayed themselves against David and fought with him. '
  '18':
  - type: text
    content: 'And the Syrians fled before Israel, and David killed of the Syrians the men of 700 chariots, and 40,000 horsemen, and wounded '
  - type: note
    content: '[1 Chr. 19:18]'
  - type: text
    content: 'Shobach the commander of their army, so that he died there. '
  '19':
  - type: text
    content: 'And when all the kings who were servants of Hadadezer saw that they had been defeated by Israel, they made peace with Israel '
  - type: note
    content: ch. 8:6
  - type: text
    content: and became subject to them. So the Syrians were afraid to save the Ammonites anymore.
  '2':
  - type: text
    content: And David said, “I will deal loyally
  - type: note
    content: Or kindly; twice in this verse
  - type: text
    content: ' with Hanun the son of '
  - type: note
    content: 1 Sam. 11:1
  - type: text
    content: 'Nahash, as his father dealt loyally with me.” So David sent by his servants to console him concerning his father. And David’s servants came into the land of the Ammonites. '
  '3':
  - type: text
    content: 'But the princes of the Ammonites said to Hanun their lord, “Do you think, because David has sent comforters to you, that he is honoring your father? Has not David sent his servants to you to search the city and to spy it out and to overthrow it?” '
  '4':
  - type: text
    content: 'So Hanun took David’s servants and shaved off half the beard of each and cut off their garments in the middle, '
  - type: note
    content: '[Isa. 20:4]'
  - type: text
    content: 'at their hips, and sent them away. '
  '5':
  - type: text
    content: When it was told David, he sent to meet them, for the men were greatly ashamed. And the king said, “Remain at Jericho until your beards have grown and then return.”
  '6':
  - type: text
    content: 'When the Ammonites saw that they had become a stench to David, the Ammonites sent and hired the Syrians of '
  - type: note
    content: Judg. 18:28
  - type: text
    content: 'Beth-rehob, and '
  - type: note
    content: ch. 8:3, 5
  - type: text
    content: 'the Syrians of Zobah, 20,000 foot soldiers, and the king of '
  - type: note
    content: '[Josh. 13:11, 13]'
  - type: text
    content: 'Maacah with 1,000 men, and the men of '
  - type: note
    content: Judg. 11:3, 5
  - type: text
    content: 'Tob, 12,000 men. '
  '7':
  - type: text
    content: 'And when David heard of it, he sent Joab and all the host of '
  - type: note
    content: ch. 23:8
  - type: text
    content: 'the mighty men. '
  '8':
  - type: text
    content: 'And the Ammonites came out and drew up in battle array at the entrance of the gate, and '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the Syrians of Zobah and of Rehob and '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: the men of Tob and Maacah were by themselves in the open country.
  '9':
  - type: text
    content: 'When Joab saw that the battle was set against him both in front and in the rear, he chose some of the best men of Israel and arrayed them against the Syrians. '
