    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Joab and the people who were with him drew near to battle against the Syrians, and they fled before him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And when the Ammonites saw that the Syrians fled, they likewise fled before Abishai and entered the city. Then Joab returned from fighting against the Ammonites and came to Jerusalem.
- type: usfm
