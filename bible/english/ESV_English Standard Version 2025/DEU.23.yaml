      text: '“You shall have a place outside the camp, and you shall go out to it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall have a trowel with your tools, and when you sit down outside, you shall dig a hole with it and turn back and cover up your excrement. '
  '14':
