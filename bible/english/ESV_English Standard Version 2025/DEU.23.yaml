document_id: DEU.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Those Excluded from the Assembly
  - type: text
    content: '“No one whose testicles are crushed or whose male organ is cut off shall enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: '“If any man among you becomes '
  - type: note
    content: Lev. 15:16
  - type: text
    content: 'unclean because of a nocturnal emission, then he shall go outside the camp. He shall not come inside the camp, '
  '11':
  - type: text
    content: 'but when evening comes, he shall '
  - type: note
    content: See Lev. 15:5
  - type: text
    content: bathe himself in water, and as the sun sets, he may come inside the camp.
  '12':
  - type: text
    content: '“You shall have a place outside the camp, and you shall go out to it. '
  '13':
  - type: text
    content: 'And you shall have a trowel with your tools, and when you sit down outside, you shall dig a hole with it and turn back and cover up your excrement. '
  '14':
  - type: text
    content: 'Because '
  - type: note
    content: Lev. 26:12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God walks in the midst of your camp, to deliver you and to give up your enemies before you, therefore your camp must be holy, so that he may not see anything indecent among you and turn away from you.'
  - type: heading
    content: Miscellaneous Laws
  '15':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 30:15
  - type: text
    content: “You shall not give up to his master a slave
  - type: note
    content: Or servant; the Hebrew term ‘ebed designates a range of social and economic roles (see Preface)
  - type: text
    content: ' who has escaped from his master to you. '
  '16':
  - type: text
    content: He shall dwell with you, in your midst, in the place that he shall choose within one of your towns, wherever it suits him. You shall not wrong him.
  '17':
  - type: text
    content: '“None of the '
  - type: note
    content: Lev. 19:29
  - type: text
    content: 'daughters of Israel shall be a cult prostitute, and none '
  - type: note
    content: 1 Kgs. 14:24; 15:12; 22:46; 2 Kgs. 23:7
  - type: text
    content: 'of the sons of Israel shall be a cult prostitute. '
  '18':
  - type: text
    content: You shall not bring the fee of a prostitute or the wages of a dog
  - type: note
    content: Or male prostitute
  - type: text
    content: ' into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in payment for any vow, for both of these are an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 22:25
  - type: text
    content: '“You shall not charge interest on loans to your brother, '
  - type: note
    content: '[Neh. 5:10]'
  - type: text
    content: 'interest on money, interest on food, interest on anything that is lent for interest. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Zech. 9:6 ]'
  - type: text
    content: '“No one born of a forbidden union may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: '. Even to the tenth generation, none of his descendants may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: note
    content: '[ch. 15:3]'
  - type: text
    content: 'You may charge a foreigner interest, but you may not charge your brother interest, '
  - type: note
    content: ch. 15:10
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in all that you undertake in the land that you are entering to take possession of it.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 66:13, 14; 76:11 ]; See Num. 30:2'
  - type: text
    content: '“If you make a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you shall not delay fulfilling it, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will surely require it of you, and you will be guilty of sin. '
  '22':
  - type: text
    content: 'But if you refrain from vowing, you will not be guilty of sin. '
  '23':
  - type: text
    content: 'You shall be careful to do what has passed your lips, for you have voluntarily vowed to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God what you have promised with your mouth.'
  '24':
  - type: text
    content: '“If you go into your neighbor’s vineyard, you may eat your fill of grapes, as many as you wish, but you shall not put any in your bag. '
  '25':
  - type: text
    content: 'If you go into your neighbor’s standing grain, '
  - type: note
    content: '[Matt. 12:1; Mark 2:23; Luke 6:1]'
  - type: text
    content: you may pluck the ears with your hand, but you shall not put a sickle to your neighbor’s standing grain.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Neh. 13:1, 2
  - type: text
    content: '“No Ammonite or Moabite may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: '. Even to the tenth generation, none of them may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ' forever, '
  '4':
  - type: note
    content: '[ch. 2:29]'
  - type: text
    content: 'because they did not meet you with bread and with water on the way, when you came out of Egypt, and because they '
  - type: note
    content: Num. 22:5, 6; [2 Pet. 2:15]
  - type: text
    content: 'hired against you Balaam the son of Beor from Pethor of '
  - type: note
    content: Acts 7:2
  - type: text
    content: 'Mesopotamia, to curse you. '
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' your God would not listen to Balaam; instead the '
  - type: text
    content: Lord
  - type: text
    content: ' your God turned '
  - type: note
    content: Num. 23:11; 24:10
  - type: text
    content: 'the curse into a blessing for you, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God loved you. '
  '6':
  - type: text
    content: 'You '
  - type: note
    content: '[Ezra 9:12]'
  - type: text
    content: shall not seek their peace or their prosperity all your days forever.
  '7':
  - type: text
    content: '“You shall not abhor an Edomite, for '
  - type: note
    content: Gen. 25:24-26; Num. 20:14; Obad. 10, 12
  - type: text
    content: 'he is your brother. You shall not abhor an Egyptian, because '
  - type: note
    content: ch. 10:19; Ex. 22:21; 23:9; Lev. 19:34
  - type: text
    content: 'you were a sojourner in his land. '
  '8':
  - type: text
    content: 'Children born to them in the third generation may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Uncleanness in the Camp
  '9':
  - type: text
    content: “When you are encamped against your enemies, then you shall keep yourself from every evil thing.
