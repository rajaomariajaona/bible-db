document_id: EST.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Haman Plots Against the Jews
  - type: text
    content: 'After these things King Ahasuerus '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'promoted Haman '
  - type: note
    content: ver. 10; ch. 8:3, 5; 9:24
  - type: text
    content: 'the Agagite, the son of Hammedatha, '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'and advanced him and set his throne above all the officials who were with him. '
  '10':
  - type: note
    content: ch. 8:2; Gen. 41:42
  - type: text
    content: 'So the king took his signet ring from his hand and gave it to Haman '
  - type: note
    content: ver. 1
  - type: text
    content: 'the Agagite, the son of Hammedatha, '
  - type: note
    content: ch. 7:6; 8:1; 9:10, 24
  - type: text
    content: 'the enemy of the Jews. '
  '11':
  - type: text
    content: And the king said to Haman, “The money is given to you, the people also, to do with them as it seems good to you.”
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:9
  - type: text
    content: 'Then the king’s scribes were summoned on the thirteenth day of the first month, and an edict, according to all that Haman commanded, was written to the king’s '
  - type: note
    content: See Ezra 8:36
  - type: text
    content: 'satraps and to the governors over all the provinces and to the officials of all the peoples, '
  - type: note
    content: ch. 1:22; 8:9
  - type: text
    content: 'to every province in its own script and every people in its own language. It was written '
  - type: note
    content: ch. 8:8, 10; [1 Kgs. 21:8]
  - type: text
    content: 'in the name of King Ahasuerus '
  - type: note
    content: ch. 8:8, 10
  - type: text
    content: 'and sealed with the king’s signet ring. '
  '13':
  - type: text
    content: 'Letters were sent '
  - type: note
    content: ch. 8:10; [2 Chr. 30:6]
  - type: text
    content: 'by couriers to all the king’s provinces with instruction '
  - type: note
    content: ch. 7:4; 8:11
  - type: text
    content: 'to destroy, to kill, and to annihilate all Jews, young and old, women and children, '
  - type: note
    content: ch. 8:12; [ch. 9:1]
  - type: text
    content: 'in one day, the thirteenth day of the twelfth month, which is the month of Adar, '
  - type: note
    content: ch. 8:11
  - type: text
    content: 'and to plunder their goods. '
  '14':
  - type: note
    content: ch. 8:13, 14
  - type: text
    content: 'A copy of the document was to be issued as a decree in every province by proclamation to all the peoples to be ready for that day. '
  '15':
  - type: note
    content: '[See ver. 13above]'
  - type: text
    content: 'The couriers went out hurriedly by order of the king, and the decree was issued in Susa the citadel. And the king and Haman sat down to drink, '
  - type: note
    content: '[ch. 8:15]'
  - type: text
    content: but the city of Susa was thrown into confusion.
  '2':
  - type: text
    content: 'And all the king’s servants who were at the king’s gate bowed down and paid homage to Haman, for the king had so commanded concerning him. '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'But Mordecai did not bow down or pay homage. '
  '3':
  - type: text
    content: 'Then the king’s servants who were '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'at the king’s gate said to Mordecai, “Why do you transgress '
  - type: note
    content: ver. 2
  - type: text
    content: 'the king’s command?” '
  '4':
  - type: text
    content: 'And when they spoke to him day after day and he would not listen to them, they told Haman, in order to see whether Mordecai’s words would stand, for he had told them that he was a Jew. '
  '5':
  - type: text
    content: 'And when Haman saw that '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Mordecai did not bow down or pay homage to him, Haman was '
  - type: note
    content: Dan. 3:19
  - type: text
    content: 'filled with fury. '
  '6':
  - type: text
    content: But he disdained
  - type: note
    content: Hebrew disdained in his eyes
  - type: text
    content: ' to lay hands on Mordecai alone. So, as they had made known to him the people of Mordecai, Haman sought to destroy'
  - type: note
    content: Or annihilate
  - type: text
    content: ' all the Jews, the people of Mordecai, throughout the whole kingdom of Ahasuerus.'
  '7':
  - type: text
    content: 'In the first month, which is the month of Nisan, in the twelfth year of King Ahasuerus, '
  - type: note
    content: ch. 9:24, 26
  - type: text
    content: 'they cast Pur (that is, they cast lots) before Haman day after day; and they cast it month after month till the twelfth month, which is '
  - type: note
    content: Ezra 6:15
  - type: text
    content: 'the month of Adar. '
  '8':
  - type: text
    content: 'Then Haman said to King Ahasuerus, “There is a certain people scattered abroad and dispersed among the peoples in all the provinces of your kingdom. '
  - type: note
    content: '[Ezra 4:12, 13; Acts 16:20, 21]'
  - type: text
    content: 'Their laws are different from those of every other people, and they do not keep the king’s laws, so that it is not to the king’s profit to tolerate them. '
  '9':
  - type: text
    content: If it please the king, let it be decreed that they be destroyed, and I will pay 10,000 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver into the hands of those who have charge of the king’s business, that they may put it into the king’s treasuries.” '
