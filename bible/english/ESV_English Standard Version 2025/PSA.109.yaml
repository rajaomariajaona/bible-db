document_id: PSA.109,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Help Me, O Lord My God
  - type: text
    content: To the choirmaster. A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 28:1
  - type: text
    content: 'Be not silent, O '
  - type: note
    content: Deut. 10:21; [Ps. 71:6; Jer. 17:14]
  - type: text
    content: God of my praise!
  '10':
  - type: text
    content: 'May his children '
  - type: note
    content: '[Gen. 4:12]; See Ps. 59:15'
  - type: text
    content: wander about and beg,
  - type: note
    content: '[ Ps. 37:25 ]'
  - type: text
    content: seeking food far from the ruins they inhabit!
  '11':
  - type: text
    content: 'May '
  - type: note
    content: '[Deut. 28:43, 44]'
  - type: text
    content: the creditor seize all that he has;
  - type: text
    content: 'may '
  - type: note
    content: '[Deut. 28:43, 44]'
  - type: text
    content: strangers plunder the fruits of his toil!
  '12':
  - type: text
    content: 'Let there be none to '
  - type: note
    content: '[Ps. 36:10]'
  - type: text
    content: extend kindness to him,
  - type: text
    content: 'nor any to '
  - type: note
    content: '[Job 5:4]'
  - type: text
    content: pity his fatherless children!
  '13':
  - type: text
    content: 'May his '
  - type: note
    content: See Ps. 21:10
  - type: text
    content: posterity be cut off;
  - type: text
    content: 'may his '
  - type: note
    content: Prov. 10:7
  - type: text
    content: name be blotted out in the second generation!
  '14':
  - type: text
    content: 'May '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'the iniquity of his fathers be remembered before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and let not the sin of his mother be '
  - type: note
    content: Neh. 4:5; Jer. 18:23
  - type: text
    content: blotted out!
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 90:8 ]'
  - type: text
    content: 'Let them be before the '
  - type: text
    content: Lord
  - type: text
    content: ' continually,'
  - type: text
    content: 'that he may '
  - type: note
    content: Ps. 34:16
  - type: text
    content: cut off the memory of them from the earth!
  '16':
  - type: text
    content: For he did not remember to show kindness,
  - type: text
    content: 'but pursued '
  - type: note
    content: ver. 22; Ps. 40:17
  - type: text
    content: the poor and needy
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 34:18
  - type: text
    content: the brokenhearted, to put them to death.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 14:14; Ezek. 35:6 ]'
  - type: text
    content: He loved to curse; let curses come
  - type: note
    content: Revocalization; Masoretic Text curses have come
  - type: text
    content: ' upon him!'
  - type: text
    content: He did not delight in blessing; may it be far
  - type: note
    content: Revocalization; Masoretic Text it is far
  - type: text
    content: ' from him!'
  '18':
  - type: text
    content: 'He '
  - type: note
    content: '[ver. 29; Ps. 73:6]'
  - type: text
    content: clothed himself with cursing as his coat;
  - type: text
    content: 'may it '
  - type: note
    content: '[Num. 5:22]'
  - type: text
    content: soak
  - type: note
    content: Revocalization; Masoretic Text it has soaked
  - type: text
    content: ' into his body like water,'
  - type: text
    content: like oil into his bones!
  '19':
  - type: text
    content: May it be like a garment that he wraps around him,
  - type: text
    content: like a belt that he puts on every day!
  '2':
  - type: text
    content: 'For wicked and '
  - type: note
    content: Ps. 52:4
  - type: text
    content: deceitful mouths are opened against me,
  - type: text
    content: speaking against me with lying tongues.
  '20':
  - type: text
    content: 'May this be the reward of my '
  - type: note
    content: ver. 6, 29
  - type: text
    content: 'accusers from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: of those who speak evil against my life!
  '21':
  - type: text
    content: 'But you, O '
  - type: text
    content: God
  - type: text
    content: ' my Lord,'
  - type: text
    content: 'deal on my behalf '
  - type: note
    content: '[Jer. 14:7]; See Ps. 23:3'
  - type: text
    content: for your name’s sake;
  - type: text
    content: 'because your '
  - type: note
    content: Ps. 69:16; [Ps. 63:3]
  - type: text
    content: steadfast love is good, deliver me!
  '22':
  - type: text
    content: 'For I am '
  - type: note
    content: ver. 16
  - type: text
    content: poor and needy,
  - type: text
    content: and my heart is stricken within me.
  '23':
  - type: text
    content: 'I am gone like '
  - type: note
    content: See Ps. 102:11
  - type: text
    content: a shadow at evening;
  - type: text
    content: 'I am '
  - type: note
    content: Ex. 10:19; [Neh. 5:13; Job 38:13]
  - type: text
    content: shaken off like a locust.
  '24':
  - type: text
    content: 'My knees are weak '
  - type: note
    content: Ps. 35:13
  - type: text
    content: through fasting;
  - type: text
    content: 'my '
  - type: note
    content: '[Job 16:8]'
  - type: text
    content: body has become gaunt, with no fat.
  '25':
  - type: text
    content: 'I am '
  - type: note
    content: Ps. 22:6; 69:19
  - type: text
    content: an object of scorn to my accusers;
  - type: text
    content: 'when they see me, they '
  - type: note
    content: See Ps. 22:7
  - type: text
    content: wag their heads.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:86
  - type: text
    content: 'Help me, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God!'
  - type: text
    content: Save me according to your steadfast love!
  '27':
  - type: text
    content: 'Let them '
  - type: note
    content: '[Job 37:7]'
  - type: text
    content: know that this is your hand;
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', have done it!'
  '28':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Sam. 16:12 ]'
  - type: text
    content: Let them curse, but you will bless!
  - type: text
    content: 'They arise and are put to shame, but '
  - type: note
    content: '[Isa. 65:14]'
  - type: text
    content: your servant will be glad!
  '29':
  - type: text
    content: 'May my accusers be '
  - type: note
    content: ver. 18; See Job 8:22
  - type: text
    content: clothed with dishonor;
  - type: text
    content: 'may they '
  - type: note
    content: Ps. 71:13; [Ps. 35:26]
  - type: text
    content: be wrapped in their own shame as in a cloak!
  '3':
  - type: text
    content: They encircle me with words of hate,
  - type: text
    content: 'and attack me '
  - type: note
    content: See Ps. 69:4
  - type: text
    content: without cause.
  '30':
  - type: text
    content: 'With my mouth I will give great thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'I will '
  - type: note
    content: '[Ps. 22:25]'
  - type: text
    content: praise him in the midst of the throng.
  '31':
  - type: text
    content: 'For he stands '
  - type: note
    content: ver. 6; See Ps. 16:8
  - type: text
    content: at the right hand of the needy one,
  - type: text
    content: to save him from those who condemn his soul to death.
  '4':
  - type: text
    content: 'In return for my love they '
  - type: note
    content: Ps. 38:20
  - type: text
    content: accuse me,
  - type: text
    content: 'but I '
  - type: note
    content: '[Ps. 69:13]'
  - type: text
    content: give myself to prayer.
  - type: note
    content: Hebrew but I am prayer
  '5':
  - type: text
    content: 'So they '
  - type: note
    content: See Ps. 35:12
  - type: text
    content: reward me evil for good,
  - type: text
    content: and hatred for my love.
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-15, see Ps. 35:4-8; 69:22-28
  - type: text
    content: 'Appoint a wicked man '
  - type: note
    content: '[1 Chr. 21:1; Zech. 3:1]'
  - type: text
    content: against him;
  - type: text
    content: 'let an accuser stand '
  - type: note
    content: Job 30:12
  - type: text
    content: at his right hand.
  '7':
  - type: text
    content: When he is tried, let him come forth guilty;
  - type: text
    content: 'let his '
  - type: note
    content: Prov. 28:9; [Prov. 15:8; 21:27]
  - type: text
    content: prayer be counted as sin!
  '8':
  - type: text
    content: 'May his '
  - type: note
    content: '[Ps. 55:23]'
  - type: text
    content: days be few;
  - type: text
    content: 'may '
  - type: note
    content: Cited Acts 1:20
  - type: text
    content: 'another take his '
  - type: note
    content: Num. 4:16; [1 Chr. 24:3]
  - type: text
    content: office!
  '9':
  - type: text
    content: 'May his '
  - type: note
    content: Ex. 22:24
  - type: text
    content: children be fatherless
  - type: text
    content: and his wife a widow!
