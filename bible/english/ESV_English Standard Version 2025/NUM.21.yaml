document_id: NUM.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Arad Destroyed
  - type: text
    content: 'When '
  - type: note
    content: ch. 33:40; [Judg. 1:16]
  - type: text
    content: 'the Canaanite, the king of Arad, who lived in '
  - type: note
    content: See ch. 13:17
  - type: text
    content: 'the Negeb, heard that Israel was coming by the way of Atharim, he fought against Israel, and took some of them captive. '
  '10':
  - type: text
    content: 'And the people of Israel set out and '
  - type: note
    content: ch. 33:43, 44
  - type: text
    content: 'camped in Oboth. '
  '11':
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'And they set out from Oboth and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'camped at Iye-abarim, in the wilderness that is opposite Moab, toward the sunrise. '
  '12':
  - type: text
    content: 'From there they set out and camped in '
  - type: note
    content: Deut. 2:13
  - type: text
    content: 'the Valley of Zered. '
  '13':
  - type: text
    content: 'From there they set out and camped on the other side of the Arnon, which is in the wilderness that extends from the border of the Amorites, for the '
  - type: note
    content: ch. 22:36; Judg. 11:18
  - type: text
    content: 'Arnon is the border of Moab, between Moab and the Amorites. '
  '14':
  - type: text
    content: 'Therefore it is said in the Book of the Wars of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “Waheb in Suphah, and the valleys of the Arnon,
  '15':
  - type: text
    content: and the slope of the valleys
  - type: text
    content: 'that extends to the seat of '
  - type: note
    content: ver. 28; Deut. 2:9, 18, 29; Isa. 15:1
  - type: text
    content: Ar,
  - type: text
    content: and leans to the border of Moab.”
  '16':
  - type: text
    content: 'And from there they continued '
  - type: note
    content: '[2 Sam. 20:14]'
  - type: text
    content: to Beer;
  - type: note
    content: Beer means well
  - type: text
    content: ' that is the well of which the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Gather the people together, so that '
  - type: note
    content: '[ch. 20:8; Ex. 17:6]'
  - type: text
    content: 'I may give them water.” '
  '17':
  - type: text
    content: 'Then Israel sang this song:'
  - type: text
    content: “Spring up, O well!—Sing to it!—
  '18':
  - type: text
    content: the well that the princes made,
  - type: text
    content: that the nobles of the people dug,
  - type: text
    content: 'with '
  - type: note
    content: See Gen. 49:10
  - type: text
    content: the scepter and with their staffs.”
  - type: text
    content: 'And from the wilderness they went on to Mattanah, '
  '19':
  - type: text
    content: 'and from Mattanah to Nahaliel, and from Nahaliel to Bamoth, '
  '2':
  - type: note
    content: '[Gen. 28:20; Judg. 11:30]'
  - type: text
    content: 'And Israel vowed a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “If you will indeed give this people into my hand, then I will devote their cities to destruction.”'
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction); also verse 3
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'and from Bamoth to the valley lying in the region of Moab by the top of Pisgah '
  - type: note
    content: '[ch. 23:28]'
  - type: text
    content: that looks down on the desert.
  - type: note
    content: Or Jeshimon
  - type: heading
    content: King Sihon Defeated
  '21':
  - type: text
    content: 'Then '
  - type: note
    content: Deut. 2:26, 27; Judg. 11:19
  - type: text
    content: 'Israel sent messengers to Sihon king of the Amorites, saying, '
  '22':
  - type: note
    content: '[ch. 20:17]'
  - type: text
    content: '“Let me pass through your land. We will not turn aside into field or vineyard. We will not drink the water of a well. We will go by the King’s Highway until we have passed through your territory.” '
  '23':
  - type: note
    content: Deut. 29:7
  - type: text
    content: 'But Sihon would not allow Israel to pass through his territory. He gathered all his people together and went out against Israel to the wilderness and '
  - type: note
    content: Deut. 2:32; Judg. 11:20
  - type: text
    content: 'came to Jahaz and fought against Israel. '
  '24':
  - type: note
    content: Deut. 2:33; Josh. 12:1, 2; 24:8; Neh. 9:22; Ps. 135:11; 136:19, 20; Amos 2:9
  - type: text
    content: 'And Israel defeated him with the edge of the sword and took possession of his land from the Arnon to the '
  - type: note
    content: See Gen. 32:22
  - type: text
    content: 'Jabbok, as far as to the Ammonites, for the border of the Ammonites was strong. '
  '25':
  - type: text
    content: 'And Israel took all these cities, and Israel settled in all the cities of the Amorites, in Heshbon, and in all its villages. '
  '26':
  - type: text
    content: 'For Heshbon was the city of Sihon the king of the Amorites, who had fought against the former king of Moab and taken all his land out of his hand, as far as the Arnon. '
  '27':
  - type: text
    content: 'Therefore the '
  - type: note
    content: See ch. 23:7
  - type: text
    content: ballad singers say,
  - type: text
    content: '“Come to '
  - type: note
    content: See ch. 32:37
  - type: text
    content: Heshbon, let it be built;
  - type: text
    content: let the city of Sihon be established.
  '28':
  - type: text
    content: 'For '
  - type: note
    content: Jer. 48:45, 46
  - type: text
    content: 'fire came out from '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: Heshbon,
  - type: text
    content: flame from the city of Sihon.
  - type: text
    content: 'It devoured '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: Ar of Moab,
  - type: text
    content: and swallowed
  - type: note
    content: Septuagint; Hebrew the lords of
  - type: text
    content: ' the heights of the Arnon.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: Woe to you, O Moab!
  - type: text
    content: 'You are undone, O people of '
  - type: note
    content: Judg. 11:24; 1 Kgs. 11:7; 2 Kgs. 23:13; Jer. 48:7
  - type: text
    content: Chemosh!
  - type: text
    content: He has made his sons fugitives,
  - type: text
    content: and his daughters captives,
  - type: text
    content: to an Amorite king, Sihon.
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' heeded the voice of Israel and gave over the Canaanites, and they devoted them and their cities to destruction. So the name of the place was called '
  - type: note
    content: ch. 14:45; Deut. 1:44; Josh. 19:4; Judg. 1:17
  - type: text
    content: Hormah.
  - type: note
    content: Hormah means destruction
  - type: heading
    content: The Bronze Serpent
  '30':
  - type: text
    content: So we overthrew them;
  - type: text
    content: 'Heshbon, as far as '
  - type: note
    content: ch. 32:3; Josh. 13:17; Isa. 15:2; Jer. 48:18; [ch. 33:45, 46]
  - type: text
    content: Dibon, perished;
  - type: text
    content: and we laid waste as far as Nophah;
  - type: text
    content: 'fire spread as far as '
  - type: note
    content: 1 Chr. 19:7; Isa. 15:2
  - type: text
    content: Medeba.”
  - type: note
    content: Compare Samaritan and Septuagint; Hebrew and we laid waste as far as Nophah, which is as far as Medeba
  - type: heading
    content: King Og Defeated
  '31':
  - type: text
    content: 'Thus Israel lived in the land of the Amorites. '
  '32':
  - type: text
    content: 'And Moses sent to spy out '
  - type: note
    content: ch. 32:1; Josh. 13:25; 2 Sam. 24:5; Jer. 48:32
  - type: text
    content: 'Jazer, and they captured its villages and dispossessed the Amorites who were there. '
  '33':
  - type: text
    content: 'Then they turned and went up by the way to Bashan. And Og the king of Bashan came out against them, he and all his people, to battle '
  - type: note
    content: Deut. 1:4; 3:1; Josh. 13:12
  - type: text
    content: 'at Edrei. '
  '34':
  - type: note
    content: Deut. 3:2
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Do not fear him, for I have given him into your hand, and all his people, and his land. And '
  - type: note
    content: See ver. 24
  - type: text
    content: 'you shall do to him as you did to Sihon king of the Amorites, who lived at Heshbon.” '
  '35':
  - type: text
    content: So they defeated him and his sons and all his people, until he had no survivor left. And they possessed his land.
  '4':
  - type: text
    content: 'From Mount Hor '
  - type: note
    content: ch. 20:22; 33:41
  - type: text
    content: 'they set out by the way to the Red Sea, '
  - type: note
    content: Judg. 11:18
  - type: text
    content: 'to go around the land of Edom. And the people became impatient on the way. '
  '5':
  - type: text
    content: 'And the people '
  - type: note
    content: Ps. 78:19
  - type: text
    content: 'spoke against God and against Moses, '
  - type: note
    content: Ex. 16:3; 17:3
  - type: text
    content: '“Why have you brought us up out of Egypt to die in the wilderness? For there is no food and no water, and '
  - type: note
    content: '[ch. 11:6]'
  - type: text
    content: 'we loathe this worthless food.” '
  '6':
  - type: note
    content: Deut. 8:15; 1 Cor. 10:9; [Isa. 14:29; 30:6]
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent fiery serpents among the people, and '
  - type: note
    content: Jer. 8:17
  - type: text
    content: 'they bit the people, so that many people of Israel died. '
  '7':
  - type: note
    content: Ps. 78:34; [ch. 11:2]
  - type: text
    content: 'And the people came to Moses and said, “We have sinned, for we have spoken against the '
  - type: text
    content: Lord
  - type: text
    content: ' and against you. '
  - type: note
    content: '[Ex. 8:8, 28; 1 Sam. 12:19; 1 Kgs. 13:6; Acts 8:24]'
  - type: text
    content: 'Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ', that he take away the serpents from us.” So Moses prayed for the people. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Make a fiery serpent and set it on a pole, and everyone who is bitten, when he sees it, shall live.” '
  '9':
  - type: text
    content: 'So '
  - type: note
    content: John 3:14, 15; [2 Kgs. 18:4]
  - type: text
    content: Moses made a bronze
  - type: note
    content: Or copper
  - type: text
    content: ' serpent and set it on a pole. And if a serpent bit anyone, he would look at the bronze serpent and live.'
  - type: heading
    content: The Song of the Well
