document_id: PRO.21,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The king’s heart is a stream of water in the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'he '
  - type: note
    content: '[Ezra 6:22]'
  - type: text
    content: turns it wherever he will.
  '10':
  - type: text
    content: The soul of the wicked desires evil;
  - type: text
    content: his neighbor finds no mercy in his eyes.
  '11':
  - type: text
    content: 'When '
  - type: note
    content: ch. 19:25; See Ps. 1:1
  - type: text
    content: a scoffer is punished, the simple becomes wise;
  - type: text
    content: when a wise man is instructed, he gains knowledge.
  '12':
  - type: text
    content: 'The Righteous One '
  - type: note
    content: Ps. 37:35, 36
  - type: text
    content: observes the house of the wicked;
  - type: text
    content: he throws the wicked down to ruin.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ James 2:13 ]; See Matt. 18:30-34'
  - type: text
    content: Whoever closes his ear to the cry of the poor
  - type: text
    content: will himself call out and not be answered.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 17:8; 18:16 ]'
  - type: text
    content: A gift in secret averts anger,
  - type: text
    content: and a concealed bribe,
  - type: note
    content: Hebrew a bribe in the bosom
  - type: text
    content: ' strong wrath.'
  '15':
  - type: text
    content: When justice is done, it is a joy to the righteous
  - type: note
    content: '[ch. 10:29 ]'
  - type: text
    content: but terror to evildoers.
  '16':
  - type: text
    content: One who wanders from the way of good sense
  - type: note
    content: '[ Ps. 49:14 ]'
  - type: text
    content: will rest in the assembly of the dead.
  '17':
  - type: text
    content: Whoever loves pleasure will be a poor man;
  - type: text
    content: he who loves wine and oil will not be rich.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:8 ]'
  - type: text
    content: 'The wicked is a '
  - type: note
    content: Isa. 43:3
  - type: text
    content: ransom for the righteous,
  - type: text
    content: and the traitor for the upright.
  '19':
  - type: text
    content: 'It is '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: better to live in a desert land
  - type: text
    content: than with a quarrelsome and fretful woman.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:2; [ch. 12:15 ]
  - type: text
    content: Every way of a man is right in his own eyes,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 24:12; [Luke 16:15; 1 Cor. 4:4]; See 1 Sam. 16:7
  - type: text
    content: weighs the heart.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 112:3 ]'
  - type: text
    content: Precious treasure and oil are in a wise man’s dwelling,
  - type: text
    content: 'but a foolish man '
  - type: note
    content: '[Job 20:15, 18]'
  - type: text
    content: devours it.
  '21':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 15:9; Matt. 5:6; [ch. 3:3]
  - type: text
    content: pursues righteousness and kindness
  - type: text
    content: 'will find '
  - type: note
    content: ch. 3:16; 1 Kgs. 3:11; Matt. 6:33; See ch. 4:22
  - type: text
    content: life, righteousness, and honor.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 24:5; Eccles. 7:19 ]; See 2 Sam. 5:6-9; Eccles. 9:14-18'
  - type: text
    content: A wise man scales the city of the mighty
  - type: text
    content: and brings down the stronghold in which they trust.
  '23':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:3
  - type: text
    content: Whoever keeps his mouth and his tongue
  - type: note
    content: ch. 22:5
  - type: text
    content: 'keeps himself out of '
  - type: note
    content: ch. 12:13
  - type: text
    content: trouble.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:22; See Ps. 1:1
  - type: text
    content: “Scoffer” is the name of the arrogant, haughty man
  - type: text
    content: who acts with arrogant pride.
  '25':
  - type: text
    content: 'The desire of '
  - type: note
    content: '[ch. 13:4]'
  - type: text
    content: the sluggard kills him,
  - type: text
    content: for his hands refuse to labor.
  '26':
  - type: text
    content: All day long he craves and craves,
  - type: text
    content: 'but the righteous '
  - type: note
    content: See Ps. 37:26
  - type: text
    content: gives and does not hold back.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Isa. 66:3; See ch. 15:8
  - type: text
    content: The sacrifice of the wicked is an abomination;
  - type: text
    content: 'how much more '
  - type: note
    content: '[ch. 24:9]'
  - type: text
    content: when he brings it with evil intent.
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:5, 9
  - type: text
    content: A false witness will perish,
  - type: text
    content: but the word of a man who hears will endure.
  '29':
  - type: text
    content: A wicked man puts on a bold face,
  - type: text
    content: 'but the upright '
  - type: note
    content: Ps. 119:5
  - type: text
    content: gives thought to
  - type: note
    content: Or establishes
  - type: text
    content: ' his ways.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: See ch. 15:8; 1 Sam. 15:22
  - type: text
    content: To do righteousness and justice
  - type: text
    content: 'is more acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: ' than sacrifice.'
  '30':
  - type: text
    content: ' '
  - type: note
    content: Isa. 8:9, 10; 1 Cor. 3:19, 20; [ch. 19:21 ]
  - type: text
    content: No wisdom, no understanding, no counsel
  - type: text
    content: 'can avail against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 20:7; 33:17; Isa. 31:1 ]'
  - type: text
    content: The horse is made ready for the day of battle,
  - type: text
    content: 'but '
  - type: note
    content: Jer. 3:23
  - type: text
    content: 'the victory belongs to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 6:17; Ps. 101:5
  - type: text
    content: Haughty eyes and a proud heart,
  - type: note
    content: 1 Kgs. 11:36
  - type: text
    content: the lamp
  - type: note
    content: Or the plowing
  - type: text
    content: ' of the wicked, are sin.'
  '5':
  - type: text
    content: 'The plans of '
  - type: note
    content: ch. 10:4
  - type: text
    content: the diligent lead surely to abundance,
  - type: text
    content: 'but everyone who is '
  - type: note
    content: '[ch. 19:2]'
  - type: text
    content: 'hasty comes '
  - type: note
    content: '[ch. 11:24; 14:23; 22:16]'
  - type: text
    content: only to poverty.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:21; See ch. 10:2
  - type: text
    content: The getting of treasures by a lying tongue
  - type: text
    content: 'is a '
  - type: note
    content: '[ch. 13:11]'
  - type: text
    content: 'fleeting '
  - type: note
    content: Job 13:25
  - type: text
    content: 'vapor and a '
  - type: note
    content: '[ch. 8:36]'
  - type: text
    content: snare of death.
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Latin; most Hebrew manuscripts vapor for those who seek death
  '7':
  - type: text
    content: 'The violence of the wicked will '
  - type: note
    content: '[Jer. 30:23]'
  - type: text
    content: sweep them away,
  - type: text
    content: because they refuse to do what is just.
  '8':
  - type: text
    content: 'The way of the guilty '
  - type: note
    content: '[ch. 2:15]'
  - type: text
    content: is crooked,
  - type: text
    content: but the conduct of the pure is upright.
  '9':
  - type: text
    content: 'It is '
  - type: note
    content: ch. 25:24; [ver. 19; ch. 19:13; 27:15]
  - type: text
    content: better to live in a corner of the housetop
  - type: text
    content: than in a house shared with a quarrelsome wife.
