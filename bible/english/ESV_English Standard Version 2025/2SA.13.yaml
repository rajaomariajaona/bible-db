document_id: 2SA.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Amnon and Tamar
  - type: text
    content: 'Now '
  - type: note
    content: ch. 3:2, 3; 1 Chr. 3:2
  - type: text
    content: 'Absalom, David’s son, had a beautiful sister, whose name was '
  - type: note
    content: 1 Chr. 3:9
  - type: text
    content: 'Tamar. And after a time Amnon, David’s son, loved her. '
  '10':
  - type: text
    content: 'Then Amnon said to Tamar, “Bring the food into the chamber, that I may eat from your hand.” And Tamar took the cakes she had made and brought them into the chamber to Amnon her brother. '
  '11':
  - type: text
    content: 'But when she brought them near him to eat, he took hold of her and said to her, “Come, lie with me, my sister.” '
  '12':
  - type: text
    content: She answered him, “No, my brother, do not violate
  - type: note
    content: Or humiliate; also verses 14, 22, 32
  - type: text
    content: ' me, for '
  - type: note
    content: Lev. 18:9, 11; 20:17
  - type: text
    content: 'such a thing is not done in Israel; do not do this '
  - type: note
    content: Gen. 34:7; Judg. 19:23; 20:6
  - type: text
    content: 'outrageous thing. '
  '13':
  - type: text
    content: 'As for me, where could I carry my shame? And as for you, you would be as one of '
  - type: note
    content: '[ch. 3:33]'
  - type: text
    content: 'the outrageous fools in Israel. Now therefore, please speak to the king, for he will not withhold me from you.” '
  '14':
  - type: text
    content: But he would not listen to her, and being stronger than she, he violated her and lay with her.
  '15':
  - type: text
    content: 'Then Amnon hated her with very great hatred, so that the hatred with which he hated her was greater than the love with which he had loved her. And Amnon said to her, “Get up! Go!” '
  '16':
  - type: text
    content: But she said to him, “No, my brother, for this wrong in sending me away is greater than the other that you did to me.”
  - type: note
    content: Compare Septuagint, Vulgate; the meaning of the Hebrew is uncertain
  - type: text
    content: ' But he would not listen to her. '
  '17':
  - type: text
    content: 'He called the young man who served him and said, “Put this woman out of my presence and bolt the door after her.” '
  '18':
  - type: text
    content: 'Now she was wearing '
  - type: note
    content: Gen. 37:3; Judg. 5:30; Ps. 45:14
  - type: text
    content: a long robe with sleeves,
  - type: note
    content: Or a robe of many colors (compare Genesis 37:3); compare long robe, verse 19
  - type: text
    content: ' for thus were the virgin daughters of the king dressed. So his servant put her out and bolted the door after her. '
  '19':
  - type: text
    content: 'And Tamar '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'put ashes on her head and '
  - type: note
    content: See ch. 1:11
  - type: text
    content: 'tore the long robe that she wore. And '
  - type: note
    content: Jer. 2:37
  - type: text
    content: she laid her hand on her head and went away, crying aloud as she went.
  '2':
  - type: text
    content: 'And Amnon was so tormented that he made himself ill because of his sister Tamar, for she was a virgin, and it seemed impossible to Amnon to do anything to her. '
  '20':
  - type: text
    content: 'And her brother Absalom said to her, “Has Amnon your brother been with you? Now hold your peace, my sister. He is your brother; do not take this to heart.” So Tamar lived, a desolate woman, in her brother Absalom’s house. '
  '21':
  - type: text
    content: When King David heard of all these things, he was very angry.
  - type: note
    content: Dead Sea Scroll, Septuagint add But he would not punish his son Amnon, because he loved him, since he was his firstborn
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But Absalom spoke to Amnon '
  - type: note
    content: Gen. 24:50; 31:24
  - type: text
    content: neither good nor bad, for Absalom hated Amnon, because he had violated his sister Tamar.
  - type: heading
    content: Absalom Murders Amnon
  '23':
  - type: text
    content: 'After two full years Absalom had '
  - type: note
    content: Gen. 31:19; 38:12, 13; 1 Sam. 25:4
  - type: text
    content: 'sheepshearers at Baal-hazor, which is near Ephraim, and Absalom invited all the king’s sons. '
  '24':
  - type: text
    content: 'And Absalom came to the king and said, “Behold, your servant has sheepshearers. Please let the king and his servants go with your servant.” '
  '25':
  - type: text
    content: 'But the king said to Absalom, “No, my son, let us not all go, lest we be burdensome to you.” He pressed him, but he would not go but gave him his blessing. '
  '26':
  - type: text
    content: 'Then Absalom said, “If not, please let my brother Amnon go with us.” And the king said to him, “Why should he go with you?” '
  '27':
  - type: text
    content: 'But Absalom pressed him until he let Amnon and all the king’s sons go with him. '
  '28':
  - type: text
    content: 'Then Absalom commanded his servants, “Mark when Amnon’s '
  - type: note
    content: See Judg. 19:6
  - type: text
    content: 'heart is merry with wine, and when I say to you, ‘Strike Amnon,’ then kill him. Do not fear; have I not commanded you? Be courageous and be valiant.” '
  '29':
  - type: text
    content: So the servants of Absalom did to Amnon as Absalom had commanded. Then all the king’s sons arose, and each mounted his mule and fled.
  '3':
  - type: text
    content: 'But Amnon had a friend, whose name was Jonadab, the son of '
  - type: note
    content: 1 Chr. 2:13; [1 Sam. 16:9; 17:13]
  - type: text
    content: 'Shimeah, David’s brother. And Jonadab was a very crafty man. '
  '30':
  - type: text
    content: 'While they were on the way, news came to David, “Absalom has struck down all the king’s sons, and not one of them is left.” '
  '31':
  - type: text
    content: 'Then the king arose and '
  - type: note
    content: See ch. 1:11
  - type: text
    content: 'tore his garments and '
  - type: note
    content: ch. 12:16
  - type: text
    content: 'lay on the earth. And all his servants who were standing by tore their garments. '
  '32':
  - type: text
    content: 'But '
  - type: note
    content: ver. 3
  - type: text
    content: 'Jonadab the son of Shimeah, David’s brother, said, “Let not my lord suppose that they have killed all the young men, the king’s sons, for Amnon alone is dead. For by the command of Absalom this has been determined from the day he violated his sister Tamar. '
  '33':
  - type: text
    content: 'Now therefore let not my lord the king so '
  - type: note
    content: ch. 19:19
  - type: text
    content: take it to heart as to suppose that all the king’s sons are dead, for Amnon alone is dead.”
  - type: heading
    content: Absalom Flees to Geshur
  '34':
  - type: text
    content: ' '
  - type: note
    content: ver. 37, 38
  - type: text
    content: But Absalom fled. And the young man who kept the watch lifted up his eyes and looked, and behold, many people were coming from the road behind him
  - type: note
    content: Septuagint the Horonaim Road
  - type: text
    content: ' by the side of the mountain. '
  '35':
  - type: text
    content: 'And Jonadab said to the king, “Behold, the king’s sons have come; as your servant said, so it has come about.” '
  '36':
  - type: text
    content: And as soon as he had finished speaking, behold, the king’s sons came and lifted up their voice and wept. And the king also and all his servants wept very bitterly.
  '37':
  - type: text
    content: ' '
  - type: note
    content: ver. 34
  - type: text
    content: 'But Absalom fled and went to '
  - type: note
    content: ch. 3:3; 1 Chr. 3:2
  - type: text
    content: 'Talmai the son of Ammihud, king of '
  - type: note
    content: ch. 14:23, 32; 15:8
  - type: text
    content: 'Geshur. And David mourned for his son day after day. '
  '38':
  - type: note
    content: '[See ver. 37 above]'
  - type: text
    content: 'So Absalom fled and went to Geshur, and was there three years. '
  '39':
  - type: text
    content: And the spirit of the king
  - type: note
    content: Dead Sea Scroll, Septuagint; Hebrew David
  - type: text
    content: ' longed to go out'
  - type: note
    content: Compare Vulgate ceased to go out
  - type: text
    content: ' to Absalom, because '
  - type: note
    content: Gen. 24:67; 38:12; [Gen. 37:35]
  - type: text
    content: he was comforted about Amnon, since he was dead.
  '4':
  - type: text
    content: 'And he said to him, “O son of the king, why are you so haggard morning after morning? Will you not tell me?” Amnon said to him, “I love Tamar, my brother Absalom’s sister.” '
  '5':
  - type: text
    content: 'Jonadab said to him, “Lie down on your bed and pretend to be ill. And when your father comes to see you, say to him, ‘Let my sister Tamar come and give me bread to eat, and prepare the food in my sight, that I may see it and eat it from her hand.’” '
  '6':
  - type: text
    content: 'So Amnon lay down and pretended to be ill. And when the king came to see him, Amnon said to the king, “Please let my sister Tamar come and '
  - type: note
    content: Gen. 18:6
  - type: text
    content: make a couple of cakes in my sight, that I may eat from her hand.”
  '7':
  - type: text
    content: 'Then David sent home to Tamar, saying, “Go to your brother Amnon’s house and prepare food for him.” '
  '8':
  - type: text
    content: 'So Tamar went to her brother Amnon’s house, where he was lying down. And she took dough and kneaded it and made cakes in his sight and baked the cakes. '
  '9':
  - type: text
    content: 'And she took the pan and emptied it out before him, but he refused to eat. And Amnon said, '
  - type: note
    content: '[Gen. 45:1]'
  - type: text
    content: '“Send out everyone from me.” So everyone went out from him. '
