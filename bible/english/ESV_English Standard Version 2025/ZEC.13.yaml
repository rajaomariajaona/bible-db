document_id: ZEC.13,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:3
  - type: text
    content: '“On that day there shall be '
  - type: note
    content: '[Ezek. 36:25]'
  - type: text
    content: a fountain opened for the house of David and the inhabitants of Jerusalem, to cleanse them from sin and uncleanness.
  - type: heading
    content: Idolatry Cut Off
  '2':
  - type: text
    content: '“And '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'on that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: Mic. 5:13; [Jer. 10:11; Ezek. 30:13]
  - type: text
    content: 'I will cut off the names of the idols from the land, so that '
  - type: note
    content: Ex. 23:13
  - type: text
    content: 'they shall be remembered no more. And also '
  - type: note
    content: '[ch. 10:2]'
  - type: text
    content: 'I will remove from the land the prophets and the spirit of uncleanness. '
  '3':
  - type: text
    content: 'And if anyone again prophesies, his father and mother who bore him will say to him, '
  - type: note
    content: See Deut. 13:1-11
  - type: text
    content: '‘You shall not live, for you speak lies in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .’ And his father and mother who bore him shall pierce him through when he prophesies.
  '4':
  - type: text
    content: '“On that day '
  - type: note
    content: '[Mic. 3:7]'
  - type: text
    content: 'every prophet will be ashamed of his vision when he prophesies. He will not put on a hairy cloak in order to deceive, '
  '5':
  - type: text
    content: 'but he will say, '
  - type: note
    content: Amos 7:14
  - type: text
    content: ‘I am no prophet, I am a worker of the soil, for a man sold me in my youth.’
  - type: note
    content: Or for the land has been my possession since my youth
  - type: text
    content: ' '
  '6':
  - type: text
    content: And if one asks him, ‘What are these wounds on your back?’
  - type: note
    content: Or on your chest; Hebrew wounds between your hands
  - type: text
    content: ' he will say, ‘The wounds I received in the house of my friends.’'
  - type: heading
    content: The Shepherd Struck
  '7':
  - type: text
    content: '“Awake, O sword, against '
  - type: note
    content: '[Isa. 40:11; Heb. 13:20]'
  - type: text
    content: my shepherd,
  - type: text
    content: against the man who stands next to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  - type: note
    content: '[ Matt. 26:31; Mark 14:27 ]'
  - type: text
    content: “Strike the shepherd, and the sheep will be scattered;
  - type: text
    content: I will turn my hand against the little ones.
  '8':
  - type: text
    content: 'In the whole land, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: two thirds shall be cut off and perish,
  - type: note
    content: '[ch. 14:2 ]'
  - type: text
    content: and one third shall be left alive.
  '9':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 66:10, 12; Isa. 48:10; Mal. 3:2, 3; 1 Pet. 1:7
  - type: text
    content: I will put this third into the fire,
  - type: text
    content: and refine them as one refines silver,
  - type: text
    content: and test them as gold is tested.
  - type: note
    content: '[ Ps. 50:15 ]'
  - type: text
    content: They will call upon my name,
  - type: text
    content: 'and '
  - type: note
    content: ch. 10:6
  - type: text
    content: I will answer them.
  - type: note
    content: ch. 8:8; See Ezek. 11:20
  - type: text
    content: I will say, ‘They are my people’;
  - type: text
    content: 'and they will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is my God.’”'
