document_id: 1SA.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Rejects Saul
  - type: text
    content: 'And Samuel said to Saul, '
  - type: note
    content: ch. 9:16
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' sent me to anoint you king over his people Israel; now therefore listen to the words of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Samuel: '
  '11':
  - type: note
    content: See Gen. 6:6
  - type: text
    content: “I regret
  - type: note
    content: See also verses 29, 35
  - type: text
    content: ' that I have made Saul king, for he has turned back from following me and '
  - type: note
    content: ver. 3, 9; [ch. 13:13]
  - type: text
    content: 'has not performed my commandments.” And Samuel was angry, and he cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' all night. '
  '12':
  - type: text
    content: 'And Samuel rose early to meet Saul in the morning. And it was told Samuel, “Saul came to '
  - type: note
    content: Josh. 15:55
  - type: text
    content: 'Carmel, and behold, he set up a monument for himself and turned and passed on and went down to Gilgal.” '
  '13':
  - type: text
    content: 'And Samuel came to Saul, and Saul said to him, '
  - type: note
    content: See Ruth 2:20
  - type: text
    content: '“Blessed be you to the '
  - type: text
    content: Lord
  - type: text
    content: '. I have performed the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '14':
  - type: text
    content: 'And Samuel said, “What then is this bleating of the sheep in my ears and the lowing of the oxen that I hear?” '
  '15':
  - type: text
    content: 'Saul said, “They have brought them from the Amalekites, '
  - type: note
    content: ver. 9, 21
  - type: text
    content: 'for the people spared the best of the sheep and of the oxen to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and the rest we have devoted to destruction.” '
  '16':
  - type: text
    content: 'Then Samuel said to Saul, “Stop! I will tell you what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me this night.” And he said to him, “Speak.”'
  '17':
  - type: text
    content: 'And Samuel said, '
  - type: note
    content: '[ch. 9:21]'
  - type: text
    content: '“Though you are little in your own eyes, are you not the head of the tribes of Israel? The '
  - type: text
    content: Lord
  - type: text
    content: ' anointed you king over Israel. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent you on a mission and said, ‘Go, devote to destruction the sinners, the Amalekites, and fight against them until they are consumed.’ '
  '19':
  - type: text
    content: 'Why then did you not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  - type: note
    content: ch. 14:32
  - type: text
    content: 'Why did you pounce on the spoil and do what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '2':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, ‘I have noted what Amalek did to Israel '
  - type: note
    content: See Ex. 17:8-16; Deut. 25:17-19
  - type: text
    content: 'in opposing them on the way when they came up out of Egypt. '
  '20':
  - type: text
    content: 'And Saul said to Samuel, '
  - type: note
    content: ver. 13
  - type: text
    content: '“I have obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: '. I have gone on the mission on which the '
  - type: text
    content: Lord
  - type: text
    content: ' sent me. I have brought Agag the king of Amalek, and I have devoted the Amalekites to destruction. '
  '21':
  - type: note
    content: ver. 15
  - type: text
    content: 'But the people took of the spoil, sheep and oxen, the best of the things devoted to destruction, to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in Gilgal.” '
  '22':
  - type: text
    content: And Samuel said,
  - type: note
    content: Ps. 40:6-8; 50:8, 9; Prov. 21:3; Isa. 1:11-13, 16, 17; Jer. 7:22, 23; Mic. 6:6-8; Heb. 10:6-9
  - type: text
    content: '“Has the '
  - type: text
    content: Lord
  - type: text
    content: ' as great delight in burnt offerings and sacrifices,'
  - type: text
    content: 'as in obeying the voice of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'Behold, '
  - type: note
    content: Eccles. 5:1; Hos. 6:6; Matt. 9:13; 12:7; Mark 12:33
  - type: text
    content: to obey is better than sacrifice,
  - type: text
    content: and to listen than the fat of rams.
  '23':
  - type: text
    content: For rebellion is as the sin of divination,
  - type: text
    content: 'and presumption is as iniquity and '
  - type: note
    content: See Gen. 31:19, 34
  - type: text
    content: idolatry.
  - type: text
    content: 'Because '
  - type: note
    content: ver. 26
  - type: text
    content: 'you have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: ch. 13:14
  - type: text
    content: he has also rejected you from being king.”
  '24':
  - type: text
    content: 'Saul said to Samuel, '
  - type: note
    content: '[2 Sam. 12:13]'
  - type: text
    content: '“I have sinned, for I have transgressed the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ' and your words, because I feared the people and obeyed their voice. '
  '25':
  - type: text
    content: 'Now therefore, please pardon my sin and '
  - type: note
    content: ver. 30
  - type: text
    content: 'return with me that I may bow before the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '26':
  - type: text
    content: 'And Samuel said to Saul, “I will not return with you. '
  - type: note
    content: ver. 23
  - type: text
    content: 'For you have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 16:1
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected you from being king over Israel.” '
  '27':
  - type: note
    content: '[1 Kgs. 11:30, 31]'
  - type: text
    content: 'As Samuel turned to go away, Saul seized the skirt of his robe, and it tore. '
  '28':
  - type: text
    content: 'And Samuel said to him, '
  - type: note
    content: ch. 28:17, 18
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has torn the kingdom of Israel from you this day and has given it to a neighbor of yours, who is better than you. '
  '29':
  - type: text
    content: 'And also the Glory of Israel '
  - type: note
    content: Num. 23:19; [Ezek. 24:14]
  - type: text
    content: 'will not lie or have regret, for he is not a man, that he should have regret.” '
  '3':
  - type: text
    content: 'Now go and strike Amalek and '
  - type: note
    content: Lev. 27:28, 29; Josh. 6:17, 21
  - type: text
    content: devote to destruction
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction); also verses 8, 9, 15, 18, 20, 21
  - type: text
    content: ' all that they have. Do not spare them, '
  - type: note
    content: '[ch. 22:19]'
  - type: text
    content: but kill both man and woman, child and infant, ox and sheep, camel and donkey.’”
  '30':
  - type: text
    content: 'Then he said, “I have sinned; yet '
  - type: note
    content: '[John 5:44; 12:43]'
  - type: text
    content: 'honor me now before the elders of my people and before Israel, '
  - type: note
    content: ver. 25
  - type: text
    content: 'and return with me, that I may bow before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” '
  '31':
  - type: text
    content: 'So Samuel turned back after Saul, and Saul bowed before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '32':
  - type: text
    content: Then Samuel said, “Bring here to me Agag the king of the Amalekites.” And Agag came to him cheerfully.
  - type: note
    content: Or haltingly (compare Septuagint); the Hebrew is uncertain
  - type: text
    content: ' Agag said, “Surely the bitterness of death is past.” '
  '33':
  - type: text
    content: 'And Samuel said, '
  - type: note
    content: '[Judg. 1:7]'
  - type: text
    content: '“As your sword has made women childless, so shall your mother be childless among women.” And Samuel hacked Agag to pieces before the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 12, 21
  - type: text
    content: in Gilgal.
  '34':
  - type: text
    content: 'Then Samuel went '
  - type: note
    content: '[ch. 1:19]'
  - type: text
    content: 'to Ramah, and Saul went up to his house in '
  - type: note
    content: ch. 11:4
  - type: text
    content: 'Gibeah of Saul. '
  '35':
  - type: note
    content: '[ch. 19:24]'
  - type: text
    content: 'And Samuel did not see Saul again until the day of his death, '
  - type: note
    content: ch. 16:1
  - type: text
    content: 'but Samuel grieved over Saul. '
  - type: note
    content: ver. 11
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' regretted that he had made Saul king over Israel.'
  '4':
  - type: text
    content: 'So Saul summoned the people and numbered them in Telaim, two hundred thousand men on foot, and ten thousand men of Judah. '
  '5':
  - type: text
    content: 'And Saul came to the city of Amalek and lay in wait in the valley. '
  '6':
  - type: text
    content: 'Then Saul said to '
  - type: note
    content: ch. 27:10; Judg. 1:16
  - type: text
    content: 'the Kenites, “Go, depart; go down from among the Amalekites, lest I destroy you with them. '
  - type: note
    content: '[Ex. 18:10, 19; Num. 10:29, 32]'
  - type: text
    content: 'For you showed kindness to all the people of Israel when they came up out of Egypt.” So the Kenites departed from among the Amalekites. '
  '7':
  - type: note
    content: ch. 14:48
  - type: text
    content: 'And Saul defeated the Amalekites from '
  - type: note
    content: Gen. 2:11; 25:18
  - type: text
    content: 'Havilah as far as '
  - type: note
    content: ch. 27:8; [Gen. 16:7; Ex. 15:22]
  - type: text
    content: 'Shur, which is east of Egypt. '
  '8':
  - type: text
    content: 'And he took Agag the king of the Amalekites alive '
  - type: note
    content: '[ch. 27:8, 9; 30:1]'
  - type: text
    content: 'and devoted to destruction all the people with the edge of the sword. '
  '9':
  - type: note
    content: ver. 15, 21; [ch. 28:18]
  - type: text
    content: But Saul and the people spared Agag and the best of the sheep and of the oxen and of the fattened calves
  - type: note
    content: The meaning of the Hebrew term is uncertain
  - type: text
    content: ' and the lambs, and all that was good, and would not utterly destroy them. All that was despised and worthless they devoted to destruction.'
