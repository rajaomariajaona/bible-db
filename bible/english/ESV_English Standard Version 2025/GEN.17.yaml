document_id: GEN.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham and the Covenant of Circumcision
  - type: text
    content: 'When Abram was ninety-nine years old the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Abram and said to him, “I am God Almighty;'
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' walk before me, and be '
  - type: note
    content: ch. 6:9; Deut. 18:13; Job 1:1; Ps. 119:1; Matt. 5:48
  - type: text
    content: 'blameless, '
  '10':
  - type: text
    content: 'This is my covenant, which you shall keep, between me and you and your offspring after you: Every male among you shall be circumcised. '
  '11':
  - type: text
    content: 'You shall be circumcised in the flesh of your foreskins, and it shall be a '
  - type: note
    content: Acts 7:8; Rom. 4:11
  - type: text
    content: 'sign of the covenant between me and you. '
  '12':
  - type: text
    content: 'He who is '
  - type: note
    content: Lev. 12:3; Luke 1:59; 2:21; Phil. 3:5
  - type: text
    content: 'eight days old among you shall be circumcised. Every male throughout your generations, whether born in your house or '
  - type: note
    content: '[Ex. 12:48, 49]'
  - type: text
    content: 'bought with your money from any foreigner who is not of your offspring, '
  '13':
  - type: text
    content: 'both he who is born in your house and he who is bought with your money, shall surely be circumcised. So shall my covenant be in your flesh an everlasting covenant. '
  '14':
  - type: text
    content: Any uncircumcised male who is not circumcised in the flesh of his foreskin shall be cut off from his people; he has broken my covenant.”
  - type: heading
    content: Isaac’s Birth Promised
  '15':
  - type: text
    content: And God said to Abraham, “As for Sarai your wife, you shall not call her name Sarai, but Sarah
  - type: note
    content: Sarai and Sarah mean princess
  - type: text
    content: ' shall be her name. '
  '16':
  - type: text
    content: 'I will bless her, and moreover, I will '
  - type: note
    content: ch. 18:10
  - type: text
    content: give
  - type: note
    content: Hebrew have given
  - type: text
    content: ' you a son by her. I will bless her, and '
  - type: note
    content: ch. 35:11
  - type: text
    content: 'she shall become nations; kings of peoples shall come from her.” '
  '17':
  - type: text
    content: 'Then Abraham '
  - type: note
    content: ver. 3
  - type: text
    content: 'fell on his face '
  - type: note
    content: ch. 21:6; Rom. 4:19; [John 8:56]
  - type: text
    content: 'and laughed and said to himself, “Shall a child be born to a man who is a hundred years old? Shall Sarah, who is ninety years old, bear a child?” '
  '18':
  - type: text
    content: 'And Abraham said to God, “Oh that Ishmael might live before you!” '
  '19':
  - type: text
    content: 'God said, “No, but '
  - type: note
    content: ch. 18:10; 21:2; Gal. 4:23, 28
  - type: text
    content: 'Sarah your wife shall bear you a son, and you shall call his name '
  - type: note
    content: ch. 21:3
  - type: text
    content: Isaac.
  - type: note
    content: Isaac means he laughs
  - type: text
    content: ' I will establish my covenant with him as an everlasting covenant for his offspring after him. '
  '2':
  - type: text
    content: 'that I may make my covenant between me and you, and '
  - type: note
    content: ch. 12:2; 13:16; 22:17
  - type: text
    content: 'may multiply you greatly.” '
  '20':
  - type: text
    content: 'As for Ishmael, I have heard you; behold, I have blessed him and will make him fruitful and '
  - type: note
    content: ch. 16:10
  - type: text
    content: 'multiply him greatly. He '
  - type: note
    content: See ch. 25:12-16
  - type: text
    content: 'shall father twelve princes, and '
  - type: note
    content: ch. 21:13, 18
  - type: text
    content: 'I will make him into a great nation. '
  '21':
  - type: text
    content: 'But '
  - type: note
    content: ch. 26:2-5
  - type: text
    content: 'I will establish my covenant with Isaac, '
  - type: note
    content: ch. 21:2
  - type: text
    content: whom Sarah shall bear to you at this time next year.”
  '22':
  - type: text
    content: 'When he had finished talking with him, '
  - type: note
    content: ch. 35:13
  - type: text
    content: 'God went up from Abraham. '
  '23':
  - type: text
    content: 'Then Abraham took Ishmael his son and all those born in his house or bought with his money, every male among the men of Abraham’s house, and he circumcised the flesh of their foreskins that very day, as God had said to him. '
  '24':
  - type: text
    content: 'Abraham was ninety-nine years old when he was circumcised in the flesh of his foreskin. '
  '25':
  - type: text
    content: 'And Ishmael his son was thirteen years old when he was circumcised in the flesh of his foreskin. '
  '26':
  - type: text
    content: 'That very day Abraham and his son Ishmael were circumcised. '
  '27':
  - type: text
    content: And all the men of his house, those born in the house and those bought with money from a foreigner, were circumcised with him.
  '3':
  - type: text
    content: 'Then Abram '
  - type: note
    content: ver. 17
  - type: text
    content: 'fell on his face. And God said to him, '
  '4':
  - type: text
    content: '“Behold, my covenant is with you, and you shall be '
  - type: note
    content: Rom. 4:11, 12, 16
  - type: text
    content: 'the father of a multitude of nations. '
  '5':
  - type: text
    content: No longer shall your name be called Abram,
  - type: note
    content: Abram means exalted father
  - type: text
    content: ' but '
  - type: note
    content: Neh. 9:7
  - type: text
    content: your name shall be Abraham,
  - type: note
    content: Abraham means father of a multitude
  - type: text
    content: ' '
  - type: note
    content: Cited Rom. 4:17
  - type: text
    content: 'for I have made you the father of a multitude of nations. '
  '6':
  - type: text
    content: 'I will make you exceedingly fruitful, and I will make '
  - type: note
    content: ch. 35:11
  - type: text
    content: 'you into nations, and '
  - type: note
    content: ver. 16
  - type: text
    content: 'kings shall come from you. '
  '7':
  - type: text
    content: 'And I will '
  - type: note
    content: Gal. 3:17
  - type: text
    content: 'establish my covenant between me and you and your offspring after you throughout their generations for an everlasting covenant, '
  - type: note
    content: Heb. 11:16; [ch. 26:24; 28:13]
  - type: text
    content: 'to be God to you and to your offspring after you. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:7; 13:15; Ps. 105:11
  - type: text
    content: 'I will give to you and to your offspring after you the land of your sojournings, all the land of Canaan, for an everlasting possession, and '
  - type: note
    content: Ex. 6:7; Lev. 26:12
  - type: text
    content: I will be their God.”
  '9':
  - type: text
    content: 'And God said to Abraham, “As for you, you shall keep my covenant, you and your offspring after you throughout their generations. '
