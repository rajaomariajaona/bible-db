document_id: NUM.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seven Lamps
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'When you bring the Levites before the '
  - type: text
    content: Lord
  - type: text
    content: ', the people of Israel '
  - type: note
    content: '[Lev. 1:4]'
  - type: text
    content: 'shall lay their hands on the Levites, '
  '11':
  - type: text
    content: 'and Aaron shall offer the Levites before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering from the people of Israel, that they may do the service of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Then the Levites '
  - type: note
    content: '[Ex. 29:10]'
  - type: text
    content: 'shall lay their hands on the heads of the bulls, and you shall offer '
  - type: note
    content: ver. 8
  - type: text
    content: 'the one for a sin offering and the other for a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' to make atonement for the Levites. '
  '13':
  - type: text
    content: 'And you shall set the Levites before Aaron and his sons, and shall offer them as '
  - type: note
    content: ver. 11, 21
  - type: text
    content: 'a wave offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“Thus you shall separate the Levites from among the people of Israel, and '
  - type: note
    content: ch. 3:45; [ch. 16:9]
  - type: text
    content: 'the Levites shall be mine. '
  '15':
  - type: text
    content: 'And after that the Levites shall go in to serve at the tent of meeting, when you have cleansed them and offered them as a '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'wave offering. '
  '16':
  - type: text
    content: 'For they are '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'wholly given to me from among the people of Israel. '
  - type: note
    content: ch. 3:12, 45
  - type: text
    content: 'Instead of all who open the womb, the firstborn of all the people of Israel, I have taken them for myself. '
  '17':
  - type: note
    content: See Ex. 13:2
  - type: text
    content: 'For all the firstborn among the people of Israel are mine, both of man and of beast. On the day that I struck down all the firstborn in the land of Egypt I consecrated them for myself, '
  '18':
  - type: text
    content: 'and I have taken the Levites instead of all the firstborn among the people of Israel. '
  '19':
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'And I have given the Levites as a gift to Aaron and his sons from among the people of Israel, to do the service for the people of Israel at the tent of meeting and '
  - type: note
    content: ch. 25:11, 13
  - type: text
    content: 'to make atonement for the people of Israel, '
  - type: note
    content: See ch. 1:53
  - type: text
    content: that there may be no plague among the people of Israel when the people of Israel come near the sanctuary.”
  '2':
  - type: text
    content: '“Speak to Aaron and say to him, When you set up the lamps, the seven lamps shall give light in front of the lampstand.” '
  '20':
  - type: text
    content: 'Thus did Moses and Aaron and all the congregation of the people of Israel to the Levites. According to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses concerning the Levites, the people of Israel did to them. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ver. 7
  - type: text
    content: 'the Levites purified themselves from sin and washed their clothes, and '
  - type: note
    content: ver. 11, 12, 13, 15
  - type: text
    content: 'Aaron offered them as a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Aaron made atonement for them to cleanse them. '
  '22':
  - type: text
    content: 'And after that the Levites went in to do their service in the tent of meeting before Aaron and his sons; as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses concerning the Levites, so they did to them.'
  - type: heading
    content: Retirement of the Levites
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“This applies to the Levites: '
  - type: note
    content: '[ch. 4:3; 1 Chr. 23:3, 24, 27]'
  - type: text
    content: from twenty-five years old and upward they
  - type: note
    content: Hebrew he; also verses 25, 26
  - type: text
    content: ' shall come to do duty in the service of the tent of meeting. '
  '25':
  - type: text
    content: 'And from the age of fifty years they shall withdraw from the duty of the service and serve no more. '
  '26':
  - type: text
    content: They minister
  - type: note
    content: Hebrew He ministers
  - type: text
    content: ' to their brothers in the tent of meeting '
  - type: note
    content: See ch. 1:53
  - type: text
    content: by keeping guard, but they shall do no service. Thus shall you do to the Levites in assigning their duties.”
  '3':
  - type: text
    content: 'And Aaron did so: he set up its lamps in front of the lampstand, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 25:31
  - type: text
    content: 'this was the workmanship of the lampstand, hammered work of gold. From its base to its flowers, it was hammered work; according to the pattern that the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown Moses, so he made the lampstand.'
  - type: heading
    content: Cleansing of the Levites
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '6':
  - type: text
    content: '“Take the Levites from among the people of Israel and cleanse them. '
  '7':
  - type: text
    content: 'Thus you shall do to them to cleanse them: sprinkle the '
  - type: note
    content: ch. 19:9, 17; [Lev. 8:6]
  - type: text
    content: 'water of purification upon them, and '
  - type: note
    content: '[Lev. 14:8, 9]'
  - type: text
    content: 'let them go with a razor over all their body, and wash their clothes and cleanse themselves. '
  '8':
  - type: text
    content: 'Then let them take a bull from the herd and '
  - type: note
    content: Lev. 2:1; See Ex. 29:41
  - type: text
    content: 'its grain offering of fine flour mixed with oil, '
  - type: note
    content: ver. 12
  - type: text
    content: 'and you shall take another bull from the herd for a sin offering. '
  '9':
  - type: note
    content: '[Ex. 29:4; 40:12]'
  - type: text
    content: 'And you shall bring the Levites before the tent of meeting '
  - type: note
    content: '[Lev. 8:3]'
  - type: text
    content: 'and assemble the whole congregation of the people of Israel. '
