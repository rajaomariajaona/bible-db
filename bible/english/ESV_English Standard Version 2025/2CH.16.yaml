document_id: 2CH.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Last Years
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see 1 Kgs. 15:17-22
  - type: text
    content: 'In the '
  - type: note
    content: '[1 Kgs. 16:8]'
  - type: text
    content: 'thirty-sixth year of the reign of Asa, Baasha king of Israel went up against Judah and built Ramah, '
  - type: note
    content: '[ch. 15:9]'
  - type: text
    content: 'that he might permit no one to go out or come in to Asa king of Judah. '
  '10':
  - type: text
    content: 'Then Asa was angry with the seer and put him '
  - type: note
    content: '[ch. 18:26]'
  - type: text
    content: in the stocks in prison, for he was in a rage with him because of this. And Asa inflicted cruelties upon some of the people at the same time.
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-14, see 1 Kgs. 15:23, 24
  - type: text
    content: 'The acts of Asa, from first to last, are written in the Book of the Kings of Judah and Israel. '
  '12':
  - type: text
    content: 'In the thirty-ninth year of his reign Asa was diseased in his feet, and his disease became severe. Yet even in his disease he did not seek the '
  - type: text
    content: Lord
  - type: text
    content: ', but sought help from physicians. '
  '13':
  - type: text
    content: 'And Asa slept with his fathers, dying in the forty-first year of his reign. '
  '14':
  - type: text
    content: 'They buried him in the tomb that he had cut for himself in the city of David. They laid him on a bier '
  - type: note
    content: '[Gen. 50:2; Mark 16:1; John 19:39, 40]'
  - type: text
    content: 'that had been filled with various kinds of spices prepared by the perfumer’s art, '
  - type: note
    content: '[ch. 21:19; Jer. 34:5]'
  - type: text
    content: and they made a very great fire in his honor.
  '2':
  - type: text
    content: 'Then Asa took silver and gold from the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king’s house and sent them to Ben-hadad king of Syria, who lived in Damascus, saying, '
  '3':
  - type: text
    content: “There is a covenant
  - type: note
    content: Or treaty; twice in this verse
  - type: text
    content: ' between me and you, as there was between my father and your father. Behold, I am sending to you silver and gold. Go, break your covenant with Baasha king of Israel, that he may withdraw from me.” '
  '4':
  - type: text
    content: 'And Ben-hadad listened to King Asa and sent the commanders of his armies against the cities of Israel, and they conquered Ijon, Dan, Abel-maim, and all the '
  - type: note
    content: '[Ex. 1:11]'
  - type: text
    content: 'store cities of Naphtali. '
  '5':
  - type: text
    content: 'And when Baasha heard of it, he stopped building Ramah and let his work cease. '
  '6':
  - type: text
    content: Then King Asa took all Judah, and they carried away the stones of Ramah and its timber, with which Baasha had been building, and with them he built Geba and Mizpah.
  '7':
  - type: text
    content: 'At that time '
  - type: note
    content: ch. 19:2; 1 Kgs. 16:1
  - type: text
    content: 'Hanani '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'the seer came to Asa king of Judah and said to him, '
  - type: note
    content: '[Isa. 31:1; Jer. 17:5]'
  - type: text
    content: '“Because you relied on the king of Syria, and did not rely on the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, the army of the king of Syria has escaped you. '
  '8':
  - type: text
    content: 'Were not '
  - type: note
    content: ch. 14:9
  - type: text
    content: 'the Ethiopians and '
  - type: note
    content: ch. 12:3
  - type: text
    content: 'the Libyans a huge army with very many chariots and horsemen? Yet '
  - type: note
    content: '[ch. 13:16, 18]'
  - type: text
    content: 'because you relied on the '
  - type: text
    content: Lord
  - type: text
    content: ', he gave them into your hand. '
  '9':
  - type: note
    content: Zech. 4:10; [Prov. 15:3]
  - type: text
    content: 'For the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' run to and fro throughout the whole earth, to give strong support to those '
  - type: note
    content: '[1 Kgs. 8:61]'
  - type: text
    content: whose heart is blameless
  - type: note
    content: Or whole
  - type: text
    content: ' toward him. '
  - type: note
    content: 1 Sam. 13:13
  - type: text
    content: 'You have done foolishly in this, for from now on '
  - type: note
    content: 1 Kgs. 15:16, 32
  - type: text
    content: 'you will have wars.” '
