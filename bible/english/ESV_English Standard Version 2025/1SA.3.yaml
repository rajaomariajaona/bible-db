document_id: 1SA.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Calls Samuel
  - type: text
    content: ' '
  - type: note
    content: ch. 2:11, 18
  - type: text
    content: 'Now the boy Samuel was ministering to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of Eli. '
  - type: note
    content: '[ver. 21; Ps. 74:9; Amos 8:11]'
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' was rare in those days; there was no frequent vision.'
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' came and stood, calling as at other times, “Samuel! Samuel!” And Samuel said, “Speak, for your servant hears.” '
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “Behold, I am about to do a thing in Israel '
  - type: note
    content: 2 Kgs. 21:12; Jer. 19:3
  - type: text
    content: 'at which the two ears of everyone who hears it will tingle. '
  '12':
  - type: text
    content: 'On that day I will fulfill against Eli '
  - type: note
    content: See ch. 2:30-36
  - type: text
    content: 'all that I have spoken concerning his house, from beginning to end. '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'And I declare to him that I am about to punish his house forever, for the iniquity that he knew, '
  - type: note
    content: ch. 2:12, 17, 22
  - type: text
    content: because his sons were blaspheming God,
  - type: note
    content: Or blaspheming for themselves
  - type: text
    content: ' '
  - type: note
    content: ch. 2:23-25
  - type: text
    content: 'and he did not restrain them. '
  '14':
  - type: text
    content: 'Therefore I swear to the house of Eli '
  - type: note
    content: '[Isa. 22:14]'
  - type: text
    content: that the iniquity of Eli’s house shall not be atoned for by sacrifice or offering forever.”
  '15':
  - type: text
    content: 'Samuel lay until morning; then he opened the doors of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And Samuel was afraid to tell the vision to Eli. '
  '16':
  - type: text
    content: 'But Eli called Samuel and said, “Samuel, my son.” And he said, “Here I am.” '
  '17':
  - type: text
    content: 'And Eli said, “What was it that he told you? Do not hide it from me. '
  - type: note
    content: '[Ruth 1:17]'
  - type: text
    content: 'May God do so to you and more also if you hide anything from me of all that he told you.” '
  '18':
  - type: text
    content: 'So Samuel told him everything and hid nothing from him. And he said, '
  - type: note
    content: '[2 Sam. 10:12; Job 1:21; 2:10; Ps. 39:9; Isa. 39:8]'
  - type: text
    content: '“It is the '
  - type: text
    content: Lord
  - type: text
    content: . Let him do what seems good to him.”
  '19':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:21
  - type: text
    content: 'And Samuel grew, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him '
  - type: note
    content: '[ch. 9:6]'
  - type: text
    content: 'and let none of his words fall to the ground. '
  '2':
  - type: text
    content: 'At that time Eli, '
  - type: note
    content: ch. 4:15; Gen. 27:1; 48:10; [Deut. 34:7]
  - type: text
    content: 'whose eyesight had begun to grow dim so that he could not see, was lying down in his own place. '
  '20':
  - type: text
    content: 'And all Israel '
  - type: note
    content: See 2 Sam. 3:10
  - type: text
    content: 'from Dan to Beersheba knew that Samuel was established as a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared again at Shiloh, for the '
  - type: text
    content: Lord
  - type: text
    content: ' revealed himself to Samuel '
  - type: note
    content: '[Josh. 18:1]'
  - type: text
    content: 'at Shiloh '
  - type: note
    content: ver. 1, 4
  - type: text
    content: 'by the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: note
    content: Ex. 27:20, 21; Lev. 24:2, 3; 2 Chr. 13:11
  - type: text
    content: 'The lamp of God had not yet gone out, and Samuel was lying down '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', where the ark of God was.'
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' called Samuel, and he said, “Here I am!” '
  '5':
  - type: text
    content: and ran to Eli and said, “Here I am, for you called me.” But he said, “I did not call; lie down again.” So he went and lay down.
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' called again, “Samuel!” and Samuel arose and went to Eli and said, “Here I am, for you called me.” But he said, “I did not call, my son; lie down again.” '
  '7':
  - type: text
    content: 'Now Samuel did not yet know the '
  - type: text
    content: Lord
  - type: text
    content: ', and the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' had not yet been revealed to him.'
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' called Samuel again the third time. And he arose and went to Eli and said, “Here I am, for you called me.” Then Eli perceived that the '
  - type: text
    content: Lord
  - type: text
    content: ' was calling the boy. '
  '9':
  - type: text
    content: 'Therefore Eli said to Samuel, “Go, lie down, and if he calls you, you shall say, ‘Speak, '
  - type: text
    content: Lord
  - type: text
    content: ', for your servant hears.’” So Samuel went and lay down in his place.'
