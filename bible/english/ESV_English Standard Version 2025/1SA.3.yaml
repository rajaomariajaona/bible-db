    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called again, “Samuel!” and Samuel arose and went to Eli and said, “Here I am, for you called me.” But he said, “I did not call, my son; lie down again.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Samuel did not yet know the '
    - type: usfm
      marker: nd
      children:
