  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Eli called Samuel and said, “Samuel, my son.” And he said, “Here I am.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eli said, “What was it that he told you? Do not hide it from me. '
    - type: usfm
