    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called Samuel again the third time. And he arose and went to Eli and said, “Here I am, for you called me.” Then Eli perceived that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was calling the boy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Eli said to Samuel, “Go, lie down, and if he calls you, you shall say, ‘Speak, '
    - type: usfm
