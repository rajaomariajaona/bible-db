document_id: ISA.63,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Day of Vengeance
  - type: text
    content: 'Who is this who comes from '
  - type: note
    content: ch. 34:6
  - type: text
    content: Edom,
  - type: text
    content: 'in crimsoned garments from '
  - type: note
    content: ch. 34:6
  - type: text
    content: Bozrah,
  - type: text
    content: he who is splendid in his apparel,
  - type: note
    content: '[ Ps. 68:7 ]'
  - type: text
    content: marching in the greatness of his strength?
  - type: text
    content: “It is I, speaking in righteousness,
  - type: text
    content: mighty to save.”
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ex. 15:24; Num. 14:11; Ps. 78:17, 56; 95:9; Ezek. 20:8
  - type: text
    content: But they rebelled
  - type: note
    content: Ps. 78:40; Acts 7:51; [ Eph. 4:30 ]
  - type: text
    content: and grieved his Holy Spirit;
  - type: text
    content: therefore he turned to be their enemy,
  - type: text
    content: and himself fought against them.
  '11':
  - type: text
    content: 'Then he remembered '
  - type: note
    content: See Ps. 77:11-20
  - type: text
    content: the days of old,
  - type: text
    content: of Moses and his people.
  - type: note
    content: Or Then his people remembered the days of old, of Moses
  - type: note
    content: See Ex. 14:19-22
  - type: text
    content: Where is he who brought them up out of the sea
  - type: text
    content: with the shepherds of his flock?
  - type: text
    content: Where is he who put in the midst of them
  - type: text
    content: his Holy Spirit,
  '12':
  - type: text
    content: who caused his glorious arm
  - type: text
    content: to go at the right hand of Moses,
  - type: note
    content: Ex. 14:21; Josh. 3:16
  - type: text
    content: who divided the waters before them
  - type: note
    content: 2 Sam. 7:23; Neh. 9:10
  - type: text
    content: to make for himself an everlasting name,
  '13':
  - type: text
    content: who led them through the depths?
  - type: text
    content: Like a horse in the desert,
  - type: text
    content: they did not stumble.
  '14':
  - type: text
    content: Like livestock that go down into the valley,
  - type: note
    content: '[ Num. 10:33 ]'
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest.'
  - type: text
    content: So you led your people,
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: to make for yourself a glorious name.
  - type: heading
    content: Prayer for Mercy
  '15':
  - type: text
    content: ' '
  - type: note
    content: Deut. 26:15
  - type: text
    content: Look down from heaven and see,
  - type: note
    content: Ps. 33:14
  - type: text
    content: from your holy and beautiful
  - type: note
    content: Or holy and glorious
  - type: text
    content: ' habitation.'
  - type: text
    content: 'Where are '
  - type: note
    content: ch. 59:17; [Zech. 1:14]
  - type: text
    content: your zeal and your might?
  - type: text
    content: The stirring of your inner parts and your compassion
  - type: text
    content: are held back from me.
  '16':
  - type: text
    content: 'For '
  - type: note
    content: ch. 64:8; Deut. 32:6
  - type: text
    content: you are our Father,
  - type: text
    content: though Abraham does not know us,
  - type: text
    content: and Israel does not acknowledge us;
  - type: text
    content: 'you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are our Father,'
  - type: note
    content: ch. 43:14
  - type: text
    content: our Redeemer from of old is your name.
  '17':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', why do you make us wander from your ways'
  - type: text
    content: 'and '
  - type: note
    content: ch. 6:10; [John 12:40]
  - type: text
    content: harden our heart, so that we fear you not?
  - type: note
    content: Ps. 90:13
  - type: text
    content: Return for the sake of your servants,
  - type: text
    content: the tribes of your heritage.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 4:25, 26 ]'
  - type: text
    content: Your holy people held possession for a little while;
  - type: note
    content: Or They have dispossessed your holy people for a little while
  - type: note
    content: ch. 64:11
  - type: text
    content: our adversaries have trampled down your sanctuary.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 14:8 ]'
  - type: text
    content: We have become like those over whom you have never ruled,
  - type: text
    content: like those who are not called by your name.
  '2':
  - type: text
    content: 'Why is your '
  - type: note
    content: Rev. 19:13
  - type: text
    content: apparel red,
  - type: text
    content: 'and your garments like his '
  - type: note
    content: '[Lam. 1:15; Rev. 14:20; 19:15]'
  - type: text
    content: who treads in the winepress?
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Joel 3:13 ]'
  - type: text
    content: “I have trodden the winepress alone,
  - type: note
    content: '[ch. 59:16 ]'
  - type: text
    content: and from the peoples no one was with me;
  - type: text
    content: I trod them in my anger
  - type: text
    content: and trampled them in my wrath;
  - type: text
    content: their lifeblood
  - type: note
    content: Or their juice; also verse 6
  - type: text
    content: ' spattered on my garments,'
  - type: text
    content: and stained all my apparel.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 34:8
  - type: text
    content: For the day of vengeance was in my heart,
  - type: text
    content: and my year of redemption
  - type: note
    content: Or the year of my redeemed
  - type: text
    content: ' had come.'
  '5':
  - type: text
    content: 'I looked, but '
  - type: note
    content: '[ch. 59:16]'
  - type: text
    content: there was no one to help;
  - type: text
    content: I was appalled, but there was no one to uphold;
  - type: text
    content: so my own arm brought me salvation,
  - type: text
    content: and my wrath upheld me.
  '6':
  - type: text
    content: I trampled down the peoples in my anger;
  - type: note
    content: ch. 49:26
  - type: text
    content: I made them drunk in my wrath,
  - type: text
    content: and I poured out their lifeblood on the earth.”
  - type: heading
    content: The Lord’s Mercy Remembered
  '7':
  - type: text
    content: 'I will recount the steadfast love of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'the praises of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' has granted us,'
  - type: note
    content: Ps. 145:7
  - type: text
    content: and the great goodness to the house of Israel
  - type: text
    content: that he has granted them according to his compassion,
  - type: text
    content: according to the abundance of his steadfast love.
  '8':
  - type: text
    content: For he said, “Surely they are my people,
  - type: text
    content: children who will not deal falsely.”
  - type: text
    content: And he became their Savior.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Judg. 10:16
  - type: text
    content: In all their affliction he was afflicted,
  - type: note
    content: Or he did not afflict
  - type: text
    content: and the angel of his presence saved them;
  - type: note
    content: Deut. 7:7, 8; [ Ezek. 16:5, 6 ]
  - type: text
    content: in his love and in his pity he redeemed them;
  - type: note
    content: See Deut. 32:10-12
  - type: text
    content: he lifted them up and carried them all the days of old.
