  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they said to one another, “Come, let us make bricks, and burn them thoroughly.” And they had brick for stone, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:10
      metadata:
        usfm: GEN.14.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 2:3
      metadata:
        usfm: EXO.2.3
    marker-yv: yv-n
  - type: text
    text: 'and bitumen for mortar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then they said, “Come, let us build ourselves a city and a tower '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 1:28
      metadata:
        usfm: DEU.1.28
    marker-yv: yv-n
  - type: text
    text: 'with its top in the heavens, and let us make a name for ourselves, lest we be dispersed over the face of the whole earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:21
      metadata:
        usfm: GEN.18.21
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came down to see the city and the tower, which the children of man had built. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “Behold, they are one people, and they have all one language, and this is only the beginning of what they will do. And nothing that they propose to do will now be impossible for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Come, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
