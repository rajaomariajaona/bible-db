    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 2:4
      metadata:
        usfm: PSA.2.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'let us go down and there confuse their language, so that they may not understand one another’s speech.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
