        usfm: GEN.10.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 1:51
      metadata:
        usfm: LUK.1.51
    marker-yv: yv-n
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' dispersed them from there over the face of all the earth, and they left off building the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Therefore its name was called '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:10
      metadata:
        usfm: GEN.10.10
    marker-yv: yv-n
  - type: text
    text: 'Babel, because there the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' confused'
  - type: usfm
    marker: f
    children:
