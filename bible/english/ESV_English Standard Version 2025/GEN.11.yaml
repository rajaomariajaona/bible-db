document_id: GEN.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tower of Babel
  - type: text
    content: 'Now the whole earth had one language and the same words. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:22 ]; For ver. 10-26, see 1 Chr. 1:17-27'
  - type: text
    content: 'These are the generations of Shem. When Shem was 100 years old, he fathered Arpachshad two years after the flood. '
  '11':
  - type: text
    content: And Shem lived after he fathered Arpachshad 500 years and had other sons and daughters.
  '12':
  - type: text
    content: 'When Arpachshad had lived 35 years, he fathered Shelah. '
  '13':
  - type: text
    content: And Arpachshad lived after he fathered Shelah 403 years and had other sons and daughters.
  '14':
  - type: text
    content: 'When Shelah had lived 30 years, he fathered Eber. '
  '15':
  - type: text
    content: And Shelah lived after he fathered Eber 403 years and had other sons and daughters.
  '16':
  - type: text
    content: 'When Eber had lived 34 years, he fathered Peleg. '
  '17':
  - type: text
    content: And Eber lived after he fathered Peleg 430 years and had other sons and daughters.
  '18':
  - type: text
    content: 'When Peleg had lived 30 years, he fathered Reu. '
  '19':
  - type: text
    content: And Peleg lived after he fathered Reu 209 years and had other sons and daughters.
  '2':
  - type: text
    content: 'And as people migrated from the east, they found a plain in '
  - type: note
    content: ch. 10:10; 14:1, 9; Isa. 11:11; Dan. 1:2; Zech. 5:11
  - type: text
    content: 'the land of Shinar and settled there. '
  '20':
  - type: text
    content: 'When Reu had lived 32 years, he fathered Serug. '
  '21':
  - type: text
    content: And Reu lived after he fathered Serug 207 years and had other sons and daughters.
  '22':
  - type: text
    content: 'When Serug had lived 30 years, he fathered Nahor. '
  '23':
  - type: text
    content: And Serug lived after he fathered Nahor 200 years and had other sons and daughters.
  '24':
  - type: text
    content: 'When '
  - type: note
    content: Josh. 24:2
  - type: text
    content: 'Nahor had lived 29 years, he fathered Terah. '
  '25':
  - type: text
    content: And Nahor lived after he fathered Terah 119 years and had other sons and daughters.
  '26':
  - type: text
    content: 'When '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: Terah had lived 70 years, he fathered Abram, Nahor, and Haran.
  - type: heading
    content: Terah’s Descendants
  '27':
  - type: text
    content: 'Now these are the generations of Terah. Terah fathered Abram, Nahor, and Haran; and Haran fathered Lot. '
  '28':
  - type: text
    content: 'Haran died in the presence of his father Terah in the land of his kindred, in Ur of the Chaldeans. '
  '29':
  - type: text
    content: 'And Abram and Nahor took wives. The name of Abram’s wife was '
  - type: note
    content: ch. 17:15
  - type: text
    content: 'Sarai, and the name of Nahor’s wife, '
  - type: note
    content: ch. 22:20
  - type: text
    content: 'Milcah, the daughter of Haran the father of Milcah and Iscah. '
  '3':
  - type: text
    content: 'And they said to one another, “Come, let us make bricks, and burn them thoroughly.” And they had brick for stone, '
  - type: note
    content: ch. 14:10; Ex. 2:3
  - type: text
    content: 'and bitumen for mortar. '
  '30':
  - type: text
    content: Now Sarai was barren; she had no child.
  '31':
  - type: text
    content: 'Terah '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'took Abram his son and Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram’s wife, and they went forth together '
  - type: note
    content: ch. 15:7; Josh. 24:2; Neh. 9:7; Acts 7:2, 4
  - type: text
    content: 'from Ur of the Chaldeans to go into the land of Canaan, but when they came to Haran, they settled there. '
  '32':
  - type: text
    content: The days of Terah were 205 years, and Terah died in Haran.
  '4':
  - type: text
    content: 'Then they said, “Come, let us build ourselves a city and a tower '
  - type: note
    content: Deut. 1:28
  - type: text
    content: 'with its top in the heavens, and let us make a name for ourselves, lest we be dispersed over the face of the whole earth.” '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:21
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' came down to see the city and the tower, which the children of man had built. '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Behold, they are one people, and they have all one language, and this is only the beginning of what they will do. And nothing that they propose to do will now be impossible for them. '
  '7':
  - type: text
    content: 'Come, '
  - type: note
    content: ch. 1:26; [Ps. 2:4]
  - type: text
    content: 'let us go down and there confuse their language, so that they may not understand one another’s speech.” '
  '8':
  - type: text
    content: 'So '
  - type: note
    content: ch. 10:25, 32; Luke 1:51
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' dispersed them from there over the face of all the earth, and they left off building the city. '
  '9':
  - type: text
    content: 'Therefore its name was called '
  - type: note
    content: ch. 10:10
  - type: text
    content: 'Babel, because there the '
  - type: text
    content: Lord
  - type: text
    content: ' confused'
  - type: note
    content: Babel sounds like the Hebrew for confused
  - type: text
    content: ' the language of all the earth. And from there the '
  - type: text
    content: Lord
  - type: text
    content: ' dispersed them over the face of all the earth.'
  - type: heading
    content: Shem’s Descendants
