    - type: usfm
      marker: fq
      children:
      - type: text
        text: confused
    marker-yv: yv-n
  - type: text
    text: ' the language of all the earth. And from there the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' dispersed them over the face of all the earth.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shem’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:22
      metadata:
        usfm: GEN.10.22
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']; For ver. 10-26, see 1 Chr. 1:17-27'
    marker-yv: yv-n
  - type: text
    text: 'These are the generations of Shem. When Shem was 100 years old, he fathered Arpachshad two years after the flood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And Shem lived after he fathered Arpachshad 500 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Arpachshad had lived 35 years, he fathered Shelah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And Arpachshad lived after he fathered Shelah 403 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Shelah had lived 30 years, he fathered Eber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And Shelah lived after he fathered Eber 403 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Eber had lived 34 years, he fathered Peleg. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And Eber lived after he fathered Peleg 430 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Peleg had lived 30 years, he fathered Reu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And Peleg lived after he fathered Reu 209 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When Reu had lived 32 years, he fathered Serug. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And Reu lived after he fathered Serug 207 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When Serug had lived 30 years, he fathered Nahor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And Serug lived after he fathered Nahor 200 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 24:2
      metadata:
        usfm: JOS.24.2
    marker-yv: yv-n
  - type: text
    text: 'Nahor had lived 29 years, he fathered Terah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And Nahor lived after he fathered Terah 119 years and had other sons and daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[See ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: GEN.24
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: Terah had lived 70 years, he fathered Abram, Nahor, and Haran.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Terah’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now these are the generations of Terah. Terah fathered Abram, Nahor, and Haran; and Haran fathered Lot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Haran died in the presence of his father Terah in the land of his kindred, in Ur of the Chaldeans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Abram and Nahor took wives. The name of Abram’s wife was '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:15
      metadata:
        usfm: GEN.17.15
    marker-yv: yv-n
  - type: text
    text: 'Sarai, and the name of Nahor’s wife, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:20
      metadata:
        usfm: GEN.22.20
    marker-yv: yv-n
  - type: text
    text: 'Milcah, the daughter of Haran the father of Milcah and Iscah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Now Sarai was barren; she had no child.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Terah '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:1
      metadata:
        usfm: GEN.12.1
    marker-yv: yv-n
  - type: text
    text: 'took Abram his son and Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram’s wife, and they went forth together '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: GEN.15.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 24:2
      metadata:
        usfm: JOS.24.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Neh. 9:7
      metadata:
        usfm: NEH.9.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 7:2
      metadata:
        usfm: ACT.7.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ACT.7.4
    marker-yv: yv-n
  - type: text
    text: 'from Ur of the Chaldeans to go into the land of Canaan, but when they came to Haran, they settled there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The days of Terah were 205 years, and Terah died in Haran.
