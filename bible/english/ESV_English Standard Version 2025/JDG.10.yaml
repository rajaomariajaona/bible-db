      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:16
      marker-yv: yv-n
    - type: text
      text: 'save Israel Tola the son of Puah, son of Dodo, a man of Issachar, and he lived at Shamir in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
