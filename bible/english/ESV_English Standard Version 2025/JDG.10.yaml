document_id: JDG.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola and Jair
  - type: text
    content: 'After Abimelech there arose to '
  - type: note
    content: ver. 12, 13; See ch. 2:16
  - type: text
    content: 'save Israel Tola the son of Puah, son of Dodo, a man of Issachar, and he lived at Shamir in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim. '
  '10':
  - type: text
    content: 'And the people of Israel '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “We have sinned against you, because '
  - type: note
    content: ver. 6, 13
  - type: text
    content: 'we have forsaken our God and have served the Baals.” '
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to the people of Israel, “Did I not save you '
  - type: note
    content: Ex. 14:30
  - type: text
    content: 'from the Egyptians and '
  - type: note
    content: See Num. 21:21-32
  - type: text
    content: 'from the Amorites, '
  - type: note
    content: '[ch. 3:13]'
  - type: text
    content: 'from the Ammonites and '
  - type: note
    content: ch. 3:31
  - type: text
    content: 'from the Philistines? '
  '12':
  - type: text
    content: 'The Sidonians also, and '
  - type: note
    content: '[ch. 3:13; 6:3]'
  - type: text
    content: 'the Amalekites and the Maonites oppressed you, and you cried out to me, and I '
  - type: note
    content: See ch. 2:16
  - type: text
    content: 'saved you out of their hand. '
  '13':
  - type: text
    content: 'Yet you have '
  - type: note
    content: ver. 6, 10; [Deut. 32:15; Jer. 2:13]
  - type: text
    content: 'forsaken me and served other gods; therefore I will save you no more. '
  '14':
  - type: text
    content: 'Go and cry out '
  - type: note
    content: Deut. 32:37, 38
  - type: text
    content: 'to the gods whom you have chosen; let them save you in the time of your distress.” '
  '15':
  - type: text
    content: 'And the people of Israel said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “We have sinned; do to us whatever seems good to you. Only please deliver us this day.” '
  '16':
  - type: text
    content: 'So they put away the foreign gods from among them and served the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ch. 2:18; Isa. 63:9
  - type: text
    content: he became impatient over the misery of Israel.
  '17':
  - type: text
    content: 'Then the Ammonites were called to arms, and they encamped in Gilead. And the people of Israel came together, and they encamped at '
  - type: note
    content: ch. 11:11, 29
  - type: text
    content: 'Mizpah. '
  '18':
  - type: text
    content: 'And the people, the leaders of Gilead, said one to another, “Who is the man who will begin to fight against the Ammonites? '
  - type: note
    content: '[ch. 11:5, 6, 8, 11]'
  - type: text
    content: He shall be head over all the inhabitants of Gilead.”
  '2':
  - type: text
    content: And he judged Israel twenty-three years. Then he died and was buried at Shamir.
  '3':
  - type: text
    content: 'After him arose Jair the Gileadite, who judged Israel twenty-two years. '
  '4':
  - type: text
    content: 'And he had thirty sons who '
  - type: note
    content: ch. 5:10; 12:14
  - type: text
    content: 'rode on thirty donkeys, and they had thirty cities, called Havvoth-jair to this day, '
  - type: note
    content: Deut. 3:14
  - type: text
    content: 'which are in the land of Gilead. '
  '5':
  - type: text
    content: And Jair died and was buried in Kamon.
  - type: heading
    content: Further Disobedience and Oppression
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:11
  - type: text
    content: 'The people of Israel again did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:13
  - type: text
    content: 'and served the Baals and the Ashtaroth, the gods of Syria, '
  - type: note
    content: 1 Kgs. 11:5, 7, 33; 2 Kgs. 23:13
  - type: text
    content: 'the gods of Sidon, the gods of Moab, the gods of the Ammonites, and the gods of the Philistines. And they '
  - type: note
    content: ver. 10, 13; Deut. 31:16
  - type: text
    content: 'forsook the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not serve him. '
  '7':
  - type: text
    content: 'So the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, and '
  - type: note
    content: See ch. 2:14
  - type: text
    content: 'he sold them into the hand of the Philistines and into the hand of the Ammonites, '
  '8':
  - type: text
    content: 'and they crushed and oppressed the people of Israel that year. For eighteen years they oppressed all the people of Israel who were beyond the Jordan in the land of the Amorites, which is in Gilead. '
  '9':
  - type: text
    content: And the Ammonites crossed the Jordan to fight also against Judah and against Benjamin and against the house of Ephraim, so that Israel was severely distressed.
