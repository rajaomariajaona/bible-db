      marker-yv: yv-n
    - type: text
      text: 'the hill country of Ephraim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      marker-yv: yv-n
    - type: text
      text: 'cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “We have sinned against you, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6, 13
      marker-yv: yv-n
    - type: text
      text: 'we have forsaken our God and have served the Baals.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to the people of Israel, “Did I not save you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:30
      marker-yv: yv-n
    - type: text
      text: 'from the Egyptians and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 21:21-32
      marker-yv: yv-n
    - type: text
      text: 'from the Amorites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'from the Ammonites and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:31
      marker-yv: yv-n
    - type: text
      text: 'from the Philistines? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Sidonians also, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the Amalekites and the Maonites oppressed you, and you cried out to me, and I '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:16
      marker-yv: yv-n
    - type: text
      text: 'saved you out of their hand. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet you have '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6, 10
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 32:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 2:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'forsaken me and served other gods; therefore I will save you no more. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go and cry out '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 32:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      marker-yv: yv-n
    - type: text
      text: 'to the gods whom you have chosen; let them save you in the time of your distress.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “We have sinned; do to us whatever seems good to you. Only please deliver us this day.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they put away the foreign gods from among them and served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 63:9
      marker-yv: yv-n
    - type: text
      text: he became impatient over the misery of Israel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Ammonites were called to arms, and they encamped in Gilead. And the people of Israel came together, and they encamped at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      marker-yv: yv-n
    - type: text
      text: 'Mizpah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people, the leaders of Gilead, said one to another, “Who is the man who will begin to fight against the Ammonites? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: He shall be head over all the inhabitants of Gilead.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he judged Israel twenty-three years. Then he died and was buried at Shamir.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him arose Jair the Gileadite, who judged Israel twenty-two years. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he had thirty sons who '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:14
      marker-yv: yv-n
    - type: text
      text: 'rode on thirty donkeys, and they had thirty cities, called Havvoth-jair to this day, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 3:14
      marker-yv: yv-n
    - type: text
      text: 'which are in the land of Gilead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jair died and was buried in Kamon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Further Disobedience and Oppression
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:11
      marker-yv: yv-n
    - type: text
      text: 'The people of Israel again did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:13
      marker-yv: yv-n
    - type: text
      text: 'and served the Baals and the Ashtaroth, the gods of Syria, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 11:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:13
      marker-yv: yv-n
    - type: text
      text: 'the gods of Sidon, the gods of Moab, the gods of the Ammonites, and the gods of the Philistines. And they '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10, 13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 31:16
      marker-yv: yv-n
    - type: text
      text: 'forsook the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and did not serve him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was kindled against Israel, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:14
      marker-yv: yv-n
    - type: text
      text: 'he sold them into the hand of the Philistines and into the hand of the Ammonites, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they crushed and oppressed the people of Israel that year. For eighteen years they oppressed all the people of Israel who were beyond the Jordan in the land of the Amorites, which is in Gilead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the Ammonites crossed the Jordan to fight also against Judah and against Benjamin and against the house of Ephraim, so that Israel was severely distressed.
