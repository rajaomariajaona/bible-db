verses:
  '1':
  - type: heading
    content: Jeremiah’s Complaint
  - type: text
    content: ' '
  - type: note
    content: Ezra 9:15; Ps. 51:4; Lam. 1:18; Dan. 9:7
  - type: text
    content: 'Righteous are you, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when I complain to you;
  - type: text
    content: yet I would plead my case before you.
  - type: note
    content: Job 12:6; Ps. 37:1, 7; 92:7; Hab. 1:13; Mal. 3:15; See Job 21:7-15; Ps. 73:3-12
  - type: text
    content: Why does the way of the wicked prosper?
  - type: text
    content: 'Why do all '
  - type: note
    content: '[Isa. 21:2]'
  - type: text
    content: who are treacherous thrive?
  '10':
  - type: text
    content: Many shepherds have destroyed my vineyard;
  - type: note
    content: Isa. 63:18
  - type: text
    content: they have trampled down my portion;
  - type: text
    content: they have made my pleasant portion
  - type: text
    content: a desolate wilderness.
  '11':
  - type: text
    content: They have made it a desolation;
  - type: text
    content: 'desolate, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: it mourns to me.
  - type: text
    content: The whole land is made desolate,
  - type: note
    content: Isa. 42:25
  - type: text
    content: but no man lays it to heart.
  '12':
  - type: text
    content: Upon all the bare heights in the desert
  - type: text
    content: destroyers have come,
  - type: text
    content: 'for the sword of the '
  - type: text
    content: Lord
  - type: text
    content: ' devours'
  - type: text
    content: from one end of the land to the other;
  - type: text
    content: no flesh has peace.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 26:16; Deut. 28:38; Mic. 6:15; Hag. 1:6 ]'
  - type: text
    content: They have sown wheat and have reaped thorns;
  - type: note
    content: Isa. 55:2; Hab. 2:13
  - type: text
    content: they have tired themselves out but profit nothing.
  - type: text
    content: They shall be ashamed of their
  - type: note
    content: Hebrew your
  - type: text
    content: ' harvests'
  - type: note
    content: ch. 4:8, 26; 25:37, 38; 30:24; 49:37; 51:45; Lam. 1:12; 4:11
  - type: text
    content: 'because of the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '14':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning all '
  - type: note
    content: '[Ps. 137:7]; See Ezek. 25'
  - type: text
    content: 'my evil neighbors '
  - type: note
    content: Zech. 2:8
  - type: text
    content: 'who touch the heritage that '
  - type: note
    content: ch. 3:18
  - type: text
    content: 'I have given my people Israel to inherit: “Behold, I will pluck them up from their land, and I will pluck up the house of Judah from among them. '
  '15':
  - type: text
    content: 'And after I have plucked them up, I will again have compassion on them, '
  - type: note
    content: ch. 48:47; 49:6
  - type: text
    content: 'and I will bring them again each to his heritage and each to his land. '
  '16':
  - type: text
    content: 'And it shall come to pass, if they will diligently learn the ways of my people, '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'to swear by my name, ‘As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’ even as they taught my people to swear by Baal, '
  - type: note
    content: ch. 24:6; [1 Pet. 2:5]
  - type: text
    content: 'then they shall be built up in the midst of my people. '
  '17':
  - type: note
    content: '[Isa. 60:12]'
  - type: text
    content: 'But if any nation will not listen, then I will utterly pluck it up and destroy it, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: You plant them, and they take root;
  - type: text
    content: they grow and produce fruit;
  - type: note
    content: Isa. 29:13
  - type: text
    content: you are near in their mouth
  - type: text
    content: and far from their heart.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:15; Ps. 139:1
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', know me;'
  - type: note
    content: Ps. 17:3
  - type: text
    content: you see me, and test my heart toward you.
  - type: note
    content: '[ 2 Pet. 2:12 ]'
  - type: text
    content: Pull them out like sheep for the slaughter,
  - type: text
    content: 'and set them apart for '
  - type: note
    content: James 5:5
  - type: text
    content: the day of slaughter.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ver. 11 ; ch. 9:10; 23:10
  - type: text
    content: How long will the land mourn
  - type: text
    content: and the grass of every field wither?
  - type: note
    content: Ps. 107:34
  - type: text
    content: For the evil of those who dwell in it
  - type: note
    content: ch. 4:25; 7:20; 9:10; Hos. 4:3; [ Rom. 8:22 ]
  - type: text
    content: the beasts and the birds are swept away,
  - type: text
    content: because they said, “He will not see our latter end.”
  - type: heading
    content: The Lord Answers Jeremiah
  '5':
  - type: text
    content: “If you have raced with men on foot, and they have wearied you,
  - type: text
    content: how will you compete with horses?
  - type: text
    content: And if in a safe land you are so trusting,
  - type: text
    content: 'what will you do in '
  - type: note
    content: ch. 49:19; 50:44; Zech. 11:3; [Josh. 3:15]
  - type: text
    content: the thicket of the Jordan?
  '6':
  - type: text
    content: 'For '
  - type: note
    content: ch. 9:4; [ch. 11:19, 21]
  - type: text
    content: even your brothers and the house of your father,
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: even they have dealt treacherously with you;
  - type: text
    content: they are in full cry after you;
  - type: note
    content: Prov. 26:25
  - type: text
    content: do not believe them,
  - type: text
    content: though they speak friendly words to you.”
  '7':
  - type: text
    content: “I have forsaken my house;
  - type: text
    content: 'I have abandoned '
  - type: note
    content: Isa. 19:25
  - type: text
    content: my heritage;
  - type: text
    content: 'I have given '
  - type: note
    content: ch. 11:15
  - type: text
    content: the beloved of my soul
  - type: text
    content: into the hands of her enemies.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: My heritage has become to me
  - type: text
    content: like a lion in the forest;
  - type: text
    content: she has lifted up her voice against me;
  - type: text
    content: therefore I hate her.
  '9':
  - type: text
    content: 'Is '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'my heritage to me like '
  - type: note
    content: Isa. 46:11
  - type: text
    content: a hyena’s lair?
  - type: text
    content: 'Are the '
  - type: note
    content: Isa. 46:11
  - type: text
    content: birds of prey against her all around?
  - type: text
    content: 'Go, '
  - type: note
    content: ch. 7:33; Isa. 56:9; [Ezek. 39:17; Rev. 19:17]
  - type: text
    content: assemble all the wild beasts;
  - type: text
    content: bring them to devour.
