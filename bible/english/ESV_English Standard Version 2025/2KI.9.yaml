document_id: 2KI.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu Anointed King of Israel
  - type: text
    content: 'Then Elisha the prophet called one of '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'the sons of the prophets and said to him, '
  - type: note
    content: See 1 Kgs. 18:46
  - type: text
    content: '“Tie up your garments, and take this '
  - type: note
    content: 1 Sam. 10:1
  - type: text
    content: 'flask of oil in your hand, and go to '
  - type: note
    content: ch. 8:28; [1 Kgs. 22:3]
  - type: text
    content: 'Ramoth-gilead. '
  '10':
  - type: note
    content: ver. 35, 36; 1 Kgs. 21:23
  - type: text
    content: And the dogs shall eat Jezebel in the territory of Jezreel, and none shall bury her.” Then he opened the door and fled.
  '11':
  - type: text
    content: 'When Jehu came out to the servants of his master, they said to him, '
  - type: note
    content: ch. 5:21
  - type: text
    content: '“Is all well? Why did '
  - type: note
    content: Jer. 29:26; Hos. 9:7; [John 10:20; Acts 26:24]
  - type: text
    content: 'this mad fellow come to you?” And he said to them, “You know the fellow and his talk.” '
  '12':
  - type: text
    content: 'And they said, “That is not true; tell us now.” And he said, “Thus and so he spoke to me, saying, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', I anoint you king over Israel.’” '
  '13':
  - type: text
    content: 'Then in haste '
  - type: note
    content: '[Matt. 21:8; Mark 11:8]'
  - type: text
    content: every man of them took his garment and put it under him on the bare
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' steps, and they blew the trumpet and proclaimed, '
  - type: note
    content: '[1 Kgs. 1:34]'
  - type: text
    content: “Jehu is king.”
  - type: heading
    content: Jehu Assassinates Joram and Ahaziah
  '14':
  - type: text
    content: Thus Jehu the son of Jehoshaphat the son of Nimshi conspired against Joram. (
  - type: note
    content: '[ch. 8:28]'
  - type: text
    content: 'Now Joram with all Israel had been on guard at Ramoth-gilead against '
  - type: note
    content: '[1 Kgs. 19:17]'
  - type: text
    content: 'Hazael king of Syria, '
  '15':
  - type: note
    content: ch. 8:29
  - type: text
    content: 'but King Joram had returned to be healed in Jezreel of the wounds that the Syrians had given him, when he fought with Hazael king of Syria.) So Jehu said, “If this is your decision, then let no one slip out of the city to go and tell the news in Jezreel.” '
  '16':
  - type: text
    content: Then Jehu mounted his chariot and went to Jezreel, for Joram lay there. And Ahaziah king of Judah had come down to visit Joram.
  '17':
  - type: text
    content: 'Now the watchman was standing on the tower in Jezreel, and he saw the company of Jehu as he came and said, “I see a company.” And Joram said, “Take a horseman and send to meet them, and let him say, ‘Is it peace?’” '
  '18':
  - type: text
    content: 'So a man on horseback went to meet him and said, “Thus says the king, ‘Is it peace?’” And Jehu said, “What do you have to do with peace? Turn around and ride behind me.” And the watchman reported, saying, “The messenger reached them, but he is not coming back.” '
  '19':
  - type: text
    content: 'Then he sent out a second horseman, who came to them and said, “Thus the king has said, ‘Is it peace?’” And Jehu answered, “What do you have to do with peace? Turn around and ride behind me.” '
  '2':
  - type: text
    content: 'And when you arrive, look there for Jehu '
  - type: note
    content: ver. 14; [ver. 20; 1 Kgs. 19:16]
  - type: text
    content: 'the son of Jehoshaphat, son of Nimshi. And go in and have him rise from among '
  - type: note
    content: '[ver. 5, 11]'
  - type: text
    content: 'his fellows, and lead him to an inner chamber. '
  '20':
  - type: text
    content: 'Again the watchman reported, “He reached them, but he is not coming back. And the driving '
  - type: note
    content: '[2 Sam. 18:27]'
  - type: text
    content: 'is like the driving of Jehu '
  - type: note
    content: 1 Kgs. 19:17; [ver. 2, 14]
  - type: text
    content: the son of Nimshi, for he drives furiously.”
  '21':
  - type: text
    content: 'Joram said, '
  - type: note
    content: 1 Kgs. 18:44
  - type: text
    content: '“Make ready.” And they made ready his chariot. '
  - type: note
    content: 2 Chr. 22:7
  - type: text
    content: 'Then Joram king of Israel and Ahaziah king of Judah set out, each in his chariot, and went to meet Jehu, and met him '
  - type: note
    content: 1 Kgs. 21:1; [ver. 26]
  - type: text
    content: 'at the property of Naboth the Jezreelite. '
  '22':
  - type: text
    content: 'And when Joram saw Jehu, he said, “Is it peace, Jehu?” He answered, “What peace can there be, so long as '
  - type: note
    content: '[2 Chr. 21:13]'
  - type: text
    content: 'the whorings and the sorceries of your mother Jezebel are so many?” '
  '23':
  - type: text
    content: 'Then Joram reined about and fled, saying to Ahaziah, “Treachery, O Ahaziah!” '
  '24':
  - type: text
    content: 'And Jehu drew his bow with his full strength, and shot Joram between the shoulders, so that the arrow pierced his heart, and he sank in his chariot. '
  '25':
  - type: text
    content: 'Jehu said to Bidkar '
  - type: note
    content: '[ch. 7:2]'
  - type: text
    content: 'his aide, “Take him up and throw him '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'on the plot of ground belonging to Naboth the Jezreelite. For remember, when you and I rode side by side behind Ahab his father, how '
  - type: note
    content: 1 Kgs. 21:19, 29
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' made this '
  - type: note
    content: See Isa. 13:1
  - type: text
    content: 'pronouncement against him: '
  '26':
  - type: text
    content: '‘As surely as I saw yesterday the blood of Naboth and the blood of his sons—declares the '
  - type: text
    content: Lord
  - type: text
    content: '—I will repay you on this plot of ground.’ Now therefore take him up and throw him on the plot of ground, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Chr. 22:9 ]'
  - type: text
    content: When Ahaziah the king of Judah saw this, he fled in the direction of Beth-haggan. And Jehu pursued him and said, “Shoot him also.” And they shot him
  - type: note
    content: Syriac, Vulgate (compare Septuagint); Hebrew lacks and they shot him
  - type: text
    content: ' in the chariot at the ascent of Gur, which is by '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Ibleam. And he fled to '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Megiddo and died there. '
  '28':
  - type: note
    content: '[ch. 23:30; 2 Chr. 35:24]'
  - type: text
    content: His servants carried him in a chariot to Jerusalem, and buried him in his tomb with his fathers in the city of David.
  '29':
  - type: text
    content: 'In the '
  - type: note
    content: '[ch. 8:25]'
  - type: text
    content: eleventh year of Joram the son of Ahab, Ahaziah began to reign over Judah.
  - type: heading
    content: Jehu Executes Jezebel
  '3':
  - type: text
    content: 'Then take the flask of oil and pour it on his head and say, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[1 Kgs. 19:16; 2 Chr. 22:7]'
  - type: text
    content: I anoint you king over Israel.’ Then open the door and flee; do not linger.”
  '30':
  - type: text
    content: 'When Jehu came to Jezreel, Jezebel heard of it. And '
  - type: note
    content: '[Jer. 4:30; Ezek. 23:40]'
  - type: text
    content: 'she painted her eyes and adorned her head and looked out of the window. '
  '31':
  - type: text
    content: 'And as Jehu entered the gate, she said, '
  - type: note
    content: See 1 Kgs. 16:9-20
  - type: text
    content: '“Is it peace, you Zimri, murderer of your master?” '
  '32':
  - type: text
    content: 'And he lifted up his face to the window and said, “Who is on my side? Who?” Two or three eunuchs looked out at him. '
  '33':
  - type: text
    content: 'He said, “Throw her down.” So they threw her down. And some of her blood spattered on the wall and on the horses, and they trampled on her. '
  '34':
  - type: text
    content: 'Then he went in and ate and drank. And he said, “See now to this cursed woman and bury her, '
  - type: note
    content: 1 Kgs. 16:31
  - type: text
    content: 'for she is a king’s daughter.” '
  '35':
  - type: text
    content: 'But when they went to bury her, they found no more of her than the skull and the feet and the palms of her hands. '
  '36':
  - type: text
    content: 'When they came back and told him, he said, “This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he spoke by his servant Elijah the Tishbite: '
  - type: note
    content: 1 Kgs. 21:23
  - type: text
    content: '‘In the territory of Jezreel the dogs shall eat the flesh of Jezebel, '
  '37':
  - type: text
    content: 'and the corpse of Jezebel shall be '
  - type: note
    content: '[Ps. 83:10; Jer. 8:2; 9:22; 16:4; 25:33]'
  - type: text
    content: as dung on the face of the field in the territory of Jezreel, so that no one can say, This is Jezebel.’”
  '4':
  - type: text
    content: 'So the young man, the servant of the prophet, went to Ramoth-gilead. '
  '5':
  - type: text
    content: 'And when he came, behold, the commanders of the army were in council. And he said, “I have a word for you, O commander.” And Jehu said, “To which of us all?” And he said, “To you, O commander.” '
  '6':
  - type: text
    content: 'So he arose and went into the house. And the young man poured the oil on his head, saying to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'I anoint you king over the people of the '
  - type: text
    content: Lord
  - type: text
    content: ', over Israel. '
  '7':
  - type: text
    content: 'And you shall strike down the house of Ahab your master, so that I may avenge '
  - type: note
    content: '[1 Kgs. 18:4]; See 1 Kgs. 21:5-15'
  - type: text
    content: 'on Jezebel the blood of my servants the prophets, and the blood of all the servants of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'For the whole house of Ahab shall perish, '
  - type: note
    content: ch. 10:17; 1 Kgs. 21:21; [1 Kgs. 14:10]
  - type: text
    content: 'and I will cut off from Ahab '
  - type: note
    content: See 1 Sam. 25:22
  - type: text
    content: 'every male, '
  - type: note
    content: Deut. 32:36
  - type: text
    content: 'bond or free, in Israel. '
  '9':
  - type: text
    content: 'And I will make the house of Ahab like '
  - type: note
    content: 1 Kgs. 14:10; 15:29; 21:22
  - type: text
    content: 'the house of Jeroboam the son of Nebat, and like '
  - type: note
    content: 1 Kgs. 16:3, 11; 21:22
  - type: text
    content: 'the house of Baasha the son of Ahijah. '
