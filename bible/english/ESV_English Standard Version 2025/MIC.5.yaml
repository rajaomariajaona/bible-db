document_id: MIC.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ruler to Be Born in Bethlehem
  - type: text
    content: ' '
  - type: note
    content: Ch 4:14 in Hebrew
  - type: text
    content: Now muster your troops, O daughter
  - type: note
    content: That is, city
  - type: text
    content: ' of troops;'
  - type: text
    content: siege is laid against us;
  - type: text
    content: 'with a rod '
  - type: note
    content: See 1 Kgs. 22:24
  - type: text
    content: they strike the judge of Israel
  - type: text
    content: on the cheek.
  '10':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 4:1, 6]'
  - type: text
    content: 'in that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Zech. 9:10; [ Isa. 2:7; Hag. 2:22 ]
  - type: text
    content: I will cut off your horses from among you
  - type: text
    content: and will destroy your chariots;
  '11':
  - type: text
    content: ' '
  - type: note
    content: ver. 14 ; Isa. 17:9; 27:10; [Hos. 8:14; Zech. 2:4]
  - type: text
    content: and I will cut off the cities of your land
  - type: text
    content: and throw down all your strongholds;
  '12':
  - type: text
    content: 'and I will cut off '
  - type: note
    content: '[2 Kgs. 9:22]'
  - type: text
    content: sorceries from your hand,
  - type: text
    content: 'and '
  - type: note
    content: Deut. 18:10; [Isa. 2:6]
  - type: text
    content: you shall have no more tellers of fortunes;
  '13':
  - type: text
    content: 'and '
  - type: note
    content: Zech. 13:2
  - type: text
    content: I will cut off your carved images
  - type: text
    content: 'and '
  - type: note
    content: Hos. 3:4
  - type: text
    content: your pillars from among you,
  - type: note
    content: '[ Isa. 17:8 ]'
  - type: text
    content: and you shall bow down no more
  - type: text
    content: to the work of your hands;
  '14':
  - type: text
    content: 'and I will root out your '
  - type: note
    content: Ex. 34:13; See Deut. 16:21
  - type: text
    content: Asherah images from among you
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: and destroy your cities.
  '15':
  - type: text
    content: 'And in anger and wrath '
  - type: note
    content: '[ver. 8; Ps. 149:7; 2 Thess. 1:8]'
  - type: text
    content: I will execute vengeance
  - type: text
    content: on the nations that did not obey.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 5:1 in Hebrew
  - type: note
    content: Cited Matt. 2:6; [John 7:42]
  - type: text
    content: But you, O Bethlehem Ephrathah,
  - type: text
    content: 'who are too little to be among the clans of '
  - type: note
    content: '[Heb. 7:14]'
  - type: text
    content: Judah,
  - type: text
    content: from you shall come forth for me
  - type: text
    content: 'one who is to be '
  - type: note
    content: '[Gen. 49:10; Isa. 9:6, 7; Jer. 30:21; Zech. 9:9]'
  - type: text
    content: ruler in Israel,
  - type: note
    content: Hos. 6:3
  - type: text
    content: 'whose coming forth is '
  - type: note
    content: Ps. 90:2; [Prov. 8:22, 23; John 1:1]
  - type: text
    content: from of old,
  - type: text
    content: from ancient days.
  '3':
  - type: text
    content: 'Therefore he shall give them up '
  - type: note
    content: '[ch. 4:9, 10]'
  - type: text
    content: until the time
  - type: text
    content: when she who is in labor has given birth;
  - type: text
    content: 'then '
  - type: note
    content: '[ch. 4:7]'
  - type: text
    content: the rest of his brothers shall return
  - type: text
    content: to the people of Israel.
  '4':
  - type: text
    content: 'And he shall stand '
  - type: note
    content: Isa. 40:11; [ch. 7:14]
  - type: text
    content: 'and shepherd his flock '
  - type: note
    content: See Isa. 11:3-5
  - type: text
    content: 'in the strength of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'in the majesty of the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  - type: text
    content: 'And they shall dwell secure, for now '
  - type: note
    content: Ps. 72:8; Isa. 52:13; Luke 1:32
  - type: text
    content: he shall be great
  - type: text
    content: to the ends of the earth.
  '5':
  - type: text
    content: 'And he shall be '
  - type: note
    content: '[Isa. 9:6; Zech. 9:10; Eph. 2:14]'
  - type: text
    content: their peace.
  - type: note
    content: '[ 2 Kgs. 18:13 ]'
  - type: text
    content: When the Assyrian comes into our land
  - type: text
    content: and treads in our palaces,
  - type: text
    content: 'then we will raise against him seven '
  - type: note
    content: '[Isa. 3:2, 3]'
  - type: text
    content: shepherds
  - type: text
    content: and eight princes of men;
  '6':
  - type: text
    content: they shall shepherd the land of Assyria with the sword,
  - type: text
    content: 'and the land of '
  - type: note
    content: Gen. 10:8, 10, 11
  - type: text
    content: Nimrod at its entrances;
  - type: text
    content: and he shall deliver us from the Assyrian
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: when he comes into our land
  - type: text
    content: and treads within our border.
  - type: heading
    content: A Remnant Shall Be Delivered
  '7':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: the remnant of Jacob shall be
  - type: text
    content: in the midst of many peoples
  - type: text
    content: 'like dew from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: like showers on the grass,
  - type: text
    content: which delay not for a man
  - type: text
    content: nor wait for the children of man.
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: the remnant of Jacob shall be among the nations,
  - type: text
    content: in the midst of many peoples,
  - type: text
    content: like a lion among the beasts of the forest,
  - type: text
    content: like a young lion among the flocks of sheep,
  - type: note
    content: '[ Hos. 5:14 ]'
  - type: text
    content: which, when it goes through, treads down
  - type: text
    content: and tears in pieces, and there is none to deliver.
  '9':
  - type: text
    content: 'Your hand shall '
  - type: note
    content: Isa. 26:11
  - type: text
    content: be lifted up over your adversaries,
  - type: text
    content: and all your enemies shall be cut off.
