document_id: ZEC.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of a Man with a Measuring Line
  - type: text
    content: ' '
  - type: note
    content: Ch 2:5 in Hebrew
  - type: text
    content: 'And I lifted my eyes and saw, and behold, '
  - type: note
    content: Ezek. 40:3; Rev. 11:1
  - type: text
    content: 'a man with a measuring line in his hand! '
  '10':
  - type: note
    content: See Zeph. 3:14
  - type: text
    content: 'Sing and rejoice, O daughter of Zion, for '
  - type: note
    content: Ps. 40:7
  - type: text
    content: 'behold, I come '
  - type: note
    content: ch. 8:3; Isa. 12:6; Ezek. 37:27; Zeph. 3:15; 2 Cor. 6:16; See Lev. 26:12
  - type: text
    content: 'and I will dwell in your midst, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: note
    content: ch. 8:22; See Isa. 2:2
  - type: text
    content: 'And many nations shall join themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' in that day, and shall be my people. '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'And I will dwell in your midst, and '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'you shall know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has sent me to you. '
  '12':
  - type: note
    content: See Deut. 32:9
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will inherit Judah as his portion in the holy land, and will again '
  - type: note
    content: ch. 1:17; [Hab. 2:20]
  - type: text
    content: choose Jerusalem.”
  '13':
  - type: text
    content: 'Be silent, all flesh, before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has roused himself from his holy dwelling.'
  '2':
  - type: text
    content: 'Then I said, “Where are you going?” And he said to me, '
  - type: note
    content: '[ch. 1:16]'
  - type: text
    content: '“To measure Jerusalem, to see what is its width and what is its length.” '
  '3':
  - type: text
    content: 'And behold, '
  - type: note
    content: ch. 1:9, 19
  - type: text
    content: 'the angel who talked with me came forward, and another angel came forward to meet him '
  '4':
  - type: text
    content: 'and said to him, “Run, say to that young man, '
  - type: note
    content: '[ch. 12:6; 14:10, 11]'
  - type: text
    content: '‘Jerusalem shall be inhabited '
  - type: note
    content: See Esth. 9:19
  - type: text
    content: 'as villages without walls, because of '
  - type: note
    content: Isa. 49:19; Jer. 31:27
  - type: text
    content: 'the multitude of people and livestock in it. '
  '5':
  - type: text
    content: 'And I will be to her '
  - type: note
    content: Isa. 4:5; [ch. 9:8; Ps. 125:2]
  - type: text
    content: 'a wall of fire all around, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and I will be the glory in her midst.’”'
  '6':
  - type: text
    content: 'Up! Up! '
  - type: note
    content: Isa. 48:20
  - type: text
    content: 'Flee from the land of the north, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. For I have '
  - type: note
    content: '[ch. 7:14; Ezek. 5:10; 17:21]'
  - type: text
    content: 'spread you abroad as the four winds of the heavens, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: note
    content: '[Isa. 52:11]'
  - type: text
    content: 'Up! Escape to Zion, you who dwell with the daughter of Babylon. '
  '8':
  - type: text
    content: 'For thus said the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, after his glory sent me'
  - type: note
    content: Or he sent me after glory
  - type: text
    content: ' to the nations who plundered you, '
  - type: note
    content: Jer. 12:14
  - type: text
    content: 'for he who touches you touches '
  - type: note
    content: See Deut. 32:10
  - type: text
    content: 'the apple of his eye: '
  '9':
  - type: text
    content: '“Behold, '
  - type: note
    content: Isa. 11:15; 19:16
  - type: text
    content: 'I will shake my hand over them, '
  - type: note
    content: Ezek. 39:10
  - type: text
    content: 'and they shall become plunder for those who served them. Then '
  - type: note
    content: ch. 4:9; 6:15; Ezek. 33:33
  - type: text
    content: 'you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has sent me. '
