document_id: 1CO.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: See Rom. 1:1
  - type: text
    content: 'called '
  - type: note
    content: 2 Cor. 1:1; Eph. 1:1; Col. 1:1; 2 Tim. 1:1
  - type: text
    content: by the will of God to be an apostle of Christ Jesus, and our brother Sosthenes,
  '10':
  - type: text
    content: I appeal to you, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verses 11, 26
  - type: text
    content: ' by the name of our Lord Jesus Christ, that all of you agree, and that there be no '
  - type: note
    content: ch. 11:18
  - type: text
    content: 'divisions among you, but that you be united '
  - type: note
    content: '[Phil. 1:27]'
  - type: text
    content: 'in the same mind and the same judgment. '
  '11':
  - type: text
    content: 'For it has been reported to me by Chloe’s people that there is '
  - type: note
    content: ch. 3:3
  - type: text
    content: 'quarreling among you, my brothers. '
  '12':
  - type: text
    content: 'What I mean is that '
  - type: note
    content: ch. 3:4; [Matt. 23:9, 10]
  - type: text
    content: 'each one of you says, “I follow Paul,” or “I follow '
  - type: note
    content: See Acts 18:24
  - type: text
    content: 'Apollos,” or “I follow '
  - type: note
    content: See John 1:42
  - type: text
    content: 'Cephas,” or “I follow Christ.” '
  '13':
  - type: note
    content: '[ch. 12:5; 2 Cor. 11:4; Eph. 4:5]'
  - type: text
    content: 'Is Christ divided? Was Paul crucified for you? Or were you '
  - type: note
    content: See Acts 8:16
  - type: text
    content: 'baptized in the name of Paul? '
  '14':
  - type: text
    content: 'I thank God that I baptized none of you except '
  - type: note
    content: Acts 18:8
  - type: text
    content: 'Crispus and '
  - type: note
    content: See Rom. 16:23
  - type: text
    content: 'Gaius, '
  '15':
  - type: text
    content: 'so that no one may say that you were baptized in my name. '
  '16':
  - type: text
    content: '(I did baptize also '
  - type: note
    content: ch. 16:15, 17
  - type: text
    content: 'the household of Stephanas. Beyond that, I do not know whether I baptized anyone else.) '
  '17':
  - type: text
    content: 'For Christ did not send me to baptize but to preach the gospel, and '
  - type: note
    content: ch. 2:1, 4, 13; [2 Cor. 10:10; 11:6; 2 Pet. 1:16]
  - type: text
    content: not with words of eloquent wisdom, lest the cross of Christ be emptied of its power.
  - type: heading
    content: Christ the Wisdom and Power of God
  '18':
  - type: text
    content: 'For the word of the cross is '
  - type: note
    content: ver. 21, 23, 25; ch. 2:14
  - type: text
    content: 'folly to '
  - type: note
    content: 2 Cor. 2:15; 4:3; 2 Thess. 2:10
  - type: text
    content: 'those who are perishing, but to us '
  - type: note
    content: ch. 15:2; [Acts 2:47]
  - type: text
    content: 'who are being saved it is '
  - type: note
    content: Rom. 1:16; [ver. 24]
  - type: text
    content: 'the power of God. '
  '19':
  - type: text
    content: For it is written,
  - type: note
    content: Cited from Isa. 29:14; [ Job 5:12, 13; Jer. 8:9; Matt. 11:25 ]
  - type: text
    content: “I will destroy the wisdom of the wise,
  - type: text
    content: and the discernment of the discerning I will thwart.”
  '2':
  - type: text
    content: 'To the church of God that is in Corinth, to those '
  - type: note
    content: ch. 6:11; [ver. 30]; See John 17:19
  - type: text
    content: 'sanctified in Christ Jesus, '
  - type: note
    content: See Rom. 1:7
  - type: text
    content: 'called to be saints together with all those who in every place '
  - type: note
    content: See Acts 9:14
  - type: text
    content: 'call upon the name of our Lord Jesus Christ, both their Lord and ours:'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 19:12
  - type: text
    content: 'Where is the one who is wise? Where is the scribe? Where is the debater of this age? '
  - type: note
    content: ch. 2:6; 3:19; Isa. 44:25; Rom. 1:22; [ver. 26]
  - type: text
    content: 'Has not God made foolish the wisdom of the world? '
  '21':
  - type: text
    content: For since, in the wisdom of God, the world did not know God through wisdom, it pleased God through the folly of what we preach
  - type: note
    content: Or the folly of preaching
  - type: text
    content: ' to save those who believe. '
  '22':
  - type: text
    content: 'For '
  - type: note
    content: See Matt. 12:38
  - type: text
    content: 'Jews demand signs and Greeks seek wisdom, '
  '23':
  - type: text
    content: 'but we preach Christ '
  - type: note
    content: Gal. 5:11; See 1 Pet. 2:8
  - type: text
    content: 'crucified, a stumbling block to Jews and folly to Gentiles, '
  '24':
  - type: text
    content: 'but to those who are called, both Jews and Greeks, Christ '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'the power of God and '
  - type: note
    content: ver. 30; Col. 2:3; [Luke 11:49]
  - type: text
    content: 'the wisdom of God. '
  '25':
  - type: text
    content: For the foolishness of God is wiser than men, and the weakness of God is stronger than men.
  '26':
  - type: text
    content: 'For consider your calling, brothers: '
  - type: note
    content: ch. 2:8; John 7:48; [ver. 20]; See Matt. 11:25
  - type: text
    content: not many of you were wise according to worldly standards,
  - type: note
    content: Greek according to the flesh
  - type: text
    content: ' not many were powerful, not many were of noble birth. '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: James 2:5
  - type: text
    content: 'God chose what is foolish in the world to shame the wise; '
  - type: note
    content: Ps. 8:2
  - type: text
    content: 'God chose what is weak in the world to shame the strong; '
  '28':
  - type: text
    content: 'God chose what is low and despised in the world, even '
  - type: note
    content: Rom. 4:17
  - type: text
    content: 'things that are not, to '
  - type: note
    content: ch. 2:6; [Job 34:19, 24]
  - type: text
    content: 'bring to nothing things that are, '
  '29':
  - type: text
    content: 'so '
  - type: note
    content: Eph. 2:9; [Judg. 7:2]
  - type: text
    content: that no human being
  - type: note
    content: Greek no flesh
  - type: text
    content: ' might boast in the presence of God. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Thanksgiving
  '30':
  - type: text
    content: And because of him
  - type: note
    content: Greek And from him
  - type: text
    content: ' you are in Christ Jesus, who became to us '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'wisdom from God, '
  - type: note
    content: Jer. 23:5, 6; 33:16; 2 Cor. 5:21; Phil. 3:9
  - type: text
    content: 'righteousness and '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'sanctification and '
  - type: note
    content: Eph. 1:7; Col. 1:14; [Rom. 3:24]
  - type: text
    content: 'redemption, '
  '31':
  - type: text
    content: 'so that, as it is written, '
  - type: note
    content: 2 Cor. 10:17; [Jer. 9:23, 24]
  - type: text
    content: “Let the one who boasts, boast in the Lord.”
  '4':
  - type: text
    content: 'I '
  - type: note
    content: See Rom. 1:8
  - type: text
    content: 'give thanks to my God always for you because of the grace of God that was given you in Christ Jesus, '
  '5':
  - type: text
    content: 'that in every way '
  - type: note
    content: 2 Cor. 9:11; [2 Cor. 6:10]
  - type: text
    content: 'you were enriched in him in all '
  - type: note
    content: 2 Cor. 8:7; [ch. 12:8]; See Rom. 15:14; 1 John 2:20
  - type: text
    content: 'speech and all knowledge— '
  '6':
  - type: text
    content: 'even as '
  - type: note
    content: 2 Tim. 1:8; [2 Thess. 1:10; 1 Tim. 2:6; Rev. 1:2]
  - type: text
    content: 'the testimony about Christ was confirmed among you— '
  '7':
  - type: text
    content: 'so that you are not lacking in any gift, as you '
  - type: note
    content: Rom. 8:19; Phil. 3:20; Heb. 9:28; See Luke 17:30; 2 Pet. 3:12
  - type: text
    content: 'wait for the revealing of our Lord Jesus Christ, '
  '8':
  - type: note
    content: '[Phil. 1:6; 1 Thess. 3:13]'
  - type: text
    content: 'who will sustain you to the end, '
  - type: note
    content: Col. 1:22
  - type: text
    content: 'guiltless '
  - type: note
    content: ch. 5:5; 2 Cor. 1:14; Phil. 2:16; [Luke 17:24]
  - type: text
    content: 'in the day of our Lord Jesus Christ. '
  '9':
  - type: note
    content: ch. 10:13; Deut. 7:9; Isa. 49:7; 2 Cor. 1:18
  - type: text
    content: 'God is faithful, by whom you were called into the '
  - type: note
    content: 1 John 1:3
  - type: text
    content: fellowship of his Son, Jesus Christ our Lord.
  - type: heading
    content: Divisions in the Church
