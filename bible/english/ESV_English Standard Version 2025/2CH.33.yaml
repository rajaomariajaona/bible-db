      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'I will put my name forever, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will no more remove the foot of Israel from the land '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 7:10
      marker-yv: yv-n
    - type: text
      text: 'that I appointed for your fathers, if only they will be careful to do all that I have commanded them, all the law, the statutes, and the rules given through Moses.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh led Judah and the inhabitants of Jerusalem astray, to do more evil than the nations whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
