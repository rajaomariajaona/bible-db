    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 21-25, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 21:19-24
      marker-yv: yv-n
    - type: text
      text: 'Amon was twenty-two years old when he began to reign, and he reigned two years in Jerusalem. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
