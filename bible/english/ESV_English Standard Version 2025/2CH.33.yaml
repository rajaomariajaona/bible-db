document_id: 2CH.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see 2 Kgs. 21:1-9
  - type: text
    content: 'Manasseh was twelve years old when he began to reign, and he reigned fifty-five years in Jerusalem. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Manasseh and to his people, but they paid no attention. '
  '11':
  - type: note
    content: '[Deut. 28:36]'
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' brought upon them the commanders of the army of the king of Assyria, who captured Manasseh with hooks and '
  - type: note
    content: '[ch. 36:6; Judg. 16:21]'
  - type: text
    content: 'bound him with chains of bronze and brought him to Babylon. '
  '12':
  - type: text
    content: 'And when he was in distress, he entreated the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God '
  - type: note
    content: '[ch. 32:26]'
  - type: text
    content: 'and humbled himself greatly before the God of his fathers. '
  '13':
  - type: text
    content: 'He prayed to him, and '
  - type: note
    content: 1 Chr. 5:20; Ezra 8:23
  - type: text
    content: 'God was moved by his entreaty and heard his plea and brought him again to Jerusalem into his kingdom. '
  - type: note
    content: '[Dan. 4:25]'
  - type: text
    content: 'Then Manasseh knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' was God.'
  '14':
  - type: text
    content: 'Afterward he built an outer wall for the city of David west of '
  - type: note
    content: 1 Kgs. 1:33
  - type: text
    content: 'Gihon, in the valley, and for the entrance into '
  - type: note
    content: Neh. 3:3; 12:39; Zeph. 1:10
  - type: text
    content: 'the Fish Gate, and carried it around '
  - type: note
    content: ch. 27:3
  - type: text
    content: 'Ophel, and raised it to a very great height. He also put commanders of the army in all the fortified cities in Judah. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: ver. 3, 5, 7
  - type: text
    content: 'he took away the foreign gods and the idol from the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and all the altars that he had built on the mountain of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in Jerusalem, and he threw them outside of the city. '
  '16':
  - type: text
    content: 'He also restored the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' and offered on it sacrifices of peace offerings and of thanksgiving, and he commanded Judah to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '17':
  - type: note
    content: '[ch. 32:12]'
  - type: text
    content: 'Nevertheless, the people still sacrificed at the high places, but only to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '18':
  - type: text
    content: 'Now the rest of the acts of Manasseh, and '
  - type: note
    content: ver. 13, 19
  - type: text
    content: 'his prayer to his God, and the words of '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'the seers who spoke to him in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, behold, they are in the '
  - type: note
    content: '[2 Kgs. 21:17]'
  - type: text
    content: 'Chronicles of the Kings of Israel. '
  '19':
  - type: text
    content: 'And his prayer, and how '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'God was moved by his entreaty, and all his sin and his faithlessness, and the sites '
  - type: note
    content: ver. 3
  - type: text
    content: 'on which he built high places and set up the '
  - type: note
    content: ver. 3
  - type: text
    content: 'Asherim and the images, before '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: he humbled himself, behold, they are written in the Chronicles of the Seers.
  - type: note
    content: One Hebrew manuscript, Septuagint; most Hebrew manuscripts of Hozai
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to '
  - type: note
    content: ch. 28:3
  - type: text
    content: 'the abominations of the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before the people of Israel. '
  '20':
  - type: text
    content: So Manasseh slept with his fathers, and they buried him in his house, and Amon his son reigned in his place.
  - type: heading
    content: Amon’s Reign and Death
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21-25, see 2 Kgs. 21:19-24
  - type: text
    content: 'Amon was twenty-two years old when he began to reign, and he reigned two years in Jerusalem. '
  '22':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', as Manasseh his father had done. Amon sacrificed to all the images '
  - type: note
    content: ver. 7; [ch. 34:3, 4]
  - type: text
    content: 'that Manasseh his father had made, and served them. '
  '23':
  - type: text
    content: 'And he did not humble himself before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 12
  - type: text
    content: 'as Manasseh his father had humbled himself, but this Amon incurred guilt more and more. '
  '24':
  - type: text
    content: 'And his servants conspired against him and put him to death in his house. '
  '25':
  - type: text
    content: But the people of the land struck down all those who had conspired against King Amon. And the people of the land made Josiah his son king in his place.
  '3':
  - type: text
    content: 'For he rebuilt the high places '
  - type: note
    content: ch. 30:14; 31:1; 2 Kgs. 18:4
  - type: text
    content: 'that his father Hezekiah had broken down, and he erected altars to the Baals, and made '
  - type: note
    content: See Deut. 16:21; [Deut. 17:3]
  - type: text
    content: 'Asheroth, and worshiped all the host of heaven and served them. '
  '4':
  - type: text
    content: 'And he built altars in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', of which the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, '
  - type: note
    content: ch. 6:6
  - type: text
    content: '“In Jerusalem shall my name be forever.” '
  '5':
  - type: text
    content: 'And he built altars for all the host of heaven in '
  - type: note
    content: ch. 4:9
  - type: text
    content: 'the two courts of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: note
    content: ch. 28:3
  - type: text
    content: 'And he burned his sons as an offering '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'in the Valley of the Son of Hinnom, and '
  - type: note
    content: Deut. 18:10
  - type: text
    content: 'used fortune-telling and omens and sorcery, and dealt with '
  - type: note
    content: See 1 Sam. 28:3
  - type: text
    content: 'mediums and with necromancers. He did much evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', provoking him to anger. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ver. 15
  - type: text
    content: 'the carved image of the idol that he had made he set in the house of God, of which God said to David and to Solomon his son, “In this house, and in Jerusalem, which I have chosen out of all the tribes of Israel, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'I will put my name forever, '
  '8':
  - type: text
    content: 'and I will no more remove the foot of Israel from the land '
  - type: note
    content: 2 Sam. 7:10
  - type: text
    content: 'that I appointed for your fathers, if only they will be careful to do all that I have commanded them, all the law, the statutes, and the rules given through Moses.” '
  '9':
  - type: text
    content: 'Manasseh led Judah and the inhabitants of Jerusalem astray, to do more evil than the nations whom the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed before the people of Israel.'
  - type: heading
    content: Manasseh’s Repentance
