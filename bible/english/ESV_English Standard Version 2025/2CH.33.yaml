          text: 32:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Nevertheless, the people still sacrificed at the high places, but only to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '18':
  - type: usfm
    marker: p
