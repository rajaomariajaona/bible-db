  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-9, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 21:1-9
      marker-yv: yv-n
    - type: text
      text: 'Manasseh was twelve years old when he began to reign, and he reigned fifty-five years in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Manasseh and to his people, but they paid no attention. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 28:36
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought upon them the commanders of the army of the king of Assyria, who captured Manasseh with hooks and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 16:21
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'bound him with chains of bronze and brought him to Babylon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he was in distress, he entreated the favor of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and humbled himself greatly before the God of his fathers. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He prayed to him, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 5:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 8:23
      marker-yv: yv-n
    - type: text
      text: 'God was moved by his entreaty and heard his plea and brought him again to Jerusalem into his kingdom. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 4:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Then Manasseh knew that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was God.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward he built an outer wall for the city of David west of '
    - type: usfm
