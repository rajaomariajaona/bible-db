        children:
        - type: text
          text: Deut. 17:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Asheroth, and worshiped all the host of heaven and served them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built altars in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
