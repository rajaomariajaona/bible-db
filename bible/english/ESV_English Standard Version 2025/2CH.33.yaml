    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 18:4
      marker-yv: yv-n
    - type: text
      text: 'that his father Hezekiah had broken down, and he erected altars to the Baals, and made '
    - type: usfm
