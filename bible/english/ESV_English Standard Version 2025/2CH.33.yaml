      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'as Manasseh his father had humbled himself, but this Amon incurred guilt more and more. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servants conspired against him and put him to death in his house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people of the land struck down all those who had conspired against King Amon. And the people of the land made Josiah his son king in his place.
  '3':
  - type: usfm
