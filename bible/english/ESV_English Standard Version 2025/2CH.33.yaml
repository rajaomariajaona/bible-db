        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3, 5, 7
      marker-yv: yv-n
    - type: text
      text: 'he took away the foreign gods and the idol from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and all the altars that he had built on the mountain of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in Jerusalem, and he threw them outside of the city. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also restored the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and offered on it sacrifices of peace offerings and of thanksgiving, and he commanded Judah to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
