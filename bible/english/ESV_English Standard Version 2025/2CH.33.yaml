  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Manasseh slept with his fathers, and they buried him in his house, and Amon his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amon’s Reign and Death
    marker-yv: yv-h
  '21':
  - type: usfm
