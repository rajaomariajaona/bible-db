      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'that Manasseh his father had made, and served them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
