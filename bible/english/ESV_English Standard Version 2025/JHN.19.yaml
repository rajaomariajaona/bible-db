document_id: JHN.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Delivered to Be Crucified
  - type: text
    content: 'Then Pilate took Jesus and '
  - type: note
    content: Matt. 20:19; 27:26; Mark 15:15; Luke 23:16
  - type: text
    content: 'flogged him. '
  '10':
  - type: text
    content: 'So Pilate said to him, “You will not speak to me? Do you not know that I have authority to release you and authority to crucify you?” '
  '11':
  - type: text
    content: 'Jesus answered him, '
  - type: note
    content: '[Rom. 13:1]'
  - type: text
    content: '“You would have no authority over me at all unless it had been given you from above. Therefore '
  - type: note
    content: '[ch. 18:14, 28-32; Matt. 27:2]'
  - type: text
    content: 'he who delivered me over to you '
  - type: note
    content: See ch. 9:41
  - type: text
    content: has the greater sin.”
  '12':
  - type: text
    content: 'From then on '
  - type: note
    content: Acts 3:13
  - type: text
    content: 'Pilate sought to release him, but the Jews cried out, “If you release this man, you are not Caesar’s friend. '
  - type: note
    content: See Luke 23:2
  - type: text
    content: 'Everyone who makes himself a king opposes Caesar.” '
  '13':
  - type: text
    content: 'So when Pilate heard these words, he brought Jesus out and sat down on '
  - type: note
    content: Matt. 27:19
  - type: text
    content: the judgment seat at a place called The Stone Pavement, and in Aramaic
  - type: note
    content: Or Hebrew; also verses 17, 20
  - type: text
    content: ' Gabbatha. '
  '14':
  - type: text
    content: 'Now it was '
  - type: note
    content: '[ch. 18:28]; See Matt. 27:62'
  - type: text
    content: the day of Preparation of the Passover. It was about the sixth hour.
  - type: note
    content: That is, about noon
  - type: text
    content: ' He said to the Jews, '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: '“Behold your King!” '
  '15':
  - type: text
    content: 'They cried out, '
  - type: note
    content: Luke 23:18; [Acts 21:36]
  - type: text
    content: '“Away with him, away with him, crucify him!” Pilate said to them, “Shall I crucify your King?” The chief priests answered, “We have no king but Caesar.” '
  '16':
  - type: note
    content: Matt. 27:26; Mark 15:15; Luke 23:25
  - type: text
    content: 'So he '
  - type: note
    content: ch. 18:36-40
  - type: text
    content: delivered him over to them to be crucified.
  - type: heading
    content: The Crucifixion
  - type: text
    content: 'So they took Jesus, '
  '17':
  - type: text
    content: 'and '
  - type: note
    content: Matt. 27:33; Mark 15:22; Luke 23:33
  - type: text
    content: 'he went out, '
  - type: note
    content: Luke 14:27; [Matt. 27:32; Mark 15:21; Luke 23:26]
  - type: text
    content: 'bearing his own cross, to the place called The Place of a Skull, which in Aramaic is called Golgotha. '
  '18':
  - type: note
    content: Matt. 27:38; Mark 15:24, 27; Luke 23:32, 33
  - type: text
    content: 'There they crucified him, and with him two others, one on either side, and Jesus between them. '
  '19':
  - type: text
    content: 'Pilate '
  - type: note
    content: '[Matt. 27:37; Mark 15:26; Luke 23:38]'
  - type: text
    content: 'also wrote an inscription and put it on the cross. It read, “Jesus of Nazareth, the King of the Jews.” '
  '2':
  - type: note
    content: Matt. 27:27-30; Mark 15:16-19
  - type: text
    content: 'And the soldiers twisted together a crown of thorns and put it on his head and arrayed him in a purple robe. '
  '20':
  - type: text
    content: 'Many of the Jews read this inscription, for '
  - type: note
    content: ver. 17; [Num. 15:35, 36; Heb. 13:12]
  - type: text
    content: 'the place where Jesus was crucified was near the city, and it was written in Aramaic, in Latin, and in Greek. '
  '21':
  - type: text
    content: 'So the chief priests of the Jews said to Pilate, “Do not write, ‘The King of the Jews,’ but rather, ‘This man said, I am King of the Jews.’” '
  '22':
  - type: text
    content: 'Pilate answered, '
  - type: note
    content: '[Gen. 43:14; Esth. 4:16]'
  - type: text
    content: “What I have written I have written.”
  '23':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:35; Mark 15:24; Luke 23:34
  - type: text
    content: When the soldiers had crucified Jesus, they took his garments and divided them into four parts, one part for each soldier; also his tunic.
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' But the tunic was seamless, woven in one piece from top to bottom, '
  '24':
  - type: text
    content: 'so they said to one another, “Let us not tear it, but cast lots for it to see whose it shall be.” '
  - type: note
    content: See ch. 13:18
  - type: text
    content: This was to fulfill the Scripture which says,
  - type: note
    content: Cited from Ps. 22:18
  - type: text
    content: “They divided my garments among them,
  - type: text
    content: and for my clothing they cast lots.”
  - type: text
    content: 'So the soldiers did these things, '
  '25':
  - type: note
    content: Matt. 27:55, 56; Mark 15:40, 41; Luke 23:49
  - type: text
    content: 'but standing by the cross of Jesus were his mother and his mother’s sister, Mary the wife of Clopas, and Mary Magdalene. '
  '26':
  - type: text
    content: 'When Jesus saw his mother and '
  - type: note
    content: See ch. 13:23
  - type: text
    content: 'the disciple whom he loved standing nearby, he said to his mother, '
  - type: note
    content: ch. 2:4
  - type: text
    content: “Woman, behold, your son!”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then he said to the disciple, '
  - type: text
    content: “Behold, your mother!”
  - type: text
    content: ' And from that hour the disciple took her to '
  - type: note
    content: '[ch. 16:32]'
  - type: text
    content: his own home.
  - type: heading
    content: The Death of Jesus
  '28':
  - type: text
    content: 'After this, Jesus, knowing that all was now '
  - type: note
    content: '[ver. 30]'
  - type: text
    content: finished, said (
  - type: note
    content: '[See ver. 24above]'
  - type: text
    content: 'to fulfill the Scripture), '
  - type: note
    content: Ps. 69:21; See ch. 4:6, 7
  - type: text
    content: “I thirst.”
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'A jar full of sour wine stood there, '
  - type: note
    content: Matt. 27:48; Mark 15:36; [Luke 23:36]
  - type: text
    content: 'so they put a sponge full of the sour wine on a hyssop branch and held it to his mouth. '
  '3':
  - type: text
    content: 'They came up to him, saying, “Hail, King of the Jews!” and struck him with their hands. '
  '30':
  - type: text
    content: 'When Jesus had received the sour wine, he said, '
  - type: note
    content: '[ver. 28; Acts 13:29]; See ch. 17:4'
  - type: text
    content: “It is finished,”
  - type: text
    content: ' and he bowed his head and '
  - type: note
    content: Matt. 27:50; Mark 15:37; Luke 23:46
  - type: text
    content: gave up his spirit.
  - type: heading
    content: Jesus’ Side Is Pierced
  '31':
  - type: text
    content: 'Since it was '
  - type: note
    content: ver. 14
  - type: text
    content: 'the day of Preparation, and '
  - type: note
    content: Deut. 21:23; Josh. 8:29; 10:26, 27
  - type: text
    content: 'so that the bodies would not remain on the cross on the Sabbath (for that Sabbath was '
  - type: note
    content: Ex. 12:16
  - type: text
    content: 'a high day), the Jews asked Pilate that their legs might be broken and that they might be taken away. '
  '32':
  - type: text
    content: 'So the soldiers came and broke the legs of the first, and of the other '
  - type: note
    content: ver. 18
  - type: text
    content: 'who had been crucified with him. '
  '33':
  - type: text
    content: 'But when they came to Jesus and saw that he was already dead, they did not break his legs. '
  '34':
  - type: text
    content: 'But one of the soldiers pierced his side with a spear, and at once there came out '
  - type: note
    content: 1 John 5:6, 8
  - type: text
    content: 'blood and water. '
  '35':
  - type: note
    content: 1 John 1:1-3; Rev. 1:2; See ch. 15:27
  - type: text
    content: He who saw it has borne witness—
  - type: note
    content: '[ch. 21:24]'
  - type: text
    content: his testimony is true, and he knows that he is telling the truth—
  - type: note
    content: '[ch. 20:31]'
  - type: text
    content: 'that you also may believe. '
  '36':
  - type: note
    content: See Matt. 1:22
  - type: text
    content: 'For these things took place that the Scripture might be fulfilled: '
  - type: note
    content: Cited from Ex. 12:46; Num. 9:12; [1 Cor. 5:7]
  - type: text
    content: '“Not one of his bones '
  - type: note
    content: Ps. 34:20
  - type: text
    content: 'will be broken.” '
  '37':
  - type: text
    content: 'And again another Scripture says, '
  - type: note
    content: Cited from Zech. 12:10; [Rev. 1:7]
  - type: text
    content: “They will look on him whom they have pierced.”
  - type: heading
    content: Jesus Is Buried
  '38':
  - type: text
    content: ' '
  - type: note
    content: For ver. 38-42, see Matt. 27:57-61; Mark 15:42-47; Luke 23:50-56
  - type: text
    content: 'After these things Joseph of Arimathea, who was a disciple of Jesus, but secretly '
  - type: note
    content: See ch. 7:13
  - type: text
    content: 'for fear of the Jews, asked Pilate that he might take away the body of Jesus, and Pilate gave him permission. So he came and took away his body. '
  '39':
  - type: note
    content: ch. 3:1, 2; 7:50
  - type: text
    content: Nicodemus also, who earlier had come to Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' by night, came '
  - type: note
    content: '[Mark 16:1; Luke 24:1]'
  - type: text
    content: 'bringing a mixture of '
  - type: note
    content: Ps. 45:8; Prov. 7:17; Song 4:14
  - type: text
    content: myrrh and aloes, about seventy-five pounds
  - type: note
    content: Greek one hundred litras; a litra (or Roman pound) was equal to about 11 1/2 ounces or 327 grams
  - type: text
    content: ' in weight. '
  '4':
  - type: text
    content: 'Pilate went out again and said to them, “See, I am bringing him out to you that you may know that '
  - type: note
    content: ver. 6; ch. 18:38
  - type: text
    content: 'I find no guilt in him.” '
  '40':
  - type: text
    content: 'So they took the body of Jesus and '
  - type: note
    content: ch. 11:44; [2 Chr. 16:14; Acts 5:6]
  - type: text
    content: 'bound it in '
  - type: note
    content: ch. 20:5-7; Luke 24:12
  - type: text
    content: 'linen cloths with the spices, as is the burial custom of the Jews. '
  '41':
  - type: text
    content: 'Now in the place where he was crucified there was a '
  - type: note
    content: '[ch. 20:15]'
  - type: text
    content: 'garden, and '
  - type: note
    content: 2 Kgs. 21:18, 26
  - type: text
    content: 'in the garden a new tomb '
  - type: note
    content: Luke 23:53; [Mark 11:2]
  - type: text
    content: 'in which no one had yet been laid. '
  '42':
  - type: text
    content: 'So because of the Jewish '
  - type: note
    content: ver. 14, 31
  - type: text
    content: 'day of Preparation, '
  - type: note
    content: ver. 41
  - type: text
    content: since the tomb was close at hand, they laid Jesus there.
  '5':
  - type: text
    content: 'So Jesus came out, wearing '
  - type: note
    content: ver. 2
  - type: text
    content: 'the crown of thorns and the purple robe. Pilate said to them, '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: '“Behold the man!” '
  '6':
  - type: text
    content: 'When the chief priests and the officers saw him, they cried out, “Crucify him, crucify him!” Pilate said to them, '
  - type: note
    content: '[ch. 18:31]'
  - type: text
    content: '“Take him yourselves and crucify him, for '
  - type: note
    content: ver. 4
  - type: text
    content: 'I find no guilt in him.” '
  '7':
  - type: text
    content: The Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verses 12, 14, 31, 38
  - type: text
    content: ' answered him, “We have a law, and '
  - type: note
    content: Lev. 24:16; [ch. 10:33]
  - type: text
    content: 'according to that law he ought to die because '
  - type: note
    content: ch. 5:17, 18; 10:36; Matt. 26:63; Luke 22:70
  - type: text
    content: 'he has made himself the Son of God.” '
  '8':
  - type: text
    content: 'When Pilate heard this statement, '
  - type: note
    content: '[Matt. 27:19]'
  - type: text
    content: 'he was even more afraid. '
  '9':
  - type: note
    content: ch. 18:33
  - type: text
    content: 'He entered his headquarters again and said to Jesus, '
  - type: note
    content: ch. 7:27
  - type: text
    content: '“Where are you from?” But '
  - type: note
    content: '[ch. 18:37]; See Matt. 26:63'
  - type: text
    content: 'Jesus gave him no answer. '
