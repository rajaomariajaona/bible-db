document_id: JON.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Anger and the Lord’s Compassion
  - type: text
    content: But it displeased Jonah exceedingly,
  - type: note
    content: Hebrew it was exceedingly evil to Jonah
  - type: text
    content: ' and '
  - type: note
    content: '[ver. 4, 9]'
  - type: text
    content: 'he was angry. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “You pity the plant, for which you did not labor, nor did you make it grow, which came into being in a night and perished in a night. '
  '11':
  - type: text
    content: 'And should not I pity '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'Nineveh, that great city, in which there are more than 120,000 persons who do not know their right hand from their left, and also much '
  - type: note
    content: '[ch. 3:7]'
  - type: text
    content: cattle?”
  '2':
  - type: text
    content: 'And he prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', is not this what I said when I was yet in my country? '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'That is why I made haste to flee to Tarshish; for I knew that you are a '
  - type: note
    content: See Joel 2:13
  - type: text
    content: 'gracious God and merciful, slow to anger and abounding in steadfast love, and '
  - type: note
    content: See Joel 2:13
  - type: text
    content: 'relenting from disaster. '
  '3':
  - type: note
    content: '[1 Kgs. 19:4]'
  - type: text
    content: 'Therefore now, O '
  - type: text
    content: Lord
  - type: text
    content: ', please take my life from me, '
  - type: note
    content: '[Eccles. 7:1]'
  - type: text
    content: 'for it is better for me to die than to live.” '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: '[ver. 1, 9]'
  - type: text
    content: “Do you do well to be angry?”
  '5':
  - type: text
    content: 'Jonah went out of the city and sat to the east of the city and '
  - type: note
    content: '[Neh. 8:15]'
  - type: text
    content: 'made a booth for himself there. He sat under it in the shade, till he should see what would become of the city. '
  '6':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' God appointed a plant'
  - type: note
    content: Hebrew qiqayon, probably the castor oil plant; also verses 7, 9, 10
  - type: text
    content: ' and made it come up over Jonah, that it might be a shade over his head, to save him from his discomfort.'
  - type: note
    content: Or his evil
  - type: text
    content: ' So Jonah was exceedingly glad because of the plant. '
  '7':
  - type: text
    content: 'But when dawn came up the next day, God appointed a worm that attacked the plant, so that it withered. '
  '8':
  - type: text
    content: 'When the sun rose, God appointed a scorching '
  - type: note
    content: Jer. 18:17
  - type: text
    content: 'east wind, '
  - type: note
    content: '[Ps. 121:6]'
  - type: text
    content: 'and the sun beat down on the head of Jonah so that he '
  - type: note
    content: '[Amos 8:13]'
  - type: text
    content: 'was faint. And he asked that he might die and said, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '“It is better for me to die than to live.” '
  '9':
  - type: text
    content: 'But God said to Jonah, '
  - type: note
    content: '[ver. 1, 4]'
  - type: text
    content: '“Do you do well to be angry for the plant?” And he said, “Yes, I do well to be angry, angry enough to die.” '
