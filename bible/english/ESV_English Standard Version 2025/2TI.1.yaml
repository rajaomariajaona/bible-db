document_id: 2TI.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: See 2 Cor. 1:1
  - type: text
    content: 'an apostle of Christ Jesus '
  - type: note
    content: See 1 Cor. 1:1
  - type: text
    content: 'by the will of God according to '
  - type: note
    content: Titus 1:2; Heb. 9:15
  - type: text
    content: the promise of the life that is in Christ Jesus,
  '10':
  - type: text
    content: 'and which now has '
  - type: note
    content: See Rom. 16:26
  - type: text
    content: 'been manifested through '
  - type: note
    content: See 2 Thess. 2:8
  - type: text
    content: 'the appearing of our Savior Christ Jesus, '
  - type: note
    content: 1 Cor. 15:26; [1 Cor. 15:54, 55; Heb. 2:14, 15]
  - type: text
    content: 'who abolished death and '
  - type: note
    content: '[Job 33:30]'
  - type: text
    content: 'brought life and '
  - type: note
    content: Rom. 2:7
  - type: text
    content: 'immortality to light through the gospel, '
  '11':
  - type: note
    content: See 1 Tim. 2:7
  - type: text
    content: 'for which I was appointed a preacher and apostle and teacher, '
  '12':
  - type: note
    content: ch. 2:9
  - type: text
    content: 'which is why I suffer as I do. But '
  - type: note
    content: ver. 8
  - type: text
    content: 'I am not ashamed, for '
  - type: note
    content: '[Ps. 10:14; 1 Pet. 4:19]'
  - type: text
    content: 'I know whom I have believed, and I am convinced that he is able to guard until '
  - type: note
    content: ver. 18; ch. 4:8; See 1 Cor. 3:13
  - type: text
    content: 'that day '
  - type: note
    content: 1 Tim. 6:20
  - type: text
    content: what has been entrusted to me.
  - type: note
    content: Or what I have entrusted to him; Greek my deposit
  - type: text
    content: ' '
  '13':
  - type: note
    content: '[ch. 3:14; Titus 1:9; Rev. 3:3]'
  - type: text
    content: 'Follow '
  - type: note
    content: '[Rom. 2:20; 6:17]'
  - type: text
    content: 'the pattern of '
  - type: note
    content: See 1 Tim. 1:10
  - type: text
    content: the sound
  - type: note
    content: Or healthy
  - type: text
    content: ' words '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'that you have heard from me, in '
  - type: note
    content: 1 Tim. 1:14
  - type: text
    content: 'the faith and love that are in Christ Jesus. '
  '14':
  - type: text
    content: 'By the Holy Spirit '
  - type: note
    content: See Rom. 8:9
  - type: text
    content: 'who dwells within us, guard '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: the good deposit entrusted to you.
  '15':
  - type: text
    content: 'You are aware that '
  - type: note
    content: Acts 19:10; [ch. 4:10, 11, 16]
  - type: text
    content: 'all who are in Asia turned away from me, among whom are Phygelus and Hermogenes. '
  '16':
  - type: text
    content: 'May the Lord grant mercy to '
  - type: note
    content: ch. 4:19
  - type: text
    content: 'the household of Onesiphorus, for he often '
  - type: note
    content: Philem. 7, 20
  - type: text
    content: 'refreshed me and was not ashamed of '
  - type: note
    content: '[ver. 8]; See Acts 28:20'
  - type: text
    content: 'my chains, '
  '17':
  - type: text
    content: 'but when he arrived in Rome '
  - type: note
    content: Matt. 25:36-40
  - type: text
    content: 'he searched for me earnestly and found me— '
  '18':
  - type: text
    content: 'may the Lord grant him to find mercy from the Lord on '
  - type: note
    content: ver. 12
  - type: text
    content: 'that day!—and you well know all the service he '
  - type: note
    content: Heb. 6:10
  - type: text
    content: rendered at Ephesus.
  '2':
  - type: text
    content: 'To Timothy, '
  - type: note
    content: 1 Cor. 4:17; [ch. 2:1]; See 3 John 4
  - type: text
    content: 'my beloved child:'
  - type: note
    content: See 1 Tim. 1:2
  - type: text
    content: Grace, mercy, and peace from God the Father and Christ Jesus our Lord.
  - type: heading
    content: Guard the Deposit Entrusted to You
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:8
  - type: text
    content: 'I thank God '
  - type: note
    content: See Acts 22:3; 24:14
  - type: text
    content: 'whom I serve, as did my ancestors, '
  - type: note
    content: 1 Tim. 3:9; See Acts 23:1
  - type: text
    content: 'with a clear conscience, as I remember you '
  - type: note
    content: Rom. 1:9
  - type: text
    content: 'constantly in my prayers night and day. '
  '4':
  - type: note
    content: '[Acts 20:37]'
  - type: text
    content: 'As I remember your tears, '
  - type: note
    content: Phil. 1:8; [ch. 4:9, 21]
  - type: text
    content: 'I long to see you, that I may be filled with joy. '
  '5':
  - type: text
    content: 'I am reminded of '
  - type: note
    content: Rom. 12:9; 1 Tim. 1:5
  - type: text
    content: 'your sincere faith, a faith that dwelt first in your grandmother Lois and '
  - type: note
    content: Acts 16:1; [ch. 3:15; Ps. 86:16; 116:16]
  - type: text
    content: 'your mother Eunice and now, I am sure, dwells in you as well. '
  '6':
  - type: text
    content: 'For this reason I remind you '
  - type: note
    content: 1 Tim. 4:14; [1 Thess. 5:19]
  - type: text
    content: 'to fan into flame the gift of God, which is in you through the laying on of my hands, '
  '7':
  - type: text
    content: 'for God gave us '
  - type: note
    content: Rom. 8:15; [John 14:27; Rev. 21:8]
  - type: text
    content: 'a spirit not of fear but '
  - type: note
    content: Luke 24:49; Acts 1:8
  - type: text
    content: of power and love and self-control.
  '8':
  - type: text
    content: 'Therefore '
  - type: note
    content: See Mark 8:38
  - type: text
    content: 'do not be ashamed of '
  - type: note
    content: See 1 Cor. 1:6
  - type: text
    content: 'the testimony about our Lord, nor of '
  - type: note
    content: '[ver. 16]; See Eph. 3:1'
  - type: text
    content: 'me his prisoner, but '
  - type: note
    content: ch. 2:3, 9; 4:5
  - type: text
    content: 'share in suffering for the gospel by the power of God, '
  '9':
  - type: note
    content: 1 Tim. 1:1; Titus 3:4
  - type: text
    content: 'who saved us and '
  - type: note
    content: '[Heb. 3:1]; See Rom. 8:28'
  - type: text
    content: called us to
  - type: note
    content: Or with
  - type: text
    content: ' a holy calling, '
  - type: note
    content: Titus 3:5; See Rom. 3:27
  - type: text
    content: 'not because of our works but because of '
  - type: note
    content: '[Heb. 3:1]; See Rom. 8:28'
  - type: text
    content: 'his own purpose and grace, which he gave us in Christ Jesus '
  - type: note
    content: Titus 1:2; [Rom. 16:25]; See Eph. 1:4
  - type: text
    content: before the ages began,
  - type: note
    content: Greek before times eternal
  - type: text
    content: ' '
