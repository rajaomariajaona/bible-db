document_id: ACT.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Seven Chosen to Serve
  - type: text
    content: 'Now in these days '
  - type: note
    content: ch. 2:41, 47; 4:4; 5:14; [ver. 7]
  - type: text
    content: when the disciples were increasing in number, a complaint by the Hellenists
  - type: note
    content: That is, Greek-speaking Jews
  - type: text
    content: ' arose against the Hebrews because their widows were being neglected in '
  - type: note
    content: '[ch. 4:35]'
  - type: text
    content: 'the daily distribution. '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: See Luke 21:14, 15
  - type: text
    content: 'they could not withstand the wisdom and the Spirit with which he was speaking. '
  '11':
  - type: text
    content: 'Then '
  - type: note
    content: '[1 Kgs. 21:10, 13; Matt. 26:59, 60]'
  - type: text
    content: 'they secretly instigated men who said, “We have heard him speak blasphemous words against Moses and God.” '
  '12':
  - type: text
    content: 'And they stirred up the people and the elders and the scribes, and they came upon him and seized him and brought him before the council, '
  '13':
  - type: text
    content: 'and they '
  - type: note
    content: ver. 11
  - type: text
    content: 'set up false '
  - type: note
    content: ch. 7:58
  - type: text
    content: 'witnesses who said, “This man never ceases to speak words against '
  - type: note
    content: '[ch. 21:28; 25:8; Matt. 24:15]'
  - type: text
    content: 'this holy place and the law, '
  '14':
  - type: text
    content: 'for we have heard him say that this Jesus of Nazareth '
  - type: note
    content: '[Dan. 9:26; Matt. 26:61]'
  - type: text
    content: 'will destroy this place and will '
  - type: note
    content: '[Matt. 5:17]'
  - type: text
    content: 'change '
  - type: note
    content: ch. 15:1; 21:21
  - type: text
    content: 'the customs that Moses delivered to us.” '
  '15':
  - type: text
    content: 'And gazing at him, all who sat in the council saw that his face '
  - type: note
    content: '[Judg. 13:6; Eccles. 8:1]'
  - type: text
    content: was like the face of an angel.
  '2':
  - type: text
    content: 'And the twelve summoned the full number of the disciples and said, “It is not right that we should give up preaching the word of God to serve tables. '
  '3':
  - type: note
    content: '[Deut. 1:13]'
  - type: text
    content: Therefore, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' pick out from among you seven men '
  - type: note
    content: '[1 Tim. 3:7]'
  - type: text
    content: 'of good repute, '
  - type: note
    content: ver. 5; ch. 7:55; 11:24; [Luke 1:15; 4:1]
  - type: text
    content: 'full of the Spirit and of wisdom, whom we will appoint to this duty. '
  '4':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'we will devote ourselves to prayer and to the ministry of the word.” '
  '5':
  - type: text
    content: 'And what they said pleased the whole gathering, and they chose Stephen, '
  - type: note
    content: ch. 11:24
  - type: text
    content: 'a man full of faith and '
  - type: note
    content: ver. 3
  - type: text
    content: 'of the Holy Spirit, and '
  - type: note
    content: ch. 8:5; 21:8
  - type: text
    content: 'Philip, and Prochorus, and Nicanor, and Timon, and Parmenas, and Nicolaus, '
  - type: note
    content: ch. 2:11; 13:43; Matt. 23:15
  - type: text
    content: 'a proselyte of Antioch. '
  '6':
  - type: text
    content: 'These they set before the apostles, and '
  - type: note
    content: ch. 1:24; 13:3
  - type: text
    content: 'they prayed and '
  - type: note
    content: 1 Tim. 4:14; 5:22; 2 Tim. 1:6; [ch. 8:17; 9:17; 19:6; Heb. 6:2]
  - type: text
    content: laid their hands on them.
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ch. 12:24; 19:20; [Col. 1:5, 6]
  - type: text
    content: 'the word of God continued to increase, and the number of the disciples multiplied greatly in Jerusalem, and a great many of the priests '
  - type: note
    content: See Rom. 1:5
  - type: text
    content: 'became obedient to '
  - type: note
    content: ch. 13:8; 14:22; 16:5
  - type: text
    content: the faith.
  - type: heading
    content: Stephen Is Seized
  '8':
  - type: text
    content: 'And Stephen, full of grace and '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'power, was doing great wonders and signs among the people. '
  '9':
  - type: text
    content: 'Then some of those who belonged to the synagogue of the Freedmen (as it was called), and of the Cyrenians, and of the Alexandrians, and of those from Cilicia and Asia, rose up and disputed with Stephen. '
