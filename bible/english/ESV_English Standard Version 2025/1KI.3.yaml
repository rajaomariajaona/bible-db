  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the other woman said, “No, the living child is mine, and the dead child is yours.” The first said, “No, the dead child is yours, and the living child is mine.” Thus they spoke before the king.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king said, “The one says, ‘This is my son that is alive, and your son is dead’; and the other says, ‘No; but your son is dead, and my son is the living one.’” '
  '24':
  - type: usfm
