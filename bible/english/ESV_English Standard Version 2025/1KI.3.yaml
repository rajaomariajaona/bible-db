document_id: 1KI.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Prayer for Wisdom
  - type: text
    content: ' '
  - type: note
    content: ch. 7:8; 9:16, 24; 2 Chr. 8:11
  - type: text
    content: 'Solomon made a marriage alliance with Pharaoh king of Egypt. He took Pharaoh’s daughter and brought her into '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'the city of David until he had finished '
  - type: note
    content: ch. 7:1
  - type: text
    content: 'building his own house '
  - type: note
    content: See ch. 6
  - type: text
    content: 'and the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 9:15
  - type: text
    content: 'and the wall around Jerusalem. '
  '10':
  - type: text
    content: 'It pleased the Lord that Solomon had asked this. '
  '11':
  - type: text
    content: 'And God said to him, “Because you have asked this, and have not asked for yourself long life or riches or the life of your enemies, but have asked for yourself understanding to discern what is right, '
  '12':
  - type: text
    content: 'behold, '
  - type: note
    content: '[1 John 5:14, 15]'
  - type: text
    content: 'I now do according to your word. Behold, '
  - type: note
    content: ch. 4:29-31; 5:12; 10:23, 24; Eccles. 1:16
  - type: text
    content: 'I give you a wise and discerning mind, so that none like you has been before you and none like you shall arise after you. '
  '13':
  - type: note
    content: '[Matt. 6:33]'
  - type: text
    content: 'I give you also what you have not asked, '
  - type: note
    content: ch. 4:21-24; 10:23, 27; [Prov. 3:16]
  - type: text
    content: 'both riches and honor, so that no other king shall compare with you, all your days. '
  '14':
  - type: text
    content: 'And if you will walk in my ways, keeping my statutes and my commandments, '
  - type: note
    content: ver. 6; ch. 15:5
  - type: text
    content: 'as your father David walked, then '
  - type: note
    content: '[Ps. 91:16; Prov. 3:2]'
  - type: text
    content: I will lengthen your days.”
  '15':
  - type: text
    content: 'And Solomon '
  - type: note
    content: Gen. 41:7
  - type: text
    content: awoke, and behold, it was a dream. Then he came to Jerusalem and stood before the ark of the covenant of the Lord, and offered up burnt offerings and peace offerings, and made a feast for all his servants.
  - type: heading
    content: Solomon’s Wisdom
  '16':
  - type: text
    content: 'Then two prostitutes came to the king '
  - type: note
    content: Num. 27:2
  - type: text
    content: 'and stood before him. '
  '17':
  - type: text
    content: 'The one woman said, “Oh, my lord, this woman and I live in the same house, and I gave birth to a child while she was in the house. '
  '18':
  - type: text
    content: 'Then on the third day after I gave birth, this woman also gave birth. And we were alone. There was no one else with us in the house; only we two were in the house. '
  '19':
  - type: text
    content: 'And this woman’s son died in the night, because she lay on him. '
  '2':
  - type: note
    content: ch. 22:43; [Deut. 12:2, 3]
  - type: text
    content: 'The people were sacrificing at the high places, however, because no house had yet been built for the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'And she arose at midnight and took my son from beside me, while your servant slept, and laid him at her breast, and laid her dead son at my breast. '
  '21':
  - type: text
    content: 'When I rose in the morning to nurse my child, behold, he was dead. But when I looked at him closely in the morning, behold, he was not the child that I had borne.” '
  '22':
  - type: text
    content: But the other woman said, “No, the living child is mine, and the dead child is yours.” The first said, “No, the dead child is yours, and the living child is mine.” Thus they spoke before the king.
  '23':
  - type: text
    content: 'Then the king said, “The one says, ‘This is my son that is alive, and your son is dead’; and the other says, ‘No; but your son is dead, and my son is the living one.’” '
  '24':
  - type: text
    content: 'And the king said, “Bring me a sword.” So a sword was brought before the king. '
  '25':
  - type: text
    content: 'And the king said, “Divide the living child in two, and give half to the one and half to the other.” '
  '26':
  - type: text
    content: 'Then the woman whose son was alive said to the king, because '
  - type: note
    content: Gen. 43:30; Jer. 31:20; [Isa. 49:15]
  - type: text
    content: 'her heart yearned for her son, “Oh, my lord, give her the living child, and by no means put him to death.” But the other said, “He shall be neither mine nor yours; divide him.” '
  '27':
  - type: text
    content: 'Then the king answered and said, “Give the living child to the first woman, and by no means put him to death; she is his mother.” '
  '28':
  - type: text
    content: 'And all Israel heard of the judgment that the king had rendered, and they stood in awe of the king, because they perceived that '
  - type: note
    content: ver. 9, 11, 12; [Ezra 7:25]
  - type: text
    content: the wisdom of God was in him to do justice.
  '3':
  - type: text
    content: 'Solomon '
  - type: note
    content: Deut. 6:5; 30:16, 20; [Ps. 31:23]
  - type: text
    content: 'loved the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 6, 14
  - type: text
    content: 'walking in the statutes of David his father, only he sacrificed and made offerings at the high places. '
  '4':
  - type: text
    content: 'And the king went to Gibeon to sacrifice there, '
  - type: note
    content: 2 Chr. 1:3, 6, 13; [1 Chr. 16:39; 21:29]
  - type: text
    content: 'for that was the great high place. Solomon used to offer a thousand burnt offerings on that altar. '
  '5':
  - type: note
    content: For ver. 5-14, see 2 Chr. 1:7-12
  - type: text
    content: 'At Gibeon '
  - type: note
    content: ch. 9:2; 11:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Solomon '
  - type: note
    content: '[Num. 12:6; Matt. 1:20; 2:13, 19]'
  - type: text
    content: 'in a dream by night, and God said, “Ask what I shall give you.” '
  '6':
  - type: text
    content: 'And Solomon said, “You have shown great and steadfast love to your servant David my father, because '
  - type: note
    content: ch. 2:4; 9:4; [Ps. 15:2]
  - type: text
    content: 'he walked before you in faithfulness, in righteousness, and in uprightness of heart toward you. And you have kept for him this great and steadfast love and '
  - type: note
    content: ch. 1:48
  - type: text
    content: 'have given him a son to sit on his throne this day. '
  '7':
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, '
  - type: note
    content: '[1 Chr. 28:5]'
  - type: text
    content: 'you have made your servant king in place of David my father, '
  - type: note
    content: '[1 Chr. 29:1]'
  - type: text
    content: 'although I am but a little child. I do not know '
  - type: note
    content: Num. 27:17
  - type: text
    content: 'how to go out or come in. '
  '8':
  - type: note
    content: Deut. 7:6
  - type: text
    content: 'And your servant is in the midst of your people whom you have chosen, a great people, '
  - type: note
    content: Gen. 13:16; 15:5
  - type: text
    content: 'too many to be numbered or counted for multitude. '
  '9':
  - type: note
    content: '[Prov. 2:6, 9; James 1:5]'
  - type: text
    content: 'Give your servant therefore an understanding mind '
  - type: note
    content: Ps. 72:1, 2
  - type: text
    content: 'to govern your people, that I may '
  - type: note
    content: '[2 Sam. 14:17; Isa. 7:15; Heb. 5:14]'
  - type: text
    content: discern between good and evil, for who is able to govern this your great people?”
