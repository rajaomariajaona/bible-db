  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Solomon answered all her questions; there was nothing hidden from the king that he could not explain to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the queen of Sheba had seen all the wisdom of Solomon, the house that he had built, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
