document_id: 1KI.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Queen of Sheba
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-13, see 2 Chr. 9:1-12
  - type: text
    content: 'Now when '
  - type: note
    content: '[Matt. 12:42; Luke 11:31]'
  - type: text
    content: 'the queen of '
  - type: note
    content: Ps. 72:10, 15; Isa. 60:6; Jer. 6:20; Ezek. 27:22, 23; 38:13; Joel 3:8
  - type: text
    content: 'Sheba heard of the fame of Solomon concerning the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', she came '
  - type: note
    content: See Judg. 14:12
  - type: text
    content: 'to test him with hard questions. '
  '10':
  - type: note
    content: ver. 2
  - type: text
    content: Then she gave the king 120 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, and a very great quantity of spices and precious stones. Never again came such an abundance of spices as these that the queen of Sheba gave to King Solomon.'
  '11':
  - type: text
    content: 'Moreover, '
  - type: note
    content: ch. 9:27
  - type: text
    content: 'the fleet of Hiram, which brought '
  - type: note
    content: See ch. 9:28
  - type: text
    content: 'gold from Ophir, brought from Ophir a very great amount of almug wood and precious stones. '
  '12':
  - type: text
    content: 'And the king made of the almug wood supports for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the king’s house, also lyres and harps for the singers. No such almug wood has come or been seen to this day.'
  '13':
  - type: text
    content: And King Solomon gave to the queen of Sheba all that she desired, whatever she asked besides what was given her by the bounty of King Solomon. So she turned and went back to her own land with her servants.
  - type: heading
    content: Solomon’s Great Wealth
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-28, see 2 Chr. 9:13-28
  - type: text
    content: 'Now the weight of gold that came to Solomon in one year was 666 talents of gold, '
  '15':
  - type: text
    content: 'besides that which came from the explorers and from the business of the merchants, and from all the kings of the west and from the governors of the land. '
  '16':
  - type: text
    content: King Solomon made 200 large shields of beaten gold; 600 shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of gold went into each shield. '
  '17':
  - type: text
    content: 'And he made 300 '
  - type: note
    content: ch. 14:26
  - type: text
    content: shields of beaten gold; three minas
  - type: note
    content: A mina was about 1 1/4 pounds or 0.6 kilogram
  - type: text
    content: ' of gold went into each shield. And the king put them in '
  - type: note
    content: ch. 7:2
  - type: text
    content: 'the House of the Forest of Lebanon. '
  '18':
  - type: text
    content: 'The king also made a great ivory throne and overlaid it with the finest gold. '
  '19':
  - type: text
    content: The throne had six steps, and the throne had a round top,
  - type: note
    content: Or and at the back of the throne was a calf’s head
  - type: text
    content: ' and on each side of the seat were armrests and two lions standing beside the armrests, '
  '2':
  - type: text
    content: 'She came to Jerusalem with a very great retinue, with camels '
  - type: note
    content: ver. 10
  - type: text
    content: 'bearing spices and very much gold and precious stones. And when she came to Solomon, she told him all that was on her mind. '
  '20':
  - type: text
    content: 'while twelve lions stood there, one on each end of a step on the six steps. The like of it was never made in any kingdom. '
  '21':
  - type: text
    content: 'All King Solomon’s drinking vessels were of gold, and all the vessels of '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the House of the Forest of Lebanon were of pure gold. None were of silver; silver was not considered as anything in the days of Solomon. '
  '22':
  - type: text
    content: 'For the king had '
  - type: note
    content: ch. 22:48; Gen. 10:4; 1 Chr. 1:7; 2 Chr. 20:36, 37; Ps. 48:7; 72:10
  - type: text
    content: a fleet of ships of Tarshish at sea with the fleet of Hiram. Once every three years the fleet of ships of Tarshish used to come bringing gold, silver, ivory, apes, and peacocks.
  - type: note
    content: Or baboons
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:12, 13; 4:30 ]'
  - type: text
    content: 'Thus King Solomon excelled all the kings of the earth in riches and in wisdom. '
  '24':
  - type: text
    content: 'And the whole earth sought the presence of Solomon to hear his wisdom, which God had put into his mind. '
  '25':
  - type: text
    content: Every one of them brought his present, articles of silver and gold, garments, myrrh,
  - type: note
    content: Or armor
  - type: text
    content: ' spices, horses, and mules, so much year by year.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: For ver. 26-29, see 2 Chr. 1:14-17
  - type: text
    content: 'And Solomon gathered together '
  - type: note
    content: '[ch. 4:26; 2 Chr. 9:25]'
  - type: text
    content: 'chariots and horsemen. He had 1,400 chariots and 12,000 horsemen, whom he stationed in the '
  - type: note
    content: ch. 9:19
  - type: text
    content: 'chariot cities and with the king in Jerusalem. '
  '27':
  - type: text
    content: 'And the king made silver as common in Jerusalem as stone, and he made cedar as plentiful as '
  - type: note
    content: 1 Chr. 27:28
  - type: text
    content: 'the sycamore of the Shephelah. '
  '28':
  - type: text
    content: 'And Solomon’s '
  - type: note
    content: 2 Chr. 9:28; [Deut. 17:16]
  - type: text
    content: 'import of horses was from Egypt and Kue, and the king’s traders received them from Kue at a price. '
  '29':
  - type: text
    content: 'A chariot could be imported from Egypt for 600 shekels of silver and a horse for 150, and so through the king’s traders they were exported to all the kings of '
  - type: note
    content: Judg. 1:26
  - type: text
    content: the Hittites and the kings of Syria.
  '3':
  - type: text
    content: 'And Solomon answered all her questions; there was nothing hidden from the king that he could not explain to her. '
  '4':
  - type: text
    content: 'And when the queen of Sheba had seen all the wisdom of Solomon, the house that he had built, '
  '5':
  - type: text
    content: 'the food of his table, the seating of his officials, and the attendance of his servants, their clothing, his cupbearers, and his burnt offerings that he offered at the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', there was no more breath in her.'
  '6':
  - type: text
    content: 'And she said to the king, “The report was true that I heard in my own land of your words and of your wisdom, '
  '7':
  - type: text
    content: 'but I did not believe the reports until I came and my own eyes had seen it. And behold, the half was not told me. Your wisdom and prosperity surpass the report that I heard. '
  '8':
  - type: note
    content: '[Prov. 8:34]'
  - type: text
    content: 'Happy are your men! Happy are your servants, who continually stand before you and hear your wisdom! '
  '9':
  - type: note
    content: ch. 5:7
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has delighted in you and set you on the throne of Israel! '
  - type: note
    content: 2 Chr. 2:11
  - type: text
    content: 'Because the '
  - type: text
    content: Lord
  - type: text
    content: ' loved Israel forever, he has made you king, '
  - type: note
    content: 2 Sam. 8:15; [Ps. 72:2]
  - type: text
    content: 'that you may execute justice and righteousness.” '
