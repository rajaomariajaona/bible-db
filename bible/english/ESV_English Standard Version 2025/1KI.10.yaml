    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 75 pounds or 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold, and a very great quantity of spices and precious stones. Never again came such an abundance of spices as these that the queen of Sheba gave to King Solomon.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:27
      marker-yv: yv-n
    - type: text
      text: 'the fleet of Hiram, which brought '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:28
      marker-yv: yv-n
    - type: text
      text: 'gold from Ophir, brought from Ophir a very great amount of almug wood and precious stones. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king made of the almug wood supports for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and for the king’s house, also lyres and harps for the singers. No such almug wood has come or been seen to this day.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And King Solomon gave to the queen of Sheba all that she desired, whatever she asked besides what was given her by the bounty of King Solomon. So she turned and went back to her own land with her servants.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Great Wealth
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 14-28, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 9:13-28
      marker-yv: yv-n
    - type: text
      text: 'Now the weight of gold that came to Solomon in one year was 666 talents of gold, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'besides that which came from the explorers and from the business of the merchants, and from all the kings of the west and from the governors of the land. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Solomon made 200 large shields of beaten gold; 600 shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 2/5 ounce or 11 grams
      marker-yv: yv-n
    - type: text
      text: ' of gold went into each shield. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made 300 '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:26
      marker-yv: yv-n
    - type: text
      text: shields of beaten gold; three minas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 1 1/4 pounds or 0.6 kilogram
      marker-yv: yv-n
    - type: text
      text: ' of gold went into each shield. And the king put them in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:2
      marker-yv: yv-n
    - type: text
      text: 'the House of the Forest of Lebanon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king also made a great ivory throne and overlaid it with the finest gold. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The throne had six steps, and the throne had a round top,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and at the back of the throne was a calf’s head
      marker-yv: yv-n
    - type: text
      text: ' and on each side of the seat were armrests and two lions standing beside the armrests, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She came to Jerusalem with a very great retinue, with camels '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'bearing spices and very much gold and precious stones. And when she came to Solomon, she told him all that was on her mind. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while twelve lions stood there, one on each end of a step on the six steps. The like of it was never made in any kingdom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All King Solomon’s drinking vessels were of gold, and all the vessels of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the House of the Forest of Lebanon were of pure gold. None were of silver; silver was not considered as anything in the days of Solomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the king had '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:48
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 10:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 1:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 20:36
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 48:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 72:10
      marker-yv: yv-n
    - type: text
      text: a fleet of ships of Tarshish at sea with the fleet of Hiram. Once every three years the fleet of ships of Tarshish used to come bringing gold, silver, ivory, apes, and peacocks.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: baboons
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:30
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Thus King Solomon excelled all the kings of the earth in riches and in wisdom. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the whole earth sought the presence of Solomon to hear his wisdom, which God had put into his mind. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every one of them brought his present, articles of silver and gold, garments, myrrh,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: armor
      marker-yv: yv-n
    - type: text
      text: ' spices, horses, and mules, so much year by year.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 26-29, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 1:14-17
      marker-yv: yv-n
    - type: text
      text: 'And Solomon gathered together '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 9:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'chariots and horsemen. He had 1,400 chariots and 12,000 horsemen, whom he stationed in the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:19
      marker-yv: yv-n
    - type: text
      text: 'chariot cities and with the king in Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king made silver as common in Jerusalem as stone, and he made cedar as plentiful as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 27:28
      marker-yv: yv-n
    - type: text
      text: 'the sycamore of the Shephelah. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon’s '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 9:28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 17:16
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'import of horses was from Egypt and Kue, and the king’s traders received them from Kue at a price. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A chariot could be imported from Egypt for 600 shekels of silver and a horse for 150, and so through the king’s traders they were exported to all the kings of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 1:26
      marker-yv: yv-n
    - type: text
      text: the Hittites and the kings of Syria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Solomon answered all her questions; there was nothing hidden from the king that he could not explain to her. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the queen of Sheba had seen all the wisdom of Solomon, the house that he had built, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the food of his table, the seating of his officials, and the attendance of his servants, their clothing, his cupbearers, and his burnt offerings that he offered at the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', there was no more breath in her.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she said to the king, “The report was true that I heard in my own land of your words and of your wisdom, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I did not believe the reports until I came and my own eyes had seen it. And behold, the half was not told me. Your wisdom and prosperity surpass the report that I heard. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 8:34
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Happy are your men! Happy are your servants, who continually stand before you and hear your wisdom! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:7
      marker-yv: yv-n
    - type: text
      text: 'Blessed be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who has delighted in you and set you on the throne of Israel! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 2:11
      marker-yv: yv-n
    - type: text
      text: 'Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loved Israel forever, he has made you king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 8:15
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 72:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'that you may execute justice and righteousness.” '
