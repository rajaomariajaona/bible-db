document_id: MAT.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Traditions and Commandments
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-20, see Mark 7:1-23
  - type: text
    content: 'Then Pharisees and '
  - type: note
    content: Mark 3:22
  - type: text
    content: 'scribes came to Jesus '
  - type: note
    content: Mark 3:22
  - type: text
    content: 'from Jerusalem and said, '
  '10':
  - type: text
    content: 'And he called the people to him and said to them, '
  - type: note
    content: ch. 13:51
  - type: text
    content: '“Hear and understand:'
  - type: text
    content: ' '
  '11':
  - type: note
    content: See Acts 10:14, 15
  - type: text
    content: it is not what goes into the mouth that defiles a person, but what comes out of the mouth; this defiles a person.”
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Then the disciples came and said to him, “Do you know that the Pharisees were '
  - type: note
    content: '[ch. 13:57; Luke 7:23]'
  - type: text
    content: 'offended when they heard this saying?” '
  '13':
  - type: text
    content: 'He answered, '
  - type: note
    content: '[Isa. 60:21; 61:3; John 15:1, 2; 1 Cor. 3:9]'
  - type: text
    content: '“Every plant that my heavenly Father has not planted '
  - type: note
    content: Jude 12
  - type: text
    content: will be rooted up.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Let them alone; '
  - type: note
    content: ch. 23:16, 24; [Isa. 56:10; Mal. 2:8]
  - type: text
    content: they are blind guides.
  - type: note
    content: Some manuscripts add of the blind
  - type: text
    content: ' '
  - type: text
    content: 'And '
  - type: note
    content: Luke 6:39
  - type: text
    content: if the blind lead the blind, both will fall into a pit.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But Peter said to him, '
  - type: note
    content: '[ch. 13:36]'
  - type: text
    content: '“Explain the parable to us.” '
  '16':
  - type: text
    content: 'And he said, '
  - type: note
    content: ch. 16:9
  - type: text
    content: “Are you also still without understanding?
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Do you not see that '
  - type: note
    content: '[1 Cor. 6:13]'
  - type: text
    content: whatever goes into the mouth passes into the stomach and is expelled?
  - type: note
    content: Greek is expelled into the latrine
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: ch. 12:34; James 3:6
  - type: text
    content: what comes out of the mouth proceeds from the heart, and this defiles a person.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'For out of the heart come '
  - type: note
    content: James 2:4
  - type: text
    content: 'evil thoughts, '
  - type: note
    content: ch. 5:22, 28; See Ex. 20:13-16
  - type: text
    content: 'murder, adultery, sexual immorality, theft, false witness, '
  - type: note
    content: Eph. 4:31; Col. 3:8; 1 Tim. 6:4
  - type: text
    content: slander.
  - type: text
    content: ' '
  '2':
  - type: note
    content: '[ch. 9:11]'
  - type: text
    content: '“Why do your disciples break '
  - type: note
    content: Gal. 1:14; Col. 2:8
  - type: text
    content: 'the tradition of the elders? '
  - type: note
    content: Luke 11:38
  - type: text
    content: 'For they do not wash their hands when they eat.” '
  '20':
  - type: note
    content: 1 Cor. 6:9, 10
  - type: text
    content: 'These are what defile a person. But '
  - type: note
    content: Mark 7:2, 5
  - type: text
    content: to eat with unwashed hands does not defile anyone.”
  - type: heading
    content: The Faith of a Canaanite Woman
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21-28, see Mark 7:24-30
  - type: text
    content: 'And Jesus went away from there and withdrew to the district of Tyre and Sidon. '
  '22':
  - type: text
    content: 'And behold, '
  - type: note
    content: Gen. 10:15, 19; Judg. 1:30-33
  - type: text
    content: 'a Canaanite woman from that region came out and was crying, '
  - type: note
    content: See ch. 9:27
  - type: text
    content: '“Have mercy on me, O Lord, Son of David; my daughter is severely oppressed by a demon.” '
  '23':
  - type: text
    content: 'But he did not answer her a word. And his disciples came and begged him, saying, '
  - type: note
    content: '[ch. 14:15]'
  - type: text
    content: '“Send her away, for she is crying out after us.” '
  '24':
  - type: text
    content: 'He answered, '
  - type: note
    content: Rom. 15:8; See ch. 10:5, 6
  - type: text
    content: “I was sent only to the lost sheep of the house of Israel.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But she came and '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'knelt before him, saying, “Lord, help me.” '
  '26':
  - type: text
    content: 'And he answered, '
  - type: text
    content: '“It is not right to take the children’s bread and '
  - type: note
    content: ch. 7:6
  - type: text
    content: throw it to the dogs.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'She said, “Yes, Lord, yet even the dogs eat '
  - type: note
    content: '[Luke 16:21]'
  - type: text
    content: 'the crumbs that fall from their masters’ table.” '
  '28':
  - type: text
    content: 'Then Jesus answered her, '
  - type: text
    content: '“O woman, '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'great is your faith! '
  - type: note
    content: '[ch. 8:13]'
  - type: text
    content: Let it be done for you as you desire.”
  - type: text
    content: ' '
  - type: note
    content: ch. 9:22; 17:18; [John 4:52, 53]
  - type: text
    content: 'And her daughter was '
  - type: note
    content: '[ch. 8:13]'
  - type: text
    content: healed instantly.
  - type: note
    content: Greek from that hour
  - type: heading
    content: Jesus Heals Many
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-31, [ Mark 7:31-37 ]
  - type: text
    content: 'Jesus went on from there and walked '
  - type: note
    content: ch. 4:18; John 6:1
  - type: text
    content: 'beside the Sea of Galilee. And he '
  - type: note
    content: ch. 5:1
  - type: text
    content: 'went up on the mountain and sat down there. '
  '3':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “And why do you break the commandment of God for the sake of your tradition?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And great crowds came to him, bringing with them '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'the lame, the blind, the crippled, the mute, and many others, and they put them at his feet, and he healed them, '
  '31':
  - type: note
    content: See ch. 9:33
  - type: text
    content: 'so that the crowd wondered, when they saw the mute speaking, '
  - type: note
    content: ch. 18:8; Mark 9:43
  - type: text
    content: 'the crippled healthy, the lame walking, and the blind seeing. And '
  - type: note
    content: ch. 9:8
  - type: text
    content: 'they glorified '
  - type: note
    content: Isa. 29:23; Luke 1:68; Acts 13:17
  - type: text
    content: the God of Israel.
  - type: heading
    content: Jesus Feeds the Four Thousand
  '32':
  - type: text
    content: ' '
  - type: note
    content: For ver. 32-39, see Mark 8:1-10; [ch. 14:14-21 ]
  - type: text
    content: 'Then Jesus called his disciples to him and said, '
  - type: note
    content: '[ch. 9:36]'
  - type: text
    content: “I have compassion on the crowd because they have been with me now three days and have nothing to eat. And I am unwilling to send them away hungry, lest they faint on the way.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And the disciples said to him, “Where are we to get enough bread in such a desolate place to feed so great a crowd?” '
  '34':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: ' They said, '
  - type: note
    content: ch. 16:10
  - type: text
    content: '“Seven, and a few small fish.” '
  '35':
  - type: text
    content: 'And directing the crowd to sit down on the ground, '
  '36':
  - type: text
    content: 'he took the seven loaves and the fish, and '
  - type: note
    content: ch. 26:27; Mark 14:23; Luke 22:17, 19; John 6:11, 23; Acts 27:35; Rom. 14:6; 1 Cor. 10:30; 11:24; 14:16; 1 Tim. 4:3, 4
  - type: text
    content: 'having given thanks he broke them and gave them to the disciples, and the disciples gave them to the crowds. '
  '37':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Kgs. 4:42-44]'
  - type: text
    content: 'they all ate and were satisfied. And they took up seven baskets full of the broken pieces left over. '
  '38':
  - type: text
    content: 'Those who ate were four thousand men, besides women and children. '
  '39':
  - type: text
    content: 'And after sending away the crowds, he got into the boat and went to the region of '
  - type: note
    content: '[Mark 8:10]'
  - type: text
    content: Magadan.
  '4':
  - type: text
    content: 'For God commanded, '
  - type: note
    content: Cited from Ex. 20:12
  - type: text
    content: '‘Honor your father and your mother,’ and, '
  - type: note
    content: Cited from Ex. 21:17
  - type: text
    content: ‘Whoever reviles father or mother must surely die.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: But you say, ‘If anyone tells his father or his mother, “What you would have gained from me is given to God,”
  - type: note
    content: Or is an offering
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'he need not honor his father.’ So for the sake of your tradition you have '
  - type: note
    content: Gal. 3:17 (Gk.); [Rom. 2:23]
  - type: text
    content: made void the word
  - type: note
    content: Some manuscripts law
  - type: text
    content: ' '
  - type: text
    content: of God.
  - type: text
    content: ' '
  '7':
  - type: note
    content: ch. 23:13
  - type: text
    content: 'You hypocrites! Well did Isaiah prophesy of you, when he said:'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 29:13; [ Ezek. 33:31 ]
  - type: text
    content: “‘This people honors me with their lips,
  - type: text
    content: but their heart is far from me;
  '9':
  - type: text
    content: ' '
  - type: text
    content: in vain do they worship me,
  - type: text
    content: 'teaching as '
  - type: note
    content: Col. 2:22; Titus 1:14
  - type: text
    content: doctrines the commandments of men.’”
  - type: heading
    content: What Defiles a Person
