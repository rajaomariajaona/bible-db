document_id: ZEC.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Israel’s Enemies
  - type: text
    content: 'The oracle of the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against the land of Hadrach'
  - type: text
    content: 'and '
  - type: note
    content: See Isa. 17:1
  - type: text
    content: Damascus is its resting place.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has an eye on mankind'
  - type: text
    content: and on all the tribes of Israel,
  - type: note
    content: Or For the eye of mankind, especially of all the tribes of Israel, is toward the Lord
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Hos. 1:7
  - type: text
    content: I will cut off the chariot from Ephraim
  - type: text
    content: 'and '
  - type: note
    content: See Mic. 5:10
  - type: text
    content: the war horse from Jerusalem;
  - type: text
    content: and the battle bow shall be cut off,
  - type: text
    content: 'and '
  - type: note
    content: See Mic. 5:5
  - type: text
    content: he shall speak peace to the nations;
  - type: note
    content: Ps. 72:8
  - type: text
    content: his rule shall be from sea to sea,
  - type: text
    content: 'and from '
  - type: note
    content: See Ex. 23:31
  - type: text
    content: the River
  - type: note
    content: That is, the Euphrates
  - type: text
    content: ' to the ends of the earth.'
  '11':
  - type: text
    content: 'As for you also, because of '
  - type: note
    content: Ex. 24:8
  - type: text
    content: the blood of my covenant with you,
  - type: note
    content: Isa. 42:7; 51:14; 61:1
  - type: text
    content: 'I will set your prisoners free from '
  - type: note
    content: '[Gen. 37:24; Jer. 38:6]'
  - type: text
    content: the waterless pit.
  '12':
  - type: text
    content: 'Return to your stronghold, O '
  - type: note
    content: '[Jer. 31:17]'
  - type: text
    content: prisoners of hope;
  - type: text
    content: 'today I declare that '
  - type: note
    content: Isa. 61:7
  - type: text
    content: I will restore to you double.
  '13':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 10:3, 4]'
  - type: text
    content: I have bent Judah as my bow;
  - type: text
    content: I have made Ephraim its arrow.
  - type: text
    content: I will stir up your sons, O Zion,
  - type: text
    content: 'against your sons, '
  - type: note
    content: Gen. 10:2; Ezek. 27:13
  - type: text
    content: O Greece,
  - type: text
    content: and wield you like a warrior’s sword.
  - type: heading
    content: The Lord Will Save His People
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will appear over them,'
  - type: text
    content: 'and '
  - type: note
    content: See 2 Sam. 22:15
  - type: text
    content: his arrow will go forth like lightning;
  - type: note
    content: '[ Isa. 27:13 ]'
  - type: text
    content: 'the Lord '
  - type: text
    content: God
  - type: text
    content: ' will sound the trumpet'
  - type: text
    content: 'and will march forth in '
  - type: note
    content: Isa. 21:1
  - type: text
    content: 'the whirlwinds '
  - type: note
    content: '[ch. 6:6]'
  - type: text
    content: of the south.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: ch. 12:8; [ch. 10:5]
  - type: text
    content: will protect them,
  - type: text
    content: 'and '
  - type: note
    content: ch. 12:6
  - type: text
    content: 'they shall devour, '
  - type: note
    content: '[ch. 10:5]'
  - type: text
    content: and tread down the sling stones,
  - type: text
    content: 'and '
  - type: note
    content: ch. 10:7
  - type: text
    content: they shall drink and roar as if drunk with wine,
  - type: text
    content: and be full like a bowl,
  - type: text
    content: 'drenched '
  - type: note
    content: '[Lev. 4:18, 25]'
  - type: text
    content: like the corners of the altar.
  '16':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' their God will save them,'
  - type: text
    content: 'as '
  - type: note
    content: Ps. 100:3
  - type: text
    content: the flock of his people;
  - type: text
    content: 'for '
  - type: note
    content: Isa. 62:3; [Mal. 3:17]
  - type: text
    content: like the jewels of a crown
  - type: text
    content: they shall shine on his land.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 62:3, 4 ]'
  - type: text
    content: For how great is his goodness, and how great his beauty!
  - type: note
    content: '[ Isa. 62:8, 9; Jer. 31:12 ]'
  - type: text
    content: Grain shall make the young men flourish,
  - type: text
    content: and new wine the young women.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Jer. 49:23; See 1 Kgs. 8:65
  - type: text
    content: and on Hamath also, which borders on it,
  - type: note
    content: Josh. 19:28, 29; Isa. 23:1, 2
  - type: text
    content: 'Tyre and '
  - type: note
    content: Josh. 19:28, 29; Isa. 23:1, 2
  - type: text
    content: 'Sidon, though '
  - type: note
    content: See Ezek. 28:3-5
  - type: text
    content: they are very wise.
  '3':
  - type: text
    content: 'Tyre has built herself '
  - type: note
    content: '[Josh. 19:29]'
  - type: text
    content: a rampart
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 28:4, 5
  - type: text
    content: heaped up silver like dust,
  - type: text
    content: and fine gold like the mud of the streets.
  '4':
  - type: text
    content: But behold, the Lord will strip her of her possessions
  - type: text
    content: 'and strike down '
  - type: note
    content: Ezek. 26:17
  - type: text
    content: her power on the sea,
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 28:18
  - type: text
    content: she shall be devoured by fire.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See Zeph. 2:4
  - type: text
    content: Ashkelon shall see it, and be afraid;
  - type: text
    content: Gaza too, and shall writhe in anguish;
  - type: text
    content: Ekron also, because its hopes are confounded.
  - type: text
    content: The king shall perish from Gaza;
  - type: text
    content: Ashkelon shall be uninhabited;
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 23:2 ]'
  - type: text
    content: a mixed people
  - type: note
    content: Or a foreign people; Hebrew a bastard
  - type: text
    content: ' shall dwell in Ashdod,'
  - type: text
    content: and I will cut off the pride of Philistia.
  '7':
  - type: text
    content: 'I will take away '
  - type: note
    content: See Lev. 3:17
  - type: text
    content: its blood from its mouth,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 66:17]'
  - type: text
    content: its abominations from between its teeth;
  - type: note
    content: '[ Isa. 14:1 ]'
  - type: text
    content: it too shall be a remnant for our God;
  - type: text
    content: 'it shall be like '
  - type: note
    content: ch. 12:5, 6
  - type: text
    content: a clan in Judah,
  - type: text
    content: and Ekron shall be like the Jebusites.
  '8':
  - type: text
    content: 'Then '
  - type: note
    content: '[ch. 2:5]'
  - type: text
    content: I will encamp at my house as a guard,
  - type: note
    content: ch. 7:14
  - type: text
    content: so that none shall march to and fro;
  - type: note
    content: ch. 10:4; [ Isa. 60:17 ]
  - type: text
    content: no oppressor shall again march over them,
  - type: note
    content: '[ch. 12:4 ]'
  - type: text
    content: for now I see with my own eyes.
  - type: heading
    content: The Coming King of Zion
  '9':
  - type: text
    content: ' '
  - type: note
    content: See Zeph. 3:14
  - type: text
    content: Rejoice greatly, O daughter of Zion!
  - type: text
    content: Shout aloud, O daughter of Jerusalem!
  - type: note
    content: Cited Matt. 21:5; [ John 12:15 ]
  - type: text
    content: 'Behold, '
  - type: note
    content: See Jer. 23:5
  - type: text
    content: your king is coming to you;
  - type: text
    content: righteous and having salvation is he,
  - type: note
    content: '[ Matt. 11:29 ]'
  - type: text
    content: humble and mounted on a donkey,
  - type: text
    content: on a colt, the foal of a donkey.
