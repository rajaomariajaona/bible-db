document_id: EXO.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Moses
  - type: text
    content: 'Now a '
  - type: note
    content: ch. 6:20; Num. 26:59; 1 Chr. 23:14
  - type: text
    content: 'man from the house of Levi went and took as his wife a Levite woman. '
  '10':
  - type: text
    content: 'When the child grew older, she brought him to Pharaoh’s daughter, and he became '
  - type: note
    content: Acts 7:21; [Heb. 11:24]
  - type: text
    content: 'her son. She named him Moses, “Because,” she said, “I '
  - type: note
    content: 2 Sam. 22:17; Ps. 18:16
  - type: text
    content: drew him out of the water.”
  - type: note
    content: Moses sounds like the Hebrew for draw out
  - type: heading
    content: Moses Flees to Midian
  '11':
  - type: text
    content: 'One day, '
  - type: note
    content: Acts 7:23; Heb. 11:24-26
  - type: text
    content: 'when Moses had grown up, he went out to his people and looked on their '
  - type: note
    content: See ch. 1:11
  - type: text
    content: burdens, and he saw an Egyptian beating a Hebrew, one of his people.
  - type: note
    content: Hebrew brothers
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'He looked this way and that, and seeing no one, he '
  - type: note
    content: Acts 7:24
  - type: text
    content: 'struck down the Egyptian and hid him in the sand. '
  '13':
  - type: text
    content: 'When '
  - type: note
    content: Acts 7:23-28
  - type: text
    content: 'he went out the next day, behold, two Hebrews were struggling together. And he said to the man in the wrong, “Why do you strike your companion?” '
  '14':
  - type: text
    content: 'He answered, '
  - type: note
    content: '[Luke 12:14]'
  - type: text
    content: '“Who made you a prince and a judge over us? Do you mean to kill me as you killed the Egyptian?” Then Moses was afraid, and thought, “Surely the thing is known.” '
  '15':
  - type: text
    content: 'When Pharaoh heard of it, he sought to kill Moses. But '
  - type: note
    content: Acts 7:29; Heb. 11:27
  - type: text
    content: 'Moses fled from Pharaoh and stayed in the land of Midian. And he sat down by '
  - type: note
    content: Gen. 24:11; 29:2
  - type: text
    content: a well.
  '16':
  - type: text
    content: 'Now the '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'priest of Midian had seven daughters, and '
  - type: note
    content: Gen. 24:11; 29:10; 1 Sam. 9:11
  - type: text
    content: 'they came and drew water and filled the troughs to water their father’s flock. '
  '17':
  - type: text
    content: 'The shepherds came and drove them away, but Moses stood up and saved them, and '
  - type: note
    content: '[Gen. 29:10]'
  - type: text
    content: 'watered their flock. '
  '18':
  - type: text
    content: 'When they came home to their father '
  - type: note
    content: Num. 10:29; [ch. 3:1; 4:18; 18:1, 5, 9, 12]
  - type: text
    content: 'Reuel, he said, “How is it that you have come home so soon today?” '
  '19':
  - type: text
    content: 'They said, “An Egyptian delivered us out of the hand of the shepherds and even drew water for us and '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'watered the flock.” '
  '2':
  - type: text
    content: 'The woman conceived and bore a son, and '
  - type: note
    content: Acts 7:20; Heb. 11:23
  - type: text
    content: 'when she saw that he was a fine child, she hid him three months. '
  '20':
  - type: text
    content: 'He said to his daughters, “Then where is he? Why have you left the man? Call him, that he may '
  - type: note
    content: Gen. 31:54; 43:25
  - type: text
    content: 'eat bread.” '
  '21':
  - type: text
    content: 'And Moses was content to dwell with the man, and he gave Moses his daughter '
  - type: note
    content: ch. 4:25; 18:2
  - type: text
    content: 'Zipporah. '
  '22':
  - type: text
    content: 'She gave birth to a son, and he called his name '
  - type: note
    content: ch. 18:3
  - type: text
    content: 'Gershom, for he said, “I have been a '
  - type: note
    content: Acts 7:29; [Heb. 11:13, 14]
  - type: text
    content: sojourner
  - type: note
    content: Gershom sounds like the Hebrew for sojourner
  - type: text
    content: ' in a foreign land.”'
  - type: heading
    content: God Hears Israel’s Groaning
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 7:7 ]; Acts 7:23, 30'
  - type: text
    content: 'During those many days the king of Egypt died, and the people of Israel '
  - type: note
    content: '[Deut. 26:7]'
  - type: text
    content: 'groaned because of their slavery and cried out for help. '
  - type: note
    content: ch. 3:9; Gen. 18:20, 21; James 5:4
  - type: text
    content: 'Their cry for rescue from slavery came up to God. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'God heard their groaning, and God '
  - type: note
    content: Ps. 105:8, 42; 106:45
  - type: text
    content: 'remembered his covenant with '
  - type: note
    content: Gen. 15:14; 46:4
  - type: text
    content: 'Abraham, with Isaac, and with Jacob. '
  '25':
  - type: text
    content: 'God '
  - type: note
    content: ch. 3:7; 4:31; [Luke 1:25]
  - type: text
    content: 'saw the people of Israel—and God '
  - type: note
    content: '[ch. 3:16]'
  - type: text
    content: knew.
  '3':
  - type: text
    content: When she could hide him no longer, she took for him a basket made of bulrushes
  - type: note
    content: Hebrew papyrus reeds
  - type: text
    content: ' and daubed it with bitumen and pitch. She put the child in it and placed it among the '
  - type: note
    content: ver. 5; Isa. 19:6
  - type: text
    content: 'reeds by the river bank. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ch. 15:20; Num. 26:59
  - type: text
    content: 'his sister stood at a distance to know what would be done to him. '
  '5':
  - type: text
    content: 'Now the daughter of Pharaoh came down to bathe at the river, while her young women walked beside the river. She saw the basket among the reeds and sent her servant woman, and she took it. '
  '6':
  - type: text
    content: 'When she opened it, she saw the child, and behold, the baby was crying. She took pity on him and said, “This is one of the Hebrews’ children.” '
  '7':
  - type: text
    content: 'Then his sister said to Pharaoh’s daughter, “Shall I go and call you a nurse from the Hebrew women to nurse the child for you?” '
  '8':
  - type: text
    content: 'And Pharaoh’s daughter said to her, “Go.” So the girl went and called the child’s mother. '
  '9':
  - type: text
    content: 'And Pharaoh’s daughter said to her, “Take this child away and nurse him for me, and I will give you your wages.” So the woman took the child and nursed him. '
