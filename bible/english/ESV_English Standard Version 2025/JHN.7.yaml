document_id: JHN.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus at the Feast of Booths
  - type: text
    content: 'After this Jesus went about in Galilee. He would not go about in Judea, because '
  - type: note
    content: ch. 5:18; 8:37, 40; 11:53
  - type: text
    content: the Jews
  - type: note
    content: Or Judeans; Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time
  - type: text
    content: ' were seeking to kill him. '
  '10':
  - type: text
    content: 'But after '
  - type: note
    content: ver. 3, 5
  - type: text
    content: 'his brothers had gone up to the feast, then he also went up, not publicly but in private. '
  '11':
  - type: note
    content: ver. 1
  - type: text
    content: 'The Jews '
  - type: note
    content: ch. 11:56
  - type: text
    content: 'were looking for him at the feast, and saying, “Where is he?” '
  '12':
  - type: text
    content: 'And there was much '
  - type: note
    content: ver. 32
  - type: text
    content: 'muttering about him among the people. '
  - type: note
    content: '[ver. 40-43]'
  - type: text
    content: 'While some said, “He is a good man,” others said, “No, '
  - type: note
    content: ver. 47
  - type: text
    content: 'he is leading the people astray.” '
  '13':
  - type: text
    content: 'Yet '
  - type: note
    content: ch. 19:38; 20:19; [ch. 9:22; 12:42]
  - type: text
    content: for fear of the Jews no one spoke openly of him.
  '14':
  - type: text
    content: 'About the middle of the feast Jesus went up '
  - type: note
    content: ver. 28
  - type: text
    content: 'into the temple and began teaching. '
  '15':
  - type: text
    content: 'The Jews therefore '
  - type: note
    content: '[ver. 46; Luke 2:47; 4:22; Acts 4:13]'
  - type: text
    content: marveled, saying, “How is it that this man has learning,
  - type: note
    content: Or this man knows his letters
  - type: text
    content: ' when he has never studied?” '
  '16':
  - type: text
    content: 'So Jesus answered them, '
  - type: note
    content: ch. 8:28; 12:49; 14:10, 24; [ch. 3:34]
  - type: text
    content: '“My teaching is not mine, but his '
  - type: note
    content: See ch. 3:17
  - type: text
    content: who sent me.
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[ch. 8:31, 32; 14:21, 23]'
  - type: text
    content: If anyone’s will is to do God’s
  - type: note
    content: Greek his
  - type: text
    content: ' '
  - type: text
    content: 'will, '
  - type: note
    content: '[ch. 8:43; Ps. 25:9; Dan. 12:10; Phil. 3:15]'
  - type: text
    content: 'he will know whether the teaching is from God or whether I '
  - type: note
    content: See ch. 5:30
  - type: text
    content: am speaking on my own authority.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'The one who speaks on his own authority '
  - type: note
    content: ch. 5:41; 8:50
  - type: text
    content: seeks his own glory; but the one who seeks the glory of him who sent him is true, and in him there is no falsehood.
  - type: text
    content: ' '
  '19':
  - type: note
    content: ver. 23; See ch. 1:17
  - type: text
    content: 'Has not Moses given you the law? Yet none of you keeps the law. '
  - type: note
    content: ver. 1
  - type: text
    content: Why do you seek to kill me?”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 5:1; 6:4
  - type: text
    content: 'the Jews’ Feast of '
  - type: note
    content: See Lev. 23:34
  - type: text
    content: 'Booths was at hand. '
  '20':
  - type: text
    content: 'The crowd answered, '
  - type: note
    content: ch. 8:48, 52; 10:20; [Matt. 11:18; Mark 3:22; Luke 7:33]
  - type: text
    content: '“You have a demon! Who is seeking to kill you?” '
  '21':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“I did '
  - type: note
    content: ver. 23; ch. 5:2-9
  - type: text
    content: one work, and you all marvel at it.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Lev. 12:3
  - type: text
    content: 'Moses gave you circumcision (not that it is from Moses, but '
  - type: note
    content: Gen. 17:10
  - type: text
    content: from the fathers), and you circumcise a man on the Sabbath.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'If on the Sabbath a man receives circumcision, so that the law of Moses may not be broken, '
  - type: note
    content: ch. 5:16; See Matt. 12:2
  - type: text
    content: are you angry with me because on the Sabbath I made a man’s whole body well?
  - type: text
    content: ' '
  '24':
  - type: note
    content: ch. 8:15; [Isa. 11:3; 2 Cor. 10:7]; See Deut. 1:16, 17
  - type: text
    content: Do not judge by appearances, but judge with right judgment.”
  - type: heading
    content: Can This Be the Christ?
  '25':
  - type: text
    content: 'Some of the people of Jerusalem therefore said, “Is not this the man whom '
  - type: note
    content: ver. 1
  - type: text
    content: 'they seek to kill? '
  '26':
  - type: text
    content: 'And here he is, '
  - type: note
    content: ch. 18:20
  - type: text
    content: 'speaking openly, and they say nothing to him! Can it be that '
  - type: note
    content: ver. 48
  - type: text
    content: 'the authorities really know that this is the Christ? '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 6:42; 8:14, 19; 9:29]'
  - type: text
    content: 'we know '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'where this man comes from, and when the Christ appears, '
  - type: note
    content: '[ver. 42]'
  - type: text
    content: 'no one will know where he comes from.” '
  '28':
  - type: text
    content: 'So Jesus proclaimed, '
  - type: note
    content: ver. 14
  - type: text
    content: 'as he taught in the temple, '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: '“You know me, and you know where I come from. But '
  - type: note
    content: ch. 8:42; [ch. 5:43]
  - type: text
    content: 'I have not come of my own accord. '
  - type: note
    content: See ch. 8:26
  - type: text
    content: 'He who sent me is true, '
  - type: note
    content: ch. 8:19; 15:21; [ch. 4:22; 8:55]
  - type: text
    content: and him you do not know.
  - type: text
    content: ' '
  '29':
  - type: note
    content: ch. 8:55; See Matt. 11:27
  - type: text
    content: 'I know him, for I come '
  - type: note
    content: ch. 6:46; 9:16, 33; [ch. 1:14]
  - type: text
    content: 'from him, and '
  - type: note
    content: See ch. 3:17
  - type: text
    content: he sent me.”
  - type: text
    content: ' '
  '3':
  - type: note
    content: ver. 5, 10; See Matt. 12:46
  - type: text
    content: So his brothers
  - type: note
    content: Or brothers and sisters; also verses 5, 10
  - type: text
    content: ' said to him, “Leave here and go to Judea, that your disciples also may see the works you are doing. '
  '30':
  - type: note
    content: ver. 44; ch. 10:39; [Matt. 21:46]
  - type: text
    content: 'So they were seeking to arrest him, but '
  - type: note
    content: ch. 8:20
  - type: text
    content: 'no one laid a hand on him, '
  - type: note
    content: ver. 6
  - type: text
    content: 'because his hour had not yet come. '
  '31':
  - type: text
    content: 'Yet '
  - type: note
    content: ch. 8:30; 10:42; 11:45; 12:11; [ch. 2:23; 12:42; Matt. 21:11]
  - type: text
    content: 'many of the people believed in him. They said, '
  - type: note
    content: Matt. 12:23
  - type: text
    content: “When the Christ appears, will he do more signs than this man has done?”
  - type: heading
    content: Officers Sent to Arrest Jesus
  '32':
  - type: text
    content: 'The Pharisees heard the crowd '
  - type: note
    content: ver. 12
  - type: text
    content: 'muttering these things about him, and the chief priests and Pharisees sent '
  - type: note
    content: ver. 45, 46
  - type: text
    content: 'officers to arrest him. '
  '33':
  - type: text
    content: 'Jesus then said, '
  - type: note
    content: ch. 12:35; 13:33; 14:19; 16:16-19
  - type: text
    content: '“I will be with you a little longer, and then '
  - type: note
    content: ch. 16:5
  - type: text
    content: I am going to him who sent me.
  - type: text
    content: ' '
  '34':
  - type: note
    content: ch. 8:21; 13:33
  - type: text
    content: You will seek me and you will not find me. Where I am you cannot come.”
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'The Jews said to one another, “Where does this man intend to go that we will not find him? '
  - type: note
    content: '[ch. 8:22]'
  - type: text
    content: 'Does he intend to go to '
  - type: note
    content: James 1:1; 1 Pet. 1:1; [Isa. 11:12; Zeph. 3:10]
  - type: text
    content: 'the Dispersion among '
  - type: note
    content: ch. 12:20
  - type: text
    content: 'the Greeks and teach the Greeks? '
  '36':
  - type: text
    content: 'What does he mean by saying, '
  - type: note
    content: ver. 34
  - type: text
    content: ‘You will seek me and you will not find me,’
  - type: text
    content: ' and, '
  - type: text
    content: ‘Where I am you cannot come’
  - type: text
    content: ?”
  - type: heading
    content: Rivers of Living Water
  '37':
  - type: text
    content: ' '
  - type: note
    content: Lev. 23:36; Num. 29:35; Neh. 8:18
  - type: text
    content: 'On the last day of the feast, the great day, Jesus stood up and cried out, '
  - type: note
    content: Isa. 55:1; See ch. 4:14
  - type: text
    content: '“If anyone thirsts, let him '
  - type: note
    content: See ch. 6:35
  - type: text
    content: come to me and drink.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Whoever believes in me, '
  - type: note
    content: '[Isa. 12:3; Ezek. 47:1]'
  - type: text
    content: as
  - type: note
    content: Or let him come to me, and let him who believes in me drink. As
  - type: text
    content: ' '
  - type: text
    content: 'the Scripture has said, '
  - type: note
    content: ch. 4:14; [Prov. 18:4]
  - type: text
    content: '‘Out of his heart will flow rivers of '
  - type: note
    content: See ch. 4:10
  - type: text
    content: living water.’”
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Now '
  - type: note
    content: Isa. 44:3; [1 Cor. 12:13; Gal. 3:14]
  - type: text
    content: 'this he said about the Spirit, '
  - type: note
    content: Joel 2:28; Acts 2:16-18; [ch. 1:33; 20:22; Luke 24:49]
  - type: text
    content: 'whom those who believed in him were to receive, '
  - type: note
    content: Acts 2:4, 33
  - type: text
    content: 'for as yet the Spirit had not been '
  - type: note
    content: ch. 3:34; Luke 11:13
  - type: text
    content: 'given, '
  - type: note
    content: ch. 14:16, 17; 16:7
  - type: text
    content: because Jesus was not yet glorified.
  - type: heading
    content: Division Among the People
  '4':
  - type: text
    content: 'For no one works in secret if he seeks to be known openly. If you do these things, '
  - type: note
    content: '[ch. 14:22; 18:20]'
  - type: text
    content: 'show yourself to the world.” '
  '40':
  - type: text
    content: 'When they heard these words, '
  - type: note
    content: See ver. 31
  - type: text
    content: 'some of the people said, “This really is '
  - type: note
    content: ch. 1:21; 6:14; See Matt. 21:11
  - type: text
    content: 'the Prophet.” '
  '41':
  - type: text
    content: 'Others said, “This is '
  - type: note
    content: ver. 26
  - type: text
    content: 'the Christ.” But some said, '
  - type: note
    content: '[ver. 52; ch. 1:46]'
  - type: text
    content: '“Is the Christ to come from Galilee? '
  '42':
  - type: text
    content: 'Has not the Scripture said that the Christ comes '
  - type: note
    content: '[Ps. 89:3, 4]; See Matt. 1:1'
  - type: text
    content: 'from the offspring of David, and comes '
  - type: note
    content: Mic. 5:2; Matt. 2:1, 5; Luke 2:4
  - type: text
    content: 'from Bethlehem, the village '
  - type: note
    content: 1 Sam. 16:1
  - type: text
    content: 'where David was?” '
  '43':
  - type: text
    content: 'So there was '
  - type: note
    content: ch. 9:16; 10:19; [ver. 12]
  - type: text
    content: 'a division among the people over him. '
  '44':
  - type: note
    content: ver. 30
  - type: text
    content: Some of them wanted to arrest him, but no one laid hands on him.
  '45':
  - type: text
    content: ' '
  - type: note
    content: ver. 32
  - type: text
    content: 'The officers then came to the chief priests and Pharisees, who said to them, “Why did you not bring him?” '
  '46':
  - type: text
    content: 'The officers answered, '
  - type: note
    content: See Matt. 7:29
  - type: text
    content: '“No one ever spoke like this man!” '
  '47':
  - type: text
    content: 'The Pharisees answered them, '
  - type: note
    content: ver. 12
  - type: text
    content: '“Have you also been deceived? '
  '48':
  - type: note
    content: 1 Cor. 1:20, 26; 2:8; [ch. 12:42]
  - type: text
    content: 'Have any of the authorities or the Pharisees believed in him? '
  '49':
  - type: text
    content: 'But this crowd that does not know the law is accursed.” '
  '5':
  - type: note
    content: '[Matt. 13:57; Mark 3:21]'
  - type: text
    content: 'For not even '
  - type: note
    content: ver. 3, 10
  - type: text
    content: 'his brothers believed in him. '
  '50':
  - type: note
    content: ch. 3:1; 19:39
  - type: text
    content: 'Nicodemus, who had gone to him before, and who was one of them, said to them, '
  '51':
  - type: note
    content: Deut. 17:6; 19:15; [Acts 23:3]
  - type: text
    content: '“Does our law judge a man without first '
  - type: note
    content: Deut. 1:16; Prov. 18:13
  - type: text
    content: 'giving him a hearing and learning what he does?” '
  '52':
  - type: text
    content: 'They replied, '
  - type: note
    content: ver. 41
  - type: text
    content: '“Are you from Galilee too? Search and see that '
  - type: note
    content: '[2 Kgs. 14:25 with Josh. 19:13]'
  - type: text
    content: no prophet arises from Galilee.”
  - type: text
    content: '[The earliest manuscripts do not include 7:53–8:11.]'
  - type: note
    content: Some manuscripts do not include 7:53–8:11; others add the passage here or after 7:36 or after 21:25 or after Luke 21:38, with variations in the text
  - type: heading
    content: The Woman Caught in Adultery
  - type: text
    content: '[['
  '53':
  - type: text
    content: They went each to his own house,
  '6':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: '[ver. 8, 30]; See ch. 2:4'
  - type: text
    content: “My time has not yet come, but your time is always here.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The world cannot hate you, but '
  - type: note
    content: ch. 15:18, 24
  - type: text
    content: 'it hates me because I testify about it that '
  - type: note
    content: ch. 3:19; [Col. 1:21; 1 John 3:12]
  - type: text
    content: its works are evil.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You go up to the feast. I am not
  - type: note
    content: Some manuscripts add yet
  - type: text
    content: ' '
  - type: text
    content: 'going up to this feast, for '
  - type: note
    content: See ch. 2:4
  - type: text
    content: my time has not yet fully come.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: After saying this, he remained in Galilee.
