  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet my kinsman Herodion. Greet those in the Lord who belong to the family of Narcissus. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet those workers in the Lord, Tryphaena and Tryphosa. Greet the beloved Persis, who has worked hard in the Lord. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet Rufus, chosen in the Lord; also his mother, who has been a mother to me as well. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers
