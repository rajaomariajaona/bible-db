document_id: JOB.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Laments His Birth
  - type: text
    content: 'After this Job '
  - type: note
    content: ch. 33:2; Ps. 78:2
  - type: text
    content: 'opened his mouth and cursed the day of his birth. '
  '10':
  - type: text
    content: because it did not shut the doors of my mother’s womb,
  - type: text
    content: nor hide trouble from my eyes.
  '11':
  - type: text
    content: '“Why '
  - type: note
    content: ch. 10:18, 19
  - type: text
    content: did I not die at birth,
  - type: text
    content: come out from the womb and expire?
  '12':
  - type: text
    content: 'Why did '
  - type: note
    content: Gen. 30:3; 50:23; Isa. 66:12
  - type: text
    content: the knees receive me?
  - type: text
    content: Or why the breasts, that I should nurse?
  '13':
  - type: text
    content: For then I would have lain down and been quiet;
  - type: text
    content: I would have slept; then I would have been at rest,
  '14':
  - type: text
    content: with kings and counselors of the earth
  - type: text
    content: 'who '
  - type: note
    content: '[Isa. 58:12]'
  - type: text
    content: rebuilt ruins for themselves,
  '15':
  - type: text
    content: or with princes who had gold,
  - type: text
    content: who filled their houses with silver.
  '16':
  - type: text
    content: 'Or why was I not as a hidden '
  - type: note
    content: Ps. 58:8; Eccles. 6:3; [1 Cor. 15:8]
  - type: text
    content: stillborn child,
  - type: text
    content: as infants who never see the light?
  '17':
  - type: text
    content: There the wicked cease from troubling,
  - type: text
    content: 'and there the weary are at '
  - type: note
    content: ch. 17:16
  - type: text
    content: rest.
  '18':
  - type: text
    content: There the prisoners are at ease together;
  - type: text
    content: 'they hear not the voice of '
  - type: note
    content: Ex. 3:7
  - type: text
    content: the taskmaster.
  '19':
  - type: text
    content: The small and the great are there,
  - type: text
    content: and the slave is free from his master.
  '2':
  - type: text
    content: 'And Job said:'
  '20':
  - type: text
    content: “Why is light given to him who is in misery,
  - type: text
    content: 'and life to '
  - type: note
    content: Prov. 31:6
  - type: text
    content: the bitter in soul,
  '21':
  - type: text
    content: 'who '
  - type: note
    content: Rev. 9:6
  - type: text
    content: long for death, but it comes not,
  - type: text
    content: 'and dig for it more than for '
  - type: note
    content: Prov. 2:4
  - type: text
    content: hidden treasures,
  '22':
  - type: text
    content: who rejoice exceedingly
  - type: text
    content: and are glad when they find the grave?
  '23':
  - type: text
    content: 'Why is light given to a man whose '
  - type: note
    content: Isa. 40:27
  - type: text
    content: way is hidden,
  - type: text
    content: 'whom God has '
  - type: note
    content: '[ch. 1:10]; See ch. 19:8'
  - type: text
    content: hedged in?
  '24':
  - type: text
    content: 'For my sighing comes '
  - type: note
    content: '[Ps. 42:3; 80:5; 102:9]'
  - type: text
    content: instead of
  - type: note
    content: Or like; Hebrew before
  - type: text
    content: ' my bread,'
  - type: text
    content: 'and my '
  - type: note
    content: Ps. 22:1; 38:8
  - type: text
    content: groanings are poured out like water.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 10:24 ]'
  - type: text
    content: For the thing that I fear comes upon me,
  - type: text
    content: and what I dread befalls me.
  '26':
  - type: text
    content: I am not at ease, nor am I quiet;
  - type: text
    content: I have no rest, but trouble comes.”
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 10:18, 19 ]; See Jer. 20:14-18'
  - type: text
    content: “Let the day perish on which I was born,
  - type: text
    content: and the night that said,
  - type: text
    content: ‘A man is conceived.’
  '4':
  - type: text
    content: Let that day be darkness!
  - type: text
    content: May God above not seek it,
  - type: text
    content: nor light shine upon it.
  '5':
  - type: text
    content: 'Let gloom and '
  - type: note
    content: ch. 10:21, 22; 12:22; 24:17; 28:3; 34:22; 38:17; Ps. 23:4; Isa. 9:2; Matt. 4:16
  - type: text
    content: deep darkness claim it.
  - type: text
    content: Let clouds dwell upon it;
  - type: text
    content: let the blackness of the day terrify it.
  '6':
  - type: text
    content: That night—let thick darkness seize it!
  - type: text
    content: Let it not rejoice among the days of the year;
  - type: text
    content: let it not come into the number of the months.
  '7':
  - type: text
    content: Behold, let that night be barren;
  - type: text
    content: let no joyful cry enter it.
  '8':
  - type: text
    content: Let those curse it who curse the day,
  - type: text
    content: 'who are ready to rouse up '
  - type: note
    content: ch. 41:1
  - type: text
    content: Leviathan.
  '9':
  - type: text
    content: Let the stars of its dawn be dark;
  - type: text
    content: let it hope for light, but have none,
  - type: text
    content: 'nor see '
  - type: note
    content: ch. 41:18
  - type: text
    content: the eyelids of the morning,
