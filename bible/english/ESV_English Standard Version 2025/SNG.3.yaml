document_id: SNG.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bride’s Dream
  - type: text
    content: 'On my bed '
  - type: note
    content: Isa. 26:9
  - type: text
    content: by night
  - type: text
    content: 'I sought '
  - type: note
    content: ch. 1:7
  - type: text
    content: him whom my soul loves;
  - type: note
    content: ch. 5:6; [ John 7:34 ]
  - type: text
    content: I sought him, but found him not.
  '10':
  - type: text
    content: He made its posts of silver,
  - type: text
    content: its back of gold, its seat of purple;
  - type: text
    content: its interior was inlaid with love
  - type: text
    content: 'by '
  - type: note
    content: See ch. 1:5
  - type: text
    content: the daughters of Jerusalem.
  '11':
  - type: text
    content: 'Go out, O '
  - type: note
    content: Isa. 3:16, 17; 4:4
  - type: text
    content: daughters of Zion,
  - type: text
    content: and look upon King Solomon,
  - type: text
    content: with the crown with which his mother crowned him
  - type: text
    content: 'on '
  - type: note
    content: '[Isa. 62:5]'
  - type: text
    content: the day of his wedding,
  - type: text
    content: on the day of the gladness of his heart.
  '2':
  - type: text
    content: I will rise now and go about the city,
  - type: text
    content: 'in '
  - type: note
    content: Jer. 5:1
  - type: text
    content: the streets and in the squares;
  - type: text
    content: 'I will seek '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: him whom my soul loves.
  - type: text
    content: I sought him, but found him not.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:7
  - type: text
    content: The watchmen found me
  - type: text
    content: as they went about in the city.
  - type: text
    content: “Have you seen him whom my soul loves?”
  '4':
  - type: text
    content: Scarcely had I passed them
  - type: text
    content: 'when I found '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: him whom my soul loves.
  - type: text
    content: 'I '
  - type: note
    content: '[Job 27:6]'
  - type: text
    content: held him, and would not let him go
  - type: text
    content: 'until I had '
  - type: note
    content: ch. 8:2
  - type: text
    content: brought him into my mother’s house,
  - type: text
    content: 'and into the chamber of '
  - type: note
    content: '[Hos. 2:5]'
  - type: text
    content: her who conceived me.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'I adjure you, '
  - type: note
    content: See ch. 1:5
  - type: text
    content: O daughters of Jerusalem,
  - type: note
    content: See ch. 2:9
  - type: text
    content: by the gazelles or the does of the field,
  - type: text
    content: that you not stir up or awaken love
  - type: text
    content: until it pleases.
  - type: heading
    content: Solomon Arrives for the Wedding
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:5; [ch. 6:10; Isa. 60:8 ]
  - type: text
    content: What is that coming up from the wilderness
  - type: text
    content: 'like '
  - type: note
    content: Ex. 13:21; Joel 2:30
  - type: text
    content: columns of smoke,
  - type: text
    content: 'perfumed with '
  - type: note
    content: ch. 4:6, 14; Matt. 2:11; John 19:39
  - type: text
    content: myrrh and frankincense,
  - type: text
    content: with all the fragrant powders of a merchant?
  '7':
  - type: text
    content: Behold, it is the litter
  - type: note
    content: That is, the couch on which servants carry a king
  - type: text
    content: ' of Solomon!'
  - type: text
    content: 'Around it are '
  - type: note
    content: ch. 6:8
  - type: text
    content: 'sixty '
  - type: note
    content: 2 Sam. 23:8; 1 Chr. 11:10
  - type: text
    content: mighty men,
  - type: text
    content: some of the mighty men of Israel,
  '8':
  - type: text
    content: all of them wearing swords
  - type: text
    content: and expert in war,
  - type: text
    content: 'each with his '
  - type: note
    content: Ps. 45:3
  - type: text
    content: sword at his thigh,
  - type: text
    content: 'against '
  - type: note
    content: Ps. 91:5
  - type: text
    content: terror by night.
  '9':
  - type: text
    content: King Solomon made himself a carriage
  - type: note
    content: Or sedan chair
  - type: text
    content: from the wood of Lebanon.
