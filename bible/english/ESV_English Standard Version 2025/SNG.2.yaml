    content: Hebrew the house of wine
  - type: text
    content: 'and his '
  - type: note
    content: '[Ps. 20:5]'
  - type: text
    content: banner over me was love.
  '5':
  - type: text
    content: 'Sustain me with '
  - type: note
    content: 2 Sam. 6:19; 1 Chr. 16:3; Hos. 3:1
  - type: text
    content: raisins;
  - type: text
    content: refresh me with apples,
  - type: note
    content: ch. 5:8
  - type: text
    content: for I am sick with love.
  '6':
  - type: text
    content: 'His '
  - type: note
    content: ch. 8:3; [Deut. 33:27]
  - type: text
    content: left hand is under my head,
  - type: text
    content: 'and his right hand '
  - type: note
    content: '[Prov. 4:8]'
  - type: text
    content: embraces me!
  '7':
  - type: text
    content: 'I '
  - type: note
    content: ch. 3:5; 5:8, 9; 8:4
  - type: text
    content: adjure you,
  - type: note
    content: That is, I put you on oath; so throughout the Song
  - type: text
    content: ' O '
  - type: note
    content: See ch. 1:5
  - type: text
    content: daughters of Jerusalem,
  - type: text
    content: 'by '
  - type: note
    content: See ver. 9
  - type: text
    content: the gazelles or the does of the field,
  - type: text
    content: that you not stir up or awaken love
  - type: text
    content: until it pleases.
  - type: heading
    content: The Bride Adores Her Beloved
  '8':
  - type: text
    content: The voice of my beloved!
  - type: text
    content: Behold, he comes,
  - type: text
    content: 'leaping '
  - type: note
    content: '[Isa. 52:7]'
  - type: text
    content: over the mountains,
  - type: text
    content: bounding over the hills.
  '9':
  - type: text
    content: 'My beloved is like '
  - type: note
    content: ch. 4:5; 7:3; 8:14; 2 Sam. 2:18; 1 Chr. 12:8; [Ps. 18:33; Hab. 3:19]
  - type: text
    content: a gazelle
  - type: text
    content: or a young stag.
  - type: text
    content: Behold, there he stands
  - type: text
    content: behind our wall,
  - type: text
    content: gazing through the windows,
  - type: text
    content: looking through the lattice.
