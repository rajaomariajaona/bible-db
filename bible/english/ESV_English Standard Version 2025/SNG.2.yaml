  - type: text
    content: that spoil the vineyards,
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: for our vineyards are in blossom.”
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:3; 7:10
  - type: text
    content: My beloved is mine, and I am his;
  - type: text
    content: 'he '
