  '2':
  - type: text
    content: As a lily among brambles,
  - type: text
    content: 'so is '
  - type: note
    content: See ch. 1:15
  - type: text
    content: my love among the young women.
  - type: heading
    content: She
  '3':
  - type: text
    content: As an apple tree among the trees of the forest,
  - type: text
    content: 'so is my '
  - type: note
    content: ch. 1:16
  - type: text
    content: beloved among the young men.
  - type: text
    content: 'With great delight I sat '
  - type: note
    content: Isa. 25:4; 32:2
  - type: text
    content: in his shadow,
  - type: text
    content: 'and his '
  - type: note
    content: '[Rev. 22:2]'
  - type: text
    content: fruit was sweet to my taste.
  '4':
  - type: text
    content: 'He '
  - type: note
    content: ch. 1:4
  - type: text
    content: brought me to the banqueting house,
