verses:
  '1':
  - type: heading
    content: The Lord Rebukes the Priests
  - type: text
    content: '“And now, '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'O priests, '
  - type: note
    content: ver. 4
  - type: text
    content: 'this command is for you. '
  '10':
  - type: text
    content: 'Have we not all '
  - type: note
    content: 1 Cor. 8:6; Eph. 4:6
  - type: text
    content: 'one Father? Has not '
  - type: note
    content: Acts 17:26
  - type: text
    content: 'one God created us? Why then are we '
  - type: note
    content: '[Isa. 21:2; 24:16; 33:1]'
  - type: text
    content: 'faithless to one another, profaning the covenant of our fathers? '
  '11':
  - type: text
    content: 'Judah has been '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'faithless, and abomination has been committed in Israel and in Jerusalem. For '
  - type: note
    content: See Ezra 9:2
  - type: text
    content: 'Judah has profaned the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he loves, and has married the daughter of a foreign god. '
  '12':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' cut off from the tents of Jacob any descendant'
  - type: note
    content: Hebrew any who wakes and answers
  - type: text
    content: ' of the man who does this, who '
  - type: note
    content: '[ch. 1:7]'
  - type: text
    content: 'brings an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts!'
  '13':
  - type: text
    content: 'And this second thing you do. '
  - type: note
    content: '[Zech. 7:3]'
  - type: text
    content: 'You cover the '
  - type: text
    content: Lord
  - type: text
    content: '’s altar with tears, with weeping and groaning because he no longer regards the offering or accepts it with favor from your hand. '
  '14':
  - type: note
    content: '[ch. 1:2]'
  - type: text
    content: 'But you say, “Why does he not?” Because the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 3:5
  - type: text
    content: 'was witness between you and the wife of your youth, '
  - type: note
    content: '[ver. 11; Isa. 54:6]'
  - type: text
    content: 'to whom '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'you have been faithless, though she is your companion and your wife by covenant. '
  '15':
  - type: note
    content: Matt. 19:4, 5; See Gen. 2:24
  - type: text
    content: Did he not make them one, with a portion of the Spirit in their union?
  - type: note
    content: Hebrew in it
  - type: text
    content: ' And what was the one God'
  - type: note
    content: Hebrew the one
  - type: text
    content: ' seeking?'
  - type: note
    content: Or And not one has done this who has a portion of the Spirit. And what was that one seeking?
  - type: text
    content: ' '
  - type: note
    content: '[Ezra 9:2]'
  - type: text
    content: Godly offspring. So guard yourselves
  - type: note
    content: Or So take care; also verse 16
  - type: text
    content: ' in your spirit, and let none of you be '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'faithless to the wife of your youth. '
  '16':
  - type: text
    content: '“For '
  - type: note
    content: Matt. 5:32; Mark 10:9, 11; Luke 16:18; 1 Cor. 7:10
  - type: text
    content: the man who does not love his wife but divorces her,
  - type: note
    content: Hebrew who hates and divorces
  - type: text
    content: ' says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, covers'
  - type: note
    content: Probable meaning (compare Septuagint and Deuteronomy 24:1–4); or “The Lord, the God of Israel, says that he hates divorce, and him who covers
  - type: text
    content: ' his garment with violence, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. So guard yourselves in your spirit, and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: do not be faithless.”
  - type: heading
    content: The Messenger of the Lord
  '17':
  - type: text
    content: ' '
  - type: note
    content: Isa. 43:24
  - type: text
    content: 'You have wearied the '
  - type: text
    content: Lord
  - type: text
    content: ' with your words. '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'But you say, “How have we wearied him?” '
  - type: note
    content: '[ch. 3:15; Isa. 5:20]'
  - type: text
    content: 'By saying, “Everyone who does evil is good in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he delights in them.” Or by asking, '
  - type: note
    content: '[ch. 3:1; 2 Pet. 3:4]'
  - type: text
    content: “Where is the God of justice?”
  '2':
  - type: note
    content: Lev. 26:14; See Deut. 28:15
  - type: text
    content: 'If you will not listen, if you will not take it to heart to give honor to my name, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, then I will send '
  - type: note
    content: '[ch. 3:9]'
  - type: text
    content: 'the curse upon you and I will curse '
  - type: note
    content: '[Ps. 69:22]'
  - type: text
    content: 'your blessings. Indeed, I have already cursed them, because you do not lay it to heart. '
  '3':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Joel 1:17; Hag. 2:17]'
  - type: text
    content: I will rebuke your offspring,
  - type: note
    content: Hebrew seed
  - type: text
    content: ' and '
  - type: note
    content: Nah. 3:6
  - type: text
    content: 'spread dung on your faces, the '
  - type: note
    content: '[Ex. 29:14]'
  - type: text
    content: dung of your offerings, and you shall be taken away with it.
  - type: note
    content: Or to it
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'So shall you know that I have sent '
  - type: note
    content: ver. 1
  - type: text
    content: 'this command to you, that '
  - type: note
    content: ver. 8; Num. 25:12, 13; Neh. 13:29; [Num. 3:45]
  - type: text
    content: 'my covenant with Levi may stand, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '5':
  - type: text
    content: 'My covenant with him was one of life and '
  - type: note
    content: See Isa. 54:10
  - type: text
    content: 'peace, and I gave them to him. '
  - type: note
    content: '[Lev. 16:2]'
  - type: text
    content: 'It was a covenant of fear, and he feared me. He stood in awe of my name. '
  '6':
  - type: note
    content: '[Deut. 33:10]'
  - type: text
    content: True instruction
  - type: note
    content: Or law; also verses 7, 8, 9
  - type: text
    content: ' was in his mouth, and no wrong was found on his lips. He walked with me in peace and uprightness, and he '
  - type: note
    content: '[Dan. 12:3; James 5:20]'
  - type: text
    content: 'turned many from iniquity. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: Deut. 17:9; See Lev. 10:11
  - type: text
    content: the lips of a priest should guard knowledge, and people
  - type: note
    content: Hebrew they
  - type: text
    content: ' should seek instruction from his mouth, for he is the messenger of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '8':
  - type: text
    content: 'But you have turned aside from the way. '
  - type: note
    content: '[1 Sam. 2:17; Jer. 18:15; Ezek. 22:26]'
  - type: text
    content: 'You have caused many to stumble by your instruction. You have corrupted '
  - type: note
    content: See ver. 4
  - type: text
    content: 'the covenant of Levi, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  '9':
  - type: text
    content: 'and so '
  - type: note
    content: '[1 Sam. 2:30]'
  - type: text
    content: 'I make you despised and abased before all the people, inasmuch as you do not keep my ways but '
  - type: note
    content: Deut. 1:17; 16:19
  - type: text
    content: show partiality in your instruction.”
  - type: heading
    content: Judah Profaned the Covenant
