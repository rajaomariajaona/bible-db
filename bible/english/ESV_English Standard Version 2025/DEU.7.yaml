document_id: DEU.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Chosen People
  - type: text
    content: '“When the '
  - type: note
    content: ch. 31:3; Ps. 44:2, 3
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land that you are entering to take possession of it, and clears away many nations before you, '
  - type: note
    content: See Ex. 23:23
  - type: text
    content: 'the Hittites, the Girgashites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites, seven nations '
  - type: note
    content: ch. 4:38; 9:1; 11:23
  - type: text
    content: 'more numerous and mightier than you, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: Job 34:11; Isa. 59:18; Nah. 1:2, 3
  - type: text
    content: 'repays to their face those who hate him, by destroying them. '
  - type: note
    content: '[2 Pet. 3:9]'
  - type: text
    content: 'He will not be slack with one who hates him. He will repay him to his face. '
  '11':
  - type: note
    content: ch. 10:13
  - type: text
    content: You shall therefore be careful to do the commandment and the statutes and the rules that I command you today.
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-16, see ch. 28:1-14; Lev. 26:3-13
  - type: text
    content: '“And because you listen to these rules and keep and do them, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will keep with you '
  - type: note
    content: Ps. 105:8; Luke 1:55, 72
  - type: text
    content: 'the covenant and the steadfast love that he swore to your fathers. '
  '13':
  - type: text
    content: 'He will '
  - type: note
    content: '[John 14:21]'
  - type: text
    content: 'love you, bless you, and multiply you. '
  - type: note
    content: ch. 30:9
  - type: text
    content: 'He will also bless the fruit of your womb and the fruit of your ground, your grain and your wine and your oil, the increase of your herds and the young of your flock, in the land that he swore to your fathers to give you. '
  '14':
  - type: text
    content: 'You shall be blessed above all peoples. '
  - type: note
    content: Ex. 23:26
  - type: text
    content: 'There shall not be male or female barren among you or among your livestock. '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will take away from you all sickness, and none of the evil '
  - type: note
    content: ch. 28:27, 60; Ex. 9:14; 15:26
  - type: text
    content: 'diseases of Egypt, which you knew, will he inflict on you, but he will lay them on all who hate you. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ver. 2
  - type: text
    content: 'you shall consume all the peoples that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will give over to you. '
  - type: note
    content: ch. 13:8; 19:13, 21; 25:12
  - type: text
    content: 'Your eye shall not pity them, neither shall you serve their gods, for that would be '
  - type: note
    content: ver. 25; ch. 12:30; Judg. 8:27; See Ex. 23:33
  - type: text
    content: a snare to you.
  '17':
  - type: text
    content: '“If you say in your heart, ‘These nations are greater than I. How can I dispossess them?’ '
  '18':
  - type: note
    content: ch. 1:29; 31:6
  - type: text
    content: 'you shall not be afraid of them but you shall '
  - type: note
    content: Ps. 77:11; 105:5
  - type: text
    content: 'remember what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did to Pharaoh and to all Egypt, '
  '19':
  - type: text
    content: 'the great trials that your eyes saw, '
  - type: note
    content: ch. 6:22; 11:3
  - type: text
    content: 'the signs, the wonders, the mighty hand, and the outstretched arm, by which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brought you out. So will the '
  - type: text
    content: Lord
  - type: text
    content: ' your God do to all the peoples of whom you are afraid. '
  '2':
  - type: note
    content: ver. 23; ch. 23:14
  - type: text
    content: 'and when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives them over to you, and you defeat them, then you must '
  - type: note
    content: ch. 20:17; Ex. 22:20; Lev. 27:29; Num. 21:2, 3
  - type: text
    content: devote them to complete destruction.
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction)
  - type: text
    content: ' '
  - type: note
    content: Ex. 23:32; 34:12; Judg. 2:2; [ch. 20:10; Josh. 2:14; 9:18; Judg. 1:24]
  - type: text
    content: 'You shall make no covenant with them and show no mercy to them. '
  '20':
  - type: text
    content: 'Moreover, '
  - type: note
    content: Ex. 23:28; Josh. 24:12
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will send hornets among them, until those who are left and hide themselves from you are destroyed. '
  '21':
  - type: text
    content: 'You shall not be in dread of them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is '
  - type: note
    content: ch. 6:15; Num. 11:20; 14:14; Josh. 3:10
  - type: text
    content: 'in your midst, '
  - type: note
    content: ch. 10:17; Neh. 1:5; 4:14; 9:32; [ch. 28:58]
  - type: text
    content: 'a great and awesome God. '
  '22':
  - type: note
    content: Ex. 23:29, 30
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will clear away these nations before you little by little. You may not make an end of them at once,'
  - type: note
    content: Or quickly
  - type: text
    content: ' lest the wild beasts grow too numerous for you. '
  '23':
  - type: note
    content: ver. 2
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will give them over to you and throw them into great confusion, until they are destroyed. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 10:24, 42; 11:12; See Josh. 12:1
  - type: text
    content: 'he will give their kings into your hand, and you shall '
  - type: note
    content: See ch. 9:14
  - type: text
    content: 'make their name perish from under heaven. '
  - type: note
    content: ch. 11:25; Josh. 1:5; 10:8; 23:9
  - type: text
    content: 'No one shall be able to stand against you until you have destroyed them. '
  '25':
  - type: text
    content: 'The carved images of their gods '
  - type: note
    content: ver. 5; ch. 12:3; [Ex. 32:20; 1 Chr. 14:12]
  - type: text
    content: 'you shall burn with fire. You '
  - type: note
    content: '[Josh. 7:1, 21]'
  - type: text
    content: 'shall not covet the silver or the gold that is on them or take it for yourselves, lest you be '
  - type: note
    content: See ver. 16
  - type: text
    content: 'ensnared by it, for it is an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '26':
  - type: text
    content: And you shall not bring an abominable thing into your house and become devoted to destruction
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction); twice in this verse
  - type: text
    content: ' like it. You shall utterly detest and abhor it, '
  - type: note
    content: ch. 13:17; Lev. 27:28; Josh. 6:17, 18; 7:1; [Mic. 4:13]
  - type: text
    content: for it is devoted to destruction.
  '3':
  - type: note
    content: Ex. 34:16; Josh. 23:12, 13; 1 Kgs. 11:2; [Ezra 9:2]
  - type: text
    content: 'You shall not intermarry with them, giving your daughters to their sons or taking their daughters for your sons, '
  '4':
  - type: text
    content: 'for they would turn away your sons from following me, to serve other gods. '
  - type: note
    content: ch. 6:15
  - type: text
    content: 'Then the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' would be kindled against you, and he would destroy you '
  - type: note
    content: '[ch. 4:26; 28:20]'
  - type: text
    content: 'quickly. '
  '5':
  - type: text
    content: 'But thus shall you deal with them: '
  - type: note
    content: See Ex. 34:13
  - type: text
    content: 'you shall break down their altars and dash in pieces their '
  - type: note
    content: See Ex. 34:13
  - type: text
    content: 'pillars and chop down their '
  - type: note
    content: See Ex. 34:13
  - type: text
    content: 'Asherim and '
  - type: note
    content: ver. 25
  - type: text
    content: burn their carved images with fire.
  '6':
  - type: text
    content: '“For '
  - type: note
    content: ch. 14:2; 26:19; 28:9; Ex. 19:6; 22:31; Jer. 2:3; Amos 3:2; 1 Pet. 2:9; See Ex. 19:5
  - type: text
    content: 'you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen you to be '
  - type: note
    content: ch. 14:2; 26:19; 28:9; Ex. 19:6; 22:31; Jer. 2:3; Amos 3:2; 1 Pet. 2:9; See Ex. 19:5
  - type: text
    content: 'a people for his treasured possession, out of all the peoples who are on the face of the earth. '
  '7':
  - type: text
    content: 'It was not because you were more in number than any other people that the '
  - type: text
    content: Lord
  - type: text
    content: ' set his love on you and chose you, for you were the fewest of all peoples, '
  '8':
  - type: text
    content: 'but '
  - type: note
    content: ch. 10:15; Isa. 43:4; 63:9; Jer. 31:3; Hos. 11:1; Mal. 1:2
  - type: text
    content: 'it is because the '
  - type: text
    content: Lord
  - type: text
    content: ' loves you and is keeping '
  - type: note
    content: Ex. 32:13; Ps. 105:9-11; Luke 1:72, 73
  - type: text
    content: 'the oath that he swore to your fathers, that the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought you out with a mighty hand and redeemed you from the house of slavery, from the hand of Pharaoh king of Egypt. '
  '9':
  - type: text
    content: 'Know therefore that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is God, '
  - type: note
    content: Isa. 49:7; 1 Cor. 1:9; 10:13; 2 Cor. 1:18; 1 Thess. 5:24; 2 Thess. 3:3; 2 Tim. 2:13; Heb. 10:23; 1 John 1:9
  - type: text
    content: 'the faithful God '
  - type: note
    content: ch. 5:10; Ex. 20:6; 2 Chr. 6:14; Neh. 1:5; 9:32; Dan. 9:4
  - type: text
    content: 'who keeps covenant and steadfast love with those who love him and keep his commandments, to a thousand generations, '
