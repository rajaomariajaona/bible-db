    content: fill cups of mixed wine for Destiny,
  '12':
  - type: text
    content: I will destine you to the sword,
  - type: text
    content: and all of you shall bow down to the slaughter,
  - type: note
    content: ch. 66:4; Prov. 1:24; Jer. 7:13
  - type: text
    content: because, when I called, you did not answer;
  - type: text
    content: when I spoke, you did not listen,
  - type: note
    content: ch. 66:4
  - type: text
    content: but you did what was evil in my eyes
  - type: text
    content: and chose what I did not delight in.”
  '13':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“Behold, '
  - type: note
    content: ch. 55:1; Ps. 22:26
  - type: text
    content: my servants shall eat,
  - type: text
    content: but you shall be hungry;
  - type: text
    content: behold, my servants shall drink,
  - type: text
    content: but you shall be thirsty;
  - type: text
    content: behold, my servants shall rejoice,
  - type: text
    content: but you shall be put to shame;
  '14':
  - type: text
    content: 'behold, '
  - type: note
    content: '[Ps. 5:11]'
  - type: text
    content: my servants shall sing for gladness of heart,
  - type: text
    content: but you shall cry out for pain of heart
  - type: text
    content: and shall wail for breaking of spirit.
  '15':
  - type: text
    content: 'You shall leave your name to '
  - type: note
    content: ver. 9
  - type: text
    content: 'my chosen '
  - type: note
    content: '[Deut. 28:37; Jer. 29:22; Zech. 8:13]'
  - type: text
    content: for a curse,
  - type: text
    content: 'and the Lord '
  - type: text
    content: God
  - type: text
    content: ' will put you to death,'
  - type: text
    content: 'but his servants '
  - type: note
    content: ch. 62:2
  - type: text
    content: he will call by another name,
  '16':
  - type: text
    content: 'so that he who '
  - type: note
    content: Jer. 4:2
  - type: text
    content: blesses himself in the land
  - type: text
    content: 'shall bless himself by '
  - type: note
    content: Jer. 4:2
  - type: text
    content: the God of truth,
  - type: text
    content: and he who takes an oath in the land
  - type: text
    content: 'shall swear by '
  - type: note
    content: '[Deut. 32:4]'
  - type: text
    content: the God of truth;
  - type: note
    content: '[ch. 43:18, 19 ]'
  - type: text
    content: because the former troubles are forgotten
  - type: text
    content: and are hidden from my eyes.
  - type: heading
    content: New Heavens and a New Earth
  '17':
  - type: text
    content: '“For behold, '
  - type: note
    content: ch. 66:22; 2 Pet. 3:13; Rev. 21:1
  - type: text
    content: I create new heavens
  - type: text
    content: and a new earth,
  - type: text
    content: and the former things shall not be remembered
  - type: text
    content: or come into mind.
  '18':
  - type: text
    content: But be glad and rejoice forever
  - type: text
    content: in that which I create;
  - type: text
    content: 'for behold, '
  - type: note
    content: '[Jer. 31:7]'
  - type: text
    content: I create Jerusalem to be a joy,
  - type: text
    content: and her people to be a gladness.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 62:5; 66:10
  - type: text
    content: I will rejoice in Jerusalem
  - type: text
    content: and be glad in my people;
  - type: note
    content: ch. 35:10; Rev. 21:4
  - type: text
    content: no more shall be heard in it the sound of weeping
  - type: text
    content: and the cry of distress.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Rom. 10:21
  - type: text
    content: I spread out my hands all the day
  - type: text
    content: to a rebellious people,
  - type: text
    content: who walk in a way that is not good,
  - type: text
    content: following their own devices;
  '20':
  - type: text
    content: No more shall there be in it
  - type: text
    content: an infant who lives but a few days,
  - type: text
    content: or an old man who does not fill out his days,
  - type: text
    content: 'for '
  - type: note
    content: '[Prov. 3:2]'
  - type: text
    content: the young man shall die a hundred years old,
  - type: text
    content: 'and '
  - type: note
    content: Eccles. 8:12
  - type: text
    content: the sinner a hundred years old shall be accursed.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 28:26; [ Deut. 28:30 ]
  - type: text
    content: They shall build houses and inhabit them;
  - type: text
    content: they shall plant vineyards and eat their fruit.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: They shall not build and another inhabit;
  - type: text
    content: they shall not plant and another eat;
  - type: note
    content: See Ps. 92:12-14
  - type: text
    content: for like the days of a tree shall the days of my people be,
  - type: text
    content: and my chosen shall long enjoy
  - type: note
    content: Hebrew shall wear out
  - type: text
    content: ' the work of their hands.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 49:4
  - type: text
    content: They shall not labor in vain
  - type: note
    content: '[ Deut. 28:41 ]'
  - type: text
    content: or bear children for calamity,
  - type: note
    content: Or for sudden terror
  - type: text
    content: 'for '
  - type: note
    content: ch. 61:9; See Ps. 115:12-15
  - type: text
    content: 'they shall be the offspring of the blessed of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and their descendants with them.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 32:5 ]'
  - type: text
    content: Before they call I will answer;
  - type: note
    content: '[ Dan. 9:21 ]'
  - type: text
    content: while they are yet speaking I will hear.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:6, 7
  - type: text
    content: The wolf and the lamb shall graze together;
  - type: text
    content: the lion shall eat straw like the ox,
  - type: text
    content: 'and '
  - type: note
    content: Gen. 3:14; Mic. 7:17
  - type: text
    content: dust shall be the serpent’s food.
  - type: note
    content: ch. 11:9
  - type: text
    content: They shall not hurt or destroy
  - type: text
    content: in all my holy mountain,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: a people who provoke me
  - type: text
    content: to my face continually,
  - type: note
    content: ch. 1:29; 66:17; [ch. 57:3-6 ]
  - type: text
    content: sacrificing in gardens
  - type: text
    content: and making offerings on bricks;
  '4':
  - type: text
    content: who sit in tombs,
  - type: text
    content: and spend the night in secret places;
  - type: note
    content: ch. 66:17
  - type: text
    content: who eat pig’s flesh,
  - type: text
    content: and broth of tainted meat is in their vessels;
  '5':
  - type: text
    content: who say, “Keep to yourself,
  - type: text
    content: do not come near me, for I am too holy for you.”
  - type: note
    content: ch. 1:31; 9:18
  - type: text
    content: These are a smoke in my nostrils,
  - type: text
    content: a fire that burns all the day.
  '6':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Jer. 2:22; 17:1]'
  - type: text
    content: 'it is written before me:'
  - type: note
    content: Ps. 50:3
  - type: text
    content: “I will not keep silent, but I will repay;
  - type: note
    content: Ps. 79:12; [ Jer. 16:18 ]
  - type: text
    content: I will indeed repay into their lap
  '7':
  - type: text
    content: 'both your iniquities '
  - type: note
    content: Ex. 20:5; [Matt. 23:35]
  - type: text
    content: and your fathers’ iniquities together,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: '[ Ezek. 20:27, 28 ]'
  - type: text
    content: because they made offerings on the mountains
  - type: note
    content: '[ Ezek. 20:27, 28 ]'
  - type: text
    content: and insulted me on the hills,
  - type: text
    content: I will measure into their lap
  - type: text
    content: payment for their former deeds.”
  - type: note
    content: Or I will first measure their payment into their lap
  '8':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: '[ch. 17:6 ]'
  - type: text
    content: “As the new wine is found in the cluster,
  - type: text
    content: and they say, ‘Do not destroy it,
  - type: text
    content: for there is a blessing in it,’
  - type: text
    content: so I will do for my servants’ sake,
  - type: note
    content: '[ch. 2:21 ]'
  - type: text
    content: and not destroy them all.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 27:6; 37:31 ]'
  - type: text
    content: I will bring forth offspring from Jacob,
  - type: text
    content: and from Judah possessors of my mountains;
  - type: text
    content: my chosen shall possess it,
  - type: text
    content: and my servants shall dwell there.
