  - type: text
    content: those who did not ask for me;
  - type: text
    content: I was ready to be found by those who did not seek me.
  - type: text
    content: I said, “Here I am, here I am,”
  - type: text
    content: to a nation that was not called by
  - type: note
    content: Or that did not call upon
  - type: text
    content: ' my name.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 33:9; 35:2
  - type: text
    content: Sharon shall become a pasture for flocks,
  - type: text
    content: 'and '
  - type: note
    content: Hos. 2:15; [Josh. 7:26]
  - type: text
    content: the Valley of Achor a place for herds to lie down,
  - type: text
    content: 'for my people '
  - type: note
    content: '[ch. 51:1]'
  - type: text
    content: who have sought me.
  '11':
  - type: text
    content: 'But '
  - type: note
    content: '[Josh. 24:20]'
  - type: text
    content: 'you who forsake the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'who forget '
