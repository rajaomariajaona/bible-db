document_id: 1SA.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hannah’s Prayer
  - type: text
    content: And Hannah prayed and said,
  - type: note
    content: For ver. 1-10, see Luke 1:46-53
  - type: text
    content: '“My heart exults in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: ver. 10 ; Ps. 75:10; 89:17, 24; 92:10; 112:9; 148:14
  - type: text
    content: 'my horn is exalted in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: My mouth derides my enemies,
  - type: text
    content: 'because '
  - type: note
    content: Ps. 9:14; 13:5; 20:5; 35:9
  - type: text
    content: I rejoice in your salvation.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 2:9
  - type: text
    content: 'The adversaries of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be broken to pieces;'
  - type: note
    content: ch. 7:10; Ps. 18:13; [ 2 Sam. 22:14 ]
  - type: text
    content: against them he will thunder in heaven.
  - type: note
    content: Ps. 96:10, 13; 98:9
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will judge the ends of the earth;'
  - type: text
    content: he will give strength to his king
  - type: note
    content: ver. 1 ; [Ps. 89:24]
  - type: text
    content: and exalt the horn of his anointed.”
  '11':
  - type: text
    content: 'Then Elkanah went home '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'to Ramah. '
  - type: note
    content: ver. 18; ch. 3:1
  - type: text
    content: And the boy
  - type: note
    content: Hebrew na‘ar can be rendered boy (2:11, 18, 21, 26; 3:1, 8), servant (2:13, 15), or young man (2:17), depending on the context
  - type: text
    content: ' was ministering to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of Eli the priest.'
  - type: heading
    content: Eli’s Worthless Sons
  '12':
  - type: text
    content: 'Now the sons of Eli were '
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'worthless men. '
  - type: note
    content: Judg. 2:10
  - type: text
    content: 'They did not know the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'The custom of the priests with the people was that when any man offered sacrifice, the priest’s servant would come, while the meat was boiling, with a three-pronged fork in his hand, '
  '14':
  - type: text
    content: 'and he would thrust it into the pan or kettle or cauldron or pot. All that the fork brought up the priest would take for himself. This is what they did at Shiloh to all the Israelites who came there. '
  '15':
  - type: text
    content: 'Moreover, '
  - type: note
    content: Lev. 3:5, 16; 7:23, 25, 31
  - type: text
    content: 'before the fat was burned, the priest’s servant would come and say to the man who was sacrificing, “Give meat for the priest to roast, for he will not accept boiled meat from you but only raw.” '
  '16':
  - type: text
    content: 'And if the man said to him, “Let them burn the fat first, and then take as much as you wish,” he would say, “No, you must give it now, and if not, I will take it by force.” '
  '17':
  - type: text
    content: 'Thus the sin of the young men was very great '
  - type: note
    content: '[Gen. 6:11]'
  - type: text
    content: 'in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Mal. 2:8]'
  - type: text
    content: 'for the men treated the offering of the '
  - type: text
    content: Lord
  - type: text
    content: ' with contempt.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 11 ; ch. 3:1
  - type: text
    content: 'Samuel was ministering before the '
  - type: text
    content: Lord
  - type: text
    content: ', a boy '
  - type: note
    content: Ex. 28:4; 2 Sam. 6:14; 1 Chr. 15:27
  - type: text
    content: 'clothed with a linen ephod. '
  '19':
  - type: text
    content: 'And his mother used to make for him a little robe and take it to him each year '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'when she went up with her husband to offer the yearly sacrifice. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ex. 15:11; Ps. 86:8; 89:6, 8
  - type: text
    content: '“There is none holy like the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: for there is none besides you;
  - type: text
    content: 'there is '
  - type: note
    content: Deut. 32:30, 31
  - type: text
    content: no rock like our God.
  '20':
  - type: text
    content: 'Then Eli would bless Elkanah and his wife, and say, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' give you children by this woman '
  - type: note
    content: ch. 1:28
  - type: text
    content: 'for the petition she asked of the '
  - type: text
    content: Lord
  - type: text
    content: .” So then they would return to their home.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Gen. 21:1
  - type: text
    content: 'Indeed the '
  - type: text
    content: Lord
  - type: text
    content: ' visited Hannah, and she conceived and bore three sons and two daughters. '
  - type: note
    content: ver. 26; ch. 3:19; [Judg. 13:24; Luke 1:80; 2:40]
  - type: text
    content: 'And the boy Samuel grew in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Eli Rebukes His Sons
  '22':
  - type: text
    content: 'Now Eli was very old, and he kept hearing all that his sons were doing to all Israel, and how they lay with the women who '
  - type: note
    content: Ex. 38:8
  - type: text
    content: 'were serving at the entrance to the tent of meeting. '
  '23':
  - type: text
    content: 'And he said to them, “Why do you do such things? For I hear of your evil dealings from all these people. '
  '24':
  - type: text
    content: 'No, my sons; it is no good report that I hear the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' spreading abroad. '
  '25':
  - type: text
    content: 'If someone sins against a man, God will mediate for him, but if someone sins against the '
  - type: text
    content: Lord
  - type: text
    content: ', who can intercede for him?” But they would not listen to the voice of their father, '
  - type: note
    content: '[Josh. 11:20]'
  - type: text
    content: 'for it was the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' to put them to death.'
  '26':
  - type: text
    content: 'Now the boy Samuel '
  - type: note
    content: Luke 2:52
  - type: text
    content: 'continued to grow both in stature and in favor with the '
  - type: text
    content: Lord
  - type: text
    content: ' and also with man.'
  - type: heading
    content: The Lord Rejects Eli’s Household
  '27':
  - type: text
    content: 'And there came '
  - type: note
    content: 1 Kgs. 13:1
  - type: text
    content: 'a man of God to Eli and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ex. 3–12]'
  - type: text
    content: '‘Did I indeed reveal myself to the house of your father when they were in Egypt subject to the house of Pharaoh? '
  '28':
  - type: note
    content: Ex. 28:1; Num. 18:1, 7
  - type: text
    content: 'Did I choose him out of all the tribes of Israel to be my priest, to go up to my altar, to burn incense, '
  - type: note
    content: '[ch. 14:3; 22:18]'
  - type: text
    content: 'to wear an ephod before me? '
  - type: note
    content: Lev. 2:3, 10; 6:16; 7:7, 8, 34; 10:14, 15; Num. 5:9, 10; See Num. 18:8-19
  - type: text
    content: 'I gave to the house of your father all my offerings by fire from the people of Israel. '
  '29':
  - type: text
    content: 'Why then do you '
  - type: note
    content: Deut. 32:15
  - type: text
    content: scorn
  - type: note
    content: Hebrew kick at
  - type: text
    content: ' my sacrifices and my offerings that I commanded for my dwelling, and honor your sons above me by fattening yourselves on the choicest parts of every offering of my people Israel?’ '
  '3':
  - type: text
    content: Talk no more so very proudly,
  - type: text
    content: let not arrogance come from your mouth;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God of knowledge,'
  - type: text
    content: and by him actions are weighed.
  '30':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, declares: '
  - type: note
    content: Ex. 27:21; 29:9
  - type: text
    content: '‘I promised that your house and the house of your father should go in and out before me forever,’ '
  - type: note
    content: '[Jer. 18:9, 10]'
  - type: text
    content: 'but now the '
  - type: text
    content: Lord
  - type: text
    content: ' declares: ‘Far be it from me, for those who honor me I will honor, and those who despise me shall be lightly esteemed. '
  '31':
  - type: text
    content: 'Behold, '
  - type: note
    content: 1 Kgs. 2:27; [ch. 4:11, 18, 20; 22:18, 19]
  - type: text
    content: 'the days are coming when I will cut off your strength and the strength of your father’s house, so that there will not be an old man in your house. '
  '32':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 4:11; [Judg. 18:30]; See Ps. 78:59-64
  - type: text
    content: 'in distress you will look with envious eye on all the prosperity that shall be bestowed on Israel, '
  - type: note
    content: '[Zech. 8:4]'
  - type: text
    content: 'and there shall not be an old man in your house forever. '
  '33':
  - type: text
    content: The only one of you whom I shall not cut off from my altar shall be spared to weep his
  - type: note
    content: Septuagint; Hebrew your; twice in this verse
  - type: text
    content: ' eyes out to grieve his heart, and all the descendants'
  - type: note
    content: Hebrew increase
  - type: text
    content: ' of your house shall die by the sword of men.'
  - type: note
    content: Septuagint; Hebrew die as men
  - type: text
    content: ' '
  '34':
  - type: note
    content: 1 Kgs. 13:3
  - type: text
    content: 'And this that shall come upon your two sons, Hophni and Phinehas, shall be the sign to you: both of them shall die '
  - type: note
    content: ch. 4:11
  - type: text
    content: 'on the same day. '
  '35':
  - type: note
    content: 1 Kgs. 2:35; 1 Chr. 29:22
  - type: text
    content: 'And I will raise up for myself a faithful priest, who shall do according to what is in my heart and in my mind. '
  - type: note
    content: ch. 25:28; 1 Kgs. 11:38; [2 Sam. 7:11, 27]
  - type: text
    content: 'And I will build him a sure house, and he shall go in and out before '
  - type: note
    content: 2 Sam. 22:51; Ps. 18:50; [Ps. 89:20]
  - type: text
    content: 'my anointed forever. '
  '36':
  - type: text
    content: And everyone who is left in your house shall come to implore him for a piece of silver or a loaf of bread and shall say, “Please put me in one of the priests’ places, that I may eat a morsel of bread.”’”
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:15; 46:9; 76:3
  - type: text
    content: The bows of the mighty are broken,
  - type: text
    content: but the feeble bind on strength.
  '5':
  - type: text
    content: Those who were full have hired themselves out for bread,
  - type: text
    content: but those who were hungry have ceased to hunger.
  - type: note
    content: Ps. 113:9; Isa. 54:1
  - type: text
    content: The barren has borne seven,
  - type: note
    content: Jer. 15:9
  - type: text
    content: but she who has many children is forlorn.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:39
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' kills and brings to life;'
  - type: text
    content: he brings down to Sheol and raises up.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 1:21 ]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' makes poor and makes rich;'
  - type: note
    content: Job 5:11; Ps. 75:7
  - type: text
    content: he brings low and he exalts.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps. 113:7, 8; [ Dan. 4:17; Luke 1:52 ]
  - type: text
    content: He raises up the poor from the dust;
  - type: text
    content: he lifts the needy from the ash heap
  - type: note
    content: Job 36:7
  - type: text
    content: to make them sit with princes
  - type: text
    content: and inherit a seat of honor.
  - type: note
    content: '[ Job 38:4-6; Ps. 24:2; 102:25; 104:5 ]'
  - type: text
    content: 'For the pillars of the earth are the '
  - type: text
    content: Lord
  - type: text
    content: ’s,
  - type: text
    content: and on them he has set the world.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 121:3; Prov. 3:26; [ Ps. 91:11 ]
  - type: text
    content: “He will guard the feet of his faithful ones,
  - type: text
    content: but the wicked shall be cut off in darkness,
  - type: text
    content: for not by might shall a man prevail.
