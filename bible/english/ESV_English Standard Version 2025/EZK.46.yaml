document_id: EZK.46,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prince and the Feasts
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 45:19
  - type: text
    content: 'The gate of '
  - type: note
    content: See ch. 8:16
  - type: text
    content: 'the inner court that faces east shall be shut on the six working days, but on the Sabbath day it shall be opened, and '
  - type: note
    content: '[ch. 45:18]'
  - type: text
    content: 'on the day of the new moon it shall be opened. '
  '10':
  - type: text
    content: 'When they enter, '
  - type: note
    content: '[Ps. 42:4]'
  - type: text
    content: the prince shall enter with them, and when they go out, he shall go out.
  '11':
  - type: text
    content: '“At the feasts and the appointed festivals, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the grain offering with a young bull shall be an ephah, and with a ram an ephah, and with the lambs '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'as much as one is able to give, together with a hin of oil to an ephah. '
  '12':
  - type: text
    content: 'When the prince provides '
  - type: note
    content: Lev. 7:16; 22:23; Deut. 23:23
  - type: text
    content: 'a freewill offering, either a burnt offering or peace offerings as a freewill offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'the gate facing east shall be opened for him. And he shall offer his burnt offering or his peace offerings '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: as he does on the Sabbath day. Then he shall go out, and after he has gone out the gate shall be shut.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex. 29:38; Num. 28:3, 4
  - type: text
    content: '“You shall provide a lamb a year old without blemish for a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' daily; morning by morning you shall provide it. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: ver. 5
  - type: text
    content: 'you shall provide a grain offering with it morning by morning, one sixth of an ephah, and one third of a hin of oil to moisten the flour, as a grain offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. This is a perpetual statute. '
  '15':
  - type: text
    content: 'Thus the lamb and the meal offering and the oil shall be provided, morning by morning, for '
  - type: note
    content: Num. 23:15, 17
  - type: text
    content: a regular burnt offering.
  '16':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': If the prince makes a gift to any of his sons as his inheritance, it shall belong to his sons. It is their property by inheritance. '
  '17':
  - type: text
    content: 'But if he makes a gift '
  - type: note
    content: '[ch. 45:7]'
  - type: text
    content: 'out of his inheritance to one of his servants, it shall be his to '
  - type: note
    content: See Lev. 25:10
  - type: text
    content: 'the year of liberty. Then it shall revert to the prince; surely it is his inheritance—it shall belong to his sons. '
  '18':
  - type: note
    content: '[1 Sam. 8:14; 1 Kgs. 21:3, 7]'
  - type: text
    content: 'The prince shall not take any of the inheritance of the people, '
  - type: note
    content: '[ch. 45:8]'
  - type: text
    content: 'thrusting them out of their property. He shall give his sons their inheritance out of his own property, so that none of my people shall be '
  - type: note
    content: '[ch. 34:4, 5]'
  - type: text
    content: scattered from his property.”
  - type: heading
    content: Boiling Places for Offerings
  '19':
  - type: text
    content: 'Then he brought me through the entrance, which was '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'at the side of the gate, to the north row of '
  - type: note
    content: '[ch. 42:4]'
  - type: text
    content: 'the holy chambers for the priests, and behold, a place was there at the extreme western end of them. '
  '2':
  - type: note
    content: See ch. 44:3
  - type: text
    content: 'The prince shall enter by the vestibule of the gate from outside, and shall take his stand by '
  - type: note
    content: '[ch. 45:19]'
  - type: text
    content: 'the post of the gate. '
  - type: note
    content: '[ch. 40:38, 39]'
  - type: text
    content: 'The priests shall offer his burnt offering and his peace offerings, and he shall worship at '
  - type: note
    content: '[ch. 9:3]'
  - type: text
    content: 'the threshold of the gate. Then he shall go out, but the gate shall not be shut until evening. '
  '20':
  - type: text
    content: 'And he said to me, “This is the place where the priests '
  - type: note
    content: 2 Chr. 35:13
  - type: text
    content: 'shall boil the guilt offering and the sin offering, and where '
  - type: note
    content: '[Lev. 2:4]'
  - type: text
    content: 'they shall bake the grain offering, in order not to bring them out into the outer court and so '
  - type: note
    content: See ch. 44:19
  - type: text
    content: transmit holiness to the people.”
  '21':
  - type: text
    content: 'Then he brought me out to the outer court and led me around to the four corners of the court. And behold, in each corner of the court there was another court— '
  '22':
  - type: text
    content: in the four corners of the court were small
  - type: note
    content: Septuagint, Syriac, Vulgate; the meaning of the Hebrew word is uncertain
  - type: text
    content: ' courts, forty cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a long cubit (see 40:5) was about 21 inches or 53 centimeters
  - type: text
    content: ' long and thirty broad; the four were of the same size. '
  '23':
  - type: text
    content: 'On the inside, around each of the four courts was a row of masonry, with hearths made at the bottom of the rows all around. '
  '24':
  - type: text
    content: 'Then he said to me, “These are the kitchens where those who '
  - type: note
    content: ch. 44:11
  - type: text
    content: 'minister at the temple '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: shall boil the sacrifices of the people.”
  '3':
  - type: note
    content: ver. 9
  - type: text
    content: 'The people of the land shall bow down at the entrance of that gate before the '
  - type: text
    content: Lord
  - type: text
    content: ' on the Sabbaths and on the new moons. '
  '4':
  - type: note
    content: ch. 45:17
  - type: text
    content: 'The burnt offering that the prince offers to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Num. 28:9, 10]'
  - type: text
    content: 'on the Sabbath day shall be six lambs without blemish and a ram without blemish. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ver. 14; ch. 45:24
  - type: text
    content: the grain offering with the ram shall be an ephah,
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' and the grain offering with the lambs shall be '
  - type: note
    content: '[Deut. 16:17]'
  - type: text
    content: as much as he is able, together with a hin
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of oil to each ephah. '
  '6':
  - type: text
    content: 'On the day of the new moon he shall offer a bull from the herd without blemish, and six lambs and a ram, which shall be without blemish. '
  '7':
  - type: text
    content: 'As a grain offering he shall provide an ephah with the bull and an ephah with the ram, and with the lambs '
  - type: note
    content: ver. 5
  - type: text
    content: 'as much as he is able, together with a hin of oil to each ephah. '
  '8':
  - type: note
    content: '[ver. 2]'
  - type: text
    content: When the prince enters, he shall enter by the vestibule of the gate, and he shall go out by the same way.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ver. 3
  - type: text
    content: '“When the people of the land '
  - type: note
    content: '[Deut. 16:16]; See Ex. 23:14-17'
  - type: text
    content: 'come before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the appointed feasts, he who enters by the north gate to worship shall go out by the south gate, and he who enters by the south gate shall go out by the north gate: no one shall return by way of the gate by which he entered, but each shall go out straight ahead. '
