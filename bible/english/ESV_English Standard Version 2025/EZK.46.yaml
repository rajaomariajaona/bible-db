        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the threshold of the gate. Then he shall go out, but the gate shall not be shut until evening. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to me, “This is the place where the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
