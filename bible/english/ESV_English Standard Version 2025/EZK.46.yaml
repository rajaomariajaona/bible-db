      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:16
      marker-yv: yv-n
    - type: text
      text: 'the inner court that faces east shall be shut on the six working days, but on the Sabbath day it shall be opened, and '
    - type: usfm
