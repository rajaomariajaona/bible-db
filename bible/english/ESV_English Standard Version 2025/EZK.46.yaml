  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the day of the new moon he shall offer a bull from the herd without blemish, and six lambs and a ram, which shall be without blemish. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a grain offering he shall provide an ephah with the bull and an ephah with the ram, and with the lambs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      marker-yv: yv-n
    - type: text
      text: 'as much as he is able, together with a hin of oil to each ephah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
