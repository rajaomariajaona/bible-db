      marker-yv: yv-n
    - type: text
      text: 'shall boil the guilt offering and the sin offering, and where '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 2:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they shall bake the grain offering, in order not to bring them out into the outer court and so '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:19
      marker-yv: yv-n
    - type: text
      text: transmit holiness to the people.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought me out to the outer court and led me around to the four corners of the court. And behold, in each corner of the court there was another court— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: in the four corners of the court were small
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Septuagint, Syriac, Vulgate; the meaning of the Hebrew word is uncertain
      marker-yv: yv-n
    - type: text
      text: ' courts, forty cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'was about 18 inches or 45 centimeters; a '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'long cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see 40:5) was about 21 inches or 53 centimeters
      marker-yv: yv-n
    - type: text
      text: ' long and thirty broad; the four were of the same size. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the inside, around each of the four courts was a row of masonry, with hearths made at the bottom of the rows all around. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me, “These are the kitchens where those who '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:11
      marker-yv: yv-n
    - type: text
      text: 'minister at the temple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: shall boil the sacrifices of the people.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'The people of the land shall bow down at the entrance of that gate before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the Sabbaths and on the new moons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:17
      marker-yv: yv-n
    - type: text
      text: 'The burnt offering that the prince offers to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 28:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'on the Sabbath day shall be six lambs without blemish and a ram without blemish. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:24
      marker-yv: yv-n
    - type: text
