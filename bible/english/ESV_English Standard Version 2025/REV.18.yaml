document_id: REV.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Babylon
  - type: text
    content: 'After this I saw '
  - type: note
    content: ch. 17:1, 7
  - type: text
    content: 'another angel coming down from heaven, having great authority, and '
  - type: note
    content: Ezek. 43:2
  - type: text
    content: 'the earth was made bright with his glory. '
  '10':
  - type: note
    content: ver. 15, 17
  - type: text
    content: They will stand far off, in fear of her torment, and say,
  - type: text
    content: '“Alas! Alas! '
  - type: note
    content: See ch. 14:8
  - type: text
    content: You great city,
  - type: text
    content: you mighty city, Babylon!
  - type: text
    content: 'For '
  - type: note
    content: ver. 17, 19; [ver. 8]
  - type: text
    content: in a single hour your judgment has come.”
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ver. 3, 15; [Ezek. 27:36]
  - type: text
    content: 'the merchants of the earth weep and mourn for her, since no one buys their cargo anymore, '
  '12':
  - type: text
    content: 'cargo of gold, silver, jewels, pearls, fine linen, purple cloth, silk, scarlet cloth, all kinds of scented wood, all kinds of articles of ivory, all kinds of articles of costly wood, bronze, iron and marble, '
  '13':
  - type: text
    content: cinnamon, spice, incense, myrrh, frankincense, wine, oil, fine flour, wheat, cattle and sheep, horses and chariots, and slaves, that is, human souls.
  - type: note
    content: Or and slaves, and human lives
  '14':
  - type: text
    content: “The fruit for which your soul longed
  - type: text
    content: has gone from you,
  - type: text
    content: and all your delicacies and your splendors
  - type: text
    content: are lost to you,
  - type: text
    content: never to be found again!”
  '15':
  - type: text
    content: ' '
  - type: note
    content: ver. 3, 11
  - type: text
    content: 'The merchants of these wares, who gained wealth from her, '
  - type: note
    content: ver. 10
  - type: text
    content: will stand far off, in fear of her torment, weeping and mourning aloud,
  '16':
  - type: text
    content: “Alas, alas, for the great city
  - type: note
    content: ch. 17:4
  - type: text
    content: that was clothed in fine linen,
  - type: text
    content: in purple and scarlet,
  - type: text
    content: adorned with gold,
  - type: text
    content: with jewels, and with pearls!
  '17':
  - type: text
    content: 'For '
  - type: note
    content: ver. 10, 19
  - type: text
    content: 'in a single hour all this wealth '
  - type: note
    content: ch. 17:16
  - type: text
    content: has been laid waste.”
  - type: text
    content: 'And '
  - type: note
    content: Ezek. 27:28, 29
  - type: text
    content: 'all shipmasters and seafaring men, sailors and all whose trade is on the sea, stood far off '
  '18':
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 27:30
  - type: text
    content: 'cried out '
  - type: note
    content: ver. 9
  - type: text
    content: as they saw the smoke of her burning,
  - type: note
    content: Ezek. 27:32; [ch. 13:4 ]
  - type: text
    content: “What city was like the great city?”
  '19':
  - type: text
    content: 'And they threw '
  - type: note
    content: See Josh. 7:6; Job 2:12
  - type: text
    content: dust on their heads as they wept and mourned, crying out,
  - type: text
    content: “Alas, alas, for the great city
  - type: note
    content: ver. 3, 15
  - type: text
    content: where all who had ships at sea
  - type: text
    content: grew rich by her wealth!
  - type: text
    content: 'For '
  - type: note
    content: ver. 10, 17
  - type: text
    content: in a single hour she has been laid waste.
  '2':
  - type: text
    content: And he called out with a mighty voice,
  - type: note
    content: See ch. 14:8
  - type: text
    content: “Fallen, fallen is Babylon the great!
  - type: text
    content: 'She has become '
  - type: note
    content: Isa. 13:21; 34:14; Jer. 50:39; 51:37; [Zeph. 2:14, 15]
  - type: text
    content: a dwelling place for demons,
  - type: text
    content: 'a haunt '
  - type: note
    content: ch. 16:13
  - type: text
    content: for every unclean spirit,
  - type: text
    content: 'a haunt '
  - type: note
    content: Isa. 14:23; 34:11
  - type: text
    content: for every unclean bird,
  - type: text
    content: a haunt for every unclean and detestable beast.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Deut. 32:43; Jer. 51:48; See ch. 12:12
  - type: text
    content: Rejoice over her, O heaven,
  - type: text
    content: 'and you saints and '
  - type: note
    content: Luke 11:49, 50
  - type: text
    content: apostles and prophets,
  - type: text
    content: 'for '
  - type: note
    content: ch. 19:2
  - type: text
    content: God has given judgment for you against her!”
  '21':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 5:2; 10:1
  - type: text
    content: 'a mighty angel '
  - type: note
    content: '[Jer. 51:63, 64]'
  - type: text
    content: took up a stone like a great millstone and threw it into the sea, saying,
  - type: text
    content: '“So will Babylon '
  - type: note
    content: ver. 10
  - type: text
    content: the great city be thrown down with violence,
  - type: text
    content: and will be found no more;
  '22':
  - type: text
    content: 'and '
  - type: note
    content: Isa. 14:11; 24:8; Ezek. 26:13
  - type: text
    content: the sound of harpists and musicians, of flute players and trumpeters,
  - type: text
    content: will be heard in you no more,
  - type: text
    content: and a craftsman of any craft
  - type: text
    content: will be found in you no more,
  - type: text
    content: 'and '
  - type: note
    content: Eccles. 12:4; Jer. 25:10
  - type: text
    content: the sound of the mill
  - type: text
    content: will be heard in you no more,
  '23':
  - type: text
    content: and the light of a lamp
  - type: text
    content: will shine in you no more,
  - type: text
    content: 'and '
  - type: note
    content: Jer. 7:34; 16:9; 33:11
  - type: text
    content: the voice of bridegroom and bride
  - type: text
    content: will be heard in you no more,
  - type: text
    content: 'for '
  - type: note
    content: Isa. 23:8
  - type: text
    content: your merchants were the great ones of the earth,
  - type: text
    content: 'and all nations were deceived '
  - type: note
    content: Nah. 3:4
  - type: text
    content: by your sorcery.
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 17:6; [Matt. 23:35, 36]
  - type: text
    content: in her was found the blood of prophets and of saints,
  - type: text
    content: 'and of '
  - type: note
    content: '[Jer. 51:49]'
  - type: text
    content: all who have been slain on earth.”
  '3':
  - type: text
    content: For all nations have drunk
  - type: note
    content: Some manuscripts fallen by
  - type: note
    content: ch. 14:8
  - type: text
    content: the wine of the passion of her sexual immorality,
  - type: text
    content: 'and '
  - type: note
    content: ver. 9; ch. 17:2
  - type: text
    content: the kings of the earth have committed immorality with her,
  - type: text
    content: 'and '
  - type: note
    content: ver. 11, 15; Ezek. 27:33
  - type: text
    content: the merchants of the earth have grown rich from the power of her luxurious living.”
  '4':
  - type: text
    content: Then I heard another voice from heaven saying,
  - type: note
    content: '[ 2 Cor. 6:17 ]; See Isa. 48:20'
  - type: text
    content: “Come out of her, my people,
  - type: text
    content: lest you take part in her sins,
  - type: text
    content: lest you share in her plagues;
  '5':
  - type: text
    content: 'for '
  - type: note
    content: Jer. 51:9; [Gen. 18:20, 21; Ezra 9:6; Jonah 1:2]
  - type: text
    content: her sins are heaped high as heaven,
  - type: text
    content: 'and '
  - type: note
    content: ch. 16:19
  - type: text
    content: God has remembered her iniquities.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 137:8; Jer. 50:15, 29; 51:24, 49
  - type: text
    content: Pay her back as she herself has paid back others,
  - type: text
    content: 'and repay her '
  - type: note
    content: Jer. 16:18
  - type: text
    content: double for her deeds;
  - type: text
    content: 'mix a double portion for her '
  - type: note
    content: '[ch. 14:10; 16:19; 17:4]'
  - type: text
    content: in the cup she mixed.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 28:2-8 ]'
  - type: text
    content: As she glorified herself and lived in luxury,
  - type: text
    content: so give her a like measure of torment and mourning,
  - type: text
    content: since in her heart she says,
  - type: note
    content: Isa. 47:7, 8; Zeph. 2:15; [ch. 3:17 ]
  - type: text
    content: ‘I sit as a queen,
  - type: text
    content: I am no widow,
  - type: text
    content: and mourning I shall never see.’
  '8':
  - type: text
    content: 'For this reason her plagues will come '
  - type: note
    content: Isa. 47:9; [ver. 10]
  - type: text
    content: in a single day,
  - type: text
    content: death and mourning and famine,
  - type: text
    content: 'and '
  - type: note
    content: ch. 17:16
  - type: text
    content: she will be burned up with fire;
  - type: text
    content: 'for '
  - type: note
    content: Jer. 50:34
  - type: text
    content: mighty is the Lord God who has judged her.”
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ver. 3; ch. 17:2; [Ezek. 26:16, 17]
  - type: text
    content: 'the kings of the earth, who committed sexual immorality and lived in luxury with her, '
  - type: note
    content: '[Jer. 50:46]'
  - type: text
    content: 'will weep and wail over her '
  - type: note
    content: ver. 18; ch. 19:3
  - type: text
    content: 'when they see the smoke of her burning. '
