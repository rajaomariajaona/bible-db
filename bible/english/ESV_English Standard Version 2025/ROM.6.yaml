document_id: ROM.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Dead to Sin, Alive to God
  - type: text
    content: 'What shall we say then? '
  - type: note
    content: ver. 15; [ch. 3:8]
  - type: text
    content: 'Are we to continue in sin that grace may abound? '
  '10':
  - type: text
    content: 'For the death he died he died to sin, '
  - type: note
    content: See Heb. 7:27
  - type: text
    content: 'once for all, but the life he lives he lives to God. '
  '11':
  - type: text
    content: 'So you also must consider yourselves '
  - type: note
    content: See ver. 2
  - type: text
    content: dead to sin and alive to God in Christ Jesus.
  '12':
  - type: text
    content: 'Let not '
  - type: note
    content: ver. 14; Ps. 19:13; 119:133; Mic. 7:19; [2 Cor. 5:17]
  - type: text
    content: 'sin therefore reign in your mortal body, to make you obey its passions. '
  '13':
  - type: note
    content: ch. 7:5; Col. 3:5
  - type: text
    content: 'Do not present your members to sin as instruments for unrighteousness, but '
  - type: note
    content: ch. 12:1; 1 Pet. 2:24; 4:2
  - type: text
    content: 'present yourselves to God as those who have been brought from death to life, and your members to God as instruments for righteousness. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 8:2, 12]'
  - type: text
    content: 'sin '
  - type: note
    content: See ver. 12
  - type: text
    content: will have no dominion over you, since you are not under law but under grace.
  - type: heading
    content: Slaves to Righteousness
  '15':
  - type: text
    content: 'What then? '
  - type: note
    content: ver. 1
  - type: text
    content: 'Are we to sin '
  - type: note
    content: '[1 Cor. 9:21]'
  - type: text
    content: 'because we are not under law but under grace? By no means! '
  '16':
  - type: text
    content: 'Do you not know that if you present yourselves '
  - type: note
    content: '[ver. 20; Matt. 6:24]; See John 8:34'
  - type: text
    content: to anyone as obedient slaves,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; twice in this verse; also verses 17, 19 (twice), 20
  - type: text
    content: ' you are slaves of the one whom you obey, either of sin, which leads to death, or of obedience, which leads to righteousness? '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'thanks be to God, that you who were once slaves of sin have become obedient from the heart to the '
  - type: note
    content: '[2 Tim. 1:13]'
  - type: text
    content: 'standard of teaching to which you were committed, '
  '18':
  - type: text
    content: 'and, '
  - type: note
    content: ver. 22; ch. 8:2; [ver. 7]; See John 8:32
  - type: text
    content: 'having been set free from sin, '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'have become slaves of righteousness. '
  '19':
  - type: note
    content: See ch. 3:5
  - type: text
    content: 'I am speaking in human terms, because of your natural limitations. For '
  - type: note
    content: See ver. 13
  - type: text
    content: 'just as you once presented your members as slaves to impurity and to lawlessness leading to more lawlessness, so now present your members '
  - type: note
    content: '[1 Cor. 9:27]'
  - type: text
    content: as slaves to righteousness leading to sanctification.
  '2':
  - type: text
    content: 'By no means! How can '
  - type: note
    content: ver. 11; ch. 7:4, 6; Gal. 2:19; Col. 2:20; 3:3; 1 Pet. 2:24
  - type: text
    content: 'we who died to sin still live in it? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: See ver. 16
  - type: text
    content: 'For when you were slaves of sin, you were free in regard to righteousness. '
  '21':
  - type: note
    content: ch. 7:5; [Jer. 12:13]
  - type: text
    content: 'But what fruit were you getting at that time from the things '
  - type: note
    content: '[2 Cor. 4:2]'
  - type: text
    content: 'of which you are now ashamed? '
  - type: note
    content: ch. 1:32; 8:6, 13; Prov. 14:12; Gal. 6:8
  - type: text
    content: 'For the end of those things is death. '
  '22':
  - type: text
    content: 'But now that you '
  - type: note
    content: See ver. 18
  - type: text
    content: 'have been set free from sin and '
  - type: note
    content: 1 Cor. 7:22; 1 Pet. 2:16
  - type: text
    content: 'have become slaves of God, '
  - type: note
    content: ch. 7:4
  - type: text
    content: 'the fruit you get leads to sanctification and '
  - type: note
    content: 1 Pet. 1:9
  - type: text
    content: 'its end, eternal life. '
  '23':
  - type: note
    content: '[ch. 2:7]; See ch. 5:12'
  - type: text
    content: For the wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord.
  '3':
  - type: text
    content: 'Do you not know that all of us '
  - type: note
    content: Gal. 3:27
  - type: text
    content: 'who have been baptized '
  - type: note
    content: See Matt. 28:19
  - type: text
    content: 'into Christ Jesus were baptized into his death? '
  '4':
  - type: text
    content: 'We were '
  - type: note
    content: Col. 2:12
  - type: text
    content: 'buried therefore with him by baptism into death, in order that, just as '
  - type: note
    content: ver. 9; ch. 8:11; See Acts 2:24
  - type: text
    content: 'Christ was raised from the dead by '
  - type: note
    content: '[John 11:40; 2 Cor. 13:4]'
  - type: text
    content: 'the glory of the Father, we too might walk in '
  - type: note
    content: 2 Cor. 5:17; Gal. 6:15; Eph. 4:23, 24; Col. 3:10; [ch. 7:6]
  - type: text
    content: newness of life.
  '5':
  - type: text
    content: 'For '
  - type: note
    content: '[2 Cor. 4:10]'
  - type: text
    content: 'if we have been united with him in '
  - type: note
    content: Phil. 3:10, 11; [Col. 2:12; 3:1]
  - type: text
    content: 'a death like his, we shall certainly be united with him in a resurrection like his. '
  '6':
  - type: text
    content: 'We know that '
  - type: note
    content: Eph. 4:22; Col. 3:9
  - type: text
    content: our old self
  - type: note
    content: Greek man
  - type: text
    content: ' '
  - type: note
    content: Gal. 2:20; 5:24; 6:14
  - type: text
    content: 'was crucified with him in order that '
  - type: note
    content: '[ch. 7:24]'
  - type: text
    content: 'the body of sin might be brought to nothing, so that we would no longer be enslaved to sin. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: 1 Pet. 4:1
  - type: text
    content: 'one who has died '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: has been set free
  - type: note
    content: Greek has been justified
  - type: text
    content: ' from sin. '
  '8':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Tim. 2:11; [2 Cor. 4:10; 13:4]
  - type: text
    content: 'if we have died with Christ, we believe that we will also live with him. '
  '9':
  - type: text
    content: 'We know that '
  - type: note
    content: Acts 13:34; Rev. 1:18
  - type: text
    content: 'Christ, being raised from the dead, will never die again; '
  - type: note
    content: '[ch. 5:14, 17]'
  - type: text
    content: 'death no longer has dominion over him. '
