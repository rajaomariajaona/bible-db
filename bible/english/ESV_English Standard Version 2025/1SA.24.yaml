document_id: 1SA.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Spares Saul’s Life
  - type: text
    content: ' '
  - type: note
    content: Ch 24:2 in Hebrew
  - type: note
    content: ch. 23:28
  - type: text
    content: 'When Saul returned from following the Philistines, he was told, “Behold, David is in the wilderness of Engedi.” '
  '10':
  - type: text
    content: 'Behold, this day your eyes have seen how the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you today into my hand in the cave. '
  - type: note
    content: ver. 4
  - type: text
    content: And some told me to kill you, but I spared you.
  - type: note
    content: Septuagint, Syriac, Targum; Hebrew it [my eye] spared you
  - type: text
    content: ' I said, ‘I will not put out my hand against my lord, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'for he is the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed.’ '
  '11':
  - type: text
    content: 'See, my father, see the corner of your robe in my hand. For by the fact that I cut off the corner of your robe and did not kill you, you may know and see that '
  - type: note
    content: Ps. 7:3
  - type: text
    content: 'there is no wrong or treason in my hands. I have not sinned against you, though '
  - type: note
    content: ch. 26:20
  - type: text
    content: 'you hunt my life to take it. '
  '12':
  - type: note
    content: Gen. 16:5; Judg. 11:27
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' judge between me and you, may the '
  - type: text
    content: Lord
  - type: text
    content: ' avenge me against you, but my hand shall not be against you. '
  '13':
  - type: text
    content: 'As the proverb of the ancients says, ‘Out of the wicked comes wickedness.’ But my hand shall not be against you. '
  '14':
  - type: text
    content: 'After whom has the king of Israel come out? After whom do you pursue? '
  - type: note
    content: See ch. 17:43
  - type: text
    content: 'After a dead dog! '
  - type: note
    content: ch. 26:20
  - type: text
    content: 'After a flea! '
  '15':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' therefore be judge and give sentence between me and you, and see to it and '
  - type: note
    content: ch. 25:39; Ps. 35:1; 43:1; 119:154
  - type: text
    content: plead my cause and deliver me from your hand.”
  '16':
  - type: text
    content: 'As soon as David had finished speaking these words to Saul, Saul said, '
  - type: note
    content: ch. 26:17
  - type: text
    content: '“Is this your voice, my son David?” And Saul lifted up his voice and wept. '
  '17':
  - type: text
    content: 'He said to David, “You are more righteous than I, '
  - type: note
    content: '[ch. 26:21]'
  - type: text
    content: 'for you have repaid me good, whereas I have repaid you evil. '
  '18':
  - type: text
    content: 'And you have declared this day how you have dealt well with me, in that you did not kill me when the '
  - type: text
    content: Lord
  - type: text
    content: ' put me into your hands. '
  '19':
  - type: text
    content: 'For if a man finds his enemy, will he let him go away safe? So may the '
  - type: text
    content: Lord
  - type: text
    content: ' reward you with good for what you have done to me this day. '
  '2':
  - type: text
    content: 'Then Saul took '
  - type: note
    content: ch. 26:2
  - type: text
    content: 'three thousand chosen men out of all Israel and went to seek David and his men in front of the Wildgoats’ Rocks. '
  '20':
  - type: text
    content: 'And now, behold, '
  - type: note
    content: ch. 23:17
  - type: text
    content: 'I know that you shall surely be king, and that the kingdom of Israel shall be established in your hand. '
  '21':
  - type: note
    content: '[Gen. 21:23]'
  - type: text
    content: 'Swear to me therefore by the '
  - type: text
    content: Lord
  - type: text
    content: ' that you will not cut off my offspring after me, and '
  - type: note
    content: '[2 Sam. 21:7]'
  - type: text
    content: 'that you will not destroy my name out of my father’s house.” '
  '22':
  - type: text
    content: 'And David swore this to Saul. Then Saul went home, but David and his men went up '
  - type: note
    content: ch. 23:29
  - type: text
    content: to the stronghold.
  '3':
  - type: text
    content: 'And he came to the sheepfolds by the way, where there was a cave, and Saul went in '
  - type: note
    content: Judg. 3:24
  - type: text
    content: to relieve himself.
  - type: note
    content: Hebrew cover his feet
  - type: text
    content: ' Now David and his men were sitting in the innermost parts '
  - type: note
    content: See Ps. 57; 142
  - type: text
    content: 'of the cave. '
  '4':
  - type: text
    content: 'And the men of David said to him, '
  - type: note
    content: ver. 7; [ch. 26:8]
  - type: text
    content: '“Here is the day of which the '
  - type: text
    content: Lord
  - type: text
    content: ' said to you, ‘Behold, I will give your enemy into your hand, and you shall do to him as it shall seem good to you.’” Then David arose and stealthily cut off a corner of Saul’s robe. '
  '5':
  - type: text
    content: 'And afterward '
  - type: note
    content: 2 Sam. 24:10
  - type: text
    content: 'David’s heart struck him, because he had cut off a corner of Saul’s robe. '
  '6':
  - type: text
    content: 'He said to his men, '
  - type: note
    content: ch. 26:11
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should do this thing to my lord, the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed, to put out my hand against him, seeing he is '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed.” '
  '7':
  - type: text
    content: 'So David persuaded his men with these words '
  - type: note
    content: '[Ps. 7:4]'
  - type: text
    content: and did not permit them to attack Saul. And Saul rose up and left the cave and went on his way.
  '8':
  - type: text
    content: 'Afterward David also arose and went out of the cave, and called after Saul, “My lord the king!” And when Saul looked behind him, David bowed with his face to the earth and paid homage. '
  '9':
  - type: text
    content: 'And David said to Saul, “Why do you listen to the words of men who say, ‘Behold, David seeks your harm’? '
