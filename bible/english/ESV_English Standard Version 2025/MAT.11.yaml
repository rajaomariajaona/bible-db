document_id: MAT.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Messengers from John the Baptist
  - type: text
    content: When Jesus had finished instructing his twelve disciples, he went on from there to teach and preach in their cities.
  '10':
  - type: text
    content: This is he of whom it is written,
  - type: note
    content: Mark 1:2; Cited from Mal. 3:1
  - type: text
    content: “‘Behold, I send my messenger before your face,
  - type: text
    content: who will prepare your way before you.’
  '11':
  - type: text
    content: ' '
  - type: text
    content: Truly, I say to you, among those born of women there has arisen no one greater than John the Baptist. Yet the one who is least in the kingdom of heaven is greater than he.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 16:16
  - type: text
    content: From the days of John the Baptist until now the kingdom of heaven has suffered violence,
  - type: note
    content: Or has been coming violently
  - type: text
    content: ' '
  - type: text
    content: and the violent take it by force.
  - type: text
    content: ' '
  '13':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: For all the Prophets and the Law prophesied until John,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'and if you are willing to accept it, he is '
  - type: note
    content: ch. 17:10-13; Mal. 4:5; Mark 9:11-13; Luke 1:17; [John 1:21]
  - type: text
    content: Elijah who is to come.
  - type: text
    content: ' '
  '15':
  - type: note
    content: ch. 13:9, 43; Luke 8:8; 14:35
  - type: text
    content: He who has ears to hear,
  - type: note
    content: Some manuscripts omit to hear
  - type: text
    content: ' '
  - type: text
    content: let him hear.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “But to what shall I compare this generation? It is like children sitting in the marketplaces and calling to their playmates,
  '17':
  - type: text
    content: ' '
  - type: text
    content: “‘We played the flute for you, and you did not dance;
  - type: text
    content: we sang a dirge, and you did not mourn.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'For John came '
  - type: note
    content: ch. 3:4; Mark 1:6
  - type: text
    content: 'neither eating '
  - type: note
    content: Luke 1:15
  - type: text
    content: nor drinking, and they say, ‘He has a demon.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'The Son of Man came '
  - type: note
    content: ch. 9:10; Luke 7:36; 14:1; John 2:1; 12:2
  - type: text
    content: 'eating and drinking, and they say, ‘Look at him! A glutton and a drunkard, '
  - type: note
    content: ch. 9:11; Luke 15:2; 19:7
  - type: text
    content: 'a friend of '
  - type: note
    content: ch. 18:17
  - type: text
    content: tax collectors and sinners!’ Yet wisdom is justified by her deeds.”
  - type: note
    content: Some manuscripts children (compare Luke 7:35)
  - type: heading
    content: Woe to Unrepentant Cities
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-19, see Luke 7:18-35
  - type: text
    content: 'Now when John heard '
  - type: note
    content: ch. 14:3; [ch. 4:12]
  - type: text
    content: 'in prison about the deeds of '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the Christ, he sent word by '
  - type: note
    content: See ch. 9:14
  - type: text
    content: 'his disciples '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 81:11-13; Isa. 1:2-5 ]'
  - type: text
    content: 'Then he began to denounce the cities where most of his mighty works had been done, because they did not repent. '
  '21':
  - type: note
    content: For ver. 21-24, see Luke 10:12-15
  - type: text
    content: '“Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done in you had been done in '
  - type: note
    content: ch. 15:21; Mark 3:8; [Isa. 23; Ezek. 28:2-24; Amos 1:9, 10]
  - type: text
    content: Tyre and Sidon, they would have repented long ago in sackcloth and ashes.
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[Luke 12:47, 48]'
  - type: text
    content: 'But I tell you, it will be more bearable on '
  - type: note
    content: See Acts 17:31
  - type: text
    content: 'the day of judgment for '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: Tyre and Sidon than for you.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And you, '
  - type: note
    content: Cited from Isa. 14:13-15
  - type: text
    content: 'Capernaum, will you be exalted to heaven? You will be brought down to '
  - type: note
    content: ch. 16:18 (Gk.); Luke 16:23; Acts 2:27
  - type: text
    content: Hades. For if the mighty works done in you had been done in Sodom, it would have remained until this day.
  - type: text
    content: ' '
  '24':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'But I tell you that '
  - type: note
    content: ch. 10:15
  - type: text
    content: 'it will be more tolerable on '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: the day of judgment for the land of Sodom than for you.”
  - type: heading
    content: Come to Me, and I Will Give You Rest
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-27, see Luke 10:21, 22
  - type: text
    content: 'At that time Jesus declared, '
  - type: text
    content: '“I thank you, Father, '
  - type: note
    content: See Acts 17:24
  - type: text
    content: 'Lord of heaven and earth, that '
  - type: note
    content: Job 37:24; 1 Cor. 1:19-27; 2 Cor. 3:14
  - type: text
    content: 'you have hidden these things from the wise and understanding and '
  - type: note
    content: ch. 21:16; Ps. 8:2; [ch. 13:11; 16:17]
  - type: text
    content: revealed them to little children;
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'yes, Father, for such was your '
  - type: note
    content: Luke 12:32; Gal. 1:15
  - type: text
    content: gracious will.
  - type: note
    content: Or for so it pleased you well
  - type: text
    content: ' '
  '27':
  - type: note
    content: See ch. 28:18
  - type: text
    content: 'All things have been handed over to me by my Father, and no one knows the Son '
  - type: note
    content: '[John 1:18; 6:46; 7:29; 8:19; 10:15; 17:25]'
  - type: text
    content: 'except the Father, and no one knows the Father except the Son and anyone '
  - type: note
    content: '[John 17:26]'
  - type: text
    content: to whom the Son chooses to reveal him.
  - type: text
    content: ' '
  '28':
  - type: note
    content: John 7:37; [John 6:37]
  - type: text
    content: 'Come to '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'me, all who labor and are '
  - type: note
    content: '[ch. 23:4; Luke 11:46]'
  - type: text
    content: heavy laden, and I will give you rest.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Take my yoke upon you, and '
  - type: note
    content: John 13:15; Eph. 4:20; Phil. 2:5; 1 Pet. 2:21; 1 John 2:6
  - type: text
    content: 'learn from me, for I am '
  - type: note
    content: Zech. 9:9; 2 Cor. 10:1; Phil. 2:7, 8; [ch. 5:5]
  - type: text
    content: 'gentle and lowly in heart, and '
  - type: note
    content: Jer. 6:16
  - type: text
    content: you will find rest for your souls.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said to him, “Are you '
  - type: note
    content: John 4:25; 6:14; 11:27
  - type: text
    content: 'the one who is to come, or shall we '
  - type: note
    content: '[Luke 3:15]'
  - type: text
    content: 'look for another?” '
  '30':
  - type: text
    content: 'For '
  - type: note
    content: 1 John 5:3
  - type: text
    content: my yoke is easy, and my burden is light.”
  '4':
  - type: text
    content: 'And Jesus answered them, '
  - type: text
    content: '“Go and tell John what you hear and see:'
  - type: text
    content: ' '
  '5':
  - type: note
    content: See Luke 7:22
  - type: text
    content: the blind receive their sight and the lame walk, lepers
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' '
  - type: text
    content: 'are cleansed and the deaf hear, and the dead are raised up, and '
  - type: note
    content: Luke 4:18; [ch. 5:3; James 2:5]
  - type: text
    content: the poor have good news preached to them.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And blessed is the one who '
  - type: note
    content: Isa. 8:14, 15; John 6:61
  - type: text
    content: is not offended by me.”
  '7':
  - type: text
    content: 'As they went away, Jesus began to speak to the crowds concerning John: '
  - type: text
    content: '“What did you go out '
  - type: note
    content: ch. 3:1; Luke 1:80
  - type: text
    content: 'into the wilderness to see? '
  - type: note
    content: '[Eph. 4:14; James 1:6]'
  - type: text
    content: A reed shaken by the wind?
  - type: text
    content: ' '
  '8':
  - type: text
    content: What then did you go out to see? A man
  - type: note
    content: Or Why then did you go out? To see a man
  - type: text
    content: ' '
  - type: text
    content: dressed in soft clothing? Behold, those who wear soft clothing are in kings’ houses.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'What then did you go out to see? '
  - type: note
    content: ch. 14:5; 21:26; Luke 1:76
  - type: text
    content: A prophet?
  - type: note
    content: Some manuscripts Why then did you go out? To see a prophet?
  - type: text
    content: ' '
  - type: text
    content: Yes, I tell you, and more than a prophet.
  - type: text
    content: ' '
