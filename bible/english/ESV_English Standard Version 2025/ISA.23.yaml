document_id: ISA.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: An Oracle Concerning Tyre and Sidon
  - type: text
    content: 'The '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'oracle concerning '
  - type: note
    content: '[Jer. 25:22; 27:2, 3]; See Ezek. 26:2–28:24; Joel 3:4-8; Amos 1:9, 10; Zech. 9:2-4'
  - type: text
    content: Tyre.
  - type: text
    content: 'Wail, O '
  - type: note
    content: ver. 14; 1 Kgs. 10:22; 22:48
  - type: text
    content: ships of Tarshish,
  - type: text
    content: 'for Tyre is laid waste, '
  - type: note
    content: ch. 24:10
  - type: text
    content: without house or harbor!
  - type: text
    content: 'From '
  - type: note
    content: Jer. 2:10; See Gen. 10:4
  - type: text
    content: the land of Cyprus
  - type: note
    content: Hebrew Kittim; also verse 12
  - type: text
    content: it is revealed to them.
  '10':
  - type: text
    content: Cross over your land like the Nile,
  - type: text
    content: O daughter of Tarshish;
  - type: text
    content: there is no restraint anymore.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 14:21 ]'
  - type: text
    content: He has stretched out his hand over the sea;
  - type: text
    content: he has shaken the kingdoms;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has given command concerning Canaan'
  - type: text
    content: to destroy its strongholds.
  '12':
  - type: text
    content: 'And he said:'
  - type: text
    content: “You will no more exult,
  - type: text
    content: 'O oppressed virgin daughter of '
  - type: note
    content: See ver. 2
  - type: text
    content: Sidon;
  - type: text
    content: 'arise, '
  - type: note
    content: ver. 6
  - type: text
    content: 'cross over to '
  - type: note
    content: ver. 1
  - type: text
    content: Cyprus,
  - type: text
    content: even there you will have no rest.”
  '13':
  - type: text
    content: 'Behold the land of '
  - type: note
    content: ch. 47:1; 48:14
  - type: text
    content: the Chaldeans! This is the people that was not;
  - type: note
    content: Or that has become nothing
  - type: text
    content: ' Assyria destined it for wild beasts. They erected '
  - type: note
    content: '[2 Kgs. 25:1]'
  - type: text
    content: their siege towers, they stripped her palaces bare, they made her a ruin.
  '14':
  - type: text
    content: ' '
  - type: note
    content: See ver. 1
  - type: text
    content: Wail, O ships of Tarshish,
  - type: text
    content: for your stronghold is laid waste.
  '15':
  - type: text
    content: 'In that day Tyre will be forgotten for '
  - type: note
    content: Jer. 25:11, 22
  - type: text
    content: seventy years, like the days
  - type: note
    content: Or lifetime
  - type: text
    content: ' of one king. At the end of '
  - type: note
    content: Jer. 25:11, 22
  - type: text
    content: 'seventy years, it will happen to Tyre as in the song of the prostitute:'
  '16':
  - type: text
    content: “Take a harp;
  - type: text
    content: go about the city,
  - type: text
    content: O forgotten prostitute!
  - type: text
    content: Make sweet melody;
  - type: text
    content: sing many songs,
  - type: text
    content: that you may be remembered.”
  '17':
  - type: text
    content: 'At the end of '
  - type: note
    content: Jer. 25:11, 22
  - type: text
    content: 'seventy years, the '
  - type: text
    content: Lord
  - type: text
    content: ' will visit Tyre, and she will return to her wages and '
  - type: note
    content: Rev. 17:1, 2
  - type: text
    content: 'will prostitute herself with all the kingdoms of the world on the face of the earth. '
  '18':
  - type: text
    content: 'Her merchandise and her wages will be holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. It will not be stored or hoarded, but her merchandise will supply abundant food and fine clothing for those who dwell before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: Be still, O inhabitants of the coast;
  - type: text
    content: 'the merchants of '
  - type: note
    content: ver. 4, 12; Gen. 10:15; Josh. 19:28; Jer. 25:22; 27:3; Ezek. 27:8; 32:30; Joel 3:4; Zech. 9:2
  - type: text
    content: Sidon, who cross the sea, have filled you.
  '3':
  - type: text
    content: And on many waters
  - type: text
    content: your revenue was the grain of Shihor,
  - type: text
    content: the harvest of the Nile;
  - type: text
    content: 'you were '
  - type: note
    content: See Ezek. 27:3-23
  - type: text
    content: the merchant of the nations.
  '4':
  - type: text
    content: 'Be ashamed, O '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: Sidon, for the sea has spoken,
  - type: text
    content: 'the stronghold of the sea, saying:'
  - type: text
    content: “I have neither labored nor given birth,
  - type: text
    content: I have neither reared young men
  - type: text
    content: nor brought up young women.”
  '5':
  - type: text
    content: When the report comes to Egypt,
  - type: text
    content: they will be in anguish
  - type: note
    content: Hebrew they will have labor pains
  - type: text
    content: ' over the report about Tyre.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 12
  - type: text
    content: Cross over to Tarshish;
  - type: text
    content: wail, O inhabitants of the coast!
  '7':
  - type: text
    content: Is this your exultant city
  - type: note
    content: '[ Gen. 10:15 ]'
  - type: text
    content: whose origin is from days of old,
  - type: text
    content: whose feet carried her
  - type: text
    content: to settle far away?
  '8':
  - type: text
    content: Who has purposed this
  - type: text
    content: against Tyre, the bestower of crowns,
  - type: text
    content: whose merchants were princes,
  - type: text
    content: whose traders were the honored of the earth?
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has purposed it,'
  - type: note
    content: '[ Ezek. 28:7 ]'
  - type: text
    content: to defile the pompous pride of all glory,
  - type: note
    content: The Hebrew words for glory and hosts sound alike
  - type: text
    content: to dishonor all the honored of the earth.
