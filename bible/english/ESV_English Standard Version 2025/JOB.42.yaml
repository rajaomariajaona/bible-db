  '1':
  - type: heading
    content: Job’s Confession and Repentance
  - type: text
    content: 'Then Job answered the '
  - type: text
    content: Lord
  - type: text
    content: ' and said:'
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ps. 14:7
  - type: text
    content: 'restored the fortunes of Job, when he had prayed for his friends. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Job '
  - type: note
    content: Isa. 40:2; 61:7
  - type: text
    content: 'twice as much as he had before. '
  '11':
  - type: text
    content: 'Then came to him all his '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'brothers and sisters and all who had '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'known him before, and ate bread with him in his house. And they '
  - type: note
    content: ch. 2:11
  - type: text
    content: showed him sympathy and comforted him for all the evil
  - type: note
    content: Or disaster
  - type: text
    content: ' that the '
  - type: text
    content: Lord
  - type: text
    content: ' had brought upon him. And each of them gave him '
  - type: note
    content: Gen. 33:19; Josh. 24:32
  - type: text
    content: a piece of money
  - type: note
    content: Hebrew a qesitah; a unit of money of uncertain value
  - type: text
    content: ' and '
  - type: note
    content: Gen. 24:22
  - type: text
    content: a ring of gold.
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed '
  - type: note
    content: ch. 8:7
  - type: text
    content: 'the latter days of Job more than his beginning. And he had '
  - type: note
    content: '[ver. 10; ch. 1:3]'
  - type: text
    content: '14,000 sheep, 6,000 camels, 1,000 yoke of oxen, and 1,000 female donkeys. '
  '13':
  - type: text
    content: 'He had also '
  - type: note
    content: ch. 1:2
  - type: text
    content: 'seven sons and three daughters. '
  '14':
  - type: text
    content: 'And he called the name of the first daughter Jemimah, and the name of the second Keziah, and the name of the third Keren-happuch. '
  '15':
  - type: text
    content: 'And in all the land there were no women so beautiful as Job’s daughters. And their father gave them an inheritance '
  - type: note
    content: See Num. 27:1-8
  - type: text
    content: 'among their brothers. '
  '16':
  - type: text
    content: 'And after this Job lived 140 years, and '
  - type: note
    content: Gen. 50:23; [Ps. 128:6; Isa. 53:10]
  - type: text
    content: 'saw his sons, and his sons’ sons, four generations. '
  '17':
  - type: text
    content: 'And Job died, an old man, and '
  - type: note
    content: See ch. 5:26
  - type: text
    content: full of days.
  '2':
  - type: text
    content: '“I know that you can '
  - type: note
    content: Gen. 18:14; Matt. 19:26
  - type: text
    content: do all things,
  - type: text
    content: and that no purpose of yours can be thwarted.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 38:2
  - type: text
    content: ‘Who is this that hides counsel without knowledge?’
  - type: text
    content: Therefore I have uttered what I did not understand,
  - type: text
    content: 'things '
  - type: note
    content: Ps. 40:5; 131:1; 139:6
  - type: text
    content: too wonderful for me, which I did not know.
  '4':
  - type: text
    content: ‘Hear, and I will speak;
  - type: note
    content: ch. 38:3; 40:7
  - type: text
    content: I will question you, and you make it known to me.’
  '5':
  - type: text
    content: I had heard of you by the hearing of the ear,
  - type: text
    content: but now my eye sees you;
  '6':
  - type: text
    content: therefore I despise myself,
  - type: text
    content: and repent in
  - type: note
    content: Or and am comforted upon
  - type: text
    content: ' '
  - type: note
    content: '[ch. 30:19; Gen. 18:27]; See ch. 2:8'
  - type: text
    content: dust and ashes.”
  - type: heading
    content: The Lord Rebukes Job’s Friends
  '7':
  - type: text
    content: 'After the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken these words to Job, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Eliphaz '
  - type: note
    content: ch. 2:11; 1 Chr. 1:45
  - type: text
    content: 'the Temanite: “My anger burns against you and against your two friends, for you have not spoken of me what is right, as my servant Job has. '
  '8':
  - type: text
    content: 'Now therefore take '
  - type: note
    content: Num. 23:1; 1 Chr. 15:26
  - type: text
    content: 'seven bulls and seven rams and go to my servant Job and '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'offer up a burnt offering for yourselves. And my servant Job shall '
  - type: note
    content: Gen. 20:7; 1 Sam. 12:23; James 5:16; 1 John 5:16
  - type: text
    content: 'pray for you, for I will accept his prayer not to deal with you according to your folly. For you have not spoken of me what is right, as my servant Job has.” '
  '9':
  - type: note
    content: ch. 2:11
  - type: text
    content: 'So Eliphaz the Temanite and Bildad the Shuhite and Zophar the Naamathite went and did what the '
  - type: text
    content: Lord
  - type: text
    content: ' had told them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' accepted Job’s prayer.'
  - type: heading
    content: The Lord Restores Job’s Fortunes
