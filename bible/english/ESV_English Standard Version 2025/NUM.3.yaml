document_id: NUM.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sons of Aaron
  - type: text
    content: 'These are the generations of Aaron and Moses at the time when the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke with Moses on Mount Sinai. '
  '10':
  - type: text
    content: 'And you shall appoint Aaron and his sons, and '
  - type: note
    content: ch. 18:7; [Rom. 12:7]
  - type: text
    content: 'they shall guard their priesthood. But if '
  - type: note
    content: ver. 38; See ch. 1:51
  - type: text
    content: any outsider comes near, he shall be put to death.”
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '12':
  - type: text
    content: '“Behold, '
  - type: note
    content: ver. 41; ch. 8:16; 18:6
  - type: text
    content: 'I have taken the Levites from among the people of Israel instead of every firstborn who opens the womb among the people of Israel. The Levites shall be mine, '
  '13':
  - type: text
    content: 'for '
  - type: note
    content: See Ex. 13:2
  - type: text
    content: 'all the firstborn are mine. '
  - type: note
    content: ch. 8:17; Ex. 13:12, 15
  - type: text
    content: 'On the day that I struck down all the firstborn in the land of Egypt, I consecrated for my own all the firstborn in Israel, both of man and of beast. They shall be mine: I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the wilderness of Sinai, saying, '
  '15':
  - type: text
    content: '“List the sons of Levi, by fathers’ houses and by clans; '
  - type: note
    content: ver. 39; ch. 26:62; [ch. 1:47]
  - type: text
    content: 'every male from a month old and upward you shall list.” '
  '16':
  - type: text
    content: 'So Moses listed them according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', as he was commanded. '
  '17':
  - type: note
    content: ch. 26:57; Gen. 46:11; Ex. 6:16; 1 Chr. 6:1, 16; 23:6
  - type: text
    content: 'And these were the sons of Levi by their names: Gershon and Kohath and Merari. '
  '18':
  - type: text
    content: 'And these are the names of the sons of Gershon by their clans: '
  - type: note
    content: Ex. 6:17; 1 Chr. 6:17; 23:7
  - type: text
    content: 'Libni and Shimei. '
  '19':
  - type: text
    content: 'And the sons of Kohath by their clans: '
  - type: note
    content: Ex. 6:18; 1 Chr. 6:2, 18; 23:12
  - type: text
    content: 'Amram, Izhar, Hebron, and Uzziel. '
  '2':
  - type: text
    content: 'These are the names of the sons of Aaron: '
  - type: note
    content: See Ex. 6:23
  - type: text
    content: 'Nadab the firstborn, and Abihu, Eleazar, and Ithamar. '
  '20':
  - type: text
    content: 'And the sons of Merari by their clans: '
  - type: note
    content: Ex. 6:19; 1 Chr. 6:19; 23:21
  - type: text
    content: Mahli and Mushi. These are the clans of the Levites, by their fathers’ houses.
  '21':
  - type: text
    content: 'To Gershon belonged the clan of the Libnites and the clan of the Shimeites; these were the clans of the Gershonites. '
  '22':
  - type: text
    content: Their listing according to the number of all the males from a month old and upward was
  - type: note
    content: Hebrew their listing was
  - type: text
    content: ' 7,500. '
  '23':
  - type: note
    content: ch. 1:53
  - type: text
    content: 'The clans of the Gershonites were to camp behind the tabernacle on the west, '
  '24':
  - type: text
    content: 'with Eliasaph, the son of Lael as chief of the fathers’ house of the Gershonites. '
  '25':
  - type: text
    content: 'And the '
  - type: note
    content: ch. 4:24-26
  - type: text
    content: 'guard duty of the sons of Gershon in the tent of meeting involved '
  - type: note
    content: Ex. 25:9
  - type: text
    content: 'the tabernacle, '
  - type: note
    content: Ex. 26:7; 36:14
  - type: text
    content: 'the tent with '
  - type: note
    content: Ex. 26:14
  - type: text
    content: 'its covering, '
  - type: note
    content: Ex. 26:36
  - type: text
    content: 'the screen for the entrance of the tent of meeting, '
  '26':
  - type: note
    content: Ex. 27:9
  - type: text
    content: 'the hangings of the court, '
  - type: note
    content: Ex. 27:16
  - type: text
    content: 'the screen for the door of the court that is around the tabernacle and the altar, and '
  - type: note
    content: ver. 37; Ex. 35:18; 39:40
  - type: text
    content: its cords—all the service connected with these.
  '27':
  - type: text
    content: 'To Kohath belonged the clan of the '
  - type: note
    content: 1 Chr. 26:23
  - type: text
    content: 'Amramites and the clan of the Izharites and the clan of the Hebronites and the clan of the Uzzielites; these are the clans of the Kohathites. '
  '28':
  - type: text
    content: 'According to the number of all the males, from a month old and upward, there were 8,600, keeping guard over the sanctuary. '
  '29':
  - type: text
    content: 'The clans of the sons of Kohath were to camp on the south side of the tabernacle, '
  '3':
  - type: text
    content: 'These are the names of the sons of Aaron, '
  - type: note
    content: See Lev. 8
  - type: text
    content: 'the anointed priests, '
  - type: note
    content: See Ex. 28:41
  - type: text
    content: 'whom he ordained to serve as priests. '
  '30':
  - type: text
    content: 'with '
  - type: note
    content: '[Ex. 6:22; Lev. 10:4]'
  - type: text
    content: 'Elizaphan the son of Uzziel as chief of the fathers’ house of the clans of the Kohathites. '
  '31':
  - type: text
    content: 'And their guard duty involved '
  - type: note
    content: Ex. 25:10
  - type: text
    content: 'the ark, '
  - type: note
    content: Ex. 25:23
  - type: text
    content: 'the table, '
  - type: note
    content: Ex. 25:31
  - type: text
    content: 'the lampstand, '
  - type: note
    content: Ex. 27:1; 30:1
  - type: text
    content: 'the altars, the vessels of the sanctuary with which the priests minister, and '
  - type: note
    content: Ex. 26:36
  - type: text
    content: 'the screen; all the service connected with these. '
  '32':
  - type: text
    content: And Eleazar the son of Aaron the priest was to be chief over the chiefs of the Levites, and to have oversight of those who kept guard over the sanctuary.
  '33':
  - type: text
    content: 'To Merari belonged the clan of the Mahlites and the clan of the Mushites: these are the clans of Merari. '
  '34':
  - type: text
    content: 'Their listing according to the number of all the males from a month old and upward was 6,200. '
  '35':
  - type: text
    content: 'And the chief of the fathers’ house of the clans of Merari was Zuriel the son of Abihail. They were to camp on the north side of the tabernacle. '
  '36':
  - type: note
    content: ch. 4:31, 32
  - type: text
    content: 'And the appointed guard duty of the sons of Merari involved the '
  - type: note
    content: Ex. 26:15
  - type: text
    content: 'frames of the tabernacle, '
  - type: note
    content: Ex. 26:26
  - type: text
    content: 'the bars, '
  - type: note
    content: Ex. 26:32, 37
  - type: text
    content: 'the pillars, the bases, and all their accessories; all the service connected with these; '
  '37':
  - type: text
    content: 'also '
  - type: note
    content: Ex. 27:10
  - type: text
    content: 'the pillars around the court, with their bases and '
  - type: note
    content: Ex. 27:19
  - type: text
    content: 'pegs and '
  - type: note
    content: ver. 26
  - type: text
    content: cords.
  '38':
  - type: text
    content: 'Those who were to camp before the tabernacle on the east, before the tent of meeting toward the sunrise, were Moses and Aaron and his sons, '
  - type: note
    content: See ch. 1:53
  - type: text
    content: guarding the sanctuary itself, to protect
  - type: note
    content: Hebrew guard
  - type: text
    content: ' the people of Israel. And any outsider who came near was to be put to death. '
  '39':
  - type: text
    content: 'All those listed among the Levites, whom Moses and Aaron listed at the commandment of the '
  - type: text
    content: Lord
  - type: text
    content: ', by clans, all the males from a month old and upward, were '
  - type: note
    content: '[ver. 22, 28, 34; See ver. 46-49]'
  - type: text
    content: 22,000.
  - type: heading
    content: Redemption of the Firstborn
  '4':
  - type: note
    content: ch. 26:61; Lev. 10:1, 2; 1 Chr. 24:2
  - type: text
    content: 'But Nadab and Abihu died before the '
  - type: text
    content: Lord
  - type: text
    content: ' when they offered unauthorized fire before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the wilderness of Sinai, and they had no children. So Eleazar and Ithamar served as priests in the lifetime of Aaron their father.'
  - type: heading
    content: Duties of the Levites
  '40':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “List all the firstborn males of the people of Israel, from a month old and upward, taking the number of their names. '
  '41':
  - type: note
    content: ver. 12, 45
  - type: text
    content: 'And you shall take the Levites for me—I am the '
  - type: text
    content: Lord
  - type: text
    content: '—instead of all the firstborn among the people of Israel, and the cattle of the Levites instead of all the firstborn among the cattle of the people of Israel.” '
  '42':
  - type: text
    content: 'So Moses listed all the firstborn among the people of Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him. '
  '43':
  - type: text
    content: And all the firstborn males, according to the number of names, from a month old and upward as listed were 22,273.
  '44':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '45':
  - type: note
    content: ver. 12, 41
  - type: text
    content: '“Take the Levites instead of all the firstborn among the people of Israel, and the cattle of the Levites instead of their cattle. The Levites shall be mine: I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'And '
  - type: note
    content: ch. 18:15, 16; Ex. 13:13
  - type: text
    content: 'as the redemption price for the 273 of the firstborn of the people of Israel, over and above the number of the male Levites, '
  '47':
  - type: text
    content: 'you shall take '
  - type: note
    content: ch. 18:16; Lev. 27:6
  - type: text
    content: five shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' per head; you shall take them according to '
  - type: note
    content: See Ex. 30:13
  - type: text
    content: the shekel of the sanctuary (the shekel of twenty gerahs
  - type: note
    content: A gerah was about 1/50 ounce or 0.6 gram
  - type: text
    content: '), '
  '48':
  - type: text
    content: 'and give the money to Aaron and his sons as the redemption price for those who are over.” '
  '49':
  - type: text
    content: 'So Moses took the redemption money from those who were over and above those redeemed by the Levites. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '50':
  - type: text
    content: 'From the firstborn of the people of Israel he took the money, '
  - type: note
    content: ver. 46, 47
  - type: text
    content: '1,365 shekels, by the shekel of the sanctuary. '
  '51':
  - type: text
    content: 'And Moses '
  - type: note
    content: ver. 48
  - type: text
    content: 'gave the redemption money to Aaron and his sons, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: note
    content: ch. 1:50; 8:6; 18:2
  - type: text
    content: '“Bring the tribe of Levi near, and set them before Aaron the priest, that they may minister to him. '
  '7':
  - type: text
    content: 'They shall keep guard over him and over the whole congregation before the tent of meeting, '
  - type: note
    content: ch. 8:11, 15, 24, 26
  - type: text
    content: 'as they minister at the tabernacle. '
  '8':
  - type: text
    content: 'They shall guard all the furnishings of the tent of meeting, and keep guard over the people of Israel as they minister at the tabernacle. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ch. 8:19; 18:6
  - type: text
    content: 'you shall give the Levites to Aaron and his sons; they are '
  - type: note
    content: ch. 8:16
  - type: text
    content: 'wholly given to him from among the people of Israel. '
