document_id: LUK.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Beware of the Leaven of the Pharisees
  - type: text
    content: 'In the meantime, '
  - type: note
    content: ch. 11:29
  - type: text
    content: 'when so many thousands of the people had gathered together that they were trampling one another, he began to say to his disciples first, '
  - type: note
    content: Matt. 16:6, 11, 12; Mark 8:15
  - type: text
    content: '“Beware of '
  - type: note
    content: 1 Cor. 5:6-8; Gal. 5:9
  - type: text
    content: 'the leaven of the Pharisees, '
  - type: note
    content: Matt. 23:28; Mark 12:15
  - type: text
    content: which is hypocrisy.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: '[Matt. 12:31, 32; Mark 3:28-30; Heb. 6:4-6; 10:26; 1 John 5:16]'
  - type: text
    content: 'everyone who speaks a word '
  - type: note
    content: Matt. 11:19; John 7:12; 9:24
  - type: text
    content: 'against the Son of Man '
  - type: note
    content: 1 Tim. 1:12, 13
  - type: text
    content: 'will be forgiven, but the one who '
  - type: note
    content: '[Acts 7:51; Heb. 10:29]'
  - type: text
    content: blasphemes against the Holy Spirit will not be forgiven.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Matt. 10:17, 19; [ch. 21:12, 14; Mark 13:11]
  - type: text
    content: 'And when they '
  - type: note
    content: See Matt. 23:34
  - type: text
    content: 'bring you before the synagogues and '
  - type: note
    content: Titus 3:1
  - type: text
    content: 'the rulers and '
  - type: note
    content: Titus 3:1
  - type: text
    content: 'the authorities, '
  - type: note
    content: See ver. 22
  - type: text
    content: do not be anxious about how you should defend yourself or what you should say,
  - type: text
    content: ' '
  '12':
  - type: note
    content: See Matt. 10:19, 20
  - type: text
    content: for the Holy Spirit will teach you in that very hour what you ought to say.”
  - type: heading
    content: The Parable of the Rich Fool
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:27
  - type: text
    content: 'Someone in the crowd said to him, “Teacher, tell my brother to divide the inheritance with me.” '
  '14':
  - type: text
    content: 'But he said to him, '
  - type: note
    content: Mic. 6:8; Rom. 2:1, 3; 9:20
  - type: text
    content: '“Man, '
  - type: note
    content: '[Ex. 2:14; Acts 7:27]'
  - type: text
    content: who made me a judge or arbitrator over you?”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: 1 Tim. 6:6-11; [Heb. 13:5]
  - type: text
    content: “Take care, and be on your guard against all covetousness, for one’s life does not consist in the abundance of his possessions.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he told them a parable, saying, '
  - type: note
    content: '[Ps. 49:16-20]'
  - type: text
    content: “The land of a rich man produced plentifully,
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'and he thought to himself, '
  - type: note
    content: '[Eccles. 5:10]'
  - type: text
    content: ‘What shall I do, for I have nowhere to store my crops?’
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And he said, ‘I will do this: I will tear down my '
  - type: note
    content: ver. 24
  - type: text
    content: barns and build larger ones, and there I will store all my grain and my goods.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And I will say to my soul, “Soul, you have ample goods laid up '
  - type: note
    content: '[Prov. 27:1; James 4:13-15]'
  - type: text
    content: 'for many years; relax, '
  - type: note
    content: Eccles. 2:24; 11:9; 1 Cor. 15:32; [ch. 15:23]
  - type: text
    content: eat, drink, be merry.”’
  - type: text
    content: ' '
  '2':
  - type: note
    content: ch. 8:17; Mark 4:22; [1 Tim. 5:25]; For ver. 2-9, see Matt. 10:26-33
  - type: text
    content: Nothing is covered up that will not be revealed, or hidden that will not be known.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But God said to him, '
  - type: note
    content: Jer. 17:11; [Matt. 16:26]
  - type: text
    content: '‘Fool! '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'This night '
  - type: note
    content: Job 27:8
  - type: text
    content: 'your soul is required of you, and the things you have prepared, '
  - type: note
    content: Ps. 39:6; [Job 27:17-22; Eccles. 2:18, 21]
  - type: text
    content: whose will they be?’
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'So is the one '
  - type: note
    content: Matt. 6:19, 20
  - type: text
    content: who lays up treasure for himself and is not rich toward God.”
  - type: heading
    content: Do Not Be Anxious
  '22':
  - type: text
    content: 'And he said to his disciples, '
  - type: note
    content: For ver. 22-31, see Matt. 6:25-33
  - type: text
    content: '“Therefore I tell you, '
  - type: note
    content: ver. 11; ch. 10:41; Matt. 10:19; 13:22 (Gk.); 1 Cor. 7:32 (Gk.); Phil. 4:6; 1 Pet. 5:7
  - type: text
    content: do not be anxious about your life, what you will eat, nor about your body, what you will put on.
  - type: text
    content: ' '
  '23':
  - type: text
    content: For life is more than food, and the body more than clothing.
  - type: text
    content: ' '
  '24':
  - type: note
    content: '[Job 38:41; Ps. 147:9]'
  - type: text
    content: 'Consider the ravens: they neither sow nor reap, they have neither storehouse nor barn, and yet God feeds them. '
  - type: note
    content: See ver. 7
  - type: text
    content: Of how much more value are you than the birds!
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And which of you by being anxious can add a single hour to his '
  - type: note
    content: ch. 2:52 (Gk.)
  - type: text
    content: span of life?
  - type: note
    content: Or a single cubit to his stature; a cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' '
  '26':
  - type: text
    content: If then you are not able to do as small a thing as that, why are you anxious about the rest?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Consider the lilies, how they grow: they neither toil nor spin, yet I tell you, '
  - type: note
    content: 1 Kgs. 10:4-7
  - type: text
    content: even Solomon in all his glory was not arrayed like one of these.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But if God so clothes the grass, which is alive in the field today, and tomorrow is thrown into the oven, how much more will he clothe you, '
  - type: note
    content: Matt. 8:26; 14:31; 16:8; [ch. 17:6]
  - type: text
    content: O you of little faith!
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And do not seek what you are to eat and what you are to drink, nor '
  - type: note
    content: '[James 1:6]'
  - type: text
    content: be worried.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Therefore whatever you have said in the dark shall be heard in the light, and what you have whispered in '
  - type: note
    content: Matt. 6:6
  - type: text
    content: 'private rooms shall be proclaimed on '
  - type: note
    content: See ch. 5:19
  - type: text
    content: the housetops.
  - type: heading
    content: Have No Fear
  '30':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 6:8
  - type: text
    content: 'all the nations of the world seek after these things, and '
  - type: note
    content: Matt. 6:8
  - type: text
    content: your Father knows that you need them.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Instead, '
  - type: note
    content: '[Matt. 5:6, 20]'
  - type: text
    content: 'seek '
  - type: note
    content: ch. 11:2
  - type: text
    content: his
  - type: note
    content: Some manuscripts God’s
  - type: text
    content: ' '
  - type: text
    content: 'kingdom, '
  - type: note
    content: '[1 Kgs. 3:11-14; Mark 10:29, 30; 1 Tim. 4:8; 1 Pet. 3:9]'
  - type: text
    content: and these things will be added to you.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Isa. 41:14; 44:2
  - type: text
    content: '“Fear not, little '
  - type: note
    content: Isa. 40:11; Matt. 26:31; John 10:16; 21:15-17; Acts 20:28, 29; 1 Pet. 5:2, 3
  - type: text
    content: 'flock, for '
  - type: note
    content: '[ch. 10:21; Matt. 11:26; Eph. 1:5, 9; Phil. 2:13 ]'
  - type: text
    content: 'it is your Father’s good pleasure to give you '
  - type: note
    content: ch. 22:29; See Matt. 13:19
  - type: text
    content: the kingdom.
  - type: text
    content: ' '
  '33':
  - type: note
    content: See Matt. 19:21
  - type: text
    content: 'Sell your possessions, and '
  - type: note
    content: ch. 11:41
  - type: text
    content: 'give to the needy. '
  - type: note
    content: '[ch. 16:9]'
  - type: text
    content: 'Provide yourselves with moneybags that do not grow old, with '
  - type: note
    content: Matt. 6:20; [ver. 21; 1 Pet. 1:4]
  - type: text
    content: a treasure in the heavens that does not fail, where no thief approaches and no moth destroys.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Matt. 6:21
  - type: text
    content: For where your treasure is, there will your heart be also.
  - type: heading
    content: You Must Be Ready
  '35':
  - type: text
    content: ' '
  - type: note
    content: Eph. 6:14; 1 Pet. 1:13
  - type: text
    content: “Stay dressed for action
  - type: text
    content: ' '
  - type: note
    content: Greek Let your loins stay girded ; compare Exodus 12:11
  - type: text
    content: 'and '
  - type: note
    content: '[Matt. 25:7]'
  - type: text
    content: keep your lamps burning,
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'and be like men who are '
  - type: note
    content: See 2 Pet. 3:12
  - type: text
    content: 'waiting for their master to come home from the wedding feast, so that they may open the door to him at once when he comes and '
  - type: note
    content: Rev. 3:20
  - type: text
    content: knocks.
  - type: text
    content: ' '
  '37':
  - type: note
    content: See Matt. 24:42, 46
  - type: text
    content: Blessed are those servants
  - type: note
    content: Or bondservants
  - type: text
    content: ' '
  - type: text
    content: 'whom the master finds '
  - type: note
    content: See Matt. 24:42, 46
  - type: text
    content: 'awake when he comes. Truly, I say to you, '
  - type: note
    content: John 13:4; [ver. 35; ch. 17:8]
  - type: text
    content: 'he will dress himself for service and '
  - type: note
    content: '[ch. 22:27]'
  - type: text
    content: have them recline at table, and he will come and serve them.
  - type: text
    content: ' '
  '38':
  - type: text
    content: If he comes in the second watch, or in the third, and finds them awake, blessed are those servants!
  - type: text
    content: ' '
  '39':
  - type: note
    content: For ver. 39-46, [Matt. 24:43-51]
  - type: text
    content: 'But know this, that if the master of the house had known at what hour '
  - type: note
    content: '[1 Thess. 5:2; 2 Pet. 3:10; Rev. 3:3]'
  - type: text
    content: the thief was coming, he
  - type: note
    content: Some manuscripts add would have stayed awake and
  - type: text
    content: ' '
  - type: text
    content: would not have left his house to be broken into.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: '“I tell you, my friends, '
  - type: note
    content: Isa. 8:12, 13; 51:12, 13; Jer. 1:8; 1 Pet. 3:14
  - type: text
    content: do not fear those who kill the body, and after that have nothing more that they can do.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'You also must be '
  - type: note
    content: ver. 47; Matt. 25:10
  - type: text
    content: 'ready, for '
  - type: note
    content: ch. 21:27
  - type: text
    content: the Son of Man is coming at an hour you do not expect.”
  '41':
  - type: text
    content: 'Peter said, “Lord, '
  - type: note
    content: '[Mark 13:37]'
  - type: text
    content: 'are you telling this parable for us or for all?” '
  '42':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: '“Who then is '
  - type: note
    content: See Matt. 24:45
  - type: text
    content: 'the faithful and '
  - type: note
    content: See Matt. 24:45
  - type: text
    content: 'wise '
  - type: note
    content: ch. 16:1
  - type: text
    content: manager, whom his master will set over his household, to give them their portion of food at the proper time?
  - type: text
    content: ' '
  '43':
  - type: note
    content: John 13:17; Rev. 16:15
  - type: text
    content: Blessed is that servant
  - type: note
    content: Or bondservant; also verses 45, 46, 47
  - type: text
    content: ' '
  - type: text
    content: whom his master will find so doing when he comes.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Truly, I say to you, '
  - type: note
    content: Matt. 25:21, 23
  - type: text
    content: he will set him over all his possessions.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'But if that servant says to himself, ‘My master '
  - type: note
    content: Matt. 25:5; [Heb. 10:37; 2 Pet. 3:4, 9]
  - type: text
    content: 'is delayed in coming,’ and begins to beat the male and female servants, and to eat and drink and '
  - type: note
    content: 1 Thess. 5:7
  - type: text
    content: get drunk,
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'the master of that servant will come '
  - type: note
    content: 2 Pet. 3:12; [ver. 40]
  - type: text
    content: 'on a day when he does not expect him and '
  - type: note
    content: 2 Pet. 3:12; [ver. 40]
  - type: text
    content: at an hour he does not know, and will cut him in pieces and put him with the unfaithful.
  - type: text
    content: ' '
  '47':
  - type: note
    content: '[Matt. 11:24; John 15:22, 24]'
  - type: text
    content: 'And that servant who '
  - type: note
    content: '[James 4:17; 2 Pet. 2:21]'
  - type: text
    content: 'knew his master’s will but '
  - type: note
    content: ver. 40
  - type: text
    content: 'did not get ready '
  - type: note
    content: '[James 4:17; 2 Pet. 2:21]'
  - type: text
    content: 'or act according to his will, will receive a '
  - type: note
    content: '[Deut. 25:2, 3]'
  - type: text
    content: severe beating.
  - type: text
    content: ' '
  '48':
  - type: note
    content: Lev. 5:17; [Num. 15:29, 30]
  - type: text
    content: 'But the one who did not know, and did what deserved a beating, '
  - type: note
    content: Rom. 1:19, 20; 2:14, 15; [1 Tim. 1:13]
  - type: text
    content: 'will receive a light beating. '
  - type: note
    content: '[Matt. 25:29]; See Matt. 13:12'
  - type: text
    content: Everyone to whom much was given, of him much will be required, and from him to whom they entrusted much, they will demand the more.
  - type: heading
    content: Not Peace, but Division
  '49':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 3:11 ]'
  - type: text
    content: “I came to cast fire on the earth, and would that it were already kindled!
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But I will warn you whom to fear: fear him '
  - type: note
    content: James 4:12
  - type: text
    content: who, after he has killed, has authority to cast into hell.
  - type: note
    content: Greek Gehenna
  - type: text
    content: ' '
  - type: text
    content: Yes, I tell you, fear him!
  - type: text
    content: ' '
  '50':
  - type: note
    content: Mark 10:38
  - type: text
    content: 'I have a baptism to be baptized with, and how '
  - type: note
    content: 2 Cor. 5:14 (Gk.)
  - type: text
    content: great is my distress until it is accomplished!
  - type: text
    content: ' '
  '51':
  - type: note
    content: For ver. 51-53, see Matt. 10:34, 35
  - type: text
    content: 'Do you think that I have come to give peace on earth? '
  - type: note
    content: '[Rev. 6:4]'
  - type: text
    content: No, I tell you, but rather division.
  - type: text
    content: ' '
  '52':
  - type: text
    content: For from now on in one house there will be five divided, three against two and two against three.
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'They will be divided, '
  - type: note
    content: Matt. 10:21; [Mic. 7:6]
  - type: text
    content: father against son and son against father, mother against daughter and daughter against mother, mother-in-law against her daughter-in-law and daughter-in-law against mother-in-law.”
  - type: heading
    content: Interpreting the Time
  '54':
  - type: text
    content: 'He also said to the crowds, '
  - type: note
    content: '[Matt. 16:2, 3]'
  - type: text
    content: '“When you see '
  - type: note
    content: 1 Kgs. 18:43, 44
  - type: text
    content: a cloud rising in the west, you say at once, ‘A shower is coming.’ And so it happens.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 54 above]'
  - type: text
    content: 'when you see the south wind blowing, you say, ‘There will be '
  - type: note
    content: See Matt. 20:12
  - type: text
    content: scorching heat,’ and it happens.
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'You hypocrites! '
  - type: note
    content: Matt. 16:3
  - type: text
    content: You know how to interpret the appearance of earth and sky, but why do you not know how to interpret the present time?
  - type: heading
    content: Settle with Your Accuser
  '57':
  - type: text
    content: ' '
  - type: text
    content: '“And why '
  - type: note
    content: ch. 21:30
  - type: text
    content: 'do you not judge '
  - type: note
    content: John 7:24; 1 Cor. 11:13
  - type: text
    content: for yourselves what is right?
  - type: text
    content: ' '
  '58':
  - type: note
    content: Matt. 5:25, 26; [Prov. 25:8]
  - type: text
    content: As you go with your accuser before the magistrate, make an effort to settle with him on the way, lest he drag you to the judge, and the judge hand you over to the officer, and the officer put you in prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'I tell you, '
  - type: note
    content: '[Matt. 18:34, 35]'
  - type: text
    content: 'you will never get out until you have paid the very last '
  - type: note
    content: ch. 21:2; Mark 12:42
  - type: text
    content: penny.”
  - type: note
    content: Greek lepton, a Jewish bronze or copper coin worth about 1/128 of a denarius (which was a day’s wage for a laborer)
  '6':
  - type: text
    content: Are not five sparrows sold for two pennies?
  - type: note
    content: Greek two assaria; an assarion was a Roman copper coin worth about 1/16 of a denarius (which was a day’s wage for a laborer)
  - type: text
    content: ' '
  - type: text
    content: 'And '
  - type: note
    content: '[Ps. 50:11]'
  - type: text
    content: not one of them is forgotten before God.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Why, '
  - type: note
    content: See 1 Sam. 14:45
  - type: text
    content: 'even the hairs of your head are all numbered. Fear not; '
  - type: note
    content: Matt. 6:26; 12:12
  - type: text
    content: you are of more value than many sparrows.
  - type: heading
    content: Acknowledge Christ Before Men
  '8':
  - type: text
    content: ' '
  - type: text
    content: '“And I tell you, '
  - type: note
    content: '[ Rom. 10:9, 10; Heb. 10:35; Rev. 3:5 ]'
  - type: text
    content: 'everyone who acknowledges me before men, the Son of Man also will acknowledge '
  - type: note
    content: '[ch. 15:10; Matt. 25:31; 1 Tim. 5:21; Rev. 3:5 ]'
  - type: text
    content: before the angels of God,
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'but '
  - type: note
    content: 2 Tim. 2:12; 2 Pet. 2:1; 1 John 2:23; [Mark 8:38]
  - type: text
    content: 'the one who denies me before men '
  - type: note
    content: ch. 13:25; Matt. 7:23; 25:12
  - type: text
    content: 'will be denied '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: before the angels of God.
  - type: text
    content: ' '
