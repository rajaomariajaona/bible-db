document_id: ISA.43,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Only Savior
  - type: text
    content: 'But now thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: ch. 44:2, 21, 24
  - type: text
    content: he who created you, O Jacob,
  - type: text
    content: 'he who formed you, O Israel:'
  - type: note
    content: ch. 41:14
  - type: text
    content: “Fear not, for I have redeemed you;
  - type: note
    content: ch. 45:3, 4; [ Gen. 32:28 ]
  - type: text
    content: I have called you by name, you are mine.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ver. 12 ; ch. 44:8
  - type: text
    content: '“You are my witnesses,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: '“and '
  - type: note
    content: ch. 42:1
  - type: text
    content: my servant whom I have chosen,
  - type: text
    content: that you may know and believe me
  - type: text
    content: and understand that I am he.
  - type: note
    content: See ch. 41:4
  - type: text
    content: Before me no god was formed,
  - type: text
    content: nor shall there be any after me.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 45:21; Hos. 13:4
  - type: text
    content: 'I, I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and besides me there is no savior.
  '12':
  - type: text
    content: I declared and saved and proclaimed,
  - type: text
    content: when there was no strange god among you;
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'you are my witnesses,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and I am God.'
  '13':
  - type: text
    content: 'Also '
  - type: note
    content: ch. 41:4; Ps. 90:2; [John 8:58]
  - type: text
    content: henceforth I am he;
  - type: text
    content: there is none who can deliver from my hand;
  - type: text
    content: I work, and who can turn it back?”
  '14':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'your Redeemer, the Holy One of Israel:'
  - type: note
    content: '[ver. 4 ]'
  - type: text
    content: “For your sake I send to Babylon
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 47:1]'
  - type: text
    content: bring them all down as fugitives,
  - type: note
    content: ch. 23:13
  - type: text
    content: even the Chaldeans, in the ships in which they rejoice.
  '15':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', your Holy One,'
  - type: text
    content: the Creator of Israel, your King.”
  '16':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: ch. 51:10; Ex. 14:21, 22; Ps. 77:19
  - type: text
    content: who makes a way in the sea,
  - type: text
    content: a path in the mighty waters,
  '17':
  - type: text
    content: 'who '
  - type: note
    content: See Ex. 14:4-9
  - type: text
    content: brings forth chariot and horse,
  - type: text
    content: army and warrior;
  - type: text
    content: they lie down, they cannot rise,
  - type: note
    content: '[ Ps. 76:5, 6 ]'
  - type: text
    content: 'they are extinguished, '
  - type: note
    content: ch. 1:31; [Ps. 118:12]
  - type: text
    content: 'quenched like a wick:'
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 16:14; 23:7 ]'
  - type: text
    content: “Remember not the former things,
  - type: text
    content: nor consider the things of old.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 42:9; 2 Cor. 5:17; Rev. 21:5 ]'
  - type: text
    content: Behold, I am doing a new thing;
  - type: text
    content: now it springs forth, do you not perceive it?
  - type: note
    content: ch. 35:8
  - type: text
    content: I will make a way in the wilderness
  - type: note
    content: ch. 41:18; 48:21
  - type: text
    content: and rivers in the desert.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 66:12
  - type: text
    content: When you pass through the waters, I will be with you;
  - type: text
    content: and through the rivers, they shall not overwhelm you;
  - type: note
    content: Ps. 66:12
  - type: text
    content: 'when you walk through fire '
  - type: note
    content: ch. 42:25; [Dan. 3:25, 27]
  - type: text
    content: you shall not be burned,
  - type: text
    content: and the flame shall not consume you.
  '20':
  - type: text
    content: The wild beasts will honor me,
  - type: note
    content: See ch. 13:22
  - type: text
    content: the jackals and the ostriches,
  - type: note
    content: '[ch. 49:10 ]'
  - type: text
    content: for I give water in the wilderness,
  - type: text
    content: rivers in the desert,
  - type: text
    content: to give drink to my chosen people,
  '21':
  - type: text
    content: the people whom I formed for myself
  - type: note
    content: Ps. 79:13; [ Ps. 22:3; 105:1; Luke 1:74, 75; 1 Pet. 2:9 ]
  - type: text
    content: that they might declare my praise.
  '22':
  - type: text
    content: “Yet you did not call upon me, O Jacob;
  - type: text
    content: 'but '
  - type: note
    content: Mic. 6:3
  - type: text
    content: you have been weary of me, O Israel!
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 5:25 ]'
  - type: text
    content: You have not brought me your sheep for burnt offerings,
  - type: text
    content: or honored me with your sacrifices.
  - type: text
    content: I have not burdened you with offerings,
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: or wearied you with frankincense.
  '24':
  - type: text
    content: You have not bought me sweet cane with money,
  - type: text
    content: or satisfied me with the fat of your sacrifices.
  - type: text
    content: But you have burdened me with your sins;
  - type: text
    content: you have wearied me with your iniquities.
  '25':
  - type: text
    content: “I, I am he
  - type: note
    content: ch. 44:22; [ Ezek. 36:25, 26 ]
  - type: text
    content: 'who blots out '
  - type: note
    content: '[ch. 46:8]'
  - type: text
    content: your transgressions for my own sake,
  - type: text
    content: and I will not remember your sins.
  '26':
  - type: text
    content: 'Put me in remembrance; '
  - type: note
    content: ch. 1:18
  - type: text
    content: let us argue together;
  - type: text
    content: set forth your case, that you may be proved right.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 16:3 ]'
  - type: text
    content: Your first father sinned,
  - type: text
    content: 'and '
  - type: note
    content: '[Jer. 5:31]'
  - type: text
    content: your mediators transgressed against me.
  '28':
  - type: text
    content: 'Therefore '
  - type: note
    content: Lam. 2:2
  - type: text
    content: I will profane the princes of the sanctuary,
  - type: text
    content: 'and '
  - type: note
    content: '[Jer. 24:9; 29:22]'
  - type: text
    content: deliver Jacob to utter destruction
  - type: text
    content: and Israel to reviling.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: See Ex. 20:2
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel, your Savior.
  - type: note
    content: '[ch. 45:14; 52:3, 4 ]'
  - type: text
    content: I give Egypt as your ransom,
  - type: text
    content: 'Cush and '
  - type: note
    content: Ps. 72:10
  - type: text
    content: Seba in exchange for you.
  '4':
  - type: text
    content: Because you are precious in my eyes,
  - type: text
    content: and honored, and I love you,
  - type: text
    content: I give men in return for you,
  - type: text
    content: peoples in exchange for your life.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:10, 13, 14; 44:2; Jer. 30:10, 11
  - type: text
    content: Fear not, for I am with you;
  - type: note
    content: ch. 49:12; [ch. 60:8, 9; Ps. 107:3 ]
  - type: text
    content: I will bring your offspring from the east,
  - type: text
    content: and from the west I will gather you.
  '6':
  - type: text
    content: I will say to the north, Give up,
  - type: text
    content: and to the south, Do not withhold;
  - type: text
    content: 'bring '
  - type: note
    content: '[2 Cor. 6:18]'
  - type: text
    content: my sons from afar
  - type: text
    content: 'and '
  - type: note
    content: '[2 Cor. 6:18]'
  - type: text
    content: my daughters from the end of the earth,
  '7':
  - type: text
    content: everyone who is called by my name,
  - type: text
    content: whom I created for my glory,
  - type: text
    content: whom I formed and made.”
  '8':
  - type: text
    content: 'Bring out '
  - type: note
    content: ch. 42:19
  - type: text
    content: the people who are blind, yet have eyes,
  - type: text
    content: who are deaf, yet have ears!
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:1, 21, 22
  - type: text
    content: All the nations gather together,
  - type: text
    content: and the peoples assemble.
  - type: text
    content: Who among them can declare this,
  - type: text
    content: and show us the former things?
  - type: text
    content: Let them bring their witnesses to prove them right,
  - type: text
    content: and let them hear and say, It is true.
