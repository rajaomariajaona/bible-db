document_id: HEB.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Greater Than Moses
  - type: text
    content: Therefore, holy brothers,
  - type: note
    content: Or brothers and sisters; also verse 12
  - type: text
    content: ' you who share in '
  - type: note
    content: Eph. 4:1; Phil. 3:14
  - type: text
    content: 'a heavenly calling, consider Jesus, '
  - type: note
    content: '[John 20:21; Rom. 15:8]'
  - type: text
    content: 'the apostle and high priest of our confession, '
  '10':
  - type: text
    content: Therefore I was provoked with that generation,
  - type: text
    content: and said, ‘They always go astray in their heart;
  - type: text
    content: they have not known my ways.’
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:3, 5
  - type: text
    content: As I swore in my wrath,
  - type: text
    content: ‘They shall not enter my rest.’”
  '12':
  - type: text
    content: 'Take care, brothers, lest there be in any of you an evil, unbelieving heart, leading you to fall away from '
  - type: note
    content: See Matt. 16:16
  - type: text
    content: 'the living God. '
  '13':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 10:24, 25]'
  - type: text
    content: 'exhort one another every day, as long as it is called “today,” that none of you may be hardened by '
  - type: note
    content: '[Isa. 44:20; Rom. 7:11; Eph. 4:22]'
  - type: text
    content: 'the deceitfulness of sin. '
  '14':
  - type: text
    content: 'For we have come to share in Christ, '
  - type: note
    content: ver. 6; ch. 10:23; 1 Cor. 15:2
  - type: text
    content: 'if indeed we hold our original confidence firm to the end. '
  '15':
  - type: text
    content: As it is said,
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: “Today, if you hear his voice,
  - type: text
    content: do not harden your hearts as in the rebellion.”
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Num. 14:2; Deut. 1:34, 35
  - type: text
    content: 'who were those who heard and yet rebelled? Was it not '
  - type: note
    content: '[Num. 14:24, 30; Deut. 1:36, 38]'
  - type: text
    content: 'all those who left Egypt led by Moses? '
  '17':
  - type: text
    content: 'And with whom was he provoked for forty years? Was it not with those who sinned, '
  - type: note
    content: Num. 14:29; See Jude 5
  - type: text
    content: 'whose bodies fell in the wilderness? '
  '18':
  - type: text
    content: 'And to whom did he swear that '
  - type: note
    content: Deut. 1:34, 35; [ch. 4:2]
  - type: text
    content: 'they would not enter his rest, but to those who were disobedient? '
  '19':
  - type: text
    content: 'So we see that '
  - type: note
    content: ch. 4:6; Ps. 78:22; 106:24
  - type: text
    content: they were unable to enter because of unbelief.
  '2':
  - type: text
    content: 'who was faithful to him who appointed him, '
  - type: note
    content: ver. 5
  - type: text
    content: just as Moses also was faithful in all God’s
  - type: note
    content: Greek his; also verses 5, 6
  - type: text
    content: ' house. '
  '3':
  - type: text
    content: 'For Jesus has been counted worthy of more glory than Moses—as much more glory as the builder of a house has more honor than the house itself. '
  '4':
  - type: text
    content: '(For every house is built by someone, but '
  - type: note
    content: Eph. 2:10; 3:9
  - type: text
    content: 'the builder of all things is God.) '
  '5':
  - type: note
    content: ver. 2; Cited from Num. 12:7
  - type: text
    content: 'Now Moses was faithful in all God’s house '
  - type: note
    content: Ex. 14:31; Deut. 34:5; Josh. 1:2; 8:31; Ps. 105:26; Rev. 15:3
  - type: text
    content: 'as a servant, '
  - type: note
    content: Deut. 18:15, 18, 19
  - type: text
    content: 'to testify to the things that were to be spoken later, '
  '6':
  - type: text
    content: 'but Christ is faithful over God’s house as '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'a son. And '
  - type: note
    content: 1 Cor. 3:16; 6:19; 2 Cor. 6:16; Eph. 2:21; 1 Tim. 3:15; 1 Pet. 2:5
  - type: text
    content: 'we are his house, if indeed we '
  - type: note
    content: ver. 14; ch. 6:11; Ps. 119:33, 112; Matt. 10:22; Rev. 2:26
  - type: text
    content: hold fast our confidence and our boasting in our hope.
  - type: note
    content: Some manuscripts insert firm to the end
  - type: heading
    content: A Rest for the People of God
  '7':
  - type: text
    content: Therefore, as the Holy Spirit says,
  - type: note
    content: ver. 15 ; ch. 4:7; Cited from Ps. 95:7-11
  - type: text
    content: “Today, if you hear his voice,
  '8':
  - type: text
    content: do not harden your hearts as in the rebellion,
  - type: text
    content: on the day of testing in the wilderness,
  '9':
  - type: text
    content: where your fathers put me to the test
  - type: text
    content: 'and saw my works for '
  - type: note
    content: See Acts 7:36
  - type: text
    content: forty years.
