document_id: EZR.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Exiles Return
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-70, see Neh. 7:6-73
  - type: text
    content: 'Now these were the people of the province who came up out of the captivity of those exiles '
  - type: note
    content: 2 Kgs. 24:14-16; 25:11; 2 Chr. 36:20
  - type: text
    content: 'whom Nebuchadnezzar the king of Babylon had carried captive to Babylonia. They returned to Jerusalem and Judah, each to his own town. '
  '10':
  - type: text
    content: 'The sons of Bani, 642. '
  '11':
  - type: text
    content: 'The sons of Bebai, 623. '
  '12':
  - type: text
    content: 'The sons of Azgad, 1,222. '
  '13':
  - type: text
    content: 'The sons of Adonikam, 666. '
  '14':
  - type: text
    content: 'The sons of Bigvai, 2,056. '
  '15':
  - type: text
    content: 'The sons of Adin, 454. '
  '16':
  - type: text
    content: 'The sons of Ater, namely of Hezekiah, 98. '
  '17':
  - type: text
    content: 'The sons of Bezai, 323. '
  '18':
  - type: text
    content: 'The sons of Jorah, 112. '
  '19':
  - type: text
    content: 'The sons of Hashum, 223. '
  '2':
  - type: text
    content: 'They came with Zerubbabel, Jeshua, Nehemiah, Seraiah, Reelaiah, '
  - type: note
    content: Esth. 2:5, 6
  - type: text
    content: Mordecai, Bilshan, Mispar, Bigvai, Rehum, and Baanah.
  - type: text
    content: 'The number of the men of the people of Israel: '
  '20':
  - type: text
    content: 'The sons of Gibbar, 95. '
  '21':
  - type: text
    content: 'The sons of Bethlehem, 123. '
  '22':
  - type: text
    content: 'The men of Netophah, 56. '
  '23':
  - type: text
    content: 'The men of Anathoth, 128. '
  '24':
  - type: text
    content: 'The sons of Azmaveth, 42. '
  '25':
  - type: text
    content: 'The sons of Kiriath-arim, Chephirah, and Beeroth, 743. '
  '26':
  - type: text
    content: 'The sons of Ramah and Geba, 621. '
  '27':
  - type: text
    content: 'The men of Michmas, 122. '
  '28':
  - type: text
    content: 'The men of Bethel and Ai, 223. '
  '29':
  - type: text
    content: 'The sons of Nebo, 52. '
  '3':
  - type: note
    content: ch. 8:3; 10:25
  - type: text
    content: 'the sons of Parosh, 2,172. '
  '30':
  - type: text
    content: 'The sons of Magbish, 156. '
  '31':
  - type: text
    content: 'The sons of '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'the other Elam, 1,254. '
  '32':
  - type: text
    content: 'The sons of Harim, 320. '
  '33':
  - type: text
    content: 'The sons of Lod, Hadid, and Ono, 725. '
  '34':
  - type: text
    content: 'The sons of Jericho, 345. '
  '35':
  - type: text
    content: The sons of Senaah, 3,630.
  '36':
  - type: text
    content: 'The priests: the '
  - type: note
    content: For ver. 36-39, see 1 Chr. 24:7-18
  - type: text
    content: 'sons of Jedaiah, of the house of Jeshua, 973. '
  '37':
  - type: text
    content: 'The sons of Immer, 1,052. '
  '38':
  - type: text
    content: 'The '
  - type: note
    content: 1 Chr. 9:12
  - type: text
    content: 'sons of Pashhur, 1,247. '
  '39':
  - type: text
    content: The sons of Harim, 1,017.
  '4':
  - type: text
    content: 'The sons of Shephatiah, 372. '
  '40':
  - type: text
    content: 'The Levites: the sons of '
  - type: note
    content: '[Neh. 10:9]'
  - type: text
    content: 'Jeshua and Kadmiel, of the sons of Hodaviah, 74. '
  '41':
  - type: text
    content: 'The singers: the sons of '
  - type: note
    content: See 1 Chr. 6:39
  - type: text
    content: 'Asaph, 128. '
  '42':
  - type: text
    content: 'The sons of the '
  - type: note
    content: 1 Chr. 9:17, 18
  - type: text
    content: 'gatekeepers: the sons of Shallum, the sons of Ater, the sons of Talmon, the sons of Akkub, the sons of Hatita, and the sons of Shobai, in all 139.'
  '43':
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 9:2; Neh. 11:3
  - type: text
    content: 'The temple servants: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth, '
  '44':
  - type: text
    content: 'the sons of Keros, the sons of Siaha, the sons of Padon, '
  '45':
  - type: text
    content: 'the sons of Lebanah, the sons of Hagabah, the sons of Akkub, '
  '46':
  - type: text
    content: 'the sons of Hagab, the sons of Shamlai, the sons of Hanan, '
  '47':
  - type: text
    content: 'the sons of Giddel, the sons of Gahar, the sons of Reaiah, '
  '48':
  - type: text
    content: 'the sons of Rezin, the sons of Nekoda, the sons of Gazzam, '
  '49':
  - type: text
    content: 'the sons of Uzza, the sons of Paseah, the sons of Besai, '
  '5':
  - type: text
    content: 'The sons of Arah, 775. '
  '50':
  - type: text
    content: 'the sons of Asnah, the sons of Meunim, the sons of Nephisim, '
  '51':
  - type: text
    content: 'the sons of Bakbuk, the sons of Hakupha, the sons of Harhur, '
  '52':
  - type: text
    content: 'the sons of Bazluth, the sons of Mehida, the sons of Harsha, '
  '53':
  - type: text
    content: 'the sons of Barkos, the sons of Sisera, the sons of Temah, '
  '54':
  - type: text
    content: the sons of Neziah, and the sons of Hatipha.
  '55':
  - type: text
    content: ' '
  - type: note
    content: Neh. 11:3; [ 1 Kgs. 9:21 ]
  - type: text
    content: 'The sons of Solomon’s servants: the sons of Sotai, the sons of Hassophereth, the sons of Peruda, '
  '56':
  - type: text
    content: 'the sons of Jaalah, the sons of Darkon, the sons of Giddel, '
  '57':
  - type: text
    content: the sons of Shephatiah, the sons of Hattil, the sons of Pochereth-hazzebaim, and the sons of Ami.
  '58':
  - type: text
    content: All the temple servants and the sons of Solomon’s servants were 392.
  '59':
  - type: text
    content: 'The following were those who came up from Tel-melah, Tel-harsha, Cherub, Addan, and Immer, '
  - type: note
    content: '[1 Chr. 9:1]'
  - type: text
    content: 'though they could not prove their fathers’ houses or their descent, whether they belonged to Israel: '
  '6':
  - type: text
    content: 'The sons of Pahath-moab, namely the sons of Jeshua and Joab, 2,812. '
  '60':
  - type: text
    content: 'the sons of Delaiah, the sons of Tobiah, and the sons of Nekoda, 652. '
  '61':
  - type: text
    content: 'Also, of the sons of the priests: the sons of Habaiah, the sons of Hakkoz, and the sons of '
  - type: note
    content: 2 Sam. 17:27
  - type: text
    content: 'Barzillai (who had taken a wife from the daughters of Barzillai the Gileadite, and was called by their name). '
  '62':
  - type: text
    content: 'These sought their registration among those enrolled in the genealogies, but they were not found there, and '
  - type: note
    content: '[Num. 3:10]'
  - type: text
    content: 'so they were excluded from the priesthood as unclean. '
  '63':
  - type: text
    content: 'The '
  - type: note
    content: Neh. 8:9
  - type: text
    content: 'governor told them that they were not '
  - type: note
    content: Lev. 22:2, 10, 15, 16
  - type: text
    content: 'to partake of the most holy food, until there should be a priest to consult '
  - type: note
    content: See Ex. 28:30
  - type: text
    content: Urim and Thummim.
  '64':
  - type: text
    content: ' '
  - type: note
    content: Neh. 7:66, 67
  - type: text
    content: 'The whole assembly together was 42,360, '
  '65':
  - type: text
    content: 'besides their male and female servants, of whom there were 7,337, and they had 200 male and female '
  - type: note
    content: See 2 Chr. 35:25
  - type: text
    content: 'singers. '
  '66':
  - type: text
    content: 'Their horses were 736, their mules were 245, '
  '67':
  - type: text
    content: their camels were 435, and their donkeys were 6,720.
  '68':
  - type: text
    content: ' '
  - type: note
    content: Neh. 7:70-72
  - type: text
    content: 'Some of the heads of families, when they came to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' that is in Jerusalem, made freewill offerings for the house of God, to erect it on its site. '
  '69':
  - type: text
    content: 'According to their ability they gave to '
  - type: note
    content: '[1 Chr. 26:20]'
  - type: text
    content: the treasury of the work 61,000 darics
  - type: note
    content: A daric was a coin weighing about 1/4 ounce or 8.5 grams
  - type: text
    content: ' of gold, 5,000 minas'
  - type: note
    content: A mina was about 1 1/4 pounds or 0.6 kilogram
  - type: text
    content: ' of silver, and 100 priests’ garments.'
  '7':
  - type: text
    content: 'The sons of Elam, 1,254. '
  '70':
  - type: text
    content: ' '
  - type: note
    content: Neh. 7:73
  - type: text
    content: Now the priests, the Levites, some of the people, the singers, the gatekeepers, and the temple servants lived in their towns, and all the rest of Israel
  - type: note
    content: Hebrew all Israel
  - type: text
    content: ' in their towns.'
  '8':
  - type: text
    content: 'The sons of Zattu, 945. '
  '9':
  - type: text
    content: 'The sons of Zaccai, 760. '
