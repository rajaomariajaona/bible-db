          text: '12'
      marker-yv: yv-n
    - type: text
      text: “Go away for three days, then come again to me.” So the people went away.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Rehoboam took counsel with the old men, who had stood before Solomon his father while he was yet alive, saying, “How do you advise me to answer this people?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to him, “If you will be a servant to this people today and serve them, and speak good words to them when you answer them, then they will be your servants forever.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he abandoned the counsel that the old men gave him and took counsel with the young men who had grown up with him and stood before him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke that your father put on us’?” '
