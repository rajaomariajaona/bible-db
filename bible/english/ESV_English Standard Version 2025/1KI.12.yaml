document_id: 1KI.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rehoboam’s Folly
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-19, see 2 Chr. 10:1-19
  - type: text
    content: 'Rehoboam went to '
  - type: note
    content: '[Judg. 9:6]'
  - type: text
    content: 'Shechem, for all Israel had come to Shechem to make him king. '
  '10':
  - type: text
    content: 'And the young men who had grown up with him said to him, “Thus shall you speak to this people who said to you, ‘Your father made our yoke heavy, but you lighten it for us,’ thus shall you say to them, ‘My little finger is thicker than my father’s thighs. '
  '11':
  - type: text
    content: 'And now, whereas '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: my father laid on you a heavy yoke, I will add to your yoke. My father disciplined you with whips, but I will discipline you with scorpions.’”
  '12':
  - type: text
    content: 'So Jeroboam and all the people came to Rehoboam the third day, as the king said, '
  - type: note
    content: ver. 5
  - type: text
    content: '“Come to me again the third day.” '
  '13':
  - type: text
    content: 'And the king answered the people harshly, and forsaking the counsel that the old men had given him, '
  '14':
  - type: text
    content: 'he spoke to them according to the counsel of the young men, saying, '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: '“My father made your yoke heavy, but I will add to your yoke. My father disciplined you with whips, but I will discipline you with scorpions.” '
  '15':
  - type: text
    content: 'So the king did not listen to the people, for '
  - type: note
    content: ver. 24
  - type: text
    content: 'it was a turn of affairs brought about by the '
  - type: text
    content: Lord
  - type: text
    content: ' that he might fulfill his word, which '
  - type: note
    content: ch. 11:11, 31
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke by Ahijah the Shilonite to Jeroboam the son of Nebat.'
  - type: heading
    content: The Kingdom Divided
  '16':
  - type: text
    content: 'And when all Israel saw that the king did not listen to them, the people answered the king, “What portion do we have in David? We have no inheritance in the son of Jesse. '
  - type: note
    content: See 2 Sam. 20:1
  - type: text
    content: 'To your tents, O Israel! Look now to your own house, David.” So Israel went to their tents. '
  '17':
  - type: text
    content: 'But Rehoboam reigned over '
  - type: note
    content: ch. 11:13, 36
  - type: text
    content: 'the people of Israel who lived in the cities of Judah. '
  '18':
  - type: text
    content: 'Then King Rehoboam sent '
  - type: note
    content: ch. 4:6; 5:14
  - type: text
    content: 'Adoram, who was taskmaster over the forced labor, and all Israel stoned him to death with stones. And King Rehoboam hurried to mount his chariot to flee to Jerusalem. '
  '19':
  - type: note
    content: 2 Kgs. 17:21
  - type: text
    content: 'So Israel has been in rebellion against the house of David to this day. '
  '2':
  - type: text
    content: 'And as soon as '
  - type: note
    content: ch. 11:26
  - type: text
    content: 'Jeroboam the son of Nebat heard of it (for '
  - type: note
    content: ch. 11:40
  - type: text
    content: he was still in Egypt, where he had fled from King Solomon), then Jeroboam returned from
  - type: note
    content: Septuagint, Vulgate (compare 2 Chronicles 10:2); Hebrew lived in
  - type: text
    content: ' Egypt. '
  '20':
  - type: text
    content: 'And when all Israel heard that Jeroboam had returned, they sent and called him to the assembly and made him king over all Israel. There was none that followed the house of David but '
  - type: note
    content: ch. 11:13, 32, 36
  - type: text
    content: the tribe of Judah only.
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21-24, see 2 Chr. 11:1-4
  - type: text
    content: 'When Rehoboam came to Jerusalem, he assembled all the house of Judah and the tribe of Benjamin, 180,000 chosen warriors, to fight against the house of Israel, to restore the kingdom to Rehoboam the son of Solomon. '
  '22':
  - type: text
    content: 'But the word of God came to '
  - type: note
    content: 2 Chr. 12:5, 7, 15
  - type: text
    content: 'Shemaiah the man of God: '
  '23':
  - type: text
    content: '“Say to Rehoboam the son of Solomon, king of Judah, and to all the house of Judah and Benjamin, and to the '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'rest of the people, '
  '24':
  - type: text
    content: '‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', You shall not go up or fight against your relatives the people of Israel. Every man return to his home, '
  - type: note
    content: ver. 15
  - type: text
    content: 'for this thing is from me.’” So they listened to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and went home again, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Jeroboam’s Golden Calves
  '25':
  - type: text
    content: 'Then Jeroboam '
  - type: note
    content: '[Judg. 9:45]'
  - type: text
    content: 'built Shechem in the hill country of Ephraim and lived there. And he went out from there and '
  - type: note
    content: '[Judg. 8:17]'
  - type: text
    content: 'built Penuel. '
  '26':
  - type: text
    content: 'And Jeroboam said in his heart, “Now the kingdom will turn back to the house of David. '
  '27':
  - type: text
    content: 'If this people '
  - type: note
    content: Deut. 12:5, 6
  - type: text
    content: 'go up to offer sacrifices in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Jerusalem, then the heart of this people will turn again to their lord, to Rehoboam king of Judah, and they will kill me and return to Rehoboam king of Judah.” '
  '28':
  - type: text
    content: 'So the king took counsel and '
  - type: note
    content: 2 Kgs. 10:29; 17:16; 2 Chr. 11:15; 13:8; Hos. 8:5, 6; 10:5; 13:2; [ch. 14:9]
  - type: text
    content: 'made two calves of gold. And he said to the people, “You have gone up to Jerusalem long enough. '
  - type: note
    content: '[Ex. 32:4, 8]'
  - type: text
    content: 'Behold your gods, O Israel, who brought you up out of the land of Egypt.” '
  '29':
  - type: text
    content: 'And he set one in Bethel, and the other he put in Dan. '
  '3':
  - type: text
    content: 'And they sent and called him, and Jeroboam and all the assembly of Israel came and said to Rehoboam, '
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 13:34; 2 Kgs. 17:21
  - type: text
    content: this thing became a sin, for the people went as far as Dan to be before one.
  - type: note
    content: Septuagint went to the one at Bethel and to the other as far as Dan
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'He also made '
  - type: note
    content: ch. 13:32
  - type: text
    content: 'temples on high places and '
  - type: note
    content: ch. 13:33; 2 Kgs. 17:32; 2 Chr. 11:14, 15; 13:9
  - type: text
    content: 'appointed priests from among all the people, who were not of the Levites. '
  '32':
  - type: text
    content: 'And Jeroboam appointed a feast on the fifteenth day of the eighth month like '
  - type: note
    content: Lev. 23:33, 34; Num. 29:12
  - type: text
    content: 'the feast that was in Judah, and he offered sacrifices on the altar. So he did in Bethel, sacrificing to the calves that he made. And he placed in Bethel '
  - type: note
    content: ch. 13:2; [Amos 7:13]
  - type: text
    content: 'the priests of the high places that he had made. '
  '33':
  - type: text
    content: 'He went up to the altar that he had made in Bethel on the fifteenth day in the eighth month, in the month that he had devised from his own heart. And he instituted a feast for the people of Israel and went up to the altar '
  - type: note
    content: ch. 13:1
  - type: text
    content: to make offerings.
  '4':
  - type: note
    content: ch. 4:7, 22; 9:15; See 1 Sam. 8:11-18
  - type: text
    content: '“Your father made our yoke heavy. Now therefore lighten the hard service of your father and his heavy yoke on us, and we will serve you.” '
  '5':
  - type: text
    content: 'He said to them, '
  - type: note
    content: ver. 12
  - type: text
    content: “Go away for three days, then come again to me.” So the people went away.
  '6':
  - type: text
    content: 'Then King Rehoboam took counsel with the old men, who had stood before Solomon his father while he was yet alive, saying, “How do you advise me to answer this people?” '
  '7':
  - type: text
    content: 'And they said to him, “If you will be a servant to this people today and serve them, and speak good words to them when you answer them, then they will be your servants forever.” '
  '8':
  - type: text
    content: 'But he abandoned the counsel that the old men gave him and took counsel with the young men who had grown up with him and stood before him. '
  '9':
  - type: text
    content: 'And he said to them, “What do you advise that we answer this people who have said to me, ‘Lighten the yoke that your father put on us’?” '
