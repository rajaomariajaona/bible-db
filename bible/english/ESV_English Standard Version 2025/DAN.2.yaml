document_id: DAN.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Dream
  - type: text
    content: 'In the second year of the reign of Nebuchadnezzar, Nebuchadnezzar had dreams; '
  - type: note
    content: '[ch. 4:5; 5:9; Gen. 41:8]'
  - type: text
    content: 'his spirit was troubled, and '
  - type: note
    content: '[ch. 6:18; Esth. 6:1]'
  - type: text
    content: 'his sleep left him. '
  '10':
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'The Chaldeans answered the king and said, “There is not a man on earth who can meet the king’s demand, for no great and powerful king has asked such a thing of any magician or enchanter or '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'Chaldean. '
  '11':
  - type: text
    content: 'The thing that the king asks is difficult, and no one can show it to the king except '
  - type: note
    content: '[ch. 5:11, 14]'
  - type: text
    content: the gods, whose dwelling is not with flesh.”
  '12':
  - type: text
    content: 'Because of this the king was angry and '
  - type: note
    content: '[ch. 3:19]'
  - type: text
    content: 'very furious, and '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'commanded that all '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'the wise men of Babylon be destroyed. '
  '13':
  - type: text
    content: 'So the decree went out, and the wise men were about to be killed; and they sought '
  - type: note
    content: See ch. 1:4-7
  - type: text
    content: 'Daniel and his companions, to kill them. '
  '14':
  - type: text
    content: 'Then Daniel replied with prudence and discretion to '
  - type: note
    content: ver. 24, 25
  - type: text
    content: 'Arioch, the '
  - type: note
    content: '[Gen. 37:36]'
  - type: text
    content: 'captain of the king’s guard, who had gone out to kill the wise men of Babylon. '
  '15':
  - type: text
    content: He declared
  - type: note
    content: Aramaic answered and said; also verse 26
  - type: text
    content: ' to Arioch, the king’s captain, “Why is the decree of the king '
  - type: note
    content: ch. 3:22
  - type: text
    content: 'so urgent?” Then Arioch made the matter known to Daniel. '
  '16':
  - type: text
    content: And Daniel went in and requested the king to appoint him a time, that he might show the interpretation to the king.
  - type: heading
    content: God Reveals Nebuchadnezzar’s Dream
  '17':
  - type: text
    content: 'Then Daniel went to his house and made the matter known to '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'Hananiah, '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'Mishael, and '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'Azariah, his companions, '
  '18':
  - type: note
    content: '[Matt. 18:19]'
  - type: text
    content: 'and told them to seek mercy from the '
  - type: note
    content: ver. 19, 28, 37, 44; Rev. 11:13
  - type: text
    content: 'God of heaven concerning this mystery, so that Daniel and his companions might not '
  - type: note
    content: '[ver. 12, 24]'
  - type: text
    content: 'be destroyed with the rest of the wise men of Babylon. '
  '19':
  - type: text
    content: 'Then the mystery was revealed to Daniel in '
  - type: note
    content: '[Num. 12:6; Job 33:15, 16]'
  - type: text
    content: 'a vision of the night. Then Daniel '
  - type: note
    content: See Josh. 22:33
  - type: text
    content: 'blessed the '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'God of heaven. '
  '2':
  - type: text
    content: 'Then the king commanded that '
  - type: note
    content: '[See ch. 1:20 above]'
  - type: text
    content: 'the magicians, '
  - type: note
    content: '[See ch. 1:20 above]'
  - type: text
    content: 'the enchanters, the '
  - type: note
    content: Deut. 18:10, 11; 2 Chr. 33:6; Isa. 47:9, 12
  - type: text
    content: 'sorcerers, and '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'the Chaldeans be summoned to tell the king his dreams. So they came in and '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'stood before the king. '
  '20':
  - type: text
    content: 'Daniel answered and said:'
  - type: note
    content: 1 Chr. 29:10; Ps. 72:18; 113:2; 115:18; Luke 1:68
  - type: text
    content: “Blessed be the name of God forever and ever,
  - type: note
    content: '[ Isa. 28:29 ]'
  - type: text
    content: to whom belong wisdom and might.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 9; ch. 7:25 ]'
  - type: text
    content: He changes times and seasons;
  - type: note
    content: '[ch. 4:17; 5:20; Job 12:18; Ps. 75:7; Rom. 13:1 ]'
  - type: text
    content: he removes kings and sets up kings;
  - type: note
    content: See ch. 1:17
  - type: text
    content: he gives wisdom to the wise
  - type: note
    content: See ch. 1:17
  - type: text
    content: and knowledge to those who have understanding;
  '22':
  - type: text
    content: ' '
  - type: note
    content: Job 12:22; [ Ps. 25:14; 139:12; Amos 4:13; Heb. 4:13 ]
  - type: text
    content: he reveals deep and hidden things;
  - type: note
    content: Job 12:22; [ Ps. 25:14; 139:12; Amos 4:13; Heb. 4:13 ]
  - type: text
    content: he knows what is in the darkness,
  - type: note
    content: 1 Tim. 6:16; James 1:17; 1 John 1:5; [ John 1:4, 5 ]
  - type: text
    content: and the light dwells with him.
  '23':
  - type: text
    content: 'To you, O '
  - type: note
    content: Deut. 26:7; 1 Chr. 12:17; 29:18
  - type: text
    content: God of my fathers,
  - type: note
    content: '[ch. 6:10 ]'
  - type: text
    content: I give thanks and praise,
  - type: text
    content: 'for '
  - type: note
    content: '[ver. 20]; See ch. 1:17'
  - type: text
    content: you have given me wisdom and might,
  - type: text
    content: 'and have now made known to me what '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: we asked of you,
  - type: text
    content: for you have made known to us the king’s matter.”
  '24':
  - type: text
    content: 'Therefore Daniel went in to '
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'Arioch, whom the king had appointed to destroy the wise men of Babylon. He went and said thus to him: “Do not destroy the wise men of Babylon; bring me in before the king, and I will show the king the interpretation.”'
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'Arioch brought in Daniel before the king '
  - type: note
    content: ch. 3:24
  - type: text
    content: 'in haste and said thus to him: “I have found '
  - type: note
    content: ch. 5:13; Ezra 4:1; 6:16, 19, 20; 10:7, 16
  - type: text
    content: 'among the exiles from Judah a man who will make known to the king the interpretation.” '
  '26':
  - type: text
    content: 'The king declared to Daniel, '
  - type: note
    content: See ch. 1:7
  - type: text
    content: 'whose name was Belteshazzar, '
  - type: note
    content: '[ch. 5:16]'
  - type: text
    content: '“Are you able to make known to me the dream that I have seen and its interpretation?” '
  '27':
  - type: text
    content: 'Daniel answered the king and said, “No wise men, '
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'enchanters, '
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'magicians, or '
  - type: note
    content: ch. 4:7; 5:7
  - type: text
    content: 'astrologers can show to the king the mystery that the king has asked, '
  '28':
  - type: text
    content: 'but '
  - type: note
    content: See ver. 22
  - type: text
    content: 'there is a God in heaven who reveals mysteries, and he has made known to King Nebuchadnezzar '
  - type: note
    content: ch. 10:14; Hos. 3:5
  - type: text
    content: 'what will be in the latter days. Your dream and '
  - type: note
    content: ch. 4:5; 7:15
  - type: text
    content: 'the visions of your head as you lay in bed are these: '
  '29':
  - type: text
    content: 'To you, O king, as you lay in bed came thoughts of what would be after this, '
  - type: note
    content: ver. 45
  - type: text
    content: 'and he who reveals mysteries made known to you what is to be. '
  '3':
  - type: text
    content: 'And the king said to them, “I had a dream, and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'my spirit is troubled to know the dream.” '
  '30':
  - type: text
    content: 'But '
  - type: note
    content: '[Gen. 41:16; Acts 3:12]'
  - type: text
    content: 'as for me, this mystery has been revealed to me, not because of any wisdom that I have more than all the living, but in order that the interpretation may be made known to the king, and that '
  - type: note
    content: '[Eccles. 3:18]'
  - type: text
    content: you may know the thoughts of your mind.
  - type: heading
    content: Daniel Interprets the Dream
  '31':
  - type: text
    content: '“You saw, O king, and behold, a great image. This image, mighty and of exceeding brightness, stood before you, and its appearance was frightening. '
  '32':
  - type: note
    content: '[ver. 38]'
  - type: text
    content: 'The head of this image was of fine gold, '
  - type: note
    content: '[ver. 39]'
  - type: text
    content: 'its chest and arms of silver, its middle and '
  - type: note
    content: '[ver. 39]'
  - type: text
    content: 'thighs of bronze, '
  '33':
  - type: note
    content: '[ver. 40]'
  - type: text
    content: 'its legs of iron, its feet partly of iron and partly of clay. '
  '34':
  - type: text
    content: 'As you looked, a stone was cut out '
  - type: note
    content: '[ch. 8:25; Job 34:20; Lam. 4:6; 2 Cor. 5:1]'
  - type: text
    content: 'by no human hand, and it struck the image on its feet of iron and clay, and '
  - type: note
    content: ver. 35, 40, 44, 45; Isa. 8:9; [Matt. 21:44; Luke 20:18]
  - type: text
    content: 'broke them in pieces. '
  '35':
  - type: text
    content: 'Then the iron, the clay, the bronze, the silver, and the gold, all together were broken in pieces, and became '
  - type: note
    content: Ps. 1:4
  - type: text
    content: 'like the chaff of the summer threshing floors; and the wind carried them away, so that '
  - type: note
    content: '[Rev. 20:11]'
  - type: text
    content: 'not a trace of them could be found. But the stone that struck the image became '
  - type: note
    content: '[Isa. 2:2]'
  - type: text
    content: 'a great mountain '
  - type: note
    content: '[Ps. 80:9]'
  - type: text
    content: and filled the whole earth.
  '36':
  - type: text
    content: '“This was the dream. Now we will tell the king its interpretation. '
  '37':
  - type: text
    content: 'You, O king, '
  - type: note
    content: Ezra 7:12; Ezek. 26:7
  - type: text
    content: 'the king of kings, to whom '
  - type: note
    content: ver. 19
  - type: text
    content: 'the God of heaven '
  - type: note
    content: ch. 5:18; [Ezra 1:2]; See ver. 21
  - type: text
    content: 'has given the kingdom, the power, and the might, and the glory, '
  '38':
  - type: text
    content: 'and into whose hand he has given, wherever they dwell, the children of man, '
  - type: note
    content: ch. 4:21; Jer. 27:6
  - type: text
    content: 'the beasts of the field, and the birds of the heavens, making you rule over them all—you are '
  - type: note
    content: '[ver. 32]'
  - type: text
    content: 'the head of gold. '
  '39':
  - type: note
    content: '[ver. 32; ch. 5:28, 31]'
  - type: text
    content: 'Another kingdom inferior to you shall arise after you, and yet a third kingdom '
  - type: note
    content: '[See ver. 38 above]'
  - type: text
    content: 'of bronze, '
  - type: note
    content: '[ch. 7:6]'
  - type: text
    content: 'which shall rule over all the earth. '
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: the Chaldeans said to the king in Aramaic,
  - type: note
    content: The text from this point to the end of chapter 7 is in Aramaic
  - type: text
    content: ' '
  - type: note
    content: ch. 3:9; 5:10; 6:6, 21; See 1 Kgs. 1:31
  - type: text
    content: '“O king, live forever! Tell your servants the dream, and we will show the interpretation.” '
  '40':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 7:7, 23]'
  - type: text
    content: 'there shall be a fourth kingdom, strong as iron, because iron '
  - type: note
    content: See ver. 34
  - type: text
    content: 'breaks to pieces and shatters all things. And like iron that crushes, it shall '
  - type: note
    content: See ver. 34
  - type: text
    content: 'break and crush all these. '
  '41':
  - type: text
    content: 'And as you saw '
  - type: note
    content: '[ver. 33]'
  - type: text
    content: 'the feet and toes, partly of potter’s clay and partly of iron, it shall be a divided kingdom, but some of the '
  - type: note
    content: '[See ver. 40 above]'
  - type: text
    content: 'firmness of iron shall be in it, just as you saw iron mixed with the soft clay. '
  '42':
  - type: text
    content: 'And as the toes of the feet were partly iron and partly clay, so the kingdom shall be partly strong and partly brittle. '
  '43':
  - type: text
    content: As you saw the iron mixed with soft clay, so they will mix with one another in marriage,
  - type: note
    content: Aramaic by the seed of men
  - type: text
    content: ' but they will not hold together, just as iron does not mix with clay. '
  '44':
  - type: text
    content: 'And in the days of those kings '
  - type: note
    content: ver. 19
  - type: text
    content: 'the God of heaven will set up '
  - type: note
    content: ch. 4:3, 34; 6:26; 7:14, 27; Mic. 4:7; [Matt. 3:2; Luke 1:33; John 18:36]
  - type: text
    content: 'a kingdom that shall never be destroyed, nor shall the kingdom be left to another people. '
  - type: note
    content: '[Isa. 60:12]; See ver. 34'
  - type: text
    content: 'It shall break in pieces all these kingdoms and bring them to an end, and '
  - type: note
    content: ch. 4:3, 34; 6:26; 7:14, 27; Mic. 4:7; [Matt. 3:2; Luke 1:33; John 18:36]
  - type: text
    content: 'it shall stand forever, '
  '45':
  - type: text
    content: 'just as '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'you saw that '
  - type: note
    content: '[Isa. 28:16]'
  - type: text
    content: 'a stone was cut from a mountain by no human hand, and that '
  - type: note
    content: '[See ver. 44 above]'
  - type: text
    content: 'it broke in pieces the iron, the bronze, the clay, the silver, and the gold. A '
  - type: note
    content: ver. 28
  - type: text
    content: great God has made known to the king what shall be after this. The dream is certain, and its interpretation sure.”
  - type: heading
    content: Daniel Is Promoted
  '46':
  - type: text
    content: 'Then King Nebuchadnezzar '
  - type: note
    content: '[2 Sam. 14:22]'
  - type: text
    content: 'fell upon his face and '
  - type: note
    content: '[Matt. 8:2; Acts 10:25]'
  - type: text
    content: 'paid homage to Daniel, and commanded that '
  - type: note
    content: '[Acts 14:13]'
  - type: text
    content: 'an offering and '
  - type: note
    content: '[Ezra 6:10]'
  - type: text
    content: 'incense be offered up to him. '
  '47':
  - type: text
    content: 'The king answered and said to Daniel, “Truly, your '
  - type: note
    content: Deut. 10:17
  - type: text
    content: 'God is God of gods and '
  - type: note
    content: '[1 Tim. 6:15; Rev. 17:14; 19:16]'
  - type: text
    content: 'Lord of kings, and '
  - type: note
    content: See ver. 22
  - type: text
    content: 'a revealer of mysteries, for you have been able to reveal this mystery.” '
  '48':
  - type: text
    content: 'Then the king gave Daniel high honors and many great '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'gifts, and made him ruler over the whole '
  - type: note
    content: ch. 3:1, 12, 30; [Esth. 1:1]
  - type: text
    content: 'province of Babylon and '
  - type: note
    content: ch. 5:11; [ch. 4:9]
  - type: text
    content: 'chief prefect over all the wise men of Babylon. '
  '49':
  - type: text
    content: 'Daniel made a request of the king, and he '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'appointed '
  - type: note
    content: '[ch. 1:7]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego over the affairs of '
  - type: note
    content: '[See ver. 48 above]'
  - type: text
    content: 'the province of Babylon. But Daniel '
  - type: note
    content: Esth. 2:19
  - type: text
    content: remained at the king’s court.
  '5':
  - type: text
    content: 'The king answered and said to '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the Chaldeans, “The word from me is firm: if you do not make known to me the dream and its interpretation, you shall be '
  - type: note
    content: ch. 3:29
  - type: text
    content: 'torn limb from limb, '
  - type: note
    content: ch. 3:29
  - type: text
    content: 'and your '
  - type: note
    content: Ezra 6:11; [2 Kgs. 10:27]
  - type: text
    content: 'houses shall be laid in ruins. '
  '6':
  - type: text
    content: 'But if you show the dream and its interpretation, '
  - type: note
    content: '[ch. 5:7, 16]'
  - type: text
    content: 'you shall receive from me gifts and rewards and great honor. '
  - type: note
    content: '[ver. 7, 9]'
  - type: text
    content: 'Therefore show me the dream and its interpretation.” '
  '7':
  - type: text
    content: 'They answered a second time and said, “Let the king tell his servants the dream, and we will show its interpretation.” '
  '8':
  - type: text
    content: 'The king answered and said, “I know with certainty that you are trying to '
  - type: note
    content: Eph. 5:16; Col. 4:5
  - type: text
    content: 'gain time, because you see that the word from me is firm— '
  '9':
  - type: text
    content: 'if you do not make the dream known to me, '
  - type: note
    content: Esth. 4:11
  - type: text
    content: 'there is but one sentence for you. You have agreed to speak lying and corrupt words before me till '
  - type: note
    content: '[ver. 21; ch. 7:25]'
  - type: text
    content: 'the times change. '
  - type: note
    content: ver. 6; [ver. 7]
  - type: text
    content: 'Therefore tell me the dream, and I shall know that you can show me its interpretation.” '
