document_id: ACT.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Ravages the Church
  - type: text
    content: 'And '
  - type: note
    content: ch. 7:58; 22:20
  - type: text
    content: 'Saul '
  - type: note
    content: See Rom. 1:32
  - type: text
    content: approved of his execution.
  - type: text
    content: 'And there arose on that day a great persecution against the church in Jerusalem, and '
  - type: note
    content: ch. 11:19; See Matt. 10:23
  - type: text
    content: 'they were all scattered throughout the regions of Judea and Samaria, except the apostles. '
  '10':
  - type: text
    content: 'They all paid attention to him, from the least to the greatest, saying, '
  - type: note
    content: ch. 14:11; 28:6
  - type: text
    content: '“This man is the power of God that is called '
  - type: note
    content: '[ch. 19:27, 28]'
  - type: text
    content: 'Great.” '
  '11':
  - type: text
    content: 'And they paid attention to him because for a long time he had '
  - type: note
    content: ver. 9; [ver. 13; Gal. 3:1]
  - type: text
    content: 'amazed them with his magic. '
  '12':
  - type: text
    content: 'But when '
  - type: note
    content: ch. 16:33, 34; 18:8; Mark 16:16
  - type: text
    content: 'they believed Philip as he preached good news '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'about the kingdom of God and the name of Jesus Christ, '
  - type: note
    content: ch. 16:33, 34; 18:8; Mark 16:16
  - type: text
    content: 'they were baptized, both men and women. '
  '13':
  - type: text
    content: 'Even Simon himself believed, and after being baptized he continued with Philip. And '
  - type: note
    content: ver. 6, 7
  - type: text
    content: 'seeing signs and '
  - type: note
    content: ch. 19:11
  - type: text
    content: great miracles
  - type: note
    content: Greek works of power
  - type: text
    content: ' performed, '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: he was amazed.
  '14':
  - type: text
    content: 'Now when '
  - type: note
    content: ver. 1
  - type: text
    content: 'the apostles at Jerusalem heard that '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'Samaria had received the word of God, they sent to them Peter and John, '
  '15':
  - type: text
    content: 'who came down and prayed for them '
  - type: note
    content: ch. 2:38
  - type: text
    content: 'that they might receive the Holy Spirit, '
  '16':
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 19:2]'
  - type: text
    content: 'he had not yet '
  - type: note
    content: ch. 10:44; 11:15
  - type: text
    content: 'fallen on any of them, but '
  - type: note
    content: ch. 19:5; [ch. 2:38; 10:47, 48; Matt. 28:19; 1 Cor. 1:13, 15; Gal. 3:27]
  - type: text
    content: 'they had only been baptized in the name of the Lord Jesus. '
  '17':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 9:17; 19:6; [ch. 6:6; Heb. 6:2]
  - type: text
    content: 'they laid their hands on them and '
  - type: note
    content: See ch. 2:4
  - type: text
    content: 'they received the Holy Spirit. '
  '18':
  - type: text
    content: 'Now when Simon saw that the Spirit was given through the laying on of the apostles’ hands, he offered them money, '
  '19':
  - type: text
    content: 'saying, “Give me this power also, so that anyone on whom I lay my hands may receive the Holy Spirit.” '
  '2':
  - type: text
    content: 'Devout men buried Stephen and made great lamentation over him. '
  '20':
  - type: text
    content: 'But Peter said to him, '
  - type: note
    content: '[2 Kgs. 5:16; Dan. 5:17]'
  - type: text
    content: '“May your silver perish with you, because you thought you could obtain the gift of God '
  - type: note
    content: Isa. 55:1
  - type: text
    content: 'with money! '
  '21':
  - type: text
    content: 'You have neither part nor lot in this matter, for '
  - type: note
    content: 2 Kgs. 10:15; Ps. 78:37
  - type: text
    content: 'your heart is not right before God. '
  '22':
  - type: text
    content: 'Repent, therefore, of this wickedness of yours, and pray to the Lord that, '
  - type: note
    content: Dan. 4:27; 2 Tim. 2:25
  - type: text
    content: 'if possible, the intent of your heart may be forgiven you. '
  '23':
  - type: text
    content: 'For I see that you are in '
  - type: note
    content: Deut. 29:18; 32:32; Heb. 12:15
  - type: text
    content: the gall
  - type: note
    content: That is, a bitter fluid secreted by the liver; bile
  - type: text
    content: ' of bitterness and in '
  - type: note
    content: Isa. 58:6; [Eph. 4:3; Col. 3:14]
  - type: text
    content: 'the bond of iniquity.” '
  '24':
  - type: text
    content: 'And Simon answered, '
  - type: note
    content: '[Ex. 8:8; 9:28; 10:17]'
  - type: text
    content: “Pray for me to the Lord, that nothing of what you have said may come upon me.”
  '25':
  - type: text
    content: 'Now when they had testified and spoken the word of the Lord, they returned to Jerusalem, '
  - type: note
    content: '[ver. 6-8; John 4:39]'
  - type: text
    content: preaching the gospel to many villages of the Samaritans.
  - type: heading
    content: Philip and the Ethiopian Eunuch
  '26':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 5:19; 10:3; 11:13; 12:7, 23; 27:23; [Judg. 6:12; 13:3]
  - type: text
    content: an angel of the Lord said to Philip, “Rise and go toward the south
  - type: note
    content: Or go at about noon
  - type: text
    content: ' to the road that goes down from Jerusalem to Gaza.” This is a desert place. '
  '27':
  - type: text
    content: 'And he rose and went. And there was an '
  - type: note
    content: Ps. 68:31; 87:4; Zeph. 3:10
  - type: text
    content: 'Ethiopian, a '
  - type: note
    content: '[Jer. 38:7]'
  - type: text
    content: 'eunuch, a court official of Candace, queen of the Ethiopians, '
  - type: note
    content: Ezra 7:21
  - type: text
    content: 'who was in charge of all her treasure. '
  - type: note
    content: '[1 Kgs. 8:41, 42; John 12:20]'
  - type: text
    content: 'He had come to Jerusalem to worship '
  '28':
  - type: text
    content: 'and was returning, seated in his chariot, and he was reading the prophet Isaiah. '
  '29':
  - type: text
    content: 'And the Spirit said to Philip, “Go over and join this chariot.” '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: ch. 9:1, 13, 21; 22:4, 19; 26:10, 11; 1 Cor. 15:9; Gal. 1:13; Phil. 3:6; 1 Tim. 1:13
  - type: text
    content: 'Saul was ravaging the church, and entering house after house, he '
  - type: note
    content: '[James 2:6]'
  - type: text
    content: dragged off men and women and committed them to prison.
  - type: heading
    content: Philip Proclaims Christ in Samaria
  '30':
  - type: text
    content: 'So Philip ran to him and heard him reading Isaiah the prophet and asked, “Do you understand what you are reading?” '
  '31':
  - type: text
    content: 'And he said, '
  - type: note
    content: See Rom. 10:14
  - type: text
    content: '“How can I, unless someone '
  - type: note
    content: John 16:13
  - type: text
    content: 'guides me?” And '
  - type: note
    content: '[1 Kgs. 20:33; 2 Kgs. 10:15]'
  - type: text
    content: 'he invited Philip to come up and sit with him. '
  '32':
  - type: text
    content: 'Now the passage of the Scripture that he was reading was this:'
  - type: note
    content: Cited from Isa. 53:7, 8
  - type: text
    content: “Like a sheep he was led to the slaughter
  - type: text
    content: and like a lamb before its shearer is silent,
  - type: text
    content: so he opens not his mouth.
  '33':
  - type: text
    content: 'In his '
  - type: note
    content: '[Phil. 2:8]'
  - type: text
    content: humiliation justice was denied him.
  - type: text
    content: Who can describe his generation?
  - type: text
    content: For his life is taken away from the earth.”
  '34':
  - type: text
    content: 'And the eunuch said to Philip, “About whom, I ask you, does the prophet say this, about himself or about someone else?” '
  '35':
  - type: text
    content: 'Then Philip opened his mouth, and '
  - type: note
    content: Luke 24:27; [ch. 17:2; 18:28]
  - type: text
    content: 'beginning with this Scripture '
  - type: note
    content: See ch. 5:42
  - type: text
    content: 'he told him the good news about Jesus. '
  '36':
  - type: text
    content: 'And as they were going along the road they came to some water, and the eunuch said, “See, here is water! '
  - type: note
    content: ch. 10:47
  - type: text
    content: What prevents me from being baptized?”
  - type: note
    content: 'Some manuscripts add all or most of verse 37: And Philip said, “If you believe with all your heart, you may.” And he replied, “I believe that Jesus Christ is the Son of God.”'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And he commanded the chariot to stop, and they both went down into the water, Philip and the eunuch, and he baptized him. '
  '39':
  - type: text
    content: 'And when they came up out of the water, '
  - type: note
    content: 1 Kgs. 18:12; 2 Kgs. 2:16; Ezek. 3:12, 14; 8:3; 11:1, 24; 43:5
  - type: text
    content: 'the Spirit of the Lord '
  - type: note
    content: See 2 Cor. 12:2
  - type: text
    content: 'carried Philip away, and the eunuch saw him no more, and went on his way rejoicing. '
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: ver. 1
  - type: text
    content: 'those who were scattered went about preaching the word. '
  '40':
  - type: text
    content: But Philip found himself at Azotus, and as he passed through he preached the gospel to all the towns until he came to Caesarea.
  '5':
  - type: note
    content: ch. 6:5
  - type: text
    content: Philip went down to the city
  - type: note
    content: Some manuscripts a city
  - type: text
    content: ' of Samaria and proclaimed to them the Christ. '
  '6':
  - type: note
    content: '[John 4:39]'
  - type: text
    content: 'And the crowds with one accord paid attention to what was being said by Philip, when they heard him '
  - type: note
    content: John 2:23
  - type: text
    content: 'and saw the signs that he did. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: See Mark 16:17, 18
  - type: text
    content: 'unclean spirits, crying out with a loud voice, came out of many who had them, and many who were paralyzed or lame were healed. '
  '8':
  - type: text
    content: 'So '
  - type: note
    content: ver. 39; See John 16:22
  - type: text
    content: there was much joy in that city.
  - type: heading
    content: Simon the Magician Believes
  '9':
  - type: text
    content: 'But there was a man named Simon, '
  - type: note
    content: ver. 11; ch. 13:6
  - type: text
    content: 'who had previously practiced magic in the city and amazed the people of Samaria, '
  - type: note
    content: See ch. 5:36
  - type: text
    content: 'saying that he himself was somebody great. '
