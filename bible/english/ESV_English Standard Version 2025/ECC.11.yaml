document_id: ECC.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Cast Your Bread upon the Waters
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 32:20 ]'
  - type: text
    content: Cast your bread upon the waters,
  - type: note
    content: '[ Deut. 15:10; Prov. 19:17; Matt. 10:42; Luke 14:14; 2 Cor. 9:8; Gal. 6:9, 10; Heb. 6:10 ]'
  - type: text
    content: for you will find it after many days.
  '10':
  - type: text
    content: 'Remove vexation from your heart, and '
  - type: note
    content: 2 Cor. 7:1; 2 Tim. 2:22
  - type: text
    content: put away pain
  - type: note
    content: Or evil
  - type: text
    content: ' from your body, for youth and the dawn of life are vanity.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 112:9; Matt. 5:42; Luke 6:30; 1 Tim. 6:18, 19 ]'
  - type: text
    content: 'Give a portion to '
  - type: note
    content: Mic. 5:5; See Job 5:19; Prov. 6:16
  - type: text
    content: seven, or even to eight,
  - type: note
    content: '[ Luke 16:9; Eph. 5:16 ]'
  - type: text
    content: for you know not what disaster may happen on earth.
  '3':
  - type: text
    content: If the clouds are full of rain,
  - type: text
    content: they empty themselves on the earth,
  - type: text
    content: and if a tree falls to the south or to the north,
  - type: text
    content: in the place where the tree falls, there it will lie.
  '4':
  - type: text
    content: He who observes the wind will not sow,
  - type: text
    content: and he who regards the clouds will not reap.
  '5':
  - type: text
    content: 'As you do not know the way '
  - type: note
    content: '[ch. 1:6; John 3:8]'
  - type: text
    content: 'the spirit comes to '
  - type: note
    content: See Ps. 139:13-16
  - type: text
    content: the bones in the womb
  - type: note
    content: Some Hebrew manuscripts, Targum; most Hebrew manuscripts As you do not know the way of the wind, or how the bones grow in the womb
  - type: text
    content: ' of a woman with child, so you do not know the work of God who makes everything.'
  '6':
  - type: text
    content: 'In the morning sow your seed, and at evening '
  - type: note
    content: ch. 7:18
  - type: text
    content: withhold not your hand, for you do not know which will prosper, this or that, or whether both alike will be good.
  '7':
  - type: text
    content: 'Light is sweet, and it is pleasant for the eyes to '
  - type: note
    content: ch. 6:5; 7:11
  - type: text
    content: see the sun.
  '8':
  - type: text
    content: 'So if a person lives many years, let him rejoice in them all; but let him remember '
  - type: note
    content: '[ch. 12:1, 2]'
  - type: text
    content: 'that the days of darkness will be many. All that comes is '
  - type: note
    content: ch. 2:23; See ch. 1:2
  - type: text
    content: vanity.
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath”; also verse 10 (see note on 1:2)
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:10; 9:7 ]'
  - type: text
    content: 'Rejoice, O young man, in your youth, and let your heart cheer you in the days of your youth. '
  - type: note
    content: '[Num. 15:39; Job 31:7]'
  - type: text
    content: 'Walk in the ways of your heart and '
  - type: note
    content: ch. 6:9
  - type: text
    content: 'the sight of your eyes. But know that for all these things '
  - type: note
    content: See ch. 12:14
  - type: text
    content: God will bring you into judgment.
