document_id: GEN.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Flees from Laban
  - type: text
    content: 'Now Jacob heard that the sons of Laban were saying, “Jacob has taken all that was our father’s, and from what was our father’s he has gained all this wealth.” '
  '10':
  - type: text
    content: 'In the breeding season of the flock I lifted up my eyes and saw in a dream that the goats that mated with the flock were striped, spotted, and mottled. '
  '11':
  - type: text
    content: 'Then the angel of God said to me in the dream, ‘Jacob,’ and I said, ‘Here I am!’ '
  '12':
  - type: text
    content: 'And he said, ‘Lift up your eyes and see, all the goats that mate with the flock are striped, spotted, and mottled, for '
  - type: note
    content: '[Ex. 3:7]'
  - type: text
    content: 'I have seen all that Laban is doing to you. '
  '13':
  - type: text
    content: 'I am the God of Bethel, '
  - type: note
    content: See ch. 28:18-22
  - type: text
    content: 'where you anointed a pillar and made a vow to me. Now '
  - type: note
    content: ver. 3; ch. 32:9
  - type: text
    content: 'arise, go out from this land and return to the land of your kindred.’” '
  '14':
  - type: text
    content: 'Then Rachel and Leah answered and said to him, “Is there '
  - type: note
    content: '[2 Sam. 20:1; 1 Kgs. 12:16]'
  - type: text
    content: 'any portion or inheritance left to us in our father’s house? '
  '15':
  - type: text
    content: 'Are we not regarded by him as foreigners? For '
  - type: note
    content: ch. 30:26; See ch. 29:15-20, 27
  - type: text
    content: 'he has sold us, and he has indeed devoured our money. '
  '16':
  - type: text
    content: All the wealth that God has taken away from our father belongs to us and to our children. Now then, whatever God has said to you, do.”
  '17':
  - type: text
    content: 'So Jacob arose and set his sons and his wives on camels. '
  '18':
  - type: text
    content: 'He drove away all his livestock, all his property that he had gained, the livestock in his possession that he had acquired in '
  - type: note
    content: ch. 25:20; 28:2, 6, 7
  - type: text
    content: 'Paddan-aram, to go to the land of Canaan to his father Isaac. '
  '19':
  - type: text
    content: 'Laban had gone to shear his sheep, and Rachel stole her father’s '
  - type: note
    content: ver. 30, 34; [Judg. 17:5; 1 Sam. 15:23; 19:13; Ezek. 21:21; Hos. 3:4; Zech. 10:2]
  - type: text
    content: 'household gods. '
  '2':
  - type: text
    content: 'And Jacob saw '
  - type: note
    content: ch. 4:5
  - type: text
    content: 'that Laban did not regard him with favor as before. '
  '20':
  - type: text
    content: And Jacob tricked
  - type: note
    content: Hebrew stole the heart of; also verses 26, 27
  - type: text
    content: ' Laban the Aramean, by not telling him that he intended to flee. '
  '21':
  - type: text
    content: 'He fled with all that he had and arose and crossed the '
  - type: note
    content: Ex. 23:31; Ps. 72:8
  - type: text
    content: Euphrates,
  - type: note
    content: Hebrew the River
  - type: text
    content: ' and '
  - type: note
    content: 2 Kgs. 12:17; Luke 9:51
  - type: text
    content: set his face toward the hill country of Gilead.
  '22':
  - type: text
    content: 'When it was told Laban on the third day that Jacob had fled, '
  '23':
  - type: text
    content: 'he took his kinsmen with him and pursued him for seven days and followed close after him into the hill country of Gilead. '
  '24':
  - type: text
    content: 'But God came to Laban the Aramean '
  - type: note
    content: See ch. 20:3
  - type: text
    content: 'in a dream by night and said to him, “Be careful not to say anything to Jacob, '
  - type: note
    content: ch. 24:50; Num. 24:13; 2 Sam. 13:22
  - type: text
    content: either good or bad.”
  '25':
  - type: text
    content: 'And Laban overtook Jacob. Now Jacob had pitched his tent in the hill country, and Laban with his kinsmen pitched tents in the hill country of Gilead. '
  '26':
  - type: text
    content: 'And Laban said to Jacob, “What have you done, that you have '
  - type: note
    content: ver. 20
  - type: text
    content: 'tricked me and driven away my daughters like captives of the sword? '
  '27':
  - type: text
    content: 'Why did you flee secretly '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'and trick me, and did not tell me, so that I might have sent you away with mirth and songs, with tambourine and lyre? '
  '28':
  - type: text
    content: 'And why did you not permit me '
  - type: note
    content: ver. 55; Ruth 1:9, 14; 1 Kgs. 19:20; Acts 20:37
  - type: text
    content: 'to kiss my sons and my daughters farewell? Now you have done foolishly. '
  '29':
  - type: text
    content: 'It is '
  - type: note
    content: Deut. 28:32; Neh. 5:5 (Heb.); Prov. 3:27; Mic. 2:1
  - type: text
    content: 'in my power to do you harm. But the '
  - type: note
    content: ver. 42, 53; ch. 28:13
  - type: text
    content: God of your
  - type: note
    content: The Hebrew for your is plural here
  - type: text
    content: ' father spoke to me last night, saying, ‘Be careful not to say anything to Jacob, '
  - type: note
    content: ver. 24
  - type: text
    content: 'either good or bad.’ '
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Jacob, '
  - type: note
    content: ver. 13; ch. 28:15; 32:9
  - type: text
    content: “Return to the land of your fathers and to your kindred, and I will be with you.”
  '30':
  - type: text
    content: 'And now you have gone away because you longed greatly for your father’s house, but why did you '
  - type: note
    content: ver. 19; Judg. 18:24
  - type: text
    content: 'steal my gods?” '
  '31':
  - type: text
    content: 'Jacob answered and said to Laban, “Because I was afraid, for I thought that you would take your daughters from me by force. '
  '32':
  - type: note
    content: '[ch. 44:9]'
  - type: text
    content: Anyone with whom you find your gods shall not live. In the presence of our kinsmen point out what I have that is yours, and take it.” Now Jacob did not know that Rachel had stolen them.
  '33':
  - type: text
    content: 'So Laban went into Jacob’s tent and into Leah’s tent and into the tent of the two female servants, but he did not find them. And he went out of Leah’s tent and entered Rachel’s. '
  '34':
  - type: text
    content: 'Now Rachel had taken the household gods and put them in the camel’s saddle and sat on them. Laban felt all about the tent, but did not find them. '
  '35':
  - type: text
    content: 'And she said to her father, “Let not my lord be angry that I cannot '
  - type: note
    content: '[Lev. 19:32]'
  - type: text
    content: rise before you, for the way of women is upon me.” So he searched but did not find the household gods.
  '36':
  - type: text
    content: 'Then Jacob became angry and berated Laban. Jacob said to Laban, “What is my offense? What is my sin, that you have hotly pursued me? '
  '37':
  - type: text
    content: 'For you have felt through all my goods; what have you found of all your household goods? Set it here before my kinsmen and '
  - type: note
    content: ver. 54
  - type: text
    content: 'your kinsmen, that they may decide between us two. '
  '38':
  - type: text
    content: 'These twenty years I have been with you. Your ewes and your female goats have not miscarried, and I have not eaten the rams of your flocks. '
  '39':
  - type: text
    content: 'What was torn by wild beasts I did not bring to you. I bore the loss of it myself. '
  - type: note
    content: '[Ex. 22:12]'
  - type: text
    content: 'From my hand you required it, whether stolen by day or stolen by night. '
  '4':
  - type: text
    content: 'So Jacob sent and called Rachel and Leah into the field where his flock was '
  '40':
  - type: text
    content: 'There I was: by day the heat consumed me, and the cold by night, and my sleep fled from my eyes. '
  '41':
  - type: text
    content: 'These twenty years I have been in your house. '
  - type: note
    content: ch. 29:27, 28
  - type: text
    content: 'I served you fourteen years for your two daughters, and six years for your flock, and '
  - type: note
    content: ver. 7
  - type: text
    content: 'you have changed my wages ten times. '
  '42':
  - type: note
    content: Ps. 124:1, 2
  - type: text
    content: 'If the God of my father, the God of Abraham and the '
  - type: note
    content: ver. 53
  - type: text
    content: 'Fear of Isaac, had not been on my side, surely now you would have sent me away empty-handed. '
  - type: note
    content: See ch. 29:32
  - type: text
    content: 'God saw my affliction and the labor of my hands and '
  - type: note
    content: ver. 29
  - type: text
    content: rebuked you last night.”
  '43':
  - type: text
    content: 'Then Laban answered and said to Jacob, “The daughters are my daughters, the children are my children, the flocks are my flocks, and all that you see is mine. But what can I do this day for these my daughters or for their children whom they have borne? '
  '44':
  - type: text
    content: 'Come now, '
  - type: note
    content: ch. 26:28
  - type: text
    content: 'let us make a covenant, you and I. '
  - type: note
    content: Josh. 24:27
  - type: text
    content: 'And let it be a witness between you and me.” '
  '45':
  - type: text
    content: 'So Jacob '
  - type: note
    content: ch. 28:18
  - type: text
    content: 'took a stone and set it up as a pillar. '
  '46':
  - type: text
    content: 'And Jacob said to his kinsmen, “Gather stones.” And they took stones and made a heap, and they ate there by the heap. '
  '47':
  - type: text
    content: Laban called it Jegar-sahadutha,
  - type: note
    content: Aramaic the heap of witness
  - type: text
    content: ' but Jacob called it Galeed.'
  - type: note
    content: Hebrew the heap of witness
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Laban said, '
  - type: note
    content: ver. 44
  - type: text
    content: '“This heap is a witness between you and me today.” Therefore he named it Galeed, '
  '49':
  - type: note
    content: Judg. 11:29, 34
  - type: text
    content: and Mizpah,
  - type: note
    content: Mizpah means watchpost
  - type: text
    content: ' for he said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' watch between you and me, when we are out of one another’s sight. '
  '5':
  - type: text
    content: 'and said to them, '
  - type: note
    content: ver. 2
  - type: text
    content: '“I see that your father does not regard me with favor as he did before. But the God of my father '
  - type: note
    content: ver. 3
  - type: text
    content: 'has been with me. '
  '50':
  - type: text
    content: 'If you oppress my daughters, or if you take wives besides my daughters, although no one is with us, see, '
  - type: note
    content: Judg. 11:10; 1 Sam. 12:5; Jer. 42:5; Mic. 1:2; [Job 16:19]
  - type: text
    content: God is witness between you and me.”
  '51':
  - type: text
    content: 'Then Laban said to Jacob, “See this heap and the pillar, which I have set between you and me. '
  '52':
  - type: note
    content: ver. 43, 44
  - type: text
    content: 'This heap is a witness, and the pillar is a witness, that I will not pass over this heap to you, and you will not pass over this heap and this pillar to me, to do harm. '
  '53':
  - type: text
    content: 'The God of Abraham and the God of Nahor, the God of their father, judge between us.” So Jacob swore by the '
  - type: note
    content: ver. 42
  - type: text
    content: 'Fear of his father Isaac, '
  '54':
  - type: text
    content: 'and Jacob offered a sacrifice in the hill country and called '
  - type: note
    content: ver. 37
  - type: text
    content: his kinsmen to eat bread. They ate bread and spent the night in the hill country.
  '55':
  - type: text
    content: ' '
  - type: note
    content: Ch 32:1 in Hebrew
  - type: text
    content: 'Early in the morning Laban arose and kissed '
  - type: note
    content: ver. 28, 43
  - type: text
    content: his grandchildren and his daughters and blessed them. Then Laban departed and returned home.
  '6':
  - type: note
    content: ver. 38-40; ch. 30:29
  - type: text
    content: 'You know that I have served your father with all my strength, '
  '7':
  - type: text
    content: 'yet your father has cheated me and changed my wages '
  - type: note
    content: ver. 41; [Num. 14:22; Neh. 4:12; Job 19:3; Zech. 8:23]
  - type: text
    content: 'ten times. But God did not permit him to harm me. '
  '8':
  - type: text
    content: 'If he said, '
  - type: note
    content: ch. 30:32
  - type: text
    content: '‘The spotted shall be your wages,’ then all the flock bore spotted; and if he said, ‘The striped shall be your wages,’ then all the flock bore striped. '
  '9':
  - type: text
    content: 'Thus God has '
  - type: note
    content: ver. 1
  - type: text
    content: 'taken away the livestock of your father and given them to me. '
