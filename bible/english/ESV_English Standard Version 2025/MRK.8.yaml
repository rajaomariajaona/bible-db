document_id: MRK.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Feeds the Four Thousand
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-10, see Matt. 15:32-39; [ch. 6:32-44 ]
  - type: text
    content: 'In those days, when again a great crowd had gathered, and they had nothing to eat, he called his disciples to him and said to them, '
  '10':
  - type: text
    content: 'And immediately he got into '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'the boat with his disciples and went to the district of '
  - type: note
    content: '[Matt. 15:39]'
  - type: text
    content: Dalmanutha.
  - type: note
    content: Some manuscripts Magadan, or Magdala
  - type: heading
    content: The Pharisees Demand a Sign
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-21, see Matt. 16:1-12
  - type: text
    content: 'The Pharisees came and began to argue with him, '
  - type: note
    content: 1 Cor. 1:22; See Matt. 12:38
  - type: text
    content: 'seeking from him '
  - type: note
    content: Luke 11:16; 21:11
  - type: text
    content: 'a sign from heaven '
  - type: note
    content: John 8:6
  - type: text
    content: 'to test him. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ch. 7:34
  - type: text
    content: 'he sighed deeply '
  - type: note
    content: John 11:33
  - type: text
    content: 'in his spirit and said, '
  - type: text
    content: “Why does this generation seek a sign? Truly, I say to you, no sign will be given to this generation.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 4:13; 21:17
  - type: text
    content: he left them, got into the boat again, and went to the other side.
  - type: heading
    content: The Leaven of the Pharisees and Herod
  '14':
  - type: text
    content: 'Now they had forgotten to bring bread, and they had only one loaf with them in the boat. '
  '15':
  - type: text
    content: 'And he cautioned them, saying, '
  - type: text
    content: '“Watch out; '
  - type: note
    content: Luke 12:1
  - type: text
    content: 'beware of '
  - type: note
    content: 1 Cor. 5:6-8; Gal. 5:9
  - type: text
    content: 'the leaven of the Pharisees and the leaven of '
  - type: note
    content: '[ch. 3:6; 12:13]'
  - type: text
    content: Herod.”
  - type: note
    content: Some manuscripts the Herodians
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And they began discussing with one another the fact that they had no bread. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 26:10
  - type: text
    content: 'Jesus, aware of this, said to them, '
  - type: text
    content: '“Why are you discussing the fact that you have no bread? '
  - type: note
    content: ch. 7:18
  - type: text
    content: 'Do you not yet perceive '
  - type: note
    content: ch. 6:52
  - type: text
    content: 'or understand? '
  - type: note
    content: ch. 6:52
  - type: text
    content: Are your hearts hardened?
  - type: text
    content: ' '
  '18':
  - type: note
    content: Jer. 5:21; Ezek. 12:2; [Isa. 42:18, 19; 43:8; Matt. 13:13]
  - type: text
    content: Having eyes do you not see, and having ears do you not hear? And do you not remember?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'When I broke '
  - type: note
    content: ch. 6:41, 44
  - type: text
    content: the five loaves for the five thousand, how many baskets full of broken pieces did you take up?”
  - type: text
    content: ' They said to him, “Twelve.” '
  '2':
  - type: note
    content: '[Matt. 9:36]'
  - type: text
    content: “I have compassion on the crowd, because they have been with me now three days and have nothing to eat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: '“And '
  - type: note
    content: ver. 6, 9
  - type: text
    content: the seven for the four thousand, how many baskets full of broken pieces did you take up?”
  - type: text
    content: ' And they said to him, “Seven.” '
  '21':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Do you not yet understand?”
  - type: heading
    content: Jesus Heals a Blind Man at Bethsaida
  '22':
  - type: text
    content: 'And they came '
  - type: note
    content: See ch. 6:45
  - type: text
    content: 'to Bethsaida. And some people brought to him a blind man and begged him to touch him. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: ch. 7:33
  - type: text
    content: 'he took the blind man by the hand and led him out of the village, and when '
  - type: note
    content: ch. 7:33
  - type: text
    content: 'he had '
  - type: note
    content: John 9:6
  - type: text
    content: 'spit on his eyes and '
  - type: note
    content: See ch. 5:23
  - type: text
    content: 'laid his hands on him, he asked him, '
  - type: text
    content: “Do you see anything?”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he looked up and said, “I see people, but they look like trees, walking.” '
  '25':
  - type: text
    content: Then Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' laid his hands on his eyes again; and he opened his eyes, his sight was restored, and he saw everything clearly. '
  '26':
  - type: text
    content: 'And he sent him to his home, saying, '
  - type: note
    content: ver. 23; [Matt. 8:4]
  - type: text
    content: “Do not even enter the village.”
  - type: heading
    content: Peter Confesses Jesus as the Christ
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-29, see Matt. 16:13-16; Luke 9:18-20
  - type: text
    content: 'And Jesus went on with his disciples to the villages of Caesarea Philippi. And on the way he asked his disciples, '
  - type: text
    content: “Who do people say that I am?”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And they told him, '
  - type: note
    content: ch. 6:14; Matt. 14:2; Luke 9:7
  - type: text
    content: '“John the Baptist; and others say, '
  - type: note
    content: Luke 9:8; [ch. 9:11; Matt. 17:10; John 1:21]
  - type: text
    content: 'Elijah; and others, one of the prophets.” '
  '29':
  - type: text
    content: 'And he asked them, '
  - type: text
    content: “But who do you say that I am?”
  - type: text
    content: ' Peter answered him, '
  - type: note
    content: John 11:27
  - type: text
    content: '“You are '
  - type: note
    content: ch. 14:61, 62; See Matt. 1:17
  - type: text
    content: 'the Christ.” '
  '3':
  - type: text
    content: And if I send them away hungry to their homes, they will faint on the way. And some of them have come from far away.”
  - type: text
    content: ' '
  '30':
  - type: note
    content: Matt. 16:20; Luke 9:21; See Matt. 12:16
  - type: text
    content: And he strictly charged them to tell no one about him.
  - type: heading
    content: Jesus Foretells His Death and Resurrection
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ch. 8:31–9:1, see Matt. 16:21-28; Luke 9:22-27
  - type: text
    content: 'And he began to teach them that '
  - type: note
    content: ch. 10:33; [Luke 13:33]
  - type: text
    content: 'the Son of Man must '
  - type: note
    content: ch. 9:30, 31; Matt. 17:12, 22, 23; Luke 24:7
  - type: text
    content: 'suffer many things and '
  - type: note
    content: Luke 17:25; 1 Pet. 2:4; [ch. 12:10]
  - type: text
    content: 'be rejected by the elders and the chief priests and the scribes and be killed, and '
  - type: note
    content: ch. 10:34; Matt. 27:63; [Matt. 12:40]; See John 2:19
  - type: text
    content: 'after three days rise again. '
  '32':
  - type: text
    content: 'And he said this '
  - type: note
    content: John 16:25
  - type: text
    content: 'plainly. And Peter took him aside and began to rebuke him. '
  '33':
  - type: text
    content: 'But turning and seeing his disciples, he rebuked Peter and said, '
  - type: note
    content: '[Matt. 4:10]'
  - type: text
    content: '“Get behind me, Satan! For you '
  - type: note
    content: Rom. 8:5; Phil. 3:19; Col. 3:2; [Phil. 2:5]
  - type: text
    content: are not setting your mind on the things of God, but on the things of man.”
  '34':
  - type: text
    content: 'And calling the crowd to him with his disciples, he said to them, '
  - type: text
    content: '“If anyone would come after me, let him '
  - type: note
    content: '[2 Tim. 2:12, 13]'
  - type: text
    content: 'deny himself and '
  - type: note
    content: See Matt. 10:38, 39
  - type: text
    content: take up his cross and follow me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: whoever would save his life
  - type: note
    content: The same Greek word can mean either soul or life, depending on the context; twice in this verse and once in verse 36 and once in verse 37
  - type: text
    content: ' '
  - type: text
    content: 'will lose it, but whoever loses his life for my sake '
  - type: note
    content: ch. 10:29; [1 Cor. 9:23; 2 Tim. 1:8; Philem. 13]
  - type: text
    content: and the gospel’s will save it.
  - type: text
    content: ' '
  '36':
  - type: note
    content: '[Luke 12:20]'
  - type: text
    content: For what does it profit a man to gain the whole world and forfeit his soul?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For '
  - type: note
    content: '[Ps. 49:7, 8]'
  - type: text
    content: what can a man give in return for his soul?
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 1:16; 2 Tim. 1:8, 12, 16; Heb. 11:16; 1 John 2:28; [Matt. 10:33]
  - type: text
    content: 'whoever is ashamed of me and of my words in this '
  - type: note
    content: Isa. 57:3; Matt. 12:39; James 4:4
  - type: text
    content: 'adulterous and sinful generation, of him will the Son of Man also be ashamed '
  - type: note
    content: Dan. 7:10, 13; Zech. 14:5; Matt. 24:30; 25:31; 26:64; Acts 1:11; 1 Thess. 1:10; 4:16; Jude 14; Rev. 1:7; [Deut. 33:2]
  - type: text
    content: 'when he comes in the glory of his Father with '
  - type: note
    content: Acts 10:22; Rev. 14:10; [Matt. 13:41; 16:27]
  - type: text
    content: the holy angels.”
  '4':
  - type: text
    content: 'And his disciples answered him, “How can one feed these people with bread here in this desolate place?” '
  '5':
  - type: text
    content: 'And he asked them, '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: ' They said, '
  - type: note
    content: Matt. 16:10
  - type: text
    content: '“Seven.” '
  '6':
  - type: text
    content: 'And he directed the crowd to sit down on the ground. And he took the seven loaves, and '
  - type: note
    content: ch. 14:23; Matt. 26:27; Luke 22:17, 19; John 6:11, 23; Acts 27:35; Rom. 14:6; 1 Cor. 10:30; 11:24; 14:16; 1 Tim. 4:3, 4
  - type: text
    content: 'having given thanks, he broke them and gave them to his disciples to set before the people; and they set them before the crowd. '
  '7':
  - type: text
    content: 'And they had a few small fish. And '
  - type: note
    content: See Matt. 14:19
  - type: text
    content: 'having blessed them, he said that these also should be set before them. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Kgs. 4:42-44]'
  - type: text
    content: 'they ate and were satisfied. And they took up the broken pieces left over, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'seven baskets full. '
  '9':
  - type: text
    content: 'And there were about four thousand people. And he sent them away. '
