document_id: 2KI.24,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 36:6; Jer. 25:1, 9; Dan. 1:1
  - type: text
    content: 'In his days, Nebuchadnezzar king of Babylon came up, and Jehoiakim became his servant for three years. Then he turned and rebelled against him. '
  '10':
  - type: text
    content: 'At that time the servants of '
  - type: note
    content: Dan. 1:1
  - type: text
    content: 'Nebuchadnezzar king of Babylon came up to Jerusalem, and the city was besieged. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Nebuchadnezzar king of Babylon came to the city while his servants were besieging it, '
  '12':
  - type: note
    content: '[Jer. 24:1; 29:1, 2; Ezek. 17:12]'
  - type: text
    content: 'and Jehoiachin the king of Judah gave himself up to the king of Babylon, himself and his mother and his servants and his officials and his palace officials. '
  - type: note
    content: '[2 Chr. 36:10]'
  - type: text
    content: 'The king of Babylon took him prisoner '
  - type: note
    content: '[ch. 25:27]'
  - type: text
    content: 'in the eighth year of his reign '
  '13':
  - type: text
    content: 'and carried off all the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 20:17; Isa. 39:6
  - type: text
    content: 'and the treasures of the king’s house, '
  - type: note
    content: 2 Chr. 36:7; Ezra 1:7; Dan. 1:2; 5:2, 3
  - type: text
    content: 'and cut in pieces all the vessels of gold in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See 1 Kgs. 7:48-50
  - type: text
    content: 'which Solomon king of Israel had made, '
  - type: note
    content: Jer. 20:5
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had foretold. '
  '14':
  - type: note
    content: Jer. 24:1
  - type: text
    content: 'He carried away all Jerusalem and all the officials and all the mighty men of valor, '
  - type: note
    content: '[ver. 16; Jer. 52:28]'
  - type: text
    content: '10,000 captives, '
  - type: note
    content: Jer. 24:1; 29:2; [1 Sam. 13:19, 22]
  - type: text
    content: 'and all the craftsmen and the smiths. None remained, '
  - type: note
    content: ch. 25:12
  - type: text
    content: 'except the poorest people of the land. '
  '15':
  - type: note
    content: 2 Chr. 36:10; Esth. 2:6; [Jer. 22:24-26]
  - type: text
    content: 'And he carried away Jehoiachin to Babylon. The king’s mother, the king’s wives, his officials, and the chief men of the land he took into captivity from Jerusalem to Babylon. '
  '16':
  - type: text
    content: 'And the king of Babylon brought captive to Babylon all the men of valor, '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: '7,000, and the craftsmen and the metal workers, 1,000, all of them strong and fit for war. '
  '17':
  - type: note
    content: For ver. 17-20, see 2 Chr. 36:10-13
  - type: text
    content: 'And the king of Babylon '
  - type: note
    content: '[Jer. 37:1]'
  - type: text
    content: 'made Mattaniah, '
  - type: note
    content: '[1 Chr. 3:15]'
  - type: text
    content: 'Jehoiachin’s uncle, king in his place, '
  - type: note
    content: '[ch. 23:34; 2 Chr. 36:4]'
  - type: text
    content: and changed his name to Zedekiah.
  - type: heading
    content: Zedekiah Reigns in Judah
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ch. 24:18–25:21, see Jer. 52:1-27
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned eleven years in Jerusalem. His mother’s name was '
  - type: note
    content: ch. 23:31
  - type: text
    content: 'Hamutal the daughter of Jeremiah of Libnah. '
  '19':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 23:37
  - type: text
    content: 'according to all that Jehoiakim had done. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent against him bands of the '
  - type: note
    content: ch. 25:4; Jer. 32:28, 29; 35:11; [Ezek. 19:8]
  - type: text
    content: 'Chaldeans and '
  - type: note
    content: Jer. 35:11
  - type: text
    content: 'bands of the Syrians and bands of the Moabites and bands of the Ammonites, and sent them against Judah to destroy it, '
  - type: note
    content: ch. 20:17; 21:12-14; 23:27
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke by his servants the prophets. '
  '20':
  - type: text
    content: 'For because of the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' it came to the point in Jerusalem and Judah that he cast them out from his presence.'
  - type: note
    content: '[ Ezek. 17:18 ]'
  - type: text
    content: And Zedekiah rebelled against the king of Babylon.
  '3':
  - type: text
    content: 'Surely this came upon Judah at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ', to remove them out of his sight, '
  - type: note
    content: ch. 21:11; 23:26
  - type: text
    content: 'for the sins of Manasseh, according to all that he had done, '
  '4':
  - type: text
    content: 'and also '
  - type: note
    content: ch. 21:16
  - type: text
    content: 'for the innocent blood that he had shed. For he filled Jerusalem with innocent blood, and the '
  - type: text
    content: Lord
  - type: text
    content: ' would not pardon. '
  '5':
  - type: note
    content: 2 Chr. 36:8
  - type: text
    content: 'Now the rest of the deeds of Jehoiakim and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '6':
  - type: text
    content: 'So Jehoiakim '
  - type: note
    content: '[2 Chr. 36:6; Jer. 22:18, 19; 36:30]'
  - type: text
    content: 'slept with his fathers, and Jehoiachin his son reigned in his place. '
  '7':
  - type: note
    content: Jer. 37:5-7
  - type: text
    content: 'And the king of Egypt did not come again out of his land, '
  - type: note
    content: '[Jer. 46:2, 20, 24, 26]'
  - type: text
    content: 'for the king of Babylon had taken all that belonged to the king of Egypt '
  - type: note
    content: See Num. 34:5
  - type: text
    content: from the Brook of Egypt to the river Euphrates.
  - type: heading
    content: Jehoiachin Reigns in Judah
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Chr. 3:16; Esth. 2:6; Jer. 22:24, 28; 24:1; 37:1 ]'
  - type: text
    content: 'Jehoiachin was '
  - type: note
    content: '[2 Chr. 36:9]'
  - type: text
    content: 'eighteen years old when he became king, and he reigned three months in Jerusalem. His mother’s name was Nehushta the daughter of Elnathan of Jerusalem. '
  '9':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 23:37
  - type: text
    content: according to all that his father had done.
  - type: heading
    content: Jerusalem Captured
