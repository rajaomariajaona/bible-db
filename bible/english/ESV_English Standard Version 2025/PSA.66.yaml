document_id: PSA.66,59
type_code: eng
verses:
  '1':
  - type: heading
    content: How Awesome Are Your Deeds
  - type: text
    content: To the choirmaster. A Song. A Psalm.
  - type: text
    content: ' '
  - type: note
    content: Ps. 81:1; 95:1; 98:4; 100:1
  - type: text
    content: Shout for joy to God, all the earth;
  '10':
  - type: text
    content: 'For you, O God, have '
  - type: note
    content: See Job 23:10
  - type: text
    content: tested us;
  - type: text
    content: you have tried us as silver is tried.
  '11':
  - type: text
    content: 'You brought us into '
  - type: note
    content: Lam. 1:13; Ezek. 12:13
  - type: text
    content: the net;
  - type: text
    content: you laid a crushing burden on our backs;
  '12':
  - type: text
    content: 'you let men '
  - type: note
    content: Isa. 51:23
  - type: text
    content: ride over our heads;
  - type: text
    content: 'we went through fire and through '
  - type: note
    content: Isa. 43:2
  - type: text
    content: water;
  - type: text
    content: yet you have brought us out to a place of abundance.
  '13':
  - type: text
    content: I will come into your house with burnt offerings;
  - type: text
    content: 'I will '
  - type: note
    content: See Ps. 50:14
  - type: text
    content: perform my vows to you,
  '14':
  - type: text
    content: that which my lips uttered
  - type: text
    content: 'and my mouth promised '
  - type: note
    content: See Ps. 18:6
  - type: text
    content: when I was in trouble.
  '15':
  - type: text
    content: I will offer to you burnt offerings of fattened animals,
  - type: text
    content: with the smoke of the sacrifice of rams;
  - type: text
    content: 'I will make an offering of bulls and goats. '
  - type: text
    content: Selah
  '16':
  - type: text
    content: ' '
  - type: note
    content: ver. 5 ; Ps. 34:11
  - type: text
    content: Come and hear, all you who fear God,
  - type: text
    content: and I will tell what he has done for my soul.
  '17':
  - type: text
    content: I cried to him with my mouth,
  - type: text
    content: and high praise was on
  - type: note
    content: Hebrew under
  - type: text
    content: ' my tongue.'
  - type: note
    content: Or and he was exalted with my tongue
  '18':
  - type: text
    content: 'If I had '
  - type: note
    content: Job 36:21
  - type: text
    content: cherished iniquity in my heart,
  - type: note
    content: '[ Prov. 28:9; Isa. 59:2; John 9:31; James 4:3; See Job 27:9 ]'
  - type: text
    content: the Lord would not have listened.
  '19':
  - type: text
    content: 'But truly '
  - type: note
    content: Ps. 116:1, 2
  - type: text
    content: God has listened;
  - type: text
    content: he has attended to the voice of my prayer.
  '2':
  - type: text
    content: sing the glory of his name;
  - type: note
    content: '[ Josh. 7:19; Isa. 42:12 ]'
  - type: text
    content: give to him glorious praise!
  '20':
  - type: text
    content: Blessed be God,
  - type: text
    content: because he has not rejected my prayer
  - type: text
    content: or removed his steadfast love from me!
  '3':
  - type: text
    content: 'Say to God, '
  - type: note
    content: See Ps. 65:5
  - type: text
    content: “How awesome are your deeds!
  - type: text
    content: 'So great is your power that your enemies '
  - type: note
    content: See Ps. 18:44
  - type: text
    content: come cringing to you.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 22:27
  - type: text
    content: All the earth worships you
  - type: text
    content: and sings praises to you;
  - type: text
    content: 'they sing praises to your name.” '
  - type: text
    content: Selah
  '5':
  - type: text
    content: ' '
  - type: note
    content: ver. 16 ; Ps. 46:8
  - type: text
    content: 'Come and see what God has done:'
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: he is awesome in his deeds toward the children of man.
  '6':
  - type: text
    content: 'He '
  - type: note
    content: '[Ex. 14:21]'
  - type: text
    content: turned the sea into dry land;
  - type: text
    content: 'they '
  - type: note
    content: Ps. 74:15; See Josh. 3:14-17
  - type: text
    content: passed through the river on foot.
  - type: text
    content: There did we rejoice in him,
  '7':
  - type: text
    content: who rules by his might forever,
  - type: text
    content: 'whose '
  - type: note
    content: See Ps. 11:4
  - type: text
    content: eyes keep watch on the nations—
  - type: text
    content: 'let not the rebellious exalt themselves. '
  - type: text
    content: Selah
  '8':
  - type: text
    content: Bless our God, O peoples;
  - type: text
    content: let the sound of his praise be heard,
  '9':
  - type: text
    content: who has kept our soul among the living
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 121:3
  - type: text
    content: has not let our feet slip.
