document_id: ACT.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul in Macedonia and Greece
  - type: text
    content: 'After the uproar ceased, Paul sent for the disciples, and after encouraging them, he said farewell and '
  - type: note
    content: See ch. 19:21
  - type: text
    content: 'departed for Macedonia. '
  '10':
  - type: text
    content: 'But Paul went down and '
  - type: note
    content: '[1 Kgs. 17:21; 2 Kgs. 4:34]'
  - type: text
    content: 'bent over him, and taking him in his arms, said, '
  - type: note
    content: '[Matt. 9:23, 24; Mark 5:39]'
  - type: text
    content: '“Do not be alarmed, for his life is in him.” '
  '11':
  - type: text
    content: 'And when Paul had gone up and '
  - type: note
    content: ver. 7
  - type: text
    content: 'had broken bread and eaten, he conversed with them a long while, until daybreak, and so departed. '
  '12':
  - type: text
    content: And they took the youth away alive, and were not a little comforted.
  '13':
  - type: text
    content: 'But going ahead to the ship, we set sail for Assos, intending to take Paul aboard there, for so he had arranged, intending himself to go by land. '
  '14':
  - type: text
    content: 'And when he met us at Assos, we took him on board and went to Mitylene. '
  '15':
  - type: text
    content: And sailing from there we came the following day opposite Chios; the next day we touched at Samos; and
  - type: note
    content: Some manuscripts add after remaining at Trogyllium
  - type: text
    content: ' the day after that we went to Miletus. '
  '16':
  - type: text
    content: 'For Paul had decided to sail past Ephesus, so that he might not have to spend time in Asia, for he was hastening '
  - type: note
    content: ver. 22; ch. 24:11; [ver. 6; ch. 19:21; 1 Cor. 16:8]
  - type: text
    content: 'to be at Jerusalem, if possible, '
  - type: note
    content: ch. 2:1
  - type: text
    content: on the day of Pentecost.
  - type: heading
    content: Paul Speaks to the Ephesian Elders
  '17':
  - type: text
    content: 'Now from Miletus he sent to Ephesus and called '
  - type: note
    content: See ch. 11:30
  - type: text
    content: 'the elders of the church to come to him. '
  '18':
  - type: text
    content: 'And when they came to him, he said to them:'
  - type: note
    content: 1 Thess. 1:5; [ver. 31, 34 ]
  - type: text
    content: '“You yourselves know '
  - type: note
    content: ch. 18:19; 19:1, 10
  - type: text
    content: 'how I lived among you the whole time '
  - type: note
    content: 1 Thess. 1:5; [ver. 31, 34]
  - type: text
    content: 'from the first day that I set foot in Asia, '
  '19':
  - type: note
    content: '[Rom. 12:11; Col. 3:24]'
  - type: text
    content: 'serving the Lord '
  - type: note
    content: '[1 Thess. 2:6, 7]; See Eph. 4:2'
  - type: text
    content: 'with all humility and with '
  - type: note
    content: '[ver. 31; 2 Cor. 2:4; Phil. 3:18]'
  - type: text
    content: 'tears and with trials that happened to me through '
  - type: note
    content: See ver. 3
  - type: text
    content: 'the plots of the Jews; '
  '2':
  - type: text
    content: 'When he had gone through those regions and had given them much encouragement, he came to Greece. '
  '20':
  - type: text
    content: 'how I '
  - type: note
    content: ver. 27
  - type: text
    content: 'did not shrink from declaring to you anything that was profitable, and '
  - type: note
    content: '[ver. 31]'
  - type: text
    content: 'teaching you in public and from house to house, '
  '21':
  - type: note
    content: ver. 24; ch. 18:5
  - type: text
    content: 'testifying both to Jews and to Greeks of '
  - type: note
    content: Mark 1:15; Heb. 6:1; See ch. 2:38
  - type: text
    content: 'repentance toward God and of '
  - type: note
    content: '[Eph. 1:15; Col. 1:4; 1 Tim. 3:13]'
  - type: text
    content: faith in our Lord Jesus Christ.
  - type: note
    content: Some manuscripts omit Christ
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And now, behold, I am going to Jerusalem, constrained '
  - type: note
    content: '[ch. 17:16]'
  - type: text
    content: by
  - type: note
    content: Or bound in
  - type: text
    content: ' the Spirit, not knowing what will happen to me there, '
  '23':
  - type: text
    content: 'except that '
  - type: note
    content: '[ch. 21:4, 11]; See ch. 8:29; 9:16'
  - type: text
    content: 'the Holy Spirit testifies to me in every city that '
  - type: note
    content: ch. 21:33
  - type: text
    content: 'imprisonment and '
  - type: note
    content: ch. 14:22; 1 Thess. 3:3
  - type: text
    content: 'afflictions await me. '
  '24':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 21:13
  - type: text
    content: 'I do not account my life of any value nor as precious to myself, if only '
  - type: note
    content: 2 Tim. 4:7
  - type: text
    content: 'I may finish my course and '
  - type: note
    content: ch. 1:17; 1 Tim. 1:12
  - type: text
    content: 'the ministry '
  - type: note
    content: Gal. 1:1; 1 Thess. 2:4; [ch. 26:16; Titus 1:3]
  - type: text
    content: 'that I received from the Lord Jesus, '
  - type: note
    content: ver. 21
  - type: text
    content: 'to testify to '
  - type: note
    content: ch. 15:7
  - type: text
    content: 'the gospel of '
  - type: note
    content: '[ver. 32; 1 Tim. 1:14]; See ch. 11:23'
  - type: text
    content: 'the grace of God. '
  '25':
  - type: text
    content: 'And now, behold, '
  - type: note
    content: '[Phil. 1:25]'
  - type: text
    content: 'I know that none of you among whom I have gone about '
  - type: note
    content: See ch. 28:31
  - type: text
    content: 'proclaiming the kingdom will see my face again. '
  '26':
  - type: text
    content: 'Therefore '
  - type: note
    content: Deut. 8:19
  - type: text
    content: 'I testify to you this day that '
  - type: note
    content: See ch. 18:6
  - type: text
    content: 'I am innocent of the blood of all, '
  '27':
  - type: text
    content: 'for '
  - type: note
    content: ver. 20; [Jer. 26:2; Ezek. 33:8]
  - type: text
    content: 'I did not shrink from declaring to you '
  - type: note
    content: ch. 13:36; Luke 7:30; [ch. 2:23; Eph. 1:11; Heb. 6:17]
  - type: text
    content: 'the whole counsel of God. '
  '28':
  - type: note
    content: '[1 Tim. 4:16]'
  - type: text
    content: 'Pay careful attention to yourselves and to all '
  - type: note
    content: ver. 29; [Eph. 4:11]; See Luke 12:32
  - type: text
    content: 'the flock, in which '
  - type: note
    content: '[ch. 13:2; 1 Cor. 12:8-11]'
  - type: text
    content: 'the Holy Spirit has made you '
  - type: note
    content: Phil. 1:1; 1 Tim. 3:2; Titus 1:7; [ver. 17]
  - type: text
    content: 'overseers, '
  - type: note
    content: See John 21:16
  - type: text
    content: 'to care for '
  - type: note
    content: 1 Cor. 1:2; 10:32; 11:16; 15:9
  - type: text
    content: the church of God,
  - type: note
    content: Some manuscripts of the Lord
  - type: text
    content: ' which he '
  - type: note
    content: '[2 Pet. 2:1]'
  - type: text
    content: 'obtained '
  - type: note
    content: Heb. 9:12, 14; [Eph. 1:7; 1 John 1:7]; See 1 Pet. 1:18, 19; Rev. 5:9
  - type: text
    content: with his own blood.
  - type: note
    content: Or with the blood of his Own
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'I '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'know that after my departure '
  - type: note
    content: See Matt. 7:15
  - type: text
    content: 'fierce wolves will come in among you, '
  - type: note
    content: John 10:12; [Col. 2:8]
  - type: text
    content: 'not sparing the flock; '
  '3':
  - type: text
    content: 'There he spent three months, and when '
  - type: note
    content: ver. 19; [ch. 13:50]; See ch. 9:24
  - type: text
    content: a plot was made against him by the Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verse 19
  - type: text
    content: ' as he was about to set sail for Syria, he decided to return through Macedonia. '
  '30':
  - type: text
    content: 'and '
  - type: note
    content: '[1 Cor. 11:19; 2 Cor. 11:13; 1 Tim. 1:19, 20; 1 John 2:18, 19]'
  - type: text
    content: 'from among your own selves will arise men speaking twisted things, to draw away the disciples after them. '
  '31':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[Heb. 13:17]; See Matt. 24:42'
  - type: text
    content: 'be alert, remembering that '
  - type: note
    content: '[ch. 19:8, 10; 24:17]'
  - type: text
    content: 'for three years I did not cease night or day '
  - type: note
    content: Col. 1:28
  - type: text
    content: 'to admonish every one '
  - type: note
    content: '[Heb. 13:17]; See ver. 19'
  - type: text
    content: 'with tears. '
  '32':
  - type: text
    content: 'And now '
  - type: note
    content: ch. 14:23
  - type: text
    content: 'I commend you to God and to '
  - type: note
    content: ch. 14:3; [ver. 24]
  - type: text
    content: 'the word of his grace, which is able to '
  - type: note
    content: See Col. 2:7
  - type: text
    content: 'build you up and to give you '
  - type: note
    content: ch. 26:18; Eph. 1:14, 18; 5:5; Col. 1:12; 3:24; Heb. 9:15; [1 Pet. 1:4]; See Matt. 25:34; Rom. 8:17
  - type: text
    content: 'the inheritance among all those who are sanctified. '
  '33':
  - type: note
    content: 1 Cor. 9:12; 2 Cor. 7:2; 11:9; 12:17; [1 Sam. 12:3; Matt. 10:8; 1 Thess. 2:5]
  - type: text
    content: 'I coveted no one’s silver or gold or apparel. '
  '34':
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'You yourselves know that '
  - type: note
    content: See ch. 18:3
  - type: text
    content: 'these hands ministered to my necessities and '
  - type: note
    content: ch. 19:22, 29
  - type: text
    content: 'to those who were with me. '
  '35':
  - type: text
    content: 'In all things '
  - type: note
    content: 2 Thess. 3:7
  - type: text
    content: 'I have shown you that '
  - type: note
    content: Eph. 4:28
  - type: text
    content: 'by working hard in this way we must '
  - type: note
    content: 1 Thess. 5:14; [1 Cor. 12:28]
  - type: text
    content: 'help the weak and '
  - type: note
    content: ch. 11:16
  - type: text
    content: 'remember the words of the Lord Jesus, how he himself said, '
  - type: text
    content: '‘It is more blessed '
  - type: note
    content: Matt. 10:8
  - type: text
    content: to give than to receive.’
  - type: text
    content: ”
  '36':
  - type: text
    content: 'And when he had said these things, '
  - type: note
    content: See ch. 7:60
  - type: text
    content: 'he knelt down and prayed with them all. '
  '37':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Tim. 1:4]'
  - type: text
    content: 'there was much weeping on the part of all; '
  - type: note
    content: See Luke 15:20
  - type: text
    content: 'they embraced Paul and '
  - type: note
    content: See Luke 15:20
  - type: text
    content: 'kissed him, '
  '38':
  - type: text
    content: 'being sorrowful most of all because of '
  - type: note
    content: ver. 25
  - type: text
    content: 'the word he had spoken, that they would not see his face again. And '
  - type: note
    content: See ch. 15:3
  - type: text
    content: they accompanied him to the ship.
  '4':
  - type: text
    content: 'Sopater the Berean, son of Pyrrhus, accompanied him; and of the Thessalonians, '
  - type: note
    content: ch. 14:6, 21; See ch. 19:29
  - type: text
    content: 'Aristarchus and Secundus; and '
  - type: note
    content: ch. 14:6, 21; See ch. 19:29
  - type: text
    content: 'Gaius of Derbe, and '
  - type: note
    content: See ch. 16:1
  - type: text
    content: 'Timothy; and the Asians, '
  - type: note
    content: Eph. 6:21; Col. 4:7; 2 Tim. 4:12; Titus 3:12
  - type: text
    content: 'Tychicus and '
  - type: note
    content: ch. 21:29; 2 Tim. 4:20
  - type: text
    content: 'Trophimus. '
  '5':
  - type: text
    content: 'These went on ahead and were waiting for '
  - type: note
    content: ver. 6-8, 13-15
  - type: text
    content: 'us at '
  - type: note
    content: ch. 16:8-11
  - type: text
    content: 'Troas, '
  '6':
  - type: text
    content: 'but we sailed away from Philippi after '
  - type: note
    content: ch. 12:3; Ex. 12:14, 15; 23:15
  - type: text
    content: the days of Unleavened Bread, and in five days we came to them at Troas, where we stayed for seven days.
  - type: heading
    content: Eutychus Raised from the Dead
  '7':
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 16:2; [ Mark 16:9; John 20:19; Rev. 1:10 ]
  - type: text
    content: 'On the first day of the week, when we were gathered together '
  - type: note
    content: ver. 11; 1 Cor. 10:16; 11:23, 24; See ch. 2:42
  - type: text
    content: 'to break bread, Paul talked with them, intending to depart on the next day, and he prolonged his speech until midnight. '
  '8':
  - type: text
    content: 'There were many lamps in '
  - type: note
    content: ch. 1:13; 9:37, 39
  - type: text
    content: 'the upper room where we were gathered. '
  '9':
  - type: text
    content: 'And a young man named Eutychus, sitting at the window, sank into a deep sleep as Paul talked still longer. And being overcome by sleep, he '
  - type: note
    content: 2 Kgs. 1:2
  - type: text
    content: 'fell down from the third story and was taken up dead. '
