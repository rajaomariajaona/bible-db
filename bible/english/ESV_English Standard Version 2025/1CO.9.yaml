      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 3:1
      marker-yv: yv-n
    - type: text
      text: 'win more of them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If to others I am not an apostle, at least I am to you, for you are '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
