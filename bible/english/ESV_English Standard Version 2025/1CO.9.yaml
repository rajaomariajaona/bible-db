      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'I have made myself a servant to all, that I might '
    - type: usfm
