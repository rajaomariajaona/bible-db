    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:1
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
