document_id: 1CO.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Surrenders His Rights
  - type: text
    content: ' '
  - type: note
    content: ver. 19
  - type: text
    content: 'Am I not free? '
  - type: note
    content: Acts 14:14; 2 Cor. 12:12; 1 Thess. 2:6; [2 Cor. 10:7; Rev. 2:2]
  - type: text
    content: 'Am I not an apostle? '
  - type: note
    content: ch. 15:8; Acts 9:3, 17; 18:9; 22:14, 18; 23:11
  - type: text
    content: 'Have I not seen Jesus our Lord? '
  - type: note
    content: See ch. 3:6
  - type: text
    content: 'Are not you my workmanship in the Lord? '
  '10':
  - type: text
    content: 'Does he not certainly speak for our sake? It was written '
  - type: note
    content: See Rom. 4:24
  - type: text
    content: 'for our sake, because '
  - type: note
    content: 2 Tim. 2:6
  - type: text
    content: 'the plowman should plow in hope and the thresher thresh in hope of sharing in the crop. '
  '11':
  - type: note
    content: '[Rom. 15:27; Gal. 6:6]'
  - type: text
    content: 'If we have sown spiritual things among you, is it too much if we reap material things from you? '
  '12':
  - type: text
    content: 'If others share this rightful claim on you, do not we even more? Nevertheless, '
  - type: note
    content: ver. 15, 18; See Acts 20:33
  - type: text
    content: 'we have not made use of this right, but we endure anything '
  - type: note
    content: '[2 Cor. 6:3; 11:12]'
  - type: text
    content: rather than put an obstacle in the way of the gospel of Christ.
  '13':
  - type: text
    content: 'Do you not know that '
  - type: note
    content: Lev. 6:16, 26; 7:6; Num. 5:9, 10; 18:8-20; Deut. 18:1
  - type: text
    content: 'those who are employed in the temple service get their food from the temple, and those who serve at the altar share in the sacrificial offerings? '
  '14':
  - type: text
    content: 'In the same way, the Lord commanded that '
  - type: note
    content: ver. 4; Matt. 10:10
  - type: text
    content: those who proclaim the gospel should get their living by the gospel.
  '15':
  - type: text
    content: 'But '
  - type: note
    content: See Acts 18:3
  - type: text
    content: 'I have made no use of any of these rights, nor am I writing these things to secure any such provision. For I would rather die than have anyone '
  - type: note
    content: 2 Cor. 11:10
  - type: text
    content: 'deprive me of my ground for boasting. '
  '16':
  - type: text
    content: 'For if I preach the gospel, that gives me no ground for boasting. For '
  - type: note
    content: '[Acts 4:20; 9:6; Rom. 1:14]'
  - type: text
    content: 'necessity is laid upon me. Woe to me if I do not preach the gospel! '
  '17':
  - type: text
    content: 'For if I do this of my own will, I have a reward, but if not of my own will, I am still entrusted with '
  - type: note
    content: ch. 4:1; Gal. 2:7; [Phil. 1:16]
  - type: text
    content: 'a stewardship. '
  '18':
  - type: text
    content: 'What then is my reward? That in my preaching '
  - type: note
    content: 2 Cor. 11:7; 12:13
  - type: text
    content: I may present the gospel free of charge, so as not to make full use of my right in the gospel.
  '19':
  - type: text
    content: 'For '
  - type: note
    content: ver. 1; [ch. 10:29]
  - type: text
    content: 'though I am free from all, '
  - type: note
    content: '[Gal. 5:13]'
  - type: text
    content: 'I have made myself a servant to all, that I might '
  - type: note
    content: Matt. 18:15; 1 Pet. 3:1
  - type: text
    content: 'win more of them. '
  '2':
  - type: text
    content: 'If to others I am not an apostle, at least I am to you, for you are '
  - type: note
    content: '[2 Cor. 3:2]'
  - type: text
    content: the seal of my apostleship in the Lord.
  '20':
  - type: note
    content: Acts 16:3; 21:23-26
  - type: text
    content: 'To the Jews I became as a Jew, in order to win Jews. To those under the law I became as one under the law (though not being myself under the law) that I might win those under the law. '
  '21':
  - type: text
    content: 'To '
  - type: note
    content: Rom. 2:12, 14
  - type: text
    content: 'those outside the law I became '
  - type: note
    content: '[Gal. 2:3; 3:2]'
  - type: text
    content: 'as one outside the law (not being outside the law of God but '
  - type: note
    content: See ch. 7:22
  - type: text
    content: 'under the law of Christ) that I might win those outside the law. '
  '22':
  - type: note
    content: 2 Cor. 11:29
  - type: text
    content: 'To the weak I became weak, that I might win the weak. '
  - type: note
    content: ch. 10:33
  - type: text
    content: 'I have become all things to all people, that '
  - type: note
    content: ch. 7:16; Rom. 11:14
  - type: text
    content: 'by all means I might save some. '
  '23':
  - type: text
    content: 'I do it all for the sake of the gospel, '
  - type: note
    content: '[ch. 10:24]'
  - type: text
    content: that I may share with them in its blessings.
  '24':
  - type: text
    content: 'Do you not know that in a race all the runners run, but only one receives '
  - type: note
    content: Phil. 3:14; Col. 2:18
  - type: text
    content: 'the prize? So '
  - type: note
    content: Gal. 2:2; 5:7; Phil. 2:16; Heb. 12:1; [2 Tim. 4:7]
  - type: text
    content: 'run that you may obtain it. '
  '25':
  - type: text
    content: 'Every '
  - type: note
    content: 1 Tim. 6:12; 2 Tim. 2:5; 4:7; [Jude 3]
  - type: text
    content: 'athlete exercises self-control in all things. They do it to receive a perishable wreath, but we '
  - type: note
    content: See James 1:12
  - type: text
    content: 'an imperishable. '
  '26':
  - type: text
    content: 'So I do not run aimlessly; I '
  - type: note
    content: '[Heb. 12:4]'
  - type: text
    content: 'do not box as one '
  - type: note
    content: '[ch. 14:9]'
  - type: text
    content: 'beating the air. '
  '27':
  - type: text
    content: 'But I discipline my body and '
  - type: note
    content: '[Rom. 6:19]'
  - type: text
    content: keep it under control,
  - type: note
    content: Greek I pummel my body and make it a slave
  - type: text
    content: ' lest after preaching to others '
  - type: note
    content: '[Song 1:6]'
  - type: text
    content: 'I myself should be '
  - type: note
    content: '[Jer. 6:30; Rom. 1:28; Heb. 6:8]'
  - type: text
    content: disqualified.
  '3':
  - type: text
    content: 'This is my defense to those who would examine me. '
  '4':
  - type: note
    content: ver. 14; 1 Thess. 2:6, 9; 2 Thess. 3:8, 9
  - type: text
    content: 'Do we not have the right to eat and drink? '
  '5':
  - type: note
    content: '[ch. 7:7]'
  - type: text
    content: Do we not have the right to take along a believing wife,
  - type: note
    content: Greek a sister as wife
  - type: text
    content: ' as do the other apostles and '
  - type: note
    content: See Matt. 12:46
  - type: text
    content: 'the brothers of the Lord and '
  - type: note
    content: Matt. 8:14; See John 1:42
  - type: text
    content: 'Cephas? '
  '6':
  - type: text
    content: 'Or is it only Barnabas and I who have no right to refrain from working for a living? '
  '7':
  - type: note
    content: 2 Cor. 10:4; 1 Tim. 1:18; 2 Tim. 2:3, 4
  - type: text
    content: 'Who serves as a soldier at his own expense? '
  - type: note
    content: '[ch. 3:6-8; Deut. 20:6; Prov. 27:18; Song 8:12]'
  - type: text
    content: Who plants a vineyard without eating any of its fruit? Or who tends a flock without getting some of the milk?
  '8':
  - type: text
    content: 'Do I say these things on human authority? Does not the Law say the same? '
  '9':
  - type: text
    content: 'For it is written in the Law of Moses, '
  - type: note
    content: 1 Tim. 5:18; Cited from Deut. 25:4
  - type: text
    content: '“You shall not muzzle an ox when it treads out the grain.” Is it for oxen that God is concerned? '
