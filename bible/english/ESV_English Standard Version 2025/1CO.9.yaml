      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 5:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
