  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:3
      marker-yv: yv-n
    - type: text
      text: 'I have made no use of any of these rights, nor am I writing these things to secure any such provision. For I would rather die than have anyone '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:10
      marker-yv: yv-n
    - type: text
      text: 'deprive me of my ground for boasting. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if I preach the gospel, that gives me no ground for boasting. For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 4:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 1:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'necessity is laid upon me. Woe to me if I do not preach the gospel! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if I do this of my own will, I have a reward, but if not of my own will, I am still entrusted with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 1:16
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
