    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
