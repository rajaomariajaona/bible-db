        - type: text
          text: Deut. 18:1
      marker-yv: yv-n
    - type: text
      text: 'those who are employed in the temple service get their food from the temple, and those who serve at the altar share in the sacrificial offerings? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, the Lord commanded that '
    - type: usfm
