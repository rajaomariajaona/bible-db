      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:6
      marker-yv: yv-n
    - type: text
      text: 'Are not you my workmanship in the Lord? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Does he not certainly speak for our sake? It was written '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 4:24
      marker-yv: yv-n
    - type: text
      text: 'for our sake, because '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:6
      marker-yv: yv-n
    - type: text
      text: 'the plowman should plow in hope and the thresher thresh in hope of sharing in the crop. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
