      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:23-26
      marker-yv: yv-n
    - type: text
      text: 'To the Jews I became as a Jew, in order to win Jews. To those under the law I became as one under the law (though not being myself under the law) that I might win those under the law. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
