verses:
  '1':
  - type: heading
    content: The Sin of Judah
  - type: text
    content: '“The sin of Judah is written with '
  - type: note
    content: Job 19:24
  - type: text
    content: 'a pen of iron; with a point of diamond it is engraved on '
  - type: note
    content: Prov. 3:3; 7:3; [2 Cor. 3:3]
  - type: text
    content: 'the tablet of their heart, and on '
  - type: note
    content: Ex. 27:2; Ps. 118:27
  - type: text
    content: 'the horns of their altars, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 16:7; 1 Chr. 28:9; Ps. 139:23; Rom. 8:27
  - type: text
    content: '“I the '
  - type: text
    content: Lord
  - type: text
    content: ' search the heart'
  - type: note
    content: See ch. 11:20
  - type: text
    content: and test the mind,
  - type: note
    content: Hebrew kidneys
  - type: note
    content: ch. 32:19; Job 34:11; Ps. 62:12
  - type: text
    content: to give every man according to his ways,
  - type: text
    content: according to the fruit of his deeds.”
  '11':
  - type: text
    content: 'Like the '
  - type: note
    content: '[1 Sam. 26:20]'
  - type: text
    content: partridge that gathers a brood that she did not hatch,
  - type: text
    content: 'so is '
  - type: note
    content: Ps. 39:6
  - type: text
    content: he who gets riches but not by justice;
  - type: note
    content: '[ Ps. 55:23 ]'
  - type: text
    content: in the midst of his days they will leave him,
  - type: note
    content: '[ Luke 12:20 ]'
  - type: text
    content: and at his end he will be a fool.
  '12':
  - type: text
    content: A glorious throne set on high from the beginning
  - type: text
    content: is the place of our sanctuary.
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 14:8
  - type: text
    content: the hope of Israel,
  - type: note
    content: Josh. 24:20; Ps. 73:27; Isa. 1:28
  - type: text
    content: all who forsake you shall be put to shame;
  - type: text
    content: those who turn away from you
  - type: note
    content: Hebrew me
  - type: text
    content: ' '
  - type: note
    content: '[Luke 10:20]'
  - type: text
    content: shall be written in the earth,
  - type: text
    content: 'for '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'they have forsaken '
  - type: note
    content: ch. 2:13; [John 4:10, 14]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the fountain of living water.'
  - type: heading
    content: Jeremiah Prays for Deliverance
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 6:2
  - type: text
    content: 'Heal me, O '
  - type: text
    content: Lord
  - type: text
    content: ', and I shall be healed;'
  - type: text
    content: save me, and I shall be saved,
  - type: text
    content: 'for '
  - type: note
    content: Deut. 10:21
  - type: text
    content: you are my praise.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Isa. 5:19; 2 Pet. 3:4
  - type: text
    content: Behold, they say to me,
  - type: text
    content: '“Where is the word of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Let it come!”
  '16':
  - type: text
    content: I have not run away from being your shepherd,
  - type: text
    content: nor have I desired the day of sickness.
  - type: note
    content: ch. 15:15; Ps. 40:9; 139:4
  - type: text
    content: 'You know '
  - type: note
    content: ch. 15:15; Ps. 40:9; 139:4
  - type: text
    content: what came out of my lips;
  - type: text
    content: it was before your face.
  '17':
  - type: text
    content: Be not a terror to me;
  - type: note
    content: ch. 16:19
  - type: text
    content: you are my refuge in the day of disaster.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 35:4; 40:14
  - type: text
    content: Let those be put to shame who persecute me,
  - type: text
    content: but let me not be put to shame;
  - type: note
    content: Ps. 35:4; 40:14
  - type: text
    content: let them be dismayed,
  - type: text
    content: but let me not be dismayed;
  - type: note
    content: ch. 11:20; Ps. 35:8
  - type: text
    content: bring upon them the day of disaster;
  - type: text
    content: destroy them with double destruction!
  - type: heading
    content: Keep the Sabbath Holy
  '19':
  - type: text
    content: 'Thus said the '
  - type: text
    content: Lord
  - type: text
    content: ' to me: “Go and stand in the People’s Gate, by which '
  - type: note
    content: See ch. 13:13
  - type: text
    content: 'the kings of Judah enter and by which they go out, and in all the gates of Jerusalem, '
  '2':
  - type: text
    content: 'while '
  - type: note
    content: '[ch. 19:5]'
  - type: text
    content: 'their children remember their altars and their '
  - type: note
    content: Judg. 3:7; See Deut. 16:21
  - type: text
    content: 'Asherim, '
  - type: note
    content: '[Isa. 1:29]; See ch. 2:20'
  - type: text
    content: 'beside every green tree and on the high hills, '
  '20':
  - type: text
    content: 'and say: ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'you kings of Judah, and all Judah, and all the inhabitants of Jerusalem, who enter by these gates. '
  '21':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Take care for the sake of your lives, and '
  - type: note
    content: '[John 5:10]; See Neh. 13:15-19'
  - type: text
    content: 'do not bear a burden on the Sabbath day or bring it in by the gates of Jerusalem. '
  '22':
  - type: text
    content: 'And do not carry a burden out of your houses on the Sabbath '
  - type: note
    content: See Num. 15:32-36
  - type: text
    content: 'or do any work, but '
  - type: note
    content: Ex. 23:12; 31:13; Isa. 56:2; 58:13; Ezek. 20:12, 20; See Ex. 20:8-11; Deut. 5:12-15
  - type: text
    content: 'keep the Sabbath day holy, as I commanded your fathers. '
  '23':
  - type: text
    content: 'Yet '
  - type: note
    content: ch. 7:24, 26; [ch. 11:10]
  - type: text
    content: 'they did not listen or incline their ear, '
  - type: note
    content: '[2 Chr. 30:8; Acts 7:51]'
  - type: text
    content: 'but stiffened their neck, that they '
  - type: note
    content: See ch. 5:3
  - type: text
    content: might not hear and receive instruction.
  '24':
  - type: text
    content: '“‘But if you listen to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'bring in no burden by the gates of this city on the Sabbath day, but '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'keep the Sabbath day holy and do no work on it, '
  '25':
  - type: text
    content: 'then '
  - type: note
    content: ch. 22:4
  - type: text
    content: 'there shall enter by the gates of this city kings and princes who sit on the throne of David, riding in chariots and on horses, they and their officials, the men of Judah and the inhabitants of Jerusalem. And this city shall be inhabited forever. '
  '26':
  - type: text
    content: 'And people shall come from '
  - type: note
    content: ch. 32:44; 33:13
  - type: text
    content: 'the cities of Judah '
  - type: note
    content: Zech. 7:7
  - type: text
    content: 'and the places around Jerusalem, '
  - type: note
    content: ch. 32:44; 33:13
  - type: text
    content: 'from the land of Benjamin, '
  - type: note
    content: Zech. 7:7
  - type: text
    content: 'from the Shephelah, from the hill country, '
  - type: note
    content: Zech. 7:7
  - type: text
    content: 'and from '
  - type: note
    content: Gen. 13:1
  - type: text
    content: 'the Negeb, bringing '
  - type: note
    content: Lev. 7:12; 22:29; 2 Chr. 33:16; Ps. 107:22; 116:17
  - type: text
    content: 'burnt offerings and sacrifices, grain offerings and frankincense, and '
  - type: note
    content: Lev. 7:12; 22:29; 2 Chr. 33:16; Ps. 107:22; 116:17
  - type: text
    content: 'bringing thank offerings to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'But if you do not listen to me, to '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'keep the Sabbath day holy, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'and not to bear a burden and enter by the gates of Jerusalem on the Sabbath day, then I will '
  - type: note
    content: ch. 21:14; 43:12; 49:27; 50:32; Lam. 4:11; Amos 1:14
  - type: text
    content: 'kindle a fire in its gates, and it shall '
  - type: note
    content: ch. 52:13; 2 Kgs. 25:9
  - type: text
    content: 'devour the palaces of Jerusalem and '
  - type: note
    content: ch. 7:20
  - type: text
    content: shall not be quenched.’”
  '3':
  - type: note
    content: Ps. 48:1, 2; 87:1; Isa. 2:3
  - type: text
    content: 'on the mountains in the open country. '
  - type: note
    content: ch. 15:13
  - type: text
    content: 'Your wealth and all your treasures I will give for spoil as the price of your high places for sin throughout all your territory. '
  '4':
  - type: text
    content: 'You shall loosen your hand from your heritage that I gave to you, '
  - type: note
    content: See ch. 15:14
  - type: text
    content: 'and I will make you serve your enemies in a land that you do not know, '
  - type: note
    content: See Deut. 32:22
  - type: text
    content: for in my anger a fire is kindled that shall burn forever.”
  '5':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“Cursed is the man '
  - type: note
    content: 2 Chr. 32:8; Ps. 146:3
  - type: text
    content: who trusts in man
  - type: text
    content: and makes flesh his strength,
  - type: note
    content: Hebrew arm
  - type: text
    content: 'whose heart turns away from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:6
  - type: text
    content: He is like a shrub in the desert,
  - type: note
    content: ch. 29:32; Job 20:17; Ps. 34:12
  - type: text
    content: and shall not see any good come.
  - type: text
    content: He shall dwell in the parched places of the wilderness,
  - type: text
    content: 'in '
  - type: note
    content: Deut. 29:23; Job 39:6
  - type: text
    content: an uninhabited salt land.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 25:2; 34:8; 125:1; See Ps. 2:12
  - type: text
    content: '“Blessed is the man who trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Ps. 71:5
  - type: text
    content: 'whose trust is the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps. 1:3; [ Ezek. 47:12 ]
  - type: text
    content: He is like a tree planted by water,
  - type: text
    content: that sends out its roots by the stream,
  - type: text
    content: and does not fear when heat comes,
  - type: text
    content: for its leaves remain green,
  - type: text
    content: and is not anxious in the year of drought,
  - type: text
    content: for it does not cease to bear fruit.”
  '9':
  - type: text
    content: The heart is deceitful above all things,
  - type: text
    content: and desperately sick;
  - type: text
    content: who can understand it?
