document_id: ISA.60,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Future Glory of Israel
  - type: text
    content: ' '
  - type: note
    content: '[ Eph. 5:14 ]'
  - type: text
    content: Arise, shine, for your light has come,
  - type: text
    content: 'and '
  - type: note
    content: ch. 40:5; 58:8; Mal. 4:2
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' has risen upon you.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 45:1, 13; Zech. 6:15
  - type: text
    content: Foreigners shall build up your walls,
  - type: text
    content: 'and '
  - type: note
    content: ch. 45:1, 13; Zech. 6:15
  - type: text
    content: their kings shall minister to you;
  - type: text
    content: for in my wrath I struck you,
  - type: text
    content: but in my favor I have had mercy on you.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ Rev. 21:25, 26 ]'
  - type: text
    content: Your gates shall be open continually;
  - type: text
    content: day and night they shall not be shut,
  - type: note
    content: '[ Rev. 21:25, 26 ]'
  - type: text
    content: that people may bring to you the wealth of the nations,
  - type: text
    content: with their kings led in procession.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Zech. 14:17-19 ]'
  - type: text
    content: For the nation and kingdom
  - type: text
    content: that will not serve you shall perish;
  - type: text
    content: those nations shall be utterly laid waste.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:2
  - type: text
    content: The glory of Lebanon shall come to you,
  - type: text
    content: 'the cypress, the plane, and '
  - type: note
    content: ch. 41:19
  - type: text
    content: the pine,
  - type: text
    content: to beautify the place of my sanctuary,
  - type: text
    content: and I will make the place of my feet glorious.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:1, 2; Zech. 8:23 ]'
  - type: text
    content: The sons of those who afflicted you
  - type: text
    content: shall come bending low to you,
  - type: note
    content: ch. 49:23; [ Rev. 3:9 ]
  - type: text
    content: and all who despised you
  - type: text
    content: shall bow down at your feet;
  - type: note
    content: '[ch. 1:26; 62:2 ]'
  - type: text
    content: 'they shall call you the City of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Zion of the Holy One of Israel.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 54:6; 62:4
  - type: text
    content: Whereas you have been forsaken and hated,
  - type: text
    content: with no one passing through,
  - type: note
    content: Ps. 47:4; [ch. 65:18 ]
  - type: text
    content: I will make you majestic forever,
  - type: text
    content: a joy from age to age.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 49:23; 66:11, 12 ]'
  - type: text
    content: You shall suck the milk of nations;
  - type: text
    content: you shall nurse at the breast of kings;
  - type: text
    content: 'and you shall know that '
  - type: note
    content: ch. 43:3; 49:26; [ch. 47:4]
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am your Savior'
  - type: text
    content: 'and your Redeemer, '
  - type: note
    content: Gen. 49:24; Ps. 132:2
  - type: text
    content: the Mighty One of Jacob.
  '17':
  - type: text
    content: Instead of bronze I will bring gold,
  - type: text
    content: and instead of iron I will bring silver;
  - type: text
    content: instead of wood, bronze,
  - type: text
    content: instead of stones, iron.
  - type: text
    content: I will make your overseers peace
  - type: note
    content: '[ch. 58:3 ]'
  - type: text
    content: and your taskmasters righteousness.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:9
  - type: text
    content: Violence shall no more be heard in your land,
  - type: text
    content: devastation or destruction within your borders;
  - type: note
    content: ch. 26:1
  - type: text
    content: you shall call your walls Salvation,
  - type: text
    content: and your gates Praise.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Zech. 14:6, 7; Rev. 21:23; 22:5; [ch. 24:23; 30:26 ]
  - type: text
    content: The sun shall be no more
  - type: text
    content: your light by day,
  - type: text
    content: nor for brightness shall the moon
  - type: text
    content: give you light;
  - type: note
    content: Masoretic Text; Dead Sea Scroll, Septuagint, Targum add by night
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your everlasting light,'
  - type: text
    content: and your God will be your glory.
  - type: note
    content: Or your beauty
  '2':
  - type: text
    content: For behold, darkness shall cover the earth,
  - type: text
    content: and thick darkness the peoples;
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' will arise upon you,'
  - type: text
    content: and his glory will be seen upon you.
  '20':
  - type: text
    content: Your sun shall no more go down,
  - type: text
    content: nor your moon withdraw itself;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your everlasting light,'
  - type: text
    content: 'and '
  - type: note
    content: ch. 35:10; 65:19; Rev. 21:4
  - type: text
    content: your days of mourning shall be ended.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 52:1; Jer. 31:34
  - type: text
    content: Your people shall all be righteous;
  - type: note
    content: Ps. 37:9; See Ezek. 37:25
  - type: text
    content: they shall possess the land forever,
  - type: note
    content: ch. 61:3
  - type: text
    content: the branch of my planting, the work of my hands,
  - type: text
    content: that I might be glorified.
  - type: note
    content: Or that I might display my beauty
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 13:31 ]'
  - type: text
    content: The least one shall become a clan,
  - type: text
    content: and the smallest one a mighty nation;
  - type: note
    content: Hab. 2:3
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in its time I will hasten it.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 42:6; 49:6; Rev. 21:24
  - type: text
    content: And nations shall come to your light,
  - type: text
    content: and kings to the brightness of your rising.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 49:18
  - type: text
    content: Lift up your eyes all around, and see;
  - type: text
    content: they all gather together, they come to you;
  - type: note
    content: ver. 9 ; ch. 66:20
  - type: text
    content: your sons shall come from afar,
  - type: text
    content: and your daughters shall be carried on the hip.
  '5':
  - type: text
    content: 'Then you shall see and '
  - type: note
    content: Ps. 34:5
  - type: text
    content: be radiant;
  - type: text
    content: your heart shall thrill and exult,
  - type: note
    content: Hebrew your heart shall tremble and grow wide
  - type: text
    content: because the abundance of the sea shall be turned to you,
  - type: note
    content: ch. 61:6
  - type: text
    content: the wealth of the nations shall come to you.
  '6':
  - type: text
    content: A multitude of camels shall cover you,
  - type: text
    content: 'the young camels of '
  - type: note
    content: Judg. 6:5
  - type: text
    content: 'Midian and '
  - type: note
    content: Gen. 25:4
  - type: text
    content: Ephah;
  - type: text
    content: 'all those from '
  - type: note
    content: 1 Kgs. 10:1; Ps. 72:10
  - type: text
    content: Sheba shall come.
  - type: note
    content: '[ Matt. 2:11 ]'
  - type: text
    content: They shall bring gold and frankincense,
  - type: text
    content: 'and shall bring good news, the praises of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'All the flocks of '
  - type: note
    content: See ch. 21:16
  - type: text
    content: Kedar shall be gathered to you;
  - type: text
    content: 'the rams of '
  - type: note
    content: Gen. 25:13; 28:9; 36:3
  - type: text
    content: Nebaioth shall minister to you;
  - type: note
    content: ch. 56:7
  - type: text
    content: they shall come up with acceptance on my altar,
  - type: note
    content: Hag. 2:7
  - type: text
    content: and I will beautify my beautiful house.
  '8':
  - type: text
    content: Who are these that fly like a cloud,
  - type: text
    content: 'and '
  - type: note
    content: Hos. 11:11; [Gen. 8:9]
  - type: text
    content: like doves to their windows?
  '9':
  - type: text
    content: 'For '
  - type: note
    content: ch. 51:5; See ch. 11:11
  - type: text
    content: the coastlands shall hope for me,
  - type: note
    content: See ch. 2:16
  - type: text
    content: the ships of Tarshish first,
  - type: note
    content: Gal. 4:26
  - type: text
    content: to bring your children from afar,
  - type: text
    content: their silver and gold with them,
  - type: text
    content: 'for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: and for the Holy One of Israel,
  - type: text
    content: 'because '
  - type: note
    content: ch. 44:23; 55:5
  - type: text
    content: he has made you beautiful.
