    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:1
      marker-yv: yv-n
    - type: text
      text: 'the plains of Moab by the Jordan at Jericho, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the people of Israel and say to them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. '
      - type: text
        text: '10-12, '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 19:2-4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 20:2-6
      marker-yv: yv-n
    - type: text
      text: 'When you cross the Jordan into the land of Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:13
      marker-yv: yv-n
    - type: text
      text: 'then you shall select cities to be cities of refuge for you, that the manslayer who kills any person without intent may flee there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cities shall be for you a refuge from the avenger, that the manslayer may not die until he stands before the congregation for judgment. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the cities that you give shall be your '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: 'six cities of refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 4:41
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 20:8
      marker-yv: yv-n
    - type: text
      text: 'You shall give three cities beyond the Jordan, and three cities in the land of Canaan, to be cities of refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These six cities shall be for refuge for the people of Israel, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:16
      marker-yv: yv-n
    - type: text
      text: for the stranger and for the sojourner among them, that anyone who kills any person without intent may flee there.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 24:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 19:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: '“But if he struck him down with an iron object, so that he died, he is a murderer. The murderer shall be put to death. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he struck him down with a stone tool that could cause death, and he died, he is a murderer. The murderer shall be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if he struck him down with a wooden tool that could cause death, and he died, he is a murderer. The murderer shall be put to death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
