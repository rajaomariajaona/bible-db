      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:11
      marker-yv: yv-n
    - type: text
      text: a statute and rule for you throughout your generations in all your dwelling places.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cities shall be theirs to dwell in, and their pasturelands shall be for their cattle and for their livestock and for all their beasts. '
  '30':
  - type: usfm
    marker: p
