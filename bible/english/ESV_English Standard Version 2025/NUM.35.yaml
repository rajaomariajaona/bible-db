  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the congregation shall rescue the manslayer from the hand of the avenger of blood, and the congregation shall restore him to his city of refuge to which he had fled, and he shall live in it '
    - type: usfm
