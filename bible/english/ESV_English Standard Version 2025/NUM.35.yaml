      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:13
      marker-yv: yv-n
    - type: text
      text: 'without lying in wait '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or used a stone that could cause death, and without seeing him dropped it on him, so that he died, though he was not his enemy and did not seek his harm, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
