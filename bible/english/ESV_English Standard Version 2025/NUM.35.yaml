        - type: text
          text: Ezek. 45:1-5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 48:8-14
      marker-yv: yv-n
    - type: text
      text: '“Command the people of Israel to give to the Levites some of the inheritance of their possession as cities for them to dwell in. And you shall give to the Levites pasturelands around the cities. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he pushed him out of hatred or hurled something at him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 19:11
      marker-yv: yv-n
    - type: text
      text: 'lying in wait, so that he died, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or in enmity struck him down with his hand, so that he died, then he who struck the blow shall be put to death. He is a murderer. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
