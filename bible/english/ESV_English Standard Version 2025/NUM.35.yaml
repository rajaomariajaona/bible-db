document_id: NUM.35,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Cities for the Levites
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in '
  - type: note
    content: See ch. 22:1
  - type: text
    content: 'the plains of Moab by the Jordan at Jericho, saying, '
  '10':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: For ver. 10-12, see Deut. 19:2-4; Josh. 20:2-6
  - type: text
    content: 'When you cross the Jordan into the land of Canaan, '
  '11':
  - type: note
    content: Ex. 21:13
  - type: text
    content: 'then you shall select cities to be cities of refuge for you, that the manslayer who kills any person without intent may flee there. '
  '12':
  - type: text
    content: 'The cities shall be for you a refuge from the avenger, that the manslayer may not die until he stands before the congregation for judgment. '
  '13':
  - type: text
    content: 'And the cities that you give shall be your '
  - type: note
    content: See ver. 6
  - type: text
    content: 'six cities of refuge. '
  '14':
  - type: note
    content: Deut. 4:41; Josh. 20:8
  - type: text
    content: 'You shall give three cities beyond the Jordan, and three cities in the land of Canaan, to be cities of refuge. '
  '15':
  - type: text
    content: 'These six cities shall be for refuge for the people of Israel, and '
  - type: note
    content: ch. 15:16
  - type: text
    content: for the stranger and for the sojourner among them, that anyone who kills any person without intent may flee there.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex. 21:12, 14; Lev. 24:17; Deut. 19:11, 12
  - type: text
    content: '“But if he struck him down with an iron object, so that he died, he is a murderer. The murderer shall be put to death. '
  '17':
  - type: text
    content: 'And if he struck him down with a stone tool that could cause death, and he died, he is a murderer. The murderer shall be put to death. '
  '18':
  - type: text
    content: 'Or if he struck him down with a wooden tool that could cause death, and he died, he is a murderer. The murderer shall be put to death. '
  '19':
  - type: note
    content: Deut. 19:6, 12; Josh. 20:3, 5
  - type: text
    content: 'The avenger of blood shall himself put the murderer to death; when he meets him, he shall put him to death. '
  '2':
  - type: note
    content: Josh. 14:3, 4; 21:2; See Ezek. 45:1-5; 48:8-14
  - type: text
    content: '“Command the people of Israel to give to the Levites some of the inheritance of their possession as cities for them to dwell in. And you shall give to the Levites pasturelands around the cities. '
  '20':
  - type: text
    content: 'And if he pushed him out of hatred or hurled something at him, '
  - type: note
    content: Ex. 21:14; Deut. 19:11
  - type: text
    content: 'lying in wait, so that he died, '
  '21':
  - type: text
    content: 'or in enmity struck him down with his hand, so that he died, then he who struck the blow shall be put to death. He is a murderer. '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: The avenger of blood shall put the murderer to death when he meets him.
  '22':
  - type: text
    content: '“But if he pushed him suddenly without enmity, or hurled anything on him '
  - type: note
    content: Ex. 21:13
  - type: text
    content: 'without lying in wait '
  '23':
  - type: text
    content: 'or used a stone that could cause death, and without seeing him dropped it on him, so that he died, though he was not his enemy and did not seek his harm, '
  '24':
  - type: text
    content: 'then '
  - type: note
    content: ver. 12; Josh. 20:6
  - type: text
    content: 'the congregation shall judge between the manslayer and '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'the avenger of blood, in accordance with these rules. '
  '25':
  - type: text
    content: 'And the congregation shall rescue the manslayer from the hand of the avenger of blood, and the congregation shall restore him to his city of refuge to which he had fled, and he shall live in it '
  - type: note
    content: Josh. 20:6
  - type: text
    content: 'until the death of the high priest '
  - type: note
    content: Ex. 29:7; Lev. 4:3; 21:10
  - type: text
    content: 'who was anointed with the holy oil. '
  '26':
  - type: text
    content: 'But if the manslayer shall at any time go beyond the boundaries of his city of refuge to which he fled, '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'the avenger of blood finds him outside the boundaries of his city of refuge, and the avenger of blood kills the manslayer, he shall not be guilty of blood. '
  '28':
  - type: text
    content: 'For he must remain in his city of refuge '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'until the death of the high priest, but after the death of the high priest the manslayer may return to the land of his possession. '
  '29':
  - type: text
    content: 'And these things shall be for '
  - type: note
    content: ch. 27:11
  - type: text
    content: a statute and rule for you throughout your generations in all your dwelling places.
  '3':
  - type: text
    content: 'The cities shall be theirs to dwell in, and their pasturelands shall be for their cattle and for their livestock and for all their beasts. '
  '30':
  - type: text
    content: '“If anyone kills a person, the murderer shall be put to death on the '
  - type: note
    content: Deut. 17:6; 19:15; Heb. 10:28; [Matt. 18:16; John 8:17; 2 Cor. 13:1; 1 Tim. 5:19]
  - type: text
    content: 'evidence of witnesses. But no person shall be put to death on the testimony of one witness. '
  '31':
  - type: text
    content: 'Moreover, you shall accept no ransom for the life of a murderer, who is guilty of death, but he shall be put to death. '
  '32':
  - type: text
    content: 'And you shall accept no ransom for him who has fled to his city of refuge, that he may return to dwell in the land before the death of the high priest. '
  '33':
  - type: text
    content: 'You shall not '
  - type: note
    content: Ps. 106:38; Jer. 3:1, 2, 9; [Mic. 4:11]
  - type: text
    content: 'pollute the land in which you live, for blood '
  - type: note
    content: Ps. 106:38; Jer. 3:1, 2, 9; [Mic. 4:11]
  - type: text
    content: 'pollutes the land, and no atonement can be made for the land for the blood that is shed in it, except '
  - type: note
    content: See Gen. 9:6
  - type: text
    content: 'by the blood of the one who shed it. '
  '34':
  - type: note
    content: Lev. 18:25; Deut. 21:23
  - type: text
    content: 'You shall not defile the land in which you live, in the midst of which I dwell, '
  - type: note
    content: See Ex. 29:45
  - type: text
    content: 'for I the '
  - type: text
    content: Lord
  - type: text
    content: ' dwell in the midst of the people of Israel.”'
  '4':
  - type: text
    content: The pasturelands of the cities, which you shall give to the Levites, shall reach from the wall of the city outward a thousand cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' all around. '
  '5':
  - type: text
    content: And you shall measure, outside the city, on the east side two thousand cubits, and on the south side two thousand cubits, and on the west side two thousand cubits, and on the north side two thousand cubits, the city being in the middle. This shall belong to them as pastureland for their cities.
  '6':
  - type: text
    content: '“The cities that you give to the Levites shall be '
  - type: note
    content: ver. 13; Deut. 4:41, 42; Josh. 20:2, 7, 8; 21:3, 13, 21, 27, 32, 36, 38
  - type: text
    content: 'the six cities of refuge, where you shall permit the manslayer to flee, and in addition to them you shall give forty-two cities. '
  '7':
  - type: text
    content: 'All the cities that you give to the Levites shall be '
  - type: note
    content: Josh. 21:41
  - type: text
    content: 'forty-eight, with their pasturelands. '
  '8':
  - type: text
    content: 'And as for the cities that you shall give '
  - type: note
    content: Josh. 21:3
  - type: text
    content: 'from the possession of the people of Israel, '
  - type: note
    content: ch. 26:54; 33:54
  - type: text
    content: from the larger tribes you shall take many, and from the smaller tribes you shall take few; each, in proportion to the inheritance that it inherits, shall give of its cities to the Levites.”
  - type: heading
    content: Cities of Refuge
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
