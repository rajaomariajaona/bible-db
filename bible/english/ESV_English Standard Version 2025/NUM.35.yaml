    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 29:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:10
      marker-yv: yv-n
    - type: text
      text: 'who was anointed with the holy oil. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the manslayer shall at any time go beyond the boundaries of his city of refuge to which he fled, '
  '27':
  - type: usfm
