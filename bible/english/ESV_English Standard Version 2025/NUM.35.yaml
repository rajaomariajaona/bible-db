  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, you shall accept no ransom for the life of a murderer, who is guilty of death, but he shall be put to death. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall accept no ransom for him who has fled to his city of refuge, that he may return to dwell in the land before the death of the high priest. '
