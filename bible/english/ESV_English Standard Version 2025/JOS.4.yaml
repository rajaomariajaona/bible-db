document_id: JOS.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Twelve Memorial Stones from the Jordan
  - type: text
    content: 'When all the nation had finished passing '
  - type: note
    content: ch. 3:17
  - type: text
    content: 'over the Jordan, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  '10':
  - type: text
    content: 'For the priests bearing the ark stood in the midst of the Jordan until everything was finished that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Joshua to tell the people, according to all that Moses had commanded Joshua.'
  - type: text
    content: 'The people passed over in haste. '
  '11':
  - type: text
    content: 'And when all the people had finished passing over, the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the priests passed over before the people. '
  '12':
  - type: text
    content: 'The sons of Reuben and the sons of Gad and the half-tribe of Manasseh '
  - type: note
    content: ch. 6:7, 9, 13; Num. 32:20, 21, 27
  - type: text
    content: 'passed over armed before the people of Israel, as Moses had told them. '
  '13':
  - type: text
    content: 'About 40,000 ready for war passed over before the '
  - type: text
    content: Lord
  - type: text
    content: ' for battle, to the plains of Jericho. '
  '14':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:7
  - type: text
    content: exalted Joshua in the sight of all Israel, and they stood in awe of him just as they had stood in awe of Moses, all the days of his life.
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  '16':
  - type: text
    content: '“Command the priests bearing '
  - type: note
    content: Ex. 25:16, 21, 22
  - type: text
    content: 'the ark of the testimony to come up out of the Jordan.” '
  '17':
  - type: text
    content: 'So Joshua commanded the priests, “Come up out of the Jordan.” '
  '18':
  - type: text
    content: 'And when the priests bearing the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' came up from the midst of the Jordan, and the soles of the priests’ feet were lifted up on dry ground, the waters of the Jordan returned to their place and overflowed all its banks, '
  - type: note
    content: ch. 3:15
  - type: text
    content: as before.
  '19':
  - type: text
    content: 'The people came up out of the Jordan on the tenth day of the first month, and they encamped at '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'Gilgal on the east border of Jericho. '
  '2':
  - type: note
    content: ch. 3:12
  - type: text
    content: '“Take twelve men from the people, from each tribe a man, '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ver. 3, 9
  - type: text
    content: 'those twelve stones, which they took out of the Jordan, Joshua set up at Gilgal. '
  '21':
  - type: text
    content: 'And he said to the people of Israel, '
  - type: note
    content: ver. 6
  - type: text
    content: '“When your children ask their fathers in times to come, ‘What do these stones mean?’ '
  '22':
  - type: text
    content: 'then you shall let your children know, '
  - type: note
    content: ch. 3:17
  - type: text
    content: '‘Israel passed over this Jordan on dry ground.’ '
  '23':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God dried up the waters of the Jordan for you until you passed over, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did to the Red Sea, '
  - type: note
    content: ch. 2:10; Ex. 14:21
  - type: text
    content: 'which he dried up for us until we passed over, '
  '24':
  - type: note
    content: 1 Kgs. 8:42, 43
  - type: text
    content: 'so that all the peoples of the earth may know that the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Deut. 3:24; Ps. 89:13
  - type: text
    content: 'mighty, that you may '
  - type: note
    content: Ex. 14:31; Deut. 6:2
  - type: text
    content: 'fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God forever.”'
  - type: note
    content: Or all the days
  '3':
  - type: text
    content: 'and command them, saying, ‘Take '
  - type: note
    content: Deut. 27:2; [1 Kgs. 18:31]
  - type: text
    content: 'twelve stones from here out of the midst of the Jordan, from the very place '
  - type: note
    content: ch. 3:13, 15
  - type: text
    content: 'where the priests’ feet stood firmly, and bring them over with you and lay them down in '
  - type: note
    content: ver. 8, 19, 20
  - type: text
    content: 'the place where you lodge tonight.’” '
  '4':
  - type: text
    content: 'Then Joshua called the twelve men from the people of Israel, whom he had appointed, a man from each tribe. '
  '5':
  - type: text
    content: 'And Joshua said to them, “Pass on before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God into the midst of the Jordan, and take up each of you a stone upon his shoulder, according to the number of the tribes of the people of Israel, '
  '6':
  - type: text
    content: 'that this may be a sign among you. '
  - type: note
    content: ver. 21; [Ex. 12:26; 13:14; Deut. 6:20]
  - type: text
    content: 'When your children ask in time to come, ‘What do those stones mean to you?’ '
  '7':
  - type: text
    content: 'then you shall tell them that '
  - type: note
    content: ch. 3:16
  - type: text
    content: 'the waters of the Jordan were cut off before the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: '. When it passed over the Jordan, the waters of the Jordan were cut off. So these stones shall be to the people of Israel '
  - type: note
    content: Ex. 12:14; Num. 16:40
  - type: text
    content: a memorial forever.”
  '8':
  - type: text
    content: 'And the people of Israel did just as Joshua commanded and took up twelve stones out of the midst of the Jordan, according to the number of the tribes of the people of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' told Joshua. And they carried them over with them to the place where they lodged and laid them down'
  - type: note
    content: Or to rest
  - type: text
    content: ' there. '
  '9':
  - type: text
    content: And Joshua set up
  - type: note
    content: Or Joshua had set up
  - type: text
    content: ' twelve stones in the midst of the Jordan, '
  - type: note
    content: ver. 3
  - type: text
    content: 'in the place where the feet of the priests bearing the ark of the covenant had stood; and they are there to this day. '
