document_id: JOS.4,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Twelve Memorial Stones from the Jordan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the nation had finished passing '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:17
      marker-yv: yv-n
    - type: text
      text: 'over the Jordan, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the priests bearing the ark stood in the midst of the Jordan until everything was finished that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Joshua to tell the people, according to all that Moses had commanded Joshua.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people passed over in haste. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when all the people had finished passing over, the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the priests passed over before the people. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Reuben and the sons of Gad and the half-tribe of Manasseh '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 32:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      marker-yv: yv-n
    - type: text
      text: 'passed over armed before the people of Israel, as Moses had told them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About 40,000 ready for war passed over before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for battle, to the plains of Jericho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:7
      marker-yv: yv-n
    - type: text
      text: exalted Joshua in the sight of all Israel, and they stood in awe of him just as they had stood in awe of Moses, all the days of his life.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Command the priests bearing '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: 'the ark of the testimony to come up out of the Jordan.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua commanded the priests, “Come up out of the Jordan.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the priests bearing the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came up from the midst of the Jordan, and the soles of the priests’ feet were lifted up on dry ground, the waters of the Jordan returned to their place and overflowed all its banks, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:15
      marker-yv: yv-n
    - type: text
      text: as before.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people came up out of the Jordan on the tenth day of the first month, and they encamped at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:9
      marker-yv: yv-n
    - type: text
      text: 'Gilgal on the east border of Jericho. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:12
      marker-yv: yv-n
    - type: text
      text: '“Take twelve men from the people, from each tribe a man, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3, 9
      marker-yv: yv-n
    - type: text
      text: 'those twelve stones, which they took out of the Jordan, Joshua set up at Gilgal. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to the people of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: '“When your children ask their fathers in times to come, ‘What do these stones mean?’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall let your children know, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:17
      marker-yv: yv-n
    - type: text
      text: '‘Israel passed over this Jordan on dry ground.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God dried up the waters of the Jordan for you until you passed over, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God did to the Red Sea, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:21
      marker-yv: yv-n
    - type: text
      text: 'which he dried up for us until we passed over, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:42
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
      marker-yv: yv-n
    - type: text
      text: 'so that all the peoples of the earth may know that the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 3:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 89:13
      marker-yv: yv-n
    - type: text
      text: 'mighty, that you may '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 6:2
      marker-yv: yv-n
    - type: text
      text: 'fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God forever.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all the days
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and command them, saying, ‘Take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 27:2
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 18:31
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'twelve stones from here out of the midst of the Jordan, from the very place '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: 'where the priests’ feet stood firmly, and bring them over with you and lay them down in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8, 19, 20
      marker-yv: yv-n
    - type: text
      text: 'the place where you lodge tonight.’” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua called the twelve men from the people of Israel, whom he had appointed, a man from each tribe. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua said to them, “Pass on before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God into the midst of the Jordan, and take up each of you a stone upon his shoulder, according to the number of the tribes of the people of Israel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that this may be a sign among you. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 6:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'When your children ask in time to come, ‘What do those stones mean to you?’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall tell them that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:16
      marker-yv: yv-n
    - type: text
      text: 'the waters of the Jordan were cut off before the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. When it passed over the Jordan, the waters of the Jordan were cut off. So these stones shall be to the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 16:40
      marker-yv: yv-n
    - type: text
      text: a memorial forever.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel did just as Joshua commanded and took up twelve stones out of the midst of the Jordan, according to the number of the tribes of the people of Israel, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Joshua. And they carried them over with them to the place where they lodged and laid them down'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to rest
      marker-yv: yv-n
    - type: text
      text: ' there. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Joshua set up
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joshua had set up
      marker-yv: yv-n
    - type: text
      text: ' twelve stones in the midst of the Jordan, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'in the place where the feet of the priests bearing the ark of the covenant had stood; and they are there to this day. '
