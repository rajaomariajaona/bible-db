document_id: EST.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Chosen Queen
  - type: text
    content: 'After these things, '
  - type: note
    content: '[ch. 7:10]'
  - type: text
    content: 'when the anger of King Ahasuerus had abated, he remembered Vashti '
  - type: note
    content: ch. 1:19, 20
  - type: text
    content: 'and what she had done and what had been decreed against her. '
  '10':
  - type: note
    content: ver. 20
  - type: text
    content: 'Esther had not made known her people or kindred, for Mordecai had commanded her not to make it known. '
  '11':
  - type: text
    content: And every day Mordecai walked in front of the court of the harem to learn how Esther was and what was happening to her.
  '12':
  - type: text
    content: 'Now when the turn came for each young woman to go in to King Ahasuerus, after being twelve months under the regulations for the women, since this was the regular period of their beautifying, six months with oil of myrrh and six months with spices and ointments for women— '
  '13':
  - type: text
    content: 'when the young woman went in to the king in this way, she was given whatever she desired to take with her from the harem to the king’s palace. '
  '14':
  - type: text
    content: In the evening she would go in, and in the morning she would return to the second harem in custody of Shaashgaz, the king’s eunuch, who was in charge of the concubines. She would not go in to the king again, unless the king delighted in her and she was summoned by name.
  '15':
  - type: text
    content: 'When the turn came for Esther '
  - type: note
    content: ver. 7; ch. 9:29
  - type: text
    content: 'the daughter of Abihail the uncle of Mordecai, who had taken her as his own daughter, to go in to the king, she asked for nothing except what '
  - type: note
    content: ver. 3, 8
  - type: text
    content: 'Hegai the king’s eunuch, who had charge of the women, advised. Now Esther was winning favor in the eyes of all who saw her. '
  '16':
  - type: text
    content: 'And when Esther was taken to King Ahasuerus, into his royal palace, in the tenth month, which is the month of Tebeth, in the seventh year of his reign, '
  '17':
  - type: text
    content: 'the king loved Esther more than all the women, and she won grace and favor in his sight more than all the virgins, so that he set '
  - type: note
    content: ch. 1:11; 6:8
  - type: text
    content: the royal crown
  - type: note
    content: Or headdress
  - type: text
    content: ' on her head and made her queen instead of Vashti. '
  '18':
  - type: text
    content: 'Then the king '
  - type: note
    content: See ch. 1:3
  - type: text
    content: gave a great feast for all his officials and servants; it was Esther’s feast. He also granted a remission of taxes to the provinces and gave gifts with royal generosity.
  - type: heading
    content: Mordecai Discovers a Plot
  '19':
  - type: text
    content: 'Now when the virgins were gathered together '
  - type: note
    content: ver. 3, 4
  - type: text
    content: 'the second time, Mordecai was sitting '
  - type: note
    content: ver. 21; ch. 3:2, 3; 5:9, 13; 6:10, 12
  - type: text
    content: 'at the king’s gate. '
  '2':
  - type: text
    content: 'Then the king’s young men who attended him said, “Let beautiful young virgins be sought out for the king. '
  '20':
  - type: note
    content: ver. 10
  - type: text
    content: 'Esther had not made known her kindred or her people, as Mordecai had commanded her, for Esther obeyed Mordecai just '
  - type: note
    content: ver. 7
  - type: text
    content: 'as when she was brought up by him. '
  '21':
  - type: text
    content: 'In those days, as Mordecai was sitting at the king’s gate, '
  - type: note
    content: '[ch. 1:10; 6:2]'
  - type: text
    content: 'Bigthan and '
  - type: note
    content: ch. 6:2
  - type: text
    content: 'Teresh, two of the king’s eunuchs, who guarded the threshold, became angry and sought to lay hands on King Ahasuerus. '
  '22':
  - type: text
    content: 'And this came to the knowledge of Mordecai, '
  - type: note
    content: ch. 6:2; [ch. 7:9]
  - type: text
    content: 'and he told it to Queen Esther, and Esther told the king in the name of Mordecai. '
  '23':
  - type: text
    content: When the affair was investigated and found to be so, the men were both hanged on the gallows.
  - type: note
    content: Or wooden beam or stake; Hebrew tree or wood. This Persian execution practice involved affixing or impaling a person on a stake or pole (compare Ezra 6:11)
  - type: text
    content: ' And it was recorded in '
  - type: note
    content: ch. 6:1; 10:2
  - type: text
    content: the book of the chronicles in the presence of the king.
  '3':
  - type: text
    content: 'And let the king appoint officers in all the provinces of his kingdom to gather all the beautiful young virgins to the harem in Susa the citadel, under custody of '
  - type: note
    content: ver. 8, 15
  - type: text
    content: 'Hegai, the king’s eunuch, who is in charge of the women. '
  - type: note
    content: ver. 9, 12
  - type: text
    content: 'Let their cosmetics be given them. '
  '4':
  - type: text
    content: And let the young woman who pleases the king
  - type: note
    content: Hebrew who is good in the eyes of the king
  - type: text
    content: ' be queen instead of Vashti.” This pleased the king, and he did so.'
  '5':
  - type: text
    content: 'Now there was a Jew in Susa the citadel whose name was '
  - type: note
    content: '[Ezra 2:2]'
  - type: text
    content: 'Mordecai, the son of Jair, son of Shimei, son of Kish, a Benjaminite, '
  '6':
  - type: note
    content: 2 Kgs. 24:14, 15; 2 Chr. 36:10, 20; Jer. 24:1; 29:1, 2
  - type: text
    content: 'who had been carried away from Jerusalem among the captives carried away with Jeconiah king of Judah, whom Nebuchadnezzar king of Babylon had carried away. '
  '7':
  - type: text
    content: 'He was bringing up Hadassah, that is Esther, '
  - type: note
    content: ver. 15
  - type: text
    content: 'the daughter of his uncle, for she had neither father nor mother. The young woman had a beautiful figure and was lovely to look at, and when her father and her mother died, Mordecai took her as his own daughter. '
  '8':
  - type: text
    content: 'So when the king’s order and his edict were proclaimed, and '
  - type: note
    content: ver. 3
  - type: text
    content: 'when many young women were gathered in Susa the citadel in custody of '
  - type: note
    content: ver. 3
  - type: text
    content: 'Hegai, Esther also was taken into the king’s palace and put in custody of Hegai, who had charge of the women. '
  '9':
  - type: text
    content: 'And the young woman pleased him and won his favor. And he quickly provided her '
  - type: note
    content: ver. 3, 12
  - type: text
    content: 'with her cosmetics and her portion of food, and with seven chosen young women from the king’s palace, and advanced her and her young women to the best place in the harem. '
