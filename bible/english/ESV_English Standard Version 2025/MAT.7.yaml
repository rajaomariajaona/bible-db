document_id: MAT.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judging Others
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see Luke 6:37, 38, 41, 42; [ Rom. 14:13; 1 Cor. 4:5; James 5:9 ]
  - type: text
    content: “Judge not, that you be not judged.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Or if he asks for a fish, will give him a serpent?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'If you then, '
  - type: note
    content: ch. 12:34; Gen. 6:5; 8:21
  - type: text
    content: 'who are evil, know how to give good gifts to your children, how much more will '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: your Father who is in heaven give good things to those who ask him!
  - type: heading
    content: The Golden Rule
  '12':
  - type: text
    content: ' '
  - type: text
    content: '“So '
  - type: note
    content: Luke 6:31
  - type: text
    content: 'whatever you wish that others would do to you, do also to them, for this is '
  - type: note
    content: See ch. 22:40
  - type: text
    content: the Law and the Prophets.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Luke 13:24
  - type: text
    content: “Enter by the narrow gate. For the gate is wide and the way is easy
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts For the way is wide and easy
  - type: text
    content: that leads to destruction, and those who enter by it are many.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'For the gate is narrow and '
  - type: note
    content: Ps. 16:11; [ch. 18:8; John 14:6]
  - type: text
    content: 'the way is hard that leads to life, and '
  - type: note
    content: '[Luke 13:23]'
  - type: text
    content: those who find it are few.
  - type: heading
    content: A Tree and Its Fruit
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:11, 24; Deut. 13:1-3; Jer. 14:14; 23:16; Mark 13:22; Luke 6:26; Acts 13:6; 2 Pet. 2:1; 1 John 4:1
  - type: text
    content: '“Beware of false prophets, who come to you in sheep’s clothing but inwardly are '
  - type: note
    content: Ezek. 22:27; Acts 20:29; [ Mic. 3:5; John 10:12 ]
  - type: text
    content: ravenous wolves.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'You will recognize them '
  - type: note
    content: Luke 6:43, 44; James 2:18
  - type: text
    content: by their fruits. Are grapes gathered from thornbushes, or figs from thistles?
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So, '
  - type: note
    content: ch. 12:33-35
  - type: text
    content: every healthy tree bears good fruit, but the diseased tree bears bad fruit.
  - type: text
    content: ' '
  '18':
  - type: text
    content: A healthy tree cannot bear bad fruit, nor can a diseased tree bear good fruit.
  - type: text
    content: ' '
  '19':
  - type: note
    content: See ch. 3:10
  - type: text
    content: Every tree that does not bear good fruit is cut down and thrown into the fire.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Rom. 2:1, 3; 14:10; James 2:13; 4:11, 12
  - type: text
    content: 'For with the judgment you pronounce you will be judged, and '
  - type: note
    content: Mark 4:24; [Judg. 1:7]
  - type: text
    content: with the measure you use it will be measured to you.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Thus you will recognize them '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: by their fruits.
  - type: heading
    content: I Never Knew You
  '21':
  - type: text
    content: ' '
  - type: note
    content: Luke 6:46; Rom. 2:13; James 1:22
  - type: text
    content: '“Not everyone who '
  - type: note
    content: '[ Hos. 8:2 ]'
  - type: text
    content: 'says to me, ‘Lord, Lord,’ will '
  - type: note
    content: '[ John 3:3, 5 ]'
  - type: text
    content: 'enter the kingdom of heaven, but the one who '
  - type: note
    content: ch. 12:50
  - type: text
    content: does the will of my Father who is in heaven.
  - type: text
    content: ' '
  '22':
  - type: note
    content: ch. 25:11, 12; Luke 13:25-27
  - type: text
    content: 'On that day '
  - type: note
    content: Mal. 3:17, 18
  - type: text
    content: 'many will say to me, ‘Lord, Lord, did we not '
  - type: note
    content: '[Num. 24:4; John 11:51; 1 Cor. 13:2]'
  - type: text
    content: 'prophesy in your name, and cast out demons '
  - type: note
    content: See Mark 9:38
  - type: text
    content: in your name, and do many mighty works in your name?’
  - type: text
    content: ' '
  '23':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'And then will I declare to them, ‘I '
  - type: note
    content: ch. 10:33; [Ps. 101:4]
  - type: text
    content: 'never knew you; '
  - type: note
    content: ch. 25:41; Ps. 6:8
  - type: text
    content: 'depart from me, '
  - type: note
    content: ch. 13:41; Ps. 5:5
  - type: text
    content: you workers of lawlessness.’
  - type: heading
    content: Build Your House on the Rock
  '24':
  - type: text
    content: ' '
  - type: note
    content: For ver. 24-27, see Luke 6:47-49
  - type: text
    content: '“Everyone then who hears these words of mine and does them will be like '
  - type: note
    content: ch. 25:2; [ Ezek. 13:10-14 ]
  - type: text
    content: a wise man who built his house on the rock.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And the rain fell, and the floods came, and the winds blew and beat on that house, but it did not fall, because it had been founded on the rock.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And everyone who hears these words of mine and does not do them will be like '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: a foolish man who built his house on the sand.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And the rain fell, and the floods came, and the winds blew and beat against that house, and it fell, and great was the fall of it.”
  - type: heading
    content: The Authority of Jesus
  '28':
  - type: text
    content: 'And when Jesus finished these sayings, '
  - type: note
    content: ch. 13:54; 22:33; Mark 1:22; 6:2; 11:18; Luke 4:32; [Acts 13:12]
  - type: text
    content: 'the crowds were astonished at his teaching, '
  '29':
  - type: note
    content: John 7:46
  - type: text
    content: for he was teaching them as one who had authority, and not as their scribes.
  '3':
  - type: text
    content: 'Why do you see the speck that is in your brother’s eye, but '
  - type: note
    content: '[John 8:7-9]'
  - type: text
    content: do not notice the log that is in your own eye?
  - type: text
    content: ' '
  '4':
  - type: text
    content: Or how can you say to your brother, ‘Let me take the speck out of your eye,’ when there is the log in your own eye?
  - type: text
    content: ' '
  '5':
  - type: text
    content: You hypocrite, first take the log out of your own eye, and then you will see clearly to take the speck out of your brother’s eye.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:26; [ Prov. 9:7, 8; 23:9 ]
  - type: text
    content: '“Do not give '
  - type: note
    content: '[ Phil. 3:2; Rev. 22:15 ]'
  - type: text
    content: 'dogs what is holy, and do not throw your '
  - type: note
    content: ch. 13:46
  - type: text
    content: pearls before pigs, lest they trample them underfoot and turn to attack you.
  - type: heading
    content: Ask, and It Will Be Given
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-11, see Luke 11:9-13
  - type: text
    content: '“Ask, '
  - type: note
    content: ch. 18:19; 21:22; Mark 11:24; John 14:13; 15:7, 16; 16:23, 24; James 1:5, 6, 17; 1 John 3:22; 5:14, 15
  - type: text
    content: 'and it will be given to you; '
  - type: note
    content: 1 Chr. 28:9; 2 Chr. 15:2; Prov. 8:17; Jer. 29:13; [ Isa. 55:6 ]
  - type: text
    content: 'seek, and you will find; '
  - type: note
    content: '[ Rev. 3:20 ]'
  - type: text
    content: knock, and it will be opened to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For everyone who asks receives, and the one who seeks finds, and to the one who knocks it will be opened.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Or which one of you, if his son asks him for '
  - type: note
    content: ch. 4:3
  - type: text
    content: 'bread, will give him '
  - type: note
    content: ch. 4:3
  - type: text
    content: a stone?
  - type: text
    content: ' '
