document_id: NEH.4,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Opposition to the Work
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 3:33 in Hebrew
      marker-yv: yv-n
    - type: text
      text: 'Now when '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'Sanballat heard that we were building the wall, he was angry and greatly enraged, and he jeered at the Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In Judah it was said,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Judah said
      marker-yv: yv-n
    - type: text
      text: ' “The strength of those who bear the burdens is failing. There is too much rubble. By ourselves we will not be able to rebuild the wall.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And our enemies said, “They will not know or see till we come among them and kill them and stop the work.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time the Jews who lived near them came from all directions and said to us ten times, “You must return to us.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So in the lowest parts of the space behind the wall, in open places, I stationed the people by their clans, with their swords, their spears, and their bows. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I looked and arose and said to the nobles and to the officials and to the rest of the people, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 14:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; Deut. 1:29'
      marker-yv: yv-n
    - type: text
      text: '“Do not be afraid of them. Remember the Lord, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:17
      marker-yv: yv-n
    - type: text
      text: 'who is great and awesome, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 10:12
      marker-yv: yv-n
    - type: text
      text: and fight for your brothers, your sons, your daughters, your wives, and your homes.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Work Resumes
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When our enemies heard that it was known to us '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and that God had frustrated their plan, we all returned to the wall, each to his work. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From that day on, half of my servants worked on construction, and half held the spears, shields, bows, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 26:14
      marker-yv: yv-n
    - type: text
      text: 'coats of mail. And the leaders stood behind the whole house of Judah, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who were building on the wall. Those who carried burdens were loaded in such a way that each labored on the work with one hand and held his weapon with the other. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And each of the builders had his sword strapped at his side while he built. The man who sounded the trumpet was beside me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I said to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      marker-yv: yv-n
    - type: text
      text: 'the nobles and to the officials and to the rest of the people, “The work is great and widely spread, and we are separated on the wall, far from one another. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said in the presence of his brothers and of the army of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 16:24
      marker-yv: yv-n
    - type: text
      text: Samaria, “What are these feeble Jews doing? Will they restore it for themselves?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Will they commit themselves to God?
      marker-yv: yv-n
    - type: text
      text: ' Will they sacrifice? Will they finish up in a day? Will they revive the stones out of the heaps of rubbish, and burned ones at that?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the place where you hear the sound of the trumpet, rally to us there. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 1:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 23:10
      marker-yv: yv-n
    - type: text
      text: Our God will fight for us.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we labored at the work, and half of them held the spears from the break of dawn until the stars came out. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also said to the people at that time, “Let every man and his servant pass the night within Jerusalem, that they may be a guard for us by night and may labor by day.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So neither I nor my brothers nor my servants nor the men of the guard who followed me, none of us took off our clothes; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: each kept his weapon at his right hand.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his weapon when drinking
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: Tobiah the Ammonite was beside him, and he said, “Yes, what they are building—
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lam. 5:18
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'if a fox goes up on it he will break down their stone wall!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 123:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'Hear, O our God, for we are despised. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 79:12
      marker-yv: yv-n
    - type: text
      text: 'Turn back their taunt on their own heads and give them up to be plundered in a land where they are captives. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 69:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 109:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 18:23
      marker-yv: yv-n
    - type: text
      text: Do not cover their guilt, and let not their sin be blotted out from your sight, for they have provoked you to anger in the presence of the builders.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we built the wall. And all the wall was joined together to half its height, for the people had a mind to work.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 4:1 in Hebrew
      marker-yv: yv-n
    - type: text
      text: 'But when '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Sanballat and Tobiah and the Arabs and the Ammonites and the Ashdodites heard that the repairing of the walls of Jerusalem was going forward and that the breaches were beginning to be closed, they were very angry. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 83:3-5
      marker-yv: yv-n
    - type: text
      text: 'And they all plotted together to come and fight against Jerusalem and to cause confusion in it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And we prayed to our God and set a guard as a protection against them day and night.
