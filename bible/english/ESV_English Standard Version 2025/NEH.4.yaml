document_id: NEH.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Opposition to the Work
  - type: text
    content: ' '
  - type: note
    content: Ch 3:33 in Hebrew
  - type: text
    content: 'Now when '
  - type: note
    content: ver. 7; ch. 2:10, 19
  - type: text
    content: 'Sanballat heard that we were building the wall, he was angry and greatly enraged, and he jeered at the Jews. '
  '10':
  - type: text
    content: In Judah it was said,
  - type: note
    content: Hebrew Judah said
  - type: text
    content: ' “The strength of those who bear the burdens is failing. There is too much rubble. By ourselves we will not be able to rebuild the wall.” '
  '11':
  - type: text
    content: 'And our enemies said, “They will not know or see till we come among them and kill them and stop the work.” '
  '12':
  - type: text
    content: At that time the Jews who lived near them came from all directions and said to us ten times, “You must return to us.”
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'So in the lowest parts of the space behind the wall, in open places, I stationed the people by their clans, with their swords, their spears, and their bows. '
  '14':
  - type: text
    content: 'And I looked and arose and said to the nobles and to the officials and to the rest of the people, '
  - type: note
    content: '[Num. 14:9]; Deut. 1:29'
  - type: text
    content: '“Do not be afraid of them. Remember the Lord, '
  - type: note
    content: Deut. 7:21; 10:17
  - type: text
    content: 'who is great and awesome, '
  - type: note
    content: 2 Sam. 10:12
  - type: text
    content: and fight for your brothers, your sons, your daughters, your wives, and your homes.”
  - type: heading
    content: The Work Resumes
  '15':
  - type: text
    content: 'When our enemies heard that it was known to us '
  - type: note
    content: '[Job 5:12]'
  - type: text
    content: 'and that God had frustrated their plan, we all returned to the wall, each to his work. '
  '16':
  - type: text
    content: 'From that day on, half of my servants worked on construction, and half held the spears, shields, bows, and '
  - type: note
    content: 2 Chr. 26:14
  - type: text
    content: 'coats of mail. And the leaders stood behind the whole house of Judah, '
  '17':
  - type: text
    content: 'who were building on the wall. Those who carried burdens were loaded in such a way that each labored on the work with one hand and held his weapon with the other. '
  '18':
  - type: text
    content: 'And each of the builders had his sword strapped at his side while he built. The man who sounded the trumpet was beside me. '
  '19':
  - type: text
    content: 'And I said to '
  - type: note
    content: ver. 14
  - type: text
    content: 'the nobles and to the officials and to the rest of the people, “The work is great and widely spread, and we are separated on the wall, far from one another. '
  '2':
  - type: text
    content: 'And he said in the presence of his brothers and of the army of '
  - type: note
    content: 1 Kgs. 16:24
  - type: text
    content: Samaria, “What are these feeble Jews doing? Will they restore it for themselves?
  - type: note
    content: Or Will they commit themselves to God?
  - type: text
    content: ' Will they sacrifice? Will they finish up in a day? Will they revive the stones out of the heaps of rubbish, and burned ones at that?” '
  '20':
  - type: text
    content: 'In the place where you hear the sound of the trumpet, rally to us there. '
  - type: note
    content: Ex. 14:14, 25; Deut. 1:30; 3:22; 20:4; Josh. 23:10
  - type: text
    content: Our God will fight for us.”
  '21':
  - type: text
    content: 'So we labored at the work, and half of them held the spears from the break of dawn until the stars came out. '
  '22':
  - type: text
    content: 'I also said to the people at that time, “Let every man and his servant pass the night within Jerusalem, that they may be a guard for us by night and may labor by day.” '
  '23':
  - type: text
    content: 'So neither I nor my brothers nor my servants nor the men of the guard who followed me, none of us took off our clothes; '
  - type: note
    content: ver. 17
  - type: text
    content: each kept his weapon at his right hand.
  - type: note
    content: Or his weapon when drinking
  '3':
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: Tobiah the Ammonite was beside him, and he said, “Yes, what they are building—
  - type: note
    content: '[Lam. 5:18]'
  - type: text
    content: 'if a fox goes up on it he will break down their stone wall!” '
  '4':
  - type: note
    content: Ps. 123:3, 4
  - type: text
    content: 'Hear, O our God, for we are despised. '
  - type: note
    content: Ps. 79:12
  - type: text
    content: 'Turn back their taunt on their own heads and give them up to be plundered in a land where they are captives. '
  '5':
  - type: note
    content: Ps. 69:27, 28; 109:14, 15; Jer. 18:23
  - type: text
    content: Do not cover their guilt, and let not their sin be blotted out from your sight, for they have provoked you to anger in the presence of the builders.
  '6':
  - type: text
    content: So we built the wall. And all the wall was joined together to half its height, for the people had a mind to work.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ch 4:1 in Hebrew
  - type: text
    content: 'But when '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Sanballat and Tobiah and the Arabs and the Ammonites and the Ashdodites heard that the repairing of the walls of Jerusalem was going forward and that the breaches were beginning to be closed, they were very angry. '
  '8':
  - type: note
    content: See Ps. 83:3-5
  - type: text
    content: 'And they all plotted together to come and fight against Jerusalem and to cause confusion in it. '
  '9':
  - type: text
    content: And we prayed to our God and set a guard as a protection against them day and night.
