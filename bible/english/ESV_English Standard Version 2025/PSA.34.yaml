document_id: PSA.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Taste and See That the Lord Is Good
  - type: note
    content: This psalm is an acrostic poem, each verse beginning with the successive letters of the Hebrew alphabet
  - type: text
    content: 'Of David, when he '
  - type: note
    content: 1 Sam. 21:13
  - type: text
    content: 'changed his behavior before '
  - type: note
    content: '[1 Sam. 21:10, 11, 12, 14]'
  - type: text
    content: Abimelech, so that he drove him out, and he went away.
  - type: text
    content: 'I will bless the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Eph. 5:20; 1 Thess. 5:18]'
  - type: text
    content: at all times;
  - type: text
    content: his praise shall continually be in my mouth.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 4:10, 11
  - type: text
    content: The young lions suffer want and hunger;
  - type: text
    content: 'but those who '
  - type: note
    content: '[Ps. 84:11]'
  - type: text
    content: 'seek the '
  - type: text
    content: Lord
  - type: text
    content: ' lack no good thing.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 66:16
  - type: text
    content: Come, O children, listen to me;
  - type: note
    content: '[ Ps. 32:8 ]'
  - type: text
    content: 'I will teach you the fear of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cited 1 Pet. 3:10-12
  - type: text
    content: What man is there who desires life
  - type: text
    content: 'and loves many days, that he may '
  - type: note
    content: Eccles. 3:13; 6:6
  - type: text
    content: see good?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps. 15:3; 39:1; 141:3; Prov. 13:3; 21:23; James 1:26; 3:2; 1 Pet. 2:1, 22
  - type: text
    content: Keep your tongue from evil
  - type: text
    content: 'and your lips from '
  - type: note
    content: John 1:47; Rev. 14:5
  - type: text
    content: speaking deceit.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:27; Isa. 1:16, 17; [ Job 28:28 ]
  - type: text
    content: Turn away from evil and do good;
  - type: text
    content: 'seek peace and '
  - type: note
    content: Rom. 14:19; Heb. 12:14; [Rom. 12:18]
  - type: text
    content: pursue it.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 33:18
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' are toward the righteous'
  - type: note
    content: ver. 6, 8 ; Ps. 145:18; [John 9:31]
  - type: text
    content: and his ears toward their cry.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jer. 44:11; Amos 9:4
  - type: text
    content: 'The face of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against those who do evil,'
  - type: text
    content: 'to '
  - type: note
    content: See Ps. 21:10
  - type: text
    content: cut off the memory of them from the earth.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'When the righteous cry for help, the '
  - type: text
    content: Lord
  - type: text
    content: ' hears'
  - type: text
    content: and delivers them out of all their troubles.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is near to '
  - type: note
    content: Ps. 51:17; 147:3; Isa. 61:1
  - type: text
    content: the brokenhearted
  - type: text
    content: 'and saves '
  - type: note
    content: Isa. 57:15; 66:2; See Luke 15:17-24
  - type: text
    content: the crushed in spirit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 2 Tim. 3:11, 12
  - type: text
    content: Many are the afflictions of the righteous,
  - type: note
    content: ver. 6, 17, 22 ; [Acts 12:11]
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' delivers him out of them all.'
  '2':
  - type: text
    content: 'My soul '
  - type: note
    content: Ps. 44:8; 1 Sam. 2:1; Jer. 9:24
  - type: text
    content: 'makes its boast in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'let the humble hear and '
  - type: note
    content: Ps. 119:74
  - type: text
    content: be glad.
  '20':
  - type: text
    content: He keeps all his bones;
  - type: note
    content: John 19:36
  - type: text
    content: not one of them is broken.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps. 94:23; Prov. 24:16; [ Ps. 7:15, 16 ]
  - type: text
    content: Affliction will slay the wicked,
  - type: text
    content: and those who hate the righteous will be condemned.
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ps. 25:22
  - type: text
    content: redeems the life of his servants;
  - type: text
    content: 'none of those who take refuge in him will be '
  - type: note
    content: '[Rom. 8:33, 34]'
  - type: text
    content: condemned.
  '3':
  - type: text
    content: 'Oh, '
  - type: note
    content: Ps. 35:27; 40:16; 69:30; 70:4; Luke 1:46
  - type: text
    content: 'magnify the '
  - type: text
    content: Lord
  - type: text
    content: ' with me,'
  - type: text
    content: and let us exalt his name together!
  '4':
  - type: text
    content: 'I '
  - type: note
    content: 2 Chr. 15:2; [Matt. 7:7]
  - type: text
    content: 'sought the '
  - type: text
    content: Lord
  - type: text
    content: ', and he answered me'
  - type: text
    content: and delivered me from all my fears.
  '5':
  - type: text
    content: 'Those who look to him are '
  - type: note
    content: Isa. 60:5; [Ps. 4:6]
  - type: text
    content: radiant,
  - type: text
    content: and their faces shall never be ashamed.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 15, 17
  - type: text
    content: 'This poor man cried, and the '
  - type: text
    content: Lord
  - type: text
    content: ' heard him'
  - type: text
    content: 'and '
  - type: note
    content: ver. 17, 19; 2 Sam. 22:1
  - type: text
    content: saved him out of all his troubles.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Dan. 6:22; Heb. 1:14
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 32:1, 2; 2 Kgs. 6:17]'
  - type: text
    content: encamps
  - type: text
    content: around those who fear him, and delivers them.
  '8':
  - type: text
    content: 'Oh, '
  - type: note
    content: Heb. 6:5; 1 Pet. 2:3
  - type: text
    content: 'taste and see that '
  - type: note
    content: Ps. 100:5
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is good!'
  - type: note
    content: See Ps. 2:12
  - type: text
    content: Blessed is the man who takes refuge in him!
  '9':
  - type: text
    content: 'Oh, fear the '
  - type: text
    content: Lord
  - type: text
    content: ', you his saints,'
  - type: text
    content: for those who fear him have no lack!
