document_id: EZK.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of Jerusalem Symbolized
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, '
  - type: note
    content: '[ver. 3; Jer. 13:1, 2]'
  - type: text
    content: 'take a brick and lay it before you, and engrave on it a city, even Jerusalem. '
  '10':
  - type: text
    content: 'And your food that you eat shall be '
  - type: note
    content: ch. 12:19; [Jer. 37:21]
  - type: text
    content: 'by weight, '
  - type: note
    content: ch. 45:12
  - type: text
    content: twenty shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' a day; from day to day'
  - type: note
    content: Or at a set time daily; also verse 11
  - type: text
    content: ' you shall eat it. '
  '11':
  - type: text
    content: 'And water you shall drink '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: by measure, the sixth part of a hin;
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' from day to day you shall drink. '
  '12':
  - type: text
    content: 'And you shall eat it as a barley cake, baking it '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'in their sight on human dung.” '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Thus shall the people of Israel eat '
  - type: note
    content: Hos. 9:3; [Dan. 1:8]
  - type: text
    content: 'their bread unclean, among the nations where I will drive them.” '
  '14':
  - type: text
    content: 'Then I said, '
  - type: note
    content: ch. 9:8; 11:13; 20:49
  - type: text
    content: '“Ah, Lord '
  - type: text
    content: God
  - type: text
    content: '! Behold, I have never defiled myself.'
  - type: note
    content: Hebrew my soul (or throat) has never been made unclean
  - type: text
    content: ' '
  - type: note
    content: '[Acts 10:14]'
  - type: text
    content: 'From my youth up till now I have never eaten '
  - type: note
    content: ch. 44:31; [Lev. 7:24]
  - type: text
    content: 'what died of itself or was torn by beasts, nor has '
  - type: note
    content: Isa. 65:4; [Lev. 7:18]
  - type: text
    content: 'tainted meat come into my mouth.” '
  '15':
  - type: text
    content: 'Then he said to me, “See, I assign to you cow’s dung instead of human dung, on which you may prepare your bread.” '
  '16':
  - type: text
    content: 'Moreover, he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, behold, '
  - type: note
    content: ch. 5:16; 14:13; Lev. 26:26
  - type: text
    content: I will break the supply
  - type: note
    content: Hebrew staff
  - type: text
    content: ' of bread in Jerusalem. They shall eat bread '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'by weight and with anxiety, and they shall drink water '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'by measure and in dismay. '
  '17':
  - type: text
    content: 'I will do this that they may lack bread and water, and '
  - type: note
    content: See ch. 3:15
  - type: text
    content: 'look at one another in dismay, and '
  - type: note
    content: ch. 24:23; 33:10; Lev. 26:39
  - type: text
    content: rot away because of their punishment.
  '2':
  - type: note
    content: '[2 Kgs. 25:1]'
  - type: text
    content: 'And put siegeworks against it, '
  - type: note
    content: ch. 17:17; 21:22; 26:8
  - type: text
    content: 'and build a siege wall against it, '
  - type: note
    content: Luke 19:43
  - type: text
    content: 'and cast up a mound against it. Set camps also against it, '
  - type: note
    content: ch. 21:22; 26:9
  - type: text
    content: 'and plant battering rams against it all around. '
  '3':
  - type: text
    content: 'And you, take an iron griddle, and place it as an iron wall between you and the city; '
  - type: note
    content: See ch. 21:2
  - type: text
    content: 'and set your face toward it, '
  - type: note
    content: '[Isa. 29:3]'
  - type: text
    content: 'and let it be in a state of siege, and press the siege against it. This is '
  - type: note
    content: ch. 12:6, 11; 24:24, 27; [Isa. 8:18; 20:3]
  - type: text
    content: a sign for the house of Israel.
  '4':
  - type: text
    content: “Then lie on your left side, and place the punishment
  - type: note
    content: Or iniquity; also verses 5, 6, 17
  - type: text
    content: ' of the house of Israel upon it. For the number of the days that you lie on it, '
  - type: note
    content: ch. 44:10, 12; [Lev. 16:22; Isa. 53:11, 12]
  - type: text
    content: 'you shall bear their punishment. '
  '5':
  - type: text
    content: 'For I assign to you a number of days, '
  - type: note
    content: ver. 9
  - type: text
    content: '390 days, '
  - type: note
    content: '[Num. 14:34]'
  - type: text
    content: 'equal to the number of the years of their punishment. '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'So long shall you bear '
  - type: note
    content: '[ch. 23:4, 9, 10]'
  - type: text
    content: 'the punishment of the house of Israel. '
  '6':
  - type: text
    content: 'And when you have completed these, you shall lie down a second time, but on your right side, and '
  - type: note
    content: ch. 44:10, 12; [Lev. 16:22; Isa. 53:11, 12]
  - type: text
    content: 'bear '
  - type: note
    content: '[ch. 23:11, 12]'
  - type: text
    content: 'the punishment of the house of Judah. '
  - type: note
    content: '[Num. 14:34]'
  - type: text
    content: 'Forty days I assign you, a day for each year. '
  '7':
  - type: note
    content: See ch. 21:2
  - type: text
    content: 'And you shall set your face toward the siege of Jerusalem, '
  - type: note
    content: Isa. 52:10
  - type: text
    content: 'with your arm bared, and you shall prophesy against the city. '
  '8':
  - type: text
    content: 'And behold, '
  - type: note
    content: ch. 3:25
  - type: text
    content: 'I will place cords upon you, so that you cannot turn from one side to the other, till you have completed '
  - type: note
    content: '[ver. 9; ch. 5:2]; See 2 Kgs. 25:1-3; Jer. 39:1, 2; 52:4-6'
  - type: text
    content: the days of your siege.
  '9':
  - type: text
    content: “And you, take wheat and barley, beans and lentils, millet and emmer,
  - type: note
    content: A type of wheat
  - type: text
    content: ' and put them into a single vessel and make your '
  - type: note
    content: '[1 Kgs. 22:27]'
  - type: text
    content: 'bread from them. '
  - type: note
    content: See ver. 8
  - type: text
    content: 'During the number of days that you lie on your side, '
  - type: note
    content: ver. 5
  - type: text
    content: '390 days, you shall eat it. '
