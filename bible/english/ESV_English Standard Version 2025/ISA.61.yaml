document_id: ISA.61,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Year of the Lord’s Favor
  - type: text
    content: ' '
  - type: note
    content: ch. 11:2; 42:1; 48:16; Cited Luke 4:18, 19
  - type: text
    content: 'The Spirit of the Lord '
  - type: text
    content: God
  - type: text
    content: ' is upon me,'
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Ps. 45:7
  - type: text
    content: anointed me
  - type: text
    content: to bring good news to the poor;
  - type: note
    content: Or afflicted
  - type: text
    content: he has sent me to bind up the brokenhearted,
  - type: text
    content: to proclaim liberty to the captives,
  - type: text
    content: 'and '
  - type: note
    content: ch. 45:13; Ps. 146:7
  - type: text
    content: the opening of the prison to those who are bound;
  - type: note
    content: Or the opening [of the eyes] to those who are blind; Septuagint and recovery of sight to the blind
  '10':
  - type: text
    content: ' '
  - type: note
    content: Hab. 3:18
  - type: text
    content: 'I will greatly rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: my soul shall exult in my God,
  - type: note
    content: '[ch. 59:17; Zech. 3:4 ]'
  - type: text
    content: for he has clothed me with the garments of salvation;
  - type: text
    content: he has covered me with the robe of righteousness,
  - type: text
    content: 'as a bridegroom decks himself '
  - type: note
    content: ver. 3
  - type: text
    content: like a priest with a beautiful headdress,
  - type: note
    content: ch. 49:18; Rev. 21:2
  - type: text
    content: and as a bride adorns herself with her jewels.
  '11':
  - type: text
    content: For as the earth brings forth its sprouts,
  - type: text
    content: and as a garden causes what is sown in it to sprout up,
  - type: text
    content: 'so the Lord '
  - type: text
    content: God
  - type: text
    content: ' will cause '
  - type: note
    content: '[ch. 60:18; 62:7]'
  - type: text
    content: righteousness and praise
  - type: text
    content: to sprout up before all the nations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 25:10 ]'
  - type: text
    content: 'to proclaim the year of the '
  - type: text
    content: Lord
  - type: text
    content: ’s favor,
  - type: note
    content: ch. 34:8
  - type: text
    content: and the day of vengeance of our God;
  - type: text
    content: to comfort all who mourn;
  '3':
  - type: text
    content: to grant to those who mourn in Zion—
  - type: note
    content: ver. 10 ; [ch. 28:5]
  - type: text
    content: to give them a beautiful headdress instead of ashes,
  - type: note
    content: Ps. 45:7; Heb. 1:9
  - type: text
    content: the oil of gladness instead of mourning,
  - type: text
    content: the garment of praise instead of a faint spirit;
  - type: note
    content: '[ch. 60:21 ]'
  - type: text
    content: that they may be called oaks of righteousness,
  - type: text
    content: 'the planting of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: John 15:8
  - type: text
    content: that he may be glorified.
  - type: note
    content: Or that he may display his beauty
  '4':
  - type: text
    content: ' '
  - type: note
    content: Amos 9:14; See ch. 58:12
  - type: text
    content: They shall build up the ancient ruins;
  - type: text
    content: they shall raise up the former devastations;
  - type: text
    content: they shall repair the ruined cities,
  - type: text
    content: the devastations of many generations.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:2; [ch. 60:10 ]
  - type: text
    content: Strangers shall stand and tend your flocks;
  - type: text
    content: foreigners shall be your plowmen and vinedressers;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ex. 19:6; 1 Pet. 2:9; [ Joel 1:9 ]
  - type: text
    content: 'but you shall be called the priests of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they shall speak of you as the ministers of our God;
  - type: note
    content: ch. 60:5, 11, 16
  - type: text
    content: you shall eat the wealth of the nations,
  - type: text
    content: and in their glory you shall boast.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 40:2; [ch. 54:7, 8; Zech. 9:12 ]
  - type: text
    content: Instead of your shame there shall be a double portion;
  - type: text
    content: instead of dishonor they shall rejoice in their lot;
  - type: text
    content: therefore in their land they shall possess a double portion;
  - type: text
    content: they shall have everlasting joy.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps. 11:7; [ch. 59:15 ]
  - type: text
    content: 'For I the '
  - type: text
    content: Lord
  - type: text
    content: ' love justice;'
  - type: text
    content: I hate robbery and wrong;
  - type: note
    content: Or robbery with a burnt offering
  - type: note
    content: ch. 40:10; 49:4
  - type: text
    content: I will faithfully give them their recompense,
  - type: note
    content: See ch. 55:3
  - type: text
    content: and I will make an everlasting covenant with them.
  '9':
  - type: text
    content: Their offspring shall be known among the nations,
  - type: text
    content: and their descendants in the midst of the peoples;
  - type: text
    content: all who see them shall acknowledge them,
  - type: text
    content: 'that they are an offspring the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed.'
