document_id: MAT.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of John the Baptist
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see Mark 6:14-29; Luke 9:7-9
  - type: text
    content: 'At that time '
  - type: note
    content: Luke 3:1; Acts 13:1
  - type: text
    content: 'Herod the tetrarch heard about the fame of Jesus, '
  '10':
  - type: text
    content: 'He sent and had John beheaded in the prison, '
  '11':
  - type: text
    content: 'and his head was brought on a platter and given to the girl, and she brought it to her mother. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 9:14
  - type: text
    content: his disciples came and took the body and buried it, and they went and told Jesus.
  - type: heading
    content: Jesus Feeds the Five Thousand
  '13':
  - type: text
    content: 'Now when Jesus heard this, '
  - type: note
    content: For ver. 13-21, see Mark 6:32-44; Luke 9:10-17; John 6:1-13; [ch. 15:32-38; 16:9; Mark 8:2-9]
  - type: text
    content: 'he withdrew from there in a boat to a desolate place by himself. But when the crowds heard it, they followed him on foot from the towns. '
  '14':
  - type: text
    content: 'When he went ashore he '
  - type: note
    content: '[ch. 9:36]'
  - type: text
    content: 'saw a great crowd, and '
  - type: note
    content: '[ch. 9:36]'
  - type: text
    content: 'he had compassion on them and healed their sick. '
  '15':
  - type: text
    content: 'Now when it was evening, the disciples came to him and said, “This is a desolate place, and the day is now over; '
  - type: note
    content: ver. 22; [ch. 15:23]
  - type: text
    content: 'send the crowds away to go into the villages and buy food for themselves.” '
  '16':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: '“They need not go away; '
  - type: note
    content: '[2 Kgs. 4:42-44]'
  - type: text
    content: you give them something to eat.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'They said to him, “We have only five loaves here and two fish.” '
  '18':
  - type: text
    content: 'And he said, '
  - type: text
    content: “Bring them here to me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then he ordered the crowds to sit down on the grass, and taking the five loaves and the two fish, '
  - type: note
    content: Mark 7:34; John 11:41; 17:1
  - type: text
    content: 'he looked up to heaven and '
  - type: note
    content: ch. 26:26; 1 Sam. 9:13; Mark 8:7; 14:22; Luke 24:30; [1 Cor. 14:16]
  - type: text
    content: 'said a blessing. Then he broke the loaves and gave them to the disciples, and the disciples gave them to the crowds. '
  '2':
  - type: text
    content: 'and he said to his servants, '
  - type: note
    content: ch. 16:14
  - type: text
    content: '“This is John the Baptist. He has been raised from the dead; that is why these miraculous powers are at work in him.” '
  '20':
  - type: text
    content: 'And they all ate and were satisfied. And they took up twelve baskets full of the broken pieces left over. '
  '21':
  - type: text
    content: And those who ate were about five thousand men, besides women and children.
  - type: heading
    content: Jesus Walks on the Water
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22-33, see Mark 6:45-51; John 6:15-21
  - type: text
    content: 'Immediately he '
  - type: note
    content: '[ch. 8:18]'
  - type: text
    content: 'made the disciples get into the boat and go before him to the other side, while he dismissed the crowds. '
  '23':
  - type: text
    content: 'And after he had dismissed the crowds, '
  - type: note
    content: Luke 6:12; 9:28; [Mark 1:35; Luke 5:16]
  - type: text
    content: 'he went up on the mountain by himself to pray. When '
  - type: note
    content: '[Mark 13:35]'
  - type: text
    content: 'evening came, he was there alone, '
  '24':
  - type: text
    content: but the boat by this time was a long way
  - type: note
    content: Greek many stadia, a stadion was about 607 feet or 185 meters
  - type: text
    content: ' from the land,'
  - type: note
    content: Some manuscripts was out on the sea
  - type: text
    content: ' beaten by the waves, for the wind was against them. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: in the fourth watch of the night
  - type: note
    content: That is, between 3 a.m. and 6 a.m.
  - type: text
    content: ' he came to them, walking on the sea. '
  '26':
  - type: text
    content: 'But when the disciples saw him walking on the sea, '
  - type: note
    content: '[Luke 24:37]'
  - type: text
    content: 'they were terrified, and said, “It is a ghost!” and they cried out in fear. '
  '27':
  - type: text
    content: 'But immediately Jesus spoke to them, saying, '
  - type: note
    content: ch. 17:7; [Deut. 31:6; Isa. 41:13; 43:1, 2; John 16:33]
  - type: text
    content: '“Take heart; it is I. '
  - type: note
    content: ch. 17:7; [Deut. 31:6; Isa. 41:13; 43:1, 2; John 16:33]
  - type: text
    content: Do not be afraid.”
  '28':
  - type: text
    content: 'And Peter answered him, “Lord, if it is you, command me to come to you on the water.” '
  '29':
  - type: text
    content: 'He said, '
  - type: text
    content: “Come.”
  - type: text
    content: ' So Peter got out of the boat and '
  - type: note
    content: '[John 21:7]'
  - type: text
    content: 'walked on the water and came to Jesus. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: Luke 3:19, 20
  - type: text
    content: 'Herod had seized John and bound him and '
  - type: note
    content: ch. 11:2; John 3:24
  - type: text
    content: put him in prison for the sake of Herodias, his brother Philip’s wife,
  - type: note
    content: Some manuscripts his brother’s wife
  - type: text
    content: ' '
  '30':
  - type: text
    content: But when he saw the wind,
  - type: note
    content: Some manuscripts strong wind
  - type: text
    content: ' he was afraid, and beginning to sink he cried out, '
  - type: note
    content: '[ch. 8:25, 26]'
  - type: text
    content: '“Lord, save me.” '
  '31':
  - type: text
    content: 'Jesus immediately reached out his hand and took hold of him, saying to him, '
  - type: note
    content: See ch. 6:30
  - type: text
    content: '“O you of little faith, why did you '
  - type: note
    content: '[James 1:6]'
  - type: text
    content: doubt?”
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And when they got into the boat, '
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: 'the wind ceased. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: ver. 22
  - type: text
    content: 'those in the boat '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'worshiped him, saying, '
  - type: note
    content: '[John 6:14]'
  - type: text
    content: '“Truly you are '
  - type: note
    content: ch. 16:16; 26:63; Ps. 2:7; Mark 1:1; Luke 1:35; 4:41; John 1:49; 10:36; 11:27; 20:31; [ch. 3:17]
  - type: text
    content: the Son of God.”
  - type: heading
    content: Jesus Heals the Sick in Gennesaret
  '34':
  - type: text
    content: ' '
  - type: note
    content: For ver. 34-36, see Mark 6:53-56; [ John 6:24, 25 ]
  - type: text
    content: 'And when they had crossed over, they came to land at '
  - type: note
    content: Luke 5:1
  - type: text
    content: 'Gennesaret. '
  '35':
  - type: text
    content: 'And when the men of that place recognized him, they sent around to all that region and '
  - type: note
    content: ch. 4:24
  - type: text
    content: 'brought to him all who were sick '
  '36':
  - type: text
    content: 'and implored him that they might only touch '
  - type: note
    content: See ch. 9:20
  - type: text
    content: 'the fringe of his garment. And '
  - type: note
    content: Mark 3:10; Luke 6:19; [Acts 5:15]
  - type: text
    content: as many as touched it were made well.
  '4':
  - type: text
    content: 'because John had been saying to him, '
  - type: note
    content: Lev. 18:16; 20:21
  - type: text
    content: '“It is not lawful for you to have her.” '
  '5':
  - type: text
    content: 'And though he wanted to put him to death, '
  - type: note
    content: ch. 21:26; [ch. 21:46]
  - type: text
    content: 'he feared the people, because they held him to be '
  - type: note
    content: See ch. 11:9
  - type: text
    content: 'a prophet. '
  '6':
  - type: text
    content: 'But when Herod’s '
  - type: note
    content: Gen. 40:20
  - type: text
    content: 'birthday came, the daughter of Herodias danced before the company and pleased Herod, '
  '7':
  - type: text
    content: 'so that he promised with an oath to give her whatever she might ask. '
  '8':
  - type: text
    content: 'Prompted by her mother, she said, “Give me the head of John the Baptist here on a platter.” '
  '9':
  - type: text
    content: 'And the king was sorry, but because of his oaths and his guests he commanded it to be given. '
