  - type: text
    content: ' '
  - type: note
    content: Prov. 24:16; Mic. 7:8; 2 Cor. 4:9
  - type: text
    content: though he fall, he shall not be cast headlong,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
