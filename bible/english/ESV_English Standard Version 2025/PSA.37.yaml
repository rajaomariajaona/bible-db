    content: ver. 17
  - type: text
    content: upholds his hand.
  '25':
  - type: text
    content: I have been young, and now am old,
  - type: text
    content: yet I have not seen the righteous forsaken
  - type: text
    content: 'or his children '
  - type: note
    content: '[Ps. 109:10; Job 15:23]'
  - type: text
    content: begging for bread.
  '26':
  - type: text
    content: 'He is ever '
  - type: note
    content: Ps. 112:5, 9; Deut. 15:8, 10; Matt. 5:42; Luke 6:35
