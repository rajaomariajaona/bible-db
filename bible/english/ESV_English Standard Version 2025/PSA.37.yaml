    content: lending generously,
  - type: text
    content: and his children become a blessing.
  '27':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 34:14
  - type: text
    content: Turn away from evil and do good;
  - type: text
    content: 'so shall you '
  - type: note
    content: '[Ps. 102:28]'
  - type: text
    content: dwell forever.
  '28':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See Ps. 11:7
  - type: text
    content: loves justice;
  - type: text
    content: 'he will not forsake his '
  - type: note
    content: See Ps. 16:10
  - type: text
    content: saints.
  - type: text
    content: They are preserved forever,
  - type: text
    content: 'but the children of the wicked shall be '
  - type: note
    content: ver. 2, 9; Ps. 21:10; Prov. 2:22; Isa. 14:20
  - type: text
    content: cut off.
  '29':
  - type: text
    content: The righteous shall inherit the land
  - type: text
    content: 'and '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: dwell upon it forever.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 62:8; 115:9-11; Prov. 3:5; Isa. 26:4
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ', and do good;'
  - type: note
    content: Lev. 26:5; Prov. 2:21
  - type: text
    content: dwell in the land and befriend faithfulness.
  - type: note
    content: Or and feed on faithfulness, or and find safe pasture
  '30':
  - type: text
    content: The mouth of the righteous utters wisdom,
  - type: text
    content: and his tongue speaks justice.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps. 40:8; 119:11; Deut. 6:6; Isa. 51:7; Jer. 31:33; [ Rom. 7:22 ]
  - type: text
    content: The law of his God is in his heart;
  - type: text
    content: 'his '
  - type: note
    content: '[Ps. 73:2]'
  - type: text
    content: steps do not slip.
  '32':
  - type: text
    content: 'The wicked '
  - type: note
    content: Ps. 10:8
  - type: text
    content: watches for the righteous
  - type: text
    content: and seeks to put him to death.
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will not '
  - type: note
    content: '[2 Pet. 2:9]'
  - type: text
    content: abandon him to his power
  - type: text
    content: 'or let him '
