verses:
  '1':
  - type: heading
    content: He Will Not Forsake His Saints
  - type: note
    content: This psalm is an acrostic poem, each stanza beginning with the successive letters of the Hebrew alphabet
  - type: text
    content: Of David.
  - type: text
    content: ' '
  - type: note
    content: ver. 7, 8 ; Prov. 24:19
  - type: text
    content: Fret not yourself because of evildoers;
  - type: text
    content: 'be not '
  - type: note
    content: Ps. 73:3; Prov. 3:31; 23:17; 24:1, 19
  - type: text
    content: envious of wrongdoers!
  '10':
  - type: text
    content: 'In '
  - type: note
    content: Job 24:24
  - type: text
    content: just a little while, the wicked will be no more;
  - type: text
    content: 'though you look carefully at '
  - type: note
    content: Job 7:10
  - type: text
    content: his place, he will not be there.
  '11':
  - type: text
    content: 'But '
  - type: note
