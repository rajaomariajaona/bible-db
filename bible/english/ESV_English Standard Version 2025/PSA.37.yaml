    content: knows the days of the blameless,
  - type: text
    content: 'and their '
  - type: note
    content: ver. 9
  - type: text
    content: heritage will remain forever;
  '19':
  - type: text
    content: they are not put to shame in evil times;
  - type: text
    content: 'in '
  - type: note
    content: Ps. 33:19; Job 5:20
