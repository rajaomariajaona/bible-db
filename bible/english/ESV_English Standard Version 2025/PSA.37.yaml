  - type: text
    content: the meek shall inherit the land
  - type: text
    content: 'and delight themselves in '
  - type: note
    content: Ps. 119:165; [Isa. 32:17]
  - type: text
    content: abundant peace.
  '12':
  - type: text
    content: 'The wicked '
  - type: note
    content: Ps. 31:13
  - type: text
    content: plots against the righteous
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 35:16
  - type: text
    content: gnashes his teeth at him,
  '13':
  - type: text
    content: 'but the Lord '
  - type: note
    content: See Ps. 2:4
