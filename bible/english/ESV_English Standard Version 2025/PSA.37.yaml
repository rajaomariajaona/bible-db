  - type: text
    content: But the wicked will perish;
  - type: text
    content: 'the enemies of the '
  - type: text
    content: Lord
  - type: text
    content: ' are like '
  - type: note
    content: '[Matt. 6:30; James 1:11]'
  - type: text
    content: the glory of the pastures;
  - type: text
    content: 'they vanish—like '
  - type: note
