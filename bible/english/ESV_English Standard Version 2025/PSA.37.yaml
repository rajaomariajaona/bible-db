  - type: text
    content: bows shall be broken.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Prov. 15:16; 16:8; [ 1 Tim. 6:6 ]
  - type: text
    content: Better is the little that the righteous has
  - type: text
    content: than the abundance of many wicked.
