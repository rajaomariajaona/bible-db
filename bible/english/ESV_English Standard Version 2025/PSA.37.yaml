  - type: text
    content: smoke they vanish away.
  '21':
  - type: text
    content: The wicked borrows but does not pay back,
  - type: text
    content: 'but the righteous '
  - type: note
    content: ver. 26
  - type: text
    content: is generous and gives;
  '22':
  - type: text
    content: 'for those blessed by the '
  - type: text
    content: Lord
