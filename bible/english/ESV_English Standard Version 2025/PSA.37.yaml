    content: be condemned when he is brought to trial.
  '34':
  - type: text
    content: ' '
  - type: note
    content: ver. 9 ; See Ps. 27:14
  - type: text
    content: 'Wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep his way,'
  - type: text
    content: and he will exalt you to inherit the land;
  - type: text
    content: 'you will look on '
  - type: note
