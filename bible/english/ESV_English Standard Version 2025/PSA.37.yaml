    content: Hebrew by him
  - type: text
    content: ' shall '
  - type: note
    content: See ver. 9
  - type: text
    content: inherit the land,
  - type: text
    content: 'but those cursed by him '
  - type: note
    content: ver. 2
  - type: text
    content: shall be cut off.
  '23':
  - type: text
    content: 'The '
  - type: note
    content: Ps. 25:12; 1 Sam. 2:9
  - type: text
    content: 'steps of a man are '
  - type: note
