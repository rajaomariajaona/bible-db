  '35':
  - type: text
    content: ' '
  - type: note
    content: See Job 5:3
  - type: text
    content: I have seen a wicked, ruthless man,
  - type: text
    content: 'spreading himself like '
  - type: note
    content: '[Ps. 52:8]'
  - type: text
    content: a green laurel tree.
  - type: note
    content: The identity of this tree is uncertain
  '36':
  - type: text
    content: But he passed away,
  - type: note
    content: Or But one passed by
  - type: text
    content: ' and behold, '
  - type: note
    content: ver. 10; Job 20:5
  - type: text
    content: he was no more;
  - type: text
    content: though I sought him, he could not be found.
  '37':
  - type: text
    content: Mark the blameless and behold the upright,
  - type: text
    content: 'for there is a future for the man of '
  - type: note
