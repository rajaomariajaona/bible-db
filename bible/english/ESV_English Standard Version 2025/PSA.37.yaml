    content: laughs at the wicked,
  - type: text
    content: 'for he sees that his '
  - type: note
    content: See Job 18:20
  - type: text
    content: day is coming.
  '14':
  - type: text
    content: 'The wicked draw the sword and '
  - type: note
    content: Ps. 7:12
  - type: text
    content: bend their bows
  - type: text
    content: to bring down the poor and needy,
  - type: text
    content: 'to slay those whose '
