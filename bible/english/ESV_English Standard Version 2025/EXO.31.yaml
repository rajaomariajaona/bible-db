document_id: EXO.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Oholiab and Bezalel
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'and '
  - type: note
    content: ch. 35:19; 39:1, 41
  - type: text
    content: the finely worked garments,
  - type: note
    content: Or garments for worship
  - type: text
    content: ' the holy garments for Aaron the priest and the garments of his sons, for their service as priests, '
  '11':
  - type: text
    content: 'and '
  - type: note
    content: ch. 30:25, 31; 37:29
  - type: text
    content: 'the anointing oil and the fragrant '
  - type: note
    content: ch. 30:7, 34
  - type: text
    content: incense for the Holy Place. According to all that I have commanded you, they shall do.”
  - type: heading
    content: The Sabbath
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '13':
  - type: text
    content: '“You are to speak to the people of Israel and say, ‘Above all you shall keep my Sabbaths, for this is a sign between me and you throughout your generations, that you may know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', sanctify you. '
  '14':
  - type: text
    content: 'You shall keep the Sabbath, because it is holy for you. Everyone who profanes it shall be put to death. '
  - type: note
    content: ch. 35:2; [Jer. 17:27]; See Num. 15:32-36
  - type: text
    content: 'Whoever does any work on it, that soul shall be cut off from among his people. '
  '15':
  - type: note
    content: See ch. 20:9
  - type: text
    content: 'Six days shall work be done, but '
  - type: note
    content: ch. 16:23; 20:10; Gen. 2:2
  - type: text
    content: 'the seventh day is a Sabbath of solemn rest, holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'Whoever does any work on the Sabbath day shall be put to death. '
  '16':
  - type: text
    content: 'Therefore the people of Israel shall keep the Sabbath, observing the Sabbath throughout their generations, as a covenant forever. '
  '17':
  - type: note
    content: ver. 13
  - type: text
    content: 'It is a sign forever between me and the people of Israel that '
  - type: note
    content: Gen. 1:31
  - type: text
    content: 'in six days the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens and the earth, and '
  - type: note
    content: Gen. 2:2; Heb. 4:4, 10
  - type: text
    content: on the seventh day he rested and was refreshed.’”
  '18':
  - type: text
    content: 'And he gave to Moses, when he had finished speaking with him on Mount Sinai, the '
  - type: note
    content: ch. 24:12; 32:15, 16; Deut. 4:13; 5:22; 9:10, 11; [2 Cor. 3:3]
  - type: text
    content: 'two tablets of the testimony, tablets of stone, written with '
  - type: note
    content: See ch. 8:19
  - type: text
    content: the finger of God.
  '2':
  - type: text
    content: '“See, I have called by name '
  - type: note
    content: ch. 35:30; 36:1; 1 Chr. 2:20
  - type: text
    content: 'Bezalel the son of Uri, son of '
  - type: note
    content: ch. 17:10, 12; 24:14
  - type: text
    content: 'Hur, of the tribe of Judah, '
  '3':
  - type: text
    content: 'and I have '
  - type: note
    content: ch. 35:31; [1 Kgs. 7:14]
  - type: text
    content: 'filled him with the Spirit of God, with ability and intelligence, with knowledge and all craftsmanship, '
  '4':
  - type: text
    content: 'to devise artistic designs, to work in gold, silver, and bronze, '
  '5':
  - type: text
    content: 'in cutting stones for setting, and in carving wood, to work in every craft. '
  '6':
  - type: text
    content: 'And behold, I have appointed with him '
  - type: note
    content: ch. 35:34
  - type: text
    content: 'Oholiab, the son of Ahisamach, of the tribe of Dan. And I have given to all able men '
  - type: note
    content: ch. 28:3; 35:10, 35; 36:1
  - type: text
    content: 'ability, that they may make all that I have commanded you: '
  '7':
  - type: note
    content: See ch. 36:8-38
  - type: text
    content: 'the tent of meeting, and '
  - type: note
    content: See ch. 37:1-5
  - type: text
    content: 'the ark of the testimony, and '
  - type: note
    content: See ch. 37:6-9
  - type: text
    content: 'the mercy seat that is on it, and all the furnishings of the tent, '
  '8':
  - type: note
    content: See ch. 37:10-16
  - type: text
    content: 'the table and its utensils, and '
  - type: note
    content: See ch. 37:17-24
  - type: text
    content: 'the pure lampstand with all its utensils, and '
  - type: note
    content: See ch. 37:25-28
  - type: text
    content: 'the altar of incense, '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: See ch. 38:1-7
  - type: text
    content: 'the altar of burnt offering with all its utensils, and '
  - type: note
    content: ch. 38:8
  - type: text
    content: 'the basin and its stand, '
