document_id: 1CO.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Divisions in the Church
  - type: text
    content: But I, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' could not address you as '
  - type: note
    content: ch. 2:15; Rom. 7:14
  - type: text
    content: 'spiritual people, but as '
  - type: note
    content: '[ch. 2:14]'
  - type: text
    content: 'people of the flesh, as '
  - type: note
    content: Heb. 5:13; [ch. 2:6]
  - type: text
    content: 'infants in Christ. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Pet. 3:15 ]; See Rom. 12:3'
  - type: text
    content: According to the grace of God given to me, like a skilled
  - type: note
    content: Or wise
  - type: text
    content: ' master builder I laid a '
  - type: note
    content: ver. 11, 12; Rom. 15:20; [Rev. 21:14]
  - type: text
    content: 'foundation, and '
  - type: note
    content: '[ch. 4:15]'
  - type: text
    content: 'someone else is building upon it. Let each one take care how he builds upon it. '
  '11':
  - type: text
    content: 'For no one can lay a '
  - type: note
    content: Isa. 28:16
  - type: text
    content: 'foundation other '
  - type: note
    content: '[2 Cor. 11:4; Gal. 1:6, 7]'
  - type: text
    content: 'than that which is laid, '
  - type: note
    content: '[Eph. 2:20]'
  - type: text
    content: 'which is Jesus Christ. '
  '12':
  - type: text
    content: 'Now if anyone builds on the foundation with gold, silver, precious stones, wood, hay, straw— '
  '13':
  - type: note
    content: ch. 4:5
  - type: text
    content: 'each one’s work will become manifest, for the Day will disclose it, because it will be revealed '
  - type: note
    content: ver. 15; 2 Thess. 1:8
  - type: text
    content: 'by fire, and '
  - type: note
    content: 1 Pet. 1:7
  - type: text
    content: 'the fire will test what sort of work each one has done. '
  '14':
  - type: text
    content: 'If the work that anyone has built on the foundation survives, '
  - type: note
    content: See ver. 8
  - type: text
    content: 'he will receive a reward. '
  '15':
  - type: text
    content: 'If anyone’s work is burned up, he will suffer loss, though he himself will be saved, '
  - type: note
    content: '[Ps. 66:12; Isa. 43:2; Jude 23]'
  - type: text
    content: but only as through fire.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:19; 2 Cor. 6:16; Eph. 2:21
  - type: text
    content: Do you not know that you
  - type: note
    content: The Greek for you is plural in verses 16 and 17
  - type: text
    content: ' are God’s temple and that God’s Spirit dwells in you? '
  '17':
  - type: text
    content: 'If anyone destroys God’s temple, God will destroy him. For '
  - type: note
    content: '[2 Cor. 7:1]'
  - type: text
    content: God’s temple is holy, and you are that temple.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 5:21; Gal. 6:3 ]'
  - type: text
    content: 'Let no one deceive himself. '
  - type: note
    content: '[ch. 8:2; Jer. 8:8, 9]'
  - type: text
    content: 'If anyone among you thinks that he is wise in this age, let him become a fool that he may become wise. '
  '19':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'the wisdom of this world is folly with God. For it is written, '
  - type: note
    content: Cited from Job 5:13
  - type: text
    content: '“He catches the wise in their craftiness,” '
  '2':
  - type: note
    content: Heb. 5:12, 13; 1 Pet. 2:2
  - type: text
    content: 'I fed you with milk, not solid food, for '
  - type: note
    content: John 16:12
  - type: text
    content: 'you were not ready for it. And even now you are not yet ready, '
  '20':
  - type: text
    content: 'and again, '
  - type: note
    content: Cited from Ps. 94:11
  - type: text
    content: '“The Lord knows the thoughts of the wise, that they are futile.” '
  '21':
  - type: text
    content: 'So '
  - type: note
    content: ver. 4-6; ch. 1:12; 4:6
  - type: text
    content: 'let no one boast in men. For '
  - type: note
    content: Rom. 8:28
  - type: text
    content: 'all things are yours, '
  '22':
  - type: text
    content: 'whether Paul or Apollos or Cephas or the world or life or death or the present or the future—all are yours, '
  '23':
  - type: text
    content: 'and '
  - type: note
    content: 2 Cor. 10:7; Gal. 3:29
  - type: text
    content: 'you are Christ’s, and '
  - type: note
    content: '[ch. 11:3]'
  - type: text
    content: Christ is God’s.
  '3':
  - type: text
    content: 'for you are still of the flesh. For while there is '
  - type: note
    content: Gal. 5:19, 20; [ch. 1:11; 11:18; Rom. 13:13]
  - type: text
    content: 'jealousy and strife among you, are you not of the flesh and behaving only in a human way? '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 1:12
  - type: text
    content: 'when one says, “I follow Paul,” and another, “I follow Apollos,” '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: are you not being merely human?
  '5':
  - type: text
    content: 'What then is Apollos? What is Paul? '
  - type: note
    content: 2 Cor. 6:4; Eph. 3:7; Col. 1:25; [2 Cor. 3:3]
  - type: text
    content: 'Servants through whom you believed, '
  - type: note
    content: See Rom. 12:6
  - type: text
    content: 'as the Lord assigned to each. '
  '6':
  - type: note
    content: ch. 4:15; 9:1; 15:1; Acts 18:4-11; 2 Cor. 10:14, 15
  - type: text
    content: 'I planted, '
  - type: note
    content: Acts 18:27
  - type: text
    content: 'Apollos watered, '
  - type: note
    content: '[ch. 15:10; Col. 1:18]'
  - type: text
    content: 'but God gave the growth. '
  '7':
  - type: text
    content: 'So '
  - type: note
    content: 2 Cor. 12:11; Gal. 6:3; [Gal. 2:6]
  - type: text
    content: 'neither he who plants nor he who waters is anything, but only God who gives the growth. '
  '8':
  - type: text
    content: 'He who plants and he who waters are one, and each '
  - type: note
    content: ver. 14; ch. 15:58; 2 John 8; [ch. 4:5; Gal. 6:4, 5]; See Matt. 16:27; Rom. 2:6
  - type: text
    content: 'will receive his wages according to his labor. '
  '9':
  - type: text
    content: 'For we are '
  - type: note
    content: Mark 16:20; 2 Cor. 6:1
  - type: text
    content: 'God’s fellow workers. You are God’s field, '
  - type: note
    content: Eph. 2:20-22; Col. 2:7; [ver. 16; Ps. 127:1]
  - type: text
    content: God’s building.
