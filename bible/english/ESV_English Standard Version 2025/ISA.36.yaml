document_id: ISA.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sennacherib Invades Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-22, see 2 Kgs. 18:13, 17-37
  - type: text
    content: 'In the fourteenth year of King Hezekiah, '
  - type: note
    content: '[2 Chr. 32:1]'
  - type: text
    content: 'Sennacherib king of Assyria came up against all the fortified cities of Judah and took them. '
  '10':
  - type: text
    content: 'Moreover, is it without the '
  - type: text
    content: Lord
  - type: text
    content: ' that I have come up against this land to destroy it? '
  - type: note
    content: ch. 10:5, 6
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go up against this land and destroy it.”’”'
  '11':
  - type: text
    content: 'Then Eliakim, Shebna, and Joah said to the Rabshakeh, “Please speak to your servants '
  - type: note
    content: Ezra 4:7; Dan. 2:4
  - type: text
    content: 'in Aramaic, for we understand it. Do not speak to us in the language of Judah within the hearing of the people who are on the wall.” '
  '12':
  - type: text
    content: But the Rabshakeh said, “Has my master sent me to speak these words to your master and to you, and not to the men sitting on the wall, who are doomed with you to eat their own dung and drink their own urine?”
  '13':
  - type: text
    content: 'Then the Rabshakeh stood and called out in a loud voice in the language of Judah: “Hear the words of the great king, the king of Assyria! '
  '14':
  - type: text
    content: 'Thus says the king: '
  - type: note
    content: '[ch. 37:10; 2 Chr. 32:6-8]'
  - type: text
    content: '‘Do not let Hezekiah deceive you, for he will not be able to deliver you. '
  '15':
  - type: text
    content: 'Do not let Hezekiah make you trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' by saying, “The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely deliver us. This city will not be given into the hand of the king of Assyria.” '
  '16':
  - type: text
    content: 'Do not listen to Hezekiah. For thus says the king of Assyria: Make your peace with me'
  - type: note
    content: Hebrew Make a blessing with me
  - type: text
    content: ' and come out to me. Then each one of you will eat of his own vine, and each one of his own fig tree, and each one of you will drink the water of his own cistern, '
  '17':
  - type: text
    content: 'until '
  - type: note
    content: 2 Kgs. 18:11
  - type: text
    content: 'I come and take you away to a land like your own land, a land of grain and wine, a land of bread and vineyards. '
  '18':
  - type: text
    content: 'Beware lest Hezekiah mislead you by saying, “The '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver us.” Has any of the gods of the nations delivered his land out of the hand of the king of Assyria? '
  '19':
  - type: note
    content: ch. 37:13
  - type: text
    content: 'Where are the gods of '
  - type: note
    content: Jer. 49:23
  - type: text
    content: 'Hamath and '
  - type: note
    content: Jer. 49:23
  - type: text
    content: 'Arpad? Where are the gods of Sepharvaim? '
  - type: note
    content: '[2 Kgs. 17:6]'
  - type: text
    content: 'Have they delivered Samaria out of my hand? '
  '2':
  - type: note
    content: 2 Chr. 32:9
  - type: text
    content: And the king of Assyria sent the Rabshakeh
  - type: note
    content: Rabshakeh is the title of a high-ranking Assyrian military officer
  - type: text
    content: ' from '
  - type: note
    content: Josh. 15:20, 39
  - type: text
    content: 'Lachish to King Hezekiah at Jerusalem, with a great army. And he stood '
  - type: note
    content: ch. 7:3
  - type: text
    content: 'by the conduit of the upper pool on the highway to the Washer’s Field. '
  '20':
  - type: note
    content: '[2 Chr. 32:19]'
  - type: text
    content: 'Who among all the gods of these lands have delivered their lands out of my hand, that the '
  - type: text
    content: Lord
  - type: text
    content: ' should deliver Jerusalem out of my hand?’”'
  '21':
  - type: text
    content: 'But they were silent and answered him not a word, for the king’s command was, “Do not answer him.” '
  '22':
  - type: note
    content: ver. 3; [ch. 33:7]
  - type: text
    content: Then Eliakim the son of Hilkiah, who was over the household, and Shebna the secretary, and Joah the son of Asaph, the recorder, came to Hezekiah with their clothes torn, and told him the words of the Rabshakeh.
  '3':
  - type: text
    content: 'And there came out to him '
  - type: note
    content: ch. 22:15, 20, 21
  - type: text
    content: 'Eliakim the son of Hilkiah, who was over the household, and '
  - type: note
    content: ch. 22:15, 20, 21
  - type: text
    content: Shebna the secretary, and Joah the son of Asaph, the recorder.
  '4':
  - type: text
    content: 'And the Rabshakeh said to them, “Say to Hezekiah, ‘Thus says the '
  - type: note
    content: '[ch. 10:8]'
  - type: text
    content: 'great king, the king of Assyria: On what do you rest this trust of yours? '
  '5':
  - type: text
    content: 'Do you think that mere words are strategy and power for war? In whom do you now trust, that you have rebelled against me? '
  '6':
  - type: note
    content: Ezek. 29:6, 7
  - type: text
    content: 'Behold, you are trusting in Egypt, that broken reed of a staff, which will pierce the hand of any man who leans on it. Such is Pharaoh king of Egypt to all who trust in him. '
  '7':
  - type: text
    content: 'But if you say to me, “We trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,” is it not he '
  - type: note
    content: 2 Kgs. 18:4; See Deut. 12:2-5
  - type: text
    content: 'whose high places and altars Hezekiah has removed, saying to Judah and to Jerusalem, “You shall worship before this altar”? '
  '8':
  - type: text
    content: 'Come now, make a wager with my master the king of Assyria: I will give you two thousand horses, if you are able on your part to set riders on them. '
  '9':
  - type: text
    content: 'How then can you repulse '
  - type: note
    content: '[ch. 10:8]'
  - type: text
    content: 'a single captain among the least of my master’s servants, when '
  - type: note
    content: '[ch. 20:5; 30:3, 7; 31:1]'
  - type: text
    content: 'you trust in Egypt for chariots and for horsemen? '
