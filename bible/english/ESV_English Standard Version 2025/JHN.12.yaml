document_id: JHN.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Mary Anoints Jesus at Bethany
  - type: text
    content: 'Six days before '
  - type: note
    content: ver. 12, 20; ch. 11:55
  - type: text
    content: 'the Passover, '
  - type: note
    content: For ver. 1-8, see Matt. 26:6-11; Mark 14:3-8
  - type: text
    content: 'Jesus therefore came to Bethany, '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'where Lazarus was, whom Jesus had raised from the dead. '
  '10':
  - type: note
    content: '[Luke 16:31]'
  - type: text
    content: 'So the chief priests made plans to put Lazarus to death as well, '
  '11':
  - type: text
    content: 'because '
  - type: note
    content: ver. 18; ch. 11:45
  - type: text
    content: on account of him many of the Jews were going away and believing in Jesus.
  - type: heading
    content: The Triumphal Entry
  '12':
  - type: text
    content: 'The next day '
  - type: note
    content: For ver. 12-15, see Matt. 21:4-9; Mark 11:7-10; Luke 19:35-38
  - type: text
    content: 'the large crowd that had come to the feast heard that Jesus was coming to Jerusalem. '
  '13':
  - type: text
    content: 'So they took branches of '
  - type: note
    content: '[Rev. 7:9]'
  - type: text
    content: 'palm trees and went out to meet him, crying out, '
  - type: note
    content: Ps. 118:25, 26
  - type: text
    content: '“Hosanna! Blessed is '
  - type: note
    content: '[ch. 5:43]'
  - type: text
    content: 'he who comes in the name of the Lord, even '
  - type: note
    content: See ch. 1:49
  - type: text
    content: 'the King of Israel!” '
  '14':
  - type: text
    content: And Jesus found a young donkey and sat on it, just as it is written,
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cited from Zech. 9:9
  - type: text
    content: “Fear not, daughter of Zion;
  - type: text
    content: behold, your king is coming,
  - type: text
    content: sitting on a donkey’s colt!”
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 13:7 ]; See Mark 9:32'
  - type: text
    content: 'His disciples did not understand these things at first, but '
  - type: note
    content: ver. 23; See ch. 7:39
  - type: text
    content: 'when Jesus was glorified, then '
  - type: note
    content: ch. 2:22
  - type: text
    content: 'they remembered that these things had been written about him and had been done to him. '
  '17':
  - type: note
    content: '[Luke 19:37]'
  - type: text
    content: 'The crowd that had been with him when he called Lazarus out of the tomb and raised him from the dead continued to bear witness. '
  '18':
  - type: text
    content: 'The reason why the crowd went to meet him '
  - type: note
    content: ver. 9-11
  - type: text
    content: 'was that they heard he had done this sign. '
  '19':
  - type: text
    content: 'So the Pharisees said to one another, '
  - type: note
    content: ch. 11:47
  - type: text
    content: '“You see that you are gaining nothing. Look, '
  - type: note
    content: '[ch. 3:26]'
  - type: text
    content: the world has gone after him.”
  - type: heading
    content: Some Greeks Seek Jesus
  '2':
  - type: text
    content: 'So they gave a dinner for him there. '
  - type: note
    content: Luke 10:38, 40
  - type: text
    content: 'Martha served, and Lazarus was one of those reclining with him at table. '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: '[1 Kgs. 8:41-43; Acts 8:27]'
  - type: text
    content: 'among those who went up to worship at the feast were some '
  - type: note
    content: Acts 17:4; [Mark 7:26]; See ch. 7:35
  - type: text
    content: 'Greeks. '
  '21':
  - type: text
    content: 'So these came to '
  - type: note
    content: ch. 1:44
  - type: text
    content: 'Philip, who was from Bethsaida in Galilee, and asked him, “Sir, we wish to see Jesus.” '
  '22':
  - type: text
    content: 'Philip went and told '
  - type: note
    content: See Mark 13:3
  - type: text
    content: 'Andrew; Andrew and Philip went and told Jesus. '
  '23':
  - type: text
    content: 'And Jesus answered them, '
  - type: note
    content: ch. 17:1; [ver. 27; ch. 13:31, 32; Mark 14:41]; See ch. 2:4
  - type: text
    content: '“The hour has come '
  - type: note
    content: ver. 16
  - type: text
    content: for the Son of Man to be glorified.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: 1 Cor. 15:36
  - type: text
    content: unless a grain of wheat falls into the earth and dies, it remains alone; but if it dies, it bears much fruit.
  - type: text
    content: ' '
  '25':
  - type: note
    content: See Matt. 10:39
  - type: text
    content: 'Whoever loves his life loses it, and '
  - type: note
    content: '[ch. 11:25]'
  - type: text
    content: 'whoever '
  - type: note
    content: See Luke 14:26
  - type: text
    content: hates his life in this world will keep it for eternal life.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'If anyone serves me, he must '
  - type: note
    content: ch. 8:12; 21:18
  - type: text
    content: 'follow me; and '
  - type: note
    content: ch. 14:3; 17:24; [2 Cor. 5:8; 1 Thess. 4:17]
  - type: text
    content: 'where I am, there will my servant be also. '
  - type: note
    content: '[ch. 14:21, 23; 16:27]'
  - type: text
    content: 'If anyone serves me, '
  - type: note
    content: 1 Sam. 2:30; Ps. 91:15
  - type: text
    content: the Father will honor him.
  - type: heading
    content: The Son of Man Must Be Lifted Up
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:33; 13:21; [ Luke 22:44 ]
  - type: text
    content: '“Now is my soul troubled. And what shall I say? ‘Father, '
  - type: note
    content: Mark 14:35; [ Heb. 5:7 ]
  - type: text
    content: 'save me from '
  - type: note
    content: ver. 23
  - type: text
    content: 'this hour’? But '
  - type: note
    content: '[ch. 18:37 ]'
  - type: text
    content: 'for this purpose I have come to '
  - type: note
    content: ver. 23
  - type: text
    content: this hour.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Father, glorify your name.”
  - type: text
    content: ' Then '
  - type: note
    content: Matt. 3:17; 17:5; Mark 1:11; 9:7; Luke 3:22; 9:35; 2 Pet. 1:17
  - type: text
    content: 'a voice came from heaven: “I have glorified it, and I will glorify it again.” '
  '29':
  - type: text
    content: 'The crowd that stood there and heard it said that it had thundered. Others said, '
  - type: note
    content: Acts 23:9
  - type: text
    content: '“An angel has spoken to him.” '
  '3':
  - type: note
    content: '[Luke 7:37, 38]'
  - type: text
    content: Mary therefore took a pound
  - type: note
    content: Greek litra; a litra (or Roman pound) was equal to about 11 1/2 ounces or 327 grams
  - type: text
    content: ' of expensive ointment made from pure nard, and anointed the feet of Jesus and wiped his feet with her hair. The house was filled with the fragrance of the perfume. '
  '30':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: ch. 11:42
  - type: text
    content: “This voice has come for your sake, not mine.
  - type: text
    content: ' '
  '31':
  - type: note
    content: ch. 16:11; [ch. 16:33]
  - type: text
    content: 'Now is the judgment of this world; now will '
  - type: note
    content: ch. 14:30; 2 Cor. 4:4; Eph. 2:2; 6:12; [Matt. 13:19; Luke 4:6; 1 John 4:4; 5:19]
  - type: text
    content: 'the ruler of this world '
  - type: note
    content: '[Luke 10:18; Col. 2:15; 1 John 3:8]'
  - type: text
    content: be cast out.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And I, '
  - type: note
    content: ch. 3:14; 8:28
  - type: text
    content: 'when I am lifted up from the earth, '
  - type: note
    content: See ch. 6:44
  - type: text
    content: 'will draw '
  - type: note
    content: Rom. 5:18; 8:32; 2 Cor. 5:15; 1 Tim. 2:6; Heb. 2:9; 1 John 2:2
  - type: text
    content: all people to myself.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'He said this '
  - type: note
    content: ch. 18:32
  - type: text
    content: 'to show by what kind of death he was going to die. '
  '34':
  - type: text
    content: 'So the crowd answered him, “We have heard from the Law that '
  - type: note
    content: Ps. 89:4; 110:4; Isa. 9:7; Ezek. 37:25; Luke 1:33
  - type: text
    content: 'the Christ remains forever. How can you say that '
  - type: note
    content: ver. 32
  - type: text
    content: 'the Son of Man must be lifted up? Who is this Son of Man?” '
  '35':
  - type: text
    content: 'So Jesus said to them, '
  - type: note
    content: ver. 46; See ch. 1:4, 9; 8:12
  - type: text
    content: '“The light is among you '
  - type: note
    content: See ch. 7:33
  - type: text
    content: 'for a little while longer. '
  - type: note
    content: Jer. 13:16; Eph. 5:8
  - type: text
    content: 'Walk while you have the light, lest darkness '
  - type: note
    content: 1 Thess. 5:4
  - type: text
    content: 'overtake you. '
  - type: note
    content: Isa. 9:2; 1 John 1:6; 2:11; [ch. 11:10]
  - type: text
    content: The one who walks in the darkness does not know where he is going.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'While you have the light, believe in the light, that you may become '
  - type: note
    content: See Luke 10:6
  - type: text
    content: sons of light.”
  - type: heading
    content: The Unbelief of the People
  - type: text
    content: 'When Jesus had said these things, he departed and hid himself from them. '
  '37':
  - type: text
    content: 'Though he had done so many signs before them, they still did not believe in him, '
  '38':
  - type: note
    content: '[Matt. 1:22]'
  - type: text
    content: 'so that the word spoken by the prophet Isaiah might be fulfilled:'
  - type: note
    content: Rom. 10:16; Cited from Isa. 53:1
  - type: text
    content: “Lord, who has believed what he heard from us,
  - type: text
    content: and to whom has the arm of the Lord been revealed?”
  '39':
  - type: text
    content: 'Therefore they '
  - type: note
    content: '[ch. 5:44]'
  - type: text
    content: could not believe. For again Isaiah said,
  '4':
  - type: text
    content: 'But Judas Iscariot, one of his disciples (he who was about to betray him), said, '
  '40':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 6:10 ]; See Matt. 13:14, 15'
  - type: text
    content: “He has blinded their eyes
  - type: text
    content: 'and '
  - type: note
    content: See Mark 6:52
  - type: text
    content: hardened their heart,
  - type: text
    content: lest they see with their eyes,
  - type: text
    content: and understand with their heart, and turn,
  - type: text
    content: and I would heal them.”
  '41':
  - type: text
    content: 'Isaiah said these things because '
  - type: note
    content: Isa. 6:1
  - type: text
    content: 'he saw his glory and '
  - type: note
    content: '[ch. 5:46]'
  - type: text
    content: 'spoke of him. '
  '42':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: ch. 3:1; [ch. 7:48]
  - type: text
    content: 'many even of the authorities believed in him, but '
  - type: note
    content: See ch. 7:13
  - type: text
    content: 'for fear of the Pharisees they did not '
  - type: note
    content: See ch. 9:22
  - type: text
    content: 'confess it, so that they would not be '
  - type: note
    content: See ch. 9:22
  - type: text
    content: 'put out of the synagogue; '
  '43':
  - type: note
    content: ch. 5:44
  - type: text
    content: for they loved the glory that comes from man more than the glory that comes from God.
  - type: heading
    content: Jesus Came to Save the World
  '44':
  - type: text
    content: 'And Jesus cried out and said, '
  - type: note
    content: '[ch. 13:20]; See Matt. 10:40'
  - type: text
    content: '“Whoever believes in me, believes not in me but '
  - type: note
    content: ch. 14:1; [ch. 5:24; 1 Pet. 1:21]
  - type: text
    content: in him who sent me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:9
  - type: text
    content: 'whoever '
  - type: note
    content: ch. 6:40
  - type: text
    content: sees me sees him who sent me.
  - type: text
    content: ' '
  '46':
  - type: note
    content: ver. 35, 36; See ch. 1:4, 5, 9; 8:12
  - type: text
    content: I have come into the world as light, so that whoever believes in me may not remain in darkness.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'If anyone '
  - type: note
    content: '[ch. 3:36]'
  - type: text
    content: 'hears my words and does not keep them, '
  - type: note
    content: ch. 8:15
  - type: text
    content: 'I do not judge him; for '
  - type: note
    content: See ch. 3:17; 4:42
  - type: text
    content: I did not come to judge the world but to save the world.
  - type: text
    content: ' '
  '48':
  - type: note
    content: Luke 10:16
  - type: text
    content: 'The one who rejects me and does not receive my words has a judge; '
  - type: note
    content: Deut. 18:18, 19
  - type: text
    content: 'the word that I have spoken will judge him '
  - type: note
    content: '[Rom. 2:16]'
  - type: text
    content: on the last day.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 5:19, 30
  - type: text
    content: 'I have not spoken on my own authority, but the Father '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'who sent me has himself given me '
  - type: note
    content: ch. 15:10
  - type: text
    content: a commandment—what to say and what to speak.
  - type: text
    content: ' '
  '5':
  - type: text
    content: “Why was this ointment not sold for three hundred denarii
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' and '
  - type: note
    content: ch. 13:29
  - type: text
    content: 'given to the poor?” '
  '50':
  - type: text
    content: And I know that his commandment is eternal life. What I say, therefore, I say as the Father has told me.”
  '6':
  - type: text
    content: 'He said this, not because he cared about the poor, but because he was a thief, and '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'having charge of the moneybag he used to help himself to what was put into it. '
  '7':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Leave her alone, so that she may keep it
  - type: note
    content: Or Leave her alone; she intended to keep it
  - type: text
    content: ' '
  - type: text
    content: for the day of my burial.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the poor you always have with you, but you do not always have me.”
  - type: heading
    content: The Plot to Kill Lazarus
  '9':
  - type: text
    content: When the large crowd of the Jews learned that Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' was there, they came, not only on account of him but also to see Lazarus, '
  - type: note
    content: ch. 11:44
  - type: text
    content: 'whom he had raised from the dead. '
