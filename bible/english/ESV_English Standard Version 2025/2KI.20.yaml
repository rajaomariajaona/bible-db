        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'all his treasure house, the silver, the gold, the spices, the precious oil, his armory, all that was found in his storehouses. There was nothing in his house or in all his realm that Hezekiah did not show them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then Isaiah the prophet came to King Hezekiah, and said to him, “What did these men say? And from where did they come to you?” And Hezekiah said, “They have come from a far country, from Babylon.” '
  '15':
  - type: usfm
