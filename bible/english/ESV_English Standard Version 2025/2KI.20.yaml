document_id: 2KI.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Illness and Recovery
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-11, see Isa. 38:1-22
  - type: text
    content: 'In those days '
  - type: note
    content: 2 Chr. 32:24
  - type: text
    content: 'Hezekiah became sick and was at the point of death. And Isaiah the prophet the son of Amoz came to him and said to him, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[2 Sam. 17:23]'
  - type: text
    content: '‘Set your house in order, for you shall die; you shall not recover.’” '
  '10':
  - type: text
    content: 'And Hezekiah answered, “It is an easy thing for the shadow '
  - type: note
    content: Ps. 102:11
  - type: text
    content: 'to lengthen ten steps. Rather let the shadow go back ten steps.” '
  '11':
  - type: text
    content: 'And Isaiah the prophet called to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Josh. 10:12, 13]'
  - type: text
    content: and he brought the shadow back ten steps, by which it had gone down on the steps of Ahaz.
  - type: heading
    content: Hezekiah and the Babylonian Envoys
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-19, see Isa. 39:1-8
  - type: text
    content: 'At that time '
  - type: note
    content: '[Isa. 39:1]'
  - type: text
    content: 'Merodach-baladan the son of Baladan, king of Babylon, '
  - type: note
    content: '[2 Chr. 32:31]'
  - type: text
    content: 'sent envoys with letters and a present to Hezekiah, for he heard that Hezekiah had been sick. '
  '13':
  - type: text
    content: 'And Hezekiah welcomed them, and he showed them '
  - type: note
    content: '[2 Chr. 32:27]'
  - type: text
    content: 'all his treasure house, the silver, the gold, the spices, the precious oil, his armory, all that was found in his storehouses. There was nothing in his house or in all his realm that Hezekiah did not show them. '
  '14':
  - type: text
    content: 'Then Isaiah the prophet came to King Hezekiah, and said to him, “What did these men say? And from where did they come to you?” And Hezekiah said, “They have come from a far country, from Babylon.” '
  '15':
  - type: text
    content: He said, “What have they seen in your house?” And Hezekiah answered, “They have seen all that is in my house; there is nothing in my storehouses that I did not show them.”
  '16':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '17':
  - type: text
    content: 'Behold, the days are coming, when '
  - type: note
    content: ch. 24:13; Jer. 20:5; [ch. 25:13]; SeeJer. 27:19-22
  - type: text
    content: 'all that is in your house, and that which your fathers have stored up till this day, shall be carried to Babylon. Nothing shall be left, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: note
    content: ch. 24:12; 2 Chr. 33:11
  - type: text
    content: 'And some of your own sons, who will come from you, whom you will father, shall be taken away, '
  - type: note
    content: '[Dan. 1:3]'
  - type: text
    content: 'and they shall be eunuchs in the palace of the king of Babylon.” '
  '19':
  - type: text
    content: 'Then Hezekiah said to Isaiah, '
  - type: note
    content: 1 Sam. 3:18; [2 Chr. 32:25, 26]
  - type: text
    content: '“The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that you have spoken is good.” For he thought, “Why not, if there will be peace and security in my days?”'
  '2':
  - type: text
    content: 'Then Hezekiah turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Chr. 32:32 ]'
  - type: text
    content: 'The rest of the deeds of Hezekiah and all his might and how he made '
  - type: note
    content: ch. 18:17; Neh. 2:14; 3:16
  - type: text
    content: 'the pool and the conduit '
  - type: note
    content: 2 Chr. 32:30; [Isa. 22:9, 11]
  - type: text
    content: 'and brought water into the city, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '21':
  - type: note
    content: 2 Chr. 32:33
  - type: text
    content: And Hezekiah slept with his fathers, and Manasseh his son reigned in his place.
  '3':
  - type: text
    content: '“Now, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Neh. 5:19; 13:14, 22, 31]'
  - type: text
    content: 'please remember how I have walked before you in faithfulness and '
  - type: note
    content: See 1 Kgs. 8:61
  - type: text
    content: 'with a whole heart, '
  - type: note
    content: ch. 18:3
  - type: text
    content: 'and have done what is good in your sight.” '
  - type: note
    content: '[Ps. 39:12, 13]'
  - type: text
    content: 'And Hezekiah wept bitterly. '
  '4':
  - type: text
    content: 'And before Isaiah had gone out of the middle court, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: '
  '5':
  - type: text
    content: '“Turn back, and say to Hezekiah '
  - type: note
    content: 1 Sam. 9:16; 10:1
  - type: text
    content: 'the leader of my people, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of David your father: '
  - type: note
    content: ch. 19:20; [Ps. 65:2]
  - type: text
    content: 'I have heard your prayer; '
  - type: note
    content: Ps. 39:12; 56:8
  - type: text
    content: 'I have seen your tears. Behold, I will heal you. On the third day you shall go up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'and I will add fifteen years to your life. I will deliver you and this city out of the hand of the king of Assyria, '
  - type: note
    content: ch. 19:34
  - type: text
    content: 'and I will defend this city for my own sake and for my servant David’s sake.” '
  '7':
  - type: text
    content: And Isaiah said, “Bring a cake of figs. And let them take and lay it on the boil, that he may recover.”
  '8':
  - type: text
    content: 'And Hezekiah said to Isaiah, “What shall be the sign that the '
  - type: text
    content: Lord
  - type: text
    content: ' will heal me, and that I shall go up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the third day?” '
  '9':
  - type: text
    content: 'And Isaiah said, “This shall be '
  - type: note
    content: See ch. 19:29
  - type: text
    content: 'the sign to you from the '
  - type: text
    content: Lord
  - type: text
    content: ', that the '
  - type: text
    content: Lord
  - type: text
    content: ' will do the thing that he has promised: shall the shadow go forward ten steps, or go back ten steps?” '
