document_id: EZK.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Shedding of Blood
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'In you '
  - type: note
    content: Lev. 18:7, 8; 20:11
  - type: text
    content: 'men uncover their fathers’ nakedness; in you they violate women who are unclean in their menstrual impurity. '
  '11':
  - type: note
    content: Lev. 18:20; Jer. 5:8; [ch. 18:6]
  - type: text
    content: 'One commits abomination with his neighbor’s wife; '
  - type: note
    content: Lev. 18:15; 20:12; [Amos 2:7]
  - type: text
    content: 'another lewdly defiles his daughter-in-law; '
  - type: note
    content: Lev. 18:9; 20:17
  - type: text
    content: 'another in you violates his sister, his father’s daughter. '
  '12':
  - type: text
    content: 'In you '
  - type: note
    content: Deut. 27:25
  - type: text
    content: 'they take bribes to shed blood; '
  - type: note
    content: See ch. 18:8
  - type: text
    content: you take interest and profit
  - type: note
    content: That is, profit that comes from charging interest to the poor (compare Leviticus 25:36)
  - type: text
    content: ' and make gain of your neighbors by extortion; but '
  - type: note
    content: ch. 23:35; See Jer. 2:32
  - type: text
    content: 'me you have forgotten, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '13':
  - type: text
    content: '“Behold, '
  - type: note
    content: ch. 21:14, 17
  - type: text
    content: 'I strike my hand at '
  - type: note
    content: ver. 27
  - type: text
    content: 'the dishonest gain that you have made, and at '
  - type: note
    content: See ver. 2
  - type: text
    content: 'the blood that has been in your midst. '
  '14':
  - type: note
    content: '[ch. 21:7]'
  - type: text
    content: 'Can your courage endure, or can your hands be strong, in the days that I shall deal with you? '
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, and I will do it. '
  '15':
  - type: note
    content: See ch. 5:10
  - type: text
    content: 'I will scatter you among the nations and disperse you through the countries, and '
  - type: note
    content: ch. 24:11; [ver. 21, 22]
  - type: text
    content: 'I will consume your uncleanness out of you. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 26; ch. 7:24]'
  - type: text
    content: 'you shall be profaned by your own doing '
  - type: note
    content: ch. 5:8
  - type: text
    content: 'in the sight of the nations, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '17':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, the house of Israel has become '
  - type: note
    content: Ps. 119:119; Isa. 1:22, 25
  - type: text
    content: 'dross to me; all of them are '
  - type: note
    content: Jer. 6:28
  - type: text
    content: 'bronze and tin and iron and lead in the furnace; they are '
  - type: note
    content: Isa. 1:25
  - type: text
    content: 'dross of silver. '
  '19':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Because you have all become dross, therefore, behold, I will gather you into the midst of Jerusalem. '
  '2':
  - type: text
    content: '“And you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, '
  - type: note
    content: See ch. 20:4
  - type: text
    content: 'will you judge, will you judge '
  - type: note
    content: '[ch. 16:38; 23:37; 24:6; 2 Kgs. 21:16]; See ch. 7:23'
  - type: text
    content: 'the bloody city? '
  - type: note
    content: ch. 16:2; 20:4
  - type: text
    content: 'Then declare to her all her abominations. '
  '20':
  - type: text
    content: 'As one gathers silver and bronze and iron and lead and tin into a furnace, '
  - type: note
    content: ch. 21:31; [Mal. 3:3]
  - type: text
    content: 'to blow the fire on it in order to melt it, so I will gather you '
  - type: note
    content: Jer. 33:5
  - type: text
    content: 'in my anger and in my wrath, and I will put you in and melt you. '
  '21':
  - type: text
    content: 'I will gather you and blow on you with the fire of my wrath, and you shall be melted in the midst of it. '
  '22':
  - type: text
    content: 'As silver is melted in a furnace, so you shall be melted in the midst of it, and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: See ch. 7:8
  - type: text
    content: I have poured out my wrath upon you.”
  '23':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '24':
  - type: text
    content: '“Son of man, say to her, You are a land that is '
  - type: note
    content: See ver. 2-4
  - type: text
    content: 'not cleansed '
  - type: note
    content: '[ch. 34:26]; See 1 Kgs. 8:35, 36'
  - type: text
    content: 'or rained upon in the day of indignation. '
  '25':
  - type: note
    content: See Jer. 11:9
  - type: text
    content: 'The conspiracy of her prophets in her midst is '
  - type: note
    content: See ch. 19:3
  - type: text
    content: 'like a roaring lion '
  - type: note
    content: ver. 27
  - type: text
    content: 'tearing the prey; they have devoured human lives; they have taken treasure and precious things; they have made many widows in her midst. '
  '26':
  - type: note
    content: '[Mal. 2:8]'
  - type: text
    content: 'Her priests '
  - type: note
    content: Zeph. 3:4
  - type: text
    content: 'have done violence to my law and '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'have profaned my holy things. '
  - type: note
    content: See Lev. 10:10
  - type: text
    content: 'They have made no distinction between the holy and the common, neither have they taught the difference between the unclean and the clean, and '
  - type: note
    content: '[Jer. 17:22, 24, 27]'
  - type: text
    content: 'they have disregarded my Sabbaths, '
  - type: note
    content: See ch. 36:20
  - type: text
    content: 'so that I am profaned among them. '
  '27':
  - type: note
    content: ver. 6; Mic. 3:1, 2; Zeph. 3:3; [Matt. 7:15]
  - type: text
    content: 'Her princes in her midst are like wolves '
  - type: note
    content: ver. 25
  - type: text
    content: 'tearing the prey, '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'shedding blood, destroying lives to get dishonest gain. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'her prophets have smeared whitewash for them, '
  - type: note
    content: See ch. 13:6
  - type: text
    content: 'seeing false visions and divining lies for them, saying, ‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ',’ when the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken. '
  '29':
  - type: text
    content: 'The people of the land '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'have practiced extortion and committed robbery. They have oppressed the poor and needy, and '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'have extorted from the sojourner without justice. '
  '3':
  - type: text
    content: 'You shall say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': A city that sheds blood in her midst, so that '
  - type: note
    content: ch. 21:25, 29
  - type: text
    content: 'her time may come, and that makes idols to defile herself! '
  '30':
  - type: note
    content: Isa. 59:16; Jer. 5:1
  - type: text
    content: 'And I sought for a man among them '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'who should build up the wall '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'and stand in the breach before me for the land, that I should not destroy it, but I found none. '
  '31':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'I have poured out my indignation upon them. I have consumed them with the fire of my wrath. I have returned '
  - type: note
    content: See ch. 7:4
  - type: text
    content: 'their way upon their heads, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '4':
  - type: text
    content: 'You have become guilty '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'by the blood that you have shed, and defiled by the idols that you have made, and you have brought '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: your days near, the appointed time of
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Syriac, Vulgate, Targum; most Hebrew manuscripts until
  - type: text
    content: ' your years has come. '
  - type: note
    content: See ch. 5:14
  - type: text
    content: 'Therefore I have made you a reproach to the nations, and a mockery to all the countries. '
  '5':
  - type: text
    content: 'Those who are near and those who are far from you will mock you; '
  - type: note
    content: '[Isa. 1:21]'
  - type: text
    content: 'your name is defiled; '
  - type: note
    content: Isa. 22:2
  - type: text
    content: you are full of tumult.
  '6':
  - type: text
    content: '“Behold, '
  - type: note
    content: ver. 27
  - type: text
    content: 'the princes of Israel in you, every one according to his power, have been bent on shedding blood. '
  '7':
  - type: text
    content: 'Father and mother '
  - type: note
    content: Deut. 27:16; [Eph. 6:2]; See Ex. 20:12
  - type: text
    content: 'are treated with contempt in you; the sojourner '
  - type: note
    content: Ex. 22:21, 22
  - type: text
    content: 'suffers extortion in your midst; the fatherless and the widow '
  - type: note
    content: Ex. 22:21, 22
  - type: text
    content: 'are wronged in you. '
  '8':
  - type: note
    content: '[ver. 26]'
  - type: text
    content: 'You have despised my holy things and '
  - type: note
    content: See ch. 20:13
  - type: text
    content: 'profaned my Sabbaths. '
  '9':
  - type: note
    content: Lev. 19:16; [1 Sam. 22:9-19]
  - type: text
    content: 'There are men in you who slander to shed blood, and people in you '
  - type: note
    content: See ch. 18:6
  - type: text
    content: 'who eat on the mountains; '
  - type: note
    content: ch. 16:43
  - type: text
    content: 'they commit lewdness in your midst. '
