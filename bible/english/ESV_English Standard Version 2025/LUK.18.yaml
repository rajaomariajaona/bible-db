document_id: LUK.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Persistent Widow
  - type: text
    content: 'And he told them a parable to the effect that they ought '
  - type: note
    content: ch. 21:36; Rom. 12:12; Eph. 6:18; Col. 4:2; 1 Thess. 5:17; [ch. 11:5-9]
  - type: text
    content: 'always to pray and not '
  - type: note
    content: 2 Cor. 4:1, 16; 2 Thess. 3:13 (Gk.)
  - type: text
    content: 'lose heart. '
  '10':
  - type: text
    content: '“Two men '
  - type: note
    content: 2 Kgs. 20:5, 8; Acts 3:1; [ver. 14]
  - type: text
    content: went up into the temple to pray, one a Pharisee and the other a tax collector.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The Pharisee, '
  - type: note
    content: Matt. 6:5; Mark 11:25
  - type: text
    content: standing by himself, prayed
  - type: note
    content: Or standing, prayed to himself
  - type: text
    content: ' '
  - type: note
    content: '[Rev. 3:17]'
  - type: text
    content: 'thus: ‘God, I thank you that I am not like other men, extortioners, unjust, adulterers, or even like this tax collector.'
  - type: text
    content: ' '
  '12':
  - type: note
    content: Matt. 9:14
  - type: text
    content: 'I fast twice a week; '
  - type: note
    content: ch. 11:42
  - type: text
    content: I give tithes of all that I get.’
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But the tax collector, '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'standing far off, '
  - type: note
    content: Ezra 9:6
  - type: text
    content: 'would not even lift up his eyes to heaven, but '
  - type: note
    content: ch. 23:48
  - type: text
    content: 'beat his breast, saying, ‘God, '
  - type: note
    content: Ps. 79:9; Ezek. 16:63; Dan. 9:19
  - type: text
    content: be merciful to me, a sinner!’
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I tell you, this man went down to his house justified, rather than the other. For '
  - type: note
    content: See ch. 14:11
  - type: text
    content: everyone who exalts himself will be humbled, but the one who humbles himself will be exalted.”
  - type: heading
    content: Let the Children Come to Me
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-17, see Matt. 19:13-15; Mark 10:13-16
  - type: text
    content: 'Now they were bringing even infants to him that he might touch them. And when the disciples saw it, they '
  - type: note
    content: ver. 39
  - type: text
    content: 'rebuked them. '
  '16':
  - type: text
    content: 'But Jesus called them to him, saying, '
  - type: note
    content: Matt. 18:3
  - type: text
    content: '“Let the children come to me, and '
  - type: note
    content: '[Mark 9:39]'
  - type: text
    content: 'do not hinder them, '
  - type: note
    content: Matt. 18:3
  - type: text
    content: for to such belongs the kingdom of God.
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[John 3:3, 5]'
  - type: text
    content: 'Truly, I say to you, whoever does not '
  - type: note
    content: '[ch. 8:13; James 1:21]'
  - type: text
    content: receive the kingdom of God like a child shall not enter it.”
  - type: heading
    content: The Rich Ruler
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-30, see Matt. 19:16-29; Mark 10:17-30; [ch. 10:25-28 ]
  - type: text
    content: 'And a ruler asked him, “Good Teacher, what must I do to '
  - type: note
    content: '[Matt. 19:16]; See Matt. 25:34'
  - type: text
    content: 'inherit eternal life?” '
  '19':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: “Why do you call me good? No one is good except God alone.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He said, '
  - type: text
    content: '“In a certain city there was a judge who '
  - type: note
    content: '[2 Cor. 8:21]'
  - type: text
    content: neither feared God nor respected man.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'You know the commandments: '
  - type: note
    content: Rom. 13:9; Cited from Ex. 20:12-16; Deut. 5:16-20; [Matt. 5:21, 27]
  - type: text
    content: ‘Do not commit adultery, Do not murder, Do not steal, Do not bear false witness, Honor your father and mother.’”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And he said, '
  - type: note
    content: '[Phil. 3:6]'
  - type: text
    content: '“All these I have kept from my youth.” '
  '22':
  - type: text
    content: 'When Jesus heard this, he said to him, '
  - type: text
    content: '“One thing you still lack. '
  - type: note
    content: ch. 12:33; [ch. 16:9; 19:8; Acts 2:45; 4:34, 35; 1 Tim. 6:18, 19]
  - type: text
    content: 'Sell all that you have and distribute to the poor, and you will have '
  - type: note
    content: Matt. 6:19, 20
  - type: text
    content: treasure in heaven; and come, follow me.”
  - type: text
    content: ' '
  '23':
  - type: note
    content: '[Ezek. 33:31]'
  - type: text
    content: 'But when he heard these things, he became very sad, for he was extremely rich. '
  '24':
  - type: text
    content: 'Jesus, seeing that he had become sad, said, '
  - type: note
    content: '[1 Cor. 1:26]; See Matt. 13:22'
  - type: text
    content: '“How difficult it is for those who have wealth to enter '
  - type: note
    content: See Matt. 12:28
  - type: text
    content: the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For it is easier for a camel to go through the eye of a needle than for a rich person to enter '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: the kingdom of God.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Those who heard it said, “Then who can be saved?” '
  '27':
  - type: text
    content: 'But he said, '
  - type: note
    content: ch. 1:37; Gen. 18:14; Job 42:2; Jer. 32:17, 27
  - type: text
    content: “What is impossible with man is possible with God.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And Peter said, “See, '
  - type: note
    content: Matt. 4:20, 22; Mark 1:18, 20
  - type: text
    content: 'we have left our homes and followed you.” '
  '29':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: '[ch. 14:26]'
  - type: text
    content: there is no one who has left house or wife or brothers
  - type: note
    content: Or wife or brothers and sisters
  - type: text
    content: ' '
  - type: text
    content: or parents or children, for the sake of the kingdom of God,
  - type: text
    content: ' '
  '3':
  - type: text
    content: And there was a widow in that city who kept coming to him and saying, ‘Give me justice against my adversary.’
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'who will not receive '
  - type: note
    content: '[Job 42:10]'
  - type: text
    content: 'many times more '
  - type: note
    content: '[Matt. 6:33]'
  - type: text
    content: 'in this time, and in '
  - type: note
    content: Matt. 12:32; Eph. 1:21; [ch. 20:35]
  - type: text
    content: the age to come eternal life.”
  - type: heading
    content: Jesus Foretells His Death a Third Time
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-33, see Matt. 20:17-19; Mark 10:32-34
  - type: text
    content: 'And taking the twelve, he said to them, '
  - type: text
    content: '“See, '
  - type: note
    content: See ch. 9:51
  - type: text
    content: 'we are going up to Jerusalem, and '
  - type: note
    content: Ps. 22; See Matt. 1:22; 26:24
  - type: text
    content: everything that is written about the Son of Man by the prophets will be accomplished.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For he will be '
  - type: note
    content: Matt. 27:2; John 18:30, 31; Acts 3:13; [Acts 2:23; 4:27; 21:11]
  - type: text
    content: 'delivered over to the Gentiles and will be '
  - type: note
    content: Matt. 27:26-31
  - type: text
    content: 'mocked and shamefully treated and '
  - type: note
    content: Mark 14:65; 15:19; See Matt. 26:67
  - type: text
    content: spit upon.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'And after flogging him, they will kill him, and on '
  - type: note
    content: See ch. 9:22
  - type: text
    content: the third day he will rise.”
  - type: text
    content: ' '
  '34':
  - type: note
    content: See Mark 9:32
  - type: text
    content: 'But they understood none of these things. '
  - type: note
    content: ch. 9:45; [ch. 24:16]
  - type: text
    content: This saying was hidden from them, and they did not grasp what was said.
  - type: heading
    content: Jesus Heals a Blind Beggar
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-43, see Matt. 20:29-34; Mark 10:46-52
  - type: text
    content: 'As he drew near to Jericho, '
  - type: note
    content: John 9:1, 8
  - type: text
    content: 'a blind man was sitting by the roadside begging. '
  '36':
  - type: text
    content: 'And hearing a crowd going by, he inquired what this meant. '
  '37':
  - type: text
    content: 'They told him, '
  - type: note
    content: Matt. 2:23
  - type: text
    content: '“Jesus of Nazareth is passing by.” '
  '38':
  - type: text
    content: 'And he cried out, “Jesus, '
  - type: note
    content: See Matt. 1:1; 9:27
  - type: text
    content: 'Son of David, have mercy on me!” '
  '39':
  - type: text
    content: 'And those who were in front '
  - type: note
    content: ver. 15
  - type: text
    content: 'rebuked him, telling him to be silent. But he cried out all the more, “Son of David, have mercy on me!” '
  '4':
  - type: text
    content: 'For a while he refused, but afterward he said to himself, '
  - type: note
    content: '[ch. 11:8]'
  - type: text
    content: ‘Though I neither fear God nor respect man,
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And Jesus stopped and commanded him to be brought to him. And when he came near, he asked him, '
  '41':
  - type: note
    content: Mark 10:36
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' He said, “Lord, let me recover my sight.” '
  '42':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Recover your sight; '
  - type: note
    content: ch. 7:50; 8:48; 17:19; Matt. 9:22; Mark 5:34
  - type: text
    content: 'your faith has '
  - type: note
    content: ch. 7:3; 8:36, 50
  - type: text
    content: made you well.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And immediately he recovered his sight and followed him, '
  - type: note
    content: See ch. 7:16; 13:13
  - type: text
    content: 'glorifying God. And '
  - type: note
    content: '[ch. 19:37]'
  - type: text
    content: all the people, when they saw it, gave praise to God.
  '5':
  - type: text
    content: yet because this widow keeps bothering me, I will give her justice, so that she will not beat me down by her continual coming.’”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: “Hear what the unrighteous judge says.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 6:10; [Isa. 63:4]
  - type: text
    content: 'will not God give justice to '
  - type: note
    content: Rom. 8:33; Col. 3:12; Titus 1:1; See Mark 13:20
  - type: text
    content: 'his elect, '
  - type: note
    content: Ps. 88:1
  - type: text
    content: 'who cry to him day and night? '
  - type: note
    content: James 5:7 (Gk.)
  - type: note
    content: 2 Pet. 3:9
  - type: text
    content: Will he delay long over them?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'I tell you, he will give justice to them '
  - type: note
    content: Heb. 10:37
  - type: text
    content: 'speedily. Nevertheless, when the Son of Man comes, '
  - type: note
    content: ch. 17:26-30; [Matt. 24:12]
  - type: text
    content: will he find faith on earth?”
  - type: heading
    content: The Pharisee and the Tax Collector
  '9':
  - type: text
    content: 'He also told this parable to some '
  - type: note
    content: ch. 16:15; [Matt. 5:20]
  - type: text
    content: 'who trusted '
  - type: note
    content: 2 Cor. 1:9
  - type: text
    content: 'in themselves that they were righteous, '
  - type: note
    content: Prov. 30:12; Isa. 65:5; John 7:48, 49
  - type: text
    content: 'and treated others with contempt: '
