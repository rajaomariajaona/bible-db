document_id: EST.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Jews Destroy Their Enemies
  - type: text
    content: ' '
  - type: note
    content: ch. 8:12
  - type: text
    content: 'Now in the twelfth month, which is the month of Adar, '
  - type: note
    content: ver. 17
  - type: text
    content: 'on the thirteenth day of the same, '
  - type: note
    content: ch. 3:13
  - type: text
    content: 'when the king’s command and edict were about to be carried out, '
  - type: note
    content: '[See ch. 8:12 above]'
  - type: text
    content: 'on the very day when the enemies of the Jews hoped to gain the mastery over them, the reverse occurred: the Jews gained mastery over those who hated them. '
  '10':
  - type: note
    content: ver. 13, 14; [ch. 5:11]
  - type: text
    content: 'the ten sons of Haman the son of Hammedatha, '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'the enemy of the Jews, '
  - type: note
    content: '[ch. 8:11]'
  - type: text
    content: but they laid no hand on the plunder.
  '11':
  - type: text
    content: 'That very day the number of those killed in Susa the citadel was reported to the king. '
  '12':
  - type: text
    content: 'And the king said to Queen Esther, “In Susa the citadel the Jews have killed and destroyed 500 men and also the ten sons of Haman. What then have they done in the rest of the king’s provinces! '
  - type: note
    content: ch. 5:6; 7:2
  - type: text
    content: 'Now what is your wish? It shall be granted you. And what further is your request? It shall be fulfilled.” '
  '13':
  - type: text
    content: 'And Esther said, “If it please the king, let the Jews who are in Susa be allowed '
  - type: note
    content: ver. 15; ch. 8:11
  - type: text
    content: tomorrow also to do according to this day’s edict. And let the ten sons of Haman be hanged on the gallows.”
  - type: note
    content: Or wooden beam; also verse 25 (see note on 2:23)
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'So the king commanded this to be done. A decree was issued in Susa, and the ten sons of Haman were hanged. '
  '15':
  - type: text
    content: The Jews who were in Susa gathered also on the fourteenth day of the month of Adar and they killed 300 men in Susa, but they laid no hands on the plunder.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ver. 2
  - type: text
    content: 'Now the rest of the Jews who were in the king’s provinces also '
  - type: note
    content: ver. 2; [ch. 8:11]
  - type: text
    content: 'gathered to defend their lives, and got relief from their enemies and killed 75,000 of those who hated them, but they laid no hands on the plunder. '
  '17':
  - type: text
    content: 'This was '
  - type: note
    content: ver. 1
  - type: text
    content: 'on the thirteenth day of the month of Adar, and on the fourteenth day they rested and made that a day of feasting and gladness. '
  '18':
  - type: text
    content: 'But the Jews who were in Susa gathered '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'on the thirteenth day and on the fourteenth, and rested '
  - type: note
    content: ver. 21
  - type: text
    content: 'on the fifteenth day, making that a day of feasting and gladness. '
  '19':
  - type: text
    content: 'Therefore the Jews of the villages, who live in '
  - type: note
    content: Deut. 3:5; Ezek. 38:11; Zech. 2:4
  - type: text
    content: 'the rural towns, hold the fourteenth day of the month of Adar as a day for gladness and feasting, as '
  - type: note
    content: ch. 8:17
  - type: text
    content: 'a holiday, and '
  - type: note
    content: Neh. 8:10, 12
  - type: text
    content: as a day on which they send gifts of food to one another.
  - type: heading
    content: The Feast of Purim Inaugurated
  '2':
  - type: note
    content: ver. 15, 16, 18; ch. 8:11
  - type: text
    content: 'The Jews gathered in their cities throughout all the provinces of King Ahasuerus to lay hands on those who sought their harm. And no one could stand against them, '
  - type: note
    content: ch. 8:17
  - type: text
    content: 'for the fear of them had fallen on all peoples. '
  '20':
  - type: text
    content: 'And Mordecai recorded these things and sent letters to all the Jews who were in all the provinces of King Ahasuerus, both near and far, '
  '21':
  - type: text
    content: 'obliging them to keep the fourteenth day of the month Adar and also the fifteenth day of the same, year by year, '
  '22':
  - type: text
    content: 'as the days on which the Jews got relief from their enemies, and as the month that had been turned for them from sorrow into gladness and from mourning into '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: a holiday; that they should make them days of feasting and gladness, days for sending gifts of food to one another and gifts to the poor.
  '23':
  - type: text
    content: 'So the Jews accepted what they had started to do, and what Mordecai had written to them. '
  '24':
  - type: text
    content: 'For Haman the Agagite, the son of Hammedatha, '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'the enemy of all the Jews, '
  - type: note
    content: ch. 3:6
  - type: text
    content: 'had plotted against the Jews to destroy them, and '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'had cast Pur (that is, cast lots), to crush and to destroy them. '
  '25':
  - type: text
    content: 'But when it came before the king, he gave orders in writing '
  - type: note
    content: ch. 7:9, 10; 8:3, 7
  - type: text
    content: 'that his evil plan that he had devised against the Jews '
  - type: note
    content: '[Ps. 7:16]'
  - type: text
    content: 'should return on his own head, and that he and his sons should be hanged on the gallows. '
  '26':
  - type: text
    content: 'Therefore they called these days Purim, after the term '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'Pur. Therefore, because of all that was written in '
  - type: note
    content: ver. 20
  - type: text
    content: 'this letter, and of what they had faced in this matter, and of what had happened to them, '
  '27':
  - type: text
    content: 'the Jews firmly obligated themselves and their offspring and '
  - type: note
    content: '[Isa. 56:3, 6; Zech. 2:11]'
  - type: text
    content: 'all who joined them, that without fail they would keep '
  - type: note
    content: ver. 21
  - type: text
    content: 'these two days according to what was written and at the time appointed every year, '
  '28':
  - type: text
    content: that these days should be remembered and kept throughout every generation, in every clan, province, and city, and that these days of Purim should never fall into disuse among the Jews, nor should the commemoration of these days cease among their descendants.
  '29':
  - type: text
    content: 'Then Queen Esther, '
  - type: note
    content: ch. 2:15
  - type: text
    content: 'the daughter of Abihail, and Mordecai the Jew gave full written authority, confirming '
  - type: note
    content: ver. 20; ch. 8:10
  - type: text
    content: 'this second letter about Purim. '
  '3':
  - type: text
    content: 'All the officials of the provinces and '
  - type: note
    content: See Ezra 8:36
  - type: text
    content: 'the satraps and the governors and the royal agents also helped the Jews, for the fear of Mordecai had fallen on them. '
  '30':
  - type: text
    content: 'Letters were sent to all the Jews, '
  - type: note
    content: ch. 1:1; 8:9
  - type: text
    content: 'to the 127 provinces of the kingdom of Ahasuerus, in words of peace and truth, '
  '31':
  - type: text
    content: 'that these days of Purim should be observed at their appointed seasons, as Mordecai the Jew and Queen Esther obligated them, and as they had obligated themselves and their offspring, with regard to '
  - type: note
    content: ch. 4:3
  - type: text
    content: 'their fasts and their lamenting. '
  '32':
  - type: text
    content: 'The command of Esther confirmed these practices of '
  - type: note
    content: ver. 26
  - type: text
    content: Purim, and it was recorded in writing.
  '4':
  - type: text
    content: 'For Mordecai was great in the king’s house, and his fame spread throughout all the provinces, for the man Mordecai grew '
  - type: note
    content: '[2 Sam. 3:1]; 1 Chr. 11:9'
  - type: text
    content: 'more and more powerful. '
  '5':
  - type: text
    content: 'The Jews struck all their enemies with the sword, killing and destroying them, and did as they pleased to those who hated them. '
  '6':
  - type: text
    content: 'In Susa the citadel itself the Jews killed and destroyed 500 men, '
  '7':
  - type: text
    content: 'and also killed Parshandatha and Dalphon and Aspatha '
  '8':
  - type: text
    content: 'and Poratha and Adalia and Aridatha '
  '9':
  - type: text
    content: 'and Parmashta and Arisai and Aridai and Vaizatha, '
