    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:11
      metadata:
        usfm: EST.8.11
    marker-yv: yv-n
  - type: text
    text: tomorrow also to do according to this day’s edict. And let the ten sons of Haman be hanged on the gallows.”
  - type: usfm
