      children:
      - type: text
        text: 7:2
      metadata:
        usfm: EST.7.2
    marker-yv: yv-n
  - type: text
    text: 'Now what is your wish? It shall be granted you. And what further is your request? It shall be fulfilled.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Esther said, “If it please the king, let the Jews who are in Susa be allowed '
  - type: usfm
    marker: x
    children:
