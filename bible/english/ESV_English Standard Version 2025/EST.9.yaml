document_id: EST.9,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Jews Destroy Their Enemies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:12
      marker-yv: yv-n
    - type: text
      text: 'Now in the twelfth month, which is the month of Adar, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: 'on the thirteenth day of the same, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:13
      marker-yv: yv-n
    - type: text
      text: 'when the king’s command and edict were about to be carried out, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:12
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'on the very day when the enemies of the Jews hoped to gain the mastery over them, the reverse occurred: the Jews gained mastery over those who hated them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13, 14
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the ten sons of Haman the son of Hammedatha, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:10
      marker-yv: yv-n
    - type: text
      text: 'the enemy of the Jews, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: but they laid no hand on the plunder.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That very day the number of those killed in Susa the citadel was reported to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said to Queen Esther, “In Susa the citadel the Jews have killed and destroyed 500 men and also the ten sons of Haman. What then have they done in the rest of the king’s provinces! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:2
      marker-yv: yv-n
    - type: text
      text: 'Now what is your wish? It shall be granted you. And what further is your request? It shall be fulfilled.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Esther said, “If it please the king, let the Jews who are in Susa be allowed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      marker-yv: yv-n
    - type: text
      text: tomorrow also to do according to this day’s edict. And let the ten sons of Haman be hanged on the gallows.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wooden beam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 25 (see note on 2:23)
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king commanded this to be done. A decree was issued in Susa, and the ten sons of Haman were hanged. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jews who were in Susa gathered also on the fourteenth day of the month of Adar and they killed 300 men in Susa, but they laid no hands on the plunder.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'Now the rest of the Jews who were in the king’s provinces also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'gathered to defend their lives, and got relief from their enemies and killed 75,000 of those who hated them, but they laid no hands on the plunder. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: 'on the thirteenth day of the month of Adar, and on the fourteenth day they rested and made that a day of feasting and gladness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jews who were in Susa gathered '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'on the thirteenth day and on the fourteenth, and rested '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'on the fifteenth day, making that a day of feasting and gladness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Jews of the villages, who live in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 38:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 2:4
      marker-yv: yv-n
    - type: text
      text: 'the rural towns, hold the fourteenth day of the month of Adar as a day for gladness and feasting, as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      marker-yv: yv-n
    - type: text
      text: 'a holiday, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 8:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: as a day on which they send gifts of food to one another.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Feast of Purim Inaugurated
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15, 16, 18
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      marker-yv: yv-n
    - type: text
      text: 'The Jews gathered in their cities throughout all the provinces of King Ahasuerus to lay hands on those who sought their harm. And no one could stand against them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:17
      marker-yv: yv-n
    - type: text
      text: 'for the fear of them had fallen on all peoples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mordecai recorded these things and sent letters to all the Jews who were in all the provinces of King Ahasuerus, both near and far, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'obliging them to keep the fourteenth day of the month Adar and also the fifteenth day of the same, year by year, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as the days on which the Jews got relief from their enemies, and as the month that had been turned for them from sorrow into gladness and from mourning into '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: a holiday; that they should make them days of feasting and gladness, days for sending gifts of food to one another and gifts to the poor.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Jews accepted what they had started to do, and what Mordecai had written to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Haman the Agagite, the son of Hammedatha, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:10
      marker-yv: yv-n
    - type: text
      text: 'the enemy of all the Jews, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:6
      marker-yv: yv-n
    - type: text
      text: 'had plotted against the Jews to destroy them, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:7
      marker-yv: yv-n
    - type: text
      text: 'had cast Pur (that is, cast lots), to crush and to destroy them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when it came before the king, he gave orders in writing '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'that his evil plan that he had devised against the Jews '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 7:16
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'should return on his own head, and that he and his sons should be hanged on the gallows. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they called these days Purim, after the term '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Pur. Therefore, because of all that was written in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      marker-yv: yv-n
    - type: text
      text: 'this letter, and of what they had faced in this matter, and of what had happened to them, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Jews firmly obligated themselves and their offspring and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 56:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 2:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'all who joined them, that without fail they would keep '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'these two days according to what was written and at the time appointed every year, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that these days should be remembered and kept throughout every generation, in every clan, province, and city, and that these days of Purim should never fall into disuse among the Jews, nor should the commemoration of these days cease among their descendants.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Queen Esther, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:15
      marker-yv: yv-n
    - type: text
      text: 'the daughter of Abihail, and Mordecai the Jew gave full written authority, confirming '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:10
      marker-yv: yv-n
    - type: text
      text: 'this second letter about Purim. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the officials of the provinces and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 8:36
      marker-yv: yv-n
    - type: text
      text: 'the satraps and the governors and the royal agents also helped the Jews, for the fear of Mordecai had fallen on them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Letters were sent to all the Jews, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:9
      marker-yv: yv-n
    - type: text
      text: 'to the 127 provinces of the kingdom of Ahasuerus, in words of peace and truth, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that these days of Purim should be observed at their appointed seasons, as Mordecai the Jew and Queen Esther obligated them, and as they had obligated themselves and their offspring, with regard to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:3
      marker-yv: yv-n
    - type: text
      text: 'their fasts and their lamenting. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The command of Esther confirmed these practices of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      marker-yv: yv-n
    - type: text
      text: Purim, and it was recorded in writing.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Mordecai was great in the king’s house, and his fame spread throughout all the provinces, for the man Mordecai grew '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 3:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; 1 Chr. 11:9'
      marker-yv: yv-n
    - type: text
      text: 'more and more powerful. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews struck all their enemies with the sword, killing and destroying them, and did as they pleased to those who hated them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Susa the citadel itself the Jews killed and destroyed 500 men, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also killed Parshandatha and Dalphon and Aspatha '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Poratha and Adalia and Aridatha '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Parmashta and Arisai and Aridai and Vaizatha, '
