      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:19
      marker-yv: yv-n
    - type: text
      text: 'And the people of Israel again did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' strengthened Eglon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 12:9
      marker-yv: yv-n
    - type: text
      text: 'the king of Moab against Israel, because they had done what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gathered to himself the Ammonites and the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 83:7
      marker-yv: yv-n
    - type: text
      text: 'Amalekites, and went and defeated Israel. And they took possession of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 34:3
      marker-yv: yv-n
    - type: text
      text: 'the city of palms. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the people of Israel served Eglon the king of Moab eighteen years.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' raised up for them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'a deliverer, Ehud, the son of Gera, the Benjaminite, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:16
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 12:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a left-handed man. The people of Israel sent tribute by him to Eglon the king of Moab. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Ehud made for himself a sword with two edges, a cubit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' in length, and he bound it on his right thigh under his clothes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he presented the tribute to Eglon king of Moab. Now Eglon was a very fat man. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Ehud had finished presenting the tribute, he sent away the people who carried the tribute. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he himself turned back '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 4:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'at the idols near Gilgal and said, “I have a secret message for you, O king.” And he commanded, “Silence.” And all his attendants went out from his presence. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was only in order that the generations of the people of Israel might know war, to teach war to those who had not known it before. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ehud came to him as he was sitting alone in his '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 3:15
      marker-yv: yv-n
    - type: text
      text: 'cool roof chamber. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 20:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'And Ehud said, “I have a message from God for you.” And he arose from his seat. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ehud reached with his left hand, took the sword from his right thigh, and thrust it into his belly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the hilt also went in after the blade, and the fat closed over the blade, for he did not pull the sword out of his belly; and the dung came out. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ehud went out into the porch
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew word is uncertain
      marker-yv: yv-n
    - type: text
      text: ' and closed the doors of the roof chamber behind him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 13:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: and locked them.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had gone, the servants came, and when they saw that the doors of the roof chamber were locked, they thought, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 24:3
      marker-yv: yv-n
    - type: text
      text: '“Surely he is relieving himself in the closet of the cool chamber.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they waited till they were embarrassed. But when he still did not open the doors of the roof chamber, they took the key and opened them, and there lay their lord dead on the floor.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud escaped while they delayed, and he passed beyond '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'the idols and escaped to Seirah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he arrived, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 13:3
      marker-yv: yv-n
    - type: text
      text: 'he sounded the trumpet in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:33
      marker-yv: yv-n
    - type: text
      text: 'the hill country of Ephraim. Then the people of Israel went down with him from the hill country, and he was their leader. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, “Follow after me, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 17:47
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 16:8
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given your enemies the Moabites into your hand.” So they went down after him and seized '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 2:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the fords of the Jordan against the Moabites and did not allow anyone to pass over. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they killed at that time about 10,000 of the Moabites, all strong, able-bodied men; not a man escaped. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the nations: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:2-6
      marker-yv: yv-n
    - type: text
      text: 'the five lords of the Philistines and all the Canaanites and the Sidonians and the Hivites who lived on Mount Lebanon, from Mount Baal-hermon as far as Lebo-hamath. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moab was subdued that day under the hand of Israel. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: And the land had rest for eighty years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shamgar
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      marker-yv: yv-n
    - type: text
      text: 'Shamgar the son of Anath, who killed 600 of the Philistines '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 13:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'with an oxgoad, and he also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:16
      marker-yv: yv-n
    - type: text
      text: saved Israel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: 'the testing of Israel, to know whether Israel would obey the commandments of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which he commanded their fathers by the hand of Moses. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people of Israel lived '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 3:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:35
      marker-yv: yv-n
    - type: text
      text: 'among the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 34:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 9:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: And their daughters they took to themselves for wives, and their own daughters they gave to their sons, and they served their gods.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Othniel
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
