document_id: JDG.3,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: ver. 4 ; ch. 2:21, 22
  - type: text
    content: 'Now these are the nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' left, to test Israel by them, that is, all in Israel who had not experienced all the wars in Canaan. '
  '10':
  - type: note
    content: ch. 6:34; 11:29; 13:25; 14:6, 19; 15:14
  - type: text
    content: 'The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon him, and he judged Israel. He went out to war, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Cushan-rishathaim king of Mesopotamia into his hand. And his hand prevailed over Cushan-rishathaim. '
  '11':
  - type: note
    content: '[ver. 30; ch. 5:31; 8:28; Josh. 11:23]'
  - type: text
    content: So the land had rest for forty years. Then Othniel the son of Kenaz died.
  - type: heading
    content: Ehud
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:19
  - type: text
    content: 'And the people of Israel again did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' strengthened Eglon '
  - type: note
    content: 1 Sam. 12:9
  - type: text
    content: 'the king of Moab against Israel, because they had done what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'He gathered to himself the Ammonites and the '
  - type: note
    content: ch. 6:33; Ps. 83:7
  - type: text
    content: 'Amalekites, and went and defeated Israel. And they took possession of '
  - type: note
    content: ch. 1:16; Deut. 34:3
  - type: text
    content: 'the city of palms. '
  '14':
  - type: text
    content: And the people of Israel served Eglon the king of Moab eighteen years.
  '15':
  - type: text
    content: 'Then the people of Israel '
  - type: note
    content: See ver. 9
  - type: text
    content: 'cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up for them '
  - type: note
    content: See ver. 9
  - type: text
    content: 'a deliverer, Ehud, the son of Gera, the Benjaminite, '
  - type: note
    content: ch. 20:16; [1 Chr. 12:2]
  - type: text
    content: 'a left-handed man. The people of Israel sent tribute by him to Eglon the king of Moab. '
  '16':
  - type: text
    content: And Ehud made for himself a sword with two edges, a cubit
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' in length, and he bound it on his right thigh under his clothes. '
  '17':
  - type: text
    content: 'And he presented the tribute to Eglon king of Moab. Now Eglon was a very fat man. '
  '18':
  - type: text
    content: 'And when Ehud had finished presenting the tribute, he sent away the people who carried the tribute. '
  '19':
  - type: text
    content: 'But he himself turned back '
  - type: note
    content: ver. 26; [Josh. 4:20]
  - type: text
    content: 'at the idols near Gilgal and said, “I have a secret message for you, O king.” And he commanded, “Silence.” And all his attendants went out from his presence. '
  '2':
  - type: text
    content: 'It was only in order that the generations of the people of Israel might know war, to teach war to those who had not known it before. '
  '20':
  - type: text
    content: 'And Ehud came to him as he was sitting alone in his '
  - type: note
    content: Amos 3:15
  - type: text
    content: 'cool roof chamber. '
  - type: note
    content: '[2 Sam. 20:9, 10]'
  - type: text
    content: 'And Ehud said, “I have a message from God for you.” And he arose from his seat. '
  '21':
  - type: text
    content: 'And Ehud reached with his left hand, took the sword from his right thigh, and thrust it into his belly. '
  '22':
  - type: text
    content: 'And the hilt also went in after the blade, and the fat closed over the blade, for he did not pull the sword out of his belly; and the dung came out. '
  '23':
  - type: text
    content: Then Ehud went out into the porch
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' and closed the doors of the roof chamber behind him '
  - type: note
    content: '[2 Sam. 13:17, 18]'
  - type: text
    content: and locked them.
  '24':
  - type: text
    content: 'When he had gone, the servants came, and when they saw that the doors of the roof chamber were locked, they thought, '
  - type: note
    content: 1 Sam. 24:3
  - type: text
    content: '“Surely he is relieving himself in the closet of the cool chamber.” '
  '25':
  - type: text
    content: And they waited till they were embarrassed. But when he still did not open the doors of the roof chamber, they took the key and opened them, and there lay their lord dead on the floor.
  '26':
  - type: text
    content: 'Ehud escaped while they delayed, and he passed beyond '
  - type: note
    content: ver. 19
  - type: text
    content: 'the idols and escaped to Seirah. '
  '27':
  - type: text
    content: 'When he arrived, '
  - type: note
    content: ch. 6:34; 1 Sam. 13:3
  - type: text
    content: 'he sounded the trumpet in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim. Then the people of Israel went down with him from the hill country, and he was their leader. '
  '28':
  - type: text
    content: 'And he said to them, “Follow after me, '
  - type: note
    content: ch. 4:7, 14; 7:9, 15; 1 Sam. 17:47; 2 Chr. 16:8; [1 Kgs. 22:12, 15]
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given your enemies the Moabites into your hand.” So they went down after him and seized '
  - type: note
    content: ch. 12:5; Josh. 2:7; [ch. 7:24]
  - type: text
    content: 'the fords of the Jordan against the Moabites and did not allow anyone to pass over. '
  '29':
  - type: text
    content: 'And they killed at that time about 10,000 of the Moabites, all strong, able-bodied men; not a man escaped. '
  '3':
  - type: text
    content: 'These are the nations: '
  - type: note
    content: See Josh. 13:2-6
  - type: text
    content: 'the five lords of the Philistines and all the Canaanites and the Sidonians and the Hivites who lived on Mount Lebanon, from Mount Baal-hermon as far as Lebo-hamath. '
  '30':
  - type: text
    content: 'So Moab was subdued that day under the hand of Israel. '
  - type: note
    content: ver. 11
  - type: text
    content: And the land had rest for eighty years.
  - type: heading
    content: Shamgar
  '31':
  - type: text
    content: 'After him was '
  - type: note
    content: ch. 5:6
  - type: text
    content: 'Shamgar the son of Anath, who killed 600 of the Philistines '
  - type: note
    content: '[ch. 5:8; 1 Sam. 13:19, 22]'
  - type: text
    content: 'with an oxgoad, and he also '
  - type: note
    content: See ch. 2:16
  - type: text
    content: saved Israel.
  '4':
  - type: text
    content: 'They were for '
  - type: note
    content: ver. 1
  - type: text
    content: 'the testing of Israel, to know whether Israel would obey the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he commanded their fathers by the hand of Moses. '
  '5':
  - type: text
    content: 'So the people of Israel lived '
  - type: note
    content: Ex. 3:8; Ps. 106:35
  - type: text
    content: 'among the Canaanites, the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites. '
  '6':
  - type: note
    content: '[Ex. 34:16; Deut. 7:3; Ezra 9:12]'
  - type: text
    content: And their daughters they took to themselves for wives, and their own daughters they gave to their sons, and they served their gods.
  - type: heading
    content: Othniel
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:11-13
  - type: text
    content: 'And the people of Israel did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. They forgot the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and served the Baals and '
  - type: note
    content: ch. 6:25; Ex. 34:13
  - type: text
    content: 'the Asheroth. '
  '8':
  - type: text
    content: 'Therefore the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, '
  - type: note
    content: ch. 2:14
  - type: text
    content: 'and he sold them into the hand of '
  - type: note
    content: Hab. 3:7
  - type: text
    content: 'Cushan-rishathaim king of Mesopotamia. And the people of Israel served Cushan-rishathaim eight years. '
  '9':
  - type: text
    content: 'But when the people of Israel '
  - type: note
    content: ver. 15; ch. 4:3; 6:7; 10:10
  - type: text
    content: 'cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up a '
  - type: note
    content: ver. 15; ch. 2:16; Neh. 9:27
  - type: text
    content: 'deliverer for the people of Israel, who saved them, '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'Othniel the son of Kenaz, Caleb’s younger brother. '
