document_id: ACT.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Reports to the Church
  - type: text
    content: 'Now the apostles and '
  - type: note
    content: ver. 29; See John 21:23
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' who were throughout Judea heard that the Gentiles also had received the word of God. '
  '10':
  - type: text
    content: 'This happened three times, and all was drawn up again into heaven. '
  '11':
  - type: text
    content: 'And behold, at that very moment three men arrived at the house in which we were, sent to me from Caesarea. '
  '12':
  - type: text
    content: 'And the Spirit told me to go with them, '
  - type: note
    content: ch. 15:9
  - type: text
    content: 'making no distinction. '
  - type: note
    content: ch. 10:23, 45
  - type: text
    content: 'These six brothers also accompanied me, and we entered the man’s house. '
  '13':
  - type: text
    content: 'And he told us how he had seen the angel stand in his house and say, ‘Send to Joppa and bring Simon who is called Peter; '
  '14':
  - type: note
    content: ch. 10:22
  - type: text
    content: 'he will declare to you a message by which '
  - type: note
    content: ch. 10:2; 16:15, 31-34; 18:8; John 4:53
  - type: text
    content: 'you will be saved, you and all your household.’ '
  '15':
  - type: text
    content: 'As I began to speak, '
  - type: note
    content: ch. 10:44
  - type: text
    content: 'the Holy Spirit fell on them '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'just as on us at the beginning. '
  '16':
  - type: text
    content: 'And I remembered the word of the Lord, how he said, '
  - type: note
    content: ch. 1:5; [ch. 19:2]; See Matt. 3:11
  - type: text
    content: ‘John baptized with water, but you will be baptized with the Holy Spirit.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'If then '
  - type: note
    content: See ch. 10:47
  - type: text
    content: 'God gave '
  - type: note
    content: See ch. 2:38
  - type: text
    content: 'the same gift to them as he gave to us '
  - type: note
    content: Eph. 1:13; See ch. 10:43
  - type: text
    content: 'when we believed in the Lord Jesus Christ, '
  - type: note
    content: '[Rom. 9:20]'
  - type: text
    content: 'who was I '
  - type: note
    content: ch. 10:47; See ch. 5:39
  - type: text
    content: 'that I could stand in God’s way?” '
  '18':
  - type: text
    content: 'When they heard these things they fell silent. And they '
  - type: note
    content: ch. 21:20
  - type: text
    content: 'glorified God, saying, '
  - type: note
    content: '[ch. 13:47; Matt. 8:11]; See ch. 10:34, 35'
  - type: text
    content: '“Then to the Gentiles also God has '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'granted '
  - type: note
    content: '[2 Cor. 7:10]'
  - type: text
    content: repentance that leads to life.”
  - type: heading
    content: The Church in Antioch
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:1, 4
  - type: text
    content: 'Now those who were scattered because of the persecution that arose over Stephen traveled as far as Phoenicia and Cyprus and Antioch, speaking the word to no one except Jews. '
  '2':
  - type: text
    content: 'So when Peter went up to Jerusalem, '
  - type: note
    content: ch. 10:45; Gal. 2:12; Col. 4:11; Titus 1:10; [Rom. 4:12]
  - type: text
    content: the circumcision party
  - type: note
    content: Or Jerusalem, those of the circumcision
  - type: text
    content: ' criticized him, saying, '
  '20':
  - type: text
    content: But there were some of them, men of Cyprus and Cyrene, who on coming to Antioch spoke to the Hellenists
  - type: note
    content: Or Greeks (that is, Greek-speaking non-Jews)
  - type: text
    content: ' also, '
  - type: note
    content: See John 7:35; See ch. 5:42
  - type: text
    content: 'preaching the Lord Jesus. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:11; Luke 1:66; [Ps. 80:17; 89:21]
  - type: text
    content: 'the hand of the Lord was with them, and a great number who believed '
  - type: note
    content: ch. 9:35
  - type: text
    content: 'turned to the Lord. '
  '22':
  - type: text
    content: 'The report of this came to the ears of the church in Jerusalem, and they sent Barnabas to Antioch. '
  '23':
  - type: text
    content: 'When he came and saw '
  - type: note
    content: ch. 13:43; 14:26; 20:24, 32; Rom. 5:15; 2 Cor. 6:1; Eph. 3:2, 7; Col. 1:6; Titus 2:11; Heb. 12:15; 1 Pet. 5:12; [ch. 4:33; 15:40]
  - type: text
    content: 'the grace of God, he was glad, and he exhorted them all to remain faithful to the Lord '
  - type: note
    content: 2 Tim. 3:10
  - type: text
    content: 'with steadfast purpose, '
  '24':
  - type: text
    content: 'for he was a good man, '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'full of the Holy Spirit and of faith. And a great many people '
  - type: note
    content: ch. 5:14; [ver. 26]
  - type: text
    content: 'were added to the Lord. '
  '25':
  - type: text
    content: 'So Barnabas went to '
  - type: note
    content: ch. 9:30
  - type: text
    content: 'Tarsus to look for Saul, '
  '26':
  - type: text
    content: 'and when he had found him, he brought him to Antioch. For a whole year they met with the church and taught a great many people. And in Antioch the disciples were first called '
  - type: note
    content: ch. 26:28; 1 Pet. 4:16
  - type: text
    content: Christians.
  '27':
  - type: text
    content: 'Now in these days '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'prophets came down from Jerusalem to Antioch. '
  '28':
  - type: text
    content: 'And one of them named '
  - type: note
    content: ch. 21:10
  - type: text
    content: 'Agabus stood up and foretold '
  - type: note
    content: See ch. 2:18; 8:29
  - type: text
    content: 'by the Spirit that there would be a great '
  - type: note
    content: Matt. 24:7
  - type: text
    content: 'famine over all the world (this took place in the days of '
  - type: note
    content: ch. 18:2
  - type: text
    content: 'Claudius). '
  '29':
  - type: text
    content: 'So the disciples determined, every one according to his ability, '
  - type: note
    content: '[ch. 24:17; Rom. 15:26]'
  - type: text
    content: 'to send relief to '
  - type: note
    content: ver. 1
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' living in Judea. '
  '3':
  - type: note
    content: Gal. 2:12, 14; [ch. 10:28]
  - type: text
    content: '“You went to uncircumcised men and '
  - type: note
    content: '[Luke 15:2]'
  - type: text
    content: 'ate with them.” '
  '30':
  - type: note
    content: ch. 12:25
  - type: text
    content: 'And they did so, sending it to '
  - type: note
    content: ch. 14:23; 15:2, 4, 6; 16:4; 20:17; 21:18; 1 Tim. 5:17, 19; Titus 1:5; James 5:14; 2 John 1; 3 John 1
  - type: text
    content: the elders by the hand of Barnabas and Saul.
  '4':
  - type: text
    content: 'But Peter began and explained it to them in order: '
  '5':
  - type: note
    content: For ver. 5-14, see ch. 10:9-32
  - type: text
    content: '“I was in the city of Joppa praying, and in a trance I saw a vision, something like a great sheet descending, being let down from heaven by its four corners, and it came down to me. '
  '6':
  - type: text
    content: 'Looking at it closely, I observed animals and beasts of prey and reptiles and birds of the air. '
  '7':
  - type: text
    content: 'And I heard a voice saying to me, '
  - type: text
    content: ‘Rise, Peter; kill and eat.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But I said, ‘By no means, Lord; for nothing common or unclean has ever entered my mouth.’ '
  '9':
  - type: text
    content: 'But the voice answered a second time from heaven, '
  - type: text
    content: ‘What God has made clean, do not call common.’
  - type: text
    content: ' '
