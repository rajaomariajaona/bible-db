verses:
  '1':
  - type: text
    content: '“Do you know when '
  - type: note
    content: 1 Sam. 24:2; Ps. 104:18
  - type: text
    content: the mountain goats give birth?
  - type: text
    content: 'Do you observe '
  - type: note
    content: Ps. 29:9
  - type: text
    content: the calving of the does?
  '10':
  - type: text
    content: 'Can you bind '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: him in the furrow with ropes,
  - type: text
    content: or will he harrow the valleys after you?
  '11':
  - type: text
    content: Will you depend on him because his strength is great,
  - type: text
    content: and will you leave to him your labor?
  '12':
  - type: text
    content: Do you have faith in him that he will return your grain
  - type: text
    content: and gather it to your threshing floor?
  '13':
  - type: text
    content: “The wings of the ostrich wave proudly,
  - type: text
    content: but are they the pinions and plumage of love?
  - type: note
    content: The meaning of the Hebrew is uncertain
  '14':
  - type: text
    content: For she leaves her eggs to the earth
  - type: text
    content: and lets them be warmed on the ground,
  '15':
  - type: text
    content: forgetting that a foot may crush them
  - type: text
    content: and that the wild beast may trample them.
  '16':
  - type: text
    content: 'She '
  - type: note
    content: '[Lam. 4:3]'
  - type: text
    content: deals cruelly with her young, as if they were not hers;
  - type: text
    content: 'though her '
  - type: note
    content: Isa. 49:4; 65:23
  - type: text
    content: labor be in vain, yet she has no fear,
  '17':
  - type: text
    content: because God has made her forget wisdom
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 35:11]'
  - type: text
    content: given her no share in understanding.
  '18':
  - type: text
    content: When she rouses herself to flee,
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: she laughs at the horse and his rider.
  '19':
  - type: text
    content: “Do you give the horse his might?
  - type: text
    content: Do you clothe his neck with a mane?
  '2':
  - type: text
    content: Can you number the months that they fulfill,
  - type: text
    content: and do you know the time when they give birth,
  '20':
  - type: text
    content: Do you make him leap like the locust?
  - type: text
    content: 'His majestic '
  - type: note
    content: Jer. 8:16
  - type: text
    content: snorting is terrifying.
  '21':
  - type: text
    content: He paws
  - type: note
    content: Hebrew They paw
  - type: text
    content: ' in the valley and exults in his strength;'
  - type: text
    content: 'he '
  - type: note
    content: '[Jer. 8:6]'
  - type: text
    content: goes out to meet the weapons.
  '22':
  - type: text
    content: He laughs at fear and is not dismayed;
  - type: text
    content: he does not turn back from the sword.
  '23':
  - type: text
    content: Upon him rattle the quiver,
  - type: text
    content: the flashing spear, and the javelin.
  '24':
  - type: text
    content: With fierceness and rage he swallows the ground;
  - type: text
    content: 'he cannot stand still at '
  - type: note
    content: Jer. 4:19; Amos 3:6
  - type: text
    content: the sound of the trumpet.
  '25':
  - type: text
    content: When the trumpet sounds, he says ‘Aha!’
  - type: text
    content: He smells the battle from afar,
  - type: text
    content: the thunder of the captains, and the shouting.
  '26':
  - type: text
    content: “Is it by your understanding that the hawk soars
  - type: text
    content: and spreads his wings toward the south?
  '27':
  - type: text
    content: Is it at your command that the eagle mounts up
  - type: text
    content: 'and makes his '
  - type: note
    content: '[Num. 24:21; Jer. 49:16; Obad. 4; Hab. 2:9]'
  - type: text
    content: nest on high?
  '28':
  - type: text
    content: On the rock he dwells and makes his home,
  - type: text
    content: 'on '
  - type: note
    content: 1 Sam. 14:5
  - type: text
    content: the rocky crag and stronghold.
  '29':
  - type: text
    content: From there he spies out the prey;
  - type: text
    content: his eyes behold it from far away.
  '3':
  - type: text
    content: 'when they '
  - type: note
    content: 1 Sam. 4:19
  - type: text
    content: crouch, bring forth their offspring,
  - type: text
    content: and are delivered of their young?
  '30':
  - type: text
    content: His young ones suck up blood,
  - type: text
    content: 'and '
  - type: note
    content: Matt. 24:28; Luke 17:37
  - type: text
    content: where the slain are, there is he.”
  '4':
  - type: text
    content: Their young ones become strong; they grow up in the open;
  - type: text
    content: 'they go out and '
  - type: note
    content: '[Gen. 8:12]'
  - type: text
    content: do not return to them.
  '5':
  - type: text
    content: “Who has let the wild donkey go free?
  - type: text
    content: 'Who has '
  - type: note
    content: '[ch. 12:18; Ps. 116:16]'
  - type: text
    content: loosed the bonds of the swift donkey,
  '6':
  - type: text
    content: 'to whom I have given '
  - type: note
    content: ch. 24:5; Jer. 2:24
  - type: text
    content: the arid plain for his home
  - type: text
    content: 'and '
  - type: note
    content: Ps. 107:34; Jer. 17:6; [Deut. 29:23]
  - type: text
    content: the salt land for his dwelling place?
  '7':
  - type: text
    content: He scorns the tumult of the city;
  - type: text
    content: he hears not the shouts of the driver.
  '8':
  - type: text
    content: He ranges the mountains as his pasture,
  - type: text
    content: and he searches after every green thing.
  '9':
  - type: text
    content: '“Is '
  - type: note
    content: Num. 23:22
  - type: text
    content: the wild ox willing to serve you?
  - type: text
    content: 'Will he spend the night at your '
  - type: note
    content: Prov. 14:4; Isa. 1:3
  - type: text
    content: manger?
