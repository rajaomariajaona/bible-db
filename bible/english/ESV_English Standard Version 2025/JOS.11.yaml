document_id: JOS.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Conquests in Northern Canaan
  - type: text
    content: 'When Jabin, king of Hazor, heard of this, he '
  - type: note
    content: ch. 10:3
  - type: text
    content: 'sent to Jobab king of Madon, and to the king of Shimron, and to the king of Achshaph, '
  '10':
  - type: text
    content: 'And Joshua turned back at that time and captured '
  - type: note
    content: '[Judg. 4:2]'
  - type: text
    content: 'Hazor and struck its king with the sword, for Hazor formerly was the head of all those kingdoms. '
  '11':
  - type: text
    content: And they struck with the sword all who were in it, devoting them to destruction;
  - type: note
    content: That is, setting apart (devoting) as an offering to the Lord (for destruction); also verses 12, 20, 21
  - type: text
    content: ' '
  - type: note
    content: ch. 10:40
  - type: text
    content: 'there was none left that breathed. And he burned Hazor with fire. '
  '12':
  - type: text
    content: 'And all the cities of those kings, and all their kings, Joshua captured, and struck them with the edge of the sword, devoting them to destruction, '
  - type: note
    content: Deut. 20:16, 17
  - type: text
    content: 'just as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. '
  '13':
  - type: text
    content: 'But none of the cities that stood on mounds did Israel burn, except Hazor alone; that Joshua burned. '
  '14':
  - type: text
    content: 'And all the spoil of these cities and the livestock, the people of Israel took for their plunder. But every person they struck with the edge of the sword until they had destroyed them, and they did not leave any who breathed. '
  '15':
  - type: note
    content: Ex. 34:11, 12
  - type: text
    content: 'Just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses his servant, '
  - type: note
    content: Deut. 7:2
  - type: text
    content: 'so Moses commanded Joshua, '
  - type: note
    content: ch. 1:7
  - type: text
    content: 'and so Joshua did. He left nothing undone of all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '16':
  - type: text
    content: 'So Joshua took all that land, '
  - type: note
    content: ch. 12:8
  - type: text
    content: 'the hill country and all the Negeb and '
  - type: note
    content: ch. 10:41; 15:51
  - type: text
    content: 'all the land of Goshen '
  - type: note
    content: ver. 2
  - type: text
    content: 'and the lowland '
  - type: note
    content: ver. 2
  - type: text
    content: 'and the Arabah '
  - type: note
    content: ver. 21
  - type: text
    content: 'and the hill country of Israel and its lowland '
  '17':
  - type: note
    content: ch. 12:7
  - type: text
    content: 'from Mount Halak, which rises toward Seir, as far as '
  - type: note
    content: ch. 12:7; 13:5
  - type: text
    content: 'Baal-gad in the Valley of Lebanon below '
  - type: note
    content: See ver. 3
  - type: text
    content: 'Mount Hermon. And he captured '
  - type: note
    content: ch. 12:7; Deut. 7:24
  - type: text
    content: 'all their kings and struck them and put them to death. '
  '18':
  - type: text
    content: 'Joshua made war '
  - type: note
    content: '[ch. 14:7, 10]'
  - type: text
    content: 'a long time with all those kings. '
  '19':
  - type: text
    content: 'There was not a city that made peace with the people of Israel except '
  - type: note
    content: ch. 9:3, 7
  - type: text
    content: 'the Hivites, the inhabitants of Gibeon. They took them all in battle. '
  '2':
  - type: text
    content: 'and to the kings who were in the northern hill country, and in the '
  - type: note
    content: ch. 3:16; Deut. 1:1
  - type: text
    content: 'Arabah south of '
  - type: note
    content: ch. 12:3; 13:27; 19:35; Num. 34:11
  - type: text
    content: 'Chinneroth, and in the lowland, and '
  - type: note
    content: ch. 12:23
  - type: text
    content: 'in Naphoth-dor on the '
  - type: note
    content: ch. 17:11; Judg. 1:27
  - type: text
    content: 'west, '
  '20':
  - type: text
    content: 'For it was the '
  - type: text
    content: Lord
  - type: text
    content: '’s doing '
  - type: note
    content: See Ex. 4:21
  - type: text
    content: 'to harden their hearts that they should come against Israel in battle, in order that they should be devoted to destruction and should receive no mercy but be destroyed, '
  - type: note
    content: Deut. 20:16, 17
  - type: text
    content: 'just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '21':
  - type: text
    content: 'And Joshua came at that time and cut off '
  - type: note
    content: ch. 15:13, 14; Num. 13:22, 23; Deut. 1:28
  - type: text
    content: 'the Anakim from the hill country, from Hebron, from Debir, from Anab, and from all the hill country of Judah, and from all the hill country of Israel. Joshua devoted them to destruction with their cities. '
  '22':
  - type: text
    content: 'There was none of the Anakim left in the land of the people of Israel. Only in Gaza, '
  - type: note
    content: '[1 Sam. 17:4]'
  - type: text
    content: 'in Gath, and in Ashdod did some remain. '
  '23':
  - type: text
    content: 'So Joshua took the whole land, '
  - type: note
    content: See Num. 34:2-12
  - type: text
    content: 'according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to Moses. '
  - type: note
    content: See ch. 14–19; Num. 26:52-56
  - type: text
    content: 'And Joshua gave it for an inheritance to Israel '
  - type: note
    content: ch. 12:7; 18:10
  - type: text
    content: according to their tribal allotments. And the land had rest from war.
  '3':
  - type: text
    content: 'to the Canaanites in the east and the west, the Amorites, the Hittites, the Perizzites, and the '
  - type: note
    content: ch. 15:63
  - type: text
    content: 'Jebusites in the hill country, and the '
  - type: note
    content: Judg. 3:3
  - type: text
    content: 'Hivites under '
  - type: note
    content: See Deut. 3:8
  - type: text
    content: 'Hermon in the land of '
  - type: note
    content: ver. 8; Gen. 31:49
  - type: text
    content: 'Mizpah. '
  '4':
  - type: text
    content: 'And they came out with all their troops, a great horde, in number '
  - type: note
    content: Gen. 22:17; 32:12; Judg. 7:12; 1 Sam. 13:5
  - type: text
    content: 'like the sand that is on the seashore, with very many horses and chariots. '
  '5':
  - type: text
    content: And all these kings joined their forces and came and encamped together at the waters of Merom to fight against Israel.
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: '[ch. 10:8]'
  - type: text
    content: '“Do not be afraid of them, for tomorrow at this time I will give over all of them, slain, to Israel. You shall '
  - type: note
    content: ver. 9; 2 Sam. 8:4; 1 Chr. 18:4; [Gen. 49:6]
  - type: text
    content: 'hamstring their horses and burn their '
  - type: note
    content: ch. 17:16-18; Deut. 20:1; Judg. 1:19; 4:3
  - type: text
    content: 'chariots with fire.” '
  '7':
  - type: text
    content: 'So Joshua and all his warriors came '
  - type: note
    content: ch. 10:9
  - type: text
    content: 'suddenly against them by the waters of Merom and fell upon them. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into the hand of Israel, who struck them and chased them as far as '
  - type: note
    content: ch. 19:28
  - type: text
    content: 'Great Sidon and '
  - type: note
    content: ch. 13:6
  - type: text
    content: 'Misrephoth-maim, and eastward as far as the Valley of '
  - type: note
    content: ver. 3
  - type: text
    content: 'Mizpeh. And they struck them until he left none remaining. '
  '9':
  - type: text
    content: 'And Joshua did to them '
  - type: note
    content: ver. 6
  - type: text
    content: 'just as the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him: he hamstrung their horses and burned their chariots with fire.'
