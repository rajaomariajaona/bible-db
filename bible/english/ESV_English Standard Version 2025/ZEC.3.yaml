document_id: ZEC.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of Joshua the High Priest
  - type: text
    content: 'Then he showed me '
  - type: note
    content: ch. 6:11; See Ezra 3:2
  - type: text
    content: 'Joshua the high priest standing before the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: '[1 Chr. 21:1; Ps. 109:6]'
  - type: text
    content: Satan
  - type: note
    content: Hebrew the Accuser or the Adversary
  - type: text
    content: ' standing at his right hand to accuse him. '
  '10':
  - type: text
    content: 'In that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, every one of you will invite his neighbor to come '
  - type: note
    content: See 1 Kgs. 4:25
  - type: text
    content: under his vine and under his fig tree.”
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, '
  - type: note
    content: Jude 9
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' rebuke you, O Satan! The '
  - type: text
    content: Lord
  - type: text
    content: ' who has '
  - type: note
    content: ch. 1:17; [Rom. 8:33]
  - type: text
    content: 'chosen Jerusalem rebuke you! Is not this '
  - type: note
    content: Amos 4:11
  - type: text
    content: a brand
  - type: note
    content: That is, a burning stick
  - type: text
    content: ' plucked from the fire?” '
  '3':
  - type: text
    content: 'Now '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Joshua was standing before the angel, '
  - type: note
    content: '[Isa. 64:6; Jude 23]'
  - type: text
    content: 'clothed with filthy garments. '
  '4':
  - type: text
    content: 'And the angel said to '
  - type: note
    content: '[ver. 7; Luke 1:19]'
  - type: text
    content: 'those who were standing before him, '
  - type: note
    content: Rev. 7:14
  - type: text
    content: '“Remove the filthy garments from him.” And to him he said, “Behold, '
  - type: note
    content: '[ver. 9; Isa. 6:7]'
  - type: text
    content: 'I have taken your iniquity away from you, and '
  - type: note
    content: Isa. 61:10; Luke 15:22; Rev. 19:8
  - type: text
    content: 'I will clothe you with pure vestments.” '
  '5':
  - type: text
    content: 'And I said, '
  - type: note
    content: Job 29:14; [ch. 6:11]
  - type: text
    content: '“Let them put a clean turban on his head.” So they put a clean turban on his head and clothed him with garments. And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was standing by.'
  '6':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' solemnly assured '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Joshua, '
  '7':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: If you will walk in my ways and '
  - type: note
    content: Gen. 26:5; Mal. 3:14; See Lev. 8:35
  - type: text
    content: 'keep my charge, then you shall '
  - type: note
    content: '[Deut. 17:9; Mal. 2:7]'
  - type: text
    content: 'rule my house and have charge of my courts, and I will give you the right of access among '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'those who are standing here. '
  '8':
  - type: text
    content: 'Hear now, O Joshua the high priest, you and your friends who sit before you, for '
  - type: note
    content: '[Ezek. 12:11]'
  - type: text
    content: 'they are men who are a sign: behold, I will bring '
  - type: note
    content: See Isa. 42:1
  - type: text
    content: 'my servant '
  - type: note
    content: ch. 6:12; Isa. 11:1; See Jer. 23:5
  - type: text
    content: 'the Branch. '
  '9':
  - type: text
    content: 'For behold, on '
  - type: note
    content: Ps. 118:22; Isa. 28:16; [ch. 4:7]; See Ezra 3:9-11
  - type: text
    content: 'the stone that I have set before Joshua, on a single stone with '
  - type: note
    content: ch. 4:10; Rev. 5:6
  - type: text
    content: seven eyes,
  - type: note
    content: Or facets
  - type: text
    content: ' I will '
  - type: note
    content: '[2 Tim. 2:19]'
  - type: text
    content: 'engrave its inscription, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'I will remove the iniquity of this land in a single day. '
