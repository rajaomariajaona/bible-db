document_id: REV.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seven Bowls of God’s Wrath
  - type: text
    content: 'Then I heard a loud voice from the temple telling '
  - type: note
    content: See ch. 15:1
  - type: text
    content: 'the seven angels, “Go and '
  - type: note
    content: Ps. 79:6; Jer. 10:25; Zeph. 3:8
  - type: text
    content: 'pour out on the earth '
  - type: note
    content: ch. 15:7
  - type: text
    content: the seven bowls of the wrath of God.”
  '10':
  - type: text
    content: 'The fifth angel poured out his bowl on '
  - type: note
    content: ch. 13:2
  - type: text
    content: 'the throne of the beast, and '
  - type: note
    content: ch. 9:2; Ex. 10:21
  - type: text
    content: 'its kingdom was plunged into darkness. People gnawed their tongues in anguish '
  '11':
  - type: text
    content: 'and cursed '
  - type: note
    content: ch. 11:13
  - type: text
    content: 'the God of heaven for their pain and '
  - type: note
    content: ver. 2
  - type: text
    content: 'sores. '
  - type: note
    content: See ch. 2:21
  - type: text
    content: They did not repent of their deeds.
  '12':
  - type: text
    content: 'The sixth angel poured out his bowl on '
  - type: note
    content: ch. 9:14
  - type: text
    content: 'the great river Euphrates, and '
  - type: note
    content: Isa. 11:15; 44:27; Jer. 50:38; 51:32, 36
  - type: text
    content: 'its water was dried up, '
  - type: note
    content: '[Isa. 41:2, 25; 46:11]'
  - type: text
    content: 'to prepare the way for the kings '
  - type: note
    content: ch. 7:2
  - type: text
    content: 'from the east. '
  '13':
  - type: text
    content: 'And I saw, coming out of the mouth of '
  - type: note
    content: ch. 12:3, 9
  - type: text
    content: 'the dragon and out of the mouth of '
  - type: note
    content: ch. 13:1
  - type: text
    content: 'the beast and out of the mouth of '
  - type: note
    content: ch. 19:20; 20:10; [ch. 13:11, 14]
  - type: text
    content: 'the false prophet, three '
  - type: note
    content: ch. 18:2
  - type: text
    content: 'unclean spirits like '
  - type: note
    content: '[Ex. 8:6]'
  - type: text
    content: 'frogs. '
  '14':
  - type: text
    content: 'For they are '
  - type: note
    content: '[1 Tim. 4:1]'
  - type: text
    content: 'demonic spirits, '
  - type: note
    content: See ch. 13:13
  - type: text
    content: 'performing signs, who go abroad to the kings of the whole world, '
  - type: note
    content: ch. 20:8; [ch. 17:14; 19:19; 1 Kgs. 22:20]
  - type: text
    content: 'to assemble them for battle on '
  - type: note
    content: See ch. 6:17
  - type: text
    content: 'the great day of God the Almighty. '
  '15':
  - type: text
    content: '(“Behold, '
  - type: note
    content: See ch. 3:3
  - type: text
    content: 'I am coming like a thief! '
  - type: note
    content: ch. 3:2, 3; See Matt. 24:42
  - type: text
    content: 'Blessed is the one who stays awake, keeping his garments on, '
  - type: note
    content: ch. 3:18
  - type: text
    content: that he may not go about naked and be seen exposed!”)
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 19:19
  - type: text
    content: 'they assembled them at the place that in Hebrew is called '
  - type: note
    content: Zech. 12:11; See Judg. 5:19
  - type: text
    content: Armageddon.
  - type: heading
    content: The Seventh Bowl
  '17':
  - type: text
    content: 'The seventh angel poured out his bowl into '
  - type: note
    content: '[Eph. 2:2]'
  - type: text
    content: 'the air, and a loud voice came out of the temple, from the throne, saying, '
  - type: note
    content: See ch. 10:6
  - type: text
    content: '“It is done!” '
  '18':
  - type: text
    content: 'And there were '
  - type: note
    content: ch. 4:5; 8:5; 11:19
  - type: text
    content: flashes of lightning, rumblings,
  - type: note
    content: Or voices, or sounds
  - type: text
    content: ' peals of thunder, and '
  - type: note
    content: ch. 6:12; 11:13
  - type: text
    content: 'a great earthquake '
  - type: note
    content: Dan. 12:1; Joel 2:2; Matt. 24:21
  - type: text
    content: 'such as there had never been since man was on the earth, so great was that earthquake. '
  '19':
  - type: note
    content: ch. 11:8
  - type: text
    content: 'The great city '
  - type: note
    content: '[ch. 11:13]'
  - type: text
    content: 'was split into three parts, and the cities of the nations fell, and God '
  - type: note
    content: ch. 18:5; [Ps. 74:18]
  - type: text
    content: 'remembered '
  - type: note
    content: See ch. 14:8
  - type: text
    content: 'Babylon the great, '
  - type: note
    content: See ch. 14:10
  - type: text
    content: 'to make her drain the cup of the wine of the fury of his wrath. '
  '2':
  - type: text
    content: 'So the first angel went and poured out his bowl on the earth, and harmful and painful '
  - type: note
    content: ver. 11; Ex. 9:9-11
  - type: text
    content: 'sores came upon the people who bore '
  - type: note
    content: ch. 13:16
  - type: text
    content: the mark of the beast and worshiped its image.
  '20':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 6:14
  - type: text
    content: 'every island fled away, and no mountains were to be found. '
  '21':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:19
  - type: text
    content: great hailstones, about one hundred pounds
  - type: note
    content: Greek a talent in weight
  - type: text
    content: ' each, fell from heaven on people; and '
  - type: note
    content: ver. 9, 11
  - type: text
    content: 'they cursed God for '
  - type: note
    content: Ex. 9:23-25
  - type: text
    content: the plague of the hail, because the plague was so severe.
  '3':
  - type: text
    content: 'The second angel poured out his bowl into the sea, and '
  - type: note
    content: ch. 8:8
  - type: text
    content: 'it became like the blood of a corpse, and '
  - type: note
    content: ch. 8:9
  - type: text
    content: every living thing died that was in the sea.
  '4':
  - type: text
    content: 'The third angel poured out his bowl into '
  - type: note
    content: ch. 8:10
  - type: text
    content: 'the rivers and the springs of water, and '
  - type: note
    content: Ex. 7:17-20
  - type: text
    content: 'they became blood. '
  '5':
  - type: text
    content: And I heard the angel in charge of the waters
  - type: note
    content: Greek angel of the waters
  - type: text
    content: ' say,'
  - type: note
    content: Jer. 12:1; John 17:25
  - type: text
    content: '“Just are you, '
  - type: note
    content: ch. 15:4
  - type: text
    content: 'O Holy One, '
  - type: note
    content: ch. 11:17; [ch. 1:4, 8; 4:8]
  - type: text
    content: who is and who was,
  - type: text
    content: for you brought these judgments.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: ch. 18:24; [ch. 13:15]
  - type: text
    content: 'they have shed the blood of '
  - type: note
    content: ch. 11:18
  - type: text
    content: saints and prophets,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 49:26; Luke 11:49, 50]'
  - type: text
    content: you have given them blood to drink.
  - type: text
    content: It is what they deserve!”
  '7':
  - type: text
    content: 'And I heard '
  - type: note
    content: ch. 6:9
  - type: text
    content: the altar saying,
  - type: text
    content: “Yes, Lord God the Almighty,
  - type: note
    content: ch. 15:3; 19:2; [ Ps. 119:137 ]
  - type: text
    content: true and just are your judgments!”
  '8':
  - type: text
    content: 'The fourth angel poured out his bowl on the sun, and it was allowed to scorch people '
  - type: note
    content: ch. 9:17; [ch. 14:18]
  - type: text
    content: 'with fire. '
  '9':
  - type: text
    content: 'They were scorched by the fierce heat, and '
  - type: note
    content: ver. 11, 21
  - type: text
    content: they cursed
  - type: note
    content: Greek blasphemed; also verses 11, 21
  - type: text
    content: ' the name of God who had power over these plagues. '
  - type: note
    content: '[Dan. 5:22]; See ch. 2:21'
  - type: text
    content: 'They did not repent '
  - type: note
    content: '[Dan. 5:23]; See ch. 11:13'
  - type: text
    content: and give him glory.
