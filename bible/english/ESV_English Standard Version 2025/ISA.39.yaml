      metadata:
        usfm: DAN.1.7
    marker-yv: yv-n
  - type: text
    text: 'And some of your own sons, who will come from you, whom you will father, shall be taken away, and they shall be eunuchs in the palace of the king of Babylon.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
