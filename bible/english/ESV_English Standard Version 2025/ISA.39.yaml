document_id: ISA.39,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Envoys from Babylon
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-8, see 2 Kgs. 20:12-19
  - type: text
    content: 'At that time Merodach-baladan the son of Baladan, king of Babylon, '
  - type: note
    content: '[2 Chr. 32:31]'
  - type: text
    content: 'sent envoys with letters and a present to Hezekiah, for he heard that he had been sick and had recovered. '
  '2':
  - type: text
    content: 'And Hezekiah welcomed them gladly. And he showed them his treasure house, '
  - type: note
    content: '[2 Kgs. 18:15, 16]'
  - type: text
    content: 'the silver, the gold, the spices, the precious oil, his whole armory, all that was found in his storehouses. '
  - type: note
    content: '[2 Chr. 32:25]'
  - type: text
    content: 'There was nothing in his house or in all his realm that Hezekiah did not show them. '
  '3':
  - type: text
    content: 'Then Isaiah the prophet came to King Hezekiah, and said to him, “What did these men say? And from where did they come to you?” Hezekiah said, “They have come to me from a far country, from Babylon.” '
  '4':
  - type: text
    content: He said, “What have they seen in your house?” Hezekiah answered, “They have seen all that is in my house. There is nothing in my storehouses that I did not show them.”
  '5':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts: '
  '6':
  - type: note
    content: 2 Kgs. 24:13; See 2 Kgs. 25:13-17
  - type: text
    content: 'Behold, the days are coming, when all that is in your house, and that which your fathers have stored up till this day, shall be carried to Babylon. Nothing shall be left, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: note
    content: Dan. 1:2, 3, 7
  - type: text
    content: 'And some of your own sons, who will come from you, whom you will father, shall be taken away, and they shall be eunuchs in the palace of the king of Babylon.” '
  '8':
  - type: text
    content: 'Then Hezekiah said to Isaiah, “The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that you have spoken is good.” For he thought, '
  - type: note
    content: '[2 Chr. 32:26]'
  - type: text
    content: “There will be peace and security in my days.”
