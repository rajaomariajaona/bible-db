      children:
      - type: text
        text: '16'
      metadata:
        usfm: 2KI.18.16
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the silver, the gold, the spices, the precious oil, his whole armory, all that was found in his storehouses. '
  - type: usfm
    marker: x
