      metadata:
        usfm: JOS.13.22
    marker-yv: yv-n
  - type: text
    text: 'Balaam the son of Beor with the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the people of Israel took captive the women of Midian and their little ones, and they took as plunder all their cattle, their flocks, and all their goods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
