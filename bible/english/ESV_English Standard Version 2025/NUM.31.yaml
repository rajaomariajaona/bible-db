      children:
      - type: text
        text: 19:12
      metadata:
        usfm: NUM.19.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: NUM.19.22
    marker-yv: yv-n
  - type: text
    text: 'whoever has touched any slain, purify yourselves and your captives on the third day and on the seventh day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You shall purify every garment, every article of skin, all work of goats’ hair, and every article of wood.”
- type: usfm
  marker: p
  children:
