document_id: NUM.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Vengeance on Midian
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'All their cities in the places where they lived, and all their '
  - type: note
    content: Gen. 25:16
  - type: text
    content: 'encampments, they burned with fire, '
  '11':
  - type: note
    content: '[Deut. 20:14; Josh. 8:2]'
  - type: text
    content: 'and took all the spoil and all the plunder, both of man and of beast. '
  '12':
  - type: text
    content: 'Then they brought the captives and the plunder and the spoil to Moses, and to Eleazar the priest, and to the congregation of the people of Israel, at the camp on '
  - type: note
    content: See ch. 22:1
  - type: text
    content: the plains of Moab by the Jordan at Jericho.
  '13':
  - type: text
    content: 'Moses and Eleazar the priest and all the chiefs of the congregation went to meet them outside the camp. '
  '14':
  - type: text
    content: 'And Moses was angry with '
  - type: note
    content: ver. 48
  - type: text
    content: 'the officers of the army, the commanders of thousands and the commanders of hundreds, who had come from service in the war. '
  '15':
  - type: text
    content: 'Moses said to them, “Have you '
  - type: note
    content: '[1 Sam. 15:3]'
  - type: text
    content: 'let all the women live? '
  '16':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 25:2
  - type: text
    content: 'these, '
  - type: note
    content: ch. 24:14; 2 Pet. 2:15; Rev. 2:14
  - type: text
    content: 'on Balaam’s advice, caused the people of Israel to act treacherously against the '
  - type: text
    content: Lord
  - type: text
    content: ' in the incident of '
  - type: note
    content: See ch. 23:28
  - type: text
    content: 'Peor, and so '
  - type: note
    content: ch. 25:9
  - type: text
    content: 'the plague came among the congregation of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Judg. 21:11, 12
  - type: text
    content: 'kill every male among the little ones, and kill every woman who has known man by lying with him. '
  '18':
  - type: text
    content: 'But all the young girls who have not known man by lying with him '
  - type: note
    content: See Deut. 21:10-14
  - type: text
    content: 'keep alive for yourselves. '
  '19':
  - type: note
    content: ch. 5:2
  - type: text
    content: 'Encamp outside the camp seven days. Whoever of you has killed any person and '
  - type: note
    content: See ch. 19:12, 22
  - type: text
    content: 'whoever has touched any slain, purify yourselves and your captives on the third day and on the seventh day. '
  '2':
  - type: note
    content: ch. 25:17
  - type: text
    content: '“Avenge the people of Israel on the Midianites. Afterward you shall '
  - type: note
    content: See ch. 20:24
  - type: text
    content: 'be gathered to your people.” '
  '20':
  - type: text
    content: You shall purify every garment, every article of skin, all work of goats’ hair, and every article of wood.”
  '21':
  - type: text
    content: 'Then Eleazar the priest said to the men in the army who had gone to battle: “This is the statute of the law that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded Moses: '
  '22':
  - type: text
    content: 'only the gold, the silver, the bronze, the iron, the tin, and the lead, '
  '23':
  - type: text
    content: 'everything that can stand the fire, you shall pass through the fire, and it shall be clean. Nevertheless, it shall also be purified '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'with the water for impurity. And whatever cannot stand the fire, you shall pass through the water. '
  '24':
  - type: text
    content: 'You must '
  - type: note
    content: See Lev. 11:25
  - type: text
    content: wash your clothes on the seventh day, and you shall be clean. And afterward you may come into the camp.”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '26':
  - type: text
    content: '“Take the count of the plunder that was taken, both of man and of beast, you and Eleazar the priest and the heads of the fathers’ houses of the congregation, '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: Josh. 22:8; 1 Sam. 30:24
  - type: text
    content: 'divide the plunder into two parts between the warriors who went out to battle and all the congregation. '
  '28':
  - type: text
    content: 'And levy for the '
  - type: text
    content: Lord
  - type: text
    content: ' a tribute from the men of war who went out to battle, '
  - type: note
    content: '[ch. 18:26]; See ver. 30-41, 47'
  - type: text
    content: 'one out of five hundred, of the people and of the oxen and of the donkeys and of the flocks. '
  '29':
  - type: text
    content: 'Take it from their half and give it to Eleazar the priest as a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'So Moses spoke to the people, saying, “Arm men from among you for the war, that they may go against Midian to execute the '
  - type: text
    content: Lord
  - type: text
    content: '’s vengeance on Midian. '
  '30':
  - type: text
    content: 'And from the people of Israel’s half you shall take '
  - type: note
    content: See ver. 42-47
  - type: text
    content: 'one drawn out of every fifty, of the people, of the oxen, of the donkeys, and of the flocks, of all the cattle, and give them to the Levites '
  - type: note
    content: See ch. 1:53
  - type: text
    content: 'who keep guard over the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '31':
  - type: text
    content: 'And Moses and Eleazar the priest did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '32':
  - type: text
    content: 'Now the plunder remaining of the spoil that the army took was 675,000 sheep, '
  '33':
  - type: text
    content: '72,000 cattle, '
  '34':
  - type: text
    content: '61,000 donkeys, '
  '35':
  - type: text
    content: 'and 32,000 persons in all, women who had not known man by lying with him. '
  '36':
  - type: text
    content: 'And the half, the portion of those who had gone out in the army, numbered 337,500 sheep, '
  '37':
  - type: text
    content: 'and '
  - type: note
    content: ver. 28
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: '’s tribute of sheep was 675. '
  '38':
  - type: text
    content: 'The cattle were 36,000, of which the '
  - type: text
    content: Lord
  - type: text
    content: '’s tribute was 72. '
  '39':
  - type: text
    content: 'The donkeys were 30,500, of which the '
  - type: text
    content: Lord
  - type: text
    content: '’s tribute was 61. '
  '4':
  - type: text
    content: 'You shall send a thousand from each of the tribes of Israel to the war.” '
  '40':
  - type: text
    content: 'The persons were 16,000, of which the '
  - type: text
    content: Lord
  - type: text
    content: '’s tribute was 32 persons. '
  '41':
  - type: text
    content: 'And Moses gave the tribute, which was the contribution for the '
  - type: text
    content: Lord
  - type: text
    content: ', to Eleazar the priest, '
  - type: note
    content: '[ch. 18:8, 19]'
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '42':
  - type: text
    content: 'From the people of Israel’s half, which Moses separated from that of the men who had served in the army— '
  '43':
  - type: text
    content: 'now the congregation’s half was 337,500 sheep, '
  '44':
  - type: text
    content: '36,000 cattle, '
  '45':
  - type: text
    content: 'and 30,500 donkeys, '
  '46':
  - type: text
    content: 'and 16,000 persons— '
  '47':
  - type: note
    content: ver. 30
  - type: text
    content: 'from the people of Israel’s half Moses took one of every 50, both of persons and of beasts, and gave them to the Levites who kept guard over the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '48':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 14
  - type: text
    content: 'the officers who were over the thousands of the army, the commanders of thousands and the commanders of hundreds, came near to Moses '
  '49':
  - type: text
    content: 'and said to Moses, “Your servants have counted the men of war who are under our command, and there is not a man missing from us. '
  '5':
  - type: text
    content: 'So there were provided, out of the thousands of Israel, a thousand from each tribe, twelve thousand '
  - type: note
    content: ch. 32:27; Josh. 4:13
  - type: text
    content: 'armed for war. '
  '50':
  - type: text
    content: 'And we have brought the '
  - type: text
    content: Lord
  - type: text
    content: '’s offering, what each man found, articles of gold, armlets and bracelets, signet rings, earrings, and beads, '
  - type: note
    content: See Ex. 30:12
  - type: text
    content: 'to make atonement for ourselves before the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '51':
  - type: text
    content: 'And Moses and Eleazar the priest received from them the gold, all crafted articles. '
  '52':
  - type: text
    content: 'And all the gold of the contribution that they presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', from the commanders of thousands and the commanders of hundreds, was 16,750 shekels.'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' '
  '53':
  - type: note
    content: ver. 32; Deut. 20:14
  - type: text
    content: '(The men in the army had each taken plunder for himself.) '
  '54':
  - type: text
    content: 'And Moses and Eleazar the priest received the gold from the commanders of thousands and of hundreds, and brought it into the tent of meeting, '
  - type: note
    content: Ex. 30:16
  - type: text
    content: 'as a memorial for the people of Israel before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'And Moses sent them to the war, a thousand from each tribe, together with Phinehas the son of Eleazar the priest, with the vessels of the sanctuary and '
  - type: note
    content: ch. 10:6, 9; Lev. 23:24
  - type: text
    content: 'the trumpets for the alarm in his hand. '
  '7':
  - type: text
    content: 'They warred against Midian, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, and '
  - type: note
    content: '[Deut. 20:13; Judg. 21:11; 1 Sam. 27:9; 1 Kgs. 11:15, 16]'
  - type: text
    content: 'killed every male. '
  '8':
  - type: text
    content: 'They killed the kings of Midian with the rest of their slain, '
  - type: note
    content: Josh. 13:21
  - type: text
    content: 'Evi, Rekem, '
  - type: note
    content: ch. 25:15
  - type: text
    content: 'Zur, Hur, and Reba, the five kings of Midian. And they also killed '
  - type: note
    content: Josh. 13:22
  - type: text
    content: 'Balaam the son of Beor with the sword. '
  '9':
  - type: text
    content: 'And the people of Israel took captive the women of Midian and their little ones, and they took as plunder all their cattle, their flocks, and all their goods. '
