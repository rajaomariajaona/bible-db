  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:26
      metadata:
        usfm: NUM.18.26
    - type: usfm
      marker: xta
      children:
      - type: text
