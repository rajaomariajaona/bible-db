    text: 'So Moses spoke to the people, saying, “Arm men from among you for the war, that they may go against Midian to execute the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s vengeance on Midian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You shall send a thousand from each of the tribes of Israel to the war.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
