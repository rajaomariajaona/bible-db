      metadata:
        usfm: JOS.22.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Sam. 30:24
      metadata:
        usfm: 1SA.30.24
    marker-yv: yv-n
  - type: text
    text: 'divide the plunder into two parts between the warriors who went out to battle and all the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
