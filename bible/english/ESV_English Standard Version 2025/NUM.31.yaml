      children:
      - type: text
        text: '48'
      metadata:
        usfm: NUM.31.48
    marker-yv: yv-n
  - type: text
    text: 'the officers of the army, the commanders of thousands and the commanders of hundreds, who had come from service in the war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moses said to them, “Have you '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
