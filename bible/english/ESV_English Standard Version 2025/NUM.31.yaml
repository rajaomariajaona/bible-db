        text: Lev. 11:25
      metadata:
        usfm: LEV.11.25
    marker-yv: yv-n
  - type: text
    text: wash your clothes on the seventh day, and you shall be clean. And afterward you may come into the camp.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
