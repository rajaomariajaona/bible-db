document_id: NEH.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Report from Jerusalem
  - type: text
    content: 'The words of '
  - type: note
    content: ch. 10:1
  - type: text
    content: Nehemiah the son of Hacaliah.
  - type: text
    content: 'Now it happened in the month of '
  - type: note
    content: Zech. 7:1
  - type: text
    content: 'Chislev, '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'in the twentieth year, as I was in '
  - type: note
    content: Esth. 1:2, 5; 2:3, 5
  - type: text
    content: 'Susa the citadel, '
  '10':
  - type: note
    content: Deut. 9:29
  - type: text
    content: 'They are your servants and your people, whom you have redeemed by your great power and by your strong hand. '
  '11':
  - type: text
    content: 'O Lord, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: let your ear be attentive to the prayer of your servant, and to the prayer of your servants who delight to fear your name, and give success to your servant today, and grant him mercy in the sight of this man.”
  - type: text
    content: 'Now I was '
  - type: note
    content: '[ch. 2:1]'
  - type: text
    content: cupbearer to the king.
  '2':
  - type: text
    content: 'that '
  - type: note
    content: ch. 7:2
  - type: text
    content: 'Hanani, one of my brothers, came with certain men from Judah. And I asked them concerning the Jews who escaped, who had survived the exile, and concerning Jerusalem. '
  '3':
  - type: text
    content: 'And they said to me, “The remnant there in the province who had survived the exile is in great trouble and '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'shame. '
  - type: note
    content: ch. 2:13; 2 Kgs. 25:10
  - type: text
    content: 'The wall of Jerusalem is broken down, '
  - type: note
    content: ch. 2:3, 13, 17
  - type: text
    content: and its gates are destroyed by fire.”
  - type: heading
    content: Nehemiah’s Prayer
  '4':
  - type: text
    content: 'As soon as I heard these words I '
  - type: note
    content: '[Ezra 9:3]'
  - type: text
    content: 'sat down and wept and mourned for days, and I continued fasting and praying before the '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'God of heaven. '
  '5':
  - type: text
    content: 'And I said, “O '
  - type: text
    content: Lord
  - type: text
    content: ' God of heaven, '
  - type: note
    content: ch. 9:32; Dan. 9:4; [Deut. 7:21]
  - type: text
    content: 'the great and awesome God who keeps covenant and steadfast love with those who love him and keep his commandments, '
  '6':
  - type: note
    content: Dan. 9:18; [1 Kgs. 8:29; 2 Chr. 6:40]
  - type: text
    content: 'let your ear be attentive and your eyes open, to hear the prayer of your servant that I now pray before you day and night for the people of Israel your servants, '
  - type: note
    content: Ezra 10:1; Dan. 9:20
  - type: text
    content: 'confessing the sins of the people of Israel, which we have sinned against you. Even '
  - type: note
    content: '[Ps. 106:6]'
  - type: text
    content: 'I and my father’s house have sinned. '
  '7':
  - type: note
    content: Dan. 9:5
  - type: text
    content: 'We have acted very corruptly against you and have not kept the commandments, the statutes, and the rules '
  - type: note
    content: Deut. 28:15
  - type: text
    content: 'that you commanded your servant Moses. '
  '8':
  - type: text
    content: 'Remember the word that you commanded your servant Moses, saying, ‘If you are unfaithful, '
  - type: note
    content: Lev. 26:33; Deut. 28:64; See Deut. 4:25-27
  - type: text
    content: 'I will scatter you among the peoples, '
  '9':
  - type: note
    content: Lev. 26:39-42; Deut. 4:29-31; 30:2, 3
  - type: text
    content: 'but if you return to me and keep my commandments and do them, '
  - type: note
    content: Deut. 30:4
  - type: text
    content: 'though your outcasts are in the uttermost parts of heaven, from there I will gather them and bring them '
  - type: note
    content: Deut. 12:5
  - type: text
    content: 'to the place that I have chosen, to make my name dwell there.’ '
