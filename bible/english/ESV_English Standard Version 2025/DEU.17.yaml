document_id: DEU.17,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 22:20
  - type: text
    content: '“You shall not sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God an ox or a sheep in which is a blemish, any defect whatever, for that is an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '10':
  - type: text
    content: 'Then you shall do according to what they declare to you from that place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose. And you shall be careful to do according to all that they direct you. '
  '11':
  - type: text
    content: 'According to the instructions that they give you, and according to the decision which they pronounce to you, you shall do. You shall not turn aside from the verdict that they declare to you, either to the right hand or to the left. '
  '12':
  - type: text
    content: 'The man who '
  - type: note
    content: '[ch. 18:20, 22; Ezra 10:8]'
  - type: text
    content: 'acts presumptuously by not obeying the priest '
  - type: note
    content: ch. 10:8; 18:5, 7
  - type: text
    content: 'who stands to minister there before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, or the judge, that man shall die. So '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'you shall purge the evil from Israel. '
  '13':
  - type: text
    content: 'And all the people '
  - type: note
    content: See ch. 13:11
  - type: text
    content: shall hear and fear and not act presumptuously again.
  - type: heading
    content: Laws Concerning Israel’s Kings
  '14':
  - type: text
    content: '“When you come to the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, and you possess it and dwell in it and then say, '
  - type: note
    content: '[1 Sam. 8:5, 19, 20]'
  - type: text
    content: '‘I will set a king over me, like all the nations that are around me,’ '
  '15':
  - type: text
    content: 'you may indeed set a king over you '
  - type: note
    content: '[1 Sam. 9:15; 10:24; 16:12; 1 Chr. 22:10]'
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. One '
  - type: note
    content: '[Jer. 30:21]'
  - type: text
    content: 'from among your brothers you shall set as king over you. You may not put a foreigner over you, who is not your brother. '
  '16':
  - type: text
    content: 'Only he must not acquire many '
  - type: note
    content: '[1 Kgs. 4:26; 10:26, 28; 2 Chr. 1:16; 9:28; Isa. 2:7; 31:1]'
  - type: text
    content: 'horses for himself or cause the people '
  - type: note
    content: Isa. 31:1; Ezek. 17:15
  - type: text
    content: 'to return to Egypt in order to acquire many horses, since the '
  - type: text
    content: Lord
  - type: text
    content: ' has said to you, '
  - type: note
    content: ch. 28:68; Hos. 11:5; [Ex. 13:17; 14:13; Num. 4:3, 4;] See Jer. 42:15-19
  - type: text
    content: '‘You shall never return that way again.’ '
  '17':
  - type: text
    content: 'And he '
  - type: note
    content: '[1 Kgs. 11:3, 4; Neh. 13:26]'
  - type: text
    content: 'shall not acquire many wives for himself, lest his heart turn away, '
  - type: note
    content: '[Isa. 2:7]'
  - type: text
    content: nor shall he acquire for himself excessive silver and gold.
  '18':
  - type: text
    content: '“And when he sits on the throne of his kingdom, '
  - type: note
    content: '[2 Kgs. 11:12]'
  - type: text
    content: 'he shall write for himself in a book a copy of this law, '
  - type: note
    content: ch. 31:9, 26; 2 Kgs. 22:8; 2 Chr. 34:14
  - type: text
    content: approved by
  - type: note
    content: Hebrew from before
  - type: text
    content: ' the Levitical priests. '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 1:8
  - type: text
    content: 'it shall be with him, and he shall read in it all the days of his life, '
  - type: note
    content: ch. 4:10; 14:23
  - type: text
    content: 'that he may learn to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' his God by keeping all the words of this law and these statutes, and doing them, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-7, see ch. 13:6-14
  - type: text
    content: '“If there is found among you, within any of your towns that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, a man or woman who does what is evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: Josh. 7:11, 15; 23:16; Judg. 2:20; 2 Kgs. 18:12; Hos. 6:7; 8:1
  - type: text
    content: 'in transgressing his covenant, '
  '20':
  - type: text
    content: 'that his heart may not be lifted up above his brothers, and that he '
  - type: note
    content: ch. 5:32; 1 Kgs. 15:5
  - type: text
    content: 'may not turn aside from the commandment, either to the right hand or to the left, '
  - type: note
    content: ch. 4:40
  - type: text
    content: so that he may continue long in his kingdom, he and his children, in Israel.
  '3':
  - type: text
    content: 'and has gone and served other gods and worshiped them, or '
  - type: note
    content: See ch. 4:19
  - type: text
    content: 'the sun or the moon or any of the host of heaven, '
  - type: note
    content: '[Jer. 7:31; 19:5; 32:35]'
  - type: text
    content: 'which I have forbidden, '
  '4':
  - type: text
    content: 'and it is told you and you hear of it, then you shall inquire '
  - type: note
    content: ch. 13:14; 19:18
  - type: text
    content: 'diligently, and if it is true and certain that such an abomination has been done in Israel, '
  '5':
  - type: text
    content: 'then you shall bring out to your gates that man or woman who has done this evil thing, and you '
  - type: note
    content: '[Lev. 24:14, 16; Josh. 7:25]'
  - type: text
    content: 'shall stone that man or woman to death with stones. '
  '6':
  - type: note
    content: '[John 8:17]; See Num. 35:30'
  - type: text
    content: 'On the evidence of two witnesses or of three witnesses the one who is to die shall be put to death; a person shall not be put to death on the evidence of one witness. '
  '7':
  - type: note
    content: ch. 13:9; [Acts 7:58]
  - type: text
    content: 'The hand of the witnesses shall be first against him to put him to death, and afterward the hand of all the people. So '
  - type: note
    content: ver. 12; See ch. 13:5
  - type: text
    content: you shall purge
  - type: note
    content: Septuagint drive out; also verse 12
  - type: text
    content: ' the evil'
  - type: note
    content: Or evil person; also verse 12
  - type: text
    content: ' from your midst.'
  - type: heading
    content: Legal Decisions by Priests and Judges
  '8':
  - type: text
    content: '“If any case arises requiring decision between one kind of homicide and another, one kind of legal right and another, or one kind of assault and another, any case within your towns that is too difficult for you, then you shall arise and go up to '
  - type: note
    content: See ch. 12:5
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. '
  '9':
  - type: note
    content: ch. 19:17; 21:5; 2 Chr. 19:8, 10; Ps. 122:5; Jer. 18:18; Hag. 2:11; Mal. 2:7
  - type: text
    content: 'And you shall come to the Levitical priests and to the judge who is in office in those days, and you shall consult them, and '
  - type: note
    content: Ezek. 44:24
  - type: text
    content: 'they shall declare to you the decision. '
