document_id: MRK.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Delivered to Pilate
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:1; Luke 22:66
  - type: text
    content: 'And as soon as it was morning, the chief priests '
  - type: note
    content: ch. 3:6
  - type: text
    content: 'held a consultation with the elders and scribes and the whole council. And '
  - type: note
    content: Matt. 27:2
  - type: text
    content: 'they bound Jesus and '
  - type: note
    content: Luke 23:1; John 18:28
  - type: text
    content: 'led him away and '
  - type: note
    content: See ch. 10:33
  - type: text
    content: 'delivered him over to '
  - type: note
    content: Luke 3:1; 13:1; Acts 3:13; 4:27; 1 Tim. 6:13
  - type: text
    content: 'Pilate. '
  '10':
  - type: text
    content: 'For he perceived that '
  - type: note
    content: '[John 12:19]'
  - type: text
    content: 'it was out of envy that the chief priests had delivered him up. '
  '11':
  - type: text
    content: 'But the chief priests stirred up the crowd to have him release for them Barabbas instead. '
  '12':
  - type: text
    content: 'And Pilate again said to them, “Then what shall I do with '
  - type: note
    content: '[John 19:15]'
  - type: text
    content: 'the man you call the King of the Jews?” '
  '13':
  - type: text
    content: 'And they cried out again, “Crucify him.” '
  '14':
  - type: text
    content: 'And Pilate said to them, “Why? '
  - type: note
    content: '[Luke 23:41; John 8:46]'
  - type: text
    content: 'What evil has he done?” But they shouted all the more, “Crucify him.” '
  '15':
  - type: text
    content: 'So Pilate, wishing to satisfy the crowd, released for them Barabbas, and having '
  - type: note
    content: ch. 10:34; Isa. 50:6; 53:5; [Luke 23:16; John 19:1]
  - type: text
    content: scourged
  - type: note
    content: A Roman judicial penalty, consisting of a severe beating with a multi-lashed whip containing embedded pieces of bone and metal
  - type: text
    content: ' Jesus, he delivered him to be crucified.'
  - type: heading
    content: Jesus Is Mocked
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-20, see Matt. 27:27-31; John 19:2, 3
  - type: text
    content: 'And the soldiers led him away inside '
  - type: note
    content: See Matt. 26:3
  - type: text
    content: 'the palace (that is, '
  - type: note
    content: John 18:28, 33; 19:9; Acts 23:35; Phil. 1:13 (Gk.)
  - type: text
    content: the governor’s headquarters),
  - type: note
    content: Greek the praetorium
  - type: text
    content: ' and they called together the whole '
  - type: note
    content: See Acts 10:1
  - type: text
    content: battalion.
  - type: note
    content: Greek cohort; a tenth of a Roman legion, usually about 600 men
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And they clothed him in '
  - type: note
    content: Rev. 18:12, 16; [Luke 23:11]
  - type: text
    content: 'a purple cloak, and twisting together a crown of thorns, they put it on him. '
  '18':
  - type: text
    content: 'And they began to salute him, '
  - type: note
    content: See ver. 2
  - type: text
    content: '“Hail, King of the Jews!” '
  '19':
  - type: text
    content: 'And they were striking his head with a reed and '
  - type: note
    content: See ch. 14:65
  - type: text
    content: 'spitting on him and '
  - type: note
    content: See Matt. 8:2
  - type: text
    content: 'kneeling down in homage to him. '
  '2':
  - type: note
    content: For ver. 2-5, see Matt. 27:11-14; Luke 23:2, 3; John 18:29-38
  - type: text
    content: 'And Pilate asked him, '
  - type: note
    content: ver. 9, 12, 18, 26; Matt. 2:2; John 18:39; 19:3; [ver. 32]
  - type: text
    content: '“Are you the King of the Jews?” And he answered him, '
  - type: note
    content: '[1 Tim. 6:13]; See Luke 22:70'
  - type: text
    content: “You have said so.”
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And when they had '
  - type: note
    content: ch. 10:34
  - type: text
    content: 'mocked him, they stripped him of '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the purple cloak and put his own clothes on him. And they '
  - type: note
    content: Isa. 53:7
  - type: text
    content: led him out to crucify him.
  - type: heading
    content: The Crucifixion
  '21':
  - type: text
    content: ' '
  - type: note
    content: Matt. 27:32; Luke 23:26; [ John 19:17 ]
  - type: text
    content: 'And they compelled a passerby, Simon of Cyrene, who was coming in from the country, the father of Alexander and Rufus, to carry his cross. '
  '22':
  - type: note
    content: For ver. 22-38, see Matt. 27:33-51; Luke 23:32-38, 44-46; John 19:17-19, 23, 24, 28-30
  - type: text
    content: 'And they brought him to the place called Golgotha (which means Place of a Skull). '
  '23':
  - type: text
    content: 'And they offered him wine mixed with '
  - type: note
    content: Matt. 2:11; See John 19:39
  - type: text
    content: 'myrrh, but he did not take it. '
  '24':
  - type: text
    content: 'And they crucified him and '
  - type: note
    content: Ps. 22:18
  - type: text
    content: 'divided his garments among them, casting lots for them, to decide what each should take. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: '[John 19:14]'
  - type: text
    content: it was the third hour
  - type: note
    content: That is, 9 a.m.
  - type: text
    content: ' when they crucified him. '
  '26':
  - type: text
    content: 'And the inscription of the charge against him read, '
  - type: note
    content: ver. 2
  - type: text
    content: '“The King of the Jews.” '
  '27':
  - type: text
    content: 'And with him they crucified two '
  - type: note
    content: '[John 18:40]'
  - type: text
    content: 'robbers, '
  - type: note
    content: '[ch. 10:37]'
  - type: text
    content: one on his right and one on his left.
  - type: note
    content: 'Some manuscripts insert verse 28: And the Scripture was fulfilled that says, “He was numbered with the transgressors”'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 22:7; 109:25; [Lam. 1:12]
  - type: text
    content: 'those who passed by derided him, '
  - type: note
    content: Job 16:4; Jer. 18:16; Lam. 2:15
  - type: text
    content: 'wagging their heads and saying, '
  - type: note
    content: Ps. 35:25; 40:15
  - type: text
    content: '“Aha! '
  - type: note
    content: ch. 14:58
  - type: text
    content: 'You who would destroy the temple and rebuild it in three days, '
  '3':
  - type: text
    content: 'And the chief priests accused him of many things. '
  '30':
  - type: text
    content: 'save yourself, and come down from the cross!” '
  '31':
  - type: text
    content: 'So also the chief priests with the scribes mocked him to one another, saying, '
  - type: note
    content: '[Luke 4:23]'
  - type: text
    content: '“He saved others; '
  - type: note
    content: '[Matt. 26:53, 54; John 10:18]'
  - type: text
    content: 'he cannot save himself. '
  '32':
  - type: text
    content: 'Let '
  - type: note
    content: See Matt. 1:17
  - type: text
    content: 'the Christ, '
  - type: note
    content: John 1:49; 12:13; [ver. 26]
  - type: text
    content: 'the King of Israel, come down now from the cross that we may '
  - type: note
    content: John 20:29
  - type: text
    content: 'see and believe.” '
  - type: note
    content: '[Luke 23:39-43]'
  - type: text
    content: Those who were crucified with him also reviled him.
  - type: heading
    content: The Death of Jesus
  '33':
  - type: text
    content: And when the sixth hour
  - type: note
    content: That is, noon
  - type: text
    content: ' had come, there was darkness over the whole land until the ninth hour.'
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And at the ninth hour Jesus '
  - type: note
    content: '[Heb. 5:7]'
  - type: text
    content: 'cried with a loud voice, '
  - type: note
    content: Cited from Ps. 22:1
  - type: text
    content: “Eloi, Eloi, lema sabachthani?”
  - type: text
    content: ' which means, '
  - type: text
    content: “My God, my God, why have you forsaken me?”
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And some of the bystanders hearing it said, “Behold, he is calling Elijah.” '
  '36':
  - type: text
    content: 'And someone ran and filled a sponge with '
  - type: note
    content: Ruth 2:14
  - type: text
    content: 'sour wine, put it on a reed '
  - type: note
    content: Ps. 69:21
  - type: text
    content: 'and gave it to him to drink, saying, “Wait, let us see whether Elijah will come to take him down.” '
  '37':
  - type: text
    content: 'And Jesus '
  - type: note
    content: ver. 34
  - type: text
    content: 'uttered a loud cry and '
  - type: note
    content: '[John 10:18]'
  - type: text
    content: 'breathed his last. '
  '38':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 26:31-33; 2 Chr. 3:14
  - type: text
    content: 'the curtain of the temple was torn in two, from top to bottom. '
  '39':
  - type: note
    content: For ver. 39-41, see Matt. 27:54-56; Luke 23:47, 49
  - type: text
    content: And when the centurion, who stood facing him, saw that in this way he
  - type: note
    content: Some manuscripts insert cried out and
  - type: text
    content: ' breathed his last, he said, '
  - type: note
    content: Matt. 27:43
  - type: text
    content: “Truly this man was the Son
  - type: note
    content: Or a son
  - type: text
    content: ' of God!”'
  '4':
  - type: text
    content: 'And Pilate again asked him, '
  - type: note
    content: '[John 19:10]; See Matt. 26:63'
  - type: text
    content: '“Have you no answer to make? See how many charges they bring against you.” '
  '40':
  - type: text
    content: 'There were also '
  - type: note
    content: John 19:25
  - type: text
    content: 'women looking on '
  - type: note
    content: Ps. 38:11
  - type: text
    content: 'from a distance, among whom were '
  - type: note
    content: See Luke 8:2, 3
  - type: text
    content: 'Mary Magdalene, and Mary the mother of James the younger and of Joses, and '
  - type: note
    content: ch. 16:1; [Matt. 27:56]
  - type: text
    content: 'Salome. '
  '41':
  - type: text
    content: 'When he was in Galilee, they followed him and '
  - type: note
    content: '[See ver. 40 above]'
  - type: text
    content: 'ministered to him, and there were also many other women who '
  - type: note
    content: Luke 2:4
  - type: text
    content: came up with him to Jerusalem.
  - type: heading
    content: Jesus Is Buried
  '42':
  - type: text
    content: ' '
  - type: note
    content: For ver. 42-47, see Matt. 27:57-61; Luke 23:50-56; John 19:38-42
  - type: text
    content: 'And when evening had come, since it was '
  - type: note
    content: See Matt. 27:62
  - type: text
    content: 'the day of Preparation, that is, the day before the Sabbath, '
  '43':
  - type: text
    content: 'Joseph of Arimathea, '
  - type: note
    content: Acts 13:50; 17:12
  - type: text
    content: 'a respected member of the council, who '
  - type: note
    content: Luke 2:25, 38
  - type: text
    content: 'was also himself looking for the kingdom of God, took courage and went to Pilate and asked for the body of Jesus. '
  '44':
  - type: text
    content: Pilate was surprised to hear that he should have already died.
  - type: note
    content: Or Pilate wondered whether he had already died
  - type: text
    content: ' And summoning '
  - type: note
    content: ver. 39
  - type: text
    content: 'the centurion, he asked him whether he was already dead. '
  '45':
  - type: text
    content: 'And when he learned from '
  - type: note
    content: '[See ver. 44 above]'
  - type: text
    content: 'the centurion that he was dead, he granted the corpse to Joseph. '
  '46':
  - type: text
    content: And Joseph
  - type: note
    content: Greek he
  - type: text
    content: ' bought '
  - type: note
    content: See ch. 14:51
  - type: text
    content: 'a linen shroud, and taking him down, wrapped him in the linen shroud and '
  - type: note
    content: '[Isa. 53:9]'
  - type: text
    content: 'laid him in a tomb '
  - type: note
    content: Isa. 22:16
  - type: text
    content: 'that had been cut out of the rock. And he rolled '
  - type: note
    content: ch. 16:4; [John 11:38]
  - type: text
    content: 'a stone against the entrance of the tomb. '
  '47':
  - type: note
    content: ver. 40
  - type: text
    content: Mary Magdalene and Mary the mother of Joses saw where he was laid.
  '5':
  - type: text
    content: 'But Jesus '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: made no further answer, so that Pilate was amazed.
  - type: heading
    content: Pilate Delivers Jesus to Be Crucified
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-15, see Matt. 27:15-26; Luke 23:18-25; John 18:39, 40; 19:16
  - type: text
    content: 'Now at the feast he used to release for them one prisoner for whom they asked. '
  '7':
  - type: text
    content: 'And among the rebels in prison, who had '
  - type: note
    content: Acts 3:14
  - type: text
    content: 'committed murder '
  - type: note
    content: '[Acts 5:36, 37]'
  - type: text
    content: 'in the insurrection, there was a man called Barabbas. '
  '8':
  - type: text
    content: 'And the crowd came up and began to ask Pilate to do as he usually did for them. '
  '9':
  - type: text
    content: 'And he answered them, saying, “Do you want me to release for you the King of the Jews?” '
