document_id: GEN.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sacrifice of Isaac
  - type: text
    content: 'After these things '
  - type: note
    content: 1 Cor. 10:13; Heb. 11:17; James 1:12, 13; 1 Pet. 1:6, 7
  - type: text
    content: 'God tested Abraham and said to him, “Abraham!” And he said, “Here I am.” '
  '10':
  - type: text
    content: 'Then Abraham reached out his hand and took the knife to slaughter his son. '
  '11':
  - type: text
    content: 'But the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called to him from heaven and said, “Abraham, Abraham!” And he said, “Here I am.” '
  '12':
  - type: text
    content: 'He said, '
  - type: note
    content: '[Mic. 6:7, 8]'
  - type: text
    content: '“Do not lay your hand on the boy or do anything to him, for '
  - type: note
    content: '[ch. 26:5]'
  - type: text
    content: 'now I know that you fear God, seeing you have not withheld your son, your only son, from me.” '
  '13':
  - type: text
    content: 'And Abraham lifted up his eyes and looked, and behold, behind him was a ram, caught in a thicket by his horns. And Abraham went and took the ram and offered it up as a burnt offering instead of his son. '
  '14':
  - type: text
    content: 'So Abraham called the name of that place, '
  - type: note
    content: ver. 8
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will provide”;'
  - type: note
    content: Or will see
  - type: text
    content: ' as it is said to this day, “On the mount of the '
  - type: text
    content: Lord
  - type: text
    content: ' it shall be provided.”'
  - type: note
    content: Or he will be seen
  '15':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called to Abraham a second time from heaven '
  '16':
  - type: text
    content: 'and said, '
  - type: note
    content: Ps. 105:9; Luke 1:73; Heb. 6:13
  - type: text
    content: '“By myself I have sworn, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', because you have done this and have not withheld your son, your only son, '
  '17':
  - type: text
    content: 'I will surely bless you, and I will surely multiply your offspring '
  - type: note
    content: Jer. 33:22; See ch. 15:5
  - type: text
    content: 'as the stars of heaven and '
  - type: note
    content: See ch. 13:16
  - type: text
    content: 'as the sand that is on the seashore. And your offspring shall possess '
  - type: note
    content: ch. 24:60; Ps. 127:5
  - type: text
    content: the gate of his
  - type: note
    content: Or their
  - type: text
    content: ' enemies, '
  '18':
  - type: text
    content: 'and '
  - type: note
    content: ch. 12:3; 18:18; 26:4; Gal. 3:8; Cited Acts 3:25
  - type: text
    content: 'in your offspring shall all the nations of the earth be blessed, '
  - type: note
    content: ver. 3; ch. 26:5
  - type: text
    content: 'because you have obeyed my voice.” '
  '19':
  - type: text
    content: 'So Abraham returned to his young men, and they arose and went together to '
  - type: note
    content: ch. 21:31
  - type: text
    content: 'Beersheba. And Abraham lived at '
  - type: note
    content: ch. 21:31
  - type: text
    content: Beersheba.
  '2':
  - type: text
    content: 'He said, “Take your son, your only son Isaac, whom you love, and go to '
  - type: note
    content: 2 Chr. 3:1
  - type: text
    content: 'the land of Moriah, and offer him there as a burnt offering on one of the mountains of which I shall tell you.” '
  '20':
  - type: text
    content: 'Now after these things it was told to Abraham, “Behold, '
  - type: note
    content: ch. 11:29
  - type: text
    content: 'Milcah also has borne children to your brother Nahor: '
  '21':
  - type: note
    content: Job 1:1
  - type: text
    content: 'Uz his firstborn, '
  - type: note
    content: Jer. 25:23
  - type: text
    content: 'Buz his brother, Kemuel the father of Aram, '
  '22':
  - type: text
    content: 'Chesed, Hazo, Pildash, Jidlaph, and Bethuel.” '
  '23':
  - type: text
    content: (
  - type: note
    content: ch. 24:15
  - type: text
    content: 'Bethuel fathered Rebekah.) These eight Milcah bore to Nahor, Abraham’s brother. '
  '24':
  - type: text
    content: Moreover, his concubine, whose name was Reumah, bore Tebah, Gaham, Tahash, and Maacah.
  '3':
  - type: text
    content: 'So Abraham rose early in the morning, saddled his donkey, and took two of his young men with him, and his son Isaac. And he cut the wood for the burnt offering and arose and went to the place of which God had told him. '
  '4':
  - type: text
    content: 'On the third day Abraham lifted up his eyes and saw the place from afar. '
  '5':
  - type: text
    content: Then Abraham said to his young men, “Stay here with the donkey; I and the boy
  - type: note
    content: Or young man; also verse 12
  - type: text
    content: ' will go over there and worship and come again to you.” '
  '6':
  - type: text
    content: 'And Abraham took the wood of the burnt offering and '
  - type: note
    content: '[John 19:17]'
  - type: text
    content: 'laid it on Isaac his son. And he took in his hand the fire and the knife. So they went both of them together. '
  '7':
  - type: text
    content: 'And Isaac said to his father Abraham, “My father!” And he said, “Here I am, my son.” He said, “Behold, the fire and the wood, but where is the lamb for a burnt offering?” '
  '8':
  - type: text
    content: 'Abraham said, '
  - type: note
    content: '[John 1:29, 36; 1 Pet. 1:19; Rev. 5:12]'
  - type: text
    content: “God will provide for himself the lamb for a burnt offering, my son.” So they went both of them together.
  '9':
  - type: text
    content: 'When they came to the place of which God had told him, Abraham built the altar there and laid the wood in order and bound Isaac his son and '
  - type: note
    content: Heb. 11:17; James 2:21
  - type: text
    content: 'laid him on the altar, on top of the wood. '
