document_id: 2KI.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Shunammite’s Land Restored
  - type: text
    content: 'Now Elisha had said to the woman '
  - type: note
    content: ch. 4:35
  - type: text
    content: 'whose son he had restored to life, “Arise, and depart with your household, and sojourn wherever you can, for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 105:16; Hag. 1:11
  - type: text
    content: 'has called for a famine, and it will come upon the land for '
  - type: note
    content: '[Gen. 41:27]'
  - type: text
    content: 'seven years.” '
  '10':
  - type: text
    content: 'And Elisha said to him, '
  - type: note
    content: ver. 14
  - type: text
    content: “Go, say to him, ‘You shall certainly recover,’ but
  - type: note
    content: Some manuscripts say, ‘You shall certainly not recover,’ for
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' has shown me that '
  - type: note
    content: ver. 15
  - type: text
    content: 'he shall certainly die.” '
  '11':
  - type: text
    content: 'And he fixed his gaze and stared at him, '
  - type: note
    content: ch. 2:17
  - type: text
    content: 'until he was embarrassed. And the man of God wept. '
  '12':
  - type: text
    content: 'And Hazael said, “Why does my lord weep?” He answered, “Because I know '
  - type: note
    content: ch. 10:32; 12:17; 13:3, 7, 22; Amos 1:3, 4
  - type: text
    content: 'the evil that you will do to the people of Israel. You will set on fire their fortresses, and you will kill their young men with the sword '
  - type: note
    content: Isa. 13:16; Hos. 13:16; Nah. 3:10; [Ps. 137:9; Hos. 10:14]
  - type: text
    content: 'and dash in pieces their little ones and rip open their pregnant women.” '
  '13':
  - type: text
    content: 'And Hazael said, “What is your servant, '
  - type: note
    content: See 1 Sam. 17:43
  - type: text
    content: 'who is but a dog, that he should do this great thing?” Elisha answered, '
  - type: note
    content: '[1 Kgs. 19:15]'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has shown me that you are to be king over Syria.” '
  '14':
  - type: text
    content: 'Then he departed from Elisha and came to his master, who said to him, “What did Elisha say to you?” And he answered, “He told me '
  - type: note
    content: ver. 10
  - type: text
    content: 'that you would certainly recover.” '
  '15':
  - type: text
    content: But the next day he took the bed cloth
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' and dipped it in water and spread it over his face, till he died. And Hazael became king in his place.'
  - type: heading
    content: Jehoram Reigns in Judah
  '16':
  - type: text
    content: 'In the fifth year of '
  - type: note
    content: '[ch. 1:17; 3:1]'
  - type: text
    content: Joram the son of Ahab, king of Israel, when Jehoshaphat was king of Judah,
  - type: note
    content: Septuagint, Syriac lack when Jehoshaphat was king of Judah
  - type: text
    content: ' Jehoram the son of Jehoshaphat, king of Judah, began to reign. '
  '17':
  - type: text
    content: 'He was '
  - type: note
    content: For ver. 17-24, see 2 Chr. 21:5-10
  - type: text
    content: 'thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '18':
  - type: text
    content: 'And he walked in the way of the kings of Israel, as the house of Ahab had done, for '
  - type: note
    content: '[ver. 26]'
  - type: text
    content: 'the daughter of Ahab was his wife. And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' was not willing to destroy Judah, for the sake of David his servant, '
  - type: note
    content: 2 Sam. 7:12, 13; Ps. 132:11
  - type: text
    content: 'since he promised to give '
  - type: note
    content: 1 Kgs. 11:36; 15:4; [2 Sam. 21:17]
  - type: text
    content: a lamp to him and to his sons forever.
  '2':
  - type: text
    content: 'So the woman arose and did according to the word of the man of God. She went with her household and sojourned in the land of the Philistines seven years. '
  '20':
  - type: text
    content: 'In his days Edom revolted from the rule of Judah and set up '
  - type: note
    content: ch. 3:9; [1 Kgs. 22:47]
  - type: text
    content: 'a king of their own. '
  '21':
  - type: text
    content: Then Joram
  - type: note
    content: Joram (also verses 23, 24) is an alternate spelling of Jehoram (son of Jehoshaphat), mentioned in verses 16, 25, 29
  - type: text
    content: ' passed over to Zair with all his chariots and rose by night, and he and his chariot commanders struck the Edomites who had surrounded him, but his army '
  - type: note
    content: See 2 Sam. 18:17
  - type: text
    content: 'fled home. '
  '22':
  - type: note
    content: '[Gen. 27:40]'
  - type: text
    content: 'So Edom revolted from the rule of Judah to this day. Then '
  - type: note
    content: Josh. 10:29, 30
  - type: text
    content: 'Libnah revolted at the same time. '
  '23':
  - type: text
    content: 'Now the rest of the acts of Joram, and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '24':
  - type: text
    content: 'So Joram slept with his fathers and was buried '
  - type: note
    content: '[2 Chr. 21:20]'
  - type: text
    content: 'with his fathers in the city of David, and '
  - type: note
    content: '[2 Chr. 21:17; 22:6; 25:23]'
  - type: text
    content: Ahaziah his son reigned in his place.
  - type: heading
    content: Ahaziah Reigns in Judah
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-29, see 2 Chr. 22:1-6
  - type: text
    content: 'In the '
  - type: note
    content: '[ch. 9:29]'
  - type: text
    content: 'twelfth year of Joram the son of Ahab, king of Israel, Ahaziah the son of Jehoram, king of Judah, began to reign. '
  '26':
  - type: text
    content: 'Ahaziah was '
  - type: note
    content: '[2 Chr. 22:2]'
  - type: text
    content: 'twenty-two years old when he began to reign, and he reigned one year in Jerusalem. His mother’s name was Athaliah; she was '
  - type: note
    content: '[1 Kgs. 15:10]'
  - type: text
    content: 'a granddaughter of Omri king of Israel. '
  '27':
  - type: text
    content: 'He also walked in the way of the house of Ahab and did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the house of Ahab had done, for he was son-in-law to the house of Ahab.'
  '28':
  - type: text
    content: 'He went with Joram the son of Ahab to make war against '
  - type: note
    content: ver. 15
  - type: text
    content: 'Hazael king of Syria at '
  - type: note
    content: '[1 Kgs. 22:3]'
  - type: text
    content: 'Ramoth-gilead, and the Syrians wounded Joram. '
  '29':
  - type: note
    content: ch. 9:15
  - type: text
    content: 'And King Joram returned to be healed in Jezreel of the wounds that the Syrians had given him at '
  - type: note
    content: 2 Chr. 22:6; [ver. 28; 2 Chr. 22:5]
  - type: text
    content: 'Ramah, when he fought against Hazael king of Syria. And '
  - type: note
    content: ch. 9:16
  - type: text
    content: Ahaziah the son of Jehoram king of Judah went down to see Joram the son of Ahab in Jezreel, because he was sick.
  '3':
  - type: text
    content: 'And at the end of the seven years, when the woman returned from the land of the Philistines, she went to appeal to the king for her house and her land. '
  '4':
  - type: text
    content: 'Now the king was talking with '
  - type: note
    content: See ch. 4:12
  - type: text
    content: 'Gehazi the servant of the man of God, saying, “Tell me all the great things that Elisha has done.” '
  '5':
  - type: text
    content: 'And while he was telling the king how '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Elisha had restored the dead to life, behold, the woman whose son he had restored to life appealed to the king for her house and her land. And Gehazi said, “My lord, O king, here is the woman, and here is her son whom Elisha restored to life.” '
  '6':
  - type: text
    content: And when the king asked the woman, she told him. So the king appointed an official for her, saying, “Restore all that was hers, together with all the produce of the fields from the day that she left the land until now.”
  - type: heading
    content: Hazael Murders Ben-hadad
  '7':
  - type: text
    content: 'Now Elisha came to '
  - type: note
    content: '[1 Kgs. 11:24]'
  - type: text
    content: 'Damascus. '
  - type: note
    content: ch. 6:24; 1 Kgs. 20:1
  - type: text
    content: 'Ben-hadad the king of Syria was sick. And when it was told him, “The man of God has come here,” '
  '8':
  - type: text
    content: 'the king said to '
  - type: note
    content: 1 Kgs. 19:15, 17
  - type: text
    content: 'Hazael, '
  - type: note
    content: See 1 Sam. 9:7
  - type: text
    content: '“Take a present with you and go to meet the man of God, '
  - type: note
    content: '[ch. 1:2]'
  - type: text
    content: 'and inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ' through him, saying, ‘Shall I recover from this sickness?’” '
  '9':
  - type: text
    content: 'So Hazael went to meet him, and took a present with him, all kinds of goods of Damascus, forty camels’ loads. When he came and stood before him, he said, '
  - type: note
    content: '[ch. 5:13]'
  - type: text
    content: '“Your son Ben-hadad king of Syria has sent me to you, saying, ‘Shall I recover from this sickness?’” '
