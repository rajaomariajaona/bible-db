    children:
    - type: text
      text: 'They said to Joshua, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: '“We are your servants.” And Joshua said to them, “Who are you? And where do you come from?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 20:15
      marker-yv: yv-n
    - type: text
      text: '“From a very distant country your servants have come, because of the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:27
      marker-yv: yv-n
    - type: text
      text: 'For we have heard a report of him, and all that he did in Egypt, '
