        - type: text
          text: Deut. 1:4
      marker-yv: yv-n
    - type: text
      text: 'Ashtaroth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So our elders and all the inhabitants of our country said to us, ‘Take provisions in your hand for the journey and go to meet them and say to them, “We are your servants. Come now, make a covenant with us.”’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is our bread. It was still warm when we took it from our houses as our food for the journey on the day we set out to come to you, but now, behold, it is dry and crumbly. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These wineskins were new when we filled them, and behold, they have burst. And these garments and sandals of ours are worn out from the very long journey.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men took some of their provisions, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 27:21
      marker-yv: yv-n
    - type: text
      text: 'did not ask counsel from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:19
      marker-yv: yv-n
    - type: text
      text: made peace with them and made a covenant with them, to let them live, and the leaders of the congregation swore to them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of three days after they had made a covenant with them, they heard that they were their neighbors '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: 'and that they lived among them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel set out and reached their cities on the third day. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:25-28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 2:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Now their cities were Gibeon, Chephirah, Beeroth, and Kiriath-jearim. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of Israel did not attack them, because the leaders of the congregation had sworn to them by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. Then all the congregation murmured against the leaders. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But all the leaders said to all the congregation, “We have sworn to them by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, and now we may not touch them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they gathered together as one to fight against Joshua and Israel.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This we will do to them: let them live, lest '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:53
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'wrath be upon us, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 21:2
      marker-yv: yv-n
    - type: text
      text: 'because of the oath that we swore to them.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the leaders said to them, “Let them live.” So they became '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23, 27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 29:11
      marker-yv: yv-n
    - type: text
      text: 'cutters of wood and drawers of water for all the congregation, just as the leaders '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      marker-yv: yv-n
    - type: text
      text: had said of them.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua summoned them, and he said to them, “Why did you deceive us, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6, 9
      marker-yv: yv-n
    - type: text
      text: '‘We are very far from you,’ when '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'you dwell among us? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore you are cursed, and some of you shall never be anything but servants, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21, 27
      marker-yv: yv-n
    - type: text
      text: 'cutters of wood and drawers of water for the house of my God.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered Joshua, “Because it was told to your servants for a certainty that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God had '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'commanded his servant Moses to give you all the land and to destroy all the inhabitants of the land from before you—so '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 15:14
      marker-yv: yv-n
    - type: text
      text: 'we feared greatly for our lives because of you and did this thing. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, behold, we are in your hand. Whatever seems good and right in your sight to do to us, do it.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he did this to them and delivered them out of the hand of the people of Israel, and they did not kill them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joshua made them that day '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21, 23
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 9:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezra 2:43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 7:60
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'cutters of wood and drawers of water for the congregation and for the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to this day, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 12:5
      marker-yv: yv-n
    - type: text
      text: in the place that he should choose.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the inhabitants of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
