      metadata:
        usfm: JOS.9.11
    marker-yv: yv-n
  - type: text
    text: '“We are your servants.” And Joshua said to them, “Who are you? And where do you come from?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They said to him, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 20:15
      metadata:
        usfm: DEU.20.15
    marker-yv: yv-n
  - type: text
