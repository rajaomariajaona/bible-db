  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joshua summoned them, and he said to them, “Why did you deceive us, saying, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6, 9
      metadata:
        usfm: JOS.9.6
    marker-yv: yv-n
  - type: text
    text: '‘We are very far from you,’ when '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JOS.9.16
    marker-yv: yv-n
