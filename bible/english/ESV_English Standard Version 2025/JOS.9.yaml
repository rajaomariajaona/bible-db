      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:2
      marker-yv: yv-n
    - type: text
      text: 'Gibeon heard what Joshua had done '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      marker-yv: yv-n
    - type: text
      text: 'to Jericho and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      marker-yv: yv-n
    - type: text
      text: 'to Ai, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they on their part acted with cunning and went and made ready provisions and took worn-out sacks for their donkeys, and wineskins, worn-out and torn and mended, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with worn-out, patched sandals on their feet, and worn-out clothes. And all their provisions were dry and crumbly. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they went to Joshua in '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      marker-yv: yv-n
    - type: text
      text: 'the camp at Gilgal and said to him and to the men of Israel, “We have come from a distant country, so now make a covenant with us.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men of Israel said to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:19
      marker-yv: yv-n
    - type: text
      text: 'the Hivites, “Perhaps you live among us; then '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 23:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 2:2
      marker-yv: yv-n
    - type: text
      text: 'how can we make a covenant with you?” '
  '8':
  - type: usfm
