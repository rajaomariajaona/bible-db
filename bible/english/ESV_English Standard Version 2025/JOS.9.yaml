      metadata:
        usfm: NUM.21.21+NUM.21.22+NUM.21.23+NUM.21.24+NUM.21.25+NUM.21.26+NUM.21.27+NUM.21.28+NUM.21.29+NUM.21.30+NUM.21.31+NUM.21.32+NUM.21.33+NUM.21.34+NUM.21.35
    marker-yv: yv-n
  - type: text
    text: 'and all that he did to the two kings of the Amorites who were beyond the Jordan, to Sihon the king of Heshbon, and to Og king of Bashan, who lived in '
