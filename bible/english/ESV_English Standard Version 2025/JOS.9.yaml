        - type: text
          text: 12:8
      marker-yv: yv-n
    - type: text
      text: 'the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites, heard of this, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
