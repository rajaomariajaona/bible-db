  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They answered Joshua, “Because it was told to your servants for a certainty that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God had '
  - type: usfm
    marker: x
    children:
    - type: usfm
