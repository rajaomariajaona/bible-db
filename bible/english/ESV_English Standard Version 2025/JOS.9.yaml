document_id: JOS.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gibeonite Deception
  - type: text
    content: 'As soon as all the kings who were beyond the Jordan '
  - type: note
    content: Deut. 1:7
  - type: text
    content: 'in the hill country and in the lowland all along the coast '
  - type: note
    content: Num. 34:6
  - type: text
    content: 'of the Great Sea toward Lebanon, '
  - type: note
    content: ch. 3:10; 12:8
  - type: text
    content: 'the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites, heard of this, '
  '10':
  - type: note
    content: See Num. 21:21-35
  - type: text
    content: 'and all that he did to the two kings of the Amorites who were beyond the Jordan, to Sihon the king of Heshbon, and to Og king of Bashan, who lived in '
  - type: note
    content: ch. 12:4; Deut. 1:4
  - type: text
    content: 'Ashtaroth. '
  '11':
  - type: text
    content: 'So our elders and all the inhabitants of our country said to us, ‘Take provisions in your hand for the journey and go to meet them and say to them, “We are your servants. Come now, make a covenant with us.”’ '
  '12':
  - type: text
    content: 'Here is our bread. It was still warm when we took it from our houses as our food for the journey on the day we set out to come to you, but now, behold, it is dry and crumbly. '
  '13':
  - type: text
    content: 'These wineskins were new when we filled them, and behold, they have burst. And these garments and sandals of ours are worn out from the very long journey.” '
  '14':
  - type: text
    content: 'So the men took some of their provisions, but '
  - type: note
    content: Num. 27:21
  - type: text
    content: 'did not ask counsel from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And Joshua '
  - type: note
    content: ch. 11:19
  - type: text
    content: made peace with them and made a covenant with them, to let them live, and the leaders of the congregation swore to them.
  '16':
  - type: text
    content: 'At the end of three days after they had made a covenant with them, they heard that they were their neighbors '
  - type: note
    content: ver. 22
  - type: text
    content: 'and that they lived among them. '
  '17':
  - type: text
    content: 'And the people of Israel set out and reached their cities on the third day. '
  - type: note
    content: '[ch. 18:25-28; Ezra 2:25]'
  - type: text
    content: 'Now their cities were Gibeon, Chephirah, Beeroth, and Kiriath-jearim. '
  '18':
  - type: text
    content: 'But the people of Israel did not attack them, because the leaders of the congregation had sworn to them by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. Then all the congregation murmured against the leaders. '
  '19':
  - type: text
    content: 'But all the leaders said to all the congregation, “We have sworn to them by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and now we may not touch them. '
  '2':
  - type: text
    content: they gathered together as one to fight against Joshua and Israel.
  '20':
  - type: text
    content: 'This we will do to them: let them live, lest '
  - type: note
    content: '[Num. 1:53]'
  - type: text
    content: 'wrath be upon us, '
  - type: note
    content: 2 Sam. 21:2
  - type: text
    content: 'because of the oath that we swore to them.” '
  '21':
  - type: text
    content: 'And the leaders said to them, “Let them live.” So they became '
  - type: note
    content: ver. 23, 27; Deut. 29:11
  - type: text
    content: 'cutters of wood and drawers of water for all the congregation, just as the leaders '
  - type: note
    content: ver. 15
  - type: text
    content: had said of them.
  '22':
  - type: text
    content: 'Joshua summoned them, and he said to them, “Why did you deceive us, saying, '
  - type: note
    content: ver. 6, 9
  - type: text
    content: '‘We are very far from you,’ when '
  - type: note
    content: ver. 16
  - type: text
    content: 'you dwell among us? '
  '23':
  - type: text
    content: 'Now therefore you are cursed, and some of you shall never be anything but servants, '
  - type: note
    content: ver. 21, 27
  - type: text
    content: 'cutters of wood and drawers of water for the house of my God.” '
  '24':
  - type: text
    content: 'They answered Joshua, “Because it was told to your servants for a certainty that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God had '
  - type: note
    content: Deut. 7:1, 2
  - type: text
    content: 'commanded his servant Moses to give you all the land and to destroy all the inhabitants of the land from before you—so '
  - type: note
    content: Ex. 15:14
  - type: text
    content: 'we feared greatly for our lives because of you and did this thing. '
  '25':
  - type: text
    content: 'And now, behold, we are in your hand. Whatever seems good and right in your sight to do to us, do it.” '
  '26':
  - type: text
    content: 'So he did this to them and delivered them out of the hand of the people of Israel, and they did not kill them. '
  '27':
  - type: text
    content: 'But Joshua made them that day '
  - type: note
    content: ver. 21, 23; [1 Chr. 9:2; Ezra 2:43; 8:20; Neh. 7:60; 11:3]
  - type: text
    content: 'cutters of wood and drawers of water for the congregation and for the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', to this day, '
  - type: note
    content: Deut. 12:5
  - type: text
    content: in the place that he should choose.
  '3':
  - type: text
    content: 'But when the inhabitants of '
  - type: note
    content: ch. 10:2, 10, 12; 2 Sam. 21:1, 2; 1 Kgs. 3:4, 5; 9:2
  - type: text
    content: 'Gibeon heard what Joshua had done '
  - type: note
    content: ch. 6:21, 24
  - type: text
    content: 'to Jericho and '
  - type: note
    content: ch. 8:26, 28
  - type: text
    content: 'to Ai, '
  '4':
  - type: text
    content: 'they on their part acted with cunning and went and made ready provisions and took worn-out sacks for their donkeys, and wineskins, worn-out and torn and mended, '
  '5':
  - type: text
    content: 'with worn-out, patched sandals on their feet, and worn-out clothes. And all their provisions were dry and crumbly. '
  '6':
  - type: text
    content: 'And they went to Joshua in '
  - type: note
    content: ch. 5:10
  - type: text
    content: 'the camp at Gilgal and said to him and to the men of Israel, “We have come from a distant country, so now make a covenant with us.” '
  '7':
  - type: text
    content: 'But the men of Israel said to '
  - type: note
    content: ch. 11:19
  - type: text
    content: 'the Hivites, “Perhaps you live among us; then '
  - type: note
    content: Ex. 23:32; Deut. 7:2; Judg. 2:2
  - type: text
    content: 'how can we make a covenant with you?” '
  '8':
  - type: text
    content: 'They said to Joshua, '
  - type: note
    content: ver. 11
  - type: text
    content: '“We are your servants.” And Joshua said to them, “Who are you? And where do you come from?” '
  '9':
  - type: text
    content: 'They said to him, '
  - type: note
    content: Deut. 20:15
  - type: text
    content: '“From a very distant country your servants have come, because of the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  - type: note
    content: ch. 2:10; 6:27
  - type: text
    content: 'For we have heard a report of him, and all that he did in Egypt, '
