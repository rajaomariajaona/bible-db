    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezra 2:25
      metadata:
        usfm: EZR.2.25
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'Now their cities were Gibeon, Chephirah, Beeroth, and Kiriath-jearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the people of Israel did not attack them, because the leaders of the congregation had sworn to them by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. Then all the congregation murmured against the leaders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But all the leaders said to all the congregation, “We have sworn to them by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, and now we may not touch them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
