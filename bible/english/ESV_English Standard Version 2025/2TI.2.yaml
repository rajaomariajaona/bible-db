document_id: 2TI.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Good Soldier of Christ Jesus
  - type: text
    content: 'You then, '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'my child, '
  - type: note
    content: See Eph. 6:10
  - type: text
    content: 'be strengthened by the grace that is in Christ Jesus, '
  '10':
  - type: text
    content: 'Therefore '
  - type: note
    content: Eph. 3:13; Col. 1:24; [1 Cor. 13:7]
  - type: text
    content: 'I endure everything for the sake of the elect, that they also may obtain '
  - type: note
    content: 2 Cor. 1:6
  - type: text
    content: 'the salvation that is in Christ Jesus with '
  - type: note
    content: 1 Pet. 5:10
  - type: text
    content: 'eternal glory. '
  '11':
  - type: text
    content: 'The saying is '
  - type: note
    content: See 1 Tim. 1:15
  - type: text
    content: 'trustworthy, for:'
  - type: note
    content: '[ 1 Thess. 5:10 ]; See Rom. 6:8'
  - type: text
    content: 'If we have died with him, we will also '
  - type: note
    content: Rev. 20:4
  - type: text
    content: live with him;
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Thess. 1:4, 5 ]; See Rom. 8:17; Heb. 10:36; Rev. 20:4'
  - type: text
    content: if we endure, we will also reign with him;
  - type: note
    content: See Matt. 10:33
  - type: text
    content: if we deny him, he also will deny us;
  '13':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 3:3
  - type: text
    content: 'if we are faithless, '
  - type: note
    content: See 1 Cor. 1:9
  - type: text
    content: he remains faithful—
  - type: text
    content: 'for '
  - type: note
    content: Num. 23:19; Titus 1:2
  - type: text
    content: he cannot deny himself.
  - type: heading
    content: A Worker Approved by God
  '14':
  - type: text
    content: 'Remind them of these things, and '
  - type: note
    content: 1 Tim. 5:21; 6:13
  - type: text
    content: charge them before God
  - type: note
    content: Some manuscripts the Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Tim. 6:4; [ver. 23]
  - type: text
    content: 'not to quarrel about words, '
  - type: note
    content: Titus 3:9
  - type: text
    content: 'which does no good, but only ruins the hearers. '
  '15':
  - type: text
    content: Do your best to present yourself to God as one approved,
  - type: note
    content: That is, one approved after being tested
  - type: text
    content: ' a worker '
  - type: note
    content: '[Phil. 1:20]'
  - type: text
    content: 'who has no need to be ashamed, rightly handling the word of truth. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: Titus 3:9
  - type: text
    content: 'avoid '
  - type: note
    content: 1 Tim. 6:20
  - type: text
    content: 'irreverent babble, for it will lead people into more and more ungodliness, '
  '17':
  - type: text
    content: 'and their talk will spread like gangrene. Among them are '
  - type: note
    content: 1 Tim. 1:20
  - type: text
    content: 'Hymenaeus and Philetus, '
  '18':
  - type: text
    content: 'who have swerved from the truth, '
  - type: note
    content: '[1 Cor. 15:12]'
  - type: text
    content: 'saying that the resurrection has already happened. They are upsetting the faith of some. '
  '19':
  - type: text
    content: 'But God’s firm foundation stands, bearing this seal: '
  - type: note
    content: Num. 16:5; Nah. 1:7; John 10:14, 27; [Luke 13:27]; See 1 Cor. 8:3
  - type: text
    content: '“The Lord knows those who are his,” and, “Let everyone '
  - type: note
    content: Isa. 26:13
  - type: text
    content: who names the name of the Lord depart from iniquity.”
  '2':
  - type: text
    content: 'and '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'what you have heard from me in the presence of many witnesses '
  - type: note
    content: 1 Tim. 1:18
  - type: text
    content: entrust to faithful men,
  - type: note
    content: The Greek word anthropoi can refer to both men and women, depending on the context
  - type: text
    content: ' '
  - type: note
    content: '[Titus 1:5]'
  - type: text
    content: 'who will be able to teach others also. '
  '20':
  - type: text
    content: 'Now in '
  - type: note
    content: See 1 Tim. 3:15
  - type: text
    content: 'a great house there are not only vessels of gold and silver but also of wood and clay, '
  - type: note
    content: Rom. 9:21
  - type: text
    content: 'some for honorable use, some for dishonorable. '
  '21':
  - type: text
    content: 'Therefore, '
  - type: note
    content: '[Prov. 25:4; Isa. 52:11]'
  - type: text
    content: if anyone cleanses himself from what is dishonorable,
  - type: note
    content: Greek from these things
  - type: text
    content: ' he will be a vessel for honorable use, set apart as holy, useful to the master of the house, '
  - type: note
    content: ch. 3:17; Titus 3:1; [1 Tim. 5:10]
  - type: text
    content: ready for every good work.
  '22':
  - type: text
    content: 'So '
  - type: note
    content: 1 Tim. 6:11
  - type: text
    content: 'flee '
  - type: note
    content: '[1 Tim. 4:12]'
  - type: text
    content: 'youthful passions and pursue righteousness, faith, love, and peace, along with '
  - type: note
    content: Acts 7:59; 9:14
  - type: text
    content: 'those who call on the Lord '
  - type: note
    content: 1 Tim. 1:5
  - type: text
    content: 'from a pure heart. '
  '23':
  - type: text
    content: 'Have nothing to do with foolish, ignorant '
  - type: note
    content: See 1 Tim. 6:4
  - type: text
    content: 'controversies; you know that they breed quarrels. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: '[1 Tim. 3:3]'
  - type: text
    content: the Lord’s servant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' must not be quarrelsome but '
  - type: note
    content: 1 Thess. 2:7
  - type: text
    content: 'kind to everyone, '
  - type: note
    content: 1 Tim. 3:2
  - type: text
    content: 'able to teach, patiently enduring evil, '
  '25':
  - type: text
    content: 'correcting his opponents '
  - type: note
    content: Gal. 6:1; Titus 3:2; [1 Tim. 6:11; 1 Pet. 3:15]
  - type: text
    content: 'with gentleness. God '
  - type: note
    content: Dan. 4:27; Acts 8:22; See Acts 5:31
  - type: text
    content: 'may perhaps grant them repentance '
  - type: note
    content: See 1 Tim. 2:4
  - type: text
    content: 'leading to a knowledge of the truth, '
  '26':
  - type: text
    content: 'and they may come to their senses and escape from '
  - type: note
    content: 1 Tim. 3:7
  - type: text
    content: the snare of the devil, after being captured by him to do his will.
  '3':
  - type: note
    content: ch. 1:8; 4:5
  - type: text
    content: 'Share in suffering as '
  - type: note
    content: 1 Tim. 1:18
  - type: text
    content: 'a good soldier of Christ Jesus. '
  '4':
  - type: text
    content: 'No soldier '
  - type: note
    content: 2 Pet. 2:20
  - type: text
    content: 'gets entangled in civilian pursuits, since his aim is to please the one who enlisted him. '
  '5':
  - type: note
    content: See 1 Cor. 9:25
  - type: text
    content: 'An athlete is not '
  - type: note
    content: '[ch. 4:8]'
  - type: text
    content: 'crowned unless he competes according to the rules. '
  '6':
  - type: text
    content: 'It is '
  - type: note
    content: 1 Cor. 9:10; [Heb. 6:7]
  - type: text
    content: 'the hard-working farmer who ought to have the first share of the crops. '
  '7':
  - type: text
    content: Think over what I say, for the Lord will give you understanding in everything.
  '8':
  - type: text
    content: 'Remember Jesus Christ, '
  - type: note
    content: 1 Cor. 15:20
  - type: text
    content: 'risen from the dead, the '
  - type: note
    content: See Matt. 1:1
  - type: text
    content: 'offspring of David, '
  - type: note
    content: See Rom. 2:16
  - type: text
    content: 'as preached in my gospel, '
  '9':
  - type: note
    content: ch. 1:8, 12
  - type: text
    content: 'for which I am suffering, '
  - type: note
    content: See Phil. 1:7
  - type: text
    content: 'bound with chains as a criminal. But '
  - type: note
    content: '[ch. 4:17]; See Phil. 1:13'
  - type: text
    content: 'the word of God is not bound! '
