document_id: EZK.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Soul Who Sins Shall Die
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“If he fathers a son who is violent, '
  - type: note
    content: See ch. 16:38
  - type: text
    content: 'a shedder of blood, who does any of these things '
  '11':
  - type: text
    content: '(though he himself did none of these things), '
  - type: note
    content: See ver. 6
  - type: text
    content: 'who even eats upon the mountains, '
  - type: note
    content: ver. 6; [Lev. 18:20]
  - type: text
    content: 'defiles his neighbor’s wife, '
  '12':
  - type: text
    content: 'oppresses the poor and needy, '
  - type: note
    content: ver. 7
  - type: text
    content: 'commits robbery, '
  - type: note
    content: ver. 7
  - type: text
    content: 'does not restore the pledge, '
  - type: note
    content: ver. 6
  - type: text
    content: 'lifts up his eyes to the idols, '
  - type: note
    content: ch. 8:6, 17
  - type: text
    content: 'commits abomination, '
  '13':
  - type: note
    content: See ver. 8
  - type: text
    content: 'lends at interest, and takes profit; shall he then live? He shall not live. He has done all these abominations; he shall surely die; '
  - type: note
    content: ch. 33:4; Lev. 20:9, 11; See ch. 3:18
  - type: text
    content: his blood shall be upon himself.
  '14':
  - type: text
    content: '“Now suppose this man fathers a son who sees all the sins that his father has done; he sees, and does not do likewise: '
  '15':
  - type: text
    content: 'he does not eat upon the mountains or lift up his eyes to the idols of the house of Israel, does not defile his neighbor’s wife, '
  '16':
  - type: text
    content: 'does not oppress anyone, '
  - type: note
    content: '[ver. 7, 12]'
  - type: text
    content: 'exacts no pledge, '
  - type: note
    content: ver. 7
  - type: text
    content: 'commits no robbery, '
  - type: note
    content: See ver. 7
  - type: text
    content: 'but gives his bread to the hungry '
  - type: note
    content: See ver. 7
  - type: text
    content: 'and covers the naked with a garment, '
  '17':
  - type: text
    content: withholds his hand from iniquity,
  - type: note
    content: Septuagint; Hebrew from the poor
  - type: text
    content: ' takes no interest or profit, obeys my rules, '
  - type: note
    content: ver. 9
  - type: text
    content: 'and walks in my statutes; he shall not die for his father’s iniquity; '
  - type: note
    content: See ver. 9
  - type: text
    content: 'he shall surely live. '
  '18':
  - type: text
    content: 'As for his father, because he practiced extortion, robbed his brother, and did what is not good among his people, '
  - type: note
    content: See ch. 3:18
  - type: text
    content: behold, he shall die for his iniquity.
  '19':
  - type: text
    content: '“Yet you say, '
  - type: note
    content: Ex. 20:5; [ver. 2]
  - type: text
    content: '‘Why should not the son suffer for the iniquity of the father?’ When the son has done '
  - type: note
    content: ver. 5, 21, 27
  - type: text
    content: 'what is just and right, and has been careful to observe all my statutes, '
  - type: note
    content: See ver. 9
  - type: text
    content: 'he shall surely live. '
  '2':
  - type: text
    content: “What do you
  - type: note
    content: The Hebrew for you is plural
  - type: text
    content: ' mean '
  - type: note
    content: '[ch. 12:22; 16:44]'
  - type: text
    content: 'by repeating this proverb concerning the land of Israel, '
  - type: note
    content: Jer. 31:29
  - type: text
    content: '‘The fathers have eaten sour grapes, and the children’s teeth are set on edge’? '
  '20':
  - type: note
    content: ver. 4
  - type: text
    content: 'The soul who sins shall die. '
  - type: note
    content: See 2 Kgs. 14:6
  - type: text
    content: 'The son shall not suffer for the iniquity of the father, nor the father suffer for the iniquity of the son. '
  - type: note
    content: Isa. 3:10, 11
  - type: text
    content: 'The righteousness of the righteous shall be upon himself, '
  - type: note
    content: '[Rom. 2:9]'
  - type: text
    content: and the wickedness of the wicked shall be upon himself.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See ver. 27
  - type: text
    content: '“But if a wicked person turns away from all his sins that he has committed and keeps all my statutes and does '
  - type: note
    content: ver. 5, 19
  - type: text
    content: 'what is just and right, '
  - type: note
    content: ver. 9
  - type: text
    content: 'he shall surely live; he shall not die. '
  '22':
  - type: note
    content: ch. 33:16
  - type: text
    content: 'None of the transgressions that he has committed shall be remembered against him; for the righteousness that he has done he shall live. '
  '23':
  - type: note
    content: ver. 32; ch. 33:11; 1 Tim. 2:4, 6; 2 Pet. 3:9; [Titus 2:11]
  - type: text
    content: 'Have I any pleasure in the death of the wicked, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', and not rather that he should turn from his way and live? '
  '24':
  - type: note
    content: ch. 3:20; 33:12, 13, 18
  - type: text
    content: 'But when a righteous person turns away from his righteousness and does injustice and does the same abominations that the wicked person does, shall he live? '
  - type: note
    content: '[2 Pet. 2:20, 21]'
  - type: text
    content: 'None of the righteous deeds that he has done shall be remembered; for '
  - type: note
    content: See ch. 14:13
  - type: text
    content: the treachery of which he is guilty and the sin he has committed, for them he shall die.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 33:17, 20
  - type: text
    content: '“Yet you say, ‘The way of the Lord is not just.’ Hear now, O house of Israel: Is my way not just? Is it not your ways that are not just? '
  '26':
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'When a righteous person turns away from his righteousness and does injustice, he shall die for it; for the injustice that he has done he shall die. '
  '27':
  - type: text
    content: 'Again, '
  - type: note
    content: ver. 21; ch. 33:19; [ch. 13:22; 33:11, 12]
  - type: text
    content: 'when a wicked person turns away from the wickedness he has committed and does what is just and right, he shall save his life. '
  '28':
  - type: text
    content: 'Because he considered and turned away from all the transgressions that he had committed, he shall surely live; he shall not die. '
  '29':
  - type: text
    content: Yet the house of Israel says, ‘The way of the Lord is not just.’ O house of Israel, are my ways not just? Is it not your ways that are not just?
  '3':
  - type: note
    content: See ch. 16:48
  - type: text
    content: 'As I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: Jer. 31:29, 30
  - type: text
    content: 'this proverb shall no more be used by you in Israel. '
  '30':
  - type: text
    content: '“Therefore '
  - type: note
    content: ch. 7:3, 8; 33:20; 36:19; [ch. 39:24]
  - type: text
    content: 'I will judge you, O house of Israel, every one according to his ways, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: note
    content: '[ch. 14:6; Hos. 14:1]'
  - type: text
    content: 'Repent and turn from all your transgressions, '
  - type: note
    content: '[Isa. 3:8]'
  - type: text
    content: lest iniquity be your ruin.
  - type: note
    content: Or lest iniquity be your stumbling block
  - type: text
    content: ' '
  '31':
  - type: note
    content: '[ch. 20:7]'
  - type: text
    content: 'Cast away from you all the transgressions that you have committed, and '
  - type: note
    content: See ch. 11:19
  - type: text
    content: 'make yourselves a new heart and a new spirit! '
  - type: note
    content: ch. 33:11
  - type: text
    content: 'Why will you die, O house of Israel? '
  '32':
  - type: note
    content: See ver. 23
  - type: text
    content: 'For I have no pleasure in the death of anyone, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '; '
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: so turn, and live.”
  '4':
  - type: text
    content: 'Behold, all souls are mine; the soul of the father as well as the soul of the son is mine: '
  - type: note
    content: ver. 20
  - type: text
    content: the soul who sins shall die.
  '5':
  - type: text
    content: '“If a man is righteous and does '
  - type: note
    content: ver. 19, 21, 27
  - type: text
    content: 'what is just and right— '
  '6':
  - type: text
    content: 'if he '
  - type: note
    content: ver. 11, 15; ch. 22:9
  - type: text
    content: 'does not eat upon the mountains or '
  - type: note
    content: ch. 33:25
  - type: text
    content: 'lift up his eyes to the idols of the house of Israel, '
  - type: note
    content: ver. 11, 15; [ch. 22:11]
  - type: text
    content: 'does not defile his neighbor’s wife '
  - type: note
    content: Lev. 18:19
  - type: text
    content: 'or approach '
  - type: note
    content: ch. 22:10
  - type: text
    content: 'a woman in her time of menstrual impurity, '
  '7':
  - type: note
    content: ver. 12, 16; Ex. 22:21
  - type: text
    content: 'does not oppress anyone, but '
  - type: note
    content: ver. 12; ch. 33:15; Ex. 22:26
  - type: text
    content: 'restores to the debtor his pledge, '
  - type: note
    content: ver. 12, 16, 18
  - type: text
    content: 'commits no robbery, '
  - type: note
    content: ver. 16; Isa. 58:7; [Matt. 25:35, 36]
  - type: text
    content: 'gives his bread to the hungry '
  - type: note
    content: ver. 16; Isa. 58:7; [Matt. 25:35, 36]
  - type: text
    content: 'and covers the naked with a garment, '
  '8':
  - type: note
    content: ver. 13, 17; ch. 22:12; Ex. 22:25; Ps. 15:5
  - type: text
    content: 'does not lend at interest '
  - type: note
    content: ver. 13, 17; ch. 22:12; Ex. 22:25; Ps. 15:5
  - type: text
    content: or take any profit,
  - type: note
    content: That is, profit that comes from charging interest to the poor; also verses 13, 17 (compare Leviticus 25:36)
  - type: text
    content: ' withholds his hand from injustice, '
  - type: note
    content: Deut. 1:16; Zech. 8:16
  - type: text
    content: 'executes true justice between man and man, '
  '9':
  - type: note
    content: ver. 17
  - type: text
    content: 'walks in my statutes, and keeps my rules by acting faithfully—he is righteous; '
  - type: note
    content: ver. 17, 19, 21; ch. 20:11; Amos 5:4
  - type: text
    content: 'he shall surely live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
