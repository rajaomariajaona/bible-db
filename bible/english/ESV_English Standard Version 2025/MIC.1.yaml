document_id: MIC.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Micah '
  - type: note
    content: '[ver. 14]'
  - type: text
    content: 'of Moresheth '
  - type: note
    content: Isa. 1:1
  - type: text
    content: 'in the days of Jotham, Ahaz, and Hezekiah, kings of Judah, which he saw '
  - type: note
    content: Amos 1:1
  - type: text
    content: 'concerning '
  - type: note
    content: Isa. 7:9; Jer. 23:13
  - type: text
    content: Samaria and Jerusalem.
  - type: heading
    content: The Coming Destruction
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 1:20
  - type: text
    content: 'Tell it not in '
  - type: note
    content: See 1 Sam. 17:4
  - type: text
    content: Gath;
  - type: text
    content: weep not at all;
  - type: text
    content: in Beth-le-aphrah
  - type: note
    content: '[ Jer. 6:26 ]'
  - type: text
    content: roll yourselves in the dust.
  '11':
  - type: text
    content: Pass on your way,
  - type: text
    content: inhabitants of Shaphir,
  - type: note
    content: '[ Isa. 20:4; 47:3 ]'
  - type: text
    content: in nakedness and shame;
  - type: text
    content: the inhabitants of Zaanan
  - type: text
    content: do not come out;
  - type: text
    content: the lamentation of Beth-ezel
  - type: text
    content: shall take away from you its standing place.
  '12':
  - type: text
    content: For the inhabitants of Maroth
  - type: text
    content: wait anxiously for good,
  - type: text
    content: 'because disaster has come down '
  - type: note
    content: See Amos 3:6
  - type: text
    content: 'from the '
  - type: text
    content: Lord
  - type: text
    content: to the gate of Jerusalem.
  '13':
  - type: text
    content: Harness the steeds to the chariots,
  - type: text
    content: 'inhabitants of '
  - type: note
    content: Josh. 10:3; 2 Kgs. 18:14, 17; 2 Chr. 32:9
  - type: text
    content: Lachish;
  - type: text
    content: it was the beginning of sin
  - type: text
    content: to the daughter of Zion,
  - type: text
    content: for in you were found
  - type: note
    content: '[ver. 5; Hos. 13:1 ]'
  - type: text
    content: the transgressions of Israel.
  '14':
  - type: text
    content: Therefore you shall give parting gifts
  - type: note
    content: Or give dowry
  - type: text
    content: 'to '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: Moresheth-gath;
  - type: text
    content: 'the houses of '
  - type: note
    content: Josh. 15:44
  - type: text
    content: Achzib shall be a deceitful thing
  - type: text
    content: to the kings of Israel.
  '15':
  - type: text
    content: 'I will again bring '
  - type: note
    content: '[ch. 2:4; Jer. 6:12]'
  - type: text
    content: a conqueror to you,
  - type: text
    content: 'inhabitants of '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: Mareshah;
  - type: text
    content: the glory of Israel
  - type: text
    content: 'shall come to '
  - type: note
    content: See 1 Sam. 22:1, 2
  - type: text
    content: Adullam.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Isa. 22:12
  - type: text
    content: Make yourselves bald and cut off your hair,
  - type: text
    content: for the children of your delight;
  - type: note
    content: See Isa. 22:12
  - type: text
    content: make yourselves as bald as the eagle,
  - type: text
    content: for they shall go from you into exile.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:1, 9; 6:1, 2; See Hos. 5:1
  - type: text
    content: Hear, you peoples, all of you;
  - type: note
    content: Hebrew all of them
  - type: note
    content: See Isa. 1:2
  - type: text
    content: pay attention, O earth, and all that is in it,
  - type: text
    content: 'and '
  - type: note
    content: Mal. 3:5
  - type: text
    content: 'let the Lord '
  - type: text
    content: God
  - type: text
    content: ' be a witness against you,'
  - type: note
    content: Ps. 11:4; Jonah 2:7; Hab. 2:20
  - type: text
    content: the Lord from his holy temple.
  '3':
  - type: text
    content: 'For behold, '
  - type: note
    content: Isa. 26:21
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming out of '
  - type: note
    content: Ps. 115:3
  - type: text
    content: his place,
  - type: text
    content: 'and will come down and '
  - type: note
    content: Amos 4:13; [Deut. 32:13]
  - type: text
    content: tread upon the high places of the earth.
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 97:5; [Judg. 5:5; Amos 9:5, 13; Nah. 1:5]
  - type: text
    content: the mountains will melt under him,
  - type: text
    content: and the valleys will split open,
  - type: text
    content: like wax before the fire,
  - type: text
    content: like waters poured down a steep place.
  '5':
  - type: text
    content: 'All this is for '
  - type: note
    content: See ch. 3:8
  - type: text
    content: the transgression of Jacob
  - type: text
    content: and for the sins of the house of Israel.
  - type: note
    content: '[ver. 13 ]'
  - type: text
    content: What is the transgression of Jacob?
  - type: text
    content: 'Is it not '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: Samaria?
  - type: text
    content: 'And what is '
  - type: note
    content: '[2 Chr. 28:4]'
  - type: text
    content: the high place of Judah?
  - type: text
    content: Is it not Jerusalem?
  '6':
  - type: text
    content: 'Therefore I will make '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Samaria '
  - type: note
    content: '[ch. 3:12]'
  - type: text
    content: a heap in the open country,
  - type: text
    content: a place for planting vineyards,
  - type: text
    content: 'and I will pour down her stones '
  - type: note
    content: '[1 Kgs. 16:24]'
  - type: text
    content: into the valley
  - type: text
    content: 'and '
  - type: note
    content: Ezek. 13:14
  - type: text
    content: uncover her foundations.
  '7':
  - type: text
    content: 'All '
  - type: note
    content: '[Hos. 8:6]'
  - type: text
    content: her carved images shall be beaten to pieces,
  - type: note
    content: '[ Hos. 2:12; 9:1 ]'
  - type: text
    content: all her wages shall be burned with fire,
  - type: text
    content: and all her idols I will lay waste,
  - type: text
    content: 'for from '
  - type: note
    content: '[Hos. 2:12; 9:1]'
  - type: text
    content: the fee of a prostitute she gathered them,
  - type: text
    content: and to the fee of a prostitute they shall return.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 22:4 ]'
  - type: text
    content: For this I will lament and wail;
  - type: text
    content: 'I will go '
  - type: note
    content: See Isa. 20:2-4
  - type: text
    content: stripped and naked;
  - type: text
    content: 'I will make lamentation '
  - type: note
    content: Job 30:29; Ps. 44:19
  - type: text
    content: like the jackals,
  - type: text
    content: 'and mourning '
  - type: note
    content: Isa. 13:21
  - type: text
    content: like the ostriches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Hos. 5:13 ]'
  - type: text
    content: For her wound is incurable,
  - type: text
    content: and it has come to Judah;
  - type: text
    content: it has reached to the gate of my people,
  - type: text
    content: to Jerusalem.
