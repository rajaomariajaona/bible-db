document_id: PRO.24,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Be not '
  - type: note
    content: ver. 19; See Ps. 37:1
  - type: text
    content: envious of evil men,
  - type: text
    content: 'nor desire to be '
  - type: note
    content: See ch. 1:15
  - type: text
    content: with them,
  '10':
  - type: text
    content: 'If you '
  - type: note
    content: '[Heb. 12:3]'
  - type: text
    content: faint in the day of adversity,
  - type: text
    content: your strength is small.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 82:4; [ Isa. 58:6, 7 ]
  - type: text
    content: Rescue those who are being taken away to death;
  - type: text
    content: hold back those who are stumbling to the slaughter.
  '12':
  - type: text
    content: If you say, “Behold, we did not know this,”
  - type: note
    content: '[ Eccles. 5:8 ]'
  - type: text
    content: 'does not he who '
  - type: note
    content: ch. 16:2; See 1 Sam. 16:7
  - type: text
    content: weighs the heart perceive it?
  - type: text
    content: 'Does not he who '
  - type: note
    content: '[Ps. 91:11]'
  - type: text
    content: keeps watch over your soul know it,
  - type: text
    content: 'and will he not repay man '
  - type: note
    content: See Job 34:11
  - type: text
    content: according to his work?
  '13':
  - type: text
    content: 'My son, '
  - type: note
    content: '[Ps. 19:10; 119:103; Song 5:1; Isa. 7:15]'
  - type: text
    content: eat honey, for it is good,
  - type: text
    content: 'and '
  - type: note
    content: Song 4:11
  - type: text
    content: the drippings of the honeycomb are sweet to your taste.
  '14':
  - type: text
    content: Know that wisdom is such to your soul;
  - type: text
    content: 'if you find it, there will be '
  - type: note
    content: See ch. 23:18
  - type: text
    content: a future,
  - type: text
    content: and your hope will not be cut off.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps. 10:9, 10
  - type: text
    content: Lie not in wait as a wicked man against the dwelling of the righteous;
  - type: text
    content: do no violence to his home;
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 37:24
  - type: text
    content: 'for the righteous falls '
  - type: note
    content: See Job 5:19
  - type: text
    content: seven times and rises again,
  - type: text
    content: 'but '
  - type: note
    content: ch. 14:32
  - type: text
    content: the wicked stumble in times of calamity.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 35:15, 19; [ Mic. 7:8 ]; See ch. 17:5
  - type: text
    content: Do not rejoice when your enemy falls,
  - type: text
    content: and let not your heart be glad when he stumbles,
  '18':
  - type: text
    content: 'lest the '
  - type: text
    content: Lord
  - type: text
    content: ' see it and be displeased,'
  - type: text
    content: and turn away his anger from him.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 12:1 ]; See Ps. 37:1'
  - type: text
    content: Fret not yourself because of evildoers,
  - type: text
    content: 'and be not '
  - type: note
    content: ver. 1
  - type: text
    content: envious of the wicked,
  '2':
  - type: text
    content: 'for their hearts '
  - type: note
    content: '[Isa. 59:13]'
  - type: text
    content: devise violence,
  - type: text
    content: 'and their lips '
  - type: note
    content: Ps. 10:7
  - type: text
    content: talk of trouble.
  '20':
  - type: text
    content: 'for the evil man has no '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: future;
  - type: note
    content: ch. 13:9; See Job 18:5
  - type: text
    content: the lamp of the wicked will be put out.
  '21':
  - type: text
    content: 'My son, '
  - type: note
    content: 1 Pet. 2:17; [Rom. 13:7]
  - type: text
    content: 'fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king,'
  - type: text
    content: and do not join with those who do otherwise,
  '22':
  - type: text
    content: for disaster will arise suddenly from them,
  - type: text
    content: and who knows the ruin that will come from them both?
  - type: heading
    content: More Sayings of the Wise
  '23':
  - type: text
    content: 'These also are sayings of '
  - type: note
    content: ch. 1:6; 22:17
  - type: text
    content: the wise.
  - type: note
    content: See ch. 18:5
  - type: text
    content: Partiality in judging is not good.
  '24':
  - type: text
    content: 'Whoever '
  - type: note
    content: See ch. 17:15
  - type: text
    content: says to the wicked, “You are in the right,”
  - type: note
    content: ch. 11:26
  - type: text
    content: will be cursed by peoples, abhorred by nations,
  '25':
  - type: text
    content: but those who rebuke the wicked will have delight,
  - type: text
    content: and a good blessing will come upon them.
  '26':
  - type: text
    content: Whoever gives an honest answer
  - type: text
    content: kisses the lips.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 14:28 ]'
  - type: text
    content: Prepare your work outside;
  - type: text
    content: get everything ready for yourself in the field,
  - type: text
    content: and after that build your house.
  '28':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 25:18 ]'
  - type: text
    content: Be not a witness against your neighbor without cause,
  - type: text
    content: and do not deceive with your lips.
  '29':
  - type: text
    content: 'Do not say, '
  - type: note
    content: See ch. 20:22
  - type: text
    content: “I will do to him as he has done to me;
  - type: text
    content: I will pay the man back for what he has done.”
  '3':
  - type: text
    content: 'By '
  - type: note
    content: '[ch. 14:1]'
  - type: text
    content: wisdom a house is built,
  - type: text
    content: and by understanding it is established;
  '30':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 5:3 ]'
  - type: text
    content: I passed by the field of a sluggard,
  - type: text
    content: 'by the vineyard of a man '
  - type: note
    content: See ch. 6:32
  - type: text
    content: lacking sense,
  '31':
  - type: text
    content: and behold, it was all overgrown with thorns;
  - type: text
    content: the ground was covered with nettles,
  - type: text
    content: 'and its stone '
  - type: note
    content: Isa. 5:5
  - type: text
    content: wall was broken down.
  '32':
  - type: text
    content: 'Then I saw and '
  - type: note
    content: '[ch. 22:17]'
  - type: text
    content: considered it;
  - type: text
    content: I looked and received instruction.
  '33':
  - type: text
    content: ' '
  - type: note
    content: For ver. 33, 34, see ch. 6:10, 11
  - type: text
    content: A little sleep, a little slumber,
  - type: text
    content: a little folding of the hands to rest,
  '34':
  - type: text
    content: and poverty will come upon you like a robber,
  - type: text
    content: and want like an armed man.
  '4':
  - type: text
    content: by knowledge the rooms are filled
  - type: text
    content: 'with all '
  - type: note
    content: '[ch. 23:23; Luke 16:11]'
  - type: text
    content: precious and pleasant riches.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 21:22 ]'
  - type: text
    content: A wise man is full of strength,
  - type: text
    content: and a man of knowledge enhances his might,
  '6':
  - type: text
    content: 'for by '
  - type: note
    content: ch. 20:18
  - type: text
    content: wise guidance you can wage your war,
  - type: text
    content: 'and in '
  - type: note
    content: See ch. 11:14
  - type: text
    content: abundance of counselors there is victory.
  '7':
  - type: text
    content: 'Wisdom is '
  - type: note
    content: '[ch. 14:6]'
  - type: text
    content: too high for a fool;
  - type: text
    content: 'in '
  - type: note
    content: See Job 5:4
  - type: text
    content: the gate he does not open his mouth.
  '8':
  - type: text
    content: 'Whoever '
  - type: note
    content: Rom. 1:30
  - type: text
    content: plans to do evil
  - type: text
    content: will be called a schemer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 21:27 ]'
  - type: text
    content: The devising
  - type: note
    content: Or scheming
  - type: text
    content: ' of folly is sin,'
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 1:1
  - type: text
    content: the scoffer is an abomination to mankind.
