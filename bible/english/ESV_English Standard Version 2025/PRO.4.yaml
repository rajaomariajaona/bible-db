verses:
  '1':
  - type: heading
    content: A Father’s Wise Instruction
  - type: text
    content: ' '
  - type: note
    content: ch. 1:8; [ch. 5:7; 7:24; 8:33; Ps. 34:11 ]
  - type: text
    content: Hear, O sons, a father’s instruction,
  - type: text
    content: 'and be attentive, that you may '
  - type: note
    content: ch. 2:2
  - type: text
    content: gain
  - type: note
    content: Hebrew know
  - type: text
    content: ' insight,'
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Hear, '
  - type: note
    content: ch. 2:1
  - type: text
    content: my son, and accept my words,
  - type: text
    content: 'that '
  - type: note
    content: See ch. 3:2
  - type: text
    content: the years of your life may be many.
  '11':
  - type: text
    content: 'I have '
  - type: note
    content: See 1 Sam. 12:23
  - type: text
    content: taught you the way of wisdom;
  - type: text
    content: I have led you in the paths of uprightness.
  '12':
  - type: text
    content: 'When you walk, '
  - type: note
    content: '[Job 18:7; Ps. 18:36; 119:45]'
  - type: text
    content: your step will not be hampered,
  - type: text
    content: 'and '
  - type: note
    content: ch. 3:23
  - type: text
    content: if you run, you will not stumble.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:18
  - type: text
    content: Keep hold of instruction; do not let go;
  - type: text
    content: 'guard her, for she is your '
  - type: note
    content: ver. 22; [John 1:4; 1 John 5:12]
  - type: text
    content: life.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:15; Ps. 1:1
  - type: text
    content: Do not enter the path of the wicked,
  - type: text
    content: and do not walk in the way of the evil.
  '15':
  - type: text
    content: Avoid it; do not go on it;
  - type: text
    content: turn away from it and pass on.
  '16':
  - type: text
    content: 'For they '
  - type: note
    content: '[Ps. 36:4]'
  - type: text
    content: cannot sleep unless they have done wrong;
  - type: text
    content: they are robbed of sleep unless they have made someone stumble.
  '17':
  - type: text
    content: For they eat the bread of wickedness
  - type: note
    content: '[ Amos 2:8 ]'
  - type: text
    content: and drink the wine of violence.
  '18':
  - type: text
    content: 'But '
  - type: note
    content: Job 11:17; 22:28; Isa. 60:3; 62:1, 2; Dan. 12:3
  - type: text
    content: 'the path of the righteous is like '
  - type: note
    content: 2 Sam. 23:4; See Ps. 97:11
  - type: text
    content: the light of dawn,
  - type: text
    content: 'which shines '
  - type: note
    content: '[Ps. 84:7]'
  - type: text
    content: 'brighter and brighter until '
  - type: note
    content: '[1 John 3:2]'
  - type: text
    content: full day.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 2:9; Isa. 59:9, 10; Jer. 23:12; John 12:35; [ Job 18:5 ]
  - type: text
    content: 'The way of the wicked is like deep '
  - type: note
    content: '[Matt. 6:23]'
  - type: text
    content: darkness;
  - type: text
    content: 'they do not know over what they '
  - type: note
    content: '[John 11:10; 1 John 2:10]'
  - type: text
    content: stumble.
  '2':
  - type: text
    content: 'for I give you good '
  - type: note
    content: Job 11:4
  - type: text
    content: precepts;
  - type: text
    content: do not forsake my teaching.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ver. 10
  - type: text
    content: My son, be attentive to my words;
  - type: text
    content: incline your ear to my sayings.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:21
  - type: text
    content: Let them not escape from your sight;
  - type: note
    content: '[ch. 2:1 ]'
  - type: text
    content: keep them within your heart.
  '22':
  - type: text
    content: 'For they are '
  - type: note
    content: ver. 13; ch. 8:35; 21:21; Deut. 32:47; [1 Tim. 4:8]
  - type: text
    content: life to those who find them,
  - type: text
    content: and healing to all their
  - type: note
    content: Hebrew his
  - type: text
    content: ' flesh.'
  '23':
  - type: text
    content: Keep your heart with all vigilance,
  - type: text
    content: 'for '
  - type: note
    content: '[Matt. 12:35]'
  - type: text
    content: 'from it flow '
  - type: note
    content: '[Ps. 16:11]'
  - type: text
    content: the springs of life.
  '24':
  - type: text
    content: 'Put away from you '
  - type: note
    content: ch. 6:12
  - type: text
    content: crooked speech,
  - type: text
    content: 'and put '
  - type: note
    content: ch. 2:15
  - type: text
    content: devious talk far from you.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ Heb. 12:2 ]'
  - type: text
    content: Let your eyes look directly forward,
  - type: text
    content: and your gaze be straight before you.
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:6, 21; [ Heb. 12:13 ]
  - type: text
    content: Ponder
  - type: note
    content: Or Make level
  - type: text
    content: ' the path of your feet;'
  - type: note
    content: '[ Ps. 119:5 ]'
  - type: text
    content: then all your ways will be sure.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Deut. 5:32; 28:14; Josh. 1:7; 1 Kgs. 15:5
  - type: text
    content: Do not swerve to the right or to the left;
  - type: text
    content: turn your foot away from evil.
  '3':
  - type: text
    content: When I was a son with my father,
  - type: note
    content: See 1 Chr. 22:5
  - type: text
    content: 'tender, '
  - type: note
    content: Zech. 12:10
  - type: text
    content: the only one in the sight of my mother,
  '4':
  - type: text
    content: 'he '
  - type: note
    content: 1 Chr. 28:9; [Eph. 6:4]
  - type: text
    content: taught me and said to me,
  - type: note
    content: '[ch. 3:1 ]'
  - type: text
    content: “Let your heart hold fast my words;
  - type: note
    content: ch. 7:2; Lev. 18:5; Isa. 55:3
  - type: text
    content: keep my commandments, and live.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'Get wisdom; get '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: insight;
  - type: text
    content: do not forget, and do not turn away from the words of my mouth.
  '6':
  - type: text
    content: Do not forsake her, and she will keep you;
  - type: note
    content: '[ 2 Thess. 2:10 ]'
  - type: text
    content: love her, and she will guard you.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:7 ]'
  - type: text
    content: 'The beginning of wisdom is this: Get wisdom,'
  - type: text
    content: 'and whatever you get, get '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: insight.
  '8':
  - type: text
    content: Prize her highly, and she will exalt you;
  - type: text
    content: 'she will '
  - type: note
    content: 1 Sam. 2:30
  - type: text
    content: 'honor you '
  - type: note
    content: '[Song 2:6]'
  - type: text
    content: if you embrace her.
  '9':
  - type: text
    content: 'She will place on your head '
  - type: note
    content: ch. 1:9
  - type: text
    content: a graceful garland;
  - type: text
    content: she will bestow on you a beautiful crown.”
