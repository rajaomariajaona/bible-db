      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'who remain in all the lands of Israel, as well as to the priests and Levites in the cities that have pasturelands, that they may be gathered to us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then let us bring again the ark of our God to us, '
