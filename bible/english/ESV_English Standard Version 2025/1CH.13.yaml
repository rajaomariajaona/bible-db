document_id: 1CH.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought from Kiriath-Jearim
  - type: text
    content: 'David consulted with the commanders of thousands and of hundreds, with every leader. '
  '10':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Uzzah, and he struck him down '
  - type: note
    content: '[ch. 15:13, 15; Num. 4:15]'
  - type: text
    content: 'because he put out his hand to the ark, and '
  - type: note
    content: Lev. 10:2
  - type: text
    content: 'he died there before God. '
  '11':
  - type: text
    content: 'And David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ' had broken out against Uzzah. And that place is called Perez-uzza'
  - type: note
    content: Perez-uzza means the breaking out against Uzzah
  - type: text
    content: ' to this day. '
  '12':
  - type: text
    content: 'And David was afraid of God that day, and he said, “How can I bring the ark of God home to me?” '
  '13':
  - type: text
    content: 'So David did not take the ark home into the city of David, but took it aside to the house '
  - type: note
    content: '[2 Chr. 25:24]'
  - type: text
    content: 'of Obed-edom the Gittite. '
  '14':
  - type: text
    content: 'And the ark of God remained with the household of Obed-edom in his house three months. '
  - type: note
    content: '[ch. 26:4, 5]'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the household of Obed-edom and all that he had.'
  '2':
  - type: text
    content: 'And David said to all the assembly of Israel, “If it seems good to you and from the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, let us send abroad to our brothers '
  - type: note
    content: '[1 Sam. 31:1]'
  - type: text
    content: 'who remain in all the lands of Israel, as well as to the priests and Levites in the cities that have pasturelands, that they may be gathered to us. '
  '3':
  - type: text
    content: 'Then let us bring again the ark of our God to us, '
  - type: note
    content: '[1 Sam. 7:1, 2]'
  - type: text
    content: for we did not seek it
  - type: note
    content: Or him
  - type: text
    content: ' in the days of Saul.” '
  '4':
  - type: text
    content: All the assembly agreed to do so, for the thing was right in the eyes of all the people.
  - type: heading
    content: Uzzah and the Ark
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:3; 2 Sam. 6:1
  - type: text
    content: 'So David assembled all Israel '
  - type: note
    content: '[1 Kgs. 8:65]'
  - type: text
    content: 'from the '
  - type: note
    content: See Num. 34:5
  - type: text
    content: Nile
  - type: note
    content: Hebrew Shihor
  - type: text
    content: ' of Egypt to Lebo-hamath, to bring the ark of God '
  - type: note
    content: '[1 Sam. 6:21; 7:1]'
  - type: text
    content: 'from Kiriath-jearim. '
  '6':
  - type: note
    content: For ver. 6-14, see 2 Sam. 6:2-11
  - type: text
    content: 'And David and all Israel went up to '
  - type: note
    content: Josh. 15:9, 60
  - type: text
    content: 'Baalah, that is, to Kiriath-jearim that belongs to Judah, to bring up from there the ark of God, which is called by the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' who '
  - type: note
    content: See 1 Sam. 4:4
  - type: text
    content: 'sits enthroned above the cherubim. '
  '7':
  - type: text
    content: 'And they carried the ark of God on a new cart, from the house of '
  - type: note
    content: '[1 Sam. 7:1]'
  - type: text
    content: Abinadab, and Uzzah and Ahio
  - type: note
    content: Or and his brother
  - type: text
    content: ' were driving the cart. '
  '8':
  - type: text
    content: 'And David and all Israel were celebrating before God with all their might, with song and '
  - type: note
    content: '[ch. 15:16]'
  - type: text
    content: lyres and harps and tambourines and cymbals and trumpets.
  '9':
  - type: text
    content: 'And when they came to the threshing floor of '
  - type: note
    content: '[2 Sam. 6:6]'
  - type: text
    content: 'Chidon, Uzzah put out his hand to take hold of the ark, for the oxen stumbled. '
