document_id: EZR.8,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Genealogy of Those Who Returned with Ezra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the heads of their fathers’ houses, and this is the genealogy of those who went up with me from Babylonia, in the reign of Artaxerxes the king: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Of the sons of Bani,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bani
      marker-yv: yv-n
    - type: text
      text: ' Shelomith the son of Josiphiah, and with him 160 men. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:28
      marker-yv: yv-n
    - type: text
      text: 'Of the sons of Bebai, Zechariah, the son of Bebai, and with him 28 men. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Azgad, Johanan the son of Hakkatan, and with him 110 men. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Adonikam, those who came later, their names being Eliphelet, Jeuel, and Shemaiah, and with them 60 men. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Of the sons of Bigvai, Uthai and Zaccur, and with them 70 men.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezra Sends for Levites
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I gathered them to the river that runs to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21, 31
      marker-yv: yv-n
    - type: text
      text: 'Ahava, and there we camped three days. As I reviewed the people and the priests, I found there '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'none of the sons of Levi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:15
      marker-yv: yv-n
    - type: text
      text: 'Meshullam, leading men, and for Joiarib and Elnathan, who were men of insight, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and sent them to Iddo, the leading man at the place Casiphia, telling them what to say to Iddo and his brothers and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and
      marker-yv: yv-n
    - type: text
      text: ' the temple servants at the place Casiphia, namely, to send us ministers for the house of our God. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      marker-yv: yv-n
    - type: text
      text: 'by the good hand of our God on us, they brought us a man of discretion, of the sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:19
      marker-yv: yv-n
    - type: text
      text: 'Mahli the son of Levi, son of Israel, namely Sherebiah with his sons and kinsmen, 18; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 12:24
      marker-yv: yv-n
    - type: text
      text: 'Hashabiah, and with him Jeshaiah of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'the sons of Merari, with his kinsmen and their sons, 20; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Phinehas, Gershom. Of the sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 24:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'Ithamar, Daniel. Of the sons of David, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 3:22
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Hattush. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:7
      marker-yv: yv-n
    - type: text
      text: 'besides 220 of the temple servants, whom David and his officials had set apart to attend the Levites. These were all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:17
      marker-yv: yv-n
    - type: text
      text: mentioned by name.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fasting and Prayer for Protection
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 20:3
      marker-yv: yv-n
    - type: text
      text: 'Then I proclaimed a fast there, at the river '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15, 31
      marker-yv: yv-n
    - type: text
      text: 'Ahava, that we might humble ourselves before our God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 5:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to seek from him a safe journey for ourselves, our children, and all our goods. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I was ashamed to ask the king for a band of soldiers and horsemen to protect us against the enemy on our way, since we had told the king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      marker-yv: yv-n
    - type: text
      text: '“The hand of our God is for good on '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 15:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'all who seek him, and the power of his wrath is against all who forsake him.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we fasted and implored our God for this, and he listened to our entreaty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Priests to Guard Offerings
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I set apart twelve of the leading priests: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Sherebiah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Hashabiah, and ten of their kinsmen with them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I weighed out to them the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'silver and the gold and the vessels, the offering for the house of our God that the king and his '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:14
      marker-yv: yv-n
    - type: text
      text: 'counselors and his lords and all Israel there present had offered. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:9-11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: I weighed out into their hand 650 talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 75 pounds or 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver, and silver vessels worth 200 talents,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Revocalization; the number is missing in the Masoretic Text
      marker-yv: yv-n
    - type: text
      text: ' and 100 talents of gold, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 20 bowls of gold worth 1,000 darics,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'daric '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a coin weighing about 1/4 ounce or 8.5 grams
      marker-yv: yv-n
    - type: text
      text: ' and two vessels of fine bright bronze as precious as gold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I said to them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 21:6
      marker-yv: yv-n
    - type: text
      text: '“You are holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 22:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'the vessels are holy, and the silver and the gold are a freewill offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guard them and keep them until you weigh them before the chief priests and the Levites and the heads of fathers’ houses in Israel at Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'within the chambers of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Shecaniah, who was of the sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 3, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:3-15
      marker-yv: yv-n
    - type: text
      text: 'Parosh, Zechariah, with whom were registered 150 men. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priests and the Levites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: took over the weight of the silver and the gold and the vessels, to bring them to Jerusalem, to the house of our God.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then we departed from the river Ahava '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'on the twelfth day of the first month, to go to Jerusalem. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      marker-yv: yv-n
    - type: text
      text: 'The hand of our God was on us, and he delivered us from the hand of the enemy and from ambushes by the way. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:11
      marker-yv: yv-n
    - type: text
      text: 'We came to Jerusalem, and there we remained three days. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourth day, within the house of our God, the silver and the gold and the vessels were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:9-11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'weighed into the hands of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 3:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'Meremoth the priest, son of Uriah, and with him was Eleazar the son of Phinehas, and with them were the Levites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:16
      marker-yv: yv-n
    - type: text
      text: 'Jozabad the son of Jeshua and Noadiah the son of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 3:24
      marker-yv: yv-n
    - type: text
      text: 'Binnui. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole was counted and weighed, and the weight of everything was recorded.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:1
      marker-yv: yv-n
    - type: text
      text: 'those who had come from captivity, the returned exiles, offered burnt offerings to the God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'twelve bulls for all Israel, ninety-six rams, seventy-seven lambs, and as a sin offering twelve male goats. All this was a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:21
      marker-yv: yv-n
    - type: text
      text: 'They also delivered the king’s commissions to the king’s '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esth. 3:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:9
      - type: text
