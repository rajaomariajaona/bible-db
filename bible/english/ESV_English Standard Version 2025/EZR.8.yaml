document_id: EZR.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Genealogy of Those Who Returned with Ezra
  - type: text
    content: 'These are the heads of their fathers’ houses, and this is the genealogy of those who went up with me from Babylonia, in the reign of Artaxerxes the king: '
  '10':
  - type: text
    content: Of the sons of Bani,
  - type: note
    content: Septuagint; Hebrew lacks Bani
  - type: text
    content: ' Shelomith the son of Josiphiah, and with him 160 men. '
  '11':
  - type: note
    content: ch. 10:28
  - type: text
    content: 'Of the sons of Bebai, Zechariah, the son of Bebai, and with him 28 men. '
  '12':
  - type: text
    content: 'Of the sons of Azgad, Johanan the son of Hakkatan, and with him 110 men. '
  '13':
  - type: text
    content: 'Of the sons of Adonikam, those who came later, their names being Eliphelet, Jeuel, and Shemaiah, and with them 60 men. '
  '14':
  - type: text
    content: Of the sons of Bigvai, Uthai and Zaccur, and with them 70 men.
  - type: heading
    content: Ezra Sends for Levites
  '15':
  - type: text
    content: 'I gathered them to the river that runs to '
  - type: note
    content: ver. 21, 31
  - type: text
    content: 'Ahava, and there we camped three days. As I reviewed the people and the priests, I found there '
  - type: note
    content: '[ch. 7:7]'
  - type: text
    content: 'none of the sons of Levi. '
  '16':
  - type: text
    content: 'Then I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and '
  - type: note
    content: ch. 10:15
  - type: text
    content: 'Meshullam, leading men, and for Joiarib and Elnathan, who were men of insight, '
  '17':
  - type: text
    content: and sent them to Iddo, the leading man at the place Casiphia, telling them what to say to Iddo and his brothers and
  - type: note
    content: Hebrew lacks and
  - type: text
    content: ' the temple servants at the place Casiphia, namely, to send us ministers for the house of our God. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'by the good hand of our God on us, they brought us a man of discretion, of the sons of '
  - type: note
    content: 1 Chr. 6:19
  - type: text
    content: 'Mahli the son of Levi, son of Israel, namely Sherebiah with his sons and kinsmen, 18; '
  '19':
  - type: text
    content: 'also '
  - type: note
    content: Neh. 12:24
  - type: text
    content: 'Hashabiah, and with him Jeshaiah of '
  - type: note
    content: 1 Chr. 6:1, 16
  - type: text
    content: 'the sons of Merari, with his kinsmen and their sons, 20; '
  '2':
  - type: text
    content: 'Of the sons of Phinehas, Gershom. Of the sons of '
  - type: note
    content: 1 Chr. 24:3, 4
  - type: text
    content: 'Ithamar, Daniel. Of the sons of David, '
  - type: note
    content: '[1 Chr. 3:22]'
  - type: text
    content: 'Hattush. '
  '20':
  - type: note
    content: ch. 2:43; 7:7
  - type: text
    content: 'besides 220 of the temple servants, whom David and his officials had set apart to attend the Levites. These were all '
  - type: note
    content: Num. 1:17
  - type: text
    content: mentioned by name.
  - type: heading
    content: Fasting and Prayer for Protection
  '21':
  - type: text
    content: ' '
  - type: note
    content: See 2 Chr. 20:3
  - type: text
    content: 'Then I proclaimed a fast there, at the river '
  - type: note
    content: ver. 15, 31
  - type: text
    content: 'Ahava, that we might humble ourselves before our God, '
  - type: note
    content: '[Ps. 5:8]'
  - type: text
    content: 'to seek from him a safe journey for ourselves, our children, and all our goods. '
  '22':
  - type: text
    content: 'For I was ashamed to ask the king for a band of soldiers and horsemen to protect us against the enemy on our way, since we had told the king, '
  - type: note
    content: See ch. 7:6
  - type: text
    content: '“The hand of our God is for good on '
  - type: note
    content: '[2 Chr. 15:2]'
  - type: text
    content: 'all who seek him, and the power of his wrath is against all who forsake him.” '
  '23':
  - type: text
    content: So we fasted and implored our God for this, and he listened to our entreaty.
  - type: heading
    content: Priests to Guard Offerings
  '24':
  - type: text
    content: 'Then I set apart twelve of the leading priests: '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'Sherebiah, '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'Hashabiah, and ten of their kinsmen with them. '
  '25':
  - type: text
    content: 'And I weighed out to them the '
  - type: note
    content: ch. 7:15, 16
  - type: text
    content: 'silver and the gold and the vessels, the offering for the house of our God that the king and his '
  - type: note
    content: See ch. 7:14
  - type: text
    content: 'counselors and his lords and all Israel there present had offered. '
  '26':
  - type: note
    content: '[ch. 1:9-11]'
  - type: text
    content: I weighed out into their hand 650 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver, and silver vessels worth 200 talents,'
  - type: note
    content: Revocalization; the number is missing in the Masoretic Text
  - type: text
    content: ' and 100 talents of gold, '
  '27':
  - type: text
    content: 20 bowls of gold worth 1,000 darics,
  - type: note
    content: A daric was a coin weighing about 1/4 ounce or 8.5 grams
  - type: text
    content: ' and two vessels of fine bright bronze as precious as gold. '
  '28':
  - type: text
    content: 'And I said to them, '
  - type: note
    content: Lev. 21:6
  - type: text
    content: '“You are holy to the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Lev. 22:2, 3
  - type: text
    content: 'the vessels are holy, and the silver and the gold are a freewill offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers. '
  '29':
  - type: text
    content: 'Guard them and keep them until you weigh them before the chief priests and the Levites and the heads of fathers’ houses in Israel at Jerusalem, '
  - type: note
    content: '[ch. 10:6]'
  - type: text
    content: 'within the chambers of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'Of the sons of Shecaniah, who was of the sons of '
  - type: note
    content: For ver. 3, see ch. 2:3-15
  - type: text
    content: 'Parosh, Zechariah, with whom were registered 150 men. '
  '30':
  - type: text
    content: 'So the priests and the Levites '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: took over the weight of the silver and the gold and the vessels, to bring them to Jerusalem, to the house of our God.
  '31':
  - type: text
    content: 'Then we departed from the river Ahava '
  - type: note
    content: '[ch. 7:9]'
  - type: text
    content: 'on the twelfth day of the first month, to go to Jerusalem. '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'The hand of our God was on us, and he delivered us from the hand of the enemy and from ambushes by the way. '
  '32':
  - type: note
    content: Neh. 2:11
  - type: text
    content: 'We came to Jerusalem, and there we remained three days. '
  '33':
  - type: text
    content: 'On the fourth day, within the house of our God, the silver and the gold and the vessels were '
  - type: note
    content: '[ch. 1:9-11]'
  - type: text
    content: 'weighed into the hands of '
  - type: note
    content: Neh. 3:4, 21
  - type: text
    content: 'Meremoth the priest, son of Uriah, and with him was Eleazar the son of Phinehas, and with them were the Levites, '
  - type: note
    content: Neh. 11:16
  - type: text
    content: 'Jozabad the son of Jeshua and Noadiah the son of '
  - type: note
    content: Neh. 3:24
  - type: text
    content: 'Binnui. '
  '34':
  - type: text
    content: The whole was counted and weighed, and the weight of everything was recorded.
  '35':
  - type: text
    content: 'At that time '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'those who had come from captivity, the returned exiles, offered burnt offerings to the God of Israel, '
  - type: note
    content: '[ch. 6:17]'
  - type: text
    content: 'twelve bulls for all Israel, ninety-six rams, seventy-seven lambs, and as a sin offering twelve male goats. All this was a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '36':
  - type: note
    content: ch. 7:21
  - type: text
    content: 'They also delivered the king’s commissions to the king’s '
  - type: note
    content: Esth. 3:12; 8:9; 9:3; Dan. 3:2, 3, 27; 6:2, 3
  - type: text
    content: satraps
  - type: note
    content: A satrap was a Persian official
  - type: text
    content: ' and to the governors of the province Beyond the River, and they aided the people and the house of God.'
  '4':
  - type: note
    content: ch. 10:30
  - type: text
    content: 'Of the sons of Pahath-moab, Eliehoenai the son of Zerahiah, and with him 200 men. '
  '5':
  - type: text
    content: Of the sons of Zattu,
  - type: note
    content: Septuagint; Hebrew lacks of Zattu
  - type: text
    content: ' Shecaniah the son of Jahaziel, and with him 300 men. '
  '6':
  - type: text
    content: 'Of the sons of Adin, Ebed the son of Jonathan, and with him 50 men. '
  '7':
  - type: text
    content: 'Of the sons of Elam, Jeshaiah the son of Athaliah, and with him 70 men. '
  '8':
  - type: text
    content: 'Of the sons of Shephatiah, Zebadiah the son of Michael, and with him 80 men. '
  '9':
  - type: text
    content: 'Of the sons of Joab, Obadiah the son of Jehiel, and with him 218 men. '
