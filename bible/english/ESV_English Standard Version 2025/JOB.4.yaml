document_id: JOB.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Eliphaz Speaks: The Innocent Prosper'
  - type: text
    content: 'Then Eliphaz the Temanite answered and said:'
  '10':
  - type: text
    content: The roar of the lion, the voice of the fierce lion,
  - type: note
    content: Ps. 58:6; [ch. 29:17; Ps. 3:7 ]
  - type: text
    content: the teeth of the young lions are broken.
  '11':
  - type: text
    content: The strong lion perishes for lack of prey,
  - type: text
    content: and the cubs of the lioness are scattered.
  '12':
  - type: text
    content: “Now a word was brought to me stealthily;
  - type: text
    content: 'my ear received '
  - type: note
    content: ch. 26:14
  - type: text
    content: the whisper of it.
  '13':
  - type: text
    content: 'Amid '
  - type: note
    content: ch. 20:2
  - type: text
    content: 'thoughts from '
  - type: note
    content: ch. 33:15; Gen. 2:21; 15:12; 1 Sam. 26:12; Isa. 29:10
  - type: text
    content: visions of the night,
  - type: text
    content: 'when '
  - type: note
    content: ch. 33:15; Gen. 2:21; 15:12; 1 Sam. 26:12; Isa. 29:10
  - type: text
    content: deep sleep falls on men,
  '14':
  - type: text
    content: dread came upon me, and trembling,
  - type: text
    content: which made all my bones shake.
  '15':
  - type: text
    content: A spirit glided past my face;
  - type: text
    content: the hair of my flesh stood up.
  '16':
  - type: text
    content: It stood still,
  - type: text
    content: but I could not discern its appearance.
  - type: note
    content: Num. 12:8
  - type: text
    content: A form was before my eyes;
  - type: text
    content: 'there was silence, then I heard '
  - type: note
    content: '[1 Kgs. 19:12]'
  - type: text
    content: 'a voice:'
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:2; 10:4; 25:4; 32:2
  - type: text
    content: ‘Can mortal man be in the right before
  - type: note
    content: Or more than; twice in this verse
  - type: text
    content: ' God?'
  - type: text
    content: Can a man be pure before his Maker?
  '18':
  - type: text
    content: 'Even in his servants '
  - type: note
    content: ch. 15:15
  - type: text
    content: he puts no trust,
  - type: text
    content: and his angels he charges with error;
  '19':
  - type: text
    content: 'how much more those who dwell in houses of '
  - type: note
    content: ch. 10:9; 13:12; 33:6; Isa. 64:8; 2 Cor. 4:7; 5:1
  - type: text
    content: clay,
  - type: text
    content: 'whose foundation is in '
  - type: note
    content: Gen. 2:7; 3:19; 18:27
  - type: text
    content: the dust,
  - type: text
    content: who are crushed like
  - type: note
    content: Or before
  - type: text
    content: ' '
  - type: note
    content: '[ch. 13:28]'
  - type: text
    content: the moth.
  '2':
  - type: text
    content: “If one ventures a word with you, will you be impatient?
  - type: text
    content: Yet who can keep from speaking?
  '20':
  - type: text
    content: 'Between '
  - type: note
    content: '[Ps. 90:5, 6; Isa. 38:12]'
  - type: text
    content: morning and evening they are beaten to pieces;
  - type: text
    content: 'they perish forever '
  - type: note
    content: '[Isa. 42:25; 57:1]'
  - type: text
    content: without anyone regarding it.
  '21':
  - type: text
    content: Is not their tent-cord plucked up within them,
  - type: note
    content: ch. 36:12; Prov. 5:23; 10:21; [ Hos. 4:6 ]
  - type: text
    content: do they not die, and that without wisdom?’
  '3':
  - type: text
    content: Behold, you have instructed many,
  - type: text
    content: 'and you have '
  - type: note
    content: Isa. 35:3; [Heb. 12:12]
  - type: text
    content: strengthened the weak hands.
  '4':
  - type: text
    content: Your words have upheld him who was stumbling,
  - type: text
    content: 'and you have '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: made firm the feeble knees.
  '5':
  - type: text
    content: But now it has come to you, and you are impatient;
  - type: text
    content: it touches you, and you are dismayed.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:1
  - type: text
    content: Is not your fear of God
  - type: note
    content: Hebrew lacks of God
  - type: text
    content: ' your '
  - type: note
    content: ch. 31:24; Prov. 3:26
  - type: text
    content: confidence,
  - type: text
    content: and the integrity of your ways your hope?
  '7':
  - type: text
    content: '“Remember: '
  - type: note
    content: '[Ps. 37:25]'
  - type: text
    content: who that was innocent ever perished?
  - type: text
    content: Or where were the upright cut off?
  '8':
  - type: text
    content: 'As I have seen, those who '
  - type: note
    content: Hos. 10:13; [Ps. 7:14; Prov. 22:8; Gal. 6:7, 8]
  - type: text
    content: plow iniquity
  - type: text
    content: and sow trouble reap the same.
  '9':
  - type: text
    content: 'By '
  - type: note
    content: Isa. 30:33
  - type: text
    content: the breath of God they perish,
  - type: text
    content: 'and by '
  - type: note
    content: ch. 15:30; Ex. 15:8; Ps. 18:15; [Isa. 11:4; 2 Thess. 2:8]
  - type: text
    content: the blast of his anger they are consumed.
