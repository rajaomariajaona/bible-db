verses:
  '1':
  - type: heading
    content: Arise, O God, Defend Your Cause
  - type: text
    content: A Maskil
  - type: note
    content: Probably a musical or liturgical term
  - type: text
    content: ' of '
  - type: note
    content: See Ps. 50, title
  - type: text
    content: Asaph.
  - type: text
    content: 'O God, why do you '
  - type: note
    content: See Ps. 44:9
  - type: text
    content: cast us off forever?
  - type: text
    content: 'Why does your anger '
  - type: note
    content: Deut. 29:20; [Ps. 18:8]
  - type: text
    content: 'smoke against '
  - type: note
    content: Ps. 79:13; 100:3; Jer. 23:1; Ezek. 34:31; [Ps. 95:7]
  - type: text
    content: the sheep of your pasture?
  '10':
  - type: text
    content: 'How long, O God, '
  - type: note
    content: ver. 18, 22; Ps. 79:12; 89:51
  - type: text
    content: is the foe to scoff?
  - type: text
    content: Is the enemy to revile your name forever?
  '11':
  - type: text
    content: 'Why '
  - type: note
    content: Lam. 2:3
  - type: text
    content: do you hold back your hand, your right hand?
  - type: text
    content: Take it from the fold of your garment
  - type: note
    content: Hebrew from your bosom
  - type: text
    content: ' and destroy them!'
  '12':
  - type: text
    content: 'Yet '
  - type: note
    content: Ps. 44:4
  - type: text
    content: God my King is from of old,
  - type: text
    content: working salvation in the midst of the earth.
  '13':
  - type: text
    content: 'You '
  - type: note
    content: Ex. 14:21
  - type: text
    content: divided the sea by your might;
  - type: text
    content: 'you '
  - type: note
    content: Isa. 51:9
  - type: text
    content: 'broke the heads of '
  - type: note
    content: Isa. 27:1
  - type: text
    content: the sea monsters
  - type: note
    content: Or the great sea creatures
  - type: text
    content: ' on the waters.'
  '14':
  - type: text
    content: 'You crushed the heads of '
  - type: note
    content: See Job 41:1
  - type: text
    content: Leviathan;
  - type: text
    content: you gave him as food for the creatures of the wilderness.
  '15':
  - type: text
    content: 'You '
  - type: note
    content: Ps. 78:15; 105:41; Ex. 17:5, 6; Num. 20:11; Isa. 48:21
  - type: text
    content: split open springs and brooks;
  - type: text
    content: 'you '
  - type: note
    content: Josh. 2:10; 4:23; Isa. 51:10; [Ps. 66:6]; See Ex. 14:21-25; Josh. 3:13-17
  - type: text
    content: dried up ever-flowing streams.
  '16':
  - type: text
    content: Yours is the day, yours also the night;
  - type: text
    content: 'you have established '
  - type: note
    content: Ps. 104:19; See Gen. 1:14-16
  - type: text
    content: the heavenly lights and the sun.
  '17':
  - type: text
    content: 'You have '
  - type: note
    content: Deut. 32:8; [Acts 17:26]
  - type: text
    content: fixed all the boundaries of the earth;
  - type: text
    content: 'you have made '
  - type: note
    content: Gen. 8:22
  - type: text
    content: summer and winter.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 2, 22 ; Ps. 89:50; Rev. 16:19; 18:5
  - type: text
    content: 'Remember this, O '
  - type: text
    content: Lord
  - type: text
    content: ', how the enemy scoffs,'
  - type: text
    content: 'and '
  - type: note
    content: Ps. 39:8; Deut. 32:6
  - type: text
    content: a foolish people reviles your name.
  '19':
  - type: text
    content: 'Do not deliver the soul of your '
  - type: note
    content: Song 2:14
  - type: text
    content: dove to the wild beasts;
  - type: note
    content: '[ Ps. 68:10 ]'
  - type: text
    content: do not forget the life of your poor forever.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ver. 18, 22
  - type: text
    content: 'Remember your congregation, which you have '
  - type: note
    content: Ex. 15:16; Deut. 32:6; [Ps. 78:54]
  - type: text
    content: purchased of old,
  - type: text
    content: 'which you have '
  - type: note
    content: Ps. 77:15; Isa. 63:9
  - type: text
    content: 'redeemed to be '
  - type: note
    content: Isa. 63:17; Jer. 10:16; 51:19
  - type: text
    content: the tribe of your heritage!
  - type: text
    content: 'Remember Mount Zion, '
  - type: note
    content: Ps. 9:11
  - type: text
    content: where you have dwelt.
  '20':
  - type: text
    content: 'Have regard for '
  - type: note
    content: Ps. 106:45; Gen. 17:7, 8; Lev. 26:44, 45; Jer. 33:21
  - type: text
    content: the covenant,
  - type: text
    content: 'for '
  - type: note
    content: '[Ps. 10:8]'
  - type: text
    content: the dark places of the land are full of the habitations of violence.
  '21':
  - type: text
    content: 'Let not '
  - type: note
    content: Ps. 9:9; 10:18
  - type: text
    content: 'the downtrodden '
  - type: note
    content: '[Ps. 6:10]'
  - type: text
    content: turn back in shame;
  - type: text
    content: 'let '
  - type: note
    content: Ps. 86:1
  - type: text
    content: the poor and needy praise your name.
  '22':
  - type: text
    content: 'Arise, O God, '
  - type: note
    content: '[1 Sam. 24:15]'
  - type: text
    content: defend your cause;
  - type: note
    content: ver. 2, 18
  - type: text
    content: remember how the foolish scoff at you all the day!
  '23':
  - type: text
    content: Do not forget the clamor of your foes,
  - type: note
    content: See Ps. 65:7
  - type: text
    content: the uproar of those who rise against you, which goes up continually!
  '3':
  - type: text
    content: 'Direct your steps to '
  - type: note
    content: '[Isa. 61:4]'
  - type: text
    content: the perpetual ruins;
  - type: text
    content: the enemy has destroyed everything in the sanctuary!
  '4':
  - type: text
    content: 'Your foes have '
  - type: note
    content: Lam. 2:6, 7
  - type: text
    content: roared in the midst of your meeting place;
  - type: note
    content: '[ Matt. 24:15 ]'
  - type: text
    content: 'they set up their '
  - type: note
    content: Num. 2:2
  - type: text
    content: 'own signs for '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: signs.
  '5':
  - type: text
    content: 'They were like those who swing '
  - type: note
    content: '[Jer. 46:22]'
  - type: text
    content: axes
  - type: text
    content: in a forest of trees.
  - type: note
    content: The meaning of the Hebrew is uncertain
  '6':
  - type: text
    content: 'And all its '
  - type: note
    content: '[1 Kgs. 6:18, 29, 32, 35]'
  - type: text
    content: carved wood
  - type: text
    content: they broke down with hatchets and hammers.
  '7':
  - type: text
    content: 'They '
  - type: note
    content: 2 Kgs. 25:9; [Ps. 79:1]
  - type: text
    content: set your sanctuary on fire;
  - type: text
    content: 'they '
  - type: note
    content: Ps. 89:39; [Lam. 2:2]
  - type: text
    content: 'profaned '
  - type: note
    content: '[Ps. 26:8]'
  - type: text
    content: the dwelling place of your name,
  - type: text
    content: bringing it down to the ground.
  '8':
  - type: text
    content: 'They '
  - type: note
    content: Ps. 83:4
  - type: text
    content: said to themselves, “We will utterly subdue them”;
  - type: text
    content: they burned all the meeting places of God in the land.
  '9':
  - type: text
    content: 'We do not see our '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: signs;
  - type: note
    content: '[ 1 Sam. 3:1; Lam. 2:9; Ezek. 7:26; Amos 8:11 ]'
  - type: text
    content: there is no longer any prophet,
  - type: text
    content: and there is none among us who knows how long.
