document_id: GEN.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Increasing Corruption on Earth
  - type: text
    content: 'When man began to multiply on the face of the land and daughters were born to them, '
  '10':
  - type: text
    content: And Noah had three sons, Shem, Ham, and Japheth.
  '11':
  - type: text
    content: 'Now the earth was corrupt in God’s sight, and the earth was filled with violence. '
  '12':
  - type: text
    content: 'And God '
  - type: note
    content: Ps. 14:2, 3; 53:2, 3
  - type: text
    content: 'saw the earth, and behold, it was corrupt, '
  - type: note
    content: Job 22:15-17
  - type: text
    content: 'for all flesh had corrupted their way on the earth. '
  '13':
  - type: text
    content: 'And God said to Noah, '
  - type: note
    content: Ezek. 7:2, 3, 6
  - type: text
    content: “I have determined to make an end of all flesh,
  - type: note
    content: Hebrew The end of all flesh has come before me
  - type: text
    content: ' for the earth is filled with violence through them. Behold, I will destroy them with the earth. '
  '14':
  - type: text
    content: Make yourself an ark of gopher wood.
  - type: note
    content: Transliterated from Hebrew; the identity of this tree is uncertain
  - type: text
    content: ' Make rooms in the ark, and cover it inside and out with pitch. '
  '15':
  - type: text
    content: 'This is how you are to make it: the length of the ark 300 cubits,'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' its breadth 50 cubits, and its height 30 cubits. '
  '16':
  - type: text
    content: Make a roof
  - type: note
    content: Or skylight
  - type: text
    content: ' for the ark, and finish it to a cubit above, and set the door of the ark in its side. Make it with lower, second, and third decks. '
  '17':
  - type: note
    content: ch. 7:4; 2 Pet. 2:5
  - type: text
    content: 'For behold, I will bring a flood of waters upon the earth to destroy all flesh in which is the breath of life under heaven. Everything that is on the earth shall die. '
  '18':
  - type: text
    content: 'But '
  - type: note
    content: ch. 9:9, 11
  - type: text
    content: 'I will establish my covenant with you, and you shall come into the ark, you, your sons, your wife, and your sons’ wives with you. '
  '19':
  - type: text
    content: 'And of every living thing of all flesh, you shall bring two of every sort into the ark to keep them alive with you. They shall be male and female. '
  '2':
  - type: text
    content: 'the sons of God saw that the daughters of man were attractive. And they took as their wives any they chose. '
  '20':
  - type: text
    content: 'Of the birds according to their kinds, and of the animals according to their kinds, of every creeping thing of the ground, according to its kind, two of every sort shall come in to you to keep them alive. '
  '21':
  - type: text
    content: 'Also take with you every sort of food that is eaten, and store it up. It shall serve as food for you and for them.” '
  '22':
  - type: note
    content: Heb. 11:7; [Ex. 40:16]
  - type: text
    content: Noah did this; he did all that God commanded him.
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: 1 Pet. 3:19, 20; [Neh. 9:30; Gal. 5:16, 17]
  - type: text
    content: “My Spirit shall not abide in
  - type: note
    content: Or My Spirit shall not contend with
  - type: text
    content: ' man forever, '
  - type: note
    content: Ps. 78:39
  - type: text
    content: 'for he is flesh: his days shall be 120 years.” '
  '4':
  - type: text
    content: The Nephilim
  - type: note
    content: Or giants
  - type: text
    content: ' were on the earth in those days, and also afterward, when the sons of God came in to the daughters of man and they bore children to them. These were the mighty men who were of old, the men of renown.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps. 14:2, 3
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' saw that the wickedness of man was great in the earth, and that every '
  - type: note
    content: ch. 8:21; Job 14:4; 15:14; Ps. 51:5; Jer. 17:9; Matt. 15:19; Rom. 3:23
  - type: text
    content: 'intention of the thoughts of his heart was only evil continually. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 15:11; 2 Sam. 24:16; Joel 2:13; [Num. 23:19; 1 Sam. 15:29]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' regretted that he had made man on the earth, and it '
  - type: note
    content: Isa. 63:10; Eph. 4:30
  - type: text
    content: 'grieved him to his heart. '
  '7':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will blot out man whom I have created from the face of the land, man and animals and creeping things and birds of the heavens, for I am sorry that I have made them.” '
  '8':
  - type: text
    content: 'But Noah '
  - type: note
    content: ch. 19:19; Ex. 33:12, 13, 16, 17
  - type: text
    content: 'found favor in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Noah and the Flood
  '9':
  - type: text
    content: 'These are the generations of Noah. '
  - type: note
    content: ch. 7:1; Ezek. 14:14, 20; 2 Pet. 2:5
  - type: text
    content: 'Noah was a righteous man, '
  - type: note
    content: Job 1:1, 8; Luke 1:6
  - type: text
    content: 'blameless in his generation. Noah '
  - type: note
    content: ch. 5:22, 24; [Heb. 11:7]
  - type: text
    content: 'walked with God. '
