document_id: DEU.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Various Laws
  - type: text
    content: '“You '
  - type: note
    content: Ex. 23:4
  - type: text
    content: 'shall not see your brother’s ox or his sheep going astray and ignore them. You shall take them back to your brother. '
  '10':
  - type: text
    content: 'You shall not plow with an ox and a donkey together. '
  '11':
  - type: text
    content: You shall not wear cloth of wool and linen mixed together.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Num. 15:38; [ Matt. 23:5 ]
  - type: text
    content: “You shall make yourself tassels on the four corners of the garment with which you cover yourself.
  - type: heading
    content: Laws Concerning Sexual Immorality
  '13':
  - type: text
    content: '“If any man takes a wife and '
  - type: note
    content: '[2 Sam. 13:15]'
  - type: text
    content: 'goes in to her and then hates her '
  '14':
  - type: text
    content: 'and accuses her of misconduct and brings a bad name upon her, saying, ‘I took this woman, and when I came near her, I did not find in her evidence of virginity,’ '
  '15':
  - type: text
    content: 'then the father of the young woman and her mother shall take and bring out the evidence of her virginity to the elders of the city in the gate. '
  '16':
  - type: text
    content: 'And the father of the young woman shall say to the elders, ‘I gave my daughter to this man to marry, and he hates her; '
  '17':
  - type: text
    content: 'and behold, he has accused her of misconduct, saying, “I did not find in your daughter evidence of virginity.” And yet this is the evidence of my daughter’s virginity.’ And they shall spread the cloak before the elders of the city. '
  '18':
  - type: text
    content: Then the elders of that city shall take the man and whip
  - type: note
    content: Or discipline
  - type: text
    content: ' him, '
  '19':
  - type: text
    content: and they shall fine him a hundred shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver and give them to the father of the young woman, because he has brought a bad name upon a virgin'
  - type: note
    content: Or girl of marriageable age
  - type: text
    content: ' of Israel. And she shall be his wife. '
  - type: note
    content: '[Matt. 19:8, 9; Mark 10:11; Luke 16:18]'
  - type: text
    content: 'He may not divorce her all his days. '
  '2':
  - type: text
    content: 'And if he does not live near you and you do not know who he is, you shall bring it home to your house, and it shall stay with you until your brother seeks it. Then you shall restore it to him. '
  '20':
  - type: text
    content: 'But if the thing is true, that evidence of virginity was not found in the young woman, '
  '21':
  - type: text
    content: 'then they shall bring out the young woman to the door of her father’s house, and '
  - type: note
    content: '[ch. 21:21]'
  - type: text
    content: 'the men of her city shall stone her to death with stones, because she has '
  - type: note
    content: See Gen. 34:7
  - type: text
    content: 'done an outrageous thing in Israel by whoring in her father’s house. '
  - type: note
    content: See ch. 13:5
  - type: text
    content: So you shall purge the evil from your midst.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Lev. 20:10; [ Ezek. 16:38, 40; 23:45, 47; John 8:5 ]
  - type: text
    content: '“If a man is found lying with the wife of another man, both of them shall die, the man who lay with the woman, and the woman. '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: So you shall purge the evil from Israel.
  '23':
  - type: text
    content: '“If there is a '
  - type: note
    content: '[Matt. 1:18, 19]'
  - type: text
    content: 'betrothed virgin, and a man meets her in the city and lies with her, '
  '24':
  - type: text
    content: 'then you shall bring them both out to the gate of that city, and you shall stone them to death with stones, the young woman because she did not cry for help though she was in the city, and the man because he violated his neighbor’s wife. '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: So you shall purge the evil from your midst.
  '25':
  - type: text
    content: '“But if in the open country a man meets a young woman who is betrothed, and the man seizes her and lies with her, then only the man who lay with her shall die. '
  '26':
  - type: text
    content: 'But you shall do nothing to the young woman; she has committed no offense punishable by death. For this case is like that of a man attacking and murdering his neighbor, '
  '27':
  - type: text
    content: because he met her in the open country, and though the betrothed young woman cried for help there was no one to rescue her.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Ex. 22:16, 17
  - type: text
    content: '“If a man meets a virgin who is not betrothed, and seizes her and lies with her, and they are found, '
  '29':
  - type: text
    content: then the man who lay with her shall give to the father of the young woman fifty shekels of silver, and she shall be his wife, because he has violated her. He may not divorce her all his days.
  '3':
  - type: text
    content: 'And you shall do the same with his donkey or with his garment, or with any lost thing of your brother’s, which he loses and you find; you may not ignore it. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ch 23:1 in Hebrew
  - type: note
    content: See Lev. 18:8
  - type: text
    content: '“A man shall not take his father’s wife, so that he does not '
  - type: note
    content: ch. 27:20; [Ruth 3:9; Ezek. 16:8]
  - type: text
    content: uncover his father’s nakedness.
  - type: note
    content: Hebrew uncover his father’s skirt
  '4':
  - type: note
    content: Ex. 23:5
  - type: text
    content: You shall not see your brother’s donkey or his ox fallen down by the way and ignore them. You shall help him to lift them up again.
  '5':
  - type: text
    content: '“A woman shall not wear a man’s garment, nor shall a man put on a woman’s cloak, '
  - type: note
    content: '[ch. 18:12; 25:16]'
  - type: text
    content: 'for whoever does these things is an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: '“If you come across a bird’s nest in any tree or on the ground, with young ones or eggs and the mother sitting on the young or on the eggs, '
  - type: note
    content: Lev. 22:28
  - type: text
    content: 'you shall not take the mother with the young. '
  '7':
  - type: text
    content: 'You shall let the mother go, but the young you may take for yourself, '
  - type: note
    content: See ch. 4:40
  - type: text
    content: that it may go well with you, and that you may live long.
  '8':
  - type: text
    content: “When you build a new house, you shall make a parapet for your roof, that you may not bring the guilt of blood upon your house, if anyone should fall from it.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:19
  - type: text
    content: “You shall not sow your vineyard with two kinds of seed, lest the whole yield be forfeited,
  - type: note
    content: Hebrew become holy
  - type: text
    content: ' the crop that you have sown and the yield of the vineyard. '
