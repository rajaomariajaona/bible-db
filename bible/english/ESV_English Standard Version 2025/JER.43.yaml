document_id: JER.43,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Taken to Egypt
  - type: text
    content: 'When Jeremiah finished speaking to all the people all these words of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, with which the '
  - type: text
    content: Lord
  - type: text
    content: ' their God had sent him to them, '
  '10':
  - type: text
    content: 'and say to them, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: Behold, I will send and take Nebuchadnezzar the king of Babylon, '
  - type: note
    content: See ch. 25:9
  - type: text
    content: 'my servant, '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'and I will set his throne above these stones that I have hidden, and he will spread his royal canopy over them. '
  '11':
  - type: text
    content: 'He shall come '
  - type: note
    content: ch. 44:13; 46:13
  - type: text
    content: 'and strike the land of Egypt, '
  - type: note
    content: See ch. 15:2
  - type: text
    content: 'giving over to the pestilence those who are doomed to the pestilence, to captivity those who are doomed to captivity, and to the sword those who are doomed to the sword. '
  '12':
  - type: note
    content: See ch. 17:27
  - type: text
    content: 'I shall kindle a fire '
  - type: note
    content: ch. 46:25; Ezek. 30:13; [Ex. 12:12; Isa. 19:1]
  - type: text
    content: 'in the temples of the gods of Egypt, and he shall burn them '
  - type: note
    content: '[ch. 48:7]'
  - type: text
    content: 'and carry them away captive. '
  - type: note
    content: '[Ps. 104:2; Isa. 49:18]'
  - type: text
    content: 'And he shall clean the land of Egypt '
  - type: note
    content: '[Ps. 104:2; Isa. 49:18]'
  - type: text
    content: 'as a shepherd cleans his cloak of vermin, and he shall go away from there in peace. '
  '13':
  - type: text
    content: 'He shall break the '
  - type: note
    content: '[Ex. 23:24]'
  - type: text
    content: 'obelisks of Heliopolis, which is in the land of Egypt, '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: and the temples of the gods of Egypt he shall burn with fire.’”
  '2':
  - type: text
    content: 'Azariah the son of '
  - type: note
    content: ch. 42:1
  - type: text
    content: 'Hoshaiah and '
  - type: note
    content: See ch. 40:8
  - type: text
    content: 'Johanan the son of Kareah and '
  - type: note
    content: Ps. 86:14; Isa. 13:11; Mal. 4:1
  - type: text
    content: 'all the insolent men said to Jeremiah, “You are telling a lie. The '
  - type: text
    content: Lord
  - type: text
    content: ' our God did not send you to say, '
  - type: note
    content: ch. 42:19
  - type: text
    content: '‘Do not go to Egypt to live there,’ '
  '3':
  - type: text
    content: 'but '
  - type: note
    content: See ch. 32:12
  - type: text
    content: 'Baruch the son of Neriah '
  - type: note
    content: '[ch. 38:22]'
  - type: text
    content: 'has set you against us, '
  - type: note
    content: '[ch. 37:13]'
  - type: text
    content: 'to deliver us into the hand of the Chaldeans, that they may kill us or take us into exile in Babylon.” '
  '4':
  - type: text
    content: 'So '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Johanan the son of Kareah and all '
  - type: note
    content: ch. 40:13
  - type: text
    content: 'the commanders of the forces and all the people did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ', to remain in the land of Judah. '
  '5':
  - type: text
    content: 'But Johanan the son of Kareah and all the commanders of the forces took '
  - type: note
    content: '[ch. 40:11, 12]'
  - type: text
    content: 'all the remnant of Judah who had returned to live in the land of Judah from all the nations to which they had been driven— '
  '6':
  - type: note
    content: ch. 44:20
  - type: text
    content: 'the men, the women, the children, '
  - type: note
    content: See ch. 38:23
  - type: text
    content: 'the princesses, and every person whom '
  - type: note
    content: ch. 39:10; 40:7
  - type: text
    content: 'Nebuzaradan the captain of the guard had left with '
  - type: note
    content: See ch. 39:14
  - type: text
    content: 'Gedaliah the son of Ahikam, son of Shaphan; also Jeremiah the prophet and Baruch the son of Neriah. '
  '7':
  - type: text
    content: 'And they came into the land of Egypt, for they did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: '. And they arrived at '
  - type: note
    content: ch. 2:16; 44:1; 46:14; [Isa. 30:4]
  - type: text
    content: Tahpanhes.
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah in '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Tahpanhes: '
  '9':
  - type: text
    content: '“Take in your hands large stones and hide them in the mortar in the pavement that is at the entrance to Pharaoh’s palace in '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Tahpanhes, in the sight of the men of Judah, '
