document_id: GEN.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac Blesses Jacob
  - type: text
    content: 'When Isaac was old and '
  - type: note
    content: ch. 48:10; 1 Sam. 3:2
  - type: text
    content: 'his eyes were dim so that he could not see, he called Esau his older son and said to him, “My son”; and he answered, “Here I am.” '
  '10':
  - type: text
    content: 'And you shall bring it to your father to eat, '
  - type: note
    content: ver. 4
  - type: text
    content: 'so that he may bless you before he dies.” '
  '11':
  - type: text
    content: 'But Jacob said to Rebekah his mother, “Behold, '
  - type: note
    content: ch. 25:25
  - type: text
    content: 'my brother Esau is a hairy man, and I am a smooth man. '
  '12':
  - type: text
    content: 'Perhaps my father '
  - type: note
    content: ver. 21, 22
  - type: text
    content: 'will feel me, and I shall seem to be mocking him and bring '
  - type: note
    content: '[Deut. 27:18]'
  - type: text
    content: 'a curse upon myself and not a blessing.” '
  '13':
  - type: text
    content: 'His mother said to him, '
  - type: note
    content: '[1 Sam. 25:24; 2 Sam. 14:9; Matt. 27:25]'
  - type: text
    content: “Let your curse be on me, my son; only obey my voice, and go, bring them to me.”
  '14':
  - type: text
    content: 'So he went and took them and brought them to his mother, and his mother prepared delicious food, such as his father loved. '
  '15':
  - type: text
    content: 'Then Rebekah took the '
  - type: note
    content: ver. 27
  - type: text
    content: 'best garments of Esau her older son, which were with her in the house, and put them on Jacob her younger son. '
  '16':
  - type: text
    content: 'And the skins of the young goats she put on his hands and on the smooth part of his neck. '
  '17':
  - type: text
    content: And she put the delicious food and the bread, which she had prepared, into the hand of her son Jacob.
  '18':
  - type: text
    content: 'So he went in to his father and said, “My father.” And he said, “Here I am. Who are you, my son?” '
  '19':
  - type: text
    content: 'Jacob said to his father, “I am Esau your firstborn. I have done as you told me; now sit up and eat of my game, that your soul may bless me.” '
  '2':
  - type: text
    content: 'He said, “Behold, I am old; I do not know the day of my death. '
  '20':
  - type: text
    content: 'But Isaac said to his son, “How is it that you have found it so quickly, my son?” He answered, “Because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God granted me success.” '
  '21':
  - type: text
    content: 'Then Isaac said to Jacob, “Please come near, that I '
  - type: note
    content: ver. 12
  - type: text
    content: 'may feel you, my son, to know whether you are really my son Esau or not.” '
  '22':
  - type: text
    content: 'So Jacob went near to Isaac his father, who felt him and said, “The voice is Jacob’s voice, but the hands are the hands of Esau.” '
  '23':
  - type: text
    content: 'And he did not recognize him, because '
  - type: note
    content: ver. 16
  - type: text
    content: 'his hands were hairy like his brother Esau’s hands. '
  - type: note
    content: Heb. 11:20
  - type: text
    content: 'So he blessed him. '
  '24':
  - type: text
    content: 'He said, “Are you really my son Esau?” He answered, “I am.” '
  '25':
  - type: text
    content: 'Then he said, “Bring it near to me, '
  - type: note
    content: ver. 10
  - type: text
    content: that I may eat of my son’s game and bless you.” So he brought it near to him, and he ate; and he brought him wine, and he drank.
  '26':
  - type: text
    content: 'Then his father Isaac said to him, “Come near and kiss me, my son.” '
  '27':
  - type: text
    content: 'So he came near and kissed him. And Isaac smelled the smell of his garments '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: and blessed him and said,
  - type: text
    content: '“See, '
  - type: note
    content: '[Hos. 14:6]'
  - type: text
    content: the smell of my son
  - type: text
    content: 'is as the smell of a field that the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed!'
  '28':
  - type: text
    content: 'May God give you of '
  - type: note
    content: Deut. 33:13; Zech. 8:12; [ch. 49:25; 2 Sam. 1:21]
  - type: text
    content: the dew of heaven
  - type: text
    content: and of the fatness of the earth
  - type: text
    content: 'and '
  - type: note
    content: Deut. 7:13; 33:28; Joel 2:19
  - type: text
    content: plenty of grain and wine.
  '29':
  - type: text
    content: Let peoples serve you,
  - type: text
    content: 'and nations '
  - type: note
    content: '[ch. 49:8]'
  - type: text
    content: bow down to you.
  - type: note
    content: '[ 2 Sam. 8:14 ]'
  - type: text
    content: Be lord over your brothers,
  - type: text
    content: and may your mother’s sons bow down to you.
  - type: note
    content: ch. 12:3; Num. 24:9
  - type: text
    content: Cursed be everyone who curses you,
  - type: text
    content: and blessed be everyone who blesses you!”
  '3':
  - type: note
    content: ch. 25:27, 28
  - type: text
    content: 'Now then, take your weapons, your quiver and your bow, and go out to the field and hunt game for me, '
  '30':
  - type: text
    content: 'As soon as Isaac had finished blessing Jacob, when Jacob had scarcely gone out from the presence of Isaac his father, Esau his brother came in from his hunting. '
  '31':
  - type: text
    content: 'He also prepared delicious food and brought it to his father. And he said to his father, “Let my father arise and eat of his son’s game, that you may bless me.” '
  '32':
  - type: text
    content: 'His father Isaac said to him, “Who are you?” He answered, “I am your son, your firstborn, Esau.” '
  '33':
  - type: text
    content: 'Then Isaac trembled very violently and said, “Who was it then that hunted game and brought it to me, and I ate it all before you came, and I have blessed him? Yes, and he shall be blessed.” '
  '34':
  - type: text
    content: 'As soon as Esau heard the words of his father, '
  - type: note
    content: Heb. 12:17
  - type: text
    content: 'he cried out with an exceedingly great and bitter cry and said to his father, “Bless me, even me also, O my father!” '
  '35':
  - type: text
    content: 'But he said, “Your brother came deceitfully, and he has taken away your blessing.” '
  '36':
  - type: text
    content: 'Esau said, '
  - type: note
    content: ch. 25:26
  - type: text
    content: “Is he not rightly named Jacob?
  - type: note
    content: Jacob means He takes by the heel, or He cheats
  - type: text
    content: ' For he has cheated me these two times. '
  - type: note
    content: ch. 25:33
  - type: text
    content: 'He took away my birthright, and behold, now he has taken away my blessing.” Then he said, “Have you not reserved a blessing for me?” '
  '37':
  - type: text
    content: 'Isaac answered and said to Esau, “Behold, '
  - type: note
    content: ver. 29; [2 Sam. 8:14]
  - type: text
    content: 'I have made him lord over you, and all his brothers I have given to him for servants, and '
  - type: note
    content: ver. 28
  - type: text
    content: 'with grain and wine I have sustained him. What then can I do for you, my son?” '
  '38':
  - type: text
    content: 'Esau said to his father, “Have you but one blessing, my father? Bless me, even me also, O my father.” And '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: Esau lifted up his voice and wept.
  '39':
  - type: text
    content: 'Then Isaac his father answered and said to him:'
  - type: text
    content: '“Behold, '
  - type: note
    content: ver. 28; ch. 36:6, 7
  - type: text
    content: away from
  - type: note
    content: Or Behold, of
  - type: text
    content: ' the fatness of the earth shall your dwelling be,'
  - type: text
    content: and away from
  - type: note
    content: Or and of
  - type: text
    content: ' the dew of heaven on high.'
  '4':
  - type: text
    content: 'and prepare for me delicious food, such as I love, and bring it to me so that I may eat, that my soul '
  - type: note
    content: ch. 10:25; 48:9, 15; 49:28; Deut. 33:1
  - type: text
    content: may bless you before I die.”
  '40':
  - type: text
    content: By your sword you shall live,
  - type: text
    content: 'and you '
  - type: note
    content: ch. 25:23; [2 Sam. 8:14]; See Obad. 18-21
  - type: text
    content: shall serve your brother;
  - type: text
    content: but when you grow restless
  - type: note
    content: '[ 2 Kgs. 8:20-22 ]'
  - type: text
    content: you shall break his yoke from your neck.”
  '41':
  - type: text
    content: 'Now Esau '
  - type: note
    content: '[ch. 37:4]'
  - type: text
    content: 'hated Jacob because of the blessing with which his father had blessed him, and Esau said to himself, '
  - type: note
    content: ch. 50:3, 4, 10
  - type: text
    content: '“The days of mourning for my father are approaching; '
  - type: note
    content: '[Amos 1:11; Obad. 10]'
  - type: text
    content: 'then I will kill my brother Jacob.” '
  '42':
  - type: text
    content: 'But the words of Esau her older son were told to Rebekah. So she sent and called Jacob her younger son and said to him, “Behold, your brother Esau comforts himself about you by planning to kill you. '
  '43':
  - type: text
    content: 'Now therefore, my son, obey my voice. Arise, flee to Laban my brother in Haran '
  '44':
  - type: text
    content: 'and stay with him a while, until your brother’s fury turns away— '
  '45':
  - type: text
    content: until your brother’s anger turns away from you, and he forgets what you have done to him. Then I will send and bring you from there. Why should I be bereft of you both in one day?”
  '46':
  - type: text
    content: 'Then Rebekah said to Isaac, '
  - type: note
    content: ch. 26:34, 35; 28:8
  - type: text
    content: “I loathe my life because of the Hittite women.
  - type: note
    content: Hebrew daughters of Heth
  - type: text
    content: ' '
  - type: note
    content: ch. 24:3
  - type: text
    content: If Jacob marries one of the Hittite women like these, one of the women of the land, what good will my life be to me?”
  '5':
  - type: text
    content: 'Now Rebekah was listening when Isaac spoke to his son Esau. So when Esau went to the field to hunt for game and bring it, '
  '6':
  - type: text
    content: 'Rebekah said to her son Jacob, “I heard your father speak to your brother Esau, '
  '7':
  - type: text
    content: '‘Bring me game and prepare for me delicious food, that I may eat it and bless you before the '
  - type: text
    content: Lord
  - type: text
    content: ' before I die.’ '
  '8':
  - type: text
    content: 'Now therefore, my son, '
  - type: note
    content: ver. 13
  - type: text
    content: 'obey my voice as I command you. '
  '9':
  - type: text
    content: 'Go to the flock and bring me two good young goats, so that I may prepare from them delicious food for your father, such as he loves. '
