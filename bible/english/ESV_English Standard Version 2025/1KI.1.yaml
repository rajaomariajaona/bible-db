document_id: 1KI.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David in His Old Age
  - type: text
    content: 'Now King David was old and advanced in years. And although they covered him with clothes, he could not get warm. '
  '10':
  - type: text
    content: 'but he did not invite Nathan the prophet or Benaiah or the mighty men or '
  - type: note
    content: 2 Sam. 12:24
  - type: text
    content: Solomon his brother.
  - type: heading
    content: Nathan and Bathsheba Before David
  '11':
  - type: text
    content: 'Then Nathan said to Bathsheba the mother of Solomon, “Have you not heard that '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'Adonijah the son of Haggith has become king and David our lord does not know it? '
  '12':
  - type: text
    content: 'Now therefore come, let me give you advice, that you may save your own life and the life of your son Solomon. '
  '13':
  - type: text
    content: 'Go in at once to King David, and say to him, ‘Did you not, my lord the king, swear to your servant, saying, '
  - type: note
    content: ver. 30; [1 Chr. 22:9]
  - type: text
    content: '“Solomon your son shall reign after me, and he shall sit on my throne”? Why then is Adonijah king?’ '
  '14':
  - type: text
    content: Then while you are still speaking with the king, I also will come in after you and confirm
  - type: note
    content: Or expand on
  - type: text
    content: ' your words.”'
  '15':
  - type: text
    content: 'So Bathsheba went to the king in his chamber (now the king was very old, and Abishag the Shunammite was attending to the king). '
  '16':
  - type: text
    content: 'Bathsheba bowed and paid homage to the king, and the king said, “What do you desire?” '
  '17':
  - type: text
    content: 'She said to him, “My lord, you swore to your servant by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, saying, '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: '‘Solomon your son shall reign after me, and he shall sit on my throne.’ '
  '18':
  - type: text
    content: 'And now, behold, Adonijah is king, although you, my lord the king, do not know it. '
  '19':
  - type: note
    content: ver. 9
  - type: text
    content: 'He has sacrificed oxen, fattened cattle, and sheep in abundance, and has invited all the sons of the king, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Abiathar the priest, and Joab the commander of the army, but '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'Solomon your servant he has not invited. '
  '2':
  - type: text
    content: Therefore his servants said to him, “Let a young woman be sought for my lord the king, and let her wait on the king and be in his service. Let her lie in your arms,
  - type: note
    content: Or in your bosom
  - type: text
    content: ' that my lord the king may be warm.” '
  '20':
  - type: text
    content: 'And now, my lord the king, the eyes of all Israel are on you, to tell them who shall sit on the throne of my lord the king after him. '
  '21':
  - type: text
    content: 'Otherwise it will come to pass, when my lord the king '
  - type: note
    content: ch. 2:10; 2 Sam. 7:12; [Deut. 31:16]
  - type: text
    content: sleeps with his fathers, that I and my son Solomon will be counted offenders.”
  '22':
  - type: text
    content: 'While she was still speaking with the king, Nathan the prophet came in. '
  '23':
  - type: text
    content: 'And they told the king, “Here is Nathan the prophet.” And when he came in before the king, he bowed before the king, with his face to the ground. '
  '24':
  - type: text
    content: 'And Nathan said, “My lord the king, have you said, ‘Adonijah shall reign after me, and he shall sit on my throne’? '
  '25':
  - type: text
    content: 'For he has gone down this day and '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: has sacrificed oxen, fattened cattle, and sheep in abundance, and has invited all the king’s sons, the commanders
  - type: note
    content: Hebrew; Septuagint Joab the commander
  - type: text
    content: ' of the army, and Abiathar the priest. And behold, they are eating and drinking before him, and saying, '
  - type: note
    content: See 1 Sam. 10:24
  - type: text
    content: '‘Long live King Adonijah!’ '
  '26':
  - type: note
    content: ver. 8, 10, 32
  - type: text
    content: 'But me, your servant, and Zadok the priest, and Benaiah the son of Jehoiada, and your servant Solomon he has not invited. '
  '27':
  - type: text
    content: Has this thing been brought about by my lord the king and you have not told your servants who should sit on the throne of my lord the king after him?”
  - type: heading
    content: Solomon Anointed King
  '28':
  - type: text
    content: 'Then King David answered, “Call Bathsheba to me.” So she came into the king’s presence and stood before the king. '
  '29':
  - type: text
    content: 'And the king swore, saying, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who has redeemed my soul out of every adversity, '
  '3':
  - type: text
    content: 'So they sought for a beautiful young woman throughout all the territory of Israel, and found Abishag the '
  - type: note
    content: Josh. 19:18
  - type: text
    content: 'Shunammite, and brought her to the king. '
  '30':
  - type: note
    content: ver. 13, 17
  - type: text
    content: 'as I swore to you by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, saying, ‘Solomon your son shall reign after me, and he shall sit on my throne in my place,’ even so will I do this day.” '
  '31':
  - type: text
    content: 'Then Bathsheba bowed with her face to the ground and paid homage to the king and said, '
  - type: note
    content: Neh. 2:3; Dan. 2:4; 3:9; 5:10; 6:6, 21
  - type: text
    content: “May my lord King David live forever!”
  '32':
  - type: text
    content: 'King David said, “Call to me Zadok the priest, Nathan the prophet, and Benaiah the son of Jehoiada.” So they came before the king. '
  '33':
  - type: text
    content: 'And the king said to them, “Take with you '
  - type: note
    content: 2 Sam. 11:11; 20:6
  - type: text
    content: 'the servants of your lord and have Solomon my son ride on my own mule, and bring him down to '
  - type: note
    content: 2 Chr. 32:30; 33:14
  - type: text
    content: 'Gihon. '
  '34':
  - type: text
    content: 'And let Zadok the priest and Nathan the prophet there '
  - type: note
    content: See 1 Sam. 10:1
  - type: text
    content: 'anoint him king over Israel. '
  - type: note
    content: 2 Sam. 15:10; 2 Kgs. 9:13; 11:14
  - type: text
    content: 'Then blow the trumpet and say, '
  - type: note
    content: '[ver. 25]; See 1 Sam. 10:24'
  - type: text
    content: '‘Long live King Solomon!’ '
  '35':
  - type: text
    content: 'You shall then come up after him, and he shall come and sit on my throne, for he shall be king in my place. And I have appointed him to be ruler over Israel and over Judah.” '
  '36':
  - type: text
    content: 'And Benaiah the son of Jehoiada answered the king, “Amen! May the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my lord the king, say so. '
  '37':
  - type: note
    content: See 1 Sam. 20:13
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' has been with my lord the king, even so may he be with Solomon, '
  - type: note
    content: ver. 47
  - type: text
    content: and make his throne greater than the throne of my lord King David.”
  '38':
  - type: text
    content: 'So Zadok the priest, Nathan the prophet, and Benaiah the son of Jehoiada, '
  - type: note
    content: See 2 Sam. 8:18
  - type: text
    content: 'and the Cherethites and the Pelethites went down and had Solomon ride on King David’s mule and brought him to Gihon. '
  '39':
  - type: text
    content: 'There Zadok the priest took the horn of '
  - type: note
    content: '[Ps. 89:20]; See Ex. 30:23-32'
  - type: text
    content: 'oil from the tent and '
  - type: note
    content: 1 Chr. 29:22
  - type: text
    content: 'anointed Solomon. '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'Then they blew the trumpet, and all the people said, '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: '“Long live King Solomon!” '
  '4':
  - type: text
    content: The young woman was very beautiful, and she was of service to the king and attended to him, but the king knew her not.
  - type: heading
    content: Adonijah Sets Himself Up as King
  '40':
  - type: text
    content: And all the people went up after him, playing on pipes, and rejoicing with great joy, so that the earth was split by their noise.
  '41':
  - type: text
    content: 'Adonijah and all the guests who were with him heard it as they finished feasting. And when Joab heard the sound of the trumpet, he said, “What does this uproar in the city mean?” '
  '42':
  - type: text
    content: 'While he was still speaking, behold, '
  - type: note
    content: 2 Sam. 15:27, 36; 17:17
  - type: text
    content: 'Jonathan the son of Abiathar the priest came. And Adonijah said, “Come in, '
  - type: note
    content: 2 Sam. 18:27
  - type: text
    content: 'for you are a worthy man and bring good news.” '
  '43':
  - type: text
    content: 'Jonathan answered Adonijah, “No, for our lord King David has made Solomon king, '
  '44':
  - type: text
    content: 'and the king has sent with him Zadok the priest, Nathan the prophet, and Benaiah the son of Jehoiada, and the '
  - type: note
    content: '[See ver. 38 above]'
  - type: text
    content: 'Cherethites and the Pelethites. And they had him ride on the king’s mule. '
  '45':
  - type: text
    content: 'And Zadok the priest and Nathan the prophet have anointed him king at '
  - type: note
    content: '[See ver. 33 above]'
  - type: text
    content: 'Gihon, and they have gone up from there rejoicing, so that the city is in an uproar. This is the noise that you have heard. '
  '46':
  - type: note
    content: 1 Chr. 29:23
  - type: text
    content: 'Solomon sits on the royal throne. '
  '47':
  - type: text
    content: 'Moreover, the king’s servants came to congratulate our lord King David, saying, '
  - type: note
    content: ver. 37
  - type: text
    content: '‘May your God make the name of Solomon more famous than yours, and make his throne greater than your throne.’ And the king '
  - type: note
    content: '[Gen. 47:31]'
  - type: text
    content: 'bowed himself on the bed. '
  '48':
  - type: text
    content: 'And the king also said, ‘Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ch. 3:6; [Ps. 132:11, 12]
  - type: text
    content: who has granted someone
  - type: note
    content: Septuagint one of my offspring
  - type: text
    content: ' to sit on my throne this day, my own eyes seeing it.’”'
  '49':
  - type: text
    content: 'Then all the guests of Adonijah trembled and rose, and each went his own way. '
  '5':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Sam. 3:4
  - type: text
    content: 'Adonijah the son of Haggith exalted himself, saying, “I will be king.” '
  - type: note
    content: 2 Sam. 15:1
  - type: text
    content: 'And he prepared for himself chariots and horsemen, and fifty men to run before him. '
  '50':
  - type: text
    content: 'And Adonijah feared Solomon. So he arose and went '
  - type: note
    content: ch. 2:28
  - type: text
    content: 'and took hold of '
  - type: note
    content: Ex. 27:2
  - type: text
    content: 'the horns of the altar. '
  '51':
  - type: text
    content: 'Then it was told Solomon, “Behold, Adonijah fears King Solomon, for behold, he has laid hold of the horns of the altar, saying, ‘Let King Solomon swear to me first that he will not put his servant to death with the sword.’” '
  '52':
  - type: text
    content: 'And Solomon said, “If he will show himself a worthy man, '
  - type: note
    content: See 1 Sam. 14:45
  - type: text
    content: 'not one of his hairs shall fall to the earth, but if wickedness is found in him, he shall die.” '
  '53':
  - type: text
    content: So King Solomon sent, and they brought him down from the altar. And he came and paid homage to King Solomon, and Solomon said to him, “Go to your house.”
  '6':
  - type: text
    content: 'His father had never at any time displeased him by asking, “Why have you done thus and so?” He was also a very handsome man, '
  - type: note
    content: 2 Sam. 3:3, 4; 1 Chr. 3:2
  - type: text
    content: 'and he was born next after Absalom. '
  '7':
  - type: text
    content: 'He conferred with '
  - type: note
    content: 2 Sam. 2:13, 18
  - type: text
    content: 'Joab the son of Zeruiah and with '
  - type: note
    content: 2 Sam. 20:25
  - type: text
    content: 'Abiathar the priest. And they followed Adonijah and helped him. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'Zadok the priest and '
  - type: note
    content: 2 Sam. 8:18
  - type: text
    content: 'Benaiah the son of Jehoiada and '
  - type: note
    content: 2 Sam. 12:1
  - type: text
    content: 'Nathan the prophet and '
  - type: note
    content: ch. 4:18
  - type: text
    content: 'Shimei and Rei and '
  - type: note
    content: See 2 Sam. 23:8-39
  - type: text
    content: David’s mighty men were not with Adonijah.
  '9':
  - type: text
    content: 'Adonijah sacrificed sheep, oxen, and fattened cattle by the Serpent’s Stone, which is beside '
  - type: note
    content: Josh. 15:7; 2 Sam. 17:17
  - type: text
    content: 'En-rogel, and he invited all his brothers, the king’s sons, and all the royal officials of Judah, '
