verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ Eccles. 7:1 ]'
  - type: text
    content: A good name is to be chosen rather than great riches,
  - type: text
    content: and favor is better than silver or gold.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 21:9, 10 ]'
  - type: text
    content: 'Drive out a scoffer, '
  - type: note
    content: '[ch. 26:20]'
  - type: text
    content: and strife will go out,
  - type: text
    content: 'and '
  - type: note
    content: ch. 26:20
  - type: text
    content: quarreling and abuse will cease.
  '11':
  - type: text
    content: 'He who '
  - type: note
    content: '[ch. 16:13; Ps. 101:6]'
  - type: text
    content: loves purity of heart,
  - type: text
    content: 'and whose '
  - type: note
    content: '[Eccles. 10:12]'
  - type: text
    content: 'speech is gracious, '
  - type: note
    content: '[ch. 14:35]'
  - type: text
    content: will have the king as his friend.
  '12':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' keep watch over knowledge,'
  - type: text
    content: 'but he '
  - type: note
    content: ch. 21:12; [ch. 11:3]
  - type: text
    content: overthrows the words of the traitor.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:13
  - type: text
    content: The sluggard says, “There is a lion outside!
  - type: text
    content: I shall be killed in the streets!”
  '14':
  - type: text
    content: 'The mouth of '
  - type: note
    content: See ch. 2:16
  - type: text
    content: forbidden
  - type: note
    content: Hebrew strange
  - type: text
    content: ' women is '
  - type: note
    content: '[ch. 23:27]'
  - type: text
    content: a deep pit;
  - type: note
    content: Eccles. 7:26
  - type: text
    content: 'he with whom the '
  - type: text
    content: Lord
  - type: text
    content: ' is angry will fall into it.'
  '15':
  - type: text
    content: Folly is bound up in the heart of a child,
  - type: text
    content: 'but '
  - type: note
    content: See ch. 13:24
  - type: text
    content: the rod of discipline drives it far from him.
  '16':
  - type: text
    content: Whoever oppresses the poor to increase his own wealth,
  - type: text
    content: 'or gives to the rich, '
  - type: note
    content: ch. 28:22
  - type: text
    content: will only come to poverty.
  - type: heading
    content: Words of the Wise
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:1
  - type: text
    content: 'Incline your ear, and hear '
  - type: note
    content: ch. 1:6; 24:23
  - type: text
    content: the words of the wise,
  - type: note
    content: '[ch. 23:12 ]'
  - type: text
    content: and apply your heart to my knowledge,
  '18':
  - type: text
    content: for it will be pleasant if you keep them within you,
  - type: text
    content: if all of them are ready on your lips.
  '19':
  - type: text
    content: 'That your trust may be in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I have made them known to you today, even to you.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 29:13 ]'
  - type: text
    content: The rich and the poor meet together;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: ch. 14:31; Job 31:15
  - type: text
    content: the Maker of them all.
  '20':
  - type: text
    content: 'Have I not written for you '
  - type: note
    content: ch. 8:6
  - type: text
    content: thirty sayings
  - type: text
    content: of counsel and knowledge,
  '21':
  - type: text
    content: 'to '
  - type: note
    content: '[Luke 1:3, 4]'
  - type: text
    content: make you know what is right and true,
  - type: text
    content: that you may give a true answer to those who sent you?
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 23:6; Zech. 7:10; Mal. 3:5 ]'
  - type: text
    content: Do not rob the poor, because he is poor,
  - type: text
    content: 'or '
  - type: note
    content: See Job 5:4
  - type: text
    content: 'crush the afflicted at '
  - type: note
    content: Job 31:21
  - type: text
    content: the gate,
  '23':
  - type: text
    content: 'for '
  - type: note
    content: ch. 23:11; 1 Sam. 25:39; Ps. 12:5; 35:10; 68:5; 140:12; Jer. 51:36
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will plead their cause'
  - type: text
    content: and rob of life those who rob them.
  '24':
  - type: text
    content: Make no friendship with a man given to anger,
  - type: text
    content: nor go with a wrathful man,
  '25':
  - type: text
    content: lest you learn his ways
  - type: text
    content: and entangle yourself in a snare.
  '26':
  - type: text
    content: 'Be not one of those who '
  - type: note
    content: See Job 17:3
  - type: text
    content: give pledges,
  - type: text
    content: who put up security for debts.
  '27':
  - type: text
    content: If you have nothing with which to pay,
  - type: text
    content: 'why should '
  - type: note
    content: '[ch. 20:16; Ex. 22:26]'
  - type: text
    content: your bed be taken from under you?
  '28':
  - type: text
    content: 'Do not move the ancient '
  - type: note
    content: ch. 23:10; Deut. 19:14; 27:17; Job 24:2; Hos. 5:10
  - type: text
    content: landmark
  - type: text
    content: that your fathers have set.
  '29':
  - type: text
    content: Do you see a man skillful in his work?
  - type: text
    content: 'He will '
  - type: note
    content: 1 Kgs. 10:8; See Gen. 41:46
  - type: text
    content: stand before kings;
  - type: text
    content: he will not stand before obscure men.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:12; [ch. 14:16 ]
  - type: text
    content: The prudent sees danger and hides himself,
  - type: text
    content: but the simple go on and suffer for it.
  '4':
  - type: text
    content: 'The reward for humility and fear of the '
  - type: text
    content: Lord
  - type: text
    content: 'is '
  - type: note
    content: '[ch. 21:20, 21]'
  - type: text
    content: riches and honor and life.
  - type: note
    content: Or The reward for humility is the fear of the Lord, riches and honor and life
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:19
  - type: text
    content: Thorns and snares are in the way of the crooked;
  - type: text
    content: 'whoever '
  - type: note
    content: ch. 21:23; [1 John 5:18]
  - type: text
    content: guards his soul will keep far from them.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Eph. 6:4; 2 Tim. 3:15
  - type: text
    content: Train up a child in the way he should go;
  - type: text
    content: even when he is old he will not depart from it.
  '7':
  - type: text
    content: ' '
  - type: note
    content: James 2:6
  - type: text
    content: The rich rules over the poor,
  - type: text
    content: and the borrower is the slave of the lender.
  '8':
  - type: text
    content: 'Whoever '
  - type: note
    content: Job 4:8; [Hos. 10:13]
  - type: text
    content: sows injustice will reap calamity,
  - type: text
    content: 'and '
  - type: note
    content: '[Isa. 14:6; 30:31]'
  - type: text
    content: the rod of his fury will fail.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 19:17; 2 Cor. 9:6 ]'
  - type: text
    content: Whoever has a bountiful
  - type: note
    content: Hebrew good
  - type: text
    content: ' eye will be blessed,'
  - type: text
    content: 'for he '
  - type: note
    content: '[ch. 19:17; Luke 14:13, 14]'
  - type: text
    content: shares his bread with the poor.
