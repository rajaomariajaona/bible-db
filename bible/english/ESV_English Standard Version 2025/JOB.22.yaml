document_id: JOB.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Eliphaz Speaks: Job’s Wickedness Is Great'
  - type: text
    content: 'Then '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'Eliphaz the Temanite answered and said:'
  '10':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 18:8-10
  - type: text
    content: snares are all around you,
  - type: text
    content: and sudden terror overwhelms you,
  '11':
  - type: text
    content: 'or '
  - type: note
    content: '[Ex. 10:22, 23]'
  - type: text
    content: darkness, so that you cannot see,
  - type: text
    content: 'and a '
  - type: note
    content: ch. 38:34
  - type: text
    content: 'flood of '
  - type: note
    content: '[ch. 27:20; Ps. 69:1, 2, 14, 15; 124:5; Lam. 3:54; Jonah 2:3, 5]'
  - type: text
    content: water covers you.
  '12':
  - type: text
    content: “Is not God high in the heavens?
  - type: text
    content: 'See '
  - type: note
    content: '[ch. 11:8]'
  - type: text
    content: the highest stars, how lofty they are!
  '13':
  - type: text
    content: 'But you say, '
  - type: note
    content: Ps. 73:11; [Ps. 10:11; 59:7; 64:5; 94:7; Isa. 29:15; Ezek. 8:12; 9:9]
  - type: text
    content: ‘What does God know?
  - type: text
    content: 'Can he judge through '
  - type: note
    content: ch. 38:9
  - type: text
    content: the deep darkness?
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 139:11, 12 ]; [ Prov. 8:27; Isa. 40:22 ]'
  - type: text
    content: Thick clouds veil him, so that he does not see,
  - type: text
    content: and he walks on the vault of heaven.’
  '15':
  - type: text
    content: Will you keep to the old way
  - type: text
    content: that wicked men have trod?
  '16':
  - type: text
    content: 'They were snatched away '
  - type: note
    content: See ch. 15:32
  - type: text
    content: before their time;
  - type: text
    content: their foundation was washed away.
  - type: note
    content: Or their foundation was poured out as a stream (or river)
  '17':
  - type: text
    content: 'They said to God, '
  - type: note
    content: ch. 21:14
  - type: text
    content: ‘Depart from us,’
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 4:6]'
  - type: text
    content: ‘What can the Almighty do to us?’
  - type: note
    content: Hebrew them
  '18':
  - type: text
    content: Yet he filled their houses with good things—
  - type: text
    content: 'but '
  - type: note
    content: ch. 21:16
  - type: text
    content: the counsel of the wicked is far from me.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps. 52:6; 58:10; 107:42; [ Ps. 64:10 ]
  - type: text
    content: The righteous see it and are glad;
  - type: text
    content: 'the innocent one '
  - type: note
    content: Ps. 2:4
  - type: text
    content: mocks at them,
  '2':
  - type: text
    content: ' '
  - type: note
    content: See ch. 35:7
  - type: text
    content: “Can a man be profitable to God?
  - type: text
    content: Surely he who is wise is profitable to himself.
  '20':
  - type: text
    content: saying, ‘Surely our adversaries are cut off,
  - type: text
    content: 'and what they left '
  - type: note
    content: ch. 1:16
  - type: text
    content: the fire has consumed.’
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 119:45
  - type: text
    content: '“Agree with God, and '
  - type: note
    content: '[Prov. 3:2]'
  - type: text
    content: be at peace;
  - type: text
    content: thereby good will come to you.
  '22':
  - type: text
    content: 'Receive instruction from '
  - type: note
    content: Prov. 2:6; [Mal. 2:7]
  - type: text
    content: his mouth,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 119:11
  - type: text
    content: lay up his words in your heart.
  '23':
  - type: text
    content: 'If you '
  - type: note
    content: '[ch. 8:5, 6; 11:13, 14; Mal. 3:7]'
  - type: text
    content: 'return to the Almighty you will be '
  - type: note
    content: Jer. 24:6; 33:7
  - type: text
    content: built up;
  - type: text
    content: 'if you '
  - type: note
    content: ch. 11:14
  - type: text
    content: remove injustice far from your tents,
  '24':
  - type: text
    content: 'if you lay gold in '
  - type: note
    content: ch. 20:11; 21:26
  - type: text
    content: the dust,
  - type: text
    content: 'and gold of '
  - type: note
    content: See 1 Kgs. 9:28
  - type: text
    content: Ophir among the stones of the torrent-bed,
  '25':
  - type: text
    content: then the Almighty will be your gold
  - type: text
    content: and your precious silver.
  '26':
  - type: text
    content: 'For then you '
  - type: note
    content: ch. 27:10; Ps. 37:4; Isa. 58:14
  - type: text
    content: will delight yourself in the Almighty
  - type: text
    content: 'and '
  - type: note
    content: See ch. 11:15
  - type: text
    content: lift up your face to God.
  '27':
  - type: text
    content: 'You will '
  - type: note
    content: ch. 33:26; Ps. 50:14, 15; Isa. 58:9
  - type: text
    content: make your prayer to him, and he will hear you,
  - type: text
    content: 'and you will '
  - type: note
    content: Ps. 50:14
  - type: text
    content: pay your vows.
  '28':
  - type: text
    content: You will decide on a matter, and it will be established for you,
  - type: text
    content: 'and '
  - type: note
    content: Prov. 4:18
  - type: text
    content: light will shine on your ways.
  '29':
  - type: text
    content: For when they are humbled you say, ‘It is because of pride’;
  - type: note
    content: Or you say, ‘It is exaltation’
  - type: text
    content: 'but he saves '
  - type: note
    content: Ps. 138:6; Prov. 3:34; 29:23; Matt. 23:12; Luke 1:52; James 4:6; 1 Pet. 5:5
  - type: text
    content: the lowly.
  '3':
  - type: text
    content: Is it any pleasure to the Almighty if you are in the right,
  - type: text
    content: 'or is it gain to him if you '
  - type: note
    content: See Ps. 18:32
  - type: text
    content: make your ways blameless?
  '30':
  - type: text
    content: 'He '
  - type: note
    content: '[Gen. 18:26]'
  - type: text
    content: delivers even the one who is not innocent,
  - type: text
    content: 'who will be delivered through '
  - type: note
    content: ch. 17:9; Ps. 18:20, 24; 24:4; 26:6; [ch. 9:30]
  - type: text
    content: the cleanness of your hands.”
  '4':
  - type: text
    content: Is it for your fear of him that he reproves you
  - type: text
    content: 'and '
  - type: note
    content: ch. 14:3; [Ps. 143:2]
  - type: text
    content: enters into judgment with you?
  '5':
  - type: text
    content: Is not your evil abundant?
  - type: text
    content: There is no end to your iniquities.
  '6':
  - type: text
    content: 'For you have '
  - type: note
    content: ch. 24:3, 9; Ex. 22:26; Deut. 24:6, 17; Ezek. 18:12, 16
  - type: text
    content: exacted pledges of your brothers for nothing
  - type: note
    content: '[ch. 31:16 ]'
  - type: text
    content: and stripped the naked of their clothing.
  '7':
  - type: text
    content: You have given no water to the weary to drink,
  - type: text
    content: 'and you have '
  - type: note
    content: '[ch. 31:17; Isa. 58:7; Ezek. 18:7, 16; Matt. 25:42]'
  - type: text
    content: withheld bread from the hungry.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 35:9 ]'
  - type: text
    content: The man with power possessed the land,
  - type: text
    content: 'and '
  - type: note
    content: 2 Kgs. 5:1; Isa. 9:15
  - type: text
    content: the favored man lived in it.
  '9':
  - type: text
    content: 'You have '
  - type: note
    content: '[Luke 1:53]'
  - type: text
    content: sent widows away empty,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 38:15]'
  - type: text
    content: 'the arms of '
  - type: note
    content: ch. 31:21; Isa. 10:2; Ezek. 22:7
  - type: text
    content: the fatherless were crushed.
