verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 9:21 ]; See ch. 23:29-32'
  - type: text
    content: 'Wine is a mocker, '
  - type: note
    content: ch. 31:4
  - type: text
    content: strong drink a brawler,
  - type: text
    content: 'and whoever '
  - type: note
    content: Isa. 28:7; [Hos. 4:11]
  - type: text
    content: is led astray by it is not wise.
  - type: note
    content: Or will not become wise
  '10':
  - type: text
    content: ' '
  - type: note
    content: ver. 23 ; See ch. 11:1
  - type: text
    content: Unequal
  - type: note
    content: Or Two kinds of; also verse 23
  - type: text
    content: ' weights and unequal measures'
  - type: text
    content: 'are both alike an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: 'Even a child '
  - type: note
    content: '[Matt. 7:16]'
  - type: text
    content: makes himself known by his acts,
  - type: text
    content: by whether his conduct is pure and upright.
  - type: note
    content: Or Even a child can dissemble in his actions, though his conduct seems pure and upright
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:31; 25:12
  - type: text
    content: The hearing ear and the seeing eye,
  - type: note
    content: Ex. 4:11; Ps. 94:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has made them both.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 6:4; 19:15; 31:15; Rom. 12:11 ]'
  - type: text
    content: 'Love not sleep, lest you '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: come to poverty;
  - type: text
    content: 'open your eyes, and you will have '
  - type: note
    content: ch. 12:11
  - type: text
    content: plenty of bread.
  '14':
  - type: text
    content: “Bad, bad,” says the buyer,
  - type: text
    content: but when he goes away, then he boasts.
  '15':
  - type: text
    content: 'There is gold and abundance of '
  - type: note
    content: Job 28:18
  - type: text
    content: costly stones,
  - type: note
    content: '[ch. 3:14, 15 ]'
  - type: text
    content: but the lips of knowledge are a precious jewel.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:13; [ch. 6:1; 22:26 ]
  - type: text
    content: Take a man’s garment when he has put up security for a stranger,
  - type: text
    content: 'and '
  - type: note
    content: See Job 22:6
  - type: text
    content: hold it in pledge when he puts up security for foreigners.
  - type: note
    content: Or for an adulteress (compare 27:13)
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:17 ]'
  - type: text
    content: Bread gained by deceit is sweet to a man,
  - type: text
    content: 'but afterward his mouth will be full of '
  - type: note
    content: '[Lam. 3:16]'
  - type: text
    content: gravel.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:14; 15:22 ]'
  - type: text
    content: Plans are established by counsel;
  - type: text
    content: 'by '
  - type: note
    content: ch. 24:6
  - type: text
    content: 'wise guidance '
  - type: note
    content: Luke 14:31
  - type: text
    content: wage war.
  '19':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 11:13
  - type: text
    content: goes about slandering reveals secrets;
  - type: text
    content: 'therefore do not associate with '
  - type: note
    content: ch. 13:3; [Rom. 16:18]
  - type: text
    content: a simple babbler.
  - type: note
    content: Hebrew with one who is simple in his lips
  '2':
  - type: text
    content: 'The terror of a king is like '
  - type: note
    content: See ch. 19:12
  - type: text
    content: the growling of a lion;
  - type: text
    content: 'whoever provokes him to anger '
  - type: note
    content: Num. 16:38; Hab. 2:10; See ch. 8:36
  - type: text
    content: forfeits his life.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 30:11, 17; See Ex. 21:17
  - type: text
    content: If one curses his father or his mother,
  - type: note
    content: See 2 Sam. 21:17; Job 18:5
  - type: text
    content: his lamp will be put out in utter darkness.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See ch. 13:11
  - type: text
    content: An inheritance gained hastily in the beginning
  - type: text
    content: will not be blessed in the end.
  '22':
  - type: text
    content: 'Do not say, '
  - type: note
    content: ch. 24:29; [ch. 17:13; Matt. 5:39; Rom. 12:17, 19; 1 Thess. 5:15; 1 Pet. 3:9]
  - type: text
    content: “I will repay evil”;
  - type: note
    content: Ps. 27:14
  - type: text
    content: 'wait for the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will deliver you.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: ver. 10
  - type: text
    content: 'Unequal weights are an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and '
  - type: note
    content: See ch. 11:1
  - type: text
    content: false scales are not good.
  '24':
  - type: text
    content: 'A man’s '
  - type: note
    content: See ch. 16:9
  - type: text
    content: 'steps are from the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: how then can man understand his way?
  '25':
  - type: text
    content: It is a snare to say rashly, “It is holy,”
  - type: text
    content: 'and to reflect only '
  - type: note
    content: '[Eccles. 5:4, 5]'
  - type: text
    content: after making vows.
  '26':
  - type: text
    content: 'A wise king '
  - type: note
    content: '[Matt. 3:12]'
  - type: text
    content: winnows the wicked
  - type: text
    content: 'and drives '
  - type: note
    content: Isa. 28:27
  - type: text
    content: the wheel over them.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Cor. 2:11 ]'
  - type: text
    content: The spirit
  - type: note
    content: Hebrew breath
  - type: text
    content: ' of man is the lamp of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ Zeph. 1:12 ]'
  - type: text
    content: 'searching all '
  - type: note
    content: ch. 18:8
  - type: text
    content: his innermost parts.
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:3
  - type: text
    content: Steadfast love and faithfulness preserve the king,
  - type: text
    content: 'and by steadfast love his '
  - type: note
    content: See ch. 16:12
  - type: text
    content: throne is upheld.
  '29':
  - type: text
    content: The glory of young men is their strength,
  - type: text
    content: 'but '
  - type: note
    content: ch. 16:31
  - type: text
    content: the splendor of old men is their gray hair.
  '3':
  - type: text
    content: 'It is an honor for a man to '
  - type: note
    content: '[ch. 17:14]'
  - type: text
    content: keep aloof from strife,
  - type: text
    content: but every fool will be quarreling.
  '30':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 53:5 ]'
  - type: text
    content: Blows that wound cleanse away evil;
  - type: text
    content: 'strokes make clean '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: the innermost parts.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 19:24 ]'
  - type: text
    content: The sluggard does not plow in the autumn;
  - type: note
    content: ch. 19:15; [ch. 6:11 ]
  - type: text
    content: he will seek at harvest and have nothing.
  '5':
  - type: text
    content: 'The purpose in a man’s heart is like '
  - type: note
    content: ch. 18:4
  - type: text
    content: deep water,
  - type: text
    content: but a man of understanding will draw it out.
  '6':
  - type: text
    content: 'Many a man '
  - type: note
    content: '[ch. 25:14; Matt. 6:2; Luke 18:11]'
  - type: text
    content: proclaims his own steadfast love,
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 12:1]'
  - type: text
    content: a faithful man who can find?
  '7':
  - type: text
    content: 'The righteous who '
  - type: note
    content: See ch. 19:1
  - type: text
    content: walks in his integrity—
  - type: note
    content: '[ 1 Kgs. 15:4; Ps. 37:26; 112:2; Jer. 33:20, 21 ]'
  - type: text
    content: blessed are his children after him!
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:10 ]'
  - type: text
    content: A king who sits on the throne of judgment
  - type: note
    content: '[ver. 26; ch. 25:5; Ps. 101:5 ]'
  - type: text
    content: winnows all evil with his eyes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: See 1 Kgs. 8:46
  - type: text
    content: Who can say, “I have made my heart pure;
  - type: text
    content: I am clean from my sin”?
