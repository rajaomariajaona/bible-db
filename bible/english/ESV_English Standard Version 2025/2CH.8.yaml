document_id: 2CH.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Accomplishments
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-18, see 1 Kgs. 9:10-28
  - type: text
    content: 'At the end of twenty years, in which Solomon had built the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and his own house, '
  '10':
  - type: text
    content: And these were the chief officers of King Solomon, 250, who exercised authority over the people.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 3:1; 7:8; 9:24
  - type: text
    content: 'Solomon brought Pharaoh’s daughter up from the city of David to the house that he had built for her, for he said, “My wife shall not live in the house of David king of Israel, for the places to which the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' has come are holy.”'
  '12':
  - type: text
    content: 'Then Solomon offered up burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 4:1; 15:8
  - type: text
    content: 'that he had built before the vestibule, '
  '13':
  - type: note
    content: '[Ex. 29:38]'
  - type: text
    content: 'as the duty of each day required, offering '
  - type: note
    content: Num. 28:3, 9, 11, 26; 29:2
  - type: text
    content: 'according to the commandment of Moses for the Sabbaths, the new moons, and the '
  - type: note
    content: Ex. 23:14; Deut. 16:16
  - type: text
    content: 'three annual feasts—the Feast of Unleavened Bread, the Feast of Weeks, and the Feast of Booths. '
  '14':
  - type: text
    content: 'According to the ruling of David his father, he appointed '
  - type: note
    content: See 1 Chr. 24
  - type: text
    content: 'the divisions of the priests for their service, '
  - type: note
    content: See 1 Chr. 25
  - type: text
    content: 'and the Levites for their offices of praise and '
  - type: note
    content: ch. 7:6
  - type: text
    content: 'ministry before the priests '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'as the duty of each day required, and '
  - type: note
    content: See 1 Chr. 9:17-23, 26
  - type: text
    content: 'the gatekeepers in their divisions at each gate, for so David '
  - type: note
    content: Neh. 12:24, 36
  - type: text
    content: 'the man of God had commanded. '
  '15':
  - type: text
    content: And they did not turn aside from what the king had commanded the priests and Levites concerning any matter and concerning the treasuries.
  '16':
  - type: text
    content: Thus was accomplished all the work of Solomon from
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew to
  - type: text
    content: ' the day the foundation of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid until it was finished. So the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was completed.'
  '17':
  - type: text
    content: 'Then Solomon went to '
  - type: note
    content: 1 Kgs. 9:26
  - type: text
    content: 'Ezion-geber and '
  - type: note
    content: '[Deut. 2:8; 2 Kgs. 14:22]'
  - type: text
    content: 'Eloth on the shore of the sea, in the land of Edom. '
  '18':
  - type: text
    content: 'And Hiram sent to him by the hand of his servants ships and servants familiar with the sea, and they went to Ophir together with the servants of Solomon and brought from there '
  - type: note
    content: ch. 9:10; [1 Kgs. 9:28]
  - type: text
    content: 450 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold and brought it to King Solomon.'
  '2':
  - type: text
    content: Solomon rebuilt the cities that Hiram had given to him, and settled the people of Israel in them.
  '3':
  - type: text
    content: 'And Solomon went to Hamath-zobah and took it. '
  '4':
  - type: text
    content: 'He built Tadmor in the wilderness and all the store cities that he built in Hamath. '
  '5':
  - type: text
    content: 'He also built '
  - type: note
    content: See Josh. 16:3, 5
  - type: text
    content: 'Upper Beth-horon and Lower Beth-horon, '
  - type: note
    content: ch. 14:7; Deut. 3:5
  - type: text
    content: 'fortified cities '
  - type: note
    content: ch. 14:7; Deut. 3:5
  - type: text
    content: 'with walls, gates, and bars, '
  '6':
  - type: text
    content: 'and Baalath, and all the store cities that Solomon had and all the cities for his chariots and the cities for his horsemen, and whatever Solomon desired to build in Jerusalem, in Lebanon, and in all the land of his dominion. '
  '7':
  - type: note
    content: See Gen. 15:18-21
  - type: text
    content: 'All the people who were left of the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites, who were not of Israel, '
  '8':
  - type: text
    content: 'from their descendants who were left after them in the land, whom the people of Israel had not destroyed—these Solomon drafted '
  - type: note
    content: ch. 10:18; 1 Kgs. 4:6; 9:21; 12:18; [Josh. 16:10]
  - type: text
    content: 'as forced labor, and so they are to this day. '
  '9':
  - type: text
    content: 'But of the people of Israel Solomon made no slaves for his work; they were soldiers, and his officers, the commanders of his chariots, and his horsemen. '
