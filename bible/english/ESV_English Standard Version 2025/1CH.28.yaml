document_id: 1CH.28,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Charge to Israel
  - type: text
    content: ' '
  - type: note
    content: ch. 23:2
  - type: text
    content: 'David assembled at Jerusalem all the officials of Israel, the '
  - type: note
    content: See ch. 27:16-22
  - type: text
    content: 'officials of the tribes, the officers of the divisions that served the king, the '
  - type: note
    content: See ch. 27:1-15
  - type: text
    content: 'commanders of thousands, the commanders of hundreds, the '
  - type: note
    content: See ch. 27:25-31
  - type: text
    content: 'stewards of all the property and livestock of the king and his sons, together with the palace officials, the '
  - type: note
    content: See ch. 11:10-47
  - type: text
    content: 'mighty men and all the seasoned warriors. '
  '10':
  - type: text
    content: 'Be careful now, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to build a house for the sanctuary; '
  - type: note
    content: ver. 20; Ezra 10:4; Hag. 2:4
  - type: text
    content: be strong and do it.”
  '11':
  - type: text
    content: 'Then David gave Solomon his son the '
  - type: note
    content: ver. 19; See Ex. 25:40
  - type: text
    content: 'plan of the '
  - type: note
    content: 1 Kgs. 6:3; 2 Chr. 3:4
  - type: text
    content: vestibule of the temple,
  - type: note
    content: Hebrew lacks of the temple
  - type: text
    content: ' and of its houses, its treasuries, its upper rooms, and its inner chambers, and of the room for the '
  - type: note
    content: Ex. 25:17
  - type: text
    content: 'mercy seat; '
  '12':
  - type: text
    content: 'and the plan of all that he had in mind for the courts of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', all the surrounding chambers, '
  - type: note
    content: See ch. 26:20
  - type: text
    content: 'the treasuries of the house of God, and the treasuries for dedicated gifts; '
  '13':
  - type: text
    content: 'for the '
  - type: note
    content: ch. 24:1
  - type: text
    content: 'divisions of the priests and of the '
  - type: note
    content: ch. 23:6
  - type: text
    content: 'Levites, and all the work of the service in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '; for all the vessels for the service in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '14':
  - type: text
    content: 'the weight of gold for all golden vessels for each service, the weight of silver vessels for each service, '
  '15':
  - type: text
    content: 'the weight of the golden '
  - type: note
    content: See Ex. 25:31-37
  - type: text
    content: 'lampstands and their lamps, the weight of gold for each lampstand and its lamps, the weight of silver for a lampstand and its lamps, according to the use of each lampstand in the service, '
  '16':
  - type: text
    content: 'the weight of gold for each table for the showbread, the silver for the silver tables, '
  '17':
  - type: text
    content: 'and pure gold for the forks, the basins and the cups; for the golden bowls and the weight of each; for the silver bowls and the weight of each; '
  '18':
  - type: text
    content: 'for the '
  - type: note
    content: See Ex. 30:1
  - type: text
    content: 'altar of incense made of refined gold, and its weight; also his plan for the golden chariot of the '
  - type: note
    content: See Ex. 25:18-22; 1 Kgs. 6:23-28
  - type: text
    content: 'cherubim that spread their wings and covered the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: '“All this he made clear to me in writing from the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 11, 12; Ex. 25:40
  - type: text
    content: all the work to be done according to the plan.”
  '2':
  - type: text
    content: 'Then King David rose to his feet and said: “Hear me, my brothers and my people. '
  - type: note
    content: See ch. 22:7
  - type: text
    content: 'I had it in my heart to build a house of rest for the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the '
  - type: note
    content: Ps. 99:5; 132:7; Isa. 66:1; Lam. 2:1; [Ps. 110:1]
  - type: text
    content: 'footstool of our God, and I made preparations for building. '
  '20':
  - type: text
    content: 'Then David said to Solomon his son, '
  - type: note
    content: See ch. 22:13; Josh. 1:5
  - type: text
    content: '“Be strong and courageous and do it. Do not be afraid and do not be dismayed, for the '
  - type: text
    content: Lord
  - type: text
    content: ' God, even my God, is with you. He will not leave you or forsake you, until all the work for the service of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' is finished. '
  '21':
  - type: text
    content: 'And behold the '
  - type: note
    content: ver. 13; See ch. 24-26
  - type: text
    content: 'divisions of the priests and the Levites for all the service of the house of God; and with you in all the work will be '
  - type: note
    content: '[Ex. 35:25, 26; 36:1, 2]'
  - type: text
    content: every willing man who has skill for any kind of service; also the officers and all the people will be wholly at your command.”
  '3':
  - type: text
    content: 'But God said to me, '
  - type: note
    content: See 2 Sam. 7:5, 13
  - type: text
    content: '‘You may not build a house for my name, for you are a man of war and have shed blood.’ '
  '4':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel '
  - type: note
    content: 1 Sam. 16:12, 13
  - type: text
    content: 'chose me from all my father’s house to be king over Israel '
  - type: note
    content: ch. 17:23, 27
  - type: text
    content: 'forever. '
  - type: note
    content: ch. 5:2; Gen. 49:8; Ps. 78:68
  - type: text
    content: 'For he chose Judah as leader, and in the house of Judah my father’s '
  - type: note
    content: 1 Sam. 16:1
  - type: text
    content: 'house, and among my father’s sons he took pleasure in me to make me king over all Israel. '
  '5':
  - type: text
    content: 'And of '
  - type: note
    content: See ch. 3:1-9; 14:3-7
  - type: text
    content: 'all my sons (for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given me many sons) he '
  - type: note
    content: ch. 22:9; 23:1
  - type: text
    content: 'has chosen Solomon my son to sit on the throne of the kingdom of the '
  - type: text
    content: Lord
  - type: text
    content: ' over Israel. '
  '6':
  - type: text
    content: 'He said to me, ‘It is '
  - type: note
    content: See 2 Sam. 7:13, 14
  - type: text
    content: 'Solomon your son who shall build my house and my courts, for I have chosen him to be my son, and I will be his father. '
  '7':
  - type: text
    content: 'I will establish his kingdom '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'forever '
  - type: note
    content: '[ch. 22:13]'
  - type: text
    content: 'if he continues strong in keeping my commandments and my rules, as he is today.’ '
  '8':
  - type: text
    content: 'Now therefore in the sight of all Israel, the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ', and in the hearing of our God, observe and seek out all the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, that you may possess this good land and leave it for an inheritance to your children after you forever.'
  - type: heading
    content: David’s Charge to Solomon
  '9':
  - type: text
    content: '“And you, Solomon my son, know the God of your father and serve him with a '
  - type: note
    content: '[1 Kgs. 8:61]'
  - type: text
    content: 'whole heart and with a willing mind, '
  - type: note
    content: See 1 Sam. 16:7
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' searches all hearts and understands every plan and thought. '
  - type: note
    content: See 2 Chr. 15:2
  - type: text
    content: 'If you seek him, he will be found by you, but if you forsake him, he will cast you off forever. '
