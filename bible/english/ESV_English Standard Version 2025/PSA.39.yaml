  '1':
  - type: heading
    content: What Is the Measure of My Days?
  - type: text
    content: 'To the choirmaster: to '
  - type: note
    content: Ps. 62, title; 77, title; 1 Chr. 16:41; 25:1
  - type: text
    content: Jeduthun. A Psalm of David.
  - type: text
    content: 'I said, “I will '
  - type: note
    content: 1 Kgs. 2:4; 2 Kgs. 10:31
  - type: text
    content: guard my ways,
  - type: text
    content: 'that I '
  - type: note
    content: Job 2:10
  - type: text
    content: may not sin with my tongue;
  - type: text
    content: 'I will '
  - type: note
    content: See Ps. 34:13
  - type: text
    content: guard my mouth with a muzzle,
  - type: text
    content: so long as the wicked are in my presence.”
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 9:34; 13:21
  - type: text
    content: Remove your stroke from me;
  - type: text
    content: I am spent by the hostility of your hand.
  '11':
  - type: text
    content: When you discipline a man
  - type: text
    content: 'with '
  - type: note
    content: Ps. 80:16
  - type: text
    content: rebukes for sin,
  - type: text
    content: 'you '
  - type: note
    content: Ps. 49:14
  - type: text
    content: 'consume like a '
  - type: note
    content: Job 13:28; Isa. 50:9
  - type: text
    content: moth what is dear to him;
  - type: note
    content: See ver. 5
  - type: text
    content: 'surely all mankind is a mere breath! '
  - type: text
    content: Selah
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps. 102:1
  - type: text
    content: '“Hear my prayer, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and give ear to my cry;
  - type: text
    content: hold not your peace at my tears!
  - type: text
    content: 'For I am '
  - type: note
    content: Ps. 119:19; Lev. 25:23; 1 Chr. 29:15; Heb. 11:13; 1 Pet. 2:11; [Gen. 47:9]
  - type: text
    content: a sojourner with you,
  - type: note
    content: Ps. 119:19; Lev. 25:23; 1 Chr. 29:15; Heb. 11:13; 1 Pet. 2:11; [ Gen. 47:9 ]
  - type: text
    content: a guest, like all my fathers.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Job 7:19
  - type: text
    content: Look away from me, that I may smile again,
  - type: note
    content: Job 10:21
  - type: text
    content: 'before I depart and '
  - type: note
    content: Job 7:8; 14:10-12; 20:9
  - type: text
    content: am no more!”
  '2':
  - type: text
    content: 'I was '
  - type: note
    content: ver. 9; Job 40:4, 5; See Ps. 38:13
  - type: text
    content: mute and silent;
  - type: text
    content: I held my peace to no avail,
  - type: text
    content: and my distress grew worse.
  '3':
  - type: text
    content: 'My '
  - type: note
    content: Jer. 20:9; Luke 24:32; [Job 32:18, 19]
  - type: text
    content: heart became hot within me.
  - type: text
    content: As I mused, the fire burned;
  - type: text
    content: 'then I spoke with my tongue:'
  '4':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 90:12
  - type: text
    content: make me know my end
  - type: text
    content: and what is the measure of my days;
  - type: text
    content: let me know how fleeting I am!
  '5':
  - type: text
    content: Behold, you have made my days a few handbreadths,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 89:47; 90:4
  - type: text
    content: my lifetime is as nothing before you.
  - type: text
    content: 'Surely '
  - type: note
    content: ver. 11; [Job 14:2]
  - type: text
    content: 'all mankind stands as a mere breath! '
  - type: text
    content: Selah
  '6':
  - type: text
    content: 'Surely a man '
  - type: note
    content: '[1 Cor. 7:31; James 4:14]'
  - type: text
    content: goes about as a shadow!
  - type: text
    content: Surely for nothing
  - type: note
    content: Hebrew Surely as a breath
  - type: text
    content: ' they are in turmoil;'
  - type: text
    content: 'man '
  - type: note
    content: Ps. 49:10; Job 27:16, 17; Luke 12:20; [Eccles. 2:18, 21, 26; Jer. 17:11]
  - type: text
    content: heaps up wealth and does not know who will gather!
  '7':
  - type: text
    content: “And now, O Lord, for what do I wait?
  - type: note
    content: Ps. 38:15
  - type: text
    content: My hope is in you.
  '8':
  - type: text
    content: Deliver me from all my transgressions.
  - type: note
    content: See Ps. 44:13
  - type: text
    content: Do not make me the scorn of the fool!
  '9':
  - type: text
    content: ' '
  - type: note
    content: ver. 2
  - type: text
    content: I am mute; I do not open my mouth,
  - type: note
    content: 2 Sam. 16:10; Job 2:10
  - type: text
    content: for it is you who have done it.
