    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      marker-yv: yv-n
    - type: text
      text: 'then the priest shall calculate the amount of the valuation for it up to the year of jubilee, and the man shall give the valuation on that day as a holy gift to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
