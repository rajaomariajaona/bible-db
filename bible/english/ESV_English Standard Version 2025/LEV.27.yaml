        - type: text
          text: '27:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gerah '
      - type: usfm
        marker: ft
        children:
        - type: text
