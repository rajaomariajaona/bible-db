      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41'
      marker-yv: yv-n
    - type: text
      text: 'when it is released in the jubilee, shall be a holy gift to the '
    - type: usfm
      marker: nd
      children:
      - type: text
