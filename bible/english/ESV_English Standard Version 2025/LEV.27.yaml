document_id: LEV.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws About Vows
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: ver. 33
  - type: text
    content: 'He shall not exchange it or make a substitute for it, good for bad, or bad for good; and if he does in fact substitute one animal for another, then both it and the substitute shall be holy. '
  '11':
  - type: text
    content: 'And if it is any unclean animal that may not be offered as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', then he shall stand the animal before the priest, '
  '12':
  - type: text
    content: 'and the priest shall value it as either good or bad; as the priest values it, so it shall be. '
  '13':
  - type: note
    content: ver. 15, 19
  - type: text
    content: 'But if he wishes to redeem it, he shall add a '
  - type: note
    content: ch. 22:14
  - type: text
    content: fifth to the valuation.
  '14':
  - type: text
    content: '“When a man dedicates his house as a holy gift to the '
  - type: text
    content: Lord
  - type: text
    content: ', the priest shall value it as either good or bad; as the priest values it, so it shall stand. '
  '15':
  - type: note
    content: ver. 13
  - type: text
    content: 'And if the donor wishes to redeem his house, he shall add a '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: fifth to the valuation price, and it shall be his.
  '16':
  - type: text
    content: '“If a man dedicates to the '
  - type: text
    content: Lord
  - type: text
    content: ' part of the land that is his possession, then the valuation shall be in proportion to its seed. A homer'
  - type: note
    content: A homer was about 6 bushels or 220 liters
  - type: text
    content: ' of barley seed shall be valued at fifty shekels of silver. '
  '17':
  - type: text
    content: 'If he dedicates his field from the year of jubilee, the valuation shall stand, '
  '18':
  - type: text
    content: 'but if he dedicates his field after the jubilee, then the priest shall '
  - type: note
    content: ver. 23; ch. 25:15, 16
  - type: text
    content: 'calculate the price according to the years that remain until the year of jubilee, and a deduction shall be made from the valuation. '
  '19':
  - type: note
    content: ver. 13
  - type: text
    content: 'And if he who dedicates the field wishes to redeem it, then he shall add a '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'fifth to its valuation price, and it shall remain his. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, If anyone '
  - type: note
    content: '[Judg. 11:30, 31, 39; 1 Sam. 1:11, 28; See Num. 30]'
  - type: text
    content: 'makes a special vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' involving the valuation of persons, '
  '20':
  - type: text
    content: 'But if he does not wish to redeem the field, or if he has sold the field to another man, it shall not be redeemed anymore. '
  '21':
  - type: text
    content: 'But the field, '
  - type: note
    content: ch. 25:28, 30, 31, 33, 41
  - type: text
    content: 'when it is released in the jubilee, shall be a holy gift to the '
  - type: text
    content: Lord
  - type: text
    content: ', like a field that has been '
  - type: note
    content: ver. 28
  - type: text
    content: 'devoted. The priest shall be in '
  - type: note
    content: Num. 18:14; Ezek. 44:29
  - type: text
    content: 'possession of it. '
  '22':
  - type: text
    content: 'If he dedicates to the '
  - type: text
    content: Lord
  - type: text
    content: ' a field that he has bought, '
  - type: note
    content: ch. 25:10, 25
  - type: text
    content: 'which is not a part of his possession, '
  '23':
  - type: note
    content: ver. 18
  - type: text
    content: 'then the priest shall calculate the amount of the valuation for it up to the year of jubilee, and the man shall give the valuation on that day as a holy gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: note
    content: ch. 25:28
  - type: text
    content: 'In the year of jubilee the field shall return to him from whom it was bought, to whom the land belongs as a possession. '
  '25':
  - type: text
    content: 'Every valuation shall be according to '
  - type: note
    content: ver. 3
  - type: text
    content: 'the shekel of the sanctuary: '
  - type: note
    content: See Ex. 30:13
  - type: text
    content: twenty gerahs
  - type: note
    content: A gerah was about 1/50 ounce or 0.6 gram
  - type: text
    content: ' shall make a shekel.'
  '26':
  - type: text
    content: '“But a '
  - type: note
    content: See Ex. 13:2
  - type: text
    content: 'firstborn of animals, which as a firstborn belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ', no man may dedicate; whether ox or sheep, it is the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '27':
  - type: text
    content: 'And if it is an unclean animal, then he shall buy it back at the valuation, '
  - type: note
    content: ver. 11-13
  - type: text
    content: and add a fifth to it; or, if it is not redeemed, it shall be sold at the valuation.
  '28':
  - type: text
    content: '“But '
  - type: note
    content: ver. 21; Josh. 6:17-19; 1 Sam. 15:21
  - type: text
    content: 'no devoted thing that a man devotes to the '
  - type: text
    content: Lord
  - type: text
    content: ', of anything that he has, whether man or beast, or of his inherited field, shall be sold or redeemed; every devoted thing is most holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: note
    content: '[Num. 21:2; Judg. 11:35]'
  - type: text
    content: No one devoted, who is to be devoted for destruction
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction)
  - type: text
    content: ' from mankind, shall be ransomed; he shall surely be put to death.'
  '3':
  - type: text
    content: then the valuation of a male from twenty years old up to sixty years old shall be fifty shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver, according to the '
  - type: note
    content: ver. 25; See Ex. 30:13
  - type: text
    content: 'shekel of the sanctuary. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Gen. 14:20; 28:22; Num. 18:21, 24; Deut. 14:28; 2 Chr. 31:5, 6, 12; Neh. 13:12; Mal. 3:8, 10
  - type: text
    content: '“Every tithe of the land, whether of the seed of the land or of the fruit of the trees, is the '
  - type: text
    content: Lord
  - type: text
    content: '’s; it is holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'If a man wishes to redeem some of his tithe, he shall add a fifth to it. '
  '32':
  - type: text
    content: 'And every tithe of herds and flocks, every tenth animal of all that '
  - type: note
    content: Ezek. 20:37; [Jer. 33:13]
  - type: text
    content: 'pass under the herdsman’s staff, shall be holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'One shall not differentiate between good or bad, '
  - type: note
    content: ver. 10
  - type: text
    content: neither shall he make a substitute for it; and if he does substitute for it, then both it and the substitute shall be holy; it shall not be redeemed.”
  '34':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:46
  - type: text
    content: 'These are the commandments that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses for the people of Israel '
  - type: note
    content: ch. 25:1; 26:46
  - type: text
    content: on Mount Sinai.
  '4':
  - type: text
    content: 'If the person is a female, the valuation shall be thirty shekels. '
  '5':
  - type: text
    content: 'If the person is from five years old up to twenty years old, the valuation shall be for a male twenty shekels, and for a female ten shekels. '
  '6':
  - type: text
    content: 'If the person is from a month old up to five years old, the valuation shall be for a male five shekels of silver, and for a female the valuation shall be three shekels of silver. '
  '7':
  - type: text
    content: 'And if the person is sixty years old or over, then the valuation for a male shall be fifteen shekels, and for a female ten shekels. '
  '8':
  - type: text
    content: And if someone is too poor to pay the valuation, then he shall be made to stand before the priest, and the priest shall value him; the priest shall value him according to what the vower can afford.
  '9':
  - type: text
    content: “If the vow
  - type: note
    content: Hebrew it
  - type: text
    content: ' is an animal that may be offered as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', all of it that he gives to the '
  - type: text
    content: Lord
  - type: text
    content: ' is holy. '
