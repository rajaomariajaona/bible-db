document_id: JER.44,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment for Idolatry
  - type: text
    content: 'The word that came to Jeremiah concerning all the Judeans who lived in the land of Egypt, at '
  - type: note
    content: ch. 46:14; Ex. 14:2
  - type: text
    content: 'Migdol, at '
  - type: note
    content: See ch. 43:7-9
  - type: text
    content: 'Tahpanhes, at Memphis, and in the land of '
  - type: note
    content: ver. 15; See Isa. 11:11
  - type: text
    content: 'Pathros, '
  '10':
  - type: text
    content: 'They have not humbled themselves even to this day, '
  - type: note
    content: '[Prov. 28:14]'
  - type: text
    content: nor have they feared, nor walked in my law and my statutes that I set before you and before your fathers.
  '11':
  - type: text
    content: '“Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: See ch. 21:10
  - type: text
    content: 'Behold, I will set my face against you for harm, to cut off all Judah. '
  '12':
  - type: text
    content: 'I will take the remnant of Judah who have '
  - type: note
    content: ch. 42:15
  - type: text
    content: 'set their faces to come to the land of Egypt to live, and they shall all be consumed. '
  - type: note
    content: ch. 42:16
  - type: text
    content: 'In the land of Egypt they shall fall; by the sword and by famine '
  - type: note
    content: ch. 42:16
  - type: text
    content: 'they shall be consumed. '
  - type: note
    content: See ch. 6:13
  - type: text
    content: 'From the least to the greatest, they shall die by the sword and by famine, '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'and they shall become an oath, a horror, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'a curse, and a taunt. '
  '13':
  - type: note
    content: ch. 43:11
  - type: text
    content: 'I will punish those who dwell in the land of Egypt, as I have punished Jerusalem, with the sword, with famine, and with pestilence, '
  '14':
  - type: note
    content: ch. 42:17
  - type: text
    content: 'so that none of the remnant of Judah who have come to live in the land of Egypt shall escape or survive '
  - type: note
    content: '[ch. 22:27]'
  - type: text
    content: 'or return to the land of Judah, to which they desire to return to dwell there. For they shall not return, '
  - type: note
    content: '[ver. 28]'
  - type: text
    content: except some fugitives.”
  '15':
  - type: text
    content: 'Then all the men who knew that '
  - type: note
    content: ver. 9, 25
  - type: text
    content: 'their wives had made offerings to other gods, and all the women who stood by, a great assembly, all the people who lived in '
  - type: note
    content: See ver. 1
  - type: text
    content: 'Pathros in the land of Egypt, answered Jeremiah: '
  '16':
  - type: text
    content: '“As for the word that you have spoken to us in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 6:16; 42:13
  - type: text
    content: 'we will not listen to you. '
  '17':
  - type: note
    content: '[Judg. 11:36]'
  - type: text
    content: 'But we will do everything that we have vowed, make offerings to '
  - type: note
    content: ch. 7:18
  - type: text
    content: 'the queen of heaven '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'and pour out drink offerings to her, '
  - type: note
    content: '[1 Kgs. 11:33; 2 Kgs. 21:3]'
  - type: text
    content: 'as we did, both we and our fathers, our kings and our officials, in the cities of Judah and in the streets of Jerusalem. For then we had plenty of food, and prospered, and saw no disaster. '
  '18':
  - type: text
    content: 'But since we left off making offerings to '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the queen of heaven and pouring out drink offerings to her, we have lacked everything '
  - type: note
    content: '[Lam. 3:22]'
  - type: text
    content: 'and have been consumed by the sword and by famine.” '
  '19':
  - type: text
    content: And the women said,
  - type: note
    content: Compare Syriac; Hebrew lacks And the women said
  - type: text
    content: ' “When we made offerings to the queen of heaven '
  - type: note
    content: ch. 7:18
  - type: text
    content: 'and poured out drink offerings to her, was it '
  - type: note
    content: '[Num. 30:6, 7]'
  - type: text
    content: without our husbands’ approval that we made cakes for her bearing her image and poured out drink offerings to her?”
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: You have seen all the disaster that I brought upon Jerusalem and upon all the cities of Judah. Behold, this day '
  - type: note
    content: ver. 6
  - type: text
    content: 'they are a desolation, and no one dwells in them, '
  '20':
  - type: text
    content: 'Then Jeremiah said to all the people, '
  - type: note
    content: ch. 43:6
  - type: text
    content: 'men and women, all the people who had given him this answer: '
  '21':
  - type: note
    content: ver. 17; [Ezek. 8:10, 11]
  - type: text
    content: '“As for the offerings that you offered in the cities of Judah and in the streets of Jerusalem, you and your fathers, your kings and your officials, and the people of the land, '
  - type: note
    content: '[Ezek. 21:24]'
  - type: text
    content: 'did not the '
  - type: text
    content: Lord
  - type: text
    content: ' remember them? Did it not come into his mind? '
  '22':
  - type: note
    content: ch. 5:9, 29
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' could no longer bear your evil deeds and '
  - type: note
    content: Ezek. 8:6
  - type: text
    content: 'the abominations that you committed. '
  - type: note
    content: See ch. 7:34
  - type: text
    content: 'Therefore your land has become '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'a desolation and a waste and a curse, '
  - type: note
    content: See ch. 4:7
  - type: text
    content: 'without inhabitant, as it is this day. '
  '23':
  - type: text
    content: 'It is because you made offerings '
  - type: note
    content: See ch. 40:3
  - type: text
    content: 'and because you sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' or walk in his law and in his statutes and in his testimonies '
  - type: note
    content: '[Deut. 31:29]'
  - type: text
    content: that this disaster has happened to you, as at this day.”
  '24':
  - type: text
    content: 'Jeremiah said to all the people and all the women, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 15; See ch. 43:5-7
  - type: text
    content: 'all you of Judah who are in the land of Egypt. '
  '25':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: ver. 16
  - type: text
    content: 'You and your wives have declared with your mouths, and have fulfilled it with your hands, saying, ‘We will surely perform our vows that we have made, '
  - type: note
    content: ver. 17
  - type: text
    content: 'to make offerings to the queen of heaven and to pour out drink offerings to her.’ Then confirm your vows and perform your vows! '
  '26':
  - type: text
    content: 'Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'all you of Judah who dwell in the land of Egypt: '
  - type: note
    content: See ch. 22:5
  - type: text
    content: 'Behold, I have sworn by my great name, says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ezek. 20:39]'
  - type: text
    content: 'that my name shall no more be invoked by the mouth of any man of Judah in all the land of Egypt, '
  - type: note
    content: '[ch. 4:2]'
  - type: text
    content: 'saying, ‘As the Lord '
  - type: text
    content: God
  - type: text
    content: ' lives.’ '
  '27':
  - type: note
    content: ch. 31:28
  - type: text
    content: 'Behold, I am watching over them for disaster and not for good. '
  - type: note
    content: ch. 42:16
  - type: text
    content: 'All the men of Judah who are in the land of Egypt shall be consumed by the sword and by famine, until there is an end of them. '
  '28':
  - type: note
    content: '[ver. 14; Isa. 27:13]'
  - type: text
    content: 'And those who escape the sword shall return from the land of Egypt to the land of Judah, '
  - type: note
    content: Ezek. 6:8
  - type: text
    content: 'few in number; and all the remnant of Judah, who came to the land of Egypt to live, '
  - type: note
    content: ver. 17, 25, 26
  - type: text
    content: 'shall know whose word will stand, mine or theirs. '
  '29':
  - type: text
    content: 'This shall be the sign to you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', that I will punish you in this place, in order that you may know that '
  - type: note
    content: Prov. 19:21
  - type: text
    content: 'my words will surely stand against you for harm: '
  '3':
  - type: text
    content: 'because of the evil that they committed, '
  - type: note
    content: ver. 8; See ch. 7:18, 19
  - type: text
    content: 'provoking me to anger, '
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'in that they went to make offerings '
  - type: note
    content: ch. 19:4; Deut. 6:14
  - type: text
    content: 'and serve other gods that they knew not, neither they, nor you, nor your fathers. '
  '30':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', Behold, I will give '
  - type: note
    content: ch. 46:17; See Ezek. 29:2-5; 30:21-24
  - type: text
    content: 'Pharaoh Hophra king of Egypt into the hand of his enemies '
  - type: note
    content: ch. 46:26
  - type: text
    content: 'and into the hand of those who seek his life, as I gave '
  - type: note
    content: '[ch. 39:5]'
  - type: text
    content: Zedekiah king of Judah into the hand of Nebuchadnezzar king of Babylon, who was his enemy and sought his life.”
  '4':
  - type: note
    content: See 2 Chr. 36:15
  - type: text
    content: 'Yet I persistently sent to you all my servants the prophets, saying, ‘Oh, do not do this abomination that I hate!’ '
  '5':
  - type: note
    content: See ch. 34:14
  - type: text
    content: 'But they did not listen '
  - type: note
    content: See ch. 34:14
  - type: text
    content: 'or incline their ear, to turn from their evil and make no offerings to other gods. '
  '6':
  - type: note
    content: See ch. 7:20
  - type: text
    content: 'Therefore my wrath and my anger were poured out and kindled in the cities of Judah and in the streets of Jerusalem, '
  - type: note
    content: See ch. 7:34; 9:11
  - type: text
    content: 'and they became a waste and a desolation, as at this day. '
  '7':
  - type: text
    content: 'And now thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' God of hosts, the God of Israel: Why do you commit this great evil '
  - type: note
    content: Hab. 2:10; [Num. 16:38; Prov. 20:2]
  - type: text
    content: 'against yourselves, to cut off from you '
  - type: note
    content: '[ch. 38:23; Lam. 2:11]'
  - type: text
    content: 'man and woman, '
  - type: note
    content: '[ch. 38:23; Lam. 2:11]'
  - type: text
    content: 'infant and child, from the midst of Judah, leaving you no remnant? '
  '8':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Why do you provoke me to anger with the works of your hands, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'making offerings to other gods in the land of Egypt where you have come to live, so that you may be cut off and become '
  - type: note
    content: ch. 42:18; See ch. 18:16
  - type: text
    content: 'a curse and a taunt among all the nations of the earth? '
  '9':
  - type: text
    content: 'Have you forgotten the evil of your fathers, '
  - type: note
    content: '[ch. 15:4]'
  - type: text
    content: 'the evil of the kings of Judah, '
  - type: note
    content: 1 Kgs. 11:1, 8; 15:13; 2 Kgs. 11:1
  - type: text
    content: the evil of their
  - type: note
    content: Hebrew his
  - type: text
    content: ' wives, your own evil, '
  - type: note
    content: ver. 15, 25
  - type: text
    content: 'and the evil of your wives, which they committed in the land of Judah and in the streets of Jerusalem? '
