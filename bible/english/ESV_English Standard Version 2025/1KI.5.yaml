document_id: 1KI.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Building the Temple
  - type: text
    content: ' '
  - type: note
    content: Ch 5:15 in Hebrew
  - type: text
    content: 'Now '
  - type: note
    content: '[2 Chr. 2:3]'
  - type: text
    content: 'Hiram king of Tyre sent his servants to Solomon when he heard that they had anointed him king in place of his father, '
  - type: note
    content: 2 Sam. 5:11; 1 Chr. 14:1
  - type: text
    content: 'for Hiram always loved David. '
  '10':
  - type: text
    content: 'So Hiram supplied Solomon with all the timber of cedar and cypress that he desired, '
  '11':
  - type: text
    content: while Solomon gave Hiram 20,000 cors
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' of wheat as food for his household, and 20,000'
  - type: note
    content: Septuagint; Hebrew twenty
  - type: text
    content: ' cors of beaten oil. Solomon gave this to Hiram year by year. '
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Solomon wisdom, '
  - type: note
    content: ch. 3:12
  - type: text
    content: as he promised him. And there was peace between Hiram and Solomon, and the two of them made a treaty.
  '13':
  - type: text
    content: 'King Solomon drafted '
  - type: note
    content: ch. 4:6; 9:15
  - type: text
    content: 'forced labor out of all Israel, and the draft numbered 30,000 men. '
  '14':
  - type: text
    content: 'And he sent them to Lebanon, 10,000 a month in shifts. They would be a month in Lebanon and two months at home. '
  - type: note
    content: See ch. 4:6
  - type: text
    content: 'Adoniram was in charge of the draft. '
  '15':
  - type: text
    content: 'Solomon also '
  - type: note
    content: 2 Chr. 2:18; [ch. 9:20-22]
  - type: text
    content: 'had 70,000 burden-bearers and 80,000 stonecutters in the hill country, '
  '16':
  - type: text
    content: 'besides Solomon’s 3,300 '
  - type: note
    content: ch. 4:5
  - type: text
    content: 'chief officers who were over the work, '
  - type: note
    content: ch. 9:23
  - type: text
    content: 'who had charge of the people who carried on the work. '
  '17':
  - type: text
    content: 'At the king’s command '
  - type: note
    content: '[ch. 6:7; 1 Chr. 22:2]'
  - type: text
    content: 'they quarried out great, costly stones in order to lay the foundation of the house with dressed stones. '
  '18':
  - type: text
    content: 'So Solomon’s builders and Hiram’s builders and '
  - type: note
    content: Josh. 13:5; Ezek. 27:9
  - type: text
    content: the men of Gebal did the cutting and prepared the timber and the stone to build the house.
  '2':
  - type: text
    content: 'And Solomon sent word to Hiram, '
  '3':
  - type: note
    content: For ver. 3-11, see 2 Chr. 2:3-16
  - type: text
    content: '“You know that David my father could not build a house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God '
  - type: note
    content: 1 Chr. 22:8; 28:3
  - type: text
    content: 'because of the warfare with which his enemies surrounded him, until the '
  - type: text
    content: Lord
  - type: text
    content: ' put them under the soles of his feet. '
  '4':
  - type: note
    content: '[ch. 4:24; 1 Chr. 22:9]'
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' my God has given me rest on every side. There is neither adversary nor misfortune. '
  '5':
  - type: text
    content: 'And so I intend to build a house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God, '
  - type: note
    content: 2 Sam. 7:13; 1 Chr. 17:12; 22:10; 28:6
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David my father, ‘Your son, whom I will set on your throne in your place, shall build the house for my name.’ '
  '6':
  - type: text
    content: Now therefore command that cedars of Lebanon be cut for me. And my servants will join your servants, and I will pay you for your servants such wages as you set, for you know that there is no one among us who knows how to cut timber like the Sidonians.”
  '7':
  - type: text
    content: 'As soon as Hiram heard the words of Solomon, he rejoiced greatly and said, “Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' this day, who has given to David a wise son to be over this great people.” '
  '8':
  - type: text
    content: 'And Hiram sent to Solomon, saying, “I have heard the message that you have sent to me. I am ready to do all you desire in the matter of cedar and cypress timber. '
  '9':
  - type: text
    content: 'My servants shall bring it down to the sea from Lebanon, and I will make it into rafts to go by sea to the place you direct. And I will have them broken up there, and you shall receive it. And you shall meet my wishes '
  - type: note
    content: '[Ezra 3:7; Ezek. 27:17; Acts 12:20]'
  - type: text
    content: 'by providing food for my household.” '
