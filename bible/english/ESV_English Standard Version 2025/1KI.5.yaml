    marker-yv: yv-n
  - type: text
    text: 'Hiram king of Tyre sent his servants to Solomon when he heard that they had anointed him king in place of his father, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 5:11
      metadata:
        usfm: 2SA.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 14:1
      metadata:
        usfm: 1CH.14.1
    marker-yv: yv-n
  - type: text
    text: 'for Hiram always loved David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Solomon sent word to Hiram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 3-11, see '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 2:3-16
      metadata:
        usfm: 2CH.2.3+2CH.2.4+2CH.2.5+2CH.2.6+2CH.2.7+2CH.2.8+2CH.2.9+2CH.2.10+2CH.2.11+2CH.2.12+2CH.2.13+2CH.2.14+2CH.2.15+2CH.2.16
    marker-yv: yv-n
  - type: text
    text: '“You know that David my father could not build a house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 22:8
      metadata:
        usfm: 1CH.22.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:3
      metadata:
        usfm: 1CH.28.3
    marker-yv: yv-n
  - type: text
    text: 'because of the warfare with which his enemies surrounded him, until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' put them under the soles of his feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:24
      metadata:
        usfm: 1KI.4.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 22:9
      metadata:
        usfm: 1CH.22.9
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'But now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God has given me rest on every side. There is neither adversary nor misfortune. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And so I intend to build a house for the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Sam. 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 17:12
      metadata:
        usfm: 1CH.17.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:10
      metadata:
        usfm: 1CH.22.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:6
      metadata:
        usfm: 1CH.28.6
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to David my father, ‘Your son, whom I will set on your throne in your place, shall build the house for my name.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now therefore command that cedars of Lebanon be cut for me. And my servants will join your servants, and I will pay you for your servants such wages as you set, for you know that there is no one among us who knows how to cut timber like the Sidonians.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As soon as Hiram heard the words of Solomon, he rejoiced greatly and said, “Blessed be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' this day, who has given to David a wise son to be over this great people.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Hiram sent to Solomon, saying, “I have heard the message that you have sent to me. I am ready to do all you desire in the matter of cedar and cypress timber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My servants shall bring it down to the sea from Lebanon, and I will make it into rafts to go by sea to the place you direct. And I will have them broken up there, and you shall receive it. And you shall meet my wishes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezra 3:7
      metadata:
        usfm: EZR.3.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 27:17
      metadata:
        usfm: EZK.27.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 12:20
      metadata:
        usfm: ACT.12.20
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'by providing food for my household.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Hiram supplied Solomon with all the timber of cedar and cypress that he desired, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: while Solomon gave Hiram 20,000 cors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 6 bushels or 220 liters
    marker-yv: yv-n
  - type: text
    text: ' of wheat as food for his household, and 20,000'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: twenty
    marker-yv: yv-n
  - type: text
    text: ' cors of beaten oil. Solomon gave this to Hiram year by year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Solomon wisdom, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: 1KI.3.12
    marker-yv: yv-n
  - type: text
    text: as he promised him. And there was peace between Hiram and Solomon, and the two of them made a treaty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'King Solomon drafted '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:6
      metadata:
        usfm: 1KI.4.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:15
      metadata:
        usfm: 1KI.9.15
    marker-yv: yv-n
  - type: text
    text: 'forced labor out of all Israel, and the draft numbered 30,000 men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he sent them to Lebanon, 10,000 a month in shifts. They would be a month in Lebanon and two months at home. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:6
      metadata:
        usfm: 1KI.4.6
    marker-yv: yv-n
  - type: text
    text: 'Adoniram was in charge of the draft. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Solomon also '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chr. 2:18
      metadata:
        usfm: 2CH.2.18
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:20-22
      metadata:
        usfm: 2CH.9.20+2CH.9.21+2CH.9.22
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'had 70,000 burden-bearers and 80,000 stonecutters in the hill country, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'besides Solomon’s 3,300 '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:5
      metadata:
        usfm: 1KI.4.5
    marker-yv: yv-n
  - type: text
    text: 'chief officers who were over the work, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:23
      metadata:
        usfm: 1KI.9.23
    marker-yv: yv-n
  - type: text
    text: 'who had charge of the people who carried on the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'At the king’s command '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:7
      metadata:
        usfm: 1KI.6.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Chr. 22:2
      metadata:
        usfm: 1CH.22.2
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'they quarried out great, costly stones in order to lay the foundation of the house with dressed stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Solomon’s builders and Hiram’s builders and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 13:5
      metadata:
        usfm: JOS.13.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 27:9
      metadata:
        usfm: EZK.27.9
    marker-yv: yv-n
  - type: text
    text: the men of Gebal did the cutting and prepared the timber and the stone to build the house.
