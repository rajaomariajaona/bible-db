document_id: NEH.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Priests and Levites
  - type: text
    content: 'These are '
  - type: note
    content: Ezra 2:1, 2
  - type: text
    content: 'the priests and the Levites who came up with '
  - type: note
    content: ver. 47; See 1 Chr. 3:19
  - type: text
    content: 'Zerubbabel the son of Shealtiel, and '
  - type: note
    content: See Ezra 3:2
  - type: text
    content: 'Jeshua: '
  - type: note
    content: For ver. 1-7, see ver. 12-21; ch. 10:2-8
  - type: text
    content: 'Seraiah, Jeremiah, Ezra, '
  '10':
  - type: text
    content: 'And Jeshua was the father of Joiakim, Joiakim the father of Eliashib, Eliashib the father of Joiada, '
  '11':
  - type: text
    content: Joiada the father of Jonathan, and Jonathan the father of Jaddua.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ver. 26
  - type: text
    content: 'And in the days of Joiakim were priests, heads of fathers’ houses: of Seraiah, Meraiah; of Jeremiah, Hananiah; '
  '13':
  - type: text
    content: 'of Ezra, Meshullam; of Amariah, Jehohanan; '
  '14':
  - type: text
    content: 'of Malluchi, Jonathan; of Shebaniah, Joseph; '
  '15':
  - type: text
    content: 'of Harim, Adna; of Meraioth, Helkai; '
  '16':
  - type: text
    content: 'of Iddo, Zechariah; of Ginnethon, Meshullam; '
  '17':
  - type: text
    content: 'of Abijah, Zichri; of Miniamin, of Moadiah, Piltai; '
  '18':
  - type: text
    content: 'of Bilgah, Shammua; of Shemaiah, Jehonathan; '
  '19':
  - type: text
    content: 'of Joiarib, Mattenai; of Jedaiah, Uzzi; '
  '2':
  - type: text
    content: 'Amariah, Malluch, Hattush, '
  '20':
  - type: text
    content: 'of Sallai, Kallai; of Amok, Eber; '
  '21':
  - type: text
    content: of Hilkiah, Hashabiah; of Jedaiah, Nethanel.
  '22':
  - type: text
    content: 'In the days of Eliashib, Joiada, Johanan, and Jaddua, the Levites were recorded as heads of fathers’ houses; so too were the priests in the reign of Darius the Persian. '
  '23':
  - type: text
    content: 'As for the sons of Levi, their heads of fathers’ houses '
  - type: note
    content: See 1 Chr. 9:14-16
  - type: text
    content: 'were written in the Book of the Chronicles until the days of Johanan the son of Eliashib. '
  '24':
  - type: text
    content: 'And the chiefs of the Levites: Hashabiah, Sherebiah, and '
  - type: note
    content: ch. 10:9; Ezra 2:40
  - type: text
    content: 'Jeshua the son of Kadmiel, with their brothers who stood opposite them, '
  - type: note
    content: ch. 11:17; [2 Chr. 5:13]
  - type: text
    content: 'to praise and to give thanks, '
  - type: note
    content: See 1 Chr. 25
  - type: text
    content: 'according to the commandment of David '
  - type: note
    content: ver. 36
  - type: text
    content: 'the man of God, '
  - type: note
    content: '[ver. 9; Ezra 3:11]'
  - type: text
    content: 'watch by watch. '
  '25':
  - type: text
    content: 'Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon, and Akkub were gatekeepers standing guard at '
  - type: note
    content: '[1 Chr. 26:15]'
  - type: text
    content: 'the storehouses of the gates. '
  '26':
  - type: text
    content: 'These were in the days of Joiakim the son of Jeshua son of Jozadak, and in the days of '
  - type: note
    content: ch. 8:9
  - type: text
    content: 'Nehemiah the governor and of '
  - type: note
    content: ch. 8:9
  - type: text
    content: Ezra, the priest and scribe.
  - type: heading
    content: Dedication of the Wall
  '27':
  - type: text
    content: 'And at '
  - type: note
    content: See Num. 7:10
  - type: text
    content: 'the dedication of the wall of Jerusalem they sought the Levites in all their places, to bring them to Jerusalem to celebrate the dedication with gladness, with thanksgivings and with singing, '
  - type: note
    content: See 1 Chr. 15:16
  - type: text
    content: 'with cymbals, harps, and lyres. '
  '28':
  - type: text
    content: 'And the sons of the singers gathered together from the district surrounding Jerusalem and from the villages of the Netophathites; '
  '29':
  - type: text
    content: 'also from Beth-gilgal and from the region of Geba and Azmaveth, for the singers had built for themselves villages around Jerusalem. '
  '3':
  - type: text
    content: 'Shecaniah, Rehum, Meremoth, '
  '30':
  - type: text
    content: 'And the priests and the Levites '
  - type: note
    content: ch. 13:22, 30
  - type: text
    content: purified themselves, and they purified the people and the gates and the wall.
  '31':
  - type: text
    content: 'Then I brought the leaders of Judah up onto the wall and appointed two great choirs that gave thanks. '
  - type: note
    content: '[ver. 38]'
  - type: text
    content: 'One went to the south on the wall to '
  - type: note
    content: ch. 2:13; 3:13
  - type: text
    content: 'the Dung Gate. '
  '32':
  - type: text
    content: 'And after them went Hoshaiah and half of the leaders of Judah, '
  '33':
  - type: text
    content: 'and Azariah, Ezra, Meshullam, '
  '34':
  - type: text
    content: 'Judah, Benjamin, Shemaiah, and Jeremiah, '
  '35':
  - type: text
    content: 'and certain of the priests’ sons '
  - type: note
    content: See 1 Chr. 15:24
  - type: text
    content: 'with trumpets: Zechariah the son of Jonathan, son of Shemaiah, son of Mattaniah, son of Micaiah, son of Zaccur, son of Asaph; '
  '36':
  - type: text
    content: 'and his relatives, Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani, '
  - type: note
    content: 1 Chr. 23:5
  - type: text
    content: 'with the musical instruments of David '
  - type: note
    content: ver. 24
  - type: text
    content: 'the man of God. And Ezra the scribe went before them. '
  '37':
  - type: text
    content: 'At '
  - type: note
    content: ch. 2:14; 3:15
  - type: text
    content: 'the Fountain Gate they went up straight before them by '
  - type: note
    content: ch. 3:15
  - type: text
    content: 'the stairs of the city of David, at the ascent of the wall, above the house of David, to '
  - type: note
    content: ch. 3:26; 8:1, 3, 16
  - type: text
    content: the Water Gate on the east.
  '38':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 31 ]'
  - type: text
    content: 'The other choir of those who gave thanks went to the north, and I followed them with half of the people, on the wall, above '
  - type: note
    content: ch. 3:11
  - type: text
    content: 'the Tower of the Ovens, to '
  - type: note
    content: ch. 3:8
  - type: text
    content: 'the Broad Wall, '
  '39':
  - type: text
    content: 'and above '
  - type: note
    content: See ch. 8:16
  - type: text
    content: 'the Gate of Ephraim, and by '
  - type: note
    content: ch. 3:6
  - type: text
    content: the Gate of Yeshanah,
  - type: note
    content: Or of the old city
  - type: text
    content: ' and by '
  - type: note
    content: See ch. 3:3
  - type: text
    content: 'the Fish Gate and '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'the Tower of Hananel and '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'the Tower of the Hundred, to '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'the Sheep Gate; and they came to a halt at '
  - type: note
    content: See ch. 3:25
  - type: text
    content: 'the Gate of the Guard. '
  '4':
  - type: text
    content: 'Iddo, Ginnethoi, Abijah, '
  '40':
  - type: text
    content: 'So both choirs of those who gave thanks stood in the house of God, and I and half of the officials with me; '
  '41':
  - type: text
    content: 'and the priests Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah, '
  - type: note
    content: See 1 Chr. 15:24
  - type: text
    content: 'with trumpets; '
  '42':
  - type: text
    content: 'and Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malchijah, Elam, and Ezer. And the singers sang with Jezrahiah as their leader. '
  '43':
  - type: text
    content: And they offered great sacrifices that day and rejoiced, for God had made them rejoice with great joy; the women and children also rejoiced. And the joy of Jerusalem was heard far away.
  - type: heading
    content: Service at the Temple
  '44':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:5, 12, 13; [ 2 Chr. 31:11, 12 ]
  - type: text
    content: 'On that day men were appointed over the storerooms, the contributions, the firstfruits, and the tithes, to gather into them the portions required by the Law for the priests and for the Levites according to the fields of the towns, for Judah rejoiced over the priests and the Levites who ministered. '
  '45':
  - type: text
    content: 'And they performed the service of their God and the service of purification, as did the singers and the gatekeepers, '
  - type: note
    content: See 1 Chr. 25; 26
  - type: text
    content: 'according to the command of David and his son Solomon. '
  '46':
  - type: text
    content: 'For long ago in the days of David and '
  - type: note
    content: 1 Chr. 25:1; 2 Chr. 29:30
  - type: text
    content: Asaph there were directors of the singers, and there were songs
  - type: note
    content: Or leaders
  - type: text
    content: ' of praise and thanksgiving to God. '
  '47':
  - type: text
    content: 'And all Israel in the days of Zerubbabel and in the days of Nehemiah gave the '
  - type: note
    content: ch. 11:23; 2 Chr. 31:16
  - type: text
    content: 'daily portions for the singers and the gatekeepers; '
  - type: note
    content: Num. 18:21, 24
  - type: text
    content: 'and they set apart that which was for the Levites; '
  - type: note
    content: See Num. 18:26-28
  - type: text
    content: and the Levites set apart that which was for the sons of Aaron.
  '5':
  - type: text
    content: 'Mijamin, Maadiah, Bilgah, '
  '6':
  - type: text
    content: 'Shemaiah, Joiarib, Jedaiah, '
  '7':
  - type: text
    content: Sallu, Amok, Hilkiah, Jedaiah. These were the chiefs of the priests and of their brothers in the days of Jeshua.
  '8':
  - type: text
    content: 'And the Levites: Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who with his brothers was '
  - type: note
    content: ver. 24; ch. 11:17; [2 Chr. 5:13]
  - type: text
    content: 'in charge of the songs of thanksgiving. '
  '9':
  - type: text
    content: 'And Bakbukiah and Unni and their brothers stood opposite them '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'in the service. '
