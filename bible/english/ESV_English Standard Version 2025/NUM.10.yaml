document_id: NUM.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Silver Trumpets
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: ch. 29:1; 1 Chr. 15:24; 2 Chr. 5:12, 13; 7:6; 29:26-28; Ezra 3:10; Neh. 12:35
  - type: text
    content: 'On the day of your gladness also, and at your appointed feasts and '
  - type: note
    content: Ps. 81:3; See ch. 28:11
  - type: text
    content: 'at the beginnings of your months, you shall blow the trumpets over your burnt offerings and over the sacrifices of your peace offerings. They shall be '
  - type: note
    content: ver. 9
  - type: text
    content: 'a reminder of you before your God: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: Israel Leaves Sinai
  '11':
  - type: text
    content: 'In the second year, in the second month, on the twentieth day of the month, '
  - type: note
    content: ch. 9:17
  - type: text
    content: 'the cloud lifted from over the tabernacle of the testimony, '
  '12':
  - type: text
    content: 'and the people of Israel '
  - type: note
    content: '[Ex. 40:36]'
  - type: text
    content: 'set out by stages from the '
  - type: note
    content: ch. 1:1; 9:5; Ex. 19:1, 2
  - type: text
    content: 'wilderness of Sinai. And the cloud settled down in the '
  - type: note
    content: ch. 12:16; 13:3, 26; Gen. 21:21; Deut. 1:1
  - type: text
    content: 'wilderness of Paran. '
  '13':
  - type: text
    content: 'They set out for the first time '
  - type: note
    content: ver. 5, 6; ch. 2:34
  - type: text
    content: 'at the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' by Moses. '
  '14':
  - type: text
    content: 'The standard of the camp of the people of Judah set out '
  - type: note
    content: See ch. 2:3-9
  - type: text
    content: 'first by their companies, and over their company was '
  - type: note
    content: For ver. 14-16, see ch. 1:7-9
  - type: text
    content: 'Nahshon the son of Amminadab. '
  '15':
  - type: text
    content: 'And over the company of the tribe of the people of Issachar was Nethanel the son of Zuar. '
  '16':
  - type: text
    content: And over the company of the tribe of the people of Zebulun was Eliab the son of Helon.
  '17':
  - type: text
    content: 'And when '
  - type: note
    content: ch. 1:51
  - type: text
    content: 'the tabernacle was taken down, the sons of Gershon and the sons of Merari, '
  - type: note
    content: See ch. 4:24-33; 7:6-8
  - type: text
    content: 'who carried the tabernacle, set out. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 2:10-16
  - type: text
    content: 'the standard of the camp of Reuben set out by their companies, and over their company was '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'Elizur the son of Shedeur. '
  '19':
  - type: text
    content: 'And over the company of the tribe of the people of Simeon was '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'Shelumiel the son of Zurishaddai. '
  '2':
  - type: text
    content: '“Make two silver trumpets. Of hammered work you shall make them, and you shall use them for '
  - type: note
    content: Isa. 1:13; Joel 1:14; [Ps. 81:3]
  - type: text
    content: 'summoning the congregation and for breaking camp. '
  '20':
  - type: text
    content: 'And over the company of the tribe of the people of Gad was '
  - type: note
    content: ch. 1:14
  - type: text
    content: 'Eliasaph the son of '
  - type: note
    content: '[ch. 2:14]'
  - type: text
    content: Deuel.
  '21':
  - type: text
    content: 'Then the Kohathites set out, '
  - type: note
    content: ch. 7:9; See ch. 4:4-15
  - type: text
    content: 'carrying the holy things, and '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'the tabernacle was set up before their arrival. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 2:18-24
  - type: text
    content: 'the standard of the camp of the people of Ephraim set out by their companies, and over their company was '
  - type: note
    content: ch. 1:10
  - type: text
    content: 'Elishama the son of Ammihud. '
  '23':
  - type: text
    content: 'And over the company of the tribe of the people of Manasseh was '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Gamaliel the son of Pedahzur. '
  '24':
  - type: text
    content: 'And over the company of the tribe of the people of Benjamin was '
  - type: note
    content: ch. 1:11
  - type: text
    content: Abidan the son of Gideoni.
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 2:25-31
  - type: text
    content: 'the standard of the camp of the people of Dan, acting as the '
  - type: note
    content: '[Josh. 6:9]'
  - type: text
    content: 'rear guard of all the camps, set out by their companies, and over their company was '
  - type: note
    content: ch. 1:12
  - type: text
    content: 'Ahiezer the son of Ammishaddai. '
  '26':
  - type: text
    content: 'And over the company of the tribe of the people of Asher was '
  - type: note
    content: ch. 1:13
  - type: text
    content: 'Pagiel the son of Ochran. '
  '27':
  - type: text
    content: 'And over the company of the tribe of the people of Naphtali was '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'Ahira the son of Enan. '
  '28':
  - type: note
    content: ch. 2:34
  - type: text
    content: This was the order of march of the people of Israel by their companies, when they set out.
  '29':
  - type: text
    content: 'And Moses said to Hobab the son of '
  - type: note
    content: See Ex. 2:18
  - type: text
    content: 'Reuel the Midianite, Moses’ father-in-law, “We are setting out for the place of which the '
  - type: text
    content: Lord
  - type: text
    content: ' said, '
  - type: note
    content: Gen. 12:7
  - type: text
    content: '‘I will give it to you.’ Come with us, and we will do good to you, for '
  - type: note
    content: Gen. 32:12; Ex. 3:8; 6:7, 8
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised good to Israel.” '
  '3':
  - type: text
    content: 'And when '
  - type: note
    content: Jer. 4:5; Joel 2:15
  - type: text
    content: 'both are blown, all the congregation shall gather themselves to you at the entrance of the tent of meeting. '
  '30':
  - type: text
    content: 'But he said to him, “I will not go. I will depart to my own land and to my kindred.” '
  '31':
  - type: text
    content: 'And he said, “Please do not leave us, for you know where we should camp in the wilderness, and you will serve '
  - type: note
    content: '[Job 29:15]'
  - type: text
    content: 'as eyes for us. '
  '32':
  - type: text
    content: 'And if you do go with us, '
  - type: note
    content: ver. 29; [Judg. 1:16; 4:11]
  - type: text
    content: 'whatever good the '
  - type: text
    content: Lord
  - type: text
    content: ' will do to us, the same will we do to you.”'
  '33':
  - type: text
    content: 'So they set out from '
  - type: note
    content: See Ex. 3:1
  - type: text
    content: 'the mount of the '
  - type: text
    content: Lord
  - type: text
    content: ' three days’ journey. And the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' went before them three days’ journey, to seek out '
  - type: note
    content: Ps. 132:8; Jer. 31:2
  - type: text
    content: 'a resting place for them. '
  '34':
  - type: note
    content: See Ex. 13:21
  - type: text
    content: 'And the cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' was over them by day, whenever they set out from the camp.'
  '35':
  - type: text
    content: 'And whenever the ark set out, Moses said, '
  - type: note
    content: Ps. 68:1, 2
  - type: text
    content: '“Arise, O '
  - type: text
    content: Lord
  - type: text
    content: ', and let your enemies be scattered, and let those who hate you flee before you.” '
  '36':
  - type: text
    content: 'And when it rested, he said, “Return, O '
  - type: text
    content: Lord
  - type: text
    content: ', to the ten thousand thousands of Israel.”'
  '4':
  - type: text
    content: 'But if they blow only one, then '
  - type: note
    content: ch. 1:16; 7:2; Ex. 18:21
  - type: text
    content: 'the chiefs, the heads of the tribes of Israel, shall gather themselves to you. '
  '5':
  - type: text
    content: 'When you blow an alarm, '
  - type: note
    content: ver. 14; See ch. 2:3-9
  - type: text
    content: 'the camps that are on the east side shall set out. '
  '6':
  - type: text
    content: 'And when you blow an alarm the second time, '
  - type: note
    content: ver. 18; See ch. 2:10-16
  - type: text
    content: 'the camps that are on the south side shall set out. An alarm is to be blown whenever they are to set out. '
  '7':
  - type: text
    content: 'But when the assembly is to be gathered together, '
  - type: note
    content: ver. 3
  - type: text
    content: 'you shall blow a long blast, but you shall not '
  - type: note
    content: Joel 2:1
  - type: text
    content: 'sound an alarm. '
  '8':
  - type: note
    content: 1 Chr. 15:24; 2 Chr. 13:12
  - type: text
    content: 'And the sons of Aaron, the priests, shall blow the trumpets. The trumpets shall be to you for a perpetual statute throughout your generations. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ch. 31:6; 2 Chr. 13:14; [Josh. 6:5]
  - type: text
    content: 'when you go to war in your land against the adversary who '
  - type: note
    content: Judg. 2:18; 4:3; 10:8, 12; 1 Sam. 10:18
  - type: text
    content: 'oppresses you, then you shall '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'sound an alarm with the trumpets, that you may be '
  - type: note
    content: See Gen. 8:1
  - type: text
    content: 'remembered before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and you shall be saved from your enemies. '
