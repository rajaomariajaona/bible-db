document_id: EZK.42,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple’s Chambers
  - type: text
    content: 'Then he led me out into '
  - type: note
    content: ch. 40:17
  - type: text
    content: 'the outer court, '
  - type: note
    content: ch. 40:20
  - type: text
    content: 'toward the north, and he brought me to '
  - type: note
    content: ch. 40:17
  - type: text
    content: 'the chambers that were opposite '
  - type: note
    content: ver. 10, 13; ch. 41:12, 13
  - type: text
    content: 'the separate yard and opposite '
  - type: note
    content: ch. 41:12, 15
  - type: text
    content: 'the building on the north. '
  '10':
  - type: text
    content: 'In the thickness of '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: the wall of the court, on the south
  - type: note
    content: Septuagint; Hebrew east
  - type: text
    content: ' also, opposite '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'the yard and opposite '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'the building, there were '
  - type: note
    content: See ch. 40:17
  - type: text
    content: 'chambers '
  '11':
  - type: text
    content: 'with '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: a passage in front of them. They were similar to the chambers on the north, of the same length and breadth, with the same exits
  - type: note
    content: Hebrew and all their exits
  - type: text
    content: ' and arrangements and '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'doors, '
  '12':
  - type: text
    content: 'as were the entrances of the chambers on the south. There was an entrance at the beginning of the passage, the passage before '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: the corresponding wall on the east as one enters them.
  - type: note
    content: The meaning of the Hebrew verse is uncertain
  '13':
  - type: text
    content: 'Then he said to me, “The north chambers and the south chambers opposite '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the yard are the holy chambers, '
  - type: note
    content: ch. 40:46
  - type: text
    content: 'where the priests who approach the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Lev. 6:16, 26; 10:13; 24:9
  - type: text
    content: 'shall eat the '
  - type: note
    content: Num. 18:9
  - type: text
    content: most holy offerings. There they shall put the most holy offerings—
  - type: note
    content: Num. 18:9
  - type: text
    content: 'the grain offering, '
  - type: note
    content: ch. 40:39
  - type: text
    content: 'the sin offering, and '
  - type: note
    content: ch. 40:39
  - type: text
    content: 'the guilt offering—for the place is holy. '
  '14':
  - type: text
    content: 'When the priests enter the Holy Place, they shall not go out of it into the outer court '
  - type: note
    content: ch. 44:19; Lev. 6:11
  - type: text
    content: 'without laying there the garments in which they minister, for these are holy. '
  - type: note
    content: ch. 44:19; Lev. 6:11
  - type: text
    content: They shall put on other garments before they go near to that which is for the people.”
  '15':
  - type: text
    content: 'Now when he had finished measuring the interior of the temple area, he led me out by '
  - type: note
    content: See ch. 43:1
  - type: text
    content: 'the gate that faced east, and measured the temple area all around. '
  '16':
  - type: text
    content: 'He measured the east side with '
  - type: note
    content: '[ch. 40:3]'
  - type: text
    content: 'the measuring reed, 500 cubits by the measuring reed all around. '
  '17':
  - type: text
    content: 'He measured the north side, 500 cubits by the measuring reed all around. '
  '18':
  - type: text
    content: 'He measured the south side, 500 cubits by the measuring reed. '
  '19':
  - type: text
    content: 'Then he turned to the west side and measured, 500 cubits by the measuring reed. '
  '2':
  - type: text
    content: 'The length of the building whose door faced north was '
  - type: note
    content: '[ch. 41:13]'
  - type: text
    content: a hundred cubits,
  - type: note
    content: A cubit was about 18 inches or 45 centimeters; a long cubit (see 40:5) was about 21 inches or 53 centimeters
  - type: text
    content: ' and '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'the breadth fifty cubits. '
  '20':
  - type: text
    content: 'He measured it on the four sides. It had '
  - type: note
    content: ch. 40:5
  - type: text
    content: 'a wall around it, '
  - type: note
    content: '[ch. 45:2; Rev. 21:16]'
  - type: text
    content: '500 cubits long and '
  - type: note
    content: '[ch. 45:2; Rev. 21:16]'
  - type: text
    content: '500 cubits broad, '
  - type: note
    content: '[ch. 22:26; 43:12; 44:23; 48:15]'
  - type: text
    content: to make a separation between the holy and the common.
  '3':
  - type: text
    content: 'Facing '
  - type: note
    content: ch. 41:10
  - type: text
    content: 'the twenty cubits that belonged to the inner court, and facing '
  - type: note
    content: ch. 40:17
  - type: text
    content: 'the pavement that belonged to the outer court, was '
  - type: note
    content: '[ver. 5; 41:15, 16]'
  - type: text
    content: gallery
  - type: note
    content: The meaning of the Hebrew word is uncertain; also verse 5
  - type: text
    content: ' against gallery in three stories. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 46:19]'
  - type: text
    content: 'before the chambers was a passage inward, ten cubits wide and '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: a hundred cubits long,
  - type: note
    content: Septuagint, Syriac; Hebrew and a way of one cubit
  - type: text
    content: ' and '
  - type: note
    content: '[ch. 46:19]'
  - type: text
    content: 'their doors were on the north. '
  '5':
  - type: text
    content: 'Now the upper chambers were narrower, for the galleries took more away from them than from the lower and middle chambers of the building. '
  '6':
  - type: text
    content: 'For they were in three stories, and they had no pillars like the pillars of the courts. Thus the upper chambers were set back from the ground more than the lower and the middle ones. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 10, 12]'
  - type: text
    content: 'there was a wall outside parallel to the chambers, toward the outer court, opposite the chambers, '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'fifty cubits long. '
  '8':
  - type: text
    content: 'For the chambers on the outer court were fifty cubits long, while those opposite '
  - type: note
    content: ch. 41:1, 21, 23
  - type: text
    content: the nave
  - type: note
    content: Or temple
  - type: text
    content: ' were '
  - type: note
    content: '[ch. 41:13, 14]'
  - type: text
    content: 'a hundred cubits long. '
  '9':
  - type: text
    content: 'Below these chambers was '
  - type: note
    content: ch. 44:5; 46:19
  - type: text
    content: an entrance on the east side, as one enters them from the outer court.
