      marker-yv: yv-n
    - type: text
      text: 'And Joseph gathered up all the money that was found in the land of Egypt and in the land of Canaan, in exchange for the grain that they bought. And Joseph brought the money into Pharaoh’s house. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the money was all spent in the land of Egypt and in the land of Canaan, all the Egyptians came to Joseph and said, “Give us food. '
