document_id: GEN.47,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob’s Family Settles in Goshen
  - type: text
    content: 'So Joseph '
  - type: note
    content: ch. 46:31
  - type: text
    content: 'went in and told Pharaoh, “My father and my brothers, with their flocks and herds and all that they possess, have come from the land of Canaan. They are now in '
  - type: note
    content: See ch. 45:10
  - type: text
    content: 'the land of Goshen.” '
  '10':
  - type: text
    content: 'And Jacob '
  - type: note
    content: ver. 7
  - type: text
    content: 'blessed Pharaoh and went out from the presence of Pharaoh. '
  '11':
  - type: text
    content: 'Then Joseph settled his father and his brothers and gave them a possession in the land of Egypt, in the best of the land, in the land of '
  - type: note
    content: Ex. 1:11; 12:37; [ch. 45:10]
  - type: text
    content: 'Rameses, '
  - type: note
    content: ver. 6
  - type: text
    content: 'as Pharaoh had commanded. '
  '12':
  - type: text
    content: 'And Joseph '
  - type: note
    content: ch. 45:11; 50:21
  - type: text
    content: provided his father, his brothers, and all his father’s household with food, according to the number of their dependents.
  - type: heading
    content: Joseph and the Famine
  '13':
  - type: text
    content: 'Now there was no food in all the land, for the famine was very severe, so that the land of Egypt and the land of Canaan languished by reason of the famine. '
  '14':
  - type: note
    content: ch. 41:56
  - type: text
    content: 'And Joseph gathered up all the money that was found in the land of Egypt and in the land of Canaan, in exchange for the grain that they bought. And Joseph brought the money into Pharaoh’s house. '
  '15':
  - type: text
    content: 'And when the money was all spent in the land of Egypt and in the land of Canaan, all the Egyptians came to Joseph and said, “Give us food. '
  - type: note
    content: ver. 19
  - type: text
    content: 'Why should we die before your eyes? For our money is gone.” '
  '16':
  - type: text
    content: 'And Joseph answered, “Give your livestock, and I will give you food in exchange for your livestock, if your money is gone.” '
  '17':
  - type: text
    content: 'So they brought their livestock to Joseph, and Joseph gave them food in exchange for the horses, the flocks, the herds, and the donkeys. He supplied them with food in exchange for all their livestock that year. '
  '18':
  - type: text
    content: 'And when that year was ended, they came to him the following year and said to him, “We will not hide from my lord that our money is all spent. The herds of livestock are my lord’s. There is nothing left in the sight of my lord but our bodies and our land. '
  '19':
  - type: text
    content: 'Why should we die before your eyes, both we and our land? '
  - type: note
    content: '[Neh. 5:2, 3]'
  - type: text
    content: Buy us and our land for food, and we with our land will be servants to Pharaoh. And give us seed that we may live and not die, and that the land may not be desolate.”
  '2':
  - type: text
    content: 'And from among his brothers he took five men and '
  - type: note
    content: Acts 7:13
  - type: text
    content: 'presented them to Pharaoh. '
  '20':
  - type: text
    content: 'So Joseph bought all the land of Egypt for Pharaoh, for all the Egyptians sold their fields, because the famine was severe on them. The land became Pharaoh’s. '
  '21':
  - type: text
    content: As for the people, he made servants of them
  - type: note
    content: Samaritan, Septuagint, Vulgate; Hebrew he removed them to the cities
  - type: text
    content: ' from one end of Egypt to the other. '
  '22':
  - type: note
    content: '[Ezra 7:24]'
  - type: text
    content: Only the land of the priests he did not buy, for the priests had a fixed allowance from Pharaoh and lived on the allowance that Pharaoh gave them; therefore they did not sell their land.
  '23':
  - type: text
    content: 'Then Joseph said to the people, “Behold, I have this day bought you and your land for Pharaoh. Now here is seed for you, and you shall sow the land. '
  '24':
  - type: text
    content: 'And at the harvests you shall give a '
  - type: note
    content: ch. 41:34
  - type: text
    content: 'fifth to Pharaoh, and four fifths shall be your own, as seed for the field and as food for yourselves and your households, and as food for your little ones.” '
  '25':
  - type: text
    content: 'And they said, “You have saved our lives; '
  - type: note
    content: See ch. 33:15
  - type: text
    content: 'may it please my lord, we will be servants to Pharaoh.” '
  '26':
  - type: text
    content: 'So Joseph made it a statute concerning the land of Egypt, and it stands to this day, that Pharaoh should have the fifth; '
  - type: note
    content: ver. 22
  - type: text
    content: the land of the priests alone did not become Pharaoh’s.
  '27':
  - type: text
    content: 'Thus Israel settled in the land of Egypt, '
  - type: note
    content: See ch. 45:10
  - type: text
    content: 'in the land of Goshen. '
  - type: note
    content: ch. 46:3
  - type: text
    content: 'And they gained possessions in it, and were fruitful and multiplied greatly. '
  '28':
  - type: text
    content: 'And Jacob lived in the land of Egypt seventeen years. '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: So the days of Jacob, the years of his life, were 147 years.
  '29':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 31:14; 1 Kgs. 2:1
  - type: text
    content: 'when the time drew near that Israel must die, he called his son Joseph and said to him, “If now '
  - type: note
    content: See ch. 33:15
  - type: text
    content: 'I have found favor in your sight, '
  - type: note
    content: ch. 24:2
  - type: text
    content: 'put your hand under my thigh and '
  - type: note
    content: ch. 24:49
  - type: text
    content: 'promise to deal kindly and truly with me. '
  - type: note
    content: '[ch. 50:25]'
  - type: text
    content: 'Do not bury me in Egypt, '
  '3':
  - type: text
    content: 'Pharaoh said to his brothers, '
  - type: note
    content: ch. 46:33
  - type: text
    content: '“What is your occupation?” And they said to Pharaoh, '
  - type: note
    content: ch. 46:32, 34
  - type: text
    content: '“Your servants are shepherds, as our fathers were.” '
  '30':
  - type: text
    content: 'but let me lie with my fathers. Carry me out of Egypt and '
  - type: note
    content: ch. 49:29; 50:5, 13
  - type: text
    content: 'bury me in their burying place.” He answered, “I will do as you have said.” '
  '31':
  - type: text
    content: 'And he said, “Swear to me”; and he swore to him. Then '
  - type: note
    content: ch. 48:2; 1 Kgs. 1:47; [Heb. 11:21]
  - type: text
    content: Israel bowed himself upon the head of his bed.
  - type: note
    content: Hebrew; Septuagint staff
  '4':
  - type: text
    content: 'They said to Pharaoh, '
  - type: note
    content: ch. 15:13; Deut. 26:5
  - type: text
    content: '“We have come to sojourn in the land, for there is no pasture for your servants’ flocks, for the famine is severe in the land of Canaan. And now, please let your servants dwell '
  - type: note
    content: ch. 46:34
  - type: text
    content: 'in the land of Goshen.” '
  '5':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Your father and your brothers have come to you. '
  '6':
  - type: text
    content: 'The land of Egypt is before you. Settle your father and your brothers '
  - type: note
    content: ch. 45:18
  - type: text
    content: 'in the best of the land. '
  - type: note
    content: ver. 4
  - type: text
    content: 'Let them settle in the land of Goshen, and if you know any '
  - type: note
    content: Ex. 18:21, 25
  - type: text
    content: able men among them, put them in charge of my livestock.”
  '7':
  - type: text
    content: 'Then Joseph brought in Jacob his father and stood him before Pharaoh, '
  - type: note
    content: ver. 10
  - type: text
    content: 'and Jacob blessed Pharaoh. '
  '8':
  - type: text
    content: 'And Pharaoh said to Jacob, “How many are the days of the years of your life?” '
  '9':
  - type: text
    content: 'And Jacob said to Pharaoh, “The days of the years of my '
  - type: note
    content: 1 Chr. 29:15; Ps. 39:12; 119:19, 54; Heb. 11:9, 13
  - type: text
    content: 'sojourning are 130 years. '
  - type: note
    content: Job 14:1; [Ps. 39:4, 5; James 4:14]
  - type: text
    content: 'Few and evil have been the days of the years of my life, and '
  - type: note
    content: ch. 11:32; 25:7; 35:28
  - type: text
    content: 'they have not attained to the days of the years of the life of my fathers in the days of their '
  - type: note
    content: 1 Chr. 29:15; Ps. 39:12; 119:19, 54; Heb. 11:9, 13
  - type: text
    content: 'sojourning.” '
