document_id: PSA.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Save Me, O My God
  - type: text
    content: 'A Psalm of David, '
  - type: note
    content: See 2 Sam. 15:14-17
  - type: text
    content: when he fled from Absalom his son.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 2 Sam. 15:12
  - type: text
    content: how many are my foes!
  - type: text
    content: 'Many are '
  - type: note
    content: 2 Sam. 18:31, 32
  - type: text
    content: rising against me;
  '2':
  - type: text
    content: many are saying of my soul,
  - type: note
    content: Ps. 71:11; [ 2 Sam. 16:8 ]
  - type: text
    content: '“There is no salvation for him in God.” '
  - type: text
    content: Selah
  - type: note
    content: The meaning of the Hebrew word Selah, used frequently in the Psalms, is uncertain. It may be a musical or liturgical direction
  '3':
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are '
  - type: note
    content: Ps. 28:7; 84:9; 119:114; Gen. 15:1
  - type: text
    content: 'a shield '
  - type: note
    content: Job 1:10
  - type: text
    content: about me,
  - type: text
    content: 'my glory, and '
  - type: note
    content: Ps. 27:5, 6; [Job 10:15]
  - type: text
    content: the lifter of my head.
  '4':
  - type: text
    content: 'I '
  - type: note
    content: Ps. 77:1; 142:1
  - type: text
    content: 'cried aloud to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and he '
  - type: note
    content: Ps. 34:4; 60:5; 108:6; [Ps. 6:8; 34:6]
  - type: text
    content: 'answered me from his '
  - type: note
    content: See Ps. 2:6
  - type: text
    content: 'holy hill. '
  - type: text
    content: Selah
  '5':
  - type: text
    content: 'I '
  - type: note
    content: Ps. 4:8; [Lev. 26:6; Job 11:18, 19; Prov. 3:24]
  - type: text
    content: lay down and slept;
  - type: text
    content: 'I woke again, for the '
  - type: text
    content: Lord
  - type: text
    content: ' sustained me.'
  '6':
  - type: text
    content: 'I '
  - type: note
    content: '[Ps. 23:4; 27:3]'
  - type: text
    content: will not be afraid of many thousands of people
  - type: text
    content: 'who have '
  - type: note
    content: Isa. 22:7; [1 Kgs. 20:12]
  - type: text
    content: set themselves against me all around.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 7:6; 9:19; 10:12; Num. 10:35
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Save me, O my God!
  - type: text
    content: 'For you '
  - type: note
    content: See Job 16:10
  - type: text
    content: strike all my enemies on the cheek;
  - type: text
    content: 'you '
  - type: note
    content: Ps. 58:6; Job 29:17
  - type: text
    content: break the teeth of the wicked.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:39; 62:7; Isa. 43:11; 45:21; Jer. 3:23; Hos. 13:4; Jonah 2:9; Rev. 7:10; 19:1
  - type: text
    content: 'Salvation belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'your blessing be on your people! '
  - type: text
    content: Selah
