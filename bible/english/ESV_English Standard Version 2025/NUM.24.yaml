document_id: NUM.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Balaam’s Third Oracle
  - type: text
    content: 'When Balaam saw that it pleased the '
  - type: text
    content: Lord
  - type: text
    content: ' to bless Israel, he did not go, as at '
  - type: note
    content: ch. 23:3, 15
  - type: text
    content: 'other times, to look for omens, but set his face toward the wilderness. '
  '10':
  - type: text
    content: 'And Balak’s anger was kindled against Balaam, and he '
  - type: note
    content: '[Job 27:23; Lam. 2:15; Ezek. 21:14, 17; 22:13]'
  - type: text
    content: 'struck his hands together. And Balak said to Balaam, '
  - type: note
    content: See ch. 23:11
  - type: text
    content: '“I called you to curse my enemies, and behold, you have blessed them these three times. '
  '11':
  - type: text
    content: 'Therefore now flee to your own place. I said, '
  - type: note
    content: ch. 22:17, 37
  - type: text
    content: '‘I will certainly honor you,’ but the '
  - type: text
    content: Lord
  - type: text
    content: ' has held you back from honor.” '
  '12':
  - type: text
    content: 'And Balaam said to Balak, “Did I not tell your messengers whom you sent to me, '
  '13':
  - type: note
    content: ch. 22:18
  - type: text
    content: '‘If Balak should give me his house full of silver and gold, I would not be able to go beyond the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', to do either good or bad '
  - type: note
    content: See ch. 16:28
  - type: text
    content: 'of my own will. What the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks, that will I speak’? '
  '14':
  - type: text
    content: 'And now, behold, I am going to my people. Come, '
  - type: note
    content: '[Mic. 6:5; Rev. 2:14]'
  - type: text
    content: 'I will let you know what this people will do to your people '
  - type: note
    content: See Gen. 49:1
  - type: text
    content: in the latter days.”
  - type: heading
    content: Balaam’s Final Oracle
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 21:27 ]; See ch. 23:7'
  - type: text
    content: And he took up his discourse and said,
  - type: text
    content: “The oracle of Balaam the son of Beor,
  - type: text
    content: the oracle of the man whose eye is opened,
  '16':
  - type: text
    content: the oracle of him who hears the words of God,
  - type: text
    content: 'and knows the knowledge of '
  - type: note
    content: Acts 7:48
  - type: text
    content: the Most High,
  - type: text
    content: who sees the vision of the Almighty,
  - type: note
    content: See ver. 4
  - type: text
    content: 'falling down with his eyes uncovered:'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 23:9 ]'
  - type: text
    content: I see him, but not now;
  - type: text
    content: 'I behold him, but not near:'
  - type: note
    content: Matt. 2:2; Rev. 22:16
  - type: text
    content: a star shall come out of Jacob,
  - type: text
    content: 'and '
  - type: note
    content: Gen. 49:10
  - type: text
    content: a scepter shall rise out of Israel;
  - type: text
    content: 'it shall '
  - type: note
    content: Jer. 48:45; [2 Sam. 8:2]
  - type: text
    content: crush the forehead
  - type: note
    content: Hebrew corners [of the head]
  - type: text
    content: ' of Moab'
  - type: text
    content: and break down all the sons of Sheth.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Sam. 8:14; Ps. 60:8, 9; Amos 9:12 ]'
  - type: text
    content: Edom shall be dispossessed;
  - type: note
    content: Gen. 32:3; 36:8
  - type: text
    content: Seir also, his enemies, shall be dispossessed.
  - type: text
    content: Israel is doing valiantly.
  '19':
  - type: text
    content: And one from Jacob shall exercise dominion
  - type: text
    content: and destroy the survivors of cities!”
  '2':
  - type: text
    content: 'And Balaam lifted up his eyes and saw Israel '
  - type: note
    content: See ch. 2:22-31
  - type: text
    content: 'camping tribe by tribe. And '
  - type: note
    content: Judg. 3:10; 1 Sam. 19:20, 23; 2 Chr. 15:1; 20:14
  - type: text
    content: 'the Spirit of God came upon him, '
  '20':
  - type: text
    content: 'Then he looked on Amalek and '
  - type: note
    content: See ch. 23:7
  - type: text
    content: took up his discourse and said,
  - type: text
    content: “Amalek was the first among the nations,
  - type: note
    content: '[ Ex. 17:14; 1 Sam. 15:3, 8 ]'
  - type: text
    content: but its end is utter destruction.”
  '21':
  - type: text
    content: And he looked on the Kenite, and took up his discourse and said,
  - type: text
    content: “Enduring is your dwelling place,
  - type: text
    content: and your nest is set in the rock.
  '22':
  - type: text
    content: Nevertheless, Kain shall be burned
  - type: text
    content: when Asshur takes you away captive.”
  '23':
  - type: text
    content: And he took up his discourse and said,
  - type: text
    content: “Alas, who shall live when God does this?
  '24':
  - type: text
    content: 'But ships shall come from '
  - type: note
    content: Gen. 10:4; Dan. 11:30
  - type: text
    content: Kittim
  - type: text
    content: 'and shall afflict Asshur and '
  - type: note
    content: Gen. 10:21, 25
  - type: text
    content: Eber;
  - type: text
    content: 'and he too '
  - type: note
    content: ver. 20
  - type: text
    content: shall come to utter destruction.”
  '25':
  - type: text
    content: 'Then Balaam rose and '
  - type: note
    content: '[ch. 31:8]'
  - type: text
    content: went back to his place. And Balak also went his way.
  '3':
  - type: text
    content: 'and he '
  - type: note
    content: See ch. 23:7
  - type: text
    content: took up his discourse and said,
  - type: text
    content: “The oracle of Balaam the son of Beor,
  - type: text
    content: the oracle of the man whose eye is opened,
  - type: note
    content: Or closed, or perfect; also verse 15
  '4':
  - type: text
    content: the oracle of him who hears the words of God,
  - type: text
    content: who sees the vision of the Almighty,
  - type: note
    content: '[ Ezek. 1:28; 3:23; Rev. 1:10, 17 ]'
  - type: text
    content: 'falling down with his eyes uncovered:'
  '5':
  - type: text
    content: How lovely are your tents, O Jacob,
  - type: text
    content: your encampments, O Israel!
  '6':
  - type: text
    content: Like palm groves
  - type: note
    content: Or valleys
  - type: text
    content: ' that stretch afar,'
  - type: text
    content: like gardens beside a river,
  - type: note
    content: '[ Ps. 1:3; Jer. 17:8 ]'
  - type: text
    content: 'like aloes '
  - type: note
    content: Ps. 104:16; Isa. 61:3
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' has planted,'
  - type: text
    content: like cedar trees beside the waters.
  '7':
  - type: text
    content: Water shall flow from his buckets,
  - type: text
    content: 'and his seed shall be '
  - type: note
    content: '[Jer. 51:13; Rev. 17:1]'
  - type: text
    content: in many waters;
  - type: text
    content: 'his king shall be higher than '
  - type: note
    content: 1 Sam. 15:8
  - type: text
    content: Agag,
  - type: text
    content: 'and '
  - type: note
    content: 2 Sam. 5:12; 1 Chr. 14:2
  - type: text
    content: his kingdom shall be exalted.
  '8':
  - type: text
    content: God brings him out of Egypt
  - type: text
    content: 'and is for him like the '
  - type: note
    content: See ch. 23:22
  - type: text
    content: horns of the wild ox;
  - type: text
    content: 'he shall '
  - type: note
    content: '[ch. 14:9; 23:24]'
  - type: text
    content: eat up the nations, his adversaries,
  - type: text
    content: 'and shall '
  - type: note
    content: Isa. 38:13; Jer. 50:17
  - type: text
    content: break their bones in pieces
  - type: text
    content: 'and '
  - type: note
    content: Ps. 45:5; Jer. 50:9
  - type: text
    content: pierce them through with his arrows.
  '9':
  - type: text
    content: He crouched, he lay down like a lion
  - type: text
    content: 'and '
  - type: note
    content: ch. 23:24; Gen. 49:9
  - type: text
    content: like a lioness; who will rouse him up?
  - type: note
    content: Gen. 12:3; 27:29
  - type: text
    content: Blessed are those who bless you,
  - type: text
    content: and cursed are those who curse you.”
