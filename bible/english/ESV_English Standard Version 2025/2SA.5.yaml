document_id: 2SA.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King of Israel
  - type: text
    content: 'Then all the tribes of Israel '
  - type: note
    content: For ver. 1-3, see 1 Chr. 11:1-3
  - type: text
    content: 'came to David at Hebron and said, “Behold, '
  - type: note
    content: See Gen. 29:14
  - type: text
    content: 'we are your bone and flesh. '
  '10':
  - type: text
    content: 'And David became greater and greater, for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts, was with him.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-25, see 1 Chr. 14:1-16
  - type: text
    content: 'And '
  - type: note
    content: 1 Kgs. 5; 6
  - type: text
    content: 'Hiram king of Tyre sent messengers to David, and cedar trees, also carpenters and masons who built David a house. '
  '12':
  - type: text
    content: 'And David knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' had established him king over Israel, and that he had exalted his kingdom for the sake of his people Israel.'
  '13':
  - type: text
    content: 'And David took more '
  - type: note
    content: '[1 Chr. 3:9]'
  - type: text
    content: 'concubines and wives from Jerusalem, after he came from Hebron, and more sons and daughters were born to David. '
  '14':
  - type: note
    content: '[1 Chr. 3:5-8]'
  - type: text
    content: 'And these are the names of those who were born to him in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '15':
  - type: text
    content: 'Ibhar, Elishua, Nepheg, Japhia, '
  '16':
  - type: text
    content: Elishama, Eliada, and Eliphelet.
  - type: heading
    content: David Defeats the Philistines
  '17':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over Israel, all the Philistines went up to search for David. But David heard of it and went down '
  - type: note
    content: ch. 23:14; 1 Sam. 22:4, 5
  - type: text
    content: 'to the stronghold. '
  '18':
  - type: text
    content: 'Now the Philistines had come and spread out in '
  - type: note
    content: ver. 22; ch. 23:13; Josh. 15:8; 18:16; [Josh. 17:15]
  - type: text
    content: 'the Valley of Rephaim. '
  '19':
  - type: text
    content: 'And David '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I go up against the Philistines? Will you give them into my hand?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David, “Go up, for I will certainly give the Philistines into your hand.” '
  '2':
  - type: text
    content: 'In times past, when Saul was king over us, '
  - type: note
    content: '[1 Sam. 18:13]'
  - type: text
    content: 'it was you who led out and brought in Israel. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to you, '
  - type: note
    content: ch. 7:7; 1 Chr. 17:6; Ps. 78:71, 72; [Matt. 2:6]
  - type: text
    content: ‘You shall be shepherd of my people Israel, and you shall be prince
  - type: note
    content: Or leader
  - type: text
    content: ' over Israel.’” '
  '20':
  - type: text
    content: 'And David came to Baal-perazim, and David defeated them there. And he said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has broken through my enemies before me like a breaking flood.” '
  - type: note
    content: Isa. 28:21
  - type: text
    content: Therefore the name of that place is called Baal-perazim.
  - type: note
    content: Baal-perazim means Lord of breaking through
  - type: text
    content: ' '
  '21':
  - type: text
    content: And the Philistines left their idols there, and David and his men carried them away.
  '22':
  - type: text
    content: 'And the Philistines came up yet again '
  - type: note
    content: ver. 18
  - type: text
    content: 'and spread out in the Valley of Rephaim. '
  '23':
  - type: note
    content: See 1 Sam. 22:10
  - type: text
    content: 'And when David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', he said, “You shall not go up; go around to their rear, and come against them opposite the balsam trees. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Kgs. 7:6]'
  - type: text
    content: 'when you hear the sound of marching in the tops of the balsam trees, then rouse yourself, '
  - type: note
    content: '[Judg. 4:14]'
  - type: text
    content: 'for then the '
  - type: text
    content: Lord
  - type: text
    content: ' has gone out before you to strike down the army of the Philistines.” '
  '25':
  - type: text
    content: 'And David did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, and struck down the Philistines from Geba '
  - type: note
    content: Josh. 10:33
  - type: text
    content: to Gezer.
  '3':
  - type: text
    content: 'So all the elders of Israel came to the king at Hebron, '
  - type: note
    content: ch. 3:12, 13, 21; [2 Kgs. 11:17]
  - type: text
    content: 'and King David made a covenant with them at Hebron '
  - type: note
    content: Judg. 11:11; 1 Sam. 23:18
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', and they anointed David king over Israel. '
  '4':
  - type: text
    content: 'David was thirty years old when he began to reign, and '
  - type: note
    content: 1 Kgs. 2:11; 1 Chr. 3:4; 29:27
  - type: text
    content: 'he reigned forty years. '
  '5':
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'At Hebron he reigned over Judah '
  - type: note
    content: ch. 2:11
  - type: text
    content: seven years and six months, and at Jerusalem he reigned over all Israel and Judah thirty-three years.
  - type: note
    content: Dead Sea Scroll lacks verses 4–5
  '6':
  - type: text
    content: ' '
  - type: note
    content: For ver. 6-10, see 1 Chr. 11:4-9
  - type: text
    content: 'And the king and his men went to Jerusalem '
  - type: note
    content: Judg. 19:11; [Josh. 15:63; Judg. 1:21]
  - type: text
    content: 'against the Jebusites, the inhabitants of the land, who said to David, “You will not come in here, but the blind and the lame will ward you off”—thinking, “David cannot come in here.” '
  '7':
  - type: text
    content: 'Nevertheless, David took the stronghold of Zion, '
  - type: note
    content: ch. 6:12, 16
  - type: text
    content: 'that is, the city of David. '
  '8':
  - type: text
    content: 'And David said on that day, “Whoever would strike the Jebusites, let him get up the water shaft to attack ‘the lame and the blind,’ who are hated by David’s soul.” Therefore it is said, “The blind and the lame shall not come into the house.” '
  '9':
  - type: text
    content: 'And David lived in the stronghold and called it '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the city of David. And David built the city all around from the '
  - type: note
    content: 1 Kgs. 9:15, 24; 11:27; 2 Kgs. 12:20; 2 Chr. 32:5
  - type: text
    content: 'Millo inward. '
