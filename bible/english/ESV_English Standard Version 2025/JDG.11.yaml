document_id: JDG.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah Delivers Israel
  - type: text
    content: 'Now '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Jephthah the Gileadite was '
  - type: note
    content: ch. 6:12; 2 Kgs. 5:1
  - type: text
    content: 'a mighty warrior, but he was the son of a prostitute. Gilead was the father of Jephthah. '
  '10':
  - type: text
    content: 'And the elders of Gilead said to Jephthah, '
  - type: note
    content: Jer. 42:5
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will be witness between us, if we do not do as you say.” '
  '11':
  - type: text
    content: 'So Jephthah went with the elders of Gilead, and the people '
  - type: note
    content: ver. 6, 8; ch. 10:18
  - type: text
    content: 'made him head and leader over them. And Jephthah spoke all his words '
  - type: note
    content: 1 Sam. 10:19, 25; 11:15; 12:7; [ch. 20:1; 1 Sam. 10:17]
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ' at '
  - type: note
    content: ch. 10:17
  - type: text
    content: Mizpah.
  '12':
  - type: text
    content: 'Then Jephthah sent messengers to the king of the Ammonites and said, “What do you have against me, that you have come to me to fight against my land?” '
  '13':
  - type: text
    content: 'And the king of the Ammonites answered the messengers of Jephthah, '
  - type: note
    content: See Num. 21:24-26
  - type: text
    content: '“Because Israel on coming up from Egypt took away my land, from the '
  - type: note
    content: Num. 21:13
  - type: text
    content: 'Arnon to the '
  - type: note
    content: Gen. 32:22
  - type: text
    content: 'Jabbok and to the Jordan; now therefore restore it peaceably.” '
  '14':
  - type: text
    content: 'Jephthah again sent messengers to the king of the Ammonites '
  '15':
  - type: text
    content: 'and said to him, “Thus says Jephthah: '
  - type: note
    content: Deut. 2:9, 19
  - type: text
    content: 'Israel did not take away the land of Moab or the land of the Ammonites, '
  '16':
  - type: text
    content: 'but when they came up from Egypt, Israel went through the wilderness '
  - type: note
    content: Num. 14:25; Deut. 1:40
  - type: text
    content: 'to the Red Sea and '
  - type: note
    content: Num. 13:26
  - type: text
    content: 'came to Kadesh. '
  '17':
  - type: note
    content: Num. 20:14
  - type: text
    content: 'Israel then sent messengers to the king of Edom, saying, ‘Please let us pass through your land,’ '
  - type: note
    content: See Num. 20:18-21
  - type: text
    content: 'but the king of Edom would not listen. And they sent also to the king of Moab, but he would not consent. So Israel '
  - type: note
    content: Num. 20:1; Deut. 1:46
  - type: text
    content: remained at Kadesh.
  '18':
  - type: text
    content: '“Then they journeyed through the wilderness and '
  - type: note
    content: Num. 21:4; See Deut. 2:1-8
  - type: text
    content: 'went around the land of Edom and the land of Moab and '
  - type: note
    content: Num. 21:11
  - type: text
    content: 'arrived on the east side of the land of Moab and '
  - type: note
    content: Num. 21:13; 22:36
  - type: text
    content: 'camped on the other side of the Arnon. But they did not enter the territory of Moab, for the Arnon was the boundary of Moab. '
  '19':
  - type: note
    content: For ver. 19-22, see Num. 21:21-26; Deut. 2:26-37
  - type: text
    content: 'Israel then sent messengers to Sihon king of the Amorites, king of Heshbon, and Israel said to him, ‘Please let us pass through your land to our country,’ '
  '2':
  - type: text
    content: 'And Gilead’s wife also bore him sons. And when his wife’s sons grew up, they drove Jephthah out and said to him, “You shall not have an inheritance in our father’s house, for you are the son of another woman.” '
  '20':
  - type: text
    content: 'but Sihon did not trust Israel to pass through his territory, so Sihon gathered all his people together and encamped at Jahaz and fought with Israel. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, gave Sihon and all his people into the hand of Israel, and they defeated them. So Israel took possession of all the land of the Amorites, who inhabited that country. '
  '22':
  - type: text
    content: 'And they took possession of all the territory of the Amorites from the Arnon to the Jabbok and from the wilderness to the Jordan. '
  '23':
  - type: text
    content: 'So then the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, dispossessed the Amorites from before his people Israel; and are you to take possession of them? '
  '24':
  - type: text
    content: 'Will you not possess what '
  - type: note
    content: Num. 21:29; 1 Kgs. 11:7
  - type: text
    content: 'Chemosh your god gives you to possess? '
  - type: note
    content: Deut. 9:5; 18:12; Josh. 3:10
  - type: text
    content: 'And all that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has dispossessed before us, we will possess. '
  '25':
  - type: text
    content: 'Now are you any better than '
  - type: note
    content: Num. 22:2; Josh. 24:9; Mic. 6:5
  - type: text
    content: 'Balak the son of Zippor, king of Moab? Did he ever contend against Israel, or did he ever go to war with them? '
  '26':
  - type: text
    content: 'While Israel lived '
  - type: note
    content: Num. 21:25
  - type: text
    content: 'in Heshbon and its villages, and '
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'in Aroer and its villages, and in all the cities that are on the banks of the Arnon, 300 years, why did you not deliver them within that time? '
  '27':
  - type: text
    content: 'I therefore have not sinned against you, and you do me wrong by making war on me. '
  - type: note
    content: Gen. 16:5; 18:25; 31:53; 1 Sam. 24:12, 15
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the Judge, decide this day between the people of Israel and the people of Ammon.” '
  '28':
  - type: text
    content: But the king of the Ammonites did not listen to the words of Jephthah that he sent to him.
  - type: heading
    content: Jephthah’s Tragic Vow
  '29':
  - type: text
    content: ' '
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon Jephthah, and he passed through Gilead and Manasseh and passed on to Mizpah of Gilead, and from Mizpah of Gilead he passed on to the Ammonites. '
  '3':
  - type: text
    content: 'Then Jephthah fled from his brothers and lived in the land of '
  - type: note
    content: 2 Sam. 10:6, 8
  - type: text
    content: 'Tob, and '
  - type: note
    content: See ch. 9:4; [1 Sam. 22:2]
  - type: text
    content: worthless fellows collected around Jephthah and went out with him.
  '30':
  - type: text
    content: 'And Jephthah '
  - type: note
    content: Gen. 28:20; 1 Sam. 1:11
  - type: text
    content: 'made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “If you will give the Ammonites into my hand, '
  '31':
  - type: text
    content: then whatever
  - type: note
    content: Or whoever
  - type: text
    content: ' comes out from the doors of my house to meet me when I return in peace from the Ammonites '
  - type: note
    content: '[Lev. 27:2; 1 Sam. 1:28]'
  - type: text
    content: 'shall be the '
  - type: text
    content: Lord
  - type: text
    content: '’s, and '
  - type: note
    content: Ps. 66:13
  - type: text
    content: I will offer it
  - type: note
    content: Or him
  - type: text
    content: ' up for a burnt offering.” '
  '32':
  - type: text
    content: 'So Jephthah crossed over to the Ammonites to fight against them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into his hand. '
  '33':
  - type: text
    content: 'And he struck them from Aroer to the neighborhood of '
  - type: note
    content: Ezek. 27:17
  - type: text
    content: Minnith, twenty cities, and as far as Abel-keramim, with a great blow. So the Ammonites were subdued before the people of Israel.
  '34':
  - type: text
    content: 'Then Jephthah came to his home at '
  - type: note
    content: ver. 11; ch. 10:17
  - type: text
    content: 'Mizpah. And behold, his daughter came out to meet him '
  - type: note
    content: Ex. 15:20; 1 Sam. 18:6; Ps. 68:25; Jer. 31:4
  - type: text
    content: 'with tambourines and with dances. She was his only child; besides her he had neither son nor daughter. '
  '35':
  - type: text
    content: 'And as soon as he saw her, he tore his clothes and said, “Alas, my daughter! You have brought me very low, and you have become the cause of great trouble to me. For I have opened my mouth to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Num. 30:2; [Eccles. 5:4, 5]
  - type: text
    content: 'and I cannot take back my vow.” '
  '36':
  - type: text
    content: 'And she said to him, “My father, you have opened your mouth to the '
  - type: text
    content: Lord
  - type: text
    content: '; do to me according to what has gone out of your mouth, now that the '
  - type: text
    content: Lord
  - type: text
    content: ' has avenged you on your enemies, on the Ammonites.” '
  '37':
  - type: text
    content: 'So she said to her father, “Let this thing be done for me: leave me alone two months, that I may go up and down on the mountains and weep for my virginity, I and my companions.” '
  '38':
  - type: text
    content: 'So he said, “Go.” Then he sent her away for two months, and she departed, she and her companions, and wept for her virginity on the mountains. '
  '39':
  - type: text
    content: 'And at the end of two months, she returned to her father, '
  - type: note
    content: ver. 31
  - type: text
    content: 'who did with her according to his vow that he had made. She had never known a man, and it became a custom in Israel '
  '4':
  - type: text
    content: 'After a time the Ammonites made war against Israel. '
  '40':
  - type: text
    content: that the daughters of Israel went year by year to lament the daughter of Jephthah the Gileadite four days in the year.
  '5':
  - type: text
    content: 'And when the Ammonites made war against Israel, the elders of Gilead went to bring Jephthah from the land of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Tob. '
  '6':
  - type: text
    content: 'And they said to Jephthah, “Come and be our leader, that we may fight against the Ammonites.” '
  '7':
  - type: text
    content: 'But Jephthah said to the elders of Gilead, “Did you not hate me and drive me out of my father’s house? Why have you come to me now when you are in distress?” '
  '8':
  - type: text
    content: 'And the elders of Gilead said to Jephthah, “That is why we have turned to you now, that you may go with us and fight against the Ammonites and '
  - type: note
    content: ch. 10:18
  - type: text
    content: 'be our head over all the inhabitants of Gilead.” '
  '9':
  - type: text
    content: 'Jephthah said to the elders of Gilead, “If you bring me home again to fight against the Ammonites, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gives them over to me, I will be your head.” '
