document_id: 2PE.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: False Prophets and Teachers
  - type: text
    content: 'But '
  - type: note
    content: Deut. 13:1; See Matt. 7:15
  - type: text
    content: 'false prophets also arose among the people, '
  - type: note
    content: Acts 20:30; 2 Cor. 11:13; 1 Tim. 4:1; [Matt. 24:11]
  - type: text
    content: 'just as there will be false teachers among you, who will '
  - type: note
    content: Jude 4; [Matt. 10:33; Gal. 2:4]
  - type: text
    content: 'secretly bring in destructive heresies, even denying the Master '
  - type: note
    content: 1 Cor. 6:20; 7:23; Gal. 3:13; 4:5; Rev. 5:9; [Ex. 15:16; 1 Pet. 1:18; Rev. 14:3, 4]
  - type: text
    content: 'who bought them, bringing upon themselves swift destruction. '
  '10':
  - type: text
    content: 'and especially '
  - type: note
    content: Jude 16, 18
  - type: text
    content: those who indulge
  - type: note
    content: Greek who go after the flesh
  - type: text
    content: ' in the lust of defiling passion and '
  - type: note
    content: Jude 8; [Ex. 22:28]
  - type: text
    content: despise authority.
  - type: text
    content: 'Bold and willful, they do not tremble '
  - type: note
    content: Jude 8; [Ex. 22:28]
  - type: text
    content: 'as they blaspheme the glorious ones, '
  '11':
  - type: note
    content: Jude 9
  - type: text
    content: 'whereas angels, though greater in might and power, do not pronounce a blasphemous judgment against them before the Lord. '
  '12':
  - type: note
    content: Jude 10
  - type: text
    content: 'But these, like irrational animals, '
  - type: note
    content: '[Jer. 12:3; Phil. 3:19]'
  - type: text
    content: 'creatures of instinct, born to be caught and destroyed, blaspheming about matters of which they are ignorant, will also be destroyed in their destruction, '
  '13':
  - type: text
    content: 'suffering wrong as '
  - type: note
    content: ver. 15
  - type: text
    content: 'the wage for their wrongdoing. They count it pleasure '
  - type: note
    content: '[Rom. 13:13; 1 Thess. 5:7]; See James 5:5'
  - type: text
    content: to revel in the daytime. They are blots and blemishes, reveling in their deceptions,
  - type: note
    content: Some manuscripts love feasts
  - type: text
    content: ' while '
  - type: note
    content: '[1 Cor. 11:21]'
  - type: text
    content: 'they feast with you. '
  '14':
  - type: text
    content: They have eyes full of adultery,
  - type: note
    content: Or eyes full of an adulteress
  - type: text
    content: ' '
  - type: note
    content: '[1 Pet. 4:1]'
  - type: text
    content: 'insatiable for sin. They entice unsteady souls. They have hearts '
  - type: note
    content: ver. 3; [1 Tim. 4:7]
  - type: text
    content: 'trained in greed. '
  - type: note
    content: '[Eph. 2:3]'
  - type: text
    content: 'Accursed children! '
  '15':
  - type: text
    content: 'Forsaking the right way, '
  - type: note
    content: Ezek. 14:11
  - type: text
    content: 'they have gone astray. They have followed '
  - type: note
    content: Num. 22:5, 7; Deut. 23:4; Neh. 13:2; Jude 11; Rev. 2:14
  - type: text
    content: 'the way of Balaam, the son of Beor, who loved '
  - type: note
    content: ver. 13
  - type: text
    content: 'gain from wrongdoing, '
  '16':
  - type: text
    content: 'but was rebuked for his own transgression; '
  - type: note
    content: Num. 22:21, 23, 28
  - type: text
    content: a speechless donkey spoke with human voice and restrained the prophet’s madness.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jude 12
  - type: text
    content: 'These are waterless springs and mists driven by a storm. '
  - type: note
    content: Jude 13
  - type: text
    content: 'For them the gloom of utter darkness has been reserved. '
  '18':
  - type: text
    content: 'For, '
  - type: note
    content: Jude 16
  - type: text
    content: 'speaking loud boasts of folly, they entice by sensual passions of the flesh those who are barely '
  - type: note
    content: ver. 20; ch. 1:4
  - type: text
    content: 'escaping from those who live in error. '
  '19':
  - type: text
    content: 'They promise them '
  - type: note
    content: Gal. 5:13; See James 1:25
  - type: text
    content: 'freedom, '
  - type: note
    content: John 8:34; Rom. 6:16
  - type: text
    content: but they themselves are slaves
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of corruption. For whatever overcomes a person, to that he is enslaved. '
  '2':
  - type: text
    content: 'And many will follow their sensuality, and because of them the way of truth '
  - type: note
    content: Rom. 2:24
  - type: text
    content: 'will be blasphemed. '
  '20':
  - type: text
    content: 'For if, '
  - type: note
    content: ver. 18
  - type: text
    content: 'after they have escaped the defilements of the world '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'through the knowledge of our Lord and Savior Jesus Christ, they are again entangled in them and overcome, '
  - type: note
    content: Matt. 12:45
  - type: text
    content: 'the last state has become worse for them than the first. '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: '[Ezek. 18:24; Luke 12:47; Heb. 6:4-6; 10:26, 27; James 4:17]'
  - type: text
    content: 'it would have been better for them never to have known the way of righteousness than after knowing it to turn back from '
  - type: note
    content: Rom. 7:12
  - type: text
    content: 'the holy commandment delivered to them. '
  '22':
  - type: text
    content: 'What the true proverb says has happened to them: “The '
  - type: note
    content: Prov. 26:11
  - type: text
    content: dog returns to its own vomit, and the sow, after washing herself, returns to wallow in the mire.”
  '3':
  - type: text
    content: 'And '
  - type: note
    content: '[2 Cor. 12:17, 18; 1 Tim. 6:5; Titus 1:11]'
  - type: text
    content: 'in their greed they will exploit you '
  - type: note
    content: Rom. 16:18; Col. 2:4
  - type: text
    content: 'with false words. '
  - type: note
    content: '[Deut. 32:35; Phil. 3:19]'
  - type: text
    content: Their condemnation from long ago is not idle, and their destruction is not asleep.
  '4':
  - type: text
    content: 'For if God did not spare '
  - type: note
    content: Jude 6
  - type: text
    content: 'angels when they sinned, but '
  - type: note
    content: '[Rev. 20:2, 3, 10]'
  - type: text
    content: cast them into hell
  - type: note
    content: Greek Tartarus
  - type: text
    content: ' and committed them to chains'
  - type: note
    content: Some manuscripts pits
  - type: text
    content: ' of gloomy darkness '
  - type: note
    content: Matt. 25:41
  - type: text
    content: 'to be kept until the judgment; '
  '5':
  - type: text
    content: 'if he did not spare the ancient world, but '
  - type: note
    content: See 1 Pet. 3:20
  - type: text
    content: 'preserved Noah, a herald of righteousness, with seven others, when he brought '
  - type: note
    content: ch. 3:6; Job 22:16
  - type: text
    content: 'a flood upon the world of the ungodly; '
  '6':
  - type: text
    content: 'if by '
  - type: note
    content: See Gen. 19:24
  - type: text
    content: 'turning the cities of Sodom and Gomorrah to ashes he condemned them to extinction, '
  - type: note
    content: '[Num. 26:10]'
  - type: text
    content: 'making them an example of '
  - type: note
    content: Jude 15
  - type: text
    content: what is going to happen to the ungodly;
  - type: note
    content: Some manuscripts an example to those who were to be ungodly
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 19:16
  - type: text
    content: 'if he rescued righteous Lot, greatly distressed by the sensual conduct of the wicked '
  '8':
  - type: text
    content: '(for as that righteous man lived among them day after day, '
  - type: note
    content: Ps. 119:136, 158; [Ezek. 9:4]
  - type: text
    content: 'he was tormenting his righteous soul over their lawless deeds that he saw and heard); '
  '9':
  - type: text
    content: 'then '
  - type: note
    content: 1 Cor. 10:13; Rev. 3:10
  - type: text
    content: the Lord knows how to rescue the godly from trials,
  - type: note
    content: Or temptations
  - type: text
    content: ' and to keep the unrighteous under punishment until the day of judgment, '
