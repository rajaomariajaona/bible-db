document_id: ROM.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: '[Gal. 1:10]'
  - type: text
    content: a servant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of Christ Jesus, '
  - type: note
    content: 1 Cor. 1:1; [1 Cor. 9:1; Heb. 5:4]; See 2 Cor. 1:1
  - type: text
    content: 'called to be an apostle, '
  - type: note
    content: See Acts 13:2
  - type: text
    content: 'set apart for the gospel of God, '
  '10':
  - type: text
    content: 'always in my prayers, asking that somehow '
  - type: note
    content: ch. 15:32; [1 Thess. 3:10]
  - type: text
    content: 'by God’s will I may now at last succeed in coming to you. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: ch. 15:22, 23; [Acts 19:21]
  - type: text
    content: 'I long to see you, that I may impart to you some spiritual gift to strengthen you— '
  '12':
  - type: text
    content: 'that is, that we may be mutually encouraged '
  - type: note
    content: See 2 Pet. 1:1
  - type: text
    content: 'by each other’s faith, both yours and mine. '
  '13':
  - type: text
    content: I do not want you to be unaware, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' that '
  - type: note
    content: ch. 15:22, 23; [Acts 19:21]
  - type: text
    content: 'I have often intended to come to you (but '
  - type: note
    content: ch. 15:22; [1 Thess. 2:18]
  - type: text
    content: 'thus far have been prevented), in order that I may reap some '
  - type: note
    content: Phil. 4:17; [John 4:36]
  - type: text
    content: 'harvest among you as well as among the rest of the Gentiles. '
  '14':
  - type: note
    content: 1 Cor. 9:16
  - type: text
    content: 'I am under obligation both to Greeks and to '
  - type: note
    content: See Acts 28:2
  - type: text
    content: barbarians,
  - type: note
    content: That is, non-Greeks
  - type: text
    content: ' both to the wise and to the foolish. '
  '15':
  - type: text
    content: So I am eager to preach the gospel to you also who are in Rome.
  - type: heading
    content: The Righteous Shall Live by Faith
  '16':
  - type: text
    content: 'For '
  - type: note
    content: '[Ps. 40:9, 10]; See Mark 8:38'
  - type: text
    content: 'I am not ashamed of the gospel, for it is '
  - type: note
    content: 1 Cor. 1:18, 24
  - type: text
    content: 'the power of God for salvation to everyone who believes, to the Jew '
  - type: note
    content: ch. 2:9; See Acts 3:26
  - type: text
    content: 'first and also to '
  - type: note
    content: '[Mark 7:26]; See John 7:35'
  - type: text
    content: 'the Greek. '
  '17':
  - type: text
    content: 'For in it '
  - type: note
    content: ch. 3:21; [2 Cor. 5:21; Phil. 3:9]
  - type: text
    content: 'the righteousness of God is revealed '
  - type: note
    content: See ch. 9:30
  - type: text
    content: from faith for faith,
  - type: note
    content: Or beginning and ending in faith
  - type: text
    content: ' '
  - type: note
    content: Gal. 3:11; Heb. 10:38; Cited from Hab. 2:4
  - type: text
    content: as it is written, “The righteous shall live by faith.”
  - type: note
    content: Or The one who by faith is righteous shall live
  - type: heading
    content: God’s Wrath on Unrighteousness
  '18':
  - type: text
    content: 'For '
  - type: note
    content: Eph. 5:6; Col. 3:6; [ch. 5:9]
  - type: text
    content: 'the wrath of God '
  - type: note
    content: '[ch. 2:5]'
  - type: text
    content: 'is revealed from heaven against all ungodliness and unrighteousness of men, who by their unrighteousness suppress the truth. '
  '19':
  - type: text
    content: 'For what can be '
  - type: note
    content: ch. 2:14, 15; Acts 14:17; 17:24-27
  - type: text
    content: 'known about God is plain to them, because God has shown it to them. '
  '2':
  - type: text
    content: 'which '
  - type: note
    content: Titus 1:2
  - type: text
    content: 'he promised beforehand '
  - type: note
    content: ch. 3:21; 16:26; Luke 1:70
  - type: text
    content: 'through his prophets in the holy Scriptures, '
  '20':
  - type: text
    content: 'For his invisible attributes, namely, his eternal power and divine nature, '
  - type: note
    content: '[Ps. 19:1-6; Jer. 5:21, 22]'
  - type: text
    content: have been clearly perceived, ever since the creation of the world,
  - type: note
    content: Or clearly perceived from the creation of the world
  - type: text
    content: ' in the things that have been made. So they are without excuse. '
  '21':
  - type: text
    content: 'For although they knew God, they did not honor him as God or give thanks to him, but they '
  - type: note
    content: 2 Kgs. 17:15; Jer. 2:5; Eph. 4:17, 18
  - type: text
    content: 'became futile in their thinking, and their foolish hearts were darkened. '
  '22':
  - type: note
    content: Jer. 10:14; 1 Cor. 1:20
  - type: text
    content: 'Claiming to be wise, they became fools, '
  '23':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 106:20; Jer. 2:11; [Deut. 4:16-18; Acts 17:29]
  - type: text
    content: 'exchanged the glory of '
  - type: note
    content: 1 Tim. 1:17
  - type: text
    content: the immortal God for images resembling mortal man and birds and animals and creeping things.
  '24':
  - type: text
    content: 'Therefore '
  - type: note
    content: ver. 26, 28; [Eph. 4:19]
  - type: text
    content: 'God gave them up in the lusts of their hearts to impurity, to '
  - type: note
    content: '[1 Thess. 4:4]'
  - type: text
    content: 'the dishonoring of their bodies among themselves, '
  '25':
  - type: text
    content: 'because they exchanged the truth about God for '
  - type: note
    content: Isa. 28:15; 44:19, 20; Jer. 10:14; Amos 2:4; [2 Thess. 2:11]
  - type: text
    content: 'a lie and worshiped and served the creature rather than the Creator, '
  - type: note
    content: ch. 9:5
  - type: text
    content: who is blessed forever! Amen.
  '26':
  - type: text
    content: 'For this reason '
  - type: note
    content: ver. 24, 28
  - type: text
    content: 'God gave them up to '
  - type: note
    content: '[Col. 3:5; 1 Thess. 4:5]'
  - type: text
    content: 'dishonorable passions. For their women exchanged natural relations for those that are contrary to nature; '
  '27':
  - type: text
    content: 'and the men likewise gave up natural relations with women and were consumed with passion for one another, '
  - type: note
    content: Lev. 18:22; 20:13
  - type: text
    content: men committing shameless acts with men and receiving in themselves the due penalty for their error.
  '28':
  - type: text
    content: 'And since they did not see fit to acknowledge God, '
  - type: note
    content: ver. 24, 26
  - type: text
    content: 'God gave them up to '
  - type: note
    content: '[Jer. 6:30]'
  - type: text
    content: 'a debased mind to do '
  - type: note
    content: '[Eph. 5:4]'
  - type: text
    content: 'what ought not to be done. '
  '29':
  - type: text
    content: 'They were filled with all manner of unrighteousness, evil, covetousness, malice. They are full of envy, murder, strife, deceit, maliciousness. They are gossips, '
  '3':
  - type: text
    content: 'concerning his Son, '
  - type: note
    content: See Matt. 1:1
  - type: text
    content: who was descended from David
  - type: note
    content: Or who came from the offspring of David
  - type: text
    content: ' '
  - type: note
    content: Gal. 4:4
  - type: text
    content: 'according to the flesh '
  '30':
  - type: text
    content: 'slanderers, haters of God, insolent, haughty, boastful, inventors of evil, disobedient to parents, '
  '31':
  - type: text
    content: 'foolish, faithless, heartless, ruthless. '
  '32':
  - type: text
    content: 'Though they know '
  - type: note
    content: ch. 2:26; 8:4
  - type: text
    content: 'God’s righteous decree that those who practice such things '
  - type: note
    content: ch. 6:21
  - type: text
    content: 'deserve to die, they not only do them but '
  - type: note
    content: Luke 11:48; Acts 8:1; 22:20; [1 Cor. 13:6; 2 Thess. 2:12]
  - type: text
    content: give approval to those who practice them.
  '4':
  - type: text
    content: 'and '
  - type: note
    content: '[Acts 13:33]'
  - type: text
    content: 'was declared to be the Son of God '
  - type: note
    content: 2 Cor. 13:4; Eph. 1:19, 20; Phil. 3:10; [Acts 10:38; 26:23]
  - type: text
    content: 'in power according to the Spirit of holiness by his resurrection from the dead, Jesus Christ our Lord, '
  '5':
  - type: text
    content: 'through whom '
  - type: note
    content: ch. 12:3; 15:15
  - type: text
    content: 'we have received grace and '
  - type: note
    content: See Acts 1:25
  - type: text
    content: 'apostleship '
  - type: note
    content: ch. 6:16; 16:26; 1 Pet. 1:2; [ch. 15:18; Acts 6:7]
  - type: text
    content: 'to bring about the obedience of faith for the sake of his name '
  - type: note
    content: See Acts 9:15
  - type: text
    content: 'among all the nations, '
  '6':
  - type: text
    content: 'including you who are '
  - type: note
    content: Rev. 17:14; [ch. 8:28, 30]
  - type: text
    content: called to belong to Jesus Christ,
  '7':
  - type: text
    content: 'To all those in Rome who are loved by God and called to be saints:'
  - type: note
    content: 1 Cor. 1:3
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Longing to Go to Rome
  '8':
  - type: text
    content: 'First, '
  - type: note
    content: 1 Cor. 1:4; Eph. 1:15, 16; Phil. 1:3; Col. 1:3, 4; [ch. 6:17; Phil. 4:6; 2 Tim. 1:3]
  - type: text
    content: 'I thank my God through Jesus Christ for all of you, '
  - type: note
    content: ch. 16:19; [1 Thess. 1:8]
  - type: text
    content: 'because your faith is proclaimed in all the world. '
  '9':
  - type: note
    content: Phil. 1:8; 1 Thess. 2:5, 10; [ch. 9:1; 2 Cor. 1:23; 11:10, 31]
  - type: text
    content: 'For God is my witness, '
  - type: note
    content: See Acts 24:14
  - type: text
    content: 'whom I serve with my spirit in the gospel of his Son, '
  - type: note
    content: 2 Tim. 1:3
  - type: text
    content: 'that without ceasing I mention you '
