document_id: 2TH.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Pray for Us
  - type: text
    content: Finally, brothers,
  - type: note
    content: Or brothers and sisters; also verses 6, 13
  - type: text
    content: ' '
  - type: note
    content: See 1 Thess. 5:25
  - type: text
    content: 'pray for us, that '
  - type: note
    content: Ps. 147:15; [1 Thess. 1:8]
  - type: text
    content: the word of the Lord may speed ahead and be honored,
  - type: note
    content: Or glorified
  - type: text
    content: ' as happened among you, '
  '10':
  - type: text
    content: 'For even when we were with you, we would give you this command: '
  - type: note
    content: '[Gen. 3:19]; See 1 Thess. 4:11'
  - type: text
    content: 'If anyone is not willing to work, let him not eat. '
  '11':
  - type: text
    content: 'For we hear that some among you '
  - type: note
    content: ver. 6
  - type: text
    content: 'walk in idleness, not busy at work, but '
  - type: note
    content: 1 Tim. 5:13; 1 Pet. 4:15
  - type: text
    content: 'busybodies. '
  '12':
  - type: text
    content: Now such persons we command and encourage in the Lord Jesus Christ to do their work quietly and to earn their own living.
  - type: note
    content: Greek to eat their own bread
  '13':
  - type: text
    content: 'As for you, brothers, '
  - type: note
    content: Gal. 6:9; [1 Cor. 15:58]
  - type: text
    content: 'do not grow weary in doing good. '
  '14':
  - type: text
    content: 'If anyone does not obey what we say in this letter, take note of that person, and '
  - type: note
    content: See ver. 6
  - type: text
    content: 'have nothing to do with him, that he may be ashamed. '
  '15':
  - type: note
    content: See Lev. 19:17; Matt. 18:15
  - type: text
    content: 'Do not regard him as an enemy, but '
  - type: note
    content: 1 Thess. 5:12, 14; [Titus 3:10]
  - type: text
    content: warn him as a brother.
  - type: heading
    content: Benediction
  '16':
  - type: text
    content: 'Now may '
  - type: note
    content: See Rom. 15:33; Eph. 6:23
  - type: text
    content: 'the Lord of peace himself '
  - type: note
    content: Num. 6:26
  - type: text
    content: 'give you peace at all times in every way. '
  - type: note
    content: Ruth 2:4
  - type: text
    content: The Lord be with you all.
  '17':
  - type: text
    content: 'I, Paul, write '
  - type: note
    content: See 1 Cor. 16:21
  - type: text
    content: 'this greeting with my own hand. This is the sign of genuineness in every letter of mine; it is the way I write. '
  '18':
  - type: note
    content: See Rom. 16:20
  - type: text
    content: The grace of our Lord Jesus Christ be with you all.
  '2':
  - type: text
    content: 'and '
  - type: note
    content: Rom. 15:31
  - type: text
    content: 'that we may be delivered from wicked and evil men. For '
  - type: note
    content: '[Deut. 32:20]'
  - type: text
    content: 'not all have faith. '
  '3':
  - type: text
    content: 'But '
  - type: note
    content: See 1 Cor. 1:9
  - type: text
    content: 'the Lord is faithful. He will establish you and '
  - type: note
    content: Matt. 6:13; John 17:15
  - type: text
    content: 'guard you against '
  - type: note
    content: See Matt. 13:19
  - type: text
    content: the evil one.
  - type: note
    content: Or evil
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: See 2 Cor. 2:3
  - type: text
    content: 'we have confidence in the Lord about you, that you are doing and will do the things that we command. '
  '5':
  - type: text
    content: 'May the Lord '
  - type: note
    content: 1 Thess. 3:11
  - type: text
    content: direct your hearts to the love of God and to the steadfastness of Christ.
  - type: heading
    content: Warning Against Idleness
  '6':
  - type: text
    content: 'Now we command you, brothers, '
  - type: note
    content: 1 Cor. 5:4
  - type: text
    content: 'in the name of our Lord Jesus Christ, '
  - type: note
    content: ver. 14; [Matt. 18:17; 2 Tim. 3:5]; See 1 Cor. 5:9; 2 John 10
  - type: text
    content: 'that you keep away from any '
  - type: note
    content: 1 Cor. 5:11
  - type: text
    content: 'brother '
  - type: note
    content: ver. 11; 1 Thess. 5:14
  - type: text
    content: 'who is walking in idleness and not in accord with the tradition that you received from us. '
  '7':
  - type: text
    content: 'For you yourselves know '
  - type: note
    content: '[Acts 20:35]; See 1 Thess. 1:6'
  - type: text
    content: 'how you ought to imitate us, because '
  - type: note
    content: 1 Thess. 1:5
  - type: text
    content: 'we were not idle when we were with you, '
  '8':
  - type: text
    content: 'nor did we eat anyone’s bread without paying for it, but '
  - type: note
    content: See 1 Thess. 2:9
  - type: text
    content: 'with toil and labor we worked night and day, that we might not be a burden to any of you. '
  '9':
  - type: text
    content: 'It was '
  - type: note
    content: 1 Cor. 9:4; 1 Thess. 2:6
  - type: text
    content: 'not because we do not have that right, but to give you in ourselves '
  - type: note
    content: ver. 7; 1 Pet. 5:3
  - type: text
    content: 'an example to imitate. '
