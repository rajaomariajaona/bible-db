document_id: ECC.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Remember Your Creator in Your Youth
  - type: text
    content: 'Remember also your Creator in '
  - type: note
    content: '[Lam. 3:27]'
  - type: text
    content: 'the days of your youth, before '
  - type: note
    content: '[ch. 11:8]'
  - type: text
    content: 'the evil days come and the years draw near of which '
  - type: note
    content: '[2 Sam. 19:35]'
  - type: text
    content: 'you will say, “I have no pleasure in them”; '
  '10':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: The Preacher sought to find words of delight, and uprightly he wrote words of truth.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Prov. 22:17
  - type: text
    content: 'The words of the wise are like goads, and like '
  - type: note
    content: Ezra 9:8; Isa. 22:23
  - type: text
    content: 'nails firmly fixed are the collected sayings; they are '
  - type: note
    content: Prov. 1:6; 2:6
  - type: text
    content: 'given by '
  - type: note
    content: Ps. 80:1; Ezek. 34:23; John 10:11, 16
  - type: text
    content: 'one Shepherd. '
  '12':
  - type: text
    content: 'My son, beware of anything beyond these. Of making '
  - type: note
    content: '[1 Kgs. 4:32, 33]'
  - type: text
    content: 'many books there is no end, and '
  - type: note
    content: '[ch. 1:18]'
  - type: text
    content: much study is a weariness of the flesh.
  '13':
  - type: text
    content: 'The end of the matter; all has been heard. '
  - type: note
    content: ch. 5:7; Deut. 6:2; 10:12
  - type: text
    content: Fear God and keep his commandments, for this is the whole duty of man.
  - type: note
    content: Or the duty of all mankind
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: ch. 11:9; Job 19:29; Matt. 12:36; Acts 17:31; Rom. 2:16; 14:10, 12; 1 Cor. 4:5; [ch. 3:15, 17; Gen. 18:25; Ps. 58:11]
  - type: text
    content: God will bring every deed into judgment, with
  - type: note
    content: Or into the judgment on
  - type: text
    content: ' every secret thing, whether good or evil.'
  '2':
  - type: text
    content: 'before '
  - type: note
    content: '[Job 3:9; Isa. 5:30; Ezek. 32:7, 8]'
  - type: text
    content: 'the sun and the light and the moon and the stars are darkened and the clouds return after the rain, '
  '3':
  - type: text
    content: 'in the day when the keepers of the house tremble, and the strong men are bent, and the grinders cease because they are few, and '
  - type: note
    content: '[Gen. 27:1; 48:10; 1 Sam. 3:2]'
  - type: text
    content: 'those who look through the windows are dimmed, '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: '[Ps. 141:3]'
  - type: text
    content: 'the doors on the street are shut—when '
  - type: note
    content: '[Jer. 25:10; Rev. 18:22]'
  - type: text
    content: 'the sound of the grinding is low, and one rises up at the sound of a bird, and all '
  - type: note
    content: '[ch. 2:8]'
  - type: text
    content: 'the daughters of song are brought low— '
  '5':
  - type: text
    content: 'they are afraid also of what is high, and '
  - type: note
    content: '[Prov. 26:13]'
  - type: text
    content: terrors are in the way; the almond tree blossoms, the grasshopper drags itself along,
  - type: note
    content: Or is a burden
  - type: text
    content: ' and desire fails, because man is going to his '
  - type: note
    content: '[Ps. 143:3]'
  - type: text
    content: 'eternal '
  - type: note
    content: '[Job 17:13; 30:23; Isa. 14:18]'
  - type: text
    content: 'home, and the '
  - type: note
    content: '[2 Chr. 35:25; Jer. 9:17; Matt. 9:23]'
  - type: text
    content: 'mourners go about the streets— '
  '6':
  - type: text
    content: 'before the silver cord is snapped, or '
  - type: note
    content: '[Zech. 4:2, 3]'
  - type: text
    content: 'the golden bowl is broken, or the pitcher is '
  - type: note
    content: '[Isa. 30:14]'
  - type: text
    content: 'shattered at the fountain, or the wheel broken at the cistern, '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 90:3; 103:14; See ch. 3:20; Job 34:15
  - type: text
    content: 'the dust returns to the earth as it was, and '
  - type: note
    content: '[ch. 3:21]'
  - type: text
    content: 'the spirit returns to God '
  - type: note
    content: '[Job 34:14; Isa. 57:16; Zech. 12:1]; See Gen. 2:7'
  - type: text
    content: 'who gave it. '
  '8':
  - type: note
    content: ch. 1:2
  - type: text
    content: Vanity
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (three times in this verse); see note on 1:2
  - type: text
    content: ' of vanities, says '
  - type: note
    content: See ch. 1:1
  - type: text
    content: the Preacher; all is vanity.
  - type: heading
    content: Fear God and Keep His Commandments
  '9':
  - type: text
    content: 'Besides being wise, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'the Preacher also taught the people knowledge, weighing and studying and arranging '
  - type: note
    content: See Prov. 1:1
  - type: text
    content: 'many proverbs with great care. '
