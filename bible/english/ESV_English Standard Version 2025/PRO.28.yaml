document_id: PRO.28,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:17; Ps. 53:5
  - type: text
    content: The wicked flee when no one pursues,
  - type: text
    content: 'but '
  - type: note
    content: Lev. 26:8; 1 Sam. 17:32
  - type: text
    content: the righteous are bold as a lion.
  '10':
  - type: text
    content: Whoever misleads the upright into an evil way
  - type: note
    content: See Ps. 7:15
  - type: text
    content: will fall into his own pit,
  - type: text
    content: 'but the blameless '
  - type: note
    content: '[Matt. 6:33]'
  - type: text
    content: will have a goodly inheritance.
  '11':
  - type: text
    content: 'A rich man is wise in his '
  - type: note
    content: ch. 26:5, 16
  - type: text
    content: own eyes,
  - type: text
    content: 'but a poor man who has understanding '
  - type: note
    content: Job 13:9
  - type: text
    content: will find him out.
  '12':
  - type: text
    content: 'When '
  - type: note
    content: ch. 11:10
  - type: text
    content: the righteous triumph, there is great glory,
  - type: text
    content: 'but when '
  - type: note
    content: ver. 28; [ch. 29:2; Eccles. 10:5, 6]
  - type: text
    content: the wicked rise, people hide themselves.
  '13':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[Job 31:33; Ps. 32:3]; See 1 John 1:8-10'
  - type: text
    content: conceals his transgressions will not prosper,
  - type: text
    content: 'but he who '
  - type: note
    content: Ps. 32:5; 1 John 1:9
  - type: text
    content: confesses and forsakes them will obtain mercy.
  '14':
  - type: text
    content: 'Blessed is the one who '
  - type: note
    content: ch. 23:17; Isa. 66:2; Phil. 2:12
  - type: text
    content: 'fears the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew lacks the Lord
  - type: text
    content: always,
  - type: text
    content: 'but whoever '
  - type: note
    content: See Ps. 95:8
  - type: text
    content: hardens his heart will fall into calamity.
  '15':
  - type: text
    content: 'Like '
  - type: note
    content: ch. 19:12; 1 Pet. 5:8
  - type: text
    content: 'a roaring lion or '
  - type: note
    content: '[2 Kgs. 2:24]'
  - type: text
    content: a charging bear
  - type: text
    content: 'is '
  - type: note
    content: '[Ex. 1:14, 16, 22; Matt. 2:16]'
  - type: text
    content: a wicked ruler over a poor people.
  '16':
  - type: text
    content: 'A ruler who '
  - type: note
    content: See ch. 6:32
  - type: text
    content: lacks understanding is a cruel oppressor,
  - type: text
    content: but he who hates unjust gain will prolong his days.
  '17':
  - type: text
    content: 'If one is burdened with '
  - type: note
    content: '[Gen. 9:6]'
  - type: text
    content: the blood of another,
  - type: text
    content: he will be a fugitive until death;
  - type: note
    content: Hebrew until the pit
  - type: text
    content: let no one help him.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:23; 10:9 ]'
  - type: text
    content: 'Whoever '
  - type: note
    content: ver. 6
  - type: text
    content: walks in integrity will be delivered,
  - type: text
    content: but he who is crooked in his ways will suddenly fall.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:11
  - type: text
    content: Whoever works his land will have plenty of bread,
  - type: text
    content: but he who follows worthless pursuits will have plenty of poverty.
  '2':
  - type: text
    content: 'When a land transgresses, '
  - type: note
    content: '[1 Kgs. 15:27]; See 1 Kgs. 16:8-28; 2 Kgs. 15:8-15'
  - type: text
    content: it has many rulers,
  - type: text
    content: but with a man of understanding and knowledge,
  - type: text
    content: its stability will long continue.
  '20':
  - type: text
    content: A faithful man will abound with blessings,
  - type: text
    content: 'but whoever hastens to be rich '
  - type: note
    content: ch. 16:5
  - type: text
    content: will not go unpunished.
  '21':
  - type: text
    content: 'To show '
  - type: note
    content: See ch. 18:5
  - type: text
    content: partiality is not good,
  - type: text
    content: 'but for '
  - type: note
    content: Ezek. 13:19
  - type: text
    content: a piece of bread a man will do wrong.
  '22':
  - type: text
    content: 'A '
  - type: note
    content: See ch. 23:6
  - type: text
    content: stingy man
  - type: note
    content: Hebrew A man whose eye is evil
  - type: text
    content: ' '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: hastens after wealth
  - type: text
    content: 'and does not know that '
  - type: note
    content: ch. 22:16
  - type: text
    content: poverty will come upon him.
  '23':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 27:5, 6
  - type: text
    content: rebukes a man will afterward find more favor
  - type: text
    content: 'than '
  - type: note
    content: ch. 29:5
  - type: text
    content: he who flatters with his tongue.
  '24':
  - type: text
    content: Whoever robs his father or his mother
  - type: text
    content: and says, “That is no transgression,”
  - type: text
    content: 'is '
  - type: note
    content: '[ch. 18:9]'
  - type: text
    content: a companion to a man who destroys.
  '25':
  - type: text
    content: 'A greedy man '
  - type: note
    content: See ch. 15:18
  - type: text
    content: stirs up strife,
  - type: text
    content: 'but the one who trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: ch. 11:25; 13:4
  - type: text
    content: be enriched.
  '26':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[1 Cor. 3:18]'
  - type: text
    content: trusts in his own mind is a fool,
  - type: text
    content: but he who walks in wisdom will be delivered.
  '27':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[ch. 11:24]; See ch. 19:17'
  - type: text
    content: gives to the poor will not want,
  - type: text
    content: 'but he who '
  - type: note
    content: '[ch. 29:7]'
  - type: text
    content: hides his eyes will get many a curse.
  '28':
  - type: text
    content: 'When '
  - type: note
    content: See ver. 12
  - type: text
    content: 'the wicked rise, '
  - type: note
    content: Job 24:4
  - type: text
    content: people hide themselves,
  - type: text
    content: but when they perish, the righteous increase.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 18:28 ]'
  - type: text
    content: A poor man who oppresses the poor
  - type: text
    content: is a beating rain that leaves no food.
  '4':
  - type: text
    content: 'Those who forsake the law '
  - type: note
    content: Ps. 10:3; Rom. 1:32
  - type: text
    content: praise the wicked,
  - type: text
    content: 'but those who keep the law '
  - type: note
    content: '[1 Kgs. 18:18, 21; Neh. 13:11, 15; Matt. 3:7; 14:4; Eph. 5:11]'
  - type: text
    content: strive against them.
  '5':
  - type: text
    content: 'Evil men '
  - type: note
    content: Ps. 92:6; [John 12:39, 40]
  - type: text
    content: do not understand justice,
  - type: text
    content: 'but those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 119:100; [John 7:17; 1 Cor. 2:15; James 1:5; 1 John 2:20, 27]
  - type: text
    content: understand it completely.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:1
  - type: text
    content: 'Better is a poor man who '
  - type: note
    content: ver. 18
  - type: text
    content: walks in his integrity
  - type: text
    content: 'than a rich man who is '
  - type: note
    content: ver. 18
  - type: text
    content: crooked in his ways.
  '7':
  - type: text
    content: The one who keeps the law is a son with understanding,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 23:20; 29:3]'
  - type: text
    content: a companion of gluttons shames his father.
  '8':
  - type: text
    content: 'Whoever multiplies his wealth '
  - type: note
    content: Ex. 22:25; Lev. 25:36
  - type: text
    content: by interest and profit
  - type: note
    content: That is, profit that comes from charging interest to the poor
  - type: note
    content: See Job 27:17
  - type: text
    content: 'gathers it for him who is '
  - type: note
    content: ch. 14:31
  - type: text
    content: generous to the poor.
  '9':
  - type: text
    content: If one turns away his ear from hearing the law,
  - type: text
    content: 'even his '
  - type: note
    content: '[Ps. 109:7]; See ch. 15:8'
  - type: text
    content: prayer is an abomination.
