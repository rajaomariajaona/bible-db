document_id: LEV.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbath Year
  - type: text
    content: ' '
  - type: note
    content: ch. 26:46
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses on Mount Sinai, saying, '
  '10':
  - type: text
    content: 'And you shall consecrate the fiftieth year, and '
  - type: note
    content: Isa. 61:1; Jer. 34:8, 13, 15, 17; Ezek. 46:17; [Isa. 61:2; 63:4; Luke 4:19]
  - type: text
    content: 'proclaim liberty throughout the land to all its inhabitants. It shall be a jubilee for you, when each of you shall return to his property and each of '
  - type: note
    content: ch. 27:24; Num. 36:4
  - type: text
    content: 'you shall return to his clan. '
  '11':
  - type: text
    content: 'That fiftieth year shall be a jubilee for you; in it '
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'you shall neither sow nor reap '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'what grows of itself nor gather the grapes from the undressed vines. '
  '12':
  - type: text
    content: 'For it is a jubilee. It shall be holy to you. '
  - type: note
    content: ver. 6, 7
  - type: text
    content: You may eat the produce of the field.
  - type: note
    content: Or countryside
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: '“In this year of jubilee each of you shall return to his property. '
  '14':
  - type: text
    content: 'And if you make a sale to your neighbor or buy from your neighbor, '
  - type: note
    content: '[ch. 19:33]'
  - type: text
    content: 'you shall not wrong one another. '
  '15':
  - type: note
    content: ch. 27:18, 23
  - type: text
    content: 'You shall pay your neighbor according to the number of years after the jubilee, and he shall sell to you according to the number of years for crops. '
  '16':
  - type: text
    content: 'If the years are many, you shall increase the price, and if the years are few, you shall reduce the price, for it is the number of the crops that he is selling to you. '
  '17':
  - type: note
    content: ver. 36, 43; ch. 19:14, 32
  - type: text
    content: 'You shall not wrong one another, but you shall fear your God, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: See ch. 18:4, 5
  - type: text
    content: '“Therefore you shall do my statutes and keep my rules and perform them, and then '
  - type: note
    content: ch. 26:5, 6; Deut. 12:10; [Prov. 1:33; Jer. 23:6; Ezek. 34:25, 28]
  - type: text
    content: 'you will dwell in the land securely. '
  '19':
  - type: note
    content: Ps. 85:12; Ezek. 34:26, 27
  - type: text
    content: 'The land will yield its fruit, and '
  - type: note
    content: ch. 26:5; Deut. 11:15; [Joel 2:19, 26]
  - type: text
    content: 'you will eat your fill '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'and dwell in it securely. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, When you come into '
  - type: note
    content: Ex. 23:10, 11; [ch. 26:34, 35; 2 Chr. 36:21]
  - type: text
    content: 'the land that I give you, the land shall keep a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'And if you say, '
  - type: note
    content: '[Matt. 6:25, 31; Luke 12:22, 29]'
  - type: text
    content: '‘What shall we eat in the seventh year, if '
  - type: note
    content: ver. 4, 5
  - type: text
    content: 'we may not sow or gather in our crop?’ '
  '21':
  - type: text
    content: 'I will '
  - type: note
    content: Deut. 28:8
  - type: text
    content: 'command my blessing on you in the sixth year, so that it will produce a crop sufficient for three years. '
  '22':
  - type: note
    content: '[2 Kgs. 19:29]'
  - type: text
    content: 'When you sow in the eighth year, you will be eating some of '
  - type: note
    content: ch. 26:10
  - type: text
    content: the old crop; you shall eat the old until the ninth year, when its crop arrives.
  - type: heading
    content: Redemption of Property
  '23':
  - type: text
    content: '“The land shall not be sold in perpetuity, for '
  - type: note
    content: Deut. 32:43; 2 Chr. 7:20; Ps. 85:1; Hos. 9:3; Joel 2:18; 3:2
  - type: text
    content: 'the land is mine. For you are strangers and sojourners with me. '
  '24':
  - type: text
    content: And in all the country you possess, you shall allow a redemption of the land.
  '25':
  - type: text
    content: '“If your brother becomes poor and sells part of his property, '
  - type: note
    content: Ruth 2:20; 3:9, 12; 4:4, 6; Jer. 32:7, 8
  - type: text
    content: 'then his nearest redeemer shall come and redeem what his brother has sold. '
  '26':
  - type: text
    content: 'If a man has no one to redeem it and then himself becomes prosperous and finds sufficient means to redeem it, '
  '27':
  - type: text
    content: 'let '
  - type: note
    content: See ver. 50-52
  - type: text
    content: 'him calculate the years since he sold it and pay back the balance to the man to whom he sold it, and then return to his property. '
  '28':
  - type: text
    content: 'But if he does not have sufficient means to recover it, then what he sold shall remain in the hand of the buyer until the year of jubilee. In the jubilee it shall '
  - type: note
    content: ch. 27:21
  - type: text
    content: 'be released, and '
  - type: note
    content: ver. 13, 41
  - type: text
    content: he shall return to his property.
  '29':
  - type: text
    content: '“If a man sells a dwelling house in a walled city, he may redeem it within a year of its sale. For a full year he shall have the right of redemption. '
  '3':
  - type: text
    content: 'For six years you shall sow your field, and for six years you shall prune your vineyard and gather in its fruits, '
  '30':
  - type: text
    content: 'If it is not redeemed within a full year, then the house in the walled city shall belong in perpetuity to the buyer, throughout his generations; '
  - type: note
    content: '[See ver. 28above]'
  - type: text
    content: 'it shall not be released in the jubilee. '
  '31':
  - type: text
    content: 'But the houses of the villages that have no wall around them shall be classified with the fields of the land. They may be redeemed, and '
  - type: note
    content: '[See ver. 28above]'
  - type: text
    content: 'they shall be released in the jubilee. '
  '32':
  - type: text
    content: 'As for '
  - type: note
    content: '[Num. 35:2]; See Josh. 21:2-40'
  - type: text
    content: 'the cities of the Levites, the Levites may redeem at any time the houses in the cities they possess. '
  '33':
  - type: text
    content: 'And if one of the Levites exercises his right of redemption, then the house that was sold in a city they possess shall be released in the jubilee. For the houses in the cities of the Levites are their possession among the people of Israel. '
  '34':
  - type: text
    content: 'But the fields '
  - type: note
    content: Num. 35:2; 1 Chr. 13:2; [Acts 4:36, 37]; See Josh. 21:11-42; 1 Chr. 6:55-81
  - type: text
    content: of pastureland belonging to their cities may not be sold, for that is their possession forever.
  - type: heading
    content: Kindness for Poor Brothers
  '35':
  - type: text
    content: '“If your brother becomes poor and cannot maintain himself with you, '
  - type: note
    content: Deut. 15:7, 8; [Ps. 41:1; 112:5, 9; Prov. 14:31; Acts 11:29; 1 John 3:17]
  - type: text
    content: 'you shall support him as though he were a stranger and a sojourner, and he shall live with you. '
  '36':
  - type: note
    content: See Ex. 22:25
  - type: text
    content: 'Take no interest from him or profit, but '
  - type: note
    content: ver. 17, 43; Neh. 5:9; [Mal. 3:5]
  - type: text
    content: 'fear your God, that your brother may live beside you. '
  '37':
  - type: note
    content: '[See ver. 36 above]'
  - type: text
    content: 'You shall not lend him your money at interest, nor give him your food for profit. '
  '38':
  - type: note
    content: ver. 42, 55; ch. 22:32, 33; 26:13
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt to give you the land of Canaan, and to be your God.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: Ex. 21:2; Deut. 15:12; 1 Kgs. 9:22; 2 Kgs. 4:1; Neh. 5:5
  - type: text
    content: '“If your brother becomes poor beside you and sells himself to you, you shall not make him serve as a slave: '
  '4':
  - type: text
    content: 'but in the seventh year there shall be a Sabbath of solemn rest for the land, a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: '. You shall not sow your field or prune your vineyard. '
  '40':
  - type: text
    content: 'he shall be with you as a hired worker and as a sojourner. He shall serve with you until the year of the jubilee. '
  '41':
  - type: note
    content: '[See ver. 28above]'
  - type: text
    content: 'Then he shall go out from you, '
  - type: note
    content: '[Ex. 21:3]'
  - type: text
    content: 'he and his children with him, and go back to his own clan and return '
  - type: note
    content: ver. 13, 28
  - type: text
    content: 'to the possession of his fathers. '
  '42':
  - type: text
    content: 'For they are '
  - type: note
    content: ver. 55; [Rom. 6:22; 1 Cor. 7:23]
  - type: text
    content: my servants,
  - type: note
    content: Hebrew slaves
  - type: text
    content: ' whom I brought out of the land of Egypt; they shall not be sold as slaves. '
  '43':
  - type: note
    content: '[Eph. 6:9; Col. 4:1]'
  - type: text
    content: 'You shall not rule over him '
  - type: note
    content: Ex. 1:13, 14; Ezek. 34:4
  - type: text
    content: 'ruthlessly but '
  - type: note
    content: ver. 17, 36
  - type: text
    content: 'shall fear your God. '
  '44':
  - type: text
    content: 'As for your male and female slaves whom you may have: you may buy male and female slaves from among the nations that are around you. '
  '45':
  - type: note
    content: Isa. 14:1, 2; 56:3, 6
  - type: text
    content: 'You may also buy from among the strangers who sojourn with you and their clans that are with you, who have been born in your land, and they may be your property. '
  '46':
  - type: text
    content: 'You may bequeath them to your sons after you to inherit as a possession forever. You may make slaves of them, but over your brothers the people of Israel '
  - type: note
    content: Ex. 1:13, 14; Ezek. 34:4
  - type: text
    content: you shall not rule, one over another ruthlessly.
  - type: heading
    content: Redeeming a Poor Man
  '47':
  - type: text
    content: '“If a stranger or sojourner with you becomes rich, and '
  - type: note
    content: ver. 25, 35, 39
  - type: text
    content: 'your brother beside him becomes poor and sells himself to the stranger or sojourner with you or to a member of the stranger’s clan, '
  '48':
  - type: text
    content: 'then after he is sold he may be redeemed. One of his brothers may redeem him, '
  '49':
  - type: text
    content: 'or his uncle or his cousin may '
  - type: note
    content: See Neh. 5:1-5
  - type: text
    content: 'redeem him, or a close relative from his clan may redeem him. Or if he '
  - type: note
    content: ver. 26, 47
  - type: text
    content: 'grows rich he may redeem himself. '
  '5':
  - type: note
    content: '[2 Kgs. 19:29]; Isa. 37:30'
  - type: text
    content: 'You shall not reap what grows of itself in your harvest, or gather the grapes of your undressed vine. It shall be a year of solemn rest for the land. '
  '50':
  - type: text
    content: 'He shall calculate with his buyer from the year when he sold himself to him until the year of jubilee, and the price of his sale shall vary with the number of years. The time he was with his owner shall be '
  - type: note
    content: Job 7:1; Isa. 16:14; 21:16
  - type: text
    content: 'rated as the time of a hired worker. '
  '51':
  - type: text
    content: 'If there are still many years left, he shall pay proportionately for his redemption some of his sale price. '
  '52':
  - type: text
    content: 'If there remain but a few years until the year of jubilee, he shall calculate and pay for his redemption in proportion to his years of service. '
  '53':
  - type: text
    content: 'He shall treat him as a worker hired year by year. '
  - type: note
    content: '[See ver. 46above]'
  - type: text
    content: 'He shall not rule ruthlessly over him in your sight. '
  '54':
  - type: text
    content: 'And if he is not redeemed by these means, then '
  - type: note
    content: ver. 41; Ex. 21:2, 3
  - type: text
    content: 'he and his children with him shall be released in the year of jubilee. '
  '55':
  - type: text
    content: 'For it is '
  - type: note
    content: ver. 42
  - type: text
    content: to me that the people of Israel are servants.
  - type: note
    content: Or slaves
  - type: text
    content: ' They are my servants whom I brought out of the land of Egypt: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: The Sabbath of the land
  - type: note
    content: That is, the Sabbath produce of the land
  - type: text
    content: ' shall provide food for you, for yourself and for your male and female slaves'
  - type: note
    content: Or servants
  - type: text
    content: ' and for your hired worker and the sojourner who lives with you, '
  '7':
  - type: text
    content: 'and for your cattle and for the wild animals that are in your land: '
  - type: note
    content: ver. 12
  - type: text
    content: all its yield shall be for food.
  - type: heading
    content: The Year of Jubilee
  '8':
  - type: text
    content: “You shall count seven weeks
  - type: note
    content: Or Sabbaths
  - type: text
    content: ' of years, seven times seven years, so that the time of the seven weeks of years shall give you forty-nine years. '
  '9':
  - type: text
    content: 'Then you shall sound '
  - type: note
    content: '[ch. 23:24; Isa. 27:13]'
  - type: text
    content: 'the loud trumpet on the tenth day of the seventh month. '
  - type: note
    content: ch. 23:24, 27
  - type: text
    content: 'On the Day of Atonement you shall sound the trumpet throughout all your land. '
