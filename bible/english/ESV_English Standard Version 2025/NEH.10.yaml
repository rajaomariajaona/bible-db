document_id: NEH.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Who Sealed the Covenant
  - type: text
    content: ' '
  - type: note
    content: Ch 10:2 in Hebrew
  - type: note
    content: ch. 9:38
  - type: text
    content: “On the seals are the names of
  - type: note
    content: Hebrew lacks the names of
  - type: text
    content: ' Nehemiah '
  - type: note
    content: See ch. 8:9
  - type: text
    content: 'the governor, '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'the son of Hacaliah, Zedekiah, '
  '10':
  - type: text
    content: 'and their brothers, Shebaniah, Hodiah, Kelita, Pelaiah, Hanan, '
  '11':
  - type: text
    content: 'Mica, Rehob, Hashabiah, '
  '12':
  - type: text
    content: 'Zaccur, Sherebiah, Shebaniah, '
  '13':
  - type: text
    content: 'Hodiah, Bani, Beninu. '
  '14':
  - type: text
    content: 'The chiefs of the people: '
  - type: note
    content: See ch. 7:8-42; Ezra 2:3-35
  - type: text
    content: 'Parosh, Pahath-moab, Elam, Zattu, Bani, '
  '15':
  - type: text
    content: 'Bunni, Azgad, Bebai, '
  '16':
  - type: text
    content: 'Adonijah, Bigvai, Adin, '
  '17':
  - type: text
    content: 'Ater, Hezekiah, Azzur, '
  '18':
  - type: text
    content: 'Hodiah, Hashum, Bezai, '
  '19':
  - type: text
    content: 'Hariph, Anathoth, Nebai, '
  '2':
  - type: note
    content: For ver. 2-27, see ch. 12:2-21
  - type: text
    content: 'Seraiah, Azariah, Jeremiah, '
  '20':
  - type: text
    content: 'Magpiash, Meshullam, Hezir, '
  '21':
  - type: text
    content: 'Meshezabel, Zadok, Jaddua, '
  '22':
  - type: text
    content: 'Pelatiah, Hanan, Anaiah, '
  '23':
  - type: text
    content: 'Hoshea, Hananiah, Hasshub, '
  '24':
  - type: text
    content: 'Hallohesh, Pilha, Shobek, '
  '25':
  - type: text
    content: 'Rehum, Hashabnah, Maaseiah, '
  '26':
  - type: text
    content: 'Ahiah, Hanan, Anan, '
  '27':
  - type: text
    content: Malluch, Harim, Baanah.
  - type: heading
    content: The Obligations of the Covenant
  '28':
  - type: text
    content: ' '
  - type: note
    content: See Ezra 2:36-54
  - type: text
    content: '“The rest of the people, the priests, the Levites, the gatekeepers, the singers, the temple servants, '
  - type: note
    content: See ch. 9:2
  - type: text
    content: 'and all who have separated themselves from the peoples of the lands to the Law of God, their wives, their sons, their daughters, all who have knowledge and understanding, '
  '29':
  - type: text
    content: 'join with their brothers, their nobles, '
  - type: note
    content: ch. 5:12, 13; Deut. 29:12, 14; [Ps. 119:106]
  - type: text
    content: 'and enter into a curse and an oath '
  - type: note
    content: '[2 Kgs. 23:3; 2 Chr. 34:31]'
  - type: text
    content: 'to walk in God’s Law that was given by Moses the servant of God, and to observe and do all the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' our Lord and his rules and his statutes. '
  '3':
  - type: text
    content: 'Pashhur, Amariah, Malchijah, '
  '30':
  - type: note
    content: Ex. 34:16; Deut. 7:3; Ezra 9:12, 14
  - type: text
    content: 'We will not give our daughters to the peoples of the land or take their daughters for our sons. '
  '31':
  - type: note
    content: Ex. 20:10; Lev. 23:3; Deut. 5:12; See ch. 13:15-22
  - type: text
    content: 'And if the peoples of the land bring in goods or any grain on the Sabbath day to sell, we will not buy from them on the Sabbath or on a holy day. And we will forgo the crops of the '
  - type: note
    content: Ex. 23:10, 11; Lev. 25:4
  - type: text
    content: 'seventh year and the '
  - type: note
    content: Deut. 15:1, 2; [ch. 5:12]
  - type: text
    content: exaction of every debt.
  '32':
  - type: text
    content: '“We also take on ourselves the obligation to give yearly '
  - type: note
    content: '[Matt. 17:24]'
  - type: text
    content: a third part of a shekel
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' for the service of the house of our God: '
  '33':
  - type: note
    content: 2 Chr. 2:4; [1 Chr. 9:32]; See Lev. 24:5-9
  - type: text
    content: 'for the showbread, '
  - type: note
    content: See Num. 28; 29
  - type: text
    content: 'the regular grain offering, '
  - type: note
    content: See Num. 28; 29
  - type: text
    content: 'the regular burnt offering, the Sabbaths, the new moons, the appointed feasts, the holy things, and the sin offerings to make atonement for Israel, and for all the work of the house of our God. '
  '34':
  - type: note
    content: '[ch. 11:1]'
  - type: text
    content: 'We, the priests, the Levites, and the people, have likewise cast lots '
  - type: note
    content: ch. 13:31; [Isa. 40:16]
  - type: text
    content: 'for the wood offering, to bring it into the house of our God, according to our fathers’ houses, at times appointed, year by year, to burn on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: Lev. 6:12
  - type: text
    content: 'as it is written in the Law. '
  '35':
  - type: text
    content: 'We obligate ourselves '
  - type: note
    content: Ex. 23:19; 34:26; Lev. 19:23, 24; Num. 18:12; Deut. 26:2
  - type: text
    content: 'to bring the firstfruits of our ground and the firstfruits of all fruit of every tree, year by year, to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  '36':
  - type: text
    content: 'also to bring to the house of our God, to the priests who minister in the house of our God, the firstborn of our sons and of our cattle, '
  - type: note
    content: Ex. 13:2, 12, 13; Lev. 27:26, 27; Num. 18:15, 16
  - type: text
    content: 'as it is written in the Law, and the firstborn of our herds and of our flocks; '
  '37':
  - type: note
    content: Lev. 23:17; Num. 15:20, 21; 18:12; Deut. 18:4
  - type: text
    content: 'and to bring the first of our dough, and our contributions, the fruit of every tree, the wine and the oil, to the priests, '
  - type: note
    content: 1 Chr. 9:26; 2 Chr. 31:11
  - type: text
    content: 'to the chambers of the house of our God; and to bring to the Levites the tithes from our ground, for it is the Levites who collect the tithes in all our towns where we labor. '
  '38':
  - type: text
    content: 'And the priest, the son of Aaron, shall be with the Levites when the Levites receive the tithes. And the Levites shall bring up the tithe of the tithes to the house of our God, to the chambers of '
  - type: note
    content: 1 Chr. 26:20
  - type: text
    content: 'the storehouse. '
  '39':
  - type: text
    content: 'For the people of Israel and the sons of Levi '
  - type: note
    content: '[ch. 13:12; Deut. 12:6, 11; 2 Chr. 31:12]'
  - type: text
    content: 'shall bring the contribution of grain, wine, and oil to the chambers, where the vessels of the sanctuary are, as well as the priests who minister, and the gatekeepers and the singers. '
  - type: note
    content: '[ch. 13:11]'
  - type: text
    content: We will not neglect the house of our God.”
  '4':
  - type: note
    content: Ezra 8:2
  - type: text
    content: 'Hattush, Shebaniah, Malluch, '
  '5':
  - type: text
    content: 'Harim, Meremoth, Obadiah, '
  '6':
  - type: text
    content: 'Daniel, Ginnethon, Baruch, '
  '7':
  - type: text
    content: 'Meshullam, Abijah, Mijamin, '
  '8':
  - type: text
    content: 'Maaziah, Bilgai, Shemaiah; these are the priests. '
  '9':
  - type: text
    content: 'And the Levites: '
  - type: note
    content: Ezra 2:40
  - type: text
    content: 'Jeshua the son of Azaniah, Binnui of the sons of '
  - type: note
    content: Ezra 3:9
  - type: text
    content: 'Henadad, Kadmiel; '
