document_id: PHP.4,59
type_code: eng
verses:
  '1':
  - type: text
    content: Therefore, my brothers,
  - type: note
    content: Or brothers and sisters; also verses 8, 21
  - type: text
    content: ' whom I love and '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'long for, '
  - type: note
    content: ch. 1:4; 2:16; See 2 Cor. 1:14
  - type: text
    content: 'my joy and '
  - type: note
    content: Prov. 16:31; 17:6
  - type: text
    content: 'crown, '
  - type: note
    content: ch. 1:27
  - type: text
    content: stand firm thus in the Lord, my beloved.
  - type: heading
    content: Exhortation, Encouragement, and Prayer
  '10':
  - type: text
    content: 'I rejoiced in the Lord greatly that now at length '
  - type: note
    content: '[2 Cor. 11:9; ch. 2:30]'
  - type: text
    content: 'you have revived your concern for me. You were indeed concerned for me, but you had no opportunity. '
  '11':
  - type: text
    content: 'Not that I am speaking of being in need, for I have learned, in whatever situation I am, to be '
  - type: note
    content: 1 Tim. 6:6, 8; [2 Cor. 9:8; Heb. 13:5]
  - type: text
    content: 'content. '
  '12':
  - type: text
    content: 'I know how to be brought low, and I know how to abound. In any and every circumstance, I have learned the secret of facing plenty and '
  - type: note
    content: 1 Cor. 4:11; 2 Cor. 11:27
  - type: text
    content: 'hunger, abundance and '
  - type: note
    content: 2 Cor. 11:9
  - type: text
    content: 'need. '
  '13':
  - type: text
    content: 'I can do all things '
  - type: note
    content: '[2 Cor. 12:9]; See Eph. 3:16; 1 Tim. 1:12'
  - type: text
    content: through him who strengthens me.
  '14':
  - type: text
    content: 'Yet it was kind of you '
  - type: note
    content: '[ch. 1:7; Rev. 1:9]'
  - type: text
    content: to share
  - type: note
    content: Or have fellowship in
  - type: text
    content: ' my trouble. '
  '15':
  - type: text
    content: 'And you Philippians yourselves know that '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'in the beginning of the gospel, when I left Macedonia, '
  - type: note
    content: 2 Cor. 11:8, 9
  - type: text
    content: 'no church entered into partnership with me in giving and receiving, except you only. '
  '16':
  - type: text
    content: 'Even in Thessalonica you sent me help for my needs once and again. '
  '17':
  - type: note
    content: '[2 Cor. 9:5]'
  - type: text
    content: 'Not that I seek the gift, but I seek '
  - type: note
    content: Rom. 1:13; [Titus 3:14]
  - type: text
    content: the fruit that increases to your credit.
  - type: note
    content: Or I seek the profit that accrues to your account
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I have received full payment, and more. I am well supplied, '
  - type: note
    content: ch. 2:25
  - type: text
    content: 'having received from Epaphroditus the gifts you sent, '
  - type: note
    content: See Gen. 8:21
  - type: text
    content: 'a fragrant offering, '
  - type: note
    content: Heb. 13:16
  - type: text
    content: 'a sacrifice acceptable and pleasing to God. '
  '19':
  - type: text
    content: 'And my God '
  - type: note
    content: Ps. 23:1; 2 Cor. 9:8
  - type: text
    content: 'will supply every need of yours '
  - type: note
    content: See Rom. 2:4
  - type: text
    content: 'according to his riches in glory in Christ Jesus. '
  '2':
  - type: text
    content: 'I entreat Euodia and I entreat Syntyche to '
  - type: note
    content: ch. 2:2
  - type: text
    content: 'agree in the Lord. '
  '20':
  - type: text
    content: 'To '
  - type: note
    content: Gal. 1:4; 1 Thess. 1:3; 3:11, 13
  - type: text
    content: 'our God and Father be '
  - type: note
    content: Gal. 1:5; See Rom. 11:36
  - type: text
    content: glory forever and ever. Amen.
  - type: heading
    content: Final Greetings
  '21':
  - type: text
    content: 'Greet every saint in Christ Jesus. '
  - type: note
    content: Gal. 1:2
  - type: text
    content: 'The brothers who are with me greet you. '
  '22':
  - type: note
    content: 2 Cor. 13:13
  - type: text
    content: All the saints greet you, especially those of Caesar’s household.
  '23':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 16:20
  - type: text
    content: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: text
    content: Yes, I ask you also, true companion,
  - type: note
    content: Or loyal Syzygus; Greek true yokefellow
  - type: text
    content: ' help these women, who have labored'
  - type: note
    content: Or strived (see 1:27)
  - type: text
    content: ' side by side with me in the gospel together with Clement and the rest of my fellow workers, '
  - type: note
    content: See Luke 10:20
  - type: text
    content: whose names are in the book of life.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'Rejoice in the Lord always; again I will say, rejoice. '
  '5':
  - type: text
    content: Let your reasonableness
  - type: note
    content: Or gentleness
  - type: text
    content: ' be known to everyone. '
  - type: note
    content: See James 5:8
  - type: text
    content: 'The Lord is at hand; '
  '6':
  - type: note
    content: See Matt. 6:25
  - type: text
    content: 'do not be anxious about anything, '
  - type: note
    content: '[Prov. 16:3]'
  - type: text
    content: 'but in everything by prayer and supplication '
  - type: note
    content: See Rom. 1:8
  - type: text
    content: 'with thanksgiving let your requests be made known to God. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 9; Isa. 26:3; Col. 3:15]; See John 14:27'
  - type: text
    content: 'the peace of God, '
  - type: note
    content: '[Eph. 3:19]'
  - type: text
    content: which surpasses all understanding, will guard your hearts and your minds in Christ Jesus.
  '8':
  - type: text
    content: 'Finally, brothers, whatever is true, whatever is honorable, whatever is just, whatever is pure, whatever is lovely, whatever is commendable, if there is any excellence, if there is anything worthy of praise, think about these things. '
  '9':
  - type: text
    content: What you have learned
  - type: note
    content: Or these things—9which things you have also learned
  - type: text
    content: ' and '
  - type: note
    content: 1 Thess. 4:1
  - type: text
    content: 'received and heard and seen '
  - type: note
    content: '[ch. 3:17]'
  - type: text
    content: 'in me—practice these things, and '
  - type: note
    content: '[ver. 7]; See Rom. 15:33'
  - type: text
    content: the God of peace will be with you.
  - type: heading
    content: God’s Provision
