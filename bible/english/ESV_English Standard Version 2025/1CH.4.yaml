document_id: 1CH.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Judah
  - type: text
    content: ' '
  - type: note
    content: '[ Gen. 46:12 ]'
  - type: text
    content: 'The sons of Judah: '
  - type: note
    content: Gen. 38:29
  - type: text
    content: 'Perez, Hezron, '
  - type: note
    content: ch. 2:7
  - type: text
    content: 'Carmi, Hur, and Shobal. '
  '10':
  - type: text
    content: Jabez called upon the God of Israel, saying, “Oh that you would bless me and enlarge my border, and that your hand might be with me, and that you would keep me from harm
  - type: note
    content: Or evil
  - type: text
    content: ' so that it might not bring me pain!” And God granted what he asked. '
  '11':
  - type: text
    content: 'Chelub, the brother of Shuhah, fathered Mehir, who fathered Eshton. '
  '12':
  - type: text
    content: 'Eshton fathered Beth-rapha, Paseah, and Tehinnah, the father of Ir-nahash. These are the men of Recah. '
  '13':
  - type: text
    content: 'The sons of '
  - type: note
    content: Josh. 15:17
  - type: text
    content: 'Kenaz: '
  - type: note
    content: Judg. 1:13; 3:9, 11
  - type: text
    content: 'Othniel and Seraiah; and the sons of Othniel: Hathath and Meonothai.'
  - type: note
    content: Septuagint, Vulgate; Hebrew lacks Meonothai
  - type: text
    content: ' '
  '14':
  - type: text
    content: Meonothai fathered Ophrah; and Seraiah fathered Joab, the father of Ge-harashim,
  - type: note
    content: Ge-harashim means valley of craftsmen
  - type: text
    content: ' so-called because they were craftsmen. '
  '15':
  - type: text
    content: 'The sons of '
  - type: note
    content: Num. 13:6
  - type: text
    content: 'Caleb the son of Jephunneh: Iru, Elah, and Naam; and the son'
  - type: note
    content: Hebrew sons
  - type: text
    content: ' of Elah: Kenaz. '
  '16':
  - type: text
    content: 'The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel. '
  '17':
  - type: text
    content: 'The sons of Ezrah: Jether, Mered, Epher, and Jalon. These are the sons of Bithiah, the daughter of Pharaoh, whom Mered married;'
  - type: note
    content: The clause These are . . . married is transposed from verse 18
  - type: text
    content: ' and she conceived and bore'
  - type: note
    content: Hebrew lacks and bore
  - type: text
    content: ' Miriam, Shammai, and Ishbah, the father of Eshtemoa. '
  '18':
  - type: text
    content: 'And his Judahite wife bore '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'Jered the father of Gedor, Heber the father of Soco, and Jekuthiel the father of Zanoah. '
  '19':
  - type: text
    content: 'The sons of the wife of Hodiah, the sister of Naham, were the fathers of Keilah the Garmite and Eshtemoa the Maacathite. '
  '2':
  - type: note
    content: '[ch. 2:52]'
  - type: text
    content: 'Reaiah the son of Shobal fathered Jahath, and Jahath fathered Ahumai and Lahad. These were the clans of the '
  - type: note
    content: ch. 2:53
  - type: text
    content: 'Zorathites. '
  '20':
  - type: text
    content: 'The sons of Shimon: Amnon, Rinnah, Ben-hanan, and Tilon. The sons of Ishi: Zoheth and Ben-zoheth. '
  '21':
  - type: text
    content: 'The sons of '
  - type: note
    content: ch. 2:3; Gen. 38:1, 5; 46:12; Num. 26:20
  - type: text
    content: 'Shelah the son of Judah: Er the father of Lecah, Laadah the father of Mareshah, and the clans of the house of linen workers at Beth-ashbea; '
  '22':
  - type: text
    content: and Jokim, and the men of Cozeba, and Joash, and Saraph, who ruled in Moab and returned to Lehem
  - type: note
    content: Vulgate (compare Septuagint); Hebrew and Jashubi-lahem
  - type: text
    content: ' (now the records'
  - type: note
    content: Or matters
  - type: text
    content: ' are ancient). '
  '23':
  - type: text
    content: These were the potters who were inhabitants of Netaim and Gederah. They lived there in the king’s service.
  - type: heading
    content: Descendants of Simeon
  '24':
  - type: text
    content: ' '
  - type: note
    content: Num. 26:12
  - type: text
    content: 'The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, Shaul; '
  '25':
  - type: text
    content: 'Shallum was his son, Mibsam his son, Mishma his son. '
  '26':
  - type: text
    content: 'The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son. '
  '27':
  - type: text
    content: 'Shimei had sixteen sons and six daughters; but his brothers did not have many children, '
  - type: note
    content: '[ver. 38]'
  - type: text
    content: 'nor did all their clan multiply '
  - type: note
    content: '[Num. 2:4, 13; 26:14, 22]'
  - type: text
    content: 'like the men of Judah. '
  '28':
  - type: note
    content: For ver. 28-33, see Josh. 19:2-8
  - type: text
    content: 'They lived in Beersheba, Moladah, Hazar-shual, '
  '29':
  - type: note
    content: '[Josh. 19:3]'
  - type: text
    content: 'Bilhah, Ezem, '
  - type: note
    content: '[Josh. 19:4]'
  - type: text
    content: 'Tolad, '
  '3':
  - type: text
    content: These were the sons
  - type: note
    content: Septuagint (compare Vulgate); Hebrew father
  - type: text
    content: ' of Etam: Jezreel, Ishma, and Idbash; and the name of their sister was Hazzelelponi, '
  '30':
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'Bethuel, Hormah, Ziklag, '
  '31':
  - type: text
    content: 'Beth-marcaboth, '
  - type: note
    content: '[Josh. 19:5, 6]'
  - type: text
    content: 'Hazar-susim, '
  - type: note
    content: '[Josh. 19:5, 6]'
  - type: text
    content: 'Beth-biri, and '
  - type: note
    content: '[Josh. 19:5, 6]'
  - type: text
    content: 'Shaaraim. These were their cities until David reigned. '
  '32':
  - type: text
    content: 'And their villages were Etam, Ain, Rimmon, Tochen, and Ashan, five cities, '
  '33':
  - type: text
    content: 'along with all their villages that were around these cities as far as '
  - type: note
    content: '[Josh. 19:8]'
  - type: text
    content: Baal. These were their settlements, and they kept a genealogical record.
  '34':
  - type: text
    content: 'Meshobab, Jamlech, Joshah the son of Amaziah, '
  '35':
  - type: text
    content: 'Joel, Jehu the son of Joshibiah, son of Seraiah, son of Asiel, '
  '36':
  - type: text
    content: 'Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  '37':
  - type: text
    content: 'Ziza the son of Shiphi, son of Allon, son of Jedaiah, son of Shimri, son of Shemaiah— '
  '38':
  - type: text
    content: 'these mentioned by name were princes in their clans, '
  - type: note
    content: '[ver. 27]'
  - type: text
    content: 'and their fathers’ houses increased greatly. '
  '39':
  - type: text
    content: 'They journeyed to the entrance of '
  - type: note
    content: ver. 4, 18
  - type: text
    content: 'Gedor, to the east side of the valley, to seek pasture for their flocks, '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'Penuel fathered '
  - type: note
    content: ver. 18, 39
  - type: text
    content: 'Gedor, and Ezer fathered Hushah. These were the sons of Hur, the firstborn of '
  - type: note
    content: '[Gen. 35:19; ch. 2:50, 51]'
  - type: text
    content: 'Ephrathah, the father of Bethlehem. '
  '40':
  - type: text
    content: 'where they found rich, good pasture, and the land was very broad, '
  - type: note
    content: '[Judg. 18:7, 27]'
  - type: text
    content: 'quiet, and peaceful, for the former inhabitants there belonged to Ham. '
  '41':
  - type: note
    content: See ver. 34-38
  - type: text
    content: 'These, registered by name, came in the days of Hezekiah, king of Judah, and destroyed their tents and the Meunites who were found there, and marked them for destruction to this day, '
  - type: note
    content: '[ch. 5:22]'
  - type: text
    content: 'and settled in their place, because there was pasture there for their flocks. '
  '42':
  - type: text
    content: 'And some of them, five hundred men of the Simeonites, went to '
  - type: note
    content: Gen. 36:8
  - type: text
    content: 'Mount Seir, having as their leaders Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi. '
  '43':
  - type: text
    content: 'And they defeated '
  - type: note
    content: '[1 Sam. 15:8; 30:17]'
  - type: text
    content: the remnant of the Amalekites who had escaped, and they have lived there to this day.
  '5':
  - type: note
    content: ch. 2:24
  - type: text
    content: 'Ashhur, the father of Tekoa, had two wives, Helah and Naarah; '
  '6':
  - type: text
    content: 'Naarah bore him Ahuzzam, Hepher, Temeni, and Haahashtari. These were the sons of Naarah. '
  '7':
  - type: text
    content: 'The sons of Helah: Zereth, Izhar, and Ethnan. '
  '8':
  - type: text
    content: 'Koz fathered Anub, Zobebah, and the clans of Aharhel, the son of Harum. '
  '9':
  - type: text
    content: 'Jabez was '
  - type: note
    content: '[Gen. 34:19]'
  - type: text
    content: more honorable than his brothers; and his mother called his name Jabez, saying, “Because I bore him in pain.”
  - type: note
    content: Jabez sounds like the Hebrew for pain
  - type: text
    content: ' '
