document_id: JHN.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The High Priestly Prayer
  - type: text
    content: 'When Jesus had spoken these words, '
  - type: note
    content: ch. 11:41
  - type: text
    content: 'he lifted up his eyes to heaven, and said, '
  - type: text
    content: '“Father, '
  - type: note
    content: '[ch. 7:30]; See ch. 12:23'
  - type: text
    content: 'the hour has come; '
  - type: note
    content: See ch. 7:39
  - type: text
    content: 'glorify your Son that the Son may '
  - type: note
    content: ver. 4
  - type: text
    content: glorify you,
  - type: text
    content: ' '
  '10':
  - type: note
    content: ch. 16:15
  - type: text
    content: 'All mine are yours, and yours are mine, and '
  - type: note
    content: 2 Thess. 1:10
  - type: text
    content: I am glorified in them.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And I am no longer in the world, but '
  - type: note
    content: ch. 13:1
  - type: text
    content: 'they are in the world, and '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'I am coming to you. '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'Holy Father, '
  - type: note
    content: ver. 12, 15; Jude 1
  - type: text
    content: 'keep them in your name, '
  - type: note
    content: '[Ex. 23:21; Phil. 2:9; Rev. 19:12]'
  - type: text
    content: 'which you have given me, '
  - type: note
    content: ver. 21, 22; [ch. 10:16; Rom. 12:5; Gal. 3:28; Eph. 1:10; 4:4]
  - type: text
    content: 'that they may be one, '
  - type: note
    content: ch. 10:30
  - type: text
    content: even as we are one.
  - type: text
    content: ' '
  '12':
  - type: note
    content: See ch. 14:25
  - type: text
    content: 'While I was with them, I kept them in your name, which you have given me. I have '
  - type: note
    content: 2 Thess. 3:3; Jude 24
  - type: text
    content: 'guarded them, and '
  - type: note
    content: ch. 18:9; [ch. 6:39; 10:28]
  - type: text
    content: 'not one of them has been lost except '
  - type: note
    content: 2 Thess. 2:3
  - type: text
    content: 'the son of destruction, '
  - type: note
    content: Ps. 109:8; Acts 1:16-20; [ch. 13:18]
  - type: text
    content: that the Scripture might be fulfilled.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But now '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'I am coming to you, and these things I speak in the world, that they may have '
  - type: note
    content: See ch. 15:11
  - type: text
    content: my joy fulfilled in themselves.
  - type: text
    content: ' '
  '14':
  - type: note
    content: ver. 3
  - type: text
    content: 'I have given them your word, and '
  - type: note
    content: See ch. 15:19
  - type: text
    content: 'the world has hated them '
  - type: note
    content: ver. 16
  - type: text
    content: 'because they are not of the world, '
  - type: note
    content: ch. 8:23
  - type: text
    content: just as I am not of the world.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'I '
  - type: note
    content: ver. 9
  - type: text
    content: 'do not ask that you '
  - type: note
    content: '[1 Cor. 5:10]'
  - type: text
    content: 'take them out of the world, but that you '
  - type: note
    content: ver. 11
  - type: text
    content: 'keep them from '
  - type: note
    content: See Matt. 13:19
  - type: text
    content: the evil one.
  - type: note
    content: Or from evil
  - type: text
    content: ' '
  '16':
  - type: note
    content: ver. 14
  - type: text
    content: They are not of the world, just as I am not of the world.
  - type: text
    content: ' '
  '17':
  - type: note
    content: '[1 Thess. 5:23; 2 Thess. 2:13; 1 Pet. 1:22]; See ch. 15:3'
  - type: text
    content: Sanctify them
  - type: note
    content: Greek Set them apart (for holy service to God)
  - type: text
    content: ' '
  - type: text
    content: 'in the truth; '
  - type: note
    content: 2 Sam. 7:28; Ps. 119:160
  - type: text
    content: your word is truth.
  - type: text
    content: ' '
  '18':
  - type: note
    content: ch. 20:21; [ch. 4:38; Matt. 10:5]
  - type: text
    content: As you sent me into the world, so I have sent them into the world.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And '
  - type: note
    content: '[Titus 2:14]'
  - type: text
    content: 'for their sake '
  - type: note
    content: ch. 10:36
  - type: text
    content: I consecrate myself,
  - type: note
    content: Or I sanctify myself; or I set myself apart (for holy service to God)
  - type: text
    content: ' '
  - type: text
    content: 'that they also '
  - type: note
    content: '[1 Cor. 1:2, 30; 6:11; Heb. 2:11; 10:10]'
  - type: text
    content: may be sanctified
  - type: note
    content: Greek may be set apart (for holy service to God)
  - type: text
    content: ' '
  - type: text
    content: in truth.
  '2':
  - type: text
    content: 'since '
  - type: note
    content: See Matt. 28:18; Rev. 2:26, 27
  - type: text
    content: 'you have given him authority over all flesh, '
  - type: note
    content: ch. 10:28; 1 John 2:25
  - type: text
    content: 'to give eternal life to all '
  - type: note
    content: ver. 6, 9, 24; ch. 6:37, 39; 10:29; 18:9; Heb. 2:13
  - type: text
    content: whom you have given him.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: '“I do not '
  - type: note
    content: ver. 9
  - type: text
    content: 'ask for these only, but also for those '
  - type: note
    content: '[ch. 4:39; Rom. 10:14; 1 Cor. 3:5 ]'
  - type: text
    content: who will believe in me through their word,
  - type: text
    content: ' '
  '21':
  - type: note
    content: See ver. 11; [1 Cor. 6:17]
  - type: text
    content: 'that they may all be one, just as you, Father, are in me, and I in you, that '
  - type: note
    content: 1 John 1:3; 3:24; 5:20
  - type: text
    content: 'they also may be in '
  - type: note
    content: ch. 14:23
  - type: text
    content: 'us, so that the world '
  - type: note
    content: See ver. 8
  - type: text
    content: may believe that you have sent me.
  - type: text
    content: ' '
  '22':
  - type: note
    content: ver. 24; [ch. 1:14; Luke 9:26]
  - type: text
    content: 'The glory that you have given me '
  - type: note
    content: Rom. 8:30
  - type: text
    content: 'I have given to them, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: that they may be one even as we are one,
  - type: text
    content: ' '
  '23':
  - type: note
    content: ver. 26; ch. 14:20; Rom. 8:10; 2 Cor. 13:5
  - type: text
    content: 'I in them and you in me, '
  - type: note
    content: 1 John 2:5; [Col. 3:14; 1 John 4:12, 17]
  - type: text
    content: 'that they may become perfectly one, '
  - type: note
    content: ver. 21; ch. 14:31
  - type: text
    content: 'so that the world may know that you sent me and '
  - type: note
    content: ch. 16:27
  - type: text
    content: 'loved them even as '
  - type: note
    content: ver. 24, 26; See ch. 5:20
  - type: text
    content: you loved me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Father, I desire that they also, whom you have given me, may be '
  - type: note
    content: 2 Tim. 2:11, 12
  - type: text
    content: 'with me '
  - type: note
    content: See ch. 12:26
  - type: text
    content: 'where I am, '
  - type: note
    content: ch. 1:14; 2 Cor. 3:18; [1 John 3:2]
  - type: text
    content: 'to see my glory that you have given me because you loved me '
  - type: note
    content: Eph. 1:4; 1 Pet. 1:20; See ver. 5
  - type: text
    content: before the foundation of the world.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Jer. 12:1; [ver. 11; Rev. 16:5]; See 1 John 1:9
  - type: text
    content: 'O righteous Father, even though '
  - type: note
    content: See ch. 8:55; 10:15
  - type: text
    content: the world does not know you, I know you, and these know that you have sent me.
  - type: text
    content: ' '
  '26':
  - type: note
    content: ver. 6; ch. 15:15
  - type: text
    content: 'I made known to them your name, and I will continue to make it known, that the love '
  - type: note
    content: ver. 23; ch. 15:9
  - type: text
    content: 'with which you have loved me may be in them, and '
  - type: note
    content: See ver. 23
  - type: text
    content: I in them.”
  '3':
  - type: note
    content: '[1 John 5:20]'
  - type: text
    content: 'And this is eternal life, '
  - type: note
    content: Hos. 2:20; 6:3; 2 Pet. 1:2, 3
  - type: text
    content: 'that they know you, '
  - type: note
    content: ch. 5:44
  - type: text
    content: 'the only '
  - type: note
    content: 1 Thess. 1:9; 1 John 5:20; [Jer. 10:10]
  - type: text
    content: 'true God, and '
  - type: note
    content: See ch. 3:17
  - type: text
    content: Jesus Christ whom you have sent.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'I '
  - type: note
    content: ver. 1; See ch. 13:31
  - type: text
    content: 'glorified you on earth, '
  - type: note
    content: '[ch. 19:30; Luke 22:37]'
  - type: text
    content: having accomplished the work that you gave me to do.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And now, Father, '
  - type: note
    content: ch. 13:32
  - type: text
    content: 'glorify me in your own presence with the glory '
  - type: note
    content: ch. 1:1, 2; [Rev. 3:21]
  - type: text
    content: 'that I had with you '
  - type: note
    content: ver. 24; Prov. 8:23; See ch. 8:58
  - type: text
    content: before the world existed.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 26 ; Ps. 22:22
  - type: text
    content: '“I have manifested your name to the people '
  - type: note
    content: See ver. 2
  - type: text
    content: 'whom you gave me out of the world. '
  - type: note
    content: ver. 9
  - type: text
    content: Yours they were, and you gave them to me, and they have kept your word.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Now they know that everything '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: that you have given me is from you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For I have given them '
  - type: note
    content: ver. 14; ch. 15:15; [ch. 8:26; 12:49]
  - type: text
    content: 'the words that you gave me, and they have received them and have come to know in truth that '
  - type: note
    content: ch. 8:42; 16:27
  - type: text
    content: 'I came from you; and '
  - type: note
    content: ver. 21, 25; ch. 11:42; 16:30
  - type: text
    content: they have believed that you sent me.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I am praying for them. '
  - type: note
    content: '[ver. 20, 21]'
  - type: text
    content: 'I am not praying for the world but for those '
  - type: note
    content: See ver. 2
  - type: text
    content: 'whom you have given me, for '
  - type: note
    content: ver. 6
  - type: text
    content: they are yours.
  - type: text
    content: ' '
