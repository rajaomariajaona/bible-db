document_id: ACT.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Before Felix at Caesarea
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 21:18, 27, with ver. 11]'
  - type: text
    content: 'after five days the high priest '
  - type: note
    content: ch. 23:2
  - type: text
    content: 'Ananias came down with some elders and a spokesman, one Tertullus. They laid before '
  - type: note
    content: ch. 23:24
  - type: text
    content: 'the governor their case against Paul. '
  '10':
  - type: text
    content: 'And when the governor had nodded to him to speak, Paul replied:'
  - type: text
    content: '“Knowing that for many years you have been a judge over this nation, I cheerfully make my defense. '
  '11':
  - type: text
    content: 'You can verify that '
  - type: note
    content: See ver. 1
  - type: text
    content: 'it is not more than twelve days since I '
  - type: note
    content: ch. 8:27; John 12:20
  - type: text
    content: 'went up '
  - type: note
    content: ch. 20:16
  - type: text
    content: 'to worship in Jerusalem, '
  '12':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 25:8]'
  - type: text
    content: 'they did not find me disputing with anyone or stirring up a crowd, either in the temple or in the synagogues or in the city. '
  '13':
  - type: note
    content: ch. 25:7
  - type: text
    content: 'Neither can they prove to you what they now bring up against me. '
  '14':
  - type: text
    content: 'But this I confess to you, that according to '
  - type: note
    content: ver. 22; See ch. 9:2
  - type: text
    content: 'the Way, which they call '
  - type: note
    content: ver. 5
  - type: text
    content: 'a sect, '
  - type: note
    content: 2 Tim. 1:3; [ch. 27:23; Luke 1:74; Rom. 1:9; Heb. 9:14; 12:28]
  - type: text
    content: 'I worship '
  - type: note
    content: See ch. 3:13; 22:3
  - type: text
    content: 'the God of our fathers, believing everything '
  - type: note
    content: ch. 26:22; 28:23; [Rom. 3:21]
  - type: text
    content: 'laid down by the Law and written in the Prophets, '
  '15':
  - type: note
    content: See ch. 23:6
  - type: text
    content: 'having '
  - type: note
    content: Titus 2:13; [Gal. 5:5]
  - type: text
    content: 'a hope in God, which these men themselves accept, that there will be '
  - type: note
    content: Luke 14:14
  - type: text
    content: 'a resurrection '
  - type: note
    content: See Dan. 12:2
  - type: text
    content: 'of both the just and the unjust. '
  '16':
  - type: text
    content: 'So I always '
  - type: note
    content: '[1 Tim. 4:7, 15]'
  - type: text
    content: 'take pains to have a '
  - type: note
    content: 1 Cor. 10:32; Phil. 1:10; [Jude 24]; See ch. 23:1
  - type: text
    content: 'clear conscience toward both God and man. '
  '17':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 20:31]'
  - type: text
    content: 'after several years '
  - type: note
    content: Rom. 15:25-28, 31; 1 Cor. 16:1-3; 2 Cor. 8:1-4; 9:1, 2, 12; [Gal. 2:10]
  - type: text
    content: 'I came to bring alms to '
  - type: note
    content: ch. 26:4; 28:19
  - type: text
    content: 'my nation and to present '
  - type: note
    content: '[ver. 11; ch. 20:16]'
  - type: text
    content: 'offerings. '
  '18':
  - type: text
    content: 'While I was doing this, they found me '
  - type: note
    content: ch. 21:26; 26:21
  - type: text
    content: 'purified in the temple, without any crowd or tumult. But '
  - type: note
    content: ch. 21:27
  - type: text
    content: 'some Jews from Asia— '
  '19':
  - type: note
    content: See ch. 23:30
  - type: text
    content: 'they ought to be here before you and to make an accusation, should they have anything against me. '
  '2':
  - type: text
    content: 'And when he had been summoned, Tertullus began to accuse him, saying:'
  - type: text
    content: '“Since through you we enjoy much peace, and since by your foresight, '
  - type: note
    content: ch. 23:26; Luke 1:3
  - type: text
    content: 'most excellent Felix, reforms are being made for this nation, '
  '20':
  - type: text
    content: 'Or else let these men themselves say what wrongdoing they found when I stood before the council, '
  '21':
  - type: text
    content: 'other than this one thing '
  - type: note
    content: See ch. 23:6
  - type: text
    content: 'that I cried out while standing among them: ‘It is with respect to the resurrection of the dead that I am on trial before you this day.’”'
  - type: heading
    content: Paul Kept in Custody
  '22':
  - type: text
    content: 'But Felix, having a rather accurate knowledge of '
  - type: note
    content: ver. 14; See ch. 9:2
  - type: text
    content: 'the Way, put them off, saying, “When Lysias the tribune comes down, I will decide your case.” '
  '23':
  - type: text
    content: 'Then he gave orders to the centurion that he '
  - type: note
    content: '[ch. 28:16]'
  - type: text
    content: 'should be kept in custody but have some liberty, and that '
  - type: note
    content: '[ch. 27:3]'
  - type: text
    content: none of his friends should be prevented from attending to his needs.
  '24':
  - type: text
    content: 'After some days Felix came with his wife Drusilla, who was Jewish, and he sent for Paul and heard him speak about '
  - type: note
    content: See ch. 20:21
  - type: text
    content: 'faith '
  - type: note
    content: Gal. 2:16; [Rom. 3:24]
  - type: text
    content: 'in Christ Jesus. '
  '25':
  - type: text
    content: 'And as he reasoned '
  - type: note
    content: '[Titus 2:12, 13]'
  - type: text
    content: 'about righteousness and self-control and the coming judgment, Felix was alarmed and said, “Go away for the present. '
  - type: note
    content: ch. 17:32; [2 Tim. 4:2]
  - type: text
    content: 'When I get an opportunity I will summon you.” '
  '26':
  - type: text
    content: 'At the same time he hoped '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'that money would be given him by Paul. So he sent for him often and conversed with him. '
  '27':
  - type: text
    content: 'When two years had elapsed, Felix was succeeded by Porcius '
  - type: note
    content: ch. 25:1; 26:24
  - type: text
    content: 'Festus. And '
  - type: note
    content: ch. 25:9; [ch. 12:3; Mark 15:15]
  - type: text
    content: 'desiring to do the Jews a favor, '
  - type: note
    content: ch. 25:14; See Luke 21:12
  - type: text
    content: Felix left Paul in prison.
  '3':
  - type: text
    content: 'in every way and everywhere we accept this with all gratitude. '
  '4':
  - type: text
    content: But, to detain
  - type: note
    content: Or weary
  - type: text
    content: ' you no further, I beg you in your kindness to hear us briefly. '
  '5':
  - type: text
    content: 'For we have found this man a plague, '
  - type: note
    content: See Luke 23:2
  - type: text
    content: 'one who stirs up riots among all the Jews throughout the world and is a ringleader of '
  - type: note
    content: ver. 14; ch. 5:17; 15:5; 26:5; 28:22
  - type: text
    content: 'the sect of the Nazarenes. '
  '6':
  - type: note
    content: ch. 21:27-29
  - type: text
    content: He even tried to profane the temple, but we seized him.
  - type: note
    content: Some manuscripts add and we would have judged him according to our law. 7But the chief captain Lysias came and with great violence took him out of our hands, 8commanding his accusers to come before you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: By examining him yourself you will be able to find out from him about everything of which we accuse him.”
  '9':
  - type: text
    content: The Jews also joined in the charge, affirming that all these things were so.
