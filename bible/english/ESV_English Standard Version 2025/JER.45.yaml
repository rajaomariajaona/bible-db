document_id: JER.45,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Message to Baruch
  - type: text
    content: 'The word that Jeremiah the prophet spoke to '
  - type: note
    content: See ch. 32:12
  - type: text
    content: 'Baruch the son of Neriah, '
  - type: note
    content: See ch. 36:4, 18
  - type: text
    content: 'when he wrote these words in a book at the dictation of Jeremiah, '
  - type: note
    content: ch. 36:1
  - type: text
    content: 'in the fourth year of Jehoiakim the son of Josiah, king of Judah: '
  '2':
  - type: text
    content: '“Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to you, O Baruch: '
  '3':
  - type: text
    content: 'You said, '
  - type: note
    content: '[ch. 36:26]'
  - type: text
    content: '‘Woe is me! For the '
  - type: text
    content: Lord
  - type: text
    content: ' has added sorrow to my pain. '
  - type: note
    content: Ps. 6:6
  - type: text
    content: 'I am weary with my groaning, '
  - type: note
    content: Lam. 1:3; 5:5
  - type: text
    content: 'and I find no rest.’ '
  '4':
  - type: text
    content: 'Thus shall you say to him, Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 31:28; [Isa. 5:5]
  - type: text
    content: 'Behold, what I have built I am breaking down, and what I have planted I am plucking up—that is, the whole land. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: '[Ps. 131:1, 2; Rom. 12:16]'
  - type: text
    content: 'do you seek great things for yourself? Seek them not, for behold, '
  - type: note
    content: '[ch. 25:26, 29]'
  - type: text
    content: 'I am bringing disaster upon all flesh, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. But I will give you '
  - type: note
    content: ch. 21:9; 39:18
  - type: text
    content: your life as a prize of war in all places to which you may go.”
