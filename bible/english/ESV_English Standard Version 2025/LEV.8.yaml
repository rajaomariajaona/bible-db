document_id: LEV.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Consecration of Aaron and His Sons
  - type: text
    content: ' '
  - type: note
    content: See Ex. 29
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 30:26-29
  - type: text
    content: 'Then Moses took the anointing oil and anointed the tabernacle and all that was in it, and consecrated them. '
  '11':
  - type: text
    content: 'And he sprinkled some of it on the altar seven times, and anointed the altar and all its utensils and the basin and its stand, to consecrate them. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ch. 21:10, 12; Ex. 30:30; Ps. 133:2
  - type: text
    content: 'he poured some of the anointing oil on Aaron’s head and anointed him to consecrate him. '
  '13':
  - type: text
    content: 'And Moses brought Aaron’s sons and clothed them with coats and tied sashes around their waists and bound caps on them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '14':
  - type: text
    content: 'Then he brought '
  - type: note
    content: Ezek. 43:19
  - type: text
    content: 'the bull of the sin offering, and Aaron and his sons '
  - type: note
    content: ch. 4:4
  - type: text
    content: 'laid their hands on the head of the bull of the sin offering. '
  '15':
  - type: text
    content: And he
  - type: note
    content: Probably Aaron or his representative; possibly Moses; also verses 16–23
  - type: text
    content: ' killed it, and '
  - type: note
    content: ch. 4:7; Ezek. 43:20, 26; [Heb. 9:22]
  - type: text
    content: 'Moses took the blood, and with his finger put it on the horns of the altar around it and purified the altar and poured out the blood at the base of the altar and consecrated it to make atonement for it. '
  '16':
  - type: note
    content: ch. 3:4; 4:8
  - type: text
    content: 'And he took all the fat that was on the entrails and the long lobe of the liver and the two kidneys with their fat, and Moses burned them on the altar. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: ch. 4:11, 12
  - type: text
    content: 'the bull and its skin and its flesh and its dung he burned up with fire outside the camp, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 2
  - type: text
    content: 'Then he presented the ram of the burnt offering, and Aaron and his sons laid their hands on the head of the ram. '
  '19':
  - type: text
    content: 'And he killed it, and Moses threw the blood against the sides of the altar. '
  '2':
  - type: text
    content: '“Take Aaron and his sons with him, and '
  - type: note
    content: See Ex. 28:2-4
  - type: text
    content: 'the garments and '
  - type: note
    content: See Ex. 30:23-25
  - type: text
    content: 'the anointing oil and the bull of the sin offering and the two rams and the basket of unleavened bread. '
  '20':
  - type: text
    content: 'He cut the ram into pieces, and Moses burned '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'the head and the pieces and the fat. '
  '21':
  - type: text
    content: 'He washed the entrails and the legs with water, and Moses burned the whole ram on the altar. It was a burnt offering with a pleasing aroma, a food offering for the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 2
  - type: text
    content: 'he presented the other ram, the ram of ordination, and Aaron and his sons laid their hands on the head of the ram. '
  '23':
  - type: text
    content: 'And he killed it, and Moses took some of its blood and '
  - type: note
    content: See ch. 14:14-17
  - type: text
    content: 'put it on the lobe of Aaron’s right ear and on the thumb of his right hand and on the big toe of his right foot. '
  '24':
  - type: text
    content: 'Then he presented Aaron’s sons, and Moses put some of the blood on the lobes of their right ears and on the thumbs of their right hands and on the big toes of their right feet. And Moses threw the blood against the sides of the altar. '
  '25':
  - type: text
    content: 'Then he took the fat and the fat tail and all the fat that was on the entrails and the long lobe of the liver and the two kidneys with their fat and the right thigh, '
  '26':
  - type: text
    content: 'and out of the basket of unleavened bread that was before the '
  - type: text
    content: Lord
  - type: text
    content: ' he took one unleavened loaf and one loaf of bread with oil and one wafer and placed them on the pieces of fat and on the right thigh. '
  '27':
  - type: text
    content: 'And he put all these in the hands of Aaron and in the hands of his sons and waved them as a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Then Moses took them from their hands and burned them on the altar with the burnt offering. This was an ordination offering with a pleasing aroma, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'And Moses took the breast and waved it for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. It was Moses’ portion of the ram of ordination, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'And assemble all the congregation at the entrance of the tent of meeting.” '
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 30:30; Num. 3:3
  - type: text
    content: Moses took some of the anointing oil and of the blood that was on the altar and sprinkled it on Aaron and his garments, and also on his sons and his sons’ garments. So he consecrated Aaron and his garments, and his sons and his sons’ garments with him.
  '31':
  - type: text
    content: 'And Moses said to Aaron and his sons, “Boil the flesh at the entrance of the tent of meeting, and there eat it and the bread that is in the basket of ordination offerings, as I commanded, saying, ‘Aaron and his sons shall eat it.’ '
  '32':
  - type: text
    content: 'And what remains of the flesh and the bread you shall burn up with fire. '
  '33':
  - type: text
    content: 'And you shall not go outside the entrance of the tent of meeting for seven days, until the days of your ordination are completed, for it '
  - type: note
    content: Ezek. 43:25, 26
  - type: text
    content: 'will take seven days to ordain you. '
  '34':
  - type: text
    content: 'As has been done today, the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded to be done to make atonement for you. '
  '35':
  - type: text
    content: 'At the entrance of the tent of meeting you shall remain day and night for seven days, performing what the '
  - type: text
    content: Lord
  - type: text
    content: ' has '
  - type: note
    content: Num. 3:7; 9:19; Deut. 11:1; 1 Kgs. 2:3; Zech. 3:7
  - type: text
    content: 'charged, so that you do not die, for so I have been commanded.” '
  '36':
  - type: text
    content: 'And Aaron and his sons did all the things that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded by Moses.'
  '4':
  - type: text
    content: 'And Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, and the congregation was assembled at the entrance of the tent of meeting.'
  '5':
  - type: text
    content: 'And Moses said to the congregation, '
  - type: note
    content: Ex. 29:4
  - type: text
    content: '“This is the thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded to be done.” '
  '6':
  - type: text
    content: 'And Moses brought Aaron and his sons and washed them with water. '
  '7':
  - type: text
    content: 'And he put '
  - type: note
    content: Ex. 28:4
  - type: text
    content: the coat on him and tied the sash around his waist and clothed him with the robe and put the ephod on him and tied the skillfully woven band of the ephod around him, binding it to him with the band.
  - type: note
    content: Hebrew with it
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And he placed the breastpiece on him, and '
  - type: note
    content: See Ex. 28:30
  - type: text
    content: 'in the breastpiece he put the Urim and the Thummim. '
  '9':
  - type: text
    content: 'And he set '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the turban on his head, and '
  - type: note
    content: ch. 21:12; Ex. 28:36, 37
  - type: text
    content: 'on the turban, in front, he set the golden plate, the holy crown, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
