document_id: ZEC.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Day of the Lord
  - type: text
    content: 'Behold, '
  - type: note
    content: See Joel 1:15
  - type: text
    content: 'a day is coming for the '
  - type: text
    content: Lord
  - type: text
    content: ', when the spoil taken from you will be divided in your midst. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 4; Isa. 40:4 ]'
  - type: text
    content: 'The whole land shall be turned into a plain from '
  - type: note
    content: Josh. 18:24
  - type: text
    content: 'Geba to '
  - type: note
    content: Josh. 15:32
  - type: text
    content: 'Rimmon south of Jerusalem. But '
  - type: note
    content: Isa. 2:2
  - type: text
    content: 'Jerusalem shall remain aloft '
  - type: note
    content: ch. 12:6; [ch. 2:4]
  - type: text
    content: 'on its site from '
  - type: note
    content: See Jer. 37:13
  - type: text
    content: 'the Gate of Benjamin to the place of the former gate, to '
  - type: note
    content: Jer. 31:38
  - type: text
    content: 'the Corner Gate, and from '
  - type: note
    content: Neh. 3:1; Jer. 31:38
  - type: text
    content: 'the Tower of Hananel to the king’s winepresses. '
  '11':
  - type: text
    content: 'And it shall be inhabited, for '
  - type: note
    content: Rev. 22:3
  - type: text
    content: there shall never again be a decree of utter destruction.
  - type: note
    content: The Hebrew term rendered decree of utter destruction refers to things devoted (or set apart) to the Lord (or by the Lord) for destruction
  - type: text
    content: ' '
  - type: note
    content: '[Jer. 23:6]'
  - type: text
    content: Jerusalem shall dwell in security.
  '12':
  - type: text
    content: 'And this shall be '
  - type: note
    content: '[ver. 15, 18]'
  - type: text
    content: 'the plague with which the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike all the peoples that wage war against Jerusalem: their flesh will rot while they are still standing on their feet, their eyes will rot in their sockets, and their tongues will rot in their mouths.'
  '13':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'on that day a great panic from the '
  - type: text
    content: Lord
  - type: text
    content: ' shall fall on them, so that '
  - type: note
    content: Hag. 2:22; [1 Sam. 14:20]
  - type: text
    content: 'each will seize the hand of another, and the hand of the one will be raised against the hand of the other. '
  '14':
  - type: text
    content: 'Even '
  - type: note
    content: '[ch. 12:2]'
  - type: text
    content: Judah will fight at Jerusalem.
  - type: note
    content: Or against Jerusalem
  - type: text
    content: ' And '
  - type: note
    content: '[Ezek. 39:10]'
  - type: text
    content: 'the wealth of all the surrounding nations shall be collected, gold, silver, and garments in great abundance. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: a plague like this plague shall fall on the horses, the mules, the camels, the donkeys, and whatever beasts may be in those camps.
  '16':
  - type: text
    content: 'Then everyone who survives of all the nations that have come against Jerusalem '
  - type: note
    content: See ch. 8:21
  - type: text
    content: 'shall go up year after year to worship '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: 'the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and '
  - type: note
    content: '[Nah. 1:15]; See Lev. 23:34'
  - type: text
    content: 'to keep '
  - type: note
    content: See Lev. 23:39-43
  - type: text
    content: 'the Feast of Booths. '
  '17':
  - type: text
    content: 'And if '
  - type: note
    content: Isa. 60:12
  - type: text
    content: 'any of the families of the earth do not go up to Jerusalem to worship '
  - type: note
    content: '[See ver. 16above]'
  - type: text
    content: 'the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: See 1 Kgs. 17:1
  - type: text
    content: 'there will be no rain on them. '
  '18':
  - type: text
    content: And if the family of Egypt does not go up and present themselves, then on them there shall be no rain;
  - type: note
    content: Hebrew lacks rain
  - type: text
    content: ' there shall be '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'the plague with which the '
  - type: text
    content: Lord
  - type: text
    content: ' afflicts the nations that do not go up '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'to keep the Feast of Booths. '
  '19':
  - type: text
    content: 'This shall be the punishment to Egypt and the punishment to all the nations that do not go up '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: to keep the Feast of Booths.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: Joel 3:2
  - type: text
    content: 'I will gather all the nations against Jerusalem to battle, and '
  - type: note
    content: '[Luke 21:24]'
  - type: text
    content: 'the city shall be taken '
  - type: note
    content: Isa. 13:16
  - type: text
    content: 'and the houses plundered '
  - type: note
    content: Lam. 5:11
  - type: text
    content: 'and the women raped. '
  - type: note
    content: ch. 13:8; [Matt. 24:40, 41]
  - type: text
    content: 'Half of the city shall go out into exile, but the rest of the people shall not be cut off from the city. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 12:3
  - type: text
    content: 'on that day there shall be inscribed on the bells of the horses, '
  - type: note
    content: Ex. 28:36; Isa. 23:18; Mic. 4:13
  - type: text
    content: '“Holy to the '
  - type: text
    content: Lord
  - type: text
    content: '.” And the pots in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be as the bowls before the altar. '
  '21':
  - type: text
    content: 'And every pot in Jerusalem and Judah shall be '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, so that all who sacrifice may come and take of them and boil the meat of the sacrifice in them. And '
  - type: note
    content: Ezek. 44:9; See Joel 3:17
  - type: text
    content: 'there shall no longer be '
  - type: note
    content: '[Deut. 7:1, 2]'
  - type: text
    content: a trader
  - type: note
    content: Or Canaanite
  - type: text
    content: ' in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: on that day.
  '3':
  - type: note
    content: '[ch. 12:9]'
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will go out and fight against those nations as when he fights on a day of battle. '
  '4':
  - type: note
    content: '[ver. 1]; See ch. 12:3'
  - type: text
    content: 'On that day his feet shall stand '
  - type: note
    content: '[Ezek. 11:23]'
  - type: text
    content: 'on '
  - type: note
    content: 2 Sam. 15:30
  - type: text
    content: 'the Mount of Olives that lies before Jerusalem on the east, and '
  - type: note
    content: 2 Sam. 15:30
  - type: text
    content: 'the Mount of Olives shall be split in two from east to west by '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'a very wide valley, so that one half of the Mount shall move northward, and the other half southward. '
  '5':
  - type: text
    content: 'And you shall flee to the valley of my mountains, for the valley of the mountains shall reach to Azal. And you shall flee as you fled from '
  - type: note
    content: Amos 1:1
  - type: text
    content: 'the earthquake in the days of Uzziah king of Judah. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' my God will come, and all the holy ones with him.'
  - type: note
    content: Other Hebrew manuscripts you
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'On that day '
  - type: note
    content: '[Isa. 60:19; Rev. 21:23]'
  - type: text
    content: 'there shall be '
  - type: note
    content: '[Isa. 60:19; Rev. 21:23]'
  - type: text
    content: no light, cold, or frost.
  - type: note
    content: Compare Septuagint, Syriac, Vulgate, Targum; the meaning of the Hebrew is uncertain
  - type: text
    content: ' '
  '7':
  - type: note
    content: Rev. 21:25
  - type: text
    content: And there shall be a unique
  - type: note
    content: Hebrew one
  - type: text
    content: ' day, '
  - type: note
    content: Matt. 24:36
  - type: text
    content: 'which is known to the '
  - type: text
    content: Lord
  - type: text
    content: ', neither day nor night, but '
  - type: note
    content: '[Isa. 30:26]'
  - type: text
    content: at evening time there shall be light.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'On that day '
  - type: note
    content: John 4:10; Rev. 22:1; [Isa. 33:21; Ezek. 47:1; Joel 3:18]
  - type: text
    content: 'living waters shall flow out from Jerusalem, half of them to '
  - type: note
    content: Joel 2:20
  - type: text
    content: the eastern sea
  - type: note
    content: That is, the Dead Sea
  - type: text
    content: ' and half of them to '
  - type: note
    content: Joel 2:20
  - type: text
    content: the western sea.
  - type: note
    content: That is, the Mediterranean Sea
  - type: text
    content: ' '
  - type: note
    content: '[Isa. 33:16]'
  - type: text
    content: It shall continue in summer as in winter.
  '9':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 47:7; [ver. 16, 17; Mal. 1:14]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will be king over all the earth. '
  - type: note
    content: '[ver. 1]; See ch. 12:3'
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will be '
  - type: note
    content: Eph. 4:5, 6
  - type: text
    content: 'one and '
  - type: note
    content: '[ch. 13:2]'
  - type: text
    content: his name one.
