    content: ' '
  - type: note
    content: 2 Kgs. 3:4
  - type: text
    content: Send the lamb to the ruler of the land,
  - type: text
    content: 'from '
  - type: note
    content: ch. 42:11; 2 Kgs. 14:7
  - type: text
    content: Sela, by way of the desert,
  - type: text
    content: to the mount of the daughter of Zion.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jer. 48:33
  - type: text
    content: 'And joy and gladness are taken away from '
  - type: note
    content: '[ch. 9:3]'
  - type: text
    content: the fruitful field,
  - type: text
    content: 'and in the vineyards no '
  - type: note
    content: '[Judg. 9:27]'
  - type: text
    content: songs are sung,
  - type: text
    content: no cheers are raised;
  - type: text
    content: 'no '
  - type: note
    content: ch. 63:3; Jer. 25:30
  - type: text
    content: 'treader treads out wine '
  - type: note
    content: ch. 5:2
  - type: text
    content: in the presses;
  - type: text
    content: I have put an end to the shouting.
  '11':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 15:5; Jer. 48:36
  - type: text
    content: my inner parts moan like a lyre for Moab,
  - type: text
    content: and my inmost self for Kir-hareseth.
  '12':
  - type: text
    content: 'And when Moab presents himself, when '
  - type: note
    content: '[1 Kgs. 18:29]'
  - type: text
    content: 'he wearies himself on '
  - type: note
    content: ch. 15:2; [Num. 22:41; 23:14, 28]
  - type: text
    content: the high place, when he comes to his sanctuary to pray, he will not prevail.
  '13':
  - type: text
    content: 'This is the word that the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning Moab '
  - type: note
    content: See Amos 2:1-3
  - type: text
    content: 'in the past. '
  '14':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken, saying, “In three years, '
  - type: note
    content: ch. 21:16
  - type: text
    content: 'like the years of a hired worker, the glory of Moab will be brought into contempt, in spite of all his great multitude, and those who remain will be '
  - type: note
    content: '[ch. 10:22]'
  - type: text
    content: very few and feeble.”
  '2':
  - type: text
    content: Like fleeing birds,
  - type: text
    content: like a scattered nest,
  - type: text
    content: so are the daughters of Moab
  - type: text
    content: 'at '
  - type: note
    content: Judg. 11:18
  - type: text
    content: the fords of the Arnon.
  '3':
  - type: text
    content: “Give counsel;
  - type: text
    content: grant justice;
  - type: note
    content: '[ 1 Kgs. 18:4 ]'
  - type: text
    content: make your shade like night
  - type: text
    content: at the height of noon;
  - type: text
    content: shelter the outcasts;
  - type: text
    content: do not reveal the fugitive;
  '4':
  - type: text
    content: 'let '
  - type: note
    content: 1 Sam. 22:3
  - type: text
    content: the outcasts of Moab
  - type: text
    content: sojourn among you;
  - type: text
    content: be a shelter to them
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Syriac; Masoretic Text let my outcasts sojourn among you; as for Moab, be a shelter to them
  - type: text
    content: from the destroyer.
  - type: text
    content: When the oppressor is no more,
  - type: text
    content: and destruction has ceased,
  - type: text
    content: and he who tramples underfoot has vanished from the land,
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 32:1, 2; Dan. 7:14, 27; Mic. 4:7; Luke 1:33
  - type: text
    content: then a throne will be established in steadfast love,
  - type: text
    content: and on it will sit in faithfulness
  - type: text
    content: in the tent of David
  - type: text
    content: one who judges and seeks justice
  - type: text
    content: and is swift to do righteousness.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jer. 48:29; Zeph. 2:10
  - type: text
    content: We have heard of the pride of Moab—
  - type: text
    content: how proud he is!—
  - type: note
    content: Judg. 3:14; 2 Kgs. 13:20; [ 2 Chr. 20:1 ]
  - type: text
    content: of his arrogance, his pride, and his insolence;
  - type: text
    content: in his idle boasting he is not right.
  '7':
  - type: text
    content: Therefore let Moab wail for Moab,
  - type: note
    content: ch. 15:3
  - type: text
    content: let everyone wail.
  - type: text
    content: Mourn, utterly stricken,
  - type: text
    content: 'for the '
  - type: note
    content: 2 Sam. 6:19; [ver. 9]
  - type: text
    content: 'raisin cakes of '
  - type: note
    content: 2 Kgs. 3:25; [ch. 15:1]
  - type: text
    content: Kir-hareseth.
  '8':
  - type: text
    content: For the fields of Heshbon languish,
  - type: text
    content: 'and '
  - type: note
    content: Jer. 48:32
  - type: text
    content: the vine of Sibmah;
  - type: text
    content: the lords of the nations
  - type: text
    content: have struck down its branches,
  - type: text
    content: which reached to Jazer
  - type: text
    content: and strayed to the desert;
  - type: text
    content: its shoots spread abroad
  - type: text
    content: and passed over the sea.
  '9':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[ch. 15:5]'
  - type: text
    content: 'I weep with '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: the weeping of Jazer
  - type: text
    content: for the vine of Sibmah;
  - type: text
    content: I drench you with my tears,
  - type: text
    content: O Heshbon and Elealeh;
  - type: text
    content: 'for over '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: your summer fruit and your harvest
  - type: text
    content: the shout has ceased.
