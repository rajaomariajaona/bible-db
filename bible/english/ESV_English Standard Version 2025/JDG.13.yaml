document_id: JDG.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samson
  - type: text
    content: 'And the people of Israel again '
  - type: note
    content: See ch. 2:11
  - type: text
    content: 'did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', so the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them '
  - type: note
    content: '[ch. 3:31; 10:7; 1 Sam. 12:9]'
  - type: text
    content: into the hand of the Philistines for forty years.
  '10':
  - type: text
    content: 'So the woman ran quickly and told her husband, “Behold, the man who came to me the other day has appeared to me.” '
  '11':
  - type: text
    content: 'And Manoah arose and went after his wife and came to the man and said to him, “Are you the man who spoke to this woman?” And he said, “I am.” '
  '12':
  - type: text
    content: 'And Manoah said, “Now when your words come true, '
  - type: note
    content: '[Luke 1:66]'
  - type: text
    content: 'what is to be the child’s manner of life, and what is his mission?” '
  '13':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Manoah, “Of all that I said to the woman let her be careful. '
  '14':
  - type: text
    content: 'She may not eat of anything that comes from the vine, '
  - type: note
    content: ver. 4, 7
  - type: text
    content: neither let her drink wine or strong drink, or eat any unclean thing. All that I commanded her let her observe.”
  '15':
  - type: text
    content: 'Manoah said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Please let us detain you and '
  - type: note
    content: ch. 6:19; [Gen. 18:5-8]
  - type: text
    content: 'prepare a young goat for you.” '
  '16':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Manoah, “If you detain me, I will not eat of your food. But if you prepare a burnt offering, then offer it to the '
  - type: text
    content: Lord
  - type: text
    content: '.” (For Manoah did not know that he was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: '.) '
  '17':
  - type: text
    content: 'And Manoah said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: '“What is your name, so that, when your words come true, we may honor you?” '
  '18':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: Gen. 32:29
  - type: text
    content: '“Why do you ask my name, seeing '
  - type: note
    content: '[Isa. 9:6]'
  - type: text
    content: 'it is wonderful?” '
  '19':
  - type: text
    content: 'So '
  - type: note
    content: ch. 6:19-21
  - type: text
    content: 'Manoah took the young goat with the grain offering, and offered it on the rock to the '
  - type: text
    content: Lord
  - type: text
    content: ', to the one who works'
  - type: note
    content: Septuagint, Vulgate; Hebrew Lord, and working
  - type: text
    content: ' wonders, and Manoah and his wife were watching. '
  '2':
  - type: text
    content: 'There was a certain man of '
  - type: note
    content: Josh. 19:41; [Josh. 15:33]
  - type: text
    content: 'Zorah, of the tribe of the Danites, whose name was Manoah. '
  - type: note
    content: '[1 Sam. 1:2; Luke 1:7]'
  - type: text
    content: 'And his wife was barren and had no children. '
  '20':
  - type: text
    content: 'And when the flame went up toward heaven from the altar, the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up in the flame of the altar. Now Manoah and his wife were watching, '
  - type: note
    content: Lev. 9:24; 1 Chr. 21:16; Ezek. 1:28
  - type: text
    content: and they fell on their faces to the ground.
  '21':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared no more to Manoah and to his wife. '
  - type: note
    content: ch. 6:22
  - type: text
    content: 'Then Manoah knew that he was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And Manoah said to his wife, '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: '“We shall surely die, for we have seen God.” '
  '23':
  - type: text
    content: 'But his wife said to him, “If the '
  - type: text
    content: Lord
  - type: text
    content: ' had meant to kill us, he would not have accepted a burnt offering and a grain offering at our hands, or shown us all these things, or now announced to us such things as these.” '
  '24':
  - type: text
    content: 'And the woman bore a son and called his name Samson. '
  - type: note
    content: 1 Sam. 2:21; 3:19; Luke 1:80; [Luke 2:52]
  - type: text
    content: 'And the young man grew, and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him. '
  '25':
  - type: note
    content: See ch. 3:10
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' began to stir him in Mahaneh-dan, between '
  - type: note
    content: ch. 18:11; Josh. 15:33
  - type: text
    content: Zorah and Eshtaol.
  '3':
  - type: note
    content: ch. 6:12; Luke 1:11, 13
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to the woman and said to her, “Behold, you are barren and have not borne children, but you shall conceive and bear a son. '
  '4':
  - type: text
    content: 'Therefore be careful '
  - type: note
    content: ver. 7, 14; [Num. 6:2, 3; Luke 1:15]
  - type: text
    content: 'and drink no wine or strong drink, and eat nothing unclean, '
  '5':
  - type: text
    content: 'for behold, you shall conceive and bear a son. '
  - type: note
    content: ch. 16:17; 1 Sam. 1:11; [Num. 6:5]
  - type: text
    content: 'No razor shall come upon his head, for the child shall be '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'a Nazirite to God from the womb, and he shall '
  - type: note
    content: '[1 Sam. 7:13; 2 Sam. 8:1; 1 Chr. 18:1]'
  - type: text
    content: 'begin to save Israel from the hand of the Philistines.” '
  '6':
  - type: text
    content: 'Then the woman came and told her husband, '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: '“A man of God came to me, and his appearance was like the appearance of the angel of God, very awesome. '
  - type: note
    content: '[ver. 17, 18]'
  - type: text
    content: 'I did not ask him where he was from, and he did not tell me his name, '
  '7':
  - type: text
    content: 'but he said to me, '
  - type: note
    content: ver. 3-5
  - type: text
    content: ‘Behold, you shall conceive and bear a son. So then drink no wine or strong drink, and eat nothing unclean, for the child shall be a Nazirite to God from the womb to the day of his death.’”
  '8':
  - type: text
    content: 'Then Manoah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “O Lord, please let the man of God whom you sent come again to us and teach us what we are to do with the child who will be born.” '
  '9':
  - type: text
    content: 'And God listened to the voice of Manoah, and the angel of God came again to the woman as she sat in the field. But Manoah her husband was not with her. '
