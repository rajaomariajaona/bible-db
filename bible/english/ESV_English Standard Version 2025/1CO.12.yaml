document_id: 1CO.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Spiritual Gifts
  - type: text
    content: 'Now '
  - type: note
    content: ch. 14:1
  - type: text
    content: concerning
  - type: note
    content: The expression Now concerning introduces a reply to a question in the Corinthians’ letter; see 7:1
  - type: text
    content: ' spiritual gifts,'
  - type: note
    content: Or spiritual persons
  - type: text
    content: ' brothers,'
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' I do not want you to be uninformed. '
  '10':
  - type: text
    content: 'to another '
  - type: note
    content: ver. 28, 29; [Gal. 3:5]
  - type: text
    content: 'the working of miracles, to another '
  - type: note
    content: ch. 13:2, 8; 14:1
  - type: text
    content: 'prophecy, to another '
  - type: note
    content: '[ch. 14:29; 1 John 4:1]'
  - type: text
    content: 'the ability to distinguish between spirits, to another '
  - type: note
    content: See Mark 16:17
  - type: text
    content: 'various kinds of tongues, to another '
  - type: note
    content: ver. 30; ch. 14:26
  - type: text
    content: 'the interpretation of tongues. '
  '11':
  - type: text
    content: 'All these are empowered by one and the same Spirit, '
  - type: note
    content: '[2 Cor. 10:13]'
  - type: text
    content: 'who apportions to each one individually '
  - type: note
    content: Heb. 2:4
  - type: text
    content: as he wills.
  - type: heading
    content: One Body with Many Members
  '12':
  - type: text
    content: 'For just as '
  - type: note
    content: See ch. 10:17
  - type: text
    content: 'the body is one and has many members, and all the members of the body, though many, are one body, '
  - type: note
    content: ver. 27
  - type: text
    content: 'so it is with Christ. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: '[Rom. 6:5; Eph. 2:18]'
  - type: text
    content: in one Spirit we were all baptized into one body—
  - type: note
    content: Gal. 3:28; Col. 3:11; [Eph. 2:13-17]
  - type: text
    content: Jews or Greeks, slaves
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' or free—and '
  - type: note
    content: '[John 7:37-39]'
  - type: text
    content: all were made to drink of one Spirit.
  '14':
  - type: text
    content: 'For the body does not consist of one member but of many. '
  '15':
  - type: text
    content: 'If the foot should say, “Because I am not a hand, I do not belong to the body,” that would not make it any less a part of the body. '
  '16':
  - type: text
    content: 'And if the ear should say, “Because I am not an eye, I do not belong to the body,” that would not make it any less a part of the body. '
  '17':
  - type: text
    content: 'If the whole body were an eye, where would be the sense of hearing? If the whole body were an ear, where would be the sense of smell? '
  '18':
  - type: text
    content: 'But as it is, '
  - type: note
    content: ver. 28
  - type: text
    content: 'God arranged the members in the body, each one of them, '
  - type: note
    content: ver. 11; [ch. 3:5; Rom. 12:3]
  - type: text
    content: 'as he chose. '
  '19':
  - type: text
    content: 'If all were a single member, where would the body be? '
  '2':
  - type: text
    content: 'You know that '
  - type: note
    content: Eph. 2:11, 12; [1 Pet. 4:3]; See ch. 6:11
  - type: text
    content: 'when you were pagans '
  - type: note
    content: 1 Thess. 1:9
  - type: text
    content: 'you were led astray to '
  - type: note
    content: Hab. 2:18, 19; [Ps. 115:5; Isa. 46:7; Jer. 10:5]
  - type: text
    content: 'mute idols, however you were led. '
  '20':
  - type: text
    content: As it is, there are many parts,
  - type: note
    content: Or members; also verse 22
  - type: text
    content: ' yet one body.'
  '21':
  - type: text
    content: 'The eye cannot say to the hand, “I have no need of you,” nor again the head to the feet, “I have no need of you.” '
  '22':
  - type: text
    content: 'On the contrary, the parts of the body that seem to be weaker are indispensable, '
  '23':
  - type: text
    content: 'and on those parts of the body that we think less honorable we bestow the greater honor, and our unpresentable parts are treated with greater modesty, '
  '24':
  - type: text
    content: 'which our more presentable parts do not require. But God has so composed the body, giving greater honor to the part that lacked it, '
  '25':
  - type: text
    content: 'that there may be no division in the body, but that the members may have the same care for one another. '
  '26':
  - type: text
    content: 'If one member suffers, all suffer together; if one member is honored, '
  - type: note
    content: Rom. 12:15
  - type: text
    content: all rejoice together.
  '27':
  - type: text
    content: 'Now '
  - type: note
    content: '[Eph. 1:23; 4:12; 5:30; Col. 1:24]'
  - type: text
    content: 'you are the body of Christ and individually '
  - type: note
    content: See Rom. 12:5
  - type: text
    content: 'members of it. '
  '28':
  - type: text
    content: 'And '
  - type: note
    content: ver. 18
  - type: text
    content: 'God has appointed in the church first '
  - type: note
    content: Eph. 4:11
  - type: text
    content: 'apostles, second '
  - type: note
    content: Eph. 2:20; 3:5
  - type: text
    content: 'prophets, third teachers, then '
  - type: note
    content: ver. 10
  - type: text
    content: 'miracles, then '
  - type: note
    content: ver. 9
  - type: text
    content: 'gifts of healing, '
  - type: note
    content: '[Acts 20:35]'
  - type: text
    content: 'helping, '
  - type: note
    content: '[Rom. 12:8; 1 Tim. 5:17; Heb. 13:7, 17, 24]'
  - type: text
    content: 'administrating, and '
  - type: note
    content: ver. 10
  - type: text
    content: 'various kinds of tongues. '
  '29':
  - type: text
    content: 'Are all apostles? Are all prophets? Are all teachers? Do all work miracles? '
  '3':
  - type: text
    content: 'Therefore I want you to understand that '
  - type: note
    content: 1 John 4:2, 3
  - type: text
    content: 'no one speaking in the Spirit of God ever says “Jesus is '
  - type: note
    content: See Rom. 9:3
  - type: text
    content: 'accursed!” and '
  - type: note
    content: John 15:26; [Matt. 16:17]; See Rom. 10:9
  - type: text
    content: no one can say “Jesus is Lord” except in the Holy Spirit.
  '30':
  - type: text
    content: 'Do all possess gifts of healing? Do all speak with tongues? Do all interpret? '
  '31':
  - type: text
    content: 'But '
  - type: note
    content: ch. 14:1, 39
  - type: text
    content: earnestly desire the higher gifts.
  - type: text
    content: And I will show you a still more excellent way.
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: '[Heb. 2:4]; See Rom. 12:6'
  - type: text
    content: 'there are varieties of gifts, but '
  - type: note
    content: Eph. 4:4-6
  - type: text
    content: 'the same Spirit; '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: Rom. 12:7; [Eph. 4:11]
  - type: text
    content: 'there are varieties of service, but '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the same Lord; '
  '6':
  - type: text
    content: 'and there are varieties of activities, but it is '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'the same God who empowers them all in everyone. '
  '7':
  - type: note
    content: Eph. 4:7; [ch. 14:26; Rom. 12:3]
  - type: text
    content: 'To each is given the manifestation of the Spirit for the common good. '
  '8':
  - type: text
    content: 'For to one is given through the Spirit the utterance of '
  - type: note
    content: ch. 2:6, 7
  - type: text
    content: 'wisdom, and to another the utterance of '
  - type: note
    content: See ch. 1:5
  - type: text
    content: 'knowledge according to the same Spirit, '
  '9':
  - type: text
    content: 'to another '
  - type: note
    content: ch. 13:2; 2 Cor. 4:13
  - type: text
    content: 'faith by the same Spirit, to another '
  - type: note
    content: ver. 28, 30
  - type: text
    content: 'gifts of healing by the one Spirit, '
