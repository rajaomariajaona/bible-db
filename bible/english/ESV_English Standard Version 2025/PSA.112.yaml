verses:
  '1':
  - type: heading
    content: The Righteous Will Never Be Moved
  - type: text
    content: ' '
  - type: note
    content: This psalm is an acrostic poem, each line beginning with the successive letters of the Hebrew alphabet
  - type: note
    content: See Ps. 104:35
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: note
    content: Ps. 128:1, 4; [ Ps. 111:10; 115:13 ]
  - type: text
    content: 'Blessed is the man who fears the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'who '
  - type: note
    content: See Ps. 1:2
  - type: text
    content: greatly delights in his commandments!
  '10':
  - type: text
    content: The wicked man sees it and is angry;
  - type: text
    content: 'he '
  - type: note
    content: '[Matt. 8:12; Luke 13:28]; See Job 16:9'
  - type: text
    content: 'gnashes his teeth and '
  - type: note
    content: '[Ps. 58:8]'
  - type: text
    content: melts away;
  - type: note
    content: See Job 8:13
  - type: text
    content: the desire of the wicked will perish!
  '2':
  - type: text
    content: 'His '
  - type: note
    content: '[Ps. 25:13; 102:28; Prov. 11:21; 20:7]'
  - type: text
    content: offspring will be mighty in the land;
  - type: note
    content: Ps. 37:26
  - type: text
    content: the generation of the upright will be blessed.
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Prov. 3:16
  - type: text
    content: Wealth and riches are in his house,
  - type: text
    content: 'and his '
  - type: note
    content: '[Ps. 111:3]'
  - type: text
    content: righteousness endures forever.
  '4':
  - type: text
    content: 'Light dawns in the darkness '
  - type: note
    content: '[Job 11:17]; See Ps. 97:11'
  - type: text
    content: for the upright;
  - type: text
    content: 'he is gracious, merciful, and '
  - type: note
    content: '[Matt. 1:19]'
  - type: text
    content: righteous.
  '5':
  - type: text
    content: 'It is well with the man who '
  - type: note
    content: See Ps. 37:26
  - type: text
    content: deals generously and lends;
  - type: text
    content: who conducts his affairs with justice.
  '6':
  - type: text
    content: 'For the righteous will '
  - type: note
    content: Ps. 55:22
  - type: text
    content: never be moved;
  - type: note
    content: '[ Prov. 10:7 ]'
  - type: text
    content: he will be remembered forever.
  '7':
  - type: text
    content: 'He is not '
  - type: note
    content: Prov. 1:33
  - type: text
    content: afraid of bad news;
  - type: text
    content: 'his '
  - type: note
    content: Ps. 57:7
  - type: text
    content: 'heart is firm, '
  - type: note
    content: Ps. 11:1; 64:10
  - type: text
    content: 'trusting in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: His heart is steady;
  - type: note
    content: Or established (compare 111:8)
  - type: text
    content: ' he will not be afraid,'
  - type: text
    content: until he looks in triumph on his adversaries.
  '9':
  - type: text
    content: 'He has '
  - type: note
    content: Cited 2 Cor. 9:9
  - type: text
    content: distributed freely; he has given to the poor;
  - type: text
    content: his righteousness endures forever;
  - type: text
    content: 'his '
  - type: note
    content: See Ps. 75:10
  - type: text
    content: horn is exalted in honor.
