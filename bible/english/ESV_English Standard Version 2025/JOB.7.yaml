  - type: text
    content: the bitterness of my soul.
  '12':
  - type: text
    content: 'Am I the sea, or '
  - type: note
    content: Gen. 1:21
  - type: text
    content: a sea monster,
  - type: text
    content: that you set a guard over me?
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:27 ]'
  - type: text
    content: When I say, ‘My bed will comfort me,
  - type: text
    content: my couch will ease my complaint,’
  '14':
  - type: text
    content: then you scare me with dreams
  - type: text
    content: and terrify me with visions,
  '15':
  - type: text
    content: so that I would choose strangling
  - type: text
    content: 'and death rather than my '
  - type: note
    content: '[ch. 19:20; 30:17]'
  - type: text
    content: bones.
  '16':
  - type: text
    content: 'I '
  - type: note
    content: '[ch. 9:21; 10:1]'
  - type: text
    content: loathe my life; I would not live forever.
  - type: note
    content: ch. 10:20; 14:6; Ex. 14:12; [ Ps. 39:13 ]
  - type: text
    content: 'Leave me alone, for my days are '
  - type: note
    content: ver. 3
  - type: text
    content: a breath.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 8:4; 144:3; Heb. 2:6
  - type: text
    content: What is man, that you make so much of him,
  - type: text
    content: and that you set your heart on him,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps. 17:3
  - type: text
    content: visit him every morning
  - type: text
    content: 'and '
  - type: note
    content: Ps. 11:4, 5
  - type: text
    content: test him every moment?
  '19':
  - type: text
    content: 'How long will you not '
  - type: note
    content: ch. 14:6
  - type: text
    content: look away from me,
  - type: text
    content: nor leave me alone till I swallow my spit?
  '2':
  - type: text
    content: 'Like a slave who longs for '
  - type: note
    content: Song 2:17; 4:6; Jer. 6:4
  - type: text
    content: the shadow,
  - type: text
    content: 'and like '
  - type: note
    content: ch. 14:6
  - type: text
    content: 'a hired hand who looks for his '
  - type: note
    content: Lev. 19:13
  - type: text
    content: wages,
  '20':
  - type: text
    content: If I sin, what do I do to you, you watcher of mankind?
  - type: text
    content: 'Why have you made me '
  - type: note
    content: ch. 16:12; Lam. 3:12
  - type: text
    content: your mark?
  - type: text
    content: Why have I become a burden to you?
  '21':
  - type: text
    content: Why do you not pardon my transgression
  - type: text
    content: and take away my iniquity?
  - type: text
    content: 'For now I shall lie in '
  - type: note
    content: Dan. 12:2
  - type: text
    content: the earth;
  - type: text
    content: 'you will '
  - type: note
    content: '[ch. 8:5; 24:5; Prov. 1:28]'
  - type: text
    content: 'seek me, '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: but I shall not be.”
  '3':
  - type: text
    content: 'so I am allotted months of '
  - type: note
    content: ver. 16
  - type: text
    content: emptiness,
  - type: note
    content: '[ch. 30:17 ]'
  - type: text
    content: and nights of misery are apportioned to me.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Deut. 28:67
  - type: text
    content: When I lie down I say, ‘When shall I arise?’
  - type: text
    content: But the night is long,
  - type: text
    content: and I toss and turn till the dawn.
  '5':
  - type: text
    content: 'My flesh is clothed with '
  - type: note
    content: Isa. 14:11
  - type: text
    content: 'worms and '
  - type: note
    content: '[ch. 2:8]'
  - type: text
    content: dirt;
  - type: text
    content: 'my skin hardens, then '
  - type: note
    content: '[ch. 2:7]'
  - type: text
    content: breaks out afresh.
  '6':
  - type: text
    content: 'My days are '
  - type: note
    content: ch. 9:25
  - type: text
    content: 'swifter than '
  - type: note
    content: '[Isa. 38:12]'
  - type: text
    content: a weaver’s shuttle
  - type: text
    content: and come to their end without hope.
  '7':
  - type: text
    content: '“Remember that my life is a '
  - type: note
    content: ch. 6:26; Ps. 78:39
  - type: text
    content: breath;
  - type: text
    content: my eye will never again see good.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 20:9; [ch. 8:18; Ps. 37:36 ]
  - type: text
    content: The eye of him who sees me will behold me no more;
  - type: text
    content: 'while your eyes are on me, '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: I shall be gone.
  '9':
  - type: text
    content: 'As '
  - type: note
    content: ch. 30:15
  - type: text
    content: the cloud fades and vanishes,
  - type: text
    content: 'so he who '
  - type: note
    content: See ch. 21:13
  - type: text
    content: goes down to Sheol does not come up;
