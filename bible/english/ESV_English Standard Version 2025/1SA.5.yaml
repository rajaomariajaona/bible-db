document_id: 1SA.5,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philistines and the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines captured the ark of God, they brought it from '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:12
      marker-yv: yv-n
    - type: text
      text: 'Ebenezer to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'Ashdod. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent the ark of God to Ekron. But as soon as the ark of God came to Ekron, the people of Ekron cried out, “They have brought around to us the ark of the God of Israel to kill us and our people.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'They sent therefore and gathered together all the lords of the Philistines and said, “Send away the ark of the God of Israel, and let it return to its own place, that it may not kill us and our people.” For there was a deathly panic throughout the whole city. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'The hand of God was very heavy there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men who did not die were struck with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: tumors, and the cry of the city went up to heaven.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Philistines took the ark of God and brought it into the house of Dagon and set it up beside '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 16:23
      marker-yv: yv-n
    - type: text
      text: 'Dagon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people of Ashdod rose early the next day, behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 46:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Dagon had fallen face downward on the ground before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. So they took Dagon and put him back in his place. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they rose early on the next morning, behold, Dagon had fallen face downward on the ground before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 50:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 6:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 1:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the head of Dagon and both his hands were lying cut off on the threshold. Only the trunk of Dagon was left to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why the priests of Dagon and all who enter the house of Dagon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zeph. 1:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: do not tread on the threshold of Dagon in Ashdod to this day.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 9:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 32:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 13:11
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'The hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was heavy against the people of Ashdod, and he terrified and afflicted them with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:5
      marker-yv: yv-n
    - type: text
      text: 'tumors, both Ashdod and its territory. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the men of Ashdod saw how things were, they said, “The ark of the God of Israel must not remain with us, for his hand is hard against us and against Dagon our god.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent and gathered together all '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 13:3
      marker-yv: yv-n
    - type: text
      text: 'the lords of the Philistines and said, “What shall we do with the ark of the God of Israel?” They answered, “Let the ark of the God of Israel be brought around to Gath.” So they brought the ark of the God of Israel there. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after they had brought it around, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 2:15
      marker-yv: yv-n
    - type: text
      text: 'the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was against the city, causing a very great panic, and he afflicted the men of the city, both young and old, so that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'tumors broke out on them. '
