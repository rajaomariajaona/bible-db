document_id: 1SA.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Philistines and the Ark
  - type: text
    content: 'When the Philistines captured the ark of God, they brought it from '
  - type: note
    content: ch. 4:1; 7:12
  - type: text
    content: 'Ebenezer to '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'Ashdod. '
  '10':
  - type: text
    content: 'So they sent the ark of God to Ekron. But as soon as the ark of God came to Ekron, the people of Ekron cried out, “They have brought around to us the ark of the God of Israel to kill us and our people.” '
  '11':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'They sent therefore and gathered together all the lords of the Philistines and said, “Send away the ark of the God of Israel, and let it return to its own place, that it may not kill us and our people.” For there was a deathly panic throughout the whole city. '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'The hand of God was very heavy there. '
  '12':
  - type: text
    content: 'The men who did not die were struck with '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: tumors, and the cry of the city went up to heaven.
  '2':
  - type: text
    content: 'Then the Philistines took the ark of God and brought it into the house of Dagon and set it up beside '
  - type: note
    content: Judg. 16:23
  - type: text
    content: 'Dagon. '
  '3':
  - type: text
    content: 'And when the people of Ashdod rose early the next day, behold, '
  - type: note
    content: '[Isa. 46:1, 2]'
  - type: text
    content: 'Dagon had fallen face downward on the ground before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. So they took Dagon and put him back in his place. '
  '4':
  - type: text
    content: 'But when they rose early on the next morning, behold, Dagon had fallen face downward on the ground before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Jer. 50:2; Ezek. 6:4, 6; Mic. 1:7]'
  - type: text
    content: 'and the head of Dagon and both his hands were lying cut off on the threshold. Only the trunk of Dagon was left to him. '
  '5':
  - type: text
    content: 'This is why the priests of Dagon and all who enter the house of Dagon '
  - type: note
    content: '[Zeph. 1:9]'
  - type: text
    content: do not tread on the threshold of Dagon in Ashdod to this day.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 9:3; Ps. 32:4; Acts 13:11 ]'
  - type: text
    content: 'The hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was heavy against the people of Ashdod, and he terrified and afflicted them with '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'tumors, both Ashdod and its territory. '
  '7':
  - type: text
    content: 'And when the men of Ashdod saw how things were, they said, “The ark of the God of Israel must not remain with us, for his hand is hard against us and against Dagon our god.” '
  '8':
  - type: text
    content: 'So they sent and gathered together all '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'the lords of the Philistines and said, “What shall we do with the ark of the God of Israel?” They answered, “Let the ark of the God of Israel be brought around to Gath.” So they brought the ark of the God of Israel there. '
  '9':
  - type: text
    content: 'But after they had brought it around, '
  - type: note
    content: ch. 7:13; 12:15; Deut. 2:15
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against the city, causing a very great panic, and he afflicted the men of the city, both young and old, so that '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'tumors broke out on them. '
