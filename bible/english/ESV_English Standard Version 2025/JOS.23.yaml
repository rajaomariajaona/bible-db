      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:14
      marker-yv: yv-n
    - type: text
      text: 'for it is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God who has fought for you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:2-7
      marker-yv: yv-n
    - type: text
      text: 'I have allotted to you as an inheritance for your tribes those nations that remain, along with all the nations that I have already cut off, from the Jordan to the Great Sea in the west. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
