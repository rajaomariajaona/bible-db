      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 34:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:3
      marker-yv: yv-n
    - type: text
      text: 'and make marriages with them, so that you associate with them and they with you, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'know for certain that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 2:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will no longer drive out these nations before you, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 23:33
      - type: text
