      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:4
      marker-yv: yv-n
    - type: text
