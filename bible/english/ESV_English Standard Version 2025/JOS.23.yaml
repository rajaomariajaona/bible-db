      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:14
      marker-yv: yv-n
    - type: text
      text: 'turning aside from it neither to the right hand nor to the left, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
