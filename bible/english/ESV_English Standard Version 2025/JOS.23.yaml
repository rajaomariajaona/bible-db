      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 7:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 2:3
      marker-yv: yv-n
    - type: text
      text: 'but they shall be a snare and a trap for you, a whip on your sides and thorns in your eyes, until you perish from off this good ground that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And now '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 2:2
      marker-yv: yv-n
    - type: text
      text: 'I am about to go the way of all the earth, and you know in your hearts and souls, all of you, that '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:45
      marker-yv: yv-n
    - type: text
      text: not one word has failed of all the good things
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: words
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also twice in verse 15
      marker-yv: yv-n
    - type: text
      text: ' that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God promised concerning you. All have come to pass for you; not one of them has failed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But just as all the good things that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God promised concerning you have been fulfilled for you, so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring upon you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 26:14-39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 28:15-68
      marker-yv: yv-n
    - type: text
      text: 'all the evil things, until he has destroyed you from off this good land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given you, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if you transgress the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, which he commanded you, and go and serve other gods and bow down to them. Then the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be kindled against you, and you shall perish quickly from off the good land that he has given to you.”'
