document_id: JOS.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Charge to Israel’s Leaders
  - type: text
    content: 'A long time afterward, when the '
  - type: text
    content: Lord
  - type: text
    content: ' had given '
  - type: note
    content: See ch. 11:23
  - type: text
    content: 'rest to Israel from all their surrounding enemies, and Joshua '
  - type: note
    content: ch. 13:1
  - type: text
    content: 'was old and well advanced in years, '
  '10':
  - type: note
    content: '[Lev. 26:8; Deut. 32:30]'
  - type: text
    content: 'One man of you puts to flight a thousand, since it is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ver. 3; Ex. 14:14; Deut. 3:22
  - type: text
    content: 'who fights for you, just as he promised you. '
  '11':
  - type: note
    content: ch. 22:5
  - type: text
    content: 'Be very careful, therefore, to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '12':
  - type: text
    content: 'For if you turn back and cling to the remnant of these nations remaining among you '
  - type: note
    content: Ex. 34:16; Deut. 7:3
  - type: text
    content: 'and make marriages with them, so that you associate with them and they with you, '
  '13':
  - type: text
    content: 'know for certain that '
  - type: note
    content: Judg. 2:3, 21
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will no longer drive out these nations before you, '
  - type: note
    content: Ex. 23:33; Num. 33:55; Deut. 7:16; Judg. 2:3
  - type: text
    content: 'but they shall be a snare and a trap for you, a whip on your sides and thorns in your eyes, until you perish from off this good ground that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you.'
  '14':
  - type: text
    content: '“And now '
  - type: note
    content: 1 Kgs. 2:2
  - type: text
    content: 'I am about to go the way of all the earth, and you know in your hearts and souls, all of you, that '
  - type: note
    content: ch. 21:45
  - type: text
    content: not one word has failed of all the good things
  - type: note
    content: Or words; also twice in verse 15
  - type: text
    content: ' that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God promised concerning you. All have come to pass for you; not one of them has failed. '
  '15':
  - type: text
    content: 'But just as all the good things that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God promised concerning you have been fulfilled for you, so the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring upon you '
  - type: note
    content: See Lev. 26:14-39; Deut. 28:15-68
  - type: text
    content: 'all the evil things, until he has destroyed you from off this good land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you, '
  '16':
  - type: text
    content: 'if you transgress the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which he commanded you, and go and serve other gods and bow down to them. Then the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be kindled against you, and you shall perish quickly from off the good land that he has given to you.”'
  '2':
  - type: text
    content: 'Joshua '
  - type: note
    content: ch. 24:1; [Deut. 31:28; 1 Chr. 28:1]
  - type: text
    content: 'summoned all Israel, its elders and heads, its judges and officers, and said to them, “I am now old and well advanced in years. '
  '3':
  - type: text
    content: 'And you have seen all that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done to all these nations for your sake, '
  - type: note
    content: ch. 10:14, 42; Ex. 14:14
  - type: text
    content: 'for it is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who has fought for you. '
  '4':
  - type: text
    content: 'Behold, '
  - type: note
    content: See ch. 13:2-7
  - type: text
    content: 'I have allotted to you as an inheritance for your tribes those nations that remain, along with all the nations that I have already cut off, from the Jordan to the Great Sea in the west. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ch. 13:6; Ex. 23:30; 33:2; 34:11; Deut. 11:23
  - type: text
    content: 'will push them back before you and drive them out of your sight. And you shall possess their land, '
  - type: note
    content: Num. 33:53
  - type: text
    content: 'just as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God promised you. '
  '6':
  - type: text
    content: 'Therefore, '
  - type: note
    content: ch. 1:7
  - type: text
    content: 'be very strong to keep and to do all that is written in the Book of the Law of Moses, '
  - type: note
    content: ch. 1:7; Deut. 5:32; 28:14
  - type: text
    content: 'turning aside from it neither to the right hand nor to the left, '
  '7':
  - type: note
    content: Ex. 23:33; Deut. 7:2, 3
  - type: text
    content: 'that you may not mix with these nations remaining among you '
  - type: note
    content: Ex. 23:13; [Ps. 16:4]
  - type: text
    content: 'or make mention of the names of their gods '
  - type: note
    content: Jer. 5:7; [Zeph. 1:5]
  - type: text
    content: 'or swear by them or serve them or bow down to them, '
  '8':
  - type: note
    content: ch. 22:5; Deut. 10:20; 11:22; 13:4
  - type: text
    content: 'but you shall cling to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God just as you have done to this day. '
  '9':
  - type: note
    content: ch. 13:6; Ex. 23:30; 33:2; 34:11; Deut. 11:23
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has driven out before you great and strong nations. And as for you, '
  - type: note
    content: ch. 1:5; 10:8; 21:44
  - type: text
    content: 'no man has been able to stand before you to this day. '
