        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'One man of you puts to flight a thousand, since it is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 3:22
      marker-yv: yv-n
    - type: text
      text: 'who fights for you, just as he promised you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:5
      marker-yv: yv-n
    - type: text
      text: 'Be very careful, therefore, to love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you turn back and cling to the remnant of these nations remaining among you '
    - type: usfm
