    - type: text
      text: Joshua’s Charge to Israel’s Leaders
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A long time afterward, when the '
    - type: usfm
      marker: nd
      children:
      - type: text
