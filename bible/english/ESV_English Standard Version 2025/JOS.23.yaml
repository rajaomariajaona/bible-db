        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'summoned all Israel, its elders and heads, its judges and officers, and said to them, “I am now old and well advanced in years. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you have seen all that the '
    - type: usfm
