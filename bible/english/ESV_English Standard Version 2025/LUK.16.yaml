document_id: LUK.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Dishonest Manager
  - type: text
    content: 'He also said to the disciples, '
  - type: text
    content: '“There was a rich man who had '
  - type: note
    content: ch. 12:42
  - type: text
    content: a manager, and charges were brought to him that this man was wasting his possessions.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Matt. 25:21, 23
  - type: text
    content: '“One who is '
  - type: note
    content: ch. 19:17
  - type: text
    content: faithful in a very little is also faithful in much, and one who is dishonest in a very little is also dishonest in much.
  - type: text
    content: ' '
  '11':
  - type: text
    content: If then you have not been faithful in the unrighteous wealth, who will entrust to you the true riches?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And if you have not been faithful in '
  - type: note
    content: '[1 Chr. 29:14, 16]'
  - type: text
    content: that which is another’s, who will give you that which is your own?
  - type: text
    content: ' '
  '13':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: No servant can serve two masters, for either he will hate the one and love the other, or he will be devoted to the one and despise the other. You cannot serve God and money.”
  - type: heading
    content: The Law and the Kingdom of God
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:39; 20:47 ]'
  - type: text
    content: 'The Pharisees, who were '
  - type: note
    content: 2 Tim. 3:2; [1 Tim. 6:10]
  - type: text
    content: 'lovers of money, heard all these things, and they '
  - type: note
    content: ch. 23:35
  - type: text
    content: 'ridiculed him. '
  '15':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“You are those who '
  - type: note
    content: ch. 10:29
  - type: text
    content: 'justify yourselves before men, but '
  - type: note
    content: 1 Sam. 16:7; 1 Chr. 28:9; Prov. 21:2
  - type: text
    content: 'God knows your hearts. For what is exalted among men '
  - type: note
    content: Prov. 16:5
  - type: text
    content: is an abomination in the sight of God.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Matt. 11:12, 13
  - type: text
    content: '“The Law and the Prophets were until John; since then '
  - type: note
    content: See ch. 4:43
  - type: text
    content: 'the good news of the kingdom of God is preached, and '
  - type: note
    content: '[ch. 15:1 ]'
  - type: text
    content: everyone forces his way into it.
  - type: text
    content: ' '
  - type: note
    content: Or everyone is forcefully urged into it
  '17':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 5:18
  - type: text
    content: it is easier for heaven and earth to pass away than for one dot of the Law to become void.
  - type: heading
    content: Divorce and Remarriage
  '18':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 5:32
  - type: text
    content: “Everyone who divorces his wife and marries another commits adultery, and he who marries a woman divorced from her husband commits adultery.
  - type: heading
    content: The Rich Man and Lazarus
  '19':
  - type: text
    content: ' '
  - type: text
    content: '“There was a rich man who was clothed in '
  - type: note
    content: Esth. 8:15; Rev. 18:16
  - type: text
    content: 'purple and fine linen and '
  - type: note
    content: '[ James 5:5 ]'
  - type: text
    content: who feasted sumptuously every day.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he called him and said to him, ‘What is this that I hear about you? Turn in the account of your '
  - type: note
    content: See 1 Cor. 9:17
  - type: text
    content: management, for you can no longer be manager.’
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And at his gate '
  - type: note
    content: '[Acts 3:2]'
  - type: text
    content: was laid a poor man named Lazarus, covered with sores,
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'who desired to be fed with '
  - type: note
    content: '[Matt. 15:27]'
  - type: text
    content: what fell from the rich man’s table. Moreover, even the dogs came and licked his sores.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'The poor man died and was carried by '
  - type: note
    content: ch. 15:10; Matt. 18:10; Acts 12:15; Heb. 1:13, 14; See ch. 12:8
  - type: text
    content: 'the angels '
  - type: note
    content: '[John 13:23 (Gk.)]'
  - type: text
    content: to Abraham’s side.
  - type: note
    content: Greek bosom; also verse 23
  - type: text
    content: ' '
  - type: text
    content: The rich man also died and was buried,
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'and in '
  - type: note
    content: See Matt. 11:23
  - type: text
    content: 'Hades, being in torment, he lifted up his eyes and '
  - type: note
    content: Matt. 8:11, 12
  - type: text
    content: 'saw Abraham far off and Lazarus '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: at his side.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he called out, '
  - type: note
    content: ver. 30; John 8:33, 39, 53
  - type: text
    content: '‘Father Abraham, have mercy on me, and send Lazarus to dip the end of his finger in water and '
  - type: note
    content: '[Zech. 14:12]'
  - type: text
    content: 'cool my tongue, for '
  - type: note
    content: '[Isa. 66:24]; See Matt. 25:41'
  - type: text
    content: I am in anguish in this flame.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But Abraham said, ‘Child, remember that '
  - type: note
    content: '[ch. 6:24; Job 21:13; Ps. 17:14]'
  - type: text
    content: you in your lifetime received your good things, and Lazarus in like manner bad things; but now he is comforted here, and you are in anguish.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And besides all this, between us and you a great chasm has been fixed, in order that those who would pass from here to you may not be able, and none may cross from there to us.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he said, ‘Then I beg you, father, to send him to my father’s house—
  - type: text
    content: ' '
  '28':
  - type: text
    content: for I have five brothers—so that he may warn them, lest they also come into this place of torment.’
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But Abraham said, ‘They have '
  - type: note
    content: ver. 31; ch. 24:27; Acts 26:22; 28:23
  - type: text
    content: 'Moses and the Prophets; '
  - type: note
    content: '[John 5:45-47]'
  - type: text
    content: let them hear them.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: And the manager said to himself, ‘What shall I do, since my master is taking the management away from me? I am not strong enough to dig, and I am ashamed to beg.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And he said, ‘No, '
  - type: note
    content: ver. 24
  - type: text
    content: father Abraham, but if someone goes to them from the dead, they will repent.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'He said to him, ‘If they do not hear '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'Moses and the Prophets, '
  - type: note
    content: '[Matt. 28:11-15; John 12:10, 11]'
  - type: text
    content: neither will they be convinced if someone should rise from the dead.’”
  '4':
  - type: text
    content: I have decided what to do, so that when I am removed from management, people may receive me into their houses.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: So, summoning his master’s debtors one by one, he said to the first, ‘How much do you owe my master?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: He said, ‘A hundred measures
  - type: note
    content: About 875 gallons or 3,200 liters
  - type: text
    content: ' '
  - type: text
    content: of oil.’ He said to him, ‘Take your bill, and sit down quickly and write fifty.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: Then he said to another, ‘And how much do you owe?’ He said, ‘A hundred measures
  - type: note
    content: Between 1,000 and 1,200 bushels or 37,000 to 45,000 liters
  - type: text
    content: ' '
  - type: text
    content: of wheat.’ He said to him, ‘Take your bill, and write eighty.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'The master commended the dishonest manager for his '
  - type: note
    content: See Matt. 25:2
  - type: text
    content: 'shrewdness. For '
  - type: note
    content: ch. 20:34; See ch. 10:6
  - type: text
    content: the sons of this world
  - type: note
    content: Greek age
  - type: text
    content: ' '
  - type: text
    content: 'are '
  - type: note
    content: See Matt. 25:2
  - type: text
    content: 'more shrewd in dealing with their own generation than '
  - type: note
    content: John 12:36; 1 Thess. 5:5; [Eph. 5:8]
  - type: text
    content: the sons of light.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And I tell you, '
  - type: note
    content: '[ch. 12:33; Matt. 6:20; 19:21; 1 Tim. 6:10, 17-19]'
  - type: text
    content: 'make friends for yourselves by means of '
  - type: note
    content: ver. 11, 13; Matt. 6:24
  - type: text
    content: unrighteous wealth,
  - type: note
    content: Greek mammon, a Semitic word for money or possessions; also verse 11; rendered money in verse 13
  - type: text
    content: ' '
  - type: text
    content: so that when it fails they may receive you into the eternal dwellings.
