  - type: text
    content: 'when all these things come upon you, the blessing and the curse, which I have set before you, and '
  - type: note
    content: ch. 4:29-31; See 1 Kgs. 8:47-50
  - type: text
    content: 'you call them to mind among all the nations where the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has driven you, '
  '10':
  - type: text
    content: 'when you obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, to keep his commandments and his statutes that are written in this Book of the Law, when you turn to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul.'
  - type: heading
    content: The Choice of Life and Death
  '11':
  - type: text
    content: '“For this commandment that I command you today '
  - type: note
    content: '[Isa. 45:19; 48:16]'
  - type: text
    content: 'is not too hard for you, neither is it far off. '
  '12':
  - type: note
    content: '[Rom. 10:6-8]'
  - type: text
    content: 'It is not in heaven, that you should say, ‘Who will ascend to heaven for us and bring it to us, that we may hear it and do it?’ '
  '13':
  - type: text
    content: 'Neither is it beyond the sea, that you should say, ‘Who will go over the sea for us and bring it to us, that we may hear it and do it?’ '
  '14':
  - type: text
    content: But the word is very near you. It is in your mouth and in your heart, so that you can do it.
  '15':
  - type: text
    content: '“See, '
  - type: note
    content: '[ch. 11:26; 32:47]'
  - type: text
    content: 'I have set before you today life and good, death and evil. '
  '16':
  - type: text
    content: 'If you obey the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: note
    content: Septuagint; Hebrew lacks If you obey the commandments of the Lord your God
  - type: text
    content: ' that I command you today, '
  - type: note
    content: ver. 6; See ch. 6:5
  - type: text
    content: 'by loving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, by walking in his ways, and by keeping his commandments and his statutes and his rules,'
  - type: note
    content: Or his just decrees
  - type: text
    content: ' then you shall live and multiply, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in the land that you are entering to take possession of it. '
  '17':
  - type: text
    content: 'But if '
  - type: note
    content: ch. 29:18
  - type: text
    content: 'your heart turns away, and you will not hear, but are drawn away to worship other gods and serve them, '
  '18':
  - type: note
    content: See ch. 4:26
  - type: text
    content: 'I declare to you today, that you shall surely perish. You shall not live long in the land that you are going over the Jordan to enter and possess. '
  '19':
  - type: text
    content: 'I call heaven and earth to witness against you today, that I have set before you life and death, '
  - type: note
    content: ver. 1
  - type: text
    content: 'blessing and curse. Therefore choose life, that you and your offspring may live, '
  '2':
  - type: text
    content: 'and '
  - type: note
    content: Neh. 1:9; Isa. 55:7; Lam. 3:40; Joel 2:12, 13
  - type: text
    content: 'return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you and your children, and obey his voice in all that I command you today, with all your heart and with all your soul, '
  '20':
  - type: text
    content: 'loving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, obeying his voice '
  - type: note
    content: See ch. 10:20
  - type: text
    content: 'and holding fast to him, for '
  - type: note
    content: Ps. 27:1; 66:9; John 11:25
  - type: text
    content: 'he is your life and length of days, that you may dwell in '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to your fathers, to Abraham, to Isaac, and to Jacob, to give them.”'
  '3':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Ps. 126:1, 4
  - type: text
    content: 'will restore your fortunes and have mercy on you, and he will '
  - type: note
    content: Jer. 32:37; Ezek. 34:13; 36:24
  - type: text
    content: 'gather you again from all the peoples where the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has scattered you. '
  '4':
  - type: note
    content: ch. 28:64; Neh. 1:9
  - type: text
    content: 'If your outcasts are in the uttermost parts of heaven, from there the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will gather you, and from there he will take you. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bring you into the land that your fathers possessed, that you may possess it. '
  - type: note
    content: Zeph. 3:19, 20; See ch. 28:63
  - type: text
    content: 'And he will make you more prosperous and numerous than your fathers. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: '[Jer. 31:33; 32:39, 40; Ezek. 11:19; 36:26, 27]; See ch. 10:16'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will circumcise your heart and the heart of your offspring, '
  - type: note
    content: ver. 16
  - type: text
    content: 'so that you will love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul, that you may live. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will put all these curses on your foes and enemies who persecuted you. '
  '8':
  - type: text
    content: 'And you shall again obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep all his commandments that I command you today. '
  '9':
  - type: note
    content: ch. 28:11
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will make you abundantly prosperous in all the work of your hand, in the fruit of your womb and in the fruit of your cattle and in the fruit of your ground. '
  - type: note
    content: Zeph. 3:19, 20; See ch. 28:63
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will again take delight in prospering you, as he took delight in your fathers, '
