        - type: text
          text: '19'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Korahite, was entrusted with '
    - type: usfm
