    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 35-38, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:29-32
      marker-yv: yv-n
    - type: text
      text: 'In Gibeon lived the father of Gibeon, Jeiel, and the name of his wife was Maacah, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his firstborn son Abdon, then Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gedor, Ahio, Zechariah, and Mikloth; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Mikloth was the father of Shimeam; and these also lived opposite their kinsmen in Jerusalem, with their kinsmen. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 39-44, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:33-38
      marker-yv: yv-n
    - type: text
      text: 'Ner fathered Kish, Kish fathered Saul, Saul fathered Jonathan, Malchi-shua, Abinadab, and Eshbaal. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uthai the son of Ammihud, son of Omri, son of Imri, son of Bani, from the sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
