        children:
        - type: text
          text: 23:29
      marker-yv: yv-n
    - type: text
      text: 'making the flat cakes. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also some of their kinsmen of the Kohathites had '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
