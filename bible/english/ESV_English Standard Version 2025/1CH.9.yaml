  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 25:11-13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Phinehas the son of Eleazar was the chief officer over them in time past; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:2
      marker-yv: yv-n
    - type: text
      text: 'Zechariah the son of Meshelemiah was gatekeeper at the entrance of the tent of meeting. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these, who were chosen as gatekeepers at the thresholds, were 212. They were enrolled by genealogies in their villages. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'David and Samuel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 9:9
      marker-yv: yv-n
    - type: text
      text: 'the seer established them in their office of trust. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they and their sons were in charge of the gates of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that is, the house of the tent, as guards. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The gatekeepers were on the four sides, east, west, north, and south. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their kinsmen who were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'in their villages were obligated to come '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 11:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in every seven days, in turn, to be with these, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the four chief gatekeepers, who were Levites, were entrusted to be over '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 6:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the chambers and the treasures of the house of God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they lodged around the house of God, for on them lay the duty of watching, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 1:53
      marker-yv: yv-n
    - type: text
      text: they had charge of opening it every morning.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of them had charge of the utensils of service, for they were required to count them when they were brought in and taken out. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Others of them were appointed over the furniture and over all the holy utensils, also over the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 6:20
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'fine flour, the wine, the oil, the incense, and the spices. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some of the people of Judah, Benjamin, Ephraim, and Manasseh lived in Jerusalem: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Others, of the sons of the priests, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 30:23-25
      marker-yv: yv-n
    - type: text
      text: 'prepared the mixing of the spices, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Mattithiah, one of the Levites, the firstborn of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      marker-yv: yv-n
    - type: text
      text: 'Shallum the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
