      text: 'Ebiasaph, son of Korah, and his kinsmen of his fathers’ house, the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
