        - type: text
          text: Neh. 11:10-14
      marker-yv: yv-n
    - type: text
      text: 'Of the priests: Jedaiah, Jehoiarib, Jachin, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Azariah the son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub, the '
