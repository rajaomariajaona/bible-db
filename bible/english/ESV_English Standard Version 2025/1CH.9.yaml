    - type: text
      text: 'chief officer of the house of God; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Adaiah the son of Jeroham, son of Pashhur, son of Malchijah, and Maasai the son of Adiel, son of Jahzerah, son of Meshullam, son of Meshillemith, son of Immer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: besides their kinsmen, heads of their fathers’ houses, 1,760, mighty men for the work of the service of the house of God.
  '14':
  - type: usfm
