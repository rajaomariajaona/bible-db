    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare 8:35; Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and Ahaz
      marker-yv: yv-n
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahaz fathered '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:36
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Jarah, and Jarah fathered Alemeth, Azmaveth, and Zimri. And Zimri fathered Moza. '
  '43':
