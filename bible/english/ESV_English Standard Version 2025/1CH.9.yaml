    children:
    - type: text
      text: A Genealogy of the Returned Exiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all Israel was recorded in genealogies, and these are written in the Book of the Kings of Israel. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      marker-yv: yv-n
    - type: text
      text: 'Judah was taken into exile in Babylon because of their breach of faith. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
