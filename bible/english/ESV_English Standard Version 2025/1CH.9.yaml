        children:
        - type: text
          text: 'For ver. 14-17, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:15-19
      marker-yv: yv-n
    - type: text
      text: 'Of the Levites: Shemaiah the son of Hasshub, son of Azrikam, son of Hashabiah, of the sons of Merari; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Bakbakkar, Heresh, Galal and Mattaniah the son of Mica, son of Zichri, son of Asaph; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Obadiah the son of Shemaiah, son of Galal, son of Jeduthun, and Berechiah the son of Asa, son of Elkanah, who lived in the villages of the Netophathites.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The gatekeepers were Shallum, Akkub, Talmon, Ahiman, and their kinsmen (Shallum was the chief); '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until then they were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 46:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'in the king’s gate on the east side as the gatekeepers of the camps of the Levites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum the son of Kore, son of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
