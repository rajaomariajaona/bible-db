      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 20:19
      marker-yv: yv-n
    - type: text
      text: 'Korahites, were in charge of the work of the service, keepers of the thresholds of the tent, as their fathers had been in charge of the camp of the '
    - type: usfm
      marker: nd
      children:
      - type: text
