document_id: 1CH.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Genealogy of the Returned Exiles
  - type: text
    content: 'So all Israel was recorded in genealogies, and these are written in the Book of the Kings of Israel. And '
  - type: note
    content: ch. 5:25, 26
  - type: text
    content: 'Judah was taken into exile in Babylon because of their breach of faith. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-13, see Neh. 11:10-14
  - type: text
    content: 'Of the priests: Jedaiah, Jehoiarib, Jachin, '
  '11':
  - type: text
    content: 'and Azariah the son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub, the '
  - type: note
    content: '[Jer. 20:1; Acts 4:1]'
  - type: text
    content: 'chief officer of the house of God; '
  '12':
  - type: text
    content: 'and Adaiah the son of Jeroham, son of Pashhur, son of Malchijah, and Maasai the son of Adiel, son of Jahzerah, son of Meshullam, son of Meshillemith, son of Immer; '
  '13':
  - type: text
    content: besides their kinsmen, heads of their fathers’ houses, 1,760, mighty men for the work of the service of the house of God.
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14-17, see Neh. 11:15-19
  - type: text
    content: 'Of the Levites: Shemaiah the son of Hasshub, son of Azrikam, son of Hashabiah, of the sons of Merari; '
  '15':
  - type: text
    content: 'and Bakbakkar, Heresh, Galal and Mattaniah the son of Mica, son of Zichri, son of Asaph; '
  '16':
  - type: text
    content: and Obadiah the son of Shemaiah, son of Galal, son of Jeduthun, and Berechiah the son of Asa, son of Elkanah, who lived in the villages of the Netophathites.
  '17':
  - type: text
    content: 'The gatekeepers were Shallum, Akkub, Talmon, Ahiman, and their kinsmen (Shallum was the chief); '
  '18':
  - type: text
    content: 'until then they were '
  - type: note
    content: Ezek. 46:1, 2
  - type: text
    content: 'in the king’s gate on the east side as the gatekeepers of the camps of the Levites. '
  '19':
  - type: text
    content: 'Shallum the son of Kore, son of '
  - type: note
    content: '[ch. 26:1]'
  - type: text
    content: 'Ebiasaph, son of Korah, and his kinsmen of his fathers’ house, the '
  - type: note
    content: ch. 12:6; Num. 26:58; 2 Chr. 20:19
  - type: text
    content: 'Korahites, were in charge of the work of the service, keepers of the thresholds of the tent, as their fathers had been in charge of the camp of the '
  - type: text
    content: Lord
  - type: text
    content: ', keepers of the entrance. '
  '2':
  - type: note
    content: For ver. 2-22, see Neh. 11:3-22
  - type: text
    content: 'Now the first to '
  - type: note
    content: Ezra 2:70; Neh. 7:73
  - type: text
    content: 'dwell again in their possessions in their cities were Israel, the priests, the Levites, and the '
  - type: note
    content: Ezra 2:43, 58; 7:7; 8:17, 20; Neh. 3:26; 7:60, 73; 10:28; 11:3, 21; [Josh. 9:27]
  - type: text
    content: 'temple servants. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: '[Num. 25:11-13]'
  - type: text
    content: 'Phinehas the son of Eleazar was the chief officer over them in time past; the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him. '
  '21':
  - type: note
    content: ch. 26:2
  - type: text
    content: 'Zechariah the son of Meshelemiah was gatekeeper at the entrance of the tent of meeting. '
  '22':
  - type: text
    content: 'All these, who were chosen as gatekeepers at the thresholds, were 212. They were enrolled by genealogies in their villages. '
  - type: note
    content: '[ch. 26:1, 2]'
  - type: text
    content: 'David and Samuel '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: 'the seer established them in their office of trust. '
  '23':
  - type: text
    content: 'So they and their sons were in charge of the gates of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', that is, the house of the tent, as guards. '
  '24':
  - type: text
    content: 'The gatekeepers were on the four sides, east, west, north, and south. '
  '25':
  - type: text
    content: 'And their kinsmen who were '
  - type: note
    content: ver. 16
  - type: text
    content: 'in their villages were obligated to come '
  - type: note
    content: '[2 Kgs. 11:5]'
  - type: text
    content: 'in every seven days, in turn, to be with these, '
  '26':
  - type: text
    content: 'for the four chief gatekeepers, who were Levites, were entrusted to be over '
  - type: note
    content: '[1 Kgs. 6:5, 8]'
  - type: text
    content: 'the chambers and the treasures of the house of God. '
  '27':
  - type: text
    content: 'And they lodged around the house of God, for on them lay the duty of watching, and '
  - type: note
    content: See Num. 1:53
  - type: text
    content: they had charge of opening it every morning.
  '28':
  - type: text
    content: 'Some of them had charge of the utensils of service, for they were required to count them when they were brought in and taken out. '
  '29':
  - type: text
    content: 'Others of them were appointed over the furniture and over all the holy utensils, also over the '
  - type: note
    content: ch. 23:29; Lev. 6:20, 21
  - type: text
    content: 'fine flour, the wine, the oil, the incense, and the spices. '
  '3':
  - type: text
    content: 'And some of the people of Judah, Benjamin, Ephraim, and Manasseh lived in Jerusalem: '
  '30':
  - type: text
    content: 'Others, of the sons of the priests, '
  - type: note
    content: See Ex. 30:23-25
  - type: text
    content: 'prepared the mixing of the spices, '
  '31':
  - type: text
    content: 'and Mattithiah, one of the Levites, the firstborn of '
  - type: note
    content: ver. 19
  - type: text
    content: 'Shallum the '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'Korahite, was entrusted with '
  - type: note
    content: ch. 23:29
  - type: text
    content: 'making the flat cakes. '
  '32':
  - type: text
    content: 'Also some of their kinsmen of the Kohathites had '
  - type: note
    content: See Lev. 24:5-8
  - type: text
    content: charge of the showbread, to prepare it every Sabbath.
  '33':
  - type: text
    content: 'Now these, the '
  - type: note
    content: ch. 6:31; 25:1
  - type: text
    content: 'singers, the heads of fathers’ houses of the Levites, were in the chambers of the temple free from other service, for they were on duty day and night. '
  '34':
  - type: text
    content: These were heads of fathers’ houses of the Levites, according to their generations, leaders. These lived in Jerusalem.
  - type: heading
    content: Saul’s Genealogy Repeated
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-38, see ch. 8:29-32
  - type: text
    content: 'In Gibeon lived the father of Gibeon, Jeiel, and the name of his wife was Maacah, '
  '36':
  - type: text
    content: 'and his firstborn son Abdon, then Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Gedor, Ahio, Zechariah, and Mikloth; '
  '38':
  - type: text
    content: 'and Mikloth was the father of Shimeam; and these also lived opposite their kinsmen in Jerusalem, with their kinsmen. '
  '39':
  - type: note
    content: For ver. 39-44, see ch. 8:33-38
  - type: text
    content: 'Ner fathered Kish, Kish fathered Saul, Saul fathered Jonathan, Malchi-shua, Abinadab, and Eshbaal. '
  '4':
  - type: text
    content: 'Uthai the son of Ammihud, son of Omri, son of Imri, son of Bani, from the sons of '
  - type: note
    content: '[ch. 2:5, 6]'
  - type: text
    content: 'Perez the son of Judah. '
  '40':
  - type: text
    content: 'And the son of Jonathan was '
  - type: note
    content: '[2 Sam. 4:4; 9:6, 10]'
  - type: text
    content: 'Merib-baal, and Merib-baal fathered Micah. '
  '41':
  - type: text
    content: 'The sons of Micah: Pithon, Melech, Tahrea, and '
  - type: note
    content: ch. 8:35
  - type: text
    content: Ahaz.
  - type: note
    content: Compare 8:35; Hebrew lacks and Ahaz
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And Ahaz fathered '
  - type: note
    content: '[ch. 8:36]'
  - type: text
    content: 'Jarah, and Jarah fathered Alemeth, Azmaveth, and Zimri. And Zimri fathered Moza. '
  '43':
  - type: text
    content: 'Moza fathered Binea, and '
  - type: note
    content: '[ch. 8:37]'
  - type: text
    content: 'Rephaiah was his son, Eleasah his son, Azel his son. '
  '44':
  - type: text
    content: 'Azel had six sons and these are their names: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan; these were the sons of Azel.'
  '5':
  - type: text
    content: 'And of the Shilonites: Asaiah the firstborn, and his sons. '
  '6':
  - type: text
    content: 'Of the sons of Zerah: Jeuel and their kinsmen, 690. '
  '7':
  - type: text
    content: 'Of the Benjaminites: Sallu the son of Meshullam, son of Hodaviah, son of Hassenuah, '
  '8':
  - type: text
    content: 'Ibneiah the son of Jeroham, Elah the son of Uzzi, son of Michri, and Meshullam the son of Shephatiah, son of Reuel, son of Ibnijah; '
  '9':
  - type: text
    content: 'and their kinsmen according to their generations, '
  - type: note
    content: '[Neh. 11:8]'
  - type: text
    content: '956. All these were heads of fathers’ houses according '
  - type: note
    content: '[2 Chr. 35:4, 5]'
  - type: text
    content: to their fathers’ houses.
