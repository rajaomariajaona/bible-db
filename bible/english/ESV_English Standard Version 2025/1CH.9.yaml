        children:
        - type: text
          text: Lev. 24:5-8
      marker-yv: yv-n
    - type: text
      text: charge of the showbread, to prepare it every Sabbath.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these, the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:1
      marker-yv: yv-n
    - type: text
      text: 'singers, the heads of fathers’ houses of the Levites, were in the chambers of the temple free from other service, for they were on duty day and night. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were heads of fathers’ houses of the Levites, according to their generations, leaders. These lived in Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Genealogy Repeated
    marker-yv: yv-h
  '35':
  - type: usfm
