document_id: ECC.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Time for Everything
  - type: text
    content: 'For everything there is a season, and '
  - type: note
    content: ver. 17; ch. 8:6
  - type: text
    content: 'a time for every matter under heaven:'
  '10':
  - type: text
    content: 'I have seen '
  - type: note
    content: See ch. 1:13
  - type: text
    content: 'the business that '
  - type: note
    content: See Gen. 3:17-19
  - type: text
    content: 'God has given to the children of man to be busy with. '
  '11':
  - type: text
    content: 'He has '
  - type: note
    content: '[Gen. 1:31]'
  - type: text
    content: 'made everything beautiful in its time. Also, he has put eternity into man’s heart, yet so that he cannot '
  - type: note
    content: ch. 8:17; [Job 5:9; Rom. 11:33]
  - type: text
    content: 'find out what God has done from the beginning to the end. '
  '12':
  - type: text
    content: 'I perceived that there is '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'nothing better for them than to be joyful and to '
  - type: note
    content: Ps. 34:14; 37:3
  - type: text
    content: 'do good as long as they live; '
  '13':
  - type: text
    content: 'also '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'that everyone should eat and drink and take pleasure in all his toil—this is '
  - type: note
    content: '[ch. 2:24; 5:19]'
  - type: text
    content: God’s gift to man.
  '14':
  - type: text
    content: 'I perceived that whatever God does endures forever; '
  - type: note
    content: '[James 1:17]'
  - type: text
    content: 'nothing can be added to it, nor anything taken from it. God has done it, so that people fear before him. '
  '15':
  - type: text
    content: 'That which is, '
  - type: note
    content: '[ch. 1:9]'
  - type: text
    content: 'already has been; that which is to be, already has been; and God '
  - type: note
    content: '[ch. 12:14]'
  - type: text
    content: seeks what has been driven away.
  - type: note
    content: Hebrew what has been pursued
  - type: heading
    content: From Dust to Dust
  '16':
  - type: text
    content: 'Moreover, '
  - type: note
    content: ch. 4:1
  - type: text
    content: 'I saw under the sun that in the place of justice, even '
  - type: note
    content: ch. 5:8; [ch. 4:1]
  - type: text
    content: 'there was wickedness, and in the place of righteousness, even there was wickedness. '
  '17':
  - type: text
    content: 'I said in my heart, '
  - type: note
    content: Matt. 16:27; 2 Cor. 5:10; See Rom. 2:6-11; 2 Thess. 1:6-10
  - type: text
    content: 'God will judge the righteous and the wicked, for there is '
  - type: note
    content: ver. 1; ch. 8:6
  - type: text
    content: 'a time for every matter and for every work. '
  '18':
  - type: text
    content: 'I said in my heart with regard to the children of man that God is testing them that they may see that they themselves are but '
  - type: note
    content: Ps. 49:12, 20; 73:22
  - type: text
    content: 'beasts. '
  '19':
  - type: note
    content: See ch. 2:14
  - type: text
    content: For what happens to the children of man and what happens to the beasts is the same; as one dies, so dies the other. They all have the same breath, and man has no advantage over the beasts, for all is vanity.
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (see note on 1:2)
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'a time to be born, and a time to '
  - type: note
    content: Heb. 9:27
  - type: text
    content: die;
  - type: text
    content: a time to plant, and a time to pluck up what is planted;
  '20':
  - type: text
    content: 'All go to one place. All are from '
  - type: note
    content: ch. 12:7; Gen. 3:19
  - type: text
    content: 'the dust, and to dust all return. '
  '21':
  - type: text
    content: 'Who knows whether '
  - type: note
    content: '[ch. 12:7]'
  - type: text
    content: 'the spirit of man goes upward and the spirit of the beast goes down into the earth? '
  '22':
  - type: text
    content: 'So I saw that there is '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'nothing better than that a man should rejoice in his work, for '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'that is his lot. Who can bring him to see '
  - type: note
    content: ch. 2:19; 6:12; 8:7; 10:14
  - type: text
    content: what will be after him?
  '3':
  - type: text
    content: a time to kill, and a time to heal;
  - type: text
    content: a time to break down, and a time to build up;
  '4':
  - type: text
    content: 'a time to '
  - type: note
    content: '[Rom. 12:15]'
  - type: text
    content: weep, and a time to laugh;
  - type: text
    content: 'a time to mourn, and a time to '
  - type: note
    content: '[2 Sam. 6:14]; See Ex. 15:20'
  - type: text
    content: dance;
  '5':
  - type: text
    content: 'a time to '
  - type: note
    content: '[2 Kgs. 3:25]'
  - type: text
    content: 'cast away stones, and a time to '
  - type: note
    content: '[Isa. 5:2]'
  - type: text
    content: gather stones together;
  - type: text
    content: 'a time to embrace, and a time to '
  - type: note
    content: '[Joel 2:16]'
  - type: text
    content: refrain from embracing;
  '6':
  - type: text
    content: 'a time to seek, and a time to '
  - type: note
    content: '[Matt. 10:39]'
  - type: text
    content: lose;
  - type: text
    content: 'a time to keep, and a time to '
  - type: note
    content: '[Prov. 11:24]'
  - type: text
    content: cast away;
  '7':
  - type: text
    content: 'a time to '
  - type: note
    content: See Gen. 37:29
  - type: text
    content: tear, and a time to sew;
  - type: text
    content: 'a time to '
  - type: note
    content: Amos 5:13
  - type: text
    content: keep silence, and a time to speak;
  '8':
  - type: text
    content: 'a time to love, and a time to '
  - type: note
    content: '[Luke 14:26]'
  - type: text
    content: hate;
  - type: text
    content: a time for war, and a time for peace.
  - type: heading
    content: The God-Given Task
  '9':
  - type: text
    content: 'What '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'gain has the worker from his toil? '
