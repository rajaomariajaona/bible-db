document_id: PSA.49,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Why Should I Fear in Times of Trouble?
  - type: text
    content: 'To the choirmaster. A Psalm of '
  - type: note
    content: Ps. 42, title
  - type: text
    content: the Sons of Korah.
  - type: text
    content: ' '
  - type: note
    content: Ps. 78:1; Isa. 1:2; Mic. 1:2
  - type: text
    content: Hear this, all peoples!
  - type: text
    content: Give ear, all inhabitants of the world,
  '10':
  - type: text
    content: 'For he sees '
  - type: note
    content: Eccles. 2:16
  - type: text
    content: that even the wise die;
  - type: note
    content: Ps. 73:22; 92:6; 94:8; Prov. 30:2
  - type: text
    content: the fool and the stupid alike must perish
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 39:6
  - type: text
    content: leave their wealth to others.
  '11':
  - type: text
    content: 'Their '
  - type: note
    content: Ps. 5:9; 64:6
  - type: text
    content: graves are their homes forever,
  - type: note
    content: Septuagint, Syriac, Targum; Hebrew Their inward thought was that their homes were forever
  - type: text
    content: 'their dwelling places '
  - type: note
    content: Ps. 10:6
  - type: text
    content: to all generations,
  - type: text
    content: 'though they '
  - type: note
    content: '[Gen. 4:17]'
  - type: text
    content: called lands by their own names.
  '12':
  - type: text
    content: 'Man in his pomp '
  - type: note
    content: ver. 20; [Ps. 39:5; 82:7]
  - type: text
    content: will not remain;
  - type: note
    content: ver. 20 ; Eccles. 3:19
  - type: text
    content: he is like the beasts that perish.
  '13':
  - type: text
    content: 'This is the path of those who have '
  - type: note
    content: '[Luke 12:20]'
  - type: text
    content: foolish confidence;
  - type: text
    content: yet after them people approve of their boasts.
  - type: note
    content: Or and of those after them who approve of their boasts
  - type: text
    content: ' '
  - type: text
    content: Selah
  '14':
  - type: text
    content: Like sheep they are appointed for Sheol;
  - type: text
    content: death shall be their shepherd,
  - type: text
    content: 'and the upright '
  - type: note
    content: '[Dan. 7:22; Mal. 4:3; Luke 22:30; 1 Cor. 6:2; Rev. 2:26; 20:4]'
  - type: text
    content: shall rule over them in the morning.
  - type: note
    content: Ps. 39:11
  - type: text
    content: 'Their form shall be consumed '
  - type: note
    content: Job 24:19, 20
  - type: text
    content: in Sheol, with no place to dwell.
  '15':
  - type: text
    content: 'But God will '
  - type: note
    content: Hos. 13:14; [Dan. 12:2]
  - type: text
    content: ransom my soul from the power of Sheol,
  - type: text
    content: 'for he will '
  - type: note
    content: Ps. 16:11; 17:15; 73:24; [Gen. 5:24]
  - type: text
    content: 'receive me. '
  - type: text
    content: Selah
  '16':
  - type: text
    content: Be not afraid when a man becomes rich,
  - type: text
    content: when the glory of his house increases.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 27:19 ]'
  - type: text
    content: 'For when he dies he will '
  - type: note
    content: 1 Tim. 6:7
  - type: text
    content: carry nothing away;
  - type: text
    content: his glory will not go down after him.
  '18':
  - type: text
    content: 'For though, while he lives, he counts himself '
  - type: note
    content: Ps. 10:3; 36:2; Deut. 29:19; Luke 12:19
  - type: text
    content: blessed—
  - type: text
    content: and though you get praise when you do well for yourself—
  '19':
  - type: text
    content: 'his soul will '
  - type: note
    content: Gen. 15:15
  - type: text
    content: go to the generation of his fathers,
  - type: text
    content: 'who will never again '
  - type: note
    content: Ps. 56:13; Job 33:30
  - type: text
    content: see light.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 62:9
  - type: text
    content: both low and high,
  - type: text
    content: rich and poor together!
  '20':
  - type: text
    content: ' '
  - type: note
    content: ver. 12
  - type: text
    content: Man in his pomp yet without understanding is like the beasts that perish.
  '3':
  - type: text
    content: 'My mouth shall speak '
  - type: note
    content: Prov. 1:20; 9:1
  - type: text
    content: wisdom;
  - type: text
    content: the meditation of my heart shall be understanding.
  '4':
  - type: text
    content: 'I will incline my ear to '
  - type: note
    content: '[Ps. 78:2; Matt. 13:35]'
  - type: text
    content: a proverb;
  - type: text
    content: 'I will solve my '
  - type: note
    content: Num. 12:8; Prov. 1:6
  - type: text
    content: riddle to the music of the lyre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 37:1 ]'
  - type: text
    content: 'Why should I fear in '
  - type: note
    content: Ps. 94:13
  - type: text
    content: times of trouble,
  - type: text
    content: when the iniquity of those who cheat me surrounds me,
  '6':
  - type: text
    content: 'those who '
  - type: note
    content: Ps. 52:7; Prov. 11:28; Mark 10:24, 25; [Job 31:24]
  - type: text
    content: trust in their wealth
  - type: text
    content: and boast of the abundance of their riches?
  '7':
  - type: text
    content: 'Truly no man '
  - type: note
    content: '[Matt. 25:9]'
  - type: text
    content: can ransom another,
  - type: text
    content: 'or '
  - type: note
    content: '[Matt. 16:26]'
  - type: text
    content: 'give to God '
  - type: note
    content: See Job 33:24
  - type: text
    content: the price of his life,
  '8':
  - type: text
    content: 'for '
  - type: note
    content: Job 36:18, 19
  - type: text
    content: the ransom of their life is costly
  - type: text
    content: and can never suffice,
  '9':
  - type: text
    content: that he should live on forever
  - type: text
    content: 'and '
  - type: note
    content: Ps. 16:10; [Ps. 89:48]
  - type: text
    content: never see the pit.
