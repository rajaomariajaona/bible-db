document_id: 2CH.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: Ch 13:23 in Hebrew
  - type: note
    content: '[1 Kgs. 15:8]'
  - type: text
    content: 'Abijah slept with his fathers, and they buried him in the city of David. And Asa his son reigned in his place. In his days the land had rest for ten years. '
  '10':
  - type: text
    content: 'And Asa went out to meet him, and '
  - type: note
    content: ch. 13:3
  - type: text
    content: 'they drew up their lines of battle in the Valley of Zephathah at '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Mareshah. '
  '11':
  - type: text
    content: 'And Asa '
  - type: note
    content: ch. 13:14; Ex. 14:10
  - type: text
    content: 'cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, “O '
  - type: text
    content: Lord
  - type: text
    content: ', there is none like you to help, between the mighty and the weak. Help us, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: ch. 13:18
  - type: text
    content: 'for we rely on you, '
  - type: note
    content: '[1 Sam. 17:45]'
  - type: text
    content: 'and in your name we have come against this multitude. O '
  - type: text
    content: Lord
  - type: text
    content: ', you are our God; let not man prevail against you.” '
  '12':
  - type: note
    content: ch. 13:15
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' defeated the Ethiopians before Asa and before Judah, and the Ethiopians fled. '
  '13':
  - type: text
    content: 'Asa and the people who were with him pursued them as far as '
  - type: note
    content: Gen. 10:19; 20:1; 26:1, 6
  - type: text
    content: 'Gerar, and the Ethiopians fell until none remained alive, for they were broken before the '
  - type: text
    content: Lord
  - type: text
    content: ' and his army. The men of Judah'
  - type: note
    content: Hebrew They
  - type: text
    content: ' carried away very much spoil. '
  '14':
  - type: text
    content: 'And they attacked all the cities around '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'Gerar, '
  - type: note
    content: ch. 17:10; 20:29; [Gen. 35:5]
  - type: text
    content: 'for the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon them. They plundered all the cities, for there was much plunder in them. '
  '15':
  - type: text
    content: And they struck down the tents of those who had livestock and carried away sheep in abundance and camels. Then they returned to Jerusalem.
  '2':
  - type: note
    content: Ch 14:1 in Hebrew
  - type: text
    content: ' And Asa did what was good and right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '3':
  - type: text
    content: 'He took away the foreign altars '
  - type: note
    content: '[ch. 15:17; 1 Kgs. 15:14]'
  - type: text
    content: 'and the high places and broke down '
  - type: note
    content: See Ex. 23:24
  - type: text
    content: 'the pillars and cut down the '
  - type: note
    content: Ex. 34:13
  - type: text
    content: 'Asherim '
  '4':
  - type: text
    content: 'and commanded Judah to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, and to keep the law and the commandment. '
  '5':
  - type: text
    content: 'He also took out of all the cities of Judah '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the high places and the '
  - type: note
    content: ch. 34:4, 7; Lev. 26:30; Isa. 17:8; 27:9; Ezek. 6:4, 6
  - type: text
    content: 'incense altars. And the kingdom had rest under him. '
  '6':
  - type: text
    content: 'He built '
  - type: note
    content: See ch. 11:5
  - type: text
    content: 'fortified cities in Judah, for the land had rest. He had no war in those years, '
  - type: note
    content: ch. 15:15; 20:30
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him peace. '
  '7':
  - type: text
    content: 'And he said to Judah, “Let us build these cities and surround them with '
  - type: note
    content: ch. 8:5
  - type: text
    content: 'walls and towers, gates and bars. The land is still ours, because we have sought the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. We have sought him, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'and he has given us peace on every side.” So they built and prospered. '
  '8':
  - type: text
    content: 'And Asa had an army of '
  - type: note
    content: '[ch. 13:3]'
  - type: text
    content: 300,000 from Judah, armed with large shields and spears, and 280,000 men from Benjamin that carried shields and drew bows. All these were mighty men of valor.
  '9':
  - type: text
    content: 'Zerah '
  - type: note
    content: ch. 12:3; 16:8
  - type: text
    content: 'the Ethiopian came out against them with an army of a million men and 300 chariots, and came as far as '
  - type: note
    content: ch. 11:8; Josh. 15:44
  - type: text
    content: 'Mareshah. '
