document_id: JER.9,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ch 8:23 in Hebrew
  - type: note
    content: See ch. 13:17
  - type: text
    content: Oh that my head were waters,
  - type: text
    content: and my eyes a fountain of tears,
  - type: text
    content: that I might weep day and night
  - type: text
    content: 'for the slain of '
  - type: note
    content: '[See ch. 8:21 above]'
  - type: text
    content: the daughter of my people!
  '10':
  - type: text
    content: “I will take up weeping and wailing for the mountains,
  - type: text
    content: 'and a lamentation for '
  - type: note
    content: ch. 12:4; Ps. 65:12
  - type: text
    content: the pastures of the wilderness,
  - type: note
    content: ver. 12
  - type: text
    content: because they are laid waste so that no one passes through,
  - type: text
    content: and the lowing of cattle is not heard;
  - type: note
    content: ch. 4:25
  - type: text
    content: both the birds of the air and the beasts
  - type: text
    content: have fled and are gone.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Isa. 25:2
  - type: text
    content: I will make Jerusalem a heap of ruins,
  - type: note
    content: ch. 10:22; 49:33; 51:37
  - type: text
    content: a lair of jackals,
  - type: note
    content: ch. 34:22; 44:6
  - type: text
    content: and I will make the cities of Judah a desolation,
  - type: text
    content: without inhabitant.”
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:18; Ps. 107:43; Hos. 14:9
  - type: text
    content: 'Who is the man so wise that he can understand this? To whom has the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken, that he may declare it? Why is the land ruined '
  - type: note
    content: ver. 10
  - type: text
    content: 'and laid waste like a wilderness, so that no one passes through? '
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' says: '
  - type: note
    content: '[Ps. 89:30-32]'
  - type: text
    content: '“Because they have forsaken my law that I set before them, and have not obeyed my voice or walked in accord with it, '
  '14':
  - type: text
    content: 'but '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'have stubbornly followed their own hearts and have gone after the Baals, as their fathers taught them. '
  '15':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: Deut. 29:18; [Ps. 80:5]
  - type: text
    content: 'Behold, I will feed this people with bitter food, and give them '
  - type: note
    content: See ch. 8:14
  - type: text
    content: 'poisonous water to drink. '
  '16':
  - type: note
    content: Lev. 26:33; Deut. 28:64
  - type: text
    content: 'I will scatter them among the nations '
  - type: note
    content: ch. 15:14
  - type: text
    content: 'whom neither they nor their fathers have known, and I will '
  - type: note
    content: ch. 14:12; [ch. 49:37; Ezek. 5:2, 12]
  - type: text
    content: send the sword after them, until I have consumed them.”
  '17':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: note
    content: '[ 2 Chr. 35:25 ]'
  - type: text
    content: “Consider, and call for the mourning women to come;
  - type: text
    content: send for the skillful women to come;
  '18':
  - type: text
    content: 'let them make haste '
  - type: note
    content: Amos 5:16; [Matt. 9:23; Mark 5:38]
  - type: text
    content: and raise a wailing over us,
  - type: note
    content: ver. 1 ; ch. 14:17
  - type: text
    content: that our eyes may run down with tears
  - type: text
    content: and our eyelids flow with water.
  '19':
  - type: text
    content: 'For a sound of wailing is heard from Zion:'
  - type: note
    content: ch. 4:13
  - type: text
    content: ‘How we are ruined!
  - type: text
    content: We are utterly shamed,
  - type: text
    content: because we have left the land,
  - type: text
    content: because they have cast down our dwellings.’”
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 9:1 in Hebrew
  - type: text
    content: Oh that I had in the desert
  - type: text
    content: a travelers’ lodging place,
  - type: text
    content: that I might leave my people
  - type: text
    content: and go away from them!
  - type: text
    content: 'For they are all '
  - type: note
    content: ch. 5:7, 8; 23:10; Hos. 7:4
  - type: text
    content: adulterers,
  - type: text
    content: 'a company of '
  - type: note
    content: Isa. 21:2
  - type: text
    content: treacherous men.
  '20':
  - type: text
    content: 'Hear, O women, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and let your ear receive the word of his mouth;
  - type: text
    content: teach to your daughters a lament,
  - type: text
    content: and each to her neighbor a dirge.
  '21':
  - type: text
    content: For death has come up into our windows;
  - type: text
    content: it has entered our palaces,
  - type: note
    content: ch. 6:11
  - type: text
    content: cutting off the children from the streets
  - type: text
    content: and the young men from the squares.
  '22':
  - type: text
    content: 'Speak: “Thus declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: See ch. 8:2
  - type: text
    content: ‘The dead bodies of men shall fall
  - type: text
    content: like dung upon the open field,
  - type: note
    content: '[ Lev. 23:22; Job 5:26 ]'
  - type: text
    content: like sheaves after the reaper,
  - type: text
    content: and none shall gather them.’”
  '23':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Prov. 3:5; 21:30; Eccles. 9:11
  - type: text
    content: '“Let not the wise man boast in his wisdom, let not the mighty man boast in his might, let not the rich man boast in his riches, '
  '24':
  - type: text
    content: 'but '
  - type: note
    content: '[Ps. 34:2; 1 Cor. 1:31; 2 Cor. 10:17]'
  - type: text
    content: 'let him who boasts boast in this, that he understands and knows me, that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who practices steadfast love, justice, and righteousness in the earth. '
  - type: note
    content: '[Mic. 6:8; 7:18]'
  - type: text
    content: 'For in these things I delight, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '25':
  - type: text
    content: '“Behold, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when '
  - type: note
    content: '[Isa. 24:21]'
  - type: text
    content: 'I will punish all those who are circumcised merely in the flesh— '
  '26':
  - type: note
    content: '[ch. 25:19-21]'
  - type: text
    content: 'Egypt, Judah, Edom, the sons of Ammon, Moab, and '
  - type: note
    content: ch. 25:23; 49:32; [Lev. 19:27]
  - type: text
    content: 'all who dwell in the desert who cut the corners of their hair, for all these nations are uncircumcised, and all the house of Israel are '
  - type: note
    content: Lev. 26:41; Deut. 10:16; Ezek. 44:7; Rom. 2:28, 29; [ch. 4:4]
  - type: text
    content: uncircumcised in heart.”
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 64:3 ]'
  - type: text
    content: They bend their tongue like a bow;
  - type: text
    content: falsehood and not truth has grown strong
  - type: note
    content: Septuagint; Hebrew and not for truth they have grown strong
  - type: text
    content: ' in the land;'
  - type: text
    content: for they proceed from evil to evil,
  - type: note
    content: '[ Judg. 2:10; Hos. 4:1 ]'
  - type: text
    content: 'and they do not know me, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:6; Ps. 41:9; Mic. 7:5
  - type: text
    content: Let everyone beware of his neighbor,
  - type: text
    content: and put no trust in any brother,
  - type: text
    content: 'for every '
  - type: note
    content: '[Gen. 27:36]'
  - type: text
    content: brother is a deceiver,
  - type: text
    content: 'and every neighbor '
  - type: note
    content: ch. 6:28; [Lev. 19:16]
  - type: text
    content: goes about as a slanderer.
  '5':
  - type: text
    content: Everyone deceives his neighbor,
  - type: text
    content: and no one speaks the truth;
  - type: text
    content: they have taught their tongue to speak lies;
  - type: text
    content: they weary themselves committing iniquity.
  '6':
  - type: text
    content: Heaping oppression upon oppression, and deceit upon deceit,
  - type: note
    content: ch. 8:5
  - type: text
    content: 'they refuse to know me, declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: text
    content: '“Behold, '
  - type: note
    content: Isa. 1:25
  - type: text
    content: 'I will refine them and '
  - type: note
    content: ch. 6:27
  - type: text
    content: test them,
  - type: text
    content: 'for what else can I do, '
  - type: note
    content: '[See ch. 8:21 above]'
  - type: text
    content: because of my people?
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 57:4 ]'
  - type: text
    content: Their tongue is a deadly arrow;
  - type: note
    content: '[ Ps. 12:2; 120:3 ]'
  - type: text
    content: it speaks deceitfully;
  - type: text
    content: 'with his mouth '
  - type: note
    content: Ps. 28:3
  - type: text
    content: each speaks peace to his neighbor,
  - type: text
    content: 'but in his heart '
  - type: note
    content: Hos. 7:6
  - type: text
    content: he plans an ambush for him.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:9, 29
  - type: text
    content: 'Shall I not punish them for these things? declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and shall I not avenge myself
  - type: text
    content: on a nation such as this?
