        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' long and five cubits broad. The altar shall be square, and its height shall be three cubits. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Its twenty pillars and their twenty bases shall be of bronze, but the hooks of the pillars and their fillets shall be of silver. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And likewise for its length on the north side there shall be hangings a hundred cubits long, its pillars twenty and their bases twenty, of bronze, but the hooks of the pillars and their fillets shall be of silver. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the breadth of the court on the west side there shall be hangings for fifty cubits, with ten pillars and ten bases. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The breadth of the court on the front to the east shall be fifty cubits. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hangings for the one side of the gate shall be fifteen cubits, with their three pillars and three bases. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the other side the hangings shall be fifteen cubits, with their three pillars and three bases. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the gate of the court there shall be '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:36
      marker-yv: yv-n
    - type: text
      text: 'a screen twenty cubits long, of blue and purple and scarlet yarns and fine twined linen, embroidered with needlework. It shall have four pillars and with them four bases. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the pillars around the court shall be filleted with silver. Their hooks shall be of silver, and their bases of bronze. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The length of the court shall be a hundred cubits, the breadth fifty, and the height five cubits, with hangings of fine twined linen and bases of bronze. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the utensils of the tabernacle for every use, and all its pegs and all the pegs of the court, shall be of bronze.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Oil for the Lamp
    marker-yv: yv-h
