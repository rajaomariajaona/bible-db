document_id: EXO.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bronze Altar
  - type: text
    content: '“You shall make the '
  - type: note
    content: For ver. 1-8, see ch. 38:1-7; [Ezek. 43:13]
  - type: text
    content: altar of acacia wood, five cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' long and five cubits broad. The altar shall be square, and its height shall be three cubits. '
  '10':
  - type: text
    content: 'Its twenty pillars and their twenty bases shall be of bronze, but the hooks of the pillars and their fillets shall be of silver. '
  '11':
  - type: text
    content: 'And likewise for its length on the north side there shall be hangings a hundred cubits long, its pillars twenty and their bases twenty, of bronze, but the hooks of the pillars and their fillets shall be of silver. '
  '12':
  - type: text
    content: 'And for the breadth of the court on the west side there shall be hangings for fifty cubits, with ten pillars and ten bases. '
  '13':
  - type: text
    content: 'The breadth of the court on the front to the east shall be fifty cubits. '
  '14':
  - type: text
    content: 'The hangings for the one side of the gate shall be fifteen cubits, with their three pillars and three bases. '
  '15':
  - type: text
    content: 'On the other side the hangings shall be fifteen cubits, with their three pillars and three bases. '
  '16':
  - type: text
    content: 'For the gate of the court there shall be '
  - type: note
    content: ch. 26:36
  - type: text
    content: 'a screen twenty cubits long, of blue and purple and scarlet yarns and fine twined linen, embroidered with needlework. It shall have four pillars and with them four bases. '
  '17':
  - type: text
    content: 'All the pillars around the court shall be filleted with silver. Their hooks shall be of silver, and their bases of bronze. '
  '18':
  - type: text
    content: 'The length of the court shall be a hundred cubits, the breadth fifty, and the height five cubits, with hangings of fine twined linen and bases of bronze. '
  '19':
  - type: text
    content: All the utensils of the tabernacle for every use, and all its pegs and all the pegs of the court, shall be of bronze.
  - type: heading
    content: Oil for the Lamp
  '2':
  - type: text
    content: 'And you shall make '
  - type: note
    content: ch. 29:12; 30:2; [Lev. 4:7, 30; 1 Kgs. 1:50; Ps. 118:27]
  - type: text
    content: 'horns for it on its four corners; its horns shall be of one piece with it, and '
  - type: note
    content: '[Num. 16:38]'
  - type: text
    content: 'you shall overlay it with bronze. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Lev. 24:1-4
  - type: text
    content: '“You shall command the people of Israel that they bring to you pure beaten olive oil for the light, that a lamp may regularly be set up to burn. '
  '21':
  - type: note
    content: ch. 25:22; 29:42; 30:36
  - type: text
    content: 'In the tent of meeting, '
  - type: note
    content: See ch. 26:31
  - type: text
    content: 'outside the veil that is before the testimony, Aaron and his sons shall tend it from evening to morning before the '
  - type: text
    content: Lord
  - type: text
    content: . It shall be a statute forever to be observed throughout their generations by the people of Israel.
  '3':
  - type: text
    content: 'You shall make pots for it to receive its ashes, and shovels and basins and '
  - type: note
    content: '[1 Sam. 2:13]'
  - type: text
    content: 'forks and fire pans. You shall make all its utensils of bronze. '
  '4':
  - type: text
    content: 'You shall also make for it a grating, a network of bronze, and on the net you shall make four bronze rings at its four corners. '
  '5':
  - type: text
    content: 'And you shall set it under the ledge of the altar so that the net extends halfway down the altar. '
  '6':
  - type: text
    content: 'And you shall make poles for the altar, poles of acacia wood, and overlay them with bronze. '
  '7':
  - type: text
    content: 'And the poles shall be put through the rings, so that the poles are on the two sides of the altar when it is carried. '
  '8':
  - type: text
    content: 'You shall make it hollow, with boards. '
  - type: note
    content: See ch. 25:40
  - type: text
    content: As it has been shown you on the mountain, so shall it be made.
  - type: heading
    content: The Court of the Tabernacle
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-19, see ch. 38:9-20
  - type: text
    content: '“You shall make the court of the tabernacle. On the south side the court shall have hangings of fine twined linen a hundred cubits long for one side. '
