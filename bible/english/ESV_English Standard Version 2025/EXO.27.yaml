          text: Num. 16:38
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'you shall overlay it with bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 24:1-4
      marker-yv: yv-n
    - type: text
      text: '“You shall command the people of Israel that they bring to you pure beaten olive oil for the light, that a lamp may regularly be set up to burn. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:42
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:36
      marker-yv: yv-n
    - type: text
      text: 'In the tent of meeting, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:31
      marker-yv: yv-n
    - type: text
      text: 'outside the veil that is before the testimony, Aaron and his sons shall tend it from evening to morning before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . It shall be a statute forever to be observed throughout their generations by the people of Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make pots for it to receive its ashes, and shovels and basins and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 2:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'forks and fire pans. You shall make all its utensils of bronze. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall also make for it a grating, a network of bronze, and on the net you shall make four bronze rings at its four corners. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall set it under the ledge of the altar so that the net extends halfway down the altar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall make poles for the altar, poles of acacia wood, and overlay them with bronze. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the poles shall be put through the rings, so that the poles are on the two sides of the altar when it is carried. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make it hollow, with boards. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:40
      marker-yv: yv-n
    - type: text
      text: As it has been shown you on the mountain, so shall it be made.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Court of the Tabernacle
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 9-19, see ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:9-20
      marker-yv: yv-n
    - type: text
      text: '“You shall make the court of the tabernacle. On the south side the court shall have hangings of fine twined linen a hundred cubits long for one side. '
