      marker-yv: yv-n
    - type: text
      text: 'horns for it on its four corners; its horns shall be of one piece with it, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
