document_id: EZK.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel’s Call
  - type: text
    content: 'And he said to me, '
  - type: note
    content: ch. 3:1, 3, 4, 17, 25; 4:1, 16; 5:1
  - type: text
    content: “Son of man,
  - type: note
    content: Or Son of Adam; so throughout Ezekiel
  - type: text
    content: ' '
  - type: note
    content: Dan. 10:11
  - type: text
    content: 'stand on your feet, and I will speak with you.” '
  '10':
  - type: text
    content: 'And he spread it before me. And it had writing '
  - type: note
    content: Rev. 5:1
  - type: text
    content: on the front and on the back, and there were written on it words of lamentation and mourning and woe.
  '2':
  - type: text
    content: 'And as he spoke to me, '
  - type: note
    content: ch. 3:24
  - type: text
    content: 'the Spirit entered into me and '
  - type: note
    content: ch. 3:24; Dan. 8:18
  - type: text
    content: 'set me on my feet, and I heard him speaking to me. '
  '3':
  - type: text
    content: 'And he said to me, “Son of man, I send you to the people of Israel, to '
  - type: note
    content: '[ver. 5, 6, 8; ch. 3:26; 24:3; 44:6]'
  - type: text
    content: 'nations of rebels, who have rebelled against me. '
  - type: note
    content: ch. 20:16, 18, 21
  - type: text
    content: 'They and their fathers have transgressed against me to this very day. '
  '4':
  - type: text
    content: 'The descendants also are '
  - type: note
    content: '[ch. 3:7]'
  - type: text
    content: 'impudent and stubborn: I send you to them, and you shall say to them, ‘Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: '.’ '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:11; [ch. 3:27; 17:12]
  - type: text
    content: 'whether they hear or refuse to hear (for they are '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'a rebellious house) '
  - type: note
    content: ch. 33:33
  - type: text
    content: 'they will know that a prophet has been among them. '
  '6':
  - type: text
    content: 'And you, son of man, '
  - type: note
    content: ch. 3:9; Jer. 1:8
  - type: text
    content: 'be not afraid of them, nor be afraid of their words, '
  - type: note
    content: '[ch. 28:24; 2 Sam. 23:6; Mic. 7:4]'
  - type: text
    content: 'though briers and thorns are with you and you sit on '
  - type: note
    content: '[Deut. 8:15]'
  - type: text
    content: scorpions.
  - type: note
    content: Or on scorpion plants
  - type: text
    content: ' Be not afraid of their words, nor be dismayed at their looks, for they are a rebellious house. '
  '7':
  - type: text
    content: 'And you shall speak my words to them, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: whether they hear or refuse to hear, for they are a rebellious house.
  '8':
  - type: text
    content: '“But you, son of man, hear what I say to you. '
  - type: note
    content: '[Isa. 50:5]'
  - type: text
    content: 'Be not rebellious like that rebellious house; open your mouth and '
  - type: note
    content: Rev. 10:9; [ch. 3:1, 3]
  - type: text
    content: 'eat what I give you.” '
  '9':
  - type: text
    content: 'And when I looked, behold, '
  - type: note
    content: ch. 8:3; Dan. 10:10; Rev. 10:2
  - type: text
    content: 'a hand was stretched out to me, and behold, '
  - type: note
    content: Jer. 36:2
  - type: text
    content: 'a scroll of a book was in it. '
