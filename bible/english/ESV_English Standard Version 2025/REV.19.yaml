document_id: REV.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rejoicing in Heaven
  - type: text
    content: 'After this I heard '
  - type: note
    content: See ch. 11:15
  - type: text
    content: what seemed to be the loud voice of a great multitude in heaven, crying out,
  - type: text
    content: “Hallelujah!
  - type: note
    content: ch. 4:11; 7:10; 12:10
  - type: text
    content: Salvation and glory and power belong to our God,
  '10':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 22:8
  - type: text
    content: 'I fell down at his feet to worship him, '
  - type: note
    content: ch. 22:9; See Acts 10:26
  - type: text
    content: 'but he said to me, “You must not do that! I am a fellow servant with you and your brothers who hold to '
  - type: note
    content: ch. 1:2; 6:9; 12:17
  - type: text
    content: the testimony of Jesus. Worship God.” For the testimony of Jesus is the spirit of prophecy.
  - type: heading
    content: The Rider on a White Horse
  '11':
  - type: text
    content: 'Then I saw '
  - type: note
    content: See Ezek. 1:1
  - type: text
    content: 'heaven opened, and behold, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'a white horse! The one sitting on it is called '
  - type: note
    content: See ch. 3:7, 14
  - type: text
    content: 'Faithful and True, and '
  - type: note
    content: '[Ps. 96:13; Isa. 11:4]'
  - type: text
    content: 'in righteousness he judges and makes war. '
  '12':
  - type: note
    content: ch. 1:14; 2:18
  - type: text
    content: 'His eyes are like a flame of fire, and on his head are '
  - type: note
    content: '[ch. 12:3]'
  - type: text
    content: 'many diadems, and he has '
  - type: note
    content: ver. 16; ch. 2:17; [Prov. 30:4]
  - type: text
    content: 'a name written that no one knows but himself. '
  '13':
  - type: text
    content: 'He is clothed in '
  - type: note
    content: Isa. 63:2, 3
  - type: text
    content: a robe dipped in
  - type: note
    content: Some manuscripts sprinkled with
  - type: text
    content: ' blood, and the name by which he is called is '
  - type: note
    content: See John 1:1
  - type: text
    content: 'The Word of God. '
  '14':
  - type: text
    content: 'And the armies of heaven, '
  - type: note
    content: ch. 3:4; 7:9
  - type: text
    content: 'arrayed in fine linen, white and pure, '
  - type: note
    content: '[ch. 14:20]'
  - type: text
    content: 'were following him on white horses. '
  '15':
  - type: note
    content: ver. 21; See ch. 1:16
  - type: text
    content: 'From his mouth comes a sharp sword '
  - type: note
    content: '[Isa. 11:4; 2 Thess. 2:8]'
  - type: text
    content: 'with which to strike down the nations, and '
  - type: note
    content: ch. 2:27; 12:5
  - type: text
    content: he will rule
  - type: note
    content: Greek shepherd
  - type: text
    content: ' them with a rod of iron. '
  - type: note
    content: ch. 14:20; Isa. 63:3
  - type: text
    content: 'He will tread the winepress of the fury of the wrath of God the Almighty. '
  '16':
  - type: text
    content: 'On his robe and on his thigh '
  - type: note
    content: ver. 12
  - type: text
    content: 'he has a name written, '
  - type: note
    content: See ch. 17:14
  - type: text
    content: King of kings and Lord of lords.
  '17':
  - type: text
    content: 'Then I saw an angel standing in the sun, and with a loud voice he called to '
  - type: note
    content: ver. 21
  - type: text
    content: 'all the birds that fly directly overhead, '
  - type: note
    content: Jer. 12:9; Ezek. 39:17
  - type: text
    content: '“Come, gather for '
  - type: note
    content: '[Isa. 34:6; Jer. 46:10; Ezek. 39:19]'
  - type: text
    content: 'the great supper of God, '
  '18':
  - type: note
    content: Ezek. 39:18, 20
  - type: text
    content: to eat the flesh of kings, the flesh of captains, the flesh of mighty men, the flesh of horses and their riders, and the flesh of all men, both free and slave,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' both small and great.” '
  '19':
  - type: text
    content: 'And I saw '
  - type: note
    content: ch. 11:7; 13:1
  - type: text
    content: 'the beast and the kings of the earth with their armies '
  - type: note
    content: ch. 16:16
  - type: text
    content: 'gathered to make war against him who was sitting on the horse and against his army. '
  '2':
  - type: text
    content: 'for '
  - type: note
    content: ch. 15:3; 16:7
  - type: text
    content: his judgments are true and just;
  - type: text
    content: 'for he has judged '
  - type: note
    content: See ch. 17:1
  - type: text
    content: the great prostitute
  - type: text
    content: who corrupted the earth with her immorality,
  - type: text
    content: 'and '
  - type: note
    content: Deut. 32:43; 2 Kgs. 9:7; [ch. 16:6]; See ch. 6:10
  - type: text
    content: has avenged on her the blood of his servants.”
  '20':
  - type: text
    content: 'And the beast was captured, and with it '
  - type: note
    content: ch. 16:13; 20:10
  - type: text
    content: 'the false prophet '
  - type: note
    content: ch. 13:11-14
  - type: text
    content: who in its presence
  - type: note
    content: Or on its behalf
  - type: text
    content: ' had done the signs by which he deceived those who had received the mark of the beast and those who '
  - type: note
    content: See ch. 13:15
  - type: text
    content: 'worshiped its image. These two were '
  - type: note
    content: ch. 20:10, 14, 15; [Dan. 7:11]
  - type: text
    content: 'thrown alive into the lake of '
  - type: note
    content: ch. 14:10; 21:8; See 2 Thess. 1:8
  - type: text
    content: 'fire that burns with sulfur. '
  '21':
  - type: text
    content: 'And the rest were slain by the sword '
  - type: note
    content: ver. 15
  - type: text
    content: 'that came from the mouth of him who was sitting on the horse, and '
  - type: note
    content: ver. 17
  - type: text
    content: all the birds were gorged with their flesh.
  '3':
  - type: text
    content: Once more they cried out,
  - type: text
    content: “Hallelujah!
  - type: note
    content: ch. 18:9, 18; Isa. 34:10; [ch. 14:11 ]
  - type: text
    content: The smoke from her goes up forever and ever.”
  '4':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:4, 6, 10; 5:14
  - type: text
    content: 'the twenty-four elders and the four living creatures fell down and worshiped God who was seated on the throne, saying, “Amen. Hallelujah!” '
  '5':
  - type: text
    content: And from the throne came a voice saying,
  - type: note
    content: Ps. 22:23; 113:1; 134:1; 135:1
  - type: text
    content: “Praise our God,
  - type: text
    content: all you his servants,
  - type: note
    content: ch. 11:18
  - type: text
    content: you who fear him,
  - type: text
    content: small and great.”
  - type: heading
    content: The Marriage Supper of the Lamb
  '6':
  - type: text
    content: 'Then I heard what seemed to be '
  - type: note
    content: Dan. 10:6; [ver. 1]
  - type: text
    content: 'the voice of a great multitude, like '
  - type: note
    content: See ch. 1:15
  - type: text
    content: 'the roar of many waters and '
  - type: note
    content: ch. 6:1; 14:2
  - type: text
    content: like the sound of mighty peals of thunder, crying out,
  - type: text
    content: “Hallelujah!
  - type: text
    content: For the Lord our God
  - type: text
    content: 'the Almighty '
  - type: note
    content: ch. 11:15, 17; Ps. 97:1
  - type: text
    content: reigns.
  '7':
  - type: text
    content: Let us rejoice and exult
  - type: text
    content: and give him the glory,
  - type: text
    content: 'for '
  - type: note
    content: Matt. 22:2; 25:10; Luke 12:36; 14:8; John 2:1; [Eph. 5:22-32]
  - type: text
    content: the marriage of the Lamb has come,
  - type: text
    content: 'and '
  - type: note
    content: ch. 21:2, 9; [Isa. 54:5; Hos. 2:19, 20]
  - type: text
    content: his Bride has made herself ready;
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 45:13-15; Ezek. 16:10 ]'
  - type: text
    content: it was granted her to clothe herself
  - type: text
    content: with fine linen, bright and pure”—
  - type: text
    content: 'for the fine linen is '
  - type: note
    content: '[Ps. 132:9; Isa. 61:10]'
  - type: text
    content: the righteous deeds of the saints.
  '9':
  - type: text
    content: And the angel said
  - type: note
    content: Greek he said
  - type: text
    content: ' to me, “Write this: '
  - type: note
    content: Luke 14:15; See ver. 7
  - type: text
    content: 'Blessed are those who are invited to the marriage supper of the Lamb.” And he said to me, '
  - type: note
    content: '[ch. 21:5; 22:6]'
  - type: text
    content: '“These are the true words of God.” '
