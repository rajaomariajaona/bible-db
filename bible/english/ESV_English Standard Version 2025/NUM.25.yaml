document_id: NUM.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Baal Worship at Peor
  - type: text
    content: 'While Israel lived in '
  - type: note
    content: ch. 33:49; Josh. 2:1; 3:1; Mic. 6:5
  - type: text
    content: 'Shittim, '
  - type: note
    content: '[ch. 31:16]'
  - type: text
    content: 'the people began to whore with the daughters of Moab. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: '“Phinehas the son of Eleazar, son of Aaron the priest, has turned back my wrath from the people of Israel, in that he '
  - type: note
    content: '[2 Cor. 11:2]'
  - type: text
    content: 'was jealous with my jealousy among them, so that I did not consume the people of Israel in '
  - type: note
    content: Deut. 32:16, 21; 1 Kgs. 14:22; Ps. 78:58; Zeph. 1:18; 3:8; 1 Cor. 10:22; [Ex. 20:5]
  - type: text
    content: 'my jealousy. '
  '12':
  - type: text
    content: 'Therefore say, '
  - type: note
    content: Mal. 2:4, 5
  - type: text
    content: '‘Behold, I give to him my covenant of peace, '
  '13':
  - type: text
    content: 'and it shall be to him and to '
  - type: note
    content: See 1 Chr. 6:4-15
  - type: text
    content: 'his descendants after him the covenant of '
  - type: note
    content: Ex. 40:15
  - type: text
    content: a perpetual priesthood, because he was jealous for his God and made atonement for the people of Israel.’”
  '14':
  - type: text
    content: 'The name of the slain man of Israel, who was killed with the Midianite woman, was Zimri the son of Salu, chief of a father’s house belonging to the Simeonites. '
  '15':
  - type: text
    content: 'And the name of the Midianite woman who was killed was Cozbi the daughter of '
  - type: note
    content: ch. 31:8; Josh. 13:21
  - type: text
    content: Zur, who was the tribal head of a father’s house in Midian.
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: note
    content: ch. 31:2, 7
  - type: text
    content: '“Harass the Midianites and strike them down, '
  '18':
  - type: text
    content: 'for they have harassed you with their '
  - type: note
    content: ch. 31:16; Rev. 2:14
  - type: text
    content: 'wiles, with which they beguiled you in the matter of '
  - type: note
    content: See ch. 23:28
  - type: text
    content: Peor, and in the matter of Cozbi, the daughter of the chief of Midian, their sister, who was killed on the day of the plague on account of Peor.”
  '2':
  - type: note
    content: Ex. 34:15, 16; Josh. 22:17; Ps. 106:28; Hos. 9:10; [1 Cor. 10:20]
  - type: text
    content: 'These invited the people to the sacrifices of their gods, and the people ate and bowed down to their gods. '
  '3':
  - type: text
    content: 'So Israel yoked himself to Baal of Peor. And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel. '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: See Deut. 4:3
  - type: text
    content: '“Take all the chiefs of the people and '
  - type: note
    content: '[Deut. 21:23; 2 Sam. 21:6; Gal. 3:13]'
  - type: text
    content: hang
  - type: note
    content: Or impale
  - type: text
    content: ' them in the sun before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ver. 11; Deut. 13:17
  - type: text
    content: 'that the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' may turn away from Israel.” '
  '5':
  - type: text
    content: 'And Moses said to '
  - type: note
    content: '[ch. 11:16; Ex. 18:21, 25]'
  - type: text
    content: 'the judges of Israel, '
  - type: note
    content: '[Ex. 32:27]'
  - type: text
    content: “Each of you kill those of his men who have yoked themselves to Baal of Peor.”
  '6':
  - type: text
    content: 'And behold, one of the people of Israel came and brought a Midianite woman to his family, in the sight of Moses and in the sight of the whole congregation of the people of Israel, while they were '
  - type: note
    content: Joel 2:17
  - type: text
    content: 'weeping in the entrance of the tent of meeting. '
  '7':
  - type: note
    content: Ps. 106:30
  - type: text
    content: 'When Phinehas '
  - type: note
    content: Ex. 6:25
  - type: text
    content: 'the son of Eleazar, son of Aaron the priest, saw it, he rose and left the congregation and took a spear in his hand '
  '8':
  - type: text
    content: 'and went after the man of Israel into the chamber and pierced both of them, the man of Israel and the woman through her belly. Thus the plague on the people of Israel was stopped. '
  '9':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: Deut. 4:3; [1 Cor. 10:8]
  - type: text
    content: those who died by the plague were twenty-four thousand.
  - type: heading
    content: The Zeal of Phinehas
