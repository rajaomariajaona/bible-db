    content: 'Bildad Speaks: Man Cannot Be Righteous'
  - type: text
    content: 'Then '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'Bildad the Shuhite answered and said:'
  '2':
  - type: text
    content: “Dominion and fear are with God;
  - type: note
    content: Hebrew him
  - type: text
    content: he makes peace in his high heaven.
  '3':
  - type: text
    content: 'Is there any number to his '
  - type: note
    content: ch. 19:12; Ps. 103:21
  - type: text
    content: armies?
  - type: text
    content: 'Upon whom does his '
  - type: note
    content: Matt. 5:45; James 1:17
  - type: text
    content: light not arise?
  '4':
  - type: text
    content: 'How then can man be '
  - type: note
    content: ch. 4:17-19; 9:2; 15:14-16; Ps. 130:3; 143:2
  - type: text
    content: in the right before God?
  - type: text
    content: 'How can he who is '
  - type: note
    content: See ch. 14:1
  - type: text
    content: 'born of woman be '
  - type: note
    content: ch. 14:4
  - type: text
    content: pure?
  '5':
  - type: text
    content: Behold, even the moon is not bright,
  - type: text
    content: and the stars are not pure in his eyes;
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:14; 15:16
  - type: text
    content: 'how much less man, who is '
  - type: note
    content: Ps. 22:6; Isa. 41:14
  - type: text
    content: a maggot,
  - type: text
    content: 'and '
  - type: note
    content: ch. 35:8
  - type: text
    content: the son of man, who is a worm!”
