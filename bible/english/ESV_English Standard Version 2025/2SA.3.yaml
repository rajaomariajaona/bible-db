document_id: 2SA.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abner Joins David
  - type: text
    content: There was a long war between the house of Saul and the house of David. And David grew stronger and stronger, while the house of Saul became weaker and weaker.
  '10':
  - type: text
    content: 'to transfer the kingdom from the house of Saul and set up the throne of David over Israel and over Judah, '
  - type: note
    content: ch. 17:11; 24:2, 15; Judg. 20:1; 1 Sam. 3:20; 1 Kgs. 4:25
  - type: text
    content: 'from Dan to Beersheba.” '
  '11':
  - type: text
    content: And Ish-bosheth could not answer Abner another word, because he feared him.
  '12':
  - type: text
    content: And Abner sent messengers to David on his behalf,
  - type: note
    content: Or where he was; Septuagint at Hebron
  - type: text
    content: ' saying, “To whom does the land belong? Make your covenant with me, and behold, my hand shall be with you to bring over all Israel to you.” '
  '13':
  - type: text
    content: 'And he said, “Good; I will make a covenant with you. But one thing I require of you; that is, '
  - type: note
    content: '[Gen. 43:3]'
  - type: text
    content: 'you shall not see my face unless you first bring '
  - type: note
    content: 1 Sam. 14:49
  - type: text
    content: 'Michal, Saul’s daughter, when you come to see my face.” '
  '14':
  - type: text
    content: 'Then David sent messengers to Ish-bosheth, Saul’s son, saying, “Give me my wife Michal, '
  - type: note
    content: 1 Sam. 18:25, 27
  - type: text
    content: 'for whom I paid the bridal price of a hundred foreskins of the Philistines.” '
  '15':
  - type: text
    content: 'And Ish-bosheth sent and took her from her husband Paltiel the son of Laish. '
  '16':
  - type: text
    content: 'But her husband went with her, weeping after her all the way to '
  - type: note
    content: ch. 16:5; 17:18; 19:16; 1 Kgs. 2:8
  - type: text
    content: Bahurim. Then Abner said to him, “Go, return.” And he returned.
  '17':
  - type: text
    content: 'And Abner conferred with the elders of Israel, saying, “For some time past you have been seeking David as king over you. '
  '18':
  - type: text
    content: 'Now then bring it about, '
  - type: note
    content: See ver. 9
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised David, saying, ‘By the hand of my servant David I will save my people Israel from the hand of the Philistines, and from the hand of all their enemies.’” '
  '19':
  - type: text
    content: 'Abner also spoke to '
  - type: note
    content: '[1 Chr. 12:29]'
  - type: text
    content: Benjamin. And then Abner went to tell David at Hebron all that Israel and the whole house of Benjamin thought good to do.
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-5, see 1 Chr. 3:1-4
  - type: text
    content: 'And sons were born to David at Hebron: his firstborn was Amnon, of '
  - type: note
    content: 1 Sam. 25:42, 43
  - type: text
    content: 'Ahinoam of Jezreel; '
  '20':
  - type: text
    content: 'When Abner came with twenty men to David at Hebron, David made a feast for Abner and the men who were with him. '
  '21':
  - type: text
    content: 'And Abner said to David, “I will arise and go and '
  - type: note
    content: ver. 12
  - type: text
    content: 'will gather all Israel to my lord the king, that they may make a covenant with you, and that you may '
  - type: note
    content: 1 Kgs. 11:37
  - type: text
    content: reign over all that your heart desires.” So David sent Abner away, and he went in peace.
  '22':
  - type: text
    content: 'Just then the servants of David arrived with Joab from a raid, bringing much spoil with them. But Abner was not with David at Hebron, for he had sent him away, and he had gone in peace. '
  '23':
  - type: text
    content: 'When Joab and all the army that was with him came, it was told Joab, “Abner the son of Ner came to the king, and he has let him go, and he has gone in peace.” '
  '24':
  - type: text
    content: 'Then Joab went to the king and said, “What have you done? Behold, Abner came to you. Why is it that you have sent him away, so that he is gone? '
  '25':
  - type: text
    content: 'You know that Abner the son of Ner came to deceive you and to know '
  - type: note
    content: See 1 Sam. 29:6
  - type: text
    content: your going out and your coming in, and to know all that you are doing.”
  - type: heading
    content: Joab Murders Abner
  '26':
  - type: text
    content: 'When Joab came out from David’s presence, he sent messengers after Abner, and they brought him back from the cistern of Sirah. But David did not know about it. '
  '27':
  - type: text
    content: 'And when Abner returned to Hebron, Joab took him aside into the midst of the gate to speak with him privately, '
  - type: note
    content: 1 Kgs. 2:5, 32; [ch. 20:9, 10]
  - type: text
    content: 'and there he struck him '
  - type: note
    content: See ch. 2:23
  - type: text
    content: 'in the stomach, so that he died, for the blood of Asahel his brother. '
  '28':
  - type: text
    content: 'Afterward, when David heard of it, he said, “I and my kingdom are forever guiltless before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the blood of Abner the son of Ner. '
  '29':
  - type: note
    content: See ch. 1:16
  - type: text
    content: 'May it fall upon the head of Joab and upon all his father’s house, and may the house of Joab never be without '
  - type: note
    content: Lev. 15:2
  - type: text
    content: 'one who has a discharge or who is '
  - type: note
    content: Lev. 14:2
  - type: text
    content: 'leprous or who holds a spindle or who falls by the sword or who lacks bread!” '
  '3':
  - type: text
    content: 'and his second, Chileab, of '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'Abigail the widow of Nabal of Carmel; and the third, Absalom the son of Maacah '
  - type: note
    content: ch. 13:37, 38
  - type: text
    content: 'the daughter of Talmai king of '
  - type: note
    content: ch. 14:32; 15:8; [1 Sam. 27:8]
  - type: text
    content: 'Geshur; '
  '30':
  - type: text
    content: 'So Joab and Abishai his brother killed Abner, because '
  - type: note
    content: ch. 2:23
  - type: text
    content: he had put their brother Asahel to death in the battle at Gibeon.
  - type: heading
    content: David Mourns Abner
  '31':
  - type: text
    content: 'Then David said to Joab and to all the people who were with him, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: '“Tear your clothes and '
  - type: note
    content: Gen. 37:34; 1 Kgs. 20:31
  - type: text
    content: 'put on sackcloth and mourn before Abner.” And King David followed the bier. '
  '32':
  - type: text
    content: 'They buried Abner at Hebron. And the king lifted up his voice and wept at the grave of Abner, and all the people wept. '
  '33':
  - type: text
    content: 'And the king '
  - type: note
    content: '[ch. 1:17; 2 Chr. 35:25]'
  - type: text
    content: lamented for Abner, saying,
  - type: note
    content: '[ Eccles. 2:16 ]'
  - type: text
    content: '“Should Abner die '
  - type: note
    content: ch. 13:12, 13
  - type: text
    content: as a fool dies?
  '34':
  - type: text
    content: Your hands were not bound;
  - type: text
    content: your feet were not fettered;
  - type: text
    content: as one falls before the wicked
  - type: text
    content: you have fallen.”
  - type: text
    content: 'And all the people wept again over him. '
  '35':
  - type: text
    content: 'Then all the people came '
  - type: note
    content: ch. 12:17
  - type: text
    content: 'to persuade David to eat bread while it was yet day. But David swore, saying, '
  - type: note
    content: See Ruth 1:17
  - type: text
    content: '“God do so to me and more also, if I taste bread or anything else '
  - type: note
    content: '[ch. 1:12]'
  - type: text
    content: 'till the sun goes down!” '
  '36':
  - type: text
    content: 'And all the people took notice of it, and it pleased them, as everything that the king did pleased all the people. '
  '37':
  - type: text
    content: 'So all the people and all Israel understood that day that it had not been the king’s will to put to death Abner the son of Ner. '
  '38':
  - type: text
    content: 'And the king said to his servants, “Do you not know that a prince and a great man has fallen this day in Israel? '
  '39':
  - type: text
    content: 'And I was gentle today, though anointed king. '
  - type: note
    content: '[ch. 16:10; 19:22]'
  - type: text
    content: 'These men, the sons of Zeruiah, are more severe than I. '
  - type: note
    content: '[Ps. 28:4; 2 Tim. 4:14]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' repay the evildoer according to his wickedness!”'
  '4':
  - type: text
    content: 'and the fourth, '
  - type: note
    content: 1 Kgs. 1:5
  - type: text
    content: 'Adonijah the son of Haggith; and the fifth, Shephatiah the son of Abital; '
  '5':
  - type: text
    content: and the sixth, Ithream, of Eglah, David’s wife. These were born to David in Hebron.
  '6':
  - type: text
    content: 'While there was war between the house of Saul and the house of David, Abner was making himself strong in the house of Saul. '
  '7':
  - type: text
    content: 'Now Saul had a concubine whose name was '
  - type: note
    content: ch. 21:8-10
  - type: text
    content: 'Rizpah, the daughter of Aiah. And Ish-bosheth said to Abner, '
  - type: note
    content: '[ch. 16:21]'
  - type: text
    content: '“Why have you gone in to my father’s concubine?” '
  '8':
  - type: text
    content: 'Then Abner was very angry over the words of Ish-bosheth and said, “Am I '
  - type: note
    content: See 1 Sam. 17:43
  - type: text
    content: 'a dog’s head of Judah? To this day I keep showing steadfast love to the house of Saul your father, to his brothers, and to his friends, and have not given you into the hand of David. And yet you charge me today with a fault concerning a woman. '
  '9':
  - type: note
    content: ver. 35; See Ruth 1:17
  - type: text
    content: 'God do so to Abner and more also, if I do not accomplish for David '
  - type: note
    content: 1 Sam. 15:28; 16:1, 12; 28:17; 1 Chr. 12:23
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn to him, '
