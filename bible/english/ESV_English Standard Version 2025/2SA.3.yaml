  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then the servants of David arrived with Joab from a raid, bringing much spoil with them. But Abner was not with David at Hebron, for he had sent him away, and he had gone in peace. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joab and all the army that was with him came, it was told Joab, “Abner the son of Ner came to the king, and he has let him go, and he has gone in peace.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab went to the king and said, “What have you done? Behold, Abner came to you. Why is it that you have sent him away, so that he is gone? '
