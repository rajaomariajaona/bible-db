document_id: PSA.62,59
type_code: eng
verses:
  '1':
  - type: heading
    content: My Soul Waits for God Alone
  - type: text
    content: 'To the choirmaster: according to '
  - type: note
    content: See Ps. 39, title
  - type: text
    content: Jeduthun. A Psalm of David.
  - type: text
    content: 'For God alone '
  - type: note
    content: See Ps. 33:20
  - type: text
    content: 'my soul '
  - type: note
    content: '[Ps. 37:7]'
  - type: text
    content: waits in silence;
  - type: text
    content: from him comes my salvation.
  '10':
  - type: text
    content: Put no trust in extortion;
  - type: note
    content: See Prov. 1:10-19
  - type: text
    content: set no vain hopes on robbery;
  - type: note
    content: Luke 12:15; See Ps. 49:6
  - type: text
    content: if riches increase, set not your heart on them.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 33:14; 40:5
  - type: text
    content: Once God has spoken;
  - type: note
    content: Job 33:14; 40:5
  - type: text
    content: 'twice have I heard this:'
  - type: text
    content: 'that '
  - type: note
    content: Rev. 19:1; [Ps. 59:9, 17]
  - type: text
    content: power belongs to God,
  '12':
  - type: text
    content: 'and that to you, O Lord, '
  - type: note
    content: Ps. 86:5, 15; 103:8; Dan. 9:9
  - type: text
    content: belongs steadfast love.
  - type: text
    content: 'For you will '
  - type: note
    content: See Job 34:11
  - type: text
    content: render to a man
  - type: text
    content: according to his work.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps. 18:2
  - type: text
    content: He alone is my rock and my salvation,
  - type: text
    content: 'my '
  - type: note
    content: See Ps. 9:9
  - type: text
    content: 'fortress; '
  - type: note
    content: See Ps. 10:6
  - type: text
    content: I shall not be greatly shaken.
  '3':
  - type: text
    content: How long will all of you attack a man
  - type: text
    content: to batter him,
  - type: text
    content: 'like '
  - type: note
    content: '[Isa. 30:13]'
  - type: text
    content: a leaning wall, a tottering fence?
  '4':
  - type: text
    content: 'They only plan to thrust him down from his '
  - type: note
    content: Job 13:11
  - type: text
    content: high position.
  - type: text
    content: They take pleasure in falsehood.
  - type: note
    content: See Ps. 28:3
  - type: text
    content: They bless with their mouths,
  - type: text
    content: 'but inwardly they curse. '
  - type: text
    content: Selah
  '5':
  - type: text
    content: 'For God alone, O '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: my soul, wait in silence,
  - type: text
    content: for my hope is from him.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: He only is my rock and my salvation,
  - type: text
    content: my fortress; I shall not be shaken.
  '7':
  - type: text
    content: 'On God rests my '
  - type: note
    content: See Ps. 3:8
  - type: text
    content: salvation and my glory;
  - type: text
    content: 'my mighty rock, '
  - type: note
    content: See Ps. 14:6
  - type: text
    content: my refuge is God.
  '8':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 37:3
  - type: text
    content: Trust in him at all times, O people;
  - type: note
    content: See Ps. 42:4
  - type: text
    content: pour out your heart before him;
  - type: text
    content: 'God is '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'a refuge for us. '
  - type: text
    content: Selah
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 39:5; [ Isa. 40:17 ]
  - type: text
    content: Those of low estate are but a breath;
  - type: text
    content: 'those of high estate '
  - type: note
    content: '[Ps. 116:11]'
  - type: text
    content: are a delusion;
  - type: text
    content: in the balances they go up;
  - type: note
    content: Ps. 39:5; [ Isa. 40:17 ]
  - type: text
    content: they are together lighter than a breath.
