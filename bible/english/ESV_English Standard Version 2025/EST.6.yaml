          text: 'wooden beam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see note on 2:23)
      marker-yv: yv-n
    - type: text
      text: ' that he had prepared for him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king’s young men told him, “Haman is there, standing in the court.” And the king said, “Let him come in.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Haman came in, and the king said to him, “What should be done to the man '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
