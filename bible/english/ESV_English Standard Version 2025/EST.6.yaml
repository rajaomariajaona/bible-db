        children:
        - type: text
          text: 2:19
      marker-yv: yv-n
    - type: text
      text: 'at the king’s gate. Leave out nothing that you have mentioned.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Haman took the robes and the horse, and he dressed Mordecai and led him through the square of the city, proclaiming before him, “Thus shall it be done to the man whom the king delights to honor.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Mordecai returned to the king’s gate. But Haman hurried to his house, mourning '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
