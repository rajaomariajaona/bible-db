  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said, “What honor or distinction has been bestowed on Mordecai for this?” The king’s young men who attended him said, “Nothing has been done for him.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said, “Who is in the court?” Now Haman had just entered '
    - type: usfm
