        children:
        - type: text
          text: 7, 9, 11
      marker-yv: yv-n
    - type: text
      text: 'whom the king delights to honor?” And Haman said to himself, “Whom would the king delight to honor more than me?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Haman said to the king, “For the man whom the king delights to honor, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let royal robes be brought, which the king has worn, '
