document_id: EST.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Honors Mordecai
  - type: text
    content: 'On that night the king could not sleep. And he gave orders to bring '
  - type: note
    content: ch. 2:23; 10:2
  - type: text
    content: 'the book of memorable deeds, the chronicles, and they were read before the king. '
  '10':
  - type: text
    content: 'Then the king said to Haman, “Hurry; take the robes and the horse, as you have said, and do so to Mordecai the Jew, who sits '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'at the king’s gate. Leave out nothing that you have mentioned.” '
  '11':
  - type: text
    content: So Haman took the robes and the horse, and he dressed Mordecai and led him through the square of the city, proclaiming before him, “Thus shall it be done to the man whom the king delights to honor.”
  '12':
  - type: text
    content: 'Then Mordecai returned to the king’s gate. But Haman hurried to his house, mourning '
  - type: note
    content: See 2 Sam. 15:30
  - type: text
    content: 'and with his head covered. '
  '13':
  - type: text
    content: 'And Haman told '
  - type: note
    content: ch. 5:10, 14
  - type: text
    content: his wife Zeresh and all his friends everything that had happened to him. Then his wise men and his wife Zeresh said to him, “If Mordecai, before whom you have begun to fall, is of the Jewish people, you will not overcome him but will surely fall before him.”
  - type: heading
    content: Esther Reveals Haman’s Plot
  '14':
  - type: text
    content: 'While they were yet talking with him, the king’s eunuchs arrived and hurried to bring Haman '
  - type: note
    content: ch. 5:8
  - type: text
    content: to the feast that Esther had prepared.
  '2':
  - type: text
    content: 'And it was found written how '
  - type: note
    content: ch. 2:22
  - type: text
    content: 'Mordecai had told about '
  - type: note
    content: '[ch. 1:10; 2:21]'
  - type: text
    content: Bigthana
  - type: note
    content: Bigthana is an alternate spelling of Bigthan (see 2:21)
  - type: text
    content: ' and '
  - type: note
    content: ch. 2:21
  - type: text
    content: 'Teresh, two of the king’s eunuchs, who guarded the threshold, and who had sought to lay hands on King Ahasuerus. '
  '3':
  - type: text
    content: 'And the king said, “What honor or distinction has been bestowed on Mordecai for this?” The king’s young men who attended him said, “Nothing has been done for him.” '
  '4':
  - type: text
    content: 'And the king said, “Who is in the court?” Now Haman had just entered '
  - type: note
    content: '[ch. 4:11; 5:1]'
  - type: text
    content: 'the outer court of the king’s palace to speak to the king about having Mordecai hanged on '
  - type: note
    content: ch. 5:14
  - type: text
    content: the gallows
  - type: note
    content: Or wooden beam (see note on 2:23)
  - type: text
    content: ' that he had prepared for him. '
  '5':
  - type: text
    content: 'And the king’s young men told him, “Haman is there, standing in the court.” And the king said, “Let him come in.” '
  '6':
  - type: text
    content: 'So Haman came in, and the king said to him, “What should be done to the man '
  - type: note
    content: ver. 7, 9, 11
  - type: text
    content: 'whom the king delights to honor?” And Haman said to himself, “Whom would the king delight to honor more than me?” '
  '7':
  - type: text
    content: 'And Haman said to the king, “For the man whom the king delights to honor, '
  '8':
  - type: text
    content: 'let royal robes be brought, which the king has worn, '
  - type: note
    content: '[1 Kgs. 1:33]'
  - type: text
    content: 'and the horse that the king has ridden, and on whose head '
  - type: note
    content: ch. 1:11; 2:17
  - type: text
    content: a royal crown
  - type: note
    content: Or headdress
  - type: text
    content: ' is set. '
  '9':
  - type: text
    content: 'And let the robes and the horse be handed over to one of the king’s most noble officials. Let them dress the man whom the king delights to honor, and let them lead him on the horse through the square of the city, '
  - type: note
    content: '[Gen. 41:43]'
  - type: text
    content: 'proclaiming before him: ‘Thus shall it be done to the man whom the king delights to honor.’” '
