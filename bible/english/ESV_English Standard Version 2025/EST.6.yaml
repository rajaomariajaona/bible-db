        children:
        - type: text
          text: 2 Sam. 15:30
      marker-yv: yv-n
    - type: text
      text: 'and with his head covered. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Haman told '
    - type: usfm
