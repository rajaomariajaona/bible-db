document_id: DEU.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws Concerning Divorce
  - type: text
    content: '“When a man takes a wife and marries her, if then she finds no favor in his eyes because he has found some indecency in her, and '
  - type: note
    content: Matt. 19:7; Mark 10:4; Cited Matt. 5:31; [Isa. 50:1; Jer. 3:8]
  - type: text
    content: 'he writes her a certificate of divorce and puts it in her hand and sends her out of his house, and she departs out of his house, '
  '10':
  - type: text
    content: '“When you make your neighbor a loan of any sort, you shall not go into his house to collect his pledge. '
  '11':
  - type: text
    content: 'You shall stand outside, and the man to whom you make the loan shall bring the pledge out to you. '
  '12':
  - type: text
    content: 'And if he is a poor man, you shall not sleep in his pledge. '
  '13':
  - type: note
    content: See Ex. 22:26
  - type: text
    content: 'You shall restore to him the pledge as the sun sets, that he may sleep in his cloak and '
  - type: note
    content: Job 29:13; 31:20
  - type: text
    content: 'bless you. And '
  - type: note
    content: Ps. 112:9; Dan. 4:27; [ch. 6:25]
  - type: text
    content: 'it shall be righteousness for you before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '14':
  - type: text
    content: '“You shall not '
  - type: note
    content: Mal. 3:5; See Lev. 25:39-43
  - type: text
    content: 'oppress a hired worker who is poor and needy, whether he is one of your brothers or one of the sojourners who are in your land within your towns. '
  '15':
  - type: note
    content: Jer. 22:13; See Lev. 19:13
  - type: text
    content: 'You shall give him his wages on the same day, before the sun sets (for he is poor and counts on it), '
  - type: note
    content: ch. 15:9; James 5:4
  - type: text
    content: 'lest he cry against you to the '
  - type: text
    content: Lord
  - type: text
    content: ', and you be guilty of sin.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cited 2 Kgs. 14:6; 2 Chr. 25:4; [ Jer. 31:29, 30; Ezek. 18:20 ]
  - type: text
    content: “Fathers shall not be put to death because of their children, nor shall children be put to death because of their fathers. Each one shall be put to death for his own sin.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ex. 22:21, 22; 23:6; [ch. 10:18; 27:19; Isa. 1:23; Jer. 5:28 ]; See ch. 16:19
  - type: text
    content: '“You shall not pervert the justice due to the sojourner or to the fatherless, '
  - type: note
    content: '[ver. 6, 13; Job 24:3]'
  - type: text
    content: 'or take a widow’s garment in pledge, '
  '18':
  - type: text
    content: 'but '
  - type: note
    content: See ch. 5:15
  - type: text
    content: 'you shall remember that you were a slave in Egypt and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God redeemed you from there; therefore I command you to do this.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:9; 23:22
  - type: text
    content: '“When you reap your harvest in your field and forget a sheaf in the field, you shall not go back to get it. It shall be for the sojourner, the fatherless, and the widow, '
  - type: note
    content: See ch. 14:29
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in all the work of your hands. '
  '2':
  - type: text
    content: 'and if she goes and becomes another man’s wife, '
  '20':
  - type: text
    content: 'When you beat your olive trees, you shall not go over them again. It shall be for the sojourner, the fatherless, and the widow. '
  '21':
  - type: text
    content: 'When you gather the grapes of your vineyard, you shall not strip it afterward. It shall be for the sojourner, the fatherless, and the widow. '
  '22':
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: You shall remember that you were a slave in the land of Egypt; therefore I command you to do this.
  '3':
  - type: text
    content: 'and the latter man hates her and writes her a certificate of divorce and puts it in her hand and sends her out of his house, or if the latter man dies, who took her to be his wife, '
  '4':
  - type: text
    content: 'then '
  - type: note
    content: '[Jer. 3:1]'
  - type: text
    content: 'her former husband, who sent her away, may not take her again to be his wife, after she has been defiled, for that is an abomination before the '
  - type: text
    content: Lord
  - type: text
    content: '. And you shall not bring sin upon the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance.'
  - type: heading
    content: Miscellaneous Laws
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 20:7 ]'
  - type: text
    content: '“When a man is newly married, he shall not go out with the army or be liable for any other public duty. He shall be free at home one year '
  - type: note
    content: Prov. 5:18
  - type: text
    content: to be happy with his wife
  - type: note
    content: Or to make happy his wife
  - type: text
    content: ' whom he has taken.'
  '6':
  - type: text
    content: “No one shall take a mill or an upper millstone in pledge, for that would be taking a life in pledge.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ex. 21:16; [ 1 Tim. 1:10 ]
  - type: text
    content: '“If a man is found stealing one of his brothers of the people of Israel, and if he '
  - type: note
    content: ch. 21:14
  - type: text
    content: 'treats him as a slave or sells him, then that thief shall die. '
  - type: note
    content: See ch. 13:5
  - type: text
    content: So you shall purge the evil from your midst.
  '8':
  - type: text
    content: '“Take care, in '
  - type: note
    content: See Lev. 13–14
  - type: text
    content: a case of leprous
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' disease, to be very careful to do according to all that the Levitical priests shall direct you. As I commanded them, so you shall be careful to do. '
  '9':
  - type: text
    content: 'Remember what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did to '
  - type: note
    content: See Num. 12:10-15
  - type: text
    content: 'Miriam '
  - type: note
    content: ch. 25:17
  - type: text
    content: on the way as you came out of Egypt.
