document_id: LEV.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Blessings for Obedience
  - type: text
    content: '“You shall not make '
  - type: note
    content: See ch. 19:4
  - type: text
    content: 'idols for yourselves or erect an '
  - type: note
    content: See Ex. 20:4, 5
  - type: text
    content: 'image or '
  - type: note
    content: Ex. 23:24
  - type: text
    content: 'pillar, and you shall not set up a '
  - type: note
    content: Num. 33:52; [Ezek. 8:10]
  - type: text
    content: 'figured stone in your land to bow down to it, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '10':
  - type: text
    content: 'You shall eat '
  - type: note
    content: ch. 25:22
  - type: text
    content: 'old store long kept, and you shall clear out the old to make way for the new. '
  '11':
  - type: note
    content: Ezek. 37:26-28; [Rev. 21:3]
  - type: text
    content: I will make my dwelling
  - type: note
    content: Hebrew tabernacle
  - type: text
    content: ' among you, and my soul shall not abhor you. '
  '12':
  - type: note
    content: Ex. 29:45; Cited 2 Cor. 6:16
  - type: text
    content: 'And I '
  - type: note
    content: Jer. 7:23; 11:4; 24:7; 30:22; Ezek. 11:20; 14:11; 36:28; 37:27; See Ex. 6:7
  - type: text
    content: 'will walk among you and will be your God, and you shall be my people. '
  '13':
  - type: note
    content: See ch. 25:38
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, that you should not be their slaves. '
  - type: note
    content: Ezek. 34:27; [Jer. 27:2; 28:10, 13]
  - type: text
    content: And I have broken the bars of your yoke and made you walk erect.
  - type: heading
    content: Punishment for Disobedience
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Lam. 2:17; Mal. 2:2 ]; See Deut. 28:15-68'
  - type: text
    content: '“But if you will not listen to me and will not do all these commandments, '
  '15':
  - type: text
    content: 'if you spurn my statutes, and if your soul abhors my rules, so that you will not do all my commandments, but '
  - type: note
    content: ver. 44; Deut. 31:20
  - type: text
    content: 'break my covenant, '
  '16':
  - type: text
    content: 'then I will do this to you: I will visit you with panic, with '
  - type: note
    content: Deut. 28:21
  - type: text
    content: 'wasting disease and fever that consume the eyes and make the heart ache. And '
  - type: note
    content: Deut. 28:33, 51; Job 31:8; Jer. 5:17; Mic. 6:15
  - type: text
    content: 'you shall sow your seed in vain, for your enemies shall eat it. '
  '17':
  - type: text
    content: 'I will '
  - type: note
    content: See ch. 17:10
  - type: text
    content: 'set my face against you, and '
  - type: note
    content: Deut. 28:25; Judg. 2:14; Jer. 19:7
  - type: text
    content: 'you shall be struck down before your enemies. '
  - type: note
    content: Ps. 106:41
  - type: text
    content: 'Those who hate you shall rule over you, and '
  - type: note
    content: Prov. 28:1; [ver. 36; Ps. 53:5]
  - type: text
    content: 'you shall flee when none pursues you. '
  '18':
  - type: text
    content: 'And if in spite of this you will not listen to me, then I will discipline you again '
  - type: note
    content: ver. 21, 24, 28; 1 Sam. 2:5; Ps. 119:164; Prov. 24:16
  - type: text
    content: 'sevenfold for your sins, '
  '19':
  - type: text
    content: 'and I will break '
  - type: note
    content: Ezek. 30:6; [Jer. 13:9]
  - type: text
    content: 'the pride of your power, and I '
  - type: note
    content: Deut. 28:23
  - type: text
    content: 'will make your heavens like iron and your earth like bronze. '
  '2':
  - type: note
    content: ch. 19:30; See Ex. 20:8
  - type: text
    content: 'You shall keep my Sabbaths and reverence my sanctuary: I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'And '
  - type: note
    content: '[Ps. 127:1; Isa. 49:4]'
  - type: text
    content: 'your strength shall be spent in vain, for '
  - type: note
    content: '[Hag. 1:10]; See ver. 4'
  - type: text
    content: your land shall not yield its increase, and the trees of the land shall not yield their fruit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ver. 27
  - type: text
    content: '“Then if you walk contrary to me and will not listen to me, I will continue striking you, sevenfold for your sins. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 32:24; See ver. 6
  - type: text
    content: 'I will let loose the wild beasts against you, which shall bereave you of your children and destroy your livestock and make you few in number, so that '
  - type: note
    content: Judg. 5:6; Isa. 33:8; Lam. 1:4; Zech. 7:14
  - type: text
    content: your roads shall be deserted.
  '23':
  - type: text
    content: '“And '
  - type: note
    content: Jer. 2:30; 5:3; See Amos 4:6-12
  - type: text
    content: 'if by this discipline you are not turned to me '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'but walk contrary to me, '
  '24':
  - type: note
    content: 2 Sam. 22:27; Ps. 18:26
  - type: text
    content: 'then I also will walk contrary to you, and I myself will strike you sevenfold for your sins. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 32:25; Jer. 14:12; 24:10; 29:17, 18; Ezek. 5:17; 6:3; 14:17; 29:8; 33:2
  - type: text
    content: 'I will bring a sword upon you, that shall execute vengeance for the covenant. And if you gather within your cities, '
  - type: note
    content: Num. 14:12; Deut. 28:21
  - type: text
    content: 'I will send pestilence among you, and you shall be delivered into the hand of the enemy. '
  '26':
  - type: note
    content: Ps. 105:16; Isa. 3:1; Ezek. 4:16; 5:16; 14:13
  - type: text
    content: When I break your supply
  - type: note
    content: Hebrew staff
  - type: text
    content: ' of bread, ten women shall bake your bread in a single oven and shall dole out your bread again by weight, and '
  - type: note
    content: Isa. 9:20; Mic. 6:14; Hag. 1:6
  - type: text
    content: you shall eat and not be satisfied.
  '27':
  - type: text
    content: '“But '
  - type: note
    content: ver. 21, 24
  - type: text
    content: 'if in spite of this you will not listen to me, but walk contrary to me, '
  '28':
  - type: text
    content: 'then I will walk contrary to you '
  - type: note
    content: Isa. 59:18; 63:3; 66:15; Jer. 21:5; Ezek. 5:13, 15; 8:18
  - type: text
    content: 'in fury, and I myself will discipline you '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'sevenfold for your sins. '
  '29':
  - type: note
    content: Deut. 28:53; Ezek. 5:10; [2 Kgs. 6:29; Lam. 4:10]
  - type: text
    content: 'You shall eat the flesh of your sons, and you shall eat the flesh of your daughters. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Deut. 11:13-15; 28:1-14; See ch. 18:4
  - type: text
    content: '“If you walk in my statutes and observe my commandments and do them, '
  '30':
  - type: text
    content: 'And '
  - type: note
    content: 2 Chr. 14:5; 34:3, 4, 7; See Ezek. 6:3-6
  - type: text
    content: 'I will destroy your high places and cut down your incense altars and '
  - type: note
    content: '[2 Kgs. 23:20; 2 Chr. 34:5; Ezek. 6:5]'
  - type: text
    content: 'cast your dead bodies upon the dead bodies of your idols, and my soul will abhor you. '
  '31':
  - type: text
    content: 'And I will '
  - type: note
    content: Neh. 2:3; Jer. 4:7; See 2 Kgs. 25:4-10
  - type: text
    content: 'lay your cities waste and will '
  - type: note
    content: Ps. 74:7; Lam. 1:10; Ezek. 9:6; 21:2
  - type: text
    content: 'make your sanctuaries desolate, and '
  - type: note
    content: Jer. 6:20; See Isa. 1:11-15; Amos 5:21-23
  - type: text
    content: 'I will not smell your pleasing aromas. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: Jer. 9:11; 25:11, 18
  - type: text
    content: 'I myself will devastate the land, so that your enemies who settle in it shall be '
  - type: note
    content: Deut. 28:37; 1 Kgs. 9:8; Jer. 18:16; 19:8; Ezek. 5:15
  - type: text
    content: 'appalled at it. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 4:27; 28:64; Neh. 1:8; Ps. 44:11; Jer. 9:16; Ezek. 12:15; 20:23; 22:15; Zech. 7:14; [Luke 21:24]
  - type: text
    content: I will scatter you among the nations, and I will unsheathe the sword after you, and your land shall be a desolation, and your cities shall be a waste.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 36:21; See ch. 25:2
  - type: text
    content: “Then the land shall enjoy
  - type: note
    content: Or pay for; twice in this verse; also verse 43
  - type: text
    content: ' its Sabbaths as long as it lies desolate, while you are in your enemies’ land; then the land shall rest, and enjoy its Sabbaths. '
  '35':
  - type: text
    content: 'As long as it lies desolate it shall have rest, the rest that it did not have on your Sabbaths when you were dwelling in it. '
  '36':
  - type: text
    content: 'And as for those of you who are left, '
  - type: note
    content: Ezek. 21:7
  - type: text
    content: 'I will send faintness into their hearts in the lands of their enemies. The '
  - type: note
    content: ver. 17
  - type: text
    content: 'sound of a '
  - type: note
    content: Job 13:25
  - type: text
    content: 'driven leaf shall put them to flight, and they shall flee as one flees from the sword, and they shall fall when none pursues. '
  '37':
  - type: text
    content: 'They shall stumble over one another, as if to escape a sword, though none pursues. And '
  - type: note
    content: Josh. 7:12, 13; Judg. 2:14
  - type: text
    content: 'you shall have no power to stand before your enemies. '
  '38':
  - type: text
    content: 'And you shall perish among the nations, and the land of your enemies shall eat you up. '
  '39':
  - type: text
    content: 'And those of you who are left shall '
  - type: note
    content: Deut. 28:65; Ezek. 4:17; 24:23; 33:10; [Ezek. 6:9]
  - type: text
    content: rot away in your enemies’ lands because of their iniquity, and also because of the iniquities of their fathers they shall rot away like them.
  '4':
  - type: text
    content: 'then '
  - type: note
    content: Ps. 67:6; 85:12; Ezek. 34:26, 27; 36:30; Joel 2:23, 24; Zech. 8:12; [ver. 20; Deut. 11:17]
  - type: text
    content: 'I will give you your rains in their season, and the land shall yield its increase, and the trees of the field shall yield their fruit. '
  '40':
  - type: text
    content: '“But if '
  - type: note
    content: '[Neh. 9:2; Prov. 28:13; 1 John 1:9]; See 1 Kgs. 8:33-36; Dan. 9:4-19'
  - type: text
    content: 'they confess their iniquity and the iniquity of their fathers in their treachery that they '
  - type: note
    content: ch. 6:2; Num. 5:6
  - type: text
    content: 'committed against me, and also in walking contrary to me, '
  '41':
  - type: text
    content: 'so that I walked contrary to them and brought them into the land of their enemies—if then their '
  - type: note
    content: See Ex. 6:12
  - type: text
    content: 'uncircumcised heart is '
  - type: note
    content: '[1 Kgs. 21:29; 2 Chr. 12:6, 7; 32:26; 33:12, 13]'
  - type: text
    content: 'humbled and they make amends for their iniquity, '
  '42':
  - type: text
    content: 'then I will '
  - type: note
    content: Ex. 2:24; 6:5; Ps. 106:45; Ezek. 16:60
  - type: text
    content: 'remember my covenant with Jacob, and I will remember my covenant with Isaac and my covenant with Abraham, and I will '
  - type: note
    content: '[Ps. 85:1]'
  - type: text
    content: 'remember the land. '
  '43':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'the land shall be abandoned by them and enjoy its Sabbaths while it lies desolate without them, and they shall make amends for their iniquity, because they spurned my rules and their soul abhorred my statutes. '
  '44':
  - type: text
    content: 'Yet for all that, when they are in the land of their enemies, '
  - type: note
    content: '[Deut. 4:31; 2 Kgs. 13:23; Neh. 9:31; Rom. 11:2]'
  - type: text
    content: 'I will not spurn them, neither will I abhor them so as to destroy them utterly and '
  - type: note
    content: ver. 15
  - type: text
    content: 'break my covenant with them, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '45':
  - type: text
    content: 'But I will for their sake remember the covenant with their forefathers, '
  - type: note
    content: ch. 22:33
  - type: text
    content: 'whom I brought out of the land of Egypt '
  - type: note
    content: Ps. 98:2; Ezek. 20:9, 22
  - type: text
    content: 'in the sight of the nations, that I might be their God: I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '46':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:34; Deut. 6:1; 12:1
  - type: text
    content: 'These are the statutes and rules and laws that the '
  - type: text
    content: Lord
  - type: text
    content: ' made between himself and the people of Israel through Moses '
  - type: note
    content: ch. 25:1
  - type: text
    content: on Mount Sinai.
  '5':
  - type: note
    content: '[Amos 9:13]'
  - type: text
    content: 'Your threshing shall last to the time of the grape harvest, and the grape harvest shall last to the time for sowing. And '
  - type: note
    content: See ch. 25:19
  - type: text
    content: 'you shall eat your bread to the full and '
  - type: note
    content: See ch. 25:18
  - type: text
    content: 'dwell in your land securely. '
  '6':
  - type: note
    content: '[1 Kgs. 4:25; 1 Chr. 22:9]'
  - type: text
    content: 'I will give peace in the land, and '
  - type: note
    content: Job 11:19; Jer. 30:10; Zeph. 3:13
  - type: text
    content: 'you shall lie down, and none shall make you afraid. And '
  - type: note
    content: Ezek. 34:25; [2 Kgs. 17:25; Isa. 35:9; Ezek. 5:17; 14:15]
  - type: text
    content: 'I will remove harmful beasts from the land, '
  - type: note
    content: '[Ezek. 14:17]'
  - type: text
    content: 'and the sword shall not go through your land. '
  '7':
  - type: text
    content: 'You shall chase your enemies, and they shall fall before you by the sword. '
  '8':
  - type: note
    content: '[Deut. 32:30; Josh. 23:10; Isa. 30:17]'
  - type: text
    content: 'Five of you shall chase a hundred, and a hundred of you shall chase ten thousand, and your enemies shall fall before you by the sword. '
  '9':
  - type: note
    content: 2 Kgs. 13:23
  - type: text
    content: 'I will turn to you and '
  - type: note
    content: Neh. 9:23
  - type: text
    content: 'make you fruitful and multiply you and will confirm my covenant with you. '
