document_id: JDG.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Levite and His Concubine
  - type: text
    content: 'In those days, '
  - type: note
    content: ch. 17:6; 18:1; 21:25
  - type: text
    content: 'when there was no king in Israel, a certain Levite was sojourning in the remote parts of '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, who took to himself a concubine from '
  - type: note
    content: See ch. 17:7
  - type: text
    content: 'Bethlehem in Judah. '
  '10':
  - type: text
    content: 'But the man would not spend the night. He rose up and departed and arrived opposite '
  - type: note
    content: See Josh. 15:8, 63
  - type: text
    content: 'Jebus (that is, Jerusalem). He had with him a couple of saddled donkeys, and his concubine was with him. '
  '11':
  - type: text
    content: 'When they were near Jebus, the day was nearly over, and the servant said to his master, “Come now, let us turn aside to this city of the Jebusites and spend the night in it.” '
  '12':
  - type: text
    content: 'And his master said to him, “We will not turn aside into the city of foreigners, who do not belong to the people of Israel, but we will pass on to '
  - type: note
    content: Josh. 18:28
  - type: text
    content: 'Gibeah.” '
  '13':
  - type: text
    content: 'And he said to his young man, “Come and let us draw near to one of these places and spend the night at Gibeah or at '
  - type: note
    content: Josh. 18:25
  - type: text
    content: 'Ramah.” '
  '14':
  - type: text
    content: 'So they passed on and went their way. And the sun went down on them near Gibeah, which belongs to Benjamin, '
  '15':
  - type: text
    content: 'and they turned aside there, to go in and spend the night at Gibeah. And he went in and sat down in the open square of the city, '
  - type: note
    content: ver. 18
  - type: text
    content: for no one took them into his house to spend the night.
  '16':
  - type: text
    content: 'And behold, an old man was coming from his work in the field at evening. The man was from '
  - type: note
    content: ver. 1; See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, and he was sojourning in Gibeah. '
  - type: note
    content: ver. 14; ch. 20:4
  - type: text
    content: 'The men of the place were Benjaminites. '
  '17':
  - type: text
    content: 'And he lifted up his eyes and saw the traveler in the open square of the city. And the old man said, “Where are you going? And where do you come from?” '
  '18':
  - type: text
    content: 'And he said to him, “We are passing from Bethlehem in Judah to the remote parts of the hill country of Ephraim, from which I come. I went to Bethlehem in Judah, and I am going '
  - type: note
    content: ch. 18:31
  - type: text
    content: 'to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Septuagint my home; compare verse 29
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'but no one has taken me into his house. '
  '19':
  - type: text
    content: 'We have straw and feed for our donkeys, with bread and wine for me and your female servant and the young man with your servants. '
  - type: note
    content: '[ch. 18:10]'
  - type: text
    content: 'There is no lack of anything.” '
  '2':
  - type: text
    content: And his concubine was unfaithful to
  - type: note
    content: Septuagint, Old Latin became angry with
  - type: text
    content: ' him, and she went away from him to her father’s house at Bethlehem in Judah, and was there some four months. '
  '20':
  - type: text
    content: 'And the old man said, '
  - type: note
    content: Gen. 43:23
  - type: text
    content: '“Peace be to you; I will care for all your wants. '
  - type: note
    content: Gen. 19:2
  - type: text
    content: 'Only, do not spend the night in the square.” '
  '21':
  - type: text
    content: 'So he brought him into his house and gave the donkeys feed. '
  - type: note
    content: Gen. 18:4; 24:32; 43:24; [John 13:5]
  - type: text
    content: And they washed their feet, and ate and drank.
  - type: heading
    content: Gibeah’s Crime
  '22':
  - type: text
    content: 'As they were '
  - type: note
    content: See ver. 6
  - type: text
    content: 'making their hearts merry, behold, the men of the city, worthless fellows, '
  - type: note
    content: ch. 20:5; [Gen. 19:4]
  - type: text
    content: 'surrounded the house, beating on the door. And they said to the old man, the master of the house, “Bring out the man who came into your house, that we may know him.” '
  '23':
  - type: text
    content: 'And the man, the master of the house, went out to them and said to them, “No, my brothers, '
  - type: note
    content: Gen. 19:7
  - type: text
    content: 'do not act so wickedly; since this man has come into my house, '
  - type: note
    content: ch. 20:6; Gen. 34:7; Deut. 22:21; 2 Sam. 13:12; [Josh. 7:15]
  - type: text
    content: 'do not do this vile thing. '
  '24':
  - type: note
    content: '[Gen. 19:8]'
  - type: text
    content: 'Behold, here are my virgin daughter and his concubine. Let me bring them out now. '
  - type: note
    content: Gen. 34:2; Deut. 21:14
  - type: text
    content: 'Violate them and do with them what seems good to you, but against this man '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'do not do this outrageous thing.” '
  '25':
  - type: text
    content: 'But the men would not listen to him. So the man seized his concubine and made her go out to them. And they knew her and abused her all night until the morning. And as the dawn began to break, they let her go. '
  '26':
  - type: text
    content: And as morning appeared, the woman came and fell down at the door of the man’s house where her master was, until it was light.
  '27':
  - type: text
    content: 'And her master rose up in the morning, and when he opened the doors of the house and went out to go on his way, behold, there was his concubine lying at the door of the house, with her hands on the threshold. '
  '28':
  - type: text
    content: 'He said to her, “Get up, let us be going.” '
  - type: note
    content: '[ch. 20:5]'
  - type: text
    content: 'But there was no answer. Then he put her on the donkey, and the man rose up and went away to his home. '
  '29':
  - type: text
    content: 'And when he entered his house, he took a knife, and taking hold of his concubine he '
  - type: note
    content: ch. 20:6; [1 Sam. 11:7]
  - type: text
    content: 'divided her, limb by limb, into twelve pieces, and sent her throughout all the territory of Israel. '
  '3':
  - type: text
    content: 'Then her husband arose and went after her, to speak kindly to her and bring her back. He had with him his servant and a couple of donkeys. And she brought him into her father’s house. And when the girl’s father saw him, he came with joy to meet him. '
  '30':
  - type: note
    content: '[Hos. 9:9; 10:9]'
  - type: text
    content: 'And all who saw it said, “Such a thing has never happened or been seen from the day that the people of Israel came up out of the land of Egypt until this day; '
  - type: note
    content: ch. 20:7
  - type: text
    content: consider it, take counsel, and speak.”
  '4':
  - type: text
    content: 'And his father-in-law, the girl’s father, made him stay, and he remained with him three days. So they ate and drank and spent the night there. '
  '5':
  - type: text
    content: 'And on the fourth day they arose early in the morning, and he prepared to go, but the girl’s father said to his son-in-law, '
  - type: note
    content: ver. 8; Gen. 18:5
  - type: text
    content: '“Strengthen your heart with a morsel of bread, and after that you may go.” '
  '6':
  - type: text
    content: 'So the two of them sat and ate and drank together. And the girl’s father said to the man, “Be pleased to spend the night, and '
  - type: note
    content: ver. 9, 22; ch. 16:25; Ruth 3:7; 2 Sam. 13:28
  - type: text
    content: 'let your heart be merry.” '
  '7':
  - type: text
    content: 'And when the man rose up to go, his father-in-law pressed him, till he spent the night there again. '
  '8':
  - type: text
    content: 'And on the fifth day he arose early in the morning to depart. And the girl’s father said, '
  - type: note
    content: ver. 5
  - type: text
    content: '“Strengthen your heart and wait until the day declines.” So they ate, both of them. '
  '9':
  - type: text
    content: And when the man and his concubine and his servant rose up to depart, his father-in-law, the girl’s father, said to him, “Behold, now the day has waned toward evening. Please, spend the night. Behold, the day draws to its close. Lodge here and let your heart be merry, and tomorrow you shall arise early in the morning for your journey, and go home.”
