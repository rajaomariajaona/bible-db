      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 4:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:34
      - type: text
