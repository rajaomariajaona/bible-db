        - type: text
          text: '17'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it is lawful to do good on the Sabbath.”
    - type: text
      text: ' '
  '13':
