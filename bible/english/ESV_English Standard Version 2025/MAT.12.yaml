document_id: MAT.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: 'At that time '
  - type: note
    content: For ver. 1-8, see Mark 2:23-28; Luke 6:1-5
  - type: text
    content: 'Jesus went through the grainfields on the Sabbath. His disciples were hungry, and '
  - type: note
    content: Deut. 23:25
  - type: text
    content: 'they began to pluck heads of grain and to eat. '
  '10':
  - type: text
    content: 'And a man was there with a withered hand. And they asked him, '
  - type: note
    content: '[Luke 14:3]; See ver. 2'
  - type: text
    content: “Is it lawful to heal on the Sabbath?”—
  - type: note
    content: '[Luke 11:54; 20:20; John 8:6]'
  - type: text
    content: 'so that they might accuse him. '
  '11':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“Which one of you who has a sheep, '
  - type: note
    content: '[Ex. 23:4, 5; Deut. 22:4]'
  - type: text
    content: if it falls into a pit on the Sabbath, will not take hold of it and lift it out?
  - type: text
    content: ' '
  '12':
  - type: note
    content: ch. 6:26; 10:31
  - type: text
    content: 'Of how much more value is a man than a sheep! So '
  - type: note
    content: '[John 5:16, 17]'
  - type: text
    content: it is lawful to do good on the Sabbath.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then he said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' And '
  - type: note
    content: '[1 Kgs. 13:4]'
  - type: text
    content: 'the man stretched it out, and it was restored, healthy like the other. '
  '14':
  - type: text
    content: But the Pharisees went out and conspired against him, how to destroy him.
  - type: heading
    content: God’s Chosen Servant
  '15':
  - type: text
    content: 'Jesus, aware of this, '
  - type: note
    content: Mark 3:7; John 10:39; See ch. 10:23
  - type: text
    content: 'withdrew from there. And '
  - type: note
    content: ch. 19:2
  - type: text
    content: 'many followed him, and he healed them all '
  '16':
  - type: text
    content: 'and '
  - type: note
    content: Mark 1:25 (Gk.); 3:12; 8:30; Luke 4:41 (Gk.); 9:21; See ch. 8:4
  - type: text
    content: 'ordered them not to make him known. '
  '17':
  - type: note
    content: See ch. 1:22
  - type: text
    content: 'This was to fulfill what was spoken by the prophet Isaiah:'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cited from Isa. 42:1-3
  - type: text
    content: '“Behold, my '
  - type: note
    content: Acts 4:27, 30
  - type: text
    content: servant whom I have chosen,
  - type: text
    content: my beloved with whom my soul is well pleased.
  - type: note
    content: '[ Isa. 61:1; Luke 4:18; John 3:34; Acts 10:38 ]'
  - type: text
    content: I will put my Spirit upon him,
  - type: text
    content: and he will proclaim justice to the Gentiles.
  '19':
  - type: text
    content: He will not quarrel or cry aloud,
  - type: text
    content: nor will anyone hear his voice in the streets;
  '2':
  - type: text
    content: 'But when the Pharisees saw it, they said to him, '
  - type: note
    content: '[ver. 10; Luke 13:14; 14:3; John 5:10; 7:23; 9:16]'
  - type: text
    content: '“Look, your disciples are doing '
  - type: note
    content: '[Ex. 20:9-11]'
  - type: text
    content: 'what is not lawful to do on the Sabbath.” '
  '20':
  - type: text
    content: a bruised reed he will not break,
  - type: text
    content: and a smoldering wick he will not quench,
  - type: text
    content: until he brings justice to victory;
  '21':
  - type: text
    content: ' '
  - type: note
    content: Isa. 42:4 (Gk.); [ Isa. 11:10; Rom. 15:12 ]
  - type: text
    content: and in his name the Gentiles will hope.”
  - type: heading
    content: Blasphemy Against the Holy Spirit
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22-24, see Luke 11:14, 15; [ch. 9:32-34 ]
  - type: text
    content: 'Then a demon-oppressed man who was blind and mute was brought to him, and he healed him, so that the man spoke and saw. '
  '23':
  - type: note
    content: John 4:29; 7:26, 31; See ch. 9:27
  - type: text
    content: 'And all the people were amazed, and said, '
  - type: note
    content: John 4:29; 7:26, 31; See ch. 9:27
  - type: text
    content: '“Can this be the Son of David?” '
  '24':
  - type: text
    content: 'But when the Pharisees heard it, they said, '
  - type: note
    content: Mark 3:22; See ch. 10:25
  - type: text
    content: '“It is only by Beelzebul, the prince of demons, that this man casts out demons.” '
  '25':
  - type: note
    content: See ch. 9:4
  - type: text
    content: 'Knowing their thoughts, '
  - type: note
    content: For ver. 25-29, see Mark 3:23-27; Luke 11:17-22
  - type: text
    content: 'he said to them, '
  - type: text
    content: “Every kingdom divided against itself is laid waste, and no city or house divided against itself will stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan casts out Satan, he is divided against himself. How then will his kingdom stand?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And if I cast out demons by Beelzebul, '
  - type: note
    content: '[Acts 19:13]'
  - type: text
    content: 'by whom do '
  - type: note
    content: '[2 Kgs. 2:7]'
  - type: text
    content: your sons cast them out? Therefore they will be your judges.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But if it is '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'by the Spirit of God that I cast out demons, then '
  - type: note
    content: ch. 19:24; 21:31, 43; Luke 17:21
  - type: text
    content: the kingdom of God has come upon you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Or '
  - type: note
    content: Isa. 49:24
  - type: text
    content: 'how can someone enter a strong man’s house and plunder his goods, unless he first binds the strong man? Then indeed '
  - type: note
    content: '[Isa. 53:12]'
  - type: text
    content: he may plunder his house.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He said to them, '
  - type: note
    content: 1 Sam. 21:1-6; See ch. 21:16
  - type: text
    content: '“Have you not read what David did when he was hungry, and those who were with him:'
  - type: text
    content: ' '
  '30':
  - type: note
    content: Luke 11:23; [Mark 9:40; Luke 9:50]
  - type: text
    content: Whoever is not with me is against me, and whoever does not gather with me scatters.
  - type: text
    content: ' '
  '31':
  - type: note
    content: For ver. 31, 32, see Mark 3:28-30; [Luke 12:10; Heb. 6:4-6; 10:26; 1 John 5:16]
  - type: text
    content: 'Therefore I tell you, every sin and blasphemy will be forgiven people, but '
  - type: note
    content: '[Acts 7:51; Heb. 10:29]'
  - type: text
    content: the blasphemy against the Spirit will not be forgiven.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And whoever speaks a word '
  - type: note
    content: ch. 11:19; John 7:12; 9:24
  - type: text
    content: 'against the Son of Man '
  - type: note
    content: 1 Tim. 1:12, 13
  - type: text
    content: 'will be forgiven, but '
  - type: note
    content: '[See ver. 31above]'
  - type: text
    content: 'whoever speaks against the Holy Spirit will not be forgiven, either in '
  - type: note
    content: '[Eph. 1:21]'
  - type: text
    content: this age or in the age to come.
  - type: heading
    content: A Tree Is Known by Its Fruit
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:16-20
  - type: text
    content: '“Either make the tree good and its fruit good, or make the tree bad and its fruit bad, '
  - type: note
    content: Luke 6:43, 44
  - type: text
    content: for the tree is known by its fruit.
  - type: text
    content: ' '
  '34':
  - type: note
    content: ch. 3:7; 23:33
  - type: text
    content: 'You brood of vipers! How can you speak good, '
  - type: note
    content: ch. 7:11
  - type: text
    content: 'when you are evil? '
  - type: note
    content: ch. 15:18, 19; Luke 6:45; [ch. 13:52; Eph. 4:29]
  - type: text
    content: For out of the abundance of the heart the mouth speaks.
  - type: text
    content: ' '
  '35':
  - type: note
    content: '[See ver. 34above]'
  - type: text
    content: The good person out of his good treasure brings forth good, and the evil person out of his evil treasure brings forth evil.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'I tell you, '
  - type: note
    content: '[Eph. 5:4, 11; 2 Pet. 1:8]'
  - type: text
    content: 'on the day of judgment '
  - type: note
    content: Eccles. 12:14; Rom. 14:12; 1 Pet. 4:5
  - type: text
    content: 'people will give account for '
  - type: note
    content: See Acts 17:31
  - type: text
    content: every careless word they speak,
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 5:22; James 3:2-12]'
  - type: text
    content: by your words you will be justified, and by your words you will be condemned.”
  - type: heading
    content: The Sign of Jonah
  '38':
  - type: text
    content: 'Then some of the scribes and Pharisees answered him, saying, “Teacher, '
  - type: note
    content: ch. 16:1; Mark 8:11, 12; Luke 11:16; 23:8; John 2:18; 4:48; 6:30; 1 Cor. 1:22
  - type: text
    content: 'we wish to see a sign from you.” '
  '39':
  - type: text
    content: 'But he answered them, '
  - type: note
    content: ch. 16:4; For ver. 39-42, see Luke 11:29-32; [Mark 8:11, 12]
  - type: text
    content: '“An evil and '
  - type: note
    content: Isa. 57:3; Mark 8:38; James 4:4
  - type: text
    content: adulterous generation seeks for a sign, but no sign will be given to it except the sign of the prophet Jonah.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'how he entered the house of God and ate '
  - type: note
    content: Ex. 25:30; Lev. 24:5-9
  - type: text
    content: the bread of the Presence, which it was not lawful for him to eat nor for those who were with him, but only for the priests?
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'For '
  - type: note
    content: Jonah 1:17
  - type: text
    content: 'just as Jonah was three days and three nights in the belly of the great fish, '
  - type: note
    content: '[ch. 17:22, 23]'
  - type: text
    content: so will the Son of Man be three days and three nights in the heart of the earth.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Jonah 1:2
  - type: text
    content: 'The men of Nineveh will rise up at the judgment with this generation and '
  - type: note
    content: Heb. 11:7; [Jer. 3:11; Ezek. 16:51, 52; Rom. 2:27]
  - type: text
    content: 'condemn it, for '
  - type: note
    content: Jonah 3:5
  - type: text
    content: 'they repented at the preaching of Jonah, and behold, '
  - type: note
    content: ver. 6
  - type: text
    content: something greater than Jonah is here.
  - type: text
    content: ' '
  '42':
  - type: note
    content: 1 Kgs. 10:1; 2 Chr. 9:1
  - type: text
    content: 'The queen of the South will rise up at the judgment with this generation and condemn it, for she came from the ends of the earth to hear the wisdom of Solomon, and behold, '
  - type: note
    content: '[See ver. 41above]'
  - type: text
    content: something greater than Solomon is here.
  - type: heading
    content: Return of an Unclean Spirit
  '43':
  - type: text
    content: ' '
  - type: text
    content: '“When '
  - type: note
    content: For ver. 43-45, see Luke 11:24-26
  - type: text
    content: 'the unclean spirit has gone out of a person, it passes through '
  - type: note
    content: '[ Ps. 63:1; Jer. 2:6 ]'
  - type: text
    content: waterless places seeking rest, but finds none.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then it says, ‘I will return to my house from which I came.’ And when it comes, it finds the house empty, swept, and put in order.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then it goes and brings with it seven other spirits more evil than itself, and they enter and dwell there, and '
  - type: note
    content: 2 Pet. 2:20-22; [John 5:14]
  - type: text
    content: 'the last state of that person is worse than the first. So also will it be with this '
  - type: note
    content: ver. 39
  - type: text
    content: evil generation.”
  - type: heading
    content: Jesus’ Mother and Brothers
  '46':
  - type: text
    content: 'While he was still speaking to the people, behold, '
  - type: note
    content: For ver. 46-50, see Mark 3:31-35; Luke 8:19-21
  - type: text
    content: 'his mother and his '
  - type: note
    content: ch. 13:55; Mark 6:3; John 2:12; 7:3, 5, 10; Acts 1:14; 1 Cor. 9:5; Gal. 1:19
  - type: text
    content: brothers
  - type: note
    content: Or brothers and sisters; also verses 48, 49
  - type: text
    content: ' stood outside, asking to speak to him.'
  - type: note
    content: 'Some manuscripts insert verse 47: Someone told him, “Your mother and your brothers are standing outside, asking to speak to you”'
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'But he replied to the man who told him, '
  - type: text
    content: “Who is my mother, and who are my brothers?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And stretching out his hand toward his disciples, he said, '
  - type: text
    content: “Here are my mother and my brothers!
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Or have you not read '
  - type: note
    content: Num. 28:9, 10; [1 Chr. 9:32; John 7:22, 23]
  - type: text
    content: in the Law how on the Sabbath the priests in the temple profane the Sabbath and are guiltless?
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'For '
  - type: note
    content: '[John 15:14; Heb. 2:11]'
  - type: text
    content: 'whoever '
  - type: note
    content: ch. 7:21; [Luke 11:28]
  - type: text
    content: does the will of my Father in heaven is my brother and sister and mother.”
  '6':
  - type: text
    content: 'I tell you, '
  - type: note
    content: ver. 41, 42; [ver. 8; Hag. 2:9; Mal. 3:1]
  - type: text
    content: something greater than the temple is here.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And if you had known '
  - type: note
    content: ch. 9:13
  - type: text
    content: 'what this means, '
  - type: note
    content: Cited from Hos. 6:6; [Mic. 6:6-8]
  - type: text
    content: ‘I desire mercy, and not sacrifice,’ you would not have condemned the guiltless.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 9:6]'
  - type: text
    content: the Son of Man is lord of the Sabbath.”
  - type: heading
    content: A Man with a Withered Hand
  '9':
  - type: text
    content: 'He went on from there and '
  - type: note
    content: For ver. 9-14, see Mark 3:1-6; Luke 6:6-11
  - type: text
    content: 'entered their synagogue. '
