verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Lord of the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'At that time '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-8, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 2:23-28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 6:1-5
      marker-yv: yv-n
    - type: text
      text: 'Jesus went through the grainfields on the Sabbath. His disciples were hungry, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 23:25
      marker-yv: yv-n
    - type: text
      text: 'they began to pluck heads of grain and to eat. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And a man was there with a withered hand. And they asked him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 14:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See ver. 2'
      marker-yv: yv-n
    - type: text
      text: “Is it lawful to heal on the Sabbath?”—
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 11:54
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'so that they might accuse him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
