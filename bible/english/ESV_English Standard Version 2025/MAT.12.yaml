      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
