          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:22
      marker-yv: yv-n
    - type: text
      text: 'who came back with Naomi from the country of Moab. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, ‘Please let me glean and gather among the sheaves after the reapers.’ So she came, and she has continued from early morning until now, except for a short rest.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Septuagint, Vulgate; the meaning of the Hebrew phrase is uncertain
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Boaz said to Ruth, “Now, listen, my daughter, do not go to glean in another field or leave this one, but keep close to my young women. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your eyes be on the field that they are reaping, and go after them. Have I not charged the young men not to touch you? And when you are thirsty, go to the vessels and drink what the young men have drawn.” '
