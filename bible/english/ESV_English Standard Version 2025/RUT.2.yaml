  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And her mother-in-law said to her, “Where did you glean today? And where have you worked? Blessed be the man '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      marker-yv: yv-n
    - type: text
      text: 'who took notice of you.” So she told her mother-in-law with whom she had worked and said, “The man’s name with whom I worked today is Boaz.” '
