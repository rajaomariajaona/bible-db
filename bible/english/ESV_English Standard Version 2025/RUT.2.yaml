  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at mealtime Boaz said to her, “Come here and eat some bread and dip your morsel in the wine.” So she sat beside the reapers, and he passed to her roasted grain. And she ate until '
    - type: usfm
      marker: x
