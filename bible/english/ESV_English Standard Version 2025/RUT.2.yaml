    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with you!” And they answered, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Boaz said to his young man who was in charge of the reapers, “Whose young woman is this?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the servant who was in charge of the reapers answered, “She is the young Moabite woman, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
