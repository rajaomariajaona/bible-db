      marker-yv: yv-n
    - type: text
      text: 'she was satisfied, and she had some left over. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she rose to glean, Boaz instructed his young men, saying, “Let her glean even among the sheaves, and do not reproach her. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And also pull out some from the bundles for her and leave it for her to glean, and do not rebuke her.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she gleaned in the field until evening. Then she beat out what she had gleaned, and it was about an ephah
