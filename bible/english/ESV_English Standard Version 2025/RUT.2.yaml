  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ruth the Moabite said, “Besides, he said to me, ‘You shall keep close by my young men until they have finished all my harvest.’” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Naomi said to Ruth, her daughter-in-law, “It is good, my daughter, that you go out with his young women, lest in another field you be assaulted.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she kept close to the young women of Boaz, gleaning until the end of the barley and wheat harvests. And she lived with her mother-in-law.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she set out and went and gleaned in the field after the reapers, and she happened to come to the part of the field belonging to Boaz, who was of the clan of Elimelech. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, Boaz came from Bethlehem. And he said to the reapers, '
