document_id: RUT.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ruth Meets Boaz
  - type: text
    content: 'Now Naomi had '
  - type: note
    content: ch. 3:2, 12
  - type: text
    content: 'a relative of her husband’s, a worthy man of the clan of Elimelech, whose name was '
  - type: note
    content: ch. 4:21; Matt. 1:5
  - type: text
    content: 'Boaz. '
  '10':
  - type: text
    content: 'Then '
  - type: note
    content: '[1 Sam. 25:23, 41]'
  - type: text
    content: 'she fell on her face, bowing to the ground, and said to him, “Why have I found favor in your eyes, that you should '
  - type: note
    content: ver. 19
  - type: text
    content: 'take notice of me, since I am a foreigner?” '
  '11':
  - type: text
    content: 'But Boaz answered her, '
  - type: note
    content: ch. 1:14, 16, 17
  - type: text
    content: '“All that you have done for your mother-in-law since the death of your husband has been fully told to me, and how you left your father and mother and your native land and came to a people that you did not know before. '
  '12':
  - type: note
    content: '[1 Sam. 24:19]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' repay you for what you have done, and a full reward be given you by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, under whose wings you have come to take refuge!” '
  '13':
  - type: text
    content: 'Then she said, '
  - type: note
    content: ver. 2, 10; Gen. 33:15; 1 Sam. 1:18
  - type: text
    content: “I have found favor in your eyes, my lord, for you have comforted me and spoken kindly to your servant, though I am not one of your servants.”
  '14':
  - type: text
    content: 'And at mealtime Boaz said to her, “Come here and eat some bread and dip your morsel in the wine.” So she sat beside the reapers, and he passed to her roasted grain. And she ate until '
  - type: note
    content: ver. 18
  - type: text
    content: 'she was satisfied, and she had some left over. '
  '15':
  - type: text
    content: 'When she rose to glean, Boaz instructed his young men, saying, “Let her glean even among the sheaves, and do not reproach her. '
  '16':
  - type: text
    content: And also pull out some from the bundles for her and leave it for her to glean, and do not rebuke her.”
  '17':
  - type: text
    content: So she gleaned in the field until evening. Then she beat out what she had gleaned, and it was about an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of barley. '
  '18':
  - type: text
    content: 'And she took it up and went into the city. Her mother-in-law saw what she had gleaned. She also brought out and gave her what food she had left over '
  - type: note
    content: ver. 14
  - type: text
    content: 'after being satisfied. '
  '19':
  - type: text
    content: 'And her mother-in-law said to her, “Where did you glean today? And where have you worked? Blessed be the man '
  - type: note
    content: ver. 10
  - type: text
    content: 'who took notice of you.” So she told her mother-in-law with whom she had worked and said, “The man’s name with whom I worked today is Boaz.” '
  '2':
  - type: text
    content: 'And Ruth the Moabite said to Naomi, “Let me go to the field and '
  - type: note
    content: '[Deut. 24:19]'
  - type: text
    content: 'glean among the ears of grain after him '
  - type: note
    content: ver. 10, 13
  - type: text
    content: 'in whose sight I shall find favor.” And she said to her, “Go, my daughter.” '
  '20':
  - type: text
    content: 'And Naomi said to her daughter-in-law, '
  - type: note
    content: ch. 3:10; Judg. 17:2; 1 Sam. 15:13; 23:21; 2 Sam. 2:5
  - type: text
    content: '“May he be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ', whose kindness has not forsaken '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'the living or the dead!” Naomi also said to her, “The man is a close relative of ours, one of '
  - type: note
    content: ch. 3:9; 4:14
  - type: text
    content: 'our redeemers.” '
  '21':
  - type: text
    content: 'And Ruth the Moabite said, “Besides, he said to me, ‘You shall keep close by my young men until they have finished all my harvest.’” '
  '22':
  - type: text
    content: 'And Naomi said to Ruth, her daughter-in-law, “It is good, my daughter, that you go out with his young women, lest in another field you be assaulted.” '
  '23':
  - type: text
    content: So she kept close to the young women of Boaz, gleaning until the end of the barley and wheat harvests. And she lived with her mother-in-law.
  '3':
  - type: text
    content: 'So she set out and went and gleaned in the field after the reapers, and she happened to come to the part of the field belonging to Boaz, who was of the clan of Elimelech. '
  '4':
  - type: text
    content: 'And behold, Boaz came from Bethlehem. And he said to the reapers, '
  - type: note
    content: Ps. 129:7, 8
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' be with you!” And they answered, “The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you.” '
  '5':
  - type: text
    content: 'Then Boaz said to his young man who was in charge of the reapers, “Whose young woman is this?” '
  '6':
  - type: text
    content: 'And the servant who was in charge of the reapers answered, “She is the young Moabite woman, '
  - type: note
    content: ch. 1:22
  - type: text
    content: 'who came back with Naomi from the country of Moab. '
  '7':
  - type: text
    content: She said, ‘Please let me glean and gather among the sheaves after the reapers.’ So she came, and she has continued from early morning until now, except for a short rest.”
  - type: note
    content: Compare Septuagint, Vulgate; the meaning of the Hebrew phrase is uncertain
  '8':
  - type: text
    content: 'Then Boaz said to Ruth, “Now, listen, my daughter, do not go to glean in another field or leave this one, but keep close to my young women. '
  '9':
  - type: text
    content: 'Let your eyes be on the field that they are reaping, and go after them. Have I not charged the young men not to touch you? And when you are thirsty, go to the vessels and drink what the young men have drawn.” '
