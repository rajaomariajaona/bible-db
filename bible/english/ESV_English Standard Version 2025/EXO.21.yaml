      text: burn for burn, wound for wound, stripe for stripe.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When a man strikes the eye of his slave, male or female, and destroys it, he shall let the slave go free because of his eye. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If he knocks out the tooth of his slave, male or female, he shall let the slave go free because of his tooth.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When an ox gores a man or a woman to death, the '
    - type: usfm
