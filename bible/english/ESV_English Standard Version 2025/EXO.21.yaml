        children:
        - type: text
          text: '28'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: the ox shall be stoned.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laws About Restitution
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When a man opens a pit, or when a man digs a pit and does not cover it, and an ox or a donkey falls into it, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the owner of the pit shall make restoration. He shall give money to its owner, and the dead beast shall be his.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When one man’s ox butts another’s, so that it dies, then they shall sell the live ox and share its price, and the dead beast also they shall share. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or if it is known that the ox has been accustomed to gore in the past, and its owner has not kept it in, he shall repay ox for ox, and the dead beast shall be his.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If his master gives him a wife and she bears him sons or daughters, the wife and her children shall be her master’s, and he shall go out alone. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 15:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: 'if the slave plainly says, ‘I love my master, my wife, and my children; I will not go out free,’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then his master shall bring him to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 82:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 10:34
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: God, and he shall bring him to the door or the doorpost. And his master shall bore his ear through with an awl, and he shall be his slave forever.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When a man '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 5:5
      marker-yv: yv-n
    - type: text
      text: 'sells his daughter as a slave, she shall not go out as the male slaves do. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If she does not please her master, who has designated her
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: so that he has not designated her
      marker-yv: yv-n
    - type: text
      text: ' for himself, then he shall let her be redeemed. He shall have no right to sell her to a foreign people, since he has broken faith with her. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he designates her for his son, he shall deal with her as with a daughter. '
