document_id: EXO.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws About Slaves
  - type: text
    content: '“Now these are the '
  - type: note
    content: ch. 24:3; Deut. 4:14; 6:1
  - type: text
    content: 'rules that you shall set before them. '
  '10':
  - type: text
    content: 'If he takes another wife to himself, he shall not diminish her food, her clothing, or '
  - type: note
    content: 1 Cor. 7:5
  - type: text
    content: 'her marital rights. '
  '11':
  - type: text
    content: And if he does not do these three things for her, she shall go out for nothing, without payment of money.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Gen. 9:6; Lev. 24:17; Num. 35:30, 31; [ Matt. 26:52 ]
  - type: text
    content: '“Whoever strikes a man so that he dies shall be put to death. '
  '13':
  - type: note
    content: Deut. 19:4, 5; See Num. 35:22-25
  - type: text
    content: 'But if he did not lie in wait for him, but God let him fall into his hand, then '
  - type: note
    content: Num. 35:11; Deut. 4:41-43; 19:2, 3; See Josh. 20:2-9
  - type: text
    content: 'I will appoint for you a place to which he may flee. '
  '14':
  - type: text
    content: 'But if a man willfully attacks another to kill him by cunning, '
  - type: note
    content: See 1 Kgs. 2:28-34
  - type: text
    content: you shall take him from my altar, that he may die.
  '15':
  - type: text
    content: “Whoever strikes his father or his mother shall be put to death.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Deut. 24:7; 1 Tim. 1:10
  - type: text
    content: '“Whoever steals a man and sells him, and anyone found '
  - type: note
    content: ch. 22:4
  - type: text
    content: in possession of him, shall be put to death.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Lev. 20:9; Deut. 27:16; Cited Matt. 15:4; Mark 7:10; [ Prov. 20:20; 30:11 ]
  - type: text
    content: “Whoever curses
  - type: note
    content: Or dishonors; Septuagint reviles
  - type: text
    content: ' his father or his mother shall be put to death.'
  '18':
  - type: text
    content: '“When men quarrel and one strikes the other with a stone or with his fist and the man does not die but takes to his bed, '
  '19':
  - type: text
    content: then if the man rises again and walks outdoors with his staff, he who struck him shall be clear; only he shall pay for the loss of his time, and shall have him thoroughly healed.
  '2':
  - type: note
    content: Deut. 15:12; Jer. 34:14; See Lev. 25:39-41
  - type: text
    content: When you buy a Hebrew slave,
  - type: note
    content: Or servant; the Hebrew term ‘ebed designates a range of social and economic roles; also verses 5, 6, 7, 20, 21, 26, 27, 32 (see Preface)
  - type: text
    content: ' he shall serve six years, and in the seventh he shall go out free, for nothing. '
  '20':
  - type: text
    content: '“When a man strikes his slave, male or female, with a rod and the slave dies under his hand, he shall be avenged. '
  '21':
  - type: text
    content: 'But if the slave survives a day or two, he is not to be avenged, for the '
  - type: note
    content: '[Lev. 25:45, 46]'
  - type: text
    content: slave is his money.
  '22':
  - type: text
    content: '“When men strive together and hit a pregnant woman, so that her children come out, but there is no harm, the one who hit her shall surely be fined, as the woman’s husband shall impose on him, and '
  - type: note
    content: '[Deut. 22:18, 19]'
  - type: text
    content: 'he shall pay as the '
  - type: note
    content: '[Job 31:11]'
  - type: text
    content: 'judges determine. '
  '23':
  - type: text
    content: But if there is harm,
  - type: note
    content: Or so that her children come out and it is clear who was to blame, he shall be fined as the woman’s husband shall impose on him, and he alone shall pay. 23 If it is unclear who was to blame
  - type: text
    content: ' then you shall pay '
  - type: note
    content: Deut. 19:21
  - type: text
    content: 'life for life, '
  '24':
  - type: note
    content: Lev. 24:20; Deut. 19:21; Cited Matt. 5:38
  - type: text
    content: 'eye for eye, tooth for tooth, hand for hand, foot for foot, '
  '25':
  - type: text
    content: burn for burn, wound for wound, stripe for stripe.
  '26':
  - type: text
    content: '“When a man strikes the eye of his slave, male or female, and destroys it, he shall let the slave go free because of his eye. '
  '27':
  - type: text
    content: If he knocks out the tooth of his slave, male or female, he shall let the slave go free because of his tooth.
  '28':
  - type: text
    content: '“When an ox gores a man or a woman to death, the '
  - type: note
    content: Gen. 9:5
  - type: text
    content: 'ox shall be stoned, and its flesh shall not be eaten, but the owner of the ox shall not be liable. '
  '29':
  - type: text
    content: 'But if the ox has been accustomed to gore in the past, and its owner has been warned but has not kept it in, and it kills a man or a woman, the ox shall be stoned, and its owner also shall be put to death. '
  '3':
  - type: text
    content: 'If he comes in single, he shall go out single; if he comes in married, then his wife shall go out with him. '
  '30':
  - type: text
    content: 'If '
  - type: note
    content: ch. 30:12; Num. 35:31, 32
  - type: text
    content: 'a ransom is imposed on him, then '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'he shall give for the redemption of his life whatever is imposed on him. '
  '31':
  - type: text
    content: 'If it gores a man’s son or daughter, he shall be dealt with according to this same rule. '
  '32':
  - type: text
    content: 'If the ox gores a slave, male or female, the owner shall give to their master '
  - type: note
    content: '[Zech. 11:12, 13; Matt. 26:15]'
  - type: text
    content: thirty shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver, and '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: the ox shall be stoned.
  - type: heading
    content: Laws About Restitution
  '33':
  - type: text
    content: '“When a man opens a pit, or when a man digs a pit and does not cover it, and an ox or a donkey falls into it, '
  '34':
  - type: text
    content: the owner of the pit shall make restoration. He shall give money to its owner, and the dead beast shall be his.
  '35':
  - type: text
    content: '“When one man’s ox butts another’s, so that it dies, then they shall sell the live ox and share its price, and the dead beast also they shall share. '
  '36':
  - type: text
    content: Or if it is known that the ox has been accustomed to gore in the past, and its owner has not kept it in, he shall repay ox for ox, and the dead beast shall be his.
  '4':
  - type: text
    content: 'If his master gives him a wife and she bears him sons or daughters, the wife and her children shall be her master’s, and he shall go out alone. '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: Deut. 15:16, 17
  - type: text
    content: 'if the slave plainly says, ‘I love my master, my wife, and my children; I will not go out free,’ '
  '6':
  - type: text
    content: 'then his master shall bring him to '
  - type: note
    content: '[Ps. 82:6; John 10:34, 35]'
  - type: text
    content: God, and he shall bring him to the door or the doorpost. And his master shall bore his ear through with an awl, and he shall be his slave forever.
  '7':
  - type: text
    content: '“When a man '
  - type: note
    content: Neh. 5:5
  - type: text
    content: 'sells his daughter as a slave, she shall not go out as the male slaves do. '
  '8':
  - type: text
    content: If she does not please her master, who has designated her
  - type: note
    content: Or so that he has not designated her
  - type: text
    content: ' for himself, then he shall let her be redeemed. He shall have no right to sell her to a foreign people, since he has broken faith with her. '
  '9':
  - type: text
    content: 'If he designates her for his son, he shall deal with her as with a daughter. '
