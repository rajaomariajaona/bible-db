        marker: ref
        children:
        - type: text
          text: Gen. 9:5
      marker-yv: yv-n
    - type: text
      text: 'ox shall be stoned, and its flesh shall not be eaten, but the owner of the ox shall not be liable. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the ox has been accustomed to gore in the past, and its owner has been warned but has not kept it in, and it kills a man or a woman, the ox shall be stoned, and its owner also shall be put to death. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he comes in single, he shall go out single; if he comes in married, then his wife shall go out with him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If '
    - type: usfm
