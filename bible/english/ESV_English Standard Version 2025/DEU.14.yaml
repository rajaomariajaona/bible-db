document_id: DEU.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Clean and Unclean Food
  - type: text
    content: '“You are '
  - type: note
    content: '[Isa. 1:2; Hos. 1:10; John 1:12; Rom. 9:8, 26; Gal. 3:26]'
  - type: text
    content: 'the sons of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  - type: note
    content: See Lev. 19:28
  - type: text
    content: 'You shall not cut yourselves or make any '
  - type: note
    content: '[Isa. 15:2; 22:12; Ezek. 7:18; Amos 8:10]'
  - type: text
    content: 'baldness on your foreheads for the dead. '
  '10':
  - type: text
    content: And whatever does not have fins and scales you shall not eat; it is unclean for you.
  '11':
  - type: text
    content: '“You may eat all clean birds. '
  '12':
  - type: text
    content: 'But these are the ones that you shall not eat: the eagle,'
  - type: note
    content: The identity of many of these birds is uncertain
  - type: text
    content: ' the bearded vulture, the black vulture, '
  '13':
  - type: text
    content: 'the kite, the falcon of any kind; '
  '14':
  - type: text
    content: 'every raven of any kind; '
  '15':
  - type: text
    content: 'the ostrich, the nighthawk, the sea gull, the hawk of any kind; '
  '16':
  - type: text
    content: 'the little owl and the short-eared owl, the barn owl '
  '17':
  - type: text
    content: 'and the tawny owl, the carrion vulture and the cormorant, '
  '18':
  - type: text
    content: 'the stork, the heron of any kind; the hoopoe and the bat. '
  '19':
  - type: text
    content: 'And all winged insects are unclean for you; they shall not be eaten. '
  '2':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to be a people for his treasured possession, out of all the peoples who are on the face of the earth.'
  '20':
  - type: text
    content: All clean winged things you may eat.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 7:24
  - type: text
    content: '“You shall not eat anything that has died naturally. You may give it to the sojourner who is within your towns, that he may eat it, or you may sell it to a foreigner. For '
  - type: note
    content: See ch. 7:6
  - type: text
    content: 'you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: note
    content: See Ex. 23:19
  - type: text
    content: “You shall not boil a young goat in its mother’s milk.
  - type: heading
    content: Tithes
  '22':
  - type: text
    content: ' '
  - type: note
    content: See Num. 18:21
  - type: text
    content: '“You shall tithe all the yield of your seed that comes from the field year by year. '
  '23':
  - type: text
    content: 'And before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, in the place that he will choose, to make his name dwell there, '
  - type: note
    content: ch. 12:7; 15:20
  - type: text
    content: 'you shall eat the tithe of your grain, of your wine, and of your oil, '
  - type: note
    content: ch. 12:6
  - type: text
    content: 'and the firstborn of your herd and flock, '
  - type: note
    content: ch. 4:10; 17:19
  - type: text
    content: 'that you may learn to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God always. '
  '24':
  - type: text
    content: 'And if the way is too long for you, so that you are not able to carry the tithe, when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God blesses you, because '
  - type: note
    content: ch. 12:21
  - type: text
    content: 'the place is too far from you, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses, to set his name there, '
  '25':
  - type: text
    content: 'then you shall turn it into money and bind up the money in your hand and go to the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses '
  '26':
  - type: text
    content: 'and spend the money for whatever you desire—oxen or sheep or wine or strong drink, whatever your appetite craves. And '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'you shall eat there before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and rejoice, you and your household. '
  '27':
  - type: text
    content: 'And you shall not neglect '
  - type: note
    content: See ch. 12:19
  - type: text
    content: 'the Levite who is within your towns, for '
  - type: note
    content: See Num. 18:20
  - type: text
    content: he has no portion or inheritance with you.
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:12; [ Amos 4:4 ]
  - type: text
    content: '“At the end of every three years you shall bring out all the tithe of your produce in the same year and lay it up within your towns. '
  '29':
  - type: text
    content: 'And the Levite, because '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'he has no portion or inheritance with you, and the sojourner, the fatherless, and the widow, who are within your towns, shall come and eat and be filled, that '
  - type: note
    content: ch. 15:10; 24:19; Ps. 41:1; Prov. 14:21; 19:17; 22:9; Mal. 3:10
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in all the work of your hands that you do.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 4:14; [ Acts 10:13, 14 ]
  - type: text
    content: '“You shall not eat any abomination. '
  '4':
  - type: note
    content: For ver. 4-20, see Lev. 11:2-23
  - type: text
    content: 'These are the animals you may eat: the ox, the sheep, the goat, '
  '5':
  - type: text
    content: the deer, the gazelle, the roebuck, the wild goat, the ibex,
  - type: note
    content: Or addax
  - type: text
    content: ' the antelope, and the mountain sheep. '
  '6':
  - type: text
    content: 'Every animal that parts the hoof and has the hoof cloven in two and chews the cud, among the animals, you may eat. '
  '7':
  - type: text
    content: 'Yet of those that chew the cud or have the hoof cloven you shall not eat these: the camel, the hare, and the '
  - type: note
    content: Lev. 11:5; [Ps. 104:18; Prov. 30:26]
  - type: text
    content: 'rock badger, because they chew the cud but do not part the hoof, are unclean for you. '
  '8':
  - type: text
    content: 'And the pig, because it parts the hoof but does not chew the cud, is unclean for you. Their flesh you shall not eat, and '
  - type: note
    content: '[Lev. 11:26]'
  - type: text
    content: their carcasses you shall not touch.
  '9':
  - type: text
    content: '“Of all that are in the waters you may eat these: whatever has fins and scales you may eat. '
