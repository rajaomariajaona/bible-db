document_id: GAL.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Bear One Another’s Burdens
  - type: text
    content: Brothers,
  - type: note
    content: Or Brothers and sisters; also verse 18
  - type: text
    content: ' '
  - type: note
    content: '[Ps. 141:5; 2 Cor. 2:7; Heb. 12:13; James 5:19]'
  - type: text
    content: 'if anyone is caught in any transgression, '
  - type: note
    content: '[Rom. 15:1; 1 Cor. 10:15]; See 1 Cor. 2:15'
  - type: text
    content: 'you who are spiritual should restore him in '
  - type: note
    content: 1 Cor. 4:21; [2 Tim. 2:25]
  - type: text
    content: 'a spirit of gentleness. Keep watch on yourself, lest you too be tempted. '
  '10':
  - type: text
    content: 'So then, '
  - type: note
    content: Prov. 3:27; John 9:4; 12:35
  - type: text
    content: 'as we have opportunity, let us '
  - type: note
    content: Eph. 4:28; 1 Tim. 6:18; [1 Thess. 5:15]
  - type: text
    content: 'do good to everyone, and especially to those who are '
  - type: note
    content: '[Eph. 2:19; 1 Tim. 5:8; Heb. 3:6]'
  - type: text
    content: of the household of faith.
  - type: heading
    content: Final Warning and Benediction
  '11':
  - type: text
    content: 'See with what large letters I am writing to you '
  - type: note
    content: See 1 Cor. 16:21
  - type: text
    content: 'with my own hand. '
  '12':
  - type: note
    content: See 2 Cor. 11:13
  - type: text
    content: 'It is those who want to make a good showing in the flesh '
  - type: note
    content: ch. 2:3
  - type: text
    content: 'who would force you to be circumcised, and only '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'in order that they may not be persecuted for the cross of Christ. '
  '13':
  - type: text
    content: 'For even those who are circumcised do not themselves keep the law, but they desire to have you circumcised that they may boast in your flesh. '
  '14':
  - type: text
    content: 'But far be it from me to boast '
  - type: note
    content: 1 Cor. 2:2; [Phil. 3:3, 7, 8]
  - type: text
    content: except in the cross of our Lord Jesus Christ, by which
  - type: note
    content: Or through whom
  - type: text
    content: ' the world '
  - type: note
    content: See Rom. 6:6
  - type: text
    content: 'has been crucified to me, and I to the world. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: '[Rom. 2:28]; See ch. 5:6'
  - type: text
    content: 'neither circumcision counts for anything, nor uncircumcision, but '
  - type: note
    content: '[John 3:5, 7]; See Rom. 6:4'
  - type: text
    content: 'a new creation. '
  '16':
  - type: text
    content: 'And as for all who walk by this rule, '
  - type: note
    content: Ps. 125:5; 128:6
  - type: text
    content: 'peace and mercy be upon them, and upon '
  - type: note
    content: ch. 3:7, 9, 29; Rom. 2:29; 4:12; 9:6-8; Phil. 3:3
  - type: text
    content: the Israel of God.
  '17':
  - type: text
    content: From now on let no one cause me trouble, for I bear on my body the marks of Jesus.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Philem. 25; See Rom. 16:20
  - type: text
    content: 'The grace of our Lord Jesus Christ be '
  - type: note
    content: 2 Tim. 4:22
  - type: text
    content: with your spirit, brothers. Amen.
  '2':
  - type: note
    content: Rom. 15:1; 1 Thess. 5:14
  - type: text
    content: 'Bear one another’s burdens, and '
  - type: note
    content: '[ch. 5:14]'
  - type: text
    content: 'so fulfill '
  - type: note
    content: 1 John 4:21; See John 13:34
  - type: text
    content: 'the law of Christ. '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 2:6]; See 1 Cor. 3:7, 18'
  - type: text
    content: 'if anyone thinks he is something, '
  - type: note
    content: 2 Cor. 12:11
  - type: text
    content: 'when he is nothing, he deceives himself. '
  '4':
  - type: text
    content: 'But let each one '
  - type: note
    content: '[1 Cor. 11:28; 2 Cor. 13:5]'
  - type: text
    content: 'test his own work, and then his reason to boast will be in himself alone and not in his neighbor. '
  '5':
  - type: text
    content: 'For '
  - type: note
    content: '[Rom. 14:12]'
  - type: text
    content: each will have to bear his own load.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Rom. 15:27; 1 Cor. 9:11 ]'
  - type: text
    content: 'Let the one who is taught the word share all good things with the one who teaches. '
  '7':
  - type: note
    content: 1 Cor. 6:9; 15:33; James 1:16
  - type: text
    content: 'Do not be deceived: God is not mocked, for '
  - type: note
    content: See 2 Cor. 9:6
  - type: text
    content: 'whatever one sows, that will he also reap. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: '[Hos. 8:7]; See Job 4:8'
  - type: text
    content: 'the one who sows to his own flesh '
  - type: note
    content: See Rom. 6:21
  - type: text
    content: 'will from the flesh reap corruption, but '
  - type: note
    content: See James 3:18
  - type: text
    content: 'the one who sows to the Spirit will from the Spirit reap eternal life. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: 2 Thess. 3:13; [1 Cor. 15:58]
  - type: text
    content: 'let us not grow weary of doing good, for in due season we will reap, '
  - type: note
    content: Heb. 12:3, 5; [Heb. 10:36]; See Matt. 10:22
  - type: text
    content: 'if we do not give up. '
