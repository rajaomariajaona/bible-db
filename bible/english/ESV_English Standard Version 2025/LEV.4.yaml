document_id: LEV.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Sin Offerings
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '(just as these are taken from the ox of the sacrifice of the peace offerings); and the priest shall burn them on the altar of burnt offering. '
  '11':
  - type: text
    content: 'But '
  - type: note
    content: ch. 9:11; Ex. 29:14; Num. 19:5
  - type: text
    content: 'the skin of the bull and all its flesh, with its head, its legs, its entrails, and its dung— '
  '12':
  - type: text
    content: 'all the rest of the bull—he shall carry '
  - type: note
    content: ch. 6:11; 10:4, 5; 14:3; 16:27; 24:14, 23; Ex. 29:14; 33:7
  - type: text
    content: 'outside the camp to a clean place, to the ash heap, and shall '
  - type: note
    content: Heb. 13:11
  - type: text
    content: burn it up on a fire of wood. On the ash heap it shall be burned up.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Num. 15:24-26
  - type: text
    content: “If the whole congregation of Israel sins unintentionally
  - type: note
    content: Or makes a mistake
  - type: text
    content: ' and '
  - type: note
    content: ch. 5:2-4
  - type: text
    content: 'the thing is hidden from the eyes of the assembly, and they do any one of the things that by the '
  - type: text
    content: Lord
  - type: text
    content: ’s commandments ought not to be done, and they realize their guilt,
  - type: note
    content: Or suffer for their guilt, or are guilty; also verses 22, 27, and chapter 5
  - type: text
    content: ' '
  '14':
  - type: note
    content: ver. 23
  - type: text
    content: 'when the sin which they have committed becomes known, the assembly shall offer a bull from the herd for a sin offering and bring it in front of the tent of meeting. '
  '15':
  - type: text
    content: 'And the elders of the congregation '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'shall lay their hands on the head of the bull before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the bull shall be killed before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Then '
  - type: note
    content: See ver. 5-12
  - type: text
    content: 'the anointed priest shall bring some of the blood of the bull into the tent of meeting, '
  '17':
  - type: text
    content: 'and the priest shall dip his finger in the blood and sprinkle it seven times before the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the veil. '
  '18':
  - type: text
    content: 'And he shall put some of the blood on the horns of the altar that is in the tent of meeting before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the rest of the blood he shall pour out at the base of the altar of burnt offering that is at the entrance of the tent of meeting. '
  '19':
  - type: text
    content: 'And all its fat he shall take from it and burn on the altar. '
  '2':
  - type: text
    content: '“Speak to the people of Israel, saying, '
  - type: note
    content: ch. 5:15, 18; [Ps. 19:12]; See Num. 15:22-29
  - type: text
    content: If anyone sins unintentionally
  - type: note
    content: Or by mistake; so throughout Leviticus
  - type: text
    content: ' in any of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commandments '
  - type: note
    content: ver. 13, 22, 27; ch. 5:17
  - type: text
    content: 'about things not to be done, and does any one of them, '
  '20':
  - type: text
    content: 'Thus shall he do with the bull. As he did '
  - type: note
    content: ver. 3
  - type: text
    content: 'with the bull of the sin offering, so shall he do with this. '
  - type: note
    content: Num. 15:25, 28
  - type: text
    content: 'And the priest shall make atonement for them, and they shall be forgiven. '
  '21':
  - type: text
    content: 'And he shall carry the bull '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: outside the camp and burn it up as he burned the first bull; it is the sin offering for the assembly.
  '22':
  - type: text
    content: '“When a leader sins, '
  - type: note
    content: ver. 2, 13, 27
  - type: text
    content: 'doing unintentionally any one of all the things that by the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God ought not to be done, and realizes his guilt, '
  '23':
  - type: text
    content: 'or '
  - type: note
    content: ver. 14
  - type: text
    content: 'the sin which he has committed is made known to him, he shall bring as his offering a goat, a male without blemish, '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'shall lay his hand on the head of the goat and kill it in the place where they kill the burnt offering before the '
  - type: text
    content: Lord
  - type: text
    content: '; it is a sin offering. '
  '25':
  - type: note
    content: ver. 7, 18, 30, 34
  - type: text
    content: 'Then the priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and pour out the rest of its blood at the base of the altar of burnt offering. '
  '26':
  - type: text
    content: 'And all its fat he shall burn on the altar, like '
  - type: note
    content: ver. 31; ch. 3:3, 5
  - type: text
    content: 'the fat of the sacrifice of peace offerings. So '
  - type: note
    content: ver. 20, 31, 35; ch. 5:10, 13, 16, 18; 6:7; 14:18; 15:15
  - type: text
    content: the priest shall make atonement for him for his sin, and he shall be forgiven.
  '27':
  - type: text
    content: '“If '
  - type: note
    content: ver. 2; Num. 15:27
  - type: text
    content: 'anyone of the common people sins unintentionally in doing any one of the things that by the '
  - type: text
    content: Lord
  - type: text
    content: '’s commandments ought not to be done, and realizes his guilt, '
  '28':
  - type: note
    content: ver. 14, 23
  - type: text
    content: 'or the sin which he has committed is made known to him, he shall bring for his offering a goat, a female without blemish, for his sin which he has committed. '
  '29':
  - type: note
    content: ver. 4, 15, 24; See ch. 1:4
  - type: text
    content: 'And he shall lay his hand on the head of the sin offering and kill the sin offering in the place of burnt offering. '
  '3':
  - type: text
    content: 'if it is the anointed priest who '
  - type: note
    content: '[Heb. 7:27, 28]'
  - type: text
    content: 'sins, thus bringing guilt on the people, then he shall offer for the sin that he has committed '
  - type: note
    content: ch. 9:2
  - type: text
    content: 'a bull from the herd without blemish to the '
  - type: text
    content: Lord
  - type: text
    content: ' for a sin offering. '
  '30':
  - type: text
    content: 'And the priest shall take some of its blood with his finger and put it on the horns of the altar of burnt offering and pour out all the rest of its blood at the base of the altar. '
  '31':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:14
  - type: text
    content: 'all its fat he shall remove, '
  - type: note
    content: ver. 10, 26; ch. 3:3
  - type: text
    content: 'as the fat is removed from the peace offerings, and the priest shall burn it on the altar for a '
  - type: note
    content: ch. 1:9; See Gen. 8:21
  - type: text
    content: 'pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: ver. 20, 26, 35
  - type: text
    content: And the priest shall make atonement for him, and he shall be forgiven.
  '32':
  - type: text
    content: '“If he brings a lamb as his offering for a sin offering, he shall bring '
  - type: note
    content: ver. 28
  - type: text
    content: 'a female without blemish '
  '33':
  - type: note
    content: '[See ver. 29above]'
  - type: text
    content: 'and lay his hand on the head of the sin offering and kill it for a sin offering in the place where they kill the burnt offering. '
  '34':
  - type: text
    content: 'Then the priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and pour out all the rest of its blood at the base of the altar. '
  '35':
  - type: text
    content: 'And all its fat he shall remove '
  - type: note
    content: ch. 3:3, 9
  - type: text
    content: 'as the fat of the lamb is removed from the sacrifice of peace offerings, and the priest shall burn it on the altar, on top of the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings. '
  - type: note
    content: ver. 20, 26, 31
  - type: text
    content: And the priest shall make atonement for him for the sin which he has committed, and he shall be forgiven.
  '4':
  - type: text
    content: 'He shall bring the bull to the '
  - type: note
    content: ch. 1:3, 4
  - type: text
    content: 'entrance of the tent of meeting before the '
  - type: text
    content: Lord
  - type: text
    content: ' and lay his hand on the head of the bull and kill the bull before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And the anointed priest '
  - type: note
    content: ver. 16, 17; ch. 5:9; 16:14; Num. 19:4; [Isa. 52:15]
  - type: text
    content: 'shall take some of the blood of the bull and bring it into the tent of meeting, '
  '6':
  - type: text
    content: 'and the priest shall dip his finger in the blood and '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'sprinkle part of the blood seven times before the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the veil of the sanctuary. '
  '7':
  - type: text
    content: 'And the priest '
  - type: note
    content: ch. 8:15; 9:9; 16:18; [Ex. 39:38]
  - type: text
    content: 'shall put some of the blood on the horns of the altar of fragrant incense before the '
  - type: text
    content: Lord
  - type: text
    content: ' that is in the tent of meeting, and '
  - type: note
    content: ch. 5:9; 8:15; 9:9; Ex. 29:12
  - type: text
    content: 'all the rest of the blood of the bull he shall pour out at the base of the altar of burnt offering that is at the entrance of the tent of meeting. '
  '8':
  - type: text
    content: 'And all the fat of the bull of the sin offering he shall remove from it, '
  - type: note
    content: ch. 3:3
  - type: text
    content: 'the fat that covers the entrails and all the fat that is on the entrails '
  '9':
  - type: note
    content: ch. 3:4
  - type: text
    content: 'and the two kidneys with the fat that is on them at the loins and the long lobe of the liver that he shall remove with the kidneys '
