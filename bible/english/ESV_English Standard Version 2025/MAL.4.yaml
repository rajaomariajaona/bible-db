document_id: MAL.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Day of the Lord
  - type: text
    content: ' '
  - type: note
    content: Ch 4:1–6 is ch 3:19–24 in Hebrew
  - type: text
    content: '“For behold, '
  - type: note
    content: '[ver. 5; ch. 3:2]'
  - type: text
    content: 'the day is coming, '
  - type: note
    content: '[2 Thess. 1:7, 8]'
  - type: text
    content: 'burning like an oven, when '
  - type: note
    content: ch. 3:15
  - type: text
    content: 'all the arrogant and '
  - type: note
    content: ch. 3:15
  - type: text
    content: 'all evildoers '
  - type: note
    content: Isa. 47:14; [Matt. 3:12; Luke 3:17]
  - type: text
    content: 'will be stubble. The day that is coming '
  - type: note
    content: Isa. 47:14; [Matt. 3:12; Luke 3:17]
  - type: text
    content: 'shall set them ablaze, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, so that it will leave them neither root nor branch. '
  '2':
  - type: text
    content: 'But for you '
  - type: note
    content: ch. 3:16
  - type: text
    content: 'who fear my name, '
  - type: note
    content: Ps. 84:11; Luke 1:78; John 1:4; 8:12; 9:5; 12:46
  - type: text
    content: 'the sun '
  - type: note
    content: '[Jer. 23:6]'
  - type: text
    content: 'of righteousness shall rise '
  - type: note
    content: Isa. 53:5
  - type: text
    content: 'with healing in its wings. You shall go out '
  - type: note
    content: '[Jer. 50:11]'
  - type: text
    content: 'leaping like calves from the stall. '
  '3':
  - type: text
    content: 'And you shall tread down the wicked, for they will be ashes under the soles of your feet, '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'on the day when I act, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 4:9, 10 ]'
  - type: text
    content: '“Remember '
  - type: note
    content: See Ex. 20:3-17; Deut. 4:10
  - type: text
    content: the law of my servant Moses, the statutes and rules
  - type: note
    content: Or and just decrees
  - type: text
    content: ' that I commanded him at Horeb for all Israel.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:1 ]'
  - type: text
    content: '“Behold, I will send you '
  - type: note
    content: '[Matt. 11:14; Mark 9:11; Luke 1:17]'
  - type: text
    content: 'Elijah the prophet '
  - type: note
    content: Joel 2:31
  - type: text
    content: 'before the great and awesome day of the '
  - type: text
    content: Lord
  - type: text
    content: ' comes. '
  '6':
  - type: text
    content: 'And he will '
  - type: note
    content: '[Luke 1:17]'
  - type: text
    content: 'turn the hearts of fathers to their children and the hearts of children to their fathers, lest I come and '
  - type: note
    content: Isa. 11:4; [Zech. 5:3]
  - type: text
    content: strike the land with a decree of utter destruction.”
  - type: note
    content: The Hebrew term rendered decree of utter destruction refers to things devoted (or set apart) to the Lord (or by the Lord) for destruction
