document_id: 2SA.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Hears of Saul’s Death
  - type: text
    content: 'After the death of Saul, when David had returned '
  - type: note
    content: See 1 Sam. 30:17-20
  - type: text
    content: 'from striking down the Amalekites, David remained two days in Ziklag. '
  '10':
  - type: text
    content: 'So I stood beside him and killed him, because I was sure that he could not live after he had fallen. '
  - type: note
    content: '[2 Kgs. 11:12]'
  - type: text
    content: And I took the crown that was on his head and the armlet that was on his arm, and I have brought them here to my lord.”
  '11':
  - type: text
    content: 'Then David took hold of his clothes and '
  - type: note
    content: ch. 13:31; [ch. 3:31]; See Josh. 7:6
  - type: text
    content: 'tore them, and so did all the men who were with him. '
  '12':
  - type: text
    content: 'And they mourned and wept '
  - type: note
    content: '[ch. 3:35]'
  - type: text
    content: 'and fasted until evening for Saul and for Jonathan his son and for the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the house of Israel, because they had fallen by the sword. '
  '13':
  - type: text
    content: 'And David said to the young man who told him, “Where do you come from?” And he answered, “I am the son of a sojourner, an Amalekite.” '
  '14':
  - type: text
    content: 'David said to him, “How is it you were not '
  - type: note
    content: '[1 Sam. 24:6, 10; 26:9; 31:4]'
  - type: text
    content: 'afraid to put out your hand to destroy '
  - type: note
    content: See 1 Sam. 12:3
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed?” '
  '15':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 4:10
  - type: text
    content: 'David called one of the young men and said, “Go, execute him.” And he struck him down so that he died. '
  '16':
  - type: text
    content: 'And David said to him, '
  - type: note
    content: '[ch. 3:29; Josh. 2:19; 1 Kgs. 2:32, 37; Matt. 27:25]'
  - type: text
    content: '“Your blood be on your head, for your own mouth has testified against you, saying, ‘I have killed '
  - type: note
    content: See 1 Sam. 12:3
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed.’”
  - type: heading
    content: David’s Lament for Saul and Jonathan
  '17':
  - type: text
    content: 'And David '
  - type: note
    content: '[ch. 3:33; 2 Chr. 35:25]'
  - type: text
    content: 'lamented with this lamentation over Saul and Jonathan his son, '
  '18':
  - type: text
    content: and he said it
  - type: note
    content: Septuagint; Hebrew the Bow, which may be the name of the lament’s tune
  - type: text
    content: ' should be taught to the people of Judah; behold, it is written in '
  - type: note
    content: Josh. 10:13
  - type: text
    content: the Book of Jashar.
  - type: note
    content: Or of the upright
  - type: text
    content: ' He said:'
  '19':
  - type: text
    content: “Your glory, O Israel, is slain on your high places!
  - type: note
    content: ver. 25, 27
  - type: text
    content: How the mighty have fallen!
  '2':
  - type: text
    content: 'And on the third day, behold, '
  - type: note
    content: ch. 4:10
  - type: text
    content: 'a man came from Saul’s camp, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'with his clothes torn and dirt on his head. And when he came to David, '
  - type: note
    content: ch. 14:4
  - type: text
    content: 'he fell to the ground and paid homage. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mic. 1:10
  - type: text
    content: Tell it not in Gath,
  - type: note
    content: '[ 1 Sam. 31:9; Amos 3:9 ]'
  - type: text
    content: publish it not in the streets of Ashkelon,
  - type: note
    content: '[ Ex. 15:20; Judg. 11:34 ]'
  - type: text
    content: lest the daughters of the Philistines rejoice,
  - type: text
    content: 'lest the daughters of '
  - type: note
    content: See Judg. 14:3
  - type: text
    content: the uncircumcised exult.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 1 Sam. 31:1
  - type: text
    content: “You mountains of Gilboa,
  - type: text
    content: let there be no dew or rain upon you,
  - type: text
    content: nor fields of offerings!
  - type: note
    content: Septuagint firstfruits
  - type: text
    content: For there the shield of the mighty was defiled,
  - type: text
    content: 'the shield of Saul, not '
  - type: note
    content: '[1 Sam. 10:1]'
  - type: text
    content: anointed with oil.
  '22':
  - type: text
    content: “From the blood of the slain,
  - type: text
    content: from the fat of the mighty,
  - type: note
    content: '[ 1 Sam. 18:4 ]'
  - type: text
    content: the bow of Jonathan turned not back,
  - type: text
    content: and the sword of Saul returned not empty.
  '23':
  - type: text
    content: “Saul and Jonathan, beloved and lovely!
  - type: text
    content: In life and in death they were not divided;
  - type: text
    content: 'they were '
  - type: note
    content: '[Jer. 4:13; Hab. 1:8]'
  - type: text
    content: swifter than eagles;
  - type: text
    content: 'they were '
  - type: note
    content: '[Judg. 14:18]'
  - type: text
    content: stronger than lions.
  '24':
  - type: text
    content: “You daughters of Israel, weep over Saul,
  - type: text
    content: who clothed you luxuriously in scarlet,
  - type: note
    content: '[ Ezek. 16:11 ]'
  - type: text
    content: who put ornaments of gold on your apparel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ver. 19
  - type: text
    content: “How the mighty have fallen
  - type: text
    content: in the midst of the battle!
  - type: text
    content: “Jonathan lies slain on your high places.
  '26':
  - type: text
    content: I am distressed for you, my brother Jonathan;
  - type: text
    content: very pleasant have you been to me;
  - type: note
    content: See 1 Sam. 18:1, 3
  - type: text
    content: your love to me was extraordinary,
  - type: text
    content: surpassing the love of women.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: “How the mighty have fallen,
  - type: text
    content: and the weapons of war perished!”
  '3':
  - type: text
    content: 'David said to him, “Where do you come from?” And he said to him, “I have escaped from the camp of Israel.” '
  '4':
  - type: text
    content: 'And David said to him, '
  - type: note
    content: '[1 Sam. 4:16]'
  - type: text
    content: '“How did it go? Tell me.” And he answered, “The people fled from the battle, and also many of the people have fallen and are dead, and Saul and his son Jonathan are also dead.” '
  '5':
  - type: text
    content: 'Then David said to the young man who told him, “How do you know that Saul and his son Jonathan are dead?” '
  '6':
  - type: text
    content: 'And the young man who told him said, '
  - type: note
    content: For ver. 6-10, see 1 Sam. 31:1-4; 1 Chr. 10:1-6
  - type: text
    content: '“By chance I happened to be on Mount Gilboa, and there was Saul leaning on his spear, and behold, the chariots and the horsemen were close upon him. '
  '7':
  - type: text
    content: 'And when he looked behind him, he saw me, and called to me. And I answered, ‘Here I am.’ '
  '8':
  - type: text
    content: 'And he said to me, ‘Who are you?’ I answered him, ‘I am an Amalekite.’ '
  '9':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: '[Judg. 9:54]'
  - type: text
    content: '‘Stand beside me and kill me, for anguish has seized me, and yet my life still lingers.’ '
