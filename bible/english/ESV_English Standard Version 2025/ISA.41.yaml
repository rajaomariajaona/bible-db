document_id: ISA.41,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Fear Not, for I Am with You
  - type: text
    content: ' '
  - type: note
    content: '[ Hab. 2:20; Zech. 2:13 ]'
  - type: text
    content: 'Listen to me in silence, '
  - type: note
    content: See ch. 11:11
  - type: text
    content: O coastlands;
  - type: text
    content: let the peoples renew their strength;
  - type: text
    content: let them approach, then let them speak;
  - type: text
    content: let us together draw near for judgment.
  '10':
  - type: text
    content: fear not, for I am with you;
  - type: text
    content: be not dismayed, for I am your God;
  - type: text
    content: I will strengthen you, I will help you,
  - type: text
    content: 'I will uphold you with '
  - type: note
    content: Ps. 48:10
  - type: text
    content: my righteous right hand.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 45:24 ]'
  - type: text
    content: Behold, all who are incensed against you
  - type: text
    content: shall be put to shame and confounded;
  - type: text
    content: those who strive against you
  - type: text
    content: shall be as nothing and shall perish.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps. 37:10
  - type: text
    content: You shall seek those who contend with you,
  - type: text
    content: but you shall not find them;
  - type: note
    content: ch. 40:17
  - type: text
    content: those who war against you
  - type: text
    content: shall be as nothing at all.
  '13':
  - type: text
    content: 'For I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: hold your right hand;
  - type: text
    content: it is I who say to you, “Fear not,
  - type: text
    content: I am the one who helps you.”
  '14':
  - type: text
    content: 'Fear not, you '
  - type: note
    content: '[Ps. 22:6]'
  - type: text
    content: worm Jacob,
  - type: text
    content: you men of Israel!
  - type: text
    content: 'I am the one who helps you, declares the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'your '
  - type: note
    content: ch. 54:5; [Ps. 78:35]; See ch. 43:14
  - type: text
    content: Redeemer is the Holy One of Israel.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mic. 4:13
  - type: text
    content: Behold, I make of you a threshing sledge,
  - type: text
    content: new, sharp, and having teeth;
  - type: text
    content: 'you shall thresh '
  - type: note
    content: '[ch. 2:14]'
  - type: text
    content: the mountains and crush them,
  - type: text
    content: and you shall make the hills like chaff;
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 51:2 ]'
  - type: text
    content: 'you shall winnow them, and '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: the wind shall carry them away,
  - type: text
    content: and the tempest shall scatter them.
  - type: note
    content: ch. 45:25
  - type: text
    content: 'And you shall rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in the Holy One of Israel you shall glory.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 44:3 ]'
  - type: text
    content: When the poor and needy seek water,
  - type: text
    content: and there is none,
  - type: text
    content: and their tongue is parched with thirst,
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer them;'
  - type: text
    content: I the God of Israel will not forsake them.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:6, 7
  - type: text
    content: I will open rivers on the bare heights,
  - type: text
    content: and fountains in the midst of the valleys.
  - type: note
    content: Ps. 107:35
  - type: text
    content: I will make the wilderness a pool of water,
  - type: text
    content: and the dry land springs of water.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 35:1, 2; 55:12, 13
  - type: text
    content: I will put in the wilderness the cedar,
  - type: text
    content: the acacia, the myrtle, and the olive.
  - type: text
    content: 'I will set in the desert '
  - type: note
    content: ch. 60:13
  - type: text
    content: the cypress,
  - type: text
    content: the plane and the pine together,
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 46:11; [ch. 45:1 ]
  - type: text
    content: Who stirred up one from the east
  - type: text
    content: 'whom victory meets at every '
  - type: note
    content: '[Judg. 4:10]'
  - type: text
    content: step?
  - type: note
    content: Or whom righteousness calls to follow?
  - type: note
    content: 2 Chr. 36:23
  - type: text
    content: He gives up nations before him,
  - type: text
    content: so that he tramples kings underfoot;
  - type: text
    content: he makes them like dust with his sword,
  - type: note
    content: ch. 40:24
  - type: text
    content: like driven stubble with his bow.
  '20':
  - type: text
    content: that they may see and know,
  - type: text
    content: may consider and understand together,
  - type: text
    content: 'that '
  - type: note
    content: Job 12:9
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this,'
  - type: text
    content: the Holy One of Israel has created it.
  - type: heading
    content: The Futility of Idols
  '21':
  - type: text
    content: 'Set forth your case, says the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: bring your proofs, says the King of Jacob.
  '22':
  - type: text
    content: 'Let them bring them, and '
  - type: note
    content: '[ver. 26; ch. 44:7; 45:21; 46:10]'
  - type: text
    content: tell us
  - type: text
    content: what is to happen.
  - type: text
    content: Tell us the former things, what they are,
  - type: text
    content: that we may consider them,
  - type: text
    content: that we may know their outcome;
  - type: text
    content: or declare to us the things to come.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: Tell us what is to come hereafter,
  - type: text
    content: that we may know that you are gods;
  - type: note
    content: '[ch. 45:7 ]'
  - type: text
    content: do good, or do harm,
  - type: text
    content: that we may be dismayed and terrified.
  - type: note
    content: Or that we may both be dismayed and see
  '24':
  - type: text
    content: 'Behold, '
  - type: note
    content: ver. 29; [Ps. 115:8; 1 Cor. 8:4]
  - type: text
    content: you are nothing,
  - type: text
    content: and your work is less than nothing;
  - type: text
    content: an abomination is he who chooses you.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Jer. 50:3
  - type: text
    content: I stirred up one from the north, and he has come,
  - type: note
    content: ver. 2
  - type: text
    content: 'from the rising of the sun, '
  - type: note
    content: '[Ps. 44:5]'
  - type: text
    content: and he shall call upon my name;
  - type: text
    content: he shall trample on rulers as on mortar,
  - type: text
    content: as the potter treads clay.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 22 ]'
  - type: text
    content: Who declared it from the beginning, that we might know,
  - type: text
    content: and beforehand, that we might say, “He is right”?
  - type: text
    content: There was none who declared it, none who proclaimed,
  - type: text
    content: none who heard your words.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:12
  - type: text
    content: I was the first to say
  - type: note
    content: Or Formerly I said
  - type: text
    content: ' to Zion, “Behold, here they are!”'
  - type: text
    content: 'and '
  - type: note
    content: ch. 40:9; 52:7
  - type: text
    content: I give to Jerusalem a herald of good news.
  '28':
  - type: text
    content: ' '
  - type: note
    content: See ver. 21-24
  - type: text
    content: But when I look, there is no one;
  - type: text
    content: among these there is no counselor
  - type: text
    content: who, when I ask, gives an answer.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 12 ]'
  - type: text
    content: Behold, they are all a delusion;
  - type: text
    content: their works are nothing;
  - type: text
    content: their metal images are empty wind.
  '3':
  - type: text
    content: He pursues them and passes on safely,
  - type: text
    content: by paths his feet have not trod.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 26 ]'
  - type: text
    content: Who has performed and done this,
  - type: text
    content: calling the generations from the beginning?
  - type: note
    content: ch. 43:10, 11; 44:6; 48:12; Rev. 1:8, 17; 22:13
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', the first,'
  - type: text
    content: and with the last; I am he.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 11:11
  - type: text
    content: The coastlands have seen and are afraid;
  - type: text
    content: the ends of the earth tremble;
  - type: text
    content: they have drawn near and come.
  '6':
  - type: text
    content: Everyone helps his neighbor
  - type: text
    content: and says to his brother, “Be strong!”
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 40:19
  - type: text
    content: The craftsman strengthens the goldsmith,
  - type: text
    content: and he who smooths with the hammer him who strikes the anvil,
  - type: text
    content: saying of the soldering, “It is good”;
  - type: text
    content: 'and they strengthen it with nails '
  - type: note
    content: '[ch. 40:20]'
  - type: text
    content: so that it cannot be moved.
  '8':
  - type: text
    content: 'But you, Israel, '
  - type: note
    content: ch. 44:1, 2
  - type: text
    content: my servant,
  - type: text
    content: 'Jacob, '
  - type: note
    content: Deut. 7:6; 10:15; 14:2; Ps. 135:4; [1 Pet. 2:9]
  - type: text
    content: whom I have chosen,
  - type: text
    content: 'the offspring of Abraham, '
  - type: note
    content: 2 Chr. 20:7; James 2:23
  - type: text
    content: my friend;
  '9':
  - type: text
    content: you whom I took from the ends of the earth,
  - type: text
    content: 'and called '
  - type: note
    content: ch. 43:5, 6
  - type: text
    content: from its farthest corners,
  - type: text
    content: 'saying to you, “You are '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: my servant,
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: I have chosen you and not cast you off”;
