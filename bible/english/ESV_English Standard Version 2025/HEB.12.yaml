document_id: HEB.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, Founder and Perfecter of Our Faith
  - type: text
    content: 'Therefore, since we are surrounded by so great a cloud of witnesses, let us also lay aside every weight, and '
  - type: note
    content: See Eph. 4:22
  - type: text
    content: 'sin which clings so closely, and '
  - type: note
    content: See 1 Cor. 9:24
  - type: text
    content: 'let us run '
  - type: note
    content: See ch. 10:36
  - type: text
    content: 'with endurance the race that is '
  - type: note
    content: ch. 6:18
  - type: text
    content: 'set before us, '
  '10':
  - type: text
    content: 'For they disciplined us for a short time as it seemed best to them, but he disciplines us for our good, '
  - type: note
    content: '[2 Pet. 1:4]; See Lev. 11:44'
  - type: text
    content: 'that we may share his holiness. '
  '11':
  - type: note
    content: '[1 Pet. 1:6]'
  - type: text
    content: 'For the moment all discipline seems painful rather than pleasant, but later it yields '
  - type: note
    content: James 3:17, 18
  - type: text
    content: the peaceful fruit of righteousness to those who have been trained by it.
  '12':
  - type: text
    content: 'Therefore '
  - type: note
    content: Cited from Isa. 35:3; [Job 4:3, 4]
  - type: text
    content: 'lift your drooping hands and strengthen your weak knees, '
  '13':
  - type: text
    content: 'and '
  - type: note
    content: Prov. 4:26, 27
  - type: text
    content: 'make straight paths for your feet, so that what is lame may not be put out of joint '
  - type: note
    content: James 5:16; [Gal. 6:1]
  - type: text
    content: 'but rather be healed. '
  '14':
  - type: note
    content: See Rom. 14:19
  - type: text
    content: 'Strive for peace with everyone, and for the '
  - type: note
    content: 1 Thess. 4:7
  - type: text
    content: 'holiness '
  - type: note
    content: Matt. 5:8; [2 Cor. 7:1; Eph. 5:5; Rev. 21:27; 22:4]
  - type: text
    content: 'without which no one will see the Lord. '
  '15':
  - type: text
    content: 'See to it that no one '
  - type: note
    content: ch. 4:1; [2 Cor. 6:1; Gal. 5:4]
  - type: text
    content: 'fails to obtain the grace of God; that no '
  - type: note
    content: Deut. 29:18
  - type: text
    content: '“root of bitterness” springs up and causes trouble, and by it many become defiled; '
  '16':
  - type: text
    content: 'that no one is '
  - type: note
    content: ch. 13:4; Gen. 25:33
  - type: text
    content: 'sexually immoral or unholy like Esau, who sold his birthright for a single meal. '
  '17':
  - type: text
    content: 'For you know that '
  - type: note
    content: Gen. 27:34, 36, 38
  - type: text
    content: afterward, when he desired to inherit the blessing, he was rejected, for he found no chance to repent, though he sought it with tears.
  - type: heading
    content: A Kingdom That Cannot Be Shaken
  '18':
  - type: text
    content: 'For you have not come to '
  - type: note
    content: Ex. 19:18; 20:18; Deut. 4:11; 5:22; [2 Cor. 3:9]
  - type: text
    content: 'what may be touched, a blazing fire and darkness and gloom and a tempest '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: Ex. 19:16, 19
  - type: text
    content: 'the sound of a trumpet and a voice whose words '
  - type: note
    content: Ex. 20:19; Deut. 5:5; 18:16
  - type: text
    content: 'made the hearers beg that no further messages be spoken to them. '
  '2':
  - type: text
    content: 'looking to Jesus, the founder and perfecter of our faith, '
  - type: note
    content: Luke 24:26; Phil. 2:8; [Isa. 53:11]
  - type: text
    content: 'who for the joy that was set before him endured the cross, despising '
  - type: note
    content: Ps. 22:6, 7; 69:19; Isa. 53:3
  - type: text
    content: 'the shame, and '
  - type: note
    content: ch. 1:3
  - type: text
    content: is seated at the right hand of the throne of God.
  - type: heading
    content: Do Not Grow Weary
  '20':
  - type: text
    content: 'For they could not endure the order that was given, '
  - type: note
    content: Cited from Ex. 19:12, 13
  - type: text
    content: '“If even a beast touches the mountain, it shall be stoned.” '
  '21':
  - type: text
    content: 'Indeed, '
  - type: note
    content: '[Ex. 19:16; Deut. 9:19]'
  - type: text
    content: 'so terrifying was the sight that Moses said, “I tremble with fear.” '
  '22':
  - type: text
    content: 'But you have come to '
  - type: note
    content: Rev. 14:1
  - type: text
    content: 'Mount Zion and to the city of the living God, '
  - type: note
    content: See Gal. 4:26
  - type: text
    content: 'the heavenly Jerusalem, and to '
  - type: note
    content: Jude 14
  - type: text
    content: 'innumerable angels in festal gathering, '
  '23':
  - type: text
    content: 'and to '
  - type: note
    content: '[Ex. 4:22]'
  - type: text
    content: the assembly
  - type: note
    content: Or church
  - type: text
    content: ' of the firstborn who are '
  - type: note
    content: Luke 10:20
  - type: text
    content: 'enrolled in heaven, and to '
  - type: note
    content: Gen. 18:25
  - type: text
    content: 'God, the judge of all, and to the spirits of the righteous made perfect, '
  '24':
  - type: text
    content: 'and to Jesus, '
  - type: note
    content: ch. 8:6; 9:15
  - type: text
    content: 'the mediator of a new covenant, and to '
  - type: note
    content: See ch. 10:22
  - type: text
    content: 'the sprinkled blood '
  - type: note
    content: ch. 11:4; Gen. 4:10
  - type: text
    content: that speaks a better word than the blood of Abel.
  '25':
  - type: text
    content: 'See that you do not refuse him who is speaking. For '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'if they did not escape when they refused him who warned them on earth, much less will we escape if we reject him who warns from heaven. '
  '26':
  - type: text
    content: 'At that time '
  - type: note
    content: Ex. 19:18
  - type: text
    content: 'his voice shook the earth, but now he has promised, '
  - type: note
    content: Cited from Hag. 2:6; [Hag. 2:21]
  - type: text
    content: '“Yet once more I will shake not only the earth but also the heavens.” '
  '27':
  - type: text
    content: 'This phrase, “Yet once more,” indicates '
  - type: note
    content: See Ps. 102:26
  - type: text
    content: 'the removal of things that are shaken—that is, things that have been made—in order that the things that cannot be shaken may remain. '
  '28':
  - type: text
    content: 'Therefore let us be grateful for receiving '
  - type: note
    content: Dan. 2:44
  - type: text
    content: 'a kingdom that cannot be shaken, and thus '
  - type: note
    content: ch. 13:15
  - type: text
    content: 'let us offer to God acceptable worship, with reverence and awe, '
  '29':
  - type: text
    content: 'for our '
  - type: note
    content: Cited from Deut. 4:24; See 2 Thess. 1:8
  - type: text
    content: God is a consuming fire.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 10:24; Rev. 2:3 ]'
  - type: text
    content: 'Consider him who endured from sinners such hostility against himself, so that you may not grow weary or '
  - type: note
    content: Gal. 6:9
  - type: text
    content: 'fainthearted. '
  '4':
  - type: text
    content: 'In your struggle against sin you have not yet resisted to the point of shedding your blood. '
  '5':
  - type: text
    content: And have you forgotten the exhortation that addresses you as sons?
  - type: note
    content: Cited from Prov. 3:11, 12
  - type: text
    content: '“My son, '
  - type: note
    content: Job 5:17
  - type: text
    content: do not regard lightly the discipline of the Lord,
  - type: text
    content: nor be weary when reproved by him.
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 94:12; 119:67, 75; Rev. 3:19
  - type: text
    content: the Lord disciplines the one he loves,
  - type: text
    content: and chastises every son whom he receives.”
  '7':
  - type: text
    content: 'It is for discipline that you have to endure. '
  - type: note
    content: Deut. 8:5; 2 Sam. 7:14; [Prov. 13:24; 19:18; 23:13]
  - type: text
    content: 'God is treating you as sons. For what son is there whom his father does not discipline? '
  '8':
  - type: text
    content: 'If you are left without discipline, '
  - type: note
    content: '[1 Pet. 5:9]'
  - type: text
    content: 'in which all have participated, then you are illegitimate children and not sons. '
  '9':
  - type: text
    content: 'Besides this, we have had earthly fathers who disciplined us and we respected them. Shall we not much more be subject to '
  - type: note
    content: See Num. 16:22
  - type: text
    content: 'the Father of spirits '
  - type: note
    content: '[Isa. 38:16]'
  - type: text
    content: 'and live? '
