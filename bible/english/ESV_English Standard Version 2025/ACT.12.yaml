document_id: ACT.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: James Killed and Peter Imprisoned
  - type: text
    content: 'About that time Herod the king laid violent hands on some who belonged to the church. '
  '10':
  - type: text
    content: 'When they had passed the first and the second guard, they came to the iron gate leading into the city. '
  - type: note
    content: ch. 5:19; 16:26
  - type: text
    content: 'It opened for them of its own accord, and they went out and went along one street, and immediately the angel left him. '
  '11':
  - type: text
    content: 'When Peter '
  - type: note
    content: '[Luke 15:17]'
  - type: text
    content: 'came to himself, he said, “Now I am sure that '
  - type: note
    content: Ps. 34:7; 91:11; Dan. 3:28; 6:22
  - type: text
    content: 'the Lord has sent his angel and '
  - type: note
    content: Ps. 33:18, 19; 2 Cor. 1:10
  - type: text
    content: rescued me from the hand of Herod and from all that the Jewish people were expecting.”
  '12':
  - type: text
    content: 'When he realized this, he went to the house of Mary, the mother of '
  - type: note
    content: ver. 25; ch. 13:5, 13; 15:37, 39; Col. 4:10; 2 Tim. 4:11; Philem. 24; 1 Pet. 5:13
  - type: text
    content: 'John whose other name was Mark, where many were gathered together and '
  - type: note
    content: ver. 5
  - type: text
    content: 'were praying. '
  '13':
  - type: text
    content: 'And when he knocked at the door of the gateway, '
  - type: note
    content: John 18:16, 17
  - type: text
    content: 'a servant girl named Rhoda came to answer. '
  '14':
  - type: text
    content: 'Recognizing Peter’s voice, '
  - type: note
    content: Luke 24:41; [Gen. 45:26]
  - type: text
    content: 'in her joy she did not open the gate but ran in and reported that Peter was standing at the gate. '
  '15':
  - type: text
    content: 'They said to her, “You are out of your mind.” But she kept insisting that it was so, and they kept saying, “It is '
  - type: note
    content: Matt. 18:10; See Heb. 1:14
  - type: text
    content: 'his angel!” '
  '16':
  - type: text
    content: 'But Peter continued knocking, and when they opened, they saw him and were amazed. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: ch. 13:16; 19:33; 21:40
  - type: text
    content: 'motioning to them with his hand to be silent, he described to them how the Lord had brought him out of the prison. And he said, “Tell these things to '
  - type: note
    content: ch. 15:13; 21:18; [Gal. 1:19; 2:9, 12]
  - type: text
    content: 'James and to '
  - type: note
    content: See John 21:23
  - type: text
    content: the brothers.”
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' Then he departed and went to another place.'
  '18':
  - type: text
    content: 'Now when day came, there was no little disturbance among the soldiers over what had become of Peter. '
  '19':
  - type: text
    content: 'And after Herod searched for him and did not find him, he examined the sentries and '
  - type: note
    content: '[ch. 16:27; 27:42]'
  - type: text
    content: ordered that they should be put to death. Then he went down from Judea to Caesarea and spent time there.
  - type: heading
    content: The Death of Herod
  '2':
  - type: text
    content: 'He killed '
  - type: note
    content: Matt. 4:21; 20:23
  - type: text
    content: 'James the brother of John '
  - type: note
    content: Heb. 11:37
  - type: text
    content: 'with the sword, '
  '20':
  - type: text
    content: 'Now Herod was angry with the people of Tyre and Sidon, and they came to him with one accord, and '
  - type: note
    content: Matt. 28:14 (Gk.)
  - type: text
    content: having persuaded Blastus, the king’s chamberlain,
  - type: note
    content: That is, trusted personal attendant
  - type: text
    content: ' they asked for peace, because '
  - type: note
    content: '[1 Kgs. 5:9; Ezra 3:7; Ezek. 27:17]'
  - type: text
    content: 'their country depended on the king’s country for food. '
  '21':
  - type: text
    content: 'On an appointed day Herod put on his royal robes, took his seat upon the throne, and delivered an oration to them. '
  '22':
  - type: text
    content: 'And the people were shouting, “The voice of a god, and not of a man!” '
  '23':
  - type: text
    content: 'Immediately '
  - type: note
    content: '[2 Sam. 24:16; 2 Kgs. 19:35]; See ch. 8:26'
  - type: text
    content: 'an angel of the Lord struck him down, because '
  - type: note
    content: Ps. 115:1
  - type: text
    content: he did not give God the glory, and he was eaten by worms and breathed his last.
  '24':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 6:7
  - type: text
    content: the word of God increased and multiplied.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:29, 30
  - type: text
    content: And Barnabas and Saul returned from
  - type: note
    content: Some manuscripts to
  - type: text
    content: ' Jerusalem when they had completed their service, bringing with them '
  - type: note
    content: See ver. 12
  - type: text
    content: John, whose other name was Mark.
  '3':
  - type: text
    content: 'and when he saw '
  - type: note
    content: '[ch. 24:27; 25:9]'
  - type: text
    content: 'that it pleased the Jews, he proceeded to arrest Peter also. This was during '
  - type: note
    content: ch. 20:6; Ex. 12:14, 15; 23:15
  - type: text
    content: 'the days of Unleavened Bread. '
  '4':
  - type: text
    content: 'And when he had seized him, he put him '
  - type: note
    content: See Luke 21:12
  - type: text
    content: 'in prison, delivering him over to four '
  - type: note
    content: '[John 19:23]'
  - type: text
    content: 'squads of soldiers to guard him, intending after the Passover to bring him out to the people. '
  '5':
  - type: text
    content: 'So Peter was kept in prison, but earnest '
  - type: note
    content: 2 Cor. 1:11; Eph. 6:18
  - type: text
    content: prayer for him was made to God by the church.
  - type: heading
    content: Peter Is Rescued
  '6':
  - type: text
    content: 'Now when Herod was about to bring him out, on that very night, Peter was sleeping between two soldiers, '
  - type: note
    content: ch. 21:33
  - type: text
    content: 'bound with two chains, and sentries before the door were guarding the prison. '
  '7':
  - type: text
    content: 'And behold, '
  - type: note
    content: See ch. 8:26
  - type: text
    content: 'an angel of the Lord '
  - type: note
    content: Luke 2:9; 24:4
  - type: text
    content: 'stood next to him, and a light shone in the cell. '
  - type: note
    content: '[1 Kgs. 19:7]'
  - type: text
    content: 'He struck Peter on the side and woke him, saying, “Get up quickly.” And '
  - type: note
    content: ch. 16:26
  - type: text
    content: 'the chains fell off his hands. '
  '8':
  - type: text
    content: 'And the angel said to him, “Dress yourself and '
  - type: note
    content: Mark 6:9
  - type: text
    content: 'put on your sandals.” And he did so. And he said to him, “Wrap your cloak around you and follow me.” '
  '9':
  - type: text
    content: 'And he went out and followed him. He did not know that what was being done by the angel was real, but '
  - type: note
    content: Ps. 126:1
  - type: text
    content: 'thought he was seeing a vision. '
