document_id: LEV.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Feasts of the Lord
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: Ex. 23:19; 34:26; Num. 15:18, 19; 28:26; Deut. 26:1, 2
  - type: text
    content: 'When you come into the land that I give you and reap its harvest, you shall bring the sheaf of '
  - type: note
    content: ver. 17
  - type: text
    content: 'the firstfruits of your harvest to the priest, '
  '11':
  - type: text
    content: 'and he shall '
  - type: note
    content: ver. 15, 20; Ex. 29:24
  - type: text
    content: 'wave the sheaf before the '
  - type: text
    content: Lord
  - type: text
    content: ', so that you may be accepted. On the day after the Sabbath the priest shall wave it. '
  '12':
  - type: text
    content: 'And on the day when you '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'wave the sheaf, you shall offer a '
  - type: note
    content: ch. 1:10
  - type: text
    content: 'male lamb a year old without blemish as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: note
    content: ch. 2:14-16
  - type: text
    content: And the grain offering with it shall be two tenths of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' of fine flour mixed with oil, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' with a pleasing aroma, '
  - type: note
    content: Ex. 29:40
  - type: text
    content: and the drink offering with it shall be of wine, a fourth of a hin.
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And you shall eat neither bread nor grain '
  - type: note
    content: '[ch. 2:14]'
  - type: text
    content: 'parched or '
  - type: note
    content: '[ch. 2:14]'
  - type: text
    content: 'fresh until this same day, until you have brought the offering of your God: it is a statute forever throughout your generations in all your dwellings.'
  - type: heading
    content: The Feast of Weeks
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex. 34:22; Deut. 16:9
  - type: text
    content: '“You shall count seven full weeks from the day after the Sabbath, from the day that you brought the sheaf of the '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'wave offering. '
  '16':
  - type: text
    content: 'You shall count '
  - type: note
    content: Acts 2:1 (Gk.)
  - type: text
    content: 'fifty days to the day after the seventh Sabbath. Then you shall present a grain offering of '
  - type: note
    content: Num. 28:26
  - type: text
    content: 'new grain to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'You shall bring from your dwelling places two loaves of bread to be waved, made of two tenths of an ephah. They shall be of fine flour, and they shall be baked with leaven, as '
  - type: note
    content: See ver. 10
  - type: text
    content: 'firstfruits to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'And you shall present with the bread seven lambs a year old without blemish, and one bull from the herd and two rams. They shall be a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', with their grain offering and their drink offerings, a food offering with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And you shall offer one '
  - type: note
    content: ch. 4:23, 28; Num. 28:30
  - type: text
    content: 'male goat for a sin offering, and two male lambs a year old as a sacrifice of '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'peace offerings. '
  '2':
  - type: text
    content: '“Speak to the people of Israel and say to them, '
  - type: note
    content: ver. 4, 37; Num. 29:39; See Ex. 23:14-17
  - type: text
    content: 'These are the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: ' that you shall '
  - type: note
    content: Num. 10:10; Ps. 81:3; Joel 2:15
  - type: text
    content: 'proclaim as '
  - type: note
    content: Ex. 12:16
  - type: text
    content: holy convocations; they are my appointed feasts.
  - type: heading
    content: The Sabbath
  '20':
  - type: text
    content: 'And the priest shall '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'wave them with the bread of the firstfruits as a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', with the two lambs. '
  - type: note
    content: Num. 18:12; Deut. 18:4
  - type: text
    content: 'They shall be holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the priest. '
  '21':
  - type: text
    content: And you shall make a proclamation on the same day. You shall hold a holy convocation. You shall not do any ordinary work. It is a statute forever in all your dwelling places throughout your generations.
  '22':
  - type: text
    content: '“And '
  - type: note
    content: ch. 19:9, 10; Deut. 24:19; [Ruth 2:2, 3]
  - type: text
    content: 'when you reap the harvest of your land, you shall not reap your field right up to its edge, nor shall you gather the gleanings after your harvest. You shall leave them for the poor and for the sojourner: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: The Feast of Trumpets
  '23':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“Speak to the people of Israel, saying, In '
  - type: note
    content: Num. 29:1
  - type: text
    content: 'the seventh month, on the first day of the month, you shall observe a day of solemn rest, '
  - type: note
    content: ch. 25:9
  - type: text
    content: 'a memorial proclaimed with blast of trumpets, a holy convocation. '
  '25':
  - type: text
    content: 'You shall not do any ordinary work, and you shall present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Day of Atonement
  '26':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '27':
  - type: text
    content: '“Now '
  - type: note
    content: ch. 16:29, 30; Num. 29:7
  - type: text
    content: on the tenth day of this seventh month is the Day of Atonement. It shall be for you a time of holy convocation, and you shall afflict yourselves
  - type: note
    content: Or shall fast; also verse 32
  - type: text
    content: ' and present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And you shall not do any work on that very day, for it is a Day of Atonement, to make atonement for you before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '29':
  - type: text
    content: For whoever is not afflicted
  - type: note
    content: Or is not fasting
  - type: text
    content: ' on that very day '
  - type: note
    content: See Ex. 30:33
  - type: text
    content: 'shall be cut off from his people. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:3; Ex. 23:12; 31:15; 34:21; Luke 13:14; See Ex. 20:8-11; Deut. 5:12-15
  - type: text
    content: '“Six days shall work be done, but on the seventh day is a Sabbath of solemn rest, a holy convocation. You shall do no work. It is a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: ' in all your dwelling places.'
  - type: heading
    content: The Passover
  '30':
  - type: text
    content: 'And whoever does any work on that very day, that person I will destroy from among his people. '
  '31':
  - type: text
    content: 'You shall not do any work. It is a statute forever throughout your generations in all your dwelling places. '
  '32':
  - type: text
    content: It shall be to you a Sabbath of solemn rest, and you shall afflict yourselves. On the ninth day of the month beginning at evening, from evening to evening shall you keep your Sabbath.”
  - type: heading
    content: The Feast of Booths
  '33':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '34':
  - type: text
    content: '“Speak to the people of Israel, saying, '
  - type: note
    content: Num. 29:12; Deut. 16:13; Ezra 3:4; Neh. 8:14; Ezek. 45:25; Hos. 12:9; Zech. 14:16; John 7:2
  - type: text
    content: On the fifteenth day of this seventh month and for seven days is the Feast of Booths
  - type: note
    content: Or Tabernacles
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'On the first day shall be a holy convocation; you shall not do any ordinary work. '
  '36':
  - type: text
    content: 'For seven days you shall present food offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Num. 29:35; Neh. 8:18; John 7:37
  - type: text
    content: 'On the eighth day you shall hold a holy convocation and present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. It is a '
  - type: note
    content: Num. 29:35; Deut. 16:8; 2 Kgs. 10:20; 2 Chr. 7:9; Neh. 8:18; Isa. 1:13; Joel 1:14; 2:15; Amos 5:21
  - type: text
    content: solemn assembly; you shall not do any ordinary work.
  '37':
  - type: text
    content: ' '
  - type: note
    content: ver. 2, 4
  - type: text
    content: '“These are the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: ', which you shall proclaim as times of holy convocation, for presenting to the '
  - type: text
    content: Lord
  - type: text
    content: ' food offerings, burnt offerings and grain offerings, sacrifices and drink offerings, each on its proper day, '
  '38':
  - type: note
    content: Num. 29:39
  - type: text
    content: 'besides the '
  - type: text
    content: Lord
  - type: text
    content: '’s Sabbaths and besides your gifts and besides all your vow offerings and besides all your freewill offerings, which you give to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: '“On the fifteenth day of the seventh month, when you have '
  - type: note
    content: Ex. 23:16; Deut. 16:13
  - type: text
    content: 'gathered in the produce of the land, you shall celebrate the feast of the '
  - type: text
    content: Lord
  - type: text
    content: ' seven days. On the first day shall be a solemn rest, and on the eighth day shall be a solemn rest. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“These are the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: note
    content: Ex. 12:16
  - type: text
    content: 'holy convocations, which you shall proclaim at the time appointed for them. '
  '40':
  - type: text
    content: 'And '
  - type: note
    content: See Neh. 8:14-18
  - type: text
    content: 'you shall take on the first day the fruit of splendid trees, branches of palm trees and boughs of leafy trees and willows of the brook, and '
  - type: note
    content: Deut. 16:14, 15
  - type: text
    content: 'you shall rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God seven days. '
  '41':
  - type: note
    content: See Num. 29:12-38
  - type: text
    content: 'You shall celebrate it as a feast to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days in the year. It is a statute forever throughout your generations; you shall celebrate it in the seventh month. '
  '42':
  - type: note
    content: See Neh. 8:14-18
  - type: text
    content: 'You shall dwell in booths for seven days. All native Israelites shall dwell in booths, '
  '43':
  - type: text
    content: 'that '
  - type: note
    content: See Deut. 31:10-13
  - type: text
    content: 'your generations may know that I made the people of Israel dwell in booths when I brought them out of the land of Egypt: I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '44':
  - type: text
    content: 'Thus Moses '
  - type: note
    content: ver. 2
  - type: text
    content: 'declared to the people of Israel the appointed feasts of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: note
    content: Ex. 13:3, 10; 23:15; 34:18; Num. 9:2, 3; 28:16, 17; Josh. 5:10; 2 Kgs. 23:21; Ezra 6:19; [Num. 9:10, 11; 2 Chr. 30:2, 13, 15]; See Ex. 12:2-14; Deut. 16:1-8
  - type: text
    content: In the first month, on the fourteenth day of the month at twilight,
  - type: note
    content: Hebrew between the two evenings
  - type: text
    content: ' is the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover. '
  '6':
  - type: text
    content: 'And on the fifteenth day of the same month is the Feast of Unleavened Bread to the '
  - type: text
    content: Lord
  - type: text
    content: '; for seven days you shall eat unleavened bread. '
  '7':
  - type: note
    content: Ex. 12:16; Num. 28:18, 25
  - type: text
    content: 'On the first day you shall have a holy convocation; you shall not do any ordinary work. '
  '8':
  - type: text
    content: 'But you shall present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days. On the seventh day is a holy convocation; you shall not do any ordinary work.”'
  - type: heading
    content: The Feast of Firstfruits
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
