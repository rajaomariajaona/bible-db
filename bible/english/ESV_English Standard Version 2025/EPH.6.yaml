document_id: EPH.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Children and Parents
  - type: text
    content: ' '
  - type: note
    content: Prov. 1:8; 6:20; 23:22
  - type: text
    content: 'Children, obey your parents in the Lord, for this is right. '
  '10':
  - type: text
    content: 'Finally, '
  - type: note
    content: Rom. 4:20 (Gk.); 2 Tim. 2:1; [1 John 2:14]; See ch. 3:16
  - type: text
    content: 'be strong in the Lord and in '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'the strength of his might. '
  '11':
  - type: note
    content: ver. 14; Job 29:14; See Rom. 13:12
  - type: text
    content: 'Put on '
  - type: note
    content: ver. 13; [2 Cor. 10:4]
  - type: text
    content: 'the whole armor of God, that you may be able to stand against '
  - type: note
    content: ch. 4:14
  - type: text
    content: 'the schemes of the devil. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: See 1 Cor. 9:25
  - type: text
    content: 'we do not wrestle against flesh and blood, but against '
  - type: note
    content: ch. 1:21
  - type: text
    content: 'the rulers, against the authorities, against '
  - type: note
    content: See ch. 2:2
  - type: text
    content: 'the cosmic powers over '
  - type: note
    content: Luke 22:53; Col. 1:13
  - type: text
    content: 'this present darkness, against '
  - type: note
    content: '[ch. 3:10]'
  - type: text
    content: 'the spiritual forces of evil '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'in the heavenly places. '
  '13':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[1 Pet. 4:1]'
  - type: text
    content: 'take up the whole armor of God, that you may be able to withstand in '
  - type: note
    content: ch. 5:16
  - type: text
    content: 'the evil day, and having done all, to stand firm. '
  '14':
  - type: text
    content: 'Stand therefore, '
  - type: note
    content: 1 Pet. 1:13; [Isa. 11:5]; See Luke 12:35
  - type: text
    content: 'having fastened on the belt of truth, and '
  - type: note
    content: Isa. 59:17; 1 Thess. 5:8; [Isa. 61:10; 2 Cor. 6:7]
  - type: text
    content: 'having put on the breastplate of righteousness, '
  '15':
  - type: text
    content: 'and, '
  - type: note
    content: Isa. 52:7; Rom. 10:15; [Ex. 12:11]
  - type: text
    content: 'as shoes for your feet, having put on the readiness given by the gospel of peace. '
  '16':
  - type: text
    content: 'In all circumstances take up '
  - type: note
    content: '[1 John 5:4]'
  - type: text
    content: 'the shield of faith, with which you can extinguish all '
  - type: note
    content: '[Ps. 120:4]'
  - type: text
    content: 'the flaming darts of '
  - type: note
    content: See Matt. 13:19
  - type: text
    content: 'the evil one; '
  '17':
  - type: text
    content: 'and take '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'the helmet of salvation, and '
  - type: note
    content: Heb. 4:12; [Isa. 49:2; Hos. 6:5; 2 Cor. 6:7]
  - type: text
    content: 'the sword of the Spirit, which is the word of God, '
  '18':
  - type: text
    content: 'praying '
  - type: note
    content: Luke 18:1
  - type: text
    content: 'at all times '
  - type: note
    content: Jude 20; See Rom. 8:26
  - type: text
    content: 'in the Spirit, '
  - type: note
    content: Col. 4:2-4
  - type: text
    content: 'with all prayer and supplication. To that end, '
  - type: note
    content: See Mark 13:33
  - type: text
    content: 'keep alert with all perseverance, making '
  - type: note
    content: 1 Tim. 2:1
  - type: text
    content: 'supplication for all the saints, '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: Col. 4:3; 1 Thess. 5:25; 2 Thess. 3:1; [Isa. 50:4]
  - type: text
    content: 'also for me, that words may be given to me in opening my mouth '
  - type: note
    content: See Acts 4:29
  - type: text
    content: 'boldly to proclaim '
  - type: note
    content: ch. 3:3
  - type: text
    content: 'the mystery of the gospel, '
  '2':
  - type: note
    content: Cited from Ex. 20:12
  - type: text
    content: '“Honor your father and mother” (this is the first commandment with a promise), '
  '20':
  - type: text
    content: 'for which I '
  - type: note
    content: See 2 Cor. 5:20
  - type: text
    content: 'am an ambassador '
  - type: note
    content: See Acts 28:20
  - type: text
    content: in chains, that I may declare it boldly, as I ought to speak.
  - type: heading
    content: Final Greetings
  '21':
  - type: text
    content: ' '
  - type: note
    content: Col. 4:7-9
  - type: text
    content: 'So that you also may know how I am and what I am doing, '
  - type: note
    content: Acts 20:4; 2 Tim. 4:12; Titus 3:12
  - type: text
    content: 'Tychicus the beloved brother and faithful minister in the Lord will tell you everything. '
  '22':
  - type: text
    content: 'I have sent him to you for this very purpose, that you may know how we are, and that he may '
  - type: note
    content: Col. 2:2
  - type: text
    content: encourage your hearts.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Gal. 6:16; 2 Thess. 3:16; 1 Pet. 5:14
  - type: text
    content: Peace be to the brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' and '
  - type: note
    content: '[Gal. 5:6; 1 Thess. 5:8]'
  - type: text
    content: 'love with faith, from God the Father and the Lord Jesus Christ. '
  '24':
  - type: text
    content: 'Grace be with all who '
  - type: note
    content: '[1 Cor. 16:22]'
  - type: text
    content: love our Lord Jesus Christ with love incorruptible.
  '3':
  - type: text
    content: '“that it may go well with you and that you may live long in the land.” '
  '4':
  - type: text
    content: 'Fathers, do not provoke your children to anger, '
  - type: note
    content: Gen. 18:19; Deut. 4:9; 6:7; 11:19; Ps. 78:4; Prov. 19:18; 22:6; 29:17; [2 Tim. 3:15]
  - type: text
    content: but bring them up in the discipline and instruction of the Lord.
  - type: heading
    content: Bondservants and Masters
  '5':
  - type: text
    content: ' '
  - type: note
    content: See 1 Pet. 2:18
  - type: text
    content: Bondservants,
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; also verse 6; likewise for bondservant in verse 8
  - type: text
    content: ' obey your earthly masters'
  - type: note
    content: Or your masters according to the flesh
  - type: text
    content: ' with fear and trembling, '
  - type: note
    content: '[2 Cor. 11:3]'
  - type: text
    content: 'with a sincere heart, '
  - type: note
    content: '[ch. 5:22]'
  - type: text
    content: 'as you would Christ, '
  '6':
  - type: text
    content: 'not by the way of eye-service, as '
  - type: note
    content: See Gal. 1:10
  - type: text
    content: 'people-pleasers, but as bondservants of Christ, doing the will of God from the heart, '
  '7':
  - type: text
    content: 'rendering service with a good will as to the Lord and not to man, '
  '8':
  - type: note
    content: See Ps. 62:12
  - type: text
    content: 'knowing that whatever good anyone does, this he will receive back from the Lord, '
  - type: note
    content: Gal. 3:28; Col. 3:11
  - type: text
    content: 'whether he is a bondservant or is free. '
  '9':
  - type: text
    content: 'Masters, do the same to them, '
  - type: note
    content: Lev. 25:43
  - type: text
    content: 'and stop your threatening, knowing that '
  - type: note
    content: John 13:13; [Job 31:13-15]
  - type: text
    content: he who is both their Master
  - type: note
    content: Greek Lord
  - type: text
    content: ' and yours is in heaven, and that '
  - type: note
    content: See Deut. 10:17
  - type: text
    content: there is no partiality with him.
  - type: heading
    content: The Whole Armor of God
