  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told to Joshua, “The five kings have been found, hidden in the cave at Makkedah.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua said, “Roll large stones against the mouth of the cave and set men by it to guard them, '
  '19':
