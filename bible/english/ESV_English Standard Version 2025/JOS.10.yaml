  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they did so, and brought those five kings out to him from the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they brought those kings out to Joshua, Joshua summoned all the men of Israel and said to the chiefs of the men of war who had gone with him, “Come near; put your feet on the necks of these kings.” Then they came near and put their feet on their necks. '
  '25':
  - type: usfm
