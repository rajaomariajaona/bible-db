document_id: JOS.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sun Stands Still
  - type: text
    content: As soon as Adoni-zedek, king of Jerusalem, heard how Joshua had captured Ai and had devoted it to destruction,
  - type: note
    content: That is, set apart (devoted) as an offering to the Lord (for destruction); also verses 28, 35, 37, 39, 40
  - type: text
    content: ' '
  - type: note
    content: ch. 8:22, 26-29
  - type: text
    content: 'doing to Ai and its king '
  - type: note
    content: See ch. 6:21, 24
  - type: text
    content: 'as he had done to Jericho and its king, and '
  - type: note
    content: ch. 9:15
  - type: text
    content: 'how the inhabitants of Gibeon had made peace with Israel and were among them, '
  '10':
  - type: note
    content: Judg. 4:15; 1 Sam. 7:10; Ps. 18:14; Isa. 28:21
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' threw them into a panic before Israel, who'
  - type: note
    content: Or and he
  - type: text
    content: ' struck them with a great blow at Gibeon and chased them by the way of '
  - type: note
    content: ch. 16:3, 5; 18:13, 14; 1 Kgs. 9:17; 1 Chr. 7:24; 2 Chr. 8:5
  - type: text
    content: 'the ascent of Beth-horon and struck them as far as Azekah and Makkedah. '
  '11':
  - type: text
    content: 'And as they fled before Israel, while they were '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'going down the ascent of Beth-horon, '
  - type: note
    content: '[Ps. 18:12-14; Isa. 30:30; Rev. 16:21]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' threw down large stones from heaven on them as far as Azekah, and they died. There were more who died because of the hailstones than the sons of Israel killed with the sword.'
  '12':
  - type: text
    content: 'At that time Joshua spoke to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the day when the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the Amorites over to the sons of Israel, and he said in the sight of Israel,'
  - type: note
    content: Hab. 3:11; [ Isa. 28:21 ]
  - type: text
    content: “Sun, stand still at Gibeon,
  - type: text
    content: and moon, in the Valley of Aijalon.”
  '13':
  - type: text
    content: And the sun stood still, and the moon stopped,
  - type: text
    content: until the nation took vengeance on their enemies.
  - type: text
    content: 'Is this not written in the Book of Jashar? The sun stopped in the midst of heaven and did not hurry to set for about a whole day. '
  '14':
  - type: note
    content: Isa. 38:8; [2 Kgs. 20:11]
  - type: text
    content: 'There has been no day like it before or since, when the '
  - type: text
    content: Lord
  - type: text
    content: ' heeded the voice of a man, for '
  - type: note
    content: ver. 42; ch. 23:3, 10
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' fought for Israel.'
  '15':
  - type: text
    content: 'So '
  - type: note
    content: ver. 43
  - type: text
    content: Joshua returned, and all Israel with him, to the camp at Gilgal.
  - type: heading
    content: Five Amorite Kings Executed
  '16':
  - type: text
    content: 'These five kings fled and hid themselves in the cave at '
  - type: note
    content: ver. 10, 28, 29
  - type: text
    content: 'Makkedah. '
  '17':
  - type: text
    content: 'And it was told to Joshua, “The five kings have been found, hidden in the cave at Makkedah.” '
  '18':
  - type: text
    content: 'And Joshua said, “Roll large stones against the mouth of the cave and set men by it to guard them, '
  '19':
  - type: text
    content: 'but do not stay there yourselves. Pursue your enemies; '
  - type: note
    content: '[Deut. 25:18]'
  - type: text
    content: 'attack their rear guard. Do not let them enter their cities, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given them into your hand.” '
  '2':
  - type: note
    content: Deut. 11:25
  - type: text
    content: he
  - type: note
    content: One Hebrew manuscript, Vulgate (compare Syriac); most Hebrew manuscripts they
  - type: text
    content: ' feared greatly, because Gibeon was a great city, like one of the royal cities, and because it was greater than Ai, and all its men were warriors. '
  '20':
  - type: text
    content: 'When Joshua and the sons of Israel had finished striking them with a great blow '
  - type: note
    content: ch. 8:24
  - type: text
    content: 'until they were wiped out, and when the remnant that remained of them had entered into the fortified cities, '
  '21':
  - type: text
    content: 'then all the people returned safe to Joshua in the camp at Makkedah. '
  - type: note
    content: Ex. 11:7
  - type: text
    content: Not a man moved his tongue against any of the people of Israel.
  '22':
  - type: text
    content: 'Then Joshua said, “Open the mouth of the cave and bring those five kings out to me from the cave.” '
  '23':
  - type: text
    content: 'And they did so, and brought those five kings out to him from the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon. '
  '24':
  - type: text
    content: 'And when they brought those kings out to Joshua, Joshua summoned all the men of Israel and said to the chiefs of the men of war who had gone with him, “Come near; put your feet on the necks of these kings.” Then they came near and put their feet on their necks. '
  '25':
  - type: text
    content: 'And Joshua said to them, '
  - type: note
    content: ch. 1:6, 9; See Deut. 31:6-8
  - type: text
    content: '“Do not be afraid or dismayed; be strong and courageous. '
  - type: note
    content: Deut. 3:21; 7:19
  - type: text
    content: 'For thus the '
  - type: text
    content: Lord
  - type: text
    content: ' will do to all your enemies against whom you fight.” '
  '26':
  - type: text
    content: 'And afterward Joshua struck them and put them to death, and he hanged them on five trees. And '
  - type: note
    content: ch. 8:29
  - type: text
    content: 'they hung on the trees until evening. '
  '27':
  - type: text
    content: 'But at the time of the going down of the sun, Joshua commanded, and '
  - type: note
    content: Deut. 21:22, 23
  - type: text
    content: they took them down from the trees and threw them into the cave where they had hidden themselves, and they set large stones against the mouth of the cave, which remain to this very day.
  '28':
  - type: text
    content: 'As for '
  - type: note
    content: ver. 10, 16, 17
  - type: text
    content: 'Makkedah, Joshua captured it on that day and struck it, and its king, with the edge of the sword. He devoted to destruction every person in it; he left none remaining. And he did to the king of Makkedah '
  - type: note
    content: ch. 6:21
  - type: text
    content: just as he had done to the king of Jericho.
  - type: heading
    content: Conquest of Southern Canaan
  '29':
  - type: text
    content: 'Then Joshua and all Israel with him passed on from Makkedah to '
  - type: note
    content: ch. 21:13
  - type: text
    content: 'Libnah and fought against Libnah. '
  '3':
  - type: text
    content: 'So Adoni-zedek king of Jerusalem sent to Hoham king of Hebron, to Piram king of Jarmuth, to Japhia king of Lachish, and to Debir king of Eglon, saying, '
  '30':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave it also and its king into the hand of Israel. And he struck it with the edge of the sword, and every person in it; he left none remaining in it. And he did to its king '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: as he had done to the king of Jericho.
  '31':
  - type: text
    content: 'Then Joshua and all Israel with him passed on from Libnah to '
  - type: note
    content: ver. 3
  - type: text
    content: 'Lachish and laid siege to it and fought against it. '
  '32':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Lachish into the hand of Israel, and he captured it on the second day and struck it with the edge of the sword, and every person in it, as he had done to Libnah.'
  '33':
  - type: text
    content: 'Then Horam king of '
  - type: note
    content: ch. 16:10; Judg. 1:29; See 1 Kgs. 9:15-17
  - type: text
    content: Gezer came up to help Lachish. And Joshua struck him and his people, until he left none remaining.
  '34':
  - type: text
    content: 'Then Joshua and all Israel with him passed on from Lachish to '
  - type: note
    content: ver. 3
  - type: text
    content: 'Eglon. And they laid siege to it and fought against it. '
  '35':
  - type: text
    content: And they captured it on that day, and struck it with the edge of the sword. And he devoted every person in it to destruction that day, as he had done to Lachish.
  '36':
  - type: text
    content: 'Then Joshua and all Israel with him went up from Eglon to '
  - type: note
    content: ch. 15:13; Judg. 1:10; See ch. 14:13-15
  - type: text
    content: 'Hebron. And they fought against it '
  '37':
  - type: text
    content: and captured it and struck it with the edge of the sword, and its king and its towns, and every person in it. He left none remaining, as he had done to Eglon, and devoted it to destruction and every person in it.
  '38':
  - type: text
    content: 'Then Joshua and all Israel with him turned back to '
  - type: note
    content: See ch. 15:15-17; Judg. 1:11-13
  - type: text
    content: 'Debir and fought against it '
  '39':
  - type: text
    content: and he captured it with its king and all its towns. And they struck them with the edge of the sword and devoted to destruction every person in it; he left none remaining. Just as he had done to Hebron and to Libnah and its king, so he did to Debir and to its king.
  '4':
  - type: text
    content: '“Come up to me and help me, and let us strike Gibeon. For '
  - type: note
    content: ver. 1; ch. 9:15
  - type: text
    content: 'it has made peace with Joshua and with the people of Israel.” '
  '40':
  - type: text
    content: 'So Joshua struck the whole land, the hill country and the Negeb and the lowland '
  - type: note
    content: ch. 12:8
  - type: text
    content: 'and the slopes, and all their kings. He left none remaining, '
  - type: note
    content: Deut. 20:16, 17
  - type: text
    content: 'but devoted to destruction all that breathed, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel commanded. '
  '41':
  - type: text
    content: 'And Joshua struck them from '
  - type: note
    content: Deut. 9:23
  - type: text
    content: 'Kadesh-barnea as far as Gaza, and all the country of '
  - type: note
    content: ch. 11:16
  - type: text
    content: 'Goshen, as far as Gibeon. '
  '42':
  - type: text
    content: 'And Joshua captured all these kings and their land at one time, '
  - type: note
    content: ver. 14
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel fought for Israel. '
  '43':
  - type: note
    content: ver. 15
  - type: text
    content: Then Joshua returned, and all Israel with him, to the camp at Gilgal.
  '5':
  - type: text
    content: 'Then the five kings of the Amorites, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, '
  - type: note
    content: ch. 9:2
  - type: text
    content: gathered their forces and went up with all their armies and encamped against Gibeon and made war against it.
  '6':
  - type: text
    content: 'And the men of Gibeon sent to Joshua '
  - type: note
    content: ch. 5:10; 9:6
  - type: text
    content: 'at the camp in Gilgal, saying, “Do not relax your hand from your servants. Come up to us quickly and save us and help us, for all the kings of the Amorites who dwell in the hill country are gathered against us.” '
  '7':
  - type: text
    content: 'So Joshua went up from Gilgal, he and '
  - type: note
    content: ch. 8:1, 3
  - type: text
    content: 'all the people of war with him, and all the mighty men of valor. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
    content: ch. 11:6; Judg. 4:14
  - type: text
    content: '“Do not fear them, for I have given them into your hands. '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'Not a man of them shall stand before you.” '
  '9':
  - type: text
    content: 'So Joshua came upon them suddenly, having marched up all night from Gilgal. '
