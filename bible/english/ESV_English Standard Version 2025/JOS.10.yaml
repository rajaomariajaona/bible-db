        - type: text
          text: '28'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: as he had done to the king of Jericho.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him passed on from Libnah to '
    - type: usfm
