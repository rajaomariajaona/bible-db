document_id: NEH.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Reads the Law
  - type: text
    content: 'And all the people gathered as one man into the square before '
  - type: note
    content: ch. 3:26
  - type: text
    content: 'the Water Gate. And they told '
  - type: note
    content: See Ezra 7:6
  - type: text
    content: 'Ezra the scribe to bring the Book of the Law of Moses that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Israel. '
  '10':
  - type: text
    content: 'Then he said to them, “Go your way. Eat the fat and drink sweet wine and '
  - type: note
    content: Esth. 9:19, 22
  - type: text
    content: 'send portions to anyone who has nothing ready, for this day is holy to our Lord. And do not be grieved, for the joy of the '
  - type: text
    content: Lord
  - type: text
    content: ' is your strength.” '
  '11':
  - type: text
    content: 'So the Levites calmed all the people, saying, “Be quiet, for this day is holy; do not be grieved.” '
  '12':
  - type: text
    content: 'And all the people went their way to eat and drink and to send portions and to make great rejoicing, because '
  - type: note
    content: ver. 7, 8
  - type: text
    content: they had understood the words that were declared to them.
  - type: heading
    content: Feast of Booths Celebrated
  '13':
  - type: text
    content: 'On the second day the heads of fathers’ houses of all the people, with the priests and the Levites, came together to Ezra the scribe in order to study the words of the Law. '
  '14':
  - type: text
    content: 'And they found it written in the Law that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded by Moses '
  - type: note
    content: Lev. 23:34, 40, 42
  - type: text
    content: that the people of Israel should dwell in booths
  - type: note
    content: Or temporary shelters
  - type: text
    content: ' during the feast of the seventh month, '
  '15':
  - type: text
    content: 'and that they should proclaim it and '
  - type: note
    content: Lev. 23:4
  - type: text
    content: 'publish it in all their towns and '
  - type: note
    content: Deut. 16:16
  - type: text
    content: 'in Jerusalem, “Go out to the hills and bring '
  - type: note
    content: '[Lev. 23:40]'
  - type: text
    content: 'branches of olive, wild olive, myrtle, palm, and other leafy trees to make booths, as it is written.” '
  '16':
  - type: text
    content: 'So the people went out and brought them and made booths for themselves, each '
  - type: note
    content: See 1 Sam. 9:25
  - type: text
    content: 'on his roof, and in their courts and in the courts of the house of God, and in the square at '
  - type: note
    content: ver. 1, 3; ch. 3:26
  - type: text
    content: 'the Water Gate and in the square at '
  - type: note
    content: ch. 12:39; 2 Kgs. 14:13; 2 Chr. 25:23
  - type: text
    content: 'the Gate of Ephraim. '
  '17':
  - type: text
    content: 'And all the assembly of those who had returned from the captivity made booths and lived in the booths, for from the days of Jeshua the son of Nun to that day '
  - type: note
    content: '[1 Kgs. 8:2; 2 Chr. 7:9; 8:13; Ezra 3:4]'
  - type: text
    content: 'the people of Israel had not done so. And there was '
  - type: note
    content: '[2 Chr. 30:21]'
  - type: text
    content: 'very great rejoicing. '
  '18':
  - type: text
    content: 'And day by day, from the first day to the last day, '
  - type: note
    content: Deut. 31:10, 11
  - type: text
    content: 'he read from the Book of the Law of God. They kept the feast seven days, and '
  - type: note
    content: Lev. 23:36; Num. 29:35
  - type: text
    content: on the eighth day there was a solemn assembly, according to the rule.
  '2':
  - type: text
    content: 'So Ezra the priest '
  - type: note
    content: See Deut. 31:11
  - type: text
    content: 'brought the Law before the assembly, both men and women and all who could understand what they heard, '
  - type: note
    content: Lev. 23:24
  - type: text
    content: 'on the first day of the seventh month. '
  '3':
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'And he read from it facing the square before the Water Gate from early morning until midday, in the presence of the men and the women and those who could understand. And the ears of all the people were attentive to the Book of the Law. '
  '4':
  - type: text
    content: 'And Ezra the scribe stood on a wooden platform that they had made for the purpose. And beside him stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah on his right hand, and Pedaiah, Mishael, Malchijah, Hashum, Hashbaddanah, Zechariah, and Meshullam on his left hand. '
  '5':
  - type: text
    content: 'And Ezra opened the book in the sight of all the people, for he was above all the people, and as he opened it all the people stood. '
  '6':
  - type: text
    content: 'And Ezra blessed the '
  - type: text
    content: Lord
  - type: text
    content: ', the great God, and all the people answered, '
  - type: note
    content: See ch. 5:13
  - type: text
    content: '“Amen, Amen,” '
  - type: note
    content: Ps. 134:2; Lam. 3:41; [1 Tim. 2:8]
  - type: text
    content: 'lifting up their hands. '
  - type: note
    content: See 2 Chr. 20:18
  - type: text
    content: 'And they bowed their heads and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' with their faces to the ground. '
  '7':
  - type: note
    content: '[ch. 9:4]'
  - type: text
    content: Also Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah, the Levites,
  - type: note
    content: Vulgate; Hebrew and the Levites
  - type: text
    content: ' '
  - type: note
    content: See 2 Chr. 35:3
  - type: text
    content: 'helped the people to understand the Law, '
  - type: note
    content: ch. 9:3
  - type: text
    content: 'while the people remained in their places. '
  '8':
  - type: text
    content: They read from the book, from the Law of God, clearly,
  - type: note
    content: Or with interpretation, or paragraph by paragraph
  - type: text
    content: ' and they gave the sense, so that the people understood the reading.'
  - type: heading
    content: This Day Is Holy
  '9':
  - type: text
    content: 'And Nehemiah, who was '
  - type: note
    content: ch. 7:65, 70; 10:1; Ezra 2:63
  - type: text
    content: 'the governor, and Ezra '
  - type: note
    content: ch. 12:26
  - type: text
    content: 'the priest and scribe, and the Levites who taught the people said to all the people, '
  - type: note
    content: ver. 2; Lev. 23:24; Num. 29:1
  - type: text
    content: '“This day is holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God; '
  - type: note
    content: '[Eccles. 3:4]'
  - type: text
    content: 'do not mourn or weep.” For all the people wept as they heard the words of the Law. '
