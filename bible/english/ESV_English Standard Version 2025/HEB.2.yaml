document_id: HEB.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against Neglecting Salvation
  - type: text
    content: 'Therefore we must pay much closer attention to what we have heard, lest we drift away from it. '
  '10':
  - type: text
    content: 'For it '
  - type: note
    content: '[Luke 24:26]'
  - type: text
    content: 'was fitting that he, '
  - type: note
    content: Rom. 11:36
  - type: text
    content: 'for whom and by whom all things exist, in bringing many sons '
  - type: note
    content: '[ch. 3:1; Rom. 8:30]'
  - type: text
    content: 'to glory, should make the '
  - type: note
    content: '[ch. 5:9]'
  - type: text
    content: 'founder of their salvation '
  - type: note
    content: ch. 5:9; 7:28; Luke 13:32; [Phil. 3:12]
  - type: text
    content: 'perfect through suffering. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: ch. 13:12
  - type: text
    content: 'he who sanctifies and '
  - type: note
    content: ch. 10:10, 14, 29
  - type: text
    content: 'those who are sanctified '
  - type: note
    content: Acts 17:28
  - type: text
    content: all have one source.
  - type: note
    content: Greek all are of one
  - type: text
    content: ' That is why he is not ashamed to call them '
  - type: note
    content: Matt. 25:40
  - type: text
    content: brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verse 12
  - type: text
    content: ' '
  '12':
  - type: text
    content: saying,
  - type: note
    content: Cited from Ps. 22:22
  - type: text
    content: “I will tell of your name to my brothers;
  - type: text
    content: 'in the midst of the '
  - type: note
    content: ch. 12:23
  - type: text
    content: congregation I will sing your praise.”
  '13':
  - type: text
    content: And again,
  - type: note
    content: '[ Ps. 18:2; Isa. 8:17; 12:2 ]'
  - type: text
    content: “I will put my trust in him.”
  - type: text
    content: And again,
  - type: note
    content: Cited from Isa. 8:18
  - type: text
    content: '“Behold, I and the children '
  - type: note
    content: See John 17:2
  - type: text
    content: God has given me.”
  '14':
  - type: text
    content: 'Since therefore the children share in flesh and blood, he himself likewise '
  - type: note
    content: See John 1:14
  - type: text
    content: 'partook of the same things, that '
  - type: note
    content: See 1 Cor. 15:54-56
  - type: text
    content: 'through death he might '
  - type: note
    content: '[Col. 2:15; 2 Tim. 1:10]'
  - type: text
    content: 'destroy '
  - type: note
    content: 1 John 3:8; [John 16:11]
  - type: text
    content: 'the one who has the power of death, that is, the devil, '
  '15':
  - type: text
    content: 'and deliver all those who '
  - type: note
    content: See Rom. 8:15
  - type: text
    content: 'through fear of death were subject to lifelong slavery. '
  '16':
  - type: text
    content: 'For surely it is not angels that he helps, but he '
  - type: note
    content: Isa. 41:8, 9; [ch. 8:9]
  - type: text
    content: 'helps the offspring of Abraham. '
  '17':
  - type: text
    content: 'Therefore he had '
  - type: note
    content: Phil. 2:7
  - type: text
    content: 'to be made like his brothers in every respect, '
  - type: note
    content: ch. 4:15, 16; [ch. 5:2, 7, 8]
  - type: text
    content: 'so that he might become a merciful and faithful high priest '
  - type: note
    content: ch. 5:1; Rom. 15:17
  - type: text
    content: 'in the service of God, to make propitiation for the sins of the people. '
  '18':
  - type: text
    content: 'For because he himself has suffered '
  - type: note
    content: ch. 4:15; Luke 22:28
  - type: text
    content: when tempted, he is able to help those who are being tempted.
  '2':
  - type: text
    content: 'For since '
  - type: note
    content: See Acts 7:53
  - type: text
    content: 'the message declared by angels proved to be reliable, and '
  - type: note
    content: '[ch. 10:28; Num. 15:30, 31; Deut. 4:3; 17:2, 5, 12; 27:26]'
  - type: text
    content: 'every transgression or disobedience received a just '
  - type: note
    content: ch. 10:35; 11:26
  - type: text
    content: 'retribution, '
  '3':
  - type: note
    content: '[ch. 10:28, 29; 12:25]'
  - type: text
    content: 'how shall we escape if we '
  - type: note
    content: Matt. 22:5 (Gk.)
  - type: text
    content: 'neglect such a great salvation? It was '
  - type: note
    content: ch. 1:2
  - type: text
    content: 'declared at first by the Lord, and it was '
  - type: note
    content: Mark 16:20; [Acts 5:32]
  - type: text
    content: 'attested to us '
  - type: note
    content: '[Luke 1:2]'
  - type: text
    content: 'by those who heard, '
  '4':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'while God also bore witness '
  - type: note
    content: Acts 2:22, 43
  - type: text
    content: 'by signs and wonders and various miracles and by '
  - type: note
    content: '[1 Cor. 12:4, 11]'
  - type: text
    content: 'gifts of the Holy Spirit '
  - type: note
    content: '[Eph. 1:5]'
  - type: text
    content: distributed according to his will.
  - type: heading
    content: The Founder of Salvation
  '5':
  - type: text
    content: 'For it was not to angels that God subjected the world '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'to come, of which we are speaking. '
  '6':
  - type: text
    content: It has been testified somewhere,
  - type: note
    content: Cited from Ps. 8:4-6
  - type: text
    content: “What is man, that you are mindful of him,
  - type: text
    content: or the son of man, that you care for him?
  '7':
  - type: text
    content: You made him for a little while lower than the angels;
  - type: text
    content: you have crowned him with glory and honor,
  - type: note
    content: Some manuscripts insert and set him over the works of your hands
  '8':
  - type: text
    content: putting everything in subjection under his feet.”
  - type: text
    content: 'Now in putting everything in subjection to him, he left nothing outside his control. At present, '
  - type: note
    content: '[1 Cor. 15:25]'
  - type: text
    content: 'we do not yet see everything in subjection to him. '
  '9':
  - type: text
    content: 'But we see him '
  - type: note
    content: ver. 7
  - type: text
    content: 'who for a little while was made lower than the angels, namely Jesus, '
  - type: note
    content: Acts 3:13; 1 Pet. 1:21; See Acts 2:33
  - type: text
    content: 'crowned with glory and honor '
  - type: note
    content: Phil. 2:7-9; See John 10:17
  - type: text
    content: 'because of the suffering of death, so that by the grace of God he might '
  - type: note
    content: Matt. 16:28; John 8:52
  - type: text
    content: 'taste death '
  - type: note
    content: See John 12:32
  - type: text
    content: for everyone.
