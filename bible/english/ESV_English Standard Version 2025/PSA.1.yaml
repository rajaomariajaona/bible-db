  '1':
  - type: heading
    content: Book One
  - type: heading
    content: The Way of the Righteous and the Wicked
  - type: text
    content: Blessed is the man
  - type: note
    content: The singular Hebrew word for man (ish) is used here to portray a representative example of a godly person; see Preface
  - type: text
    content: 'who '
  - type: note
    content: Prov. 4:14, 15
  - type: text
    content: 'walks not in '
  - type: note
    content: Job 21:16
  - type: text
    content: the counsel of the wicked,
  - type: text
    content: 'nor stands in '
  - type: note
    content: Prov. 1:10
  - type: text
    content: the way of sinners,
  - type: text
    content: 'nor '
  - type: note
    content: Ps. 26:4; Jer. 15:17
  - type: text
    content: 'sits in '
  - type: note
    content: '[Ps. 107:32]'
  - type: text
    content: 'the seat of '
  - type: note
    content: Prov. 1:22; 3:34; 19:29; 21:24; 29:8; [Isa. 28:14]
  - type: text
    content: scoffers;
  '2':
  - type: text
    content: 'but his '
  - type: note
    content: Ps. 112:1; 119:35, 47, 92
  - type: text
    content: delight is in the law
  - type: note
    content: Or instruction
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and on his '
  - type: note
    content: Ps. 119:1, 97; Josh. 1:8
  - type: text
    content: law he meditates day and night.
  '3':
  - type: text
    content: 'He is like '
  - type: note
    content: Jer. 17:8; Ezek. 19:10; [Num. 24:6; Job 29:19]
  - type: text
    content: a tree
  - type: text
    content: 'planted by '
  - type: note
    content: Ps. 46:4
  - type: text
    content: streams of water
  - type: text
    content: that yields its fruit in its season,
  - type: text
    content: 'and its '
  - type: note
    content: Ezek. 47:12; [Isa. 34:4]
  - type: text
    content: leaf does not wither.
  - type: note
    content: Gen. 39:3, 23; [ Ps. 128:2; Isa. 3:10 ]
  - type: text
    content: In all that he does, he prospers.
  '4':
  - type: text
    content: The wicked are not so,
  - type: text
    content: 'but are like '
  - type: note
    content: See Job 21:18
  - type: text
    content: chaff that the wind drives away.
  '5':
  - type: text
    content: 'Therefore the wicked '
  - type: note
    content: Ps. 5:5; 76:7; Nah. 1:6; Luke 21:36; Eph. 6:13
  - type: text
    content: will not stand in the judgment,
  - type: text
    content: 'nor sinners in '
  - type: note
    content: '[Ezek. 13:9]'
  - type: text
    content: the congregation of the righteous;
  '6':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:7; 37:18; 144:3; Nah. 1:7; [John 10:14; 2 Tim. 2:19]
  - type: text
    content: 'knows '
  - type: note
    content: Ps. 37:5
  - type: text
    content: the way of the righteous,
  - type: text
    content: but the way of the wicked will perish.
