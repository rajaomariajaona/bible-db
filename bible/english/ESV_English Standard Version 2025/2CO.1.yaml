document_id: 2CO.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, '
  - type: note
    content: Eph. 1:1; Col. 1:1; 1 Tim. 1:1; 2 Tim. 1:1; Titus 1:1; [Rom. 1:1; Gal. 1:1]
  - type: text
    content: 'an apostle of Christ Jesus '
  - type: note
    content: See 1 Cor. 1:1
  - type: text
    content: 'by the will of God, and '
  - type: note
    content: See 1 Thess. 3:2
  - type: text
    content: Timothy our brother,
  - type: text
    content: 'To the church of God that is at Corinth, '
  - type: note
    content: Phil. 1:1; Col. 1:2
  - type: text
    content: 'with all the saints who are in the whole of Achaia:'
  '10':
  - type: note
    content: See Rom. 15:31
  - type: text
    content: 'He delivered us from such a deadly peril, and he will deliver us. '
  - type: note
    content: 1 Tim. 4:10
  - type: text
    content: 'On him we have set our hope that he will deliver us again. '
  '11':
  - type: note
    content: '[Acts 12:5; Rom. 15:30; Phil. 1:19; Philem. 22]'
  - type: text
    content: 'You also must help us by prayer, so that many will give thanks on our behalf '
  - type: note
    content: '[ch. 4:15; 9:11, 12]'
  - type: text
    content: for the blessing granted us through the prayers of many.
  - type: heading
    content: Paul’s Change of Plans
  '12':
  - type: text
    content: 'For our boast is this, '
  - type: note
    content: '[1 Thess. 2:10]; See Acts 23:1'
  - type: text
    content: the testimony of our conscience, that we behaved in the world with simplicity
  - type: note
    content: Some manuscripts holiness
  - type: text
    content: ' and '
  - type: note
    content: ch. 2:17; 4:2
  - type: text
    content: 'godly sincerity, '
  - type: note
    content: 1 Cor. 2:4, 13
  - type: text
    content: 'not by earthly wisdom but by the grace of God, and supremely so toward you. '
  '13':
  - type: text
    content: 'For we are not writing to you anything other than what you read and understand and I hope you will fully understand— '
  '14':
  - type: text
    content: 'just as you did '
  - type: note
    content: ch. 2:5
  - type: text
    content: 'partially understand us—that '
  - type: note
    content: See 1 Cor. 1:8
  - type: text
    content: 'on the day of our Lord Jesus '
  - type: note
    content: '[ch. 5:12; 9:3]'
  - type: text
    content: 'you will boast of us as '
  - type: note
    content: 1 Cor. 9:15; Phil. 2:16; 4:1; 1 Thess. 2:19, 20
  - type: text
    content: we will boast of you.
  '15':
  - type: text
    content: 'Because I was sure of this, '
  - type: note
    content: See 1 Cor. 4:19
  - type: text
    content: 'I wanted to come to you first, so that you might have '
  - type: note
    content: '[Acts 18:1-18]'
  - type: text
    content: 'a second '
  - type: note
    content: '[Rom. 1:11]'
  - type: text
    content: 'experience of grace. '
  '16':
  - type: text
    content: 'I wanted to visit you '
  - type: note
    content: Acts 19:21; [1 Cor. 16:5-7]
  - type: text
    content: 'on my way to Macedonia, and to come back to you from Macedonia and have you send me on my way to Judea. '
  '17':
  - type: text
    content: 'Was I vacillating when I wanted to do this? Do I make my plans '
  - type: note
    content: ch. 10:2, 3
  - type: text
    content: 'according to the flesh, ready to say “Yes, yes” and “No, no” at the same time? '
  '18':
  - type: text
    content: 'As surely as '
  - type: note
    content: See 1 Cor. 1:9
  - type: text
    content: 'God is faithful, '
  - type: note
    content: '[ch. 2:17]'
  - type: text
    content: 'our word to you has not been Yes and No. '
  '19':
  - type: text
    content: 'For '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God, Jesus Christ, whom we proclaimed among you, '
  - type: note
    content: Acts 15:22
  - type: text
    content: 'Silvanus and Timothy and I, was not Yes and No, but '
  - type: note
    content: '[Heb. 13:8]'
  - type: text
    content: 'in him it is always Yes. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: See Rom. 1:7
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: God of All Comfort
  '20':
  - type: text
    content: 'For '
  - type: note
    content: '[Rom. 15:8; Heb. 10:23]'
  - type: text
    content: 'all the promises of God find their Yes in him. That is why it is through him that we utter our '
  - type: note
    content: '[Rev. 3:14]; See 1 Cor. 14:16'
  - type: text
    content: 'Amen to God for his glory. '
  '21':
  - type: text
    content: 'And it is God who establishes us with you in Christ, and '
  - type: note
    content: '[1 John 2:20, 27]'
  - type: text
    content: 'has anointed us, '
  '22':
  - type: text
    content: 'and who has also '
  - type: note
    content: Eph. 1:13; 4:30
  - type: text
    content: 'put his seal on us and '
  - type: note
    content: ch. 5:5; Eph. 1:14; See Rom. 8:16
  - type: text
    content: given us his Spirit in our hearts as a guarantee.
  - type: note
    content: Or down payment
  '23':
  - type: text
    content: 'But '
  - type: note
    content: '[Gal. 1:20]; See Rom. 1:9'
  - type: text
    content: 'I call God to witness against me—it was '
  - type: note
    content: ch. 2:1, 3; See 1 Cor. 4:21
  - type: text
    content: 'to spare you that I refrained from coming again to Corinth. '
  '24':
  - type: text
    content: 'Not that we '
  - type: note
    content: 1 Pet. 5:3; [ch. 4:5; Matt. 23:8-10]
  - type: text
    content: 'lord it over your faith, but we work with you for your joy, for you stand firm '
  - type: note
    content: Rom. 11:20; See 1 Cor. 15:1
  - type: text
    content: in your faith.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Eph. 1:3; 1 Pet. 1:3
  - type: text
    content: 'Blessed be the '
  - type: note
    content: See Rom. 15:6
  - type: text
    content: 'God and Father of our Lord Jesus Christ, the Father of mercies and '
  - type: note
    content: Rom. 15:5
  - type: text
    content: 'God of all comfort, '
  '4':
  - type: note
    content: '[Isa. 51:12; 66:13]'
  - type: text
    content: 'who comforts us in all our affliction, so that we may be able to comfort those who are in any affliction, with the comfort with which we ourselves are comforted by God. '
  '5':
  - type: text
    content: 'For as we share abundantly in '
  - type: note
    content: '[ch. 4:10; Phil. 3:10; Col. 1:24]'
  - type: text
    content: Christ’s sufferings, so through Christ we share abundantly in comfort too.
  - type: note
    content: Or For as the sufferings of Christ abound for us, so also our comfort abounds through Christ
  - type: text
    content: ' '
  '6':
  - type: note
    content: 2 Tim. 2:10; [ch. 4:15; 12:15; Eph. 3:13]
  - type: text
    content: 'If we are afflicted, it is for your comfort and salvation; and if we are comforted, it is for your comfort, which you experience when you patiently endure the same sufferings that we suffer. '
  '7':
  - type: text
    content: 'Our hope for you is unshaken, for we know that as you '
  - type: note
    content: See Rom. 8:17
  - type: text
    content: share in our sufferings, you will also share in our comfort.
  '8':
  - type: text
    content: For we do not want you to be unaware, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' of '
  - type: note
    content: Acts 19:23; 1 Cor. 15:32
  - type: text
    content: 'the affliction we experienced in Asia. For we were so utterly burdened beyond our strength that we despaired of life itself. '
  '9':
  - type: text
    content: 'Indeed, we felt that we had received the sentence of death. But that was to make us '
  - type: note
    content: Luke 18:9
  - type: text
    content: 'rely not on ourselves '
  - type: note
    content: Ps. 2:12; 25:2; 26:1
  - type: text
    content: 'but on God '
  - type: note
    content: ch. 4:14
  - type: text
    content: 'who raises the dead. '
