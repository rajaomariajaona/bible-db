document_id: JHN.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wedding at Cana
  - type: text
    content: 'On '
  - type: note
    content: '[ch. 1:29, 35, 43]'
  - type: text
    content: 'the third day there was a wedding at '
  - type: note
    content: ch. 4:46; 21:2
  - type: text
    content: 'Cana in Galilee, and the mother of Jesus was there. '
  '10':
  - type: text
    content: 'and said to him, “Everyone serves the good wine first, and when people have drunk freely, then the poor wine. But you have kept the good wine until now.” '
  '11':
  - type: text
    content: 'This, the first of his signs, Jesus did at Cana in Galilee, and manifested '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'his glory. And '
  - type: note
    content: ver. 2
  - type: text
    content: his disciples believed in him.
  '12':
  - type: text
    content: 'After this he went down to Capernaum, with his mother and '
  - type: note
    content: See Matt. 12:46
  - type: text
    content: his brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters
  - type: text
    content: ' and his disciples, and they stayed there for a few days.'
  - type: heading
    content: Jesus Cleanses the Temple
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:55; See ch. 6:4
  - type: text
    content: 'The Passover of the Jews was at hand, and Jesus '
  - type: note
    content: ver. 23; Deut. 16:1-6; Luke 2:41
  - type: text
    content: 'went up to Jerusalem. '
  '14':
  - type: note
    content: For ver. 14-17, [Matt. 21:12, 13; Mark 11:15-17; Luke 19:45, 46, with Mal. 3:1-3]
  - type: text
    content: 'In the temple he found those who were selling oxen and sheep and pigeons, and the money-changers sitting there. '
  '15':
  - type: text
    content: 'And making a whip of cords, he drove them all out of the temple, with the sheep and oxen. And he poured out the coins of the money-changers and overturned their tables. '
  '16':
  - type: text
    content: 'And he told those who sold the pigeons, '
  - type: text
    content: '“Take these things away; do not make '
  - type: note
    content: '[ch. 14:2; Luke 2:49]'
  - type: text
    content: my Father’s house a house of trade.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'His disciples remembered that it was written, '
  - type: note
    content: Cited from Ps. 69:9
  - type: text
    content: “Zeal for your house will consume me.”
  '18':
  - type: text
    content: 'So the Jews said to him, '
  - type: note
    content: ch. 4:48; 6:30; [Ex. 4:1, 8; 7:9]; See Matt. 12:38
  - type: text
    content: '“What sign do you show us for doing these things?” '
  '19':
  - type: text
    content: 'Jesus answered them, '
  - type: note
    content: '[Matt. 26:61; 27:40; Mark 14:58; 15:29]'
  - type: text
    content: '“Destroy this temple, and in three days '
  - type: note
    content: ch. 10:18
  - type: text
    content: I will raise it up.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus also was invited to the wedding with '
  - type: note
    content: ch. 1:40-49
  - type: text
    content: 'his disciples. '
  '20':
  - type: text
    content: The Jews then said, “It has taken forty-six years to build this temple,
  - type: note
    content: Or This temple was built forty-six years ago
  - type: text
    content: ' and will you raise it up in three days?” '
  '21':
  - type: text
    content: 'But he was speaking about '
  - type: note
    content: '[ch. 1:14; 1 Cor. 6:19; Col. 2:9]'
  - type: text
    content: 'the temple of his body. '
  '22':
  - type: text
    content: 'When therefore he was raised from the dead, '
  - type: note
    content: ch. 12:16; Luke 24:8
  - type: text
    content: 'his disciples remembered that he had said this, and they believed '
  - type: note
    content: ch. 20:9; Ps. 16:10
  - type: text
    content: the Scripture and the word that Jesus had spoken.
  - type: heading
    content: Jesus Knows What Is in Man
  '23':
  - type: text
    content: 'Now when he was in Jerusalem at the Passover Feast, many believed in his name '
  - type: note
    content: ch. 11:45
  - type: text
    content: 'when they saw the signs that he was doing. '
  '24':
  - type: text
    content: 'But Jesus '
  - type: note
    content: '[ch. 6:14, 15]'
  - type: text
    content: 'on his part did not entrust himself to them, because '
  - type: note
    content: ch. 1:48; 5:42; 16:30; [ch. 6:61, 64]; See Matt. 9:4
  - type: text
    content: 'he knew all people '
  '25':
  - type: text
    content: 'and needed no one to bear witness about man, for '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: he himself knew what was in man.
  '3':
  - type: text
    content: 'When the wine ran out, the mother of Jesus said to him, “They have no wine.” '
  '4':
  - type: text
    content: 'And Jesus said to her, '
  - type: note
    content: ch. 19:26
  - type: text
    content: '“Woman, '
  - type: note
    content: See 2 Sam. 16:10
  - type: text
    content: 'what does this have to do with me? '
  - type: note
    content: ch. 7:30; 8:20; 13:1
  - type: text
    content: My hour has not yet come.”
  - type: text
    content: ' '
  '5':
  - type: text
    content: His mother said to the servants, “Do whatever he tells you.”
  '6':
  - type: text
    content: 'Now there were six stone water jars there '
  - type: note
    content: ch. 3:25; [Mark 7:3, 4]
  - type: text
    content: 'for the Jewish rites of purification, each holding twenty or thirty '
  - type: note
    content: 2 Chr. 4:5 (Gk.)
  - type: text
    content: gallons.
  - type: note
    content: Greek two or three measures (metrētas); a metrētēs was about 10 gallons or 35 liters
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Jesus said to the servants, '
  - type: text
    content: “Fill the jars with water.”
  - type: text
    content: ' And they filled them up to the brim. '
  '8':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Now draw some out and take it to the master of the feast.”
  - type: text
    content: ' So they took it. '
  '9':
  - type: text
    content: 'When the master of the feast tasted '
  - type: note
    content: ch. 4:46
  - type: text
    content: 'the water now become wine, and did not know where it came from (though the servants who had drawn the water knew), the master of the feast called the bridegroom '
