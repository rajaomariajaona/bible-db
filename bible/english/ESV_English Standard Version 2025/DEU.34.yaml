document_id: DEU.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Moses
  - type: text
    content: 'Then Moses went up from the plains of Moab '
  - type: note
    content: See Num. 27:12
  - type: text
    content: 'to Mount Nebo, to the top of Pisgah, which is opposite Jericho. And the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him all the land, Gilead as far as Dan, '
  '10':
  - type: text
    content: 'And there has not '
  - type: note
    content: '[ch. 18:15, 18]'
  - type: text
    content: 'arisen a prophet since in Israel like Moses, '
  - type: note
    content: ch. 5:4; See Ex. 33:11
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' knew face to face, '
  '11':
  - type: text
    content: 'none like him for all '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'the signs and the wonders that the '
  - type: text
    content: Lord
  - type: text
    content: ' sent him to do in the land of Egypt, to Pharaoh and to all his servants and to all his land, '
  '12':
  - type: text
    content: and for all the mighty power and all the great deeds of terror that Moses did in the sight of all Israel.
  '2':
  - type: text
    content: 'all Naphtali, the land of Ephraim and Manasseh, all the land of Judah '
  - type: note
    content: See ch. 11:24
  - type: text
    content: 'as far as the western sea, '
  '3':
  - type: note
    content: ch. 1:7
  - type: text
    content: 'the Negeb, and '
  - type: note
    content: Gen. 13:12; 19:17, 25, 28, 29; 2 Sam. 18:23
  - type: text
    content: 'the Plain, that is, the Valley of Jericho '
  - type: note
    content: Judg. 1:16; 3:13; 2 Chr. 28:15
  - type: text
    content: 'the city of palm trees, as far as '
  - type: note
    content: Gen. 14:2; 19:22
  - type: text
    content: 'Zoar. '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  - type: note
    content: See Gen. 12:7; 50:24
  - type: text
    content: '“This is the land of which I swore to Abraham, to Isaac, and to Jacob, ‘I will give it to your offspring.’ '
  - type: note
    content: ch. 3:27; 32:52
  - type: text
    content: 'I have let you see it with your eyes, but '
  - type: note
    content: See ch. 1:37
  - type: text
    content: 'you shall not go over there.” '
  '5':
  - type: text
    content: 'So Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' died there in the land of Moab, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'and he buried him in the valley in the land of Moab opposite Beth-peor; but '
  - type: note
    content: '[Jude 9]'
  - type: text
    content: 'no one knows the place of his burial to this day. '
  '7':
  - type: note
    content: ch. 31:2
  - type: text
    content: 'Moses was 120 years old when he died. '
  - type: note
    content: '[Gen. 27:1; 48:10; Josh. 14:10, 11; 1 Sam. 3:2; 4:15]'
  - type: text
    content: 'His eye was undimmed, and his vigor unabated. '
  '8':
  - type: text
    content: 'And the people of Israel '
  - type: note
    content: Num. 20:29; [Gen. 50:3]
  - type: text
    content: wept for Moses in the plains of Moab thirty days. Then the days of weeping and mourning for Moses were ended.
  '9':
  - type: text
    content: 'And Joshua the son of Nun was full of '
  - type: note
    content: Ex. 28:3; Isa. 11:2
  - type: text
    content: 'the spirit of wisdom, for '
  - type: note
    content: Num. 27:18, 23
  - type: text
    content: 'Moses had laid his hands on him. So '
  - type: note
    content: Josh. 1:17
  - type: text
    content: 'the people of Israel obeyed him and did as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
