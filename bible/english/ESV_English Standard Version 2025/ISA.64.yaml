document_id: ISA.64,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Sam. 22:10; Ps. 18:9; 144:5 ]'
  - type: text
    content: Oh that you would rend the heavens and come down,
  - type: note
    content: Judg. 5:5; Mic. 1:4
  - type: text
    content: that the mountains might quake at your presence—
  '10':
  - type: text
    content: ' '
  - type: note
    content: Neh. 1:3; 2:3
  - type: text
    content: Your holy cities have become a wilderness;
  - type: text
    content: Zion has become a wilderness,
  - type: text
    content: Jerusalem a desolation.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Hag. 1:9; 2:3; [ 2 Kgs. 25:9; 2 Chr. 36:19; Ps. 74:7 ]
  - type: text
    content: Our holy and beautiful
  - type: note
    content: Or holy and glorious
  - type: text
    content: ' house,'
  - type: text
    content: where our fathers praised you,
  - type: text
    content: has been burned by fire,
  - type: text
    content: and all our pleasant places have become ruins.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 42:14; [ Zech. 1:12 ]
  - type: text
    content: 'Will you restrain yourself at these things, O '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Will you keep silent, and afflict us so terribly?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 64:1 in Hebrew
  - type: text
    content: as when fire kindles brushwood
  - type: text
    content: and the fire causes water to boil—
  - type: note
    content: '[ Josh. 2:9, 10 ]'
  - type: text
    content: to make your name known to your adversaries,
  - type: text
    content: and that the nations might tremble at your presence!
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ex. 14:13; 15:11 ]'
  - type: text
    content: When you did awesome things that we did not look for,
  - type: text
    content: you came down, the mountains quaked at your presence.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 31:19 ]'
  - type: text
    content: From of old no one has heard
  - type: text
    content: or perceived by the ear,
  - type: note
    content: '[ 1 Cor. 2:9 ]'
  - type: text
    content: no eye has seen a God besides you,
  - type: text
    content: who acts for those who wait for him.
  '5':
  - type: text
    content: You meet him who joyfully works righteousness,
  - type: text
    content: those who remember you in your ways.
  - type: text
    content: Behold, you were angry, and we sinned;
  - type: text
    content: in our sins we have been a long time, and shall we be saved?
  - type: note
    content: Or in your ways is continuance, that we might be saved
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 59:12-15
  - type: text
    content: We have all become like one who is unclean,
  - type: text
    content: and all our righteous deeds are like a polluted garment.
  - type: note
    content: Ps. 90:5, 6
  - type: text
    content: We all fade like a leaf,
  - type: text
    content: and our iniquities, like the wind, take us away.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 43:22; Hos. 7:7
  - type: text
    content: There is no one who calls upon your name,
  - type: text
    content: who rouses himself to take hold of you;
  - type: text
    content: for you have hidden your face from us,
  - type: text
    content: and have made us melt in
  - type: note
    content: Masoretic Text; Septuagint, Syriac, Targum have delivered us into
  - type: text
    content: ' the hand of our iniquities.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 63:16
  - type: text
    content: 'But now, O '
  - type: text
    content: Lord
  - type: text
    content: ', you are our Father;'
  - type: note
    content: ch. 45:9; Rom. 9:20, 21
  - type: text
    content: we are the clay, and you are our potter;
  - type: note
    content: ch. 29:23; 45:11
  - type: text
    content: we are all the work of your hand.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 57:16; Ps. 74:1, 2 ]'
  - type: text
    content: 'Be not so terribly angry, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Ps. 79:8
  - type: text
    content: and remember not iniquity forever.
  - type: text
    content: Behold, please look, we are all your people.
