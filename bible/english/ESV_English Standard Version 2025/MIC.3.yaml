document_id: MIC.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rulers and Prophets Denounced
  - type: text
    content: 'And I said:'
  - type: note
    content: See ch. 1:2
  - type: text
    content: Hear, you heads of Jacob
  - type: text
    content: and rulers of the house of Israel!
  - type: note
    content: Jer. 5:5; [ Ezek. 22:6, 27 ]
  - type: text
    content: Is it not for you to know justice?—
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jer. 22:13; Ezek. 22:27; Hab. 2:12
  - type: text
    content: who build Zion with blood
  - type: text
    content: and Jerusalem with iniquity.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:3; Isa. 1:23
  - type: text
    content: Its heads give judgment for a bribe;
  - type: note
    content: See Jer. 6:13
  - type: text
    content: its priests teach for a price;
  - type: note
    content: '[ver. 5; Ezek. 22:25 ]'
  - type: text
    content: its prophets practice divination for money;
  - type: note
    content: Isa. 48:2
  - type: text
    content: 'yet they lean on the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Jer. 7:4; [Amos 5:14]
  - type: text
    content: say,
  - type: text
    content: '“Is not the '
  - type: text
    content: Lord
  - type: text
    content: ' in the midst of us?'
  - type: note
    content: '[ Jer. 23:17; Amos 9:10 ]'
  - type: text
    content: No disaster shall come upon us.”
  '12':
  - type: text
    content: Therefore because of you
  - type: note
    content: Cited Jer. 26:18
  - type: text
    content: Zion shall be plowed as a field;
  - type: text
    content: 'Jerusalem '
  - type: note
    content: '[ch. 1:6]'
  - type: text
    content: shall become a heap of ruins,
  - type: text
    content: 'and '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'the mountain of the house '
  - type: note
    content: '[Luke 13:35]'
  - type: text
    content: a wooded height.
  '2':
  - type: text
    content: 'you '
  - type: note
    content: '[ver. 9]'
  - type: text
    content: who hate the good and love the evil,
  - type: note
    content: '[ Ezek. 34:3 ]'
  - type: text
    content: who tear the skin from off my people
  - type: note
    content: Hebrew from off them
  - type: text
    content: and their flesh from off their bones,
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 14:4; Isa. 3:15 ]'
  - type: text
    content: who eat the flesh of my people,
  - type: text
    content: and flay their skin from off them,
  - type: text
    content: and break their bones in pieces
  - type: text
    content: and chop them up like meat in a pot,
  - type: text
    content: like flesh in a cauldron.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See Prov. 1:28
  - type: text
    content: 'Then they will cry to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but he will not answer them;
  - type: note
    content: Isa. 1:15; See Deut. 31:17
  - type: text
    content: he will hide his face from them at that time,
  - type: text
    content: because they have made their deeds evil.
  '5':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning '
  - type: note
    content: Jer. 23:13, 32; Ezek. 13:10
  - type: text
    content: the prophets
  - type: text
    content: who lead my people astray,
  - type: note
    content: '[ Jer. 6:14 ]'
  - type: text
    content: who cry “Peace”
  - type: text
    content: when they have something to eat,
  - type: text
    content: but declare war against him
  - type: text
    content: who puts nothing into their mouths.
  '6':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ezek. 12:24; 13:23
  - type: text
    content: it shall be night to you, without vision,
  - type: text
    content: and darkness to you, without divination.
  - type: note
    content: See Amos 8:9
  - type: text
    content: The sun shall go down on the prophets,
  - type: text
    content: and the day shall be black over them;
  '7':
  - type: text
    content: ' '
  - type: note
    content: Zech. 13:4; [ Jer. 37:19 ]
  - type: text
    content: the seers shall be disgraced,
  - type: text
    content: and the diviners put to shame;
  - type: note
    content: '[ Lev. 13:45 ]'
  - type: text
    content: they shall all cover their lips,
  - type: text
    content: 'for '
  - type: note
    content: See Amos 8:11
  - type: text
    content: there is no answer from God.
  '8':
  - type: text
    content: 'But as for me, '
  - type: note
    content: '[Jer. 6:11]'
  - type: text
    content: I am filled with power,
  - type: text
    content: 'with the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and with justice and might,
  - type: text
    content: 'to declare to Jacob '
  - type: note
    content: ch. 1:5; Isa. 58:1; [Ezek. 23:36]
  - type: text
    content: his transgression
  - type: text
    content: and to Israel his sin.
  '9':
  - type: text
    content: ' '
  - type: note
    content: See ch. 1:2
  - type: text
    content: Hear this, you heads of the house of Jacob
  - type: text
    content: and rulers of the house of Israel,
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: who detest justice
  - type: text
    content: and make crooked all that is straight,
