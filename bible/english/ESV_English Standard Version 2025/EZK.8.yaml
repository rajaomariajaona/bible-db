document_id: EZK.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abominations in the Temple
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:2 ]; See ch. 20:1'
  - type: text
    content: 'In the sixth year, in the sixth month, on the fifth day of the month, '
  - type: note
    content: '[2 Kgs. 6:32]'
  - type: text
    content: 'as I sat in my house, with '
  - type: note
    content: ver. 11, 12; ch. 14:1; 20:1, 3
  - type: text
    content: 'the elders of Judah sitting before me, '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'the hand of the Lord '
  - type: text
    content: God
  - type: text
    content: ' fell upon me there. '
  '10':
  - type: text
    content: 'So I went in and saw. And there, '
  - type: note
    content: ch. 23:14
  - type: text
    content: 'engraved on the wall all around, was '
  - type: note
    content: See Ex. 20:4
  - type: text
    content: 'every form of '
  - type: note
    content: Lev. 11:20; Rom. 1:23
  - type: text
    content: 'creeping things and loathsome beasts, and all the idols of the house of Israel. '
  '11':
  - type: text
    content: 'And before them stood '
  - type: note
    content: '[Ex. 24:1; Num. 11:16]'
  - type: text
    content: 'seventy men of '
  - type: note
    content: See ver. 1
  - type: text
    content: 'the elders of the house of Israel, with Jaazaniah the son of '
  - type: note
    content: 2 Chr. 34:8
  - type: text
    content: 'Shaphan standing among them. Each had his censer in his hand, and '
  - type: note
    content: '[ch. 6:13]'
  - type: text
    content: 'the smoke of the cloud of incense went up. '
  '12':
  - type: text
    content: 'Then he said to me, “Son of man, have you seen what the elders of the house of Israel are doing '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'in the dark, each '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'in his room of pictures? For they say, '
  - type: note
    content: ch. 9:9; Ps. 10:11; Isa. 29:15
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' does not see us, the '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken the land.’” '
  '13':
  - type: text
    content: 'He said also to me, '
  - type: note
    content: ver. 6
  - type: text
    content: “You will see still greater abominations that they commit.”
  '14':
  - type: text
    content: 'Then he brought me to '
  - type: note
    content: ver. 3
  - type: text
    content: 'the entrance of the north gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and behold, there sat women weeping for Tammuz. '
  '15':
  - type: text
    content: 'Then he said to me, “Have you seen this, O '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'son of man? '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: You will see still greater abominations than these.”
  '16':
  - type: text
    content: 'And he brought me into '
  - type: note
    content: ch. 10:3; 40:28; 43:5; 45:19; 46:1; 1 Kgs. 6:36
  - type: text
    content: 'the inner court of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. And behold, at the entrance of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Joel 2:17
  - type: text
    content: 'between the '
  - type: note
    content: 1 Kgs. 6:3
  - type: text
    content: 'porch and '
  - type: note
    content: ver. 5; ch. 40:47; Ex. 40:6, 29; [ch. 9:2]
  - type: text
    content: 'the altar, were about twenty-five men, '
  - type: note
    content: '[Jer. 2:27; 32:33]'
  - type: text
    content: 'with their backs to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and their faces toward the east, worshiping '
  - type: note
    content: See Jer. 8:2
  - type: text
    content: 'the sun toward the east. '
  '17':
  - type: text
    content: 'Then he said to me, “Have you seen this, O '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man? Is it too light a thing for the house of Judah to commit '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'the abominations that they commit here, that '
  - type: note
    content: '[ch. 7:11, 23]'
  - type: text
    content: 'they should fill the land with violence and '
  - type: note
    content: Jer. 7:18, 19; [ch. 20:28]
  - type: text
    content: provoke me still further to anger? Behold, they put the branch to their
  - type: note
    content: Or my
  - type: text
    content: ' nose. '
  '18':
  - type: text
    content: 'Therefore '
  - type: note
    content: ch. 5:13
  - type: text
    content: 'I will act in wrath. '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'My eye will not spare, nor will I have pity. '
  - type: note
    content: Prov. 1:28; Isa. 1:15; Mic. 3:4
  - type: text
    content: And though they cry in my ears with a loud voice, I will not hear them.”
  '2':
  - type: text
    content: 'Then I looked, and behold, '
  - type: note
    content: ch. 1:27
  - type: text
    content: a form that had the appearance of a man.
  - type: note
    content: By revocalization (compare Septuagint); Hebrew of fire
  - type: text
    content: ' '
  - type: note
    content: ch. 1:27
  - type: text
    content: 'Below what appeared to be his waist was fire, and above his waist was something like the appearance of brightness, like '
  - type: note
    content: ch. 1:4, 27
  - type: text
    content: gleaming metal.
  - type: note
    content: Or amber
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He '
  - type: note
    content: '[Dan. 5:5]; See ch. 2:9'
  - type: text
    content: 'put out the form of a hand and took me by a lock of my head, and the Spirit lifted me up '
  - type: note
    content: '[2 Cor. 12:2, 4]'
  - type: text
    content: 'between earth and heaven and '
  - type: note
    content: ch. 11:1, 24; 40:2
  - type: text
    content: 'brought me in '
  - type: note
    content: See ch. 1:1
  - type: text
    content: 'visions of God to Jerusalem, '
  - type: note
    content: ver. 14
  - type: text
    content: 'to the entrance of the gateway of the inner court that faces north, '
  - type: note
    content: '[ch. 5:11]'
  - type: text
    content: 'where was the seat of the '
  - type: note
    content: '[Deut. 4:16]'
  - type: text
    content: 'image of jealousy, '
  - type: note
    content: Deut. 32:16, 21
  - type: text
    content: 'which provokes to jealousy. '
  '4':
  - type: text
    content: 'And behold, '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'the glory of the God of Israel was there, like the vision that I saw '
  - type: note
    content: See ch. 3:22
  - type: text
    content: in the valley.
  '5':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, lift up your eyes now toward the north.” So I lifted up my eyes toward the north, and behold, north of '
  - type: note
    content: See ver. 16
  - type: text
    content: 'the altar gate, in the entrance, was this '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'image of jealousy. '
  '6':
  - type: text
    content: 'And he said to me, “Son of man, '
  - type: note
    content: '[ch. 47:6]'
  - type: text
    content: 'do you see what they are doing, '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'the great abominations that the house of Israel are committing here, '
  - type: note
    content: '[ch. 10:18, 19]'
  - type: text
    content: to drive me far from my sanctuary? But you will see still greater abominations.”
  '7':
  - type: text
    content: 'And he brought me to the entrance of the court, and when I looked, behold, there was a hole in the wall. '
  '8':
  - type: text
    content: 'Then he said to me, “Son of man, '
  - type: note
    content: '[ch. 12:5]'
  - type: text
    content: 'dig in the wall.” So I dug in the wall, and behold, there was an entrance. '
  '9':
  - type: text
    content: 'And he said to me, “Go in, and see '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'the vile abominations that they are committing here.” '
