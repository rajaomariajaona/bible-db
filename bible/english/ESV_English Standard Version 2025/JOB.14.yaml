  '1':
  - type: heading
    content: 'Job Continues: Death Comes Soon to All'
  - type: text
    content: '“Man who is '
  - type: note
    content: ch. 15:14; 25:4; Matt. 11:11
  - type: text
    content: born of a woman
  - type: text
    content: 'is '
  - type: note
    content: ch. 10:20; 16:22; Gen. 47:9; Ps. 39:5; 89:47
  - type: text
    content: 'few of days and '
  - type: note
    content: See ch. 5:7
  - type: text
    content: full of trouble.
  '10':
  - type: text
    content: But a man dies and is laid low;
  - type: text
    content: 'man breathes his last, and '
  - type: note
    content: ch. 29:7
  - type: text
    content: where is he?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Isa. 19:5
  - type: text
    content: As waters fail from a lake
  - type: text
    content: and a river wastes away and dries up,
  '12':
  - type: text
    content: so a man lies down and rises not again;
  - type: text
    content: 'till '
  - type: note
    content: Deut. 11:21; Ps. 89:29; [Ps. 72:5; Matt. 5:18]
  - type: text
    content: the heavens are no more he will not awake
  - type: text
    content: 'or be '
  - type: note
    content: '[John 11:11]'
  - type: text
    content: roused out of his sleep.
  '13':
  - type: text
    content: 'Oh that you would '
  - type: note
    content: '[Ps. 27:5; 31:20]'
  - type: text
    content: 'hide me in '
  - type: note
    content: See ch. 21:13
  - type: text
    content: Sheol,
  - type: text
    content: 'that you would '
  - type: note
    content: '[Ps. 27:5; 31:20]'
  - type: text
    content: 'conceal me '
  - type: note
    content: '[Isa. 26:20]'
  - type: text
    content: until your wrath be past,
  - type: text
    content: that you would appoint me a set time, and remember me!
  '14':
  - type: text
    content: If a man dies, shall he live again?
  - type: text
    content: 'All the days of my '
  - type: note
    content: ch. 7:1
  - type: text
    content: 'service I would '
  - type: note
    content: ch. 13:15
  - type: text
    content: wait,
  - type: text
    content: till my renewal
  - type: note
    content: Or relief
  - type: text
    content: ' should come.'
  '15':
  - type: text
    content: 'You would '
  - type: note
    content: ch. 13:22
  - type: text
    content: call, and I would answer you;
  - type: text
    content: 'you would long for the '
  - type: note
    content: See ch. 10:3
  - type: text
    content: work of your hands.
  '16':
  - type: text
    content: 'For then you would '
  - type: note
    content: ch. 31:4; 34:21
  - type: text
    content: number my steps;
  - type: text
    content: 'you would not keep '
  - type: note
    content: '[ch. 10:6]'
  - type: text
    content: watch over my sin;
  '17':
  - type: text
    content: 'my transgression would be '
  - type: note
    content: Deut. 32:34; [Hos. 13:12]
  - type: text
    content: sealed up in a bag,
  - type: text
    content: and you would cover over my iniquity.
  '18':
  - type: text
    content: '“But the mountain falls and '
  - type: note
    content: Isa. 34:4
  - type: text
    content: crumbles away,
  - type: text
    content: 'and '
  - type: note
    content: ch. 18:4
  - type: text
    content: the rock is removed from its place;
  '19':
  - type: text
    content: the waters wear away the stones;
  - type: text
    content: the torrents wash away the soil of the earth;
  - type: text
    content: so you destroy the hope of man.
  '2':
  - type: text
    content: 'He comes out like '
  - type: note
    content: Ps. 103:15; Isa. 40:6, 7; James 1:10; 1 Pet. 1:24
  - type: text
    content: 'a flower and '
  - type: note
    content: Ps. 37:2; 90:6
  - type: text
    content: withers;
  - type: text
    content: 'he flees like '
  - type: note
    content: See ch. 8:9; 17:7; Ps. 109:23
  - type: text
    content: a shadow and continues not.
  '20':
  - type: text
    content: You prevail forever against him, and he passes;
  - type: text
    content: you change his countenance, and send him away.
  '21':
  - type: text
    content: 'His sons come to honor, and he '
  - type: note
    content: '[Eccles. 9:5]'
  - type: text
    content: does not know it;
  - type: text
    content: they are brought low, and he perceives it not.
  '22':
  - type: text
    content: He feels only the pain of his own body,
  - type: text
    content: and he mourns only for himself.”
  '3':
  - type: text
    content: 'And do you '
  - type: note
    content: '[Ps. 8:4; 144:3]'
  - type: text
    content: open your eyes on such a one
  - type: text
    content: 'and '
  - type: note
    content: ch. 22:4; Ps. 143:2
  - type: text
    content: bring me into judgment with you?
  '4':
  - type: text
    content: 'Who can bring '
  - type: note
    content: ch. 15:14; [Ps. 51:5; John 3:6]
  - type: text
    content: a clean thing out of an unclean?
  - type: text
    content: There is not one.
  '5':
  - type: text
    content: 'Since his '
  - type: note
    content: '[ch. 7:1; Ps. 39:4]'
  - type: text
    content: days are determined,
  - type: text
    content: 'and '
  - type: note
    content: ch. 21:21
  - type: text
    content: the number of his months is with you,
  - type: text
    content: and you have appointed his limits that he cannot pass,
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:19
  - type: text
    content: look away from him and leave him alone,
  - type: note
    content: Probable reading; Hebrew look away from him, that he may cease
  - type: text
    content: 'that he may enjoy, like '
  - type: note
    content: ch. 7:1
  - type: text
    content: a hired hand, his day.
  '7':
  - type: text
    content: “For there is hope for a tree,
  - type: text
    content: if it be cut down, that it will sprout again,
  - type: text
    content: and that its shoots will not cease.
  '8':
  - type: text
    content: Though its root grow old in the earth,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 11:1
  - type: text
    content: its stump die in the soil,
  '9':
  - type: text
    content: yet at the scent of water it will bud
  - type: text
    content: 'and put out '
  - type: note
    content: '[ch. 29:19]'
  - type: text
    content: branches like a young plant.
