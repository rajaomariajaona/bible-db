document_id: DEU.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Renewed in Moab
  - type: text
    content: ' '
  - type: note
    content: Ch 28:69 in Hebrew
  - type: text
    content: 'These are the words of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses to make with the people of Israel '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'in the land of Moab, besides '
  - type: note
    content: ch. 5:2, 3
  - type: text
    content: the covenant that he had made with them at Horeb.
  '10':
  - type: text
    content: '“You are standing today, all of you, before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God: the heads of your tribes,'
  - type: note
    content: Septuagint, Syriac; Hebrew your heads, your tribes
  - type: text
    content: ' your elders, and your officers, all the men of Israel, '
  '11':
  - type: text
    content: 'your little ones, your wives, and the '
  - type: note
    content: '[Ex. 12:38]'
  - type: text
    content: 'sojourner who is in your camp, from '
  - type: note
    content: '[Josh. 9:21, 23, 27]'
  - type: text
    content: 'the one who chops your wood to the one who draws your water, '
  '12':
  - type: text
    content: 'so that you may enter into the '
  - type: note
    content: Neh. 10:29
  - type: text
    content: 'sworn covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is making with you today, '
  '13':
  - type: text
    content: 'that he may '
  - type: note
    content: ch. 28:9
  - type: text
    content: 'establish you today as his people, and that '
  - type: note
    content: Ex. 6:7
  - type: text
    content: 'he may be your God, as he promised you, and '
  - type: note
    content: Gen. 17:7; [Gen. 50:24]
  - type: text
    content: 'as he swore to your fathers, to Abraham, to Isaac, and to Jacob. '
  '14':
  - type: text
    content: 'It is not with you alone '
  - type: note
    content: '[Jer. 31:31-33; Heb. 8:8-10]'
  - type: text
    content: 'that I am making this sworn covenant, '
  '15':
  - type: text
    content: 'but with whoever is standing here with us today before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: '[Acts 2:39]'
  - type: text
    content: and with whoever is not here with us today.
  '16':
  - type: text
    content: '“You know how we lived in the land of Egypt, and how we came through the midst of the nations through which you passed. '
  '17':
  - type: text
    content: 'And you have seen their detestable things, their idols of wood and stone, of silver and gold, which were among them. '
  '18':
  - type: text
    content: 'Beware lest there be among you a man or woman or clan or tribe whose heart is turning away today from the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to go and serve the gods of those nations. Beware lest there be among you '
  - type: note
    content: Heb. 12:15
  - type: text
    content: 'a root bearing poisonous and bitter fruit, '
  '19':
  - type: text
    content: 'one who, when he hears the words of this sworn covenant, blesses himself in his heart, saying, ‘I shall be safe, though I walk in the stubbornness of my heart.’ This will lead to the sweeping away of moist and dry alike. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 29:1 in Hebrew
  - type: text
    content: 'And Moses summoned all Israel and said to them: '
  - type: note
    content: Ex. 19:4; [Josh. 23:3]
  - type: text
    content: '“You have seen all that the '
  - type: text
    content: Lord
  - type: text
    content: ' did before your eyes in the land of Egypt, to Pharaoh and to all his servants and to all his land, '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will not be willing to forgive him, but rather '
  - type: note
    content: Ps. 74:1
  - type: text
    content: 'the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: Ps. 79:5
  - type: text
    content: 'his jealousy will smoke against that man, and the curses written in this book will settle upon him, and the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 9:14
  - type: text
    content: 'will blot out his name from under heaven. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will single him out from all the tribes of Israel for calamity, in accordance with all the curses of the covenant written in this Book of the Law. '
  '22':
  - type: text
    content: 'And the next generation, your children who rise up after you, and the foreigner who comes from a far land, '
  - type: note
    content: ver. 24
  - type: text
    content: 'will say, when they see the afflictions of that land and the sicknesses with which the '
  - type: text
    content: Lord
  - type: text
    content: ' has made it sick— '
  '23':
  - type: text
    content: 'the whole land burned out with brimstone and '
  - type: note
    content: Judg. 9:45; Jer. 17:6; Ezek. 47:11; Zeph. 2:9
  - type: text
    content: 'salt, nothing sown and nothing growing, where no plant can sprout, '
  - type: note
    content: Gen. 19:24, 25; Jer. 20:16; 49:18; 50:40; 2 Pet. 2:6
  - type: text
    content: 'an overthrow like that of Sodom and Gomorrah, '
  - type: note
    content: Gen. 14:2; Hos. 11:8
  - type: text
    content: 'Admah, and Zeboiim, which the '
  - type: text
    content: Lord
  - type: text
    content: ' overthrew in his anger and wrath— '
  '24':
  - type: text
    content: 'all the nations '
  - type: note
    content: ver. 22
  - type: text
    content: 'will say, '
  - type: note
    content: 1 Kgs. 9:8, 9; Jer. 22:8, 9
  - type: text
    content: '‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done thus to this land? What caused the heat of this great anger?’ '
  '25':
  - type: text
    content: 'Then people will say, ‘It is because they abandoned the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers, which he made with them when he brought them out of the land of Egypt, '
  '26':
  - type: text
    content: 'and went and served other gods and worshiped them, gods whom they had not known and whom he had not allotted to them. '
  '27':
  - type: text
    content: 'Therefore the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against this land, '
  - type: note
    content: See ch. 28:15-68; Lev. 26:14-39; Dan. 9:11-14
  - type: text
    content: 'bringing upon it all the curses written in this book, '
  '28':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 14:15; 2 Chr. 7:20; Jer. 12:14
  - type: text
    content: 'uprooted them from their land in anger and fury and great wrath, and '
  - type: note
    content: Jer. 22:26
  - type: text
    content: cast them into another land, as they are this day.’
  '29':
  - type: text
    content: '“The secret things belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, but the things that are revealed belong to us and to our children forever, that we may do all the words of this law.'
  '3':
  - type: text
    content: 'the great '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'trials that your eyes saw, the signs, and those great wonders. '
  '4':
  - type: text
    content: 'But to this day '
  - type: note
    content: '[Isa. 6:9, 10; 63:17; John 8:43; Acts 28:26, 27; Rom. 11:8, 10]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has not given you a heart to understand or eyes to see or ears to hear. '
  '5':
  - type: note
    content: ch. 1:3; 8:2, 4; Amos 2:10; Acts 13:18
  - type: text
    content: 'I have led you forty years in the wilderness. Your clothes have not worn out on you, and your sandals have not worn off your feet. '
  '6':
  - type: note
    content: ch. 8:3; See Ex. 16:4
  - type: text
    content: 'You have not eaten bread, and you have not drunk wine or strong drink, that you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'And when you came to this place, '
  - type: note
    content: ch. 2:24, 26, 32; 3:1; See Num. 21:21-24, 33-35
  - type: text
    content: 'Sihon the king of Heshbon and Og the king of Bashan came out against us to battle, but we defeated them. '
  '8':
  - type: text
    content: 'We took their land and '
  - type: note
    content: ch. 3:12, 13; Num. 32:33
  - type: text
    content: 'gave it for an inheritance to the Reubenites, the Gadites, and the half-tribe of the Manassites. '
  '9':
  - type: note
    content: ch. 4:6
  - type: text
    content: Therefore keep the words of this covenant and do them, that you may prosper
  - type: note
    content: Or deal wisely
  - type: text
    content: ' in all that you do.'
