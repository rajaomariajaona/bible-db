document_id: JHN.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Appears to Seven Disciples
  - type: text
    content: 'After this Jesus '
  - type: note
    content: ver. 14; [Mark 16:12, 14]; See ch. 7:4
  - type: text
    content: 'revealed himself '
  - type: note
    content: ch. 20:19, 26
  - type: text
    content: 'again to the disciples by '
  - type: note
    content: ch. 6:1
  - type: text
    content: 'the Sea of Tiberias, and he revealed himself in this way. '
  '10':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Bring some of the fish that you have just caught.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'So Simon Peter went aboard and hauled the net ashore, full of large fish, 153 of them. And although there were so many, the net was not torn. '
  '12':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: Acts 10:41
  - type: text
    content: '“Come and '
  - type: note
    content: ver. 15
  - type: text
    content: have breakfast.”
  - type: text
    content: ' Now '
  - type: note
    content: '[ch. 4:27]'
  - type: text
    content: 'none of the disciples dared ask him, “Who are you?” They knew it was the Lord. '
  '13':
  - type: text
    content: 'Jesus came and '
  - type: note
    content: ver. 9
  - type: text
    content: 'took the bread and gave it to them, and so with the fish. '
  '14':
  - type: note
    content: ver. 1; ch. 20:19, 26
  - type: text
    content: This was now the third time that Jesus was revealed to the disciples after he was raised from the dead.
  - type: heading
    content: Jesus and Peter
  '15':
  - type: text
    content: 'When they had '
  - type: note
    content: ver. 12
  - type: text
    content: 'finished breakfast, Jesus said to Simon Peter, '
  - type: note
    content: '[Matt. 16:17; Luke 22:31]'
  - type: text
    content: '“Simon, '
  - type: note
    content: ch. 1:42
  - type: text
    content: 'son of John, '
  - type: note
    content: '[Matt. 26:33; Mark 14:29]'
  - type: text
    content: do you love me more than these?”
  - type: text
    content: ' He said to him, “Yes, Lord; you know that I love you.” He said to him, '
  - type: text
    content: '“Feed '
  - type: note
    content: ch. 10:11-16; [Isa. 40:11]
  - type: text
    content: my lambs.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'He said to him a second time, '
  - type: text
    content: “Simon, son of John, do you love me?”
  - type: text
    content: ' He said to him, “Yes, Lord; you know that I love you.” He said to him, '
  - type: note
    content: Acts 20:28; 1 Pet. 5:2; Rev. 7:17 (Gk.)
  - type: text
    content: '“Tend '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: my sheep.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'He said to him the third time, '
  - type: text
    content: “Simon, son of John, do you love me?”
  - type: text
    content: ' Peter was grieved because he said to him '
  - type: note
    content: '[ch. 13:38]'
  - type: text
    content: 'the third time, '
  - type: text
    content: “Do you love me?”
  - type: text
    content: ' and he said to him, “Lord, '
  - type: note
    content: See ch. 2:25
  - type: text
    content: 'you know everything; you know that I love you.” Jesus said to him, '
  - type: text
    content: '“Feed '
  - type: note
    content: ver. 16
  - type: text
    content: my sheep.
  - type: text
    content: ' '
  '18':
  - type: note
    content: '[ch. 13:36]'
  - type: text
    content: 'Truly, truly, I say to you, when you were young, '
  - type: note
    content: ver. 7
  - type: text
    content: you used to dress yourself and walk wherever you wanted, but when you are old, you will stretch out your hands, and another will dress you and carry you where you do not want to go.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: '(This he said to show '
  - type: note
    content: 2 Pet. 1:14
  - type: text
    content: 'by what kind of death he was to glorify God.) And after saying this he said to him, '
  - type: note
    content: ver. 22; Matt. 16:24; [ch. 13:36]; See ch. 8:12
  - type: text
    content: “Follow me.”
  - type: heading
    content: Jesus and the Beloved Apostle
  '2':
  - type: text
    content: 'Simon Peter, '
  - type: note
    content: See ch. 11:16
  - type: text
    content: 'Thomas (called the Twin), Nathanael of '
  - type: note
    content: ch. 2:1; 4:46
  - type: text
    content: 'Cana in Galilee, '
  - type: note
    content: Matt. 4:21; Luke 5:10
  - type: text
    content: 'the sons of Zebedee, and two others of his disciples were together. '
  '20':
  - type: text
    content: 'Peter turned and saw '
  - type: note
    content: ver. 7
  - type: text
    content: 'the disciple whom Jesus loved following them, '
  - type: note
    content: ch. 13:25
  - type: text
    content: 'the one who also had leaned back against him during the supper and had said, “Lord, who is it that is going to betray you?” '
  '21':
  - type: text
    content: 'When Peter saw him, he said to Jesus, “Lord, what about this man?” '
  '22':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“If it is my will that he remain '
  - type: note
    content: Matt. 10:23; 16:28; 1 Cor. 4:5; 11:26; James 5:7; Rev. 2:25
  - type: text
    content: 'until '
  - type: note
    content: '[ch. 14:3, 18, 28; Heb. 10:37; Rev. 2:5, 16; 3:3, 11; 16:15; 22:7, 12, 20]; See Matt. 16:27'
  - type: text
    content: 'I come, what is that to you? '
  - type: note
    content: ver. 19
  - type: text
    content: You follow me!”
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'So the saying spread abroad among '
  - type: note
    content: Acts 1:15; 9:30; 11:1; 12:17; 15:1; 16:2, 40; 21:7, 17; 1 John 3:14, 16
  - type: text
    content: the brothers
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' that this disciple was not to die; yet Jesus did not say to him that he was not to die, but, '
  - type: text
    content: “If it is my will that he remain until I come, what is that to you?”
  '24':
  - type: text
    content: 'This is the disciple '
  - type: note
    content: See ch. 15:27
  - type: text
    content: 'who is bearing witness about these things, and who has written these things, and '
  - type: note
    content: 1 John 3:2, 14; 5:15, 18-20; [ch. 19:35]
  - type: text
    content: 'we know '
  - type: note
    content: 3 John 12
  - type: text
    content: that his testimony is true.
  '25':
  - type: text
    content: 'Now '
  - type: note
    content: ch. 20:30
  - type: text
    content: 'there are also many other things that Jesus did. Were every one of them to be written, I suppose that '
  - type: note
    content: '[Amos 7:10]'
  - type: text
    content: the world itself could not contain the books that would be written.
  '3':
  - type: text
    content: 'Simon Peter said to them, “I am going fishing.” They said to him, “We will go with you.” They went out and got into the boat, but '
  - type: note
    content: '[Luke 5:5]'
  - type: text
    content: that night they caught nothing.
  '4':
  - type: text
    content: 'Just as day was breaking, Jesus stood on the shore; yet the disciples '
  - type: note
    content: ch. 20:14
  - type: text
    content: 'did not know that it was Jesus. '
  '5':
  - type: note
    content: Luke 24:41
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Children, do you have any fish?”
  - type: text
    content: ' They answered him, “No.” '
  '6':
  - type: note
    content: '[Luke 5:4, 6, 7]'
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Cast the net on the right side of the boat, and you will find some.”
  - type: text
    content: ' So they cast it, and now they were not able to haul it in, because of the quantity of fish. '
  '7':
  - type: text
    content: 'That disciple '
  - type: note
    content: See ch. 13:23
  - type: text
    content: 'whom Jesus loved therefore said to Peter, “It is the Lord!” When Simon Peter heard that it was the Lord, '
  - type: note
    content: ver. 18; [ch. 13:4]
  - type: text
    content: 'he put on his outer garment, for he was '
  - type: note
    content: 1 Sam. 19:24; Isa. 20:2; Mic. 1:8
  - type: text
    content: 'stripped for work, and '
  - type: note
    content: '[Matt. 14:29]'
  - type: text
    content: 'threw himself into the sea. '
  '8':
  - type: text
    content: The other disciples came in the boat, dragging the net full of fish, for they were not far from the land, but about a hundred yards
  - type: note
    content: Greek two hundred cubits; a cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' off.'
  '9':
  - type: text
    content: 'When they got out on land, they saw a charcoal fire in place, with fish laid out on it, and bread. '
