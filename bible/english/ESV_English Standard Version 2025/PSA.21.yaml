document_id: PSA.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Rejoices in the Lord’s Strength
  - type: text
    content: To the choirmaster. A Psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', in your '
  - type: note
    content: Ps. 8:2; 28:7, 8
  - type: text
    content: strength the king rejoices,
  - type: text
    content: 'and in your '
  - type: note
    content: Ps. 9:14
  - type: text
    content: salvation how greatly he exults!
  '10':
  - type: text
    content: 'You '
  - type: note
    content: Ps. 34:16; 1 Kgs. 13:34
  - type: text
    content: 'will destroy their '
  - type: note
    content: Ps. 37:28; 109:13; Job 18:16, 17, 19; Isa. 14:20
  - type: text
    content: descendants from the earth,
  - type: text
    content: and their offspring from among the children of man.
  '11':
  - type: text
    content: Though they plan evil against you,
  - type: text
    content: 'though they '
  - type: note
    content: Ps. 2:1; 10:2
  - type: text
    content: devise mischief, they will not succeed.
  '12':
  - type: text
    content: 'For you will put them '
  - type: note
    content: Ps. 18:40
  - type: text
    content: to flight;
  - type: text
    content: 'you will '
  - type: note
    content: Ps. 7:12; 11:2
  - type: text
    content: aim at their faces with your bows.
  '13':
  - type: text
    content: 'Be exalted, O '
  - type: text
    content: Lord
  - type: text
    content: ', in your strength!'
  - type: text
    content: We will sing and praise your power.
  '2':
  - type: text
    content: 'You have '
  - type: note
    content: Ps. 20:4, 5
  - type: text
    content: given him his heart’s desire
  - type: text
    content: 'and have not withheld the request of his lips. '
  - type: text
    content: Selah
  '3':
  - type: text
    content: 'For you '
  - type: note
    content: Ps. 59:10
  - type: text
    content: meet him with rich blessings;
  - type: text
    content: 'you set '
  - type: note
    content: '[2 Sam. 12:30; 1 Chr. 20:2]'
  - type: text
    content: 'a crown of '
  - type: note
    content: Ps. 19:10
  - type: text
    content: fine gold upon his head.
  '4':
  - type: text
    content: 'He asked life of you; you '
  - type: note
    content: Ps. 61:6; [2 Sam. 7:19]
  - type: text
    content: gave it to him,
  - type: note
    content: Ps. 91:16; [ 1 Kgs. 1:31; Neh. 2:3 ]
  - type: text
    content: length of days forever and ever.
  '5':
  - type: text
    content: 'His '
  - type: note
    content: Ps. 8:5
  - type: text
    content: glory is great through your salvation;
  - type: note
    content: Ps. 45:3; 96:6
  - type: text
    content: splendor and majesty you bestow on him.
  '6':
  - type: text
    content: For you make him most blessed forever;
  - type: note
    content: Or make him a source of blessing forever
  - type: text
    content: 'you make him glad with the '
  - type: note
    content: Ps. 45:7; See Ps. 16:11
  - type: text
    content: joy of your presence.
  '7':
  - type: text
    content: 'For the king trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and through the steadfast love of the Most High he shall not be '
  - type: note
    content: Ps. 10:6; 16:8
  - type: text
    content: moved.
  '8':
  - type: text
    content: 'Your hand will '
  - type: note
    content: '[Isa. 10:10]'
  - type: text
    content: find out all your enemies;
  - type: text
    content: your right hand will find out those who hate you.
  '9':
  - type: text
    content: 'You will make them as '
  - type: note
    content: Mal. 4:1; [Ps. 83:14]
  - type: text
    content: a blazing oven
  - type: text
    content: when you appear.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will swallow them up in his '
  - type: note
    content: Ps. 2:5
  - type: text
    content: wrath,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 18:8; 50:3; 97:3; Isa. 26:11; [Job 20:26; Dan. 7:10; Hab. 3:5]
  - type: text
    content: fire will consume them.
