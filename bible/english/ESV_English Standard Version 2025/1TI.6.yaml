document_id: 1TI.6,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See 1 Pet. 2:18
  - type: text
    content: Let all who are under a yoke as bondservants
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' regard their own masters as worthy of all honor, '
  - type: note
    content: Isa. 52:5; Rom. 2:24; Titus 2:5
  - type: text
    content: 'so that the name of God and the teaching may not be reviled. '
  '10':
  - type: text
    content: 'For the love of money is a root of '
  - type: note
    content: '[Ex. 23:8; Deut. 16:19]'
  - type: text
    content: all kinds of evils. It is through this craving that some have wandered away from the faith and pierced themselves with many pangs.
  - type: heading
    content: Fight the Good Fight of Faith
  '11':
  - type: text
    content: 'But as for you, '
  - type: note
    content: 2 Tim. 3:17
  - type: text
    content: 'O man of God, '
  - type: note
    content: 2 Tim. 2:22
  - type: text
    content: 'flee these things. '
  - type: note
    content: See Prov. 15:9
  - type: text
    content: 'Pursue righteousness, godliness, faith, love, steadfastness, gentleness. '
  '12':
  - type: note
    content: '[ch. 1:18]; See 1 Cor. 9:25'
  - type: text
    content: 'Fight the good fight of the faith. '
  - type: note
    content: '[Phil. 3:12]'
  - type: text
    content: 'Take hold of the eternal life '
  - type: note
    content: 1 Pet. 5:10
  - type: text
    content: 'to which you were called and about which you made '
  - type: note
    content: See 2 Cor. 9:13
  - type: text
    content: 'the good confession in the presence of many witnesses. '
  '13':
  - type: note
    content: See ch. 5:21
  - type: text
    content: 'I charge you in the presence of God, who gives life to all things, and of Christ Jesus, '
  - type: note
    content: '[Matt. 27:11; John 18:37; Rev. 1:5; 3:14]'
  - type: text
    content: who in his testimony before
  - type: note
    content: Or in the time of
  - type: text
    content: ' Pontius Pilate made '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'the good confession, '
  '14':
  - type: text
    content: 'to keep the commandment unstained and free from reproach until '
  - type: note
    content: See 2 Thess. 2:8
  - type: text
    content: 'the appearing of our Lord Jesus Christ, '
  '15':
  - type: text
    content: 'which he will display '
  - type: note
    content: See ch. 2:6
  - type: text
    content: 'at the proper time—he who is '
  - type: note
    content: ch. 1:11
  - type: text
    content: 'the blessed and only Sovereign, '
  - type: note
    content: See Rev. 17:14
  - type: text
    content: 'the King of kings and Lord of lords, '
  '16':
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'who alone has immortality, '
  - type: note
    content: '[Ps. 104:2]'
  - type: text
    content: 'who dwells in '
  - type: note
    content: Job 37:23
  - type: text
    content: 'unapproachable light, '
  - type: note
    content: See John 1:18
  - type: text
    content: whom no one has ever seen or can see. To him be honor and eternal dominion. Amen.
  '17':
  - type: text
    content: 'As for the rich in '
  - type: note
    content: 2 Tim. 4:10; Titus 2:12
  - type: text
    content: 'this present age, charge them '
  - type: note
    content: Rom. 11:20; 12:3, 16
  - type: text
    content: 'not to be haughty, nor '
  - type: note
    content: See Mark 10:24
  - type: text
    content: 'to set their hopes on '
  - type: note
    content: Prov. 23:5; [Matt. 13:22]
  - type: text
    content: 'the uncertainty of riches, but on God, '
  - type: note
    content: See Acts 14:17
  - type: text
    content: 'who richly provides us with everything to enjoy. '
  '18':
  - type: text
    content: 'They are to do good, '
  - type: note
    content: Luke 12:21; Titus 3:8, 14
  - type: text
    content: 'to be rich in good works, to be generous and '
  - type: note
    content: See Rom. 12:13
  - type: text
    content: 'ready to share, '
  '19':
  - type: text
    content: 'thus '
  - type: note
    content: See Matt. 6:19, 20
  - type: text
    content: 'storing up treasure for themselves as a good foundation for the future, so that they may '
  - type: note
    content: ver. 12
  - type: text
    content: 'take hold of '
  - type: note
    content: '[2 Tim. 1:1]'
  - type: text
    content: that which is truly life.
  '2':
  - type: text
    content: 'Those who have believing masters must not be disrespectful on the ground that they are '
  - type: note
    content: See Philem. 16
  - type: text
    content: brothers; rather they must serve all the better since those who benefit by their good service are believers and beloved.
  - type: heading
    content: False Teachers and True Contentment
  - type: note
    content: ch. 4:11, 13; 5:7
  - type: text
    content: 'Teach and urge these things. '
  '20':
  - type: text
    content: 'O Timothy, guard the deposit entrusted to you. '
  - type: note
    content: 2 Tim. 3:5; [Col. 2:8; 2 Tim. 4:4; Titus 1:14]
  - type: text
    content: 'Avoid the '
  - type: note
    content: 2 Tim. 2:16
  - type: text
    content: 'irreverent babble and contradictions of what is falsely called “knowledge,” '
  '21':
  - type: text
    content: for by professing it some have swerved from the faith.
  - type: note
    content: See Col. 4:18
  - type: text
    content: Grace be with you.
  - type: note
    content: The Greek for you is plural
  '3':
  - type: text
    content: 'If anyone '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'teaches a different doctrine and does not agree with '
  - type: note
    content: See ch. 1:10
  - type: text
    content: the sound
  - type: note
    content: Or healthy
  - type: text
    content: ' words of our Lord Jesus Christ and the teaching '
  - type: note
    content: Titus 1:1
  - type: text
    content: 'that accords with godliness, '
  '4':
  - type: note
    content: ch. 3:6; 2 Tim. 3:4
  - type: text
    content: 'he is puffed up with conceit and '
  - type: note
    content: 1 Cor. 8:2; [ch. 1:7]
  - type: text
    content: 'understands nothing. He has an unhealthy craving for '
  - type: note
    content: ch. 1:4; 2 Tim. 2:23; Titus 3:9
  - type: text
    content: 'controversy and for '
  - type: note
    content: 2 Tim. 2:14; [Acts 18:15]
  - type: text
    content: 'quarrels about words, which produce envy, dissension, slander, evil suspicions, '
  '5':
  - type: text
    content: 'and constant friction among people '
  - type: note
    content: 2 Tim. 3:8; [Eph. 4:22; Titus 1:15]
  - type: text
    content: 'who are depraved in mind and deprived of the truth, '
  - type: note
    content: Titus 1:11; 2 Pet. 2:3
  - type: text
    content: 'imagining that godliness is a means of gain. '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 4:8]'
  - type: text
    content: 'godliness '
  - type: note
    content: Ps. 37:16; Prov. 15:16; 16:8; Phil. 4:11; Heb. 13:5
  - type: text
    content: 'with contentment is great gain, '
  '7':
  - type: text
    content: 'for '
  - type: note
    content: Job 1:21; Ps. 49:17; Eccles. 5:15
  - type: text
    content: we brought nothing into the world, and
  - type: note
    content: Greek for; some manuscripts insert [it is] certain [that]
  - type: text
    content: ' we cannot take anything out of the world. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Gen. 28:20; Prov. 30:8
  - type: text
    content: 'if we have food and clothing, with these we will be content. '
  '9':
  - type: text
    content: 'But '
  - type: note
    content: Prov. 15:27; 23:4; 28:20; Matt. 13:22
  - type: text
    content: 'those who desire to be rich fall into temptation, '
  - type: note
    content: '[ch. 3:7]'
  - type: text
    content: 'into a snare, into many senseless and harmful desires that '
  - type: note
    content: '[ch. 1:19]'
  - type: text
    content: 'plunge people into ruin and destruction. '
