document_id: 2CH.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Queen of Sheba
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see 1 Kgs. 10:1-13
  - type: text
    content: 'Now when '
  - type: note
    content: '[Matt. 12:42; Luke 11:31]'
  - type: text
    content: 'the queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test him with hard questions, having a very great retinue and camels bearing spices and very much gold and precious stones. And when she came to Solomon, she told him all that was on her mind. '
  '10':
  - type: text
    content: 'Moreover, the servants of Hiram and the servants of Solomon, '
  - type: note
    content: ch. 8:18
  - type: text
    content: 'who brought gold from Ophir, brought algum wood and precious stones. '
  '11':
  - type: text
    content: 'And the king made from the algum wood '
  - type: note
    content: '[1 Kgs. 10:12]'
  - type: text
    content: 'supports for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the king’s house, lyres also and harps for the singers. There never was seen the like of them before in the land of Judah.'
  '12':
  - type: text
    content: 'And King Solomon gave to the queen of Sheba all that she desired, whatever she asked '
  - type: note
    content: '[1 Kgs. 10:13]'
  - type: text
    content: besides what she had brought to the king. So she turned and went back to her own land with her servants.
  - type: heading
    content: Solomon’s Wealth
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-28, see 1 Kgs. 10:14-28
  - type: text
    content: 'Now the weight of gold that came to Solomon in one year was 666 talents of gold, '
  '14':
  - type: text
    content: 'besides that which the explorers and merchants brought. '
  - type: note
    content: Ps. 68:29; 72:10
  - type: text
    content: 'And all the kings of Arabia and the governors of the land brought gold and silver to Solomon. '
  '15':
  - type: text
    content: King Solomon made 200 large shields of beaten gold; 600 shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of beaten gold went into each shield. '
  '16':
  - type: text
    content: 'And he made 300 shields of beaten gold; '
  - type: note
    content: '[1 Kgs. 10:17]'
  - type: text
    content: '300 shekels of gold went into each shield; and the king put them in the House of the Forest of Lebanon. '
  '17':
  - type: text
    content: 'The king also made a great ivory throne and overlaid it with pure gold. '
  '18':
  - type: text
    content: 'The throne had six steps and a footstool of gold, which were attached to the throne, and on each side of the seat were armrests and two lions standing beside the armrests, '
  '19':
  - type: text
    content: 'while twelve lions stood there, one on each end of a step on the six steps. Nothing like it was ever made for any kingdom. '
  '2':
  - type: text
    content: 'And Solomon answered all her questions. There was nothing hidden from Solomon that he could not explain to her. '
  '20':
  - type: text
    content: 'All King Solomon’s drinking vessels were of gold, and all the vessels of the House of the Forest of Lebanon were of pure gold. Silver was not considered as anything in the days of Solomon. '
  '21':
  - type: text
    content: 'For the king’s ships went to '
  - type: note
    content: ch. 20:36, 37
  - type: text
    content: Tarshish with the servants of Hiram. Once every three years the ships of Tarshish used to come bringing gold, silver, ivory, apes, and peacocks.
  - type: note
    content: Or baboons
  '22':
  - type: text
    content: 'Thus King Solomon '
  - type: note
    content: 1 Kgs. 3:13
  - type: text
    content: 'excelled all the kings of the earth in riches and in wisdom. '
  '23':
  - type: text
    content: 'And all the kings of the earth sought the presence of Solomon to hear his wisdom, which God had put into his mind. '
  '24':
  - type: text
    content: Every one of them brought his present, articles of silver and of gold, garments, myrrh,
  - type: note
    content: Or armor
  - type: text
    content: ' spices, horses, and mules, so much year by year. '
  '25':
  - type: text
    content: 'And Solomon had '
  - type: note
    content: '[ch. 1:14; 1 Kgs. 4:26; 10:26]'
  - type: text
    content: '4,000 stalls for horses and chariots, and 12,000 horsemen, whom he stationed in the chariot cities and with the king in Jerusalem. '
  '26':
  - type: note
    content: 1 Kgs. 4:21
  - type: text
    content: 'And he ruled over all the kings '
  - type: note
    content: Gen. 15:18; Ex. 23:31; Ps. 72:8
  - type: text
    content: from the Euphrates
  - type: note
    content: Hebrew the River
  - type: text
    content: ' to the land of the Philistines and to the border of Egypt. '
  '27':
  - type: note
    content: ch. 1:15
  - type: text
    content: 'And the king made silver as common in Jerusalem as stone, and he made cedar as plentiful as the sycamore of the Shephelah. '
  '28':
  - type: note
    content: ch. 1:16
  - type: text
    content: And horses were imported for Solomon from Egypt and from all lands.
  - type: heading
    content: Solomon’s Death
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-31, see 1 Kgs. 11:41-43
  - type: text
    content: 'Now the rest of the acts of Solomon, from '
  - type: note
    content: 1 Chr. 29:29
  - type: text
    content: 'first to last, are they not written in the history of '
  - type: note
    content: 2 Sam. 12:1
  - type: text
    content: 'Nathan the prophet, and in the prophecy of '
  - type: note
    content: 1 Kgs. 11:29
  - type: text
    content: 'Ahijah the Shilonite, and in the visions of '
  - type: note
    content: ch. 12:15; 13:22
  - type: text
    content: 'Iddo '
  - type: note
    content: 2 Sam. 24:11; See 1 Sam. 9:9
  - type: text
    content: 'the seer concerning Jeroboam the son of Nebat? '
  '3':
  - type: text
    content: 'And when '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the queen of Sheba had seen the wisdom of Solomon, the house that he had built, '
  '30':
  - type: text
    content: 'Solomon reigned in Jerusalem over all Israel forty years. '
  '31':
  - type: text
    content: 'And Solomon slept with his fathers and was buried in '
  - type: note
    content: '[1 Kgs. 2:10]'
  - type: text
    content: the city of David his father, and Rehoboam his son reigned in his place.
  '4':
  - type: text
    content: 'the food of his table, the seating of his officials, and the attendance of his servants, and their clothing, his cupbearers, and their clothing, and his burnt offerings that he offered at the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', there was no more breath in her.'
  '5':
  - type: text
    content: 'And she said to the king, “The report was true that I heard in my own land of your words and of your wisdom, '
  '6':
  - type: text
    content: but I did not believe the
  - type: note
    content: Hebrew their
  - type: text
    content: ' reports until I came and my own eyes had seen it. And behold, half the greatness of your wisdom was not told me; you surpass the report that I heard. '
  '7':
  - type: text
    content: 'Happy are your men! Happy are these your servants, who continually stand before you and hear your wisdom! '
  '8':
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has delighted in you '
  - type: note
    content: 1 Chr. 29:23
  - type: text
    content: 'and set you on his throne as king for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God! '
  - type: note
    content: ch. 2:11
  - type: text
    content: 'Because your God loved Israel and would establish them forever, he has made you king over them, that you may execute justice and righteousness.” '
  '9':
  - type: text
    content: Then she gave the king 120 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold, and a very great quantity of spices, and precious stones. There were no spices such as those that the queen of Sheba gave to King Solomon.'
