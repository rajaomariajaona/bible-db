document_id: LEV.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Place of Sacrifice
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“If any one of the house of Israel or of the strangers who sojourn among them '
  - type: note
    content: See ch. 3:17
  - type: text
    content: 'eats any blood, I will '
  - type: note
    content: ch. 20:3, 6; 26:17; Jer. 44:11; Ezek. 14:8; 15:7; [Ps. 34:16]
  - type: text
    content: 'set my face against that person who eats blood and will cut him off from among his people. '
  '11':
  - type: note
    content: ver. 14
  - type: text
    content: 'For the life of the flesh is in the blood, and I have given it for you on the altar '
  - type: note
    content: '[Matt. 26:28; Mark 14:24; Rom. 3:25; 5:9; Eph. 1:7; Col. 1:14, 20; Heb. 13:12; 1 John 1:7; Rev. 1:5]'
  - type: text
    content: 'to make atonement for your souls, '
  - type: note
    content: Heb. 9:22
  - type: text
    content: 'for it is the blood that makes atonement by the life. '
  '12':
  - type: text
    content: Therefore I have said to the people of Israel, No person among you shall eat blood, neither shall any stranger who sojourns among you eat blood.
  '13':
  - type: text
    content: '“Any one also of the people of Israel, or of the strangers who sojourn among them, who takes in hunting any beast or bird that may be eaten shall '
  - type: note
    content: Deut. 12:16, 24; 15:23
  - type: text
    content: 'pour out its blood and '
  - type: note
    content: Ezek. 24:7
  - type: text
    content: 'cover it with earth. '
  '14':
  - type: text
    content: For the life of every creature
  - type: note
    content: Hebrew all flesh
  - type: text
    content: ' is its '
  - type: note
    content: ver. 11; See Gen. 9:4
  - type: text
    content: 'blood: its blood is its life.'
  - type: note
    content: Hebrew it is in its life
  - type: text
    content: ' Therefore I have said to the people of Israel, You shall not eat the blood of any creature, for the life of every creature is its blood. Whoever eats it shall be cut off. '
  '15':
  - type: note
    content: See ch. 22:8
  - type: text
    content: 'And every person who eats what dies of itself or what is torn by beasts, '
  - type: note
    content: See ch. 16:29
  - type: text
    content: 'whether he is a native or a sojourner, '
  - type: note
    content: See ch. 11:25
  - type: text
    content: 'shall wash his clothes and '
  - type: note
    content: ch. 15:5
  - type: text
    content: 'bathe himself in water and be unclean until the evening; then he shall be clean. '
  '16':
  - type: text
    content: 'But if he does not wash them or bathe his flesh, '
  - type: note
    content: '[Num. 19:20]; See ch. 5:1'
  - type: text
    content: he shall bear his iniquity.”
  '2':
  - type: text
    content: '“Speak to Aaron and his sons and to all the people of Israel and say to them, This is the thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded. '
  '3':
  - type: text
    content: 'If any one of the house of Israel '
  - type: note
    content: '[Deut. 12:5, 6, 13-15, 21]'
  - type: text
    content: 'kills an ox or a lamb or a goat in the camp, or kills it outside the camp, '
  '4':
  - type: text
    content: 'and '
  - type: note
    content: ver. 9
  - type: text
    content: 'does not bring it to the entrance of the tent of meeting to offer it as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', bloodguilt shall be imputed to that man. He has shed blood, and that man '
  - type: note
    content: '[Ex. 30:33]'
  - type: text
    content: 'shall be cut off from among his people. '
  '5':
  - type: text
    content: 'This is to the end that the people of Israel may bring their sacrifices that they sacrifice '
  - type: note
    content: ch. 14:7, 53
  - type: text
    content: 'in the open field, that they may bring them to the '
  - type: text
    content: Lord
  - type: text
    content: ', to the priest at the entrance of the tent of meeting, and sacrifice them '
  - type: note
    content: ch. 1:5
  - type: text
    content: 'as sacrifices of peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And the priest shall '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'throw the blood on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the tent of meeting and burn the fat '
  - type: note
    content: See Gen. 8:21
  - type: text
    content: 'for a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'So they shall no more sacrifice their sacrifices to goat demons, after whom they '
  - type: note
    content: See Ex. 34:15
  - type: text
    content: whore. This shall be a statute forever for them throughout their generations.
  '8':
  - type: text
    content: '“And you shall say to them, Any one of the house of Israel, or of the strangers who sojourn among them, who '
  - type: note
    content: ch. 1:2, 3
  - type: text
    content: 'offers a burnt offering or sacrifice '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: ver. 4
  - type: text
    content: 'does not bring it to the entrance of the tent of meeting to offer it to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: that man shall be cut off from his people.
  - type: heading
    content: Laws Against Eating Blood
