document_id: MAL.3,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 11:10; Mark 1:2; Luke 7:27; [ch. 4:5; Luke 1:76 ]
  - type: text
    content: '“Behold, I send '
  - type: note
    content: See ch. 2:7
  - type: text
    content: 'my messenger, and '
  - type: note
    content: See Isa. 40:3
  - type: text
    content: 'he will prepare the way before me. And the Lord '
  - type: note
    content: '[ch. 2:17]'
  - type: text
    content: 'whom you seek will suddenly come to his temple; and '
  - type: note
    content: '[ch. 4:5]'
  - type: text
    content: 'the messenger of the covenant in whom you delight, behold, he is coming, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '10':
  - type: note
    content: '[Prov. 3:9, 10]'
  - type: text
    content: 'Bring the full tithe into the storehouse, that there may be food in my house. And thereby '
  - type: note
    content: See 2 Cor. 9:6-8
  - type: text
    content: 'put me to the test, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, if I will not open '
  - type: note
    content: See Gen. 7:11
  - type: text
    content: 'the windows of heaven for you and pour down for you a blessing until there is no more need. '
  '11':
  - type: text
    content: 'I will rebuke '
  - type: note
    content: '[Joel 1:4]'
  - type: text
    content: the devourer
  - type: note
    content: Probably a name for some crop-destroying pest or pests
  - type: text
    content: ' for you, so that it will not destroy the fruits of your soil, and your vine in the field shall not fail to bear, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: Zeph. 3:19
  - type: text
    content: 'all nations will call you blessed, for you will be '
  - type: note
    content: '[Isa. 62:4]'
  - type: text
    content: 'a land of delight, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:17 ]'
  - type: text
    content: '“Your words have been hard against me, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[ch. 1:2]'
  - type: text
    content: 'But you say, ‘How have we spoken against you?’ '
  '14':
  - type: text
    content: 'You have said, '
  - type: note
    content: '[Zeph. 1:12]'
  - type: text
    content: '‘It is vain to serve God. '
  - type: note
    content: '[Job 21:15]'
  - type: text
    content: 'What is the profit of our keeping his charge or of walking as in mourning before the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts? '
  '15':
  - type: text
    content: 'And now we call '
  - type: note
    content: '[ch. 4:1]'
  - type: text
    content: 'the arrogant blessed. '
  - type: note
    content: '[ch. 4:1]'
  - type: text
    content: 'Evildoers not only prosper but '
  - type: note
    content: '[Ps. 95:9]'
  - type: text
    content: they put God to the test and they escape.’”
  - type: heading
    content: The Book of Remembrance
  '16':
  - type: text
    content: 'Then those who feared the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Deut. 6:6, 7]'
  - type: text
    content: 'spoke with one another. The '
  - type: text
    content: Lord
  - type: text
    content: ' paid attention and heard them, and '
  - type: note
    content: See Ex. 32:32
  - type: text
    content: 'a book of remembrance was written before him of those who feared the '
  - type: text
    content: Lord
  - type: text
    content: ' and esteemed his name. '
  '17':
  - type: text
    content: '“They shall be mine, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, '
  - type: note
    content: '[ch. 4:3; Acts 17:31]'
  - type: text
    content: 'in the day when I make up '
  - type: note
    content: Ex. 19:5; 1 Pet. 2:9
  - type: text
    content: 'my treasured possession, and I will spare them as a man spares his son who serves him. '
  '18':
  - type: text
    content: 'Then once more you shall '
  - type: note
    content: '[ch. 4:1]'
  - type: text
    content: see the distinction between the righteous and the wicked, between one who serves God and one who does not serve him.
  '2':
  - type: text
    content: 'But '
  - type: note
    content: Joel 2:11
  - type: text
    content: 'who can endure the day of his coming, and who can stand when he appears? For '
  - type: note
    content: Isa. 4:4
  - type: text
    content: 'he is like a refiner’s fire and like fullers’ soap. '
  '3':
  - type: text
    content: 'He will sit '
  - type: note
    content: Isa. 1:25; Zech. 13:9
  - type: text
    content: 'as a refiner and purifier of silver, and he will purify the sons of Levi and refine them like gold and silver, and they will bring '
  - type: note
    content: '[ch. 1:7]'
  - type: text
    content: 'offerings in righteousness to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or and they will belong to the Lord, bringers of an offering in righteousness
  - type: text
    content: ' '
  '4':
  - type: note
    content: Ezek. 20:40
  - type: text
    content: 'Then the offering of Judah and Jerusalem will be pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' as in the days of old and as in former years.'
  '5':
  - type: text
    content: '“Then I will draw near to you for judgment. I will be '
  - type: note
    content: ch. 2:14; Jer. 29:23
  - type: text
    content: 'a swift witness against the sorcerers, against the adulterers, against those who swear falsely, against those '
  - type: note
    content: See Lev. 19:13
  - type: text
    content: 'who oppress the hired worker in his wages, '
  - type: note
    content: See Deut. 24:17
  - type: text
    content: 'the widow and the fatherless, against those who thrust aside the sojourner, and do not fear me, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  - type: heading
    content: Robbing God
  '6':
  - type: text
    content: '“For '
  - type: note
    content: Ps. 102:27; See Num. 23:19
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' do not change; '
  - type: note
    content: Lam. 3:22
  - type: text
    content: 'therefore you, O children of Jacob, are not consumed. '
  '7':
  - type: note
    content: Acts 7:51
  - type: text
    content: 'From the days of your fathers you have turned aside from my statutes and have not kept them. '
  - type: note
    content: See Zech. 1:3
  - type: text
    content: 'Return to me, and I will return to you, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts. '
  - type: note
    content: '[ch. 1:2]'
  - type: text
    content: 'But you say, ‘How shall we return?’ '
  '8':
  - type: text
    content: 'Will man rob God? Yet you are robbing me. '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'But you say, ‘How have we robbed you?’ '
  - type: note
    content: '[Neh. 13:10]'
  - type: text
    content: 'In your tithes and contributions. '
  '9':
  - type: note
    content: '[ch. 2:2]'
  - type: text
    content: 'You are cursed with a curse, for you are robbing me, the whole nation of you. '
