document_id: GEN.50,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Joseph '
  - type: note
    content: ch. 46:4
  - type: text
    content: 'fell on his father’s face and wept over him and kissed him. '
  '10':
  - type: text
    content: 'When they came to the threshing floor of Atad, which is beyond the Jordan, '
  - type: note
    content: '[2 Sam. 1:17; Acts 8:2]'
  - type: text
    content: 'they lamented there with a very great and grievous lamentation, and he '
  - type: note
    content: '[ver. 3]'
  - type: text
    content: 'made a mourning for his father seven days. '
  '11':
  - type: text
    content: When the inhabitants of the land, the Canaanites, saw the mourning on the threshing floor of Atad, they said, “This is a grievous mourning by the Egyptians.” Therefore the place was named Abel-mizraim;
  - type: note
    content: Abel-mizraim means mourning (or meadow) of Egypt
  - type: text
    content: ' it is beyond the Jordan. '
  '12':
  - type: text
    content: 'Thus his sons did for him as he had commanded them, '
  '13':
  - type: text
    content: 'for '
  - type: note
    content: ch. 49:29, 30; [Acts 7:16]
  - type: text
    content: 'his sons carried him to the land of Canaan and buried him in the cave of the field at Machpelah, to the east of Mamre, which Abraham '
  - type: note
    content: ch. 23:16
  - type: text
    content: 'bought with the field from Ephron the Hittite to possess as a burying place. '
  '14':
  - type: text
    content: After he had buried his father, Joseph returned to Egypt with his brothers and all who had gone up with him to bury his father.
  - type: heading
    content: God’s Good Purposes
  '15':
  - type: text
    content: 'When Joseph’s brothers saw that their father was dead, they said, “It may be that Joseph will hate us and pay us back for all the evil that we did to him.” '
  '16':
  - type: text
    content: 'So they sent a message to Joseph, saying, “Your father gave this command before he died: '
  '17':
  - type: text
    content: '‘Say to Joseph, “Please forgive the transgression of your brothers and their sin, because they did evil to you.”’ And now, please forgive the transgression of the servants of '
  - type: note
    content: ch. 49:25
  - type: text
    content: 'the God of your father.” Joseph wept when they spoke to him. '
  '18':
  - type: text
    content: 'His brothers also came and '
  - type: note
    content: '[ch. 37:7, 10]'
  - type: text
    content: 'fell down before him and said, “Behold, we are your servants.” '
  '19':
  - type: text
    content: 'But Joseph said to them, “Do not fear, for '
  - type: note
    content: ch. 30:2; [2 Kgs. 5:7]
  - type: text
    content: 'am I in the place of God? '
  '2':
  - type: text
    content: 'And Joseph commanded his servants the physicians to '
  - type: note
    content: ver. 26; [2 Chr. 16:14; Mark 16:1; Luke 23:56; John 19:39, 40]
  - type: text
    content: 'embalm his father. So the physicians embalmed Israel. '
  '20':
  - type: text
    content: 'As for you, you meant evil against me, but '
  - type: note
    content: ch. 45:5, 7
  - type: text
    content: God meant it for good, to bring it about that many people
  - type: note
    content: Or a numerous people
  - type: text
    content: ' should be kept alive, as they are today. '
  '21':
  - type: text
    content: 'So do not fear; '
  - type: note
    content: ch. 45:11; 47:12
  - type: text
    content: I will provide for you and your little ones.” Thus he comforted them and spoke kindly to them.
  - type: heading
    content: The Death of Joseph
  '22':
  - type: text
    content: 'So Joseph remained in Egypt, he and his father’s house. Joseph lived 110 years. '
  '23':
  - type: text
    content: 'And Joseph saw Ephraim’s children '
  - type: note
    content: '[Job 42:16; Ps. 128:6]'
  - type: text
    content: 'of the third generation. The '
  - type: note
    content: Num. 32:39; 1 Chr. 7:14, 15
  - type: text
    content: 'children also of Machir the son of Manasseh were '
  - type: note
    content: '[ch. 30:3]'
  - type: text
    content: counted as Joseph’s own.
  - type: note
    content: Hebrew were born on Joseph’s knees
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And Joseph said to his brothers, “I am about to die, but '
  - type: note
    content: ch. 15:14; 46:4; 48:21; Ex. 3:16, 17; [Heb. 11:22]
  - type: text
    content: 'God will visit you and bring you up out of this land to the land '
  - type: note
    content: ch. 15:18; 26:3; 28:13; 35:12; 46:4
  - type: text
    content: 'that he swore to Abraham, to Isaac, and to Jacob.” '
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 13:19; Josh. 24:32
  - type: text
    content: 'Joseph made the sons of Israel swear, saying, “God will surely visit you, and you shall carry up my bones from here.” '
  '26':
  - type: text
    content: 'So Joseph died, being 110 years old. They '
  - type: note
    content: See ver. 2
  - type: text
    content: embalmed him, and he was put in a coffin in Egypt.
  '3':
  - type: text
    content: 'Forty days were required for it, for that is how many are required for embalming. And the Egyptians '
  - type: note
    content: '[ver. 10; Num. 20:29; Deut. 34:8; 1 Sam. 31:13; Job 2:13]'
  - type: text
    content: wept for him seventy days.
  '4':
  - type: text
    content: 'And when the days of weeping for him were past, Joseph spoke to the household of Pharaoh, saying, '
  - type: note
    content: ch. 47:29; See ch. 33:15
  - type: text
    content: '“If now I have found favor in your eyes, please speak in the ears of Pharaoh, saying, '
  '5':
  - type: text
    content: '‘My father made me swear, saying, “I am about to die: in my tomb '
  - type: note
    content: 2 Chr. 16:14; Isa. 22:16; Matt. 27:60
  - type: text
    content: 'that I hewed out for myself in the land of Canaan, there shall you bury me.” Now therefore, let me please go up and bury my father. Then I will return.’” '
  '6':
  - type: text
    content: 'And Pharaoh answered, “Go up, and bury your father, as he made you swear.” '
  '7':
  - type: text
    content: 'So Joseph went up to bury his father. With him went up all the servants of Pharaoh, the elders of his household, and all the elders of the land of Egypt, '
  '8':
  - type: text
    content: 'as well as all the household of Joseph, his brothers, and his father’s household. Only their children, their flocks, and their herds were left '
  - type: note
    content: See ch. 45:10
  - type: text
    content: 'in the land of Goshen. '
  '9':
  - type: text
    content: 'And there went up with him both chariots and horsemen. It was a very great company. '
