document_id: ISA.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Vineyard of the Lord Destroyed
  - type: text
    content: Let me sing for my beloved
  - type: text
    content: 'my love song concerning his vineyard:'
  - type: text
    content: 'My beloved had '
  - type: note
    content: Ps. 80:8; Matt. 21:33; Mark 12:1; Luke 20:9; [Hos. 9:10]
  - type: text
    content: a vineyard
  - type: text
    content: on a very fertile hill.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 26:26; Hag. 1:6; 2:16 ]'
  - type: text
    content: For ten acres
  - type: note
    content: Hebrew ten yoke, the area ten yoke of oxen can plow in a day
  - type: text
    content: ' of vineyard shall yield but one bath,'
  - type: text
    content: 'and a '
  - type: note
    content: Ezek. 45:11
  - type: text
    content: homer of seed shall yield but an ephah.”
  - type: note
    content: A bath was about 6 gallons or 22 liters; a homer was about 6 bushels or 220 liters; an ephah was about 3/5 bushel or 22 liters
  '11':
  - type: text
    content: 'Woe to those who '
  - type: note
    content: ver. 22; [Prov. 23:29, 30; Eccles. 10:16, 17]
  - type: text
    content: rise early in the morning,
  - type: text
    content: that they may run after strong drink,
  - type: text
    content: who tarry late into the evening
  - type: text
    content: as wine inflames them!
  '12':
  - type: text
    content: ' '
  - type: note
    content: Amos 6:5, 6
  - type: text
    content: They have lyre and harp,
  - type: text
    content: tambourine and flute and wine at their feasts,
  - type: note
    content: ch. 26:11
  - type: text
    content: 'but they do not regard the deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: or see the work of his hands.
  '13':
  - type: text
    content: Therefore my people go into exile
  - type: note
    content: ch. 1:3; Hos. 4:6
  - type: text
    content: for lack of knowledge;
  - type: note
    content: Or without their knowledge
  - type: text
    content: 'their '
  - type: note
    content: '[Lam. 4:2, 7, 8]'
  - type: text
    content: honored men go hungry,
  - type: note
    content: Or die of hunger
  - type: text
    content: and their multitude is parched with thirst.
  '14':
  - type: text
    content: 'Therefore Sheol has '
  - type: note
    content: Hab. 2:5
  - type: text
    content: enlarged its appetite
  - type: text
    content: 'and opened '
  - type: note
    content: Ps. 141:7
  - type: text
    content: its mouth beyond measure,
  - type: text
    content: and the nobility of Jerusalem
  - type: note
    content: Hebrew her nobility
  - type: text
    content: ' and her multitude will go down,'
  - type: text
    content: 'her revelers and he who '
  - type: note
    content: '[ver. 12; Job 1:18, 19]'
  - type: text
    content: exults in her.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:9
  - type: text
    content: Man is humbled, and each one is brought low,
  - type: text
    content: and the eyes of the haughty
  - type: note
    content: Hebrew high
  - type: text
    content: ' are brought low.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:11, 17
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is exalted'
  - type: note
    content: Hebrew high
  - type: text
    content: ' in justice,'
  - type: text
    content: and the Holy God shows himself holy in righteousness.
  '17':
  - type: text
    content: 'Then shall the lambs graze '
  - type: note
    content: Mic. 2:12
  - type: text
    content: as in their pasture,
  - type: text
    content: 'and '
  - type: note
    content: '[Judg. 6:3]'
  - type: text
    content: nomads shall eat among the ruins of the rich.
  '18':
  - type: text
    content: 'Woe to those who draw iniquity with '
  - type: note
    content: Prov. 5:22
  - type: text
    content: cords of falsehood,
  - type: text
    content: who draw sin as with cart ropes,
  '19':
  - type: text
    content: 'who say: '
  - type: note
    content: '[Ezek. 12:22; 2 Pet. 3:4]'
  - type: text
    content: “Let him be quick,
  - type: text
    content: let him speed his work
  - type: text
    content: that we may see it;
  - type: text
    content: let the counsel of the Holy One of Israel draw near,
  - type: text
    content: and let it come, that we may know it!”
  '2':
  - type: text
    content: He dug it and cleared it of stones,
  - type: text
    content: 'and planted it with '
  - type: note
    content: Jer. 2:21
  - type: text
    content: choice vines;
  - type: text
    content: he built a watchtower in the midst of it,
  - type: text
    content: and hewed out a wine vat in it;
  - type: text
    content: 'and '
  - type: note
    content: '[Matt. 21:19; Mark 11:13; Luke 13:6]'
  - type: text
    content: he looked for it to yield grapes,
  - type: text
    content: but it yielded wild grapes.
  '20':
  - type: text
    content: 'Woe to '
  - type: note
    content: '[Amos 5:7]'
  - type: text
    content: those who call evil good
  - type: text
    content: and good evil,
  - type: note
    content: '[ Job 17:12; Matt. 6:22, 23; Luke 11:34, 35 ]'
  - type: text
    content: who put darkness for light
  - type: text
    content: and light for darkness,
  - type: text
    content: who put bitter for sweet
  - type: text
    content: and sweet for bitter!
  '21':
  - type: text
    content: 'Woe to those who are '
  - type: note
    content: Prov. 3:7; Rom. 12:16
  - type: text
    content: wise in their own eyes,
  - type: text
    content: and shrewd in their own sight!
  '22':
  - type: text
    content: 'Woe to those who are '
  - type: note
    content: ver. 11
  - type: text
    content: heroes at drinking wine,
  - type: text
    content: and valiant men in mixing strong drink,
  '23':
  - type: text
    content: 'who '
  - type: note
    content: Ex. 23:8; Prov. 17:15
  - type: text
    content: acquit the guilty for a bribe,
  - type: text
    content: and deprive the innocent of his right!
  '24':
  - type: text
    content: 'Therefore, '
  - type: note
    content: ch. 47:14; Joel 2:5; [Ex. 15:7]
  - type: text
    content: as the tongue of fire devours the stubble,
  - type: text
    content: and as dry grass sinks down in the flame,
  - type: text
    content: 'so '
  - type: note
    content: Job 18:16
  - type: text
    content: 'their root will be '
  - type: note
    content: Hos. 5:12
  - type: text
    content: as rottenness,
  - type: text
    content: and their blossom go up like dust;
  - type: text
    content: 'for they have '
  - type: note
    content: ch. 30:9
  - type: text
    content: 'rejected the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
    content: 'and have '
  - type: note
    content: ch. 1:4
  - type: text
    content: despised the word of the Holy One of Israel.
  '25':
  - type: text
    content: 'Therefore '
  - type: note
    content: 2 Kgs. 22:13, 17
  - type: text
    content: 'the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against his people,'
  - type: text
    content: and he stretched out his hand against them and struck them,
  - type: text
    content: 'and '
  - type: note
    content: Jer. 4:24; [Ps. 97:5; Hab. 3:6]
  - type: text
    content: the mountains quaked;
  - type: text
    content: 'and their corpses were '
  - type: note
    content: '[2 Kgs. 9:37; Jer. 36:30]'
  - type: text
    content: as refuse
  - type: text
    content: in the midst of the streets.
  - type: note
    content: ch. 9:12, 17, 21; 10:4
  - type: text
    content: For all this his anger has not turned away,
  - type: text
    content: and his hand is stretched out still.
  '26':
  - type: text
    content: 'He will '
  - type: note
    content: ch. 11:12; 13:2; 18:3
  - type: text
    content: raise a signal for nations far away,
  - type: text
    content: 'and '
  - type: note
    content: ch. 7:18; Zech. 10:8
  - type: text
    content: 'whistle for them '
  - type: note
    content: ch. 10:3; Deut. 28:49
  - type: text
    content: from the ends of the earth;
  - type: text
    content: and behold, quickly, speedily they come!
  '27':
  - type: text
    content: ' '
  - type: note
    content: See ch. 10:28-31
  - type: text
    content: None is weary, none stumbles,
  - type: text
    content: none slumbers or sleeps,
  - type: text
    content: not a waistband is loose,
  - type: text
    content: not a sandal strap broken;
  '28':
  - type: text
    content: ' '
  - type: note
    content: Ps. 7:12, 13
  - type: text
    content: their arrows are sharp,
  - type: text
    content: all their bows bent,
  - type: text
    content: their horses’ hoofs seem like flint,
  - type: text
    content: 'and their wheels '
  - type: note
    content: ch. 21:1
  - type: text
    content: like the whirlwind.
  '29':
  - type: text
    content: Their roaring is like a lion,
  - type: text
    content: like young lions they roar;
  - type: text
    content: 'they growl and '
  - type: note
    content: See 2 Kgs. 18:13-16
  - type: text
    content: seize their prey;
  - type: text
    content: they carry it off, and none can rescue.
  '3':
  - type: text
    content: And now, O inhabitants of Jerusalem
  - type: text
    content: and men of Judah,
  - type: text
    content: judge between me and my vineyard.
  '30':
  - type: text
    content: They will growl over it on that day,
  - type: text
    content: like the growling of the sea.
  - type: text
    content: And if one looks to the land,
  - type: text
    content: 'behold, '
  - type: note
    content: ch. 8:22
  - type: text
    content: darkness and distress;
  - type: text
    content: and the light is darkened by its clouds.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Mic. 6:3, 4 ]'
  - type: text
    content: What more was there to do for my vineyard,
  - type: text
    content: that I have not done in it?
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: When I looked for it to yield grapes,
  - type: text
    content: why did it yield wild grapes?
  '5':
  - type: text
    content: And now I will tell you
  - type: text
    content: what I will do to my vineyard.
  - type: text
    content: 'I will remove '
  - type: note
    content: '[Jer. 5:10]'
  - type: text
    content: its hedge,
  - type: text
    content: and it shall be devoured;
  - type: note
    content: Or grazed over; compare Exodus 22:5
  - type: note
    content: Ps. 80:12; [ Prov. 24:31 ]
  - type: text
    content: I will break down its wall,
  - type: text
    content: and it shall be trampled down.
  '6':
  - type: text
    content: I will make it a waste;
  - type: text
    content: it shall not be pruned or hoed,
  - type: text
    content: 'and '
  - type: note
    content: See ch. 7:23-25
  - type: text
    content: briers and thorns shall grow up;
  - type: note
    content: '[ 1 Kgs. 17:1; Jer. 14:1, 22 ]'
  - type: text
    content: I will also command the clouds
  - type: text
    content: that they rain no rain upon it.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:14 ]; See Ps. 80:8-11'
  - type: text
    content: 'For the vineyard of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: is the house of Israel,
  - type: text
    content: and the men of Judah
  - type: text
    content: are his pleasant planting;
  - type: text
    content: and he looked for justice,
  - type: text
    content: but behold, bloodshed;
  - type: note
    content: The Hebrew words for justice and bloodshed sound alike
  - type: text
    content: for righteousness,
  - type: text
    content: but behold, an outcry!
  - type: note
    content: The Hebrew words for righteous and outcry sound alike
  - type: heading
    content: Woe to the Wicked
  '8':
  - type: text
    content: 'Woe to those who '
  - type: note
    content: Mic. 2:2
  - type: text
    content: join house to house,
  - type: text
    content: who add field to field,
  - type: text
    content: until there is no more room,
  - type: text
    content: and you are made to dwell alone
  - type: text
    content: in the midst of the land.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has sworn in my hearing:'
  - type: note
    content: ch. 6:12
  - type: text
    content: “Surely many houses shall be desolate,
  - type: text
    content: large and beautiful houses, without inhabitant.
