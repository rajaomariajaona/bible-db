document_id: GEN.36,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Esau’s Descendants
  - type: text
    content: 'These are the generations of Esau (that is, '
  - type: note
    content: ch. 25:30
  - type: text
    content: 'Edom). '
  '10':
  - type: text
    content: 'These are the names of Esau’s sons: '
  - type: note
    content: ver. 4
  - type: text
    content: 'Eliphaz the son of Adah the wife of Esau, Reuel the son of Basemath the wife of Esau. '
  '11':
  - type: text
    content: 'The sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz. '
  '12':
  - type: text
    content: '(Timna was a concubine of Eliphaz, Esau’s son; she bore '
  - type: note
    content: Num. 24:20; 1 Sam. 15:2, 3
  - type: text
    content: 'Amalek to Eliphaz.) These are the sons of Adah, Esau’s wife. '
  '13':
  - type: text
    content: 'These are the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These are the sons of Basemath, Esau’s wife. '
  '14':
  - type: text
    content: 'These are the sons of '
  - type: note
    content: ver. 2
  - type: text
    content: 'Oholibamah the daughter of Anah the daughter of Zibeon, Esau’s wife: she bore to Esau Jeush, Jalam, and Korah.'
  '15':
  - type: text
    content: 'These are '
  - type: note
    content: Ex. 15:15
  - type: text
    content: 'the chiefs of the sons of Esau. '
  - type: note
    content: ver. 11, 12
  - type: text
    content: 'The sons of Eliphaz the firstborn of Esau: the chiefs Teman, Omar, Zepho, Kenaz, '
  '16':
  - type: text
    content: 'Korah, Gatam, and Amalek; these are the chiefs of Eliphaz in the land of Edom; these are the sons of Adah. '
  '17':
  - type: text
    content: 'These are the sons of '
  - type: note
    content: ver. 13
  - type: text
    content: 'Reuel, Esau’s son: the chiefs Nahath, Zerah, Shammah, and Mizzah; these are the chiefs of Reuel in the land of Edom; these are the sons of Basemath, Esau’s wife. '
  '18':
  - type: text
    content: 'These are the sons of '
  - type: note
    content: ver. 14
  - type: text
    content: 'Oholibamah, Esau’s wife: the chiefs Jeush, Jalam, and Korah; these are the chiefs born of Oholibamah the daughter of Anah, Esau’s wife. '
  '19':
  - type: text
    content: These are the sons of Esau (
  - type: note
    content: ver. 1, 8
  - type: text
    content: that is, Edom), and these are their chiefs.
  '2':
  - type: text
    content: 'Esau '
  - type: note
    content: ch. 26:34
  - type: text
    content: 'took his wives from the Canaanites: Adah the daughter of Elon the Hittite, '
  - type: note
    content: ver. 14, 18, 25
  - type: text
    content: Oholibamah the daughter of Anah the daughter
  - type: note
    content: Hebrew; Samaritan, Septuagint, Syriac son; also verse 14
  - type: text
    content: ' of Zibeon the Hivite, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: For ver. 20-28, see 1 Chr. 1:38-42
  - type: text
    content: 'These are the sons of '
  - type: note
    content: ch. 14:6; Deut. 2:12, 22
  - type: text
    content: 'Seir the Horite, the inhabitants of the land: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: text
    content: 'Dishon, Ezer, and Dishan; these are the chiefs of the Horites, the sons of Seir in the land of Edom. '
  '22':
  - type: text
    content: 'The sons of Lotan were Hori and Hemam; and Lotan’s sister was Timna. '
  '23':
  - type: text
    content: 'These are the sons of Shobal: Alvan, Manahath, Ebal, Shepho, and Onam. '
  '24':
  - type: text
    content: 'These are the sons of Zibeon: Aiah and Anah; he is the Anah who found the hot springs in the wilderness, as he pastured the donkeys of Zibeon his father. '
  '25':
  - type: text
    content: 'These are the children of Anah: Dishon and '
  - type: note
    content: ver. 2
  - type: text
    content: 'Oholibamah the daughter of Anah. '
  '26':
  - type: text
    content: 'These are the sons of Dishon: Hemdan, Eshban, Ithran, and Cheran. '
  '27':
  - type: text
    content: 'These are the sons of Ezer: Bilhan, Zaavan, and Akan. '
  '28':
  - type: text
    content: 'These are the sons of Dishan: Uz and Aran. '
  '29':
  - type: text
    content: 'These are the chiefs of the Horites: the '
  - type: note
    content: ver. 20
  - type: text
    content: 'chiefs Lotan, Shobal, Zibeon, Anah, '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 28:9]'
  - type: text
    content: 'Basemath, Ishmael’s daughter, the sister of Nebaioth. '
  '30':
  - type: text
    content: Dishon, Ezer, and Dishan; these are the chiefs of the Horites, chief by chief in the land of Seir.
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-43, see 1 Chr. 1:43-54
  - type: text
    content: 'These are the kings who reigned in the land of Edom, before any king reigned over the Israelites. '
  '32':
  - type: text
    content: 'Bela the son of Beor reigned in Edom, the name of his city being Dinhabah. '
  '33':
  - type: text
    content: 'Bela died, and Jobab the son of Zerah of Bozrah reigned in his place. '
  '34':
  - type: text
    content: 'Jobab died, and Husham of the land of the Temanites reigned in his place. '
  '35':
  - type: text
    content: 'Husham died, and Hadad the son of Bedad, who defeated Midian in the country of Moab, reigned in his place, the name of his city being Avith. '
  '36':
  - type: text
    content: 'Hadad died, and Samlah of Masrekah reigned in his place. '
  '37':
  - type: text
    content: 'Samlah died, and Shaul of '
  - type: note
    content: '[ch. 26:22]'
  - type: text
    content: Rehoboth on the Euphrates
  - type: note
    content: Hebrew the River
  - type: text
    content: ' reigned in his place. '
  '38':
  - type: text
    content: 'Shaul died, and Baal-hanan the son of Achbor reigned in his place. '
  '39':
  - type: text
    content: Baal-hanan the son of Achbor died, and Hadar reigned in his place, the name of his city being Pau; his wife’s name was Mehetabel, the daughter of Matred, daughter of Mezahab.
  '4':
  - type: text
    content: 'And Adah bore to Esau, '
  - type: note
    content: ver. 10; 1 Chr. 1:35
  - type: text
    content: 'Eliphaz; Basemath bore Reuel; '
  '40':
  - type: text
    content: 'These are the names of the chiefs of Esau, according to their clans and their dwelling places, by their names: the chiefs Timna, Alvah, Jetheth, '
  '41':
  - type: text
    content: 'Oholibamah, Elah, '
  - type: note
    content: '[Num. 33:42]'
  - type: text
    content: 'Pinon, '
  '42':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '43':
  - type: text
    content: 'Magdiel, and Iram; these are the chiefs of Edom (that is, Esau, the father of '
  - type: note
    content: ver. 9
  - type: text
    content: Edom), according to their dwelling places in the land of their possession.
  '5':
  - type: text
    content: and Oholibamah bore Jeush, Jalam, and Korah. These are the sons of Esau who were born to him in the land of Canaan.
  '6':
  - type: text
    content: 'Then Esau took his wives, his sons, his daughters, and all the members of his household, his livestock, all his beasts, and all his property that he had acquired in the land of Canaan. He went into a land away from his brother Jacob. '
  '7':
  - type: note
    content: ch. 13:6
  - type: text
    content: 'For their possessions were too great for them to dwell together. '
  - type: note
    content: ch. 17:8; 23:4; 28:4; 37:1; Heb. 11:9
  - type: text
    content: 'The land of their sojournings could not support them because of their livestock. '
  '8':
  - type: text
    content: 'So Esau settled in '
  - type: note
    content: See ch. 32:3
  - type: text
    content: the hill country of Seir. (
  - type: note
    content: ver. 1, 19
  - type: text
    content: Esau is Edom.)
  '9':
  - type: text
    content: 'These are the generations of Esau the father of '
  - type: note
    content: ver. 43
  - type: text
    content: 'the Edomites in the hill country of Seir. '
