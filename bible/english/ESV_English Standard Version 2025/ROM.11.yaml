      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:16
      marker-yv: yv-n
    - type: text
      text: 'Lest you be wise in your own sight, I do not want you to be unaware of this mystery, brothers:'
    - type: usfm
