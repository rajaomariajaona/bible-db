    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: root of richness
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; some manuscripts '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: richness
      marker-yv: yv-n
    - type: text
      text: ' of the olive tree, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'do not be arrogant toward the branches. If you are, remember it is not you who support the root, but the root that supports you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will say, “Branches were broken off so that I might be grafted in.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 94:14
      marker-yv: yv-n
    - type: text
      text: 'God has not rejected his people whom he '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:29
      marker-yv: yv-n
    - type: text
      text: 'foreknew. Do you not know what the Scripture says of Elijah, how he appeals to God against Israel? '
  '20':
  - type: usfm
