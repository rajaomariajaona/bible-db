document_id: ROM.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Remnant of Israel
  - type: text
    content: 'I ask, then, '
  - type: note
    content: 1 Sam. 12:22; Jer. 31:37; 33:24
  - type: text
    content: 'has God rejected his people? By no means! For '
  - type: note
    content: 2 Cor. 11:22; Phil. 3:5
  - type: text
    content: I myself am an Israelite, a descendant of Abraham,
  - type: note
    content: Or one of the offspring of Abraham
  - type: text
    content: ' a member of the tribe of Benjamin. '
  '10':
  - type: text
    content: let their eyes be darkened so that they cannot see,
  - type: text
    content: and bend their backs forever.”
  - type: heading
    content: Gentiles Grafted In
  '11':
  - type: text
    content: 'So I ask, did they stumble in order that they might fall? By no means! Rather, through their trespass '
  - type: note
    content: '[Acts 28:28]'
  - type: text
    content: 'salvation has come to the Gentiles, so as to make Israel jealous. '
  '12':
  - type: text
    content: Now if their trespass means riches for the world, and if their failure means riches for the Gentiles, how much more will their full inclusion
  - type: note
    content: Greek their fullness
  - type: text
    content: ' mean!'
  '13':
  - type: text
    content: 'Now I am speaking to you Gentiles. Inasmuch then as '
  - type: note
    content: ch. 15:16; [Acts 26:17]; See Acts 9:15
  - type: text
    content: 'I am an apostle to the Gentiles, I magnify my ministry '
  '14':
  - type: text
    content: 'in order somehow to make my fellow Jews jealous, and '
  - type: note
    content: 1 Cor. 7:16; 9:22; 1 Tim. 4:16; James 5:20
  - type: text
    content: 'thus save some of them. '
  '15':
  - type: text
    content: 'For if their rejection means '
  - type: note
    content: ch. 5:11
  - type: text
    content: 'the reconciliation of the world, what will their acceptance mean but life from the dead? '
  '16':
  - type: note
    content: Num. 15:18-21; Neh. 10:37; Ezek. 44:30
  - type: text
    content: If the dough offered as firstfruits is holy, so is the whole lump, and if the root is holy, so are the branches.
  '17':
  - type: text
    content: 'But if '
  - type: note
    content: Jer. 11:16; [Ps. 52:8; John 15:2]
  - type: text
    content: 'some of the branches were broken off, and you, '
  - type: note
    content: '[Eph. 2:12]'
  - type: text
    content: although a wild olive shoot, were grafted in among the others and now share in the nourishing root
  - type: note
    content: Greek root of richness; some manuscripts richness
  - type: text
    content: ' of the olive tree, '
  '18':
  - type: text
    content: 'do not be arrogant toward the branches. If you are, remember it is not you who support the root, but the root that supports you. '
  '19':
  - type: text
    content: 'Then you will say, “Branches were broken off so that I might be grafted in.” '
  '2':
  - type: note
    content: Ps. 94:14
  - type: text
    content: 'God has not rejected his people whom he '
  - type: note
    content: ch. 8:29
  - type: text
    content: 'foreknew. Do you not know what the Scripture says of Elijah, how he appeals to God against Israel? '
  '20':
  - type: text
    content: 'That is true. They were broken off because of their unbelief, but you '
  - type: note
    content: 1 Cor. 10:12; 2 Cor. 1:24
  - type: text
    content: 'stand fast through faith. So '
  - type: note
    content: ch. 12:3, 16; 1 Tim. 6:17
  - type: text
    content: 'do not become proud, but '
  - type: note
    content: Prov. 28:14; Isa. 66:2, 5; Jer. 44:10; Phil. 2:12
  - type: text
    content: 'fear. '
  '21':
  - type: text
    content: 'For if God did not spare the natural branches, neither will he spare you. '
  '22':
  - type: text
    content: 'Note then the kindness and the severity of God: severity toward those who have fallen, but God’s kindness to you, '
  - type: note
    content: 1 Cor. 15:2; Heb. 3:6, 14
  - type: text
    content: 'provided you continue in his kindness. Otherwise '
  - type: note
    content: '[John 15:2]'
  - type: text
    content: 'you too will be cut off. '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: 2 Cor. 3:16
  - type: text
    content: 'even they, if they do not continue in their unbelief, will be grafted in, for God has the power to graft them in again. '
  '24':
  - type: text
    content: For if you were cut from what is by nature a wild olive tree, and grafted, contrary to nature, into a cultivated olive tree, how much more will these, the natural branches, be grafted back into their own olive tree.
  - type: heading
    content: The Mystery of Israel’s Salvation
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:16
  - type: text
    content: 'Lest you be wise in your own sight, I do not want you to be unaware of this mystery, brothers:'
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 3:14; [ver. 7]
  - type: text
    content: 'a partial hardening has come upon Israel, '
  - type: note
    content: '[Rev. 7:9]; See Luke 21:24'
  - type: text
    content: 'until the fullness of the Gentiles has come in. '
  '26':
  - type: text
    content: And in this way all Israel will be saved, as it is written,
  - type: note
    content: Cited from Isa. 59:20, 21; [ John 4:22; Heb. 8:8-12 ]
  - type: text
    content: '“The Deliverer will come '
  - type: note
    content: Ps. 14:7; 53:6
  - type: text
    content: from Zion,
  - type: text
    content: he will banish ungodliness from Jacob”;
  '27':
  - type: text
    content: '“and this will be my '
  - type: note
    content: See ch. 9:4
  - type: text
    content: covenant with them
  - type: note
    content: Isa. 27:9; [ Heb. 8:12 ]
  - type: text
    content: when I take away their sins.”
  '28':
  - type: text
    content: 'As regards the gospel, they are enemies for your sake. But as regards election, they are '
  - type: note
    content: ch. 9:5; Deut. 7:8; 10:15
  - type: text
    content: 'beloved for the sake of their forefathers. '
  '29':
  - type: text
    content: 'For the gifts and '
  - type: note
    content: See ch. 8:28
  - type: text
    content: 'the calling of God are irrevocable. '
  '3':
  - type: note
    content: Cited from 1 Kgs. 19:10, 14
  - type: text
    content: '“Lord, they have killed your prophets, they have demolished your altars, and I alone am left, and they seek my life.” '
  '30':
  - type: text
    content: 'For just as '
  - type: note
    content: Eph. 2:2, 3, 11, 13; Col. 1:21; 3:7; Titus 3:3
  - type: text
    content: 'you were at one time disobedient to God but now have received mercy because of their disobedience, '
  '31':
  - type: text
    content: so they too have now been disobedient in order that by the mercy shown to you they also may now
  - type: note
    content: Some manuscripts omit now
  - type: text
    content: ' receive mercy. '
  '32':
  - type: text
    content: 'For God '
  - type: note
    content: See ch. 3:9
  - type: text
    content: has consigned all to disobedience, that he may have mercy on all.
  '33':
  - type: text
    content: 'Oh, the depth of the riches and '
  - type: note
    content: Col. 2:3; [Ps. 139:6; Eph. 3:10]
  - type: text
    content: 'wisdom and knowledge of God! '
  - type: note
    content: Deut. 29:29
  - type: text
    content: How unsearchable are his judgments and how inscrutable his ways!
  '34':
  - type: text
    content: '“For '
  - type: note
    content: Isa. 40:13; 1 Cor. 2:16; [Job 15:8]
  - type: text
    content: who has known the mind of the Lord,
  - type: text
    content: 'or '
  - type: note
    content: Job 36:22, 23
  - type: text
    content: who has been his counselor?”
  '35':
  - type: text
    content: '“Or '
  - type: note
    content: Job 35:7; 41:11
  - type: text
    content: who has given a gift to him
  - type: text
    content: that he might be repaid?”
  '36':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 8:6; 11:12; Col. 1:16; [Heb. 2:10]
  - type: text
    content: 'from him and through him and to him are all things. '
  - type: note
    content: ch. 16:27; Eph. 3:21; Phil. 4:20; 1 Tim. 1:17; 1 Pet. 4:11; 2 Pet. 3:18; Jude 25; Rev. 1:6; 5:13
  - type: text
    content: To him be glory forever. Amen.
  '4':
  - type: text
    content: 'But what is God’s reply to him? '
  - type: note
    content: Cited from 1 Kgs. 19:18
  - type: text
    content: '“I have kept for myself seven thousand men who have not bowed the knee to Baal.” '
  '5':
  - type: text
    content: 'So too at the present time there is '
  - type: note
    content: ch. 9:27; [Jer. 3:14; Zech. 13:8]
  - type: text
    content: 'a remnant, chosen by grace. '
  '6':
  - type: note
    content: '[ch. 4:4; Deut. 9:4, 5]'
  - type: text
    content: But if it is by grace, it is no longer on the basis of works; otherwise grace would no longer be grace.
  '7':
  - type: text
    content: 'What then? '
  - type: note
    content: See ch. 9:31
  - type: text
    content: 'Israel failed to obtain what it was seeking. The elect obtained it, but the rest '
  - type: note
    content: '[ver. 25]'
  - type: text
    content: 'were hardened, '
  '8':
  - type: text
    content: as it is written,
  - type: note
    content: Isa. 29:10
  - type: text
    content: “God gave them a spirit of stupor,
  - type: note
    content: Deut. 29:4; [ Isa. 43:8; Jer. 5:21; Ezek. 12:2; Eph. 4:18 ]; See Matt. 13:14
  - type: text
    content: eyes that would not see
  - type: text
    content: and ears that would not hear,
  - type: text
    content: down to this very day.”
  '9':
  - type: text
    content: And David says,
  - type: note
    content: Cited from Ps. 69:22, 23
  - type: text
    content: “Let their table become a snare and a trap,
  - type: text
    content: a stumbling block and a retribution for them;
