  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:16
      marker-yv: yv-n
    - type: text
      text: 'even they, if they do not continue in their unbelief, will be grafted in, for God has the power to graft them in again. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if you were cut from what is by nature a wild olive tree, and grafted, contrary to nature, into a cultivated olive tree, how much more will these, the natural branches, be grafted back into their own olive tree.
  - type: usfm
    marker: s1
    children:
    - type: text
