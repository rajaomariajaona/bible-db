    children:
    - type: text
      text: The Remnant of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I ask, then, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 12:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:24
      marker-yv: yv-n
    - type: text
      text: 'has God rejected his people? By no means! For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:5
      marker-yv: yv-n
    - type: text
      text: I myself am an Israelite, a descendant of Abraham,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: one of the offspring of Abraham
      marker-yv: yv-n
    - type: text
      text: ' a member of the tribe of Benjamin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let their eyes be darkened so that they cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bend their backs forever.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gentiles Grafted In
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I ask, did they stumble in order that they might fall? By no means! Rather, through their trespass '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 28:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'salvation has come to the Gentiles, so as to make Israel jealous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now if their trespass means riches for the world, and if their failure means riches for the Gentiles, how much more will their full inclusion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: their fullness
      marker-yv: yv-n
    - type: text
      text: ' mean!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I am speaking to you Gentiles. Inasmuch then as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:16
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 26:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Acts 9:15'
      marker-yv: yv-n
    - type: text
      text: 'I am an apostle to the Gentiles, I magnify my ministry '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in order somehow to make my fellow Jews jealous, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 7:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 4:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 5:20
      marker-yv: yv-n
    - type: text
      text: 'thus save some of them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if their rejection means '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:11
      marker-yv: yv-n
    - type: text
      text: 'the reconciliation of the world, what will their acceptance mean but life from the dead? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 15:18-21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 10:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 44:30
      marker-yv: yv-n
    - type: text
      text: If the dough offered as firstfruits is holy, so is the whole lump, and if the root is holy, so are the branches.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
