document_id: ACT.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter and Cornelius
  - type: text
    content: 'At Caesarea there was a man named Cornelius, a centurion of '
  - type: note
    content: Matt. 27:27; Mark 15:16; John 18:3, 12
  - type: text
    content: 'what was known as the Italian Cohort, '
  '10':
  - type: text
    content: 'And he became hungry and wanted something to eat, but while they were preparing it, he fell into '
  - type: note
    content: ch. 22:17
  - type: text
    content: 'a trance '
  '11':
  - type: text
    content: 'and saw '
  - type: note
    content: See John 1:51
  - type: text
    content: 'the heavens opened and something like a great sheet descending, being let down by its four corners upon the earth. '
  '12':
  - type: text
    content: 'In it were all kinds of animals and reptiles and birds of the air. '
  '13':
  - type: text
    content: 'And there came a voice to him: '
  - type: text
    content: “Rise, Peter; kill and eat.”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But Peter said, “By no means, Lord; '
  - type: note
    content: Ezek. 4:14; Dan. 1:8
  - type: text
    content: 'for I have never eaten anything that is '
  - type: note
    content: ver. 28
  - type: text
    content: 'common or '
  - type: note
    content: Lev. 11:2-47; 20:25; Deut. 14:4-20
  - type: text
    content: 'unclean.” '
  '15':
  - type: text
    content: 'And the voice came to him again a second time, '
  - type: note
    content: Rom. 14:2, 14, 20; 1 Tim. 4:4; Titus 1:15; [Matt. 15:11; Mark 7:15, 19; 1 Cor. 10:25]
  - type: text
    content: “What God has made clean, do not call common.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: This happened three times, and the thing was taken up at once to heaven.
  '17':
  - type: text
    content: 'Now while Peter was inwardly perplexed as to what '
  - type: note
    content: ver. 3
  - type: text
    content: 'the vision that he had seen might mean, behold, '
  - type: note
    content: ver. 7, 8
  - type: text
    content: 'the men who were sent by Cornelius, having made inquiry for Simon’s house, stood at the gate '
  '18':
  - type: text
    content: 'and called out to ask whether Simon who was called Peter was lodging there. '
  '19':
  - type: text
    content: 'And while Peter was pondering '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'the vision, '
  - type: note
    content: See ch. 8:29
  - type: text
    content: 'the Spirit said to him, “Behold, three men are looking for you. '
  '2':
  - type: text
    content: 'a devout man '
  - type: note
    content: ver. 22; ch. 13:16, 26
  - type: text
    content: 'who feared God with all his household, gave alms generously to the people, and prayed continually to God. '
  '20':
  - type: text
    content: 'Rise and go down and '
  - type: note
    content: '[ch. 15:7-9]'
  - type: text
    content: accompany them without hesitation,
  - type: note
    content: Or accompany them, making no distinction
  - type: text
    content: ' for I have sent them.” '
  '21':
  - type: text
    content: 'And Peter went down to the men and said, “I am the one you are looking for. What is the reason for your coming?” '
  '22':
  - type: text
    content: 'And they said, “Cornelius, a centurion, an upright and '
  - type: note
    content: See ver. 2
  - type: text
    content: 'God-fearing man, who is well spoken of by the whole Jewish nation, was directed by '
  - type: note
    content: See Mark 8:38
  - type: text
    content: 'a holy angel to send for you to come to his house and '
  - type: note
    content: ch. 11:14
  - type: text
    content: 'to hear what you have to say.” '
  '23':
  - type: text
    content: So he invited them in to be his guests.
  - type: text
    content: 'The next day he rose and went away with them, and '
  - type: note
    content: ver. 45; [ch. 11:12]
  - type: text
    content: 'some of '
  - type: note
    content: See John 21:23
  - type: text
    content: 'the brothers from Joppa accompanied him. '
  '24':
  - type: text
    content: 'And on the following day they entered Caesarea. Cornelius was expecting them and had called together his relatives and close friends. '
  '25':
  - type: text
    content: 'When Peter entered, Cornelius met him and '
  - type: note
    content: ch. 16:29; Dan. 2:46
  - type: text
    content: 'fell down at his feet and '
  - type: note
    content: See Matt. 8:2
  - type: text
    content: 'worshiped him. '
  '26':
  - type: text
    content: 'But Peter lifted him up, saying, '
  - type: note
    content: Rev. 19:10; 22:8, 9; [ch. 14:15]
  - type: text
    content: '“Stand up; I too am a man.” '
  '27':
  - type: text
    content: 'And as he talked with him, he went in and found many persons gathered. '
  '28':
  - type: text
    content: 'And he said to them, “You yourselves know how unlawful it is for a Jew '
  - type: note
    content: '[ch. 11:3; John 4:9; 18:28; Gal. 2:12]'
  - type: text
    content: 'to associate with or to visit anyone of another nation, but '
  - type: note
    content: '[ver. 35]; See ver. 14, 15'
  - type: text
    content: 'God has shown me that I should not call any person common or unclean. '
  '29':
  - type: text
    content: So when I was sent for, I came without objection. I ask then why you sent for me.”
  '3':
  - type: note
    content: See ch. 3:1
  - type: text
    content: About the ninth hour of the day
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' '
  - type: note
    content: ver. 17, 19
  - type: text
    content: 'he saw clearly in a vision '
  - type: note
    content: See ch. 8:26
  - type: text
    content: 'an angel of God come in and say to him, “Cornelius.” '
  '30':
  - type: text
    content: 'And Cornelius said, '
  - type: note
    content: ver. 9, 23, 24
  - type: text
    content: '“Four days ago, about this hour, I was praying in my house at '
  - type: note
    content: See ch. 3:1
  - type: text
    content: the ninth hour,
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' and behold, '
  - type: note
    content: '[ch. 1:10]'
  - type: text
    content: 'a man stood before me in bright clothing '
  '31':
  - type: text
    content: 'and said, ‘Cornelius, '
  - type: note
    content: See ver. 4
  - type: text
    content: 'your prayer has been heard and your alms have been remembered before God. '
  '32':
  - type: text
    content: 'Send therefore to Joppa and ask for Simon who is called Peter. He is lodging in the house of Simon, a tanner, by the sea.’ '
  '33':
  - type: text
    content: So I sent for you at once, and you have been kind enough to come. Now therefore we are all here in the presence of God to hear all that you have been commanded by the Lord.”
  - type: heading
    content: Gentiles Hear the Good News
  '34':
  - type: text
    content: 'So Peter opened his mouth and said: “Truly I understand that '
  - type: note
    content: '[ver. 28; ch. 15:19; Deut. 1:17; Rom. 3:29]; See Deut. 10:17'
  - type: text
    content: 'God '
  - type: note
    content: Prov. 24:23; James 2:1, 9; [Jude 16]
  - type: text
    content: 'shows no partiality, '
  '35':
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'in every nation anyone who fears him and '
  - type: note
    content: Isa. 64:5
  - type: text
    content: 'does what is right is acceptable to him. '
  '36':
  - type: text
    content: 'As for '
  - type: note
    content: ch. 13:26; Ps. 107:20; 147:18, 19
  - type: text
    content: 'the word that he sent to Israel, '
  - type: note
    content: Isa. 52:7; Nah. 1:15; Eph. 2:17
  - type: text
    content: 'preaching good news of '
  - type: note
    content: See Luke 2:14
  - type: text
    content: peace through Jesus Christ (
  - type: note
    content: Rom. 10:12; [Rev. 17:14; 19:16]; See ch. 2:36; Matt. 28:18
  - type: text
    content: 'he is Lord of all), '
  '37':
  - type: text
    content: 'you yourselves know what happened throughout all Judea, '
  - type: note
    content: Luke 24:47
  - type: text
    content: 'beginning '
  - type: note
    content: Matt. 4:12; Mark 1:14
  - type: text
    content: 'from Galilee after the baptism that John proclaimed: '
  '38':
  - type: text
    content: 'how '
  - type: note
    content: '[Matt. 3:16; John 1:32, 33]; See ch. 4:26'
  - type: text
    content: 'God anointed Jesus of Nazareth '
  - type: note
    content: '[ch. 1:2; 2:22; Matt. 12:28; Luke 4:18; Rom. 1:4]'
  - type: text
    content: 'with the Holy Spirit and with '
  - type: note
    content: '[Luke 6:19]'
  - type: text
    content: 'power. He went about doing good and healing all '
  - type: note
    content: See Matt. 4:24; Luke 13:16
  - type: text
    content: 'who were oppressed by the devil, '
  - type: note
    content: See John 8:29; 10:38
  - type: text
    content: 'for God was with him. '
  '39':
  - type: text
    content: 'And '
  - type: note
    content: ver. 41; See ch. 2:32; Luke 24:48
  - type: text
    content: 'we are witnesses of all that he did both in the country of the Jews and in Jerusalem. '
  - type: note
    content: ch. 5:30
  - type: text
    content: 'They put him to death by hanging him on a tree, '
  '4':
  - type: text
    content: 'And he stared at him in terror and said, “What is it, Lord?” And he said to him, “Your prayers and your alms '
  - type: note
    content: Rev. 8:4; [Ps. 141:2; Dan. 10:12]
  - type: text
    content: 'have ascended '
  - type: note
    content: Matt. 26:13; Mark 14:9; [ver. 31; Heb. 6:10]
  - type: text
    content: 'as a memorial before God. '
  '40':
  - type: text
    content: 'but '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'God raised him on '
  - type: note
    content: See Luke 9:22
  - type: text
    content: 'the third day and made him to '
  - type: note
    content: ch. 1:3
  - type: text
    content: 'appear, '
  '41':
  - type: note
    content: '[John 14:21, 22]'
  - type: text
    content: 'not to all the people but to us who had been chosen by God as '
  - type: note
    content: ver. 39
  - type: text
    content: 'witnesses, who ate and drank with him after he rose from the dead. '
  '42':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'he commanded us to preach to the people and to testify '
  - type: note
    content: ch. 17:31; 24:25; John 5:22, 27; 2 Cor. 5:10; See Matt. 16:27
  - type: text
    content: 'that he is the one appointed by God to be judge '
  - type: note
    content: 2 Tim. 4:1; 1 Pet. 4:5; [Rom. 14:9, 10; 1 Thess. 4:15, 17]
  - type: text
    content: 'of the living and the dead. '
  '43':
  - type: note
    content: ch. 26:22; Rom. 3:21; [Jer. 31:34]
  - type: text
    content: 'To him '
  - type: note
    content: ch. 3:18, 24; Luke 24:27
  - type: text
    content: 'all the prophets bear witness that '
  - type: note
    content: ch. 11:17; 13:39; 15:9; Rom. 9:33; 10:11; Gal. 3:22
  - type: text
    content: 'everyone who believes in him receives '
  - type: note
    content: ch. 5:31
  - type: text
    content: 'forgiveness of sins '
  - type: note
    content: ch. 2:38; 4:12; John 20:31; 1 John 2:12
  - type: text
    content: through his name.”
  - type: heading
    content: The Holy Spirit Falls on the Gentiles
  '44':
  - type: text
    content: 'While Peter was still saying these things, '
  - type: note
    content: ch. 11:15; 15:8; 1 Thess. 1:5; See ch. 2:4
  - type: text
    content: 'the Holy Spirit fell on all who heard the word. '
  '45':
  - type: text
    content: 'And the believers from among '
  - type: note
    content: ver. 23; [ch. 11:2]
  - type: text
    content: 'the circumcised who had come with Peter were amazed, because '
  - type: note
    content: See ch. 2:38
  - type: text
    content: 'the gift of the Holy Spirit '
  - type: note
    content: See ch. 2:17
  - type: text
    content: 'was poured out even on the Gentiles. '
  '46':
  - type: text
    content: 'For they were hearing them '
  - type: note
    content: See Mark 16:17
  - type: text
    content: 'speaking in tongues and extolling God. Then Peter declared, '
  '47':
  - type: note
    content: ch. 8:36
  - type: text
    content: '“Can anyone withhold water for baptizing these people, who have received the Holy Spirit '
  - type: note
    content: ch. 2:4; 11:17; 15:8
  - type: text
    content: 'just as we have?” '
  '48':
  - type: text
    content: 'And he '
  - type: note
    content: '[1 Cor. 1:14-17]'
  - type: text
    content: 'commanded them '
  - type: note
    content: ch. 2:38; See ch. 8:12, 16
  - type: text
    content: to be baptized in the name of Jesus Christ. Then they asked him to remain for some days.
  '5':
  - type: text
    content: 'And now send men to Joppa and bring one Simon who is called Peter. '
  '6':
  - type: text
    content: 'He is lodging '
  - type: note
    content: ch. 9:43
  - type: text
    content: 'with one Simon, a tanner, whose house is by the sea.” '
  '7':
  - type: text
    content: 'When the angel who spoke to him had departed, he called two of his servants and a devout soldier from among those who attended him, '
  '8':
  - type: text
    content: and having related everything to them, he sent them to Joppa.
  - type: heading
    content: Peter’s Vision
  '9':
  - type: text
    content: 'The next day, as they were on their journey and approaching the city, '
  - type: note
    content: For ver. 9-32, see ch. 11:5-14
  - type: text
    content: 'Peter went up '
  - type: note
    content: '[2 Kgs. 23:12; Jer. 19:13; 32:29; Zeph. 1:5]; See 1 Sam. 9:25'
  - type: text
    content: 'on the housetop about '
  - type: note
    content: Ps. 55:17
  - type: text
    content: the sixth hour
  - type: note
    content: That is, noon
  - type: text
    content: ' to pray. '
