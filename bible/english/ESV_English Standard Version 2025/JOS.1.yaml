      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:31
      marker-yv: yv-n
    - type: text
      text: 'you are to pass over this Jordan to go in to take possession of the land that the '
    - type: usfm
      marker: nd
      children:
