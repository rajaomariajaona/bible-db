document_id: JOS.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Commissions Joshua
  - type: text
    content: 'After the death of Moses the '
  - type: note
    content: ver. 13, 15; Ex. 14:31; Num. 12:7; Deut. 34:5
  - type: text
    content: 'servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua the son of Nun, Moses’ '
  - type: note
    content: Deut. 1:38; [Ex. 24:13]
  - type: text
    content: 'assistant, '
  '10':
  - type: text
    content: 'And Joshua commanded the '
  - type: note
    content: Deut. 16:18
  - type: text
    content: 'officers of the people, '
  '11':
  - type: text
    content: '“Pass through the midst of the camp and command the people, ‘Prepare your provisions, for '
  - type: note
    content: ch. 3:2
  - type: text
    content: 'within three days '
  - type: note
    content: Deut. 9:1; 11:31
  - type: text
    content: 'you are to pass over this Jordan to go in to take possession of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess.’”'
  '12':
  - type: text
    content: 'And to the Reubenites, the Gadites, and the half-tribe of Manasseh Joshua said, '
  '13':
  - type: text
    content: '“Remember the word that '
  - type: note
    content: See Num. 32:20-28
  - type: text
    content: 'Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded you, saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is providing you a place of rest and will give you this land.’ '
  '14':
  - type: text
    content: 'Your wives, your little ones, and your livestock shall remain in the land that Moses gave you beyond the Jordan, but all the men of valor among you shall pass over armed before your brothers and shall help them, '
  '15':
  - type: note
    content: Deut. 3:20
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' gives rest to your brothers as he has to you, and they also take possession of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving them. '
  - type: note
    content: ch. 22:4
  - type: text
    content: 'Then you shall return to the land of your possession and shall possess it, the land that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you beyond the Jordan toward the sunrise.”'
  '16':
  - type: text
    content: 'And they answered Joshua, “All that you have commanded us we will do, and wherever you send us we will go. '
  '17':
  - type: text
    content: 'Just as we obeyed Moses in all things, so we will obey you. Only may the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ver. 5
  - type: text
    content: 'be with you, as he was with Moses! '
  '18':
  - type: text
    content: 'Whoever rebels against your commandment and disobeys your words, whatever you command him, shall be put to death. '
  - type: note
    content: ver. 6, 7, 9
  - type: text
    content: Only be strong and courageous.”
  '2':
  - type: text
    content: '“Moses my servant is dead. Now therefore arise, go over this Jordan, you and all this people, into the land that I am giving to them, to the people of Israel. '
  '3':
  - type: note
    content: Deut. 11:24; [ch. 14:9]
  - type: text
    content: 'Every place that the sole of your foot will tread upon I have given to you, just as I promised to Moses. '
  '4':
  - type: note
    content: Gen. 15:18; Ex. 23:31; See Num. 34:3-12
  - type: text
    content: 'From the wilderness and this Lebanon as far as the great river, the river Euphrates, all the land of the Hittites to the Great Sea toward the going down of the sun shall be your territory. '
  '5':
  - type: note
    content: Deut. 7:24
  - type: text
    content: 'No man shall be able to stand before you all the days of your life. Just '
  - type: note
    content: ver. 17; Ex. 3:12
  - type: text
    content: 'as I was with Moses, so '
  - type: note
    content: ver. 9, 17; ch. 3:7; 6:27; Deut. 31:8, 23
  - type: text
    content: 'I will be with you. '
  - type: note
    content: Gen. 28:15; Deut. 31:6, 8; 1 Chr. 28:20; Cited Heb. 13:5
  - type: text
    content: 'I will not leave you or forsake you. '
  '6':
  - type: note
    content: ver. 7, 9, 18; Deut. 31:6, 7
  - type: text
    content: 'Be strong and courageous, for you shall cause this people to inherit the land that I swore to their fathers to give them. '
  '7':
  - type: text
    content: 'Only be strong and '
  - type: note
    content: ch. 23:6
  - type: text
    content: 'very courageous, being careful to do according to all the law '
  - type: note
    content: ch. 11:15
  - type: text
    content: 'that Moses my servant commanded you. '
  - type: note
    content: Deut. 5:32; 28:14
  - type: text
    content: Do not turn from it to the right hand or to the left, that you may have good success
  - type: note
    content: Or may act wisely
  - type: text
    content: ' wherever you go. '
  '8':
  - type: text
    content: 'This Book of the Law shall not depart from your mouth, but '
  - type: note
    content: Ps. 1:2; 119:15
  - type: text
    content: 'you shall meditate on it day and night, so that you may be careful to do according to all that is written in it. For then you will make your way prosperous, and then you will have good success. '
  '9':
  - type: text
    content: 'Have I not commanded you? '
  - type: note
    content: ver. 6, 7, 18
  - type: text
    content: 'Be strong and courageous. '
  - type: note
    content: Deut. 1:29; 7:21; 20:3; 31:6, 8
  - type: text
    content: 'Do not be frightened, and do not be dismayed, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is with you wherever you go.”'
  - type: heading
    content: Joshua Assumes Command
