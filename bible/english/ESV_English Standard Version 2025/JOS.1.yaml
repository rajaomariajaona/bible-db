      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 31:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'Be strong and courageous, for you shall cause this people to inherit the land that I swore to their fathers to give them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
