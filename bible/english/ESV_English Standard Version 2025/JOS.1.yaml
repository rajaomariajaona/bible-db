        children:
        - type: text
          text: 23:6
      marker-yv: yv-n
    - type: text
      text: 'very courageous, being careful to do according to all the law '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
