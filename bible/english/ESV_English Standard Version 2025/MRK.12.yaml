document_id: MRK.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Tenants
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see Matt. 21:33-46; Luke 20:9-19
  - type: text
    content: 'And he began to speak to them in parables. '
  - type: text
    content: '“A man planted '
  - type: note
    content: Ps. 80:8; Isa. 5:1; Matt. 21:28
  - type: text
    content: 'a vineyard '
  - type: note
    content: Isa. 5:2
  - type: text
    content: 'and put a fence around it and dug a pit for the winepress and built a tower, and '
  - type: note
    content: Song 8:11, 12
  - type: text
    content: 'leased it to tenants and '
  - type: note
    content: ch. 13:34; Matt. 25:14, 15
  - type: text
    content: went into another country.
  - type: text
    content: ' '
  '10':
  - type: note
    content: See Matt. 21:16
  - type: text
    content: 'Have you not read '
  - type: note
    content: Luke 4:21; Acts 8:35
  - type: text
    content: 'this Scripture:'
  - type: note
    content: Acts 4:11; 1 Pet. 2:7; Cited from Ps. 118:22, 23
  - type: text
    content: “‘The stone that the builders rejected
  - type: text
    content: has become the cornerstone;
  - type: note
    content: Greek the head of the corner
  '11':
  - type: text
    content: ' '
  - type: text
    content: this was the Lord’s doing,
  - type: text
    content: and it is marvelous in our eyes’?”
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ch. 11:18; Luke 19:47, 48; John 7:25, 30, 44; [Matt. 26:4]
  - type: text
    content: 'they were seeking to arrest him '
  - type: note
    content: ch. 11:32
  - type: text
    content: 'but feared the people, for they perceived that he had told the parable against them. So they '
  - type: note
    content: Matt. 22:22
  - type: text
    content: left him and went away.
  - type: heading
    content: Paying Taxes to Caesar
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-27, see Matt. 22:15-32; Luke 20:20-38
  - type: text
    content: 'And they sent to him some of '
  - type: note
    content: ch. 3:6; [ch. 8:15]
  - type: text
    content: 'the Pharisees and some of '
  - type: note
    content: ch. 3:6; [ch. 8:15]
  - type: text
    content: 'the Herodians, to '
  - type: note
    content: Luke 11:54
  - type: text
    content: 'trap him in his talk. '
  '14':
  - type: text
    content: 'And they came and said to him, “Teacher, '
  - type: note
    content: '[John 3:2]'
  - type: text
    content: 'we know that you are true and do not care about anyone’s opinion. For '
  - type: note
    content: See Acts 10:34
  - type: text
    content: you are not swayed by appearances,
  - type: note
    content: Greek you do not look at people’s faces
  - type: text
    content: ' but truly teach '
  - type: note
    content: Acts 18:25, 26; [Acts 13:10]
  - type: text
    content: 'the way of God. Is it lawful to pay '
  - type: note
    content: Matt. 17:25
  - type: text
    content: 'taxes to '
  - type: note
    content: Luke 2:1; 3:1
  - type: text
    content: 'Caesar, or not? Should we pay them, or should we not?” '
  '15':
  - type: text
    content: 'But, knowing '
  - type: note
    content: Matt. 23:28; Luke 12:1
  - type: text
    content: 'their hypocrisy, he said to them, '
  - type: text
    content: '“Why '
  - type: note
    content: See John 8:6
  - type: text
    content: 'put me to the test? Bring me '
  - type: note
    content: See Matt. 18:28
  - type: text
    content: a denarius
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  - type: text
    content: and let me look at it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And they brought one. And he said to them, '
  - type: text
    content: “Whose likeness and inscription is this?”
  - type: text
    content: ' They said to him, “Caesar’s.” '
  '17':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: Rom. 13:7
  - type: text
    content: “Render to Caesar the things that are Caesar’s, and to God the things that are God’s.”
  - type: text
    content: ' And they marveled at him.'
  - type: heading
    content: The Sadducees Ask About the Resurrection
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 3:7; 16:1; 22:34; Acts 4:1; 5:17; 23:6
  - type: text
    content: 'Sadducees came to him, '
  - type: note
    content: Acts 23:8; [Acts 4:2]
  - type: text
    content: 'who say that there is no resurrection. And they asked him a question, saying, '
  '19':
  - type: text
    content: '“Teacher, Moses wrote for us that '
  - type: note
    content: '[Deut. 25:5]'
  - type: text
    content: if a man’s brother dies and leaves a wife, but leaves no child, the man
  - type: note
    content: Greek his brother
  - type: text
    content: ' must take the widow and raise up offspring for his brother. '
  '2':
  - type: text
    content: When the season came, he sent a servant
  - type: note
    content: Or bondservant; also verse 4
  - type: text
    content: ' '
  - type: text
    content: to the tenants to get from them some of the fruit of the vineyard.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'There were seven brothers; the first took a wife, and when he died left no offspring. '
  '21':
  - type: text
    content: 'And the second took her, and died, leaving no offspring. And the third likewise. '
  '22':
  - type: text
    content: 'And the seven left no offspring. Last of all the woman also died. '
  '23':
  - type: text
    content: In the resurrection, when they rise again, whose wife will she be? For the seven had her as wife.”
  '24':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Is this not the reason you are wrong, because '
  - type: note
    content: John 20:9
  - type: text
    content: 'you know neither the Scriptures nor '
  - type: note
    content: 1 Cor. 6:14
  - type: text
    content: the power of God?
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'For when they rise from the dead, they neither '
  - type: note
    content: Matt. 24:38; Luke 17:27
  - type: text
    content: 'marry nor '
  - type: note
    content: Matt. 24:38; Luke 17:27
  - type: text
    content: are given in marriage, but are like angels in heaven.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'And as for the dead being raised, '
  - type: note
    content: See Matt. 21:16
  - type: text
    content: 'have you not read in '
  - type: note
    content: '[Luke 3:4; 20:42; Acts 1:20; 7:42]'
  - type: text
    content: 'the book of Moses, in '
  - type: note
    content: Ex. 3:1-4, 17
  - type: text
    content: 'the passage about the bush, how God spoke to him, saying, '
  - type: note
    content: Acts 7:32; Cited from Ex. 3:6
  - type: text
    content: ‘I am the God of Abraham, and the God of Isaac, and the God of Jacob’?
  - type: text
    content: ' '
  '27':
  - type: text
    content: He is not God of the dead, but of the living. You are quite wrong.”
  - type: heading
    content: The Great Commandment
  '28':
  - type: text
    content: ' '
  - type: note
    content: For ver. 28-34, see Matt. 22:34-40, 46; [ Luke 10:25-28 ]
  - type: text
    content: 'And one of the scribes came up and heard them disputing with one another, and seeing that he answered them well, asked him, “Which commandment is the most important of all?” '
  '29':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“The most important is, '
  - type: note
    content: Luke 10:27; Cited from Deut. 6:4, 5
  - type: text
    content: '‘Hear, O Israel: The Lord our God, '
  - type: note
    content: Rom. 3:30; 1 Cor. 8:4, 6; Gal. 3:20; Eph. 4:6; 1 Tim. 1:17; 2:5; James 2:19; 4:12; Jude 25; [Matt. 19:17; 23:9]
  - type: text
    content: the Lord is one.
  - type: text
    content: ' '
  '3':
  - type: note
    content: Matt. 5:12; 22:6; 23:34, 37; [2 Chr. 24:19; 36:15, 16; Neh. 9:26; Jer. 37:15; 38:6; Acts 7:52; 2 Cor. 11:24-26; 1 Thess. 2:15; Heb. 11:36, 37]
  - type: text
    content: And they took him and beat him and sent him away empty-handed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And you shall love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength.’
  - type: text
    content: ' '
  '31':
  - type: note
    content: '[1 John 4:21]'
  - type: text
    content: 'The second is this: '
  - type: note
    content: Cited from Lev. 19:18; See Matt. 19:19
  - type: text
    content: '‘You shall love your neighbor as yourself.’ There is no other commandment '
  - type: note
    content: '[Matt. 23:23]'
  - type: text
    content: greater than these.”
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And the scribe said to him, “You are right, Teacher. You have truly said that '
  - type: note
    content: '[See ver. 29above]'
  - type: text
    content: 'he is one, and '
  - type: note
    content: Cited from Deut. 4:35 (Gk.)
  - type: text
    content: 'there is no other besides him. '
  '33':
  - type: text
    content: 'And to love him with all the heart and with all '
  - type: note
    content: Deut. 4:6; Luke 2:47; Col. 1:9; 2:2
  - type: text
    content: 'the understanding and with all the strength, and to love one’s neighbor as oneself, '
  - type: note
    content: 1 Sam. 15:22; Hos. 6:6; Mic. 6:6-8; Matt. 9:13; 12:7
  - type: text
    content: 'is much more than all '
  - type: note
    content: Ps. 40:6; Heb. 10:6, 8
  - type: text
    content: 'whole burnt offerings and sacrifices.” '
  '34':
  - type: text
    content: 'And when Jesus saw that he answered wisely, he said to him, '
  - type: text
    content: “You are not far from the kingdom of God.”
  - type: text
    content: ' '
  - type: note
    content: Luke 20:40
  - type: text
    content: And after that no one dared to ask him any more questions.
  - type: heading
    content: Whose Son Is the Christ?
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-37, see Matt. 22:41-45; Luke 20:41-44
  - type: text
    content: 'And as '
  - type: note
    content: See Matt. 26:55
  - type: text
    content: 'Jesus taught in the temple, he said, '
  - type: text
    content: '“How can the scribes say that '
  - type: note
    content: See Matt. 1:1, 17
  - type: text
    content: the Christ is the son of David?
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'David himself, '
  - type: note
    content: '[Luke 10:21; 1 Cor. 12:3]'
  - type: text
    content: in the Holy Spirit, declared,
  - type: note
    content: Acts 2:34, 35; Heb. 1:13; Cited from Ps. 110:1; [ 1 Cor. 15:25; Heb. 10:13 ]
  - type: text
    content: “‘The Lord said to my Lord,
  - type: text
    content: “Sit at my right hand,
  - type: text
    content: 'until I put your enemies '
  - type: note
    content: '[ Acts 7:49 ]'
  - type: text
    content: under your feet.”’
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'David himself calls him Lord. So '
  - type: note
    content: '[ Rom. 1:3, 4 ]'
  - type: text
    content: how is he his son?”
  - type: text
    content: ' And the great throng '
  - type: note
    content: ch. 6:20
  - type: text
    content: heard him gladly.
  - type: heading
    content: Beware of the Scribes
  '38':
  - type: text
    content: ' '
  - type: note
    content: For ver. 38, 39, see Matt. 23:1, 2, 5-7; Luke 20:45, 46; [ Luke 11:43 ]
  - type: text
    content: 'And in his teaching he said, '
  - type: text
    content: “Beware of the scribes, who like to walk around in long robes and like greetings in the marketplaces
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'and have the best seats in the synagogues and '
  - type: note
    content: Luke 14:7, 8
  - type: text
    content: the places of honor at feasts,
  - type: text
    content: ' '
  '4':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Again '
  - type: note
    content: Matt. 22:4
  - type: text
    content: 'he sent to them another servant, and '
  - type: note
    content: '[Acts 14:19]'
  - type: text
    content: 'they struck him on the head and '
  - type: note
    content: Acts 5:41 (Gk.)
  - type: text
    content: treated him shamefully.
  - type: text
    content: ' '
  '40':
  - type: note
    content: '[Luke 11:39; 16:14]'
  - type: text
    content: 'who devour widows’ houses and '
  - type: note
    content: '[Matt. 6:5, 7]'
  - type: text
    content: for a pretense make long prayers. They will receive the greater condemnation.”
  - type: heading
    content: The Widow’s Offering
  '41':
  - type: text
    content: ' '
  - type: note
    content: For ver. 41-44, see Luke 21:1-4
  - type: text
    content: 'And he sat down opposite '
  - type: note
    content: Matt. 27:6; John 8:20
  - type: text
    content: 'the treasury and watched the people '
  - type: note
    content: 2 Kgs. 12:9
  - type: text
    content: 'putting money into the offering box. Many rich people put in large sums. '
  '42':
  - type: text
    content: 'And a poor widow came and put in two '
  - type: note
    content: Luke 12:59
  - type: text
    content: small copper coins, which make a penny.
  - type: note
    content: Greek two lepta, which make a kodrantes; a kodrantes (Latin quadrans) was a Roman copper coin worth about 1/64 of a denarius (which was a day’s wage for a laborer)
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And he called his disciples to him and said to them, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: '[2 Cor. 8:2, 12]'
  - type: text
    content: this poor widow has put in more than all those who are contributing to the offering box.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'For they all contributed out of their abundance, but she out of her '
  - type: note
    content: Phil. 4:11
  - type: text
    content: 'poverty has put in everything she had, all '
  - type: note
    content: Luke 8:43
  - type: text
    content: she had to live on.”
  '5':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'And he sent another, and him they killed. And so with many others: some they beat, and some they killed.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'He had still one other, '
  - type: note
    content: See Matt. 3:17
  - type: text
    content: 'a beloved son. '
  - type: note
    content: '[Heb. 1:1]'
  - type: text
    content: Finally he sent him to them, saying, ‘They will respect my son.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But those tenants said to one another, '
  - type: note
    content: Heb. 1:2; [John 1:11; Rom. 8:17]
  - type: text
    content: '‘This is the heir. Come, '
  - type: note
    content: '[1 Kgs. 21:19]'
  - type: text
    content: let us kill him, and the inheritance will be ours.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And they took him and killed him and '
  - type: note
    content: Heb. 13:12
  - type: text
    content: threw him out of the vineyard.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'What will the owner of the vineyard do? '
  - type: note
    content: '[Luke 19:27]'
  - type: text
    content: 'He will '
  - type: note
    content: '[Matt. 24:50; 25:19]'
  - type: text
    content: 'come and destroy the tenants and '
  - type: note
    content: Matt. 21:43; Acts 13:46; 18:6; 28:28; [Matt. 8:11, 12]
  - type: text
    content: give the vineyard to others.
  - type: text
    content: ' '
