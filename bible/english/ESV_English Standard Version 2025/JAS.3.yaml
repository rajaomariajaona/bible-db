      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the wisdom from above is first pure, then '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:11
      marker-yv: yv-n
    - type: text
      text: 'peaceable, gentle, open to reason, '
    - type: usfm
