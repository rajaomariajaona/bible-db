  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:46
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 20:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 7:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 1:8
      marker-yv: yv-n
    - type: text
      text: 'we all stumble in many ways. And if anyone does not stumble in what he says, '
    - type: usfm
