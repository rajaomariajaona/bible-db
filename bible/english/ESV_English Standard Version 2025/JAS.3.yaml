document_id: JAS.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Taming the Tongue
  - type: text
    content: ' '
  - type: note
    content: Matt. 23:8; [ Rom. 2:20, 21; 1 Tim. 1:7 ]
  - type: text
    content: 'Not many of you should become teachers, my brothers, for you know that we who teach will be judged with greater strictness. '
  '10':
  - type: text
    content: From the same mouth come blessing and cursing. My brothers,
  - type: note
    content: Or brothers and sisters; also verse 12
  - type: text
    content: ' these things ought not to be so. '
  '11':
  - type: text
    content: 'Does a spring pour forth from the same opening both fresh and salt water? '
  '12':
  - type: text
    content: Can a fig tree, my brothers, bear olives, or a grapevine produce figs? Neither can a salt pond yield fresh water.
  - type: heading
    content: Wisdom from Above
  '13':
  - type: text
    content: 'Who is wise and understanding among you? '
  - type: note
    content: ch. 2:18
  - type: text
    content: 'By his good conduct let him show his works '
  - type: note
    content: ch. 1:21
  - type: text
    content: 'in the meekness of wisdom. '
  '14':
  - type: text
    content: 'But if you have bitter '
  - type: note
    content: ver. 16; Acts 5:17; Rom. 2:8; 2 Cor. 12:20; Gal. 5:20; Phil. 1:17; 2:3; [Rom. 13:13]
  - type: text
    content: 'jealousy and selfish ambition in your hearts, do not boast and be false to the truth. '
  '15':
  - type: text
    content: 'This is not '
  - type: note
    content: ch. 1:17
  - type: text
    content: 'the wisdom that comes down from above, but is earthly, unspiritual, '
  - type: note
    content: '[1 Kgs. 22:22; 2 Thess. 2:9, 10; 1 Tim. 4:1; Rev. 2:24]'
  - type: text
    content: 'demonic. '
  '16':
  - type: text
    content: 'For where jealousy and selfish ambition exist, there will be disorder and every vile practice. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: '[1 Cor. 2:6, 7]'
  - type: text
    content: 'the wisdom from above is first pure, then '
  - type: note
    content: Heb. 12:11
  - type: text
    content: 'peaceable, gentle, open to reason, '
  - type: note
    content: '[Luke 6:36]'
  - type: text
    content: 'full of mercy and good fruits, '
  - type: note
    content: ch. 2:4 (Gk.)
  - type: text
    content: 'impartial and '
  - type: note
    content: Rom. 12:9
  - type: text
    content: 'sincere. '
  '18':
  - type: text
    content: 'And '
  - type: note
    content: Prov. 11:18; Isa. 32:17; Hos. 10:12; Amos 6:12; Phil. 1:11
  - type: text
    content: 'a harvest of righteousness '
  - type: note
    content: Matt. 5:9; Gal. 6:7, 8
  - type: text
    content: is sown in peace by those who make peace.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: 1 Kgs. 8:46; Prov. 20:9; Eccles. 7:20; 1 John 1:8
  - type: text
    content: 'we all stumble in many ways. And if anyone does not stumble in what he says, '
  - type: note
    content: '[Matt. 12:37]'
  - type: text
    content: 'he is a perfect man, '
  - type: note
    content: See ch. 1:26
  - type: text
    content: 'able also to bridle his whole body. '
  '3':
  - type: text
    content: 'If we put '
  - type: note
    content: Ps. 32:9
  - type: text
    content: 'bits into the mouths of horses so that they obey us, we guide their whole bodies as well. '
  '4':
  - type: text
    content: 'Look at the ships also: though they are so large and are driven by strong winds, they are guided by a very small rudder wherever the will of the pilot directs. '
  '5':
  - type: text
    content: 'So also the tongue is a small member, yet '
  - type: note
    content: '[Ps. 12:3, 4; 73:8, 9]'
  - type: text
    content: it boasts of great things.
  - type: text
    content: 'How great a forest is set ablaze by such a small fire! '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 120:2-4; Prov. 16:27
  - type: text
    content: 'the tongue is a fire, a world of unrighteousness. The tongue is set among our members, '
  - type: note
    content: Matt. 15:18
  - type: text
    content: staining the whole body, setting on fire the entire course of life,
  - type: note
    content: Or wheel of birth
  - type: text
    content: ' and set on fire by hell.'
  - type: note
    content: Greek Gehenna
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For every kind of beast and bird, of reptile and sea creature, can be tamed and has been tamed by mankind, '
  '8':
  - type: text
    content: 'but no human being can tame the tongue. It is a restless evil, '
  - type: note
    content: Ps. 140:3; Eccles. 10:11; Rom. 3:13
  - type: text
    content: 'full of deadly poison. '
  '9':
  - type: text
    content: 'With it we bless our Lord and Father, and with it we curse people '
  - type: note
    content: See Gen. 1:26
  - type: text
    content: 'who are made in the likeness of God. '
