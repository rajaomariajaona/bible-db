      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 12:37
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he is a perfect man, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:26
      marker-yv: yv-n
    - type: text
      text: 'able also to bridle his whole body. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we put '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 32:9
      marker-yv: yv-n
    - type: text
      text: 'bits into the mouths of horses so that they obey us, we guide their whole bodies as well. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look at the ships also: though they are so large and are driven by strong winds, they are guided by a very small rudder wherever the will of the pilot directs. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So also the tongue is a small member, yet '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 12:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 73:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: it boasts of great things.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How great a forest is set ablaze by such a small fire! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 120:2-4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 16:27
      marker-yv: yv-n
    - type: text
      text: 'the tongue is a fire, a world of unrighteousness. The tongue is set among our members, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 15:18
      marker-yv: yv-n
    - type: text
      text: staining the whole body, setting on fire the entire course of life,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wheel of birth
      marker-yv: yv-n
    - type: text
      text: ' and set on fire by hell.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gehenna
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every kind of beast and bird, of reptile and sea creature, can be tamed and has been tamed by mankind, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but no human being can tame the tongue. It is a restless evil, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 140:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 10:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 3:13
      marker-yv: yv-n
    - type: text
      text: 'full of deadly poison. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With it we bless our Lord and Father, and with it we curse people '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
