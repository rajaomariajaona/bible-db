  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For where jealousy and selfish ambition exist, there will be disorder and every vile practice. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
