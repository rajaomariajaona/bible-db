        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Not many of you should become teachers, my brothers, for you know that we who teach will be judged with greater strictness. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the same mouth come blessing and cursing. My brothers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers and sisters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 12
      marker-yv: yv-n
    - type: text
      text: ' these things ought not to be so. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Does a spring pour forth from the same opening both fresh and salt water? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Can a fig tree, my brothers, bear olives, or a grapevine produce figs? Neither can a salt pond yield fresh water.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom from Above
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who is wise and understanding among you? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:18
      marker-yv: yv-n
    - type: text
      text: 'By his good conduct let him show his works '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:21
      marker-yv: yv-n
    - type: text
      text: 'in the meekness of wisdom. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you have bitter '
    - type: usfm
