      marker-yv: yv-n
    - type: text
      text: 'jealousy and selfish ambition in your hearts, do not boast and be false to the truth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is not '
    - type: usfm
      marker: x
