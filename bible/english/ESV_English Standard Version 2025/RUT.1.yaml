document_id: RUT.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Naomi Widowed
  - type: text
    content: 'In the days '
  - type: note
    content: Judg. 2:16
  - type: text
    content: 'when the judges ruled there was '
  - type: note
    content: Gen. 12:10; 26:1; 43:1; 2 Kgs. 8:1
  - type: text
    content: 'a famine in the land, and a man of '
  - type: note
    content: See Judg. 17:7
  - type: text
    content: 'Bethlehem in Judah went to sojourn in the country of Moab, he and his wife and his two sons. '
  '10':
  - type: text
    content: 'And they said to her, “No, we will return with you to your people.” '
  '11':
  - type: text
    content: 'But Naomi said, “Turn back, my daughters; why will you go with me? Have I yet sons in my womb '
  - type: note
    content: Gen. 38:11; Deut. 25:5
  - type: text
    content: 'that they may become your husbands? '
  '12':
  - type: text
    content: 'Turn back, my daughters; go your way, for I am too old to have a husband. If I should say I have hope, even if I should have a husband this night and should bear sons, '
  '13':
  - type: text
    content: 'would you therefore wait till they were grown? Would you therefore refrain from marrying? No, my daughters, for it is exceedingly bitter to me for your sake that '
  - type: note
    content: Judg. 2:15; [Job 19:21; Ps. 32:4; 38:2; 39:10]
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' has gone out against me.” '
  '14':
  - type: text
    content: Then they lifted up their voices and wept again. And Orpah kissed her mother-in-law, but Ruth clung to her.
  '15':
  - type: text
    content: 'And she said, “See, your sister-in-law has gone back to her people and to '
  - type: note
    content: Judg. 11:24; 1 Kgs. 11:7; Jer. 48:7, 13, 46
  - type: text
    content: 'her gods; return after your sister-in-law.” '
  '16':
  - type: text
    content: 'But Ruth said, “Do not urge me to leave you or to return from following you. For where you go I will go, and where you lodge I will lodge. '
  - type: note
    content: '[ch. 2:11, 12]'
  - type: text
    content: 'Your people shall be my people, and your God my God. '
  '17':
  - type: text
    content: 'Where you die I will die, and there will I be buried. '
  - type: note
    content: 1 Sam. 3:17; 25:22; 2 Sam. 19:13; 1 Kgs. 2:23
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' do so to me and more also if anything but death parts me from you.” '
  '18':
  - type: note
    content: '[Acts 21:14]'
  - type: text
    content: And when Naomi saw that she was determined to go with her, she said no more.
  - type: heading
    content: Naomi and Ruth Return
  '19':
  - type: text
    content: 'So the two of them went on until they came to Bethlehem. And when they came to Bethlehem, '
  - type: note
    content: '[Matt. 21:10]'
  - type: text
    content: 'the whole town was stirred because of them. And the women said, “Is this Naomi?” '
  '2':
  - type: text
    content: 'The name of the man was Elimelech and the name of his wife Naomi, and the names of his two sons were Mahlon and Chilion. They were '
  - type: note
    content: Gen. 35:19
  - type: text
    content: 'Ephrathites from Bethlehem in Judah. They went into the country of Moab and remained there. '
  '20':
  - type: text
    content: She said to them, “Do not call me Naomi;
  - type: note
    content: Naomi means pleasant
  - type: text
    content: ' call me '
  - type: note
    content: Ex. 15:23
  - type: text
    content: Mara,
  - type: note
    content: Mara means bitter
  - type: text
    content: ' for the Almighty has dealt very bitterly with me. '
  '21':
  - type: note
    content: Job 1:21
  - type: text
    content: 'I went away full, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought me back empty. Why call me Naomi, when the '
  - type: text
    content: Lord
  - type: text
    content: ' has testified against me and the Almighty has brought calamity upon me?”'
  '22':
  - type: text
    content: 'So Naomi returned, and Ruth the Moabite her daughter-in-law with her, who returned from the country of Moab. And they came to Bethlehem '
  - type: note
    content: 2 Sam. 21:9; [ch. 2:23]
  - type: text
    content: at the beginning of barley harvest.
  '3':
  - type: text
    content: 'But Elimelech, the husband of Naomi, died, and she was left with her two sons. '
  '4':
  - type: text
    content: 'These took Moabite wives; the name of the one was Orpah and the name of the other Ruth. They lived there about ten years, '
  '5':
  - type: text
    content: and both Mahlon and Chilion died, so that the woman was left without her two sons and her husband.
  - type: heading
    content: Ruth’s Loyalty to Naomi
  '6':
  - type: text
    content: 'Then she arose with her daughters-in-law to return from the country of Moab, for she had heard in the fields of Moab that '
  - type: note
    content: Ex. 3:16; 4:31; Luke 1:68
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had visited his people and '
  - type: note
    content: Ps. 132:15
  - type: text
    content: 'given them food. '
  '7':
  - type: text
    content: 'So she set out from the place where she was with her two daughters-in-law, and they went on the way to return to the land of Judah. '
  '8':
  - type: text
    content: 'But Naomi said to her two daughters-in-law, “Go, return each of you to her mother’s house. May the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Josh. 2:12, 14; Judg. 1:24
  - type: text
    content: 'deal kindly with you, as you have dealt with '
  - type: note
    content: ver. 5; ch. 2:20
  - type: text
    content: 'the dead and with me. '
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' grant that you may find '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'rest, each of you in the house of her husband!” Then she kissed them, and they lifted up their voices and wept. '
