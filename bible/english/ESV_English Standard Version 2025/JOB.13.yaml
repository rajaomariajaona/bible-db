verses:
  '1':
  - type: heading
    content: 'Job Continues: Still I Will Hope in God'
  - type: text
    content: “Behold, my eye has seen all this,
  - type: text
    content: my ear has heard and understood it.
  '10':
  - type: text
    content: He will surely rebuke you
  - type: text
    content: if in secret you show partiality.
  '11':
  - type: text
    content: 'Will not his '
  - type: note
    content: ch. 31:23
  - type: text
    content: majesty terrify you,
  - type: text
    content: and the dread of him fall upon you?
  '12':
  - type: text
    content: 'Your maxims are proverbs of '
  - type: note
    content: Isa. 44:20
  - type: text
    content: ashes;
  - type: text
    content: your defenses are defenses of clay.
  '13':
  - type: text
    content: “Let me have silence, and I will speak,
  - type: text
    content: and let come on me what may.
  '14':
  - type: text
    content: Why should I take my flesh in my teeth
  - type: text
    content: 'and '
  - type: note
    content: See Judg. 12:3
  - type: text
    content: put my life in my hand?
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 14:32 ]'
  - type: text
    content: 'Though he slay me, I will '
  - type: note
    content: ch. 14:14
  - type: text
    content: hope in him;
  - type: note
    content: Or Behold, he will slay me; I have no hope
  - type: text
    content: 'yet I will '
  - type: note
    content: '[ver. 3; ch. 27:5]'
  - type: text
    content: argue my ways to his face.
  '16':
  - type: text
    content: This will be my salvation,
  - type: text
    content: that the godless shall not come before him.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:2
  - type: text
    content: Keep listening to my words,
  - type: text
    content: and let my declaration be in your ears.
  '18':
  - type: text
    content: 'Behold, I have '
  - type: note
    content: See ch. 33:5
  - type: text
    content: prepared my case;
  - type: text
    content: I know that I shall be in the right.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Isa. 50:8, 9
  - type: text
    content: Who is there who will contend with me?
  - type: text
    content: For then I would be silent and die.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:3; 15:9 ]'
  - type: text
    content: What you know, I also know;
  - type: text
    content: I am not inferior to you.
  '20':
  - type: text
    content: Only grant me two things,
  - type: text
    content: 'then I will not '
  - type: note
    content: '[Gen. 3:8]'
  - type: text
    content: 'hide myself from your face:'
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:34; Ps. 39:10
  - type: text
    content: withdraw your hand far from me,
  - type: text
    content: 'and let not '
  - type: note
    content: ch. 9:34; 33:7
  - type: text
    content: dread of you terrify me.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 14:15
  - type: text
    content: Then call, and I will answer;
  - type: text
    content: or let me speak, and you reply to me.
  '23':
  - type: text
    content: How many are my iniquities and my sins?
  - type: note
    content: '[ Ps. 19:12 ]'
  - type: text
    content: Make me know my transgression and my sin.
  '24':
  - type: text
    content: 'Why '
  - type: note
    content: Deut. 32:20
  - type: text
    content: do you hide your face
  - type: text
    content: 'and '
  - type: note
    content: ch. 19:11; 33:10; [Lam. 2:5]
  - type: text
    content: count me as your enemy?
  '25':
  - type: text
    content: 'Will you frighten '
  - type: note
    content: Lev. 26:36
  - type: text
    content: a driven leaf
  - type: text
    content: 'and pursue dry '
  - type: note
    content: ch. 21:18; Ps. 83:13
  - type: text
    content: chaff?
  '26':
  - type: text
    content: 'For you '
  - type: note
    content: '[Ps. 149:9]'
  - type: text
    content: write bitter things against me
  - type: text
    content: 'and make me inherit '
  - type: note
    content: Ps. 25:7
  - type: text
    content: the iniquities of my youth.
  '27':
  - type: text
    content: 'You put my feet in '
  - type: note
    content: '[ch. 33:11]'
  - type: text
    content: the stocks
  - type: text
    content: 'and '
  - type: note
    content: See ch. 10:14
  - type: text
    content: watch all my paths;
  - type: text
    content: you set a limit for
  - type: note
    content: Or you marked
  - type: text
    content: ' the soles of my feet.'
  '28':
  - type: text
    content: Man
  - type: note
    content: Hebrew He
  - type: text
    content: ' wastes away like '
  - type: note
    content: Prov. 12:4; 14:30; Hab. 3:16
  - type: text
    content: a rotten thing,
  - type: text
    content: 'like a garment that is '
  - type: note
    content: ch. 4:19
  - type: text
    content: moth-eaten.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:4; 31:35
  - type: text
    content: But I would speak to the Almighty,
  - type: text
    content: 'and I desire to '
  - type: note
    content: '[ver. 15, 18]'
  - type: text
    content: argue my case with God.
  '4':
  - type: text
    content: 'As for you, '
  - type: note
    content: Ps. 119:69
  - type: text
    content: you whitewash with lies;
  - type: note
    content: '[ch. 16:2 ]'
  - type: text
    content: worthless physicians are you all.
  '5':
  - type: text
    content: 'Oh that you would '
  - type: note
    content: Prov. 17:28
  - type: text
    content: keep silent,
  - type: text
    content: and it would be your wisdom!
  '6':
  - type: text
    content: Hear now my argument
  - type: text
    content: and listen to the pleadings of my lips.
  '7':
  - type: text
    content: 'Will you '
  - type: note
    content: ch. 27:4
  - type: text
    content: speak falsely for God
  - type: text
    content: 'and speak '
  - type: note
    content: ch. 27:4
  - type: text
    content: deceitfully for him?
  '8':
  - type: text
    content: Will you show partiality toward him?
  - type: text
    content: 'Will you '
  - type: note
    content: '[Judg. 6:31]'
  - type: text
    content: plead the case for God?
  '9':
  - type: text
    content: 'Will it be well with you when he '
  - type: note
    content: Prov. 28:11
  - type: text
    content: searches you out?
  - type: text
    content: 'Or '
  - type: note
    content: Gal. 6:7
  - type: text
    content: can you deceive him, as one deceives a man?
