document_id: EZK.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel in Babylon
  - type: text
    content: ' '
  - type: note
    content: '[ver. 3; Num. 4:3 ]'
  - type: text
    content: 'In the thirtieth year, in the fourth month, on the fifth day of the month, as I was among the exiles by '
  - type: note
    content: ch. 3:15, 23; 10:15, 20, 22; 43:3
  - type: text
    content: 'the Chebar canal, '
  - type: note
    content: '[Matt. 3:16; Mark 1:10; Luke 3:21; John 1:51; Acts 7:56; 10:11; Rev. 19:11]'
  - type: text
    content: 'the heavens were opened, and I saw '
  - type: note
    content: ch. 8:3; 40:2; [ch. 11:24; Num. 12:6]
  - type: text
    content: visions of God.
  - type: note
    content: Or from God
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'As for the likeness of their faces, '
  - type: note
    content: ch. 10:14, 21
  - type: text
    content: 'each had a human face. The four had the face of a lion on the right side, the four had the face of an ox on the left side, and the four had the face of an eagle. '
  '11':
  - type: text
    content: 'Such were their faces. And their wings were spread out above. Each creature had two wings, each of which touched the wing of another, while '
  - type: note
    content: ver. 23; [Isa. 6:2]
  - type: text
    content: 'two covered their bodies. '
  '12':
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'And each went straight forward. '
  - type: note
    content: ch. 10:17
  - type: text
    content: Wherever the spirit
  - type: note
    content: Or Spirit; also twice in verse 20 and once in verse 21
  - type: text
    content: ' would go, they went, without turning as they went. '
  '13':
  - type: text
    content: 'As for the likeness of the living creatures, their appearance was '
  - type: note
    content: '[Ps. 104:4]'
  - type: text
    content: 'like burning coals of fire, '
  - type: note
    content: '[Ps. 104:4]'
  - type: text
    content: 'like the appearance of torches moving to and fro among the living creatures. '
  - type: note
    content: '[Ps. 97:3, 4]'
  - type: text
    content: 'And the fire was bright, and out of the fire went forth lightning. '
  '14':
  - type: text
    content: 'And the living creatures '
  - type: note
    content: '[Zech. 4:10]'
  - type: text
    content: 'darted to and fro, '
  - type: note
    content: '[Matt. 24:27; Luke 17:24]'
  - type: text
    content: like the appearance of a flash of lightning.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:9; [ Dan. 7:9 ]
  - type: text
    content: Now as I looked at the living creatures, I saw a wheel on the earth beside the living creatures, one for each of the four of them.
  - type: note
    content: Hebrew of their faces
  - type: text
    content: ' '
  '16':
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'As for the appearance of the wheels and their construction: their appearance was like '
  - type: note
    content: '[Dan. 10:6]'
  - type: text
    content: 'the gleaming of beryl. '
  - type: note
    content: ch. 10:10
  - type: text
    content: 'And the four had the same likeness, their appearance and construction being as it were a wheel within a wheel. '
  '17':
  - type: note
    content: ch. 10:11
  - type: text
    content: 'When they went, they went '
  - type: note
    content: ver. 8
  - type: text
    content: in any of their four directions
  - type: note
    content: Hebrew on their four sides
  - type: text
    content: ' '
  - type: note
    content: ver. 9
  - type: text
    content: 'without turning as they went. '
  '18':
  - type: text
    content: 'And their rims were tall and awesome, '
  - type: note
    content: ch. 10:12; [Rev. 4:8]
  - type: text
    content: 'and the rims of all four were full of eyes all around. '
  '19':
  - type: note
    content: ch. 10:16
  - type: text
    content: 'And when the living creatures went, the wheels went beside them; '
  - type: note
    content: '[ch. 10:19; 11:22]'
  - type: text
    content: 'and when the living creatures rose from the earth, the wheels rose. '
  '2':
  - type: text
    content: 'On the fifth day of the month (it was '
  - type: note
    content: '[ch. 8:1]; See ch. 20:1'
  - type: text
    content: 'the fifth year of '
  - type: note
    content: 2 Kgs. 24:12, 15; [ch. 17:12; 19:8; 33:21; 40:1]
  - type: text
    content: 'the exile of King Jehoiachin), '
  '20':
  - type: note
    content: ch. 10:17
  - type: text
    content: 'Wherever the spirit wanted to go, they went, and the wheels rose along with them, '
  - type: note
    content: ch. 10:17
  - type: text
    content: for the spirit of the living creatures
  - type: note
    content: Or the spirit of life; also verse 21
  - type: text
    content: ' was in the wheels. '
  '21':
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'When those went, these went; and when those stood, these stood; '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'and when those rose from the earth, the wheels rose along with them, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: for the spirit of the living creatures was in the wheels.
  '22':
  - type: text
    content: 'Over the heads of the living creatures there was '
  - type: note
    content: '[ver. 25, 26; ch. 10:1]'
  - type: text
    content: 'the likeness of an expanse, shining like awe-inspiring '
  - type: note
    content: '[Rev. 4:6]'
  - type: text
    content: 'crystal, spread out above their heads. '
  '23':
  - type: text
    content: 'And under the expanse their wings were '
  - type: note
    content: ver. 7
  - type: text
    content: 'stretched out straight, one toward another. '
  - type: note
    content: ver. 11
  - type: text
    content: 'And each creature had two wings covering its body. '
  '24':
  - type: text
    content: 'And when they went, I heard the sound of their wings '
  - type: note
    content: ch. 43:2; [Rev. 1:15]
  - type: text
    content: 'like the sound of many waters, like '
  - type: note
    content: Ps. 29:3, 4; 68:33
  - type: text
    content: 'the sound of the '
  - type: note
    content: See Gen. 17:1
  - type: text
    content: 'Almighty, a sound of tumult '
  - type: note
    content: Dan. 10:6; [Rev. 19:6]
  - type: text
    content: 'like the sound of an army. When they stood still, they let down their wings. '
  '25':
  - type: text
    content: 'And there came a voice from above '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: the expanse over their heads. When they stood still, they let down their wings.
  '26':
  - type: text
    content: 'And above the expanse over their heads there was '
  - type: note
    content: ch. 10:1; [1 Kgs. 22:19]
  - type: text
    content: 'the likeness of a throne, '
  - type: note
    content: ch. 10:1; [1 Kgs. 22:19]
  - type: text
    content: 'in appearance '
  - type: note
    content: Ex. 24:10
  - type: text
    content: like sapphire;
  - type: note
    content: Or lapis lazuli
  - type: text
    content: ' and seated above the likeness of a throne was '
  - type: note
    content: Dan. 8:15; [Rev. 1:13]
  - type: text
    content: 'a likeness with a human appearance. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: ch. 8:2; [ver. 4]
  - type: text
    content: 'upward from what had the appearance of his waist I saw as it were '
  - type: note
    content: See ver. 4
  - type: text
    content: 'gleaming metal, like the appearance of fire enclosed all around. And downward from what had the appearance of his waist I saw as it were the appearance of fire, and '
  - type: note
    content: ver. 4
  - type: text
    content: there was brightness around him.
  - type: note
    content: Or it
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Like the appearance of '
  - type: note
    content: Gen. 9:13; [Rev. 4:3; 10:1]
  - type: text
    content: the bow that is in the cloud on the day of rain, so was the appearance of the brightness all around.
  - type: text
    content: 'Such was the appearance of the likeness of '
  - type: note
    content: ch. 3:23; 8:4; 9:3; 10:4, 18, 19; 11:22, 23; 43:4, 5; 44:4; [Ex. 24:16]
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: '. And when I saw it, '
  - type: note
    content: ch. 3:23; 43:3; 44:4; [Gen. 17:3, 17; Josh. 5:14; Dan. 8:17; Acts 9:4; Rev. 1:17]
  - type: text
    content: I fell on my face, and I heard the voice of one speaking.
  '3':
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Ezekiel '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: 'the priest, the son of Buzi, in the land of the Chaldeans by '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the Chebar canal, and '
  - type: note
    content: ch. 3:22; 8:1; 33:22; 37:1; 40:1; [1 Kgs. 18:46; 2 Kgs. 3:15]
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was upon him there.'
  - type: heading
    content: The Glory of the Lord
  '4':
  - type: text
    content: 'As I looked, behold, '
  - type: note
    content: Jer. 23:19; 25:32; 30:23; [ch. 3:12]
  - type: text
    content: 'a stormy wind came '
  - type: note
    content: See Jer. 1:14
  - type: text
    content: 'out of the north, and a great cloud, with '
  - type: note
    content: ver. 27
  - type: text
    content: 'brightness around it, and fire flashing forth continually, and in the midst of the fire, '
  - type: note
    content: ver. 27; ch. 8:2
  - type: text
    content: as it were gleaming metal.
  - type: note
    content: Or amber; also verse 27
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And from the midst of it came the likeness of '
  - type: note
    content: See Rev. 4:6-8
  - type: text
    content: 'four living creatures. '
  - type: note
    content: ch. 10:14, 21
  - type: text
    content: 'And this was their appearance: they had a human likeness, '
  '6':
  - type: note
    content: ch. 10:21
  - type: text
    content: 'but each had four faces, and each of them had four wings. '
  '7':
  - type: text
    content: 'Their legs were straight, and the soles of their feet were like the sole of a calf’s foot. And they sparkled '
  - type: note
    content: ch. 40:3; Rev. 1:15; 2:18
  - type: text
    content: 'like burnished bronze. '
  '8':
  - type: text
    content: 'Under their wings '
  - type: note
    content: ver. 17; ch. 10:11
  - type: text
    content: 'on their four sides '
  - type: note
    content: ch. 10:8, 21
  - type: text
    content: 'they had human hands. And the four had their faces and their wings thus: '
  '9':
  - type: text
    content: 'their wings touched one another. '
  - type: note
    content: ch. 10:22
  - type: text
    content: 'Each one of them went straight forward, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'without turning as they went. '
