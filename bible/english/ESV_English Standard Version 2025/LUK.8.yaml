document_id: LUK.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Women Accompanying Jesus
  - type: text
    content: 'Soon afterward he went on '
  - type: note
    content: See Mark 6:6
  - type: text
    content: 'through cities and villages, proclaiming and '
  - type: note
    content: See ch. 4:43
  - type: text
    content: 'bringing the good news of the kingdom of God. And the twelve were with him, '
  '10':
  - type: text
    content: 'he said, '
  - type: note
    content: Matt. 19:11; Col. 1:27; [1 Cor. 2:6-10; 1 John 2:20, 27]; See Matt. 11:25
  - type: text
    content: '“To you it has been given to know '
  - type: note
    content: See Rom. 16:25
  - type: text
    content: 'the secrets of the kingdom of God, but for others they are in parables, so '
  - type: note
    content: Isa. 6:9, 10; See Matt. 13:13
  - type: text
    content: that ‘seeing they may not see, and hearing they may not understand.’
  - type: text
    content: ' '
  '11':
  - type: note
    content: For ver. 11-15, see Matt. 13:18-23; Mark 4:13-20
  - type: text
    content: 'Now the parable is this: The seed is '
  - type: note
    content: ch. 1:2; Mark 2:2; 4:33; Acts 8:4; James 1:21
  - type: text
    content: the word of God.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'The ones along the path are those who have heard; then the devil comes and takes away the word from their hearts, so that they may not '
  - type: note
    content: See Mark 16:16
  - type: text
    content: believe and be saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And the ones on the rock are those who, when they hear the word, receive it '
  - type: note
    content: '[Isa. 58:2; Ezek. 33:31, 32; Mark 6:20; John 5:35]'
  - type: text
    content: 'with joy. But these have no root; they '
  - type: note
    content: Gal. 1:6; [Hos. 6:4; Gal. 5:7]
  - type: text
    content: 'believe for a while, and in time of testing '
  - type: note
    content: 1 Tim. 4:1; Heb. 3:12
  - type: text
    content: fall away.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And as for what fell among the thorns, they are those who hear, but '
  - type: note
    content: '[James 1:11]'
  - type: text
    content: 'as they go on their way they are choked by the '
  - type: note
    content: See Matt. 6:25
  - type: text
    content: cares and riches and pleasures of life, and their fruit does not mature.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'As for that in the good soil, they are those who, hearing the word, hold it fast in an honest and good heart, and '
  - type: note
    content: Hos. 14:8; John 15:5, 6; Phil. 1:11; Col. 1:6
  - type: text
    content: 'bear fruit '
  - type: note
    content: James 5:7; See Heb. 10:36
  - type: text
    content: with patience.
  - type: heading
    content: A Lamp Under a Jar
  '16':
  - type: text
    content: ' '
  - type: note
    content: For ver. 16-18, see Mark 4:21-25
  - type: note
    content: ch. 11:33; Matt. 5:15
  - type: text
    content: “No one after lighting a lamp covers it with a jar or puts it under a bed, but puts it on a stand, so that those who enter may see the light.
  - type: text
    content: ' '
  '17':
  - type: note
    content: ch. 12:2; Matt. 10:26; [1 Tim. 5:25]
  - type: text
    content: For nothing is hidden that will not be made manifest, nor is anything secret that will not be known and come to light.
  - type: text
    content: ' '
  '18':
  - type: note
    content: '[ver. 11-15]'
  - type: text
    content: 'Take care then how you hear, '
  - type: note
    content: See Matt. 13:12
  - type: text
    content: for to the one who has, more will be given, and from the one who has not, even what he thinks that he has will be taken away.”
  - type: heading
    content: Jesus’ Mother and Brothers
  '19':
  - type: text
    content: ' '
  - type: note
    content: For ver. 19-21, see Matt. 12:46-50; Mark 3:31-35
  - type: text
    content: 'Then his mother and '
  - type: note
    content: Matt. 13:55; Mark 6:3; John 2:12; 7:3, 5, 10; Acts 1:14; 1 Cor. 9:5; Gal. 1:19
  - type: text
    content: his brothers
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verses 20, 21
  - type: text
    content: ' came to him, but they could not reach him because of the crowd. '
  '2':
  - type: text
    content: 'and also '
  - type: note
    content: ch. 23:49, 55; Matt. 27:55; Mark 15:40, 41; Acts 1:14
  - type: text
    content: 'some women who had been healed of evil spirits and infirmities: '
  - type: note
    content: ch. 24:10; Matt. 27:56, 61; 28:1; John 19:25; 20:1, 18
  - type: text
    content: 'Mary, called Magdalene, '
  - type: note
    content: Mark 16:9
  - type: text
    content: 'from whom seven demons had gone out, '
  '20':
  - type: text
    content: 'And he was told, “Your mother and your brothers are standing outside, desiring to see you.” '
  '21':
  - type: text
    content: 'But he answered them, '
  - type: text
    content: '“My mother and my brothers are those '
  - type: note
    content: ch. 11:28; See James 1:22
  - type: text
    content: who hear the word of God and do it.”
  - type: heading
    content: Jesus Calms a Storm
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22-25, see Matt. 8:23-27; Mark 4:36-41; [ John 6:16-21 ]
  - type: text
    content: 'One day he got into a boat with his disciples, and he said to them, '
  - type: text
    content: '“Let us go across to the other side of '
  - type: note
    content: ver. 33; See ch. 5:1
  - type: text
    content: the lake.”
  - type: text
    content: ' So they set out, '
  '23':
  - type: text
    content: 'and as they sailed he fell asleep. And a windstorm came down on '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'the lake, and they were filling with water and were in danger. '
  '24':
  - type: text
    content: 'And they went and woke him, saying, “Master, Master, we are perishing!” And he awoke and '
  - type: note
    content: ch. 4:39; Ps. 104:7
  - type: text
    content: 'rebuked the wind and the raging waves, and they ceased, '
  - type: note
    content: Ps. 65:7; [Matt. 14:32; Mark 6:51]
  - type: text
    content: 'and there was a calm. '
  '25':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Where is your faith?”
  - type: text
    content: ' And they '
  - type: note
    content: John 14:27
  - type: text
    content: 'were afraid, and they '
  - type: note
    content: '[Mark 1:27]'
  - type: text
    content: 'marveled, saying to one another, “Who then is this, that '
  - type: note
    content: '[ch. 5:9]'
  - type: text
    content: he commands even winds and water, and they obey him?”
  - type: heading
    content: Jesus Heals a Man with a Demon
  '26':
  - type: text
    content: ' '
  - type: note
    content: For ver. 26-40, see Matt. 8:28–9:1; Mark 5:1-21
  - type: text
    content: Then they sailed to the country of the Gerasenes,
  - type: note
    content: Some manuscripts Gadarenes; others Gergesenes; also verse 37
  - type: text
    content: ' which is opposite Galilee. '
  '27':
  - type: text
    content: When Jesus
  - type: note
    content: Greek he; also verses 38, 42
  - type: text
    content: ' had stepped out on land, there met him a man from the city who had demons. For a long time he had worn no clothes, and he had not lived in a house '
  - type: note
    content: '[Rev. 18:2]'
  - type: text
    content: 'but among the tombs. '
  '28':
  - type: text
    content: 'When he saw Jesus, he '
  - type: note
    content: ch. 4:33, 34; Mark 1:23, 24, 26; Acts 8:7
  - type: text
    content: 'cried out and fell down before him and said '
  - type: note
    content: ch. 4:33, 34; Mark 1:23, 24, 26; Acts 8:7
  - type: text
    content: 'with a loud voice, “What have you to do with me, Jesus, '
  - type: note
    content: '[ch. 4:3, 9]; See Matt. 14:33'
  - type: text
    content: 'Son of '
  - type: note
    content: ch. 1:32; 6:35; Gen. 14:18; Num. 24:16; Ps. 57:2; Isa. 14:14; Dan. 3:26; Acts 16:17
  - type: text
    content: 'the Most High God? I beg you, do not torment me.” '
  '29':
  - type: text
    content: 'For he had commanded the unclean spirit to come out of the man. (For many a time it had seized him. He was kept under guard and bound with chains and shackles, but he would break the bonds and be driven by the demon '
  - type: note
    content: '[ch. 11:24; Matt. 12:43]'
  - type: text
    content: 'into the desert.) '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: ch. 24:10
  - type: text
    content: Joanna, the wife of Chuza, Herod’s household manager, and Susanna, and many others, who provided for them
  - type: note
    content: Some manuscripts him
  - type: text
    content: ' out of their means.'
  - type: heading
    content: The Parable of the Sower
  '30':
  - type: text
    content: 'Jesus then asked him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: ' And he said, '
  - type: note
    content: Matt. 26:53
  - type: text
    content: '“Legion,” for many demons had entered him. '
  '31':
  - type: text
    content: 'And they begged him not to command them to depart into '
  - type: note
    content: See Rev. 9:1
  - type: text
    content: 'the abyss. '
  '32':
  - type: text
    content: 'Now a large herd of pigs was feeding there on the hillside, and they begged him to let them enter these. So he gave them permission. '
  '33':
  - type: text
    content: 'Then the demons came out of the man and entered the pigs, and the herd rushed down the steep bank into '
  - type: note
    content: ver. 22, 23
  - type: text
    content: the lake and drowned.
  '34':
  - type: text
    content: 'When the herdsmen saw what had happened, they fled and told it in the city and in the country. '
  '35':
  - type: text
    content: 'Then people went out to see what had happened, and they came to Jesus and found the man from whom the demons had gone, sitting '
  - type: note
    content: ch. 10:39
  - type: text
    content: 'at the feet of Jesus, '
  - type: note
    content: '[ver. 27]'
  - type: text
    content: 'clothed and in his right mind, and they were afraid. '
  '36':
  - type: text
    content: And those who had seen it told them how the demon-possessed
  - type: note
    content: Greek daimonizomai (demonized); elsewhere rendered oppressed by demons
  - type: text
    content: ' man had been healed. '
  '37':
  - type: text
    content: 'Then all the people of the surrounding country of the Gerasenes '
  - type: note
    content: '[ch. 5:8; Acts 16:39]'
  - type: text
    content: 'asked him to depart from them, for they were seized with great fear. So he got into the boat and returned. '
  '38':
  - type: text
    content: 'The man from whom the demons had gone begged that he might be with him, but Jesus sent him away, saying, '
  '39':
  - type: text
    content: '“Return to your home, and '
  - type: note
    content: Ps. 66:16; [ch. 5:14]
  - type: text
    content: declare how much God has done for you.”
  - type: text
    content: ' And he went away, proclaiming throughout the whole city how much Jesus had done for him.'
  - type: heading
    content: Jesus Heals a Woman and Jairus’s Daughter
  '4':
  - type: text
    content: ' '
  - type: note
    content: For ver. 4-10, see Matt. 13:1-15; Mark 4:1-12
  - type: text
    content: 'And when a great crowd was gathering and people from town after town came to him, he said in a parable, '
  '40':
  - type: text
    content: 'Now when Jesus returned, the crowd '
  - type: note
    content: ch. 9:11
  - type: text
    content: 'welcomed him, for they were all waiting for him. '
  '41':
  - type: note
    content: For ver. 41-56, see Matt. 9:18-26; Mark 5:22-43
  - type: text
    content: 'And there came a man named Jairus, who was '
  - type: note
    content: ch. 13:14; Acts 13:15; 18:8, 17
  - type: text
    content: 'a ruler of the synagogue. And falling at Jesus’ feet, he implored him to come to his house, '
  '42':
  - type: text
    content: 'for he had '
  - type: note
    content: See ch. 7:12
  - type: text
    content: an only daughter, about twelve years of age, and she was dying.
  - type: text
    content: 'As Jesus went, the people '
  - type: note
    content: ver. 45; Mark 3:9
  - type: text
    content: 'pressed around him. '
  '43':
  - type: text
    content: 'And there was a woman '
  - type: note
    content: Lev. 15:25
  - type: text
    content: 'who had had a discharge of blood for twelve years, and though she had spent all her '
  - type: note
    content: ch. 21:4; Mark 12:44
  - type: text
    content: living on physicians,
  - type: note
    content: Some manuscripts omit and though she had spent all her living on physicians
  - type: text
    content: ' she could not be healed by anyone. '
  '44':
  - type: text
    content: 'She came up behind him and touched '
  - type: note
    content: Matt. 14:36; 23:5; [Num. 15:38, 39; Deut. 22:12]
  - type: text
    content: 'the fringe of his garment, and '
  - type: note
    content: Matt. 15:28; 17:18
  - type: text
    content: 'immediately her discharge of blood ceased. '
  '45':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: “Who was it that touched me?”
  - type: text
    content: ' When all denied it, Peter'
  - type: note
    content: Some manuscripts add and those who were with him
  - type: text
    content: ' said, “Master, the crowds surround you and are pressing in on you!” '
  '46':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: '“Someone touched me, for I perceive that '
  - type: note
    content: ch. 5:17; 6:19; [Acts 10:38]
  - type: text
    content: power has gone out from me.”
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And when the woman saw that she was not hidden, she came trembling, and falling down before him declared in the presence of all the people why she had touched him, and how she had been immediately healed. '
  '48':
  - type: text
    content: 'And he said to her, '
  - type: text
    content: '“Daughter, '
  - type: note
    content: See ch. 7:50
  - type: text
    content: 'your faith has made you well; '
  - type: note
    content: See ch. 7:50
  - type: text
    content: go in peace.”
  '49':
  - type: text
    content: 'While he was still speaking, someone from '
  - type: note
    content: ver. 41
  - type: text
    content: 'the ruler’s house came and said, “Your daughter is dead; '
  - type: note
    content: ch. 7:6
  - type: text
    content: 'do not trouble '
  - type: note
    content: See John 11:28
  - type: text
    content: 'the Teacher any more.” '
  '5':
  - type: note
    content: '[Isa. 55:10; Amos 9:13]'
  - type: text
    content: “A sower went out to sow his seed. And as he sowed, some fell along the path and was trampled underfoot, and the birds of the air devoured it.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But Jesus on hearing this answered him, '
  - type: text
    content: “Do not fear; only believe, and she will be well.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'And when he came to the house, he allowed no one to enter with him, except '
  - type: note
    content: ch. 9:28; Mark 14:33
  - type: text
    content: 'Peter and '
  - type: note
    content: Mark 3:17
  - type: text
    content: 'John and James, and the father and mother of the child. '
  '52':
  - type: text
    content: 'And all were weeping and '
  - type: note
    content: ch. 23:27; Matt. 11:17
  - type: text
    content: 'mourning for her, but he '
  - type: note
    content: ch. 7:13
  - type: text
    content: 'said, '
  - type: text
    content: '“Do not weep, for '
  - type: note
    content: '[Acts 20:10]'
  - type: text
    content: 'she is not dead but '
  - type: note
    content: John 11:4, 11
  - type: text
    content: sleeping.”
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'And they laughed at him, knowing that she was dead. '
  '54':
  - type: text
    content: 'But '
  - type: note
    content: See Mark 1:31
  - type: text
    content: 'taking her by the hand he called, saying, '
  - type: text
    content: '“Child, '
  - type: note
    content: ch. 7:14, 22; [Matt. 11:5; John 11:43]
  - type: text
    content: arise.”
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And '
  - type: note
    content: '[Judg. 15:19; 1 Sam. 30:12]'
  - type: text
    content: 'her spirit returned, and she got up at once. And he directed that something should be given her to eat. '
  '56':
  - type: text
    content: 'And her parents were amazed, but '
  - type: note
    content: See Matt. 8:4
  - type: text
    content: he charged them to tell no one what had happened.
  '6':
  - type: text
    content: 'And some fell on the rock, and as it grew up, '
  - type: note
    content: John 15:6
  - type: text
    content: it withered away, because it had no moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And some fell among '
  - type: note
    content: Jer. 4:3
  - type: text
    content: thorns, and the thorns grew up with it and choked it.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And some fell into good soil and grew and yielded '
  - type: note
    content: Gen. 26:12
  - type: text
    content: a hundredfold.”
  - type: text
    content: ' As he said these things, he called out, '
  - type: note
    content: See Matt. 11:15
  - type: text
    content: “He who has ears to hear, let him hear.”
  - type: heading
    content: The Purpose of the Parables
  '9':
  - type: text
    content: 'And when his disciples asked him what this parable meant, '
