document_id: 2CO.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ministers of the New Covenant
  - type: text
    content: ' '
  - type: note
    content: ch. 5:12; 10:12; 12:11
  - type: text
    content: 'Are we beginning to commend ourselves again? Or do we need, '
  - type: note
    content: '[ch. 11:4]'
  - type: text
    content: 'as some do, '
  - type: note
    content: '[Acts 18:27; 1 Cor. 16:3]'
  - type: text
    content: 'letters of recommendation to you, or from you? '
  '10':
  - type: text
    content: 'Indeed, in this case, what once had glory has come to have no glory at all, because of the glory that surpasses it. '
  '11':
  - type: text
    content: For if what was being brought to an end came with glory, much more will what is permanent have glory.
  '12':
  - type: text
    content: 'Since we have such a hope, '
  - type: note
    content: ch. 7:4; Eph. 6:19
  - type: text
    content: 'we are very bold, '
  '13':
  - type: text
    content: 'not like Moses, '
  - type: note
    content: ver. 7
  - type: text
    content: 'who would put a veil over his face so that the Israelites might not gaze at the outcome of what was being brought to an end. '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 4:4; Rom. 11:25]'
  - type: text
    content: 'their minds were '
  - type: note
    content: See Mark 6:52
  - type: text
    content: 'hardened. For to this day, '
  - type: note
    content: Acts 13:15; 15:21
  - type: text
    content: 'when they read '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'the old covenant, that same veil remains unlifted, because only through Christ is it taken away. '
  '15':
  - type: text
    content: 'Yes, to this day whenever Moses is read a veil lies over their hearts. '
  '16':
  - type: text
    content: 'But when '
  - type: note
    content: Rom. 11:23; [Ex. 34:34]
  - type: text
    content: one
  - type: note
    content: Greek he
  - type: text
    content: ' turns to the Lord, '
  - type: note
    content: '[Isa. 25:7]'
  - type: text
    content: 'the veil is removed. '
  '17':
  - type: text
    content: Now the Lord
  - type: note
    content: Or this Lord
  - type: text
    content: ' is the Spirit, and where '
  - type: note
    content: Isa. 61:1, 2; [Gal. 4:6]
  - type: text
    content: 'the Spirit of the Lord is, there is '
  - type: note
    content: Gal. 5:1, 13; See John 8:32
  - type: text
    content: 'freedom. '
  '18':
  - type: text
    content: 'And we all, with unveiled face, '
  - type: note
    content: See 1 Cor. 13:12
  - type: text
    content: 'beholding '
  - type: note
    content: ch. 4:4, 6; 1 Tim. 1:11; See John 17:24
  - type: text
    content: the glory of the Lord,
  - type: note
    content: Or reflecting the glory of the Lord
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:29; 1 Cor. 15:49
  - type: text
    content: 'are being transformed into the same image '
  - type: note
    content: '[Ps. 84:7]'
  - type: text
    content: from one degree of glory to another.
  - type: note
    content: Greek from glory to glory
  - type: text
    content: ' For this comes from the Lord who is the Spirit.'
  '2':
  - type: note
    content: '[1 Cor. 9:2]'
  - type: text
    content: You yourselves are our letter of recommendation, written on our
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' hearts, to be known and read by all. '
  '3':
  - type: text
    content: 'And you show that you are a letter from Christ delivered by us, written not with ink but with the Spirit of '
  - type: note
    content: See Matt. 16:16
  - type: text
    content: 'the living God, not on '
  - type: note
    content: Ex. 24:12
  - type: text
    content: 'tablets of stone but on '
  - type: note
    content: Prov. 3:3; 7:3; Jer. 17:1
  - type: text
    content: 'tablets of '
  - type: note
    content: Ezek. 11:19; 36:26; [Jer. 31:33; Heb. 8:10]
  - type: text
    content: human hearts.
  - type: note
    content: Greek fleshly hearts
  '4':
  - type: text
    content: ' '
  - type: note
    content: Eph. 3:12
  - type: text
    content: 'Such is the confidence that we have through Christ toward God. '
  '5':
  - type: note
    content: '[Eph. 2:8]'
  - type: text
    content: 'Not that we are sufficient in ourselves to claim anything as coming from us, but '
  - type: note
    content: See 1 Cor. 15:10
  - type: text
    content: 'our sufficiency is from God, '
  '6':
  - type: text
    content: 'who has made us sufficient to be '
  - type: note
    content: Eph. 3:7; Col. 1:23, 25; [ch. 4:1; 5:18; 1 Tim. 1:12]
  - type: text
    content: 'ministers of '
  - type: note
    content: Jer. 31:31; Luke 22:20; 1 Cor. 11:25; Heb. 8:8, 13; [ver. 14; Heb. 9:15]
  - type: text
    content: 'a new covenant, not of '
  - type: note
    content: See Rom. 2:27
  - type: text
    content: 'the letter but of the Spirit. For the letter kills, but '
  - type: note
    content: '[John 6:63; Rom. 8:2]'
  - type: text
    content: the Spirit gives life.
  '7':
  - type: text
    content: 'Now if '
  - type: note
    content: ver. 9; See Rom. 4:15
  - type: text
    content: 'the ministry of death, carved in letters on stone, came with such glory '
  - type: note
    content: ver. 13; Ex. 34:29-35
  - type: text
    content: 'that the Israelites could not gaze at Moses’ face because of its glory, which was being brought to an end, '
  '8':
  - type: text
    content: 'will not the ministry of the Spirit have even more glory? '
  '9':
  - type: text
    content: 'For if there was glory in '
  - type: note
    content: ver. 7; [Heb. 12:18-21]
  - type: text
    content: 'the ministry of condemnation, '
  - type: note
    content: ch. 11:15
  - type: text
    content: 'the ministry of righteousness must far exceed it in glory. '
