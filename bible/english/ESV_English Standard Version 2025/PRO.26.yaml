verses:
  '1':
  - type: text
    content: 'Like snow in summer or '
  - type: note
    content: '[1 Sam. 12:17]'
  - type: text
    content: rain in harvest,
  - type: text
    content: 'so '
  - type: note
    content: '[ver. 8]'
  - type: text
    content: 'honor is '
  - type: note
    content: ch. 17:7; 19:10
  - type: text
    content: not fitting for a fool.
  '10':
  - type: text
    content: Like an archer who wounds everyone
  - type: text
    content: is one who hires a passing fool or drunkard.
  - type: note
    content: Or hires a fool or passersby
  '11':
  - type: text
    content: 'Like '
  - type: note
    content: Cited 2 Pet. 2:22
  - type: text
    content: a dog that returns to his vomit
  - type: text
    content: 'is '
  - type: note
    content: '[Ex. 8:15]'
  - type: text
    content: a fool who repeats his folly.
  '12':
  - type: text
    content: 'Do you see a man who is '
  - type: note
    content: ch. 28:11; [Rom. 12:16]
  - type: text
    content: wise in his own eyes?
  - type: note
    content: ch. 29:20
  - type: text
    content: There is more hope for a fool than for him.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 22:13
  - type: text
    content: The sluggard says, “There is a lion in the road!
  - type: text
    content: There is a lion in the streets!”
  '14':
  - type: text
    content: As a door turns on its hinges,
  - type: text
    content: so does a sluggard on his bed.
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:24
  - type: text
    content: The sluggard buries his hand in the dish;
  - type: text
    content: it wears him out to bring it back to his mouth.
  '16':
  - type: text
    content: 'The sluggard is '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: wiser in his own eyes
  - type: note
    content: '[ver. 25; ch. 6:16 ]; See Job 5:19'
  - type: text
    content: than seven men who can answer sensibly.
  '17':
  - type: text
    content: Whoever meddles in a quarrel not his own
  - type: text
    content: is like one who takes a passing dog by the ears.
  '18':
  - type: text
    content: 'Like a madman who throws '
  - type: note
    content: '[Isa. 50:11]'
  - type: text
    content: firebrands, arrows, and death
  '19':
  - type: text
    content: is the man who deceives his neighbor
  - type: text
    content: and says, “I am only joking!”
  '2':
  - type: text
    content: 'Like '
  - type: note
    content: ch. 27:8; Ps. 84:3
  - type: text
    content: a sparrow in its flitting, like a swallow in its flying,
  - type: note
    content: '[ Num. 23:8; Deut. 23:5; 2 Sam. 16:12 ]'
  - type: text
    content: a curse that is causeless does not alight.
  '20':
  - type: text
    content: For lack of wood the fire goes out,
  - type: text
    content: 'and where there is no '
  - type: note
    content: ch. 16:28
  - type: text
    content: 'whisperer, '
  - type: note
    content: ch. 22:10
  - type: text
    content: quarreling ceases.
  '21':
  - type: text
    content: As charcoal to hot embers and wood to fire,
  - type: text
    content: 'so is '
  - type: note
    content: See ch. 15:18
  - type: text
    content: a quarrelsome man for kindling strife.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:8
  - type: text
    content: 'The words of '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: a whisperer are like delicious morsels;
  - type: text
    content: they go down into the inner parts of the body.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 23:27; Luke 11:39 ]'
  - type: text
    content: 'Like the '
  - type: note
    content: See ch. 25:4
  - type: text
    content: glaze
  - type: note
    content: By revocalization; Hebrew silver of dross
  - type: text
    content: ' covering an earthen vessel'
  - type: text
    content: are fervent lips with an evil heart.
  '24':
  - type: text
    content: Whoever hates disguises himself with his lips
  - type: text
    content: and harbors deceit in his heart;
  '25':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 28:3
  - type: text
    content: when he speaks graciously, believe him not,
  - type: text
    content: 'for there are '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: seven abominations in his heart;
  '26':
  - type: text
    content: though his hatred be covered with deception,
  - type: text
    content: his wickedness will be exposed in the assembly.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 28:10 ]; See Ps. 7:15'
  - type: text
    content: Whoever digs a pit will fall into it,
  - type: text
    content: and a stone will come back on him who starts it rolling.
  '28':
  - type: text
    content: A lying tongue hates its victims,
  - type: text
    content: and a flattering mouth works ruin.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 32:9 ]'
  - type: text
    content: A whip for the horse, a bridle for the donkey,
  - type: text
    content: 'and '
  - type: note
    content: See ch. 19:29
  - type: text
    content: a rod for the back of fools.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Sam. 16:11; 2 Kgs. 18:36; Luke 23:9 ]'
  - type: text
    content: Answer not a fool according to his folly,
  - type: text
    content: lest you be like him yourself.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 16:1-4; 21:24-27
  - type: text
    content: Answer a fool according to his folly,
  - type: text
    content: 'lest he be '
  - type: note
    content: ch. 28:11; [Rom. 12:16]
  - type: text
    content: wise in his own eyes.
  '6':
  - type: text
    content: Whoever sends a message by the hand of a fool
  - type: text
    content: 'cuts off his own feet and '
  - type: note
    content: '[ch. 13:2; Job 15:16]'
  - type: text
    content: drinks violence.
  '7':
  - type: text
    content: Like a lame man’s legs, which hang useless,
  - type: text
    content: is a proverb in the mouth of fools.
  '8':
  - type: text
    content: Like one who binds the stone in the sling
  - type: text
    content: 'is '
  - type: note
    content: '[ver. 1]'
  - type: text
    content: one who gives honor to a fool.
  '9':
  - type: text
    content: 'Like '
  - type: note
    content: '[ch. 23:35]'
  - type: text
    content: a thorn that goes up into the hand of a drunkard
  - type: text
    content: is a proverb in the mouth of fools.
