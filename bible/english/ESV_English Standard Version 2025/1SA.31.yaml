document_id: 1SA.31,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Saul
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-13, see 1 Chr. 10:1-12
  - type: text
    content: 'Now the Philistines were fighting against Israel, and the men of Israel fled before the Philistines and fell slain '
  - type: note
    content: ch. 28:4; [2 Sam. 1:6, 21; 21:12]
  - type: text
    content: 'on Mount Gilboa. '
  '10':
  - type: note
    content: '[ch. 21:9]'
  - type: text
    content: 'They put his armor in the temple of '
  - type: note
    content: See Judg. 2:13
  - type: text
    content: 'Ashtaroth, and they fastened his body to the wall of '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Beth-shan. '
  '11':
  - type: note
    content: 2 Sam. 21:10; See ch. 11:1-11
  - type: text
    content: 'But when the inhabitants of Jabesh-gilead heard what the Philistines had done to Saul, '
  '12':
  - type: note
    content: 2 Sam. 2:4-7
  - type: text
    content: 'all the valiant men arose and went all night and took the body of Saul and the bodies of his sons from the wall of Beth-shan, and they came to Jabesh '
  - type: note
    content: '[2 Chr. 16:14; 21:19; Jer. 34:5]'
  - type: text
    content: 'and burned them there. '
  '13':
  - type: text
    content: 'And they took their bones '
  - type: note
    content: 2 Sam. 21:12, 14
  - type: text
    content: 'and buried them under '
  - type: note
    content: '[ch. 22:6]'
  - type: text
    content: 'the tamarisk tree in Jabesh and '
  - type: note
    content: '[Gen. 50:10]'
  - type: text
    content: fasted seven days.
  '2':
  - type: text
    content: 'And the Philistines overtook Saul and his sons, and the Philistines struck down '
  - type: note
    content: 1 Chr. 8:33
  - type: text
    content: 'Jonathan and '
  - type: note
    content: '[ch. 14:49]'
  - type: text
    content: 'Abinadab and Malchi-shua, the sons of Saul. '
  '3':
  - type: note
    content: '[2 Sam. 1:6]'
  - type: text
    content: 'The battle pressed hard against Saul, and the archers found him, and he was badly wounded by the archers. '
  '4':
  - type: note
    content: '[Judg. 9:54]'
  - type: text
    content: 'Then Saul said to his armor-bearer, “Draw your sword, and thrust me through with it, lest these '
  - type: note
    content: See Judg. 14:3
  - type: text
    content: 'uncircumcised come and thrust me through, and mistreat me.” But his armor-bearer would not, '
  - type: note
    content: '[2 Sam. 1:14]'
  - type: text
    content: 'for he feared greatly. Therefore Saul took his own sword '
  - type: note
    content: '[2 Sam. 1:10]'
  - type: text
    content: 'and fell upon it. '
  '5':
  - type: text
    content: 'And when his armor-bearer saw that Saul was dead, he also fell upon his sword and died with him. '
  '6':
  - type: text
    content: 'Thus Saul died, and his three sons, and his armor-bearer, and all his men, on the same day together. '
  '7':
  - type: text
    content: And when the men of Israel who were on the other side of the valley and those beyond the Jordan saw that the men of Israel had fled and that Saul and his sons were dead, they abandoned their cities and fled. And the Philistines came and lived in them.
  '8':
  - type: text
    content: 'The next day, when the Philistines came to strip the slain, they found Saul and his three sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'So they cut off his head and stripped off his armor and sent messengers throughout the land of the Philistines, '
  - type: note
    content: '[2 Sam. 1:20]'
  - type: text
    content: 'to carry the good news '
  - type: note
    content: '[Judg. 16:23, 24]'
  - type: text
    content: 'to the house of their idols and to the people. '
