document_id: 2KI.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Moab Rebels Against Israel
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:17 ]'
  - type: text
    content: 'In the eighteenth year of Jehoshaphat king of Judah, Jehoram the son of Ahab became king over Israel in Samaria, and he reigned twelve years. '
  '10':
  - type: text
    content: 'Then the king of Israel said, “Alas! '
  - type: note
    content: '[Josh. 7:7]'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has called these three kings to give them into the hand of Moab.” '
  '11':
  - type: note
    content: 1 Kgs. 22:7
  - type: text
    content: 'And Jehoshaphat said, “Is there no prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' here, through whom we may inquire of the '
  - type: text
    content: Lord
  - type: text
    content: '?” Then one of the king of Israel’s servants answered, '
  - type: note
    content: '[ch. 2:25]'
  - type: text
    content: '“Elisha the son of Shaphat is here, '
  - type: note
    content: '[1 Kgs. 19:21; John 13:4, 5]'
  - type: text
    content: 'who poured water on the hands of Elijah.” '
  '12':
  - type: text
    content: 'And Jehoshaphat said, “The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom went down to him.'
  '13':
  - type: text
    content: 'And Elisha said to the king of Israel, '
  - type: note
    content: '[Ezek. 14:3]'
  - type: text
    content: '“What have I to do with you? Go to '
  - type: note
    content: 1 Kgs. 22:6
  - type: text
    content: 'the prophets of your father and to '
  - type: note
    content: 1 Kgs. 18:19
  - type: text
    content: 'the prophets of your mother.” But the king of Israel said to him, “No; it is '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' who has called these three kings to give them into the hand of Moab.” '
  '14':
  - type: text
    content: 'And Elisha said, '
  - type: note
    content: ch. 5:16; 1 Kgs. 17:1
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts lives, before whom I stand, were it not that I have regard for Jehoshaphat the king of Judah, I would neither look at you nor see you. '
  '15':
  - type: text
    content: 'But now '
  - type: note
    content: '[1 Sam. 10:5; 1 Chr. 25:1]'
  - type: text
    content: 'bring me a musician.” And when the musician played, '
  - type: note
    content: 1 Kgs. 18:46; Ezek. 1:3; 3:14, 22; 8:1; 37:1; 40:1
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon him. '
  '16':
  - type: text
    content: 'And he said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘I will make this dry streambed full of pools.’ '
  '17':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘You shall not see wind or rain, but that streambed shall be filled with water, so that you shall drink, you, your livestock, and your animals.’ '
  '18':
  - type: text
    content: 'This is a light thing in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He will also give the Moabites into your hand, '
  '19':
  - type: text
    content: 'and you shall attack every fortified city and every choice city, and shall fell every good tree and stop up all springs of water '
  - type: note
    content: '[ver. 25; Isa. 25:2]'
  - type: text
    content: 'and ruin every good piece of land with stones.” '
  '2':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', though not like his father and mother, for he put away the '
  - type: note
    content: '[ch. 10:26, 27; Ex. 23:24]'
  - type: text
    content: 'pillar of Baal '
  - type: note
    content: 1 Kgs. 16:31, 32
  - type: text
    content: 'that his father had made. '
  '20':
  - type: text
    content: 'The next morning, about the time of '
  - type: note
    content: '[Ex. 29:39, 40]'
  - type: text
    content: offering the sacrifice, behold, water came from the direction of Edom, till the country was filled with water.
  '21':
  - type: text
    content: 'When all the Moabites heard that the kings had come up to fight against them, all who were able to put on armor, from the youngest to the oldest, were called out and were drawn up at the border. '
  '22':
  - type: text
    content: 'And when they rose early in the morning and the sun shone on the water, the Moabites saw the water opposite them as red as blood. '
  '23':
  - type: text
    content: 'And they said, “This is blood; the kings have surely fought together and struck one another down. Now then, Moab, to the spoil!” '
  '24':
  - type: text
    content: But when they came to the camp of Israel, the Israelites rose and struck the Moabites, till they fled before them. And they went forward, striking the Moabites as they went.
  - type: note
    content: Septuagint; the meaning of the Hebrew is uncertain
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And they overthrew the cities, and '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'on every good piece of land every man threw a stone until it was covered. They stopped every spring of water and felled all the good trees, till only its stones were left in '
  - type: note
    content: Isa. 16:7; [Isa. 15:1; 16:11; Jer. 48:31, 36]
  - type: text
    content: 'Kir-hareseth, and the slingers surrounded and attacked it. '
  '26':
  - type: text
    content: 'When the king of Moab saw that the battle was going against him, he took with him 700 '
  - type: note
    content: '[Judg. 20:2]'
  - type: text
    content: 'swordsmen to break through, opposite the king of Edom, but they could not. '
  '27':
  - type: text
    content: 'Then he took his oldest son who was to reign in his place '
  - type: note
    content: Amos 2:1; [Mic. 6:7]
  - type: text
    content: and offered him for a burnt offering on the wall. And there came great wrath against Israel. And they withdrew from him and returned to their own land.
  '3':
  - type: text
    content: 'Nevertheless, he clung to '
  - type: note
    content: 1 Kgs. 12:28, 31, 32
  - type: text
    content: 'the sin of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: which he made Israel to sin; he did not depart from it.
  '4':
  - type: text
    content: 'Now Mesha king of Moab was a sheep breeder, '
  - type: note
    content: '[Isa. 16:1, 2]'
  - type: text
    content: 'and he had to deliver to the king of Israel 100,000 lambs and the wool of 100,000 rams. '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: ch. 1:1
  - type: text
    content: 'when Ahab died, the king of Moab rebelled against the king of Israel. '
  '6':
  - type: text
    content: 'So King Jehoram marched out of Samaria at that time and mustered all Israel. '
  '7':
  - type: text
    content: 'And he went and sent word to Jehoshaphat king of Judah: “The king of Moab has rebelled against me. Will you go with me to battle against Moab?” And he said, “I will go. '
  - type: note
    content: 1 Kgs. 22:4
  - type: text
    content: 'I am as you are, my people as your people, my horses as your horses.” '
  '8':
  - type: text
    content: Then he said, “By which way shall we march?” Jehoram answered, “By the way of the wilderness of Edom.”
  '9':
  - type: text
    content: 'So the king of Israel went with the king of Judah and '
  - type: note
    content: '[1 Kgs. 22:47]'
  - type: text
    content: 'the king of Edom. And when they had made a circuitous march of seven days, there was no water for the army or for the animals that followed them. '
