    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 12-19, see '
      - type: text
        text: 1 Chr. 15:25–16:3
      marker-yv: yv-n
    - type: text
      text: 'So David went and brought up the ark of God from the house of Obed-edom '
    - type: usfm
