      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to the house of Obed-edom the Gittite. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' remained in the house of Obed-edom the Gittite three months, '
    - type: usfm
