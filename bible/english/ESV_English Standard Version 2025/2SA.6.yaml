    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 1:4
      marker-yv: yv-n
    - type: text
      text: 'to bring up from there the ark of God, which is called by the name of the '
    - type: usfm
      marker: nd
