          text: 2 Chr. 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 132:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in its place, inside the tent that David had pitched for it. '
    - type: usfm
