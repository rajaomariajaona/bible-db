  - type: usfm
    marker: s1
    children:
    - type: text
      text: Uzzah and the Ark
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David and all the house of Israel were celebrating before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
