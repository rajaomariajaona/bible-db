    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed Obed-edom and all his household.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it was told King David, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
