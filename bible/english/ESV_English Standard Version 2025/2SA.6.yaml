        - type: text
          text: 1 Chr. 13:6-14
      marker-yv: yv-n
    - type: text
      text: 'David again gathered all the chosen men of Israel, thirty thousand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David was not willing to take the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' into the city of David. But David took it aside '
    - type: usfm
