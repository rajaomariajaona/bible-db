      marker-yv: yv-n
    - type: text
      text: 'who sits enthroned on the cherubim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David returned to bless his household. But Michal the daughter of Saul came out to meet David and said, “How the king of Israel honored himself today, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14, 16
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 19:24
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'uncovering himself today before the eyes of his servants’ female servants, as one of the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 9:4
      marker-yv: yv-n
    - type: text
      text: 'vulgar fellows shamelessly uncovers himself!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Michal, “It was before the '
    - type: usfm
