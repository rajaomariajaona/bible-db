    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, 1 Chronicles 13:8; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
