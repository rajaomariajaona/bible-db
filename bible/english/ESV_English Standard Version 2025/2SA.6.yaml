      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 15:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'put out his hand to the ark of God and took hold of it, for the oxen stumbled. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was kindled against Uzzah, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 6:19
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'God struck him down there because of his error, and he died there beside the ark of God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David was angry because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had broken out against Uzzah. And that place is called Perez-uzzah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Perez-uzzah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the breaking out against Uzzah
      marker-yv: yv-n
    - type: text
      text: ' to this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David was afraid of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that day, and he said, “How can the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' come to me?” '
