document_id: 2SA.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to Jerusalem
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-11, see 1 Chr. 13:6-14
  - type: text
    content: 'David again gathered all the chosen men of Israel, thirty thousand. '
  '10':
  - type: text
    content: 'So David was not willing to take the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' into the city of David. But David took it aside '
  - type: note
    content: '[1 Chr. 15:25]'
  - type: text
    content: 'to the house of Obed-edom the Gittite. '
  '11':
  - type: text
    content: 'And the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' remained in the house of Obed-edom the Gittite three months, '
  - type: note
    content: 1 Chr. 26:5
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed Obed-edom and all his household.'
  '12':
  - type: text
    content: 'And it was told King David, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed the household of Obed-edom and all that belongs to him, because of the ark of God.” '
  - type: note
    content: For ver. 12-19, see 1 Chr. 15:25–16:3
  - type: text
    content: 'So David went and brought up the ark of God from the house of Obed-edom '
  - type: note
    content: '[1 Kgs. 8:1]'
  - type: text
    content: 'to the city of David with rejoicing. '
  '13':
  - type: text
    content: 'And when '
  - type: note
    content: '[Num. 4:15; 7:9; Josh. 3:3; 1 Chr. 15:2, 15]'
  - type: text
    content: 'those who bore the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had gone six steps, '
  - type: note
    content: '[1 Kgs. 8:5]'
  - type: text
    content: 'he sacrificed an ox and a fattened animal. '
  '14':
  - type: text
    content: 'And David '
  - type: note
    content: '[Ex. 15:20; Ps. 30:11; 150:4]'
  - type: text
    content: 'danced before the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his might. And David was '
  - type: note
    content: 1 Sam. 2:18
  - type: text
    content: 'wearing a linen ephod. '
  '15':
  - type: text
    content: 'So David and all the house of Israel brought up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' with shouting and with the sound of the horn.'
  - type: heading
    content: David and Michal
  '16':
  - type: text
    content: 'As the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' came into the city of David, Michal the daughter of Saul looked out of the window and saw King David leaping and dancing before the '
  - type: text
    content: Lord
  - type: text
    content: ', and she despised him in her heart. '
  '17':
  - type: text
    content: 'And they brought in the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and set it '
  - type: note
    content: '[1 Chr. 15:1; 2 Chr. 1:4; Ps. 132:8]'
  - type: text
    content: 'in its place, inside the tent that David had pitched for it. '
  - type: note
    content: '[1 Kgs. 8:5, 62, 63]'
  - type: text
    content: 'And David offered burnt offerings and peace offerings before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'And when David had finished offering the burnt offerings and the peace offerings, '
  - type: note
    content: '[1 Kgs. 8:14, 55]'
  - type: text
    content: 'he blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  '19':
  - type: text
    content: and distributed among all the people, the whole multitude of Israel, both men and women, a cake of bread, a portion of meat,
  - type: note
    content: Vulgate; the meaning of the Hebrew term is uncertain
  - type: text
    content: ' and a cake of raisins to each one. '
  - type: note
    content: 1 Chr. 16:43
  - type: text
    content: Then all the people departed, each to his house.
  '2':
  - type: text
    content: 'And David arose and went with all the people who were with him from '
  - type: note
    content: Josh. 15:9, 60
  - type: text
    content: 'Baale-judah '
  - type: note
    content: 2 Chr. 1:4
  - type: text
    content: 'to bring up from there the ark of God, which is called by the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: Ex. 25:22; 1 Sam. 4:4; Ps. 80:1
  - type: text
    content: 'who sits enthroned on the cherubim. '
  '20':
  - type: text
    content: 'And David returned to bless his household. But Michal the daughter of Saul came out to meet David and said, “How the king of Israel honored himself today, '
  - type: note
    content: ver. 14, 16; [1 Sam. 19:24]
  - type: text
    content: 'uncovering himself today before the eyes of his servants’ female servants, as one of the '
  - type: note
    content: Judg. 9:4
  - type: text
    content: 'vulgar fellows shamelessly uncovers himself!” '
  '21':
  - type: text
    content: 'And David said to Michal, “It was before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Sam. 13:14; 15:28
  - type: text
    content: who chose me above your father and above all his house, to appoint me as prince
  - type: note
    content: Or leader
  - type: text
    content: ' over Israel, the people of the '
  - type: text
    content: Lord
  - type: text
    content: '—and I will celebrate before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: I will make myself yet more contemptible than this, and I will be abased in your
  - type: note
    content: Septuagint; Hebrew my
  - type: text
    content: ' eyes. But by the female servants of whom you have spoken, by them I shall be held in honor.” '
  '23':
  - type: text
    content: And Michal the daughter of Saul had no child to the day of her death.
  '3':
  - type: text
    content: 'And they carried the ark of God '
  - type: note
    content: '[1 Sam. 6:7]'
  - type: text
    content: 'on a new cart and brought it '
  - type: note
    content: '[1 Sam. 7:1]'
  - type: text
    content: out of the house of Abinadab, which was on the hill. And Uzzah and Ahio,
  - type: note
    content: Or and his brother; also verse 4
  - type: text
    content: ' the sons of Abinadab, were driving the new cart, '
  '4':
  - type: text
    content: with the ark of God,
  - type: note
    content: Compare Septuagint; Hebrew the new cart, 4and brought it out of the house of Abinadab, which was on the hill, with the ark of God
  - type: text
    content: ' and Ahio went before the ark.'
  - type: heading
    content: Uzzah and the Ark
  '5':
  - type: text
    content: 'And David and all the house of Israel were celebrating before the '
  - type: text
    content: Lord
  - type: text
    content: ', with '
  - type: note
    content: '[1 Chr. 13:8]; See Ps. 150:3-5'
  - type: text
    content: songs
  - type: note
    content: Septuagint, 1 Chronicles 13:8; Hebrew fir trees
  - type: text
    content: ' and lyres and harps and tambourines and castanets and cymbals. '
  '6':
  - type: text
    content: 'And when they came to the threshing floor of '
  - type: note
    content: '[1 Chr. 13:9]'
  - type: text
    content: 'Nacon, Uzzah '
  - type: note
    content: '[Num. 4:15; 1 Chr. 15:2]'
  - type: text
    content: 'put out his hand to the ark of God and took hold of it, for the oxen stumbled. '
  '7':
  - type: text
    content: 'And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Uzzah, and '
  - type: note
    content: '[1 Sam. 6:19]'
  - type: text
    content: 'God struck him down there because of his error, and he died there beside the ark of God. '
  '8':
  - type: text
    content: 'And David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ' had broken out against Uzzah. And that place is called Perez-uzzah'
  - type: note
    content: Perez-uzzah means the breaking out against Uzzah
  - type: text
    content: ' to this day. '
  '9':
  - type: text
    content: 'And David was afraid of the '
  - type: text
    content: Lord
  - type: text
    content: ' that day, and he said, “How can the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' come to me?” '
