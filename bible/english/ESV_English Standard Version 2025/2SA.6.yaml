      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'he blessed the people in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and distributed among all the people, the whole multitude of Israel, both men and women, a cake of bread, a portion of meat,
    - type: usfm
