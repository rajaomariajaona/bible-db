  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David and all the house of Israel brought up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with shouting and with the sound of the horn.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David and Michal
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came into the city of David, Michal the daughter of Saul looked out of the window and saw King David leaping and dancing before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and she despised him in her heart. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought in the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
