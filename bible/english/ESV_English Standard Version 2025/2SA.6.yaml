      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '62'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '63'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'And David offered burnt offerings and peace offerings before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when David had finished offering the burnt offerings and the peace offerings, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
