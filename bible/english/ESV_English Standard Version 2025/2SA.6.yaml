        children:
        - type: text
          text: Vulgate; the meaning of the Hebrew term is uncertain
      marker-yv: yv-n
    - type: text
      text: ' and a cake of raisins to each one. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 16:43
      marker-yv: yv-n
    - type: text
      text: Then all the people departed, each to his house.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David arose and went with all the people who were with him from '
    - type: usfm
      marker: x
      children:
