          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leader
      marker-yv: yv-n
    - type: text
      text: ' over Israel, the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—and I will celebrate before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make myself yet more contemptible than this, and I will be abased in your
    - type: usfm
