      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: my
      marker-yv: yv-n
    - type: text
      text: ' eyes. But by the female servants of whom you have spoken, by them I shall be held in honor.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Michal the daughter of Saul had no child to the day of her death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they carried the ark of God '
    - type: usfm
