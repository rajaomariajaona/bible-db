document_id: EXO.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Promises Deliverance
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Now you shall see what I will do to Pharaoh; for with a strong hand he will send them out, and with '
  - type: note
    content: ch. 3:19; 13:3
  - type: text
    content: 'a strong hand he will '
  - type: note
    content: ch. 11:1; 12:33, 39
  - type: text
    content: drive them out of his land.”
  '10':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: '“Go in, tell Pharaoh king of Egypt to let the people of Israel go out of his land.” '
  '12':
  - type: text
    content: 'But Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Behold, the people of Israel have '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'not listened to me. How then shall Pharaoh listen to me, for '
  - type: note
    content: ver. 30; ch. 4:10; Jer. 1:6; [Jer. 6:10; Ezek. 44:7]
  - type: text
    content: 'I am of uncircumcised lips?” '
  '13':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron and gave them a charge about the people of Israel and about Pharaoh king of Egypt: to bring the people of Israel out of the land of Egypt.'
  - type: heading
    content: The Genealogy of Moses and Aaron
  '14':
  - type: text
    content: 'These are the heads of their fathers’ houses: the '
  - type: note
    content: Gen. 46:9; 1 Chr. 5:3
  - type: text
    content: 'sons of Reuben, the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi; these are the clans of Reuben. '
  '15':
  - type: text
    content: 'The '
  - type: note
    content: Gen. 46:10; 1 Chr. 4:24
  - type: text
    content: 'sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul, the son of a Canaanite woman; these are the clans of Simeon. '
  '16':
  - type: text
    content: 'These are the names of the '
  - type: note
    content: Gen. 46:11; Num. 3:17; 1 Chr. 6:1, 16
  - type: text
    content: 'sons of Levi according to their generations: Gershon, Kohath, and Merari, the years of the life of Levi being 137 years. '
  '17':
  - type: text
    content: 'The '
  - type: note
    content: Num. 3:18; 1 Chr. 6:17; 23:7
  - type: text
    content: 'sons of Gershon: Libni and Shimei, by their clans. '
  '18':
  - type: text
    content: 'The '
  - type: note
    content: Num. 3:19; 26:57; 1 Chr. 6:2, 18
  - type: text
    content: 'sons of Kohath: Amram, Izhar, Hebron, and Uzziel, the years of the life of Kohath being 133 years. '
  '19':
  - type: text
    content: 'The '
  - type: note
    content: Num. 3:20; 1 Chr. 6:19; 23:21
  - type: text
    content: 'sons of Merari: Mahli and Mushi. These are the clans of the Levites according to their generations. '
  '2':
  - type: text
    content: 'God spoke to Moses and said to him, '
  - type: note
    content: '[Isa. 42:8; Mal. 3:6]'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'Amram took as his wife Jochebed his father’s sister, and she bore him Aaron and Moses, the years of the life of Amram being 137 years. '
  '21':
  - type: note
    content: Num. 16:1; 1 Chr. 6:37, 38
  - type: text
    content: 'The sons of Izhar: Korah, Nepheg, and Zichri. '
  '22':
  - type: text
    content: 'The '
  - type: note
    content: Lev. 10:4; Num. 3:30
  - type: text
    content: 'sons of Uzziel: Mishael, Elzaphan, and Sithri. '
  '23':
  - type: text
    content: 'Aaron took as his wife Elisheba, the daughter of '
  - type: note
    content: Ruth 4:19, 20; 1 Chr. 2:10; Matt. 1:4; Luke 3:33
  - type: text
    content: 'Amminadab and the sister of '
  - type: note
    content: Num. 1:7; 2:3; 7:12, 17; 10:14; Matt. 1:4; Luke 3:32
  - type: text
    content: 'Nahshon, and she bore him '
  - type: note
    content: Lev. 10:1; Num. 3:2; 26:60; 1 Chr. 6:3; 24:1
  - type: text
    content: 'Nadab, Abihu, Eleazar, and Ithamar. '
  '24':
  - type: text
    content: 'The '
  - type: note
    content: 1 Chr. 6:22, 23, 37
  - type: text
    content: 'sons of Korah: Assir, Elkanah, and Abiasaph; these are the clans of the Korahites. '
  '25':
  - type: text
    content: 'Eleazar, Aaron’s son, took as his wife one of the daughters of Putiel, and '
  - type: note
    content: Num. 25:7, 11; Josh. 24:33; Ps. 106:30
  - type: text
    content: she bore him Phinehas. These are the heads of the fathers’ houses of the Levites by their clans.
  '26':
  - type: text
    content: 'These are the Aaron and Moses '
  - type: note
    content: ver. 13
  - type: text
    content: 'to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' said: “Bring out the people of Israel from the land of Egypt '
  - type: note
    content: ch. 7:4; 12:17, 51; Num. 33:1
  - type: text
    content: 'by their hosts.” '
  '27':
  - type: text
    content: It was they who spoke to Pharaoh king of Egypt about bringing out the people of Israel from Egypt, this Moses and this Aaron.
  '28':
  - type: text
    content: 'On the day when the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the land of Egypt, '
  '29':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: See ver. 2
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  - type: note
    content: ver. 11; [ch. 7:2]
  - type: text
    content: 'tell Pharaoh king of Egypt all that I say to you.” '
  '3':
  - type: text
    content: 'I appeared to Abraham, to Isaac, and to Jacob, as '
  - type: note
    content: Gen. 17:1
  - type: text
    content: God Almighty,
  - type: note
    content: Hebrew El Shaddai
  - type: text
    content: ' but by my name the '
  - type: note
    content: Ps. 68:4; 83:18; [John 8:58; Rev. 1:4, 8]
  - type: text
    content: Lord
  - type: text
    content: ' I did not make myself known to them. '
  '30':
  - type: text
    content: 'But Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Behold, '
  - type: note
    content: '[Isa. 6:5]; See ver. 12'
  - type: text
    content: I am of uncircumcised lips. How will Pharaoh listen to me?”
  '4':
  - type: note
    content: Gen. 15:18; 17:4, 7
  - type: text
    content: 'I also established my covenant with them '
  - type: note
    content: Gen. 17:8; 28:4
  - type: text
    content: 'to give them the land of Canaan, the land in which they lived as sojourners. '
  '5':
  - type: text
    content: 'Moreover, '
  - type: note
    content: ch. 2:24
  - type: text
    content: 'I have heard the groaning of the people of Israel whom the Egyptians hold as slaves, and I have remembered my covenant. '
  '6':
  - type: text
    content: 'Say therefore to the people of Israel, '
  - type: note
    content: '[Isa. 42:8; Mal. 3:6]'
  - type: text
    content: '‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: ch. 7:4; Deut. 26:8; Ps. 136:11, 12; [ch. 3:17]
  - type: text
    content: 'I will bring you out from under the burdens of the Egyptians, and I will deliver you from slavery to them, and '
  - type: note
    content: ch. 15:13; Deut. 7:8; 2 Kgs. 17:36; 1 Chr. 17:21; Neh. 1:10
  - type: text
    content: 'I will redeem you with an outstretched arm and with great acts of judgment. '
  '7':
  - type: text
    content: 'I '
  - type: note
    content: Deut. 4:20; 7:6; 14:2; 26:18; 2 Sam. 7:24; [1 Pet. 2:9]
  - type: text
    content: 'will take you to be my people, and '
  - type: note
    content: ch. 29:45, 46; Gen. 17:8; Lev. 22:33; Deut. 29:13; [Rev. 21:7]
  - type: text
    content: 'I will be your God, and you shall know that '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has brought you out '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'from under the burdens of the Egyptians. '
  '8':
  - type: text
    content: 'I will bring you into '
  - type: note
    content: ch. 32:13; Gen. 15:18; 26:3; 28:13; 35:12; Ezek. 20:6, 42
  - type: text
    content: 'the land that I '
  - type: note
    content: '[Gen. 14:22; Deut. 32:40; Ezek. 20:5, 6; 47:14]'
  - type: text
    content: 'swore to give to Abraham, to Isaac, and to Jacob. I will give it to you for a possession. '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: '.’” '
  '9':
  - type: text
    content: 'Moses spoke thus to the people of Israel, but they '
  - type: note
    content: ch. 5:21; [Acts 7:25]
  - type: text
    content: did not listen to Moses, because of their broken spirit and harsh slavery.
