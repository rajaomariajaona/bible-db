document_id: DEU.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Chosen Place of Worship
  - type: text
    content: ' '
  - type: note
    content: ch. 6:1
  - type: text
    content: '“These are the statutes and rules that you shall be careful to do in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, has given you to possess, '
  - type: note
    content: ch. 4:10
  - type: text
    content: 'all the days that you live on the earth. '
  '10':
  - type: text
    content: 'But when '
  - type: note
    content: See ch. 11:31
  - type: text
    content: 'you go over the Jordan and live in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to inherit, '
  - type: note
    content: ch. 25:19; Josh. 23:1; [2 Sam. 7:1; 1 Kgs. 5:4]
  - type: text
    content: 'and when he gives you rest from all your enemies around, so that you live in safety, '
  '11':
  - type: text
    content: 'then to '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, to make his name dwell there, there you shall bring all that I command you: your burnt offerings and your sacrifices, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'your tithes and the contribution that you present, and all your finest vow offerings that you vow to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'you shall rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you and your sons and your daughters, your male servants and your female servants, and the Levite that is within your towns, since '
  - type: note
    content: See Num. 18:20
  - type: text
    content: 'he has no portion or inheritance with you. '
  '13':
  - type: note
    content: Lev. 17:3, 4; [1 Kgs. 12:28, 33]
  - type: text
    content: 'Take care that you do not offer your burnt offerings at any place that you see, '
  '14':
  - type: text
    content: 'but at '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose in one of your tribes, there you shall offer your burnt offerings, and there you shall do all that I am commanding you.'
  '15':
  - type: text
    content: '“However, you may slaughter and eat meat within any of your towns, as much as you desire, '
  - type: note
    content: ch. 16:17
  - type: text
    content: 'according to the blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that he has given you. '
  - type: note
    content: ch. 14:5; 15:22
  - type: text
    content: 'The unclean and the clean may eat of it, as of the gazelle and as of the deer. '
  '16':
  - type: note
    content: See Lev. 3:17
  - type: text
    content: 'Only you shall not eat the blood; you shall pour it out on the earth like water. '
  '17':
  - type: text
    content: 'You may not eat within your towns '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the tithe of your grain or of your wine or of your oil, or the firstborn of your herd or of your flock, or any of your vow offerings that you vow, or your freewill offerings or the contribution that you present, '
  '18':
  - type: text
    content: 'but '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'you shall eat them before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose, you and your son and your daughter, your male servant and your female servant, and the Levite who is within your towns. And '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'you shall rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in all that you undertake. '
  '19':
  - type: note
    content: ch. 14:27; [2 Chr. 31:4]
  - type: text
    content: Take care that you do not neglect the Levite as long as you live in your land.
  '2':
  - type: note
    content: ch. 7:5; Ex. 34:13
  - type: text
    content: 'You shall surely destroy all the places where the nations whom you shall dispossess served their gods, '
  - type: note
    content: 1 Kgs. 14:23; 2 Kgs. 16:4; 17:10; Jer. 3:6
  - type: text
    content: 'on the high mountains and on the hills and under every green tree. '
  '20':
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: ch. 19:8
  - type: text
    content: 'enlarges your territory, '
  - type: note
    content: ch. 11:24; 19:8, 9; Gen. 28:14; Ex. 34:24
  - type: text
    content: 'as he has promised you, and you say, ‘I will eat meat,’ because you crave meat, you may eat meat whenever you desire. '
  '21':
  - type: text
    content: 'If '
  - type: note
    content: See ver. 5
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose to put his name there is too far from you, '
  - type: note
    content: ver. 15
  - type: text
    content: 'then you may kill any of your herd or your flock, which the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you, as I have commanded you, and you may eat within your towns whenever you desire. '
  '22':
  - type: text
    content: 'Just '
  - type: note
    content: ch. 14:5; 15:22
  - type: text
    content: 'as the gazelle or the deer is eaten, so you may eat of it. '
  - type: note
    content: ch. 14:5; 15:22
  - type: text
    content: 'The unclean and the clean alike may eat of it. '
  '23':
  - type: note
    content: See Lev. 3:17
  - type: text
    content: 'Only be sure that you do not eat the blood, '
  - type: note
    content: See Gen. 9:4
  - type: text
    content: 'for the blood is the life, and you shall not eat the life with the flesh. '
  '24':
  - type: text
    content: 'You shall not eat it; you shall pour it out on the earth like water. '
  '25':
  - type: text
    content: 'You shall not eat it, '
  - type: note
    content: ch. 4:40; [Eccles. 8:12; Isa. 3:10]
  - type: text
    content: 'that all may go well with you and with your children after you, '
  - type: note
    content: ch. 6:18; 13:18; Ex. 15:26; 1 Kgs. 11:38
  - type: text
    content: 'when you do what is right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'But the '
  - type: note
    content: '[Num. 5:9, 10; 18:19]'
  - type: text
    content: 'holy things that are due from you, and '
  - type: note
    content: '[1 Sam. 1:21]'
  - type: text
    content: 'your vow offerings, you shall take, and you shall go to '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose, '
  '27':
  - type: text
    content: 'and '
  - type: note
    content: Lev. 1:5, 9, 13; 17:11
  - type: text
    content: 'offer your burnt offerings, the flesh and the blood, on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The blood of your sacrifices shall be poured out on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, but the flesh you may eat. '
  '28':
  - type: text
    content: 'Be careful to obey all these words that I command you, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'that it may go well with you and with your children after you forever, when you do what is good and right in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: heading
    content: Warning Against Idolatry
  '29':
  - type: text
    content: '“When '
  - type: note
    content: ch. 19:1; Josh. 23:4, 5
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God cuts off before you the nations whom you go in to dispossess, and you dispossess them and dwell in their land, '
  '3':
  - type: text
    content: 'You shall tear down their altars and dash in pieces '
  - type: note
    content: See ch. 16:22
  - type: text
    content: 'their pillars and burn their '
  - type: note
    content: See ch. 16:21
  - type: text
    content: 'Asherim with fire. You shall chop down the carved images of their gods and '
  - type: note
    content: '[Zeph. 1:4; Zech. 13:2]'
  - type: text
    content: 'destroy their name out of that place. '
  '30':
  - type: text
    content: 'take care '
  - type: note
    content: ch. 7:16
  - type: text
    content: 'that you be not ensnared to follow them, after they have been destroyed before you, and that you do not inquire about their gods, saying, ‘How did these nations serve their gods?—that I also may do the same.’ '
  '31':
  - type: note
    content: ver. 4; Lev. 18:3, 26, 30; [2 Kgs. 17:15]
  - type: text
    content: 'You shall not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in that way, for every '
  - type: note
    content: ch. 7:25; 17:1; 18:12; 23:18; 25:16; 27:15
  - type: text
    content: 'abominable thing that the '
  - type: text
    content: Lord
  - type: text
    content: ' hates they have done for their gods, for '
  - type: note
    content: 2 Kgs. 17:31; Jer. 7:31; 19:5
  - type: text
    content: they even burn their sons and their daughters in the fire to their gods.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ch 13:1 in Hebrew
  - type: text
    content: '“Everything that I command you, you shall be careful to do. '
  - type: note
    content: See ch. 4:2
  - type: text
    content: You shall not add to it or take from it.
  '4':
  - type: note
    content: ver. 31
  - type: text
    content: 'You shall not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in that way. '
  '5':
  - type: text
    content: 'But you shall seek '
  - type: note
    content: ch. 16:2; 26:2; 1 Kgs. 8:29; 2 Chr. 7:12; [Josh. 18:1]
  - type: text
    content: 'the place that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose out of all your tribes to put his name and make his habitation'
  - type: note
    content: Or name as its habitation
  - type: text
    content: ' there. There you shall go, '
  '6':
  - type: text
    content: 'and there you shall bring your burnt offerings and your sacrifices, '
  - type: note
    content: ch. 14:22, 23; 15:19, 20
  - type: text
    content: 'your tithes and the contribution that you present, your vow offerings, your freewill offerings, and the '
  - type: note
    content: ch. 14:23
  - type: text
    content: 'firstborn of your herd and of your flock. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:23, 26; 15:20
  - type: text
    content: 'there you shall eat before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and '
  - type: note
    content: ch. 14:26; 16:11, 14, 15; 26:11; 27:7; 28:8; Lev. 23:40
  - type: text
    content: 'you shall rejoice, you and your households, in all that you undertake, in which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you.'
  '8':
  - type: text
    content: '“You shall not do according to all that we are doing here today, '
  - type: note
    content: Judg. 17:6; 21:25
  - type: text
    content: 'everyone doing whatever is right in his own eyes, '
  '9':
  - type: text
    content: 'for you have not as yet come to '
  - type: note
    content: 1 Kgs. 8:56; Ps. 95:11; [Heb. 4:8]
  - type: text
    content: 'the rest and to the inheritance that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
