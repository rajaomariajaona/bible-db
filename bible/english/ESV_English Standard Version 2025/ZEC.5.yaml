document_id: ZEC.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of a Flying Scroll
  - type: text
    content: 'Again I lifted my eyes and saw, and behold, a flying '
  - type: note
    content: Jer. 36:2, 28
  - type: text
    content: 'scroll! '
  '10':
  - type: text
    content: 'Then I said to the angel who talked with me, “Where are they taking the basket?” '
  '11':
  - type: text
    content: 'He said to me, “To the '
  - type: note
    content: See Gen. 11:2
  - type: text
    content: land of Shinar, to build a house for it. And when this is prepared, they will set the basket down there on its base.”
  '2':
  - type: text
    content: 'And he said to me, “What do you see?” I answered, “I see a flying '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: scroll. Its length is twenty cubits, and its width ten cubits.”
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then he said to me, “This is '
  - type: note
    content: '[Jer. 29:18; Ezek. 2:9, 10]; See Deut. 29:27'
  - type: text
    content: 'the curse that goes out over the face of the whole land. For everyone who '
  - type: note
    content: See Ex. 20:15
  - type: text
    content: 'steals shall be cleaned out according to what is on one side, and everyone who '
  - type: note
    content: Ex. 20:7; [Eccles. 5:2]
  - type: text
    content: swears falsely
  - type: note
    content: Hebrew lacks falsely (supplied from verse 4)
  - type: text
    content: ' shall be cleaned out according to what is on the other side. '
  '4':
  - type: text
    content: 'I will send it out, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, and it shall enter the house of the thief, and the house of '
  - type: note
    content: ch. 8:17; Lev. 19:12; Mal. 3:5
  - type: text
    content: 'him who swears falsely by my name. And '
  - type: note
    content: Prov. 3:33
  - type: text
    content: 'it shall remain in his house and '
  - type: note
    content: '[Lev. 14:45]'
  - type: text
    content: consume it, both timber and stones.”
  - type: heading
    content: A Vision of a Woman in a Basket
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:9
  - type: text
    content: 'Then the angel who talked with me came forward and said to me, '
  - type: note
    content: '[ver. 1, 9; ch. 6:1]'
  - type: text
    content: '“Lift your eyes and see what this is that is going out.” '
  '6':
  - type: text
    content: 'And I said, “What is it?” He said, “This is '
  - type: note
    content: '[Ezek. 45:11]'
  - type: text
    content: the basket
  - type: note
    content: Hebrew ephah; also verses 7–11. An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' that is going out.” And he said, “This is their iniquity'
  - type: note
    content: One Hebrew manuscript, Septuagint, Syriac; most Hebrew manuscripts eye
  - type: text
    content: ' in all the land.” '
  '7':
  - type: text
    content: 'And behold, the leaden cover was lifted, and there was a woman sitting in the basket! '
  '8':
  - type: text
    content: 'And he said, “This is Wickedness.” And he thrust her back into the basket, and thrust down '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: the leaden weight on its opening.
  '9':
  - type: text
    content: 'Then I lifted my eyes and saw, and behold, two women coming forward! '
  - type: note
    content: '[Hos. 4:19]'
  - type: text
    content: 'The wind was in their wings. They had wings like the wings of a stork, and they lifted up the basket between earth and heaven. '
