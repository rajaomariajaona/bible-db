document_id: ISA.50,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Sin and the Servant’s Obedience
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“Where is '
  - type: note
    content: Deut. 24:1
  - type: text
    content: your mother’s certificate of divorce,
  - type: text
    content: 'with which '
  - type: note
    content: Jer. 3:8; [Hos. 2:2]
  - type: text
    content: I sent her away?
  - type: text
    content: 'Or '
  - type: note
    content: '[2 Kgs. 4:1; Matt. 18:25]'
  - type: text
    content: which of my creditors is it
  - type: text
    content: to whom I have sold you?
  - type: note
    content: ch. 59:2
  - type: text
    content: Behold, for your iniquities you were sold,
  - type: text
    content: and for your transgressions your mother was sent away.
  '10':
  - type: text
    content: 'Who among you fears the '
  - type: text
    content: Lord
  - type: text
    content: 'and obeys '
  - type: note
    content: ver. 4; ch. 49:2, 3
  - type: text
    content: the voice of his servant?
  - type: note
    content: ch. 42:16; [ Mic. 7:8 ]
  - type: text
    content: Let him who walks in darkness
  - type: text
    content: and has no light
  - type: text
    content: 'trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: and rely on his God.
  '11':
  - type: text
    content: Behold, all you who kindle a fire,
  - type: text
    content: who equip yourselves with burning torches!
  - type: text
    content: Walk by the light of your fire,
  - type: text
    content: and by the torches that you have kindled!
  - type: note
    content: '[ John 9:39 ]'
  - type: text
    content: 'This you have from my hand:'
  - type: text
    content: you shall lie down in torment.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 42:18-23 ]'
  - type: text
    content: Why, when I came, was there no man;
  - type: text
    content: why, when I called, was there no one to answer?
  - type: note
    content: ch. 59:1; Num. 11:23
  - type: text
    content: Is my hand shortened, that it cannot redeem?
  - type: text
    content: Or have I no power to deliver?
  - type: note
    content: Ps. 104:7; 106:9; Nah. 1:4; [ch. 19:5, 6 ]
  - type: text
    content: 'Behold, by my rebuke '
  - type: note
    content: '[Ex. 14:21]'
  - type: text
    content: I dry up the sea,
  - type: note
    content: Josh. 3:16
  - type: text
    content: I make the rivers a desert;
  - type: note
    content: '[ Ex. 7:18, 21 ]'
  - type: text
    content: their fish stink for lack of water
  - type: text
    content: and die of thirst.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jer. 14:22; Rev. 6:12
  - type: text
    content: I clothe the heavens with blackness
  - type: text
    content: and make sackcloth their covering.”
  '4':
  - type: text
    content: 'The Lord '
  - type: text
    content: God
  - type: text
    content: ' has given '
  - type: note
    content: '[Ex. 4:11]'
  - type: text
    content: me
  - type: text
    content: the tongue of those who are taught,
  - type: text
    content: 'that '
  - type: note
    content: '[ch. 40:1, 2]'
  - type: text
    content: I may know how to sustain with a word
  - type: note
    content: '[ Matt. 11:28 ]'
  - type: text
    content: him who is weary.
  - type: text
    content: Morning by morning he awakens;
  - type: text
    content: he awakens my ear
  - type: text
    content: to hear as those who are taught.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps. 40:6
  - type: text
    content: 'The Lord '
  - type: text
    content: God
  - type: text
    content: ' has opened my ear,'
  - type: note
    content: '[ John 14:31; Phil. 2:8; Heb. 5:8; 10:7 ]'
  - type: text
    content: and I was not rebellious;
  - type: text
    content: I turned not backward.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 53:5; Matt. 26:67; 27:26; Mark 15:19; Luke 22:63 ]'
  - type: text
    content: I gave my back to those who strike,
  - type: text
    content: and my cheeks to those who pull out the beard;
  - type: text
    content: I hid not my face
  - type: text
    content: from disgrace and spitting.
  '7':
  - type: text
    content: 'But the Lord '
  - type: text
    content: God
  - type: text
    content: ' helps me;'
  - type: text
    content: therefore I have not been disgraced;
  - type: note
    content: Ezek. 3:8, 9
  - type: text
    content: therefore I have set my face like a flint,
  - type: text
    content: and I know that I shall not be put to shame.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:33, 34
  - type: text
    content: He who vindicates me is near.
  - type: text
    content: Who will contend with me?
  - type: text
    content: Let us stand up together.
  - type: text
    content: Who is my adversary?
  - type: text
    content: Let him come near to me.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:10
  - type: text
    content: 'Behold, the Lord '
  - type: text
    content: God
  - type: text
    content: ' helps me;'
  - type: text
    content: who will declare me guilty?
  - type: text
    content: Behold, all of them will wear out like a garment;
  - type: text
    content: the moth will eat them up.
