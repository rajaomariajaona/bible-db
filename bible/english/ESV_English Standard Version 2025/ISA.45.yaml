document_id: ISA.45,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Cyrus, God’s Instrument
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' to '
  - type: note
    content: '[ch. 44:28]'
  - type: text
    content: his anointed, to Cyrus,
  - type: note
    content: '[ch. 41:13 ]'
  - type: text
    content: whose right hand I have grasped,
  - type: text
    content: to subdue nations before him
  - type: text
    content: 'and '
  - type: note
    content: Job 12:21; [ver. 5; ch. 22:21]
  - type: text
    content: to loose the belts of kings,
  - type: text
    content: to open doors before him
  - type: text
    content: 'that gates may not be closed:'
  '10':
  - type: text
    content: Woe to him who says to a father, ‘What are you begetting?’
  - type: text
    content: or to a woman, ‘With what are you in labor?’”
  '11':
  - type: text
    content: 'Thus says '
  - type: note
    content: Ezek. 39:7
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'the Holy One of Israel, and the one who formed him:'
  - type: note
    content: '[ch. 41:23 ]'
  - type: text
    content: “Ask me of things to come;
  - type: text
    content: 'will you command me '
  - type: note
    content: '[Jer. 31:9]'
  - type: text
    content: 'concerning my children and '
  - type: note
    content: ch. 29:23; 64:8
  - type: text
    content: the work of my hands?
  - type: note
    content: A slight emendation yields will you question me about my children, or command me concerning the work of my hands?
  '12':
  - type: text
    content: ' '
  - type: note
    content: Jer. 27:5
  - type: text
    content: I made the earth
  - type: text
    content: and created man on it;
  - type: text
    content: 'it was my hands '
  - type: note
    content: ch. 42:5; 44:24
  - type: text
    content: that stretched out the heavens,
  - type: text
    content: 'and '
  - type: note
    content: Gen. 2:1
  - type: text
    content: I commanded all their host.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:2
  - type: text
    content: I have stirred him up in righteousness,
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: and I will make all his ways level;
  - type: note
    content: See ch. 44:28
  - type: text
    content: he shall build my city
  - type: note
    content: ch. 49:25; 51:14; 52:3
  - type: text
    content: and set my exiles free,
  - type: text
    content: not for price or reward,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  - type: heading
    content: The Lord, the Only Savior
  '14':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: note
    content: '[ch. 43:3 ]'
  - type: text
    content: “The wealth of Egypt and the merchandise of Cush,
  - type: text
    content: and the Sabeans, men of stature,
  - type: text
    content: 'shall come over to you '
  - type: note
    content: ch. 14:2
  - type: text
    content: and be yours;
  - type: text
    content: they shall follow you;
  - type: text
    content: they shall come over in chains and bow down to you.
  - type: text
    content: 'They will plead with you, saying:'
  - type: text
    content: ‘Surely God is in you, and there is no other,
  - type: text
    content: no god besides him.’”
  '15':
  - type: text
    content: ' '
  - type: note
    content: ch. 57:17
  - type: text
    content: Truly, you are a God who hides himself,
  - type: text
    content: O God of Israel, the Savior.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See ch. 42:17
  - type: text
    content: All of them are put to shame and confounded;
  - type: text
    content: the makers of idols go in confusion together.
  '17':
  - type: text
    content: 'But Israel is saved by the '
  - type: text
    content: Lord
  - type: text
    content: with everlasting salvation;
  - type: note
    content: ch. 54:4
  - type: text
    content: you shall not be put to shame or confounded
  - type: text
    content: to all eternity.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 42:5
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who created the heavens
  - type: text
    content: (he is God!),
  - type: text
    content: who formed the earth and made it
  - type: text
    content: (he established it;
  - type: text
    content: 'he '
  - type: note
    content: '[Gen. 1:2]'
  - type: text
    content: did not create it empty,
  - type: note
    content: '[ Ps. 115:16 ]'
  - type: text
    content: 'he formed it to be inhabited!):'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 48:16; [ Deut. 30:11 ]
  - type: text
    content: I did not speak in secret,
  - type: text
    content: in a land of darkness;
  - type: text
    content: I did not say to the offspring of Jacob,
  - type: note
    content: Jer. 29:13, 14
  - type: text
    content: ‘Seek me in vain.’
  - type: note
    content: Hebrew in emptiness
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' speak '
  - type: note
    content: ver. 23
  - type: text
    content: the truth;
  - type: text
    content: I declare what is right.
  '2':
  - type: text
    content: “I will go before you
  - type: text
    content: 'and '
  - type: note
    content: ch. 40:4
  - type: text
    content: level the exalted places,
  - type: note
    content: Masoretic Text; Dead Sea Scroll, Septuagint level the mountains
  - type: note
    content: Ps. 107:16
  - type: text
    content: I will break in pieces the doors of bronze
  - type: text
    content: and cut through the bars of iron,
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 41:1 ]'
  - type: text
    content: “Assemble yourselves and come;
  - type: text
    content: draw near together,
  - type: text
    content: you survivors of the nations!
  - type: note
    content: '[ch. 44:18, 19; 48:5-7 ]'
  - type: text
    content: They have no knowledge
  - type: text
    content: 'who '
  - type: note
    content: ch. 46:1, 7; Jer. 10:5
  - type: text
    content: carry about their wooden idols,
  - type: note
    content: '[ch. 44:17 ]'
  - type: text
    content: and keep on praying to a god
  - type: text
    content: that cannot save.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 41:22, 26; 43:9 ]'
  - type: text
    content: Declare and present your case;
  - type: text
    content: let them take counsel together!
  - type: text
    content: Who told this long ago?
  - type: text
    content: Who declared it of old?
  - type: text
    content: 'Was it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: And there is no other god besides me,
  - type: text
    content: 'a righteous God '
  - type: note
    content: '[ch. 43:11]'
  - type: text
    content: and a Savior;
  - type: text
    content: there is none besides me.
  '22':
  - type: text
    content: “Turn to me and be saved,
  - type: note
    content: ch. 11:12; 43:5, 6
  - type: text
    content: all the ends of the earth!
  - type: text
    content: For I am God, and there is no other.
  '23':
  - type: text
    content: ' '
  - type: note
    content: See Gen. 22:16
  - type: text
    content: By myself I have sworn;
  - type: text
    content: 'from my mouth has gone out in '
  - type: note
    content: ver. 19
  - type: text
    content: righteousness
  - type: text
    content: 'a word that shall not return:'
  - type: note
    content: Cited Rom. 14:11; [ Phil. 2:10 ]
  - type: text
    content: ‘To me every knee shall bow,
  - type: text
    content: every tongue shall swear allegiance.’
  - type: note
    content: Septuagint every tongue shall confess to God
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 26:4; 44:8 ]'
  - type: text
    content: '“Only in the '
  - type: text
    content: Lord
  - type: text
    content: ', it shall be said of me,'
  - type: text
    content: 'are righteousness and '
  - type: note
    content: '[ch. 26:4; 44:8]'
  - type: text
    content: strength;
  - type: text
    content: to him shall come and be ashamed
  - type: note
    content: '[ch. 41:11 ]'
  - type: text
    content: all who were incensed against him.
  '25':
  - type: text
    content: 'In the '
  - type: text
    content: Lord
  - type: text
    content: ' all the offspring of Israel'
  - type: text
    content: shall be justified and shall glory.”
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 50:37; 51:13 ]'
  - type: text
    content: I will give you the treasures of darkness
  - type: text
    content: and the hoards in secret places,
  - type: text
    content: 'that you may know that it is I, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'the God of Israel, '
  - type: note
    content: ch. 43:1
  - type: text
    content: who call you by your name.
  '4':
  - type: text
    content: For the sake of my servant Jacob,
  - type: text
    content: and Israel my chosen,
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: I call you by your name,
  - type: note
    content: '[ch. 62:2 ]'
  - type: text
    content: I name you, though you do not know me.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 44:8
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other,'
  - type: text
    content: besides me there is no God;
  - type: note
    content: '[ Job 12:21; ch. 22:21 ]'
  - type: text
    content: I equip you, though you do not know me,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 37:20; Mal. 1:11 ]'
  - type: text
    content: that people may know, from the rising of the sun
  - type: text
    content: and from the west, that there is none besides me;
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other.'
  '7':
  - type: text
    content: I form light and create darkness;
  - type: text
    content: 'I make well-being and '
  - type: note
    content: '[ch. 41:23; Amos 3:6]'
  - type: text
    content: create calamity;
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who does all these things.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 32:2 ]'
  - type: text
    content: “Shower, O heavens, from above,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 85:11; [Hos. 10:12]
  - type: text
    content: let the clouds rain down righteousness;
  - type: text
    content: let the earth open, that salvation and righteousness may bear fruit;
  - type: text
    content: let the earth cause them both to sprout;
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' have created it.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Eccles. 6:10 ]; See ch. 10:15'
  - type: text
    content: “Woe to him who strives with him who formed him,
  - type: text
    content: a pot among earthen pots!
  - type: note
    content: ch. 64:8; Cited Rom. 9:20
  - type: text
    content: Does the clay say to him who forms it, ‘What are you making?’
  - type: text
    content: or ‘Your work has no handles’?
