document_id: PRO.17,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:17
  - type: text
    content: Better is a dry morsel with quiet
  - type: text
    content: than a house full of feasting
  - type: note
    content: Hebrew sacrifices
  - type: text
    content: ' with strife.'
  '10':
  - type: text
    content: A rebuke goes deeper into a man of understanding
  - type: text
    content: than a hundred blows into a fool.
  '11':
  - type: text
    content: An evil man seeks only rebellion,
  - type: text
    content: 'and '
  - type: note
    content: '[1 Kgs. 2:29]'
  - type: text
    content: a cruel messenger will be sent against him.
  '12':
  - type: text
    content: 'Let a man meet '
  - type: note
    content: 2 Sam. 17:8; Hos. 13:8
  - type: text
    content: a she-bear robbed of her cubs
  - type: note
    content: '[ch. 27:3 ]'
  - type: text
    content: rather than a fool in his folly.
  '13':
  - type: text
    content: 'If anyone '
  - type: note
    content: Ps. 35:12; 109:4, 5; [ch. 20:22; Matt. 5:39]
  - type: text
    content: returns evil for good,
  - type: note
    content: '[ 2 Sam. 12:10 ]'
  - type: text
    content: evil will not depart from his house.
  '14':
  - type: text
    content: The beginning of strife is like letting out water,
  - type: text
    content: 'so '
  - type: note
    content: ch. 20:3; 25:8
  - type: text
    content: quit before the quarrel breaks out.
  '15':
  - type: text
    content: 'He who '
  - type: note
    content: ch. 24:24; Ex. 23:7; Isa. 5:23
  - type: text
    content: 'justifies the wicked and he who '
  - type: note
    content: Job 34:17; Ps. 94:21; [ver. 26; ch. 18:5]
  - type: text
    content: condemns the righteous
  - type: text
    content: 'are both alike an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: 'Why should a fool have money in his hand '
  - type: note
    content: '[ch. 23:23]'
  - type: text
    content: to buy wisdom
  - type: text
    content: when he has no sense?
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:24; 27:10; [ Ruth 1:16; Job 6:14 ]
  - type: text
    content: A friend loves at all times,
  - type: text
    content: and a brother is born for adversity.
  '18':
  - type: text
    content: One who lacks sense gives a pledge
  - type: text
    content: and puts up security in the presence of his neighbor.
  '19':
  - type: text
    content: Whoever loves transgression loves strife;
  - type: text
    content: 'he who '
  - type: note
    content: '[ch. 11:2; 29:23]'
  - type: text
    content: makes his door high seeks destruction.
  '2':
  - type: text
    content: 'A servant who deals wisely will rule over '
  - type: note
    content: ver. 21, 25; ch. 10:5; 19:26
  - type: text
    content: a son who acts shamefully
  - type: text
    content: 'and '
  - type: note
    content: '[2 Sam. 16:4]'
  - type: text
    content: will share the inheritance as one of the brothers.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:20 ]'
  - type: text
    content: A man of crooked heart does not discover good,
  - type: text
    content: and one with a dishonest tongue falls into calamity.
  '21':
  - type: text
    content: 'He who '
  - type: note
    content: ch. 10:1; 19:13
  - type: text
    content: sires a fool gets himself sorrow,
  - type: text
    content: and the father of a fool has no joy.
  '22':
  - type: text
    content: ' '
  - type: note
    content: See ch. 15:13
  - type: text
    content: A joyful heart is good medicine,
  - type: text
    content: 'but a crushed spirit '
  - type: note
    content: Ps. 22:15; [ch. 12:25]
  - type: text
    content: dries up the bones.
  '23':
  - type: text
    content: 'The wicked accepts '
  - type: note
    content: See ver. 8
  - type: text
    content: a bribe in secret
  - type: note
    content: Hebrew a bribe from the bosom
  - type: text
    content: 'to '
  - type: note
    content: '[Mic. 3:11; 7:3]'
  - type: text
    content: pervert the ways of justice.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:6; 15:14; Eccles. 2:14 ]; See Deut. 30:11-14'
  - type: text
    content: The discerning sets his face toward wisdom,
  - type: text
    content: but the eyes of a fool are on the ends of the earth.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: A foolish son is a grief to his father
  - type: note
    content: ch. 10:1
  - type: text
    content: 'and bitterness to '
  - type: note
    content: ch. 23:25
  - type: text
    content: her who bore him.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 15 ]'
  - type: text
    content: To impose a fine on a righteous man is not good,
  - type: text
    content: nor to strike the noble for their uprightness.
  '27':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 10:19; [James 1:19]
  - type: text
    content: restrains his words has knowledge,
  - type: text
    content: and he who has a cool spirit is a man of understanding.
  '28':
  - type: text
    content: 'Even a fool '
  - type: note
    content: Job 13:5
  - type: text
    content: who keeps silent is considered wise;
  - type: text
    content: when he closes his lips, he is deemed intelligent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:21
  - type: text
    content: The crucible is for silver, and the furnace is for gold,
  - type: note
    content: 1 Chr. 29:17; Ps. 26:2; Jer. 17:10; Mal. 3:3
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' tests hearts.'
  '4':
  - type: text
    content: An evildoer listens to wicked lips,
  - type: text
    content: and a liar gives ear to a mischievous tongue.
  '5':
  - type: text
    content: 'Whoever mocks the poor '
  - type: note
    content: ch. 14:31; [Matt. 25:40, 45]
  - type: text
    content: insults his Maker;
  - type: text
    content: 'he who is '
  - type: note
    content: Job 31:29; Obad. 12; [ch. 24:17]
  - type: text
    content: 'glad at calamity will not go '
  - type: note
    content: ch. 16:5
  - type: text
    content: unpunished.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 128:6; [ Ps. 127:3, 4 ]
  - type: text
    content: 'Grandchildren are '
  - type: note
    content: ch. 16:31
  - type: text
    content: the crown of the aged,
  - type: text
    content: and the glory of children is their fathers.
  '7':
  - type: text
    content: 'Fine speech is not '
  - type: note
    content: '[ch. 19:10; 26:1]'
  - type: text
    content: becoming to a fool;
  - type: text
    content: 'still less is '
  - type: note
    content: ch. 6:17
  - type: text
    content: false speech to a prince.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ver. 23 ; ch. 18:16; 19:6; 21:14; [Ex. 23:8; Isa. 1:23; Amos 5:12]
  - type: text
    content: A bribe is like a magic
  - type: note
    content: Or precious
  - type: text
    content: ' stone in the eyes of the one who gives it;'
  - type: text
    content: wherever he turns he prospers.
  '9':
  - type: text
    content: 'Whoever '
  - type: note
    content: ch. 10:12
  - type: text
    content: covers an offense seeks love,
  - type: text
    content: 'but he who repeats a matter '
  - type: note
    content: ch. 16:28
  - type: text
    content: separates close friends.
