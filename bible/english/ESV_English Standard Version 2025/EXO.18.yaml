document_id: EXO.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jethro’s Advice
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:18 ]'
  - type: text
    content: 'Jethro, '
  - type: note
    content: ver. 12; ch. 2:16
  - type: text
    content: 'the priest of Midian, Moses’ father-in-law, heard of all that God had done for Moses and for Israel his people, how the '
  - type: text
    content: Lord
  - type: text
    content: ' had brought Israel out of Egypt. '
  '10':
  - type: text
    content: 'Jethro said, '
  - type: note
    content: Gen. 14:20; 2 Sam. 18:28; Luke 1:68
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', who has delivered you out of the hand of the Egyptians and out of the hand of Pharaoh and has delivered the people from under the hand of the Egyptians. '
  '11':
  - type: text
    content: 'Now I know that '
  - type: note
    content: 1 Chr. 16:25; 2 Chr. 2:5; Ps. 95:3; 97:9; 135:5
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is greater than all gods, because in this affair they '
  - type: note
    content: Neh. 9:10; [Ps. 119:21; Dan. 4:37; Luke 1:51]
  - type: text
    content: dealt arrogantly with the people.”
  - type: note
    content: Hebrew with them
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And Jethro, Moses’ father-in-law, brought a burnt offering and sacrifices to God; and Aaron came with all the elders of Israel to eat bread with Moses’ father-in-law '
  - type: note
    content: Deut. 12:7; 14:26; 1 Chr. 29:22; [ch. 24:11; Gen. 31:54]
  - type: text
    content: before God.
  '13':
  - type: text
    content: 'The next day Moses sat to judge the people, and the people stood around Moses from morning till evening. '
  '14':
  - type: text
    content: 'When Moses’ father-in-law saw all that he was doing for the people, he said, “What is this that you are doing for the people? Why do you sit alone, and all the people stand around you from morning till evening?” '
  '15':
  - type: text
    content: 'And Moses said to his father-in-law, “Because '
  - type: note
    content: '[Lev. 24:12; Num. 15:34]'
  - type: text
    content: 'the people come to me to inquire of God; '
  '16':
  - type: note
    content: ch. 24:14; Deut. 17:8; [2 Sam. 15:2, 3; 1 Cor. 6:1]
  - type: text
    content: 'when they have a dispute, they come to me and I decide between one person and another, and I '
  - type: note
    content: Deut. 4:5; 5:1
  - type: text
    content: 'make them know the statutes of God and his laws.” '
  '17':
  - type: text
    content: 'Moses’ father-in-law said to him, “What you are doing is not good. '
  '18':
  - type: text
    content: 'You and the people with you will certainly wear yourselves out, for the thing is too heavy for you. '
  - type: note
    content: Num. 11:14, 17; Deut. 1:9, 12
  - type: text
    content: 'You are not able to do it alone. '
  '19':
  - type: text
    content: 'Now obey my voice; I will give you advice, and God be with you! You shall '
  - type: note
    content: ch. 4:16; [ch. 20:19; Deut. 5:5]
  - type: text
    content: 'represent the people before God and '
  - type: note
    content: Num. 27:5
  - type: text
    content: 'bring their cases to God, '
  '2':
  - type: text
    content: 'Now Jethro, Moses’ father-in-law, had taken Zipporah, Moses’ wife, after he had sent her home, '
  '20':
  - type: text
    content: 'and you shall warn them about the statutes and the laws, and make them know '
  - type: note
    content: Ps. 143:8
  - type: text
    content: 'the way in which they must walk and '
  - type: note
    content: Deut. 1:18
  - type: text
    content: 'what they must do. '
  '21':
  - type: text
    content: 'Moreover, look for '
  - type: note
    content: Deut. 1:15; 16:18; See 2 Chr. 19:5-10; [Acts 6:3]
  - type: text
    content: 'able men from all the people, men who fear God, who are trustworthy and hate a bribe, and place such men over the people as chiefs of thousands, of hundreds, of fifties, and of tens. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: ver. 26
  - type: text
    content: 'let them judge the people at all times. '
  - type: note
    content: Lev. 24:11; Num. 15:33; 27:2; 36:1; Deut. 1:17; 17:8
  - type: text
    content: 'Every great matter they shall bring to you, but any small matter they shall decide themselves. So it will be easier for you, and they will '
  - type: note
    content: Num. 11:17
  - type: text
    content: 'bear the burden with you. '
  '23':
  - type: text
    content: 'If you do this, God will direct you, you will be '
  - type: note
    content: ver. 18
  - type: text
    content: able to endure, and all this people also will go to their place in peace.”
  '24':
  - type: text
    content: 'So Moses listened to the voice of his father-in-law and did all that he had said. '
  '25':
  - type: note
    content: Deut. 1:15
  - type: text
    content: 'Moses chose able men out of all Israel and made them heads over the people, chiefs of thousands, of hundreds, of fifties, and of tens. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: ver. 22
  - type: text
    content: 'they judged the people at all times. Any hard case they brought to Moses, but any small matter they decided themselves. '
  '27':
  - type: text
    content: 'Then Moses let his father-in-law depart, and '
  - type: note
    content: '[Num. 10:29, 30]'
  - type: text
    content: he went away to his own country.
  '3':
  - type: text
    content: 'along with her '
  - type: note
    content: ch. 4:20; Acts 7:29
  - type: text
    content: two sons. The name of the one was Gershom (
  - type: note
    content: ch. 2:22
  - type: text
    content: 'for he said, '
  - type: note
    content: Ps. 39:12; Heb. 11:13
  - type: text
    content: “I have been a sojourner
  - type: note
    content: Gershom sounds like the Hebrew for sojourner
  - type: text
    content: ' in a foreign land”), '
  '4':
  - type: text
    content: and the name of the other, Eliezer
  - type: note
    content: Eliezer means My God is help
  - type: text
    content: ' (for he said, “The God of my father was my help, and delivered me from the sword of Pharaoh”). '
  '5':
  - type: text
    content: 'Jethro, Moses’ father-in-law, came with his sons and his wife to Moses in the wilderness where he was encamped at the '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'mountain of God. '
  '6':
  - type: text
    content: And when he sent word to Moses, “I,
  - type: note
    content: Hebrew; Samaritan, Septuagint, Syriac behold
  - type: text
    content: ' your father-in-law Jethro, am coming to you with your wife and her two sons with her,” '
  '7':
  - type: text
    content: 'Moses '
  - type: note
    content: Gen. 14:17; 18:2; 19:1; 1 Kgs. 2:19
  - type: text
    content: 'went out to meet his father-in-law and bowed down and '
  - type: note
    content: '[Gen. 29:13; 33:4]; 2 Sam. 19:39'
  - type: text
    content: 'kissed him. And they asked each other of their welfare and went into the tent. '
  '8':
  - type: text
    content: 'Then Moses told his father-in-law '
  - type: note
    content: See Neh. 9:9-15; Ps. 78:12-28, 42-53; 106:7-12
  - type: text
    content: 'all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had done to Pharaoh and to the Egyptians for Israel’s sake, all the hardship that had come upon them in the way, and how the '
  - type: text
    content: Lord
  - type: text
    content: ' had delivered them. '
  '9':
  - type: text
    content: 'And Jethro rejoiced for all the good that the '
  - type: text
    content: Lord
  - type: text
    content: ' had done to Israel, in that he had delivered them out of the hand of the Egyptians.'
