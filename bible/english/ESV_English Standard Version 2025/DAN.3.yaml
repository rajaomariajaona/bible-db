document_id: DAN.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Golden Image
  - type: text
    content: King Nebuchadnezzar made an image of gold, whose height was sixty cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and its breadth six cubits. He set it up on '
  - type: note
    content: '[Gen. 11:2]'
  - type: text
    content: 'the plain of Dura, in '
  - type: note
    content: ver. 12, 30; ch. 2:48, 49
  - type: text
    content: 'the province of Babylon. '
  '10':
  - type: text
    content: 'You, O king, '
  - type: note
    content: ver. 29; ch. 4:6; 6:26
  - type: text
    content: 'have made a decree, that every man who '
  - type: note
    content: ver. 5, 7, 15
  - type: text
    content: 'hears the sound of the horn, pipe, lyre, trigon, harp, bagpipe, and every kind of music, '
  - type: note
    content: ver. 5, 7, 15
  - type: text
    content: 'shall fall down and worship the golden image. '
  '11':
  - type: text
    content: 'And whoever does not fall down and worship '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'shall be cast into a burning fiery furnace. '
  '12':
  - type: text
    content: 'There are certain Jews whom you have '
  - type: note
    content: ch. 2:49
  - type: text
    content: 'appointed over the affairs of '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'the province of Babylon: '
  - type: note
    content: '[ch. 1:7]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego. These men, O king, '
  - type: note
    content: ch. 6:13
  - type: text
    content: pay no attention to you; they do not serve your gods or worship the golden image that you have set up.”
  '13':
  - type: text
    content: 'Then Nebuchadnezzar '
  - type: note
    content: ch. 2:12
  - type: text
    content: 'in furious rage commanded that '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego be brought. So they brought these men before the king. '
  '14':
  - type: text
    content: 'Nebuchadnezzar answered and said to them, “Is it true, O Shadrach, Meshach, and Abednego, that you do not serve my gods or worship the golden image that I have set up? '
  '15':
  - type: text
    content: 'Now if you are ready when '
  - type: note
    content: ver. 5, 7, 10
  - type: text
    content: you hear the sound of the horn, pipe, lyre, trigon, harp, bagpipe, and every kind of music, to fall down and worship the image that I have made, well and good.
  - type: note
    content: Aramaic lacks well and good
  - type: text
    content: ' But if you do not worship, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'you shall immediately be cast into a burning fiery furnace. And '
  - type: note
    content: '[ch. 6:20; Ex. 5:2; 2 Kgs. 18:35]'
  - type: text
    content: who is the god who will deliver you out of my hands?”
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego answered and said to the king, “O Nebuchadnezzar, we have no need to answer you in this matter. '
  '17':
  - type: text
    content: 'If this be so, '
  - type: note
    content: '[ver. 15]'
  - type: text
    content: our God whom we serve is able to deliver us from the burning fiery furnace, and he will deliver us out of your hand, O king.
  - type: note
    content: Or If our God whom we serve is able to deliver us, he will deliver us from the burning fiery furnace and out of your hand, O king
  - type: text
    content: ' '
  '18':
  - type: text
    content: But if not, be it known to you, O king, that we will not serve your gods or worship the golden image that you have set up.”
  '19':
  - type: text
    content: 'Then Nebuchadnezzar was '
  - type: note
    content: '[ver. 13; Esth. 7:7]'
  - type: text
    content: 'filled with fury, and the expression of his face '
  - type: note
    content: '[ch. 2:49]'
  - type: text
    content: 'was changed against '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego. He ordered the furnace heated seven times more than it was usually heated. '
  '2':
  - type: text
    content: 'Then King Nebuchadnezzar sent to gather '
  - type: note
    content: ver. 27; ch. 6:1, 2, 3, 4, 6, 7; [Ezra 8:36]
  - type: text
    content: 'the satraps, the prefects, and '
  - type: note
    content: ch. 2:48
  - type: text
    content: 'the governors, the counselors, the treasurers, the justices, the magistrates, and all the officials of the provinces to come to the dedication of the image that King Nebuchadnezzar had set up. '
  '20':
  - type: text
    content: 'And he ordered some of the mighty men of his army '
  - type: note
    content: '[ver. 24, 25]'
  - type: text
    content: 'to bind '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego, and to cast them into the burning fiery furnace. '
  '21':
  - type: text
    content: 'Then these men were '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: bound in their cloaks, their tunics,
  - type: note
    content: The meaning of the Aramaic words rendered cloaks and tunics is uncertain; also verse 27
  - type: text
    content: ' their hats, and their other garments, and they were thrown into the burning fiery furnace. '
  '22':
  - type: text
    content: 'Because the king’s order was '
  - type: note
    content: ch. 2:15
  - type: text
    content: 'urgent and the furnace overheated, the flame of the fire killed those men who took up '
  - type: note
    content: '[ch. 1:7]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego. '
  '23':
  - type: text
    content: 'And these three men, Shadrach, Meshach, and Abednego, fell '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: bound into the burning fiery furnace.
  '24':
  - type: text
    content: 'Then King Nebuchadnezzar was '
  - type: note
    content: ch. 4:19
  - type: text
    content: 'astonished and rose up '
  - type: note
    content: ch. 2:25
  - type: text
    content: 'in haste. He declared to his '
  - type: note
    content: ch. 4:36; 6:7
  - type: text
    content: 'counselors, “Did we not cast three men '
  - type: note
    content: ver. 20, 21, 23
  - type: text
    content: 'bound into the fire?” They answered and said to the king, “True, O king.” '
  '25':
  - type: text
    content: 'He answered and said, “But I see four men unbound, '
  - type: note
    content: '[Isa. 43:2]'
  - type: text
    content: 'walking in the midst of the fire, and they '
  - type: note
    content: '[ch. 6:23]'
  - type: text
    content: 'are not hurt; and the appearance of the fourth is like '
  - type: note
    content: '[ver. 28; Job 1:6]'
  - type: text
    content: a son of the gods.”
  '26':
  - type: text
    content: 'Then Nebuchadnezzar came near to the door of the burning fiery furnace; he declared, '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: '“Shadrach, Meshach, and Abednego, servants of the '
  - type: note
    content: ch. 4:2; 5:18, 21
  - type: text
    content: 'Most High God, come out, and come here!” Then '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego came out from the fire. '
  '27':
  - type: text
    content: 'And the '
  - type: note
    content: ver. 2
  - type: text
    content: 'satraps, the prefects, the governors, and '
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'the king’s counselors gathered together and saw that '
  - type: note
    content: '[Heb. 11:34]'
  - type: text
    content: 'the fire had not had any power over the bodies of those men. The hair of their heads was not singed, their '
  - type: note
    content: ver. 21
  - type: text
    content: 'cloaks were not harmed, and no smell of fire had come upon them. '
  '28':
  - type: text
    content: 'Nebuchadnezzar answered and said, “Blessed be the God of '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego, who '
  - type: note
    content: ch. 6:22
  - type: text
    content: 'has sent his angel and '
  - type: note
    content: '[ver. 15, 17; Ps. 34:7]'
  - type: text
    content: 'delivered his servants, who '
  - type: note
    content: '[Ps. 25:2]'
  - type: text
    content: trusted in him, and set aside
  - type: note
    content: Aramaic and changed
  - type: text
    content: ' the king’s command, and yielded up their bodies rather than '
  - type: note
    content: '[Ex. 20:3]'
  - type: text
    content: 'serve and worship any god except their own God. '
  '29':
  - type: text
    content: 'Therefore '
  - type: note
    content: See ver. 10
  - type: text
    content: 'I make a decree: Any '
  - type: note
    content: See ver. 4
  - type: text
    content: 'people, nation, or language that speaks anything against the God of '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego '
  - type: note
    content: ch. 2:5
  - type: text
    content: 'shall be torn limb from limb, and their houses laid in ruins, for there is no other god who is able to rescue in this way.” '
  '3':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the satraps, the prefects, and the governors, the counselors, the treasurers, the justices, the magistrates, and all the officials of the provinces gathered for the dedication of the image that King Nebuchadnezzar had set up. And they stood before the image that Nebuchadnezzar had set up. '
  '30':
  - type: text
    content: 'Then the king promoted '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Shadrach, Meshach, and Abednego in '
  - type: note
    content: ver. 1, 12; ch. 2:48, 49
  - type: text
    content: the province of Babylon.
  '4':
  - type: text
    content: 'And the herald '
  - type: note
    content: ch. 4:14; 5:7; [Rev. 18:2]
  - type: text
    content: 'proclaimed aloud, “You are commanded, O '
  - type: note
    content: ver. 29; ch. 4:1; 5:19; 6:25; 7:14; [Rev. 5:9]
  - type: text
    content: 'peoples, nations, and languages, '
  '5':
  - type: text
    content: 'that when you hear the '
  - type: note
    content: ver. 7, 10, 15
  - type: text
    content: 'sound of the horn, pipe, lyre, trigon, harp, bagpipe, and every kind of music, you '
  - type: note
    content: '[ch. 2:46]'
  - type: text
    content: 'are to fall down and worship the golden image that King Nebuchadnezzar has set up. '
  '6':
  - type: text
    content: 'And whoever does not fall down and worship shall immediately '
  - type: note
    content: '[Jer. 29:22; Ezek. 23:25]'
  - type: text
    content: 'be cast into a burning fiery furnace.” '
  '7':
  - type: text
    content: 'Therefore, as soon as all the peoples heard the sound of the horn, pipe, lyre, trigon, harp, bagpipe, and every kind of music, all '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: the peoples, nations, and languages fell down and worshiped the golden image that King Nebuchadnezzar had set up.
  - type: heading
    content: The Fiery Furnace
  '8':
  - type: text
    content: 'Therefore at that time certain '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'Chaldeans '
  - type: note
    content: ch. 6:12
  - type: text
    content: 'came forward and maliciously accused the Jews. '
  '9':
  - type: text
    content: They declared
  - type: note
    content: Aramaic answered and said; also verses 24, 26
  - type: text
    content: ' to King Nebuchadnezzar, “O king, live forever! '
