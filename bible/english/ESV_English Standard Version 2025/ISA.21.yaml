  - type: text
    content: For they have fled from the swords,
  - type: text
    content: from the drawn sword,
  - type: text
    content: from the bent bow,
  - type: text
    content: and from the press of battle.
  '16':
  - type: text
    content: 'For thus the Lord said to me, “Within a year, '
  - type: note
    content: See ch. 16:14
  - type: text
    content: 'according to the years of a hired worker, all the glory of '
  - type: note
    content: ch. 60:7; Gen. 25:13; Ps. 120:5, 6; Song 1:5; Jer. 2:10; 49:28; Ezek. 27:21
  - type: text
    content: 'Kedar will come to an end. '
  '17':
  - type: text
    content: 'And the remainder of the archers of the mighty men of the sons of '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'Kedar will be few, '
  - type: note
    content: ch. 1:20
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has spoken.”'
  '2':
  - type: text
    content: A stern vision is told to me;
  - type: note
    content: ch. 24:16; 33:1
  - type: text
    content: the traitor betrays,
  - type: text
    content: and the destroyer destroys.
  - type: text
    content: 'Go up, O '
  - type: note
    content: See ch. 11:11
  - type: text
    content: Elam;
  - type: text
    content: 'lay siege, O '
  - type: note
    content: See ch. 13:17
  - type: text
    content: Media;
  - type: text
    content: 'all the '
  - type: note
    content: Ezek. 9:4
  - type: text
    content: sighing she has caused
  - type: text
    content: I bring to an end.
  '3':
  - type: text
    content: Therefore my loins are filled with anguish;
  - type: note
    content: See ch. 13:8
  - type: text
    content: pangs have seized me,
  - type: text
    content: like the pangs of a woman in labor;
  - type: text
    content: I am bowed down so that I cannot hear;
  - type: text
    content: I am dismayed so that I cannot see.
  '4':
  - type: text
    content: My heart staggers; horror has appalled me;
  - type: note
    content: '[ Deut. 28:67 ]'
  - type: text
    content: the twilight I longed for
  - type: text
    content: has been turned for me into trembling.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jer. 51:39, 57
  - type: text
    content: They prepare the table,
  - type: text
    content: they spread the rugs,
  - type: note
    content: Or they set the watchman
  - type: text
    content: they eat, they drink.
  - type: text
    content: Arise, O princes;
  - type: note
    content: 2 Sam. 1:21
  - type: text
    content: oil the shield!
  '6':
  - type: text
    content: 'For thus the Lord said to me:'
  - type: text
    content: “Go, set a watchman;
  - type: text
    content: let him announce what he sees.
  '7':
  - type: text
    content: When he sees riders, horsemen in pairs,
  - type: text
    content: riders on donkeys, riders on camels,
  - type: text
    content: let him listen diligently,
  - type: text
    content: very diligently.”
  '8':
  - type: text
    content: 'Then he who saw cried out:'
  - type: note
    content: Dead Sea Scroll, Syriac; Masoretic Text Then a lion cried out, or Then he cried out like a lion
  - type: note
    content: Hab. 2:1
  - type: text
    content: “Upon a watchtower I stand, O Lord,
  - type: text
    content: continually by day,
  - type: text
    content: and at my post I am stationed
  - type: text
    content: whole nights.
  '9':
  - type: text
    content: And behold, here come riders,
  - type: text
    content: horsemen in pairs!”
  - type: note
    content: '[ Hab. 2:2 ]'
  - type: text
    content: And he answered,
  - type: note
    content: Jer. 51:8; Cited Rev. 14:8; 18:2
  - type: text
    content: “Fallen, fallen is Babylon;
  - type: note
    content: ch. 46:1
  - type: text
    content: and all the carved images of her gods
  - type: text
    content: he has shattered to the ground.”
