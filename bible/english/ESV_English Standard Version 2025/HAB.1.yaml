document_id: HAB.1,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: See Nah. 1:1
  - type: text
    content: The oracle that Habakkuk the prophet saw.
  - type: heading
    content: Habakkuk’s Complaint
  '10':
  - type: text
    content: At kings they scoff,
  - type: text
    content: and at rulers they laugh.
  - type: note
    content: '[ Nah. 3:12 ]'
  - type: text
    content: They laugh at every fortress,
  - type: text
    content: 'for '
  - type: note
    content: '[Ezek. 4:2]'
  - type: text
    content: they pile up earth and take it.
  '11':
  - type: text
    content: Then they sweep by like the wind and go on,
  - type: note
    content: '[ Hos. 13:16 ]'
  - type: text
    content: 'guilty men, '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: whose own might is their god!”
  - type: heading
    content: Habakkuk’s Second Complaint
  '12':
  - type: text
    content: 'Are you not '
  - type: note
    content: Deut. 33:27; Ps. 90:2; 93:2
  - type: text
    content: from everlasting,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, my Holy One?'
  - type: note
    content: '[ Mal. 3:6 ]'
  - type: text
    content: We shall not die.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Isa. 10:5-7
  - type: text
    content: you have ordained them as a judgment,
  - type: text
    content: 'and you, O '
  - type: note
    content: See Deut. 32:4
  - type: text
    content: Rock, have established them for reproof.
  '13':
  - type: text
    content: 'You who are '
  - type: note
    content: '[Ps. 5:5]'
  - type: text
    content: of purer eyes than to see evil
  - type: text
    content: and cannot look at wrong,
  - type: note
    content: Jer. 12:1
  - type: text
    content: why do you idly look at traitors
  - type: text
    content: 'and '
  - type: note
    content: Ps. 35:22
  - type: text
    content: remain silent when the wicked swallows up
  - type: text
    content: the man more righteous than he?
  '14':
  - type: text
    content: You make mankind like the fish of the sea,
  - type: text
    content: like crawling things that have no ruler.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Jer. 16:16; Amos 4:2
  - type: text
    content: He
  - type: note
    content: That is, the wicked foe
  - type: text
    content: ' brings all of them up '
  - type: note
    content: '[Isa. 19:8]'
  - type: text
    content: with a hook;
  - type: text
    content: he drags them out with his net;
  - type: text
    content: he gathers them in his dragnet;
  - type: text
    content: so he rejoices and is glad.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 11 ]'
  - type: text
    content: Therefore he sacrifices to his net
  - type: text
    content: and makes offerings to his dragnet;
  - type: text
    content: for by them he lives in luxury,
  - type: note
    content: Hebrew his portion is fat
  - type: text
    content: and his food is rich.
  '17':
  - type: text
    content: Is he then to keep on emptying his net
  - type: note
    content: '[ch. 2:10 ]'
  - type: text
    content: and mercilessly killing nations forever?
  '2':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 13:1; 89:46
  - type: text
    content: how long shall I cry for help,
  - type: text
    content: and you will not hear?
  - type: text
    content: 'Or cry to you '
  - type: note
    content: Mic. 6:12
  - type: text
    content: “Violence!”
  - type: text
    content: and you will not save?
  '3':
  - type: text
    content: ' '
  - type: note
    content: See Jer. 9:2-6
  - type: text
    content: Why do you make me see iniquity,
  - type: text
    content: and why do you idly look at wrong?
  - type: text
    content: 'Destruction '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: and violence are before me;
  - type: text
    content: strife and contention arise.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Mic. 7:3 ]'
  - type: text
    content: So the law is paralyzed,
  - type: text
    content: and justice never goes forth.
  - type: note
    content: '[ Job 21:7; Jer. 12:1 ]'
  - type: text
    content: For the wicked surround the righteous;
  - type: text
    content: so justice goes forth perverted.
  - type: heading
    content: The Lord’s Answer
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cited Acts 13:41
  - type: text
    content: “Look among the nations, and see;
  - type: text
    content: wonder and be astounded.
  - type: note
    content: '[ Isa. 28:21; 29:14 ]'
  - type: text
    content: For I am doing a work in your days
  - type: text
    content: that you would not believe if told.
  '6':
  - type: text
    content: 'For behold, '
  - type: note
    content: See Jer. 5:15
  - type: text
    content: I am raising up the Chaldeans,
  - type: text
    content: that bitter and hasty nation,
  - type: note
    content: '[ch. 2:5 ]'
  - type: text
    content: who march through the breadth of the earth,
  - type: note
    content: '[ch. 2:6 ]'
  - type: text
    content: to seize dwellings not their own.
  '7':
  - type: text
    content: They are dreaded and fearsome;
  - type: note
    content: '[ver. 10, 11 ]'
  - type: text
    content: their justice and dignity go forth from themselves.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jer. 4:13
  - type: text
    content: Their horses are swifter than leopards,
  - type: text
    content: 'more fierce than '
  - type: note
    content: Jer. 5:6; Zeph. 3:3
  - type: text
    content: the evening wolves;
  - type: text
    content: their horsemen press proudly on.
  - type: text
    content: Their horsemen come from afar;
  - type: note
    content: See Deut. 28:49
  - type: text
    content: they fly like an eagle swift to devour.
  '9':
  - type: text
    content: 'They all come '
  - type: note
    content: '[ch. 2:17]'
  - type: text
    content: for violence,
  - type: text
    content: all their faces forward.
  - type: text
    content: 'They gather captives '
  - type: note
    content: See Josh. 11:4
  - type: text
    content: like sand.
