document_id: HOS.7,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 6:4 ]'
  - type: text
    content: when I would heal Israel,
  - type: text
    content: the iniquity of Ephraim is revealed,
  - type: text
    content: 'and the evil deeds of '
  - type: note
    content: '[Jer. 23:13]'
  - type: text
    content: Samaria,
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 4:2]'
  - type: text
    content: they deal falsely;
  - type: text
    content: the thief breaks in,
  - type: text
    content: and the bandits raid outside.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:5
  - type: text
    content: The pride of Israel testifies to his face;
  - type: note
    content: Or in his presence
  - type: note
    content: Isa. 9:13
  - type: text
    content: 'yet they do not return to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God,'
  - type: text
    content: nor seek him, for all this.
  '11':
  - type: text
    content: Ephraim is like a dove,
  - type: note
    content: ch. 4:11
  - type: text
    content: silly and without sense,
  - type: text
    content: 'calling to '
  - type: note
    content: '[ch. 12:1; 2 Kgs. 17:4]'
  - type: text
    content: 'Egypt, going to '
  - type: note
    content: See ch. 5:13
  - type: text
    content: Assyria.
  '12':
  - type: text
    content: 'As they go, '
  - type: note
    content: See Ezek. 12:13
  - type: text
    content: I will spread over them my net;
  - type: text
    content: I will bring them down like birds of the heavens;
  - type: note
    content: ch. 10:10
  - type: text
    content: 'I will discipline them '
  - type: note
    content: See Lev. 26:14-39; Deut. 28:15-68
  - type: text
    content: according to the report made to their congregation.
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:12
  - type: text
    content: Woe to them, for they have strayed from me!
  - type: text
    content: Destruction to them, for they have rebelled against me!
  - type: note
    content: ch. 13:14
  - type: text
    content: I would redeem them,
  - type: text
    content: 'but '
  - type: note
    content: '[ch. 11:12; 12:1; Mic. 6:12]'
  - type: text
    content: they speak lies against me.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps. 78:36, 37
  - type: text
    content: They do not cry to me from the heart,
  - type: text
    content: 'but '
  - type: note
    content: '[Amos 6:4, 5]'
  - type: text
    content: they wail upon their beds;
  - type: text
    content: for grain and wine they gash themselves;
  - type: text
    content: they rebel against me.
  '15':
  - type: text
    content: 'Although '
  - type: note
    content: '[ch. 11:3]'
  - type: text
    content: I trained and strengthened their arms,
  - type: text
    content: yet they devise evil against me.
  '16':
  - type: text
    content: 'They '
  - type: note
    content: '[ch. 6:1]'
  - type: text
    content: return, but not upward;
  - type: note
    content: Or to the Most High
  - type: text
    content: 'they are '
  - type: note
    content: Ps. 78:57
  - type: text
    content: like a treacherous bow;
  - type: text
    content: their princes shall fall by the sword
  - type: text
    content: 'because of '
  - type: note
    content: Ps. 73:9
  - type: text
    content: the insolence of their tongue.
  - type: text
    content: 'This shall be their derision '
  - type: note
    content: ch. 9:3
  - type: text
    content: in the land of Egypt.
  '2':
  - type: text
    content: But they do not consider
  - type: text
    content: 'that '
  - type: note
    content: '[ch. 5:3]'
  - type: text
    content: I remember all their evil.
  - type: text
    content: 'Now '
  - type: note
    content: Ps. 9:16; Prov. 5:22
  - type: text
    content: their deeds surround them;
  - type: note
    content: Ps. 90:8
  - type: text
    content: they are before my face.
  '3':
  - type: text
    content: 'By their evil '
  - type: note
    content: ver. 5; [Rom. 1:32]
  - type: text
    content: 'they make '
  - type: note
    content: ver. 5; [Rom. 1:32]
  - type: text
    content: the king glad,
  - type: text
    content: and the princes by their treachery.
  '4':
  - type: text
    content: ' '
  - type: note
    content: See ch. 6:10
  - type: text
    content: They are all adulterers;
  - type: text
    content: they are like a heated oven
  - type: text
    content: whose baker ceases to stir the fire,
  - type: text
    content: from the kneading of the dough
  - type: text
    content: until it is leavened.
  '5':
  - type: text
    content: 'On the day of '
  - type: note
    content: ver. 3
  - type: text
    content: our king, the princes
  - type: text
    content: became sick with the heat of wine;
  - type: text
    content: he stretched out his hand with mockers.
  '6':
  - type: text
    content: 'For with hearts like an oven '
  - type: note
    content: ch. 6:9
  - type: text
    content: they approach their intrigue;
  - type: text
    content: all night their anger smolders;
  - type: text
    content: in the morning it blazes like a flaming fire.
  '7':
  - type: text
    content: All of them are hot as an oven,
  - type: text
    content: and they devour their rulers.
  - type: text
    content: 'All '
  - type: note
    content: ch. 8:4
  - type: text
    content: 'their kings '
  - type: note
    content: 2 Kgs. 15:10, 14, 25, 30
  - type: text
    content: have fallen,
  - type: text
    content: and none of them calls upon me.
  '8':
  - type: text
    content: 'Ephraim '
  - type: note
    content: Ps. 106:35
  - type: text
    content: mixes himself with the peoples;
  - type: text
    content: Ephraim is a cake not turned.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:7 ]'
  - type: text
    content: Strangers devour his strength,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 42:25
  - type: text
    content: he knows it not;
  - type: text
    content: gray hairs are sprinkled upon him,
  - type: text
    content: 'and '
  - type: note
    content: Isa. 42:25
  - type: text
    content: he knows it not.
