document_id: ROM.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham Justified by Faith
  - type: text
    content: 'What then shall we say was gained by Abraham, '
  - type: note
    content: ver. 16
  - type: text
    content: 'our forefather according to the flesh? '
  '10':
  - type: text
    content: 'How then was it counted to him? Was it before or after he had been circumcised? It was not after, but before he was circumcised. '
  '11':
  - type: note
    content: Gen. 17:10, 11
  - type: text
    content: 'He received the sign of circumcision as a seal of the righteousness that he had by faith while he was still uncircumcised. The purpose was '
  - type: note
    content: ver. 12, 16; [ch. 3:22]; See Luke 19:9
  - type: text
    content: 'to make him the father of all who believe without being circumcised, so that righteousness would be counted to them as well, '
  '12':
  - type: text
    content: and to make him the father of the circumcised who are not merely circumcised but who also walk in the footsteps of the faith that our father Abraham had before he was circumcised.
  - type: heading
    content: The Promise Realized Through Faith
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Gal. 3:16; Heb. 6:15, 17; 7:6; 11:9, 17; [ch. 9:8]; See Acts 13:32
  - type: text
    content: 'the promise to Abraham and his offspring '
  - type: note
    content: Gen. 17:4-6
  - type: text
    content: 'that he would be heir of the world did not come through the law but through the righteousness of faith. '
  '14':
  - type: note
    content: Gal. 3:17, 18
  - type: text
    content: 'For if it is the adherents of the law who are to be the heirs, faith is null and the promise is void. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: ch. 7:7, 10-25; 2 Cor. 3:7, 9; Gal. 3:10
  - type: text
    content: 'the law brings wrath, but '
  - type: note
    content: '[ch. 3:20]'
  - type: text
    content: 'where there is no law '
  - type: note
    content: Gal. 3:19
  - type: text
    content: there is no transgression.
  '16':
  - type: text
    content: 'That is why it depends on faith, '
  - type: note
    content: See ch. 3:24
  - type: text
    content: 'in order that the promise may rest on grace and '
  - type: note
    content: Gal. 3:22; [ch. 15:8]
  - type: text
    content: 'be guaranteed to all his offspring—not only to the adherent of the law but also to the one who shares the faith of Abraham, '
  - type: note
    content: '[ch. 9:8]'
  - type: text
    content: 'who is the father of us all, '
  '17':
  - type: text
    content: 'as it is written, '
  - type: note
    content: Cited from Gen. 17:5; [ver. 18]
  - type: text
    content: '“I have made you the father of many nations”—in the presence of the God in whom he believed, '
  - type: note
    content: '[Heb. 11:19]; See John 5:21'
  - type: text
    content: 'who gives life to the dead and calls into existence '
  - type: note
    content: 1 Cor. 1:28; [Heb. 11:3]
  - type: text
    content: 'the things that do not exist. '
  '18':
  - type: text
    content: 'In hope he believed against hope, that he should become the father of many nations, as he had been told, '
  - type: note
    content: Cited from Gen. 15:5
  - type: text
    content: '“So shall your offspring be.” '
  '19':
  - type: text
    content: 'He did not weaken in faith when he considered his own body, which was '
  - type: note
    content: Heb. 11:12
  - type: text
    content: as good as dead (
  - type: note
    content: Gen. 17:17
  - type: text
    content: 'since he was about a hundred years old), or when he considered '
  - type: note
    content: Gen. 18:11
  - type: text
    content: the barrenness
  - type: note
    content: Greek deadness
  - type: text
    content: ' of Sarah’s womb. '
  '2':
  - type: text
    content: 'For if Abraham was justified by works, he has something to boast about, but '
  - type: note
    content: '[1 Cor. 1:31]'
  - type: text
    content: 'not before God. '
  '20':
  - type: text
    content: 'No unbelief made him waver concerning the promise of God, but he grew strong in his faith as he gave glory to God, '
  '21':
  - type: text
    content: 'fully convinced that '
  - type: note
    content: Gen. 18:14; [Heb. 11:19]
  - type: text
    content: 'God was able to do what he had promised. '
  '22':
  - type: text
    content: 'That is why his faith was “counted to him as righteousness.” '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ch. 15:4; 1 Cor. 9:9, 10; 10:6, 11; 2 Tim. 3:16, 17; [Ps. 102:18]
  - type: text
    content: 'the words “it was counted to him” were not written for his sake alone, '
  '24':
  - type: text
    content: 'but for ours also. It will be counted to us '
  - type: note
    content: ch. 10:9; 1 Pet. 1:21
  - type: text
    content: 'who believe in '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'him who raised from the dead Jesus our Lord, '
  '25':
  - type: note
    content: ch. 5:6, 8; 8:32; Isa. 53:5, 6; Matt. 20:28; Gal. 1:4
  - type: text
    content: 'who was delivered up for our trespasses and raised '
  - type: note
    content: ch. 5:18; [1 Cor. 15:17]
  - type: text
    content: for our justification.
  '3':
  - type: text
    content: 'For what does the Scripture say? '
  - type: note
    content: ver. 9, 22; Gal. 3:6; James 2:23; Cited from Gen. 15:6 (Gk.); [Titus 3:8]
  - type: text
    content: '“Abraham believed God, and it was counted to him as righteousness.” '
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: '[ch. 11:6; Deut. 9:4, 5]'
  - type: text
    content: 'to the one who works, his wages are not counted as a gift but as his due. '
  '5':
  - type: text
    content: 'And to the one who does not work but '
  - type: note
    content: ch. 3:22; See John 6:29
  - type: text
    content: believes in
  - type: note
    content: Or but trusts; compare verse 24
  - type: text
    content: ' him who justifies the ungodly, his faith is counted as righteousness, '
  '6':
  - type: text
    content: 'just as David also speaks of the blessing of the one to whom God counts righteousness apart from works:'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cited from Ps. 32:1, 2
  - type: text
    content: “Blessed are those whose lawless deeds are forgiven,
  - type: text
    content: and whose sins are covered;
  '8':
  - type: text
    content: 'blessed is the man against whom the Lord will not '
  - type: note
    content: 2 Cor. 5:19
  - type: text
    content: count his sin.”
  '9':
  - type: text
    content: 'Is this blessing then only for '
  - type: note
    content: ch. 3:30
  - type: text
    content: 'the circumcised, or also for the uncircumcised? '
  - type: note
    content: ver. 3
  - type: text
    content: 'For we say that faith was counted to Abraham as righteousness. '
