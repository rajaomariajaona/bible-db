      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Luke 19:9'
      marker-yv: yv-n
    - type: text
      text: 'to make him the father of all who believe without being circumcised, so that righteousness would be counted to them as well, '
  '12':
  - type: usfm
