document_id: 1PE.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Living Stone and a Holy People
  - type: text
    content: ' '
  - type: note
    content: Eph. 4:22, 25, 31; Col. 3:8
  - type: text
    content: 'So put away all malice and all deceit and hypocrisy and envy and all slander. '
  '10':
  - type: note
    content: Hos. 1:6, 9, 10; 2:23; Rom. 9:25, 26; 10:19
  - type: text
    content: Once you were not a people, but now you are God’s people; once you had not received mercy, but now you have received mercy.
  '11':
  - type: text
    content: 'Beloved, I urge you '
  - type: note
    content: See Lev. 25:23
  - type: text
    content: 'as sojourners and exiles '
  - type: note
    content: Rom. 13:14; Gal. 5:24
  - type: text
    content: 'to abstain from the passions of the flesh, '
  - type: note
    content: James 4:1
  - type: text
    content: 'which wage war against your soul. '
  '12':
  - type: note
    content: '[ch. 3:16; 2 Cor. 8:21; Phil. 2:15; Titus 2:8]'
  - type: text
    content: 'Keep your conduct among the Gentiles honorable, so that when they speak against you as evildoers, '
  - type: note
    content: Matt. 5:16; 2 Cor. 9:13; Gal. 1:24
  - type: text
    content: 'they may see your good deeds and glorify God on '
  - type: note
    content: Isa. 10:3; Luke 19:44
  - type: text
    content: the day of visitation.
  - type: heading
    content: Submission to Authority
  '13':
  - type: text
    content: ' '
  - type: note
    content: Rom. 13:1; Titus 3:1
  - type: text
    content: Be subject for the Lord’s sake to every human institution,
  - type: note
    content: Or every institution ordained for people
  - type: text
    content: ' whether it be to the emperor'
  - type: note
    content: Or king; also verse 17
  - type: text
    content: ' as supreme, '
  '14':
  - type: text
    content: 'or to governors as sent by him '
  - type: note
    content: Rom. 13:4
  - type: text
    content: 'to punish those who do evil and '
  - type: note
    content: Rom. 13:3
  - type: text
    content: 'to praise those who do good. '
  '15':
  - type: text
    content: 'For this is the will of God, '
  - type: note
    content: ver. 12
  - type: text
    content: 'that by doing good you should put to silence the ignorance of foolish people. '
  '16':
  - type: note
    content: See James 1:25
  - type: text
    content: 'Live as people who are free, not using your freedom as a cover-up for evil, but '
  - type: note
    content: 1 Cor. 7:22; [Rom. 6:22]
  - type: text
    content: living as servants
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of God. '
  '17':
  - type: note
    content: Rom. 12:10; 13:7
  - type: text
    content: 'Honor everyone. '
  - type: note
    content: See Heb. 13:1
  - type: text
    content: 'Love the brotherhood. '
  - type: note
    content: Prov. 24:21
  - type: text
    content: Fear God. Honor the emperor.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Eph. 6:5; Col. 3:22; 1 Tim. 6:1; Titus 2:9
  - type: text
    content: Servants, be subject to your masters with all respect, not only to the good and gentle but also to the unjust.
  - type: note
    content: Or crooked
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'For this is a gracious thing, when, '
  - type: note
    content: ch. 3:14, 17; [ch. 4:16]
  - type: text
    content: 'mindful of God, one endures sorrows while suffering unjustly. '
  '2':
  - type: note
    content: See Matt. 18:3
  - type: text
    content: 'Like newborn infants, long for the pure spiritual '
  - type: note
    content: 1 Cor. 3:2; Heb. 5:12, 13
  - type: text
    content: 'milk, that by it you may grow up into salvation— '
  '20':
  - type: text
    content: 'For what credit is it if, when you sin and are beaten for it, you endure? But '
  - type: note
    content: ch. 3:17, 18; 4:13, 16
  - type: text
    content: 'if when you do good and suffer for it you endure, this is a gracious thing in the sight of God. '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: ch. 3:9; See Acts 14:22
  - type: text
    content: 'to this you have been called, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: 'because Christ also suffered for you, '
  - type: note
    content: See Matt. 11:29
  - type: text
    content: 'leaving you an example, so that you might follow in his steps. '
  '22':
  - type: note
    content: Isa. 53:9; [2 Cor. 5:21; Heb. 4:15; 1 John 3:5]
  - type: text
    content: 'He committed no sin, neither was deceit found in his mouth. '
  '23':
  - type: note
    content: ch. 3:9; Isa. 53:7; Heb. 12:3
  - type: text
    content: 'When he was reviled, he did not revile in return; when he suffered, he did not threaten, '
  - type: note
    content: Luke 23:46
  - type: text
    content: 'but continued entrusting himself to him who judges justly. '
  '24':
  - type: note
    content: Isa. 53:4, 11; Matt. 8:17; Heb. 9:28
  - type: text
    content: 'He himself bore our sins in his body on the tree, that we '
  - type: note
    content: Rom. 6:2, 11; 7:4, 6; Col. 2:20; 3:3
  - type: text
    content: 'might die to sin and '
  - type: note
    content: Rom. 6:13
  - type: text
    content: 'live to righteousness. '
  - type: note
    content: Isa. 53:5
  - type: text
    content: 'By his wounds you have been healed. '
  '25':
  - type: text
    content: 'For '
  - type: note
    content: Isa. 53:6; [Ps. 119:176; Ezek. 34:6; Luke 15:4]
  - type: text
    content: 'you were straying like sheep, but have now returned to '
  - type: note
    content: See John 10:11
  - type: text
    content: the Shepherd and Overseer of your souls.
  '3':
  - type: text
    content: 'if indeed you have '
  - type: note
    content: Ps. 34:8; Heb. 6:5
  - type: text
    content: tasted that the Lord is good.
  '4':
  - type: text
    content: 'As you come to him, a living stone '
  - type: note
    content: ver. 6, 7
  - type: text
    content: 'rejected by men but in the sight of God chosen and precious, '
  '5':
  - type: note
    content: Eph. 2:20-22; [1 Cor. 3:9]
  - type: text
    content: 'you yourselves like living stones are being built up as '
  - type: note
    content: Heb. 3:4, 6
  - type: text
    content: 'a spiritual house, to be '
  - type: note
    content: ver. 9
  - type: text
    content: 'a holy priesthood, '
  - type: note
    content: Isa. 56:7; Mal. 1:11; Rom. 12:1; Heb. 13:15
  - type: text
    content: 'to offer spiritual sacrifices '
  - type: note
    content: Rom. 15:16; Phil. 4:18
  - type: text
    content: 'acceptable to God through Jesus Christ. '
  '6':
  - type: text
    content: 'For it stands in Scripture:'
  - type: note
    content: Cited from Isa. 28:16
  - type: text
    content: “Behold, I am laying in Zion a stone,
  - type: text
    content: a cornerstone chosen and precious,
  - type: note
    content: Rom. 9:33; 10:11
  - type: text
    content: and whoever believes in him will not be put to shame.”
  '7':
  - type: text
    content: 'So the honor is for you who '
  - type: note
    content: '[2 Cor. 2:16]'
  - type: text
    content: 'believe, but for those who '
  - type: note
    content: '[2 Cor. 2:16]'
  - type: text
    content: do not believe,
  - type: note
    content: Cited from Ps. 118:22
  - type: text
    content: “The stone that the builders rejected
  - type: text
    content: has become the cornerstone,”
  - type: note
    content: Greek the head of the corner
  '8':
  - type: text
    content: and
  - type: note
    content: Rom. 9:33; Cited from Isa. 8:14
  - type: text
    content: “A stone of stumbling,
  - type: text
    content: and a rock of offense.”
  - type: text
    content: 'They stumble because they disobey the word, '
  - type: note
    content: '[Rom. 9:22; Jude 4]'
  - type: text
    content: as they were destined to do.
  '9':
  - type: text
    content: 'But you are '
  - type: note
    content: Deut. 10:15; Isa. 43:20
  - type: text
    content: 'a chosen race, '
  - type: note
    content: Ex. 19:6; Rev. 1:6; 5:10
  - type: text
    content: 'a royal '
  - type: note
    content: Isa. 61:6; 66:21
  - type: text
    content: 'priesthood, '
  - type: note
    content: Deut. 7:6
  - type: text
    content: 'a holy nation, '
  - type: note
    content: Ex. 19:5; Deut. 7:6; Isa. 43:21; Mal. 3:17
  - type: text
    content: 'a people for his own possession, that you may proclaim the excellencies of him who called you '
  - type: note
    content: '[Isa. 42:16]; See Acts 26:18'
  - type: text
    content: 'out of darkness into '
  - type: note
    content: Ps. 36:9
  - type: text
    content: 'his marvelous light. '
