document_id: ECC.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Death Comes to All
  - type: text
    content: 'But all this I laid to heart, examining it all, '
  - type: note
    content: '[ch. 8:14]'
  - type: text
    content: 'how the righteous and the wise and their deeds are '
  - type: note
    content: Deut. 33:3
  - type: text
    content: 'in the hand of God. Whether it is love or hate, man does not know; both are before him. '
  '10':
  - type: text
    content: 'Whatever your hand finds to do, '
  - type: note
    content: Rom. 12:11; Col. 3:23
  - type: text
    content: do it with your might,
  - type: note
    content: Or finds to do with your might, do it
  - type: text
    content: ' '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: for there is no work or thought or knowledge or wisdom in Sheol, to which you are going.
  - type: heading
    content: Wisdom Better Than Folly
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:1, 7
  - type: text
    content: 'Again I saw that under the sun '
  - type: note
    content: Amos 2:14, 15; [Rom. 9:16]
  - type: text
    content: 'the race is not to the swift, nor '
  - type: note
    content: '[2 Chr. 20:15; Jer. 9:23]'
  - type: text
    content: 'the battle to the strong, nor bread to the wise, nor riches to the intelligent, nor favor to those with knowledge, but time and '
  - type: note
    content: '[1 Kgs. 22:34]'
  - type: text
    content: 'chance '
  - type: note
    content: See ch. 2:14
  - type: text
    content: 'happen to them all. '
  '12':
  - type: text
    content: 'For man '
  - type: note
    content: '[ch. 8:7]'
  - type: text
    content: 'does not know his time. Like fish that are taken in an evil net, and '
  - type: note
    content: Prov. 7:23
  - type: text
    content: 'like birds that are caught in a snare, so the children of man are '
  - type: note
    content: '[Prov. 29:6; Ezek. 12:13; Hos. 7:12; Luke 21:34, 35; 1 Thess. 5:3]'
  - type: text
    content: snared at an evil time, when it suddenly falls upon them.
  '13':
  - type: text
    content: 'I have also seen this example of wisdom under the sun, and it seemed great to me. '
  '14':
  - type: text
    content: 'There was a little city with few men in it, and a great king came against it and besieged it, building great siegeworks against it. '
  '15':
  - type: text
    content: 'But there was found in it '
  - type: note
    content: '[ch. 4:13]'
  - type: text
    content: 'a poor, wise man, and he by his '
  - type: note
    content: ver. 18; [2 Sam. 20:22]
  - type: text
    content: 'wisdom delivered the city. Yet no one remembered that poor man. '
  '16':
  - type: text
    content: 'But I say that '
  - type: note
    content: See ch. 7:19
  - type: text
    content: 'wisdom is better than might, though '
  - type: note
    content: '[Mark 6:2, 3]'
  - type: text
    content: the poor man’s wisdom is despised and his words are not heard.
  '17':
  - type: text
    content: 'The words of the wise heard in '
  - type: note
    content: ch. 4:6
  - type: text
    content: 'quiet are better than the shouting of a ruler among fools. '
  '18':
  - type: note
    content: ver. 16
  - type: text
    content: 'Wisdom is better than weapons of war, but '
  - type: note
    content: '[Josh. 7:1]'
  - type: text
    content: one sinner destroys much good.
  '2':
  - type: note
    content: Job 9:22
  - type: text
    content: 'It is the same for all, since '
  - type: note
    content: See ch. 2:14
  - type: text
    content: the same event happens to the righteous and the wicked, to the good and the evil,
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew lacks and the evil
  - type: text
    content: ' to the clean and the unclean, to him who sacrifices and him who does not sacrifice. As the good one is, so is the sinner, and he who '
  - type: note
    content: Zech. 5:3; [Mal. 3:5]
  - type: text
    content: 'swears is as he who shuns an oath. '
  '3':
  - type: text
    content: 'This is an evil in all that is done under the sun, that '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the same event happens to all. Also, the hearts of the children of man are full of evil, and '
  - type: note
    content: ch. 1:17
  - type: text
    content: 'madness is in their hearts while they live, and after that they go to the dead. '
  '4':
  - type: text
    content: 'But he who is joined with all the living has hope, for a living dog is better than a dead lion. '
  '5':
  - type: text
    content: 'For the living know that they will die, but '
  - type: note
    content: Job 14:21
  - type: text
    content: 'the dead know nothing, and they have no more reward, for '
  - type: note
    content: ch. 1:11; 8:10; Ps. 31:12; 88:5, 12; Isa. 26:14
  - type: text
    content: 'the memory of them is forgotten. '
  '6':
  - type: text
    content: Their love and their hate and their envy have already perished, and forever they have no more share in all that is done under the sun.
  - type: heading
    content: Enjoy Life with the One You Love
  '7':
  - type: text
    content: 'Go, '
  - type: note
    content: See ch. 2:24
  - type: text
    content: eat your bread with joy, and drink your wine with a merry heart, for God has already approved what you do.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Rev. 3:4 ]'
  - type: text
    content: 'Let your garments be always white. Let not '
  - type: note
    content: Ps. 23:5
  - type: text
    content: oil be lacking on your head.
  '9':
  - type: text
    content: 'Enjoy life with the wife whom you love, all the days of your '
  - type: note
    content: ch. 6:12; 7:15
  - type: text
    content: vain
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath” (see note on 1:2)
  - type: text
    content: ' life that he has given you under the sun, because that is your '
  - type: note
    content: See ch. 2:10
  - type: text
    content: 'portion in life and in your toil at which you toil under the sun. '
