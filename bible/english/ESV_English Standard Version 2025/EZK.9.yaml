document_id: EZK.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolaters Killed
  - type: text
    content: 'Then he cried in my ears with a loud voice, saying, “Bring near the executioners of the city, '
  - type: note
    content: '[ch. 43:3]'
  - type: text
    content: 'each with his destroying weapon in his hand.” '
  '10':
  - type: text
    content: 'As for me, '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'my eye will not spare, nor will I have pity; '
  - type: note
    content: See ch. 7:4
  - type: text
    content: I will bring their deeds upon their heads.”
  '11':
  - type: text
    content: 'And behold, '
  - type: note
    content: ch. 10:2, 6, 7; Dan. 10:5; 12:6, 7
  - type: text
    content: the man clothed in linen, with the writing case at his waist, brought back word, saying, “I have done as you commanded me.”
  '2':
  - type: text
    content: 'And behold, six men came from the direction of '
  - type: note
    content: 2 Kgs. 15:35; Jer. 20:2
  - type: text
    content: 'the upper gate, which faces north, each with his weapon for slaughter in his hand, and with them was '
  - type: note
    content: ch. 10:2, 6, 7; Dan. 10:5; 12:6, 7
  - type: text
    content: 'a man clothed in linen, with a writing case at his waist. And they went in and stood beside '
  - type: note
    content: '[ch. 8:16]'
  - type: text
    content: the bronze altar.
  '3':
  - type: text
    content: 'Now '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'the glory of the God of Israel had gone up from the cherub on which it rested to '
  - type: note
    content: ch. 10:4, 18; 46:2; 47:1
  - type: text
    content: 'the threshold of the house. And he called to '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'the man clothed in linen, who had the writing case at his waist. '
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Pass through the city, through Jerusalem, and '
  - type: note
    content: Rev. 3:12; 7:3; 9:4; 14:1; 22:4; [Ex. 12:7; Rev. 13:16, 17; 14:9; 20:4]
  - type: text
    content: 'put a mark on the foreheads of the men who '
  - type: note
    content: '[Ps. 119:53, 136, 158]'
  - type: text
    content: 'sigh and groan over all the abominations that are committed in it.” '
  '5':
  - type: text
    content: 'And to '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'the others he said in my hearing, “Pass through the city after him, and strike. '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'Your eye shall not spare, and you shall show no pity. '
  '6':
  - type: note
    content: '[2 Chr. 36:17]'
  - type: text
    content: 'Kill old men outright, young men and maidens, little children and women, but '
  - type: note
    content: '[Rev. 9:4]'
  - type: text
    content: 'touch no one on whom is the mark. And '
  - type: note
    content: See Jer. 25:29
  - type: text
    content: 'begin at my sanctuary.” So they began with the elders who were before the house. '
  '7':
  - type: text
    content: 'Then he said to them, '
  - type: note
    content: ch. 7:21, 22
  - type: text
    content: '“Defile the house, and fill the courts with the slain. Go out.” So they went out and struck in the city. '
  '8':
  - type: text
    content: 'And while they were striking, and I was left alone, '
  - type: note
    content: ch. 11:13; [Num. 14:5]
  - type: text
    content: 'I fell upon my face, and cried, '
  - type: note
    content: See ch. 4:14
  - type: text
    content: '“Ah, Lord '
  - type: text
    content: God
  - type: text
    content: '! '
  - type: note
    content: ch. 11:13
  - type: text
    content: 'Will you destroy all the remnant of Israel '
  - type: note
    content: See ch. 7:8
  - type: text
    content: in the outpouring of your wrath on Jerusalem?”
  '9':
  - type: text
    content: 'Then he said to me, '
  - type: note
    content: See 2 Chr. 36:14-16
  - type: text
    content: '“The guilt of the house of Israel and Judah is exceedingly great. '
  - type: note
    content: See ch. 7:23
  - type: text
    content: 'The land is full of blood, and the city full of injustice. For '
  - type: note
    content: See ch. 8:12
  - type: text
    content: 'they say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken the land, and the '
  - type: text
    content: Lord
  - type: text
    content: ' does not see.’ '
