verses:
  '1':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[Jude 19]'
  - type: text
    content: isolates himself seeks his own desire;
  - type: text
    content: he breaks out against all sound judgment.
  '10':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 34:5-7
  - type: text
    content: 'The name of the '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: Ps. 61:3; [Ps. 18:2]; See 2 Sam. 22:3
  - type: text
    content: a strong tower;
  - type: text
    content: 'the righteous man runs into it and '
  - type: note
    content: '[Ps. 20:1]'
  - type: text
    content: is safe.
  '11':
  - type: text
    content: ' '
  - type: note
    content: See ch. 10:15
  - type: text
    content: A rich man’s wealth is his strong city,
  - type: text
    content: and like a high wall in his imagination.
  '12':
  - type: text
    content: ' '
  - type: note
    content: See ch. 11:2
  - type: text
    content: Before destruction a man’s heart is haughty,
  - type: text
    content: 'but '
  - type: note
    content: ch. 15:33
  - type: text
    content: humility comes before honor.
  '13':
  - type: text
    content: 'If one gives an answer '
  - type: note
    content: '[John 7:51]'
  - type: text
    content: before he hears,
  - type: text
    content: it is his folly and shame.
  '14':
  - type: text
    content: A man’s spirit will endure sickness,
  - type: text
    content: 'but '
  - type: note
    content: ch. 15:13
  - type: text
    content: a crushed spirit who can bear?
  '15':
  - type: text
    content: An intelligent heart acquires knowledge,
  - type: text
    content: and the ear of the wise seeks knowledge.
  '16':
  - type: text
    content: 'A man’s '
  - type: note
    content: '[Gen. 32:20; 1 Sam. 25:27]; See ch. 17:8'
  - type: text
    content: gift makes room for him
  - type: text
    content: and brings him before the great.
  '17':
  - type: text
    content: The one who states his case first seems right,
  - type: text
    content: until the other comes and examines him.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:33 ]'
  - type: text
    content: The lot puts an end to quarrels
  - type: text
    content: and decides between powerful contenders.
  '19':
  - type: text
    content: A brother offended is more unyielding than a strong city,
  - type: text
    content: and quarreling is like the bars of a castle.
  '2':
  - type: text
    content: A fool takes no pleasure in understanding,
  - type: text
    content: 'but only '
  - type: note
    content: ch. 13:16; [Eccles. 10:3]
  - type: text
    content: in expressing his opinion.
  '20':
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:14
  - type: text
    content: From the fruit of a man’s mouth his stomach is satisfied;
  - type: text
    content: he is satisfied by the yield of his lips.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Matt. 12:36, 37; [ch. 4:23; 12:13 ]
  - type: text
    content: Death and life are in the power of the tongue,
  - type: text
    content: and those who love it will eat its fruits.
  '22':
  - type: text
    content: 'He who finds '
  - type: note
    content: ch. 12:4; 19:14; See ch. 31:10-31
  - type: text
    content: 'a wife finds '
  - type: note
    content: '[Gen. 2:18]'
  - type: text
    content: a good thing
  - type: text
    content: 'and '
  - type: note
    content: ch. 8:35
  - type: text
    content: 'obtains favor '
  - type: note
    content: ch. 19:14
  - type: text
    content: 'from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: The poor use entreaties,
  - type: text
    content: 'but '
  - type: note
    content: '[James 2:3, 6]'
  - type: text
    content: the rich answer roughly.
  '24':
  - type: text
    content: A man of many companions may come to ruin,
  - type: text
    content: 'but '
  - type: note
    content: See ch. 17:17
  - type: text
    content: there is a friend who sticks closer than a brother.
  '3':
  - type: text
    content: When wickedness comes, contempt comes also,
  - type: text
    content: and with dishonor comes disgrace.
  '4':
  - type: text
    content: 'The words of a man’s mouth are '
  - type: note
    content: ch. 20:5
  - type: text
    content: deep waters;
  - type: text
    content: the fountain of wisdom is a bubbling brook.
  '5':
  - type: text
    content: 'It is not good to '
  - type: note
    content: ch. 24:23; 28:21; Lev. 19:15; Deut. 1:17; Ps. 82:2
  - type: text
    content: be partial to
  - type: note
    content: Hebrew to lift the face of
  - type: text
    content: ' the wicked'
  - type: text
    content: 'or to '
  - type: note
    content: See ch. 17:15
  - type: text
    content: deprive the righteous of justice.
  '6':
  - type: text
    content: A fool’s lips walk into a fight,
  - type: text
    content: 'and his mouth invites '
  - type: note
    content: See ch. 19:29
  - type: text
    content: a beating.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:14; 12:13; 13:3; Ps. 64:8; 140:9; Eccles. 10:12
  - type: text
    content: A fool’s mouth is his ruin,
  - type: text
    content: and his lips are a snare to his soul.
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 26:22; [ch. 16:28 ]
  - type: text
    content: The words of a whisperer are like delicious morsels;
  - type: text
    content: 'they go down into '
  - type: note
    content: ch. 20:27
  - type: text
    content: the inner parts of the body.
  '9':
  - type: text
    content: Whoever is slack in his work
  - type: text
    content: 'is a '
  - type: note
    content: '[ch. 28:24]'
  - type: text
    content: brother to him who destroys.
