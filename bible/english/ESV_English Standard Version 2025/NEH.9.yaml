document_id: NEH.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The People of Israel Confess Their Sin
  - type: text
    content: 'Now on the twenty-fourth day of '
  - type: note
    content: '[ch. 8:2]'
  - type: text
    content: 'this month the people of Israel were assembled '
  - type: note
    content: '[1 Sam. 7:6]'
  - type: text
    content: 'with fasting '
  - type: note
    content: See 2 Sam. 3:31
  - type: text
    content: 'and in sackcloth, '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'and with earth on their heads. '
  '10':
  - type: note
    content: See Ex. 7–14
  - type: text
    content: 'and performed signs and wonders against Pharaoh and all his servants and all the people of his land, for you knew that '
  - type: note
    content: Ex. 18:11
  - type: text
    content: 'they acted arrogantly against our fathers. And '
  - type: note
    content: Isa. 63:12, 14; Jer. 32:20; Dan. 9:15; [Ex. 9:16]
  - type: text
    content: 'you made a name for yourself, as it is to this day. '
  '11':
  - type: note
    content: Ex. 14:21, 22, 27, 28; Ps. 78:13
  - type: text
    content: 'And you divided the sea before them, so that they went through the midst of the sea on dry land, and you cast their pursuers into the depths, '
  - type: note
    content: Ex. 15:5, 10
  - type: text
    content: 'as a stone into mighty waters. '
  '12':
  - type: text
    content: 'By '
  - type: note
    content: ver. 19; Ex. 13:21, 22; Num. 14:14; 1 Cor. 10:1
  - type: text
    content: 'a pillar of cloud you led them in the day, and by a pillar of fire in the night to light for them the way in which they should go. '
  '13':
  - type: note
    content: Ex. 19:20
  - type: text
    content: 'You came down on Mount Sinai '
  - type: note
    content: See Ex. 20:1-17
  - type: text
    content: 'and spoke with them from heaven and gave them '
  - type: note
    content: Ps. 19:8, 9; [Rom. 7:12]; See Ps. 119
  - type: text
    content: 'right rules and true laws, good statutes and commandments, '
  '14':
  - type: note
    content: Ex. 16:23; 20:8-11; [Gen. 2:2, 3; Ezek. 20:12, 20]
  - type: text
    content: 'and you made known to them your holy Sabbath and commanded them commandments and statutes and a law by Moses your servant. '
  '15':
  - type: note
    content: '[Ex. 16:14, 15; Ps. 78:25; 105:40; 1 Cor. 10:3]; Cited John 6:31'
  - type: text
    content: 'You gave them bread from heaven for their hunger and '
  - type: note
    content: Ex. 17:6; Num. 20:10; Ps. 78:15-17; 105:41; 1 Cor. 10:4
  - type: text
    content: 'brought water for them out of the rock for their thirst, and you '
  - type: note
    content: Deut. 1:8
  - type: text
    content: told them to go in to possess the land that you had sworn to give them.
  '16':
  - type: text
    content: '“But they and our fathers '
  - type: note
    content: Ex. 18:11
  - type: text
    content: 'acted presumptuously and stiffened their neck and did not obey your commandments. '
  '17':
  - type: text
    content: 'They refused to obey '
  - type: note
    content: Ps. 78:11, 42, 43
  - type: text
    content: and were not mindful of the wonders that you performed among them, but they stiffened their neck and appointed a leader to return to their slavery in Egypt.
  - type: note
    content: Some Hebrew manuscripts; many Hebrew manuscripts and in their rebellion appointed a leader to return to their slavery
  - type: text
    content: ' But you are a God ready to forgive, '
  - type: note
    content: ver. 31; Ex. 34:6; Num. 14:18; Ps. 86:5, 15; Joel 2:13
  - type: text
    content: 'gracious and merciful, slow to anger and abounding in steadfast love, and did not forsake them. '
  '18':
  - type: text
    content: 'Even '
  - type: note
    content: Ex. 32:4; Ps. 106:19, 20; Acts 7:41
  - type: text
    content: when they had made for themselves a golden
  - type: note
    content: Hebrew metal
  - type: text
    content: ' calf and said, ‘This is your God who brought you up out of Egypt,’ '
  - type: note
    content: ver. 26; Ps. 78:41, 58; [Heb. 3:15]
  - type: text
    content: 'and had committed great blasphemies, '
  '19':
  - type: text
    content: 'you '
  - type: note
    content: ver. 27, 31; Ps. 106:45
  - type: text
    content: 'in your great mercies did not forsake them in the wilderness. '
  - type: note
    content: See ver. 12
  - type: text
    content: 'The pillar of cloud to lead them in the way did not depart from them by day, '
  - type: note
    content: See ver. 12
  - type: text
    content: 'nor the pillar of fire by night to light for them the way by which they should go. '
  '2':
  - type: note
    content: ch. 10:28; 13:3, 30; [Ezra 6:21; 10:11]
  - type: text
    content: And the Israelites
  - type: note
    content: Hebrew the offspring of Israel
  - type: text
    content: ' separated themselves from all foreigners and stood and confessed their sins and the iniquities of their fathers. '
  '20':
  - type: note
    content: Isa. 63:11; [Num. 11:17]
  - type: text
    content: 'You gave your good Spirit to instruct them '
  - type: note
    content: '[Ex. 16:35]; See ver. 15'
  - type: text
    content: 'and did not withhold your manna from their mouth and gave them water for their thirst. '
  '21':
  - type: note
    content: Deut. 2:7
  - type: text
    content: Forty years you sustained them in the wilderness, and they lacked nothing. Their clothes did not wear out and their feet did not swell.
  '22':
  - type: text
    content: '“And you gave them kingdoms and peoples and allotted to them every corner. '
  - type: note
    content: See Num. 21:21-31
  - type: text
    content: 'So they took possession of the land of Sihon king of Heshbon '
  - type: note
    content: See Num. 21:33-35
  - type: text
    content: 'and the land of Og king of Bashan. '
  '23':
  - type: text
    content: 'You multiplied their children '
  - type: note
    content: Gen. 15:5; 22:17
  - type: text
    content: 'as the stars of heaven, and you brought them into the land that you had told their fathers to enter and possess. '
  '24':
  - type: note
    content: See Josh. 1–12
  - type: text
    content: 'So the descendants went in and possessed the land, '
  - type: note
    content: Ps. 44:2, 3
  - type: text
    content: 'and you subdued before them the inhabitants of the land, the Canaanites, and gave them into their hand, with their kings and the peoples of the land, that they might do with them as they would. '
  '25':
  - type: text
    content: 'And they captured '
  - type: note
    content: Deut. 3:5; 9:1; Josh. 10:20; 14:12
  - type: text
    content: 'fortified cities and '
  - type: note
    content: ver. 35; [Num. 13:20, 27; Deut. 8:7, 8; Ezek. 20:6]
  - type: text
    content: 'a rich land, and took possession of '
  - type: note
    content: Deut. 6:11
  - type: text
    content: 'houses full of all good things, cisterns already hewn, vineyards, olive orchards and fruit trees in abundance. So they ate and were filled '
  - type: note
    content: Deut. 32:15
  - type: text
    content: 'and became fat and delighted themselves in '
  - type: note
    content: ver. 35; Hos. 3:5
  - type: text
    content: your great goodness.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Judg. 2:11, 12; Ezek. 20:21
  - type: text
    content: '“Nevertheless, they were disobedient and rebelled against you '
  - type: note
    content: Ps. 50:17; [1 Kgs. 14:9]
  - type: text
    content: 'and cast your law behind their back '
  - type: note
    content: 1 Kgs. 18:4; 19:10; 2 Chr. 24:20, 21; Matt. 23:37; Acts 7:52
  - type: text
    content: 'and killed your prophets, who '
  - type: note
    content: See ver. 30
  - type: text
    content: 'had warned them in order to turn them back to you, '
  - type: note
    content: See ver. 18
  - type: text
    content: 'and they committed great blasphemies. '
  '27':
  - type: note
    content: Judg. 2:14; Ps. 106:41, 42
  - type: text
    content: 'Therefore you gave them into the hand of their enemies, who made them suffer. '
  - type: note
    content: Ps. 106:44, 45
  - type: text
    content: 'And in the time of their suffering they cried out to you and you heard them from heaven, and according to your great mercies you gave them '
  - type: note
    content: Judg. 2:16; 3:9
  - type: text
    content: 'saviors who saved them from the hand of their enemies. '
  '28':
  - type: note
    content: Judg. 3:11, 12, 30; 4:1; 5:31; 6:1
  - type: text
    content: 'But after they had rest they did evil again before you, and you abandoned them to the hand of their enemies, so that they had dominion over them. Yet when they turned and cried to you, you heard from heaven, '
  - type: note
    content: Ps. 106:43
  - type: text
    content: 'and many times you delivered them according to your mercies. '
  '29':
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'And you warned them in order to turn them back to your law. Yet '
  - type: note
    content: ver. 10, 16
  - type: text
    content: 'they acted presumptuously and did not obey your commandments, but sinned against your rules, '
  - type: note
    content: See Lev. 18:5
  - type: text
    content: 'which if a person does them, he shall live by them, '
  - type: note
    content: Zech. 7:11
  - type: text
    content: 'and they turned a stubborn shoulder '
  - type: note
    content: See ver. 16
  - type: text
    content: 'and stiffened their neck and would not obey. '
  '3':
  - type: note
    content: ch. 8:7, 8
  - type: text
    content: 'And they stood up in their place and read from the Book of the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God for a quarter of the day; for another quarter of it they made confession and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '30':
  - type: text
    content: 'Many years '
  - type: note
    content: '[Acts 13:18]'
  - type: text
    content: 'you bore with them '
  - type: note
    content: ver. 26, 29, 34; 2 Kgs. 17:13
  - type: text
    content: 'and warned them '
  - type: note
    content: 1 Pet. 1:10, 11; 2 Pet. 1:21
  - type: text
    content: 'by your Spirit through your prophets. '
  - type: note
    content: Acts 7:51
  - type: text
    content: 'Yet they would not give ear. '
  - type: note
    content: Ezra 9:7; [Isa. 42:24]
  - type: text
    content: 'Therefore you gave them into the hand of the peoples of the lands. '
  '31':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: ver. 19, 27
  - type: text
    content: 'in your great mercies '
  - type: note
    content: Jer. 4:27; 5:10, 18
  - type: text
    content: 'you did not make an end of them or forsake them, '
  - type: note
    content: ver. 17
  - type: text
    content: for you are a gracious and merciful God.
  '32':
  - type: text
    content: '“Now, therefore, our God, '
  - type: note
    content: ch. 1:5; Deut. 7:21
  - type: text
    content: 'the great, the mighty, and the awesome God, who keeps covenant and steadfast love, let not all the hardship seem little to you that has come upon us, upon our kings, our princes, our priests, our prophets, our fathers, and all your people, '
  - type: note
    content: 2 Kgs. 17:3
  - type: text
    content: 'since the time of the kings of Assyria until this day. '
  '33':
  - type: note
    content: See Ezra 9:15
  - type: text
    content: 'Yet you have been righteous in all that has come upon us, for you have dealt faithfully '
  - type: note
    content: Ps. 106:6; Dan. 9:5
  - type: text
    content: 'and we have acted wickedly. '
  '34':
  - type: text
    content: 'Our kings, our princes, our priests, and our fathers have not kept your law or paid attention to your commandments and your warnings that you gave them. '
  '35':
  - type: text
    content: 'Even in their own kingdom, '
  - type: note
    content: ver. 25
  - type: text
    content: 'and amid your great goodness that you gave them, and in the large and '
  - type: note
    content: ver. 25
  - type: text
    content: 'rich land that you set before them, '
  - type: note
    content: Deut. 28:47
  - type: text
    content: 'they did not serve you or turn from their wicked works. '
  '36':
  - type: text
    content: 'Behold, '
  - type: note
    content: Ezra 9:9
  - type: text
    content: 'we are slaves this day; in the land that you gave to our fathers to enjoy its fruit and its good gifts, behold, we are slaves. '
  '37':
  - type: note
    content: Deut. 28:33, 51
  - type: text
    content: And its rich yield goes to the kings whom you have set over us because of our sins. They rule over our bodies and over our livestock as they please, and we are in great distress.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Ch 10:1 in Hebrew
  - type: text
    content: '“Because of all this '
  - type: note
    content: 2 Kgs. 23:3; 2 Chr. 29:10; 34:31; Ezra 10:3; [ch. 10:29]; ch. 10:1
  - type: text
    content: 'we make a firm covenant in writing; on '
  - type: note
    content: '[ch. 10:1]'
  - type: text
    content: the sealed document are the names of
  - type: note
    content: Hebrew lacks the names of
  - type: text
    content: ' our princes, our Levites, and our priests.'
  '4':
  - type: text
    content: 'On the stairs of the Levites stood '
  - type: note
    content: '[ch. 8:7]'
  - type: text
    content: 'Jeshua, Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Chenani; and they cried with a loud voice to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '5':
  - type: text
    content: 'Then the Levites, Jeshua, Kadmiel, Bani, Hashabneiah, Sherebiah, Hodiah, Shebaniah, and Pethahiah, said, “Stand up and bless the '
  - type: text
    content: Lord
  - type: text
    content: ' your God from everlasting to everlasting. '
  - type: note
    content: '[1 Chr. 29:13]'
  - type: text
    content: Blessed be your glorious name, which is exalted above all blessing and praise.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Septuagint adds And Ezra said
  - type: note
    content: See 2 Kgs. 19:15
  - type: text
    content: '“You are the '
  - type: text
    content: Lord
  - type: text
    content: ', you alone. '
  - type: note
    content: See Gen. 1:1
  - type: text
    content: 'You have made heaven, '
  - type: note
    content: See Deut. 10:14
  - type: text
    content: 'the heaven of heavens, '
  - type: note
    content: See Gen. 2:1
  - type: text
    content: 'with all their host, '
  - type: note
    content: See Gen. 1:1
  - type: text
    content: 'the earth and all that is on it, the seas and all that is in them; '
  - type: note
    content: '[Ps. 36:6]'
  - type: text
    content: 'and you preserve all of them; and the host of heaven worships you. '
  '7':
  - type: text
    content: 'You are the '
  - type: text
    content: Lord
  - type: text
    content: ', the God '
  - type: note
    content: See Gen. 11:31
  - type: text
    content: 'who chose Abram and brought him out of '
  - type: note
    content: Gen. 11:31
  - type: text
    content: 'Ur of the Chaldeans '
  - type: note
    content: Gen. 17:5
  - type: text
    content: 'and gave him the name Abraham. '
  '8':
  - type: note
    content: Gen. 15:6
  - type: text
    content: 'You found his heart faithful before you, '
  - type: note
    content: Gen. 12:7; 15:18; 17:7-9
  - type: text
    content: 'and made with him the covenant to give to his offspring '
  - type: note
    content: See Ex. 13:5
  - type: text
    content: 'the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Jebusite, and the Girgashite. '
  - type: note
    content: '[Josh. 23:14]'
  - type: text
    content: And you have kept your promise, for you are righteous.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex. 3:7
  - type: text
    content: '“And you saw the affliction of our fathers in Egypt and heard '
  - type: note
    content: Ex. 14:10
  - type: text
    content: 'their cry at the Red Sea, '
