document_id: ISA.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Will Swallow Up Death Forever
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 15:2
  - type: text
    content: you are my God;
  - type: note
    content: '[ Ps. 107:32 ]'
  - type: text
    content: I will exalt you; I will praise your name,
  - type: text
    content: for you have done wonderful things,
  - type: note
    content: '[ 2 Kgs. 19:25 ]'
  - type: text
    content: plans formed of old, faithful and sure.
  '10':
  - type: text
    content: 'For the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will rest '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: on this mountain,
  - type: text
    content: 'and '
  - type: note
    content: See ch. 15:1
  - type: text
    content: Moab shall be trampled down in his place,
  - type: text
    content: as straw is trampled down in a dunghill.
  - type: note
    content: The Hebrew words for dunghill and for the Moabite town Madmen (Jeremiah 48:2) sound alike
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:12 ]'
  - type: text
    content: And he will spread out his hands in the midst of it
  - type: text
    content: as a swimmer spreads his hands out to swim,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:14]'
  - type: text
    content: will lay low his pompous pride together with the skill
  - type: note
    content: Or in spite of the skill
  - type: text
    content: ' of his hands.'
  '12':
  - type: text
    content: And the high fortifications of his walls he will bring down,
  - type: text
    content: lay low, and cast to the ground, to the dust.
  '2':
  - type: text
    content: 'For you have made the city '
  - type: note
    content: '[ch. 17:1; Jer. 51:37]'
  - type: text
    content: a heap,
  - type: text
    content: the fortified city a ruin;
  - type: text
    content: the foreigners’ palace is a city no more;
  - type: text
    content: it will never be rebuilt.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 18:7 ]'
  - type: text
    content: Therefore strong peoples will glorify you;
  - type: text
    content: cities of ruthless nations will fear you.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Nah. 1:7
  - type: text
    content: For you have been a stronghold to the poor,
  - type: text
    content: a stronghold to the needy in his distress,
  - type: note
    content: ch. 4:6
  - type: text
    content: a shelter from the storm and a shade from the heat;
  - type: note
    content: '[ 2 Chr. 32:18 ]'
  - type: text
    content: for the breath of the ruthless is like a storm against a wall,
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 32:2 ]'
  - type: text
    content: like heat in a dry place.
  - type: text
    content: You subdue the noise of the foreigners;
  - type: text
    content: as heat by the shade of a cloud,
  - type: text
    content: so the song of the ruthless is put down.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:2, 3; 11:9; 24:23
  - type: text
    content: 'On this mountain the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts will make for all peoples'
  - type: text
    content: a feast of rich food, a feast of well-aged wine,
  - type: note
    content: '[ Ps. 63:5 ]'
  - type: text
    content: of rich food full of marrow, of aged wine well refined.
  '7':
  - type: text
    content: 'And he will swallow up '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: on this mountain
  - type: text
    content: the covering that is cast over all peoples,
  - type: note
    content: '[ 2 Cor. 3:15 ]'
  - type: text
    content: the veil that is spread over all nations.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cited 1 Cor. 15:54; [ Hos. 13:14 ]
  - type: text
    content: He will swallow up death forever;
  - type: text
    content: 'and '
  - type: note
    content: Rev. 7:17; [ch. 30:19]
  - type: text
    content: 'the Lord '
  - type: text
    content: God
  - type: text
    content: ' will wipe away tears from all faces,'
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 37:4]'
  - type: text
    content: the reproach of his people he will take away from all the earth,
  - type: note
    content: See ch. 1:20
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '9':
  - type: text
    content: It will be said on that day,
  - type: text
    content: '“Behold, this is our God; '
  - type: note
    content: ch. 26:8; [Gen. 49:18; Ps. 27:14]
  - type: text
    content: we have waited for him, that he might save us.
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ; we have waited for him;
  - type: note
    content: Ps. 9:14
  - type: text
    content: let us be glad and rejoice in his salvation.”
