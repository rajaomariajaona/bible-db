verses:
  '1':
  - type: heading
    content: The Seventh Day, God Rests
  - type: text
    content: 'Thus the heavens and the earth were finished, and '
  - type: note
    content: Deut. 4:19; Ps. 33:6
  - type: text
    content: 'all the host of them. '
  '10':
  - type: text
    content: 'A river flowed out of Eden to water the garden, and there it divided and became four rivers. '
  '11':
  - type: text
    content: 'The name of the first is the Pishon. It is the one that flowed around the whole land of '
  - type: note
    content: ch. 10:7, 29; 25:18; 1 Sam. 15:7
  - type: text
    content: 'Havilah, where there is gold. '
  '12':
  - type: text
    content: 'And the gold of that land is good; bdellium and onyx stone are there. '
  '13':
  - type: text
    content: 'The name of the second river is the Gihon. It is the one that flowed around the whole land of Cush. '
  '14':
  - type: text
    content: 'And the name of the third river is the '
  - type: note
    content: Dan. 10:4
  - type: text
    content: Tigris, which flows east of Assyria.
  - type: note
    content: Or Asshur
  - type: text
    content: ' And the fourth river is the Euphrates.'
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God took the man '
  - type: note
    content: ver. 8
  - type: text
    content: 'and put him in the garden of Eden to work it and keep it. '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' God commanded the man, saying, “You may surely eat of every tree of the garden, '
  '17':
  - type: text
    content: 'but of the tree of the knowledge of good and evil '
  - type: note
    content: ch. 3:1-3, 11, 17
  - type: text
    content: you shall not eat, for in the day that you eat
  - type: note
    content: Or when you eat
  - type: text
    content: ' of it you '
  - type: note
    content: Rom. 6:23; James 1:15
  - type: text
    content: shall surely die.”
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God said, “It is not good that the man should be alone; '
  - type: note
    content: 1 Cor. 11:9; 1 Tim. 2:13
  - type: text
    content: I will make him a helper fit for
  - type: note
    content: Or corresponding to; also verse 20
  - type: text
    content: ' him.” '
  '19':
  - type: note
    content: ch. 1:20, 24
  - type: text
    content: 'Now out of the ground the '
  - type: text
    content: Lord
  - type: text
    content: ' God had formed'
  - type: note
    content: Or And out of the ground the Lord God formed
  - type: text
    content: ' every beast of the field and every bird of the heavens and '
  - type: note
    content: Ps. 8:6
  - type: text
    content: 'brought them to the man to see what he would call them. And whatever the man called every living creature, that was its name. '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 20:8-11; 31:17; Deut. 5:12-14; Heb. 4:4
  - type: text
    content: 'on the seventh day God finished his work that he had done, and he rested on the seventh day from all his work that he had done. '
  '20':
  - type: text
    content: The man gave names to all livestock and to the birds of the heavens and to every beast of the field. But for Adam
  - type: note
    content: Or the man
  - type: text
    content: ' there was not found a helper fit for him. '
  '21':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God caused a '
  - type: note
    content: ch. 15:12; 1 Sam. 26:12
  - type: text
    content: 'deep sleep to fall upon the man, and while he slept took one of his ribs and closed up its place with flesh. '
  '22':
  - type: text
    content: 'And the rib that the '
  - type: text
    content: Lord
  - type: text
    content: ' God had taken from the man he made'
  - type: note
    content: Hebrew built
  - type: text
    content: ' into a woman and brought her to the man. '
  '23':
  - type: text
    content: Then the man said,
  - type: text
    content: '“This at last is '
  - type: note
    content: ch. 29:14; Judg. 9:2; 2 Sam. 5:1; 19:13; [Eph. 5:28-30]
  - type: text
    content: bone of my bones
  - type: text
    content: and flesh of my flesh;
  - type: text
    content: she shall be called Woman,
  - type: text
    content: 'because she was '
  - type: note
    content: 1 Cor. 11:8
  - type: text
    content: taken out of Man.”
  - type: note
    content: The Hebrew words for woman (ishshah) and man (ish) sound alike
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 19:5; Mark 10:7; 1 Cor. 6:16; Eph. 5:31; [ Ps. 45:10; 1 Cor. 7:10, 11 ]
  - type: text
    content: 'Therefore a man shall leave his father and his mother and hold fast to his wife, and they shall become one flesh. '
  '25':
  - type: text
    content: And the man and his wife were both naked and were not ashamed.
  '3':
  - type: text
    content: So God blessed the seventh day and made it holy, because on it God rested from all his work that he had done in creation.
  - type: heading
    content: The Creation of Man and Woman
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 1:1
  - type: text
    content: These are the generations
  - type: text
    content: of the heavens and the earth when they were created,
  - type: text
    content: 'in the day that the '
  - type: text
    content: Lord
  - type: text
    content: ' God made the earth and the heavens.'
  '5':
  - type: text
    content: 'When no '
  - type: note
    content: '[ch. 1:11, 12]'
  - type: text
    content: bush of the field
  - type: note
    content: Or open country
  - type: text
    content: ' was yet in the land'
  - type: note
    content: Or earth; also verse 6
  - type: text
    content: ' and no small plant of the field had yet sprung up—for the '
  - type: text
    content: Lord
  - type: text
    content: ' God had not caused it to rain on the land, and there was no man '
  - type: note
    content: ch. 3:23
  - type: text
    content: 'to work the ground, '
  '6':
  - type: text
    content: and a mist
  - type: note
    content: Or spring
  - type: text
    content: ' was going up from the land and was watering the whole face of the ground— '
  '7':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' God formed the man of '
  - type: note
    content: ch. 3:19, 23; 18:27; Ps. 103:14; Eccles. 12:7; 1 Cor. 15:47
  - type: text
    content: 'dust from the ground and '
  - type: note
    content: ch. 7:22; Job 33:4; Isa. 2:22
  - type: text
    content: 'breathed into his '
  - type: note
    content: Job 27:3
  - type: text
    content: 'nostrils the breath of life, and '
  - type: note
    content: Cited 1 Cor. 15:45
  - type: text
    content: 'the man became a living creature. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' God planted a '
  - type: note
    content: ver. 15; ch. 13:10; Isa. 51:3; Ezek. 28:13; 31:8; Joel 2:3
  - type: text
    content: 'garden in Eden, in the east, and there he put the man whom he had formed. '
  '9':
  - type: text
    content: 'And out of the ground the '
  - type: text
    content: Lord
  - type: text
    content: ' God made to spring up every tree that is pleasant to the sight and good for food. '
  - type: note
    content: ch. 3:22; Rev. 2:7; 22:2, 14
  - type: text
    content: 'The tree of life was in the midst of the garden, '
  - type: note
