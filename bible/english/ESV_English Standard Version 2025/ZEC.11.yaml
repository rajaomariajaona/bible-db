document_id: ZEC.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flock Doomed to Slaughter
  - type: text
    content: 'Open your doors, '
  - type: note
    content: '[Isa. 2:12, 13]'
  - type: text
    content: O Lebanon,
  - type: text
    content: that the fire may devour your cedars!
  '10':
  - type: text
    content: 'And I took '
  - type: note
    content: ver. 7
  - type: text
    content: 'my staff Favor, and I broke it, annulling the covenant that I had made with all the peoples. '
  '11':
  - type: text
    content: 'So it was annulled on that day, and the sheep traders, who were watching me, knew that it was the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Then I said to them, “If it seems good to you, give me my wages; but if not, keep them.” And they weighed out as my wages '
  - type: note
    content: '[Ex. 21:32; Matt. 26:15]'
  - type: text
    content: 'thirty pieces of silver. '
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Throw it to the potter”—'
  - type: note
    content: '[Matt. 27:9, 10]'
  - type: text
    content: 'the lordly price at which I was priced by them. So I took the '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'thirty pieces of silver and threw them into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', to the potter. '
  '14':
  - type: text
    content: 'Then I broke '
  - type: note
    content: ver. 7
  - type: text
    content: my second staff Union, annulling the brotherhood between Judah and Israel.
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Take once more the equipment of '
  - type: note
    content: See 2 Kgs. 24:18-20
  - type: text
    content: 'a foolish shepherd. '
  '16':
  - type: text
    content: 'For behold, I am raising up in the land a shepherd '
  - type: note
    content: '[Ezek. 34:4; John 10:13]'
  - type: text
    content: 'who does not care for those being destroyed, or seek the young or heal the maimed or nourish the healthy, but '
  - type: note
    content: Ezek. 34:3
  - type: text
    content: devours the flesh of the fat ones, tearing off even their hoofs.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jer. 23:1
  - type: text
    content: “Woe to my worthless shepherd,
  - type: note
    content: John 10:12
  - type: text
    content: who deserts the flock!
  - type: text
    content: May the sword strike his arm
  - type: text
    content: 'and '
  - type: note
    content: '[2 Kgs. 25:7]'
  - type: text
    content: his right eye!
  - type: text
    content: Let his arm be wholly withered,
  - type: text
    content: his right eye utterly blinded!”
  '2':
  - type: text
    content: Wail, O cypress, for the cedar has fallen,
  - type: text
    content: for the glorious trees are ruined!
  - type: text
    content: 'Wail, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: oaks of Bashan,
  - type: text
    content: for the thick forest has been felled!
  '3':
  - type: text
    content: 'The sound of '
  - type: note
    content: Jer. 25:34
  - type: text
    content: 'the wail of '
  - type: note
    content: Jer. 25:34
  - type: text
    content: the shepherds,
  - type: text
    content: for their glory is ruined!
  - type: text
    content: 'The sound of the roar of '
  - type: note
    content: See Ezek. 19:1-3
  - type: text
    content: the lions,
  - type: note
    content: '[ Jer. 12:5 ]'
  - type: text
    content: for the thicket of the Jordan is ruined!
  '4':
  - type: text
    content: 'Thus said the '
  - type: text
    content: Lord
  - type: text
    content: ' my God: '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: '“Become shepherd of the flock doomed to slaughter. '
  '5':
  - type: note
    content: Ezek. 34:3
  - type: text
    content: 'Those who buy them slaughter them and go unpunished, and those who sell them say, ‘Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Hos. 12:8
  - type: text
    content: 'I have become rich,’ and their own shepherds have no pity on them. '
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Jer. 13:14
  - type: text
    content: 'I will no longer have pity on the inhabitants of this land, declares the '
  - type: text
    content: Lord
  - type: text
    content: . Behold, I will cause each of them to fall into the hand of his neighbor, and each into the hand of his king, and they shall crush the land, and I will deliver none from their hand.”
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 4 ]'
  - type: text
    content: 'So I became the shepherd of the flock doomed to be slaughtered by the sheep traders. And I took two staffs, one I named '
  - type: note
    content: ver. 10
  - type: text
    content: 'Favor, the other I named '
  - type: note
    content: ver. 14
  - type: text
    content: 'Union. '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'And I tended the sheep. '
  '8':
  - type: text
    content: 'In one month '
  - type: note
    content: '[ver. 3, 16; ch. 10:3; Jer. 22:11, 18, 24]'
  - type: text
    content: 'I destroyed the three shepherds. But I became impatient with them, and they also detested me. '
  '9':
  - type: text
    content: 'So I said, “I will not be your shepherd. '
  - type: note
    content: Jer. 15:2
  - type: text
    content: 'What is to die, let it die. What is to be destroyed, let it be destroyed. And let those who are left devour the flesh of one another.” '
