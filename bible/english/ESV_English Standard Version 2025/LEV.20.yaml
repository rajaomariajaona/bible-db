document_id: LEV.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Punishment for Child Sacrifice
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“If a '
  - type: note
    content: ch. 18:20; Deut. 22:22; John 8:4, 5
  - type: text
    content: man commits adultery with the wife of
  - type: note
    content: Hebrew repeats if a man commits adultery with the wife of
  - type: text
    content: ' his neighbor, both the adulterer and the adulteress shall surely be put to death. '
  '11':
  - type: note
    content: See ch. 18:8
  - type: text
    content: 'If a man lies with his father’s wife, he has uncovered his father’s nakedness; both of them shall surely be put to death; their blood is upon them. '
  '12':
  - type: note
    content: ch. 18:15
  - type: text
    content: 'If a man lies with his daughter-in-law, both of them shall surely be put to death; they have committed '
  - type: note
    content: ch. 18:23
  - type: text
    content: 'perversion; their blood is upon them. '
  '13':
  - type: note
    content: See ch. 18:22
  - type: text
    content: 'If a man lies with a male as with a woman, both of them have committed an abomination; they shall surely be put to death; their blood is upon them. '
  '14':
  - type: note
    content: ch. 18:17; Deut. 27:23
  - type: text
    content: 'If a man takes a woman and her mother also, it is depravity; he and they shall be burned with fire, that there may be no depravity among you. '
  '15':
  - type: note
    content: ch. 18:23; Ex. 22:19; Deut. 27:21
  - type: text
    content: 'If a man lies with an animal, he shall surely be put to death, and you shall kill the animal. '
  '16':
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: If a woman approaches any animal and lies with it, you shall kill the woman and the animal; they shall surely be put to death; their blood is upon them.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 18:9; Deut. 27:22
  - type: text
    content: '“If a man takes his sister, a daughter of his father or a daughter of his mother, and sees her nakedness, and she sees his nakedness, it is a disgrace, and they shall be cut off in the sight of the children of their people. He has uncovered his sister’s nakedness, and he shall bear his iniquity. '
  '18':
  - type: note
    content: ch. 18:19; [ch. 15:24]
  - type: text
    content: 'If a man lies with a woman during her menstrual period and uncovers her nakedness, he has made naked her fountain, and she has uncovered the fountain of her blood. Both of them shall be cut off from among their people. '
  '19':
  - type: note
    content: ch. 18:12, 13
  - type: text
    content: 'You shall not uncover the nakedness of your mother’s sister or of your father’s sister, for that is to make naked '
  - type: note
    content: ch. 18:6
  - type: text
    content: 'one’s relative; they shall bear their iniquity. '
  '2':
  - type: text
    content: '“Say to the people of Israel, '
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'Any one of the people of Israel or of the strangers who sojourn in Israel who gives any of his children to Molech shall surely be put to death. The people of the land shall stone him with stones. '
  '20':
  - type: note
    content: ch. 18:14
  - type: text
    content: 'If a man lies with his uncle’s wife, he has uncovered his uncle’s nakedness; they shall bear their sin; they shall die childless. '
  '21':
  - type: note
    content: ch. 18:16
  - type: text
    content: If a man takes his brother’s wife, it is impurity.
  - type: note
    content: Hebrew menstrual impurity
  - type: text
    content: ' He has uncovered his brother’s nakedness; they shall be childless.'
  - type: heading
    content: You Shall Be Holy
  '22':
  - type: text
    content: ' '
  - type: note
    content: See ch. 18:4
  - type: text
    content: '“You shall therefore keep all my statutes and all my rules and do them, that the land where I am bringing you to live may not '
  - type: note
    content: ch. 18:25, 28
  - type: text
    content: 'vomit you out. '
  '23':
  - type: note
    content: ch. 18:3, 24, 30; Deut. 9:5
  - type: text
    content: 'And you shall not walk in the customs of the nation that I am driving out before you, for they did all these things, and therefore I detested them. '
  '24':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 3:17; 6:8
  - type: text
    content: 'I have said to you, ‘You shall inherit their land, and I will give it to you to possess, a land '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'flowing with milk and honey.’ I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: Ex. 33:16; 1 Kgs. 8:53; [Ex. 19:5; Deut. 7:6; 14:2; 1 Kgs. 8:53]
  - type: text
    content: 'who has separated you from the peoples. '
  '25':
  - type: note
    content: See ch. 11:2-47; Deut. 14:4-20
  - type: text
    content: 'You shall therefore separate the clean beast from the unclean, and the unclean bird from the clean. You shall not make yourselves detestable by beast or by bird or by anything with which the ground crawls, which I have set apart for you to hold unclean. '
  '26':
  - type: note
    content: Ex. 19:6
  - type: text
    content: 'You shall be holy to me, '
  - type: note
    content: ver. 7; See ch. 11:44
  - type: text
    content: 'for I the '
  - type: text
    content: Lord
  - type: text
    content: ' am holy and have separated you from the peoples, that you should be mine.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: See ch. 19:31
  - type: text
    content: '“A man or a woman who is a medium or a necromancer shall surely be put to death. They shall be '
  - type: note
    content: ver. 2
  - type: text
    content: 'stoned with stones; '
  - type: note
    content: ver. 9
  - type: text
    content: their blood shall be upon them.”
  '3':
  - type: note
    content: See ch. 17:10
  - type: text
    content: 'I myself will set my face against that man and will cut him off from among his people, because he has given one of his children to Molech, to make my sanctuary '
  - type: note
    content: ch. 19:30; Ezek. 5:11; 23:38, 39
  - type: text
    content: 'unclean and '
  - type: note
    content: See ch. 18:21
  - type: text
    content: 'to profane my holy name. '
  '4':
  - type: text
    content: 'And if the people of the land do at all close their eyes to that man when he gives one of his children to Molech, and do not '
  - type: note
    content: Deut. 17:2, 3, 5
  - type: text
    content: 'put him to death, '
  '5':
  - type: text
    content: 'then I will set my face against that man and against his clan and will cut them off from among their people, him and all who follow him in '
  - type: note
    content: See Ex. 34:15
  - type: text
    content: whoring after Molech.
  '6':
  - type: text
    content: '“If '
  - type: note
    content: See ch. 19:31
  - type: text
    content: 'a person turns to mediums and necromancers, whoring after them, '
  - type: note
    content: See ch. 17:10
  - type: text
    content: 'I will set my face against that person and will cut him off from among his people. '
  '7':
  - type: note
    content: See ch. 11:44
  - type: text
    content: 'Consecrate yourselves, therefore, and be holy, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: note
    content: See ch. 18:4
  - type: text
    content: 'Keep my statutes and do them; '
  - type: note
    content: ch. 21:8, 15, 23; 22:32; Ex. 31:13; Ezek. 37:28
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who sanctifies you. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: See Ex. 21:17
  - type: text
    content: 'anyone who curses his father or his mother shall surely be put to death; he has cursed his father or his mother; '
  - type: note
    content: ver. 11, 12, 13, 16, 27; [2 Sam. 1:16; 1 Kgs. 2:32, 33, 37]
  - type: text
    content: his blood is upon him.
  - type: heading
    content: Punishments for Sexual Immorality
