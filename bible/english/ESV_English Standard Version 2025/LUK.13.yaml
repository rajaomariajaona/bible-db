document_id: LUK.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Repent or Perish
  - type: text
    content: 'There were some present at that very time who told him about the Galileans whose blood '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'Pilate had mingled with their sacrifices. '
  '10':
  - type: text
    content: 'Now '
  - type: note
    content: See Matt. 4:23; Mark 6:2
  - type: text
    content: 'he was teaching in one of the synagogues on the Sabbath. '
  '11':
  - type: text
    content: 'And behold, there was a woman who had had '
  - type: note
    content: Acts 16:16; [ver. 16]
  - type: text
    content: 'a disabling spirit for eighteen years. She was bent over and could not fully straighten herself. '
  '12':
  - type: text
    content: 'When Jesus saw her, he called her over and said to her, '
  - type: text
    content: “Woman, you are freed from your disability.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And he '
  - type: note
    content: See Mark 5:23
  - type: text
    content: 'laid his hands on her, and immediately she was made straight, and she '
  - type: note
    content: ch. 5:25; 18:43; See ch. 7:16
  - type: text
    content: 'glorified God. '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 8:41
  - type: text
    content: 'the ruler of the synagogue, indignant because Jesus '
  - type: note
    content: See Matt. 12:2
  - type: text
    content: 'had healed on the Sabbath, said to the people, '
  - type: note
    content: Ex. 20:9; Ezek. 46:1
  - type: text
    content: '“There are six days in which work ought to be done. Come on those days and be healed, and not on the Sabbath day.” '
  '15':
  - type: text
    content: 'Then the Lord answered him, '
  - type: text
    content: '“You hypocrites! '
  - type: note
    content: ch. 14:5; [Matt. 12:11]
  - type: text
    content: Does not each of you on the Sabbath untie his ox or his donkey from the manger and lead it away to water it?
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And ought not this woman, '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'a daughter of Abraham whom '
  - type: note
    content: '[ver. 11; Acts 10:38; 1 Cor. 5:5; 2 Cor. 12:7]; See 1 Chr. 21:1'
  - type: text
    content: Satan bound for eighteen years, be loosed from this bond on the Sabbath day?”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'As he said these things, '
  - type: note
    content: Ps. 132:18; 1 Pet. 3:16
  - type: text
    content: 'all his adversaries were put to shame, and '
  - type: note
    content: ch. 18:43
  - type: text
    content: all the people rejoiced at all the glorious things that were done by him.
  - type: heading
    content: The Mustard Seed and the Leaven
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18, 19, see Matt. 13:31, 32; Mark 4:30-32
  - type: text
    content: 'He said therefore, '
  - type: text
    content: “What is the kingdom of God like? And to what shall I compare it?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'It is like '
  - type: note
    content: ch. 17:6; Matt. 17:20
  - type: text
    content: a grain of mustard seed that a man took and sowed in his garden, and it grew and became a tree, and the birds of the air made nests in its branches.”
  '2':
  - type: text
    content: 'And he answered them, '
  - type: note
    content: '[Job 4:7; John 9:2; Acts 28:4]'
  - type: text
    content: “Do you think that these Galileans were worse sinners than all the other Galileans, because they suffered in this way?
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And again he said, '
  - type: text
    content: “To what shall I compare the kingdom of God?
  - type: text
    content: ' '
  '21':
  - type: note
    content: Matt. 13:33
  - type: text
    content: 'It is like leaven that a woman took and hid in '
  - type: note
    content: Gen. 18:6
  - type: text
    content: 'three measures of flour, until it was '
  - type: note
    content: 1 Cor. 5:6; Gal. 5:9
  - type: text
    content: all leavened.”
  - type: heading
    content: The Narrow Door
  '22':
  - type: text
    content: ' '
  - type: note
    content: See Mark 6:6
  - type: text
    content: 'He went on his way through towns and villages, teaching and '
  - type: note
    content: '[ver. 33]; See ch. 9:51'
  - type: text
    content: 'journeying toward Jerusalem. '
  '23':
  - type: text
    content: 'And someone said to him, “Lord, '
  - type: note
    content: Acts 2:47; 1 Cor. 1:18; 2 Cor. 2:15
  - type: text
    content: 'will those who are saved be few?” And he said to them, '
  '24':
  - type: note
    content: 1 Tim. 4:10; Heb. 12:4; [1 Tim. 6:12 (Gk.)]; See 1 Cor. 9:25
  - type: text
    content: '“Strive '
  - type: note
    content: Matt. 7:13
  - type: text
    content: to enter through the narrow door. For many, I tell you, will seek to enter and will not be able.
  - type: text
    content: ' '
  '25':
  - type: note
    content: For ver. 25-27, [Matt. 25:10-12]
  - type: text
    content: 'When once the master of the house has risen and shut the door, and you begin to stand outside and to knock at the door, saying, '
  - type: note
    content: Matt. 7:22, 23
  - type: text
    content: '‘Lord, open to us,’ then he will answer you, '
  - type: note
    content: Matt. 10:33; 25:12; [2 Tim. 2:19]
  - type: text
    content: ‘I do not know where you come from.’
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Then you will begin to say, '
  - type: note
    content: '[Ex. 24:11]'
  - type: text
    content: ‘We ate and drank in your presence, and you taught in our streets.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But he will say, ‘I tell you, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'I do not know where you come from. '
  - type: note
    content: See Ps. 6:8
  - type: text
    content: Depart from me, all you workers of evil!’
  - type: text
    content: ' '
  '28':
  - type: note
    content: See Matt. 8:11, 12
  - type: text
    content: 'In that place there will be weeping and gnashing of teeth, when you see '
  - type: note
    content: See Matt. 8:11, 12
  - type: text
    content: 'Abraham and Isaac and Jacob and all the prophets in the kingdom of God but '
  - type: note
    content: See Matt. 8:11, 12
  - type: text
    content: you yourselves cast out.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'people will come from east and west, and from north and south, and '
  - type: note
    content: '[ch. 14:15; 22:30]'
  - type: text
    content: recline at table in the kingdom of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'No, I tell you; but unless you '
  - type: note
    content: See ch. 5:32
  - type: text
    content: repent, you will all likewise perish.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And behold, '
  - type: note
    content: See Matt. 19:30
  - type: text
    content: some are last who will be first, and some are first who will be last.”
  - type: heading
    content: Lament over Jerusalem
  '31':
  - type: text
    content: 'At that very hour some Pharisees came and said to him, “Get away from '
  - type: note
    content: '[Matt. 19:1; Mark 10:1]'
  - type: text
    content: 'here, for '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'Herod wants to kill you.” '
  '32':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Go and tell that fox, ‘Behold, I cast out demons and perform cures today and tomorrow, and the third day '
  - type: note
    content: '[See Heb. 2:10; 5:9; 7:28]'
  - type: text
    content: I finish my course.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Nevertheless, '
  - type: note
    content: '[John 11:9]'
  - type: text
    content: 'I '
  - type: note
    content: Acts 3:21; 17:3
  - type: text
    content: 'must go on my way today and tomorrow and the day following, for it cannot be that '
  - type: note
    content: See Matt. 21:11
  - type: text
    content: a prophet should perish away from Jerusalem.’
  - type: text
    content: ' '
  '34':
  - type: note
    content: For ver. 34, 35, see Matt. 23:37-39; [ch. 19:41-44]
  - type: text
    content: 'O Jerusalem, Jerusalem, the city that '
  - type: note
    content: See Matt. 21:35
  - type: text
    content: 'kills the prophets and stones those who are sent to it! '
  - type: note
    content: '[Matt. 26:55]'
  - type: text
    content: 'How often would I have '
  - type: note
    content: '[Ps. 147:2; Prov. 1:24]'
  - type: text
    content: 'gathered '
  - type: note
    content: ch. 23:28
  - type: text
    content: 'your children together '
  - type: note
    content: '[Deut. 32:11, 12]'
  - type: text
    content: 'as a hen gathers her brood '
  - type: note
    content: Ruth 2:12
  - type: text
    content: 'under her wings, and '
  - type: note
    content: John 5:40
  - type: text
    content: you were not willing!
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Behold, '
  - type: note
    content: '[Isa. 64:11; Jer. 12:7; 22:5]'
  - type: text
    content: 'your house is forsaken. And I tell you, you will not see me until you say, '
  - type: note
    content: ch. 19:38; Cited from Ps. 118:26
  - type: text
    content: ‘Blessed is he who comes in the name of the Lord!’”
  '4':
  - type: text
    content: 'Or those eighteen on whom the tower in '
  - type: note
    content: John 9:7, 11
  - type: text
    content: 'Siloam fell and killed them: do you think that they were worse offenders than all the others who lived in Jerusalem?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'No, I tell you; but unless you '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: repent, you will all likewise perish.”
  - type: heading
    content: The Parable of the Barren Fig Tree
  '6':
  - type: text
    content: 'And he told this parable: '
  - type: text
    content: '“A man had '
  - type: note
    content: Matt. 21:19; Mark 11:13; [Isa. 5:2]
  - type: text
    content: a fig tree planted in his vineyard, and he came seeking fruit on it and found none.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And he said to the vinedresser, ‘Look, for three years now I have come seeking fruit on this fig tree, and I find none. '
  - type: note
    content: ch. 3:9; Matt. 7:19
  - type: text
    content: Cut it down. Why should it use up the ground?’
  - type: text
    content: ' '
  '8':
  - type: text
    content: And he answered him, ‘Sir, let it alone this year also, until I dig around it and put on manure.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Then if it should bear fruit next year, well and good; but if not, you can cut it down.’”
  - type: heading
    content: A Woman with a Disabling Spirit
