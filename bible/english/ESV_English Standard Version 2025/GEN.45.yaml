      text: And he kissed all his brothers and wept upon them. After that his brothers talked with him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the report was heard in Pharaoh’s house, “Joseph’s brothers have come,” it pleased Pharaoh and his servants. '
  '17':
  - type: usfm
    marker: p
    children:
