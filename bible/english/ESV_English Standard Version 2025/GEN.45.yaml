document_id: GEN.45,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Provides for His Brothers and Family
  - type: text
    content: 'Then Joseph could not '
  - type: note
    content: ch. 43:31; [Esth. 5:10]
  - type: text
    content: 'control himself before all those who stood by him. He cried, “Make everyone go out from me.” So no one stayed with him when Joseph made himself known to his brothers. '
  '10':
  - type: note
    content: ch. 46:34; 47:1, 4, 6, 27; 50:8; Ex. 8:22; [ch. 47:11; Josh. 10:41]
  - type: text
    content: 'You shall dwell in the land of Goshen, and you shall be near me, you and your children and your children’s children, and your flocks, your herds, and all that you have. '
  '11':
  - type: note
    content: ch. 47:12; 50:21
  - type: text
    content: 'There I will provide for you, for there are yet five years of famine to come, so that you and your household, and all that you have, do not come to poverty.’ '
  '12':
  - type: text
    content: 'And now your eyes see, and the eyes of my brother Benjamin see, that it is '
  - type: note
    content: '[ch. 42:23]'
  - type: text
    content: 'my mouth that speaks to you. '
  '13':
  - type: text
    content: 'You must tell my father of all my honor in Egypt, and of all that you have seen. Hurry and '
  - type: note
    content: Acts 7:14
  - type: text
    content: 'bring my father down here.” '
  '14':
  - type: text
    content: 'Then he fell upon his brother Benjamin’s neck and wept, and Benjamin wept upon his neck. '
  '15':
  - type: text
    content: And he kissed all his brothers and wept upon them. After that his brothers talked with him.
  '16':
  - type: text
    content: 'When the report was heard in Pharaoh’s house, “Joseph’s brothers have come,” it pleased Pharaoh and his servants. '
  '17':
  - type: text
    content: 'And Pharaoh said to Joseph, “Say to your brothers, ‘Do this: load your beasts and go back to the land of Canaan, '
  '18':
  - type: text
    content: 'and take your father and your households, and come to me, and '
  - type: note
    content: ch. 47:6
  - type: text
    content: 'I will give you the best of the land of Egypt, and you shall eat the fat of the land.’ '
  '19':
  - type: text
    content: 'And you, Joseph, are commanded to say, ‘Do this: take '
  - type: note
    content: ch. 46:5
  - type: text
    content: 'wagons from the land of Egypt for your little ones and for your wives, and bring your father, and come. '
  '2':
  - type: text
    content: 'And he wept aloud, so that the Egyptians heard it, and the household of Pharaoh heard it. '
  '20':
  - type: text
    content: Have no concern for
  - type: note
    content: Hebrew Let your eye not pity
  - type: text
    content: ' your goods, for the best of all the land of Egypt is yours.’”'
  '21':
  - type: text
    content: 'The sons of Israel did so: and Joseph gave them '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: 'wagons, according to the command of Pharaoh, and gave them provisions for the journey. '
  '22':
  - type: text
    content: 'To each and all of them he gave '
  - type: note
    content: '[2 Kgs. 5:5, 22, 23]'
  - type: text
    content: a change of clothes, but to Benjamin he gave three hundred shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of silver and '
  - type: note
    content: '[ch. 43:34]'
  - type: text
    content: 'five changes of clothes. '
  '23':
  - type: text
    content: 'To his father he sent as follows: ten donkeys loaded with the good things of Egypt, and ten female donkeys loaded with grain, bread, and provision for his father on the journey. '
  '24':
  - type: text
    content: 'Then he sent his brothers away, and as they departed, he said to them, '
  - type: note
    content: '[ch. 42:22]'
  - type: text
    content: “Do not quarrel on the way.”
  '25':
  - type: text
    content: 'So they went up out of Egypt and came to the land of Canaan to their father Jacob. '
  '26':
  - type: text
    content: 'And they told him, “Joseph is still alive, and he is ruler over all the land of Egypt.” And his heart became numb, for he did not believe them. '
  '27':
  - type: text
    content: 'But when they told him all the words of Joseph, which he had said to them, and when he saw '
  - type: note
    content: ver. 19, 21; ch. 46:5
  - type: text
    content: 'the wagons that Joseph had sent to carry him, the spirit of their father Jacob revived. '
  '28':
  - type: text
    content: And Israel said, “It is enough; Joseph my son is still alive. I will go and see him before I die.”
  '3':
  - type: text
    content: 'And Joseph said to his brothers, '
  - type: note
    content: Acts 7:13
  - type: text
    content: “I am Joseph! Is my father still alive?” But his brothers could not answer him, for they were dismayed at his presence.
  '4':
  - type: text
    content: 'So Joseph said to his brothers, “Come near to me, please.” And they came near. And he said, “I am your brother, Joseph, '
  - type: note
    content: ch. 37:28
  - type: text
    content: 'whom you sold into Egypt. '
  '5':
  - type: text
    content: 'And now do not be distressed or angry with yourselves because you sold me here, '
  - type: note
    content: ch. 50:20; Ps. 105:16, 17
  - type: text
    content: 'for God sent me before you to preserve life. '
  '6':
  - type: text
    content: 'For the famine has been in the land these two years, and there are '
  - type: note
    content: ch. 41:30
  - type: text
    content: 'yet five years in which there will be neither '
  - type: note
    content: Ex. 34:21; Deut. 21:4; 1 Sam. 8:12; [Isa. 30:24]
  - type: text
    content: 'plowing nor harvest. '
  '7':
  - type: text
    content: 'And God sent me before you to preserve for you a remnant on earth, and to keep alive for you many survivors. '
  '8':
  - type: text
    content: 'So it was not you who sent me here, but God. He has made me a father to Pharaoh, and lord of all his house and '
  - type: note
    content: ver. 26; ch. 41:43
  - type: text
    content: 'ruler over all the land of Egypt. '
  '9':
  - type: text
    content: 'Hurry and go up to my father and say to him, ‘Thus says your son Joseph, God has made me lord of all Egypt. Come down to me; do not tarry. '
