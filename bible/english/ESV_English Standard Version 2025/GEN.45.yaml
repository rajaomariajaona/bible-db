      text: 'So they went up out of Egypt and came to the land of Canaan to their father Jacob. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they told him, “Joseph is still alive, and he is ruler over all the land of Egypt.” And his heart became numb, for he did not believe them. '
