document_id: DEU.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar on Mount Ebal
  - type: text
    content: 'Now Moses and the elders of Israel commanded the people, saying, “Keep the whole commandment that I command you today. '
  '10':
  - type: text
    content: 'You shall therefore obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, keeping his commandments and his statutes, which I command you today.”'
  '11':
  - type: text
    content: 'That day Moses charged the people, saying, '
  '12':
  - type: text
    content: '“When you have crossed over the Jordan, '
  - type: note
    content: ch. 11:29; Josh. 8:33; [Judg. 9:7]
  - type: text
    content: 'these shall stand on Mount Gerizim to bless the people: Simeon, Levi, Judah, Issachar, Joseph, and Benjamin. '
  '13':
  - type: text
    content: 'And these shall stand on Mount Ebal for the curse: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 33:10; Dan. 9:11]'
  - type: text
    content: 'the Levites shall declare to all the men of Israel in a loud voice:'
  '15':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 20:4; 34:17
  - type: text
    content: '“‘Cursed be the man who makes a carved or cast metal image, an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ', a thing made by the hands of a craftsman, and sets it up in secret.’ '
  - type: note
    content: '[Num. 5:22; Neh. 5:13; Ps. 106:48; Jer. 11:5; 28:6; 1 Cor. 14:16]'
  - type: text
    content: And all the people shall answer and say, ‘Amen.’
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex. 20:12; 21:17; Lev. 19:3; See ch. 21:18-21
  - type: text
    content: “‘Cursed be anyone who dishonors his father or his mother.’ And all the people shall say, ‘Amen.’
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ch. 19:14
  - type: text
    content: “‘Cursed be anyone who moves his neighbor’s landmark.’ And all the people shall say, ‘Amen.’
  '18':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:14
  - type: text
    content: “‘Cursed be anyone who misleads a blind man on the road.’ And all the people shall say, ‘Amen.’
  '19':
  - type: text
    content: ' '
  - type: note
    content: See Ex. 22:21, 22
  - type: text
    content: “‘Cursed be anyone who perverts the justice due to the sojourner, the fatherless, and the widow.’ And all the people shall say, ‘Amen.’
  '2':
  - type: text
    content: 'And on the day '
  - type: note
    content: Josh. 4:1
  - type: text
    content: 'you cross over the Jordan to the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, you shall set up large stones and plaster them with plaster. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 18:8
  - type: text
    content: '“‘Cursed be anyone who lies with his father’s wife, because he has '
  - type: note
    content: See ch. 22:30
  - type: text
    content: uncovered his father’s nakedness.’
  - type: note
    content: Hebrew uncovered his father’s skirt
  - type: text
    content: ' And all the people shall say, ‘Amen.’'
  '21':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 18:23
  - type: text
    content: “‘Cursed be anyone who lies with any kind of animal.’ And all the people shall say, ‘Amen.’
  '22':
  - type: text
    content: ' '
  - type: note
    content: Lev. 18:9; 20:17; [ Ezek. 22:11 ]
  - type: text
    content: “‘Cursed be anyone who lies with his sister, whether the daughter of his father or the daughter of his mother.’ And all the people shall say, ‘Amen.’
  '23':
  - type: text
    content: ' '
  - type: note
    content: Lev. 18:17; 20:14
  - type: text
    content: “‘Cursed be anyone who lies with his mother-in-law.’ And all the people shall say, ‘Amen.’
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:11; Ex. 21:12, 14
  - type: text
    content: “‘Cursed be anyone who strikes down his neighbor in secret.’ And all the people shall say, ‘Amen.’
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 16:19; Ex. 23:7, 8; Ezek. 22:12
  - type: text
    content: “‘Cursed be anyone who takes a bribe to shed innocent blood.’ And all the people shall say, ‘Amen.’
  '26':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:15; Jer. 11:3; Cited Gal. 3:10
  - type: text
    content: “‘Cursed be anyone who does not confirm the words of this law by doing them.’ And all the people shall say, ‘Amen.’
  '3':
  - type: note
    content: Josh. 8:32
  - type: text
    content: 'And you shall write on them all the words of this law, when you cross over to enter the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'a land flowing with milk and honey, as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, has promised you. '
  '4':
  - type: text
    content: 'And when you have crossed over the Jordan, you shall set up these stones, concerning which I command you today, '
  - type: note
    content: ch. 11:29; Josh. 8:30
  - type: text
    content: 'on Mount Ebal, and you shall plaster them with plaster. '
  '5':
  - type: text
    content: 'And there you shall build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, an altar of stones. '
  - type: note
    content: Ex. 20:25; Josh. 8:31
  - type: text
    content: 'You shall wield no iron tool on them; '
  '6':
  - type: text
    content: 'you shall build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God of uncut'
  - type: note
    content: Hebrew whole
  - type: text
    content: ' stones. And you shall offer burnt offerings on it to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '7':
  - type: text
    content: 'and you shall sacrifice peace offerings and '
  - type: note
    content: See ch. 12:7
  - type: text
    content: 'shall eat there, and you '
  - type: note
    content: See ch. 12:7
  - type: text
    content: 'shall rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[Hab. 2:2]'
  - type: text
    content: you shall write on the stones all the words of this law very plainly.”
  - type: heading
    content: Curses from Mount Ebal
  '9':
  - type: text
    content: 'Then Moses and the Levitical priests said to all Israel, “Keep silence and hear, O Israel: '
  - type: note
    content: ch. 26:18
  - type: text
    content: 'this day you have become the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
