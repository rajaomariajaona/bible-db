document_id: 2KI.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah’s Reforms
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-3, see 2 Chr. 34:29-32
  - type: text
    content: 'Then the king sent, and all the elders of Judah and Jerusalem were gathered to him. '
  '10':
  - type: text
    content: 'And he defiled '
  - type: note
    content: Isa. 30:33; Jer. 7:31, 32; 19:6, 11-14
  - type: text
    content: 'Topheth, which is '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'in the Valley of the Son of Hinnom, '
  - type: note
    content: See Lev. 18:21
  - type: text
    content: 'that no one might burn his son or his daughter as an offering to '
  - type: note
    content: See 1 Kgs. 11:7
  - type: text
    content: Molech.
  - type: note
    content: Hebrew might cause his son or daughter to pass through the fire for Molech
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And he removed the horses that the kings of Judah had dedicated to the sun, at the entrance to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', by the chamber of Nathan-melech the chamberlain, which was in the precincts.'
  - type: note
    content: The meaning of the Hebrew word is uncertain
  - type: text
    content: ' And he burned the chariots of the sun with fire. '
  '12':
  - type: text
    content: 'And the altars '
  - type: note
    content: '[Jer. 19:13; 32:29; Zeph. 1:5]'
  - type: text
    content: 'on the roof of the upper chamber of Ahaz, which the kings of Judah had made, and the altars '
  - type: note
    content: ch. 21:5
  - type: text
    content: 'that Manasseh had made in the two courts of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', he pulled down and broke in pieces'
  - type: note
    content: Hebrew pieces from there
  - type: text
    content: ' and cast the dust of them '
  - type: note
    content: ver. 4, 6
  - type: text
    content: 'into the brook Kidron. '
  '13':
  - type: text
    content: 'And the king defiled the high places that were east of Jerusalem, to the south of '
  - type: note
    content: '[1 Kgs. 11:7]'
  - type: text
    content: 'the mount of corruption, which Solomon the king of Israel had built for '
  - type: note
    content: See 1 Kgs. 11:5
  - type: text
    content: 'Ashtoreth the abomination of the Sidonians, and for '
  - type: note
    content: '[Num. 21:29]'
  - type: text
    content: 'Chemosh the abomination of Moab, and for '
  - type: note
    content: '[1 Kgs. 11:5]'
  - type: text
    content: 'Milcom the abomination of the Ammonites. '
  '14':
  - type: text
    content: 'And he broke in pieces the '
  - type: note
    content: See Ex. 23:24
  - type: text
    content: pillars and cut down the Asherim and filled their places with the bones of men.
  '15':
  - type: text
    content: 'Moreover, the altar at Bethel, the high place erected '
  - type: note
    content: 1 Kgs. 12:28, 29, 33
  - type: text
    content: 'by Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'who made Israel to sin, '
  - type: note
    content: ver. 6
  - type: text
    content: that altar with the high place he pulled down and burned,
  - type: note
    content: Septuagint broke in pieces its stones
  - type: text
    content: ' reducing it to dust. He also burned the Asherah. '
  '16':
  - type: text
    content: 'And as Josiah turned, he saw the tombs there on the mount. And he sent and took the bones out of the tombs and burned them on the altar and defiled it, '
  - type: note
    content: 1 Kgs. 13:2
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that the man of God proclaimed, who had predicted these things. '
  '17':
  - type: text
    content: 'Then he said, “What is that monument that I see?” And the men of the city told him, '
  - type: note
    content: 1 Kgs. 13:1, 30
  - type: text
    content: “It is the tomb of the man of God who came from Judah and predicted
  - type: note
    content: Hebrew called
  - type: text
    content: ' these things that you have done against the altar at Bethel.” '
  '18':
  - type: text
    content: 'And he said, “Let him be; let no man move his bones.” So they let his bones alone, with the bones '
  - type: note
    content: 1 Kgs. 13:11, 31
  - type: text
    content: 'of the prophet who came out of Samaria. '
  '19':
  - type: text
    content: 'And Josiah removed all the shrines also of the high places that were '
  - type: note
    content: '[2 Chr. 34:6, 7]'
  - type: text
    content: 'in the cities of Samaria, which kings of Israel had made, provoking the '
  - type: text
    content: Lord
  - type: text
    content: ' to anger. He did to them according to all that he had done at Bethel. '
  '2':
  - type: text
    content: 'And the king went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and with him all the men of Judah and all the inhabitants of Jerusalem and the priests and the prophets, all the people, both small and great. And '
  - type: note
    content: See Deut. 31:11
  - type: text
    content: 'he read in their hearing all the words of the Book of the Covenant '
  - type: note
    content: ch. 22:8
  - type: text
    content: 'that had been found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 11:18; Ex. 22:20; 1 Kgs. 18:40]'
  - type: text
    content: 'he sacrificed all the priests of the high places who were there, on the altars, '
  - type: note
    content: 2 Chr. 34:5
  - type: text
    content: and burned human bones on them. Then he returned to Jerusalem.
  - type: heading
    content: Josiah Restores the Passover
  '21':
  - type: text
    content: 'And the king commanded all the people, '
  - type: note
    content: See 2 Chr. 35:1-17
  - type: text
    content: '“Keep the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: See Ex. 12:3-11; Lev. 23:5, 8; Num. 9:2-4; Deut. 16:2-8
  - type: text
    content: 'as it is written in this Book of the Covenant.” '
  '22':
  - type: note
    content: 2 Chr. 35:18, 19
  - type: text
    content: 'For no such Passover had been kept since the days of the judges who judged Israel, or during all the days of the kings of Israel or of the kings of Judah. '
  '23':
  - type: text
    content: 'But in the eighteenth year of King Josiah this Passover was kept to the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem.'
  '24':
  - type: text
    content: 'Moreover, Josiah put away '
  - type: note
    content: ch. 21:6; See Lev. 19:31
  - type: text
    content: 'the mediums and the necromancers and '
  - type: note
    content: See Gen. 31:19
  - type: text
    content: 'the household gods and '
  - type: note
    content: ch. 21:11, 21
  - type: text
    content: 'the idols and all the abominations that were seen in the land of Judah and in Jerusalem, that he might establish '
  - type: note
    content: Lev. 19:31; 20:27; Deut. 18:11
  - type: text
    content: 'the words of the law that were written in the book '
  - type: note
    content: ch. 22:8
  - type: text
    content: 'that Hilkiah the priest found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: note
    content: '[ch. 18:5]'
  - type: text
    content: 'Before him there was no king like him, who turned to the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart and with all his soul and with all his might, according to all the Law of Moses, nor did any like him arise after him.'
  '26':
  - type: text
    content: 'Still the '
  - type: text
    content: Lord
  - type: text
    content: ' did not turn from the burning of his great wrath, by which his anger was kindled against Judah, '
  - type: note
    content: ch. 21:11; 24:3, 4; Jer. 15:4
  - type: text
    content: 'because of all the provocations with which Manasseh had provoked him. '
  '27':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will remove Judah also out of my sight, '
  - type: note
    content: ch. 17:18, 20; 18:11; 21:13
  - type: text
    content: 'as I have removed Israel, and I will cast off this city that I have chosen, Jerusalem, '
  - type: note
    content: See ch. 21:4
  - type: text
    content: and the house of which I said, My name shall be there.”
  - type: heading
    content: Josiah’s Death in Battle
  '28':
  - type: text
    content: 'Now the rest of the acts of Josiah and all that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '29':
  - type: note
    content: For ver. 29, 30, see 2 Chr. 35:20-24
  - type: text
    content: 'In his days '
  - type: note
    content: Jer. 46:2
  - type: text
    content: 'Pharaoh Neco king of Egypt went up to the king of Assyria to the river Euphrates. King Josiah went to meet him, and Pharaoh Neco killed him at '
  - type: note
    content: '[Judg. 5:19; Zech. 12:11]'
  - type: text
    content: 'Megiddo, as soon as he saw him. '
  '3':
  - type: text
    content: 'And the king stood '
  - type: note
    content: ch. 11:14
  - type: text
    content: 'by the pillar and '
  - type: note
    content: '[ch. 11:17]'
  - type: text
    content: 'made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Deut. 13:4
  - type: text
    content: 'to walk after the '
  - type: text
    content: Lord
  - type: text
    content: ' and to keep his commandments and his testimonies and his statutes with all his heart and all his soul, to perform the words of this covenant that were written in this book. And all the people joined in the covenant.'
  '30':
  - type: note
    content: '[ch. 9:28]'
  - type: text
    content: 'And his servants carried him dead in a chariot from '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'Megiddo and brought him to Jerusalem and buried him in his own tomb. '
  - type: note
    content: For ver. 30-34, see 2 Chr. 36:1-4
  - type: text
    content: And the people of the land took Jehoahaz the son of Josiah, and anointed him, and made him king in his father’s place.
  - type: heading
    content: Jehoahaz’s Reign and Captivity
  '31':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Chr. 3:15; Jer. 22:11 ]'
  - type: text
    content: 'Jehoahaz was twenty-three years old when he began to reign, and he reigned three months in Jerusalem. His mother’s name was '
  - type: note
    content: ch. 24:18
  - type: text
    content: 'Hamutal the daughter of Jeremiah of Libnah. '
  '32':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 24:9, 19]'
  - type: text
    content: 'according to all that his fathers had done. '
  '33':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'Pharaoh Neco put him in bonds at '
  - type: note
    content: ch. 25:6, 20, 21; Jer. 39:5, 6; 52:9, 10, 26, 27
  - type: text
    content: 'Riblah in the land of '
  - type: note
    content: See 1 Kgs. 8:65
  - type: text
    content: Hamath, that he might not reign in Jerusalem, and laid on the land a tribute of a hundred talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver and a talent of gold. '
  '34':
  - type: text
    content: 'And '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: 'Pharaoh Neco made Eliakim the son of Josiah king in the place of Josiah his father, and '
  - type: note
    content: '[ch. 24:17; Dan. 1:7]'
  - type: text
    content: 'changed his name to Jehoiakim. But he took Jehoahaz away, '
  - type: note
    content: Jer. 22:11, 12; [Ezek. 19:3, 4]
  - type: text
    content: 'and he came to Egypt and died there. '
  '35':
  - type: text
    content: 'And Jehoiakim '
  - type: note
    content: ver. 33
  - type: text
    content: gave the silver and the gold to Pharaoh, but he taxed the land to give the money according to the command of Pharaoh. He exacted the silver and the gold of the people of the land, from everyone according to his assessment, to give it to Pharaoh Neco.
  - type: heading
    content: Jehoiakim Reigns in Judah
  '36':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 36:5
  - type: text
    content: 'Jehoiakim was twenty-five years old when he began to reign, and he reigned eleven years in Jerusalem. His mother’s name was Zebidah the daughter of Pedaiah of Rumah. '
  '37':
  - type: text
    content: 'And he did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: according to all that his fathers had done.
  '4':
  - type: text
    content: 'And the king commanded Hilkiah the high priest and the priests '
  - type: note
    content: '[ch. 25:18; Jer. 52:24]'
  - type: text
    content: 'of the second order and the keepers of the threshold to bring out of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the vessels made for '
  - type: note
    content: ch. 21:3
  - type: text
    content: 'Baal, for '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: 'Asherah, and for all the host of heaven. '
  - type: note
    content: ver. 15
  - type: text
    content: 'He burned them outside Jerusalem in the fields of the Kidron and carried their ashes to Bethel. '
  '5':
  - type: text
    content: 'And he deposed the priests whom the kings of Judah had ordained to make offerings in the high places at the cities of Judah and around Jerusalem; those also who burned incense to Baal, to the sun and the moon and the constellations '
  - type: note
    content: ch. 21:3
  - type: text
    content: 'and all the host of the heavens. '
  '6':
  - type: text
    content: 'And he brought out '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: 'the Asherah from the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', outside Jerusalem, to the brook Kidron, '
  - type: note
    content: ver. 15
  - type: text
    content: 'and burned it at the brook Kidron '
  - type: note
    content: ver. 15; [2 Chr. 15:16]
  - type: text
    content: 'and beat it to dust and cast the dust of it upon the graves '
  - type: note
    content: '[2 Chr. 34:4]'
  - type: text
    content: 'of the common people. '
  '7':
  - type: text
    content: 'And he broke down the houses of '
  - type: note
    content: 1 Kgs. 14:24; 15:12; See Deut. 23:17
  - type: text
    content: 'the male cult prostitutes who were in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ezek. 16:16]'
  - type: text
    content: 'where the women wove hangings for '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the Asherah. '
  '8':
  - type: text
    content: 'And he brought all the priests out of the cities of Judah, and defiled the high places where the priests had made offerings, from '
  - type: note
    content: 1 Kgs. 15:22
  - type: text
    content: 'Geba to Beersheba. And he broke down the high places of the gates that were at the entrance of the gate of Joshua the governor of the city, which were on one’s left at the gate of the city. '
  '9':
  - type: note
    content: See Ezek. 44:10-14
  - type: text
    content: 'However, the priests of the high places did not come up to the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem, but they ate unleavened bread among their brothers. '
