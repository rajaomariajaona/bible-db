document_id: EXO.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Consecration of the Priests
  - type: text
    content: '“Now this is what you shall do to them to consecrate them, that they may serve me as priests. '
  - type: note
    content: Lev. 8:2
  - type: text
    content: 'Take one bull of the herd and two rams without blemish, '
  '10':
  - type: text
    content: '“Then you shall bring the bull before the tent of meeting. '
  - type: note
    content: ver. 15, 19; Lev. 1:4; 8:14
  - type: text
    content: 'Aaron and his sons shall lay their hands on the head of the bull. '
  '11':
  - type: text
    content: 'Then you shall kill the bull before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the tent of meeting, '
  '12':
  - type: text
    content: 'and '
  - type: note
    content: Lev. 8:15
  - type: text
    content: 'shall take part of the blood of the bull and put it on the '
  - type: note
    content: See ch. 27:2
  - type: text
    content: horns of the altar with your finger, and the rest of
  - type: note
    content: Hebrew all
  - type: text
    content: ' the blood you shall pour out at the base of the altar. '
  '13':
  - type: text
    content: 'And you shall take all '
  - type: note
    content: Lev. 3:3, 4
  - type: text
    content: 'the fat that covers the entrails, and the long lobe of the liver, and the two kidneys with the fat that is on them, and burn them on the altar. '
  '14':
  - type: text
    content: 'But the flesh of the bull and its skin and its dung you shall burn with fire '
  - type: note
    content: Lev. 4:11, 12, 21; Num. 19:3, 5; Heb. 13:11
  - type: text
    content: 'outside the camp; '
  - type: note
    content: ver. 36; ch. 30:10
  - type: text
    content: it is a sin offering.
  '15':
  - type: text
    content: '“Then '
  - type: note
    content: ver. 1; Lev. 8:18
  - type: text
    content: 'you shall take one of the rams, and '
  - type: note
    content: ver. 19; Lev. 1:4; 8:14
  - type: text
    content: 'Aaron and his sons shall lay their hands on the head of the ram, '
  '16':
  - type: text
    content: 'and you shall kill the ram and shall take its blood and throw it against the sides of the altar. '
  '17':
  - type: text
    content: 'Then you shall '
  - type: note
    content: Lev. 8:20
  - type: text
    content: 'cut the ram into pieces, and wash its entrails and its legs, and put them with its pieces and its head, '
  '18':
  - type: text
    content: 'and burn the whole ram on the altar. It is a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. It is a '
  - type: note
    content: ver. 25, 41; See Gen. 8:21
  - type: text
    content: pleasing aroma, a food offering
  - type: note
    content: Or an offering by fire; also verses 25, 41
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: ver. 1 ; Lev. 8:22
  - type: text
    content: '“You shall take the other ram, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'and Aaron and his sons shall lay their hands on the head of the ram, '
  '2':
  - type: note
    content: Lev. 2:4; See Lev. 6:20-22
  - type: text
    content: 'and unleavened bread, unleavened cakes mixed with oil, and unleavened wafers smeared with oil. You shall make them of fine wheat flour. '
  '20':
  - type: text
    content: 'and you shall kill the ram and take part of its blood and put it on the tip of the right ear of Aaron and on the tips of the right ears of his sons, and on the thumbs of their right hands and on the great toes of their right feet, and throw the rest of the blood against the sides of the altar. '
  '21':
  - type: text
    content: 'Then you shall take part of the blood that is on the altar, and of the '
  - type: note
    content: ver. 7
  - type: text
    content: anointing oil, and sprinkle it on Aaron and his garments, and on his sons and his sons’ garments with him. He and his garments shall be holy, and his sons and his sons’ garments with him.
  '22':
  - type: text
    content: '“You shall also take the fat from the ram and the fat tail and the '
  - type: note
    content: ver. 13
  - type: text
    content: 'fat that covers the entrails, and the long lobe of the liver and the two kidneys with the fat that is on them, and the right thigh (for it is a ram of '
  - type: note
    content: Lev. 7:37; 8:28, 31, 33
  - type: text
    content: 'ordination), '
  '23':
  - type: text
    content: 'and '
  - type: note
    content: ver. 2, 3; Lev. 8:26
  - type: text
    content: 'one loaf of bread and one cake of bread made with oil, and one wafer out of the basket of unleavened bread that is before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'You shall put all these on the palms of Aaron and on the palms of his sons, and '
  - type: note
    content: Lev. 7:30; 8:27, 29; Num. 5:25; 6:20
  - type: text
    content: 'wave them for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: Lev. 6:22; 8:28
  - type: text
    content: 'you shall take them from their hands and burn them on the altar on top of the burnt offering, as a '
  - type: note
    content: ver. 18, 41
  - type: text
    content: 'pleasing aroma before the '
  - type: text
    content: Lord
  - type: text
    content: '. It is a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: '“You shall take the '
  - type: note
    content: Lev. 8:29
  - type: text
    content: 'breast of the ram of Aaron’s '
  - type: note
    content: ver. 22
  - type: text
    content: 'ordination and '
  - type: note
    content: ver. 24
  - type: text
    content: 'wave it for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', and it shall be your portion. '
  '27':
  - type: text
    content: 'And you shall consecrate the '
  - type: note
    content: Lev. 7:31, 34; 10:14, 15; Num. 18:11, 18
  - type: text
    content: 'breast of the wave offering that is waved and the '
  - type: note
    content: Lev. 7:32, 34; 10:15; Num. 18:11
  - type: text
    content: 'thigh of the priests’ portion that is contributed from the ram of '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'ordination, from what was Aaron’s and his sons’. '
  '28':
  - type: text
    content: 'It shall be for Aaron and his sons as a '
  - type: note
    content: Lev. 10:15
  - type: text
    content: 'perpetual due from the people of Israel, for it is a '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'contribution. It shall be a '
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: 'contribution from the people of Israel from their peace offerings, their contribution to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: '“The holy garments of Aaron '
  - type: note
    content: Num. 18:8; [Num. 20:26, 28]
  - type: text
    content: 'shall be for his sons after him; they shall '
  - type: note
    content: ver. 9
  - type: text
    content: 'be anointed in them and ordained in them. '
  '3':
  - type: text
    content: 'You shall put them in one basket and bring them in the basket, and bring the bull and the two rams. '
  '30':
  - type: text
    content: 'The son who succeeds him as priest, who comes into the tent of meeting to minister in the Holy Place, shall wear them '
  - type: note
    content: Lev. 8:33, 35
  - type: text
    content: seven days.
  '31':
  - type: text
    content: '“You shall take the ram of ordination and '
  - type: note
    content: Lev. 8:31
  - type: text
    content: 'boil its flesh in a holy place. '
  '32':
  - type: text
    content: 'And Aaron and his sons shall eat the flesh of the ram and the '
  - type: note
    content: '[Matt. 12:4]'
  - type: text
    content: 'bread that is in the basket in the entrance of the tent of meeting. '
  '33':
  - type: note
    content: Lev. 10:14, 15, 17
  - type: text
    content: 'They shall eat those things with which atonement was made at their ordination and consecration, but an '
  - type: note
    content: Lev. 22:10
  - type: text
    content: 'outsider shall not eat of them, because they are holy. '
  '34':
  - type: text
    content: 'And if any of the flesh for the ordination or of the bread remain until the morning, then you shall '
  - type: note
    content: Lev. 8:32
  - type: text
    content: burn the remainder with fire. It shall not be eaten, because it is holy.
  '35':
  - type: text
    content: '“Thus you shall do to Aaron and to his sons, according to all that I have commanded you. Through '
  - type: note
    content: Lev. 8:33-35
  - type: text
    content: 'seven days shall you ordain them, '
  '36':
  - type: text
    content: 'and every day you shall offer a '
  - type: note
    content: ver. 14; ch. 30:10
  - type: text
    content: 'bull as a sin offering for atonement. Also you shall purify the altar, when you make atonement for it, and shall '
  - type: note
    content: ch. 30:26, 28, 29; 40:10
  - type: text
    content: 'anoint it to consecrate it. '
  '37':
  - type: text
    content: 'Seven days you shall make atonement for the altar and consecrate it, and the '
  - type: note
    content: ch. 40:10
  - type: text
    content: 'altar shall be most holy. '
  - type: note
    content: ch. 30:29; [Matt. 23:19]
  - type: text
    content: Whatever touches the altar shall become holy.
  '38':
  - type: text
    content: '“Now this is what you shall offer on the altar: '
  - type: note
    content: Num. 28:3; 1 Chr. 16:40; 2 Chr. 2:4; 13:11; 31:3; Ezra 3:3
  - type: text
    content: 'two lambs a year old '
  - type: note
    content: '[Dan. 8:11-13; 9:27; 12:11]; Heb. 10:11'
  - type: text
    content: 'day by day regularly. '
  '39':
  - type: text
    content: 'One lamb you shall offer '
  - type: note
    content: 2 Kgs. 16:15; Ezek. 46:13-15
  - type: text
    content: 'in the morning, and the other lamb you shall offer '
  - type: note
    content: 1 Kgs. 18:29, 36; Ezra 9:4, 5; Ps. 141:2; Dan. 9:21
  - type: text
    content: 'at twilight. '
  '4':
  - type: text
    content: 'You shall bring Aaron and his sons to the entrance of the tent of meeting and '
  - type: note
    content: ch. 40:12; Lev. 8:6; [Heb. 10:22]
  - type: text
    content: 'wash them with water. '
  '40':
  - type: text
    content: And with the first lamb a tenth measure
  - type: note
    content: Possibly an ephah (about 3/5 bushel or 22 liters)
  - type: text
    content: ' of fine flour mingled with a fourth of a hin'
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of beaten oil, and a fourth of a hin of wine for a drink offering. '
  '41':
  - type: text
    content: 'The other lamb you shall offer '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: 'at twilight, and shall offer with it a grain offering and its drink offering, as '
  - type: note
    content: ch. 30:9; 40:29
  - type: text
    content: 'in the morning, for a '
  - type: note
    content: ver. 18, 25
  - type: text
    content: 'pleasing aroma, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'It shall be a '
  - type: note
    content: Num. 28:6
  - type: text
    content: 'regular burnt offering throughout your generations at the entrance of the tent of meeting before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 25:22
  - type: text
    content: 'where I will meet with you, to speak to you there. '
  '43':
  - type: text
    content: 'There I will meet with the people of Israel, and it shall be '
  - type: note
    content: ch. 40:34; [1 Kgs. 8:11; 2 Chr. 5:14; 7:1-3; Ezek. 43:5; Hag. 2:7, 9; Mal. 3:1]
  - type: text
    content: 'sanctified by my glory. '
  '44':
  - type: text
    content: 'I will consecrate the tent of meeting and the altar. '
  - type: note
    content: Lev. 21:15; 22:9, 16
  - type: text
    content: 'Aaron also and his sons I will consecrate to serve me as priests. '
  '45':
  - type: note
    content: ch. 25:8; Lev. 26:12; Zech. 2:10; 2 Cor. 6:16; Rev. 21:3
  - type: text
    content: 'I will dwell among the people of Israel and will be their God. '
  '46':
  - type: text
    content: 'And they shall know that '
  - type: note
    content: ch. 20:2
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who brought them out of the land of Egypt that I might dwell among them. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 28:2-4
  - type: text
    content: 'you shall take the garments, and put on Aaron the coat and the robe of the ephod, and the ephod, and the breastpiece, and gird him with the '
  - type: note
    content: ch. 28:8
  - type: text
    content: 'skillfully woven band of the ephod. '
  '6':
  - type: note
    content: ch. 28:36, 37; Lev. 8:9; [Num. 6:7]
  - type: text
    content: 'And you shall set the turban on his head and put the holy crown on the turban. '
  '7':
  - type: text
    content: 'You shall take '
  - type: note
    content: ver. 21; ch. 28:41; 30:25; Lev. 8:12, 30; 10:7; 21:10; Num. 35:25
  - type: text
    content: 'the anointing oil and pour it on his head and anoint him. '
  '8':
  - type: text
    content: 'Then you '
  - type: note
    content: Lev. 8:13
  - type: text
    content: 'shall bring his sons and put coats on them, '
  '9':
  - type: text
    content: 'and you shall gird Aaron and his sons with '
  - type: note
    content: ch. 28:4, 39
  - type: text
    content: 'sashes and bind caps on them. And '
  - type: note
    content: ch. 27:21; Num. 18:7
  - type: text
    content: 'the priesthood shall be theirs by a statute forever. Thus you shall '
  - type: note
    content: ver. 29, 33; Lev. 8:33; 16:32; See ch. 28:41
  - type: text
    content: ordain Aaron and his sons.
