document_id: 2JN.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: ' '
  - type: note
    content: 3 John 1; [ 1 Pet. 5:1 ]
  - type: text
    content: 'The elder to the elect lady and her children, '
  - type: note
    content: 1 John 3:18; 3 John 1
  - type: text
    content: 'whom I love in truth, and not only I, but also all who '
  - type: note
    content: John 8:32; [1 Tim. 2:4; Heb. 10:26]
  - type: text
    content: 'know '
  - type: note
    content: John 1:17; 14:6; See Gal. 2:5
  - type: text
    content: 'the truth, '
  '10':
  - type: text
    content: 'If anyone comes to you and does not bring this teaching, '
  - type: note
    content: '[Rom. 16:17; Gal. 1:8, 9; 2 Thess. 3:6, 14; Titus 3:10]'
  - type: text
    content: 'do not receive him into your house or give him any greeting, '
  '11':
  - type: text
    content: 'for whoever greets him '
  - type: note
    content: '[1 Tim. 5:22]'
  - type: text
    content: takes part in his wicked works.
  - type: heading
    content: Final Greetings
  '12':
  - type: text
    content: ' '
  - type: note
    content: 3 John 13
  - type: text
    content: 'Though I have much to write to you, I would rather not use paper and ink. '
  - type: note
    content: 3 John 14
  - type: text
    content: 'Instead I hope to come to you and talk face to face, '
  - type: note
    content: John 15:11; 17:13
  - type: text
    content: so that our joy may be complete.
  '13':
  - type: text
    content: The children of your elect sister greet you.
  '2':
  - type: note
    content: '[1 Cor. 13:6]'
  - type: text
    content: 'because of the truth that abides in us and will be with us forever:'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 1 Tim. 1:2; 2 Tim. 1:2; [ Jude 2 ]
  - type: text
    content: Grace, mercy, and peace will be with us, from God the Father and from Jesus Christ the Father’s Son, in truth and love.
  - type: heading
    content: Walking in Truth and Love
  '4':
  - type: text
    content: ' '
  - type: note
    content: 3 John 3, 4
  - type: text
    content: 'I rejoiced greatly to find some of your children walking in the truth, just as we were commanded by the Father. '
  '5':
  - type: text
    content: And now I ask you, dear lady—
  - type: note
    content: 1 John 2:7
  - type: text
    content: not as though I were writing you a new commandment, but the one we have had from the beginning—
  - type: note
    content: See 1 John 3:11
  - type: text
    content: 'that we love one another. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: 1 John 5:3; [1 John 2:5]; See John 14:15
  - type: text
    content: 'this is love, that we walk according to his commandments; this is the commandment, just '
  - type: note
    content: 1 John 2:24
  - type: text
    content: 'as you have heard from the beginning, so that you should walk in it. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: See 1 John 2:18, 26
  - type: text
    content: 'many deceivers '
  - type: note
    content: 1 John 4:1
  - type: text
    content: 'have gone out into the world, '
  - type: note
    content: 1 John 2:22; 4:2, 3
  - type: text
    content: 'those who do not confess the coming of Jesus Christ in the flesh. Such a one is the deceiver and the antichrist. '
  '8':
  - type: text
    content: 'Watch yourselves, '
  - type: note
    content: '[Gal. 3:4; Heb. 10:35]'
  - type: text
    content: so that you may not lose what we
  - type: note
    content: Some manuscripts you
  - type: text
    content: ' have worked for, but '
  - type: note
    content: See 1 Cor. 3:8
  - type: text
    content: 'may win a full reward. '
  '9':
  - type: text
    content: 'Everyone who goes on ahead and does not abide in the teaching of Christ, '
  - type: note
    content: See 1 John 2:23
  - type: text
    content: 'does not have God. Whoever abides in the teaching '
  - type: note
    content: See 1 John 2:23
  - type: text
    content: 'has both the Father and the Son. '
