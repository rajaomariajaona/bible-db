document_id: MAT.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laborers in the Vineyard
  - type: text
    content: ' '
  - type: text
    content: “For the kingdom of heaven is like a master of a house who went out early in the morning to hire laborers for his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Now when those hired first came, they thought they would receive more, but each of them also received a denarius.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And on receiving it they grumbled at the master of the house,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'saying, ‘These last worked only one hour, and you have made them equal to us who have borne the burden of the day and '
  - type: note
    content: Luke 12:55; James 1:11 (Gk.)
  - type: text
    content: the scorching heat.’
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But he replied to one of them, '
  - type: note
    content: ch. 22:12; 26:50
  - type: text
    content: ‘Friend, I am doing you no wrong. Did you not agree with me for a denarius?
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Take '
  - type: note
    content: ch. 25:25
  - type: text
    content: what belongs to you and go. I choose to give to this last worker as I give to you.
  - type: text
    content: ' '
  '15':
  - type: note
    content: '[Rom. 9:15-24]'
  - type: text
    content: 'Am I not allowed to do what I choose with what belongs to me? Or '
  - type: note
    content: ch. 6:23; Deut. 15:9; Prov. 23:6
  - type: text
    content: do you begrudge my generosity?’
  - type: note
    content: Or is your eye bad because I am good?
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'So '
  - type: note
    content: See ch. 19:30
  - type: text
    content: the last will be first, and the first last.”
  - type: heading
    content: Jesus Foretells His Death a Third Time
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-19, see Mark 10:32-34; Luke 18:31-33; [ch. 16:21-28; 17:12, 22, 23 ]
  - type: text
    content: 'And as Jesus was going up to Jerusalem, he took the twelve disciples aside, and on the way he said to them, '
  '18':
  - type: text
    content: '“See, '
  - type: note
    content: See ch. 16:21
  - type: text
    content: 'we are going up to Jerusalem. And the Son of Man will be delivered over to the chief priests and scribes, and they will '
  - type: note
    content: ch. 26:66; John 19:7
  - type: text
    content: condemn him to death
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'and '
  - type: note
    content: ch. 27:2; John 18:30, 31; Acts 3:13; [Acts 2:23; 4:27; 21:11]
  - type: text
    content: 'deliver him over to the Gentiles '
  - type: note
    content: ch. 27:26-31
  - type: text
    content: 'to be mocked and flogged and '
  - type: note
    content: ch. 26:2; Luke 24:7; John 12:32, 33; 18:32
  - type: text
    content: 'crucified, and he will be raised on '
  - type: note
    content: ch. 16:21; 27:63
  - type: text
    content: the third day.”
  - type: heading
    content: A Mother’s Request
  '2':
  - type: text
    content: After agreeing with the laborers for a denarius
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  - type: text
    content: a day, he sent them into his vineyard.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: note
    content: For ver. 20-28, see Mark 10:35-45
  - type: text
    content: 'Then '
  - type: note
    content: ch. 4:21; 27:56
  - type: text
    content: 'the mother of the sons of Zebedee came up to him with her sons, and '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'kneeling before him she asked him for something. '
  '21':
  - type: text
    content: 'And he said to her, '
  - type: text
    content: “What do you want?”
  - type: text
    content: ' She said to him, “Say that these two sons of mine '
  - type: note
    content: '[ch. 19:28]'
  - type: text
    content: 'are to sit, one at your right hand and one at your left, '
  - type: note
    content: ch. 16:28; 25:31, 34; Luke 23:42
  - type: text
    content: 'in your kingdom.” '
  '22':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: '[Luke 9:33; 23:34]'
  - type: text
    content: '“You do not know what you are asking. Are you able '
  - type: note
    content: ch. 26:29, 42; Mark 14:36; Luke 22:42; John 18:11; [Isa. 51:22]
  - type: text
    content: to drink the cup that I am to drink?”
  - type: text
    content: ' They said to him, “We are able.” '
  '23':
  - type: text
    content: 'He said to them, '
  - type: note
    content: '[Rom. 8:17; Phil. 3:10]'
  - type: text
    content: '“You will drink '
  - type: note
    content: Acts 12:2; Rev. 1:9
  - type: text
    content: 'my cup, but to sit at my right hand and at my left is not mine to grant, '
  - type: note
    content: '[ch. 19:11]'
  - type: text
    content: 'but it is for those for whom it has been '
  - type: note
    content: ch. 25:34
  - type: text
    content: prepared by my Father.”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And when the ten heard it, they were indignant at the two brothers. '
  '25':
  - type: text
    content: 'But Jesus called them to him and said, '
  - type: note
    content: For ver. 25-28, [ch. 18:1-4; Luke 22:25-27]
  - type: text
    content: '“You know that the rulers of the Gentiles '
  - type: note
    content: 1 Pet. 5:3
  - type: text
    content: lord it over them, and their great ones exercise authority over them.
  - type: text
    content: ' '
  '26':
  - type: note
    content: ch. 23:11; [Luke 9:48]
  - type: text
    content: It shall not be so among you. But whoever would be great among you must be your servant,
  - type: note
    content: Greek diakonos
  - type: text
    content: ' '
  '27':
  - type: text
    content: and whoever would be first among you must be your slave,
  - type: note
    content: Or bondservant, or servant (for the contextual rendering of the Greek word doulos, see Preface)
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'even as the Son of Man came not to be served but '
  - type: note
    content: John 13:4, 13-15; Phil. 2:7; [2 Cor. 8:9]
  - type: text
    content: 'to serve, and '
  - type: note
    content: Isa. 53:10; Dan. 9:26; John 10:15; 11:51, 52; Rom. 4:25; Gal. 1:4; 2:20; 1 Tim. 2:6; Titus 2:14; 1 Pet. 1:18, 19
  - type: text
    content: 'to give his life as a ransom for '
  - type: note
    content: ch. 26:28; Isa. 53:11, 12; Heb. 2:10; 9:28; [Rom. 5:15; Rev. 5:9]
  - type: text
    content: many.”
  - type: heading
    content: Jesus Heals Two Blind Men
  '29':
  - type: text
    content: ' '
  - type: note
    content: For ver. 29-34, see Mark 10:46-52; Luke 18:35-43; [ch. 9:27-31 ]
  - type: text
    content: 'And as they went out of Jericho, a great crowd followed him. '
  '3':
  - type: text
    content: And going out about the third hour he saw others standing idle in the marketplace,
  - type: text
    content: ' '
  '30':
  - type: text
    content: And behold, there were two blind men sitting by the roadside, and when they heard that Jesus was passing by, they cried out, “Lord,
  - type: note
    content: Some manuscripts omit Lord
  - type: text
    content: ' have mercy on us, '
  - type: note
    content: ch. 21:9; 22:42; See ch. 1:1
  - type: text
    content: 'Son of David!” '
  '31':
  - type: text
    content: 'The crowd '
  - type: note
    content: ch. 19:13
  - type: text
    content: 'rebuked them, telling them to be silent, but they cried out all the more, “Lord, have mercy on us, Son of David!” '
  '32':
  - type: text
    content: 'And stopping, Jesus called them and said, '
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'They said to him, “Lord, let our eyes be opened.” '
  '34':
  - type: text
    content: And Jesus in pity touched their eyes, and immediately they recovered their sight and followed him.
  '4':
  - type: text
    content: and to them he said, ‘You go into the vineyard too, and whatever is right I will give you.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: So they went. Going out again about the sixth hour and the ninth hour, he did the same.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: '[1 Cor. 15:8]'
  - type: text
    content: about the eleventh hour he went out and found others standing. And he said to them, ‘Why do you stand here idle all day?’
  - type: text
    content: ' '
  '7':
  - type: text
    content: They said to him, ‘Because no one has hired us.’ He said to them, ‘You go into the vineyard too.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 19:13; Deut. 24:15
  - type: text
    content: 'when evening came, the owner of the vineyard said to his '
  - type: note
    content: Luke 8:3; [ch. 24:45]
  - type: text
    content: foreman, ‘Call the laborers and pay them their wages, beginning with the last, up to the first.’
  - type: text
    content: ' '
  '9':
  - type: text
    content: And when those hired about the eleventh hour came, each of them received a denarius.
  - type: text
    content: ' '
