  '1':
  - type: heading
    content: The Lord Accuses Israel
  - type: text
    content: ' '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', O children of Israel,'
  - type: text
    content: 'for '
  - type: note
    content: Isa. 3:13, 14; Jer. 25:31; Mic. 6:2
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has a controversy with the inhabitants of the land.'
  - type: text
    content: There is no faithfulness or steadfast love,
  - type: text
    content: 'and '
  - type: note
    content: '[ver. 6, 14; Jer. 4:22; 5:4]'
  - type: text
    content: no knowledge of God in the land;
  '10':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:26; Mic. 6:14; Hag. 1:6
  - type: text
    content: They shall eat, but not be satisfied;
  - type: text
    content: they shall play the whore, but not multiply,
  - type: text
    content: 'because they have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: 'to cherish '
  '11':
  - type: text
    content: whoredom, wine, and new wine,
  - type: text
    content: 'which '
  - type: note
    content: '[1 Kgs. 11:4; Prov. 20:1]'
  - type: text
    content: take away the understanding.
  '12':
  - type: text
    content: 'My people '
  - type: note
    content: '[Judg. 18:5]'
  - type: text
    content: inquire of a piece of wood,
  - type: text
    content: and their walking staff gives them oracles.
  - type: text
    content: 'For '
  - type: note
    content: ch. 5:4; [ch. 2:2]
  - type: text
    content: a spirit of whoredom has led them astray,
  - type: text
    content: and they have left their God to play the whore.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 6:13
  - type: text
    content: They sacrifice on the tops of the mountains
  - type: text
    content: and burn offerings on the hills,
  - type: note
    content: '[ Isa. 1:29 ]'
  - type: text
    content: under oak, poplar, and terebinth,
  - type: text
    content: because their shade is good.
  - type: text
    content: Therefore your daughters play the whore,
  - type: text
    content: and your brides commit adultery.
  '14':
  - type: text
    content: I will not punish your daughters when they play the whore,
  - type: text
    content: nor your brides when they commit adultery;
  - type: text
    content: 'for '
  - type: note
    content: '[ch. 9:10]'
  - type: text
    content: the men themselves go aside with prostitutes
  - type: text
    content: 'and sacrifice with '
  - type: note
    content: Deut. 23:17
  - type: text
    content: cult prostitutes,
  - type: text
    content: 'and a people '
  - type: note
    content: '[ver. 1, 6]'
  - type: text
    content: without understanding shall come to ruin.
  '15':
  - type: text
    content: 'Though you play the whore, O '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Israel,
  - type: text
    content: 'let not '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Judah become guilty.
  - type: note
    content: Amos 4:4, 5; 5:5
  - type: text
    content: 'Enter not into '
  - type: note
    content: ch. 9:15; 12:11
  - type: text
    content: Gilgal,
  - type: text
    content: 'nor go up to '
  - type: note
    content: ch. 5:8; 10:5; [ch. 10:8; 1 Kgs. 12:29; Amos 1:5]
  - type: text
    content: Beth-aven,
  - type: text
    content: 'and swear not, “As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives.”'
  '16':
  - type: text
    content: Like a stubborn heifer,
  - type: text
    content: Israel is stubborn;
  - type: text
    content: 'can the '
  - type: text
    content: Lord
  - type: text
    content: ' now feed them'
  - type: text
    content: like a lamb in a broad pasture?
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 12; ch. 5:3 ]'
  - type: text
    content: Ephraim is joined to idols;
  - type: note
    content: '[ Matt. 15:14 ]'
  - type: text
    content: leave him alone.
  '18':
  - type: text
    content: When their drink is gone, they give themselves to whoring;
  - type: note
    content: '[ch. 9:10 ]'
  - type: text
    content: their rulers
  - type: note
    content: Hebrew shields
  - type: text
    content: ' dearly love shame.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:15; Jer. 4:11; 51:1; [ Zech. 5:9 ]
  - type: text
    content: A wind has wrapped them
  - type: note
    content: Hebrew her
  - type: text
    content: ' in its wings,'
  - type: text
    content: 'and they shall '
  - type: note
    content: '[Isa. 1:29]'
  - type: text
    content: be ashamed because of their sacrifices.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 7:1 ]'
  - type: text
    content: there is swearing, lying, murder, stealing, and committing adultery;
  - type: text
    content: 'they break all bounds, and '
  - type: note
    content: '[ch. 6:9; 12:14; Mic. 3:10; 7:2]'
  - type: text
    content: bloodshed follows bloodshed.
  '3':
  - type: text
    content: 'Therefore '
  - type: note
    content: Isa. 24:4; Jer. 4:28; Joel 1:10
  - type: text
    content: the land mourns,
  - type: text
    content: and all who dwell in it languish,
  - type: note
    content: '[ Joel 1:18; Zeph. 1:3 ]'
  - type: text
    content: and also the beasts of the field
  - type: text
    content: and the birds of the heavens,
  - type: note
    content: '[ Ezek. 38:20 ]'
  - type: text
    content: and even the fish of the sea are taken away.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 17 ]'
  - type: text
    content: Yet let no one contend,
  - type: text
    content: and let none accuse,
  - type: text
    content: 'for with you is '
  - type: note
    content: '[Deut. 17:12]'
  - type: text
    content: my contention, O priest.
  - type: note
    content: Or for your people are like those who contend with the priest
  '5':
  - type: text
    content: You shall stumble by day;
  - type: text
    content: the prophet also shall stumble with you by night;
  - type: text
    content: 'and I will destroy '
  - type: note
    content: ch. 2:2
  - type: text
    content: your mother.
  '6':
  - type: text
    content: 'My people are destroyed '
  - type: note
    content: '[ver. 1; Isa. 5:13]'
  - type: text
    content: for lack of knowledge;
  - type: note
    content: '[ Prov. 1:29 ]'
  - type: text
    content: because you have rejected knowledge,
  - type: text
    content: 'I reject you '
  - type: note
    content: '[Ex. 19:6]'
  - type: text
    content: from being a priest to me.
  - type: text
    content: And since you have forgotten the law of your God,
  - type: note
    content: '[ Jer. 23:39 ]'
  - type: text
    content: I also will forget your children.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 13:6 ]'
  - type: text
    content: The more they increased,
  - type: text
    content: the more they sinned against me;
  - type: note
    content: 1 Sam. 2:30; Mal. 2:9
  - type: text
    content: I will change their glory into shame.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 6:25, 26; 10:17 ]'
  - type: text
    content: They feed on the sin
  - type: note
    content: Or sin offering
  - type: text
    content: ' of my people;'
  - type: text
    content: they are greedy for their iniquity.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Isa. 24:2
  - type: text
    content: And it shall be like people, like priest;
  - type: text
    content: I will punish them for their ways
  - type: text
    content: and repay them for their deeds.
