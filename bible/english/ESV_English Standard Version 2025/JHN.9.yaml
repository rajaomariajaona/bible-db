document_id: JHN.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man Born Blind
  - type: text
    content: 'As he passed by, he saw a man blind from birth. '
  '10':
  - type: text
    content: 'So they said to him, “Then how were your eyes opened?” '
  '11':
  - type: text
    content: 'He answered, '
  - type: note
    content: ver. 6, 7
  - type: text
    content: '“The man called Jesus made mud and anointed my eyes and said to me, '
  - type: text
    content: ‘Go to Siloam and wash.’
  - type: text
    content: ' So I went and washed and received my sight.” '
  '12':
  - type: text
    content: They said to him, “Where is he?” He said, “I do not know.”
  '13':
  - type: text
    content: 'They brought to the Pharisees the man who had formerly been blind. '
  '14':
  - type: note
    content: ch. 5:9
  - type: text
    content: 'Now it was a Sabbath day when Jesus made the mud and opened his eyes. '
  '15':
  - type: note
    content: ver. 10
  - type: text
    content: 'So the Pharisees again asked him how he had received his sight. And he said to them, “He put mud on my eyes, and I washed, and I see.” '
  '16':
  - type: text
    content: 'Some of the Pharisees said, “This man is not '
  - type: note
    content: See ch. 7:29
  - type: text
    content: 'from God, '
  - type: note
    content: See Matt. 12:2
  - type: text
    content: 'for he does not keep the Sabbath.” But others said, '
  - type: note
    content: ver. 33
  - type: text
    content: '“How can a man who is a sinner do such signs?” And '
  - type: note
    content: ch. 7:43; 10:19
  - type: text
    content: 'there was a division among them. '
  '17':
  - type: text
    content: 'So they said again to the blind man, “What do you say about him, since he has opened your eyes?” He said, '
  - type: note
    content: See ch. 4:19; 6:14
  - type: text
    content: “He is a prophet.”
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 22 ; [ver. 13]
  - type: text
    content: The Jews
  - type: note
    content: Greek Ioudaioi probably refers here to Jewish religious leaders, and others under their influence, in that time; also verse 22
  - type: text
    content: ' did not believe that he had been blind and had received his sight, until they called the parents of the man who had received his sight '
  '19':
  - type: text
    content: 'and asked them, “Is this your son, who you say was born blind? How then does he now see?” '
  '2':
  - type: text
    content: 'And his disciples asked him, '
  - type: note
    content: See ch. 1:38
  - type: text
    content: '“Rabbi, '
  - type: note
    content: '[Luke 13:2, 4]'
  - type: text
    content: 'who sinned, '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'this man or '
  - type: note
    content: Ex. 20:5
  - type: text
    content: 'his parents, that he was born blind?” '
  '20':
  - type: text
    content: 'His parents answered, “We know that this is our son and that he was born blind. '
  '21':
  - type: text
    content: 'But how he now sees we do not know, nor do we know who opened his eyes. Ask him; he is of age. He will speak for himself.” '
  '22':
  - type: text
    content: '(His parents said these things '
  - type: note
    content: See ch. 7:13
  - type: text
    content: 'because they feared the Jews, for '
  - type: note
    content: '[ch. 7:45-52]'
  - type: text
    content: 'the Jews had already agreed that if anyone should '
  - type: note
    content: '[Rom. 10:9]'
  - type: text
    content: confess Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' to be Christ, '
  - type: note
    content: ch. 12:42; 16:2
  - type: text
    content: 'he was to be put out of the synagogue. '
  '23':
  - type: text
    content: 'Therefore his parents said, '
  - type: note
    content: ver. 21
  - type: text
    content: “He is of age; ask him.”)
  '24':
  - type: text
    content: 'So for the second time they called the man who had been blind and said to him, '
  - type: note
    content: Josh. 7:19; Jer. 13:16; [1 Sam. 6:5; Isa. 42:12; Acts 12:23]
  - type: text
    content: '“Give glory to God. We know that '
  - type: note
    content: ver. 16
  - type: text
    content: 'this man is a sinner.” '
  '25':
  - type: text
    content: 'He answered, “Whether he is a sinner I do not know. One thing I do know, that though I '
  - type: note
    content: ver. 18, 24
  - type: text
    content: 'was blind, now I see.” '
  '26':
  - type: text
    content: 'They said to him, “What did he do to you? How did he open your eyes?” '
  '27':
  - type: text
    content: 'He answered them, '
  - type: note
    content: ver. 15
  - type: text
    content: '“I have told you already, and you would not listen. Why do you want to hear it again? Do you also want to become his disciples?” '
  '28':
  - type: text
    content: 'And they reviled him, saying, “You are his disciple, but '
  - type: note
    content: '[ch. 5:45]'
  - type: text
    content: 'we are disciples of Moses. '
  '29':
  - type: text
    content: 'We know that God has spoken to Moses, but as for this man, '
  - type: note
    content: See ch. 8:14
  - type: text
    content: 'we do not know where he comes from.” '
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It was not that this man sinned, or his parents, but '
  - type: note
    content: '[ch. 11:4]'
  - type: text
    content: that the works of God might be displayed in him.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'The man answered, “Why, this is '
  - type: note
    content: '[ch. 12:37]'
  - type: text
    content: 'an amazing thing! '
  - type: note
    content: '[ch. 3:10]'
  - type: text
    content: 'You do not know where he comes from, and yet he opened my eyes. '
  '31':
  - type: text
    content: 'We know that '
  - type: note
    content: Job 27:9; Ps. 66:18; Prov. 28:9
  - type: text
    content: 'God does not listen to sinners, but '
  - type: note
    content: Ps. 34:15, 16; 145:19; Prov. 15:20; [James 5:16]
  - type: text
    content: 'if anyone is a worshiper of God and does his will, God listens to him. '
  '32':
  - type: text
    content: 'Never since the world began has it been heard that anyone opened the eyes of a man born blind. '
  '33':
  - type: note
    content: ver. 16; [ch. 1:21; 3:2]
  - type: text
    content: 'If this man were not from God, he could do nothing.” '
  '34':
  - type: text
    content: 'They answered him, '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: '“You were born in utter sin, and would you teach us?” And they '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: cast him out.
  '35':
  - type: text
    content: 'Jesus heard that they had cast him out, and having found him he said, '
  - type: text
    content: '“Do you believe in '
  - type: note
    content: ch. 10:36
  - type: text
    content: the Son of Man?”
  - type: note
    content: Some manuscripts the Son of God
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'He answered, '
  - type: note
    content: '[Rom. 10:14]'
  - type: text
    content: '“And who is he, sir, that I may believe in him?” '
  '37':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“You have seen him, and '
  - type: note
    content: ch. 4:26
  - type: text
    content: it is he who is speaking to you.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'He said, “Lord, I believe,” and he worshiped him. '
  '39':
  - type: text
    content: 'Jesus said, '
  - type: note
    content: See ch. 5:22
  - type: text
    content: '“For judgment I came into this world, '
  - type: note
    content: '[Matt. 11:25; Luke 4:18]'
  - type: text
    content: 'that those who do not see may see, and '
  - type: note
    content: '[Matt. 9:13; 13:13; Mark 4:12; 2 Cor. 2:16]'
  - type: text
    content: those who see may become blind.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'We must '
  - type: note
    content: See ch. 4:34
  - type: text
    content: 'work the works of him who sent me '
  - type: note
    content: ch. 11:9; 12:35; [Rom. 13:12; Gal. 6:10]
  - type: text
    content: while it is day; night is coming, when no one can work.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Some of the Pharisees near him heard these things, and said to him, '
  - type: note
    content: Rom. 2:19
  - type: text
    content: '“Are we also blind?” '
  '41':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“If you were blind, '
  - type: note
    content: ch. 15:22, 24; [ch. 19:11; 1 John 1:8]
  - type: text
    content: you would have no guilt;
  - type: note
    content: Greek you would not have sin
  - type: text
    content: ' '
  - type: text
    content: but now that you say, ‘We see,’ your guilt remains.
  '5':
  - type: text
    content: 'As long as I am in the world, '
  - type: note
    content: See ch. 1:4, 5, 9; 8:12
  - type: text
    content: I am the light of the world.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Having said these things, '
  - type: note
    content: Mark 7:33; 8:23
  - type: text
    content: 'he spit on the ground and made mud with the saliva. '
  - type: note
    content: See Matt. 9:29
  - type: text
    content: 'Then he anointed the man’s eyes with the mud '
  '7':
  - type: text
    content: 'and said to him, '
  - type: text
    content: '“Go, wash in '
  - type: note
    content: Luke 13:4
  - type: text
    content: the pool of Siloam”
  - type: text
    content: ' (which means Sent). So he went and washed and '
  - type: note
    content: ch. 11:37
  - type: text
    content: came back seeing.
  '8':
  - type: text
    content: 'The neighbors and those who had seen him before as a beggar were saying, '
  - type: note
    content: '[Acts 3:2, 10]'
  - type: text
    content: '“Is this not the man who used to sit and beg?” '
  '9':
  - type: text
    content: 'Some said, “It is he.” Others said, “No, but he is like him.” He kept saying, “I am the man.” '
