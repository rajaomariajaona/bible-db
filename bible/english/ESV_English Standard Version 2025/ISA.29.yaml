document_id: ISA.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of Jerusalem
  - type: text
    content: Ah, Ariel, Ariel,
  - type: text
    content: 'the city '
  - type: note
    content: '[2 Sam. 5:9]'
  - type: text
    content: where David encamped!
  - type: text
    content: Add year to year;
  - type: text
    content: let the feasts run their round.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 6:10; Rom. 11:8 ]'
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has poured out upon you'
  - type: text
    content: a spirit of deep sleep,
  - type: text
    content: and has closed your eyes (the prophets),
  - type: text
    content: and covered your heads (the seers).
  '11':
  - type: text
    content: 'And the vision of all this has become to you like the words of a book that is '
  - type: note
    content: ch. 8:16; Dan. 12:4
  - type: text
    content: 'sealed. When men give it to one who can read, saying, “Read this,” he says, “I cannot, for it is sealed.” '
  '12':
  - type: text
    content: And when they give the book to one who cannot read, saying, “Read this,” he says, “I cannot read.”
  '13':
  - type: text
    content: 'And the Lord said:'
  - type: text
    content: '“Because '
  - type: note
    content: Cited Matt. 15:8, 9; Mark 7:6, 7; [Ezek. 33:31]
  - type: text
    content: 'this people '
  - type: note
    content: '[ch. 1:12; 58:2]'
  - type: text
    content: draw near with their mouth
  - type: text
    content: and honor me with their lips,
  - type: text
    content: while their hearts are far from me,
  - type: text
    content: and their fear of me is a commandment taught by men,
  '14':
  - type: text
    content: 'therefore, behold, '
  - type: note
    content: Hab. 1:5; See ch. 3:1-4
  - type: text
    content: I will again
  - type: text
    content: do wonderful things with this people,
  - type: text
    content: with wonder upon wonder;
  - type: text
    content: 'and '
  - type: note
    content: Jer. 49:7; Cited 1 Cor. 1:19
  - type: text
    content: the wisdom of their wise men shall perish,
  - type: text
    content: and the discernment of their discerning men shall be hidden.”
  '15':
  - type: text
    content: 'Ah, '
  - type: note
    content: '[ch. 30:1]'
  - type: text
    content: 'you who hide deep from the '
  - type: text
    content: Lord
  - type: text
    content: ' your counsel,'
  - type: text
    content: 'whose deeds are '
  - type: note
    content: Ezek. 8:12
  - type: text
    content: in the dark,
  - type: text
    content: and who say, “Who sees us? Who knows us?”
  '16':
  - type: text
    content: ' '
  - type: note
    content: See ch. 10:15
  - type: text
    content: You turn things upside down!
  - type: text
    content: Shall the potter be regarded as the clay,
  - type: text
    content: that the thing made should say of its maker,
  - type: text
    content: “He did not make me”;
  - type: text
    content: or the thing formed say of him who formed it,
  - type: text
    content: “He has no understanding”?
  '17':
  - type: text
    content: Is it not yet a very little while
  - type: note
    content: '[ Ps. 107:33, 35 ]'
  - type: text
    content: until Lebanon shall be turned into a fruitful field,
  - type: text
    content: and the fruitful field shall be regarded as a forest?
  '18':
  - type: text
    content: 'In that day '
  - type: note
    content: '[ch. 32:3; 35:5; Matt. 11:5]'
  - type: text
    content: the deaf shall hear
  - type: note
    content: ver. 12
  - type: text
    content: the words of a book,
  - type: text
    content: and out of their gloom and darkness
  - type: note
    content: '[ch. 35:5; Matt. 11:5 ]'
  - type: text
    content: the eyes of the blind shall see.
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 61:1; [ch. 14:32; Zeph. 3:12; Matt. 5:3 ]
  - type: text
    content: 'The meek shall obtain fresh joy in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and the poor among mankind shall exult in the Holy One of Israel.
  '2':
  - type: text
    content: Yet I will distress Ariel,
  - type: text
    content: and there shall be moaning and lamentation,
  - type: text
    content: and she shall be to me like an Ariel.
  - type: note
    content: Ariel could mean lion of God, or hero (2 Samuel 23:20), or altar hearth (Ezekiel 43:15–16)
  '20':
  - type: text
    content: For the ruthless shall come to nothing
  - type: text
    content: 'and '
  - type: note
    content: ch. 28:14, 22
  - type: text
    content: the scoffer cease,
  - type: text
    content: and all who watch to do evil shall be cut off,
  '21':
  - type: text
    content: who by a word make a man out to be an offender,
  - type: text
    content: 'and '
  - type: note
    content: Amos 5:10; [Ps. 127:5]
  - type: text
    content: lay a snare for him who reproves in the gate,
  - type: text
    content: 'and with an empty plea '
  - type: note
    content: Amos 5:12
  - type: text
    content: turn aside him who is in the right.
  '22':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 51:2]'
  - type: text
    content: 'who redeemed Abraham, concerning the house of Jacob:'
  - type: text
    content: “Jacob shall no more be ashamed,
  - type: text
    content: no more shall his face grow pale.
  '23':
  - type: text
    content: For when he sees his children,
  - type: note
    content: ch. 19:25; 60:21; [ Ps. 100:3 ]
  - type: text
    content: the work of my hands, in his midst,
  - type: text
    content: they will sanctify my name;
  - type: note
    content: ch. 8:13
  - type: text
    content: they will sanctify the Holy One of Jacob
  - type: text
    content: and will stand in awe of the God of Israel.
  '24':
  - type: text
    content: 'And those '
  - type: note
    content: '[ch. 28:7]'
  - type: text
    content: who go astray in spirit will come to understanding,
  - type: text
    content: and those who murmur will accept instruction.”
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 25:1; Ezek. 4:2 ]'
  - type: text
    content: And I will encamp against you all around,
  - type: text
    content: 'and will besiege you '
  - type: note
    content: '[Ezek. 21:22; 26:8]'
  - type: text
    content: with towers
  - type: text
    content: and I will raise siegeworks against you.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:11, 12 ]'
  - type: text
    content: And you will be brought low; from the earth you shall speak,
  - type: text
    content: and from the dust your speech will be bowed down;
  - type: text
    content: 'your voice shall come from the ground like '
  - type: note
    content: See ch. 8:19
  - type: text
    content: the voice of a ghost,
  - type: text
    content: and from the dust your speech shall whisper.
  '5':
  - type: text
    content: 'But the multitude of your foreign foes shall be like '
  - type: note
    content: ch. 17:13; Ps. 18:42
  - type: text
    content: small dust,
  - type: text
    content: and the multitude of the ruthless like passing chaff.
  - type: note
    content: '[ch. 17:14; 37:36; 2 Kgs. 19:35 ]'
  - type: text
    content: And in an instant, suddenly,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Kgs. 19:11, 12 ]'
  - type: text
    content: 'you will be visited by the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: with thunder and with earthquake and great noise,
  - type: text
    content: with whirlwind and tempest, and the flame of a devouring fire.
  '7':
  - type: text
    content: 'And '
  - type: note
    content: '[Zech. 12:9]; See Mic. 4:11-13'
  - type: text
    content: the multitude of all the nations that fight against Ariel,
  - type: text
    content: all that fight against her and her stronghold and distress her,
  - type: text
    content: 'shall be '
  - type: note
    content: ch. 17:14; [Job 20:8]
  - type: text
    content: like a dream, a vision of the night.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 73:20; 90:5 ]'
  - type: text
    content: As when a hungry man dreams, and behold, he is eating,
  - type: text
    content: and awakes with his hunger not satisfied,
  - type: text
    content: or as when a thirsty man dreams, and behold, he is drinking,
  - type: text
    content: and awakes faint, with his thirst not quenched,
  - type: text
    content: so shall the multitude of all the nations be
  - type: text
    content: that fight against Mount Zion.
  '9':
  - type: text
    content: Astonish yourselves
  - type: note
    content: Or Linger awhile
  - type: text
    content: ' and be astonished;'
  - type: text
    content: blind yourselves and be blind!
  - type: text
    content: Be drunk,
  - type: note
    content: Or They are drunk
  - type: text
    content: ' but not with wine;'
  - type: note
    content: '[ch. 19:14; 24:20 ]'
  - type: text
    content: stagger,
  - type: note
    content: Or they stagger
  - type: text
    content: ' but not with strong drink!'
