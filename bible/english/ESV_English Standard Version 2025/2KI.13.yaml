document_id: 2KI.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoahaz Reigns in Israel
  - type: text
    content: 'In the twenty-third year of Joash the son of Ahaziah, king of Judah, Jehoahaz the son of Jehu began to reign over Israel in Samaria, and he reigned seventeen years. '
  '10':
  - type: text
    content: In the thirty-seventh year of Joash king of Judah, Jehoash
  - type: note
    content: Jehoash is an alternate spelling of Joash (son of Jehoahaz) as in verses 9, 12–14; also verse 25
  - type: text
    content: ' the son of Jehoahaz began to reign over Israel in Samaria, and he reigned sixteen years. '
  '11':
  - type: text
    content: 'He also did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not depart from all the sins of Jeroboam the son of Nebat, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'which he made Israel to sin, but he walked in them. '
  '12':
  - type: note
    content: ch. 14:15
  - type: text
    content: 'Now the rest of the acts of Joash '
  - type: note
    content: See ver. 14-19, 25
  - type: text
    content: 'and all that he did, '
  - type: note
    content: See ch. 14:8-14
  - type: text
    content: 'and the might with which he fought against Amaziah king of Judah, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '13':
  - type: text
    content: So Joash slept with his fathers, and Jeroboam sat on his throne. And Joash was buried in Samaria with the kings of Israel.
  - type: heading
    content: The Death of Elisha
  '14':
  - type: text
    content: 'Now when Elisha had fallen sick with the illness of which he was to die, Joash king of Israel went down to him and wept before him, crying, '
  - type: note
    content: ch. 2:12
  - type: text
    content: '“My father, my father! The chariots of Israel and its horsemen!” '
  '15':
  - type: text
    content: 'And Elisha said to him, “Take a bow and arrows.” So he took a bow and arrows. '
  '16':
  - type: text
    content: 'Then he said to the king of Israel, “Draw the bow,” and he drew it. And Elisha laid his hands on the king’s hands. '
  '17':
  - type: text
    content: 'And he said, “Open the window eastward,” and he opened it. Then Elisha said, “Shoot,” and he shot. And he said, “The '
  - type: text
    content: Lord
  - type: text
    content: '’s arrow of victory, the arrow of victory over Syria! For you shall fight the Syrians in '
  - type: note
    content: 1 Kgs. 20:26
  - type: text
    content: 'Aphek until you have made an end of them.” '
  '18':
  - type: text
    content: 'And he said, “Take the arrows,” and he took them. And he said to the king of Israel, “Strike the ground with them.” And he struck three times and stopped. '
  '19':
  - type: text
    content: 'Then '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: 'the man of God was angry with him and said, “You should have struck five or six times; then you would have struck down Syria until you had made an end of it, but now you will strike down Syria only '
  - type: note
    content: ver. 25
  - type: text
    content: three times.”
  '2':
  - type: text
    content: 'He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' and followed the sins of Jeroboam the son of Nebat, '
  - type: note
    content: See 1 Kgs. 14:16
  - type: text
    content: 'which he made Israel to sin; he did not depart from them. '
  '20':
  - type: text
    content: 'So Elisha died, and they buried him. Now bands of '
  - type: note
    content: ch. 1:1; 3:7; 24:2
  - type: text
    content: 'Moabites used to invade the land in the spring of the year. '
  '21':
  - type: text
    content: And as a man was being buried, behold, a marauding band was seen and the man was thrown into the grave of Elisha, and as soon as the man touched the bones of Elisha, he revived and stood on his feet.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:12
  - type: text
    content: 'Now Hazael king of Syria oppressed Israel all the days of Jehoahaz. '
  '23':
  - type: note
    content: ch. 14:27
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' was gracious to them and had compassion on them, '
  - type: note
    content: '[Ex. 2:24, 25]'
  - type: text
    content: 'and he turned toward them, '
  - type: note
    content: Ex. 32:13
  - type: text
    content: because of his covenant with Abraham, Isaac, and Jacob, and would not destroy them, nor has he cast them from his presence until now.
  '24':
  - type: text
    content: 'When Hazael king of Syria died, Ben-hadad his son became king in his place. '
  '25':
  - type: text
    content: 'Then Jehoash the son of Jehoahaz took again from Ben-hadad the son of Hazael the cities '
  - type: note
    content: '[ch. 10:32; 14:25]'
  - type: text
    content: 'that he had taken from Jehoahaz his father in war. '
  - type: note
    content: ver. 18, 19; [Amos 1:4]
  - type: text
    content: Three times Joash defeated him and recovered the cities of Israel.
  '3':
  - type: note
    content: '[Judg. 2:14]'
  - type: text
    content: 'And the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Israel, and he gave them continually into the hand of '
  - type: note
    content: ch. 8:12; [1 Kgs. 19:17]
  - type: text
    content: 'Hazael king of Syria and into the hand of '
  - type: note
    content: ver. 24, 25
  - type: text
    content: 'Ben-hadad the son of Hazael. '
  '4':
  - type: text
    content: 'Then Jehoahaz '
  - type: note
    content: Ex. 32:11; [Ps. 78:34]
  - type: text
    content: 'sought the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to him, '
  - type: note
    content: ch. 14:26; Ex. 3:7, 9
  - type: text
    content: 'for he saw the oppression of Israel, how the king of Syria oppressed them. '
  '5':
  - type: text
    content: '(Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Israel '
  - type: note
    content: '[Judg. 3:9; Neh. 9:27]'
  - type: text
    content: 'a savior, so that they escaped from the hand of the Syrians, and the people of Israel lived in '
  - type: note
    content: See 2 Sam. 18:17
  - type: text
    content: 'their homes as formerly. '
  '6':
  - type: text
    content: 'Nevertheless, they did not depart from the sins of the house of Jeroboam, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: which he made Israel to sin, but walked
  - type: note
    content: Septuagint, Syriac, Targum, Vulgate; Hebrew he walked
  - type: text
    content: ' in them; and '
  - type: note
    content: 1 Kgs. 16:33
  - type: text
    content: 'the Asherah also remained in Samaria.) '
  '7':
  - type: text
    content: 'For there was not left to Jehoahaz an army of more than fifty horsemen and ten chariots and ten thousand footmen, for the king of Syria had destroyed them and made them like the dust '
  - type: note
    content: '[Amos 1:3]'
  - type: text
    content: 'at threshing. '
  '8':
  - type: text
    content: 'Now the rest of the acts of Jehoahaz and all that he did, and his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '9':
  - type: text
    content: So Jehoahaz slept with his fathers, and they buried him in Samaria, and Joash his son reigned in his place.
  - type: heading
    content: Jehoash Reigns in Israel
