document_id: 1KI.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds the Temple
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 3:1, 2
  - type: text
    content: 'In the four hundred and eightieth year after the people of Israel came out of the land of Egypt, in the fourth year of Solomon’s reign over Israel, in the month of Ziv, which is the second month, '
  - type: note
    content: Acts 7:47
  - type: text
    content: 'he began to build the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: He built the structure against the whole house, five cubits high, and it was joined to the house with timbers of cedar.
  '11':
  - type: text
    content: 'Now the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Solomon, '
  '12':
  - type: text
    content: '“Concerning this house that you are building, '
  - type: note
    content: ch. 9:4; [ch. 2:4]
  - type: text
    content: 'if you will walk in my statutes and obey my rules and keep all my commandments and walk in them, then I will establish my word with you, '
  - type: note
    content: 2 Sam. 7:13; 1 Chr. 22:10
  - type: text
    content: 'which I spoke to David your father. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 25:8
  - type: text
    content: 'I will dwell among the children of Israel '
  - type: note
    content: Deut. 31:6, 8; Josh. 1:5
  - type: text
    content: and will not forsake my people Israel.”
  '14':
  - type: text
    content: ' '
  - type: note
    content: ver. 9, 38
  - type: text
    content: 'So Solomon built the house and finished it. '
  '15':
  - type: text
    content: 'He lined the walls of the house on the inside with boards of cedar. From the floor of the house to the walls of the ceiling, he covered them on the inside with wood, '
  - type: note
    content: '[ch. 7:7]'
  - type: text
    content: 'and he covered the floor of the house with boards of cypress. '
  '16':
  - type: note
    content: 2 Chr. 3:8
  - type: text
    content: 'He built twenty cubits of the rear of the house with boards of cedar from the floor to the walls, and he built this within as an inner sanctuary, as '
  - type: note
    content: ch. 7:50; 8:6; Ex. 26:33, 34; 2 Chr. 3:8; Ezek. 45:3; Heb. 9:3
  - type: text
    content: 'the Most Holy Place. '
  '17':
  - type: text
    content: 'The house, that is, the nave in front of the inner sanctuary, was forty cubits long. '
  '18':
  - type: text
    content: 'The cedar within the house was carved in the form of '
  - type: note
    content: ch. 7:24
  - type: text
    content: 'gourds and open flowers. All was cedar; no stone was seen. '
  '19':
  - type: text
    content: 'The inner sanctuary he prepared in the innermost part of the house, to set there the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: note
    content: 2 Chr. 3:3, 4; See Ezek. 40–42
  - type: text
    content: 'The house that King Solomon built for the '
  - type: text
    content: Lord
  - type: text
    content: ' was sixty cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' long, twenty cubits wide, and thirty cubits high. '
  '20':
  - type: text
    content: The inner sanctuary
  - type: note
    content: Vulgate; Hebrew And before the inner sanctuary
  - type: text
    content: ' was twenty cubits long, twenty cubits wide, and twenty cubits high, and he overlaid it with pure gold. He also overlaid'
  - type: note
    content: Septuagint made
  - type: text
    content: ' an altar of cedar. '
  '21':
  - type: text
    content: 'And Solomon overlaid the inside of the house with pure gold, and he drew chains of gold across, in front of the inner sanctuary, and overlaid it with gold. '
  '22':
  - type: text
    content: 'And he overlaid the whole house with gold, until all the house was finished. '
  - type: note
    content: Ex. 30:1, 3, 6
  - type: text
    content: Also the whole altar that belonged to the inner sanctuary he overlaid with gold.
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-27, see 2 Chr. 3:10-12
  - type: text
    content: 'In the inner sanctuary '
  - type: note
    content: Ex. 37:7-9
  - type: text
    content: 'he made two cherubim of olivewood, each ten cubits high. '
  '24':
  - type: text
    content: 'Five cubits was the length of one wing of the cherub, and five cubits the length of the other wing of the cherub; it was ten cubits from the tip of one wing to the tip of the other. '
  '25':
  - type: text
    content: 'The other cherub also measured ten cubits; both cherubim had the same measure and the same form. '
  '26':
  - type: text
    content: 'The height of one cherub was ten cubits, and so was that of the other cherub. '
  '27':
  - type: text
    content: 'He put the cherubim in the innermost part of the house. '
  - type: note
    content: ch. 8:7; Ex. 25:20; 37:9; 2 Chr. 5:8
  - type: text
    content: 'And the wings of the cherubim were spread out so that a wing of one touched the one wall, and a wing of the other cherub touched the other wall; their other wings touched each other in the middle of the house. '
  '28':
  - type: text
    content: And he overlaid the cherubim with gold.
  '29':
  - type: text
    content: 'Around all the walls of the house he carved engraved figures of cherubim and palm trees and open flowers, in the inner and outer rooms. '
  '3':
  - type: text
    content: 'The vestibule in front of the nave of the house was twenty cubits long, equal to the width of the house, and ten cubits deep in front of the house. '
  '30':
  - type: text
    content: The floor of the house he overlaid with gold in the inner and outer rooms.
  '31':
  - type: text
    content: For the entrance to the inner sanctuary he made doors of olivewood; the lintel and the doorposts were five-sided.
  - type: note
    content: The meaning of the Hebrew phrase is uncertain
  - type: text
    content: ' '
  '32':
  - type: text
    content: He covered the two doors of olivewood with carvings of cherubim, palm trees, and open flowers. He overlaid them with gold and spread gold on the cherubim and on the palm trees.
  '33':
  - type: text
    content: 'So also he made for the entrance to the nave doorposts of olivewood, in the form of a square, '
  '34':
  - type: text
    content: 'and two doors of cypress wood. '
  - type: note
    content: '[Ezek. 41:24]'
  - type: text
    content: 'The two leaves of the one door were folding, and the two leaves of the other door were folding. '
  '35':
  - type: text
    content: 'On them he carved cherubim and palm trees and open flowers, and he overlaid them with gold evenly applied on the carved work. '
  '36':
  - type: note
    content: ch. 7:12
  - type: text
    content: He built the inner court with three courses of cut stone and one course of cedar beams.
  '37':
  - type: text
    content: ' '
  - type: note
    content: ver. 1
  - type: text
    content: 'In the fourth year the foundation of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid, in the month of Ziv. '
  '38':
  - type: text
    content: And in the eleventh year, in the month of Bul, which is the eighth month, the house was finished in all its parts, and according to all its specifications. He was seven years in building it.
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Ezek. 40:16; 41:16, 26
  - type: text
    content: he made for the house windows with recessed frames.
  - type: note
    content: Or blocked lattice windows
  - type: text
    content: ' '
  '5':
  - type: note
    content: Ezek. 41:6
  - type: text
    content: He also built a structure
  - type: note
    content: Or platform; also verse 10
  - type: text
    content: ' against the wall of the house, running around the walls of the house, both the nave and '
  - type: note
    content: ver. 6:16, 19, 20, 23, 31; ch. 7:49; 8:6, 8; 2 Chr. 4:20; 5:7, 9; Ps. 28:2
  - type: text
    content: 'the inner sanctuary. And he made '
  - type: note
    content: Ezek. 41:5, 6
  - type: text
    content: 'side chambers all around. '
  '6':
  - type: text
    content: The lowest story
  - type: note
    content: Septuagint; Hebrew structure, or platform
  - type: text
    content: ' was five cubits broad, the middle one was six cubits broad, and the third was seven cubits broad. For around the outside of the house he made offsets on the wall in order that the supporting beams should not be inserted into the walls of the house.'
  '7':
  - type: text
    content: 'When the house was built, '
  - type: note
    content: ch. 5:18; Deut. 27:5, 6
  - type: text
    content: it was with stone prepared at the quarry, so that neither hammer nor axe nor any tool of iron was heard in the house while it was being built.
  '8':
  - type: text
    content: The entrance for the lowest
  - type: note
    content: Septuagint, Targum; Hebrew middle
  - type: text
    content: ' story was on the south side of the house, and one went up by stairs to the middle story, and from the middle story to the third. '
  '9':
  - type: note
    content: ver. 14, 38
  - type: text
    content: 'So he built the house and finished it, and he made the ceiling of the house of beams and planks of cedar. '
