document_id: JUD.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Jude, a servant
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' of Jesus Christ and brother of James,'
  - type: note
    content: Rom. 1:7; 1 Cor. 1:24
  - type: text
    content: 'To those who are called, '
  - type: note
    content: 1 Thess. 1:4; 2 Thess. 2:13
  - type: text
    content: 'beloved in God the Father and '
  - type: note
    content: John 17:11, 15; 1 Thess. 5:23
  - type: text
    content: kept for
  - type: note
    content: Or by
  - type: text
    content: ' Jesus Christ:'
  '10':
  - type: note
    content: 2 Pet. 2:12
  - type: text
    content: 'But these people blaspheme all that they do not understand, and they are destroyed by all that they, like unreasoning animals, understand instinctively. '
  '11':
  - type: text
    content: 'Woe to them! For they walked in '
  - type: note
    content: See Gen. 4:5-8
  - type: text
    content: 'the way of Cain and abandoned themselves for the sake of gain '
  - type: note
    content: See 2 Pet. 2:15
  - type: text
    content: 'to Balaam’s error and '
  - type: note
    content: Num. 16:1-3, 31-35
  - type: text
    content: 'perished in Korah’s rebellion. '
  '12':
  - type: text
    content: These are hidden reefs
  - type: note
    content: Or are blemishes
  - type: text
    content: ' '
  - type: note
    content: 2 Pet. 2:13
  - type: text
    content: 'at your love feasts, as they feast with you without fear, '
  - type: note
    content: Ezek. 34:2, 8, 10
  - type: text
    content: 'shepherds feeding themselves; '
  - type: note
    content: Prov. 25:14; 2 Pet. 2:17
  - type: text
    content: 'waterless clouds, '
  - type: note
    content: Heb. 13:9
  - type: text
    content: 'swept along by winds; fruitless trees in late autumn, twice dead, '
  - type: note
    content: Matt. 15:13
  - type: text
    content: 'uprooted; '
  '13':
  - type: note
    content: Isa. 57:20
  - type: text
    content: 'wild waves of the sea, casting up the foam of '
  - type: note
    content: '[2 Cor. 4:2; Phil. 3:19]'
  - type: text
    content: 'their own shame; '
  - type: note
    content: '[Isa. 14:12]'
  - type: text
    content: 'wandering stars, '
  - type: note
    content: 2 Pet. 2:17
  - type: text
    content: for whom the gloom of utter darkness has been reserved forever.
  '14':
  - type: text
    content: 'It was also about these that Enoch, '
  - type: note
    content: Gen. 5:18
  - type: text
    content: 'the seventh from Adam, prophesied, saying, '
  - type: note
    content: See Deut. 33:2; [Dan. 7:10; Mark 8:38; 1 Thess. 3:13; 2 Thess. 1:7]
  - type: text
    content: '“Behold, the Lord comes with ten thousands of his holy ones, '
  '15':
  - type: note
    content: '[2 Pet. 2:5]'
  - type: text
    content: 'to execute judgment on all and to convict all the ungodly of all their deeds of ungodliness that they have '
  - type: note
    content: 2 Pet. 2:6
  - type: text
    content: 'committed in such an ungodly way, and of all '
  - type: note
    content: 1 Sam. 2:3; Ps. 94:4; John 6:60
  - type: text
    content: 'the harsh things that ungodly sinners have spoken against him.” '
  '16':
  - type: text
    content: 'These are grumblers, malcontents, '
  - type: note
    content: 2 Pet. 2:10
  - type: text
    content: 'following their own sinful desires; '
  - type: note
    content: 2 Pet. 2:18
  - type: text
    content: 'they are loud-mouthed boasters, '
  - type: note
    content: Lev. 19:15; Deut. 10:17
  - type: text
    content: showing favoritism to gain advantage.
  - type: heading
    content: A Call to Persevere
  '17':
  - type: text
    content: 'But you must '
  - type: note
    content: 2 Pet. 3:2
  - type: text
    content: 'remember, beloved, the predictions of the apostles of our Lord Jesus Christ. '
  '18':
  - type: text
    content: They
  - type: note
    content: Or Christ, because they
  - type: text
    content: ' said to you, '
  - type: note
    content: 2 Pet. 3:3
  - type: text
    content: '“In the last time there will be scoffers, following their own ungodly passions.” '
  '19':
  - type: text
    content: 'It is these who cause divisions, worldly people, '
  - type: note
    content: '[Rom. 8:9; Phil. 3:3]'
  - type: text
    content: 'devoid of the Spirit. '
  '2':
  - type: text
    content: 'May '
  - type: note
    content: '[2 John 3]'
  - type: text
    content: 'mercy, '
  - type: note
    content: 1 Pet. 1:2; 2 Pet. 1:2
  - type: text
    content: peace, and love be multiplied to you.
  - type: heading
    content: Judgment on False Teachers
  '20':
  - type: text
    content: 'But you, beloved, '
  - type: note
    content: See Col. 2:7
  - type: text
    content: 'building yourselves up in your most holy faith and '
  - type: note
    content: Eph. 6:18; [Rom. 8:26]
  - type: text
    content: 'praying in the Holy Spirit, '
  '21':
  - type: note
    content: 2 Cor. 13:14; [Acts 13:43]
  - type: text
    content: 'keep yourselves in the love of God, '
  - type: note
    content: Titus 2:13; 2 Pet. 3:12
  - type: text
    content: 'waiting for the mercy of our Lord Jesus Christ that leads to eternal life. '
  '22':
  - type: text
    content: 'And have mercy on those who doubt; '
  '23':
  - type: text
    content: 'save others by '
  - type: note
    content: Amos 4:11; Zech. 3:2
  - type: text
    content: 'snatching them out of '
  - type: note
    content: See 1 Cor. 3:15
  - type: text
    content: 'the fire; to others show mercy '
  - type: note
    content: '[2 Cor. 5:11]'
  - type: text
    content: 'with fear, hating even '
  - type: note
    content: Rev. 3:4; [Zech. 3:4]
  - type: text
    content: the garment
  - type: note
    content: Greek chiton, a long garment worn under the cloak next to the skin
  - type: text
    content: ' stained by the flesh.'
  - type: heading
    content: Doxology
  '24':
  - type: text
    content: ' '
  - type: note
    content: Rom. 16:25; Eph. 3:20
  - type: text
    content: 'Now to him who is able '
  - type: note
    content: John 17:12
  - type: text
    content: 'to keep you from stumbling and '
  - type: note
    content: Col. 1:22; [1 Pet. 4:13]
  - type: text
    content: 'to present you '
  - type: note
    content: Eph. 1:4; 5:27; Phil. 2:15; Rev. 14:5
  - type: text
    content: 'blameless before the presence of his glory with great joy, '
  '25':
  - type: text
    content: 'to '
  - type: note
    content: John 5:44; 1 Tim. 1:17
  - type: text
    content: 'the only God, our Savior, through Jesus Christ our Lord, '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: be glory, majesty, dominion, and authority, before all time
  - type: note
    content: Or before any age
  - type: text
    content: ' and now and forever. Amen.'
  '3':
  - type: text
    content: 'Beloved, although I was very eager to write to you about our '
  - type: note
    content: Titus 1:4
  - type: text
    content: 'common salvation, I found it necessary to write appealing to you '
  - type: note
    content: 1 Tim. 6:12; 2 Tim. 4:7; [Luke 13:24; 1 Cor. 9:25; Phil. 1:27]
  - type: text
    content: 'to contend for the faith that was once for all delivered to the saints. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: 2 Pet. 2:1
  - type: text
    content: 'certain people '
  - type: note
    content: '[Gal. 2:4]'
  - type: text
    content: 'have crept in unnoticed '
  - type: note
    content: 1 Pet. 2:8
  - type: text
    content: 'who long ago were designated for this condemnation, ungodly people, who pervert '
  - type: note
    content: See Acts 11:23
  - type: text
    content: 'the grace of our God into sensuality and '
  - type: note
    content: Titus 1:16; 2 Pet. 2:1; 1 John 2:22
  - type: text
    content: deny our only Master and Lord, Jesus Christ.
  '5':
  - type: text
    content: 'Now I want '
  - type: note
    content: 2 Pet. 1:12; 3:17
  - type: text
    content: 'to remind you, although you once fully knew it, that '
  - type: note
    content: '[1 Cor. 10:4, 5, 9]'
  - type: text
    content: Jesus, who saved
  - type: note
    content: Some manuscripts although you fully knew it, that the Lord who once saved
  - type: text
    content: ' a people out of the land of Egypt, '
  - type: note
    content: Num. 14:29, 37; 26:64, 65; Ps. 106:26; Heb. 3:17-19
  - type: text
    content: 'afterward destroyed those who did not believe. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: 2 Pet. 2:4; [Rev. 20:2]
  - type: text
    content: 'the angels who did not stay within their own position of authority, but left their proper dwelling, he has kept in eternal chains under gloomy darkness until the judgment of the great day— '
  '7':
  - type: text
    content: 'just as '
  - type: note
    content: See Gen. 19:24
  - type: text
    content: 'Sodom and Gomorrah and '
  - type: note
    content: Deut. 29:23; Hos. 11:8
  - type: text
    content: 'the surrounding cities, which likewise indulged in sexual immorality and '
  - type: note
    content: 2 Pet. 2:10
  - type: text
    content: pursued unnatural desire,
  - type: note
    content: Greek different flesh
  - type: text
    content: ' serve as an example by undergoing a punishment of eternal fire.'
  '8':
  - type: text
    content: 'Yet in like manner these people also, relying on their dreams, defile the flesh, reject authority, and '
  - type: note
    content: 2 Pet. 2:10
  - type: text
    content: 'blaspheme the glorious ones. '
  '9':
  - type: text
    content: 'But when '
  - type: note
    content: 1 Thess. 4:16; [2 Pet. 2:11]
  - type: text
    content: 'the archangel '
  - type: note
    content: Dan. 10:13; 12:1; Rev. 12:7
  - type: text
    content: 'Michael, contending with the devil, was disputing '
  - type: note
    content: '[Deut. 34:6]'
  - type: text
    content: 'about the body of Moses, he did not presume to pronounce a blasphemous judgment, but said, '
  - type: note
    content: Zech. 3:2
  - type: text
    content: '“The Lord rebuke you.” '
