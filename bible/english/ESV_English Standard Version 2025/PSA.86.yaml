verses:
  '1':
  - type: heading
    content: Great Is Your Steadfast Love
  - type: note
    content: '[ Ps. 72:20 ]'
  - type: text
    content: A Prayer of David.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 31:2
  - type: text
    content: 'Incline your ear, O '
  - type: text
    content: Lord
  - type: text
    content: ', and answer me,'
  - type: text
    content: 'for I am '
  - type: note
    content: Ps. 40:17
  - type: text
    content: poor and needy.
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 77:13
  - type: text
    content: 'you are great and '
  - type: note
    content: See Ps. 72:18
  - type: text
    content: do wondrous things;
  - type: note
    content: Deut. 6:4; Isa. 37:16; 44:6, 8; 1 Cor. 8:4, 6
  - type: text
    content: you alone are God.
  '11':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 25:4
  - type: text
    content: 'Teach me your way, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'that I may '
  - type: note
    content: Ps. 26:3
  - type: text
    content: walk in your truth;
  - type: note
    content: '[ Jer. 32:39 ]'
  - type: text
    content: unite my heart to fear your name.
  '12':
  - type: text
    content: I give thanks to you, O Lord my God, with my whole heart,
  - type: text
    content: and I will glorify your name forever.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 5 ]'
  - type: text
    content: For great is your steadfast love toward me;
  - type: text
    content: 'you have '
  - type: note
    content: Ps. 30:3; [Ps. 88:6; Ezek. 26:20]
  - type: text
    content: delivered my soul from the depths of Sheol.
  '14':
  - type: text
    content: 'O God, insolent men have '
  - type: note
    content: Ps. 54:3
  - type: text
    content: risen up against me;
  - type: text
    content: a band of ruthless men seeks my life,
  - type: text
    content: and they do not set you before them.
  '15':
  - type: text
    content: 'But you, O Lord, are a God '
  - type: note
    content: ver. 5; Ps. 111:4; 112:4; Num. 14:18; Neh. 9:17; Jonah 4:2; See Ps. 62:12
  - type: text
    content: merciful and gracious,
  - type: text
    content: slow to anger and abounding in steadfast love and faithfulness.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 25:16
  - type: text
    content: Turn to me and be gracious to me;
  - type: text
    content: 'give your strength to '
  - type: note
    content: See Ps. 116:16
  - type: text
    content: your servant,
  - type: text
    content: 'and save '
  - type: note
    content: See Ps. 116:16
  - type: text
    content: the son of your maidservant.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Judg. 6:17 ]'
  - type: text
    content: 'Show me a sign of your '
  - type: note
    content: Neh. 5:19; 13:31
  - type: text
    content: favor,
  - type: text
    content: that those who hate me may see and be put to shame
  - type: text
    content: 'because you, '
  - type: text
    content: Lord
  - type: text
    content: ', have helped me and comforted me.'
  '2':
  - type: text
    content: 'Preserve my life, for I am '
  - type: note
    content: See Ps. 50:5
  - type: text
    content: godly;
  - type: text
    content: 'save your servant, who '
  - type: note
    content: See Ps. 11:1
  - type: text
    content: trusts in you—you are my God.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ver. 16 ; Ps. 56:1; 57:1; See Ps. 4:1
  - type: text
    content: Be gracious to me, O Lord,
  - type: text
    content: for to you do I cry all the day.
  '4':
  - type: text
    content: Gladden the soul of your servant,
  - type: text
    content: 'for '
  - type: note
    content: See Ps. 25:1
  - type: text
    content: to you, O Lord, do I lift up my soul.
  '5':
  - type: text
    content: 'For you, O Lord, are good and '
  - type: note
    content: Ps. 130:4
  - type: text
    content: forgiving,
  - type: note
    content: ver. 15 ; Ps. 103:8; 145:8, 9; Ex. 34:6; Joel 2:13
  - type: text
    content: abounding in steadfast love to all who call upon you.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps. 55:1, 2
  - type: text
    content: 'Give ear, O '
  - type: text
    content: Lord
  - type: text
    content: ', to my prayer;'
  - type: text
    content: listen to my plea for grace.
  '7':
  - type: text
    content: 'In '
  - type: note
    content: See Ps. 77:2
  - type: text
    content: the day of my trouble I call upon you,
  - type: note
    content: Ps. 17:6
  - type: text
    content: for you answer me.
  '8':
  - type: text
    content: 'There is '
  - type: note
    content: '[Ps. 89:6; Ex. 15:11]'
  - type: text
    content: none like you among the gods, O Lord,
  - type: note
    content: Deut. 3:24
  - type: text
    content: nor are there any works like yours.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 66:4; [ Ps. 22:31; 65:2; Isa. 66:23; Zech. 14:18; Rev. 15:4 ]
  - type: text
    content: All the nations you have made shall come
  - type: text
    content: and worship before you, O Lord,
  - type: text
    content: and shall glorify your name.
