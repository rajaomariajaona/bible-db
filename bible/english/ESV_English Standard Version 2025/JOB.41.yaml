    - type: text
      text: a rope in his nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'or pierce his jaw with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
