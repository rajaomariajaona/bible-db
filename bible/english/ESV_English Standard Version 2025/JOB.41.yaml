document_id: JOB.41,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ch 40:25 in Hebrew
  - type: text
    content: '“Can you draw out '
  - type: note
    content: ch. 3:8; Ps. 74:14; 104:26; Isa. 27:1
  - type: text
    content: Leviathan
  - type: note
    content: A large sea animal, exact identity uncertain
  - type: text
    content: ' with a fishhook'
  - type: text
    content: or press down his tongue with a cord?
  '10':
  - type: text
    content: No one is so fierce that he dares to stir him up.
  - type: text
    content: Who then is he who can stand before me?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Rom. 11:35; [ch. 35:7 ]
  - type: text
    content: Who has first given to me, that I should repay him?
  - type: note
    content: See Ps. 24:1
  - type: text
    content: Whatever is under the whole heaven is mine.
  '12':
  - type: text
    content: “I will not keep silence concerning his limbs,
  - type: text
    content: or his mighty strength, or his goodly frame.
  '13':
  - type: text
    content: Who can strip off his outer garment?
  - type: text
    content: Who would come near him with a bridle?
  '14':
  - type: text
    content: Who can open the doors of his face?
  - type: text
    content: Around his teeth is terror.
  '15':
  - type: text
    content: His back is made of
  - type: note
    content: Or His pride is in his
  - type: text
    content: ' rows of shields,'
  - type: text
    content: shut up closely as with a seal.
  '16':
  - type: text
    content: One is so near to another
  - type: text
    content: that no air can come between them.
  '17':
  - type: text
    content: 'They are '
  - type: note
    content: ver. 23
  - type: text
    content: joined one to another;
  - type: text
    content: they clasp each other and cannot be separated.
  '18':
  - type: text
    content: His sneezings flash forth light,
  - type: text
    content: 'and his eyes are like '
  - type: note
    content: ch. 3:9
  - type: text
    content: the eyelids of the dawn.
  '19':
  - type: text
    content: Out of his mouth go flaming torches;
  - type: text
    content: sparks of fire leap forth.
  '2':
  - type: text
    content: 'Can you put '
  - type: note
    content: '[2 Kgs. 19:28; Isa. 37:29]'
  - type: text
    content: a rope in his nose
  - type: text
    content: 'or pierce his jaw with '
  - type: note
    content: '[2 Kgs. 19:28; Isa. 37:29]'
  - type: text
    content: a hook?
  '20':
  - type: text
    content: Out of his nostrils comes forth smoke,
  - type: text
    content: as from a boiling pot and burning rushes.
  '21':
  - type: text
    content: 'His breath '
  - type: note
    content: 2 Sam. 22:13; [Ps. 18:8]
  - type: text
    content: kindles coals,
  - type: text
    content: and a flame comes forth from his mouth.
  '22':
  - type: text
    content: In his neck abides strength,
  - type: text
    content: and terror dances before him.
  '23':
  - type: text
    content: 'The folds of his flesh '
  - type: note
    content: ver. 17
  - type: text
    content: stick together,
  - type: text
    content: firmly cast on him and immovable.
  '24':
  - type: text
    content: His heart is hard as a stone,
  - type: text
    content: hard as the lower millstone.
  '25':
  - type: text
    content: When he raises himself up, the mighty
  - type: note
    content: Or gods
  - type: text
    content: ' are afraid;'
  - type: text
    content: at the crashing they are beside themselves.
  '26':
  - type: text
    content: Though the sword reaches him, it does not avail,
  - type: text
    content: nor the spear, the dart, or the javelin.
  '27':
  - type: text
    content: He counts iron as straw,
  - type: text
    content: and bronze as rotten wood.
  '28':
  - type: text
    content: The arrow cannot make him flee;
  - type: text
    content: for him, sling stones are turned to stubble.
  '29':
  - type: text
    content: Clubs are counted as stubble;
  - type: text
    content: he laughs at the rattle of javelins.
  '3':
  - type: text
    content: Will he make many pleas to you?
  - type: text
    content: Will he speak to you soft words?
  '30':
  - type: text
    content: 'His underparts are like sharp '
  - type: note
    content: ch. 2:8
  - type: text
    content: potsherds;
  - type: text
    content: 'he spreads himself like '
  - type: note
    content: Isa. 28:27; 41:15
  - type: text
    content: a threshing sledge on the mire.
  '31':
  - type: text
    content: He makes the deep boil like a pot;
  - type: text
    content: he makes the sea like a pot of ointment.
  '32':
  - type: text
    content: Behind him he leaves a shining wake;
  - type: text
    content: one would think the deep to be white-haired.
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:25
  - type: text
    content: On earth there is not his like,
  - type: text
    content: a creature without fear.
  '34':
  - type: text
    content: He sees everything that is high;
  - type: text
    content: 'he is king over all the '
  - type: note
    content: ch. 28:8
  - type: text
    content: sons of pride.”
  '4':
  - type: text
    content: Will he make a covenant with you
  - type: text
    content: 'to take him for '
  - type: note
    content: Ex. 21:6; Deut. 15:17
  - type: text
    content: your servant forever?
  '5':
  - type: text
    content: Will you play with him as with a bird,
  - type: text
    content: or will you put him on a leash for your girls?
  '6':
  - type: text
    content: Will traders bargain over him?
  - type: text
    content: Will they divide him up among the merchants?
  '7':
  - type: text
    content: Can you fill his skin with harpoons
  - type: text
    content: or his head with fishing spears?
  '8':
  - type: text
    content: Lay your hands on him;
  - type: text
    content: remember the battle—you will not do it again!
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ch 41:1 in Hebrew
  - type: text
    content: Behold, the hope of a man is false;
  - type: text
    content: he is laid low even at the sight of him.
