  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will not keep silence concerning his limbs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or his mighty strength, or his goodly frame.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can strip off his outer garment?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who would come near him with a bridle?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can open the doors of his face?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Around his teeth is terror.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His back is made of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: His pride is in his
      marker-yv: yv-n
    - type: text
      text: ' rows of shields,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shut up closely as with a seal.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One is so near to another
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no air can come between them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      marker-yv: yv-n
    - type: text
      text: joined one to another;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they clasp each other and cannot be separated.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His sneezings flash forth light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and his eyes are like '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      marker-yv: yv-n
    - type: text
      text: the eyelids of the dawn.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of his mouth go flaming torches;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sparks of fire leap forth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
