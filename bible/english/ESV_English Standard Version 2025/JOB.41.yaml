  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one is so fierce that he dares to stir him up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who then is he who can stand before me?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
