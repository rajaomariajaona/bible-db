      marker-yv: yv-n
    - type: text
      text: a hook?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of his nostrils comes forth smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as from a boiling pot and burning rushes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His breath '
    - type: usfm
      marker: x
      children:
