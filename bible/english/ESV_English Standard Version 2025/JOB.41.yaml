    - type: text
      text: kindles coals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a flame comes forth from his mouth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his neck abides strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terror dances before him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The folds of his flesh '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      marker-yv: yv-n
    - type: text
      text: stick together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: firmly cast on him and immovable.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His heart is hard as a stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hard as the lower millstone.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he raises himself up, the mighty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gods
      marker-yv: yv-n
    - type: text
      text: ' are afraid;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the crashing they are beside themselves.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the sword reaches him, it does not avail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor the spear, the dart, or the javelin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He counts iron as straw,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bronze as rotten wood.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arrow cannot make him flee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for him, sling stones are turned to stubble.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clubs are counted as stubble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he laughs at the rattle of javelins.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he make many pleas to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will he speak to you soft words?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His underparts are like sharp '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:8
      marker-yv: yv-n
    - type: text
      text: potsherds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he spreads himself like '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:15
      marker-yv: yv-n
    - type: text
      text: a threshing sledge on the mire.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the deep boil like a pot;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes the sea like a pot of ointment.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behind him he leaves a shining wake;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one would think the deep to be white-haired.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:25
      marker-yv: yv-n
    - type: text
      text: On earth there is not his like,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a creature without fear.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sees everything that is high;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he is king over all the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:8
      marker-yv: yv-n
    - type: text
      text: sons of pride.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he make a covenant with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to take him for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 15:17
      marker-yv: yv-n
    - type: text
      text: your servant forever?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you play with him as with a bird,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or will you put him on a leash for your girls?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will traders bargain over him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they divide him up among the merchants?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you fill his skin with harpoons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or his head with fishing spears?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lay your hands on him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remember the battle—you will not do it again!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 41:1 in Hebrew
      marker-yv: yv-n
    - type: text
      text: Behold, the hope of a man is false;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is laid low even at the sight of him.
