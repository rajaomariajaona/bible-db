document_id: 1CO.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection of Christ
  - type: text
    content: Now I would remind you, brothers,
  - type: note
    content: Or brothers and sisters; also verses 6, 31, 50, 58
  - type: text
    content: ' of the gospel '
  - type: note
    content: '[2 Tim. 2:8]; See ch. 3:6'
  - type: text
    content: 'I preached to you, which you received, '
  - type: note
    content: Rom. 5:2; [2 Cor. 1:24; 1 Pet. 5:12]
  - type: text
    content: 'in which you stand, '
  '10':
  - type: text
    content: 'But by the grace of God I am what I am, and his grace toward me was not in vain. On the contrary, '
  - type: note
    content: 2 Cor. 11:23; 12:11; Col. 1:29
  - type: text
    content: 'I worked harder than any of them, '
  - type: note
    content: '[ch. 3:6; 2 Cor. 3:5; Phil. 2:13]; See Matt. 10:20'
  - type: text
    content: 'though it was not I, but the grace of God that is with me. '
  '11':
  - type: text
    content: Whether then it was I or they, so we preach and so you believed.
  - type: heading
    content: The Resurrection of the Dead
  '12':
  - type: text
    content: 'Now if Christ is proclaimed as raised from the dead, '
  - type: note
    content: '[Acts 23:8; 2 Tim. 2:18]'
  - type: text
    content: 'how can some of you say that there is no resurrection of the dead? '
  '13':
  - type: text
    content: 'But if there is no resurrection of the dead, '
  - type: note
    content: 1 Thess. 4:14
  - type: text
    content: 'then not even Christ has been raised. '
  '14':
  - type: text
    content: 'And if Christ has not been raised, then our preaching is in vain and your faith is in vain. '
  '15':
  - type: text
    content: 'We are even found to be misrepresenting God, because we testified about God that '
  - type: note
    content: See Acts 2:24
  - type: text
    content: 'he raised Christ, whom he did not raise if it is true that the dead are not raised. '
  '16':
  - type: text
    content: 'For if the dead are not raised, not even Christ has been raised. '
  '17':
  - type: text
    content: 'And if Christ has not been raised, your faith is futile and '
  - type: note
    content: See Rom. 4:25
  - type: text
    content: 'you are still in your sins. '
  '18':
  - type: text
    content: 'Then those also who '
  - type: note
    content: 1 Thess. 4:16; Rev. 14:13
  - type: text
    content: 'have fallen asleep in Christ have perished. '
  '19':
  - type: text
    content: If in Christ we have hope
  - type: note
    content: Or we have hoped
  - type: text
    content: ' in this life only, '
  - type: note
    content: '[ch. 4:9; 2 Tim. 3:12]'
  - type: text
    content: we are of all people most to be pitied.
  '2':
  - type: text
    content: 'and by which '
  - type: note
    content: ch. 1:18
  - type: text
    content: 'you are being saved, if you '
  - type: note
    content: ch. 11:2; [Heb. 3:6, 14]
  - type: text
    content: hold fast to the word I preached to you—
  - type: note
    content: Gal. 3:4
  - type: text
    content: unless you believed in vain.
  '20':
  - type: text
    content: 'But in fact '
  - type: note
    content: 2 Tim. 2:8; 1 Pet. 1:3
  - type: text
    content: 'Christ has been raised from the dead, '
  - type: note
    content: ver. 23; See Acts 26:23
  - type: text
    content: 'the firstfruits of those who have fallen asleep. '
  '21':
  - type: text
    content: 'For as '
  - type: note
    content: See Rom. 5:12
  - type: text
    content: 'by a man came death, '
  - type: note
    content: John 11:25; Rom. 6:23
  - type: text
    content: 'by a man has come also the resurrection of the dead. '
  '22':
  - type: text
    content: 'For '
  - type: note
    content: '[Rom. 5:14-18]'
  - type: text
    content: 'as in Adam all die, so also in Christ shall all be made alive. '
  '23':
  - type: text
    content: 'But each in his own order: Christ the firstfruits, then '
  - type: note
    content: See 1 Thess. 2:19
  - type: text
    content: 'at his coming '
  - type: note
    content: ver. 52; 1 Thess. 4:16; See Luke 14:14
  - type: text
    content: 'those who belong to Christ. '
  '24':
  - type: text
    content: 'Then comes the end, when he delivers '
  - type: note
    content: '[Dan. 7:14, 27]'
  - type: text
    content: 'the kingdom to God the Father after destroying '
  - type: note
    content: Eph. 1:21
  - type: text
    content: 'every rule and every authority and power. '
  '25':
  - type: text
    content: 'For he must reign '
  - type: note
    content: See Ps. 110:1
  - type: text
    content: 'until he has put all his enemies under his feet. '
  '26':
  - type: text
    content: 'The last enemy to be '
  - type: note
    content: 2 Tim. 1:10; [Rev. 20:14; 21:4]
  - type: text
    content: 'destroyed is death. '
  '27':
  - type: text
    content: 'For '
  - type: note
    content: Eph. 1:22; Cited from Ps. 8:6; See Matt. 11:27; 28:18
  - type: text
    content: “God
  - type: note
    content: Greek he
  - type: text
    content: ' has put all things in subjection under his feet.” But when it says, “all things are put in subjection,” it is plain that he is excepted who put all things in subjection under him. '
  '28':
  - type: text
    content: 'When '
  - type: note
    content: Phil. 3:21
  - type: text
    content: 'all things are subjected to him, then the Son himself will also be subjected to him who put all things in subjection under him, that '
  - type: note
    content: '[ch. 3:23; 11:3]'
  - type: text
    content: God may be all in all.
  '29':
  - type: text
    content: 'Otherwise, what do people mean by being baptized on behalf of the dead? If the dead are not raised at all, why are people baptized on their behalf? '
  '3':
  - type: text
    content: 'For '
  - type: note
    content: ch. 11:23; Gal. 1:12
  - type: text
    content: 'I delivered to you as of first importance what I also received: that Christ died '
  - type: note
    content: John 1:29; Gal. 1:4; Heb. 5:1, 3; 1 Pet. 2:24
  - type: text
    content: 'for our sins '
  - type: note
    content: Isa. 53; Dan. 9:26; Zech. 13:7; [1 Pet. 1:11]
  - type: text
    content: 'in accordance with the Scriptures, '
  '30':
  - type: text
    content: 'Why are we '
  - type: note
    content: 2 Cor. 11:26
  - type: text
    content: 'in danger every hour? '
  '31':
  - type: text
    content: 'I protest, brothers, by '
  - type: note
    content: 1 Thess. 2:19
  - type: text
    content: 'my pride in you, which I have in Christ Jesus our Lord, '
  - type: note
    content: Luke 9:23; See Rom. 8:36
  - type: text
    content: 'I die every day! '
  '32':
  - type: text
    content: 'What do I gain if, humanly speaking, '
  - type: note
    content: '[2 Cor. 1:8]'
  - type: text
    content: 'I fought with beasts at Ephesus? If the dead are not raised, '
  - type: note
    content: Cited from Isa. 22:13; [Isa. 56:12; Luke 12:19]
  - type: text
    content: '“Let us eat and drink, for tomorrow we die.” '
  '33':
  - type: note
    content: James 1:16
  - type: text
    content: 'Do not be deceived: '
  - type: note
    content: '[ch. 5:6]'
  - type: text
    content: “Bad company ruins good morals.”
  - type: note
    content: Probably from Menander’s comedy Thais
  - type: text
    content: ' '
  '34':
  - type: note
    content: See Rom. 13:11
  - type: text
    content: 'Wake up from your drunken stupor, as is right, and do not go on sinning. For '
  - type: note
    content: 1 Thess. 4:5
  - type: text
    content: 'some have no knowledge of God. '
  - type: note
    content: ch. 6:5; [ch. 4:14]
  - type: text
    content: I say this to your shame.
  - type: heading
    content: The Resurrection Body
  '35':
  - type: text
    content: 'But someone will ask, '
  - type: note
    content: '[Ezek. 37:3]'
  - type: text
    content: '“How are the dead raised? With what kind of body do they come?” '
  '36':
  - type: text
    content: 'You foolish person! '
  - type: note
    content: John 12:24
  - type: text
    content: 'What you sow does not come to life unless it dies. '
  '37':
  - type: text
    content: 'And what you sow is not the body that is to be, but a bare kernel, perhaps of wheat or of some other grain. '
  '38':
  - type: text
    content: 'But God gives it a body as he has chosen, and to each kind of seed its own body. '
  '39':
  - type: text
    content: 'For not all flesh is the same, but there is one kind for humans, another for animals, another for birds, and another for fish. '
  '4':
  - type: text
    content: 'that he was buried, that he was raised '
  - type: note
    content: '[Hos. 6:2; Matt. 12:40; John 2:22]'
  - type: text
    content: 'on the third day '
  - type: note
    content: Ps. 16:10; Isa. 53:10; [Acts 2:25-32; 13:33-35; 26:22, 23]
  - type: text
    content: 'in accordance with the Scriptures, '
  '40':
  - type: text
    content: 'There are heavenly bodies and earthly bodies, but the glory of the heavenly is of one kind, and the glory of the earthly is of another. '
  '41':
  - type: text
    content: There is one glory of the sun, and another glory of the moon, and another glory of the stars; for star differs from star in glory.
  '42':
  - type: text
    content: ' '
  - type: note
    content: Dan. 12:3; [ Matt. 13:43 ]
  - type: text
    content: 'So is it with the resurrection of the dead. What is sown is perishable; what is raised is imperishable. '
  '43':
  - type: text
    content: 'It is sown in dishonor; '
  - type: note
    content: Phil. 3:21; Col. 3:4
  - type: text
    content: 'it is raised in glory. It is sown in weakness; it is raised in power. '
  '44':
  - type: text
    content: 'It is sown a natural body; it is raised a spiritual body. If there is a natural body, there is also a spiritual body. '
  '45':
  - type: text
    content: 'Thus it is written, '
  - type: note
    content: Cited from Gen. 2:7
  - type: text
    content: “The first man Adam became a living being”;
  - type: note
    content: Greek a living soul
  - type: text
    content: ' '
  - type: note
    content: Rom. 5:14
  - type: text
    content: 'the last Adam became a '
  - type: note
    content: John 5:21; [John 6:33, 39, 40, 54, 57; Rom. 8:2, 10]
  - type: text
    content: 'life-giving spirit. '
  '46':
  - type: text
    content: 'But it is not the spiritual that is first but the natural, and then the spiritual. '
  '47':
  - type: note
    content: John 3:31
  - type: text
    content: 'The first man was from the earth, '
  - type: note
    content: '[Gen. 2:7; 3:19]'
  - type: text
    content: 'a man of dust; '
  - type: note
    content: John 3:13, 31
  - type: text
    content: 'the second man is from heaven. '
  '48':
  - type: text
    content: 'As was the man of dust, so also are those who are of the dust, and as is the man of heaven, '
  - type: note
    content: '[Phil. 3:20]'
  - type: text
    content: 'so also are those who are of heaven. '
  '49':
  - type: text
    content: 'Just '
  - type: note
    content: Gen. 5:3
  - type: text
    content: 'as we have borne the image of the man of dust, '
  - type: note
    content: See Rom. 8:29
  - type: text
    content: we shall
  - type: note
    content: Some manuscripts let us
  - type: text
    content: ' also bear the image of the man of heaven.'
  - type: heading
    content: Mystery and Victory
  '5':
  - type: text
    content: 'and that '
  - type: note
    content: Luke 24:34
  - type: text
    content: 'he appeared to Cephas, then '
  - type: note
    content: Mark 16:14; Luke 24:36; John 20:19, 26; Acts 10:41
  - type: text
    content: 'to the twelve. '
  '50':
  - type: text
    content: 'I tell you this, brothers: '
  - type: note
    content: See Matt. 16:17
  - type: text
    content: 'flesh and blood '
  - type: note
    content: '[John 3:3, 5]'
  - type: text
    content: 'cannot inherit the kingdom of God, nor does the perishable inherit the imperishable. '
  '51':
  - type: text
    content: 'Behold! I tell you a mystery. '
  - type: note
    content: 1 Thess. 4:15, 17
  - type: text
    content: 'We shall not all sleep, '
  - type: note
    content: Phil. 3:21
  - type: text
    content: 'but we shall all be changed, '
  '52':
  - type: text
    content: 'in a moment, in the twinkling of an eye, at the last trumpet. For '
  - type: note
    content: Matt. 24:31; 1 Thess. 4:16; [Isa. 27:13; Zech. 9:14]
  - type: text
    content: 'the trumpet will sound, and '
  - type: note
    content: John 5:25, 28; [Luke 20:36]
  - type: text
    content: 'the dead will be raised imperishable, and we shall be changed. '
  '53':
  - type: text
    content: 'For this perishable body must put on the imperishable, and '
  - type: note
    content: '[2 Cor. 5:2-4]'
  - type: text
    content: 'this mortal body must put on immortality. '
  '54':
  - type: text
    content: 'When the perishable puts on the imperishable, and the mortal puts on immortality, then shall come to pass the saying that is written:'
  - type: note
    content: Cited from Isa. 25:8; [ Heb. 2:14, 15; Rev. 20:14; 21:4 ]
  - type: text
    content: “Death is swallowed up in victory.”
  '55':
  - type: text
    content: ' '
  - type: note
    content: Hos. 13:14
  - type: text
    content: “O death, where is your victory?
  - type: text
    content: O death, where is your sting?”
  '56':
  - type: text
    content: 'The sting of death is sin, and '
  - type: note
    content: Rom. 4:15; 5:13; 7:5, 8, 13
  - type: text
    content: 'the power of sin is the law. '
  '57':
  - type: text
    content: 'But thanks be to God, '
  - type: note
    content: '[Rom. 8:37; 1 John 5:4]'
  - type: text
    content: who gives us the victory through our Lord Jesus Christ.
  '58':
  - type: text
    content: ' '
  - type: note
    content: 2 Pet. 3:14
  - type: text
    content: 'Therefore, my beloved brothers, be steadfast, immovable, always abounding in '
  - type: note
    content: ch. 16:10; Jer. 48:10; John 6:28
  - type: text
    content: 'the work of the Lord, knowing that in the Lord '
  - type: note
    content: '[Gal. 6:9]; See ch. 3:8'
  - type: text
    content: your labor is not in vain.
  '6':
  - type: text
    content: 'Then he appeared to more than five hundred brothers at one time, most of whom are still alive, though some have fallen asleep. '
  '7':
  - type: text
    content: 'Then he appeared to '
  - type: note
    content: See Acts 12:17
  - type: text
    content: 'James, then '
  - type: note
    content: Luke 24:50; Acts 1:3, 4
  - type: text
    content: 'to all the apostles. '
  '8':
  - type: text
    content: 'Last of all, as to one untimely born, '
  - type: note
    content: See ch. 9:1
  - type: text
    content: 'he appeared also to me. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: 2 Cor. 12:11; Eph. 3:7, 8; 1 Tim. 1:13-16
  - type: text
    content: 'I am the least of the apostles, unworthy to be called an apostle, because '
  - type: note
    content: See Acts 8:3
  - type: text
    content: 'I persecuted the church of God. '
