        children:
        - type: text
          text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'he raised Christ, whom he did not raise if it is true that the dead are not raised. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
