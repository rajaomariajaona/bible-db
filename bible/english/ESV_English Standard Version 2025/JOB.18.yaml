document_id: JOB.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Bildad Speaks: God Punishes the Wicked'
  - type: text
    content: 'Then '
  - type: note
    content: ch. 2:11; 8:1
  - type: text
    content: 'Bildad the Shuhite answered and said:'
  '10':
  - type: text
    content: A rope is hidden for him in the ground,
  - type: text
    content: a trap for him in the path.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:21; 20:25; 27:20; 30:15; Jer. 6:25; 46:5; 49:29
  - type: text
    content: Terrors frighten him on every side,
  - type: text
    content: and chase him at his heels.
  '12':
  - type: text
    content: His strength is famished,
  - type: text
    content: 'and calamity is '
  - type: note
    content: Ps. 38:17
  - type: text
    content: ready for his stumbling.
  '13':
  - type: text
    content: It consumes the parts of his skin;
  - type: note
    content: Isa. 14:30
  - type: text
    content: the firstborn of death consumes his limbs.
  '14':
  - type: text
    content: He is torn from the tent in which he trusted
  - type: text
    content: 'and is brought to '
  - type: note
    content: '[Rev. 9:11]'
  - type: text
    content: the king of terrors.
  '15':
  - type: text
    content: In his tent dwells that which is none of his;
  - type: note
    content: See Ps. 11:6; Ezek. 38:22
  - type: text
    content: sulfur is scattered over his habitation.
  '16':
  - type: text
    content: 'His '
  - type: note
    content: ch. 29:19; Hos. 9:16
  - type: text
    content: roots dry up beneath,
  - type: text
    content: 'and his branches '
  - type: note
    content: ch. 14:2
  - type: text
    content: wither above.
  '17':
  - type: text
    content: 'His '
  - type: note
    content: Ps. 34:16; Prov. 10:7; [Ps. 109:13, 15]
  - type: text
    content: memory perishes from the earth,
  - type: text
    content: and he has no name in the street.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:21, 22
  - type: text
    content: He is thrust from light into darkness,
  - type: text
    content: and driven out of the world.
  '19':
  - type: text
    content: 'He has no '
  - type: note
    content: Isa. 14:22
  - type: text
    content: posterity or progeny among his people,
  - type: text
    content: and no survivor where he used to live.
  '2':
  - type: text
    content: '“How long will you '
  - type: note
    content: '[Matt. 22:15; Mark 12:13; Luke 20:20]'
  - type: text
    content: hunt for words?
  - type: text
    content: Consider, and then we will speak.
  '20':
  - type: text
    content: 'They of the west are appalled at his '
  - type: note
    content: Ps. 37:13; Jer. 50:27; Ezek. 21:25, 29; Obad. 12; [1 Sam. 26:10]
  - type: text
    content: day,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 21:6]'
  - type: text
    content: horror seizes them of the east.
  '21':
  - type: text
    content: Surely such are the dwellings of the unrighteous,
  - type: text
    content: 'such is the place of him who '
  - type: note
    content: Judg. 2:10; Jer. 9:3; 10:25; 1 Thess. 4:8; 2 Thess. 1:8
  - type: text
    content: knows not God.”
  '3':
  - type: text
    content: 'Why are we counted as '
  - type: note
    content: Ps. 73:22
  - type: text
    content: cattle?
  - type: text
    content: Why are we stupid in your sight?
  '4':
  - type: text
    content: 'You who '
  - type: note
    content: ch. 16:9
  - type: text
    content: tear yourself in your anger,
  - type: text
    content: shall the earth be forsaken for you,
  - type: text
    content: 'or '
  - type: note
    content: ch. 14:18
  - type: text
    content: the rock be removed out of its place?
  '5':
  - type: text
    content: '“Indeed, '
  - type: note
    content: ch. 21:17; Prov. 13:9; 20:20; 24:20; See Ps. 18:28
  - type: text
    content: the light of the wicked is put out,
  - type: text
    content: and the flame of his fire does not shine.
  '6':
  - type: text
    content: 'The light is '
  - type: note
    content: ch. 10:22
  - type: text
    content: dark in his tent,
  - type: text
    content: and his lamp above him is put out.
  '7':
  - type: text
    content: His strong steps are shortened,
  - type: text
    content: 'and his '
  - type: note
    content: '[ch. 5:13]'
  - type: text
    content: own schemes throw him down.
  '8':
  - type: text
    content: For he is cast into a net by his own feet,
  - type: text
    content: and he walks on its mesh.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 140:5
  - type: text
    content: A trap seizes him by the heel;
  - type: text
    content: a snare lays hold of him.
