document_id: 1KI.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Flees Jezebel
  - type: text
    content: 'Ahab told Jezebel all that Elijah had done, and how '
  - type: note
    content: ch. 18:40
  - type: text
    content: 'he had killed all the prophets with the sword. '
  '10':
  - type: text
    content: 'He said, “I have been very '
  - type: note
    content: Num. 25:11, 13
  - type: text
    content: 'jealous for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts. For the people of Israel have forsaken your covenant, '
  - type: note
    content: ch. 18:30; Cited Rom. 11:3
  - type: text
    content: 'thrown down your altars, and '
  - type: note
    content: ch. 18:4
  - type: text
    content: 'killed your prophets with the sword, '
  - type: note
    content: ch. 18:22
  - type: text
    content: 'and I, even I only, am left, and they seek my life, to take it away.” '
  '11':
  - type: text
    content: 'And he said, “Go out and '
  - type: note
    content: Ex. 24:12; 34:2
  - type: text
    content: 'stand on the mount before the '
  - type: text
    content: Lord
  - type: text
    content: '.” And behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' passed by, and '
  - type: note
    content: Ezek. 1:4
  - type: text
    content: 'a great and strong wind tore the mountains and broke in pieces the rocks before the '
  - type: text
    content: Lord
  - type: text
    content: ', but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the wind. And after the wind '
  - type: note
    content: Ezek. 37:7
  - type: text
    content: 'an earthquake, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the earthquake. '
  '12':
  - type: text
    content: 'And after the earthquake a fire, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the fire. And after the fire the sound of a low whisper.'
  - type: note
    content: Or a sound, a thin silence
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And when Elijah heard it, '
  - type: note
    content: '[Ex. 3:6]'
  - type: text
    content: 'he wrapped his face in his cloak and went out and stood at the entrance of the cave. And behold, '
  - type: note
    content: ver. 9
  - type: text
    content: 'there came a voice to him and said, “What are you doing here, Elijah?” '
  '14':
  - type: text
    content: 'He said, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: '“I have been very jealous for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of hosts. For the people of Israel have forsaken your covenant, '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'thrown down your altars, and killed your prophets with the sword, and I, even I only, am left, and they seek my life, to take it away.” '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go, return on your way to the wilderness of Damascus. And when you arrive, you shall anoint Hazael to be king over Syria. '
  '16':
  - type: note
    content: See 2 Kgs. 9:1-6
  - type: text
    content: 'And Jehu the son of Nimshi you shall anoint to be king over Israel, and '
  - type: note
    content: '[ver. 19-21; 2 Kgs. 2:9, 15]'
  - type: text
    content: 'Elisha the son of Shaphat of Abel-meholah you shall anoint to be prophet in your place. '
  '17':
  - type: text
    content: 'And the one who escapes from '
  - type: note
    content: 2 Kgs. 8:12; 13:3, 22
  - type: text
    content: 'the sword of Hazael '
  - type: note
    content: See 2 Kgs. 9–10
  - type: text
    content: 'shall Jehu put to death, and the one who escapes from the sword of Jehu '
  - type: note
    content: '[Hos. 6:5]'
  - type: text
    content: 'shall Elisha put to death. '
  '18':
  - type: note
    content: Cited Rom. 11:4
  - type: text
    content: 'Yet I will leave seven thousand in Israel, all the knees that have not bowed to Baal, and every mouth that has not '
  - type: note
    content: '[Hos. 13:2]'
  - type: text
    content: kissed him.”
  - type: heading
    content: The Call of Elisha
  '19':
  - type: text
    content: 'So he departed from there and found Elisha the son of Shaphat, who was plowing with twelve yoke of oxen in front of him, and he was with the twelfth. Elijah passed by him and cast '
  - type: note
    content: 2 Kgs. 2:8
  - type: text
    content: 'his cloak upon him. '
  '2':
  - type: text
    content: 'Then Jezebel sent a messenger to Elijah, saying, '
  - type: note
    content: '[ch. 20:10]; See Ruth 1:17'
  - type: text
    content: '“So may the gods do to me and more also, if I do not make your life as the life of one of them by this time tomorrow.” '
  '20':
  - type: text
    content: 'And he left the oxen and ran after Elijah and said, '
  - type: note
    content: '[Matt. 8:21, 22; Luke 9:61, 62]'
  - type: text
    content: '“Let me kiss my father and my mother, and then I will follow you.” And he said to him, “Go back again, for what have I done to you?” '
  '21':
  - type: text
    content: 'And he returned from following him and took the yoke of oxen and sacrificed them and boiled their flesh '
  - type: note
    content: '[2 Sam. 24:22]'
  - type: text
    content: with the yokes of the oxen and gave it to the people, and they ate. Then he arose and went after Elijah and assisted him.
  '3':
  - type: text
    content: 'Then he was afraid, and he arose and ran for his life and came to '
  - type: note
    content: See Gen. 21:31
  - type: text
    content: Beersheba, which belongs to Judah, and left his servant there.
  '4':
  - type: text
    content: 'But he himself went a day’s journey into the wilderness and came and sat down under a broom tree. '
  - type: note
    content: '[Num. 11:15; Jonah 4:3, 8]'
  - type: text
    content: 'And he asked that he might die, saying, “It is enough; now, O '
  - type: text
    content: Lord
  - type: text
    content: ', take away my life, for I am no better than my fathers.” '
  '5':
  - type: text
    content: 'And he lay down and slept under a broom tree. And behold, an angel touched him and said to him, “Arise and eat.” '
  '6':
  - type: text
    content: 'And he looked, and behold, there was at his head a cake baked on hot stones and a jar of water. And he ate and drank and lay down again. '
  '7':
  - type: text
    content: 'And the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' came again a second time and touched him and said, “Arise and eat, for the journey is too great for you.” '
  '8':
  - type: text
    content: 'And he arose and ate and drank, and went in the strength of that food '
  - type: note
    content: Ex. 24:18; 34:28; Deut. 9:9, 18; Matt. 4:2; Mark 1:13; Luke 4:2
  - type: text
    content: 'forty days and forty nights to '
  - type: note
    content: Ex. 3:1
  - type: text
    content: Horeb, the mount of God.
  - type: heading
    content: The Lord Speaks to Elijah
  '9':
  - type: text
    content: 'There he came to a cave and lodged in it. And behold, '
  - type: note
    content: ver. 13
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him, and he said to him, “What are you doing here, Elijah?” '
