document_id: 2SA.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Bathsheba
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 20:1
  - type: note
    content: 1 Kgs. 20:22, 26; 2 Chr. 36:10
  - type: text
    content: 'In the spring of the year, the time when kings go out to battle, David sent Joab, and his servants with him, and all Israel. And they ravaged the Ammonites and besieged '
  - type: note
    content: ch. 12:26; Deut. 3:11
  - type: text
    content: Rabbah. But David remained at Jerusalem.
  '10':
  - type: text
    content: 'When they told David, “Uriah did not go down to his house,” David said to Uriah, “Have you not come from a journey? Why did you not go down to your house?” '
  '11':
  - type: text
    content: 'Uriah said to David, '
  - type: note
    content: ch. 7:2, 6
  - type: text
    content: '“The ark and Israel and Judah dwell in booths, and my lord Joab and '
  - type: note
    content: ch. 20:6; 1 Kgs. 1:33
  - type: text
    content: 'the servants of my lord are camping in the open field. Shall I then go to my house, to eat and to drink and to lie with my wife? As you live, and '
  - type: note
    content: See 1 Sam. 1:26
  - type: text
    content: 'as your soul lives, I will not do this thing.” '
  '12':
  - type: text
    content: 'Then David said to Uriah, “Remain here today also, and tomorrow I will send you back.” So Uriah remained in Jerusalem that day and the next. '
  '13':
  - type: text
    content: 'And David invited him, and he ate in his presence and drank, '
  - type: note
    content: '[Gen. 19:33, 35]'
  - type: text
    content: 'so that he made him drunk. And in the evening he went out to lie on his couch with '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: the servants of his lord, but he did not go down to his house.
  '14':
  - type: text
    content: 'In the morning David '
  - type: note
    content: 1 Kgs. 21:8, 9
  - type: text
    content: 'wrote a letter to Joab and sent it by the hand of Uriah. '
  '15':
  - type: text
    content: 'In the letter he wrote, “Set Uriah in the forefront of the hardest fighting, and then draw back from him, '
  - type: note
    content: ch. 12:9
  - type: text
    content: 'that he may be struck down, and die.” '
  '16':
  - type: text
    content: 'And as Joab was besieging the city, he assigned Uriah to the place where he knew there were valiant men. '
  '17':
  - type: text
    content: 'And the men of the city came out and fought with Joab, and some of the servants of David among the people fell. Uriah the Hittite also died. '
  '18':
  - type: text
    content: 'Then Joab sent and told David all the news about the fighting. '
  '19':
  - type: text
    content: 'And he instructed the messenger, “When you have finished telling all the news about the fighting to the king, '
  '2':
  - type: text
    content: 'It happened, late one afternoon, when David arose from his couch and was walking on '
  - type: note
    content: See 1 Sam. 9:25
  - type: text
    content: 'the roof of the king’s house, that he saw from the roof a woman bathing; and the woman was very beautiful. '
  '20':
  - type: text
    content: 'then, if the king’s anger rises, and if he says to you, ‘Why did you go so near the city to fight? Did you not know that they would shoot from the wall? '
  '21':
  - type: note
    content: Judg. 9:53
  - type: text
    content: Who killed Abimelech the son of Jerubbesheth? Did not a woman cast an upper millstone on him from the wall, so that he died at Thebez? Why did you go so near the wall?’ then you shall say, ‘Your servant Uriah the Hittite is dead also.’”
  '22':
  - type: text
    content: 'So the messenger went and came and told David all that Joab had sent him to tell. '
  '23':
  - type: text
    content: 'The messenger said to David, “The men gained an advantage over us and came out against us in the field, but we drove them back to the entrance of the gate. '
  '24':
  - type: text
    content: 'Then the archers shot at your servants from the wall. Some of the king’s servants are dead, and your servant Uriah the Hittite is dead also.” '
  '25':
  - type: text
    content: David said to the messenger, “Thus shall you say to Joab, ‘Do not let this matter displease you, for the sword devours now one and now another. Strengthen your attack against the city and overthrow it.’ And encourage him.”
  '26':
  - type: text
    content: 'When the wife of Uriah heard that Uriah her husband was dead, she lamented over her husband. '
  '27':
  - type: text
    content: 'And when the mourning was over, David sent and brought her to his house, and '
  - type: note
    content: ch. 12:9
  - type: text
    content: 'she became his wife and bore him a son. But the thing that David had done displeased the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'And David sent and inquired about the woman. And one said, “Is not this '
  - type: note
    content: '[1 Chr. 3:5]'
  - type: text
    content: 'Bathsheba, the daughter of Eliam, the wife of '
  - type: note
    content: ch. 23:39
  - type: text
    content: 'Uriah the Hittite?” '
  '4':
  - type: text
    content: So David sent messengers and took her, and she came to him, and he lay with her. (
  - type: note
    content: Lev. 15:19, 28; 18:19
  - type: text
    content: 'Now she had been purifying herself from her uncleanness.) Then she returned to her house. '
  '5':
  - type: text
    content: And the woman conceived, and she sent and told David, “I am pregnant.”
  '6':
  - type: text
    content: 'So David sent word to Joab, “Send me Uriah the Hittite.” And Joab sent Uriah to David. '
  '7':
  - type: text
    content: 'When Uriah came to him, David asked how Joab was doing and how the people were doing and how the war was going. '
  '8':
  - type: text
    content: 'Then David said to Uriah, “Go down to your house and '
  - type: note
    content: See Gen. 18:4
  - type: text
    content: 'wash your feet.” And Uriah went out of the king’s house, and there followed him a present from the king. '
  '9':
  - type: text
    content: 'But Uriah slept at the door of the king’s house with all the servants of his lord, and did not go down to his house. '
