      children:
      - type: text
        text: 1 Kgs. 1:33
      metadata:
        usfm: 1KI.1.33
    marker-yv: yv-n
  - type: text
    text: 'the servants of my lord are camping in the open field. Shall I then go to my house, to eat and to drink and to lie with my wife? As you live, and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Sam. 1:26
      metadata:
        usfm: 1SA.1.26
    marker-yv: yv-n
  - type: text
    text: 'as your soul lives, I will not do this thing.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then David said to Uriah, “Remain here today also, and tomorrow I will send you back.” So Uriah remained in Jerusalem that day and the next. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And David invited him, and he ate in his presence and drank, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 19:33
      metadata:
        usfm: GEN.19.33
    - type: text
