      children:
      - type: text
        text: '6'
      metadata:
        usfm: 2SA.7.6
    marker-yv: yv-n
  - type: text
    text: '“The ark and Israel and Judah dwell in booths, and my lord Joab and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
