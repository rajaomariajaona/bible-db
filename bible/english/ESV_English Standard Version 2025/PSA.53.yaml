document_id: PSA.53,59
type_code: eng
verses:
  '1':
  - type: heading
    content: There Is None Who Does Good
  - type: text
    content: 'To the choirmaster: according to '
  - type: note
    content: Ps. 88, title
  - type: text
    content: Mahalath. A Maskil
  - type: note
    content: Probably musical or liturgical terms
  - type: text
    content: ' of David.'
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see Ps. 14:1-7
  - type: text
    content: The fool says in his heart, “There is no God.”
  - type: text
    content: They are corrupt, doing abominable iniquity;
  - type: text
    content: there is none who does good.
  '2':
  - type: text
    content: God looks down from heaven
  - type: text
    content: on the children of man
  - type: text
    content: to see if there are any who understand,
  - type: note
    content: Or who act wisely
  - type: text
    content: who seek after God.
  '3':
  - type: text
    content: They have all fallen away;
  - type: text
    content: together they have become corrupt;
  - type: text
    content: there is none who does good,
  - type: text
    content: not even one.
  '4':
  - type: text
    content: Have those who work evil no knowledge,
  - type: text
    content: who eat up my people as they eat bread,
  - type: text
    content: and do not call upon God?
  '5':
  - type: text
    content: There they are, in great terror,
  - type: note
    content: '[ Lev. 26:17, 36; Prov. 28:1 ]'
  - type: text
    content: where there is no terror!
  - type: text
    content: 'For God '
  - type: note
    content: Ps. 89:10; 141:7; Jer. 8:1, 2; Ezek. 6:5
  - type: text
    content: scatters the bones of him who encamps against you;
  - type: text
    content: you put them to shame, for God has rejected them.
  '6':
  - type: text
    content: Oh, that salvation for Israel would come out of Zion!
  - type: text
    content: When God restores the fortunes of his people,
  - type: text
    content: let Jacob rejoice, let Israel be glad.
