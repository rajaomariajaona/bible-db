document_id: ZEC.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Give Salvation
  - type: text
    content: ' '
  - type: note
    content: See Nah. 1:1
  - type: text
    content: 'The oracle of the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Israel: Thus declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Isa. 42:5
  - type: text
    content: 'who stretched out the heavens and '
  - type: note
    content: Isa. 48:13
  - type: text
    content: 'founded the earth and '
  - type: note
    content: See Isa. 42:5
  - type: text
    content: 'formed the spirit of man within him: '
  '10':
  - type: text
    content: '“And '
  - type: note
    content: '[Jer. 31:9]'
  - type: text
    content: 'I will pour out on the house of David and the inhabitants of Jerusalem a spirit of grace and '
  - type: note
    content: '[Jer. 31:9]'
  - type: text
    content: 'pleas for mercy, so that, '
  - type: note
    content: Cited John 19:37; [Rev. 1:7]
  - type: text
    content: 'when they look on me, on him whom they have pierced, '
  - type: note
    content: Jer. 50:4
  - type: text
    content: 'they shall mourn for him, '
  - type: note
    content: Jer. 6:26; Amos 8:10
  - type: text
    content: 'as one mourns for an only child, and weep bitterly over him, as one weeps over a firstborn. '
  '11':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'On that day '
  - type: note
    content: '[Acts 2:37]'
  - type: text
    content: 'the mourning in Jerusalem will be as great '
  - type: note
    content: '[2 Chr. 35:24]'
  - type: text
    content: 'as the mourning for Hadad-rimmon in the plain of Megiddo. '
  '12':
  - type: text
    content: 'The land shall mourn, '
  - type: note
    content: '[ch. 7:3]'
  - type: text
    content: each family
  - type: note
    content: Or clan; throughout verses 12–14
  - type: text
    content: ' by itself: the family of the house of David by itself, and their wives by themselves; the family of the house of '
  - type: note
    content: 2 Sam. 5:14; Luke 3:31
  - type: text
    content: 'Nathan by itself, and their wives by themselves; '
  '13':
  - type: text
    content: 'the family of the house of Levi by itself, and their wives by themselves; the family of '
  - type: note
    content: Num. 3:18
  - type: text
    content: 'the Shimeites by itself, and their wives by themselves; '
  '14':
  - type: text
    content: and all the families that are left, each by itself, and their wives by themselves.
  '2':
  - type: text
    content: '“Behold, I am about to make Jerusalem '
  - type: note
    content: Isa. 51:17, 22, 23
  - type: text
    content: 'a cup of staggering to '
  - type: note
    content: '[ch. 14:2]'
  - type: text
    content: 'all the surrounding peoples. The siege of Jerusalem '
  - type: note
    content: '[ch. 14:14]'
  - type: text
    content: 'will also be against Judah. '
  '3':
  - type: note
    content: ch. 13:1, 2, 4; 14:4, 6, 8; Isa. 2:11
  - type: text
    content: 'On that day I will make Jerusalem a heavy stone for all the peoples. '
  - type: note
    content: '[Matt. 21:44; Luke 20:18]'
  - type: text
    content: 'All who lift it will surely hurt themselves. And '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'all the nations of the earth will gather against it. '
  '4':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'On that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ps. 76:6]'
  - type: text
    content: 'I will strike every horse '
  - type: note
    content: '[Deut. 28:28]'
  - type: text
    content: 'with panic, and its rider '
  - type: note
    content: '[Deut. 28:28]'
  - type: text
    content: 'with madness. But for the sake of the house of Judah I will keep my eyes open, when I strike every horse of the peoples '
  - type: note
    content: '[Deut. 28:28]'
  - type: text
    content: 'with blindness. '
  '5':
  - type: text
    content: 'Then the clans of Judah shall say to themselves, ‘The inhabitants of Jerusalem have strength through the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, their God.’'
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '“On that day I will make the clans of Judah '
  - type: note
    content: '[Jer. 5:14; Obad. 18]'
  - type: text
    content: 'like a blazing pot in the midst of wood, like a flaming torch among sheaves. And '
  - type: note
    content: ch. 9:15
  - type: text
    content: 'they shall devour to the right and to the left all the surrounding peoples, while '
  - type: note
    content: ch. 2:4; 14:10, 11
  - type: text
    content: Jerusalem shall again be inhabited in its place, in Jerusalem.
  '7':
  - type: text
    content: '“And the '
  - type: text
    content: Lord
  - type: text
    content: ' will give salvation to the tents of Judah first, that the glory of the house of David and the glory of the inhabitants of Jerusalem may not surpass that of Judah. '
  '8':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'On that day '
  - type: note
    content: ch. 9:15
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will protect the inhabitants of Jerusalem, so that '
  - type: note
    content: '[Isa. 60:22]'
  - type: text
    content: 'the feeblest among them on that day shall be like David, and the house of David shall be like God, '
  - type: note
    content: '[1 Sam. 29:9; 2 Sam. 14:17, 20; 19:27]'
  - type: text
    content: 'like the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', going before them. '
  '9':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'And on that day '
  - type: note
    content: '[ch. 14:3]'
  - type: text
    content: I will seek to destroy all the nations that come against Jerusalem.
  - type: heading
    content: Him Whom They Have Pierced
