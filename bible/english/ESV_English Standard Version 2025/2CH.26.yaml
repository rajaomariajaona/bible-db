document_id: 2CH.26,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Uzziah Reigns in Judah
  - type: text
    content: 'And all the people of Judah took Uzziah, who was sixteen years old, and made him king instead of his father Amaziah. '
  '10':
  - type: text
    content: 'And he built towers in the wilderness and '
  - type: note
    content: Deut. 6:11; Neh. 9:25
  - type: text
    content: 'cut out many cisterns, for he had large herds, both in the Shephelah and in the plain, and he had farmers and vinedressers in the hills and in the fertile lands, for he loved the soil. '
  '11':
  - type: text
    content: 'Moreover, Uzziah had an army of soldiers, fit for war, in divisions according to the numbers in the muster made by Jeiel the secretary and Maaseiah the officer, under the direction of Hananiah, one of the king’s commanders. '
  '12':
  - type: text
    content: 'The whole number of the heads of fathers’ houses of mighty men of valor was 2,600. '
  '13':
  - type: text
    content: 'Under their command was an army of '
  - type: note
    content: '[ch. 25:5]'
  - type: text
    content: '307,500, who could make war with mighty power, to help the king against the enemy. '
  '14':
  - type: text
    content: 'And Uzziah prepared for all the army shields, spears, helmets, '
  - type: note
    content: Neh. 4:16
  - type: text
    content: 'coats of mail, bows, and stones for slinging. '
  '15':
  - type: text
    content: In Jerusalem he made machines, invented by skillful men, to be on the towers and the corners, to shoot arrows and great stones. And his fame spread far, for he was marvelously helped, till he was strong.
  - type: heading
    content: Uzziah’s Pride and Punishment
  '16':
  - type: text
    content: 'But when '
  - type: note
    content: '[ch. 12:1; Deut. 32:15]'
  - type: text
    content: 'he was strong, '
  - type: note
    content: ch. 32:25; Ezek. 28:2, 5, 17; [ch. 25:19; Deut. 8:14; 2 Kgs. 14:10]
  - type: text
    content: 'he grew proud, to his destruction. For he was unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and entered the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to burn incense on the altar of incense. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: 1 Chr. 6:10
  - type: text
    content: 'Azariah the priest went in after him, with eighty priests of the '
  - type: text
    content: Lord
  - type: text
    content: ' who were men of valor, '
  '18':
  - type: text
    content: 'and they withstood King Uzziah and said to him, '
  - type: note
    content: Num. 16:40; 18:7
  - type: text
    content: '“It is not for you, Uzziah, to burn incense to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ex. 30:7, 8
  - type: text
    content: 'but for the priests, the sons of Aaron, who are consecrated to burn incense. Go out of the sanctuary, for you have done wrong, and it will bring you no honor from the '
  - type: text
    content: Lord
  - type: text
    content: ' God.” '
  '19':
  - type: text
    content: 'Then Uzziah was angry. Now he had a censer in his hand to burn incense, and when he became angry with the priests, '
  - type: note
    content: '[Ex. 4:6; Num. 12:10; 2 Kgs. 5:27]'
  - type: text
    content: leprosy
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' broke out on his forehead in the presence of the priests in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', by the altar of incense. '
  '2':
  - type: text
    content: 'He built Eloth and restored it to Judah, after the king slept with his fathers. '
  '20':
  - type: text
    content: 'And Azariah the chief priest and all the priests looked at him, and behold, he was leprous in his forehead! And they rushed him out quickly, and he himself hurried to go out, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck him. '
  '21':
  - type: note
    content: For ver. 21-23, see 2 Kgs. 15:5-7
  - type: text
    content: 'And King Uzziah was a leper to the day of his death, and being a leper lived '
  - type: note
    content: '[Lev. 13:46; Num. 5:2]'
  - type: text
    content: 'in a separate house, for he was excluded from the house of the '
  - type: text
    content: Lord
  - type: text
    content: . And Jotham his son was over the king’s household, governing the people of the land.
  '22':
  - type: text
    content: 'Now the rest of the acts of Uzziah, from first to last, '
  - type: note
    content: Isa. 1:1; 6:1
  - type: text
    content: 'Isaiah the prophet the son of Amoz wrote. '
  '23':
  - type: text
    content: And Uzziah slept with his fathers, and they buried him with his fathers in the burial field that belonged to the kings, for they said, “He is a leper.” And Jotham his son reigned in his place.
  '3':
  - type: text
    content: 'Uzziah was '
  - type: note
    content: For ver. 3, 4, see 2 Kgs. 15:2, 3
  - type: text
    content: 'sixteen years old when he began to reign, and he reigned fifty-two years in Jerusalem. His mother’s name was Jecoliah of Jerusalem. '
  '4':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to all that his father Amaziah had done. '
  '5':
  - type: text
    content: 'He set himself to seek God '
  - type: note
    content: '[ch. 24:2]'
  - type: text
    content: 'in the days of Zechariah, '
  - type: note
    content: '[Dan. 1:17; 10:1]'
  - type: text
    content: 'who instructed him in the fear of God, and as long as he sought the '
  - type: text
    content: Lord
  - type: text
    content: ', God made him prosper.'
  '6':
  - type: text
    content: 'He went out and '
  - type: note
    content: '[Isa. 14:29]'
  - type: text
    content: 'made war against the Philistines and broke through the wall of Gath and the wall of Jabneh and the wall of Ashdod, and he built cities in the territory of Ashdod and elsewhere among the Philistines. '
  '7':
  - type: text
    content: 'God helped him '
  - type: note
    content: ch. 21:16
  - type: text
    content: 'against the Philistines and against the Arabians who lived in Gurbaal and against the '
  - type: note
    content: '[ch. 20:1]'
  - type: text
    content: 'Meunites. '
  '8':
  - type: text
    content: 'The Ammonites '
  - type: note
    content: '[ch. 17:11; 2 Sam. 8:2]'
  - type: text
    content: 'paid tribute to Uzziah, and his fame spread even to the border of Egypt, for he became very strong. '
  '9':
  - type: text
    content: 'Moreover, Uzziah built towers in Jerusalem at '
  - type: note
    content: See 2 Kgs. 14:13
  - type: text
    content: 'the Corner Gate and at '
  - type: note
    content: Neh. 2:13, 15; 3:13
  - type: text
    content: 'the Valley Gate and at '
  - type: note
    content: Neh. 3:19
  - type: text
    content: 'the Angle, and fortified them. '
