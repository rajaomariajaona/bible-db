  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: In Jerusalem he made machines, invented by skillful men, to be on the towers and the corners, to shoot arrows and great stones. And his fame spread far, for he was marvelously helped, till he was strong.
