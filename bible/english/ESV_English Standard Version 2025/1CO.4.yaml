document_id: 1CO.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ministry of Apostles
  - type: text
    content: 'This is how one should regard us, as servants of Christ and '
  - type: note
    content: '[ch. 9:17]; See 1 Pet. 4:10'
  - type: text
    content: 'stewards of the mysteries of God. '
  '10':
  - type: note
    content: '[Acts 17:18]; See ch. 1:18; Acts 26:24'
  - type: text
    content: 'We are fools for Christ’s sake, but '
  - type: note
    content: 2 Cor. 11:19
  - type: text
    content: 'you are wise in Christ. '
  - type: note
    content: ch. 2:3; 2 Cor. 13:9
  - type: text
    content: 'We are weak, but you are strong. You are held in honor, but we in disrepute. '
  '11':
  - type: text
    content: 'To the present hour '
  - type: note
    content: Rom. 8:35; 2 Cor. 11:27; Phil. 4:12
  - type: text
    content: 'we hunger and thirst, we are poorly dressed and '
  - type: note
    content: 2 Cor. 11:20, 23
  - type: text
    content: 'buffeted and '
  - type: note
    content: '[Matt. 8:20]'
  - type: text
    content: 'homeless, '
  '12':
  - type: text
    content: 'and we '
  - type: note
    content: See Acts 18:3
  - type: text
    content: 'labor, working with our own hands. '
  - type: note
    content: See 1 Pet. 3:9
  - type: text
    content: 'When reviled, we bless; '
  - type: note
    content: See John 15:20
  - type: text
    content: 'when persecuted, we endure; '
  '13':
  - type: text
    content: 'when slandered, we entreat. '
  - type: note
    content: '[Isa. 30:22; 64:6]'
  - type: text
    content: 'We have become, and are still, like the scum of the world, '
  - type: note
    content: Lam. 3:45
  - type: text
    content: the refuse of all things.
  '14':
  - type: text
    content: 'I do not write these things '
  - type: note
    content: '[ch. 6:5; 15:34]'
  - type: text
    content: 'to make you ashamed, but to admonish you '
  - type: note
    content: 2 Cor. 6:13; 1 Thess. 2:11; 3 John 4
  - type: text
    content: 'as my beloved children. '
  '15':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 3:10]'
  - type: text
    content: though you have countless
  - type: note
    content: Greek you have ten thousand
  - type: text
    content: ' guides in Christ, you do not have many fathers. For '
  - type: note
    content: Philem. 10; [Gal. 4:19]
  - type: text
    content: 'I became your father in Christ Jesus through the gospel. '
  '16':
  - type: text
    content: 'I urge you, then, '
  - type: note
    content: ch. 11:1; Phil. 3:17; 1 Thess. 1:6; [Phil. 4:9; 2 Thess. 3:9]
  - type: text
    content: 'be imitators of me. '
  '17':
  - type: text
    content: 'That is why '
  - type: note
    content: ch. 16:10
  - type: text
    content: I sent
  - type: note
    content: Or am sending
  - type: text
    content: ' you Timothy, '
  - type: note
    content: 1 Tim. 1:2; 2 Tim. 1:2
  - type: text
    content: my beloved and faithful child in the Lord, to remind you of my ways in Christ,
  - type: note
    content: Some manuscripts add Jesus
  - type: text
    content: ' '
  - type: note
    content: ch. 7:17
  - type: text
    content: 'as I teach them everywhere in every church. '
  '18':
  - type: text
    content: 'Some are '
  - type: note
    content: See ver. 6
  - type: text
    content: 'arrogant, '
  - type: note
    content: ver. 21; [2 Cor. 10:2]
  - type: text
    content: 'as though I were not coming to you. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: ch. 11:34; 16:5, 6; Acts 19:21; 20:2; 2 Cor. 1:15, 16
  - type: text
    content: 'I will come to you soon, if the Lord wills, and I will find out not the talk of these arrogant people but their power. '
  '2':
  - type: text
    content: 'Moreover, it is required of stewards that they be found faithful. '
  '20':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 2:4
  - type: text
    content: 'the kingdom of God does not consist in talk but in power. '
  '21':
  - type: text
    content: 'What do you wish? '
  - type: note
    content: 2 Cor. 1:23; 2:1, 3; 12:20; 13:2, 10
  - type: text
    content: Shall I come to you with a rod, or with love in a spirit of gentleness?
  '3':
  - type: text
    content: 'But with me it is a very small thing that I should be judged by you or by any human court. In fact, I do not even judge myself. '
  '4':
  - type: note
    content: See Acts 23:1
  - type: text
    content: 'For I am not aware of anything against myself, '
  - type: note
    content: Job 9:2, 15; Ps. 130:3; 143:2; [1 John 3:21]
  - type: text
    content: 'but I am not thereby acquitted. It is the Lord who judges me. '
  '5':
  - type: text
    content: 'Therefore '
  - type: note
    content: Matt. 7:1; Rom. 2:1; [Matt. 13:29]
  - type: text
    content: 'do not pronounce judgment before the time, '
  - type: note
    content: See John 21:22; Rom. 2:16
  - type: text
    content: 'before the Lord comes, '
  - type: note
    content: ch. 3:13
  - type: text
    content: 'who will bring to light the things now hidden in darkness and will disclose the purposes of the heart. '
  - type: note
    content: 2 Cor. 10:18; See ch. 3:8
  - type: text
    content: Then each one will receive his commendation from God.
  '6':
  - type: text
    content: I have applied all these things to myself and Apollos for your benefit, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' that you may learn by us not to go beyond what is written, that none of you may '
  - type: note
    content: ver. 18, 19; ch. 5:2; 13:4
  - type: text
    content: 'be puffed up in favor of one against another. '
  '7':
  - type: text
    content: 'For who sees anything different in you? '
  - type: note
    content: John 3:27; [1 Chr. 29:14; James 1:17; 1 Pet. 4:10]
  - type: text
    content: What do you have that you did not receive? If then you received it, why do you boast as if you did not receive it?
  '8':
  - type: text
    content: 'Already you have all you want! Already you have become rich! Without us you have become kings! And would that you did reign, so that we might share the rule with you! '
  '9':
  - type: text
    content: 'For I think that God has exhibited us apostles as last of all, '
  - type: note
    content: See Rom. 8:36
  - type: text
    content: 'like men sentenced to death, because we '
  - type: note
    content: Heb. 10:33 (Gk.); [Isa. 20:3]
  - type: text
    content: 'have become a spectacle to the world, to angels, and to men. '
