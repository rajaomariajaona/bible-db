document_id: GAL.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Has Set Us Free
  - type: text
    content: 'For '
  - type: note
    content: ver. 13; ch. 2:4; See James 1:25
  - type: text
    content: 'freedom Christ has '
  - type: note
    content: See John 8:32
  - type: text
    content: 'set us free; '
  - type: note
    content: See 1 Cor. 16:13
  - type: text
    content: 'stand firm therefore, and do not submit again to '
  - type: note
    content: Acts 15:10
  - type: text
    content: 'a yoke of '
  - type: note
    content: See ch. 2:4
  - type: text
    content: slavery.
  '10':
  - type: note
    content: See 2 Cor. 2:3
  - type: text
    content: 'I have confidence in the Lord that you will '
  - type: note
    content: '[Phil. 3:15]'
  - type: text
    content: 'take no other view, and '
  - type: note
    content: ch. 1:7; [ver. 12]
  - type: text
    content: 'the one who is troubling you will bear the penalty, whoever he is. '
  '11':
  - type: text
    content: But if I, brothers,
  - type: note
    content: Or brothers and sisters; also verse 13
  - type: text
    content: ' still preach'
  - type: note
    content: Greek proclaim
  - type: text
    content: ' circumcision, '
  - type: note
    content: ch. 4:29; 6:12
  - type: text
    content: 'why am I still being persecuted? In that case '
  - type: note
    content: 1 Cor. 1:23; See 1 Pet. 2:8
  - type: text
    content: 'the offense of the cross has been removed. '
  '12':
  - type: text
    content: 'I wish '
  - type: note
    content: '[ver. 10]; See ch. 2:4'
  - type: text
    content: those who unsettle you would emasculate themselves!
  '13':
  - type: text
    content: 'For you were called to freedom, brothers. '
  - type: note
    content: 1 Pet. 2:16; Jude 4; [1 Cor. 8:9; 2 Pet. 2:19]
  - type: text
    content: 'Only do not use your freedom as an opportunity for the flesh, but through love '
  - type: note
    content: 1 Cor. 9:19
  - type: text
    content: 'serve one another. '
  '14':
  - type: text
    content: 'For '
  - type: note
    content: '[Matt. 7:12; 22:40]'
  - type: text
    content: 'the whole law is fulfilled in one word: '
  - type: note
    content: Cited from Lev. 19:18; [ver. 22; ch. 6:2]; See Matt. 19:19; John 13:34
  - type: text
    content: '“You shall love your neighbor as yourself.” '
  '15':
  - type: text
    content: 'But if you '
  - type: note
    content: '[Phil. 3:2]'
  - type: text
    content: bite and devour one another, watch out that you are not consumed by one another.
  - type: heading
    content: Keep in Step with the Spirit
  '16':
  - type: text
    content: 'But I say, '
  - type: note
    content: ver. 24, 25; Rom. 8:4; See Rom. 13:14
  - type: text
    content: 'walk by the Spirit, and you will not gratify '
  - type: note
    content: Eph. 2:3
  - type: text
    content: 'the desires of the flesh. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: Rom. 7:23; 8:5-7
  - type: text
    content: 'the desires of the flesh are against the Spirit, and the desires of the Spirit are against the flesh, for these are opposed to each other, '
  - type: note
    content: Rom. 7:15, 18, 19
  - type: text
    content: 'to keep you from doing the things you want to do. '
  '18':
  - type: text
    content: 'But if you are '
  - type: note
    content: Rom. 8:14
  - type: text
    content: 'led by the Spirit, '
  - type: note
    content: See Rom. 7:4
  - type: text
    content: 'you are not under the law. '
  '19':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Cor. 3:3; Eph. 5:3; Col. 3:5; James 3:14, 15; [Matt. 15:18-20]
  - type: text
    content: 'the works of the flesh are evident: sexual immorality, impurity, sensuality, '
  '2':
  - type: text
    content: 'Look: I, Paul, say to you that '
  - type: note
    content: ver. 3, 11; Acts 15:1; 1 Cor. 7:18
  - type: text
    content: 'if you accept circumcision, '
  - type: note
    content: See ch. 4:11
  - type: text
    content: 'Christ will be of no advantage to you. '
  '20':
  - type: text
    content: 'idolatry, sorcery, enmity, strife, jealousy, fits of anger, rivalries, dissensions, '
  - type: note
    content: 1 Cor. 11:19
  - type: text
    content: 'divisions, '
  '21':
  - type: text
    content: envy,
  - type: note
    content: Some manuscripts add murder
  - type: text
    content: ' drunkenness, orgies, and things like these. I warn you, as I warned you before, that '
  - type: note
    content: '[Col. 3:6]; See 1 Cor. 6:9'
  - type: text
    content: those who do
  - type: note
    content: Or make a practice of doing
  - type: text
    content: ' such things will not inherit the kingdom of God. '
  '22':
  - type: text
    content: 'But '
  - type: note
    content: '[Rom. 7:4; 8:5; Eph. 5:9]'
  - type: text
    content: 'the fruit of the Spirit is '
  - type: note
    content: See Rom. 5:1-5; Col. 3:12-17
  - type: text
    content: 'love, joy, peace, patience, '
  - type: note
    content: 2 Cor. 6:6
  - type: text
    content: 'kindness, goodness, faithfulness, '
  '23':
  - type: note
    content: Eph. 4:2
  - type: text
    content: 'gentleness, '
  - type: note
    content: Acts 24:25
  - type: text
    content: 'self-control; '
  - type: note
    content: 1 Tim. 1:9
  - type: text
    content: 'against such things there is no law. '
  '24':
  - type: text
    content: 'And those who belong to Christ Jesus '
  - type: note
    content: '[ver. 16]; See Rom. 6:6'
  - type: text
    content: 'have crucified the flesh with its '
  - type: note
    content: Rom. 7:5
  - type: text
    content: passions and desires.
  '25':
  - type: text
    content: 'If we live by the Spirit, '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'let us also keep in step with the Spirit. '
  '26':
  - type: note
    content: Phil. 2:3
  - type: text
    content: Let us not become conceited, provoking one another, envying one another.
  '3':
  - type: text
    content: 'I testify again to every man who accepts circumcision that '
  - type: note
    content: Rom. 2:25
  - type: text
    content: 'he is obligated to keep the whole law. '
  '4':
  - type: text
    content: 'You are '
  - type: note
    content: Rom. 7:6 (Gk.)
  - type: text
    content: 'severed from Christ, '
  - type: note
    content: '[ch. 2:21; 3:10; Rom. 9:31, 32]'
  - type: text
    content: you who would be justified
  - type: note
    content: Or counted righteous
  - type: text
    content: ' by the law; '
  - type: note
    content: '[Heb. 12:15; 2 Pet. 3:17]'
  - type: text
    content: 'you have fallen away from grace. '
  '5':
  - type: text
    content: 'For through the Spirit, by faith, we ourselves eagerly '
  - type: note
    content: See Rom. 8:23, 25
  - type: text
    content: 'wait for the hope of righteousness. '
  '6':
  - type: text
    content: 'For in Christ Jesus '
  - type: note
    content: ch. 6:15; 1 Cor. 7:19; Col. 3:11; See ch. 3:28
  - type: text
    content: 'neither circumcision nor uncircumcision counts for anything, but '
  - type: note
    content: '[Eph. 6:23; 1 Thess. 1:3; James 2:18, 20, 22]'
  - type: text
    content: only faith working through love.
  '7':
  - type: text
    content: ' '
  - type: note
    content: See 1 Cor. 9:24
  - type: text
    content: 'You were running well. Who hindered you from obeying '
  - type: note
    content: See ch. 2:5
  - type: text
    content: 'the truth? '
  '8':
  - type: text
    content: 'This persuasion is not from '
  - type: note
    content: ch. 1:6
  - type: text
    content: 'him who calls you. '
  '9':
  - type: note
    content: 1 Cor. 5:6; [1 Cor. 15:33; Heb. 12:15]
  - type: text
    content: 'A little leaven leavens the whole lump. '
