document_id: EST.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Prepares a Banquet
  - type: text
    content: ' '
  - type: note
    content: '[ch. 4:16 ]'
  - type: text
    content: 'On the third day Esther put on her royal robes and stood in '
  - type: note
    content: ch. 4:11; [ch. 6:4]
  - type: text
    content: 'the inner court of the king’s palace, in front of the king’s quarters, while the king was sitting on his royal throne inside the throne room opposite the entrance to the palace. '
  '10':
  - type: text
    content: 'Nevertheless, Haman restrained himself and went home, and he sent and brought his friends and '
  - type: note
    content: ch. 6:13
  - type: text
    content: 'his wife Zeresh. '
  '11':
  - type: text
    content: 'And Haman recounted to them the splendor of his riches, '
  - type: note
    content: See ch. 9:7-10
  - type: text
    content: 'the number of his sons, all the promotions with which '
  - type: note
    content: ch. 3:1
  - type: text
    content: 'the king had honored him, and how he had advanced him above the officials and the servants of the king. '
  '12':
  - type: text
    content: 'Then Haman said, “Even Queen Esther let no one but me come with the king to the feast she prepared. And tomorrow also I am invited by her together with the king. '
  '13':
  - type: text
    content: 'Yet all this is worth nothing to me, so long as I see Mordecai the Jew sitting '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'at the king’s gate.” '
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'his wife Zeresh and all his friends said to him, '
  - type: note
    content: ch. 6:4; 7:9, 10; [ch. 8:7; 9:13, 25]
  - type: text
    content: “Let a gallows
  - type: note
    content: Or wooden beam; twice in this verse (see note on 2:23)
  - type: text
    content: ' fifty cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' high be made, and in the morning tell the king to have Mordecai hanged upon it. Then go joyfully with the king to the feast.” This idea pleased Haman, and he had the gallows made.'
  '2':
  - type: text
    content: 'And when the king saw Queen Esther standing in the court, '
  - type: note
    content: '[ch. 2:9]'
  - type: text
    content: 'she won favor in his sight, '
  - type: note
    content: ch. 4:11; 8:4
  - type: text
    content: 'and he held out to Esther the golden scepter that was in his hand. Then Esther approached and touched the tip of the scepter. '
  '3':
  - type: text
    content: 'And the king said to her, “What is it, Queen Esther? What is your request? It shall be given you, even '
  - type: note
    content: ch. 7:2; [Mark 6:23]
  - type: text
    content: 'to the half of my kingdom.” '
  '4':
  - type: text
    content: And Esther said, “If it please the king,
  - type: note
    content: Hebrew If it is good to the king
  - type: text
    content: ' let the king and Haman come today to a feast that I have prepared for the king.” '
  '5':
  - type: text
    content: 'Then the king said, “Bring Haman quickly, so that we may do as Esther has asked.” So the king and Haman came to the feast that Esther had prepared. '
  '6':
  - type: note
    content: ch. 7:2
  - type: text
    content: 'And as they were drinking wine after the feast, the king said to Esther, '
  - type: note
    content: ver. 3; ch. 7:2; 9:12
  - type: text
    content: '“What is your wish? It shall be granted you. And what is your request? '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: Even to the half of my kingdom, it shall be fulfilled.”
  - type: note
    content: Or done
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then Esther answered, “My wish and my request is: '
  '8':
  - type: note
    content: ch. 7:3; 8:5
  - type: text
    content: If I have found favor in the sight of the king, and if it please the king
  - type: note
    content: Hebrew if it is good to the king
  - type: text
    content: ' to grant my wish and fulfill my request, let the king and Haman come to '
  - type: note
    content: ch. 6:14
  - type: text
    content: the feast that I will prepare for them, and tomorrow I will do as the king has said.”
  - type: heading
    content: Haman Plans to Hang Mordecai
  '9':
  - type: text
    content: 'And Haman went out that day '
  - type: note
    content: 1 Kgs. 8:66
  - type: text
    content: 'joyful and glad of heart. But when Haman saw Mordecai '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'in the king’s gate, '
  - type: note
    content: ch. 3:5
  - type: text
    content: 'that he neither rose nor trembled before him, he was filled with wrath against Mordecai. '
