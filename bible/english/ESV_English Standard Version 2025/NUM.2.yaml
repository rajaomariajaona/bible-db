document_id: NUM.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Arrangement of the Camp
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: '“On the south side shall be the standard of the camp of Reuben by their companies, the chief of the people of Reuben being Elizur the son of Shedeur, '
  '11':
  - type: text
    content: 'his company as listed being 46,500. '
  '12':
  - type: text
    content: 'And those to camp next to him shall be the tribe of Simeon, the chief of the people of Simeon being Shelumiel the son of Zurishaddai, '
  '13':
  - type: text
    content: 'his company as listed being 59,300. '
  '14':
  - type: text
    content: 'Then the tribe of Gad, the chief of the people of Gad being Eliasaph the son of '
  - type: note
    content: '[ch. 7:42, 47; 10:20]'
  - type: text
    content: 'Reuel, '
  '15':
  - type: text
    content: 'his company as listed being 45,650. '
  '16':
  - type: text
    content: 'All those listed of the camp of Reuben, by their companies, were 151,450. '
  - type: note
    content: ch. 10:18-20
  - type: text
    content: They shall set out second.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:17, 21
  - type: text
    content: “Then the tent of meeting shall set out, with the camp of the Levites in the midst of the camps; as they camp, so shall they set out, each in position, standard by standard.
  '18':
  - type: text
    content: '“On the west side shall be the standard of the camp of Ephraim by their companies, the chief of the people of Ephraim being Elishama the son of Ammihud, '
  '19':
  - type: text
    content: 'his company as listed being 40,500. '
  '2':
  - type: note
    content: ch. 1:52
  - type: text
    content: '“The people of Israel shall camp each by his own standard, with the banners of their fathers’ houses. They shall camp facing the tent of meeting on every side. '
  '20':
  - type: text
    content: 'And next to him shall be the tribe of Manasseh, the chief of the people of Manasseh being Gamaliel the son of Pedahzur, '
  '21':
  - type: text
    content: 'his company as listed being 32,200. '
  '22':
  - type: text
    content: 'Then the tribe of Benjamin, the chief of the people of Benjamin being Abidan the son of Gideoni, '
  '23':
  - type: text
    content: 'his company as listed being 35,400. '
  '24':
  - type: text
    content: 'All those listed of the camp of Ephraim, by their companies, were 108,100. '
  - type: note
    content: ch. 10:22-24; [Ps. 80:2]
  - type: text
    content: They shall set out third on the march.
  '25':
  - type: text
    content: '“On the north side shall be the standard of the camp of Dan by their companies, the chief of the people of Dan being Ahiezer the son of Ammishaddai, '
  '26':
  - type: text
    content: 'his company as listed being 62,700. '
  '27':
  - type: text
    content: 'And those to camp next to him shall be the tribe of Asher, the chief of the people of Asher being Pagiel the son of Ochran, '
  '28':
  - type: text
    content: 'his company as listed being 41,500. '
  '29':
  - type: text
    content: 'Then the tribe of Naphtali, the chief of the people of Naphtali being Ahira the son of Enan, '
  '3':
  - type: text
    content: 'Those to camp on the east side toward the sunrise shall be of the standard of the camp of Judah by their companies, the chief of the people of Judah being '
  - type: note
    content: See Ex. 6:23
  - type: text
    content: 'Nahshon the son of Amminadab, '
  '30':
  - type: text
    content: 'his company as listed being 53,400. '
  '31':
  - type: text
    content: 'All those listed of the camp of Dan were 157,600. '
  - type: note
    content: ch. 10:25-27
  - type: text
    content: They shall set out last, standard by standard.”
  '32':
  - type: text
    content: 'These are the people of Israel as listed by their fathers’ houses. All those listed in the camps by their companies were '
  - type: note
    content: See ch. 1:46
  - type: text
    content: '603,550. '
  '33':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 1:47
  - type: text
    content: 'the Levites were not listed among the people of Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '34':
  - type: text
    content: 'Thus did the people of Israel. According to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, '
  - type: note
    content: '[ch. 24:2, 5, 6]'
  - type: text
    content: so they camped by their standards, and so they set out, each one in his clan, according to his fathers’ house.
  '4':
  - type: text
    content: 'his company as listed being 74,600. '
  '5':
  - type: text
    content: 'Those to camp next to him shall be the tribe of Issachar, the chief of the people of Issachar being Nethanel the son of Zuar, '
  '6':
  - type: text
    content: 'his company as listed being 54,400. '
  '7':
  - type: text
    content: 'Then the tribe of Zebulun, the chief of the people of Zebulun being Eliab the son of Helon, '
  '8':
  - type: text
    content: 'his company as listed being 57,400. '
  '9':
  - type: text
    content: 'All those listed of the camp of Judah, by their companies, were 186,400. '
  - type: note
    content: ch. 10:14-16
  - type: text
    content: They shall set out first on the march.
