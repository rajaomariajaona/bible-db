document_id: PSA.47,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God Is King over All the Earth
  - type: text
    content: 'To the choirmaster. A Psalm of '
  - type: note
    content: Ps. 42, title
  - type: text
    content: the Sons of Korah.
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 11:12; Isa. 55:12; Nah. 3:19
  - type: text
    content: Clap your hands, all peoples!
  - type: note
    content: Ps. 95:1; [ 1 Sam. 10:24 ]
  - type: text
    content: Shout to God with loud songs of joy!
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ', the Most High, '
  - type: note
    content: Ps. 66:3, 5; 68:35; Deut. 7:21
  - type: text
    content: is to be feared,
  - type: note
    content: Mal. 1:14
  - type: text
    content: a great king over all the earth.
  '3':
  - type: text
    content: 'He '
  - type: note
    content: See Ps. 18:47
  - type: text
    content: subdued peoples under us,
  - type: text
    content: and nations under our feet.
  '4':
  - type: text
    content: 'He chose our '
  - type: note
    content: Ps. 2:8; [1 Pet. 1:4]
  - type: text
    content: heritage for us,
  - type: note
    content: Amos 6:8; 8:7; Nah. 2:2
  - type: text
    content: 'the pride of Jacob whom he loves. '
  - type: text
    content: Selah
  '5':
  - type: text
    content: 'God '
  - type: note
    content: 2 Sam. 6:15; [Ps. 68:18]
  - type: text
    content: has gone up with a shout,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' with the sound of a trumpet.'
  '6':
  - type: text
    content: Sing praises to God, sing praises!
  - type: text
    content: Sing praises to our King, sing praises!
  '7':
  - type: text
    content: 'For God is '
  - type: note
    content: Zech. 14:9
  - type: text
    content: the King of all the earth;
  - type: text
    content: 'sing praises '
  - type: note
    content: 1 Cor. 14:15
  - type: text
    content: with a psalm!
  - type: note
    content: Hebrew maskil
  '8':
  - type: text
    content: 'God '
  - type: note
    content: Ps. 22:28; 1 Chr. 16:31
  - type: text
    content: reigns over the nations;
  - type: text
    content: God sits on his holy throne.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 72:11; Isa. 49:7, 23 ]'
  - type: text
    content: The princes of the peoples gather
  - type: text
    content: as the people of the God of Abraham.
  - type: text
    content: 'For '
  - type: note
    content: Ps. 89:18
  - type: text
    content: the shields of the earth belong to God;
  - type: text
    content: he is highly exalted!
