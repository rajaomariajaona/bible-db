document_id: NUM.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings for the Feast of Trumpets
  - type: text
    content: '“On the first day of the seventh month you shall have a holy convocation. You shall not do any ordinary work. '
  - type: note
    content: Lev. 23:24; See ch. 10:1-10
  - type: text
    content: 'It is a day for you to blow the trumpets, '
  '10':
  - type: text
    content: 'a tenth for each of the seven lambs: '
  '11':
  - type: text
    content: 'also '
  - type: note
    content: See ch. 28:15
  - type: text
    content: 'one male goat for a sin offering, besides '
  - type: note
    content: Lev. 16:3, 5
  - type: text
    content: the sin offering of atonement, and the regular burnt offering and its grain offering, and their drink offerings.
  - type: heading
    content: Offerings for the Feast of Booths
  '12':
  - type: text
    content: ' '
  - type: note
    content: See Lev. 23:34
  - type: text
    content: '“On the fifteenth day of the seventh month you shall have a holy convocation. You shall not do any ordinary work, and you shall keep a feast to the '
  - type: text
    content: Lord
  - type: text
    content: ' seven days. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Ezra 3:4
  - type: text
    content: 'you shall offer a burnt offering, a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', thirteen bulls from the herd, two rams, fourteen male lambs a year old; they shall be without blemish; '
  '14':
  - type: text
    content: 'and their grain offering of fine flour mixed with oil, three tenths of an ephah for each of the thirteen bulls, two tenths for each of the two rams, '
  '15':
  - type: text
    content: 'and a tenth for each of the fourteen lambs; '
  '16':
  - type: text
    content: also one male goat for a sin offering, besides the regular burnt offering, its grain offering and its drink offering.
  '17':
  - type: text
    content: '“On the second day twelve bulls from the herd, two rams, fourteen male lambs a year old without blemish, '
  '18':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, '
  - type: note
    content: ver. 21, 24, 27, 30, 33, 37; ch. 15:12; 28:7, 14
  - type: text
    content: 'in the prescribed quantities; '
  '19':
  - type: text
    content: also one male goat for a sin offering, besides the regular burnt offering and its grain offering, and their drink offerings.
  '2':
  - type: text
    content: 'and you shall offer a burnt offering, for a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ': one bull from the herd, one ram, seven male lambs a year old without blemish; '
  '20':
  - type: text
    content: '“On the third day eleven bulls, two rams, fourteen male lambs a year old without blemish, '
  '21':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, in the prescribed quantities; '
  '22':
  - type: text
    content: also one male goat for a sin offering, besides the regular burnt offering and its grain offering and its drink offering.
  '23':
  - type: text
    content: '“On the fourth day ten bulls, two rams, fourteen male lambs a year old without blemish, '
  '24':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, in the prescribed quantities; '
  '25':
  - type: text
    content: also one male goat for a sin offering, besides the regular burnt offering, its grain offering and its drink offering.
  '26':
  - type: text
    content: '“On the fifth day nine bulls, two rams, fourteen male lambs a year old without blemish, '
  '27':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, in the prescribed quantities; '
  '28':
  - type: text
    content: also one male goat for a sin offering; besides the regular burnt offering and its grain offering and its drink offering.
  '29':
  - type: text
    content: '“On the sixth day eight bulls, two rams, fourteen male lambs a year old without blemish, '
  '3':
  - type: text
    content: also their grain offering of fine flour mixed with oil, three tenths of an ephah
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  - type: text
    content: ' for the bull, two tenths for the ram, '
  '30':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, in the prescribed quantities; '
  '31':
  - type: text
    content: also one male goat for a sin offering; besides the regular burnt offering, its grain offering, and its drink offerings.
  '32':
  - type: text
    content: '“On the seventh day seven bulls, two rams, fourteen male lambs a year old without blemish, '
  '33':
  - type: text
    content: 'with the grain offering and the drink offerings for the bulls, for the rams, and for the lambs, in the prescribed quantities; '
  '34':
  - type: text
    content: also one male goat for a sin offering; besides the regular burnt offering, its grain offering, and its drink offering.
  '35':
  - type: text
    content: ' '
  - type: note
    content: '[ John 7:37 ]'
  - type: text
    content: '“On the eighth day you shall have a '
  - type: note
    content: See Lev. 23:36
  - type: text
    content: 'solemn assembly. You shall not do any ordinary work, '
  '36':
  - type: text
    content: 'but you shall offer a burnt offering, a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ': one bull, one ram, seven male lambs a year old without blemish, '
  '37':
  - type: text
    content: 'and the grain offering and the drink offerings for the bull, for the ram, and for the lambs, in the prescribed quantities; '
  '38':
  - type: text
    content: also one male goat for a sin offering; besides the regular burnt offering and its grain offering and its drink offering.
  '39':
  - type: text
    content: '“These you shall offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' at your '
  - type: note
    content: Lev. 23:2, 4; 1 Chr. 23:31; 2 Chr. 31:3; Ezra 3:5; Neh. 10:33; [Isa. 1:14]
  - type: text
    content: 'appointed feasts, in addition to your '
  - type: note
    content: Lev. 7:11, 16; 22:21, 23
  - type: text
    content: vow offerings and your freewill offerings, for your burnt offerings, and for your grain offerings, and for your drink offerings, and for your peace offerings.”
  '4':
  - type: text
    content: 'and one tenth for each of the seven lambs; '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Ch 30:1 in Hebrew
  - type: text
    content: 'So Moses told the people of Israel everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '5':
  - type: text
    content: 'with '
  - type: note
    content: '[See ch. 28:30 above]'
  - type: text
    content: 'one male goat for a sin offering, to make atonement for you; '
  '6':
  - type: text
    content: 'besides '
  - type: note
    content: See ch. 28:11-15
  - type: text
    content: 'the burnt offering of the new moon, and its grain offering, and '
  - type: note
    content: See ch. 28:3-8
  - type: text
    content: 'the regular burnt offering and its grain offering, and their drink offering, according to the rule for them, for a pleasing aroma, a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Offerings for the Day of Atonement
  '7':
  - type: text
    content: ' '
  - type: note
    content: Lev. 16:29; 23:27
  - type: text
    content: '“On the tenth day of this seventh month you shall have a holy convocation and '
  - type: note
    content: ch. 30:13; Ps. 35:13; Isa. 58:5
  - type: text
    content: afflict yourselves.
  - type: note
    content: Or and fast
  - type: text
    content: ' You shall do no work, '
  '8':
  - type: text
    content: 'but you shall offer a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', a pleasing aroma: one bull from the herd, one ram, seven male lambs a year old: '
  - type: note
    content: ver. 13, 17, 20, 23, 26, 29, 32, 36; See ch. 28:19
  - type: text
    content: 'see that they are without blemish. '
  '9':
  - type: text
    content: 'And their grain offering shall be of fine flour mixed with oil, three tenths of an ephah for the bull, two tenths for the one ram, '
