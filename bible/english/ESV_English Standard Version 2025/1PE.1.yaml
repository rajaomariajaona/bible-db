document_id: 1PE.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Peter, an apostle of Jesus Christ,
  - type: text
    content: 'To those who are elect exiles of '
  - type: note
    content: See James 1:1
  - type: text
    content: 'the Dispersion in Pontus, Galatia, Cappadocia, Asia, and Bithynia, '
  '10':
  - type: text
    content: 'Concerning this salvation, '
  - type: note
    content: 2 Pet. 1:19; [Dan. 8:15; Matt. 13:17; Luke 10:24]
  - type: text
    content: 'the prophets who prophesied about the grace that was to be yours searched and inquired carefully, '
  '11':
  - type: text
    content: 'inquiring '
  - type: note
    content: Dan. 9:24-26
  - type: text
    content: what person or time
  - type: note
    content: Or what time or circumstances
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:9; [2 Pet. 1:21]; See Acts 16:7
  - type: text
    content: 'the Spirit of Christ in them was indicating '
  - type: note
    content: See Matt. 26:24
  - type: text
    content: 'when he predicted '
  - type: note
    content: Isa. 52:13–53:12; Luke 24:26; Acts 3:18
  - type: text
    content: 'the sufferings of Christ and the subsequent glories. '
  '12':
  - type: note
    content: Dan. 12:4, 9, 13
  - type: text
    content: 'It was revealed to them that '
  - type: note
    content: '[Matt. 13:17; Heb. 11:39, 40]'
  - type: text
    content: 'they were serving not themselves but you, in the things that have now been announced to you through those who preached the good news to you '
  - type: note
    content: Acts 2:2-4
  - type: text
    content: 'by the Holy Spirit sent from heaven, '
  - type: note
    content: '[Dan. 8:13; 12:5-7; Eph. 3:10]'
  - type: text
    content: things into which angels long to look.
  - type: heading
    content: Called to Be Holy
  '13':
  - type: text
    content: 'Therefore, '
  - type: note
    content: See Luke 12:35
  - type: text
    content: preparing your minds for action,
  - type: note
    content: Greek girding up the loins of your mind
  - type: text
    content: ' and '
  - type: note
    content: ch. 4:7; 5:8; 1 Thess. 5:6, 8; 2 Tim. 4:5
  - type: text
    content: 'being sober-minded, set your hope fully on the grace that will be brought to you at the revelation of Jesus Christ. '
  '14':
  - type: text
    content: 'As obedient children, '
  - type: note
    content: ch. 4:2, 3; Rom. 12:2; Titus 3:3
  - type: text
    content: 'do not be conformed to the passions '
  - type: note
    content: Acts 17:30
  - type: text
    content: 'of your former ignorance, '
  '15':
  - type: text
    content: 'but '
  - type: note
    content: 1 John 3:3; [2 Cor. 7:1; 1 Thess. 4:7; Heb. 12:14]
  - type: text
    content: 'as he who called you is holy, you also be holy '
  - type: note
    content: James 3:13
  - type: text
    content: 'in all your conduct, '
  '16':
  - type: text
    content: 'since it is written, '
  - type: note
    content: Cited from Lev. 11:44
  - type: text
    content: '“You shall be holy, for I am holy.” '
  '17':
  - type: text
    content: 'And if you '
  - type: note
    content: Jer. 3:19; Mal. 1:6; 2 Cor. 6:18; [Matt. 6:9]
  - type: text
    content: 'call on him as Father who '
  - type: note
    content: See Ps. 62:12
  - type: text
    content: 'judges '
  - type: note
    content: See James 2:1
  - type: text
    content: 'impartially according to each one’s deeds, conduct yourselves '
  - type: note
    content: ch. 3:15; 2 Cor. 7:1; [Rom. 11:20]
  - type: text
    content: 'with fear throughout the time of your exile, '
  '18':
  - type: text
    content: 'knowing that you '
  - type: note
    content: '[Ps. 49:8; 130:8; 1 Cor. 6:20; Titus 2:14; 2 Pet. 2:1]'
  - type: text
    content: 'were ransomed from '
  - type: note
    content: See Eph. 4:17
  - type: text
    content: 'the futile ways inherited from your forefathers, not with perishable things such as silver or gold, '
  '19':
  - type: text
    content: 'but '
  - type: note
    content: See Acts 20:28
  - type: text
    content: 'with the precious blood of Christ, like that of '
  - type: note
    content: See John 1:29
  - type: text
    content: 'a lamb '
  - type: note
    content: Heb. 9:14; [Ex. 12:5]
  - type: text
    content: 'without blemish or spot. '
  '2':
  - type: text
    content: 'according to '
  - type: note
    content: Acts 2:23; [Rom. 8:29; 11:2]
  - type: text
    content: 'the foreknowledge of God the Father, '
  - type: note
    content: See 1 Thess. 4:3
  - type: text
    content: 'in the sanctification of the Spirit, for obedience to Jesus Christ and '
  - type: note
    content: Heb. 10:22; 12:24
  - type: text
    content: 'for sprinkling with his blood:'
  - type: text
    content: 'May '
  - type: note
    content: 2 Pet. 1:2
  - type: text
    content: 'grace and '
  - type: note
    content: Dan. 4:1; Jude 2
  - type: text
    content: peace be multiplied to you.
  - type: heading
    content: Born Again to a Living Hope
  '20':
  - type: text
    content: 'He was foreknown before the foundation of the world but '
  - type: note
    content: See Rom. 16:26
  - type: text
    content: 'was made manifest '
  - type: note
    content: Heb. 1:2
  - type: text
    content: 'in the last times for the sake of you '
  '21':
  - type: note
    content: John 12:44
  - type: text
    content: 'who through him are believers in God, '
  - type: note
    content: '[Rom. 10:9]; See Acts 2:24'
  - type: text
    content: 'who raised him from the dead and '
  - type: note
    content: Acts 3:13; Heb. 2:9; [ch. 3:22]; See John 7:39
  - type: text
    content: gave him glory, so that your faith and hope are in God.
  '22':
  - type: text
    content: 'Having purified your souls by your obedience to the truth for '
  - type: note
    content: Rom. 12:9; See Heb. 13:1
  - type: text
    content: 'a sincere brotherly love, '
  - type: note
    content: 1 Tim. 1:5
  - type: text
    content: 'love one another earnestly from a pure heart, '
  '23':
  - type: note
    content: ver. 3; [John 3:3; James 1:18]
  - type: text
    content: 'since you have been born again, '
  - type: note
    content: John 1:13
  - type: text
    content: 'not of perishable seed but of imperishable, through '
  - type: note
    content: Heb. 4:12
  - type: text
    content: 'the living and abiding word of God; '
  '24':
  - type: text
    content: for
  - type: note
    content: James 1:10, 11; Cited from Isa. 40:6, 8
  - type: text
    content: “All flesh is like grass
  - type: text
    content: and all its glory like the flower of grass.
  - type: text
    content: The grass withers,
  - type: text
    content: and the flower falls,
  '25':
  - type: text
    content: ' '
  - type: note
    content: '[ Matt. 24:35 ]'
  - type: text
    content: but the word of the Lord remains forever.”
  - type: text
    content: 'And this word '
  - type: note
    content: Isa. 40:9
  - type: text
    content: is the good news that was preached to you.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 1:3; Eph. 1:3
  - type: text
    content: 'Blessed be the God and Father of our Lord Jesus Christ! '
  - type: note
    content: Titus 3:5
  - type: text
    content: 'According to his great mercy, '
  - type: note
    content: ver. 23
  - type: text
    content: 'he has caused us to be born again to a living hope '
  - type: note
    content: ch. 3:21; [1 Cor. 15:20]
  - type: text
    content: 'through the resurrection of Jesus Christ from the dead, '
  '4':
  - type: text
    content: 'to '
  - type: note
    content: Rom. 8:17
  - type: text
    content: 'an inheritance that is imperishable, undefiled, and '
  - type: note
    content: '[ch. 5:4]'
  - type: text
    content: 'unfading, '
  - type: note
    content: '[Col. 1:5; 2 Tim. 4:8]'
  - type: text
    content: 'kept in heaven for you, '
  '5':
  - type: text
    content: 'who by God’s power are being guarded '
  - type: note
    content: Eph. 2:8
  - type: text
    content: 'through faith for a salvation '
  - type: note
    content: '[ch. 5:10; Rom. 8:18; 2 Cor. 4:17; Heb. 12:11]'
  - type: text
    content: 'ready to be revealed in the last time. '
  '6':
  - type: text
    content: 'In this you rejoice, though now for a little while, if necessary, you have been grieved by '
  - type: note
    content: James 1:2; [ch. 4:12]
  - type: text
    content: 'various trials, '
  '7':
  - type: text
    content: 'so that '
  - type: note
    content: James 1:3
  - type: text
    content: 'the tested genuineness of your faith—more precious than gold that perishes '
  - type: note
    content: Job 23:10; Ps. 66:10; Prov. 17:3; Isa. 48:10
  - type: text
    content: 'though it is tested by '
  - type: note
    content: 1 Cor. 3:13
  - type: text
    content: 'fire—may be found to result in '
  - type: note
    content: Rom. 2:7, 10; 1 Cor. 4:5; [2 Thess. 1:7-12]
  - type: text
    content: 'praise and glory and honor at the revelation of Jesus Christ. '
  '8':
  - type: note
    content: '[1 John 4:20]'
  - type: text
    content: 'Though you have not seen him, you love him. '
  - type: note
    content: '[Heb. 11:27]; See John 20:29'
  - type: text
    content: 'Though you do not now see him, you believe in him and rejoice with joy that is inexpressible and filled with glory, '
  '9':
  - type: text
    content: 'obtaining '
  - type: note
    content: Rom. 6:22
  - type: text
    content: the outcome of your faith, the salvation of your souls.
