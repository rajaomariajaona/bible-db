document_id: DEU.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws Concerning Cities of Refuge
  - type: text
    content: '“When '
  - type: note
    content: ch. 12:29
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God cuts off the nations whose land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, and you dispossess them and dwell in their cities and in their houses, '
  '10':
  - type: text
    content: 'lest innocent blood be shed in your land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance, and so the guilt of bloodshed be upon you.'
  '11':
  - type: text
    content: '“But if anyone hates his neighbor and lies in wait for him and attacks him '
  - type: note
    content: ch. 27:24; Ex. 21:12, 14; See Num. 35:16-21
  - type: text
    content: 'and strikes him fatally so that he dies, and he flees into one of these cities, '
  '12':
  - type: text
    content: 'then the elders of his city shall send and take him from there, and hand him over to the avenger of blood, so that he may die. '
  '13':
  - type: note
    content: See ch. 7:16
  - type: text
    content: 'Your eye shall not pity him, '
  - type: note
    content: ch. 21:9; Num. 35:33; [1 Kgs. 2:31]
  - type: text
    content: but you shall purge the guilt of innocent blood
  - type: note
    content: Or the blood of the innocent
  - type: text
    content: ' from Israel, so that it may be well with you.'
  - type: heading
    content: Property Boundaries
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 27:17; Job 24:2; Prov. 22:28; 23:10; Hos. 5:10
  - type: text
    content: '“You shall not move your neighbor’s landmark, which the men of old have set, in the inheritance that you will hold in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess.'
  - type: heading
    content: Laws Concerning Witnesses
  '15':
  - type: text
    content: '“A single witness shall not suffice against a person for any crime or for any wrong in connection with any offense that he has committed. '
  - type: note
    content: Cited Matt. 18:16; 2 Cor. 13:1; See Num. 35:30
  - type: text
    content: 'Only on the evidence of two witnesses or of three witnesses shall a charge be established. '
  '16':
  - type: text
    content: 'If '
  - type: note
    content: '[Ex. 23:1; Ps. 35:11]'
  - type: text
    content: 'a malicious witness arises to accuse a person of wrongdoing, '
  '17':
  - type: text
    content: 'then both parties to the dispute shall appear before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 17:8, 9; [ch. 21:5]
  - type: text
    content: 'before the priests and the judges who are in office in those days. '
  '18':
  - type: text
    content: 'The judges shall '
  - type: note
    content: ch. 13:14; 17:4
  - type: text
    content: 'inquire diligently, and if the witness is a false witness and has accused his brother falsely, '
  '19':
  - type: note
    content: Prov. 19:5, 9; [Dan. 6:24]
  - type: text
    content: then you shall do to him as he had meant to do to his brother. So you shall purge the evil
  - type: note
    content: Or evil person
  - type: text
    content: ' from your midst. '
  '2':
  - type: note
    content: Ex. 21:13; Num. 35:10, 14; Josh. 20:2, 8
  - type: text
    content: 'you shall set apart three cities for yourselves in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess. '
  '20':
  - type: text
    content: 'And the rest '
  - type: note
    content: See ch. 13:11
  - type: text
    content: 'shall hear and fear, and shall never again commit any such evil among you. '
  '21':
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'Your eye shall not pity. '
  - type: note
    content: See Ex. 21:23, 24
  - type: text
    content: It shall be life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.
  '3':
  - type: text
    content: You shall measure the distances
  - type: note
    content: Hebrew road
  - type: text
    content: ' and divide into three parts the area of the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you as a possession, so that any manslayer can flee to them.'
  '4':
  - type: text
    content: '“This is the provision for '
  - type: note
    content: ch. 4:42; Num. 35:15; Josh. 20:3, 5
  - type: text
    content: 'the manslayer, who by fleeing there may save his life. If anyone kills his neighbor unintentionally without having hated him in the past— '
  '5':
  - type: text
    content: 'as when someone goes into the forest with his neighbor to cut wood, and his hand swings the axe to cut down a tree, and the head slips from the handle and strikes his neighbor so that he dies—he may flee to one of these cities and live, '
  '6':
  - type: text
    content: 'lest '
  - type: note
    content: Num. 35:12, 19, 21, 24, 25, 27
  - type: text
    content: 'the avenger of blood in hot anger pursue the manslayer and overtake him, because the way is long, and strike him fatally, though the man did not deserve to die, since he had not hated his neighbor in the past. '
  '7':
  - type: text
    content: 'Therefore I command you, You shall set apart three cities. '
  '8':
  - type: note
    content: ch. 12:20
  - type: text
    content: 'And if the '
  - type: text
    content: Lord
  - type: text
    content: ' your God enlarges your territory, '
  - type: note
    content: Ex. 34:24; [Ex. 23:31]
  - type: text
    content: 'as he has sworn to your fathers, and '
  - type: note
    content: See Gen. 15:18-21
  - type: text
    content: 'gives you all the land that he promised to give to your fathers— '
  '9':
  - type: text
    content: 'provided you are careful to keep all this commandment, which I command you today, by loving the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and by walking ever in his ways—'
  - type: note
    content: ver. 2; [Josh. 20:7]
  - type: text
    content: 'then you shall add three other cities to these three, '
