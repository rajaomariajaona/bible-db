      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 16:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: for the memorial offering.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-5, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 40:13-17
      marker-yv: yv-n
    - type: text
      text: Make haste, O God, to deliver me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', make haste to help me!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be put to shame and confusion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who seek my life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be turned back and brought to dishonor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who delight in my hurt!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them turn back because of their shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who say, “Aha, Aha!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all who seek you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rejoice and be glad in you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who love your salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: say evermore, “God is great!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am poor and needy;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 141:1
      marker-yv: yv-n
    - type: text
      text: hasten to me, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my help and my deliverer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not delay!'
