document_id: PSA.70,59
type_code: eng
verses:
  '1':
  - type: heading
    content: O Lord, Do Not Delay
  - type: text
    content: 'To the choirmaster. Of David, '
  - type: note
    content: Ps. 38, title; [1 Chr. 16:4]
  - type: text
    content: for the memorial offering.
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see Ps. 40:13-17
  - type: text
    content: Make haste, O God, to deliver me!
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', make haste to help me!'
  '2':
  - type: text
    content: Let them be put to shame and confusion
  - type: text
    content: who seek my life!
  - type: text
    content: Let them be turned back and brought to dishonor
  - type: text
    content: who delight in my hurt!
  '3':
  - type: text
    content: Let them turn back because of their shame
  - type: text
    content: who say, “Aha, Aha!”
  '4':
  - type: text
    content: May all who seek you
  - type: text
    content: rejoice and be glad in you!
  - type: text
    content: May those who love your salvation
  - type: text
    content: say evermore, “God is great!”
  '5':
  - type: text
    content: But I am poor and needy;
  - type: note
    content: Ps. 141:1
  - type: text
    content: hasten to me, O God!
  - type: text
    content: You are my help and my deliverer;
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', do not delay!'
