document_id: ISA.44,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel the Lord’s Chosen
  - type: text
    content: '“But now hear, '
  - type: note
    content: See ch. 41:8
  - type: text
    content: O Jacob my servant,
  - type: text
    content: Israel whom I have chosen!
  '10':
  - type: note
    content: '[ch. 40:19, 20; 41:6, 7; 46:6, 7; Hab. 2:18]; See Jer. 10:3-5'
  - type: text
    content: 'Who fashions a god or casts an idol that is profitable for nothing? '
  '11':
  - type: note
    content: ch. 45:16; Ps. 115:8; See ch. 42:17
  - type: text
    content: Behold, all his companions shall be put to shame, and the craftsmen are only human. Let them all assemble, let them stand forth. They shall be terrified; they shall be put to shame together.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'The ironsmith takes a cutting tool and works it over the coals. He fashions it with hammers and works it with his strong arm. He becomes hungry, and his strength fails; he drinks no water and is faint. '
  '13':
  - type: text
    content: The carpenter stretches a line; he marks it out with a pencil.
  - type: note
    content: Hebrew stylus
  - type: text
    content: ' He shapes it with planes and marks it with a compass. '
  - type: note
    content: See Ps. 115:5-7
  - type: text
    content: 'He shapes it into the figure of a man, with the beauty of a man, to dwell in a house. '
  '14':
  - type: note
    content: '[ch. 40:20]'
  - type: text
    content: 'He cuts down cedars, or he chooses a cypress tree or an oak and lets it grow strong among the trees of the forest. He plants a cedar and the rain nourishes it. '
  '15':
  - type: text
    content: 'Then it becomes fuel for a man. He takes a part of it and warms himself; he kindles a fire and bakes bread. Also he makes a god and worships it; he makes it an idol and falls down before it. '
  '16':
  - type: text
    content: 'Half of it he burns in the fire. Over the half he eats meat; he roasts it and is satisfied. Also he warms himself and says, “Aha, I am warm, I have seen the fire!” '
  '17':
  - type: text
    content: 'And the rest of it he makes into a god, his idol, and falls down to it and worships it. '
  - type: note
    content: '[ch. 45:20]'
  - type: text
    content: He prays to it and says, “Deliver me, for you are my god!”
  '18':
  - type: text
    content: 'They know not, nor do they discern, for he has shut their eyes, so that they cannot see, and their hearts, so that they cannot understand. '
  '19':
  - type: text
    content: 'No one considers, nor is there knowledge or discernment to say, “Half of it I burned in the fire; I also baked bread on its coals; I roasted meat and have eaten. And shall I make the rest of it an '
  - type: note
    content: Deut. 27:15
  - type: text
    content: 'abomination? Shall I fall down before a block of wood?” '
  '2':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' who made you,'
  - type: note
    content: ver. 24 ; ch. 49:15; [Ps. 71:6; Jer. 1:5; Gal. 1:15]
  - type: text
    content: 'who formed you from the womb and will help you:'
  - type: note
    content: See ch. 43:5
  - type: text
    content: Fear not, O Jacob my servant,
  - type: note
    content: Deut. 32:15
  - type: text
    content: Jeshurun whom I have chosen.
  '20':
  - type: note
    content: Hos. 12:1
  - type: text
    content: 'He feeds on '
  - type: note
    content: '[Job 13:12]'
  - type: text
    content: 'ashes; a deluded heart has led him astray, and he cannot deliver himself or say, “Is there not '
  - type: note
    content: Ps. 144:8; [Rom. 1:25]
  - type: text
    content: a lie in my right hand?”
  - type: heading
    content: The Lord Redeems Israel
  '21':
  - type: text
    content: Remember these things, O Jacob,
  - type: text
    content: 'and Israel, for you are '
  - type: note
    content: ch. 42:19; See ch. 42:1
  - type: text
    content: my servant;
  - type: text
    content: I formed you; you are my servant;
  - type: note
    content: '[ch. 49:15 ]'
  - type: text
    content: O Israel, you will not be forgotten by me.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 43:25
  - type: text
    content: I have blotted out your transgressions like a cloud
  - type: text
    content: and your sins like mist;
  - type: text
    content: return to me, for I have redeemed you.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 49:13; [ch. 55:12; Ps. 69:34; Jer. 51:48 ]
  - type: text
    content: 'Sing, O heavens, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has done it;'
  - type: text
    content: 'shout, O '
  - type: note
    content: Ps. 63:9; [Hos. 2:21, 22]
  - type: text
    content: depths of the earth;
  - type: text
    content: break forth into singing, O mountains,
  - type: text
    content: O forest, and every tree in it!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed Jacob,'
  - type: note
    content: ch. 49:3; [ch. 55:5; 60:9 ]
  - type: text
    content: and will be glorified
  - type: note
    content: Or will display his beauty
  - type: text
    content: ' in Israel.'
  '24':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 43:14
  - type: text
    content: your Redeemer,
  - type: note
    content: See ver. 2
  - type: text
    content: 'who formed you from the womb:'
  - type: note
    content: '[ch. 42:5 ]'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who made all things,'
  - type: note
    content: ch. 42:5; 45:12
  - type: text
    content: who alone stretched out the heavens,
  - type: text
    content: who spread out the earth by myself,
  '25':
  - type: text
    content: who frustrates the signs of liars
  - type: text
    content: and makes fools of diviners,
  - type: note
    content: '[ch. 19:3, 14 ]'
  - type: text
    content: who turns wise men back
  - type: text
    content: and makes their knowledge foolish,
  '26':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Chr. 36:22 ]'
  - type: text
    content: who confirms the word of his servant
  - type: text
    content: and fulfills the counsel of his messengers,
  - type: text
    content: who says of Jerusalem, ‘She shall be inhabited,’
  - type: note
    content: '[ Jer. 32:15, 44 ]'
  - type: text
    content: and of the cities of Judah, ‘They shall be built,
  - type: text
    content: and I will raise up their ruins’;
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:15; [ch. 51:10 ]
  - type: text
    content: who says to the deep, ‘Be dry;
  - type: text
    content: I will dry up your rivers’;
  '28':
  - type: text
    content: 'who says of '
  - type: note
    content: ch. 45:1
  - type: text
    content: 'Cyrus, ‘He is '
  - type: note
    content: '[2 Sam. 5:2; Ps. 78:72]'
  - type: text
    content: my shepherd,
  - type: text
    content: and he shall fulfill all my purpose’;
  - type: text
    content: saying of Jerusalem, ‘She shall be built,’
  - type: note
    content: ch. 45:13; See 2 Chr. 36:22, 23; Ezra 1:1-3
  - type: text
    content: and of the temple, ‘Your foundation shall be laid.’”
  '3':
  - type: text
    content: ' '
  - type: note
    content: Joel 2:28; John 7:38; Acts 2:18; See ch. 35:6
  - type: text
    content: For I will pour water on the thirsty land,
  - type: text
    content: and streams on the dry ground;
  - type: text
    content: I will pour my Spirit upon your offspring,
  - type: text
    content: and my blessing on your descendants.
  '4':
  - type: text
    content: They shall spring up among the grass
  - type: note
    content: '[ Ps. 1:3 ]'
  - type: text
    content: like willows by flowing streams.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 14:1 ]'
  - type: text
    content: 'This one will say, ‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ’s,’
  - type: text
    content: another will call on the name of Jacob,
  - type: text
    content: 'and another will write on his hand, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ’s,’
  - type: text
    content: and name himself by the name of Israel.”
  - type: heading
    content: Besides Me There Is No God
  '6':
  - type: text
    content: 'Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the King of Israel'
  - type: text
    content: 'and '
  - type: note
    content: See ch. 43:14
  - type: text
    content: 'his Redeemer, the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: note
    content: ch. 48:12; Rev. 1:8; See ch. 41:4
  - type: text
    content: “I am the first and I am the last;
  - type: text
    content: besides me there is no god.
  '7':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:26, 27
  - type: text
    content: Who is like me? Let him proclaim it.
  - type: note
    content: Or Who like me can proclaim it?
  - type: text
    content: Let him declare and set it before me,
  - type: text
    content: since I appointed an ancient people.
  - type: text
    content: Let them declare what is to come, and what will happen.
  '8':
  - type: text
    content: Fear not, nor be afraid;
  - type: text
    content: have I not told you from of old and declared it?
  - type: note
    content: ch. 43:10
  - type: text
    content: And you are my witnesses!
  - type: note
    content: ch. 45:5; Deut. 4:35, 39; 32:39; 1 Sam. 2:2; Joel 2:27
  - type: text
    content: Is there a God besides me?
  - type: text
    content: 'There is no '
  - type: note
    content: See ch. 30:29
  - type: text
    content: Rock; I know not any.”
  - type: heading
    content: The Folly of Idolatry
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:24, 29
  - type: text
    content: 'All who fashion idols are nothing, and the things they delight in do not profit. Their witnesses neither see nor know, that they may be put to shame. '
