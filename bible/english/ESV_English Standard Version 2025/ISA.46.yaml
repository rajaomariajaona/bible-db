      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:2
      marker-yv: yv-n
    - type: text
      text: calling a bird of prey from the east,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the man of my counsel from a far country.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 23:19
      marker-yv: yv-n
    - type: text
      text: I have spoken, and I will bring it to pass;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have purposed, and I will do it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, you stubborn of heart,
  - type: usfm
    marker: q2
    children:
