        marker: ref
        children:
        - type: text
          text: Ps. 71:18
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: even to your old age I am he,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to gray hairs I will carry you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have made, and I will bear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will carry and will save.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:18
      marker-yv: yv-n
    - type: text
      text: “To whom will you liken me and make me equal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and compare me, that we may be alike?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:10
      marker-yv: yv-n
    - type: text
      text: Those who lavish gold from the purse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and weigh out silver in the scales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hire a goldsmith, and he makes it into a god;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:15
      marker-yv: yv-n
    - type: text
      text: then they fall down and worship!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:20
      marker-yv: yv-n
    - type: text
      text: They lift it to their shoulders, they carry it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they set it in its place, and it stands there;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 115:7
      marker-yv: yv-n
    - type: text
      text: it cannot move from its place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If one cries to it, it does not answer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or save him from his trouble.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Remember this and stand firm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'recall it to mind, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:25
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: you transgressors,
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remember the former things of old;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am God, and there is no other;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am God, and there is none like me,
