      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: I will put salvation in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for Israel my glory.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stoop; they bow down together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cannot save the burden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
