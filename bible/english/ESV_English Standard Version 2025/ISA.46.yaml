      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:11
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: who have been borne by me from before your birth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carried from the womb;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
