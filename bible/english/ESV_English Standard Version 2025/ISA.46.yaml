document_id: ISA.46,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Idols of Babylon and the One True God
  - type: text
    content: ' '
  - type: note
    content: Jer. 50:2; 51:44; [ch. 21:9 ]
  - type: text
    content: Bel bows down; Nebo stoops;
  - type: text
    content: their idols are on beasts and livestock;
  - type: text
    content: these things you carry are borne
  - type: text
    content: as burdens on weary beasts.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 41:26
  - type: text
    content: declaring the end from the beginning
  - type: text
    content: and from ancient times things not yet done,
  - type: text
    content: 'saying, '
  - type: note
    content: ch. 44:26, 28; Ps. 33:11; Prov. 19:21; [Heb. 6:17]
  - type: text
    content: ‘My counsel shall stand,
  - type: text
    content: and I will accomplish all my purpose,’
  '11':
  - type: text
    content: ' '
  - type: note
    content: See ch. 41:2
  - type: text
    content: calling a bird of prey from the east,
  - type: text
    content: the man of my counsel from a far country.
  - type: note
    content: Num. 23:19
  - type: text
    content: I have spoken, and I will bring it to pass;
  - type: text
    content: I have purposed, and I will do it.
  '12':
  - type: text
    content: “Listen to me, you stubborn of heart,
  - type: text
    content: 'you who are far from righteousness:'
  '13':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:5; [ch. 56:1; Ps. 85:9 ]
  - type: text
    content: I bring near my righteousness; it is not far off,
  - type: text
    content: and my salvation will not delay;
  - type: note
    content: ch. 62:11; [ Joel 2:32 ]
  - type: text
    content: I will put salvation in Zion,
  - type: text
    content: for Israel my glory.”
  '2':
  - type: text
    content: They stoop; they bow down together;
  - type: text
    content: they cannot save the burden,
  - type: text
    content: 'but '
  - type: note
    content: '[Jer. 48:7; Hos. 10:5, 6]'
  - type: text
    content: themselves go into captivity.
  '3':
  - type: text
    content: “Listen to me, O house of Jacob,
  - type: text
    content: all the remnant of the house of Israel,
  - type: note
    content: '[ Deut. 1:31; 32:11 ]'
  - type: text
    content: who have been borne by me from before your birth,
  - type: text
    content: carried from the womb;
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 71:18 ]'
  - type: text
    content: even to your old age I am he,
  - type: text
    content: and to gray hairs I will carry you.
  - type: text
    content: I have made, and I will bear;
  - type: text
    content: I will carry and will save.
  '5':
  - type: text
    content: ' '
  - type: note
    content: See ch. 40:18
  - type: text
    content: “To whom will you liken me and make me equal,
  - type: text
    content: and compare me, that we may be alike?
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 44:10
  - type: text
    content: Those who lavish gold from the purse,
  - type: text
    content: and weigh out silver in the scales,
  - type: text
    content: hire a goldsmith, and he makes it into a god;
  - type: note
    content: ch. 44:15
  - type: text
    content: then they fall down and worship!
  '7':
  - type: text
    content: ' '
  - type: note
    content: See ch. 45:20
  - type: text
    content: They lift it to their shoulders, they carry it,
  - type: text
    content: they set it in its place, and it stands there;
  - type: note
    content: Ps. 115:7
  - type: text
    content: it cannot move from its place.
  - type: text
    content: If one cries to it, it does not answer
  - type: text
    content: or save him from his trouble.
  '8':
  - type: text
    content: “Remember this and stand firm,
  - type: text
    content: 'recall it to mind, '
  - type: note
    content: '[ch. 43:25]'
  - type: text
    content: you transgressors,
  '9':
  - type: text
    content: remember the former things of old;
  - type: text
    content: for I am God, and there is no other;
  - type: text
    content: I am God, and there is none like me,
