document_id: MRK.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Teaching About Divorce
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-12, see Matt. 19:1-9
  - type: text
    content: 'And he left there and went '
  - type: note
    content: Luke 9:51; 17:11; John 10:40; [Matt. 4:25]
  - type: text
    content: to the region of Judea and beyond the Jordan, and crowds gathered to him again. And again, as was his custom, he taught them.
  '10':
  - type: text
    content: 'And in the house the disciples asked him again about this matter. '
  '11':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: See Matt. 5:32
  - type: text
    content: “Whoever divorces his wife and marries another commits adultery against her,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'and '
  - type: note
    content: 1 Cor. 7:11, 13
  - type: text
    content: if she divorces her husband and marries another, she commits adultery.”
  - type: heading
    content: Let the Children Come to Me
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-16, see Matt. 19:13-15; Luke 18:15-17
  - type: text
    content: 'And they were bringing children to him that he might touch them, and the disciples '
  - type: note
    content: ver. 48
  - type: text
    content: 'rebuked them. '
  '14':
  - type: text
    content: 'But when Jesus saw it, he was indignant and said to them, '
  - type: note
    content: Matt. 18:3
  - type: text
    content: '“Let the children come to me; '
  - type: note
    content: '[ch. 9:39]'
  - type: text
    content: do not hinder them, for to such belongs the kingdom of God.
  - type: text
    content: ' '
  '15':
  - type: note
    content: '[John 3:3, 5]'
  - type: text
    content: 'Truly, I say to you, whoever does not '
  - type: note
    content: '[Luke 8:13; James 1:21]'
  - type: text
    content: receive the kingdom of God like a child shall not enter it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: ch. 9:36
  - type: text
    content: 'he took them in his arms and blessed them, '
  - type: note
    content: Rev. 1:17
  - type: text
    content: laying his hands on them.
  - type: heading
    content: The Rich Young Man
  '17':
  - type: text
    content: ' '
  - type: note
    content: For ver. 17-30, see Matt. 19:16-29; Luke 18:18-30; [ Luke 10:25-28 ]
  - type: text
    content: 'And as he was setting out on his journey, a man ran up and '
  - type: note
    content: See ch. 1:40
  - type: text
    content: 'knelt before him and asked him, “Good Teacher, what must I do to '
  - type: note
    content: '[Matt. 19:16]; See Matt. 25:34'
  - type: text
    content: 'inherit eternal life?” '
  '18':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: “Why do you call me good? No one is good except God alone.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You know the commandments: '
  - type: note
    content: Rom. 13:9; Cited from Ex. 20:12-16; Deut. 5:16-20; [Matt. 5:21, 27]
  - type: text
    content: ‘Do not murder, Do not commit adultery, Do not steal, Do not bear false witness, Do not defraud, Honor your father and mother.’”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And Pharisees came up and in order '
  - type: note
    content: See John 8:6
  - type: text
    content: 'to test him asked, '
  - type: note
    content: Matt. 5:31
  - type: text
    content: '“Is it lawful for a man to divorce his wife?” '
  '20':
  - type: text
    content: 'And he said to him, “Teacher, '
  - type: note
    content: '[Phil. 3:6]'
  - type: text
    content: 'all these I have kept from my youth.” '
  '21':
  - type: text
    content: 'And Jesus, '
  - type: note
    content: ver. 27; Luke 22:61; John 1:42; [ch. 3:5]
  - type: text
    content: 'looking at him, '
  - type: note
    content: '[John 11:5; 13:23]'
  - type: text
    content: 'loved him, and said to him, '
  - type: text
    content: '“You lack one thing: go, '
  - type: note
    content: Luke 12:33; [Luke 16:9; 19:8; Acts 2:45; 4:34, 35; 1 Tim. 6:18, 19]
  - type: text
    content: 'sell all that you have and give to the poor, and you will have '
  - type: note
    content: Matt. 6:19, 20
  - type: text
    content: treasure in heaven; and come, follow me.”
  - type: text
    content: ' '
  '22':
  - type: note
    content: '[Ezek. 33:31]'
  - type: text
    content: Disheartened by the saying, he went away sorrowful, for he had great possessions.
  '23':
  - type: text
    content: 'And Jesus '
  - type: note
    content: See ch. 3:5
  - type: text
    content: 'looked around and said to his disciples, '
  - type: note
    content: '[1 Cor. 1:26]; See Matt. 13:22'
  - type: text
    content: '“How difficult it will be for those who have wealth to enter '
  - type: note
    content: See Matt. 12:28
  - type: text
    content: the kingdom of God!”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And the disciples '
  - type: note
    content: ver. 32
  - type: text
    content: 'were amazed at his words. But Jesus said to them again, '
  - type: note
    content: ch. 2:5 (Gk.); [John 13:33; 21:5]
  - type: text
    content: '“Children, '
  - type: note
    content: Job 31:24; Ps. 49:6; 52:7; Prov. 11:28; 1 Tim. 6:17
  - type: text
    content: how difficult it is
  - type: note
    content: Some manuscripts add for those who trust in riches
  - type: text
    content: ' '
  - type: text
    content: 'to enter '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'It is easier for a camel to go through the eye of a needle than for a rich person to enter '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: the kingdom of God.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: And they were exceedingly astonished, and said to him,
  - type: note
    content: Some manuscripts to one another
  - type: text
    content: ' “Then who can be saved?” '
  '27':
  - type: text
    content: 'Jesus '
  - type: note
    content: ver. 23
  - type: text
    content: 'looked at them and said, '
  - type: note
    content: ch. 14:36; Gen. 18:14; Job 42:2; Jer. 32:17, 27; Luke 1:37
  - type: text
    content: “With man it is impossible, but not with God. For all things are possible with God.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Peter began to say to him, “See, '
  - type: note
    content: ch. 1:18, 20; Matt. 4:20, 22
  - type: text
    content: 'we have left everything and followed you.” '
  '29':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: '“Truly, I say to you, '
  - type: note
    content: '[Luke 14:26]'
  - type: text
    content: 'there is no one who has left house or brothers or sisters or mother or father or children or lands, for my sake and '
  - type: note
    content: See ch. 8:35
  - type: text
    content: for the gospel,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “What did Moses command you?”
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'who will not receive a hundredfold '
  - type: note
    content: '[Matt. 6:33]'
  - type: text
    content: 'now in this time, houses and brothers and sisters and mothers and children and lands, '
  - type: note
    content: 2 Cor. 12:10; 2 Thess. 1:4; 2 Tim. 3:11, 12; [John 15:20; Acts 14:22]
  - type: text
    content: 'with persecutions, and in '
  - type: note
    content: Matt. 12:32; Eph. 1:21; [Luke 20:35]
  - type: text
    content: the age to come eternal life.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'But '
  - type: note
    content: See Matt. 19:30
  - type: text
    content: many who are first will be last, and the last first.”
  - type: heading
    content: Jesus Foretells His Death a Third Time
  '32':
  - type: text
    content: ' '
  - type: note
    content: For ver. 32-34, see Matt. 20:17-19; Luke 18:31-33
  - type: text
    content: 'And they were on the road, going up to Jerusalem, and '
  - type: note
    content: Luke 9:51; 19:28
  - type: text
    content: 'Jesus was walking ahead of them. And '
  - type: note
    content: ver. 24
  - type: text
    content: 'they were amazed, and those who followed were afraid. And taking the twelve again, he began to tell them what was to happen to him, '
  '33':
  - type: text
    content: 'saying, '
  - type: text
    content: '“See, '
  - type: note
    content: See Matt. 16:21
  - type: text
    content: 'we are going up to Jerusalem, and the Son of Man will be delivered over to the chief priests and the scribes, and they will '
  - type: note
    content: Matt. 26:66; John 19:7
  - type: text
    content: 'condemn him to death and '
  - type: note
    content: Matt. 27:2; John 18:30, 31; Acts 3:13; [Acts 2:23; 4:27; 21:11]
  - type: text
    content: deliver him over to the Gentiles.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And they will '
  - type: note
    content: Matt. 27:26-31
  - type: text
    content: 'mock him and '
  - type: note
    content: ch. 14:65; 15:19; See Matt. 26:67
  - type: text
    content: 'spit on him, and flog him and kill him. And '
  - type: note
    content: See ch. 8:31
  - type: text
    content: after three days he will rise.”
  - type: heading
    content: The Request of James and John
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-45, see Matt. 20:20-28
  - type: text
    content: 'And James and John, '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'the sons of Zebedee, came up to him and said to him, “Teacher, we want you to do for us '
  - type: note
    content: '[Matt. 18:19]'
  - type: text
    content: 'whatever we ask of you.” '
  '36':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: ver. 51
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And they said to him, “Grant us '
  - type: note
    content: '[Matt. 19:28]'
  - type: text
    content: 'to sit, one at your right hand and one at your left, '
  - type: note
    content: '[Luke 9:26]'
  - type: text
    content: 'in your glory.” '
  '38':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: '[Luke 9:33; 23:34]'
  - type: text
    content: '“You do not know what you are asking. Are you able '
  - type: note
    content: ch. 14:36; Matt. 26:29, 42; Luke 22:42; John 18:11; [Isa. 51:22]
  - type: text
    content: 'to drink the cup that I drink, or '
  - type: note
    content: Luke 12:50
  - type: text
    content: to be baptized with the baptism with which I am baptized?”
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And they said to him, “We are able.” And Jesus said to them, '
  - type: note
    content: '[Rom. 8:17; Phil. 3:10]'
  - type: text
    content: '“The cup that I drink '
  - type: note
    content: Acts 12:2; Rev. 1:9
  - type: text
    content: 'you will drink, and with the baptism with which I am baptized, '
  - type: note
    content: '[Rom. 6:3]'
  - type: text
    content: you will be baptized,
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'They said, '
  - type: note
    content: Deut. 24:1-4
  - type: text
    content: '“Moses allowed a man to write a certificate of divorce and to send her away.” '
  '40':
  - type: text
    content: 'but to sit at my right hand or at my left is not mine to grant, '
  - type: note
    content: '[Matt. 19:11]'
  - type: text
    content: 'but it is for those for whom it has been '
  - type: note
    content: Matt. 25:34
  - type: text
    content: prepared.”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And when the ten heard it, they began to be indignant at James and John. '
  '42':
  - type: note
    content: For ver. 42-45, [ch. 9:33-36; Luke 22:25-27]
  - type: text
    content: 'And Jesus called them to him and said to them, '
  - type: text
    content: '“You know that those who are considered rulers of the Gentiles '
  - type: note
    content: 1 Pet. 5:3
  - type: text
    content: lord it over them, and their great ones exercise authority over them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 23:11; [Luke 9:48]
  - type: text
    content: it shall not be so among you. But whoever would be great among you must be your servant,
  - type: note
    content: Greek diakonos
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'and whoever would be first among you must be '
  - type: note
    content: 2 Cor. 4:5
  - type: text
    content: slave
  - type: note
    content: Or bondservant, or servant (for the contextual rendering of the Greek word doulos, see Preface)
  - type: text
    content: ' '
  - type: text
    content: of all.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'For even the Son of Man came not to be served but '
  - type: note
    content: John 13:4, 13-15; Phil. 2:7; [2 Cor. 8:9]
  - type: text
    content: 'to serve, and '
  - type: note
    content: Isa. 53:10; Dan. 9:26; John 10:15; 11:51, 52; Rom. 4:25; Gal. 1:4; 2:20; 1 Tim. 2:6; Titus 2:14; 1 Pet. 1:18, 19
  - type: text
    content: 'to give his life as a ransom for '
  - type: note
    content: ch. 14:24; Isa. 53:11, 12; Heb. 2:10; 9:28; [Rom. 5:15; Rev. 5:9]
  - type: text
    content: many.”
  - type: heading
    content: Jesus Heals Blind Bartimaeus
  '46':
  - type: text
    content: ' '
  - type: note
    content: For ver. 46-52, see Matt. 20:29-34; Luke 18:35-43
  - type: text
    content: 'And they came to Jericho. And '
  - type: note
    content: '[Luke 18:35; 19:1]'
  - type: text
    content: 'as he was leaving Jericho with his disciples and a great crowd, Bartimaeus, '
  - type: note
    content: John 9:1, 8
  - type: text
    content: 'a blind beggar, the son of Timaeus, was sitting by the roadside. '
  '47':
  - type: text
    content: 'And when he heard that it was '
  - type: note
    content: ch. 1:24
  - type: text
    content: 'Jesus of Nazareth, he began to cry out and say, “Jesus, Son of David, have mercy on me!” '
  '48':
  - type: text
    content: 'And many '
  - type: note
    content: Matt. 19:13
  - type: text
    content: 'rebuked him, telling him to be silent. But he cried out all the more, “Son of David, have mercy on me!” '
  '49':
  - type: text
    content: 'And Jesus stopped and said, '
  - type: text
    content: “Call him.”
  - type: text
    content: ' And they called the blind man, saying to him, '
  - type: note
    content: John 16:33
  - type: text
    content: '“Take heart. Get up; he is calling you.” '
  '5':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Because of your '
  - type: note
    content: ch. 16:14; [ch. 3:5; 6:52; Heb. 3:8]
  - type: text
    content: hardness of heart he wrote you this commandment.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'And throwing off his '
  - type: note
    content: ch. 13:16 (Gk.)
  - type: text
    content: 'cloak, he sprang up and came to Jesus. '
  '51':
  - type: text
    content: 'And Jesus said to him, '
  - type: note
    content: ver. 36
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' And the blind man said to him, '
  - type: note
    content: John 20:16
  - type: text
    content: '“Rabbi, let me recover my sight.” '
  '52':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: '“Go your way; '
  - type: note
    content: ch. 5:34; Matt. 9:22; Luke 7:50; 8:48; 17:19
  - type: text
    content: 'your faith has '
  - type: note
    content: ch. 5:23, 28; 6:56
  - type: text
    content: made you well.”
  - type: text
    content: ' And immediately he recovered his sight and followed him on the way.'
  '6':
  - type: text
    content: 'But '
  - type: note
    content: ch. 13:19; 2 Pet. 3:4; [Rom. 1:20]
  - type: text
    content: 'from the beginning of creation, ‘God made them '
  - type: note
    content: Cited from Gen. 1:27; 5:2
  - type: text
    content: male and female.’
  - type: text
    content: ' '
  '7':
  - type: note
    content: Eph. 5:31; Cited from Gen. 2:24
  - type: text
    content: ‘Therefore a man shall leave his father and mother and hold fast to his wife,
  - type: note
    content: Some manuscripts omit and hold fast to his wife
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: 1 Cor. 6:16; [Mal. 2:15]
  - type: text
    content: the two shall become one flesh.’ So they are no longer two but one flesh.
  - type: text
    content: ' '
  '9':
  - type: note
    content: 1 Cor. 7:10
  - type: text
    content: What therefore God has joined together, let not man separate.”
