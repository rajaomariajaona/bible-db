document_id: 2CH.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds the Temple
  - type: text
    content: ' '
  - type: note
    content: For ver. 1, 2, see 1 Kgs. 6:1
  - type: text
    content: 'Then Solomon began to build the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem '
  - type: note
    content: Gen. 22:2, 14
  - type: text
    content: 'on Mount Moriah, where the '
  - type: text
    content: Lord
  - type: note
    content: Septuagint; Hebrew lacks the Lord
  - type: text
    content: 'had appeared to David his father, at the place that David had appointed, '
  - type: note
    content: '[1 Chr. 21:15, 18, 28]'
  - type: text
    content: 'on the threshing floor of Ornan the Jebusite. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-13, see 1 Kgs. 6:23-28
  - type: text
    content: In the Most Holy Place he made two cherubim of wood
  - type: note
    content: Septuagint; the meaning of the Hebrew is uncertain
  - type: text
    content: ' and overlaid'
  - type: note
    content: Hebrew they overlaid
  - type: text
    content: ' them with gold. '
  '11':
  - type: text
    content: 'The wings of the cherubim together extended twenty cubits: one wing of the one, of five cubits, touched the wall of the house, and its other wing, of five cubits, touched the wing of the other cherub; '
  '12':
  - type: text
    content: 'and of this cherub, one wing, of five cubits, touched the wall of the house, and the other wing, also of five cubits, was joined to the wing of the first cherub. '
  '13':
  - type: text
    content: The wings of these cherubim extended twenty cubits. The cherubim
  - type: note
    content: Hebrew they
  - type: text
    content: ' stood on their feet, '
  - type: note
    content: '[Ezek. 40:9]'
  - type: text
    content: 'facing the nave. '
  '14':
  - type: note
    content: See Ex. 26:31
  - type: text
    content: And he made the veil of blue and purple and crimson fabrics and fine linen, and he worked cherubim on it.
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15, 16, see 1 Kgs. 7:15-20; [ 1 Kgs. 7:15; 2 Kgs. 25:17; Jer. 52:21 ]
  - type: text
    content: 'In front of the house he made two pillars thirty-five cubits high, with a capital of five cubits on the top of each. '
  '16':
  - type: text
    content: He made chains like a necklace
  - type: note
    content: Hebrew chains in the inner sanctuary
  - type: text
    content: ' and put them on the tops of the pillars, and he made a hundred pomegranates and put them on the chains. '
  '17':
  - type: note
    content: 1 Kgs. 7:21
  - type: text
    content: He set up the pillars in front of the temple, one on the south, the other on the north; that on the south he called Jachin, and that on the north Boaz.
  '2':
  - type: text
    content: 'He began to build in the second month of the fourth year of his reign. '
  '3':
  - type: text
    content: 'These are Solomon’s '
  - type: note
    content: '[Ezra 3:11]'
  - type: text
    content: measurements
  - type: note
    content: Syriac; Hebrew foundations
  - type: text
    content: ' for building the house of God: '
  - type: note
    content: For ver. 3, 4, see 1 Kgs. 6:2, 3
  - type: text
    content: the length, in cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' of the old standard, was sixty cubits, and the breadth twenty cubits. '
  '4':
  - type: text
    content: The vestibule in front of the nave of the house was twenty cubits long, equal to the width of the house,
  - type: note
    content: Compare 1 Kings 6:3; the meaning of the Hebrew is uncertain
  - type: text
    content: ' and its height was 120 cubits. He overlaid it on the inside with pure gold. '
  '5':
  - type: note
    content: 1 Kgs. 6:17
  - type: text
    content: 'The nave he lined with cypress and covered it with fine gold '
  - type: note
    content: 1 Kgs. 6:29, 32
  - type: text
    content: 'and made palms and chains on it. '
  '6':
  - type: text
    content: 'He adorned the house with settings of precious stones. The gold was gold of Parvaim. '
  '7':
  - type: text
    content: So he lined the house with gold—its beams, its thresholds, its walls, and its doors—
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: and he carved cherubim on the walls.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Kgs. 6:16 ]'
  - type: text
    content: And he made the Most Holy Place. Its length, corresponding to the breadth of the house, was twenty cubits, and its breadth was twenty cubits. He overlaid it with 600 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of fine gold. '
  '9':
  - type: text
    content: The weight of gold for the nails was fifty shekels.
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' And he overlaid '
  - type: note
    content: 1 Chr. 28:11
  - type: text
    content: the upper chambers with gold.
