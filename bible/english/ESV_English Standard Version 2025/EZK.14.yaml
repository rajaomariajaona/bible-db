document_id: EZK.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatrous Elders Condemned
  - type: text
    content: 'Then certain of the '
  - type: note
    content: See ch. 8:1
  - type: text
    content: 'elders of Israel came to me '
  - type: note
    content: See ch. 8:1
  - type: text
    content: 'and sat before me. '
  '10':
  - type: text
    content: And they shall bear their punishment
  - type: note
    content: Or iniquity; three times in this verse
  - type: text
    content: '—the punishment of the prophet and the punishment of the inquirer shall be alike— '
  '11':
  - type: text
    content: 'that the house of Israel may no more go astray from me, nor '
  - type: note
    content: ch. 37:23
  - type: text
    content: 'defile themselves anymore with all their transgressions, '
  - type: note
    content: See ch. 11:20
  - type: text
    content: 'but that they may be my people and I may be their God, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  - type: heading
    content: Jerusalem Will Not Be Spared
  '12':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '13':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, when a land sins against me '
  - type: note
    content: ch. 15:8; 17:20; 18:24; 20:27; 2 Chr. 36:14
  - type: text
    content: 'by acting faithlessly, and I stretch out my hand against it and '
  - type: note
    content: See ch. 4:16
  - type: text
    content: break its supply
  - type: note
    content: Hebrew staff
  - type: text
    content: ' of bread and send famine upon it, and '
  - type: note
    content: ver. 17, 19, 21
  - type: text
    content: 'cut off from it man and beast, '
  '14':
  - type: note
    content: '[Jer. 15:1]'
  - type: text
    content: 'even if these three men, '
  - type: note
    content: See Gen. 6:9
  - type: text
    content: 'Noah, '
  - type: note
    content: ch. 28:3; Dan. 9:23
  - type: text
    content: 'Daniel, and '
  - type: note
    content: Job 1:1
  - type: text
    content: 'Job, were in it, '
  - type: note
    content: ch. 3:19
  - type: text
    content: 'they would deliver but their own lives by their righteousness, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 5:17
  - type: text
    content: '“If I cause wild beasts to pass through the land, and they ravage it, '
  - type: note
    content: ch. 6:6; 12:20
  - type: text
    content: 'and it be made desolate, so that no one may pass through because of the beasts, '
  '16':
  - type: text
    content: 'even if these three men were in it, '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'as I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', they would deliver neither sons nor daughters. They alone would be delivered, but '
  - type: note
    content: ch. 6:14
  - type: text
    content: the land would be desolate.
  '17':
  - type: text
    content: '“Or '
  - type: note
    content: ch. 21:3, 4, 9; Lev. 26:25; [Jer. 47:6, 7]
  - type: text
    content: 'if I bring a sword upon that land and say, Let a sword pass through the land, '
  - type: note
    content: ver. 13
  - type: text
    content: 'and I cut off from it man and beast, '
  '18':
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'though these three men were in it, as I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', they would deliver neither sons nor daughters, but they alone would be delivered.'
  '19':
  - type: text
    content: '“Or '
  - type: note
    content: ch. 38:22; [2 Sam. 24:15]
  - type: text
    content: 'if I send a pestilence into that land and pour out my wrath upon it with blood, to cut off from it man and beast, '
  '2':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '20':
  - type: text
    content: 'even if Noah, Daniel, and Job were in it, as I live, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', they would deliver neither son nor daughter. They would deliver but their own lives by their righteousness.'
  '21':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': How much more '
  - type: note
    content: ch. 5:17; Rev. 6:8; [ch. 33:27]
  - type: text
    content: 'when I send upon Jerusalem my four disastrous acts of judgment, '
  - type: note
    content: ver. 17
  - type: text
    content: 'sword, '
  - type: note
    content: ver. 13
  - type: text
    content: 'famine, '
  - type: note
    content: ver. 15
  - type: text
    content: 'wild beasts, and '
  - type: note
    content: ver. 19
  - type: text
    content: 'pestilence, to cut off from it man and beast! '
  '22':
  - type: text
    content: 'But behold, '
  - type: note
    content: ch. 6:8; 12:16
  - type: text
    content: 'some survivors will be left in it, sons and daughters who will be brought out; behold, when they come out to you, and '
  - type: note
    content: ver. 23; ch. 20:43; [ch. 16:54]
  - type: text
    content: 'you see their ways and their deeds, you will be consoled for the disaster that I have brought upon Jerusalem, for all that I have brought upon it. '
  '23':
  - type: text
    content: 'They will console you, when you see their ways and their deeds, and you shall know that I have not done without cause all that I have done in it, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, these men have taken their idols into their hearts, and set '
  - type: note
    content: ch. 7:19; 44:12
  - type: text
    content: 'the stumbling block of their iniquity before their faces. '
  - type: note
    content: ch. 20:3, 31; 2 Kgs. 3:13; [ch. 36:37]
  - type: text
    content: 'Should I indeed let myself be consulted by them? '
  '4':
  - type: text
    content: 'Therefore speak to them and say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Any one of the house of Israel who takes his idols into his heart and sets the stumbling block of his iniquity before his face, and yet comes to the prophet, '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer him as he comes with the multitude of his idols, '
  '5':
  - type: note
    content: '[2 Thess. 2:11, 12]'
  - type: text
    content: 'that I may lay hold of the hearts of the house of Israel, '
  - type: note
    content: Isa. 1:4
  - type: text
    content: who are all estranged from me through their idols.
  '6':
  - type: text
    content: '“Therefore say to the house of Israel, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ch. 18:30, 32]'
  - type: text
    content: 'Repent and turn away from your idols, and turn away your faces from all your abominations. '
  '7':
  - type: text
    content: 'For any one of the house of Israel, or of the strangers who sojourn in Israel, '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'who separates himself from me, taking his idols into his heart and putting the stumbling block of his iniquity before his face, and yet comes to a prophet to consult me through him, '
  - type: note
    content: '[ver. 4]'
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer him myself. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 15:7; Lev. 17:10; Jer. 44:11
  - type: text
    content: 'I will set my face against that man; I '
  - type: note
    content: ch. 5:15; Deut. 28:37
  - type: text
    content: 'will make him a sign and a byword '
  - type: note
    content: ch. 15:7; Lev. 17:10; Jer. 44:11
  - type: text
    content: 'and cut him off from the midst of my people, '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And if the prophet is deceived and speaks a word, '
  - type: note
    content: '[1 Kgs. 22:23]'
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have deceived that prophet, and I will stretch out my hand against him and will destroy him from the midst of my people Israel. '
