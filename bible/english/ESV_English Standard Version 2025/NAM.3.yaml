document_id: NAM.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Nineveh
  - type: text
    content: 'Woe to '
  - type: note
    content: Ezek. 24:9; [Hab. 2:12]
  - type: text
    content: the bloody city,
  - type: text
    content: all full of lies and plunder—
  - type: note
    content: '[ch. 2:12 ]'
  - type: text
    content: no end to the prey!
  '10':
  - type: text
    content: ' '
  - type: note
    content: Isa. 20:4
  - type: text
    content: Yet she became an exile;
  - type: text
    content: she went into captivity;
  - type: note
    content: Isa. 13:16
  - type: text
    content: her infants were dashed in pieces
  - type: text
    content: at the head of every street;
  - type: text
    content: 'for her honored men '
  - type: note
    content: Joel 3:3; Obad. 11
  - type: text
    content: lots were cast,
  - type: note
    content: '[ Ps. 149:8 ]'
  - type: text
    content: and all her great men were bound in chains.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jer. 25:17, 27; [ Ps. 75:8; Isa. 51:17; Obad. 16 ]
  - type: text
    content: You also will be drunken;
  - type: text
    content: you will go into hiding;
  - type: note
    content: '[ Jer. 4:5, 6 ]'
  - type: text
    content: you will seek a refuge from the enemy.
  '12':
  - type: text
    content: 'All your fortresses are '
  - type: note
    content: '[Rev. 6:13]'
  - type: text
    content: like fig trees
  - type: text
    content: with first-ripe figs—
  - type: text
    content: if shaken they fall
  - type: text
    content: into the mouth of the eater.
  '13':
  - type: text
    content: Behold, your troops
  - type: note
    content: Isa. 19:16; Jer. 51:30
  - type: text
    content: are women in your midst.
  - type: text
    content: The gates of your land
  - type: text
    content: are wide open to your enemies;
  - type: text
    content: fire has devoured your bars.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 22:11 ]'
  - type: text
    content: Draw water for the siege;
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: strengthen your forts;
  - type: text
    content: go into the clay;
  - type: text
    content: tread the mortar;
  - type: text
    content: take hold of the brick mold!
  '15':
  - type: text
    content: There will the fire devour you;
  - type: text
    content: the sword will cut you off.
  - type: text
    content: 'It will '
  - type: note
    content: '[Joel 2:3]'
  - type: text
    content: 'devour you '
  - type: note
    content: '[Joel 1:4, 6]'
  - type: text
    content: like the locust.
  - type: text
    content: 'Multiply yourselves '
  - type: note
    content: '[Joel 1:4, 6]'
  - type: text
    content: like the locust;
  - type: text
    content: 'multiply '
  - type: note
    content: '[Joel 1:4, 6]'
  - type: text
    content: like the grasshopper!
  '16':
  - type: text
    content: 'You increased '
  - type: note
    content: '[Ezek. 27:23, 24]'
  - type: text
    content: your merchants
  - type: text
    content: more than the stars of the heavens.
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: The locust spreads its wings and flies away.
  '17':
  - type: text
    content: 'Your '
  - type: note
    content: '[Isa. 10:8]'
  - type: text
    content: princes
  - type: note
    content: Or guards
  - type: text
    content: ' are '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: like grasshoppers,
  - type: note
    content: Jer. 51:27
  - type: text
    content: your scribes
  - type: note
    content: Or marshals
  - type: text
    content: ' like clouds of locusts'
  - type: text
    content: settling on the fences
  - type: text
    content: in a day of cold—
  - type: text
    content: when the sun rises, they fly away;
  - type: text
    content: no one knows where they are.
  '18':
  - type: text
    content: 'Your shepherds '
  - type: note
    content: '[Ps. 76:5]'
  - type: text
    content: are asleep,
  - type: text
    content: O king of Assyria;
  - type: note
    content: ch. 2:5
  - type: text
    content: your nobles slumber.
  - type: text
    content: 'Your people '
  - type: note
    content: '[1 Kgs. 22:17]'
  - type: text
    content: are scattered on the mountains
  - type: text
    content: with none to gather them.
  '19':
  - type: text
    content: There is no easing your hurt;
  - type: note
    content: Jer. 10:19; Mic. 1:9
  - type: text
    content: your wound is grievous.
  - type: text
    content: All who hear the news about you
  - type: note
    content: Lam. 2:15; [ Zeph. 2:15 ]
  - type: text
    content: clap their hands over you.
  - type: text
    content: 'For '
  - type: note
    content: '[Isa. 37:18]'
  - type: text
    content: upon whom has not come
  - type: text
    content: your unceasing evil?
  '2':
  - type: text
    content: 'The crack of the whip, and '
  - type: note
    content: '[ch. 2:4]'
  - type: text
    content: rumble of the wheel,
  - type: note
    content: '[ Judg. 5:22 ]'
  - type: text
    content: 'galloping horse and '
  - type: note
    content: '[Joel 2:5]'
  - type: text
    content: bounding chariot!
  '3':
  - type: text
    content: Horsemen charging,
  - type: text
    content: 'flashing sword and '
  - type: note
    content: Hab. 3:11
  - type: text
    content: glittering spear,
  - type: note
    content: '[ 2 Kgs. 19:35 ]'
  - type: text
    content: hosts of slain,
  - type: text
    content: heaps of corpses,
  - type: text
    content: dead bodies without end—
  - type: text
    content: they stumble over the bodies!
  '4':
  - type: text
    content: 'And all for the countless whorings of the '
  - type: note
    content: '[Rev. 17:2; 18:3]'
  - type: text
    content: prostitute,
  - type: note
    content: '[ Isa. 47:9, 12 ]'
  - type: text
    content: graceful and of deadly charms,
  - type: text
    content: who betrays nations with her whorings,
  - type: text
    content: and peoples with her charms.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[See ch. 2:13 above]'
  - type: text
    content: Behold, I am against you,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
    content: 'and '
  - type: note
    content: Jer. 13:22, 26; [Isa. 3:17; 47:3]
  - type: text
    content: will lift up your skirts over your face;
  - type: text
    content: 'and I will make nations look at '
  - type: note
    content: Hab. 2:16
  - type: text
    content: your nakedness
  - type: text
    content: and kingdoms at your shame.
  '6':
  - type: text
    content: I will throw filth at you
  - type: text
    content: 'and '
  - type: note
    content: Mal. 2:9; [ch. 1:14]
  - type: text
    content: treat you with contempt
  - type: text
    content: 'and make you '
  - type: note
    content: Heb. 10:33; [1 Cor. 4:9]
  - type: text
    content: a spectacle.
  '7':
  - type: text
    content: 'And all who look at you '
  - type: note
    content: Jer. 51:9; Rev. 18:10
  - type: text
    content: will shrink from you and say,
  - type: text
    content: '“Wasted is '
  - type: note
    content: '[Zeph. 2:13]; See ch. 1:1'
  - type: text
    content: 'Nineveh; '
  - type: note
    content: Isa. 51:19; Jer. 15:5
  - type: text
    content: who will grieve for her?”
  - type: note
    content: Lam. 1:2, 9, 16, 17, 21
  - type: text
    content: Where shall I seek comforters for you?
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 6:2 ]'
  - type: text
    content: 'Are you better than '
  - type: note
    content: Jer. 46:25
  - type: text
    content: Thebes
  - type: note
    content: Hebrew No-amon
  - type: text
    content: 'that sat '
  - type: note
    content: '[Ezek. 29:3]'
  - type: text
    content: by the Nile,
  - type: text
    content: with water around her,
  - type: text
    content: her rampart a sea,
  - type: text
    content: and water her wall?
  '9':
  - type: text
    content: ' '
  - type: note
    content: See Dan. 11:43
  - type: text
    content: Cush was her strength;
  - type: text
    content: Egypt too, and that without limit;
  - type: note
    content: Gen. 10:6
  - type: text
    content: 'Put and the '
  - type: note
    content: See 2 Chr. 12:3
  - type: text
    content: Libyans were her
  - type: note
    content: Hebrew your
  - type: text
    content: ' helpers.'
