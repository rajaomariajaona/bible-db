document_id: 2KI.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: '[ch. 16:2; 17:1 ]'
  - type: text
    content: 'In the third year of Hoshea son of Elah, king of Israel, '
  - type: note
    content: 2 Chr. 28:27; Matt. 1:9
  - type: text
    content: 'Hezekiah the son of Ahaz, king of Judah, began to reign. '
  '10':
  - type: text
    content: 'and at the end of three years he took it. In the sixth year of Hezekiah, which was the ninth year of Hoshea king of Israel, Samaria was taken. '
  '11':
  - type: text
    content: 'The king of Assyria carried the Israelites away to Assyria and put them in '
  - type: note
    content: ch. 17:6; 1 Chr. 5:26
  - type: text
    content: 'Halah, and on the '
  - type: note
    content: ch. 17:6; 1 Chr. 5:26
  - type: text
    content: 'Habor, '
  - type: note
    content: ch. 17:6; 1 Chr. 5:26
  - type: text
    content: 'the river of Gozan, and in the cities of the Medes, '
  '12':
  - type: text
    content: 'because they did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God but transgressed his covenant, even all that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. They neither listened nor obeyed.'
  - type: heading
    content: Sennacherib Attacks Judah
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-37, see 2 Chr. 32:1-20; Isa. 36:1-22
  - type: text
    content: 'In the fourteenth year of King Hezekiah, Sennacherib king of Assyria came up against all the fortified cities of Judah and took them. '
  '14':
  - type: text
    content: 'And Hezekiah king of Judah sent to the king of Assyria at Lachish, saying, “I have done wrong; withdraw from me. Whatever you impose on me I will bear.” '
  - type: note
    content: '[ch. 23:33]'
  - type: text
    content: And the king of Assyria required of Hezekiah king of Judah three hundred talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver and thirty talents of gold. '
  '15':
  - type: text
    content: 'And Hezekiah '
  - type: note
    content: '[ch. 12:18; 16:8]'
  - type: text
    content: 'gave him all the silver that was found in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the treasuries of the king’s house. '
  '16':
  - type: text
    content: 'At that time Hezekiah stripped the gold from the doors of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and from the doorposts that Hezekiah king of Judah had overlaid and gave it to the king of Assyria. '
  '17':
  - type: text
    content: 'And the king of Assyria sent the '
  - type: note
    content: Isa. 20:1
  - type: text
    content: 'Tartan, the Rab-saris, and the Rabshakeh with a great army from Lachish to King Hezekiah at Jerusalem. And they went up and came to Jerusalem. When they arrived, they came and stood by '
  - type: note
    content: Isa. 7:3; [ch. 20:20]
  - type: text
    content: 'the conduit of the upper pool, which is on the highway to the Washer’s Field. '
  '18':
  - type: text
    content: 'And when they called for the king, there came out to them '
  - type: note
    content: Isa. 22:20
  - type: text
    content: 'Eliakim the son of Hilkiah, who was over the household, and '
  - type: note
    content: Isa. 22:15
  - type: text
    content: Shebnah the secretary, and Joah the son of Asaph, the recorder.
  '19':
  - type: text
    content: 'And the Rabshakeh said to them, “Say to Hezekiah, ‘Thus says the great king, the king of Assyria: On what do you rest this trust of yours? '
  '2':
  - type: text
    content: 'He was '
  - type: note
    content: For ver. 2, 3, see 2 Chr. 29:1, 2
  - type: text
    content: 'twenty-five years old when he began to reign, and he reigned twenty-nine years in Jerusalem. His mother’s name was '
  - type: note
    content: '[2 Chr. 29:1]'
  - type: text
    content: 'Abi the daughter of Zechariah. '
  '20':
  - type: text
    content: 'Do you think that mere words are strategy and power for war? In whom do you now trust, that you have rebelled against me? '
  '21':
  - type: text
    content: 'Behold, you are trusting now in Egypt, that broken reed of '
  - type: note
    content: '[Ezek. 29:6, 7]; See Isa. 30:2, 3, 7'
  - type: text
    content: 'a staff, which will pierce the hand of any man who leans on it. Such is Pharaoh king of Egypt to all who trust in him. '
  '22':
  - type: text
    content: 'But if you say to me, “We trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,” is it not he '
  - type: note
    content: '[ver. 4; 2 Chr. 31:1]'
  - type: text
    content: 'whose high places and altars Hezekiah has removed, saying to Judah and to Jerusalem, “You shall worship before this altar in Jerusalem”? '
  '23':
  - type: text
    content: 'Come now, make a wager with my master the king of Assyria: I will give you two thousand horses, if you are able on your part to set riders on them. '
  '24':
  - type: text
    content: 'How then can you repulse a single captain among the least of my master’s servants, when you trust in Egypt for chariots and for horsemen? '
  '25':
  - type: text
    content: 'Moreover, is it without the '
  - type: text
    content: Lord
  - type: text
    content: ' that I have come up against this place to destroy it? The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go up against this land and destroy it.”’”'
  '26':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Eliakim the son of Hilkiah, and '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'Shebnah, and Joah, said to the Rabshakeh, “Please speak to your servants in '
  - type: note
    content: '[Ezra 4:7; Dan. 2:4]'
  - type: text
    content: 'Aramaic, for we understand it. Do not speak to us in the language of Judah within the hearing of the people who are on the wall.” '
  '27':
  - type: text
    content: But the Rabshakeh said to them, “Has my master sent me to speak these words to your master and to you, and not to the men sitting on the wall, who are doomed with you to eat their own dung and to drink their own urine?”
  '28':
  - type: text
    content: 'Then the Rabshakeh stood and called out in a loud voice in the language of Judah: “Hear the word of the great king, the king of Assyria! '
  '29':
  - type: text
    content: 'Thus says the king: ‘Do not let Hezekiah deceive you, for he will not be able to deliver you out of my'
  - type: note
    content: Hebrew his
  - type: text
    content: ' hand. '
  '3':
  - type: note
    content: ch. 20:3; 2 Chr. 31:20
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to all that David his father had done. '
  '30':
  - type: text
    content: 'Do not let Hezekiah make you trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' by saying, The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely deliver us, and this city will not be given into the hand of the king of Assyria.’ '
  '31':
  - type: text
    content: 'Do not listen to Hezekiah, for thus says the king of Assyria: ‘Make your peace with me'
  - type: note
    content: Hebrew Make a blessing with me
  - type: text
    content: ' and come out to me. Then '
  - type: note
    content: '[1 Kgs. 4:25]'
  - type: text
    content: 'each one of you will eat of his own vine, and each one of his own fig tree, and each one of you will drink the water of his own cistern, '
  '32':
  - type: text
    content: 'until I come and take you away to a land like your own land, '
  - type: note
    content: Deut. 8:7, 8
  - type: text
    content: 'a land of grain and wine, a land of bread and vineyards, a land of olive trees and '
  - type: note
    content: See Ex. 3:8
  - type: text
    content: 'honey, that you may live, and not die. And do not listen to Hezekiah when he misleads you by saying, “The '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver us.” '
  '33':
  - type: note
    content: ch. 19:12; [Isa. 10:10, 11]
  - type: text
    content: 'Has any of the gods of the nations ever delivered his land out of the hand of the king of Assyria? '
  '34':
  - type: note
    content: '[ch. 19:13]'
  - type: text
    content: 'Where are the gods of '
  - type: note
    content: See 1 Kgs. 8:65
  - type: text
    content: 'Hamath and '
  - type: note
    content: Isa. 10:9
  - type: text
    content: 'Arpad? Where are the gods of Sepharvaim, Hena, and '
  - type: note
    content: '[ch. 17:24]'
  - type: text
    content: 'Ivvah? Have they delivered Samaria out of my hand? '
  '35':
  - type: text
    content: 'Who among all the gods of the lands have delivered their lands out of my hand, '
  - type: note
    content: '[Dan. 3:15]'
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' should deliver Jerusalem out of my hand?’”'
  '36':
  - type: text
    content: 'But the people were silent and answered him not a word, for the king’s command was, “Do not answer him.” '
  '37':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 18, 26; ch. 19:2
  - type: text
    content: 'Eliakim the son of Hilkiah, who was over the household, and Shebna the secretary, and Joah the son of Asaph, the recorder, came to Hezekiah '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: with their clothes torn and told him the words of the Rabshakeh.
  '4':
  - type: note
    content: ver. 22; 2 Chr. 31:1
  - type: text
    content: 'He removed the high places and broke the '
  - type: note
    content: ch. 17:10; See Ex. 23:24
  - type: text
    content: 'pillars and cut down '
  - type: note
    content: ch. 17:16; See Deut. 16:21
  - type: text
    content: 'the Asherah. And he broke in pieces '
  - type: note
    content: Num. 21:8, 9
  - type: text
    content: the bronze serpent that Moses had made, for until those days the people of Israel had made offerings to it (it was called Nehushtan).
  - type: note
    content: Nehushtan sounds like the Hebrew for both bronze and serpent
  - type: text
    content: ' '
  '5':
  - type: note
    content: ch. 19:10
  - type: text
    content: 'He trusted in the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ch. 23:25
  - type: text
    content: 'so that there was none like him among all the kings of Judah after him, nor among those who were before him. '
  '6':
  - type: note
    content: '[Deut. 10:20; Josh. 23:8]'
  - type: text
    content: 'For he held fast to the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not depart from following him, but kept the commandments that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '7':
  - type: note
    content: 2 Chr. 15:2
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him; wherever he went out, '
  - type: note
    content: '[ch. 16:7]'
  - type: text
    content: 'he prospered. He rebelled against the king of Assyria and would not serve him. '
  '8':
  - type: note
    content: '[Isa. 14:29]'
  - type: text
    content: 'He struck down the Philistines as far as Gaza and its territory, '
  - type: note
    content: ch. 17:9
  - type: text
    content: from watchtower to fortified city.
  '9':
  - type: text
    content: 'In the fourth year of King Hezekiah, which was the seventh year of Hoshea son of Elah, king of Israel, '
  - type: note
    content: For ver. 9-12, see ch. 17:3-7
  - type: text
    content: 'Shalmaneser king of Assyria came up against Samaria and besieged it, '
