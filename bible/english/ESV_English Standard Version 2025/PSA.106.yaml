document_id: PSA.106,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Give Thanks to the Lord, for He Is Good
  - type: text
    content: ' '
  - type: note
    content: '[See Ps. 105:45 above ]'
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: note
    content: See Ps. 105:1
  - type: text
    content: 'Oh give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ps. 100:5
  - type: text
    content: for he is good,
  - type: note
    content: See 1 Chr. 16:34, 41
  - type: text
    content: for his steadfast love endures forever!
  '10':
  - type: text
    content: 'So he '
  - type: note
    content: Ex. 14:30
  - type: text
    content: saved them from the hand of the foe
  - type: text
    content: 'and '
  - type: note
    content: Ps. 107:2
  - type: text
    content: redeemed them from the power of the enemy.
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 14:28; 15:5
  - type: text
    content: the waters covered their adversaries;
  - type: text
    content: not one of them was left.
  '12':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 14:31
  - type: text
    content: they believed his words;
  - type: text
    content: 'they '
  - type: note
    content: See Ex. 15:1-21
  - type: text
    content: sang his praise.
  '13':
  - type: text
    content: 'But they soon '
  - type: note
    content: Ps. 78:11; [Ex. 15:24; 16:2; 17:2]
  - type: text
    content: forgot his works;
  - type: text
    content: 'they did not wait for '
  - type: note
    content: '[Ps. 107:11]'
  - type: text
    content: his counsel.
  '14':
  - type: text
    content: 'But they had '
  - type: note
    content: Num. 11:4; 1 Cor. 10:6; [Ps. 78:18]
  - type: text
    content: a wanton craving in the wilderness,
  - type: text
    content: 'and '
  - type: note
    content: Ex. 17:2; 1 Cor. 10:9
  - type: text
    content: put God to the test in the desert;
  '15':
  - type: text
    content: 'he '
  - type: note
    content: Ps. 78:29
  - type: text
    content: gave them what they asked,
  - type: text
    content: 'but sent '
  - type: note
    content: Isa. 10:16
  - type: text
    content: a wasting disease among them.
  '16':
  - type: text
    content: 'When men in the camp '
  - type: note
    content: See Num. 16:1-3
  - type: text
    content: were jealous of Moses
  - type: text
    content: 'and Aaron, '
  - type: note
    content: Deut. 33:2; Zech. 14:5; Jude 14
  - type: text
    content: 'the holy one of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '17':
  - type: text
    content: ' '
  - type: note
    content: Num. 16:31, 32; Deut. 11:6
  - type: text
    content: the earth opened and swallowed up Dathan,
  - type: text
    content: and covered the company of Abiram.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Num. 16:35
  - type: text
    content: Fire also broke out in their company;
  - type: text
    content: the flame burned up the wicked.
  '19':
  - type: text
    content: 'They '
  - type: note
    content: Ex. 32:4; Deut. 9:8; Acts 7:41
  - type: text
    content: made a calf in Horeb
  - type: text
    content: and worshiped a metal image.
  '2':
  - type: text
    content: 'Who can utter the mighty deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: or declare all his praise?
  '20':
  - type: text
    content: 'They '
  - type: note
    content: Jer. 2:11; [Rom. 1:23]
  - type: text
    content: exchanged the glory of God
  - type: note
    content: Hebrew exchanged their glory
  - type: text
    content: for the image of an ox that eats grass.
  '21':
  - type: text
    content: 'They '
  - type: note
    content: ver. 7, 13; Ps. 78:11; Deut. 32:18
  - type: text
    content: forgot God, their Savior,
  - type: text
    content: who had done great things in Egypt,
  '22':
  - type: text
    content: 'wondrous works in '
  - type: note
    content: Ps. 105:23, 27; [Ps. 78:51]
  - type: text
    content: the land of Ham,
  - type: text
    content: and awesome deeds by the Red Sea.
  '23':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ex. 32:10; Deut. 9:14; Ezek. 20:8
  - type: text
    content: he said he would destroy them—
  - type: text
    content: 'had not Moses, his '
  - type: note
    content: Ps. 105:6
  - type: text
    content: chosen one,
  - type: note
    content: Ezek. 22:30
  - type: text
    content: stood in the breach before him,
  - type: text
    content: to turn away his wrath from destroying them.
  '24':
  - type: text
    content: 'Then they '
  - type: note
    content: Num. 14:31
  - type: text
    content: 'despised '
  - type: note
    content: Zech. 7:14
  - type: text
    content: the pleasant land,
  - type: text
    content: 'having '
  - type: note
    content: Deut. 1:32; 9:23
  - type: text
    content: no faith in his promise.
  '25':
  - type: text
    content: 'They '
  - type: note
    content: Num. 14:2; Deut. 1:27
  - type: text
    content: murmured in their tents,
  - type: text
    content: 'and did not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: 'Therefore he '
  - type: note
    content: Ex. 6:8; Num. 14:30; Deut. 32:40; Ezek. 20:6, 15, 23; [Ps. 95:11]
  - type: text
    content: raised his hand and swore to them
  - type: text
    content: that he would make them fall in the wilderness,
  '27':
  - type: text
    content: and would make their offspring fall among the nations,
  - type: note
    content: See Ps. 44:11
  - type: text
    content: scattering them among the lands.
  '28':
  - type: text
    content: 'Then they '
  - type: note
    content: Num. 25:3; Hos. 9:10
  - type: text
    content: 'yoked themselves to the '
  - type: note
    content: Num. 25:3; Hos. 9:10
  - type: text
    content: Baal of Peor,
  - type: text
    content: 'and ate sacrifices offered to '
  - type: note
    content: Isa. 8:19
  - type: text
    content: the dead;
  '29':
  - type: text
    content: 'they provoked the '
  - type: text
    content: Lord
  - type: text
    content: ' to anger with their deeds,'
  - type: text
    content: and a plague broke out among them.
  '3':
  - type: text
    content: Blessed are they who observe justice,
  - type: text
    content: 'who '
  - type: note
    content: '[Ps. 15:2]'
  - type: text
    content: do righteousness at all times!
  '30':
  - type: text
    content: 'Then '
  - type: note
    content: Num. 25:7, 8
  - type: text
    content: Phinehas stood up and intervened,
  - type: text
    content: and the plague was stayed.
  '31':
  - type: text
    content: 'And that was '
  - type: note
    content: '[Gen. 15:6]; See Num. 25:10-13'
  - type: text
    content: counted to him as righteousness
  - type: text
    content: from generation to generation forever.
  '32':
  - type: text
    content: 'They '
  - type: note
    content: See Num. 20:2-13; Deut. 1:37
  - type: text
    content: angered him at the waters of Meribah,
  - type: text
    content: and it went ill with Moses on their account,
  '33':
  - type: text
    content: 'for they '
  - type: note
    content: Ps. 107:11; [Ps. 78:40; Isa. 63:10]
  - type: text
    content: made his spirit bitter,
  - type: note
    content: Or they rebelled against God’s Spirit
  - type: text
    content: 'and he '
  - type: note
    content: Num. 20:10
  - type: text
    content: spoke rashly with his lips.
  '34':
  - type: text
    content: 'They did not '
  - type: note
    content: See Judg. 1:21, 27-36
  - type: text
    content: destroy the peoples,
  - type: note
    content: Deut. 7:2, 16; Judg. 2:2
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded them,'
  '35':
  - type: text
    content: 'but they '
  - type: note
    content: Judg. 3:5, 6; [Ezra 9:2]
  - type: text
    content: mixed with the nations
  - type: text
    content: and learned to do as they did.
  '36':
  - type: text
    content: They served their idols,
  - type: text
    content: 'which became '
  - type: note
    content: Ex. 23:33; Deut. 7:16; Judg. 2:3
  - type: text
    content: a snare to them.
  '37':
  - type: text
    content: 'They '
  - type: note
    content: 2 Kgs. 16:3; Isa. 57:5; Ezek. 16:20; 20:26
  - type: text
    content: sacrificed their sons
  - type: text
    content: 'and their daughters to '
  - type: note
    content: Deut. 32:17; [1 Cor. 10:20]
  - type: text
    content: the demons;
  '38':
  - type: text
    content: they poured out innocent blood,
  - type: text
    content: the blood of their sons and daughters,
  - type: text
    content: whom they sacrificed to the idols of Canaan,
  - type: text
    content: 'and the land was '
  - type: note
    content: Isa. 24:5
  - type: text
    content: polluted with blood.
  '39':
  - type: text
    content: 'Thus they '
  - type: note
    content: Ezek. 20:18, 30, 31
  - type: text
    content: became unclean by their acts,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 73:27
  - type: text
    content: played the whore in their deeds.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 119:132 ]'
  - type: text
    content: 'Remember me, O '
  - type: text
    content: Lord
  - type: text
    content: ', when you show favor to your people;'
  - type: text
    content: help me when you save them,
  - type: note
    content: Or Remember me, O Lord, with the favor you show to your people; help me with your salvation
  '40':
  - type: text
    content: 'Then '
  - type: note
    content: Ps. 78:59, 62; Judg. 2:14
  - type: text
    content: 'the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against '
  - type: note
    content: See Ps. 28:9
  - type: text
    content: his people,
  - type: text
    content: 'and he abhorred his '
  - type: note
    content: See Ps. 28:9
  - type: text
    content: heritage;
  '41':
  - type: text
    content: 'he '
  - type: note
    content: Neh. 9:27
  - type: text
    content: gave them into the hand of the nations,
  - type: text
    content: so that those who hated them ruled over them.
  '42':
  - type: text
    content: 'Their enemies '
  - type: note
    content: Judg. 4:3; 10:12
  - type: text
    content: oppressed them,
  - type: text
    content: and they were brought into subjection under their power.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Judg. 2:16
  - type: text
    content: Many times he delivered them,
  - type: text
    content: 'but they were rebellious in their '
  - type: note
    content: See Ps. 81:12
  - type: text
    content: purposes
  - type: text
    content: 'and were '
  - type: note
    content: Lev. 26:39
  - type: text
    content: brought low through their iniquity.
  '44':
  - type: text
    content: Nevertheless, he looked upon their distress,
  - type: text
    content: 'when he '
  - type: note
    content: Judg. 3:9; 4:3; 6:7; 10:10
  - type: text
    content: heard their cry.
  '45':
  - type: text
    content: 'For their sake he '
  - type: note
    content: Ps. 105:8; Lev. 26:42
  - type: text
    content: remembered his covenant,
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 90:13
  - type: text
    content: 'relented according to '
  - type: note
    content: ver. 7; Ps. 51:1; 69:16; Isa. 63:7; Lam. 3:32
  - type: text
    content: the abundance of his steadfast love.
  '46':
  - type: text
    content: 'He caused them to be '
  - type: note
    content: 1 Kgs. 8:50; 2 Chr. 30:9; Ezra 9:9; Neh. 1:11; Jer. 42:12
  - type: text
    content: pitied
  - type: text
    content: by all those who held them captive.
  '47':
  - type: text
    content: ' '
  - type: note
    content: For ver. 47, 48, see 1 Chr. 16:35, 36
  - type: text
    content: 'Save us, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: 'and '
  - type: note
    content: See Ps. 107:3
  - type: text
    content: gather us from among the nations,
  - type: text
    content: that we may give thanks to your holy name
  - type: text
    content: and glory in your praise.
  '48':
  - type: text
    content: ' '
  - type: note
    content: See Ps. 41:13
  - type: text
    content: 'Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: from everlasting to everlasting!
  - type: note
    content: See Ps. 41:13
  - type: text
    content: And let all the people say, “Amen!”
  - type: note
    content: See Ps. 104:35
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '5':
  - type: text
    content: 'that I may look upon the prosperity of your '
  - type: note
    content: Ps. 105:6, 43
  - type: text
    content: chosen ones,
  - type: text
    content: that I may rejoice in the gladness of your nation,
  - type: text
    content: that I may glory with your inheritance.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 8:47; Ezra 9:6; Neh. 1:6, 7; 9:16; Jer. 3:25; 14:20; Dan. 9:5
  - type: text
    content: 'Both we and '
  - type: note
    content: Ps. 79:8; Lev. 26:40
  - type: text
    content: our fathers have sinned;
  - type: text
    content: we have committed iniquity; we have done wickedness.
  '7':
  - type: text
    content: Our fathers, when they were in Egypt,
  - type: text
    content: did not consider your wondrous works;
  - type: text
    content: 'they '
  - type: note
    content: '[ver. 13, 21]'
  - type: text
    content: did not remember the abundance of your steadfast love,
  - type: text
    content: 'but '
  - type: note
    content: Ex. 14:11, 12
  - type: text
    content: rebelled by the sea, at the Red Sea.
  '8':
  - type: text
    content: 'Yet he saved them '
  - type: note
    content: Ezek. 20:9, 14
  - type: text
    content: for his name’s sake,
  - type: note
    content: Ex. 9:16
  - type: text
    content: that he might make known his mighty power.
  '9':
  - type: text
    content: 'He '
  - type: note
    content: '[Ps. 18:15; 104:7]'
  - type: text
    content: 'rebuked the Red Sea, and it '
  - type: note
    content: Ex. 14:21; [Isa. 50:2; 51:10]
  - type: text
    content: became dry,
  - type: text
    content: 'and he '
  - type: note
    content: Isa. 63:13
  - type: text
    content: led them through the deep as through a desert.
