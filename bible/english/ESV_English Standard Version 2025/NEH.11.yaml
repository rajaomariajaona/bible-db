        children:
        - type: text
          text: 1 Chr. 9:2-34
      marker-yv: yv-n
    - type: text
      text: 'These are the chiefs of the province who lived in Jerusalem; but in the towns of Judah '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
