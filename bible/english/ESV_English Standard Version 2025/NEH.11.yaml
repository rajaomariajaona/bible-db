      marker-yv: yv-n
    - type: text
      text: 'Ono, the valley of craftsmen. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And certain divisions of the Levites in Judah were assigned to Benjamin.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in Jerusalem lived certain of the sons of Judah and of the sons of Benjamin. Of the sons of Judah: Athaiah the son of Uzziah, son of Zechariah, son of Amariah, son of Shephatiah, son of Mahalalel, of the sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 38:29
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Perez; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Maaseiah the son of Baruch, son of Col-hozeh, son of Hazaiah, son of Adaiah, son of Joiarib, son of Zechariah, son of the Shilonite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the sons of Perez who lived in Jerusalem were 468 valiant men.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these are the sons of Benjamin: Sallu the son of Meshullam, son of Joed, son of Pedaiah, son of Kolaiah, son of Maaseiah, son of Ithiel, son of Jeshaiah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and his brothers, men of valor, 928.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare Septuagint; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jeshaiah, and after him Gabbai, Sallai, 928
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joel the son of Zichri was their overseer; and Judah the son of Hassenuah was second over the city.
