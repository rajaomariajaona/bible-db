    children:
    - type: text
      text: Villages Outside Jerusalem
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as for the villages, with their fields, some of the people of Judah lived in '
    - type: usfm
