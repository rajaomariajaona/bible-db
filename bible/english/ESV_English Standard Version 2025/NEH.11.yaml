  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadid, Zeboim, Neballat, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lod, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
