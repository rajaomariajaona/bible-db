document_id: NEH.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Leaders in Jerusalem
  - type: text
    content: 'Now the leaders of the people '
  - type: note
    content: '[1 Chr. 9:3]'
  - type: text
    content: 'lived in Jerusalem. And the rest of the people '
  - type: note
    content: ch. 10:34
  - type: text
    content: 'cast lots to bring one out of ten to live in Jerusalem '
  - type: note
    content: ver. 18; Isa. 48:2; 52:1; Matt. 4:5; 27:53
  - type: text
    content: the holy city, while nine out of ten
  - type: note
    content: Hebrew nine hands
  - type: text
    content: ' remained in the other towns. '
  '10':
  - type: text
    content: 'Of the priests: Jedaiah the son of Joiarib, Jachin, '
  '11':
  - type: text
    content: 'Seraiah the son of Hilkiah, son of Meshullam, son of Zadok, son of Meraioth, son of Ahitub, ruler of the house of God, '
  '12':
  - type: text
    content: 'and their brothers who did the work of the house, 822; and Adaiah the son of Jeroham, son of Pelaliah, son of Amzi, son of Zechariah, son of Pashhur, son of Malchijah, '
  '13':
  - type: text
    content: 'and his brothers, heads of fathers’ houses, 242; and Amashsai, the son of Azarel, son of Ahzai, son of Meshillemoth, son of Immer, '
  '14':
  - type: text
    content: and their brothers, mighty men of valor, 128; their overseer was Zabdiel the son of Haggedolim.
  '15':
  - type: text
    content: 'And of the Levites: Shemaiah the son of Hasshub, son of Azrikam, son of Hashabiah, son of Bunni; '
  '16':
  - type: text
    content: 'and Shabbethai and '
  - type: note
    content: Ezra 8:33
  - type: text
    content: 'Jozabad, of the chiefs of the Levites, who were over '
  - type: note
    content: 1 Chr. 26:29
  - type: text
    content: 'the outside work of the house of God; '
  '17':
  - type: text
    content: 'and '
  - type: note
    content: ch. 12:8, 24
  - type: text
    content: Mattaniah the son of Mica, son of Zabdi, son of Asaph, who was the leader of the praise,
  - type: note
    content: Compare Septuagint, Vulgate; Hebrew beginning
  - type: text
    content: ' who gave thanks, and Bakbukiah, the second among his brothers; and Abda the son of Shammua, son of Galal, son of Jeduthun. '
  '18':
  - type: text
    content: 'All the Levites in '
  - type: note
    content: See ver. 1
  - type: text
    content: the holy city were 284.
  '19':
  - type: text
    content: 'The gatekeepers, Akkub, Talmon and their brothers, who kept watch at the gates, were 172. '
  '2':
  - type: text
    content: 'And the people blessed all the men '
  - type: note
    content: '[Judg. 5:9; 2 Chr. 17:16]'
  - type: text
    content: who willingly offered to live in Jerusalem.
  '20':
  - type: text
    content: 'And the rest of Israel, and of the priests and the Levites, were in all the towns of Judah, '
  - type: note
    content: ver. 3
  - type: text
    content: 'every one in his inheritance. '
  '21':
  - type: note
    content: ch. 3:26
  - type: text
    content: But the temple servants lived on Ophel; and Ziha and Gishpa were over the temple servants.
  '22':
  - type: text
    content: 'The overseer of the Levites in Jerusalem was Uzzi the son of Bani, son of Hashabiah, son of Mattaniah, son of Mica, of the sons of Asaph, the singers, over the work of the house of God. '
  '23':
  - type: note
    content: Ezra 6:8, 9; 7:20
  - type: text
    content: 'For there was a command from the king concerning them, and a fixed provision for the singers, '
  - type: note
    content: ch. 12:47; 2 Chr. 31:16
  - type: text
    content: 'as every day required. '
  '24':
  - type: text
    content: And Pethahiah the son of Meshezabel, of the sons of Zerah the son of Judah, was at the king’s side
  - type: note
    content: Hebrew hand
  - type: text
    content: ' in all matters concerning the people.'
  - type: heading
    content: Villages Outside Jerusalem
  '25':
  - type: text
    content: 'And as for the villages, with their fields, some of the people of Judah lived in '
  - type: note
    content: Josh. 14:15; 21:11
  - type: text
    content: 'Kiriath-arba and its villages, and in Dibon and its villages, and in Jekabzeel and its villages, '
  '26':
  - type: text
    content: 'and in Jeshua and in Moladah and Beth-pelet, '
  '27':
  - type: text
    content: 'in Hazar-shual, in Beersheba and its villages, '
  '28':
  - type: text
    content: 'in Ziklag, in Meconah and its villages, '
  '29':
  - type: text
    content: 'in En-rimmon, in Zorah, in Jarmuth, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: For ver. 3-19, see 1 Chr. 9:2-34
  - type: text
    content: 'These are the chiefs of the province who lived in Jerusalem; but in the towns of Judah '
  - type: note
    content: ver. 20
  - type: text
    content: 'everyone lived on his property in their towns: Israel, the priests, the Levites, '
  - type: note
    content: Ezra 2:43
  - type: text
    content: 'the temple servants, '
  - type: note
    content: Ezra 2:55
  - type: text
    content: 'and the descendants of Solomon’s servants. '
  '30':
  - type: text
    content: 'Zanoah, Adullam, and their villages, Lachish and its fields, and Azekah and its villages. So they encamped from Beersheba to '
  - type: note
    content: See Josh. 15:8
  - type: text
    content: 'the Valley of Hinnom. '
  '31':
  - type: text
    content: 'The people of Benjamin also lived from Geba onward, at Michmash, Aija, Bethel and its villages, '
  '32':
  - type: text
    content: 'Anathoth, Nob, Ananiah, '
  '33':
  - type: text
    content: 'Hazor, Ramah, Gittaim, '
  '34':
  - type: text
    content: 'Hadid, Zeboim, Neballat, '
  '35':
  - type: text
    content: 'Lod, and '
  - type: note
    content: ch. 6:2; 1 Chr. 8:12
  - type: text
    content: 'Ono, the valley of craftsmen. '
  '36':
  - type: text
    content: And certain divisions of the Levites in Judah were assigned to Benjamin.
  '4':
  - type: text
    content: 'And in Jerusalem lived certain of the sons of Judah and of the sons of Benjamin. Of the sons of Judah: Athaiah the son of Uzziah, son of Zechariah, son of Amariah, son of Shephatiah, son of Mahalalel, of the sons of '
  - type: note
    content: '[Gen. 38:29]'
  - type: text
    content: 'Perez; '
  '5':
  - type: text
    content: 'and Maaseiah the son of Baruch, son of Col-hozeh, son of Hazaiah, son of Adaiah, son of Joiarib, son of Zechariah, son of the Shilonite. '
  '6':
  - type: text
    content: All the sons of Perez who lived in Jerusalem were 468 valiant men.
  '7':
  - type: text
    content: 'And these are the sons of Benjamin: Sallu the son of Meshullam, son of Joed, son of Pedaiah, son of Kolaiah, son of Maaseiah, son of Ithiel, son of Jeshaiah, '
  '8':
  - type: text
    content: and his brothers, men of valor, 928.
  - type: note
    content: Compare Septuagint; Hebrew Jeshaiah, and after him Gabbai, Sallai, 928
  - type: text
    content: ' '
  '9':
  - type: text
    content: Joel the son of Zichri was their overseer; and Judah the son of Hassenuah was second over the city.
