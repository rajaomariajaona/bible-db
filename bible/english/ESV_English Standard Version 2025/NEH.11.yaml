        children:
        - type: text
          text: Josh. 15:8
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Hinnom. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of Benjamin also lived from Geba onward, at Michmash, Aija, Bethel and its villages, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anathoth, Nob, Ananiah, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
