      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:20
      marker-yv: yv-n
    - type: text
      text: 'For there was a command from the king concerning them, and a fixed provision for the singers, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
