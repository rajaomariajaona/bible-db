      marker-yv: yv-n
    - type: text
      text: 'as every day required. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Pethahiah the son of Meshezabel, of the sons of Zerah the son of Judah, was at the king’s side
    - type: usfm
