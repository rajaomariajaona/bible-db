      marker-yv: yv-n
    - type: text
      text: who willingly offered to live in Jerusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the rest of Israel, and of the priests and the Levites, were in all the towns of Judah, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'every one in his inheritance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:26
      marker-yv: yv-n
    - type: text
      text: But the temple servants lived on Ophel; and Ziha and Gishpa were over the temple servants.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The overseer of the Levites in Jerusalem was Uzzi the son of Bani, son of Hashabiah, son of Mattaniah, son of Mica, of the sons of Asaph, the singers, over the work of the house of God. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
