        marker: ref
        children:
        - type: text
          text: Josh. 14:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:11
      marker-yv: yv-n
    - type: text
      text: 'Kiriath-arba and its villages, and in Dibon and its villages, and in Jekabzeel and its villages, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in Jeshua and in Moladah and Beth-pelet, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in Hazar-shual, in Beersheba and its villages, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in Ziklag, in Meconah and its villages, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in En-rimmon, in Zorah, in Jarmuth, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
