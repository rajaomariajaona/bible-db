document_id: 1CH.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Organizes the Priests
  - type: text
    content: 'The divisions of the sons of Aaron were these. The sons of '
  - type: note
    content: Lev. 10:1, 6; Num. 26:60
  - type: text
    content: 'Aaron: Nadab, Abihu, Eleazar, and Ithamar. '
  '10':
  - type: text
    content: 'the seventh to Hakkoz, the eighth to '
  - type: note
    content: Luke 1:5
  - type: text
    content: 'Abijah, '
  '11':
  - type: text
    content: 'the ninth to Jeshua, the tenth to Shecaniah, '
  '12':
  - type: text
    content: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: text
    content: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: text
    content: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: text
    content: 'the seventeenth to Hezir, the eighteenth to Happizzez, '
  '16':
  - type: text
    content: 'the nineteenth to Pethahiah, the twentieth to Jehezkel, '
  '17':
  - type: text
    content: 'the twenty-first to Jachin, the twenty-second to Gamul, '
  '18':
  - type: text
    content: 'the twenty-third to Delaiah, the twenty-fourth to Maaziah. '
  '19':
  - type: text
    content: 'These had as their appointed duty in their service '
  - type: note
    content: ch. 9:25
  - type: text
    content: 'to come into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' according to the procedure established for them by Aaron their father, as the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Israel had commanded him.'
  '2':
  - type: note
    content: Lev. 10:2; Num. 26:61
  - type: text
    content: 'But Nadab and Abihu died before their father and had no children, so Eleazar and Ithamar became the priests. '
  '20':
  - type: text
    content: 'And of the rest of the sons of Levi: '
  - type: note
    content: ch. 23:13
  - type: text
    content: 'of the sons of Amram, Shubael; of the sons of Shubael, Jehdeiah. '
  '21':
  - type: note
    content: ch. 23:17
  - type: text
    content: 'Of Rehabiah: of the sons of Rehabiah, Isshiah the chief. '
  '22':
  - type: text
    content: 'Of the Izharites, Shelomoth; of the sons of Shelomoth, Jahath. '
  '23':
  - type: note
    content: ch. 23:19
  - type: text
    content: 'The sons of Hebron:'
  - type: note
    content: Compare 23:19; Hebrew lacks Hebron
  - type: text
    content: ' Jeriah the chief,'
  - type: note
    content: Compare 23:19; Hebrew lacks the chief
  - type: text
    content: ' Amariah the second, Jahaziel the third, Jekameam the fourth. '
  '24':
  - type: note
    content: ch. 23:20
  - type: text
    content: 'The sons of Uzziel, Micah; of the sons of Micah, Shamir. '
  '25':
  - type: text
    content: 'The brother of Micah, Isshiah; of the sons of Isshiah, Zechariah. '
  '26':
  - type: note
    content: ch. 23:21
  - type: text
    content: 'The sons of Merari: Mahli and Mushi. The sons of Jaaziah: Beno.'
  - type: note
    content: Or his son; also verse 27
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'The sons of Merari: of Jaaziah, Beno, Shoham, Zaccur, and Ibri. '
  '28':
  - type: text
    content: 'Of Mahli: Eleazar, '
  - type: note
    content: ch. 23:22
  - type: text
    content: 'who had no sons. '
  '29':
  - type: text
    content: 'Of Kish, the sons of Kish: Jerahmeel. '
  '3':
  - type: text
    content: 'With the help of '
  - type: note
    content: ver. 31; 2 Sam. 8:17
  - type: text
    content: 'Zadok of the sons of Eleazar, and Ahimelech of the sons of Ithamar, David organized them according to the appointed duties in their service. '
  '30':
  - type: note
    content: ch. 23:23
  - type: text
    content: 'The sons of Mushi: Mahli, Eder, and Jerimoth. These were the sons of the Levites according to their fathers’ houses. '
  '31':
  - type: text
    content: 'These also, the head of each father’s house and his younger brother alike, '
  - type: note
    content: ver. 5; ch. 25:8; 26:13, 14; Neh. 11:1
  - type: text
    content: 'cast lots, just as their brothers the sons of Aaron, in the presence of King David, '
  - type: note
    content: ver. 6
  - type: text
    content: Zadok, Ahimelech, and the heads of fathers’ houses of the priests and of the Levites.
  '4':
  - type: text
    content: 'Since more chief men were found among the sons of Eleazar than among the sons of Ithamar, they organized them under sixteen heads of fathers’ houses of the sons of Eleazar, and eight of the sons of Ithamar. '
  '5':
  - type: text
    content: 'They divided them '
  - type: note
    content: ver. 31
  - type: text
    content: 'by lot, all alike, for there were sacred officers and officers of God among both the sons of Eleazar and the sons of Ithamar. '
  '6':
  - type: text
    content: 'And the scribe Shemaiah, the son of Nethanel, a Levite, recorded them in the presence of the king and the princes and Zadok the priest and '
  - type: note
    content: 2 Sam. 8:17; [ch. 18:16; 1 Sam. 22:20; 23:6]
  - type: text
    content: Ahimelech the son of Abiathar and the heads of the fathers’ houses of the priests and of the Levites, one father’s house being chosen for Eleazar and one chosen for Ithamar.
  '7':
  - type: text
    content: 'The first lot fell to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: text
    content: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: text
    content: 'the fifth to Malchijah, the sixth to Mijamin, '
