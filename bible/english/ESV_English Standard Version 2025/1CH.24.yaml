document_id: 1CH.24,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Organizes the Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The divisions of the sons of Aaron were these. The sons of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 26:60
      marker-yv: yv-n
    - type: text
      text: 'Aaron: Nadab, Abihu, Eleazar, and Ithamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the seventh to Hakkoz, the eighth to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:5
      marker-yv: yv-n
    - type: text
      text: 'Abijah, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the ninth to Jeshua, the tenth to Shecaniah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the seventeenth to Hezir, the eighteenth to Happizzez, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the nineteenth to Pethahiah, the twentieth to Jehezkel, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the twenty-first to Jachin, the twenty-second to Gamul, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the twenty-third to Delaiah, the twenty-fourth to Maaziah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These had as their appointed duty in their service '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:25
      marker-yv: yv-n
    - type: text
      text: 'to come into the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' according to the procedure established for them by Aaron their father, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel had commanded him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 26:61
      marker-yv: yv-n
    - type: text
      text: 'But Nadab and Abihu died before their father and had no children, so Eleazar and Ithamar became the priests. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of the rest of the sons of Levi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:13
      marker-yv: yv-n
    - type: text
      text: 'of the sons of Amram, Shubael; of the sons of Shubael, Jehdeiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:17
      marker-yv: yv-n
    - type: text
      text: 'Of Rehabiah: of the sons of Rehabiah, Isshiah the chief. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Izharites, Shelomoth; of the sons of Shelomoth, Jahath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:19
      marker-yv: yv-n
    - type: text
      text: 'The sons of Hebron:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare 23:19; Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hebron
      marker-yv: yv-n
    - type: text
      text: ' Jeriah the chief,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Compare 23:19; Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the chief
      marker-yv: yv-n
    - type: text
      text: ' Amariah the second, Jahaziel the third, Jekameam the fourth. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:20
      marker-yv: yv-n
    - type: text
      text: 'The sons of Uzziel, Micah; of the sons of Micah, Shamir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The brother of Micah, Isshiah; of the sons of Isshiah, Zechariah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:21
      marker-yv: yv-n
    - type: text
      text: 'The sons of Merari: Mahli and Mushi. The sons of Jaaziah: Beno.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his son
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also verse 27
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: of Jaaziah, Beno, Shoham, Zaccur, and Ibri. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Mahli: Eleazar, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:22
      marker-yv: yv-n
    - type: text
      text: 'who had no sons. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Kish, the sons of Kish: Jerahmeel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With the help of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 8:17
      marker-yv: yv-n
    - type: text
      text: 'Zadok of the sons of Eleazar, and Ahimelech of the sons of Ithamar, David organized them according to the appointed duties in their service. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:23
      marker-yv: yv-n
    - type: text
      text: 'The sons of Mushi: Mahli, Eder, and Jerimoth. These were the sons of the Levites according to their fathers’ houses. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These also, the head of each father’s house and his younger brother alike, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 11:1
      marker-yv: yv-n
    - type: text
      text: 'cast lots, just as their brothers the sons of Aaron, in the presence of King David, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: Zadok, Ahimelech, and the heads of fathers’ houses of the priests and of the Levites.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since more chief men were found among the sons of Eleazar than among the sons of Ithamar, they organized them under sixteen heads of fathers’ houses of the sons of Eleazar, and eight of the sons of Ithamar. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They divided them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      marker-yv: yv-n
    - type: text
      text: 'by lot, all alike, for there were sacred officers and officers of God among both the sons of Eleazar and the sons of Ithamar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the scribe Shemaiah, the son of Nethanel, a Levite, recorded them in the presence of the king and the princes and Zadok the priest and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 8:17
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 22:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: Ahimelech the son of Abiathar and the heads of the fathers’ houses of the priests and of the Levites, one father’s house being chosen for Eleazar and one chosen for Ithamar.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first lot fell to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fifth to Malchijah, the sixth to Mijamin, '
