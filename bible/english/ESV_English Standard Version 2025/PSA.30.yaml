document_id: PSA.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joy Comes with the Morning
  - type: text
    content: 'A Psalm of David. A song at the dedication of '
  - type: note
    content: 2 Sam. 5:11; 1 Chr. 22:1
  - type: text
    content: the temple.
  - type: text
    content: 'I will '
  - type: note
    content: Ps. 107:32
  - type: text
    content: 'extol you, O '
  - type: text
    content: Lord
  - type: text
    content: ', for you have drawn me up'
  - type: text
    content: 'and have not let my foes '
  - type: note
    content: Ps. 25:2; 35:19, 24; [Ps. 13:4]
  - type: text
    content: rejoice over me.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 27:7
  - type: text
    content: 'Hear, O '
  - type: text
    content: Lord
  - type: text
    content: ', and be merciful to me!'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', be my helper!”'
  '11':
  - type: text
    content: 'You have turned for me my mourning into '
  - type: note
    content: Ex. 15:20; 2 Sam. 6:14; Jer. 31:4, 13; [Ps. 149:3; 150:4; Lam. 5:15]
  - type: text
    content: dancing;
  - type: text
    content: you have loosed my sackcloth
  - type: text
    content: and clothed me with gladness,
  '12':
  - type: text
    content: 'that my '
  - type: note
    content: See Ps. 16:9
  - type: text
    content: glory may sing your praise and not be silent.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I will give thanks to you forever!'
  '2':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I '
  - type: note
    content: Ps. 88:13
  - type: text
    content: cried to you for help,
  - type: text
    content: 'and you have '
  - type: note
    content: See Ps. 6:2
  - type: text
    content: healed me.
  '3':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you have brought up my soul from '
  - type: note
    content: See Ps. 16:10
  - type: text
    content: Sheol;
  - type: text
    content: 'you restored me to life from among those who '
  - type: note
    content: Ps. 28:1
  - type: text
    content: go down to the pit.
  - type: note
    content: Or to life, that I should not go down to the pit
  '4':
  - type: text
    content: 'Sing praises to the '
  - type: text
    content: Lord
  - type: text
    content: ', O you '
  - type: note
    content: Ps. 50:5
  - type: text
    content: his saints,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 97:12; [1 Chr. 16:4]
  - type: text
    content: give thanks to his holy name.
  - type: note
    content: Hebrew to the memorial of his holiness (see Exodus 3:15)
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 103:9; Job 33:26; Isa. 26:20; 54:7, 8 ]'
  - type: text
    content: For his anger is but for a moment,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 63:3
  - type: text
    content: his favor is for a lifetime.
  - type: note
    content: Or and in his favor is life
  - type: note
    content: '[ 2 Cor. 4:17, 18 ]'
  - type: text
    content: Weeping may tarry for the night,
  - type: text
    content: 'but '
  - type: note
    content: Ps. 126:5 (Heb.)
  - type: text
    content: joy comes with the morning.
  '6':
  - type: text
    content: 'As for me, I said in my '
  - type: note
    content: '[Job 29:18; Prov. 1:32]'
  - type: text
    content: prosperity,
  - type: text
    content: '“I shall never be '
  - type: note
    content: Ps. 10:6
  - type: text
    content: moved.”
  '7':
  - type: text
    content: 'By your favor, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'you made my '
  - type: note
    content: '[2 Sam. 5:9]'
  - type: text
    content: mountain stand strong;
  - type: text
    content: 'you '
  - type: note
    content: Ps. 104:29; [Deut. 31:17]
  - type: text
    content: hid your face;
  - type: text
    content: 'I was '
  - type: note
    content: '[2 Sam. 24:10]'
  - type: text
    content: dismayed.
  '8':
  - type: text
    content: 'To you, O '
  - type: text
    content: Lord
  - type: text
    content: ', I cry,'
  - type: text
    content: 'and '
  - type: note
    content: Ps. 142:1
  - type: text
    content: 'to the Lord I plead for mercy:'
  '9':
  - type: text
    content: “What profit is there in my death,
  - type: note
    content: Hebrew in my blood
  - type: text
    content: if I go down to the pit?
  - type: note
    content: Or to corruption
  - type: text
    content: 'Will '
  - type: note
    content: See Ps. 6:5
  - type: text
    content: the dust praise you?
  - type: text
    content: Will it tell of your faithfulness?
