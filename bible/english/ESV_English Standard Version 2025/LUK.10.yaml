document_id: LUK.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Seventy-Two
  - type: text
    content: 'After this the Lord appointed '
  - type: note
    content: Ex. 24:1, 9; Num. 11:16
  - type: text
    content: seventy-two
  - type: note
    content: Some manuscripts seventy; also verse 17
  - type: text
    content: ' others and '
  - type: note
    content: '[ch. 9:2, 52]'
  - type: text
    content: 'sent them on ahead of him, two by two, into every town and place where he himself was about to go. '
  '10':
  - type: text
    content: But whenever you enter a town and they do not receive you, go into its streets and say,
  - type: text
    content: ' '
  '11':
  - type: note
    content: Acts 13:51; [Neh. 5:13; Acts 18:6]
  - type: text
    content: '‘Even the dust of your town that clings to our feet we wipe off against you. Nevertheless know this, that '
  - type: note
    content: ver. 9
  - type: text
    content: the kingdom of God has come near.’
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'I tell you, '
  - type: note
    content: See Matt. 10:15
  - type: text
    content: 'it will be more bearable on '
  - type: note
    content: Matt. 7:22
  - type: text
    content: that day for Sodom than for that town.
  - type: heading
    content: Woe to Unrepentant Cities
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-15, see Matt. 11:21-23
  - type: text
    content: '“Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works done in you had been done in '
  - type: note
    content: '[ Isa. 23; Ezek. 28:2-24; Amos 1:9, 10 ]'
  - type: text
    content: Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.
  - type: text
    content: ' '
  '14':
  - type: note
    content: '[ch. 12:47, 48]'
  - type: text
    content: 'But it will be more bearable in the judgment for '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: Tyre and Sidon than for you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And you, Capernaum, '
  - type: note
    content: Cited from Isa. 14:13-15
  - type: text
    content: 'will you be exalted to heaven? You shall be brought down to '
  - type: note
    content: ch. 16:23; Acts 2:27
  - type: text
    content: Hades.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Matt. 10:40
  - type: text
    content: '“The one who hears you hears me, and '
  - type: note
    content: John 12:48; 1 Thess. 4:8; [ Matt. 25:45 ]
  - type: text
    content: 'the one who rejects you rejects me, and '
  - type: note
    content: John 5:23
  - type: text
    content: the one who rejects me rejects him who sent me.”
  - type: heading
    content: The Return of the Seventy-Two
  '17':
  - type: text
    content: ' '
  - type: note
    content: ver. 1
  - type: text
    content: 'The seventy-two returned with joy, saying, “Lord, '
  - type: note
    content: See Mark 16:17
  - type: text
    content: 'even the demons are subject to us in your name!” '
  '18':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[John 12:31; 16:11; Col. 2:15; Rev. 12:8, 9]'
  - type: text
    content: '“I saw Satan '
  - type: note
    content: '[Isa. 14:12; Rev. 9:1]'
  - type: text
    content: fall like lightning from heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Behold, I have given you authority '
  - type: note
    content: Ps. 91:13; Mark 16:18; Acts 28:5
  - type: text
    content: 'to tread on serpents and scorpions, and over all the power of '
  - type: note
    content: Matt. 13:39
  - type: text
    content: 'the enemy, and '
  - type: note
    content: ch. 21:18; [Rom. 8:28, 39]
  - type: text
    content: nothing shall hurt you.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Matt. 9:37, 38; John 4:35
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“The harvest is plentiful, but the laborers are few. '
  - type: note
    content: '[2 Thess. 3:1]'
  - type: text
    content: Therefore pray earnestly to the Lord of the harvest to send out laborers into his harvest.
  - type: text
    content: ' '
  '20':
  - type: note
    content: '[Matt. 7:22, 23]'
  - type: text
    content: 'Nevertheless, do not rejoice in this, that the spirits are subject to you, but rejoice that '
  - type: note
    content: Ex. 32:32, 33; Ps. 69:28; Isa. 4:3; Ezek. 13:9; Dan. 12:1; Phil. 4:3; Heb. 12:23
  - type: text
    content: your names are written in heaven.”
  - type: heading
    content: Jesus Rejoices in the Father’s Will
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21, 22, see Matt. 11:25-27
  - type: text
    content: 'In that same hour '
  - type: note
    content: '[Isa. 53:11]'
  - type: text
    content: 'he rejoiced '
  - type: note
    content: '[Mark 12:36]'
  - type: text
    content: 'in the Holy Spirit and said, '
  - type: text
    content: '“I thank you, Father, '
  - type: note
    content: See Acts 17:24
  - type: text
    content: 'Lord of heaven and earth, that '
  - type: note
    content: Job 37:24; 1 Cor. 1:19-27; 2 Cor. 3:14
  - type: text
    content: 'you have hidden these things from the wise and understanding and '
  - type: note
    content: Ps. 8:2; Matt. 21:16; [ch. 8:10; Matt. 16:17]
  - type: text
    content: 'revealed them to little children; yes, Father, for '
  - type: note
    content: '[ch. 12:32]'
  - type: text
    content: such was your gracious will.
  - type: note
    content: Or for so it pleased you well
  - type: text
    content: ' '
  '22':
  - type: note
    content: John 1:18; 6:46; 7:29; 8:19; 10:15; 17:25; See Matt. 28:18
  - type: text
    content: 'All things have been handed over to me by my Father, and no one knows who the Son is '
  - type: note
    content: John 1:18; 6:46; 7:29; 8:19; 10:15; 17:25; See Matt. 28:18
  - type: text
    content: 'except the Father, or who the Father is '
  - type: note
    content: John 1:18; 6:46; 7:29; 8:19; 10:15; 17:25; See Matt. 28:18
  - type: text
    content: 'except the Son and anyone '
  - type: note
    content: '[John 17:26]'
  - type: text
    content: to whom the Son chooses to reveal him.”
  '23':
  - type: text
    content: 'Then turning to the disciples he said privately, '
  - type: note
    content: Matt. 13:16, 17; [Matt. 16:17]
  - type: text
    content: “Blessed are the eyes that see what you see!
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'For I tell you '
  - type: note
    content: Heb. 11:13; 1 Pet. 1:10-12; [John 8:56]
  - type: text
    content: that many prophets and kings desired to see what you see, and did not see it, and to hear what you hear, and did not hear it.”
  - type: heading
    content: The Parable of the Good Samaritan
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-28, [ch. 18:18-20; Matt. 19:16-19; 22:34-39; Mark 10:17-19 ]
  - type: text
    content: 'And behold, a '
  - type: note
    content: See ch. 7:30
  - type: text
    content: 'lawyer stood up to '
  - type: note
    content: See John 8:6
  - type: text
    content: 'put him to the test, saying, “Teacher, what shall I do to '
  - type: note
    content: Matt. 19:29; 25:34, 46
  - type: text
    content: 'inherit eternal life?” '
  '26':
  - type: text
    content: 'He said to him, '
  - type: text
    content: “What is written in the Law? How do you read it?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he answered, '
  - type: note
    content: Matt. 22:37; Mark 12:30; Cited from Deut. 6:5
  - type: text
    content: '“You shall love the Lord your God with all your heart and with all your soul and with all your strength and with all your mind, and '
  - type: note
    content: Cited from Lev. 19:18; See Matt. 19:19
  - type: text
    content: 'your neighbor as yourself.” '
  '28':
  - type: text
    content: 'And he said to him, '
  - type: text
    content: '“You have answered correctly; '
  - type: note
    content: Lev. 18:5; Neh. 9:29; Ezek. 20:11; Rom. 10:5; Gal. 3:12
  - type: text
    content: do this, and you will live.”
  '29':
  - type: text
    content: 'But he, '
  - type: note
    content: ch. 16:15
  - type: text
    content: 'desiring to justify himself, said to Jesus, “And who is my neighbor?” '
  '3':
  - type: text
    content: 'Go your way; '
  - type: note
    content: Matt. 10:16; [John 17:18]
  - type: text
    content: behold, I am sending you out as lambs in the midst of wolves.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“A man '
  - type: note
    content: '[ch. 18:31; 19:28]'
  - type: text
    content: was going down from Jerusalem to Jericho, and he fell among robbers, who stripped him and beat him and departed, leaving him half dead.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Now by chance a '
  - type: note
    content: John 1:19; [Num. 8:19]
  - type: text
    content: priest was going down that road, and when he saw him he passed by on the other side.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'So likewise '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: a Levite, when he came to the place and saw him, passed by on the other side.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But a '
  - type: note
    content: See Matt. 10:5
  - type: text
    content: Samaritan, as he journeyed, came to where he was, and when he saw him, he had compassion.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'He went to him and '
  - type: note
    content: Isa. 1:6
  - type: text
    content: 'bound up his wounds, pouring on '
  - type: note
    content: Isa. 1:6
  - type: text
    content: oil and wine. Then he set him on his own animal and brought him to an inn and took care of him.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'And the next day he took out two '
  - type: note
    content: See Matt. 18:28
  - type: text
    content: denarii
  - type: note
    content: A denarius was a day’s wage for a laborer
  - type: text
    content: ' '
  - type: text
    content: and gave them to the innkeeper, saying, ‘Take care of him, and whatever more you spend, I will repay you when I come back.’
  - type: text
    content: ' '
  '36':
  - type: text
    content: Which of these three, do you think, proved to be a neighbor to the man who fell among the robbers?”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'He said, “The one who showed him mercy.” And Jesus said to him, '
  - type: text
    content: “You go, and do likewise.”
  - type: heading
    content: Martha and Mary
  '38':
  - type: text
    content: Now as they went on their way, Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' entered a village. And a woman named '
  - type: note
    content: John 11:1, 19, 20; 12:2, 3
  - type: text
    content: 'Martha '
  - type: note
    content: ch. 19:6
  - type: text
    content: 'welcomed him into her house. '
  '39':
  - type: text
    content: 'And she had a sister called '
  - type: note
    content: '[See ver. 38 above]'
  - type: text
    content: 'Mary, who '
  - type: note
    content: ch. 8:35; [Acts 22:3]
  - type: text
    content: 'sat at the Lord’s feet and listened to his teaching. '
  '4':
  - type: note
    content: For ver. 4-12, [ch. 9:1-5; 22:35; Matt. 10:9-15; Mark 6:8-11]
  - type: text
    content: 'Carry no moneybag, no knapsack, no sandals, and '
  - type: note
    content: 2 Kgs. 4:29
  - type: text
    content: greet no one on the road.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'But Martha was distracted with much serving. And she went up to him and said, “Lord, do you not care that my sister has left me to serve alone? Tell her then to help me.” '
  '41':
  - type: text
    content: 'But the Lord answered her, '
  - type: text
    content: '“Martha, Martha, you are '
  - type: note
    content: '[1 Cor. 7:32-34]; See ch. 12:22'
  - type: text
    content: anxious and troubled about many things,
  - type: text
    content: ' '
  '42':
  - type: text
    content: but one thing is necessary.
  - type: note
    content: Some manuscripts few things are necessary, or only one
  - type: text
    content: ' '
  - type: text
    content: 'Mary has chosen '
  - type: note
    content: Ps. 16:5
  - type: text
    content: the good portion, which will not be taken away from her.”
  '5':
  - type: text
    content: 'Whatever house you enter, first say, '
  - type: note
    content: 1 Sam. 25:6
  - type: text
    content: ‘Peace be to this house!’
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And if a son of peace is there, your peace will rest upon him. But if not, '
  - type: note
    content: '[Ps. 35:13 (Heb.)]'
  - type: text
    content: it will return to you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And remain in the same house, eating and drinking what they provide, for '
  - type: note
    content: See 1 Tim. 5:18
  - type: text
    content: the laborer deserves his wages. Do not go from house to house.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Whenever you enter a town and they receive you, eat what is set before you.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Heal the sick in it and say to them, '
  - type: note
    content: ver. 11; See Matt. 3:2
  - type: text
    content: ‘The kingdom of God has come near to you.’
  - type: text
    content: ' '
