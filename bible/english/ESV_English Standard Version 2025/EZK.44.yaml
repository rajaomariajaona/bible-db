        children:
        - type: text
          text: Deut. 10:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'to minister to me. And they shall stand before me to offer me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the fat and the blood, declares the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall enter my sanctuary, and they shall approach '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 41:22
      marker-yv: yv-n
    - type: text
      text: 'my table, to minister to me, and they shall keep my charge. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they enter the gates of the inner court, they shall wear '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 28:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:27
      marker-yv: yv-n
    - type: text
      text: 'linen garments. They shall have nothing of wool on them, while they minister at the gates of the inner court, and within. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall have linen turbans on their heads, and linen undergarments around their waists. They shall not bind themselves with anything that causes sweat. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they go out into the outer court to the people, they shall put off the garments in which they have been ministering '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:14
      marker-yv: yv-n
    - type: text
      text: 'and lay them in the holy chambers. And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 6:11
      marker-yv: yv-n
    - type: text
      text: 'they shall put on other garments, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 29:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 6:27
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'lest they transmit holiness to the people with their garments. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “This gate shall remain shut; it shall not be opened, and no one shall enter by it, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, has entered by it. Therefore it shall remain shut. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 21:5
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'They shall not shave their heads or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 6:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'let their locks grow long; they shall surely trim the hair of their heads. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 10:9
      marker-yv: yv-n
    - type: text
      text: 'No priest shall drink wine when he enters the inner court. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 21:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      marker-yv: yv-n
    - type: text
      text: 'They shall not marry a widow or a divorced woman, but only virgins of the offspring of the house of Israel, or a widow who is the widow of a priest. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Lev. 10:10, 11'
      marker-yv: yv-n
    - type: text
      text: 'They shall teach my people the difference between the holy and the common, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Lev. 10:10, 11'
      marker-yv: yv-n
    - type: text
      text: 'show them how to distinguish between the unclean and the clean. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 17:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 19:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'In a dispute, they shall act as judges, and they shall judge it according to my judgments. They shall keep my laws and my statutes in all my appointed feasts, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:26
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'they shall keep my Sabbaths holy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 21:1-3
      marker-yv: yv-n
    - type: text
      text: 'They shall not defile themselves by going near to a dead person. However, for father or mother, for son or daughter, for brother or unmarried sister they may defile themselves. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 19:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: After he
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a priest
      marker-yv: yv-n
    - type: text
      text: ' has become clean, they shall count seven days for him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the day that he goes into the Holy Place, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17, 21
      marker-yv: yv-n
    - type: text
      text: 'into the inner court, to minister in the Holy Place, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: 'he shall offer his sin offering, declares the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 18:20
      marker-yv: yv-n
    - type: text
      text: '“This shall be their inheritance: I am their inheritance: and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'you shall give them no possession in Israel; I am their possession. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
