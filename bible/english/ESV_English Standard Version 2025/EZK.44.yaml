  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they ministered to them before their idols and became '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:19
      - type: text
        text: '; '
