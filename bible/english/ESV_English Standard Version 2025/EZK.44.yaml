document_id: EZK.44,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gate for the Prince
  - type: text
    content: 'Then he brought me '
  - type: note
    content: '[ch. 43:5]'
  - type: text
    content: 'back to the outer gate of the sanctuary, '
  - type: note
    content: See ch. 43:1
  - type: text
    content: 'which faces east. And it was shut. '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: '[ver. 15; ch. 48:11]'
  - type: text
    content: 'the Levites who went far from me, going astray from me after their idols '
  - type: note
    content: ch. 48:11
  - type: text
    content: 'when Israel went astray, '
  - type: note
    content: See ch. 4:4
  - type: text
    content: shall bear their punishment.
  - type: note
    content: Or iniquity; also verse 12
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'They shall be '
  - type: note
    content: ch. 46:24
  - type: text
    content: 'ministers in my sanctuary, having oversight '
  - type: note
    content: '[1 Chr. 26:1]'
  - type: text
    content: 'at the gates of the temple and ministering in the temple. They shall slaughter the burnt offering and the sacrifice for the people, and '
  - type: note
    content: Num. 16:9
  - type: text
    content: 'they shall stand before the people, to minister to them. '
  '12':
  - type: text
    content: 'Because they ministered to them before their idols and became '
  - type: note
    content: ch. 7:19; 14:3, 4, 7; [Mal. 2:8]
  - type: text
    content: 'a stumbling block of iniquity to the house of Israel, therefore I have '
  - type: note
    content: Ps. 106:26
  - type: text
    content: 'sworn concerning them, declares the Lord '
  - type: text
    content: God
  - type: text
    content: ', and they shall bear their punishment. '
  '13':
  - type: text
    content: 'They '
  - type: note
    content: Num. 18:3; 2 Kgs. 23:9
  - type: text
    content: 'shall not come near to me, to serve me as priest, nor come near any of my holy things and the things that are most holy, but '
  - type: note
    content: See ch. 32:24
  - type: text
    content: 'they shall bear their shame and the abominations that they have committed. '
  '14':
  - type: text
    content: 'Yet I will appoint them to keep '
  - type: note
    content: See ch. 40:45
  - type: text
    content: 'charge of the temple, '
  - type: note
    content: 1 Chr. 23:28, 32
  - type: text
    content: to do all its service and all that is to be done in it.
  - type: heading
    content: Rules for Levitical Priests
  '15':
  - type: text
    content: '“But '
  - type: note
    content: See ch. 43:19
  - type: text
    content: 'the Levitical priests, '
  - type: note
    content: See ch. 43:19
  - type: text
    content: 'the sons of Zadok, who kept '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'the charge of my sanctuary '
  - type: note
    content: '[See ver. 10 above]'
  - type: text
    content: 'when the people of Israel went astray from me, shall come near to me '
  - type: note
    content: '[ver. 11; Deut. 10:8]'
  - type: text
    content: 'to minister to me. And they shall stand before me to offer me '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'the fat and the blood, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'They shall enter my sanctuary, and they shall approach '
  - type: note
    content: See ch. 41:22
  - type: text
    content: 'my table, to minister to me, and they shall keep my charge. '
  '17':
  - type: text
    content: 'When they enter the gates of the inner court, they shall wear '
  - type: note
    content: Ex. 28:39; 39:27
  - type: text
    content: 'linen garments. They shall have nothing of wool on them, while they minister at the gates of the inner court, and within. '
  '18':
  - type: text
    content: 'They shall have linen turbans on their heads, and linen undergarments around their waists. They shall not bind themselves with anything that causes sweat. '
  '19':
  - type: text
    content: 'And when they go out into the outer court to the people, they shall put off the garments in which they have been ministering '
  - type: note
    content: ch. 42:14
  - type: text
    content: 'and lay them in the holy chambers. And '
  - type: note
    content: Lev. 6:11
  - type: text
    content: 'they shall put on other garments, '
  - type: note
    content: '[ch. 46:20; Ex. 29:37; 30:29; Lev. 6:27]'
  - type: text
    content: 'lest they transmit holiness to the people with their garments. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “This gate shall remain shut; it shall not be opened, and no one shall enter by it, for '
  - type: note
    content: '[ch. 43:4]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has entered by it. Therefore it shall remain shut. '
  '20':
  - type: note
    content: Lev. 21:5; [ch. 5:1]
  - type: text
    content: 'They shall not shave their heads or '
  - type: note
    content: '[Num. 6:5]'
  - type: text
    content: 'let their locks grow long; they shall surely trim the hair of their heads. '
  '21':
  - type: note
    content: Lev. 10:9
  - type: text
    content: 'No priest shall drink wine when he enters the inner court. '
  '22':
  - type: note
    content: Lev. 21:7, 13, 14
  - type: text
    content: 'They shall not marry a widow or a divorced woman, but only virgins of the offspring of the house of Israel, or a widow who is the widow of a priest. '
  '23':
  - type: note
    content: '[ch. 22:26]; See Lev. 10:10, 11'
  - type: text
    content: 'They shall teach my people the difference between the holy and the common, and '
  - type: note
    content: '[ch. 22:26]; See Lev. 10:10, 11'
  - type: text
    content: 'show them how to distinguish between the unclean and the clean. '
  '24':
  - type: note
    content: Deut. 17:8, 9; [2 Chr. 19:8]
  - type: text
    content: 'In a dispute, they shall act as judges, and they shall judge it according to my judgments. They shall keep my laws and my statutes in all my appointed feasts, and '
  - type: note
    content: '[ch. 22:26]'
  - type: text
    content: 'they shall keep my Sabbaths holy. '
  '25':
  - type: note
    content: See Lev. 21:1-3
  - type: text
    content: 'They shall not defile themselves by going near to a dead person. However, for father or mother, for son or daughter, for brother or unmarried sister they may defile themselves. '
  '26':
  - type: note
    content: Num. 19:11, 12
  - type: text
    content: After he
  - type: note
    content: That is, a priest
  - type: text
    content: ' has become clean, they shall count seven days for him. '
  '27':
  - type: text
    content: 'And on the day that he goes into the Holy Place, '
  - type: note
    content: ver. 17, 21
  - type: text
    content: 'into the inner court, to minister in the Holy Place, '
  - type: note
    content: ch. 40:39; 42:13; Lev. 4:2, 3
  - type: text
    content: 'he shall offer his sin offering, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: note
    content: See Num. 18:20
  - type: text
    content: '“This shall be their inheritance: I am their inheritance: and '
  - type: note
    content: '[ch. 45:4, 5]'
  - type: text
    content: 'you shall give them no possession in Israel; I am their possession. '
  '29':
  - type: note
    content: See Lev. 6:14-18, 25-29; 7:1-6
  - type: text
    content: 'They shall eat the grain offering, the sin offering, and the guilt offering, and '
  - type: note
    content: Lev. 27:21, 28; Num. 18:14
  - type: text
    content: 'every devoted thing in Israel shall be theirs. '
  '3':
  - type: text
    content: 'Only '
  - type: note
    content: ch. 34:24; 37:25; 45:7; 46:2
  - type: text
    content: 'the prince may sit in it '
  - type: note
    content: '[Gen. 31:54]'
  - type: text
    content: 'to eat bread before the '
  - type: text
    content: Lord
  - type: text
    content: '. He '
  - type: note
    content: ch. 46:2, 12
  - type: text
    content: shall enter by way of the vestibule of the gate, and shall go out by the same way.”
  '30':
  - type: note
    content: See Ex. 23:19
  - type: text
    content: 'And the first of all the firstfruits of all kinds, and every offering of all kinds from all your offerings, shall belong to the priests. '
  - type: note
    content: See Num. 15:20
  - type: text
    content: 'You shall also give to the priests the first of your dough, '
  - type: note
    content: Mal. 3:10
  - type: text
    content: 'that a blessing may rest on your house. '
  '31':
  - type: note
    content: Lev. 22:8; [Ex. 22:31]; See Lev. 7:24
  - type: text
    content: 'The priests shall not eat of '
  - type: note
    content: ch. 4:14
  - type: text
    content: anything, whether bird or beast, that has died of itself or is torn by wild animals.
  '4':
  - type: text
    content: 'Then he brought me by way of '
  - type: note
    content: ch. 40:20
  - type: text
    content: 'the north gate to the front of the temple, and I looked, and behold, '
  - type: note
    content: See ch. 43:5
  - type: text
    content: 'the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. And '
  - type: note
    content: See ch. 1:28
  - type: text
    content: 'I fell on my face. '
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, mark well, '
  - type: note
    content: ch. 40:4
  - type: text
    content: 'see with your eyes, '
  - type: note
    content: ch. 40:4
  - type: text
    content: 'and hear with your ears all that I shall tell you concerning '
  - type: note
    content: '[ch. 43:11]'
  - type: text
    content: 'all the statutes of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and all its laws. And mark well '
  - type: note
    content: '[ch. 43:11]'
  - type: text
    content: 'the entrance to the temple and all the exits from the sanctuary. '
  '6':
  - type: text
    content: 'And say to '
  - type: note
    content: See ch. 2:3
  - type: text
    content: the rebellious house,
  - type: note
    content: Septuagint; Hebrew lacks house
  - type: text
    content: ' to the '
  - type: note
    content: ch. 40:4
  - type: text
    content: 'house of Israel, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': O house of Israel, '
  - type: note
    content: ch. 45:9; [1 Pet. 4:3]
  - type: text
    content: 'enough of all your abominations, '
  '7':
  - type: text
    content: 'in '
  - type: note
    content: '[ver. 9; Neh. 7:64, 65; Acts 21:28]'
  - type: text
    content: 'admitting foreigners, '
  - type: note
    content: '[Jer. 9:26; Acts 7:51]'
  - type: text
    content: 'uncircumcised in heart and flesh, to be in my sanctuary, '
  - type: note
    content: ch. 23:39
  - type: text
    content: profaning my temple, when you offer to me my food, the fat and the blood. You
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew They
  - type: text
    content: ' have broken my covenant, in addition to all your abominations. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 22:26]'
  - type: text
    content: you have not kept charge of my holy things, but you have set others to keep my charge for you in my sanctuary.
  '9':
  - type: text
    content: '“Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'No foreigner, uncircumcised in heart and flesh, of all the foreigners who are among the people of Israel, shall enter my sanctuary. '
