      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 2:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'a stumbling block of iniquity to the house of Israel, therefore I have '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 106:26
      marker-yv: yv-n
    - type: text
      text: 'sworn concerning them, declares the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and they shall bear their punishment. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 18:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 23:9
      marker-yv: yv-n
    - type: text
      text: 'shall not come near to me, to serve me as priest, nor come near any of my holy things and the things that are most holy, but '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:24
      marker-yv: yv-n
    - type: text
      text: 'they shall bear their shame and the abominations that they have committed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet I will appoint them to keep '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:45
      marker-yv: yv-n
    - type: text
      text: 'charge of the temple, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      marker-yv: yv-n
    - type: text
      text: to do all its service and all that is to be done in it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rules for Levitical Priests
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:19
      marker-yv: yv-n
    - type: text
      text: 'the Levitical priests, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:19
      marker-yv: yv-n
    - type: text
      text: 'the sons of Zadok, who kept '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'the charge of my sanctuary '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'when the people of Israel went astray from me, shall come near to me '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. 11; '
      - type: usfm
