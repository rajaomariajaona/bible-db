document_id: MRK.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Paralytic
  - type: text
    content: 'And when he returned to '
  - type: note
    content: '[Matt. 9:1]'
  - type: text
    content: 'Capernaum after some days, it was reported that he was at home. '
  '10':
  - type: text
    content: 'But that you may know that '
  - type: note
    content: '[ver. 28]'
  - type: text
    content: the Son of Man has authority on earth to forgive sins”
  - type: text
    content: '—he said to the paralytic— '
  '11':
  - type: text
    content: “I say to you, rise, pick up your bed, and go home.”
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And he rose and immediately picked up his bed and went out before them all, so that they were all amazed and '
  - type: note
    content: See Luke 7:16
  - type: text
    content: glorified God, saying, “We never saw anything like this!”
  - type: heading
    content: Jesus Calls Levi
  '13':
  - type: text
    content: 'He went out again beside the sea, and '
  - type: note
    content: See ch. 1:45
  - type: text
    content: 'all the crowd was coming to him, and he was teaching them. '
  '14':
  - type: note
    content: For ver. 14-22, see Matt. 9:9-17; Luke 5:27-38
  - type: text
    content: 'And as he passed by, he saw '
  - type: note
    content: '[Matt. 9:9]'
  - type: text
    content: 'Levi the son of Alphaeus sitting at the tax booth, and he said to him, '
  - type: text
    content: “Follow me.”
  - type: text
    content: ' And he rose and followed him.'
  '15':
  - type: text
    content: 'And as he reclined at table in his house, many '
  - type: note
    content: Matt. 11:19; Luke 15:2
  - type: text
    content: 'tax collectors and sinners were reclining with Jesus and his disciples, for there were many who followed him. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Acts 4:5; 23:9
  - type: text
    content: the scribes of
  - type: note
    content: Some manuscripts and
  - type: text
    content: ' the Pharisees, when they saw that he was eating with sinners and tax collectors, said to his disciples, '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: “Why does he eat
  - type: note
    content: Some manuscripts add and drink
  - type: text
    content: ' with tax collectors and sinners?” '
  '17':
  - type: text
    content: 'And when Jesus heard it, he said to them, '
  - type: text
    content: '“Those who are well have no need of a physician, but those who are sick. '
  - type: note
    content: '[Luke 15:7; John 9:39]'
  - type: text
    content: 'I came not to call the righteous, '
  - type: note
    content: 1 Tim. 1:15
  - type: text
    content: but sinners.”
  - type: heading
    content: A Question About Fasting
  '18':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 11:2; 14:12; Luke 11:1; John 1:35; 3:25; 4:1; [Acts 18:25; 19:3]
  - type: text
    content: 'John’s disciples and the Pharisees were fasting. And people came and said to him, '
  - type: note
    content: '[ch. 7:5]'
  - type: text
    content: '“Why do John’s disciples and '
  - type: note
    content: Luke 18:12
  - type: text
    content: 'the disciples of the Pharisees fast, but your disciples do not fast?” '
  '19':
  - type: text
    content: 'And Jesus said to them, '
  - type: note
    content: John 3:29
  - type: text
    content: “Can the wedding guests fast while the bridegroom is with them? As long as they have the bridegroom with them, they cannot fast.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And many were gathered together, so that there was no more room, not even at the door. And he was preaching the word to them. '
  '20':
  - type: note
    content: See Luke 17:22
  - type: text
    content: 'The days will come when the bridegroom is taken away from them, and '
  - type: note
    content: '[John 16:20]'
  - type: text
    content: then they will fast in that day.
  - type: text
    content: ' '
  '21':
  - type: text
    content: No one sews a piece of unshrunk cloth on an old garment. If he does, the patch tears away from it, the new from the old, and a worse tear is made.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And no one puts new wine into old '
  - type: note
    content: Josh. 9:4
  - type: text
    content: wineskins. If he does, the wine will burst the skins—and the wine is destroyed, and so are the skins. But new wine is for fresh wineskins.”
  - type: note
    content: Some manuscripts omit But new wine is for fresh wineskins
  - type: heading
    content: Jesus Is Lord of the Sabbath
  '23':
  - type: text
    content: ' '
  - type: note
    content: For ver. 23-28, see Matt. 12:1-8; Luke 6:1-5
  - type: text
    content: 'One Sabbath he was going through the grainfields, and as they made their way, his disciples '
  - type: note
    content: Deut. 23:25
  - type: text
    content: 'began to pluck heads of grain. '
  '24':
  - type: text
    content: 'And the Pharisees were saying to him, “Look, '
  - type: note
    content: '[Matt. 9:11]'
  - type: text
    content: 'why are they doing '
  - type: note
    content: '[Ex. 20:9-11]'
  - type: text
    content: 'what is not lawful on the Sabbath?” '
  '25':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: See Matt. 21:16
  - type: text
    content: '“Have you never read '
  - type: note
    content: 1 Sam. 21:1-6
  - type: text
    content: 'what David did, when he was in need and was hungry, he and those who were with him:'
  - type: text
    content: ' '
  '26':
  - type: text
    content: how he entered the house of God, in the time of
  - type: note
    content: Or in the passage about
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 24:6; [1 Sam. 21:1; 2 Sam. 8:17]
  - type: text
    content: 'Abiathar the high priest, and ate '
  - type: note
    content: Ex. 25:30; Lev. 24:5-9
  - type: text
    content: the bread of the Presence, which it is not lawful for any but the priests to eat, and also gave it to those who were with him?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: Ex. 23:12; Deut. 5:14
  - type: text
    content: '“The Sabbath was made for man, '
  - type: note
    content: Col. 2:16
  - type: text
    content: not man for the Sabbath.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'So '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: the Son of Man is lord even of the Sabbath.”
  '3':
  - type: note
    content: For ver. 3-12, see Matt. 9:2-8; Luke 5:18-26
  - type: text
    content: 'And they came, bringing to him a paralytic carried by four men. '
  '4':
  - type: text
    content: 'And when they could not get near him because of the crowd, '
  - type: note
    content: '[Luke 5:19]'
  - type: text
    content: 'they removed the roof above him, and when they had made an opening, they let down the bed on which the paralytic lay. '
  '5':
  - type: text
    content: 'And when Jesus '
  - type: note
    content: ch. 10:52; Matt. 8:10, 13; 9:22, 29; 15:28; Luke 7:9, 50; 17:19; 18:42; Acts 3:16; 14:9; James 5:15
  - type: text
    content: 'saw their faith, he said to the paralytic, '
  - type: text
    content: '“Son, '
  - type: note
    content: Luke 7:48; [John 5:14]
  - type: text
    content: your sins are forgiven.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Now some of the scribes were sitting there, questioning in their hearts, '
  '7':
  - type: text
    content: '“Why does this man speak like that? '
  - type: note
    content: ch. 14:64; John 10:36
  - type: text
    content: 'He is blaspheming! '
  - type: note
    content: Ps. 32:5; Isa. 43:25
  - type: text
    content: 'Who can forgive sins but God alone?” '
  '8':
  - type: text
    content: 'And immediately Jesus, '
  - type: note
    content: See John 2:25
  - type: text
    content: 'perceiving in his spirit that they thus questioned within themselves, said to them, '
  - type: text
    content: “Why do you question these things in your hearts?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Which is easier, to say to the paralytic, ‘Your sins are forgiven,’ or to say, ‘Rise, take up your bed and walk’?
  - type: text
    content: ' '
