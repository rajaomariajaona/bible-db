document_id: REV.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Throne in Heaven
  - type: text
    content: 'After this I looked, and behold, a door standing open in heaven! And the first voice, which I had heard speaking to me '
  - type: note
    content: ch. 1:10; [Ex. 19:19, 20]
  - type: text
    content: 'like a trumpet, said, '
  - type: note
    content: ch. 11:12
  - type: text
    content: '“Come up here, and '
  - type: note
    content: ch. 1:1, 19; 22:6
  - type: text
    content: I will show you what must take place after this.”
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'the twenty-four elders '
  - type: note
    content: ch. 5:8, 14; 7:11; 11:16; 19:4
  - type: text
    content: 'fall down before him who is seated on the throne and worship him who lives forever and ever. They cast '
  - type: note
    content: ver. 4
  - type: text
    content: their crowns before the throne, saying,
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 5:12
  - type: text
    content: “Worthy are you, our Lord and God,
  - type: text
    content: to receive glory and honor and power,
  - type: text
    content: 'for '
  - type: note
    content: ch. 10:6; 14:7; Gen. 1:1; Acts 14:15
  - type: text
    content: you created all things,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 33:9-11; [Eph. 1:11]
  - type: text
    content: by your will they existed and were created.”
  '2':
  - type: text
    content: 'At once '
  - type: note
    content: See ch. 1:10
  - type: text
    content: 'I was in the Spirit, and behold, '
  - type: note
    content: Ps. 11:4; 103:19; Isa. 66:1; Matt. 5:34; 23:22; See 1 Kgs. 22:19
  - type: text
    content: 'a throne stood in heaven, with one seated on the throne. '
  '3':
  - type: text
    content: 'And he who sat there had the appearance of '
  - type: note
    content: ch. 21:11
  - type: text
    content: 'jasper and carnelian, and around the throne was '
  - type: note
    content: Ezek. 1:28; [ch. 10:1; Gen. 9:13-17]
  - type: text
    content: 'a rainbow that had the appearance of an emerald. '
  '4':
  - type: text
    content: 'Around the throne were '
  - type: note
    content: ch. 11:16
  - type: text
    content: 'twenty-four thrones, and seated on the thrones were twenty-four elders, '
  - type: note
    content: See ch. 3:4
  - type: text
    content: 'clothed in white garments, with '
  - type: note
    content: ver. 10; See James 1:12
  - type: text
    content: 'golden crowns on their heads. '
  '5':
  - type: text
    content: 'From the throne came '
  - type: note
    content: ch. 8:5; 11:19; 16:18; [Ex. 19:16]
  - type: text
    content: flashes of lightning, and rumblings
  - type: note
    content: Or voices, or sounds
  - type: text
    content: ' and peals of thunder, and before the throne were burning '
  - type: note
    content: '[Zech. 4:2]'
  - type: text
    content: 'seven torches of fire, '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'which are the seven spirits of God, '
  '6':
  - type: text
    content: 'and before the throne there was '
  - type: note
    content: ch. 15:2; [ch. 21:18, 21; Ps. 77:19]
  - type: text
    content: as it were a sea of glass, like crystal.
  - type: text
    content: 'And around the throne, on each side of the throne, are '
  - type: note
    content: Ezek. 1:5
  - type: text
    content: 'four living creatures, '
  - type: note
    content: Ezek. 10:12
  - type: text
    content: 'full of eyes in front and behind: '
  '7':
  - type: note
    content: '[Ezek. 1:10; 10:14]'
  - type: text
    content: 'the first living creature like a lion, the second living creature like an ox, the third living creature with the face of a man, and the fourth living creature like an eagle in flight. '
  '8':
  - type: text
    content: 'And the four living creatures, '
  - type: note
    content: Isa. 6:2
  - type: text
    content: 'each of them with six wings, are '
  - type: note
    content: ver. 6
  - type: text
    content: 'full of eyes all around and within, and '
  - type: note
    content: ch. 14:11
  - type: text
    content: day and night they never cease to say,
  - type: note
    content: Isa. 6:3
  - type: text
    content: “Holy, holy, holy, is the Lord God Almighty,
  - type: note
    content: See ch. 1:4
  - type: text
    content: who was and is and is to come!”
  '9':
  - type: text
    content: 'And whenever the living creatures give glory and honor and thanks to him who is seated on the throne, '
  - type: note
    content: ch. 1:18; 5:13; 15:7; Dan. 4:34; 12:7
  - type: text
    content: 'who lives forever and ever, '
