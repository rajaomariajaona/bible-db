document_id: JOB.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Rebukes Job’s Three Friends
  - type: text
    content: 'So these three men ceased to answer Job, because he was '
  - type: note
    content: See ch. 33:9
  - type: text
    content: 'righteous in his own eyes. '
  '10':
  - type: text
    content: Therefore I say, ‘Listen to me;
  - type: text
    content: let me also declare my opinion.’
  '11':
  - type: text
    content: “Behold, I waited for your words,
  - type: text
    content: I listened for your wise sayings,
  - type: text
    content: while you searched out what to say.
  '12':
  - type: text
    content: I gave you my attention,
  - type: text
    content: and, behold, there was none among you who refuted Job
  - type: text
    content: or who answered his words.
  '13':
  - type: text
    content: 'Beware '
  - type: note
    content: Jer. 9:23
  - type: text
    content: lest you say, ‘We have found wisdom;
  - type: text
    content: God may vanquish him, not a man.’
  '14':
  - type: text
    content: He has not directed his words against me,
  - type: text
    content: and I will not answer him with your speeches.
  '15':
  - type: text
    content: “They are dismayed; they answer no more;
  - type: text
    content: they have not a word to say.
  '16':
  - type: text
    content: And shall I wait, because they do not speak,
  - type: text
    content: because they stand there, and answer no more?
  '17':
  - type: text
    content: I also will answer with my share;
  - type: text
    content: I also will declare my opinion.
  '18':
  - type: text
    content: For I am full of words;
  - type: text
    content: the spirit within me constrains me.
  '19':
  - type: text
    content: Behold, my belly is like wine that has no vent;
  - type: text
    content: 'like new '
  - type: note
    content: Matt. 9:17; [Josh. 9:4]
  - type: text
    content: wineskins ready to burst.
  '2':
  - type: text
    content: 'Then Elihu the son of Barachel '
  - type: note
    content: Gen. 22:21; Jer. 25:23
  - type: text
    content: 'the Buzite, of the family of Ram, burned with anger. He burned with anger at Job because he justified himself '
  - type: note
    content: ch. 4:17; [ch. 34:5; 35:2; 40:8]
  - type: text
    content: 'rather than God. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 39:3 ]'
  - type: text
    content: 'I must speak, that I may find '
  - type: note
    content: 1 Sam. 16:23
  - type: text
    content: relief;
  - type: text
    content: I must open my lips and answer.
  '21':
  - type: text
    content: 'I will not '
  - type: note
    content: Lev. 19:15
  - type: text
    content: show partiality to any man
  - type: text
    content: or use flattery toward any person.
  '22':
  - type: text
    content: For I do not know how to flatter,
  - type: text
    content: else my Maker would soon take me away.
  '3':
  - type: text
    content: 'He burned with anger also at Job’s three friends because they had found no answer, although they had '
  - type: note
    content: ch. 8:6; 22:5
  - type: text
    content: 'declared Job to be in the wrong. '
  '4':
  - type: text
    content: 'Now Elihu had waited to speak to Job because they were older than he. '
  '5':
  - type: text
    content: And when Elihu saw that there was no answer in the mouth of these three men, he burned with anger.
  '6':
  - type: text
    content: 'And Elihu the son of Barachel the Buzite answered and said:'
  - type: text
    content: “I am young in years,
  - type: text
    content: 'and you are '
  - type: note
    content: ch. 15:10
  - type: text
    content: aged;
  - type: text
    content: therefore I was timid and afraid
  - type: text
    content: to declare my opinion to you.
  '7':
  - type: text
    content: I said, ‘Let days speak,
  - type: text
    content: and many years teach wisdom.’
  '8':
  - type: text
    content: 'But it is '
  - type: note
    content: ch. 33:4; 34:14
  - type: text
    content: the spirit in man,
  - type: note
    content: ch. 33:4; Gen. 2:7
  - type: text
    content: 'the breath of the Almighty, that makes him '
  - type: note
    content: ch. 35:11; 38:36; 39:17; 1 Kgs. 3:12; 4:29; Prov. 2:6; Eccles. 2:26; Dan. 1:17; 2:21; James 1:5
  - type: text
    content: understand.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 1:26; [ch. 12:20; Matt. 11:25 ]
  - type: text
    content: It is not the old
  - type: note
    content: Hebrew many [in years]
  - type: text
    content: ' who are wise,'
  - type: text
    content: nor the aged who understand what is right.
