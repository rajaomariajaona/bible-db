    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So he said to Jether his firstborn, “Rise and kill them!” But the young man did not draw his sword, for he was afraid, because he was still a young man. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Zebah and Zalmunna said, “Rise yourself and fall upon us, for as the man is, so is his strength.” And Gideon arose and '
