        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: And he broke down the tower of Penuel and killed the men of the city.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then he said to Zebah and Zalmunna, “Where are the men whom you killed at '
    - type: usfm
