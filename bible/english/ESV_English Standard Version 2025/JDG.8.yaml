document_id: JDG.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Gideon Defeats Zebah and Zalmunna
  - type: text
    content: ' '
  - type: note
    content: '[ch. 12:1; 2 Sam. 19:41 ]'
  - type: text
    content: 'Then the men of Ephraim said to him, “What is this that you have done to us, not to call us when you went to fight against Midian?” And they accused him fiercely. '
  '10':
  - type: text
    content: 'Now Zebah and Zalmunna were in Karkor with their army, about 15,000 men, all who were left of all the army of '
  - type: note
    content: See ch. 6:3
  - type: text
    content: 'the people of the East, for there had fallen 120,000 men '
  - type: note
    content: ch. 20:2, 15, 17, 25, 35, 46; 2 Sam. 24:9; 2 Kgs. 3:26; 1 Chr. 21:5
  - type: text
    content: 'who drew the sword. '
  '11':
  - type: text
    content: 'And Gideon went up by the way of the tent dwellers east of '
  - type: note
    content: Num. 32:35, 42
  - type: text
    content: 'Nobah and Jogbehah and attacked the army, for the army felt '
  - type: note
    content: ch. 18:27
  - type: text
    content: 'secure. '
  '12':
  - type: text
    content: 'And Zebah and Zalmunna fled, and he pursued them '
  - type: note
    content: Ps. 83:11
  - type: text
    content: and captured the two kings of Midian, Zebah and Zalmunna, and he threw all the army into a panic.
  '13':
  - type: text
    content: 'Then Gideon the son of Joash returned from the battle by the ascent of Heres. '
  '14':
  - type: text
    content: 'And he captured a young man of Succoth and questioned him. And he wrote down for him the officials and elders of Succoth, seventy-seven men. '
  '15':
  - type: text
    content: 'And he came to the men of Succoth and said, “Behold Zebah and Zalmunna, about whom you taunted me, saying, '
  - type: note
    content: ver. 6
  - type: text
    content: '‘Are the hands of Zebah and Zalmunna already in your hand, that we should give bread to your men who are exhausted?’” '
  '16':
  - type: text
    content: 'And he took the elders of the city, and he took thorns of the wilderness and briers and with them taught the men of Succoth a lesson. '
  '17':
  - type: note
    content: '[1 Kgs. 12:25]'
  - type: text
    content: And he broke down the tower of Penuel and killed the men of the city.
  '18':
  - type: text
    content: 'Then he said to Zebah and Zalmunna, “Where are the men whom you killed at '
  - type: note
    content: '[ch. 4:6]'
  - type: text
    content: 'Tabor?” They answered, “As you are, so were they. Every one of them resembled the son of a king.” '
  '19':
  - type: text
    content: 'And he said, “They were my brothers, the sons of my mother. '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, if you had saved them alive, I would not kill you.” '
  '2':
  - type: text
    content: 'And he said to them, “What have I done now in comparison with you? Is not '
  - type: note
    content: Isa. 24:13; Jer. 49:9; Obad. 5; Mic. 7:1
  - type: text
    content: 'the gleaning of the grapes of Ephraim better than the grape harvest of Abiezer? '
  '20':
  - type: text
    content: 'So he said to Jether his firstborn, “Rise and kill them!” But the young man did not draw his sword, for he was afraid, because he was still a young man. '
  '21':
  - type: text
    content: 'Then Zebah and Zalmunna said, “Rise yourself and fall upon us, for as the man is, so is his strength.” And Gideon arose and '
  - type: note
    content: Ps. 83:11
  - type: text
    content: 'killed Zebah and Zalmunna, and he took '
  - type: note
    content: ver. 26; Isa. 3:18
  - type: text
    content: the crescent ornaments that were on the necks of their camels.
  - type: heading
    content: Gideon’s Ephod
  '22':
  - type: text
    content: 'Then the men of Israel said to Gideon, “Rule over us, you and your son and your grandson also, for you have saved us from the hand of Midian.” '
  '23':
  - type: text
    content: 'Gideon said to them, “I will not rule over you, and my son will not rule over you; '
  - type: note
    content: '[1 Sam. 8:7; 10:19; 12:12, 17, 19]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will rule over you.” '
  '24':
  - type: text
    content: 'And Gideon said to them, “Let me make a request of you: every one of you give me the earrings from his spoil.” (For they had golden earrings, '
  - type: note
    content: '[Gen. 37:25, 28, 36; 39:1]'
  - type: text
    content: 'because they were Ishmaelites.) '
  '25':
  - type: text
    content: 'And they answered, “We will willingly give them.” And they spread a cloak, and every man threw in it the earrings of his spoil. '
  '26':
  - type: text
    content: And the weight of the golden earrings that he requested was 1,700 shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of gold, besides '
  - type: note
    content: ver. 21
  - type: text
    content: 'the crescent ornaments and '
  - type: note
    content: Isa. 3:19
  - type: text
    content: 'the pendants and the purple garments worn by the kings of Midian, and besides the collars that were around the necks of their camels. '
  '27':
  - type: text
    content: 'And Gideon '
  - type: note
    content: ch. 17:5; 18:14, 17; See Ex. 28:6-35
  - type: text
    content: 'made an ephod of it and put it in his city, '
  - type: note
    content: ch. 6:24
  - type: text
    content: 'in Ophrah. And all Israel '
  - type: note
    content: ver. 33; ch. 2:17; Ex. 34:15; Ps. 106:39
  - type: text
    content: 'whored after it there, and it became a '
  - type: note
    content: Ex. 23:33; Deut. 7:16
  - type: text
    content: 'snare to Gideon and to his family. '
  '28':
  - type: text
    content: 'So Midian was subdued before the people of Israel, and they raised their heads no more. '
  - type: note
    content: '[ch. 3:11; 5:31]'
  - type: text
    content: And the land had rest for forty years in the days of Gideon.
  - type: heading
    content: The Death of Gideon
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:32; 7:1
  - type: text
    content: 'Jerubbaal the son of Joash went and lived in his own house. '
  '3':
  - type: note
    content: ch. 7:24, 25
  - type: text
    content: 'God has given into your hands the princes of Midian, Oreb and Zeeb. What have I been able to do in comparison with you?” '
  - type: note
    content: '[Prov. 15:1]'
  - type: text
    content: Then their anger
  - type: note
    content: Hebrew their spirit
  - type: text
    content: ' against him subsided when he said this.'
  '30':
  - type: text
    content: 'Now Gideon had '
  - type: note
    content: ch. 9:2, 5
  - type: text
    content: seventy sons, his own offspring,
  - type: note
    content: Hebrew who came from his own loins
  - type: text
    content: ' for he had many wives. '
  '31':
  - type: text
    content: 'And his concubine '
  - type: note
    content: ch. 9:1, 2
  - type: text
    content: 'who was in Shechem also bore him a son, and he called his name Abimelech. '
  '32':
  - type: text
    content: 'And Gideon the son of Joash died '
  - type: note
    content: Gen. 15:15; 25:8; Job 5:26
  - type: text
    content: 'in a good old age and was buried in the tomb of Joash his father, '
  - type: note
    content: ch. 6:24
  - type: text
    content: at Ophrah of the Abiezrites.
  '33':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 2:19 ]'
  - type: text
    content: 'As soon as Gideon died, the people of Israel turned again and '
  - type: note
    content: See ver. 27
  - type: text
    content: 'whored after the Baals and made '
  - type: note
    content: ch. 9:4, 46
  - type: text
    content: 'Baal-berith their god. '
  '34':
  - type: text
    content: 'And the people of Israel '
  - type: note
    content: Ps. 78:11, 42; 106:13, 21
  - type: text
    content: 'did not remember the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who had delivered them from the hand of all their enemies on every side, '
  '35':
  - type: note
    content: See ch. 9:16-18
  - type: text
    content: and they did not show steadfast love to the family of Jerubbaal (that is, Gideon) in return for all the good that he had done to Israel.
  '4':
  - type: text
    content: 'And Gideon came to the Jordan and crossed over, he and '
  - type: note
    content: ch. 7:6
  - type: text
    content: 'the 300 men who were with him, exhausted yet pursuing. '
  '5':
  - type: text
    content: 'So he said to the men of '
  - type: note
    content: Gen. 33:17; Ps. 60:6
  - type: text
    content: 'Succoth, “Please give loaves of bread to the people who follow me, for they are exhausted, and I am pursuing after Zebah and Zalmunna, the kings of Midian.” '
  '6':
  - type: text
    content: 'And the officials of Succoth said, '
  - type: note
    content: '[1 Kgs. 20:11]'
  - type: text
    content: '“Are the hands of Zebah and Zalmunna already in your hand, '
  - type: note
    content: '[1 Sam. 25:11]'
  - type: text
    content: 'that we should give bread to your army?” '
  '7':
  - type: text
    content: 'So Gideon said, “Well then, when the '
  - type: text
    content: Lord
  - type: text
    content: ' has given Zebah and Zalmunna into my hand, '
  - type: note
    content: ver. 16
  - type: text
    content: 'I will flail your flesh with the thorns of the wilderness and with briers.” '
  '8':
  - type: text
    content: 'And from there he went up to '
  - type: note
    content: Gen. 32:30, 31; 1 Kgs. 12:25
  - type: text
    content: 'Penuel, and spoke to them in the same way, and the men of Penuel answered him as the men of Succoth had answered. '
  '9':
  - type: text
    content: 'And he said to the men of Penuel, '
  - type: note
    content: '[1 Kgs. 22:27, 28]'
  - type: text
    content: '“When I come again in peace, '
  - type: note
    content: ver. 17
  - type: text
    content: I will break down this tower.”
