      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Tabor?” They answered, “As you are, so were they. Every one of them resembled the son of a king.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And he said, “They were my brothers, the sons of my mother. '
    - type: usfm
