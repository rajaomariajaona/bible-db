document_id: 1CH.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Military Divisions
  - type: text
    content: 'This is the number of the people of Israel, the heads of fathers’ houses, the commanders of thousands and hundreds, and their officers who served the king in all matters concerning the divisions that came and went, month after month throughout the year, each division numbering 24,000:'
  '10':
  - type: text
    content: 'Seventh, for the seventh month, was '
  - type: note
    content: ch. 11:27
  - type: text
    content: 'Helez the Pelonite, of the sons of Ephraim; in his division were 24,000. '
  '11':
  - type: text
    content: 'Eighth, for the eighth month, was '
  - type: note
    content: ch. 11:29; 20:4; 2 Sam. 21:18
  - type: text
    content: 'Sibbecai the Hushathite, of the Zerahites; in his division were 24,000. '
  '12':
  - type: text
    content: 'Ninth, for the ninth month, was '
  - type: note
    content: ch. 11:28
  - type: text
    content: 'Abiezer of Anathoth, a Benjaminite; in his division were 24,000. '
  '13':
  - type: text
    content: 'Tenth, for the tenth month, was '
  - type: note
    content: ch. 11:30
  - type: text
    content: 'Maharai of Netophah, of the Zerahites; in his division were 24,000. '
  '14':
  - type: text
    content: 'Eleventh, for the eleventh month, was '
  - type: note
    content: ch. 11:31
  - type: text
    content: 'Benaiah of Pirathon, of the sons of Ephraim; in his division were 24,000. '
  '15':
  - type: text
    content: 'Twelfth, for the twelfth month, was '
  - type: note
    content: '[2 Sam. 23:29]'
  - type: text
    content: 'Heldai the Netophathite, of '
  - type: note
    content: ch. 4:13; Judg. 1:13; 3:9
  - type: text
    content: Othniel; in his division were 24,000.
  - type: heading
    content: Leaders of Tribes
  '16':
  - type: text
    content: 'Over the tribes of Israel, for the Reubenites, Eliezer the son of Zichri was chief officer; for the Simeonites, Shephatiah the son of Maacah; '
  '17':
  - type: text
    content: 'for Levi, '
  - type: note
    content: ch. 26:30
  - type: text
    content: 'Hashabiah the son of Kemuel; for Aaron, '
  - type: note
    content: ch. 24:3
  - type: text
    content: 'Zadok; '
  '18':
  - type: text
    content: 'for Judah, Elihu, one of David’s brothers; for Issachar, Omri the son of Michael; '
  '19':
  - type: text
    content: 'for Zebulun, Ishmaiah the son of Obadiah; for Naphtali, Jeremoth the son of Azriel; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:11; [ 2 Sam. 23:8 ]
  - type: text
    content: 'Jashobeam the son of Zabdiel was in charge of the first division in the first month; in his division were 24,000. '
  '20':
  - type: text
    content: 'for the Ephraimites, Hoshea the son of Azaziah; for the half-tribe of Manasseh, Joel the son of Pedaiah; '
  '21':
  - type: text
    content: 'for the half-tribe of Manasseh in Gilead, Iddo the son of Zechariah; for Benjamin, Jaasiel the son of Abner; '
  '22':
  - type: text
    content: 'for Dan, Azarel the son of Jeroham. These were the '
  - type: note
    content: ch. 28:1
  - type: text
    content: 'leaders of the tribes of Israel. '
  '23':
  - type: text
    content: 'David did not count those below twenty years of age, for the '
  - type: note
    content: See Gen. 15:5
  - type: text
    content: Lord
  - type: text
    content: ' had promised to make Israel as many as the stars of heaven. '
  '24':
  - type: text
    content: 'Joab the son of Zeruiah began to count, but '
  - type: note
    content: '[ch. 21:5, 6]'
  - type: text
    content: 'did not finish. Yet '
  - type: note
    content: ch. 21:7; 2 Sam. 24:12-15
  - type: text
    content: wrath came upon Israel for this, and the number was not entered in the chronicles of King David.
  '25':
  - type: text
    content: 'Over the king’s treasuries was '
  - type: note
    content: ch. 11:33; 2 Sam. 23:31
  - type: text
    content: 'Azmaveth the son of Adiel; and over the treasuries in the country, in the cities, in the villages, and in the towers, was Jonathan the son of Uzziah; '
  '26':
  - type: text
    content: 'and over those who did the work of the field for tilling the soil was Ezri the son of Chelub; '
  '27':
  - type: text
    content: 'and over the vineyards was Shimei the Ramathite; and over the produce of the vineyards for the wine cellars was Zabdi the Shiphmite. '
  '28':
  - type: text
    content: 'Over the olive and '
  - type: note
    content: 1 Kgs. 10:27; 2 Chr. 1:15; 9:27
  - type: text
    content: 'sycamore trees in the Shephelah was Baal-hanan the Gederite; and over the stores of oil was Joash. '
  '29':
  - type: text
    content: 'Over the herds that pastured in '
  - type: note
    content: ch. 5:16
  - type: text
    content: 'Sharon was Shitrai the Sharonite; over the herds in the valleys was Shaphat the son of Adlai. '
  '3':
  - type: text
    content: 'He was a '
  - type: note
    content: Num. 26:20
  - type: text
    content: 'descendant of Perez and was chief of all the commanders. He served for the first month. '
  '30':
  - type: text
    content: 'Over the camels was Obil the Ishmaelite; and over the donkeys was Jehdeiah the Meronothite. '
  '31':
  - type: text
    content: 'Over the flocks was Jaziz the '
  - type: note
    content: See ch. 5:10
  - type: text
    content: Hagrite. All these were stewards of King David’s property.
  '32':
  - type: text
    content: 'Jonathan, David’s uncle, was a counselor, being a man of understanding and a scribe. He and Jehiel the son of Hachmoni attended the king’s sons. '
  '33':
  - type: note
    content: See 2 Sam. 15:12
  - type: text
    content: 'Ahithophel was the '
  - type: note
    content: See 2 Sam. 15:37
  - type: text
    content: 'king’s counselor, and Hushai the Archite was the king’s friend. '
  '34':
  - type: text
    content: 'Ahithophel was succeeded by Jehoiada the son of '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: 'Benaiah, and '
  - type: note
    content: 1 Kgs. 1:7; [ch. 24:6]
  - type: text
    content: 'Abiathar. Joab was '
  - type: note
    content: '[ch. 11:6]'
  - type: text
    content: commander of the king’s army.
  '4':
  - type: note
    content: 2 Sam. 23:9; [ch. 11:12]
  - type: text
    content: Dodai the Ahohite
  - type: note
    content: Septuagint; Hebrew Ahohite and his division and Mikloth the chief officer
  - type: text
    content: ' was in charge of the division of the second month; in his division were 24,000. '
  '5':
  - type: text
    content: 'The third commander, for the third month, was '
  - type: note
    content: 2 Sam. 8:18
  - type: text
    content: 'Benaiah, the son of Jehoiada the chief priest; in his division were 24,000. '
  '6':
  - type: text
    content: 'This is the Benaiah '
  - type: note
    content: ch. 11:24, 25; 2 Sam. 23:20-28
  - type: text
    content: who was a mighty man of the thirty and in command of the thirty; Ammizabad his son was in charge of his division.
  - type: note
    content: Septuagint, Vulgate; Hebrew was his division
  - type: text
    content: ' '
  '7':
  - type: note
    content: ch. 11:26; 2 Sam. 23:24
  - type: text
    content: 'Asahel the brother of Joab was fourth, for the fourth month, and his son Zebadiah after him; in his division were 24,000. '
  '8':
  - type: text
    content: 'The fifth commander, for the fifth month, was '
  - type: note
    content: '[ch. 11:27; 2 Sam. 23:25]'
  - type: text
    content: 'Shamhuth the Izrahite; in his division were 24,000. '
  '9':
  - type: text
    content: 'Sixth, for the sixth month, was '
  - type: note
    content: ch. 11:28
  - type: text
    content: 'Ira, the son of Ikkesh the Tekoite; in his division were 24,000. '
