document_id: HEB.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Earthly Holy Place
  - type: text
    content: 'Now even the first covenant had regulations for worship and '
  - type: note
    content: Ex. 25:8
  - type: text
    content: 'an earthly place of holiness. '
  '10':
  - type: text
    content: 'but deal only with '
  - type: note
    content: See Lev. 11:2
  - type: text
    content: 'food and drink and '
  - type: note
    content: Mark 7:4, 8; See Lev. 11:25
  - type: text
    content: various washings, regulations for the body imposed until the time of reformation.
  - type: heading
    content: Redemption Through the Blood of Christ
  '11':
  - type: text
    content: 'But when Christ appeared as a high priest '
  - type: note
    content: ch. 10:1
  - type: text
    content: of the good things that have come,
  - type: note
    content: Some manuscripts good things to come
  - type: text
    content: ' then through '
  - type: note
    content: '[ver. 24; ch. 8:2]'
  - type: text
    content: the greater and more perfect tent (
  - type: note
    content: See Mark 14:58
  - type: text
    content: 'not made with hands, that is, not of this creation) '
  '12':
  - type: text
    content: 'he '
  - type: note
    content: ver. 24
  - type: text
    content: 'entered '
  - type: note
    content: ch. 7:27; 10:10
  - type: text
    content: 'once for all into the holy places, not by means of '
  - type: note
    content: ch. 10:4
  - type: text
    content: 'the blood of goats and calves but '
  - type: note
    content: See Acts 20:28
  - type: text
    content: 'by means of his own blood, '
  - type: note
    content: Job 33:24; [Dan. 9:24; 1 Cor. 6:20]
  - type: text
    content: 'thus securing an eternal redemption. '
  '13':
  - type: text
    content: 'For if '
  - type: note
    content: Lev. 16:14-16
  - type: text
    content: 'the blood of goats and bulls, and the sprinkling of defiled persons with '
  - type: note
    content: Num. 19:2, 17, 18
  - type: text
    content: the ashes of a heifer, sanctify
  - type: note
    content: Or For if the sprinkling of defiled persons with the blood of goats and bulls and with the ashes of a heifer sanctifies
  - type: text
    content: ' for the purification of the flesh, '
  '14':
  - type: text
    content: 'how much more will '
  - type: note
    content: ver. 12; 1 John 1:7; Rev. 7:14
  - type: text
    content: 'the blood of Christ, who through the eternal Spirit '
  - type: note
    content: ch. 7:27; 8:3
  - type: text
    content: 'offered himself without blemish to God, '
  - type: note
    content: ch. 1:3; 10:22
  - type: text
    content: purify our
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' conscience '
  - type: note
    content: ch. 6:1
  - type: text
    content: 'from dead works '
  - type: note
    content: Rom. 6:13; 1 Pet. 4:2
  - type: text
    content: to serve the living God.
  '15':
  - type: text
    content: 'Therefore he is '
  - type: note
    content: ch. 8:6; 12:24
  - type: text
    content: 'the mediator of a new covenant, so that '
  - type: note
    content: '[ch. 3:1]; See Rom. 8:28'
  - type: text
    content: 'those who are called may '
  - type: note
    content: '[ch. 10:36; Ex. 32:13]'
  - type: text
    content: 'receive the promised eternal inheritance, '
  - type: note
    content: Rom. 3:24, 25; 5:6
  - type: text
    content: since a death has occurred that redeems them from the transgressions committed under the first covenant.
  - type: note
    content: The Greek word means both covenant and will; also verses 16, 17
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'For where a will is involved, the death of the one who made it must be established. '
  '17':
  - type: text
    content: 'For '
  - type: note
    content: '[Gal. 3:15]'
  - type: text
    content: 'a will takes effect only at death, since it is not in force as long as the one who made it is alive. '
  '18':
  - type: text
    content: 'Therefore not even the first covenant was inaugurated '
  - type: note
    content: Ex. 24:6, 8
  - type: text
    content: 'without blood. '
  '19':
  - type: text
    content: 'For when every commandment of the law had been declared by Moses to all the people, he took '
  - type: note
    content: ver. 12
  - type: text
    content: 'the blood of calves and goats, '
  - type: note
    content: '[Lev. 14:4, 7; Num. 19:6, 17]'
  - type: text
    content: 'with water and scarlet wool and hyssop, and sprinkled both the book itself and all the people, '
  '2':
  - type: text
    content: 'For '
  - type: note
    content: Ex. 26:1
  - type: text
    content: a tent
  - type: note
    content: Or tabernacle; also verses 11, 21
  - type: text
    content: ' was prepared, the first section, in which were '
  - type: note
    content: Ex. 25:31-39; 26:35; 40:4
  - type: text
    content: 'the lampstand and '
  - type: note
    content: Ex. 25:23-29
  - type: text
    content: 'the table and '
  - type: note
    content: Ex. 25:30; Lev. 24:5-8
  - type: text
    content: the bread of the Presence.
  - type: note
    content: Greek the presentation of the loaves
  - type: text
    content: ' It is called the Holy Place. '
  '20':
  - type: text
    content: 'saying, '
  - type: note
    content: Cited from Ex. 24:8; [Matt. 26:28]
  - type: text
    content: '“This is the blood of the covenant that God commanded for you.” '
  '21':
  - type: text
    content: 'And in the same way he sprinkled with the blood both '
  - type: note
    content: '[Ex. 29:12, 36; Lev. 8:15, 19; 16:14, 16; 2 Chr. 29:22]'
  - type: text
    content: 'the tent and all the vessels used in worship. '
  '22':
  - type: text
    content: 'Indeed, under the law almost everything is purified with blood, and '
  - type: note
    content: Lev. 17:11
  - type: text
    content: without the shedding of blood there is no forgiveness of sins.
  '23':
  - type: text
    content: 'Thus it was necessary for '
  - type: note
    content: ch. 8:5
  - type: text
    content: 'the copies of the heavenly things to be purified with these rites, but the heavenly things themselves with better sacrifices than these. '
  '24':
  - type: text
    content: 'For Christ has entered, not into holy places '
  - type: note
    content: ch. 8:2; [ver. 11]
  - type: text
    content: 'made with hands, which are copies of the true things, but into heaven itself, now to appear in the presence of God '
  - type: note
    content: ch. 7:25; See Rom. 8:34
  - type: text
    content: 'on our behalf. '
  '25':
  - type: text
    content: 'Nor was it to offer himself repeatedly, as '
  - type: note
    content: See ver. 7
  - type: text
    content: 'the high priest enters '
  - type: note
    content: ch. 10:19
  - type: text
    content: 'the holy places every year with blood not his own, '
  '26':
  - type: text
    content: 'for then he would have had to suffer repeatedly since the foundation of the world. But as it is, '
  - type: note
    content: 1 John 3:5
  - type: text
    content: 'he has appeared '
  - type: note
    content: ver. 12; ch. 7:27; 10:10; 1 Pet. 3:18
  - type: text
    content: 'once for all '
  - type: note
    content: '[ch. 1:2; 1 Cor. 10:11]'
  - type: text
    content: 'at the end of the ages to put away sin by the sacrifice of himself. '
  '27':
  - type: text
    content: 'And just as '
  - type: note
    content: See Gen. 3:19
  - type: text
    content: 'it is appointed for man to die once, and '
  - type: note
    content: See Matt. 16:27
  - type: text
    content: 'after that comes judgment, '
  '28':
  - type: text
    content: 'so Christ, having been offered once '
  - type: note
    content: Isa. 53:12; 1 Pet. 2:24; 3:18
  - type: text
    content: 'to bear the sins of '
  - type: note
    content: Matt. 20:28; 26:28; Mark 10:45; Rev. 5:9
  - type: text
    content: 'many, will appear '
  - type: note
    content: Acts 1:11
  - type: text
    content: 'a second time, '
  - type: note
    content: See ch. 4:15
  - type: text
    content: 'not to deal with sin but to save those who are eagerly '
  - type: note
    content: Titus 2:13; [Isa. 25:9]
  - type: text
    content: waiting for him.
  '3':
  - type: text
    content: 'Behind '
  - type: note
    content: Ex. 26:31-33; 40:3, 21
  - type: text
    content: the second curtain was a second section
  - type: note
    content: Greek tent; also verses 6, 8
  - type: text
    content: ' called the Most Holy Place, '
  '4':
  - type: text
    content: 'having the golden '
  - type: note
    content: Lev. 16:12, 13
  - type: text
    content: 'altar of incense and '
  - type: note
    content: Ex. 25:10; 26:33; 40:3, 21; Rev. 11:19
  - type: text
    content: 'the ark of the covenant covered on all sides with gold, in which was '
  - type: note
    content: Ex. 16:33, 34
  - type: text
    content: 'a golden urn holding the manna, and '
  - type: note
    content: Num. 17:10
  - type: text
    content: 'Aaron’s staff that budded, and '
  - type: note
    content: Ex. 25:16; 40:20; Deut. 10:2, 5; 1 Kgs. 8:9, 21; 2 Chr. 5:10
  - type: text
    content: 'the tablets of the covenant. '
  '5':
  - type: text
    content: 'Above it were '
  - type: note
    content: Ex. 25:18-22; [1 Kgs. 8:6, 7]
  - type: text
    content: 'the cherubim of glory overshadowing '
  - type: note
    content: Lev. 16:2
  - type: text
    content: the mercy seat. Of these things we cannot now speak in detail.
  '6':
  - type: text
    content: 'These preparations having thus been made, '
  - type: note
    content: '[Num. 28:3]'
  - type: text
    content: 'the priests go regularly into the first section, performing their ritual duties, '
  '7':
  - type: text
    content: 'but into the second only '
  - type: note
    content: Lev. 16:15, 34; [ch. 10:3; Ex. 30:10]
  - type: text
    content: 'the high priest goes, and he but '
  - type: note
    content: Lev. 16:15, 34; [ch. 10:3; Ex. 30:10]
  - type: text
    content: 'once a year, and not without taking blood, '
  - type: note
    content: See ch. 5:3
  - type: text
    content: 'which he offers for himself and for the unintentional sins of the people. '
  '8':
  - type: text
    content: 'By this the Holy Spirit indicates that '
  - type: note
    content: ch. 10:20; [John 14:6]
  - type: text
    content: 'the way into the holy places is not yet opened as long as the first section is still standing '
  '9':
  - type: text
    content: (which is symbolic for the present age).
  - type: note
    content: Or which is symbolic for the age then present
  - type: text
    content: ' According to this arrangement, gifts and sacrifices are offered '
  - type: note
    content: See ch. 7:19
  - type: text
    content: 'that cannot perfect the conscience of the worshiper, '
