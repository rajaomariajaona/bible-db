document_id: MIC.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Oppressors
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 10:1, 2 ]'
  - type: text
    content: Woe to those who devise wickedness
  - type: text
    content: 'and work evil '
  - type: note
    content: '[Ps. 36:4]'
  - type: text
    content: on their beds!
  - type: text
    content: When the morning dawns, they perform it,
  - type: text
    content: because it is in the power of their hand.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:11, 16 ]'
  - type: text
    content: Arise and go,
  - type: text
    content: 'for this is no '
  - type: note
    content: Deut. 12:9; [Heb. 13:14]
  - type: text
    content: place to rest,
  - type: text
    content: 'because of '
  - type: note
    content: Lev. 18:25
  - type: text
    content: uncleanness that destroys
  - type: text
    content: with a grievous destruction.
  '11':
  - type: text
    content: 'If a man should go about and '
  - type: note
    content: Jer. 5:13
  - type: text
    content: utter wind and lies,
  - type: text
    content: 'saying, “I will preach to you '
  - type: note
    content: '[Amos 2:12]'
  - type: text
    content: of wine and strong drink,”
  - type: text
    content: he would be the preacher for this people!
  '12':
  - type: text
    content: I will surely assemble all of you, O Jacob;
  - type: note
    content: '[ 2 Kgs. 25:11 ]'
  - type: text
    content: 'I will gather '
  - type: note
    content: See ch. 4:7
  - type: text
    content: the remnant of Israel;
  - type: text
    content: I will set them together
  - type: text
    content: like sheep in a fold,
  - type: note
    content: '[ Jer. 31:10 ]'
  - type: text
    content: like a flock in its pasture,
  - type: text
    content: a noisy multitude of men.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 25:10 ]'
  - type: text
    content: He who opens the breach goes up before them;
  - type: text
    content: they break through and pass the gate,
  - type: note
    content: '[ch. 4:10 ]'
  - type: text
    content: going out by it.
  - type: text
    content: Their king passes on before them,
  - type: note
    content: '[ Isa. 52:12 ]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' at their head.'
  '2':
  - type: text
    content: 'They covet fields and '
  - type: note
    content: '[Isa. 5:8]'
  - type: text
    content: seize them,
  - type: text
    content: and houses, and take them away;
  - type: text
    content: they oppress a man and his house,
  - type: text
    content: a man and his inheritance.
  '3':
  - type: text
    content: 'Therefore thus says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: 'behold, against '
  - type: note
    content: '[Jer. 8:3; Amos 3:1, 2]'
  - type: text
    content: this family I am devising disaster,
  - type: note
    content: The same Hebrew word can mean evil or disaster, depending on the context
  - type: text
    content: from which you cannot remove your necks,
  - type: text
    content: 'and you '
  - type: note
    content: '[Isa. 2:11, 17]'
  - type: text
    content: shall not walk haughtily,
  - type: note
    content: Amos 5:13
  - type: text
    content: for it will be a time of disaster.
  '4':
  - type: text
    content: 'In that day '
  - type: note
    content: Hab. 2:6; See Num. 23:7
  - type: text
    content: they shall take up a taunt song against you
  - type: text
    content: and moan bitterly,
  - type: text
    content: and say, “We are utterly ruined;
  - type: note
    content: '[ch. 1:15 ]'
  - type: text
    content: he changes the portion of my people;
  - type: note
    content: '[ch. 1:15 ]'
  - type: text
    content: how he removes it from me!
  - type: note
    content: '[ Ps. 68:6 ]'
  - type: text
    content: To an apostate he allots our fields.”
  '5':
  - type: text
    content: 'Therefore you will have none '
  - type: note
    content: Deut. 32:8, 9; [Josh. 14:1, 2]
  - type: text
    content: to cast the line by lot
  - type: text
    content: 'in the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: See Amos 2:12
  - type: text
    content: “Do not preach”—thus they preach—
  - type: note
    content: '[ Amos 8:11, 12 ]'
  - type: text
    content: “one should not preach of such things;
  - type: note
    content: '[ Amos 8:10 ]'
  - type: text
    content: disgrace will not overtake us.”
  '7':
  - type: text
    content: Should this be said, O house of Jacob?
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Has the '
  - type: text
    content: Lord
  - type: text
    content: ' grown impatient?'
  - type: note
    content: Hebrew Has the spirit of the Lord grown short?
  - type: text
    content: Are these his deeds?
  - type: text
    content: Do not my words do good
  - type: text
    content: to him who walks uprightly?
  '8':
  - type: text
    content: 'But lately '
  - type: note
    content: '[2 Chr. 28:8]'
  - type: text
    content: my people have risen up as an enemy;
  - type: text
    content: you strip the rich robe from those who pass by trustingly
  - type: text
    content: with no thought of war.
  - type: note
    content: Or returning from war
  '9':
  - type: text
    content: The women of my people you drive out
  - type: text
    content: from their delightful houses;
  - type: text
    content: from their young children you take away
  - type: text
    content: my splendor forever.
