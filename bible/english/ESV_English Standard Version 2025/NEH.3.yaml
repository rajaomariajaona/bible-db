document_id: NEH.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebuilding the Wall
  - type: text
    content: 'Then '
  - type: note
    content: ver. 20, 21; ch. 13:4, 7, 28
  - type: text
    content: 'Eliashib the high priest rose up with his brothers the priests, and they built '
  - type: note
    content: ver. 32; ch. 12:39; John 5:2
  - type: text
    content: 'the Sheep Gate. They consecrated it and '
  - type: note
    content: ch. 6:1; 7:1
  - type: text
    content: 'set its doors. They consecrated it as far as the Tower of the Hundred, as far as the '
  - type: note
    content: Jer. 31:38; Zech. 14:10
  - type: text
    content: 'Tower of Hananel. '
  '10':
  - type: text
    content: 'Next to them Jedaiah the son of Harumaph repaired opposite his house. And next to him Hattush the son of Hashabneiah repaired. '
  '11':
  - type: text
    content: 'Malchijah the son of Harim and Hasshub the son of Pahath-moab repaired another section and '
  - type: note
    content: ch. 12:38
  - type: text
    content: 'the Tower of the Ovens. '
  '12':
  - type: text
    content: 'Next to him Shallum the son of Hallohesh, '
  - type: note
    content: ver. 9
  - type: text
    content: ruler of half the district of Jerusalem, repaired, he and his daughters.
  '13':
  - type: text
    content: 'Hanun and the inhabitants of Zanoah repaired '
  - type: note
    content: ch. 2:13, 15; 2 Chr. 26:9
  - type: text
    content: 'the Valley Gate. They rebuilt it and '
  - type: note
    content: See ver. 1
  - type: text
    content: set its doors, its bolts, and its bars, and repaired a thousand cubits
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' of the wall, as far as '
  - type: note
    content: ch. 2:13; 12:31
  - type: text
    content: the Dung Gate.
  '14':
  - type: text
    content: 'Malchijah the son of Rechab, ruler of the district of '
  - type: note
    content: Jer. 6:1
  - type: text
    content: 'Beth-haccherem, repaired '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'the Dung Gate. He rebuilt it and '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: set its doors, its bolts, and its bars.
  '15':
  - type: text
    content: 'And Shallum the son of Col-hozeh, ruler of the district of Mizpah, repaired '
  - type: note
    content: ch. 2:14
  - type: text
    content: 'the Fountain Gate. He rebuilt it and covered it and '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'set its doors, its bolts, and its bars. And he built the wall of '
  - type: note
    content: '[Luke 13:4; John 9:7, 11]'
  - type: text
    content: 'the Pool of Shelah of '
  - type: note
    content: 2 Kgs. 25:4
  - type: text
    content: 'the king’s garden, as far as '
  - type: note
    content: ch. 12:37
  - type: text
    content: 'the stairs that go down from the city of David. '
  '16':
  - type: text
    content: 'After him Nehemiah the son of Azbuk, ruler of half the district of Beth-zur, repaired to a point opposite '
  - type: note
    content: 1 Kgs. 2:10; Acts 2:29
  - type: text
    content: 'the tombs of David, as far as '
  - type: note
    content: 2 Kgs. 20:20; Isa. 22:11
  - type: text
    content: 'the artificial pool, and as far as the house of the mighty men. '
  '17':
  - type: text
    content: 'After him the Levites repaired: Rehum the son of Bani. Next to him Hashabiah, ruler of half the district of Keilah, repaired for his district. '
  '18':
  - type: text
    content: 'After him their brothers repaired: Bavvai the son of Henadad, ruler of half the district of Keilah. '
  '19':
  - type: text
    content: 'Next to him Ezer the son of Jeshua, ruler of Mizpah, repaired another section opposite the ascent to the armory at '
  - type: note
    content: 2 Chr. 26:9
  - type: text
    content: the buttress.
  - type: note
    content: Or corner; also verses 20, 24, 25
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And next to him '
  - type: note
    content: Ezra 2:34
  - type: text
    content: the men of Jericho built. And next to them
  - type: note
    content: Hebrew him
  - type: text
    content: ' Zaccur the son of Imri built.'
  '20':
  - type: text
    content: After him Baruch the son of Zabbai repaired
  - type: note
    content: Some manuscripts vigorously repaired
  - type: text
    content: ' another section from the buttress to the door of the house of '
  - type: note
    content: ver. 1
  - type: text
    content: 'Eliashib the high priest. '
  '21':
  - type: text
    content: 'After him '
  - type: note
    content: ver. 4
  - type: text
    content: 'Meremoth the son of Uriah, son of Hakkoz repaired another section from the door of the house of Eliashib to the end of the house of Eliashib. '
  '22':
  - type: text
    content: 'After him the priests, the men of '
  - type: note
    content: ch. 12:28
  - type: text
    content: 'the surrounding area, repaired. '
  '23':
  - type: text
    content: 'After them Benjamin and Hasshub repaired opposite their house. After them Azariah the son of Maaseiah, son of Ananiah repaired beside his own house. '
  '24':
  - type: text
    content: 'After him Binnui the son of Henadad repaired another section, from the house of Azariah to the buttress and to '
  - type: note
    content: '[2 Kgs. 14:13]'
  - type: text
    content: 'the corner. '
  '25':
  - type: text
    content: 'Palal the son of Uzai repaired opposite the buttress and the tower projecting from the upper house of the king at '
  - type: note
    content: Jer. 32:2; 33:1; 37:21; 38:6, 13, 28; 39:14; [ch. 12:39]
  - type: text
    content: 'the court of the guard. After him Pedaiah the son of Parosh '
  '26':
  - type: note
    content: ch. 11:21
  - type: text
    content: 'and the temple servants living on '
  - type: note
    content: 2 Chr. 27:3
  - type: text
    content: 'Ophel repaired to a point opposite '
  - type: note
    content: ch. 8:1, 3, 16; 12:37
  - type: text
    content: 'the Water Gate on the east and the projecting tower. '
  '27':
  - type: text
    content: 'After him '
  - type: note
    content: ver. 5
  - type: text
    content: the Tekoites repaired another section opposite the great projecting tower as far as the wall of Ophel.
  '28':
  - type: text
    content: 'Above '
  - type: note
    content: See 2 Chr. 23:15
  - type: text
    content: 'the Horse Gate the priests repaired, each one opposite his own house. '
  '29':
  - type: text
    content: 'After them Zadok the son of Immer repaired opposite his own house. After him Shemaiah the son of Shecaniah, the keeper of the East Gate, repaired. '
  '3':
  - type: text
    content: 'The sons of Hassenaah built '
  - type: note
    content: ch. 12:39; 2 Chr. 33:14; Zeph. 1:10
  - type: text
    content: 'the Fish Gate. '
  - type: note
    content: '[ch. 2:8]'
  - type: text
    content: 'They laid its beams and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'set its doors, its bolts, and its bars. '
  '30':
  - type: text
    content: 'After him Hananiah the son of Shelemiah and Hanun the sixth son of Zalaph repaired another section. After him '
  - type: note
    content: ver. 4
  - type: text
    content: 'Meshullam the son of Berechiah repaired opposite '
  - type: note
    content: '[ch. 12:44; 13:7]'
  - type: text
    content: 'his chamber. '
  '31':
  - type: text
    content: After him Malchijah, one of the goldsmiths, repaired as far as the house of the temple servants and of the merchants, opposite the Muster Gate,
  - type: note
    content: Or Hammiphkad Gate
  - type: text
    content: ' and to the upper chamber of the corner. '
  '32':
  - type: text
    content: 'And between the upper chamber of the corner and '
  - type: note
    content: See ver. 1
  - type: text
    content: the Sheep Gate the goldsmiths and the merchants repaired.
  '4':
  - type: text
    content: 'And next to them '
  - type: note
    content: ver. 21; Ezra 8:33
  - type: text
    content: 'Meremoth the son of Uriah, son of Hakkoz repaired. And next to them '
  - type: note
    content: ver. 30; Ezra 8:16
  - type: text
    content: 'Meshullam the son of Berechiah, son of Meshezabel repaired. And next to them Zadok the son of Baana repaired. '
  '5':
  - type: text
    content: 'And next to them '
  - type: note
    content: ver. 27; [2 Sam. 14:2]
  - type: text
    content: the Tekoites repaired, but their nobles would not stoop to serve their Lord.
  - type: note
    content: Or lords
  '6':
  - type: text
    content: 'Joiada the son of Paseah and Meshullam the son of Besodeiah '
  - type: note
    content: ch. 12:39
  - type: text
    content: repaired the Gate of Yeshanah.
  - type: note
    content: Or of the old city
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'They laid its beams and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'set its doors, its bolts, and its bars. '
  '7':
  - type: text
    content: 'And next to them repaired Melatiah the Gibeonite and Jadon the Meronothite, the men of Gibeon and of Mizpah, the seat of '
  - type: note
    content: ch. 2:7, 9
  - type: text
    content: 'the governor of the province Beyond the River. '
  '8':
  - type: text
    content: 'Next to them Uzziel the son of Harhaiah, goldsmiths, repaired. Next to him Hananiah, one of the perfumers, repaired, and they restored Jerusalem as far as '
  - type: note
    content: ch. 12:38
  - type: text
    content: 'the Broad Wall. '
  '9':
  - type: text
    content: 'Next to them Rephaiah the son of Hur, '
  - type: note
    content: ver. 12
  - type: text
    content: ruler of half the district of
  - type: note
    content: Or foreman of half the portion assigned to; also verses 12, 14, 15, 16, 17, 18
  - type: text
    content: ' Jerusalem, repaired. '
