document_id: 2CH.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt Plunders Jerusalem
  - type: text
    content: ' '
  - type: note
    content: ch. 11:17
  - type: text
    content: 'When the rule of Rehoboam was established '
  - type: note
    content: ch. 26:16
  - type: text
    content: 'and he was strong, '
  - type: note
    content: See 1 Kgs. 14:22-24
  - type: text
    content: 'he abandoned the law of the '
  - type: text
    content: Lord
  - type: text
    content: ', and all Israel with him. '
  '10':
  - type: text
    content: 'and King Rehoboam made in their place shields of bronze and committed them to the hands of the officers of the guard, who kept the door of the king’s house. '
  '11':
  - type: text
    content: 'And as often as the king went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', the guard came and carried them and brought them back to the guardroom. '
  '12':
  - type: text
    content: 'And when '
  - type: note
    content: '[ch. 7:14; 1 Kgs. 21:29; James 4:10]'
  - type: text
    content: 'he humbled himself the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' turned from him, so as not to make a complete destruction. Moreover, '
  - type: note
    content: '[ch. 19:3]'
  - type: text
    content: conditions were good
  - type: note
    content: Hebrew good things were found
  - type: text
    content: ' in Judah.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 14:21
  - type: text
    content: 'So King Rehoboam grew strong in Jerusalem and reigned. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city that the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen out of all the tribes of Israel to put his name there. His mother’s name was Naamah the Ammonite. '
  '14':
  - type: text
    content: 'And he did evil, '
  - type: note
    content: '[ch. 19:3]'
  - type: text
    content: 'for he did not set his heart to seek the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Kgs. 14:29 ]'
  - type: text
    content: 'Now the acts of Rehoboam, '
  - type: note
    content: ch. 9:29; 1 Chr. 29:29
  - type: text
    content: 'from first to last, are they not written in the chronicles of '
  - type: note
    content: ver. 5; 1 Kgs. 12:22
  - type: text
    content: 'Shemaiah the prophet and of '
  - type: note
    content: ch. 9:29; 13:22
  - type: text
    content: 'Iddo '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: the seer?
  - type: note
    content: After seer, Hebrew adds according to genealogy
  - type: text
    content: ' There were continual wars between Rehoboam and Jeroboam. '
  '16':
  - type: text
    content: 'And Rehoboam slept with his fathers and was buried in the city of David, and '
  - type: note
    content: '[1 Kgs. 14:31]'
  - type: text
    content: Abijah
  - type: note
    content: Spelled Abijam in 1 Kings 14:31
  - type: text
    content: ' his son reigned in his place.'
  '2':
  - type: note
    content: 1 Kgs. 14:25
  - type: text
    content: 'In the fifth year of King Rehoboam, because they had been unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kgs. 11:40
  - type: text
    content: 'Shishak king of Egypt came up against Jerusalem '
  '3':
  - type: text
    content: with 1,200 chariots and 60,000 horsemen. And the people were without number who came with him from Egypt—
  - type: note
    content: ch. 16:8; Nah. 3:9; [Dan. 11:43]
  - type: text
    content: 'Libyans, Sukkiim, and Ethiopians. '
  '4':
  - type: text
    content: 'And he took '
  - type: note
    content: See ch. 11:5-12
  - type: text
    content: 'the fortified cities of Judah and came as far as Jerusalem. '
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 11:2; 1 Kgs. 12:22
  - type: text
    content: 'Shemaiah the prophet came to Rehoboam and to the princes of Judah, who had gathered at Jerusalem because of Shishak, and said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 15:2]'
  - type: text
    content: '‘You abandoned me, so I have abandoned you to the hand of Shishak.’” '
  '6':
  - type: text
    content: 'Then the princes of '
  - type: note
    content: '[ch. 21:2]'
  - type: text
    content: 'Israel and the king humbled themselves and said, '
  - type: note
    content: Ex. 9:27
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous.” '
  '7':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that they humbled themselves, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Shemaiah: '
  - type: note
    content: '[ch. 7:14; 1 Kgs. 21:29; James 4:10]'
  - type: text
    content: '“They have humbled themselves. I will not destroy them, but I will grant them some deliverance, '
  - type: note
    content: '[ch. 34:25]'
  - type: text
    content: 'and my wrath shall not be poured out on Jerusalem by the hand of Shishak. '
  '8':
  - type: text
    content: 'Nevertheless, they shall be servants to him, '
  - type: note
    content: '[Deut. 28:47, 48; Isa. 26:13]'
  - type: text
    content: that they may know my service and the service of the kingdoms of the countries.”
  '9':
  - type: text
    content: ' '
  - type: note
    content: For ver. 9-11, see 1 Kgs. 14:26-28
  - type: text
    content: 'So Shishak king of Egypt came up against Jerusalem. He took away the treasures of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the treasures of the king’s house. He took away everything. He also took away '
  - type: note
    content: ch. 9:15, 16; 1 Kgs. 10:16, 17
  - type: text
    content: 'the shields of gold that Solomon had made, '
