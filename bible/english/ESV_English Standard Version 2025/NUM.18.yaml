document_id: NUM.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of Priests and Levites
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “You and your sons and your father’s house with you shall '
  - type: note
    content: ver. 23; See Ex. 28:38
  - type: text
    content: 'bear iniquity connected with the sanctuary, '
  - type: note
    content: ver. 23
  - type: text
    content: 'and you and your sons with you shall bear iniquity connected with your priesthood. '
  '10':
  - type: text
    content: 'In a most holy place shall you eat it. Every male may eat it; it is holy to you. '
  '11':
  - type: text
    content: 'This also is yours: the contribution of their gift, all the '
  - type: note
    content: Ex. 29:27, 28; Lev. 7:30, 34
  - type: text
    content: 'wave offerings of the people of Israel. I have given them to '
  - type: note
    content: Lev. 10:14; [Deut. 18:3]
  - type: text
    content: 'you, and to your sons and daughters with you, as a perpetual due. '
  - type: note
    content: '[Lev. 22:2, 3, 11-13]'
  - type: text
    content: 'Everyone who is clean in your house may eat it. '
  '12':
  - type: note
    content: Deut. 18:4
  - type: text
    content: 'All the best of the oil and all the best of the wine and of the grain, '
  - type: note
    content: Ex. 23:19; 34:26; Neh. 10:35, 36
  - type: text
    content: 'the firstfruits of what they give to the '
  - type: text
    content: Lord
  - type: text
    content: ', I give to you. '
  '13':
  - type: text
    content: 'The first ripe fruits of all that is in their land, '
  - type: note
    content: Ex. 22:29; Lev. 2:14; Deut. 26:2
  - type: text
    content: 'which they bring to the '
  - type: text
    content: Lord
  - type: text
    content: ', shall be yours. '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'Everyone who is clean in your house may eat it. '
  '14':
  - type: note
    content: Lev. 27:28
  - type: text
    content: 'Every devoted thing in Israel shall be yours. '
  '15':
  - type: note
    content: See Ex. 13:2
  - type: text
    content: 'Everything that opens the womb of all flesh, whether man or beast, which they offer to the '
  - type: text
    content: Lord
  - type: text
    content: ', shall be yours. Nevertheless, '
  - type: note
    content: Ex. 13:13; 34:20
  - type: text
    content: 'the firstborn of man you shall redeem, and the firstborn of unclean animals you shall redeem. '
  '16':
  - type: text
    content: 'And their redemption price '
  - type: note
    content: ch. 3:47; Lev. 27:2, 6
  - type: text
    content: (at a month old you shall redeem them) you shall fix at five shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' in silver, according to the shekel of the sanctuary, '
  - type: note
    content: See Ex. 30:13
  - type: text
    content: 'which is twenty gerahs. '
  '17':
  - type: note
    content: Deut. 15:19
  - type: text
    content: 'But the firstborn of a cow, or the firstborn of a sheep, or the firstborn of a goat, you shall not redeem; they are holy. You shall sprinkle their blood on the altar and shall burn their fat as a food offering, with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'But their flesh shall be yours, as '
  - type: note
    content: Ex. 29:26, 28; Lev. 7:31, 32, 34
  - type: text
    content: 'the breast that is waved and as the right thigh are yours. '
  '19':
  - type: note
    content: ver. 11
  - type: text
    content: 'All the holy contributions that the people of Israel present to the '
  - type: text
    content: Lord
  - type: text
    content: ' I give to you, and to your sons and daughters with you, as a perpetual due. '
  - type: note
    content: Lev. 2:13; 2 Chr. 13:5
  - type: text
    content: 'It is a covenant of salt forever before the '
  - type: text
    content: Lord
  - type: text
    content: ' for you and for your offspring with you.” '
  '2':
  - type: text
    content: 'And with you bring your brothers also, the tribe of Levi, the tribe of your father, that they may '
  - type: note
    content: '[Gen. 29:34]'
  - type: text
    content: 'join you and '
  - type: note
    content: See ch. 3:6-10
  - type: text
    content: 'minister to you while you and your sons with you are before the tent of the testimony. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “You shall have no inheritance in their land, neither shall you have any portion among them. '
  - type: note
    content: ver. 23, 24; Deut. 10:9; 12:12; 14:27; 18:1, 2; Josh. 13:33; 14:3; 18:7; Ezek. 44:28
  - type: text
    content: I am your portion and your inheritance among the people of Israel.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ver. 24, 26 ; Lev. 27:30, 32; Deut. 14:22; Neh. 10:37; 12:44; Heb. 7:5, 8, 9; [Gen. 14:20; 28:22]
  - type: text
    content: '“To the Levites I have given every tithe in Israel for an inheritance, in return for their service that they do, their service in the tent of meeting, '
  '22':
  - type: note
    content: See ch. 1:51
  - type: text
    content: 'so that the people of Israel do not come near the tent of meeting, '
  - type: note
    content: Lev. 22:9
  - type: text
    content: 'lest they bear sin and die. '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ch. 3:7
  - type: text
    content: 'the Levites shall do the service of the tent of meeting, '
  - type: note
    content: ver. 1
  - type: text
    content: 'and they shall bear their iniquity. It shall be a perpetual statute throughout your generations, and among the people of Israel they shall have no inheritance. '
  '24':
  - type: text
    content: 'For the tithe of the people of Israel, which '
  - type: note
    content: ver. 19, 26, 29
  - type: text
    content: 'they present as a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: ', I have given to the Levites for an inheritance. Therefore I have said of them that they shall have no inheritance '
  - type: note
    content: ver. 20, 21, 26
  - type: text
    content: among the people of Israel.”
  '25':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '26':
  - type: text
    content: '“Moreover, you shall speak and say to the Levites, ‘When you take from the people of Israel the tithe that I have given you from them for your inheritance, then you shall present a contribution from it to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Neh. 10:38
  - type: text
    content: 'a tithe of the tithe. '
  '27':
  - type: note
    content: ver. 30
  - type: text
    content: 'And your contribution shall be counted to you as though it were the grain of the threshing floor, and as the fullness of the winepress. '
  '28':
  - type: text
    content: 'So you shall also present a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: ' from all your tithes, which you receive from the people of Israel. And from it you shall give the '
  - type: text
    content: Lord
  - type: text
    content: '’s contribution to Aaron the priest. '
  '29':
  - type: text
    content: 'Out of all the gifts to you, you shall present every contribution due to the '
  - type: text
    content: Lord
  - type: text
    content: '; from each its best part is to be dedicated.’ '
  '3':
  - type: text
    content: 'They shall keep guard over you and '
  - type: note
    content: ch. 3:25, 31, 36
  - type: text
    content: 'over the whole tent, '
  - type: note
    content: ch. 16:40
  - type: text
    content: 'but shall not come near to the vessels of the sanctuary or to the altar '
  - type: note
    content: ch. 4:15
  - type: text
    content: 'lest they, and you, die. '
  '30':
  - type: text
    content: 'Therefore you shall say to them, ‘When you have offered from it the best of it, '
  - type: note
    content: ver. 27
  - type: text
    content: 'then the rest shall be counted to the Levites as produce of the threshing floor, and as produce of the winepress. '
  '31':
  - type: text
    content: 'And you may eat it in any place, you and your households, for it is '
  - type: note
    content: '[Matt. 10:10; Luke 10:7; 1 Tim. 5:17, 18]; See 1 Cor. 9:4-14'
  - type: text
    content: 'your reward in return for your service in the tent of meeting. '
  '32':
  - type: text
    content: 'And you shall '
  - type: note
    content: Lev. 19:8; 22:16
  - type: text
    content: 'bear no sin by reason of it, when you have contributed the best of it. But you shall not '
  - type: note
    content: Lev. 22:2, 15
  - type: text
    content: profane the holy things of the people of Israel, lest you die.’”
  '4':
  - type: text
    content: 'They shall join you and keep guard over the tent of meeting for all the service of the tent, '
  - type: note
    content: See ch. 17:13
  - type: text
    content: 'and no outsider shall come near you. '
  '5':
  - type: text
    content: 'And you shall '
  - type: note
    content: ch. 3:38; Ex. 27:21; 30:7; Lev. 24:3
  - type: text
    content: 'keep guard over the sanctuary and over the altar, '
  - type: note
    content: See Lev. 10:6
  - type: text
    content: 'that there may never again be wrath on the people of Israel. '
  '6':
  - type: note
    content: ch. 3:12, 45
  - type: text
    content: 'And behold, I have taken your brothers the Levites from among the people of Israel. '
  - type: note
    content: ch. 3:9; 8:19
  - type: text
    content: 'They are a gift to you, given to the '
  - type: text
    content: Lord
  - type: text
    content: ', to do the service of the tent of meeting. '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: ch. 3:10
  - type: text
    content: 'you and your sons with you shall guard your priesthood for all that concerns the altar and '
  - type: note
    content: Heb. 9:3, 6
  - type: text
    content: that is within the veil; and you shall serve. I give your priesthood as a gift,
  - type: note
    content: Hebrew service of gift
  - type: text
    content: ' and '
  - type: note
    content: See ch. 1:51
  - type: text
    content: any outsider who comes near shall be put to death.”
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Aaron, “Behold, '
  - type: note
    content: ch. 5:9; Lev. 7:32
  - type: text
    content: 'I have given you charge of the contributions made to me, all the consecrated things of the people of Israel. I have given them to you '
  - type: note
    content: Ex. 29:29; 40:13, 15
  - type: text
    content: 'as a portion and to your sons as a perpetual due. '
  '9':
  - type: text
    content: 'This shall be yours of the most holy things, reserved from the fire: every offering of theirs, every grain offering of theirs and every '
  - type: note
    content: Lev. 4:22, 27; 6:25, 26
  - type: text
    content: 'sin offering of theirs and every '
  - type: note
    content: Lev. 7:7; 14:13
  - type: text
    content: 'guilt offering of theirs, which they render to me, shall be most holy to you and to your sons. '
