document_id: LEV.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws About Leprosy
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: 'and the priest shall look. And if there is a '
  - type: note
    content: '[Num. 12:10, 12; 2 Kgs. 5:27; 15:5; 2 Chr. 26:20, 21]'
  - type: text
    content: 'white swelling in the skin that has turned the hair white, and there is raw flesh in the swelling, '
  '11':
  - type: text
    content: 'it is a chronic leprous disease in the skin of his body, and the priest shall pronounce him unclean. '
  - type: note
    content: '[ver. 4, 5]'
  - type: text
    content: 'He shall not shut him up, for he is unclean. '
  '12':
  - type: text
    content: 'And if the leprous disease breaks out in the skin, so that the leprous disease covers all the skin of the diseased person from head to foot, so far as the priest can see, '
  '13':
  - type: text
    content: 'then the priest shall look, and if the leprous disease has covered all his body, he shall pronounce him clean of the disease; it has all turned white, and he is clean. '
  '14':
  - type: text
    content: 'But when raw flesh appears on him, he shall be unclean. '
  '15':
  - type: text
    content: 'And the priest shall examine the raw flesh and pronounce him unclean. Raw flesh is unclean, for it is a leprous disease. '
  '16':
  - type: text
    content: 'But if the raw flesh recovers and turns white again, then he shall come to the priest, '
  '17':
  - type: text
    content: and the priest shall examine him, and if the disease has turned white, then the priest shall pronounce the diseased person clean; he is clean.
  '18':
  - type: text
    content: '“If there is in the skin of one’s body a '
  - type: note
    content: See Ex. 9:9
  - type: text
    content: 'boil and it heals, '
  '19':
  - type: text
    content: 'and in the place of the boil there comes a white swelling or a '
  - type: note
    content: ver. 24
  - type: text
    content: 'reddish-white spot, then it shall be shown to the priest. '
  '2':
  - type: text
    content: '“When a person has on the skin of his body a '
  - type: note
    content: ch. 14:56
  - type: text
    content: swelling or an eruption or a spot, and it turns into a case of leprous
  - type: note
    content: Leprosy was a term for several skin diseases
  - type: text
    content: ' disease on the skin of his body, '
  - type: note
    content: Deut. 24:8
  - type: text
    content: 'then he shall be brought to Aaron the priest or to one of his sons the priests, '
  '20':
  - type: text
    content: 'And the priest shall look, and if it appears deeper than the skin and its hair has turned white, then the priest shall pronounce him unclean. It is a case of leprous disease that has broken out in the boil. '
  '21':
  - type: text
    content: 'But if the priest examines it and there is no white hair in it and it is not deeper than the skin, but has faded, then the priest shall shut him up seven days. '
  '22':
  - type: text
    content: 'And if it spreads in the skin, then the priest shall pronounce him unclean; it is a disease. '
  '23':
  - type: text
    content: 'But '
  - type: note
    content: ver. 28
  - type: text
    content: if the spot remains in one place and does not spread, it is the scar of the boil, and the priest shall pronounce him clean.
  '24':
  - type: text
    content: '“Or, when the body has a burn on its skin and the raw flesh of the burn becomes a spot, '
  - type: note
    content: ver. 19
  - type: text
    content: 'reddish-white or white, '
  '25':
  - type: text
    content: 'the priest shall examine it, and if the hair in the spot has turned white and it appears deeper than the skin, then it is a leprous disease. It has broken out in the burn, and the priest shall pronounce him unclean; it is a case of leprous disease. '
  '26':
  - type: text
    content: 'But if the priest examines it and there is no white hair in the spot and it is no deeper than the skin, but has faded, the priest shall shut him up seven days, '
  '27':
  - type: text
    content: 'and the priest shall examine him the seventh day. If it is spreading in the skin, then the priest shall pronounce him unclean; it is a case of leprous disease. '
  '28':
  - type: text
    content: 'But if the spot remains '
  - type: note
    content: ver. 23
  - type: text
    content: in one place and does not spread in the skin, but has faded, it is a swelling from the burn, and the priest shall pronounce him clean, for it is the scar of the burn.
  '29':
  - type: text
    content: '“When a man or woman has a disease on the head or the beard, '
  '3':
  - type: text
    content: 'and the priest shall examine the diseased area on the skin of his body. And if the hair in the diseased area has turned white and the disease appears to be deeper than the skin of his body, it is a case of leprous disease. When the priest has examined him, he shall pronounce him unclean. '
  '30':
  - type: text
    content: 'the priest shall examine the disease. And if it appears deeper than the skin, and the hair in it is yellow and thin, then the priest shall pronounce him unclean. It is an itch, a leprous disease of the head or the beard. '
  '31':
  - type: text
    content: 'And if the priest examines the itching disease and it appears no deeper than the skin and there is no black hair in it, then the priest shall shut up the person with the itching disease for seven days, '
  '32':
  - type: text
    content: 'and on the seventh day the priest shall examine the disease. If the itch has not spread, and there is in it no yellow hair, and the itch appears to be no deeper than the skin, '
  '33':
  - type: text
    content: 'then he shall shave himself, but the itch he shall not shave; and the priest shall shut up the person with the itching disease for another seven days. '
  '34':
  - type: text
    content: 'And on the seventh day the priest shall examine the itch, and if the itch has not spread in the skin and it appears to be no deeper than the skin, then the priest shall pronounce him clean. And '
  - type: note
    content: ver. 6
  - type: text
    content: 'he shall wash his clothes and be clean. '
  '35':
  - type: text
    content: 'But if the itch spreads in the skin after his cleansing, '
  '36':
  - type: text
    content: 'then the priest shall examine him, and if the itch has spread in the skin, the priest need not seek for the yellow hair; he is unclean. '
  '37':
  - type: text
    content: But if in his eyes the itch is unchanged and black hair has grown in it, the itch is healed and he is clean, and the priest shall pronounce him clean.
  '38':
  - type: text
    content: '“When a man or a woman has spots on the skin of the body, white spots, '
  '39':
  - type: text
    content: the priest shall look, and if the spots on the skin of the body are of a dull white, it is leukoderma that has broken out in the skin; he is clean.
  '4':
  - type: text
    content: 'But if the spot is white in the skin of his body and appears no deeper than the skin, and the hair in it has not turned white, '
  - type: note
    content: '[ver. 11]'
  - type: text
    content: 'the priest shall shut up the diseased person for seven days. '
  '40':
  - type: text
    content: '“If a man’s hair falls out from his head, he is bald; he is clean. '
  '41':
  - type: text
    content: 'And if a man’s hair falls out from his forehead, he has baldness of the forehead; he is clean. '
  '42':
  - type: text
    content: 'But if there is on the bald head or the bald forehead a reddish-white diseased area, it is a leprous disease breaking out on his bald head or his bald forehead. '
  '43':
  - type: text
    content: 'Then the priest shall examine him, and if the diseased swelling is reddish-white on his bald head or on his bald forehead, like the appearance of leprous disease in the skin of the body, '
  '44':
  - type: text
    content: he is a leprous man, he is unclean. The priest must pronounce him unclean; his disease is on his head.
  '45':
  - type: text
    content: '“The leprous person who has the disease shall wear torn clothes and '
  - type: note
    content: ch. 10:6
  - type: text
    content: 'let the hair of his head hang loose, and he shall '
  - type: note
    content: Ezek. 24:17, 22; Mic. 3:7
  - type: text
    content: cover his upper lip
  - type: note
    content: Or mustache
  - type: text
    content: ' and cry out, '
  - type: note
    content: '[Lam. 4:15]'
  - type: text
    content: '‘Unclean, unclean.’ '
  '46':
  - type: text
    content: 'He shall remain unclean as long as he has the disease. He is unclean. He shall live alone. His dwelling shall be '
  - type: note
    content: Num. 5:2; 12:14, 15; [2 Kgs. 7:3; 15:5; 2 Chr. 26:21; Luke 17:12]
  - type: text
    content: outside the camp.
  '47':
  - type: text
    content: '“When there is a case of leprous disease in a '
  - type: note
    content: '[Jude 23; Rev. 3:4]'
  - type: text
    content: 'garment, whether a woolen or a linen garment, '
  '48':
  - type: text
    content: 'in warp or woof of linen or wool, or in a skin or in anything made of skin, '
  '49':
  - type: text
    content: 'if the disease is greenish or reddish in the garment, or in the skin or in the warp or the woof or in any article made of skin, it is a case of leprous disease, and it shall be shown to the priest. '
  '5':
  - type: text
    content: 'And the priest shall examine him on the seventh day, and if in his eyes the disease is checked and the disease has not spread in the skin, then the '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'priest shall shut him up for another seven days. '
  '50':
  - type: text
    content: 'And the priest shall examine the disease and shut up that which has the disease for seven days. '
  '51':
  - type: text
    content: 'Then he shall examine the disease on the seventh day. If the disease has spread in the garment, in the warp or the woof, or in the skin, whatever be the use of the skin, the disease is a '
  - type: note
    content: ch. 14:44
  - type: text
    content: 'persistent leprous disease; it is unclean. '
  '52':
  - type: text
    content: And he shall burn the garment, or the warp or the woof, the wool or the linen, or any article made of skin that is diseased, for it is a persistent leprous disease. It shall be burned in the fire.
  '53':
  - type: text
    content: '“And if the priest examines, and if the disease has not spread in the garment, in the warp or the woof or in any article made of skin, '
  '54':
  - type: text
    content: 'then the priest shall command that they wash the thing in which is the disease, and he shall shut it up for another seven days. '
  '55':
  - type: text
    content: And the priest shall examine the diseased thing after it has been washed. And if the appearance of the diseased area has not changed, though the disease has not spread, it is unclean. You shall burn it in the fire, whether the rot is on the back or on the front.
  '56':
  - type: text
    content: '“But if the priest examines, and if the diseased area has faded after it has been washed, he shall tear it out of the garment or the skin or the warp or the woof. '
  '57':
  - type: text
    content: 'Then if it appears again in the garment, in the warp or the woof, or in any article made of skin, it is spreading. You shall burn with fire whatever has the disease. '
  '58':
  - type: text
    content: But the garment, or the warp or the woof, or any article made of skin from which the disease departs when you have washed it, shall then be washed a second time, and be clean.”
  '59':
  - type: text
    content: This is the law for a case of leprous disease in a garment of wool or linen, either in the warp or the woof, or in any article made of skin, to determine whether it is clean or unclean.
  '6':
  - type: text
    content: 'And the priest shall examine him again on the seventh day, and if the diseased area has faded and the disease has not spread in the skin, then the priest shall pronounce him clean; it is only an eruption. And '
  - type: note
    content: See ch. 11:25
  - type: text
    content: 'he shall wash his clothes and be clean. '
  '7':
  - type: text
    content: 'But if the eruption spreads in the skin, after he has shown himself to the priest for his cleansing, he shall appear again before the priest. '
  '8':
  - type: text
    content: And the priest shall look, and if the eruption has spread in the skin, then the priest shall pronounce him unclean; it is a leprous disease.
  '9':
  - type: text
    content: '“When a man is afflicted with a leprous disease, he shall be brought to the priest, '
