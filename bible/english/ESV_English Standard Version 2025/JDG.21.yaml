document_id: JDG.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Wives Provided for the Tribe of Benjamin
  - type: text
    content: 'Now the men of Israel had sworn '
  - type: note
    content: ver. 18; ch. 20:1
  - type: text
    content: 'at Mizpah, “No one of us shall give his daughter in marriage to Benjamin.” '
  '10':
  - type: text
    content: 'So the congregation sent 12,000 of their bravest men there and commanded them, '
  - type: note
    content: '[ver. 5]'
  - type: text
    content: '“Go and strike the inhabitants of Jabesh-gilead with the edge of the sword; also the women and the little ones. '
  '11':
  - type: text
    content: 'This is what you shall do: '
  - type: note
    content: Num. 31:17
  - type: text
    content: 'every male and every woman that has lain with a male you shall devote to destruction.” '
  '12':
  - type: text
    content: 'And they found among the inhabitants of Jabesh-gilead 400 young virgins who had not known a man by lying with him, and they brought them to the camp at '
  - type: note
    content: Josh. 18:1
  - type: text
    content: Shiloh, which is in the land of Canaan.
  '13':
  - type: text
    content: 'Then the whole congregation sent word to the people of Benjamin who were at the '
  - type: note
    content: ch. 20:47
  - type: text
    content: 'rock of Rimmon and '
  - type: note
    content: Deut. 20:10
  - type: text
    content: 'proclaimed peace to them. '
  '14':
  - type: text
    content: 'And Benjamin returned at that time. And they gave them the women whom they had saved alive of the women of Jabesh-gilead, but they were not enough for them. '
  '15':
  - type: text
    content: 'And the people '
  - type: note
    content: ver. 6
  - type: text
    content: 'had compassion on Benjamin because the '
  - type: text
    content: Lord
  - type: text
    content: ' had made a breach in the tribes of Israel.'
  '16':
  - type: text
    content: 'Then the elders of the congregation said, '
  - type: note
    content: ver. 7
  - type: text
    content: '“What shall we do for wives for those who are left, since the women are destroyed out of Benjamin?” '
  '17':
  - type: text
    content: 'And they said, “There must be an inheritance for the survivors of Benjamin, that a tribe not be blotted out from Israel. '
  '18':
  - type: text
    content: 'Yet we cannot give them wives from our daughters.” '
  - type: note
    content: ver. 1
  - type: text
    content: 'For the people of Israel had sworn, “Cursed be he who gives a wife to Benjamin.” '
  '19':
  - type: text
    content: 'So they said, “Behold, there is the yearly feast of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Shiloh, which is north of Bethel, on the east of '
  - type: note
    content: '[ch. 20:31]'
  - type: text
    content: 'the highway that goes up from Bethel to Shechem, and south of Lebonah.” '
  '2':
  - type: text
    content: 'And the people came to '
  - type: note
    content: ch. 20:18, 26, 31
  - type: text
    content: 'Bethel and sat there till evening before God, and they lifted up their voices and wept bitterly. '
  '20':
  - type: text
    content: 'And they commanded the people of Benjamin, saying, “Go and lie in ambush in the vineyards '
  '21':
  - type: text
    content: 'and watch. If the daughters of Shiloh come out to '
  - type: note
    content: ch. 11:34; Ex. 15:20
  - type: text
    content: 'dance in the dances, then come out of the vineyards and snatch each man his wife from the daughters of Shiloh, and go to the land of Benjamin. '
  '22':
  - type: text
    content: 'And when their fathers or their brothers come to complain to us, we will say to them, ‘Grant them graciously to us, because we did not take for each man of them his wife in battle, neither did you give them to them, else you would now be guilty.’” '
  '23':
  - type: text
    content: 'And the people of Benjamin did so and took their wives, according to their number, from the dancers whom they carried off. Then they went and returned to their inheritance '
  - type: note
    content: '[ch. 20:48]'
  - type: text
    content: 'and rebuilt the towns and lived in them. '
  '24':
  - type: text
    content: And the people of Israel departed from there at that time, every man to his tribe and family, and they went out from there every man to his inheritance.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:6; 18:1; 19:1
  - type: text
    content: In those days there was no king in Israel. Everyone did what was right in his own eyes.
  '3':
  - type: text
    content: 'And they said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, why has this happened in Israel, that today there should be one tribe lacking in Israel?” '
  '4':
  - type: text
    content: 'And the next day the people rose early and '
  - type: note
    content: '[2 Sam. 24:25]'
  - type: text
    content: 'built there an altar and offered burnt offerings and peace offerings. '
  '5':
  - type: text
    content: 'And the people of Israel said, “Which of all the tribes of Israel did not come up in the assembly to the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  - type: note
    content: '[ch. 5:23]'
  - type: text
    content: 'For they had taken a great oath concerning him who did not come up to the '
  - type: text
    content: Lord
  - type: text
    content: ' to Mizpah, saying, “He shall surely be put to death.” '
  '6':
  - type: text
    content: 'And the people of Israel '
  - type: note
    content: ver. 15
  - type: text
    content: 'had compassion for Benjamin their brother and said, “One tribe is cut off from Israel this day. '
  '7':
  - type: note
    content: ver. 16
  - type: text
    content: 'What shall we do for wives for those who are left, since we have sworn by the '
  - type: text
    content: Lord
  - type: text
    content: ' that we will not give them any of our daughters for wives?”'
  '8':
  - type: text
    content: 'And they said, “What one is there of the tribes of Israel that did not come up to the '
  - type: text
    content: Lord
  - type: text
    content: ' to Mizpah?” And behold, no one had come to the camp from '
  - type: note
    content: 1 Sam. 11:1; 31:11-13
  - type: text
    content: 'Jabesh-gilead, to the assembly. '
  '9':
  - type: text
    content: 'For when the people were mustered, behold, not one of the inhabitants of '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'Jabesh-gilead was there. '
