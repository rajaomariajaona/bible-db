document_id: MAT.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Visit of the Wise Men
  - type: text
    content: 'Now '
  - type: note
    content: Luke 2:4-7
  - type: text
    content: 'after Jesus was born in '
  - type: note
    content: Luke 2:15; John 7:42
  - type: text
    content: 'Bethlehem of Judea '
  - type: note
    content: Luke 1:5
  - type: text
    content: in the days of Herod the king, behold, wise men
  - type: note
    content: Greek magi; also verses 7, 16
  - type: text
    content: ' from '
  - type: note
    content: '[Gen. 25:6; 1 Kgs. 4:30]'
  - type: text
    content: 'the east came to Jerusalem, '
  '10':
  - type: text
    content: 'When they saw the star, they rejoiced exceedingly with great joy. '
  '11':
  - type: text
    content: 'And going into the house, they saw the child with Mary his mother, and they fell down and worshiped him. Then, opening their treasures, '
  - type: note
    content: '[1 Sam. 9:7; Ps. 72:10]'
  - type: text
    content: 'they offered him gifts, '
  - type: note
    content: Isa. 60:6
  - type: text
    content: 'gold and '
  - type: note
    content: Rev. 18:13
  - type: text
    content: 'frankincense and '
  - type: note
    content: Ex. 30:23; Ps. 45:8; John 19:39
  - type: text
    content: 'myrrh. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: ver. 22; [ver. 13, 19]
  - type: text
    content: 'being warned '
  - type: note
    content: '[ch. 27:19; Gen. 20:6; 31:11; Num. 12:6; Job 33:15]'
  - type: text
    content: in a dream not to return to Herod, they departed to their own country by another way.
  - type: heading
    content: The Flight to Egypt
  '13':
  - type: text
    content: 'Now when they had departed, behold, '
  - type: note
    content: ver. 19; ch. 1:20; [ver. 12, 22]
  - type: text
    content: 'an angel of the Lord appeared to Joseph in a dream and said, “Rise, take the child and his mother, and flee to Egypt, and remain there until I tell you, for Herod is about to search for the child, to destroy him.” '
  '14':
  - type: text
    content: 'And he rose and took the child and his mother by night and departed to Egypt '
  '15':
  - type: text
    content: 'and remained there until the death of Herod. '
  - type: note
    content: See ch. 1:22
  - type: text
    content: 'This was to fulfill what the Lord had spoken by the prophet, '
  - type: note
    content: Cited from Hos. 11:1
  - type: text
    content: “Out of Egypt I called my son.”
  - type: heading
    content: Herod Kills the Children
  '16':
  - type: text
    content: 'Then Herod, when he saw that he had been tricked by the wise men, became furious, and he sent and killed all the male children in Bethlehem and in all that region who were two years old or under, according to the time that he had ascertained from the wise men. '
  '17':
  - type: note
    content: ch. 27:9; [ch. 1:22]
  - type: text
    content: 'Then was fulfilled what was spoken by the prophet Jeremiah:'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cited from Jer. 31:15
  - type: text
    content: “A voice was heard in Ramah,
  - type: text
    content: weeping and loud lamentation,
  - type: text
    content: Rachel weeping for her children;
  - type: text
    content: 'she refused to be comforted, because they '
  - type: note
    content: Gen. 42:13, 36; Lam. 5:7
  - type: text
    content: are no more.”
  - type: heading
    content: The Return to Nazareth
  '19':
  - type: text
    content: 'But when Herod died, behold, an angel of the Lord appeared in a dream to Joseph in Egypt, '
  '2':
  - type: text
    content: 'saying, “Where is he who has been born '
  - type: note
    content: ch. 27:11, 37; Jer. 23:5; 30:9; Zech. 9:9
  - type: text
    content: 'king of the Jews? For we saw '
  - type: note
    content: '[Num. 24:17; Rev. 22:16]'
  - type: text
    content: his star when it rose
  - type: note
    content: Or in the east; also verse 9
  - type: text
    content: ' and have come to '
  - type: note
    content: See ch. 8:2
  - type: text
    content: 'worship him.” '
  '20':
  - type: text
    content: 'saying, “Rise, take the child and his mother and go to the land of Israel, for '
  - type: note
    content: '[Ex. 4:19]'
  - type: text
    content: 'those who sought the child’s life are dead.” '
  '21':
  - type: text
    content: 'And he rose and took the child and his mother and went to the land of Israel. '
  '22':
  - type: text
    content: 'But when he heard that Archelaus was reigning over Judea in place of his father Herod, he was afraid to go there, and '
  - type: note
    content: See ver. 12
  - type: text
    content: 'being warned in a dream he withdrew to the district of Galilee. '
  '23':
  - type: text
    content: 'And he went and lived in a city called '
  - type: note
    content: ch. 4:13; Mark 1:9; Luke 1:26; 2:39; 4:16; John 1:45
  - type: text
    content: 'Nazareth, '
  - type: note
    content: See ch. 1:22
  - type: text
    content: so that what was spoken by the prophets might be fulfilled, that he would be called a Nazarene.
  '3':
  - type: text
    content: 'When Herod the king heard this, he was troubled, and all Jerusalem with him; '
  '4':
  - type: text
    content: 'and assembling all the chief priests and scribes of the people, he inquired of them where '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the Christ was to be born. '
  '5':
  - type: text
    content: 'They told him, “In Bethlehem of Judea, for so it is written by the prophet:'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cited from Mic. 5:2
  - type: text
    content: “‘And you, O Bethlehem, in the land of Judah,
  - type: text
    content: are by no means least among the rulers of Judah;
  - type: text
    content: for from you shall come a ruler
  - type: text
    content: 'who will '
  - type: note
    content: Ezek. 34:23; John 21:15-17; [2 Sam. 5:2; Rev. 7:17]
  - type: text
    content: shepherd my people Israel.’”
  '7':
  - type: text
    content: 'Then Herod summoned the wise men secretly and ascertained from them what time the star had appeared. '
  '8':
  - type: text
    content: 'And he sent them to Bethlehem, saying, “Go and search diligently for the child, and when you have found him, bring me word, that I too may come and worship him.” '
  '9':
  - type: text
    content: 'After listening to the king, they went on their way. And behold, the star that they had seen when it rose went before them until it came to rest over the place where the child was. '
