document_id: JOS.18,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Allotment of the Remaining Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole congregation of the people of Israel assembled at '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'Shiloh and set up '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:51
      marker-yv: yv-n
    - type: text
      text: the tent of meeting there. The land lay subdued before them.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Joshua '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: 'cast lots for them in Shiloh before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And there Joshua apportioned the land to the people of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      marker-yv: yv-n
    - type: text
      text: to each his portion.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Inheritance for Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lot of the tribe of the people of Benjamin according to its clans came up, and the territory allotted to it fell between the people of Judah and the people of Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'On the north side their boundary began at the Jordan. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'Then the boundary goes up to the shoulder north of Jericho, then up through the hill country westward, and it ends at the wilderness of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:2
      marker-yv: yv-n
    - type: text
      text: 'Beth-aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there the boundary passes along southward in the direction of Luz, to the shoulder of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:2
      marker-yv: yv-n
    - type: text
      text: 'Luz (that is, Bethel), then the boundary goes down to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:5
      marker-yv: yv-n
    - type: text
      text: 'Ataroth-addar, on the mountain that lies south of Lower '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:3
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:10
      marker-yv: yv-n
    - type: text
      text: 'Beth-horon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the boundary goes in another direction, turning on the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: western side southward from the mountain that lies to the south, opposite Beth-horon, and it ends at Kiriath-baal (
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:9
      marker-yv: yv-n
    - type: text
      text: 'that is, Kiriath-jearim), a city belonging to the people of Judah. This forms the western side. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the southern side begins at the outskirts of Kiriath-jearim. And the boundary goes from there to Ephron,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 15:9; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: westward
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'to the spring of the waters of Nephtoah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the boundary goes down to the border of the mountain that overlooks '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      marker-yv: yv-n
    - type: text
      text: 'the Valley of the Son of Hinnom, which is at the north end of the Valley of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:4
      marker-yv: yv-n
    - type: text
      text: 'Rephaim. And it then goes down the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      marker-yv: yv-n
    - type: text
      text: 'Valley of Hinnom, south of the shoulder of the Jebusites, and downward to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      marker-yv: yv-n
    - type: text
      text: 'En-rogel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it bends in a northerly direction going on to En-shemesh, and from there goes to Geliloth, which is opposite the ascent of Adummim. Then it goes down to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:6
      marker-yv: yv-n
    - type: text
      text: 'the stone of Bohan the son of Reuben, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and passing on to the north of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:6
      marker-yv: yv-n
    - type: text
      text: the shoulder of Beth-arabah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: to the shoulder over against the Arabah
      marker-yv: yv-n
    - type: text
      text: ' it goes down to '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:6
      marker-yv: yv-n
    - type: text
      text: 'the Arabah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the boundary passes on to the north of the shoulder of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Beth-hoglah. And the boundary ends at the northern bay of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:2
      marker-yv: yv-n
    - type: text
      text: 'the Salt Sea, at the south end of the Jordan: this is the southern border. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There remained among the people of Israel seven tribes whose inheritance had not yet been apportioned. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jordan forms its boundary on the eastern side. This is the inheritance of the people of Benjamin, according to their clans, boundary by boundary all around.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the cities of the tribe of the people of Benjamin according to their clans were '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'Jericho, Beth-hoglah, Emek-keziz, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-arabah, Zemaraim, Bethel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avvim, Parah, Ophrah, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chephar-ammoni, Ophni, Geba—twelve cities with their villages: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gibeon, Ramah, Beeroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mizpeh, Chephirah, Mozah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zela, Haeleph, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      marker-yv: yv-n
    - type: text
      text: Jebus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Syriac, Vulgate; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the Jebusite
      marker-yv: yv-n
    - type: text
      text: ' (that is, Jerusalem), Gibeah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gibeath
      marker-yv: yv-n
    - type: text
      text: ' and Kiriath-jearim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kiriath
      marker-yv: yv-n
    - type: text
      text: —fourteen cities with their villages. This is the inheritance of the people of Benjamin according to its clans.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua said to the people of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 18:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“How long will you put off going in to take possession of the land, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers, has given you? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Provide three men from each tribe, and I will send them out that they may set out and go up and down the land. They shall write a description of it with a view to their inheritances, and then come to me. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall divide it into seven portions. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Judah shall continue in his territory on the south, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the house of Joseph shall continue in their territory on the north. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall describe the land in seven divisions and bring the description here to me. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      marker-yv: yv-n
    - type: text
      text: 'And I will cast lots for you here before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:33
      marker-yv: yv-n
    - type: text
      text: 'The Levites have no portion among you, for the priesthood of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is their heritage. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:8
      marker-yv: yv-n
    - type: text
      text: 'And Gad and Reuben and half the tribe of Manasseh have received their inheritance beyond the Jordan eastward, which Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men arose and went, and Joshua charged those who went to write the description of the land, saying, “Go up and down in the land and write a description and return to me. And I will cast lots for you here before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Shiloh.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men went and passed up and down in the land and wrote in a book a description of it by towns in seven divisions. Then they came to Joshua to the camp at Shiloh, '
