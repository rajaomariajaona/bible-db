document_id: JOS.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Allotment of the Remaining Land
  - type: text
    content: 'Then the whole congregation of the people of Israel assembled at '
  - type: note
    content: ch. 19:51; 21:2; 22:9, 12
  - type: text
    content: 'Shiloh and set up '
  - type: note
    content: ch. 19:51
  - type: text
    content: the tent of meeting there. The land lay subdued before them.
  '10':
  - type: text
    content: 'and Joshua '
  - type: note
    content: ver. 6
  - type: text
    content: 'cast lots for them in Shiloh before the '
  - type: text
    content: Lord
  - type: text
    content: '. And there Joshua apportioned the land to the people of Israel, '
  - type: note
    content: ch. 11:23; 12:7
  - type: text
    content: to each his portion.
  - type: heading
    content: The Inheritance for Benjamin
  '11':
  - type: text
    content: 'The lot of the tribe of the people of Benjamin according to its clans came up, and the territory allotted to it fell between the people of Judah and the people of Joseph. '
  '12':
  - type: note
    content: '[ch. 16:1]'
  - type: text
    content: 'On the north side their boundary began at the Jordan. '
  - type: note
    content: ver. 21
  - type: text
    content: 'Then the boundary goes up to the shoulder north of Jericho, then up through the hill country westward, and it ends at the wilderness of '
  - type: note
    content: See ch. 7:2
  - type: text
    content: 'Beth-aven. '
  '13':
  - type: text
    content: 'From there the boundary passes along southward in the direction of Luz, to the shoulder of '
  - type: note
    content: See ch. 16:2
  - type: text
    content: 'Luz (that is, Bethel), then the boundary goes down to '
  - type: note
    content: ch. 16:5
  - type: text
    content: 'Ataroth-addar, on the mountain that lies south of Lower '
  - type: note
    content: ch. 16:3; See ch. 10:10
  - type: text
    content: 'Beth-horon. '
  '14':
  - type: text
    content: 'Then the boundary goes in another direction, turning on the '
  - type: note
    content: '[ch. 19:11]'
  - type: text
    content: western side southward from the mountain that lies to the south, opposite Beth-horon, and it ends at Kiriath-baal (
  - type: note
    content: ch. 15:9
  - type: text
    content: 'that is, Kiriath-jearim), a city belonging to the people of Judah. This forms the western side. '
  '15':
  - type: text
    content: And the southern side begins at the outskirts of Kiriath-jearim. And the boundary goes from there to Ephron,
  - type: note
    content: See 15:9; Hebrew westward
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 14 above]'
  - type: text
    content: 'to the spring of the waters of Nephtoah. '
  '16':
  - type: text
    content: 'Then the boundary goes down to the border of the mountain that overlooks '
  - type: note
    content: See ch. 15:8
  - type: text
    content: 'the Valley of the Son of Hinnom, which is at the north end of the Valley of '
  - type: note
    content: See ch. 12:4
  - type: text
    content: 'Rephaim. And it then goes down the '
  - type: note
    content: See ch. 15:8
  - type: text
    content: 'Valley of Hinnom, south of the shoulder of the Jebusites, and downward to '
  - type: note
    content: See ch. 15:7
  - type: text
    content: 'En-rogel. '
  '17':
  - type: text
    content: 'Then it bends in a northerly direction going on to En-shemesh, and from there goes to Geliloth, which is opposite the ascent of Adummim. Then it goes down to '
  - type: note
    content: ch. 15:6
  - type: text
    content: 'the stone of Bohan the son of Reuben, '
  '18':
  - type: text
    content: 'and passing on to the north of '
  - type: note
    content: ch. 11:2; 15:6
  - type: text
    content: the shoulder of Beth-arabah
  - type: note
    content: Septuagint; Hebrew to the shoulder over against the Arabah
  - type: text
    content: ' it goes down to '
  - type: note
    content: ch. 11:2; 15:6
  - type: text
    content: 'the Arabah. '
  '19':
  - type: text
    content: 'Then the boundary passes on to the north of the shoulder of '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'Beth-hoglah. And the boundary ends at the northern bay of '
  - type: note
    content: ch. 15:2
  - type: text
    content: 'the Salt Sea, at the south end of the Jordan: this is the southern border. '
  '2':
  - type: text
    content: 'There remained among the people of Israel seven tribes whose inheritance had not yet been apportioned. '
  '20':
  - type: text
    content: The Jordan forms its boundary on the eastern side. This is the inheritance of the people of Benjamin, according to their clans, boundary by boundary all around.
  '21':
  - type: text
    content: 'Now the cities of the tribe of the people of Benjamin according to their clans were '
  - type: note
    content: ver. 12
  - type: text
    content: 'Jericho, Beth-hoglah, Emek-keziz, '
  '22':
  - type: text
    content: 'Beth-arabah, Zemaraim, Bethel, '
  '23':
  - type: text
    content: 'Avvim, Parah, Ophrah, '
  '24':
  - type: text
    content: 'Chephar-ammoni, Ophni, Geba—twelve cities with their villages: '
  '25':
  - type: text
    content: 'Gibeon, Ramah, Beeroth, '
  '26':
  - type: text
    content: 'Mizpeh, Chephirah, Mozah, '
  '27':
  - type: text
    content: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: text
    content: 'Zela, Haeleph, '
  - type: note
    content: See ch. 15:8
  - type: text
    content: Jebus
  - type: note
    content: Septuagint, Syriac, Vulgate; Hebrew the Jebusite
  - type: text
    content: ' (that is, Jerusalem), Gibeah'
  - type: note
    content: Hebrew Gibeath
  - type: text
    content: ' and Kiriath-jearim'
  - type: note
    content: Septuagint; Hebrew Kiriath
  - type: text
    content: —fourteen cities with their villages. This is the inheritance of the people of Benjamin according to its clans.
  '3':
  - type: text
    content: 'So Joshua said to the people of Israel, '
  - type: note
    content: '[Judg. 18:9]'
  - type: text
    content: '“How long will you put off going in to take possession of the land, which the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers, has given you? '
  '4':
  - type: text
    content: 'Provide three men from each tribe, and I will send them out that they may set out and go up and down the land. They shall write a description of it with a view to their inheritances, and then come to me. '
  '5':
  - type: text
    content: 'They shall divide it into seven portions. '
  - type: note
    content: '[ch. 15:1]'
  - type: text
    content: 'Judah shall continue in his territory on the south, '
  - type: note
    content: '[ch. 16:1, 4]'
  - type: text
    content: 'and the house of Joseph shall continue in their territory on the north. '
  '6':
  - type: text
    content: 'And you shall describe the land in seven divisions and bring the description here to me. '
  - type: note
    content: ver. 10; ch. 14:2
  - type: text
    content: 'And I will cast lots for you here before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '7':
  - type: note
    content: See ch. 13:33
  - type: text
    content: 'The Levites have no portion among you, for the priesthood of the '
  - type: text
    content: Lord
  - type: text
    content: ' is their heritage. '
  - type: note
    content: See ch. 13:8
  - type: text
    content: 'And Gad and Reuben and half the tribe of Manasseh have received their inheritance beyond the Jordan eastward, which Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them.”'
  '8':
  - type: text
    content: 'So the men arose and went, and Joshua charged those who went to write the description of the land, saying, “Go up and down in the land and write a description and return to me. And I will cast lots for you here before the '
  - type: text
    content: Lord
  - type: text
    content: ' in Shiloh.” '
  '9':
  - type: text
    content: 'So the men went and passed up and down in the land and wrote in a book a description of it by towns in seven divisions. Then they came to Joshua to the camp at Shiloh, '
