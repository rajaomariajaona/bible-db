    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:5
      metadata:
        usfm: JOS.16.5
    marker-yv: yv-n
  - type: text
