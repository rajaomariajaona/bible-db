      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: JOS.16.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'and the house of Joseph shall continue in their territory on the north. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And you shall describe the land in seven divisions and bring the description here to me. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
