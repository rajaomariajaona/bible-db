    - type: text
      text: '2'
  - type: text
    text: 'There remained among the people of Israel seven tribes whose inheritance had not yet been apportioned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua said to the people of Israel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
