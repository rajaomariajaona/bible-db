document_id: MRK.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'Again '
  - type: note
    content: For ver. 1-12, see Matt. 13:1-15; Luke 8:4-10
  - type: text
    content: 'he began to teach beside the sea. And a very large crowd gathered about him, '
  - type: note
    content: '[ch. 3:9; Luke 5:1-3]'
  - type: text
    content: 'so that he got into a boat and sat in it on the sea, and the whole crowd was beside the sea on the land. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: ver. 34
  - type: text
    content: 'when he was alone, those around him with the twelve asked him about the parables. '
  '11':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: Matt. 19:11; Col. 1:27; [1 Cor. 2:6-10; 1 John 2:20, 27]; See Matt. 11:25
  - type: text
    content: '“To you has been given '
  - type: note
    content: See Rom. 16:25
  - type: text
    content: 'the secret of the kingdom of God, but for '
  - type: note
    content: 1 Cor. 5:12, 13; Col. 4:5; 1 Thess. 4:12; 1 Tim. 3:7
  - type: text
    content: those outside everything is in parables,
  - type: text
    content: ' '
  '12':
  - type: note
    content: Isa. 6:9, 10
  - type: text
    content: so that
  - type: text
    content: '“‘they '
  - type: note
    content: Deut. 29:4; Jer. 5:21; Ezek. 12:2; Rom. 11:8; 2 Cor. 3:14; 4:4; [ Isa. 42:19, 20 ]
  - type: text
    content: may indeed see but not perceive,
  - type: text
    content: and may indeed hear but not understand,
  - type: text
    content: 'lest they '
  - type: note
    content: See Luke 22:32
  - type: text
    content: should turn and be forgiven.’”
  '13':
  - type: text
    content: ' '
  - type: note
    content: For ver. 13-20, see Matt. 13:18-23; Luke 8:11-15
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Do you not understand this parable? How then will you understand all the parables?
  - type: text
    content: ' '
  '14':
  - type: note
    content: '[Matt. 13:37; John 4:36, 37]'
  - type: text
    content: 'The sower sows '
  - type: note
    content: ver. 33; ch. 2:2; Luke 1:2; Acts 8:4; James 1:21
  - type: text
    content: the word.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And these are the ones along the path, where the word is sown: when they hear, Satan immediately comes and takes away the word that is sown in them.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And these are the ones sown on rocky ground: the ones who, when they hear the word, immediately receive it '
  - type: note
    content: '[ch. 6:20; Isa. 58:2; Ezek. 33:31, 32; John 5:35]'
  - type: text
    content: with joy.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And they have no root in themselves, but '
  - type: note
    content: Gal. 1:6; [Hos. 6:4; Gal. 5:7]
  - type: text
    content: 'endure for a while; then, when tribulation or persecution arises on account of the word, immediately '
  - type: note
    content: See Matt. 11:6
  - type: text
    content: they fall away.
  - type: note
    content: Or stumble
  - type: text
    content: ' '
  '18':
  - type: text
    content: And others are the ones sown among thorns. They are those who hear the word,
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'but '
  - type: note
    content: See Matt. 6:25
  - type: text
    content: 'the cares of '
  - type: note
    content: 2 Tim. 4:10
  - type: text
    content: 'the world and '
  - type: note
    content: 1 Tim. 6:9, 10, 17; [ch. 10:23; Matt. 19:23; Acts 5:1-11; Heb. 3:13]
  - type: text
    content: the deceitfulness of riches and the desires for other things enter in and choke the word, and it proves unfruitful.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And '
  - type: note
    content: ver. 33
  - type: text
    content: 'he was teaching them many things in parables, and in his teaching he said to them: '
  '20':
  - type: text
    content: 'But those that were sown on the good soil are the ones who hear the word and accept it and '
  - type: note
    content: Hos. 14:8; John 15:5, 16; Phil. 1:11; Col. 1:6
  - type: text
    content: 'bear fruit, '
  - type: note
    content: ver. 8
  - type: text
    content: thirtyfold and sixtyfold and a hundredfold.”
  - type: heading
    content: A Lamp Under a Basket
  '21':
  - type: text
    content: ' '
  - type: note
    content: For ver. 21-25, see Luke 8:16-18
  - type: text
    content: 'And he said to them, '
  - type: note
    content: Matt. 5:15; Luke 11:33
  - type: text
    content: “Is a lamp brought in to be put under a basket, or under a bed, and not on a stand?
  - type: text
    content: ' '
  '22':
  - type: note
    content: Matt. 10:26; Luke 12:2; [1 Tim. 5:25]
  - type: text
    content: For nothing is hidden except to be made manifest; nor is anything secret except to come to light.
  - type: text
    content: ' '
  '23':
  - type: note
    content: ver. 9
  - type: text
    content: If anyone has ears to hear, let him hear.”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: '“Pay attention to what you hear: '
  - type: note
    content: Matt. 7:2; Luke 6:38
  - type: text
    content: with the measure you use, it will be measured to you, and still more will be added to you.
  - type: text
    content: ' '
  '25':
  - type: note
    content: See Matt. 13:12
  - type: text
    content: For to the one who has, more will be given, and from the one who has not, even what he has will be taken away.”
  - type: heading
    content: The Parable of the Seed Growing
  '26':
  - type: text
    content: 'And he said, '
  - type: note
    content: '[Matt. 13:24-30]'
  - type: text
    content: “The kingdom of God is as if a man should scatter seed on the ground.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'He sleeps and rises night and day, and the seed sprouts and grows; '
  - type: note
    content: '[Eccles. 11:5, 6]'
  - type: text
    content: he knows not how.
  - type: text
    content: ' '
  '28':
  - type: text
    content: The earth produces by itself, first the blade, then the ear, then the full grain in the ear.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'But when the grain is ripe, at once '
  - type: note
    content: Joel 3:13; Rev. 14:15
  - type: text
    content: he puts in the sickle, because the harvest has come.”
  - type: heading
    content: The Parable of the Mustard Seed
  '3':
  - type: text
    content: '“Listen! Behold, '
  - type: note
    content: '[Isa. 55:10; Amos 9:13]'
  - type: text
    content: a sower went out to sow.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: note
    content: For ver. 30-32, see Matt. 13:31, 32; Luke 13:18, 19
  - type: text
    content: 'And he said, '
  - type: text
    content: “With what can we compare the kingdom of God, or what parable shall we use for it?
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'It is like '
  - type: note
    content: Matt. 17:20; Luke 17:6
  - type: text
    content: a grain of mustard seed, which, when sown on the ground, is the smallest of all the seeds on earth,
  - type: text
    content: ' '
  '32':
  - type: text
    content: yet when it is sown it grows up and becomes larger than all the garden plants and puts out large branches, so that the birds of the air can make nests in its shade.”
  '33':
  - type: text
    content: ' '
  - type: note
    content: Matt. 13:34
  - type: text
    content: 'With many such parables he spoke '
  - type: note
    content: See ver. 14
  - type: text
    content: 'the word to them, '
  - type: note
    content: John 16:12; 1 Cor. 3:2; Heb. 5:12
  - type: text
    content: 'as they were able to hear it. '
  '34':
  - type: text
    content: 'He did not speak to them '
  - type: note
    content: '[John 16:25]'
  - type: text
    content: 'without a parable, but '
  - type: note
    content: ver. 10; [ch. 13:3]
  - type: text
    content: 'privately to his own disciples he '
  - type: note
    content: '[2 Pet. 1:20]'
  - type: text
    content: explained everything.
  - type: heading
    content: Jesus Calms a Storm
  '35':
  - type: text
    content: ' '
  - type: note
    content: For ver. 35-41, see Matt. 8:18, 23-27; Luke 8:22-25; [ John 6:16-21 ]
  - type: text
    content: 'On that day, when evening had come, he said to them, '
  - type: text
    content: “Let us go across to the other side.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'And leaving the crowd, they took him with them in the boat, just as he was. And other boats were with him. '
  '37':
  - type: text
    content: 'And a great windstorm arose, and the waves '
  - type: note
    content: '[Acts 27:14]'
  - type: text
    content: 'were breaking into the boat, so that the boat was already filling. '
  '38':
  - type: text
    content: 'But he was in the stern, asleep on the cushion. And they woke him and said to him, “Teacher, do you not care that we are perishing?” '
  '39':
  - type: text
    content: 'And he awoke and '
  - type: note
    content: Ps. 104:7; [Luke 4:39]
  - type: text
    content: 'rebuked the wind and said to the sea, '
  - type: text
    content: “Peace! Be still!”
  - type: text
    content: ' And the wind ceased, and '
  - type: note
    content: Job 38:11; Ps. 65:7; [ch. 6:51; Matt. 14:32]
  - type: text
    content: 'there was a great calm. '
  '4':
  - type: text
    content: And as he sowed, some seed fell along the path, and the birds came and devoured it.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“Why are you '
  - type: note
    content: John 14:27
  - type: text
    content: so afraid? Have you still no faith?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And they were filled with great fear and said to one another, '
  - type: note
    content: '[ch. 1:27]'
  - type: text
    content: '“Who then is this, that even '
  - type: note
    content: '[Luke 5:9]'
  - type: text
    content: the wind and the sea obey him?”
  '5':
  - type: text
    content: Other seed fell on rocky ground, where it did not have much soil, and immediately it sprang up, since it had no depth of soil.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: James 1:11
  - type: text
    content: 'when the sun rose, it was scorched, and since it had no root, '
  - type: note
    content: John 15:6
  - type: text
    content: it withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Other seed fell among '
  - type: note
    content: Jer. 4:3
  - type: text
    content: thorns, and the thorns grew up and choked it, and it yielded no grain.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And other seeds fell into good soil and produced grain, growing up and increasing and yielding thirtyfold and sixtyfold and '
  - type: note
    content: ver. 20; Gen. 26:12
  - type: text
    content: a hundredfold.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And he said, '
  - type: note
    content: See Matt. 11:15
  - type: text
    content: “He who has ears to hear, let him hear.”
  - type: heading
    content: The Purpose of the Parables
