document_id: MRK.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Man with a Withered Hand
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-6, see Matt. 12:9-14; Luke 6:6-11
  - type: text
    content: 'Again '
  - type: note
    content: ch. 1:29
  - type: text
    content: 'he entered the synagogue, and a man was there with a withered hand. '
  '10':
  - type: text
    content: 'for '
  - type: note
    content: See Matt. 4:23
  - type: text
    content: 'he had healed many, so that all who had '
  - type: note
    content: ch. 5:29, 34
  - type: text
    content: 'diseases pressed around him '
  - type: note
    content: ch. 6:56; Matt. 9:20, 21; 14:36; Luke 6:19
  - type: text
    content: 'to touch him. '
  '11':
  - type: note
    content: ch. 1:26, 34; Luke 4:41
  - type: text
    content: 'And whenever the unclean spirits saw him, they '
  - type: note
    content: Luke 8:28
  - type: text
    content: 'fell down before him and cried out, “You are '
  - type: note
    content: See Matt. 14:33
  - type: text
    content: 'the Son of God.” '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: See Matt. 12:16
  - type: text
    content: he strictly ordered them not to make him known.
  - type: heading
    content: The Twelve Apostles
  '13':
  - type: text
    content: ' '
  - type: note
    content: Matt. 10:1; Luke 6:12, 13; [ch. 6:7-13; Luke 9:1, 2 ]
  - type: text
    content: 'And he went up on the mountain and called to him those '
  - type: note
    content: John 13:18; 15:16, 19
  - type: text
    content: 'whom he desired, and they came to him. '
  '14':
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'And he appointed twelve (whom he also named apostles) so that they might be with him and he might send them out to preach '
  '15':
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'and have authority to cast out demons. '
  '16':
  - type: text
    content: 'He appointed the twelve: '
  - type: note
    content: For ver. 16-19, see Matt. 10:2-4; Luke 6:14-16; Acts 1:13
  - type: text
    content: 'Simon (to whom '
  - type: note
    content: Matt. 16:18; John 1:42
  - type: text
    content: 'he gave the name Peter); '
  '17':
  - type: note
    content: Matt. 4:21
  - type: text
    content: 'James the son of Zebedee and John the brother of James (to whom he gave the name Boanerges, that is, Sons of Thunder); '
  '18':
  - type: text
    content: 'Andrew, and Philip, and Bartholomew, and '
  - type: note
    content: Matt. 9:9
  - type: text
    content: Matthew, and Thomas, and James the son of Alphaeus, and Thaddaeus, and Simon the Zealot,
  - type: note
    content: Greek kananaios, meaning zealot
  - type: text
    content: ' '
  '19':
  - type: text
    content: and Judas Iscariot, who betrayed him.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: Luke 14:1; 20:20; [Luke 11:54; John 8:6]
  - type: text
    content: they watched Jesus,
  - type: note
    content: Greek him
  - type: text
    content: ' to see whether he would heal him on the Sabbath, so that they might accuse him. '
  '20':
  - type: text
    content: 'Then he went '
  - type: note
    content: ch. 7:17; 9:28
  - type: text
    content: 'home, and the crowd gathered again, '
  - type: note
    content: ch. 6:31
  - type: text
    content: 'so that they could not even eat. '
  '21':
  - type: note
    content: '[John 7:5]'
  - type: text
    content: 'And when '
  - type: note
    content: '[ver. 31]'
  - type: text
    content: 'his family heard it, they went out to seize him, for they were saying, “He '
  - type: note
    content: 2 Cor. 5:13; [John 10:20; Acts 26:24]
  - type: text
    content: is out of his mind.”
  - type: heading
    content: Blasphemy Against the Holy Spirit
  '22':
  - type: text
    content: 'And '
  - type: note
    content: ch. 7:1; Matt. 15:1
  - type: text
    content: 'the scribes who came down from Jerusalem were saying, '
  - type: note
    content: Matt. 9:34; 12:24; Luke 11:15; [Matt. 10:25]; See John 7:20
  - type: text
    content: '“He is possessed by Beelzebul,” and “by the prince of demons he casts out the demons.” '
  '23':
  - type: note
    content: For ver. 23-27, see Matt. 12:25-29; Luke 11:17-22
  - type: text
    content: 'And he called them to him and said to them in parables, '
  - type: text
    content: “How can Satan cast out Satan?
  - type: text
    content: ' '
  '24':
  - type: text
    content: If a kingdom is divided against itself, that kingdom cannot stand.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And if a house is divided against itself, that house will not be able to stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan has risen up against himself and is divided, he cannot stand, but is coming to an end.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: Isa. 49:24
  - type: text
    content: 'no one can enter a strong man’s house and plunder his goods, unless he first binds the strong man. '
  - type: note
    content: '[Isa. 53:12]'
  - type: text
    content: Then indeed he may plunder his house.
  '28':
  - type: text
    content: ' '
  - type: note
    content: For ver. 28-30, see Matt. 12:31, 32; [ Luke 12:10; Heb. 6:4-6; 10:26; 1 John 5:16 ]
  - type: text
    content: “Truly, I say to you, all sins will be forgiven the children of man, and whatever blasphemies they utter,
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'but whoever '
  - type: note
    content: '[Acts 7:51; Heb. 10:29]'
  - type: text
    content: blasphemes against the Holy Spirit never has forgiveness, but is guilty of an eternal sin”
  - type: text
    content: '— '
  '3':
  - type: text
    content: 'And he said to the man with the withered hand, '
  - type: text
    content: “Come here.”
  - type: text
    content: ' '
  '30':
  - type: text
    content: for they were saying, “He has an unclean spirit.”
  - type: heading
    content: Jesus’ Mother and Brothers
  '31':
  - type: text
    content: ' '
  - type: note
    content: For ver. 31-35, see Matt. 12:46-50; Luke 8:19-21
  - type: text
    content: 'And his mother and his '
  - type: note
    content: ch. 6:3; Matt. 13:55; John 2:12; 7:3, 5, 10; Acts 1:14; 1 Cor. 9:5; Gal. 1:19
  - type: text
    content: 'brothers came, and standing outside they sent to him and called him. '
  '32':
  - type: text
    content: And a crowd was sitting around him, and they said to him, “Your mother and your brothers
  - type: note
    content: Other manuscripts add and your sisters
  - type: text
    content: ' are outside, seeking you.” '
  '33':
  - type: text
    content: 'And he answered them, '
  - type: text
    content: “Who are my mother and my brothers?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And '
  - type: note
    content: ver. 5
  - type: text
    content: 'looking about at those who sat around him, he said, '
  - type: text
    content: “Here are my mother and my brothers!
  - type: text
    content: ' '
  '35':
  - type: note
    content: '[John 15:14; Heb. 2:11]'
  - type: text
    content: 'For whoever '
  - type: note
    content: Matt. 7:21; [Luke 11:28]
  - type: text
    content: does the will of God, he is my brother and sister and mother.”
  '4':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[Luke 14:3]'
  - type: text
    content: “Is it lawful on the Sabbath to do good or to do harm, to save life or to kill?”
  - type: text
    content: ' But they were silent. '
  '5':
  - type: text
    content: 'And he '
  - type: note
    content: ver. 34; ch. 5:32; 10:23; [ch. 10:21]
  - type: text
    content: 'looked around at them with anger, grieved at '
  - type: note
    content: ch. 6:52; Rom. 11:25; Eph. 4:18
  - type: text
    content: 'their hardness of heart, and said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' '
  - type: note
    content: '[1 Kgs. 13:4]'
  - type: text
    content: 'He stretched it out, and his hand was restored. '
  '6':
  - type: note
    content: See Matt. 12:14
  - type: text
    content: 'The Pharisees went out and immediately '
  - type: note
    content: See Matt. 12:14
  - type: text
    content: 'held counsel with '
  - type: note
    content: ch. 12:13; Matt. 22:16; [ch. 8:15]
  - type: text
    content: the Herodians against him, how to destroy him.
  - type: heading
    content: A Great Crowd Follows Jesus
  '7':
  - type: text
    content: ' '
  - type: note
    content: Matt. 12:15
  - type: text
    content: 'Jesus withdrew with his disciples to the sea, and '
  - type: note
    content: Matt. 4:25; Luke 6:17
  - type: text
    content: 'a great crowd followed, from Galilee and Judea '
  '8':
  - type: text
    content: 'and Jerusalem and '
  - type: note
    content: Isa. 34:5; Ezek. 35:15
  - type: text
    content: 'Idumea and from beyond the Jordan and from around '
  - type: note
    content: See Matt. 11:21
  - type: text
    content: 'Tyre and Sidon. When the great crowd heard all that he was doing, they came to him. '
  '9':
  - type: text
    content: 'And he told his disciples to '
  - type: note
    content: ch. 6:32, 45 (Gk.); 8:10 (Gk.)
  - type: text
    content: 'have a boat ready for him because of the crowd, lest they '
  - type: note
    content: ch. 5:24, 31
  - type: text
    content: 'crush him, '
