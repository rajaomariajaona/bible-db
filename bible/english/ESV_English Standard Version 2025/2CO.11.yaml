verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and the False Apostles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wish you would bear with me in a little foolishness. Do bear with me! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      marker-yv: yv-n
    - type: text
      text: 'As the truth of Christ is in me, this boasting of mine '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 9:15
      marker-yv: yv-n
    - type: text
      text: 'will not be silenced in the regions of Achaia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And why? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:11
      marker-yv: yv-n
    - type: text
      text: 'Because I do not love you? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      marker-yv: yv-n
    - type: text
      text: God knows I do!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And what I am doing I will continue to do, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 9:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in order to undermine the claim of those who would like to claim that in their boasted mission they work on the same terms as we do. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For such men are '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 1:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 1:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Titus 1:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pet. 2:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 4:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'false apostles, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'deceitful workmen, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14, 15
      marker-yv: yv-n
    - type: text
      text: 'disguising themselves as apostles of Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And no wonder, for even Satan disguises himself as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 1:8
      marker-yv: yv-n
    - type: text
      text: 'an angel of light. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it is no surprise if his servants, also, disguise themselves as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      marker-yv: yv-n
    - type: text
      text: 'servants of righteousness. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:19
      marker-yv: yv-n
    - type: text
      text: Their end will correspond to their deeds.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Sufferings as an Apostle
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I repeat, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:6
      marker-yv: yv-n
    - type: text
      text: 'let no one think me foolish. But even if you do, accept me as a fool, so that I too may boast a little. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What I am saying '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:4
      marker-yv: yv-n
    - type: text
      text: 'with this boastful confidence, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 7:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: I say not as the Lord would
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: not according to the Lord
      marker-yv: yv-n
    - type: text
      text: ' but as a fool. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'many boast according to the flesh, I too will boast. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you gladly bear with fools, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 4:10
      marker-yv: yv-n
    - type: text
      text: 'being wise yourselves! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I feel a divine jealousy for you, since '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'I betrothed you to one husband, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 1:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      marker-yv: yv-n
    - type: text
      text: 'to present you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 14:4
      marker-yv: yv-n
    - type: text
      text: 'as a pure virgin to Christ. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you bear it if someone '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:4
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'makes slaves of you, or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'devours you, or takes advantage of you, or puts on airs, or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 4:11
      marker-yv: yv-n
    - type: text
      text: 'strikes you in the face. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To my shame, I must say, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:10
      marker-yv: yv-n
    - type: text
      text: we were too weak for that!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But whatever anyone else dares to boast of—I am speaking as a fool—I also dare to boast of that. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are they Hebrews? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 11:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:5
      marker-yv: yv-n
    - type: text
      text: 'So am I. Are they Israelites? So am I. Are they offspring of Abraham? So am I. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are they '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:7
      marker-yv: yv-n
    - type: text
      text: 'servants of Christ? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:10
      marker-yv: yv-n
    - type: text
      text: 'I am a better one—I am talking like a madman—with far greater labors, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:5
      marker-yv: yv-n
    - type: text
      text: 'far more imprisonments, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16:23
      marker-yv: yv-n
    - type: text
      text: 'with countless beatings, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:30-32
      marker-yv: yv-n
    - type: text
      text: 'often near death. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Five times I received at the hands of the Jews the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 25:3
      marker-yv: yv-n
    - type: text
      text: 'forty lashes less one. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three times I was '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16:22
      marker-yv: yv-n
    - type: text
      text: 'beaten with rods. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 14:19
      marker-yv: yv-n
    - type: text
      text: 'Once I was stoned. Three times I '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 27:41
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'was shipwrecked; a night and a day I was adrift at sea; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'on frequent journeys, in danger from rivers, danger from robbers, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 9:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:50
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 2:15
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'danger from my own people, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
