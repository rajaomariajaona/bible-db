document_id: 2CO.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and the False Apostles
  - type: text
    content: 'I wish you would bear with me in a little foolishness. Do bear with me! '
  '10':
  - type: note
    content: See Rom. 1:9; 9:1
  - type: text
    content: 'As the truth of Christ is in me, this boasting of mine '
  - type: note
    content: 1 Cor. 9:15
  - type: text
    content: 'will not be silenced in the regions of Achaia. '
  '11':
  - type: text
    content: 'And why? '
  - type: note
    content: See ch. 6:11
  - type: text
    content: 'Because I do not love you? '
  - type: note
    content: ver. 31; ch. 12:2, 3
  - type: text
    content: God knows I do!
  '12':
  - type: text
    content: 'And what I am doing I will continue to do, '
  - type: note
    content: '[1 Cor. 9:12]'
  - type: text
    content: 'in order to undermine the claim of those who would like to claim that in their boasted mission they work on the same terms as we do. '
  '13':
  - type: text
    content: 'For such men are '
  - type: note
    content: Rev. 2:2; [Gal. 1:7; 2:4; 6:12; Phil. 1:15; 3:18; Titus 1:10, 12; 2 Pet. 2:1; 1 John 4:1]
  - type: text
    content: 'false apostles, '
  - type: note
    content: '[Phil. 3:2]'
  - type: text
    content: 'deceitful workmen, '
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'disguising themselves as apostles of Christ. '
  '14':
  - type: text
    content: 'And no wonder, for even Satan disguises himself as '
  - type: note
    content: Gal. 1:8
  - type: text
    content: 'an angel of light. '
  '15':
  - type: text
    content: 'So it is no surprise if his servants, also, disguise themselves as '
  - type: note
    content: ch. 3:9
  - type: text
    content: 'servants of righteousness. '
  - type: note
    content: Phil. 3:19
  - type: text
    content: Their end will correspond to their deeds.
  - type: heading
    content: Paul’s Sufferings as an Apostle
  '16':
  - type: text
    content: 'I repeat, '
  - type: note
    content: ch. 12:6
  - type: text
    content: 'let no one think me foolish. But even if you do, accept me as a fool, so that I too may boast a little. '
  '17':
  - type: text
    content: 'What I am saying '
  - type: note
    content: ch. 9:4
  - type: text
    content: 'with this boastful confidence, '
  - type: note
    content: '[1 Cor. 7:12]'
  - type: text
    content: I say not as the Lord would
  - type: note
    content: Greek not according to the Lord
  - type: text
    content: ' but as a fool. '
  '18':
  - type: text
    content: 'Since '
  - type: note
    content: Phil. 3:3, 4
  - type: text
    content: 'many boast according to the flesh, I too will boast. '
  '19':
  - type: text
    content: 'For you gladly bear with fools, '
  - type: note
    content: 1 Cor. 4:10
  - type: text
    content: 'being wise yourselves! '
  '2':
  - type: text
    content: 'For I feel a divine jealousy for you, since '
  - type: note
    content: '[Hos. 2:19, 20]'
  - type: text
    content: 'I betrothed you to one husband, '
  - type: note
    content: Col. 1:22, 28
  - type: text
    content: 'to present you '
  - type: note
    content: Eph. 5:27; Rev. 14:4
  - type: text
    content: 'as a pure virgin to Christ. '
  '20':
  - type: text
    content: 'For you bear it if someone '
  - type: note
    content: Gal. 2:4; [Gal. 4:3, 9; 5:1]
  - type: text
    content: 'makes slaves of you, or '
  - type: note
    content: '[ch. 7:2]'
  - type: text
    content: 'devours you, or takes advantage of you, or puts on airs, or '
  - type: note
    content: 1 Cor. 4:11
  - type: text
    content: 'strikes you in the face. '
  '21':
  - type: text
    content: 'To my shame, I must say, '
  - type: note
    content: ch. 10:10
  - type: text
    content: we were too weak for that!
  - type: text
    content: 'But whatever anyone else dares to boast of—I am speaking as a fool—I also dare to boast of that. '
  '22':
  - type: text
    content: 'Are they Hebrews? '
  - type: note
    content: Rom. 11:1; Phil. 3:5
  - type: text
    content: 'So am I. Are they Israelites? So am I. Are they offspring of Abraham? So am I. '
  '23':
  - type: text
    content: 'Are they '
  - type: note
    content: See ch. 3:6; 10:7
  - type: text
    content: 'servants of Christ? '
  - type: note
    content: See 1 Cor. 15:10
  - type: text
    content: 'I am a better one—I am talking like a madman—with far greater labors, '
  - type: note
    content: ch. 6:5
  - type: text
    content: 'far more imprisonments, '
  - type: note
    content: Acts 16:23
  - type: text
    content: 'with countless beatings, and '
  - type: note
    content: ch. 1:9, 10; 4:11; 6:9; Rom. 8:36; 1 Cor. 15:30-32
  - type: text
    content: 'often near death. '
  '24':
  - type: text
    content: 'Five times I received at the hands of the Jews the '
  - type: note
    content: Deut. 25:3
  - type: text
    content: 'forty lashes less one. '
  '25':
  - type: text
    content: 'Three times I was '
  - type: note
    content: Acts 16:22
  - type: text
    content: 'beaten with rods. '
  - type: note
    content: Acts 14:19
  - type: text
    content: 'Once I was stoned. Three times I '
  - type: note
    content: '[Acts 27:41]'
  - type: text
    content: 'was shipwrecked; a night and a day I was adrift at sea; '
  '26':
  - type: text
    content: 'on frequent journeys, in danger from rivers, danger from robbers, '
  - type: note
    content: Acts 9:23; 13:50; 14:5; 17:5; 1 Thess. 2:15; [Acts 18:12; 20:3, 19; 21:27; 23:10, 12; 25:3]
  - type: text
    content: 'danger from my own people, '
  - type: note
    content: Acts 14:5; [Acts 19:23; 27:42]
  - type: text
    content: 'danger from Gentiles, '
  - type: note
    content: Acts 21:31
  - type: text
    content: 'danger in the city, danger in the wilderness, danger at sea, danger from false brothers; '
  '27':
  - type: note
    content: 1 Thess. 2:9; 2 Thess. 3:8
  - type: text
    content: 'in toil and hardship, through many a sleepless night, '
  - type: note
    content: 1 Cor. 4:11; Phil. 4:12
  - type: text
    content: in hunger and thirst, often without food,
  - type: note
    content: Or often in fasting
  - type: text
    content: ' in cold and exposure. '
  '28':
  - type: text
    content: 'And, apart from other things, there is the daily pressure on me of my anxiety for '
  - type: note
    content: See 1 Cor. 7:17
  - type: text
    content: 'all the churches. '
  '29':
  - type: note
    content: See 1 Cor. 8:13; 9:22
  - type: text
    content: Who is weak, and I am not weak? Who is made to fall, and I am not indignant?
  '3':
  - type: text
    content: 'But I am afraid that '
  - type: note
    content: Gen. 3:4; 1 Tim. 2:14; [John 8:44; 1 Thess. 3:5]
  - type: text
    content: 'as the serpent deceived Eve by his cunning, your thoughts '
  - type: note
    content: Col. 2:4, 8
  - type: text
    content: 'will be led astray from a '
  - type: note
    content: '[Eph. 6:5]'
  - type: text
    content: 'sincere and '
  - type: note
    content: ch. 6:6
  - type: text
    content: 'pure devotion to Christ. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:10; 12:5, 9; See 1 Cor. 2:3
  - type: text
    content: 'If I must boast, I will boast of the things that show my weakness. '
  '31':
  - type: note
    content: See Rom. 15:6
  - type: text
    content: 'The God and Father of the Lord Jesus, '
  - type: note
    content: See Rom. 9:5
  - type: text
    content: 'he who is blessed forever, '
  - type: note
    content: ver. 11
  - type: text
    content: 'knows that I am not lying. '
  '32':
  - type: text
    content: 'At Damascus, the governor under King Aretas '
  - type: note
    content: Acts 9:24
  - type: text
    content: 'was guarding the city of Damascus in order to seize me, '
  '33':
  - type: note
    content: Acts 9:25
  - type: text
    content: but I was let down in a basket through a window in the wall and escaped his hands.
  '4':
  - type: text
    content: 'For if someone comes and '
  - type: note
    content: '[1 Cor. 3:11]'
  - type: text
    content: 'proclaims another Jesus than the one we proclaimed, or if you receive a different spirit from the one you received, or if you accept '
  - type: note
    content: Gal. 1:6
  - type: text
    content: 'a different gospel from the one you accepted, you put up with it readily enough. '
  '5':
  - type: text
    content: 'Indeed, I consider that '
  - type: note
    content: ch. 12:11; Gal. 2:6
  - type: text
    content: 'I am not in the least inferior to these super-apostles. '
  '6':
  - type: note
    content: See 1 Cor. 1:17
  - type: text
    content: 'Even if I am unskilled in speaking, '
  - type: note
    content: '[Eph. 3:4]'
  - type: text
    content: 'I am not so in knowledge; indeed, in every way '
  - type: note
    content: ch. 4:2; 5:11; 12:12
  - type: text
    content: we have made this plain to you in all things.
  '7':
  - type: text
    content: 'Or '
  - type: note
    content: '[ch. 12:13]'
  - type: text
    content: 'did I commit a sin in humbling myself so that you might be exalted, because '
  - type: note
    content: See Acts 18:3
  - type: text
    content: 'I preached God’s gospel to you free of charge? '
  '8':
  - type: text
    content: 'I robbed other churches by accepting support from them in order to serve you. '
  '9':
  - type: text
    content: 'And when I was with you and was '
  - type: note
    content: Phil. 4:12
  - type: text
    content: 'in need, '
  - type: note
    content: ch. 12:13, 14
  - type: text
    content: 'I did not burden anyone, for the brothers who came from Macedonia '
  - type: note
    content: '[1 Cor. 16:17; Phil. 4:15, 16]'
  - type: text
    content: 'supplied my need. So I refrained and will refrain '
  - type: note
    content: ch. 12:16; 1 Thess. 2:6
  - type: text
    content: 'from burdening you in any way. '
