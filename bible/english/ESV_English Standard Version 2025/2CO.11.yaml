    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: often in fasting
      marker-yv: yv-n
    - type: text
      text: ' in cold and exposure. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And, apart from other things, there is the daily pressure on me of my anxiety for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
