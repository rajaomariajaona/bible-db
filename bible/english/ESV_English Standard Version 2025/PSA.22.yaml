document_id: PSA.22,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Why Have You Forsaken Me?
  - type: text
    content: 'To the choirmaster: according to The Doe of the Dawn. A Psalm of David.'
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 27:46; Mark 15:34
  - type: text
    content: My God, my God, why have you forsaken me?
  - type: text
    content: 'Why are you so '
  - type: note
    content: ver. 11
  - type: text
    content: 'far from saving me, from the words of my '
  - type: note
    content: Ps. 32:3; 38:8; Job 3:24; Isa. 59:11; [Heb. 5:7]
  - type: text
    content: groaning?
  '10':
  - type: text
    content: On you was I cast from my birth,
  - type: text
    content: 'and from '
  - type: note
    content: Isa. 46:3; 49:1; Gal. 1:15
  - type: text
    content: my mother’s womb you have been my God.
  '11':
  - type: text
    content: 'Be not '
  - type: note
    content: See ver. 1; Ps. 10:1
  - type: text
    content: far from me,
  - type: text
    content: for trouble is near,
  - type: text
    content: 'and there is '
  - type: note
    content: Ps. 107:12; 2 Kgs. 14:26; Isa. 63:5
  - type: text
    content: none to help.
  '12':
  - type: text
    content: Many bulls encompass me;
  - type: note
    content: '[ Ps. 68:30 (Heb.) ]'
  - type: text
    content: 'strong bulls of '
  - type: note
    content: Amos 4:1
  - type: text
    content: Bashan surround me;
  '13':
  - type: text
    content: 'they '
  - type: note
    content: Ps. 35:21; Job 16:10; Lam. 2:16; 3:46
  - type: text
    content: open wide their mouths at me,
  - type: text
    content: like a ravening and roaring lion.
  '14':
  - type: text
    content: 'I am '
  - type: note
    content: '[Lam. 2:11]'
  - type: text
    content: poured out like water,
  - type: text
    content: 'and all my bones are '
  - type: note
    content: '[Dan. 5:6]'
  - type: text
    content: out of joint;
  - type: text
    content: 'my '
  - type: note
    content: '[Job 23:16; Nah. 2:10]; See Josh. 2:11'
  - type: text
    content: 'heart is like '
  - type: note
    content: See Ps. 68:2
  - type: text
    content: wax;
  - type: text
    content: it is melted within my breast;
  '15':
  - type: text
    content: 'my strength is '
  - type: note
    content: Prov. 17:22
  - type: text
    content: dried up like a potsherd,
  - type: text
    content: 'and my '
  - type: note
    content: '[John 19:28; See Job 29:10]'
  - type: text
    content: tongue sticks to my jaws;
  - type: text
    content: you lay me in the dust of death.
  '16':
  - type: text
    content: 'For '
  - type: note
    content: '[Phil. 3:2; Rev. 22:15]'
  - type: text
    content: dogs encompass me;
  - type: text
    content: 'a company of evildoers '
  - type: note
    content: Ps. 88:17
  - type: text
    content: encircles me;
  - type: text
    content: 'they have '
  - type: note
    content: Matt. 27:35; Mark 15:24; Luke 23:33; 24:40; John 19:23, 37; 20:25; [Zech. 12:10]
  - type: text
    content: pierced my hands and feet
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Vulgate, Syriac; most Hebrew manuscripts like a lion [they are at] my hands and feet
  - type: text
    content: —
  '17':
  - type: text
    content: I can count all my bones—
  - type: text
    content: 'they '
  - type: note
    content: Luke 23:35
  - type: text
    content: stare and gloat over me;
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cited John 19:24; [ Matt. 27:35; Luke 23:34 ]
  - type: text
    content: they divide my garments among them,
  - type: text
    content: and for my clothing they cast lots.
  '19':
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: do not be far off!
  - type: text
    content: 'O you my help, '
  - type: note
    content: Ps. 38:22
  - type: text
    content: come quickly to my aid!
  '2':
  - type: text
    content: 'O my God, I cry by '
  - type: note
    content: Ps. 88:1
  - type: text
    content: day, but you do not answer,
  - type: text
    content: and by night, but I find no rest.
  '20':
  - type: text
    content: Deliver my soul from the sword,
  - type: text
    content: 'my precious life from the power of '
  - type: note
    content: '[Phil. 3:2; Rev. 22:15]'
  - type: text
    content: the dog!
  '21':
  - type: text
    content: 'Save me from '
  - type: note
    content: 2 Tim. 4:17
  - type: text
    content: the mouth of the lion!
  - type: text
    content: You have rescued
  - type: note
    content: Hebrew answered
  - type: text
    content: ' me from the horns of '
  - type: note
    content: See Num. 23:22
  - type: text
    content: the wild oxen!
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cited Heb. 2:12; [ Ps. 102:21; John 17:6 ]
  - type: text
    content: 'I will tell of your name to my '
  - type: note
    content: Matt. 28:10; John 20:17; Rom. 8:29
  - type: text
    content: brothers;
  - type: text
    content: 'in the midst of the congregation I will praise you:'
  '23':
  - type: text
    content: 'You who '
  - type: note
    content: Ps. 135:20
  - type: text
    content: 'fear the '
  - type: text
    content: Lord
  - type: text
    content: ', praise him!'
  - type: text
    content: 'All you offspring of Jacob, '
  - type: note
    content: Ps. 50:15, 23
  - type: text
    content: glorify him,
  - type: text
    content: and stand in awe of him, all you offspring of Israel!
  '24':
  - type: text
    content: For he has not despised or abhorred
  - type: text
    content: 'the affliction of '
  - type: note
    content: '[Isa. 53:4, 7]'
  - type: text
    content: the afflicted,
  - type: text
    content: 'and he has not '
  - type: note
    content: Ps. 10:1; 13:1; See Job 13:24
  - type: text
    content: hidden his face from him,
  - type: text
    content: 'but has heard, when he '
  - type: note
    content: Heb. 5:7
  - type: text
    content: cried to him.
  '25':
  - type: text
    content: 'From you comes my praise in the great '
  - type: note
    content: Ps. 35:18; 40:9, 10; 111:1
  - type: text
    content: congregation;
  - type: text
    content: 'my '
  - type: note
    content: Lev. 7:16
  - type: text
    content: 'vows I will '
  - type: note
    content: Ps. 66:13; Jonah 2:9; See Ps. 50:14
  - type: text
    content: perform before those who fear him.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Ps. 69:32
  - type: text
    content: The afflicted
  - type: note
    content: Or The meek
  - type: text
    content: ' shall '
  - type: note
    content: Isa. 25:6; 65:13
  - type: text
    content: eat and be satisfied;
  - type: text
    content: 'those who seek him shall praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'May your hearts '
  - type: note
    content: John 6:51
  - type: text
    content: live forever!
  '27':
  - type: text
    content: 'All '
  - type: note
    content: Ps. 2:8; 67:7
  - type: text
    content: the ends of the earth shall remember
  - type: text
    content: 'and turn to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and all '
  - type: note
    content: Ps. 96:7
  - type: text
    content: the families of the nations
  - type: text
    content: shall worship before you.
  '28':
  - type: text
    content: 'For '
  - type: note
    content: Obad. 21; [Ps. 47:8; Zech. 14:9]
  - type: text
    content: 'kingship belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he rules over the nations.
  '29':
  - type: text
    content: 'All '
  - type: note
    content: '[Ps. 45:12]'
  - type: text
    content: the prosperous of the earth eat and worship;
  - type: text
    content: 'before him shall '
  - type: note
    content: Ps. 72:9; [Phil. 2:10]
  - type: text
    content: bow all who go down to the dust,
  - type: text
    content: 'even the one who could not '
  - type: note
    content: Ezek. 18:27
  - type: text
    content: keep himself alive.
  '3':
  - type: text
    content: 'Yet you are '
  - type: note
    content: Lev. 19:2
  - type: text
    content: holy,
  - type: note
    content: '[ Ps. 80:1; 99:1 ]'
  - type: text
    content: 'enthroned on '
  - type: note
    content: '[Ps. 9:11, 14; 65:1; 102:21; 147:12]'
  - type: text
    content: the praises
  - type: note
    content: Or dwelling in the praises
  - type: text
    content: ' of Israel.'
  '30':
  - type: text
    content: Posterity shall serve him;
  - type: text
    content: 'it shall be told of the Lord to the coming '
  - type: note
    content: Ps. 48:13; 71:18
  - type: text
    content: generation;
  '31':
  - type: text
    content: 'they shall '
  - type: note
    content: Ps. 86:9; [Isa. 60:3]
  - type: text
    content: 'come and proclaim his righteousness to a people yet '
  - type: note
    content: Ps. 78:6; 102:18
  - type: text
    content: unborn,
  - type: text
    content: that he has done it.
  '4':
  - type: text
    content: In you our fathers trusted;
  - type: text
    content: they trusted, and you delivered them.
  '5':
  - type: text
    content: 'To you they '
  - type: note
    content: See Judg. 3:9
  - type: text
    content: cried and were rescued;
  - type: text
    content: 'in you they '
  - type: note
    content: Ps. 25:2; 31:1; 71:1; Isa. 49:23; Rom. 9:33
  - type: text
    content: trusted and were not put to shame.
  '6':
  - type: text
    content: 'But I am '
  - type: note
    content: Job 25:6; Isa. 41:14
  - type: text
    content: a worm and not a man,
  - type: note
    content: Ps. 69:19; 109:25
  - type: text
    content: 'scorned by mankind and '
  - type: note
    content: Isa. 49:7; 53:3
  - type: text
    content: despised by the people.
  '7':
  - type: text
    content: 'All who see me '
  - type: note
    content: See Matt. 27:39-43; Mark 15:29-32; Luke 23:35, 36
  - type: text
    content: mock me;
  - type: text
    content: 'they make mouths at me; they '
  - type: note
    content: Ps. 109:25; [Ps. 44:14; 2 Kgs. 19:21; Isa. 37:22; Lam. 2:15]
  - type: text
    content: wag their heads;
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 37:5; Prov. 16:3 ]'
  - type: text
    content: '“He trusts in the '
  - type: text
    content: Lord
  - type: text
    content: '; let him '
  - type: note
    content: Ps. 91:14
  - type: text
    content: deliver him;
  - type: text
    content: 'let him rescue him, for he '
  - type: note
    content: Ps. 18:19; Matt. 3:17; Mark 1:11; Luke 3:22
  - type: text
    content: delights in him!”
  '9':
  - type: text
    content: 'Yet you are he who '
  - type: note
    content: Ps. 71:6
  - type: text
    content: took me from the womb;
  - type: text
    content: you made me trust you at my mother’s breasts.
