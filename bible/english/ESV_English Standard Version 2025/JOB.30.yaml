document_id: JOB.30,59
type_code: eng
verses:
  '1':
  - type: text
    content: '“But now they '
  - type: note
    content: See ch. 12:4
  - type: text
    content: laugh at me,
  - type: text
    content: 'men who are '
  - type: note
    content: ch. 32:6; [ch. 32:4]
  - type: text
    content: younger than I,
  - type: text
    content: whose fathers I would have disdained
  - type: text
    content: to set with the dogs of my flock.
  '10':
  - type: text
    content: 'They '
  - type: note
    content: Ps. 88:8; [ch. 17:6]
  - type: text
    content: abhor me; they keep aloof from me;
  - type: text
    content: 'they do not hesitate to '
  - type: note
    content: Num. 12:14; Isa. 50:6; Matt. 26:67; 27:30
  - type: text
    content: spit at the sight of me.
  '11':
  - type: text
    content: Because God has loosed my cord and humbled me,
  - type: text
    content: they have cast off restraint
  - type: note
    content: Hebrew the bridle
  - type: text
    content: ' in my presence.'
  '12':
  - type: text
    content: 'On my '
  - type: note
    content: Ps. 109:6
  - type: text
    content: right hand the rabble rise;
  - type: text
    content: they push away my feet;
  - type: text
    content: 'they '
  - type: note
    content: ch. 19:12
  - type: text
    content: cast up against me their ways of destruction.
  '13':
  - type: text
    content: They break up my path;
  - type: text
    content: 'they promote my '
  - type: note
    content: ch. 6:2
  - type: text
    content: calamity;
  - type: text
    content: they need no one to help them.
  '14':
  - type: text
    content: 'As through a wide '
  - type: note
    content: ch. 16:14
  - type: text
    content: breach they come;
  - type: text
    content: amid the crash they roll on.
  '15':
  - type: text
    content: ' '
  - type: note
    content: See ch. 18:11
  - type: text
    content: Terrors are turned upon me;
  - type: text
    content: my honor is pursued as by the wind,
  - type: text
    content: 'and my prosperity has passed away like '
  - type: note
    content: ch. 7:9; Isa. 44:22
  - type: text
    content: a cloud.
  '16':
  - type: text
    content: '“And now my soul is '
  - type: note
    content: 1 Sam. 1:15; [ch. 10:1]
  - type: text
    content: poured out within me;
  - type: text
    content: days of affliction have taken hold of me.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 7:3 ]'
  - type: text
    content: 'The night '
  - type: note
    content: ch. 33:19
  - type: text
    content: racks my bones,
  - type: text
    content: 'and the pain that '
  - type: note
    content: ver. 3
  - type: text
    content: gnaws me takes no rest.
  '18':
  - type: text
    content: 'With great force my garment is '
  - type: note
    content: '[1 Sam. 28:8; 1 Kgs. 20:38]'
  - type: text
    content: disfigured;
  - type: text
    content: it binds me about like the collar of my tunic.
  '19':
  - type: text
    content: God
  - type: note
    content: Hebrew He
  - type: text
    content: ' has cast me into the mire,'
  - type: text
    content: 'and I have become like '
  - type: note
    content: ch. 42:6; [Gen. 18:27]
  - type: text
    content: dust and ashes.
  '2':
  - type: text
    content: What could I gain from the strength of their hands,
  - type: note
    content: For ver. 2-8, see ch. 24:4-8
  - type: text
    content: 'men whose '
  - type: note
    content: '[ch. 5:26]'
  - type: text
    content: vigor is gone?
  '20':
  - type: text
    content: I cry to you for help and you do not answer me;
  - type: text
    content: I stand, and you only look at me.
  '21':
  - type: text
    content: 'You have '
  - type: note
    content: Lam. 4:3; [Isa. 63:10]
  - type: text
    content: turned cruel to me;
  - type: text
    content: 'with the might of your hand you '
  - type: note
    content: ch. 16:9
  - type: text
    content: persecute me.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 27:21 ]'
  - type: text
    content: You lift me up on the wind; you make me ride on it,
  - type: text
    content: and you toss me about in the roar of the storm.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:25
  - type: text
    content: For I know that you will bring me to death
  - type: text
    content: 'and to the house appointed for '
  - type: note
    content: ch. 28:21
  - type: text
    content: all living.
  '24':
  - type: text
    content: '“Yet does not one in a '
  - type: note
    content: Ps. 79:1; Jer. 26:18; Mic. 1:6; 3:12
  - type: text
    content: heap of ruins stretch out his hand,
  - type: text
    content: and in his disaster cry for help?
  - type: note
    content: The meaning of the Hebrew is uncertain
  '25':
  - type: text
    content: 'Did not I '
  - type: note
    content: Ps. 35:13, 14; Rom. 12:15
  - type: text
    content: weep for him whose day was hard?
  - type: text
    content: Was not my soul grieved for the needy?
  '26':
  - type: text
    content: 'But '
  - type: note
    content: Jer. 8:15; 14:19
  - type: text
    content: when I hoped for good, evil came,
  - type: text
    content: 'and when I waited for light, '
  - type: note
    content: ch. 10:21, 22
  - type: text
    content: darkness came.
  '27':
  - type: text
    content: My inward parts are in turmoil and never still;
  - type: text
    content: 'days of affliction '
  - type: note
    content: 2 Sam. 22:6; Ps. 18:5
  - type: text
    content: come to meet me.
  '28':
  - type: text
    content: 'I '
  - type: note
    content: Ps. 38:6; 42:9; 43:2
  - type: text
    content: go about darkened, but not by the sun;
  - type: text
    content: 'I stand up in '
  - type: note
    content: Prov. 26:26
  - type: text
    content: the assembly and cry for help.
  '29':
  - type: text
    content: 'I am a brother of '
  - type: note
    content: Mic. 1:8
  - type: text
    content: jackals
  - type: text
    content: 'and a companion of '
  - type: note
    content: Isa. 13:21; 34:13; Jer. 50:39; Mic. 1:8
  - type: text
    content: ostriches.
  '3':
  - type: text
    content: Through want and hard hunger
  - type: text
    content: 'they '
  - type: note
    content: '[ver. 17]'
  - type: text
    content: 'gnaw '
  - type: note
    content: Jer. 2:6
  - type: text
    content: 'the dry ground by night in '
  - type: note
    content: ch. 38:27; Zeph. 1:15
  - type: text
    content: waste and desolation;
  '30':
  - type: text
    content: 'My '
  - type: note
    content: '[Ps. 119:83; Lam. 4:8; 5:10]'
  - type: text
    content: skin turns black and falls from me,
  - type: text
    content: 'and my '
  - type: note
    content: Ps. 102:3
  - type: text
    content: bones burn with heat.
  '31':
  - type: text
    content: 'My '
  - type: note
    content: ch. 21:12
  - type: text
    content: 'lyre is '
  - type: note
    content: Lam. 5:15
  - type: text
    content: turned to mourning,
  - type: text
    content: 'and my '
  - type: note
    content: ch. 21:12
  - type: text
    content: pipe to the voice of those who weep.
  '4':
  - type: text
    content: they pick saltwort and the leaves of bushes,
  - type: text
    content: and the roots of the broom tree for their food.
  - type: note
    content: Or warmth
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Sam. 26:19 ]'
  - type: text
    content: They are driven out from human company;
  - type: text
    content: they shout after them as after a thief.
  '6':
  - type: text
    content: In the gullies of the torrents they must dwell,
  - type: text
    content: 'in holes of the earth and of '
  - type: note
    content: 1 Sam. 13:6; Jer. 4:29
  - type: text
    content: the rocks.
  '7':
  - type: text
    content: 'Among the bushes they '
  - type: note
    content: ch. 6:5
  - type: text
    content: bray;
  - type: text
    content: 'under '
  - type: note
    content: Prov. 24:31; Zeph. 2:9
  - type: text
    content: the nettles they huddle together.
  '8':
  - type: text
    content: A senseless, a nameless brood,
  - type: text
    content: they have been whipped out of the land.
  '9':
  - type: text
    content: '“And now I have become their '
  - type: note
    content: Ps. 69:12; Lam. 3:14, 63
  - type: text
    content: song;
  - type: text
    content: 'I am '
  - type: note
    content: See ch. 17:6
  - type: text
    content: a byword to them.
