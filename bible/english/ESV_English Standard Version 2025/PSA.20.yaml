document_id: PSA.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Trust in the Name of the Lord Our God
  - type: text
    content: To the choirmaster. A Psalm of David.
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Gen. 35:3]'
  - type: text
    content: answer you in the day of trouble!
  - type: text
    content: 'May '
  - type: note
    content: Prov. 18:10
  - type: text
    content: 'the name of the God of Jacob '
  - type: note
    content: Ps. 59:1; 69:29
  - type: text
    content: protect you!
  '2':
  - type: text
    content: 'May he send you help from '
  - type: note
    content: Ps. 73:17; 2 Chr. 20:8
  - type: text
    content: the sanctuary
  - type: text
    content: 'and give you support from '
  - type: note
    content: Ps. 128:5
  - type: text
    content: Zion!
  '3':
  - type: text
    content: 'May he '
  - type: note
    content: '[Acts 10:4]'
  - type: text
    content: remember all your offerings
  - type: text
    content: 'and regard with favor your burnt sacrifices! '
  - type: text
    content: Selah
  '4':
  - type: text
    content: 'May he '
  - type: note
    content: Ps. 21:2
  - type: text
    content: grant you your heart’s desire
  - type: text
    content: and fulfill all your plans!
  '5':
  - type: text
    content: 'May we shout for joy over '
  - type: note
    content: Ps. 9:14
  - type: text
    content: your salvation,
  - type: text
    content: 'and in the name of our God set up our '
  - type: note
    content: Ps. 60:4; Song 6:4, 10
  - type: text
    content: banners!
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' fulfill all your petitions!'
  '6':
  - type: text
    content: 'Now I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' saves his anointed;'
  - type: text
    content: he will answer him from his holy heaven
  - type: text
    content: 'with '
  - type: note
    content: '[Ps. 28:8]'
  - type: text
    content: the saving might of his right hand.
  '7':
  - type: text
    content: 'Some trust in '
  - type: note
    content: Isa. 31:1; 36:9
  - type: text
    content: 'chariots and some in '
  - type: note
    content: Prov. 21:31
  - type: text
    content: horses,
  - type: note
    content: '[ 1 Sam. 17:45; 2 Chr. 32:8 ]'
  - type: text
    content: 'but we trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: They collapse and fall,
  - type: text
    content: but we rise and stand upright.
  '9':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', save '
  - type: note
    content: Ps. 48:2
  - type: text
    content: the king!
  - type: text
    content: May he answer us when we call.
