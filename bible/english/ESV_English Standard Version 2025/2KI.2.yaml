document_id: 2KI.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Taken to Heaven
  - type: text
    content: 'Now when the '
  - type: text
    content: Lord
  - type: text
    content: ' was about to '
  - type: note
    content: '[Gen. 5:24]'
  - type: text
    content: 'take Elijah up to heaven by a whirlwind, Elijah and '
  - type: note
    content: See 1 Kgs. 19:19-21
  - type: text
    content: 'Elisha were on their way from '
  - type: note
    content: ch. 4:38; [Josh. 5:9]
  - type: text
    content: 'Gilgal. '
  '10':
  - type: text
    content: 'And he said, “You have asked a hard thing; yet, if you see me as I am being taken from you, it shall be so for you, but if you do not see me, it shall not be so.” '
  '11':
  - type: text
    content: 'And as they still went on and talked, behold, '
  - type: note
    content: See ch. 6:17
  - type: text
    content: 'chariots of fire and horses of fire separated the two of them. And Elijah went up by a whirlwind into heaven. '
  '12':
  - type: text
    content: 'And Elisha saw it and he cried, “My father, my father! '
  - type: note
    content: ch. 13:14
  - type: text
    content: The chariots of Israel and its horsemen!” And he saw him no more.
  - type: text
    content: 'Then he took hold of his own clothes '
  - type: note
    content: '[1 Kgs. 11:30]'
  - type: text
    content: 'and tore them in two pieces. '
  '13':
  - type: text
    content: 'And he took up the cloak of Elijah that had fallen from him and went back and stood on the bank of the Jordan. '
  '14':
  - type: text
    content: 'Then he took the cloak of Elijah that had fallen from him and struck the water, saying, “Where is the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Elijah?” And when he had struck the water, '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: the water was parted to the one side and to the other, and Elisha went over.
  - type: heading
    content: Elisha Succeeds Elijah
  '15':
  - type: text
    content: 'Now when '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the sons of the prophets who were at Jericho saw him opposite them, they said, “The spirit of Elijah rests on Elisha.” And they came to meet him and bowed to the ground before him. '
  '16':
  - type: text
    content: 'And they said to him, “Behold now, there are with your servants fifty strong men. Please let them go and seek your master. It may be that '
  - type: note
    content: See 1 Kgs. 18:12
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' has caught him up and cast him upon some mountain or into some valley.” And he said, “You shall not send.” '
  '17':
  - type: text
    content: 'But when they urged him '
  - type: note
    content: ch. 8:11
  - type: text
    content: 'till he was ashamed, he said, “Send.” They sent therefore fifty men. And for three days they sought him but did not find him. '
  '18':
  - type: text
    content: And they came back to him while he was staying at Jericho, and he said to them, “Did I not say to you, ‘Do not go’?”
  '19':
  - type: text
    content: 'Now the men of the city said to Elisha, “Behold, the situation of this city is pleasant, as my lord sees, but the water is bad, and the land is unfruitful.” '
  '2':
  - type: text
    content: 'And Elijah said to Elisha, '
  - type: note
    content: '[Ruth 1:15, 16]'
  - type: text
    content: '“Please stay here, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me as far as Bethel.” But Elisha said, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and as you yourself live, I will not leave you.” So they went down to Bethel. '
  '20':
  - type: text
    content: 'He said, “Bring me a new bowl, and put salt in it.” So they brought it to him. '
  '21':
  - type: text
    content: 'Then he went to the spring of water and '
  - type: note
    content: '[ch. 4:41; Ex. 15:25]'
  - type: text
    content: 'threw salt in it and said, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', I have healed this water; from now on neither death nor miscarriage shall come from it.” '
  '22':
  - type: text
    content: So the water has been healed to this day, according to the word that Elisha spoke.
  '23':
  - type: text
    content: 'He went up from there to Bethel, and while he was going up on the way, some small boys came out of the city and jeered at him, saying, “Go up, you baldhead! Go up, you baldhead!” '
  '24':
  - type: text
    content: 'And he turned around, and when he saw them, '
  - type: note
    content: '[Neh. 13:25]'
  - type: text
    content: 'he cursed them in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. And two she-bears came out of the woods and tore forty-two of the boys. '
  '25':
  - type: text
    content: 'From there he went on to '
  - type: note
    content: Josh. 19:26; 1 Kgs. 18:19, 20
  - type: text
    content: 'Mount Carmel, and from there he returned '
  - type: note
    content: '[ch. 3:11]'
  - type: text
    content: to Samaria.
  '3':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:1, 38; 5:22; 6:1; 9:1; 1 Kgs. 20:35
  - type: text
    content: 'the sons of the prophets who were in Bethel came out to Elisha and said to him, “Do you know that today the '
  - type: text
    content: Lord
  - type: text
    content: ' will take away your master from over you?” And he said, “Yes, I know it; keep quiet.”'
  '4':
  - type: text
    content: 'Elijah said to him, “Elisha, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'please stay here, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to '
  - type: note
    content: '[Josh. 6:26; 1 Kgs. 16:34]'
  - type: text
    content: 'Jericho.” But he said, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and as you yourself live, I will not leave you.” So they came to Jericho. '
  '5':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'The sons of the prophets who were at Jericho drew near to Elisha and said to him, “Do you know that today the '
  - type: text
    content: Lord
  - type: text
    content: ' will take away your master from over you?” And he answered, “Yes, I know it; keep quiet.”'
  '6':
  - type: text
    content: 'Then Elijah said to him, '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“Please stay here, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to the Jordan.” But he said, “As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, and as you yourself live, I will not leave you.” So the two of them went on. '
  '7':
  - type: text
    content: 'Fifty men of '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'the sons of the prophets also went and stood at some distance from them, as they both were standing by the Jordan. '
  '8':
  - type: text
    content: 'Then Elijah '
  - type: note
    content: '[1 Kgs. 19:19]'
  - type: text
    content: 'took his cloak and rolled it up and struck the water, '
  - type: note
    content: '[Ex. 14:21; Josh. 3:16]'
  - type: text
    content: and the water was parted to the one side and to the other, till the two of them could go over on dry ground.
  '9':
  - type: text
    content: 'When they had crossed, Elijah said to Elisha, “Ask what I shall do for you, before I am taken from you.” And Elisha said, “Please let there be a double portion of your spirit on me.” '
