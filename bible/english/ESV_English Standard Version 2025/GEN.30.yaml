document_id: GEN.30,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'When Rachel saw that '
  - type: note
    content: ch. 29:31
  - type: text
    content: 'she bore Jacob no children, she envied her sister. She said to Jacob, “Give me children, or I shall die!” '
  '10':
  - type: text
    content: 'Then Leah’s servant Zilpah bore Jacob a son. '
  '11':
  - type: text
    content: 'And Leah said, '
  - type: note
    content: '[ch. 49:19]'
  - type: text
    content: '“Good fortune has come!” so she called his name '
  - type: note
    content: '[ch. 49:19]'
  - type: text
    content: Gad.
  - type: note
    content: Gad sounds like the Hebrew for good fortune
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Leah’s servant Zilpah bore Jacob a second son. '
  '13':
  - type: text
    content: 'And Leah said, “Happy am I! For women '
  - type: note
    content: '[Luke 1:48]'
  - type: text
    content: have called me happy.” So she called his name Asher.
  - type: note
    content: Asher sounds like the Hebrew for happy
  '14':
  - type: text
    content: 'In the days of wheat harvest Reuben went and found '
  - type: note
    content: Song 7:13
  - type: text
    content: 'mandrakes in the field and brought them to his mother Leah. Then Rachel said to Leah, “Please give me some of your son’s mandrakes.” '
  '15':
  - type: text
    content: 'But she said to her, “Is it a small matter that you have taken away my husband? Would you take away my son’s mandrakes also?” Rachel said, “Then he may lie with you tonight in exchange for your son’s mandrakes.” '
  '16':
  - type: text
    content: 'When Jacob came from the field in the evening, Leah went out to meet him and said, “You must come in to me, for I have hired you with my son’s mandrakes.” So he lay with her that night. '
  '17':
  - type: text
    content: 'And God listened to Leah, and she conceived and bore Jacob a fifth son. '
  '18':
  - type: text
    content: Leah said, “God has given me my wages because I gave my servant to my husband.” So she called his name Issachar.
  - type: note
    content: Issachar sounds like the Hebrew for wages, or hire
  '19':
  - type: text
    content: 'And Leah conceived again, and she bore Jacob a sixth son. '
  '2':
  - type: text
    content: 'Jacob’s anger was kindled against Rachel, and he said, “Am I in the place of God, '
  - type: note
    content: '[ch. 16:2; 1 Sam. 1:5]'
  - type: text
    content: 'who has withheld from you the fruit of the womb?” '
  '20':
  - type: text
    content: 'Then Leah said, “God has endowed me with a good endowment; now my husband will honor me, because I have borne him six sons.” So she called his name '
  - type: note
    content: '[Matt. 4:13]'
  - type: text
    content: Zebulun.
  - type: note
    content: Zebulun sounds like the Hebrew for honor
  - type: text
    content: ' '
  '21':
  - type: text
    content: Afterward she bore a daughter and called her name Dinah.
  '22':
  - type: text
    content: 'Then God '
  - type: note
    content: See ch. 8:1
  - type: text
    content: 'remembered Rachel, and God listened to her and '
  - type: note
    content: ch. 29:31; [Ps. 127:3]
  - type: text
    content: 'opened her womb. '
  '23':
  - type: text
    content: 'She conceived and bore a son and said, “God has taken away '
  - type: note
    content: Luke 1:25; [1 Sam. 1:6; Isa. 4:1]
  - type: text
    content: 'my reproach.” '
  '24':
  - type: text
    content: And she called his name Joseph,
  - type: note
    content: Joseph means May he add, and sounds like the Hebrew for taken away
  - type: text
    content: ' saying, '
  - type: note
    content: ch. 35:17
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ' add to me another son!”'
  - type: heading
    content: Jacob’s Prosperity
  '25':
  - type: text
    content: 'As soon as Rachel had borne Joseph, Jacob said to Laban, “Send me away, that I may go to my own home and country. '
  '26':
  - type: text
    content: 'Give me my wives and my children '
  - type: note
    content: ch. 29:20, 30
  - type: text
    content: 'for whom I have served you, that I may go, for you know the service that I have given you.” '
  '27':
  - type: text
    content: But Laban said to him, “If I have found favor in your sight, I have learned by divination that
  - type: note
    content: Or have become rich and
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed me because of you. '
  '28':
  - type: note
    content: ch. 29:15
  - type: text
    content: 'Name your wages, and I will give it.” '
  '29':
  - type: text
    content: 'Jacob said to him, '
  - type: note
    content: ch. 31:6, 38-40
  - type: text
    content: '“You yourself know how I have served you, and how your livestock has fared with me. '
  '3':
  - type: text
    content: 'Then she said, “Here is my servant '
  - type: note
    content: ch. 29:29
  - type: text
    content: 'Bilhah; go in to her, so that she may give birth '
  - type: note
    content: ch. 50:23
  - type: text
    content: on my behalf,
  - type: note
    content: Hebrew on my knees
  - type: text
    content: ' that even I may have children'
  - type: note
    content: Hebrew be built up, which sounds like the Hebrew for children
  - type: text
    content: ' through her.” '
  '30':
  - type: text
    content: 'For you had little before I came, '
  - type: note
    content: ver. 43
  - type: text
    content: 'and it has increased abundantly, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed you wherever I turned. But now when shall I '
  - type: note
    content: '[1 Tim. 5:8]'
  - type: text
    content: 'provide for my own household also?” '
  '31':
  - type: text
    content: 'He said, “What shall I give you?” Jacob said, “You shall not give me anything. If you will do this for me, I will again pasture your flock and keep it: '
  '32':
  - type: text
    content: 'let me pass through all your flock today, removing from it every speckled and spotted sheep and every black lamb, and the spotted and speckled among the goats, and '
  - type: note
    content: ch. 31:8
  - type: text
    content: 'they shall be my wages. '
  '33':
  - type: text
    content: 'So my honesty will answer for me later, when you come to look into my wages with you. Every one that is not speckled and spotted among the goats and black among the lambs, if found with me, shall be counted stolen.” '
  '34':
  - type: text
    content: 'Laban said, “Good! Let it be as you have said.” '
  '35':
  - type: text
    content: 'But that day Laban removed the male goats that were striped and spotted, and all the female goats that were speckled and spotted, every one that had white on it, and every lamb that was black, and put them in the charge of his sons. '
  '36':
  - type: text
    content: And he set a distance of three days’ journey between himself and Jacob, and Jacob pastured the rest of Laban’s flock.
  '37':
  - type: text
    content: 'Then '
  - type: note
    content: See ch. 31:8-12
  - type: text
    content: 'Jacob took fresh sticks of poplar and almond and plane trees, and peeled white streaks in them, exposing the white of the sticks. '
  '38':
  - type: text
    content: 'He set the sticks that he had peeled in front of the flocks in the troughs, that is, the '
  - type: note
    content: '[Ex. 2:16]'
  - type: text
    content: 'watering places, where the flocks came to drink. And since they bred when they came to drink, '
  '39':
  - type: text
    content: 'the flocks bred in front of the sticks and so the flocks brought forth striped, speckled, and spotted. '
  '4':
  - type: text
    content: 'So she gave him her servant Bilhah as a wife, and Jacob went in to her. '
  '40':
  - type: text
    content: 'And Jacob separated the lambs and set the faces of the flocks toward the striped and all the black in the flock of Laban. He put his own droves apart and did not put them with Laban’s flock. '
  '41':
  - type: text
    content: 'Whenever the stronger of the flock were breeding, Jacob would lay the sticks in the troughs before the eyes of the flock, that they might breed among the sticks, '
  '42':
  - type: text
    content: 'but for the feebler of the flock he would not lay them there. So the feebler would be Laban’s, and the stronger Jacob’s. '
  '43':
  - type: text
    content: 'Thus the man '
  - type: note
    content: ver. 30
  - type: text
    content: 'increased greatly and '
  - type: note
    content: ch. 24:35; 26:13, 14
  - type: text
    content: had large flocks, female servants and male servants, and camels and donkeys.
  '5':
  - type: text
    content: 'And Bilhah conceived and bore Jacob a son. '
  '6':
  - type: text
    content: 'Then Rachel said, “God has '
  - type: note
    content: '[ch. 49:16]'
  - type: text
    content: judged me, and has also heard my voice and given me a son.” Therefore she called his name Dan.
  - type: note
    content: Dan sounds like the Hebrew for judged
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Rachel’s servant Bilhah conceived again and bore Jacob a second son. '
  '8':
  - type: text
    content: Then Rachel said, “With mighty wrestlings
  - type: note
    content: Hebrew With wrestlings of God
  - type: text
    content: ' I have wrestled with my sister and have prevailed.” So she called his name '
  - type: note
    content: '[Matt. 4:13]'
  - type: text
    content: Naphtali.
  - type: note
    content: Naphtali sounds like the Hebrew for wrestling
  '9':
  - type: text
    content: 'When Leah saw that she had ceased bearing children, she took her servant Zilpah and '
  - type: note
    content: ver. 4; ch. 29:24
  - type: text
    content: 'gave her to Jacob as a wife. '
