document_id: NUM.19,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laws for Purification
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and to Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the one who gathers the ashes of the heifer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: shall wash his clothes and be unclean until evening. And this shall be a perpetual statute for the people of Israel, and for the stranger who sojourns among them.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: ' ; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:19
      marker-yv: yv-n
    - type: text
      text: '“Whoever touches the dead body of any person shall be unclean seven days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:19
      marker-yv: yv-n
    - type: text
      text: 'shall cleanse himself with the water on the third day and on the seventh day, and so be clean. But if he does not cleanse himself on the third day and on the seventh day, he will not become clean. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever touches a dead person, the body of anyone who has died, and does not cleanse himself, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 15:31
      marker-yv: yv-n
    - type: text
      text: 'defiles the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 30:33
      marker-yv: yv-n
    - type: text
      text: and that person shall be cut off from Israel; because the water for impurity was not thrown on him, he shall be unclean. His uncleanness is still on him.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the law when someone dies in a tent: everyone who comes into the tent and everyone who is in the tent shall be unclean seven days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And every '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 11:32
      marker-yv: yv-n
    - type: text
      text: 'open vessel that has no cover fastened on it is unclean. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      marker-yv: yv-n
    - type: text
      text: 'Whoever in the open field touches someone who was killed with a sword or who died naturally, or touches a human bone or a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 23:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 11:44
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'grave, shall be unclean seven days. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the unclean they shall take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 9:13
      marker-yv: yv-n
    - type: text
      text: some ashes of the burnt sin offering, and fresh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: living
      marker-yv: yv-n
    - type: text
      text: ' water shall be added in a vessel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a clean person shall take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:22
      marker-yv: yv-n
    - type: text
      text: 'hyssop and dip it in the water and sprinkle it on the tent and on all the furnishings and on the persons who were there and on whoever touched the bone, or the slain or the dead or the grave. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the clean person shall sprinkle it on the unclean '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'on the third day and on the seventh day. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 14:9
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Thus on the seventh day he shall cleanse him, and he shall '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 11:25
      marker-yv: yv-n
    - type: text
      text: wash his clothes and bathe himself in water, and at evening he shall be clean.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the statute of the law that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded: Tell the people of Israel to bring you a red heifer without defect, in which there is no blemish, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 21:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 6:7
      marker-yv: yv-n
    - type: text
      text: 'and on which a yoke has never come. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If the man who is unclean does not cleanse himself, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 30:33
      marker-yv: yv-n
    - type: text
      text: 'that person shall be cut off from the midst of the assembly, since he has defiled the sanctuary of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Because the water for impurity has not been thrown on him, he is unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be a statute forever for them. The one who sprinkles the water for impurity shall wash his clothes, and the one who touches the water for impurity shall be unclean until evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. 11; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hag. 2:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: whatever the unclean person touches shall be unclean, and anyone who touches it shall be unclean until evening.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall give it to Eleazar the priest, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:12
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'it shall be taken outside the camp and slaughtered before him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eleazar the priest shall take some of its blood with his finger, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; Heb. 9:13'
      marker-yv: yv-n
    - type: text
      text: 'sprinkle some of its blood toward the front of the tent of meeting seven times. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the heifer shall be burned in his sight. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 29:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      marker-yv: yv-n
    - type: text
      text: 'Its skin, its flesh, and its blood, with its dung, shall be burned. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest shall take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 14:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '49'
      marker-yv: yv-n
    - type: text
      text: 'cedarwood and hyssop and scarlet yarn, and throw them into the fire burning the heifer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priest '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 11:25
      marker-yv: yv-n
    - type: text
      text: 'shall wash his clothes and bathe his body in water, and afterward he may come into the camp. But the priest shall be unclean until evening. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      marker-yv: yv-n
    - type: text
      text: 'The one who burns the heifer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'shall wash his clothes in water and bathe his body in water and shall be unclean until evening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a man who is clean shall gather up '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 9:13
      marker-yv: yv-n
    - type: text
      text: 'the ashes of the heifer and deposit them outside the camp in a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 4:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:14
      marker-yv: yv-n
    - type: text
      text: 'clean place. And they shall be kept for the water for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13, 20, 21
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:23
      marker-yv: yv-n
    - type: text
      text: 'impurity for the congregation of the people of Israel; it is a sin offering. '
