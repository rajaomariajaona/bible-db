document_id: NUM.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Purification
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and to Aaron, saying, '
  '10':
  - type: text
    content: 'And the one who gathers the ashes of the heifer '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: shall wash his clothes and be unclean until evening. And this shall be a perpetual statute for the people of Israel, and for the stranger who sojourns among them.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ver. 16 ; See ch. 5:2; 9:6, 10; 31:19
  - type: text
    content: '“Whoever touches the dead body of any person shall be unclean seven days. '
  '12':
  - type: text
    content: 'He '
  - type: note
    content: ch. 31:19
  - type: text
    content: 'shall cleanse himself with the water on the third day and on the seventh day, and so be clean. But if he does not cleanse himself on the third day and on the seventh day, he will not become clean. '
  '13':
  - type: text
    content: 'Whoever touches a dead person, the body of anyone who has died, and does not cleanse himself, '
  - type: note
    content: ver. 20; Lev. 15:31
  - type: text
    content: 'defiles the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See Ex. 30:33
  - type: text
    content: and that person shall be cut off from Israel; because the water for impurity was not thrown on him, he shall be unclean. His uncleanness is still on him.
  '14':
  - type: text
    content: '“This is the law when someone dies in a tent: everyone who comes into the tent and everyone who is in the tent shall be unclean seven days. '
  '15':
  - type: text
    content: 'And every '
  - type: note
    content: ch. 31:20; Lev. 11:32
  - type: text
    content: 'open vessel that has no cover fastened on it is unclean. '
  '16':
  - type: note
    content: ver. 11
  - type: text
    content: 'Whoever in the open field touches someone who was killed with a sword or who died naturally, or touches a human bone or a '
  - type: note
    content: '[Matt. 23:27; Luke 11:44]'
  - type: text
    content: 'grave, shall be unclean seven days. '
  '17':
  - type: text
    content: 'For the unclean they shall take '
  - type: note
    content: Heb. 9:13
  - type: text
    content: some ashes of the burnt sin offering, and fresh
  - type: note
    content: Hebrew living
  - type: text
    content: ' water shall be added in a vessel. '
  '18':
  - type: text
    content: 'Then a clean person shall take '
  - type: note
    content: See Ex. 12:22
  - type: text
    content: 'hyssop and dip it in the water and sprinkle it on the tent and on all the furnishings and on the persons who were there and on whoever touched the bone, or the slain or the dead or the grave. '
  '19':
  - type: text
    content: 'And the clean person shall sprinkle it on the unclean '
  - type: note
    content: ver. 12
  - type: text
    content: 'on the third day and on the seventh day. '
  - type: note
    content: '[Lev. 14:9]'
  - type: text
    content: 'Thus on the seventh day he shall cleanse him, and he shall '
  - type: note
    content: See Lev. 11:25
  - type: text
    content: wash his clothes and bathe himself in water, and at evening he shall be clean.
  '2':
  - type: text
    content: '“This is the statute of the law that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: Tell the people of Israel to bring you a red heifer without defect, in which there is no blemish, '
  - type: note
    content: Deut. 21:3; 1 Sam. 6:7
  - type: text
    content: 'and on which a yoke has never come. '
  '20':
  - type: text
    content: '“If the man who is unclean does not cleanse himself, '
  - type: note
    content: See Ex. 30:33
  - type: text
    content: 'that person shall be cut off from the midst of the assembly, since he has defiled the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: '. Because the water for impurity has not been thrown on him, he is unclean. '
  '21':
  - type: text
    content: 'And it shall be a statute forever for them. The one who sprinkles the water for impurity shall wash his clothes, and the one who touches the water for impurity shall be unclean until evening. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 11; Hag. 2:13]'
  - type: text
    content: whatever the unclean person touches shall be unclean, and anyone who touches it shall be unclean until evening.”
  '3':
  - type: text
    content: 'And you shall give it to Eleazar the priest, and '
  - type: note
    content: Lev. 4:12; [Heb. 13:11]
  - type: text
    content: 'it shall be taken outside the camp and slaughtered before him. '
  '4':
  - type: text
    content: 'And Eleazar the priest shall take some of its blood with his finger, and '
  - type: note
    content: '[Lev. 4:6, 17; 16:14, 19]; Heb. 9:13'
  - type: text
    content: 'sprinkle some of its blood toward the front of the tent of meeting seven times. '
  '5':
  - type: text
    content: 'And the heifer shall be burned in his sight. '
  - type: note
    content: Ex. 29:14; Lev. 4:11, 12
  - type: text
    content: 'Its skin, its flesh, and its blood, with its dung, shall be burned. '
  '6':
  - type: text
    content: 'And the priest shall take '
  - type: note
    content: See Lev. 14:4, 6, 49
  - type: text
    content: 'cedarwood and hyssop and scarlet yarn, and throw them into the fire burning the heifer. '
  '7':
  - type: text
    content: 'Then the priest '
  - type: note
    content: See Lev. 11:25
  - type: text
    content: 'shall wash his clothes and bathe his body in water, and afterward he may come into the camp. But the priest shall be unclean until evening. '
  '8':
  - type: note
    content: ver. 5
  - type: text
    content: 'The one who burns the heifer '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'shall wash his clothes in water and bathe his body in water and shall be unclean until evening. '
  '9':
  - type: text
    content: 'And a man who is clean shall gather up '
  - type: note
    content: Heb. 9:13
  - type: text
    content: 'the ashes of the heifer and deposit them outside the camp in a '
  - type: note
    content: Lev. 4:12; 6:11; 10:14
  - type: text
    content: 'clean place. And they shall be kept for the water for '
  - type: note
    content: ver. 13, 20, 21; ch. 31:23
  - type: text
    content: 'impurity for the congregation of the people of Israel; it is a sin offering. '
