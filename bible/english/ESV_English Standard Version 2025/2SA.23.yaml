document_id: 2SA.23,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Last Words of David
  - type: text
    content: 'Now these are the last words of David:'
  - type: text
    content: The oracle of David, the son of Jesse,
  - type: text
    content: 'the oracle of '
  - type: note
    content: '[ch. 7:8, 9; Ps. 78:70, 71]'
  - type: text
    content: the man who was raised on high,
  - type: note
    content: '[See ch. 22:51 above]'
  - type: text
    content: the anointed of the God of Jacob,
  - type: text
    content: 'the sweet psalmist of Israel:'
  - type: note
    content: Or the favorite of the songs of Israel
  '10':
  - type: text
    content: 'He rose and struck down the Philistines until his hand was weary, and his hand clung to the sword. And the '
  - type: text
    content: Lord
  - type: text
    content: ' brought about a great victory that day, and the men returned after him only to strip the slain.'
  '11':
  - type: text
    content: 'And next to him was Shammah, the son of Agee the '
  - type: note
    content: ver. 33
  - type: text
    content: Hararite. The Philistines gathered together at Lehi,
  - type: note
    content: Or gathered together as a camp
  - type: text
    content: ' where there was a plot of ground full of lentils, and the men fled from the Philistines. '
  '12':
  - type: text
    content: 'But he took his stand in the midst of the plot and defended it and struck down the Philistines, and the '
  - type: text
    content: Lord
  - type: text
    content: ' worked a great victory.'
  '13':
  - type: text
    content: 'And three of the thirty chief men went down and came about harvest time to David at the '
  - type: note
    content: See 1 Sam. 22:1
  - type: text
    content: 'cave of Adullam, when a band of Philistines was encamped '
  - type: note
    content: See ch. 5:18
  - type: text
    content: 'in the Valley of Rephaim. '
  '14':
  - type: text
    content: 'David was then '
  - type: note
    content: 1 Sam. 22:4, 5
  - type: text
    content: 'in the stronghold, and '
  - type: note
    content: '[1 Sam. 13:23]'
  - type: text
    content: 'the garrison of the Philistines was then at Bethlehem. '
  '15':
  - type: text
    content: 'And David said longingly, “Oh, that someone would give me water to drink from the well of Bethlehem that is by the gate!” '
  '16':
  - type: text
    content: 'Then the three mighty men broke through the camp of the Philistines and drew water out of the well of Bethlehem that was by the gate and carried and brought it to David. But he would not drink of it. He poured it out to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'and said, “Far be it from me, O '
  - type: text
    content: Lord
  - type: text
    content: ', that I should do this. Shall I drink '
  - type: note
    content: '[Lev. 17:10]'
  - type: text
    content: the blood of the men who went at the risk of their lives?” Therefore he would not drink it. These things the three mighty men did.
  '18':
  - type: text
    content: Now Abishai, the brother of Joab, the son of Zeruiah, was chief of the thirty.
  - type: note
    content: Two Hebrew manuscripts, Syriac; most Hebrew manuscripts three
  - type: text
    content: ' And he wielded his spear against three hundred men'
  - type: note
    content: Or slain ones
  - type: text
    content: ' and killed them and won a name beside the three. '
  '19':
  - type: text
    content: He was the most renowned of the thirty
  - type: note
    content: Compare 1 Chronicles 11:21; Hebrew Was he the most renowned of the three?
  - type: text
    content: ' and became their commander, but he did not attain to '
  - type: note
    content: 1 Chr. 11:21
  - type: text
    content: the three.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Pet. 1:21 ]'
  - type: text
    content: '“The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks by me;'
  - type: text
    content: his word is on my tongue.
  '20':
  - type: text
    content: 'And '
  - type: note
    content: ch. 8:18; 20:23
  - type: text
    content: Benaiah the son of Jehoiada was a valiant man
  - type: note
    content: Or the son of Ishhai
  - type: text
    content: ' of '
  - type: note
    content: Josh. 15:21
  - type: text
    content: Kabzeel, a doer of great deeds. He struck down two ariels
  - type: note
    content: The meaning of the word ariel is uncertain
  - type: text
    content: ' of Moab. He also went down and struck down a lion in a pit on a day when snow had fallen. '
  '21':
  - type: text
    content: 'And he struck down an Egyptian, a handsome man. The Egyptian had a spear in his hand, but Benaiah went down to him with a staff and snatched the spear out of the Egyptian’s hand and killed him with his own spear. '
  '22':
  - type: text
    content: 'These things did Benaiah the son of Jehoiada, and won a name beside the three mighty men. '
  '23':
  - type: text
    content: He was renowned among the thirty, but he did not attain to the three. And David set him over his bodyguard.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:18; 1 Chr. 27:7
  - type: text
    content: 'Asahel the brother of Joab was one of the thirty; Elhanan the son of Dodo of Bethlehem, '
  '25':
  - type: note
    content: '[1 Chr. 11:27; 27:8]'
  - type: text
    content: 'Shammah of Harod, Elika of Harod, '
  '26':
  - type: text
    content: 'Helez the Paltite, Ira the son of Ikkesh '
  - type: note
    content: See ch. 14:2
  - type: text
    content: 'of Tekoa, '
  '27':
  - type: text
    content: 'Abiezer '
  - type: note
    content: Josh. 21:18
  - type: text
    content: 'of Anathoth, Mebunnai '
  - type: note
    content: ch. 21:18
  - type: text
    content: 'the Hushathite, '
  '28':
  - type: text
    content: 'Zalmon '
  - type: note
    content: ver. 9
  - type: text
    content: 'the Ahohite, Maharai '
  - type: note
    content: 2 Kgs. 25:23
  - type: text
    content: 'of Netophah, '
  '29':
  - type: text
    content: 'Heleb the son of Baanah '
  - type: note
    content: '[See ver. 28 above]'
  - type: text
    content: 'of Netophah, Ittai the son of Ribai of '
  - type: note
    content: Josh. 18:28; Judg. 19:14
  - type: text
    content: 'Gibeah of the people of Benjamin, '
  '3':
  - type: text
    content: The God of Israel has spoken;
  - type: note
    content: See ch. 22:2, 3, 32, 47
  - type: text
    content: 'the Rock of Israel has said to me:'
  - type: text
    content: When one rules justly over men,
  - type: text
    content: 'ruling '
  - type: note
    content: Ex. 18:21; 2 Chr. 19:7, 9
  - type: text
    content: in the fear of God,
  '30':
  - type: text
    content: 'Benaiah '
  - type: note
    content: Judg. 12:13, 15; 1 Chr. 27:14
  - type: text
    content: 'of Pirathon, Hiddai of the brooks of '
  - type: note
    content: Josh. 24:30; Judg. 2:9
  - type: text
    content: 'Gaash, '
  '31':
  - type: text
    content: 'Abi-albon the Arbathite, Azmaveth of '
  - type: note
    content: '[ch. 3:16]'
  - type: text
    content: 'Bahurim, '
  '32':
  - type: text
    content: 'Eliahba the Shaalbonite, the sons of Jashen, Jonathan, '
  '33':
  - type: note
    content: ver. 11
  - type: text
    content: 'Shammah the Hararite, Ahiam the son of Sharar the Hararite, '
  '34':
  - type: text
    content: 'Eliphelet the son of Ahasbai '
  - type: note
    content: ch. 10:6, 8
  - type: text
    content: 'of Maacah, '
  - type: note
    content: ch. 11:3
  - type: text
    content: 'Eliam the son of '
  - type: note
    content: ch. 15:12
  - type: text
    content: 'Ahithophel the Gilonite, '
  '35':
  - type: text
    content: Hezro
  - type: note
    content: Or Hezrai
  - type: text
    content: ' '
  - type: note
    content: Josh. 15:55
  - type: text
    content: 'of Carmel, Paarai the Arbite, '
  '36':
  - type: text
    content: 'Igal the son of Nathan '
  - type: note
    content: ch. 8:3
  - type: text
    content: 'of Zobah, Bani the Gadite, '
  '37':
  - type: text
    content: 'Zelek the Ammonite, Naharai '
  - type: note
    content: ch. 4:2
  - type: text
    content: 'of Beeroth, the armor-bearer of Joab the son of Zeruiah, '
  '38':
  - type: note
    content: '[ch. 20:26]'
  - type: text
    content: 'Ira the '
  - type: note
    content: 1 Chr. 2:53
  - type: text
    content: 'Ithrite, Gareb the Ithrite, '
  '39':
  - type: note
    content: ch. 11:3, 6
  - type: text
    content: 'Uriah the Hittite: thirty-seven in all.'
  '4':
  - type: text
    content: 'he '
  - type: note
    content: '[Judg. 5:31; Prov. 4:18; Hos. 6:5]'
  - type: text
    content: dawns on them like the morning light,
  - type: text
    content: like the sun shining forth on a cloudless morning,
  - type: text
    content: like rain
  - type: note
    content: Hebrew from rain
  - type: text
    content: ' that makes grass to sprout from the earth.'
  '5':
  - type: text
    content: “For does not my house stand so with God?
  - type: note
    content: ch. 7:15, 16; Ps. 89:29; Isa. 55:3
  - type: text
    content: For he has made with me an everlasting covenant,
  - type: text
    content: ordered in all things and secure.
  - type: text
    content: For will he not cause to prosper
  - type: text
    content: all my help and my desire?
  '6':
  - type: text
    content: But worthless men
  - type: note
    content: Hebrew worthlessness
  - type: text
    content: ' are all like thorns that are thrown away,'
  - type: text
    content: for they cannot be taken with the hand;
  '7':
  - type: text
    content: but the man who touches them
  - type: text
    content: arms himself with iron and the shaft of a spear,
  - type: text
    content: and they are utterly consumed with fire.”
  - type: note
    content: Hebrew consumed with fire in the sitting
  - type: heading
    content: David’s Mighty Men
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-39, see 1 Chr. 11:11-47
  - type: text
    content: 'These are the names of the mighty men whom David had: '
  - type: note
    content: '[1 Chr. 27:2, 3]'
  - type: text
    content: Josheb-basshebeth a Tahchemonite; he was chief of the three.
  - type: note
    content: Or of the captains
  - type: text
    content: ' He wielded his spear'
  - type: note
    content: Compare 1 Chronicles 11:11; the meaning of the Hebrew expression is uncertain
  - type: text
    content: ' against eight hundred whom he killed at one time.'
  '9':
  - type: text
    content: 'And next to him among the three mighty men was Eleazar the son of '
  - type: note
    content: 1 Chr. 27:4
  - type: text
    content: 'Dodo, son of '
  - type: note
    content: ver. 28
  - type: text
    content: 'Ahohi. He was with David when they defied the Philistines who were gathered there for battle, and the men of Israel withdrew. '
