document_id: 2SA.21,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Avenges the Gibeonites
  - type: text
    content: 'Now there was a famine in the days of David for three years, year after year. And David '
  - type: note
    content: '[Num. 27:21]'
  - type: text
    content: 'sought the face of the '
  - type: text
    content: Lord
  - type: text
    content: '. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “There is bloodguilt on Saul and on his house, because he put the Gibeonites to death.” '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 21:23 ]'
  - type: text
    content: 'Then Rizpah the daughter of Aiah took sackcloth and spread it for herself on the rock, from the beginning of harvest until rain fell upon them from the heavens. And she did not allow the birds of the air to come upon them by day, or the beasts of the field by night. '
  '11':
  - type: text
    content: 'When David was told what Rizpah the daughter of Aiah, the concubine of Saul, had done, '
  '12':
  - type: text
    content: 'David went and took the bones of Saul and the bones of his son Jonathan from the men of Jabesh-gilead, '
  - type: note
    content: 1 Sam. 31:10-13; [ch. 2:4]
  - type: text
    content: 'who had stolen them from the public square of '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Beth-shan, where the Philistines had hanged them, on the day the Philistines killed Saul on Gilboa. '
  '13':
  - type: text
    content: 'And he brought up from there the bones of Saul and the bones of his son Jonathan; and they gathered the bones of those who were hanged. '
  '14':
  - type: text
    content: 'And they buried the bones of Saul and his son Jonathan in the land of Benjamin in '
  - type: note
    content: Josh. 18:28
  - type: text
    content: 'Zela, in the tomb of Kish his father. And they did all that the king commanded. And after that '
  - type: note
    content: ch. 24:25
  - type: text
    content: God responded to the plea for the land.
  - type: heading
    content: War with the Philistines
  '15':
  - type: text
    content: 'There was war again between the Philistines and Israel, and David went down together with his servants, and they fought against the Philistines. And David grew weary. '
  '16':
  - type: text
    content: 'And Ishbi-benob, one of the descendants '
  - type: note
    content: ver. 18, 20, 22
  - type: text
    content: of the giants, whose spear weighed three hundred shekels
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' of bronze, and who was armed with a new sword, thought to kill David. '
  '17':
  - type: text
    content: 'But Abishai the son of Zeruiah came to his aid and attacked the Philistine and killed him. Then David’s men swore to him, '
  - type: note
    content: '[ch. 18:3]'
  - type: text
    content: '“You shall no longer go out with us to battle, lest you quench '
  - type: note
    content: ch. 22:29; 1 Kgs. 11:36; 15:4; 2 Kgs. 8:19; 2 Chr. 21:7; Ps. 132:17
  - type: text
    content: the lamp of Israel.”
  '18':
  - type: text
    content: ' '
  - type: note
    content: For ver. 18-22, see 1 Chr. 20:4-8
  - type: text
    content: 'After this there was again war with the Philistines at Gob. Then '
  - type: note
    content: 1 Chr. 11:29; 27:11
  - type: text
    content: 'Sibbecai '
  - type: note
    content: ch. 23:27
  - type: text
    content: 'the Hushathite struck down Saph, who was one of the descendants '
  - type: note
    content: ver. 16, 20, 22
  - type: text
    content: 'of the giants. '
  '19':
  - type: text
    content: 'And there was again war with the Philistines at Gob, and '
  - type: note
    content: '[ch. 23:24]'
  - type: text
    content: 'Elhanan the son of Jaare-oregim, the Bethlehemite, struck down Goliath the Gittite, '
  - type: note
    content: 1 Sam. 17:7; 1 Chr. 20:5
  - type: text
    content: the shaft of whose spear was like a weaver’s beam.
  - type: note
    content: Contrast 1 Chronicles 20:5, which may preserve the original reading
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So the king called the Gibeonites and spoke to them. Now the Gibeonites were not of the people of Israel but '
  - type: note
    content: See Josh. 9:3-17
  - type: text
    content: 'of the remnant of the Amorites. Although the people of Israel had sworn to spare them, Saul had sought to strike them down in his zeal for the people of Israel and Judah. '
  '20':
  - type: text
    content: 'And there was again war at Gath, where there was a man of great stature, who had six fingers on each hand, and six toes on each foot, twenty-four in number, and he also was descended '
  - type: note
    content: ver. 16, 18
  - type: text
    content: 'from the giants. '
  '21':
  - type: text
    content: 'And when '
  - type: note
    content: 1 Sam. 17:10, 25, 26, 36, 45
  - type: text
    content: 'he taunted Israel, Jonathan the son of Shimei, David’s brother, struck him down. '
  '22':
  - type: text
    content: 'These four were descended '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: from the giants in Gath, and they fell by the hand of David and by the hand of his servants.
  '3':
  - type: text
    content: 'And David said to the Gibeonites, “What shall I do for you? And how shall I make atonement, that you may bless '
  - type: note
    content: See 1 Sam. 26:19
  - type: text
    content: 'the heritage of the '
  - type: text
    content: Lord
  - type: text
    content: '?” '
  '4':
  - type: text
    content: 'The Gibeonites said to him, “It is not a matter of silver or gold between us and Saul or his house; neither is it for us to put any man to death in Israel.” And he said, “What do you say that I shall do for you?” '
  '5':
  - type: text
    content: 'They said to the king, “The man who consumed us and planned to destroy us, so that we should have no place in all the territory of Israel, '
  '6':
  - type: text
    content: 'let seven of his sons be given to us, so that we may hang them before the '
  - type: text
    content: Lord
  - type: text
    content: ' at '
  - type: note
    content: 1 Sam. 10:26; 11:4
  - type: text
    content: 'Gibeah of Saul, '
  - type: note
    content: 1 Sam. 10:24
  - type: text
    content: 'the chosen of the '
  - type: text
    content: Lord
  - type: text
    content: .” And the king said, “I will give them.”
  '7':
  - type: text
    content: 'But the king spared Mephibosheth, the son of Saul’s son Jonathan, because of '
  - type: note
    content: 1 Sam. 20:8, 42; 23:18
  - type: text
    content: 'the oath of the '
  - type: text
    content: Lord
  - type: text
    content: ' that was between them, between David and Jonathan the son of Saul. '
  '8':
  - type: text
    content: 'The king took the two sons of '
  - type: note
    content: ch. 3:7
  - type: text
    content: Rizpah the daughter of Aiah, whom she bore to Saul, Armoni and Mephibosheth; and the five sons of Merab
  - type: note
    content: Two Hebrew manuscripts, Septuagint; most Hebrew manuscripts Michal
  - type: text
    content: ' the daughter of Saul, whom '
  - type: note
    content: '[Gen. 50:23]'
  - type: text
    content: 'she bore to '
  - type: note
    content: '[1 Sam. 18:19]'
  - type: text
    content: 'Adriel the son of Barzillai the Meholathite; '
  '9':
  - type: text
    content: 'and he gave them into the hands of the Gibeonites, and they hanged them on the mountain before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the seven of them perished together. They were put to death in the first days of harvest, '
  - type: note
    content: Ruth 1:22
  - type: text
    content: at the beginning of barley harvest.
