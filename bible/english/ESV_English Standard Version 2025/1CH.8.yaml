    content: A Genealogy of Saul
  - type: text
    content: ' '
  - type: note
    content: '[ch. 7:6; Gen. 46:21; Num. 26:38 ]'
  - type: text
    content: 'Benjamin fathered Bela his firstborn, Ashbel the second, '
  - type: note
    content: '[ch. 7:12]'
  - type: text
    content: 'Aharah the third, '
  '10':
  - type: text
    content: 'Jeuz, Sachia, and Mirmah. These were his sons, heads of fathers’ houses. '
  '11':
  - type: text
    content: 'He also fathered sons by Hushim: Abitub and Elpaal. '
  '12':
  - type: text
    content: 'The sons of Elpaal: Eber, Misham, and Shemed, who built '
  - type: note
    content: Ezra 2:33; Neh. 6:2; 7:37; 11:35
  - type: text
    content: 'Ono and '
  - type: note
    content: '[Acts 9:32, 35, 38]'
  - type: text
    content: 'Lod with its towns, '
  '13':
  - type: text
    content: 'and Beriah and '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'Shema (they were heads of fathers’ houses of the inhabitants of '
  - type: note
    content: Josh. 10:12
  - type: text
    content: 'Aijalon, who caused the inhabitants of Gath to flee); '
  '14':
  - type: text
    content: 'and Ahio, Shashak, and Jeremoth. '
  '15':
  - type: text
    content: 'Zebadiah, Arad, Eder, '
  '16':
  - type: text
    content: 'Michael, Ishpah, and Joha were sons of Beriah. '
  '17':
  - type: text
    content: 'Zebadiah, Meshullam, Hizki, Heber, '
  '18':
  - type: text
    content: 'Ishmerai, Izliah, and Jobab were the sons of Elpaal. '
  '19':
  - type: text
    content: 'Jakim, Zichri, Zabdi, '
  '2':
  - type: text
    content: 'Nohah the fourth, and Rapha the fifth. '
  '20':
  - type: text
    content: 'Elienai, Zillethai, Eliel, '
  '21':
  - type: text
    content: 'Adaiah, Beraiah, and Shimrath were the sons of Shimei. '
  '22':
  - type: text
    content: 'Ishpan, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdon, Zichri, Hanan, '
  '24':
  - type: text
    content: 'Hananiah, Elam, Anthothijah, '
  '25':
  - type: text
    content: 'Iphdeiah, and Penuel were the sons of Shashak. '
  '26':
  - type: text
    content: 'Shamsherai, Shehariah, Athaliah, '
  '27':
  - type: text
    content: 'Jaareshiah, Elijah, and Zichri were the sons of Jeroham. '
  '28':
  - type: text
    content: These were the heads of fathers’ houses, according to their generations, chief men. These lived in Jerusalem.
  '29':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:35 ]'
  - type: note
    content: For ver. 29-32, see ch. 9:35-38
  - type: text
    content: Jeiel
  - type: note
    content: Compare 9:35; Hebrew lacks Jeiel
  - type: text
    content: ' the father of Gibeon lived in Gibeon, and the name of his wife was Maacah. '
  '3':
  - type: text
    content: 'And Bela had sons: Addar, Gera, Abihud, '
  '30':
  - type: text
    content: 'His firstborn son: Abdon, then Zur, Kish, Baal, Nadab, '
  '31':
  - type: text
    content: 'Gedor, Ahio, Zecher, '
  '32':
  - type: text
    content: 'and Mikloth (he fathered Shimeah). Now these also lived opposite their kinsmen in Jerusalem, with their kinsmen. '
  '33':
  - type: note
    content: For ver. 33-38, see ch. 9:39-44; [1 Sam. 9:1; 14:51]
  - type: text
    content: 'Ner was the father of Kish, Kish of Saul, Saul of '
  - type: note
    content: ch. 10:2; 1 Sam. 31:2
  - type: text
    content: 'Jonathan, Malchi-shua, Abinadab and Eshbaal; '
  '34':
  - type: text
    content: 'and the son of Jonathan was Merib-baal; and Merib-baal was the father of '
  - type: note
    content: 2 Sam. 9:12
  - type: text
    content: 'Micah. '
  '35':
  - type: text
    content: 'The sons of Micah: Pithon, Melech, Tarea, and Ahaz. '
  '36':
  - type: text
    content: 'Ahaz fathered Jehoaddah, and Jehoaddah fathered Alemeth, Azmaveth, and Zimri. Zimri fathered Moza. '
  '37':
  - type: text
    content: 'Moza fathered Binea; Raphah was his son, Eleasah his son, Azel his son. '
  '38':
  - type: text
    content: 'Azel had six sons, and these are their names: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan. All these were the sons of Azel. '
  '39':
  - type: text
    content: 'The sons of Eshek his brother: Ulam his firstborn, Jeush the second, and Eliphelet the third. '
  '4':
  - type: text
    content: 'Abishua, '
  - type: note
    content: Num. 26:40
  - type: text
    content: 'Naaman, Ahoah, '
  '40':
  - type: text
    content: The sons of Ulam were men who were mighty warriors, bowmen, having many sons and grandsons, 150. All these were Benjaminites.
  '5':
  - type: text
    content: 'Gera, '
  - type: note
    content: '[ch. 7:12]'
  - type: text
    content: 'Shephuphan, and Huram. '
  '6':
  - type: text
    content: 'These are the sons of Ehud (they were heads of fathers’ houses of the inhabitants of Geba, and they were carried into exile to '
  - type: note
    content: '[ch. 2:52, 54]'
  - type: text
    content: 'Manahath): '
  '7':
  - type: text
    content: Naaman,
  - type: note
    content: Hebrew and Naaman
  - type: text
    content: ' Ahijah, and Gera, that is, Heglam, who fathered'
  - type: note
    content: Or Gera; he carried them into exile and fathered
  - type: text
    content: ' Uzza and Ahihud. '
  '8':
  - type: text
    content: 'And Shaharaim fathered sons in the country of Moab after he had sent away Hushim and Baara his wives. '
  '9':
  - type: text
    content: 'He fathered sons by Hodesh his wife: Jobab, Zibia, Mesha, Malcam, '
