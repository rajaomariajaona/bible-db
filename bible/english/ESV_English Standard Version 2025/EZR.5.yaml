document_id: EZR.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebuilding Begins Anew
  - type: text
    content: 'Now the prophets, '
  - type: note
    content: Hag. 1:1
  - type: text
    content: 'Haggai and '
  - type: note
    content: Zech. 1:1
  - type: text
    content: 'Zechariah the son of Iddo, prophesied to the Jews who were in Judah and Jerusalem, in the name of the God of Israel who was over them. '
  '10':
  - type: text
    content: We also asked them their names, for your information, that we might write down the names of their leaders.
  - type: note
    content: Aramaic of the men at their heads
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And this was their reply to us: ‘We are the servants of the God of heaven and earth, and we are rebuilding the house that was built many years ago, '
  - type: note
    content: 1 Kgs. 6:1
  - type: text
    content: 'which a great king of Israel built and '
  - type: note
    content: ch. 4:12
  - type: text
    content: 'finished. '
  '12':
  - type: note
    content: 2 Chr. 36:16, 17
  - type: text
    content: 'But because our fathers had angered the God of heaven, he '
  - type: note
    content: 2 Kgs. 24:2; See 2 Kgs. 25:8-11
  - type: text
    content: 'gave them into the hand of Nebuchadnezzar king of Babylon, the Chaldean, who destroyed this house and carried away the people to Babylonia. '
  '13':
  - type: note
    content: ch. 1:1
  - type: text
    content: 'However, in the first year of Cyrus king of Babylon, Cyrus the king made a decree that this house of God should be rebuilt. '
  '14':
  - type: note
    content: ch. 1:7, 8; 6:5
  - type: text
    content: 'And the gold and silver vessels of the house of God, which Nebuchadnezzar had taken out of the temple that was in Jerusalem and brought into the temple of Babylon, these Cyrus the king took out of the temple of Babylon, and they were delivered to one whose name was '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'Sheshbazzar, whom he had made governor; '
  '15':
  - type: text
    content: 'and he said to him, “Take these vessels, go and put them in the temple that is in Jerusalem, and let the house of God be rebuilt on its site.” '
  '16':
  - type: text
    content: 'Then this '
  - type: note
    content: '[See ver. 14above]'
  - type: text
    content: 'Sheshbazzar came and '
  - type: note
    content: ch. 3:8, 10
  - type: text
    content: 'laid the foundations of the house of God that is in Jerusalem, and from that time until now it has been in building, and it is '
  - type: note
    content: '[ch. 6:15]'
  - type: text
    content: 'not yet finished.’ '
  '17':
  - type: text
    content: 'Therefore, if it seems good to the king, '
  - type: note
    content: ch. 6:1, 2
  - type: text
    content: let search be made in the royal archives there in Babylon, to see whether a decree was issued by Cyrus the king for the rebuilding of this house of God in Jerusalem. And let the king send us his pleasure in this matter.”
  '2':
  - type: note
    content: ch. 3:2
  - type: text
    content: 'Then Zerubbabel the son of Shealtiel and '
  - type: note
    content: See ch. 3:2
  - type: text
    content: 'Jeshua the son of Jozadak arose and began to rebuild the house of God that is in Jerusalem, and the prophets of God were '
  - type: note
    content: '[ch. 6:14]'
  - type: text
    content: with them, supporting them.
  '3':
  - type: text
    content: 'At the same time '
  - type: note
    content: ch. 6:6, 13
  - type: text
    content: 'Tattenai the governor of the province Beyond the River and Shethar-bozenai and their associates came to them and spoke to them thus: '
  - type: note
    content: ch. 4:12
  - type: text
    content: '“Who gave you a decree to build this house and to finish this structure?” '
  '4':
  - type: text
    content: 'They also asked them this:'
  - type: note
    content: Septuagint, Syriac; Aramaic Then we said to them,
  - type: text
    content: ' “What are the names of the men who are building this building?” '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 33:18; [ch. 7:6, 28]
  - type: text
    content: the eye of their God was on the elders of the Jews, and they did not stop them until the report should reach Darius and then an answer be returned by letter concerning it.
  - type: heading
    content: Tattenai’s Letter to King Darius
  '6':
  - type: text
    content: 'This is a copy of the letter that '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Tattenai the governor of the province Beyond the River and Shethar-bozenai and his associates, the '
  - type: note
    content: '[ch. 4:9]'
  - type: text
    content: 'governors who were in the province Beyond the River, sent to Darius the king. '
  '7':
  - type: text
    content: 'They sent him a report, in which was written as follows: “To Darius the king, all peace. '
  '8':
  - type: text
    content: 'Be it known to the king that we went to the province of Judah, to the house of the great God. It is being built with huge stones, and timber is laid in the walls. This work goes on diligently and prospers in their hands. '
  '9':
  - type: text
    content: 'Then we asked those elders and spoke to them thus: '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '‘Who gave you a decree to build this house and to finish this structure?’ '
