document_id: DAN.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Prayer for His People
  - type: text
    content: ' '
  - type: note
    content: ch. 11:1
  - type: text
    content: 'In the first year of '
  - type: note
    content: See ch. 5:31
  - type: text
    content: 'Darius the son of Ahasuerus, by descent a '
  - type: note
    content: '[ch. 8:20]'
  - type: text
    content: 'Mede, who was made king over the realm of the '
  - type: note
    content: ch. 5:30
  - type: text
    content: 'Chaldeans— '
  '10':
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'and have not obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God by walking in his laws, which he set before us by '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'his servants the prophets. '
  '11':
  - type: note
    content: See Isa. 1:4-6
  - type: text
    content: 'All Israel has transgressed your law and turned aside, '
  - type: note
    content: '[Jer. 40:3; 44:23]'
  - type: text
    content: 'refusing to obey your voice. '
  - type: note
    content: Jer. 44:22
  - type: text
    content: 'And the curse and oath '
  - type: note
    content: See Lev. 26:14-45; Deut. 28:15-68
  - type: text
    content: 'that are written in the Law of '
  - type: note
    content: 1 Chr. 6:49; 2 Chr. 24:9; Neh. 10:29
  - type: text
    content: 'Moses the servant of God have been poured out upon us, because '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'we have sinned against him. '
  '12':
  - type: text
    content: 'He has confirmed his words, which he spoke against us and against '
  - type: note
    content: '[Ps. 82:2, 3]'
  - type: text
    content: our rulers who ruled us,
  - type: note
    content: Or our judges who judged us
  - type: text
    content: ' by '
  - type: note
    content: Jer. 39:16
  - type: text
    content: 'bringing upon us a great calamity. '
  - type: note
    content: Ezek. 5:9; [Lam. 1:12]
  - type: text
    content: 'For under the whole heaven there has not been done anything like what has been done against Jerusalem. '
  '13':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'As it is written in the Law of Moses, all this calamity has come upon us; yet we have not entreated the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, '
  - type: note
    content: Hos. 7:10
  - type: text
    content: 'turning from our iniquities and gaining insight by your truth. '
  '14':
  - type: note
    content: '[Jer. 1:12]'
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept ready the calamity and has brought it upon us, '
  - type: note
    content: Neh. 9:33; See ver. 7
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is righteous in all the works that he has done, and '
  - type: note
    content: ver. 10
  - type: text
    content: 'we have not obeyed his voice. '
  '15':
  - type: text
    content: 'And now, O Lord our God, who brought your people out of the land of Egypt '
  - type: note
    content: Ex. 32:11; [Ex. 6:1; Neh. 1:10]
  - type: text
    content: 'with a mighty hand, and '
  - type: note
    content: Ex. 14:18; Neh. 9:10
  - type: text
    content: 'have made a name for yourself, as at this day, '
  - type: note
    content: See ver. 5
  - type: text
    content: we have sinned, we have done wickedly.
  '16':
  - type: text
    content: '“O Lord, '
  - type: note
    content: Ps. 31:1; 71:2
  - type: text
    content: 'according to all your righteous acts, let your anger and your wrath turn away from your city Jerusalem, '
  - type: note
    content: ver. 20; ch. 11:45; Jer. 31:23; Zech. 8:3
  - type: text
    content: 'your holy hill, '
  - type: note
    content: Lam. 1:5
  - type: text
    content: 'because for our sins, and for '
  - type: note
    content: '[Ex. 20:5]'
  - type: text
    content: 'the iniquities of our fathers, '
  - type: note
    content: Lam. 2:15, 16
  - type: text
    content: 'Jerusalem and your people have become '
  - type: note
    content: Ps. 44:13; 79:4; Ezek. 36:4; Mic. 6:16
  - type: text
    content: 'a byword among all who are around us. '
  '17':
  - type: text
    content: Now therefore, O our God, listen to the prayer of your servant and to his pleas for mercy, and for your own sake, O Lord,
  - type: note
    content: Hebrew for the Lord’s sake
  - type: text
    content: ' '
  - type: note
    content: Num. 6:25
  - type: text
    content: 'make your face to shine upon '
  - type: note
    content: Lam. 5:18
  - type: text
    content: 'your sanctuary, which is desolate. '
  '18':
  - type: note
    content: 2 Kgs. 19:16; Isa. 37:17
  - type: text
    content: 'O my God, incline your ear and hear. Open your eyes and see '
  - type: note
    content: ver. 26; See ver. 27
  - type: text
    content: 'our desolations, and '
  - type: note
    content: Jer. 25:29
  - type: text
    content: 'the city that is called by your name. For we do not present our pleas before you because of our righteousness, but because of your great mercy. '
  '19':
  - type: text
    content: 'O Lord, hear; O Lord, forgive. O Lord, pay attention and act. '
  - type: note
    content: Ps. 40:17; 70:5
  - type: text
    content: 'Delay not, '
  - type: note
    content: Ps. 25:11; 79:9
  - type: text
    content: 'for your own sake, O my God, because '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'your city and '
  - type: note
    content: Jer. 14:9
  - type: text
    content: your people are called by your name.”
  - type: heading
    content: Gabriel Brings an Answer
  '2':
  - type: text
    content: 'in the first year of his reign, I, Daniel, perceived in the books the number of years that, according to '
  - type: note
    content: '[Ezra 1:1; Jer. 25:12]'
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Jeremiah the prophet, must pass before the end of the desolations of Jerusalem, namely, seventy years.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Isa. 65:24
  - type: text
    content: 'While I was speaking and praying, confessing my sin and the sin of my people Israel, and presenting my plea before the '
  - type: text
    content: Lord
  - type: text
    content: ' my God for '
  - type: note
    content: See ver. 16
  - type: text
    content: 'the holy hill of my God, '
  '21':
  - type: text
    content: 'while I was speaking in prayer, the man '
  - type: note
    content: See ch. 8:16
  - type: text
    content: 'Gabriel, whom I had seen in the vision at the first, '
  - type: note
    content: See ch. 8:18
  - type: text
    content: 'came to me in swift flight at '
  - type: note
    content: Ex. 29:39; [1 Kgs. 18:36; Ezra 9:4, 5]
  - type: text
    content: 'the time of the evening sacrifice. '
  '22':
  - type: note
    content: '[ch. 8:16]'
  - type: text
    content: 'He made me understand, speaking with me and saying, “O Daniel, I have now come out to give you '
  - type: note
    content: '[ch. 1:4, 17]'
  - type: text
    content: 'insight and understanding. '
  '23':
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'At the beginning of your pleas for mercy a word went out, '
  - type: note
    content: '[ch. 10:12, 14]'
  - type: text
    content: 'and I have come to tell it to you, for '
  - type: note
    content: ch. 10:11, 19
  - type: text
    content: 'you are greatly loved. Therefore consider the word '
  - type: note
    content: '[Matt. 24:15; Mark 13:14]'
  - type: text
    content: and understand the vision.
  - type: heading
    content: The Seventy Weeks
  '24':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 4:6 ]'
  - type: text
    content: “Seventy weeks
  - type: note
    content: Or sevens; also twice in verse 25 and once in verse 26
  - type: text
    content: ' are decreed about your people and '
  - type: note
    content: Neh. 11:1
  - type: text
    content: 'your holy city, to finish '
  - type: note
    content: ch. 8:13
  - type: text
    content: 'the transgression, to put an end to sin, '
  - type: note
    content: '[Ps. 78:38; Heb. 2:17]; See Jer. 31:34'
  - type: text
    content: 'and to atone for iniquity, '
  - type: note
    content: Rom. 3:25, 26; See Jer. 23:5, 6
  - type: text
    content: 'to bring in everlasting righteousness, to seal both vision and prophet, and '
  - type: note
    content: '[Ps. 45:7; Isa. 61:1; Acts 4:26, 27]'
  - type: text
    content: to anoint a most holy place.
  - type: note
    content: Or thing, or one
  - type: text
    content: ' '
  '25':
  - type: note
    content: '[ver. 23]'
  - type: text
    content: 'Know therefore and understand that '
  - type: note
    content: '[2 Chr. 36:23; Ezra 1:3; 4:24; 6:15; Neh. 6:15]'
  - type: text
    content: 'from the going out of the word to restore and '
  - type: note
    content: '[Ps. 51:18]'
  - type: text
    content: 'build Jerusalem to the coming of an '
  - type: note
    content: John 1:41
  - type: text
    content: 'anointed one, a '
  - type: note
    content: Isa. 55:4
  - type: text
    content: prince, there shall be seven weeks. And for sixty-two weeks it shall be built again
  - type: note
    content: Or there shall be seven weeks and sixty-two weeks. It shall be built again
  - type: text
    content: ' with squares and moat, '
  - type: note
    content: See Neh. 4:7, 8, 16-18
  - type: text
    content: 'but in a troubled time. '
  '26':
  - type: text
    content: 'And after the sixty-two weeks, an anointed one shall '
  - type: note
    content: Isa. 53:8; [Mark 9:12; Luke 24:26]
  - type: text
    content: 'be cut off and shall have nothing. And the people of the prince who is to come '
  - type: note
    content: '[Matt. 24:2; Mark 13:2; Luke 19:43, 44]'
  - type: text
    content: 'shall destroy the city and the sanctuary. '
  - type: note
    content: Nah. 1:8; [ch. 11:10, 22, 26, 40]
  - type: text
    content: Its
  - type: note
    content: Or His
  - type: text
    content: ' end shall come with a flood, '
  - type: note
    content: Matt. 24:6, 14
  - type: text
    content: 'and to the end there shall be war. '
  - type: note
    content: ver. 18; See ver. 27
  - type: text
    content: 'Desolations are decreed. '
  '27':
  - type: text
    content: And he shall make a strong covenant with many for one week,
  - type: note
    content: Or seven; twice in this verse
  - type: text
    content: ' and for half of the week he shall put an end to sacrifice and offering. '
  - type: note
    content: Matt. 24:15; Mark 13:14; [Luke 21:20]
  - type: text
    content: 'And on the wing of abominations shall come one who makes desolate, until '
  - type: note
    content: Isa. 10:23
  - type: text
    content: the decreed end is poured out on the desolator.”
  '3':
  - type: text
    content: 'Then I turned my face to the Lord God, seeking him by '
  - type: note
    content: ver. 17, 18, 23; [Neh. 1:4]
  - type: text
    content: 'prayer and pleas for mercy with fasting and sackcloth and ashes. '
  '4':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and '
  - type: note
    content: ver. 20; [Ezra 10:1; Neh. 1:6]
  - type: text
    content: 'made confession, saying, '
  - type: note
    content: Neh. 1:5; 9:32
  - type: text
    content: '“O Lord, the '
  - type: note
    content: Neh. 1:5; 9:32
  - type: text
    content: 'great and awesome God, who '
  - type: note
    content: Deut. 7:9
  - type: text
    content: 'keeps covenant and steadfast love with those who love him and keep his commandments, '
  '5':
  - type: note
    content: ver. 15
  - type: text
    content: 'we have sinned and done wrong and acted wickedly '
  - type: note
    content: Lam. 3:42
  - type: text
    content: 'and rebelled, turning aside from your commandments and rules. '
  '6':
  - type: note
    content: 2 Chr. 36:15, 16
  - type: text
    content: 'We have not listened to '
  - type: note
    content: Ezra 9:11; Zech. 1:6
  - type: text
    content: 'your servants the prophets, who spoke in your name to '
  - type: note
    content: Ezra 9:7; Neh. 9:34
  - type: text
    content: 'our kings, our princes, and our fathers, and to all the people of the land. '
  '7':
  - type: text
    content: 'To you, '
  - type: note
    content: '[ver. 14; Lam. 1:18]'
  - type: text
    content: 'O Lord, belongs righteousness, but to us open shame, as at this day, to the men of Judah, to the inhabitants of Jerusalem, and to all Israel, '
  - type: note
    content: '[Esth. 9:20]'
  - type: text
    content: 'those who are near and '
  - type: note
    content: '[Esth. 9:20]'
  - type: text
    content: 'those who are far away, in '
  - type: note
    content: See Jer. 8:3
  - type: text
    content: 'all the lands to which you have driven them, because of '
  - type: note
    content: Lev. 26:40
  - type: text
    content: 'the treachery that they have committed against you. '
  '8':
  - type: text
    content: 'To us, O '
  - type: text
    content: Lord
  - type: text
    content: ', belongs open shame, to our kings, to our princes, and to our fathers, because '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: 'we have sinned against you. '
  '9':
  - type: note
    content: Neh. 9:17; Ps. 86:15
  - type: text
    content: 'To the Lord our God belong mercy and forgiveness, for we have rebelled against him '
