document_id: REV.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb and the 144,000
  - type: text
    content: 'Then I looked, and behold, on '
  - type: note
    content: Ps. 2:6; Heb. 12:22
  - type: text
    content: 'Mount Zion '
  - type: note
    content: See ch. 5:6
  - type: text
    content: 'stood the Lamb, and with him '
  - type: note
    content: ch. 7:4
  - type: text
    content: '144,000 who '
  - type: note
    content: ch. 3:12
  - type: text
    content: 'had his name and his Father’s name written '
  - type: note
    content: ch. 7:3
  - type: text
    content: 'on their foreheads. '
  '10':
  - type: text
    content: 'he also will drink '
  - type: note
    content: ch. 16:19; See Job 21:20
  - type: text
    content: 'the wine of God’s wrath, '
  - type: note
    content: '[ch. 18:6; Isa. 1:22]'
  - type: text
    content: 'poured full strength into the cup of his anger, and '
  - type: note
    content: ch. 20:10
  - type: text
    content: 'he will be tormented with fire and sulfur in the presence of the holy angels and in the presence of the Lamb. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 34:10; [ch. 18:18; 19:3; Gen. 19:28]
  - type: text
    content: 'the smoke of their torment goes up forever and ever, and '
  - type: note
    content: ch. 4:8
  - type: text
    content: 'they have no rest, day or night, these '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: worshipers of the beast and its image, and whoever receives the mark of its name.”
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:10
  - type: text
    content: 'Here is a call for the endurance of the saints, those who '
  - type: note
    content: ch. 12:17
  - type: text
    content: keep the commandments of God and their faith in Jesus.
  - type: note
    content: Greek and the faith of Jesus
  '13':
  - type: text
    content: 'And I heard a voice from heaven saying, “Write this: '
  - type: note
    content: ch. 20:6; [Eccles. 4:2]
  - type: text
    content: 'Blessed are the dead '
  - type: note
    content: 1 Cor. 15:18; 1 Thess. 4:16
  - type: text
    content: 'who die in the Lord from now on.” “Blessed indeed,” says the Spirit, '
  - type: note
    content: ch. 6:11
  - type: text
    content: “that they may rest from their labors, for their deeds follow them!”
  - type: heading
    content: The Harvest of the Earth
  '14':
  - type: text
    content: 'Then I looked, and behold, a white cloud, and seated on the cloud one '
  - type: note
    content: See ch. 1:13
  - type: text
    content: 'like a son of man, '
  - type: note
    content: ch. 6:2
  - type: text
    content: 'with a golden crown on his head, and a sharp sickle in his hand. '
  '15':
  - type: text
    content: 'And another angel '
  - type: note
    content: '[ch. 15:6; 16:17]'
  - type: text
    content: 'came out of the temple, calling with a loud voice to him who sat on the cloud, '
  - type: note
    content: ver. 18; Joel 3:13; Mark 4:29; [Matt. 13:39]
  - type: text
    content: '“Put in your sickle, and reap, for the hour to reap has come, for '
  - type: note
    content: Jer. 51:33
  - type: text
    content: 'the harvest of the earth is fully ripe.” '
  '16':
  - type: text
    content: So he who sat on the cloud swung his sickle across the earth, and the earth was reaped.
  '17':
  - type: text
    content: 'Then another angel came out of the temple in heaven, and he too had a sharp sickle. '
  '18':
  - type: text
    content: 'And another angel came out from the altar, '
  - type: note
    content: '[ch. 16:8]'
  - type: text
    content: 'the angel who has authority over the fire, and he called with a loud voice to the one who had the sharp sickle, “Put in your sickle and gather the clusters from the vine of the earth, '
  - type: note
    content: Joel 3:13
  - type: text
    content: 'for its grapes are ripe.” '
  '19':
  - type: text
    content: 'So the angel swung his sickle across the earth and gathered the grape harvest of the earth and threw it into the great '
  - type: note
    content: ch. 19:15
  - type: text
    content: 'winepress of the wrath of God. '
  '2':
  - type: text
    content: 'And I heard a voice from heaven '
  - type: note
    content: See ch. 1:15
  - type: text
    content: 'like the roar of many waters and '
  - type: note
    content: ch. 6:1; 19:6
  - type: text
    content: 'like the sound of loud thunder. The voice I heard was like the sound of '
  - type: note
    content: ch. 5:8; 15:2
  - type: text
    content: 'harpists playing on their harps, '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Isa. 63:3; Lam. 1:15
  - type: text
    content: 'the winepress was trodden '
  - type: note
    content: '[Heb. 13:12]'
  - type: text
    content: 'outside the city, and blood flowed from the winepress, as high as '
  - type: note
    content: '[ch. 19:14]'
  - type: text
    content: a horse’s bridle, for 1,600 stadia.
  - type: note
    content: About 184 miles; a stadion was about 607 feet or 185 meters
  '3':
  - type: text
    content: 'and they were singing '
  - type: note
    content: ch. 5:9
  - type: text
    content: 'a new song before the throne and before the four living creatures and before the elders. '
  - type: note
    content: '[ch. 2:17; 19:12]'
  - type: text
    content: 'No one could learn that song except the 144,000 who had been redeemed from the earth. '
  '4':
  - type: text
    content: 'It is these who have not defiled themselves with women, for '
  - type: note
    content: 2 Cor. 11:2
  - type: text
    content: 'they are virgins. It is these '
  - type: note
    content: '[ch. 3:4; 17:14]'
  - type: text
    content: 'who follow the Lamb wherever he goes. These have been redeemed from mankind as '
  - type: note
    content: James 1:18
  - type: text
    content: 'firstfruits for God and the Lamb, '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: Zeph. 3:13; [Ps. 32:2; Isa. 63:8; John 1:47]
  - type: text
    content: 'in their mouth no lie was found, for they are '
  - type: note
    content: See Jude 24
  - type: text
    content: blameless.
  - type: heading
    content: The Messages of the Three Angels
  '6':
  - type: text
    content: 'Then I saw another angel '
  - type: note
    content: ch. 8:13
  - type: text
    content: 'flying directly overhead, with an eternal gospel to proclaim to '
  - type: note
    content: '[ch. 3:10]'
  - type: text
    content: 'those who dwell on earth, to every nation and tribe and language and people. '
  '7':
  - type: text
    content: 'And he said with a loud voice, '
  - type: note
    content: ch. 15:4
  - type: text
    content: '“Fear God and '
  - type: note
    content: See ch. 11:13
  - type: text
    content: 'give him glory, because the hour of his judgment has come, and '
  - type: note
    content: Neh. 9:6; See ch. 4:11
  - type: text
    content: 'worship him who made heaven and earth, the sea and the '
  - type: note
    content: ch. 8:10; 16:4
  - type: text
    content: springs of water.”
  '8':
  - type: text
    content: 'Another angel, a second, followed, saying, '
  - type: note
    content: ch. 18:2; Isa. 21:9; Jer. 51:8
  - type: text
    content: '“Fallen, fallen is '
  - type: note
    content: ch. 16:19; 17:5; 18:10; [Dan. 4:30]
  - type: text
    content: 'Babylon the great, '
  - type: note
    content: Jer. 51:7
  - type: text
    content: 'she who made all nations drink '
  - type: note
    content: ch. 18:3
  - type: text
    content: the wine of the passion
  - type: note
    content: Or wrath
  - type: text
    content: ' of her sexual immorality.”'
  '9':
  - type: text
    content: 'And another angel, a third, followed them, saying with a loud voice, “If anyone '
  - type: note
    content: See ch. 13:15
  - type: text
    content: 'worships the beast and its image and receives '
  - type: note
    content: ch. 13:16
  - type: text
    content: 'a mark on his forehead or on his hand, '
