document_id: 1TH.3,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore when we could bear it no longer, we were willing '
  - type: note
    content: Acts 17:15, 16
  - type: text
    content: 'to be left behind at Athens alone, '
  '10':
  - type: text
    content: 'as we pray most earnestly '
  - type: note
    content: 2 Tim. 1:3
  - type: text
    content: 'night and day '
  - type: note
    content: ch. 2:17; [Rom. 1:10]
  - type: text
    content: 'that we may see you face to face and '
  - type: note
    content: See 2 Cor. 13:9
  - type: text
    content: supply what is lacking in your faith?
  '11':
  - type: text
    content: 'Now may '
  - type: note
    content: See Gal. 1:4
  - type: text
    content: 'our God and Father himself, and our Lord Jesus, '
  - type: note
    content: 2 Thess. 3:5
  - type: text
    content: 'direct our way to you, '
  '12':
  - type: text
    content: 'and may the Lord '
  - type: note
    content: ch. 4:1, 10; Phil. 1:9; 2 Thess. 1:3
  - type: text
    content: 'make you increase and abound in love '
  - type: note
    content: ch. 4:9; 5:15
  - type: text
    content: 'for one another and for all, as we do for you, '
  '13':
  - type: text
    content: 'so that he may '
  - type: note
    content: James 5:8
  - type: text
    content: 'establish your hearts blameless in holiness before '
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'our God and Father, at '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'the coming of our Lord Jesus '
  - type: note
    content: Zech. 14:5; Jude 14
  - type: text
    content: with all his saints.
  '2':
  - type: text
    content: 'and we '
  - type: note
    content: See Phil. 2:19
  - type: text
    content: 'sent Timothy, '
  - type: note
    content: 2 Cor. 1:1; Col. 1:1; Philem. 1; Heb. 13:23
  - type: text
    content: our brother and God’s coworker
  - type: note
    content: Some manuscripts servant
  - type: text
    content: ' in the gospel of Christ, to establish and exhort you in your faith, '
  '3':
  - type: text
    content: 'that no one be moved by these afflictions. For you yourselves know that '
  - type: note
    content: See Acts 9:16; 14:22
  - type: text
    content: 'we are destined for this. '
  '4':
  - type: text
    content: 'For when we were with you, we kept telling you beforehand that we were to suffer affliction, '
  - type: note
    content: See ch. 2:14
  - type: text
    content: 'just as it has come to pass, and just as you know. '
  '5':
  - type: text
    content: 'For this reason, '
  - type: note
    content: ver. 1, 2
  - type: text
    content: 'when I could bear it no longer, '
  - type: note
    content: ver. 1, 2
  - type: text
    content: 'I sent to learn about your faith, '
  - type: note
    content: '[1 Cor. 7:5; 2 Cor. 11:3]'
  - type: text
    content: 'for fear that somehow '
  - type: note
    content: Matt. 4:3
  - type: text
    content: 'the tempter had tempted you and '
  - type: note
    content: See Phil. 2:16
  - type: text
    content: our labor would be in vain.
  - type: heading
    content: Timothy’s Encouraging Report
  '6':
  - type: text
    content: 'But '
  - type: note
    content: Acts 18:5; [2 Cor. 7:6, 9]
  - type: text
    content: 'now that Timothy has come to us from you, and has brought us the good news of '
  - type: note
    content: See ch. 1:3
  - type: text
    content: 'your faith and love and reported '
  - type: note
    content: '[1 Cor. 11:2]'
  - type: text
    content: 'that you always remember us kindly and '
  - type: note
    content: See Phil. 1:8
  - type: text
    content: 'long to see us, as we long to see you— '
  '7':
  - type: text
    content: for this reason, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' in all our distress and affliction '
  - type: note
    content: 2 Cor. 1:4
  - type: text
    content: 'we have been comforted about you through your faith. '
  '8':
  - type: text
    content: 'For now we live, if you '
  - type: note
    content: See 1 Cor. 16:13
  - type: text
    content: 'are standing fast in the Lord. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 1:2]'
  - type: text
    content: 'what thanksgiving can we return to God for you, for all the joy that we feel for your sake before our God, '
