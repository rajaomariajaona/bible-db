document_id: LEV.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Nadab and Abihu
  - type: text
    content: 'Now '
  - type: note
    content: ch. 16:1; Ex. 6:23; 28:1; Num. 3:4; 26:61; 1 Chr. 24:2
  - type: text
    content: 'Nadab and Abihu, the sons of Aaron, '
  - type: note
    content: '[Num. 16:18]'
  - type: text
    content: 'each took his censer and put fire in it and laid incense on it and offered '
  - type: note
    content: Ex. 30:9
  - type: text
    content: unauthorized
  - type: note
    content: Or strange
  - type: text
    content: ' fire before the '
  - type: text
    content: Lord
  - type: text
    content: ', which he had not commanded them. '
  '10':
  - type: text
    content: 'You are to '
  - type: note
    content: ch. 11:47; 20:25; Ezek. 22:26; 44:23
  - type: text
    content: 'distinguish between the holy and the common, and between the unclean and the clean, '
  '11':
  - type: text
    content: 'and '
  - type: note
    content: ch. 14:57; Deut. 24:8; Neh. 8:2, 8, 9; [Jer. 18:18; Mal. 2:7]
  - type: text
    content: 'you are to teach the people of Israel all the statutes that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken to them by Moses.”'
  '12':
  - type: text
    content: 'Moses spoke to Aaron and to Eleazar and Ithamar, his surviving sons: “Take the '
  - type: note
    content: ch. 6:16; Num. 18:9, 10
  - type: text
    content: 'grain offering that is left of the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings, and eat it unleavened beside the altar, for '
  - type: note
    content: See ch. 6:17
  - type: text
    content: 'it is most holy. '
  '13':
  - type: text
    content: 'You shall eat it in a holy place, because it is your due and your sons’ due, from the '
  - type: text
    content: Lord
  - type: text
    content: '’s food offerings, for '
  - type: note
    content: ch. 2:3; 6:16
  - type: text
    content: 'so I am commanded. '
  '14':
  - type: text
    content: 'But the '
  - type: note
    content: ch. 7:31, 34; Ex. 29:24, 26, 27; Num. 18:11
  - type: text
    content: 'breast that is waved and the thigh that is contributed you shall eat in a clean place, you and your sons and your daughters with you, for they are given as your due and your sons’ due from the sacrifices of the peace offerings of the people of Israel. '
  '15':
  - type: note
    content: ch. 7:31, 34
  - type: text
    content: 'The thigh that is contributed and the breast that is waved they shall bring with the food offerings of the fat pieces to wave for a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', and it shall be yours and your sons’ with you as a due forever, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '16':
  - type: text
    content: 'Now Moses diligently inquired about '
  - type: note
    content: ch. 9:3, 15
  - type: text
    content: 'the goat of the sin offering, and behold, it was burned up! And he was angry with Eleazar and Ithamar, the surviving sons of Aaron, saying, '
  '17':
  - type: note
    content: ch. 6:26, 29
  - type: text
    content: '“Why have you not eaten the sin offering in the place of the sanctuary, since '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'it is a thing most holy and has been given to you that you may bear the iniquity of the congregation, to make atonement for them before the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  '18':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 6:30
  - type: text
    content: 'its blood was not brought into the inner part of the sanctuary. You certainly ought to have eaten it in the sanctuary, '
  - type: note
    content: ch. 6:26
  - type: text
    content: 'as I commanded.” '
  '19':
  - type: text
    content: 'And Aaron said to Moses, “Behold, '
  - type: note
    content: ch. 9:8, 12
  - type: text
    content: 'today they have offered their sin offering and their burnt offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', and yet such things as these have happened to me! If I had eaten the sin offering today, '
  - type: note
    content: Jer. 6:20; 14:12; Hos. 9:4; Mal. 1:10, 13; 2:13
  - type: text
    content: 'would the '
  - type: text
    content: Lord
  - type: text
    content: ' have approved?” '
  '2':
  - type: text
    content: 'And fire '
  - type: note
    content: ch. 9:24; Num. 16:35; [2 Sam. 6:7]
  - type: text
    content: 'came out from before the '
  - type: text
    content: Lord
  - type: text
    content: ' and consumed them, and they died before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: And when Moses heard that, he approved.
  '3':
  - type: text
    content: 'Then Moses said to Aaron, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has said: ‘Among '
  - type: note
    content: ch. 21:17, 21
  - type: text
    content: 'those who are near me '
  - type: note
    content: Ezek. 28:22
  - type: text
    content: 'I will be sanctified, and before all the people I will be glorified.’” '
  - type: note
    content: '[Ps. 39:9]'
  - type: text
    content: And Aaron held his peace.
  '4':
  - type: text
    content: 'And Moses called Mishael and Elzaphan, the sons of '
  - type: note
    content: Ex. 6:18, 22; Num. 3:19, 30
  - type: text
    content: 'Uzziel the uncle of Aaron, and said to them, “Come near; carry your brothers away from the front of the sanctuary and out of the camp.” '
  '5':
  - type: text
    content: 'So they came near and carried them in their coats out of the camp, as Moses had said. '
  '6':
  - type: text
    content: 'And Moses said to Aaron and to Eleazar and Ithamar his sons, '
  - type: note
    content: ch. 13:45; 21:10; Ezek. 24:16, 17
  - type: text
    content: '“Do not let the hair of your heads hang loose, and do not tear your clothes, lest you die, and '
  - type: note
    content: Num. 1:53; 16:22, 46; 18:5; Josh. 7:1; 22:18, 20
  - type: text
    content: 'wrath come upon all the congregation; but let your brothers, the whole house of Israel, bewail the burning that the '
  - type: text
    content: Lord
  - type: text
    content: ' has kindled. '
  '7':
  - type: note
    content: ch. 21:12
  - type: text
    content: 'And do not go outside the entrance of the tent of meeting, lest you die, '
  - type: note
    content: ch. 8:30
  - type: text
    content: 'for the anointing oil of the '
  - type: text
    content: Lord
  - type: text
    content: ' is upon you.” And they did according to the word of Moses.'
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Aaron, saying, '
  '9':
  - type: note
    content: Ezek. 44:21; [Num. 6:3, 20; Luke 1:15; 1 Tim. 3:3, 8]
  - type: text
    content: '“Drink no wine or strong drink, you or your sons with you, when you go into the tent of meeting, lest you die. It shall be a statute forever throughout your generations. '
