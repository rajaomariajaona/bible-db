document_id: EXO.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ten Commandments
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-17, see Deut. 5:6-21
  - type: text
    content: 'And '
  - type: note
    content: Deut. 5:22
  - type: text
    content: God spoke all these words, saying,
  '10':
  - type: text
    content: 'but the '
  - type: note
    content: ch. 16:26; 31:15; Gen. 2:2, 3; Ezek. 20:12; See Num. 15:32-36
  - type: text
    content: 'seventh day is a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. On it you shall not do any work, you, or your son, or your daughter, your male servant, or your female servant, or your livestock, or the '
  - type: note
    content: See Neh. 13:16-19
  - type: text
    content: 'sojourner who is within your gates. '
  '11':
  - type: text
    content: 'For '
  - type: note
    content: See Gen. 1:1–2:3
  - type: text
    content: 'in six days the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens and the earth, the sea, and all that is in them, and rested on the seventh day. Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the Sabbath day and made it holy.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:3; Cited Matt. 15:4; 19:19; Mark 7:10; 10:19; Luke 18:20; Eph. 6:2; [ Jer. 35:18, 19 ]
  - type: text
    content: '“Honor your father and your mother, '
  - type: note
    content: Eph. 6:3
  - type: text
    content: 'that your days may be long in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 5:21; 19:18; Rom. 13:9; [ Gen. 9:5, 6; 1 John 3:15 ]
  - type: text
    content: “You shall not murder.
  - type: note
    content: The Hebrew word also covers causing human death through carelessness or negligence
  '14':
  - type: text
    content: ' '
  - type: note
    content: Lev. 18:20; Deut. 22:22; Prov. 6:32; 1 Cor. 6:9; Heb. 13:4; Cited Matt. 5:27; Rom. 13:9
  - type: text
    content: “You shall not commit adultery.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:11; Eph. 4:28; Cited Matt. 19:18; Rom. 13:9
  - type: text
    content: “You shall not steal.
  '16':
  - type: text
    content: ' '
  - type: note
    content: ch. 23:1; Prov. 19:5, 9; 21:28; 24:28; 25:18; Cited Matt. 19:18; See Deut. 19:16-20
  - type: text
    content: “You shall not bear false witness against your neighbor.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Luke 12:15; Eph. 5:3, 5; Cited Rom. 7:7; 13:9; [ Col. 3:5; Heb. 13:5 ]
  - type: text
    content: '“You shall not covet '
  - type: note
    content: Mic. 2:2
  - type: text
    content: 'your neighbor’s house; '
  - type: note
    content: Jer. 5:8; Matt. 5:28
  - type: text
    content: you shall not covet your neighbor’s wife, or his male servant, or his female servant, or his ox, or his donkey, or anything that is your neighbor’s.”
  '18':
  - type: text
    content: 'Now when all the people saw '
  - type: note
    content: Heb. 12:18
  - type: text
    content: the thunder and the flashes of lightning and the sound of the trumpet and the mountain smoking, the people were afraid
  - type: note
    content: Samaritan, Septuagint, Syriac, Vulgate; Masoretic Text the people saw
  - type: text
    content: ' and trembled, and they stood far off '
  '19':
  - type: text
    content: 'and said to Moses, '
  - type: note
    content: Deut. 5:25, 27; 18:16; Gal. 3:19, 20; Heb. 12:19
  - type: text
    content: '“You speak to us, and we will listen; but do not let God speak to us, lest we die.” '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:13; Ps. 81:10; Hos. 13:4
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, out of the house of slavery.'
  '20':
  - type: note
    content: '[1 Sam. 12:20]'
  - type: text
    content: 'Moses said to the people, “Do not fear, for God has come to '
  - type: note
    content: '[Gen. 22:1]; Deut. 13:3'
  - type: text
    content: 'test you, that the fear of him may be before you, that you may not sin.” '
  '21':
  - type: text
    content: 'The people stood far off, while Moses drew near to the '
  - type: note
    content: Deut. 4:11; 2 Sam. 22:10; 1 Kgs. 8:12; Ps. 18:9; 97:2
  - type: text
    content: thick darkness where God was.
  - type: heading
    content: Laws About Altars
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Thus you shall say to the people of Israel: ‘You have seen for yourselves that I have '
  - type: note
    content: Deut. 4:36; Neh. 9:13; Heb. 12:25
  - type: text
    content: 'talked with you from heaven. '
  '23':
  - type: note
    content: '[ch. 32:31; 2 Kgs. 17:33; Ezek. 20:39; Zeph. 1:5]'
  - type: text
    content: 'You shall not make gods of silver to be with me, nor shall you make for yourselves gods of gold. '
  '24':
  - type: text
    content: 'An altar of earth you shall make for me and sacrifice on it your burnt offerings and your peace offerings, your sheep and your oxen. '
  - type: note
    content: Deut. 12:5, 11; 14:23; 16:6, 11; 26:2; 1 Kgs. 8:29; 9:3; 2 Chr. 6:6; 7:16; 12:13; Ezra 6:12; Neh. 1:9; Ps. 74:7; Jer. 7:10, 12
  - type: text
    content: 'In every place where I cause my name to be remembered I will come to you and '
  - type: note
    content: Deut. 7:13
  - type: text
    content: 'bless you. '
  '25':
  - type: note
    content: Deut. 27:5; Josh. 8:31
  - type: text
    content: 'If you make me an altar of stone, '
  - type: note
    content: '[1 Kgs. 5:17; 1 Chr. 22:2]'
  - type: text
    content: 'you shall not build it of hewn stones, for if you wield your tool on it you profane it. '
  '26':
  - type: text
    content: And you shall not go up by steps to my altar, that your nakedness be not exposed on it.’
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 17:35; Jer. 25:6; 35:15
  - type: text
    content: “You shall have no other gods before
  - type: note
    content: Or besides
  - type: text
    content: ' me.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:1; Deut. 27:15; Ps. 97:7; [ Acts 17:29 ]
  - type: text
    content: '“You shall not make for yourself a carved image, or any likeness of anything that is in heaven above, or that is in the earth beneath, or that is in the water under the earth. '
  '5':
  - type: note
    content: ch. 23:24; Josh. 23:7
  - type: text
    content: 'You shall not bow down to them or serve them, for I the '
  - type: text
    content: Lord
  - type: text
    content: ' your God am '
  - type: note
    content: ch. 34:14; Deut. 4:24; 6:15; Josh. 24:19; Nah. 1:2
  - type: text
    content: 'a jealous God, '
  - type: note
    content: ch. 34:7; Num. 14:18; [Ps. 79:8; 109:14; Isa. 65:6, 7; Jer. 32:18]
  - type: text
    content: 'visiting the iniquity of the fathers on the children to the third and fourth generation of those who hate me, '
  '6':
  - type: text
    content: but showing steadfast love to thousands
  - type: note
    content: Or to the thousandth generation
  - type: text
    content: ' of those who love me and keep my commandments.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:12; [ Matt. 5:34, 35; James 5:12 ]
  - type: text
    content: '“You shall not take the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in vain, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will not hold him guiltless who takes his name in vain.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:3, 30; 26:2; See ch. 31:13-17
  - type: text
    content: '“Remember the Sabbath day, to keep it holy. '
  '9':
  - type: note
    content: ch. 23:12; 34:21; 35:2; Lev. 23:3; Luke 13:14
  - type: text
    content: 'Six days you shall labor, and do all your work, '
