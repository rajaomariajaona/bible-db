      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 17:2
      metadata:
        usfm: MAT.17.2
    marker-yv: yv-n
  - type: text
    text: 'his face was like the sun, and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:15
      metadata:
        usfm: REV.1.15
    marker-yv: yv-n
  - type: text
    text: 'his legs like pillars of fire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8-10
      metadata:
        usfm: REV.10.8
    marker-yv: yv-n
  - type: text
    text: 'He had a little scroll open in his hand. And he set his right foot on the sea, and his left foot on the land, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and called out with a loud voice, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joel 3:16
      metadata:
        usfm: JOL.3.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 1:2
      metadata:
        usfm: AMO.1.2
    marker-yv: yv-n
  - type: text
    text: 'like a lion roaring. When he called out, the seven thunders sounded. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the seven thunders had sounded, I was about to write, but I heard a voice from heaven saying, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 8:26
      metadata:
        usfm: DAN.8.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:4
      metadata:
        usfm: DAN.12.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: DAN.12.9
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: text
      text: 22:10
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: '“Seal up what the seven thunders have said, and do not write it down.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the angel whom I saw standing on the sea and on the land '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 14:22
      metadata:
        usfm: GEN.14.22
    marker-yv: yv-n
  - type: text
    text: 'raised his right hand to heaven '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and swore by '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:9
      metadata:
        usfm: REV.4.9
    marker-yv: yv-n
  - type: text
    text: 'him who lives forever and ever, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:11
      metadata:
        usfm: REV.4.11
    marker-yv: yv-n
  - type: text
    text: 'who created heaven and what is in it, the earth and what is in it, and the sea and what is in it, that there would be no more delay, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but that '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: REV.11.15
    marker-yv: yv-n
  - type: text
    text: 'in the days of the trumpet call to be sounded by the seventh angel, the mystery of God would be fulfilled, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 3:7
      metadata:
        usfm: AMO.3.7
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: just as he announced to his servants the prophets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the voice that I had heard from heaven spoke to me again, saying, “Go, take the scroll that is open in the hand of the angel who is standing on the sea and on the land.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So I went to the angel and told him to give me the little scroll. And he said to me, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 2:8
      metadata:
        usfm: EZK.2.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:1-3
      metadata:
        usfm: EZK.3.1+EZK.3.2+EZK.3.3
    marker-yv: yv-n
  - type: text
    text: '“Take and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 15:16
      metadata:
        usfm: JER.15.16
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'eat it; it will make your stomach bitter, but in your mouth it will be sweet as honey.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I took the little scroll from the hand of the angel and ate it. It was sweet as honey in my mouth, but when I had eaten it my stomach was made bitter. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And I was told, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 37:4
      metadata:
        usfm: EZK.37.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: “You must again prophesy about many peoples and nations and languages and kings.”
