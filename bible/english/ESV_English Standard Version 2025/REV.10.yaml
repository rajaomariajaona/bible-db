document_id: REV.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel and the Little Scroll
  - type: text
    content: 'Then I saw another mighty angel coming down from heaven, wrapped in a cloud, with '
  - type: note
    content: Ezek. 1:28
  - type: text
    content: 'a rainbow over his head, and '
  - type: note
    content: ch. 1:16; Matt. 17:2
  - type: text
    content: 'his face was like the sun, and '
  - type: note
    content: ch. 1:15
  - type: text
    content: 'his legs like pillars of fire. '
  '10':
  - type: text
    content: 'And I took the little scroll from the hand of the angel and ate it. It was sweet as honey in my mouth, but when I had eaten it my stomach was made bitter. '
  '11':
  - type: text
    content: 'And I was told, '
  - type: note
    content: '[Ezek. 37:4]'
  - type: text
    content: “You must again prophesy about many peoples and nations and languages and kings.”
  '2':
  - type: note
    content: ver. 8-10
  - type: text
    content: 'He had a little scroll open in his hand. And he set his right foot on the sea, and his left foot on the land, '
  '3':
  - type: text
    content: 'and called out with a loud voice, '
  - type: note
    content: Joel 3:16; Amos 1:2
  - type: text
    content: 'like a lion roaring. When he called out, the seven thunders sounded. '
  '4':
  - type: text
    content: 'And when the seven thunders had sounded, I was about to write, but I heard a voice from heaven saying, '
  - type: note
    content: Dan. 8:26; 12:4, 9; [ch. 22:10]
  - type: text
    content: '“Seal up what the seven thunders have said, and do not write it down.” '
  '5':
  - type: text
    content: 'And the angel whom I saw standing on the sea and on the land '
  - type: note
    content: See Gen. 14:22
  - type: text
    content: 'raised his right hand to heaven '
  '6':
  - type: text
    content: 'and swore by '
  - type: note
    content: See ch. 4:9
  - type: text
    content: 'him who lives forever and ever, '
  - type: note
    content: See ch. 4:11
  - type: text
    content: 'who created heaven and what is in it, the earth and what is in it, and the sea and what is in it, that there would be no more delay, '
  '7':
  - type: text
    content: 'but that '
  - type: note
    content: ch. 11:15
  - type: text
    content: 'in the days of the trumpet call to be sounded by the seventh angel, the mystery of God would be fulfilled, '
  - type: note
    content: '[Amos 3:7]'
  - type: text
    content: just as he announced to his servants the prophets.
  '8':
  - type: text
    content: 'Then the voice that I had heard from heaven spoke to me again, saying, “Go, take the scroll that is open in the hand of the angel who is standing on the sea and on the land.” '
  '9':
  - type: text
    content: 'So I went to the angel and told him to give me the little scroll. And he said to me, '
  - type: note
    content: Ezek. 2:8; 3:1-3
  - type: text
    content: '“Take and '
  - type: note
    content: '[Jer. 15:16]'
  - type: text
    content: 'eat it; it will make your stomach bitter, but in your mouth it will be sweet as honey.” '
