document_id: ACT.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul in Ephesus
  - type: text
    content: 'And it happened that while '
  - type: note
    content: See ch. 18:24
  - type: text
    content: 'Apollos was at Corinth, Paul passed '
  - type: note
    content: '[ch. 18:23]'
  - type: text
    content: through the inland
  - type: note
    content: Greek upper (that is, highland)
  - type: text
    content: ' country and came to Ephesus. There he found some disciples. '
  '10':
  - type: text
    content: 'This continued for '
  - type: note
    content: '[ver. 8; ch. 20:31]'
  - type: text
    content: 'two years, so that '
  - type: note
    content: '[2 Tim. 1:15]'
  - type: text
    content: all the residents of Asia heard the word of the Lord, both Jews and Greeks.
  - type: heading
    content: The Sons of Sceva
  '11':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 5:15]; See ch. 5:12'
  - type: text
    content: 'God was doing extraordinary miracles by the hands of Paul, '
  '12':
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: 'so that even handkerchiefs or aprons that had touched his skin were carried away to the sick, and their diseases left them and '
  - type: note
    content: See Mark 16:17
  - type: text
    content: 'the evil spirits came out of them. '
  '13':
  - type: text
    content: 'Then some of the itinerant Jewish '
  - type: note
    content: '[Matt. 12:27; Luke 11:19]'
  - type: text
    content: 'exorcists '
  - type: note
    content: See Mark 9:38
  - type: text
    content: 'undertook to invoke the name of the Lord Jesus over those who had evil spirits, saying, '
  - type: note
    content: Matt. 26:63; Mark 5:7
  - type: text
    content: '“I adjure you by the Jesus whom Paul proclaims.” '
  '14':
  - type: text
    content: 'Seven sons of a Jewish high priest named Sceva were doing this. '
  '15':
  - type: text
    content: 'But the evil spirit answered them, '
  - type: note
    content: See James 2:19
  - type: text
    content: '“Jesus I know, and Paul I recognize, but who are you?” '
  '16':
  - type: text
    content: And the man in whom was the evil spirit leaped on them, mastered all
  - type: note
    content: Or both
  - type: text
    content: ' of them and overpowered them, so that they fled out of that house naked and wounded. '
  '17':
  - type: text
    content: 'And this became known to all the residents of Ephesus, both Jews and Greeks. And fear fell upon them all, and '
  - type: note
    content: '[2 Thess. 1:12]'
  - type: text
    content: 'the name of the Lord Jesus was extolled. '
  '18':
  - type: text
    content: 'Also many of those who were now believers came, '
  - type: note
    content: Matt. 3:6; Mark 1:5; Rom. 14:11; James 5:16
  - type: text
    content: 'confessing and divulging their practices. '
  '19':
  - type: text
    content: 'And a number of those who had practiced magic arts brought their books together and burned them in the sight of all. And they counted the value of them and found it came to fifty thousand pieces of silver. '
  '2':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: '[ch. 11:16, 17]'
  - type: text
    content: '“Did you receive the Holy Spirit when you believed?” And they said, “No, '
  - type: note
    content: '[ch. 8:16; John 7:39]'
  - type: text
    content: 'we have not even heard that there is a Holy Spirit.” '
  '20':
  - type: text
    content: 'So the word of the Lord '
  - type: note
    content: ch. 6:7; 12:24
  - type: text
    content: continued to increase and prevail mightily.
  - type: heading
    content: A Riot at Ephesus
  '21':
  - type: text
    content: 'Now after these events Paul resolved in the Spirit '
  - type: note
    content: 1 Cor. 16:5; [ch. 20:1]
  - type: text
    content: 'to pass through '
  - type: note
    content: Rom. 15:26; 1 Thess. 1:7, 8
  - type: text
    content: 'Macedonia and Achaia and '
  - type: note
    content: ch. 20:16, 22; Rom. 15:25; 2 Cor. 1:16; [1 Cor. 16:3, 4]
  - type: text
    content: 'go to Jerusalem, saying, “After I have been there, '
  - type: note
    content: Rom. 15:24, 28; [ch. 23:11; Rom. 1:13]
  - type: text
    content: 'I must also see Rome.” '
  '22':
  - type: text
    content: 'And having sent into Macedonia two of '
  - type: note
    content: Col. 4:7; 2 Tim. 1:18; 4:11; Philem. 13; [ver. 29; ch. 13:5]
  - type: text
    content: 'his helpers, '
  - type: note
    content: See ch. 16:1
  - type: text
    content: 'Timothy and Erastus, he himself stayed in Asia '
  - type: note
    content: '[1 Cor. 16:8, 9]'
  - type: text
    content: for a while.
  '23':
  - type: text
    content: 'About that time '
  - type: note
    content: '[2 Cor. 1:8]'
  - type: text
    content: 'there arose no little disturbance concerning '
  - type: note
    content: ver. 9
  - type: text
    content: 'the Way. '
  '24':
  - type: text
    content: 'For a man named Demetrius, a silversmith, who made silver shrines of Artemis, '
  - type: note
    content: '[ch. 16:16, 19]'
  - type: text
    content: 'brought no little business to the craftsmen. '
  '25':
  - type: note
    content: '[See ver. 24 above]'
  - type: text
    content: 'These he gathered together, with the workmen in similar trades, and said, “Men, you know that from this business we have our wealth. '
  '26':
  - type: text
    content: 'And you see and hear that not only in Ephesus but in almost all of Asia this Paul has persuaded and turned away a great many people, '
  - type: note
    content: ch. 14:15; 17:29; 1 Cor. 8:4
  - type: text
    content: 'saying that '
  - type: note
    content: Deut. 4:28; 2 Kgs. 19:18; Ps. 115:4; Isa. 44:10-20; Jer. 10:3-6; Rev. 9:20
  - type: text
    content: 'gods made with hands are not gods. '
  '27':
  - type: text
    content: 'And there is danger not only that this trade of ours may come into disrepute but also that the temple of the '
  - type: note
    content: '[ch. 8:10]'
  - type: text
    content: great goddess Artemis may be counted as nothing, and that she may even be deposed from her magnificence, she whom all Asia and the world worship.”
  '28':
  - type: text
    content: 'When they heard this they were enraged and were crying out, '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: '“Great is Artemis of the Ephesians!” '
  '29':
  - type: text
    content: 'So the city was filled with the confusion, and they rushed together into the theater, dragging with them Gaius and '
  - type: note
    content: ch. 20:4; 27:2; Col. 4:10; Philem. 24
  - type: text
    content: 'Aristarchus, Macedonians who were Paul’s '
  - type: note
    content: 2 Cor. 8:19; [ver. 22; ch. 20:34]
  - type: text
    content: 'companions in travel. '
  '3':
  - type: text
    content: 'And he said, '
  - type: note
    content: See ch. 8:16
  - type: text
    content: '“Into what then were you baptized?” They said, “Into '
  - type: note
    content: ch. 18:25; [Heb. 6:2]; See ch. 13:24, 25
  - type: text
    content: 'John’s baptism.” '
  '30':
  - type: text
    content: 'But when Paul wished to go in among the crowd, the disciples would not let him. '
  '31':
  - type: text
    content: And even some of the Asiarchs,
  - type: note
    content: That is, high-ranking officers of the province of Asia
  - type: text
    content: ' who were friends of his, sent to him and were urging him not to venture into the theater. '
  '32':
  - type: note
    content: ch. 21:34
  - type: text
    content: 'Now some cried out one thing, some another, for the assembly was in confusion, and most of them did not know why they had come together. '
  '33':
  - type: text
    content: 'Some of the crowd prompted Alexander, whom the Jews had put forward. And Alexander, '
  - type: note
    content: See ch. 12:17
  - type: text
    content: 'motioning with his hand, wanted to make a defense to the crowd. '
  '34':
  - type: text
    content: 'But when they recognized that he was a Jew, for about two hours they all cried out with one voice, '
  - type: note
    content: ver. 28
  - type: text
    content: “Great is Artemis of the Ephesians!”
  '35':
  - type: text
    content: 'And when the town clerk had quieted the crowd, he said, “Men of Ephesus, who is there who does not know that the city of the Ephesians is temple keeper of the great Artemis, and of the sacred stone that fell from '
  - type: note
    content: '[ch. 14:12]'
  - type: text
    content: the sky?
  - type: note
    content: The meaning of the Greek is uncertain
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Seeing then that these things cannot be denied, you ought to be quiet and do nothing rash. '
  '37':
  - type: text
    content: 'For you have brought '
  - type: note
    content: ver. 29
  - type: text
    content: 'these men here who are neither '
  - type: note
    content: Rom. 2:22
  - type: text
    content: 'sacrilegious nor blasphemers of our goddess. '
  '38':
  - type: text
    content: 'If therefore Demetrius and the craftsmen with him have a complaint against anyone, the courts are open, and there are '
  - type: note
    content: See ch. 13:7
  - type: text
    content: 'proconsuls. Let them bring charges against one another. '
  '39':
  - type: text
    content: But if you seek anything further,
  - type: note
    content: Some manuscripts seek about other matters
  - type: text
    content: ' it shall be settled in the regular assembly. '
  '4':
  - type: text
    content: 'And Paul said, '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: '“John baptized with the baptism of repentance, telling the people '
  - type: note
    content: John 1:7
  - type: text
    content: 'to believe in the one who was to come after him, that is, Jesus.” '
  '40':
  - type: text
    content: 'For we really are in danger of being charged with rioting today, since there is no cause that we can give to justify this commotion.” '
  '41':
  - type: text
    content: And when he had said these things, he dismissed the assembly.
  '5':
  - type: text
    content: 'On hearing this, '
  - type: note
    content: See ch. 8:12, 16
  - type: text
    content: they were baptized in
  - type: note
    content: Or into
  - type: text
    content: ' the name of the Lord Jesus. '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 8:17
  - type: text
    content: 'when Paul had laid his hands on them, the Holy Spirit came on them, and '
  - type: note
    content: ch. 10:46; See Mark 16:17
  - type: text
    content: 'they began speaking in tongues and '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'prophesying. '
  '7':
  - type: text
    content: There were about twelve men in all.
  '8':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'he entered the synagogue and for three months spoke boldly, reasoning and persuading them '
  - type: note
    content: ch. 1:3; 28:23
  - type: text
    content: 'about the kingdom of God. '
  '9':
  - type: note
    content: '[ch. 13:45, 46; 1 Cor. 16:9]'
  - type: text
    content: 'But when some became stubborn and '
  - type: note
    content: See ch. 14:2
  - type: text
    content: 'continued in unbelief, speaking evil of '
  - type: note
    content: ver. 23; See ch. 9:2
  - type: text
    content: the Way before the congregation, he withdrew from them and took the disciples with him, reasoning daily in the hall of Tyrannus.
  - type: note
    content: Some manuscripts add from the fifth hour to the tenth (that is, from 11 a.m. to 4 p.m.)
  - type: text
    content: ' '
