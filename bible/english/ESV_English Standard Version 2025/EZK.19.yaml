document_id: EZK.19,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament for the Princes of Israel
  - type: text
    content: 'And you, '
  - type: note
    content: ch. 26:17; 27:2, 32; 28:12; 32:2; Amos 5:1; [Jer. 7:29]
  - type: text
    content: 'take up a lamentation for the princes of Israel, '
  '10':
  - type: text
    content: 'Your mother was '
  - type: note
    content: See ch. 15:6
  - type: text
    content: like a vine in a vineyard
  - type: note
    content: Some Hebrew manuscripts; most Hebrew manuscripts in your blood
  - type: text
    content: planted by the water,
  - type: note
    content: '[ Ps. 80:9 ]'
  - type: text
    content: fruitful and full of branches
  - type: note
    content: '[ Deut. 8:7 ]'
  - type: text
    content: by reason of abundant water.
  '11':
  - type: text
    content: Its strong stems became
  - type: text
    content: rulers’ scepters;
  - type: text
    content: it towered aloft
  - type: text
    content: among the thick boughs;
  - type: note
    content: Or the clouds
  - type: text
    content: it was seen in its height
  - type: text
    content: with the mass of its branches.
  '12':
  - type: text
    content: But the vine was plucked up in fury,
  - type: text
    content: cast down to the ground;
  - type: note
    content: ch. 17:10; [ Hos. 13:15 ]
  - type: text
    content: the east wind dried up its fruit;
  - type: text
    content: they were stripped off and withered.
  - type: text
    content: As for its strong stem,
  - type: text
    content: fire consumed it.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 1:1; Hos. 2:3; See 2 Kgs. 24:12-16 ]'
  - type: text
    content: Now it is planted in the wilderness,
  - type: text
    content: in a dry and thirsty land.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 24:20 ]; See ch. 17:15-19'
  - type: text
    content: And fire has gone out from the stem of its shoots,
  - type: text
    content: has consumed its fruit,
  - type: note
    content: '[ver. 11, 12 ]'
  - type: text
    content: so that there remains in it no strong stem,
  - type: text
    content: no scepter for ruling.
  - type: text
    content: 'This is '
  - type: note
    content: See ver. 1
  - type: text
    content: a lamentation and has become a lamentation.
  '2':
  - type: text
    content: 'and say:'
  - type: text
    content: 'What was your mother? '
  - type: note
    content: '[Gen. 49:9]'
  - type: text
    content: A lioness!
  - type: text
    content: Among lions she crouched;
  - type: text
    content: in the midst of young lions
  - type: text
    content: she reared her cubs.
  '3':
  - type: text
    content: And she brought up one of her cubs;
  - type: note
    content: '[ch. 22:25; 32:2; 2 Kgs. 23:30, 31 ]'
  - type: text
    content: he became a young lion,
  - type: note
    content: ch. 22:25, 27
  - type: text
    content: and he learned to catch prey;
  - type: text
    content: he devoured men.
  '4':
  - type: text
    content: The nations heard about him;
  - type: note
    content: Lam. 4:20
  - type: text
    content: he was caught in their pit,
  - type: note
    content: '[ 2 Kgs. 23:33, 34; Jer. 22:11, 12 ]'
  - type: text
    content: and they brought him with hooks
  - type: text
    content: to the land of Egypt.
  '5':
  - type: text
    content: When she saw that she waited in vain,
  - type: text
    content: that her hope was lost,
  - type: note
    content: 2 Kgs. 23:34, 36
  - type: text
    content: she took another of her cubs
  - type: text
    content: and made him a young lion.
  '6':
  - type: text
    content: He prowled among the lions;
  - type: text
    content: he became a young lion,
  - type: text
    content: and he learned to catch prey;
  - type: text
    content: he devoured men,
  '7':
  - type: text
    content: and seized
  - type: note
    content: Hebrew knew
  - type: text
    content: ' their widows.'
  - type: text
    content: He laid waste their cities,
  - type: text
    content: and the land was appalled and all who were in it
  - type: text
    content: at the sound of his roaring.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Chr. 36:6 ]'
  - type: text
    content: Then the nations set against him
  - type: text
    content: from provinces on every side;
  - type: note
    content: See ch. 12:13
  - type: text
    content: they spread their net over him;
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: he was taken in their pit.
  '9':
  - type: text
    content: 'With hooks '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: they put him in a cage
  - type: note
    content: Or in a wooden collar
  - type: text
    content: 'and '
  - type: note
    content: '[Jer. 22:26, 27]'
  - type: text
    content: brought him to the king of Babylon;
  - type: text
    content: they brought him into custody,
  - type: text
    content: that his voice should no more be heard
  - type: text
    content: 'on '
  - type: note
    content: See ch. 6:2
  - type: text
    content: the mountains of Israel.
