document_id: ISA.33,59
type_code: eng
verses:
  '1':
  - type: heading
    content: O Lord, Be Gracious to Us
  - type: text
    content: ' '
  - type: note
    content: ch. 21:2; [ch. 17:14 ]
  - type: text
    content: Ah, you destroyer,
  - type: text
    content: who yourself have not been destroyed,
  - type: text
    content: you traitor,
  - type: text
    content: whom none has betrayed!
  - type: text
    content: When you have ceased to destroy,
  - type: text
    content: you will be destroyed;
  - type: text
    content: and when you have finished betraying,
  - type: text
    content: they will betray you.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 12:5; 68:1; [ch. 10:26 ]
  - type: text
    content: '“Now I will arise,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “now I will lift myself up;
  - type: text
    content: now I will be exalted.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 59:4; Ps. 7:14 ]'
  - type: text
    content: You conceive chaff; you give birth to stubble;
  - type: text
    content: 'your breath is '
  - type: note
    content: ch. 10:16, 17; [Ps. 80:16]
  - type: text
    content: a fire that will consume you.
  '12':
  - type: text
    content: And the peoples will be as if burned to lime,
  - type: note
    content: '[See ver. 11 above]'
  - type: text
    content: like thorns cut down, that are burned in the fire.”
  '13':
  - type: text
    content: Hear, you who are far off, what I have done;
  - type: text
    content: and you who are near, acknowledge my might.
  '14':
  - type: text
    content: The sinners in Zion are afraid;
  - type: text
    content: 'trembling has seized the godless:'
  - type: note
    content: '[ Ps. 15:1; 24:3 ]'
  - type: text
    content: '“Who among us can dwell '
  - type: note
    content: ch. 66:15; Heb. 12:29
  - type: text
    content: with the consuming fire?
  - type: text
    content: Who among us can dwell with everlasting burnings?”
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 15:2; 24:4 ]'
  - type: text
    content: He who walks righteously and speaks uprightly,
  - type: text
    content: who despises the gain of oppressions,
  - type: text
    content: who shakes his hands, lest they hold a bribe,
  - type: text
    content: who stops his ears from hearing of bloodshed
  - type: note
    content: Ps. 119:37
  - type: text
    content: and shuts his eyes from looking on evil,
  '16':
  - type: text
    content: he will dwell on the heights;
  - type: text
    content: his place of defense will be the fortresses of rocks;
  - type: note
    content: ch. 30:23, 25
  - type: text
    content: his bread will be given him; his water will be sure.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:5; [ Zech. 9:9 ]
  - type: text
    content: Your eyes will behold the king in his beauty;
  - type: note
    content: '[ch. 54:2, 3 ]'
  - type: text
    content: they will see a land that stretches afar.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 37:10 ]'
  - type: text
    content: 'Your heart will muse on the terror:'
  - type: text
    content: '“Where is he who counted, where is '
  - type: note
    content: '[2 Kgs. 18:14]'
  - type: text
    content: he who weighed the tribute?
  - type: text
    content: 'Where is '
  - type: note
    content: '[Ps. 48:12]'
  - type: text
    content: he who counted the towers?”
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 19:32, 33 ]'
  - type: text
    content: You will see no more the insolent people,
  - type: text
    content: 'the people '
  - type: note
    content: ch. 28:11; Deut. 28:49, 50
  - type: text
    content: of an obscure speech that you cannot comprehend,
  - type: text
    content: stammering in a tongue that you cannot understand.
  '2':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', be gracious to us; '
  - type: note
    content: ch. 25:9; 26:8
  - type: text
    content: we wait for you.
  - type: text
    content: Be our arm every morning,
  - type: text
    content: our salvation in the time of trouble.
  '20':
  - type: text
    content: Behold Zion, the city of our appointed feasts!
  - type: note
    content: ch. 32:18
  - type: text
    content: Your eyes will see Jerusalem,
  - type: text
    content: 'an untroubled habitation, an '
  - type: note
    content: ver. 6
  - type: text
    content: immovable tent,
  - type: text
    content: whose stakes will never be plucked up,
  - type: text
    content: nor will any of its cords be broken.
  '21':
  - type: text
    content: 'But there the '
  - type: text
    content: Lord
  - type: text
    content: ' in majesty will be for us'
  - type: text
    content: 'a place of '
  - type: note
    content: Ps. 46:4, 5
  - type: text
    content: broad rivers and streams,
  - type: note
    content: '[ch. 2:16; Ps. 48:7 ]'
  - type: text
    content: where no galley with oars can go,
  - type: text
    content: nor majestic ship can pass.
  '22':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is our '
  - type: note
    content: '[Judg. 2:16]'
  - type: text
    content: 'judge; the '
  - type: text
    content: Lord
  - type: text
    content: ' is our '
  - type: note
    content: James 4:12
  - type: text
    content: lawgiver;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is our '
  - type: note
    content: '[1 Sam. 12:13]'
  - type: text
    content: king; he will save us.
  '23':
  - type: text
    content: Your cords hang loose;
  - type: text
    content: they cannot hold the mast firm in its place
  - type: text
    content: or keep the sail spread out.
  - type: note
    content: '[ Gen. 49:27 ]'
  - type: text
    content: Then prey and spoil in abundance will be divided;
  - type: text
    content: 'even '
  - type: note
    content: '[Ps. 68:12]'
  - type: text
    content: the lame will take the prey.
  '24':
  - type: text
    content: 'And no inhabitant will say, '
  - type: note
    content: '[ch. 1:5, 6]'
  - type: text
    content: “I am sick”;
  - type: note
    content: ch. 1:25, 26; Jer. 50:20
  - type: text
    content: the people who dwell there will be forgiven their iniquity.
  '3':
  - type: text
    content: ' '
  - type: note
    content: ch. 17:13; [ 2 Kgs. 19:7 ]
  - type: text
    content: At the tumultuous noise peoples flee;
  - type: text
    content: when you lift yourself up, nations are scattered,
  '4':
  - type: text
    content: and your spoil is gathered as the caterpillar gathers;
  - type: note
    content: '[ Joel 2:4, 5 ]'
  - type: text
    content: as locusts leap, it is leapt upon.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:17; 5:15, 16
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is exalted, for he dwells on high;'
  - type: text
    content: he will fill Zion with justice and righteousness,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 39:8 ]'
  - type: text
    content: and he will be the stability of your times,
  - type: text
    content: abundance of salvation, wisdom, and knowledge;
  - type: text
    content: 'the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is Zion’s'
  - type: note
    content: Hebrew his
  - type: text
    content: ' treasure.'
  '7':
  - type: text
    content: Behold, their heroes cry in the streets;
  - type: note
    content: '[ch. 36:22; 2 Kgs. 18:37 ]'
  - type: text
    content: the envoys of peace weep bitterly.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Judg. 5:6 ]'
  - type: text
    content: The highways lie waste;
  - type: text
    content: the traveler ceases.
  - type: note
    content: '[ver. 1 ]; See 2 Kgs. 18:14-17'
  - type: text
    content: Covenants are broken;
  - type: text
    content: cities
  - type: note
    content: Masoretic Text; Dead Sea Scroll witnesses
  - type: text
    content: ' are despised;'
  - type: text
    content: there is no regard for man.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ch. 24:4; [ Nah. 1:4 ]
  - type: text
    content: The land mourns and languishes;
  - type: text
    content: Lebanon is confounded and withers away;
  - type: text
    content: Sharon is like a desert,
  - type: text
    content: and Bashan and Carmel shake off their leaves.
