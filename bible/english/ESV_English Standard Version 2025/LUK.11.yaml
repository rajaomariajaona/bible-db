document_id: LUK.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Prayer
  - type: text
    content: Now Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' was praying in a certain place, and when he finished, one of his disciples said to him, “Lord, teach us to pray, '
  - type: note
    content: See ch. 5:33
  - type: text
    content: 'as John taught his disciples.” '
  '10':
  - type: text
    content: For everyone who asks receives, and the one who seeks finds, and to the one who knocks it will be opened.
  - type: text
    content: ' '
  '11':
  - type: text
    content: What father among you, if his son asks for
  - type: note
    content: Some manuscripts insert bread, will give him a stone; or if he asks for
  - type: text
    content: ' '
  - type: text
    content: a fish, will instead of a fish give him a serpent;
  - type: text
    content: ' '
  '12':
  - type: text
    content: or if he asks for an egg, will give him a scorpion?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'If you then, '
  - type: note
    content: Gen. 6:5; 8:21; Matt. 12:34
  - type: text
    content: 'who are evil, know how to give good gifts to your children, how much more will the heavenly Father '
  - type: note
    content: '[John 4:10; Acts 2:38]'
  - type: text
    content: give the Holy Spirit to those who ask him!”
  - type: heading
    content: Jesus and Beelzebul
  '14':
  - type: text
    content: ' '
  - type: note
    content: For ver. 14, 15, see Matt. 12:22-24; [ Matt. 9:32-34 ]
  - type: text
    content: 'Now he was casting out a demon that was mute. When the demon had gone out, the mute man spoke, and the people marveled. '
  '15':
  - type: text
    content: 'But some of them said, “He casts out demons '
  - type: note
    content: See Matt. 10:25
  - type: text
    content: 'by Beelzebul, the prince of demons,” '
  '16':
  - type: text
    content: 'while others, '
  - type: note
    content: See John 8:6
  - type: text
    content: 'to test him, kept seeking from him a sign from heaven. '
  '17':
  - type: note
    content: For ver. 17-22, see Matt. 12:25-29; Mark 3:23-27
  - type: text
    content: 'But he, '
  - type: note
    content: See Matt. 9:4
  - type: text
    content: 'knowing their thoughts, said to them, '
  - type: text
    content: “Every kingdom divided against itself is laid waste, and a divided household falls.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And if Satan also is divided against himself, how will his kingdom stand? For you say that I cast out demons by Beelzebul.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And if I cast out demons by Beelzebul, '
  - type: note
    content: '[Acts 19:13]'
  - type: text
    content: 'by whom do '
  - type: note
    content: '[2 Kgs. 2:7]'
  - type: text
    content: your sons cast them out? Therefore they will be your judges.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he said to them, '
  - type: note
    content: For ver. 2-4, [Matt. 6:9-13]
  - type: text
    content: '“When you pray, say:'
  - type: note
    content: John 20:17; 1 Pet. 1:17
  - type: text
    content: '“Father, '
  - type: note
    content: Isa. 29:23; [ch. 1:49 ; 1 Pet. 3:15]
  - type: text
    content: 'hallowed be '
  - type: note
    content: John 17:6
  - type: text
    content: your name.
  - type: note
    content: '[ Matt. 3:2; 4:17 ]'
  - type: text
    content: Your kingdom come.
  '20':
  - type: text
    content: 'But if it is by '
  - type: note
    content: Ex. 8:19; 31:18; Deut. 9:10; Ps. 8:3
  - type: text
    content: 'the finger of God that I cast out demons, then '
  - type: note
    content: ch. 17:21; Matt. 19:24; 21:31, 43
  - type: text
    content: the kingdom of God has come upon you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: When a strong man, fully armed, guards his own palace, his goods are safe;
  - type: text
    content: ' '
  '22':
  - type: note
    content: Isa. 49:24-26
  - type: text
    content: 'but when one stronger than he attacks him and '
  - type: note
    content: '[John 16:33]'
  - type: text
    content: 'overcomes him, he takes away his '
  - type: note
    content: Eph. 6:11
  - type: text
    content: 'armor in which he trusted and '
  - type: note
    content: '[Isa. 53:12]'
  - type: text
    content: divides his spoil.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 12:30; [ch. 9:50; Mark 9:40]
  - type: text
    content: Whoever is not with me is against me, and whoever does not gather with me scatters.
  - type: heading
    content: Return of an Unclean Spirit
  '24':
  - type: text
    content: ' '
  - type: note
    content: For ver. 24-26, see Matt. 12:43-45
  - type: text
    content: '“When the unclean spirit has gone out of a person, it passes through '
  - type: note
    content: '[ Ps. 63:1; Jer. 2:6 ]'
  - type: text
    content: waterless places seeking rest, and finding none it says, ‘I will return to my house from which I came.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: And when it comes, it finds the house swept and put in order.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Then it goes and brings seven other spirits more evil than itself, and they enter and dwell there. And '
  - type: note
    content: 2 Pet. 2:20-22; [John 5:14]
  - type: text
    content: the last state of that person is worse than the first.”
  - type: heading
    content: True Blessedness
  '27':
  - type: text
    content: 'As he said these things, '
  - type: note
    content: ch. 12:13
  - type: text
    content: 'a woman in the crowd raised her voice and said to him, '
  - type: note
    content: '[2 Chr. 9:7]; See ch. 1:48'
  - type: text
    content: '“Blessed is the womb that bore you, and the breasts at which you nursed!” '
  '28':
  - type: text
    content: 'But he said, '
  - type: note
    content: '[Rev. 1:3; 22:7]'
  - type: text
    content: '“Blessed rather are those '
  - type: note
    content: ch. 8:21; See James 1:22
  - type: text
    content: 'who hear the word of God and '
  - type: note
    content: Lev. 22:31
  - type: text
    content: keep it!”
  - type: heading
    content: The Sign of Jonah
  '29':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'When the crowds were increasing, he began to say, '
  - type: note
    content: For ver. 29-32, see Matt. 12:39-42; [Mark 8:11, 12]
  - type: text
    content: '“This generation is an evil generation. '
  - type: note
    content: ver. 16; See Matt. 12:38
  - type: text
    content: It seeks for a sign, but no sign will be given to it except the sign of Jonah.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Prov. 30:8
  - type: text
    content: 'Give us '
  - type: note
    content: '[ Matt. 6:34 ]'
  - type: text
    content: each day our daily bread,
  - type: note
    content: Or our bread for tomorrow
  '30':
  - type: text
    content: 'For as '
  - type: note
    content: Jonah 1:17
  - type: text
    content: Jonah became a sign to the people of Nineveh, so will the Son of Man be to this generation.
  - type: text
    content: ' '
  '31':
  - type: note
    content: 1 Kgs. 10:1; 2 Chr. 9:1
  - type: text
    content: 'The queen of the South will rise up at the judgment with the men of this generation and '
  - type: note
    content: Heb. 11:7; [Jer. 3:11; Ezek. 16:51, 52; Rom. 2:27]
  - type: text
    content: 'condemn them, for she came from the ends of the earth to hear the wisdom of Solomon, and behold, '
  - type: note
    content: '[Matt. 12:6]'
  - type: text
    content: something greater than Solomon is here.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Jonah 1:2
  - type: text
    content: 'The men of Nineveh will rise up at the judgment with this generation and '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: 'condemn it, for '
  - type: note
    content: Jonah 3:5
  - type: text
    content: 'they repented at the preaching of Jonah, and behold, '
  - type: note
    content: '[See ver. 31 above]'
  - type: text
    content: something greater than Jonah is here.
  - type: heading
    content: The Light in You
  '33':
  - type: text
    content: ' '
  - type: note
    content: ch. 8:16; Matt. 5:15; Mark 4:21
  - type: text
    content: “No one after lighting a lamp puts it in a cellar or under a basket, but on a stand, so that those who enter may see the light.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Your eye is '
  - type: note
    content: Matt. 6:22, 23
  - type: text
    content: 'the lamp of your body. When your eye is healthy, your whole body is full of light, but when it is '
  - type: note
    content: Deut. 15:9
  - type: text
    content: bad, your body is full of darkness.
  - type: text
    content: ' '
  '35':
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: Therefore be careful lest the light in you be darkness.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'If then your whole body is full of light, having no part dark, it will be wholly bright, '
  - type: note
    content: '[Matt. 5:16]'
  - type: text
    content: as when a lamp with its rays gives you light.”
  - type: heading
    content: Woes to the Pharisees and Lawyers
  '37':
  - type: text
    content: While Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' was speaking, '
  - type: note
    content: ch. 7:36; 14:1
  - type: text
    content: 'a Pharisee asked him to dine with him, so he went in and reclined at table. '
  '38':
  - type: text
    content: 'The Pharisee was astonished to see '
  - type: note
    content: Matt. 15:2; Mark 7:3, 4
  - type: text
    content: 'that he did not first wash before dinner. '
  '39':
  - type: text
    content: 'And the Lord said to him, '
  - type: note
    content: Matt. 23:25, 26; [ch. 20:47]
  - type: text
    content: '“Now you Pharisees cleanse the outside of the cup and of the dish, but inside you are full of '
  - type: note
    content: '[ch. 16:14]'
  - type: text
    content: greed and wickedness.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: 'and '
  - type: note
    content: See ch. 7:48
  - type: text
    content: forgive us our sins,
  - type: text
    content: for we ourselves forgive everyone who is indebted to us.
  - type: text
    content: 'And '
  - type: note
    content: ch. 22:40, 46; Matt. 26:41; Mark 14:38; [ 1 Cor. 10:13 ]
  - type: text
    content: lead us not into temptation.”
  '40':
  - type: note
    content: ch. 12:20
  - type: text
    content: 'You fools! '
  - type: note
    content: '[See ver. 39 above]'
  - type: text
    content: Did not he who made the outside make the inside also?
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'But '
  - type: note
    content: ch. 12:33; [ch. 16:9; Dan. 4:27]
  - type: text
    content: 'give as alms those things that are within, and behold, '
  - type: note
    content: '[Titus 1:15]'
  - type: text
    content: everything is clean for you.
  '42':
  - type: text
    content: ' '
  - type: note
    content: Matt. 23:23
  - type: text
    content: '“But woe to you Pharisees! For '
  - type: note
    content: ch. 18:12; Deut. 14:22
  - type: text
    content: 'you tithe mint and rue and every herb, and neglect '
  - type: note
    content: Ps. 33:5; Jer. 5:1; Mic. 6:8; Zech. 7:9
  - type: text
    content: 'justice and '
  - type: note
    content: '[ 1 John 3:17 ]'
  - type: text
    content: 'the love of God. '
  - type: note
    content: '[ 1 Sam. 15:22 ]'
  - type: text
    content: These you ought to have done, without neglecting the others.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Woe to you Pharisees! For '
  - type: note
    content: ch. 20:46; Matt. 23:6, 7; Mark 12:38, 39; [ch. 14:7]
  - type: text
    content: you love the best seat in the synagogues and greetings in the marketplaces.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Woe to you! '
  - type: note
    content: Matt. 23:27
  - type: text
    content: For you are like unmarked graves, and people walk over them without knowing it.”
  '45':
  - type: text
    content: 'One of '
  - type: note
    content: ver. 46, 52; See ch. 7:30
  - type: text
    content: 'the lawyers answered him, “Teacher, in saying these things you insult us also.” '
  '46':
  - type: text
    content: 'And he said, '
  - type: text
    content: '“Woe to you '
  - type: note
    content: ver. 45, 52
  - type: text
    content: 'lawyers also! For '
  - type: note
    content: Matt. 23:4; [Matt. 11:28-30; Acts 15:10]
  - type: text
    content: you load people with burdens hard to bear, and you yourselves do not touch the burdens with one of your fingers.
  - type: text
    content: ' '
  '47':
  - type: note
    content: Matt. 23:29, 30
  - type: text
    content: Woe to you! For you build the tombs of the prophets whom your fathers killed.
  - type: text
    content: ' '
  '48':
  - type: note
    content: Matt. 23:31
  - type: text
    content: 'So you are witnesses and you '
  - type: note
    content: See Rom. 1:32
  - type: text
    content: 'consent to the deeds of '
  - type: note
    content: Acts 7:51, 52
  - type: text
    content: your fathers, for they killed them, and you build their tombs.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Therefore also '
  - type: note
    content: '[ch. 7:35; Prov. 8:12, 22, 23, 30; Matt. 11:19; 1 Cor. 1:24, 30; Col. 2:3]'
  - type: text
    content: 'the Wisdom of God said, '
  - type: note
    content: For ver. 49-51, [Matt. 23:34-36]
  - type: text
    content: '‘I will send them '
  - type: note
    content: See Acts 13:1; 1 Cor. 12:28
  - type: text
    content: 'prophets and apostles, '
  - type: note
    content: See Matt. 21:35
  - type: text
    content: 'some of whom they will '
  - type: note
    content: 1 Thess. 2:15 (Gk.)
  - type: text
    content: kill and persecute,’
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Which of you who has a friend will go to him at midnight and say to him, ‘Friend, lend me three loaves,
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'so that '
  - type: note
    content: Rev. 18:24
  - type: text
    content: 'the blood of all the prophets, shed '
  - type: note
    content: See Matt. 13:35
  - type: text
    content: 'from the foundation of the world, may be '
  - type: note
    content: Gen. 42:22; 2 Chr. 24:22; Ezek. 3:18
  - type: text
    content: charged against this generation,
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'from the blood of '
  - type: note
    content: Gen. 4:4, 8; Heb. 11:4; 1 John 3:12
  - type: text
    content: 'Abel to the blood of '
  - type: note
    content: 2 Chr. 24:20, 21
  - type: text
    content: 'Zechariah, who perished between '
  - type: note
    content: Ex. 40:6; 2 Kgs. 16:14; Ezek. 40:47
  - type: text
    content: 'the altar and the sanctuary. Yes, I tell you, it will be '
  - type: note
    content: '[See ver. 50 above]'
  - type: text
    content: required of this generation.
  - type: text
    content: ' '
  '52':
  - type: text
    content: 'Woe to you '
  - type: note
    content: ver. 45, 46
  - type: text
    content: 'lawyers! '
  - type: note
    content: Matt. 23:13; [Mal. 2:7, 8]
  - type: text
    content: 'For you have taken away the key of '
  - type: note
    content: Rom. 2:20
  - type: text
    content: 'knowledge. You '
  - type: note
    content: '[ch. 7:30; Matt. 5:20; 21:31]'
  - type: text
    content: did not enter yourselves, and you hindered those who were entering.”
  '53':
  - type: text
    content: 'As he went away from there, the scribes and the Pharisees began to press him hard and to provoke him to speak about many things, '
  '54':
  - type: note
    content: ch. 20:20; Mark 3:2; John 8:6; [Isa. 29:21]
  - type: text
    content: 'lying in wait for him, '
  - type: note
    content: Matt. 22:15; Mark 12:13
  - type: text
    content: to catch him in something he might say.
  '6':
  - type: text
    content: for a friend of mine has arrived on a journey, and I have nothing to set before him’;
  - type: text
    content: ' '
  '7':
  - type: text
    content: and he will answer from within, ‘Do not bother me; the door is now shut, and my children are with me in bed. I cannot get up and give you anything’?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'I tell you, though he will not get up and give him anything '
  - type: note
    content: '[ch. 18:1-6]'
  - type: text
    content: because he is his friend, yet because of his impudence
  - type: note
    content: Or persistence
  - type: text
    content: ' '
  - type: text
    content: he will rise and give him whatever he needs.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And I tell you, '
  - type: note
    content: For ver. 9-13, see Matt. 7:7-11
  - type: text
    content: 'ask, and '
  - type: note
    content: Matt. 18:19; 21:22; Mark 11:24; John 14:13; 15:7, 16; 16:23, 24; James 1:5, 6, 17; 1 John 3:22; 5:14, 15
  - type: text
    content: 'it will be given to you; '
  - type: note
    content: 1 Chr. 28:9; 2 Chr. 15:2; Prov. 8:17; Jer. 29:13; [Isa. 55:6]
  - type: text
    content: 'seek, and you will find; '
  - type: note
    content: '[Rev. 3:20]'
  - type: text
    content: knock, and it will be opened to you.
  - type: text
    content: ' '
