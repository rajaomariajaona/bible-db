document_id: ECC.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Keep the King’s Command
  - type: text
    content: Who is like the wise?
  - type: text
    content: And who knows the interpretation of a thing?
  - type: note
    content: Prov. 4:8, 9; [ Acts 6:15 ]
  - type: text
    content: A man’s wisdom makes his face shine,
  - type: text
    content: 'and '
  - type: note
    content: Prov. 21:29; [Deut. 28:50]
  - type: text
    content: the hardness of his face is changed.
  '10':
  - type: text
    content: 'Then I saw the wicked buried. They used to go in and out of '
  - type: note
    content: '[Neh. 11:1; Matt. 24:15]'
  - type: text
    content: 'the holy place and were '
  - type: note
    content: '[ch. 9:5; Prov. 10:7]'
  - type: text
    content: praised
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Vulgate; most Hebrew manuscripts forgotten
  - type: text
    content: ' in the city where they had done such things. This also is vanity.'
  - type: note
    content: The Hebrew term hebel can refer to a “vapor” or “mere breath”; also twice in verse 14 (see note on 1:2)
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Because '
  - type: note
    content: '[Ps. 10:6; 50:21; Isa. 26:10; Rom. 2:4, 5; 2 Pet. 3:9]'
  - type: text
    content: 'the sentence against an evil deed is not executed speedily, '
  - type: note
    content: '[Esth. 7:5; Acts 5:3]'
  - type: text
    content: 'the heart of the children of man is fully set to do evil. '
  '12':
  - type: text
    content: 'Though a sinner does evil a hundred times and '
  - type: note
    content: ch. 7:15; Isa. 65:20
  - type: text
    content: 'prolongs his life, yet I know that '
  - type: note
    content: '[Deut. 12:25; Isa. 3:10]'
  - type: text
    content: 'it will be well with '
  - type: note
    content: '[Ps. 37:11, 18, 19; Prov. 1:33; Matt. 25:34]'
  - type: text
    content: 'those who fear God, because they fear before him. '
  '13':
  - type: text
    content: 'But it will '
  - type: note
    content: Isa. 3:11
  - type: text
    content: 'not be well with the wicked, neither will he prolong his days like '
  - type: note
    content: ch. 6:12; See Job 14:2
  - type: text
    content: a shadow, because he does not fear before God.
  - type: heading
    content: Man Cannot Know God’s Ways
  '14':
  - type: text
    content: 'There is a vanity that takes place on earth, that there are righteous people '
  - type: note
    content: ch. 7:15; [Ps. 73:3]; See ch. 2:14
  - type: text
    content: 'to whom it happens according to the deeds of the wicked, and there are wicked people '
  - type: note
    content: '[Job 21:7; Ps. 17:9, 10; 73:12; Jer. 12:1]'
  - type: text
    content: 'to whom it happens according to the deeds of the righteous. I said that this also is vanity. '
  '15':
  - type: text
    content: 'And I commend joy, for man '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'has nothing better under the sun but to '
  - type: note
    content: 1 Kgs. 4:20
  - type: text
    content: eat and drink and be joyful, for this will go with him in his toil through the days of his life that God has given him under the sun.
  '16':
  - type: text
    content: 'When I applied my heart to know wisdom, and to see '
  - type: note
    content: ch. 1:13; 3:10
  - type: text
    content: 'the business that is done on earth, how neither '
  - type: note
    content: '[Ps. 127:2]'
  - type: text
    content: 'day nor night do one’s eyes see sleep, '
  '17':
  - type: text
    content: 'then I saw all the work of God, that '
  - type: note
    content: '[Prov. 25:2]; See ch. 3:11'
  - type: text
    content: 'man cannot find out the work that is done under the sun. However much man may toil in seeking, he will not find it out. Even though a wise man claims to know, '
  - type: note
    content: '[Ps. 73:16]'
  - type: text
    content: he cannot find it out.
  '2':
  - type: text
    content: 'I say:'
  - type: note
    content: Hebrew lacks say
  - type: text
    content: ' Keep the king’s command, because of '
  - type: note
    content: Ex. 22:11; 2 Sam. 21:7; 1 Kgs. 2:43; [2 Chr. 36:13; Ezek. 17:18]
  - type: text
    content: God’s oath to him.
  - type: note
    content: Or because of your oath to God
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Be not hasty to '
  - type: note
    content: '[ch. 10:4]'
  - type: text
    content: 'go from his presence. Do not take your stand in an evil cause, for he does whatever he pleases. '
  '4':
  - type: text
    content: 'For the word of the king is supreme, and '
  - type: note
    content: Dan. 4:35; See Job 9:12
  - type: text
    content: 'who may say to him, “What are you doing?” '
  '5':
  - type: text
    content: Whoever keeps a command will know no evil thing, and the wise heart will know the proper time and the just way.
  - type: note
    content: Or and judgment
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'For there is a time and a way '
  - type: note
    content: ch. 3:1, 17
  - type: text
    content: for everything, although man’s trouble
  - type: note
    content: Or evil
  - type: text
    content: ' lies heavy on him. '
  '7':
  - type: text
    content: 'For he '
  - type: note
    content: '[Prov. 24:22]'
  - type: text
    content: 'does not know what is to be, for '
  - type: note
    content: ch. 3:22; 6:12; 9:12; 10:14
  - type: text
    content: 'who can tell him how it will be? '
  '8':
  - type: text
    content: 'No man has power to '
  - type: note
    content: '[Job 14:5]'
  - type: text
    content: 'retain the spirit, '
  - type: note
    content: '[ch. 3:19; 9:11]'
  - type: text
    content: 'or power over the day of death. There is no '
  - type: note
    content: See Deut. 20:5-8
  - type: text
    content: 'discharge from war, nor will wickedness deliver those who are given to it. '
  '9':
  - type: note
    content: '[ch. 1:13]'
  - type: text
    content: All this I observed while applying my heart to all that is done under the sun, when man had power over man to his hurt.
  - type: heading
    content: Those Who Fear God Will Do Well
