document_id: DEU.25,59
type_code: eng
verses:
  '1':
  - type: text
    content: '“If there is a '
  - type: note
    content: ch. 19:17
  - type: text
    content: 'dispute between men and they come into court and the judges decide between them, '
  - type: note
    content: '[1 Kgs. 8:32; Prov. 17:15]'
  - type: text
    content: 'acquitting the innocent and condemning the guilty, '
  '10':
  - type: text
    content: And the name of his house
  - type: note
    content: Hebrew its name
  - type: text
    content: ' shall be called in Israel, ‘The house of him who had his sandal pulled off.’'
  - type: heading
    content: Miscellaneous Laws
  '11':
  - type: text
    content: '“When men fight with one another and the wife of the one draws near to rescue her husband from the hand of him who is beating him and puts out her hand and seizes him by the private parts, '
  '12':
  - type: text
    content: 'then you shall cut off her hand. '
  - type: note
    content: See ch. 7:16
  - type: text
    content: Your eye shall have no pity.
  '13':
  - type: text
    content: '“You '
  - type: note
    content: Lev. 19:35, 36; [Prov. 16:11; Ezek. 45:10; Amos 8:5; Mic. 6:11]
  - type: text
    content: 'shall not have in your bag two kinds of weights, a large and a small. '
  '14':
  - type: text
    content: 'You shall not have in your house two kinds of measures, a large and a small. '
  '15':
  - type: text
    content: A full and fair
  - type: note
    content: Or just, or righteous; twice in this verse
  - type: text
    content: ' weight you shall have, a full and fair measure you shall have, '
  - type: note
    content: See ch. 4:40
  - type: text
    content: 'that your days may be long in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 11:1
  - type: text
    content: 'all who do such things, all who act dishonestly, '
  - type: note
    content: ch. 18:12; 22:5
  - type: text
    content: 'are an abomination to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ex. 17:8
  - type: text
    content: '“Remember what Amalek did to you '
  - type: note
    content: ch. 24:9
  - type: text
    content: 'on the way as you came out of Egypt, '
  '18':
  - type: text
    content: 'how he attacked you on the way when you were faint and weary, and '
  - type: note
    content: '[Josh. 10:19]'
  - type: text
    content: 'cut off your tail, those who were lagging behind you, and he did not fear God. '
  '19':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[1 Sam. 15:2, 3]'
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you rest from all your enemies around you, in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you for an inheritance to possess, you shall '
  - type: note
    content: See Ex. 17:8-14
  - type: text
    content: blot out the memory of Amalek from under heaven; you shall not forget.
  '2':
  - type: text
    content: 'then if the guilty man deserves to be beaten, the judge shall cause him to lie down and be beaten in his presence with a number of stripes in proportion to his offense. '
  '3':
  - type: note
    content: '[2 Cor. 11:24]'
  - type: text
    content: Forty stripes may be given him, but not more, lest, if one should go on to beat him with more stripes than these, your brother be degraded in your sight.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cited 1 Cor. 9:9; 1 Tim. 5:18
  - type: text
    content: “You shall not muzzle an ox when it is treading out the grain.
  - type: heading
    content: Laws Concerning Levirate Marriage
  '5':
  - type: text
    content: ' '
  - type: note
    content: Matt. 22:24; Mark 12:19; Luke 20:28
  - type: text
    content: '“If brothers dwell together, and one of them dies and has no son, the wife of the dead man shall not be married outside the family to a stranger. Her '
  - type: note
    content: '[Gen. 38:8, 9; Ruth 1:12, 13; 3:9]'
  - type: text
    content: 'husband’s brother shall go in to her and take her as his wife and perform the duty of a husband’s brother to her. '
  '6':
  - type: text
    content: 'And the first son whom she bears shall succeed to the name of his dead brother, that '
  - type: note
    content: Ruth 4:10
  - type: text
    content: 'his name may not be blotted out of Israel. '
  '7':
  - type: text
    content: 'And if the man does not wish to take his brother’s wife, then his brother’s wife shall '
  - type: note
    content: '[Ruth 4:1, 2]'
  - type: text
    content: 'go up to the gate to the elders and say, ‘My husband’s brother refuses to perpetuate his brother’s name in Israel; he will not perform the duty of a husband’s brother to me.’ '
  '8':
  - type: text
    content: 'Then the elders of his city shall call him and speak to him, and if he persists, saying, '
  - type: note
    content: '[Ruth 4:6]'
  - type: text
    content: '‘I do not wish to take her,’ '
  '9':
  - type: text
    content: 'then his brother’s wife shall go up to him in the presence of the elders and '
  - type: note
    content: '[Ruth 4:7]'
  - type: text
    content: 'pull his sandal off his foot and '
  - type: note
    content: '[Num. 12:14; Job 30:10; Isa. 50:6]'
  - type: text
    content: 'spit in his face. And she shall answer and say, ‘So shall it be done to the man who does not '
  - type: note
    content: Ruth 4:11
  - type: text
    content: 'build up his brother’s house.’ '
