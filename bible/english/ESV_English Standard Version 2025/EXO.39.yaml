document_id: EXO.39,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Making the Priestly Garments
  - type: text
    content: 'From the '
  - type: note
    content: ch. 35:23, 25
  - type: text
    content: 'blue and purple and scarlet yarns they made '
  - type: note
    content: ver. 41; ch. 31:10; 35:19
  - type: text
    content: finely woven garments,
  - type: note
    content: Or garments for worship
  - type: text
    content: ' for ministering in the Holy Place. They made the holy garments for Aaron, '
  - type: note
    content: ch. 28:2-4
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '10':
  - type: text
    content: 'And they set in it four rows of stones. A row of sardius, topaz, and carbuncle was the first row; '
  '11':
  - type: text
    content: 'and the second row, an emerald, a sapphire, and a diamond; '
  '12':
  - type: text
    content: 'and the third row, a jacinth, an agate, and an amethyst; '
  '13':
  - type: text
    content: 'and the fourth row, a beryl, an onyx, and a jasper. They were enclosed in settings of gold filigree. '
  '14':
  - type: text
    content: 'There were twelve stones with their names according to the names of the sons of Israel. They were like signets, each engraved with its name, for the twelve tribes. '
  '15':
  - type: text
    content: 'And they made on the breastpiece twisted chains like cords, of pure gold. '
  '16':
  - type: text
    content: 'And they made two settings of gold filigree and two gold rings, and put the two rings on the two edges of the breastpiece. '
  '17':
  - type: text
    content: 'And they put the two cords of gold in the two rings at the edges of the breastpiece. '
  '18':
  - type: text
    content: 'They attached the two ends of the two cords to the two settings of filigree. Thus they attached it in front to the shoulder pieces of the ephod. '
  '19':
  - type: text
    content: 'Then they made two rings of gold, and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: For ver. 2-7, see ch. 28:6-12
  - type: text
    content: 'He made the ephod of gold, blue and purple and scarlet yarns, and fine twined linen. '
  '20':
  - type: text
    content: 'And they made two rings of gold, and attached them in front to the lower part of the two shoulder pieces of the ephod, at its seam above the skillfully woven band of the ephod. '
  '21':
  - type: text
    content: 'And they bound the breastpiece by its rings to the rings of the ephod with a lace of blue, so that it should lie on the skillfully woven band of the ephod, and that the breastpiece should not come loose from the ephod, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: For ver. 22-26, see ch. 28:31-34
  - type: text
    content: 'He also made the robe of the ephod woven all of blue, '
  '23':
  - type: text
    content: 'and the opening of the robe in it was like the opening in a garment, with a binding around the opening, so that it might not tear. '
  '24':
  - type: text
    content: 'On the hem of the robe they made pomegranates of blue and purple and scarlet yarns and fine twined linen. '
  '25':
  - type: text
    content: 'They also made bells of pure gold, and put the bells between the pomegranates all around the hem of the robe, between the pomegranates— '
  '26':
  - type: text
    content: 'a bell and a pomegranate, a bell and a pomegranate around the hem of the robe for ministering, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:39, 40, 42
  - type: text
    content: 'They also made the coats, woven of fine '
  - type: note
    content: Ezek. 44:18
  - type: text
    content: 'linen, for Aaron and his sons, '
  '28':
  - type: text
    content: 'and the '
  - type: note
    content: '[See ver. 27 above]'
  - type: text
    content: 'turban of fine linen, and the caps of fine linen, and the linen undergarments of fine twined linen, '
  '29':
  - type: text
    content: 'and the sash of fine twined linen and of blue and purple and scarlet yarns, embroidered with needlework, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: 'And they hammered out gold leaf, and he cut it into threads to work into the blue and purple and the scarlet yarns, and into the fine twined linen, in skilled design. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ch. 28:36, 37; 29:6
  - type: text
    content: 'They made the plate of the holy crown of pure gold, and wrote on it an inscription, like the engraving of a signet, “Holy to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '31':
  - type: text
    content: 'And they tied to it a cord of blue to fasten it on the turban above, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '32':
  - type: text
    content: 'Thus all the work of the tabernacle of the tent of meeting was finished, and the people of Israel did '
  - type: note
    content: ver. 42, 43; ch. 25:40
  - type: text
    content: 'according to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses; so they did. '
  '33':
  - type: text
    content: 'Then they brought the tabernacle to Moses, the tent and all its utensils, its hooks, its frames, its bars, its pillars, and its bases; '
  '34':
  - type: text
    content: 'the covering of tanned rams’ skins and goatskins, and the '
  - type: note
    content: ch. 35:12
  - type: text
    content: 'veil of the screen; '
  '35':
  - type: text
    content: 'the ark of the testimony with its poles and the mercy seat; '
  '36':
  - type: text
    content: 'the table with all its utensils, and the bread of the Presence; '
  '37':
  - type: note
    content: '[ch. 25:31]'
  - type: text
    content: 'the lampstand of pure gold and its lamps with the lamps set and all its utensils, and the oil for the light; '
  '38':
  - type: note
    content: ch. 30:3; 37:26; 40:5, 26
  - type: text
    content: 'the golden altar, the anointing oil and the fragrant incense, and '
  - type: note
    content: ch. 26:36; 36:37
  - type: text
    content: 'the screen for the entrance of the tent; '
  '39':
  - type: text
    content: 'the bronze altar, and its grating of bronze, its poles, and all its utensils; the basin and its stand; '
  '4':
  - type: text
    content: 'They made for the ephod attaching shoulder pieces, joined to it at its two edges. '
  '40':
  - type: note
    content: See ch. 27:9-15; 38:9-17
  - type: text
    content: 'the hangings of the court, its pillars, and its bases, and the '
  - type: note
    content: ch. 27:16; 38:18
  - type: text
    content: 'screen for the gate of the court, its '
  - type: note
    content: ch. 35:18
  - type: text
    content: 'cords, and its pegs; and all the utensils for the service of the tabernacle, for the tent of meeting; '
  '41':
  - type: text
    content: 'the finely worked garments for ministering in the Holy Place, the holy garments for Aaron the priest, and the garments of his sons for their service as priests. '
  '42':
  - type: note
    content: ch. 35:10
  - type: text
    content: 'According to all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses, so the people of Israel had done all the work. '
  '43':
  - type: text
    content: 'And Moses saw all the work, and behold, they had done it; as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded, so had they done it. Then Moses '
  - type: note
    content: Lev. 9:22, 23; Josh. 22:6; 2 Sam. 6:18; 1 Kgs. 8:14; 2 Chr. 6:3; 30:27; See Num. 6:23-27
  - type: text
    content: blessed them.
  '5':
  - type: text
    content: 'And the skillfully woven band on it was of one piece with it and made like it, of gold, blue and purple and scarlet yarns, and fine twined linen, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '6':
  - type: text
    content: 'They made the onyx stones, enclosed in settings of gold filigree, and engraved like the engravings of a signet, according to the names of the sons of Israel. '
  '7':
  - type: text
    content: 'And he set them on the shoulder pieces of the ephod to be stones of remembrance for the sons of Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: For ver. 8-21, see ch. 28:15-28
  - type: text
    content: 'He made the breastpiece, in skilled work, in the style of the ephod, of gold, blue and purple and scarlet yarns, and fine twined linen. '
  '9':
  - type: text
    content: It was square. They made the breastpiece doubled, a span
  - type: note
    content: A span was about 9 inches or 22 centimeters
  - type: text
    content: ' its length and a span its breadth when doubled. '
