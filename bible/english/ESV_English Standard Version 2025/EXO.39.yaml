      metadata:
        usfm: EXO.28.2+EXO.28.3+EXO.28.4
    marker-yv: yv-n
  - type: text
    text: 'as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 2-7, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:6-12
      metadata:
        usfm: EXO.28.6+EXO.28.7+EXO.28.8+EXO.28.9+EXO.28.10+EXO.28.11+EXO.28.12
    marker-yv: yv-n
  - type: text
    text: 'He made the ephod of gold, blue and purple and scarlet yarns, and fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they hammered out gold leaf, and he cut it into threads to work into the blue and purple and the scarlet yarns, and into the fine twined linen, in skilled design. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They made for the ephod attaching shoulder pieces, joined to it at its two edges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the skillfully woven band on it was of one piece with it and made like it, of gold, blue and purple and scarlet yarns, and fine twined linen, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They made the onyx stones, enclosed in settings of gold filigree, and engraved like the engravings of a signet, according to the names of the sons of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he set them on the shoulder pieces of the ephod to be stones of remembrance for the sons of Israel, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 8-21, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:15-28
      metadata:
        usfm: EXO.28.15+EXO.28.16+EXO.28.17+EXO.28.18+EXO.28.19+EXO.28.20+EXO.28.21+EXO.28.22+EXO.28.23+EXO.28.24+EXO.28.25+EXO.28.26+EXO.28.27+EXO.28.28
    marker-yv: yv-n
  - type: text
    text: 'He made the breastpiece, in skilled work, in the style of the ephod, of gold, blue and purple and scarlet yarns, and fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It was square. They made the breastpiece doubled, a span
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'span '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was about 9 inches or 22 centimeters
    marker-yv: yv-n
  - type: text
    text: ' its length and a span its breadth when doubled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they set in it four rows of stones. A row of sardius, topaz, and carbuncle was the first row; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the second row, an emerald, a sapphire, and a diamond; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the third row, a jacinth, an agate, and an amethyst; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and the fourth row, a beryl, an onyx, and a jasper. They were enclosed in settings of gold filigree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There were twelve stones with their names according to the names of the sons of Israel. They were like signets, each engraved with its name, for the twelve tribes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they made on the breastpiece twisted chains like cords, of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they made two settings of gold filigree and two gold rings, and put the two rings on the two edges of the breastpiece. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they put the two cords of gold in the two rings at the edges of the breastpiece. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They attached the two ends of the two cords to the two settings of filigree. Thus they attached it in front to the shoulder pieces of the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then they made two rings of gold, and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they made two rings of gold, and attached them in front to the lower part of the two shoulder pieces of the ephod, at its seam above the skillfully woven band of the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And they bound the breastpiece by its rings to the rings of the ephod with a lace of blue, so that it should lie on the skillfully woven band of the ephod, and that the breastpiece should not come loose from the ephod, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'For ver. 22-26, see ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:31-34
      metadata:
        usfm: EXO.28.31+EXO.28.32+EXO.28.33+EXO.28.34
    marker-yv: yv-n
  - type: text
    text: 'He also made the robe of the ephod woven all of blue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and the opening of the robe in it was like the opening in a garment, with a binding around the opening, so that it might not tear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On the hem of the robe they made pomegranates of blue and purple and scarlet yarns and fine twined linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They also made bells of pure gold, and put the bells between the pomegranates all around the hem of the robe, between the pomegranates— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'a bell and a pomegranate, a bell and a pomegranate around the hem of the robe for ministering, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:39
      metadata:
        usfm: EXO.28.39
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: EXO.28.40
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '42'
      metadata:
        usfm: EXO.28.42
    marker-yv: yv-n
  - type: text
    text: 'They also made the coats, woven of fine '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 44:18
      metadata:
        usfm: EZK.44.18
    marker-yv: yv-n
  - type: text
    text: 'linen, for Aaron and his sons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[See ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: EXO.27
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'turban of fine linen, and the caps of fine linen, and the linen undergarments of fine twined linen, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and the sash of fine twined linen and of blue and purple and scarlet yarns, embroidered with needlework, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:36
      metadata:
        usfm: EXO.28.36
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: EXO.28.37
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:6
      metadata:
        usfm: EXO.29.6
    marker-yv: yv-n
  - type: text
    text: 'They made the plate of the holy crown of pure gold, and wrote on it an inscription, like the engraving of a signet, “Holy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they tied to it a cord of blue to fasten it on the turban above, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Thus all the work of the tabernacle of the tent of meeting was finished, and the people of Israel did '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 42, 43
      metadata:
        usfm: EXO.39.42
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:40
      metadata:
        usfm: EXO.25.40
    marker-yv: yv-n
  - type: text
    text: 'according to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses; so they did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then they brought the tabernacle to Moses, the tent and all its utensils, its hooks, its frames, its bars, its pillars, and its bases; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the covering of tanned rams’ skins and goatskins, and the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:12
      metadata:
        usfm: EXO.35.12
    marker-yv: yv-n
  - type: text
    text: 'veil of the screen; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the ark of the testimony with its poles and the mercy seat; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the table with all its utensils, and the bread of the Presence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:31
      metadata:
        usfm: EXO.25.31
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'the lampstand of pure gold and its lamps with the lamps set and all its utensils, and the oil for the light; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:3
      metadata:
        usfm: EXO.30.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:26
      metadata:
        usfm: EXO.37.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:5
      metadata:
        usfm: EXO.40.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: EXO.40.26
    marker-yv: yv-n
  - type: text
    text: 'the golden altar, the anointing oil and the fragrant incense, and '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:36
      metadata:
        usfm: EXO.26.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:37
      metadata:
        usfm: EXO.36.37
    marker-yv: yv-n
  - type: text
    text: 'the screen for the entrance of the tent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'the bronze altar, and its grating of bronze, its poles, and all its utensils; the basin and its stand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:9-15
      metadata:
        usfm: EXO.27.9+EXO.27.10+EXO.27.11+EXO.27.12+EXO.27.13+EXO.27.14+EXO.27.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:9-17
      metadata:
        usfm: EXO.38.9+EXO.38.10+EXO.38.11+EXO.38.12+EXO.38.13+EXO.38.14+EXO.38.15+EXO.38.16+EXO.38.17
    marker-yv: yv-n
  - type: text
    text: 'the hangings of the court, its pillars, and its bases, and the '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:16
      metadata:
        usfm: EXO.27.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:18
      metadata:
        usfm: EXO.38.18
    marker-yv: yv-n
  - type: text
    text: 'screen for the gate of the court, its '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:18
      metadata:
        usfm: EXO.35.18
    marker-yv: yv-n
  - type: text
    text: 'cords, and its pegs; and all the utensils for the service of the tabernacle, for the tent of meeting; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the finely worked garments for ministering in the Holy Place, the holy garments for Aaron the priest, and the garments of his sons for their service as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:10
      metadata:
        usfm: EXO.35.10
    marker-yv: yv-n
  - type: text
    text: 'According to all that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses, so the people of Israel had done all the work. '
  - type: usfm
    marker: vlbl
