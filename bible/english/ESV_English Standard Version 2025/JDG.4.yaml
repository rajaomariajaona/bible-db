document_id: JDG.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Deborah and Barak
  - type: text
    content: ' '
  - type: note
    content: See ch. 2:19
  - type: text
    content: 'And the people of Israel again did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' after Ehud died. '
  '10':
  - type: text
    content: 'And Barak called out '
  - type: note
    content: ch. 5:18
  - type: text
    content: Zebulun and Naphtali to Kedesh. And 10,000 men went up at his heels, and Deborah went up with him.
  '11':
  - type: text
    content: 'Now Heber '
  - type: note
    content: ch. 1:16
  - type: text
    content: 'the Kenite had separated from the Kenites, the descendants of '
  - type: note
    content: Num. 10:29
  - type: text
    content: 'Hobab the father-in-law of Moses, and had pitched his tent as far away as the oak in '
  - type: note
    content: Josh. 19:33
  - type: text
    content: Zaanannim, which is near Kedesh.
  '12':
  - type: text
    content: 'When Sisera was told that Barak the son of Abinoam had gone up to Mount Tabor, '
  '13':
  - type: text
    content: 'Sisera called out all his chariots, '
  - type: note
    content: ver. 3
  - type: text
    content: '900 chariots of iron, and all the men who were with him, from Harosheth-hagoyim to the river Kishon. '
  '14':
  - type: text
    content: 'And Deborah said to Barak, “Up! For this is the day in which '
  - type: note
    content: ver. 7
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has given Sisera into your hand. '
  - type: note
    content: Deut. 9:3; 2 Sam. 5:24; Ps. 68:7; Isa. 52:12
  - type: text
    content: 'Does not the '
  - type: text
    content: Lord
  - type: text
    content: ' go out before you?” So Barak went down from Mount Tabor with 10,000 men following him. '
  '15':
  - type: note
    content: ver. 23; Ps. 83:9; [Josh. 10:10]
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' routed Sisera and all his chariots and all his army before Barak by the edge of the sword. And Sisera got down from his chariot and fled away on foot. '
  '16':
  - type: text
    content: And Barak pursued the chariots and the army to Harosheth-hagoyim, and all the army of Sisera fell by the edge of the sword; not a man was left.
  '17':
  - type: text
    content: 'But Sisera fled away on foot to the tent of Jael, the wife of Heber the Kenite, for there was peace between Jabin the king of Hazor and the house of Heber the Kenite. '
  '18':
  - type: text
    content: 'And Jael came out to meet Sisera and said to him, “Turn aside, my lord; turn aside to me; do not be afraid.” So he turned aside to her into the tent, and she covered him with a rug. '
  '19':
  - type: text
    content: 'And he said to her, “Please give me a little water to drink, for I am thirsty.” So she opened '
  - type: note
    content: ch. 5:25
  - type: text
    content: 'a skin of milk and gave him a drink and covered him. '
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 2:14
  - type: text
    content: 'sold them into the hand of '
  - type: note
    content: '[Josh. 11:1, 10]'
  - type: text
    content: 'Jabin king of Canaan, who reigned in '
  - type: note
    content: '[Josh. 11:1, 10]'
  - type: text
    content: 'Hazor. The commander of his army was '
  - type: note
    content: 1 Sam. 12:9; Ps. 83:9
  - type: text
    content: 'Sisera, who lived in '
  - type: note
    content: ver. 13, 16
  - type: text
    content: 'Harosheth-hagoyim. '
  '20':
  - type: text
    content: 'And he said to her, “Stand at the opening of the tent, and if any man comes and asks you, ‘Is anyone here?’ say, ‘No.’” '
  '21':
  - type: text
    content: 'But Jael the wife of Heber took a tent peg, and took a hammer in her hand. Then she went softly to him and drove the peg into his temple until it went down into the ground while he was lying fast asleep from weariness. So he died. '
  '22':
  - type: text
    content: And behold, as Barak was pursuing Sisera, Jael went out to meet him and said to him, “Come, and I will show you the man whom you are seeking.” So he went in to her tent, and there lay Sisera dead, with the tent peg in his temple.
  '23':
  - type: text
    content: ' '
  - type: note
    content: ver. 15
  - type: text
    content: 'So on that day God subdued Jabin the king of Canaan before the people of Israel. '
  '24':
  - type: text
    content: And the hand of the people of Israel pressed harder and harder against Jabin the king of Canaan, until they destroyed Jabin king of Canaan.
  '3':
  - type: text
    content: 'Then the people of Israel '
  - type: note
    content: See ch. 3:9
  - type: text
    content: 'cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, for he had '
  - type: note
    content: ver. 13; [ch. 1:19]
  - type: text
    content: 900 chariots of iron and he oppressed the people of Israel cruelly for twenty years.
  '4':
  - type: text
    content: 'Now Deborah, a prophetess, the wife of Lappidoth, was judging Israel at that time. '
  '5':
  - type: text
    content: 'She used to sit under the palm of Deborah between Ramah and Bethel in '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'the hill country of Ephraim, and the people of Israel came up to her for judgment. '
  '6':
  - type: text
    content: 'She sent and summoned '
  - type: note
    content: Heb. 11:32
  - type: text
    content: 'Barak the son of Abinoam from '
  - type: note
    content: Josh. 19:37
  - type: text
    content: 'Kedesh-naphtali and said to him, “Has not the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, commanded you, ‘Go, gather your men at Mount '
  - type: note
    content: ch. 8:18
  - type: text
    content: 'Tabor, taking 10,000 from the people of Naphtali and the people of Zebulun. '
  '7':
  - type: text
    content: 'And I will draw out Sisera, the general of Jabin’s army, to meet you by '
  - type: note
    content: ver. 13; ch. 5:21; 1 Kgs. 18:40; Ps. 83:9
  - type: text
    content: 'the river Kishon with his chariots and his troops, '
  - type: note
    content: See ch. 3:28
  - type: text
    content: 'and I will give him into your hand’?” '
  '8':
  - type: text
    content: 'Barak said to her, “If you will go with me, I will go, but if you will not go with me, I will not go.” '
  '9':
  - type: text
    content: 'And she said, “I will surely go with you. Nevertheless, the road on which you are going will not lead to your glory, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will '
  - type: note
    content: See ch. 2:14
  - type: text
    content: 'sell Sisera into the hand of a woman.” Then Deborah arose and went with Barak to Kedesh. '
