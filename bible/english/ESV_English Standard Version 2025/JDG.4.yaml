  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jael the wife of Heber took a tent peg, and took a hammer in her hand. Then she went softly to him and drove the peg into his temple until it went down into the ground while he was lying fast asleep from weariness. So he died. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And behold, as Barak was pursuing Sisera, Jael went out to meet him and said to him, “Come, and I will show you the man whom you are seeking.” So he went in to her tent, and there lay Sisera dead, with the tent peg in his temple.
