document_id: HEB.6,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[Phil. 3:12-14]'
  - type: text
    content: 'let us leave '
  - type: note
    content: ch. 5:12
  - type: text
    content: 'the elementary doctrine of Christ and go on to maturity, not laying again a foundation of repentance '
  - type: note
    content: ch. 9:14
  - type: text
    content: 'from dead works and of faith toward God, '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 19:17; Matt. 10:42; 25:40; Mark 9:41
  - type: text
    content: 'God is not unjust so as to overlook '
  - type: note
    content: 1 Thess. 1:3
  - type: text
    content: 'your work and the love that you have shown for his name in '
  - type: note
    content: Rom. 15:31; 2 Cor. 8:4; 9:1, 12; 2 Tim. 1:18; Rev. 2:19
  - type: text
    content: 'serving the saints, as you still do. '
  '11':
  - type: text
    content: 'And we desire each one of you to show the same earnestness to have the full assurance '
  - type: note
    content: Rom. 5:2-5
  - type: text
    content: 'of hope until the end, '
  '12':
  - type: text
    content: 'so that you may not be sluggish, but '
  - type: note
    content: ch. 13:7; [ch. 10:36]
  - type: text
    content: imitators of those who through faith and patience inherit the promises.
  - type: heading
    content: The Certainty of God’s Promise
  '13':
  - type: text
    content: 'For when God made a promise to Abraham, since he had no one greater by whom to swear, '
  - type: note
    content: Gen. 22:16
  - type: text
    content: 'he swore by himself, '
  '14':
  - type: text
    content: 'saying, '
  - type: note
    content: Cited from Gen. 22:17
  - type: text
    content: '“Surely I will bless you and multiply you.” '
  '15':
  - type: text
    content: And thus Abraham,
  - type: note
    content: Greek he
  - type: text
    content: ' '
  - type: note
    content: ver. 12, 17; [ch. 7:6]; See Rom. 4:13
  - type: text
    content: 'having patiently waited, obtained the promise. '
  '16':
  - type: text
    content: 'For people swear by something greater than themselves, and in all their disputes '
  - type: note
    content: Ex. 22:11
  - type: text
    content: 'an oath is final for confirmation. '
  '17':
  - type: text
    content: 'So when God desired to show more convincingly to '
  - type: note
    content: ch. 11:9
  - type: text
    content: 'the heirs of the promise '
  - type: note
    content: ver. 18; [Ps. 110:4; Prov. 19:21]
  - type: text
    content: 'the unchangeable character of his purpose, '
  - type: note
    content: '[Gal. 3:20]'
  - type: text
    content: 'he guaranteed it with an oath, '
  '18':
  - type: text
    content: 'so that by two unchangeable things, in which '
  - type: note
    content: See Titus 1:2
  - type: text
    content: 'it is impossible for God to lie, we who have fled for refuge might have strong encouragement to hold fast to the hope '
  - type: note
    content: ch. 12:1, 2
  - type: text
    content: 'set before us. '
  '19':
  - type: text
    content: 'We have this as a sure and steadfast anchor of the soul, a hope that enters into '
  - type: note
    content: ch. 9:7; Lev. 16:15
  - type: text
    content: 'the inner place behind the curtain, '
  '2':
  - type: text
    content: 'and of '
  - type: note
    content: Acts 19:4, 5
  - type: text
    content: instruction about washings,
  - type: note
    content: Or baptisms (that is, cleansing rites)
  - type: text
    content: ' '
  - type: note
    content: Acts 8:17; 19:6
  - type: text
    content: 'the laying on of hands, '
  - type: note
    content: Acts 17:31, 32
  - type: text
    content: 'the resurrection of the dead, and '
  - type: note
    content: See Acts 10:42
  - type: text
    content: 'eternal judgment. '
  '20':
  - type: text
    content: 'where Jesus has gone '
  - type: note
    content: ch. 4:14; 8:1; 9:24
  - type: text
    content: 'as a forerunner on our behalf, '
  - type: note
    content: ch. 3:1; 5:6, 10; 7:17, 21
  - type: text
    content: having become a high priest forever after the order of Melchizedek.
  '3':
  - type: text
    content: 'And this we will do '
  - type: note
    content: See 1 Cor. 16:7
  - type: text
    content: 'if God permits. '
  '4':
  - type: text
    content: 'For it is impossible, in the case of those '
  - type: note
    content: ch. 10:32
  - type: text
    content: 'who have once been enlightened, who have tasted '
  - type: note
    content: '[John 4:10; Eph. 2:8]'
  - type: text
    content: 'the heavenly gift, and '
  - type: note
    content: ch. 2:4, 5; Gal. 3:2, 5
  - type: text
    content: 'have shared in the Holy Spirit, '
  '5':
  - type: text
    content: 'and '
  - type: note
    content: Ps. 34:8
  - type: text
    content: 'have tasted the goodness of the word of God and the powers of the age to come, '
  '6':
  - type: text
    content: 'and '
  - type: note
    content: '[Matt. 19:26]; See 1 John 5:16'
  - type: text
    content: 'then have fallen away, to restore them again to repentance, since '
  - type: note
    content: '[ch. 10:29]'
  - type: text
    content: 'they are crucifying once again the Son of God to their own harm and holding him up to contempt. '
  '7':
  - type: text
    content: 'For '
  - type: note
    content: Ps. 65:10
  - type: text
    content: 'land that has drunk the rain that often falls on it, and produces a crop useful to those for whose sake it is cultivated, receives a blessing from God. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Isa. 5:1-7; [Gen. 3:17, 18; Deut. 29:22, 23; Jer. 44:22; Luke 13:6-9]
  - type: text
    content: 'if it bears thorns and thistles, it is worthless and near to being cursed, '
  - type: note
    content: '[Mal. 4:1; John 15:6]'
  - type: text
    content: and its end is to be burned.
  '9':
  - type: text
    content: 'Though we speak in this way, yet in your case, beloved, we feel sure of better things—things that belong to salvation. '
