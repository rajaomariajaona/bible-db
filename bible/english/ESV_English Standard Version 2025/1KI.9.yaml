document_id: 1KI.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Appears to Solomon
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see 2 Chr. 7:11-22
  - type: text
    content: 'As soon as Solomon had finished building the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 7:1; 2 Chr. 8:1
  - type: text
    content: 'and the king’s house and '
  - type: note
    content: ver. 19; 2 Chr. 8:6
  - type: text
    content: 'all that Solomon desired to build, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: For ver. 10-28, see 2 Chr. 8:1-18
  - type: text
    content: 'At the end of '
  - type: note
    content: '[ch. 6:37, 38; 7:1]'
  - type: text
    content: 'twenty years, in which Solomon had built the two houses, the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king’s house, '
  '11':
  - type: text
    content: 'and Hiram king of Tyre had supplied Solomon with cedar and cypress timber and gold, as much as he desired, King Solomon gave to Hiram twenty cities in the land of Galilee. '
  '12':
  - type: text
    content: 'But when Hiram came from Tyre to see the cities that Solomon had given him, they did not please him. '
  '13':
  - type: text
    content: 'Therefore he said, “What kind of cities are these that you have given me, my brother?” So they are called the land of '
  - type: note
    content: '[Josh. 19:27]'
  - type: text
    content: 'Cabul to this day. '
  '14':
  - type: text
    content: Hiram had sent to the king 120 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of gold.'
  '15':
  - type: text
    content: 'And this is the account of '
  - type: note
    content: ch. 5:13
  - type: text
    content: 'the forced labor that King Solomon drafted to build the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and his own house and '
  - type: note
    content: ver. 24; See 2 Sam. 5:9
  - type: text
    content: 'the Millo and the wall of Jerusalem and '
  - type: note
    content: Josh. 11:1
  - type: text
    content: 'Hazor and '
  - type: note
    content: Josh. 17:11
  - type: text
    content: 'Megiddo and Gezer '
  '16':
  - type: text
    content: '(Pharaoh king of Egypt had gone up and captured Gezer and burned it with fire, and had killed '
  - type: note
    content: Josh. 16:10
  - type: text
    content: 'the Canaanites who lived in the city, and had given it as dowry to '
  - type: note
    content: ch. 3:1; 7:8
  - type: text
    content: 'his daughter, Solomon’s wife; '
  '17':
  - type: text
    content: 'so Solomon rebuilt Gezer) and '
  - type: note
    content: See Josh. 10:10
  - type: text
    content: 'Lower Beth-horon '
  '18':
  - type: text
    content: and Baalath and Tamar in the wilderness, in the land of Judah,
  - type: note
    content: Hebrew lacks of Judah
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'and all the store cities that Solomon had, and '
  - type: note
    content: ch. 10:26; 2 Chr. 1:14; 9:25
  - type: text
    content: 'the cities for his chariots, and the cities for '
  - type: note
    content: ch. 4:26
  - type: text
    content: 'his horsemen, and whatever Solomon '
  - type: note
    content: ver. 1
  - type: text
    content: 'desired to build in Jerusalem, in Lebanon, and in all the land of his dominion. '
  '2':
  - type: note
    content: ch. 3:5; 11:9
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Solomon a second time, as he had appeared to him at Gibeon. '
  '20':
  - type: text
    content: 'All the people who were left of the Amorites, the Hittites, the Perizzites, the Hivites, and the Jebusites, who were not of the people of Israel— '
  '21':
  - type: note
    content: '[Judg. 1:21, 27, 29; 3:1]'
  - type: text
    content: 'their descendants who were left after them in the land, '
  - type: note
    content: '[Josh. 15:63; 17:12]'
  - type: text
    content: whom the people of Israel were unable to devote to destruction
  - type: note
    content: That is, set apart (devote) as an offering to the Lord (for destruction)
  - type: text
    content: —
  - type: note
    content: Judg. 1:28
  - type: text
    content: 'these Solomon drafted to be '
  - type: note
    content: Ezra 2:55-58; Neh. 7:57-60; 11:3
  - type: text
    content: 'slaves, and so they are to this day. '
  '22':
  - type: text
    content: 'But '
  - type: note
    content: Lev. 25:39
  - type: text
    content: of the people of Israel Solomon made no slaves. They were the soldiers, they were his officials, his commanders, his captains, his chariot commanders and his horsemen.
  '23':
  - type: text
    content: 'These were the chief officers who were over Solomon’s work: '
  - type: note
    content: '[2 Chr. 8:10]'
  - type: text
    content: '550 '
  - type: note
    content: ch. 5:16
  - type: text
    content: who had charge of the people who carried on the work.
  '24':
  - type: text
    content: 'But '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'Pharaoh’s daughter went up from the city of David to '
  - type: note
    content: ch. 7:8
  - type: text
    content: 'her own house that Solomon had built for her. '
  - type: note
    content: ch. 11:27; [2 Sam. 5:9; 2 Chr. 32:5]
  - type: text
    content: 'Then he built '
  - type: note
    content: See ver. 15
  - type: text
    content: the Millo.
  '25':
  - type: text
    content: 'Three times a year Solomon used to offer up burnt offerings and peace offerings on the altar that he built to the '
  - type: text
    content: Lord
  - type: text
    content: ', making offerings with it'
  - type: note
    content: Septuagint lacks with it
  - type: text
    content: ' before the '
  - type: text
    content: Lord
  - type: text
    content: . So he finished the house.
  '26':
  - type: text
    content: 'King Solomon built a fleet of ships at '
  - type: note
    content: ch. 22:48; Num. 33:35; Deut. 2:8
  - type: text
    content: 'Ezion-geber, which is near Eloth on the shore of the Red Sea, in the land of Edom. '
  '27':
  - type: text
    content: 'And Hiram sent '
  - type: note
    content: ch. 10:11
  - type: text
    content: 'with the fleet his servants, seamen who were familiar with the sea, together with the servants of Solomon. '
  '28':
  - type: text
    content: 'And they went to '
  - type: note
    content: ch. 10:11; 22:48; 1 Chr. 29:4; Job 22:24; 28:16; Ps. 45:9; Isa. 13:12
  - type: text
    content: Ophir and brought from there gold, 420 talents, and they brought it to King Solomon.
  '3':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “I have heard your prayer and your plea, which you have made before me. I have consecrated this house that you have built, '
  - type: note
    content: ch. 8:16, 29
  - type: text
    content: 'by putting my name there forever. '
  - type: note
    content: Deut. 11:12
  - type: text
    content: 'My eyes and my heart will be there for all time. '
  '4':
  - type: text
    content: 'And as for you, if you will '
  - type: note
    content: '[Gen. 17:1]'
  - type: text
    content: 'walk before me, '
  - type: note
    content: ch. 11:4, 6, 38; 14:8; 15:5
  - type: text
    content: 'as David your father walked, with integrity of heart and uprightness, doing according to all that I have commanded you, and keeping my statutes and my rules, '
  '5':
  - type: note
    content: ch. 6:12; 1 Chr. 22:10; See ch. 2:4
  - type: text
    content: 'then I will establish your royal throne over Israel forever, as I promised David your father, saying, ‘You shall not lack a man on the throne of Israel.’ '
  '6':
  - type: note
    content: '[2 Sam. 7:14; Ps. 89:30, 32]'
  - type: text
    content: 'But if you turn aside from following me, you or your children, and do not keep my commandments and my statutes that I have set before you, but go and serve other gods and worship them, '
  '7':
  - type: note
    content: Deut. 4:26; 2 Kgs. 17:23; 25:21
  - type: text
    content: 'then I will cut off Israel from the land that I have given them, '
  - type: note
    content: Jer. 7:14
  - type: text
    content: 'and the house that I have consecrated for my name I will cast out of my sight, '
  - type: note
    content: Deut. 28:37; [Ps. 44:14]
  - type: text
    content: 'and Israel will become a proverb and a byword among all peoples. '
  '8':
  - type: text
    content: And this house will become a heap of ruins.
  - type: note
    content: Syriac, Old Latin; Hebrew will become high
  - type: text
    content: ' Everyone passing by it will be astonished and will hiss, and they will say, '
  - type: note
    content: Deut. 29:24-26; Jer. 22:8, 9
  - type: text
    content: '‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done thus to this land and to this house?’ '
  '9':
  - type: text
    content: 'Then they will say, ‘Because '
  - type: note
    content: ch. 18:18
  - type: text
    content: 'they abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ' their God who brought their fathers out of the land of Egypt and laid hold on other gods and worshiped them and served them. Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought all this disaster on them.’”'
  - type: heading
    content: Solomon’s Other Acts
