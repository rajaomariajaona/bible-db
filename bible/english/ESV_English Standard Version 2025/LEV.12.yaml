document_id: LEV.12,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Purification After Childbirth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the people of Israel, saying, If a woman conceives and bears a male child, then '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:22
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'she shall be unclean seven days. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:19
      marker-yv: yv-n
    - type: text
      text: 'As at the time of her menstruation, she shall be unclean. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:59
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 7:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      marker-yv: yv-n
    - type: text
      text: 'eighth day the flesh of his foreskin shall be circumcised. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she shall continue for thirty-three days in the blood of her purifying. She shall not touch anything holy, nor come into the sanctuary, until the days of her purifying are completed. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if she bears a female child, then she shall be unclean two weeks, as in her menstruation. And she shall continue in the blood of her purifying for sixty-six days.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: '“And when the days of her purifying are completed, whether for a son or for a daughter, she shall bring to the priest at the entrance of the tent of meeting a lamb a year old for a burnt offering, and a pigeon or a turtledove for a sin offering, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he shall offer it before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and make atonement for her. Then she shall be clean from the flow of her blood. This is the law for her who bears a child, either male or female. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if she cannot afford a lamb, then she shall take '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:24
      marker-yv: yv-n
    - type: text
      text: two turtledoves or two pigeons,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: two young pigeons
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: 'one for a burnt offering and the other for a sin offering. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:26
      marker-yv: yv-n
    - type: text
      text: And the priest shall make atonement for her, and she shall be clean.”
