document_id: LEV.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Purification After Childbirth
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: '“Speak to the people of Israel, saying, If a woman conceives and bears a male child, then '
  - type: note
    content: '[Luke 2:22]'
  - type: text
    content: 'she shall be unclean seven days. '
  - type: note
    content: ch. 15:19
  - type: text
    content: 'As at the time of her menstruation, she shall be unclean. '
  '3':
  - type: text
    content: 'And on the '
  - type: note
    content: Gen. 17:12; Luke 1:59; 2:21; John 7:22, 23
  - type: text
    content: 'eighth day the flesh of his foreskin shall be circumcised. '
  '4':
  - type: text
    content: 'Then she shall continue for thirty-three days in the blood of her purifying. She shall not touch anything holy, nor come into the sanctuary, until the days of her purifying are completed. '
  '5':
  - type: text
    content: But if she bears a female child, then she shall be unclean two weeks, as in her menstruation. And she shall continue in the blood of her purifying for sixty-six days.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: '“And when the days of her purifying are completed, whether for a son or for a daughter, she shall bring to the priest at the entrance of the tent of meeting a lamb a year old for a burnt offering, and a pigeon or a turtledove for a sin offering, '
  '7':
  - type: text
    content: 'and he shall offer it before the '
  - type: text
    content: Lord
  - type: text
    content: ' and make atonement for her. Then she shall be clean from the flow of her blood. This is the law for her who bears a child, either male or female. '
  '8':
  - type: text
    content: 'And if she cannot afford a lamb, then she shall take '
  - type: note
    content: ch. 1:14; 5:7; Cited Luke 2:24
  - type: text
    content: two turtledoves or two pigeons,
  - type: note
    content: Septuagint two young pigeons
  - type: text
    content: ' '
  - type: note
    content: ver. 6
  - type: text
    content: 'one for a burnt offering and the other for a sin offering. '
  - type: note
    content: ch. 4:26
  - type: text
    content: And the priest shall make atonement for her, and she shall be clean.”
