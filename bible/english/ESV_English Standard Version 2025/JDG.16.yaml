document_id: JDG.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson and Delilah
  - type: text
    content: 'Samson went to '
  - type: note
    content: Josh. 15:47
  - type: text
    content: 'Gaza, and there he saw a prostitute, and he went in to her. '
  '10':
  - type: text
    content: 'Then Delilah said to Samson, “Behold, you have mocked me and told me lies. Please tell me how you might be bound.” '
  '11':
  - type: text
    content: 'And he said to her, “If they bind me with '
  - type: note
    content: ch. 15:13, 14
  - type: text
    content: 'new ropes that have not been used, then I shall become weak and be like any other man.” '
  '12':
  - type: text
    content: So Delilah took new ropes and bound him with them and said to him, “The Philistines are upon you, Samson!” And the men lying in ambush were in an inner chamber. But he snapped the ropes off his arms like a thread.
  '13':
  - type: text
    content: 'Then Delilah said to Samson, “Until now you have mocked me and told me lies. Tell me how you might be bound.” And he said to her, “If you weave the seven locks of my head with the web and fasten it tight with the pin, then I shall become weak and be like any other man.” '
  '14':
  - type: text
    content: So while he slept, Delilah took the seven locks of his head and wove them into the web.
  - type: note
    content: Compare Septuagint; Hebrew lacks and fasten it tight . . . into the web
  - type: text
    content: ' And she made them tight with the pin and said to him, “The Philistines are upon you, Samson!” But he awoke from his sleep and pulled away the pin, the loom, and the web.'
  '15':
  - type: text
    content: 'And she said to him, '
  - type: note
    content: ch. 14:16
  - type: text
    content: '“How can you say, ‘I love you,’ when your heart is not with me? You have mocked me these three times, and you have not told me where your great strength lies.” '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 14:17]'
  - type: text
    content: 'when she pressed him hard with her words day after day, and urged him, his soul was vexed to death. '
  '17':
  - type: text
    content: 'And he told her all his heart, and said to her, '
  - type: note
    content: '[ch. 13:5]'
  - type: text
    content: “A razor has never come upon my head, for I have been a Nazirite to God from my mother’s womb. If my head is shaved, then my strength will leave me, and I shall become weak and be like any other man.”
  '18':
  - type: text
    content: 'When Delilah saw that he had told her all his heart, she sent and called the lords of the Philistines, saying, “Come up again, for he has told me all his heart.” Then the lords of the Philistines came up to her and brought '
  - type: note
    content: ver. 5
  - type: text
    content: 'the money in their hands. '
  '19':
  - type: text
    content: 'She made him sleep on her knees. And she called a man and had him shave off the seven locks of his head. Then she began '
  - type: note
    content: ver. 5, 6
  - type: text
    content: 'to torment him, and his strength left him. '
  '2':
  - type: text
    content: 'The Gazites were told, “Samson has come here.” And they '
  - type: note
    content: '[1 Sam. 23:26; Ps. 118:10-12; Acts 9:24]'
  - type: text
    content: 'surrounded the place and set an ambush for him all night at the gate of the city. They kept quiet all night, saying, “Let us wait till the light of the morning; then we will kill him.” '
  '20':
  - type: text
    content: 'And she said, “The Philistines are upon you, Samson!” And he awoke from his sleep and said, “I will go out as at other times and shake myself free.” But he did not know that '
  - type: note
    content: 1 Sam. 28:15, 16
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' had left him. '
  '21':
  - type: text
    content: 'And the Philistines seized him and gouged out his eyes and brought him down to Gaza and bound him with bronze shackles. '
  - type: note
    content: '[Ex. 11:5; Matt. 24:41]'
  - type: text
    content: 'And he ground at the mill in the prison. '
  '22':
  - type: text
    content: But the hair of his head began to grow again after it had been shaved.
  - type: heading
    content: The Death of Samson
  '23':
  - type: text
    content: 'Now the lords of the Philistines gathered to offer a great sacrifice to '
  - type: note
    content: 1 Chr. 10:10; See 1 Sam. 5:2-7
  - type: text
    content: 'Dagon their god and to rejoice, and they said, “Our god has given Samson our enemy into our hand.” '
  '24':
  - type: text
    content: 'And when the people saw him, '
  - type: note
    content: '[Dan. 5:4]'
  - type: text
    content: they praised their god. For they said, “Our god has given our enemy into our hand, the ravager of our country, who has killed many of us.”
  - type: note
    content: Or who has multiplied our slain
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: ch. 19:6; [2 Sam. 13:28]
  - type: text
    content: 'when their hearts were merry, they said, “Call Samson, that he may entertain us.” So they called Samson out of the prison, and he entertained them. They made him stand between the pillars. '
  '26':
  - type: text
    content: 'And Samson said to the young man who held him by the hand, “Let me feel the pillars on which the house rests, that I may lean against them.” '
  '27':
  - type: text
    content: 'Now the house was full of men and women. All the lords of the Philistines were there, and '
  - type: note
    content: '[Deut. 22:8; 2 Sam. 11:2; Neh. 8:16; Matt. 24:17; Mark 13:15; Luke 17:31]'
  - type: text
    content: on the roof there were about 3,000 men and women, who looked on while Samson entertained.
  '28':
  - type: text
    content: 'Then Samson called to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “O Lord '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: note
    content: Jer. 15:15
  - type: text
    content: 'please remember me and please strengthen me only this once, O God, that I may be avenged on the Philistines for my two eyes.” '
  '29':
  - type: text
    content: 'And Samson grasped the two middle pillars on which the house rested, and he leaned his weight against them, his right hand on the one and his left hand on the other. '
  '3':
  - type: text
    content: But Samson lay till midnight, and at midnight he arose and took hold of the doors of the gate of the city and the two posts, and pulled them up, bar and all, and put them on his shoulders and carried them to the top of the hill that is in front of Hebron.
  '30':
  - type: text
    content: 'And Samson said, “Let me die with the Philistines.” Then he bowed with all his strength, and the house fell upon the lords and upon all the people who were in it. So the dead whom he killed at his death were more than those whom he had killed during his life. '
  '31':
  - type: text
    content: 'Then his brothers and all his family came down and took him and brought him up and buried him '
  - type: note
    content: ch. 13:25
  - type: text
    content: between Zorah and Eshtaol in the tomb of Manoah his father. He had judged Israel twenty years.
  '4':
  - type: text
    content: 'After this he loved a woman in the Valley of Sorek, whose name was Delilah. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 13:3
  - type: text
    content: 'the lords of the Philistines came up to her and said to her, '
  - type: note
    content: ch. 14:15
  - type: text
    content: '“Seduce him, and see where his great strength lies, and by what means we may overpower him, that we may bind him to '
  - type: note
    content: ver. 19
  - type: text
    content: 'humble him. And we will each give you 1,100 pieces of silver.” '
  '6':
  - type: text
    content: 'So Delilah said to Samson, “Please tell me where your great strength lies, and how you might be bound, that one could '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: subdue you.”
  '7':
  - type: text
    content: 'Samson said to her, “If they bind me with seven fresh bowstrings that have not been dried, '
  - type: note
    content: ver. 11, 17
  - type: text
    content: 'then I shall become weak and be like any other man.” '
  '8':
  - type: text
    content: 'Then the lords of the Philistines brought up to her seven fresh bowstrings that had not been dried, and she bound him with them. '
  '9':
  - type: text
    content: Now she had men lying in ambush in an inner chamber. And she said to him, “The Philistines are upon you, Samson!” But he snapped the bowstrings, as a thread of flax snaps when it touches the fire. So the secret of his strength was not known.
