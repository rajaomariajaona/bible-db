  - type: text
    text: 'Then Delilah said to Samson, “Until now you have mocked me and told me lies. Tell me how you might be bound.” And he said to her, “If you weave the seven locks of my head with the web and fasten it tight with the pin, then I shall become weak and be like any other man.” '
