document_id: 1CH.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Levi
  - type: text
    content: ' '
  - type: note
    content: Ch 5:27 in Hebrew
  - type: note
    content: ch. 23:6; Gen. 46:11; Ex. 6:16; Num. 26:57
  - type: text
    content: 'The sons of Levi: Gershon, Kohath, and Merari. '
  '10':
  - type: text
    content: and Johanan fathered Azariah (
  - type: note
    content: 2 Chr. 26:17, 18
  - type: text
    content: 'it was he who served as priest '
  - type: note
    content: See 1 Kgs. 6; 2 Chr. 3
  - type: text
    content: 'in the house that Solomon built in Jerusalem). '
  '11':
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'Azariah fathered '
  - type: note
    content: 2 Chr. 19:11; Ezra 7:3
  - type: text
    content: 'Amariah, Amariah fathered Ahitub, '
  '12':
  - type: text
    content: 'Ahitub fathered Zadok, Zadok fathered '
  - type: note
    content: '[Neh. 11:11]'
  - type: text
    content: 'Shallum, '
  '13':
  - type: text
    content: 'Shallum fathered '
  - type: note
    content: 2 Kgs. 22:4; Ezra 7:1
  - type: text
    content: 'Hilkiah, Hilkiah fathered Azariah, '
  '14':
  - type: text
    content: 'Azariah fathered '
  - type: note
    content: 2 Kgs. 25:18
  - type: text
    content: 'Seraiah, Seraiah fathered Jehozadak; '
  '15':
  - type: text
    content: 'and '
  - type: note
    content: '[Ezra 3:2]'
  - type: text
    content: 'Jehozadak went into exile when the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Judah and Jerusalem into exile '
  - type: note
    content: See 2 Kgs. 25:8-21
  - type: text
    content: by the hand of Nebuchadnezzar.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ch 6:1 in Hebrew
  - type: text
    content: 'The '
  - type: note
    content: For ver. 16-19, see Ex. 6:16-19
  - type: text
    content: 'sons of Levi: Gershom, Kohath, and Merari. '
  '17':
  - type: text
    content: 'And these are the names of the sons of Gershom: '
  - type: note
    content: '[ch. 23:7]'
  - type: text
    content: 'Libni and Shimei. '
  '18':
  - type: note
    content: ch. 23:12
  - type: text
    content: 'The sons of Kohath: Amram, Izhar, Hebron and Uzziel. '
  '19':
  - type: note
    content: ch. 23:21; [ver. 44, 47]
  - type: text
    content: 'The sons of Merari: Mahli and Mushi. These are the clans of the Levites according to their fathers. '
  '2':
  - type: note
    content: Ex. 6:18; [ver. 22]
  - type: text
    content: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel. '
  '20':
  - type: note
    content: For ver. 20, 21, see ver. 41-43
  - type: text
    content: 'Of Gershom: Libni his son, '
  - type: note
    content: ver. 43
  - type: text
    content: 'Jahath his son, Zimmah his son, '
  '21':
  - type: text
    content: 'Joah his son, Iddo his son, Zerah his son, Jeatherai his son. '
  '22':
  - type: note
    content: For ver. 22-28, see ver. 33-38
  - type: text
    content: 'The sons of Kohath: Amminadab his son, Korah his son, Assir his son, '
  '23':
  - type: text
    content: 'Elkanah his son, Ebiasaph his son, Assir his son, '
  '24':
  - type: text
    content: 'Tahath his son, Uriel his son, Uzziah his son, and Shaul his son. '
  '25':
  - type: text
    content: 'The sons of Elkanah: Amasai and Ahimoth, '
  '26':
  - type: text
    content: 'Elkanah his son, Zophai his son, Nahath his son, '
  '27':
  - type: text
    content: 'Eliab his son, Jeroham his son, Elkanah his son. '
  '28':
  - type: text
    content: 'The sons of Samuel: Joel'
  - type: note
    content: Septuagint, Syriac (compare verse 33 and 1 Samuel 8:2); Hebrew lacks Joel
  - type: text
    content: ' his firstborn, the second Abijah.'
  - type: note
    content: Hebrew and Abijah
  - type: text
    content: ' '
  '29':
  - type: note
    content: '[ver. 19, 44-47]'
  - type: text
    content: 'The sons of Merari: Mahli, Libni his son, Shimei his son, Uzzah his son, '
  '3':
  - type: note
    content: Ex. 6:20; 15:20
  - type: text
    content: 'The children of Amram: Aaron, Moses, and Miriam. '
  - type: note
    content: Lev. 10:1, 12
  - type: text
    content: 'The sons of Aaron: Nadab, Abihu, Eleazar, and Ithamar. '
  '30':
  - type: text
    content: Shimea his son, Haggiah his son, and Asaiah his son.
  '31':
  - type: text
    content: 'These are the men '
  - type: note
    content: See ch. 16:4-6
  - type: text
    content: 'whom David put in charge of the service of song in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: See ch. 15:25–16:1; 2 Sam. 6:12-17
  - type: text
    content: 'after the ark rested there. '
  '32':
  - type: text
    content: 'They ministered with song before the tabernacle of the tent of meeting until Solomon built the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem, and they performed their service according to their order. '
  '33':
  - type: text
    content: 'These are the men who served and their sons. Of the sons of the Kohathites: Heman the singer the son of Joel, son of '
  - type: note
    content: '[ver. 28]'
  - type: text
    content: 'Samuel, '
  '34':
  - type: text
    content: 'son of Elkanah, son of Jeroham, son of Eliel, son of Toah, '
  '35':
  - type: text
    content: 'son of Zuph, son of Elkanah, son of Mahath, son of Amasai, '
  '36':
  - type: text
    content: 'son of Elkanah, son of Joel, son of Azariah, son of Zephaniah, '
  '37':
  - type: text
    content: 'son of Tahath, son of Assir, son of Ebiasaph, son of Korah, '
  '38':
  - type: text
    content: 'son of Izhar, son of Kohath, son of Levi, son of Israel; '
  '39':
  - type: text
    content: 'and his brother '
  - type: note
    content: ch. 15:17, 19; 2 Chr. 5:12; Ezra 2:41; Neh. 7:44
  - type: text
    content: 'Asaph, who stood on his right hand, namely, Asaph the son of Berechiah, son of Shimea, '
  '4':
  - type: note
    content: For ver. 4-6, 11-14, see Ezra 7:1-5
  - type: note
    content: For ver. 4-8, see ver. 50-53
  - type: text
    content: 'Eleazar fathered '
  - type: note
    content: See Ex. 6:25
  - type: text
    content: 'Phinehas, Phinehas fathered Abishua, '
  '40':
  - type: text
    content: 'son of Michael, son of Baaseiah, son of Malchijah, '
  '41':
  - type: text
    content: 'son of Ethni, son of Zerah, son of Adaiah, '
  '42':
  - type: text
    content: 'son of Ethan, son of Zimmah, son of Shimei, '
  '43':
  - type: text
    content: 'son of Jahath, son of Gershom, son of Levi. '
  '44':
  - type: text
    content: 'On the left hand were their brothers, the sons of Merari: Ethan the son of Kishi, son of Abdi, son of Malluch, '
  '45':
  - type: text
    content: 'son of Hashabiah, son of Amaziah, son of Hilkiah, '
  '46':
  - type: text
    content: 'son of Amzi, son of Bani, son of Shemer, '
  '47':
  - type: text
    content: 'son of Mahli, son of Mushi, son of Merari, son of Levi. '
  '48':
  - type: text
    content: And their brothers the Levites were appointed for all the service of the tabernacle of the house of God.
  '49':
  - type: text
    content: 'But Aaron and his sons made offerings '
  - type: note
    content: Lev. 1:7, 9
  - type: text
    content: 'on the altar of burnt offering and on '
  - type: note
    content: Ex. 30:7
  - type: text
    content: 'the altar of incense for all the work of the Most Holy Place, and '
  - type: note
    content: Ex. 30:10; Lev. 4:20
  - type: text
    content: 'to make atonement for Israel, according to all that Moses the servant of God had commanded. '
  '5':
  - type: text
    content: 'Abishua fathered Bukki, Bukki fathered Uzzi, '
  '50':
  - type: note
    content: For ver. 50-53, see ver. 4-8
  - type: text
    content: 'These are the sons of Aaron: Eleazar his son, Phinehas his son, Abishua his son, '
  '51':
  - type: text
    content: 'Bukki his son, Uzzi his son, Zerahiah his son, '
  '52':
  - type: text
    content: 'Meraioth his son, Amariah his son, Ahitub his son, '
  '53':
  - type: text
    content: Zadok his son, Ahimaaz his son.
  '54':
  - type: text
    content: 'These are their dwelling places according to their '
  - type: note
    content: Gen. 25:16; Num. 31:10
  - type: text
    content: 'settlements within their borders: to the sons of Aaron of the '
  - type: note
    content: Josh. 21:4, 10
  - type: text
    content: 'clans of Kohathites, for theirs was the first lot, '
  '55':
  - type: text
    content: 'to them they gave Hebron in the land of Judah and its surrounding pasturelands, '
  '56':
  - type: note
    content: '[Josh. 14:13; 15:13]'
  - type: text
    content: 'but the fields of the city and its villages they gave to Caleb the son of Jephunneh. '
  '57':
  - type: note
    content: For ver. 57-60, see Josh. 21:13-19
  - type: text
    content: 'To the sons of Aaron they gave the cities of refuge: Hebron, Libnah with its pasturelands, Jattir, Eshtemoa with its pasturelands, '
  '58':
  - type: text
    content: 'Hilen with its pasturelands, Debir with its pasturelands, '
  '59':
  - type: text
    content: 'Ashan with its pasturelands, and Beth-shemesh with its pasturelands; '
  '6':
  - type: text
    content: 'Uzzi fathered Zerahiah, Zerahiah fathered '
  - type: note
    content: '[ch. 9:11; Neh. 11:11]'
  - type: text
    content: 'Meraioth, '
  '60':
  - type: text
    content: and from the tribe of Benjamin, Gibeon,
  - type: note
    content: Septuagint, Syriac (compare Joshua 21:17); Hebrew lacks Gibeon
  - type: text
    content: ' Geba with its pasturelands, Alemeth with its pasturelands, and Anathoth with its pasturelands. All their cities throughout their clans were thirteen.'
  '61':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 66-70; Josh. 21:5 ]'
  - type: text
    content: 'To the rest of the Kohathites were given by lot out of the clan of the tribe, out of the half-tribe, the half of Manasseh, ten cities. '
  '62':
  - type: text
    content: 'To the Gershomites according to their clans were allotted thirteen cities out of the tribes of Issachar, Asher, Naphtali and Manasseh in Bashan. '
  '63':
  - type: note
    content: Josh. 21:7
  - type: text
    content: 'To the Merarites according to their clans were allotted twelve cities out of the tribes of Reuben, Gad, and Zebulun. '
  '64':
  - type: note
    content: Josh. 21:3
  - type: text
    content: 'So the people of Israel gave the Levites the cities with their pasturelands. '
  '65':
  - type: text
    content: 'They gave by lot out of the tribes of Judah, Simeon, and Benjamin '
  - type: note
    content: See ver. 57-60
  - type: text
    content: these cities that are mentioned by name.
  '66':
  - type: text
    content: ' '
  - type: note
    content: For ver. 66-70, see Josh. 21:20-26
  - type: text
    content: 'And some of the clans of the sons of Kohath had cities of their territory out of the tribe of Ephraim. '
  '67':
  - type: text
    content: 'They were given the cities of refuge: Shechem with its pasturelands in the hill country of Ephraim, Gezer with its pasturelands, '
  '68':
  - type: note
    content: Josh. 12:22; 1 Kgs. 4:12
  - type: text
    content: 'Jokmeam with its pasturelands, Beth-horon with its pasturelands, '
  '69':
  - type: text
    content: 'Aijalon with its pasturelands, Gath-rimmon with its pasturelands, '
  '7':
  - type: text
    content: 'Meraioth fathered Amariah, Amariah fathered Ahitub, '
  '70':
  - type: text
    content: and out of the half-tribe of Manasseh, Aner with its pasturelands, and Bileam with its pasturelands, for the rest of the clans of the Kohathites.
  '71':
  - type: text
    content: ' '
  - type: note
    content: For ver. 71-76, see Josh. 21:27-33
  - type: text
    content: 'To the Gershomites were given out of the clan of the half-tribe of Manasseh: Golan in Bashan with its pasturelands and '
  - type: note
    content: Josh. 9:10
  - type: text
    content: 'Ashtaroth with its pasturelands; '
  '72':
  - type: text
    content: 'and out of the tribe of Issachar: Kedesh with its pasturelands, Daberath with its pasturelands, '
  '73':
  - type: text
    content: 'Ramoth with its pasturelands, and Anem with its pasturelands; '
  '74':
  - type: text
    content: 'out of the tribe of Asher: Mashal with its pasturelands, Abdon with its pasturelands, '
  '75':
  - type: text
    content: 'Hukok with its pasturelands, and Rehob with its pasturelands; '
  '76':
  - type: text
    content: 'and out of the tribe of Naphtali: Kedesh in Galilee with its pasturelands, Hammon with its pasturelands, and Kiriathaim with its pasturelands. '
  '77':
  - type: note
    content: For ver. 77-81, see Josh. 21:34-39
  - type: text
    content: 'To the rest of the Merarites were allotted out of the tribe of Zebulun: '
  - type: note
    content: '[Josh. 19:12, 13]'
  - type: text
    content: 'Rimmono with its pasturelands, '
  - type: note
    content: '[Josh. 19:12, 13]'
  - type: text
    content: 'Tabor with its pasturelands, '
  '78':
  - type: text
    content: 'and '
  - type: note
    content: Josh. 13:32
  - type: text
    content: 'beyond the Jordan at Jericho, on the east side of the Jordan, out of the tribe of Reuben: Bezer in the wilderness with its pasturelands, Jahzah with its pasturelands, '
  '79':
  - type: text
    content: 'Kedemoth with its pasturelands, and Mephaath with its pasturelands; '
  '8':
  - type: note
    content: 2 Sam. 8:17
  - type: text
    content: 'Ahitub fathered '
  - type: note
    content: 2 Sam. 15:27
  - type: text
    content: 'Zadok, Zadok fathered Ahimaaz, '
  '80':
  - type: text
    content: 'and out of the tribe of Gad: '
  - type: note
    content: 1 Kgs. 22:3, 4; 2 Kgs. 9:1, 14
  - type: text
    content: 'Ramoth in Gilead with its pasturelands, '
  - type: note
    content: See Gen. 32:2
  - type: text
    content: 'Mahanaim with its pasturelands, '
  '81':
  - type: note
    content: Josh. 13:17; 21:39
  - type: text
    content: 'Heshbon with its pasturelands, and '
  - type: note
    content: Num. 21:32; Josh. 21:39
  - type: text
    content: Jazer with its pasturelands.
  '9':
  - type: text
    content: 'Ahimaaz fathered Azariah, Azariah fathered Johanan, '
