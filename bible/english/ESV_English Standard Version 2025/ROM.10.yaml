document_id: ROM.10,59
type_code: eng
verses:
  '1':
  - type: text
    content: Brothers,
  - type: note
    content: Or Brothers and sisters
  - type: text
    content: ' my heart’s desire and prayer to God for them is that they may be saved. '
  '10':
  - type: text
    content: 'For with the heart one believes and is justified, and with the mouth one confesses and is saved. '
  '11':
  - type: text
    content: 'For the Scripture says, '
  - type: note
    content: See ch. 9:33
  - type: text
    content: '“Everyone who believes in him will not be put to shame.” '
  '12':
  - type: note
    content: See ch. 3:22, 29
  - type: text
    content: 'For there is no distinction between Jew and Greek; '
  - type: note
    content: Acts 10:36
  - type: text
    content: 'for the same Lord is Lord of all, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: 'bestowing his riches on all who call on him. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Acts 2:21; Cited from Joel 2:32
  - type: text
    content: “everyone who calls on the name of the Lord will be saved.”
  '14':
  - type: text
    content: 'How then will they call on him in whom they have not believed? And how are they to believe in him '
  - type: note
    content: Eph. 4:21; [John 9:36; 17:20]
  - type: text
    content: of whom they have never heard?
  - type: note
    content: Or him whom they have never heard
  - type: text
    content: ' And how are they to hear '
  - type: note
    content: '[Acts 8:31; Titus 1:3]'
  - type: text
    content: 'without someone preaching? '
  '15':
  - type: text
    content: 'And how are they to preach unless they are sent? As it is written, '
  - type: note
    content: Cited from Isa. 52:7; [Nah. 1:15; Eph. 6:15]
  - type: text
    content: '“How beautiful are the feet of those who preach the good news!” '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: ch. 3:3; Heb. 4:2
  - type: text
    content: 'they have not all obeyed the gospel. For Isaiah says, '
  - type: note
    content: John 12:38; Cited from Isa. 53:1
  - type: text
    content: '“Lord, who has believed what he has heard from us?” '
  '17':
  - type: text
    content: 'So '
  - type: note
    content: Gal. 3:2, 5
  - type: text
    content: faith comes from hearing, and hearing through the word of Christ.
  '18':
  - type: text
    content: But I ask, have they not heard? Indeed they have, for
  - type: note
    content: Cited from Ps. 19:4; [ 1 Thess. 1:8 ]
  - type: text
    content: '“Their voice has gone out '
  - type: note
    content: '[Mark 16:15]; See Matt. 24:14'
  - type: text
    content: to all the earth,
  - type: text
    content: and their words to the ends of the world.”
  '19':
  - type: text
    content: But I ask, did Israel not understand? First Moses says,
  - type: note
    content: Cited from Deut. 32:21
  - type: text
    content: '“I will '
  - type: note
    content: ch. 11:11, 14
  - type: text
    content: make you jealous of those who are not a nation;
  - type: text
    content: 'with a '
  - type: note
    content: '[Titus 3:3]'
  - type: text
    content: foolish nation I will make you angry.”
  '2':
  - type: text
    content: 'For I bear them witness that '
  - type: note
    content: See Acts 21:20
  - type: text
    content: 'they have a zeal for God, '
  - type: note
    content: '[ch. 9:31]'
  - type: text
    content: 'but not according to knowledge. '
  '20':
  - type: text
    content: Then Isaiah is so bold as to say,
  - type: note
    content: Cited from Isa. 65:1; [ch. 9:30 ]
  - type: text
    content: “I have been found by those who did not seek me;
  - type: text
    content: I have shown myself to those who did not ask for me.”
  '21':
  - type: text
    content: 'But of Israel he says, '
  - type: note
    content: Cited from Isa. 65:2
  - type: text
    content: “All day long I have held out my hands to a disobedient and contrary people.”
  '3':
  - type: text
    content: 'For, being ignorant of '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the righteousness of God, and seeking to establish their own, they did not submit to God’s righteousness. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: '[Matt. 5:17; Gal. 3:24]'
  - type: text
    content: Christ is the end of the law for righteousness to everyone who believes.
  - type: note
    content: Or end of the law, that everyone who believes may be justified
  - type: heading
    content: The Message of Salvation to All
  '5':
  - type: text
    content: 'For '
  - type: note
    content: Cited from Lev. 18:5
  - type: text
    content: 'Moses writes about the righteousness that is based on the law, that '
  - type: note
    content: Neh. 9:29; Ezek. 20:11, 13, 21; Matt. 19:17; Luke 10:28; Gal. 3:12; [ch. 7:10]
  - type: text
    content: 'the person who does the commandments shall live by them. '
  '6':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 9:30
  - type: text
    content: 'the righteousness based on faith says, '
  - type: note
    content: '[Deut. 30:12, 13]'
  - type: text
    content: '“Do not say in your heart, ‘Who will ascend into heaven?’” (that is, to bring Christ down) '
  '7':
  - type: text
    content: '“or ‘Who will descend into the '
  - type: note
    content: See Rev. 9:1
  - type: text
    content: 'abyss?’” (that is, '
  - type: note
    content: Heb. 13:20
  - type: text
    content: 'to bring Christ up from the dead). '
  '8':
  - type: text
    content: 'But what does it say? '
  - type: note
    content: Cited from Deut. 30:14
  - type: text
    content: '“The word is near you, in your mouth and in your heart” (that is, the word of faith that we proclaim); '
  '9':
  - type: text
    content: 'because, if '
  - type: note
    content: Matt. 10:32; Luke 12:8; [1 Cor. 12:3; Phil. 2:11]
  - type: text
    content: 'you confess with your mouth that Jesus is Lord and '
  - type: note
    content: See Acts 16:31
  - type: text
    content: 'believe in your heart '
  - type: note
    content: '[1 Pet. 1:21]; See Acts 2:24'
  - type: text
    content: 'that God raised him from the dead, you will be saved. '
