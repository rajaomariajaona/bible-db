document_id: ISA.18,59
type_code: eng
verses:
  '1':
  - type: heading
    content: An Oracle Concerning Cush
  - type: text
    content: 'Ah, land of '
  - type: note
    content: '[ch. 8:8; 17:12]'
  - type: text
    content: whirring wings
  - type: text
    content: 'that is beyond the rivers of '
  - type: note
    content: 2 Kgs. 19:9
  - type: text
    content: Cush,
  - type: note
    content: Probably Nubia
  '2':
  - type: text
    content: 'which '
  - type: note
    content: ch. 30:4
  - type: text
    content: sends ambassadors by the sea,
  - type: text
    content: in vessels of papyrus on the waters!
  - type: text
    content: Go, you swift messengers,
  - type: text
    content: 'to a nation '
  - type: note
    content: ver. 7
  - type: text
    content: tall and smooth,
  - type: text
    content: to a people feared near and far,
  - type: text
    content: 'a nation '
  - type: note
    content: '[2 Sam. 8:2]'
  - type: text
    content: mighty and conquering,
  - type: text
    content: whose land the rivers divide.
  '3':
  - type: text
    content: All you inhabitants of the world,
  - type: text
    content: you who dwell on the earth,
  - type: text
    content: 'when '
  - type: note
    content: See ch. 5:26
  - type: text
    content: a signal is raised on the mountains, look!
  - type: text
    content: When a trumpet is blown, hear!
  '4':
  - type: text
    content: 'For thus the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me:'
  - type: text
    content: '“I will quietly look '
  - type: note
    content: Ps. 11:4
  - type: text
    content: from my dwelling
  - type: text
    content: like clear heat in sunshine,
  - type: text
    content: like a cloud of dew in the heat of harvest.”
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 31:3, 12, 13 ]'
  - type: text
    content: For before the harvest, when the blossom is over,
  - type: text
    content: and the flower becomes a ripening grape,
  - type: text
    content: he cuts off the shoots with pruning hooks,
  - type: text
    content: and the spreading branches he lops off and clears away.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: They shall all of them be left
  - type: text
    content: to the birds of prey of the mountains
  - type: text
    content: and to the beasts of the earth.
  - type: text
    content: And the birds of prey will summer on them,
  - type: text
    content: and all the beasts of the earth will winter on them.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps. 68:31
  - type: text
    content: 'At that time tribute will be brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts'
  - type: text
    content: 'from a people '
  - type: note
    content: ver. 2
  - type: text
    content: tall and smooth,
  - type: text
    content: from a people feared near and far,
  - type: text
    content: a nation mighty and conquering,
  - type: text
    content: whose land the rivers divide,
  - type: text
    content: 'to '
  - type: note
    content: '[ch. 25:10]'
  - type: text
    content: 'Mount Zion, the place of the '
  - type: note
    content: 2 Sam. 7:13
  - type: text
    content: 'name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
