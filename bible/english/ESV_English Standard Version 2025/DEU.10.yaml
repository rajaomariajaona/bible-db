document_id: DEU.10,59
type_code: eng
verses:
  '1':
  - type: heading
    content: New Tablets of Stone
  - type: text
    content: '“At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  - type: note
    content: Ex. 34:1, 2
  - type: text
    content: '‘Cut for yourself two tablets of stone like the first, and come up to me on the mountain and '
  - type: note
    content: Ex. 25:10
  - type: text
    content: 'make an ark of wood. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 9:18, 25
  - type: text
    content: '“I myself stayed on the mountain, as at the first time, forty days and forty nights, '
  - type: note
    content: ch. 9:19
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to me that time also. The '
  - type: text
    content: Lord
  - type: text
    content: ' was unwilling to destroy you. '
  '11':
  - type: note
    content: Ex. 32:34; 33:1
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Arise, go on your journey at the head of the people, so that they may go in and possess the land, which I swore to their fathers to give them.’'
  - type: heading
    content: Circumcise Your Heart
  '12':
  - type: text
    content: '“And now, Israel, '
  - type: note
    content: '[Mic. 6:8]'
  - type: text
    content: 'what does the '
  - type: text
    content: Lord
  - type: text
    content: ' your God require of you, but '
  - type: note
    content: See ch. 6:2, 13
  - type: text
    content: 'to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  - type: note
    content: See ch. 5:33
  - type: text
    content: 'to walk in all his ways, '
  - type: note
    content: See ch. 6:5
  - type: text
    content: 'to love him, to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul, '
  '13':
  - type: text
    content: 'and '
  - type: note
    content: ch. 7:11
  - type: text
    content: 'to keep the commandments and statutes of the '
  - type: text
    content: Lord
  - type: text
    content: ', which I am commanding you today '
  - type: note
    content: ch. 6:24
  - type: text
    content: 'for your good? '
  '14':
  - type: text
    content: 'Behold, '
  - type: note
    content: 1 Kgs. 8:27; 2 Chr. 6:18; Neh. 9:6; Ps. 115:16; Isa. 66:1
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God belong heaven and the heaven of heavens, '
  - type: note
    content: Ex. 19:5; Ps. 24:1
  - type: text
    content: 'the earth with all that is in it. '
  '15':
  - type: text
    content: 'Yet '
  - type: note
    content: ch. 4:37; [ch. 7:7]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' set his heart in love on your fathers and chose their offspring after them, you above all peoples, as you are this day. '
  '16':
  - type: text
    content: 'Circumcise therefore '
  - type: note
    content: ch. 30:6; Jer. 4:4; [Acts 7:51]
  - type: text
    content: 'the foreskin of your heart, and be no longer '
  - type: note
    content: See ch. 9:6
  - type: text
    content: 'stubborn. '
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is '
  - type: note
    content: Josh. 22:22; Ps. 136:2; Dan. 2:47; 11:36
  - type: text
    content: 'God of gods and '
  - type: note
    content: Rev. 17:14; 19:16
  - type: text
    content: 'Lord of lords, '
  - type: note
    content: Neh. 9:32; See ch. 7:21
  - type: text
    content: 'the great, the mighty, and the awesome God, who is '
  - type: note
    content: 2 Chr. 19:7; Job 34:19; Acts 10:34; Rom. 2:11; Gal. 2:6; Eph. 6:9; Col. 3:25; 1 Pet. 1:17
  - type: text
    content: 'not partial and takes no bribe. '
  '18':
  - type: note
    content: Ps. 68:5; 146:9; [ch. 24:17; Ex. 22:22]
  - type: text
    content: 'He executes justice for the fatherless and the widow, and loves the sojourner, giving him food and clothing. '
  '19':
  - type: note
    content: Ex. 22:21; 23:9; Lev. 19:33, 34
  - type: text
    content: 'Love the sojourner, therefore, for you were sojourners in the land of Egypt. '
  '2':
  - type: text
    content: 'And I will write on the tablets the words that were on the first tablets that you broke, and '
  - type: note
    content: Ex. 25:16, 21
  - type: text
    content: 'you shall put them in the ark.’ '
  '20':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'You shall fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You shall serve him and '
  - type: note
    content: ch. 11:22; 13:4; 30:20
  - type: text
    content: 'hold fast to him, and '
  - type: note
    content: See ch. 6:13
  - type: text
    content: 'by his name you shall swear. '
  '21':
  - type: note
    content: Ps. 22:3; 109:1; Jer. 17:14
  - type: text
    content: 'He is your praise. He is your God, '
  - type: note
    content: 2 Sam. 7:23; Ps. 106:21, 22
  - type: text
    content: 'who has done for you these great and terrifying things that your eyes have seen. '
  '22':
  - type: text
    content: 'Your fathers went down to Egypt '
  - type: note
    content: Gen. 46:27; Ex. 1:5; [Acts 7:14]
  - type: text
    content: 'seventy persons, and now the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has made you '
  - type: note
    content: ch. 28:62; Neh. 9:23; See Gen. 15:5
  - type: text
    content: as numerous as the stars of heaven.
  '3':
  - type: text
    content: 'So I made an ark '
  - type: note
    content: Ex. 25:10; 37:1
  - type: text
    content: 'of acacia wood, and '
  - type: note
    content: Ex. 34:4
  - type: text
    content: 'cut two tablets of stone like the first, and went up the mountain with the two tablets in my hand. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Ex. 34:28
  - type: text
    content: he wrote on the tablets, in the same writing as before, the Ten Commandments
  - type: note
    content: Hebrew the ten words
  - type: text
    content: ' '
  - type: note
    content: Ex. 20:1
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to you on the mountain out of the midst of the fire '
  - type: note
    content: See ch. 9:10
  - type: text
    content: 'on the day of the assembly. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them to me. '
  '5':
  - type: text
    content: 'Then I turned and '
  - type: note
    content: Ex. 34:29
  - type: text
    content: 'came down from the mountain and '
  - type: note
    content: Ex. 40:20
  - type: text
    content: 'put the tablets in the ark that I had made. '
  - type: note
    content: 1 Kgs. 8:9
  - type: text
    content: 'And there they are, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me.”'
  '6':
  - type: text
    content: '(The people of Israel '
  - type: note
    content: Num. 33:30, 31
  - type: text
    content: journeyed from Beeroth Bene-jaakan
  - type: note
    content: Or the wells of the Bene-jaakan
  - type: text
    content: ' to Moserah. '
  - type: note
    content: '[Num. 20:28; 33:38]'
  - type: text
    content: 'There Aaron died, and there he was buried. And his son Eleazar ministered as priest in his place. '
  '7':
  - type: note
    content: Num. 33:32, 33
  - type: text
    content: 'From there they journeyed to Gudgodah, and from Gudgodah to Jotbathah, a land with brooks of water. '
  '8':
  - type: text
    content: 'At that time '
  - type: note
    content: Num. 3:6; 8:14; 16:9; [1 Chr. 23:13]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' set apart the tribe of Levi '
  - type: note
    content: Num. 4:5, 15
  - type: text
    content: 'to carry the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ch. 17:12; 18:5, 7
  - type: text
    content: 'to stand before the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister to him and '
  - type: note
    content: ch. 21:5; Lev. 9:22; See Num. 6:23-26
  - type: text
    content: 'to bless in his name, to this day. '
  '9':
  - type: note
    content: See Num. 18:20
  - type: text
    content: 'Therefore Levi has no portion or inheritance with his brothers. The '
  - type: text
    content: Lord
  - type: text
    content: ' is his inheritance, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God said to him.)'
