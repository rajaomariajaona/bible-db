  - type: text
    content: strike the shepherd, and the sheep of the flock will be scattered.’
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'But after I am raised up, '
  - type: note
    content: ch. 28:7, 10, 16; Mark 16:7
  - type: text
    content: I will go before you to Galilee.”
