  - type: text
    content: ' '
  - type: text
    content: with me.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And going a little farther he fell on his face '
  - type: note
    content: Heb. 5:7
  - type: text
    content: 'and prayed, saying, '
  - type: text
    content: '“My Father, if it be possible, let '
