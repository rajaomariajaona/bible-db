  - type: text
    content: ' '
  '4':
  - type: note
    content: John 11:53; See ch. 21:46
  - type: text
    content: 'and plotted together in order to arrest Jesus by stealth and kill him. '
  '40':
  - type: text
    content: 'And he came to the disciples and found them sleeping. And he said to Peter, '
  - type: text
