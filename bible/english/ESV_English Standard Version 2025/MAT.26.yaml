    content: ' '
  - type: note
    content: For ver. 69-75, see Mark 14:66-72; Luke 22:55-62; John 18:16-18, 25-27
  - type: text
    content: 'Now Peter was sitting outside '
  - type: note
    content: ver. 3
  - type: text
    content: 'in the courtyard. And a servant girl came up to him and said, “You also were with Jesus the Galilean.” '
  '7':
  - type: text
    content: 'a woman came up to him with an alabaster flask of very expensive ointment, and she poured it on his head as he reclined at table. '
  '70':
  - type: text
    content: 'But he denied it before them all, saying, “I do not know what you mean.” '
  '71':
  - type: text
    content: 'And when he went out to the entrance, another servant girl saw him, and she said to the bystanders, “This man was with Jesus '
  - type: note
    content: ch. 2:23
  - type: text
    content: 'of Nazareth.” '
  '72':
  - type: text
    content: 'And again he denied it with an oath: “I do not know the man.” '
  '73':
  - type: text
    content: 'After a little while the bystanders came up and said to Peter, “Certainly you too are one of them, for '
  - type: note
    content: '[Judg. 12:6]'
  - type: text
    content: 'your accent betrays you.” '
  '74':
  - type: text
    content: 'Then he began to invoke a curse on himself and to swear, “I do not know the man.” And immediately the rooster crowed. '
  '75':
  - type: text
    content: 'And Peter remembered the saying of Jesus, '
  - type: note
    content: ver. 34
  - type: text
    content: '“Before the rooster crows, you will '
  - type: note
    content: '[Acts 3:13, 14]'
  - type: text
    content: deny me three times.”
  - type: text
    content: ' And he went out and wept bitterly.'
  '8':
  - type: text
    content: 'And when the disciples saw it, they were indignant, saying, “Why this waste? '
  '9':
  - type: text
    content: 'For this could have been sold for a large sum and '
  - type: note
    content: '[John 13:29]'
  - type: text
    content: 'given to the poor.” '
