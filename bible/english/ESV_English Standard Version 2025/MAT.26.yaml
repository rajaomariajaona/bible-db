  - type: text
    content: ' '
  - type: text
    content: 'See, '
  - type: note
    content: John 12:23, 27; 13:1; 17:1; [ver. 18; Luke 22:53]
  - type: text
    content: 'the hour is at hand, and '
  - type: note
