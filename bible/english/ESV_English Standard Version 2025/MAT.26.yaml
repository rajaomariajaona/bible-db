  - type: note
    content: Luke 9:32
  - type: text
    content: 'their eyes were heavy. '
  '44':
  - type: text
    content: 'So, leaving them again, he went away and prayed for '
  - type: note
    content: '[2 Cor. 12:8]'
  - type: text
    content: 'the third time, saying the same words again. '
  '45':
  - type: text
    content: 'Then he came to the disciples and said to them, '
  - type: text
