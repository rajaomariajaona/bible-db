    content: 'Now the betrayer had given them a sign, saying, “The one I will kiss is the man; seize him.” '
  '49':
  - type: text
    content: 'And he came up to Jesus at once and said, “Greetings, '
  - type: note
    content: ver. 25
  - type: text
    content: 'Rabbi!” And he kissed him. '
  '5':
  - type: text
    content: 'But they said, “Not during the feast, '
  - type: note
    content: ch. 27:24
  - type: text
    content: lest there be an uproar among the people.”
