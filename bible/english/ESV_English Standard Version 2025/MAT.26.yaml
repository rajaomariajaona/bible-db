  - type: heading
    content: Jesus Prays in Gethsemane
  '36':
  - type: text
    content: ' '
  - type: note
    content: For ver. 36-46, see Mark 14:32-42; Luke 22:40-46
  - type: text
    content: 'Then Jesus went with them '
  - type: note
    content: '[See ver. 30 above]'
  - type: text
    content: 'to a place called Gethsemane, and he said to his disciples, '
  - type: text
    content: “Sit here, while I go over there and pray.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And taking with him '
  - type: note
    content: ch. 17:1
  - type: text
    content: 'Peter and '
  - type: note
    content: ch. 4:21
  - type: text
    content: 'the two sons of Zebedee, he began to be sorrowful and troubled. '
  '38':
  - type: text
    content: 'Then he said to them, '
  - type: note
    content: '[Ps. 42:5, 6; John 12:27]'
  - type: text
    content: '“My soul is very sorrowful, even to death; remain here, and '
  - type: note
