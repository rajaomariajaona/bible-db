document_id: PSA.63,59
type_code: eng
verses:
  '1':
  - type: heading
    content: My Soul Thirsts for You
  - type: text
    content: 'A Psalm of David, '
  - type: note
    content: '[2 Sam. 16:14; 17:2, 29]'
  - type: text
    content: when he was in the wilderness of Judah.
  - type: text
    content: 'O God, you are my God; '
  - type: note
    content: Ps. 78:34; Isa. 26:9
  - type: text
    content: earnestly I seek you;
  - type: note
    content: See Ps. 84:2
  - type: text
    content: my soul thirsts for you;
  - type: text
    content: my flesh faints for you,
  - type: text
    content: 'as in '
  - type: note
    content: Ps. 143:6; Isa. 32:2
  - type: text
    content: a dry and weary land where there is no water.
  '10':
  - type: text
    content: they shall be given over to the power of the sword;
  - type: text
    content: they shall be a portion for jackals.
  '11':
  - type: text
    content: 'But '
  - type: note
    content: Ps. 61:6
  - type: text
    content: the king shall rejoice in God;
  - type: text
    content: 'all who '
  - type: note
    content: Deut. 6:13; Isa. 45:23; 65:16
  - type: text
    content: swear by him shall exult,
  - type: note
    content: Ps. 107:42; Job 5:16; [ Rom. 3:19 ]
  - type: text
    content: 'for the mouths of '
  - type: note
    content: '[Ps. 38:12; 41:5-8]'
  - type: text
    content: liars will be stopped.
  '2':
  - type: text
    content: So I have looked upon you in the sanctuary,
  - type: text
    content: 'beholding '
  - type: note
    content: Ps. 78:61; [Ps. 27:4]
  - type: text
    content: your power and glory.
  '3':
  - type: text
    content: 'Because your '
  - type: note
    content: '[Ps. 69:16]'
  - type: text
    content: steadfast love is better than life,
  - type: text
    content: my lips will praise you.
  '4':
  - type: text
    content: 'So I will bless you '
  - type: note
    content: Ps. 104:33; 146:2
  - type: text
    content: as long as I live;
  - type: text
    content: 'in your '
  - type: note
    content: Ps. 20:1, 5
  - type: text
    content: 'name I will '
  - type: note
    content: See Ps. 28:2
  - type: text
    content: lift up my hands.
  '5':
  - type: text
    content: 'My soul will be '
  - type: note
    content: See Ps. 36:8
  - type: text
    content: satisfied as with fat and rich food,
  - type: text
    content: and my mouth will praise you with joyful lips,
  '6':
  - type: text
    content: 'when I remember you '
  - type: note
    content: See Ps. 42:8
  - type: text
    content: upon my bed,
  - type: text
    content: 'and meditate on you in '
  - type: note
    content: See Ps. 42:8
  - type: text
    content: the watches of the night;
  '7':
  - type: text
    content: for you have been my help,
  - type: text
    content: 'and in '
  - type: note
    content: See Ps. 17:8
  - type: text
    content: the shadow of your wings I will sing for joy.
  '8':
  - type: text
    content: 'My soul '
  - type: note
    content: '[Num. 14:24]'
  - type: text
    content: clings to you;
  - type: text
    content: 'your right hand '
  - type: note
    content: See Ps. 41:12
  - type: text
    content: upholds me.
  '9':
  - type: text
    content: But those who seek to destroy my life
  - type: note
    content: Ps. 9:17; 55:15
  - type: text
    content: 'shall go down into '
  - type: note
    content: Ezek. 26:20; 31:14; Eph. 4:9
  - type: text
    content: the depths of the earth;
