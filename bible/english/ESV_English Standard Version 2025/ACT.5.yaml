document_id: ACT.5,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ananias and Sapphira
  - type: text
    content: 'But a man named Ananias, with his wife Sapphira, sold a piece of property, '
  '10':
  - type: text
    content: 'Immediately she fell down at his feet and breathed her last. When the young men came in they found her dead, and they carried her out and buried her beside her husband. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: ver. 5
  - type: text
    content: great fear came upon the whole church and upon all who heard of these things.
  - type: heading
    content: Many Signs and Wonders Done
  '12':
  - type: text
    content: 'Now many signs and wonders were regularly done among the people '
  - type: note
    content: ch. 2:43; 4:30; 14:3; 19:11; Mark 16:20; Rom. 15:19; 2 Cor. 12:12; Heb. 2:4
  - type: text
    content: 'by the hands of the apostles. And they were all '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'together in '
  - type: note
    content: ch. 3:11; John 10:23
  - type: text
    content: 'Solomon’s Portico. '
  '13':
  - type: text
    content: 'None of the rest dared join them, but '
  - type: note
    content: ver. 26; ch. 2:47; 4:21
  - type: text
    content: 'the people held them in high esteem. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 6:1, 2]'
  - type: text
    content: 'more than ever believers were added to the Lord, multitudes of both men and women, '
  '15':
  - type: note
    content: '[ch. 19:12]'
  - type: text
    content: 'so that they even '
  - type: note
    content: Mark 6:55, 56
  - type: text
    content: 'carried out the sick into the streets and laid them on cots and mats, that as Peter came by '
  - type: note
    content: '[2 Kgs. 4:29; Matt. 14:36]'
  - type: text
    content: 'at least his shadow might fall on some of them. '
  '16':
  - type: text
    content: 'The people also gathered from the towns around Jerusalem, '
  - type: note
    content: Mark 16:17, 18
  - type: text
    content: bringing the sick and those afflicted with unclean spirits, and they were all healed.
  - type: heading
    content: The Apostles Arrested and Freed
  '17':
  - type: text
    content: 'But the high priest rose up, and all who were with him (that is, the party of '
  - type: note
    content: See Matt. 22:23
  - type: text
    content: 'the Sadducees), and filled with '
  - type: note
    content: ch. 13:45; James 3:14, 16; [ch. 7:9; 17:5]
  - type: text
    content: 'jealousy '
  '18':
  - type: text
    content: 'they arrested the apostles and '
  - type: note
    content: See Luke 21:12
  - type: text
    content: 'put them in the public prison. '
  '19':
  - type: text
    content: 'But during the night '
  - type: note
    content: See ch. 8:26
  - type: text
    content: 'an angel of the Lord '
  - type: note
    content: ch. 12:10; 16:26
  - type: text
    content: 'opened the prison doors and brought them out, and said, '
  '2':
  - type: text
    content: 'and with his wife’s knowledge '
  - type: note
    content: ver. 3
  - type: text
    content: 'he kept back for himself some of the proceeds and brought only a part of it and '
  - type: note
    content: ch. 4:35, 37
  - type: text
    content: 'laid it at the apostles’ feet. '
  '20':
  - type: text
    content: '“Go and stand in the temple and speak to the people all '
  - type: note
    content: '[John 6:63, 68; Phil. 2:16]'
  - type: text
    content: 'the words of '
  - type: note
    content: '[ch. 13:46; 22:4; 28:28]'
  - type: text
    content: 'this '
  - type: note
    content: ch. 3:15; 11:18
  - type: text
    content: 'Life.” '
  '21':
  - type: text
    content: 'And when they heard this, '
  - type: note
    content: ver. 25, 42
  - type: text
    content: 'they entered the temple '
  - type: note
    content: '[John 8:2]'
  - type: text
    content: at daybreak and began to teach.
  - type: text
    content: 'Now when the high priest came, and those who were with him, they called together the council, all the senate of the people of Israel, and sent to the prison to have them brought. '
  '22':
  - type: text
    content: 'But when the officers came, they did not find them in the prison, so they returned and reported, '
  '23':
  - type: text
    content: '“We found the prison securely locked and the guards standing at the doors, but when we opened them we found no one inside.” '
  '24':
  - type: text
    content: 'Now when '
  - type: note
    content: ver. 26; See ch. 4:1
  - type: text
    content: 'the captain of the temple and the chief priests heard these words, they were greatly perplexed about them, wondering what this would come to. '
  '25':
  - type: text
    content: 'And someone came and told them, “Look! The men whom you put in prison '
  - type: note
    content: ver. 21
  - type: text
    content: 'are standing in the temple and teaching the people.” '
  '26':
  - type: text
    content: 'Then '
  - type: note
    content: ver. 24
  - type: text
    content: 'the captain with the officers went and brought them, but not by force, for '
  - type: note
    content: ver. 13; See ch. 4:21
  - type: text
    content: they were afraid of being stoned by the people.
  '27':
  - type: text
    content: 'And when they had brought them, they set them before the council. And the high priest questioned them, '
  '28':
  - type: text
    content: 'saying, '
  - type: note
    content: ch. 4:18
  - type: text
    content: '“We strictly charged you not to teach in this name, yet here you have filled Jerusalem with your teaching, and you '
  - type: note
    content: ch. 2:23, 36; 3:15; 4:10; 7:52; Matt. 27:25
  - type: text
    content: 'intend to bring this man’s blood upon us.” '
  '29':
  - type: text
    content: 'But Peter and the apostles answered, '
  - type: note
    content: '[ch. 4:19, 20]'
  - type: text
    content: '“We must obey God rather than men. '
  '3':
  - type: text
    content: 'But Peter said, “Ananias, why has '
  - type: note
    content: '[Luke 22:3; John 13:2, 27]'
  - type: text
    content: 'Satan filled your heart to lie '
  - type: note
    content: '[ver. 4, 9]'
  - type: text
    content: 'to the Holy Spirit and '
  - type: note
    content: ver. 2
  - type: text
    content: 'to keep back for yourself part of the proceeds of the land? '
  '30':
  - type: note
    content: See ch. 3:13
  - type: text
    content: 'The God of our fathers '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'raised Jesus, '
  - type: note
    content: ch. 10:39; Gal. 3:13; See Luke 24:20
  - type: text
    content: 'whom you killed by hanging him on '
  - type: note
    content: ch. 13:29; 1 Pet. 2:24
  - type: text
    content: 'a tree. '
  '31':
  - type: text
    content: 'God exalted '
  - type: note
    content: See ch. 2:33
  - type: text
    content: 'him at his right hand as '
  - type: note
    content: See ch. 3:15
  - type: text
    content: 'Leader and '
  - type: note
    content: See Luke 2:11
  - type: text
    content: 'Savior, '
  - type: note
    content: Luke 24:47; See Luke 5:32
  - type: text
    content: 'to give '
  - type: note
    content: ch. 11:18; 2 Tim. 2:25; [Rom. 2:4]
  - type: text
    content: 'repentance to Israel and '
  - type: note
    content: Luke 24:47; See Luke 5:32
  - type: text
    content: 'forgiveness of sins. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: See Luke 24:48
  - type: text
    content: 'we are witnesses to these things, and '
  - type: note
    content: '[ch. 15:28; John 15:26, 27; Heb. 2:4; 1 John 5:7]'
  - type: text
    content: 'so is the Holy Spirit, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: whom God has given to those who obey him.”
  '33':
  - type: text
    content: 'When they heard this, they '
  - type: note
    content: ch. 7:54; [ch. 2:37]
  - type: text
    content: 'were enraged and wanted to kill them. '
  '34':
  - type: text
    content: 'But a Pharisee in the council named '
  - type: note
    content: ch. 22:3
  - type: text
    content: 'Gamaliel, '
  - type: note
    content: See Luke 5:17
  - type: text
    content: 'a teacher of the law held in honor by all the people, stood up and gave orders to put the men outside for a little while. '
  '35':
  - type: text
    content: 'And he said to them, “Men of Israel, take care what you are about to do with these men. '
  '36':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 21:38]'
  - type: text
    content: 'before these days Theudas rose up, '
  - type: note
    content: ch. 8:9; [Gal. 2:6; 6:3]
  - type: text
    content: 'claiming to be somebody, and a number of men, about four hundred, joined him. He was killed, and all who followed him were dispersed and came to nothing. '
  '37':
  - type: text
    content: 'After him Judas the Galilean rose up in the days of '
  - type: note
    content: '[Luke 2:2]'
  - type: text
    content: 'the census and drew away some of the people after him. He too perished, and all who followed him were scattered. '
  '38':
  - type: text
    content: 'So in the present case I tell you, keep away from these men and let them alone, for '
  - type: note
    content: Lam. 3:37
  - type: text
    content: 'if this plan or this undertaking is of man, it will fail; '
  '39':
  - type: text
    content: 'but '
  - type: note
    content: Prov. 21:30; Isa. 8:9, 10; Nah. 1:9
  - type: text
    content: 'if it is of God, you will not be able to overthrow them. You '
  - type: note
    content: 2 Chr. 13:12; [ch. 11:17]
  - type: text
    content: 'might even be found opposing God!” So they took his advice, '
  '4':
  - type: text
    content: 'While it remained unsold, did it not remain your own? And after it was sold, was it not at your disposal? Why is it that you have contrived this deed in your heart? You have not lied to man but '
  - type: note
    content: '[ver. 3, 9]'
  - type: text
    content: 'to God.” '
  '40':
  - type: text
    content: 'and '
  - type: note
    content: ch. 4:18
  - type: text
    content: 'when they had called in the apostles, '
  - type: note
    content: '[ch. 22:19; Mark 13:9; Luke 23:16]'
  - type: text
    content: 'they beat them and charged them not to speak in the name of Jesus, and let them go. '
  '41':
  - type: text
    content: 'Then they left the presence of the council, '
  - type: note
    content: 1 Pet. 4:13, 14, 16; See Matt. 5:12
  - type: text
    content: 'rejoicing that they were counted worthy '
  - type: note
    content: ch. 9:16; 21:13; [Rom. 1:5]; See John 15:21
  - type: text
    content: 'to suffer dishonor for '
  - type: note
    content: Lev. 24:11, 16; Phil. 2:9; 3 John 7
  - type: text
    content: 'the name. '
  '42':
  - type: text
    content: 'And every day, '
  - type: note
    content: ch. 2:46
  - type: text
    content: 'in the temple and from house to house, they did not cease teaching and '
  - type: note
    content: ch. 8:35; 11:20; 17:18
  - type: text
    content: 'preaching '
  - type: note
    content: See ch. 18:5
  - type: text
    content: that the Christ is Jesus.
  '5':
  - type: text
    content: 'When Ananias heard these words, he '
  - type: note
    content: '[Ezek. 11:13]'
  - type: text
    content: 'fell down and breathed his last. And '
  - type: note
    content: ver. 11
  - type: text
    content: 'great fear came upon all who heard of it. '
  '6':
  - type: text
    content: 'The young men rose and '
  - type: note
    content: '[ch. 8:2; Ezek. 29:5; John 19:40]'
  - type: text
    content: wrapped him up and carried him out and buried him.
  '7':
  - type: text
    content: 'After an interval of about three hours his wife came in, not knowing what had happened. '
  '8':
  - type: text
    content: And Peter said to her, “Tell me whether you
  - type: note
    content: The Greek for you is plural here
  - type: text
    content: ' sold the land for so much.” And she said, “Yes, for so much.” '
  '9':
  - type: text
    content: 'But Peter said to her, “How is it that you have agreed together '
  - type: note
    content: '[ch. 15:10; 1 Cor. 10:9]'
  - type: text
    content: 'to test '
  - type: note
    content: '[ver. 3, 4]'
  - type: text
    content: 'the Spirit of the Lord? Behold, the feet of those who have buried your husband are at the door, and they will carry you out.” '
