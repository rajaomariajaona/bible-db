document_id: ACT.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lame Beggar Healed
  - type: text
    content: 'Now Peter and John were '
  - type: note
    content: See Luke 18:10
  - type: text
    content: 'going up to the temple at '
  - type: note
    content: Ps. 55:17
  - type: text
    content: 'the hour of prayer, '
  - type: note
    content: ch. 10:3, 30; Matt. 27:46; [1 Kgs. 18:29]
  - type: text
    content: the ninth hour.
  - type: note
    content: That is, 3 p.m.
  - type: text
    content: ' '
  '10':
  - type: text
    content: and recognized him as the one who sat at the Beautiful Gate of the temple, asking for alms. And they were filled with wonder and amazement at what had happened to him.
  - type: heading
    content: Peter Speaks in Solomon’s Portico
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 4:14
  - type: text
    content: 'While he clung to Peter and John, all the people, utterly astounded, ran together to them in '
  - type: note
    content: ch. 5:12; John 10:23
  - type: text
    content: 'the portico called Solomon’s. '
  '12':
  - type: text
    content: 'And when Peter saw it he addressed the people: “Men of Israel, why do you wonder at this, or why do you stare at us, as though by our own power or piety we have made him walk? '
  '13':
  - type: note
    content: Matt. 22:32
  - type: text
    content: 'The God of Abraham, the God of Isaac, and the God of Jacob, '
  - type: note
    content: ch. 5:30; 22:14; [ch. 7:32]
  - type: text
    content: 'the God of our fathers, '
  - type: note
    content: Isa. 55:5; [Isa. 52:13]; See John 8:54
  - type: text
    content: glorified his servant
  - type: note
    content: Or child; also verse 26
  - type: text
    content: ' Jesus, whom '
  - type: note
    content: See Matt. 20:19
  - type: text
    content: 'you delivered over and '
  - type: note
    content: ch. 13:28; John 19:7, 12, 15
  - type: text
    content: 'denied in the presence of Pilate, '
  - type: note
    content: Luke 23:14, 16; John 19:12
  - type: text
    content: 'when he had decided to release him. '
  '14':
  - type: text
    content: 'But you denied '
  - type: note
    content: '[ch. 4:27, 30]; See Mark 1:24'
  - type: text
    content: 'the Holy and '
  - type: note
    content: ch. 7:52; 22:14; 1 Pet. 3:18; 1 John 2:1; 3:7; [James 5:6]
  - type: text
    content: 'Righteous One, and '
  - type: note
    content: Luke 23:18, 19, 25
  - type: text
    content: 'asked for a murderer to be granted to you, '
  '15':
  - type: text
    content: 'and you killed '
  - type: note
    content: ch. 5:31
  - type: text
    content: 'the Author of life, '
  - type: note
    content: See ch. 2:24
  - type: text
    content: 'whom God raised from the dead. To this we are witnesses. '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'his name—by '
  - type: note
    content: '[John 1:12]'
  - type: text
    content: 'faith in his name—has made this man strong whom you see and know, and the faith that is '
  - type: note
    content: '[1 Pet. 1:21]'
  - type: text
    content: through Jesus
  - type: note
    content: Greek him
  - type: text
    content: ' has given the man this perfect health in the presence of you all.'
  '17':
  - type: text
    content: '“And now, brothers, I know that '
  - type: note
    content: ch. 13:27; [ch. 26:9; Luke 23:34; John 16:3; 1 Cor. 2:8; 1 Tim. 1:13]
  - type: text
    content: 'you acted in ignorance, as did also your rulers. '
  '18':
  - type: text
    content: 'But what God '
  - type: note
    content: See ch. 2:23
  - type: text
    content: 'foretold '
  - type: note
    content: ch. 17:3; 26:22, 23; [Heb. 2:10]; See Luke 24:26, 27
  - type: text
    content: 'by the mouth of all the prophets, that '
  - type: note
    content: See Luke 9:20
  - type: text
    content: 'his Christ would '
  - type: note
    content: Matt. 17:12; Luke 22:15; 24:46; Heb. 13:12
  - type: text
    content: 'suffer, he thus fulfilled. '
  '19':
  - type: note
    content: See ch. 2:38
  - type: text
    content: 'Repent therefore, and '
  - type: note
    content: See Luke 22:32
  - type: text
    content: 'turn back, that '
  - type: note
    content: Ps. 51:1, 9; Isa. 43:25; 44:22; Col. 2:14
  - type: text
    content: 'your sins may be blotted out, '
  '2':
  - type: text
    content: 'And a man '
  - type: note
    content: ch. 14:8
  - type: text
    content: 'lame from birth was being carried, '
  - type: note
    content: '[Luke 16:20]'
  - type: text
    content: 'whom they laid daily at the gate of the temple that is called the Beautiful Gate '
  - type: note
    content: '[John 9:8]'
  - type: text
    content: 'to ask alms of those entering the temple. '
  '20':
  - type: text
    content: 'that times of refreshing may come from the presence of the Lord, and that he may send the Christ '
  - type: note
    content: ch. 22:14; 26:16
  - type: text
    content: 'appointed for you, Jesus, '
  '21':
  - type: note
    content: '[ch. 1:11; Luke 24:26]'
  - type: text
    content: 'whom heaven must receive until the time for '
  - type: note
    content: '[Matt. 17:11; Rom. 8:21]'
  - type: text
    content: 'restoring all the things about which '
  - type: note
    content: Luke 1:70
  - type: text
    content: 'God spoke by the mouth of his holy prophets long ago. '
  '22':
  - type: text
    content: 'Moses said, ‘The Lord God will raise up for you '
  - type: note
    content: ch. 7:37, cited from Deut. 18:15, 18, 19
  - type: text
    content: 'a prophet like me from your brothers. You shall listen '
  - type: note
    content: Matt. 17:5
  - type: text
    content: 'to him in whatever he tells you. '
  '23':
  - type: text
    content: 'And it shall be that every soul who does not listen to that prophet '
  - type: note
    content: Lev. 23:29
  - type: text
    content: 'shall be destroyed from the people.’ '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: ch. 13:20; 1 Sam. 3:20; Heb. 11:32
  - type: text
    content: 'all the prophets who have spoken, from Samuel and those who came after him, also proclaimed these days. '
  '25':
  - type: note
    content: See ch. 2:39
  - type: text
    content: 'You are the sons of the prophets and of '
  - type: note
    content: See Rom. 9:4, 5
  - type: text
    content: 'the covenant that God made with your fathers, saying to Abraham, '
  - type: note
    content: Cited from Gen. 22:18; See Gen. 12:3
  - type: text
    content: '‘And in your offspring shall all the families of the earth be blessed.’ '
  '26':
  - type: note
    content: Rom. 1:16; 2:9; 15:8; [Mark 7:27]
  - type: text
    content: 'God, '
  - type: note
    content: ver. 22
  - type: text
    content: 'having raised up his servant, sent him to you first, '
  - type: note
    content: ver. 25
  - type: text
    content: 'to bless you '
  - type: note
    content: Rom. 11:26; [Ezek. 3:19]; See Matt. 1:21
  - type: text
    content: by turning every one of you from your wickedness.”
  '3':
  - type: text
    content: 'Seeing Peter and John about to go into the temple, he asked to receive alms. '
  '4':
  - type: text
    content: 'And Peter directed his gaze at him, as did John, and said, “Look at us.” '
  '5':
  - type: text
    content: 'And he fixed his attention on them, expecting to receive something from them. '
  '6':
  - type: text
    content: 'But Peter said, '
  - type: note
    content: 2 Cor. 6:10
  - type: text
    content: '“I have no silver and gold, but what I do have I give to you. '
  - type: note
    content: '[ch. 9:34]'
  - type: text
    content: 'In the name of Jesus Christ of Nazareth, rise up and walk!” '
  '7':
  - type: text
    content: 'And he took him by the right hand and raised him up, and immediately his feet and ankles were made strong. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: ch. 14:10; Isa. 35:6
  - type: text
    content: 'leaping up, he stood and began to walk, and entered the temple with them, walking and leaping and praising God. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: ch. 4:16, 21
  - type: text
    content: 'all the people saw him walking and praising God, '
