document_id: EZK.24,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of Jerusalem
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the ninth year, in the tenth month, on the tenth day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: Heap on the logs, kindle the fire, boil the meat well, mix in the spices,
  - type: note
    content: Or empty out the broth
  - type: text
    content: ' and let the bones be burned up. '
  '11':
  - type: text
    content: 'Then set it empty upon the coals, that it may become hot, and its copper may burn, '
  - type: note
    content: ch. 22:15
  - type: text
    content: 'that its uncleanness may be melted in it, its corrosion consumed. '
  '12':
  - type: note
    content: '[Jer. 2:22]'
  - type: text
    content: She has wearied herself with toil;
  - type: note
    content: The meaning of the Hebrew is uncertain
  - type: text
    content: ' its abundant corrosion does not go out of it. Into the fire with its corrosion! '
  '13':
  - type: text
    content: 'On account of your unclean lewdness, because I would have cleansed you and you were not cleansed from your uncleanness, '
  - type: note
    content: Isa. 22:14
  - type: text
    content: 'you shall not be cleansed anymore till '
  - type: note
    content: See ch. 5:13
  - type: text
    content: 'I have satisfied my fury upon you. '
  '14':
  - type: note
    content: See ch. 17:24
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: '. I have spoken; it shall come to pass; I will do it. I will not go back; '
  - type: note
    content: See ch. 5:11
  - type: text
    content: 'I will not spare; '
  - type: note
    content: '[Num. 23:19; 1 Sam. 15:29]'
  - type: text
    content: 'I will not relent; '
  - type: note
    content: '[ch. 20:43; 23:45]'
  - type: text
    content: 'according to your ways and your deeds you will be judged, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  - type: heading
    content: Ezekiel’s Wife Dies
  '15':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '16':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, behold, I am about to take the delight of your eyes away from you at a stroke; yet you shall not mourn or weep, nor shall your tears run down. '
  '17':
  - type: text
    content: 'Sigh, but not aloud; make no mourning for the dead. '
  - type: note
    content: See Lev. 10:6
  - type: text
    content: 'Bind on your turban, and '
  - type: note
    content: '[2 Sam. 15:30; Isa. 20:2]'
  - type: text
    content: 'put your shoes on your feet; do not cover your lips, '
  - type: note
    content: Hos. 9:4; See Jer. 16:5-7
  - type: text
    content: 'nor eat the bread of men.” '
  '18':
  - type: text
    content: 'So I spoke to the people in the morning, and '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: 'at evening my wife died. And on the next morning I did '
  - type: note
    content: ch. 12:7; 37:7
  - type: text
    content: as I was commanded.
  '19':
  - type: text
    content: 'And '
  - type: note
    content: See ch. 12:9
  - type: text
    content: 'the people said to me, “Will you not tell us what these things mean for us, that you are acting thus?” '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, write down the name of this day, this very day. The king of Babylon has laid siege to Jerusalem this very day. '
  '20':
  - type: text
    content: 'Then I said to them, “The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '21':
  - type: text
    content: '‘Say to the house of Israel, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[Jer. 7:14]; See ch. 7:21'
  - type: text
    content: 'Behold, I will profane my sanctuary, the pride of your power, the delight of your eyes, and the yearning of your soul, and '
  - type: note
    content: ch. 23:47; See 2 Chr. 36:17
  - type: text
    content: 'your sons and your daughters whom you left behind shall fall by the sword. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: '[ver. 17; ch. 12:11]'
  - type: text
    content: 'you shall do as I have done; '
  - type: note
    content: '[ver. 17; ch. 12:11]'
  - type: text
    content: 'you shall not cover your lips, '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'nor eat the bread of men. '
  '23':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'Your turbans shall be on your heads and your shoes on your feet; you shall not mourn or weep, but '
  - type: note
    content: See ch. 4:17
  - type: text
    content: 'you shall rot away in your iniquities and groan to one another. '
  '24':
  - type: text
    content: 'Thus shall Ezekiel be to you '
  - type: note
    content: ver. 27; See ch. 4:3
  - type: text
    content: 'a sign; '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'according to all that he has done you shall do. When this comes, then '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'you will know that I am the Lord '
  - type: text
    content: God
  - type: text
    content: .’
  '25':
  - type: text
    content: '“As for you, '
  - type: note
    content: See ch. 2:1
  - type: text
    content: 'son of man, surely on the day when I take from them '
  - type: note
    content: '[ver. 21]'
  - type: text
    content: 'their stronghold, their joy and glory, the delight of their eyes and their soul’s desire, and also their sons and daughters, '
  '26':
  - type: note
    content: See ch. 33:21, 22
  - type: text
    content: 'on that day a fugitive will come to you to report to you the news. '
  '27':
  - type: text
    content: 'On that day your mouth '
  - type: note
    content: ch. 29:21; [ch. 3:26, 27]
  - type: text
    content: 'will be opened to the fugitive, and you shall speak and be no longer mute. '
  - type: note
    content: ver. 24; See ch. 4:3
  - type: text
    content: 'So you will be a sign to them, and '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 17:2; 20:49]'
  - type: text
    content: 'utter a parable to '
  - type: note
    content: See ch. 2:5
  - type: text
    content: 'the rebellious house and say to them, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: '“Set on '
  - type: note
    content: ch. 11:3, 7, 11; 2 Kgs. 4:38
  - type: text
    content: the pot, set it on;
  - type: text
    content: pour in water also;
  '4':
  - type: text
    content: put in it the pieces of meat,
  - type: text
    content: 'all the good pieces, '
  - type: note
    content: See 1 Sam. 9:24
  - type: text
    content: the thigh and the shoulder;
  - type: text
    content: fill it with choice bones.
  '5':
  - type: text
    content: Take the choicest one of the flock;
  - type: text
    content: pile the logs
  - type: note
    content: Compare verse 10; Hebrew the bones
  - type: text
    content: ' under it;'
  - type: text
    content: boil it well;
  - type: text
    content: seethe also its bones in it.
  '6':
  - type: text
    content: '“Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 22:2; [Nah. 3:1]
  - type: text
    content: 'Woe to the bloody city, to '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: the pot whose corrosion is in it, and whose corrosion has not gone out of it! Take out of it piece after piece, without making any choice.
  - type: note
    content: Hebrew no lot has fallen upon it
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For the blood she has shed is in her midst; she put it on '
  - type: note
    content: ch. 26:4, 14
  - type: text
    content: 'the bare rock; '
  - type: note
    content: '[Lev. 17:13; Deut. 12:16, 24]'
  - type: text
    content: 'she did not pour it out on the ground to cover it with dust. '
  '8':
  - type: text
    content: 'To rouse my wrath, to take vengeance, I have set on the bare rock the blood she has shed, that it may not be covered. '
  '9':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': Woe to the bloody city! '
  - type: note
    content: Isa. 30:33
  - type: text
    content: 'I also will make the pile great. '
