  - type: text
    content: 'or sun, for '
  - type: note
    content: Ps. 36:9; See ch. 21:11
  - type: text
    content: 'the Lord God will be their light, and '
  - type: note
    content: Dan. 7:18, 27; Rom. 5:17; 2 Tim. 2:12; See ch. 20:4
  - type: text
    content: they will reign forever and ever.
  - type: heading
    content: Jesus Is Coming
  '6':
  - type: text
    content: 'And he said to me, '
  - type: note
    content: See ch. 21:5
  - type: text
    content: '“These words are trustworthy and true. And the Lord, the God of '
  - type: note
