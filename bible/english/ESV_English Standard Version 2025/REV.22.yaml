  - type: note
    content: ch. 1:1
  - type: text
    content: has sent his angel to show his servants what must soon take place.”
  '7':
  - type: text
    content: ' '
  - type: text
    content: '“And behold, '
  - type: note
    content: ver. 12, 20 ; ch. 3:11
  - type: text
    content: 'I am coming soon. '
  - type: note
    content: ch. 1:3
  - type: text
    content: Blessed is the one who keeps the words of the prophecy of this book.”
  '8':
  - type: text
    content: 'I, '
  - type: note
    content: ch. 1:1, 4, 9
  - type: text
    content: 'John, am the one who heard and saw these things. And when I heard and saw them, '
  - type: note
    content: ch. 19:10
  - type: text
    content: 'I fell down to worship at the feet of the angel who showed them to me, '
  '9':
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: 'but he said to me, “You must not do that! I am a fellow servant with you and your brothers the prophets, and with those '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: who keep the words of this book. Worship God.”
