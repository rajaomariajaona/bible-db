document_id: ROM.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Righteousness Upheld
  - type: text
    content: 'Then what advantage has the Jew? Or what is the value of circumcision? '
  '10':
  - type: text
    content: 'as it is written:'
  - type: note
    content: ver. 10-12, cited from Ps. 14:1-3; 53:1-3
  - type: text
    content: “None is righteous, no, not one;
  '11':
  - type: text
    content: no one understands;
  - type: text
    content: no one seeks for God.
  '12':
  - type: text
    content: All have turned aside; together they have become worthless;
  - type: text
    content: no one does good,
  - type: text
    content: not even one.”
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cited from Ps. 5:9
  - type: text
    content: '“Their throat is '
  - type: note
    content: Jer. 5:16
  - type: text
    content: an open grave;
  - type: text
    content: they use their tongues to deceive.”
  - type: note
    content: Cited from Ps. 140:3
  - type: text
    content: “The venom of asps is under their lips.”
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cited from Ps. 10:7 (Gk.)
  - type: text
    content: “Their mouth is full of curses and bitterness.”
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cited from Prov. 1:16; ver. 15-17, cited from Isa. 59:7, 8
  - type: text
    content: “Their feet are swift to shed blood;
  '16':
  - type: text
    content: in their paths are ruin and misery,
  '17':
  - type: text
    content: 'and '
  - type: note
    content: Luke 1:79
  - type: text
    content: the way of peace they have not known.”
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cited from Ps. 36:1
  - type: text
    content: “There is no fear of God before their eyes.”
  '19':
  - type: text
    content: 'Now we know that whatever '
  - type: note
    content: John 10:34; 15:25
  - type: text
    content: 'the law says it speaks to those who are under the law, '
  - type: note
    content: Job 5:16; Ps. 63:11; 107:42; Ezek. 16:63; [ch. 1:20; 2:1]
  - type: text
    content: 'so that every mouth may be stopped, and '
  - type: note
    content: See ver. 9
  - type: text
    content: 'the whole world may be held accountable to God. '
  '2':
  - type: text
    content: 'Much in every way. To begin with, '
  - type: note
    content: Deut. 4:8; Ps. 147:19, 20; See John 4:22
  - type: text
    content: 'the Jews were entrusted with '
  - type: note
    content: See Acts 7:38
  - type: text
    content: 'the oracles of God. '
  '20':
  - type: text
    content: 'For '
  - type: note
    content: Gal. 2:16; [Ps. 143:2; Acts 13:39]
  - type: text
    content: by works of the law no human being
  - type: note
    content: Greek flesh
  - type: text
    content: ' will be justified in his sight, since '
  - type: note
    content: ch. 7:7; [ch. 4:15; 5:13, 20]
  - type: text
    content: through the law comes knowledge of sin.
  - type: heading
    content: The Righteousness of God Through Faith
  '21':
  - type: text
    content: 'But now '
  - type: note
    content: See ch. 1:17
  - type: text
    content: 'the righteousness of God '
  - type: note
    content: ch. 16:26; 2 Tim. 1:10
  - type: text
    content: 'has been manifested apart from the law, although '
  - type: note
    content: Acts 10:43; [ch. 1:2; John 5:46]
  - type: text
    content: 'the Law and the Prophets bear witness to it— '
  '22':
  - type: text
    content: 'the righteousness of God '
  - type: note
    content: ch. 4:5; [2 Tim. 3:15]
  - type: text
    content: 'through faith in Jesus Christ for all who believe. '
  - type: note
    content: ch. 10:12; [Gal. 3:28; Col. 3:11]
  - type: text
    content: 'For there is no distinction: '
  '23':
  - type: text
    content: 'for '
  - type: note
    content: See ver. 9
  - type: text
    content: 'all have sinned and fall short of the glory of God, '
  '24':
  - type: note
    content: Titus 3:7
  - type: text
    content: 'and are justified '
  - type: note
    content: ch. 4:4, 5, 16; See Acts 15:11
  - type: text
    content: 'by his grace as a gift, '
  - type: note
    content: Eph. 1:7; Col. 1:14; Heb. 9:15; [1 Cor. 1:30]
  - type: text
    content: 'through the redemption that is in Christ Jesus, '
  '25':
  - type: text
    content: 'whom God '
  - type: note
    content: Eph. 1:9
  - type: text
    content: 'put forward as '
  - type: note
    content: See 1 John 2:2
  - type: text
    content: 'a propitiation '
  - type: note
    content: ch. 5:9; Eph. 2:13
  - type: text
    content: 'by his blood, to be received by faith. This was to show God’s righteousness, because in '
  - type: note
    content: ch. 2:4
  - type: text
    content: 'his divine forbearance he had passed over '
  - type: note
    content: '[Acts 17:30]'
  - type: text
    content: 'former sins. '
  '26':
  - type: text
    content: It was to show his righteousness at the present time, so that he might be just and the justifier of the one who has faith in Jesus.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ch. 2:17, 23; 4:2; 1 Cor. 1:29-31; Eph. 2:9; 2 Tim. 1:9; See Acts 13:39
  - type: text
    content: 'Then what becomes of our boasting? It is excluded. By what kind of law? By a law of works? No, but by the law of faith. '
  '28':
  - type: text
    content: 'For we hold that one is justified by faith '
  - type: note
    content: See James 2:18
  - type: text
    content: 'apart from works of the law. '
  '29':
  - type: text
    content: 'Or '
  - type: note
    content: ch. 9:24; 10:12; 15:9
  - type: text
    content: 'is God the God of Jews only? Is he not the God of Gentiles also? Yes, of Gentiles also, '
  '3':
  - type: note
    content: ch. 10:16; Heb. 4:2
  - type: text
    content: 'What if some were unfaithful? '
  - type: note
    content: '[ch. 9:6; 2 Tim. 2:13]'
  - type: text
    content: 'Does their faithlessness nullify the faithfulness of God? '
  '30':
  - type: text
    content: 'since '
  - type: note
    content: Gal. 3:20; [ch. 10:12]
  - type: text
    content: 'God is one—who will justify the circumcised by faith and '
  - type: note
    content: Gal. 3:8; [ch. 4:9]; See ch. 2:26
  - type: text
    content: 'the uncircumcised through faith. '
  '31':
  - type: text
    content: Do we then overthrow the law by this faith? By no means! On the contrary, we uphold the law.
  '4':
  - type: text
    content: 'By no means! '
  - type: note
    content: See John 8:26
  - type: text
    content: 'Let God be true though '
  - type: note
    content: Ps. 62:9; 116:11; [ver. 7]
  - type: text
    content: every one were a liar, as it is written,
  - type: note
    content: Cited from Ps. 51:4 (Gk.)
  - type: text
    content: “That you may be justified in your words,
  - type: text
    content: 'and prevail when you '
  - type: note
    content: '[Job 9:32]'
  - type: text
    content: are judged.”
  '5':
  - type: text
    content: 'But if our unrighteousness serves to show the righteousness of God, what shall we say? That God is unrighteous to inflict '
  - type: note
    content: '[ch. 2:5]'
  - type: text
    content: wrath on us? (
  - type: note
    content: ch. 6:19; 1 Cor. 9:8; Gal. 3:15; [1 Cor. 15:32]
  - type: text
    content: 'I speak in a human way.) '
  '6':
  - type: text
    content: 'By no means! For then how could '
  - type: note
    content: '[Gen. 18:25; Job 8:3]; See ch. 2:16'
  - type: text
    content: 'God judge the world? '
  '7':
  - type: text
    content: 'But if through my lie God’s truth abounds to his glory, '
  - type: note
    content: '[ch. 9:19]'
  - type: text
    content: 'why am I still being condemned as a sinner? '
  '8':
  - type: text
    content: 'And why not '
  - type: note
    content: '[ch. 6:1, 15]'
  - type: text
    content: do evil that good may come?—as some people slanderously charge us with saying. Their condemnation is just.
  - type: heading
    content: No One Is Righteous
  '9':
  - type: text
    content: What then? Are we Jews
  - type: note
    content: Greek Are we
  - type: text
    content: ' any better off?'
  - type: note
    content: Or at any disadvantage?
  - type: text
    content: ' No, not at all. For we have already charged that all, both '
  - type: note
    content: ch. 2:1-29
  - type: text
    content: 'Jews and '
  - type: note
    content: ch. 1:18-32
  - type: text
    content: 'Greeks, are '
  - type: note
    content: Gal. 3:22; [ver. 19, 23; ch. 11:32; Prov. 20:9]
  - type: text
    content: 'under sin, '
