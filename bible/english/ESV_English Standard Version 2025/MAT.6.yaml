document_id: MAT.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Giving to the Needy
  - type: text
    content: ' '
  - type: text
    content: '“Beware of '
  - type: note
    content: 1 John 2:29
  - type: text
    content: 'practicing your righteousness before other people in order '
  - type: note
    content: ver. 16 ; ch. 23:5
  - type: text
    content: to be seen by them, for then you will have no reward from your Father who is in heaven.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 3:2; 4:17 ]'
  - type: text
    content: Your kingdom come,
  - type: note
    content: ch. 26:42; Luke 22:42; Acts 21:14; [ch. 12:50; Heb. 13:21 ]
  - type: text
    content: your will be done,
  - type: note
    content: Or Let your kingdom come, let your will be done
  - type: note
    content: Ps. 103:20, 21; Dan. 4:35
  - type: text
    content: on earth as it is in heaven.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Prov. 30:8
  - type: text
    content: 'Give us '
  - type: note
    content: '[ver. 34 ]'
  - type: text
    content: this day our daily bread,
  - type: note
    content: Or our bread for tomorrow
  '12':
  - type: text
    content: ' '
  - type: text
    content: and forgive us our debts,
  - type: text
    content: as we also have forgiven our debtors.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'And '
  - type: note
    content: ch. 26:41; Mark 14:38; Luke 22:40, 46; [ 1 Cor. 10:13 ]
  - type: text
    content: lead us not into temptation,
  - type: text
    content: 'but '
  - type: note
    content: John 17:15; 2 Thess. 3:3; [ 2 Tim. 4:18 ]
  - type: text
    content: 'deliver us from '
  - type: note
    content: See ch. 13:19
  - type: text
    content: evil.
  - type: note
    content: Or the evil one ; some manuscripts add For yours is the kingdom and the power and the glory, forever. Amen
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mark 11:25; Luke 6:37; Eph. 4:32; Col. 3:13
  - type: text
    content: For if you forgive others their trespasses, your heavenly Father will also forgive you,
  - type: text
    content: ' '
  '15':
  - type: note
    content: ch. 18:35; See James 2:13
  - type: text
    content: but if you do not forgive others their trespasses, neither will your Father forgive your trespasses.
  - type: heading
    content: Fasting
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“And '
  - type: note
    content: Isa. 58:5
  - type: text
    content: 'when you fast, do not look gloomy like the hypocrites, for they disfigure their faces that their fasting may be seen by others. '
  - type: note
    content: ver. 2, 5
  - type: text
    content: Truly, I say to you, they have received their reward.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'But when you fast, '
  - type: note
    content: Ruth 3:3; 2 Sam. 12:20
  - type: text
    content: anoint your head and wash your face,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'that your fasting may not be seen by others but by your Father who is in secret. '
  - type: note
    content: ver. 4, 6
  - type: text
    content: And your Father who sees in secret will reward you.
  - type: heading
    content: Lay Up Treasures in Heaven
  '19':
  - type: text
    content: ' '
  - type: note
    content: ch. 19:21; Luke 12:21, 33, 34; 18:22; 1 Tim. 6:9, 10, 17-19; Heb. 13:5
  - type: text
    content: '“Do not lay up for yourselves treasures on earth, where '
  - type: note
    content: James 5:2, 3
  - type: text
    content: moth and rust
  - type: text
    content: ' '
  - type: note
    content: Or worm ; also verse 20
  - type: text
    content: 'destroy and where thieves '
  - type: note
    content: ch. 24:43
  - type: text
    content: break in and steal,
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ 1 Cor. 13:3 ]'
  - type: text
    content: '“Thus, when you give to the needy, sound no trumpet before you, as the hypocrites do in the synagogues and in the streets, that they may '
  - type: note
    content: John 5:44
  - type: text
    content: 'be praised by others. Truly, I say to you, they have '
  - type: note
    content: Luke 6:24
  - type: text
    content: received their reward.
  - type: text
    content: ' '
  '20':
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: but lay up for yourselves treasures in heaven, where neither moth nor rust destroys and where thieves do not break in and steal.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For where your treasure is, there your heart will be also.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Luke 11:34, 35
  - type: text
    content: “The eye is the lamp of the body. So, if your eye is healthy, your whole body will be full of light,
  - type: text
    content: ' '
  '23':
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: 'but if '
  - type: note
    content: ch. 20:15; Deut. 15:9; Prov. 28:22
  - type: text
    content: your eye is bad, your whole body will be full of darkness. If then the light in you is darkness, how great is the darkness!
  '24':
  - type: text
    content: ' '
  - type: note
    content: Luke 16:13; [ Rom. 6:16; James 4:4 ]
  - type: text
    content: '“No one can serve two masters, for either he will hate the one and love the other, or he will be devoted to the one and despise the other. You cannot serve God and '
  - type: note
    content: Luke 16:9, 11, 13
  - type: text
    content: money.
  - type: note
    content: Greek mammon , a Semitic word for money or possessions
  - type: heading
    content: Do Not Be Anxious
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-33, see Luke 12:22-31
  - type: text
    content: '“Therefore I tell you, '
  - type: note
    content: ver. 27, 28, 31, 34 ; ch. 10:19; 13:22 (Gk.); 1 Cor. 7:32 (Gk.); Phil. 4:6; 1 Pet. 5:7
  - type: text
    content: do not be anxious about your life, what you will eat or what you will drink, nor about your body, what you will put on. Is not life more than food, and the body more than clothing?
  - type: text
    content: ' '
  '26':
  - type: note
    content: '[Job 38:41; Ps. 147:9]'
  - type: text
    content: 'Look at the birds of the air: they neither sow nor reap nor gather into barns, and yet your heavenly Father feeds them. '
  - type: note
    content: ch. 10:31
  - type: text
    content: Are you not of more value than they?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And which of you by being anxious can add a single hour to his '
  - type: note
    content: Luke 2:52
  - type: text
    content: span of life?
  - type: note
    content: Or a single cubit to his stature; a cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'And why are you anxious about clothing? Consider the lilies of the field, how they grow: they neither toil nor spin,'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'yet I tell you, '
  - type: note
    content: 1 Kgs. 10:4-7
  - type: text
    content: even Solomon in all his glory was not arrayed like one of these.
  - type: text
    content: ' '
  '3':
  - type: text
    content: But when you give to the needy, do not let your left hand know what your right hand is doing,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'But if God so clothes the grass of the field, which today is alive and tomorrow is thrown into the oven, will he not much more clothe you, '
  - type: note
    content: ch. 8:26; 14:31; 16:8; [ch. 17:20]
  - type: text
    content: O you of little faith?
  - type: text
    content: ' '
  '31':
  - type: text
    content: Therefore do not be anxious, saying, ‘What shall we eat?’ or ‘What shall we drink?’ or ‘What shall we wear?’
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For '
  - type: note
    content: ver. 7
  - type: text
    content: 'the Gentiles seek after all these things, and '
  - type: note
    content: ver. 8
  - type: text
    content: your heavenly Father knows that you need them all.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But '
  - type: note
    content: '[ch. 5:6, 20]'
  - type: text
    content: 'seek first '
  - type: note
    content: ver. 10
  - type: text
    content: 'the kingdom of God and his righteousness, '
  - type: note
    content: '[1 Kgs. 3:11-14; Mark 10:29, 30; 1 Tim. 4:8; 1 Pet. 3:9]'
  - type: text
    content: and all these things will be added to you.
  '34':
  - type: text
    content: ' '
  - type: note
    content: '[ James 4:13, 14 ]'
  - type: text
    content: “Therefore do not be anxious about tomorrow, for tomorrow will be anxious for itself. Sufficient for the day is its own trouble.
  '4':
  - type: text
    content: 'so that your giving may be in secret. '
  - type: note
    content: ver. 6, 18
  - type: text
    content: And your Father who sees in secret will reward you.
  - type: heading
    content: The Lord’s Prayer
  '5':
  - type: text
    content: ' '
  - type: text
    content: '“And when you pray, you must not be like the hypocrites. For they love '
  - type: note
    content: Mark 11:25; Luke 18:11
  - type: text
    content: 'to stand and pray in the synagogues and at the street corners, that they may be seen by others. '
  - type: note
    content: ver. 2, 16
  - type: text
    content: Truly, I say to you, they have received their reward.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But when you pray, '
  - type: note
    content: 2 Kgs. 4:33; Isa. 26:20
  - type: text
    content: 'go into your room and shut the door and pray to your Father who is in secret. '
  - type: note
    content: ver. 4, 18
  - type: text
    content: And your Father who sees in secret will reward you.
  '7':
  - type: text
    content: ' '
  - type: text
    content: '“And when you pray, do not heap up empty phrases as '
  - type: note
    content: ver. 32 ; ch. 5:47
  - type: text
    content: 'the Gentiles do, for '
  - type: note
    content: 1 Kgs. 18:26
  - type: text
    content: 'they think that they will be heard '
  - type: note
    content: Prov. 10:19; Eccles. 5:2
  - type: text
    content: for their many words.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Do not be like them, '
  - type: note
    content: ver. 32
  - type: text
    content: for your Father knows what you need before you ask him.
  - type: text
    content: ' '
  '9':
  - type: note
    content: For ver. 9-13, [Luke 11:2-4]
  - type: text
    content: 'Pray then like this:'
  - type: note
    content: ver. 1
  - type: text
    content: “Our Father in heaven,
  - type: note
    content: Isa. 29:23; [ Luke 1:49; 1 Pet. 3:15 ]
  - type: text
    content: 'hallowed be '
  - type: note
    content: John 17:6
  - type: text
    content: your name.
  - type: note
    content: Or Let your name be kept holy , or Let your name be treated with reverence
