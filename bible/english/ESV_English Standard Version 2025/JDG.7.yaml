        children:
        - type: text
          text: Zeredah
      marker-yv: yv-n
    - type: text
      text: ' as far as the border of Abel-meholah, by Tabbath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the men of Israel were called out from Naphtali and from Asher and from all Manasseh, and they pursued after Midian.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:35
      marker-yv: yv-n
    - type: text
      text: 'Gideon sent messengers throughout '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:33
      marker-yv: yv-n
    - type: text
      text: 'all the hill country of Ephraim, saying, “Come down against the Midianites and capture the waters against them, as far as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Beth-barah, and also the Jordan.” So all the men of Ephraim were called out, and they captured the waters as far as Beth-barah, and also the Jordan. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they captured '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 83:11
      marker-yv: yv-n
    - type: text
      text: 'the two princes of Midian, Oreb and Zeeb. They killed Oreb '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 10:26
      marker-yv: yv-n
    - type: text
      text: 'at the rock of Oreb, and Zeeb they killed at the winepress of Zeeb. Then they pursued Midian, and they brought the heads of Oreb and Zeeb to Gideon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:4
      marker-yv: yv-n
    - type: text
