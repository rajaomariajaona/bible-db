      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Then he went down with Purah his servant to the outposts of the armed men who were in the camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Midianites and the Amalekites and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:3
      marker-yv: yv-n
    - type: text
      text: 'all the people of the East lay along the valley like locusts in abundance, and their camels were without number, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 11:4
      marker-yv: yv-n
    - type: text
      text: 'as the sand that is on the seashore in abundance. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Gideon came, behold, a man was telling a dream to his comrade. And he said, “Behold, I dreamed a dream, and behold, a cake of barley bread tumbled into the camp of Midian and came to the tent and struck it so that it fell and turned it upside down, so that the tent lay flat.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And his comrade answered, “This is no other than the sword of Gideon the son of Joash, a man of Israel; God has given into his hand Midian and all the camp.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as Gideon heard the telling of the dream and its interpretation, he worshiped. And he returned to the camp of Israel and said, “Arise, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given the host of Midian into your hand.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he divided the 300 men into three companies and put trumpets into the hands of all of them and empty jars, with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 15:17
      marker-yv: yv-n
    - type: text
      text: 'torches inside the jars. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to them, “Look at me, and do likewise. When I come to the outskirts of the camp, do as I do. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I blow the trumpet, I and all who are with me, then blow the trumpets also on every side of all the camp and shout, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 14:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 20:17
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '‘For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and for Gideon.’”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gideon Defeats Midian
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Gideon and the hundred men who were with him came to the outskirts of the camp at the beginning of the middle watch, when they had just set the watch. And they blew the trumpets and smashed the jars that were in their hands. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Gideon, “The people with you are too many for me to give the Midianites into their hand, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 8:17
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 10:13
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'lest Israel boast over me, saying, ‘My own hand has saved me.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the three companies blew the trumpets and broke the jars. They held in their left hands the torches, and in their right hands the trumpets to blow. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
