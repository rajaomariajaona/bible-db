  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore proclaim in the ears of the people, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 20:8
      marker-yv: yv-n
    - type: text
      text: ‘Whoever is fearful and trembling, let him return home and hurry away from Mount Gilead.’” Then 22,000 of the people returned, and 10,000 remained.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Gideon, “The people are still too many. Take them down to the water, and I will test them for you there, and anyone of whom I say to you, ‘This one shall go with you,’ shall go with you, and anyone of whom I say to you, ‘This one shall not go with you,’ shall not go.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he brought the people down to the water. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Gideon, “Every one who laps the water with his tongue, as a dog laps, you shall set by himself. Likewise, every one who kneels down to drink.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the number of those who lapped, putting their hands to their mouths, was 300 men, but all the rest of the people knelt down to drink water. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Gideon, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Sam. 14:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 14:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '“With the 300 men who lapped I will save you and give the Midianites into your hand, and let all the others go every man to his home.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people took provisions in their hands, and their trumpets. And he sent all the rest of Israel every man to his tent, but retained the 300 men. And the camp of Midian was below him '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      marker-yv: yv-n
    - type: text
      text: in the valley.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That same '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
