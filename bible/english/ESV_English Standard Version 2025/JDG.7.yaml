document_id: JDG.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Gideon’s Three Hundred Men
  - type: text
    content: 'Then '
  - type: note
    content: ch. 6:32
  - type: text
    content: 'Jerubbaal (that is, Gideon) and all the people who were with him rose early and encamped beside '
  - type: note
    content: '[1 Sam. 29:1]'
  - type: text
    content: 'the spring of Harod. And the camp of Midian was north of them, '
  - type: note
    content: Gen. 12:6; Deut. 11:30
  - type: text
    content: by the hill of Moreh, in the valley.
  '10':
  - type: text
    content: 'But if you are afraid to go down, go down to the camp with Purah your servant. '
  '11':
  - type: note
    content: See ver. 13-15
  - type: text
    content: 'And you shall hear what they say, and afterward your hands shall be strengthened to go down against the camp.” '
  - type: note
    content: '[1 Sam. 14:9, 10]'
  - type: text
    content: 'Then he went down with Purah his servant to the outposts of the armed men who were in the camp. '
  '12':
  - type: text
    content: 'And the Midianites and the Amalekites and '
  - type: note
    content: See ch. 6:3
  - type: text
    content: 'all the people of the East lay along the valley like locusts in abundance, and their camels were without number, '
  - type: note
    content: Josh. 11:4
  - type: text
    content: 'as the sand that is on the seashore in abundance. '
  '13':
  - type: text
    content: 'When Gideon came, behold, a man was telling a dream to his comrade. And he said, “Behold, I dreamed a dream, and behold, a cake of barley bread tumbled into the camp of Midian and came to the tent and struck it so that it fell and turned it upside down, so that the tent lay flat.” '
  '14':
  - type: text
    content: And his comrade answered, “This is no other than the sword of Gideon the son of Joash, a man of Israel; God has given into his hand Midian and all the camp.”
  '15':
  - type: text
    content: 'As soon as Gideon heard the telling of the dream and its interpretation, he worshiped. And he returned to the camp of Israel and said, “Arise, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given the host of Midian into your hand.” '
  '16':
  - type: text
    content: 'And he divided the 300 men into three companies and put trumpets into the hands of all of them and empty jars, with '
  - type: note
    content: ch. 15:4; Gen. 15:17
  - type: text
    content: 'torches inside the jars. '
  '17':
  - type: text
    content: 'And he said to them, “Look at me, and do likewise. When I come to the outskirts of the camp, do as I do. '
  '18':
  - type: text
    content: 'When I blow the trumpet, I and all who are with me, then blow the trumpets also on every side of all the camp and shout, '
  - type: note
    content: '[Ex. 14:13, 14; 2 Chr. 20:17]'
  - type: text
    content: '‘For the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon.’”'
  - type: heading
    content: Gideon Defeats Midian
  '19':
  - type: text
    content: 'So Gideon and the hundred men who were with him came to the outskirts of the camp at the beginning of the middle watch, when they had just set the watch. And they blew the trumpets and smashed the jars that were in their hands. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “The people with you are too many for me to give the Midianites into their hand, '
  - type: note
    content: Deut. 8:17; [Isa. 10:13]
  - type: text
    content: 'lest Israel boast over me, saying, ‘My own hand has saved me.’ '
  '20':
  - type: text
    content: 'Then the three companies blew the trumpets and broke the jars. They held in their left hands the torches, and in their right hands the trumpets to blow. '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: 'And they cried out, “A sword for the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon!” '
  '21':
  - type: text
    content: 'Every man stood in his place around the camp, '
  - type: note
    content: '[2 Kgs. 7:7]'
  - type: text
    content: 'and all the army ran. They cried out and fled. '
  '22':
  - type: note
    content: '[Josh. 6:4, 16, 20]'
  - type: text
    content: 'When they blew the 300 trumpets, '
  - type: note
    content: '[Ps. 83:9; Isa. 9:4]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' set '
  - type: note
    content: 1 Sam. 14:20; [2 Chr. 20:23]
  - type: text
    content: every man’s sword against his comrade and against all the army. And the army fled as far as Beth-shittah toward Zererah,
  - type: note
    content: Some Hebrew manuscripts Zeredah
  - type: text
    content: ' as far as the border of Abel-meholah, by Tabbath. '
  '23':
  - type: text
    content: And the men of Israel were called out from Naphtali and from Asher and from all Manasseh, and they pursued after Midian.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 6:35
  - type: text
    content: 'Gideon sent messengers throughout '
  - type: note
    content: See Josh. 24:33
  - type: text
    content: 'all the hill country of Ephraim, saying, “Come down against the Midianites and capture the waters against them, as far as '
  - type: note
    content: '[ch. 3:28]'
  - type: text
    content: 'Beth-barah, and also the Jordan.” So all the men of Ephraim were called out, and they captured the waters as far as Beth-barah, and also the Jordan. '
  '25':
  - type: text
    content: 'And they captured '
  - type: note
    content: ch. 8:3; Ps. 83:11
  - type: text
    content: 'the two princes of Midian, Oreb and Zeeb. They killed Oreb '
  - type: note
    content: Isa. 10:26
  - type: text
    content: 'at the rock of Oreb, and Zeeb they killed at the winepress of Zeeb. Then they pursued Midian, and they brought the heads of Oreb and Zeeb to Gideon '
  - type: note
    content: ch. 8:4
  - type: text
    content: across the Jordan.
  '3':
  - type: text
    content: 'Now therefore proclaim in the ears of the people, saying, '
  - type: note
    content: Deut. 20:8
  - type: text
    content: ‘Whoever is fearful and trembling, let him return home and hurry away from Mount Gilead.’” Then 22,000 of the people returned, and 10,000 remained.
  '4':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “The people are still too many. Take them down to the water, and I will test them for you there, and anyone of whom I say to you, ‘This one shall go with you,’ shall go with you, and anyone of whom I say to you, ‘This one shall not go with you,’ shall not go.” '
  '5':
  - type: text
    content: 'So he brought the people down to the water. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “Every one who laps the water with his tongue, as a dog laps, you shall set by himself. Likewise, every one who kneels down to drink.” '
  '6':
  - type: text
    content: 'And the number of those who lapped, putting their hands to their mouths, was 300 men, but all the rest of the people knelt down to drink water. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, '
  - type: note
    content: '[1 Sam. 14:6; 2 Chr. 14:11]'
  - type: text
    content: '“With the 300 men who lapped I will save you and give the Midianites into your hand, and let all the others go every man to his home.” '
  '8':
  - type: text
    content: 'So the people took provisions in their hands, and their trumpets. And he sent all the rest of Israel every man to his tent, but retained the 300 men. And the camp of Midian was below him '
  - type: note
    content: ver. 1
  - type: text
    content: in the valley.
  '9':
  - type: text
    content: 'That same '
  - type: note
    content: Gen. 46:2, 3; 1 Kgs. 3:5
  - type: text
    content: 'night the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Arise, go down against the camp, '
  - type: note
    content: See ch. 3:28
  - type: text
    content: 'for I have given it into your hand. '
