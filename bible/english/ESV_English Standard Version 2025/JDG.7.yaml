        children:
        - type: text
          text: 13-15
      marker-yv: yv-n
    - type: text
      text: 'And you shall hear what they say, and afterward your hands shall be strengthened to go down against the camp.” '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
