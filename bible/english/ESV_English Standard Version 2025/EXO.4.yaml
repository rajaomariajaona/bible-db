document_id: EXO.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Given Powerful Signs
  - type: text
    content: 'Then Moses answered, “But behold, they will not believe me or listen to my voice, for they will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' did not appear to you.’” '
  '10':
  - type: text
    content: 'But Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Oh, my Lord, I am not eloquent, either in the past or since you have spoken to your servant, but '
  - type: note
    content: '[ch. 6:12; Jer. 1:6]'
  - type: text
    content: 'I am slow of speech and of tongue.” '
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Who has made man’s mouth? Who makes him mute, or deaf, or seeing, or blind? Is it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  '12':
  - type: text
    content: 'Now therefore go, and '
  - type: note
    content: '[ch. 3:12; Isa. 50:4; Jer. 1:9; Ezek. 33:22; Matt. 10:19, 20; Mark 13:11; Luke 12:11, 12; 21:15]'
  - type: text
    content: 'I will be with your mouth and teach you what you shall speak.” '
  '13':
  - type: text
    content: 'But he said, “Oh, my Lord, please send someone else.” '
  '14':
  - type: text
    content: 'Then the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' was kindled against Moses and he said, “Is there not Aaron, your brother, the Levite? I know that he can speak well. Behold, '
  - type: note
    content: ver. 27
  - type: text
    content: 'he is coming out to meet you, and when he sees you, he will be glad in his heart. '
  '15':
  - type: note
    content: ch. 7:1, 2
  - type: text
    content: 'You shall speak to him and '
  - type: note
    content: Num. 22:38; 23:5, 12, 16; Deut. 18:18; 2 Sam. 14:3, 19; Isa. 51:16
  - type: text
    content: 'put the words in his mouth, and '
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'I will be with your mouth and with his mouth and will teach you both what to do. '
  '16':
  - type: note
    content: ver. 30
  - type: text
    content: 'He shall speak for you to the people, and he shall be your mouth, and '
  - type: note
    content: '[ch. 7:1; 18:19]'
  - type: text
    content: 'you shall be as God to him. '
  '17':
  - type: text
    content: 'And take in your hand '
  - type: note
    content: ver. 2; ch. 7:15
  - type: text
    content: this staff, with which you shall do the signs.”
  - type: heading
    content: Moses Returns to Egypt
  '18':
  - type: text
    content: 'Moses went back to '
  - type: note
    content: '[ch. 2:18]'
  - type: text
    content: 'Jethro his father-in-law and said to him, “Please let me go back to my brothers in Egypt to see whether they are still alive.” And Jethro said to Moses, “Go in peace.” '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses in Midian, “Go back to Egypt, for '
  - type: note
    content: ch. 2:15, 23; [Matt. 2:20]
  - type: text
    content: 'all the men who were seeking your life are dead.” '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “What is that in your hand?” He said, '
  - type: note
    content: ver. 17, 20
  - type: text
    content: '“A staff.” '
  '20':
  - type: text
    content: 'So Moses took '
  - type: note
    content: ch. 18:2-4
  - type: text
    content: 'his wife and his sons and had them ride on a donkey, and went back to the land of Egypt. And Moses took '
  - type: note
    content: ch. 17:9; Num. 20:8, 9
  - type: text
    content: the staff of God in his hand.
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “When you go back to Egypt, see that you do before Pharaoh all the '
  - type: note
    content: ch. 3:20
  - type: text
    content: 'miracles that I have put in your power. But '
  - type: note
    content: ch. 7:13, 22; 8:15, 32; 9:12, 35; 10:1; 14:8; Rom. 9:17, 18; [Deut. 2:30; Josh. 11:20; Isa. 63:17]
  - type: text
    content: 'I will harden his heart, so that he will not let the people go. '
  '22':
  - type: text
    content: 'Then you shall say to Pharaoh, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Hos. 11:1
  - type: text
    content: 'Israel is my '
  - type: note
    content: Jer. 31:9
  - type: text
    content: 'firstborn son, '
  '23':
  - type: text
    content: 'and I say to you, “Let my son go that he may serve me.” If you refuse to let him go, behold, I '
  - type: note
    content: ch. 11:5; 12:29
  - type: text
    content: will kill your firstborn son.’”
  '24':
  - type: text
    content: 'At a lodging place on the way '
  - type: note
    content: '[Num. 22:22; 1 Chr. 21:16]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' met him and '
  - type: note
    content: '[Gen. 17:14]'
  - type: text
    content: 'sought to put him to death. '
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 2:21
  - type: text
    content: 'Zipporah took a '
  - type: note
    content: Josh. 5:2, 3
  - type: text
    content: flint and cut off her son’s foreskin and touched Moses’
  - type: note
    content: Hebrew his
  - type: text
    content: ' feet with it and said, “Surely you are a bridegroom of blood to me!” '
  '26':
  - type: text
    content: So he let him alone. It was then that she said, “A bridegroom of blood,” because of the circumcision.
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “Go into the wilderness '
  - type: note
    content: ver. 14
  - type: text
    content: 'to meet Moses.” So he went and met him at the '
  - type: note
    content: See ch. 3:1
  - type: text
    content: 'mountain of God and kissed him. '
  '28':
  - type: text
    content: 'And Moses '
  - type: note
    content: ver. 15, 16
  - type: text
    content: 'told Aaron all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' with which he had sent him to speak, and all '
  - type: note
    content: See ver. 3-9
  - type: text
    content: 'the signs that he had commanded him to do. '
  '29':
  - type: text
    content: 'Then Moses and Aaron '
  - type: note
    content: ch. 3:16
  - type: text
    content: 'went and gathered together all the elders of the people of Israel. '
  '3':
  - type: text
    content: 'And he said, “Throw it on the ground.” So he threw it on the ground, and it became a serpent, and Moses ran from it. '
  '30':
  - type: note
    content: ver. 16
  - type: text
    content: 'Aaron spoke all the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to Moses and did the signs in the sight of the people. '
  '31':
  - type: text
    content: 'And the people '
  - type: note
    content: ver. 8, 9; ch. 3:18
  - type: text
    content: 'believed; and when they heard that the '
  - type: text
    content: Lord
  - type: text
    content: ' had '
  - type: note
    content: See ch. 3:16
  - type: text
    content: 'visited the people of Israel and that he had '
  - type: note
    content: ch. 2:25; 3:7
  - type: text
    content: 'seen their affliction, '
  - type: note
    content: ch. 12:27; Gen. 24:26; 1 Chr. 29:20
  - type: text
    content: they bowed their heads and worshiped.
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Put out your hand and catch it by the tail”—so he put out his hand and caught it, and it became a staff in his hand— '
  '5':
  - type: text
    content: '“that they may '
  - type: note
    content: ch. 19:9
  - type: text
    content: 'believe that the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: See ch. 3:6
  - type: text
    content: 'the God of their fathers, the God of Abraham, the God of Isaac, and the God of Jacob, has appeared to you.” '
  '6':
  - type: text
    content: 'Again, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Put your hand inside your cloak.”'
  - type: note
    content: Hebrew into your bosom; also verse 7
  - type: text
    content: ' And he put his hand inside his cloak, and when he took it out, behold, his hand was '
  - type: note
    content: Num. 12:10; 2 Kgs. 5:27
  - type: text
    content: leprous
  - type: note
    content: Leprosy was a term for several skin diseases; see Leviticus 13
  - type: text
    content: ' like snow. '
  '7':
  - type: text
    content: 'Then God said, “Put your hand back inside your cloak.” So he put his hand back inside his cloak, and when he took it out, behold, '
  - type: note
    content: '[2 Kgs. 5:14]'
  - type: text
    content: 'it was restored like the rest of his flesh. '
  '8':
  - type: text
    content: '“If they will not believe you,” God said, “or listen to the first sign, they may believe the latter sign. '
  '9':
  - type: text
    content: 'If they will not believe even these two signs or listen to your voice, you shall take some water from the Nile and pour it on the dry ground, and the water that you shall take from the Nile '
  - type: note
    content: ch. 7:19
  - type: text
    content: will become blood on the dry ground.”
