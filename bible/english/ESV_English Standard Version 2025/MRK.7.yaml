  - type: text
    content: '“Hear me, all of you, and understand:'
  - type: text
    content: ' '
  '15':
  - type: note
    content: See Acts 10:14, 15
  - type: text
    content: There is nothing outside a person that by going into him can defile him, but the things that come out of a person are what defile him.”
  - type: note
    content: 'Some manuscripts add verse 16: If anyone has ears to hear, let him hear'
  - type: text
    content: ' '
  '17':
  - type: text
