  - type: heading
    content: The Syrophoenician Woman’s Faith
  '24':
  - type: text
    content: And from there he arose and went away to the region of Tyre and Sidon.
  - type: note
    content: Some manuscripts omit and Sidon
  - type: text
    content: ' And he entered a house and did not want anyone to know, yet he could not be hidden. '
  '25':
  - type: text
    content: 'But immediately a woman whose little daughter had an unclean spirit heard of him and came and fell down at his feet. '
  '26':
  - type: note
    content: '[John 12:20, 21]'
  - type: text
    content: 'Now the woman was a '
  - type: note
    content: '[1 Cor. 12:13]'
  - type: text
    content: 'Gentile, '
  - type: note
    content: '[Acts 21:2, 3]'
  - type: text
    content: 'a Syrophoenician by birth. And she begged him to cast the demon out of her daughter. '
  '27':
  - type: text
