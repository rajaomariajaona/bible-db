    content: the mouths of fools pour out folly.
  '20':
  - type: text
    content: ' '
  - type: note
    content: See ch. 29:3
  - type: text
    content: A wise son makes a glad father,
  - type: text
    content: but a foolish man despises his mother.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:23
  - type: text
    content: Folly is a joy to him who lacks sense,
  - type: text
    content: 'but a man of understanding '
  - type: note
    content: '[Eph. 5:15]'
  - type: text
    content: walks straight ahead.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:14; [ch. 20:18 ]
  - type: text
    content: Without counsel plans fail,
  - type: text
    content: but with many advisers they succeed.
  '23':
  - type: text
    content: To make an apt answer is a joy to a man,
  - type: text
    content: 'and '
  - type: note
    content: ch. 25:11; [Isa. 50:4]
  - type: text
    content: a word in season, how good it is!
  '24':
  - type: text
    content: 'The path of life leads upward '
  - type: note
