  - type: text
    content: ' '
  - type: note
    content: ch. 14:6; 19:24
  - type: text
    content: The heart of him who has understanding seeks knowledge,
  - type: text
    content: but the mouths of fools feed on folly.
  '15':
  - type: text
    content: All the days of the afflicted are evil,
  - type: text
    content: 'but '
