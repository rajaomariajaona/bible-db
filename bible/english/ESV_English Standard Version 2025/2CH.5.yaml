    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the house of God.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Solomon assembled the elders of Israel and all the heads of the tribes, the leaders of the fathers’ houses of the people of Israel, in Jerusalem, to bring up the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' out of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 6:12
      marker-yv: yv-n
    - type: text
      text: 'the city of David, which is Zion. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the men of Israel assembled before the king at the feast that is in the seventh month. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the elders of Israel came, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ver. 7; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and the Levites took up the ark. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought up the ark, the tent of meeting, and all the holy vessels that were in the tent; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:27
      marker-yv: yv-n
    - type: text
      text: 'the Levitical priests brought them up. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And King Solomon and all the congregation of Israel, who had assembled before him, were before the ark, sacrificing so many sheep and oxen that they could not be counted or numbered. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the priests brought the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to its place, in the inner sanctuary of the house, in the Most Holy Place, underneath the wings of the cherubim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cherubim spread out their wings over the place of the ark, so that the cherubim made a covering above the ark and its poles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the poles were so long that the ends of the poles were seen '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: from the Holy Place before the inner sanctuary, but they could not be seen from outside. And they are
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: it is
      marker-yv: yv-n
    - type: text
      text: ' there to this day. '
