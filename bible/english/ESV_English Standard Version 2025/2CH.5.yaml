      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 16:42
      marker-yv: yv-n
    - type: text
      text: 'with trumpets and cymbals and other musical instruments, in praise to the '
    - type: usfm
