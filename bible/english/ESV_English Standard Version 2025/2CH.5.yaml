  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and it was the duty of the trumpeters and singers to make themselves heard in unison in praise and thanksgiving to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
