        marker: ref
        children:
        - type: text
          text: Ps. 150:3-5
      marker-yv: yv-n
    - type: text
      text: 'cymbals, harps, and lyres, stood east of the altar with 120 '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:6
      - type: text
        text: '; '
