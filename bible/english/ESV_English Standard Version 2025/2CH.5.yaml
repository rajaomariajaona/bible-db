document_id: 2CH.5,59
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-10, see 1 Kgs. 7:51–8:9
  - type: text
    content: 'Thus all the work that Solomon did for the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was finished. And Solomon brought in the things that David his father had dedicated, and stored the silver, the gold, and all the vessels in the treasuries of the house of God.'
  - type: heading
    content: The Ark Brought to the Temple
  '10':
  - type: text
    content: 'There was nothing in the ark except the two tablets '
  - type: note
    content: Deut. 10:2, 5; [ch. 6:11]
  - type: text
    content: 'that Moses put there at Horeb, where the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with the people of Israel, when they came out of Egypt. '
  '11':
  - type: text
    content: 'And when the priests came out of the Holy Place (for all the priests who were present had consecrated themselves, without regard to '
  - type: note
    content: 1 Chr. 24:1, 5; [Luke 1:5]
  - type: text
    content: 'their divisions, '
  '12':
  - type: text
    content: 'and all the Levitical '
  - type: note
    content: See 1 Chr. 25:1-4
  - type: text
    content: 'singers, '
  - type: note
    content: See 1 Chr. 6:39
  - type: text
    content: 'Asaph, '
  - type: note
    content: See 1 Chr. 6:33
  - type: text
    content: 'Heman, and Jeduthun, their sons and kinsmen, arrayed in fine linen, with '
  - type: note
    content: 1 Chr. 15:16; Ps. 150:3-5
  - type: text
    content: 'cymbals, harps, and lyres, stood east of the altar with 120 '
  - type: note
    content: ch. 7:6; 1 Chr. 15:24
  - type: text
    content: 'priests who were trumpeters; '
  '13':
  - type: text
    content: 'and it was the duty of the trumpeters and singers to make themselves heard in unison in praise and thanksgiving to the '
  - type: text
    content: Lord
  - type: text
    content: '), and when the song was raised, '
  - type: note
    content: 1 Chr. 16:42
  - type: text
    content: 'with trumpets and cymbals and other musical instruments, in praise to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: See 1 Chr. 16:34
  - type: text
    content: “For he is good,
  - type: text
    content: for his steadfast love endures forever,”
  - type: text
    content: 'the house, the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', was filled with a cloud, '
  '14':
  - type: text
    content: 'so that the priests could not stand to minister because of the cloud, '
  - type: note
    content: ch. 7:2; 1 Kgs. 8:11; [Ex. 40:35; Ezek. 10:3, 4]
  - type: text
    content: 'for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the house of God.'
  '2':
  - type: text
    content: 'Then Solomon assembled the elders of Israel and all the heads of the tribes, the leaders of the fathers’ houses of the people of Israel, in Jerusalem, to bring up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' out of '
  - type: note
    content: 2 Sam. 6:12
  - type: text
    content: 'the city of David, which is Zion. '
  '3':
  - type: text
    content: 'And all the men of Israel assembled before the king at the feast that is in the seventh month. '
  '4':
  - type: text
    content: 'And all the elders of Israel came, '
  - type: note
    content: '[ver. 7; 1 Kgs. 8:3]'
  - type: text
    content: 'and the Levites took up the ark. '
  '5':
  - type: text
    content: 'And they brought up the ark, the tent of meeting, and all the holy vessels that were in the tent; '
  - type: note
    content: ch. 23:18; 30:27
  - type: text
    content: 'the Levitical priests brought them up. '
  '6':
  - type: text
    content: 'And King Solomon and all the congregation of Israel, who had assembled before him, were before the ark, sacrificing so many sheep and oxen that they could not be counted or numbered. '
  '7':
  - type: text
    content: 'Then the priests brought the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' to its place, in the inner sanctuary of the house, in the Most Holy Place, underneath the wings of the cherubim. '
  '8':
  - type: text
    content: 'The cherubim spread out their wings over the place of the ark, so that the cherubim made a covering above the ark and its poles. '
  '9':
  - type: text
    content: 'And the poles were so long that the ends of the poles were seen '
  - type: note
    content: '[1 Kgs. 8:8]'
  - type: text
    content: from the Holy Place before the inner sanctuary, but they could not be seen from outside. And they are
  - type: note
    content: Hebrew it is
  - type: text
    content: ' there to this day. '
