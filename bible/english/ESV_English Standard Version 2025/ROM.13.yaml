verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Submission to the Authorities
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Let every person '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Titus 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 2:13
      marker-yv: yv-n
    - type: text
      text: 'be subject to the governing authorities. For '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 19:11
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See Dan. 2:21'
      marker-yv: yv-n
    - type: text
      text: 'there is no authority except from God, and those that exist have been instituted by God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Love does no wrong to a neighbor; therefore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:15
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See ver. 8'
      marker-yv: yv-n
    - type: text
      text: love is the fulfilling of the law.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Besides this you know the time, that the hour has come for you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 5:6
      marker-yv: yv-n
    - type: text
      text: 'to wake from sleep. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 56:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 21:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'For salvation is nearer to us now than when we first believed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 9:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'The night is far gone; the day is at hand. So then let us '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:8
      marker-yv: yv-n
    - type: text
      text: 'cast off '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:11
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:20
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the works of darkness and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 6:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 5:8
      marker-yv: yv-n
    - type: text
      text: 'put on the armor of light. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 4:12
      marker-yv: yv-n
    - type: text
      text: 'Let us walk properly as in the daytime, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 21:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 4:3
      marker-yv: yv-n
    - type: text
      text: 'not in orgies and drunkenness, not in sexual immorality and sensuality, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 3:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      marker-yv: yv-n
    - type: text
      text: 'not in quarreling and jealousy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:27
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 29:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 132:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 24:49
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:10
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'put on the Lord Jesus Christ, and make no provision for the flesh, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 2:11
      marker-yv: yv-n
    - type: text
      text: to gratify its desires.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Therefore whoever resists the authorities resists what God has appointed, and those who resist will incur judgment. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For rulers are not a terror to good conduct, but to bad. Would you have no fear of the one who is in authority? Then do what is good, and you '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 2:14
      marker-yv: yv-n
    - type: text
      text: 'will receive his approval, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 19:6
      marker-yv: yv-n
    - type: text
      text: 'he is God’s servant for your good. But if you do wrong, be afraid, for he does not bear the sword in vain. For he is the servant of God, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 4:6
      marker-yv: yv-n
    - type: text
      text: 'an avenger who carries out God’s wrath on the wrongdoer. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Therefore one must be in subjection, not only to avoid God’s wrath but also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pet. 2:19
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eccles. 8:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'for the sake of conscience. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For because of this you also pay taxes, for the authorities are ministers of God, attending to this very thing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 17:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 12:17
      marker-yv: yv-n
    - type: text
      text: 'Pay to all what is owed to them: taxes to whom taxes are owed, revenue to whom revenue is owed, respect to whom respect is owed, honor to whom honor is owed.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fulfilling the Law Through Love
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 19:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 3:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Owe no one anything, except to love each other, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 22:40
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:14
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']; See John 13:34'
      marker-yv: yv-n
    - type: text
      text: 'the one who loves another has fulfilled the law. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For the commandments, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 19:18
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: Cited from
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 20:13-17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 5:17-21
      marker-yv: yv-n
    - type: text
      text: '“You shall not commit adultery, You shall not murder, You shall not steal, You shall not covet,” and any other commandment, are summed up in this word: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited from '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: '“You shall love your neighbor as yourself.” '
