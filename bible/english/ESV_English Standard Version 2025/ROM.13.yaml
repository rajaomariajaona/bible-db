document_id: ROM.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Submission to the Authorities
  - type: text
    content: 'Let every person '
  - type: note
    content: Titus 3:1; 1 Pet. 2:13
  - type: text
    content: 'be subject to the governing authorities. For '
  - type: note
    content: '[John 19:11]; See Dan. 2:21'
  - type: text
    content: 'there is no authority except from God, and those that exist have been instituted by God. '
  '10':
  - type: text
    content: 'Love does no wrong to a neighbor; therefore '
  - type: note
    content: '[John 14:15]; See ver. 8'
  - type: text
    content: love is the fulfilling of the law.
  '11':
  - type: text
    content: 'Besides this you know the time, that the hour has come for you '
  - type: note
    content: 1 Cor. 15:34; Eph. 5:14; 1 Thess. 5:6
  - type: text
    content: 'to wake from sleep. '
  - type: note
    content: '[Isa. 56:1; Luke 21:28]'
  - type: text
    content: 'For salvation is nearer to us now than when we first believed. '
  '12':
  - type: note
    content: '[John 9:4]'
  - type: text
    content: 'The night is far gone; the day is at hand. So then let us '
  - type: note
    content: Col. 3:8
  - type: text
    content: 'cast off '
  - type: note
    content: Eph. 5:11; [John 3:20]
  - type: text
    content: 'the works of darkness and '
  - type: note
    content: 2 Cor. 6:7; Eph. 6:11, 13; 1 Thess. 5:8
  - type: text
    content: 'put on the armor of light. '
  '13':
  - type: note
    content: 1 Thess. 4:12
  - type: text
    content: 'Let us walk properly as in the daytime, '
  - type: note
    content: Luke 21:34; Gal. 5:21; 1 Pet. 4:3
  - type: text
    content: 'not in orgies and drunkenness, not in sexual immorality and sensuality, '
  - type: note
    content: James 3:14, 16
  - type: text
    content: 'not in quarreling and jealousy. '
  '14':
  - type: text
    content: 'But '
  - type: note
    content: Gal. 3:27; [Job 29:14; Ps. 132:9; Luke 24:49; Eph. 4:24; Col. 3:10]
  - type: text
    content: 'put on the Lord Jesus Christ, and make no provision for the flesh, '
  - type: note
    content: Gal. 5:16; 1 Pet. 2:11
  - type: text
    content: to gratify its desires.
  '2':
  - type: text
    content: 'Therefore whoever resists the authorities resists what God has appointed, and those who resist will incur judgment. '
  '3':
  - type: text
    content: 'For rulers are not a terror to good conduct, but to bad. Would you have no fear of the one who is in authority? Then do what is good, and you '
  - type: note
    content: 1 Pet. 2:14
  - type: text
    content: 'will receive his approval, '
  '4':
  - type: text
    content: 'for '
  - type: note
    content: 2 Chr. 19:6
  - type: text
    content: 'he is God’s servant for your good. But if you do wrong, be afraid, for he does not bear the sword in vain. For he is the servant of God, '
  - type: note
    content: 1 Thess. 4:6
  - type: text
    content: 'an avenger who carries out God’s wrath on the wrongdoer. '
  '5':
  - type: text
    content: 'Therefore one must be in subjection, not only to avoid God’s wrath but also '
  - type: note
    content: 1 Pet. 2:19; [Eccles. 8:2]
  - type: text
    content: 'for the sake of conscience. '
  '6':
  - type: text
    content: 'For because of this you also pay taxes, for the authorities are ministers of God, attending to this very thing. '
  '7':
  - type: note
    content: Matt. 17:25; 22:21; Mark 12:17
  - type: text
    content: 'Pay to all what is owed to them: taxes to whom taxes are owed, revenue to whom revenue is owed, respect to whom respect is owed, honor to whom honor is owed.'
  - type: heading
    content: Fulfilling the Law Through Love
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 19:13; Prov. 3:27, 28 ]'
  - type: text
    content: 'Owe no one anything, except to love each other, for '
  - type: note
    content: ver. 10; [Matt. 22:40; Col. 3:14]; See John 13:34
  - type: text
    content: 'the one who loves another has fulfilled the law. '
  '9':
  - type: text
    content: 'For the commandments, '
  - type: note
    content: Matt. 19:18; Cited fromEx. 20:13-17; Deut. 5:17-21
  - type: text
    content: '“You shall not commit adultery, You shall not murder, You shall not steal, You shall not covet,” and any other commandment, are summed up in this word: '
  - type: note
    content: Cited from Lev. 19:18
  - type: text
    content: '“You shall love your neighbor as yourself.” '
