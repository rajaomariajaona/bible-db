document_id: REV.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: 'The revelation of Jesus Christ, which God '
  - type: note
    content: John 17:7, 8; [John 8:26; 14:10]
  - type: text
    content: 'gave him '
  - type: note
    content: ch. 22:6
  - type: text
    content: to show to his servants
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface; likewise for servant later in this verse
  - type: text
    content: ' the things that must soon take place. '
  - type: note
    content: ch. 22:16
  - type: text
    content: 'He made it known by sending his angel to his servant John, '
  '10':
  - type: note
    content: ch. 4:2; [ch. 17:3; 21:10; 1 Kgs. 18:12; Ezek. 3:12; Matt. 22:43; 2 Cor. 12:2]
  - type: text
    content: 'I was in the Spirit '
  - type: note
    content: Acts 20:7; 1 Cor. 16:2
  - type: text
    content: 'on the Lord’s day, and I heard behind me a loud voice '
  - type: note
    content: ch. 4:1
  - type: text
    content: 'like a trumpet '
  '11':
  - type: text
    content: 'saying, '
  - type: note
    content: ver. 2, 19
  - type: text
    content: “Write what you see in a book and send it to the seven churches, to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea.”
  '12':
  - type: text
    content: 'Then I turned to see the voice that was speaking to me, and on turning I saw '
  - type: note
    content: ver. 20; ch. 2:1; Ex. 25:37; 2 Chr. 4:20; Zech. 4:2; [ch. 11:4]
  - type: text
    content: 'seven golden lampstands, '
  '13':
  - type: text
    content: 'and in the midst of the lampstands '
  - type: note
    content: Dan. 7:13
  - type: text
    content: 'one like '
  - type: note
    content: ch. 14:14; Dan. 10:16
  - type: text
    content: 'a son of man, '
  - type: note
    content: Dan. 10:5
  - type: text
    content: 'clothed with a long robe and '
  - type: note
    content: ch. 15:6
  - type: text
    content: 'with a golden sash around his chest. '
  '14':
  - type: note
    content: Dan. 7:9
  - type: text
    content: 'The hairs of his head were white, like white wool, like snow. '
  - type: note
    content: ch. 2:18; 19:12; [Dan. 10:6]
  - type: text
    content: 'His eyes were like a flame of fire, '
  '15':
  - type: note
    content: Ezek. 1:7; Dan. 10:6
  - type: text
    content: 'his feet were like burnished bronze, refined in a furnace, and '
  - type: note
    content: ch. 14:2; 19:6; Ezek. 43:2
  - type: text
    content: 'his voice was like the roar of many waters. '
  '16':
  - type: note
    content: ver. 20; ch. 2:1; 3:1
  - type: text
    content: 'In his right hand he held seven stars, '
  - type: note
    content: ch. 19:15; [ch. 2:12, 16; Isa. 49:2; Eph. 6:17; Heb. 4:12]
  - type: text
    content: 'from his mouth came a sharp two-edged sword, and '
  - type: note
    content: Matt. 17:2
  - type: text
    content: 'his face was like the sun shining '
  - type: note
    content: Judg. 5:31
  - type: text
    content: in full strength.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Dan. 8:17, 18; 10:9, 10, 15; [ Luke 24:37; John 21:12 ]
  - type: text
    content: 'When I saw him, I fell at his feet as though dead. But '
  - type: note
    content: Dan. 8:17, 18; 10:9, 10, 15; [Luke 24:37; John 21:12]
  - type: text
    content: 'he laid his right hand on me, '
  - type: note
    content: Matt. 17:7
  - type: text
    content: 'saying, '
  - type: text
    content: '“Fear not, '
  - type: note
    content: ch. 2:8; 22:13; Isa. 41:4; 44:6; 48:12
  - type: text
    content: I am the first and the last,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'and the living one. '
  - type: note
    content: Rom. 6:9; 14:9
  - type: text
    content: 'I died, and behold I am alive forevermore, and '
  - type: note
    content: '[ch. 9:1; 20:1]'
  - type: text
    content: I have the keys of Death and Hades.
  - type: text
    content: ' '
  '19':
  - type: note
    content: ver. 2, 11
  - type: text
    content: 'Write therefore '
  - type: note
    content: ver. 12-16
  - type: text
    content: the things that you have seen, those that are and those that are to take place after this.
  - type: text
    content: ' '
  '2':
  - type: note
    content: John 19:35
  - type: text
    content: 'who bore witness to the word of God and to '
  - type: note
    content: ch. 6:9; 12:17; 19:10; See 1 Cor. 1:6
  - type: text
    content: 'the testimony of Jesus Christ, even '
  - type: note
    content: ver. 11, 19
  - type: text
    content: 'to all that he saw. '
  '20':
  - type: text
    content: 'As for the mystery of the seven stars that you saw in my right hand, and '
  - type: note
    content: See ver. 12
  - type: text
    content: 'the seven golden lampstands, the seven stars are the angels of the seven churches, and '
  - type: note
    content: '[Matt. 5:14, 15]'
  - type: text
    content: the seven lampstands are the seven churches.
  '3':
  - type: note
    content: ch. 22:7; [Luke 11:28; John 8:51; 1 John 2:3]
  - type: text
    content: 'Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear, and who keep what is written in it, '
  - type: note
    content: ch. 22:10; [1 John 2:18]; See Rom. 13:11
  - type: text
    content: for the time is near.
  - type: heading
    content: Greeting to the Seven Churches
  '4':
  - type: text
    content: 'John to the seven churches that are in Asia:'
  - type: text
    content: 'Grace to you and peace from '
  - type: note
    content: ver. 8; ch. 4:8; Heb. 13:8
  - type: text
    content: 'him '
  - type: note
    content: Ex. 3:14 (Gk.)
  - type: text
    content: 'who is and '
  - type: note
    content: John 1:1
  - type: text
    content: 'who was and who is to come, and from '
  - type: note
    content: ch. 3:1; 4:5; 5:6
  - type: text
    content: 'the seven spirits who are before his throne, '
  '5':
  - type: text
    content: 'and from Jesus Christ '
  - type: note
    content: ch. 3:14; John 18:37; 1 Tim. 6:13; [ch. 2:13; Ps. 89:37; Isa. 55:4]
  - type: text
    content: 'the faithful witness, '
  - type: note
    content: Col. 1:18; [Ps. 89:27; Acts 26:23; 1 Cor. 15:20]
  - type: text
    content: 'the firstborn of the dead, and '
  - type: note
    content: ch. 17:14; 19:16; [Ps. 89:27]
  - type: text
    content: the ruler of kings on earth.
  - type: text
    content: 'To '
  - type: note
    content: John 13:34; 15:9
  - type: text
    content: 'him who loves us and '
  - type: note
    content: 1 Pet. 1:18, 19
  - type: text
    content: 'has freed us from our sins by his blood '
  '6':
  - type: text
    content: 'and made us '
  - type: note
    content: ch. 5:10; 20:6; 1 Pet. 2:9
  - type: text
    content: 'a kingdom, '
  - type: note
    content: ch. 5:10; 20:6; 1 Pet. 2:9
  - type: text
    content: 'priests to '
  - type: note
    content: See Rom. 15:6
  - type: text
    content: 'his God and Father, to him be '
  - type: note
    content: See Rom. 11:36
  - type: text
    content: 'glory and '
  - type: note
    content: 1 Pet. 4:11
  - type: text
    content: 'dominion forever and ever. Amen. '
  '7':
  - type: text
    content: 'Behold, '
  - type: note
    content: Dan. 7:13; See Matt. 16:27
  - type: text
    content: 'he is coming with the clouds, and '
  - type: note
    content: Zech. 12:10; John 19:37
  - type: text
    content: every eye will see him, even those who pierced him, and all tribes of the earth will wail
  - type: note
    content: Or mourn
  - type: text
    content: ' on account of him. Even so. Amen.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:6; 22:13; [ Isa. 41:4; 43:10; 44:6 ]
  - type: text
    content: '“I am the Alpha and the Omega,” says the Lord God, '
  - type: note
    content: ver. 4
  - type: text
    content: “who is and who was and who is to come, the Almighty.”
  - type: heading
    content: Vision of the Son of Man
  '9':
  - type: text
    content: 'I, John, your brother and '
  - type: note
    content: '[Phil. 4:14]'
  - type: text
    content: 'partner in '
  - type: note
    content: John 16:33
  - type: text
    content: 'the tribulation and '
  - type: note
    content: 2 Tim. 2:12
  - type: text
    content: 'the kingdom and '
  - type: note
    content: ch. 3:10
  - type: text
    content: 'the patient endurance that are in Jesus, was on the island called Patmos '
  - type: note
    content: See ver. 2
  - type: text
    content: 'on account of the word of God and the testimony of Jesus. '
