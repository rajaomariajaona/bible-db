document_id: LEV.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Grain Offerings
  - type: text
    content: '“When anyone brings a '
  - type: note
    content: ch. 6:14; 9:17; Num. 15:4
  - type: text
    content: 'grain offering as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', his offering shall be of fine flour. '
  - type: note
    content: ver. 15
  - type: text
    content: 'He shall pour oil on it and put frankincense on it '
  '10':
  - type: text
    content: 'But the '
  - type: note
    content: ver. 3
  - type: text
    content: 'rest of the grain offering shall be for Aaron and his sons; '
  - type: note
    content: ver. 3
  - type: text
    content: 'it is a most holy part of the '
  - type: text
    content: Lord
  - type: text
    content: ’s food offerings.
  '11':
  - type: text
    content: '“No grain offering that you bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be made with '
  - type: note
    content: ch. 6:17; [Matt. 16:12; Mark 8:15; Luke 12:1; 1 Cor. 5:8; Gal. 5:9]
  - type: text
    content: 'leaven, for you shall burn no leaven nor any honey as a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: note
    content: See Ex. 23:19
  - type: text
    content: 'As an offering of firstfruits you may bring them to the '
  - type: text
    content: Lord
  - type: text
    content: ', but they shall not be offered on the altar for a pleasing aroma. '
  '13':
  - type: text
    content: 'You '
  - type: note
    content: Col. 4:6
  - type: text
    content: 'shall season all your grain offerings with salt. You shall not let the '
  - type: note
    content: Num. 18:19; [2 Chr. 13:5]
  - type: text
    content: 'salt of the covenant with your God be missing from your grain offering; '
  - type: note
    content: Ezek. 43:24
  - type: text
    content: with all your offerings you shall offer salt.
  '14':
  - type: text
    content: '“If you offer a grain offering of firstfruits to the '
  - type: text
    content: Lord
  - type: text
    content: ', you shall offer for the grain offering of your firstfruits fresh '
  - type: note
    content: ch. 23:14; [Josh. 5:11]
  - type: text
    content: 'ears, roasted with fire, crushed new grain. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: ver. 1
  - type: text
    content: 'you shall put oil on it and lay frankincense on it; it is a grain offering. '
  '16':
  - type: text
    content: 'And the priest shall burn as its '
  - type: note
    content: See ver. 2
  - type: text
    content: 'memorial portion some of the crushed grain and some of the oil with all of its frankincense; it is a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'and bring it to Aaron’s sons the priests. And he shall take from it a handful of the fine flour and oil, with all of its frankincense, and the priest shall burn this as its '
  - type: note
    content: ver. 9, 16; ch. 5:12; 6:15; 24:7; [Acts 10:4]
  - type: text
    content: 'memorial portion on the altar, a food '
  - type: note
    content: See ch. 1:9
  - type: text
    content: 'offering with a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'But the '
  - type: note
    content: ch. 7:9; 10:12, 13
  - type: text
    content: 'rest of the grain offering shall be for Aaron and his sons; '
  - type: note
    content: '[Ex. 40:10]'
  - type: text
    content: 'it is a most holy part of the '
  - type: text
    content: Lord
  - type: text
    content: ’s food offerings.
  '4':
  - type: text
    content: '“When you bring a grain offering baked in the oven as an offering, it shall be '
  - type: note
    content: Ex. 29:2
  - type: text
    content: 'unleavened loaves of fine flour mixed with oil or unleavened wafers smeared with oil. '
  '5':
  - type: text
    content: 'And if your offering is a grain offering '
  - type: note
    content: ch. 6:21; 7:9; [1 Chr. 23:29; Ezek. 4:3]
  - type: text
    content: 'baked on a griddle, it shall be of fine flour unleavened, mixed with oil. '
  '6':
  - type: text
    content: 'You shall break it in pieces and pour oil on it; it is a grain offering. '
  '7':
  - type: text
    content: 'And if your offering is a grain offering cooked in a pan, it shall be made of fine flour with oil. '
  '8':
  - type: text
    content: 'And you shall bring the grain offering that is made of these things to the '
  - type: text
    content: Lord
  - type: text
    content: ', and when it is presented to the priest, he shall bring it to the altar. '
  '9':
  - type: text
    content: 'And the priest shall take from the grain offering its memorial portion and burn this on the altar, a food '
  - type: note
    content: See ch. 1:9
  - type: text
    content: 'offering with a '
  - type: note
    content: '[Phil. 4:18]'
  - type: text
    content: 'pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
