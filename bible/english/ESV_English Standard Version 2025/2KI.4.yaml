document_id: 2KI.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Elisha and the Widow’s Oil
  - type: text
    content: 'Now the wife of one of the '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'sons of the prophets cried to Elisha, “Your servant my husband is dead, and you know that your servant feared the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Lev. 25:39-41; 1 Sam. 22:2; Neh. 5:5; Matt. 18:25]'
  - type: text
    content: 'but the creditor has come to take my two children to be his slaves.” '
  '10':
  - type: text
    content: Let us make a small room on the roof with walls and put there for him a bed, a table, a chair, and a lamp, so that whenever he comes to us, he can go in there.”
  '11':
  - type: text
    content: 'One day he came there, and he turned into the chamber and rested there. '
  '12':
  - type: text
    content: 'And he said to '
  - type: note
    content: ch. 5:20, 21, 25; 8:4, 5
  - type: text
    content: 'Gehazi his servant, “Call this Shunammite.” When he had called her, she stood before him. '
  '13':
  - type: text
    content: 'And he said to him, “Say now to her, ‘See, you have taken all this trouble for us; what is to be done for you? Would you have a word spoken on your behalf to the king or to '
  - type: note
    content: 2 Sam. 19:13; [ch. 5:1]
  - type: text
    content: 'the commander of the army?’” She answered, “I dwell among my own people.” '
  '14':
  - type: text
    content: 'And he said, “What then is to be done for her?” Gehazi answered, “Well, she has no son, and her husband is old.” '
  '15':
  - type: text
    content: 'He said, “Call her.” And when he had called her, she stood in the doorway. '
  '16':
  - type: text
    content: 'And he said, “At this season, '
  - type: note
    content: Gen. 18:14; [Gen. 17:21]
  - type: text
    content: 'about this time next year, you shall embrace a son.” And she said, “No, my lord, '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'O man of God; '
  - type: note
    content: ver. 28
  - type: text
    content: 'do not lie to your servant.” '
  '17':
  - type: text
    content: 'But the woman conceived, and she bore a son about that time '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: the following spring, as Elisha had said to her.
  - type: heading
    content: Elisha Raises the Shunammite’s Son
  '18':
  - type: text
    content: 'When the child had grown, he went out one day to his father among the reapers. '
  '19':
  - type: text
    content: 'And he said to his father, “Oh, '
  - type: note
    content: '[Ps. 121:6]'
  - type: text
    content: 'my head, my head!” The father said to his servant, “Carry him to his mother.” '
  '2':
  - type: text
    content: 'And Elisha said to her, “What shall I do for you? Tell me; what have you in the house?” And she said, “Your servant has nothing in the house except a jar of oil.” '
  '20':
  - type: text
    content: 'And when he had lifted him and brought him to his mother, the child sat on her lap till noon, and then he died. '
  '21':
  - type: text
    content: 'And she went up '
  - type: note
    content: ver. 32
  - type: text
    content: 'and laid him on the bed of the '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'man of God and shut the door behind him and went out. '
  '22':
  - type: text
    content: 'Then she called to her husband and said, “Send me one of the servants and one of the donkeys, that I may quickly go to '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'the man of God and come back again.” '
  '23':
  - type: text
    content: 'And he said, “Why will you go to him today? It is neither '
  - type: note
    content: '[Num. 28:11]'
  - type: text
    content: 'new moon nor Sabbath.” She said, “All is well.” '
  '24':
  - type: text
    content: 'Then she saddled the donkey, and she said to her servant, “Urge the animal on; do not slacken the pace for me unless I tell you.” '
  '25':
  - type: text
    content: 'So she set out and came to the man of God '
  - type: note
    content: ch. 2:25
  - type: text
    content: at Mount Carmel.
  - type: text
    content: 'When the man of God saw her coming, he said to Gehazi his servant, “Look, there is the Shunammite. '
  '26':
  - type: text
    content: 'Run at once to meet her and say to her, ‘Is all well with you? Is all well with your husband? Is all well with the child?’” And she answered, “All is well.” '
  '27':
  - type: text
    content: 'And when she came '
  - type: note
    content: ver. 25
  - type: text
    content: 'to the mountain to the man of God, she caught hold of his feet. And Gehazi came to push her away. But the man of God said, “Leave her alone, for she is in bitter distress, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has hidden it from me and has not told me.” '
  '28':
  - type: text
    content: 'Then she said, “Did I ask my lord for a son? '
  - type: note
    content: ver. 16
  - type: text
    content: 'Did I not say, ‘Do not deceive me?’” '
  '29':
  - type: text
    content: 'He said to Gehazi, '
  - type: note
    content: See 1 Kgs. 18:46
  - type: text
    content: '“Tie up your garment and '
  - type: note
    content: '[Ex. 7:19; 14:16; Acts 19:12]'
  - type: text
    content: 'take my staff in your hand and go. If you meet anyone, '
  - type: note
    content: Luke 10:4
  - type: text
    content: 'do not greet him, and if anyone greets you, do not reply. And '
  - type: note
    content: '[Ex. 7:19; 14:16; Acts 19:12]'
  - type: text
    content: 'lay my staff on the face of the child.” '
  '3':
  - type: text
    content: 'Then he said, “Go outside, borrow vessels from all your neighbors, empty vessels and not too few. '
  '30':
  - type: text
    content: 'Then the mother of the child said, '
  - type: note
    content: See Ruth 3:13
  - type: text
    content: '“As the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and as you yourself live, I will not leave you.” So he arose and followed her. '
  '31':
  - type: text
    content: 'Gehazi went on ahead and laid the staff on the face of the child, but there was no sound or sign of life. Therefore he returned to meet him and told him, “The child '
  - type: note
    content: '[John 11:11]'
  - type: text
    content: has not awakened.”
  '32':
  - type: text
    content: 'When Elisha came into the house, he saw the child lying dead on his bed. '
  '33':
  - type: text
    content: 'So he went in and '
  - type: note
    content: ver. 4; Matt. 6:6; [Matt. 9:25; Mark 5:37, 40; Luke 8:51]
  - type: text
    content: 'shut the door behind the two of them '
  - type: note
    content: 1 Kgs. 17:20
  - type: text
    content: 'and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Then he went up and lay on the child, putting his mouth on his mouth, his eyes on his eyes, and his hands on his hands. And as '
  - type: note
    content: 1 Kgs. 17:21; [Acts 20:10]
  - type: text
    content: 'he stretched himself upon him, the flesh of the child became warm. '
  '35':
  - type: text
    content: 'Then he got up again and walked once back and forth in the house, and went up '
  - type: note
    content: '[See ver. 34 above]'
  - type: text
    content: 'and stretched himself upon him. The child sneezed seven times, and the child opened his eyes. '
  '36':
  - type: text
    content: 'Then he summoned Gehazi and said, “Call this Shunammite.” So he called her. And when she came to him, he said, “Pick up your son.” '
  '37':
  - type: text
    content: 'She came and fell at his feet, bowing to the ground. '
  - type: note
    content: 1 Kgs. 17:23; Heb. 11:35; [ch. 8:1, 5]
  - type: text
    content: Then she picked up her son and went out.
  - type: heading
    content: Elisha Purifies the Deadly Stew
  '38':
  - type: text
    content: 'And Elisha came again to '
  - type: note
    content: ch. 2:1
  - type: text
    content: 'Gilgal when '
  - type: note
    content: ch. 8:1
  - type: text
    content: 'there was a famine in the land. And as '
  - type: note
    content: See ch. 2:3
  - type: text
    content: 'the sons of the prophets '
  - type: note
    content: Deut. 33:3; Luke 10:39; Acts 22:3; [ch. 2:3, 5]
  - type: text
    content: 'were sitting before him, he said to his servant, '
  - type: note
    content: Ezek. 24:3
  - type: text
    content: '“Set on the large pot, and boil stew for the sons of the prophets.” '
  '39':
  - type: text
    content: 'One of them went out into the field to gather herbs, and found a wild vine and gathered from it his lap full of wild gourds, and came and cut them up into the pot of stew, not knowing what they were. '
  '4':
  - type: text
    content: 'Then go in and shut the door behind yourself and your sons and pour into all these vessels. And when one is full, set it aside.” '
  '40':
  - type: text
    content: 'And they poured out some for the men to eat. But while they were eating of the stew, they cried out, “O man of God, there is death in the pot!” And they could not eat it. '
  '41':
  - type: text
    content: 'He said, “Then bring flour.” '
  - type: note
    content: '[ch. 2:21; Ex. 15:25]'
  - type: text
    content: And he threw it into the pot and said, “Pour some out for the men, that they may eat.” And there was no harm in the pot.
  '42':
  - type: text
    content: 'A man came from '
  - type: note
    content: '[1 Sam. 9:4]'
  - type: text
    content: 'Baal-shalishah, '
  - type: note
    content: '[1 Sam. 9:7]'
  - type: text
    content: 'bringing the man of God bread of the firstfruits, twenty loaves of barley and fresh ears of grain in his sack. And Elisha said, '
  - type: note
    content: See Matt. 14:16-21; 15:32-38; Mark 6:37-44; 8:4-9; Luke 9:13-17; John 6:5-13
  - type: text
    content: '“Give to the men, that they may eat.” '
  '43':
  - type: text
    content: 'But his servant said, “How can I set this before a hundred men?” So he repeated, “Give them to the men, that they may eat, for thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘They shall eat and have some left.’” '
  '44':
  - type: text
    content: 'So he set it before them. And they ate and had some left, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'So she went from him and shut the door behind herself and her sons. And as she poured they brought the vessels to her. '
  '6':
  - type: text
    content: 'When the vessels were full, she said to her son, “Bring me another vessel.” And he said to her, “There is not another.” Then the oil stopped flowing. '
  '7':
  - type: text
    content: 'She came and told the '
  - type: note
    content: See Deut. 33:1
  - type: text
    content: man of God, and he said, “Go, sell the oil and pay your debts, and you and your sons can live on the rest.”
  - type: heading
    content: Elisha and the Shunammite Woman
  '8':
  - type: text
    content: 'One day Elisha went on to '
  - type: note
    content: Josh. 19:18
  - type: text
    content: 'Shunem, where a '
  - type: note
    content: '[1 Sam. 25:2; 2 Sam. 19:32]'
  - type: text
    content: 'wealthy woman lived, who urged him to eat some food. So whenever he passed that way, he would turn in there to eat food. '
  '9':
  - type: text
    content: 'And she said to her husband, “Behold now, I know that this is a holy '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'man of God who is continually passing our way. '
