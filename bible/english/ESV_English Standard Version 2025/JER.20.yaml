document_id: JER.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Persecuted by Pashhur
  - type: text
    content: 'Now '
  - type: note
    content: ch. 21:1; 38:1; 1 Chr. 9:12; [Ezra 2:38]
  - type: text
    content: 'Pashhur the priest, the son of '
  - type: note
    content: 1 Chr. 24:14; Ezra 2:37
  - type: text
    content: 'Immer, who was '
  - type: note
    content: '[ch. 29:26]'
  - type: text
    content: 'chief officer in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', heard Jeremiah prophesying these things. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:13
  - type: text
    content: For I hear many whispering.
  - type: note
    content: See ch. 6:25
  - type: text
    content: Terror is on every side!
  - type: text
    content: '“Denounce him! '
  - type: note
    content: '[ch. 36:16, 20]'
  - type: text
    content: Let us denounce him!”
  - type: text
    content: 'say all my '
  - type: note
    content: Ps. 41:9; 55:13; [ch. 9:4; 38:22]
  - type: text
    content: close friends,
  - type: note
    content: '[ Ps. 56:6 ]'
  - type: text
    content: 'watching for '
  - type: note
    content: Ps. 35:15
  - type: text
    content: my fall.
  - type: text
    content: “Perhaps he will be deceived;
  - type: text
    content: 'then '
  - type: note
    content: ch. 1:19; 5:22
  - type: text
    content: we can overcome him
  - type: text
    content: and take our revenge on him.”
  '11':
  - type: text
    content: 'But '
  - type: note
    content: See ch. 1:8
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is with me as a dread warrior;'
  - type: text
    content: therefore my persecutors will stumble;
  - type: note
    content: See ch. 1:8
  - type: text
    content: they will not overcome me.
  - type: note
    content: ch. 17:18; 23:40
  - type: text
    content: They will be greatly shamed,
  - type: text
    content: for they will not succeed.
  - type: text
    content: 'Their '
  - type: note
    content: ch. 23:40
  - type: text
    content: eternal dishonor
  - type: text
    content: will never be forgotten.
  '12':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, who tests the righteous,'
  - type: note
    content: See ch. 11:20
  - type: text
    content: who sees the heart and the mind,
  - type: note
    content: Hebrew kidneys
  - type: text
    content: let me see your vengeance upon them,
  - type: text
    content: for to you have I committed my cause.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 35:9, 10; 109:30, 31 ]'
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: For he has delivered the life of the needy
  - type: text
    content: from the hand of evildoers.
  '14':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:10; Job 3:3
  - type: text
    content: Cursed be the day
  - type: text
    content: on which I was born!
  - type: text
    content: The day when my mother bore me,
  - type: text
    content: let it not be blessed!
  '15':
  - type: text
    content: Cursed be the man who brought the news to my father,
  - type: text
    content: “A son is born to you,”
  - type: note
    content: '[ John 16:21 ]'
  - type: text
    content: making him very glad.
  '16':
  - type: text
    content: 'Let that man be like '
  - type: note
    content: Gen. 19:25; Isa. 13:19
  - type: text
    content: the cities
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' overthrew without pity;'
  - type: note
    content: ch. 18:22
  - type: text
    content: let him hear a cry in the morning
  - type: text
    content: and an alarm at noon,
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 3:10, 11 ]'
  - type: text
    content: because he did not kill me in the womb;
  - type: text
    content: so my mother would have been my grave,
  - type: text
    content: and her womb forever great.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '[ Job 3:20 ]'
  - type: text
    content: Why did I come out from the womb
  - type: note
    content: '[ Lam. 3:1, 2 ]'
  - type: text
    content: to see toil and sorrow,
  - type: text
    content: and spend my days in shame?
  '2':
  - type: text
    content: 'Then '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Pashhur beat Jeremiah the prophet, and put him '
  - type: note
    content: ch. 29:26; Acts 16:24
  - type: text
    content: 'in the stocks that were in the upper '
  - type: note
    content: ch. 37:13
  - type: text
    content: 'Benjamin Gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'The next day, when '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Pashhur released Jeremiah from the stocks, Jeremiah said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: ' does not call your name '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Pashhur, but Terror on Every Side. '
  '4':
  - type: text
    content: 'For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': Behold, I will make you '
  - type: note
    content: See ch. 6:25
  - type: text
    content: 'a terror to yourself and to all your friends. They shall fall by the sword of their enemies while you look on. And I will give all Judah into the hand of the king of Babylon. He shall carry them captive to Babylon, and shall strike them down with the sword. '
  '5':
  - type: text
    content: 'Moreover, '
  - type: note
    content: '[2 Kgs. 20:17]; See 2 Kgs. 24:12-16; 25:13-17'
  - type: text
    content: 'I will give all the wealth of the city, all its gains, all its '
  - type: note
    content: Job 28:10; Ezek. 22:25
  - type: text
    content: 'prized belongings, and all the treasures of the kings of Judah into the hand of their enemies, who shall plunder them and seize them and carry them to Babylon. '
  '6':
  - type: text
    content: 'And you, '
  - type: note
    content: ch. 21:1; 38:1; 1 Chr. 9:12; [Ezra 2:38]
  - type: text
    content: 'Pashhur, and all who dwell in your house, shall go into captivity. To Babylon you shall go, and there you shall die, and there you shall be buried, you and all your friends, '
  - type: note
    content: See ch. 14:14
  - type: text
    content: to whom you have prophesied falsely.”
  '7':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[Ezek. 14:9]'
  - type: text
    content: you have deceived me,
  - type: text
    content: and I was deceived;
  - type: note
    content: '[ 2 Pet. 1:21 ]'
  - type: text
    content: you are stronger than I,
  - type: text
    content: and you have prevailed.
  - type: note
    content: Ps. 119:51; Lam. 3:14
  - type: text
    content: I have become a laughingstock all the day;
  - type: text
    content: everyone mocks me.
  '8':
  - type: text
    content: For whenever I speak, I cry out,
  - type: text
    content: 'I shout, '
  - type: note
    content: ch. 6:7
  - type: text
    content: “Violence and destruction!”
  - type: text
    content: 'For '
  - type: note
    content: ch. 6:10
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' has become for me'
  - type: note
    content: Ps. 44:13; 79:4
  - type: text
    content: 'a reproach and '
  - type: note
    content: Ps. 44:13; 79:4
  - type: text
    content: derision all day long.
  '9':
  - type: text
    content: If I say, “I will not mention him,
  - type: text
    content: or speak any more in his name,”
  - type: note
    content: Job 32:18, 19; Ps. 39:3
  - type: text
    content: there is in my heart as it were a burning fire
  - type: text
    content: shut up in my bones,
  - type: text
    content: 'and '
  - type: note
    content: ch. 6:11
  - type: text
    content: I am weary with holding it in,
  - type: text
    content: and I cannot.
