      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      marker-yv: yv-n
    - type: text
      text: 'Come, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 105:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:19
      marker-yv: yv-n
    - type: text
      text: 'let us deal shrewdly with them, lest they multiply, and, if war breaks out, they join our enemies and fight against us and escape from the land.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore they set taskmasters over them '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
