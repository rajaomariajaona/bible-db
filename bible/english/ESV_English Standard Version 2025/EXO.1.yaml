        children:
        - type: text
          text: Gen. 46:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: But the people of Israel were fruitful and increased greatly; they multiplied and grew exceedingly strong, so that the land was filled with them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pharaoh Oppresses Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now there arose a new king over Egypt, '
    - type: usfm
