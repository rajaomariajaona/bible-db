      marker-yv: yv-n
    - type: text
      text: “Every son that is born to the Hebrews
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Samaritan, Septuagint, Targum; Hebrew lacks '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: to the Hebrews
      marker-yv: yv-n
    - type: text
      text: ' you shall cast into '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 41:1
      marker-yv: yv-n
    - type: text
      text: the Nile, but you shall let every daughter live.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Issachar, Zebulun, and Benjamin, '
  '4':
  - type: usfm
