      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'Cited '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 7:18
      marker-yv: yv-n
    - type: text
      text: 'who did not know Joseph. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he said to his people, “Behold, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 105:24
      marker-yv: yv-n
    - type: text
