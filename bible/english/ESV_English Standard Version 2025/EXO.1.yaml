document_id: EXO.1,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Increases Greatly in Egypt
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-4, see Gen. 35:23-26; 46:8-26
  - type: text
    content: 'These are the names of the sons of Israel who came to Egypt with Jacob, each with his household: '
  '10':
  - type: note
    content: Ps. 83:3, 4
  - type: text
    content: 'Come, '
  - type: note
    content: Ps. 105:25; Acts 7:19
  - type: text
    content: 'let us deal shrewdly with them, lest they multiply, and, if war breaks out, they join our enemies and fight against us and escape from the land.” '
  '11':
  - type: text
    content: 'Therefore they set taskmasters over them '
  - type: note
    content: ch. 3:7; Gen. 15:13; Deut. 26:6
  - type: text
    content: 'to afflict them with heavy '
  - type: note
    content: ch. 2:11; 5:4, 5; 6:6, 7; Ps. 81:6
  - type: text
    content: 'burdens. They built for Pharaoh '
  - type: note
    content: '[2 Chr. 16:4]'
  - type: text
    content: 'store cities, Pithom and '
  - type: note
    content: '[ch. 12:37; Gen. 47:11]'
  - type: text
    content: 'Raamses. '
  '12':
  - type: text
    content: 'But the more they were oppressed, the more they multiplied and the more they spread abroad. And the Egyptians were in dread of the people of Israel. '
  '13':
  - type: text
    content: 'So they ruthlessly made the people of Israel '
  - type: note
    content: See ch. 5:7-19
  - type: text
    content: 'work as slaves '
  '14':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 2:23; 6:9; Num. 20:15; Acts 7:19, 34]'
  - type: text
    content: made their lives bitter with hard service, in mortar and brick, and in all kinds of work in the field. In all their work they ruthlessly made them work as slaves.
  '15':
  - type: text
    content: 'Then the king of Egypt said to the Hebrew midwives, one of whom was named Shiphrah and the other Puah, '
  '16':
  - type: text
    content: '“When you serve as midwife to the Hebrew women and see them on the birthstool, if it is a son, you shall kill him, but if it is a daughter, she shall live.” '
  '17':
  - type: text
    content: 'But the midwives '
  - type: note
    content: Prov. 16:6; [Dan. 3:16-18; 6:13; Acts 5:29]
  - type: text
    content: 'feared God and did not do as the king of Egypt commanded them, but let the male children live. '
  '18':
  - type: text
    content: 'So the king of Egypt called the midwives and said to them, “Why have you done this, and let the male children live?” '
  '19':
  - type: text
    content: 'The midwives said to Pharaoh, “Because the Hebrew women are not like the Egyptian women, for they are vigorous and give birth before the midwife comes to them.” '
  '2':
  - type: text
    content: 'Reuben, Simeon, Levi, and Judah, '
  '20':
  - type: note
    content: '[Eccles. 8:12]'
  - type: text
    content: 'So God dealt well with the midwives. And the people multiplied and grew very strong. '
  '21':
  - type: text
    content: 'And because the midwives feared God, '
  - type: note
    content: '[1 Sam. 2:35; 2 Sam. 7:11, 27; 1 Kgs. 2:24; 11:38; Ps. 127:1]'
  - type: text
    content: 'he gave them families. '
  '22':
  - type: text
    content: 'Then Pharaoh commanded all his people, '
  - type: note
    content: Acts 7:19
  - type: text
    content: “Every son that is born to the Hebrews
  - type: note
    content: Samaritan, Septuagint, Targum; Hebrew lacks to the Hebrews
  - type: text
    content: ' you shall cast into '
  - type: note
    content: Gen. 41:1
  - type: text
    content: the Nile, but you shall let every daughter live.”
  '3':
  - type: text
    content: 'Issachar, Zebulun, and Benjamin, '
  '4':
  - type: text
    content: 'Dan and Naphtali, Gad and Asher. '
  '5':
  - type: text
    content: 'All the descendants of Jacob were '
  - type: note
    content: Gen. 46:27; Deut. 10:22
  - type: text
    content: 'seventy persons; Joseph was already in Egypt. '
  '6':
  - type: text
    content: 'Then '
  - type: note
    content: Gen. 50:26
  - type: text
    content: 'Joseph died, and all his brothers and all that generation. '
  '7':
  - type: note
    content: Deut. 26:5; Acts 7:17; [Gen. 46:3]
  - type: text
    content: But the people of Israel were fruitful and increased greatly; they multiplied and grew exceedingly strong, so that the land was filled with them.
  - type: heading
    content: Pharaoh Oppresses Israel
  '8':
  - type: text
    content: 'Now there arose a new king over Egypt, '
  - type: note
    content: Cited Acts 7:18
  - type: text
    content: 'who did not know Joseph. '
  '9':
  - type: text
    content: 'And he said to his people, “Behold, '
  - type: note
    content: Ps. 105:24
  - type: text
    content: 'the people of Israel are too many and too mighty for us. '
