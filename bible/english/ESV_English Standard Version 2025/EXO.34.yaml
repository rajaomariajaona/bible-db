document_id: EXO.34,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Makes New Tablets
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: Deut. 10:1
  - type: text
    content: '“Cut for yourself two tablets of stone like the first, '
  - type: note
    content: ver. 28; Deut. 10:2, 4
  - type: text
    content: 'and I will write on the tablets the words that were on the first tablets, '
  - type: note
    content: ch. 32:19
  - type: text
    content: 'which you broke. '
  '10':
  - type: text
    content: 'And he said, “Behold, '
  - type: note
    content: ver. 27; Deut. 5:2; 29:1
  - type: text
    content: 'I am making a covenant. Before all your people '
  - type: note
    content: Deut. 4:32-35; Josh. 6:20; 10:12, 13; 2 Sam. 7:23; Ps. 77:14; 78:12
  - type: text
    content: 'I will do marvels, such as have not been created in all the earth or in any nation. And all the people among whom you are shall see the work of the '
  - type: text
    content: Lord
  - type: text
    content: ', for it is an '
  - type: note
    content: Deut. 10:21; Ps. 145:6; [Isa. 64:3]
  - type: text
    content: awesome thing that I will do with you.
  '11':
  - type: text
    content: '“Observe what I command you this day. Behold, '
  - type: note
    content: See ch. 13:5
  - type: text
    content: 'I will drive out before you the Amorites, the Canaanites, the Hittites, the Perizzites, the Hivites, and the Jebusites. '
  '12':
  - type: note
    content: ch. 23:32; Deut. 7:2; Josh. 23:12, 13; Judg. 2:2
  - type: text
    content: 'Take care, lest you make a covenant with the inhabitants of the land to which you go, lest it become a '
  - type: note
    content: See ch. 23:33
  - type: text
    content: 'snare in your midst. '
  '13':
  - type: text
    content: 'You shall '
  - type: note
    content: Deut. 7:5; 12:3; Judg. 2:2; 6:25; 2 Chr. 34:3, 4
  - type: text
    content: 'tear down their altars and '
  - type: note
    content: ch. 23:24; 2 Kgs. 18:4; 23:14; 2 Chr. 31:1
  - type: text
    content: 'break their pillars and cut down their '
  - type: note
    content: See Deut. 16:21
  - type: text
    content: 'Asherim '
  '14':
  - type: text
    content: '(for '
  - type: note
    content: ch. 20:3, 5
  - type: text
    content: 'you shall worship no other god, for the '
  - type: text
    content: Lord
  - type: text
    content: ', whose name is Jealous, is a jealous God), '
  '15':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'lest you make a covenant with the inhabitants of the land, and when they '
  - type: note
    content: Lev. 17:7; 20:5; Deut. 31:16; Judg. 2:17; Jer. 3:9; Ezek. 6:9
  - type: text
    content: 'whore after their gods and sacrifice to their gods and '
  - type: note
    content: Num. 25:2; Ps. 106:28; [1 Cor. 8:4, 7, 10; 10:27]
  - type: text
    content: 'you are invited, you eat of his sacrifice, '
  '16':
  - type: text
    content: 'and you take of '
  - type: note
    content: Deut. 7:3, 4; 1 Kgs. 11:2; Ezra 9:2; Neh. 13:25
  - type: text
    content: 'their daughters for your sons, and their daughters '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: whore after their gods and make your sons whore after their gods.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:4; Deut. 27:15; [ch. 32:4, 8 ]
  - type: text
    content: “You shall not make for yourself any gods of cast metal.
  '18':
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:15
  - type: text
    content: '“You shall keep the Feast of Unleavened Bread. Seven days you shall eat unleavened bread, as I commanded you, at the time appointed in '
  - type: note
    content: ch. 13:4
  - type: text
    content: 'the month Abib, for in the month Abib you came out from Egypt. '
  '19':
  - type: note
    content: See ch. 13:2
  - type: text
    content: All that open the womb are mine, all your male
  - type: note
    content: Septuagint, Theodotion, Vulgate, Targum; the meaning of the Hebrew is uncertain
  - type: text
    content: ' livestock, the firstborn of cow and sheep. '
  '2':
  - type: text
    content: 'Be ready by the morning, and come up in the morning to Mount Sinai, and present yourself there to me '
  - type: note
    content: ch. 19:20
  - type: text
    content: 'on the top of the mountain. '
  '20':
  - type: text
    content: 'The '
  - type: note
    content: ch. 13:13; Num. 18:15
  - type: text
    content: 'firstborn of a donkey you shall redeem with a lamb, or if you will not redeem it you shall break its neck. All the firstborn of your sons you shall redeem. And '
  - type: note
    content: ch. 23:15; Deut. 16:16
  - type: text
    content: none shall appear before me empty-handed.
  '21':
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:9
  - type: text
    content: '“Six days you shall work, but on the seventh day you shall rest. In plowing time and in harvest you shall rest. '
  '22':
  - type: note
    content: ch. 23:16; Deut. 16:10, 13
  - type: text
    content: 'You shall observe the Feast of Weeks, the firstfruits of wheat harvest, and the Feast of Ingathering at the year’s end. '
  '23':
  - type: note
    content: ch. 23:14, 17; Deut. 16:16
  - type: text
    content: 'Three times in the year shall all your males appear before the Lord '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel. '
  '24':
  - type: text
    content: 'For I will '
  - type: note
    content: ch. 33:2; Deut. 7:1; Ps. 78:55; 80:8; See ch. 23:27-31
  - type: text
    content: 'cast out nations before you and '
  - type: note
    content: Deut. 12:20; 19:8
  - type: text
    content: 'enlarge your borders; '
  - type: note
    content: '[Prov. 16:7]'
  - type: text
    content: 'no one shall covet your land, when you go up to appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God three times in the year.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:8
  - type: text
    content: '“You shall not offer the blood of my sacrifice with anything leavened, '
  - type: note
    content: See ch. 12:10
  - type: text
    content: 'or let the sacrifice of the Feast of the Passover remain until the morning. '
  '26':
  - type: note
    content: See ch. 23:19
  - type: text
    content: 'The best of the firstfruits of your ground you shall bring to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  - type: note
    content: Deut. 14:21
  - type: text
    content: You shall not boil a young goat in its mother’s milk.”
  '27':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Write these words, for in accordance with these words '
  - type: note
    content: ver. 10
  - type: text
    content: 'I have made a covenant with you and with Israel.” '
  '28':
  - type: note
    content: See ch. 24:18
  - type: text
    content: 'So he was there with the '
  - type: text
    content: Lord
  - type: text
    content: ' forty days and forty nights. He neither ate bread nor drank water. And he '
  - type: note
    content: '[ver. 1; ch. 31:18; 32:16; Deut. 4:13; 10:2, 4]'
  - type: text
    content: wrote on the tablets the words of the covenant, the Ten Commandments.
  - type: note
    content: Hebrew the ten words
  - type: heading
    content: The Shining Face of Moses
  '29':
  - type: text
    content: 'When Moses came down from Mount Sinai, with '
  - type: note
    content: ch. 32:15
  - type: text
    content: 'the two tablets of the testimony in his hand as he came down from the mountain, Moses did not know that the skin of his face '
  - type: note
    content: 2 Cor. 3:7; [Matt. 17:2]
  - type: text
    content: shone because he had been talking with God.
  - type: note
    content: Hebrew him
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'No '
  - type: note
    content: ch. 19:12, 13, 21
  - type: text
    content: 'one shall come up with you, and let no one be seen throughout all the mountain. Let no flocks or herds graze opposite that mountain.” '
  '30':
  - type: text
    content: 'Aaron and all the people of Israel saw Moses, and behold, the skin of his face '
  - type: note
    content: ver. 29
  - type: text
    content: 'shone, and they were afraid to come near him. '
  '31':
  - type: text
    content: 'But Moses called to them, and Aaron and all the leaders of the congregation returned to him, and Moses talked with them. '
  '32':
  - type: text
    content: 'Afterward all the people of Israel came near, and he '
  - type: note
    content: ch. 24:3
  - type: text
    content: 'commanded them all that the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken with him on Mount Sinai. '
  '33':
  - type: text
    content: 'And when Moses had finished speaking with them, he put a '
  - type: note
    content: 2 Cor. 3:13
  - type: text
    content: veil over his face.
  '34':
  - type: text
    content: 'Whenever Moses '
  - type: note
    content: 2 Cor. 3:16
  - type: text
    content: 'went in before the '
  - type: text
    content: Lord
  - type: text
    content: ' to speak with him, he would remove the veil, until he came out. And when he came out and told the people of Israel what he was commanded, '
  '35':
  - type: text
    content: 'the people of Israel would see the face of Moses, that the skin of Moses’ face was '
  - type: note
    content: ver. 29
  - type: text
    content: shining. And Moses would put the veil over his face again, until he went in to speak with him.
  '4':
  - type: text
    content: 'So Moses cut two tablets of stone like the first. And he rose early in the morning and went up on Mount Sinai, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him, and took in his hand two tablets of stone. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Num. 11:25; [1 Kgs. 8:10, 11]
  - type: text
    content: 'descended in the cloud and stood with him there, and '
  - type: note
    content: ch. 33:19
  - type: text
    content: 'proclaimed the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' passed before him and proclaimed, '
  - type: note
    content: Num. 14:18; 2 Chr. 30:9; Neh. 9:17; Ps. 86:15; 103:8; 111:4; 112:4; 116:5; 145:8; Joel 2:13
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ', a God merciful and '
  - type: note
    content: ch. 22:27
  - type: text
    content: 'gracious, slow to anger, and abounding in steadfast '
  - type: note
    content: Ps. 57:10; 108:4
  - type: text
    content: 'love and faithfulness, '
  '7':
  - type: note
    content: ch. 20:5, 6; Deut. 5:10; Jer. 32:18; Dan. 9:4
  - type: text
    content: keeping steadfast love for thousands,
  - type: note
    content: Or to the thousandth generation
  - type: text
    content: ' '
  - type: note
    content: Ps. 103:3; 130:4; Dan. 9:9; 1 John 1:9
  - type: text
    content: 'forgiving iniquity and transgression and sin, but '
  - type: note
    content: ch. 23:21; Josh. 24:19; Job 10:14; Nah. 1:3
  - type: text
    content: 'who will by no means clear the guilty, '
  - type: note
    content: Deut. 5:9
  - type: text
    content: 'visiting the iniquity of the fathers on the children and the children’s children, to the third and the fourth generation.” '
  '8':
  - type: text
    content: 'And Moses quickly '
  - type: note
    content: ch. 4:31; 12:27
  - type: text
    content: 'bowed his head toward the earth and worshiped. '
  '9':
  - type: text
    content: 'And he said, “If now I have found favor in your sight, O Lord, please '
  - type: note
    content: ch. 33:15, 16
  - type: text
    content: 'let the Lord go in the midst of us, for '
  - type: note
    content: See ch. 32:9
  - type: text
    content: 'it is a stiff-necked people, and pardon our iniquity and our sin, and take us for '
  - type: note
    content: Deut. 32:9; Ps. 28:9; 33:12; 78:62; 94:14; Jer. 10:16; Zech. 2:12
  - type: text
    content: your inheritance.”
  - type: heading
    content: The Covenant Renewed
