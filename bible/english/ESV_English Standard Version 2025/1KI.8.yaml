document_id: 1KI.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought into the Temple
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-9, see 2 Chr. 5:2-10
  - type: text
    content: 'Then Solomon assembled the elders of Israel and all the heads of the tribes, '
  - type: note
    content: Num. 1:16
  - type: text
    content: 'the leaders of the fathers’ houses of the people of Israel, before King Solomon in Jerusalem, '
  - type: note
    content: '[2 Sam. 6:17]'
  - type: text
    content: 'to bring up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' out of '
  - type: note
    content: See 2 Sam. 5:7
  - type: text
    content: 'the city of David, which is Zion. '
  '10':
  - type: text
    content: 'And when the priests came out of the Holy Place, '
  - type: note
    content: Ex. 40:34, 35; 2 Chr. 5:13, 14; 7:1, 2; [Ezek. 10:3, 4]
  - type: text
    content: 'a cloud filled the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'so that the priests could not stand to minister because of the cloud, for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Solomon Blesses the Lord
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-50, see 2 Chr. 6:1-39
  - type: text
    content: 'Then Solomon said, “The '
  - type: text
    content: Lord
  - type: note
    content: Septuagint The Lord has set the sun in the heavens, but
  - type: text
    content: ' has said that he would dwell '
  - type: note
    content: Ps. 18:11; 97:2; [Lev. 16:2]
  - type: text
    content: 'in thick darkness. '
  '13':
  - type: note
    content: 2 Sam. 7:13
  - type: text
    content: 'I have indeed built you an exalted house, '
  - type: note
    content: Ex. 15:17; [Ps. 132:14]
  - type: text
    content: 'a place for you to dwell in forever.” '
  '14':
  - type: text
    content: 'Then the king turned around and '
  - type: note
    content: ver. 55; 2 Sam. 6:18
  - type: text
    content: 'blessed all the assembly of Israel, while all the assembly of Israel stood. '
  '15':
  - type: text
    content: 'And he said, '
  - type: note
    content: Luke 1:68
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who with his hand has fulfilled '
  - type: note
    content: ch. 6:12
  - type: text
    content: 'what he promised with his mouth to David my father, saying, '
  '16':
  - type: note
    content: See 2 Sam. 7:4-16, 25
  - type: text
    content: '‘Since the day that I brought my people Israel out of Egypt, I chose no city out of all the tribes of Israel in which to build a house, '
  - type: note
    content: ver. 29; Deut. 12:11
  - type: text
    content: 'that my name might be there. '
  - type: note
    content: 1 Sam. 16:1; 2 Sam. 7:8; 1 Chr. 28:4
  - type: text
    content: 'But I chose David to be over my people Israel.’ '
  '17':
  - type: note
    content: 2 Sam. 7:2, 3; 1 Chr. 17:1, 2
  - type: text
    content: 'Now it was in the heart of David my father to build a house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '18':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to David my father, ‘Whereas it was in your heart to build a house for my name, you did well that it was in your heart. '
  '19':
  - type: note
    content: ch. 5:3, 5; 2 Sam. 7:5, 12, 13
  - type: text
    content: 'Nevertheless, you shall not build the house, but your son who shall be born to you shall build the house for my name.’ '
  '2':
  - type: text
    content: 'And all the men of Israel assembled to King Solomon at '
  - type: note
    content: ver. 65; Lev. 23:34; See 2 Chr. 7:8-10
  - type: text
    content: 'the feast in the month Ethanim, which is the seventh month. '
  '20':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' has fulfilled his promise that he made. For I have risen in the place of David my father, and sit on the throne of Israel, '
  - type: note
    content: 1 Chr. 28:5, 6
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised, and I have built the house for the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '21':
  - type: text
    content: 'And there I have provided a place for the ark, '
  - type: note
    content: ver. 9; Deut. 31:26
  - type: text
    content: 'in which is the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he made with our fathers, when he brought them out of the land of Egypt.”'
  - type: heading
    content: Solomon’s Prayer of Dedication
  '22':
  - type: text
    content: 'Then Solomon '
  - type: note
    content: ver. 54; 2 Chr. 6:12, 13
  - type: text
    content: 'stood before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of all the assembly of Israel and '
  - type: note
    content: '[Ex. 9:33; Ezra 9:5; Isa. 1:15]'
  - type: text
    content: 'spread out his hands toward heaven, '
  '23':
  - type: text
    content: 'and said, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, '
  - type: note
    content: Ex. 15:11; 2 Sam. 7:22
  - type: text
    content: 'there is no God like you, in heaven above or on earth beneath, '
  - type: note
    content: See Deut. 7:9
  - type: text
    content: 'keeping covenant and showing steadfast love to your servants who walk before you with all their heart; '
  '24':
  - type: text
    content: 'you have kept with your servant David my father what you declared to him. '
  - type: note
    content: '[See ver. 15 above]'
  - type: text
    content: 'You spoke with your mouth, and with your hand have fulfilled it this day. '
  '25':
  - type: text
    content: 'Now therefore, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, keep for your servant David my father what you have promised him, saying, '
  - type: note
    content: See ch. 2:4
  - type: text
    content: '‘You shall not lack a man to sit before me on the throne of Israel, if only your sons pay close attention to their way, to walk before me as you have walked before me.’ '
  '26':
  - type: note
    content: 2 Sam. 7:25
  - type: text
    content: Now therefore, O God of Israel, let your word be confirmed, which you have spoken to your servant David my father.
  '27':
  - type: text
    content: '“But will God indeed dwell on the earth? Behold, '
  - type: note
    content: 2 Chr. 2:6; [Isa. 66:1; Jer. 23:24; Acts 7:49; 17:24]
  - type: text
    content: 'heaven and the highest heaven cannot contain you; how much less this house that I have built! '
  '28':
  - type: text
    content: 'Yet have regard to the prayer of your servant and to his plea, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, listening to the cry and to the prayer that your servant prays before you this day, '
  '29':
  - type: note
    content: ver. 52; [2 Chr. 7:15; Neh. 1:6]
  - type: text
    content: 'that your eyes may be open night and day toward this house, the place of which you have said, '
  - type: note
    content: ver. 16; ch. 9:3; Deut. 12:11
  - type: text
    content: '‘My name shall be there,’ that you may listen to the prayer that your servant offers toward this place. '
  '3':
  - type: text
    content: 'And all the elders of Israel came, and '
  - type: note
    content: '[Num. 4:15; Deut. 31:9; Josh. 3:3, 6; 1 Chr. 15:14, 15]'
  - type: text
    content: 'the priests took up the ark. '
  '30':
  - type: text
    content: And listen to the plea of your servant and of your people Israel, when they pray toward this place. And listen in heaven your dwelling place, and when you hear, forgive.
  '31':
  - type: text
    content: '“If a man sins against his neighbor and is made to take '
  - type: note
    content: '[Ex. 22:11]'
  - type: text
    content: 'an oath and comes and swears his oath before your altar in this house, '
  '32':
  - type: text
    content: 'then hear in heaven and act and judge your servants, '
  - type: note
    content: Deut. 25:1
  - type: text
    content: condemning the guilty by bringing his conduct on his own head, and vindicating the righteous by rewarding him according to his righteousness.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Lev. 26:17; Deut. 28:45
  - type: text
    content: '“When your people Israel are defeated before the enemy because they have sinned against you, and '
  - type: note
    content: Lev. 26:40; [Neh. 1:9]
  - type: text
    content: 'if they turn again to you and acknowledge your name and pray and plead with you in this house, '
  '34':
  - type: text
    content: then hear in heaven and forgive the sin of your people Israel and bring them again to the land that you gave to their fathers.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Deut. 11:17; Luke 4:25; [ Lev. 26:17; Deut. 28:25 ]
  - type: text
    content: '“When heaven is shut up and there is no rain because they have sinned against you, if they pray toward this place and acknowledge your name and turn from their sin, when you afflict them, '
  '36':
  - type: text
    content: 'then hear in heaven and forgive the sin of your servants, your people Israel, when '
  - type: note
    content: '[Ps. 25:4; 27:11; 86:11]'
  - type: text
    content: 'you teach them '
  - type: note
    content: 1 Sam. 12:23
  - type: text
    content: the good way in which they should walk, and grant rain upon your land, which you have given to your people as an inheritance.
  '37':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 26:16, 25, 26; Deut. 28:21, 22, 37, 38, 42, 52; 2 Chr. 20:9 ]'
  - type: text
    content: “If there is famine in the land, if there is pestilence or blight or mildew or locust or caterpillar, if their enemy besieges them in the land at their gates,
  - type: note
    content: Septuagint, Syriac in any of their cities
  - type: text
    content: ' whatever plague, whatever sickness there is, '
  '38':
  - type: text
    content: 'whatever prayer, whatever plea is made by any man or by all your people Israel, each knowing the affliction of his own heart and stretching out his hands toward this house, '
  '39':
  - type: text
    content: then hear in heaven your dwelling place and forgive and act and render to each whose heart you know, according to all his ways (
  - type: note
    content: 1 Chr. 28:9; Acts 1:24; [1 Sam. 16:7; Jer. 17:10]
  - type: text
    content: 'for you, you only, know the hearts of all the children of mankind), '
  '4':
  - type: text
    content: 'And they brought up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ch. 3:4; 2 Chr. 1:3]'
  - type: text
    content: 'the tent of meeting, and all the holy vessels that were in the tent; the priests and the Levites brought them up. '
  '40':
  - type: text
    content: 'that they may fear you '
  - type: note
    content: Deut. 12:1
  - type: text
    content: all the days that they live in the land that you gave to our fathers.
  '41':
  - type: text
    content: '“Likewise, when a foreigner, who is not of your people Israel, comes from a far country for your name’s sake '
  '42':
  - type: text
    content: '(for they shall hear of your great name '
  - type: note
    content: Deut. 3:24; 2 Chr. 6:32
  - type: text
    content: 'and your mighty hand, and of your outstretched arm), when he comes and prays toward this house, '
  '43':
  - type: text
    content: 'hear in heaven your dwelling place and do according to all for which the foreigner calls to you, in order '
  - type: note
    content: ver. 60; [Josh. 4:24]
  - type: text
    content: 'that all the peoples of the earth may know your name and '
  - type: note
    content: Ps. 102:15
  - type: text
    content: fear you, as do your people Israel, and that they may know that this house that I have built is called by your name.
  '44':
  - type: text
    content: '“If your people go out to battle against their enemy, by whatever way you shall send them, and they pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[ver. 48]'
  - type: text
    content: 'toward the city that you have chosen and the house that I have built for your name, '
  '45':
  - type: text
    content: then hear in heaven their prayer and their plea, and maintain their cause.
  '46':
  - type: text
    content: “If they sin against you—
  - type: note
    content: Prov. 20:9; Eccles. 7:20; Rom. 3:23; James 3:2; 1 John 1:8, 10
  - type: text
    content: 'for there is no one who does not sin—and you are angry with them and give them to an enemy, so that they are carried away captive '
  - type: note
    content: Lev. 26:34, 44; Deut. 28:36, 64
  - type: text
    content: 'to the land of the enemy, far off or near, '
  '47':
  - type: text
    content: 'yet '
  - type: note
    content: Lev. 26:40
  - type: text
    content: 'if they turn their heart in the land to which they have been carried captive, and repent and plead with you in the land of their captors, saying, '
  - type: note
    content: Neh. 1:6; Ps. 106:6; Dan. 9:5
  - type: text
    content: '‘We have sinned and have acted perversely and wickedly,’ '
  '48':
  - type: note
    content: 1 Sam. 7:3; Jer. 29:12-14
  - type: text
    content: 'if they repent with all their heart and with all their soul in the land of their enemies, who carried them captive, and pray to you '
  - type: note
    content: Dan. 6:10; [ver. 44; Ps. 5:7; Jonah 2:4]
  - type: text
    content: 'toward their land, which you gave to their fathers, the city that you have chosen, and the house that I have built for your name, '
  '49':
  - type: text
    content: 'then hear in heaven your dwelling place their prayer and their plea, and maintain their cause '
  '5':
  - type: text
    content: 'And King Solomon and all the congregation of Israel, who had assembled before him, were with him before the ark, '
  - type: note
    content: '[2 Sam. 6:13]'
  - type: text
    content: 'sacrificing so many sheep and oxen that they could not be counted or numbered. '
  '50':
  - type: text
    content: 'and forgive your people who have sinned against you, and all their transgressions that they have committed against you, and '
  - type: note
    content: Ps. 106:46
  - type: text
    content: 'grant them compassion in the sight of those who carried them captive, that they may have compassion on them '
  '51':
  - type: text
    content: (
  - type: note
    content: Deut. 9:29; [Neh. 1:10]
  - type: text
    content: 'for they are your people, and your heritage, which you brought out of Egypt, '
  - type: note
    content: Deut. 4:20; Jer. 11:4
  - type: text
    content: 'from the midst of the iron furnace). '
  '52':
  - type: note
    content: '[ver. 29]'
  - type: text
    content: 'Let your eyes be open to the plea of your servant and to the plea of your people Israel, giving ear to them whenever they call to you. '
  '53':
  - type: text
    content: 'For you separated them from among all the peoples of the earth to be your heritage, '
  - type: note
    content: Ex. 19:5, 6; Deut. 9:26, 29; 14:2
  - type: text
    content: 'as you declared through Moses your servant, when you brought our fathers out of Egypt, O Lord '
  - type: text
    content: God
  - type: text
    content: .”
  - type: heading
    content: Solomon’s Benediction
  '54':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 7:1
  - type: text
    content: 'Now as Solomon finished offering all this prayer and plea to the '
  - type: text
    content: Lord
  - type: text
    content: ', he arose from before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', where he had '
  - type: note
    content: '[2 Chr. 6:13]'
  - type: text
    content: 'knelt with hands outstretched toward heaven. '
  '55':
  - type: text
    content: 'And he stood and '
  - type: note
    content: ver. 14
  - type: text
    content: 'blessed all the assembly of Israel with a loud voice, saying, '
  '56':
  - type: text
    content: '“Blessed be the '
  - type: text
    content: Lord
  - type: text
    content: ' who has given rest to his people Israel, according to all that he promised. '
  - type: note
    content: Josh. 21:45; 23:14
  - type: text
    content: 'Not one word has failed of all his good promise, which he spoke by Moses his servant. '
  '57':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' our God be with us, as he was with our fathers. '
  - type: note
    content: '[Deut. 31:6; Josh. 1:5; 1 Sam. 12:22]'
  - type: text
    content: 'May he not leave us or forsake us, '
  '58':
  - type: text
    content: 'that he may '
  - type: note
    content: Ps. 119:36
  - type: text
    content: 'incline our hearts to him, to walk in all his ways and to keep his commandments, his statutes, and his rules, which he commanded our fathers. '
  '59':
  - type: text
    content: 'Let these words of mine, with which I have pleaded before the '
  - type: text
    content: Lord
  - type: text
    content: ', be near to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God day and night, and may he maintain the cause of his servant and the cause of his people Israel, as each day requires, '
  '6':
  - type: note
    content: 2 Sam. 6:17
  - type: text
    content: 'Then the priests brought the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 26:33, 34
  - type: text
    content: 'to its place in '
  - type: note
    content: See ch. 6:5
  - type: text
    content: 'the inner sanctuary of the house, in the Most Holy Place, underneath the wings of the cherubim. '
  '60':
  - type: text
    content: 'that '
  - type: note
    content: ver. 43
  - type: text
    content: 'all the peoples of the earth may know that '
  - type: note
    content: Deut. 4:35, 39; [ch. 18:39]
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is God; there is no other. '
  '61':
  - type: note
    content: 2 Kgs. 20:3; [ch. 11:4; 15:3, 14]
  - type: text
    content: 'Let your heart therefore be wholly true to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, walking in his statutes and keeping his commandments, as at this day.”'
  - type: heading
    content: Solomon’s Sacrifices
  '62':
  - type: text
    content: ' '
  - type: note
    content: For ver. 62-66, see 2 Chr. 7:4-10
  - type: text
    content: 'Then '
  - type: note
    content: '[Ezra 6:16, 17]'
  - type: text
    content: 'the king, and all Israel with him, offered sacrifice before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'Solomon offered as peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' 22,000 oxen and 120,000 sheep. So the king and all the people of Israel dedicated the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '64':
  - type: text
    content: 'The same day the king consecrated the middle of the court that was before the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', for there he offered the burnt offering and the grain offering and the fat pieces of the peace offerings, because '
  - type: note
    content: See 2 Chr. 4:1
  - type: text
    content: 'the bronze altar that was before the '
  - type: text
    content: Lord
  - type: text
    content: ' was too small to receive the burnt offering and the grain offering and the fat pieces of the peace offerings.'
  '65':
  - type: text
    content: 'So Solomon held '
  - type: note
    content: ver. 2; Lev. 23:34
  - type: text
    content: 'the feast at that time, and all Israel with him, a great assembly, from '
  - type: note
    content: Num. 13:21; 34:8
  - type: text
    content: 'Lebo-hamath to '
  - type: note
    content: Num. 34:5; 2 Kgs. 24:7
  - type: text
    content: 'the Brook of Egypt, before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, seven days.'
  - type: note
    content: Septuagint; Hebrew seven days and seven days, fourteen days
  - type: text
    content: ' '
  '66':
  - type: text
    content: 'On the eighth day he sent the people away, and they blessed the king and went to their homes joyful and glad of heart for all the goodness that the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown to David his servant and to Israel his people.'
  '7':
  - type: text
    content: 'For the cherubim spread out their wings over the place of the ark, so that the cherubim overshadowed the ark and its poles. '
  '8':
  - type: note
    content: Ex. 25:13-15
  - type: text
    content: 'And the poles were so long that the ends of the poles were seen from the Holy Place before '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'the inner sanctuary; but they could not be seen from outside. And they are there to this day. '
  '9':
  - type: text
    content: 'There was nothing in the ark except '
  - type: note
    content: Ex. 25:21; 40:20; Deut. 10:2, 5; Heb. 9:4
  - type: text
    content: 'the two tablets of stone that Moses put there at Horeb, where '
  - type: note
    content: Ex. 34:27, 28; Deut. 4:13
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with the people of Israel, when they came out of the land of Egypt. '
