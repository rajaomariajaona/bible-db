document_id: 2CO.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Final Warnings
  - type: text
    content: ' '
  - type: note
    content: See ch. 12:14
  - type: text
    content: 'This is the third time I am coming to you. Every charge must be established '
  - type: note
    content: Cited from Deut. 19:15; See Num. 35:30
  - type: text
    content: 'by the evidence of two or three witnesses. '
  '10':
  - type: text
    content: 'For this reason I write these things while I am away from you, that when I come '
  - type: note
    content: '[ch. 2:3]'
  - type: text
    content: 'I may not have to be '
  - type: note
    content: Titus 1:13
  - type: text
    content: 'severe in my use of '
  - type: note
    content: ch. 10:8
  - type: text
    content: the authority that the Lord has given me for building up and not for tearing down.
  - type: heading
    content: Final Greetings
  '11':
  - type: text
    content: Finally, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' rejoice. '
  - type: note
    content: See Luke 6:40
  - type: text
    content: Aim for restoration, comfort one another,
  - type: note
    content: Or listen to my appeal
  - type: text
    content: ' '
  - type: note
    content: See Rom. 12:16
  - type: text
    content: 'agree with one another, '
  - type: note
    content: See Mark 9:50
  - type: text
    content: 'live in peace; and the God of love and '
  - type: note
    content: See Rom. 15:33
  - type: text
    content: 'peace will be with you. '
  '12':
  - type: note
    content: See Rom. 16:16
  - type: text
    content: 'Greet one another with a holy kiss. '
  '13':
  - type: note
    content: Phil. 4:22
  - type: text
    content: All the saints greet you.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Rom. 16:20
  - type: text
    content: 'The grace of the Lord Jesus Christ and '
  - type: note
    content: Jude 21
  - type: text
    content: 'the love of God and '
  - type: note
    content: Phil. 2:1
  - type: text
    content: the fellowship of the Holy Spirit be with you all.
  '2':
  - type: note
    content: ch. 10:2
  - type: text
    content: 'I warned '
  - type: note
    content: ch. 12:21
  - type: text
    content: 'those who sinned before and all the others, and I warn them now while absent, as I did when present on my second visit, that '
  - type: note
    content: ver. 10; See 1 Cor. 4:21
  - type: text
    content: 'if I come again I will not spare them— '
  '3':
  - type: text
    content: 'since you seek proof that Christ '
  - type: note
    content: See Matt. 10:20; 1 Cor. 5:4
  - type: text
    content: 'is speaking in me. He is not weak in dealing with you, but '
  - type: note
    content: ch. 10:4
  - type: text
    content: 'is powerful among you. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: '[Phil. 2:7, 8; 1 Pet. 3:18]'
  - type: text
    content: 'he was crucified in weakness, but '
  - type: note
    content: See Rom. 1:4; 6:4
  - type: text
    content: 'lives by the power of God. For '
  - type: note
    content: '[ch. 12:10]'
  - type: text
    content: 'we also are weak in him, but in dealing with you '
  - type: note
    content: See Rom. 6:8
  - type: text
    content: we will live with him by the power of God.
  '5':
  - type: text
    content: 'Examine yourselves, to see whether you are in the faith. '
  - type: note
    content: '[1 Cor. 11:28; Gal. 6:4]'
  - type: text
    content: 'Test yourselves. Or do you not realize this about yourselves, that '
  - type: note
    content: Rom. 8:10; Gal. 4:19
  - type: text
    content: 'Jesus Christ is in you?—unless indeed you fail to meet the test! '
  '6':
  - type: text
    content: 'I hope you will find out that we have not failed the test. '
  '7':
  - type: text
    content: 'But we pray to God that you may not do wrong—not that we may appear to have met the test, but that you may do what is right, though we may seem to have failed. '
  '8':
  - type: text
    content: 'For we cannot do anything against the truth, but only for the truth. '
  '9':
  - type: text
    content: 'For we are glad when '
  - type: note
    content: 1 Cor. 4:10; [ch. 4:12; 12:5, 9, 10]
  - type: text
    content: 'we are weak and you are strong. Your '
  - type: note
    content: Eph. 4:12; 1 Thess. 3:10; [ver. 11]
  - type: text
    content: 'restoration is what we pray for. '
