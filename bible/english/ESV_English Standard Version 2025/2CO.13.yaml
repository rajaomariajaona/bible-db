        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 4:21
      marker-yv: yv-n
    - type: text
      text: 'if I come again I will not spare them— '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
