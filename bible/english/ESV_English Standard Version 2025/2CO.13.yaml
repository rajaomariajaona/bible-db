      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:19
      marker-yv: yv-n
    - type: text
      text: 'Jesus Christ is in you?—unless indeed you fail to meet the test! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hope you will find out that we have not failed the test. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we pray to God that you may not do wrong—not that we may appear to have met the test, but that you may do what is right, though we may seem to have failed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we cannot do anything against the truth, but only for the truth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are glad when '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
