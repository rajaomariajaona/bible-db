  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Examine yourselves, to see whether you are in the faith. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 11:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 6:4
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Test yourselves. Or do you not realize this about yourselves, that '
    - type: usfm
      marker: x
      children:
