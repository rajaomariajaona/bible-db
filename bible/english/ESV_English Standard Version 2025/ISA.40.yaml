document_id: ISA.40,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Comfort for God’s People
  - type: text
    content: ' '
  - type: note
    content: ch. 51:12; [ Luke 2:25 ]
  - type: text
    content: Comfort, comfort my people, says your God.
  '10':
  - type: text
    content: ' '
  - type: note
    content: ch. 59:16, 17; [ Luke 11:22 ]
  - type: text
    content: 'Behold, the Lord '
  - type: text
    content: God
  - type: text
    content: ' comes with might,'
  - type: text
    content: and his arm rules for him;
  - type: note
    content: ch. 62:11; [ Rev. 22:12 ]
  - type: text
    content: behold, his reward is with him,
  - type: text
    content: and his recompense before him.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 34:23; Zech. 11:7; [ John 10:11; 21:15; Acts 20:28 ]
  - type: text
    content: He will tend his flock like a shepherd;
  - type: note
    content: '[ Matt. 18:12; Luke 15:5 ]'
  - type: text
    content: he will gather the lambs in his arms;
  - type: note
    content: '[ Num. 11:12 ]'
  - type: text
    content: he will carry them in his bosom,
  - type: text
    content: and gently lead those that are with young.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 30:4 ]'
  - type: text
    content: Who has measured the waters in the hollow of his hand
  - type: text
    content: and marked off the heavens with a span,
  - type: text
    content: enclosed the dust of the earth in a measure
  - type: text
    content: and weighed the mountains in scales
  - type: text
    content: and the hills in a balance?
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cited Rom. 11:34; [ 1 Cor. 2:16 ]
  - type: text
    content: Who has measured
  - type: note
    content: Or has directed
  - type: text
    content: ' the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: or what man shows him his counsel?
  '14':
  - type: text
    content: Whom did he consult,
  - type: text
    content: and who made him understand?
  - type: note
    content: Job 21:22
  - type: text
    content: Who taught him the path of justice,
  - type: text
    content: and taught him knowledge,
  - type: text
    content: and showed him the way of understanding?
  '15':
  - type: text
    content: Behold, the nations are like a drop from a bucket,
  - type: text
    content: 'and are accounted '
  - type: note
    content: ch. 29:5
  - type: text
    content: as the dust on the scales;
  - type: text
    content: 'behold, he takes up '
  - type: note
    content: ch. 41:1
  - type: text
    content: the coastlands like fine dust.
  '16':
  - type: text
    content: Lebanon would not suffice for fuel,
  - type: text
    content: 'nor are '
  - type: note
    content: '[Ps. 50:10]'
  - type: text
    content: its beasts enough for a burnt offering.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps. 62:9; Dan. 4:35; [ch. 41:12 ]
  - type: text
    content: All the nations are as nothing before him,
  - type: text
    content: they are accounted by him as less than nothing and emptiness.
  '18':
  - type: text
    content: ' '
  - type: note
    content: ver. 25 ; ch. 46:5; Acts 17:29
  - type: text
    content: To whom then will you liken God,
  - type: note
    content: '[ Hos. 13:2 ]'
  - type: text
    content: or what likeness compare with him?
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 18 above]'
  - type: text
    content: An idol! A craftsman casts it,
  - type: text
    content: and a goldsmith overlays it with gold
  - type: text
    content: and casts for it silver chains.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Hos. 2:14
  - type: text
    content: Speak tenderly to Jerusalem,
  - type: text
    content: and cry to her
  - type: text
    content: 'that '
  - type: note
    content: '[2 Chr. 36:22; Jer. 25:12]'
  - type: text
    content: her warfare
  - type: note
    content: Or hardship
  - type: text
    content: ' is ended,'
  - type: text
    content: that her iniquity is pardoned,
  - type: text
    content: 'that she has received from the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand
  - type: text
    content: double for all her sins.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ch. 46:6; Jer. 10:3-5; See ch. 44:9-15
  - type: text
    content: He who is too impoverished for an offering
  - type: text
    content: chooses wood
  - type: note
    content: Or He chooses valuable wood
  - type: text
    content: ' that will not rot;'
  - type: text
    content: he seeks out a skillful craftsman
  - type: text
    content: to set up an idol that will not move.
  '21':
  - type: text
    content: ' '
  - type: note
    content: ver. 28 ; [Acts 14:17; Rom. 1:19, 20]
  - type: text
    content: Do you not know? Do you not hear?
  - type: text
    content: Has it not been told you from the beginning?
  - type: text
    content: Have you not understood from the foundations of the earth?
  '22':
  - type: text
    content: It is he who sits above the circle of the earth,
  - type: text
    content: 'and its inhabitants are '
  - type: note
    content: '[Num. 13:33]'
  - type: text
    content: like grasshoppers;
  - type: note
    content: Job 9:8; Ps. 104:2
  - type: text
    content: who stretches out the heavens like a curtain,
  - type: text
    content: and spreads them like a tent to dwell in;
  '23':
  - type: text
    content: ' '
  - type: note
    content: Job 12:21; Ps. 107:40
  - type: text
    content: who brings princes to nothing,
  - type: text
    content: and makes the rulers of the earth as emptiness.
  '24':
  - type: text
    content: Scarcely are they planted, scarcely sown,
  - type: text
    content: scarcely has their stem taken root in the earth,
  - type: text
    content: when he blows on them, and they wither,
  - type: note
    content: ch. 41:2; [ Ps. 83:13 ]
  - type: text
    content: and the tempest carries them off like stubble.
  '25':
  - type: text
    content: ' '
  - type: note
    content: ver. 18
  - type: text
    content: To whom then will you compare me,
  - type: text
    content: that I should be like him? says the Holy One.
  '26':
  - type: text
    content: 'Lift up your eyes on high and see:'
  - type: text
    content: who created these?
  - type: note
    content: Ps. 147:4
  - type: text
    content: He who brings out their host by number,
  - type: text
    content: calling them all by name;
  - type: text
    content: by the greatness of his might
  - type: text
    content: and because he is strong in power,
  - type: text
    content: not one is missing.
  '27':
  - type: text
    content: Why do you say, O Jacob,
  - type: text
    content: and speak, O Israel,
  - type: note
    content: '[ch. 49:14 ]'
  - type: text
    content: '“My way is hidden from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 49:4 ]'
  - type: text
    content: and my right is disregarded by my God”?
  '28':
  - type: text
    content: Have you not known? Have you not heard?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is '
  - type: note
    content: '[Ps. 121:4]'
  - type: text
    content: the everlasting God,
  - type: text
    content: the Creator of the ends of the earth.
  - type: text
    content: He does not faint or grow weary;
  - type: note
    content: Ps. 147:5
  - type: text
    content: his understanding is unsearchable.
  '29':
  - type: text
    content: He gives power to the faint,
  - type: text
    content: and to him who has no might he increases strength.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cited Matt. 3:3; Mark 1:3; Luke 3:4; John 1:23
  - type: text
    content: 'A voice cries:'
  - type: note
    content: Or A voice of one crying
  - type: note
    content: Mal. 3:1; [ch. 57:14 ]
  - type: text
    content: '“In the wilderness prepare the way of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: Ps. 68:4
  - type: text
    content: make straight in the desert a highway for our God.
  '30':
  - type: text
    content: Even youths shall faint and be weary,
  - type: text
    content: and young men shall fall exhausted;
  '31':
  - type: text
    content: 'but '
  - type: note
    content: Ps. 103:5
  - type: text
    content: 'they who wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' shall renew their strength;'
  - type: text
    content: 'they shall mount up with wings '
  - type: note
    content: '[Ex. 19:4]'
  - type: text
    content: like eagles;
  - type: text
    content: they shall run and not be weary;
  - type: text
    content: they shall walk and not faint.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cited Luke 3:5; [ch. 49:11 ]
  - type: text
    content: Every valley shall be lifted up,
  - type: text
    content: and every mountain and hill be made low;
  - type: text
    content: the uneven ground shall become level,
  - type: text
    content: and the rough places a plain.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Luke 3:6 ]'
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' shall be revealed,'
  - type: text
    content: and all flesh shall see it together,
  - type: note
    content: ch. 1:20
  - type: text
    content: 'for the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  - type: heading
    content: The Word of God Stands Forever
  '6':
  - type: text
    content: A voice says, “Cry!”
  - type: text
    content: And I said,
  - type: note
    content: Revocalization based on Dead Sea Scroll, Septuagint, Vulgate; Masoretic Text And someone says
  - type: text
    content: ' “What shall I cry?”'
  - type: note
    content: Cited 1 Pet. 1:24, 25; [ Job 14:2; Ps. 102:11; 103:15; James 1:10 ]
  - type: text
    content: All flesh is grass,
  - type: text
    content: and all its beauty
  - type: note
    content: Or all its constancy
  - type: text
    content: ' is like the flower of the field.'
  '7':
  - type: text
    content: The grass withers, the flower fades
  - type: text
    content: 'when the breath of the '
  - type: text
    content: Lord
  - type: text
    content: ' blows on it;'
  - type: text
    content: surely the people are grass.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cited James 1:11
  - type: text
    content: The grass withers, the flower fades,
  - type: text
    content: but the word of our God will stand forever.
  - type: heading
    content: The Greatness of God
  '9':
  - type: text
    content: Go on up to a high mountain,
  - type: text
    content: 'O Zion, '
  - type: note
    content: ch. 52:7
  - type: text
    content: herald of good news;
  - type: note
    content: Or O herald of good news to Zion
  - type: text
    content: lift up your voice with strength,
  - type: text
    content: O Jerusalem, herald of good news;
  - type: note
    content: Or O herald of good news to Jerusalem
  - type: text
    content: lift it up, fear not;
  - type: text
    content: say to the cities of Judah,
  - type: text
    content: “Behold your God!”
