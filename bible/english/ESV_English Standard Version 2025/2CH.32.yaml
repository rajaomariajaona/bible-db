document_id: 2CH.32,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sennacherib Invades Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 1-22, see '
      - type: text
        text: 2 Kgs. 18:13–19:37; Isa. 36:1–37:38
      marker-yv: yv-n
    - type: text
      text: 'After these things and these acts of faithfulness, Sennacherib king of Assyria came and invaded Judah and encamped against the fortified cities, thinking to win them for himself. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says Sennacherib king of Assyria, ‘On what are you trusting, that you endure the siege in Jerusalem? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is not Hezekiah misleading you, that he may give you over to die by famine and by thirst, when he tells you, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God will deliver us from the hand of the king of Assyria”? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Has not this same Hezekiah taken away his high places and his altars and commanded Judah and Jerusalem, “Before one altar you shall worship, and on it you shall burn your sacrifices”? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know what I and my fathers have done to all the peoples of other lands? Were the gods of the nations of those lands at all able to deliver their lands out of my hand? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who among all the gods of those nations that my fathers devoted to destruction was able to deliver his people from my hand, that your God should be able to deliver you from my hand? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, therefore, do not let Hezekiah deceive you or mislead you in this fashion, and do not believe him, for no god of any nation or kingdom has been able to deliver his people from my hand or from the hand of my fathers. How much less will your God deliver you out of my hand!’”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And his servants said still more against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God and against his servant Hezekiah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he wrote letters to cast contempt on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, and to speak against him, saying, “Like the gods of the nations of the lands who have not delivered their people from my hands, so the God of Hezekiah will not deliver his people from my hand.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they shouted it with a loud voice in the language of Judah to the people of Jerusalem who were on the wall, to frighten and terrify them, in order that they might take the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they spoke of the God of Jerusalem as they spoke of the gods of the peoples of the earth, which are the work of men’s hands.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Delivers Jerusalem'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Hezekiah saw that Sennacherib had come and intended to fight against Jerusalem, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hezekiah the king and Isaiah the prophet, the son of Amoz, prayed because of this and cried to heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent an angel, who cut off all the mighty warriors and commanders and officers in the camp of the king of Assyria. So he returned with '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 44:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 7:19
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'shame of face to his own land. And when he came into the house of his god, some of his own sons struck him down there with the sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib king of Assyria and from the hand of all his enemies, and he provided for them on every side. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'brought gifts to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to Jerusalem and precious things to Hezekiah king of Judah, so that he was exalted in the sight of all nations from that time onward.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Pride and Achievements
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 20:1-11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 38:1-8
      marker-yv: yv-n
    - type: text
      text: 'In those days Hezekiah became sick and was at the point of death, and he prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he answered him and gave him a sign. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hezekiah '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 116:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'did not make return according to the benefit done to him, for '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:16
      marker-yv: yv-n
    - type: text
      text: 'his heart was proud. Therefore '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:18
      marker-yv: yv-n
    - type: text
      text: 'wrath came upon him and Judah and Jerusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hezekiah '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 26:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:12
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'humbled himself for the pride of his heart, both he and the inhabitants of Jerusalem, so that the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did not come upon them in the days of Hezekiah.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah had very great riches and honor, and he made for himself treasuries for silver, for gold, for precious stones, for spices, for shields, and for all kinds of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:10
      marker-yv: yv-n
    - type: text
      text: 'costly vessels; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'storehouses also for the yield of grain, wine, and oil; and stalls for all kinds of cattle, and sheepfolds. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He likewise provided cities for himself, and flocks and herds in abundance, for God had given him very great possessions. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he planned with his officers and his mighty men to stop the water of the springs that were outside the city; and they helped him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This same Hezekiah '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 20:20
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 22:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'closed the upper outlet of the waters of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 1:33
      marker-yv: yv-n
    - type: text
      text: 'Gihon and directed them down to the west side of the city of David. And Hezekiah prospered in all his works. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so in the matter of the envoys of the princes of Babylon, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 20:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 39:1
      marker-yv: yv-n
    - type: text
      text: 'who had been sent to him to inquire about '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      marker-yv: yv-n
    - type: text
      text: 'the sign that had been done in the land, God left him to himself, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 8:2
      marker-yv: yv-n
    - type: text
      text: in order to test him and to know all that was in his heart.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Hezekiah and his good deeds, behold, they are written '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: text
        text: Isa. 36–39
      marker-yv: yv-n
    - type: text
      text: 'in the vision of Isaiah the prophet, the son of Amoz, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: text
        text: 2 Kgs. 18–20
      marker-yv: yv-n
    - type: text
      text: 'in the Book of the Kings of Judah and Israel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah slept with his fathers, and they buried him in the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 15:30
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: upper part of the tombs of the sons of David, and all Judah and the inhabitants of Jerusalem did him honor at his death. And Manasseh his son reigned in his place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A great many people were gathered, and they stopped all the springs and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      marker-yv: yv-n
    - type: text
      text: 'the brook that flowed through the land, saying, “Why should the kings of Assyria come and find much water?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He set to work resolutely and built up '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:23
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 22:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: all the wall that was broken down and raised towers upon it,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vulgate; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and raised upon the towers
      marker-yv: yv-n
    - type: text
      text: ' and outside it he built another wall, and he strengthened the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 5:9
      marker-yv: yv-n
    - type: text
      text: 'Millo in the city of David. He also made weapons and shields in abundance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he set combat commanders over the people and gathered them together to him in the square at the gate of the city and spoke '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 40:2
      marker-yv: yv-n
    - type: text
      text: 'encouragingly to them, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 31:6
      marker-yv: yv-n
    - type: text
      text: '“Be strong and courageous. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:15
      marker-yv: yv-n
    - type: text
      text: 'Do not be afraid or dismayed before the king of Assyria and all the horde that is with him, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 6:16
      marker-yv: yv-n
    - type: text
      text: 'for there are more with us than with him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With him is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 17:5
      marker-yv: yv-n
    - type: text
      text: 'an arm of flesh, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:17
      marker-yv: yv-n
    - type: text
      text: 'but with us is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, to help us and to fight our battles.” And the people took confidence from the words of Hezekiah king of Judah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sennacherib Blasphemes
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, Sennacherib king of Assyria, who was besieging Lachish with all his forces, sent his servants to Jerusalem to Hezekiah king of Judah and to all the people of Judah who were in Jerusalem, saying, '
