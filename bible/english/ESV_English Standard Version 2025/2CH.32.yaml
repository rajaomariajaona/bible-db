document_id: 2CH.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Sennacherib Invades Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-22, see 2 Kgs. 18:13–19:37; Isa. 36:1–37:38
  - type: text
    content: 'After these things and these acts of faithfulness, Sennacherib king of Assyria came and invaded Judah and encamped against the fortified cities, thinking to win them for himself. '
  '10':
  - type: text
    content: '“Thus says Sennacherib king of Assyria, ‘On what are you trusting, that you endure the siege in Jerusalem? '
  '11':
  - type: text
    content: 'Is not Hezekiah misleading you, that he may give you over to die by famine and by thirst, when he tells you, “The '
  - type: text
    content: Lord
  - type: text
    content: ' our God will deliver us from the hand of the king of Assyria”? '
  '12':
  - type: note
    content: '[ch. 31:1]'
  - type: text
    content: 'Has not this same Hezekiah taken away his high places and his altars and commanded Judah and Jerusalem, “Before one altar you shall worship, and on it you shall burn your sacrifices”? '
  '13':
  - type: text
    content: 'Do you not know what I and my fathers have done to all the peoples of other lands? Were the gods of the nations of those lands at all able to deliver their lands out of my hand? '
  '14':
  - type: text
    content: 'Who among all the gods of those nations that my fathers devoted to destruction was able to deliver his people from my hand, that your God should be able to deliver you from my hand? '
  '15':
  - type: text
    content: Now, therefore, do not let Hezekiah deceive you or mislead you in this fashion, and do not believe him, for no god of any nation or kingdom has been able to deliver his people from my hand or from the hand of my fathers. How much less will your God deliver you out of my hand!’”
  '16':
  - type: text
    content: 'And his servants said still more against the '
  - type: text
    content: Lord
  - type: text
    content: ' God and against his servant Hezekiah. '
  '17':
  - type: text
    content: 'And he wrote letters to cast contempt on the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and to speak against him, saying, “Like the gods of the nations of the lands who have not delivered their people from my hands, so the God of Hezekiah will not deliver his people from my hand.” '
  '18':
  - type: text
    content: 'And they shouted it with a loud voice in the language of Judah to the people of Jerusalem who were on the wall, to frighten and terrify them, in order that they might take the city. '
  '19':
  - type: text
    content: And they spoke of the God of Jerusalem as they spoke of the gods of the peoples of the earth, which are the work of men’s hands.
  - type: heading
    content: The Lord Delivers Jerusalem
  '2':
  - type: text
    content: 'And when Hezekiah saw that Sennacherib had come and intended to fight against Jerusalem, '
  '20':
  - type: text
    content: 'Then Hezekiah the king and Isaiah the prophet, the son of Amoz, prayed because of this and cried to heaven. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' sent an angel, who cut off all the mighty warriors and commanders and officers in the camp of the king of Assyria. So he returned with '
  - type: note
    content: '[Ps. 44:15; Jer. 7:19]'
  - type: text
    content: 'shame of face to his own land. And when he came into the house of his god, some of his own sons struck him down there with the sword. '
  '22':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' saved Hezekiah and the inhabitants of Jerusalem from the hand of Sennacherib king of Assyria and from the hand of all his enemies, and he provided for them on every side. '
  '23':
  - type: text
    content: 'And many '
  - type: note
    content: '[ch. 17:5]'
  - type: text
    content: 'brought gifts to the '
  - type: text
    content: Lord
  - type: text
    content: ' to Jerusalem and precious things to Hezekiah king of Judah, so that he was exalted in the sight of all nations from that time onward.'
  - type: heading
    content: Hezekiah’s Pride and Achievements
  '24':
  - type: text
    content: ' '
  - type: note
    content: See 2 Kgs. 20:1-11; Isa. 38:1-8
  - type: text
    content: 'In those days Hezekiah became sick and was at the point of death, and he prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he answered him and gave him a sign. '
  '25':
  - type: text
    content: 'But Hezekiah '
  - type: note
    content: '[Ps. 116:12]'
  - type: text
    content: 'did not make return according to the benefit done to him, for '
  - type: note
    content: See ch. 26:16
  - type: text
    content: 'his heart was proud. Therefore '
  - type: note
    content: ch. 19:2; 24:18
  - type: text
    content: 'wrath came upon him and Judah and Jerusalem. '
  '26':
  - type: text
    content: 'But Hezekiah '
  - type: note
    content: Jer. 26:18, 19; [ch. 33:12]
  - type: text
    content: 'humbled himself for the pride of his heart, both he and the inhabitants of Jerusalem, so that the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' did not come upon them in the days of Hezekiah.'
  '27':
  - type: text
    content: 'And Hezekiah had very great riches and honor, and he made for himself treasuries for silver, for gold, for precious stones, for spices, for shields, and for all kinds of '
  - type: note
    content: ch. 36:10
  - type: text
    content: 'costly vessels; '
  '28':
  - type: text
    content: 'storehouses also for the yield of grain, wine, and oil; and stalls for all kinds of cattle, and sheepfolds. '
  '29':
  - type: text
    content: 'He likewise provided cities for himself, and flocks and herds in abundance, for God had given him very great possessions. '
  '3':
  - type: text
    content: 'he planned with his officers and his mighty men to stop the water of the springs that were outside the city; and they helped him. '
  '30':
  - type: text
    content: 'This same Hezekiah '
  - type: note
    content: 2 Kgs. 20:20; [Isa. 22:9, 11]
  - type: text
    content: 'closed the upper outlet of the waters of '
  - type: note
    content: 1 Kgs. 1:33
  - type: text
    content: 'Gihon and directed them down to the west side of the city of David. And Hezekiah prospered in all his works. '
  '31':
  - type: text
    content: 'And so in the matter of the envoys of the princes of Babylon, '
  - type: note
    content: 2 Kgs. 20:12; Isa. 39:1
  - type: text
    content: 'who had been sent to him to inquire about '
  - type: note
    content: ver. 24
  - type: text
    content: 'the sign that had been done in the land, God left him to himself, '
  - type: note
    content: Deut. 8:2
  - type: text
    content: in order to test him and to know all that was in his heart.
  '32':
  - type: text
    content: 'Now the rest of the acts of Hezekiah and his good deeds, behold, they are written '
  - type: note
    content: See Isa. 36–39
  - type: text
    content: 'in the vision of Isaiah the prophet, the son of Amoz, '
  - type: note
    content: See 2 Kgs. 18–20
  - type: text
    content: 'in the Book of the Kings of Judah and Israel. '
  '33':
  - type: text
    content: 'And Hezekiah slept with his fathers, and they buried him in the '
  - type: note
    content: '[2 Sam. 15:30]'
  - type: text
    content: upper part of the tombs of the sons of David, and all Judah and the inhabitants of Jerusalem did him honor at his death. And Manasseh his son reigned in his place.
  '4':
  - type: text
    content: 'A great many people were gathered, and they stopped all the springs and '
  - type: note
    content: ver. 30
  - type: text
    content: 'the brook that flowed through the land, saying, “Why should the kings of Assyria come and find much water?” '
  '5':
  - type: text
    content: 'He set to work resolutely and built up '
  - type: note
    content: ch. 25:23; [Isa. 22:9, 10]
  - type: text
    content: all the wall that was broken down and raised towers upon it,
  - type: note
    content: Vulgate; Hebrew and raised upon the towers
  - type: text
    content: ' and outside it he built another wall, and he strengthened the '
  - type: note
    content: See 2 Sam. 5:9
  - type: text
    content: 'Millo in the city of David. He also made weapons and shields in abundance. '
  '6':
  - type: text
    content: 'And he set combat commanders over the people and gathered them together to him in the square at the gate of the city and spoke '
  - type: note
    content: ch. 30:22; Isa. 40:2
  - type: text
    content: 'encouragingly to them, saying, '
  '7':
  - type: note
    content: See Deut. 31:6
  - type: text
    content: '“Be strong and courageous. '
  - type: note
    content: ch. 20:15
  - type: text
    content: 'Do not be afraid or dismayed before the king of Assyria and all the horde that is with him, '
  - type: note
    content: 2 Kgs. 6:16
  - type: text
    content: 'for there are more with us than with him. '
  '8':
  - type: text
    content: 'With him is '
  - type: note
    content: Jer. 17:5
  - type: text
    content: 'an arm of flesh, '
  - type: note
    content: ch. 15:2; 20:17
  - type: text
    content: 'but with us is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, to help us and to fight our battles.” And the people took confidence from the words of Hezekiah king of Judah.'
  - type: heading
    content: Sennacherib Blasphemes
  '9':
  - type: text
    content: 'After this, Sennacherib king of Assyria, who was besieging Lachish with all his forces, sent his servants to Jerusalem to Hezekiah king of Judah and to all the people of Judah who were in Jerusalem, saying, '
