document_id: JHN.13,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Washes the Disciples’ Feet
  - type: text
    content: 'Now '
  - type: note
    content: ch. 12:1
  - type: text
    content: 'before '
  - type: note
    content: See ch. 6:4
  - type: text
    content: 'the Feast of the Passover, when Jesus knew that '
  - type: note
    content: See ch. 12:23
  - type: text
    content: 'his hour had come '
  - type: note
    content: ver. 3; ch. 16:28
  - type: text
    content: 'to depart out of this world to the Father, '
  - type: note
    content: ver. 34
  - type: text
    content: 'having loved '
  - type: note
    content: ch. 1:11; 17:6, 9-11
  - type: text
    content: 'his own who were in the world, he loved them to the end. '
  '10':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“The one who has bathed does not need to wash, '
  - type: note
    content: See Gen. 18:4
  - type: text
    content: except for his feet,
  - type: note
    content: Some manuscripts omit except for his feet
  - type: text
    content: ' '
  - type: text
    content: 'but is completely clean. And '
  - type: note
    content: ch. 15:3
  - type: text
    content: you
  - type: note
    content: The Greek words for you in this verse are plural
  - type: text
    content: ' '
  - type: text
    content: 'are clean, '
  - type: note
    content: ver. 18
  - type: text
    content: but not every one of you.”
  - type: text
    content: ' '
  '11':
  - type: note
    content: ver. 2; ch. 6:64; See ch. 2:24, 25
  - type: text
    content: 'For he knew who was to betray him; that was why he said, '
  - type: text
    content: “Not all of you are clean.”
  '12':
  - type: text
    content: 'When he had washed their feet and '
  - type: note
    content: ver. 4
  - type: text
    content: 'put on his outer garments and resumed his place, he said to them, '
  - type: note
    content: ver. 7
  - type: text
    content: “Do you understand what I have done to you?
  - type: text
    content: ' '
  '13':
  - type: note
    content: Luke 6:46
  - type: text
    content: 'You call me '
  - type: note
    content: Matt. 23:8, 10; 1 Cor. 8:6; 12:3; Phil. 2:11
  - type: text
    content: Teacher and Lord, and you are right, for so I am.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'If I then, your Lord and Teacher, have washed your feet, '
  - type: note
    content: 1 Tim. 5:10; [1 Pet. 5:5]
  - type: text
    content: you also ought to wash one another’s feet.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'For I have given you an example, '
  - type: note
    content: See Matt. 11:29
  - type: text
    content: that you also should do just as I have done to you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: ch. 15:20; Matt. 10:24
  - type: text
    content: a servant
  - type: note
    content: Or bondservant, or slave (for the contextual rendering of the Greek word doulos, see Preface)
  - type: text
    content: ' '
  - type: text
    content: is not greater than his master, nor is a messenger greater than the one who sent him.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'If you know these things, '
  - type: note
    content: See Luke 11:28; James 1:22
  - type: text
    content: blessed are you if you do them.
  - type: text
    content: ' '
  '18':
  - type: note
    content: ver. 10, 11
  - type: text
    content: 'I am not speaking of all of you; I know '
  - type: note
    content: ch. 6:70; 15:16, 19; [Mark 3:13; Luke 6:13; Acts 1:2]
  - type: text
    content: 'whom I have chosen. But '
  - type: note
    content: '[ch. 17:12]; See Matt. 1:22'
  - type: text
    content: the Scripture will be fulfilled,
  - type: note
    content: Greek But in order that the Scripture may be fulfilled
  - type: text
    content: ' '
  - type: note
    content: Cited from Ps. 41:9; [ver. 26; Matt. 26:23]
  - type: text
    content: ‘He who ate my bread has lifted his heel against me.’
  - type: text
    content: ' '
  '19':
  - type: note
    content: ch. 14:29; 16:4
  - type: text
    content: I am telling you this now, before it takes place, that when it does take place you may believe that I am he.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'During supper, when '
  - type: note
    content: ver. 11, 27; [Acts 5:3]; See ch. 6:70, 71
  - type: text
    content: 'the devil had already put it into the heart of Judas Iscariot, Simon’s son, to betray him, '
  '20':
  - type: text
    content: 'Truly, truly, I say to you, '
  - type: note
    content: See Matt. 10:40
  - type: text
    content: whoever receives the one I send receives me, and whoever receives me receives the one who sent me.”
  - type: heading
    content: One of You Will Betray Me
  '21':
  - type: text
    content: 'After saying these things, '
  - type: note
    content: ch. 12:27
  - type: text
    content: 'Jesus was troubled in his spirit, and testified, '
  - type: note
    content: Matt. 26:21; Mark 14:18; Luke 22:21
  - type: text
    content: '“Truly, truly, I say to you, '
  - type: note
    content: Acts 1:17
  - type: text
    content: one of you will betray me.”
  - type: text
    content: ' '
  '22':
  - type: note
    content: Luke 22:23
  - type: text
    content: 'The disciples looked at one another, uncertain of whom he spoke. '
  '23':
  - type: note
    content: ch. 19:26; 20:2; 21:7, 20
  - type: text
    content: 'One of his disciples, whom Jesus loved, was reclining at table '
  - type: note
    content: '[Luke 16:22 (Gk.)]'
  - type: text
    content: at Jesus’ side,
  - type: note
    content: Greek in the bosom of Jesus
  - type: text
    content: ' '
  '24':
  - type: text
    content: so Simon Peter motioned to him to ask Jesus
  - type: note
    content: Greek lacks Jesus
  - type: text
    content: ' of whom he was speaking. '
  '25':
  - type: note
    content: Mark 4:36
  - type: text
    content: 'So that disciple, '
  - type: note
    content: ch. 21:20 (Gk.)
  - type: text
    content: 'leaning back against Jesus, said to him, “Lord, who is it?” '
  '26':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: Matt. 26:23; Mark 14:20
  - type: text
    content: '“It is he to whom I will give this morsel of bread '
  - type: note
    content: Ruth 2:14
  - type: text
    content: when I have dipped it.”
  - type: text
    content: ' So when he had dipped the morsel, '
  - type: note
    content: '[Matt. 26:25]'
  - type: text
    content: 'he gave it to Judas, '
  - type: note
    content: ch. 6:71
  - type: text
    content: 'the son of Simon Iscariot. '
  '27':
  - type: text
    content: 'Then after he had taken the morsel, '
  - type: note
    content: Luke 22:3; [ver. 2; 1 Cor. 11:27]
  - type: text
    content: 'Satan entered into him. Jesus said to him, '
  - type: note
    content: '[Luke 12:50]'
  - type: text
    content: “What you are going to do, do quickly.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Now no one at the table knew why he said this to him. '
  '29':
  - type: text
    content: 'Some thought that, '
  - type: note
    content: ch. 12:6
  - type: text
    content: 'because Judas had the moneybag, Jesus was telling him, “Buy what we need '
  - type: note
    content: ver. 1
  - type: text
    content: 'for the feast,” or that he should '
  - type: note
    content: ch. 12:5
  - type: text
    content: 'give something to the poor. '
  '3':
  - type: text
    content: 'Jesus, knowing '
  - type: note
    content: See ch. 17:2; Matt. 11:27; Rev. 2:27
  - type: text
    content: 'that the Father had given all things into his hands, and that '
  - type: note
    content: ch. 8:42; 16:28
  - type: text
    content: 'he had come from God and '
  - type: note
    content: See ch. 14:12
  - type: text
    content: 'was going back to God, '
  '30':
  - type: text
    content: 'So, after receiving the morsel of bread, he immediately went out. '
  - type: note
    content: '[1 Sam. 28:8]'
  - type: text
    content: And it was night.
  - type: heading
    content: A New Commandment
  '31':
  - type: text
    content: 'When he had gone out, Jesus said, '
  - type: note
    content: See ch. 7:39
  - type: text
    content: '“Now is the Son of Man glorified, and '
  - type: note
    content: ch. 14:13; 15:8; 17:1, 4; 1 Pet. 4:11
  - type: text
    content: God is glorified in him.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'If God is glorified in him, '
  - type: note
    content: ch. 17:1, 5
  - type: text
    content: 'God will also glorify him in himself, and '
  - type: note
    content: See ch. 12:23
  - type: text
    content: glorify him at once.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Little children, '
  - type: note
    content: See ch. 7:33
  - type: text
    content: 'yet a little while I am with you. You will seek me, and just '
  - type: note
    content: ch. 7:34; 8:21
  - type: text
    content: as I said to the Jews, so now I also say to you, ‘Where I am going you cannot come.’
  - type: text
    content: ' '
  '34':
  - type: note
    content: 1 John 2:7, 8; 3:11; 2 John 5
  - type: text
    content: 'A new commandment '
  - type: note
    content: ch. 15:12, 17; 1 John 3:23; 4:21
  - type: text
    content: 'I give to you, '
  - type: note
    content: Lev. 19:18; Rom. 13:8; Col. 3:14; 1 Thess. 4:9; 1 Tim. 1:5; 1 Pet. 1:22
  - type: text
    content: 'that you love one another: '
  - type: note
    content: ch. 15:12; Eph. 5:2; 1 John 4:10, 11
  - type: text
    content: just as I have loved you, you also are to love one another.
  - type: text
    content: ' '
  '35':
  - type: note
    content: '[1 John 3:14; 4:20]'
  - type: text
    content: By this all people will know that you are my disciples, if you have love for one another.”
  - type: heading
    content: Jesus Foretells Peter’s Denial
  '36':
  - type: text
    content: 'Simon Peter said to him, “Lord, where are you going?” '
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“Where I am going '
  - type: note
    content: '[ch. 7:34; 14:2]'
  - type: text
    content: 'you cannot follow me now, '
  - type: note
    content: ch. 21:18, 19; 2 Pet. 1:14
  - type: text
    content: but you will follow afterward.”
  - type: text
    content: ' '
  '37':
  - type: note
    content: Matt. 26:33-35; Mark 14:29-31; Luke 22:33, 34
  - type: text
    content: 'Peter said to him, “Lord, why can I not follow you now? I will lay down my life for you.” '
  '38':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Will you lay down your life for me? Truly, truly, I say to you, '
  - type: note
    content: ch. 18:27
  - type: text
    content: the rooster will not crow till you have denied me three times.
  '4':
  - type: text
    content: 'rose from supper. He laid aside his outer garments, and taking a towel, '
  - type: note
    content: '[ch. 21:7; Luke 22:27]'
  - type: text
    content: 'tied it around his waist. '
  '5':
  - type: text
    content: 'Then he '
  - type: note
    content: '[2 Kgs. 3:11]'
  - type: text
    content: 'poured water into a basin and began to wash the disciples’ feet and to wipe them with the towel that was wrapped around him. '
  '6':
  - type: text
    content: 'He came to Simon Peter, who said to him, “Lord, do you wash my feet?” '
  '7':
  - type: note
    content: '[ver. 36]'
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“What I am doing '
  - type: note
    content: ver. 12; [ch. 12:16; 15:15]
  - type: text
    content: you do not understand now, but afterward you will understand.”
  - type: text
    content: ' '
  '8':
  - type: note
    content: '[Matt. 16:22]'
  - type: text
    content: 'Peter said to him, “You shall never wash my feet.” Jesus answered him, '
  - type: note
    content: '[1 Cor. 6:11; Eph. 5:26; Titus 3:5; Heb. 10:22]'
  - type: text
    content: “If I do not wash you, you have no share with me.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Simon Peter said to him, “Lord, not my feet only but also my hands and my head!” '
