document_id: EZR.9,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Prays About Intermarriage
  - type: text
    content: 'After these things had been done, the officials approached me and said, “The people of Israel and the priests and the '
  - type: note
    content: '[ch. 6:21; Neh. 9:2]'
  - type: text
    content: 'Levites have not separated themselves from the peoples of the lands '
  - type: note
    content: Deut. 12:30, 31
  - type: text
    content: 'with their abominations, from the '
  - type: note
    content: See Ex. 13:5
  - type: text
    content: 'Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the Egyptians, and the Amorites. '
  '10':
  - type: text
    content: '“And now, O our God, what shall we say after this? For we have forsaken your commandments, '
  '11':
  - type: text
    content: 'which you commanded by your servants the prophets, saying, ‘The land that you are entering, to take possession of it, is a land impure with the impurity of the peoples of the lands, with their abominations that have filled it from end to end with '
  - type: note
    content: ch. 6:21
  - type: text
    content: 'their uncleanness. '
  '12':
  - type: note
    content: See ver. 2
  - type: text
    content: 'Therefore do not give your daughters to their sons, neither take their daughters for your sons, and never seek their peace or prosperity, that you may be strong and eat the good of the land '
  - type: note
    content: '[Prov. 13:22]'
  - type: text
    content: 'and leave it for an inheritance to your children forever.’ '
  '13':
  - type: text
    content: 'And after all that has come upon us for our evil deeds and for '
  - type: note
    content: ver. 6, 7
  - type: text
    content: 'our great guilt, seeing that you, our '
  - type: note
    content: Job 11:6; Ps. 103:10
  - type: text
    content: 'God, have punished us less than our iniquities deserved and have given us such a '
  - type: note
    content: ver. 8
  - type: text
    content: 'remnant as this, '
  '14':
  - type: text
    content: 'shall we break your commandments again and '
  - type: note
    content: See ver. 2
  - type: text
    content: 'intermarry with the peoples who practice these abominations? Would you not be angry with us '
  - type: note
    content: '[Deut. 9:8]'
  - type: text
    content: 'until you consumed us, so that there should be no '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'remnant, nor any to escape? '
  '15':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, you are just, for we are left a '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'remnant that has escaped, as it is today. Behold, we are before you in our '
  - type: note
    content: Neh. 9:33; Ps. 119:137; Jer. 12:1; Dan. 9:14
  - type: text
    content: 'guilt, '
  - type: note
    content: Ps. 130:3
  - type: text
    content: for none can stand before you because of this.”
  '2':
  - type: note
    content: ch. 10:2; Neh. 13:23, 27; [Ex. 34:16; Deut. 7:3; Neh. 10:30]
  - type: text
    content: 'For they have taken some of their daughters to be wives for themselves and for their sons, so that the '
  - type: note
    content: See Deut. 7:6
  - type: text
    content: holy race
  - type: note
    content: Hebrew offspring
  - type: text
    content: ' has '
  - type: note
    content: Ps. 106:35; [2 Cor. 6:14]
  - type: text
    content: 'mixed itself with the peoples of the lands. And in this faithlessness the hand of the officials and chief men has been foremost.” '
  '3':
  - type: text
    content: 'As soon as I heard this, I '
  - type: note
    content: See Josh. 7:6
  - type: text
    content: 'tore my garment and my cloak and pulled hair from my head and beard and '
  - type: note
    content: '[Neh. 1:4]'
  - type: text
    content: 'sat appalled. '
  '4':
  - type: text
    content: 'Then all who '
  - type: note
    content: ch. 10:3; Isa. 66:2, 5
  - type: text
    content: 'trembled at the words of the God of Israel, because of the faithlessness of the returned exiles, gathered around me while I sat '
  - type: note
    content: Ex. 29:39, 41
  - type: text
    content: 'appalled until the evening sacrifice. '
  '5':
  - type: text
    content: 'And at the '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'evening sacrifice I rose from my fasting, with my garment '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'and my cloak torn, and fell upon my knees '
  - type: note
    content: 1 Kgs. 8:22
  - type: text
    content: 'and spread out my hands to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God, '
  '6':
  - type: text
    content: 'saying:'
  - type: text
    content: '“O my God, I am ashamed and blush to lift my face to you, my God, for our iniquities '
  - type: note
    content: '[Ps. 38:4]'
  - type: text
    content: 'have risen higher than our heads, and our '
  - type: note
    content: ver. 7, 13, 15; ch. 10:10, 19; 2 Chr. 24:18
  - type: text
    content: 'guilt has '
  - type: note
    content: '[2 Chr. 28:9; Rev. 18:5]'
  - type: text
    content: 'mounted up to the heavens. '
  '7':
  - type: note
    content: Ps. 106:6; Dan. 9:5, 6
  - type: text
    content: 'From the days of our fathers to this day we have been in great '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'guilt. And for our iniquities we, our kings, and our priests have been given into the hand of the kings of the lands, to the sword, to captivity, to plundering, '
  - type: note
    content: Dan. 9:7, 8
  - type: text
    content: 'and to utter shame, as it is today. '
  '8':
  - type: text
    content: 'But now for a brief moment favor has been shown by the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, to leave us a '
  - type: note
    content: ver. 13, 14, 15
  - type: text
    content: 'remnant and to give us a '
  - type: note
    content: Isa. 22:23
  - type: text
    content: secure hold
  - type: note
    content: Hebrew nail, or tent-pin
  - type: text
    content: ' within his holy place, that our God may '
  - type: note
    content: Ps. 13:3
  - type: text
    content: 'brighten our eyes and grant us a little reviving in our slavery. '
  '9':
  - type: note
    content: '[Neh. 9:36]'
  - type: text
    content: 'For we are slaves. Yet our God has not forsaken us in our slavery, '
  - type: note
    content: ch. 7:28
  - type: text
    content: but has extended to us his steadfast love before the kings of Persia, to grant us some reviving to set up the house of our God, to repair its ruins, and to give us protection
  - type: note
    content: Hebrew a wall
  - type: text
    content: ' in Judea and Jerusalem.'
