  '1':
  - type: heading
    content: Do Not Go Down to Egypt
  - type: text
    content: '“Ah, '
  - type: note
    content: '[ch. 1:2, 4]'
  - type: text
    content: 'stubborn children,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 29:15 ]'
  - type: text
    content: “who carry out a plan, but not mine,
  - type: text
    content: 'and who make '
  - type: note
    content: ch. 25:7
  - type: text
    content: an alliance,
  - type: note
    content: Hebrew who weave a web
  - type: text
    content: ' but not of my Spirit,'
  - type: text
    content: that they may add sin to sin;
  '10':
  - type: text
    content: ' '
  - type: note
    content: Amos 2:12; [ Amos 7:12, 13 ]
  - type: text
    content: 'who say to '
  - type: note
    content: See 1 Sam. 9:9
  - type: text
    content: the seers, “Do not see,”
  - type: text
    content: and to the prophets, “Do not prophesy to us what is right;
  - type: text
    content: 'speak to us '
  - type: note
    content: '[1 Kgs. 22:13]; See Jer. 28:1-11; Ezek. 13:8-16'
  - type: text
    content: smooth things,
  - type: text
    content: prophesy illusions,
  '11':
  - type: text
    content: leave the way, turn aside from the path,
  - type: text
    content: let us hear no more about the Holy One of Israel.”
  '12':
  - type: text
    content: Therefore thus says the Holy One of Israel,
  - type: text
    content: “Because you despise this word
  - type: text
    content: 'and trust in '
  - type: note
    content: '[ch. 5:8, 20]'
  - type: text
    content: oppression and perverseness
  - type: text
    content: and rely on them,
  '13':
  - type: text
    content: therefore this iniquity shall be to you
  - type: note
    content: Ps. 62:3
  - type: text
    content: like a breach in a high wall, bulging out and about to collapse,
  - type: text
    content: whose breaking comes suddenly, in an instant;
  '14':
  - type: text
    content: 'and its breaking is '
  - type: note
    content: Ps. 2:9
  - type: text
    content: like that of a potter’s vessel
  - type: text
    content: that is smashed so ruthlessly
  - type: text
    content: that among its fragments not a shard is found
  - type: text
    content: with which to take fire from the hearth,
  - type: text
    content: or to dip up water out of the cistern.”
  '15':
  - type: text
    content: 'For thus said the Lord '
  - type: text
    content: God
  - type: text
    content: ', the Holy One of Israel,'
  - type: text
    content: '“In '
  - type: note
    content: Hos. 14:1
  - type: text
    content: returning
  - type: note
    content: Or repentance
  - type: text
    content: ' and '
  - type: note
    content: '[Ex. 14:14]'
  - type: text
    content: rest you shall be saved;
  - type: text
    content: in quietness and in trust shall be your strength.”
  - type: text
    content: 'But you were unwilling, '
  '16':
  - type: text
    content: and you said,
  - type: text
    content: '“No! We will flee upon '
  - type: note
    content: ch. 31:1, 3; [Hos. 14:3]
  - type: text
    content: horses”;
  - type: text
    content: therefore you shall flee away;
  - type: text
    content: and, “We will ride upon swift steeds”;
  - type: text
    content: therefore your pursuers shall be swift.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 26:8; Deut. 32:30 ]'
  - type: text
    content: A thousand shall flee at the threat of one;
  - type: text
    content: at the threat of five you shall flee,
  - type: text
    content: till you are left
  - type: text
    content: like a flagstaff on the top of a mountain,
  - type: text
    content: like a signal on a hill.
  - type: heading
    content: The Lord Will Be Gracious
  '18':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: '[Hab. 2:3]'
  - type: text
    content: waits to be gracious to you,
  - type: text
    content: 'and therefore he '
  - type: note
    content: ch. 5:16
  - type: text
    content: exalts himself to show mercy to you.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God of justice;'
  - type: note
    content: Ps. 2:12; 34:8; Prov. 16:20; Jer. 17:7
  - type: text
    content: blessed are all those who wait for him.
  '19':
  - type: text
    content: 'For a people shall dwell '
  - type: note
    content: '[ch. 14:32]'
  - type: text
    content: 'in Zion, in Jerusalem; you shall weep no more. He will surely be gracious to you at the sound of your cry. As soon as he hears it, he answers you. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 31:1; 36:6
  - type: text
    content: who set out to go down to Egypt,
  - type: text
    content: without asking for my direction,
  - type: text
    content: to take refuge in the protection of Pharaoh
  - type: text
    content: and to seek shelter in the shadow of Egypt!
  '20':
  - type: text
    content: 'And though the Lord give you the '
  - type: note
    content: 1 Kgs. 22:27; Ps. 127:2; [Ezek. 4:10, 11]
  - type: text
    content: 'bread of adversity and the '
  - type: note
    content: 1 Kgs. 22:27; Ps. 127:2; [Ezek. 4:10, 11]
  - type: text
    content: 'water of affliction, '
  - type: note
    content: '[ch. 3:1, 2]'
  - type: text
    content: 'yet your Teacher will not hide himself anymore, but your eyes shall see your Teacher. '
  '21':
  - type: note
    content: '[Jer. 31:33, 34]'
  - type: text
    content: 'And your ears shall hear a word behind you, saying, “This is '
  - type: note
    content: ch. 35:8; [Acts 9:2]
  - type: text
    content: 'the way, walk in it,” when you turn to the right or when you turn to the left. '
  '22':
  - type: text
    content: 'Then you will defile your carved idols overlaid with silver and your gold-plated metal images. '
  - type: note
    content: ch. 2:20; 31:7; [Hos. 14:8]
  - type: text
    content: You will scatter them as unclean things. You will say to them, “Be gone!”
  '23':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 32:20; Ps. 144:13, 14 ]'
  - type: text
    content: 'And he will give '
  - type: note
    content: '[Jer. 5:24]'
  - type: text
    content: 'rain for the seed with which you sow the ground, and bread, the produce of the ground, which will be rich and plenteous. '
  - type: note
    content: '[Ps. 65:13]'
  - type: text
    content: 'In that day your livestock will graze in large pastures, '
  '24':
  - type: text
    content: 'and '
  - type: note
    content: See Gen. 45:6
  - type: text
    content: 'the oxen and the donkeys that work the ground will eat seasoned fodder, which has been winnowed with shovel and fork. '
  '25':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 33:21; Ps. 107:35; Joel 3:18]'
  - type: text
    content: 'on every lofty mountain and every high hill there will be brooks running with water, in the day of the great slaughter, '
  - type: note
    content: ch. 32:19; [ch. 2:15]
  - type: text
    content: 'when the towers fall. '
  '26':
  - type: note
    content: ch. 60:19, 20
  - type: text
    content: 'Moreover, the light of the moon will be as the light of the sun, and the light of the sun will be sevenfold, as the light of seven days, in the day when '
  - type: note
    content: '[Hos. 6:1]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' binds up '
  - type: note
    content: '[ch. 1:5, 6]'
  - type: text
    content: the brokenness of his people, and heals the wounds inflicted by his blow.
  '27':
  - type: text
    content: 'Behold, the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' comes from afar,'
  - type: text
    content: burning with his anger, and in thick rising smoke;
  - type: note
    content: Hebrew in weight of uplifted clouds
  - type: text
    content: his lips are full of fury,
  - type: text
    content: and his tongue is like a devouring fire;
  '28':
  - type: text
    content: ' '
  - type: note
    content: ch. 11:4; 2 Thess. 2:8
  - type: text
    content: 'his breath is '
  - type: note
    content: '[ch. 8:8; Nah. 1:8]'
  - type: text
    content: like an overflowing stream
  - type: text
    content: that reaches up to the neck;
  - type: text
    content: to sift the nations with the sieve of destruction,
  - type: text
    content: 'and to place on the jaws of the peoples '
  - type: note
    content: ch. 37:29
  - type: text
    content: a bridle that leads astray.
  '29':
  - type: text
    content: 'You shall have a song as in the night when a holy feast is kept, and gladness of heart, '
  - type: note
    content: 1 Sam. 10:5; 1 Kgs. 1:40
