  - type: text
    content: ' '
  - type: note
    content: '[ver. 7; ch. 20:5 ]'
  - type: text
    content: Therefore shall the protection of Pharaoh turn to your shame,
  - type: text
    content: and the shelter in the shadow of Egypt to your humiliation.
  '30':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' '
