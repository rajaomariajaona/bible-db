  - type: text
    content: ' lays on them '
  - type: note
    content: Ex. 15:1
  - type: text
    content: 'will be to the sound of tambourines and lyres. '
  - type: note
    content: ch. 11:15; 19:16; [ch. 2:19]
  - type: text
    content: 'Battling with brandished arm, he will fight with them. '
