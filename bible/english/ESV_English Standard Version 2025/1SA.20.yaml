      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'David’s place was empty. And Saul said to Jonathan his son, “Why has not the son of Jesse come to the meal, either yesterday or today?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan answered Saul, '
    - type: usfm
