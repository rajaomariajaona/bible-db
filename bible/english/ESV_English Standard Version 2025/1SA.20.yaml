document_id: 1SA.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonathan Warns David
  - type: text
    content: 'Then David fled from Naioth '
  - type: note
    content: ch. 1:19
  - type: text
    content: 'in Ramah and came and said before Jonathan, “What have I done? What is my guilt? And what is my sin before your father, that he seeks my life?” '
  '10':
  - type: text
    content: 'Then David said to Jonathan, “Who will tell me if your father answers you roughly?” '
  '11':
  - type: text
    content: And Jonathan said to David, “Come, let us go out into the field.” So they both went out into the field.
  '12':
  - type: text
    content: 'And Jonathan said to David, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, be witness!'
  - type: note
    content: Hebrew lacks be witness
  - type: text
    content: ' When I have sounded out my father, about this time tomorrow, or the third day, behold, if he is well disposed toward David, shall I not then send and disclose it to you? '
  '13':
  - type: text
    content: 'But should it please my father to do you harm, '
  - type: note
    content: '[Ruth 1:17]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' do so to Jonathan and more also if I do not disclose it to you and send you away, that you may go in safety. '
  - type: note
    content: Josh. 1:5, 17; 1 Kgs. 1:37; 1 Chr. 22:11, 16; [ch. 17:37]
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you, as he has been with my father. '
  '14':
  - type: text
    content: 'If I am still alive, show me the steadfast love of the '
  - type: text
    content: Lord
  - type: text
    content: ', that I may not die; '
  '15':
  - type: note
    content: 2 Sam. 9:1, 3, 7; 21:7
  - type: text
    content: and do not cut off
  - type: note
    content: Or but if I die, do not cut off
  - type: text
    content: ' your steadfast love from my house forever, when the '
  - type: text
    content: Lord
  - type: text
    content: ' cuts off every one of the enemies of David from the face of the earth.” '
  '16':
  - type: text
    content: 'And Jonathan made a covenant with the house of David, saying, '
  - type: note
    content: '[ch. 25:22; Josh. 22:23]'
  - type: text
    content: “May
  - type: note
    content: Septuagint earth, 16let not the name of Jonathan be cut off from the house of David. And may
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' take vengeance on David’s enemies.” '
  '17':
  - type: text
    content: 'And Jonathan made David swear again by his love for him, '
  - type: note
    content: ch. 18:1, 3
  - type: text
    content: for he loved him as he loved his own soul.
  '18':
  - type: text
    content: 'Then Jonathan said to him, '
  - type: note
    content: ver. 5
  - type: text
    content: '“Tomorrow is the new moon, and '
  - type: note
    content: ver. 6
  - type: text
    content: 'you will be missed, because '
  - type: note
    content: ver. 25, 27
  - type: text
    content: 'your seat will be empty. '
  '19':
  - type: text
    content: On the third day go down quickly to the place where you hid yourself when the matter was in hand, and remain beside the stone heap.
  - type: note
    content: Septuagint; Hebrew the stone Ezel
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And he said to him, “Far from it! You shall not die. Behold, my father does nothing either great or small without disclosing it to me. And why should my father hide this from me? It is not so.” '
  '20':
  - type: text
    content: 'And I will shoot three arrows to the side of it, as though I shot at a mark. '
  '21':
  - type: text
    content: 'And behold, I will send the boy, saying, ‘Go, find the arrows.’ If I say to the boy, ‘Look, the arrows are on this side of you, take them,’ then you are to come, for, '
  - type: note
    content: ver. 3; See Ruth 3:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, it is safe for you and there is no danger. '
  '22':
  - type: text
    content: 'But if I say to the youth, '
  - type: note
    content: ver. 37
  - type: text
    content: '‘Look, the arrows are beyond you,’ then go, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent you away. '
  '23':
  - type: note
    content: ver. 14, 15
  - type: text
    content: 'And as for the matter of which you and I have spoken, behold, '
  - type: note
    content: ver. 42
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is between you and me forever.”'
  '24':
  - type: text
    content: 'So David hid himself in the field. And when the new moon came, the king sat down to eat food. '
  '25':
  - type: text
    content: The king sat on his seat, as at other times, on the seat by the wall. Jonathan sat opposite,
  - type: note
    content: Compare Septuagint; Hebrew stood up
  - type: text
    content: ' and Abner sat by Saul’s side, '
  - type: note
    content: ver. 18
  - type: text
    content: but David’s place was empty.
  '26':
  - type: text
    content: 'Yet Saul did not say anything that day, for he thought, “Something has happened to him. '
  - type: note
    content: Lev. 7:21; See Lev. 11:24-28; 15:1-4
  - type: text
    content: 'He is not clean; surely he is not clean.” '
  '27':
  - type: text
    content: 'But on '
  - type: note
    content: '[ver. 34]'
  - type: text
    content: 'the second day, the day after the new moon, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'David’s place was empty. And Saul said to Jonathan his son, “Why has not the son of Jesse come to the meal, either yesterday or today?” '
  '28':
  - type: text
    content: 'Jonathan answered Saul, '
  - type: note
    content: ver. 6
  - type: text
    content: '“David earnestly asked leave of me to go to Bethlehem. '
  '29':
  - type: text
    content: He said, ‘Let me go, for our clan holds a sacrifice in the city, and my brother has commanded me to be there. So now, if I have found favor in your eyes, let me get away and see my brothers.’ For this reason he has not come to the king’s table.”
  '3':
  - type: text
    content: 'But David vowed again, saying, “Your father knows well that '
  - type: note
    content: See Gen. 33:15
  - type: text
    content: 'I have found favor in your eyes, and he thinks, ‘Do not let Jonathan know this, lest he be grieved.’ But truly, '
  - type: note
    content: ch. 25:26; 2 Kgs. 2:2, 4, 6; 4:30; See Ruth 3:13
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and '
  - type: note
    content: ch. 1:26
  - type: text
    content: 'as your soul lives, there is but a step between me and death.” '
  '30':
  - type: text
    content: 'Then Saul’s anger was kindled against Jonathan, and he said to him, “You son of a perverse, rebellious woman, do I not know that you have chosen the son of Jesse to your own shame, and to the shame of your mother’s nakedness? '
  '31':
  - type: text
    content: 'For as long as the son of Jesse lives on the earth, neither you nor your kingdom shall be established. Therefore send and bring him to me, for he shall surely die.” '
  '32':
  - type: text
    content: 'Then Jonathan answered Saul his father, '
  - type: note
    content: ch. 19:5
  - type: text
    content: '“Why should he be put to death? What has he done?” '
  '33':
  - type: note
    content: ch. 18:11; 19:10
  - type: text
    content: 'But Saul hurled his spear at him to strike him. So Jonathan knew '
  - type: note
    content: ver. 7
  - type: text
    content: 'that his father was determined to put David to death. '
  '34':
  - type: text
    content: And Jonathan rose from the table in fierce anger and ate no food the second day of the month, for he was grieved for David, because his father had disgraced him.
  '35':
  - type: text
    content: 'In the morning Jonathan went out into the field to the appointment with David, and with him a little boy. '
  '36':
  - type: text
    content: 'And he said to his boy, “Run and find the arrows that I shoot.” As the boy ran, he shot an arrow beyond him. '
  '37':
  - type: text
    content: 'And when the boy came to the place of the arrow that Jonathan had shot, Jonathan called after the boy and said, '
  - type: note
    content: ver. 22
  - type: text
    content: '“Is not the arrow beyond you?” '
  '38':
  - type: text
    content: 'And Jonathan called after the boy, “Hurry! Be quick! Do not stay!” So Jonathan’s boy gathered up the arrows and came to his master. '
  '39':
  - type: text
    content: 'But the boy knew nothing. Only Jonathan and David knew the matter. '
  '4':
  - type: text
    content: 'Then Jonathan said to David, “Whatever you say, I will do for you.” '
  '40':
  - type: text
    content: 'And Jonathan gave his weapons to his boy and said to him, “Go and carry them to the city.” '
  '41':
  - type: text
    content: And as soon as the boy had gone, David rose from beside the stone heap
  - type: note
    content: Septuagint; Hebrew from beside the south
  - type: text
    content: ' and fell on his face to the ground and bowed three times. And they kissed one another and wept with one another, David weeping the most. '
  '42':
  - type: text
    content: 'Then Jonathan said to David, '
  - type: note
    content: ver. 13; ch. 1:17
  - type: text
    content: '“Go in peace, because we have sworn both of us in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, '
  - type: note
    content: ver. 23
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' shall be between me and you, '
  - type: note
    content: ver. 15
  - type: text
    content: and between my offspring and your offspring, forever.’” And he rose and departed, and Jonathan went into the city.
  - type: note
    content: This sentence is 21:1 in Hebrew
  '5':
  - type: text
    content: 'David said to Jonathan, “Behold, tomorrow is '
  - type: note
    content: ver. 18; Num. 10:10; 28:11
  - type: text
    content: 'the new moon, and I should not fail to sit at table with the king. But let me go, '
  - type: note
    content: ch. 19:2, 3
  - type: text
    content: 'that I may hide myself in the field till the third day at evening. '
  '6':
  - type: note
    content: ver. 18
  - type: text
    content: 'If your father misses me at all, then say, ‘David earnestly asked leave of me to run '
  - type: note
    content: ch. 16:4
  - type: text
    content: 'to Bethlehem his city, for there is a yearly '
  - type: note
    content: '[ch. 9:12]'
  - type: text
    content: 'sacrifice there for all the clan.’ '
  '7':
  - type: text
    content: 'If he says, ‘Good!’ it will be well with your servant, but if he is angry, then know that '
  - type: note
    content: ch. 25:17; Esth. 7:7; [ver. 33]
  - type: text
    content: 'harm is determined by him. '
  '8':
  - type: text
    content: 'Therefore deal kindly with your servant, '
  - type: note
    content: ver. 16, 42; ch. 18:3; 23:18; [2 Sam. 21:7]
  - type: text
    content: 'for you have brought your servant into a covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' with you. '
  - type: note
    content: 2 Sam. 14:32
  - type: text
    content: 'But if there is guilt in me, kill me yourself, for why should you bring me to your father?” '
  '9':
  - type: text
    content: 'And Jonathan said, “Far be it from you! If I knew that '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'it was determined by my father that harm should come to you, would I not tell you?” '
