        - type: text
          text: 4:30
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 3:13
      marker-yv: yv-n
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:26
      marker-yv: yv-n
    - type: text
      text: 'as your soul lives, there is but a step between me and death.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul’s anger was kindled against Jonathan, and he said to him, “You son of a perverse, rebellious woman, do I not know that you have chosen the son of Jesse to your own shame, and to the shame of your mother’s nakedness? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as long as the son of Jesse lives on the earth, neither you nor your kingdom shall be established. Therefore send and bring him to me, for he shall surely die.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jonathan answered Saul his father, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:5
      marker-yv: yv-n
    - type: text
      text: '“Why should he be put to death? What has he done?” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:10
      marker-yv: yv-n
    - type: text
      text: 'But Saul hurled his spear at him to strike him. So Jonathan knew '
    - type: usfm
      marker: x
      children:
