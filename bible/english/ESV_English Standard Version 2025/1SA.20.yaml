        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: '“David earnestly asked leave of me to go to Bethlehem. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, ‘Let me go, for our clan holds a sacrifice in the city, and my brother has commanded me to be there. So now, if I have found favor in your eyes, let me get away and see my brothers.’ For this reason he has not come to the king’s table.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David vowed again, saying, “Your father knows well that '
