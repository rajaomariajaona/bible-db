  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to him, “Far from it! You shall not die. Behold, my father does nothing either great or small without disclosing it to me. And why should my father hide this from me? It is not so.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will shoot three arrows to the side of it, as though I shot at a mark. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, I will send the boy, saying, ‘Go, find the arrows.’ If I say to the boy, ‘Look, the arrows are on this side of you, take them,’ then you are to come, for, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
