        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      marker-yv: yv-n
    - type: text
      text: 'that his father was determined to put David to death. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jonathan rose from the table in fierce anger and ate no food the second day of the month, for he was grieved for David, because his father had disgraced him.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the morning Jonathan went out into the field to the appointment with David, and with him a little boy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to his boy, “Run and find the arrows that I shoot.” As the boy ran, he shot an arrow beyond him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the boy came to the place of the arrow that Jonathan had shot, Jonathan called after the boy and said, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      marker-yv: yv-n
    - type: text
      text: '“Is not the arrow beyond you?” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan called after the boy, “Hurry! Be quick! Do not stay!” So Jonathan’s boy gathered up the arrows and came to his master. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the boy knew nothing. Only Jonathan and David knew the matter. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jonathan said to David, “Whatever you say, I will do for you.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jonathan gave his weapons to his boy and said to him, “Go and carry them to the city.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And as soon as the boy had gone, David rose from beside the stone heap
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: from beside the south
      marker-yv: yv-n
    - type: text
      text: ' and fell on his face to the ground and bowed three times. And they kissed one another and wept with one another, David weeping the most. '
  '42':
