document_id: 1CH.17,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant with David
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-27, see 2 Sam. 7:1-29
  - type: text
    content: 'Now when David lived in his house, David said to Nathan the prophet, “Behold, I dwell in a house of cedar, but the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' is under a tent.” '
  '10':
  - type: text
    content: 'from the time that I appointed judges over my people Israel. And I '
  - type: note
    content: '[2 Sam. 7:11]'
  - type: text
    content: 'will subdue all your enemies. Moreover, I declare to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' will build you a house. '
  '11':
  - type: text
    content: 'When your days are fulfilled to walk with your fathers, I will raise up your offspring after you, one of your own sons, and I will establish his kingdom. '
  '12':
  - type: text
    content: 'He shall build a house for me, and I will establish his throne forever. '
  '13':
  - type: note
    content: Cited Heb. 1:5
  - type: text
    content: 'I will be to him a father, and he shall be to me a son. I will not take my steadfast love from him, '
  - type: note
    content: '[1 Sam. 15:23, 28]'
  - type: text
    content: 'as I took it from him who was before you, '
  '14':
  - type: text
    content: 'but I will confirm him in my house and in my kingdom forever, and his throne shall be established forever.’” '
  '15':
  - type: text
    content: In accordance with all these words, and in accordance with all this vision, Nathan spoke to David.
  - type: heading
    content: David’s Prayer
  '16':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Who am I, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, and what is my house, that you have brought me thus far? '
  '17':
  - type: text
    content: And this was a small thing in your eyes, O God. You have also spoken of your servant’s house for a great while to come, and have shown me future generations,
  - type: note
    content: Or and you look upon me as a man of high rank
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ' God! '
  '18':
  - type: text
    content: 'And what more can David say to you for honoring your servant? For you know your servant. '
  '19':
  - type: note
    content: '[2 Sam. 7:21]'
  - type: text
    content: 'For your servant’s sake, O '
  - type: text
    content: Lord
  - type: text
    content: ', and according to your own heart, you have done all this greatness, in making known all these great things. '
  '2':
  - type: text
    content: And Nathan said to David, “Do all that is in your heart, for God is with you.”
  '20':
  - type: text
    content: 'There is none like you, O '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no God besides you, according to all that we have heard with our ears. '
  '21':
  - type: text
    content: And who is like your people Israel, the one
  - type: note
    content: Septuagint, Vulgate other
  - type: text
    content: ' nation on earth whom God went to redeem to be his people, making for yourself a name for great and awesome things, in driving out nations before your people whom you redeemed from Egypt? '
  '22':
  - type: text
    content: 'And you made your people Israel to be your people forever, and you, O '
  - type: text
    content: Lord
  - type: text
    content: ', became their God. '
  '23':
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', let the word that you have spoken concerning your servant and concerning his house be established forever, and do as you have spoken, '
  '24':
  - type: text
    content: 'and your name will be established and magnified forever, saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, is Israel’s God,’ and the house of your servant David will be established before you. '
  '25':
  - type: text
    content: 'For you, my God, have revealed to your servant that you will build a house for him. Therefore your servant has found courage to pray before you. '
  '26':
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', you are God, and you have promised this good thing to your servant. '
  '27':
  - type: text
    content: 'Now you have been pleased to bless the house of your servant, that it may continue forever before you, for it is you, O '
  - type: text
    content: Lord
  - type: text
    content: ', who have blessed, and it is blessed forever.”'
  '3':
  - type: text
    content: 'But that same night the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Nathan, '
  '4':
  - type: text
    content: '“Go and tell my servant David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: ch. 28:3
  - type: text
    content: 'It is not you who will build me a house to dwell in. '
  '5':
  - type: text
    content: 'For I have not lived in a house since the day I brought up Israel to this day, '
  - type: note
    content: '[2 Sam. 7:6]'
  - type: text
    content: 'but I have gone from tent to tent and from dwelling to dwelling. '
  '6':
  - type: text
    content: 'In all places where I have moved with all Israel, did I speak a word with any of the judges of Israel, whom I commanded to shepherd my people, saying, “Why have you not built me a house of cedar?”’ '
  '7':
  - type: text
    content: 'Now, therefore, thus shall you say to my servant David, ‘Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, I took you from the pasture, from following the sheep, to be prince over my people Israel, '
  '8':
  - type: text
    content: 'and I have been with you wherever you have gone and have cut off all your enemies from before you. And I will make for you a name, like the name of the great ones of the earth. '
  '9':
  - type: text
    content: 'And I will appoint a place for my people Israel and will plant them, that they may dwell in their own place and be disturbed no more. And violent men shall waste them no more, as formerly, '
