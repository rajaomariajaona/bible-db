verses:
  '1':
  - type: text
    content: The vision of Obadiah.
  - type: heading
    content: Edom Will Be Humbled
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' '
  - type: note
    content: See Jer. 49:7-22; Ezek. 25:12-14
  - type: text
    content: 'concerning Edom:'
  - type: note
    content: For ver. 1-4, see Jer. 49:14-16
  - type: text
    content: 'We have heard a report from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and a messenger has been sent among the nations:'
  - type: text
    content: “Rise up! Let us rise against her for battle!”
  '10':
  - type: text
    content: ' '
  - type: note
    content: Num. 20:20, 21
  - type: text
    content: Because of the violence done to your brother Jacob,
  - type: text
    content: shame shall cover you,
  - type: note
    content: '[ Ezek. 35:9 ]'
  - type: text
    content: and you shall be cut off forever.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps. 137:7; [ Jer. 12:14 ]
  - type: text
    content: On the day that you stood aloof,
  - type: note
    content: See 2 Kgs. 25:10-20
  - type: text
    content: on the day that strangers carried off his wealth
  - type: text
    content: and foreigners entered his gates
  - type: note
    content: Joel 3:3
  - type: text
    content: and cast lots for Jerusalem,
  - type: text
    content: you were like one of them.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Ps. 22:17 ]'
  - type: text
    content: But do not gloat over the day of your brother
  - type: text
    content: in the day of his misfortune;
  - type: note
    content: '[ Mic. 4:11; 7:8 ]'
  - type: text
    content: do not rejoice over the people of Judah
  - type: text
    content: in the day of their ruin;
  - type: note
    content: '[ 1 Sam. 2:3 ]'
  - type: text
    content: do not boast
  - type: note
    content: Hebrew do not enlarge your mouth
  - type: text
    content: in the day of distress.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ Prov. 17:5 ]'
  - type: text
    content: Do not enter the gate of my people
  - type: text
    content: in the day of their calamity;
  - type: note
    content: '[ Prov. 17:5 ]'
  - type: text
    content: do not gloat over his disaster
  - type: text
    content: in the day of his calamity;
  - type: note
    content: '[ Ezek. 35:10 ]'
  - type: text
    content: do not loot his wealth
  - type: text
    content: in the day of his calamity.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 21:21 ]'
  - type: text
    content: Do not stand at the crossroads
  - type: text
    content: to cut off his fugitives;
  - type: text
    content: do not hand over his survivors
  - type: text
    content: in the day of distress.
  - type: heading
    content: The Day of the Lord Is Near
  '15':
  - type: text
    content: 'For '
  - type: note
    content: See Joel 1:15
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near upon all the nations.'
  - type: note
    content: Jer. 50:29; Ezek. 35:15; Hab. 2:8
  - type: text
    content: As you have done, it shall be done to you;
  - type: text
    content: your deeds shall return on your own head.
  '16':
  - type: text
    content: ' '
  - type: note
    content: See Jer. 25:27, 28
  - type: text
    content: 'For as you have drunk on '
  - type: note
    content: See Joel 3:17
  - type: text
    content: my holy mountain,
  - type: text
    content: so all the nations shall drink continually;
  - type: text
    content: they shall drink and swallow,
  - type: text
    content: and shall be as though they had never been.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '[ Amos 9:8 ]; See Joel 2:32'
  - type: text
    content: But in Mount Zion there shall be those who escape,
  - type: text
    content: and it shall be holy,
  - type: note
    content: '[ Amos 9:12 ]'
  - type: text
    content: and the house of Jacob shall possess their own possessions.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Zech. 12:6; [ Isa. 10:17; Jer. 5:14 ]
  - type: text
    content: The house of Jacob shall be a fire,
  - type: text
    content: and the house of Joseph a flame,
  - type: text
    content: 'and the house of Esau '
  - type: note
    content: See Joel 2:5
  - type: text
    content: stubble;
  - type: text
    content: they shall burn them and consume them,
  - type: note
    content: Ezek. 25:14
  - type: text
    content: and there shall be no survivor for the house of Esau,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  - type: heading
    content: The Kingdom of the Lord
  '19':
  - type: text
    content: 'Those of '
  - type: note
    content: '[Josh. 10:40; Judg. 1:9]'
  - type: text
    content: 'the Negeb '
  - type: note
    content: '[See ver. 17 above]'
  - type: text
    content: 'shall possess '
  - type: note
    content: ver. 8
  - type: text
    content: Mount Esau,
  - type: text
    content: 'and those of the Shephelah shall possess '
  - type: note
    content: Jer. 17:26
  - type: text
    content: the land of the Philistines;
  - type: text
    content: 'they shall possess the land of Ephraim and the land of '
  - type: note
    content: See Jer. 23:13
  - type: text
    content: Samaria,
  - type: text
    content: and Benjamin shall possess Gilead.
  '2':
  - type: text
    content: Behold, I will make you small among the nations;
  - type: text
    content: you shall be utterly despised.
  - type: note
    content: Or Behold, I have made you small among the nations; you are utterly despised
  '20':
  - type: text
    content: The exiles of this host of the people of Israel
  - type: text
    content: 'shall possess the land of the Canaanites as far as '
  - type: note
    content: 1 Kgs. 17:9; [Luke 4:26]
  - type: text
    content: Zarephath,
  - type: text
    content: and the exiles of Jerusalem who are in Sepharad
  - type: text
    content: shall possess the cities of the Negeb.
  '21':
  - type: text
    content: ' '
  - type: note
    content: '[ 2 Kgs. 13:5; Isa. 19:20; 1 Tim. 4:16; James 5:20 ]'
  - type: text
    content: Saviors shall go up to Mount Zion
  - type: text
    content: 'to rule '
  - type: note
    content: '[See ver. 19 above]'
  - type: text
    content: Mount Esau,
  - type: text
    content: 'and '
  - type: note
    content: Ps. 22:28; Dan. 2:44; 7:14, 27; Zech. 14:9; Luke 1:33; 1 Cor. 15:24; Rev. 11:15; 19:6
  - type: text
    content: 'the kingdom shall be the '
  - type: text
    content: Lord
  - type: text
    content: ’s.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ Num. 24:21, 22 ]'
  - type: text
    content: The pride of your heart has deceived you,
  - type: text
    content: you who live in the clefts of the rock,
  - type: note
    content: Or of Sela
  - type: text
    content: in your lofty dwelling,
  - type: note
    content: '[ Isa. 14:13-15 ]'
  - type: text
    content: who say in your heart,
  - type: text
    content: “Who will bring me down to the ground?”
  '4':
  - type: text
    content: Though you soar aloft like the eagle,
  - type: text
    content: though your nest is set among the stars,
  - type: text
    content: from there I will bring you down,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'If '
  - type: note
    content: Jer. 49:9
  - type: text
    content: thieves came to you,
  - type: text
    content: if plunderers came by night—
  - type: text
    content: how you have been destroyed!—
  - type: text
    content: would they not steal only enough for themselves?
  - type: text
    content: 'If '
  - type: note
    content: Jer. 49:9
  - type: text
    content: grape gatherers came to you,
  - type: text
    content: would they not leave gleanings?
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 49:10 ]'
  - type: text
    content: How Esau has been pillaged,
  - type: text
    content: his treasures sought out!
  '7':
  - type: text
    content: All your allies have driven you to your border;
  - type: text
    content: those at peace with you have deceived you;
  - type: text
    content: they have prevailed against you;
  - type: note
    content: '[ Ps. 41:9 ]'
  - type: text
    content: those who eat your bread
  - type: note
    content: Hebrew lacks those who eat
  - type: text
    content: ' have set a trap beneath you—'
  - type: note
    content: '[ Jer. 49:7 ]'
  - type: text
    content: you have
  - type: note
    content: Hebrew he has
  - type: text
    content: ' no understanding.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 29:14 ]'
  - type: text
    content: 'Will I not on that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: destroy the wise men out of Edom,
  - type: text
    content: 'and understanding out of '
  - type: note
    content: '[Ezek. 35:2]'
  - type: text
    content: Mount Esau?
  '9':
  - type: text
    content: 'And your mighty men shall be dismayed, '
  - type: note
    content: Amos 1:12; See 1 Chr. 1:45
  - type: text
    content: O Teman,
  - type: text
    content: 'so that every man from '
  - type: note
    content: '[See ver. 8 above]'
  - type: text
    content: Mount Esau will be cut off by slaughter.
  - type: heading
    content: Edom’s Violence Against Jacob
