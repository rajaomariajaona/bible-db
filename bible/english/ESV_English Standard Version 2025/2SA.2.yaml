document_id: 2SA.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King of Judah
  - type: text
    content: 'After this David '
  - type: note
    content: See 1 Sam. 22:10
  - type: text
    content: 'inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I go up into any of the cities of Judah?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go up.” David said, “To which shall I go up?” And he said, “To '
  - type: note
    content: See Josh. 14:13
  - type: text
    content: 'Hebron.” '
  '10':
  - type: text
    content: 'Ish-bosheth, Saul’s son, was forty years old when he began to reign over Israel, and he reigned two years. But the house of Judah followed David. '
  '11':
  - type: note
    content: ch. 5:5; 1 Kgs. 2:11
  - type: text
    content: 'And the time that David was king in Hebron over '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: the house of Judah was seven years and six months.
  - type: heading
    content: The Battle of Gibeon
  '12':
  - type: text
    content: 'Abner the son of Ner, and the servants of Ish-bosheth the son of Saul, went out from Mahanaim to Gibeon. '
  '13':
  - type: text
    content: 'And Joab the son of Zeruiah and the servants of David went out and met them at '
  - type: note
    content: '[Jer. 41:12]'
  - type: text
    content: 'the pool of Gibeon. And they sat down, the one on the one side of the pool, and the other on the other side of the pool. '
  '14':
  - type: text
    content: 'And Abner said to Joab, “Let the young men arise and compete before us.” And Joab said, “Let them arise.” '
  '15':
  - type: text
    content: 'Then they arose and passed over by number, twelve for Benjamin and Ish-bosheth the son of Saul, and twelve of the servants of David. '
  '16':
  - type: text
    content: And each caught his opponent by the head and thrust his sword in his opponent’s side, so they fell down together. Therefore that place was called Helkath-hazzurim,
  - type: note
    content: Helkath-hazzurim means the field of sword-edges
  - type: text
    content: ' which is at Gibeon. '
  '17':
  - type: text
    content: And the battle was very fierce that day. And Abner and the men of Israel were beaten before the servants of David.
  '18':
  - type: text
    content: 'And the '
  - type: note
    content: 1 Chr. 2:16; [1 Sam. 26:6]
  - type: text
    content: 'three sons of Zeruiah were there, Joab, Abishai, and Asahel. Now Asahel was '
  - type: note
    content: '[ch. 22:34; 1 Chr. 12:8; Ps. 18:33; Song 2:17; 8:14; Hab. 3:19]'
  - type: text
    content: 'as swift of foot as a wild gazelle. '
  '19':
  - type: text
    content: 'And Asahel pursued Abner, and as he went, he turned neither to the right hand nor to the left from following Abner. '
  '2':
  - type: text
    content: 'So David went up there, and '
  - type: note
    content: See 1 Sam. 25:42, 43
  - type: text
    content: 'his two wives also, Ahinoam of Jezreel and Abigail the widow of Nabal of Carmel. '
  '20':
  - type: text
    content: 'Then Abner looked behind him and said, “Is it you, Asahel?” And he answered, “It is I.” '
  '21':
  - type: text
    content: 'Abner said to him, “Turn aside to your right hand or to your left, and seize one of the young men and take his spoil.” But Asahel would not turn aside from following him. '
  '22':
  - type: text
    content: 'And Abner said again to Asahel, “Turn aside from following me. Why should I strike you to the ground? How then could I lift up my face to your brother Joab?” '
  '23':
  - type: text
    content: 'But he refused to turn aside. Therefore Abner struck him '
  - type: note
    content: ch. 3:27; 4:6; 20:10
  - type: text
    content: in the stomach with the butt of his spear, so that the spear came out at his back. And he fell there and died where he was. And all who came to the place where Asahel had fallen and died, stood still.
  '24':
  - type: text
    content: 'But Joab and Abishai pursued Abner. And as the sun was going down they came to the hill of Ammah, which lies before Giah on the way to the wilderness of Gibeon. '
  '25':
  - type: text
    content: 'And the people of Benjamin gathered themselves together behind Abner and became one group and took their stand on the top of a hill. '
  '26':
  - type: text
    content: 'Then Abner called to Joab, “Shall the sword devour forever? Do you not know that the end will be bitter? How long will it be before you tell your people to turn from the pursuit of their brothers?” '
  '27':
  - type: text
    content: 'And Joab said, “As God lives, if '
  - type: note
    content: ver. 14; [Prov. 17:14]
  - type: text
    content: 'you had not spoken, surely the men would not have given up the pursuit of their brothers until the morning.” '
  '28':
  - type: text
    content: So Joab blew the trumpet, and all the men stopped and pursued Israel no more, nor did they fight anymore.
  '29':
  - type: text
    content: 'And Abner and his men went all that night through '
  - type: note
    content: See Deut. 1:1
  - type: text
    content: 'the Arabah. They crossed the Jordan, and marching the whole morning, they came to '
  - type: note
    content: ver. 8; See Josh. 13:26
  - type: text
    content: 'Mahanaim. '
  '3':
  - type: text
    content: 'And David brought up '
  - type: note
    content: 1 Sam. 27:2, 3; 30:1; See 1 Chr. 12:1-22
  - type: text
    content: 'his men who were with him, everyone with his household, and they lived in the towns of Hebron. '
  '30':
  - type: text
    content: 'Joab returned from the pursuit of Abner. And when he had gathered all the people together, there were missing from David’s servants nineteen men besides Asahel. '
  '31':
  - type: text
    content: 'But the servants of David had struck down of Benjamin 360 of Abner’s men. '
  '32':
  - type: text
    content: And they took up Asahel and buried him in the tomb of his father, which was at Bethlehem. And Joab and his men marched all night, and the day broke upon them at Hebron.
  '4':
  - type: text
    content: 'And the men of Judah came, and there they anointed David '
  - type: note
    content: ch. 5:5
  - type: text
    content: king over the house of Judah.
  - type: text
    content: 'When they told David, '
  - type: note
    content: 1 Sam. 31:11-13
  - type: text
    content: '“It was the men of Jabesh-gilead who buried Saul,” '
  '5':
  - type: text
    content: 'David sent messengers to the men of Jabesh-gilead and said to them, '
  - type: note
    content: See Ruth 2:20
  - type: text
    content: '“May you be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ', because you showed this loyalty to Saul your lord and buried him. '
  '6':
  - type: text
    content: 'Now may the '
  - type: text
    content: Lord
  - type: text
    content: ' show steadfast love and faithfulness to you. And I will do good to you because you have done this thing. '
  '7':
  - type: text
    content: 'Now therefore let your hands be strong, and be valiant, for Saul your lord is dead, and '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: the house of Judah has anointed me king over them.”
  - type: heading
    content: Ish-bosheth Made King of Israel
  '8':
  - type: text
    content: 'But '
  - type: note
    content: 1 Sam. 14:50
  - type: text
    content: 'Abner the son of Ner, commander of Saul’s army, took Ish-bosheth the son of Saul and brought him over to '
  - type: note
    content: See Josh. 13:26
  - type: text
    content: 'Mahanaim, '
  '9':
  - type: text
    content: 'and he made him king over Gilead and the Ashurites and Jezreel and Ephraim and Benjamin and all Israel. '
