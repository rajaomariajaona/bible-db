    marker-yv: yv-n
  - type: text
    text: 'the pool of Gibeon. And they sat down, the one on the one side of the pool, and the other on the other side of the pool. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And Abner said to Joab, “Let the young men arise and compete before us.” And Joab said, “Let them arise.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then they arose and passed over by number, twelve for Benjamin and Ish-bosheth the son of Saul, and twelve of the servants of David. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And each caught his opponent by the head and thrust his sword in his opponent’s side, so they fell down together. Therefore that place was called Helkath-hazzurim,
