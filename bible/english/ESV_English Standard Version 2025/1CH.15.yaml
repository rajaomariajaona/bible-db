      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 25:14
      marker-yv: yv-n
    - type: text
      text: 'with the poles, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 4:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:9
      marker-yv: yv-n
    - type: text
      text: 'as Moses had commanded according to the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'David also commanded the chiefs of the Levites to appoint their brothers as the singers who should play loudly on '
