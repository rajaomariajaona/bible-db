        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 6:17
      marker-yv: yv-n
    - type: text
      text: 'to its place, which he had prepared for it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And David gathered together the sons of Aaron and '
    - type: usfm
      marker: x
      children:
