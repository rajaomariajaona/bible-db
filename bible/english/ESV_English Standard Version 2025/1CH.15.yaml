      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 35:6
      marker-yv: yv-n
    - type: text
      text: 'Consecrate yourselves, you and your brothers, so that you may bring up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1, 3
      marker-yv: yv-n
    - type: text
      text: 'to the place that I have prepared for it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
