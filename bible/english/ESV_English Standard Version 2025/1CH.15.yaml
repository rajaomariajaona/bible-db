      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 46
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ', title'
      marker-yv: yv-n
    - type: text
      text: 'Alamoth; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
