document_id: 1CH.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to Jerusalem
  - type: text
    content: David
  - type: note
    content: Hebrew He
  - type: text
    content: ' built houses for himself in the city of David. And he prepared a place for the ark of God and '
  - type: note
    content: ch. 16:1
  - type: text
    content: 'pitched a tent for it. '
  '10':
  - type: text
    content: 'of the sons of Uzziel, Amminadab the chief, with 112 of his brothers. '
  '11':
  - type: text
    content: 'Then David summoned the priests '
  - type: note
    content: ch. 6:8; 16:39
  - type: text
    content: 'Zadok and '
  - type: note
    content: 1 Sam. 22:20; 1 Kgs. 2:26
  - type: text
    content: 'Abiathar, and the Levites Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab, '
  '12':
  - type: text
    content: 'and said to them, “You are the heads of the fathers’ houses of the Levites. '
  - type: note
    content: 2 Chr. 35:6
  - type: text
    content: 'Consecrate yourselves, you and your brothers, so that you may bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ver. 1, 3
  - type: text
    content: 'to the place that I have prepared for it. '
  '13':
  - type: note
    content: ch. 13:7; 2 Sam. 6:3
  - type: text
    content: 'Because you did not carry it the first time, the '
  - type: text
    content: Lord
  - type: text
    content: ' our God broke out against us, because we did not seek him according to the rule.” '
  '14':
  - type: text
    content: 'So the priests and the Levites consecrated themselves to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '15':
  - type: text
    content: 'And the Levites carried the ark of God on their shoulders '
  - type: note
    content: Ex. 25:14
  - type: text
    content: 'with the poles, '
  - type: note
    content: Num. 4:15; 7:9
  - type: text
    content: 'as Moses had commanded according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: 'David also commanded the chiefs of the Levites to appoint their brothers as the singers who should play loudly on '
  - type: note
    content: '[ch. 13:8; 16:5, 42]'
  - type: text
    content: 'musical instruments, on harps and lyres and cymbals, to raise sounds of joy. '
  '17':
  - type: text
    content: 'So the Levites appointed '
  - type: note
    content: ch. 6:33
  - type: text
    content: 'Heman the son of Joel; and of his brothers '
  - type: note
    content: ch. 6:39
  - type: text
    content: 'Asaph the son of Berechiah; and of the sons of Merari, their brothers, '
  - type: note
    content: ch. 6:44
  - type: text
    content: 'Ethan the son of Kushaiah; '
  '18':
  - type: text
    content: 'and with them their brothers of the second order, Zechariah, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, and Mikneiah, and the gatekeepers Obed-edom and Jeiel. '
  '19':
  - type: text
    content: 'The singers, Heman, Asaph, and Ethan, were to sound bronze cymbals; '
  '2':
  - type: text
    content: 'Then David said that no one but the Levites may carry '
  - type: note
    content: ver. 15, 26; Num. 4:2, 15
  - type: text
    content: 'the ark of God, for the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen them to carry the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to minister to him forever. '
  '20':
  - type: text
    content: 'Zechariah, '
  - type: note
    content: '[ver. 18]'
  - type: text
    content: 'Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah were to play harps according to '
  - type: note
    content: See Ps. 46, title
  - type: text
    content: 'Alamoth; '
  '21':
  - type: text
    content: 'but Mattithiah, Eliphelehu, Mikneiah, '
  - type: note
    content: ch. 26:4
  - type: text
    content: 'Obed-edom, Jeiel, and Azaziah were to lead with lyres according to '
  - type: note
    content: See Ps. 6, title
  - type: text
    content: 'the Sheminith. '
  '22':
  - type: text
    content: 'Chenaniah, leader of the Levites in music, should direct the music, for he understood it. '
  '23':
  - type: text
    content: 'Berechiah and Elkanah were to be gatekeepers for the ark. '
  '24':
  - type: text
    content: 'Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer, the priests, should '
  - type: note
    content: ver. 28; ch. 16:6; Num. 10:8
  - type: text
    content: 'blow the trumpets before the ark of God. '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: Obed-edom and Jehiah were to be gatekeepers for the ark.
  '25':
  - type: text
    content: ' '
  - type: note
    content: For ver. 25-28, see 2 Sam. 6:12-15
  - type: text
    content: 'So David and the elders of Israel and the commanders of thousands went to bring up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' from the house of '
  - type: note
    content: '[See ver. 21 above]'
  - type: text
    content: 'Obed-edom with rejoicing. '
  '26':
  - type: text
    content: 'And because God helped the Levites who were carrying the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', they sacrificed '
  - type: note
    content: Num. 23:1; Job 42:8
  - type: text
    content: 'seven bulls and seven rams. '
  '27':
  - type: text
    content: 'David was clothed with a robe of fine linen, as also were all the Levites who were carrying the ark, and the singers and Chenaniah the leader of the music of the singers. And David wore a linen ephod. '
  '28':
  - type: text
    content: 'So all Israel brought up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' with shouting, to the sound of the horn, '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'trumpets, and cymbals, and made loud music on '
  - type: note
    content: ver. 16
  - type: text
    content: harps and lyres.
  '29':
  - type: text
    content: 'And as the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the city of David, Michal the daughter of Saul looked out of the window and saw King David dancing and celebrating, and she despised him in her heart.'
  '3':
  - type: note
    content: ch. 13:5; [1 Kgs. 8:1]
  - type: text
    content: 'And David assembled all Israel at Jerusalem to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: ver. 1, 12; 2 Sam. 6:17
  - type: text
    content: 'to its place, which he had prepared for it. '
  '4':
  - type: text
    content: 'And David gathered together the sons of Aaron and '
  - type: note
    content: See ch. 6:16-30
  - type: text
    content: 'the Levites: '
  '5':
  - type: text
    content: 'of the sons of Kohath, Uriel the chief, with 120 of his brothers; '
  '6':
  - type: text
    content: 'of the sons of Merari, Asaiah the chief, with 220 of his brothers; '
  '7':
  - type: text
    content: 'of the sons of Gershom, Joel the chief, with 130 of his brothers; '
  '8':
  - type: text
    content: 'of the sons of Elizaphan, Shemaiah the chief, with 200 of his brothers; '
  '9':
  - type: text
    content: 'of the sons of Hebron, Eliel the chief, with 80 of his brothers; '
