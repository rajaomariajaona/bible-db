        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Sam. 6:3
      marker-yv: yv-n
    - type: text
      text: 'Because you did not carry it the first time, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God broke out against us, because we did not seek him according to the rule.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
