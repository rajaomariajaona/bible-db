        - type: text
          text: 1 Kgs. 8:54
      marker-yv: yv-n
    - type: text
      text: 'As soon as Solomon finished his prayer, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 9:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 18:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 21:26
      marker-yv: yv-n
    - type: text
      text: 'fire came down from heaven and consumed the burnt offering and the sacrifices, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:13
      marker-yv: yv-n
    - type: text
      text: 'and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the twenty-third day of the seventh month he sent the people away to their homes, joyful and glad of heart for the prosperity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: good
      marker-yv: yv-n
    - type: text
      text: ' that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had granted to David and to Solomon and to Israel his people.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If My People Pray
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 11-22, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 9:1-9
      marker-yv: yv-n
    - type: text
      text: 'Thus Solomon finished the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king’s house. All that Solomon had planned to do in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in his own house he successfully accomplished. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Solomon in the night and said to him: “I have heard your prayer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 12:5
      marker-yv: yv-n
    - type: text
      text: 'and have chosen this place for myself as a house of sacrifice. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'When I shut up the heavens so that there is no rain, or command the locust to devour the land, or send pestilence among my people, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if my people who are called by my name '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'humble themselves, and pray and seek my face and turn from their wicked ways, then I will hear from heaven and will forgive their sin and heal their land. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:40
      marker-yv: yv-n
    - type: text
      text: 'Now my eyes will be open and my ears attentive to the prayer that is made in this place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'For now I have chosen and consecrated this house that my name may be there forever. My eyes and my heart will be there for all time. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as for you, if you will walk before me as David your father walked, doing according to all that I have commanded you and keeping my statutes and my rules, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I will establish your royal throne, as I covenanted with David your father, saying, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:25
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:16
      marker-yv: yv-n
    - type: text
      text: ‘You shall not lack a man to rule Israel.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: text
        text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lev. 26:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 28:15
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: “But if you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'you '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is plural here
      marker-yv: yv-n
    - type: text
      text: ' turn aside and forsake my statutes and my commandments that I have set before you, and go and serve other gods and worship them, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priests could not enter the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 29:28
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: then I will pluck you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: them
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; twice in this verse
      marker-yv: yv-n
    - type: text
      text: ' up from my land that I have given you, and this house that I have consecrated for my name, I will cast out of my sight, and I will make it '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 28:37
      marker-yv: yv-n
    - type: text
      text: 'a proverb and a byword among all peoples. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at this house, which was exalted, everyone passing by will be astonished and say, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 29:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 22:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: '‘Why has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done thus to this land and to this house?’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they will say, ‘Because they abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their fathers who brought them out of the land of Egypt, and laid hold on other gods and worshiped them and served them. Therefore he has brought all this disaster on them.’”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the people of Israel saw the fire come down and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the temple, they bowed down with their faces to the ground on the pavement and worshiped and gave thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “For he is good, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:13
      marker-yv: yv-n
    - type: text
      text: for his steadfast love endures forever.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dedication of the Temple
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:62
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '63'
      marker-yv: yv-n
    - type: text
      text: 'Then the king and all the people offered sacrifice before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Solomon offered as a sacrifice 22,000 oxen and 120,000 sheep. So the king and all the people dedicated the house of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests stood at their posts; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 15:16
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'the Levites also, with the instruments for music to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that King David had made for giving thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: for his steadfast love endures forever—whenever David offered praises by their ministry;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: by their hand
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:12
      marker-yv: yv-n
    - type: text
      text: opposite them the priests sounded trumpets, and all Israel stood.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'For ver. 7-10, see '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:64-66
      marker-yv: yv-n
    - type: text
      text: 'And Solomon consecrated the middle of the court that was before the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for there he offered the burnt offering and the fat of the peace offerings, because the bronze altar Solomon had made could not hold the burnt offering and the grain offering and the fat.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Solomon held the feast for seven days, and all Israel with him, a very great assembly, from '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 34:8
      marker-yv: yv-n
    - type: text
      text: 'Lebo-hamath to the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 34:5
      marker-yv: yv-n
    - type: text
      text: 'Brook of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the eighth day they held a solemn assembly, for they had kept the dedication of the altar seven days and the feast seven days. '
