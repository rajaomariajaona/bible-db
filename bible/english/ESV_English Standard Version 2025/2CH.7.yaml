document_id: 2CH.7,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Fire from Heaven
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 8:54
  - type: text
    content: 'As soon as Solomon finished his prayer, '
  - type: note
    content: Lev. 9:24; 1 Kgs. 18:38; 1 Chr. 21:26
  - type: text
    content: 'fire came down from heaven and consumed the burnt offering and the sacrifices, '
  - type: note
    content: See ch. 5:13
  - type: text
    content: 'and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple. '
  '10':
  - type: text
    content: On the twenty-third day of the seventh month he sent the people away to their homes, joyful and glad of heart for the prosperity
  - type: note
    content: Or good
  - type: text
    content: ' that the '
  - type: text
    content: Lord
  - type: text
    content: ' had granted to David and to Solomon and to Israel his people.'
  - type: heading
    content: If My People Pray
  '11':
  - type: text
    content: ' '
  - type: note
    content: For ver. 11-22, see 1 Kgs. 9:1-9
  - type: text
    content: 'Thus Solomon finished the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king’s house. All that Solomon had planned to do in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in his own house he successfully accomplished. '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Solomon in the night and said to him: “I have heard your prayer '
  - type: note
    content: See Deut. 12:5
  - type: text
    content: 'and have chosen this place for myself as a house of sacrifice. '
  '13':
  - type: note
    content: '[ch. 6:26, 28]'
  - type: text
    content: 'When I shut up the heavens so that there is no rain, or command the locust to devour the land, or send pestilence among my people, '
  '14':
  - type: text
    content: 'if my people who are called by my name '
  - type: note
    content: '[ch. 12:7]'
  - type: text
    content: 'humble themselves, and pray and seek my face and turn from their wicked ways, then I will hear from heaven and will forgive their sin and heal their land. '
  '15':
  - type: note
    content: See ch. 6:40
  - type: text
    content: 'Now my eyes will be open and my ears attentive to the prayer that is made in this place. '
  '16':
  - type: note
    content: '[See ver. 12 above]'
  - type: text
    content: 'For now I have chosen and consecrated this house that my name may be there forever. My eyes and my heart will be there for all time. '
  '17':
  - type: text
    content: 'And as for you, if you will walk before me as David your father walked, doing according to all that I have commanded you and keeping my statutes and my rules, '
  '18':
  - type: text
    content: 'then I will establish your royal throne, as I covenanted with David your father, saying, '
  - type: note
    content: 1 Kgs. 8:25; See ch. 6:16
  - type: text
    content: ‘You shall not lack a man to rule Israel.’
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ Lev. 26:14; Deut. 28:15 ]'
  - type: text
    content: “But if you
  - type: note
    content: The Hebrew for you is plural here
  - type: text
    content: ' turn aside and forsake my statutes and my commandments that I have set before you, and go and serve other gods and worship them, '
  '2':
  - type: text
    content: 'And the priests could not enter the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', because the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the '
  - type: text
    content: Lord
  - type: text
    content: '’s house. '
  '20':
  - type: note
    content: '[Deut. 29:28]'
  - type: text
    content: then I will pluck you
  - type: note
    content: Hebrew them; twice in this verse
  - type: text
    content: ' up from my land that I have given you, and this house that I have consecrated for my name, I will cast out of my sight, and I will make it '
  - type: note
    content: See Deut. 28:37
  - type: text
    content: 'a proverb and a byword among all peoples. '
  '21':
  - type: text
    content: 'And at this house, which was exalted, everyone passing by will be astonished and say, '
  - type: note
    content: Deut. 29:24; Jer. 22:8, 9
  - type: text
    content: '‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done thus to this land and to this house?’ '
  '22':
  - type: text
    content: 'Then they will say, ‘Because they abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers who brought them out of the land of Egypt, and laid hold on other gods and worshiped them and served them. Therefore he has brought all this disaster on them.’”'
  '3':
  - type: text
    content: 'When all the people of Israel saw the fire come down and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the temple, they bowed down with their faces to the ground on the pavement and worshiped and gave thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “For he is good, '
  - type: note
    content: See ch. 5:13
  - type: text
    content: for his steadfast love endures forever.”
  - type: heading
    content: The Dedication of the Temple
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Kgs. 8:62, 63
  - type: text
    content: 'Then the king and all the people offered sacrifice before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'King Solomon offered as a sacrifice 22,000 oxen and 120,000 sheep. So the king and all the people dedicated the house of God. '
  '6':
  - type: text
    content: 'The priests stood at their posts; '
  - type: note
    content: '[1 Chr. 15:16]'
  - type: text
    content: 'the Levites also, with the instruments for music to the '
  - type: text
    content: Lord
  - type: text
    content: ' that King David had made for giving thanks to the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: for his steadfast love endures forever—whenever David offered praises by their ministry;
  - type: note
    content: Hebrew by their hand
  - type: text
    content: ' '
  - type: note
    content: ch. 5:12
  - type: text
    content: opposite them the priests sounded trumpets, and all Israel stood.
  '7':
  - type: text
    content: ' '
  - type: note
    content: For ver. 7-10, see 1 Kgs. 8:64-66
  - type: text
    content: 'And Solomon consecrated the middle of the court that was before the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', for there he offered the burnt offering and the fat of the peace offerings, because the bronze altar Solomon had made could not hold the burnt offering and the grain offering and the fat.'
  '8':
  - type: text
    content: 'At that time Solomon held the feast for seven days, and all Israel with him, a very great assembly, from '
  - type: note
    content: See Num. 34:8
  - type: text
    content: 'Lebo-hamath to the '
  - type: note
    content: See Num. 34:5
  - type: text
    content: 'Brook of Egypt. '
  '9':
  - type: text
    content: 'And on the eighth day they held a solemn assembly, for they had kept the dedication of the altar seven days and the feast seven days. '
