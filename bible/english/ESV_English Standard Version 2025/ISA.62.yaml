document_id: ISA.62,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion’s Coming Salvation
  - type: text
    content: ' '
  - type: note
    content: ver. 6, 7
  - type: text
    content: For Zion’s sake I will not keep silent,
  - type: text
    content: and for Jerusalem’s sake I will not be quiet,
  - type: note
    content: '[ Prov. 4:18 ]'
  - type: text
    content: until her righteousness goes forth as brightness,
  - type: text
    content: and her salvation as a burning torch.
  '10':
  - type: text
    content: Go through, go through the gates;
  - type: note
    content: ch. 40:3
  - type: text
    content: prepare the way for the people;
  - type: note
    content: ch. 57:14
  - type: text
    content: build up, build up the highway;
  - type: text
    content: clear it of stones;
  - type: note
    content: ch. 11:10; 49:22
  - type: text
    content: lift up a signal over the peoples.
  '11':
  - type: text
    content: 'Behold, the '
  - type: text
    content: Lord
  - type: text
    content: ' has proclaimed'
  - type: text
    content: 'to the end of the earth:'
  - type: note
    content: Zech. 9:9; [ Matt. 21:5; John 12:15 ]
  - type: text
    content: Say to the daughter of Zion,
  - type: note
    content: ch. 40:10
  - type: text
    content: “Behold, your salvation comes;
  - type: text
    content: behold, his reward is with him,
  - type: text
    content: and his recompense before him.”
  '12':
  - type: text
    content: ' '
  - type: note
    content: ch. 61:6
  - type: text
    content: And they shall be called The Holy People,
  - type: text
    content: 'The Redeemed of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: note
    content: ver. 4 ; [ch. 61:4]
  - type: text
    content: and you shall be called Sought Out,
  - type: text
    content: A City Not Forsaken.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ch. 60:3; Ps. 98:2
  - type: text
    content: The nations shall see your righteousness,
  - type: text
    content: and all the kings your glory,
  - type: note
    content: ch. 60:14; [ Rev. 2:17; 3:12 ]
  - type: text
    content: and you shall be called by a new name
  - type: text
    content: 'that the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' will give.'
  '3':
  - type: text
    content: 'You shall be '
  - type: note
    content: Zech. 9:16; [ch. 54:11, 12]
  - type: text
    content: 'a crown of beauty in the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and a royal diadem in the hand of your God.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Hos. 1:10; 1 Pet. 2:10; See ch. 54:6
  - type: text
    content: 'You shall no more be termed '
  - type: note
    content: ch. 49:14; 54:1, 7; 60:15
  - type: text
    content: Forsaken,
  - type: note
    content: Hebrew Azubah
  - type: text
    content: and your land shall no more be termed Desolate,
  - type: note
    content: Hebrew Shemamah
  - type: note
    content: '[See ver. 2 above]'
  - type: text
    content: 'but you shall be called '
  - type: note
    content: Mal. 3:12
  - type: text
    content: My Delight Is in Her,
  - type: note
    content: Hebrew Hephzibah
  - type: text
    content: and your land Married;
  - type: note
    content: Hebrew Beulah
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' delights in you,'
  - type: text
    content: and your land shall be married.
  '5':
  - type: text
    content: For as a young man marries a young woman,
  - type: text
    content: 'so '
  - type: note
    content: '[ch. 51:18]'
  - type: text
    content: shall your sons marry you,
  - type: text
    content: and as the bridegroom rejoices over the bride,
  - type: text
    content: 'so '
  - type: note
    content: ch. 65:19
  - type: text
    content: shall your God rejoice over you.
  '6':
  - type: text
    content: On your walls, O Jerusalem,
  - type: text
    content: 'I have set '
  - type: note
    content: ch. 52:8; 56:10
  - type: text
    content: watchmen;
  - type: text
    content: all the day and all the night
  - type: text
    content: they shall never be silent.
  - type: text
    content: 'You who put the '
  - type: text
    content: Lord
  - type: text
    content: ' in remembrance,'
  - type: text
    content: take no rest,
  '7':
  - type: text
    content: and give him no rest
  - type: text
    content: until he establishes Jerusalem
  - type: text
    content: 'and makes it '
  - type: note
    content: ch. 60:18; [ch. 61:11; Zeph. 3:20]
  - type: text
    content: a praise in the earth.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn '
  - type: note
    content: '[Heb. 6:13]'
  - type: text
    content: by his right hand
  - type: text
    content: 'and by his mighty arm:'
  - type: text
    content: '“I will not again give '
  - type: note
    content: Deut. 28:33; Jer. 5:17
  - type: text
    content: your grain
  - type: text
    content: to be food for your enemies,
  - type: note
    content: '[ch. 65:21, 22 ]'
  - type: text
    content: and foreigners shall not drink your wine
  - type: text
    content: for which you have labored;
  '9':
  - type: text
    content: 'but '
  - type: note
    content: '[Deut. 12:12; 14:23, 26]'
  - type: text
    content: those who garner it shall eat it
  - type: text
    content: 'and praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and '
  - type: note
    content: '[Deut. 12:12; 14:23, 26]'
  - type: text
    content: those who gather it shall drink it
  - type: text
    content: in the courts of my sanctuary.”
  - type: note
    content: Or in my holy courts
