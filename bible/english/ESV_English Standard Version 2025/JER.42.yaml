document_id: JER.42,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against Going to Egypt
  - type: text
    content: 'Then '
  - type: note
    content: ch. 40:13; 41:11
  - type: text
    content: 'all the commanders of the forces, and '
  - type: note
    content: See ch. 40:8
  - type: text
    content: 'Johanan the son of Kareah and Jezaniah the son of '
  - type: note
    content: ch. 43:2
  - type: text
    content: 'Hoshaiah, and all the people '
  - type: note
    content: '[ch. 6:13]'
  - type: text
    content: 'from the least to the greatest, came near '
  '10':
  - type: text
    content: 'If you will remain in this land, '
  - type: note
    content: See ch. 24:6
  - type: text
    content: 'then I will build you up and not pull you down; I will plant you, and not pluck you up; '
  - type: note
    content: ch. 18:8; Gen. 6:6; [Deut. 32:36]
  - type: text
    content: 'for I relent of the disaster that I did to you. '
  '11':
  - type: note
    content: '[ch. 22:25; 41:18]'
  - type: text
    content: 'Do not fear the king of Babylon, '
  - type: note
    content: '[ch. 22:25; 41:18]'
  - type: text
    content: 'of whom you are afraid. '
  - type: note
    content: ch. 30:10, 11; [Rom. 8:31]
  - type: text
    content: 'Do not fear him, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: ch. 30:10, 11; [Rom. 8:31]
  - type: text
    content: 'for I am with you, to save you and to deliver you from his hand. '
  '12':
  - type: note
    content: '[Neh. 1:11]'
  - type: text
    content: 'I will grant you mercy, that he may have mercy on you and let you remain in your own land. '
  '13':
  - type: note
    content: ch. 43:4; [ch. 44:16, 17]
  - type: text
    content: 'But if you say, ‘We will not remain in this land,’ disobeying the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God '
  '14':
  - type: text
    content: 'and saying, ‘No, '
  - type: note
    content: '[ch. 41:17]'
  - type: text
    content: 'we will go to the land of Egypt, where we shall not see war or '
  - type: note
    content: ch. 4:19
  - type: text
    content: 'hear the sound of the trumpet or '
  - type: note
    content: '[ch. 37:21]'
  - type: text
    content: 'be hungry for bread, and we will dwell there,’ '
  '15':
  - type: text
    content: 'then hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', O remnant of Judah. Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: ch. 44:12; [ver. 19; Deut. 17:16]
  - type: text
    content: 'If you set your faces to enter Egypt '
  - type: note
    content: ch. 44:27; See ch. 44:1, 12-14
  - type: text
    content: 'and go to live there, '
  '16':
  - type: text
    content: 'then the sword '
  - type: note
    content: Ezek. 11:8
  - type: text
    content: 'that you fear shall overtake you there in the land of Egypt, and the famine of which you are afraid shall follow close after you to Egypt, '
  - type: note
    content: ver. 22; ch. 44:12
  - type: text
    content: 'and there you shall die. '
  '17':
  - type: text
    content: 'All the men who set their faces to go to Egypt to live there shall die by the sword, by famine, and by pestilence. They shall have '
  - type: note
    content: Lam. 2:22
  - type: text
    content: no remnant or survivor from the disaster that I will bring upon them.
  '18':
  - type: text
    content: '“For thus says the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel: '
  - type: note
    content: See ch. 7:20
  - type: text
    content: 'As my anger and my wrath were poured out on the inhabitants of Jerusalem, so my wrath will be poured out on you when you go to Egypt. '
  - type: note
    content: See ch. 18:16
  - type: text
    content: 'You shall become an execration, a horror, a curse, and a taunt. You shall see this place no more. '
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has said to you, O remnant of Judah, '
  - type: note
    content: ch. 43:2; [ver. 14-16]
  - type: text
    content: '‘Do not go to Egypt.’ '
  - type: note
    content: '[Ezek. 2:5]'
  - type: text
    content: 'Know for a certainty that I have warned you this day '
  '2':
  - type: text
    content: 'and said to Jeremiah the prophet, “Let '
  - type: note
    content: See ch. 36:7
  - type: text
    content: 'our plea for mercy come before you, and '
  - type: note
    content: ver. 20; [1 Sam. 7:8; 12:19]
  - type: text
    content: 'pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for us, for all '
  - type: note
    content: '[ch. 40:15; Isa. 37:4]'
  - type: text
    content: this remnant—
  - type: note
    content: '[Lev. 26:22]'
  - type: text
    content: 'because we are left with but a few, as your eyes see us— '
  '20':
  - type: text
    content: 'that you have gone astray at the cost of your lives. '
  - type: note
    content: ver. 2
  - type: text
    content: 'For you sent me to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, saying, '
  - type: note
    content: ver. 2
  - type: text
    content: '‘Pray for us to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, and '
  - type: note
    content: ver. 3
  - type: text
    content: 'whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' our God says, declare to us and we will do it.’ '
  '21':
  - type: text
    content: 'And I have this day declared it to you, but you have not obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in anything '
  - type: note
    content: ver. 5
  - type: text
    content: 'that he sent me to tell you. '
  '22':
  - type: note
    content: ver. 16, 17
  - type: text
    content: Now therefore know for a certainty that you shall die by the sword, by famine, and by pestilence in the place where you desire to go to live.”
  '3':
  - type: text
    content: 'that '
  - type: note
    content: '[ch. 37:17; Ezra 8:21]'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may show us the way we should go, and the thing that we should do.” '
  '4':
  - type: text
    content: 'Jeremiah the prophet said to them, “I have heard you. Behold, I will pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God according to your request, and '
  - type: note
    content: 1 Sam. 3:18; [Num. 22:18]
  - type: text
    content: 'whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' answers you I will tell you. '
  - type: note
    content: 1 Sam. 3:18; [Num. 22:18]
  - type: text
    content: 'I will keep nothing back from you.” '
  '5':
  - type: text
    content: 'Then they said to Jeremiah, '
  - type: note
    content: '[Gen. 31:50]'
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ' be a true and '
  - type: note
    content: '[Rev. 1:5; 3:14]'
  - type: text
    content: 'faithful witness against us '
  - type: note
    content: Judg. 11:10
  - type: text
    content: 'if we do not act according to all the word '
  - type: note
    content: ver. 21
  - type: text
    content: 'with which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God sends you to us. '
  '6':
  - type: text
    content: 'Whether it is good or bad, we will obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to whom we are sending you, '
  - type: note
    content: ch. 7:23
  - type: text
    content: 'that it may be well with us when we obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.”'
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 3:16 ]'
  - type: text
    content: 'At the end of ten days the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah. '
  '8':
  - type: text
    content: 'Then he summoned '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'Johanan the son of Kareah and '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'all the commanders of the forces who were with him, and all the people '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'from the least to the greatest, '
  '9':
  - type: text
    content: 'and said to them, “Thus says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ver. 2, 3
  - type: text
    content: 'to whom you sent me to present your plea for mercy before him: '
