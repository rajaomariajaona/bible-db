document_id: TIT.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Teach Sound Doctrine
  - type: text
    content: 'But as for you, teach what accords with '
  - type: note
    content: See 1 Tim. 1:10
  - type: text
    content: sound
  - type: note
    content: Or healthy; also verses 2, 8
  - type: text
    content: ' doctrine. '
  '10':
  - type: text
    content: 'not pilfering, '
  - type: note
    content: '[1 Tim. 3:11]'
  - type: text
    content: 'but showing all good faith, '
  - type: note
    content: Matt. 5:16; Phil. 2:15
  - type: text
    content: so that in everything they may adorn the doctrine of God our Savior.
  '11':
  - type: text
    content: 'For '
  - type: note
    content: ch. 3:7; See Acts 11:23
  - type: text
    content: 'the grace of God '
  - type: note
    content: ch. 3:4
  - type: text
    content: 'has appeared, bringing salvation '
  - type: note
    content: '[Ps. 67:2]; See 1 Tim. 2:4'
  - type: text
    content: 'for all people, '
  '12':
  - type: text
    content: 'training us to renounce ungodliness and '
  - type: note
    content: 1 Pet. 4:2; 1 John 2:16
  - type: text
    content: 'worldly passions, and '
  - type: note
    content: 2 Tim. 3:12; [Acts 24:25]
  - type: text
    content: 'to live self-controlled, upright, and godly lives in '
  - type: note
    content: 1 Tim. 6:17; 2 Tim. 4:10
  - type: text
    content: 'the present age, '
  '13':
  - type: note
    content: See 1 Cor. 1:7; 2 Pet. 3:12
  - type: text
    content: 'waiting for our blessed '
  - type: note
    content: See ch. 1:2
  - type: text
    content: 'hope, the '
  - type: note
    content: See 2 Thess. 2:8
  - type: text
    content: 'appearing of the glory of our great '
  - type: note
    content: 2 Pet. 1:1
  - type: text
    content: 'God and Savior Jesus Christ, '
  '14':
  - type: note
    content: See Matt. 20:28
  - type: text
    content: 'who gave himself for us to '
  - type: note
    content: Ps. 130:8; See 1 Pet. 1:18
  - type: text
    content: 'redeem us from all lawlessness and '
  - type: note
    content: Ezek. 37:23; See Ex. 19:5
  - type: text
    content: 'to purify for himself '
  - type: note
    content: Ezek. 37:23; See Ex. 19:5
  - type: text
    content: 'a people for his own possession who are '
  - type: note
    content: ch. 3:8; Eph. 2:10
  - type: text
    content: zealous for good works.
  '15':
  - type: text
    content: 'Declare these things; exhort and '
  - type: note
    content: ch. 1:13; 1 Tim. 5:20
  - type: text
    content: 'rebuke with all authority. '
  - type: note
    content: See 1 Tim. 4:12
  - type: text
    content: Let no one disregard you.
  '2':
  - type: text
    content: 'Older men are to be sober-minded, dignified, self-controlled, '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'sound in faith, in love, and in steadfastness. '
  '3':
  - type: note
    content: '[1 Tim. 2:9]'
  - type: text
    content: 'Older women likewise are to be reverent in behavior, '
  - type: note
    content: 1 Tim. 3:11
  - type: text
    content: 'not slanderers '
  - type: note
    content: '[1 Tim. 3:8; 5:23]'
  - type: text
    content: 'or slaves to much wine. They are to teach what is good, '
  '4':
  - type: text
    content: 'and so train the young women to love their husbands and children, '
  '5':
  - type: text
    content: 'to be self-controlled, '
  - type: note
    content: 1 Pet. 3:2
  - type: text
    content: 'pure, '
  - type: note
    content: '[1 Tim. 5:14]'
  - type: text
    content: 'working at home, kind, and '
  - type: note
    content: See Gen. 3:16
  - type: text
    content: 'submissive to their own husbands, '
  - type: note
    content: See 1 Tim. 6:1
  - type: text
    content: 'that the word of God may not be reviled. '
  '6':
  - type: text
    content: 'Likewise, urge '
  - type: note
    content: 1 Tim. 5:1
  - type: text
    content: 'the younger men to be self-controlled. '
  '7':
  - type: text
    content: 'Show yourself in all respects to be '
  - type: note
    content: 1 Tim. 4:12; 1 Pet. 5:3
  - type: text
    content: 'a model of good works, and in your teaching '
  - type: note
    content: '[2 Cor. 11:3]'
  - type: text
    content: 'show integrity, '
  - type: note
    content: 1 Tim. 2:2
  - type: text
    content: 'dignity, '
  '8':
  - type: text
    content: 'and '
  - type: note
    content: '[1 Tim. 6:3]'
  - type: text
    content: 'sound speech that cannot be condemned, '
  - type: note
    content: Neh. 5:9; 1 Tim. 5:14; 1 Pet. 2:12; 3:16
  - type: text
    content: 'so that an opponent may be put to shame, having nothing evil to say about us. '
  '9':
  - type: note
    content: See 1 Pet. 2:18
  - type: text
    content: Bondservants
  - type: note
    content: For the contextual rendering of the Greek word doulos, see Preface
  - type: text
    content: ' are to be submissive to their own masters '
  - type: note
    content: '[Col. 3:22]'
  - type: text
    content: 'in everything; they are to be well-pleasing, not argumentative, '
