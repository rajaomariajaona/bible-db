document_id: EZK.32,59
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament over Pharaoh and Egypt
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the twelfth year, in the twelfth month, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: note
    content: '[ch. 27:35]'
  - type: text
    content: 'I will make many peoples appalled at you, and the hair of their kings shall bristle with horror because of you, when '
  - type: note
    content: '[1 Chr. 21:16]'
  - type: text
    content: 'I brandish my sword before them. '
  - type: note
    content: ch. 26:16; [Deut. 28:66]
  - type: text
    content: They shall tremble every moment, every one for his own life, on the day of your downfall.
  '11':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ch. 29:8, 19]; See Jer. 46:26'
  - type: text
    content: 'The sword of the king of Babylon shall come upon you. '
  '12':
  - type: text
    content: 'I will cause '
  - type: note
    content: See ch. 31:2
  - type: text
    content: 'your multitude to fall by the swords of mighty ones, all of them '
  - type: note
    content: See ch. 28:7
  - type: text
    content: most ruthless of nations.
  - type: note
    content: ch. 29:19
  - type: text
    content: “They shall bring to ruin the pride of Egypt,
  - type: text
    content: and all its multitude
  - type: note
    content: Or wealth
  - type: text
    content: ' shall perish.'
  '13':
  - type: text
    content: I will destroy all its beasts
  - type: text
    content: from beside many waters;
  - type: note
    content: ch. 29:11
  - type: text
    content: and no foot of man shall trouble them anymore,
  - type: text
    content: nor shall the hoofs of beasts trouble them.
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: I will make their waters clear,
  - type: text
    content: and cause their rivers to run like oil,
  - type: text
    content: 'declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: When I make the land of Egypt desolate,
  - type: text
    content: 'and when the land '
  - type: note
    content: '[ch. 12:19]'
  - type: text
    content: is desolate of all that fills it,
  - type: text
    content: when I strike down all who dwell in it,
  - type: text
    content: 'then '
  - type: note
    content: '[Ex. 7:5]; See ch. 6:7'
  - type: text
    content: 'they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 2 ]'
  - type: text
    content: 'This is a lamentation that shall be chanted; the daughters of the nations shall chant it; over Egypt, and over '
  - type: note
    content: See ch. 31:2
  - type: text
    content: 'all her multitude, shall they chant it, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: In the twelfth year, in the twelfth month,
  - type: note
    content: Hebrew lacks in the twelfth month
  - type: text
    content: ' on the fifteenth day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'wail over '
  - type: note
    content: '[See ver. 16 above]'
  - type: text
    content: 'the multitude of Egypt, and '
  - type: note
    content: '[ch. 26:20; 31:16]'
  - type: text
    content: 'send them down, her and the daughters of majestic nations, '
  - type: note
    content: See ch. 31:14
  - type: text
    content: 'to the world below, to those who have gone down to the pit:'
  '19':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 31:2, 18 ]'
  - type: text
    content: ‘Whom do you surpass in beauty?
  - type: text
    content: 'Go down and '
  - type: note
    content: ver. 32; See ver. 28-30
  - type: text
    content: be laid to rest with the uncircumcised.’
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 19:1
  - type: text
    content: 'raise a lamentation over '
  - type: note
    content: ch. 29:2
  - type: text
    content: 'Pharaoh king of Egypt and say to him:'
  - type: text
    content: '“You consider yourself '
  - type: note
    content: ch. 19:3, 5, 6; 38:13
  - type: text
    content: a lion of the nations,
  - type: text
    content: 'but you are like '
  - type: note
    content: ch. 29:3
  - type: text
    content: 'a dragon '
  - type: note
    content: '[Isa. 18:2]'
  - type: text
    content: in the seas;
  - type: note
    content: '[ver. 14; Jer. 46:8 ]'
  - type: text
    content: you burst forth in your rivers,
  - type: text
    content: trouble the waters with your feet,
  - type: text
    content: and foul their rivers.
  '20':
  - type: text
    content: 'They shall fall amid those '
  - type: note
    content: ch. 31:17, 18
  - type: text
    content: who are slain by the sword. Egypt
  - type: note
    content: Hebrew She
  - type: text
    content: ' is delivered to the sword; drag her away, and '
  - type: note
    content: See ch. 31:2
  - type: text
    content: 'all her multitudes. '
  '21':
  - type: text
    content: 'The mighty chiefs '
  - type: note
    content: Isa. 14:9, 10
  - type: text
    content: 'shall speak of them, '
  - type: note
    content: '[ch. 30:6, 8]'
  - type: text
    content: 'with their helpers, out of the midst of Sheol: ‘They have come down, they lie still, '
  - type: note
    content: ch. 28:10; 31:18
  - type: text
    content: 'the uncircumcised, '
  - type: note
    content: '[See ver. 20 above]'
  - type: text
    content: slain by the sword.’
  '22':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 24, 26, 29, 30 ]'
  - type: text
    content: '“Assyria is there, and all her company, '
  - type: note
    content: ver. 25, 26
  - type: text
    content: 'its graves all around it, all of them slain, fallen by the sword, '
  '23':
  - type: text
    content: 'whose graves are set in '
  - type: note
    content: Isa. 14:15
  - type: text
    content: 'the uttermost parts of the pit; and her company is all around her grave, all of them slain, fallen by the sword, '
  - type: note
    content: ver. 24, 25, 26, 27; [ch. 26:17]
  - type: text
    content: 'who spread terror '
  - type: note
    content: Ps. 27:13
  - type: text
    content: in the land of the living.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Isa. 11:11; See Jer. 49:34-39
  - type: text
    content: '“Elam is '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: 'there, and all her multitude around her grave; all of them '
  - type: note
    content: ver. 20
  - type: text
    content: 'slain, fallen by the sword, who went down uncircumcised into '
  - type: note
    content: ver. 18; See ch. 31:14
  - type: text
    content: 'the world below, who spread their terror in the land of the living; and '
  - type: note
    content: ver. 25, 30; ch. 16:52, 54; 36:7; 44:13; [ch. 34:29; 36:6; 39:26]
  - type: text
    content: 'they bear their shame '
  - type: note
    content: ver. 18; See ch. 31:14
  - type: text
    content: 'with those who go down to the pit. '
  '25':
  - type: note
    content: '[Isa. 30:33]'
  - type: text
    content: 'They have made her a bed among the slain with all her multitude, '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: her graves all around it, all of them uncircumcised, slain by the sword; for terror of them was spread in the land of the living, and they bear their shame with those who go down to the pit; they are placed among the slain.
  '26':
  - type: text
    content: ' '
  - type: note
    content: See ch. 27:13
  - type: text
    content: '“Meshech-Tubal is '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'there, and all her multitude, '
  - type: note
    content: '[See ver. 25 above]'
  - type: text
    content: 'her graves all around it, all of them uncircumcised, slain by the sword; for they spread their terror in the land of the living. '
  '27':
  - type: text
    content: 'And '
  - type: note
    content: '[Isa. 14:18, 19]'
  - type: text
    content: 'they do not lie with the mighty, the fallen from among the uncircumcised, who went down to Sheol with their weapons of war, whose swords were laid under their heads, and whose iniquities are upon their bones; for the terror of the mighty men was in the land of the living. '
  '28':
  - type: text
    content: 'But as for you, you shall be broken '
  - type: note
    content: ch. 28:10; 31:18
  - type: text
    content: and lie among the uncircumcised, with those who are slain by the sword.
  '29':
  - type: text
    content: ' '
  - type: note
    content: See ch. 25:12-14
  - type: text
    content: '“Edom is '
  - type: note
    content: '[ver. 22]'
  - type: text
    content: there, her kings and all her princes, who for all their might are laid with those who are killed by the sword; they lie with the uncircumcised, with those who go down to the pit.
  '3':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: note
    content: See ch. 12:13
  - type: text
    content: I will throw my net over you
  - type: text
    content: 'with a host of '
  - type: note
    content: '[ch. 26:3]'
  - type: text
    content: many peoples,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 29:4]'
  - type: text
    content: they will haul you up in my dragnet.
  '30':
  - type: text
    content: '“The princes '
  - type: note
    content: '[ch. 38:6; 39:2]'
  - type: text
    content: 'of the north are there, all of them, and all the '
  - type: note
    content: ch. 28:21; See Isa. 23:2
  - type: text
    content: 'Sidonians, who have gone down in shame with the slain, '
  - type: note
    content: ver. 23
  - type: text
    content: 'for all the terror that they caused by their might; they lie uncircumcised with those who are slain by the sword, and '
  - type: note
    content: See ver. 24
  - type: text
    content: bear their shame with those who go down to the pit.
  '31':
  - type: text
    content: '“When Pharaoh sees them, he '
  - type: note
    content: '[ch. 31:16]'
  - type: text
    content: 'will be comforted for '
  - type: note
    content: See ch. 31:2
  - type: text
    content: 'all his multitude, Pharaoh and all his army, slain by the sword, declares the Lord '
  - type: text
    content: God
  - type: text
    content: '. '
  '32':
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'For I spread terror '
  - type: note
    content: ver. 23
  - type: text
    content: 'in the land of the living; and he shall be laid to rest among '
  - type: note
    content: ver. 21, 27
  - type: text
    content: 'the uncircumcised, with those who are slain by the sword, Pharaoh and all his multitude, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '4':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 29:5]'
  - type: text
    content: I will cast you on the ground;
  - type: text
    content: on the open field I will fling you,
  - type: text
    content: and will cause all the birds of the heavens to settle on you,
  - type: text
    content: and I will gorge the beasts of the whole earth with you.
  '5':
  - type: text
    content: 'I will strew your flesh '
  - type: note
    content: '[ch. 31:12]'
  - type: text
    content: upon the mountains
  - type: text
    content: and fill the valleys with your carcass.
  - type: note
    content: Hebrew your height
  '6':
  - type: text
    content: I will drench the land even to the mountains
  - type: text
    content: with your flowing blood,
  - type: text
    content: and the ravines will be full of you.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ Isa. 14:12 ]'
  - type: text
    content: 'When I blot you out, '
  - type: note
    content: '[Isa. 13:10; Joel 2:31; Matt. 24:29; Mark 13:24, 25]'
  - type: text
    content: I will cover the heavens
  - type: text
    content: and make their stars dark;
  - type: text
    content: I will cover the sun with a cloud,
  - type: text
    content: and the moon shall not give its light.
  '8':
  - type: text
    content: All the bright lights of heaven
  - type: text
    content: will I make dark over you,
  - type: text
    content: 'and '
  - type: note
    content: '[Ex. 10:21; Isa. 5:30]'
  - type: text
    content: put darkness on your land,
  - type: text
    content: 'declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '9':
  - type: text
    content: '“I will trouble the hearts of many peoples, when I bring your destruction among the nations, into the countries that you have not known. '
