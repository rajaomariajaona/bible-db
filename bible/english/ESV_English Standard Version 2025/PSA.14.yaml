verses:
  '1':
  - type: heading
    content: The Fool Says, There Is No God
  - type: text
    content: To the choirmaster. Of David.
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-7, see Ps. 53:1-6
  - type: text
    content: 'The '
  - type: note
    content: Ps. 74:18, 22; Job 2:10
  - type: text
    content: 'fool says in his heart, '
  - type: note
    content: Ps. 10:4
  - type: text
    content: “There is no God.”
  - type: text
    content: 'They are '
  - type: note
    content: Gen. 6:5, 11, 12
  - type: text
    content: corrupt, they do abominable deeds;
  - type: note
    content: Cited Rom. 3:10-12
  - type: text
    content: there is none who does good.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 102:19; [Ps. 11:4]
  - type: text
    content: looks down from heaven on the children of man,
  - type: text
    content: to see if there are any who understand,
  - type: note
    content: Or that act wisely
  - type: text
    content: 'who '
  - type: note
    content: 2 Chr. 15:2; 19:3
  - type: text
    content: seek after God.
  '3':
  - type: text
    content: 'They have all turned aside; together they have become '
  - type: note
    content: Job 15:16
  - type: text
    content: corrupt;
  - type: text
    content: there is none who does good,
  - type: text
    content: not even one.
  '4':
  - type: text
    content: 'Have they no '
  - type: note
    content: Ps. 82:5; [Isa. 1:3; Jer. 4:22]
  - type: text
    content: knowledge, all the evildoers
  - type: text
    content: 'who '
  - type: note
    content: Prov. 30:14; Jer. 10:25; Hos. 7:7; [Ps. 27:2; Amos 8:4; Mic. 3:3]
  - type: text
    content: eat up my people as they eat bread
  - type: text
    content: 'and '
  - type: note
    content: Ps. 79:6; Jer. 10:25; Hos. 7:7; [Isa. 64:7]
  - type: text
    content: 'do not call upon the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '5':
  - type: text
    content: There they are in great terror,
  - type: text
    content: 'for God is with '
  - type: note
    content: Ps. 24:6; 73:15
  - type: text
    content: the generation of the righteous.
  '6':
  - type: text
    content: You would shame the plans of the poor,
  - type: text
    content: but
  - type: note
    content: Or for
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' is his '
  - type: note
    content: Ps. 46:1; 61:3; 62:7, 8; 91:2; 142:5
  - type: text
    content: refuge.
  '7':
  - type: text
    content: Oh, that salvation for Israel would come out of Zion!
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 85:1; 126:1; Job 42:10; Jer. 30:18; Ezek. 16:53; 39:25; Hos. 6:11; Joel 3:1
  - type: text
    content: restores the fortunes of his people,
  - type: text
    content: let Jacob rejoice, let Israel be glad.
