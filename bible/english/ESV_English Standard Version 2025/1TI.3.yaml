document_id: 1TI.3,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Qualifications for Overseers
  - type: text
    content: 'The saying is '
  - type: note
    content: See ch. 1:15
  - type: text
    content: 'trustworthy: If anyone aspires to '
  - type: note
    content: See Acts 20:28
  - type: text
    content: 'the office of overseer, he desires a noble task. '
  '10':
  - type: text
    content: 'And '
  - type: note
    content: '[ch. 5:22]'
  - type: text
    content: 'let them also be tested first; then let them serve as deacons if they prove themselves blameless. '
  '11':
  - type: note
    content: Titus 2:3
  - type: text
    content: Their wives likewise
  - type: note
    content: Or Wives likewise, or Women likewise
  - type: text
    content: ' must be dignified, not slanderers, but sober-minded, '
  - type: note
    content: '[Titus 2:10]'
  - type: text
    content: 'faithful in all things. '
  '12':
  - type: text
    content: 'Let deacons each be '
  - type: note
    content: ver. 2, 4
  - type: text
    content: 'the husband of one wife, '
  - type: note
    content: ver. 2, 4
  - type: text
    content: 'managing their children and their own households well. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: See Matt. 25:21
  - type: text
    content: those who serve well as deacons gain a good standing for themselves and also great confidence in the faith that is in Christ Jesus.
  - type: heading
    content: The Mystery of Godliness
  '14':
  - type: text
    content: 'I hope to come to you soon, but I am writing these things to you so that, '
  '15':
  - type: text
    content: 'if I delay, you may know how one ought to behave in the household of God, which is the church of the living God, a pillar and buttress of the truth. '
  '16':
  - type: text
    content: 'Great indeed, we confess, is the mystery of godliness:'
  - type: note
    content: John 1:14; 1 Pet. 1:20
  - type: text
    content: He
  - type: note
    content: Greek Who; some manuscripts God; others Which
  - type: text
    content: ' was manifested in the flesh,'
  - type: text
    content: vindicated
  - type: note
    content: Or justified
  - type: text
    content: ' by the Spirit,'
  - type: note
    content: Or vindicated in spirit
  - type: note
    content: Luke 2:13; 24:4
  - type: text
    content: seen by angels,
  - type: note
    content: Gal. 2:2
  - type: text
    content: proclaimed among the nations,
  - type: note
    content: 2 Thess. 1:10
  - type: text
    content: believed on in the world,
  - type: note
    content: See Acts 1:2
  - type: text
    content: taken up in glory.
  '2':
  - type: text
    content: 'Therefore '
  - type: note
    content: Titus 1:6-9
  - type: text
    content: an overseer
  - type: note
    content: Or bishop; Greek episkopos; a similar term occurs in verse 1
  - type: text
    content: ' must be above reproach, '
  - type: note
    content: '[ch. 5:9]'
  - type: text
    content: the husband of one wife,
  - type: note
    content: Or a man of one woman; also verse 12
  - type: text
    content: ' '
  - type: note
    content: ver. 11; Titus 2:2
  - type: text
    content: 'sober-minded, self-controlled, respectable, '
  - type: note
    content: 1 Pet. 4:9
  - type: text
    content: 'hospitable, '
  - type: note
    content: 2 Tim. 2:24
  - type: text
    content: 'able to teach, '
  '3':
  - type: text
    content: 'not a drunkard, not violent but '
  - type: note
    content: Titus 3:2
  - type: text
    content: 'gentle, not quarrelsome, '
  - type: note
    content: Heb. 13:5; [ch. 6:10]
  - type: text
    content: 'not a lover of money. '
  '4':
  - type: text
    content: 'He must manage his own household well, with all dignity '
  - type: note
    content: '[ver. 12]'
  - type: text
    content: 'keeping his children submissive, '
  '5':
  - type: text
    content: 'for if someone does not know how to manage his own household, how will he care for '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'God’s church? '
  '6':
  - type: text
    content: 'He must not be a recent convert, or he may '
  - type: note
    content: ch. 6:4; 2 Tim. 3:4
  - type: text
    content: 'become puffed up with conceit and fall into the condemnation of the devil. '
  '7':
  - type: text
    content: 'Moreover, he must be well thought of by '
  - type: note
    content: See Mark 4:11
  - type: text
    content: 'outsiders, so that he may not fall into disgrace, into '
  - type: note
    content: 2 Tim. 2:26; [ch. 6:9]
  - type: text
    content: a snare of the devil.
  - type: heading
    content: Qualifications for Deacons
  '8':
  - type: text
    content: ' '
  - type: note
    content: Phil. 1:1
  - type: text
    content: Deacons likewise must be dignified, not double-tongued,
  - type: note
    content: Or devious in speech
  - type: text
    content: ' '
  - type: note
    content: '[ch. 5:23; Titus 2:3]'
  - type: text
    content: 'not addicted to much wine, '
  - type: note
    content: Titus 1:7; 1 Pet. 5:2
  - type: text
    content: 'not greedy for dishonest gain. '
  '9':
  - type: text
    content: 'They must '
  - type: note
    content: '[ch. 1:19]'
  - type: text
    content: 'hold the mystery of the faith with '
  - type: note
    content: See Acts 23:1
  - type: text
    content: 'a clear conscience. '
