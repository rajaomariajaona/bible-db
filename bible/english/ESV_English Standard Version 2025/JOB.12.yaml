document_id: JOB.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job Replies: The Lord Has Done This'
  - type: text
    content: 'Then Job answered and said:'
  '10':
  - type: text
    content: 'In '
  - type: note
    content: Num. 16:22; Dan. 5:23; Acts 17:28
  - type: text
    content: his hand is the life of every living thing
  - type: text
    content: and the breath of all mankind.
  '11':
  - type: text
    content: 'Does not '
  - type: note
    content: ch. 34:3
  - type: text
    content: the ear test words
  - type: text
    content: as the palate tastes food?
  '12':
  - type: text
    content: 'Wisdom is with '
  - type: note
    content: ch. 32:7; [Ps. 119:100]
  - type: text
    content: the aged,
  - type: text
    content: and understanding in length of days.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 9:4; 36:5 ]'
  - type: text
    content: “With God
  - type: note
    content: Hebrew him
  - type: text
    content: ' are wisdom and might;'
  - type: text
    content: he has counsel and understanding.
  '14':
  - type: text
    content: If he tears down, none can rebuild;
  - type: text
    content: 'if he '
  - type: note
    content: ch. 11:10; [Isa. 22:22; Rev. 3:7]
  - type: text
    content: shuts a man in, none can open.
  '15':
  - type: text
    content: 'If he '
  - type: note
    content: '[Deut. 11:17; 1 Kgs. 8:35; 17:1]'
  - type: text
    content: withholds the waters, they dry up;
  - type: text
    content: 'if he '
  - type: note
    content: '[Gen. 7:11-24; Ps. 147:18; Amos 9:6]'
  - type: text
    content: sends them out, they overwhelm the land.
  '16':
  - type: text
    content: 'With him are strength and '
  - type: note
    content: '[ch. 5:12]'
  - type: text
    content: sound wisdom;
  - type: text
    content: the deceived and the deceiver are his.
  '17':
  - type: text
    content: 'He leads '
  - type: note
    content: '[2 Sam. 17:23]'
  - type: text
    content: counselors away stripped,
  - type: text
    content: 'and '
  - type: note
    content: ch. 9:24; Isa. 40:23; [Isa. 29:14; 44:25; 1 Cor. 1:19]
  - type: text
    content: judges he makes fools.
  '18':
  - type: text
    content: 'He '
  - type: note
    content: Ps. 116:16
  - type: text
    content: looses the bonds of kings
  - type: text
    content: and binds a waistcloth on their hips.
  '19':
  - type: text
    content: He leads priests away stripped
  - type: text
    content: and overthrows the mighty.
  '2':
  - type: text
    content: “No doubt you are the people,
  - type: text
    content: and wisdom will die with you.
  '20':
  - type: text
    content: He deprives of speech those who are trusted
  - type: note
    content: '[ch. 32:9 ]'
  - type: text
    content: and takes away the discernment of the elders.
  '21':
  - type: text
    content: 'He '
  - type: note
    content: Ps. 107:40
  - type: text
    content: pours contempt on princes
  - type: text
    content: and loosens the belt of the strong.
  '22':
  - type: text
    content: 'He '
  - type: note
    content: Dan. 2:22; 1 Cor. 4:5
  - type: text
    content: uncovers the deeps out of darkness
  - type: text
    content: 'and brings '
  - type: note
    content: See ch. 3:5
  - type: text
    content: deep darkness to light.
  '23':
  - type: text
    content: 'He '
  - type: note
    content: Isa. 9:3; 26:15
  - type: text
    content: makes nations great, and he destroys them;
  - type: text
    content: 'he enlarges nations, and '
  - type: note
    content: '[2 Kgs. 18:11]'
  - type: text
    content: leads them away.
  '24':
  - type: text
    content: He takes away understanding from the chiefs of the people of the earth
  - type: text
    content: 'and '
  - type: note
    content: Ps. 107:40; [ch. 6:18]
  - type: text
    content: makes them wander in a trackless waste.
  '25':
  - type: text
    content: 'They '
  - type: note
    content: See ch. 5:14
  - type: text
    content: grope in the dark without light,
  - type: text
    content: 'and he makes them '
  - type: note
    content: Ps. 107:27; Isa. 19:14
  - type: text
    content: stagger like a drunken man.
  '3':
  - type: text
    content: 'But I have '
  - type: note
    content: '[ch. 13:2; 15:9]'
  - type: text
    content: understanding as well as you;
  - type: text
    content: I am not inferior to you.
  - type: text
    content: 'Who does not know '
  - type: note
    content: ch. 16:2
  - type: text
    content: such things as these?
  '4':
  - type: text
    content: 'I am '
  - type: note
    content: ch. 16:10; 17:2, 6; 21:3; 30:1
  - type: text
    content: a laughingstock to my friends;
  - type: text
    content: 'I, who '
  - type: note
    content: Ps. 91:15
  - type: text
    content: called to God and he answered me,
  - type: text
    content: a just and blameless man, am a laughingstock.
  '5':
  - type: text
    content: 'In the thought of one who is '
  - type: note
    content: ch. 3:18
  - type: text
    content: at ease there is contempt for misfortune;
  - type: text
    content: it is ready for those whose feet slip.
  '6':
  - type: text
    content: ' '
  - type: note
    content: See ch. 21:7
  - type: text
    content: The tents of robbers are at peace,
  - type: text
    content: and those who provoke God are secure,
  - type: text
    content: who bring their god in their hand.
  - type: note
    content: The meaning of the Hebrew is uncertain
  '7':
  - type: text
    content: “But ask the beasts, and they will teach you;
  - type: text
    content: the birds of the heavens, and they will tell you;
  '8':
  - type: text
    content: or the bushes of the earth, and they will teach you;
  - type: note
    content: Or or speak to the earth, and it will teach you
  - type: text
    content: and the fish of the sea will declare to you.
  '9':
  - type: text
    content: Who among all these does not know
  - type: text
    content: 'that '
  - type: note
    content: Isa. 41:20; [ch. 1:21]
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this?'
