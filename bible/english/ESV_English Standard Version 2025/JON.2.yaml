document_id: JON.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Prayer
  - type: text
    content: 'Then Jonah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God from the belly of the fish, '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to the fish, and it vomited Jonah out upon the dry land.'
  '2':
  - type: text
    content: saying,
  - type: note
    content: Ps. 3:4; 120:1; Lam. 3:55
  - type: text
    content: '“I called out to the '
  - type: text
    content: Lord
  - type: text
    content: ', out of my distress,'
  - type: text
    content: and he answered me;
  - type: note
    content: Ps. 118:5
  - type: text
    content: out of the belly of Sheol I cried,
  - type: note
    content: Lam. 3:56
  - type: text
    content: and you heard my voice.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps. 88:6, 7
  - type: text
    content: For you cast me into the deep,
  - type: text
    content: into the heart of the seas,
  - type: text
    content: and the flood surrounded me;
  - type: note
    content: Ps. 42:7
  - type: text
    content: all your breakers and your waves
  - type: text
    content: passed over me.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:22
  - type: text
    content: Then I said, ‘I am driven away
  - type: text
    content: from your sight;
  - type: note
    content: '[ 1 Kgs. 8:35, 38 ]'
  - type: text
    content: yet I shall again look
  - type: text
    content: upon your holy temple.’
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ Lam. 3:54 ]'
  - type: text
    content: 'The waters closed in over me '
  - type: note
    content: Ps. 69:1
  - type: text
    content: to take my life;
  - type: text
    content: the deep surrounded me;
  - type: text
    content: weeds were wrapped about my head.
  '6':
  - type: text
    content: To the roots of the mountains I went down,
  - type: text
    content: to the land whose bars closed upon me forever.
  - type: text
    content: Yet you brought up my life from the pit,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God.'
  '7':
  - type: text
    content: When my life was fainting away,
  - type: text
    content: 'I remembered the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ 2 Chr. 30:27 ]'
  - type: text
    content: and my prayer came to you,
  - type: text
    content: into your holy temple.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps. 31:6; [ 2 Kgs. 17:15; Jer. 2:5 ]
  - type: text
    content: Those who pay regard to vain idols
  - type: note
    content: '[ Jer. 2:13 ]'
  - type: text
    content: forsake their hope of steadfast love.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps. 50:14; [ Hos. 14:2; Heb. 13:15 ]
  - type: text
    content: But I with the voice of thanksgiving
  - type: text
    content: will sacrifice to you;
  - type: text
    content: what I have vowed I will pay.
  - type: note
    content: Ps. 3:8
  - type: text
    content: 'Salvation belongs to the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
