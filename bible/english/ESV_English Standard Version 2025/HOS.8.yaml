document_id: HOS.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Will Reap the Whirlwind
  - type: text
    content: 'Set '
  - type: note
    content: ch. 5:8
  - type: text
    content: the trumpet to your lips!
  - type: text
    content: 'One '
  - type: note
    content: See Deut. 28:49
  - type: text
    content: 'like a vulture is over the house of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'because '
  - type: note
    content: ch. 6:7
  - type: text
    content: they have transgressed my covenant
  - type: text
    content: and rebelled against my law.
  '10':
  - type: text
    content: Though they hire allies among the nations,
  - type: text
    content: I will soon gather them up.
  - type: text
    content: 'And '
  - type: note
    content: See Ezek. 26:7
  - type: text
    content: 'the king and princes '
  - type: note
    content: '[ch. 4:7, 10]'
  - type: text
    content: shall soon writhe
  - type: text
    content: because of the tribute.
  '11':
  - type: text
    content: 'Because Ephraim '
  - type: note
    content: ch. 10:1; 12:11
  - type: text
    content: has multiplied altars for sinning,
  - type: text
    content: they have become to him altars for sinning.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '[ Deut. 4:6, 8 ]'
  - type: text
    content: Were I to write for him my laws by the ten thousands,
  - type: text
    content: they would be regarded as a strange thing.
  '13':
  - type: text
    content: As for my sacrificial offerings,
  - type: note
    content: Jer. 7:21; [ Amos 4:4 ]
  - type: text
    content: they sacrifice meat and eat it,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' does not accept them.'
  - type: note
    content: ch. 9:9; Amos 8:7
  - type: text
    content: Now he will remember their iniquity
  - type: text
    content: and punish their sins;
  - type: note
    content: ch. 9:3; Deut. 28:68; [ch. 11:5 ]
  - type: text
    content: they shall return to Egypt.
  '14':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 6:4
  - type: text
    content: 'Israel has forgotten '
  - type: note
    content: Isa. 17:7
  - type: text
    content: his Maker
  - type: text
    content: 'and '
  - type: note
    content: '[Amos 5:11]'
  - type: text
    content: built palaces,
  - type: text
    content: 'and '
  - type: note
    content: See ch. 6:4
  - type: text
    content: Judah has multiplied fortified cities;
  - type: text
    content: 'so '
  - type: note
    content: Amos 2:5
  - type: text
    content: I will send a fire upon his cities,
  - type: text
    content: and it shall devour her strongholds.
  '2':
  - type: text
    content: To me they cry,
  - type: note
    content: See Matt. 7:21-23
  - type: text
    content: “My God, we—Israel—know you.”
  '3':
  - type: text
    content: Israel has spurned the good;
  - type: text
    content: the enemy shall pursue him.
  '4':
  - type: text
    content: ' '
  - type: note
    content: ch. 7:7; 1 Kgs. 12:20
  - type: text
    content: 'They made kings, '
  - type: note
    content: '[2 Chr. 13:5]'
  - type: text
    content: but not through me.
  - type: text
    content: They set up princes, but I knew it not.
  - type: text
    content: With their silver and gold they made idols
  - type: text
    content: for their own destruction.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 10:5, 6; [ 1 Kgs. 12:28 ]
  - type: text
    content: I have
  - type: note
    content: Hebrew He has
  - type: text
    content: ' spurned your calf, O Samaria.'
  - type: text
    content: My anger burns against them.
  - type: note
    content: '[ Jer. 13:27 ]'
  - type: text
    content: How long will they be incapable of innocence?
  '6':
  - type: text
    content: For it is from Israel;
  - type: text
    content: a craftsman made it;
  - type: text
    content: it is not God.
  - type: note
    content: '[See ver. 5 above]'
  - type: text
    content: The calf of Samaria
  - type: note
    content: '[ Mic. 1:6, 7 ]'
  - type: text
    content: shall be broken to pieces.
  - type: note
    content: Or shall go up in flames
  '7':
  - type: text
    content: 'For '
  - type: note
    content: '[ch. 10:12, 13]'
  - type: text
    content: they sow the wind,
  - type: text
    content: and they shall reap the whirlwind.
  - type: text
    content: The standing grain has no heads;
  - type: text
    content: it shall yield no flour;
  - type: text
    content: if it were to yield,
  - type: note
    content: '[ch. 7:9 ]'
  - type: text
    content: strangers would devour it.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 2 Kgs. 17:6
  - type: text
    content: Israel is swallowed up;
  - type: text
    content: already they are among the nations
  - type: text
    content: 'as '
  - type: note
    content: Jer. 22:28
  - type: text
    content: a useless vessel.
  '9':
  - type: text
    content: 'For '
  - type: note
    content: See ch. 5:13
  - type: text
    content: they have gone up to Assyria,
  - type: note
    content: '[ Jer. 2:24 ]'
  - type: text
    content: a wild donkey wandering alone;
  - type: text
    content: Ephraim has hired lovers.
