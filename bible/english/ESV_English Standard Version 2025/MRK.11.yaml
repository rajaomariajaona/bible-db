document_id: MRK.11,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumphal Entry
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-10, see Matt. 21:1-9; Luke 19:29-38; John 12:12-15; [ Zech. 9:9 ]
  - type: text
    content: 'Now when they drew near to Jerusalem, to '
  - type: note
    content: Matt. 21:17; Luke 24:50; John 11:18
  - type: text
    content: 'Bethphage and Bethany, at '
  - type: note
    content: Zech. 14:4; Matt. 24:3; 26:30; John 8:1; [Acts 1:12]
  - type: text
    content: the Mount of Olives, Jesus
  - type: note
    content: Greek he
  - type: text
    content: ' sent '
  - type: note
    content: '[ch. 14:13]'
  - type: text
    content: 'two of his disciples '
  '10':
  - type: text
    content: 'Blessed is '
  - type: note
    content: See Luke 1:32
  - type: text
    content: 'the coming '
  - type: note
    content: '[Ezek. 37:24, 25]'
  - type: text
    content: 'kingdom of '
  - type: note
    content: '[Acts 2:29]'
  - type: text
    content: 'our father '
  - type: note
    content: '[Ezek. 37:24, 25]'
  - type: text
    content: 'David! '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'Hosanna '
  - type: note
    content: Luke 2:14; [Ps. 148:1]
  - type: text
    content: in the highest!”
  '11':
  - type: text
    content: ' '
  - type: note
    content: Matt. 21:10
  - type: text
    content: 'And he entered Jerusalem and went into the temple. And when he had looked around at everything, as it was already late, '
  - type: note
    content: ver. 19; Matt. 21:17
  - type: text
    content: he went out to Bethany with the twelve.
  - type: heading
    content: Jesus Curses the Fig Tree
  '12':
  - type: text
    content: ' '
  - type: note
    content: For ver. 12-14, see Matt. 21:18, 19
  - type: text
    content: 'On the following day, when they came from Bethany, '
  - type: note
    content: Matt. 4:2
  - type: text
    content: 'he was hungry. '
  '13':
  - type: note
    content: '[Luke 13:6-9]'
  - type: text
    content: 'And seeing in the distance a fig tree in leaf, he went to see if he could find anything on it. When he came to it, he found nothing but leaves, for '
  - type: note
    content: ch. 13:28
  - type: text
    content: 'it was not the season for figs. '
  '14':
  - type: text
    content: 'And he said to it, '
  - type: text
    content: “May no one ever eat fruit from you again.”
  - type: text
    content: ' And his disciples heard it.'
  - type: heading
    content: Jesus Cleanses the Temple
  '15':
  - type: text
    content: ' '
  - type: note
    content: For ver. 15-18, see Matt. 21:12-16; Luke 19:45-47; [ John 2:14-16 ]
  - type: text
    content: 'And they came to Jerusalem. And he entered the temple and began to drive out those who sold and those who bought in the temple, and he overturned the tables of '
  - type: note
    content: '[Ex. 30:13]'
  - type: text
    content: 'the money-changers and the seats of those who sold '
  - type: note
    content: Lev. 1:14; 5:7; 12:8; Luke 2:24
  - type: text
    content: 'pigeons. '
  '16':
  - type: text
    content: 'And he would not allow anyone to carry anything through the temple. '
  '17':
  - type: text
    content: 'And he was teaching them and saying to them, '
  - type: text
    content: '“Is it not written, '
  - type: note
    content: Cited from Isa. 56:7
  - type: text
    content: '‘My house shall be called a house of prayer for all the nations’? But '
  - type: note
    content: Jer. 7:11
  - type: text
    content: you have made it a den of robbers.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And the chief priests and the scribes heard it and '
  - type: note
    content: See Matt. 21:46
  - type: text
    content: 'were seeking a way to destroy him, for they feared him, because '
  - type: note
    content: See Matt. 7:28
  - type: text
    content: 'all the crowd was astonished at his teaching. '
  '19':
  - type: note
    content: Luke 21:37; [ver. 11]
  - type: text
    content: And when evening came they
  - type: note
    content: Some manuscripts he
  - type: text
    content: ' went out of the city.'
  - type: heading
    content: The Lesson from the Withered Fig Tree
  '2':
  - type: text
    content: 'and said to them, '
  - type: text
    content: '“Go into the village in front of you, and immediately as you enter it you will find a colt tied, '
  - type: note
    content: '[Luke 23:53]'
  - type: text
    content: on which no one has ever sat. Untie it and bring it.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: note
    content: For ver. 20-24, see Matt. 21:19-22
  - type: text
    content: 'As they passed by in the morning, they saw the fig tree withered away to its roots. '
  '21':
  - type: text
    content: 'And Peter remembered and said to him, '
  - type: note
    content: See John 1:38
  - type: text
    content: '“Rabbi, look! The fig tree that you cursed has withered.” '
  '22':
  - type: text
    content: 'And Jesus answered them, '
  - type: text
    content: '“Have '
  - type: note
    content: Eph. 3:12; Phil. 3:9
  - type: text
    content: faith in God.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Matt. 17:20
  - type: text
    content: 'Truly, I say to you, whoever says to this mountain, '
  - type: note
    content: '[Ps. 46:2; 1 Cor. 13:2; Rev. 8:8]'
  - type: text
    content: '‘Be taken up and thrown into the sea,’ and does not '
  - type: note
    content: Rom. 4:20; 14:23; James 1:6
  - type: text
    content: 'doubt in his heart, but '
  - type: note
    content: '[ch. 16:17; John 14:12]'
  - type: text
    content: believes that what he says will come to pass, it will be done for him.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Therefore I tell you, '
  - type: note
    content: See Matt. 7:7
  - type: text
    content: 'whatever you ask in prayer, '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'believe that you '
  - type: note
    content: '[Isa. 65:24; Matt. 6:8]'
  - type: text
    content: have received
  - type: note
    content: Some manuscripts are receiving
  - type: text
    content: ' '
  - type: text
    content: it, and it will be yours.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And whenever '
  - type: note
    content: Matt. 6:5; Luke 18:11
  - type: text
    content: 'you stand praying, '
  - type: note
    content: See Matt. 6:14
  - type: text
    content: 'forgive, '
  - type: note
    content: Col. 3:13; [Matt. 5:23; 6:15]
  - type: text
    content: 'if you have anything against anyone, so that '
  - type: note
    content: Matt. 7:11
  - type: text
    content: your Father also who is in heaven may forgive you your trespasses.”
  - type: note
    content: 'Some manuscripts add verse 26: But if you do not forgive, neither will your Father who is in heaven forgive your trespasses'
  - type: heading
    content: The Authority of Jesus Challenged
  '27':
  - type: text
    content: ' '
  - type: note
    content: For ver. 27-33, see Matt. 21:23-27; Luke 20:1-8
  - type: text
    content: 'And they came again to Jerusalem. And as he was walking in the temple, the chief priests and the scribes and the elders came to him, '
  '28':
  - type: text
    content: 'and they said to him, '
  - type: note
    content: '[Ex. 2:14; John 1:25; Acts 4:7]'
  - type: text
    content: '“By what authority are you doing these things, or who gave you this authority to do them?” '
  '29':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “I will ask you one question; answer me, and I will tell you by what authority I do these things.
  - type: text
    content: ' '
  '3':
  - type: text
    content: If anyone says to you, ‘Why are you doing this?’ say, ‘The Lord has need of it and will send it back here immediately.’”
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Was the baptism of John '
  - type: note
    content: Luke 15:18, 21; John 3:27
  - type: text
    content: from heaven or from man? Answer me.”
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And they discussed it with one another, saying, “If we say, ‘From heaven,’ he will say, '
  - type: note
    content: Matt. 21:32; Luke 7:30
  - type: text
    content: '‘Why then did you not believe him?’ '
  '32':
  - type: text
    content: But shall we say, ‘From man’?”—
  - type: note
    content: Matt. 14:5; 21:46
  - type: text
    content: 'they were afraid of the people, for they all held that John really was '
  - type: note
    content: '[John 5:35]; See Matt. 11:9'
  - type: text
    content: 'a prophet. '
  '33':
  - type: text
    content: 'So they answered Jesus, “We do not know.” And Jesus said to them, '
  - type: text
    content: “Neither will I tell you by what authority I do these things.”
  '4':
  - type: text
    content: 'And they went away and found a colt tied at a door outside in the street, and they untied it. '
  '5':
  - type: text
    content: 'And some of those standing there said to them, “What are you doing, untying the colt?” '
  '6':
  - type: text
    content: 'And they told them what Jesus had said, and they let them go. '
  '7':
  - type: text
    content: 'And they brought the colt to Jesus and threw their cloaks on it, and he sat on it. '
  '8':
  - type: text
    content: 'And many '
  - type: note
    content: 2 Kgs. 9:13
  - type: text
    content: 'spread their cloaks on the road, and others spread leafy branches that they had cut from the fields. '
  '9':
  - type: text
    content: 'And those who went before and those who followed were shouting, '
  - type: note
    content: See Ps. 118:25 (Heb.)
  - type: text
    content: '“Hosanna! '
  - type: note
    content: Matt. 23:39; Cited from Ps. 118:26
  - type: text
    content: 'Blessed is he who comes in the name of the Lord! '
