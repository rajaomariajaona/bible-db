document_id: JOS.20,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Cities of Refuge
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, '
  '2':
  - type: text
    content: '“Say to the people of Israel, '
  - type: note
    content: Ex. 21:13; See Num. 35:6, 11-14; Deut. 4:41-43; 19:2-9
  - type: text
    content: '‘Appoint the cities of refuge, of which I spoke to you through Moses, '
  '3':
  - type: text
    content: 'that the manslayer who strikes any person without intent or unknowingly may flee there. They shall be for you a refuge from the avenger of blood. '
  '4':
  - type: text
    content: 'He shall flee to one of these cities and shall stand '
  - type: note
    content: '[Deut. 21:19; Ruth 4:1, 2; Ps. 127:5]'
  - type: text
    content: 'at the entrance of the gate of the city and explain his case to the elders of that city. Then they shall take him into the city and give him a place, and he shall remain with them. '
  '5':
  - type: text
    content: 'And if the avenger of blood pursues him, they shall not give up the manslayer into his hand, because he struck his neighbor unknowingly, and did not hate him in the past. '
  '6':
  - type: text
    content: 'And he shall remain in that city '
  - type: note
    content: Num. 35:12, 24, 25
  - type: text
    content: until he has stood before the congregation for judgment, until the death of him who is high priest at the time. Then the manslayer may return to his own town and his own home, to the town from which he fled.’”
  '7':
  - type: text
    content: 'So they set apart '
  - type: note
    content: ch. 21:32; 1 Chr. 6:76
  - type: text
    content: 'Kedesh in Galilee in the hill country of Naphtali, and '
  - type: note
    content: ch. 21:21
  - type: text
    content: 'Shechem in the hill country of Ephraim, and '
  - type: note
    content: ch. 21:11, 13; See ch. 14:13-15
  - type: text
    content: 'Kiriath-arba (that is, Hebron) '
  - type: note
    content: ch. 21:11; Luke 1:39
  - type: text
    content: 'in the hill country of Judah. '
  '8':
  - type: text
    content: 'And beyond the Jordan east of Jericho, they appointed '
  - type: note
    content: ch. 21:36; 1 Chr. 6:78
  - type: text
    content: 'Bezer in the wilderness on the tableland, from the tribe of Reuben, and '
  - type: note
    content: ch. 21:38; [1 Kgs. 22:3]
  - type: text
    content: 'Ramoth in Gilead, from the tribe of Gad, and '
  - type: note
    content: ch. 21:27; 1 Chr. 6:71
  - type: text
    content: 'Golan in Bashan, from the tribe of Manasseh. '
  '9':
  - type: text
    content: 'These were the cities designated for all the people of Israel and '
  - type: note
    content: Num. 35:15
  - type: text
    content: for the stranger sojourning among them, that anyone who killed a person without intent could flee there, so that he might not die by the hand of the avenger of blood, till he stood before the congregation.
