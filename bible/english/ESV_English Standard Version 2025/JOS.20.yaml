      children:
      - type: text
        text: Num. 35:15
      metadata:
        usfm: NUM.35.15
    marker-yv: yv-n
  - type: text
    text: for the stranger sojourning among them, that anyone who killed a person without intent could flee there, so that he might not die by the hand of the avenger of blood, till he stood before the congregation.
