document_id: JOS.20,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cities of Refuge
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Say to the people of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 21:13
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11-14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 4:41-43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2-9
      marker-yv: yv-n
    - type: text
      text: '‘Appoint the cities of refuge, of which I spoke to you through Moses, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the manslayer who strikes any person without intent or unknowingly may flee there. They shall be for you a refuge from the avenger of blood. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall flee to one of these cities and shall stand '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deut. 21:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 4:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 127:5
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'at the entrance of the gate of the city and explain his case to the elders of that city. Then they shall take him into the city and give him a place, and he shall remain with them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the avenger of blood pursues him, they shall not give up the manslayer into his hand, because he struck his neighbor unknowingly, and did not hate him in the past. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall remain in that city '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      marker-yv: yv-n
    - type: text
      text: until he has stood before the congregation for judgment, until the death of him who is high priest at the time. Then the manslayer may return to his own town and his own home, to the town from which he fled.’”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they set apart '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:76
      marker-yv: yv-n
    - type: text
      text: 'Kedesh in Galilee in the hill country of Naphtali, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:21
      marker-yv: yv-n
    - type: text
      text: 'Shechem in the hill country of Ephraim, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'See ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:13-15
      marker-yv: yv-n
    - type: text
      text: 'Kiriath-arba (that is, Hebron) '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:39
      marker-yv: yv-n
    - type: text
      text: 'in the hill country of Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And beyond the Jordan east of Jericho, they appointed '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:78
      marker-yv: yv-n
    - type: text
      text: 'Bezer in the wilderness on the tableland, from the tribe of Reuben, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:38
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 22:3
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Ramoth in Gilead, from the tribe of Gad, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 6:71
      marker-yv: yv-n
    - type: text
      text: 'Golan in Bashan, from the tribe of Manasseh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the cities designated for all the people of Israel and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 35:15
      marker-yv: yv-n
    - type: text
      text: for the stranger sojourning among them, that anyone who killed a person without intent could flee there, so that he might not die by the hand of the avenger of blood, till he stood before the congregation.
