document_id: 2CH.27,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham Reigns in Judah
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-3, see 2 Kgs. 15:33-35
  - type: text
    content: 'Jotham was twenty-five years old when he began to reign, and he reigned sixteen years in Jerusalem. His mother’s name was Jerushah the daughter of Zadok. '
  '2':
  - type: text
    content: 'And he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' according to all that his father Uzziah had done, '
  - type: note
    content: '[ch. 26:16]'
  - type: text
    content: 'except he did not enter the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. But the people still followed corrupt practices. '
  '3':
  - type: text
    content: 'He built the upper gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did much building on the wall of '
  - type: note
    content: ch. 33:14; Neh. 3:26, 27; 11:21
  - type: text
    content: 'Ophel. '
  '4':
  - type: text
    content: 'Moreover, he built cities in the hill country of Judah, and forts and towers on the wooded hills. '
  '5':
  - type: text
    content: He fought with the king of the Ammonites and prevailed against them. And the Ammonites gave him that year 100 talents
  - type: note
    content: A talent was about 75 pounds or 34 kilograms
  - type: text
    content: ' of silver, and 10,000 cors'
  - type: note
    content: A cor was about 6 bushels or 220 liters
  - type: text
    content: ' of wheat and 10,000 of barley. The Ammonites paid him the same amount in the second and the third years. '
  '6':
  - type: text
    content: 'So Jotham became mighty, because he ordered his ways before the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '7':
  - type: note
    content: '[2 Kgs. 15:36]'
  - type: text
    content: 'Now the rest of the acts of Jotham, and all his wars and his ways, behold, they are written in the Book of the Kings of Israel and Judah. '
  '8':
  - type: text
    content: 'He was '
  - type: note
    content: ver. 1
  - type: text
    content: 'twenty-five years old when he began to reign, and he reigned sixteen years in Jerusalem. '
  '9':
  - type: text
    content: And Jotham slept with his fathers, and they buried him in the city of David, and Ahaz his son reigned in his place.
