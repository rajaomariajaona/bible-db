document_id: GAL.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Accepted by the Apostles
  - type: text
    content: 'Then after fourteen years I went up again to Jerusalem with Barnabas, taking Titus along with me. '
  '10':
  - type: text
    content: 'Only, they asked us to remember the poor, '
  - type: note
    content: See Acts 24:17
  - type: text
    content: the very thing I was eager to do.
  - type: heading
    content: Paul Opposes Peter
  '11':
  - type: text
    content: 'But '
  - type: note
    content: '[Acts 15:1, 35]'
  - type: text
    content: 'when Cephas came to Antioch, I opposed him '
  - type: note
    content: Job 21:31
  - type: text
    content: 'to his face, because he stood condemned. '
  '12':
  - type: text
    content: 'For before certain men came from James, '
  - type: note
    content: Acts 11:3; [ver. 14; Acts 10:28]; See Luke 15:2
  - type: text
    content: 'he was eating with the Gentiles; but when they came he drew back and separated himself, fearing '
  - type: note
    content: See Acts 11:2
  - type: text
    content: the circumcision party.
  - type: note
    content: Or fearing those of the circumcision
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And the rest of the Jews acted hypocritically along with him, so that even Barnabas was led astray by their hypocrisy. '
  '14':
  - type: text
    content: 'But when I saw that their '
  - type: note
    content: Heb. 12:13
  - type: text
    content: 'conduct was not in step with '
  - type: note
    content: See ver. 5
  - type: text
    content: 'the truth of the gospel, I said to Cephas '
  - type: note
    content: 1 Tim. 5:20
  - type: text
    content: 'before them all, “If you, though a Jew, '
  - type: note
    content: See ver. 12
  - type: text
    content: live like a Gentile and not like a Jew, how can you force the Gentiles to live like Jews?”
  - type: heading
    content: Justified by Faith
  '15':
  - type: text
    content: 'We ourselves are Jews by birth and not '
  - type: note
    content: ver. 17; [Eph. 2:3, 12]
  - type: text
    content: 'Gentile sinners; '
  '16':
  - type: text
    content: 'yet we know that '
  - type: note
    content: ch. 3:11; See Acts 13:39
  - type: text
    content: a person is not justified
  - type: note
    content: Or counted righteous (three times in verse 16); also verse 17
  - type: text
    content: ' by works of the law '
  - type: note
    content: See Rom. 9:30
  - type: text
    content: 'but through faith in Jesus Christ, so we also have believed in Christ Jesus, in order to be justified by faith in Christ and not by works of the law, '
  - type: note
    content: Rom. 3:20; [Ps. 143:2]
  - type: text
    content: because by works of the law no one will be justified.
  '17':
  - type: text
    content: 'But if, in our endeavor to be justified in Christ, we too were found '
  - type: note
    content: ver. 15
  - type: text
    content: 'to be sinners, is Christ then a servant of sin? Certainly not! '
  '18':
  - type: text
    content: 'For if I rebuild what I tore down, I prove myself to be a transgressor. '
  '19':
  - type: text
    content: 'For through the law I '
  - type: note
    content: See Rom. 6:2; 7:4
  - type: text
    content: 'died to the law, so that I might '
  - type: note
    content: Luke 20:38; Rom. 6:11; 14:7, 8; 2 Cor. 5:15; 1 Thess. 5:10; Heb. 9:14; 1 Pet. 4:2
  - type: text
    content: 'live to God. '
  '2':
  - type: text
    content: 'I went up because of a revelation and set before them (though privately before those '
  - type: note
    content: ver. 6, 9
  - type: text
    content: 'who seemed influential) the gospel that '
  - type: note
    content: 1 Tim. 3:16
  - type: text
    content: 'I proclaim among the Gentiles, '
  - type: note
    content: ch. 4:11; 1 Thess. 3:5
  - type: text
    content: 'in order to make sure I was not running or had not '
  - type: note
    content: Phil. 2:16
  - type: text
    content: 'run in vain. '
  '20':
  - type: text
    content: 'I have been '
  - type: note
    content: ch. 5:24; 6:14; Rom. 6:6
  - type: text
    content: 'crucified with Christ. It is no longer I who live, but Christ who lives '
  - type: note
    content: See John 17:23
  - type: text
    content: 'in me. And the life I now live in the flesh I live by faith in the Son of God, '
  - type: note
    content: See Rom. 8:37
  - type: text
    content: 'who loved me and '
  - type: note
    content: See ch. 1:4
  - type: text
    content: 'gave himself for me. '
  '21':
  - type: text
    content: 'I do not nullify the grace of God, for '
  - type: note
    content: '[ch. 3:21; Heb. 7:11]'
  - type: text
    content: if righteousness
  - type: note
    content: Or justification
  - type: text
    content: ' were through the law, '
  - type: note
    content: '[ch. 5:4]'
  - type: text
    content: then Christ died for no purpose.
  '3':
  - type: text
    content: 'But even Titus, who was with me, '
  - type: note
    content: '[Acts 16:3]'
  - type: text
    content: 'was not forced to be circumcised, though he was a Greek. '
  '4':
  - type: note
    content: Acts 15:24; 2 Cor. 11:26; [ch. 5:12]
  - type: text
    content: 'Yet because of false brothers secretly brought in—who '
  - type: note
    content: '[2 Pet. 2:1; Jude 4]'
  - type: text
    content: 'slipped in to spy out '
  - type: note
    content: See ch. 5:1
  - type: text
    content: 'our freedom that we have in Christ Jesus, '
  - type: note
    content: ch. 4:3, 9, 24, 25; 2 Cor. 11:20; [Rom. 8:15]
  - type: text
    content: 'so that they might bring us into slavery— '
  '5':
  - type: text
    content: 'to them we did not yield in submission even for a moment, so that '
  - type: note
    content: ver. 14; [ch. 4:16; 5:7; Titus 1:14; 2 John 1]
  - type: text
    content: 'the truth of the gospel might be preserved for you. '
  '6':
  - type: text
    content: 'And from those '
  - type: note
    content: ver. 2, 9; [ch. 6:3; Acts 5:36]; See 1 Cor. 3:7
  - type: text
    content: 'who seemed to be influential (what they were makes no difference to me; '
  - type: note
    content: See Deut. 10:17
  - type: text
    content: 'God shows no partiality)—those, I say, who seemed influential '
  - type: note
    content: '[2 Cor. 11:5; 12:11]'
  - type: text
    content: 'added nothing to me. '
  '7':
  - type: text
    content: 'On the contrary, when they saw that I had been '
  - type: note
    content: 1 Thess. 2:4; 1 Tim. 1:11; See 1 Cor. 9:17
  - type: text
    content: 'entrusted with '
  - type: note
    content: ch. 1:16; See Acts 9:15
  - type: text
    content: 'the gospel to the uncircumcised, just as Peter had been entrusted with the gospel to the circumcised '
  '8':
  - type: text
    content: '(for he who worked through Peter for his apostolic ministry to the circumcised worked also through me for mine to the Gentiles), '
  '9':
  - type: text
    content: 'and when James and Cephas and John, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'who seemed to be '
  - type: note
    content: Jer. 1:18; Rev. 3:12
  - type: text
    content: 'pillars, perceived the '
  - type: note
    content: See Rom. 1:5
  - type: text
    content: 'grace that was given to me, they '
  - type: note
    content: '[2 Pet. 3:15]'
  - type: text
    content: 'gave the right hand of fellowship to Barnabas and me, that we should go to the Gentiles and they to the circumcised. '
