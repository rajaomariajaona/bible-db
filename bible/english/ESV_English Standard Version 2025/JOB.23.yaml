    content: 'Job Replies: Where Is God?'
  - type: text
    content: 'Then Job answered and said:'
  '10':
  - type: text
    content: 'But he '
  - type: note
    content: Ps. 139:1-3
  - type: text
    content: 'knows '
  - type: note
    content: Ps. 139:24
  - type: text
    content: 'the way that I '
  - type: note
    content: '[ch. 9:35]'
  - type: text
    content: take;
  - type: text
    content: 'when he has '
  - type: note
    content: Ps. 17:3; 26:2; 66:10; 139:23; Zech. 13:9; Mal. 3:3; 1 Pet. 1:7; Rev. 3:18; [James 1:12]
  - type: text
    content: tried me, I shall come out as gold.
  '11':
  - type: text
    content: 'My foot '
  - type: note
    content: Ps. 17:5; 44:18
  - type: text
    content: has held fast to his steps;
  - type: text
    content: 'I have kept his way and have '
  - type: note
    content: Ps. 125:5
  - type: text
    content: not turned aside.
  '12':
  - type: text
    content: I have not departed from the commandment of his lips;
  - type: text
    content: 'I have '
  - type: note
    content: '[Ps. 119:11]'
  - type: text
    content: 'treasured the words of his mouth more than my '
  - type: note
    content: '[Ps. 119:103; John 4:32, 34]'
  - type: text
    content: portion of food.
  '13':
  - type: text
    content: But he is unchangeable,
  - type: note
    content: Or one
  - type: text
    content: ' and '
  - type: note
    content: '[ch. 9:12; 12:14]'
  - type: text
    content: who can turn him back?
  - type: text
    content: 'What he '
  - type: note
    content: Ps. 115:3
  - type: text
    content: desires, that he does.
  '14':
  - type: text
    content: 'For he will complete what he '
  - type: note
    content: '[1 Thess. 3:3]'
  - type: text
    content: appoints for me,
  - type: text
    content: 'and many such things are '
  - type: note
    content: '[ch. 10:13; 27:11]'
  - type: text
    content: in his mind.
  '15':
  - type: text
    content: Therefore I am terrified at his presence;
  - type: text
    content: when I consider, I am in dread of him.
  '16':
  - type: text
    content: 'God has made my '
  - type: note
    content: Deut. 20:3; [Ps. 22:14]
  - type: text
    content: heart faint;
  - type: text
    content: the Almighty has terrified me;
  '17':
  - type: text
    content: yet I am not silenced because of the darkness,
  - type: text
    content: nor because thick darkness covers my face.
  '2':
  - type: text
    content: '“Today also my '
  - type: note
    content: ch. 10:1; 21:4
  - type: text
    content: complaint is bitter;
  - type: note
    content: Or defiant
  - type: text
    content: 'my '
  - type: note
    content: '[Ps. 32:4]'
  - type: text
    content: hand is heavy on account of my groaning.
  '3':
  - type: text
    content: 'Oh, '
  - type: note
    content: '[ch. 13:3; 16:21]'
  - type: text
    content: that I knew where I might find him,
  - type: text
    content: 'that I might come even to his '
  - type: note
    content: '[Ps. 9:7, 8; Isa. 57:15, 16]'
  - type: text
    content: seat!
  '4':
  - type: text
    content: 'I would '
  - type: note
    content: See ch. 33:5
  - type: text
    content: lay my case before him
  - type: text
    content: and fill my mouth with arguments.
  '5':
  - type: text
    content: I would know what he would answer me
  - type: text
    content: and understand what he would say to me.
  '6':
  - type: text
    content: 'Would he '
  - type: note
    content: '[ch. 9:34; 13:21]'
  - type: text
    content: contend with me in the greatness of his power?
  - type: text
    content: No; he would pay attention to me.
  '7':
  - type: text
    content: There an upright man could argue with him,
  - type: text
    content: and I would be acquitted forever by my judge.
  '8':
  - type: text
    content: '“Behold, '
  - type: note
    content: ch. 9:11; 35:14
  - type: text
    content: I go forward, but he is not there,
  - type: text
    content: and backward, but I do not perceive him;
  '9':
  - type: text
    content: on the left hand when he is working, I do not behold him;
  - type: text
    content: he turns to the right hand, but I do not see him.
