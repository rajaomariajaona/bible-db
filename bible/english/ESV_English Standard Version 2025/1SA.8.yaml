        text: Ex. 18:21
      metadata:
        usfm: EXO.18.21
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'but turned aside after gain. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 23:8
      metadata:
        usfm: EXO.23.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 15:5
      metadata:
        usfm: PSA.15.5
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: They took bribes and perverted justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then all the elders of Israel gathered together and came to Samuel at '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[See ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:17
      metadata:
        usfm: 1SA.7.17
    - type: text
      text: ' '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: above]
    marker-yv: yv-n
  - type: text
    text: 'Ramah '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said to him, “Behold, you are old and your sons do not walk in your ways. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
