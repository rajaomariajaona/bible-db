    - type: text
      text: '1'
  - type: text
    text: 'When Samuel became old, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 16:18
      metadata:
        usfm: DEU.16.18
    marker-yv: yv-n
  - type: text
    text: 'he made his sons judges over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The name of his firstborn son was Joel, and the name of his second, Abijah; they were judges in Beersheba. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Yet his sons did not walk in his ways '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
