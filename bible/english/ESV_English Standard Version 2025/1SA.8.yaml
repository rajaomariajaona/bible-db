      metadata:
        usfm: 1SA.8.19
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ; [
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 17:14
      metadata:
        usfm: DEU.17.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 13:10
      metadata:
        usfm: HOS.13.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 13:21
      metadata:
        usfm: ACT.13.21
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'Now appoint for us a king to judge us like all the nations.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the thing displeased Samuel when they said, “Give us a king to judge us.” And Samuel prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Samuel, “Obey the voice of the people in all that they say to you, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex. 16:8
      metadata:
        usfm: EXO.16.8
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'for they have not rejected you, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:19
      metadata:
        usfm: 1SA.10.19
    marker-yv: yv-n
  - type: text
    text: 'but they have rejected me from being king over them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'According to all the deeds that they have done, from the day I brought them up out of Egypt even to this day, forsaking me and serving other gods, so they are also doing to you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now then, obey their voice; only you shall solemnly warn them '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11-18
      metadata:
        usfm: 1SA.8.11
    marker-yv: yv-n
  - type: text
    text: and show them the ways of the king who shall reign over them.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samuel’s Warning Against Kings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Samuel told all the words of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to the people who were asking for a king from him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:25
      metadata:
        usfm: 1SA.10.25
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deut. 17:16-20
      metadata:
        usfm: DEU.17.16+DEU.17.17+DEU.17.18+DEU.17.19+DEU.17.20
    marker-yv: yv-n
  - type: text
    text: '“These will be the ways of the king who will reign over you: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:52
      metadata:
        usfm: 1SA.14.52
    marker-yv: yv-n
  - type: text
    text: 'he will take your sons and appoint them to his chariots and to be his horsemen and to run before his chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he will appoint for himself commanders of thousands and commanders of fifties, and some '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'See '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 45:6
      metadata:
        usfm: GEN.45.6
    marker-yv: yv-n
  - type: text
    text: 'to plow his ground and to reap his harvest, and to make his implements of war and the equipment of his chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He will take your daughters to be perfumers and cooks and bakers. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Kgs. 21:7
      metadata:
        usfm: 1KI.21.7
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 46:18
      metadata:
        usfm: EZK.46.18
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'He will take the best of your fields and vineyards and olive orchards and give them to his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He will take the tenth of your grain and of your vineyards and give it to his officers and to his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He will take your male servants and female servants and the best of your young men
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cattle
    marker-yv: yv-n
  - type: text
    text: ' and your donkeys, and put them to his work. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He will take the tenth of your flocks, and you shall be his slaves. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And in that day you will cry out because of your king, whom you have chosen for yourselves, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 3:4
      metadata:
        usfm: MIC.3.4
    marker-yv: yv-n
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not answer you in that day.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Grants Israel’s Request'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But the people refused to obey the voice of Samuel. And they said, “No! But there shall be a king over us, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: 1SA.8.5
    marker-yv: yv-n
  - type: text
    text: 'that we also may be like all the nations, and that our king may judge us and go out before us and fight our battles.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And when Samuel had heard all the words of the people, he repeated them in the ears of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Samuel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1SA.8.7
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 13:11
      metadata:
        usfm: HOS.13.11
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: “Obey their voice and make them a king.” Samuel then said to the men of Israel, “Go every man to his city.”
