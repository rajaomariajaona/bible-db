document_id: 1SA.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Demands a King
  - type: text
    content: 'When Samuel became old, '
  - type: note
    content: Deut. 16:18
  - type: text
    content: 'he made his sons judges over Israel. '
  '10':
  - type: text
    content: 'So Samuel told all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the people who were asking for a king from him. '
  '11':
  - type: text
    content: 'He said, '
  - type: note
    content: ch. 10:25; See Deut. 17:16-20
  - type: text
    content: '“These will be the ways of the king who will reign over you: '
  - type: note
    content: ch. 14:52
  - type: text
    content: 'he will take your sons and appoint them to his chariots and to be his horsemen and to run before his chariots. '
  '12':
  - type: text
    content: 'And he will appoint for himself commanders of thousands and commanders of fifties, and some '
  - type: note
    content: See Gen. 45:6
  - type: text
    content: 'to plow his ground and to reap his harvest, and to make his implements of war and the equipment of his chariots. '
  '13':
  - type: text
    content: 'He will take your daughters to be perfumers and cooks and bakers. '
  '14':
  - type: note
    content: 1 Kgs. 21:7; [Ezek. 46:18]
  - type: text
    content: 'He will take the best of your fields and vineyards and olive orchards and give them to his servants. '
  '15':
  - type: text
    content: 'He will take the tenth of your grain and of your vineyards and give it to his officers and to his servants. '
  '16':
  - type: text
    content: He will take your male servants and female servants and the best of your young men
  - type: note
    content: Septuagint cattle
  - type: text
    content: ' and your donkeys, and put them to his work. '
  '17':
  - type: text
    content: 'He will take the tenth of your flocks, and you shall be his slaves. '
  '18':
  - type: text
    content: 'And in that day you will cry out because of your king, whom you have chosen for yourselves, '
  - type: note
    content: Prov. 1:28; Isa. 1:15; Mic. 3:4
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' will not answer you in that day.”'
  - type: heading
    content: The Lord Grants Israel’s Request
  '19':
  - type: text
    content: 'But the people refused to obey the voice of Samuel. And they said, “No! But there shall be a king over us, '
  '2':
  - type: text
    content: 'The name of his firstborn son was Joel, and the name of his second, Abijah; they were judges in Beersheba. '
  '20':
  - type: note
    content: ver. 5
  - type: text
    content: 'that we also may be like all the nations, and that our king may judge us and go out before us and fight our battles.” '
  '21':
  - type: text
    content: 'And when Samuel had heard all the words of the people, he repeated them in the ears of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, '
  - type: note
    content: ver. 7; [Hos. 13:11]
  - type: text
    content: “Obey their voice and make them a king.” Samuel then said to the men of Israel, “Go every man to his city.”
  '3':
  - type: text
    content: 'Yet his sons did not walk in his ways '
  - type: note
    content: '[Ex. 18:21]'
  - type: text
    content: 'but turned aside after gain. '
  - type: note
    content: '[Ex. 23:8; Deut. 16:19; Ps. 15:5]'
  - type: text
    content: They took bribes and perverted justice.
  '4':
  - type: text
    content: 'Then all the elders of Israel gathered together and came to Samuel at '
  - type: note
    content: '[See ch. 7:17 above]'
  - type: text
    content: 'Ramah '
  '5':
  - type: text
    content: 'and said to him, “Behold, you are old and your sons do not walk in your ways. '
  - type: note
    content: ver. 19, 20; [Deut. 17:14; Hos. 13:10; Acts 13:21]
  - type: text
    content: 'Now appoint for us a king to judge us like all the nations.” '
  '6':
  - type: text
    content: 'But the thing displeased Samuel when they said, “Give us a king to judge us.” And Samuel prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “Obey the voice of the people in all that they say to you, '
  - type: note
    content: '[Ex. 16:8]'
  - type: text
    content: 'for they have not rejected you, '
  - type: note
    content: ch. 10:19
  - type: text
    content: 'but they have rejected me from being king over them. '
  '8':
  - type: text
    content: 'According to all the deeds that they have done, from the day I brought them up out of Egypt even to this day, forsaking me and serving other gods, so they are also doing to you. '
  '9':
  - type: text
    content: 'Now then, obey their voice; only you shall solemnly warn them '
  - type: note
    content: See ver. 11-18
  - type: text
    content: and show them the ways of the king who shall reign over them.”
  - type: heading
    content: Samuel’s Warning Against Kings
