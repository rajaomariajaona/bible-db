document_id: DEU.8,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Remember the Lord Your God
  - type: text
    content: '“The whole commandment that I command you today '
  - type: note
    content: ch. 4:1; 5:32, 33; 6:1-3
  - type: text
    content: 'you shall be careful to do, that you may live and multiply, and go in and possess the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give to your fathers. '
  '10':
  - type: text
    content: 'And you shall eat and be full, and you shall bless the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for the good land he has given you.'
  '11':
  - type: text
    content: '“Take care lest you forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by not keeping his commandments and his rules and his statutes, which I command you today, '
  '12':
  - type: note
    content: ch. 6:11, 12; 28:47; 32:15; Prov. 30:9; Hos. 13:6
  - type: text
    content: 'lest, when you have eaten and are full and have built good houses and live in them, '
  '13':
  - type: text
    content: 'and when your herds and flocks multiply and your silver and gold is multiplied and all that you have is multiplied, '
  '14':
  - type: note
    content: '[1 Cor. 4:7]'
  - type: text
    content: 'then your heart be lifted up, and you '
  - type: note
    content: Ps. 78:11; 106:21
  - type: text
    content: 'forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, out of the house of slavery, '
  '15':
  - type: text
    content: 'who '
  - type: note
    content: See ch. 1:19
  - type: text
    content: 'led you through the great and terrifying wilderness, '
  - type: note
    content: Num. 21:6; Isa. 30:6
  - type: text
    content: 'with its fiery serpents and scorpions '
  - type: note
    content: Hos. 13:5
  - type: text
    content: 'and thirsty ground where there was no water, '
  - type: note
    content: Ex. 17:6; Num. 20:11; Ps. 78:15; 114:8; [ch. 32:13]
  - type: text
    content: 'who brought you water out of the flinty rock, '
  '16':
  - type: text
    content: 'who fed you in the wilderness with '
  - type: note
    content: ver. 3; Ex. 16:15
  - type: text
    content: 'manna that your fathers did not know, that he might humble you and test you, '
  - type: note
    content: '[Jer. 24:5-7; Heb. 12:11]'
  - type: text
    content: 'to do you good in the end. '
  '17':
  - type: text
    content: 'Beware '
  - type: note
    content: '[ch. 9:4]'
  - type: text
    content: 'lest you say in your heart, ‘My power and the might of my hand have gotten me this wealth.’ '
  '18':
  - type: text
    content: 'You shall remember the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, for '
  - type: note
    content: '[Prov. 10:22; Hos. 2:8]'
  - type: text
    content: 'it is he who gives you power to get wealth, '
  - type: note
    content: ch. 7:8, 12
  - type: text
    content: 'that he may confirm his covenant that he swore to your fathers, as it is this day. '
  '19':
  - type: text
    content: 'And if you forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and go after other gods and serve them and worship them, '
  - type: note
    content: '[ch. 4:26; 30:18]'
  - type: text
    content: 'I solemnly warn you today that you shall surely perish. '
  '2':
  - type: text
    content: 'And you shall remember the whole way that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has led you '
  - type: note
    content: ch. 1:3; 2:7; 29:5; Amos 2:10
  - type: text
    content: 'these forty years in the wilderness, that he might humble you, '
  - type: note
    content: ver. 16; Ex. 15:25
  - type: text
    content: 'testing you '
  - type: note
    content: '[2 Chr. 32:31]'
  - type: text
    content: 'to know what was in your heart, '
  - type: note
    content: '[Ex. 16:4; Judg. 3:4]'
  - type: text
    content: 'whether you would keep his commandments or not. '
  '20':
  - type: text
    content: 'Like the nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' makes to perish before you, '
  - type: note
    content: '[Dan. 9:11, 12]'
  - type: text
    content: 'so shall you perish, because you would not obey the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '3':
  - type: text
    content: 'And he humbled you and '
  - type: note
    content: Ex. 16:2, 3
  - type: text
    content: 'let you hunger and '
  - type: note
    content: Ex. 16:12, 14, 15, 35; [Num. 11:6-9; 21:5]
  - type: text
    content: 'fed you with manna, which you did not know, nor did your fathers know, that he might make you know that '
  - type: note
    content: Cited Matt. 4:4; Luke 4:4; [John 6:49-51]
  - type: text
    content: man does not live by bread alone, but man lives by every word
  - type: note
    content: Hebrew by all
  - type: text
    content: ' that comes from the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: note
    content: ch. 29:5; Neh. 9:21
  - type: text
    content: 'Your clothing did not wear out on you and your foot did not swell these forty years. '
  '5':
  - type: text
    content: 'Know then in your heart that, '
  - type: note
    content: Prov. 3:12; Heb. 12:5, 6; [2 Sam. 7:14; Prov. 29:17; Hos. 10:10; Rev. 3:19]
  - type: text
    content: 'as a man disciplines his son, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God disciplines you. '
  '6':
  - type: text
    content: 'So you shall keep the commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by walking in his ways and by fearing him. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is bringing you into a good land, '
  - type: note
    content: ch. 11:10-12
  - type: text
    content: 'a land of brooks of water, of fountains and springs, flowing out in the valleys and hills, '
  '8':
  - type: text
    content: 'a land of wheat and barley, '
  - type: note
    content: '[Num. 20:5]'
  - type: text
    content: 'of vines and fig trees and pomegranates, a land of olive trees and honey, '
  '9':
  - type: text
    content: 'a land in which you will eat bread without scarcity, in which you will lack nothing, a land whose stones are iron, and out of whose hills you can dig copper. '
