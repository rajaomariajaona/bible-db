document_id: PRO.25,59
type_code: eng
verses:
  '1':
  - type: heading
    content: More Proverbs of Solomon
  - type: text
    content: 'These also are '
  - type: note
    content: See ch. 1:1
  - type: text
    content: proverbs of Solomon which the men of Hezekiah king of Judah copied.
  '10':
  - type: text
    content: lest he who hears you bring shame upon you,
  - type: text
    content: and your ill repute have no end.
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 15:23; [ Isa. 50:4 ]
  - type: text
    content: A word fitly spoken
  - type: text
    content: is like apples of gold in a setting of silver.
  '12':
  - type: text
    content: 'Like '
  - type: note
    content: '[Gen. 24:22]'
  - type: text
    content: a gold ring or an ornament of gold
  - type: text
    content: 'is a wise reprover to '
  - type: note
    content: ch. 15:31; 20:12
  - type: text
    content: a listening ear.
  '13':
  - type: text
    content: Like the cold of snow in the time of harvest
  - type: text
    content: 'is '
  - type: note
    content: ch. 13:17
  - type: text
    content: a faithful messenger to those who send him;
  - type: text
    content: he refreshes the soul of his masters.
  '14':
  - type: text
    content: 'Like '
  - type: note
    content: Jude 12
  - type: text
    content: clouds and wind without rain
  - type: text
    content: 'is a man who '
  - type: note
    content: ch. 20:6
  - type: text
    content: boasts of a gift he does not give.
  '15':
  - type: text
    content: 'With '
  - type: note
    content: ch. 15:1; 16:14; [Eccles. 10:4]
  - type: text
    content: patience a ruler may be persuaded,
  - type: text
    content: and a soft tongue will break a bone.
  '16':
  - type: text
    content: 'If you have '
  - type: note
    content: '[Judg. 14:8; 1 Sam. 14:25]'
  - type: text
    content: 'found honey, eat '
  - type: note
    content: '[ver. 27]'
  - type: text
    content: only enough for you,
  - type: text
    content: lest you have your fill of it and vomit it.
  '17':
  - type: text
    content: Let your foot be seldom in your neighbor’s house,
  - type: text
    content: lest he have his fill of you and hate you.
  '18':
  - type: text
    content: 'A man who '
  - type: note
    content: '[ch. 24:28]'
  - type: text
    content: bears false witness against his neighbor
  - type: text
    content: 'is like a war club, or '
  - type: note
    content: ch. 12:18; See Ps. 57:4
  - type: text
    content: a sword, or a sharp arrow.
  '19':
  - type: text
    content: Trusting in a treacherous man in time of trouble
  - type: text
    content: is like a bad tooth or a foot that slips.
  '2':
  - type: text
    content: 'It is the glory of God to '
  - type: note
    content: '[Deut. 29:29; Rom. 11:33]'
  - type: text
    content: conceal things,
  - type: text
    content: 'but the glory of kings is to '
  - type: note
    content: Job 29:16
  - type: text
    content: search things out.
  '20':
  - type: text
    content: 'Whoever '
  - type: note
    content: '[Rom. 12:15]'
  - type: text
    content: sings songs to a heavy heart
  - type: text
    content: is like one who takes off a garment on a cold day,
  - type: text
    content: and like vinegar on soda.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cited Rom. 12:20; [ 2 Kgs. 6:22; 2 Chr. 28:15 ]; See Ex. 23:4, 5
  - type: text
    content: If your enemy is hungry, give him bread to eat,
  - type: text
    content: and if he is thirsty, give him water to drink,
  '22':
  - type: text
    content: 'for you will heap '
  - type: note
    content: Ps. 140:10
  - type: text
    content: burning coals on his head,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will reward you.'
  '23':
  - type: text
    content: The north wind brings forth rain,
  - type: text
    content: and a backbiting tongue, angry looks.
  '24':
  - type: text
    content: ' '
  - type: note
    content: ch. 21:9
  - type: text
    content: It is better to live in a corner of the housetop
  - type: text
    content: than in a house shared with a quarrelsome wife.
  '25':
  - type: text
    content: 'Like cold water to '
  - type: note
    content: '[Ps. 42:2]'
  - type: text
    content: a thirsty soul,
  - type: text
    content: 'so is '
  - type: note
    content: ch. 15:30
  - type: text
    content: good news from a far country.
  '26':
  - type: text
    content: 'Like '
  - type: note
    content: '[Ezek. 32:2; 34:18, 19]'
  - type: text
    content: a muddied spring or a polluted fountain
  - type: text
    content: is a righteous man who gives way before the wicked.
  '27':
  - type: text
    content: 'It is '
  - type: note
    content: '[ver. 16]'
  - type: text
    content: not good to eat much honey,
  - type: text
    content: 'nor is it glorious to '
  - type: note
    content: '[ch. 27:2]'
  - type: text
    content: seek one’s own glory.
  - type: note
    content: The meaning of the Hebrew line is uncertain
  '28':
  - type: text
    content: 'A man '
  - type: note
    content: '[ch. 16:32]'
  - type: text
    content: without self-control
  - type: text
    content: 'is like '
  - type: note
    content: '[2 Chr. 32:5; 36:19; Neh. 1:3]'
  - type: text
    content: a city broken into and left without walls.
  '3':
  - type: text
    content: As the heavens for height, and the earth for depth,
  - type: text
    content: 'so the heart of kings is '
  - type: note
    content: '[Ps. 145:3]'
  - type: text
    content: unsearchable.
  '4':
  - type: text
    content: 'Take away '
  - type: note
    content: '[Ezek. 22:18; 2 Tim. 2:20, 21]'
  - type: text
    content: the dross from the silver,
  - type: text
    content: 'and '
  - type: note
    content: '[Mal. 3:2, 3]'
  - type: text
    content: the smith has material for a vessel;
  '5':
  - type: text
    content: 'take away '
  - type: note
    content: '[ch. 20:8]'
  - type: text
    content: the wicked from the presence of the king,
  - type: text
    content: 'and his '
  - type: note
    content: See ch. 16:12
  - type: text
    content: throne will be established in righteousness.
  '6':
  - type: text
    content: Do not put yourself forward in the king’s presence
  - type: text
    content: or stand in the place of the great,
  '7':
  - type: text
    content: 'for '
  - type: note
    content: See Luke 14:8-11
  - type: text
    content: it is better to be told, “Come up here,”
  - type: text
    content: than to be put lower in the presence of a noble.
  - type: text
    content: What your eyes have seen
  '8':
  - type: text
    content: ' '
  - type: note
    content: Matt. 5:25; Luke 12:58; [ch. 17:14 ]
  - type: text
    content: do not hastily bring into court,
  - type: note
    content: Or presence of a noble, as your eyes have seen. 8Do not go hastily out to court
  - type: text
    content: for
  - type: note
    content: Hebrew or else
  - type: text
    content: ' what will you do in the end,'
  - type: text
    content: when your neighbor puts you to shame?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Matt. 18:15
  - type: text
    content: Argue your case with your neighbor himself,
  - type: text
    content: and do not reveal another’s secret,
