        marker: ref
        children:
        - type: text
          text: '9'
      marker-yv: yv-n
    - type: text
      text: 'finishing the walls and repairing the foundations. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now be it known to the king that if this city is rebuilt and the walls finished, they will not pay '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:24
      marker-yv: yv-n
    - type: text
      text: 'tribute, custom, or toll, and the royal revenue will be impaired. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now because we eat the salt of the palace
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: because the salt of the palace is our salt
      marker-yv: yv-n
    - type: text
      text: ' and it is not fitting for us to witness the king’s dishonor, therefore we send and inform the king, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in order that search may be made in the book of the records of your fathers. You will find in the book of the records and learn that this city is a rebellious city, hurtful to kings and provinces, and that sedition was stirred up in it from of old. That was why this city was laid waste. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We make known to the king that if this city is rebuilt and its walls finished, you will then have no possession in the province Beyond the River.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King Orders the Work to Cease
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king sent an answer: “To Rehum the commander and Shimshai the scribe and the rest of their associates who live in Samaria and in the rest of the province Beyond the River, greeting. And now '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the letter that you sent to us has been '
    - type: usfm
      marker: x
      children:
      - type: usfm
