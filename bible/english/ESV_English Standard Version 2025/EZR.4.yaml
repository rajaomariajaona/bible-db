document_id: EZR.4,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Adversaries Oppose the Rebuilding
  - type: text
    content: 'Now when '
  - type: note
    content: See ver. 7-10
  - type: text
    content: 'the adversaries of Judah and Benjamin heard that the returned exiles were building a temple to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  '10':
  - type: text
    content: 'and the rest of the nations whom the great and noble '
  - type: note
    content: '[ver. 2]'
  - type: text
    content: 'Osnappar deported and settled in the cities of Samaria and in the rest of the province Beyond the River. '
  '11':
  - type: text
    content: '(This is a copy of the letter that they sent.) “To Artaxerxes the king: Your servants, the men of the province Beyond the River, send greeting. And now '
  '12':
  - type: text
    content: 'be it known to the king that the Jews who came up from you to us have gone to Jerusalem. They are rebuilding that rebellious and wicked city. They are '
  - type: note
    content: ch. 5:3, 9
  - type: text
    content: 'finishing the walls and repairing the foundations. '
  '13':
  - type: text
    content: 'Now be it known to the king that if this city is rebuilt and the walls finished, they will not pay '
  - type: note
    content: ver. 20; ch. 7:24
  - type: text
    content: 'tribute, custom, or toll, and the royal revenue will be impaired. '
  '14':
  - type: text
    content: Now because we eat the salt of the palace
  - type: note
    content: Aramaic because the salt of the palace is our salt
  - type: text
    content: ' and it is not fitting for us to witness the king’s dishonor, therefore we send and inform the king, '
  '15':
  - type: text
    content: 'in order that search may be made in the book of the records of your fathers. You will find in the book of the records and learn that this city is a rebellious city, hurtful to kings and provinces, and that sedition was stirred up in it from of old. That was why this city was laid waste. '
  '16':
  - type: text
    content: We make known to the king that if this city is rebuilt and its walls finished, you will then have no possession in the province Beyond the River.”
  - type: heading
    content: The King Orders the Work to Cease
  '17':
  - type: text
    content: 'The king sent an answer: “To Rehum the commander and Shimshai the scribe and the rest of their associates who live in Samaria and in the rest of the province Beyond the River, greeting. And now '
  '18':
  - type: text
    content: 'the letter that you sent to us has been '
  - type: note
    content: '[Neh. 8:8]'
  - type: text
    content: 'plainly read before me. '
  '19':
  - type: text
    content: 'And I made a decree, and search has been made, and it has been found that this city from of old has risen against kings, and that rebellion and sedition have been made in it. '
  '2':
  - type: text
    content: 'they approached Zerubbabel and the heads of fathers’ houses and said to them, “Let us build with you, for we worship your God as you do, and we have been sacrificing to him ever '
  - type: note
    content: 2 Kgs. 17:24, 32, 33
  - type: text
    content: 'since the days of '
  - type: note
    content: 2 Kgs. 19:37
  - type: text
    content: 'Esarhaddon king of Assyria '
  - type: note
    content: '[ver. 10]'
  - type: text
    content: 'who brought us here.” '
  '20':
  - type: text
    content: 'And mighty kings have been over Jerusalem, '
  - type: note
    content: 1 Kgs. 4:21; Ps. 72:8; [Gen. 15:18; Josh. 1:4]
  - type: text
    content: 'who ruled over the whole province Beyond the River, to whom '
  - type: note
    content: ver. 13; [ch. 7:24]
  - type: text
    content: 'tribute, custom, and toll were paid. '
  '21':
  - type: text
    content: 'Therefore make a decree that these men be made to cease, and that this city be not rebuilt, until a decree is made by me. '
  '22':
  - type: text
    content: And take care not to be slack in this matter. Why should damage grow to the hurt of the king?”
  '23':
  - type: text
    content: 'Then, when the copy of King Artaxerxes’ letter was read before Rehum and Shimshai the scribe and their associates, they went in haste to the Jews at Jerusalem and by force and power made them cease. '
  '24':
  - type: text
    content: Then the work on the house of God that is in Jerusalem stopped, and it ceased until the second year of the reign of Darius king of Persia.
  '3':
  - type: text
    content: 'But Zerubbabel, Jeshua, and the rest of the heads of fathers’ houses in Israel said to them, '
  - type: note
    content: Neh. 2:20
  - type: text
    content: '“You have nothing to do with us in building a house to our God; but we alone will build to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  - type: note
    content: ch. 1:1-3
  - type: text
    content: as King Cyrus the king of Persia has commanded us.”
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: ch. 3:3
  - type: text
    content: 'the people of the land discouraged the people of Judah and made them afraid to build '
  '5':
  - type: text
    content: and bribed counselors against them to frustrate their purpose, all the days of Cyrus king of Persia, even until the reign of Darius king of Persia.
  '6':
  - type: text
    content: 'And in the reign of '
  - type: note
    content: Esth. 1:1; Dan. 9:1
  - type: text
    content: Ahasuerus, in the beginning of his reign, they wrote an accusation against the inhabitants of Judah and Jerusalem.
  - type: heading
    content: The Letter to King Artaxerxes
  '7':
  - type: text
    content: 'In the days of Artaxerxes, Bishlam and '
  - type: note
    content: ch. 1:8
  - type: text
    content: 'Mithredath and Tabeel and the rest of their associates wrote to Artaxerxes king of Persia. The letter was written '
  - type: note
    content: '[2 Kgs. 18:26]'
  - type: text
    content: in Aramaic and translated.
  - type: note
    content: Hebrew written in Aramaic and translated in Aramaic, indicating that 4:8–6:18 is in Aramaic; another interpretation is The letter was written in the Aramaic script and set forth in the Aramaic language
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Rehum the commander and Shimshai the scribe wrote a letter against Jerusalem to Artaxerxes the king as follows: '
  '9':
  - type: text
    content: 'Rehum the commander, Shimshai the scribe, and the rest of their associates, the '
  - type: note
    content: '[2 Kgs. 17:24, 30, 31]'
  - type: text
    content: 'judges, the '
  - type: note
    content: '[ch. 5:6; 6:6]'
  - type: text
    content: 'governors, the officials, the Persians, the men of Erech, the Babylonians, the men of Susa, that is, the '
  - type: note
    content: Isa. 11:11
  - type: text
    content: 'Elamites, '
