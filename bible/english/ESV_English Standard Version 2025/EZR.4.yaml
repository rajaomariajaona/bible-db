      marker-yv: yv-n
    - type: text
      text: 'the adversaries of Judah and Benjamin heard that the returned exiles were building a temple to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the rest of the nations whom the great and noble '
    - type: usfm
