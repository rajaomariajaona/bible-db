      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 8:8
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'plainly read before me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I made a decree, and search has been made, and it has been found that this city from of old has risen against kings, and that rebellion and sedition have been made in it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
