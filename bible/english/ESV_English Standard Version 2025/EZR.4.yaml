  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore make a decree that these men be made to cease, and that this city be not rebuilt, until a decree is made by me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And take care not to be slack in this matter. Why should damage grow to the hurt of the king?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, when the copy of King Artaxerxes’ letter was read before Rehum and Shimshai the scribe and their associates, they went in haste to the Jews at Jerusalem and by force and power made them cease. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the work on the house of God that is in Jerusalem stopped, and it ceased until the second year of the reign of Darius king of Persia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Zerubbabel, Jeshua, and the rest of the heads of fathers’ houses in Israel said to them, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 2:20
      marker-yv: yv-n
    - type: text
      text: '“You have nothing to do with us in building a house to our God; but we alone will build to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:1-3
      marker-yv: yv-n
    - type: text
      text: as King Cyrus the king of Persia has commanded us.”
  '4':
  - type: usfm
