      children:
      - type: text
        text: 'ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:24
      metadata:
        usfm: EZR.7.24
    marker-yv: yv-n
  - type: text
    text: 'tribute, custom, or toll, and the royal revenue will be impaired. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now because we eat the salt of the palace
  - type: usfm
