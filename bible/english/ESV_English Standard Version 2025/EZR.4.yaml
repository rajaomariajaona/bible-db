    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 72:8
      metadata:
        usfm: PSA.72.8
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '['
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 1:4
      metadata:
        usfm: JOS.1.4
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'who ruled over the whole province Beyond the River, to whom '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: xta
      children:
      - type: text
        text: 'ver. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: EZR.4.13
    - type: text
      text: '; '
    - type: usfm
      marker: xta
      children:
      - type: text
        text: '[ch. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:24
      metadata:
        usfm: EZR.7.24
    - type: usfm
      marker: xta
      children:
      - type: text
        text: ']'
    marker-yv: yv-n
  - type: text
    text: 'tribute, custom, and toll were paid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore make a decree that these men be made to cease, and that this city be not rebuilt, until a decree is made by me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And take care not to be slack in this matter. Why should damage grow to the hurt of the king?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then, when the copy of King Artaxerxes’ letter was read before Rehum and Shimshai the scribe and their associates, they went in haste to the Jews at Jerusalem and by force and power made them cease. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then the work on the house of God that is in Jerusalem stopped, and it ceased until the second year of the reign of Darius king of Persia.
