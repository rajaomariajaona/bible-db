document_id: 1CO.2,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Proclaiming Christ Crucified
  - type: text
    content: And I, when I came to you, brothers,
  - type: note
    content: Or brothers and sisters
  - type: text
    content: ' '
  - type: note
    content: ver. 4, 13; [2 Cor. 1:12]; See ch. 1:17
  - type: text
    content: 'did not come proclaiming to you '
  - type: note
    content: See Rom. 16:25
  - type: text
    content: the testimony
  - type: note
    content: Some manuscripts mystery (or secret)
  - type: text
    content: ' of God with lofty speech or wisdom. '
  '10':
  - type: text
    content: 'these things '
  - type: note
    content: Matt. 16:17; Gal. 1:12, 16; Eph. 3:3, 5; See John 14:26
  - type: text
    content: 'God has revealed to us through the Spirit. For the Spirit searches everything, even '
  - type: note
    content: '[Rev. 2:24]'
  - type: text
    content: 'the depths of God. '
  '11':
  - type: text
    content: 'For who knows a person’s thoughts '
  - type: note
    content: Prov. 20:27
  - type: text
    content: 'except the spirit of that person, which is in him? So also no one comprehends the thoughts of God except the Spirit of God. '
  '12':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 8:15
  - type: text
    content: 'we have received not '
  - type: note
    content: '[1 John 4:4]'
  - type: text
    content: 'the spirit of the world, but the Spirit who is from God, that we might understand the things freely given us by God. '
  '13':
  - type: text
    content: 'And we impart this '
  - type: note
    content: ver. 1, 4; See ch. 1:17
  - type: text
    content: 'in words not taught by human wisdom but taught by the Spirit, '
  - type: note
    content: 2 Cor. 10:12
  - type: text
    content: interpreting spiritual truths to those who are spiritual.
  - type: note
    content: Or interpreting spiritual truths in spiritual language, or comparing spiritual things with spiritual
  '14':
  - type: text
    content: 'The natural person does not accept the things of the Spirit of God, for they are '
  - type: note
    content: ch. 1:18
  - type: text
    content: 'folly to him, and '
  - type: note
    content: Rom. 8:7
  - type: text
    content: 'he is not able to understand them because they are spiritually discerned. '
  '15':
  - type: text
    content: 'The '
  - type: note
    content: ch. 3:1; 14:37; Gal. 6:1; [Prov. 28:5]
  - type: text
    content: 'spiritual person judges all things, but is himself to be judged by no one. '
  '16':
  - type: note
    content: Cited from Isa. 40:13; See Rom. 11:34
  - type: text
    content: '“For who has understood the mind of the Lord so as to instruct him?” But '
  - type: note
    content: '[John 15:15]'
  - type: text
    content: we have the mind of Christ.
  '2':
  - type: text
    content: 'For I decided to know nothing among you except '
  - type: note
    content: Gal. 6:14
  - type: text
    content: 'Jesus Christ and him crucified. '
  '3':
  - type: text
    content: 'And '
  - type: note
    content: Acts 18:1, 6, 12
  - type: text
    content: 'I was with you '
  - type: note
    content: 2 Cor. 11:30; 12:5, 9; 13:4, 9; Gal. 4:13
  - type: text
    content: 'in weakness and in fear and much trembling, '
  '4':
  - type: text
    content: 'and my speech and my message were not in plausible words of wisdom, but in demonstration of '
  - type: note
    content: ch. 4:20; Rom. 15:13, 19; 1 Thess. 1:5; 2 Pet. 1:16
  - type: text
    content: 'the Spirit and of power, '
  '5':
  - type: text
    content: so that your faith might not rest in the wisdom of men
  - type: note
    content: The Greek word anthropoi can refer to both men and women
  - type: text
    content: ' but '
  - type: note
    content: 2 Cor. 4:7; 6:7; [Zech. 4:6; 2 Cor. 10:4; 12:9]
  - type: text
    content: in the power of God.
  - type: heading
    content: Wisdom from the Spirit
  '6':
  - type: text
    content: 'Yet among '
  - type: note
    content: Phil. 3:15; [ch. 3:1]
  - type: text
    content: 'the mature we do impart wisdom, although it is not '
  - type: note
    content: '[James 3:15]'
  - type: text
    content: 'a wisdom of this age or of the rulers of this age, '
  - type: note
    content: ch. 1:28
  - type: text
    content: 'who are doomed to pass away. '
  '7':
  - type: text
    content: 'But we impart a secret and hidden wisdom of God, '
  - type: note
    content: Rom. 16:25, 26; Eph. 3:5, 9; Col. 1:26; 2 Tim. 1:9
  - type: text
    content: 'which God decreed before the ages for our glory. '
  '8':
  - type: text
    content: 'None of '
  - type: note
    content: Acts 13:27; See Luke 24:20
  - type: text
    content: 'the rulers of this age understood this, for '
  - type: note
    content: See Acts 3:17
  - type: text
    content: 'if they had, they would not have crucified '
  - type: note
    content: James 2:1; [Ps. 24:7-10; Acts 7:2]
  - type: text
    content: 'the Lord of glory. '
  '9':
  - type: text
    content: But, as it is written,
  - type: note
    content: '[ Isa. 64:4 ]'
  - type: text
    content: “What no eye has seen, nor ear heard,
  - type: text
    content: nor the heart of man imagined,
  - type: text
    content: 'what God has '
  - type: note
    content: See Matt. 25:34
  - type: text
    content: 'prepared '
  - type: note
    content: James 1:12
  - type: text
    content: for those who love him”—
