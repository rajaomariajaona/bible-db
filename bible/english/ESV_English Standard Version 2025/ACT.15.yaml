document_id: ACT.15,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Jerusalem Council
  - type: text
    content: ' '
  - type: note
    content: ver. 24
  - type: text
    content: 'But some men came down from Judea and were teaching '
  - type: note
    content: ver. 3, 22, 23, 36, 40; See John 21:23
  - type: text
    content: 'the brothers, “Unless you are '
  - type: note
    content: ver. 5; Gal. 5:2; [1 Cor. 7:18; Gal. 2:11, 14]
  - type: text
    content: 'circumcised '
  - type: note
    content: ch. 6:14; Lev. 12:3
  - type: text
    content: 'according to the custom of Moses, you cannot be saved.” '
  '10':
  - type: text
    content: 'Now, therefore, why '
  - type: note
    content: Ps. 106:14; Isa. 7:12
  - type: text
    content: 'are you putting God to the test '
  - type: note
    content: Gal. 5:1; [ver. 28]
  - type: text
    content: 'by placing a yoke on the neck of the disciples '
  - type: note
    content: '[Matt. 11:28; 23:4; Luke 11:46]'
  - type: text
    content: 'that neither our fathers nor we have been able to bear? '
  '11':
  - type: text
    content: 'But we '
  - type: note
    content: '[ch. 16:31]'
  - type: text
    content: 'believe that we will be '
  - type: note
    content: Eph. 2:5, 8; 2 Tim. 1:9; Titus 2:11; 3:7; [Rom. 3:24; 1 Thess. 5:9]
  - type: text
    content: 'saved through '
  - type: note
    content: Rom. 5:15
  - type: text
    content: 'the grace of the Lord Jesus, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: just as they will.”
  '12':
  - type: text
    content: 'And all the assembly fell silent, and they listened to Barnabas and Paul '
  - type: note
    content: ver. 4; See ch. 14:27
  - type: text
    content: 'as they related what signs and wonders God had done through them among the Gentiles. '
  '13':
  - type: text
    content: 'After they finished speaking, '
  - type: note
    content: See ch. 12:17
  - type: text
    content: 'James replied, “Brothers, listen to me. '
  '14':
  - type: note
    content: '[ver. 7]'
  - type: text
    content: 'Simeon has related how God first visited the Gentiles, to take from them '
  - type: note
    content: '[ch. 18:10; Deut. 7:6; Isa. 43:21; Rom. 9:24-26]'
  - type: text
    content: 'a people for his name. '
  '15':
  - type: text
    content: And with this the words of the prophets agree, just as it is written,
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cited from Amos 9:11, 12; [ Jer. 12:15 ]
  - type: text
    content: “‘After this I will return,
  - type: text
    content: and I will rebuild the tent of David that has fallen;
  - type: text
    content: I will rebuild its ruins,
  - type: text
    content: and I will restore it,
  '17':
  - type: text
    content: that the remnant
  - type: note
    content: Or rest
  - type: text
    content: ' of mankind '
  - type: note
    content: '[ch. 17:27]'
  - type: text
    content: may seek the Lord,
  - type: text
    content: 'and all the Gentiles '
  - type: note
    content: Isa. 43:7; Jer. 14:9; Dan. 9:19
  - type: text
    content: who are called by my name,
  - type: text
    content: 'says the Lord, who makes these things '
  '18':
  - type: note
    content: '[Isa. 45:21]'
  - type: text
    content: known from of old.’
  '19':
  - type: text
    content: 'Therefore '
  - type: note
    content: '[ver. 28]'
  - type: text
    content: 'my judgment is that we should not trouble those of the Gentiles who '
  - type: note
    content: See ch. 14:15
  - type: text
    content: 'turn to God, '
  '2':
  - type: text
    content: 'And after Paul and Barnabas had no small dissension and '
  - type: note
    content: ver. 7
  - type: text
    content: 'debate with them, Paul and Barnabas and '
  - type: note
    content: '[Gal. 2:1, 2]'
  - type: text
    content: 'some of the others were appointed to go up to Jerusalem to '
  - type: note
    content: ver. 4, 6, 22, 23; ch. 16:4; See ch. 5:12; 11:30
  - type: text
    content: 'the apostles and the elders about this question. '
  '20':
  - type: text
    content: 'but should write to them '
  - type: note
    content: ch. 21:25
  - type: text
    content: 'to abstain from '
  - type: note
    content: '[ver. 29; Ezek. 4:13, 14; Dan. 1:8; Mal. 1:7, 12]'
  - type: text
    content: 'the things polluted by idols, and from '
  - type: note
    content: 1 Cor. 10:7, 8; Rev. 2:14, 20; See 1 Cor. 6:18
  - type: text
    content: 'sexual immorality, and from '
  - type: note
    content: See Lev. 3:17
  - type: text
    content: 'what has been strangled, and from '
  - type: note
    content: See Lev. 3:17
  - type: text
    content: 'blood. '
  '21':
  - type: text
    content: 'For from ancient generations Moses has had in every city those who proclaim him, '
  - type: note
    content: ch. 13:15; 2 Cor. 3:14, 15; [ch. 13:27]
  - type: text
    content: for he is read every Sabbath in the synagogues.”
  - type: heading
    content: The Council’s Letter to Gentile Believers
  '22':
  - type: text
    content: 'Then it seemed good to '
  - type: note
    content: ver. 2
  - type: text
    content: 'the apostles and the elders, with the whole church, to choose men from among them and send them to Antioch with Paul and Barnabas. They sent Judas called '
  - type: note
    content: '[ch. 1:23]'
  - type: text
    content: 'Barsabbas, and '
  - type: note
    content: See 1 Pet. 5:12
  - type: text
    content: 'Silas, leading men among '
  - type: note
    content: ver. 1
  - type: text
    content: 'the brothers, '
  '23':
  - type: text
    content: 'with the following letter: '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: '“The brothers, both '
  - type: note
    content: '[See ver. 22 above]'
  - type: text
    content: the apostles and the elders, to the brothers
  - type: note
    content: Or brothers and sisters; also verses 32, 33, 36
  - type: text
    content: ' who are of the Gentiles in Antioch and Syria and Cilicia, '
  - type: note
    content: ch. 23:26; James 1:1; [2 John 10, 11]
  - type: text
    content: 'greetings. '
  '24':
  - type: text
    content: 'Since we have heard that '
  - type: note
    content: ver. 1; [Gal. 2:4; 5:12; Titus 1:10]
  - type: text
    content: 'some persons have gone out from us and '
  - type: note
    content: Gal. 1:7; 5:10
  - type: text
    content: troubled you
  - type: note
    content: Some manuscripts some persons from us have troubled you
  - type: text
    content: ' with words, unsettling your minds, although we gave them no instructions, '
  '25':
  - type: text
    content: 'it has seemed good to us, having come '
  - type: note
    content: See ch. 1:14
  - type: text
    content: 'to one accord, to choose men and send them to you with our '
  - type: note
    content: '[2 Pet. 3:15]'
  - type: text
    content: 'beloved Barnabas and Paul, '
  '26':
  - type: note
    content: ch. 9:23-25; 14:19
  - type: text
    content: 'men who have '
  - type: note
    content: '[ch. 20:24; 21:13; 2 Cor. 4:11; 1 John 3:16]'
  - type: text
    content: 'risked their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: text
    content: 'We have therefore sent '
  - type: note
    content: ver. 22, 32
  - type: text
    content: 'Judas and Silas, who themselves will tell you the same things by word of mouth. '
  '28':
  - type: text
    content: 'For it has seemed good '
  - type: note
    content: '[ver. 8; ch. 5:32; John 16:13; 1 Cor. 7:40]'
  - type: text
    content: 'to the Holy Spirit and '
  - type: note
    content: '[ver. 19]'
  - type: text
    content: 'to us '
  - type: note
    content: '[ver. 10; Rev. 2:24]'
  - type: text
    content: 'to lay on you no greater burden than these requirements: '
  '29':
  - type: note
    content: See ver. 20
  - type: text
    content: 'that you abstain from '
  - type: note
    content: ch. 21:25; 1 Cor. 8:1, 4, 7, 10; 10:19; Rev. 2:14, 20
  - type: text
    content: what has been sacrificed to idols, and from blood, and from what has been strangled, and from sexual immorality. If you keep yourselves from these, you will do well. Farewell.”
  '3':
  - type: text
    content: 'So, '
  - type: note
    content: ch. 21:5; Rom. 15:24; 1 Cor. 16:6, 11; 2 Cor. 1:16; Titus 3:13; 3 John 6; [ch. 17:15]
  - type: text
    content: 'being sent on their way by the church, they passed through both Phoenicia and Samaria, '
  - type: note
    content: See ch. 14:27
  - type: text
    content: 'describing in detail the conversion of the Gentiles, and '
  - type: note
    content: ch. 11:18
  - type: text
    content: 'brought great joy to all '
  - type: note
    content: ver. 1
  - type: text
    content: the brothers.
  - type: note
    content: Or brothers and sisters; also verse 22
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'So when they were sent off, they went down to Antioch, and having gathered the congregation together, they delivered the letter. '
  '31':
  - type: text
    content: 'And when they had read it, they rejoiced because of its encouragement. '
  '32':
  - type: text
    content: 'And Judas and Silas, who were themselves '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'prophets, encouraged and '
  - type: note
    content: See ch. 14:22
  - type: text
    content: 'strengthened '
  - type: note
    content: ver. 1
  - type: text
    content: 'the brothers with many words. '
  '33':
  - type: text
    content: 'And after they had spent some time, they were sent off '
  - type: note
    content: Gen. 26:29; Heb. 11:31; [1 Cor. 16:11]
  - type: text
    content: 'in peace by '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: the brothers to those who had sent them.
  - type: note
    content: 'Some manuscripts insert verse 34: But it seemed good to Silas to remain there'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'But '
  - type: note
    content: ch. 13:1
  - type: text
    content: Paul and Barnabas remained in Antioch, teaching and preaching the word of the Lord, with many others also.
  - type: heading
    content: Paul and Barnabas Separate
  '36':
  - type: text
    content: 'And after some days Paul said to Barnabas, “Let us return and visit '
  - type: note
    content: '[See ver. 32 above]'
  - type: text
    content: 'the brothers '
  - type: note
    content: ch. 13:4, 13, 14, 51; 14:6, 24, 25
  - type: text
    content: 'in every city where we proclaimed the word of the Lord, and see how they are.” '
  '37':
  - type: text
    content: 'Now Barnabas wanted to take with them '
  - type: note
    content: See ch. 12:12
  - type: text
    content: 'John called Mark. '
  '38':
  - type: text
    content: 'But Paul thought best not to take with them one '
  - type: note
    content: ch. 13:13
  - type: text
    content: 'who had withdrawn from them in Pamphylia and had not gone with them to the work. '
  '39':
  - type: text
    content: 'And there arose '
  - type: note
    content: '[ch. 17:16 (Gk.)]'
  - type: text
    content: 'a sharp disagreement, so that they separated from each other. '
  - type: note
    content: '[Col. 4:10]'
  - type: text
    content: 'Barnabas took Mark with him and sailed away to Cyprus, '
  '4':
  - type: note
    content: '[ch. 21:17]'
  - type: text
    content: 'When they came to Jerusalem, they were welcomed by the church and '
  - type: note
    content: ver. 2
  - type: text
    content: 'the apostles and the elders, and '
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'they declared all that God had done with them. '
  '40':
  - type: text
    content: 'but Paul chose Silas and departed, '
  - type: note
    content: ch. 14:26
  - type: text
    content: 'having been commended by '
  - type: note
    content: ver. 1
  - type: text
    content: 'the brothers to '
  - type: note
    content: ver. 11; [ch. 11:23]; See Rom. 16:20
  - type: text
    content: 'the grace of the Lord. '
  '41':
  - type: text
    content: 'And he went through Syria and Cilicia, '
  - type: note
    content: ver. 32; ch. 16:5
  - type: text
    content: strengthening the churches.
  '5':
  - type: text
    content: 'But some believers who belonged to '
  - type: note
    content: See ch. 24:5
  - type: text
    content: 'the party of the Pharisees rose up and said, '
  - type: note
    content: ver. 1
  - type: text
    content: '“It is necessary '
  - type: note
    content: Gal. 5:3
  - type: text
    content: to circumcise them and to order them to keep the law of Moses.”
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ver. 12, 25 ]'
  - type: text
    content: 'The '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'apostles and the elders were gathered together to consider this matter. '
  '7':
  - type: text
    content: 'And after there had been much '
  - type: note
    content: ver. 2
  - type: text
    content: 'debate, Peter stood up and said to them, “Brothers, you know that in the early days God made a choice among you, '
  - type: note
    content: ch. 10:20
  - type: text
    content: 'that by my mouth the Gentiles should hear '
  - type: note
    content: '[Eph. 1:13; Col. 1:5; 1 Thess. 1:5]'
  - type: text
    content: 'the word of '
  - type: note
    content: ch. 20:24
  - type: text
    content: 'the gospel and believe. '
  '8':
  - type: text
    content: 'And God, '
  - type: note
    content: ch. 1:24
  - type: text
    content: 'who knows the heart, '
  - type: note
    content: ch. 14:3
  - type: text
    content: 'bore witness to them, '
  - type: note
    content: ch. 10:44, 47; 11:15, 17; [ver. 28; Gal. 3:2]
  - type: text
    content: 'by giving them the Holy Spirit just as he did to us, '
  '9':
  - type: text
    content: 'and '
  - type: note
    content: ch. 11:12; Rom. 3:22-24; Eph. 3:6; [ch. 10:28, 34]
  - type: text
    content: 'he made no distinction between us and them, '
  - type: note
    content: Ps. 51:10; [ch. 26:18; 2 Cor. 7:1; 1 Pet. 1:22]
  - type: text
    content: 'having cleansed their hearts '
  - type: note
    content: See ch. 10:43
  - type: text
    content: 'by faith. '
