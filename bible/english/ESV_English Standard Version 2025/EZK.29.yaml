document_id: EZK.29,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy Against Egypt
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the tenth year, in the tenth month, on the twelfth day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'therefore, '
  - type: note
    content: '[See ver. 9 above]'
  - type: text
    content: 'behold, I am against you and '
  - type: note
    content: '[ch. 30:12]'
  - type: text
    content: 'against your streams, and '
  - type: note
    content: '[ch. 30:12]'
  - type: text
    content: 'I will make the land of Egypt an utter waste and desolation, '
  - type: note
    content: ch. 30:6
  - type: text
    content: 'from Migdol to Syene, as far as the border of Cush. '
  '11':
  - type: note
    content: ch. 32:13; [ch. 35:7]
  - type: text
    content: 'No foot of man shall pass through it, and no foot of beast shall pass through it; it shall be uninhabited forty years. '
  '12':
  - type: note
    content: ch. 30:7
  - type: text
    content: 'And I will make the land of Egypt a desolation in the midst of desolated countries, and her cities shall be a desolation forty years among cities that are laid waste. '
  - type: note
    content: ch. 30:23, 26; [Jer. 46:19]
  - type: text
    content: I will scatter the Egyptians among the nations, and disperse them through the countries.
  '13':
  - type: text
    content: '“For thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': At the end of forty years '
  - type: note
    content: '[Isa. 19:22, 23; Jer. 46:26]'
  - type: text
    content: 'I will gather the Egyptians from the peoples among whom they were scattered, '
  '14':
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 39:25]'
  - type: text
    content: 'I will restore the fortunes of Egypt and bring them back to '
  - type: note
    content: ch. 30:14; See Isa. 11:11
  - type: text
    content: 'the land of Pathros, the land of their origin, and there they shall be a lowly kingdom. '
  '15':
  - type: text
    content: 'It shall be the most lowly of the kingdoms, '
  - type: note
    content: '[ch. 30:13]'
  - type: text
    content: 'and never again exalt itself above the nations. And I will make them so small that they will never again rule over the nations. '
  '16':
  - type: text
    content: 'And it shall never again be '
  - type: note
    content: '[Isa. 30:2, 3; 36:4, 6; Lam. 4:17]'
  - type: text
    content: 'the reliance of the house of Israel, recalling their iniquity, when they turn to them for aid. '
  - type: note
    content: ver. 6; See ch. 6:7
  - type: text
    content: 'Then they will know that I am the Lord '
  - type: text
    content: God
  - type: text
    content: .”
  '17':
  - type: text
    content: ' '
  - type: note
    content: See ch. 20:1
  - type: text
    content: 'In the twenty-seventh year, in the first month, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: '[ch. 26:7]'
  - type: text
    content: 'Nebuchadnezzar king of Babylon made his army labor hard against Tyre. Every head was made bald, and every shoulder was rubbed bare, yet neither he nor his army got anything from Tyre to pay for the labor that he had performed against her. '
  '19':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: ch. 30:10, 24, 25; 32:11; Jer. 46:13
  - type: text
    content: 'Behold, I will give the land of Egypt to Nebuchadnezzar king of Babylon; '
  - type: note
    content: ch. 30:4
  - type: text
    content: and he shall carry off its wealth
  - type: note
    content: Or multitude
  - type: text
    content: ' '
  - type: note
    content: ch. 32:12
  - type: text
    content: 'and despoil it and plunder it; and it shall be the wages for his army. '
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'set your face against '
  - type: note
    content: ch. 32:2
  - type: text
    content: 'Pharaoh king of Egypt, '
  - type: note
    content: See ch. 6:2
  - type: text
    content: 'and prophesy against him and '
  - type: note
    content: See Isa. 19:1
  - type: text
    content: 'against all Egypt; '
  '20':
  - type: note
    content: '[Isa. 43:3]'
  - type: text
    content: 'I have given him the land of Egypt as his payment for which he labored, because they worked for me, declares the Lord '
  - type: text
    content: God
  - type: text
    content: .
  '21':
  - type: text
    content: '“On that day '
  - type: note
    content: Ps. 132:17; [Luke 1:69]
  - type: text
    content: 'I will cause a horn to spring up for the house of Israel, and '
  - type: note
    content: ch. 24:27; 33:22; [ch. 16:63]
  - type: text
    content: 'I will open your lips among them. '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'speak, and say, Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: note
    content: See ch. 13:8
  - type: text
    content: “Behold, I am against you,
  - type: text
    content: Pharaoh king of Egypt,
  - type: note
    content: ch. 32:2; Ps. 74:13, 14; Isa. 27:1; 51:9
  - type: text
    content: the great dragon that lies
  - type: text
    content: in the midst of his streams,
  - type: note
    content: ver. 9
  - type: text
    content: that says, ‘My Nile is my own;
  - type: text
    content: I made it for myself.’
  '4':
  - type: text
    content: 'I will '
  - type: note
    content: ch. 19:9; 38:4; 2 Kgs. 19:28
  - type: text
    content: put hooks in your jaws,
  - type: text
    content: and make the fish of your streams stick to your scales;
  - type: text
    content: and I will draw you up out of the midst of your streams,
  - type: text
    content: with all the fish of your streams
  - type: text
    content: that stick to your scales.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 32:4, 5 ]'
  - type: text
    content: And I will cast you out into the wilderness,
  - type: text
    content: you and all the fish of your streams;
  - type: text
    content: 'you shall fall '
  - type: note
    content: Jer. 9:22
  - type: text
    content: on the open field,
  - type: text
    content: 'and '
  - type: note
    content: See Jer. 8:2
  - type: text
    content: not be brought together or gathered.
  - type: text
    content: To the beasts of the earth and to the birds of the heavens
  - type: note
    content: '[ch. 32:4, 5 ]'
  - type: text
    content: I give you as food.
  '6':
  - type: text
    content: 'Then all the inhabitants of Egypt '
  - type: note
    content: See ch. 6:7
  - type: text
    content: 'shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Because you
  - type: note
    content: Hebrew they
  - type: text
    content: ' have been '
  - type: note
    content: 2 Kgs. 18:21; Isa. 36:6
  - type: text
    content: 'a staff of reed to the house of Israel, '
  '7':
  - type: note
    content: '[ch. 17:17; Isa. 20:5; 30:3, 5; Jer. 2:36; 37:5, 7]'
  - type: text
    content: when they grasped you with the hand, you broke and tore all their shoulders; and when they leaned on you, you broke and made all their loins to shake.
  - type: note
    content: Syriac (compare Psalm 69:23); Hebrew to stand
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Therefore thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: See ch. 14:17
  - type: text
    content: 'Behold, I will bring a sword upon you, and will cut off from you man and beast, '
  '9':
  - type: text
    content: 'and the land of Egypt shall be a desolation and a waste. '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: ver. 3 ; See ch. 13:8
  - type: text
    content: “Because you
  - type: note
    content: Hebrew he
  - type: text
    content: ' said, ‘The Nile is mine, and I made it,’ '
