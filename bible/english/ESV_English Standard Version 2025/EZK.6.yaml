document_id: EZK.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Against Idolatry
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'And they shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: '[Num. 23:19]'
  - type: text
    content: I have not said in vain that I would do this evil to them.”
  '11':
  - type: text
    content: 'Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ': '
  - type: note
    content: '[ch. 21:14, 17]'
  - type: text
    content: '“Clap your hands '
  - type: note
    content: '[ch. 25:6]'
  - type: text
    content: 'and stamp your foot and say, Alas, because of all the evil abominations of the house of Israel, '
  - type: note
    content: See ch. 5:12
  - type: text
    content: 'for they shall fall by the sword, by famine, and by pestilence. '
  '12':
  - type: note
    content: '[ch. 7:15]'
  - type: text
    content: 'He who is far off shall die of pestilence, and he who is near shall fall by the sword, and he who is left and is preserved shall die of famine. '
  - type: note
    content: See ch. 5:13
  - type: text
    content: 'Thus I will spend my fury upon them. '
  '13':
  - type: text
    content: 'And you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: '[ver. 4, 5]'
  - type: text
    content: 'when their slain lie among their idols around their altars, '
  - type: note
    content: '[ch. 20:28]'
  - type: text
    content: 'on every high hill, '
  - type: note
    content: Hos. 4:13
  - type: text
    content: 'on all the mountaintops, '
  - type: note
    content: Jer. 2:20
  - type: text
    content: 'under every green tree, and under '
  - type: note
    content: Isa. 1:29
  - type: text
    content: 'every leafy oak, wherever '
  - type: note
    content: ch. 16:19; 20:28; Gen. 8:21
  - type: text
    content: 'they offered pleasing aroma to all their idols. '
  '14':
  - type: text
    content: 'And '
  - type: note
    content: ch. 25:7, 13, 16; 35:3; Isa. 5:25
  - type: text
    content: 'I will stretch out my hand against them and '
  - type: note
    content: ch. 33:28
  - type: text
    content: 'make the land desolate and waste, '
  - type: note
    content: '[ver. 6]'
  - type: text
    content: 'in all their dwelling places, from the wilderness to '
  - type: note
    content: '[Num. 34:11]'
  - type: text
    content: Riblah.
  - type: note
    content: Some Hebrew manuscripts; most Hebrew manuscripts Diblah
  - type: text
    content: ' Then '
  - type: note
    content: See ver. 7
  - type: text
    content: 'they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: note
    content: See ch. 2:1
  - type: text
    content: '“Son of man, '
  - type: note
    content: ch. 13:17; 20:46; 21:2; 25:2; 28:21; 29:2; 35:2; 38:2; [Luke 9:51]
  - type: text
    content: 'set your face toward '
  - type: note
    content: ch. 19:9; 33:28; 34:13, 14; 35:12; 36:1, 4, 8; 37:22; 38:8; 39:2, 4, 17
  - type: text
    content: 'the mountains of Israel, and '
  - type: note
    content: ch. 37:4, 9; 38:2
  - type: text
    content: 'prophesy against them, '
  '3':
  - type: text
    content: 'and say, '
  - type: note
    content: ch. 36:1, 4
  - type: text
    content: 'You mountains of Israel, hear the word of the Lord '
  - type: text
    content: God
  - type: text
    content: '! Thus says the Lord '
  - type: text
    content: God
  - type: text
    content: ' to '
  - type: note
    content: ch. 36:4, 6
  - type: text
    content: 'the mountains and '
  - type: note
    content: '[ver. 13]'
  - type: text
    content: 'the hills, to '
  - type: note
    content: '[ch. 31:12; Isa. 57:5, 6]'
  - type: text
    content: 'the ravines and the valleys: Behold, I, even I, will bring a sword upon you, '
  - type: note
    content: Lev. 26:30
  - type: text
    content: 'and I will destroy your high places. '
  '4':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'Your altars shall become desolate, and your '
  - type: note
    content: See 2 Chr. 14:5
  - type: text
    content: 'incense altars shall be broken, and I will cast down your slain before your idols. '
  '5':
  - type: note
    content: '[See ver. 3 above]'
  - type: text
    content: 'And I will lay the dead bodies of the people of Israel before their idols, '
  - type: note
    content: '[2 Kgs. 23:14, 16]'
  - type: text
    content: 'and I will scatter your bones around your altars. '
  '6':
  - type: text
    content: 'Wherever you dwell, '
  - type: note
    content: ch. 12:20; [Isa. 27:10]
  - type: text
    content: 'the cities shall be waste and '
  - type: note
    content: '[ver. 3, 4]'
  - type: text
    content: the high places ruined, so that your altars will be waste and ruined,
  - type: note
    content: Or and punished
  - type: text
    content: ' your idols broken and destroyed, your '
  - type: note
    content: '[See ver. 4 above]'
  - type: text
    content: 'incense altars cut down, and your works wiped out. '
  '7':
  - type: text
    content: 'And the slain shall fall in your midst, and you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: ch. 12:16; 14:22
  - type: text
    content: '“Yet I will leave some of you alive. When you have among the nations '
  - type: note
    content: ch. 7:16
  - type: text
    content: 'some who escape the sword, and when you are scattered through the countries, '
  '9':
  - type: text
    content: 'then those of you who escape '
  - type: note
    content: ch. 16:61; 20:43; 36:31; Lev. 26:39, 40
  - type: text
    content: 'will remember me among the nations where they are carried captive, how '
  - type: note
    content: '[Jer. 23:9]'
  - type: text
    content: 'I have been broken over their whoring heart that has departed from me and over their eyes '
  - type: note
    content: See Ex. 34:15
  - type: text
    content: 'that go whoring after their idols. '
  - type: note
    content: ch. 16:61; 20:43; 36:31; Lev. 26:39, 40
  - type: text
    content: 'And they will be loathsome in their own sight for the evils that they have committed, for all their abominations. '
