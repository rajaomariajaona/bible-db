document_id: 1JN.3,59
type_code: eng
verses:
  '1':
  - type: text
    content: 'See '
  - type: note
    content: ch. 4:10; John 3:16
  - type: text
    content: 'what kind of love the Father has given to us, that we should be called '
  - type: note
    content: John 1:12
  - type: text
    content: 'children of God; and so we are. The reason why '
  - type: note
    content: '[ch. 4:17]'
  - type: text
    content: 'the world does not know us is that '
  - type: note
    content: John 16:3; 17:25
  - type: text
    content: 'it did not know him. '
  '10':
  - type: text
    content: 'By this it is evident who are the children of God, and who are the children of the devil: whoever does not practice righteousness is not of God, '
  - type: note
    content: ch. 4:8
  - type: text
    content: 'nor is the one who '
  - type: note
    content: ch. 4:20, 21
  - type: text
    content: does not love his brother.
  - type: heading
    content: Love One Another
  '11':
  - type: text
    content: 'For '
  - type: note
    content: ch. 1:5; 2:24
  - type: text
    content: 'this is the message that you have heard from the beginning, '
  - type: note
    content: See John 13:34
  - type: text
    content: 'that we should love one another. '
  '12':
  - type: text
    content: 'We should not be like '
  - type: note
    content: Gen. 4:4, 8; Heb. 11:4; Jude 11
  - type: text
    content: 'Cain, who was of the evil one and murdered his brother. And why did he murder him? '
  - type: note
    content: Ps. 38:20; Prov. 29:10
  - type: text
    content: 'Because his own deeds were evil and his brother’s righteous. '
  '13':
  - type: text
    content: Do not be surprised, brothers,
  - type: note
    content: Or brothers and sisters. In New Testament usage, depending on the context, the plural Greek word adelphoi (translated “brothers”) may refer either to brothers or to brothers and sisters; also verses 14, 16
  - type: text
    content: ' '
  - type: note
    content: John 15:18; 17:14
  - type: text
    content: 'that the world hates you. '
  '14':
  - type: text
    content: 'We know that '
  - type: note
    content: John 5:24
  - type: text
    content: 'we have passed out of death into life, because we love the brothers. Whoever does not love abides in death. '
  '15':
  - type: note
    content: Matt. 5:21, 22
  - type: text
    content: 'Everyone who hates his brother is a murderer, and you know that '
  - type: note
    content: Gal. 5:21; Rev. 21:8
  - type: text
    content: no murderer has eternal life abiding in him.
  '16':
  - type: text
    content: 'By this we know love, that '
  - type: note
    content: See John 15:13
  - type: text
    content: 'he laid down his life for us, and '
  - type: note
    content: '[Phil. 2:17]'
  - type: text
    content: 'we ought to lay down our lives for the brothers. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: James 2:15, 16
  - type: text
    content: 'if anyone has the world’s goods and sees his brother in need, yet '
  - type: note
    content: Deut. 15:7
  - type: text
    content: 'closes his heart against him, '
  - type: note
    content: '[ch. 4:20]'
  - type: text
    content: 'how does God’s love abide in him? '
  '18':
  - type: text
    content: 'Little children, let us not '
  - type: note
    content: Ezek. 33:31; Eph. 4:15
  - type: text
    content: 'love in word or talk but in deed and '
  - type: note
    content: 2 John 1; 3 John 1
  - type: text
    content: in truth.
  '19':
  - type: text
    content: 'By this we shall know that we are of the truth and reassure our heart before him; '
  '2':
  - type: text
    content: 'Beloved, we are '
  - type: note
    content: '[See ver. 1 above]'
  - type: text
    content: 'God’s children '
  - type: note
    content: Rom. 8:15; Gal. 3:26; Eph. 1:5
  - type: text
    content: 'now, and what we will be '
  - type: note
    content: '[Rom. 8:18; 2 Cor. 4:17]'
  - type: text
    content: 'has not yet appeared; but we know that '
  - type: note
    content: ch. 2:28
  - type: text
    content: when he appears
  - type: note
    content: Or when it appears
  - type: text
    content: ' '
  - type: note
    content: Rom. 8:29; 2 Cor. 3:18; 4:11; Phil. 3:21; 2 Pet. 1:4
  - type: text
    content: 'we shall be like him, because '
  - type: note
    content: John 17:24; 1 Cor. 13:12; Rev. 22:4
  - type: text
    content: 'we shall see him as he is. '
  '20':
  - type: text
    content: 'for whenever our heart condemns us, God is greater than our heart, and he knows everything. '
  '21':
  - type: text
    content: 'Beloved, '
  - type: note
    content: '[1 Cor. 4:4]'
  - type: text
    content: 'if our heart does not condemn us, '
  - type: note
    content: ch. 5:14; [Job 11:15; 22:26; Rom. 14:22]
  - type: text
    content: 'we have confidence before God; '
  '22':
  - type: text
    content: 'and '
  - type: note
    content: See Matt. 7:7
  - type: text
    content: 'whatever we ask we receive from him, because we keep his commandments and '
  - type: note
    content: John 8:29
  - type: text
    content: 'do what pleases him. '
  '23':
  - type: text
    content: 'And this is his commandment, '
  - type: note
    content: John 6:29; [Acts 18:8]
  - type: text
    content: 'that we believe in the name of his Son Jesus Christ and '
  - type: note
    content: ver. 11
  - type: text
    content: 'love one another, '
  - type: note
    content: '[ch. 2:8]'
  - type: text
    content: 'just as he has commanded us. '
  '24':
  - type: note
    content: '[John 6:56; 14:20; 15:4, 5; 17:21]'
  - type: text
    content: Whoever keeps his commandments abides in God,
  - type: note
    content: Greek him
  - type: text
    content: ' and God'
  - type: note
    content: Greek he
  - type: text
    content: ' in him. And '
  - type: note
    content: ch. 4:13; Rom. 8:9
  - type: text
    content: by this we know that he abides in us, by the Spirit whom he has given us.
  '3':
  - type: text
    content: 'And everyone who '
  - type: note
    content: Rom. 15:12
  - type: text
    content: 'thus hopes in him '
  - type: note
    content: 2 Cor. 7:1
  - type: text
    content: purifies himself as he is pure.
  '4':
  - type: text
    content: 'Everyone who makes a practice of sinning also practices lawlessness; '
  - type: note
    content: '[ch. 5:17; Rom. 4:15]'
  - type: text
    content: 'sin is lawlessness. '
  '5':
  - type: text
    content: 'You know that '
  - type: note
    content: Heb. 9:26; See ch. 1:2
  - type: text
    content: 'he appeared in order to '
  - type: note
    content: '[Isa. 53:11, 12]'
  - type: text
    content: 'take away sins, and '
  - type: note
    content: See 1 Pet. 2:22
  - type: text
    content: 'in him there is no sin. '
  '6':
  - type: text
    content: 'No one who abides in him keeps on sinning; '
  - type: note
    content: ch. 2:4; 4:8; 3 John 11
  - type: text
    content: 'no one who keeps on sinning has either seen him or known him. '
  '7':
  - type: text
    content: 'Little children, '
  - type: note
    content: ch. 2:26
  - type: text
    content: 'let no one deceive you. '
  - type: note
    content: ch. 2:29
  - type: text
    content: 'Whoever practices righteousness is righteous, as he is righteous. '
  '8':
  - type: note
    content: Matt. 13:38; John 8:44
  - type: text
    content: 'Whoever makes a practice of sinning is of the devil, for the devil has been sinning from the beginning. The reason the Son of God appeared was '
  - type: note
    content: Heb. 2:14; [Gen. 3:15; Luke 10:18; John 16:11]
  - type: text
    content: 'to destroy the works of the devil. '
  '9':
  - type: note
    content: ch. 5:18
  - type: text
    content: No one born of God makes a practice of sinning, for God’s
  - type: note
    content: Greek his
  - type: text
    content: ' seed abides in him; and he cannot keep on sinning, because he has been born of God. '
