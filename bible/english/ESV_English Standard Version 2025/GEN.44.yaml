        text: 43:9
      metadata:
        usfm: GEN.43.9
    marker-yv: yv-n
  - type: text
    text: '‘If I do not bring him back to you, then I shall bear the blame before my father all my life.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now therefore, please let your servant remain instead of the boy as a servant to my lord, and let the boy go back with his brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For how can I go back to my father if the boy is not with me? I fear to see the evil that would find my father.”
