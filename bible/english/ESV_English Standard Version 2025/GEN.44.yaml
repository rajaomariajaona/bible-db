  - type: text
    text: 'as soon as he sees that the boy is not with us, he will die, and your servants will bring down the gray hairs of your servant our father with sorrow to Sheol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For your servant became a pledge of safety for the boy to my father, saying, '
  - type: usfm
    marker: x
    children:
