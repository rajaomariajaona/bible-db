document_id: GEN.44,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Tests His Brothers
  - type: text
    content: 'Then he commanded '
  - type: note
    content: ver. 4; See ch. 43:16
  - type: text
    content: 'the steward of his house, '
  - type: note
    content: ch. 42:25
  - type: text
    content: '“Fill the men’s sacks with food, as much as they can carry, and put each man’s money in the mouth of his sack, '
  '10':
  - type: text
    content: 'He said, “Let it be as you say: he who is found with it shall be my servant, and the rest of you shall be innocent.” '
  '11':
  - type: text
    content: 'Then each man quickly lowered his sack to the ground, and each man opened his sack. '
  '12':
  - type: text
    content: 'And he searched, beginning with the eldest and ending with the youngest. And the cup was found in Benjamin’s sack. '
  '13':
  - type: text
    content: 'Then they '
  - type: note
    content: ch. 37:29
  - type: text
    content: tore their clothes, and every man loaded his donkey, and they returned to the city.
  '14':
  - type: text
    content: 'When Judah and his brothers came to Joseph’s house, he was still there. They '
  - type: note
    content: ch. 37:7, 9, 10; 42:6; 43:26, 28
  - type: text
    content: 'fell before him to the ground. '
  '15':
  - type: text
    content: 'Joseph said to them, “What deed is this that you have done? Do you not know that a man like me '
  - type: note
    content: ver. 5
  - type: text
    content: 'can indeed practice divination?” '
  '16':
  - type: text
    content: 'And Judah said, “What shall we say to my lord? What shall we speak? Or how can we clear ourselves? God has found out '
  - type: note
    content: ch. 37:18; [Num. 32:23]
  - type: text
    content: 'the guilt of your servants; behold, we are '
  - type: note
    content: ver. 9
  - type: text
    content: 'my lord’s servants, both we and he also in whose hand the cup has been found.” '
  '17':
  - type: text
    content: But he said, “Far be it from me that I should do so! Only the man in whose hand the cup was found shall be my servant. But as for you, go up in peace to your father.”
  '18':
  - type: text
    content: 'Then Judah went up to him and said, '
  - type: note
    content: ch. 43:20
  - type: text
    content: '“Oh, my lord, please let your servant speak a word in my lord’s ears, and '
  - type: note
    content: Ex. 32:22
  - type: text
    content: 'let not your anger burn against your servant, for '
  - type: note
    content: ch. 41:40
  - type: text
    content: 'you are like Pharaoh himself. '
  '19':
  - type: text
    content: 'My lord asked his servants, saying, ‘Have you a father, or a brother?’ '
  '2':
  - type: text
    content: and put my cup, the silver cup, in the mouth of the sack of the youngest, with his money for the grain.” And he did as Joseph told him.
  '20':
  - type: text
    content: 'And we said to my lord, ‘We have a father, an old man, '
  - type: note
    content: ver. 30; [ch. 43:8]
  - type: text
    content: 'and a young brother, '
  - type: note
    content: '[ch. 37:3]'
  - type: text
    content: 'the child of his old age. His brother is dead, and he alone is left of his mother’s children, and his father loves him.’ '
  '21':
  - type: text
    content: 'Then you said to your servants, '
  - type: note
    content: ch. 42:15, 20; 43:3, 5
  - type: text
    content: '‘Bring him down to me, that I may set my eyes on him.’ '
  '22':
  - type: text
    content: 'We said to my lord, ‘The boy cannot leave his father, for if he should leave his father, '
  - type: note
    content: '[ver. 31]'
  - type: text
    content: 'his father would die.’ '
  '23':
  - type: text
    content: 'Then you said to your servants, '
  - type: note
    content: ch. 43:3
  - type: text
    content: ‘Unless your youngest brother comes down with you, you shall not see my face again.’
  '24':
  - type: text
    content: '“When we went back to your servant my father, we told him the words of my lord. '
  '25':
  - type: text
    content: 'And when '
  - type: note
    content: ch. 43:2
  - type: text
    content: 'our father said, ‘Go again, buy us a little food,’ '
  '26':
  - type: text
    content: 'we said, ‘We cannot go down. If our youngest brother goes with us, then we will go down. For we cannot see the man’s face unless our youngest brother is with us.’ '
  '27':
  - type: text
    content: 'Then your servant my father said to us, ‘You know that my wife bore me '
  - type: note
    content: ch. 46:19
  - type: text
    content: 'two sons. '
  '28':
  - type: text
    content: 'One left me, and I said, '
  - type: note
    content: ch. 37:33
  - type: text
    content: '“Surely he has been torn to pieces,” and I have never seen him since. '
  '29':
  - type: text
    content: 'If you '
  - type: note
    content: ch. 42:36, 38
  - type: text
    content: 'take this one also from me, '
  - type: note
    content: ch. 42:4, 38
  - type: text
    content: and harm happens to him, you will bring down my gray hairs in evil to Sheol.’
  '3':
  - type: text
    content: 'As soon as the morning was light, the men were sent away with their donkeys. '
  '30':
  - type: text
    content: '“Now therefore, as soon as I come to your servant my father, and the boy is not with us, then, as his life is bound up in the boy’s life, '
  '31':
  - type: text
    content: 'as soon as he sees that the boy is not with us, he will die, and your servants will bring down the gray hairs of your servant our father with sorrow to Sheol. '
  '32':
  - type: text
    content: 'For your servant became a pledge of safety for the boy to my father, saying, '
  - type: note
    content: ch. 43:9
  - type: text
    content: '‘If I do not bring him back to you, then I shall bear the blame before my father all my life.’ '
  '33':
  - type: text
    content: 'Now therefore, please let your servant remain instead of the boy as a servant to my lord, and let the boy go back with his brothers. '
  '34':
  - type: text
    content: For how can I go back to my father if the boy is not with me? I fear to see the evil that would find my father.”
  '4':
  - type: text
    content: 'They had gone only a short distance from the city. Now Joseph said to his '
  - type: note
    content: ver. 1
  - type: text
    content: steward, “Up, follow after the men, and when you overtake them, say to them, ‘Why have you repaid evil for good?
  - type: note
    content: Septuagint (compare Vulgate) adds Why have you stolen my silver cup?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Is it not from this that my lord drinks, and '
  - type: note
    content: ver. 15; ch. 30:27; [2 Kgs. 21:6; 2 Chr. 33:6]
  - type: text
    content: by this that he practices divination? You have done evil in doing this.’”
  '6':
  - type: text
    content: 'When he overtook them, he spoke to them these words. '
  '7':
  - type: text
    content: 'They said to him, “Why does my lord speak such words as these? Far be it from your servants to do such a thing! '
  '8':
  - type: text
    content: 'Behold, '
  - type: note
    content: ch. 43:21
  - type: text
    content: 'the money that we found in the mouths of our sacks we brought back to you from the land of Canaan. How then could we steal silver or gold from your lord’s house? '
  '9':
  - type: note
    content: '[ch. 31:32]'
  - type: text
    content: 'Whichever of your servants is found with it shall die, and we also will be '
  - type: note
    content: ver. 16
  - type: text
    content: 'my lord’s servants.” '
