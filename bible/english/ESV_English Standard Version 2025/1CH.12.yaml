document_id: 1CH.12,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mighty Men Join David
  - type: text
    content: ' '
  - type: note
    content: See 1 Sam. 27:2-6
  - type: text
    content: 'Now these are the men who came to David at Ziklag, while he could not move about freely because of Saul the son of Kish. And they were among the mighty men who helped him in war. '
  '10':
  - type: text
    content: 'Mishmannah fourth, Jeremiah fifth, '
  '11':
  - type: text
    content: 'Attai sixth, Eliel seventh, '
  '12':
  - type: text
    content: 'Johanan eighth, Elzabad ninth, '
  '13':
  - type: text
    content: 'Jeremiah tenth, Machbannai eleventh. '
  '14':
  - type: text
    content: 'These Gadites were officers of the army; the least was a '
  - type: note
    content: '[Lev. 26:8]'
  - type: text
    content: 'match for a hundred men and the greatest for a thousand. '
  '15':
  - type: text
    content: 'These are the men who crossed the Jordan in the first month, when it was '
  - type: note
    content: See Josh. 3:15
  - type: text
    content: overflowing all its banks, and put to flight all those in the valleys, to the east and to the west.
  '16':
  - type: text
    content: 'And some of the men of Benjamin and Judah came to the stronghold to David. '
  '17':
  - type: text
    content: 'David went out to meet them and said to them, “If you have come to me in friendship to help me, my heart will be joined to you; but if to betray me to my adversaries, although there is no wrong in my hands, then may the God of our fathers see and rebuke you.” '
  '18':
  - type: text
    content: 'Then '
  - type: note
    content: See Judg. 3:10
  - type: text
    content: 'the Spirit clothed '
  - type: note
    content: '[2 Sam. 17:25]'
  - type: text
    content: Amasai, chief of the thirty, and he said,
  - type: text
    content: “We are yours, O David,
  - type: text
    content: and with you, O son of Jesse!
  - type: note
    content: '[ 1 Sam. 25:6 ]'
  - type: text
    content: Peace, peace to you,
  - type: text
    content: and peace to your helpers!
  - type: text
    content: For your God helps you.”
  - type: text
    content: Then David received them and made them officers of his troops.
  '19':
  - type: text
    content: 'Some of the men of Manasseh deserted to David '
  - type: note
    content: See 1 Sam. 29:2-9
  - type: text
    content: 'when he came with the Philistines for the battle against Saul. (Yet he did not help them, for the rulers of the Philistines took counsel and sent him away, saying, '
  - type: note
    content: '[1 Sam. 29:4]'
  - type: text
    content: '“At peril to our heads he will desert to his master Saul.”) '
  '2':
  - type: text
    content: 'They '
  - type: note
    content: 2 Chr. 17:17; Ps. 78:9
  - type: text
    content: 'were bowmen and could shoot arrows and sling stones with either the right or the '
  - type: note
    content: '[Judg. 3:15; 20:16]'
  - type: text
    content: 'left hand; they were Benjaminites, '
  - type: note
    content: ver. 29
  - type: text
    content: 'Saul’s kinsmen. '
  '20':
  - type: text
    content: 'As he went to Ziklag, these men of Manasseh deserted to him: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, chiefs of thousands in Manasseh. '
  '21':
  - type: text
    content: 'They helped David against '
  - type: note
    content: 1 Sam. 30:1
  - type: text
    content: 'the band of raiders, for they were all mighty men of valor and were commanders in the army. '
  '22':
  - type: text
    content: For from day to day men came to David to help him, until there was a great army, like an army of God.
  '23':
  - type: text
    content: 'These are the numbers of the divisions of the armed troops '
  - type: note
    content: ch. 11:1; 2 Sam. 2:3, 4; 5:1
  - type: text
    content: 'who came to David in Hebron '
  - type: note
    content: ch. 10:14
  - type: text
    content: 'to turn the kingdom of Saul over to him, '
  - type: note
    content: ch. 11:3, 10; 1 Sam. 16:1, 3
  - type: text
    content: 'according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'The men of Judah bearing shield and spear were 6,800 armed troops. '
  '25':
  - type: text
    content: 'Of the Simeonites, mighty men of valor for war, 7,100. '
  '26':
  - type: text
    content: 'Of the Levites 4,600. '
  '27':
  - type: text
    content: 'The prince Jehoiada, of the house of Aaron, and with him 3,700. '
  '28':
  - type: note
    content: ch. 6:8; 2 Sam. 8:17
  - type: text
    content: 'Zadok, a young man mighty in valor, and twenty-two commanders from his own fathers’ house. '
  '29':
  - type: text
    content: 'Of the Benjaminites, '
  - type: note
    content: ver. 2
  - type: text
    content: 'the kinsmen of Saul, 3,000, of whom the '
  - type: note
    content: '[2 Sam. 2:8, 9]'
  - type: text
    content: 'majority had to that point kept their allegiance to the house of Saul. '
  '3':
  - type: text
    content: 'The chief was Ahiezer, then Joash, both sons of Shemaah of '
  - type: note
    content: Josh. 18:28
  - type: text
    content: 'Gibeah; also Jeziel and Pelet, the sons of Azmaveth; Beracah, Jehu of '
  - type: note
    content: ch. 11:28; 27:12
  - type: text
    content: 'Anathoth, '
  '30':
  - type: text
    content: 'Of the Ephraimites 20,800, mighty men of valor, famous men in their fathers’ houses. '
  '31':
  - type: text
    content: 'Of the half-tribe of Manasseh 18,000, who were '
  - type: note
    content: See Num. 1:17
  - type: text
    content: 'expressly named to come and make David king. '
  '32':
  - type: text
    content: 'Of Issachar, men who '
  - type: note
    content: '[Esth. 1:13]'
  - type: text
    content: 'had understanding of the times, to know what Israel ought to do, 200 chiefs, and all their kinsmen under their command. '
  '33':
  - type: text
    content: 'Of Zebulun 50,000 seasoned troops, '
  - type: note
    content: ver. 36, 38
  - type: text
    content: equipped for battle with all the weapons of war, to help David
  - type: note
    content: Septuagint; Hebrew lacks David
  - type: text
    content: ' with '
  - type: note
    content: '[Ps. 12:2]'
  - type: text
    content: 'singleness of purpose. '
  '34':
  - type: text
    content: 'Of Naphtali 1,000 commanders with whom were 37,000 men armed with shield and spear. '
  '35':
  - type: text
    content: 'Of the Danites 28,600 men equipped for battle. '
  '36':
  - type: text
    content: 'Of '
  - type: note
    content: '[2 Sam. 2:9]'
  - type: text
    content: 'Asher 40,000 '
  - type: note
    content: ver. 33
  - type: text
    content: 'seasoned troops '
  - type: note
    content: ver. 33
  - type: text
    content: 'ready for battle. '
  '37':
  - type: text
    content: Of the Reubenites and Gadites and the half-tribe of Manasseh from beyond the Jordan, 120,000 men armed with all the weapons of war.
  '38':
  - type: text
    content: 'All these, men of war, arrayed in battle order, came to Hebron with '
  - type: note
    content: '[1 Kgs. 8:61]'
  - type: text
    content: 'a whole heart to make David king over all Israel. Likewise, all the rest of Israel were of a '
  - type: note
    content: '[ver. 33]'
  - type: text
    content: 'single mind to make David king. '
  '39':
  - type: text
    content: 'And they were there with David for three days, eating and drinking, for their brothers had made preparation for them. '
  '4':
  - type: text
    content: 'Ishmaiah of '
  - type: note
    content: Josh. 9:3
  - type: text
    content: Gibeon, a mighty man among the thirty and a leader over the thirty; Jeremiah,
  - type: note
    content: Hebrew verse 5
  - type: text
    content: ' Jahaziel, Johanan, Jozabad of Gederah, '
  '40':
  - type: text
    content: 'And also their relatives, from as far as Issachar and Zebulun and Naphtali, came bringing food on donkeys and on camels and on mules and on oxen, abundant provisions of flour, '
  - type: note
    content: '[1 Sam. 25:18; 30:12]'
  - type: text
    content: cakes of figs, clusters of raisins, and wine and oil, oxen and sheep, for there was joy in Israel.
  '5':
  - type: text
    content: Eluzai,
  - type: note
    content: Hebrew verse 6
  - type: text
    content: ' Jerimoth, Bealiah, Shemariah, Shephatiah the Haruphite; '
  '6':
  - type: text
    content: 'Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the '
  - type: note
    content: ch. 9:19
  - type: text
    content: 'Korahites; '
  '7':
  - type: text
    content: And Joelah and Zebadiah, the sons of Jeroham of Gedor.
  '8':
  - type: text
    content: 'From the Gadites there went over to David at the stronghold in the wilderness mighty and experienced warriors, expert with shield and spear, whose faces were like the faces of lions and who were '
  - type: note
    content: 2 Sam. 2:18
  - type: text
    content: 'swift as gazelles upon the mountains: '
  '9':
  - type: text
    content: 'Ezer the chief, Obadiah second, Eliab third, '
