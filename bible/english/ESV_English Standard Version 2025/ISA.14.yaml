document_id: ISA.14,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Restoration of Jacob
  - type: text
    content: ' '
  - type: note
    content: Ps. 102:13; Zech. 1:17
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will have compassion on Jacob and will again choose Israel, and '
  - type: note
    content: 2 Chr. 36:22, 23
  - type: text
    content: 'will set them in their own land, and '
  - type: note
    content: Zech. 8:22, 23; See Eph. 2:12-14
  - type: text
    content: 'sojourners will join them and will attach themselves to the house of Jacob. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 51:48 ]'
  - type: text
    content: All of them will answer
  - type: text
    content: 'and say to you:'
  - type: text
    content: ‘You too have become as weak as we!
  - type: text
    content: You have become like us!’
  '11':
  - type: text
    content: Your pomp is brought down to Sheol,
  - type: text
    content: the sound of your harps;
  - type: text
    content: maggots are laid as a bed beneath you,
  - type: text
    content: and worms are your covers.
  '12':
  - type: text
    content: '“How '
  - type: note
    content: '[ch. 24:21; 34:3]'
  - type: text
    content: you are fallen from heaven,
  - type: text
    content: 'O Day Star, '
  - type: note
    content: '[Job 38:7]'
  - type: text
    content: son of Dawn!
  - type: text
    content: How you are cut down to the ground,
  - type: text
    content: you who laid the nations low!
  '13':
  - type: text
    content: You said in your heart,
  - type: note
    content: Jer. 51:53; Amos 9:2; [ Matt. 11:23; Luke 10:15 ]
  - type: text
    content: ‘I will ascend to heaven;
  - type: text
    content: above the stars of God
  - type: note
    content: Dan. 5:22, 23; [ 2 Thess. 2:4 ]
  - type: text
    content: I will set my throne on high;
  - type: text
    content: I will sit on the mount of assembly
  - type: text
    content: in the far reaches of the north;
  - type: note
    content: Or in the remote parts of Zaphon
  '14':
  - type: text
    content: I will ascend above the heights of the clouds;
  - type: text
    content: I will make myself like the Most High.’
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ezek. 32:23; Matt. 11:23; Luke 10:15
  - type: text
    content: But you are brought down to Sheol,
  - type: text
    content: to the far reaches of the pit.
  '16':
  - type: text
    content: Those who see you will stare at you
  - type: text
    content: 'and ponder over you:'
  - type: text
    content: '‘Is this '
  - type: note
    content: '[Jer. 50:23]'
  - type: text
    content: the man who made the earth tremble,
  - type: text
    content: who shook kingdoms,
  '17':
  - type: text
    content: who made the world like a desert
  - type: text
    content: and overthrew its cities,
  - type: note
    content: '[ Jer. 50:33 ]'
  - type: text
    content: who did not let his prisoners go home?’
  '18':
  - type: text
    content: All the kings of the nations lie in glory,
  - type: text
    content: each in his own tomb;
  - type: note
    content: Hebrew house
  '19':
  - type: text
    content: but you are cast out, away from your grave,
  - type: text
    content: like a loathed branch,
  - type: note
    content: '[ Ezek. 32:20 ]'
  - type: text
    content: clothed with the slain, those pierced by the sword,
  - type: text
    content: who go down to the stones of the pit,
  - type: text
    content: like a dead body trampled underfoot.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: ch. 49:22; 60:9; 66:20
  - type: text
    content: 'the peoples will take them and bring them to their place, and the house of Israel will possess them in the '
  - type: text
    content: Lord
  - type: text
    content: '’s land '
  - type: note
    content: ch. 61:5
  - type: text
    content: as male and female slaves.
  - type: note
    content: Or servants
  - type: text
    content: ' '
  - type: note
    content: '[Joel 3:8]'
  - type: text
    content: 'They will take captive those who were their captors, '
  - type: note
    content: ch. 60:14
  - type: text
    content: and rule over those who oppressed them.
  - type: heading
    content: Israel’s Remnant Taunts Babylon
  '20':
  - type: text
    content: You will not be joined with them in burial,
  - type: text
    content: because you have destroyed your land,
  - type: text
    content: you have slain your people.
  - type: text
    content: '“May '
  - type: note
    content: Job 18:19; Ps. 21:10; 109:13
  - type: text
    content: the offspring of evildoers
  - type: text
    content: nevermore be named!
  '21':
  - type: text
    content: Prepare slaughter for his sons
  - type: note
    content: '[ Ex. 20:5; Matt. 23:35 ]'
  - type: text
    content: because of the guilt of their fathers,
  - type: text
    content: lest they rise and possess the earth,
  - type: text
    content: and fill the face of the world with cities.”
  '22':
  - type: text
    content: '“I will rise up against them,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts, “and will cut off from Babylon name and '
  - type: note
    content: '[Jer. 51:50, 62]'
  - type: text
    content: 'remnant, '
  - type: note
    content: Job 18:19; [Gen. 21:23]
  - type: text
    content: 'descendants and posterity,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: '“And I will make it a possession of the '
  - type: note
    content: ch. 34:11; Zeph. 2:14
  - type: text
    content: hedgehog,
  - type: note
    content: Possibly porcupine, or owl
  - type: text
    content: ' and pools of water, and I will sweep it with the broom of destruction,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts.'
  - type: heading
    content: An Oracle Concerning Assyria
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has sworn:'
  - type: note
    content: '[ Prov. 19:21 ]'
  - type: text
    content: “As I have planned,
  - type: text
    content: so shall it be,
  - type: text
    content: and as I have purposed,
  - type: text
    content: so shall it stand,
  '25':
  - type: text
    content: 'that '
  - type: note
    content: ch. 37:36
  - type: text
    content: I will break the Assyrian in my land,
  - type: text
    content: and on my mountains trample him underfoot;
  - type: text
    content: 'and '
  - type: note
    content: ch. 9:4; 10:27
  - type: text
    content: his yoke shall depart from them,
  - type: text
    content: 'and '
  - type: note
    content: ch. 9:4; 10:27
  - type: text
    content: his burden from their shoulder.”
  '26':
  - type: text
    content: This is the purpose that is purposed
  - type: text
    content: concerning the whole earth,
  - type: text
    content: 'and this is '
  - type: note
    content: '[Deut. 4:34]'
  - type: text
    content: the hand that is stretched out
  - type: text
    content: over all the nations.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 20:6; Job 9:12; Ps. 33:11; Prov. 21:30; Dan. 4:31, 33, 35
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts has purposed,'
  - type: text
    content: and who will annul it?
  - type: note
    content: '[See ver. 26 above]'
  - type: text
    content: His hand is stretched out,
  - type: text
    content: and who will turn it back?
  - type: heading
    content: An Oracle Concerning Philistia
  '28':
  - type: text
    content: 'In the year that '
  - type: note
    content: 2 Kgs. 16:20
  - type: text
    content: 'King Ahaz died came this '
  - type: note
    content: See ch. 13:1
  - type: text
    content: 'oracle:'
  '29':
  - type: text
    content: 'Rejoice not, '
  - type: note
    content: Ex. 15:14; [Ps. 60:8; 87:4; 108:9]
  - type: text
    content: O Philistia, all of you,
  - type: text
    content: 'that '
  - type: note
    content: '[ch. 10:24]'
  - type: text
    content: the rod that struck you is broken,
  - type: text
    content: for from the serpent’s root will come forth an adder,
  - type: text
    content: 'and its fruit will be a '
  - type: note
    content: ch. 30:6; Num. 21:6; [Jer. 46:22]
  - type: text
    content: flying fiery serpent.
  '3':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you rest from your pain and turmoil and the hard service with which you were made to serve, '
  '30':
  - type: text
    content: 'And the firstborn of '
  - type: note
    content: '[ch. 29:19; Zeph. 3:12]'
  - type: text
    content: the poor will graze,
  - type: text
    content: 'and '
  - type: note
    content: '[ch. 29:19; Zeph. 3:12]'
  - type: text
    content: the needy lie down in safety;
  - type: text
    content: but I will kill your root with famine,
  - type: text
    content: and your remnant it will slay.
  '31':
  - type: text
    content: ' '
  - type: note
    content: ch. 13:6
  - type: text
    content: 'Wail, O '
  - type: note
    content: ch. 24:12
  - type: text
    content: gate; cry out, O city;
  - type: text
    content: 'melt in fear, '
  - type: note
    content: '[See ver. 29 above]'
  - type: text
    content: O Philistia, all of you!
  - type: note
    content: '[ch. 20:1 ]'
  - type: text
    content: For smoke comes out of the north,
  - type: text
    content: and there is no straggler in his ranks.
  '32':
  - type: text
    content: What will one answer the messengers of the nation?
  - type: note
    content: Ps. 87:1, 5; 102:16; 132:13; [ch. 28:16 ]
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has founded Zion,'
  - type: text
    content: and in her the afflicted of his people find refuge.”
  '4':
  - type: text
    content: 'you will take up this '
  - type: note
    content: Mic. 2:4; Hab. 2:6
  - type: text
    content: 'taunt against the king of Babylon:'
  - type: text
    content: “How the oppressor has ceased,
  - type: note
    content: '[ Jer. 51:13; Rev. 18:16 ]'
  - type: text
    content: the insolent fury
  - type: note
    content: Dead Sea Scroll (compare Septuagint, Syriac, Vulgate); the meaning of the word in the Masoretic Text is uncertain
  - type: text
    content: ' ceased!'
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has broken the '
  - type: note
    content: '[ch. 9:4]'
  - type: text
    content: staff of the wicked,
  - type: text
    content: 'the '
  - type: note
    content: '[ch. 9:4]'
  - type: text
    content: scepter of rulers,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '[ Jer. 50:23 ]'
  - type: text
    content: that struck the peoples in wrath
  - type: text
    content: with unceasing blows,
  - type: text
    content: that ruled the nations in anger
  - type: text
    content: with unrelenting persecution.
  '7':
  - type: text
    content: The whole earth is at rest and quiet;
  - type: note
    content: ch. 44:23; 49:13; 54:1; 55:12
  - type: text
    content: they break forth into singing.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[ Ezek. 31:16 ]'
  - type: note
    content: '[ch. 37:24 ]'
  - type: text
    content: The cypresses rejoice at you,
  - type: note
    content: See ch. 2:13
  - type: text
    content: the cedars of Lebanon, saying,
  - type: text
    content: ‘Since you were laid low,
  - type: text
    content: no woodcutter comes up against us.’
  '9':
  - type: text
    content: Sheol beneath is stirred up
  - type: text
    content: to meet you when you come;
  - type: text
    content: it rouses the shades to greet you,
  - type: text
    content: all who were leaders of the earth;
  - type: text
    content: it raises from their thrones
  - type: text
    content: all who were kings of the nations.
