document_id: EXO.30,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar of Incense
  - type: text
    content: ' '
  - type: note
    content: For ver. 1-5, see ch. 37:25-28
  - type: text
    content: '“You shall make '
  - type: note
    content: ch. 40:5; Lev. 4:7; Rev. 8:3
  - type: text
    content: 'an altar on which to burn incense; you shall make it of acacia wood. '
  '10':
  - type: note
    content: Lev. 16:18; 23:27
  - type: text
    content: 'Aaron shall make atonement on its horns once a year. With the blood of the '
  - type: note
    content: ch. 29:36
  - type: text
    content: 'sin offering of atonement he shall make atonement for it once in the year throughout your generations. It is most holy to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Census Tax
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: note
    content: Num. 1:2-4; 26:2; 2 Sam. 24:2
  - type: text
    content: '“When you take the census of the people of Israel, then each shall give '
  - type: note
    content: ch. 21:30; Num. 31:50; [Ps. 49:7]
  - type: text
    content: 'a ransom for his life to the '
  - type: text
    content: Lord
  - type: text
    content: ' when you number them, that there be no plague among them when you number them. '
  '13':
  - type: text
    content: 'Each one who is numbered in the census shall give this: half a shekel'
  - type: note
    content: A shekel was about 2/5 ounce or 11 grams
  - type: text
    content: ' according to the '
  - type: note
    content: ch. 38:24; Lev. 5:15; 27:3, 25
  - type: text
    content: 'shekel of the sanctuary (the '
  - type: note
    content: Lev. 27:25; Num. 3:47; 18:16; Ezek. 45:12
  - type: text
    content: shekel is twenty gerahs),
  - type: note
    content: A gerah was about 1/50 ounce or 0.6 gram
  - type: text
    content: ' '
  - type: note
    content: ch. 38:26; Matt. 17:24; [Gen. 24:22]
  - type: text
    content: 'half a shekel as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Everyone who is numbered in the census, from twenty years old and upward, shall give the '
  - type: text
    content: Lord
  - type: text
    content: '’s offering. '
  '15':
  - type: text
    content: 'The rich shall not give more, and the poor shall not give less, than '
  - type: note
    content: '[See ver. 13 above]'
  - type: text
    content: 'the half shekel, when you give the '
  - type: text
    content: Lord
  - type: text
    content: '’s offering to make atonement for your lives. '
  '16':
  - type: text
    content: 'You shall take the atonement money from the people of Israel and shall '
  - type: note
    content: See ch. 38:25-31
  - type: text
    content: 'give it for the service of the tent of meeting, that it may bring the people of Israel to '
  - type: note
    content: '[ch. 28:12; 39:7; Num. 16:40]'
  - type: text
    content: 'remembrance before the '
  - type: text
    content: Lord
  - type: text
    content: ', so as to make atonement for your lives.”'
  - type: heading
    content: The Bronze Basin
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“You shall also make a '
  - type: note
    content: ch. 40:7, 30; [1 Kgs. 7:38]
  - type: text
    content: 'basin of bronze, with its stand of bronze, for washing. '
  - type: note
    content: ch. 40:7, 30; [1 Kgs. 7:38]
  - type: text
    content: 'You shall put it between the tent of meeting and the altar, and you shall put water in it, '
  '19':
  - type: text
    content: 'with which Aaron and his sons '
  - type: note
    content: ch. 40:31, 32; Ps. 26:6; [Isa. 52:11; Heb. 10:22]
  - type: text
    content: 'shall wash their hands and their feet. '
  '2':
  - type: text
    content: A cubit
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' shall be its length, and a cubit its breadth. It shall be square, and two cubits shall be its height. '
  - type: note
    content: See ch. 27:2
  - type: text
    content: 'Its horns shall be of one piece with it. '
  '20':
  - type: text
    content: When they go into the tent of meeting, or when they come near the altar to minister, to burn a food offering
  - type: note
    content: Or an offering by fire
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: ', they shall wash with water, so that they may not die. '
  '21':
  - type: text
    content: 'They shall wash their hands and their feet, so that they may not die. It shall '
  - type: note
    content: See ch. 27:21
  - type: text
    content: be a statute forever to them, even to him and to his offspring throughout their generations.”
  - type: heading
    content: The Anointing Oil and Incense
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Take the '
  - type: note
    content: Song 4:14; Ezek. 27:22
  - type: text
    content: 'finest spices: of liquid myrrh 500 shekels, and of sweet-smelling cinnamon half as much, that is, 250, and 250 of '
  - type: note
    content: Ezek. 27:19
  - type: text
    content: 'aromatic cane, '
  '24':
  - type: text
    content: 'and 500 of cassia, according to the shekel of the sanctuary, and a '
  - type: note
    content: ch. 29:40
  - type: text
    content: hin
  - type: note
    content: A hin was about 4 quarts or 3.5 liters
  - type: text
    content: ' of olive oil. '
  '25':
  - type: text
    content: 'And you shall make of these a sacred anointing oil blended as by the '
  - type: note
    content: ch. 37:29
  - type: text
    content: 'perfumer; it shall be a '
  - type: note
    content: ch. 37:29; Num. 35:25; Ps. 89:20; 133:2
  - type: text
    content: 'holy anointing oil. '
  '26':
  - type: note
    content: ch. 40:9; Lev. 8:10; Num. 7:1
  - type: text
    content: 'With it you shall anoint the tent of meeting and the ark of the testimony, '
  '27':
  - type: text
    content: 'and the table and all its utensils, and the lampstand and its utensils, and the altar of incense, '
  '28':
  - type: text
    content: 'and the altar of burnt offering with all its utensils and the '
  - type: note
    content: ch. 40:11
  - type: text
    content: 'basin and its stand. '
  '29':
  - type: text
    content: 'You shall consecrate them, that they may be most holy. '
  - type: note
    content: ch. 29:37
  - type: text
    content: 'Whatever touches them will become holy. '
  '3':
  - type: text
    content: 'You shall '
  - type: note
    content: ch. 39:38; 40:5, 26; Num. 4:11
  - type: text
    content: 'overlay it with pure gold, its top and around its sides and its horns. And you shall make a molding of gold around it. '
  '30':
  - type: note
    content: See ch. 29:7
  - type: text
    content: 'You shall anoint Aaron and his sons, and consecrate them, that they may serve me as priests. '
  '31':
  - type: text
    content: 'And you shall say to the people of Israel, ‘This shall be my holy anointing oil throughout your generations. '
  '32':
  - type: text
    content: 'It shall not be poured on the body of an ordinary person, and you shall make no other like it in composition. '
  - type: note
    content: ver. 25, 37
  - type: text
    content: 'It is holy, and it shall be holy to you. '
  '33':
  - type: note
    content: ver. 38
  - type: text
    content: Whoever compounds any like it or whoever puts any of it on an outsider shall be cut off from his people.’”
  '34':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: ver. 7; ch. 25:6; 37:29
  - type: text
    content: '“Take sweet spices, stacte, and onycha, and galbanum, sweet spices with pure frankincense (of each shall there be an equal part), '
  '35':
  - type: text
    content: 'and make an '
  - type: note
    content: ver. 25
  - type: text
    content: 'incense blended as by the '
  - type: note
    content: See ver. 25
  - type: text
    content: 'perfumer, '
  - type: note
    content: '[Lev. 2:13]'
  - type: text
    content: 'seasoned with salt, pure and holy. '
  '36':
  - type: text
    content: 'You shall beat some of it very small, and put part of it before the testimony in the tent of meeting '
  - type: note
    content: See ch. 25:22
  - type: text
    content: 'where I shall meet with you. '
  - type: note
    content: '[ch. 40:10]'
  - type: text
    content: 'It shall be most holy for you. '
  '37':
  - type: text
    content: 'And the incense that you shall make '
  - type: note
    content: ver. 32
  - type: text
    content: 'according to its composition, you shall not make for yourselves. It shall be for you holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: note
    content: ver. 33
  - type: text
    content: Whoever makes any like it to use as perfume shall be cut off from his people.”
  '4':
  - type: text
    content: 'And you shall make two golden rings for it. Under its molding on two opposite sides of it you shall make them, and they shall be '
  - type: note
    content: See ch. 25:27
  - type: text
    content: 'holders for poles with which to carry it. '
  '5':
  - type: text
    content: 'You shall make the poles of acacia wood and overlay them with gold. '
  '6':
  - type: text
    content: 'And you shall put it in front of the veil that is above the ark of the testimony, in front of the '
  - type: note
    content: ch. 25:21, 22
  - type: text
    content: 'mercy seat that is above the testimony, where I will meet with you. '
  '7':
  - type: text
    content: 'And Aaron shall '
  - type: note
    content: ver. 34; ch. 31:11; 37:29; 40:27; 1 Sam. 2:28; 1 Chr. 23:13; 2 Chr. 2:4; 29:11; Luke 1:9
  - type: text
    content: 'burn fragrant incense on it. Every morning when he '
  - type: note
    content: See ch. 27:20, 21
  - type: text
    content: 'dresses the lamps he shall burn it, '
  '8':
  - type: text
    content: 'and when Aaron sets up the lamps at twilight, he shall burn it, a regular incense offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' throughout your generations. '
  '9':
  - type: text
    content: 'You shall not offer '
  - type: note
    content: Lev. 10:1
  - type: text
    content: 'unauthorized incense on it, or a burnt offering, or a grain offering, and you shall not pour a drink offering on it. '
