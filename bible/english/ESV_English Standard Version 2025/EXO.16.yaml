document_id: EXO.16,59
type_code: eng
verses:
  '1':
  - type: heading
    content: Bread from Heaven
  - type: text
    content: 'They '
  - type: note
    content: Num. 33:10, 11
  - type: text
    content: 'set out from Elim, and all the congregation of the people of Israel came to the wilderness of Sin, which is between Elim and Sinai, on the fifteenth day of the second month after they had departed from the land of Egypt. '
  '10':
  - type: text
    content: 'And as soon as Aaron spoke to the whole congregation of the people of Israel, they looked toward the wilderness, and behold, the '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: 'glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared in the cloud. '
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“I '
  - type: note
    content: ver. 8
  - type: text
    content: 'have heard the grumbling of the people of Israel. Say to them, ‘At '
  - type: note
    content: ver. 6
  - type: text
    content: 'twilight you shall eat meat, and '
  - type: note
    content: ver. 7
  - type: text
    content: 'in the morning you shall be filled with bread. Then you shall know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’”'
  '13':
  - type: text
    content: 'In the evening '
  - type: note
    content: Num. 11:31; Ps. 78:27, 28; 105:40
  - type: text
    content: 'quail came up and covered the camp, and in the morning '
  - type: note
    content: Num. 11:9
  - type: text
    content: 'dew lay around the camp. '
  '14':
  - type: text
    content: 'And when the dew had gone up, there was on the face of the wilderness a fine, flake-like thing, fine as frost on the ground. '
  '15':
  - type: text
    content: 'When the people of Israel saw it, they said to one another, '
  - type: note
    content: ver. 31
  - type: text
    content: “What is it?”
  - type: note
    content: Or “It is manna”; Hebrew man hu
  - type: text
    content: ' For they '
  - type: note
    content: Deut. 8:3
  - type: text
    content: 'did not know what it was. And Moses said to them, '
  - type: note
    content: Deut. 8:3; See ver. 4
  - type: text
    content: '“It is the bread that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you to eat. '
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: ‘Gather of it, each one of you, as much as he can eat. You shall each take an '
  - type: note
    content: ver. 36
  - type: text
    content: omer,
  - type: note
    content: An omer was about 2 quarts or 2 liters
  - type: text
    content: ' according to the number of the persons that each of you has in his tent.’” '
  '17':
  - type: text
    content: 'And the people of Israel did so. They gathered, some more, some less. '
  '18':
  - type: text
    content: 'But when they measured it with an omer, '
  - type: note
    content: Cited 2 Cor. 8:15
  - type: text
    content: 'whoever gathered much had nothing left over, and whoever gathered little had no lack. Each of them gathered as much as he could eat. '
  '19':
  - type: text
    content: 'And Moses said to them, “Let no one leave any of it over till the morning.” '
  '2':
  - type: text
    content: 'And the whole congregation of the people of Israel '
  - type: note
    content: ch. 15:24; 17:3; 1 Cor. 10:10
  - type: text
    content: 'grumbled against Moses and Aaron in the wilderness, '
  '20':
  - type: text
    content: 'But they did not listen to Moses. Some left part of it till the morning, and '
  - type: note
    content: '[ver. 24]'
  - type: text
    content: 'it bred worms and stank. And Moses was angry with them. '
  '21':
  - type: text
    content: Morning by morning they gathered it, each as much as he could eat; but when the sun grew hot, it melted.
  '22':
  - type: text
    content: 'On '
  - type: note
    content: ver. 5
  - type: text
    content: 'the sixth day they gathered twice as much bread, two omers each. And when all the leaders of the congregation came and told Moses, '
  '23':
  - type: text
    content: 'he said to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: ‘Tomorrow is a day of '
  - type: note
    content: ch. 35:2, 3; Gen. 2:3; Lev. 23:3; See ch. 20:8-11; 31:14-17
  - type: text
    content: 'solemn rest, a holy Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: '; bake what you will bake and boil what you will boil, and all that is left over lay aside to be kept till the morning.’” '
  '24':
  - type: text
    content: 'So they laid it aside till the morning, as Moses commanded them, and '
  - type: note
    content: '[ver. 20]'
  - type: text
    content: 'it did not stink, and there were no worms in it. '
  '25':
  - type: text
    content: 'Moses said, “Eat it today, for '
  - type: note
    content: '[See ver. 23 above]'
  - type: text
    content: 'today is a Sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: '; today you will not find it in the field. '
  '26':
  - type: text
    content: Six days you shall gather it, but on the seventh day, which is a Sabbath, there will be none.”
  '27':
  - type: text
    content: 'On the seventh day some of the people went out to gather, but they found none. '
  '28':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: '[Ps. 78:10; Ezek. 20:13]'
  - type: text
    content: '“How long will you refuse to keep my commandments and my laws? '
  '29':
  - type: text
    content: 'See! The '
  - type: text
    content: Lord
  - type: text
    content: ' has given you the Sabbath; therefore on the sixth day he gives you bread for two days. Remain each of you in his place; let no one go out of his place on the seventh day.” '
  '3':
  - type: text
    content: 'and the people of Israel said to them, '
  - type: note
    content: '[Num. 20:3-5]'
  - type: text
    content: '“Would that we had died by the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the land of Egypt, '
  - type: note
    content: Num. 11:4, 5
  - type: text
    content: when we sat by the meat pots and ate bread to the full, for you have brought us out into this wilderness to kill this whole assembly with hunger.”
  '30':
  - type: text
    content: 'So the people '
  - type: note
    content: Luke 23:56
  - type: text
    content: rested on the seventh day.
  '31':
  - type: text
    content: 'Now the house of Israel called its name '
  - type: note
    content: ver. 15
  - type: text
    content: 'manna. It was '
  - type: note
    content: Num. 11:7, 8
  - type: text
    content: 'like coriander seed, white, and the taste of it was like wafers made with honey. '
  '32':
  - type: text
    content: 'Moses said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: ‘Let an omer of it be kept throughout your generations, so that they may see the bread with which I fed you in the wilderness, when I brought you out of the land of Egypt.’” '
  '33':
  - type: text
    content: 'And Moses said to Aaron, “Take a '
  - type: note
    content: Heb. 9:4
  - type: text
    content: 'jar, and put an omer of manna in it, and place it before the '
  - type: text
    content: Lord
  - type: text
    content: ' to be kept throughout your generations.” '
  '34':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, so Aaron placed it before '
  - type: note
    content: ch. 25:16, 21; 26:33, 34; 27:21; 30:6, 26, 36; 40:21
  - type: text
    content: 'the testimony to be kept. '
  '35':
  - type: text
    content: 'The people of Israel '
  - type: note
    content: Deut. 8:2, 3; Neh. 9:20, 21
  - type: text
    content: 'ate the manna forty years, till they came to a habitable land. They ate the manna till '
  - type: note
    content: Josh. 5:12
  - type: text
    content: 'they came to the border of the land of Canaan. '
  '36':
  - type: text
    content: '(An omer is '
  - type: note
    content: Lev. 5:11; 6:20
  - type: text
    content: the tenth part of an ephah.)
  - type: note
    content: An ephah was about 3/5 bushel or 22 liters
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Behold, I am about to rain '
  - type: note
    content: Neh. 9:15; Ps. 78:24, 25; 105:40; John 6:31, 32; 1 Cor. 10:3
  - type: text
    content: 'bread from heaven for you, and the people shall go out and gather a day’s portion every day, that I may '
  - type: note
    content: See ch. 15:25
  - type: text
    content: 'test them, whether they will walk in my law or not. '
  '5':
  - type: text
    content: 'On the sixth day, when they prepare what they bring in, '
  - type: note
    content: ver. 22
  - type: text
    content: 'it will be twice as much as they gather daily.” '
  '6':
  - type: text
    content: 'So Moses and Aaron said to all the people of Israel, '
  - type: note
    content: ver. 12, 13
  - type: text
    content: '“At evening '
  - type: note
    content: ch. 6:7; [Num. 16:28-30]
  - type: text
    content: 'you shall know that it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought you out of the land of Egypt, '
  '7':
  - type: text
    content: 'and in the morning you shall see the '
  - type: note
    content: ch. 40:34; Num. 16:19; 1 Kgs. 8:10, 11; [ch. 13:21; 14:24]
  - type: text
    content: 'glory of the '
  - type: text
    content: Lord
  - type: text
    content: ', because he has heard your grumbling against the '
  - type: text
    content: Lord
  - type: text
    content: '. For '
  - type: note
    content: Num. 16:11
  - type: text
    content: 'what are we, that you grumble against us?” '
  '8':
  - type: text
    content: 'And Moses said, “When the '
  - type: text
    content: Lord
  - type: text
    content: ' gives you in the evening meat to eat and in the morning bread to the full, because the '
  - type: text
    content: Lord
  - type: text
    content: ' has heard your grumbling that you grumble against him—'
  - type: note
    content: ver. 7
  - type: text
    content: 'what are we? Your grumbling is not '
  - type: note
    content: '[Num. 14:27; 1 Sam. 8:7; Luke 10:16; Rom. 13:2]'
  - type: text
    content: 'against us but against the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '9':
  - type: text
    content: 'Then Moses '
  - type: note
    content: '[ch. 4:14-16]'
  - type: text
    content: 'said to Aaron, “Say to the whole congregation of the people of Israel, '
  - type: note
    content: Num. 16:16
  - type: text
    content: '‘Come near before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has heard your grumbling.’” '
