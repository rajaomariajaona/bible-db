document_id: ISA.54,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Eternal Covenant of Peace
  - type: text
    content: ' '
  - type: note
    content: Cited Gal. 4:27
  - type: text
    content: “Sing, O barren one, who did not bear;
  - type: text
    content: break forth into singing and cry aloud,
  - type: text
    content: you who have not been in labor!
  - type: text
    content: 'For the children of '
  - type: note
    content: ch. 62:4
  - type: text
    content: 'the desolate one '
  - type: note
    content: '[1 Sam. 2:5]'
  - type: text
    content: will be more
  - type: text
    content: 'than the children of her who is married,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: For the mountains may depart
  - type: text
    content: and the hills be removed,
  - type: text
    content: but my steadfast love shall not depart from you,
  - type: text
    content: 'and '
  - type: note
    content: Num. 25:12; Ezek. 34:25; 37:26; [Mal. 2:5]
  - type: text
    content: my covenant of peace shall not be removed,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', who has compassion on you.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: ch. 51:21
  - type: text
    content: “O afflicted one, storm-tossed and not comforted,
  - type: text
    content: 'behold, '
  - type: note
    content: '[ch. 60:10]'
  - type: text
    content: I will set your stones in antimony,
  - type: note
    content: '[ Rev. 21:19 ]'
  - type: text
    content: and lay your foundations with sapphires.
  - type: note
    content: Or lapis lazuli
  '12':
  - type: text
    content: I will make your pinnacles of agate,
  - type: note
    content: Or jasper, or ruby
  - type: text
    content: your gates of carbuncles,
  - type: note
    content: Or crystal
  - type: text
    content: and all your wall of precious stones.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cited John 6:45
  - type: text
    content: 'All your children '
  - type: note
    content: Jer. 31:33, 34
  - type: text
    content: 'shall be taught by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: '[ch. 9:7; Ps. 119:165 ]'
  - type: text
    content: and great shall be the peace of your children.
  '14':
  - type: text
    content: In righteousness you shall be established;
  - type: text
    content: you shall be far from oppression, for you shall not fear;
  - type: text
    content: and from terror, for it shall not come near you.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 8:9, 10 ]'
  - type: text
    content: If anyone stirs up strife,
  - type: text
    content: it is not from me;
  - type: text
    content: whoever stirs up strife with you
  - type: text
    content: shall fall because of you.
  '16':
  - type: text
    content: Behold, I have created the smith
  - type: text
    content: who blows the fire of coals
  - type: text
    content: and produces a weapon for its purpose.
  - type: text
    content: I have also created the ravager to destroy;
  '17':
  - type: text
    content: no weapon that is fashioned against you shall succeed,
  - type: text
    content: and you shall refute every tongue that rises against you in judgment.
  - type: text
    content: 'This is the heritage of the servants of the '
  - type: text
    content: Lord
  - type: note
    content: ch. 45:24, 25
  - type: text
    content: and their vindication
  - type: note
    content: Or righteousness
  - type: text
    content: ' from me, declares the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 49:19, 20 ]'
  - type: text
    content: “Enlarge the place of your tent,
  - type: text
    content: and let the curtains of your habitations be stretched out;
  - type: text
    content: do not hold back; lengthen your cords
  - type: text
    content: and strengthen your stakes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 11:14; Gen. 28:14 ]'
  - type: text
    content: For you will spread abroad to the right and to the left,
  - type: text
    content: and your offspring will possess the nations
  - type: text
    content: and will people the desolate cities.
  '4':
  - type: text
    content: '“Fear not, '
  - type: note
    content: ch. 45:17
  - type: text
    content: for you will not be ashamed;
  - type: text
    content: be not confounded, for you will not be disgraced;
  - type: text
    content: for you will forget the shame of your youth,
  - type: text
    content: and the reproach of your widowhood you will remember no more.
  '5':
  - type: text
    content: ' '
  - type: note
    content: ch. 62:4, 5; [ Hos. 2:7 ]
  - type: text
    content: For your Maker is your husband,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of hosts is his name;'
  - type: note
    content: See ch. 43:14
  - type: text
    content: and the Holy One of Israel is your Redeemer,
  - type: note
    content: Zech. 14:9
  - type: text
    content: the God of the whole earth he is called.
  '6':
  - type: text
    content: ' '
  - type: note
    content: ver. 1 ; [ch. 49:14; 60:15; 62:4]
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has called you'
  - type: text
    content: like a wife deserted and grieved in spirit,
  - type: text
    content: like a wife of youth when she is cast off,
  - type: text
    content: says your God.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '[ch. 26:20 ]'
  - type: text
    content: For a brief moment I deserted you,
  - type: text
    content: but with great compassion I will gather you.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '[See ver. 7 above]'
  - type: text
    content: In overflowing anger for a moment
  - type: text
    content: I hid my face from you,
  - type: note
    content: ch. 55:3
  - type: text
    content: but with everlasting love I will have compassion on you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', your Redeemer.'
  '9':
  - type: text
    content: '“This is like '
  - type: note
    content: Gen. 8:21; 9:11
  - type: text
    content: the days of Noah
  - type: note
    content: Some manuscripts For this is as the waters of Noah
  - type: text
    content: ' to me:'
  - type: text
    content: as I swore that the waters of Noah
  - type: text
    content: should no more go over the earth,
  - type: text
    content: so I have sworn that I will not be angry with you,
  - type: text
    content: and will not rebuke you.
