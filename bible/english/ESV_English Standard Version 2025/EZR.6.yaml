document_id: EZR.6,59
type_code: eng
verses:
  '1':
  - type: heading
    content: The Decree of Darius
  - type: text
    content: 'Then Darius the king made a decree, and '
  - type: note
    content: ch. 5:17
  - type: text
    content: 'search was made in Babylonia, in the house of the archives where the documents were stored. '
  '10':
  - type: text
    content: 'that they may offer pleasing sacrifices to the God of heaven '
  - type: note
    content: Jer. 29:7; [1 Tim. 2:2]
  - type: text
    content: 'and pray for the life of the king and his sons. '
  '11':
  - type: text
    content: 'Also I make a decree that if anyone alters this edict, a beam shall be pulled out of his house, and he shall be impaled on it, and '
  - type: note
    content: Dan. 2:5; 3:29
  - type: text
    content: 'his house shall be made a dunghill. '
  '12':
  - type: text
    content: 'May the God '
  - type: note
    content: 1 Kgs. 9:3
  - type: text
    content: who has caused his name to dwell there overthrow any king or people who shall put out a hand to alter this, or to destroy this house of God that is in Jerusalem. I Darius make a decree; let it be done with all diligence.”
  - type: heading
    content: The Temple Finished and Dedicated
  '13':
  - type: text
    content: 'Then, according to the word sent by Darius the king, '
  - type: note
    content: '[See ver. 6 above]'
  - type: text
    content: 'Tattenai, the governor of the province Beyond the River, Shethar-bozenai, and their associates did with all diligence what Darius the king had ordered. '
  '14':
  - type: note
    content: ch. 5:1, 2
  - type: text
    content: 'And the elders of the Jews built and prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. They finished their building by decree of the God of Israel and '
  - type: note
    content: ver. 3; ch. 1:1; 5:13
  - type: text
    content: 'by decree of Cyrus and '
  - type: note
    content: ver. 12; [ch. 4:24]
  - type: text
    content: 'Darius and '
  - type: note
    content: ch. 7:1
  - type: text
    content: 'Artaxerxes king of Persia; '
  '15':
  - type: text
    content: 'and this house was finished on the third day of the '
  - type: note
    content: Esth. 3:7
  - type: text
    content: month of Adar, in the sixth year of the reign of Darius the king.
  '16':
  - type: text
    content: 'And the people of Israel, the priests and the Levites, and the rest of the returned exiles, celebrated the '
  - type: note
    content: 1 Kgs. 8:63; 2 Chr. 7:5
  - type: text
    content: 'dedication of this house of God with joy. '
  '17':
  - type: text
    content: 'They offered at the dedication of this house of God 100 bulls, 200 rams, 400 lambs, and as a sin offering for all Israel '
  - type: note
    content: '[ch. 8:35]'
  - type: text
    content: '12 male goats, according to the number of the tribes of Israel. '
  '18':
  - type: text
    content: 'And they set the priests '
  - type: note
    content: 1 Chr. 24:1; 2 Chr. 35:5
  - type: text
    content: 'in their divisions and the Levites '
  - type: note
    content: 1 Chr. 23:6
  - type: text
    content: 'in their divisions, for the service of God at Jerusalem, '
  - type: note
    content: Num. 3:6; 8:9
  - type: text
    content: as it is written in the Book of Moses.
  - type: heading
    content: Passover Celebrated
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ex. 12:6
  - type: text
    content: 'On the fourteenth day of the first month, the returned exiles kept the Passover. '
  '2':
  - type: text
    content: 'And in Ecbatana, the citadel that is '
  - type: note
    content: '[2 Kgs. 17:6]'
  - type: text
    content: 'in the province of Media, a scroll was found on which this was written: “A record. '
  '20':
  - type: note
    content: 2 Chr. 30:15
  - type: text
    content: 'For the priests and the Levites had purified themselves together; all of them were clean. '
  - type: note
    content: 2 Chr. 35:11
  - type: text
    content: 'So they slaughtered the Passover lamb for all the returned exiles, for their fellow priests, and for themselves. '
  '21':
  - type: text
    content: 'It was eaten by the people of Israel who had returned from exile, and '
  - type: note
    content: Neh. 9:2; 10:28; [ch. 9:1]
  - type: text
    content: 'also by every one who had joined them and separated himself '
  - type: note
    content: ch. 9:11
  - type: text
    content: 'from the uncleanness of the peoples of the land to worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '22':
  - type: text
    content: 'And they kept the Feast of Unleavened Bread '
  - type: note
    content: Ex. 12:15; 13:6; 2 Chr. 30:21; 35:17
  - type: text
    content: 'seven days with joy, for the '
  - type: text
    content: Lord
  - type: text
    content: ' had made them joyful '
  - type: note
    content: ch. 7:27; [Prov. 21:1]
  - type: text
    content: 'and had turned the heart of '
  - type: note
    content: '[Neh. 13:6]'
  - type: text
    content: the king of Assyria to them, so that he aided them in the work of the house of God, the God of Israel.
  '3':
  - type: text
    content: 'In the first year of Cyrus the king, Cyrus the king issued a decree: Concerning the house of God at Jerusalem, let the house be rebuilt, the place where sacrifices were offered, and let its foundations be retained. Its height shall be sixty cubits'
  - type: note
    content: A cubit was about 18 inches or 45 centimeters
  - type: text
    content: ' and its breadth sixty cubits, '
  '4':
  - type: note
    content: 1 Kgs. 6:36
  - type: text
    content: 'with three layers of great stones and one layer of timber. Let the cost be paid from the royal treasury. '
  '5':
  - type: text
    content: 'And also '
  - type: note
    content: ch. 1:7, 8; 5:14
  - type: text
    content: let the gold and silver vessels of the house of God, which Nebuchadnezzar took out of the temple that is in Jerusalem and brought to Babylon, be restored and brought back to the temple that is in Jerusalem, each to its place. You shall put them in the house of God.”
  '6':
  - type: text
    content: '“Now therefore, '
  - type: note
    content: ch. 5:3, 6
  - type: text
    content: 'Tattenai, governor of the province Beyond the River, Shethar-bozenai, '
  - type: note
    content: ch. 5:6
  - type: text
    content: and your
  - type: note
    content: Aramaic their
  - type: text
    content: ' associates the governors who are in the province Beyond the River, keep away. '
  '7':
  - type: text
    content: 'Let the work on this house of God alone. Let the governor of the Jews and the elders of the Jews rebuild this house of God on its site. '
  '8':
  - type: text
    content: 'Moreover, '
  - type: note
    content: ch. 7:13, 21
  - type: text
    content: 'I make a decree regarding what you shall do for these elders of the Jews for the rebuilding of this house of God. The cost is to be paid to these men in full and without delay from the royal revenue, the tribute of the province from Beyond the River. '
  '9':
  - type: text
    content: 'And whatever is needed—bulls, rams, or sheep for burnt offerings to the God of heaven, wheat, salt, wine, or oil, as the priests at Jerusalem require—let that be given to them day by day without fail, '
