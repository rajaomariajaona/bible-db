document_id: EZR.6,59
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Decree of Darius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Darius the king made a decree, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:17
      marker-yv: yv-n
    - type: text
      text: 'search was made in Babylonia, in the house of the archives where the documents were stored. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that they may offer pleasing sacrifices to the God of heaven '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 29:7
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 2:2
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and pray for the life of the king and his sons. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also I make a decree that if anyone alters this edict, a beam shall be pulled out of his house, and he shall be impaled on it, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 2:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:29
      marker-yv: yv-n
    - type: text
      text: 'his house shall be made a dunghill. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the God '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 9:3
      marker-yv: yv-n
    - type: text
      text: who has caused his name to dwell there overthrow any king or people who shall put out a hand to alter this, or to destroy this house of God that is in Jerusalem. I Darius make a decree; let it be done with all diligence.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple Finished and Dedicated
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, according to the word sent by Darius the king, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[See ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ' '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: above]
      marker-yv: yv-n
    - type: text
      text: 'Tattenai, the governor of the province Beyond the River, Shethar-bozenai, and their associates did with all diligence what Darius the king had ordered. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      marker-yv: yv-n
    - type: text
      text: 'And the elders of the Jews built and prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. They finished their building by decree of the God of Israel and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:13
      marker-yv: yv-n
    - type: text
      text: 'by decree of Cyrus and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ver. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:24
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'Darius and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:1
      marker-yv: yv-n
    - type: text
      text: 'Artaxerxes king of Persia; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and this house was finished on the third day of the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esth. 3:7
      marker-yv: yv-n
    - type: text
      text: month of Adar, in the sixth year of the reign of Darius the king.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people of Israel, the priests and the Levites, and the rest of the returned exiles, celebrated the '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 8:63
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 7:5
      marker-yv: yv-n
    - type: text
      text: 'dedication of this house of God with joy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They offered at the dedication of this house of God 100 bulls, 200 rams, 400 lambs, and as a sin offering for all Israel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:35
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: '12 male goats, according to the number of the tribes of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they set the priests '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 24:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 35:5
      marker-yv: yv-n
    - type: text
      text: 'in their divisions and the Levites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chr. 23:6
      marker-yv: yv-n
    - type: text
      text: 'in their divisions, for the service of God at Jerusalem, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Num. 3:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:9
      marker-yv: yv-n
    - type: text
      text: as it is written in the Book of Moses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Passover Celebrated
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:6
      marker-yv: yv-n
    - type: text
      text: 'On the fourteenth day of the first month, the returned exiles kept the Passover. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in Ecbatana, the citadel that is '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Kgs. 17:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'in the province of Media, a scroll was found on which this was written: “A record. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 30:15
      marker-yv: yv-n
    - type: text
      text: 'For the priests and the Levites had purified themselves together; all of them were clean. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 35:11
      marker-yv: yv-n
    - type: text
      text: 'So they slaughtered the Passover lamb for all the returned exiles, for their fellow priests, and for themselves. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was eaten by the people of Israel who had returned from exile, and '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 9:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:28
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '[ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'also by every one who had joined them and separated himself '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:11
      marker-yv: yv-n
    - type: text
      text: 'from the uncleanness of the peoples of the land to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they kept the Feast of Unleavened Bread '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex. 12:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Chr. 30:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:17
      marker-yv: yv-n
    - type: text
      text: 'seven days with joy, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had made them joyful '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:27
      - type: text
        text: '; '
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 21:1
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: 'and had turned the heart of '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: '['
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Neh. 13:6
      - type: usfm
        marker: xta
        children:
        - type: text
          text: ']'
      marker-yv: yv-n
    - type: text
      text: the king of Assyria to them, so that he aided them in the work of the house of God, the God of Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the first year of Cyrus the king, Cyrus the king issued a decree: Concerning the house of God at Jerusalem, let the house be rebuilt, the place where sacrifices were offered, and let its foundations be retained. Its height shall be sixty cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 18 inches or 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' and its breadth sixty cubits, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Kgs. 6:36
      marker-yv: yv-n
    - type: text
      text: 'with three layers of great stones and one layer of timber. Let the cost be paid from the royal treasury. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And also '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:14
      marker-yv: yv-n
    - type: text
      text: let the gold and silver vessels of the house of God, which Nebuchadnezzar took out of the temple that is in Jerusalem and brought to Babylon, be restored and brought back to the temple that is in Jerusalem, each to its place. You shall put them in the house of God.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now therefore, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      marker-yv: yv-n
    - type: text
      text: 'Tattenai, governor of the province Beyond the River, Shethar-bozenai, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      marker-yv: yv-n
    - type: text
      text: and your
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: their
      marker-yv: yv-n
    - type: text
      text: ' associates the governors who are in the province Beyond the River, keep away. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the work on this house of God alone. Let the governor of the Jews and the elders of the Jews rebuild this house of God on its site. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: xta
        children:
        - type: text
          text: 'ch. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      marker-yv: yv-n
    - type: text
      text: 'I make a decree regarding what you shall do for these elders of the Jews for the rebuilding of this house of God. The cost is to be paid to these men in full and without delay from the royal revenue, the tribute of the province from Beyond the River. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whatever is needed—bulls, rams, or sheep for burnt offerings to the God of heaven, wheat, salt, wine, or oil, as the priests at Jerusalem require—let that be given to them day by day without fail, '
