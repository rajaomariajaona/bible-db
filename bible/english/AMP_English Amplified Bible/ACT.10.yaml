document_id: ACT.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cornelius’ Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 8:40.
    marker-yv: yv-n
  - type: text
    text: 'Caesarea [Maritima] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there was
  - type: text
    text: ' a man named Cornelius, a centurion of what was known as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A regiment consisted of about six hundred men, the tenth part of a legion.
    marker-yv: yv-n
  - type: text
    text: 'Italian Regiment, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'a devout man and one who, along with all his household, feared God. He made many charitable donations to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jewish
  - type: text
    text: ' people, and prayed to God always. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'About the ninth hour (3:00 p.m.) of the day he clearly saw in a vision an angel of God who had come to him and said, “Cornelius!” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cornelius was frightened and stared intently at him and said, “What is it, lord (sir)?” And the angel said to him, “Your prayers and gifts of charity have ascended as a memorial offering before God [an offering made in remembrance of His past blessings]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now send men to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: About twenty-four miles south of Caesarea.
    marker-yv: yv-n
  - type: text
    text: 'Joppa and have them call for a man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: named
  - type: text
    text: ' Simon, who is also called Peter [and invite him here]; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'he is staying with Simon the tanner, whose house is by the sea.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the angel who was speaking to him had gone, Cornelius called two of his servants and a devout soldier from among his own personal attendants; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and after explaining everything to them, he sent them to Joppa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The next day, as they were on their way and were approaching the city, Peter went up on '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The flat roof of a house of this era was accessed by an outside stairway.
    marker-yv: yv-n
  - type: text
    text: 'the roof of the house about the sixth hour (noon) to pray, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but he became hungry and wanted something to eat. While '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: they were preparing
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the meal was being prepared he fell into a trance; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and he saw the sky opened up, and an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: vessel
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'object like a great sheet descending, lowered by its four corners to the earth, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and it contained all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kinds of
  - type: text
    text: ' four-footed animals and crawling creatures of the earth and birds of the air. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A voice came to him, “Get up, Peter, kill and eat!” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Peter said, “Not at all, Lord, for I have never eaten anything that is common (unholy) and [ceremonially] unclean.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the voice came to him a second time, “What God has cleansed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pronounced clean, no longer consider common (unholy).” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: This happened three times, and then immediately the object was taken up into heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now Peter was still perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completely at a loss as to what his vision could mean when the men who had been sent by Cornelius, having asked directions to Simon’s house, arrived at the gate. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they called out to ask whether Simon, who was also called Peter, was staying there. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'While Peter was thoughtfully considering the vision, the Spirit said to him, “Now listen, three men are looking for you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Get up, go downstairs and go with them without hesitating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' doubting, because I have sent them Myself.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Peter went down to the men and said, “I am the one you are looking for. For what reason have you come?” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They said, “Cornelius, a centurion, an upright and God-fearing man well spoken of by all the Jewish people, was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divinely
  - type: text
    text: ' instructed by a holy angel to send for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to come
  - type: text
    text: ' to his house and hear what you have to say.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Peter '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was extremely unusual for a Jew to invite a Gentile into the house, much less offer lodging.
    marker-yv: yv-n
  - type: text
    text: invited them in and gave them lodging [for the night].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peter at Caesarea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'he next day Peter got up and left with them, and some of the brothers from Joppa went with him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On the following day he [and the others] entered Caesarea. Cornelius was waiting for them, and had called together his relatives and close friends. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When Peter arrived, Cornelius met him, and fell down at his feet and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prostrated himself in reverence
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'worshiped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Peter raised him up, saying, “Stand up; I too am only a man.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'As Peter talked with him, he entered [the house] and found a large group of people assembled. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He said to them, “You know that it is unlawful for a Jewish man to associate with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' befriend a Gentile, or to visit him; and yet God has shown me that I am not to call anyone common or [ceremonially] unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Therefore when I was sent for, I came without raising an objection. So I ask for what reason have you sent for me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cornelius said, “Four days ago to this hour, I was praying in my house during the ninth hour (3:00-4:00 p.m.); and a man [dressed] in bright, dazzling clothing suddenly stood before me, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and he said, ‘Cornelius, your prayer has been heard, and your acts of charity have been remembered before God [so that He is about to help you]. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Therefore send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Joppa and invite Simon, who is also called Peter, to come to you. He is staying at the house of Simon the tanner by the sea.’ '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So I sent for you at once, and you have been kind enough to come. Now then, we are all here present before God to listen to everything that you have been instructed by the Lord [to say].”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Gentiles Hear Good News
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Opening his mouth, Peter said:'
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: M
  - type: text
    text: 'ost certainly I understand now that God is not one to show partiality [to people as though Gentiles were excluded from God’s blessing], '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'but in every nation the person who fears God and does what is right [by seeking Him] is acceptable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' welcomed by Him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'You know the message which He sent to the sons of Israel, announcing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the gospel of peace
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the good news of peace through Jesus Christ, who is Lord of all— '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'you know the things that have taken place throughout Judea, starting in Galilee after the baptism preached by John— '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'how God anointed Jesus of Nazareth with the Holy Spirit and with great power; and He went around doing good and healing all who were oppressed by the devil, because God was with Him. [Is 61:1-3; Luke 4:18-21] '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'We are [personally] eyewitnesses of everything that He did both in the land of the Jews and in Jerusalem [in particular]. They also put Him to death by hanging Him on a cross; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'God raised Him [to life] on the third day and caused Him to be plainly seen, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'not to all the people, but to witnesses who were chosen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' designated beforehand by God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' to us who ate and drank together with Him after He rose from the dead. [Luke 24:42, 43; John 21:12-15] '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'He commanded us to preach to the people [both Jew and Gentile], and to solemnly testify that He is the One who has been appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordained by God as Judge of the living and the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: All the prophets testify about Him, that through His name everyone who believes in Him [whoever trusts in and relies on Him, accepting Him as Savior and Messiah] receives forgiveness of sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'While Peter was still speaking these words, the Holy Spirit fell on all those who were listening to the message [confirming God’s acceptance of Gentiles]. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'All the circumcised believers who came with Peter were amazed, because the gift of the Holy Spirit had been poured out even on the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'For they heard them talking in [unknown] tongues (languages) and exalting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising God. Then Peter said, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '“Can anyone refuse water for these people to be baptized, since they have received the Holy Spirit just as we did?” '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: And he ordered that they be baptized in the name of Jesus Christ. Then they asked him to stay there for a few days.
