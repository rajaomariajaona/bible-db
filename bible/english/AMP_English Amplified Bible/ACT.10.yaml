  '26':
  - type: text
    content: 'But Peter raised him up, saying, “Stand up; I too am only a man.” '
  '27':
  - type: text
    content: 'As Peter talked with him, he entered [the house] and found a large group of people assembled. '
  '28':
  - type: text
    content: 'He said to them, “You know that it is unlawful for a Jewish man to associate with '
  - type: text
    content: or
  - type: text
