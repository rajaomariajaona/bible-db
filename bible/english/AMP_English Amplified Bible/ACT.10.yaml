  - type: text
    content: and
  - type: text
    content: ' welcomed by Him. '
  '36':
  - type: text
    content: 'You know the message which He sent to the sons of Israel, announcing '
  - type: note
    content: Or the gospel of peace.
  - type: text
    content: 'the good news of peace through Jesus Christ, who is Lord of all— '
  '37':
  - type: text
    content: 'you know the things that have taken place throughout Judea, starting in Galilee after the baptism preached by John— '
  '38':
  - type: text
    content: 'how God anointed Jesus of Nazareth with the Holy Spirit and with great power; and He went around doing good and healing all who were oppressed by the devil, because God was with Him. [Is 61:1-3; Luke 4:18-21] '
  '39':
  - type: text
    content: 'We are [personally] eyewitnesses of everything that He did both in the land of the Jews and in Jerusalem [in particular]. They also put Him to death by hanging Him on a cross; '
  '4':
  - type: text
    content: 'Cornelius was frightened and stared intently at him and said, “What is it, lord (sir)?” And the angel said to him, “Your prayers and gifts of charity have ascended as a memorial offering before God [an offering made in remembrance of His past blessings]. '
  '40':
  - type: text
    content: 'God raised Him [to life] on the third day and caused Him to be plainly seen, '
  '41':
  - type: text
    content: 'not to all the people, but to witnesses who were chosen '
  - type: text
    content: and
  - type: text
    content: ' designated beforehand by God, '
  - type: text
    content: that is,
  - type: text
    content: ' to us who ate and drank together with Him after He rose from the dead. [Luke 24:42, 43; John 21:12-15] '
  '42':
  - type: text
    content: 'He commanded us to preach to the people [both Jew and Gentile], and to solemnly testify that He is the One who has been appointed '
  - type: text
    content: and
  - type: text
    content: ' ordained by God as Judge of the living and the dead. '
  '43':
  - type: text
    content: All the prophets testify about Him, that through His name everyone who believes in Him [whoever trusts in and relies on Him, accepting Him as Savior and Messiah] receives forgiveness of sins.”
  '44':
  - type: text
    content: 'While Peter was still speaking these words, the Holy Spirit fell on all those who were listening to the message [confirming God’s acceptance of Gentiles]. '
  '45':
  - type: text
    content: 'All the circumcised believers who came with Peter were amazed, because the gift of the Holy Spirit had been poured out even on the Gentiles. '
  '46':
  - type: text
    content: 'For they heard them talking in [unknown] tongues (languages) and exalting '
  - type: text
    content: and
  - type: text
    content: ' magnifying '
  - type: text
    content: and
  - type: text
    content: ' praising God. Then Peter said, '
  '47':
  - type: text
    content: '“Can anyone refuse water for these people to be baptized, since they have received the Holy Spirit just as we did?” '
  '48':
  - type: text
    content: And he ordered that they be baptized in the name of Jesus Christ. Then they asked him to stay there for a few days.
  '5':
  - type: text
