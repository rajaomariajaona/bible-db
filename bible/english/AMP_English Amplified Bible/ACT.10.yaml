  '29':
  - type: text
    content: Therefore when I was sent for, I came without raising an objection. So I ask for what reason have you sent for me?”
  '3':
  - type: text
    content: 'About the ninth hour (3:00 p.m.) of the day he clearly saw in a vision an angel of God who had come to him and said, “Cornelius!” '
  '30':
  - type: text
    content: 'Cornelius said, “Four days ago to this hour, I was praying in my house during the ninth hour (3:00-4:00 p.m.); and a man [dressed] in bright, dazzling clothing suddenly stood before me, '
  '31':
  - type: text
    content: 'and he said, ‘Cornelius, your prayer has been heard, and your acts of charity have been remembered before God [so that He is about to help you]. '
  '32':
  - type: text
    content: 'Therefore send '
  - type: text
    content: word
  - type: text
    content: ' to Joppa and invite Simon, who is also called Peter, to come to you. He is staying at the house of Simon the tanner by the sea.’ '
  '33':
  - type: text
    content: So I sent for you at once, and you have been kind enough to come. Now then, we are all here present before God to listen to everything that you have been instructed by the Lord [to say].”
  - type: heading
    content: Gentiles Hear Good News
  '34':
  - type: text
    content: 'Opening his mouth, Peter said:'
  - type: text
