          text: Here the Greek word refers to the large Roman soldiers’ shield designed to protect the entire body. It had an iron frame and was covered in several layers of leather. When soaked in water before a battle the shield could put out the fiery missiles thrown at them by the enemy.
      marker-yv: yv-n
