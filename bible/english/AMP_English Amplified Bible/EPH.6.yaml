    content: Fathers, do not provoke your children to anger [do not exasperate them to the point of resentment with demands that are trivial or unreasonable or humiliating or abusive; nor by showing favoritism or indifference to any of them], but bring them up [tenderly, with lovingkindness] in the discipline and instruction of the Lord.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Slavery was common in New Testament times (as well as in ancient Israel). One might become a slave through conquest, the commission of a crime, or destitution. Slaves were required to do their masters’ bidding and work without compensation (cf Luke 17:7-10). Elsewhere Paul advises slaves not to dwell on their circumstances, and to earn their freedom if they can (1 Cor 7:21). The admonitions here accurately reflect the slave/master relationship in the Roman Empire; since they were not compensated, slaves sometimes did only what they had to do to avoid punishment, and masters could be cruel disciplinarians.
  - type: text
    content: 'Slaves, be obedient to those who are your earthly masters, with respect for authority, and with a sincere heart [seeking to please them], as [service] to Christ— '
  '6':
