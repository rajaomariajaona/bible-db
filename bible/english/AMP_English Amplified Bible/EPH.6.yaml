        - type: text
          text: ' a phrase often found in the Bible, is an urgent call to get ready for immediate action or a coming event. The phrase is related to the type of clothing worn in ancient times. Before any vigorous activity the loose ends of clothing (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the wide band worn around the midsection of the body. The band (usually about six inches wide) also served as a kind of pocket or pouch to carry personal items such as a dagger, money or other necessary things. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Gird up your mind
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: gird up your heart
        - type: text
          text: ' are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.'
      marker-yv: yv-n
