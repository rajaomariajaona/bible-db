document_id: PSA.29,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 29
  - type: heading
    content: The Voice of the Lord in the Storm.
  - type: text
    content: A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: This psalm has been called “The Song of the Thunderstorm,” a glorious psalm of praise sung during an earthshaking tempest which reminds the psalmist of the time of Noah and the deluge (see v 10).
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ', O '
  - type: note
    content: The ancient rabbis interpreted this as referring to the patriarchs. Today many scholars regard this as a reference to God’s angels.
  - type: text
    content: sons of the mighty,
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' glory and strength.'
  '10':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' sat '
  - type: text
    content: as King
  - type: text
    content: ' at the flood;'
  - type: text
    content: Yes, the L
  - type: heading
    content: ord
  - type: text
    content: ' sits as King forever.'
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will give [unyielding and impenetrable] strength to His people;'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will bless His people with peace.'
  '2':
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' the glory due His name;'
  - type: text
    content: Worship the L
  - type: heading
    content: ord
  - type: text
    content: ' in the beauty '
  - type: text
    content: and
  - type: text
    content: ' majesty of His holiness [as the creator and source of holiness].'
  '3':
  - type: text
    content: ¶The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' is upon the waters;'
  - type: text
    content: The God of glory thunders;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is over many waters.'
  '4':
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' is powerful;'
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' is full of majesty.'
  '5':
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' breaks the cedars;'
  - type: text
    content: Yes, the L
  - type: heading
    content: ord
  - type: text
    content: ' breaks in pieces the cedars of Lebanon.'
  '6':
  - type: text
    content: He makes Lebanon skip like a calf,
  - type: text
    content: And Sirion (Mount Hermon) like a young, wild ox.
  '7':
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' rakes flames of fire (lightning).'
  '8':
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' shakes the wilderness;'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' shakes the wilderness of Kadesh.'
  '9':
  - type: text
    content: The voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Or makes the oaks shake.
  - type: text
    content: 'makes the doe labor '
  - type: text
    content: and
  - type: text
    content: ' give birth'
  - type: text
    content: And strips the forests bare;
  - type: text
    content: And in His temple all are saying, “Glory!”
