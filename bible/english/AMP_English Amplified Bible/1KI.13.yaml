document_id: 1KI.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeroboam Warned, Stricken
  - type: text
    content: Now behold, there came a man of God from Judah to Bethel by the word (command) of the L
  - type: heading
    content: ord
  - type: text
    content: ', while Jeroboam was standing by the altar [which he had built] to burn incense. '
  '10':
  - type: text
    content: So he went another way and did not return by the way that he came to Bethel.
  - type: heading
    content: The Disobedient Prophet
  '11':
  - type: text
    content: 'Now there was an old prophet living in Bethel; and his sons came and told him everything that the man of God had done that day in Bethel; they also told their father the words which he had spoken to the king. '
  '12':
  - type: text
    content: 'Their father asked them, “Which way did he go?” For his sons had seen which way the man of God who came from Judah had gone. '
  '13':
  - type: text
    content: 'He said to his sons, “Saddle the donkey for me.” So they saddled the donkey for him and he rode away on it, '
  '14':
  - type: text
    content: 'and he went after the man of God. And he found him sitting under an oak (terebinth) tree, and he said to him, “Are you the man of God who came from Judah?” And he said, “I am.” '
  '15':
  - type: text
    content: 'Then he said to him, “Come home with me and eat bread.” '
  '16':
  - type: text
    content: 'He said, “I cannot return with you nor go in with you, nor will I eat bread or drink water with you in this place. '
  '17':
  - type: text
    content: For I was told by the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘You shall not eat bread nor drink water there, nor shall you return by going the way that you came.’ ” '
  '18':
  - type: text
    content: He answered him, “I too am a prophet, as you are; and an angel spoke to me by the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, ‘Bring him back with you to your house, so that he may eat bread and drink water.’ ” '
  - type: text
    content: But
  - type: text
    content: ' he lied to him. '
  '19':
  - type: text
    content: So the man of God went back with him, and ate bread in his house and drank water.
  '2':
  - type: text
    content: The man cried out against the [idolatrous] altar by the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', “O altar, altar, thus says the Lord: ‘Behold, a son shall be born to the house of David, '
  - type: note
    content: Josiah became king about three hundred years later (2 Kin 23:15-20).
  - type: text
    content: 'Josiah by name; and on you shall he sacrifice [the bodies of] the priests of the high places who burn incense on you, and human bones shall be burned on you.’ ” '
  '20':
  - type: text
    content: Now it happened as they were sitting at the table, that the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to the prophet who had brought him back. '
  '21':
  - type: text
    content: And he cried out to the man of God who had come from Judah, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Because you have disobeyed the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and have not kept the commandment which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God commanded you, '
  '22':
  - type: text
    content: but have come back and have eaten bread and drunk water in the place of which the L
  - type: heading
    content: ord
  - type: text
    content: ' said to you, “You shall not eat bread nor drink water”; your body shall not come to the tomb of your fathers (ancestors).’ ” '
  '23':
  - type: text
    content: 'After the prophet of the house had eaten bread and after he had drunk, he saddled the donkey for the prophet whom he had brought back. '
  '24':
  - type: text
    content: 'Now when he had gone, a lion met him by the road and killed him, and his body was thrown in the road, with the donkey standing beside it; the lion was also standing beside the body. '
  '25':
  - type: text
    content: And there were men passing by, and they saw the body thrown in the road, and the lion standing beside the body. So they came and told about it in the city [of Bethel] where the old prophet lived.
  '26':
  - type: text
    content: When the prophet who had brought him back from the road heard about it, he said, “It is the man of God who was disobedient to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ; therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' has given him to the lion, which has torn him and killed him, in accordance with the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' which He spoke to him.” '
  '27':
  - type: text
    content: 'And he said to his sons, “Saddle the donkey for me.” And they saddled it. '
  '28':
  - type: text
    content: 'And he went and found the body thrown on the road, and the donkey and the lion standing beside the body; the lion [miraculously] had not eaten the body or attacked the donkey. '
  '29':
  - type: text
    content: 'Then the prophet picked up the body of the man of God and laid it on the donkey and brought it back, and he came into the city (Bethel) of the old prophet to mourn and to bury him. '
  '3':
  - type: text
    content: And he gave a sign the same day, saying, “This is the sign which the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken: ‘Behold, the altar shall be split apart and the ashes that are on it shall be poured out.’ ” [2 Kin 23:15, 16] '
  '30':
  - type: text
    content: 'And he laid the body in his own grave, and they mourned over him, saying, “Alas, my brother!” '
  '31':
  - type: text
    content: 'Then after he had buried him, he said to his sons, “When I am dead, bury me in the grave in which the man of God is buried; lay my bones beside his bones. '
  '32':
  - type: text
    content: For the words which he cried out by the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' against the altar in Bethel and against all the houses of the high places which are in the cities of Samaria shall certainly come to pass.”'
  '33':
  - type: text
    content: 'After this event, Jeroboam [still] did not turn from his evil way, but again made priests for the high places from among all the people. He ordained anyone who was willing, so that there would be priests for the high places. '
  '34':
  - type: text
    content: And this thing (idol worship) became the sin of the house of Jeroboam to blot it out and eliminate it from the face of the earth.
  '4':
  - type: text
    content: 'When the king heard the words which the man of God cried out against the altar in Bethel, Jeroboam put out his hand from the altar, saying, “Seize him!” And his hand which he had put out against him withered, so that he was unable to pull it back to himself. '
  '5':
  - type: text
    content: The altar also was split apart and the ashes were poured out from the altar in accordance with the sign which the man of God had given by the word of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: The king answered and said to the man of God, “Please entreat [the favor of] the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and pray for me, that my hand may be restored to me.” So the man of God entreated the L'
  - type: heading
    content: ord
  - type: text
    content: ', and the king’s hand was restored to him and became as it was before. '
  '7':
  - type: text
    content: 'And the king said to the man of God, “Come home with me and refresh yourself, and I will give you a reward.” '
  '8':
  - type: text
    content: But the man of God said to the king, “
  - type: text
    content: Even
  - type: text
    content: ' if you were to give me half your house (wealth), I would not go with you, nor would I eat bread or drink water in this place. '
  '9':
  - type: text
    content: For I was commanded by the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘You shall not eat bread or drink water, nor shall you return by the way you came.’ ” '
