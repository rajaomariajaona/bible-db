document_id: 1KI.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeroboam Warned, Stricken
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now behold, there came a man of God from Judah to Bethel by the word (command) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', while Jeroboam was standing by the altar [which he had built] to burn incense. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So he went another way and did not return by the way that he came to Bethel.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Disobedient Prophet
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now there was an old prophet living in Bethel; and his sons came and told him everything that the man of God had done that day in Bethel; they also told their father the words which he had spoken to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Their father asked them, “Which way did he go?” For his sons had seen which way the man of God who came from Judah had gone. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He said to his sons, “Saddle the donkey for me.” So they saddled the donkey for him and he rode away on it, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and he went after the man of God. And he found him sitting under an oak (terebinth) tree, and he said to him, “Are you the man of God who came from Judah?” And he said, “I am.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then he said to him, “Come home with me and eat bread.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He said, “I cannot return with you nor go in with you, nor will I eat bread or drink water with you in this place. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For I was told by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘You shall not eat bread nor drink water there, nor shall you return by going the way that you came.’ ” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He answered him, “I too am a prophet, as you are; and an angel spoke to me by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, ‘Bring him back with you to your house, so that he may eat bread and drink water.’ ” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' he lied to him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So the man of God went back with him, and ate bread in his house and drank water.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The man cried out against the [idolatrous] altar by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “O altar, altar, thus says the Lord: ‘Behold, a son shall be born to the house of David, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Josiah became king about three hundred years later (2 Kin 23:15-20).
      marker-yv: yv-n
    - type: text
      text: 'Josiah by name; and on you shall he sacrifice [the bodies of] the priests of the high places who burn incense on you, and human bones shall be burned on you.’ ” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Now it happened as they were sitting at the table, that the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to the prophet who had brought him back. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And he cried out to the man of God who had come from Judah, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘Because you have disobeyed the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and have not kept the commandment which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God commanded you, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: but have come back and have eaten bread and drunk water in the place of which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to you, “You shall not eat bread nor drink water”; your body shall not come to the tomb of your fathers (ancestors).’ ” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'After the prophet of the house had eaten bread and after he had drunk, he saddled the donkey for the prophet whom he had brought back. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now when he had gone, a lion met him by the road and killed him, and his body was thrown in the road, with the donkey standing beside it; the lion was also standing beside the body. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And there were men passing by, and they saw the body thrown in the road, and the lion standing beside the body. So they came and told about it in the city [of Bethel] where the old prophet lived.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: When the prophet who had brought him back from the road heard about it, he said, “It is the man of God who was disobedient to the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given him to the lion, which has torn him and killed him, in accordance with the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He spoke to him.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And he said to his sons, “Saddle the donkey for me.” And they saddled it. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And he went and found the body thrown on the road, and the donkey and the lion standing beside the body; the lion [miraculously] had not eaten the body or attacked the donkey. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then the prophet picked up the body of the man of God and laid it on the donkey and brought it back, and he came into the city (Bethel) of the old prophet to mourn and to bury him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And he gave a sign the same day, saying, “This is the sign which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken: ‘Behold, the altar shall be split apart and the ashes that are on it shall be poured out.’ ” [2 Kin 23:15, 16] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And he laid the body in his own grave, and they mourned over him, saying, “Alas, my brother!” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then after he had buried him, he said to his sons, “When I am dead, bury me in the grave in which the man of God is buried; lay my bones beside his bones. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: For the words which he cried out by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' against the altar in Bethel and against all the houses of the high places which are in the cities of Samaria shall certainly come to pass.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'After this event, Jeroboam [still] did not turn from his evil way, but again made priests for the high places from among all the people. He ordained anyone who was willing, so that there would be priests for the high places. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And this thing (idol worship) became the sin of the house of Jeroboam to blot it out and eliminate it from the face of the earth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When the king heard the words which the man of God cried out against the altar in Bethel, Jeroboam put out his hand from the altar, saying, “Seize him!” And his hand which he had put out against him withered, so that he was unable to pull it back to himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The altar also was split apart and the ashes were poured out from the altar in accordance with the sign which the man of God had given by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The king answered and said to the man of God, “Please entreat [the favor of] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God and pray for me, that my hand may be restored to me.” So the man of God entreated the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the king’s hand was restored to him and became as it was before. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the king said to the man of God, “Come home with me and refresh yourself, and I will give you a reward.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But the man of God said to the king, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' if you were to give me half your house (wealth), I would not go with you, nor would I eat bread or drink water in this place. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For I was commanded by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘You shall not eat bread or drink water, nor shall you return by the way you came.’ ” '
