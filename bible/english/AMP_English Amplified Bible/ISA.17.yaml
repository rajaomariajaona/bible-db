document_id: ISA.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecy about Damascus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The [mournful, inspired] oracle (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an urgent message the prophet is under compulsion to proclaim.
      marker-yv: yv-n
    - type: text
      text: a burden to be carried) concerning Damascus [capital of Aram (Syria), and Israel’s defense against Assyria].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen carefully, Damascus will cease to be a city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will become a fallen ruin.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Because you [Judah] have forgotten the God of your salvation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not remembered the Rock of your Stronghold—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore you plant '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: gardens of Adonis,
        - type: text
          text: ' a mythological god.'
      marker-yv: yv-n
    - type: text
      text: lovely plants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And set the grounds with vine slips of a strange '
    - type: usfm
      marker: it
      children:
      - type: text
        text: god,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In the day that you plant it you carefully fence it in,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the morning you bring your seed to blossom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet [promising as it is] the harvest will be a heap [of ruins that passes away]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of sickness and incurable pain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶Oh, the uproar of many peoples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who roar like the roaring of the seas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the noise of nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who roar like the rumbling of mighty waters!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The nations roar on like the roaring of many waters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God will rebuke them and they will flee far away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And be chased like chaff on the mountains before the wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like whirling dust before the storm.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: At evening time, now look, sudden terror!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fulfillment of this prophecy (cf also Is 10:33, 34; 30:31; 31:8) is found in Is 37:36, following the repetition of the prophecy first recorded in 2 Kin 19:29-36. Just when an overwhelming victory by the Assyrian Sennacherib seemed inevitable, during a single night 185,000 of his army died, and Judah was spared—as the Lord through Isaiah had promised.
      marker-yv: yv-n
    - type: text
      text: morning the Assyrians are no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the portion (fate) of those who plunder us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the lot of those who pillage us.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “The cities of Aroer [east of the Jordan] are deserted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be [only a refuge] for flocks to lie down in,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there will be no one to make them afraid.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “The fortified city will disappear from Ephraim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the kingdom from Damascus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the remnant of Aram (Syria);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be like the [departed] glory of [her ally] the children of Israel,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶“Now in that day the [former] glory of Jacob [Israel—his might, his population, his prosperity] will fade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fatness of his flesh will become lean.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “And it will be like the reaper gathering the standing grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As his arm harvests the ears of grain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, it will be like one gleaning ears of grain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the [fertile] Valley of Rephaim.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Yet gleanings will be left in the land [of Israel] like the shaking of the olive tree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Two or three olives on the topmost branch,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Four or five on the [outermost] branches of the fruitful tree,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In that day man will have regard for his Maker,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his eyes will regard the Holy One of Israel [with awe-inspired reverence].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And he will not have regard for the [idolatrous] altars, the work of his hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will he look to that which his fingers have made,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither the Asherim (symbols of the goddess Asherah) nor the incense altars.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'In that day the strong cities of Aram and Israel will be like '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the deserted places of the Amorites and Hivites, which they abandoned
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: deserted places in the forest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like branches which they abandoned before the children of Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the land will be a desolation.
