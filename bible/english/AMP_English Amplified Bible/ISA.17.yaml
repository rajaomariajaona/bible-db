document_id: ISA.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy about Damascus
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: a burden to be carried) concerning Damascus [capital of Aram (Syria), and Israel’s defense against Assyria].
  - type: text
    content: “Listen carefully, Damascus will cease to be a city
  - type: text
    content: And will become a fallen ruin.
  '10':
  - type: text
    content: Because you [Judah] have forgotten the God of your salvation
  - type: text
    content: And have not remembered the Rock of your Stronghold—
  - type: text
    content: 'Therefore you plant '
  - type: note
    content: Or gardens of Adonis, a mythological god.
  - type: text
    content: lovely plants
  - type: text
    content: 'And set the grounds with vine slips of a strange '
  - type: text
    content: god,
  '11':
  - type: text
    content: In the day that you plant it you carefully fence it in,
  - type: text
    content: And in the morning you bring your seed to blossom;
  - type: text
    content: Yet [promising as it is] the harvest will be a heap [of ruins that passes away]
  - type: text
    content: In the day of sickness and incurable pain.
  '12':
  - type: text
    content: ¶Oh, the uproar of many peoples
  - type: text
    content: Who roar like the roaring of the seas,
  - type: text
    content: And the noise of nations
  - type: text
    content: Who roar like the rumbling of mighty waters!
  '13':
  - type: text
    content: The nations roar on like the roaring of many waters,
  - type: text
    content: But God will rebuke them and they will flee far away,
  - type: text
    content: And be chased like chaff on the mountains before the wind,
  - type: text
    content: Or like whirling dust before the storm.
  '14':
  - type: text
    content: At evening time, now look, sudden terror!
  - type: text
    content: 'Before '
  - type: note
    content: The fulfillment of this prophecy (cf also Is 10:33, 34; 30:31; 31:8) is found in Is 37:36, following the repetition of the prophecy first recorded in 2 Kin 19:29-36. Just when an overwhelming victory by the Assyrian Sennacherib seemed inevitable, during a single night 185,000 of his army died, and Judah was spared—as the Lord through Isaiah had promised.
  - type: text
    content: morning the Assyrians are no more.
  - type: text
    content: This is the portion (fate) of those who plunder us,
  - type: text
    content: And the lot of those who pillage us.
  '2':
  - type: text
    content: “The cities of Aroer [east of the Jordan] are deserted;
  - type: text
    content: They will be [only a refuge] for flocks to lie down in,
  - type: text
    content: And there will be no one to make them afraid.
  '3':
  - type: text
    content: “The fortified city will disappear from Ephraim,
  - type: text
    content: And the kingdom from Damascus
  - type: text
    content: And the remnant of Aram (Syria);
  - type: text
    content: They will be like the [departed] glory of [her ally] the children of Israel,”
  - type: text
    content: Declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts.'
  '4':
  - type: text
    content: ¶“Now in that day the [former] glory of Jacob [Israel—his might, his population, his prosperity] will fade,
  - type: text
    content: And the fatness of his flesh will become lean.
  '5':
  - type: text
    content: “And it will be like the reaper gathering the standing grain,
  - type: text
    content: As his arm harvests the ears of grain;
  - type: text
    content: Yes, it will be like one gleaning ears of grain
  - type: text
    content: In the [fertile] Valley of Rephaim.
  '6':
  - type: text
    content: “Yet gleanings will be left in the land [of Israel] like the shaking of the olive tree,
  - type: text
    content: Two or three olives on the topmost branch,
  - type: text
    content: Four or five on the [outermost] branches of the fruitful tree,”
  - type: text
    content: Declares the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel.'
  '7':
  - type: text
    content: In that day man will have regard for his Maker,
  - type: text
    content: And his eyes will regard the Holy One of Israel [with awe-inspired reverence].
  '8':
  - type: text
    content: And he will not have regard for the [idolatrous] altars, the work of his hands,
  - type: text
    content: Nor will he look to that which his fingers have made,
  - type: text
    content: Neither the Asherim (symbols of the goddess Asherah) nor the incense altars.
  '9':
  - type: text
    content: 'In that day the strong cities of Aram and Israel will be like '
  - type: note
    content: Greek reads, the deserted places of the Amorites and Hivites, which they abandoned.
  - type: text
    content: deserted places in the forest,
  - type: text
    content: Or like branches which they abandoned before the children of Israel;
  - type: text
    content: And the land will be a desolation.
