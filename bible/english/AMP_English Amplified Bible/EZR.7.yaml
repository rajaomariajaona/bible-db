document_id: EZR.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Journeys from Babylon to Jerusalem
  - type: text
    content: 'Now after this, in the reign of Artaxerxes I [son of Ahasuerus (Xerxes)] king of Persia, Ezra the son (descendant) of Seraiah, the son of Azariah, the son of Hilkiah, '
  '10':
  - type: text
    content: 'For Ezra had set his heart (resolved) to study '
  - type: text
    content: and
  - type: text
    content: ' interpret the Law of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and to practice it and teach '
  - type: text
    content: His
  - type: text
    content: ' statutes and ordinances in Israel.'
  - type: heading
    content: King’s Decree on Behalf of Ezra
  '11':
  - type: text
    content: Now this is a copy of the decree that King Artaxerxes gave to Ezra the priest, the scribe [who was] learned in the words of the commandments of the L
  - type: heading
    content: ord
  - type: text
    content: ' and of His statutes to Israel: '
  '12':
  - type: text
    content: '“Artaxerxes, king of kings, to Ezra the priest, the scribe of the Law of the God of heaven, perfect '
  - type: text
    content: peace
  - type: text
    content: ' (greetings). And now '
  '13':
  - type: text
    content: 'I have issued a decree that all of the people of Israel and their priests and the Levites in my kingdom who are willing to go to Jerusalem, may go with you. '
  '14':
  - type: text
    content: 'For you are sent by the king and his seven advisers to inquire about Judah and Jerusalem in accordance with the Law of your God, which is in your hand, '
  '15':
  - type: text
    content: 'and to bring [with you] the silver and gold which the king and his advisers have freely offered to the God of Israel, whose dwelling is in Jerusalem, '
  '16':
  - type: text
    content: 'and all the silver and gold which you find in the whole province of Babylon, along with the freewill offering of the people and of the priests for the house of their God in Jerusalem. '
  '17':
  - type: text
    content: 'Therefore with this money, you shall diligently buy bulls, rams, and lambs, with their grain offerings and drink offerings, and offer them on the altar of the house of your God which is in Jerusalem. '
  '18':
  - type: text
    content: 'And whatever seems good to you and to your brothers to do with the rest of the silver and the gold, you may do in accordance with the will of your God. '
  '19':
  - type: text
    content: 'As for the utensils which are given to you for the service of the house of your God, deliver [those] in full before the God of Jerusalem. '
  '2':
  - type: text
    content: 'the son of Shallum, the son of Zadok, the son of Ahitub, '
  '20':
  - type: text
    content: The rest of the things required for the house of your God, which you may have occasion to provide, provide it from the royal treasury.
  '21':
  - type: text
    content: '“And I, Artaxerxes the king, issue a decree to all the treasurers '
  - type: text
    content: in the provinces
  - type: text
    content: ' '
  - type: note
    content: Lit beyond and so throughout.
  - type: text
    content: 'west of the [Euphrates] River, that whatever Ezra the priest, the scribe of the Law of the God of heaven, may require of you, it shall be done diligently '
  - type: text
    content: and
  - type: text
    content: ' at once— '
  '22':
  - type: text
    content: even
  - type: text
    content: ' up to 100 talents of silver, 100 kors (measures) of wheat, 100 baths of wine, 100 baths of [olive] oil, and salt as needed. '
  '23':
  - type: text
    content: 'Whatever is commanded by the God of heaven, let it be done diligently '
  - type: text
    content: and
  - type: text
    content: ' with enthusiasm for the house of the God of heaven, so that there will not be wrath against the kingdom of the king and his sons. '
  '24':
  - type: text
    content: 'We also inform you that it is not authorized to impose tax, tribute, or toll on any of the priests, Levites, singers, doorkeepers, temple servants or '
  - type: text
    content: other
  - type: text
    content: ' servants of this house of God.'
  '25':
  - type: text
    content: '“You, Ezra, are to appoint magistrates and judges in accordance with the wisdom '
  - type: text
    content: and
  - type: text
    content: ' instruction of your God which is in your hand, so that they may judge all the people who are in '
  - type: text
    content: the province
  - type: text
    content: ' west of the [Euphrates] River; '
  - type: text
    content: appoint
  - type: text
    content: ' those who know the laws of your God; and you may teach anyone who does not know '
  - type: text
    content: them
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Whoever does not observe '
  - type: text
    content: and
  - type: text
    content: ' practice the law of your God and the law of the king, let judgment be executed upon him strictly '
  - type: text
    content: and
  - type: text
    content: ' promptly, whether it be for death or banishment or confiscation of property or imprisonment.”'
  - type: heading
    content: The King’s Kindness
  '27':
  - type: text
    content: Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of our fathers [said Ezra], who put '
  - type: text
    content: such a thing
  - type: text
    content: ' as this in the king’s heart, to adorn '
  - type: text
    content: and
  - type: text
    content: ' glorify the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' in Jerusalem, '
  '28':
  - type: text
    content: 'and has extended His mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness to me before the king, his advisers, and all the king’s mighty officials. I was strengthened '
  - type: text
    content: and
  - type: text
    content: ' encouraged, for the hand of the L'
  - type: heading
    content: ord
  - type: text
    content: ' my God was upon me, and I gathered together outstanding men of Israel to go up with me [to Jerusalem].'
  '3':
  - type: text
    content: 'the son of Amariah, the son of Azariah, the son of Meraioth, '
  '4':
  - type: text
    content: 'the son of Zerahiah, the son of Uzzi, the son of Bukki, '
  '5':
  - type: text
    content: 'the son of Abishua, the son of Phinehas, the son of Eleazar, the son of Aaron the chief priest— '
  '6':
  - type: text
    content: this Ezra went up from Babylon. He was a scribe skilled in the Law (the five books) of Moses, which the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel had given; and the king granted him everything that he asked, for the hand of the L'
  - type: heading
    content: ord
  - type: text
    content: ' his God was on him. '
  '7':
  - type: text
    content: Some of the sons of Israel, with some of the priests and Levites, the singers and gatekeepers, and the temple servants also went up [from Babylon] to Jerusalem in the seventh year of King Artaxerxes.
  '8':
  - type: text
    content: 'Ezra came to Jerusalem in the fifth month of the seventh year of the king. '
  '9':
  - type: text
    content: 'For on the first of the first month he started out from Babylon, and on the first of the fifth month he arrived in Jerusalem, because the good hand of his God was on him. '
