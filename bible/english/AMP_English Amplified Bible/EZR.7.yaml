document_id: EZR.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ezra Journeys from Babylon to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after this, in the reign of Artaxerxes I [son of Ahasuerus (Xerxes)] king of Persia, Ezra the son (descendant) of Seraiah, the son of Azariah, the son of Hilkiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the son of Shallum, the son of Zadok, the son of Ahitub, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the son of Amariah, the son of Azariah, the son of Meraioth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'the son of Zerahiah, the son of Uzzi, the son of Bukki, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the son of Abishua, the son of Phinehas, the son of Eleazar, the son of Aaron the chief priest— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: this Ezra went up from Babylon. He was a scribe skilled in the Law (the five books) of Moses, which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel had given; and the king granted him everything that he asked, for the hand of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God was on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Some of the sons of Israel, with some of the priests and Levites, the singers and gatekeepers, and the temple servants also went up [from Babylon] to Jerusalem in the seventh year of King Artaxerxes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ezra came to Jerusalem in the fifth month of the seventh year of the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For on the first of the first month he started out from Babylon, and on the first of the fifth month he arrived in Jerusalem, because the good hand of his God was on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For Ezra had set his heart (resolved) to study '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpret the Law of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and to practice it and teach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' statutes and ordinances in Israel.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: King’s Decree on Behalf of Ezra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now this is a copy of the decree that King Artaxerxes gave to Ezra the priest, the scribe [who was] learned in the words of the commandments of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and of His statutes to Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Artaxerxes, king of kings, to Ezra the priest, the scribe of the Law of the God of heaven, perfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: peace
  - type: text
    text: ' (greetings). And now '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I have issued a decree that all of the people of Israel and their priests and the Levites in my kingdom who are willing to go to Jerusalem, may go with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For you are sent by the king and his seven advisers to inquire about Judah and Jerusalem in accordance with the Law of your God, which is in your hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and to bring [with you] the silver and gold which the king and his advisers have freely offered to the God of Israel, whose dwelling is in Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and all the silver and gold which you find in the whole province of Babylon, along with the freewill offering of the people and of the priests for the house of their God in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore with this money, you shall diligently buy bulls, rams, and lambs, with their grain offerings and drink offerings, and offer them on the altar of the house of your God which is in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And whatever seems good to you and to your brothers to do with the rest of the silver and the gold, you may do in accordance with the will of your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'As for the utensils which are given to you for the service of the house of your God, deliver [those] in full before the God of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The rest of the things required for the house of your God, which you may have occasion to provide, provide it from the royal treasury.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“And I, Artaxerxes the king, issue a decree to all the treasurers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the provinces
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: beyond
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'west of the [Euphrates] River, that whatever Ezra the priest, the scribe of the Law of the God of heaven, may require of you, it shall be done diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at once— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' up to 100 talents of silver, 100 kors (measures) of wheat, 100 baths of wine, 100 baths of [olive] oil, and salt as needed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Whatever is commanded by the God of heaven, let it be done diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with enthusiasm for the house of the God of heaven, so that there will not be wrath against the kingdom of the king and his sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'We also inform you that it is not authorized to impose tax, tribute, or toll on any of the priests, Levites, singers, doorkeepers, temple servants or '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' servants of this house of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“You, Ezra, are to appoint magistrates and judges in accordance with the wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction of your God which is in your hand, so that they may judge all the people who are in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the province
  - type: text
    text: ' west of the [Euphrates] River; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: appoint
  - type: text
    text: ' those who know the laws of your God; and you may teach anyone who does not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Whoever does not observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' practice the law of your God and the law of the king, let judgment be executed upon him strictly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promptly, whether it be for death or banishment or confiscation of property or imprisonment.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The King’s Kindness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of our fathers [said Ezra], who put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such a thing
  - type: text
    text: ' as this in the king’s heart, to adorn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and has extended His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness to me before the king, his advisers, and all the king’s mighty officials. I was strengthened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged, for the hand of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God was upon me, and I gathered together outstanding men of Israel to go up with me [to Jerusalem].'
