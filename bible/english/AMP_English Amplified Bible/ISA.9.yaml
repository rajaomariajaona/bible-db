document_id: ISA.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Birth and Reign of the Prince of Peace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But there will be no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: more
  - type: text
    text: ' gloom for her who was in anguish [for with judgment comes the promise of salvation]. In earlier times He treated the land of Zebulun and the land of Naphtali with contempt, but later on He will make them honored [by the presence of the Messiah], by the way of the sea, on the other side of Jordan, Galilee of the Gentiles.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The people who walk in [spiritual] darkness
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: have seen,
      - type: text
        text: ' Hebrew perfect tense. The perfect tense is used frequently in this passage and should probably be interpreted as the prophetic future, that is, the use of the perfect (past) tense to describe a future event as a certainty.'
    marker-yv: yv-n
  - type: text
    text: Will see a great Light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who live in the dark land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Light will shine on them. [Is 42:6; Matt 4:15, 16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You [O God] will increase the nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will multiply their joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will rejoice before You
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like the joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jubilation of the harvest,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As men rejoice when they divide the spoil [of victory].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For You will break the yoke of Israel’s burden and the staff (goad) on their shoulders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The rod of their oppressor, as at the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A reference to Gideon’s great victory over the Midianites (Judg 7:22-25).
    marker-yv: yv-n
  - type: text
    text: battle of Midian. [Judg 7:8-22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For every boot of the marching warrior in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: battle
  - type: text
    text: ' tumult,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [every soldier’s] garment rolled in blood, will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: used
  - type: text
    text: ' for burning, fuel for the fire.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For to us a Child shall be born, to us a Son shall be given;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the government shall be upon His shoulder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His name shall be called Wonderful Counselor, Mighty God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everlasting Father, Prince of Peace. [Is 25:1; 40:9-11; Matt 28:18; Luke 2:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There shall be no end to the increase of His government and of peace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[He shall rule] on the throne of David and over his kingdom,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To establish it and to uphold it with justice and righteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: From that time forward and forevermore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The zeal of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will accomplish this. [Dan 2:44; 1 Cor 15:25-28; Heb 1:8]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Anger with Israel’s Arrogance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶The Lord sends a word (message) against Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it falls on Israel [the ten northern tribes, the kingdom of Ephraim].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And all the people know it,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That is,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Israel” and “Ephraim” are used interchangeably to refer to the ten tribes of the northern kingdom.
    marker-yv: yv-n
  - type: text
    text: Ephraim and the inhabitants of Samaria [its capital],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who say in pride and arrogance of heart:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “The bricks have fallen down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But we will rebuild [all the better] with ashlar (hewed stones);
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sycamores have been cut down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But we will replace them with [expensive] cedars.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' raises against Ephraim adversaries from Rezin [king of Aram]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And spurs their enemies on,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Arameans on the east and the Philistines on the west;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they devour Israel with gaping jaws.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spite of
  - type: text
    text: ' all this, God’s anger does not turn away'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His hand is still stretched out [in judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Yet the people do not turn back [in repentance] to Him who struck them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor do they seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts [as their most essential need].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' cuts off head and tail [the highest and the lowest] from Israel,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Both
  - type: text
    text: ' [the high] palm branch and [the low] bulrush in one day.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The elderly and honorable man, he is the head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the prophet who teaches lies, he is the tail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For those who lead this people are causing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to go astray;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who are led [astray] by them are swallowed up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore the Lord does not rejoice over their young men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does He have compassion on their fatherless or their widows;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For every one of them is godless and an evildoer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And every mouth is speaking foolishness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spite of
  - type: text
    text: ' all this, God’s anger does not turn away'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His hand is still stretched out [in judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶For wickedness burns like a fire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It consumes briars and thorns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: It even sets the forest thickets ablaze;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it swirls upward in a column of smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: By the wrath of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts the land is burned up,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people are like fuel for the fire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No man spares his brother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They slice off [in discord] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what is
  - type: text
    text: ' on the right hand but are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still
  - type: text
    text: ' hungry,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they eat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what is
  - type: text
    text: ' on the left hand but they are not satisfied;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each eats the flesh of his own arm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '[The tribe of] Manasseh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: devours
  - type: text
    text: ' [the tribe of his brother] Ephraim, and Ephraim Manasseh,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And together they are against Judah (the southern kingdom, the house of David).
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spite of
  - type: text
    text: ' all this, God’s anger does not turn away'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His hand is still stretched out [in judgment].
