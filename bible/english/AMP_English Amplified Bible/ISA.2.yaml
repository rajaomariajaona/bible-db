document_id: ISA.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Universal Reign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word [from God] which Isaiah son of Amoz saw [in a vision] concerning [the nation of] Judah and [its capital city] Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ¶Now it will come to pass that
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the last days
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mountain of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will be [firmly] established as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chief;
      - type: text
        text: ' lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: head
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: highest of the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will be exalted above the hills;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the nations will stream to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And many peoples shall come and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come, let us go up to the mountain of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the house (temple) of the God of Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He may teach us His ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that we may walk in His paths.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the law will go out from Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And He will judge between the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will mediate [disputes] for many peoples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will beat their swords into plowshares and their spears into pruning hooks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation will not lift up the sword against nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And never again will they learn war. [Mic 4:1-3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶O house of Jacob, come, let us walk in the light of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Most certainly [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] You have abandoned your people, the house of Jacob,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they are filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with influences
  - type: text
    text: ' from the east,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they are soothsayers [who foretell] like the Philistines;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Also they strike '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bargains
  - type: text
    text: ' with the children of foreigners (pagans). [Deut 18:9-12]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their land has also been filled with silver and gold
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no end to their treasures;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their land has also been filled with horses
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no end to their chariots. [Deut 17:14-17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their land has also been filled with idols;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They worship the work of their hands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That which their own fingers have made.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: common
  - type: text
    text: ' man has been humbled [before idols]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of importance
  - type: text
    text: ' has been degraded,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore do not forgive them [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Go among the rocks and hide in the dust
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the terror of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and from the splendor of His majesty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The proud look of man will be degraded
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the arrogance of men will be humbled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' alone will be exalted in that day.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Day of Reckoning Coming
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will have a day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of reckoning
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against all who are proud and arrogant
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against all who are lifted up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they may be degraded. [Zeph 2:3; Mal 4:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And the wrath of God will be against all the cedars of Lebanon [west of the Jordan] that are high and lifted up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against all the oaks of Bashan [east of the Jordan],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Against all the high mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against all the hills that are lifted up,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Against every high tower,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against every fortified wall,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Against all the ships of Tarshish
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against all the beautiful craft.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the pride of man will be humbled
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the arrogance of men will be degraded;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' alone shall be exalted in that day,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And the idols will completely vanish (be abolished).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They [the stricken, deprived of all in which they had trusted] will go into the caves of the rocks
- type: usfm
  marker: q1
  children:
  - type: text
    text: And into the holes of the ground [fleeing]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the splendor of His majesty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He arises to terrify the earth. [Luke 23:30]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In that day men will throw away to the moles and to the bats
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their idols of silver and their idols of gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which they made for themselves [as objects] to worship,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To go into the caverns of the rocks and into the clefts of the [ragged] cliffs [as they flee]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the terror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the splendor of His majesty,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He arises to terrify the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Stop regarding man, whose breath [of life] is in his nostrils [for so little time];
- type: usfm
  marker: q1
  children:
  - type: text
    text: For why should he be esteemed?
