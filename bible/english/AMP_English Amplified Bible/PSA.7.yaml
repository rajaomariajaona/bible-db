segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ' Implored to Defend the Psalmist against the Wicked.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'An '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:0 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Meaning uncertain, perhaps a wild, enthusiastic song. The ancient rabbis connected the Hebrew word to another word of similar spelling meaning “inadvertent sin” or “error,” and maintained that God called David to account for what he said in 6:10. He had in essence cursed his enemies, and God supposedly pointed out that Saul was David’s enemy, so David thereby had cursed Saul in violation of Ex 22:28. David pleaded with God to count this a sin of error on his part, and thereafter composed Ps 7. The rabbis also maintained that '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Cush
      - type: text
        text: ' was a reference to Saul (cf 1 Sam 9:1).'
    marker-yv: yv-n
  - type: text
    text: Ode of David, [perhaps in a wild, irregular, enthusiastic strain,] which he sang to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning the words of Cush, a Benjamite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, in You I take refuge;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me and rescue me from all those who pursue me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So that my enemy will not tear me like a lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dragging me away while there is no one to rescue [me].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, if I have done this,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: If there is injustice in my hands,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If I have done evil to him who was at peace with me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or without cause robbed him who was my enemy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the enemy pursue me and overtake me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let him trample my life to the ground
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And lay my honor in the dust. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶Arise, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in Your anger;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift up Yourself against the rage of my enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rise up for me; You have commanded judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindication.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let the assembly of the nations be gathered around You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And return on high over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' judges the peoples;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judge me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grant me justice according to my righteousness and according to the integrity within me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oh, let the wickedness of the wicked come to an end, but establish the righteous [those in right standing with You];
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the righteous God tries the hearts and minds. [Rev 2:23]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'My shield '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my defense depend on God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who saves the upright in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: God is a righteous judge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a God who is indignant every day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶If a man does not repent, God will sharpen His sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He has strung '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bent His [mighty] bow and made it ready.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He has also prepared [other] deadly weapons for Himself;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He makes His arrows fiery shafts [aimed at the unrepentant].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Behold, the [wicked and irreverent] man is pregnant with sin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he conceives mischief and gives birth to lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He has dug a pit and hollowed it out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has fallen into the [very] pit which he made [as a trap].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: His mischief will return on his own head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his violence will come down on the top of his head [like loose dirt].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶I will give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' according to His righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will sing praise to the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Most High.'
