document_id: PSA.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 7
  - type: heading
    content: The Lord Implored to Defend the Psalmist against the Wicked.
  - type: text
    content: 'An '
  - type: note
    content: Meaning uncertain, perhaps a wild, enthusiastic song. The ancient rabbis connected the Hebrew word to another word of similar spelling meaning “inadvertent sin” or “error,” and maintained that God called David to account for what he said in 6:10. He had in essence cursed his enemies, and God supposedly pointed out that Saul was David’s enemy, so David thereby had cursed Saul in violation of Ex 22:28. David pleaded with God to count this a sin of error on his part, and thereafter composed Ps 7. The rabbis also maintained that Cush was a reference to Saul (cf 1 Sam 9:1).
  - type: text
    content: Ode of David, [perhaps in a wild, irregular, enthusiastic strain,] which he sang to the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning the words of Cush, a Benjamite.'
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, in You I take refuge;'
  - type: text
    content: Save me and rescue me from all those who pursue me,
  '10':
  - type: text
    content: 'My shield '
  - type: text
    content: and
  - type: text
    content: ' my defense depend on God,'
  - type: text
    content: Who saves the upright in heart.
  '11':
  - type: text
    content: God is a righteous judge,
  - type: text
    content: And a God who is indignant every day.
  '12':
  - type: text
    content: ¶If a man does not repent, God will sharpen His sword;
  - type: text
    content: 'He has strung '
  - type: text
    content: and
  - type: text
    content: ' bent His [mighty] bow and made it ready.'
  '13':
  - type: text
    content: He has also prepared [other] deadly weapons for Himself;
  - type: text
    content: He makes His arrows fiery shafts [aimed at the unrepentant].
  '14':
  - type: text
    content: Behold, the [wicked and irreverent] man is pregnant with sin,
  - type: text
    content: And he conceives mischief and gives birth to lies.
  '15':
  - type: text
    content: He has dug a pit and hollowed it out,
  - type: text
    content: And has fallen into the [very] pit which he made [as a trap].
  '16':
  - type: text
    content: His mischief will return on his own head,
  - type: text
    content: And his violence will come down on the top of his head [like loose dirt].
  '17':
  - type: text
    content: ¶I will give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' according to His righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice,'
  - type: text
    content: And I will sing praise to the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' Most High.'
  '2':
  - type: text
    content: So that my enemy will not tear me like a lion,
  - type: text
    content: Dragging me away while there is no one to rescue [me].
  '3':
  - type: text
    content: ¶O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, if I have done this,'
  - type: text
    content: If there is injustice in my hands,
  '4':
  - type: text
    content: If I have done evil to him who was at peace with me,
  - type: text
    content: Or without cause robbed him who was my enemy,
  '5':
  - type: text
    content: Let the enemy pursue me and overtake me;
  - type: text
    content: And let him trample my life to the ground
  - type: text
    content: 'And lay my honor in the dust. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: ¶Arise, O L
  - type: heading
    content: ord
  - type: text
    content: ', in Your anger;'
  - type: text
    content: Lift up Yourself against the rage of my enemies;
  - type: text
    content: 'Rise up for me; You have commanded judgment '
  - type: text
    content: and
  - type: text
    content: ' vindication.'
  '7':
  - type: text
    content: Let the assembly of the nations be gathered around You,
  - type: text
    content: And return on high over them.
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' judges the peoples;'
  - type: text
    content: Judge me, O L
  - type: heading
    content: ord
  - type: text
    content: ', '
  - type: text
    content: and
  - type: text
    content: ' grant me justice according to my righteousness and according to the integrity within me.'
  '9':
  - type: text
    content: Oh, let the wickedness of the wicked come to an end, but establish the righteous [those in right standing with You];
  - type: text
    content: For the righteous God tries the hearts and minds. [Rev 2:23]
