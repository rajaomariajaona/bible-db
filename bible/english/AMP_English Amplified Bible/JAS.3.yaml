verses:
  '1':
  - type: heading
    content: The Tongue Is a Fire
  - type: text
    content: 'Not many [of you] should become teachers [serving in an official teaching capacity], my brothers and sisters, for you know that we [who are teachers] will '
  - type: note
    content: Lit receive greater judgment.
  - type: text
    content: 'be judged by a higher standard [because we have assumed greater accountability and more condemnation if we teach incorrectly]. '
  '10':
  - type: text
    content: 'Out of the same mouth come '
  - type: text
    content: both
  - type: text
    content: ' blessing and cursing. These things, my brothers, should not be this way [for we have a moral obligation to speak in a manner that reflects our fear of God and profound respect for His precepts]. '
  '11':
  - type: text
    content: 'Does a spring send out from the same opening '
  - type: text
    content: both
  - type: text
    content: ' '
  - type: note
    content: Lit sweet.
  - type: text
    content: 'fresh and bitter '
  - type: text
    content: water?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Can a fig tree, my brothers, produce olives, or a grapevine produce figs? Nor can salt water produce '
  - type: note
    content: Lit sweet.
  - type: text
    content: fresh.
  - type: heading
    content: Wisdom from Above
  '13':
  - type: text
    content: 'Who among you is wise and intelligent? Let him by his good conduct show his [good] deeds with the gentleness '
  - type: text
    content: and
  - type: text
    content: ' humility of '
  - type: text
    content: 'true'
  - type: text
    content: ' wisdom. '
  '14':
  - type: text
    content: 'But if you have bitter jealousy and selfish ambition in your hearts, do not be arrogant, and [as a result] be in defiance of the truth. '
  '15':
  - type: text
    content: 'This [superficial] wisdom is not that which comes down from above, but is earthly (secular), natural (unspiritual), '
  - type: text
    content: even
  - type: text
    content: ' demonic. '
  '16':
  - type: text
    content: 'For where jealousy and selfish ambition exist, there is disorder [unrest, rebellion] and every evil thing '
  - type: text
    content: and
  - type: text
    content: ' morally degrading practice. '
  '17':
  - type: text
    content: 'But the wisdom from above is first pure [morally and spiritually undefiled], then peace-loving [courteous, considerate], gentle, reasonable [and willing to listen], full of compassion and good fruits. It is unwavering, without [self-righteous] hypocrisy [and self-serving guile]. '
  '18':
  - type: text
    content: And the seed whose fruit is righteousness (spiritual maturity) is sown in peace by those who make peace [by actively encouraging goodwill between individuals].
  '2':
  - type: text
    content: 'For we all stumble '
  - type: text
    content: and
  - type: text
    content: ' sin in many '
  - type: text
    content: ways
  - type: text
    content: '. If anyone does not stumble in what he says [never saying the wrong thing], he is a perfect man [fully developed in character, without serious flaws], able to bridle his whole body '
  - type: text
    content: and
  - type: text
    content: ' rein in his entire nature [taming his human faults and weaknesses]. '
  '3':
  - type: text
    content: 'Now if we put bits into the horses’ mouths to make them obey us, we guide their whole body as well. '
  '4':
  - type: text
    content: 'And look at the ships. Even though they are so large and are driven by strong winds, they are still directed by a very small rudder wherever the impulse of the helmsman determines. '
  '5':
  - type: text
    content: In the same sense, the tongue is a small part of the body, and yet it boasts of great things.
  - type: text
    content: S
  - type: text
    content: 'ee [by comparison] how great a forest is set on fire by a small spark! '
  '6':
  - type: text
    content: 'And the tongue is [in a sense] a fire, the '
  - type: text
    content: very
  - type: text
    content: ' world of injustice '
  - type: text
    content: and
  - type: text
    content: ' unrighteousness; the tongue is set among our members as that which contaminates the entire body, and sets on fire the course of our life [the cycle of man’s existence], and is itself set on fire by '
  - type: note
    content: See note Matt 5:22.
  - type: text
    content: 'hell (Gehenna). '
  '7':
  - type: text
    content: 'For every species of beasts and birds, of reptiles and sea creatures, is tamed and has been tamed by the human race. '
  '8':
  - type: text
    content: 'But no one can tame the '
  - type: text
    content: human
  - type: text
    content: ' tongue; it is a restless evil [undisciplined, unstable], full of deadly poison. '
  '9':
  - type: text
    content: 'With it we bless our Lord and Father, and with it we curse men, who have been made in the likeness of God. '
