document_id: JAS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Tongue Is a Fire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Not many [of you] should become teachers [serving in an official teaching capacity], my brothers and sisters, for you know that we [who are teachers] will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: receive greater judgment
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'be judged by a higher standard [because we have assumed greater accountability and more condemnation if we teach incorrectly]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For we all stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sin in many '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ways
  - type: text
    text: '. If anyone does not stumble in what he says [never saying the wrong thing], he is a perfect man [fully developed in character, without serious flaws], able to bridle his whole body '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rein in his entire nature [taming his human faults and weaknesses]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now if we put bits into the horses’ mouths to make them obey us, we guide their whole body as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And look at the ships. Even though they are so large and are driven by strong winds, they are still directed by a very small rudder wherever the impulse of the helmsman determines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In the same sense, the tongue is a small part of the body, and yet it boasts of great things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: S
  - type: text
    text: 'ee [by comparison] how great a forest is set on fire by a small spark! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the tongue is [in a sense] a fire, the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' world of injustice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrighteousness; the tongue is set among our members as that which contaminates the entire body, and sets on fire the course of our life [the cycle of man’s existence], and is itself set on fire by '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 5:22.
    marker-yv: yv-n
  - type: text
    text: 'hell (Gehenna). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For every species of beasts and birds, of reptiles and sea creatures, is tamed and has been tamed by the human race. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But no one can tame the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: human
  - type: text
    text: ' tongue; it is a restless evil [undisciplined, unstable], full of deadly poison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'With it we bless our Lord and Father, and with it we curse men, who have been made in the likeness of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Out of the same mouth come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: both
  - type: text
    text: ' blessing and cursing. These things, my brothers, should not be this way [for we have a moral obligation to speak in a manner that reflects our fear of God and profound respect for His precepts]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Does a spring send out from the same opening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: both
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sweet
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fresh and bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: water?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Can a fig tree, my brothers, produce olives, or a grapevine produce figs? Nor can salt water produce '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sweet
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: fresh.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Wisdom from Above
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Who among you is wise and intelligent? Let him by his good conduct show his [good] deeds with the gentleness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humility of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'true'
  - type: text
    text: ' wisdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if you have bitter jealousy and selfish ambition in your hearts, do not be arrogant, and [as a result] be in defiance of the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This [superficial] wisdom is not that which comes down from above, but is earthly (secular), natural (unspiritual), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' demonic. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For where jealousy and selfish ambition exist, there is disorder [unrest, rebellion] and every evil thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' morally degrading practice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the wisdom from above is first pure [morally and spiritually undefiled], then peace-loving [courteous, considerate], gentle, reasonable [and willing to listen], full of compassion and good fruits. It is unwavering, without [self-righteous] hypocrisy [and self-serving guile]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And the seed whose fruit is righteousness (spiritual maturity) is sown in peace by those who make peace [by actively encouraging goodwill between individuals].
