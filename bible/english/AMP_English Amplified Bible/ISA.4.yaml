document_id: ISA.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Remnant Prepared
  - type: text
    content: And in that day seven women will take hold of one man, saying, “We will eat our own food and wear [and provide] our own clothes; only let us be called by your name; take away our shame [of being unmarried].”
  '2':
  - type: text
    content: In that day the Branch of the L
  - type: heading
    content: ord
  - type: text
    content: ' will be splendid and glorious, and the fruit of the land will be excellent and lovely to those of Israel who have survived. [Jer 23:5; 33:15; Zech 3:8; 6:12] '
  '3':
  - type: text
    content: 'It will come to pass that he who is left in Zion and remains in Jerusalem will be called holy (set apart for God)—everyone who is recorded for [eternal] life in Jerusalem. [Joel 3:17; Phil 4:3] '
  '4':
  - type: text
    content: 'When the Lord has washed away the [moral] filth of the daughters of Zion and has cleansed the bloodstains of Jerusalem from her midst, by the spirit of judgment and by the spirit of burning, '
  '5':
  - type: text
    content: then the L
  - type: heading
    content: ord
  - type: text
    content: ' will create over the entire site of Mount Zion and over her assemblies, a cloud by day, smoke, and the brightness of a flaming fire by night; for over all the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance will be a canopy [a defense, a covering of His divine love and protection]. '
  '6':
  - type: text
    content: And there will be a pavilion for shade from the heat by day, and a refuge and a shelter from the storm and the rain.
