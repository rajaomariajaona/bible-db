document_id: ISA.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Remnant Prepared
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And in that day seven women will take hold of one man, saying, “We will eat our own food and wear [and provide] our own clothes; only let us be called by your name; take away our shame [of being unmarried].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In that day the Branch of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be splendid and glorious, and the fruit of the land will be excellent and lovely to those of Israel who have survived. [Jer 23:5; 33:15; Zech 3:8; 6:12] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It will come to pass that he who is left in Zion and remains in Jerusalem will be called holy (set apart for God)—everyone who is recorded for [eternal] life in Jerusalem. [Joel 3:17; Phil 4:3] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the Lord has washed away the [moral] filth of the daughters of Zion and has cleansed the bloodstains of Jerusalem from her midst, by the spirit of judgment and by the spirit of burning, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will create over the entire site of Mount Zion and over her assemblies, a cloud by day, smoke, and the brightness of a flaming fire by night; for over all the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance will be a canopy [a defense, a covering of His divine love and protection]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And there will be a pavilion for shade from the heat by day, and a refuge and a shelter from the storm and the rain.
