document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Melchizedek’s Priesthood Like Christ’s
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this Melchizedek, king of Salem, priest of the Most High God, met Abraham as he returned from the slaughter of the kings and blessed him, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and Abraham gave him a tenth of all [the spoil]. He is, first of all, by the translation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of his name,
  - type: text
    text: ' king of righteousness, and then he is also king of Salem, which means king of peace. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Without [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some believe that Melchizedek was an ordinary man blessed and appointed by God as a special priest, who serves as a Christlike figure in his priestly and kingly functions because his order was a priesthood without end. Others take the description literally to mean that Melchizedek was not a human, but an angel (v 8). If this is so, then Christ, as the Son of God, would be the “High Priest” of the order in which Melchizedek served as priest in the sense that angels are spiritual beings who have a pretemporal, but not eternal origin. Another view suggests that Melchizedek was perhaps a pre-incarnate appearance of Jesus in human form. Those who maintain that Melchizedek was an ordinary human being would say the writer is speaking symbolically concerning his ancestry; hence the insertion of “any record of” in the text of v 3 since his death is not recorded in Scripture.
    marker-yv: yv-n
  - type: text
    text: 'any record of] father or mother, nor ancestral line, without [any record of] beginning of days (birth) nor ending of life (death), but having been made like the Son of God, he remains a priest without interruption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without successor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now pause '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consider how great this man was to whom Abraham, the patriarch, gave a tenth of the spoils. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It is true that those descendants of Levi who are charged with the priestly office are commanded in the Law to collect tithes from the people—which means, from their kinsmen—though these have descended from Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But this person [Melchizedek] who is not from their Levitical ancestry received tithes from Abraham and blessed him who possessed the promises [of God]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Yet it is beyond all dispute that the lesser person is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: always
  - type: text
    text: ' blessed by the greater one. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Furthermore, here [in the Levitical priesthood] tithes are received by men who are subject to death; but in that case [concerning Melchizedek], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they are received
  - type: text
    text: ' by one of whom it is testified that he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 3.
    marker-yv: yv-n
  - type: text
    text: 'lives on [perpetually]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A person might even say that Levi [the father of the priestly tribe] himself, who received tithes, paid tithes through Abraham [the father of all Israel and of all who believe], '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: for Levi was still in the loins (unborn) of his forefather [Abraham] when Melchizedek met him (Abraham).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now if perfection [a perfect fellowship between God and the worshiper] had been attained through the Levitical priesthood (for under it the people were given the Law) what further need was there for another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' different kind of priest to arise, one in the manner of Melchizedek, rather than one appointed to the order of Aaron? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For when there is a change in the priesthood, there is of necessity a change of the law [concerning the priesthood] as well. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the One of whom these things are said belonged [not to the priestly line of Levi but] to another tribe, from which no one has officiated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' served at the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For it is evident that our Lord descended from [the tribe of] Judah, and Moses mentioned nothing about priests in connection with that tribe. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And this becomes even more evident if another priest arises in the likeness of Melchizedek, [Ps 110:4] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'who has become '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a priest,
  - type: text
    text: ' not on the basis of a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: law of a fleshly commandment
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'physical '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' legal requirement in the Law [concerning his ancestry as a descendant of Levi], but on the basis of the power of an indestructible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endless life. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For it is attested [by God] of Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou
  - type: text
    text: ' (Christ) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: are a
  - type: text
    text: ' P'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: riest forever
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ccording to the order of
  - type: text
    text: ' M'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: elchizedek
  - type: text
    text: .” [Ps 110:4]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For, on the one hand, a former commandment is cancelled because of its weakness and uselessness [because of its inability to justify the sinner before God] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(for the Law never made anything perfect); while on the other hand a better hope is introduced through which we now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' draw near to God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And indeed it was not without the taking of an oath [that Christ was made priest] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '(for those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Levites
  - type: text
    text: ' who formerly became priests [received their office] without [its being confirmed by the taking of] an oath, but this One [was designated] with an oath through the One who said to Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord has sworn
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd will not change
  - type: text
    text: ' H'
  - type: usfm
