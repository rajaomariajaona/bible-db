  '5':
  - type: text
    content: 'It is true that those descendants of Levi who are charged with the priestly office are commanded in the Law to collect tithes from the people—which means, from their kinsmen—though these have descended from Abraham. '
  '6':
  - type: text
    content: 'But this person [Melchizedek] who is not from their Levitical ancestry received tithes from Abraham and blessed him who possessed the promises [of God]. '
  '7':
