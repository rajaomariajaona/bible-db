  children:
  - type: text
    text: ‘Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou
  - type: text
    text: ' (Christ) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: are a
  - type: text
    text: ' P'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: riest forever
  - type: text
    text: ’ ”). [Ps 110:4]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And so [because of the oath’s greater strength and force] Jesus has become the certain guarantee of a better covenant [a more excellent and more advantageous agreement; one that will never be replaced or annulled].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The [former successive line of] priests, on the one hand, existed in greater numbers because they were each prevented by death from continuing [perpetually in office]; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but, on the other hand, Jesus holds His priesthood permanently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without change, because He lives on forever. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Therefore He is able also to save forever (completely, perfectly, for eternity) those who come to God through Him, since He always lives to intercede '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intervene on their behalf [with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'It was fitting for us to have such a High Priest [perfectly adapted to our needs], holy, blameless, unstained [by sin], separated from sinners and exalted higher than the heavens; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'who has no day by day need, like those high priests, to offer sacrifices, first of all for his own [personal] sins and then for those of the people, because He [met all the requirements and] did this once for all when He offered up Himself [as a willing sacrifice]. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For the Law appoints men as high priests who are weak [frail, sinful, dying men], but the word of the oath [of God], which came after [the institution of] the Law, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: permanently appoints
  - type: text
    text: ' [as priest] a Son '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: perfected
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: who has been made perfect forever. [Ps 110:4]
