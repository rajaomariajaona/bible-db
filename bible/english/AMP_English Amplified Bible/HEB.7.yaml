    content: And so [because of the oath’s greater strength and force] Jesus has become the certain guarantee of a better covenant [a more excellent and more advantageous agreement; one that will never be replaced or annulled].
  '23':
  - type: text
    content: 'The [former successive line of] priests, on the one hand, existed in greater numbers because they were each prevented by death from continuing [perpetually in office]; '
