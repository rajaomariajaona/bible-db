  '26':
  - type: text
    content: 'It was fitting for us to have such a High Priest [perfectly adapted to our needs], holy, blameless, unstained [by sin], separated from sinners and exalted higher than the heavens; '
  '27':
  - type: text
    content: 'who has no day by day need, like those high priests, to offer sacrifices, first of all for his own [personal] sins and then for those of the people, because He [met all the requirements and] did this once for all when He offered up Himself [as a willing sacrifice]. '
  '28':
  - type: text
    content: 'For the Law appoints men as high priests who are weak [frail, sinful, dying men], but the word of the oath [of God], which came after [the institution of] the Law, '
