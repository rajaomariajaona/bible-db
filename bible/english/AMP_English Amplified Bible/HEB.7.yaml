  '3':
  - type: text
    content: Without [
  - type: note
    content: Some believe that Melchizedek was an ordinary man blessed and appointed by God as a special priest, who serves as a Christlike figure in his priestly and kingly functions because his order was a priesthood without end. Others take the description literally to mean that Melchizedek was not a human, but an angel (v 8). If this is so, then Christ, as the Son of God, would be the “High Priest” of the order in which Melchizedek served as priest in the sense that angels are spiritual beings who have a pretemporal, but not eternal origin. Another view suggests that Melchizedek was perhaps a pre-incarnate appearance of Jesus in human form. Those who maintain that Melchizedek was an ordinary human being would say the writer is speaking symbolically concerning his ancestry; hence the insertion of “any record of” in the text of v 3 since his death is not recorded in Scripture.
  - type: text
    content: 'any record of] father or mother, nor ancestral line, without [any record of] beginning of days (birth) nor ending of life (death), but having been made like the Son of God, he remains a priest without interruption '
  - type: text
    content: and
  - type: text
    content: ' without successor.'
  '4':
