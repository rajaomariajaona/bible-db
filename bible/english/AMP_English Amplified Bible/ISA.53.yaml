  - type: text
    content: ¶Yet the L
  - type: heading
    content: ord
  - type: text
    content: ' was '
  - type: note
    content: Or pleased.
  - type: text
    content: willing
  - type: text
    content: 'To crush Him, '
  - type: note
    content: Lit He made Him sick.
  - type: text
    content: causing Him to suffer;
  - type: text
    content: 'If '
  - type: note
    content: Or His soul presents an offering.
  - type: text
    content: He would give Himself as a guilt offering [an atonement for sin],
  - type: text
    content: 'He shall see '
  - type: text
    content: His
  - type: text
    content: ' [spiritual] offspring,'
  - type: text
    content: 'He shall prolong '
  - type: text
    content: His
  - type: text
    content: ' days,'
  - type: text
    content: And the will (good pleasure) of the L
  - type: heading
    content: ord
  - type: text
    content: ' shall succeed '
  - type: text
    content: and
  - type: text
    content: ' prosper in His hand.'
  '11':
  - type: text
    content: 'As a result of the '
  - type: note
    content: Lit trouble.
  - type: text
    content: anguish of His soul,
  - type: text
    content: He shall see it and be satisfied;
  - type: text
    content: By His knowledge [of what He has accomplished] the Righteous One,
  - type: text
    content: My Servant, shall justify the many [making them righteous—upright before God, in right standing with Him],
  - type: text
    content: For He shall bear [the responsibility for] their sins.
  '12':
  - type: text
    content: 'Therefore, I will divide '
  - type: text
    content: and
  - type: text
    content: ' give Him a portion with the great [kings and rulers],'
  - type: text
    content: And He shall divide the spoils with the mighty,
  - type: text
    content: Because He [willingly] poured out His life to death,
  - type: text
    content: And was counted among the transgressors;
  - type: text
    content: 'Yet He Himself bore '
  - type: text
    content: and
  - type: text
    content: ' took away the sin of many,'
  - type: text
    content: And interceded [with the Father] for the transgressors. [Luke 22:37]
  '2':
  - type: text
    content: For He [the Servant of God] grew up before Him like a tender shoot (plant),
  - type: text
    content: And like a root out of dry ground;
  - type: text
    content: 'He has no '
  - type: text
    content: stately
  - type: text
    content: ' form or '
  - type: text
    content: majestic
  - type: text
    content: ' splendor'
  - type: text
    content: That we would look at Him,
  - type: text
    content: 'Nor [handsome] appearance that we would '
  - type: note
    content: Lit take pleasure in.
  - type: text
    content: be attracted to Him.
  '3':
  - type: text
    content: He was despised and rejected by men,
  - type: text
    content: 'A Man of sorrows '
  - type: text
    content: and
  - type: text
    content: ' pain and acquainted with grief;'
  - type: text
    content: And like One from whom men hide their faces
  - type: text
    content: 'He was despised, and we did not appreciate His worth '
  - type: text
    content: or
  - type: text
    content: ' esteem Him.'
  '4':
  - type: text
    content: ¶But [in fact] He has borne our griefs,
  - type: text
    content: 'And He has carried our sorrows '
  - type: text
    content: and
  - type: text
    content: ' pains;'
  - type: text
    content: Yet we [ignorantly] assumed that He was stricken,
  - type: text
    content: 'Struck down by God and degraded '
  - type: text
    content: and
  - type: text
    content: ' humiliated [by Him]. [Matt 8:17]'
  '5':
  - type: text
    content: But He was wounded for our transgressions,
  - type: text
    content: He was crushed for our wickedness [our sin, our injustice, our wrongdoing];
  - type: text
    content: 'The punishment [required] for our well-being '
  - type: text
    content: fell
  - type: text
    content: ' on Him,'
  - type: text
    content: And by His stripes (wounds) we are healed.
  '6':
  - type: text
    content: All of us like sheep have gone astray,
  - type: text
    content: We have turned, each one, to his own way;
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' has caused the wickedness of us all [our sin, our injustice, our wrongdoing]'
  - type: text
    content: To fall on Him [instead of us]. [1 Pet 2:24, 25]
  '7':
  - type: text
    content: ¶He was oppressed and He was afflicted,
  - type: text
    content: Yet He did not open His mouth [to complain or defend Himself];
  - type: text
    content: Like a lamb that is led to the slaughter,
  - type: text
    content: And like a sheep that is silent before her shearers,
  - type: text
    content: So He did not open His mouth.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Or Due to.
  - type: text
    content: After oppression and judgment He was taken away;
  - type: text
    content: 'And '
  - type: note
    content: Or who will explain to His generation.
  - type: text
    content: 'as for His generation [His contemporaries], who [among them] concerned himself '
  - type: text
    content: with the fact
  - type: text
    content: That He was cut off from the land of the living [by His death]
  - type: text
    content: 'For the transgression of my people, to whom the stroke [of death] '
  - type: text
    content: was due?
  '9':
  - type: text
    content: His grave was assigned with the wicked,
  - type: text
    content: But He was with a rich man in His death,
  - type: text
    content: Because He had done no violence,
  - type: text
    content: Nor was there any deceit in His mouth. [Matt 27:57-60; 1 Pet 2:22, 23]
