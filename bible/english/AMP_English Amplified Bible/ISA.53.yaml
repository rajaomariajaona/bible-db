  '1':
  - type: heading
    content: The Suffering Servant
  - type: text
    content: Who has believed [confidently trusted in, relied on, and adhered to] our message [of salvation]? [Is 52:7, 10]
  - type: text
    content: 'And to whom [if not us] has the arm '
  - type: text
    content: and
  - type: text
    content: ' infinite power of the L'
  - type: heading
    content: ord
  - type: text
    content: ' been revealed? [John 12:38-41; Rom 10:16]'
