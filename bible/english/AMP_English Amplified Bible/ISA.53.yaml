document_id: ISA.53,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Suffering Servant
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Who has believed [confidently trusted in, relied on, and adhered to] our message [of salvation]? [Is 52:7, 10]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And to whom [if not us] has the arm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' infinite power of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' been revealed? [John 12:38-41; Rom 10:16]'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pleased
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: willing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To crush Him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: He made Him sick
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: causing Him to suffer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: His soul presents an offering
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: He would give Himself as a guilt offering [an atonement for sin],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' [spiritual] offspring,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall prolong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' days,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the will (good pleasure) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall succeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper in His hand.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'As a result of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: trouble
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: anguish of His soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall see it and be satisfied;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By His knowledge [of what He has accomplished] the Righteous One,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My Servant, shall justify the many [making them righteous—upright before God, in right standing with Him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He shall bear [the responsibility for] their sins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore, I will divide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give Him a portion with the great [kings and rulers],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He shall divide the spoils with the mighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because He [willingly] poured out His life to death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And was counted among the transgressors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet He Himself bore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' took away the sin of many,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And interceded [with the Father] for the transgressors. [Luke 22:37]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For He [the Servant of God] grew up before Him like a tender shoot (plant),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a root out of dry ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stately
    - type: text
      text: ' form or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: majestic
    - type: text
      text: ' splendor'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we would look at Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor [handsome] appearance that we would '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: take pleasure in
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: be attracted to Him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He was despised and rejected by men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A Man of sorrows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pain and acquainted with grief;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like One from whom men hide their faces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He was despised, and we did not appreciate His worth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' esteem Him.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶But [in fact] He has borne our griefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He has carried our sorrows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pains;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet we [ignorantly] assumed that He was stricken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Struck down by God and degraded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humiliated [by Him]. [Matt 8:17]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But He was wounded for our transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was crushed for our wickedness [our sin, our injustice, our wrongdoing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The punishment [required] for our well-being '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fell
    - type: text
      text: ' on Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by His stripes (wounds) we are healed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: All of us like sheep have gone astray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have turned, each one, to his own way;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has caused the wickedness of us all [our sin, our injustice, our wrongdoing]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To fall on Him [instead of us]. [1 Pet 2:24, 25]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶He was oppressed and He was afflicted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet He did not open His mouth [to complain or defend Himself];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lamb that is led to the slaughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a sheep that is silent before her shearers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So He did not open His mouth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Due to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: After oppression and judgment He was taken away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: who will explain to His generation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'as for His generation [His contemporaries], who [among them] concerned himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with the fact
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That He was cut off from the land of the living [by His death]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the transgression of my people, to whom the stroke [of death] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was due?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: His grave was assigned with the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He was with a rich man in His death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because He had done no violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor was there any deceit in His mouth. [Matt 27:57-60; 1 Pet 2:22, 23]
