document_id: MAT.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Beheaded
  - type: text
    content: 'At that time Herod [Antipas], the tetrarch [who governed a portion of Palestine including Galilee and Perea], heard the reports about Jesus, [Luke 9:7-9] '
  '10':
  - type: text
    content: 'He sent and had John beheaded in the prison. '
  '11':
  - type: text
    content: 'His head was brought on a platter and given to the girl, and she brought it to her mother [Herodias]. '
  '12':
  - type: text
    content: And John’s disciples came and took away the body and buried it. Then they went and told Jesus.
  - type: heading
    content: Five Thousand Fed
  '13':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: about John,
  - type: text
    content: ' He left there privately in a boat and went to a secluded place. But when the crowds heard of this, they followed Him on foot from the cities. [Mark 6:32-44; Luke 9:10-17; John 6:1-13] '
  '14':
  - type: text
    content: When He went ashore, He saw a large crowd, and felt [profound] compassion for them and healed their sick.
  '15':
  - type: text
    content: 'When evening came, the disciples came to Him and said, “This is an isolated place and the hour is already late; send the crowds away so that they may go into the villages and buy food for themselves.” '
  '16':
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: '“They do not need to go away; you give them '
  - type: text
    content: something
  - type: text
    content: ' to eat!”'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'They replied, “We have nothing here except five loaves and two fish.” '
  '18':
  - type: text
    content: 'He said, '
  - type: text
    content: “Bring them here to Me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then He ordered the crowds to sit down on the grass, and He took the five loaves and the two fish and, looking up toward heaven, He blessed and broke the loaves and gave them to the disciples, and the disciples '
  - type: text
    content: gave them
  - type: text
    content: ' to the people, '
  '2':
  - type: text
    content: and said to his attendants, “This is John the Baptist; he has been raised from the dead, and that is why the miraculous powers are at work in him.”
  '20':
  - type: text
    content: 'and they all ate and were satisfied. They picked up twelve full baskets of the leftover broken pieces. '
  '21':
  - type: text
    content: There were about 5,000 men who ate, besides women and children.
  - type: heading
    content: Jesus Walks on the Water
  '22':
  - type: text
    content: 'Immediately He directed the disciples to get into the boat and go ahead of Him to the other side [of the Sea of Galilee], while He sent the crowds away. [Mark 6:45-52; John 6:15-21] '
  '23':
  - type: text
    content: 'After He had dismissed the crowds, He went up on the mountain by Himself to pray. When it was evening, He was there alone. '
  '24':
  - type: text
    content: 'But the boat [by this time] was already a '
  - type: note
    content: Lit many stadia; a stadion being about an eighth of a mile or 192 meters.
  - type: text
    content: 'long distance from land, tossed '
  - type: text
    content: and
  - type: text
    content: ' battered by the waves; for the wind was against them. '
  '25':
  - type: text
    content: 'And in the fourth watch of the night (3:00-6:00 a.m.) Jesus came to them, walking on the sea. [Mark 6:48; John 6:19] '
  '26':
  - type: text
    content: 'When the disciples saw Him walking on the sea, they were terrified, and said, “It is a ghost!” And they cried out in fear. '
  '27':
  - type: text
    content: 'But immediately He spoke to them, saying, '
  - type: text
    content: “Take courage, it is I! Do not be afraid!”
  - type: text
    content: ' [Ex 3:14]'
  '28':
  - type: text
    content: 'Peter replied to Him, “Lord, if it is [really] You, command me to come to You on the water.” '
  '29':
  - type: text
    content: 'He said, '
  - type: text
    content: “Come!”
  - type: text
    content: ' So Peter got out of the boat, and walked on the water and came toward Jesus. '
  '3':
  - type: text
    content: 'For Herod had John arrested and bound him and put him in prison [at the fortress of Machaerus, east of the Jordan, to keep him away] because of '
  - type: note
    content: Herodias was not the lawful wife of Herod Antipas. She was married to her uncle, Herod Philip I. She deserted him in order to live with another uncle, Herod Antipas, whose legal wife was the daughter of Aretas, King of Arabia.
  - type: text
    content: 'Herodias, the wife of his brother Philip, [Mark 6:17; Luke 3:19] '
  '30':
  - type: text
    content: 'But when he saw [the effects of] the wind, he was frightened, and he began to sink, and he cried out, “Lord, save me!” '
  '31':
  - type: text
    content: 'Immediately Jesus extended His hand and caught him, saying to him, '
  - type: text
    content: '“O you of little faith, why did you '
  - type: note
    content: I.e. allow yourself to be drawn in two directions.
  - type: text
    content: doubt?”
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'And when they got into the boat, the wind ceased. '
  '33':
  - type: text
    content: Then those in the boat worshiped Him [with awe-inspired reverence], saying, “Truly You are the Son of God!”
  '34':
  - type: text
    content: 'When they had crossed over [the sea], they went ashore at Gennesaret. '
  '35':
  - type: text
    content: 'And when the men of that place recognized Him, they sent '
  - type: text
    content: word
  - type: text
    content: ' throughout all the surrounding district and brought to Him all who were sick; '
  '36':
  - type: text
    content: and they begged Him to let them merely touch the fringe of His robe; and all who touched it were perfectly restored. [Matt 9:20]
  '4':
  - type: text
    content: 'for John had said to him, “It is not lawful (morally right) for you to have her [living with you as your wife].” [Lev 18:16; 20:21] '
  '5':
  - type: text
    content: Although Herod wished to have him put to death, he feared the people, for they regarded John as a prophet.
  '6':
  - type: text
    content: 'But when Herod’s birthday came, [his niece Salome], the daughter of Herodias danced [immodestly] before them and pleased '
  - type: text
    content: and
  - type: text
    content: ' fascinated Herod, '
  '7':
  - type: text
    content: 'so much that he promised with an oath to give her whatever she asked. '
  '8':
  - type: text
    content: 'She, being coached by her mother [Herodias], said, “Give me here on a platter the head of John the Baptist.” '
  '9':
  - type: text
    content: 'The king was distressed, but because of his oaths, and because of his dinner guests, he ordered it to be given her. '
