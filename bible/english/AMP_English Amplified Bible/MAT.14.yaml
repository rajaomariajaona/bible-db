document_id: MAT.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: John the Baptist Beheaded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Herod [Antipas], the tetrarch [who governed a portion of Palestine including Galilee and Perea], heard the reports about Jesus, [Luke 9:7-9] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and said to his attendants, “This is John the Baptist; he has been raised from the dead, and that is why the miraculous powers are at work in him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Herod had John arrested and bound him and put him in prison [at the fortress of Machaerus, east of the Jordan, to keep him away] because of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Herodias was not the lawful wife of Herod Antipas. She was married to her uncle, Herod Philip I. She deserted him in order to live with another uncle, Herod Antipas, whose legal wife was the daughter of Aretas, King of Arabia.
    marker-yv: yv-n
  - type: text
    text: 'Herodias, the wife of his brother Philip, [Mark 6:17; Luke 3:19] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for John had said to him, “It is not lawful (morally right) for you to have her [living with you as your wife].” [Lev 18:16; 20:21] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Although Herod wished to have him put to death, he feared the people, for they regarded John as a prophet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But when Herod’s birthday came, [his niece Salome], the daughter of Herodias danced [immodestly] before them and pleased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fascinated Herod, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'so much that he promised with an oath to give her whatever she asked. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'She, being coached by her mother [Herodias], said, “Give me here on a platter the head of John the Baptist.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The king was distressed, but because of his oaths, and because of his dinner guests, he ordered it to be given her. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He sent and had John beheaded in the prison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'His head was brought on a platter and given to the girl, and she brought it to her mother [Herodias]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And John’s disciples came and took away the body and buried it. Then they went and told Jesus.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Five Thousand Fed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Jesus heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about John,
  - type: text
    text: ' He left there privately in a boat and went to a secluded place. But when the crowds heard of this, they followed Him on foot from the cities. [Mark 6:32-44; Luke 9:10-17; John 6:1-13] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When He went ashore, He saw a large crowd, and felt [profound] compassion for them and healed their sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When evening came, the disciples came to Him and said, “This is an isolated place and the hour is already late; send the crowds away so that they may go into the villages and buy food for themselves.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“They do not need to go away; you give them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' to eat!”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They replied, “We have nothing here except five loaves and two fish.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Bring them here to Me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then He ordered the crowds to sit down on the grass, and He took the five loaves and the two fish and, looking up toward heaven, He blessed and broke the loaves and gave them to the disciples, and the disciples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gave them
  - type: text
    text: ' to the people, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and they all ate and were satisfied. They picked up twelve full baskets of the leftover broken pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There were about 5,000 men who ate, besides women and children.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Walks on the Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Immediately He directed the disciples to get into the boat and go ahead of Him to the other side [of the Sea of Galilee], while He sent the crowds away. [Mark 6:45-52; John 6:15-21] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After He had dismissed the crowds, He went up on the mountain by Himself to pray. When it was evening, He was there alone. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But the boat [by this time] was already a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: many stadia;
      - type: text
        text: ' a stadion being about an eighth of a mile or 192 meters.'
    marker-yv: yv-n
  - type: text
    text: 'long distance from land, tossed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' battered by the waves; for the wind was against them. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And in the fourth watch of the night (3:00-6:00 a.m.) Jesus came to them, walking on the sea. [Mark 6:48; John 6:19] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When the disciples saw Him walking on the sea, they were terrified, and said, “It is a ghost!” And they cried out in fear. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But immediately He spoke to them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take courage, it is I! Do not be afraid!”
  - type: text
    text: ' [Ex 3:14]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Peter replied to Him, “Lord, if it is [really] You, command me to come to You on the water.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come!”
  - type: text
    text: ' So Peter got out of the boat, and walked on the water and came toward Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But when he saw [the effects of] the wind, he was frightened, and he began to sink, and he cried out, “Lord, save me!” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Immediately Jesus extended His hand and caught him, saying to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“O you of little faith, why did you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. allow yourself to be drawn in two directions.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: doubt?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And when they got into the boat, the wind ceased. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then those in the boat worshiped Him [with awe-inspired reverence], saying, “Truly You are the Son of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When they had crossed over [the sea], they went ashore at Gennesaret. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when the men of that place recognized Him, they sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' throughout all the surrounding district and brought to Him all who were sick; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: and they begged Him to let them merely touch the fringe of His robe; and all who touched it were perfectly restored. [Matt 9:20]
