document_id: GEN.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Treachery of Jacob’s Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Dinah the daughter of Leah, whom she had borne to Jacob, went out [unescorted] to visit the girls of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Shechem the son of Hamor the Hivite, prince (sheik) of the land, saw her, he kidnapped her and lay [intimately] with her by force [humbling and offending her]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But his soul longed for and clung to Dinah daughter of Jacob, and he loved the girl and spoke comfortingly to her young heart’s wishes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Shechem said to his father Hamor, “Get me this young woman as a wife.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now Jacob heard that Shechem had defiled (violated) Dinah his daughter; but his sons were in the field with his livestock, so Jacob said nothing until they came in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Shechem’s father Hamor went to Jacob to talk with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when Jacob’s sons heard of it they came in from the field; they were deeply grieved, and they were very angry, for Shechem had done a disgraceful thing to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This use of the word “Israel” implies that the family of Israel (Jacob) was developing into a distinct people or nation. They are recognized by Pharaoh as a separate nation in Ex 1:9.
    marker-yv: yv-n
  - type: text
    text: Israel by lying with Jacob’s daughter, for such a thing is not to be done.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Hamor conferred with them, saying, “The soul of my son Shechem [deeply] longs for your daughter [and sister]. Please give her to him as his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And [beyond that] intermarry with us; give your daughters to us [as wives] and take our daughters for yourselves. [Ex 34:15, 16; Deut 7:3; Josh 23:12, 13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In this way you shall live with us; the country will be open to you; live and do business in it and acquire property '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' possessions in it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Shechem also said to Dinah’s father and to her brothers, “Let me find favor in your sight, and I will give you whatever you ask of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Demand of me a very large bridal payment and gift [as compensation for giving up your daughter and sister], and I will give you whatever you tell me; only give me the girl to be my wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jacob’s sons answered Shechem and Hamor his father deceitfully, because Shechem had defiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgraced their sister Dinah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They said to them, “We cannot do this thing and give our sister [in marriage] to one who is not circumcised, because that would be a disgrace to us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But we will consent to you only on this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'condition:'
  - type: text
    text: ' if you will become like us, in that every male among you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: consents to
  - type: text
    text: ' be circumcised, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'then we will give our daughters to you [in marriage], and we will take your daughters for ourselves, and we will live with you and become one people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if you do not listen to us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuse to be circumcised, then we will take our daughter [Dinah] and go.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their words seemed reasonable to Hamor and his son Shechem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and the young man did not hesitate to do the [required] thing, for he was delighted with Jacob’s daughter. Now he was more respected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored than all [others] in the household of his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Hamor and Shechem his son came to the gate of their [walled] city [where the leading men would meet] and spoke with the men of the city, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“These men are peaceful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' friendly with us; so let them live in the land and do business in it, for the land is large enough [for us and] for them; let us take their daughters for wives and let us give them our daughters [in marriage]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But only on this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: condition
  - type: text
    text: ' will the men consent to our request that they live among us and become one people: that every male among us become circumcised just as they are circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Will not their cattle and their possessions and all their animals be ours [if we do this]? Let us consent [to do as they ask], and they will live here with us.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And every [Canaanite] man who went out of the city gate listened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' considered what Hamor and Shechem said; and every male who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: went out of the gate of his city
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: was a resident of that city was circumcised.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now on the third day [after the circumcision], when all the men were [terribly] sore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in pain, two of Jacob’s sons, Simeon and Levi, Dinah’s [full] brothers, took their swords, boldly entered the city [without anyone suspecting them of evil intent], and they killed every male. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They killed Hamor and his son Shechem with the edge of the sword, and took Dinah out of Shechem’s house [where she was staying], and left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Jacob’s [other] sons came upon those who were killed and looted the town, because their sister had been defiled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgraced. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They took the Canaanites’ flocks and their herds and their donkeys, and whatever was in the city and in the field; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'they looted all their wealth, and [took captive] all their children and their wives, even everything that was in the houses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Jacob said to Simeon and Levi, “You have ruined me, making me a stench to the inhabitants of the land, the Canaanites and the Perizzites! My men are few in number, and the men of the land will band together against me and attack me; I shall be destroyed, I and my household.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But they said, “Should he [be permitted to] treat our sister as a prostitute?”
