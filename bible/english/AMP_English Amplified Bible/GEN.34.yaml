type_code: eng
verses:
  '1':
  - type: heading
    content: The Treachery of Jacob’s Sons
  - type: text
    content: 'Now Dinah the daughter of Leah, whom she had borne to Jacob, went out [unescorted] to visit the girls of the land. '
  '10':
  - type: text
    content: 'In this way you shall live with us; the country will be open to you; live and do business in it and acquire property '
  - type: text
    content: and
  - type: text
    content: ' possessions in it.” '
  '11':
  - type: text
    content: 'Shechem also said to Dinah’s father and to her brothers, “Let me find favor in your sight, and I will give you whatever you ask of me. '
  '12':
  - type: text
    content: Demand of me a very large bridal payment and gift [as compensation for giving up your daughter and sister], and I will give you whatever you tell me; only give me the girl to be my wife.”
  '13':
  - type: text
    content: 'Jacob’s sons answered Shechem and Hamor his father deceitfully, because Shechem had defiled '
  - type: text
    content: and
  - type: text
    content: ' disgraced their sister Dinah. '
  '14':
  - type: text
    content: 'They said to them, “We cannot do this thing and give our sister [in marriage] to one who is not circumcised, because that would be a disgrace to us. '
  '15':
  - type: text
    content: 'But we will consent to you only on this '
  - type: text
    content: 'condition:'
  - type: text
    content: ' if you will become like us, in that every male among you '
  - type: text
    content: consents to
  - type: text
    content: ' be circumcised, '
  '16':
  - type: text
    content: 'then we will give our daughters to you [in marriage], and we will take your daughters for ourselves, and we will live with you and become one people. '
  '17':
  - type: text
    content: 'But if you do not listen to us '
  - type: text
    content: and
  - type: text
    content: ' refuse to be circumcised, then we will take our daughter [Dinah] and go.”'
  '18':
  - type: text
    content: 'Their words seemed reasonable to Hamor and his son Shechem, '
  '19':
  - type: text
    content: 'and the young man did not hesitate to do the [required] thing, for he was delighted with Jacob’s daughter. Now he was more respected '
  - type: text
    content: and
  - type: text
    content: ' honored than all [others] in the household of his father. '
  '2':
  - type: text
    content: 'When Shechem the son of Hamor the Hivite, prince (sheik) of the land, saw her, he kidnapped her and lay [intimately] with her by force [humbling and offending her]. '
  '20':
  - type: text
    content: 'Then Hamor and Shechem his son came to the gate of their [walled] city [where the leading men would meet] and spoke with the men of the city, saying, '
  '21':
  - type: text
    content: '“These men are peaceful '
  - type: text
    content: and
  - type: text
    content: ' friendly with us; so let them live in the land and do business in it, for the land is large enough [for us and] for them; let us take their daughters for wives and let us give them our daughters [in marriage]. '
  '22':
  - type: text
    content: 'But only on this '
  - type: text
    content: condition
  - type: text
    content: ' will the men consent to our request that they live among us and become one people: that every male among us become circumcised just as they are circumcised. '
  '23':
  - type: text
    content: 'Will not their cattle and their possessions and all their animals be ours [if we do this]? Let us consent [to do as they ask], and they will live here with us.” '
  '24':
  - type: text
    content: 'And every [Canaanite] man who went out of the city gate listened '
  - type: text
    content: and
  - type: text
    content: ' considered what Hamor and Shechem said; and every male who '
  - type: note
    content: Lit went out of the gate of his city.
  - type: text
    content: was a resident of that city was circumcised.
  '25':
  - type: text
    content: 'Now on the third day [after the circumcision], when all the men were [terribly] sore '
  - type: text
    content: and
  - type: text
    content: ' in pain, two of Jacob’s sons, Simeon and Levi, Dinah’s [full] brothers, took their swords, boldly entered the city [without anyone suspecting them of evil intent], and they killed every male. '
  '26':
  - type: text
    content: 'They killed Hamor and his son Shechem with the edge of the sword, and took Dinah out of Shechem’s house [where she was staying], and left. '
  '27':
  - type: text
    content: 'Then Jacob’s [other] sons came upon those who were killed and looted the town, because their sister had been defiled '
  - type: text
    content: and
  - type: text
    content: ' disgraced. '
  '28':
  - type: text
    content: 'They took the Canaanites’ flocks and their herds and their donkeys, and whatever was in the city and in the field; '
  '29':
  - type: text
    content: 'they looted all their wealth, and [took captive] all their children and their wives, even everything that was in the houses. '
  '3':
  - type: text
    content: 'But his soul longed for and clung to Dinah daughter of Jacob, and he loved the girl and spoke comfortingly to her young heart’s wishes. '
  '30':
  - type: text
    content: 'Then Jacob said to Simeon and Levi, “You have ruined me, making me a stench to the inhabitants of the land, the Canaanites and the Perizzites! My men are few in number, and the men of the land will band together against me and attack me; I shall be destroyed, I and my household.” '
  '31':
  - type: text
    content: But they said, “Should he [be permitted to] treat our sister as a prostitute?”
  '4':
  - type: text
    content: 'So Shechem said to his father Hamor, “Get me this young woman as a wife.” '
  '5':
  - type: text
    content: 'Now Jacob heard that Shechem had defiled (violated) Dinah his daughter; but his sons were in the field with his livestock, so Jacob said nothing until they came in. '
  '6':
  - type: text
    content: 'But Shechem’s father Hamor went to Jacob to talk with him. '
  '7':
  - type: text
    content: 'Now when Jacob’s sons heard of it they came in from the field; they were deeply grieved, and they were very angry, for Shechem had done a disgraceful thing to '
  - type: note
    content: This use of the word “Israel” implies that the family of Israel (Jacob) was developing into a distinct people or nation. They are recognized by Pharaoh as a separate nation in Ex 1:9.
  - type: text
    content: Israel by lying with Jacob’s daughter, for such a thing is not to be done.
  '8':
  - type: text
    content: 'But Hamor conferred with them, saying, “The soul of my son Shechem [deeply] longs for your daughter [and sister]. Please give her to him as his wife. '
  '9':
  - type: text
    content: 'And [beyond that] intermarry with us; give your daughters to us [as wives] and take our daughters for yourselves. [Ex 34:15, 16; Deut 7:3; Josh 23:12, 13] '
