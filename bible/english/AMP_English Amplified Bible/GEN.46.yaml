document_id: GEN.46,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Moves to Egypt
  - type: text
    content: 'So Israel set out with all that he had, and came to Beersheba [where both his father and grandfather had worshiped God], and offered sacrifices to the God of his father Isaac. [Gen 21:33; 26:23-25] '
  '10':
  - type: text
    content: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman. '
  '11':
  - type: text
    content: 'The sons of Levi: Gershon, Kohath, and Merari. '
  '12':
  - type: text
    content: 'The sons of Judah: Er, Onan, Shelah, Perez, and Zerah—but Er and Onan died in the land of Canaan. And the sons of Perez were Hezron and Hamul. '
  '13':
  - type: text
    content: 'The sons of Issachar: Tola, '
  - type: note
    content: Or Puah.
  - type: text
    content: 'Puvah, '
  - type: note
    content: Or Jashub.
  - type: text
    content: 'Job, and Shimron. '
  '14':
  - type: text
    content: 'The sons of Zebulun: Sered, Elon, and Jahleel. '
  '15':
  - type: text
    content: 'These are the sons of Leah, whom she bore to Jacob in Paddan-aram, with his daughter Dinah; all of his sons and daughters '
  - type: text
    content: numbered
  - type: text
    content: ' thirty-three. '
  '16':
  - type: text
    content: 'The sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli. '
  '17':
  - type: text
    content: 'The sons of Asher: Imnah, Ishvah, Ishvi, Beriah, and Serah their sister. And the sons of Beriah: Heber and Malchiel. '
  '18':
  - type: text
    content: 'These are the sons of Zilpah, [the maid] whom Laban gave to Leah his daughter [when she married Jacob]; and she bore to Jacob these sixteen persons [two sons and fourteen grandchildren]. '
  '19':
  - type: text
    content: 'The sons of Rachel, Jacob’s wife: Joseph and Benjamin. '
  '2':
  - type: text
    content: 'And God spoke to Israel in visions of the night and said, “Jacob, Jacob!” And he said, “Here I am.” '
  '20':
  - type: text
    content: 'Now to Joseph in the land of Egypt were born Manasseh and Ephraim, whom Asenath, the daughter of Potiphera, priest of On (Heliopolis in Egypt), bore to him. '
  '21':
  - type: text
    content: 'And the sons of '
  - type: note
    content: Benjamin was already the father of ten sons at the time he met Joseph in Egypt. Joseph was seventeen when his brothers sold him; he was in prison thirteen years; and he had been ruler of Egypt during the seven good years and through two years of the famine. So Joseph was thirty-nine years of age at this time, and Benjamin was only a few years younger.
  - type: text
    content: 'Benjamin: Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard. '
  '22':
  - type: text
    content: 'These are the sons of Rachel, who were born to Jacob; [there were] fourteen persons in all [two sons and twelve grandchildren]. '
  '23':
  - type: text
    content: 'The son of Dan: Hushim. '
  '24':
  - type: text
    content: 'The sons of Naphtali: Jahzeel, Guni, Jezer, and Shillem. '
  '25':
  - type: text
    content: 'These are the sons of Bilhah, [the maid] whom Laban gave to Rachel his daughter [when she married Jacob]. And she bore these to Jacob; [there were] seven persons in all [two sons and five grandchildren]. '
  '26':
  - type: text
    content: 'All the persons who came with Jacob into Egypt—who were his direct descendants, not counting the wives of [Jacob or] Jacob’s sons, were sixty-six persons in all, '
  '27':
  - type: text
    content: 'and the sons of Joseph, who were born to him in Egypt, were two. All the persons of the house of Jacob [including Jacob, and '
  - type: note
    content: I.e. Joseph and his sons were included in the count even though they were already in Egypt.
  - type: text
    content: Joseph and his sons], who came into Egypt, were seventy.
  '28':
  - type: text
    content: 'Now Jacob (Israel) sent Judah ahead of him to Joseph, to direct him to Goshen; and they came into the land of Goshen. '
  '29':
  - type: text
    content: 'Then Joseph prepared his chariot and went up to meet Israel his father in Goshen; as soon as he presented himself before him (authenticating his identity), he fell on his [father’s] neck and wept on his neck a [very] long time. '
  '3':
  - type: text
    content: 'And He said, “I am God, the God of your father; do not be afraid to go down to Egypt, for I will make you (your descendants) a great nation there. '
  '30':
  - type: text
    content: 'And Israel said to Joseph, “Now let me die [in peace], since I have seen your face [and know] that you are still alive.” '
  '31':
  - type: text
    content: 'Joseph said to his brothers and to his father’s household, “I will go up and tell Pharaoh, and say to him, ‘My brothers and my father’s household, who were in the land of Canaan, have come to me; '
  '32':
  - type: text
    content: 'and the men are shepherds, for they have been keepers of livestock; and they have brought their flocks and their herds and all that they have.’ '
  '33':
  - type: text
    content: 'And it shall be that when Pharaoh calls you and says, ‘What is your occupation?’ '
  '34':
  - type: text
    content: you shall say, ‘Your servants have been keepers of livestock from our youth until now, both we and our fathers [before us],’ in order that you may live [separately and securely] in the land of Goshen; for every shepherd is repulsive to the Egyptians.”
  '4':
  - type: text
    content: I will go down with you to Egypt, and I will also surely bring you (your people) up again; and Joseph will put his hand on your eyes [to close them at the time of your death].”
  '5':
  - type: text
    content: 'So Jacob set out from Beersheba; and the sons of Israel carried their father Jacob and their children and their wives in the wagons that Pharaoh had sent to carry him. '
  '6':
  - type: text
    content: 'And they took their livestock and the possessions which they had acquired in the land of Canaan and came to Egypt, Jacob and all his descendants with him. '
  '7':
  - type: text
    content: His sons and his grandsons, his daughters and his granddaughters, and all his descendants he brought with him to Egypt.
  - type: heading
    content: Those Who Came to Egypt
  '8':
  - type: text
    content: 'Now these are the names of the sons of Israel, Jacob and his sons, who went to Egypt: Reuben, Jacob’s firstborn. '
  '9':
  - type: text
    content: 'The sons of Reuben: Hanoch, Pallu, Hezron, and Carmi. '
