document_id: GEN.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Moves to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Israel set out with all that he had, and came to Beersheba [where both his father and grandfather had worshiped God], and offered sacrifices to the God of his father Isaac. [Gen 21:33; 26:23-25] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And God spoke to Israel in visions of the night and said, “Jacob, Jacob!” And he said, “Here I am.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And He said, “I am God, the God of your father; do not be afraid to go down to Egypt, for I will make you (your descendants) a great nation there. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will go down with you to Egypt, and I will also surely bring you (your people) up again; and Joseph will put his hand on your eyes [to close them at the time of your death].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Jacob set out from Beersheba; and the sons of Israel carried their father Jacob and their children and their wives in the wagons that Pharaoh had sent to carry him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And they took their livestock and the possessions which they had acquired in the land of Canaan and came to Egypt, Jacob and all his descendants with him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: His sons and his grandsons, his daughters and his granddaughters, and all his descendants he brought with him to Egypt.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Those Who Came to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now these are the names of the sons of Israel, Jacob and his sons, who went to Egypt: Reuben, Jacob’s firstborn. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Reuben: Hanoch, Pallu, Hezron, and Carmi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sons of Levi: Gershon, Kohath, and Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Judah: Er, Onan, Shelah, Perez, and Zerah—but Er and Onan died in the land of Canaan. And the sons of Perez were Hezron and Hamul. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Issachar: Tola, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Puah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puvah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jashub
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Job, and Shimron. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The sons of Zebulun: Sered, Elon, and Jahleel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'These are the sons of Leah, whom she bore to Jacob in Paddan-aram, with his daughter Dinah; all of his sons and daughters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: numbered
  - type: text
    text: ' thirty-three. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Gad: Ziphion, Haggi, Shuni, Ezbon, Eri, Arodi, and Areli. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Asher: Imnah, Ishvah, Ishvi, Beriah, and Serah their sister. And the sons of Beriah: Heber and Malchiel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'These are the sons of Zilpah, [the maid] whom Laban gave to Leah his daughter [when she married Jacob]; and she bore to Jacob these sixteen persons [two sons and fourteen grandchildren]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Rachel, Jacob’s wife: Joseph and Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now to Joseph in the land of Egypt were born Manasseh and Ephraim, whom Asenath, the daughter of Potiphera, priest of On (Heliopolis in Egypt), bore to him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And the sons of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Benjamin was already the father of ten sons at the time he met Joseph in Egypt. Joseph was seventeen when his brothers sold him; he was in prison thirteen years; and he had been ruler of Egypt during the seven good years and through two years of the famine. So Joseph was thirty-nine years of age at this time, and Benjamin was only a few years younger.
    marker-yv: yv-n
  - type: text
    text: 'Benjamin: Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These are the sons of Rachel, who were born to Jacob; [there were] fourteen persons in all [two sons and twelve grandchildren]. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The son of Dan: Hushim. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Naphtali: Jahzeel, Guni, Jezer, and Shillem. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'These are the sons of Bilhah, [the maid] whom Laban gave to Rachel his daughter [when she married Jacob]. And she bore these to Jacob; [there were] seven persons in all [two sons and five grandchildren]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'All the persons who came with Jacob into Egypt—who were his direct descendants, not counting the wives of [Jacob or] Jacob’s sons, were sixty-six persons in all, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and the sons of Joseph, who were born to him in Egypt, were two. All the persons of the house of Jacob [including Jacob, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Joseph and his sons were included in the count even though they were already in Egypt.
    marker-yv: yv-n
  - type: text
    text: Joseph and his sons], who came into Egypt, were seventy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now Jacob (Israel) sent Judah ahead of him to Joseph, to direct him to Goshen; and they came into the land of Goshen. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Joseph prepared his chariot and went up to meet Israel his father in Goshen; as soon as he presented himself before him (authenticating his identity), he fell on his [father’s] neck and wept on his neck a [very] long time. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Israel said to Joseph, “Now let me die [in peace], since I have seen your face [and know] that you are still alive.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Joseph said to his brothers and to his father’s household, “I will go up and tell Pharaoh, and say to him, ‘My brothers and my father’s household, who were in the land of Canaan, have come to me; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and the men are shepherds, for they have been keepers of livestock; and they have brought their flocks and their herds and all that they have.’ '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And it shall be that when Pharaoh calls you and says, ‘What is your occupation?’ '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: you shall say, ‘Your servants have been keepers of livestock from our youth until now, both we and our fathers [before us],’ in order that you may live [separately and securely] in the land of Goshen; for every shepherd is repulsive to the Egyptians.”
