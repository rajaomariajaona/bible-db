document_id: JOS.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Canaan Divided among the Tribes
  - type: text
    content: 'Now Joshua was '
  - type: note
    content: I.e. about a hundred years old or more.
  - type: text
    content: old and advanced in years, and the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “You have grown old and advanced in years, and very '
  - type: note
    content: Lit much.
  - type: text
    content: 'substantial portions of the land remain to be possessed. '
  '10':
  - type: text
    content: 'and all the cities of Sihon king of the Amorites, who reigned in Heshbon, as far as the border of the Ammonites; '
  '11':
  - type: text
    content: 'and Gilead, and the territory of the Geshurites and Maacathites, and all Mount Hermon, and all Bashan as far as Salecah; '
  '12':
  - type: text
    content: 'the entire kingdom of Og in Bashan, who reigned in Ashtaroth and Edrei—he alone was left of the remnant of the Rephaim [giants]—for Moses had struck them and dispossessed them. '
  '13':
  - type: text
    content: 'But the sons of Israel did not dispossess the Geshurites or the Maacathites; for Geshur and Maacath live among Israel to this day. '
  '14':
  - type: text
    content: It was only to the tribe of Levi that Moses gave no [territory as an] inheritance; the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, are their inheritance, as He told him.'
  '15':
  - type: text
    content: 'So Moses gave '
  - type: text
    content: an inheritance
  - type: text
    content: ' to the tribe of the sons of Reuben according to their families. '
  '16':
  - type: text
    content: 'Their territory was from Aroer, which is on the edge of the valley of the [river] Arnon, and the city which is in the middle of the valley and all the plain by Medeba; '
  '17':
  - type: text
    content: 'with Heshbon, and all its cities which are on the plain: Dibon and Bamoth-baal and Beth-baal-meon, '
  '18':
  - type: text
    content: 'and Jahaz and Kedemoth and Mephaath, '
  '19':
  - type: text
    content: 'and Kiriathaim and Sibmah and Zereth-shahar on the hill of the valley, '
  '2':
  - type: text
    content: 'This is the land that remains: all the regions of the Philistines and all those of the Geshurites; '
  '20':
  - type: text
    content: 'and Beth-peor and the slopes of Pisgah and Beth-jeshimoth, '
  '21':
  - type: text
    content: 'even all the cities of the plain and all the kingdom of Sihon king of the Amorites who reigned in Heshbon, whom Moses struck down along with the leaders of Midian, Evi and Rekem and Zur and Hur and Reba, the princes of Sihon, who lived in the land. '
  '22':
  - type: text
    content: 'The sons of Israel also killed Balaam the son of Beor, the diviner (soothsayer), with the sword among [the rest of] their slain. [Num 31:16] '
  '23':
  - type: text
    content: The border of the sons of Reuben was the Jordan. This was the inheritance of the sons of Reuben according to their families, with their cities and villages.
  '24':
  - type: text
    content: 'Moses also gave '
  - type: text
    content: an inheritance
  - type: text
    content: ' to the tribe of Gad, to the sons of Gad, according to their families. '
  '25':
  - type: text
    content: 'Their territory was Jazer, and all the cities of Gilead, and half the land of the sons of Ammon, as far as Aroer east of Rabbah; '
  '26':
  - type: text
    content: 'and from Heshbon as far as Ramath-mizpeh and Betonim, and from Mahanaim as far as the border of Debir; '
  '27':
  - type: text
    content: 'and in the valley, Beth-haram and Beth-nimrah and Succoth and Zaphon, the rest of the kingdom of Sihon king of Heshbon, with the Jordan as a border, as far as the '
  - type: text
    content: lower
  - type: text
    content: ' end of the Sea of Chinnereth (Galilee) east of the Jordan. '
  '28':
  - type: text
    content: This is the inheritance of the sons of Gad according to their families, with their cities and their villages.
  '29':
  - type: text
    content: 'Moses also gave '
  - type: text
    content: an inheritance
  - type: text
    content: ' to the half-tribe of Manasseh; and it was for the half-tribe of the sons of Manasseh according to their families. '
  '3':
  - type: text
    content: 'from the Shihor [waterway] which is east of Egypt [at the southern end of Canaan], northward to the border of Ekron (all of it regarded as Canaanite); the five rulers of the Philistines: the Gazite, Ashdodite, the Ashkelonite, the Gittite, the Ekronite; and the '
  - type: note
    content: Inhabitants of the coast before the Philistines.
  - type: text
    content: 'Avvite '
  '30':
  - type: text
    content: 'Their region extended from Mahanaim, all Bashan, the entire kingdom of Og king of Bashan, and all the towns of Jair, which are in Bashan, sixty cities; '
  '31':
  - type: text
    content: also half of Gilead, with Ashtaroth and Edrei, the cities of the kingdom of Og in Bashan; these were for the sons of Machir the son of Manasseh, for half of the sons of Machir according to their families (clans).
  '32':
  - type: text
    content: 'These are '
  - type: text
    content: the territories
  - type: text
    content: ' which Moses distributed as an inheritance in the plains of Moab, beyond the Jordan at Jericho to the east. '
  '33':
  - type: text
    content: But to the tribe of Levi, Moses did not give an inheritance; the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, is their inheritance, as He told them.'
  '4':
  - type: text
    content: 'in the south, all the land of the Canaanite, and Mearah that belongs to the Sidonians, as far as Aphek, to the border of the Amorite; '
  '5':
  - type: text
    content: 'and the land of the Gebalite, and all Lebanon, toward '
  - type: note
    content: Lit sunrise.
  - type: text
    content: 'the east, from Baal-gad below Mount Hermon to the entrance of Hamath. '
  '6':
  - type: text
    content: 'As for all the inhabitants of the hill country from Lebanon to Misrephoth-maim, even all the Sidonians, I will drive them out before Israel; only allot the land to Israel as an inheritance just as I have commanded you. '
  '7':
  - type: text
    content: So now, divide this land [west of the Jordan] as an inheritance for the nine tribes and the half-tribe of Manasseh.”
  '8':
  - type: text
    content: With the other half-tribe [of Manasseh], the Reubenites and the Gadites received their inheritance which Moses gave them beyond the Jordan eastward, just as Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' gave to them; '
  '9':
  - type: text
    content: 'from Aroer on the edge of the valley of the [river] Arnon, and the city in the middle of the valley, and all the plain of Medeba, as far as Dibon; '
