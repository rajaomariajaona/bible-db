document_id: LAM.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Anger over Israel
  - type: text
    content: How the Lord has covered the Daughter of Zion (Jerusalem)
  - type: text
    content: With a cloud in His anger!
  - type: text
    content: He has cast down from heaven to the earth
  - type: text
    content: 'The glory '
  - type: text
    content: and
  - type: text
    content: ' splendor of Israel'
  - type: text
    content: And has not remembered His footstool
  - type: text
    content: In the day of His anger.
  '10':
  - type: text
    content: The elders of the Daughter of Zion
  - type: text
    content: Sit on the ground keeping silent;
  - type: text
    content: They have thrown dust on their heads,
  - type: text
    content: They have covered themselves with sackcloth.
  - type: text
    content: The virgins of Jerusalem
  - type: text
    content: Have bowed their heads to the ground.
  '11':
  - type: text
    content: My eyes fail because of tears [mourns Jeremiah],
  - type: text
    content: My spirit is deeply disturbed;
  - type: text
    content: My heart is poured out on the earth [in grief]
  - type: text
    content: Because of the destruction of the daughter of my people [Jerusalem],
  - type: text
    content: When little ones and infants faint
  - type: text
    content: In the streets of the city.
  '12':
  - type: text
    content: They cry to their mothers,
  - type: text
    content: “Where is grain and wine?”
  - type: text
    content: As they faint like a wounded man
  - type: text
    content: In the streets of the city,
  - type: text
    content: As their life [slips away and] is poured out
  - type: text
    content: In their mothers’ arms.
  '13':
  - type: text
    content: How shall I console you?
  - type: text
    content: To what shall I compare you,
  - type: text
    content: O Daughter of Jerusalem?
  - type: text
    content: With what shall I compare you, so that I may comfort you,
  - type: text
    content: O Virgin Daughter of Zion?
  - type: text
    content: For your ruin is as vast as the sea;
  - type: text
    content: Who can heal you? [Lam 1:12; Dan 9:12]
  '14':
  - type: text
    content: Your prophets have seen (imagined) for you
  - type: text
    content: 'False and foolish '
  - type: text
    content: visions;
  - type: text
    content: And they have not exposed your wickedness
  - type: text
    content: To restore you from captivity [by teaching you to repent],
  - type: text
    content: 'But they have seen (imagined) '
  - type: text
    content: and
  - type: text
    content: ' declared to you false and misleading oracles.'
  '15':
  - type: text
    content: All who pass along the way
  - type: text
    content: 'Clap their hands '
  - type: text
    content: in derision
  - type: text
    content: ' at you;'
  - type: text
    content: They scoff and shake their heads
  - type: text
    content: At the Daughter of Jerusalem, saying,
  - type: text
    content: “Is this the city that was called
  - type: text
    content: ‘The perfection of beauty,
  - type: text
    content: The joy of all the earth’?”
  '16':
  - type: text
    content: All your enemies
  - type: text
    content: Have opened their mouths wide against you;
  - type: text
    content: 'They [scornfully] hiss and gnash '
  - type: text
    content: their
  - type: text
    content: ' teeth.'
  - type: text
    content: They say, “We have swallowed her up!
  - type: text
    content: Certainly this is the day for which we waited;
  - type: text
    content: We have reached it, we have seen it!”
  '17':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has done what He planned;'
  - type: text
    content: He has accomplished His word
  - type: text
    content: 'Which He commanded '
  - type: note
    content: The Jews were well aware of the ancient predictions of the coming judgment against Israel because of their sin.
  - type: text
    content: from days of old.
  - type: text
    content: He has demolished without sparing,
  - type: text
    content: And He has caused the enemy to rejoice over you;
  - type: text
    content: He has exalted the power of your enemies. [Lev 26:14-39; Deut 28:15-68]
  '18':
  - type: text
    content: Their hearts cried out to the Lord.
  - type: text
    content: “O wall of the Daughter of Zion,
  - type: text
    content: Let your tears run down like a river day and night;
  - type: text
    content: Give yourself no relief,
  - type: text
    content: Let your eyes have no rest.
  '19':
  - type: text
    content: “Arise, cry aloud in the night,
  - type: text
    content: At the beginning of the night watches;
  - type: text
    content: Pour out your heart like water
  - type: text
    content: Before the presence of the Lord;
  - type: text
    content: Lift up your hands to Him
  - type: text
    content: For the life of your little ones
  - type: text
    content: Who are faint from hunger
  - type: text
    content: At the head of every street.” [Ps 62:8]
  '2':
  - type: text
    content: The Lord has swallowed up; He has not spared
  - type: text
    content: All the country places of Jacob.
  - type: text
    content: In His wrath He has thrown down
  - type: text
    content: The strongholds of the Daughter of Judah (Jerusalem).
  - type: text
    content: He has brought them down to the ground [in disgrace];
  - type: text
    content: He has debased the kingdom and its princes.
  '20':
  - type: text
    content: See, O L
  - type: heading
    content: ord
  - type: text
    content: ', and look!'
  - type: text
    content: With whom have You dealt this way?
  - type: text
    content: Should women eat their offspring,
  - type: text
    content: 'The little ones '
  - type: text
    content: who were born
  - type: text
    content: ' healthy and beautiful?'
  - type: text
    content: Should priest and prophet be killed
  - type: text
    content: In the sanctuary of the Lord?
  '21':
  - type: text
    content: The young and the old
  - type: text
    content: Lie on the ground in the streets;
  - type: text
    content: My virgins and my young men
  - type: text
    content: Have fallen by the sword.
  - type: text
    content: You have killed them in the day of Your anger,
  - type: text
    content: You have slaughtered, not sparing.
  '22':
  - type: text
    content: You [L
  - type: heading
    content: ord
  - type: text
    content: '] called as in the day of an appointed feast'
  - type: text
    content: My terrors (dangers) on every side;
  - type: text
    content: And there was no one who escaped or survived
  - type: text
    content: In the day of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anger.'
  - type: text
    content: Those I have cared for and brought up with tenderness,
  - type: text
    content: My enemy annihilated them.
  '3':
  - type: text
    content: 'In fierce anger He has cut off '
  - type: text
    content: and
  - type: text
    content: ' destroyed'
  - type: text
    content: 'Every '
  - type: note
    content: The horn is symbolic of strength and power.
  - type: text
    content: horn of Israel.
  - type: text
    content: He has withdrawn His right hand
  - type: text
    content: From the presence of the enemy.
  - type: text
    content: And He has burned in Jacob like a flaming fire
  - type: text
    content: Consuming all around.
  '4':
  - type: text
    content: He has bent His bow like an enemy;
  - type: text
    content: He has set His right hand like an adversary
  - type: text
    content: 'And slain all that were delightful '
  - type: text
    content: and
  - type: text
    content: ' pleasing to the eye;'
  - type: text
    content: In the tent of the Daughter of Zion
  - type: text
    content: He has poured out His wrath like fire.
  '5':
  - type: text
    content: The Lord has become like an enemy;
  - type: text
    content: He has swallowed up Israel.
  - type: text
    content: He has swallowed up all its palaces;
  - type: text
    content: He has destroyed its strongholds
  - type: text
    content: And multiplied in the Daughter of Judah
  - type: text
    content: Mourning and lamentation (expressions of grief).
  '6':
  - type: text
    content: 'And He has violently broken down His temple like a [fragile] garden '
  - type: text
    content: hedge;
  - type: text
    content: He has destroyed His appointed meeting place.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has caused the appointed feast and Sabbath'
  - type: text
    content: To be forgotten in Zion
  - type: text
    content: 'And has despised '
  - type: text
    content: and
  - type: text
    content: ' rejected the king and the priest'
  - type: text
    content: In the indignation of His anger.
  '7':
  - type: text
    content: The Lord has rejected His altar;
  - type: text
    content: He has abandoned His sanctuary.
  - type: text
    content: He has given into the hand of the enemy
  - type: text
    content: The walls of her palaces;
  - type: text
    content: They have made a noise in the house of the L
  - type: heading
    content: ord
  - type: text
    content: As on a day of an appointed feast.
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' determined to lay in ruins'
  - type: text
    content: The [city] wall of the Daughter of Zion.
  - type: text
    content: He has stretched out a line,
  - type: text
    content: He has not stopped His hand from destroying.
  - type: text
    content: He has caused the rampart and the wall to lament (mourn in grief);
  - type: text
    content: They have languished together.
  '9':
  - type: text
    content: Her gates have sunk into the ground;
  - type: text
    content: He has destroyed and broken her bars.
  - type: text
    content: Her king and her princes are [exiled] among the nations;
  - type: text
    content: The law is no more.
  - type: text
    content: Also, her prophets no longer find
  - type: text
    content: Vision from the L
  - type: heading
    content: ord
  - type: text
    content: .
