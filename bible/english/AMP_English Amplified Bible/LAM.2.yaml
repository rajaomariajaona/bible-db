document_id: LAM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Anger over Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: How the Lord has covered the Daughter of Zion (Jerusalem)
- type: usfm
  marker: q1
  children:
  - type: text
    text: With a cloud in His anger!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has cast down from heaven to the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor of Israel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has not remembered His footstool
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the day of His anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The Lord has swallowed up; He has not spared
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the country places of Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In His wrath He has thrown down
- type: usfm
  marker: q1
  children:
  - type: text
    text: The strongholds of the Daughter of Judah (Jerusalem).
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has brought them down to the ground [in disgrace];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has debased the kingdom and its princes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In fierce anger He has cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Every '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: it
        children:
        - type: text
          text: horn
      - type: text
        text: ' is symbolic of strength and power.'
    marker-yv: yv-n
  - type: text
    text: horn of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has withdrawn His right hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the presence of the enemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He has burned in Jacob like a flaming fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: Consuming all around.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He has bent His bow like an enemy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has set His right hand like an adversary
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And slain all that were delightful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to the eye;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the tent of the Daughter of Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has poured out His wrath like fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Lord has become like an enemy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has swallowed up Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has swallowed up all its palaces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has destroyed its strongholds
- type: usfm
  marker: q1
  children:
  - type: text
    text: And multiplied in the Daughter of Judah
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mourning and lamentation (expressions of grief).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And He has violently broken down His temple like a [fragile] garden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hedge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has destroyed His appointed meeting place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has caused the appointed feast and Sabbath'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To be forgotten in Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And has despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected the king and the priest'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the indignation of His anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Lord has rejected His altar;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has abandoned His sanctuary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has given into the hand of the enemy
- type: usfm
  marker: q1
  children:
  - type: text
    text: The walls of her palaces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have made a noise in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: As on a day of an appointed feast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' determined to lay in ruins'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [city] wall of the Daughter of Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has stretched out a line,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has not stopped His hand from destroying.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has caused the rampart and the wall to lament (mourn in grief);
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have languished together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Her gates have sunk into the ground;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has destroyed and broken her bars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her king and her princes are [exiled] among the nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The law is no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Also, her prophets no longer find
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vision from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The elders of the Daughter of Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sit on the ground keeping silent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have thrown dust on their heads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have covered themselves with sackcloth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The virgins of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have bowed their heads to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My eyes fail because of tears [mourns Jeremiah],
- type: usfm
  marker: q1
  children:
  - type: text
    text: My spirit is deeply disturbed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart is poured out on the earth [in grief]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the destruction of the daughter of my people [Jerusalem],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When little ones and infants faint
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the streets of the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They cry to their mothers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is grain and wine?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: As they faint like a wounded man
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the streets of the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As their life [slips away and] is poured out
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their mothers’ arms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: How shall I console you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To what shall I compare you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Daughter of Jerusalem?
- type: usfm
  marker: q1
  children:
  - type: text
    text: With what shall I compare you, so that I may comfort you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Virgin Daughter of Zion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your ruin is as vast as the sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can heal you? [Lam 1:12; Dan 9:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Your prophets have seen (imagined) for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'False and foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: visions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have not exposed your wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: To restore you from captivity [by teaching you to repent],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But they have seen (imagined) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' declared to you false and misleading oracles.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All who pass along the way
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Clap their hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in derision
  - type: text
    text: ' at you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They scoff and shake their heads
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the Daughter of Jerusalem, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is this the city that was called
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The perfection of beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The joy of all the earth’?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All your enemies
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have opened their mouths wide against you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They [scornfully] hiss and gnash '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' teeth.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say, “We have swallowed her up!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certainly this is the day for which we waited;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have reached it, we have seen it!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has done what He planned;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has accomplished His word
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Which He commanded '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jews were well aware of the ancient predictions of the coming judgment against Israel because of their sin.
    marker-yv: yv-n
  - type: text
    text: from days of old.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has demolished without sparing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He has caused the enemy to rejoice over you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has exalted the power of your enemies. [Lev 26:14-39; Deut 28:15-68]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Their hearts cried out to the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “O wall of the Daughter of Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your tears run down like a river day and night;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give yourself no relief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your eyes have no rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Arise, cry aloud in the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the beginning of the night watches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour out your heart like water
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before the presence of the Lord;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift up your hands to Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the life of your little ones
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who are faint from hunger
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the head of every street.” [Ps 62:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: See, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and look!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With whom have You dealt this way?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Should women eat their offspring,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The little ones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who were born
  - type: text
    text: ' healthy and beautiful?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Should priest and prophet be killed
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the sanctuary of the Lord?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The young and the old
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lie on the ground in the streets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My virgins and my young men
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have fallen by the sword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have killed them in the day of Your anger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have slaughtered, not sparing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] called as in the day of an appointed feast'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My terrors (dangers) on every side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there was no one who escaped or survived
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' anger.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those I have cared for and brought up with tenderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My enemy annihilated them.
