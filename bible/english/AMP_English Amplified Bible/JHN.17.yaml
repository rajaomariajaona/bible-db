      children:
      - type: text
        text: Much of Jesus’ discourse and prayer in John 13-17 is reminiscent of God’s comparison of rain and snow to His word in Is 55:10, 11. Like God’s word, Jesus, who was introduced by John as the Word (John 1:1), comes from God (John 16:28; 17:8), accomplishes God’s desire (John 14:10; 17:4, 8) and then returns to God (John 13:33; 14:4; 17:13).The themes of joy and peace found in Isaiah 55:12 also resonate throughout John 13-17; joy (John 15:11; 16:20-24; 17:13) and peace (John 14:27; 16:33). Isaiah 55; 56 has many points of connection with John’s Gospel as a whole, most notably the invitations to quench thirst (Is 55:1; John 4:13, 14; 7:37) and receive bread (Is 55:2; John 6:26-35, 48-51). Other points of connection between Is 55; 56 and John include the tie between listening and living, appeals to witnesses, calls to obedience, the idea of a special window of God’s nearness, and the inclusion of the Gentiles in salvation.
