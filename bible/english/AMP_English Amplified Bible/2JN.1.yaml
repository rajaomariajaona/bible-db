document_id: 2JN.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Walk According to His Commandments
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The elder [of the church addresses this letter] to the elect (chosen) '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many scholars believe the words “lady and her children” refer to a specific woman and her family; some others view the words “lady and her children” as the personification of a church and its members.
      marker-yv: yv-n
    - type: text
      text: 'lady and her children, whom I love in truth—and not only I, but also all who know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand the truth— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If anyone comes to you and does not bring this teaching [but diminishes or adds to the doctrine of Christ], do not receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' welcome him into your house, and do not give him a greeting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' any encouragement; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: for the one who gives him a greeting [who encourages him or wishes him success, unwittingly] participates in his evil deeds.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I have many things to write to you, but I prefer not to do so with paper (papyrus) and black (ink); but I hope to come to you and speak with you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth to mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'face to face, so that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One early ms reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: our
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: your joy may be complete. [Num 12:8]
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The children of your elect (chosen) sister greet you.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'because of the truth which lives in our hearts and will be with us forever: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Grace, mercy, and peace (inner calm, a sense of spiritual well-being) will be with us, from God the Father and from Jesus Christ, the Father’s Son, in truth and love.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I was greatly delighted to find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of your children walking in truth, just as we have been commanded by the Father. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now I ask you, lady, not as if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I were
    - type: text
      text: ' writing to you a new commandment, but [simply reminding you of] the one which we have had from the beginning, that we '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape)
        - type: text
          text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
      marker-yv: yv-n
    - type: text
      text: 'love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unselfishly seek the best for one another. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And this is love: that we walk in accordance with His commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are guided continually by His precepts. This is the commandment, just as you have heard from the beginning, that you should [always] walk in love.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For many deceivers [heretics, posing as Christians] have gone out into the world, those who do not acknowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confess the coming of Jesus Christ in the flesh (bodily form). This [person, the kind who does this] is the deceiver and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John is not referring to the Antichrist of Revelation, but is using the term generally of anyone who is opposed to the cause of Christ.
      marker-yv: yv-n
    - type: text
      text: 'antichrist [that is, the antagonist of Christ]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Watch yourselves, so that you do not lose what we have accomplished together, but that you may receive a full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfect reward [when He grants rewards to faithful believers]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Anyone who runs on ahead and does not remain in the doctrine of Christ [that is, one who is not content with what He taught], does not have God; but the one who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continues
    - type: text
      text: ' to remain in the teaching [of Christ does have God], he has both the Father and the Son. '
