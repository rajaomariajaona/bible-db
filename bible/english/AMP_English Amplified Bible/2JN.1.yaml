  - type: text
    content: 'because of the truth which lives in our hearts and will be with us forever: '
  '3':
  - type: text
    content: Grace, mercy, and peace (inner calm, a sense of spiritual well-being) will be with us, from God the Father and from Jesus Christ, the Father’s Son, in truth and love.
  '4':
  - type: text
    content: 'I was greatly delighted to find '
  - type: text
    content: some
  - type: text
    content: ' of your children walking in truth, just as we have been commanded by the Father. '
