  '6':
  - type: text
    content: 'And this is love: that we walk in accordance with His commandments '
  - type: text
    content: and
  - type: text
    content: ' are guided continually by His precepts. This is the commandment, just as you have heard from the beginning, that you should [always] walk in love.'
  '7':
  - type: text
    content: 'For many deceivers [heretics, posing as Christians] have gone out into the world, those who do not acknowledge '
  - type: text
