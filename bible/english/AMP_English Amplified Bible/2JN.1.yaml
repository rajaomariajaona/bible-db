  - type: text
    content: ' any encouragement; '
  '11':
  - type: text
    content: for the one who gives him a greeting [who encourages him or wishes him success, unwittingly] participates in his evil deeds.
  '12':
  - type: text
    content: 'I have many things to write to you, but I prefer not to do so with paper (papyrus) and black (ink); but I hope to come to you and speak with you '
