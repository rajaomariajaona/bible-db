    content: Walk According to His Commandments
  - type: text
    content: 'The elder [of the church addresses this letter] to the elect (chosen) '
  - type: note
    content: Many scholars believe the words “lady and her children” refer to a specific woman and her family; some others view the words “lady and her children” as the personification of a church and its members.
  - type: text
    content: 'lady and her children, whom I love in truth—and not only I, but also all who know '
  - type: text
    content: and
  - type: text
    content: ' understand the truth— '
  '10':
  - type: text
    content: 'If anyone comes to you and does not bring this teaching [but diminishes or adds to the doctrine of Christ], do not receive '
  - type: text
    content: or
  - type: text
    content: ' welcome him into your house, and do not give him a greeting '
  - type: text
