  - type: heading
    content: Psalm 113
  - type: heading
    content: The Lord Exalts the Humble.
  - type: text
    content: ' '
  - type: note
    content: It is said that Psalms 113-118 were ordained by the prophets and Torah scholars to be recited as a unit on special holy days. The unit was called the Hallel (Heb “Praise”).
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! ('
  - type: note
    content: According to Jewish tradition, one who had the office of Reader in a congregation would read the Psalms of the Hallel aloud, and when he came to a command to “Praise the Lord” (Heb Halelu Yah), it was the congregation’s duty to respond with “Hallelujah!”
  - type: text
    content: Hallelujah!)
  - type: text
    content: Praise, O servants of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Praise the name of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '2':
  - type: text
    content: Blessed be the name of the L
  - type: heading
    content: ord
  - type: text
    content: From this time forth and forever.
  '3':
  - type: text
    content: From the rising of the sun to its setting
  - type: text
    content: The name of the L
  - type: heading
    content: ord
  - type: text
    content: ' is to be praised [with awe-inspired reverence].'
  '4':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is high above all nations,'
  - type: text
    content: And His glory above the heavens.
  '5':
  - type: text
    content: ¶Who is like the L
  - type: heading
