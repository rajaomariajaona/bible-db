      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' Exalts the Humble.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '113:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'It is said that Psalms 113-118 were ordained by the prophets and Torah scholars to be recited as a unit on special holy days. The unit was called the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hallel
        - type: text
          text: ' (Heb “Praise”).'
      marker-yv: yv-n
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! ('
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '113:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'According to Jewish tradition, one who had the office of Reader in a congregation would read the Psalms of the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hallel
        - type: text
          text: ' aloud, and when he came to a command to “Praise the L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: '” (Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Halelu Yah)
        - type: text
          text: ', it was the congregation’s duty to respond with “Hallelujah!”'
      marker-yv: yv-n
    - type: text
      text: Hallelujah!)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise, O servants of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Blessed be the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From this time forth and forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: From the rising of the sun to its setting
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is to be praised [with awe-inspired reverence].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is high above all nations,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His glory above the heavens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶Who is like the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is enthroned on high,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Who humbles Himself to regard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens and the earth? [Ps 138:6; Is 57:15]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He raises the poor out of the dust
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lifts the needy from the ash heap,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: That He may seat them with princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the princes of His people.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He makes the barren woman live in the house
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a joyful mother of children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
