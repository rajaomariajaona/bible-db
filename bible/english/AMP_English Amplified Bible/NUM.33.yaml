document_id: NUM.33,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Review of the Journey from Egypt to Jordan
  - type: text
    content: 'These are the stages of the journeys of the Israelites, by which they came out of the land of Egypt by their [tribal] armies, under the leadership of Moses and Aaron. '
  '10':
  - type: text
    content: 'They moved out from Elim and camped by the Red Sea (Sea of Reeds). '
  '11':
  - type: text
    content: 'They moved out from the Red Sea and camped in the Wilderness of Sin. '
  '12':
  - type: text
    content: 'They moved out from the Wilderness of Sin and camped at Dophkah. '
  '13':
  - type: text
    content: 'They moved out from Dophkah and camped at Alush. '
  '14':
  - type: text
    content: 'They moved out from Alush and camped at Rephidim; now it was there that the people had no water to drink. '
  '15':
  - type: text
    content: 'They moved out from Rephidim and camped in the Wilderness of Sinai [where they remained for about a year]. '
  '16':
  - type: text
    content: They moved out from the Wilderness of Sinai and camped at Kibroth-hattaavah.
  '17':
  - type: text
    content: 'They moved out from Kibroth-hattaavah and camped at Hazeroth. '
  '18':
  - type: text
    content: 'They moved out from Hazeroth and camped at Rithmah [near Kadesh, the place from which the twelve spies were sent to spy out the land of Canaan]. '
  '19':
  - type: text
    content: 'They moved out from Rithmah and camped at Rimmon-perez. '
  '2':
  - type: text
    content: Moses recorded their points of departure, as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded, stage by stage; and these are their journeys according to their points of departure: '
  '20':
  - type: text
    content: 'They moved out from Rimmon-perez and camped at Libnah. '
  '21':
  - type: text
    content: 'They moved out from Libnah and camped at Rissah. '
  '22':
  - type: text
    content: 'They moved out from Rissah and camped at Kehelathah. '
  '23':
  - type: text
    content: 'They moved out from Kehelathah and camped at Mount Shepher. '
  '24':
  - type: text
    content: 'They moved out from Mount Shepher and camped at Haradah. '
  '25':
  - type: text
    content: 'They moved out from Haradah and camped at Makheloth. '
  '26':
  - type: text
    content: 'They moved out from Makheloth and camped at Tahath. '
  '27':
  - type: text
    content: 'They moved out from Tahath and camped at Terah. '
  '28':
  - type: text
    content: 'They moved out from Terah and camped at Mithkah. '
  '29':
  - type: text
    content: 'They moved out from Mithkah and camped at Hashmonah. '
  '3':
  - type: text
    content: 'They set out from Rameses on the fifteenth day of the first month; on the day after the Passover the Israelites moved out triumphantly in the sight of all the Egyptians, '
  '30':
  - type: text
    content: 'They moved out from Hashmonah and camped at Moseroth. '
  '31':
  - type: text
    content: 'They moved out from Moseroth and camped at Bene-jaakan. '
  '32':
  - type: text
    content: 'They moved out from Bene-jaakan and camped at Hor-haggidgad. '
  '33':
  - type: text
    content: 'They moved out from Hor-haggidgad and camped at Jotbathah. '
  '34':
  - type: text
    content: 'They moved out from Jotbathah and camped at Abronah. '
  '35':
  - type: text
    content: 'They moved out from Abronah and camped at Ezion-geber [or Elath on the gulf of Aqabah]. '
  '36':
  - type: text
    content: 'They moved out from Ezion-geber and camped in the Wilderness of Zin, which is Kadesh. '
  '37':
  - type: text
    content: They moved out from Kadesh and camped at Mount Hor, on the edge of the land of Edom.
  '38':
  - type: text
    content: Aaron the priest went up on Mount Hor at the command of the L
  - type: heading
    content: ord
  - type: text
    content: ', and died there in the fortieth year after the Israelites came out of the land of Egypt, on the first day of the fifth month. [Num 20:23-29] '
  '39':
  - type: text
    content: Aaron was a hundred and twenty-three years old when he died on Mount Hor.
  '4':
  - type: text
    content: while the Egyptians were burying all their firstborn whom the L
  - type: heading
    content: ord
  - type: text
    content: ' had struck down among them. Upon their gods the L'
  - type: heading
    content: ord
  - type: text
    content: ' also executed judgments.'
  '40':
  - type: text
    content: The Canaanite king of Arad, who lived in the Negev (the South country) in the land of Canaan, heard that the sons of Israel were coming.
  '41':
  - type: text
    content: 'They moved out from Mount Hor and camped at Zalmonah. '
  '42':
  - type: text
    content: 'Then they moved out from Zalmonah and camped at Punon. '
  '43':
  - type: text
    content: 'They moved out from Punon and camped at Oboth. '
  '44':
  - type: text
    content: 'They moved out from Oboth and camped at Iye-abarim, on the border of Moab. '
  '45':
  - type: text
    content: 'They moved out from Iyim (Iye-abarim) and camped at Dibon-gad. '
  '46':
  - type: text
    content: 'They moved out from Dibon-gad and camped at Almon-diblathaim. '
  '47':
  - type: text
    content: 'They moved out from Almon-diblathaim and camped in the mountains of Abarim, before [Mount] Nebo. '
  '48':
  - type: text
    content: 'They moved out from the mountains of Abarim and camped in the plains of Moab by the Jordan across from Jericho [their last stop on the journey to Canaan]. '
  '49':
  - type: text
    content: They camped by the Jordan from Beth-jeshimoth as far as Abel-shittim in the plains of Moab.
  - type: heading
    content: Law of Possessing the Land
  '5':
  - type: text
    content: 'Then the Israelites moved out from Rameses [where they had all joined together], and camped in Succoth. '
  '50':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses in the plains of Moab by the Jordan '
  - type: text
    content: across from
  - type: text
    content: ' Jericho, saying, '
  '51':
  - type: text
    content: '“Say to the children of Israel, ‘When you cross the Jordan into the land of Canaan, '
  '52':
  - type: text
    content: 'then you shall drive out all the inhabitants of the land before you and destroy all their sculpted images, and destroy all their cast idols and completely eliminate all their [idolatrous] high places, '
  '53':
  - type: text
    content: 'and you shall take possession of the land and live in it, for I have given the land to you to possess. '
  '54':
  - type: text
    content: 'You shall inherit the land by lot according to your families; to the large '
  - type: text
    content: tribe
  - type: text
    content: ' you shall give a larger inheritance, and to the small '
  - type: text
    content: tribe
  - type: text
    content: ' you shall give a smaller inheritance. Wherever the lot falls to any man, that shall be [the location of] his [inheritance]. According to the tribes of your fathers (ancestors) you shall inherit. '
  '55':
  - type: text
    content: 'But if you do not drive out the inhabitants of the land from before you, then those you let remain of them will be like pricks in your eyes and like thorns in your sides, and they will attack you in the land in which you live. '
  '56':
  - type: text
    content: And as I [the L
  - type: heading
    content: ord
  - type: text
    content: '] planned to do to them, so I will do to you.’ ”'
  '6':
  - type: text
    content: 'They moved out from Succoth and camped in Etham, which is on the edge of the wilderness. '
  '7':
  - type: text
    content: 'They moved out from Etham and turned back to Pi-hahiroth, east of Baal-zephon, and they camped before Migdol. '
  '8':
  - type: text
    content: 'They moved out from before Pi-hahiroth and passed through the midst of the [Red] Sea into the wilderness; and they went a three days’ journey in the Wilderness of Etham and camped at Marah. '
  '9':
  - type: text
    content: 'They moved out from Marah and came to Elim; in Elim there were twelve springs of water and seventy palm trees, and they camped there. '
