document_id: JOB.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bildad Says God Rewards the Good
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Bildad the Shuhite answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How long will you say these things?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will the words of your mouth be a mighty wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Does God pervert justice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or does '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the Almighty pervert righteousness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “If your children have sinned against Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then He has handed them over to the power of their transgression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “If you would [diligently] seek God
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And implore the compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor of the Almighty,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then, if you are pure and upright,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely now He will awaken for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And restore your righteous place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Though your beginning was insignificant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet your end will greatly increase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Inquire, please, of past generations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apply yourself to the things searched out by their fathers.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“For we are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' of yesterday and know nothing,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because our days on earth are [like] a shadow [just a breath or a vapor].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Will they (the fathers) not teach you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tell you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And utter words from their hearts [the deepest part of their nature]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶“Can the papyrus grow up without a marsh?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Can the rushes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reed grass grow without water?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “While it is still green (in flower) and not cut down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet it withers before any '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' plant [when without water].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “So are the paths of all who forget God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the hope of the godless will perish,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For his confidence is fragile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' breaks,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his trust is [like] a spider’s web.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “He trusts in his house, but it does not stand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He holds tightly to it, but it does not endure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“He thrives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prospers [like a green plant] before the sun,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his branches spread out over his garden.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “His [godless] roots are wrapped around a pile of rocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he gazes at a house of stones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “If he is snatched from his place [in the garden],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then his place will forget him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' ‘I have never seen you.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Behold, this is the joy of His way;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And from out of the dust others will spring up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grow [to take his place].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Behold, God will not reject a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man of
  - type: text
    text: ' integrity,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor will He strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' support evildoers.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “He will yet fill your mouth with laughter
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your lips with joyful shouting [if you are found blameless].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Those who hate you will be clothed with shame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the tents of the wicked will be no longer.”
