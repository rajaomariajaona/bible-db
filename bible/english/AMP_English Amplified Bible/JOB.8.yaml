document_id: JOB.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bildad Says God Rewards the Good
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Bildad the Shuhite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Will they (the fathers) not teach you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tell you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And utter words from their hearts [the deepest part of their nature]?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Can the papyrus grow up without a marsh?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Can the rushes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reed grass grow without water?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “While it is still green (in flower) and not cut down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet it withers before any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' plant [when without water].'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So are the paths of all who forget God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the hope of the godless will perish,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For his confidence is fragile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' breaks,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his trust is [like] a spider’s web.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He trusts in his house, but it does not stand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He holds tightly to it, but it does not endure.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“He thrives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prospers [like a green plant] before the sun,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his branches spread out over his garden.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His [godless] roots are wrapped around a pile of rocks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he gazes at a house of stones.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If he is snatched from his place [in the garden],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then his place will forget him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' ‘I have never seen you.’'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, this is the joy of His way;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And from out of the dust others will spring up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grow [to take his place].'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How long will you say these things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will the words of your mouth be a mighty wind?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behold, God will not reject a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man of
    - type: text
      text: ' integrity,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor will He strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' support evildoers.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will yet fill your mouth with laughter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your lips with joyful shouting [if you are found blameless].
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who hate you will be clothed with shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the tents of the wicked will be no longer.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Does God pervert justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or does '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the Almighty pervert righteousness?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If your children have sinned against Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then He has handed them over to the power of their transgression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished them.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you would [diligently] seek God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And implore the compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor of the Almighty,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, if you are pure and upright,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely now He will awaken for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And restore your righteous place.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though your beginning was insignificant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet your end will greatly increase.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Inquire, please, of past generations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' apply yourself to the things searched out by their fathers.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For we are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' of yesterday and know nothing,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because our days on earth are [like] a shadow [just a breath or a vapor].
