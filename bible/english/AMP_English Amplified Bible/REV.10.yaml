  - type: text
    text: trumpet call of the seventh angel, when he is about to sound, then the mystery of God [that is, His hidden purpose and plan] is finished, as He announced the gospel to His servants the prophets. [Dan 12:6; Rom 11:25; 1 Cor 15:55; 2 Thess 2:7]
- type: usfm
