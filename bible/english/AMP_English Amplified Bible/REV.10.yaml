  - type: text
    text: 'Then I saw another mighty angel coming down from heaven, clothed in a cloud, with a rainbow (halo) over his head; and his face was like the sun, and his feet (legs) were like columns of fire; [Ex 13:21, 22; Ezek 1:26-28; Dan 7:13; Matt 17:2] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he had a little book (scroll) open in his hand. He set his right foot on the sea and his left foot on the land; [Ezek 2:9; Hos 11:10] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and he shouted with a loud voice, like the roaring of a lion [compelling attention and inspiring awe]; and when he had shouted out, the seven peals of thunder spoke with their own voices [uttering their message in distinct words]. [Ps 29] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when the seven peals of thunder had spoken, I was about to write; but I heard a voice from heaven saying, “Seal up the things which the seven peals of thunder have spoken and do not write them down.” [2 Cor 12:4] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the angel whom I had seen standing on the sea and the land raised his right hand [to swear an oath] to heaven, [Deut 32:40; Dan 12:6, 7] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and swore [an oath] by [the name of] Him who lives forever and ever, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: who created heaven and the things in it
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and the earth and the things in it
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and the sea and the things in it
  - type: text
    text: ', that there will be delay no longer, [Neh 9:6] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
