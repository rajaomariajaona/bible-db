    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the voice which I heard from heaven, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I heard
  - type: text
    text: ' again speaking to me, and saying, “Go, take the book (scroll) which is open in the hand of the angel who is standing on the sea and on the land.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So I went up to the angel and told him to give me the little book. And he said to me, “Take it and eat it; it will make your stomach bitter, but in your mouth it will be as sweet as honey.” [Ezek 2:8, 9; 3:1-3] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So I took the little book from the angel’s hand and ate it, and in my mouth it was as sweet as honey; but once I had swallowed it, my stomach was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. John was encouraged by the Word of God but was saddened as he realized the approaching judgment on unbelievers.
    marker-yv: yv-n
  - type: text
    text: 'bitter. [Ps 119:103; Jer 15; 16] '
  - type: usfm
    marker: v
    metadata:
