document_id: REV.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel and the Little Book
  - type: text
    content: 'Then I saw another mighty angel coming down from heaven, clothed in a cloud, with a rainbow (halo) over his head; and his face was like the sun, and his feet (legs) were like columns of fire; [Ex 13:21, 22; Ezek 1:26-28; Dan 7:13; Matt 17:2] '
  '10':
  - type: text
    content: 'So I took the little book from the angel’s hand and ate it, and in my mouth it was as sweet as honey; but once I had swallowed it, my stomach was '
  - type: note
    content: I.e. John was encouraged by the Word of God but was saddened as he realized the approaching judgment on unbelievers.
  - type: text
    content: 'bitter. [Ps 119:103; Jer 15; 16] '
  '11':
  - type: text
    content: Then they said to me, “You must prophesy again concerning many peoples and nations and languages and kings.” [Jer 1:10]
  '2':
  - type: text
    content: 'and he had a little book (scroll) open in his hand. He set his right foot on the sea and his left foot on the land; [Ezek 2:9; Hos 11:10] '
  '3':
  - type: text
    content: 'and he shouted with a loud voice, like the roaring of a lion [compelling attention and inspiring awe]; and when he had shouted out, the seven peals of thunder spoke with their own voices [uttering their message in distinct words]. [Ps 29] '
  '4':
  - type: text
    content: 'And when the seven peals of thunder had spoken, I was about to write; but I heard a voice from heaven saying, “Seal up the things which the seven peals of thunder have spoken and do not write them down.” [2 Cor 12:4] '
  '5':
  - type: text
    content: 'Then the angel whom I had seen standing on the sea and the land raised his right hand [to swear an oath] to heaven, [Deut 32:40; Dan 12:6, 7] '
  '6':
  - type: text
    content: 'and swore [an oath] by [the name of] Him who lives forever and ever, '
  - type: heading
    content: who created heaven and the things in it
  - type: text
    content: ', '
  - type: heading
    content: and the earth and the things in it
  - type: text
    content: ', '
  - type: heading
    content: and the sea and the things in it
  - type: text
    content: ', that there will be delay no longer, [Neh 9:6] '
  '7':
  - type: text
    content: 'but '
  - type: note
    content: Lit in the days of.
  - type: text
    content: 'when it is time for the '
  - type: note
    content: Lit voice.
  - type: text
    content: trumpet call of the seventh angel, when he is about to sound, then the mystery of God [that is, His hidden purpose and plan] is finished, as He announced the gospel to His servants the prophets. [Dan 12:6; Rom 11:25; 1 Cor 15:55; 2 Thess 2:7]
  '8':
  - type: text
    content: 'Then the voice which I heard from heaven, '
  - type: text
    content: I heard
  - type: text
    content: ' again speaking to me, and saying, “Go, take the book (scroll) which is open in the hand of the angel who is standing on the sea and on the land.” '
  '9':
  - type: text
    content: 'So I went up to the angel and told him to give me the little book. And he said to me, “Take it and eat it; it will make your stomach bitter, but in your mouth it will be as sweet as honey.” [Ezek 2:8, 9; 3:1-3] '
