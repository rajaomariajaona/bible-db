  - type: text
    content: 'As they have [expectantly] waited '
  - type: text
    content: to take
  - type: text
    content: ' my life.'
  '7':
  - type: text
    content: Cast them out because of their wickedness.
  - type: text
    content: In anger bring down the peoples, O God!
  '8':
  - type: text
    content: ¶You have taken account of my wanderings;
  - type: text
    content: Put my tears in Your bottle.
  - type: text
    content: Are they not recorded in Your book?
  '9':
  - type: text
    content: Then my enemies will turn back in the day when I call;
  - type: text
    content: This I know, that God is for me. [Rom 8:31]
