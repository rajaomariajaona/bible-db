  - type: heading
    content: Supplication for Rescue and Grateful Trust in God.
  - type: text
    content: To the Chief Musician; set to [the tune of] “Silent Dove Among Those Far Away.” A Mikhtam of David. [A record of memorable thoughts] when the Philistines seized him in Gath.
  - type: text
    content: Be gracious to me, O God, for man has trampled on me;
  - type: text
    content: 'All day long the adversary oppresses '
  - type: text
    content: and
  - type: text
    content: ' torments me.'
