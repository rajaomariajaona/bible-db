document_id: PSA.56,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 56
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Supplication for Rescue and Grateful Trust in God.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “Silent Dove Among Those Far Away.” A Mikhtam of David. [A record of memorable thoughts] when the Philistines seized him in Gath.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Be gracious to me, O God, for man has trampled on me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All day long the adversary oppresses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torments me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whose
    - type: text
      text: ' word I praise,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whose
    - type: text
      text: ' word I praise,'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In God have I put my trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident reliance; I will not be afraid.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What can man do to me?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Your vows are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: binding
    - type: text
      text: ' upon me, O God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give thank offerings to You.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For You have rescued my soul from death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, and my feet from stumbling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that I may walk before God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the light of life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My enemies have trampled upon me all day long,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are many who fight proudly against me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When I am afraid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will put my trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faith in You.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: In God, whose word I praise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In God I have put my trust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shall not fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What can mere man do to me?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'All day long they twist my words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' say hurtful things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their thoughts are against me for evil.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They attack, they hide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lurk,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They watch my steps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As they have [expectantly] waited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to take
    - type: text
      text: ' my life.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Cast them out because of their wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In anger bring down the peoples, O God!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶You have taken account of my wanderings;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put my tears in Your bottle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are they not recorded in Your book?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then my enemies will turn back in the day when I call;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This I know, that God is for me. [Rom 8:31]
