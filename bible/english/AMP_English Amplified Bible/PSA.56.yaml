  '13':
  - type: text
    content: For You have rescued my soul from death,
  - type: text
    content: Yes, and my feet from stumbling,
  - type: text
    content: So that I may walk before God
  - type: text
    content: In the light of life.
  '2':
  - type: text
    content: My enemies have trampled upon me all day long,
  - type: text
    content: For they are many who fight proudly against me.
  '3':
  - type: text
    content: When I am afraid,
  - type: text
    content: 'I will put my trust '
  - type: text
    content: and
  - type: text
    content: ' faith in You.'
  '4':
  - type: text
    content: In God, whose word I praise;
  - type: text
    content: In God I have put my trust;
  - type: text
    content: I shall not fear.
  - type: text
    content: What can mere man do to me?
  '5':
  - type: text
    content: 'All day long they twist my words '
  - type: text
    content: and
  - type: text
    content: ' say hurtful things;'
  - type: text
    content: All their thoughts are against me for evil.
  '6':
  - type: text
    content: 'They attack, they hide '
  - type: text
    content: and
  - type: text
    content: ' lurk,'
  - type: text
