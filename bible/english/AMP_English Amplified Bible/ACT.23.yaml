    - type: text
      text: '1'
  - type: text
    text: 'Then Paul, looking intently at the Council (Sanhedrin, Jewish High Court), said, “Kinsmen, I have lived my life before God with a perfectly good conscience until this very day.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '[At this] the high priest '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ananias served as high priest from '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '. 47-59. He was a violent man who had close ties to Rome and was assassinated by his own people about '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 66.
    marker-yv: yv-n
  - type: text
    text: 'Ananias ordered those who stood beside him to strike Paul on the mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Paul said to him, “God is going to strike you, you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul probably is referring to the outside wall of a tomb, which was considered ritually unclean and polluted. Tombs were usually whitewashed on the outside so that passers-by could see them more clearly and avoid contact with them.
    marker-yv: yv-n
  - type: text
    text: 'whitewashed wall! Do you actually sit to judge me according to the Law, and yet in violation of the Law order me to be struck?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But those who stood near Paul said, “Are you insulting the high priest of God?” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Paul said, “I was not aware, brothers, that he was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Under Roman domination, high priests did not serve for life but were replaced from time to time. Paul had not been updated on the current status of the office.
    marker-yv: yv-n
  - type: text
    text: high priest; for it is written, ‘Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou shall not speak evil of a ruler of your people
  - type: text
    text: .’ ” [Ex 22:28]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But recognizing that one group were Sadducees and the other Pharisees, Paul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' affirming loudly in the Council '
  - type: usfm
    marker: it
    children:
    - type: text
      text: chamber,
  - type: text
    text: ' “Kinsmen, I am a Pharisee, a son of Pharisees; I am on trial for the hope and resurrection of the dead!” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When he said this, an angry dispute erupted between the Pharisees and the Sadducees, and the [whole crowded] assembly was divided [into two factions]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the Sadducees say that there is no [such thing as a] resurrection, nor an angel, nor a spirit, but the Pharisees [speak out freely and] acknowledge [their belief in] them all. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then a great uproar occurred, and some of the scribes of the Pharisees’ party stood up and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to argue heatedly [in Paul’s favor], saying, “We find nothing wrong with this man; suppose a spirit or an angel has [really] spoken to him?” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And as the dissension became even greater, the commander, fearing that Paul would be torn to pieces by them, ordered the troops to go down and forcibly take him from them, and bring him to the barracks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On the following night the Lord stood near Paul and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Be brave; for as you have solemnly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfully witnessed about Me at Jerusalem, so you must also testify at Rome.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Conspiracy to Kill Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when day came, the Jews formed a conspiracy and bound themselves under an oath (curse), saying that they would not eat or drink until they had killed Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There were more than forty [men] who formed this plot [and swore this oath]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They went to the chief priests and elders and said, “We have bound ourselves under a solemn oath not to taste anything [neither food nor drink] until we have killed Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So now you, along with the Council (Sanhedrin, Jewish High Court), notify the commander to bring Paul down to you, as if you were going to investigate his case more thoroughly. But we are ready to kill him before he comes near [the place].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the son of Paul’s sister heard of their [planned] ambush, and he went to the barracks and told Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Paul, calling in one of the centurions, said, “Take this young man to the commander, for he has something to tell him.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So he took him and led him to the commander and said, “Paul the prisoner called for me and asked me to bring this young man to you, because he has something to tell you.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The commander took him by the hand and stepping aside, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to ask him privately, “What is it that you have to tell me?” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he said, “The Jews have agreed to ask you to bring Paul down to the Council (Sanhedrin, Jewish High Court) tomorrow, as if they were going to interrogate him more thoroughly. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But do not listen to them, for more than forty of them are lying in wait for him, and they have bound themselves with an oath not to eat or drink until they have killed him. Even now they are ready, just waiting for your promise.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So the commander let the young man leave, instructing him, “Do not tell anyone that you have given me this information.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Moved to Caesarea Maritima
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then summoning two of the centurions, he said, “Have two hundred soldiers ready by the third hour of the night (9:00 p.m.) to go as far as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Caesarea Maritima (Caesarea-on-the-Sea) was a coastal city built by Herod the Great. It was an important city, both politically and militarily, and its harbor was the largest on the eastern Mediterranean coast. It was the capital of Judea, and the official residence of the prefects and procurators (governors) appointed by Rome. Both Pontius Pilate (prefect, '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '. 26-36) and Marcus Antonius Felix (procurator, '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 52-60) would have been based here during their respective terms of office.
    marker-yv: yv-n
  - type: text
    text: 'Caesarea, with seventy horsemen and two hundred '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: slingers
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bowmen
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'spearmen; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'also provide mounts for Paul to ride, and bring him safely to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Marcus Antonius Felix was appointed by Emperor Claudius and served as procurator (governor) of Judea from '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 52-60.
    marker-yv: yv-n
  - type: text
    text: 'Felix the governor.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And [after instructing the centurions] he wrote a letter to this effect:'
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Claudius Lysias, to the most excellent governor Felix, greetings.
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: This man was seized [as a prisoner] by the Jews and was about to be killed by them, when I came upon him with the troops and rescued him, having learned that he was a Roman citizen.
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And wanting to know the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exact
  - type: text
    text: ' charge which they were making against him, I brought him down to their Council (Sanhedrin, Jewish High Court);'
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and I discovered that he was accused in regard to questions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' issues in their Law, but [he was] under no accusation that would call for the penalty of death or [even] for imprisonment.'
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: When I was told that there would be a plot against the man, I sent him to you immediately, also directing his accusers to bring their charges against him before you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So the soldiers, in compliance with their orders, took Paul and brought him to Antipatris during the night. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the next day, leaving the horsemen to go on with him, they returned to the barracks. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When these [horsemen] reached Caesarea, they delivered the letter to the governor, and also presented Paul to him. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'After reading the letter, he asked which province Paul was from, and when he learned that he was from Cilicia [an imperial province], '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: he said, “I will hear your case when your accusers have arrived,” giving orders that Paul be kept under guard in Herod’s Praetorium (the governor’s official residence).
