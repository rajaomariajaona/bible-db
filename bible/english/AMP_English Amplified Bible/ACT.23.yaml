document_id: ACT.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul before the Council
  - type: text
    content: 'Then Paul, looking intently at the Council (Sanhedrin, Jewish High Court), said, “Kinsmen, I have lived my life before God with a perfectly good conscience until this very day.” '
  '10':
  - type: text
    content: And as the dissension became even greater, the commander, fearing that Paul would be torn to pieces by them, ordered the troops to go down and forcibly take him from them, and bring him to the barracks.
  '11':
  - type: text
    content: 'On the following night the Lord stood near Paul and said, '
  - type: text
    content: '“Be brave; for as you have solemnly '
  - type: text
    content: and
  - type: text
    content: ' faithfully witnessed about Me at Jerusalem, so you must also testify at Rome.”'
  - type: heading
    content: A Conspiracy to Kill Paul
  '12':
  - type: text
    content: 'Now when day came, the Jews formed a conspiracy and bound themselves under an oath (curse), saying that they would not eat or drink until they had killed Paul. '
  '13':
  - type: text
    content: 'There were more than forty [men] who formed this plot [and swore this oath]. '
  '14':
  - type: text
    content: 'They went to the chief priests and elders and said, “We have bound ourselves under a solemn oath not to taste anything [neither food nor drink] until we have killed Paul. '
  '15':
  - type: text
    content: So now you, along with the Council (Sanhedrin, Jewish High Court), notify the commander to bring Paul down to you, as if you were going to investigate his case more thoroughly. But we are ready to kill him before he comes near [the place].”
  '16':
  - type: text
    content: 'But the son of Paul’s sister heard of their [planned] ambush, and he went to the barracks and told Paul. '
  '17':
  - type: text
    content: 'Then Paul, calling in one of the centurions, said, “Take this young man to the commander, for he has something to tell him.” '
  '18':
  - type: text
    content: 'So he took him and led him to the commander and said, “Paul the prisoner called for me and asked me to bring this young man to you, because he has something to tell you.” '
  '19':
  - type: text
    content: 'The commander took him by the hand and stepping aside, '
  - type: text
    content: began
  - type: text
    content: ' to ask him privately, “What is it that you have to tell me?” '
  '2':
  - type: text
    content: '[At this] the high priest '
  - type: note
    content: Ananias served as high priest from a.d. 47-59. He was a violent man who had close ties to Rome and was assassinated by his own people about a.d. 66.
  - type: text
    content: 'Ananias ordered those who stood beside him to strike Paul on the mouth. '
  '20':
  - type: text
    content: 'And he said, “The Jews have agreed to ask you to bring Paul down to the Council (Sanhedrin, Jewish High Court) tomorrow, as if they were going to interrogate him more thoroughly. '
  '21':
  - type: text
    content: 'But do not listen to them, for more than forty of them are lying in wait for him, and they have bound themselves with an oath not to eat or drink until they have killed him. Even now they are ready, just waiting for your promise.” '
  '22':
  - type: text
    content: So the commander let the young man leave, instructing him, “Do not tell anyone that you have given me this information.”
  - type: heading
    content: Paul Moved to Caesarea Maritima
  '23':
  - type: text
    content: 'Then summoning two of the centurions, he said, “Have two hundred soldiers ready by the third hour of the night (9:00 p.m.) to go as far as '
  - type: note
    content: Caesarea Maritima (Caesarea-on-the-Sea) was a coastal city built by Herod the Great. It was an important city, both politically and militarily, and its harbor was the largest on the eastern Mediterranean coast. It was the capital of Judea, and the official residence of the prefects and procurators (governors) appointed by Rome. Both Pontius Pilate (prefect, a.d. 26-36) and Marcus Antonius Felix (procurator, a.d. 52-60) would have been based here during their respective terms of office.
  - type: text
    content: 'Caesarea, with seventy horsemen and two hundred '
  - type: note
    content: Or slingers or bowmen.
  - type: text
    content: 'spearmen; '
  '24':
  - type: text
    content: 'also provide mounts for Paul to ride, and bring him safely to '
  - type: note
    content: Marcus Antonius Felix was appointed by Emperor Claudius and served as procurator (governor) of Judea from a.d. 52-60.
  - type: text
    content: 'Felix the governor.” '
  '25':
  - type: text
    content: 'And [after instructing the centurions] he wrote a letter to this effect:'
  '26':
  - type: text
    content: “Claudius Lysias, to the most excellent governor Felix, greetings.
  '27':
  - type: text
    content: This man was seized [as a prisoner] by the Jews and was about to be killed by them, when I came upon him with the troops and rescued him, having learned that he was a Roman citizen.
  '28':
  - type: text
    content: 'And wanting to know the '
  - type: text
    content: exact
  - type: text
    content: ' charge which they were making against him, I brought him down to their Council (Sanhedrin, Jewish High Court);'
  '29':
  - type: text
    content: 'and I discovered that he was accused in regard to questions '
  - type: text
    content: and
  - type: text
    content: ' issues in their Law, but [he was] under no accusation that would call for the penalty of death or [even] for imprisonment.'
  '3':
  - type: text
    content: 'Then Paul said to him, “God is going to strike you, you '
  - type: note
    content: Paul probably is referring to the outside wall of a tomb, which was considered ritually unclean and polluted. Tombs were usually whitewashed on the outside so that passers-by could see them more clearly and avoid contact with them.
  - type: text
    content: 'whitewashed wall! Do you actually sit to judge me according to the Law, and yet in violation of the Law order me to be struck?” '
  '30':
  - type: text
    content: When I was told that there would be a plot against the man, I sent him to you immediately, also directing his accusers to bring their charges against him before you.”
  '31':
  - type: text
    content: 'So the soldiers, in compliance with their orders, took Paul and brought him to Antipatris during the night. '
  '32':
  - type: text
    content: 'And the next day, leaving the horsemen to go on with him, they returned to the barracks. '
  '33':
  - type: text
    content: 'When these [horsemen] reached Caesarea, they delivered the letter to the governor, and also presented Paul to him. '
  '34':
  - type: text
    content: 'After reading the letter, he asked which province Paul was from, and when he learned that he was from Cilicia [an imperial province], '
  '35':
  - type: text
    content: he said, “I will hear your case when your accusers have arrived,” giving orders that Paul be kept under guard in Herod’s Praetorium (the governor’s official residence).
  '4':
  - type: text
    content: 'But those who stood near Paul said, “Are you insulting the high priest of God?” '
  '5':
  - type: text
    content: 'Paul said, “I was not aware, brothers, that he was '
  - type: note
    content: Under Roman domination, high priests did not serve for life but were replaced from time to time. Paul had not been updated on the current status of the office.
  - type: text
    content: high priest; for it is written, ‘Y
  - type: heading
    content: ou shall not speak evil of a ruler of your people
  - type: text
    content: .’ ” [Ex 22:28]
  '6':
  - type: text
    content: 'But recognizing that one group were Sadducees and the other Pharisees, Paul '
  - type: text
    content: began
  - type: text
    content: ' affirming loudly in the Council '
  - type: text
    content: chamber,
  - type: text
    content: ' “Kinsmen, I am a Pharisee, a son of Pharisees; I am on trial for the hope and resurrection of the dead!” '
  '7':
  - type: text
    content: 'When he said this, an angry dispute erupted between the Pharisees and the Sadducees, and the [whole crowded] assembly was divided [into two factions]. '
  '8':
  - type: text
    content: 'For the Sadducees say that there is no [such thing as a] resurrection, nor an angel, nor a spirit, but the Pharisees [speak out freely and] acknowledge [their belief in] them all. '
  '9':
  - type: text
    content: 'Then a great uproar occurred, and some of the scribes of the Pharisees’ party stood up and '
  - type: text
    content: began
  - type: text
    content: ' to argue heatedly [in Paul’s favor], saying, “We find nothing wrong with this man; suppose a spirit or an angel has [really] spoken to him?” '
