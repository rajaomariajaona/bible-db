document_id: ZEC.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem to Be Attacked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 9:1.
      marker-yv: yv-n
    - type: text
      text: oracle (a burdensome message) of the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' concerning Israel.'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: hus declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who stretches out the heavens and lays the foundation of the earth and forms the spirit of man within him: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I will pour out on the house of David and on the people of Jerusalem, the Spirit of grace (unmerited favor) and supplication. And they will look at Me whom they have pierced; and they will mourn for Him as one mourns for an only son, and they will weep bitterly over Him as one who weeps bitterly over a firstborn. [John 19:37; Rev 1:7] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day there shall be a great mourning in Jerusalem, like the mourning of [the city of] Hadadrimmon in the Valley of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Megiddon.
      marker-yv: yv-n
    - type: text
      text: 'Megiddo [over beloved King '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: King Josiah was mortally wounded at the age of thirty-nine, and his death sparked an extraordinarily deep sense of grief among the people. That same kind of deep grief will characterize the mourning of Israel when they recognize their once-crucified Messiah who has come to reign.
      marker-yv: yv-n
    - type: text
      text: 'Josiah]. [2 Chr 35:22-25] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The land will mourn, every family by itself; the [royal] family of the house of David by itself and their wives by themselves; the family of the house of Nathan [David’s son] by itself and their wives by themselves; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the [priestly] family of the house of Levi by itself and their wives by themselves; the family of Shimei [grandson of Levi] by itself and their wives by themselves; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: all the families that remain, each by itself, and their wives by themselves [each with an overwhelming individual regret for having blindly rejected their Messiah].
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Behold, I am going to make Jerusalem a cup that causes reeling (staggering) to all the surrounding peoples; and when the siege is against Jerusalem, it will also be against Judah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in that day I will make Jerusalem a heavy stone for all the peoples; all who lift it will be severely injured. And all the nations of the earth will come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be gathered against it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “I will strike every horse with panic and his rider with madness; but I will open My eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watch over the house of Judah, and will strike every horse of the [opposing] nations with blindness. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the clans of Judah will say in their hearts, ‘The inhabitants of Jerusalem are our strength in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, their God.’'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In that day I will make the clans of Judah like a firepot in a woodpile, and like a flaming torch among sheaves [of grain]. They will devour all the surrounding peoples on the right hand and on the left; and the people of Jerusalem will again live [securely] in their own place, in Jerusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall save the tents of Judah first, so that the glory of the house of David and the glory of the inhabitants of Jerusalem will not be magnified above Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will defend the people of Jerusalem, and the one who is impaired among them in that day [of persecution] will become [strong and noble] like David; and the house of David '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. maintain its supremacy.
      marker-yv: yv-n
    - type: text
      text: 'will be like God, like the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Ex 14:19; 23:20; 32:34; 33:2, 14, 15, 22; Hos 12:3, 4.
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [who is] before them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And in that day I will seek to destroy all the nations that come against Jerusalem.
