  - type: text
    content: ' who stretches out the heavens and lays the foundation of the earth and forms the spirit of man within him: '
  '10':
  - type: text
    content: '“I will pour out on the house of David and on the people of Jerusalem, the Spirit of grace (unmerited favor) and supplication. And they will look at Me whom they have pierced; and they will mourn for Him as one mourns for an only son, and they will weep bitterly over Him as one who weeps bitterly over a firstborn. [John 19:37; Rev 1:7] '
  '11':
  - type: text
    content: 'In that day there shall be a great mourning in Jerusalem, like the mourning of [the city of] Hadadrimmon in the Valley of '
  - type: note
    content: Heb Megiddon.
  - type: text
    content: 'Megiddo [over beloved King '
  - type: note
    content: King Josiah was mortally wounded at the age of thirty-nine, and his death sparked an extraordinarily deep sense of grief among the people. That same kind of deep grief will characterize the mourning of Israel when they recognize their once-crucified Messiah who has come to reign.
  - type: text
    content: 'Josiah]. [2 Chr 35:22-25] '
  '12':
  - type: text
    content: 'The land will mourn, every family by itself; the [royal] family of the house of David by itself and their wives by themselves; the family of the house of Nathan [David’s son] by itself and their wives by themselves; '
  '13':
  - type: text
    content: 'the [priestly] family of the house of Levi by itself and their wives by themselves; the family of Shimei [grandson of Levi] by itself and their wives by themselves; '
  '14':
  - type: text
    content: all the families that remain, each by itself, and their wives by themselves [each with an overwhelming individual regret for having blindly rejected their Messiah].
  '2':
  - type: text
    content: '“Behold, I am going to make Jerusalem a cup that causes reeling (staggering) to all the surrounding peoples; and when the siege is against Jerusalem, it will also be against Judah. '
  '3':
  - type: text
    content: 'And in that day I will make Jerusalem a heavy stone for all the peoples; all who lift it will be severely injured. And all the nations of the earth will come '
  - type: text
    content: and
  - type: text
    content: ' be gathered against it. '
  '4':
  - type: text
    content: In that day,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ', “I will strike every horse with panic and his rider with madness; but I will open My eyes '
  - type: text
    content: and
  - type: text
    content: ' watch over the house of Judah, and will strike every horse of the [opposing] nations with blindness. '
  '5':
  - type: text
    content: Then the clans of Judah will say in their hearts, ‘The inhabitants of Jerusalem are our strength in the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, their God.’'
  '6':
  - type: text
    content: '“In that day I will make the clans of Judah like a firepot in a woodpile, and like a flaming torch among sheaves [of grain]. They will devour all the surrounding peoples on the right hand and on the left; and the people of Jerusalem will again live [securely] in their own place, in Jerusalem. '
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' shall save the tents of Judah first, so that the glory of the house of David and the glory of the inhabitants of Jerusalem will not be magnified above Judah. '
  '8':
  - type: text
    content: In that day the L
  - type: heading
    content: ord
  - type: text
    content: ' will defend the people of Jerusalem, and the one who is impaired among them in that day [of persecution] will become [strong and noble] like David; and the house of David '
  - type: note
    content: I.e. maintain its supremacy.
  - type: text
    content: 'will be like God, like the '
  - type: note
    content: See Ex 14:19; 23:20; 32:34; 33:2, 14, 15, 22; Hos 12:3, 4.
  - type: text
    content: Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' [who is] before them. '
  '9':
  - type: text
    content: And in that day I will seek to destroy all the nations that come against Jerusalem.
