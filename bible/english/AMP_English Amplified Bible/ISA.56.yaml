  '10':
  - type: text
    content: Israel’s watchmen are blind,
  - type: text
    content: They are all without knowledge.
  - type: text
    content: They are all mute dogs, they cannot bark;
  - type: text
    content: Panting, lying down, they love to slumber.
  '11':
  - type: text
    content: 'And the dogs are greedy; they '
  - type: note
    content: Lit do not know satisfaction.
  - type: text
    content: never have enough.
  - type: text
    content: They are shepherds who have no understanding;
  - type: text
    content: They have all turned to their own way,
  - type: text
    content: Each one to his unlawful gain, without exception.
  '12':
  - type: text
    content: “Come,” [they say,] “let us get wine, and let us fill ourselves with strong drink;
  - type: text
    content: And tomorrow will be like today, very great indeed.”
  '2':
  - type: text
    content: “Blessed (happy, fortunate) is the man who does this,
  - type: text
    content: And the son of man who takes hold of it,
  - type: text
    content: Who keeps the Sabbath without profaning it,
  - type: text
    content: And keeps his hand from doing any evil.”
