    content: Resolve to Punish the Guilty
  - type: text
    content: Then all the sons of Israel from Dan [in the north] to Beersheba [in the south], including the land of Gilead came out, and the congregation assembled as one man to the L
  - type: heading
    content: ord
  - type: text
    content: ' at Mizpah. '
  '10':
  - type: text
    content: 'and we will take ten men out of a hundred throughout the tribes of Israel, and a hundred out of a thousand, and a thousand out of ten thousand to bring provisions for the men, so that when they come to Gibeah of Benjamin, they may punish them for all the despicable acts which they have committed in Israel.” '
  '11':
  - type: text
    content: So all the men of Israel assembled against the city, united as one man.
  '12':
  - type: text
    content: 'Then the tribes of Israel sent men through the entire tribe of Benjamin, saying, “What is this evil thing that has been done among you? '
  '13':
  - type: text
    content: 'Now therefore, turn over the men [involved], the '
  - type: note
    content: Lit sons of Belial.
  - type: text
    content: 'worthless '
  - type: text
    content: and
  - type: text
    content: ' wicked men in Gibeah, so that we may put them to death and remove '
  - type: text
    content: this
  - type: text
    content: ' wickedness from Israel.” But the Benjamites would not listen to the voice of their brothers, the sons of Israel. '
  '14':
  - type: text
    content: 'Then the [tribe of the] sons of Benjamin gathered from the cities to Gibeah, to go out to battle against the [other] sons of Israel. '
  '15':
  - type: text
    content: 'And the Benjamites assembled out of their cities at that time twenty-six thousand men who drew the sword, besides the inhabitants of Gibeah, who assembled seven hundred chosen men. '
  '16':
  - type: text
    content: 'Out of all these people were seven hundred choice '
  - type: note
    content: Lit impeded in the right hand.
  - type: text
    content: 'left-handed men; each one could sling stones at [a target no wider than] a hair and not '
  - type: note
    content: This is the verb usually translated as to sin.
  - type: text
    content: miss.
  '17':
  - type: text
    content: Then the men of Israel, other than Benjamin, assembled four hundred thousand men who drew the sword; all of these were men of war.
  - type: heading
    content: Civil War, Benjamin Defeated
  '18':
  - type: text
    content: 'The men of Israel arose and went up to '
  - type: note
    content: Apparently the ark of the covenant and the high priest were in Bethel.
  - type: text
    content: Bethel and asked of God and said, “Which of us shall take the lead to battle against the sons [tribe] of Benjamin?” And the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Judah [shall go up] first.”'
  '19':
  - type: text
    content: 'Then the [fighting men of the] sons of Israel arose in the morning and camped against Gibeah. '
  '2':
  - type: text
    content: 'The chiefs of all the people of all the tribes of Israel, presented themselves in the assembly of the people of God, four hundred thousand men on foot who drew the sword. '
  '20':
  - type: text
    content: 'The men of Israel went out to battle against Benjamin, and assembled in battle formation against them at Gibeah. '
  '21':
  - type: text
    content: 'The sons of Benjamin came out of Gibeah and struck to the ground on that day twenty-two thousand [fighting] men of Israel. '
  '22':
  - type: text
    content: 'But the people, the [fighting] men of Israel, took courage '
  - type: text
    content: and
  - type: text
    content: ' strengthened themselves and again set their battle line in the same place where they formed it the first day. '
  '23':
  - type: text
    content: The sons of Israel went up and wept before the L
  - type: heading
    content: ord
  - type: text
    content: ' until evening, and asked of the L'
  - type: heading
    content: ord
  - type: text
    content: ', “Shall we advance again to battle against the sons of our brother Benjamin?” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said, “Go up against them.”'
  '24':
  - type: text
    content: 'So the sons of Israel came against the sons of Benjamin the second day. '
  '25':
  - type: text
    content: 'And [the fighting men from the tribe of] Benjamin went out of Gibeah against them the second day and again struck to the ground the sons of Israel, eighteen thousand men, all of whom were swordsmen. '
  '26':
  - type: text
    content: Then all the sons of Israel and all the people went up and came to Bethel and wept; and they sat there before the L
  - type: heading
    content: ord
  - type: text
    content: ' and fasted that day until evening and offered burnt offerings and peace offerings before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '27':
  - type: text
    content: And the sons of Israel inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ' (for the ark of the covenant of God was there [at Bethel] in those days, '
  '28':
  - type: text
    content: 'and Phinehas the son of Eleazar, the son of Aaron, '
  - type: text
    content: ministered
  - type: text
    content: ' before it in those days), saying, “Shall I yet again go out to battle against the sons of my brother Benjamin, or shall I quit?” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said, “Go up, for tomorrow I will hand them over to you.”'
  '29':
  - type: text
    content: 'So Israel set men in ambush around Gibeah. '
  '3':
  - type: text
    content: '(Now the Benjamites [in whose territory the crime was committed] heard that the [other tribes of the] sons of Israel had gone up to Mizpah.) And the sons of Israel said, “How did this evil thing happen?” '
  '30':
  - type: text
    content: 'The [fighting men of the] sons of Israel went up against the sons of Benjamin on the third day and placed themselves in battle formation against Gibeah as at other times. '
  '31':
  - type: text
    content: 'The Benjamites went out against '
  - type: note
    content: Lit the people.
  - type: text
    content: 'their army and were lured away from the city, and they began to strike and kill some of the people as at other times, on the highways, one of which goes up to Bethel and the other to Gibeah, and in the open country, about thirty men of Israel. '
  '32':
  - type: text
    content: 'And the Benjamites said, “They are defeated before us, as at the first.” But the sons of Israel said, “Let us flee and lure them away from the city to the highways.” '
  '33':
  - type: text
    content: 'Then all the men of Israel got up from their places and placed themselves in battle formation at Baal-tamar; and the men of Israel [who were] in ambush rushed from their place in the plain of Maareh-geba. '
  '34':
  - type: text
    content: 'When the ten thousand choice [fighting] men from all Israel came against Gibeah, the battle was hard '
  - type: text
    content: and
  - type: text
    content: ' fierce; but the Benjamites did not realize that disaster was about to strike them. '
  '35':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' struck down [the tribe of] Benjamin before Israel, so that the sons of Israel destroyed twenty-five thousand one hundred men of Benjamin that day, all of whom were swordsmen.'
  '36':
  - type: text
    content: 'So the Benjamites realized that they were defeated. Then men of Israel gave ground to the Benjamites, because they relied on the men in ambush whom they had placed against Gibeah. '
  '37':
  - type: text
    content: 'Then the men in ambush quickly rushed and attacked Gibeah; and the men in ambush also deployed and struck the entire city with the edge of the sword. '
  '38':
  - type: text
    content: 'Now the appointed signal between the men of Israel and the men in ambush was that they would make a great cloud of smoke rise from the city. '
  '39':
  - type: text
    content: 'So the men of Israel turned in the battle, and Benjamin began to strike and kill about thirty men of Israel, for they said, “Certainly they are defeated before us as in the first battle!” '
  '4':
  - type: text
    content: 'So the Levite, the husband of the woman who was murdered, replied, “I had come with my concubine to spend the night in Gibeah, [a town] which belongs to [the tribe of] Benjamin. '
  '40':
  - type: text
    content: 'But when the [signal] cloud began to rise out of the city in a column of smoke, the Benjamites looked behind them; and behold, the entire city went up '
  - type: text
    content: in smoke
  - type: text
    content: ' to heaven. '
  '41':
  - type: text
    content: 'When the men of Israel turned back '
  - type: text
    content: again
  - type: text
    content: ', the men of Benjamin were terrified, for they saw that disaster had fallen upon them. '
  '42':
  - type: text
    content: 'Therefore, they turned their backs before the men of Israel [and fled] toward the direction of the wilderness, but the battle followed '
  - type: text
    content: and
  - type: text
    content: ' overtook them. As the [fighting men of the] sons of Benjamin ran among them, the Israelites of the cities came out and destroyed them. '
  '43':
  - type: text
    content: 'They surrounded [the men of] Benjamin, pursued them relentlessly, and overtook them opposite Gibeah toward the east. '
  '44':
  - type: text
    content: 'Thus eighteen thousand men of Benjamin fell, all of these brave '
  - type: text
    content: and
  - type: text
    content: ' able warriors. '
  '45':
  - type: text
    content: 'The survivors [of Benjamin] turned and fled toward the wilderness to the rock of Rimmon, and Israel caught five thousand of them on the roads and overtook them at Gidom and killed two thousand of them. '
  '46':
  - type: text
    content: 'So all of Benjamin who fell that day were twenty-five thousand men who drew the sword, all of them brave '
  - type: text
    content: and
  - type: text
    content: ' able warriors. '
  '47':
  - type: text
    content: 'But six hundred men turned and fled toward the wilderness to the rock of Rimmon and stayed at the rock of Rimmon for four months. '
  '48':
  - type: text
    content: The men of Israel turned back against [the tribe of] the sons of Benjamin and struck them with the edge of the sword, both the entire city [of Gibeah] and the livestock and all that they found. They also set on fire all the [surrounding] towns which they found.
  '5':
  - type: text
    content: 'But the men of Gibeah rose up against me and surrounded the house at night because of me. They intended to kill me, but instead they raped my concubine [so brutally] that she died. '
  '6':
  - type: text
    content: 'So I took my concubine and cut her [corpse] in pieces and sent her [body parts] throughout the land of the inheritance of Israel; for the men of Gibeah have committed a lewd and disgraceful act in Israel. '
  '7':
  - type: text
    content: Now then, all you sons of Israel, all of you, give your advice and counsel here [regarding what should be done].”
  '8':
  - type: text
    content: 'Then all the people stood [unified] as one man, saying, “None of us will go to his tent, and none of us will return to his home [until this is settled]. '
  '9':
  - type: text
    content: 'But now this is the thing which we will do to Gibeah; '
  - type: text
    content: we will go up
  - type: text
    content: ' by lot against it, '
