document_id: JDG.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Resolve to Punish the Guilty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then all the sons of Israel from Dan [in the north] to Beersheba [in the south], including the land of Gilead came out, and the congregation assembled as one man to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' at Mizpah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and we will take ten men out of a hundred throughout the tribes of Israel, and a hundred out of a thousand, and a thousand out of ten thousand to bring provisions for the men, so that when they come to Gibeah of Benjamin, they may punish them for all the despicable acts which they have committed in Israel.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So all the men of Israel assembled against the city, united as one man.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then the tribes of Israel sent men through the entire tribe of Benjamin, saying, “What is this evil thing that has been done among you? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now therefore, turn over the men [involved], the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Belial
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wicked men in Gibeah, so that we may put them to death and remove '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' wickedness from Israel.” But the Benjamites would not listen to the voice of their brothers, the sons of Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the [tribe of the] sons of Benjamin gathered from the cities to Gibeah, to go out to battle against the [other] sons of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the Benjamites assembled out of their cities at that time twenty-six thousand men who drew the sword, besides the inhabitants of Gibeah, who assembled seven hundred chosen men. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Out of all these people were seven hundred choice '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: impeded in the right hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'left-handed men; each one could sling stones at [a target no wider than] a hair and not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This is the verb usually translated as '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to sin
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: miss.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the men of Israel, other than Benjamin, assembled four hundred thousand men who drew the sword; all of these were men of war.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Civil War, Benjamin Defeated
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The men of Israel arose and went up to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Apparently the ark of the covenant and the high priest were in Bethel.
      marker-yv: yv-n
    - type: text
      text: Bethel and asked of God and said, “Which of us shall take the lead to battle against the sons [tribe] of Benjamin?” And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Judah [shall go up] first.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the [fighting men of the] sons of Israel arose in the morning and camped against Gibeah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The chiefs of all the people of all the tribes of Israel, presented themselves in the assembly of the people of God, four hundred thousand men on foot who drew the sword. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The men of Israel went out to battle against Benjamin, and assembled in battle formation against them at Gibeah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The sons of Benjamin came out of Gibeah and struck to the ground on that day twenty-two thousand [fighting] men of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But the people, the [fighting] men of Israel, took courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthened themselves and again set their battle line in the same place where they formed it the first day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The sons of Israel went up and wept before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' until evening, and asked of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Shall we advance again to battle against the sons of our brother Benjamin?” And the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Go up against them.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So the sons of Israel came against the sons of Benjamin the second day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And [the fighting men from the tribe of] Benjamin went out of Gibeah against them the second day and again struck to the ground the sons of Israel, eighteen thousand men, all of whom were swordsmen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then all the sons of Israel and all the people went up and came to Bethel and wept; and they sat there before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and fasted that day until evening and offered burnt offerings and peace offerings before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And the sons of Israel inquired of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' (for the ark of the covenant of God was there [at Bethel] in those days, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and Phinehas the son of Eleazar, the son of Aaron, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ministered
    - type: text
      text: ' before it in those days), saying, “Shall I yet again go out to battle against the sons of my brother Benjamin, or shall I quit?” And the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Go up, for tomorrow I will hand them over to you.”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So Israel set men in ambush around Gibeah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '(Now the Benjamites [in whose territory the crime was committed] heard that the [other tribes of the] sons of Israel had gone up to Mizpah.) And the sons of Israel said, “How did this evil thing happen?” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The [fighting men of the] sons of Israel went up against the sons of Benjamin on the third day and placed themselves in battle formation against Gibeah as at other times. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The Benjamites went out against '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the people
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'their army and were lured away from the city, and they began to strike and kill some of the people as at other times, on the highways, one of which goes up to Bethel and the other to Gibeah, and in the open country, about thirty men of Israel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And the Benjamites said, “They are defeated before us, as at the first.” But the sons of Israel said, “Let us flee and lure them away from the city to the highways.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then all the men of Israel got up from their places and placed themselves in battle formation at Baal-tamar; and the men of Israel [who were] in ambush rushed from their place in the plain of Maareh-geba. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'When the ten thousand choice [fighting] men from all Israel came against Gibeah, the battle was hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fierce; but the Benjamites did not realize that disaster was about to strike them. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' struck down [the tribe of] Benjamin before Israel, so that the sons of Israel destroyed twenty-five thousand one hundred men of Benjamin that day, all of whom were swordsmen.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'So the Benjamites realized that they were defeated. Then men of Israel gave ground to the Benjamites, because they relied on the men in ambush whom they had placed against Gibeah. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Then the men in ambush quickly rushed and attacked Gibeah; and the men in ambush also deployed and struck the entire city with the edge of the sword. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Now the appointed signal between the men of Israel and the men in ambush was that they would make a great cloud of smoke rise from the city. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'So the men of Israel turned in the battle, and Benjamin began to strike and kill about thirty men of Israel, for they said, “Certainly they are defeated before us as in the first battle!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So the Levite, the husband of the woman who was murdered, replied, “I had come with my concubine to spend the night in Gibeah, [a town] which belongs to [the tribe of] Benjamin. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But when the [signal] cloud began to rise out of the city in a column of smoke, the Benjamites looked behind them; and behold, the entire city went up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in smoke
    - type: text
      text: ' to heaven. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'When the men of Israel turned back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ', the men of Benjamin were terrified, for they saw that disaster had fallen upon them. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Therefore, they turned their backs before the men of Israel [and fled] toward the direction of the wilderness, but the battle followed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overtook them. As the [fighting men of the] sons of Benjamin ran among them, the Israelites of the cities came out and destroyed them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'They surrounded [the men of] Benjamin, pursued them relentlessly, and overtook them opposite Gibeah toward the east. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Thus eighteen thousand men of Benjamin fell, all of these brave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' able warriors. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'The survivors [of Benjamin] turned and fled toward the wilderness to the rock of Rimmon, and Israel caught five thousand of them on the roads and overtook them at Gidom and killed two thousand of them. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'So all of Benjamin who fell that day were twenty-five thousand men who drew the sword, all of them brave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' able warriors. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'But six hundred men turned and fled toward the wilderness to the rock of Rimmon and stayed at the rock of Rimmon for four months. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: The men of Israel turned back against [the tribe of] the sons of Benjamin and struck them with the edge of the sword, both the entire city [of Gibeah] and the livestock and all that they found. They also set on fire all the [surrounding] towns which they found.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But the men of Gibeah rose up against me and surrounded the house at night because of me. They intended to kill me, but instead they raped my concubine [so brutally] that she died. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So I took my concubine and cut her [corpse] in pieces and sent her [body parts] throughout the land of the inheritance of Israel; for the men of Gibeah have committed a lewd and disgraceful act in Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now then, all you sons of Israel, all of you, give your advice and counsel here [regarding what should be done].”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then all the people stood [unified] as one man, saying, “None of us will go to his tent, and none of us will return to his home [until this is settled]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But now this is the thing which we will do to Gibeah; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we will go up
    - type: text
      text: ' by lot against it, '
