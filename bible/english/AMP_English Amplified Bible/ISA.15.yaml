document_id: ISA.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judgment on Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) concerning Moab:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because in a night Ar of Moab is devastated and ruined;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because in a night Kir of Moab is devastated and ruined.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They have gone up to the temple and to Dibon, to the high places to weep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab wails over Nebo and over Medeba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone’s head is shaved, and every beard is cut off [in mourning]. [Jer 48:37]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In their streets they have wrapped themselves with sackcloth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On their [flat] housetops and in their open squares
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone is wailing, dissolved in tears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Heshbon and Elealeh [cities claimed by Moab] cry out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their voice is heard as far as Jahaz.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore the armed men of Moab cry out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab’s soul trembles within him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My heart cries out for Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His fugitives are [fleeing] as far as Zoar and Eglath-shelishiyah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they go up the ascent of Luhith weeping;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For on the road to Horonaim they raise a cry of distress over their destruction. [Jer 48:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For the waters of Nimrim are desolate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed the grass is withered, the new growth dies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no green thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore the abundance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' they have acquired and stored away'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They carry off over the Brook of the Willows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For the cry of distress has echoed around the territory of Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The wailing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: goes
  - type: text
    text: ' as far as Eglaim and the mournful cry to Beer-elim.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the waters of Dimon are full of blood;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet I will bring even more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: woes
  - type: text
    text: ' on Dimon—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A lion upon those of Moab who escape and upon the remnant of the land.
