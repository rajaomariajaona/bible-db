document_id: ISA.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Moab
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning Moab:'
  - type: text
    content: Because in a night Ar of Moab is devastated and ruined;
  - type: text
    content: Because in a night Kir of Moab is devastated and ruined.
  '2':
  - type: text
    content: They have gone up to the temple and to Dibon, to the high places to weep.
  - type: text
    content: Moab wails over Nebo and over Medeba;
  - type: text
    content: Everyone’s head is shaved, and every beard is cut off [in mourning]. [Jer 48:37]
  '3':
  - type: text
    content: In their streets they have wrapped themselves with sackcloth;
  - type: text
    content: On their [flat] housetops and in their open squares
  - type: text
    content: Everyone is wailing, dissolved in tears.
  '4':
  - type: text
    content: Heshbon and Elealeh [cities claimed by Moab] cry out;
  - type: text
    content: Their voice is heard as far as Jahaz.
  - type: text
    content: Therefore the armed men of Moab cry out;
  - type: text
    content: Moab’s soul trembles within him.
  '5':
  - type: text
    content: My heart cries out for Moab;
  - type: text
    content: His fugitives are [fleeing] as far as Zoar and Eglath-shelishiyah.
  - type: text
    content: For they go up the ascent of Luhith weeping;
  - type: text
    content: For on the road to Horonaim they raise a cry of distress over their destruction. [Jer 48:5]
  '6':
  - type: text
    content: For the waters of Nimrim are desolate.
  - type: text
    content: Indeed the grass is withered, the new growth dies;
  - type: text
    content: There is no green thing.
  '7':
  - type: text
    content: 'Therefore the abundance '
  - type: text
    content: which
  - type: text
    content: ' they have acquired and stored away'
  - type: text
    content: They carry off over the Brook of the Willows.
  '8':
  - type: text
    content: For the cry of distress has echoed around the territory of Moab;
  - type: text
    content: 'The wailing '
  - type: text
    content: goes
  - type: text
    content: ' as far as Eglaim and the mournful cry to Beer-elim.'
  '9':
  - type: text
    content: For the waters of Dimon are full of blood;
  - type: text
    content: 'Yet I will bring even more '
  - type: text
    content: woes
  - type: text
    content: ' on Dimon—'
  - type: text
    content: A lion upon those of Moab who escape and upon the remnant of the land.
