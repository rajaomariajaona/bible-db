document_id: EZK.37,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Vision of the Valley of Dry Bones
  - type: text
    content: The hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was upon me, and He brought me out in the Spirit of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and set me down in the middle of the valley; and it was full of bones. '
  '10':
  - type: text
    content: So I prophesied as He commanded me, and the breath came into them, and they came to life and stood up on their feet, an exceedingly great army. [Rev 11:11]
  - type: heading
    content: The Vision Explained
  '11':
  - type: text
    content: 'Then He said to me, “Son of man, these bones are the whole house of Israel. Behold, they say, ‘Our bones are dried up and our hope is lost. We are completely cut off.’ '
  '12':
  - type: text
    content: Therefore prophesy and say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I will open your graves and make you come up out of your graves, My people; and I will bring you [back home] to the land of Israel. [Hos 13:14] '
  '13':
  - type: text
    content: Then you will know [with confidence] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ', when I have opened your graves and made you come up out of your graves, My people. '
  '14':
  - type: text
    content: 'I will put My '
  - type: note
    content: Or breath.
  - type: text
    content: Spirit in you and you will come to life, and I will place you in your own land. Then you will know that I the L
  - type: heading
    content: ord
  - type: text
    content: ' have spoken, and fulfilled it,” says the L'
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  - type: heading
    content: Reunion of Judah and Israel
  '15':
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came again to me, saying, '
  '16':
  - type: text
    content: '“And you, son of man, take a stick and write on it, ‘For Judah and for the children of Israel, his companions’; then take another stick and write on it, ‘For Joseph, the stick of Ephraim and all the house of Israel, his companions.’ '
  '17':
  - type: text
    content: 'Then join them together into one stick, so that they may become one in your hand. '
  '18':
  - type: text
    content: 'When your people say to you, ‘Will you not tell us what you mean by these?’ '
  '19':
  - type: text
    content: say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I am going to take the stick of Joseph, which is in the hand of Ephraim, and the tribes of Israel, his companions; and I will join the stick of Judah with it and make them one stick, and they will be one in My hand.” ’ '
  '2':
  - type: text
    content: 'He caused me to pass all around them, and behold, '
  - type: text
    content: there were
  - type: text
    content: ' very many [human bones] in the open valley; and lo, '
  - type: text
    content: they were
  - type: text
    content: ' very dry. '
  '20':
  - type: text
    content: 'The sticks on which you write shall be in your hand before their eyes. '
  '21':
  - type: text
    content: Say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I am going to take the children of Israel from among the nations where they have gone, and I will '
  - type: note
    content: See note 36:24.
  - type: text
    content: 'gather them from every side and bring them into their own land; '
  '22':
  - type: text
    content: 'and I will make them one nation in the land, on the mountains of Israel; and one '
  - type: note
    content: A reference to the coming Messianic ruler, who would achieve for Israel what David had, but with perfection. See also note 34:23.
  - type: text
    content: 'king will be king over all of them; and they will no longer be two nations, and will no longer be divided into two kingdoms. [Jer 50:4] '
  '23':
  - type: text
    content: They will no longer defile themselves with their idols, or with their detestable things, or with any of their transgressions; but I will save them from all their transgressions in which they have sinned, and I will cleanse them. So they will be My people, and I will be their God.
  - type: heading
    content: The Davidic Kingdom
  '24':
  - type: text
    content: “
  - type: note
    content: See note 34:23.
  - type: text
    content: 'My servant David will be king over them, and they all will have one shepherd. They will also walk in My ordinances and keep My statutes and observe them. '
  '25':
  - type: text
    content: 'They will live in the land where your fathers lived, [the land] that I gave to My servant Jacob, and they will live there, they and their children and their children’s children, forever; and My servant David will be their leader forever. [Is 60:21; Joel 3:20; Amos 9:15] '
  '26':
  - type: text
    content: 'I will make a covenant of peace with them; it will be an everlasting covenant with them. And I will place them and multiply them, and will put My sanctuary in their midst forever. '
  '27':
  - type: text
    content: 'My dwelling place also will be with them; and I will be their God, and they will be My people. '
  '28':
  - type: text
    content: Then the nations will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who sets apart '
  - type: text
    content: and
  - type: text
    content: ' sanctifies Israel [for holy use], when My sanctuary is in their midst forever.” ’ ”'
  '3':
  - type: text
    content: And He said to me, “Son of man, can these bones live?” And I answered, “O Lord G
  - type: heading
    content: od
  - type: text
    content: ', You know.” [1 Cor 15:35] '
  '4':
  - type: text
    content: Again He said to me, “Prophesy to these bones and say to them, ‘O dry bones, hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: '.’ [John 5:28] '
  '5':
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ' to these bones, ‘Behold, I will make '
  - type: note
    content: Or spirit, and so throughout the chapter.
  - type: text
    content: 'breath enter you so that you may come to life. '
  '6':
  - type: text
    content: I will put sinews on you, make flesh grow back on you, cover you with skin, and I will put breath in you so that you may come alive; and you will know that I am the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '7':
  - type: text
    content: 'So I prophesied as I was commanded; and as I prophesied, there was a [thundering] noise, and behold, a rattling; and the bones came together, bone to its bone. '
  '8':
  - type: text
    content: 'And I looked, and behold, there were sinews on the bones, and flesh grew and skin covered them; but there was no breath in them. '
  '9':
  - type: text
    content: Then He said to me, “Prophesy to the breath, son of man, and say to the breath, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Come from the four winds, O breath, and breathe on these slain, that they may live.” ’ ” '
