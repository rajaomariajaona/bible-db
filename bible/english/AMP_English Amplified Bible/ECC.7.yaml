document_id: ECC.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom and Folly Contrasted
  - type: text
    content: A good name is better than precious perfume,
  - type: text
    content: And the day of one’s death better than the day of one’s birth.
  '10':
  - type: text
    content: Do not say, “Why were the old days better than these?”
  - type: text
    content: For it is not from wisdom that you ask about this.
  '11':
  - type: text
    content: Wisdom along with an inheritance is good
  - type: text
    content: And an [excellent] advantage for those who see the sun.
  '12':
  - type: text
    content: 'For wisdom is a protection '
  - type: text
    content: even as
  - type: text
    content: ' money is a protection,'
  - type: text
    content: 'But the [excellent] advantage of knowledge is that wisdom shields '
  - type: text
    content: and
  - type: text
    content: ' preserves the lives of its possessors.'
  '13':
  - type: text
    content: 'Consider the work of God:'
  - type: text
    content: Who can make straight what He has bent?
  '14':
  - type: text
    content: In the day of prosperity be joyful,
  - type: text
    content: But in the day of adversity consider that
  - type: text
    content: God has made the one as well as the other,
  - type: text
    content: 'So that man will not find out anything '
  - type: text
    content: that will be
  - type: text
    content: ' after him.'
  '15':
  - type: text
    content: 'I have seen everything during my [fleeting] days of futility; there is a righteous man who perishes in [spite of] his righteousness, and there is a wicked man who '
  - type: note
    content: Lit prolongs.
  - type: text
    content: 'lives a long '
  - type: text
    content: life
  - type: text
    content: ' in [spite of] his wickedness. '
  '16':
  - type: text
    content: 'Do not be excessively righteous [like those given to self-conceit], and do not be overly wise (pretentious)—why should you bring yourself to ruin? '
  '17':
  - type: text
    content: 'Do not be excessively '
  - type: text
    content: or
  - type: text
    content: ' willfully wicked and do not be a fool. Why should you die before your time? '
  '18':
  - type: text
    content: 'It is good that you take hold of one thing (righteousness) and also not let go of the other (wisdom); for the one who fears '
  - type: text
    content: and
  - type: text
    content: ' worships God [with awe-filled reverence] will come forth with both of them.'
  '19':
  - type: text
    content: 'Wisdom strengthens the wise man more than ten rulers who are in a city. [Ps 127:1; 2 Tim 3:15] '
  '2':
  - type: text
    content: It is better to go to the house of mourning
  - type: text
    content: Than to go to the house of feasting,
  - type: text
    content: For that [day of death] is the end of every man,
  - type: text
    content: 'And the living will take it to heart '
  - type: text
    content: and
  - type: text
    content: ' solemnly ponder its meaning.'
  '20':
  - type: text
    content: 'Indeed, there is not a righteous man on earth who '
  - type: text
    content: always
  - type: text
    content: ' does good and who never sins. [Is 53:6; Rom 3:23] '
  '21':
  - type: text
    content: 'Also, do not take seriously everything that is said, so that you will not hear your servant cursing you, '
  '22':
  - type: text
    content: for you also know that you too have cursed others many times.
  '23':
  - type: text
    content: 'I have tested all this with wisdom. I said, “I will be wise [independently of God],” but true wisdom was far from me. '
  '24':
  - type: text
    content: 'Whatever has been is far off, deeply remote and exceedingly mysterious. Who can discover it [for it is beyond the grasp of man]? [Job 28:12-28; 1 Cor 2:9-16] '
  '25':
  - type: text
    content: 'I turned around '
  - type: text
    content: and
  - type: text
    content: ' directed my heart to know, to investigate and to seek [skillful and godly] wisdom and the reason for things, and to know that wickedness is folly and that foolishness is madness [leading to stupidity and recklessness]. '
  '26':
  - type: text
    content: And I discovered that [of all irrational sins none has been so destructive in beguiling one away from God as immoral women for] more bitter than death is the woman whose heart is [composed of] snares and nets, and whose hands are chains. Whoever pleases God will escape from her, but the sinner will be taken captive by her [evil].
  '27':
  - type: text
    content: '“Behold, I have discovered this,” says the Preacher, “while '
  - type: text
    content: adding
  - type: text
    content: ' one thing to another to find an explanation, '
  '28':
  - type: text
    content: 'which I am still seeking but have not found. I have found one '
  - type: note
    content: Or person.
  - type: text
    content: 'man among a thousand [who pleases God], but I have not found [such] a woman among all these [a thousand in my harem]. [1 Kin 11:3] '
  '29':
  - type: text
    content: 'Behold, I have found only this [as a reason]: God made man upright '
  - type: text
    content: and
  - type: text
    content: ' uncorrupted, but they [both men and women] have sought out many devices [for evil].”'
  '3':
  - type: text
    content: Sorrow is better than laughter,
  - type: text
    content: For when a face is sad (deep in thought) the heart may be happy [because it is growing in wisdom]. [2 Cor 7:10]
  '4':
  - type: text
    content: The heart of the wise [learns when it] is in the house of mourning,
  - type: text
    content: But the heart of fools is [senseless] in the house of pleasure.
  '5':
  - type: text
    content: 'It is better to listen to the rebuke of the wise man '
  - type: text
    content: and
  - type: text
    content: ' pursue wisdom'
  - type: text
    content: 'Than for one to listen to the song of fools '
  - type: text
    content: and
  - type: text
    content: ' pursue stupidity.'
  '6':
  - type: text
    content: For like the crackling of [burning] thorn bushes under a pot,
  - type: text
    content: So is the laughter of the fool;
  - type: text
    content: And this too is vanity (futility).
  '7':
  - type: text
    content: For oppression makes a wise man foolish,
  - type: text
    content: And a bribe corrupts the [good judgment of the] heart.
  '8':
  - type: text
    content: The end of a matter is better than its beginning;
  - type: text
    content: Patience of spirit is better than haughtiness of spirit (pride).
  '9':
  - type: text
    content: Do not be eager in your heart to be angry,
  - type: text
    content: For anger dwells in the heart of fools. [James 1:19, 20]
