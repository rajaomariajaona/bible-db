document_id: ECC.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Wisdom and Folly Contrasted
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A good name is better than precious perfume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the day of one’s death better than the day of one’s birth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Do not say, “Why were the old days better than these?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is not from wisdom that you ask about this.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Wisdom along with an inheritance is good
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And an [excellent] advantage for those who see the sun.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For wisdom is a protection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even as
    - type: text
      text: ' money is a protection,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the [excellent] advantage of knowledge is that wisdom shields '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' preserves the lives of its possessors.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Consider the work of God:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can make straight what He has bent?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In the day of prosperity be joyful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the day of adversity consider that
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has made the one as well as the other,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that man will not find out anything '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that will be
    - type: text
      text: ' after him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I have seen everything during my [fleeting] days of futility; there is a righteous man who perishes in [spite of] his righteousness, and there is a wicked man who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: prolongs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'lives a long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life
    - type: text
      text: ' in [spite of] his wickedness. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Do not be excessively righteous [like those given to self-conceit], and do not be overly wise (pretentious)—why should you bring yourself to ruin? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Do not be excessively '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' willfully wicked and do not be a fool. Why should you die before your time? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'It is good that you take hold of one thing (righteousness) and also not let go of the other (wisdom); for the one who fears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worships God [with awe-filled reverence] will come forth with both of them.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Wisdom strengthens the wise man more than ten rulers who are in a city. [Ps 127:1; 2 Tim 3:15] '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is better to go to the house of mourning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than to go to the house of feasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that [day of death] is the end of every man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the living will take it to heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' solemnly ponder its meaning.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Indeed, there is not a righteous man on earth who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: always
    - type: text
      text: ' does good and who never sins. [Is 53:6; Rom 3:23] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Also, do not take seriously everything that is said, so that you will not hear your servant cursing you, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: for you also know that you too have cursed others many times.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I have tested all this with wisdom. I said, “I will be wise [independently of God],” but true wisdom was far from me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Whatever has been is far off, deeply remote and exceedingly mysterious. Who can discover it [for it is beyond the grasp of man]? [Job 28:12-28; 1 Cor 2:9-16] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I turned around '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' directed my heart to know, to investigate and to seek [skillful and godly] wisdom and the reason for things, and to know that wickedness is folly and that foolishness is madness [leading to stupidity and recklessness]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And I discovered that [of all irrational sins none has been so destructive in beguiling one away from God as immoral women for] more bitter than death is the woman whose heart is [composed of] snares and nets, and whose hands are chains. Whoever pleases God will escape from her, but the sinner will be taken captive by her [evil].
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Behold, I have discovered this,” says the Preacher, “while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: adding
    - type: text
      text: ' one thing to another to find an explanation, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'which I am still seeking but have not found. I have found one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: person
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'man among a thousand [who pleases God], but I have not found [such] a woman among all these [a thousand in my harem]. [1 Kin 11:3] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Behold, I have found only this [as a reason]: God made man upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uncorrupted, but they [both men and women] have sought out many devices [for evil].”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sorrow is better than laughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when a face is sad (deep in thought) the heart may be happy [because it is growing in wisdom]. [2 Cor 7:10]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The heart of the wise [learns when it] is in the house of mourning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the heart of fools is [senseless] in the house of pleasure.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It is better to listen to the rebuke of the wise man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursue wisdom'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Than for one to listen to the song of fools '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursue stupidity.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For like the crackling of [burning] thorn bushes under a pot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is the laughter of the fool;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this too is vanity (futility).
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For oppression makes a wise man foolish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a bribe corrupts the [good judgment of the] heart.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The end of a matter is better than its beginning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Patience of spirit is better than haughtiness of spirit (pride).
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not be eager in your heart to be angry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For anger dwells in the heart of fools. [James 1:19, 20]
