  '5':
  - type: text
    content: 'Then Ezra stood and made the leaders of the priests, the Levites, and all Israel, take an oath that they would act in accordance with this proposal; so they took the oath. '
  '6':
  - type: text
    content: 'Then Ezra got up from before the house of God and went into the chamber of Jehohanan the son of Eliashib [and spent the night there]. He did not eat bread nor drink water, for he was mourning over the [former] exiles’ faithlessness. '
  '7':
  - type: text
    content: 'They made a proclamation throughout Judah and Jerusalem to all the [former] exiles, that they were to assemble at Jerusalem, '
  '8':
  - type: text
    content: 'and that whoever would not come within three days, by order of the counsel of the leaders and the elders, all his possessions '
  - type: text
    content: and
  - type: text
    content: ' property would be forfeited and he himself would be excluded from the assembly of the exiles.'
  '9':
  - type: text
    content: 'So all the men of Judah and Benjamin gathered at Jerusalem within three days. It was the twentieth [day] of the ninth month, and all the people sat in the open square '
  - type: text
    content: in front of
  - type: text
    content: ' the house of God, trembling because of [the seriousness of] this matter and because of the heavy rain. '
