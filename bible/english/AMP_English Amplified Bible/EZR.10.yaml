  '18':
  - type: text
    content: 'Now among the sons of the priests who had married foreign women were found: of the sons of Jeshua [the high priest] the son of Jozadak, and his brothers—Maaseiah, Eliezer, Jarib, and Gedaliah. '
  '19':
  - type: text
    content: 'They vowed to send away their [pagan] wives, and being guilty, '
  - type: text
    content: they each offered
  - type: text
    content: ' a ram of the flock for their offense. '
  '2':
  - type: text
    content: 'Shecaniah the son of Jehiel, of the sons of Elam, said to Ezra, “We have been unfaithful to our God and have married foreign women from the peoples of the land; yet now there is hope for Israel in spite of this. '
  '20':
  - type: text
    content: 'Of the sons of Immer: Hanani and Zebadiah; '
  '21':
  - type: text
    content: 'and of the sons of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah; '
  '22':
  - type: text
    content: 'and of the sons of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
