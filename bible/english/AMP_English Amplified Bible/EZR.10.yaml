  '1':
  - type: heading
    content: Reconciliation with God
  - type: text
    content: 'Now while Ezra was praying and confessing, weeping and laying himself face down before the house of God, a very large group from Israel, of men, women, and children, gathered to him, for the people wept bitterly. '
  '10':
  - type: text
    content: 'Then Ezra the priest stood up and said to them, “You have been unfaithful [to God] and have married foreign (pagan) women, adding to the guilt of Israel. '
  '11':
  - type: text
    content: So now, make confession to the L
  - type: heading
    content: ord
  - type: text
    content: ' God of your fathers and do His will. '
  - type: note
    content: The severity of Ezra’s policy is justified considering Israel’s tragic experiences resulting from marriages to pagan women. The consequent idolatry, first of King Solomon, and then of the whole nation, was fatal. God’s wrath had been so great that He not only took the kingship from Solomon, but eventually turned the Israelites over to their enemies and left the promised land desolate, while the people mourned their fate as captives in a pagan country. Ezra, to whom the keeping of God’s law was of constant concern, had been born in captivity among exiles who grieved for the country, peace and prosperity which God had once given them. Leading the exiles to give up their foreign wives and children was the only way to avoid God’s wrath.
  - type: text
    content: 'Separate yourselves from the peoples of the land and from [your] foreign wives.” '
  '12':
  - type: text
    content: 'Then all the assembly replied with a loud voice, “It is our responsibility to do just as you have said. '
  '13':
  - type: text
    content: 'But there are many people and it is the season of heavy rain; so we are unable to stand outside. Nor '
  - type: text
    content: can
  - type: text
    content: ' the task '
  - type: text
    content: be done
  - type: text
    content: ' in a day or two, for we have transgressed greatly in this matter. '
  '14':
  - type: text
    content: 'Let our leaders stand for '
  - type: text
    content: and
  - type: text
    content: ' represent the entire assembly; let all those in our cities who have married foreign wives come at appointed times, together with the elders and judges of each city, until the burning anger of our God over this matter is turned away from us.” '
  '15':
  - type: text
    content: 'Only Jonathan the son of Asahel and Jahzeiah the son of Tikvah '
  - type: note
    content: No reason is given for this opposition, though it would hardly seem strange if some of the people were concerned about the severity of Ezra’s instructions. On the other hand, the ancient rabbis understood the Hebrew text to mean, “stood up in regard to this,” as in volunteering to begin the task in support of Ezra. So instead of opposing the reform, this interpretation has the four men showing great zeal for it, and in v 16 the former exiles then follow their lead.
  - type: text
    content: opposed this, and Meshullam and Shabbethai the Levite supported them.
