  '3':
  - type: text
    content: 'Therefore let us now make a covenant with our God to send away all the [foreign] wives and their children, in accordance with the advice of my lord and of those who tremble [in reverent obedience] at the commandment of our God; and let it be done in accordance with the Law. '
  '30':
