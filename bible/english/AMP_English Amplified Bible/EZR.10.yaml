document_id: EZR.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reconciliation with God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now while Ezra was praying and confessing, weeping and laying himself face down before the house of God, a very large group from Israel, of men, women, and children, gathered to him, for the people wept bitterly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra the priest stood up and said to them, “You have been unfaithful [to God] and have married foreign (pagan) women, adding to the guilt of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So now, make confession to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of your fathers and do His will. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The severity of Ezra’s policy is justified considering Israel’s tragic experiences resulting from marriages to pagan women. The consequent idolatry, first of King Solomon, and then of the whole nation, was fatal. God’s wrath had been so great that He not only took the kingship from Solomon, but eventually turned the Israelites over to their enemies and left the promised land desolate, while the people mourned their fate as captives in a pagan country. Ezra, to whom the keeping of God’s law was of constant concern, had been born in captivity among exiles who grieved for the country, peace and prosperity which God had once given them. Leading the exiles to give up their foreign wives and children was the only way to avoid God’s wrath.
      marker-yv: yv-n
    - type: text
      text: 'Separate yourselves from the peoples of the land and from [your] foreign wives.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the assembly replied with a loud voice, “It is our responsibility to do just as you have said. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But there are many people and it is the season of heavy rain; so we are unable to stand outside. Nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: can
    - type: text
      text: ' the task '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be done
    - type: text
      text: ' in a day or two, for we have transgressed greatly in this matter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let our leaders stand for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' represent the entire assembly; let all those in our cities who have married foreign wives come at appointed times, together with the elders and judges of each city, until the burning anger of our God over this matter is turned away from us.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Jonathan the son of Asahel and Jahzeiah the son of Tikvah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: No reason is given for this opposition, though it would hardly seem strange if some of the people were concerned about the severity of Ezra’s instructions. On the other hand, the ancient rabbis understood the Hebrew text to mean, “stood up in regard to this,” as in volunteering to begin the task in support of Ezra. So instead of opposing the reform, this interpretation has the four men showing great zeal for it, and in v 16 the former exiles then follow their lead.
      marker-yv: yv-n
    - type: text
      text: opposed this, and Meshullam and Shabbethai the Levite supported them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the [former] exiles did so. Ezra the priest and men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who were
    - type: text
      text: ' heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' were selected, according to their fathers’ households, each of them by name; and they sat down on the first day of the tenth month to investigate the matter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And by the first day of the first month they finished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: investigating
    - type: text
      text: ' all the men married to foreign wives.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: List of Offenders
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now among the sons of the priests who had married foreign women were found: of the sons of Jeshua [the high priest] the son of Jozadak, and his brothers—Maaseiah, Eliezer, Jarib, and Gedaliah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They vowed to send away their [pagan] wives, and being guilty, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they each offered
    - type: text
      text: ' a ram of the flock for their offense. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shecaniah the son of Jehiel, of the sons of Elam, said to Ezra, “We have been unfaithful to our God and have married foreign women from the peoples of the land; yet now there is hope for Israel in spite of this. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Immer: Hanani and Zebadiah; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Levites: Jozabad, Shimei, Kelaiah, that is, Kelita, Pethahiah, Judah, and Eliezer.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the singers: Eliashib; and of the gatekeepers: Shallum, Telem, and Uri.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of Israel, of the sons of Parosh: Ramiah, Izziah, Malchijah, Mijamin, Eleazar, Malchijah (Hashabiah), and Benaiah; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth, and Elijah; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad, and Aziza; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons also of Bebai: Jehohanan, Hananiah, Zabbai, and Athlai; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Bani: Meshullam, Malluch, Adaiah, Jashub, Sheal, and Jeremoth; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let us now make a covenant with our God to send away all the [foreign] wives and their children, in accordance with the advice of my lord and of those who tremble [in reverent obedience] at the commandment of our God; and let it be done in accordance with the Law. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Pahath-moab: Adna, Chelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui, and Manasseh; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and of the sons of Harim: Eliezer, Isshijah, Malchijah, Shemaiah, Shimeon, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benjamin, Malluch, and Shemariah; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of the sons of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh, and Shimei; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of the sons of Bani: Maadai, Amram, Uel, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaiah, Bedeiah, Cheluhi, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mattaniah, Mattenai, Jaasu, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bani, Binnui, Shimei, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Stand up, for it is your duty, and we will be with you. Be brave and act.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Machnadebai, Shashai, Sharai, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum, Amariah, and Joseph. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel, and Benaiah. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these had married foreign women, and some of them had wives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by whom
    - type: text
      text: ' they had children.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra stood and made the leaders of the priests, the Levites, and all Israel, take an oath that they would act in accordance with this proposal; so they took the oath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra got up from before the house of God and went into the chamber of Jehohanan the son of Eliashib [and spent the night there]. He did not eat bread nor drink water, for he was mourning over the [former] exiles’ faithlessness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They made a proclamation throughout Judah and Jerusalem to all the [former] exiles, that they were to assemble at Jerusalem, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and that whoever would not come within three days, by order of the counsel of the leaders and the elders, all his possessions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' property would be forfeited and he himself would be excluded from the assembly of the exiles.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the men of Judah and Benjamin gathered at Jerusalem within three days. It was the twentieth [day] of the ninth month, and all the people sat in the open square '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in front of
    - type: text
      text: ' the house of God, trembling because of [the seriousness of] this matter and because of the heavy rain. '
