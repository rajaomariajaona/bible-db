document_id: PSA.101,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 101
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Psalmist’s Profession of Uprightness.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I will sing of [steadfast] lovingkindness and justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I will sing praises.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I will behave wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow the way of integrity.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When will You come to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will walk in my house in integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with a blameless heart.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will set no worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' wicked thing before my eyes.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate the practice of those who fall away [from the right path];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will not grasp hold of me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A perverse heart shall depart from me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not tolerate evil.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Whoever secretly slanders his neighbor, him I will silence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who has a haughty look and a proud (arrogant) heart I will not tolerate.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶My eyes will be on the faithful (honorable) of the land, that they may dwell with me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who walks blamelessly is the one who will minister to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serve me.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He who practices deceit will not dwell in my house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who tells lies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' half-truths will not continue [to remain] in my presence.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Morning after morning I will destroy all the wicked in the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may cut off from the city of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all those who do evil.'
