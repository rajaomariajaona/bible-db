  '1':
  - type: heading
    content: Psalm 101
  - type: heading
    content: The Psalmist’s Profession of Uprightness.
  - type: text
    content: A Psalm of David.
  - type: text
    content: I will sing of [steadfast] lovingkindness and justice;
  - type: text
    content: To You, O L
  - type: heading
    content: ord
  - type: text
    content: ', I will sing praises.'
  '2':
  - type: text
    content: 'I will behave wisely '
  - type: text
    content: and
  - type: text
    content: ' follow the way of integrity.'
  - type: text
    content: When will You come to me?
  - type: text
    content: 'I will walk in my house in integrity '
  - type: text
    content: and
  - type: text
    content: ' with a blameless heart.'
  '3':
  - type: text
    content: 'I will set no worthless '
  - type: text
    content: or
  - type: text
    content: ' wicked thing before my eyes.'
  - type: text
    content: I hate the practice of those who fall away [from the right path];
  - type: text
    content: It will not grasp hold of me.
  '4':
  - type: text
    content: A perverse heart shall depart from me;
  - type: text
    content: I will not tolerate evil.
  '5':
  - type: text
    content: Whoever secretly slanders his neighbor, him I will silence;
  - type: text
    content: The one who has a haughty look and a proud (arrogant) heart I will not tolerate.
  '6':
  - type: text
    content: ¶My eyes will be on the faithful (honorable) of the land, that they may dwell with me;
  - type: text
    content: 'He who walks blamelessly is the one who will minister to '
  - type: text
    content: and
  - type: text
    content: ' serve me.'
  '7':
  - type: text
    content: He who practices deceit will not dwell in my house;
  - type: text
    content: 'He who tells lies '
  - type: text
    content: and
  - type: text
    content: ' half-truths will not continue [to remain] in my presence.'
  '8':
  - type: text
    content: Morning after morning I will destroy all the wicked in the land,
  - type: text
    content: That I may cut off from the city of the L
  - type: heading
    content: ord
  - type: text
    content: ' all those who do evil.'
