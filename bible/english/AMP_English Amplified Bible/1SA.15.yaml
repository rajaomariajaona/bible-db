document_id: 1SA.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul’s Disobedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said to Saul, “The Lord sent me to anoint you king over His people Israel. Now listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay close attention to the words of the Lord. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Samuel, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I regret that I made Saul king, for he has turned away from following Me and has not carried out My commands.” Samuel was angry [over Saul’s failure] and he cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all night. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Samuel got up early in the morning to meet Saul, he was told, “Saul came to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A city located about seven miles south of Hebron.
      marker-yv: yv-n
    - type: text
      text: 'Carmel, and behold, he set up for himself a monument [commemorating his victory], then he turned and went on and went down to Gilgal.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Samuel came to Saul, and Saul said to him, “Blessed are you of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . I have carried out the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel said, “What then is this bleating of the sheep in my ears, and the lowing of the oxen which I hear?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said, “They have brought them from the Amalekites, for the people spared the best of the sheep and oxen '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This lie was a thinly-disguised attempt to justify disobedience to God.
      marker-yv: yv-n
    - type: text
      text: to sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God; but the rest we have destroyed completely.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said to Saul, “Stop, and let me tell you what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me last night.” Saul said to him, “Speak.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said, “Is it not true that even though you were small (insignificant) in your own eyes, you were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' the head of the tribes of Israel? And the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' anointed you king over Israel, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent you on a mission, and said, ‘Go, totally destroy the sinners, the Amalekites, and fight against them until they are eliminated.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Why did you not obey the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but [instead] swooped down on the plunder [with shouts of victory] and did evil in the sight of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts (armies), ‘I will punish Amalek for what he did to Israel, how he set himself against him on the way when Israel came up from Egypt. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said to Samuel, “I have obeyed the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and have gone on the mission on which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent me, and have brought back Agag the king of Amalek, and have completely destroyed the Amalekites. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people took some of the spoil, sheep and oxen, the best of the things [that were] to be totally destroyed, to sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God at Gilgal.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Has the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' as great a delight in burnt offerings and sacrifices'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As in obedience to the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, to obey is better than sacrifice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to heed [is better] than the fat of rams.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For rebellion is as [serious as] the sin of divination (fortune-telling),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And disobedience is as [serious as] false religion and idolatry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have rejected the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He also has rejected '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The passage does not say that God rejected Saul, the man, but rejected his being king of Israel.
      marker-yv: yv-n
    - type: text
      text: you as king.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said to Samuel, “I have sinned; for I have transgressed the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and your words, because I feared the people and obeyed their voice. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, please, pardon my sin and return with me, so that I may worship the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Samuel said to Saul, “I will not return with you; for you have rejected the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has rejected you from being king over Israel.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Samuel turned to go [away], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul
    - type: text
      text: ' grabbed the hem of his robe [to stop him], and it tore. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Samuel said to him, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has torn the kingdom of Israel from you today and has given it to your neighbor, who is better than you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also the Splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Eminence of Israel will not lie or change His mind; for He is not a man that He should change His mind.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now go and strike Amalek and completely destroy everything that they have; do not spare them, but kill both man and woman, child and infant, ox and sheep, camel and donkey.’ ”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “I have sinned; but please honor me now before the elders of my people and before Israel, and go back with me, so that I may worship the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Samuel went back following Saul, and Saul worshiped the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel said, “Bring me Agag, the king of the Amalekites.” And Agag came to him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in chains
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'cheerfully. And Agag said, “Surely the bitterness of death has come to an end.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel said, “As your sword has made women childless, so shall your mother be childless among women.” And Samuel cut Agag in pieces before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in Gilgal.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel went to Ramah, but Saul went up to his house in Gibeah of Saul. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel did not see Saul again until the day of his death, for Samuel grieved over Saul. And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' regretted that He had made Saul king over Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul summoned the people and numbered them at Telaim—200,000 foot soldiers and 10,000 men of Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul came to the city of Amalek and set an ambush in the valley. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moses’ father-in-law and his wife were Kenites. The Kenites were a nomadic people related to the Midianites and they had traditionally been friendly with the children of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Kenites, “Go, leave, go down from the Amalekites, so that I do not destroy you along with them; for you showed kindness to all the Israelites when they went up from Egypt.” So the Kenites departed from among the Amalekites. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul defeated the Amalekites, from Havilah as far as Shur, which is east of Egypt. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He captured Agag the king of the Amalekites alive, though he totally destroyed all [the rest of] the people with the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul and the people spared Agag and the best of the sheep, the oxen, the fatlings, the lambs, and everything that was good, and they were not willing to destroy them entirely; but everything that was undesirable or worthless they destroyed completely.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samuel Rebukes Saul
    marker-yv: yv-h
