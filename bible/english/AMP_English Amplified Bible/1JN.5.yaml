verses:
  '1':
  - type: heading
    content: Overcoming the World
  - type: text
    content: 'Everyone who believes [with a deep, abiding trust in the fact] that Jesus is the Christ (the Messiah, the Anointed) is born of God [that is, reborn from above—spiritually transformed, renewed, and set apart for His purpose], and everyone who loves the Father also loves '
  - type: note
    content: This could refer either to other born-again believers or to Jesus.
  - type: text
    content: 'the '
  - type: text
    content: child
  - type: text
    content: ' born of Him. '
  '10':
  - type: text
    content: 'The one who believes in the Son of God [who adheres to, trusts in, and relies confidently on Him as Savior] has the testimony within himself [because he can speak authoritatively about Christ from his own personal experience]. The one who does not believe God [in this way] has made Him [out to be] a liar, because he has not believed in the evidence that God has given regarding His Son. '
  '11':
  - type: text
    content: 'And the testimony is this: God has given us eternal life [we already possess it], and this life is in His Son [resulting in our spiritual completeness, and eternal companionship with Him]. '
  '12':
  - type: text
    content: He who has the Son [by accepting Him as Lord and Savior] has the life [that is eternal]; he who does not have the Son of God [by personal faith] does not have the life.
  - type: heading
    content: This Is Written That You May Know
  '13':
  - type: text
    content: 'These things I have written to you who believe in the name of the Son of God [which represents all that Jesus Christ is and does], so that you will know [with settled and absolute knowledge] that you [already] have eternal life. '
  '14':
  - type: text
    content: 'This is the [remarkable degree of] confidence which we [as believers are entitled to] have before Him: that '
  - type: note
    content: Confident, abiding faith combined with God’s power can produce amazing results, if the request is in harmony with God’s will. God is fully capable of doing that which man regards as impossible (Mark 14:36; James 4:3).
  - type: text
    content: 'if we ask anything according to His will, [that is, consistent with His plan and purpose] He hears us. '
  '15':
  - type: text
    content: 'And if we know [for a fact, as indeed we do] that He hears '
  - type: text
    content: and
  - type: text
    content: ' listens to us in whatever we ask, we [also] know [with settled and absolute knowledge] that we have [granted to us] the requests which we have asked from Him.'
  '16':
  - type: text
    content: 'If anyone sees his brother committing a sin that does not '
  - type: text
    content: lead
  - type: text
    content: ' to death, he will pray '
  - type: text
    content: and
  - type: text
    content: ' ask [on the believer’s behalf] and '
  - type: text
    content: God
  - type: text
    content: ' will for him give life to those whose sin is not '
  - type: text
    content: leading
  - type: text
    content: ' to death. There is a sin '
  - type: text
    content: that leads
  - type: text
    content: ' to death; I do not say that one should pray for this [kind of sin]. '
  '17':
  - type: text
    content: 'All wrongdoing is sin, and there is sin that does not '
  - type: text
    content: lead
  - type: text
    content: ' to death [one can repent of it and be forgiven].'
  '18':
  - type: text
    content: 'We know [with confidence] that anyone born of God does not '
  - type: text
    content: habitually
  - type: text
    content: ' sin; but He (Jesus) who was born of God [carefully] keeps '
  - type: text
    content: and
  - type: text
    content: ' protects him, and the evil one does not touch him. '
  '19':
  - type: text
    content: 'We know [for a fact] that we are of God, and the whole world [around us] lies in the power of the evil one [opposing God and His precepts]. '
  '2':
  - type: text
    content: 'By this we know [without any doubt] that we love the children of God: [expressing that love] when we love God and obey His commandments. '
  '20':
  - type: text
    content: 'And we [have seen and] know [by personal experience] that the Son of God has [actually] come [to this world], and has given us understanding '
  - type: text
    content: and
  - type: text
    content: ' insight so that we may [progressively and personally] know Him who is true; and we are in Him who is true—in His Son Jesus Christ. This is the true God and eternal life.'
  '21':
  - type: text
    content: Little children (believers, dear ones), guard yourselves from idols—[false teachings, moral compromises, and anything that would take God’s place in your heart].
  '3':
  - type: text
    content: 'For the [true] love of God is this: that we '
  - type: text
    content: habitually
  - type: text
    content: ' keep His commandments '
  - type: text
    content: and
  - type: text
    content: ' remain focused on His precepts. And His commandments '
  - type: text
    content: and
  - type: text
    content: ' His precepts are not difficult [to obey]. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: Lit everything that is. John uses the Greek neuter to underscore the fact that everyone who has been born again, regardless of gender or age, is victorious over the world.
  - type: text
    content: 'everyone born of God is victorious '
  - type: text
    content: and
  - type: text
    content: ' overcomes the world; and this is the victory that has conquered '
  - type: text
    content: and
  - type: text
    content: ' overcome the world—our [continuing, persistent] faith [in Jesus the Son of God].'
  '5':
  - type: text
    content: 'Who is the one who is victorious '
  - type: text
    content: and
  - type: text
    content: ' overcomes the world? It is the one who believes '
  - type: text
    content: and
  - type: text
    content: ' recognizes the fact that Jesus is the Son of God. '
  '6':
  - type: text
    content: 'This is He who came through water and blood [His baptism and death], Jesus Christ—not by the water only, but by the water and the blood. It is the [Holy] Spirit who testifies, because the Spirit is the truth. [He is the essence and origin of truth itself.] '
  '7':
  - type: text
    content: 'For there are three witnesses: '
  '8':
  - type: note
    content: A few late mss add ...in heaven, the Father, the Word, and the Holy Spirit, and these three are one. And there are three that testify on earth, the Spirit.
  - type: text
    content: 'the Spirit and the water and the blood; and these three are in agreement [their testimony is perfectly consistent]. '
  '9':
  - type: text
    content: 'If we accept [as we do] the testimony of men [that is, if we are willing to take the sworn statements of fallible humans as evidence], the testimony of God is greater [far more authoritative]; for this is the testimony of God, that He has testified regarding His Son. '
