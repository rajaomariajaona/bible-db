document_id: 1JN.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Overcoming the World
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Everyone who believes [with a deep, abiding trust in the fact] that Jesus is the Christ (the Messiah, the Anointed) is born of God [that is, reborn from above—spiritually transformed, renewed, and set apart for His purpose], and everyone who loves the Father also loves '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could refer either to other born-again believers or to Jesus.
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: child
    - type: text
      text: ' born of Him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The one who believes in the Son of God [who adheres to, trusts in, and relies confidently on Him as Savior] has the testimony within himself [because he can speak authoritatively about Christ from his own personal experience]. The one who does not believe God [in this way] has made Him [out to be] a liar, because he has not believed in the evidence that God has given regarding His Son. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the testimony is this: God has given us eternal life [we already possess it], and this life is in His Son [resulting in our spiritual completeness, and eternal companionship with Him]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He who has the Son [by accepting Him as Lord and Savior] has the life [that is eternal]; he who does not have the Son of God [by personal faith] does not have the life.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: This Is Written That You May Know
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These things I have written to you who believe in the name of the Son of God [which represents all that Jesus Christ is and does], so that you will know [with settled and absolute knowledge] that you [already] have eternal life. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'This is the [remarkable degree of] confidence which we [as believers are entitled to] have before Him: that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Confident, abiding faith combined with God’s power can produce amazing results, if the request is in harmony with God’s will. God is fully capable of doing that which man regards as impossible (Mark 14:36; James 4:3).
      marker-yv: yv-n
    - type: text
      text: 'if we ask anything according to His will, [that is, consistent with His plan and purpose] He hears us. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And if we know [for a fact, as indeed we do] that He hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listens to us in whatever we ask, we [also] know [with settled and absolute knowledge] that we have [granted to us] the requests which we have asked from Him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If anyone sees his brother committing a sin that does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lead
    - type: text
      text: ' to death, he will pray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ask [on the believer’s behalf] and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' will for him give life to those whose sin is not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to death. There is a sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that leads
    - type: text
      text: ' to death; I do not say that one should pray for this [kind of sin]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'All wrongdoing is sin, and there is sin that does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lead
    - type: text
      text: ' to death [one can repent of it and be forgiven].'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'We know [with confidence] that anyone born of God does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' sin; but He (Jesus) who was born of God [carefully] keeps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protects him, and the evil one does not touch him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'We know [for a fact] that we are of God, and the whole world [around us] lies in the power of the evil one [opposing God and His precepts]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'By this we know [without any doubt] that we love the children of God: [expressing that love] when we love God and obey His commandments. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And we [have seen and] know [by personal experience] that the Son of God has [actually] come [to this world], and has given us understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insight so that we may [progressively and personally] know Him who is true; and we are in Him who is true—in His Son Jesus Christ. This is the true God and eternal life.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Little children (believers, dear ones), guard yourselves from idols—[false teachings, moral compromises, and anything that would take God’s place in your heart].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For the [true] love of God is this: that we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' keep His commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remain focused on His precepts. And His commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His precepts are not difficult [to obey]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: everything that is.
        - type: text
          text: ' John uses the Greek neuter to underscore the fact that everyone who has been born again, regardless of gender or age, is victorious over the world.'
      marker-yv: yv-n
    - type: text
      text: 'everyone born of God is victorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overcomes the world; and this is the victory that has conquered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overcome the world—our [continuing, persistent] faith [in Jesus the Son of God].'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Who is the one who is victorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overcomes the world? It is the one who believes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognizes the fact that Jesus is the Son of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This is He who came through water and blood [His baptism and death], Jesus Christ—not by the water only, but by the water and the blood. It is the [Holy] Spirit who testifies, because the Spirit is the truth. [He is the essence and origin of truth itself.] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For there are three witnesses: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few late mss add '
        - type: usfm
          marker: it
          children:
          - type: text
            text: '...in heaven, the Father, the Word, and the Holy Spirit, and these three are one. And there are three that testify on earth, the Spirit.'
      marker-yv: yv-n
    - type: text
      text: 'the Spirit and the water and the blood; and these three are in agreement [their testimony is perfectly consistent]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If we accept [as we do] the testimony of men [that is, if we are willing to take the sworn statements of fallible humans as evidence], the testimony of God is greater [far more authoritative]; for this is the testimony of God, that He has testified regarding His Son. '
