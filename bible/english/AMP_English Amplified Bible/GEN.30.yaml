verses:
  '1':
  - type: heading
    content: The Sons of Jacob
  - type: text
    content: 'When Rachel saw that she conceived no children for Jacob, she envied her sister, and said to Jacob, “Give me children, or else I will die.” '
  '10':
  - type: text
    content: 'Zilpah, Leah’s maid, gave birth to a son for Jacob. '
  '11':
  - type: text
    content: 'Then Leah said, “How fortunate!” So she named him Gad (good fortune). '
  '12':
  - type: text
    content: 'Zilpah, Leah’s maid, gave birth to a second son for Jacob. '
  '13':
  - type: text
    content: Then Leah said, “I am happy! For women will call me happy.” So she named him Asher (happy).
  '14':
  - type: text
    content: 'Now at the time of wheat harvest Reuben [the eldest child] went and found some '
  - type: note
    content: A narcotic plant thought by ancient peoples to be an aphrodisiac or cure for infertility.
  - type: text
    content: 'mandrakes in the field, and brought them to his mother Leah. Then Rachel said to Leah, “Please give me some of your son’s mandrakes.” '
  '15':
  - type: text
    content: 'But Leah answered, “Is it a small thing that you have taken my husband? Would you take away my son’s mandrakes also?” So Rachel said, “Jacob shall sleep with you tonight in exchange for your son’s mandrakes.” '
  '16':
  - type: text
    content: 'When Jacob came in from the field in the evening, Leah went out to meet him and said, “You must sleep with me [tonight], for I have in fact hired you with my son’s mandrakes.” So he slept with her that night. '
  '17':
  - type: text
    content: 'God listened '
  - type: text
    content: and
  - type: text
    content: ' answered [the prayer of] Leah, and she conceived and gave birth to a fifth son for Jacob. '
  '18':
  - type: text
    content: 'Then Leah said, “God has given me my reward because I have given my maid to my husband.” So she named him '
  - type: note
    content: Related to Hebrew for “reward.”
  - type: text
    content: 'Issachar. '
  '19':
  - type: text
    content: 'Leah conceived again and gave birth to a sixth son for Jacob. '
  '2':
  - type: text
    content: 'Then Jacob became furious with Rachel, and he said, “Am I in the place of God, who has denied you children?” '
  '20':
  - type: text
    content: 'Then Leah said, “God has endowed me with a good [marriage] gift [for my husband]; now he will live with me [regarding me with honor as his wife], because I have given birth to six sons.” So she named him '
  - type: note
    content: Possibly related to Hebrew for “home” or “elevated place.”
  - type: text
    content: 'Zebulun. '
  '21':
  - type: text
    content: Afterward she gave birth to a daughter and named her Dinah.
  '22':
  - type: text
    content: 'Then God remembered [the prayers of] Rachel, and God thought of her and opened her womb [so that she would conceive]. '
  '23':
  - type: text
    content: 'So she conceived and gave birth to a son; and she said, “God has taken away my disgrace '
  - type: text
    content: and
  - type: text
    content: ' humiliation.” '
  '24':
  - type: text
    content: She named him Joseph (may He add) and said, “May the L
  - type: heading
    content: ord
  - type: text
    content: ' add to me another son.”'
  - type: heading
    content: Jacob Prospers
  '25':
  - type: text
    content: 'Now when Rachel had given birth to Joseph, Jacob said to Laban, “Send me away, that I may go back to my own place and to my own country. '
  '26':
  - type: text
    content: 'Give me my wives and my children for whom I have served you, and let me go; for you know the work which I have done for you.” '
  '27':
  - type: text
    content: 'But Laban said to him, “If I have found favor in your sight, '
  - type: text
    content: stay with me;
  - type: text
    content: ' for I have learned [from the omens in divination and by experience] that the L'
  - type: heading
    content: ord
  - type: text
    content: ' has blessed me because of you.” '
  '28':
  - type: text
    content: 'He said, “Name your wages, and I will give it [to you].” '
  '29':
  - type: text
    content: 'Jacob answered him, “You know how I have served you and how your possessions, your cattle '
  - type: text
    content: and
  - type: text
    content: ' sheep '
  - type: text
    content: and
  - type: text
    content: ' goats, have fared with me. '
  '3':
  - type: text
    content: 'She said, “Here, take my maid Bilhah and go in to her; and [when the baby comes] she shall '
  - type: note
    content: This ritual symbolized that the wife was providing the child for her husband through a surrogate mother.
  - type: text
    content: 'deliver it [while sitting] on my knees, so that by her I may also have children [to count as my own].” '
  '30':
  - type: text
    content: 'For you had little before I came and it has increased '
  - type: text
    content: and
  - type: text
    content: ' multiplied abundantly, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' has favored you with blessings wherever I turned. But now, when shall I provide for my own household?” '
  '31':
  - type: text
    content: 'Laban asked, “What shall I give you?” Jacob replied, “You shall not give me anything. But if you will do this one thing for me [which I now propose], I will again pasture and keep your flock: '
  '32':
  - type: text
    content: 'Let me pass through your entire flock today, removing from it every speckled and spotted sheep and every dark '
  - type: text
    content: or
  - type: text
    content: ' black one among the lambs and the spotted and speckled among the goats; and those shall be my wages. '
  '33':
  - type: text
    content: 'So my honesty will be evident for me later, when you come [for an accounting] concerning my wages. Every one that is not speckled and spotted among the goats and dark among the young lambs, '
  - type: text
    content: if found
  - type: text
    content: ' with me, shall be considered stolen.” '
  '34':
  - type: text
    content: 'And Laban said, “Good! Let it be done as you say.” '
  '35':
  - type: text
    content: 'So on that same day Laban [secretly] removed the male goats that were streaked and spotted and all the female goats that were speckled and spotted, every one with white on it, and all the dark ones among the sheep, and put them in the care of his sons. '
  '36':
  - type: text
    content: And he put [a distance of] three days’ journey between himself and Jacob, and Jacob was then left in care of the rest of Laban’s flock.
  '37':
  - type: text
    content: 'Then Jacob took branches of fresh poplar and almond and plane trees, and peeled white stripes in them, exposing the white in the branches. '
  '38':
  - type: text
    content: 'Then he set the branches which he had peeled in front of the flocks in the watering troughs, where the flocks came to drink; and they mated '
  - type: text
    content: and
  - type: text
    content: ' conceived when they came to drink. '
  '39':
  - type: text
    content: 'So the flocks mated '
  - type: text
    content: and
  - type: text
    content: ' conceived by the branches, and the flocks '
  - type: note
    content: The success of Jacob’s action was undoubtedly the answer to an unrecorded prayer. Later (31:7-12), Jacob gives God the credit for what happened, citing a special dream that he had from God.
  - type: text
    content: 'gave birth to streaked, speckled, and spotted offspring. '
  '4':
  - type: text
    content: So she gave him Bilhah her maid as a [
  - type: note
    content: I.e. concubine (see note 22:24).
  - type: text
    content: 'secondary] wife, and Jacob went in to her. '
  '40':
  - type: text
    content: 'Jacob separated the lambs, and [as he had done with the peeled branches] he made the flocks face toward the streaked and all the dark '
  - type: text
    content: or
  - type: text
    content: ' black in the [new] flock of Laban; and he put his own herds apart by themselves and did not put them [where they could breed] with Laban’s flock. '
  '41':
  - type: text
    content: 'Furthermore, whenever the stronger [animals] of the flocks were breeding, Jacob would place the branches in the sight of the flock in the watering troughs, so that they would mate '
  - type: text
    content: and
  - type: text
    content: ' conceive among the branches; '
  '42':
  - type: text
    content: 'but when the flock was sickly, he did not put '
  - type: text
    content: the branches
  - type: text
    content: ' there; so the sicker [animals] were Laban’s and the stronger Jacob’s. '
  '43':
  - type: text
    content: So Jacob became exceedingly prosperous, and had large flocks [of sheep and goats], and female and male servants, and camels and donkeys.
  '5':
  - type: text
    content: 'Bilhah conceived and gave birth to a son for Jacob. '
  '6':
  - type: text
    content: 'Then Rachel said, “God has judged '
  - type: text
    content: and
  - type: text
    content: ' vindicated me, and has heard my plea and has given me a son [through my maid].” So she named him Dan (He judged). '
  '7':
  - type: text
    content: 'Bilhah, Rachel’s maid, conceived again and gave birth to a second son for Jacob. '
  '8':
  - type: text
    content: So Rachel said, “With mighty wrestlings [in prayer to God] I have struggled with my sister and have prevailed.” So she named him Naphtali (my wrestlings).
  '9':
  - type: text
    content: When Leah saw that she had stopped bearing [children], she took Zilpah her maid and gave her to Jacob as a [
  - type: note
    content: I.e. concubine (see note 22:24).
  - type: text
    content: 'secondary] wife. '
