document_id: GEN.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sons of Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Rachel saw that she conceived no children for Jacob, she envied her sister, and said to Jacob, “Give me children, or else I will die.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Jacob became furious with Rachel, and he said, “Am I in the place of God, who has denied you children?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'She said, “Here, take my maid Bilhah and go in to her; and [when the baby comes] she shall '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This ritual symbolized that the wife was providing the child for her husband through a surrogate mother.
    marker-yv: yv-n
  - type: text
    text: 'deliver it [while sitting] on my knees, so that by her I may also have children [to count as my own].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So she gave him Bilhah her maid as a [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. concubine (see note 22:24).
    marker-yv: yv-n
  - type: text
    text: 'secondary] wife, and Jacob went in to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Bilhah conceived and gave birth to a son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Rachel said, “God has judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindicated me, and has heard my plea and has given me a son [through my maid].” So she named him Dan (He judged). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bilhah, Rachel’s maid, conceived again and gave birth to a second son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So Rachel said, “With mighty wrestlings [in prayer to God] I have struggled with my sister and have prevailed.” So she named him Naphtali (my wrestlings).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When Leah saw that she had stopped bearing [children], she took Zilpah her maid and gave her to Jacob as a [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. concubine (see note 22:24).
    marker-yv: yv-n
  - type: text
    text: 'secondary] wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zilpah, Leah’s maid, gave birth to a son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Leah said, “How fortunate!” So she named him Gad (good fortune). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zilpah, Leah’s maid, gave birth to a second son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Leah said, “I am happy! For women will call me happy.” So she named him Asher (happy).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now at the time of wheat harvest Reuben [the eldest child] went and found some '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A narcotic plant thought by ancient peoples to be an aphrodisiac or cure for infertility.
    marker-yv: yv-n
  - type: text
    text: 'mandrakes in the field, and brought them to his mother Leah. Then Rachel said to Leah, “Please give me some of your son’s mandrakes.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But Leah answered, “Is it a small thing that you have taken my husband? Would you take away my son’s mandrakes also?” So Rachel said, “Jacob shall sleep with you tonight in exchange for your son’s mandrakes.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Jacob came in from the field in the evening, Leah went out to meet him and said, “You must sleep with me [tonight], for I have in fact hired you with my son’s mandrakes.” So he slept with her that night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'God listened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answered [the prayer of] Leah, and she conceived and gave birth to a fifth son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Leah said, “God has given me my reward because I have given my maid to my husband.” So she named him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Related to Hebrew for “reward.”
    marker-yv: yv-n
  - type: text
    text: 'Issachar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Leah conceived again and gave birth to a sixth son for Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Leah said, “God has endowed me with a good [marriage] gift [for my husband]; now he will live with me [regarding me with honor as his wife], because I have given birth to six sons.” So she named him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly related to Hebrew for “home” or “elevated place.”
    marker-yv: yv-n
  - type: text
    text: 'Zebulun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Afterward she gave birth to a daughter and named her Dinah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then God remembered [the prayers of] Rachel, and God thought of her and opened her womb [so that she would conceive]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So she conceived and gave birth to a son; and she said, “God has taken away my disgrace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliation.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: She named him Joseph (may He add) and said, “May the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' add to me another son.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Prospers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now when Rachel had given birth to Joseph, Jacob said to Laban, “Send me away, that I may go back to my own place and to my own country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Give me my wives and my children for whom I have served you, and let me go; for you know the work which I have done for you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But Laban said to him, “If I have found favor in your sight, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stay with me;
  - type: text
    text: ' for I have learned [from the omens in divination and by experience] that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has blessed me because of you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He said, “Name your wages, and I will give it [to you].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jacob answered him, “You know how I have served you and how your possessions, your cattle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sheep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goats, have fared with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For you had little before I came and it has increased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' multiplied abundantly, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has favored you with blessings wherever I turned. But now, when shall I provide for my own household?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Laban asked, “What shall I give you?” Jacob replied, “You shall not give me anything. But if you will do this one thing for me [which I now propose], I will again pasture and keep your flock: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Let me pass through your entire flock today, removing from it every speckled and spotted sheep and every dark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' black one among the lambs and the spotted and speckled among the goats; and those shall be my wages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So my honesty will be evident for me later, when you come [for an accounting] concerning my wages. Every one that is not speckled and spotted among the goats and dark among the young lambs, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if found
  - type: text
    text: ' with me, shall be considered stolen.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Laban said, “Good! Let it be done as you say.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So on that same day Laban [secretly] removed the male goats that were streaked and spotted and all the female goats that were speckled and spotted, every one with white on it, and all the dark ones among the sheep, and put them in the care of his sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And he put [a distance of] three days’ journey between himself and Jacob, and Jacob was then left in care of the rest of Laban’s flock.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then Jacob took branches of fresh poplar and almond and plane trees, and peeled white stripes in them, exposing the white in the branches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then he set the branches which he had peeled in front of the flocks in the watering troughs, where the flocks came to drink; and they mated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conceived when they came to drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So the flocks mated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conceived by the branches, and the flocks '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The success of Jacob’s action was undoubtedly the answer to an unrecorded prayer. Later (31:7-12), Jacob gives God the credit for what happened, citing a special dream that he had from God.
    marker-yv: yv-n
  - type: text
    text: 'gave birth to streaked, speckled, and spotted offspring. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jacob separated the lambs, and [as he had done with the peeled branches] he made the flocks face toward the streaked and all the dark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' black in the [new] flock of Laban; and he put his own herds apart by themselves and did not put them [where they could breed] with Laban’s flock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Furthermore, whenever the stronger [animals] of the flocks were breeding, Jacob would place the branches in the sight of the flock in the watering troughs, so that they would mate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conceive among the branches; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'but when the flock was sickly, he did not put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the branches
  - type: text
    text: ' there; so the sicker [animals] were Laban’s and the stronger Jacob’s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So Jacob became exceedingly prosperous, and had large flocks [of sheep and goats], and female and male servants, and camels and donkeys.
