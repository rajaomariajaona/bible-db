document_id: ISA.32,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Glorious Future
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Messianic age is again in view (Is 9:7; 11:4; 16:5; 33:17).
      marker-yv: yv-n
    - type: text
      text: King will reign in righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And princes will rule with justice.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In little more than a year
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will tremble [with anxiety], you unsuspecting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complacent women;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the vintage has ended,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the harvest will not come.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremble, you women who are carefree;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremble with fear, you complacent ones!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Strip, undress and wear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sackcloth
    - type: text
      text: ' on your waist [in grief],'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beat your breasts [in mourning] for the beautiful fields, for the fruitful vine,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the land of my people growing over with thorns and briars—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, [mourn] for all the houses of joy in the joyous city.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the palace has been abandoned, the populated city deserted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hill [of the city] and the watchtower have become caves [for wild animals] forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A delight for wild donkeys, a pasture for flocks,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the Spirit is poured out upon us from on high,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wilderness becomes a fertile field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fertile field is valued as a forest. [Ps 104:30; Ezek 36:26, 27; 39:29; Zech 12:10]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then justice will dwell in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And righteousness will live in the fertile field.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the effect of righteousness will be peace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the result of righteousness will be quietness and confident trust forever.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then my people will live in a peaceful surrounding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in secure dwellings and in undisturbed resting places.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it will hail, when the forest comes down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the [capital] city will fall in utter humiliation.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each [one of them] will be like a hiding place from the wind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a shelter from the storm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like streams of water in a dry land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like the shade of a huge rock in a parched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weary land [to those who turn to them].'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed (happy, fortunate) are you who cast your seed upon all waters [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse is challenging to interpret; the ancient rabbis allegorized it, interpreting the sowing as acts of charity and the waters as the Torah.
      marker-yv: yv-n
    - type: text
      text: when the river overflows its banks and irrigates the land],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who allow the ox and the donkey to roam freely.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the eyes of those who see will not be blinded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the ears of those who hear will listen attentively.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart (mind) of those who act impulsively will discern the truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the tongue of the stammerers will hurry to speak clearly.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fool (the good-for-nothing) will no longer be called noble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the rogue said to be generous.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the fool speaks nonsense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his heart (mind) plans wickedness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To practice ungodliness and to speak error concerning the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To keep the craving of the hungry unsatisfied
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to deprive the thirsty of drink.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for the rogue, his weapons are evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He conceives wicked plans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To ruin the poor with lies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even when the plea of the needy one is just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' right.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the noble man conceives noble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnificent things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he stands by what is noble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnificent.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Rise up, you women who are carefree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hear my voice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You confident '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unsuspecting daughters!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to what I am saying.
