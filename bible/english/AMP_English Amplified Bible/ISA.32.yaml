document_id: ISA.32,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Glorious Future
  - type: text
    content: 'Behold, a '
  - type: note
    content: The Messianic age is again in view (Is 9:7; 11:4; 16:5; 33:17).
  - type: text
    content: King will reign in righteousness,
  - type: text
    content: And princes will rule with justice.
  '10':
  - type: text
    content: In little more than a year
  - type: text
    content: 'You will tremble [with anxiety], you unsuspecting '
  - type: text
    content: and
  - type: text
    content: ' complacent women;'
  - type: text
    content: For the vintage has ended,
  - type: text
    content: And the harvest will not come.
  '11':
  - type: text
    content: Tremble, you women who are carefree;
  - type: text
    content: Tremble with fear, you complacent ones!
  - type: text
    content: 'Strip, undress and wear '
  - type: text
    content: sackcloth
  - type: text
    content: ' on your waist [in grief],'
  '12':
  - type: text
    content: Beat your breasts [in mourning] for the beautiful fields, for the fruitful vine,
  '13':
  - type: text
    content: For the land of my people growing over with thorns and briars—
  - type: text
    content: Yes, [mourn] for all the houses of joy in the joyous city.
  '14':
  - type: text
    content: For the palace has been abandoned, the populated city deserted;
  - type: text
    content: The hill [of the city] and the watchtower have become caves [for wild animals] forever,
  - type: text
    content: A delight for wild donkeys, a pasture for flocks,
  '15':
  - type: text
    content: Until the Spirit is poured out upon us from on high,
  - type: text
    content: And the wilderness becomes a fertile field,
  - type: text
    content: And the fertile field is valued as a forest. [Ps 104:30; Ezek 36:26, 27; 39:29; Zech 12:10]
  '16':
  - type: text
    content: Then justice will dwell in the wilderness,
  - type: text
    content: And righteousness will live in the fertile field.
  '17':
  - type: text
    content: And the effect of righteousness will be peace,
  - type: text
    content: And the result of righteousness will be quietness and confident trust forever.
  '18':
  - type: text
    content: Then my people will live in a peaceful surrounding,
  - type: text
    content: And in secure dwellings and in undisturbed resting places.
  '19':
  - type: text
    content: But it will hail, when the forest comes down,
  - type: text
    content: And the [capital] city will fall in utter humiliation.
  '2':
  - type: text
    content: Each [one of them] will be like a hiding place from the wind
  - type: text
    content: And a shelter from the storm,
  - type: text
    content: Like streams of water in a dry land,
  - type: text
    content: 'Like the shade of a huge rock in a parched '
  - type: text
    content: and
  - type: text
    content: ' weary land [to those who turn to them].'
  '20':
  - type: text
    content: Blessed (happy, fortunate) are you who cast your seed upon all waters [
  - type: note
    content: This verse is challenging to interpret; the ancient rabbis allegorized it, interpreting the sowing as acts of charity and the waters as the Torah.
  - type: text
    content: when the river overflows its banks and irrigates the land],
  - type: text
    content: You who allow the ox and the donkey to roam freely.
  '3':
  - type: text
    content: Then the eyes of those who see will not be blinded,
  - type: text
    content: And the ears of those who hear will listen attentively.
  '4':
  - type: text
    content: The heart (mind) of those who act impulsively will discern the truth,
  - type: text
    content: And the tongue of the stammerers will hurry to speak clearly.
  '5':
  - type: text
    content: The fool (the good-for-nothing) will no longer be called noble,
  - type: text
    content: Nor the rogue said to be generous.
  '6':
  - type: text
    content: For the fool speaks nonsense,
  - type: text
    content: 'And his heart (mind) plans wickedness:'
  - type: text
    content: To practice ungodliness and to speak error concerning the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: To keep the craving of the hungry unsatisfied
  - type: text
    content: And to deprive the thirsty of drink.
  '7':
  - type: text
    content: As for the rogue, his weapons are evil;
  - type: text
    content: He conceives wicked plans
  - type: text
    content: To ruin the poor with lies,
  - type: text
    content: 'Even when the plea of the needy one is just '
  - type: text
    content: and
  - type: text
    content: ' right.'
  '8':
  - type: text
    content: 'But the noble man conceives noble '
  - type: text
    content: and
  - type: text
    content: ' magnificent things;'
  - type: text
    content: 'And he stands by what is noble '
  - type: text
    content: and
  - type: text
    content: ' magnificent.'
  '9':
  - type: text
    content: ¶Rise up, you women who are carefree,
  - type: text
    content: And hear my voice,
  - type: text
    content: 'You confident '
  - type: text
    content: and
  - type: text
    content: ' unsuspecting daughters!'
  - type: text
    content: Listen to what I am saying.
