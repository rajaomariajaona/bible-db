  - type: text
    content: ' did for her as He had promised. '
  '10':
  - type: text
    content: 'Therefore she said to Abraham, “Drive out this maid and her son, for the son of this maid shall not be an heir with my son Isaac.” [Gal 4:28-31] '
  '11':
  - type: text
    content: 'The situation '
  - type: note
    content: Lit was very displeasing in the eyes of Abraham.
  - type: text
    content: 'distressed Abraham greatly because of his son [Ishmael]. '
  '12':
  - type: text
    content: 'God said to Abraham, “Do not let it distress you because of Ishmael and your maid; whatever Sarah tells you, listen to her '
  - type: text
    content: and
  - type: text
    content: ' do what she asks, for your descendants will be named through Isaac. [Rom 9:7] '
  '13':
  - type: text
    content: 'And I will also make a nation of [Ishmael] the son of the maid, because he is your descendant.” '
  '14':
  - type: text
    content: 'So Abraham got up early in the morning and took bread and a skin of water and gave them to Hagar, putting them on her shoulder, and '
  - type: text
    content: gave her
  - type: text
    content: ' the boy, and sent her '
  - type: note
    content: Ishmael was born when Abraham was eighty-six years old (Gen 16:16), so Ishmael was about fourteen when Isaac was born, and about sixteen or seventeen years old when Isaac was weaned (Gen 21:8; 2 Chr 31:16).
  - type: text
    content: away. And she left [but lost her way] and wandered [aimlessly] in the Wilderness of Beersheba.
  '15':
  - type: text
    content: 'When the water in the skin was all gone, Hagar abandoned the boy under one of the bushes. '
  '16':
  - type: text
    content: 'Then she went and sat down opposite him, about a bowshot away, for she said, “Do not let me see the boy die.” And as she sat down opposite him, she raised her voice and wept. '
  '17':
  - type: text
    content: 'God heard the voice of the boy, and the angel of God called to Hagar from heaven and said to her, “What troubles you, Hagar? Do not be afraid, for God has heard the voice of the boy from where he is [resting]. '
  '18':
  - type: text
    content: 'Get up, help the boy up, and hold him by the hand, for I will make him a great nation.” '
  '19':
  - type: text
    content: Then God opened her eyes and she saw a well of water; and she went and filled the [empty] skin with water and gave the boy a drink.
  '2':
  - type: text
    content: 'So Sarah conceived and gave birth to a son for Abraham in his old age, at the appointed time of which God had spoken to him. '
  '20':
  - type: text
    content: 'God was with Ishmael, and he grew '
  - type: text
    content: and
  - type: text
    content: ' developed; and he lived in the wilderness and became an [expert] archer. '
  '21':
  - type: text
    content: He lived in the wilderness of Paran; and his mother took a wife for him from the land of Egypt.
  - type: heading
    content: Covenant with Abimelech
  '22':
  - type: text
    content: 'Now at that time Abimelech and Phicol, the commander of his army, said to Abraham, “God is with you in everything you do; '
  '23':
  - type: text
    content: 'so now, swear to me here by God that you will not deal unfairly with me [by breaking any agreements we have] or with my son or with my descendants, but as I have treated you with kindness, you shall do the same to me and to the land in which you have sojourned (temporarily lived).” '
  '24':
  - type: text
    content: 'And Abraham said, “I will swear.” '
  '25':
  - type: text
    content: 'Then Abraham complained to Abimelech about a well of water which the servants of Abimelech had [violently] seized [from him], '
  '26':
  - type: text
    content: Abimelech said, “I do not know who did this thing. Indeed, you did not tell me, and I did not hear of it until today.”
  '27':
  - type: text
    content: 'So Abraham took sheep and oxen and gave them to Abimelech, and the two men made a covenant (binding agreement). '
  '28':
  - type: text
    content: 'Then Abraham set apart seven ewe lambs of the flock, '
  '29':
  - type: text
    content: 'and Abimelech said to Abraham, “What is the meaning of these seven ewe lambs which you have set apart?” '
  '3':
  - type: text
    content: 'Abraham named his son Isaac (laughter), '
  - type: text
    content: the son
  - type: text
    content: ' to whom Sarah gave birth. '
  '30':
  - type: text
    content: 'Abraham said, “You are to accept these seven ewe lambs from me as a witness for me, that I dug this well.” '
  '31':
  - type: text
    content: 'Therefore that place was called Beersheba (Well of the Oath or Well of the Seven), because there the two of them swore an oath. '
  '32':
  - type: text
    content: 'So they made a covenant at Beersheba; then Abimelech and Phicol, the commander of his army, got up and returned to the land of the Philistines. '
  '33':
  - type: text
    content: Abraham planted a tamarisk tree at Beersheba, and there he called on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' [in prayer], '
  - type: note
    content: Heb El Olam.
  - type: text
    content: 'the Eternal God. '
  '34':
  - type: text
    content: 'And Abraham lived [as a resident alien] in the land of the Philistines for '
  - type: note
    content: I.e. an extended period of time.
  - type: text
    content: many days.
  '4':
  - type: text
    content: 'So Abraham circumcised his son Isaac when he was eight days old, just as God had commanded him. '
  '5':
  - type: text
    content: 'Abraham was a hundred years old when his son Isaac was born. '
  '6':
  - type: text
    content: 'Sarah said, “God has made me laugh; all who hear [about our good news] will laugh with me.” '
  '7':
  - type: text
    content: And she said, “Who would have said to Abraham that Sarah would nurse children? For I have given birth to a son by him in his old age.” [Heb 11:12]
  '8':
  - type: text
    content: 'The child [Isaac] grew and was '
  - type: note
    content: This was probably when the child was about three years of age. Samuel served in the sanctuary from the time that he was weaned (1 Sam 1:22-28), and a Hebrew mother is quoted in 2 Maccabees 7:27 as saying to her son that she nursed him for three years.
  - type: text
    content: weaned, and Abraham held a great feast on the day that Isaac was weaned.
  - type: heading
    content: Sarah Turns against Hagar
  '9':
  - type: text
    content: 'Now [as time went on] Sarah saw [Ishmael] the son of Hagar the Egyptian, whom she had borne to Abraham, '
  - type: note
    content: Ishmael was old enough to know better than to ridicule or tease his much younger brother, and his behavior was inappropriate and thoughtless.
  - type: text
    content: 'mocking [Isaac]. [Gal 4:29] '
