document_id: GEN.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaac Is Born
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' graciously remembered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' visited Sarah as He had said, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did for her as He had promised. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Sarah conceived and gave birth to a son for Abraham in his old age, at the appointed time of which God had spoken to him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abraham named his son Isaac (laughter), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the son
  - type: text
    text: ' to whom Sarah gave birth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Abraham circumcised his son Isaac when he was eight days old, just as God had commanded him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Abraham was a hundred years old when his son Isaac was born. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sarah said, “God has made me laugh; all who hear [about our good news] will laugh with me.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And she said, “Who would have said to Abraham that Sarah would nurse children? For I have given birth to a son by him in his old age.” [Heb 11:12]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The child [Isaac] grew and was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was probably when the child was about three years of age. Samuel served in the sanctuary from the time that he was weaned (1 Sam 1:22-28), and a Hebrew mother is quoted in 2 Maccabees 7:27 as saying to her son that she nursed him for three years.
    marker-yv: yv-n
  - type: text
    text: weaned, and Abraham held a great feast on the day that Isaac was weaned.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sarah Turns against Hagar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now [as time went on] Sarah saw [Ishmael] the son of Hagar the Egyptian, whom she had borne to Abraham, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ishmael was old enough to know better than to ridicule or tease his much younger brother, and his behavior was inappropriate and thoughtless.
    marker-yv: yv-n
  - type: text
    text: 'mocking [Isaac]. [Gal 4:29] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore she said to Abraham, “Drive out this maid and her son, for the son of this maid shall not be an heir with my son Isaac.” [Gal 4:28-31] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The situation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: was very displeasing in the eyes of Abraham
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'distressed Abraham greatly because of his son [Ishmael]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'God said to Abraham, “Do not let it distress you because of Ishmael and your maid; whatever Sarah tells you, listen to her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do what she asks, for your descendants will be named through Isaac. [Rom 9:7] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I will also make a nation of [Ishmael] the son of the maid, because he is your descendant.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Abraham got up early in the morning and took bread and a skin of water and gave them to Hagar, putting them on her shoulder, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gave her
  - type: text
    text: ' the boy, and sent her '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ishmael was born when Abraham was eighty-six years old (Gen 16:16), so Ishmael was about fourteen when Isaac was born, and about sixteen or seventeen years old when Isaac was weaned (Gen 21:8; 2 Chr 31:16).
    marker-yv: yv-n
  - type: text
    text: away. And she left [but lost her way] and wandered [aimlessly] in the Wilderness of Beersheba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When the water in the skin was all gone, Hagar abandoned the boy under one of the bushes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then she went and sat down opposite him, about a bowshot away, for she said, “Do not let me see the boy die.” And as she sat down opposite him, she raised her voice and wept. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'God heard the voice of the boy, and the angel of God called to Hagar from heaven and said to her, “What troubles you, Hagar? Do not be afraid, for God has heard the voice of the boy from where he is [resting]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Get up, help the boy up, and hold him by the hand, for I will make him a great nation.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then God opened her eyes and she saw a well of water; and she went and filled the [empty] skin with water and gave the boy a drink.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'God was with Ishmael, and he grew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' developed; and he lived in the wilderness and became an [expert] archer. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He lived in the wilderness of Paran; and his mother took a wife for him from the land of Egypt.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Covenant with Abimelech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now at that time Abimelech and Phicol, the commander of his army, said to Abraham, “God is with you in everything you do; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'so now, swear to me here by God that you will not deal unfairly with me [by breaking any agreements we have] or with my son or with my descendants, but as I have treated you with kindness, you shall do the same to me and to the land in which you have sojourned (temporarily lived).” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Abraham said, “I will swear.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Abraham complained to Abimelech about a well of water which the servants of Abimelech had [violently] seized [from him], '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Abimelech said, “I do not know who did this thing. Indeed, you did not tell me, and I did not hear of it until today.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So Abraham took sheep and oxen and gave them to Abimelech, and the two men made a covenant (binding agreement). '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Abraham set apart seven ewe lambs of the flock, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and Abimelech said to Abraham, “What is the meaning of these seven ewe lambs which you have set apart?” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Abraham said, “You are to accept these seven ewe lambs from me as a witness for me, that I dug this well.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Therefore that place was called Beersheba (Well of the Oath or Well of the Seven), because there the two of them swore an oath. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they made a covenant at Beersheba; then Abimelech and Phicol, the commander of his army, got up and returned to the land of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Abraham planted a tamarisk tree at Beersheba, and there he called on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [in prayer], '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Olam
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Eternal God. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Abraham lived [as a resident alien] in the land of the Philistines for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an extended period of time.
    marker-yv: yv-n
  - type: text
    text: many days.
