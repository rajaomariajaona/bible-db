document_id: MRK.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, there are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a reference to Peter, John, and James who were to witness the transfiguration a few days later.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: some of those who are standing here who will not taste (experience) death before they see the kingdom of God after it has come with power.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they [carefully and faithfully] kept the matter to themselves, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The doctrine of the resurrection was a well-known teaching of the Pharisees, so much so that Paul, an educated man, used it to turn the religious leaders against themselves (Acts 23:6-10). The three fishermen were, however, familiar with some of the prophetic Scriptures, but were confused by Jesus’ statements regarding His death and resurrection.
      marker-yv: yv-n
    - type: text
      text: 'discussing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' questioning [with one another] what it meant to rise from the dead. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They asked Him, saying, “Why do the scribes say that Elijah must come first [before the Messiah comes]?” [Mal 4:5, 6] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Elijah does come first and restores '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' reestablishes all things. And yet how is it written of the Son of Man that He will suffer many things'
    - type: text
      text: ' [grief and physical distress] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and be treated with contempt
    - type: text
      text: ' [utterly despised and rejected]? [Is 53:3] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say to you that Elijah has in fact come
    - type: text
      text: ' [already], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a reference to Herod’s imprisoning and beheading John the Baptist (6:17-28).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: did to him whatever they wished, just as it is written
    - type: text
      text: ' [in Scripture] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of him.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: All Things Possible
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came [back] to the [other nine] disciples, they saw a large crowd around them, and scribes questioning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arguing with them. [Matt 17:14-18; Luke 9:37-42] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately, when the entire crowd saw Jesus, they were startled and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' running up to greet Him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What are you discussing with them?”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the crowd replied to Him, “Teacher, I brought You my son, possessed with a spirit which makes him unable to speak; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and whenever it seizes him [intending to do harm], it throws him down, and he foams [at the mouth], and grinds his teeth and becomes stiff. I told Your disciples to drive it out, and they could not do it.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “O unbelieving (faithless) generation, how long shall I be with you? How long shall I put up with you? Bring him to Me!”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days later, Jesus took with Him Peter and James and John, and led them up on a high mountain by themselves. And He was transfigured (changed in form) before them [and began to shine brightly with divine and regal glory]; [Matt 17:1-8; Luke 9:28-36] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought the boy to Him. When the [demonic] spirit saw Him, immediately it threw the boy into a convulsion, and falling to the ground he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' rolling around and foaming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the mouth
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked his father, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How long has this been happening to him?”
    - type: text
      text: ' And he answered, “Since childhood. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The demon has often thrown him both into fire and into water, intending to kill him. But if You can do anything, take pity on us and help us!” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, “[You say to Me,] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘If You can?’ All things are possible for the one who believes '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trusts'
    - type: text
      text: ' [in Me]!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately the father of the boy cried out [with a desperate, piercing cry], saying, “I do believe; help [me overcome] my unbelief.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw that a crowd was rapidly gathering [around them], He rebuked the unclean spirit, saying to it, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You deaf and mute spirit, I command you, come out of him and never enter him again!”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After screaming out and throwing him into a terrible convulsion, it came out. The boy looked so much like a corpse [so still and pale] that many [of the spectators] said, “He is dead!” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus took him by the hand and raised him; and he stood up. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He had gone indoors, His disciples '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' asking Him privately, “Why were we unable to drive it out?” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This kind
    - type: text
      text: ' [of unclean spirit] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: cannot come out by anything but prayer
    - type: text
      text: ' [to the Father].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Death and Resurrection Foretold
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and His clothes became radiant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dazzling, intensely white, as no launderer on earth can whiten them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went on from there and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to go through Galilee. Jesus did not want anyone to know it, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because He was teaching His disciples [and preparing them for the future]. He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The Son of Man is to be betrayed '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' handed over to men'
    - type: text
      text: ' [who are His enemies], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they will kill Him; and when He has been killed, He will rise
    - type: text
      text: ' [from the dead] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: three days later.”
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf v 10.
      marker-yv: yv-n
    - type: text
      text: they did not understand this statement, and they were afraid to ask Him [what He meant].
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They arrived at Capernaum; and when He was in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably Peter’s home.
      marker-yv: yv-n
    - type: text
      text: 'house, He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What were you discussing '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' arguing about on the road?”'
    - type: text
      text: ' [Matt 18:1-5; Luke 9:46-48] '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they kept quiet, because on the road they had discussed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' debated with one another which one [of them] was the greatest. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sitting down [to teach], He called the twelve [disciples] and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone wants to be first, he must be last of all
    - type: text
      text: ' [in importance] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and a servant of all.”
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taking a child, He set him before them; and taking him in His arms, He said to them, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Whoever receives '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' welcomes one child such as this in My name receives Me; and whoever receives Me receives not'
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Me, but Him who sent Me.”
    - type: text
      text: ' [Matt 10:40; Luke 10:16; John 13:20]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dire Warnings
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John said to Him, “Teacher, we saw someone casting out demons in Your name, and we tried to stop him because he was not accompanying us [as Your disciple].” [Luke 9:49, 50] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not stop him; for there is no one who will perform a miracle in My name, and be able soon afterward to speak evil of Me.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elijah appeared to them along with Moses, and they were having a conversation with Jesus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For he who is not against us is for us.
    - type: text
      text: ' [Num 11:27-29] '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For whoever gives you a cup of water to drink because of your name as followers of Christ, I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, he will not lose his reward.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“But whoever causes one of these little ones who believe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trust in Me to stumble'
    - type: text
      text: ' [that is, to sin or lose faith], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it would be better for him if a heavy millstone
    - type: text
      text: ' [one requiring a donkey’s strength to turn it] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: were hung around his neck and he were thrown into the sea.
    - type: text
      text: ' [Matt 18:6; Luke 17:2] '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If your hand causes you to stumble '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sin, cut it off'
    - type: text
      text: ' [that is, remove yourself from the source of temptation]! '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is better for you to enter life crippled, than to have two hands and go into '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 5:22.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: hell, into the unquenchable fire,
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vv 44 and 46 are not found in early mss.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[where '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: their worm does not die
      - type: text
        text: ', '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and the fire is not put out
      - type: text
        text: .]
    - type: text
      text: ' [Is 66:24] '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If your foot causes you to stumble '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sin, cut it off'
    - type: text
      text: ' [that is, remove yourself from the source of temptation]! '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It would be better for you to enter life lame than to have two feet and be thrown into hell,
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vv 44 and 46 are not found in early mss.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[where '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: their worm does not die
      - type: text
        text: ', '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and the fire is not put out
      - type: text
        text: .]
    - type: text
      text: ' [Is 66:24] '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If your eye causes you to stumble '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sin, throw it out'
    - type: text
      text: ' [that is, remove yourself from the source of temptation]! '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It would be better for you to enter the kingdom of God with one eye, than to have two eyes and be thrown into hell,
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'where '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: their worm
    - type: text
      text: ' [that feeds on the dead] '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
