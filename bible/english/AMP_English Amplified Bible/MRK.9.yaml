  - type: heading
    content: Dire Warnings
  '38':
  - type: text
    content: 'John said to Him, “Teacher, we saw someone casting out demons in Your name, and we tried to stop him because he was not accompanying us [as Your disciple].” [Luke 9:49, 50] '
  '39':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Do not stop him; for there is no one who will perform a miracle in My name, and be able soon afterward to speak evil of Me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Elijah appeared to them along with Moses, and they were having a conversation with Jesus. '
  '40':
  - type: text
    content: For he who is not against us is for us.
  - type: text
    content: ' [Num 11:27-29] '
  '41':
  - type: text
    content: 'For whoever gives you a cup of water to drink because of your name as followers of Christ, I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, he will not lose his reward.'
  '42':
