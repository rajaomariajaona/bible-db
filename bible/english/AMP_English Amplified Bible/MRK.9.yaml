      - type: text
        text: .
    - type: text
      text: ' [Is 66:24]'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For everyone will be salted with fire.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter responded and said to Jesus, “Rabbi (Master), it is good for us to be here; let us make three [sacred] tents—one for You, and one for Moses, and one for Elijah.” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Salt is good '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' useful; but if salt has lost its saltiness (purpose), how will you make it salty? Have salt within yourselves '
      - type: usfm
        marker: it
        children:
        - type: text
          text: continually,
      - type: text
        text: ' and be at peace with one another.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he did not [really] know what to say because they were terrified [and stunned by the miraculous sight]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a cloud formed, overshadowing them, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 3:17.
      marker-yv: yv-n
    - type: text
      text: 'a voice came out of the cloud, “This is My beloved Son. Listen to Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey Him!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Suddenly they looked around and no longer saw anyone with them, except Jesus alone.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were coming down from the mountain, Jesus expressly ordered them not to tell anyone what they had seen, until the Son of Man had risen from the dead. '
