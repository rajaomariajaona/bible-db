    content: The Transfiguration
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, there are '
  - type: note
    content: Probably a reference to Peter, John, and James who were to witness the transfiguration a few days later.
  - type: text
    content: some of those who are standing here who will not taste (experience) death before they see the kingdom of God after it has come with power.”
  '10':
  - type: text
    content: 'So they [carefully and faithfully] kept the matter to themselves, '
  - type: note
    content: The doctrine of the resurrection was a well-known teaching of the Pharisees, so much so that Paul, an educated man, used it to turn the religious leaders against themselves (Acts 23:6-10). The three fishermen were, however, familiar with some of the prophetic Scriptures, but were confused by Jesus’ statements regarding His death and resurrection.
  - type: text
    content: 'discussing '
  - type: text
    content: and
  - type: text
    content: ' questioning [with one another] what it meant to rise from the dead. '
  '11':
  - type: text
    content: 'They asked Him, saying, “Why do the scribes say that Elijah must come first [before the Messiah comes]?” [Mal 4:5, 6] '
  '12':
  - type: text
    content: 'He answered them, '
  - type: text
    content: '“Elijah does come first and restores '
  - type: text
    content: and
  - type: text
    content: ' reestablishes all things. And yet how is it written of the Son of Man that He will suffer many things'
  - type: text
    content: ' [grief and physical distress] '
  - type: text
    content: and be treated with contempt
  - type: text
    content: ' [utterly despised and rejected]? [Is 53:3] '
  '13':
  - type: text
    content: But I say to you that Elijah has in fact come
  - type: text
    content: ' [already], '
  - type: text
    content: 'and they '
  - type: note
    content: This is a reference to Herod’s imprisoning and beheading John the Baptist (6:17-28).
  - type: text
    content: did to him whatever they wished, just as it is written
  - type: text
    content: ' [in Scripture] '
  - type: text
    content: of him.”
  - type: heading
    content: All Things Possible
  '14':
  - type: text
    content: 'When they came [back] to the [other nine] disciples, they saw a large crowd around them, and scribes questioning '
  - type: text
    content: and
  - type: text
    content: ' arguing with them. [Matt 17:14-18; Luke 9:37-42] '
  '15':
  - type: text
    content: 'Immediately, when the entire crowd saw Jesus, they were startled and '
  - type: text
    content: began
  - type: text
    content: ' running up to greet Him. '
  '16':
  - type: text
    content: 'He asked them, '
  - type: text
    content: “What are you discussing with them?”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'One of the crowd replied to Him, “Teacher, I brought You my son, possessed with a spirit which makes him unable to speak; '
  '18':
  - type: text
    content: 'and whenever it seizes him [intending to do harm], it throws him down, and he foams [at the mouth], and grinds his teeth and becomes stiff. I told Your disciples to drive it out, and they could not do it.” '
  '19':
  - type: text
    content: 'He replied, '
  - type: text
    content: “O unbelieving (faithless) generation, how long shall I be with you? How long shall I put up with you? Bring him to Me!”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Six days later, Jesus took with Him Peter and James and John, and led them up on a high mountain by themselves. And He was transfigured (changed in form) before them [and began to shine brightly with divine and regal glory]; [Matt 17:1-8; Luke 9:28-36] '
  '20':
  - type: text
    content: 'They brought the boy to Him. When the [demonic] spirit saw Him, immediately it threw the boy into a convulsion, and falling to the ground he '
  - type: text
    content: began
  - type: text
    content: ' rolling around and foaming '
  - type: text
    content: at the mouth
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Jesus asked his father, '
  - type: text
    content: “How long has this been happening to him?”
  - type: text
    content: ' And he answered, “Since childhood. '
  '22':
  - type: text
    content: 'The demon has often thrown him both into fire and into water, intending to kill him. But if You can do anything, take pity on us and help us!” '
  '23':
  - type: text
    content: 'Jesus said to him, “[You say to Me,] '
  - type: text
    content: '‘If You can?’ All things are possible for the one who believes '
  - type: text
    content: and
  - type: text
    content: ' trusts'
  - type: text
    content: ' [in Me]!” '
  '24':
  - type: text
    content: 'Immediately the father of the boy cried out [with a desperate, piercing cry], saying, “I do believe; help [me overcome] my unbelief.” '
  '25':
  - type: text
    content: 'When Jesus saw that a crowd was rapidly gathering [around them], He rebuked the unclean spirit, saying to it, '
  - type: text
    content: “You deaf and mute spirit, I command you, come out of him and never enter him again!”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'After screaming out and throwing him into a terrible convulsion, it came out. The boy looked so much like a corpse [so still and pale] that many [of the spectators] said, “He is dead!” '
  '27':
  - type: text
    content: 'But Jesus took him by the hand and raised him; and he stood up. '
  '28':
  - type: text
    content: 'When He had gone indoors, His disciples '
  - type: text
    content: began
  - type: text
    content: ' asking Him privately, “Why were we unable to drive it out?” '
  '29':
  - type: text
    content: 'He replied to them, '
  - type: text
    content: “This kind
  - type: text
    content: ' [of unclean spirit] '
  - type: text
    content: cannot come out by anything but prayer
  - type: text
    content: ' [to the Father].”'
  - type: heading
    content: Death and Resurrection Foretold
  '3':
  - type: text
    content: 'and His clothes became radiant '
  - type: text
    content: and
  - type: text
    content: ' dazzling, intensely white, as no launderer on earth can whiten them. '
  '30':
  - type: text
    content: 'They went on from there and '
  - type: text
    content: began
  - type: text
    content: ' to go through Galilee. Jesus did not want anyone to know it, '
  '31':
  - type: text
    content: 'because He was teaching His disciples [and preparing them for the future]. He told them, '
  - type: text
    content: '“The Son of Man is to be betrayed '
  - type: text
