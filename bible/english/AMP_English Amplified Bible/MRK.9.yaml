  '34':
  - type: text
    content: 'But they kept quiet, because on the road they had discussed '
  - type: text
    content: and
  - type: text
    content: ' debated with one another which one [of them] was the greatest. '
  '35':
  - type: text
    content: 'Sitting down [to teach], He called the twelve [disciples] and said to them, '
  - type: text
    content: “If anyone wants to be first, he must be last of all
  - type: text
    content: ' [in importance] '
  - type: text
    content: and a servant of all.”
  - type: text
