  - type: text
    content: ' and be at peace with one another.”'
  '6':
  - type: text
    content: 'For he did not [really] know what to say because they were terrified [and stunned by the miraculous sight]. '
  '7':
  - type: text
    content: 'Then a cloud formed, overshadowing them, and '
  - type: note
    content: See note Matt 3:17.
  - type: text
    content: 'a voice came out of the cloud, “This is My beloved Son. Listen to Him '
  - type: text
    content: and
  - type: text
    content: ' obey Him!” '
  '8':
  - type: text
    content: Suddenly they looked around and no longer saw anyone with them, except Jesus alone.
  '9':
  - type: text
    content: 'As they were coming down from the mountain, Jesus expressly ordered them not to tell anyone what they had seen, until the Son of Man had risen from the dead. '
