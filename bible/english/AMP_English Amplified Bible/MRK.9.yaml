  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Peter responded and said to Jesus, “Rabbi (Master), it is good for us to be here; let us make three [sacred] tents—one for You, and one for Moses, and one for Elijah.” '
  '50':
  - type: text
    content: 'Salt is good '
  - type: text
