  - type: text
    content: 'But '
  - type: note
    content: Cf v 10.
  - type: text
    content: they did not understand this statement, and they were afraid to ask Him [what He meant].
  '33':
  - type: text
    content: 'They arrived at Capernaum; and when He was in the '
  - type: note
