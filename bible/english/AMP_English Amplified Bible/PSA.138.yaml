  - type: heading
    content: Thanksgiving for the Lord’s Favor.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: I will give You thanks with all my heart;
  - type: text
    content: I sing praises to You before the [pagan] gods.
  '2':
  - type: text
    content: I will bow down [in worship] toward Your holy temple
  - type: text
    content: And give thanks to Your name for Your lovingkindness and Your truth;
  - type: text
    content: For You have magnified Your word together with Your name.
  '3':
  - type: text
    content: On the day I called, You answered me;
  - type: text
    content: 'And You made me bold '
  - type: text
    content: and
  - type: text
    content: ' confident with [renewed] strength in my life.'
  '4':
  - type: text
    content: '¶All the kings of the land will give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise You, O L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: When they have heard of the promises of Your mouth [which were fulfilled].
  '5':
  - type: text
    content: Yes, they will sing of the ways of the L
  - type: heading
    content: ord
  - type: text
    content: ' [joyfully celebrating His wonderful acts],'
  - type: text
    content: 'For great is the glory '
  - type: text
    content: and
  - type: text
    content: ' majesty of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '6':
  - type: text
    content: Though the L
  - type: heading
    content: ord
  - type: text
    content: ' is exalted,'
  - type: text
    content: He regards the lowly [and invites them into His fellowship];
  - type: text
    content: 'But the proud '
  - type: text
    content: and
  - type: text
    content: ' haughty He knows from a distance. [Prov 3:34; James 4:6; 1 Pet 5:5]'
  '7':
  - type: text
    content: ¶Though I walk in the midst of trouble, You will revive me;
  - type: text
    content: You will stretch out Your hand against the wrath of my enemies,
  - type: text
    content: And Your right hand will save me. [Ps 23:3, 4]
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will accomplish that which concerns me;'
  - type: text
