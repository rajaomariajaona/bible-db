        - type: text
          text: s
    - type: text
      text: ' Favor.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I will give You thanks with all my heart;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sing praises to You before the [pagan] gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will bow down [in worship] toward Your holy temple
- type: usfm
  marker: q1
  children:
  - type: text
    text: And give thanks to Your name for Your lovingkindness and Your truth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have magnified Your word together with Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On the day I called, You answered me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And You made me bold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident with [renewed] strength in my life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '¶All the kings of the land will give thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they have heard of the promises of Your mouth [which were fulfilled].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yes, they will sing of the ways of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [joyfully celebrating His wonderful acts],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For great is the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Though the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is exalted,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He regards the lowly [and invites them into His fellowship];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' haughty He knows from a distance. [Prov 3:34; James 4:6; 1 Pet 5:5]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Though I walk in the midst of trouble, You will revive me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will stretch out Your hand against the wrath of my enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your right hand will save me. [Ps 23:3, 4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will accomplish that which concerns me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your [unwavering] lovingkindness, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', endures forever—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not abandon the works of Your own hands. [Ps 57:2; Phil 1:6]
