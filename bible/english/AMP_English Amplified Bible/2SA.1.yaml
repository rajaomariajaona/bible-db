document_id: 2SA.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Learns of Saul’s Death
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now it happened after the death of Saul, when David had returned from the slaughter of the Amalekites, that he stayed two days in Ziklag. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So I stood facing him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The young Amalekite’s story conflicts with the description of Saul’s suicide as recounted in 1 Sam 31:3-6. He must have, at the very least, witnessed Saul’s death since he was able to obtain the crown and the arm band. He apparently expected that his story about administering the deathblow, whether true or not, would result in some sort of reward or honor.
      marker-yv: yv-n
    - type: text
      text: 'and killed him, because I knew that he could not live after he had fallen. Then I took the crown which was on his head and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This band or armlet was not jewelry, but a piece of armor worn around the arm.
      marker-yv: yv-n
    - type: text
      text: band which was on his arm, and I have brought them here to my lord.” [1 Sam 31:4]
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then David grasped his own clothes and tore them [in mourning]; so did all the men who were with him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They mourned and wept and fasted until evening for Saul and Jonathan his son, and for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' people and the house of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'Israel, because they had fallen by the sword [in battle]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David said to the young man who informed him, “Where are you from?” He answered, “I am the son of a foreigner (resident alien, sojourner), an Amalekite.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: David said to him, “How is it that you were not afraid to put out your hand to destroy the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointed?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David called one of the young men and said, “Go, execute him.” So he struck the Amalekite and he died. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: David said to the [fallen] man, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. your death is your own fault.
      marker-yv: yv-n
    - type: text
      text: Your blood is on your own head, for your own mouth has testified against you, saying, ‘I have killed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointed.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Dirge for Saul and Jonathan
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then David sang this dirge (funeral song) over Saul and his son Jonathan, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and he told '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to teach the sons of Judah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the song of
    - type: text
      text: ' the bow. Behold, it is written in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An early poetic account of the wars of Israel and the heroic acts of the warriors.
      marker-yv: yv-n
    - type: text
      text: 'the Book of Jashar:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor, O Israel, is slain upon your high places!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How the mighty have fallen!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On the third day a man came [unexpectedly] from Saul’s camp with his clothes torn and dust on his head [as in mourning]. When he came to David, he bowed to the ground and lay himself face down [in an act of great respect and submission]. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Tell it not in Gath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclaim it not in the streets of Ashkelon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the daughters of the Philistines will rejoice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The daughters of the uncircumcised (pagans) will exult.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As an expression of his grief David curses the place of Saul’s death.
      marker-yv: yv-n
    - type: text
      text: O mountains of Gilboa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let not dew or rain be upon you, nor fields with offerings;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there the shield of the mighty was defiled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The shield of Saul, [dry, cracked] not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was necessary to lubricate leather shields with oil to preserve them.
      marker-yv: yv-n
    - type: text
      text: anointed with oil.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “From the blood of the slain, from the fat of the mighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bow of Jonathan did not turn back,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the sword of Saul did not return empty.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Saul and Jonathan, beloved and lovely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' friends in their lives,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in their death they were not separated;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were swifter than eagles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were stronger than lions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “O daughters of Israel, weep over Saul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who clothed you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with jewelry
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: luxuriously in scarlet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who put ornaments of gold on your apparel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “How the mighty have fallen in the midst of the battle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jonathan lies slain upon your high places.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “I am distressed for you, my brother Jonathan;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been a good friend to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jonathan graciously accepted God’s choice of David as the next ruler of Israel, and supported him, honored him, and wanted the very best for him.
      marker-yv: yv-n
    - type: text
      text: love toward me was more wonderful
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than the love of women.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “How the mighty have fallen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the weapons of war have perished!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then David asked him, “Where do you come from?” He said, “I have escaped from the camp of Israel.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David said to him, “How did it go? Please tell me.” He answered, “The people have fled from the battle. Also, many of the people have fallen and are dead; Saul and Jonathan his son are also dead.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David said to the young man who informed him, “How do you know Saul and his son Jonathan are dead?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the young man who told him explained, “By chance I happened to be on Mount Gilboa, and there was Saul leaning on his spear, and the chariots and horsemen [of the Philistines] were close behind him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When he turned to look behind him, he saw me, and called to me. And I answered, ‘Here I am.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He asked me, ‘Who are you?’ I answered him, ‘I am an Amalekite.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He said to me, ‘Stand up facing me and kill me, for [terrible] agony has come over me, yet I still live [and I will be taken alive].’ '
