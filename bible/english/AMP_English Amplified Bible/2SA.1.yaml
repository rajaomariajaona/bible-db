  '3':
  - type: text
    content: 'Then David asked him, “Where do you come from?” He said, “I have escaped from the camp of Israel.” '
  '4':
  - type: text
    content: 'David said to him, “How did it go? Please tell me.” He answered, “The people have fled from the battle. Also, many of the people have fallen and are dead; Saul and Jonathan his son are also dead.” '
  '5':
  - type: text
    content: 'So David said to the young man who informed him, “How do you know Saul and his son Jonathan are dead?” '
  '6':
  - type: text
    content: 'And the young man who told him explained, “By chance I happened to be on Mount Gilboa, and there was Saul leaning on his spear, and the chariots and horsemen [of the Philistines] were close behind him. '
  '7':
  - type: text
    content: 'When he turned to look behind him, he saw me, and called to me. And I answered, ‘Here I am.’ '
  '8':
  - type: text
    content: 'He asked me, ‘Who are you?’ I answered him, ‘I am an Amalekite.’ '
  '9':
  - type: text
    content: 'He said to me, ‘Stand up facing me and kill me, for [terrible] agony has come over me, yet I still live [and I will be taken alive].’ '
