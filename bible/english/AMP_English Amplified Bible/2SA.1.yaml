    content: David Learns of Saul’s Death
  - type: text
    content: 'Now it happened after the death of Saul, when David had returned from the slaughter of the Amalekites, that he stayed two days in Ziklag. '
  '10':
  - type: text
    content: 'So I stood facing him '
  - type: note
    content: The young Amalekite’s story conflicts with the description of Saul’s suicide as recounted in 1 Sam 31:3-6. He must have, at the very least, witnessed Saul’s death since he was able to obtain the crown and the arm band. He apparently expected that his story about administering the deathblow, whether true or not, would result in some sort of reward or honor.
  - type: text
    content: 'and killed him, because I knew that he could not live after he had fallen. Then I took the crown which was on his head and the '
  - type: note
    content: This band or armlet was not jewelry, but a piece of armor worn around the arm.
  - type: text
    content: band which was on his arm, and I have brought them here to my lord.” [1 Sam 31:4]
