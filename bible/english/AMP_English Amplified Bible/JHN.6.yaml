  - type: text
    text: ' [disciples]? '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And yet one of you is a devil (ally of Satan).”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Now He was speaking of Judas, '
  - type: usfm
