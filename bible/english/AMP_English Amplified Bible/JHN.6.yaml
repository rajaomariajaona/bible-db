  - type: text
    text: ' [believes in Me, accepts Me as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has eternal life
  - type: text
    text: ' [that is, now possesses it], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I will raise him up
  - type: text
    text: ' [from the dead] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the last day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For My flesh is true
  - type: text
    text: ' [spiritual] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: food, and My blood is true
  - type: text
    text: ' [spiritual] '
  - type: usfm
