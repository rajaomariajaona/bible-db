  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'As a result of this '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:66 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This does not refer to the original twelve disciples (cf v 67), but to many others who had followed Him and claimed to be His disciples to this point. They were the unbelievers of v 64; Judas is the only one of the twelve singled out. The Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mathetes,
      - type: text
        text: ' i.e. “disciple” simply means “learner” and does not necessarily designate a believer.'
    marker-yv: yv-n
  - type: text
    text: 'many of His disciples abandoned Him, and no longer walked with Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'So Jesus said to the twelve [disciples], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You do not want to leave too, do you?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Simon Peter answered, “Lord, to whom shall we go? You [alone] have the words of eternal life [you are our only hope]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'We have believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently trusted, and [even more] we have come to know [by personal observation and experience] that You are the Holy One of God [the Christ, the Son of the living God].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
