  - type: text
    text: ' [it is of no account]. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The words I have spoken to you are spirit and life
  - type: text
    text: ' [providing eternal life]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But
  - type: text
    text: ' [still] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'there are some of you who do not believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have faith.”'
  - type: text
    text: ' For Jesus knew from the beginning who did not believe, and who would betray Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'And He was saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is the reason why I have told you that no one can come to Me unless it has been granted him
  - type: text
    text: ' [that is, unless he is enabled to do so] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: by the Father.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peter’s Confession of Faith
  marker-yv: yv-h
