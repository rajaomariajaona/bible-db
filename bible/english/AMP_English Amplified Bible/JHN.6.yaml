  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'When many of His disciples heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' they said, “This is a difficult '
  - type: usfm
