    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: What
    - type: text
      text: ' then'
  - type: text
    text: ' [will you think] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: if you see the Son of Man ascending to
  - type: text
    text: ' [the realm] '
  - type: usfm
