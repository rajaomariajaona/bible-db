  - type: text
    content: ' found fault with Him because He said, '
  - type: text
    content: “I am the Bread that came down out of heaven.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'They kept saying, “Is this not Jesus, the son of Joseph, whose father and mother we know? How does He now [have the arrogance to] say, '
  - type: text
    content: ‘I have come down out of heaven’?”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'So Jesus answered, '
  - type: text
    content: “Stop murmuring among yourselves.
  - type: text
    content: ' '
  '44':
