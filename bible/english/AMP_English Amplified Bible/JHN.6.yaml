  '66':
  - type: text
    content: 'As a result of this '
  - type: note
    content: This does not refer to the original twelve disciples (cf v 67), but to many others who had followed Him and claimed to be His disciples to this point. They were the unbelievers of v 64; Judas is the only one of the twelve singled out. The Greek word mathetes, i.e. “disciple” simply means “learner” and does not necessarily designate a believer.
  - type: text
    content: 'many of His disciples abandoned Him, and no longer walked with Him. '
  '67':
  - type: text
    content: 'So Jesus said to the twelve [disciples], '
  - type: text
    content: “You do not want to leave too, do you?”
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'Simon Peter answered, “Lord, to whom shall we go? You [alone] have the words of eternal life [you are our only hope]. '
  '69':
  - type: text
    content: 'We have believed '
  - type: text
    content: and
  - type: text
    content: ' confidently trusted, and [even more] we have come to know [by personal observation and experience] that You are the Holy One of God [the Christ, the Son of the living God].” '
  '7':
  - type: text
    content: 'Philip answered, “Two hundred denarii (200 days’ wages) worth of bread is not enough for each one to receive even a little.” '
