    children:
    - type: text
      text: drink.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He who eats My flesh and drinks My blood
  - type: text
    text: ' [believes in Me, accepts Me as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: remains in Me, and I
  - type: text
    text: ' [in the same way remain] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Just as the living Father sent Me, and I live because of the Father, even so the one who feeds on Me
  - type: text
    text: ' [believes in Me, accepts Me as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will also live because of Me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the Bread which came down out of heaven. It is not like
  - type: text
    text: ' [the manna that] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: our fathers ate and they
  - type: text
    text: ' [eventually] '
  - type: usfm
    marker: wj
    children:
    - type: text
