document_id: JHN.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Five Thousand Fed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this, Jesus went to the other side of the Sea of Galilee (or '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably the official Roman name of the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: 'Sea of Tiberias). [Matt 14:13-21; Mark 6:32-44; Luke 9:10-17; John 6:23; 21:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A large crowd was following Him because they had seen the signs (attesting miracles) which He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' performed on those who were sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Jesus went up on the mountainside and sat down there with His disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now the Passover, the feast of the Jews, was approaching. [Ex 12:1-36] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jesus looked up and saw that a large crowd was coming toward Him, and He said to Philip, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Where will we buy bread for these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' to eat?”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But He said this to test Philip, because He knew what He was about to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Philip answered, “Two hundred denarii (200 days’ wages) worth of bread is not enough for each one to receive even a little.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One of His disciples, Andrew, Simon Peter’s brother, said to Him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“There is a little boy here who has five barley loaves and two fish; but what are these for so many people?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Have the people sit down
  - type: text
    text: ' [to eat].” Now [the ground] there was [covered with] an abundance of grass, so the men sat down, about '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: With this number of men, the total number of people may have exceeded 10,000. The disciples did not have enough money to buy so much food, and the small villages in the area would not have had a sufficient quantity of bread to sell to them.
    marker-yv: yv-n
  - type: text
    text: '5,000 in number. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Jesus took the loaves, and when He had given thanks, He distributed them to those who were seated; the same also with the fish, as much as they wanted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When they had eaten enough, He said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Gather up the leftover pieces so that nothing will be lost.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they gathered them up, and they filled twelve large baskets with pieces from the five barley loaves which were left over by those who had eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the people saw the sign (attesting miracle) that He had done, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' saying, “This is without a doubt the promised Prophet who is to come into the world!” [Deut 18:15, 18; John 1:21; Acts 3:22]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Walks on the Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Jesus, knowing that they were going to come and take Him by force to make Him king, withdrew again to the mountainside by Himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When evening came, His disciples went down to the sea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and they got into a boat and started to cross the sea to Capernaum. It was already dark, and Jesus had still not come [back] to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sea was getting rough '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rising high because a strong wind was blowing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then, when they had rowed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 25 or 30 stadia
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'three or four miles [and were near the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Sea of Galilee is approximately thirteen miles long and eight miles wide.
    marker-yv: yv-n
  - type: text
    text: 'center of the sea], they saw Jesus walking on the sea and approaching the boat; and they were [terribly] frightened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is I (I AM); do not be afraid.”
  - type: text
    text: ' [Matt 14:27; John 8:58] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then they were willing to take Him on board the boat, and immediately the boat reached the [shore of the] land to which they were going.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The next day the crowd that stood on the other side of the sea realized that there had been only one small boat there, and that Jesus had not boarded the boat with His disciples, but that His disciples had gone away alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '[Now some] other small boats from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A city located on the NW shore of the Sea of Galilee (or Sea of Tiberius). The city was built by Herod Antipas to serve as his capital city and named in honor of the Roman Emperor.
    marker-yv: yv-n
  - type: text
    text: 'Tiberias had come in near the place where they ate the bread after the Lord had given thanks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So when the crowd saw that neither Jesus nor His disciples were there, they boarded the small boats themselves and came to Capernaum looking for Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And when they found Him on the other side of the sea, they asked Him, “Rabbi, when did You get here?”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Words to the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, you have been searching for Me, not because you saw the signs (attesting miracles), but because you ate the loaves and were filled.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do not work for food that perishes, but for food that endures
  - type: text
    text: ' [and leads] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to eternal life, which the Son of Man will give you; for God the Father has authorized Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put His seal on Him.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then they asked Him, “What are we to do, so that we may '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' be doing the works of God?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is the work of God: that you believe'
  - type: text
    text: ' [adhere to, trust in, rely on, and have faith] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the One whom He has sent.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So they said to Him, “What sign (attesting miracle) will You do that we may see it and believe You? What [supernatural] work will You do [as proof]? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Our fathers ate the manna in the wilderness; as it is written [in Scripture], ‘H
  - type: usfm
    marker: sc
    children:
    - type: text
      text: e gave them bread out of heaven to eat
  - type: text
    text: '.’ ” [Ex 16:15; Neh 9:15; Ps 78:24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, it is not Moses who has given you the bread out of heaven, but it is My Father who gives you the true '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. salvation and everlasting life through Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bread out of heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Bread of God is He who comes down out of heaven, and gives life to the world.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then they said to Him, “Lord, always give us this bread.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus uses the words “I am” over twenty times in this Gospel. Especially memorable are those places where “I am” is followed by a metaphor that declares His deity and His relationship to mankind as Savior (this is the first of seven such references); see 8:12 (Light); 10:9 (Door); 10:11 (Good Shepherd); 11:25 (Resurrection); 14:6 (Way, Truth, Life); 15:5 (Vine).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Bread of Life. The one who comes to Me will never be hungry, and the one who believes in Me
  - type: text
    text: ' [as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will never be thirsty
  - type: text
    text: ' [for that one will be sustained spiritually]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But as I told you, you have seen Me and still you do not believe.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All that My Father gives Me will come to Me; and the one who comes to Me I will most certainly not cast out
  - type: text
    text: ' [I will never, never reject anyone who follows Me]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I have come down from heaven, not to do My own will, but to do the will of Him who sent Me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the will of Him who sent Me, that of all that He has given Me I lose nothing, but that I
  - type: text
    text: ' [give new life and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: raise it up at the last day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For this is My Father’s will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose, that everyone who sees the Son and believes in Him'
  - type: text
    text: ' [as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will have eternal life, and I will raise him up
  - type: text
    text: ' [from the dead] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the last day.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Words to the Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now the Jews murmured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' found fault with Him because He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am the Bread that came down out of heaven.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They kept saying, “Is this not Jesus, the son of Joseph, whose father and mother we know? How does He now [have the arrogance to] say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I have come down out of heaven’?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stop murmuring among yourselves.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No one can come to Me unless the Father who sent Me draws him
  - type: text
    text: ' [giving him the desire to come to Me]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I will raise him up
  - type: text
    text: ' [from the dead] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the last day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is written in the prophets, ‘A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd they will all be taught of
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .’ Everyone who has listened to and learned from the Father, comes to Me.
  - type: text
    text: ' [Is 54:13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Not that anyone has seen the Father, except He
  - type: text
    text: ' [who was with the Father and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who is from God; He
  - type: text
    text: ' [alone] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has seen the Father.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, he who believes'
  - type: text
    text: ' [in Me as Savior—whoever adheres to, trusts in, relies on, and has faith in Me—already] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has eternal life
  - type: text
    text: ' [that is, now possesses it]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Bread of Life
  - type: text
    text: ' [the Living Bread which gives and sustains life]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your fathers ate the manna in the wilderness, and they died.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the Bread that comes down out of heaven, so that one may eat of it and not die.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Living Bread that came down out of heaven. If anyone eats of this Bread
  - type: text
    text: ' [believes in Me, accepts Me as Savior], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he will live forever. And the Bread that I will give for the life of the world is My flesh (body).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Then the Jews '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to argue with one another, saying, “How can this man give us His flesh to eat?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'And Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, unless you eat the flesh of the Son of Man and drink His blood'
  - type: text
    text: ' [unless you believe in Me as Savior and believe in the saving power of My blood which will be shed for you], '
  - type: usfm
