verses:
  '1':
  - type: heading
    content: Five Thousand Fed
  - type: text
    content: 'After this, Jesus went to the other side of the Sea of Galilee (or '
  - type: note
    content: Probably the official Roman name of the Sea of Galilee.
  - type: text
    content: 'Sea of Tiberias). [Matt 14:13-21; Mark 6:32-44; Luke 9:10-17; John 6:23; 21:1] '
  '10':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Have the people sit down
  - type: text
    content: ' [to eat].” Now [the ground] there was [covered with] an abundance of grass, so the men sat down, about '
  - type: note
    content: With this number of men, the total number of people may have exceeded 10,000. The disciples did not have enough money to buy so much food, and the small villages in the area would not have had a sufficient quantity of bread to sell to them.
  - type: text
    content: '5,000 in number. '
  '11':
  - type: text
    content: 'Then Jesus took the loaves, and when He had given thanks, He distributed them to those who were seated; the same also with the fish, as much as they wanted. '
  '12':
  - type: text
    content: 'When they had eaten enough, He said to His disciples, '
  - type: text
    content: “Gather up the leftover pieces so that nothing will be lost.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'So they gathered them up, and they filled twelve large baskets with pieces from the five barley loaves which were left over by those who had eaten. '
  '14':
  - type: text
    content: 'When the people saw the sign (attesting miracle) that He had done, they '
  - type: text
    content: began
  - type: text
    content: ' saying, “This is without a doubt the promised Prophet who is to come into the world!” [Deut 18:15, 18; John 1:21; Acts 3:22]'
  - type: heading
    content: Jesus Walks on the Water
  '15':
  - type: text
    content: Then Jesus, knowing that they were going to come and take Him by force to make Him king, withdrew again to the mountainside by Himself.
  '16':
  - type: text
    content: 'When evening came, His disciples went down to the sea, '
  '17':
  - type: text
    content: 'and they got into a boat and started to cross the sea to Capernaum. It was already dark, and Jesus had still not come [back] to them. '
  '18':
  - type: text
    content: 'The sea was getting rough '
  - type: text
    content: and
  - type: text
    content: ' rising high because a strong wind was blowing. '
  '19':
  - type: text
    content: 'Then, when they had rowed '
  - type: note
    content: Lit 25 or 30 stadia.
  - type: text
    content: 'three or four miles [and were near the '
  - type: note
    content: The Sea of Galilee is approximately thirteen miles long and eight miles wide.
  - type: text
    content: 'center of the sea], they saw Jesus walking on the sea and approaching the boat; and they were [terribly] frightened. '
  '2':
  - type: text
    content: 'A large crowd was following Him because they had seen the signs (attesting miracles) which He '
  - type: text
    content: continually
  - type: text
    content: ' performed on those who were sick. '
  '20':
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: “It is I (I AM); do not be afraid.”
  - type: text
    content: ' [Matt 14:27; John 8:58] '
  '21':
  - type: text
    content: Then they were willing to take Him on board the boat, and immediately the boat reached the [shore of the] land to which they were going.
  '22':
  - type: text
    content: 'The next day the crowd that stood on the other side of the sea realized that there had been only one small boat there, and that Jesus had not boarded the boat with His disciples, but that His disciples had gone away alone. '
  '23':
  - type: text
    content: '[Now some] other small boats from '
  - type: note
    content: A city located on the NW shore of the Sea of Galilee (or Sea of Tiberius). The city was built by Herod Antipas to serve as his capital city and named in honor of the Roman Emperor.
  - type: text
    content: 'Tiberias had come in near the place where they ate the bread after the Lord had given thanks. '
  '24':
  - type: text
    content: 'So when the crowd saw that neither Jesus nor His disciples were there, they boarded the small boats themselves and came to Capernaum looking for Jesus. '
  '25':
  - type: text
    content: And when they found Him on the other side of the sea, they asked Him, “Rabbi, when did You get here?”
  - type: heading
    content: Words to the People
  '26':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, you have been searching for Me, not because you saw the signs (attesting miracles), but because you ate the loaves and were filled.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Do not work for food that perishes, but for food that endures
  - type: text
    content: ' [and leads] '
  - type: text
    content: 'to eternal life, which the Son of Man will give you; for God the Father has authorized Him '
  - type: text
    content: and
  - type: text
    content: ' put His seal on Him.”'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Then they asked Him, “What are we to do, so that we may '
  - type: text
    content: habitually
  - type: text
    content: ' be doing the works of God?” '
  '29':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“This is the work of God: that you believe'
  - type: text
    content: ' [adhere to, trust in, rely on, and have faith] '
  - type: text
    content: in the One whom He has sent.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And Jesus went up on the mountainside and sat down there with His disciples. '
  '30':
  - type: text
    content: 'So they said to Him, “What sign (attesting miracle) will You do that we may see it and believe You? What [supernatural] work will You do [as proof]? '
  '31':
  - type: text
    content: Our fathers ate the manna in the wilderness; as it is written [in Scripture], ‘H
  - type: heading
    content: e gave them bread out of heaven to eat
  - type: text
    content: '.’ ” [Ex 16:15; Neh 9:15; Ps 78:24] '
  '32':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, it is not Moses who has given you the bread out of heaven, but it is My Father who gives you the true '
  - type: note
    content: I.e. salvation and everlasting life through Christ.
  - type: text
    content: bread out of heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: For the Bread of God is He who comes down out of heaven, and gives life to the world.”
  - type: text
    content: ' '
  '34':
  - type: text
    content: Then they said to Him, “Lord, always give us this bread.”
  '35':
  - type: text
    content: 'Jesus replied to them, '
  - type: text
    content: “
  - type: note
    content: Jesus uses the words “I am” over twenty times in this Gospel. Especially memorable are those places where “I am” is followed by a metaphor that declares His deity and His relationship to mankind as Savior (this is the first of seven such references); see 8:12 (Light); 10:9 (Door); 10:11 (Good Shepherd); 11:25 (Resurrection); 14:6 (Way, Truth, Life); 15:5 (Vine).
  - type: text
    content: I am the Bread of Life. The one who comes to Me will never be hungry, and the one who believes in Me
  - type: text
    content: ' [as Savior] '
  - type: text
    content: will never be thirsty
  - type: text
    content: ' [for that one will be sustained spiritually]. '
  '36':
  - type: text
    content: But as I told you, you have seen Me and still you do not believe.
  - type: text
    content: ' '
  '37':
  - type: text
    content: All that My Father gives Me will come to Me; and the one who comes to Me I will most certainly not cast out
  - type: text
    content: ' [I will never, never reject anyone who follows Me]. '
  '38':
  - type: text
    content: For I have come down from heaven, not to do My own will, but to do the will of Him who sent Me.
  - type: text
    content: ' '
  '39':
  - type: text
    content: This is the will of Him who sent Me, that of all that He has given Me I lose nothing, but that I
  - type: text
    content: ' [give new life and] '
  - type: text
    content: raise it up at the last day.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Now the Passover, the feast of the Jews, was approaching. [Ex 12:1-36] '
  '40':
  - type: text
    content: 'For this is My Father’s will '
  - type: text
    content: and
  - type: text
    content: ' purpose, that everyone who sees the Son and believes in Him'
  - type: text
    content: ' [as Savior] '
  - type: text
