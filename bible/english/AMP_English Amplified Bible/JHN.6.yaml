    children:
    - type: text
      text: and
  - type: text
    text: ' harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offensive statement. Who can [be expected to] listen to it?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'But Jesus, aware that His disciples were complaining about it, asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Does this cause you to stumble '
    - type: usfm
