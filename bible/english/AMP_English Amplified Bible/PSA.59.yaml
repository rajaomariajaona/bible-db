document_id: PSA.59,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 59
  - type: heading
    content: Prayer for Rescue from Enemies.
  - type: text
    content: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David, [a record of memorable thoughts] when Saul sent men to watch his house in order to kill him.
  - type: text
    content: Deliver me from my enemies, O my God;
  - type: text
    content: 'Set me '
  - type: text
    content: securely
  - type: text
    content: ' on an inaccessibly high place away from those who rise up against me.'
  '10':
  - type: text
    content: My God in His [steadfast] lovingkindness will meet me;
  - type: text
    content: 'God will let me look '
  - type: text
    content: triumphantly
  - type: text
    content: ' on my enemies [who lie in wait for me].'
  '11':
  - type: text
    content: Do not kill them, or my people will forget;
  - type: text
    content: 'Scatter them '
  - type: text
    content: and
  - type: text
    content: ' make them wander [endlessly] back and forth by Your power, and bring them down,'
  - type: text
    content: O Lord our shield!
  '12':
  - type: text
    content: For the sin of their mouths and the words of their lips,
  - type: text
    content: Let them even be trapped in their pride,
  - type: text
    content: And on account of the curses and lies which they tell.
  '13':
  - type: text
    content: 'Destroy '
  - type: text
    content: them
  - type: text
    content: ' in wrath, destroy '
  - type: text
    content: them
  - type: text
    content: ' so that they may be no more;'
  - type: text
    content: Let them know that God rules over Jacob (Israel)
  - type: text
    content: 'To the ends of the earth. '
  - type: text
    content: Selah.
  '14':
  - type: text
    content: 'They return at evening, they howl '
  - type: text
    content: and
  - type: text
    content: ' snarl like dogs,'
  - type: text
    content: And go [prowling] around the city.
  '15':
  - type: text
    content: They wander around for food [to devour]
  - type: text
    content: And growl all night if they are not satisfied.
  '16':
  - type: text
    content: '¶But as for me, I will sing of Your mighty strength '
  - type: text
    content: and
  - type: text
    content: ' power;'
  - type: text
    content: Yes, I will sing joyfully of Your lovingkindness in the morning;
  - type: text
    content: For You have been my stronghold
  - type: text
    content: And a refuge in the day of my distress.
  '17':
  - type: text
    content: To You, O [God] my strength, I will sing praises;
  - type: text
    content: For God is my stronghold [my refuge, my protector, my high tower], the God who shows me [steadfast] lovingkindness.
  '2':
  - type: text
    content: Deliver me from those who practice wrongdoing,
  - type: text
    content: And save me from bloodthirsty men.
  '3':
  - type: text
    content: Look! They lie in wait for my life;
  - type: text
    content: 'Fierce '
  - type: text
    content: and
  - type: text
    content: ' powerful men [are uniting together to] launch an attack against me,'
  - type: text
    content: Not for my wrongdoing nor for any sin of mine, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: They run and set themselves against me though there is no guilt in me;
  - type: text
    content: 'Stir Yourself to meet '
  - type: text
    content: and
  - type: text
    content: ' help me, and see [what they are doing]!'
  '5':
  - type: text
    content: You, O L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts, the God of Israel,'
  - type: text
    content: Arise to punish all the nations;
  - type: text
    content: 'Spare no one '
  - type: text
    content: and
  - type: text
    content: ' do not be merciful to any who treacherously plot evil. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: 'They return at evening, they howl '
  - type: text
    content: and
  - type: text
    content: ' snarl like dogs,'
  - type: text
    content: And go [prowling] around the city.
  '7':
  - type: text
    content: Look how they belch out [insults] with their mouths;
  - type: text
    content: Swords [of sarcasm, ridicule, slander, and lies] are in their lips,
  - type: text
    content: 'For '
  - type: text
    content: they say,
  - type: text
    content: ' “Who hears us?”'
  '8':
  - type: text
    content: But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', will laugh at them [in scorn];'
  - type: text
    content: 'You scoff at '
  - type: text
    content: and
  - type: text
    content: ' deride all the nations.'
  '9':
  - type: text
    content: ¶O [God] my strength, I will watch for You;
  - type: text
    content: For God is my stronghold [my refuge, my protector, my high tower].
