document_id: PSA.59,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 59
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Rescue from Enemies.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David, [a record of memorable thoughts] when Saul sent men to watch his house in order to kill him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me from my enemies, O my God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Set me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: securely
    - type: text
      text: ' on an inaccessibly high place away from those who rise up against me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God in His [steadfast] lovingkindness will meet me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God will let me look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: triumphantly
    - type: text
      text: ' on my enemies [who lie in wait for me].'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not kill them, or my people will forget;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Scatter them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make them wander [endlessly] back and forth by Your power, and bring them down,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord our shield!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sin of their mouths and the words of their lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them even be trapped in their pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on account of the curses and lies which they tell.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Destroy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' in wrath, destroy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' so that they may be no more;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them know that God rules over Jacob (Israel)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To the ends of the earth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They return at evening, they howl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' snarl like dogs,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And go [prowling] around the city.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wander around for food [to devour]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And growl all night if they are not satisfied.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶But as for me, I will sing of Your mighty strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, I will sing joyfully of Your lovingkindness in the morning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You have been my stronghold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a refuge in the day of my distress.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To You, O [God] my strength, I will sing praises;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God is my stronghold [my refuge, my protector, my high tower], the God who shows me [steadfast] lovingkindness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me from those who practice wrongdoing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And save me from bloodthirsty men.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! They lie in wait for my life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful men [are uniting together to] launch an attack against me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not for my wrongdoing nor for any sin of mine, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They run and set themselves against me though there is no guilt in me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Stir Yourself to meet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' help me, and see [what they are doing]!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts, the God of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise to punish all the nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Spare no one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do not be merciful to any who treacherously plot evil. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They return at evening, they howl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' snarl like dogs,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And go [prowling] around the city.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look how they belch out [insults] with their mouths;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swords [of sarcasm, ridicule, slander, and lies] are in their lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they say,
    - type: text
      text: ' “Who hears us?”'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', will laugh at them [in scorn];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You scoff at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deride all the nations.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O [God] my strength, I will watch for You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God is my stronghold [my refuge, my protector, my high tower].
