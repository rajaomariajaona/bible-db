verses:
  '1':
  - type: heading
    content: Law of Atonement
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses after the death of the two sons of Aaron who had died when they [irreverently] approached the presence of the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Lev 10:1, 2] '
  '10':
  - type: text
    content: But the goat on which the lot fell for the scapegoat shall be presented alive before the L
  - type: heading
    content: ord
  - type: text
    content: ' to make atonement on it; it shall be sent into the wilderness as the scapegoat.'
  '11':
  - type: text
    content: '“Aaron shall present the bull as the sin offering for himself and make atonement for himself and for his household (the other priests), and he shall kill the bull as the sin offering for himself. '
  '12':
  - type: text
    content: He shall take a censer full of burning coals from the [bronze] altar before the L
  - type: heading
    content: ord
  - type: text
    content: ', and two handfuls of finely ground sweet incense, and bring it inside the veil [into the Most Holy Place], '
  '13':
  - type: text
    content: and put the incense on the fire [in the censer] before the L
  - type: heading
    content: ord
  - type: text
    content: ', so that the cloud of the incense may cover the mercy seat that is on [the ark of] the Testimony, otherwise he will die. '
  '14':
  - type: text
    content: He shall take some of the bull’s blood and sprinkle it with his finger on the east side of the mercy seat; also in front of the mercy seat he shall sprinkle some of the blood with his finger seven times.
  '15':
  - type: text
    content: '“Then he shall kill the goat of the sin offering that is for [the sins of] the people and bring its blood within the veil [into the Most Holy Place] and do with its blood as he did with the blood of the bull, and sprinkle it on the mercy seat and in front of the mercy seat. [Heb 2:17] '
  '16':
  - type: text
    content: 'So he shall make atonement for the Holy Place (Holy of Holies) because of the uncleanness and transgressions of the Israelites, for all their sins. He shall also do this for the Tent of Meeting which is among them in the midst of their uncleanness (impurities). [Heb 9:22-24] '
  '17':
  - type: text
    content: 'There shall be no person in the Tent of Meeting when the high priest goes in to make atonement in the Holy Place [within the veil] until he comes out, so that he may make atonement for himself (his own sins) and for his household and for all the congregation of Israel. '
  '18':
  - type: text
    content: Then he shall go out to the altar [of burnt offering in the court] which is before the L
  - type: heading
    content: ord
  - type: text
    content: ' and make atonement for it, and shall take some of the blood of the bull and of the goat and put it on the horns of the altar on all sides. '
  '19':
  - type: text
    content: With his finger he shall sprinkle some of the blood on the altar of burnt offering seven times and cleanse it and consecrate it from the uncleanness of the Israelites.
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses,'
  - type: text
    content: “
  - type: text
    content: T
  - type: text
    content: 'ell Aaron your brother that he '
  - type: note
    content: The high priest was permitted to enter the Most Holy Place only once a year. The Day of Atonement was the most sacred of all the festivals and the prescribed purpose of this inclusive sacrifice was to atone for the sins of both the nation and the individual believer, and in this way reconcile God’s chosen people to Himself. Only by carefully following all of God’s instructions, could the high priest enter God’s presence and live.
  - type: text
    content: 'must not enter at any time into the Holy Place inside the veil (the Holy of Holies), before the '
  - type: note
    content: Lit propitiatory.
  - type: text
    content: 'mercy seat which is on the ark, or he will die, for I will appear in the cloud over the mercy seat. [Heb 9:7-15, 25-28] '
  '20':
  - type: text
    content: '“When he has finished atoning for the Holy Place and the Tent of Meeting and the altar, he shall present the live goat. '
  '21':
  - type: text
    content: 'Then Aaron shall lay both of his hands on the head of the live goat, and confess over it all the wickedness of the sons of Israel and all their transgressions in regard to all their sins; and he shall lay them on the head of the goat [the scapegoat, the sin-bearer], and send it away into the wilderness by the hand of a man who is prepared [for the task]. '
  '22':
  - type: text
    content: The goat shall carry on itself all their (the Israelites) wickedness, carrying them to a solitary (infertile) land; and he shall release the goat in the wilderness. [Ps 103:12; Is 53:11, 12; John 1:29]
  '23':
  - type: text
    content: '“Then Aaron shall come into the Tent of Meeting and take off the linen garments which he put on when he went into the Holy Place (Holy of Holies), and shall leave them there. '
  '24':
  - type: text
    content: 'He shall bathe his body with water in a holy place and put on his clothes, and come out and offer his burnt offering and that of the people, and make atonement for himself and for the people. '
  '25':
  - type: text
    content: 'And he shall offer up in smoke the fat of the sin offering on the altar. '
  '26':
  - type: text
    content: 'The man who released the goat as the [sin-bearing] scapegoat shall wash his clothes and bathe his body in water, and afterward he may come into the camp. '
  '27':
  - type: text
    content: 'The bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the Holy Place (Holy of Holies), shall be taken outside the camp; their skins, their meat, and their waste shall be burned in the fire. [Heb 13:11-13] '
  '28':
  - type: text
    content: Then he who burns them shall wash his clothes and bathe his body with water, and afterward he may come into the camp.
  - type: heading
    content: An Annual Atonement
  '29':
  - type: text
    content: '“This shall be a permanent statute for you: in the seventh month (nearly October) on the tenth day of the month you shall '
  - type: note
    content: It is assumed by many that humbling oneself is a reference to fasting, but if so, there is no reason to limit the idea to that. The rabbis taught that it was forbidden to eat, drink, wash, anoint oneself (with oil for the hair), put on footwear, or have marital relations. Fasting was defined as eating less than the volume of a large date and drinking less than a mouthful of liquid.
  - type: text
    content: 'humble yourselves [by fasting] and not do any work, whether the native-born or the stranger who lives temporarily among you; '
  '3':
  - type: text
    content: 'Aaron [as high priest] shall enter the Holy Place in this way: with [the blood of] a young bull as a sin offering and [the blood of] a ram as a burnt offering. '
  '30':
  - type: text
    content: for it is on this day that atonement shall be made for you, to cleanse you; you will be clean from all your sins before the L
  - type: heading
    content: ord
  - type: text
    content: '. [Heb 10:1, 2; 1 John 1:7, 9] '
  '31':
  - type: text
    content: 'It is a Sabbath of solemn rest for you, and you shall humble yourselves; it is a permanent statute. '
  '32':
  - type: text
    content: 'So the priest who is anointed and ordained to serve '
  - type: text
    content: and
  - type: text
    content: ' minister as priest in his father’s place shall make atonement: he shall wear the holy linen garments, '
  '33':
  - type: text
    content: 'and make atonement for the Holy Sanctuary, and he shall make atonement for the Tent of Meeting, and for the altar [of burnt offering in the court]. He shall also make atonement for the priests and for all the people of the assembly. '
  '34':
  - type: text
    content: This shall be a permanent statute for you, so that atonement may be made for the children of Israel for all their sins once a year.” So he did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '4':
  - type: text
    content: 'He shall put on the holy linen tunic, and the linen undergarments shall be next to his body, and he shall be belted with the linen sash, and dressed with the linen turban (these are the holy garments). He shall bathe his body in water and put them on. '
  '5':
  - type: text
    content: 'He shall take from the congregation of the Israelites [at their expense] two male goats as a sin offering and one ram as a burnt offering. '
  '6':
  - type: text
    content: 'Then Aaron shall present the bull as the sin offering for himself, and make atonement for himself and for his house. '
  '7':
  - type: text
    content: He shall take the two goats and present them before the L
  - type: heading
    content: ord
  - type: text
    content: ' at the doorway of the Tent of Meeting. '
  '8':
  - type: text
    content: Aaron shall cast lots for the two goats—one lot for the L
  - type: heading
    content: ord
  - type: text
    content: ', the other lot for the '
  - type: note
    content: 'Lit goat of removal, or else a name, Heb: Azazel. This goat’s release (v 10) symbolized the carrying away of Israel’s sin.'
  - type: text
    content: 'scapegoat. '
  '9':
  - type: text
    content: Then Aaron shall bring the goat on which the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' lot fell and offer it as a sin offering. '
