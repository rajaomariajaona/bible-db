    - type: text
      text: Law of Atonement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses after the death of the two sons of Aaron who had died when they [irreverently] approached the presence of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Lev 10:1, 2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses,'
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'ell Aaron your brother that he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The high priest was permitted to enter the Most Holy Place only once a year. The Day of Atonement was the most sacred of all the festivals and the prescribed purpose of this inclusive sacrifice was to atone for the sins of both the nation and the individual believer, and in this way reconcile God’s chosen people to Himself. Only by carefully following all of God’s instructions, could the high priest enter God’s presence and live.
    marker-yv: yv-n
  - type: text
    text: 'must not enter at any time into the Holy Place inside the veil (the Holy of Holies), before the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: propitiatory
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'mercy seat which is on the ark, or he will die, for I will appear in the cloud over the mercy seat. [Heb 9:7-15, 25-28] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aaron [as high priest] shall enter the Holy Place in this way: with [the blood of] a young bull as a sin offering and [the blood of] a ram as a burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He shall put on the holy linen tunic, and the linen undergarments shall be next to his body, and he shall be belted with the linen sash, and dressed with the linen turban (these are the holy garments). He shall bathe his body in water and put them on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He shall take from the congregation of the Israelites [at their expense] two male goats as a sin offering and one ram as a burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Aaron shall present the bull as the sin offering for himself, and make atonement for himself and for his house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He shall take the two goats and present them before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at the doorway of the Tent of Meeting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aaron shall cast lots for the two goats—one lot for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the other lot for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: goat of removal,
      - type: text
        text: ' or else a name, Heb: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Azazel
      - type: text
        text: . This goat’s release (v 10) symbolized the carrying away of Israel’s sin.
    marker-yv: yv-n
  - type: text
    text: 'scapegoat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Aaron shall bring the goat on which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' lot fell and offer it as a sin offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the goat on which the lot fell for the scapegoat shall be presented alive before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to make atonement on it; it shall be sent into the wilderness as the scapegoat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Aaron shall present the bull as the sin offering for himself and make atonement for himself and for his household (the other priests), and he shall kill the bull as the sin offering for himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He shall take a censer full of burning coals from the [bronze] altar before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and two handfuls of finely ground sweet incense, and bring it inside the veil [into the Most Holy Place], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and put the incense on the fire [in the censer] before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', so that the cloud of the incense may cover the mercy seat that is on [the ark of] the Testimony, otherwise he will die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He shall take some of the bull’s blood and sprinkle it with his finger on the east side of the mercy seat; also in front of the mercy seat he shall sprinkle some of the blood with his finger seven times.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Then he shall kill the goat of the sin offering that is for [the sins of] the people and bring its blood within the veil [into the Most Holy Place] and do with its blood as he did with the blood of the bull, and sprinkle it on the mercy seat and in front of the mercy seat. [Heb 2:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So he shall make atonement for the Holy Place (Holy of Holies) because of the uncleanness and transgressions of the Israelites, for all their sins. He shall also do this for the Tent of Meeting which is among them in the midst of their uncleanness (impurities). [Heb 9:22-24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'There shall be no person in the Tent of Meeting when the high priest goes in to make atonement in the Holy Place [within the veil] until he comes out, so that he may make atonement for himself (his own sins) and for his household and for all the congregation of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then he shall go out to the altar [of burnt offering in the court] which is before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and make atonement for it, and shall take some of the blood of the bull and of the goat and put it on the horns of the altar on all sides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: With his finger he shall sprinkle some of the blood on the altar of burnt offering seven times and cleanse it and consecrate it from the uncleanness of the Israelites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“When he has finished atoning for the Holy Place and the Tent of Meeting and the altar, he shall present the live goat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Aaron shall lay both of his hands on the head of the live goat, and confess over it all the wickedness of the sons of Israel and all their transgressions in regard to all their sins; and he shall lay them on the head of the goat [the scapegoat, the sin-bearer], and send it away into the wilderness by the hand of a man who is prepared [for the task]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The goat shall carry on itself all their (the Israelites) wickedness, carrying them to a solitary (infertile) land; and he shall release the goat in the wilderness. [Ps 103:12; Is 53:11, 12; John 1:29]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Then Aaron shall come into the Tent of Meeting and take off the linen garments which he put on when he went into the Holy Place (Holy of Holies), and shall leave them there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He shall bathe his body with water in a holy place and put on his clothes, and come out and offer his burnt offering and that of the people, and make atonement for himself and for the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And he shall offer up in smoke the fat of the sin offering on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The man who released the goat as the [sin-bearing] scapegoat shall wash his clothes and bathe his body in water, and afterward he may come into the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The bull for the sin offering and the goat for the sin offering, whose blood was brought in to make atonement in the Holy Place (Holy of Holies), shall be taken outside the camp; their skins, their meat, and their waste shall be burned in the fire. [Heb 13:11-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then he who burns them shall wash his clothes and bathe his body with water, and afterward he may come into the camp.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: An Annual Atonement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“This shall be a permanent statute for you: in the seventh month (nearly October) on the tenth day of the month you shall '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is assumed by many that humbling oneself is a reference to fasting, but if so, there is no reason to limit the idea to that. The rabbis taught that it was forbidden to eat, drink, wash, anoint oneself (with oil for the hair), put on footwear, or have marital relations. Fasting was defined as eating less than the volume of a large date and drinking less than a mouthful of liquid.
    marker-yv: yv-n
  - type: text
    text: 'humble yourselves [by fasting] and not do any work, whether the native-born or the stranger who lives temporarily among you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: for it is on this day that atonement shall be made for you, to cleanse you; you will be clean from all your sins before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Heb 10:1, 2; 1 John 1:7, 9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'It is a Sabbath of solemn rest for you, and you shall humble yourselves; it is a permanent statute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So the priest who is anointed and ordained to serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minister as priest in his father’s place shall make atonement: he shall wear the holy linen garments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and make atonement for the Holy Sanctuary, and he shall make atonement for the Tent of Meeting, and for the altar [of burnt offering in the court]. He shall also make atonement for the priests and for all the people of the assembly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: This shall be a permanent statute for you, so that atonement may be made for the children of Israel for all their sins once a year.” So he did just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
