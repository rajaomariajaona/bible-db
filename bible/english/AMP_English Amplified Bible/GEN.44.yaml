document_id: GEN.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Brothers Are Brought Back
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he commanded the steward of his house, saying, “Fill the men’s sacks with food, as much as they can carry, and put every man’s [grain] money in the mouth of the sack. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Put my [personal] cup, the silver cup, in the mouth of the sack of the youngest, with his grain money.” And the steward did as Joseph had told him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As soon as the morning was light, the men were sent away, they and their donkeys. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When they had left the city, and were not yet far away, Joseph said to his steward, “Get up, follow after the men; and when you overtake them, say to them, ‘Why have you repaid evil [to us] for good [paid to you]? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Is this not my lord’s drinking cup and the one which he uses for divination? You have done [a great and unforgivable] wrong in doing this.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the steward overtook them and he said these words to them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They said to him, “Why does my lord speak these things? Far be it from your servants to do such a thing! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Please remember, the money which we found in the mouths of our sacks we have brought back to you from the land of Canaan. Is it likely then that we would steal silver or gold from your master’s house? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'With whomever of your servants your master’s cup is found, let him die, and the rest of us will be my lord’s slaves.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the steward said, “Now let it be as you say; he with whom the cup is found will be my slave, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the rest of
  - type: text
    text: ' you shall be blameless.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then every man quickly lowered his sack to the ground and each man opened his sack [confident the cup would not be found among them]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The steward searched, beginning with the eldest and ending with the youngest, and the cup was found in Benjamin’s sack. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they tore their clothes [in grief]; and after each man had loaded his donkey again, they returned to the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Judah and his brothers came to Joseph’s house, he was still there; and they fell to the ground before him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joseph spoke harshly to them, “What is this thing that you have done? Do you not realize that such a man as I can indeed practice divination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' foretell [everything you do without outside knowledge of it]?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Judah said, “What can we say to my lord? What can we reply? Or how can we clear ourselves, since God has exposed the sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt of your servants? Behold, we are my lord’s slaves, the rest of us as well as he with whom the cup is found.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Joseph said, “Far be it from me that I should do that; but the man in whose hand the cup has been found, he will be my servant; and as for [the rest of] you, get up and go in peace to your father.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Judah approached him, and said, “O my lord, please let your servant say a word to you in private, and do not let your anger blaze against your servant, for you are equal to Pharaoh [so I speak as if directly to him]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My lord asked his servants, saying, ‘Have you a father or a brother?’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We said to my lord, ‘We have an old father and a young [brother, Benjamin, the] child of his old age. Now his brother [Joseph] is dead, and he alone is left of [the two sons born of] his mother, and his father loves him.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then you said to your servants, ‘Bring him down to me that I may actually see him.’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But we said to my lord, ‘The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “young man” does not indicate extreme youth. Benjamin was about thirty-three years old at this time.
    marker-yv: yv-n
  - type: text
    text: 'young man cannot leave his father, for if he should leave his father, his father would die.’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You said to your servants, ‘Unless your youngest brother comes with you, you shall not see my face again.’ '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So when we went back to your servant my father, we told him what my lord had said. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Our father said, ‘Go back [to Egypt], and buy us a little food.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But we said, ‘We cannot go down [to Egypt]. If our youngest brother is with us, then we will go down [there]; for we [were sternly told that we] cannot see the man’s face unless our youngest brother is with us.’ '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Your servant my father said to us, ‘You know that my wife [Rachel] bore me [only] two sons. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And one [son] went out from me, and I said, “Surely he is torn to pieces,” and I have not seen him since. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'If you take this one also from me, and harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' an accident happens to him, you will bring my gray hair down to Sheol in sorrow.’ '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now, therefore, when I come to your servant my father, and the young man is not with us, since '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his soul is knit with the young man’s soul.
    marker-yv: yv-n
  - type: text
    text: 'his life is bound up in the young man’s life, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'when he sees that the young man is not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with us,
  - type: text
    text: ' he will die; and your servants will bring the gray hair of your servant our father down to Sheol in [great] sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For your servant became security for the young man to my father, saying, ‘If I do not bring him back to you, then let me bear the blame before my father forever.’ '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now, therefore, please let your servant (Judah) remain here instead of the youth [to be] a slave to my lord, and let the young man go home with his brothers. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: How can I go up to my father if the young man is not with me—for fear that I would see the tragedy that would overtake my [elderly] father [if Benjamin does not return]?”
