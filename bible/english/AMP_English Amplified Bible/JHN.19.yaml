  '38':
  - type: text
    content: 'And after this, Joseph of Arimathea—a disciple of Jesus, but secretly for fear of the Jews—asked Pilate to let him take away the body of Jesus; and Pilate gave him permission. So he came and took away His body. [Matt 27:57-61; Mark 15:42-47; Luke 23:50-56] '
  '39':
  - type: text
    content: 'Nicodemus, who had first come to Him at night, also came bringing a mixture of myrrh and aloes, [weighing] about a hundred [Roman] '
