          text: This may refer to Judas Iscariot, but Caiaphas may be the more likely one since he was directly responsible for Jesus’ going before Pilate.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: one who handed Me over to you is greater
    - type: text
      text: ' [than your own].” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As a result of this, Pilate kept making efforts to release Him, but the Jews kept screaming, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This put political pressure on Pilate. The Jews indicated if Pilate released Jesus they would inform Rome and Pilate’s career would be in jeopardy.
      marker-yv: yv-n
    - type: text
      text: If you release this Man, you are no friend of Caesar! Anyone who makes himself out [to be] a king opposes Caesar [and rebels against the emperor]!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
