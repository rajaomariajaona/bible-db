      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because Pilate viewed Jesus as innocent, he may have ordered the beating expecting that the Jews would consider it adequate punishment and consent to Jesus’ release. Scourging was a horrific, brutal form of punishment. The glass and metal of the whip tore the body apart, exposing the vital organs. Men frequently died of the scourging.
      marker-yv: yv-n
    - type: text
      text: 'scourged (flogged, whipped). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Pilate said to Him, “You do not speak to me? Do You not know that I have authority to release You, and I have authority to crucify You?” '
