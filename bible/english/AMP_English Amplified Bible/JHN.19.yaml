    content: The Crown of Thorns
  - type: text
    content: 'So then Pilate took Jesus and had Him '
  - type: note
    content: Because Pilate viewed Jesus as innocent, he may have ordered the beating expecting that the Jews would consider it adequate punishment and consent to Jesus’ release. Scourging was a horrific, brutal form of punishment. The glass and metal of the whip tore the body apart, exposing the vital organs. Men frequently died of the scourging.
  - type: text
    content: 'scourged (flogged, whipped). '
