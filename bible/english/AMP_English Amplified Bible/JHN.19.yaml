    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'After this, Jesus, knowing that all was now finished, said in fulfillment of the Scripture, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am thirsty.”
    - type: text
      text: ' [Ps 69:21] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A jar full of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This sour wine was not to dull the senses, but to provide minimal relief to the victim. The wine mixed with gall (myrrh) that Jesus earlier had refused to drink (Matt 27:34; Mark 15:23) had narcotic qualities to deaden the pain.
      marker-yv: yv-n
    - type: text
      text: 'sour wine was placed there; so they put a sponge soaked in the sour wine on [a branch of] hyssop and held it to His mouth. [Matt 27:48, 50; Mark 15:36f; Luke 23:36] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and they kept coming up to Him, saying [mockingly], “Hail, King of the Jews [Good health! Peace! Long life to you, King of the Jews]!” And they slapped Him '
