    content: 'And many of the Jews read this inscription, for the place where Jesus was crucified was near the city; and it was written in Hebrew, in Latin, and in Greek. '
  '21':
  - type: text
    content: 'Then the chief priests of the Jews said to Pilate, “Do not write, ‘The King of the Jews’; but, ‘He said, “I am King of the Jews.” ’ ” '
  '22':
