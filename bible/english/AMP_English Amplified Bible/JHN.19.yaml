      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This wording implies that Jesus voluntarily and sovereignly released His spirit from His body in submission to God’s plan.
      marker-yv: yv-n
    - type: text
      text: gave up His spirit.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Care of the Body of Jesus
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Since it was the day of Preparation [for the Sabbath], in order to prevent the bodies from hanging on the cross on the Sabbath (for that Sabbath was a high holy day) the Jews asked Pilate to have their legs '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: After the legs were broken with a heavy blow, the condemned prisoner could no longer push upwards to assist his own breathing and would soon suffocate due to the awkward position that was forced on him by crucifixion. At the same time, breaking the legs was more painful than a quicker end with the point of a spear.
      marker-yv: yv-n
    - type: text
      text: 'broken [to hasten death] and the bodies taken away. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So the soldiers came and broke the legs of the first man, and of the other who had been crucified with Him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'But when they came to Jesus and saw that He was already dead, they did not break His legs. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But one of the soldiers pierced His side with a spear, and immediately blood and water came [flowing] out. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And he (John, the eyewitness) who has seen it has testified, and his testimony is true; and he knows that he is telling the truth, so that you also [who read this] may believe. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: For these things took place to fulfill the Scripture, “N
    - type: usfm
      marker: sc
      children:
      - type: text
