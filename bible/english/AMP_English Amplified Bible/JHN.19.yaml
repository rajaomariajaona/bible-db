  '4':
  - type: text
    content: 'Then Pilate came out again and said to them, “Look, I am bringing Him out to you so that you may know that I find no guilt in Him [no crime, no cause for an accusation].” '
  '40':
  - type: text
    content: 'So they took Jesus’ body and bound it in linen wrappings with the fragrant spices, as is the burial custom of the Jews. '
  '41':
  - type: text
    content: 'Now there was a garden at the place where He was crucified, and in the garden a new tomb [cut out of solid rock] in which no one had yet been laid. '
  '42':
  - type: text
    content: Therefore, because of the Jewish day of Preparation, and since the tomb was nearby, they laid Jesus there.
