    - type: text
      text: .” [Zech 12:10]
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And after this, Joseph of Arimathea—a disciple of Jesus, but secretly for fear of the Jews—asked Pilate to let him take away the body of Jesus; and Pilate gave him permission. So he came and took away His body. [Matt 27:57-61; Mark 15:42-47; Luke 23:50-56] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nicodemus, who had first come to Him at night, also came bringing a mixture of myrrh and aloes, [weighing] about a hundred [Roman] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: litras,
        - type: text
          text: ' equal to 12 oz each.'
      marker-yv: yv-n
    - type: text
      text: 'pounds. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Pilate came out again and said to them, “Look, I am bringing Him out to you so that you may know that I find no guilt in Him [no crime, no cause for an accusation].” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'So they took Jesus’ body and bound it in linen wrappings with the fragrant spices, as is the burial custom of the Jews. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Now there was a garden at the place where He was crucified, and in the garden a new tomb [cut out of solid rock] in which no one had yet been laid. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Therefore, because of the Jewish day of Preparation, and since the tomb was nearby, they laid Jesus there.
  '5':
  - type: usfm
    marker: p
    children:
