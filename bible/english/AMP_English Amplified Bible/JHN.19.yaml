  '31':
  - type: text
    content: 'Since it was the day of Preparation [for the Sabbath], in order to prevent the bodies from hanging on the cross on the Sabbath (for that Sabbath was a high holy day) the Jews asked Pilate to have their legs '
  - type: note
    content: After the legs were broken with a heavy blow, the condemned prisoner could no longer push upwards to assist his own breathing and would soon suffocate due to the awkward position that was forced on him by crucifixion. At the same time, breaking the legs was more painful than a quicker end with the point of a spear.
  - type: text
    content: 'broken [to hasten death] and the bodies taken away. '
  '32':
  - type: text
    content: 'So the soldiers came and broke the legs of the first man, and of the other who had been crucified with Him. '
  '33':
  - type: text
    content: 'But when they came to Jesus and saw that He was already dead, they did not break His legs. '
  '34':
  - type: text
    content: 'But one of the soldiers pierced His side with a spear, and immediately blood and water came [flowing] out. '
