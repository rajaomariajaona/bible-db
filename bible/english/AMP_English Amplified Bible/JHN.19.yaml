  '6':
  - type: text
    content: 'When the chief priests and officers saw Him, they shouted, “Crucify [Him]! Crucify [Him]!” Pilate said to them, “Take Him yourselves and crucify Him, for I find no guilt in Him [no crime, no cause for an accusation].” [Luke 23:4, 14, 22; John 18:38; 19:4] '
  '7':
  - type: text
    content: The Jews answered him, “We have a law [regarding blasphemy], and according to that law He should die, because He made Himself out to be the Son of God.” [Lev 24:16]
