  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'There they crucified Him, and with Him two others, one on either side, and Jesus between them. [Is 53:12] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pilate also wrote an inscription [on a placard] and put it on the cross. And it was written: “JESUS THE NAZARENE, THE KING OF THE JEWS.” [Matt 27:33-44; Mark 15:22-32; Luke 23:33-43] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the soldiers twisted together a crown of thorns and put it on His head, and put a purple robe around Him; [Matt 27:27-30; Mark 15:16-19] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And many of the Jews read this inscription, for the place where Jesus was crucified was near the city; and it was written in Hebrew, in Latin, and in Greek. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the chief priests of the Jews said to Pilate, “Do not write, ‘The King of the Jews’; but, ‘He said, “I am King of the Jews.” ’ ” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Pilate replied, “What I have written I have written [and it remains written].”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then the soldiers, when they had crucified Jesus, took His outer clothes and made four parts, a part for each soldier, and also the tunic. But the '
    - type: usfm
