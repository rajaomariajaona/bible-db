document_id: PSA.26,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 26
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Protestation of Integrity and Prayer for Protection.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vindicate me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for I have walked in my integrity;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have [relied on and] trusted [confidently] in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' without wavering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I shall not slip.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: In whose hands is a wicked scheme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose right hand is full of bribes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But as for me, I shall walk in my integrity;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Redeem me and be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: My foot stands on a level place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the congregations I will bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Examine me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and try me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Test my heart and my mind.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For Your lovingkindness is before my eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have walked [faithfully] in Your truth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I do not sit with deceitful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unethical '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' worthless men,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor seek companionship with pretenders (self-righteous hypocrites).
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I hate the company of evildoers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will not sit with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will wash my hands in innocence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will go about Your altar, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: That I may proclaim with the voice of thanksgiving
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And declare all Your wonders.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I love the habitation of Your house'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the place where Your glory dwells.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not sweep my soul away with sinners,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor [sweep away] my life with men of bloodshed,
