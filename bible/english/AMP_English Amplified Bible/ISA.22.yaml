document_id: ISA.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Valley of Vision
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning the Valley of Vision:'
  - type: text
    content: What is the matter with you now, that you have all gone up to the housetops,
  '10':
  - type: text
    content: Then you counted the houses of Jerusalem
  - type: text
    content: And you tore down the houses [to get materials] to fortify the city wall [by extending it].
  '11':
  - type: text
    content: You also made a reservoir between the two walls
  - type: text
    content: 'For the waters of the '
  - type: note
    content: Perhaps a reference to the Gihon Spring, also called the Upper Pool.
  - type: text
    content: Old Pool,
  - type: text
    content: But you did not look to its Maker,
  - type: text
    content: Nor did you recognize Him who planned it long ago.
  '12':
  - type: text
    content: ¶Therefore in that day the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts called you to weeping, to mourning,'
  - type: text
    content: To shaving the head and to wearing sackcloth [in humiliation].
  '13':
  - type: text
    content: Instead, there is joy and jubilation,
  - type: text
    content: Killing of oxen and slaughtering of sheep,
  - type: text
    content: 'Eating meat and drinking wine, '
  - type: text
    content: saying,
  - type: text
    content: “Let us eat and drink, for tomorrow we may die.”
  '14':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts revealed Himself in my ears,'
  - type: text
    content: “This sin absolutely will not be forgiven you
  - type: text
    content: Until you die,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts.'
  '15':
  - type: text
    content: ¶For the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts says this, “Go to this [contemptible] steward,'
  - type: text
    content: 'To '
  - type: note
    content: Shebna would have been second in command to King Hezekiah before being deposed from steward (administrator) to the position of scribe (36:3).
  - type: text
    content: 'Shebna, who is in charge of the '
  - type: text
    content: royal
  - type: text
    content: ' household [but is building himself a tomb worthy of a king, and say to him],'
  '16':
  - type: text
    content: ‘What business do you have here?
  - type: text
    content: And whom do you have here,
  - type: text
    content: That you have hewn out a tomb here for yourself,
  - type: text
    content: You who hew a sepulcher on the height,
  - type: text
    content: You who carve a resting place for yourself in the rock?
  '17':
  - type: text
    content: ‘Listen carefully, the L
  - type: heading
    content: ord
  - type: text
    content: ' is about to hurl you away violently, O man;'
  - type: text
    content: And He is about to grasp you firmly
  '18':
  - type: text
    content: And roll you up tightly like a ball
  - type: text
    content: And toss you into a vast country;
  - type: text
    content: There you will die
  - type: text
    content: And there your splendid chariots will be,
  - type: text
    content: You shame of your master’s house.’
  '19':
  - type: text
    content: “I will depose you from your office,
  - type: text
    content: And you will be pulled down from your position [of importance].
  '2':
  - type: text
    content: You [Jerusalem] who were full of noise,
  - type: text
    content: 'A tumultuous city, a joyous '
  - type: text
    content: and
  - type: text
    content: ' exuberant city;'
  - type: text
    content: Your slain were not slain [in a glorious death] with the sword,
  - type: text
    content: Nor did they die in battle.
  '20':
  - type: text
    content: “Then it will come to pass in that day
  - type: text
    content: That I will summon My servant Eliakim the son of Hilkiah.
  '21':
  - type: text
    content: “And I will clothe him with your tunic [of distinction]
  - type: text
    content: And tie your sash securely around him.
  - type: text
    content: I will entrust him with your authority;
  - type: text
    content: He will become a father to the inhabitants of Jerusalem and to the house of Judah.
  '22':
  - type: text
    content: “Then I will set on his shoulder the key of the house of David;
  - type: text
    content: When he opens no one will shut,
  - type: text
    content: When he shuts no one will open.
  '23':
  - type: text
    content: '“I will drive him '
  - type: text
    content: like
  - type: text
    content: ' a peg in a firm place,'
  - type: text
    content: 'And he will become a throne of honor '
  - type: text
    content: and
  - type: text
    content: ' glory to his father’s house.'
  '24':
  - type: text
    content: 'So they will hang on him all the honor '
  - type: text
    content: and
  - type: text
    content: ' glory [the complete responsibility] of his father’s house, offspring and issue [of the family, high and low], all the least of the articles, from the bowls to all the jars. '
  '25':
  - type: text
    content: In that day,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “the peg (Eliakim) that was driven into the firm place will give way; it will even break off and fall, and the burden hanging on it will be cut off, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has spoken.”'
  '3':
  - type: text
    content: All your leaders have fled together [with your king],
  - type: text
    content: And have been captured without the bow [which they had thrown away];
  - type: text
    content: All of you who were found were taken captive together,
  - type: text
    content: Though they had fled far away.
  '4':
  - type: text
    content: Therefore I say, “Look away from me;
  - type: text
    content: Let me weep bitterly.
  - type: text
    content: Do not try to comfort me over the destruction of the daughter of my people.”
  '5':
  - type: text
    content: For the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts has a day of panic '
  - type: text
    content: and
  - type: text
    content: ' of tumult, of trampling, of confusion'
  - type: text
    content: In the Valley of Vision,
  - type: text
    content: A [day of] breaking down walls
  - type: text
    content: And a crying [for help] to the mountain.
  '6':
  - type: text
    content: Elam took up the quiver
  - type: text
    content: With the chariots, infantry and horsemen;
  - type: text
    content: And Kir uncovered the shield.
  '7':
  - type: text
    content: And it came to pass that your choicest valleys were full of chariots,
  - type: text
    content: And the horsemen took their fixed positions [in an offensive array] at the gate [of Jerusalem]. [2 Chr 32; Is 36]
  '8':
  - type: text
    content: Then God removed the [protective] covering of Judah;
  - type: text
    content: And in that day you looked to the weapons of the House of the Forest (Solomon’s armory). [1 Kin 7:2; 10:17, 21]
  '9':
  - type: text
    content: You saw that the breaches
  - type: text
    content: In the wall of the City of David [the citadel of Zion] were many;
  - type: text
    content: You collected [within the city’s walls] the waters of the Lower Pool (Siloam).
