document_id: ISA.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Valley of Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) concerning the Valley of Vision:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is the matter with you now, that you have all gone up to the housetops,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You [Jerusalem] who were full of noise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A tumultuous city, a joyous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exuberant city;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your slain were not slain [in a glorious death] with the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor did they die in battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All your leaders have fled together [with your king],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have been captured without the bow [which they had thrown away];
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of you who were found were taken captive together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though they had fled far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore I say, “Look away from me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me weep bitterly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not try to comfort me over the destruction of the daughter of my people.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts has a day of panic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of tumult, of trampling, of confusion'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the Valley of Vision,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A [day of] breaking down walls
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a crying [for help] to the mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elam took up the quiver
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the chariots, infantry and horsemen;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Kir uncovered the shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And it came to pass that your choicest valleys were full of chariots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the horsemen took their fixed positions [in an offensive array] at the gate [of Jerusalem]. [2 Chr 32; Is 36]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then God removed the [protective] covering of Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in that day you looked to the weapons of the House of the Forest (Solomon’s armory). [1 Kin 7:2; 10:17, 21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You saw that the breaches
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the wall of the City of David [the citadel of Zion] were many;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You collected [within the city’s walls] the waters of the Lower Pool (Siloam).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then you counted the houses of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you tore down the houses [to get materials] to fortify the city wall [by extending it].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You also made a reservoir between the two walls
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the waters of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps a reference to the Gihon Spring, also called the Upper Pool.
    marker-yv: yv-n
  - type: text
    text: Old Pool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you did not look to its Maker,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor did you recognize Him who planned it long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Therefore in that day the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts called you to weeping, to mourning,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To shaving the head and to wearing sackcloth [in humiliation].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Instead, there is joy and jubilation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Killing of oxen and slaughtering of sheep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eating meat and drinking wine, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let us eat and drink, for tomorrow we may die.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts revealed Himself in my ears,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This sin absolutely will not be forgiven you
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until you die,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶For the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts says this, “Go to this [contemptible] steward,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shebna would have been second in command to King Hezekiah before being deposed from steward (administrator) to the position of scribe (36:3).
    marker-yv: yv-n
  - type: text
    text: 'Shebna, who is in charge of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: royal
  - type: text
    text: ' household [but is building himself a tomb worthy of a king, and say to him],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘What business do you have here?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whom do you have here,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you have hewn out a tomb here for yourself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who hew a sepulcher on the height,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who carve a resting place for yourself in the rock?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Listen carefully, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is about to hurl you away violently, O man;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He is about to grasp you firmly
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And roll you up tightly like a ball
- type: usfm
  marker: q1
  children:
  - type: text
    text: And toss you into a vast country;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There you will die
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there your splendid chariots will be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shame of your master’s house.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “I will depose you from your office,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will be pulled down from your position [of importance].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Then it will come to pass in that day
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I will summon My servant Eliakim the son of Hilkiah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “And I will clothe him with your tunic [of distinction]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tie your sash securely around him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will entrust him with your authority;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will become a father to the inhabitants of Jerusalem and to the house of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Then I will set on his shoulder the key of the house of David;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he opens no one will shut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he shuts no one will open.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“I will drive him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a peg in a firm place,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he will become a throne of honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory to his father’s house.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they will hang on him all the honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory [the complete responsibility] of his father’s house, offspring and issue [of the family, high and low], all the least of the articles, from the bowls to all the jars. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In that day,” declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “the peg (Eliakim) that was driven into the firm place will give way; it will even break off and fall, and the burden hanging on it will be cut off, for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken.”'
