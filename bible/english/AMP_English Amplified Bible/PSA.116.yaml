document_id: PSA.116,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 116
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thanksgiving for Rescue from Death.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I love the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', because He hears [and continues to hear]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My voice and my supplications (my pleas, my cries, my specific needs).
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I believed [and clung to my God] when I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am greatly afflicted.” [2 Cor 4:13]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I said in my alarm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All men are liars.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶What will I give to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [in return]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all His benefits toward me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[How can I repay Him for His precious blessings?]'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will lift up the cup of salvation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And call on the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will pay my vows to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, in the presence of all His people.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient rabbis interpreted this verse to mean that it is hard for God to declare death upon the righteous.
      marker-yv: yv-n
    - type: text
      text: Precious [and of great consequence] in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is the death of His godly ones [so He watches over them].
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', truly I am Your servant;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am Your servant, the son of Your handmaid;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have unfastened my chains.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I will offer to You the sacrifice of thanksgiving,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will call on the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I will pay my vows to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, in the presence of all His people,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: In the courts of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house (temple)—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of you, O Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Because He has inclined His ear to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will call on Him as long as I live.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The cords '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrows of death encompassed me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the terrors of Sheol came upon me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I found distress and sorrow.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then I called on the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', please save my life!”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶Gracious is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and [consistently] righteous;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, our God is compassionate.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Jewish tradition this became a common saying to explain how some people could do ill-advised things and not suffer for them.
      marker-yv: yv-n
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' protects the simple (childlike);'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was brought low [humbled and discouraged], and He saved me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Return to your rest, O my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has dealt bountifully with you. [Matt 11:29]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For You have rescued my life from death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes from tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And my feet from stumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' falling.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will walk [in submissive wonder] before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the land of the living.
