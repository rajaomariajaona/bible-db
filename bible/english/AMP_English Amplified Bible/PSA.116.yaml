verses:
  '1':
  - type: heading
    content: Psalm 116
  - type: heading
    content: Thanksgiving for Rescue from Death.
  - type: text
    content: I love the L
  - type: heading
    content: ord
  - type: text
    content: ', because He hears [and continues to hear]'
  - type: text
    content: My voice and my supplications (my pleas, my cries, my specific needs).
  '10':
  - type: text
    content: I believed [and clung to my God] when I said,
  - type: text
    content: “I am greatly afflicted.” [2 Cor 4:13]
  '11':
  - type: text
    content: I said in my alarm,
  - type: text
    content: “All men are liars.”
  '12':
  - type: text
    content: ¶What will I give to the L
  - type: heading
    content: ord
  - type: text
    content: ' [in return]'
  - type: text
    content: For all His benefits toward me?
  - type: text
    content: '[How can I repay Him for His precious blessings?]'
  '13':
  - type: text
    content: I will lift up the cup of salvation
  - type: text
    content: And call on the name of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '14':
  - type: text
    content: I will pay my vows to the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Yes, in the presence of all His people.
  '15':
  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis interpreted this verse to mean that it is hard for God to declare death upon the righteous.
  - type: text
    content: Precious [and of great consequence] in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: Is the death of His godly ones [so He watches over them].
  '16':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', truly I am Your servant;'
  - type: text
    content: I am Your servant, the son of Your handmaid;
  - type: text
    content: You have unfastened my chains.
  '17':
  - type: text
    content: I will offer to You the sacrifice of thanksgiving,
  - type: text
    content: And will call on the name of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '18':
  - type: text
    content: I will pay my vows to the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Yes, in the presence of all His people,
  '19':
  - type: text
    content: In the courts of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house (temple)—'
  - type: text
    content: In the midst of you, O Jerusalem.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  '2':
  - type: text
    content: Because He has inclined His ear to me,
  - type: text
    content: Therefore I will call on Him as long as I live.
  '3':
  - type: text
    content: 'The cords '
  - type: text
    content: and
  - type: text
    content: ' sorrows of death encompassed me,'
  - type: text
    content: And the terrors of Sheol came upon me;
  - type: text
    content: I found distress and sorrow.
  '4':
  - type: text
    content: Then I called on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ':'
  - type: text
    content: “O L
  - type: heading
    content: ord
  - type: text
    content: ', please save my life!”'
  '5':
  - type: text
    content: ¶Gracious is the L
  - type: heading
    content: ord
  - type: text
    content: ', and [consistently] righteous;'
  - type: text
    content: Yes, our God is compassionate.
  '6':
  - type: text
    content: ' '
  - type: note
    content: In Jewish tradition this became a common saying to explain how some people could do ill-advised things and not suffer for them.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' protects the simple (childlike);'
  - type: text
    content: I was brought low [humbled and discouraged], and He saved me.
  '7':
  - type: text
    content: Return to your rest, O my soul,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has dealt bountifully with you. [Matt 11:29]'
  '8':
  - type: text
    content: For You have rescued my life from death,
  - type: text
    content: My eyes from tears,
  - type: text
    content: 'And my feet from stumbling '
  - type: text
    content: and
  - type: text
    content: ' falling.'
  '9':
  - type: text
    content: I will walk [in submissive wonder] before the L
  - type: heading
    content: ord
  - type: text
    content: In the land of the living.
