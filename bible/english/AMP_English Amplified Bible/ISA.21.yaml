  '1':
  - type: heading
    content: God Commands That Babylon Be Taken
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning the Desert of the '
  - type: note
    content: Probably a reference to the Euphrates and Tigris Rivers and their tributaries which overflowed their banks like a sea. Great dams were constructed to control their floodwaters.
  - type: text
    content: 'Sea (the seasonally flooded plains just south of Babylon):'
  - type: text
    content: As windstorms in the Negev (the South) sweep through,
  - type: text
    content: So it (God’s judgment) comes from the desert, from [the hostile armies of] a terrifying land.
  '10':
  - type: text
    content: 'O my threshed '
  - type: text
    content: people
  - type: text
    content: ' [Judah, who must be judged and trampled down by Babylon], my afflicted of the threshing floor.'
  - type: text
    content: What I have heard from the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: The God of Israel, I have [joyfully] announced to you [that Babylon is to fall].
  - type: heading
    content: Oracles about Edom and Arabia
  '11':
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning Dumah (Edom):'
  - type: text
    content: Someone keeps calling to me from Seir (Edom),
  - type: text
    content: “Watchman, what is left of the night [of Assyrian oppression]?
  - type: text
    content: Watchman, what is left of the night? [How long until morning?]”
  '12':
  - type: text
    content: The watchman says,
  - type: text
    content: “The morning comes [only briefly], but also [comes] the night [of Babylonian oppression].
  - type: text
    content: If you would ask [of me then], ask [again, if Edom really wishes to know];
  - type: text
    content: Come back again.”
  '13':
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning Arabia:'
  - type: text
    content: In the thickets of Arabia you must spend the night,
  - type: text
    content: Caravans of Dedanites.
  '14':
  - type: text
    content: Bring water for the thirsty [Dedanites],
  - type: text
    content: O inhabitants of the land of Tema [in Arabia];
  - type: text
    content: Meet the fugitive with bread.
  '15':
  - type: text
    content: For they have fled from the swords,
  - type: text
    content: From the drawn sword, from the bent bow
  - type: text
    content: 'And from the press of battle '
  - type: text
    content: and
  - type: text
    content: ' grief of war.'
  '16':
  - type: text
    content: 'For the Lord has said this to me, “Within a year, according to the years of a hired man [who will work no longer than was agreed], all the splendor of [the tribe of] Kedar will end; '
  '17':
  - type: text
    content: and the remainder of the number of archers, the mighty men of the sons of Kedar, will be few; for the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, has spoken.”'
  '2':
  - type: text
    content: A harsh vision has been shown to me;
  - type: text
    content: The treacherous one deals treacherously, and the destroyer destroys.
  - type: text
    content: Go up, Elam! Lay siege, Media!
  - type: text
    content: All the groaning [caused by Babylon’s ruthless oppressions] I [the L
  - type: heading
    content: ord
  - type: text
    content: '] have brought to an end. [Is 11:11; 13:17]'
  '3':
  - type: text
    content: Therefore [continues Isaiah] my loins are filled with anguish;
  - type: text
    content: Pains have seized me like the pains of a woman in childbirth;
  - type: text
    content: 'I am so bent '
  - type: text
    content: and
  - type: text
    content: ' bewildered that I cannot hear, I am so terrified that I cannot see.'
  '4':
  - type: text
    content: My mind reels, horror overwhelms me;
  - type: text
    content: 'The twilight I longed for has been '
  - type: note
    content: The vision reveals the events to occur at the feast of Belshazzar—the defilement of the golden articles taken from God’s temple, the handwriting on the wall, the murder of Babylon’s great king.
  - type: text
    content: 'turned into fear '
  - type: text
    content: and
  - type: text
    content: ' trembling for me. [Dan 5:1-4]'
  '5':
  - type: text
    content: They set the table [for the doomed banquet], they spread out the cloth, they eat, they drink;
  - type: text
    content: “Rise up, captains [of Belshazzar’s court], oil your shields [for battle, for your enemy is at the gates]!”
  '6':
  - type: text
    content: This is what the Lord says to me,
  - type: text
    content: “Go, station the lookout, let him report what he sees.
  '7':
  - type: text
    content: “When he sees a chariot, horsemen in pairs,
  - type: text
    content: A train of donkeys and a train of camels,
  - type: text
    content: 'Let him pay attention '
  - type: text
    content: and
  - type: text
    content: ' listen closely, very closely.”'
  '8':
  - type: text
    content: 'And the lookout called '
  - type: text
    content: like
  - type: text
    content: ' a lion,'
  - type: text
    content: “O Lord, I stand continually on the watchtower by day,
  - type: text
    content: And I am stationed every night at my guard post.
  '9':
  - type: text
    content: “Now look! Here comes a troop of riders, horsemen in pairs.”
  - type: text
    content: And one said, “Fallen, fallen is Babylon;
  - type: text
    content: And all the carved images of her gods are shattered on the ground.”
