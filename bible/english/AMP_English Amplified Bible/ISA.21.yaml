segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Commands That Babylon Be Taken
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) concerning the Desert of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a reference to the Euphrates and Tigris Rivers and their tributaries which overflowed their banks like a sea. Great dams were constructed to control their floodwaters.
    marker-yv: yv-n
  - type: text
    text: 'Sea (the seasonally flooded plains just south of Babylon):'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As windstorms in the Negev (the South) sweep through,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So it (God’s judgment) comes from the desert, from [the hostile armies of] a terrifying land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A harsh vision has been shown to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The treacherous one deals treacherously, and the destroyer destroys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go up, Elam! Lay siege, Media!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the groaning [caused by Babylon’s ruthless oppressions] I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] have brought to an end. [Is 11:11; 13:17]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore [continues Isaiah] my loins are filled with anguish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pains have seized me like the pains of a woman in childbirth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am so bent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered that I cannot hear, I am so terrified that I cannot see.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My mind reels, horror overwhelms me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The twilight I longed for has been '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The vision reveals the events to occur at the feast of Belshazzar—the defilement of the golden articles taken from God’s temple, the handwriting on the wall, the murder of Babylon’s great king.
    marker-yv: yv-n
  - type: text
    text: 'turned into fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trembling for me. [Dan 5:1-4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They set the table [for the doomed banquet], they spread out the cloth, they eat, they drink;
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Rise up, captains [of Belshazzar’s court], oil your shields [for battle, for your enemy is at the gates]!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This is what the Lord says to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Go, station the lookout, let him report what he sees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “When he sees a chariot, horsemen in pairs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A train of donkeys and a train of camels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let him pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listen closely, very closely.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the lookout called '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' a lion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “O Lord, I stand continually on the watchtower by day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I am stationed every night at my guard post.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Now look! Here comes a troop of riders, horsemen in pairs.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And one said, “Fallen, fallen is Babylon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the carved images of her gods are shattered on the ground.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'O my threshed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' [Judah, who must be judged and trampled down by Babylon], my afflicted of the threshing floor.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What I have heard from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God of Israel, I have [joyfully] announced to you [that Babylon is to fall].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Oracles about Edom and Arabia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) concerning Dumah (Edom):'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Someone keeps calling to me from Seir (Edom),
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Watchman, what is left of the night [of Assyrian oppression]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Watchman, what is left of the night? [How long until morning?]”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The watchman says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The morning comes [only briefly], but also [comes] the night [of Babylonian oppression].
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you would ask [of me then], ask [again, if Edom really wishes to know];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come back again.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) concerning Arabia:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the thickets of Arabia you must spend the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Caravans of Dedanites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bring water for the thirsty [Dedanites],
- type: usfm
  marker: q1
  children:
  - type: text
    text: O inhabitants of the land of Tema [in Arabia];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Meet the fugitive with bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For they have fled from the swords,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the drawn sword, from the bent bow
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And from the press of battle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grief of war.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the Lord has said this to me, “Within a year, according to the years of a hired man [who will work no longer than was agreed], all the splendor of [the tribe of] Kedar will end; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and the remainder of the number of archers, the mighty men of the sons of Kedar, will be few; for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, has spoken.”'
