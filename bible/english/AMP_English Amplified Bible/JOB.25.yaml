document_id: JOB.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bildad Says Man Is Inferior
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Bildad the Shuhite answered and said,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Dominion and awe belong to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He establishes peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' order in His high places.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is there any number to His [vast celestial] armies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And upon whom does His light not rise?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“How then can man be justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous with God?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or how can he who is born of a woman be pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clean? [Ps 130:3; 143:2]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, even the moon has no brightness [compared to God’s majesty and glory]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the stars are not pure in His sight,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How much less man, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' maggot,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the son of man, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' worm!”'
