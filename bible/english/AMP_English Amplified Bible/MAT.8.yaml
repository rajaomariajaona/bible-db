  - type: text
    content: and
  - type: text
    content: ' wonderful calm [a perfect peacefulness]. '
  '27':
  - type: text
    content: The men wondered in amazement, saying, “What kind of man is this, that even the winds and the sea obey Him?”
  - type: heading
    content: Jesus Casts Out Demons
  '28':
  - type: text
    content: 'When He arrived at the other side in the country of the Gadarenes, two demon-possessed men coming out of the tombs met Him. '
  - type: text
    content: They were
  - type: text
    content: ' so extremely fierce '
  - type: text
    content: and
  - type: text
    content: ' violent that no one could pass by that way. [Mark 5:1-17; Luke 8:26-37] '
  '29':
  - type: text
    content: And they screamed out, “
  - type: note
    content: Lit What to us and to you, originally a Hebrew idiom which does not translate well into English. The idiom is meant to bluntly inform the other person that the speaker is not aware of any obligation between them, and does not wish to deal with the other person (cf 2 Sam 16:10). It can also express the speaker’s protest that he has not harmed the other individual, and therefore should not suffer harm at the hands of that person (cf 1 Kin 17:18).
  - type: text
    content: 'What business do we have [in common] with each other, Son of God? Have You come to torment us before the appointed time [of judgment]?” [Judg 11:12; 2 Sam 16:10; Matt 25:41; Mark 5:7; Luke 4:34; Rev 20:10] '
  '3':
  - type: text
    content: 'Jesus reached out His hand and touched him, saying, '
  - type: text
    content: “I am willing; be cleansed.”
  - type: text
    content: ' Immediately his leprosy was cleansed. '
  '30':
  - type: text
    content: 'Some distance from them a large herd of pigs was grazing. '
