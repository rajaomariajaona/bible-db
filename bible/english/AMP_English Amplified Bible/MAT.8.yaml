  '23':
  - type: text
    content: 'When He got into the boat, His disciples followed Him. [Mark 4:36-41; Luke 8:22-25] '
  '24':
  - type: text
    content: 'And suddenly a violent storm arose on the sea, so that the boat was being covered by the waves; but Jesus was sleeping. '
  '25':
  - type: text
    content: 'And the disciples went and woke Him, saying, “Lord, save us, we are going to die!” '
  '26':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Why are you afraid, you men of little faith?”
  - type: text
