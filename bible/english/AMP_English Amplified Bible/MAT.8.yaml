      children:
      - type: text
        text: Peter’s Mother-in-law and Many Others Healed
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus went into Peter’s house [in Capernaum], He saw Peter’s mother-in-law lying sick in bed with a fever. [Mark 1:29-34; Luke 4:38-41] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He touched her hand and the fever left her; and she got up and served Him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When evening came, they brought to Him many who were under the power of demons; and He cast out the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evil
    - type: text
      text: ' spirits with a word, and restored to health all who were sick [exhibiting His authority as Messiah], '
  '17':
  - type: usfm
