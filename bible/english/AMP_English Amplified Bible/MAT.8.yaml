        - type: text
          text: What to us and to you,
      - type: text
        text: ' originally a Hebrew idiom which does not translate well into English. The idiom is meant to bluntly inform the other person that the speaker is not aware of any obligation between them, and does not wish to deal with the other person (cf 2 Sam 16:10). It can also express the speaker’s protest that he has not harmed the other individual, and therefore should not suffer harm at the hands of that person (cf 1 Kin 17:18).'
    marker-yv: yv-n
  - type: text
    text: 'What business do we have [in common] with each other, Son of God? Have You come to torment us before the appointed time [of judgment]?” [Judg 11:12; 2 Sam 16:10; Matt 25:41; Mark 5:7; Luke 4:34; Rev 20:10] '
  - type: usfm
