      - type: text
        text: of the Sea of Galilee
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then [on His way to board the boat] a scribe [who was a respected and authoritative interpreter of the Law] came and said to Him, “Master, I will accompany You [as Your student] wherever You go.” [Luke 9:57-60] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a leper came up to Him and bowed down before Him, saying, “Lord, if You are willing, You are able to make me clean (well).” [Mark 1:40-44; Luke 5:12-14] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Foxes have holes and the birds of the air have nests, but the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus uses this title to identify Himself as Messiah. It appears over eighty times in the Gospels.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Son of Man has nowhere to lay His head.”
    - type: text
      text: ' [Dan 7:13; Mark 8:31, 38; Luke 12:8; John 1:51; Acts 7:56] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Disciple
        - type: text
          text: ' does not always refer to a true believer, but may also be used to refer to someone who is merely a student or learner.'
      marker-yv: yv-n
    - type: text
      text: 'disciples said to Him, “Lord, let me first go and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly an idiom meaning something like, “after my father dies and after I observe the traditional mourning period and after I receive my inheritance, then I will do such and such.” This was probably nothing more than a petty excuse to avoid making a commitment to Jesus and had nothing to do with the condition of the man’s father (who was probably fine).
      marker-yv: yv-n
    - type: text
      text: 'bury my father (collect my inheritance).” [Luke 9:59, 60] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow Me
    - type: text
      text: ' [believing in Me as Master and Teacher], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and allow the
    - type: text
      text: ' [spiritually] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dead to bury their own dead.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He got into the boat, His disciples followed Him. [Mark 4:36-41; Luke 8:22-25] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And suddenly a violent storm arose on the sea, so that the boat was being covered by the waves; but Jesus was sleeping. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the disciples went and woke Him, saying, “Lord, save us, we are going to die!” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you afraid, you men of little faith?”
    - type: text
      text: ' Then He got up and rebuked the winds and the sea, and there was [at once] a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderful calm [a perfect peacefulness]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men wondered in amazement, saying, “What kind of man is this, that even the winds and the sea obey Him?”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Casts Out Demons
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He arrived at the other side in the country of the Gadarenes, two demon-possessed men coming out of the tombs met Him. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They were
    - type: text
      text: ' so extremely fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violent that no one could pass by that way. [Mark 5:1-17; Luke 8:26-37] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they screamed out, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: What to us and to you,
        - type: text
          text: ' originally a Hebrew idiom which does not translate well into English. The idiom is meant to bluntly inform the other person that the speaker is not aware of any obligation between them, and does not wish to deal with the other person (cf 2 Sam 16:10). It can also express the speaker’s protest that he has not harmed the other individual, and therefore should not suffer harm at the hands of that person (cf 1 Kin 17:18).'
      marker-yv: yv-n
    - type: text
      text: 'What business do we have [in common] with each other, Son of God? Have You come to torment us before the appointed time [of judgment]?” [Judg 11:12; 2 Sam 16:10; Matt 25:41; Mark 5:7; Luke 4:34; Rev 20:10] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus reached out His hand and touched him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am willing; be cleansed.”
    - type: text
      text: ' Immediately his leprosy was cleansed. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some distance from them a large herd of pigs was grazing. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The demons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' begging Him, “If You drive us out, send us into the herd of pigs.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go!”
    - type: text
      text: ' So they came out [of the men] and went into the pigs, and the whole herd rushed down the steep bank into the sea and died in the water. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The herdsmen ran away, and went to the city and reported everything, including what had happened to the men under the power of demons. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the whole city came out to meet Jesus; and as soon as they saw Him, they begged Him to leave their region.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See that you tell no one
    - type: text
      text: ' [about this]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but go, show yourself to the priest
    - type: text
      text: ' [for inspection] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and present the offering that Moses commanded, as a testimony (evidence) to them
    - type: text
      text: ' [of your healing].” [Lev 14:2]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus went into Capernaum, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Roman military officer commanding a hundred men.
      marker-yv: yv-n
    - type: text
      text: 'centurion came up to Him, begging Him [for help], [Luke 7:1-10] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and saying, “Lord, my servant is lying at home paralyzed, with intense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrible, tormenting pain.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I will come and heal him.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the centurion replied to Him, “Lord, I am not worthy to have You come under my roof, but only say the word, and my servant will be healed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I also am a man subject to authority [of a higher rank], with soldiers subject to me; and I say to one, ‘Go!’ and he goes, and to another, ‘Come!’ and he comes, and to my slave, ‘Do this!’ and he does it.” '
