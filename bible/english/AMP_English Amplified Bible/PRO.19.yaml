  '1':
  - type: heading
    content: On Life and Conduct
  - type: text
    content: Better is a poor man who walks in his integrity
  - type: text
    content: Than a [rich] man who is twisted in his speech and is a [shortsighted] fool.
  '10':
  - type: text
    content: Luxury is not fitting for a fool;
  - type: text
    content: Much less for a slave to rule over princes.
  '11':
  - type: text
    content: 'Good sense '
  - type: text
    content: and
  - type: text
    content: ' discretion make a man slow to anger,'
  - type: text
    content: 'And it is his honor '
  - type: text
    content: and
  - type: text
    content: ' glory to overlook a transgression '
  - type: text
    content: or
  - type: text
    content: ' an offense [without seeking revenge and harboring resentment].'
  '12':
  - type: text
    content: 'The king’s wrath '
  - type: text
    content: terrifies
  - type: text
    content: ' like the roaring of a lion,'
  - type: text
    content: But his favor is as [refreshing and nourishing as] dew on the grass. [Hos 14:5]
  '13':
  - type: text
    content: A foolish (ungodly) son is destruction to his father,
  - type: text
    content: And the contentions of a [quarrelsome] wife are like a constant dripping [of water].
  '14':
  - type: text
    content: House and wealth are the inheritance from fathers,
  - type: text
    content: 'But a wise, understanding, '
  - type: text
    content: and
  - type: text
    content: ' sensible wife is [a gift and blessing] from the L'
  - type: heading
    content: ord
  - type: text
    content: . [Prov 18:22]
  '15':
  - type: text
    content: Laziness casts one into a deep sleep [unmindful of lost opportunity],
  - type: text
    content: And the idle person will suffer hunger.
  '16':
  - type: text
    content: 'He who keeps '
  - type: text
    content: and
  - type: text
    content: ' obeys the commandment [of the L'
  - type: heading
    content: ord
  - type: text
    content: '] keeps (guards) his own life,'
  - type: text
    content: 'But he who is careless of his ways '
  - type: text
    content: and
  - type: text
    content: ' conduct will die. [Prov 13:13; 16:17; Luke 10:28; 11:28]'
  '17':
  - type: text
    content: 'He who is gracious '
  - type: text
    content: and
  - type: text
    content: ' lends a hand to the poor lends to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will repay him for his good deed. [Prov 28:27; Eccl 11:1; Matt 10:42; 25:40; 2 Cor 9:6-8; Heb 6:10]'
  '18':
  - type: text
    content: 'Discipline '
  - type: text
    content: and
  - type: text
    content: ' teach your son while there is hope,'
  - type: text
    content: And do not [indulge your anger or resentment by imposing inappropriate punishment nor] desire his destruction.
  '19':
  - type: text
    content: ' '
  - type: text
    content: A man of
  - type: text
    content: ' great anger will bear the penalty [for his quick temper and lack of self-control];'
  - type: text
    content: For if you rescue him [and do not let him learn from the consequences of his action], you will only have to rescue him over and over again.
  '2':
  - type: text
    content: Also it is not good for a person to be without knowledge,
  - type: text
    content: And he who hurries with his feet [acting impulsively and proceeding without caution or analyzing the consequences] sins (misses the mark).
  '20':
  - type: text
    content: 'Listen to counsel, receive instruction, '
  - type: text
    content: and
  - type: text
    content: ' accept correction,'
  - type: text
    content: That you may be wise in the time to come.
  '21':
  - type: text
    content: Many plans are in a man’s mind,
  - type: text
    content: But it is the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' purpose for him that will stand (be carried out). [Job 23:13; Ps 33:10, 11; Is 14:26, 27; 46:10; Acts 5:39; Heb 6:17]'
  '22':
  - type: text
    content: 'That which is desirable in a man is his loyalty '
  - type: text
    content: and
  - type: text
    content: ' unfailing love,'
  - type: text
    content: But it is better to be a poor man than a [wealthy] liar.
  '23':
  - type: text
    content: The fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: text
    content: leads
  - type: text
    content: ' to life,'
  - type: text
    content: So that one may sleep satisfied, untouched by evil. [Job 5:19; Ps 91:3; Prov 12:13; Is 46:4; Jer 1:8; Dan 6:27; 2 Tim 4:18]
  '24':
  - type: text
    content: The lazy man buries his hand in the [food] dish,
  - type: text
    content: But will not even bring it to his mouth again.
  '25':
  - type: text
    content: Strike a scoffer [for refusing to learn], and the naive may [be warned and] become prudent;
  - type: text
    content: 'Reprimand one who has understanding '
  - type: text
    content: and
  - type: text
    content: ' a teachable spirit, and he will gain knowledge '
  - type: text
    content: and
  - type: text
    content: ' insight.'
  '26':
  - type: text
    content: He who assaults his father and chases away his mother
  - type: text
    content: Is a son who brings shame and disgrace. [1 Tim 5:8]
  '27':
  - type: text
    content: 'Cease listening, my son, to instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline'
  - type: text
    content: And you will
  - type: text
    content: ' stray from the words of knowledge.'
  '28':
  - type: text
    content: 'A wicked '
  - type: text
    content: and
  - type: text
    content: ' worthless witness mocks justice,'
  - type: text
    content: And the mouth of the wicked spreads iniquity.
  '29':
  - type: text
    content: Judgments are prepared for scoffers,
  - type: text
    content: And beatings for the backs of [thickheaded] fools. [Is 32:6]
  '3':
  - type: text
    content: The foolishness of man undermines his way [ruining whatever he undertakes];
  - type: text
    content: 'Then his heart is resentful '
  - type: text
    content: and
  - type: text
    content: ' rages against the L'
  - type: heading
    content: ord
  - type: text
    content: ' [for, being a fool, he blames the L'
  - type: heading
    content: ord
  - type: text
    content: ' instead of himself].'
  '4':
  - type: text
    content: Wealth makes many friends,
  - type: text
    content: But a poor man is separated from his friend. [Prov 14:20]
  '5':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: And he who breathes out lies will not escape. [Ex 23:1; Deut 19:16-19; Prov 6:19; 21:28]
  '6':
  - type: text
    content: 'Many will seek the favor of a generous '
  - type: text
    content: and
  - type: text
    content: ' noble man,'
  - type: text
    content: And everyone is a friend to him who gives gifts.
  '7':
  - type: text
    content: All the brothers of a poor man hate him;
  - type: text
    content: How much more do his friends abandon him!
  - type: text
    content: 'He pursues '
  - type: text
    content: them with
  - type: text
    content: ' words, but they are gone.'
  '8':
  - type: text
    content: 'He who gains wisdom '
  - type: text
    content: and
  - type: text
    content: ' good sense loves (preserves) his own soul;'
  - type: text
    content: 'He who keeps understanding will find good '
  - type: text
    content: and
  - type: text
    content: ' prosper.'
  '9':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: And he who breathes lies will perish.
