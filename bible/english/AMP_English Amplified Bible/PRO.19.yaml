document_id: PRO.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: On Life and Conduct
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Better is a poor man who walks in his integrity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than a [rich] man who is twisted in his speech and is a [shortsighted] fool.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Luxury is not fitting for a fool;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Much less for a slave to rule over princes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Good sense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discretion make a man slow to anger,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it is his honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory to overlook a transgression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an offense [without seeking revenge and harboring resentment].'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The king’s wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: terrifies
    - type: text
      text: ' like the roaring of a lion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But his favor is as [refreshing and nourishing as] dew on the grass. [Hos 14:5]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A foolish (ungodly) son is destruction to his father,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the contentions of a [quarrelsome] wife are like a constant dripping [of water].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: House and wealth are the inheritance from fathers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a wise, understanding, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sensible wife is [a gift and blessing] from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Prov 18:22]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Laziness casts one into a deep sleep [unmindful of lost opportunity],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the idle person will suffer hunger.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He who keeps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obeys the commandment [of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] keeps (guards) his own life,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who is careless of his ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conduct will die. [Prov 13:13; 16:17; Luke 10:28; 11:28]'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He who is gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lends a hand to the poor lends to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will repay him for his good deed. [Prov 28:27; Eccl 11:1; Matt 10:42; 25:40; 2 Cor 9:6-8; Heb 6:10]'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teach your son while there is hope,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not [indulge your anger or resentment by imposing inappropriate punishment nor] desire his destruction.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A man of
    - type: text
      text: ' great anger will bear the penalty [for his quick temper and lack of self-control];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For if you rescue him [and do not let him learn from the consequences of his action], you will only have to rescue him over and over again.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Also it is not good for a person to be without knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who hurries with his feet [acting impulsively and proceeding without caution or analyzing the consequences] sins (misses the mark).
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Listen to counsel, receive instruction, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept correction,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you may be wise in the time to come.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Many plans are in a man’s mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' purpose for him that will stand (be carried out). [Job 23:13; Ps 33:10, 11; Is 14:26, 27; 46:10; Acts 5:39; Heb 6:17]'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'That which is desirable in a man is his loyalty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfailing love,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is better to be a poor man than a [wealthy] liar.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leads
    - type: text
      text: ' to life,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that one may sleep satisfied, untouched by evil. [Job 5:19; Ps 91:3; Prov 12:13; Is 46:4; Jer 1:8; Dan 6:27; 2 Tim 4:18]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The lazy man buries his hand in the [food] dish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But will not even bring it to his mouth again.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Strike a scoffer [for refusing to learn], and the naive may [be warned and] become prudent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Reprimand one who has understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a teachable spirit, and he will gain knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insight.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He who assaults his father and chases away his mother
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a son who brings shame and disgrace. [1 Tim 5:8]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Cease listening, my son, to instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And you will
    - type: text
      text: ' stray from the words of knowledge.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'A wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless witness mocks justice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the mouth of the wicked spreads iniquity.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Judgments are prepared for scoffers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And beatings for the backs of [thickheaded] fools. [Is 32:6]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The foolishness of man undermines his way [ruining whatever he undertakes];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then his heart is resentful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rages against the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [for, being a fool, he blames the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' instead of himself].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Wealth makes many friends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a poor man is separated from his friend. [Prov 14:20]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A false witness will not go unpunished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who breathes out lies will not escape. [Ex 23:1; Deut 19:16-19; Prov 6:19; 21:28]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Many will seek the favor of a generous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And everyone is a friend to him who gives gifts.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: All the brothers of a poor man hate him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much more do his friends abandon him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He pursues '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them with
    - type: text
      text: ' words, but they are gone.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He who gains wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good sense loves (preserves) his own soul;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who keeps understanding will find good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A false witness will not go unpunished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who breathes lies will perish.
