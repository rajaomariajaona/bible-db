document_id: 2CO.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus (the Messiah) by the will of God, and Timothy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' brother,'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o the church of God which is at Corinth, and to all the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All born-again believers are saints, that is, they are set apart for God’s special use.
      marker-yv: yv-n
    - type: text
      text: 'saints (God’s people) throughout Achaia (southern Greece):'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He rescued us from so great a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: threat of
    - type: text
      text: ' death, and will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continue to
    - type: text
      text: ' rescue us. On Him we have set our hope. And He will again rescue us [from danger and draw us near], '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while you join in helping us by your prayers. Then thanks will be given by many persons on our behalf for the gracious gift [of deliverance] granted to us through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the prayers of
    - type: text
      text: ' many [believers].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul’s Integrity
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is our [reason for] proud confidence: our conscience testifies that we have conducted ourselves in the world [in general], and especially toward you, with pure motives and godly sincerity, not in human wisdom, but in the grace of God [that is, His gracious lovingkindness that leads people to Christ and spiritual maturity]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we write you nothing other than what you read and understand [there is no double meaning in what we say]. And I hope you will [accurately] understand [divine things] until the end; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: just as you have [already] partially understood us, [and one day will recognize] that you can be proud of us just as we are of you, in the day of our Lord Jesus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was with this confidence that I planned at first to visit you, so that you might receive twice a token of grace; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that is, [I wanted] to visit you on my way to Macedonia, and [then] to come back to you [on my return] from Macedonia, and have you send me on my way to Judea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, was I indecisive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' capricious when I was [originally] planning this? Or the things I plan, do I plan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to the flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in a self-serving way like a worldly man, ready to say, “Yes, yes” and “No, no” [at the same time]? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [as surely as] God is faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' means what He says, our message to you is not “Yes” and “No” [at the same time]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Son of God, Jesus Christ, who was preached among you by us, by me, Silvanus, and Timothy, was not “Yes” and “No,” but has proved to be “Yes” in Him [true and faithful, the divine “Yes” affirming God’s promises]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as many as are the promises of God, in Christ they are [all answered] “Yes.” So through Him we say our “Amen” to the glory of God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it is God who establishes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confirms us [in joint fellowship] with you in Christ, and who has anointed us [empowering us with the gifts of the Spirit]; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: it is He who has also put His seal on us [that is, He has appropriated us and certified us as His] and has given us the [Holy] Spirit in our hearts as a pledge [like a security deposit to guarantee the fulfillment of His promise of eternal life].
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I call on God as my soul’s witness, that it was to spare you [pain and discouragement] that I did not come again to Corinth— '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not that we rule [like dictators] over your faith, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rather
    - type: text
      text: ' we work with you for [the increase of] your joy; for in your faith you stand firm [in your strong conviction that Jesus of Nazareth—the Messiah—is the Son of God, through whom we obtain eternal salvation].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Blessed [gratefully praised and adored] be the God and Father of our Lord Jesus Christ, the Father of mercies and the God of all comfort, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who comforts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourages us in every trouble so that we will be able to comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage those who are in any kind of trouble, with the comfort with which we ourselves are comforted by God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For just as Christ’s sufferings are ours in abundance [as they overflow to His followers], so also our comfort [our reassurance, our encouragement, our consolation] is abundant through Christ [it is truly more than enough to endure what we must]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if we are troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressed, it is for your comfort and salvation; or if we are comforted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraged, it is for your comfort, which works [in you] when you patiently endure the same sufferings which we '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: suffer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'experience. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And our '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the NT the word “hope” expresses a cherished desire along with the confident assurance of obtaining that which is longed for.
      marker-yv: yv-n
    - type: text
      text: 'hope for you [our confident expectation of good for you] is firmly grounded [assured and unshaken], since we know that just as you share '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as partners
    - type: text
      text: ' in our sufferings, so also you share '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as partners
    - type: text
      text: ' in our comfort.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we do not want you to be uninformed, brothers and sisters, about '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In general, the editorial plurals used in this letter refer only to Paul.
      marker-yv: yv-n
    - type: text
      text: 'our trouble in [the west coast province of] Asia [Minor], how we were utterly weighed down, beyond our strength, so that we despaired even of life [itself]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, we felt within ourselves that we had received the sentence of death [and were convinced that we would die, but this happened] so that we would not trust in ourselves, but in God who raises the dead. '
