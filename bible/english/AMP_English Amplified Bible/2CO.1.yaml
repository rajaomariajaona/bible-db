verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus (the Messiah) by the will of God, and Timothy '
  - type: text
    content: our
  - type: text
    content: ' brother,'
  - type: text
    content: T
  - type: text
    content: 'o the church of God which is at Corinth, and to all the '
  - type: note
    content: All born-again believers are saints, that is, they are set apart for God’s special use.
  - type: text
    content: 'saints (God’s people) throughout Achaia (southern Greece):'
  '10':
  - type: text
    content: 'He rescued us from so great a '
  - type: text
    content: threat of
  - type: text
    content: ' death, and will '
  - type: text
    content: continue to
  - type: text
    content: ' rescue us. On Him we have set our hope. And He will again rescue us [from danger and draw us near], '
  '11':
  - type: text
    content: 'while you join in helping us by your prayers. Then thanks will be given by many persons on our behalf for the gracious gift [of deliverance] granted to us through '
  - type: text
    content: the prayers of
  - type: text
    content: ' many [believers].'
  - type: heading
    content: Paul’s Integrity
  '12':
  - type: text
    content: 'This is our [reason for] proud confidence: our conscience testifies that we have conducted ourselves in the world [in general], and especially toward you, with pure motives and godly sincerity, not in human wisdom, but in the grace of God [that is, His gracious lovingkindness that leads people to Christ and spiritual maturity]. '
  '13':
  - type: text
    content: 'For we write you nothing other than what you read and understand [there is no double meaning in what we say]. And I hope you will [accurately] understand [divine things] until the end; '
  '14':
  - type: text
    content: just as you have [already] partially understood us, [and one day will recognize] that you can be proud of us just as we are of you, in the day of our Lord Jesus.
  '15':
  - type: text
    content: 'It was with this confidence that I planned at first to visit you, so that you might receive twice a token of grace; '
  '16':
  - type: text
    content: 'that is, [I wanted] to visit you on my way to Macedonia, and [then] to come back to you [on my return] from Macedonia, and have you send me on my way to Judea. '
  '17':
  - type: text
    content: 'So then, was I indecisive '
  - type: text
    content: or
  - type: text
    content: ' capricious when I was [originally] planning this? Or the things I plan, do I plan '
  - type: note
    content: Lit according to the flesh.
  - type: text
    content: 'in a self-serving way like a worldly man, ready to say, “Yes, yes” and “No, no” [at the same time]? '
  '18':
  - type: text
    content: 'But [as surely as] God is faithful '
  - type: text
    content: and
  - type: text
    content: ' means what He says, our message to you is not “Yes” and “No” [at the same time]. '
  '19':
  - type: text
    content: 'For the Son of God, Jesus Christ, who was preached among you by us, by me, Silvanus, and Timothy, was not “Yes” and “No,” but has proved to be “Yes” in Him [true and faithful, the divine “Yes” affirming God’s promises]. '
  '2':
  - type: text
    content: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  '20':
  - type: text
    content: 'For as many as are the promises of God, in Christ they are [all answered] “Yes.” So through Him we say our “Amen” to the glory of God. '
  '21':
  - type: text
    content: 'Now it is God who establishes '
  - type: text
    content: and
  - type: text
    content: ' confirms us [in joint fellowship] with you in Christ, and who has anointed us [empowering us with the gifts of the Spirit]; '
  '22':
  - type: text
    content: it is He who has also put His seal on us [that is, He has appropriated us and certified us as His] and has given us the [Holy] Spirit in our hearts as a pledge [like a security deposit to guarantee the fulfillment of His promise of eternal life].
  '23':
  - type: text
    content: 'But I call on God as my soul’s witness, that it was to spare you [pain and discouragement] that I did not come again to Corinth— '
  '24':
  - type: text
    content: 'not that we rule [like dictators] over your faith, but '
  - type: text
    content: rather
  - type: text
    content: ' we work with you for [the increase of] your joy; for in your faith you stand firm [in your strong conviction that Jesus of Nazareth—the Messiah—is the Son of God, through whom we obtain eternal salvation].'
  '3':
  - type: text
    content: 'Blessed [gratefully praised and adored] be the God and Father of our Lord Jesus Christ, the Father of mercies and the God of all comfort, '
  '4':
  - type: text
    content: 'who comforts '
  - type: text
    content: and
  - type: text
    content: ' encourages us in every trouble so that we will be able to comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage those who are in any kind of trouble, with the comfort with which we ourselves are comforted by God. '
  '5':
  - type: text
    content: 'For just as Christ’s sufferings are ours in abundance [as they overflow to His followers], so also our comfort [our reassurance, our encouragement, our consolation] is abundant through Christ [it is truly more than enough to endure what we must]. '
  '6':
  - type: text
    content: 'But if we are troubled '
  - type: text
    content: and
  - type: text
    content: ' distressed, it is for your comfort and salvation; or if we are comforted '
  - type: text
    content: and
  - type: text
    content: ' encouraged, it is for your comfort, which works [in you] when you patiently endure the same sufferings which we '
  - type: note
    content: Lit suffer.
  - type: text
    content: 'experience. '
  '7':
  - type: text
    content: 'And our '
  - type: note
    content: In the NT the word “hope” expresses a cherished desire along with the confident assurance of obtaining that which is longed for.
  - type: text
    content: 'hope for you [our confident expectation of good for you] is firmly grounded [assured and unshaken], since we know that just as you share '
  - type: text
    content: as partners
  - type: text
    content: ' in our sufferings, so also you share '
  - type: text
    content: as partners
  - type: text
    content: ' in our comfort.'
  '8':
  - type: text
    content: 'For we do not want you to be uninformed, brothers and sisters, about '
  - type: note
    content: In general, the editorial plurals used in this letter refer only to Paul.
  - type: text
    content: 'our trouble in [the west coast province of] Asia [Minor], how we were utterly weighed down, beyond our strength, so that we despaired even of life [itself]. '
  '9':
  - type: text
    content: 'Indeed, we felt within ourselves that we had received the sentence of death [and were convinced that we would die, but this happened] so that we would not trust in ourselves, but in God who raises the dead. '
