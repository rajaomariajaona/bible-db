  - type: heading
    content: The purpose of the chorus is to echo and expand the sentiments of the bride and her bridegroom. The members of the chorus are not always known, but have been variously identified as “daughters of Jerusalem,” “daughters of Zion,” “ladies in waiting,” “friends” or “relatives” of the bride.(The Chorus)
