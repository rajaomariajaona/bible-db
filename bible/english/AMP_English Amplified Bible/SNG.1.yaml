  - type: note
    content: Some theologians believe the Song of Solomon to be a collection of songs, but it is more generally understood to be a sort of drama or lyric poem celebrating the wholesomeness of a growing love that leads to maturity in marriage. The ancient rabbis understood it as an allegory of the relationship between God and Israel, and viewed the details as symbolic.
  - type: text
    content: Song of Songs [the best of songs], which is Solomon’s. [1 Kin 4:32]
  - type: heading
    content: The parenthetical headings indicate that the speakers are not from the Hebrew text nor the Septuagint, but reflect an ancient tradition which appears in some manuscripts.(The Shulammite Bride)
