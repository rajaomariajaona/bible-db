        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some theologians believe the Song of Solomon to be a collection of songs, but it is more generally understood to be a sort of drama or lyric poem celebrating the wholesomeness of a growing love that leads to maturity in marriage. The ancient rabbis understood it as an allegory of the relationship between God and Israel, and viewed the details as symbolic.
      marker-yv: yv-n
    - type: text
      text: Song of Songs [the best of songs], which is Solomon’s. [1 Kin 4:32]
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The parenthetical headings indicate that the speakers are not from the Hebrew text nor the Septuagint, but reflect an ancient tradition which appears in some manuscripts.
      marker-yv: yv-n
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Your cheeks are lovely with ornaments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your neck with strings of jewels.”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Chorus)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '¶“We will make for you chains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ornaments of gold,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Studded] with beads of silver.”'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶“While the king was at his table,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My perfume (Solomon) sent forth [his] fragrance [surrounding me].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “My beloved is to me like a pouch of myrrh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which lies all night between my breasts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “My beloved is to me a cluster of henna flowers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the [fragrant] vineyards of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An oasis on the western side of the Dead Sea.
      marker-yv: yv-n
    - type: text
      text: Engedi.”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Bridegroom)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶“Behold, how beautiful you are, my darling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, how beautiful you are!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your eyes are dove’s eyes.”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '¶“Behold, how fair '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handsome you are, my beloved;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' so delightful!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our arbor is green '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' luxuriant.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “The beams of our houses are cedars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our rafters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' panels are cypresses.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ¶“May he kiss me with the kisses of his mouth!” [Solomon arrives, she turns to him, saying,]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For your love is better than wine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“The aroma of your oils is fragrant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your name is perfume poured out;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore the maidens love you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Draw me away with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let us run '
    - type: usfm
      marker: it
      children:
      - type: text
        text: together!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the king bring me into his chambers.”
  - type: usfm
    marker: sp
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The purpose of the chorus is to echo and expand the sentiments of the bride and her bridegroom. The members of the chorus are not always known, but have been variously identified as “daughters of Jerusalem,” “daughters of Zion,” “ladies in waiting,” “friends” or “relatives” of the bride.
      marker-yv: yv-n
    - type: text
      text: (The Chorus)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: W
    - type: text
      text: e will rejoice and be glad in you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We will remember '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extol your love more [sweet and fragrant] than wine.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rightly do they love you.”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶“I am deeply tanned but lovely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O daughters of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[I am dark] like the tents of [the Bedouins of] Kedar,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the [beautiful] curtains of Solomon.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Do not gaze at me because I am deeply tanned,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[I have worked in] the sun; it has left its mark on me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mother’s sons were angry with me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made me keeper of the vineyards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my own vineyard (my complexion) I have not kept.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Tell me, O you whom my soul loves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Where do you pasture '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where do you make it lie down at noon?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For why should I be like one who is veiled
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beside the flocks of your companions?” [Ps 23:1, 2]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon, the Lover, Speaks
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Bridegroom)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶“If you do not know [where your lover is],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O you fairest among women,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Run along, follow the tracks of the flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And pasture your young goats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the tents of the shepherds.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶“To me, my love, you are like
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My [favorite] mare among the chariots of Pharaoh.
