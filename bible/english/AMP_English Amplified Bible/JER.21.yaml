    children:
    - type: text
      text: '1'
  - type: text
    text: The word which came to Jeremiah from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' when King Zedekiah sent to him Pashhur the son of Malchijah, and Zephaniah the priest the son of Maaseiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Please inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for us, because '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar. Nebuchadnezzar II of the Chaldean Dynasty, more commonly known as Nebuchadnezzar the Great, ruled Babylon from 605-562 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. He conquered Jerusalem in 597 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Nebuchadnezzar king of Babylon is making war against us. Perhaps the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will deal [favorably] with us according to all His wonderful works and force him to withdraw from us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Jeremiah said to them, “Say this to Zedekiah: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, “Behold, I will turn back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dull the edge of the weapons of war that are in your hands, [those] with which you fight against the king of Babylon and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Chaldeans dominated and ruled Babylonia from 625 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '., until their empire fell in 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '., but they were known as early as 1000 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian increasingly influenced by Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans who are besieging you outside the walls; and I will bring them into the center of this city (Jerusalem). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I Myself will fight against you with an outstretched hand and with a strong arm in anger, in fury, and in great indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will also strike the inhabitants of this city, both man and beast; they will die of a great virulent disease. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then afterward,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “I will hand over Zedekiah king of Judah and his servants and the people in this city who survive the virulent disease, the sword, and the famine, to Nebuchadnezzar king of Babylon, and into the hand of their enemy, into the hand of those who seek their lives. And he will strike them with the edge of the sword; he will not spare them nor have mercy and compassion on them.” ’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And to this people you (Jeremiah) shall also say, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Behold, I set before you the way of life and the way of death. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He who remains in this city [of Jerusalem] will die by the sword and by famine and by virulent disease. But he who goes outside and surrenders to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Chaldeans became the dominant people in Babylonia when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans who are besieging you will live, and his life will be like a prize of war to him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For I have set My face against this city to do harm and not good,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . “It shall be given into the hand of the king of Babylon and he will burn it with fire.” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “And concerning the royal house of the king of Judah [you shall say], ‘Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O house of David, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Administer justice in the morning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rescue the one who has been robbed from the hand of his oppressor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That My wrath will not roar up like fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: And burn so [hotly] that none can extinguish it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the evil of their deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“Understand this, I am against you, O inhabitant of the valley,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O rock of the plain,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You who say, ‘Who will come down against us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or who will enter into our dwelling places?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But I will punish you in accordance with the [appropriate] consequences of your decisions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your actions,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will kindle a fire in your forest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will devour all that is around you.” ’ ”
