  - type: text
    content: ' for us, because '
  - type: note
    content: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar. Nebuchadnezzar II of the Chaldean Dynasty, more commonly known as Nebuchadnezzar the Great, ruled Babylon from 605-562 b.c. He conquered Jerusalem in 597 b.c.'
  - type: text
    content: Nebuchadnezzar king of Babylon is making war against us. Perhaps the L
  - type: heading
    content: ord
  - type: text
    content: ' will deal [favorably] with us according to all His wonderful works and force him to withdraw from us.”'
  '3':
  - type: text
    content: 'Then Jeremiah said to them, “Say this to Zedekiah: '
  '4':
  - type: text
    content: ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, “Behold, I will turn back '
  - type: text
    content: and
  - type: text
    content: ' dull the edge of the weapons of war that are in your hands, [those] with which you fight against the king of Babylon and the '
  - type: note
    content: The Chaldeans dominated and ruled Babylonia from 625 b.c., until their empire fell in 539 b.c., but they were known as early as 1000 b.c. as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian increasingly influenced by Aramaic.
  - type: text
    content: 'Chaldeans who are besieging you outside the walls; and I will bring them into the center of this city (Jerusalem). '
  '5':
  - type: text
    content: 'I Myself will fight against you with an outstretched hand and with a strong arm in anger, in fury, and in great indignation '
  - type: text
    content: and
  - type: text
    content: ' wrath. '
  '6':
  - type: text
    content: 'I will also strike the inhabitants of this city, both man and beast; they will die of a great virulent disease. '
  '7':
  - type: text
    content: Then afterward,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “I will hand over Zedekiah king of Judah and his servants and the people in this city who survive the virulent disease, the sword, and the famine, to Nebuchadnezzar king of Babylon, and into the hand of their enemy, into the hand of those who seek their lives. And he will strike them with the edge of the sword; he will not spare them nor have mercy and compassion on them.” ’'
  '8':
  - type: text
    content: “And to this people you (Jeremiah) shall also say, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I set before you the way of life and the way of death. '
  '9':
  - type: text
    content: 'He who remains in this city [of Jerusalem] will die by the sword and by famine and by virulent disease. But he who goes outside and surrenders to the '
  - type: note
    content: The Chaldeans became the dominant people in Babylonia when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
  - type: text
    content: 'Chaldeans who are besieging you will live, and his life will be like a prize of war to him. '
