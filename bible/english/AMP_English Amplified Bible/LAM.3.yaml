document_id: LAM.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Shares Israel’s Affliction
  - type: text
    content: I am [Jeremiah] the man who has seen affliction
  - type: text
    content: Because of the rod of His wrath.
  '10':
  - type: text
    content: He is to me like a bear lying in wait,
  - type: text
    content: And like a lion [hiding] in secret places.
  '11':
  - type: text
    content: He has turned aside my ways and torn me in pieces;
  - type: text
    content: He has made me desolate.
  '12':
  - type: text
    content: He has bent His bow
  - type: text
    content: And set me as a target for the arrow.
  '13':
  - type: text
    content: He has caused the arrows of His quiver
  - type: text
    content: To enter my inner parts.
  '14':
  - type: text
    content: I have become the [object of] ridicule to all my people,
  - type: text
    content: 'And [the subject of] their '
  - type: text
    content: mocking
  - type: text
    content: ' song all the day.'
  '15':
  - type: text
    content: He has filled me with bitterness;
  - type: text
    content: He has made me drunk with wormwood (bitterness).
  '16':
  - type: text
    content: He has broken my teeth with gravel;
  - type: text
    content: He has [covered me with ashes and] made me cower in the dust.
  '17':
  - type: text
    content: My soul has been cast far away from peace;
  - type: text
    content: I have forgotten happiness.
  '18':
  - type: text
    content: So I say, “My strength has perished
  - type: text
    content: 'And so has my hope '
  - type: text
    content: and
  - type: text
    content: ' expectation from the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  - type: heading
    content: Hope of Relief in God’s Mercy
  '19':
  - type: text
    content: ¶Remember [O L
  - type: heading
    content: ord
  - type: text
    content: '] my affliction and my wandering, the wormwood and the gall (bitterness).'
  '2':
  - type: text
    content: He has led me and made me walk
  - type: text
    content: In darkness and not in light.
  '20':
  - type: text
    content: 'My soul '
  - type: text
    content: continually
  - type: text
    content: ' remembers them'
  - type: text
    content: And is bowed down within me.
  '21':
  - type: text
    content: But this I call to mind,
  - type: text
    content: Therefore I have hope.
  '22':
  - type: text
    content: It is because of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' lovingkindnesses that we are not consumed,'
  - type: text
    content: Because His [tender] compassions never fail. [Mal 3:6]
  '23':
  - type: text
    content: They are new every morning;
  - type: text
    content: 'Great '
  - type: text
    content: and
  - type: text
    content: ' beyond measure is Your faithfulness. [Is 33:2]'
  '24':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' is my portion '
  - type: text
    content: and
  - type: text
    content: ' my inheritance,” says my soul;'
  - type: text
    content: '“Therefore I have hope in Him '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him.” [Num 18:20]'
  '25':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is good to those who wait [confidently] for Him,'
  - type: text
    content: To those who seek Him [on the authority of God’s word].
  '26':
  - type: text
    content: It is good that one waits quietly
  - type: text
    content: For the salvation of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '27':
  - type: text
    content: It is good for a man that he should bear
  - type: text
    content: The yoke [of godly discipline] in his youth.
  '28':
  - type: text
    content: Let him sit alone [in hope] and keep quiet,
  - type: text
    content: Because God has laid it on him [for his benefit]. [Rom 8:28]
  '29':
  - type: text
    content: Let him put his mouth in the dust [in recognition of his unworthiness];
  - type: text
    content: There may yet be hope. [Mic 7:17]
  '3':
  - type: text
    content: Surely He has turned His hand against me
  - type: text
    content: Repeatedly all the day.
  '30':
  - type: text
    content: Let him give his cheek to the one who strikes him;
  - type: text
    content: Let him be filled with reproach.
  '31':
  - type: text
    content: For the Lord will not reject forever, [Ps 94:14]
  '32':
  - type: text
    content: For if He causes grief,
  - type: text
    content: Then He will have compassion
  - type: text
    content: 'According to His abundant lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' tender mercy.'
  '33':
  - type: text
    content: 'For He does not afflict willingly '
  - type: text
    content: and
  - type: text
    content: ' from His heart'
  - type: text
    content: Or grieve the children of men. [Ezek 18:23, 32; Hos 11:8; Heb 12:5-10; 2 Pet 3:9]
  '34':
  - type: text
    content: 'To trample '
  - type: text
    content: and
  - type: text
    content: ' crush under His feet'
  - type: text
    content: All the prisoners of the land,
  '35':
  - type: text
    content: To deprive a man of justice
  - type: text
    content: In the presence of the Most High,
  '36':
  - type: text
    content: To defraud a man in his lawsuit—
  - type: text
    content: The Lord does not approve of these things.
  '37':
  - type: text
    content: Who is there who speaks and it comes to pass,
  - type: text
    content: 'Unless the Lord has authorized '
  - type: text
    content: and
  - type: text
    content: ' commanded it?'
  '38':
  - type: text
    content: Is it not from the mouth of the Most High
  - type: text
    content: That both adversity (misfortune) and good (prosperity, happiness) proceed?
  '39':
  - type: text
    content: ¶Why should any living mortal, or any man,
  - type: text
    content: Complain [of punishment] in view of his sins?
  '4':
  - type: text
    content: He has caused my flesh and my skin to waste away;
  - type: text
    content: He has shattered my bones.
  '40':
  - type: text
    content: Let us test and examine our ways,
  - type: text
    content: And let us return to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '41':
  - type: text
    content: Let us lift up our hearts and our hands [in prayer]
  - type: text
    content: Toward God in heaven;
  '42':
  - type: text
    content: We have transgressed and rebelled,
  - type: text
    content: You have not pardoned.
  '43':
  - type: text
    content: 'You have covered '
  - type: text
    content: Yourself
  - type: text
    content: ' with anger'
  - type: text
    content: And pursued us;
  - type: text
    content: You have slain [without pity] and have not spared.
  '44':
  - type: text
    content: You have covered Yourself with a cloud
  - type: text
    content: So that no prayer can pass through.
  '45':
  - type: text
    content: You have made us scum and refuse
  - type: text
    content: Among the peoples (Gentile nations).
  '46':
  - type: text
    content: All our enemies have gaped at us.
  '47':
  - type: text
    content: Panic and pitfall (traps, danger) have come on us,
  - type: text
    content: Devastation and destruction.
  '48':
  - type: text
    content: My eyes overflow with streams of tears
  - type: text
    content: Because of the destruction of the daughter of my people (Jerusalem).
  '49':
  - type: text
    content: My eyes overflow unceasingly,
  - type: text
    content: Without stopping,
  '5':
  - type: text
    content: He has besieged and surrounded me with bitterness and hardship.
  '50':
  - type: text
    content: Until the L
  - type: heading
    content: ord
  - type: text
    content: ' looks down'
  - type: text
    content: And sees from heaven.
  '51':
  - type: text
    content: My eyes [see things that] bring pain to my soul
  - type: text
    content: Because of all the daughters of my city.
  '52':
  - type: text
    content: Without cause my enemies
  - type: text
    content: Hunted me down like a bird;
  '53':
  - type: text
    content: They silenced me in the pit
  - type: text
    content: And placed a stone over me. [Jer 38]
  '54':
  - type: text
    content: The waters ran down on my head;
  - type: text
    content: I said, “I am cut off (destroyed)!”
  '55':
  - type: text
    content: I called on Your name, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Out of the lowest pit. [Jer 38:6]
  '56':
  - type: text
    content: You have heard my voice,
  - type: text
    content: '“Do not hide Your ear from my '
  - type: text
    content: prayer
  - type: text
    content: ' for relief,'
  - type: text
    content: From my cry for help.”
  '57':
  - type: text
    content: You drew near on the day I called to You;
  - type: text
    content: You said, “Do not fear.” [James 4:8]
  '58':
  - type: text
    content: O Lord, You have pleaded my soul’s cause [You have guided my way and protected me];
  - type: text
    content: 'You have rescued '
  - type: text
    content: and
  - type: text
    content: ' redeemed my life.'
  '59':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', You have seen the wrong [done to me];'
  - type: text
    content: Judge my case.
  '6':
  - type: text
    content: He has made me live in dark places
  - type: text
    content: Like those who have long been dead.
  '60':
  - type: text
    content: You have seen all their vengeance,
  - type: text
    content: All their schemes against me.
  '61':
  - type: text
    content: You have heard their reproach, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And all their schemes against me.
  '62':
  - type: text
    content: The lips and whispering of my assailants
  - type: text
    content: Are against me all day long.
  '63':
  - type: text
    content: Look at their sitting and their rising [their actions and secret counsels];
  - type: text
    content: I am their mocking song [the subject of their ridicule]. [Ps 139:2; Is 37:28]
  '64':
  - type: text
    content: You will repay them, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: According to the work of their hands.
  '65':
  - type: text
    content: You will harden their hearts;
  - type: text
    content: Your curse will be upon them.
  '66':
  - type: text
    content: You will pursue them in anger and destroy them
  - type: text
    content: From under the heavens of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: He walled me in so that I cannot get out;
  - type: text
    content: He has weighted down my chain.
  '8':
  - type: text
    content: Even when I cry out and shout for help,
  - type: text
    content: He shuts out my prayer.
  '9':
  - type: text
    content: He has blocked my ways with cut stone;
  - type: text
    content: He has made my paths crooked.
