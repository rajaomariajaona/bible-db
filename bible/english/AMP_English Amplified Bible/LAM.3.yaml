document_id: LAM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jeremiah Shares Israel’s Affliction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I am [Jeremiah] the man who has seen affliction
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the rod of His wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He has led me and made me walk
- type: usfm
  marker: q1
  children:
  - type: text
    text: In darkness and not in light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Surely He has turned His hand against me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Repeatedly all the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He has caused my flesh and my skin to waste away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has shattered my bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He has besieged and surrounded me with bitterness and hardship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has made me live in dark places
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like those who have long been dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He walled me in so that I cannot get out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has weighted down my chain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even when I cry out and shout for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shuts out my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He has blocked my ways with cut stone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has made my paths crooked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He is to me like a bear lying in wait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a lion [hiding] in secret places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He has turned aside my ways and torn me in pieces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has made me desolate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He has bent His bow
- type: usfm
  marker: q1
  children:
  - type: text
    text: And set me as a target for the arrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He has caused the arrows of His quiver
- type: usfm
  marker: q1
  children:
  - type: text
    text: To enter my inner parts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have become the [object of] ridicule to all my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [the subject of] their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mocking
  - type: text
    text: ' song all the day.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He has filled me with bitterness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has made me drunk with wormwood (bitterness).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He has broken my teeth with gravel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has [covered me with ashes and] made me cower in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My soul has been cast far away from peace;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have forgotten happiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So I say, “My strength has perished
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And so has my hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hope of Relief in God’s Mercy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶Remember [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] my affliction and my wandering, the wormwood and the gall (bitterness).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'My soul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' remembers them'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And is bowed down within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But this I call to mind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore I have hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It is because of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' lovingkindnesses that we are not consumed,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because His [tender] compassions never fail. [Mal 3:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They are new every morning;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beyond measure is Your faithfulness. [Is 33:2]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is my portion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my inheritance,” says my soul;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Therefore I have hope in Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait expectantly for Him.” [Num 18:20]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is good to those who wait [confidently] for Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To those who seek Him [on the authority of God’s word].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It is good that one waits quietly
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the salvation of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: It is good for a man that he should bear
- type: usfm
  marker: q1
  children:
  - type: text
    text: The yoke [of godly discipline] in his youth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Let him sit alone [in hope] and keep quiet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because God has laid it on him [for his benefit]. [Rom 8:28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Let him put his mouth in the dust [in recognition of his unworthiness];
- type: usfm
  marker: q1
  children:
  - type: text
    text: There may yet be hope. [Mic 7:17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Let him give his cheek to the one who strikes him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him be filled with reproach.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For the Lord will not reject forever, [Ps 94:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For if He causes grief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then He will have compassion
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'According to His abundant lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tender mercy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For He does not afflict willingly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from His heart'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or grieve the children of men. [Ezek 18:23, 32; Hos 11:8; Heb 12:5-10; 2 Pet 3:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'To trample '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crush under His feet'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the prisoners of the land,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: To deprive a man of justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the presence of the Most High,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: To defraud a man in his lawsuit—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord does not approve of these things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who is there who speaks and it comes to pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Unless the Lord has authorized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commanded it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Is it not from the mouth of the Most High
- type: usfm
  marker: q1
  children:
  - type: text
    text: That both adversity (misfortune) and good (prosperity, happiness) proceed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ¶Why should any living mortal, or any man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Complain [of punishment] in view of his sins?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Let us test and examine our ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let us return to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Let us lift up our hearts and our hands [in prayer]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toward God in heaven;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: We have transgressed and rebelled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have not pardoned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'You have covered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yourself
  - type: text
    text: ' with anger'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pursued us;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have slain [without pity] and have not spared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: You have covered Yourself with a cloud
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that no prayer can pass through.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: You have made us scum and refuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among the peoples (Gentile nations).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: All our enemies have gaped at us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Panic and pitfall (traps, danger) have come on us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devastation and destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: My eyes overflow with streams of tears
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the destruction of the daughter of my people (Jerusalem).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: My eyes overflow unceasingly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without stopping,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Until the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' looks down'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sees from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: My eyes [see things that] bring pain to my soul
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of all the daughters of my city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Without cause my enemies
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hunted me down like a bird;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: They silenced me in the pit
- type: usfm
  marker: q1
  children:
  - type: text
    text: And placed a stone over me. [Jer 38]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: The waters ran down on my head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, “I am cut off (destroyed)!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: I called on Your name, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of the lowest pit. [Jer 38:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: You have heard my voice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Do not hide Your ear from my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prayer
  - type: text
    text: ' for relief,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From my cry for help.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: You drew near on the day I called to You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You said, “Do not fear.” [James 4:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: O Lord, You have pleaded my soul’s cause [You have guided my way and protected me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have rescued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' redeemed my life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You have seen the wrong [done to me];'
- type: usfm
  marker: q1
  children:
  - type: text
