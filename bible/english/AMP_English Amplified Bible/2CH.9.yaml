document_id: 2CH.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Visit of the Queen of Sheba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test Solomon with riddles. She was accompanied by a very large number of attendants, with camels bearing spices (balsam oil) and a large amount of gold and precious stones. And when she came to Solomon, she talked with him about all that was on her mind. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Solomon '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: told…her words
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'answered all her questions; nothing was hidden from him which he did not make clear to her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So when the queen of Sheba saw the [depth of] Solomon’s wisdom, and the house which he had built, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the food of his table, the [vast] seating order of his officials, the attendance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' service of his ministers and their attire, his cupbearers and their attire, and his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: burnt offerings which he offered at
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: stairway by which he went up to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', she was breathless. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'She said to the king, “The report which I heard in my own land regarding your [accomplishments and your] words and your wisdom was true, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but I did not believe the reports until I came and saw it with my own eyes. Behold, the half of the greatness of your wisdom was not told to me; you have surpassed the report that I heard. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortunate are your people, how blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortunate are these servants of yours who stand before you continually and hear your wisdom! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who delighted in you, setting you on His throne as king for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; because your God loved Israel, establishing them forever, therefore He made you king over them, to do justice and righteousness.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then she gave the king a hundred and twenty talents of gold, a very large '
  - type: usfm
    marker: it
    children:
    - type: text
      text: amount of
  - type: text
    text: ' spices (balsam oil) and precious stones; there was no such spice [anywhere] like that which the queen of Sheba gave to King Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The servants of Huram and those of Solomon, who brought gold from Ophir, also brought almug trees and precious stones. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'From the almug timber the king made '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: terraces
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: stairways for the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and for the king’s palace, and lyres and harps for the singers; none like that was seen before in the land of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'King Solomon gave to the queen of Sheba all [the things] she desired, whatever she asked, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Following tradition, Solomon wanted his royal visitor to leave with a greater gift than she had given him.
    marker-yv: yv-n
  - type: text
    text: 'besides '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a return for
  - type: text
    text: ' what she had brought to the king. So she returned to her own land with her servants.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Wealth and Power
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now the weight of gold which came to Solomon in one year was 666 talents, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'besides what the traders and merchants brought; and all the kings of Arabia and the governors of the country brought gold and silver to Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'King Solomon made two hundred large shields of beaten gold, using six hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels of
  - type: text
    text: ' beaten gold on each large shield. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he made
  - type: text
    text: ' three hundred [smaller] shields of beaten gold, using three hundred shekels of gold on each shield; and the king put them in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A building in Jerusalem whose purpose is not mentioned. Since it had utensils for dining (v 20), however, it may have been a separate banquet hall. It is described in 1 Kin 7:2-5 and was larger than the temple.
    marker-yv: yv-n
  - type: text
    text: house of the Forest of Lebanon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moreover, the king made a great throne of ivory and overlaid it with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There were
  - type: text
    text: ' six steps to the throne and a golden footstool attached to the throne, and arms on each side of the seat, with two lions standing beside the arms. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also, twelve lions were standing there, one on each side of the six steps. Nothing like it had ever been made for any [other] kingdom. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All King Solomon’s drinking vessels were of gold, and all the vessels of the house of the Forest of Lebanon were of pure gold; silver was not considered valuable in the days of Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the king’s ships went to Tarshish with the servants of Huram; once every three years the ships of Tarshish came bringing gold and silver, ivory and apes and peacocks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So King Solomon surpassed all the kings of the earth in wealth and wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And all the kings of the earth were seeking the presence of Solomon, to hear his wisdom which God had put into his heart. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Each man brought his gift, articles of silver and gold, garments, weapons, spices, horses and mules, so much year by year.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now Solomon had 4,000 stalls for horses and chariots, and 12,000 horsemen, and he stationed them in the chariot cities or with the king at Jerusalem. [Deut 17:16, 17] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He ruled over all the kings from the Euphrates River to the land of the Philistines, and as far as the border of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The king made silver in Jerusalem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as common
  - type: text
    text: ' as stones, and cedar wood as plentiful as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This tree, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ficus sycomorus,
      - type: text
        text: ' is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.'
    marker-yv: yv-n
  - type: text
    text: 'sycamore-fig trees that are in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shephelah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lowland. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And they were importing horses for Solomon from Egypt and from all [the other] countries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now the rest of the acts of Solomon, from the first to the last, are they not written in the records of Nathan the prophet, and in the prophecy of Ahijah the Shilonite, and in the visions of Iddo the seer concerning Jeroboam the son of Nebat? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Solomon reigned forty years in Jerusalem over all Israel.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Death of Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And Solomon slept with his fathers [in death]; he was buried in the city of his father David. Rehoboam his son reigned in his place.
