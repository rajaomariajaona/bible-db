verses:
  '1':
  - type: heading
    content: Visit of the Queen of Sheba
  - type: text
    content: 'When the queen of Sheba heard of the fame of Solomon, she came to Jerusalem to test Solomon with riddles. She was accompanied by a very large number of attendants, with camels bearing spices (balsam oil) and a large amount of gold and precious stones. And when she came to Solomon, she talked with him about all that was on her mind. '
  '10':
  - type: text
    content: 'The servants of Huram and those of Solomon, who brought gold from Ophir, also brought almug trees and precious stones. '
  '11':
  - type: text
    content: 'From the almug timber the king made '
  - type: note
    content: Or terraces.
  - type: text
    content: stairways for the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and for the king’s palace, and lyres and harps for the singers; none like that was seen before in the land of Judah.'
  '12':
  - type: text
    content: 'King Solomon gave to the queen of Sheba all [the things] she desired, whatever she asked, '
  - type: note
    content: Following tradition, Solomon wanted his royal visitor to leave with a greater gift than she had given him.
  - type: text
    content: 'besides '
  - type: text
    content: a return for
  - type: text
    content: ' what she had brought to the king. So she returned to her own land with her servants.'
  - type: heading
    content: Solomon’s Wealth and Power
  '13':
  - type: text
    content: 'Now the weight of gold which came to Solomon in one year was 666 talents, '
  '14':
  - type: text
    content: 'besides what the traders and merchants brought; and all the kings of Arabia and the governors of the country brought gold and silver to Solomon. '
  '15':
  - type: text
    content: 'King Solomon made two hundred large shields of beaten gold, using six hundred '
  - type: text
    content: shekels of
  - type: text
    content: ' beaten gold on each large shield. '
  '16':
  - type: text
    content: 'And '
  - type: text
    content: he made
  - type: text
    content: ' three hundred [smaller] shields of beaten gold, using three hundred shekels of gold on each shield; and the king put them in the '
  - type: note
    content: A building in Jerusalem whose purpose is not mentioned. Since it had utensils for dining (v 20), however, it may have been a separate banquet hall. It is described in 1 Kin 7:2-5 and was larger than the temple.
  - type: text
    content: house of the Forest of Lebanon.
  '17':
  - type: text
    content: 'Moreover, the king made a great throne of ivory and overlaid it with pure gold. '
  '18':
  - type: text
    content: There were
  - type: text
    content: ' six steps to the throne and a golden footstool attached to the throne, and arms on each side of the seat, with two lions standing beside the arms. '
  '19':
  - type: text
    content: 'Also, twelve lions were standing there, one on each side of the six steps. Nothing like it had ever been made for any [other] kingdom. '
  '2':
  - type: text
    content: 'Solomon '
  - type: note
    content: Lit told…her words.
  - type: text
    content: 'answered all her questions; nothing was hidden from him which he did not make clear to her. '
  '20':
  - type: text
    content: 'All King Solomon’s drinking vessels were of gold, and all the vessels of the house of the Forest of Lebanon were of pure gold; silver was not considered valuable in the days of Solomon. '
  '21':
  - type: text
    content: For the king’s ships went to Tarshish with the servants of Huram; once every three years the ships of Tarshish came bringing gold and silver, ivory and apes and peacocks.
  '22':
  - type: text
    content: 'So King Solomon surpassed all the kings of the earth in wealth and wisdom. '
  '23':
  - type: text
    content: 'And all the kings of the earth were seeking the presence of Solomon, to hear his wisdom which God had put into his heart. '
  '24':
  - type: text
    content: Each man brought his gift, articles of silver and gold, garments, weapons, spices, horses and mules, so much year by year.
  '25':
  - type: text
    content: 'Now Solomon had 4,000 stalls for horses and chariots, and 12,000 horsemen, and he stationed them in the chariot cities or with the king at Jerusalem. [Deut 17:16, 17] '
  '26':
  - type: text
    content: 'He ruled over all the kings from the Euphrates River to the land of the Philistines, and as far as the border of Egypt. '
  '27':
  - type: text
    content: 'The king made silver in Jerusalem '
  - type: text
    content: as common
  - type: text
    content: ' as stones, and cedar wood as plentiful as the '
  - type: note
    content: This tree, ficus sycomorus, is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.
  - type: text
    content: 'sycamore-fig trees that are in the '
  - type: note
    content: Heb shephelah.
  - type: text
    content: 'lowland. '
  '28':
  - type: text
    content: And they were importing horses for Solomon from Egypt and from all [the other] countries.
  '29':
  - type: text
    content: 'Now the rest of the acts of Solomon, from the first to the last, are they not written in the records of Nathan the prophet, and in the prophecy of Ahijah the Shilonite, and in the visions of Iddo the seer concerning Jeroboam the son of Nebat? '
  '3':
  - type: text
    content: 'So when the queen of Sheba saw the [depth of] Solomon’s wisdom, and the house which he had built, '
  '30':
  - type: text
    content: Solomon reigned forty years in Jerusalem over all Israel.
  - type: heading
    content: Death of Solomon
  '31':
  - type: text
    content: And Solomon slept with his fathers [in death]; he was buried in the city of his father David. Rehoboam his son reigned in his place.
  '4':
  - type: text
    content: 'and the food of his table, the [vast] seating order of his officials, the attendance '
  - type: text
