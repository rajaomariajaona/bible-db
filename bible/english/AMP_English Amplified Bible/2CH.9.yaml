  - type: text
    content: ' fortunate are your people, how blessed '
  - type: text
    content: and
  - type: text
    content: ' fortunate are these servants of yours who stand before you continually and hear your wisdom! '
  '8':
  - type: text
    content: Blessed be the L
  - type: heading
