  '5':
  - type: text
    content: 'She said to the king, “The report which I heard in my own land regarding your [accomplishments and your] words and your wisdom was true, '
  '6':
  - type: text
    content: 'but I did not believe the reports until I came and saw it with my own eyes. Behold, the half of the greatness of your wisdom was not told to me; you have surpassed the report that I heard. '
  '7':
  - type: text
    content: 'Blessed '
  - type: text
