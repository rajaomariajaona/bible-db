document_id: 2KI.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hoshea Reigns over Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the twelfth year of Ahaz king of Judah, Hoshea the son of Elah became king over Israel in Samaria, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and reigned
    - type: text
      text: ' for nine years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They set up for themselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars (memorial stones) and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Symbols of the goddess Asherah.
      marker-yv: yv-n
    - type: text
      text: 'Asherim on every high hill and under every green tree. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: There they burned incense on all the high places, just as the [pagan] nations whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had deported before them; and they did evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contemptible things, provoking the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to anger]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And they served idols, of which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said to them, “You shall not do this thing.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' warned Israel and Judah through all His prophets and every seer, saying, “Turn from your evil ways and keep My commandments and My statutes, in accordance with all the Law which I commanded your fathers, and which I sent to you by My servants the prophets.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: However they did not listen, but stiffened their necks as did their fathers who did not believe (trust in, rely on, remain steadfast to) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They rejected His statutes and His covenant which He made with their fathers, as well as His warnings that he gave them. And they followed vanity [that is, false gods, idols] and became vain (empty-headed). They followed the [pagan practices of the] nations which surrounded them, although the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded that they were not to do as they did. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They abandoned all the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God and made for themselves cast images of two calves; and they made an Asherah [idol] and worshiped all the [starry] host of heaven and served Baal. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They made their sons and their daughters pass through the fire [as human sacrifices], and used divination [to foretell the future] and enchantments; and they sold themselves to do evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', provoking Him to anger. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was very angry with Israel and removed them from His sight; none [of the tribes] was left except the tribe of Judah.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Judah did not keep the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God either, but walked in the customs which Israel introduced. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but not as the kings of Israel who came before him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rejected all the descendants of Israel (Jacob) and [repeatedly] afflicted them and handed them over to plunderers, until He had cast them out of His sight.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: When He had torn Israel from the [royal] house of David, they made Jeroboam the son of Nebat king. And Jeroboam drove Israel away from following the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and made them commit a great sin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For the Israelites walked in all the [idolatrous] sins which Jeroboam committed; they did not turn from them '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: until the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' removed Israel from His sight, just as He had foretold through all His servants the prophets. So Israel went into exile from their own land to Assyria to this day [the date of this writing].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cities of Israel Filled with Strangers
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The king of Assyria brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' from Babylon and from Cuthah and from Avva and from Hamath and Sepharvaim, and settled them in the cities of Samaria in place of the sons (people) of Israel. They took possession of Samaria and lived in its cities. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Now when they began to live there, they did not fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent lions among them which killed some of them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: So the king of Assyria was told, “The nations whom you have sent into exile and settled in the cities of Samaria do not know the custom of the god of the land; so He has sent lions among them, and they are killing them because they do not know the manner of [worship demanded by] the god of the land.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then the king of Assyria commanded, “Take back [to Samaria] one of the priests whom you brought from there, and have him go and live there; and have him teach the people the custom of the god of the land.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So one of the priests whom they had exiled from Samaria came [back] and lived in Bethel and taught them how they should fear [and worship] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But every nation still made gods of its own and put them in the houses (shrines) of the high places which the Samaritans had made, every nation in the cities where they lived. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Shalmaneser V succeeded his father Tiglath-pileser III as king in 727 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. He ruled five years and was succeeded by Sargon II in 722 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Shalmaneser [V] king of Assyria came up against him, and Hoshea became his servant and paid him tribute (money). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The men of Babylon made Succoth-benoth, the men of Cuth made Nergal, the men of Hamath made Ashima, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'the Avvites made Nibhaz and Tartak; and the Sepharvites burned their children in the fire to Adrammelech and Anammelech, the gods of Sepharvaim. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: They also feared the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and appointed from among themselves priests of the high places, who sacrificed for them in the houses of the high places. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: They feared the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', yet served their own gods, following the custom of the nations from among whom they had been sent into exile.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'To this day they act in accordance with their former [pagan] customs: they do not [really] fear the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', nor do they obey their statutes and ordinances, nor the law, nor the commandments which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded the sons (descendants) of Jacob, whom He named Israel; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: with whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had made a covenant and commanded them, saying, “You shall not fear other gods or bow yourselves to them nor serve them, nor sacrifice to them. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who brought you up from the land of Egypt with great power and an outstretched arm, Him you shall fear, and to Him you shall bow yourselves down, and to Him you shall sacrifice. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'The statutes and the ordinances and the law and the commandment which He wrote for you [by the hand of Moses], you shall observe and do forever. You shall not fear (worship, serve) other gods. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The covenant that I have made with you, you shall not forget; you shall not fear other gods. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God you shall fear [and worship]; then He will rescue you from the hands of all your enemies.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But the king of Assyria discovered a conspiracy in Hoshea, who sent messengers to So, king of Egypt, and offered no tribute to the king of Assyria, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he had done
    - type: text
      text: ' year by year; therefore the king of Assyria arrested him and bound him in prison.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'However, they did not listen, but they acted in accordance with their former custom. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: So these nations [superficially] feared the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; they also served their idols, as did their children and their children’s children, just as their fathers did, so do they to this day [the date of this writing].
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the king of Assyria invaded all the land [of Israel] and went up to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Samaria was well-fortified and very difficult to conquer. The siege, led by Shalmaneser V, began in 725 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Samaria and besieged it for three years.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Captive
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In the ninth year of Hoshea, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sargon II seized the Assyrian throne after the death of Shalmaneser V and was in power when Samaria was finally captured.
      marker-yv: yv-n
    - type: text
      text: the king of Assyria took Samaria and carried [the people of] Israel into exile to Assyria, and settled them in Halah and in Habor, by the river of Gozan, and in the cities of the Medes.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why Israel Fell
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now this came about because the Israelites had sinned against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God, who had brought them up from the land of Egypt, from under the hand of Pharaoh king of Egypt; and they had feared [and worshiped] other gods '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: and walked in the customs of the [pagan] nations whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had driven out before the sons (descendants) of Israel, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the pagan customs of
    - type: text
      text: ' the kings of Israel which they had introduced. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The Israelites ascribed things to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God which were not true. They built for themselves high places [of worship] in all their towns, from [the lonely] lookout tower to the [populous] fortified city. '
