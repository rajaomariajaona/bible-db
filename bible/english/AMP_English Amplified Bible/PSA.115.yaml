document_id: PSA.115,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 115
  - type: heading
    content: Pagan Idols Contrasted with the Lord.
  - type: text
    content: Not to us, O L
  - type: heading
    content: ord
  - type: text
    content: ', not to us,'
  - type: text
    content: But to Your name give glory
  - type: text
    content: 'Because of Your lovingkindness, because of Your truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness.'
  '10':
  - type: text
    content: O house of Aaron, trust in the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: He is their help and their shield.
  '11':
  - type: text
    content: You who [reverently] fear the L
  - type: heading
    content: ord
  - type: text
    content: ', trust in the L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: He is their help and their shield.
  '12':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has been mindful of us; He will bless,'
  - type: text
    content: He will bless the house of Israel;
  - type: text
    content: He will bless the house of Aaron.
  '13':
  - type: text
    content: 'He will bless those who fear '
  - type: text
    content: and
  - type: text
    content: ' worship the L'
  - type: heading
    content: ord
  - type: text
    content: ' [with awe-inspired reverence and submissive wonder],'
  - type: text
    content: Both the small and the great. [Ps 103:11; Rev 11:18; 19:5]
  '14':
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' give you [great] increase,'
  - type: text
    content: You and your children.
  '15':
  - type: text
    content: May you be blessed of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Who made heaven and earth.
  '16':
  - type: text
    content: ¶The heavens are the heavens of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But the earth He has given to the children of men.
  '17':
  - type: text
    content: The dead do not praise the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Nor do any who go down into silence;
  '18':
  - type: text
    content: 'But as for us, we will bless '
  - type: text
    content: and
  - type: text
    content: ' affectionately and gratefully praise the L'
  - type: heading
    content: ord
  - type: text
    content: From this time forth and forever.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  '2':
  - type: text
    content: Why should the nations say,
  - type: text
    content: “Where, now, is their God?”
  '3':
  - type: text
    content: But our God is in heaven;
  - type: text
    content: He does whatever He pleases.
  '4':
  - type: text
    content: The idols [of the nations] are silver and gold,
  - type: text
    content: The work of man’s hands.
  '5':
  - type: text
    content: They have mouths, but they cannot speak;
  - type: text
    content: They have eyes, but they cannot see;
  '6':
  - type: text
    content: They have ears, but they cannot hear;
  - type: text
    content: They have noses, but they cannot smell;
  '7':
  - type: text
    content: They have hands, but they cannot feel;
  - type: text
    content: They have feet, but they cannot walk;
  - type: text
    content: Nor can they make a sound with their throats.
  '8':
  - type: text
    content: Those who make them will become like them,
  - type: text
    content: Everyone who trusts in them. [Ps 135:15-18]
  '9':
  - type: text
    content: '¶O Israel, trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in the L'
  - type: heading
    content: ord
  - type: text
    content: '! [Be confident in Him, cling to Him, rely on His word!]'
  - type: text
    content: He is their help and their shield.
