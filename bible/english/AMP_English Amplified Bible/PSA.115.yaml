document_id: PSA.115,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 115
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pagan Idols Contrasted with the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: .
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not to us, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', not to us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to Your name give glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of Your lovingkindness, because of Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O house of Aaron, trust in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is their help and their shield.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who [reverently] fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', trust in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is their help and their shield.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has been mindful of us; He will bless,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will bless the house of Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will bless the house of Aaron.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will bless those who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [with awe-inspired reverence and submissive wonder],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both the small and the great. [Ps 103:11; Rev 11:18; 19:5]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' give you [great] increase,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You and your children.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you be blessed of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who made heaven and earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The heavens are the heavens of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the earth He has given to the children of men.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The dead do not praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor do any who go down into silence;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But as for us, we will bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately and gratefully praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From this time forth and forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should the nations say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where, now, is their God?”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But our God is in heaven;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does whatever He pleases.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The idols [of the nations] are silver and gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The work of man’s hands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have mouths, but they cannot speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have eyes, but they cannot see;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have ears, but they cannot hear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have noses, but they cannot smell;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have hands, but they cannot feel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have feet, but they cannot walk;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor can they make a sound with their throats.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who make them will become like them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who trusts in them. [Ps 135:15-18]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶O Israel, trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! [Be confident in Him, cling to Him, rely on His word!]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is their help and their shield.
