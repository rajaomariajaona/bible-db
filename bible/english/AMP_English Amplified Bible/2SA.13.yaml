segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amnon and Tamar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It happened afterwards that Absalom the son of David had a beautiful sister whose name was Tamar, and Amnon [her half-brother] the son of David was in love with her. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amnon was so frustrated because of his [half-] sister Tamar that he made himself sick, for she was a virgin, and Amnon thought it impossible for him to do anything to her. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Amnon had a friend whose name was Jonadab the son of Shimeah, David’s brother; and Jonadab was a very shrewd (cunning) man. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He said to Amnon, “Why are you, the king’s son, so depressed morning after morning? Will you not tell me?” And Amnon said to him, “I am in love with Tamar, my [half-] brother Absalom’s sister.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jonadab said to him, “Go to bed and pretend you are sick; and when your father [David] comes to see you, say to him, ‘Just let my sister Tamar come and serve me food, and let her prepare it in my sight, so that I may see it and eat it from her hand.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Amnon lay down and pretended to be sick; and when the king came to see him, Amnon said to the king, “Please let my sister Tamar come and make me a couple of cakes in my sight, so that I may eat from her hand.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then David sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to the house for Tamar, saying, “Go now to your brother Amnon’s house, and prepare some food for him.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Tamar went to her brother Amnon’s house, and he was in bed. And she took dough and kneaded it, and made cakes in his sight, and baked them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'She took the pan and dished them out before him, but he refused to eat. And Amnon said, “Have everyone leave me.” So everyone left him [except Tamar]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Amnon said to Tamar, “Bring the food into the bedroom, so that I may eat from your hand.” So Tamar took the cakes she had made and brought them into the bedroom to her [half-] brother Amnon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When she brought them to him to eat, he took hold of her and said, “Come, lie with me, my sister.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'She replied, “No, my brother! Do not violate me, for such a thing is not done in Israel; do not do this disgraceful thing! [Gen 34:7] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'As for me, how could I get rid of my shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace? And you, you will be considered one of the fools in Israel. So now, just speak to the king [about taking me as your wife], for he will not withhold me from you.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But he would not listen to her; and since he was stronger than she, he violated her and lay with her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Amnon became extremely hateful toward her, for his hatred toward her was greater than the love which he had for her. And Amnon said to her, “Get up and get out!” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But she said, “No, because this wrong of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sending her out like this would cast suspicion on Tamar’s behavior.
    marker-yv: yv-n
  - type: text
    text: 'sending me away is worse than the other that you have done to me!” But he would not listen to her. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Instead, he called his young man who was his personal servant and said, “Now throw this woman out of my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: presence
  - type: text
    text: ' and bolt the door behind her.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now Tamar was wearing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a garment of extremities
      - type: text
        text: . This robe must have been similar to the one Jacob (Israel) made for Joseph in Gen 37:3.
    marker-yv: yv-n
  - type: text
    text: 'a [long-sleeved] robe of various colors; for that is how the virgin daughters of the king dressed themselves in robes. Then Amnon’s personal servant took her out and bolted the door behind her. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because she had been forced and violated in this way she would no longer be acceptable to another man as a wife.
    marker-yv: yv-n
  - type: text
    text: Tamar put dust on her head [in grief] and tore the long-sleeved robe which she had on, and she put her hand on her head and went away crying out [for help].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So her brother Absalom said to her, “Has your brother Amnon been with you? But now keep silent, my sister; he is your brother; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Absalom consoled and quieted Tamar so that he could plan his revenge.
    marker-yv: yv-n
  - type: text
    text: 'do not take this matter to heart.” So Tamar remained secluded in her brother Absalom’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now when King David heard about all these things, he was very angry [but failed to take any '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to Jewish law, Amnon should have been executed for the rape of his half-sister.
    marker-yv: yv-n
  - type: text
    text: 'action]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But Absalom did not speak to Amnon either good or bad; for Absalom hated Amnon because he had violated his sister Tamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Now it came about after two full years that Absalom had sheepshearers at Baal-hazor near Ephraim, and Absalom invited all the king’s sons [to a party].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Absalom Avenges Tamar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Absalom came to [his father] the king and said, “Behold, your servant has sheepshearers; please let the king and his servants go with your servant.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But the king said to Absalom, “No, my son, we should not all go, for we will be a burden to you.” Although Absalom [strongly] urged David, still he would not go, but he gave him his blessing. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Absalom said, “If not, then at least let my brother '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amnon was David’s eldest son and first in the line of succession.
    marker-yv: yv-n
  - type: text
    text: 'Amnon go with us.” And the king said to him, “Why should he go with you?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Absalom urged him [again], and he let Amnon and all the king’s sons go with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now Absalom commanded his servants, “Notice carefully, when Amnon’s heart is joyous with wine, and when I say to you, ‘Strike Amnon,’ then kill him. Do not be afraid; have I not commanded you myself [and in doing so have I not taken full responsibility for his death]? Be courageous and brave.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So the servants of Absalom did to Amnon just as Absalom had commanded. Then all the king’s sons got up, and every man mounted his mule and fled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now it happened while they were on the way [back home], that the [exaggerated] report came to David, “Absalom has killed all the king’s sons, and not one of them is left.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the king stood and tore his clothes and lay on the ground [in mourning]; and all his servants were standing by with their clothes torn. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Jonadab the son of Shimeah, David’s brother, responded, “Do not let my lord assume that all the king’s sons have been put to death; for only Amnon is dead. This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: act of revenge
  - type: text
    text: ' has been on Absalom’s mind since the day Amnon violated his sister Tamar. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So now, do not let my lord the king take the report to heart that all the king’s sons are dead; for Amnon alone is dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now Absalom fled. And the young man who kept watch looked up, and behold, many people were coming from the road behind him by the side of the mountain. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And Jonadab said to the king, “Look, the king’s sons are coming. It has turned out just as your servant said.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And when he finished speaking, the king’s sons came, and they raised their voices and wept; and the king and all his servants also wept very bitterly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But Absalom fled and went to [his mother’s father] Talmai the son of Ammihud, king of Geshur. And David '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David’s failure to act when Amnon raped his half-sister Tamar ultimately cost him two of his sons not just one.
    marker-yv: yv-n
  - type: text
    text: 'mourned for his son every day. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So Absalom fled and went to Geshur, and was there for three years. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the heart of
  - type: text
    text: ' King David longed to go to Absalom; for he was comforted regarding Amnon, since he was dead.'
