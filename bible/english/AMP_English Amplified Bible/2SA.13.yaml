document_id: 2SA.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Amnon and Tamar
  - type: text
    content: 'It happened afterwards that Absalom the son of David had a beautiful sister whose name was Tamar, and Amnon [her half-brother] the son of David was in love with her. '
  '10':
  - type: text
    content: 'Then Amnon said to Tamar, “Bring the food into the bedroom, so that I may eat from your hand.” So Tamar took the cakes she had made and brought them into the bedroom to her [half-] brother Amnon. '
  '11':
  - type: text
    content: 'When she brought them to him to eat, he took hold of her and said, “Come, lie with me, my sister.” '
  '12':
  - type: text
    content: 'She replied, “No, my brother! Do not violate me, for such a thing is not done in Israel; do not do this disgraceful thing! [Gen 34:7] '
  '13':
  - type: text
    content: 'As for me, how could I get rid of my shame '
  - type: text
    content: and
  - type: text
    content: ' disgrace? And you, you will be considered one of the fools in Israel. So now, just speak to the king [about taking me as your wife], for he will not withhold me from you.” '
  '14':
  - type: text
    content: But he would not listen to her; and since he was stronger than she, he violated her and lay with her.
  '15':
  - type: text
    content: 'Then Amnon became extremely hateful toward her, for his hatred toward her was greater than the love which he had for her. And Amnon said to her, “Get up and get out!” '
  '16':
  - type: text
    content: 'But she said, “No, because this wrong of '
  - type: note
    content: Sending her out like this would cast suspicion on Tamar’s behavior.
  - type: text
    content: 'sending me away is worse than the other that you have done to me!” But he would not listen to her. '
  '17':
  - type: text
    content: 'Instead, he called his young man who was his personal servant and said, “Now throw this woman out of my '
  - type: text
    content: presence
  - type: text
    content: ' and bolt the door behind her.” '
  '18':
  - type: text
    content: 'Now Tamar was wearing '
  - type: note
    content: Lit a garment of extremities. This robe must have been similar to the one Jacob (Israel) made for Joseph in Gen 37:3.
  - type: text
    content: 'a [long-sleeved] robe of various colors; for that is how the virgin daughters of the king dressed themselves in robes. Then Amnon’s personal servant took her out and bolted the door behind her. '
  '19':
  - type: text
    content: 'So '
  - type: note
    content: Because she had been forced and violated in this way she would no longer be acceptable to another man as a wife.
  - type: text
    content: Tamar put dust on her head [in grief] and tore the long-sleeved robe which she had on, and she put her hand on her head and went away crying out [for help].
  '2':
  - type: text
    content: 'Amnon was so frustrated because of his [half-] sister Tamar that he made himself sick, for she was a virgin, and Amnon thought it impossible for him to do anything to her. '
  '20':
  - type: text
    content: 'So her brother Absalom said to her, “Has your brother Amnon been with you? But now keep silent, my sister; he is your brother; '
  - type: note
    content: Absalom consoled and quieted Tamar so that he could plan his revenge.
  - type: text
    content: 'do not take this matter to heart.” So Tamar remained secluded in her brother Absalom’s house. '
  '21':
  - type: text
    content: 'Now when King David heard about all these things, he was very angry [but failed to take any '
  - type: note
    content: According to Jewish law, Amnon should have been executed for the rape of his half-sister.
  - type: text
    content: 'action]. '
  '22':
  - type: text
    content: But Absalom did not speak to Amnon either good or bad; for Absalom hated Amnon because he had violated his sister Tamar.
  '23':
  - type: text
    content: Now it came about after two full years that Absalom had sheepshearers at Baal-hazor near Ephraim, and Absalom invited all the king’s sons [to a party].
  - type: heading
    content: Absalom Avenges Tamar
  '24':
  - type: text
    content: 'Absalom came to [his father] the king and said, “Behold, your servant has sheepshearers; please let the king and his servants go with your servant.” '
  '25':
  - type: text
    content: 'But the king said to Absalom, “No, my son, we should not all go, for we will be a burden to you.” Although Absalom [strongly] urged David, still he would not go, but he gave him his blessing. '
  '26':
  - type: text
    content: 'Then Absalom said, “If not, then at least let my brother '
  - type: note
    content: Amnon was David’s eldest son and first in the line of succession.
  - type: text
    content: 'Amnon go with us.” And the king said to him, “Why should he go with you?” '
  '27':
  - type: text
    content: But Absalom urged him [again], and he let Amnon and all the king’s sons go with him.
  '28':
  - type: text
    content: 'Now Absalom commanded his servants, “Notice carefully, when Amnon’s heart is joyous with wine, and when I say to you, ‘Strike Amnon,’ then kill him. Do not be afraid; have I not commanded you myself [and in doing so have I not taken full responsibility for his death]? Be courageous and brave.” '
  '29':
  - type: text
    content: So the servants of Absalom did to Amnon just as Absalom had commanded. Then all the king’s sons got up, and every man mounted his mule and fled.
  '3':
  - type: text
    content: 'But Amnon had a friend whose name was Jonadab the son of Shimeah, David’s brother; and Jonadab was a very shrewd (cunning) man. '
  '30':
  - type: text
    content: 'Now it happened while they were on the way [back home], that the [exaggerated] report came to David, “Absalom has killed all the king’s sons, and not one of them is left.” '
  '31':
  - type: text
    content: 'Then the king stood and tore his clothes and lay on the ground [in mourning]; and all his servants were standing by with their clothes torn. '
  '32':
  - type: text
    content: 'But Jonadab the son of Shimeah, David’s brother, responded, “Do not let my lord assume that all the king’s sons have been put to death; for only Amnon is dead. This '
  - type: text
    content: act of revenge
  - type: text
    content: ' has been on Absalom’s mind since the day Amnon violated his sister Tamar. '
  '33':
  - type: text
    content: So now, do not let my lord the king take the report to heart that all the king’s sons are dead; for Amnon alone is dead.”
  '34':
  - type: text
    content: 'Now Absalom fled. And the young man who kept watch looked up, and behold, many people were coming from the road behind him by the side of the mountain. '
  '35':
  - type: text
    content: 'And Jonadab said to the king, “Look, the king’s sons are coming. It has turned out just as your servant said.” '
  '36':
  - type: text
    content: And when he finished speaking, the king’s sons came, and they raised their voices and wept; and the king and all his servants also wept very bitterly.
  '37':
  - type: text
    content: 'But Absalom fled and went to [his mother’s father] Talmai the son of Ammihud, king of Geshur. And David '
  - type: note
    content: David’s failure to act when Amnon raped his half-sister Tamar ultimately cost him two of his sons not just one.
  - type: text
    content: 'mourned for his son every day. '
  '38':
  - type: text
    content: 'So Absalom fled and went to Geshur, and was there for three years. '
  '39':
  - type: text
    content: 'And '
  - type: text
    content: the heart of
  - type: text
    content: ' King David longed to go to Absalom; for he was comforted regarding Amnon, since he was dead.'
  '4':
  - type: text
    content: 'He said to Amnon, “Why are you, the king’s son, so depressed morning after morning? Will you not tell me?” And Amnon said to him, “I am in love with Tamar, my [half-] brother Absalom’s sister.” '
  '5':
  - type: text
    content: 'Jonadab said to him, “Go to bed and pretend you are sick; and when your father [David] comes to see you, say to him, ‘Just let my sister Tamar come and serve me food, and let her prepare it in my sight, so that I may see it and eat it from her hand.’ ” '
  '6':
  - type: text
    content: So Amnon lay down and pretended to be sick; and when the king came to see him, Amnon said to the king, “Please let my sister Tamar come and make me a couple of cakes in my sight, so that I may eat from her hand.”
  '7':
  - type: text
    content: 'Then David sent '
  - type: text
    content: word
  - type: text
    content: ' to the house for Tamar, saying, “Go now to your brother Amnon’s house, and prepare some food for him.” '
  '8':
  - type: text
    content: 'So Tamar went to her brother Amnon’s house, and he was in bed. And she took dough and kneaded it, and made cakes in his sight, and baked them. '
  '9':
  - type: text
    content: 'She took the pan and dished them out before him, but he refused to eat. And Amnon said, “Have everyone leave me.” So everyone left him [except Tamar]. '
