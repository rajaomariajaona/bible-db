  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear my voice, O God, in my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: concern
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: complaint;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Guard my life from the terror of the enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hide me from the secret counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conspiracy of the ungodly,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the scheming of those who do wrong,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Who have sharpened their tongues like a sword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They aim venomous words as arrows,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: To shoot from ambush at the blameless [one];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly they shoot at him, without fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They encourage themselves in [their pursuit of] an evil agenda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They talk of laying snares secretly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say, “Who will discover us?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They devise acts of injustice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We are ready with a well-conceived plan.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the inward thought and the heart of a man are deep (mysterious, unsearchable).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶But God will shoot them with an [unexpected] arrow;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly they will be wounded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So they will be caused to stumble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their own tongue is against them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who gaze at them will shake the head [in scorn].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then all men will fear [God’s judgment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will declare the work of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they will consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisely acknowledge what He has done.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The righteous will rejoice in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and take refuge in Him;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All the upright in heart will glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offer praise.'
