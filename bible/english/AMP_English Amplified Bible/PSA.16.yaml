    marker-yv: yv-n
  - type: text
    text: Mikhtam of David [probably intended to record memorable thoughts].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect me, O God, for in You I have placed my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' found refuge.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “You are my Lord;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have no good besides You.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As for the saints (godly people) who are in the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are the majestic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the noble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the excellent ones in whom is all my delight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sorrows [pain and suffering] of those who have chosen another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: god
  - type: text
    text: ' will be multiplied [because of their idolatry];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not pour out their drink offerings of blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will I take their names upon my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is the portion of my inheritance, my cup [He is all I need];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You support my lot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The [boundary] lines [of the land] have fallen for me in pleasant places;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, my heritage is beautiful to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶I will bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who has counseled me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, my heart (mind) instructs me in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I have set the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' continually before me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because He is at my right hand, I will not be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore my heart is glad and my glory [my innermost self] rejoices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My body too will dwell [confidently] in safety,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For You will not abandon me to Sheol (the nether world, the place of the dead),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will You allow Your Holy One to undergo decay. [Acts 13:35]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You will show me the path of life;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Your presence is fullness of joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Your right hand there are pleasures forevermore. [Acts 2:25-28, 31]
