    content: Rahab Shelters Spies
  - type: text
    content: 'Joshua the son of Nun sent two men as scouts secretly from Shittim, saying, “Go, view the land, especially '
  - type: note
    content: Jericho, an oasis near the Jordan River, is believed to be one of the world’s oldest inhabited sites. Its name is derived from the Hebrew word for “moon,” implying that it may have been a center of worship for various lunar gods.
  - type: text
    content: 'Jericho [the walled city].” So they went and came to the house of a prostitute named Rahab, and lodged there. '
