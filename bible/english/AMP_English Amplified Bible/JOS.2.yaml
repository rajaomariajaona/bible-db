    content: She said, “According to your words, so be it.” Then Rahab sent them off, and they departed; and she tied the scarlet cord in the window.
  '22':
  - type: text
    content: 'They left and went [on their way] to the hill country [west of Jericho], and stayed there [hidden in the caves] three days until the pursuers returned. The pursuers had searched all along the road but had not found '
  - type: text
    content: them.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Then the two men turned back and came down from the hill country and crossed over [the Jordan] and came to Joshua the son of Nun [at Shittim], and told him everything that had happened to them. '
  '24':
  - type: text
    content: They said to Joshua, “Certainly the L
  - type: heading
    content: ord
  - type: text
    content: ' has given all the land into our hands; for all the inhabitants of the land have melted [in despair] because of us.”'
  '3':
  - type: text
    content: 'So the king of Jericho sent '
  - type: text
    content: word
  - type: text
    content: ' to Rahab, saying, “Bring out the men who have come to you, who entered your house, because they have come [as spies] to search out all the land.” '
  '4':
  - type: text
    content: 'But the woman had taken the two men and hidden them; so she said, “Yes, two men came to me, but I did not know where they were from. '
  '5':
  - type: text
    content: 'When '
  - type: text
    content: it was time
  - type: text
    content: ' to close the [city] gate at dark, the men left; I do not know where they went. Pursue them quickly, for [if you do] you will overtake them.” '
  '6':
  - type: text
    content: 'But [in fact] she had brought the scouts up to the roof and had hidden them under the '
  - type: note
    content: Flax was used to make linen and the flat rooftop of a house was a convenient place to lay the stalks in the sun to dry.
  - type: text
    content: 'stalks of flax which she had laid in order on the roof [to dry]. '
  '7':
