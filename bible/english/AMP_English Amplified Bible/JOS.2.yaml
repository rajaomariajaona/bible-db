  '15':
  - type: text
    content: 'Then she let them down by a rope through the window, for her house was built '
  - type: note
    content: Modern archaeology indicates that the house may have been built against the wall, so that the city wall also formed the back wall of the house. Otherwise, it may have been built partially or entirely in the wall. The Hebrew preposition (“into/in”) has too wide a range of meaning to be precise.
  - type: text
    content: 'into the city wall, so that she was living on the wall. '
