  - type: text
    content: 'Red Sea for you when you came out of Egypt, and what you did to the two kings of the Amorites who were beyond the Jordan [on the east], to Sihon and Og, whom you '
  - type: note
    content: The conquest of the land and the destruction of its inhabitants were acts of divine judgment decreed by God, and carried out through acts of obedience by Joshua and the sons of Israel.
  - type: text
