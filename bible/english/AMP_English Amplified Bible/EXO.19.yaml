type_code: eng
verses:
  '1':
  - type: heading
    content: Moses on Sinai
  - type: text
    content: 'In the third month after the children of Israel had left the land of Egypt, the very same day, they came into the Wilderness of Sinai. '
  '10':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' also said to Moses, “Go to the people and consecrate them today and tomorrow [that is, prepare them for My sacred purpose], and have them wash their clothes '
  '11':
  - type: text
    content: and be ready by the third day, because on the third day the L
  - type: heading
    content: ord
  - type: text
    content: ' will come down on Mount Sinai [in the cloud] in the sight of all the people. '
  '12':
  - type: text
    content: 'You shall set barriers for the people all around [the mountain], saying, ‘Beware that you do not go up on the mountain or touch its border; whoever touches the mountain must be put to death. '
  '13':
  - type: text
    content: 'No hand shall touch him [that is, no one shall try to save the guilty party], but the offender must be stoned or shot through [with arrows]; whether man or animal [that touches the mountain], he shall not live.’ When the ram’s horn sounds a long blast, they shall come up to the mountain.” [Num 24:8] '
  '14':
  - type: text
    content: 'So Moses went down from the mountain to the people and sanctified them [for God’s sacred purpose], and they washed their clothes. '
  '15':
  - type: text
    content: 'He said to the people, “Be prepared for the third day; do not '
  - type: note
    content: Lit go near.
  - type: text
    content: be intimate with a woman.”
  '16':
  - type: text
    content: 'So it happened on the third day, when it was morning, that there were thunder and flashes of lightning, and a thick cloud was on the mountain, and a very loud blast was sounded on a ram’s horn, so that all the people who were in the camp trembled. '
  '17':
  - type: text
    content: 'Then Moses brought the people out of the camp to meet God, and they stood '
  - type: text
    content: and
  - type: text
    content: ' presented themselves at the foot of the mountain.'
  - type: heading
    content: The Lord Visits Sinai
  '18':
  - type: text
    content: Mount Sinai was wrapped in smoke because the L
  - type: heading
    content: ord
  - type: text
    content: ' descended upon it in fire; its smoke ascended like the smoke of a furnace, and the whole mountain quaked violently. '
  '19':
  - type: text
    content: 'And it happened, as the blast of the ram’s horn grew louder and louder, Moses spoke and God answered him with [a voice of] thunder. [Deut 4:12] '
  '2':
  - type: text
    content: 'When they moved out from Rephidim, they came to the Wilderness of Sinai and they camped there; Israel camped at the base of the mountain [of Sinai]. '
  '20':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' came down on Mount Sinai, to the top of the mountain; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' called Moses to the top of the mountain, and he went up. '
  '21':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, “Go down, warn the people, so that they do not break through [the barriers around the mountain] to the L'
  - type: heading
    content: ord
  - type: text
    content: ' to see [Me], and many of them perish [as a result]. '
  '22':
  - type: text
    content: Also have the priests who approach the L
  - type: heading
    content: ord
  - type: text
    content: ' consecrate (sanctify, set apart) themselves [for My sacred purpose], or else the L'
  - type: heading
    content: ord
  - type: text
    content: ' will break forth [in judgment] against them [and destroy them].” '
  '23':
  - type: text
    content: Moses said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “The people cannot come up to Mount Sinai, because You warned us, saying, ‘Set barriers around the mountain and consecrate it.’ ” '
  '24':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Go down and come up again, you and Aaron with you; but do not let the priests and the people break through [the barriers] to come up to the L'
  - type: heading
    content: ord
  - type: text
    content: ', or He will break forth [in judgment] against them [and destroy them].” '
  '25':
  - type: text
    content: So Moses went down to the people and told them [again about God’s warning].
  '3':
  - type: text
    content: Moses went up to God [on the mountain], and the L
  - type: heading
    content: ord
  - type: text
    content: ' called to him from the mountain, saying, “Say this to the house of Jacob and tell the Israelites: '
  '4':
  - type: text
    content: '‘You have seen what I did to the Egyptians, and how I carried you on eagles’ wings, and brought you to Myself. '
  '5':
  - type: text
    content: 'Now therefore, if you will in fact obey My voice and keep My covenant (agreement), then you shall be My own special possession '
  - type: text
    content: and
  - type: text
    content: ' treasure from among all peoples [of the world], for all the earth is Mine; '
  '6':
  - type: text
    content: and you shall be to Me a kingdom of priests and a holy nation [set apart for My purpose].’ These are the words that you shall speak to the Israelites.”
  '7':
  - type: text
    content: So Moses called for the elders of the people, and told them all these words which the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. '
  '8':
  - type: text
    content: All the people answered together and said, “We will do everything that the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken.” And Moses reported the words of the people to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '9':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Behold, I will come to you in a thick cloud, so that the people may hear when I speak with you and may believe '
  - type: text
    content: and
  - type: text
    content: ' trust in you forever.” Then Moses repeated the words of the people to the L'
  - type: heading
    content: ord
  - type: text
    content: .
