    content: Ministry of the Twelve
  - type: text
    content: 'Now Jesus called together the twelve [disciples] and gave them [the right to exercise] power and authority over all the demons and to heal diseases. '
  '10':
  - type: text
    content: 'When the apostles returned, they told Him all that they had done. He took them with Him and He privately withdrew [across the Jordan] to a city called Bethsaida. [Matt 14:13-21; Mark 6:32-44; John 6:5-13] '
