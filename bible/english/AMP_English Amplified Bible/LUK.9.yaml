  '7':
  - type: text
    content: 'Now Herod [Antipas] the tetrarch [who governed a portion of Palestine including Galilee and Perea] heard about all that was being done [by Jesus], and he was thoroughly perplexed, because it was said by some that John [the Baptist whom he had ordered beheaded] had been raised from the dead, [Matt 14:1, 2] '
  '8':
  - type: text
