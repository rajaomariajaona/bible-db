document_id: LUK.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ministry of the Twelve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jesus called together the twelve [disciples] and gave them [the right to exercise] power and authority over all the demons and to heal diseases. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the apostles returned, they told Him all that they had done. He took them with Him and He privately withdrew [across the Jordan] to a city called Bethsaida. [Matt 14:13-21; Mark 6:32-44; John 6:5-13] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the crowds learned of it, they followed Him; and He welcomed them and He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' talking to them about the kingdom of God, and healing those who needed to be healed.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Five Thousand Fed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the day was ending, and the twelve [disciples] came and said to Him, “Send the crowd away, so that they may go into the surrounding villages and countryside and find lodging, and get provisions; because here we are in an isolated place.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You give them '
      - type: usfm
        marker: it
        children:
        - type: text
          text: something
      - type: text
        text: ' to eat.”'
    - type: text
      text: ' They said, “We have no more than five loaves and two fish—unless perhaps we go and buy food for all these people.” [2 Kin 4:42-44] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(For there were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The women and children were not included in this estimate.
      marker-yv: yv-n
    - type: text
      text: 'about 5,000 men.) And He said to His disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Have them sit down '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to eat
      - type: text
        text: ' in groups of about fifty each.”'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did so, and had them all sit down. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He took the five loaves and the two fish, and He looked up to heaven [and gave thanks] and blessed them, and broke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' and kept giving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to the disciples to set before the crowd. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all ate and were [completely] satisfied; and the broken pieces which they had left over were [abundant and were] picked up—twelve baskets full.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened that as Jesus was praying privately, the disciples were with Him, and He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do the crowds say that I am?”
    - type: text
      text: ' [Matt 16:13-16; Mark 8:27-29] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered, “John the Baptist, and some say, Elijah; but others, that one of the ancient prophets has come back to life.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He sent them out [on a brief journey] to preach '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus as Israel’s Messiah.
      marker-yv: yv-n
    - type: text
      text: 'the kingdom of God and to perform healing. [Matt 10:5] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But who do you say that I am?”
    - type: text
      text: ' Peter replied, “The Christ (the Messiah, the Anointed) of God!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He strictly warned and admonished them not to tell this to anyone, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man must suffer many things and be rejected
    - type: text
      text: ' [as the Messiah] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: by the elders and chief priests and scribes (Sanhedrin, Jewish High Court), and be put to death, and on the third day be raised up
    - type: text
      text: ' [from death to life].” [Matt 16:21-28; Mark 8:31-9:1]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He was saying to them all, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone wishes to follow Me
    - type: text
      text: ' [as My disciple], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he must deny himself
    - type: text
      text: ' [set aside selfish interests], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and take up his cross daily
    - type: text
      text: ' [expressing a willingness to endure whatever may come] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and follow Me
    - type: text
      text: ' [believing in Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me]. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For whoever wishes to save his life
    - type: text
      text: ' [in this world] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will
    - type: text
      text: ' [eventually] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lose it
    - type: text
      text: ' [through death], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but whoever loses his life
    - type: text
      text: ' [in this world] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for My sake, he is the one who will save it
    - type: text
      text: ' [from the consequences of sin and separation from God]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For what does it profit a man if he gains the whole world
    - type: text
      text: ' [wealth, fame, success], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and loses or forfeits himself?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For whoever is ashamed
    - type: text
      text: ' [here and now] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of Me and My words, the Son of Man will be ashamed of him when He comes in His glory and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the glory
      - type: text
        text: ' of the'
    - type: text
      text: ' [heavenly] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Father and of the holy angels.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I tell you truthfully, there are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps a reference to Peter, John, and James who were to witness the transfiguration a few days later.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: some among those standing here who will not taste death before they see the kingdom of God.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Transfiguration
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now about eight days after these teachings, He took along Peter and John and James and went up on the mountain to pray. [Matt 17:1-8; Mark 9:2-8] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As He was praying, the appearance of His face became different [actually transformed], and His clothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: became
    - type: text
      text: ' white '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flashing with the brilliance of lightning. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Take nothing for '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your
      - type: text
        text: ' journey'
    - type: text
      text: ' [that might encumber you]—'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'neither a walking stick, nor bag, nor bread, nor money; and do not '
      - type: usfm
        marker: it
        children:
        - type: text
          text: even
      - type: text
        text: ' have two '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Simple slip-on garments made with or without sleeves, usually knee length and worn as either an under or outer garment in ancient times.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: tunics apiece.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, two men were talking with Him; and they were Moses and Elijah, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who appeared in glory, and were speaking of His departure [from earthly life], which He was about to bring to fulfillment at Jerusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Peter and those who were with him had been overcome with sleep; but when they were fully awake, they saw His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty, and the two men who were standing with Him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as these [men, Moses and Elijah] were leaving Him, Peter said to Jesus, “Master, it is delightful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good for us to be here; we should make three [sacred] tents; one for You, one for Moses, and one for Elijah”—not realizing what he was saying. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But even as he was saying this, a cloud formed and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to overshadow them; and they were [greatly] afraid as they entered the cloud. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 3:17.
      marker-yv: yv-n
    - type: text
      text: 'a voice came out of the cloud, saying, “This is My beloved Son, My Chosen One; listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' yield to Him!” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the voice had ceased, Jesus was found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' alone. And they kept silent, and told no one at that time any of the things which they had seen [concerning the divine manifestation]. [2 Pet 1:16-19]'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the next day, when they came down from the mountain, a large crowd met Him. [Matt 17:14-18; Mark 9:14-27] '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a man from the crowd shouted for help, “Teacher, I beg You to look at my son, because he is my only child; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a spirit seizes him, and suddenly he cries out, and it throws him into a convulsion so that he foams '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the mouth;
    - type: text
      text: ' and only with [great] difficulty does it leave him, mauling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bruising him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as it leaves.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever house you enter, stay there until you leave that city
    - type: text
      text: ' [to go to another]. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I begged Your disciples to cast it out, but they could not.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You unbelieving and perverted generation! How long shall I be with you and put up with you? Bring your son here
    - type: text
      text: ' [to Me].” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even while the boy was coming, the demon slammed him down and threw him into a [violent] convulsion. But Jesus rebuked the unclean spirit, and healed the boy and gave him back to his father. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all amazed [practically overwhelmed] at the [evidence of the] greatness of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His wondrous work. [Mark 9:30-32]'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: B
    - type: text
      text: 'ut while they were still awed by everything Jesus was doing, He said to His disciples, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Let these words sink into your ears: the Son of Man is going to be betrayed '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' handed over to men'
    - type: text
      text: ' [who are His enemies].” '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, they did not understand this statement. Its meaning was kept hidden from them so that they would not grasp it; and they were afraid to ask Him about it.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Test of Greatness
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'An argument started among them as to which of them might be the greatest [surpassing the others in esteem and authority]. [Matt 18:1-5; Mark 9:33-37] '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, knowing what they were thinking in their heart, took a child and had him stand beside Him, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever welcomes this child in My name welcomes Me; and whoever welcomes Me
    - type: text
      text: ' [also] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: welcomes Him who sent Me; for the one who is least among all of you
    - type: text
      text: ' [that is, the one who is genuinely humble—the one with a realistic self-view]—'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he is the one who is
    - type: text
      text: ' [truly] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: great.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John replied, “Master, we saw someone driving out demons in Your name; and we tried to stop him because he does not follow along with us.” [Mark 9:38-40] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And as for all those who do not welcome you, when you leave that city, shake the dust off your feet
    - type: text
      text: ' [breaking all ties with them] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as a testimony against them
    - type: text
      text: ' [that they rejected My message].” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Do not stop '
      - type: usfm
        marker: it
        children:
        - type: text
          text: him;
      - type: text
        text: ' for he who is not against you is for you.”'
    - type: text
      text: ' [Matt 12:30]'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the time was approaching for Him to be taken up [to heaven], He was determined to go to Jerusalem [to fulfill His purpose]. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He sent messengers on ahead of Him, and they went into a Samaritan village to make arrangements for Him; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the people would not welcome Him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because of the religious conflict between Samaritans and Jews, the people of Samaria were generally inhospitable to Jews and did not offer overnight accommodations to those who were traveling to Jerusalem to participate in religious events.
      marker-yv: yv-n
    - type: text
      text: 'because He was traveling toward Jerusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When His disciples James and John saw this, they said, “Lord, do You want us to command fire to come down from heaven and destroy them?” [2 Kin 1:9-16] '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He turned and rebuked them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Late mss add this to v 55 and continue into v 56.
      marker-yv: yv-n
    - type: text
      text: '[and He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You do not know what kind of spirit you are;
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the Son of Man did not come to destroy men’s lives, but to save them.”]
    - type: text
      text: ' And they journeyed on to another village.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Exacting Discipleship
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were going along the road, someone said to Him, “I will follow You wherever You go.” [Matt 8:19-22] '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Foxes have holes and the birds of the air have nests, but the Son of Man has no place to lay His head.”
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to another, '
    - type: usfm
      marker: wj
