  '21':
  - type: text
    content: 'And in the same way he sprinkled both the tabernacle and all the containers '
  - type: text
    content: and
  - type: text
    content: ' sacred utensils of worship with the blood. '
  '22':
  - type: text
    content: In fact under the Law almost everything is cleansed with blood, and without the shedding of blood there is no forgiveness [neither release from sin and its guilt, nor cancellation of the merited punishment].
  '23':
  - type: text
    content: 'Therefore it was necessary for the [earthly] copies of the heavenly things to be cleansed with these, but the heavenly things themselves required far better sacrifices than these. '
  '24':
  - type: text
    content: 'For Christ did not enter into a holy place made with hands, a mere copy of the true one, but [He entered] into heaven itself, now to appear in the very presence of God on our behalf; '
  '25':
  - type: text
    content: 'nor did He [enter into the heavenly sanctuary to] offer Himself again and again, as the high priest enters the Holy Place every year with blood that is not his own. '
  '26':
  - type: text
    content: 'Otherwise, He would have needed to suffer over and over since the foundation of the world; but now once for all at the consummation of the ages He has appeared '
  - type: text
    content: and
  - type: text
    content: ' been publicly manifested to put away sin by the sacrifice of Himself. '
  '27':
  - type: text
    content: 'And just as it is appointed '
  - type: text
    content: and
  - type: text
    content: ' destined for all men to die once and after this [comes certain] judgment, '
  '28':
  - type: text
    content: 'so Christ, having been offered once '
  - type: text
    content: and
  - type: text
    content: ' once for all to bear [as a burden] '
  - type: note
    content: See Is 53:10-12.
  - type: text
    content: 'the sins of many, will appear a second time [when he returns to earth], not to deal with sin, but to bring salvation to those who are eagerly '
  - type: text
    content: and
  - type: text
    content: ' confidently waiting for Him.'
  '3':
  - type: text
    content: 'Behind the second veil there was another tabernacle [the inner one or second section] known as the Holy of Holies, [Ex 26:31-33] '
  '4':
  - type: note
    content: The Greek participle translated “having” probably conveys the notion of “associated with it” and hence refers to the fact that the altar of incense, although located in the Holy Place according to Ex 30:6, here does not refer to location but to use, given the fact that the incense wafted behind the veil into the Holy of Holies.
  - type: text
    content: 'having the golden altar of incense and the ark of the covenant covered entirely with gold. This contained a golden jar which held the manna, and the rod of Aaron that sprouted, and the [two stone] tablets of the covenant [inscribed with the Ten Commandments]; [Ex 16:32-34; 30:1-6; Num 17:8-10] '
  '5':
  - type: text
    content: 'and above the ark were the [golden] cherubim of glory overshadowing '
  - type: note
    content: I.e. the lid of the ark where blood was sprinkled by the high priest.
  - type: text
    content: the mercy seat; but we cannot now go into detail about these things.
  '6':
  - type: text
    content: 'Now when these things have been prepared in this way, the priests continually enter the outer [or first section of the] tabernacle [that is, the Holy Place] performing [their ritual acts of] the divine worship, '
  '7':
  - type: text
    content: 'but into the second [inner tabernacle, the Holy of Holies], only the high priest '
  - type: text
    content: enters
  - type: text
    content: ' [and then only] once a year, and never without [bringing a sacrifice of] blood, which he offers [as a substitutionary atonement] for himself and for the sins of the people committed in ignorance. [Lev 16:15] '
  '8':
  - type: text
    content: 'By this the Holy Spirit signifies that the way into the Holy Place [the true Holy of Holies and the presence of God] has not yet been disclosed as long as the '
  - type: note
    content: During the age of the old covenant a worshiper had no direct access to God.
  - type: text
    content: 'first '
  - type: text
    content: or
  - type: text
    content: ' outer tabernacle is still standing [that is, as long as the Levitical system of worship remains a recognized institution], '
  '9':
  - type: text
    content: 'for this [first or outer tabernacle] is a symbol [that is, an archetype or paradigm] for the present time. Accordingly both gifts and sacrifices are offered which are incapable of perfecting the conscience '
  - type: text
    content: and
  - type: text
    content: ' renewing the [inner self of the] worshiper. '
