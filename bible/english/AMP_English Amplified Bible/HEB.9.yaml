  '1':
  - type: heading
    content: The Old and the New
  - type: text
    content: 'Now even the first '
  - type: text
    content: covenant
  - type: text
    content: ' had regulations for divine worship and for the earthly sanctuary. [Ex 25:10-40] '
  '10':
  - type: text
    content: For they [the gifts, sacrifices, and ceremonies] deal only with [clean and unclean] food and drink and various ritual washings, [mere] external regulations for the body imposed [to help the worshipers] until the time of reformation [that is, the time of the new order when Christ will establish the reality of what these things foreshadow—a better covenant].
  '11':
  - type: text
    content: 'But when Christ appeared as a High Priest of the good things to come [that is, true spiritual worship], '
  - type: text
    content: He entered
  - type: text
    content: ' through the greater and more perfect tabernacle, not made with hands, that is to say, not a part of this [material] creation. '
  '12':
  - type: text
    content: 'He went once for all into the Holy Place [the Holy of Holies of heaven, into the presence of God], and not through the blood of goats and calves, but through His own blood, having obtained '
  - type: text
    content: and
  - type: text
    content: ' secured eternal redemption [that is, the salvation of all who personally believe in Him as Savior]. '
  '13':
  - type: text
    content: 'For if the sprinkling of [ceremonially] defiled persons with the blood of goats and bulls and the ashes of a [burnt] heifer is sufficient for the cleansing of the body, [Lev 16:6, 16; Num 19:9, 17, 18] '
  '14':
  - type: text
    content: 'how much more will the blood of Christ, who through the eternal [Holy] Spirit '
  - type: text
    content: willingly
  - type: text
    content: ' offered Himself unblemished [that is, without moral or spiritual imperfection as a sacrifice] to God, cleanse your conscience from dead works '
  - type: text
    content: and
  - type: text
    content: ' lifeless observances to serve the ever living God?'
  '15':
  - type: text
    content: 'For this reason He is the Mediator '
  - type: text
    content: and
  - type: text
    content: ' Negotiator of a new covenant [that is, an entirely new agreement uniting God and man], so that those who have been called [by God] may receive [the fulfillment of] the promised eternal inheritance, since a death has taken place [as the payment] which redeems them from the sins '
  - type: text
    content: committed
  - type: text
    content: ' under the '
  - type: text
    content: obsolete
  - type: text
    content: ' first covenant. '
  '16':
  - type: text
    content: 'For where there is a will '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: This Greek word may also be translated “covenant” as in v 18 and the author may be engaging in deliberate word play here playing off of both meanings.
  - type: text
    content: 'testament involved, the death of the one who made it must be established, '
  '17':
  - type: text
    content: 'for a will '
  - type: text
    content: and
  - type: text
    content: ' testament takes effect [only] at death, since it is never in force as long as the one who made it is alive. '
  '18':
  - type: text
    content: 'So even the first '
  - type: text
    content: covenant
  - type: text
    content: ' was not put in force without [the shedding of] blood. '
  '19':
  - type: text
    content: 'For when every commandment in the Law had been read by Moses to all the people, he took the blood of the calves and goats [which had been sacrificed], together with water and scarlet wool and with a bunch of hyssop, and he sprinkled both the scroll itself and all the people, '
  '2':
  - type: text
    content: 'A tabernacle (sacred tent) was put up, the outer one '
  - type: text
    content: or
  - type: text
    content: ' first section, in which were the lampstand and the table with [its loaves of] the sacred showbread; this is called the Holy Place. [Lev 24:5, 6] '
