document_id: HEB.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Old and the New
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now even the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: covenant
    - type: text
      text: ' had regulations for divine worship and for the earthly sanctuary. [Ex 25:10-40] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For they [the gifts, sacrifices, and ceremonies] deal only with [clean and unclean] food and drink and various ritual washings, [mere] external regulations for the body imposed [to help the worshipers] until the time of reformation [that is, the time of the new order when Christ will establish the reality of what these things foreshadow—a better covenant].
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Christ appeared as a High Priest of the good things to come [that is, true spiritual worship], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He entered
    - type: text
      text: ' through the greater and more perfect tabernacle, not made with hands, that is to say, not a part of this [material] creation. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went once for all into the Holy Place [the Holy of Holies of heaven, into the presence of God], and not through the blood of goats and calves, but through His own blood, having obtained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secured eternal redemption [that is, the salvation of all who personally believe in Him as Savior]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if the sprinkling of [ceremonially] defiled persons with the blood of goats and bulls and the ashes of a [burnt] heifer is sufficient for the cleansing of the body, [Lev 16:6, 16; Num 19:9, 17, 18] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'how much more will the blood of Christ, who through the eternal [Holy] Spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: willingly
    - type: text
      text: ' offered Himself unblemished [that is, without moral or spiritual imperfection as a sacrifice] to God, cleanse your conscience from dead works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lifeless observances to serve the ever living God?'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason He is the Mediator '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Negotiator of a new covenant [that is, an entirely new agreement uniting God and man], so that those who have been called [by God] may receive [the fulfillment of] the promised eternal inheritance, since a death has taken place [as the payment] which redeems them from the sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: committed
    - type: text
      text: ' under the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: obsolete
    - type: text
      text: ' first covenant. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For where there is a will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This Greek word may also be translated “covenant” as in v 18 and the author may be engaging in deliberate word play here playing off of both meanings.
      marker-yv: yv-n
    - type: text
      text: 'testament involved, the death of the one who made it must be established, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for a will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testament takes effect [only] at death, since it is never in force as long as the one who made it is alive. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So even the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: covenant
    - type: text
      text: ' was not put in force without [the shedding of] blood. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when every commandment in the Law had been read by Moses to all the people, he took the blood of the calves and goats [which had been sacrificed], together with water and scarlet wool and with a bunch of hyssop, and he sprinkled both the scroll itself and all the people, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A tabernacle (sacred tent) was put up, the outer one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' first section, in which were the lampstand and the table with [its loaves of] the sacred showbread; this is called the Holy Place. [Lev 24:5, 6] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saying, “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: his is the blood of the covenant
    - type: text
      text: ' [that seals and ratifies the agreement] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: which
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od ordained
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: commanded
    - type: text
      text: ' [me to deliver to] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: you
    - type: text
      text: '.” [Ex 24:6-8] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the same way he sprinkled both the tabernacle and all the containers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sacred utensils of worship with the blood. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In fact under the Law almost everything is cleansed with blood, and without the shedding of blood there is no forgiveness [neither release from sin and its guilt, nor cancellation of the merited punishment].
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore it was necessary for the [earthly] copies of the heavenly things to be cleansed with these, but the heavenly things themselves required far better sacrifices than these. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Christ did not enter into a holy place made with hands, a mere copy of the true one, but [He entered] into heaven itself, now to appear in the very presence of God on our behalf; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor did He [enter into the heavenly sanctuary to] offer Himself again and again, as the high priest enters the Holy Place every year with blood that is not his own. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Otherwise, He would have needed to suffer over and over since the foundation of the world; but now once for all at the consummation of the ages He has appeared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' been publicly manifested to put away sin by the sacrifice of Himself. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And just as it is appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destined for all men to die once and after this [comes certain] judgment, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so Christ, having been offered once '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' once for all to bear [as a burden] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Is 53:10-12.
      marker-yv: yv-n
    - type: text
      text: 'the sins of many, will appear a second time [when he returns to earth], not to deal with sin, but to bring salvation to those who are eagerly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently waiting for Him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behind the second veil there was another tabernacle [the inner one or second section] known as the Holy of Holies, [Ex 26:31-33] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek participle translated “having” probably conveys the notion of “associated with it” and hence refers to the fact that the altar of incense, although located in the Holy Place according to Ex 30:6, here does not refer to location but to use, given the fact that the incense wafted behind the veil into the Holy of Holies.
      marker-yv: yv-n
    - type: text
      text: 'having the golden altar of incense and the ark of the covenant covered entirely with gold. This contained a golden jar which held the manna, and the rod of Aaron that sprouted, and the [two stone] tablets of the covenant [inscribed with the Ten Commandments]; [Ex 16:32-34; 30:1-6; Num 17:8-10] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and above the ark were the [golden] cherubim of glory overshadowing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the lid of the ark where blood was sprinkled by the high priest.
      marker-yv: yv-n
    - type: text
      text: the mercy seat; but we cannot now go into detail about these things.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when these things have been prepared in this way, the priests continually enter the outer [or first section of the] tabernacle [that is, the Holy Place] performing [their ritual acts of] the divine worship, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but into the second [inner tabernacle, the Holy of Holies], only the high priest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enters
    - type: text
      text: ' [and then only] once a year, and never without [bringing a sacrifice of] blood, which he offers [as a substitutionary atonement] for himself and for the sins of the people committed in ignorance. [Lev 16:15] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this the Holy Spirit signifies that the way into the Holy Place [the true Holy of Holies and the presence of God] has not yet been disclosed as long as the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: During the age of the old covenant a worshiper had no direct access to God.
      marker-yv: yv-n
    - type: text
      text: 'first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' outer tabernacle is still standing [that is, as long as the Levitical system of worship remains a recognized institution], '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for this [first or outer tabernacle] is a symbol [that is, an archetype or paradigm] for the present time. Accordingly both gifts and sacrifices are offered which are incapable of perfecting the conscience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renewing the [inner self of the] worshiper. '
