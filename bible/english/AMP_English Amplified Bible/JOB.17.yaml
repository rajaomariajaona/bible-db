document_id: JOB.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Says He Has Become a Byword
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “My spirit is broken, my days are extinguished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The grave is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ready
    - type: text
      text: ' for me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “But as for all of you, come back again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though I do not find a wise man among you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“My days are past, my purposes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans are frustrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torn apart;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wishes of my heart [are broken].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “These [thoughts try to] make the night into the day;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘The light is near,’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they say
    - type: text
      text: ' in the presence of darkness [but they pervert the truth].'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “But if I look to Sheol (the nether world, the place of the dead) as my home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I make my bed in the darkness,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If I call out to the pit (grave), ‘You are my father’;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the worm [that feeds on decay], ‘You are my mother and my sister [because I will soon be closest to you],’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Where now is my hope?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And who regards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' considers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' is even concerned about my hope?'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Will my hope go down with me to Sheol (the nether world, the place of the dead)?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall we go down together in the dust?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Surely there are mockers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mockery with me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And my eye gazes on their obstinacy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provocation.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ¶“Give me a pledge (guarantee, promise) with Yourself [acknowledge my innocence before my death];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who is there that will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: strike hands with me
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'be my guarantor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give security for me?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “But You [Lord] have closed their hearts to understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore You will not exalt them [by giving a verdict against me].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“He who denounces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' informs against his friends for a share '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the spoil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The eyes of his children will also languish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fail.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '¶“But He has made me a byword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mockery among the people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have become one in whose face people spit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “My eye has grown dim (unexpressive) because of grief,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all my [body’s] members are [wasted away] like a shadow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “The upright will be [astonished and] appalled at this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the innocent will stir himself up against the godless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' polluted.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Nevertheless the righteous will hold to his ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who has clean hands will grow stronger and stronger. [Ps 24:4]
