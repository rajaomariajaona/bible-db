document_id: PRO.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Contrast of the Righteous and the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The proverbs of Solomon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise son makes a father glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a foolish [stubborn] son [who refuses to learn] is a grief to his mother.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He who [maliciously] winks the eye [of evil intent] causes trouble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the babbling fool [who is arrogant and thinks himself wise] will come to ruin.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The mouth of the righteous is a fountain of life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' his words of wisdom are a source of blessing,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the mouth of the wicked conceals violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hatred stirs up strife,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But love covers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelms all transgressions [forgiving and overlooking another’s faults].'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: On the lips of the discerning, [skillful and godly] wisdom is found,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the rod are for the back of the one who is without common sense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wise men store up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treasure knowledge [in mind and heart],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with the mouth of the foolish, ruin is at hand.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The rich man’s wealth is his fortress;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ruin of the poor is their poverty. [Ps 52:7; 1 Tim 6:17]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The wages of the righteous [the upright, those in right standing with God] is [a worthwhile, meaningful] life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The income of the wicked, punishment. [Rom 6:21-23; 1 Tim 6:10]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He who learns from instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correction is on the [right] path of life [and for others his example is a path toward wisdom and blessing],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who ignores '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refuses correction goes off course [and for others his example is a path toward sin and ruin].'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He who hides hatred has lying lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who spreads slander is a fool. [Prov 26:24-26]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When there are many words, transgression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offense are unavoidable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who controls his lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeps thoughtful silence is wise.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Treasures of wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ill-gotten gains do not profit,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' moral integrity in daily life rescues from death.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The tongue of the righteous is like precious silver (greatly valued);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart of the wicked is worth little.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The lips of the righteous feed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guide many,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But fools [who reject God and His wisdom] die for lack of understanding.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The blessing of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brings [true] riches,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He adds no sorrow to it [for it comes as a blessing from God].
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Engaging in evil is like sport to the fool [who refuses wisdom and chases sin],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But to a man of understanding [skillful and godly] wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brings joy
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: What the wicked fears will come upon him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the desire of the righteous [for the blessings of God] will be granted.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When the whirlwind passes, the wicked is no more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the righteous has an everlasting foundation. [Ps 125:1; Matt 7:24-27]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Like vinegar to the teeth and smoke to the eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So is the lazy one to those who send him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to work
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [worshiping, obeying, serving, and trusting Him with awe-filled respect] prolongs one’s life,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the years of the wicked will be shortened.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The hope of the righteous [those of honorable character and integrity] is joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the expectation of the wicked [those who oppose God and ignore His wisdom] comes to nothing.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The way of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is a stronghold to the upright,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is ruin to those who do evil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not allow the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul of the righteous
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: righteous to hunger [God will meet all his needs],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But He will reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast away the craving of the wicked. [Ps 34:9, 10; 37:25]'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The [consistently] righteous will never be shaken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked will not inhabit the earth. [Ps 37:22; 125:1]
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The mouth of the righteous flows with [skillful and godly] wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the perverted tongue will be cut out.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The lips of the righteous know (speak) what is acceptable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the mouth of the wicked knows (speaks) what is perverted (twisted).
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Poor is he who works with a negligent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' idle hand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the hand of the diligent makes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' rich.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He who gathers during summer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' takes advantage of his opportunities is a son who acts wisely,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' he who sleeps during harvest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ignores the moment of opportunity is a son who acts shamefully.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Blessings are on the head of the righteous [the upright, those in right standing with God],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the mouth of the wicked conceals violence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mention
        - type: text
          text: . In Jewish tradition, “memory” is not just a recollection but implies speaking of the one remembered.
      marker-yv: yv-n
    - type: text
      text: memory of the righteous [person] is a [source of] blessing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the name of the wicked will [be forgotten and] rot [like a corpse]. [Ps 112:6; 9:5]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The wise in heart [are willing to learn so they] will accept '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey commands (instruction),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the babbling fool [who is arrogant and thinks himself wise] will come to ruin.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He who walks in integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with moral character walks securely,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who takes a crooked way will be discovered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished.'
