verses:
  '1':
  - type: heading
    content: Contrast of the Righteous and the Wicked
  - type: text
    content: 'The proverbs of Solomon:'
  - type: text
    content: A wise son makes a father glad,
  - type: text
    content: But a foolish [stubborn] son [who refuses to learn] is a grief to his mother.
  '10':
  - type: text
    content: He who [maliciously] winks the eye [of evil intent] causes trouble;
  - type: text
    content: And the babbling fool [who is arrogant and thinks himself wise] will come to ruin.
  '11':
  - type: text
    content: 'The mouth of the righteous is a fountain of life '
  - type: text
    content: and
  - type: text
    content: ' his words of wisdom are a source of blessing,'
  - type: text
    content: 'But the mouth of the wicked conceals violence '
  - type: text
    content: and
  - type: text
    content: ' evil.'
  '12':
  - type: text
    content: Hatred stirs up strife,
  - type: text
    content: 'But love covers '
  - type: text
    content: and
  - type: text
    content: ' overwhelms all transgressions [forgiving and overlooking another’s faults].'
  '13':
  - type: text
    content: On the lips of the discerning, [skillful and godly] wisdom is found,
  - type: text
    content: 'But discipline '
  - type: text
    content: and
  - type: text
    content: ' the rod are for the back of the one who is without common sense '
  - type: text
    content: and
  - type: text
    content: ' understanding.'
  '14':
  - type: text
    content: 'Wise men store up '
  - type: text
    content: and
  - type: text
    content: ' treasure knowledge [in mind and heart],'
  - type: text
    content: But with the mouth of the foolish, ruin is at hand.
  '15':
  - type: text
    content: The rich man’s wealth is his fortress;
  - type: text
    content: The ruin of the poor is their poverty. [Ps 52:7; 1 Tim 6:17]
  '16':
  - type: text
    content: The wages of the righteous [the upright, those in right standing with God] is [a worthwhile, meaningful] life,
  - type: text
    content: The income of the wicked, punishment. [Rom 6:21-23; 1 Tim 6:10]
  '17':
  - type: text
    content: 'He who learns from instruction '
  - type: text
    content: and
  - type: text
    content: ' correction is on the [right] path of life [and for others his example is a path toward wisdom and blessing],'
  - type: text
    content: 'But he who ignores '
  - type: text
    content: and
  - type: text
    content: ' refuses correction goes off course [and for others his example is a path toward sin and ruin].'
  '18':
  - type: text
    content: He who hides hatred has lying lips,
  - type: text
    content: And he who spreads slander is a fool. [Prov 26:24-26]
  '19':
  - type: text
    content: 'When there are many words, transgression '
  - type: text
    content: and
  - type: text
    content: ' offense are unavoidable,'
  - type: text
    content: 'But he who controls his lips '
  - type: text
    content: and
  - type: text
    content: ' keeps thoughtful silence is wise.'
  '2':
  - type: text
    content: 'Treasures of wickedness '
  - type: text
    content: and
  - type: text
    content: ' ill-gotten gains do not profit,'
  - type: text
    content: 'But righteousness '
  - type: text
    content: and
  - type: text
    content: ' moral integrity in daily life rescues from death.'
  '20':
  - type: text
    content: The tongue of the righteous is like precious silver (greatly valued);
  - type: text
    content: The heart of the wicked is worth little.
  '21':
  - type: text
    content: 'The lips of the righteous feed '
  - type: text
    content: and
  - type: text
    content: ' guide many,'
  - type: text
    content: But fools [who reject God and His wisdom] die for lack of understanding.
  '22':
  - type: text
    content: The blessing of the L
  - type: heading
    content: ord
  - type: text
    content: ' brings [true] riches,'
  - type: text
    content: And He adds no sorrow to it [for it comes as a blessing from God].
  '23':
  - type: text
    content: Engaging in evil is like sport to the fool [who refuses wisdom and chases sin],
  - type: text
    content: 'But to a man of understanding [skillful and godly] wisdom '
  - type: text
    content: brings joy
  - type: text
    content: .
  '24':
  - type: text
    content: What the wicked fears will come upon him,
  - type: text
    content: But the desire of the righteous [for the blessings of God] will be granted.
  '25':
  - type: text
    content: When the whirlwind passes, the wicked is no more,
  - type: text
    content: But the righteous has an everlasting foundation. [Ps 125:1; Matt 7:24-27]
  '26':
  - type: text
    content: Like vinegar to the teeth and smoke to the eyes,
  - type: text
    content: 'So is the lazy one to those who send him '
  - type: text
    content: to work
  - type: text
    content: .
  '27':
  - type: text
    content: The [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [worshiping, obeying, serving, and trusting Him with awe-filled respect] prolongs one’s life,'
  - type: text
    content: But the years of the wicked will be shortened.
  '28':
  - type: text
    content: The hope of the righteous [those of honorable character and integrity] is joy,
  - type: text
    content: But the expectation of the wicked [those who oppose God and ignore His wisdom] comes to nothing.
  '29':
  - type: text
    content: The way of the L
  - type: heading
    content: ord
  - type: text
    content: ' is a stronghold to the upright,'
  - type: text
    content: But it is ruin to those who do evil.
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will not allow the '
  - type: note
    content: Lit soul of the righteous.
  - type: text
    content: righteous to hunger [God will meet all his needs],
  - type: text
    content: 'But He will reject '
  - type: text
    content: and
  - type: text
    content: ' cast away the craving of the wicked. [Ps 34:9, 10; 37:25]'
  '30':
  - type: text
    content: The [consistently] righteous will never be shaken,
  - type: text
    content: But the wicked will not inhabit the earth. [Ps 37:22; 125:1]
  '31':
  - type: text
    content: The mouth of the righteous flows with [skillful and godly] wisdom,
  - type: text
    content: But the perverted tongue will be cut out.
  '32':
  - type: text
    content: The lips of the righteous know (speak) what is acceptable,
  - type: text
    content: But the mouth of the wicked knows (speaks) what is perverted (twisted).
  '4':
  - type: text
    content: 'Poor is he who works with a negligent '
  - type: text
    content: and
  - type: text
    content: ' idle hand,'
  - type: text
    content: 'But the hand of the diligent makes '
  - type: text
    content: him
  - type: text
    content: ' rich.'
  '5':
  - type: text
    content: 'He who gathers during summer '
  - type: text
    content: and
  - type: text
    content: ' takes advantage of his opportunities is a son who acts wisely,'
  - type: text
    content: But
  - type: text
    content: ' he who sleeps during harvest '
  - type: text
    content: and
  - type: text
    content: ' ignores the moment of opportunity is a son who acts shamefully.'
  '6':
  - type: text
    content: Blessings are on the head of the righteous [the upright, those in right standing with God],
  - type: text
    content: But the mouth of the wicked conceals violence.
  '7':
  - type: text
    content: 'The '
  - type: note
    content: Lit mention. In Jewish tradition, “memory” is not just a recollection but implies speaking of the one remembered.
  - type: text
    content: memory of the righteous [person] is a [source of] blessing,
  - type: text
    content: But the name of the wicked will [be forgotten and] rot [like a corpse]. [Ps 112:6; 9:5]
  '8':
  - type: text
    content: 'The wise in heart [are willing to learn so they] will accept '
  - type: text
    content: and
  - type: text
    content: ' obey commands (instruction),'
  - type: text
    content: But the babbling fool [who is arrogant and thinks himself wise] will come to ruin.
  '9':
  - type: text
    content: 'He who walks in integrity '
  - type: text
    content: and
  - type: text
    content: ' with moral character walks securely,'
  - type: text
    content: 'But he who takes a crooked way will be discovered '
  - type: text
    content: and
  - type: text
    content: ' punished.'
