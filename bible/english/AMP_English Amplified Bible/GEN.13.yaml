document_id: GEN.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abram and Lot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So Abram went up out of Egypt, he and his wife and all that he had, and Lot [his nephew] with him, into the Negev (the South country of Judah).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now Abram was extremely rich in livestock and in silver and in gold. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He journeyed on from the Negev as far as Bethel, to the place where his tent had been at the beginning, between Bethel and Ai, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: where he had first built an altar; and there Abram called on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [in prayer]. [Gal 3:6-9] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Lot, who went with Abram, also had flocks and herds and tents. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now the land was not able to support them [that is, sustain all their grazing and water needs] while they lived near one another, for their possessions were too great for them to stay together. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And there was strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' quarreling between the herdsmen of Abram’s cattle and the herdsmen of Lot’s cattle. Now the Canaanite and the Perizzite were living in the land at that same time [making grazing of the livestock difficult].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Abram said to Lot, “Please let there be no strife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disagreement between you and me, nor between your herdsmen and my herdsmen, because we are relatives. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Is not the entire land before you? Please separate [yourself] from me. If you take the left, then I will go to the right; or if you choose the right, then I will go to the left.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So Lot looked and saw that the valley of the Jordan was well watered everywhere—this was before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' destroyed Sodom and Gomorrah; [it was all] like the garden of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', like the land of Egypt, as you go to Zoar [at the south end of the Dead Sea]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Lot chose for himself all the valley of the Jordan, and he traveled east. So they separated from each other. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abram settled in the land of Canaan, and Lot settled in the cities of the valley and camped as far as Sodom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lived there. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the men of Sodom were extremely wicked and sinful against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [unashamed in their open sin before Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Abram, after Lot had left him, “Now lift up your eyes and look from the place where you are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: standing
  - type: text
    text: ', northward and southward and eastward and westward; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'for all the land which you see I will give to you and to your descendants forever. [Acts 7:5] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will make your descendants [as numerous] as the dust of the earth, so that if a man could count the [grains of] dust of the earth, then your descendants could also be counted. [Gen 28:14] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Arise, walk (make a thorough reconnaissance) around in the land, through its length and its width, for I will give it to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Abram broke camp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moved his tent, and came and settled by the [grove of the great] terebinths (oak trees) of Mamre [the Amorite], which are in Hebron, and there he built an altar to [honor] the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
