document_id: PRO.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A wise son heeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts [and is the result of] his father’s discipline '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruction,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But a scoffer does not listen to reprimand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' does not learn from his errors.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From the fruit of his mouth a [wise] man enjoys good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the desire of the treacherous is for violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The one who guards his mouth [thinking before he speaks] protects his life;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who opens his lips wide [and chatters without thinking] comes to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The soul (appetite) of the lazy person craves and gets nothing [for lethargy overcomes ambition],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the soul (appetite) of the diligent [who works willingly] is rich '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundantly supplied. [Prov 10:4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A righteous man hates lies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a wicked man is loathsome, and he acts shamefully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Righteousness (being in right standing with God) guards the one whose way is blameless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But wickedness undermines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overthrows the sinner.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There is one who pretends to be rich, yet has nothing at all;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Another
  - type: text
    text: ' pretends to be poor, yet has great wealth. [Prov 12:9; Luke 12:20, 21]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The ransom for a man’s life is his wealth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the poor man does not even have to listen to a rebuke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' threats [from the envious].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The light of the righteous [within him—grows brighter and] rejoices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the lamp of the wicked [is a temporary light and] goes out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Through pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presumption come nothing but strife,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But [skillful and godly] wisdom is with those who welcome [well-advised] counsel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: obtained
  - type: text
    text: ' by fraud dwindles,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he who gathers gradually by [honest] labor will increase [his riches].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hope deferred makes the heart sick,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when desire is fulfilled, it is a tree of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Whoever despises the word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counsel [of God] brings destruction upon himself,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who [reverently] fears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respects the commandment [of God] will be rewarded.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The teaching of the wise is a fountain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' source of life,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that one may avoid the snares of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Good understanding wins favor [from others],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the way of the unfaithful is hard [like barren, dry soil].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Every prudent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-disciplined man acts with knowledge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a [closed-minded] fool [who refuses to learn] displays his foolishness [for all to see].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A wicked messenger falls into hardship,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a faithful ambassador brings healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Poverty and shame will come to him who refuses instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who accepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' learns from reproof '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' censure is honored.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Desire realized is sweet to the soul;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it is detestable to fools to turn away from evil [which they have planned].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He who walks [as a companion] with wise men will be wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the companions of [conceited, dull-witted] fools [are fools themselves and] will experience harm. [Is 32:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Adversity pursues sinners,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the [consistently] upright will be rewarded with prosperity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A good man leaves an inheritance to his children’s children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the wealth of the sinner is stored up for [the hands of] the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Abundant food is in the fallow (uncultivated) ground of the poor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But [without protection] it is swept away by injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He who withholds the rod [of discipline] hates his son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who loves him disciplines '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trains him diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriately [with wisdom and love]. [Prov 19:18; 22:15; 23:13; 29:15, 17; Eph 6:4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The [consistently] righteous has enough to satisfy his appetite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the stomach of the wicked is in need [of bread].
