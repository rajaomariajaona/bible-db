document_id: PRO.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: 'A wise son heeds '
  - type: text
    content: and
  - type: text
    content: ' accepts [and is the result of] his father’s discipline '
  - type: text
    content: and
  - type: text
    content: ' instruction,'
  - type: text
    content: 'But a scoffer does not listen to reprimand '
  - type: text
    content: and
  - type: text
    content: ' does not learn from his errors.'
  '10':
  - type: text
    content: 'Through pride '
  - type: text
    content: and
  - type: text
    content: ' presumption come nothing but strife,'
  - type: text
    content: But [skillful and godly] wisdom is with those who welcome [well-advised] counsel.
  '11':
  - type: text
    content: 'Wealth '
  - type: text
    content: obtained
  - type: text
    content: ' by fraud dwindles,'
  - type: text
    content: But he who gathers gradually by [honest] labor will increase [his riches].
  '12':
  - type: text
    content: Hope deferred makes the heart sick,
  - type: text
    content: But when desire is fulfilled, it is a tree of life.
  '13':
  - type: text
    content: 'Whoever despises the word '
  - type: text
    content: and
  - type: text
    content: ' counsel [of God] brings destruction upon himself,'
  - type: text
    content: 'But he who [reverently] fears '
  - type: text
    content: and
  - type: text
    content: ' respects the commandment [of God] will be rewarded.'
  '14':
  - type: text
    content: 'The teaching of the wise is a fountain '
  - type: text
    content: and
  - type: text
    content: ' source of life,'
  - type: text
    content: So that one may avoid the snares of death.
  '15':
  - type: text
    content: Good understanding wins favor [from others],
  - type: text
    content: But the way of the unfaithful is hard [like barren, dry soil].
  '16':
  - type: text
    content: 'Every prudent '
  - type: text
    content: and
  - type: text
    content: ' self-disciplined man acts with knowledge,'
  - type: text
    content: But a [closed-minded] fool [who refuses to learn] displays his foolishness [for all to see].
  '17':
  - type: text
    content: A wicked messenger falls into hardship,
  - type: text
    content: But a faithful ambassador brings healing.
  '18':
  - type: text
    content: 'Poverty and shame will come to him who refuses instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline,'
  - type: text
    content: 'But he who accepts '
  - type: text
    content: and
  - type: text
    content: ' learns from reproof '
  - type: text
    content: or
  - type: text
    content: ' censure is honored.'
  '19':
  - type: text
    content: Desire realized is sweet to the soul;
  - type: text
    content: But it is detestable to fools to turn away from evil [which they have planned].
  '2':
  - type: text
    content: From the fruit of his mouth a [wise] man enjoys good,
  - type: text
    content: But the desire of the treacherous is for violence.
  '20':
  - type: text
    content: He who walks [as a companion] with wise men will be wise,
  - type: text
    content: But the companions of [conceited, dull-witted] fools [are fools themselves and] will experience harm. [Is 32:6]
  '21':
  - type: text
    content: Adversity pursues sinners,
  - type: text
    content: But the [consistently] upright will be rewarded with prosperity.
  '22':
  - type: text
    content: A good man leaves an inheritance to his children’s children,
  - type: text
    content: And the wealth of the sinner is stored up for [the hands of] the righteous.
  '23':
  - type: text
    content: Abundant food is in the fallow (uncultivated) ground of the poor,
  - type: text
    content: But [without protection] it is swept away by injustice.
  '24':
  - type: text
    content: He who withholds the rod [of discipline] hates his son,
  - type: text
    content: 'But he who loves him disciplines '
  - type: text
    content: and
  - type: text
    content: ' trains him diligently '
  - type: text
    content: and
  - type: text
    content: ' appropriately [with wisdom and love]. [Prov 19:18; 22:15; 23:13; 29:15, 17; Eph 6:4]'
  '25':
  - type: text
    content: The [consistently] righteous has enough to satisfy his appetite,
  - type: text
    content: But the stomach of the wicked is in need [of bread].
  '3':
  - type: text
    content: The one who guards his mouth [thinking before he speaks] protects his life;
  - type: text
    content: The one who opens his lips wide [and chatters without thinking] comes to ruin.
  '4':
  - type: text
    content: The soul (appetite) of the lazy person craves and gets nothing [for lethargy overcomes ambition],
  - type: text
    content: 'But the soul (appetite) of the diligent [who works willingly] is rich '
  - type: text
    content: and
  - type: text
    content: ' abundantly supplied. [Prov 10:4]'
  '5':
  - type: text
    content: A righteous man hates lies,
  - type: text
    content: But a wicked man is loathsome, and he acts shamefully.
  '6':
  - type: text
    content: Righteousness (being in right standing with God) guards the one whose way is blameless,
  - type: text
    content: 'But wickedness undermines '
  - type: text
    content: and
  - type: text
    content: ' overthrows the sinner.'
  '7':
  - type: text
    content: There is one who pretends to be rich, yet has nothing at all;
  - type: text
    content: Another
  - type: text
    content: ' pretends to be poor, yet has great wealth. [Prov 12:9; Luke 12:20, 21]'
  '8':
  - type: text
    content: The ransom for a man’s life is his wealth,
  - type: text
    content: 'But the poor man does not even have to listen to a rebuke '
  - type: text
    content: or
  - type: text
    content: ' threats [from the envious].'
  '9':
  - type: text
    content: The light of the righteous [within him—grows brighter and] rejoices,
  - type: text
    content: But the lamp of the wicked [is a temporary light and] goes out.
