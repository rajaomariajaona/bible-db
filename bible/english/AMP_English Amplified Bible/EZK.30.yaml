  '12':
  - type: text
    content: “And I will make the rivers [of the Nile delta] dry
  - type: text
    content: And sell the land into the hands of evil men;
  - type: text
    content: I will make the land desolate
  - type: text
    content: And all that is in it,
  - type: text
