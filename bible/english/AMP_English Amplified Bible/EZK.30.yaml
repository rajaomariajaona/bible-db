  - type: heading
    content: ord
  - type: text
    content: .” ’ ”
  - type: heading
    content: Victory for Babylon
  '2':
  - type: text
    content: “Son of man, prophesy and say, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “Wail, ‘Alas for the day!’
  '20':
  - type: text
    content: 'In the eleventh year [after King Jehoiachin was taken to Babylon], in the first '
  - type: text
    content: month,
  - type: text
    content: ' on the seventh of the month, the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '21':
  - type: text
    content: '“Son of man, I have broken the arm of Pharaoh king of Egypt; and behold, it has not been bound up to heal or wrapped with a bandage, so that it may be strong to hold '
  - type: text
    content: and
  - type: text
    content: ' wield the sword. '
  '22':
  - type: text
    content: Therefore thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Behold, I am against Pharaoh king of Egypt and will break his arms, both the strong one and the broken, and I will make the sword fall from his hand. '
  '23':
  - type: text
    content: 'I will scatter the Egyptians among the nations and will disperse them throughout the lands. '
  '24':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon and put My sword in his hand; but I will break Pharaoh’s arms and he will groan before him (Nebuchadnezzar) with the groanings of a [mortally] wounded man. '
  '25':
  - type: text
    content: 'But I will strengthen '
  - type: text
    content: and
  - type: text
    content: ' hold up the arms of the king of Babylon and the arms of Pharaoh will fall down. Then the people [of Egypt] will know that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ', when I put My sword into the hand of the king of Babylon and he stretches it out against the land of Egypt. '
  '26':
  - type: text
    content: When I scatter the Egyptians among the nations and disperse them through the lands, then they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: “For the day is near,
  - type: text
    content: Even the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is near,'
  - type: text
    content: It will be a cloudy day;
  - type: text
    content: 'A time '
  - type: text
    content: of doom
  - type: text
    content: ' for the nations.'
  '4':
  - type: text
    content: “A sword will come upon Egypt,
  - type: text
    content: 'And anguish '
  - type: text
    content: and
  - type: text
    content: ' trembling will be in Ethiopia (Cush),'
  - type: text
    content: When the slain fall in Egypt
  - type: text
    content: 'And they [of Babylon] carry away her great mass of people '
  - type: text
    content: and
  - type: text
    content: ' her riches'
  - type: text
    content: And her foundations are torn down.
  '5':
  - type: text
    content: 'Ethiopia (Cush), Put, Lud, all '
  - type: note
    content: Or the mixed people.
  - type: text
    content: Arabia, Libya (Cub) and the people of the land of the covenant [the Jews who had taken refuge in Egypt] will fall with the Egyptians by the sword.”
  '6':
  - type: text
    content: ¶‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: '“Those who uphold '
  - type: text
    content: and
  - type: text
    content: ' support Egypt will fall'
  - type: text
    content: And the pride of her power will come down;
  - type: text
    content: From Migdol [in the north] to Syene [in the south]
  - type: text
    content: They will fall within her by the sword,”
  - type: text
    content: Says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '7':
  - type: text
    content: “And they will be desolate
  - type: text
    content: In the midst of countries that are desolated;
  - type: text
    content: And her cities will be
  - type: text
    content: Among cities that are devastated [by plunder and slavery].
  '8':
  - type: text
    content: “And they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: When I have set a fire in Egypt
  - type: text
    content: 'And all her helpers are shattered '
  - type: text
    content: and
  - type: text
    content: ' destroyed.'
  '9':
  - type: text
    content: 'On that day [swift] messengers will go from Me in ships to frighten the careless '
  - type: text
    content: and
  - type: text
    content: ' unsuspecting Ethiopians, and there will be anguish '
  - type: text
    content: and
  - type: text
    content: ' trembling in them as in the day of [judgment for] Egypt; for behold, it is coming!”'
