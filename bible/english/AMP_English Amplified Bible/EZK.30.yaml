document_id: EZK.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dirge for Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came again to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will also make the great people of Egypt cease
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the hand of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Jer 21:2.
      marker-yv: yv-n
    - type: text
      text: Nebuchadnezzar king of Babylon.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “He and his people with him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The most violent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruthless of the nations,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be brought in to destroy the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will draw their swords against Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fill the land with the slain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “And I will make the rivers [of the Nile delta] dry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sell the land into the hands of evil men;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make the land desolate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all that is in it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the hand of strangers. I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken.”'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will also destroy the idols
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will put an end to the images in Memphis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will no longer be a prince of the land of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will put fear in the land of Egypt.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “I will make Pathros desolate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set fire to Zoan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And execute judgments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishments on Thebes.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “I will pour out My wrath on Pelusium,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stronghold of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will cut off (destroy) the population of Thebes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I will set fire to Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pelusium will writhe in [great] anguish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thebes shall be torn open
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Memphis shall be in daily distress.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “The young men of On (Aven) and of Pi-beseth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will fall by the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the women [and children] will go into captivity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “In Tehaphnehes the day will be dark
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I break the yoke bars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dominion of Egypt there.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the pride of her power will come to an end;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cloud [of disasters] will cover her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her daughters will go into captivity.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“In this way I will bring judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment on Egypt.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they shall know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” ’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Victory for Babylon
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Son of man, prophesy and say, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Wail, ‘Alas for the day!’
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In the eleventh year [after King Jehoiachin was taken to Babylon], in the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the seventh of the month, the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Son of man, I have broken the arm of Pharaoh king of Egypt; and behold, it has not been bound up to heal or wrapped with a bandage, so that it may be strong to hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wield the sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Therefore thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Behold, I am against Pharaoh king of Egypt and will break his arms, both the strong one and the broken, and I will make the sword fall from his hand. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I will scatter the Egyptians among the nations and will disperse them throughout the lands. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'I will strengthen the arms of the king of Babylon and put My sword in his hand; but I will break Pharaoh’s arms and he will groan before him (Nebuchadnezzar) with the groanings of a [mortally] wounded man. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But I will strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hold up the arms of the king of Babylon and the arms of Pharaoh will fall down. Then the people [of Egypt] will know that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I put My sword into the hand of the king of Babylon and he stretches it out against the land of Egypt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: When I scatter the Egyptians among the nations and disperse them through the lands, then they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .’ ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “For the day is near,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is near,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be a cloudy day;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of doom
    - type: text
      text: ' for the nations.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “A sword will come upon Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And anguish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling will be in Ethiopia (Cush),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the slain fall in Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they [of Babylon] carry away her great mass of people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her riches'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her foundations are torn down.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ethiopia (Cush), Put, Lud, all '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the mixed people
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Arabia, Libya (Cub) and the people of the land of the covenant [the Jews who had taken refuge in Egypt] will fall with the Egyptians by the sword.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Those who uphold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' support Egypt will fall'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the pride of her power will come down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Migdol [in the north] to Syene [in the south]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will fall within her by the sword,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “And they will be desolate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of countries that are desolated;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her cities will be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among cities that are devastated [by plunder and slavery].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “And they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I have set a fire in Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all her helpers are shattered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed.'
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On that day [swift] messengers will go from Me in ships to frighten the careless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unsuspecting Ethiopians, and there will be anguish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling in them as in the day of [judgment for] Egypt; for behold, it is coming!”'
