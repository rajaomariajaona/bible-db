  - type: text
    content: ' have spoken.”'
  '13':
  - type: text
    content: ¶‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “I will also destroy the idols
  - type: text
    content: And I will put an end to the images in Memphis;
  - type: text
    content: There will no longer be a prince of the land of Egypt.
  - type: text
    content: And I will put fear in the land of Egypt.
  '14':
  - type: text
    content: “I will make Pathros desolate,
  - type: text
    content: Set fire to Zoan
  - type: text
    content: 'And execute judgments '
  - type: text
    content: and
  - type: text
    content: ' punishments on Thebes.'
  '15':
  - type: text
    content: “I will pour out My wrath on Pelusium,
  - type: text
    content: The stronghold of Egypt,
  - type: text
    content: And I will cut off (destroy) the population of Thebes.
  '16':
  - type: text
    content: “I will set fire to Egypt;
  - type: text
    content: Pelusium will writhe in [great] anguish,
  - type: text
    content: Thebes shall be torn open
  - type: text
    content: And Memphis shall be in daily distress.
  '17':
  - type: text
    content: “The young men of On (Aven) and of Pi-beseth
  - type: text
    content: Will fall by the sword,
  - type: text
    content: And the women [and children] will go into captivity.
  '18':
  - type: text
    content: “In Tehaphnehes the day will be dark
  - type: text
    content: 'When I break the yoke bars '
  - type: text
    content: and
  - type: text
    content: ' dominion of Egypt there.'
  - type: text
    content: Then the pride of her power will come to an end;
  - type: text
    content: A cloud [of disasters] will cover her,
  - type: text
    content: And her daughters will go into captivity.
  '19':
  - type: text
    content: '“In this way I will bring judgment '
  - type: text
    content: and
  - type: text
