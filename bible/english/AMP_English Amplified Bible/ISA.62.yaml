document_id: ISA.62,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion’s Glory and New Name
  - type: text
    content: For Zion’s sake I (Isaiah) will not be silent,
  - type: text
    content: And for Jerusalem’s sake I will not keep quiet,
  - type: text
    content: 'Until her righteousness '
  - type: text
    content: and
  - type: text
    content: ' vindication go forth as brightness,'
  - type: text
    content: And her salvation goes forth like a burning torch.
  '10':
  - type: text
    content: ¶Go through, go through the gates,
  - type: text
    content: Clear the way for the people;
  - type: text
    content: Build up, build up the highway,
  - type: text
    content: Remove the stones, lift up a banner over the peoples.
  '11':
  - type: text
    content: Listen carefully, the L
  - type: heading
    content: ord
  - type: text
    content: ' has proclaimed to the end of the earth,'
  - type: text
    content: Say to the Daughter of Zion, “Look now, your salvation is coming [in the L
  - type: heading
    content: ord
  - type: text
    content: '];'
  - type: text
    content: Indeed, His reward is with Him, and His restitution accompanies Him.” [Is 40:10]
  '12':
  - type: text
    content: And they will call them “The Holy People,
  - type: text
    content: The Redeemed of the L
  - type: heading
    content: ord
  - type: text
    content: ”;
  - type: text
    content: And you will be called “Sought Out, A City Not Deserted.”
  '2':
  - type: text
    content: 'The nations will see your righteousness '
  - type: text
    content: and
  - type: text
    content: ' vindication [by God],'
  - type: text
    content: And all kings [will see] your glory;
  - type: text
    content: And you will be called by a new name
  - type: text
    content: Which the mouth of the L
  - type: heading
    content: ord
  - type: text
    content: ' will designate. [Rev 2:17]'
  '3':
  - type: text
    content: 'You will also be [considered] a crown of glory '
  - type: text
    content: and
  - type: text
    content: ' splendor in the hand of the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And a royal '
  - type: note
    content: Lit headband.
  - type: text
    content: diadem [exceedingly beautiful] in the hand of your God.
  '4':
  - type: text
    content: It will no longer be said of you [Judah], “Azubah (Abandoned),”
  - type: text
    content: Nor will it any longer be said of your land, “Shemamah (Desolate)”;
  - type: text
    content: But you will be called, “Hephzibah (My Delight is in Her),”
  - type: text
    content: And your land, “
  - type: note
    content: I.e. Beulah, pronounced Be-oo-lah.
  - type: text
    content: Married”;
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' delights in you,'
  - type: text
    content: 'And '
  - type: text
    content: to Him
  - type: text
    content: ' your land will be married [owned and protected by the L'
  - type: heading
    content: ord
  - type: text
    content: '].'
  '5':
  - type: text
    content: For as a young man marries a virgin [O Jerusalem],
  - type: note
    content: The ancient rabbis interpreted marry in the sense of making a home with the bride, which would correspond to the resettling of Jerusalem by Israelites.
  - type: text
    content: So your sons will marry you;
  - type: text
    content: And as the bridegroom rejoices over the bride,
  - type: text
    content: So your God will rejoice over you.
  '6':
  - type: text
    content: '¶On your walls, O Jerusalem, I have appointed '
  - type: text
    content: and
  - type: text
    content: ' stationed watchmen (prophets),'
  - type: text
    content: Who will never keep silent day or night;
  - type: text
    content: You who profess the L
  - type: heading
    content: ord
  - type: text
    content: ', take no rest for yourselves,'
  '7':
  - type: text
    content: And give Him no rest [from your prayers] until He establishes Jerusalem
  - type: text
    content: And makes her a praise on the earth.
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has sworn [an oath] by His right hand and by His mighty arm,'
  - type: text
    content: “I will never again give your grain as food for your enemies,
  - type: text
    content: Nor will [the invading] foreigners drink your new wine for which you have labored.”
  '9':
  - type: text
    content: But they who have harvested it will eat it and praise the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And they who have gathered it will drink it [at the feasts celebrated] in the courtyards of My sanctuary.
