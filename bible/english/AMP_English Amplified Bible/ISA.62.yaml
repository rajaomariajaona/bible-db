document_id: ISA.62,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zion’s Glory and New Name
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: For Zion’s sake I (Isaiah) will not be silent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for Jerusalem’s sake I will not keep quiet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until her righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication go forth as brightness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her salvation goes forth like a burning torch.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Go through, go through the gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clear the way for the people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Build up, build up the highway,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove the stones, lift up a banner over the peoples.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Listen carefully, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has proclaimed to the end of the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to the Daughter of Zion, “Look now, your salvation is coming [in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, His reward is with Him, and His restitution accompanies Him.” [Is 40:10]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And they will call them “The Holy People,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Redeemed of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be called “Sought Out, A City Not Deserted.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The nations will see your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication [by God],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all kings [will see] your glory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be called by a new name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which the mouth of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will designate. [Rev 2:17]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You will also be [considered] a crown of glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor in the hand of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a royal '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: headband
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: diadem [exceedingly beautiful] in the hand of your God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: It will no longer be said of you [Judah], “Azubah (Abandoned),”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will it any longer be said of your land, “Shemamah (Desolate)”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you will be called, “Hephzibah (My Delight is in Her),”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your land, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. Beulah, pronounced '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Be-oo-lah
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Married”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' delights in you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Him
    - type: text
      text: ' your land will be married [owned and protected by the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '].'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For as a young man marries a virgin [O Jerusalem],
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The ancient rabbis interpreted '
        - type: usfm
          marker: it
          children:
          - type: text
            text: marry
        - type: text
          text: ' in the sense of making a home with the bride, which would correspond to the resettling of Jerusalem by Israelites.'
      marker-yv: yv-n
    - type: text
      text: So your sons will marry you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as the bridegroom rejoices over the bride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So your God will rejoice over you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '¶On your walls, O Jerusalem, I have appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stationed watchmen (prophets),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will never keep silent day or night;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who profess the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', take no rest for yourselves,'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And give Him no rest [from your prayers] until He establishes Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes her a praise on the earth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has sworn [an oath] by His right hand and by His mighty arm,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will never again give your grain as food for your enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will [the invading] foreigners drink your new wine for which you have labored.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But they who have harvested it will eat it and praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they who have gathered it will drink it [at the feasts celebrated] in the courtyards of My sanctuary.
