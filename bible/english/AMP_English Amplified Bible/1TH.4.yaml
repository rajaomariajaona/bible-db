verses:
  '1':
  - type: heading
    content: Sanctification and Love
  - type: text
    content: 'Finally, believers, we ask and admonish you in the Lord Jesus, that you follow the '
  - type: text
    content: instruction
  - type: text
    content: ' that you received from us about how you ought to walk and please God (just as you are actually doing) and that you excel even more and more [pursuing a life of purpose and living in a way that expresses gratitude to God for your salvation]. '
  '10':
  - type: text
    content: 'For indeed you already do practice it toward all the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers throughout Macedonia [by actively displaying your love and concern for them]. But we urge you, brothers and sisters, that you excel [in this matter] more and more, '
  '11':
  - type: text
    content: 'and to make it your ambition to live quietly '
  - type: text
    content: and
  - type: text
    content: ' peacefully, and to mind your own affairs and work with your hands, just as we directed you, '
  '12':
  - type: text
    content: 'so that you will behave properly toward outsiders [exhibiting good character, personal integrity, and moral courage worthy of the respect of the outside world], and be dependent on no one '
  - type: text
    content: and
  - type: text
    content: ' in need of nothing [be self-supporting].'
  - type: heading
    content: Those Who Died in Christ
  '13':
  - type: text
    content: 'Now we do not want you to be uninformed, believers, about those who are asleep [in death], so that you will not grieve [for them] as the others do who have no hope [beyond this present life]. '
  '14':
  - type: text
    content: 'For if we believe that Jesus died and rose again [as in fact He did], even so God [in this same way—by raising them from the dead] will bring with Him those [believers] who have fallen asleep in Jesus. '
  '15':
  - type: text
    content: 'For we say this to you by the Lord’s [own] word, that we who are still alive and remain until the coming of the Lord, will in no way precede [into His presence] those [believers] who have fallen asleep [in death]. '
  '16':
  - type: text
    content: 'For the Lord Himself will come down from heaven with a shout of command, with the voice of the '
  - type: note
    content: Only Michael is identified as an archangel (Dan 10:13; Jude 9).
  - type: text
    content: 'archangel and with the [blast of the] trumpet of God, and the dead in Christ will rise first. '
  '17':
  - type: text
    content: 'Then we who are alive and remain [on the earth] will '
  - type: text
    content: simultaneously
  - type: text
    content: ' be caught up (raptured) together with them [the resurrected ones] in the clouds to meet the Lord in the air, and so we will always be with the Lord! [John 14:3; 1 Cor 15:52; 2 Cor 5:8; Phil 1:23; Col 3:4] '
  '18':
  - type: text
    content: 'Therefore comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage one another with these words [concerning our reunion with believers who have died].'
  '2':
  - type: text
    content: 'For you know what commandments '
  - type: text
    content: and
  - type: text
    content: ' precepts we gave you by the '
  - type: text
    content: authority of
  - type: text
    content: ' the Lord Jesus. '
  '3':
  - type: text
    content: 'For this is the will of God, that you be sanctified [separated and set apart from sin]: that you abstain '
  - type: text
    content: and
  - type: text
    content: ' back away from sexual immorality; '
  '4':
  - type: text
    content: 'that each of you know how to control his own body in holiness and honor [being available for God’s purpose and separated from things profane], '
  '5':
  - type: text
    content: 'not [to be used] in lustful passion, like the Gentiles who do not know God '
  - type: text
    content: and
  - type: text
    content: ' are ignorant of His will; '
  '6':
  - type: text
    content: 'and that [in this matter of sexual misconduct] no man '
  - type: text
    content: shall
  - type: text
    content: ' transgress and defraud his brother because the Lord is the avenger in all these things, just as we have told you before and solemnly warned you. '
  '7':
  - type: text
    content: 'For God has not called us to impurity, but to holiness [to be dedicated, and set apart by behavior that pleases Him, whether in public or in private]. '
  '8':
  - type: text
    content: 'So whoever rejects '
  - type: text
    content: and
  - type: text
    content: ' disregards this is not [merely] rejecting man but the God who gives His Holy Spirit to you [to dwell in you and empower you to overcome temptation].'
  '9':
  - type: text
    content: 'Now concerning brotherly love, you have no need for '
  - type: text
    content: anyone
  - type: text
    content: ' to write you, for you have been [personally] taught by God to love one another [that is, to have an unselfish concern for others and to do things for their benefit]. [Lev 19:18; John 13:34] '
