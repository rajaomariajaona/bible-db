document_id: 1TH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sanctification and Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally, believers, we ask and admonish you in the Lord Jesus, that you follow the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instruction
  - type: text
    text: ' that you received from us about how you ought to walk and please God (just as you are actually doing) and that you excel even more and more [pursuing a life of purpose and living in a way that expresses gratitude to God for your salvation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For you know what commandments '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' precepts we gave you by the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: authority of
  - type: text
    text: ' the Lord Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For this is the will of God, that you be sanctified [separated and set apart from sin]: that you abstain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' back away from sexual immorality; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'that each of you know how to control his own body in holiness and honor [being available for God’s purpose and separated from things profane], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'not [to be used] in lustful passion, like the Gentiles who do not know God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are ignorant of His will; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and that [in this matter of sexual misconduct] no man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' transgress and defraud his brother because the Lord is the avenger in all these things, just as we have told you before and solemnly warned you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For God has not called us to impurity, but to holiness [to be dedicated, and set apart by behavior that pleases Him, whether in public or in private]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So whoever rejects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disregards this is not [merely] rejecting man but the God who gives His Holy Spirit to you [to dwell in you and empower you to overcome temptation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now concerning brotherly love, you have no need for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone
  - type: text
    text: ' to write you, for you have been [personally] taught by God to love one another [that is, to have an unselfish concern for others and to do things for their benefit]. [Lev 19:18; John 13:34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For indeed you already do practice it toward all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers throughout Macedonia [by actively displaying your love and concern for them]. But we urge you, brothers and sisters, that you excel [in this matter] more and more, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and to make it your ambition to live quietly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peacefully, and to mind your own affairs and work with your hands, just as we directed you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'so that you will behave properly toward outsiders [exhibiting good character, personal integrity, and moral courage worthy of the respect of the outside world], and be dependent on no one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in need of nothing [be self-supporting].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Those Who Died in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now we do not want you to be uninformed, believers, about those who are asleep [in death], so that you will not grieve [for them] as the others do who have no hope [beyond this present life]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if we believe that Jesus died and rose again [as in fact He did], even so God [in this same way—by raising them from the dead] will bring with Him those [believers] who have fallen asleep in Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we say this to you by the Lord’s [own] word, that we who are still alive and remain until the coming of the Lord, will in no way precede [into His presence] those [believers] who have fallen asleep [in death]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the Lord Himself will come down from heaven with a shout of command, with the voice of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Only Michael is identified as an archangel (Dan 10:13; Jude 9).
    marker-yv: yv-n
  - type: text
    text: 'archangel and with the [blast of the] trumpet of God, and the dead in Christ will rise first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then we who are alive and remain [on the earth] will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: simultaneously
  - type: text
    text: ' be caught up (raptured) together with them [the resurrected ones] in the clouds to meet the Lord in the air, and so we will always be with the Lord! [John 14:3; 1 Cor 15:52; 2 Cor 5:8; Phil 1:23; Col 3:4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourage one another with these words [concerning our reunion with believers who have died].'
