  '8':
  - type: text
    content: 'In the night I saw [a vision] and behold, a '
  - type: note
    content: This Man is identified as the Angel of the Lord in 1:11, with capitalization used to indicate Him.
  - type: text
    content: 'Man was riding on a red horse, and it stood among the myrtle trees that were in the ravine; and behind Him were horses: red, sorrel (reddish-brown), and white. '
  '9':
  - type: text
    content: 'Then I said, “O my lord, what are these?” And the '
  - type: note
    content: This is the interpreting angel, mentioned in vv 9, 13, 14; 2:3; 4:1, 4, 5; 5:5, 10; 6:4, 5, and is not to be confused with the Man in v 8 or the Angel of the Lord in v 11.
  - type: text
