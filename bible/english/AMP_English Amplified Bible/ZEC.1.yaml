    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Man is identified as the Angel of the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' in 1:11, with capitalization used to indicate Him.'
    marker-yv: yv-n
  - type: text
    text: 'Man was riding on a red horse, and it stood among the myrtle trees that were in the ravine; and behind Him were horses: red, sorrel (reddish-brown), and white. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I said, “O my lord, what are these?” And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the interpreting angel, mentioned in vv 9, 13, 14; 2:3; 4:1, 4, 5; 5:5, 10; 6:4, 5, and is not to be confused with the Man in v 8 or the Angel of the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' in v 11.'
    marker-yv: yv-n
  - type: text
    text: 'angel who was speaking with me said, “I will show you what these are.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the Man who stood among the myrtle trees answered and said, “These are the ones whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has sent to go throughout the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patrol it.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the men on the horses answered the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
    marker-yv: yv-n
  - type: text
    text: Angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who stood among the myrtle trees and said, “We have gone throughout the earth [patrolling it] and behold, all the earth sits at rest [in peace and free from war].”'
- type: usfm
  marker: p
  children:
  - type: usfm
