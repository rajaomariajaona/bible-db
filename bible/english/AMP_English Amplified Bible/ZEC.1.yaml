    children:
    - type: text
      text: '2'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was extremely angry with your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore say to the Jews, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts (armies), “Return to Me,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “and I shall return to you. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do not be like your fathers, to whom the former prophets proclaimed, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “Repent [that is, change your way of thinking] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return now from your evil way [of life] and from your evil deeds.” ’ But they did not listen or pay attention to Me,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [2 Kin 17:13; Is 45:22; Jer 18:11; Ezek 33:11] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Your fathers, where are they? And the prophets, do they live forever? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But did not My words (warnings) and My statutes, which I commanded My servants the prophets, overtake your fathers? Then they repented and said, ‘As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts planned to do to us [in discipline and punishment], in accordance with our ways and our deeds, so has He dealt with us.’ ” ’ ”'
