    - type: text
      text: '12'
  - type: text
    text: Then the Angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, how long will You withhold mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion from Jerusalem and the cities of Judah, against which You have had indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anger these seventy years [of the Babylonian captivity]?” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered the angel who was speaking with me with gracious and comforting words. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the angel who was speaking with me said to me, “Proclaim, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “I am jealous [with a burning, fiery passion] for Jerusalem and for Zion [demanding what is rightfully and uniquely mine] with a great jealousy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But I am very angry with the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the powerful Gentile nations whom God used to punish the Israelites for their disobedience.
    marker-yv: yv-n
  - type: text
    text: 'nations who are at ease '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel secure; for while I was only a little angry, they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The conquering nations sought to wipe out the children of Israel, an evil which exceeded God’s intended punishment.
    marker-yv: yv-n
  - type: text
    text: 'furthered the disaster [against the people of Israel].” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “I have returned to Jerusalem with mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion. My house shall be built in it,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “and a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Jerusalem shall be rebuilt and restored to even greater glory.
    marker-yv: yv-n
  - type: text
    text: 'measuring line shall be stretched out over Jerusalem.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Proclaim again, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “My cities shall again overflow with prosperity, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall again comfort Zion and again choose Jerusalem.” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then I looked up, and saw four horns (powers)! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So I asked the angel who was speaking with me, “What are these?” And he answered me, “These are the horns [the powerful Gentile nations] that have scattered Judah (the Southern Kingdom), Israel (the Northern Kingdom), and Jerusalem (capital city of Judah).” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' showed me four craftsmen. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I asked, “What are these [horns and craftsmen] coming to do?” And he said, “These are the horns (powers) that have scattered Judah so that no man raised up his head [because of the suffering inflicted by the Gentile nations]. But these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: craftsmen
  - type: text
    text: ' have come to terrify them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make them panic, and throw down the horns of the nations who have lifted up their horns against the land of Judah in order to scatter it.”'
