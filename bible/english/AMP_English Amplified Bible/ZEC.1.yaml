      children:
      - type: text
        text: 'Darius the Great ruled Persia (capital city, Persepolis) from 522-486 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . He was an avid builder who used paid workers for his projects instead of slaves, a concept which at that time was revolutionary. He was a gifted visionary, and an energetic king whose social and economic goals endured and greatly benefited both his subjects and future generations. He developed efficient highways, standardized coinage, weights, measures, and he promoted religious tolerance and human rights.
    marker-yv: yv-n
  - type: text
    text: Darius [the king of Persia], the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to Zechariah (the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' remembers) the son of Berechiah, the son of Iddo, the prophet, saying, [Ezra 5:1] '
  - type: usfm
