    children:
    - type: text
      text: ord
  - type: text
    text: ' came to Zechariah the prophet, the son of Berechiah, the son of Iddo, as follows: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
