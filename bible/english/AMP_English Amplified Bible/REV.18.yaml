document_id: REV.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon Is Fallen
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After these things I saw another angel coming down from heaven, possessing great authority, and the earth was illuminated with his splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' radiance. [Ex 34:29-35; 1 Tim 6:16] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: standing a long way off, in fear of her torment, saying, ‘Woe, woe, the great city, the strong city, Babylon! In a single hour your judgment has come.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“And merchants of the earth will weep and grieve over her, because no one buys their cargo (goods, merchandise) anymore— [Ezek 27:36] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'cargoes of gold and silver and precious stones and pearls and fine linen and purple and silk and scarlet; all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds of
    - type: text
      text: ' citron (scented) wood and every article of ivory and every article of very costly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lavish wood and bronze and iron and marble; [Ezek 27:12, 13, 22] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and cinnamon and spices and incense and perfume and frankincense and wine and olive oil and fine flour and wheat; of cattle and sheep, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cargoes
    - type: text
      text: ' of horses and chariots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carriages; and of slaves and human lives. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The ripe fruits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delicacies of your soul’s desire have gone from you, and all things that were luxurious and extravagant are lost to you, never again to be found. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The merchants who handled these articles, who grew wealthy from [their business with] her, will stand a long way off in fear of her torment, weeping and mourning aloud, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'saying, ‘Woe, woe, for the great city that was robed in fine linen, in purple and scarlet, gilded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' adorned with gold, with precious stones, and with pearls; [Ezek 27:31, 36] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'because in one hour all the vast wealth has been laid waste.’ And every ship captain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' navigator, and every '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: one who sails to a place
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'passenger and sailor, and all who make their living by the sea, stood a long way off, [Is 23:14; Ezek 27:26-30] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and exclaimed as they watched the smoke of her burning, saying, ‘What could be compared to the great city?’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And they threw dust on their heads and were crying out, weeping and mourning, saying, ‘Woe, woe, for the great city, where all who had ships at sea grew rich from her great wealth, because in one hour she has been laid waste!’ [Ezek 27:30-34] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And he shouted with a mighty voice, saying, “Fallen, fallen [certainly to be destroyed] is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Whatever the exact city, Babylon here indicates human civilization arrayed in opposition to God and ready to be judged.
      marker-yv: yv-n
    - type: text
      text: 'Babylon the great! She has become a dwelling place for demons, a dungeon haunted by every unclean spirit, and a prison for every unclean and loathsome bird. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Rejoice over her, O heaven, and you saints (God’s people) and apostles and prophets [who were martyred], because God has executed vengeance for you [through righteous judgment] upon her.” [Is 44:23; Jer 51:48, 49]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Divine Sentence upon Babylon
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then a single powerful angel picked up a boulder like a great millstone and flung it into the sea, saying, “With such violence will Babylon the great city be hurled down [by the sudden, spectacular judgment of God], and will never again be found. [Jer 51:63, 64; Ezek 26:21] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the sound of harpists and musicians and flutists and trumpeters will never again be heard in you, and no skilled artisan of any craft will ever again be found in you, and the sound of the millstone [grinding grain] will never again be heard in you [for commerce will no longer flourish, and normal life will cease]. [Is 24:8; Ezek 26:13] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And never again will the light of a lamp shine in you, and never again will the voice of the bridegroom and bride be heard in you; for your merchants were the great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prominent men of the earth, because all the nations were deceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misled by your sorcery [your magic spells and poisonous charm]. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And in Babylon was found the blood of prophets and of saints (God’s people) and of all those who have been slaughtered on the earth.” [Gen 4:10; Jer 51:49]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For all the nations have drunk from the wine of the passion of her [sexual] immorality, and the kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' political leaders of the earth have committed immorality with her, and the merchants of the earth have become rich by the wealth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' economic power of her sensuous luxury.” [Jer 25:15, 27]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I heard another voice from heaven, saying, “Come out of her, my people, so that you will not be a partner in her sins and receive her plagues; [Is 48:20; Jer 50:8] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for her sins (crimes, transgressions) have piled up as high as heaven, and God has remembered her wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crimes [for judgment]. [Jer 51:9] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Repay to her even as she has repaid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others,
    - type: text
      text: ' and pay back [to her] double [her torment] in accordance with what she has done; in the cup [of sin and suffering] which she mixed, mix a double portion [of perfect justice] for her. [Ps 137:8] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'To the degree that she glorified herself and reveled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gloated in her sensuality [living deliciously and luxuriously], to that same degree impose on her torment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish, and mourning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grief; for in her heart she boasts, ‘I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: sit as a queen
    - type: text
      text: ' [on a throne] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: am not a widow
    - type: text
      text: ', and will never, ever see mourning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' experience grief.’ [Is 47:8, 9] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For this reason in a single day her plagues (afflictions, calamities) will come, pestilence and mourning and famine, and she will be burned up with fire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely consumed; for strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful is the Lord God who judges her.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laments for Babylon
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the following verses, the kings (vv 9, 10), merchants (vv 11-17), and sailors (vv 17b-20) mourn the fall of Babylon, just as the same three groups mourn the fall of wicked Tyre in Ezek 26; 27.
      marker-yv: yv-n
    - type: text
      text: 'And the kings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' political leaders of the earth, who committed immorality and lived luxuriously with her, will weep and beat their chests [in mourning] over her when they see the smoke of her burning, [Ezek 26:16, 17] '
