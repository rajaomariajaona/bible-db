verses:
  '1':
  - type: heading
    content: Solomon’s Rule Consolidated
  - type: text
    content: 'Now Solomon became a son-in-law to Pharaoh king of Egypt [and formed an alliance] by '
  - type: note
    content: Pharaoh gave the Canaanite city of Gezer to his daughter as a dowry. Located on a major trade route it was strategically important to the economies of both Egypt and Israel (see 9:16).
  - type: text
    content: 'taking Pharaoh’s daughter [in marriage]. He brought her to the '
  - type: note
    content: This was on the south side of the eastern ridge of Jerusalem.
  - type: text
    content: City of David [where she remained temporarily] until he had finished building his own house (palace) and the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the wall around Jerusalem. '
  '10':
  - type: text
    content: 'Now it pleased the Lord that Solomon had asked this thing. '
  '11':
  - type: text
    content: 'God said to him, “Because you have asked this and have not asked for yourself a long life nor for wealth, nor for the lives of your enemies, but have asked for yourself understanding to recognize justice, '
  '12':
  - type: text
    content: 'behold, I have done as you asked. I have given you a wise and discerning heart (mind), so that no one before you was your equal, nor shall anyone equal to you arise after you. '
  '13':
  - type: text
    content: 'I have also given you what you have not asked, both wealth and honor, so that there will not be anyone equal to you among the kings, for all your days. '
  '14':
  - type: text
    content: 'If you walk in My ways, keeping My statutes and My commandments, as your father David '
  - type: note
    content: Lit walked.
  - type: text
    content: did, then I will lengthen your days.”
  '15':
  - type: text
    content: Then Solomon awoke, and he realized that it was a dream. He came [back] to Jerusalem and stood before the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ; he offered burnt offerings and peace offerings, and he prepared a feast for all his servants. [2 Sam 6:17]
  - type: heading
    content: Solomon Wisely Judges
  '16':
  - type: text
    content: 'Then two women who were prostitutes came to the king and stood before him. '
  '17':
  - type: text
    content: 'And the one woman said, “O my lord, this woman and I live in the same house; and I gave birth to a child while she was in the house. '
  '18':
  - type: text
    content: 'And on the third day after I gave birth, this woman also gave birth. And we were [alone] together; no one else was with us in the house, just we two. '
  '19':
  - type: text
    content: 'Now this woman’s son died during the night, because she lay on him [and smothered him]. '
  '2':
  - type: text
    content: 'But [in the meantime] the people were still sacrificing [to God] on the high places (hilltops) [as the pagans did to their idols], for there was no [permanent] house yet built for the '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: Name of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '20':
  - type: text
    content: 'So she got up in the middle of the night and took my son from [his place] beside me while your maidservant was asleep, and laid him on her bosom, and laid her dead son on my bosom. '
  '21':
  - type: text
    content: 'When I got up in the morning to nurse my son, behold, he was dead. But when I examined him carefully in the morning, behold, it was not my son, '
  - type: text
    content: the one
  - type: text
    content: ' whom I had borne.” '
  '22':
  - type: text
    content: Then the other woman said, “No! For my son is the one who is living, and your son is the dead one.” But the first woman said, “No! For your son is the dead one, and my son is the living one.” [This is how] they were speaking before the king.
  '23':
  - type: text
    content: 'Then the king said, “This woman says, ‘This is my son, the one who is alive, and your son is the dead one’; and the other woman says, ‘No! For your son is the dead one, and my son is the one who is alive.’ ” '
  '24':
  - type: text
    content: 'Then the king said, “Bring me a sword.” So they brought a sword before the king. '
  '25':
  - type: text
    content: 'Then the king said, “Cut the living child in two, and give half to the one [woman] and half to the other.” '
  '26':
  - type: text
    content: 'Then the woman whose child was the living one spoke to the king, for she was deeply moved over her son, “O my lord, give her the living child, and by no means kill him.” But the other said, “He shall be neither mine nor yours; cut '
  - type: text
    content: him!
  - type: text
    content: '” '
  '27':
  - type: text
    content: 'Then the king said, “Give the first woman [who is pleading for his life] the living child, and by no means kill him. She is his mother.” '
  '28':
  - type: text
    content: When all [the people of] Israel heard about the judgment which the king had made, they [were in awe and reverently] feared the king, for they saw that the wisdom of God was within him to administer justice.
  '3':
  - type: text
    content: Now Solomon loved the L
  - type: heading
    content: ord
  - type: text
    content: ', walking [at first] in the statutes of David his father, except [for the fact that] he sacrificed and burned incense in the high places [ignoring the law that required all sacrifices to be offered at the tabernacle]. [Lev 17:3, 4] '
  '4':
  - type: text
    content: 'The king went to Gibeon [near Jerusalem, where the tabernacle and the bronze altar stood] to sacrifice there, for that was the great high place. Solomon offered a thousand burnt offerings on that altar. '
  '5':
  - type: text
    content: In Gibeon the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to Solomon in a dream at night; and God said, “Ask [Me] what I shall give you.”'
  - type: heading
    content: Solomon’s Prayer
  '6':
  - type: text
    content: 'Then Solomon said, “You have shown Your servant David my father great lovingkindness, because he walked before You in faithfulness and righteousness and with uprightness of heart toward You; and You have kept for him this great lovingkindness, in that You have given him a son to sit on his throne, as it is today. '
  '7':
  - type: text
    content: So now, O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, You have made Your servant king in place of David my father; and as for me, I am but a little boy ['
  - type: note
    content: Solomon was already a father (see 11:42; 14:21).
  - type: text
    content: 'in wisdom and experience]; I do not know how to go out or come in [that is, how to conduct business as a king]. '
  '8':
  - type: text
    content: 'Your servant is among Your people whom You have chosen, a great people who are too many to be numbered or counted. '
  '9':
  - type: text
    content: 'So give Your servant an understanding mind '
  - type: text
    content: and
  - type: text
    content: ' a hearing heart [with which] to judge Your people, so that I may discern between good and evil. For who is able to judge '
  - type: text
    content: and
  - type: text
    content: ' rule this great people of Yours?” [James 1:5]'
  - type: heading
    content: God’s Answer
