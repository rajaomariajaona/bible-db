verses:
  '1':
  - type: heading
    content: False Prophets Ashamed
  - type: text
    content: “In that day a fountain shall be opened for the house of David and for the people of Jerusalem for [cleansing from] sin and impurity.
  '2':
  - type: text
    content: “In that day,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “I will cut off the names of the idols from the land, and they will no longer be remembered. I will also remove the [false] prophets and the unclean spirit from the land. '
  '3':
  - type: text
    content: And if anyone still [appears as a prophet and falsely] prophesies, then his father and his mother who gave birth to him will say to him, ‘You shall not live, for you have spoken lies in the name of the L
  - type: heading
    content: ord
  - type: text
    content: '’; and his father and his mother who gave birth to him shall pierce him through when he prophesies. '
  '4':
  - type: text
    content: 'And in that day the [false] prophets will each be ashamed of his vision when he prophesies, and they will not wear a hairy robe [of true prophets] in order to deceive, '
  '5':
  - type: text
    content: 'but he will [deny his identity and] say, ‘I am no prophet. I work the ground, because a man sold me as a slave in my youth.’ '
  '6':
  - type: text
    content: 'And one will say to him, ‘What are these '
  - type: note
    content: False prophets would sometimes cut themselves during emotional idolatrous rites, then deny that they had inflicted the wounds.
  - type: text
    content: wounds between your arms?’ Then he will answer, ‘Those wounds I received in the house of my friends.’
