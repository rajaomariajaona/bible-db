segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: False Prophets Ashamed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “In that day a fountain shall be opened for the house of David and for the people of Jerusalem for [cleansing from] sin and impurity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “In that day,” declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “I will cut off the names of the idols from the land, and they will no longer be remembered. I will also remove the [false] prophets and the unclean spirit from the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And if anyone still [appears as a prophet and falsely] prophesies, then his father and his mother who gave birth to him will say to him, ‘You shall not live, for you have spoken lies in the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '’; and his father and his mother who gave birth to him shall pierce him through when he prophesies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And in that day the [false] prophets will each be ashamed of his vision when he prophesies, and they will not wear a hairy robe [of true prophets] in order to deceive, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but he will [deny his identity and] say, ‘I am no prophet. I work the ground, because a man sold me as a slave in my youth.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And one will say to him, ‘What are these '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: False prophets would sometimes cut themselves during emotional idolatrous rites, then deny that they had inflicted the wounds.
    marker-yv: yv-n
  - type: text
    text: wounds between your arms?’ Then he will answer, ‘Those wounds I received in the house of my friends.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Awake, O sword, against My Shepherd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against the Man, My Associate,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Strike the Shepherd so that the sheep [of the flock] may be scattered;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will turn My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stretch it out against the little ones [of the flock]. [Matt 26:31, 32]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “It will come about in all the land,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Two parts in it will be cut off and perish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the third will be left alive. [Hos 2:23; Rom 11:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “And I will bring the third part through the fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Refine them as silver is refined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And test them as gold is tested.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will call on My name,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will say, ‘They are My people,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will say, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is my God.’ ”'
