document_id: HOS.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Controversy with Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you children of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has a [legal] case with the inhabitants of the land,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because there is no faithfulness [no steadfast love, no dependability] or loyalty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' kindness'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or knowledge of God [from personal experience with Him] in the land.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will eat, but not have enough;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will play the prostitute, but not increase [their descendants],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have stopped giving heed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Prostitution, wine, and new wine take away the mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the [spiritual] understanding.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people consult their [lifeless] wooden idol, and their [diviner’s] wand gives them oracles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a spirit of prostitution has led them astray [morally and spiritually],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they have played the prostitute, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: withdrawing themselves
    - type: text
      text: ' from their God.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrifice on the tops of the mountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And burn incense on the hills,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Under oaks, poplars, and terebinths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the shade is pleasant there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore your daughters play the prostitute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your brides commit adultery.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not punish your daughters when they play the prostitute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or your brides when they commit adultery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the men themselves slip away with prostitutes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they offer sacrifices with temple prostitutes [who give their bodies in honor of the idol].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the people without understanding [stumble and fall and] come to ruin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Though you, Israel, play the prostitute [by worshiping idols],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let Judah become guilty [of the same thing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not go to Gilgal [where idols are worshiped],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or go up to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A contemptuous reference to Bethel (House of God, the place of Jacob’s dream, Gen 28:10-19), noted for idolatry.
      marker-yv: yv-n
    - type: text
      text: Beth-aven (House of Wickedness),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor swear [oaths in idolatrous worship, saying],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives!”'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Israel is stubborn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a stubborn heifer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' now pasture them'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lamb in a large field?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is joined to idols,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So let him alone [to suffer the consequences].
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When their liquor is gone [and their drinking parties are over],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They habitually go to play the prostitute;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim’s rulers continue to dearly love shame [more than her glory which is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', Israel’s God].'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wind [of God’s relentless wrath] has wrapped up Israel in its wings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [in captivity] they will be ashamed because of their sacrifices [to calves, to sun, to moon, to stars, and to pagan gods].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is [false] swearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of oaths
    - type: text
      text: ', deception (broken faith), murder, stealing, and adultery;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They employ violence, so that one [act of] bloodshed follows closely on another.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore the land [continually] mourns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And everyone who lives in it languishes [in tragic suffering]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Together with the animals of the open country and the birds of the heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the fish of the sea disappear.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Yet let no one find fault, nor let any rebuke [others];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your people are like those who contend with the priest.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you will stumble in the daytime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the [false] prophet will also stumble with you in the night;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will destroy your mother (Israel). [Ex 19:6]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people are destroyed for lack of knowledge [of My law, where I reveal My will].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you [the priestly nation] have rejected knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also reject you from being My priest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since you have forgotten the law of your God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also forget your children.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The more they multiplied [in numbers and increased in power], the more they sinned against Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will change their glory into shame.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They (the priests) '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As the people increased their rebellious behavior, they offered more sacrifices to atone for their sins, implying a greater portion of food for the priests. See Lev 7:7, 8.
      marker-yv: yv-n
    - type: text
      text: feed on the sin offering of My people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And set their heart on their wickedness. [Lev 7:7, 8]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it shall be: like people, like priest [both are wicked and both will be judged];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will punish them for their ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And repay them for their deeds.
