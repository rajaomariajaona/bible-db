document_id: HOS.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Controversy with Israel
  - type: text
    content: Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', you children of Israel,'
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has a [legal] case with the inhabitants of the land,'
  - type: text
    content: 'Because there is no faithfulness [no steadfast love, no dependability] or loyalty '
  - type: text
    content: or
  - type: text
    content: ' kindness'
  - type: text
    content: Or knowledge of God [from personal experience with Him] in the land.
  '10':
  - type: text
    content: They will eat, but not have enough;
  - type: text
    content: They will play the prostitute, but not increase [their descendants],
  - type: text
    content: Because they have stopped giving heed to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '11':
  - type: text
    content: '¶Prostitution, wine, and new wine take away the mind '
  - type: text
    content: and
  - type: text
    content: ' the [spiritual] understanding.'
  '12':
  - type: text
    content: My people consult their [lifeless] wooden idol, and their [diviner’s] wand gives them oracles.
  - type: text
    content: For a spirit of prostitution has led them astray [morally and spiritually],
  - type: text
    content: 'And they have played the prostitute, '
  - type: text
    content: withdrawing themselves
  - type: text
    content: ' from their God.'
  '13':
  - type: text
    content: They sacrifice on the tops of the mountains
  - type: text
    content: And burn incense on the hills,
  - type: text
    content: Under oaks, poplars, and terebinths,
  - type: text
    content: Because the shade is pleasant there.
  - type: text
    content: Therefore your daughters play the prostitute
  - type: text
    content: And your brides commit adultery.
  '14':
  - type: text
    content: I will not punish your daughters when they play the prostitute
  - type: text
    content: Or your brides when they commit adultery,
  - type: text
    content: For the men themselves slip away with prostitutes,
  - type: text
    content: And they offer sacrifices with temple prostitutes [who give their bodies in honor of the idol].
  - type: text
    content: So the people without understanding [stumble and fall and] come to ruin.
  '15':
  - type: text
    content: ¶Though you, Israel, play the prostitute [by worshiping idols],
  - type: text
    content: Do not let Judah become guilty [of the same thing];
  - type: text
    content: And do not go to Gilgal [where idols are worshiped],
  - type: text
    content: 'Or go up to '
  - type: note
    content: A contemptuous reference to Bethel (House of God, the place of Jacob’s dream, Gen 28:10-19), noted for idolatry.
  - type: text
    content: Beth-aven (House of Wickedness),
  - type: text
    content: Nor swear [oaths in idolatrous worship, saying],
  - type: text
    content: “As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives!”'
  '16':
  - type: text
    content: For Israel is stubborn,
  - type: text
    content: Like a stubborn heifer.
  - type: text
    content: Can the L
  - type: heading
    content: ord
  - type: text
    content: ' now pasture them'
  - type: text
    content: Like a lamb in a large field?
  '17':
  - type: text
    content: Ephraim is joined to idols,
  - type: text
    content: So let him alone [to suffer the consequences].
  '18':
  - type: text
    content: When their liquor is gone [and their drinking parties are over],
  - type: text
    content: They habitually go to play the prostitute;
  - type: text
    content: Ephraim’s rulers continue to dearly love shame [more than her glory which is the L
  - type: heading
    content: ord
  - type: text
    content: ', Israel’s God].'
  '19':
  - type: text
    content: The wind [of God’s relentless wrath] has wrapped up Israel in its wings,
  - type: text
    content: And [in captivity] they will be ashamed because of their sacrifices [to calves, to sun, to moon, to stars, and to pagan gods].
  '2':
  - type: text
    content: 'There is [false] swearing '
  - type: text
    content: of oaths
  - type: text
    content: ', deception (broken faith), murder, stealing, and adultery;'
  - type: text
    content: They employ violence, so that one [act of] bloodshed follows closely on another.
  '3':
  - type: text
    content: Therefore the land [continually] mourns,
  - type: text
    content: And everyone who lives in it languishes [in tragic suffering]
  - type: text
    content: Together with the animals of the open country and the birds of the heavens;
  - type: text
    content: Even the fish of the sea disappear.
  '4':
  - type: text
    content: ¶Yet let no one find fault, nor let any rebuke [others];
  - type: text
    content: For your people are like those who contend with the priest.
  '5':
  - type: text
    content: So you will stumble in the daytime,
  - type: text
    content: And the [false] prophet will also stumble with you in the night;
  - type: text
    content: And I will destroy your mother (Israel). [Ex 19:6]
  '6':
  - type: text
    content: My people are destroyed for lack of knowledge [of My law, where I reveal My will].
  - type: text
    content: Because you [the priestly nation] have rejected knowledge,
  - type: text
    content: I will also reject you from being My priest.
  - type: text
    content: Since you have forgotten the law of your God,
  - type: text
    content: I will also forget your children.
  '7':
  - type: text
    content: ¶The more they multiplied [in numbers and increased in power], the more they sinned against Me;
  - type: text
    content: I will change their glory into shame.
  '8':
  - type: text
    content: 'They (the priests) '
  - type: note
    content: As the people increased their rebellious behavior, they offered more sacrifices to atone for their sins, implying a greater portion of food for the priests. See Lev 7:7, 8.
  - type: text
    content: feed on the sin offering of My people
  - type: text
    content: And set their heart on their wickedness. [Lev 7:7, 8]
  '9':
  - type: text
    content: 'And it shall be: like people, like priest [both are wicked and both will be judged];'
  - type: text
    content: So I will punish them for their ways
  - type: text
    content: And repay them for their deeds.
