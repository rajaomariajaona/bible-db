  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, as the eyes of servants look to the hand of their master,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as the eyes of a maid to the hand of her mistress,
  - type: usfm
    marker: q1
