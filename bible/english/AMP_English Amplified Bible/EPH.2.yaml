document_id: EPH.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Made Alive in Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And you [He made alive when you] were [spiritually] dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' separated from Him because of your transgressions and sins, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For we are His workmanship [His own master work, a work of art], created in Christ Jesus [reborn from above—spiritually transformed, renewed, ready to be used] for good works, which God prepared [for us] beforehand [taking paths which He set], so that we would walk in them [living the good life which He prearranged and made ready for us]. [Rom 1:20]
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore, remember that at one time you Gentiles by birth, who are called “Uncircumcision” by those who called themselves “Circumcision,” [itself a mere mark] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which is
    - type: text
      text: ' made in the flesh by human hands— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: it
      children:
      - type: text
        text: remember
    - type: text
      text: ' that at that time you were separated from Christ [excluded from any relationship with Him], alienated from the commonwealth of Israel, and strangers to the covenants of promise [with no share in the sacred Messianic promise and without knowledge of God’s agreements], having no hope [in His promise] and [living] in the world without God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But now [at this very moment] in Christ Jesus you who once were [so very] far away [from God] have been brought near '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'by the blood of Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For He Himself is our peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' our bond of unity. He who made both '
    - type: usfm
      marker: it
      children:
      - type: text
        text: groups
    - type: text
      text: —[Jews and Gentiles]—
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' one body and broke down the barrier, the dividing wall [of spiritual antagonism between us], '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'by abolishing in His [own crucified] flesh the hostility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: caused by
    - type: text
      text: ' the Law with its commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: contained
    - type: text
      text: ' in ordinances [which He satisfied]; so that in Himself He might make the two into one new man, thereby establishing peace. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And [that He] might reconcile them both [Jew and Gentile, united] in one body to God through the cross, thereby putting to death the hostility. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e came and preached the good news of peace to you
    - type: text
      text: ' [Gentiles] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who were far away
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and peace to those
    - type: text
      text: ' [Jews] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who were near
    - type: text
      text: '. [Is 57:19] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For it is through Him that we both have a [direct] way of approach in one Spirit to the Father. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So then you are no longer strangers and aliens [outsiders without rights of citizenship], but you are fellow citizens with the saints (God’s people), and are [members] of God’s household, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'in which you once walked. You were following the ways of this world [influenced by this present age], in accordance with the prince of the power of the air (Satan), the spirit who is now at work in the disobedient [the unbelieving, who fight against the purposes of God]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'having been built on the foundation of the apostles and prophets, with Christ Jesus Himself as the [chief] Cornerstone, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'in whom the whole structure is joined together, and it continues [to increase] growing into a holy temple in the Lord [a sanctuary dedicated, set apart, and sacred to the presence of the Lord]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: In Him [and in fellowship with one another] you also are being built together into a dwelling place of God in the Spirit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Among these [unbelievers] we all once lived in the passions of our flesh [our behavior governed by the sinful self], indulging the desires of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'human nature [without the Holy Spirit] and [the impulses] of the [sinful] mind. We were, by nature, children [under the sentence] of [God’s] wrath, just like the rest [of mankind]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But God, being [so very] rich in mercy, because of His great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderful love with which He loved us, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'even when we were [spiritually] dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' separated from Him because of our sins, He made us [spiritually] alive together with Christ (for by His grace—His undeserved favor and mercy—you have been saved from God’s judgment). [Rom 6:1-10] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And He raised us up together with Him [when we believed], and seated us with Him in the heavenly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: places,
    - type: text
      text: ' [because we are] in Christ Jesus, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '[and He did this] so that in the ages to come He might [clearly] show the immeasurable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unsurpassed riches of His grace in [His] kindness toward us in Christ Jesus [by providing for our redemption]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For it is by grace [God’s remarkable compassion and favor drawing you to Christ] that you have been saved [actually delivered from judgment and given eternal life] through faith. And this [salvation] is not of yourselves [not through your own effort], but it is the [undeserved, gracious] gift of God; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'not as a result of [your] works [nor your attempts to keep the Law], so that no one will [be able to] boast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' take credit in any way [for his salvation]. '
