verses:
  '1':
  - type: heading
    content: Made Alive in Christ
  - type: text
    content: 'And you [He made alive when you] were [spiritually] dead '
  - type: text
    content: and
  - type: text
    content: ' separated from Him because of your transgressions and sins, '
  '10':
  - type: text
    content: For we are His workmanship [His own master work, a work of art], created in Christ Jesus [reborn from above—spiritually transformed, renewed, ready to be used] for good works, which God prepared [for us] beforehand [taking paths which He set], so that we would walk in them [living the good life which He prearranged and made ready for us]. [Rom 1:20]
  '11':
  - type: text
    content: 'Therefore, remember that at one time you Gentiles by birth, who are called “Uncircumcision” by those who called themselves “Circumcision,” [itself a mere mark] '
  - type: text
    content: which is
  - type: text
    content: ' made in the flesh by human hands— '
  '12':
  - type: text
    content: remember
  - type: text
    content: ' that at that time you were separated from Christ [excluded from any relationship with Him], alienated from the commonwealth of Israel, and strangers to the covenants of promise [with no share in the sacred Messianic promise and without knowledge of God’s agreements], having no hope [in His promise] and [living] in the world without God. '
  '13':
  - type: text
    content: 'But now [at this very moment] in Christ Jesus you who once were [so very] far away [from God] have been brought near '
  - type: note
    content: Or in.
  - type: text
    content: 'by the blood of Christ. '
  '14':
  - type: text
    content: 'For He Himself is our peace '
  - type: text
    content: and
  - type: text
    content: ' our bond of unity. He who made both '
  - type: text
    content: groups
  - type: text
    content: —[Jews and Gentiles]—
  - type: text
    content: into
  - type: text
    content: ' one body and broke down the barrier, the dividing wall [of spiritual antagonism between us], '
  '15':
  - type: text
    content: 'by abolishing in His [own crucified] flesh the hostility '
  - type: text
    content: caused by
  - type: text
    content: ' the Law with its commandments '
  - type: text
    content: contained
  - type: text
    content: ' in ordinances [which He satisfied]; so that in Himself He might make the two into one new man, thereby establishing peace. '
  '16':
  - type: text
    content: 'And [that He] might reconcile them both [Jew and Gentile, united] in one body to God through the cross, thereby putting to death the hostility. '
  '17':
  - type: text
    content: A
  - type: heading
    content: nd
  - type: text
    content: ' H'
  - type: heading
    content: e came and preached the good news of peace to you
  - type: text
    content: ' [Gentiles] '
  - type: heading
    content: who were far away
  - type: text
    content: ', '
  - type: heading
    content: and peace to those
  - type: text
    content: ' [Jews] '
  - type: heading
    content: who were near
  - type: text
    content: '. [Is 57:19] '
  '18':
  - type: text
    content: 'For it is through Him that we both have a [direct] way of approach in one Spirit to the Father. '
  '19':
  - type: text
    content: 'So then you are no longer strangers and aliens [outsiders without rights of citizenship], but you are fellow citizens with the saints (God’s people), and are [members] of God’s household, '
  '2':
  - type: text
    content: 'in which you once walked. You were following the ways of this world [influenced by this present age], in accordance with the prince of the power of the air (Satan), the spirit who is now at work in the disobedient [the unbelieving, who fight against the purposes of God]. '
  '20':
  - type: text
    content: 'having been built on the foundation of the apostles and prophets, with Christ Jesus Himself as the [chief] Cornerstone, '
  '21':
  - type: text
    content: 'in whom the whole structure is joined together, and it continues [to increase] growing into a holy temple in the Lord [a sanctuary dedicated, set apart, and sacred to the presence of the Lord]. '
  '22':
  - type: text
    content: In Him [and in fellowship with one another] you also are being built together into a dwelling place of God in the Spirit.
  '3':
  - type: text
    content: 'Among these [unbelievers] we all once lived in the passions of our flesh [our behavior governed by the sinful self], indulging the desires of '
  - type: note
    content: Lit flesh.
  - type: text
    content: 'human nature [without the Holy Spirit] and [the impulses] of the [sinful] mind. We were, by nature, children [under the sentence] of [God’s] wrath, just like the rest [of mankind]. '
  '4':
  - type: text
    content: 'But God, being [so very] rich in mercy, because of His great '
  - type: text
    content: and
  - type: text
    content: ' wonderful love with which He loved us, '
  '5':
  - type: text
    content: 'even when we were [spiritually] dead '
  - type: text
    content: and
  - type: text
    content: ' separated from Him because of our sins, He made us [spiritually] alive together with Christ (for by His grace—His undeserved favor and mercy—you have been saved from God’s judgment). [Rom 6:1-10] '
  '6':
  - type: text
    content: 'And He raised us up together with Him [when we believed], and seated us with Him in the heavenly '
  - type: text
    content: places,
  - type: text
    content: ' [because we are] in Christ Jesus, '
  '7':
  - type: text
    content: '[and He did this] so that in the ages to come He might [clearly] show the immeasurable '
  - type: text
    content: and
  - type: text
    content: ' unsurpassed riches of His grace in [His] kindness toward us in Christ Jesus [by providing for our redemption]. '
  '8':
  - type: text
    content: 'For it is by grace [God’s remarkable compassion and favor drawing you to Christ] that you have been saved [actually delivered from judgment and given eternal life] through faith. And this [salvation] is not of yourselves [not through your own effort], but it is the [undeserved, gracious] gift of God; '
  '9':
  - type: text
    content: 'not as a result of [your] works [nor your attempts to keep the Law], so that no one will [be able to] boast '
  - type: text
    content: or
  - type: text
    content: ' take credit in any way [for his salvation]. '
