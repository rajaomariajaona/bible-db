document_id: ACT.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul in Macedonia and Greece
  - type: text
    content: 'After the uproar had ended, Paul sent for the disciples, and when he had encouraged them he told them goodbye, and set off to go to '
  - type: note
    content: Northern Greece.
  - type: text
    content: 'Macedonia. '
  '10':
  - type: text
    content: 'But Paul went down and threw himself on him and embraced him, and said [to those standing around him], “Do not be troubled, because '
  - type: note
    content: Lit his soul is in him.
  - type: text
    content: 'he is alive.” '
  '11':
  - type: text
    content: 'When Paul had gone back upstairs and had broken the bread and eaten, he talked [informally and confidentially] with them for a long time—until daybreak [in fact]—and then he left. '
  '12':
  - type: text
    content: 'They took the boy [Eutychus] home alive, and were greatly comforted '
  - type: text
    content: and
  - type: text
    content: ' encouraged.'
  - type: heading
    content: Troas to Miletus
  '13':
  - type: text
    content: 'But we went on ahead to the ship and set sail for Assos, intending to take Paul on board there; for that was what he had arranged, intending himself to go [a shorter route] by land. '
  '14':
  - type: text
    content: 'So when he met us at Assos, we took him on board and sailed on to Mitylene. '
  '15':
  - type: text
    content: 'Sailing from there, we arrived the next day [at a point] opposite Chios; the following day we crossed over to Samos, and the next day we arrived at Miletus [about 30 miles south of Ephesus]. '
  '16':
  - type: text
    content: 'Paul had decided to sail on past Ephesus so that he would not end up spending time [unnecessarily] in [the province of] Asia (modern Turkey); for he was in a hurry to be in Jerusalem, if possible, on the day of '
  - type: note
    content: The yearly Jewish festival which celebrated the harvest.
  - type: text
    content: Pentecost.
  - type: heading
    content: Farewell to Ephesus
  '17':
  - type: text
    content: 'However, from Miletus he sent '
  - type: text
    content: word
  - type: text
    content: ' to Ephesus and summoned the elders of the church [to meet him there]. '
  '18':
  - type: text
    content: 'And when they arrived he said to them:'
  - type: text
    content: “
  - type: text
    content: Y
  - type: text
    content: 'ou know well how I [lived when I] was with you, from the first day that I set foot in Asia [until now], '
  '19':
  - type: text
    content: 'serving the Lord with all humility and with tears and trials which came on me because of the plots of the Jews [against me]; '
  '2':
  - type: text
    content: 'After he had gone through those districts and had encouraged the believers, he came to Greece. '
  '20':
  - type: text
    content: '[you know] how I did not shrink back in fear from telling you anything that was for your benefit, or from teaching you in public meetings, and from house to house, '
  '21':
  - type: text
    content: 'solemnly [and wholeheartedly] testifying to both Jews and Greeks, urging them to turn in repentance to God and [to have] faith in our Lord Jesus Christ [for salvation]. '
  '22':
  - type: text
    content: 'And now, compelled by the Spirit '
  - type: text
    content: and
  - type: text
    content: ' obligated by my convictions, I am going to Jerusalem, not knowing what will happen to me there, '
  '23':
  - type: text
    content: 'except that the Holy Spirit solemnly [and emphatically] affirms to me in city after city that imprisonment and suffering await me. '
  '24':
  - type: text
    content: 'But I do not consider my life as something of value '
  - type: text
    content: or
  - type: text
    content: ' dear to me, so that I may [with joy] finish my course and the ministry which I received from the Lord Jesus, to testify faithfully of the good news of God’s [precious, undeserved] grace [which makes us free of the guilt of sin and grants us eternal life].'
  '25':
  - type: text
    content: '“And now, listen carefully: I know that none of you, among whom I went about preaching the kingdom, '
  - type: note
    content: Paul did not to expect to return to Ephesus, but he did. See 1 Tim 1:3.
  - type: text
    content: 'will see me again. '
  '26':
  - type: text
    content: 'For that reason I testify to you on this [our parting] day that I am innocent of the blood of all people. '
  '27':
  - type: text
    content: 'For I did not shrink from declaring to you the whole purpose '
  - type: text
    content: and
  - type: text
    content: ' plan of God. '
  '28':
  - type: text
    content: 'Take care '
  - type: text
    content: and
  - type: text
    content: ' be on guard for yourselves and for the whole flock over which the Holy Spirit has appointed you as overseers, to shepherd (tend, feed, guide) the church of God which He bought with His own blood. '
  '29':
  - type: text
    content: 'I know that after I am gone, [false teachers like] ferocious wolves will come in among you, not sparing the flock; '
  '3':
  - type: text
    content: 'And he stayed three months, and when a plot was formed against him by the Jews as he was about to set sail for Syria, he decided to return through Macedonia (northern Greece). '
  '30':
  - type: text
    content: 'even from among your own selves men will arise, speaking perverse '
  - type: text
    content: and
  - type: text
    content: ' distorted things, to draw away the disciples after themselves [as their followers]. '
  '31':
  - type: text
    content: 'Therefore be '
  - type: text
    content: continually
  - type: text
    content: ' alert, remembering that for three years, night or day, I did not stop admonishing '
  - type: text
    content: and
  - type: text
    content: ' advising each one [of you] with tears. '
  '32':
  - type: text
    content: 'And now I commend you to God [placing you in His protective, loving care] and [I commend you] to the word of His grace [the counsel and promises of His unmerited favor]. His grace is able to build you up and to give you the [rightful] inheritance among all those who are sanctified [that is, among those who are set apart for God’s purpose—all believers]. '
  '33':
  - type: text
    content: 'I had no desire for anyone’s silver or gold or [expensive] clothes. '
  '34':
  - type: text
    content: 'You know personally that these hands ministered to my own needs [working in manual labor] and to [those of] the people who were with me. '
  '35':
  - type: text
    content: 'In everything I showed you [by example] that by working hard in this way you must help the weak and remember the words of the Lord Jesus, that He Himself said, '
  - type: text
    content: ‘It is more blessed
  - type: text
    content: ' [and brings greater joy] '
  - type: text
    content: to give than to receive.’ ”
  '36':
  - type: text
    content: 'When he had said these things, he knelt down and prayed with them all. '
  '37':
  - type: text
    content: 'And '
  - type: note
    content: Lit there was considerable weeping of all.
  - type: text
    content: 'they '
  - type: text
    content: began
  - type: text
    content: ' to weep openly and threw their arms around Paul’s neck, and repeatedly kissed him, '
  '38':
  - type: text
    content: 'grieving '
  - type: text
    content: and
  - type: text
    content: ' distressed especially over the word which he had spoken, that they would not see him again. And they accompanied him to the ship.'
  '4':
  - type: text
    content: 'He was accompanied by Sopater of Berea, '
  - type: text
    content: the son
  - type: text
    content: ' of Pyrrhus, and by Aristarchus and Secundus of the Thessalonians, and by Gaius of Derbe, and Timothy, and Tychicus and Trophimus of Asia. '
  '5':
  - type: text
    content: 'These men went on ahead and were waiting for us (including Luke) at Troas. '
  '6':
  - type: text
    content: We sailed from Philippi after the days of Unleavened Bread (Passover week), and within five days we reached them at Troas, where we stayed for seven days.
  '7':
  - type: text
    content: 'Now on the first day of the week (Sunday), when we were gathered together to break bread (share communion), Paul '
  - type: text
    content: began
  - type: text
    content: ' talking with them, intending to leave the next day; and he kept on with his message until midnight. '
  '8':
  - type: text
    content: 'Now there were many lamps in the upper room where we were assembled, '
  '9':
  - type: text
    content: 'and there was a young man named Eutychus (“Lucky”) sitting on the window sill. He was sinking into a deep sleep, and as Paul '
  - type: note
    content: Luke (the writer) takes a good-natured poke at Paul when he describes Paul’s long-winded preaching. Anyone who studies Paul’s letters, especially in the original Greek, will soon discover that Paul was a vivacious, wonderfully emotional servant of the Lord who was never stingy with words.
  - type: text
    content: 'kept on talking longer and longer, he was completely overcome by sleep and fell down from the third story; and he was picked up dead. '
