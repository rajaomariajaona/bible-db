document_id: ACT.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul in Macedonia and Greece
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After the uproar had ended, Paul sent for the disciples, and when he had encouraged them he told them goodbye, and set off to go to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Northern Greece.
    marker-yv: yv-n
  - type: text
    text: 'Macedonia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After he had gone through those districts and had encouraged the believers, he came to Greece. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he stayed three months, and when a plot was formed against him by the Jews as he was about to set sail for Syria, he decided to return through Macedonia (northern Greece). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He was accompanied by Sopater of Berea, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the son
  - type: text
    text: ' of Pyrrhus, and by Aristarchus and Secundus of the Thessalonians, and by Gaius of Derbe, and Timothy, and Tychicus and Trophimus of Asia. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'These men went on ahead and were waiting for us (including Luke) at Troas. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We sailed from Philippi after the days of Unleavened Bread (Passover week), and within five days we reached them at Troas, where we stayed for seven days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now on the first day of the week (Sunday), when we were gathered together to break bread (share communion), Paul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' talking with them, intending to leave the next day; and he kept on with his message until midnight. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now there were many lamps in the upper room where we were assembled, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and there was a young man named Eutychus (“Lucky”) sitting on the window sill. He was sinking into a deep sleep, and as Paul '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Luke (the writer) takes a good-natured poke at Paul when he describes Paul’s long-winded preaching. Anyone who studies Paul’s letters, especially in the original Greek, will soon discover that Paul was a vivacious, wonderfully emotional servant of the Lord who was never stingy with words.
    marker-yv: yv-n
  - type: text
    text: 'kept on talking longer and longer, he was completely overcome by sleep and fell down from the third story; and he was picked up dead. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Paul went down and threw himself on him and embraced him, and said [to those standing around him], “Do not be troubled, because '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his soul is in him
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he is alive.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When Paul had gone back upstairs and had broken the bread and eaten, he talked [informally and confidentially] with them for a long time—until daybreak [in fact]—and then he left. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They took the boy [Eutychus] home alive, and were greatly comforted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Troas to Miletus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But we went on ahead to the ship and set sail for Assos, intending to take Paul on board there; for that was what he had arranged, intending himself to go [a shorter route] by land. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So when he met us at Assos, we took him on board and sailed on to Mitylene. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sailing from there, we arrived the next day [at a point] opposite Chios; the following day we crossed over to Samos, and the next day we arrived at Miletus [about 30 miles south of Ephesus]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul had decided to sail on past Ephesus so that he would not end up spending time [unnecessarily] in [the province of] Asia (modern Turkey); for he was in a hurry to be in Jerusalem, if possible, on the day of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The yearly Jewish festival which celebrated the harvest.
    marker-yv: yv-n
  - type: text
    text: Pentecost.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Farewell to Ephesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'However, from Miletus he sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Ephesus and summoned the elders of the church [to meet him there]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when they arrived he said to them:'
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Y
  - type: text
    text: 'ou know well how I [lived when I] was with you, from the first day that I set foot in Asia [until now], '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'serving the Lord with all humility and with tears and trials which came on me because of the plots of the Jews [against me]; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '[you know] how I did not shrink back in fear from telling you anything that was for your benefit, or from teaching you in public meetings, and from house to house, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'solemnly [and wholeheartedly] testifying to both Jews and Greeks, urging them to turn in repentance to God and [to have] faith in our Lord Jesus Christ [for salvation]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And now, compelled by the Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obligated by my convictions, I am going to Jerusalem, not knowing what will happen to me there, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'except that the Holy Spirit solemnly [and emphatically] affirms to me in city after city that imprisonment and suffering await me. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But I do not consider my life as something of value '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dear to me, so that I may [with joy] finish my course and the ministry which I received from the Lord Jesus, to testify faithfully of the good news of God’s [precious, undeserved] grace [which makes us free of the guilt of sin and grants us eternal life].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“And now, listen carefully: I know that none of you, among whom I went about preaching the kingdom, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul did not to expect to return to Ephesus, but he did. See 1 Tim 1:3.
    marker-yv: yv-n
  - type: text
    text: 'will see me again. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For that reason I testify to you on this [our parting] day that I am innocent of the blood of all people. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For I did not shrink from declaring to you the whole purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plan of God. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Take care '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be on guard for yourselves and for the whole flock over which the Holy Spirit has appointed you as overseers, to shepherd (tend, feed, guide) the church of God which He bought with His own blood. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I know that after I am gone, [false teachers like] ferocious wolves will come in among you, not sparing the flock; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'even from among your own selves men will arise, speaking perverse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distorted things, to draw away the disciples after themselves [as their followers]. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Therefore be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' alert, remembering that for three years, night or day, I did not stop admonishing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advising each one [of you] with tears. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And now I commend you to God [placing you in His protective, loving care] and [I commend you] to the word of His grace [the counsel and promises of His unmerited favor]. His grace is able to build you up and to give you the [rightful] inheritance among all those who are sanctified [that is, among those who are set apart for God’s purpose—all believers]. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I had no desire for anyone’s silver or gold or [expensive] clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'You know personally that these hands ministered to my own needs [working in manual labor] and to [those of] the people who were with me. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'In everything I showed you [by example] that by working hard in this way you must help the weak and remember the words of the Lord Jesus, that He Himself said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘It is more blessed
  - type: text
    text: ' [and brings greater joy] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to give than to receive.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'When he had said these things, he knelt down and prayed with them all. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: there was considerable weeping of all
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to weep openly and threw their arms around Paul’s neck, and repeatedly kissed him, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'grieving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed especially over the word which he had spoken, that they would not see him again. And they accompanied him to the ship.'
