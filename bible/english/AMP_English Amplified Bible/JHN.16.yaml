document_id: JHN.16,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus’ Warning
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I have told you these things so that you will not stumble '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' be caught off guard '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' fall away.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: about righteousness
    - type: text
      text: ' [personal integrity and godly character], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because I am going to My Father and you will no longer see Me;
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: about judgment
    - type: text
      text: ' [the certainty of it], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'because the ruler of this world (Satan) has been judged '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' condemned.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have many more things to say to you, but you cannot bear
    - type: text
      text: ' [to hear] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: them now.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when He, the Spirit of Truth, comes, He will guide you into all the truth
    - type: text
      text: ' [full and complete truth]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For He will not speak on His own initiative, but He will speak whatever He hears
    - type: text
      text: ' [from the Father—the message regarding the Son], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and He will disclose to you what is to come
    - type: text
      text: ' [in the future]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He will glorify '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' honor Me, because He (the Holy Spirit) will take from what is Mine and will disclose it to you.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All things that the Father has are Mine. Because of this I said that He
    - type: text
      text: ' [the Spirit] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will take from what is Mine and will reveal it to you.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus’ Death and Resurrection Foretold
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A little while, and you will no longer see Me; and again a little while, and you will see Me.”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Some of His disciples said to one another, “What does He mean when He tells us, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘A little while, and you will not see Me; and again a little while, and you will see Me’
    - type: text
      text: '; and, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘because I am going to My Father’?”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So they were saying, “What does He mean when He says, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘A little while’
    - type: text
      text: '? We do not know what He is talking about.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesus knew that they wanted to ask Him, so He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you wondering among yourselves about what I meant when I said, ‘A little while, and you will not see Me, and again a little while, and you will see Me’?
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'They will put you out of the synagogues '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' make you outcasts. And a time is coming when whoever kills you will think that he is offering service to God.'
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, that you will weep and grieve'
    - type: text
      text: ' [in great mourning], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the world will rejoice. You will be sorrowful, but your sorrow will be turned into joy.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A woman, when she is in labor, has pain because her time
    - type: text
      text: ' [to give birth] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has come; but when she has given birth to the child, she no longer remembers the anguish because of her joy that a child has come into the world.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So for now you are in grief; but I will see you again, and
    - type: text
      text: ' [then] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your hearts will rejoice, and no one will take away from you your
    - type: text
      text: ' [great] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: joy.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer Promises
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In that day you will not
    - type: text
      text: ' [need to] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'ask Me about anything. I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, whatever you ask the Father in My name'
    - type: text
      text: ' [as My representative], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will give you.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Until now you have not asked
    - type: text
      text: ' [the Father] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for anything in My name; but now ask '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' keep on asking and you will receive, so that your joy may be full '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' complete.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have told you these things in figurative language (veiled language, proverbs); the hour is now coming when I will no longer speak to you in figures of speech, but I will tell you plainly about the Father.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In that day you will ask in My name, and I am not saying to you that I will ask the Father on your behalf
    - type: text
      text: ' [because it will be unnecessary]; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the Father Himself
    - type: text
      text: ' [tenderly] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loves you, because you have loved Me and have believed that I came from the Father.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I came from the Father and have come into the world; again, I am leaving the world and going to the Father.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'His disciples said, “Ah, now You are speaking plainly to us and not in figures of speech! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And they will do these things because they have not known the Father or Me.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now we know that You know all things, and have no need for anyone to question You; because of this we believe [without any doubt] that you came from God.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you now
    - type: text
      text: ' [at last] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: believe?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Take careful notice: an hour is coming, and has arrived, when you will all be scattered, each to his own '
      - type: usfm
        marker: it
        children:
        - type: text
          text: home,
      - type: text
        text: ' leaving Me alone; and yet I am not alone, because the Father is with Me.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have told you these things, so that in Me you may have
    - type: text
      text: ' [perfect] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'peace. In the world you have tribulation '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' distress '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' suffering, but be courageous'
    - type: text
      text: ' [be confident, be undaunted, be filled with joy]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have overcome the world.”
    - type: text
      text: ' [My conquest is accomplished, My victory abiding.]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have told you these things
    - type: text
      text: ' [now], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that when their time comes, you will remember that I told you about them. I did not say these things to you at the beginning, because I was with you.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Holy Spirit Promised
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But now I am going to Him who sent Me; and none of you asks Me, ‘Where are You going?’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But because I have said these things to you, sorrow has filled your hearts
    - type: text
      text: ' [and taken complete possession of them]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I tell you the truth, it is to your advantage that I go away; for if I do not go away, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Paracletos,
        - type: text
          text: ' one called alongside to help.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Helper (Comforter, Advocate, Intercessor—Counselor, Strengthener, Standby) will not come to you; but if I go, I will send Him (the Holy Spirit) to you
    - type: text
      text: ' [to be in close fellowship with you]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And He, when He comes, will convict the world about
    - type: text
      text: ' [the guilt of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sin
    - type: text
      text: ' [and the need for a Savior], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and about righteousness, and about judgment:'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: about sin
    - type: text
      text: ' [and the true nature of it], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because they do not believe in Me
    - type: text
      text: ' [and My message]; '
