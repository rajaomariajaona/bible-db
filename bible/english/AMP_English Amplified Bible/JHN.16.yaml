document_id: JHN.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Warning
  - type: text
    content: ' '
  - type: text
    content: '“I have told you these things so that you will not stumble '
  - type: text
    content: or
  - type: text
    content: ' be caught off guard '
  - type: text
    content: and
  - type: text
    content: ' fall away.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: about righteousness
  - type: text
    content: ' [personal integrity and godly character], '
  - type: text
    content: because I am going to My Father and you will no longer see Me;
  - type: text
    content: ' '
  '11':
  - type: text
    content: about judgment
  - type: text
    content: ' [the certainty of it], '
  - type: text
    content: 'because the ruler of this world (Satan) has been judged '
  - type: text
    content: and
  - type: text
    content: ' condemned.'
  '12':
  - type: text
    content: ' '
  - type: text
    content: “I have many more things to say to you, but you cannot bear
  - type: text
    content: ' [to hear] '
  - type: text
    content: them now.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But when He, the Spirit of Truth, comes, He will guide you into all the truth
  - type: text
    content: ' [full and complete truth]. '
  - type: text
    content: For He will not speak on His own initiative, but He will speak whatever He hears
  - type: text
    content: ' [from the Father—the message regarding the Son], '
  - type: text
    content: and He will disclose to you what is to come
  - type: text
    content: ' [in the future]. '
  '14':
  - type: text
    content: 'He will glorify '
  - type: text
    content: and
  - type: text
    content: ' honor Me, because He (the Holy Spirit) will take from what is Mine and will disclose it to you.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: All things that the Father has are Mine. Because of this I said that He
  - type: text
    content: ' [the Spirit] '
  - type: text
    content: will take from what is Mine and will reveal it to you.
  - type: heading
    content: Jesus’ Death and Resurrection Foretold
  '16':
  - type: text
    content: ' '
  - type: text
    content: “A little while, and you will no longer see Me; and again a little while, and you will see Me.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Some of His disciples said to one another, “What does He mean when He tells us, '
  - type: text
    content: ‘A little while, and you will not see Me; and again a little while, and you will see Me’
  - type: text
    content: '; and, '
  - type: text
    content: ‘because I am going to My Father’?”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'So they were saying, “What does He mean when He says, '
  - type: text
    content: ‘A little while’
  - type: text
    content: '? We do not know what He is talking about.” '
  '19':
  - type: text
    content: 'Jesus knew that they wanted to ask Him, so He said to them, '
  - type: text
    content: “Are you wondering among yourselves about what I meant when I said, ‘A little while, and you will not see Me, and again a little while, and you will see Me’?
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'They will put you out of the synagogues '
  - type: text
    content: and
  - type: text
    content: ' make you outcasts. And a time is coming when whoever kills you will think that he is offering service to God.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, that you will weep and grieve'
  - type: text
    content: ' [in great mourning], '
  - type: text
    content: but the world will rejoice. You will be sorrowful, but your sorrow will be turned into joy.
  - type: text
    content: ' '
  '21':
  - type: text
    content: A woman, when she is in labor, has pain because her time
  - type: text
    content: ' [to give birth] '
  - type: text
    content: has come; but when she has given birth to the child, she no longer remembers the anguish because of her joy that a child has come into the world.
  - type: text
    content: ' '
  '22':
  - type: text
    content: So for now you are in grief; but I will see you again, and
  - type: text
    content: ' [then] '
  - type: text
    content: your hearts will rejoice, and no one will take away from you your
  - type: text
    content: ' [great] '
  - type: text
    content: joy.
  - type: heading
    content: Prayer Promises
  '23':
  - type: text
    content: ' '
  - type: text
    content: In that day you will not
  - type: text
    content: ' [need to] '
  - type: text
    content: 'ask Me about anything. I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, whatever you ask the Father in My name'
  - type: text
    content: ' [as My representative], '
  - type: text
    content: He will give you.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Until now you have not asked
  - type: text
    content: ' [the Father] '
  - type: text
    content: 'for anything in My name; but now ask '
  - type: text
    content: and
  - type: text
    content: ' keep on asking and you will receive, so that your joy may be full '
  - type: text
    content: and
  - type: text
    content: ' complete.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: “I have told you these things in figurative language (veiled language, proverbs); the hour is now coming when I will no longer speak to you in figures of speech, but I will tell you plainly about the Father.
  - type: text
    content: ' '
  '26':
  - type: text
    content: In that day you will ask in My name, and I am not saying to you that I will ask the Father on your behalf
  - type: text
    content: ' [because it will be unnecessary]; '
  '27':
  - type: text
    content: for the Father Himself
  - type: text
    content: ' [tenderly] '
  - type: text
    content: loves you, because you have loved Me and have believed that I came from the Father.
  - type: text
    content: ' '
  '28':
  - type: text
    content: I came from the Father and have come into the world; again, I am leaving the world and going to the Father.”
  '29':
  - type: text
    content: 'His disciples said, “Ah, now You are speaking plainly to us and not in figures of speech! '
  '3':
  - type: text
    content: And they will do these things because they have not known the Father or Me.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Now we know that You know all things, and have no need for anyone to question You; because of this we believe [without any doubt] that you came from God.” '
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Do you now
  - type: text
    content: ' [at last] '
  - type: text
    content: believe?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Take careful notice: an hour is coming, and has arrived, when you will all be scattered, each to his own '
  - type: text
    content: home,
  - type: text
    content: ' leaving Me alone; and yet I am not alone, because the Father is with Me.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: I have told you these things, so that in Me you may have
  - type: text
    content: ' [perfect] '
  - type: text
    content: 'peace. In the world you have tribulation '
  - type: text
    content: and
  - type: text
    content: ' distress '
  - type: text
    content: and
  - type: text
    content: ' suffering, but be courageous'
  - type: text
    content: ' [be confident, be undaunted, be filled with joy]; '
  - type: text
    content: I have overcome the world.”
  - type: text
    content: ' [My conquest is accomplished, My victory abiding.]'
  '4':
  - type: text
    content: I have told you these things
  - type: text
    content: ' [now], '
  - type: text
    content: so that when their time comes, you will remember that I told you about them. I did not say these things to you at the beginning, because I was with you.
  - type: heading
    content: The Holy Spirit Promised
  '5':
  - type: text
    content: ' '
  - type: text
    content: “But now I am going to Him who sent Me; and none of you asks Me, ‘Where are You going?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: But because I have said these things to you, sorrow has filled your hearts
  - type: text
    content: ' [and taken complete possession of them]. '
  '7':
  - type: text
    content: 'But I tell you the truth, it is to your advantage that I go away; for if I do not go away, the '
  - type: note
    content: Gr Paracletos, one called alongside to help.
  - type: text
    content: Helper (Comforter, Advocate, Intercessor—Counselor, Strengthener, Standby) will not come to you; but if I go, I will send Him (the Holy Spirit) to you
  - type: text
    content: ' [to be in close fellowship with you]. '
  '8':
  - type: text
    content: And He, when He comes, will convict the world about
  - type: text
    content: ' [the guilt of] '
  - type: text
    content: sin
  - type: text
    content: ' [and the need for a Savior], '
  - type: text
    content: 'and about righteousness, and about judgment:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: about sin
  - type: text
    content: ' [and the true nature of it], '
  - type: text
    content: because they do not believe in Me
  - type: text
    content: ' [and My message]; '
