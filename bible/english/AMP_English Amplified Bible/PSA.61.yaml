document_id: PSA.61,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 61
  - type: heading
    content: Confidence in God’s Protection.
  - type: text
    content: 'To the Chief Musician; on stringed instruments. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: Hear my cry, O God;
  - type: text
    content: Listen to my prayer.
  '2':
  - type: text
    content: 'From the end of the earth I call to You, when my heart is overwhelmed '
  - type: text
    content: and
  - type: text
    content: ' weak;'
  - type: text
    content: Lead me to the rock that is higher than I [a rock that is too high to reach without Your help].
  '3':
  - type: text
    content: 'For You have been a shelter '
  - type: text
    content: and
  - type: text
    content: ' a refuge for me,'
  - type: text
    content: A strong tower against the enemy.
  '4':
  - type: text
    content: Let me dwell in Your tent forever;
  - type: text
    content: 'Let me take refuge in the shelter of Your wings. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: ¶For You have heard my vows, O God;
  - type: text
    content: You have given me the inheritance of those who fear Your name [with reverence].
  '6':
  - type: text
    content: You will prolong the king’s life [adding days upon days];
  - type: text
    content: His years will be like many generations.
  '7':
  - type: text
    content: He will sit enthroned forever before [the face of] God;
  - type: text
    content: 'Appoint lovingkindness and truth to watch over '
  - type: text
    content: and
  - type: text
    content: ' preserve him.'
  '8':
  - type: text
    content: So I will sing praise to Your name forever,
  - type: text
    content: Paying my vows day by day.
