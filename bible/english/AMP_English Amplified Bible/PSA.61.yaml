document_id: PSA.61
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 61
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Confidence in God’s Protection.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician; on stringed instruments. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear my cry, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'From the end of the earth I call to You, when my heart is overwhelmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lead me to the rock that is higher than I [a rock that is too high to reach without Your help].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For You have been a shelter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a refuge for me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A strong tower against the enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let me dwell in Your tent forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let me take refuge in the shelter of Your wings. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶For You have heard my vows, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have given me the inheritance of those who fear Your name [with reverence].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You will prolong the king’s life [adding days upon days];
- type: usfm
  marker: q1
  children:
  - type: text
    text: His years will be like many generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He will sit enthroned forever before [the face of] God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Appoint lovingkindness and truth to watch over '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserve him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So I will sing praise to Your name forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paying my vows day by day.
