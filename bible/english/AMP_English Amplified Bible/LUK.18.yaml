    content: And those who heard it said, “
  - type: note
    content: The common opinion was that the wealthy had been blessed by God, and would probably enter the kingdom of God provided that they met all their financial obligations (tithes, offerings) to Him and were charitable to those less fortunate.
  - type: text
    content: 'Then who can be saved?” '
