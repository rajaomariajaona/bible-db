    - type: text
      text: Parables on Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jesus was telling the disciples a parable to make the point that at all times they ought to pray and not give up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lose heart, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “In a certain city there was a judge who did not fear God and had no respect for man.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There was a
  - type: text
    text: ' [desperate] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'widow in that city and she kept coming to him and saying, ‘Give me justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' legal protection from my adversary.’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For a time he would not; but later he said to himself, ‘Even though I do not fear God nor respect man,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'yet because this widow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continues
    - type: text
      text: ' to bother me, I will give her justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' legal protection; otherwise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in the end she will come and give me a black eye
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: by continually coming she
  - type: text
    text: ' [will be an intolerable annoyance and she] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will wear me out.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen to what the unjust judge says!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And will not
  - type: text
    text: ' [our just] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'God defend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' avenge His elect'
  - type: text
    text: ' [His chosen ones] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who cry out to Him day and night? Will He delay
  - type: text
    text: ' [in providing justice] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on their behalf?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you that He will defend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' avenge them quickly. However, when the Son of Man comes, will He find'
  - type: text
    text: ' [this kind of persistent] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: faith on the earth?”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Pharisee and the Tax Collector
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He also told this parable to some people who trusted in themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were confident that they were righteous [posing outwardly as upright and in right standing with God], and who viewed others with contempt: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Two men went up into the temple
  - type: text
    text: ' [enclosure] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to pray, one a Pharisee and the other a tax collector.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Pharisee stood
  - type: text
    text: ' [ostentatiously] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and began praying to himself
  - type: text
    text: ' [in a self-righteous way, saying]: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘God, I thank You that I am not like the rest of men—swindlers, unjust (dishonest), adulterers—or even like this tax collector.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I fast twice a week; I pay tithes of all that I get.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the tax collector, standing at a distance, would not even raise his eyes toward heaven, but was striking his chest
  - type: text
    text: ' [in humility and repentance], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'saying, ‘God, be merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to me, the'
  - type: text
    text: ' [especially wicked] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sinner
  - type: text
    text: ' [that I am]!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you, this man went to his home justified
  - type: text
    text: ' [forgiven of the guilt of sin and placed in right standing with God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: rather than the other man; for everyone who exalts himself will be humbled, but he who humbles himself
  - type: text
    text: ' [forsaking self-righteous pride] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be exalted.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now they were also bringing their babies to Him, so that He would touch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bless them, and when the disciples noticed it, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' reprimanding them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But Jesus called them to Himself, saying [to the apostles], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Allow the children to come to Me, and do not forbid them, for the kingdom of God belongs to such as these.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, whoever does not receive the kingdom of God'
  - type: text
    text: ' [with faith and humility] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: like a child will not enter it at all.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rich Young Ruler
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A certain ruler asked Him, “Good Teacher [You who are essentially and morally good], what shall I do to inherit eternal life [that is, eternal salvation in the Messiah’s kingdom]?” [Matt 19:16-29; Mark 10:17-30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why do you call Me good? No one is
  - type: text
    text: ' [essentially and morally] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: good except God alone.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You know the commandments: ‘D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not commit adultery
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not murder
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not steal
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not testify falsely
    - type: text
      text: ', H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: onor your father and your mother
    - type: text
      text: .’ ”
  - type: text
    text: ' [Ex 20:12-16; Deut 5:16-20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He replied, “I have kept all these things from my youth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When Jesus heard this, He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You still lack one thing; sell everything that you have and distribute the money to the poor, and you will have
  - type: text
    text: ' [abundant] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: treasure in heaven; and come, follow Me
  - type: text
    text: ' [becoming My disciple, believing and trusting in Me and walking the same path of life that I walk].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But when he heard these things, he became very sad, for he was extremely rich. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus looked at him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How difficult it is for those who are wealthy to enter the kingdom of God!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it is easier for a camel to go through the eye of a needle than for a rich man
  - type: text
    text: ' [who places his faith in wealth or status] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of God.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And those who heard it said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The common opinion was that the wealthy had been blessed by God, and would probably enter the kingdom of God provided that they met all their financial obligations (tithes, offerings) to Him and were charitable to those less fortunate.
    marker-yv: yv-n
  - type: text
    text: 'Then who can be saved?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The things that are impossible with people are possible with God.”
  - type: text
    text: ' [Gen 18:14; Jer 32:17]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Peter said, “Look, we have left all [things—homes, families, businesses] and followed You.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, there is no one who has left house or wife or brothers or parents or children for the sake of the kingdom of God,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who will not receive many times as much in this present age and in the age to come, eternal life.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then taking the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 6:13.
    marker-yv: yv-n
  - type: text
    text: 'twelve [disciples] aside, He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen carefully: we are going up to Jerusalem, and all things that have been written through the prophets about the Son of Man will be fulfilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completed.'
  - type: text
    text: ' [Is 53:1-12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He will be betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handed over to the Gentiles (Roman authorities), and will be mocked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ridiculed and insulted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abused and spit on,'
  - type: text
    text: ' [Is 50:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and after they have scourged Him, they will kill Him; and on the third day He will rise
  - type: text
    text: ' [from the dead].” [Ps 16:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: But the disciples understood none of these things [about the approaching death and resurrection of Jesus]. This statement was hidden from them, and they did not grasp the [meaning of the] things that were said [by Jesus].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bartimaeus Receives Sight
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'As He was approaching Jericho [on His way to Jerusalem], it happened that a blind man was sitting beside the road begging. [Matt 20:29-34; Mark 10:46-52] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Now when he heard a crowd going by, he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to ask what this was [about]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'They told him, “Jesus of Nazareth is passing by.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So he shouted out, saying, “Jesus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A common Messianic title recognizing the Messiah as a descendant of David.
    marker-yv: yv-n
  - type: text
    text: 'Son of David (Messiah), have mercy on me!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Those who were leading the way were sternly telling him to keep quiet; but he screamed all the more, “Son of David, have mercy on me!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then Jesus stopped and ordered that the blind man be led to Him; and when he came near, Jesus asked him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you want Me to do for you?”
  - type: text
    text: ' He said, “Lord, let me regain my sight!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Regain your sight; your
  - type: text
    text: ' [personal trust and confident] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: faith
  - type: text
    text: ' [in Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has made you well.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Immediately he regained his sight and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' following Jesus, glorifying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honoring God. And all the people, when they saw it, praised God.'
