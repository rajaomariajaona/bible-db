    content: 'They told him, “Jesus of Nazareth is passing by.” '
  '38':
  - type: text
    content: 'So he shouted out, saying, “Jesus, '
  - type: note
    content: A common Messianic title recognizing the Messiah as a descendant of David.
  - type: text
    content: 'Son of David (Messiah), have mercy on me!” '
  '39':
  - type: text
    content: 'Those who were leading the way were sternly telling him to keep quiet; but he screamed all the more, “Son of David, have mercy on me!” '
  '4':
