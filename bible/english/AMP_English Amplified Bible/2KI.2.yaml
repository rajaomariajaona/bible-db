document_id: 2KI.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Taken to Heaven
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' was about to take Elijah up to heaven by a whirlwind, Elijah and Elisha were traveling from Gilgal. '
  '10':
  - type: text
    content: 'He said, “You have asked for a difficult thing. '
  - type: text
    content: However,
  - type: text
    content: ' if you see me when I am taken from you, it shall be so for you; but if not, it shall not be so.” '
  '11':
  - type: text
    content: 'As they continued along and talked, behold, a chariot of fire with horses of fire [appeared suddenly and] separated the two of them, and Elijah went up to heaven in a whirlwind. '
  '12':
  - type: text
    content: 'Elisha saw it and cried out, “My father, my father, the chariot of Israel and its horsemen!” And he no longer saw Elijah. Then he took hold of his own clothes and tore them into two pieces [in grief]. '
  '13':
  - type: text
    content: 'He picked up the mantle of Elijah that fell off him, and went back and stood by the bank of the Jordan. '
  '14':
  - type: text
    content: He took the mantle of Elijah that fell from him and struck the waters and said, “Where is the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Elijah?” And when he too had struck the waters, they divided this way and that, and Elisha crossed over.'
  - type: heading
    content: Elisha Succeeds Elijah
  '15':
  - type: text
    content: 'When the sons of the prophets who were [watching] opposite at Jericho saw him, they said, “The spirit of Elijah rests on Elisha.” And they came to meet him and bowed down to the ground before him [in respect]. '
  '16':
  - type: text
    content: Then they said to Elisha, “Behold now, there are among your servants fifty strong men; please let them go and search for your master. It may be that the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' has taken him up and cast him on some mountain or into some valley.” And he said, “You shall not send '
  - type: text
    content: anyone.
  - type: text
    content: '” '
  '17':
  - type: text
    content: 'But when they urged him until he was embarrassed [to refuse them], he said, “Send '
  - type: text
    content: them.
  - type: text
    content: '” So they sent fifty men, and they searched for three days but did not find Elijah. '
  '18':
  - type: text
    content: They returned to Elisha while he was staying at Jericho; and he said to them, “Did I not tell you, ‘Do not go’?”
  '19':
  - type: text
    content: 'Then the men of the city said to Elisha, “Look, this city is in a pleasant place, as my lord [Elisha] sees; but the water is bad and the land '
  - type: note
    content: Or causes miscarriages.
  - type: text
    content: 'is barren.” '
  '2':
  - type: text
    content: And Elijah said to Elisha, “Please stay here, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has sent me to Bethel.” But Elisha replied, “As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives and as your soul lives, I will not leave you.” So they went down to Bethel. '
  '20':
  - type: text
    content: 'He said, “Bring me a new jar, and put '
  - type: note
    content: Salt was sometimes considered a symbol of God’s faithfulness and His purifying power.
  - type: text
    content: 'salt in it.” So they brought it to him. '
  '21':
  - type: text
    content: Then Elisha went to the spring of water and threw the salt in it and said, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': ‘I [not the salt] have purified '
  - type: text
    content: and
  - type: text
    content: ' healed these waters; there shall no longer be death or barrenness because of it.’ ” '
  '22':
  - type: text
    content: So the waters have been purified to this day, in accordance with the word spoken by Elisha.
  '23':
  - type: text
    content: 'Then Elisha went up from Jericho to '
  - type: note
    content: Many people in Bethel participated in pagan worship and regarded the prophets of God with contempt.
  - type: text
    content: 'Bethel. On the way, young boys came out of the city and mocked him and said to him, “Go up, you '
  - type: note
    content: This refers to a bald space on the back of the head, which was probably shaved by prophets as a symbol of their sacred separation from ordinary life. So it appears that the boys were not only ridiculing Elisha’s baldness, but his prophetic office as well.
  - type: text
    content: 'baldhead! Go up, you baldhead!” '
  '24':
  - type: text
    content: When he turned around and looked at them, he cursed them in the name of the L
  - type: heading
    content: ord
  - type: text
    content: '. Then two female bears came out of the woods and tore to pieces forty-two of the boys. '
  '25':
  - type: text
    content: Elisha went from there to Mount Carmel, and from there he returned to Samaria.
  '3':
  - type: text
    content: 'Now the '
  - type: note
    content: I.e. a group or association of prophets.
  - type: text
    content: sons of the prophets who were at Bethel came out to Elisha and said to him, “Do you know that the L
  - type: heading
    content: ord
  - type: text
    content: ' will take your master away from you today?” He said, “Yes, I know it; be quiet [about it].”'
  '4':
  - type: text
    content: Elijah said to him, “Elisha, please stay here, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has sent me to Jericho.” But he said, “As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives and as your soul lives, I will not leave you.” So they came to Jericho. '
  '5':
  - type: text
    content: The sons of the prophets who were at Jericho approached Elisha and said to him, “Do you know that the L
  - type: heading
    content: ord
  - type: text
    content: ' will take your master away from you today?” And he answered, “Yes, I know it; be quiet [about it].” '
  '6':
  - type: text
    content: Elijah said to him, “Please stay here, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has sent me to the Jordan.” But he said, “As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives and as your soul lives, I will not leave you.” So the two of them went on.'
  '7':
  - type: text
    content: 'Fifty men of the sons of the prophets also went and stood opposite them [to watch] at a distance; and the two of them stood by the Jordan. '
  '8':
  - type: text
    content: And Elijah took his mantle (coat) and rolled it up and struck the waters, and they were divided this way and that, so that the two of them crossed over on dry ground.
  '9':
  - type: text
    content: 'And when they had crossed over, Elijah said to Elisha, “Ask what I shall do for you before I am taken from you.” And Elisha said, “Please let a double '
  - type: note
    content: Lit mouthful.
  - type: text
    content: 'portion of your spirit be upon me.” '
