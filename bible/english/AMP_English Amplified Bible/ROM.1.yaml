  - type: heading
    content: Unbelief and Its Consequences
  '18':
  - type: text
    content: 'For [God does not overlook sin and] the wrath of God is revealed from heaven against all ungodliness and unrighteousness of men who in their wickedness suppress '
  - type: text
    content: and
  - type: text
    content: ' stifle the truth, '
  '19':
  - type: text
    content: 'because that which is known about God is evident within them [in their inner consciousness], for God made it evident to them. '
  '2':
  - type: text
    content: 'which He promised beforehand through His prophets in the sacred Scriptures— '
  '20':
  - type: text
    content: 'For ever since the creation of the world His invisible attributes, His eternal power and divine nature, have been clearly seen, being understood through His workmanship [all His creation, the wonderful things that He has made], so that they [who fail to believe and trust in Him] are without excuse '
  - type: text
    content: and
  - type: text
    content: ' without defense. [Ps 19:1-4; Eph 2:10] '
  '21':
  - type: text
    content: 'For even though '
  - type: note
    content: Anyone who attributes the existence of the world to chance or to a different creator is already guilty of deliberately rejecting God, because to deny the true God one must set aside common sense.
  - type: text
    content: 'they knew God [as the Creator], they did not '
  - type: note
    content: Lit glorify.
  - type: text
    content: 'honor Him as God or give thanks [for His wondrous creation]. On the contrary, they became worthless in their thinking [godless, with pointless reasonings, and silly speculations], and their foolish heart was darkened. '
  '22':
  - type: text
    content: 'Claiming to be wise, they became fools, '
  '23':
  - type: text
    content: 'and exchanged the glory '
  - type: text
    content: and
  - type: text
    content: ' majesty '
  - type: text
    content: and
  - type: text
    content: ' excellence of the immortal God for '
  - type: note
    content: Paul’s indictment of idolatry (images) is logical and devastating. He emphasizes that idols are essentially copies of living creatures, whether in human form (as, for example, in ancient Greek myth) or otherwise (as in Egyptian idolatry and metaphysics). These lifeless images are clearly powerless, and even the living creatures which they supposedly represent are either nonexistent hybrids and monsters, or else ordinary creatures on earth who could hardly create so much as a grain of sand.
  - type: text
    content: an image [worthless idols] in the shape of mortal man and birds and four-footed animals and reptiles.
  '24':
  - type: text
    content: 'Therefore God gave them over in the lusts of their own hearts to [sexual] impurity, so that their bodies would be dishonored among them [abandoning them to the degrading power of sin], '
  '25':
  - type: text
    content: because [by choice] they exchanged the truth of God for a lie, and worshiped and served the creature rather than the Creator, who is blessed forever! Amen. [Jer 2:11]
  '26':
  - type: text
    content: 'For this reason God gave them over to degrading '
  - type: text
    content: and
  - type: text
    content: ' vile passions; for their women exchanged the natural function for that which is unnatural [a function contrary to nature], '
  '27':
  - type: text
    content: 'and in the same way also the men turned away from the natural function of the woman and were consumed with their desire toward one another, men with men committing shameful acts and in return receiving in their own bodies the inevitable '
  - type: text
    content: and
  - type: text
    content: ' appropriate penalty for their wrongdoing.'
  '28':
  - type: text
    content: 'And since they did not see fit to acknowledge God '
  - type: text
    content: or
  - type: text
    content: ' consider Him worth knowing [as their Creator], God gave them over to a depraved mind, to do things which are improper '
  - type: text
    content: and
  - type: text
    content: ' repulsive, '
  '29':
  - type: text
    content: 'until they were filled (permeated, saturated) with every kind of unrighteousness, wickedness, greed, evil; full of envy, murder, strife, deceit, malice '
  - type: text
    content: and
  - type: text
    content: ' mean-spiritedness. They are gossips [spreading rumors], '
  '3':
  - type: text
    content: '[the good news] regarding His Son, who, as to the flesh [His human nature], was born a descendant of David [to fulfill the covenant promises], '
  '30':
  - type: text
    content: 'slanderers, haters of God, insolent, arrogant, boastful, inventors [of new forms] of evil, disobedient '
  - type: text
    content: and
  - type: text
    content: ' disrespectful to parents, '
  '31':
  - type: text
    content: 'without understanding, untrustworthy, unloving, unmerciful [without pity]. '
  '32':
  - type: text
    content: 'Although they know God’s righteous decree '
  - type: text
    content: and
  - type: text
    content: ' His judgment, that those who do such things deserve death, yet they not only do them, but they even [enthusiastically] approve '
  - type: text
    content: and
  - type: text
    content: ' tolerate others who practice them.'
  '4':
  - type: text
    content: 'and [as to His divine nature] according to the Spirit of holiness was openly designated to be the Son of God with power [in a triumphant and miraculous way] by '
  - type: text
    content: His
  - type: text
    content: ' resurrection from the dead: Jesus Christ our Lord. '
  '5':
  - type: text
    content: 'It is through Him that we have received grace and [our] apostleship to promote obedience to the faith '
  - type: text
    content: and
  - type: text
    content: ' make disciples for His name’s sake among all the Gentiles, '
  '6':
  - type: text
    content: and you also are among those who are called of Jesus Christ to belong to Him;
  '7':
  - type: text
    content: '[I am writing] to all who are beloved of God in Rome, called to be saints (God’s people) '
  - type: text
    content: and
  - type: text
    content: ' set apart for a sanctified life, [that is, set apart for God and His purpose]: Grace to you and peace [inner calm and spiritual well-being] from God our Father and from the Lord Jesus Christ.'
  '8':
  - type: text
    content: 'First, I thank my God through Jesus Christ for all of you, because your faith [your trust and confidence in His power, wisdom, and goodness] is being proclaimed in all the world. '
  '9':
  - type: text
    content: 'For God, whom I serve with my spirit by '
  - type: text
    content: preaching
  - type: text
    content: ' the gospel of His Son, is my witness as to how continuously I mention you '
