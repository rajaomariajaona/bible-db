    content: The Gospel Exalted
  - type: text
    content: 'Paul, a '
  - type: note
    content: I.e. a person in bondage. One who belongs to another.
  - type: text
    content: 'bond-servant of Christ Jesus, called as an apostle (special messenger, personally chosen representative), set apart for [preaching] the '
  - type: note
    content: In ancient Greece the word translated as “good news” or “gospel” was used to denote, among other things, success in a battle.
  - type: text
    content: 'gospel of God [the good news of salvation], '
  '10':
  - type: text
    content: 'in my prayers; always pleading that somehow, by God’s will, I may now at last come to you. '
  '11':
  - type: text
    content: 'For I long to see you so that I may share with you some spiritual gift, to strengthen '
  - type: text
    content: and
  - type: text
    content: ' establish you; '
  '12':
  - type: text
    content: 'that is, that we may be mutually encouraged '
  - type: text
    content: and
  - type: text
    content: ' comforted by each other’s faith, both yours and mine. '
  '13':
  - type: text
    content: 'I do not want you to be unaware, '
  - type: note
    content: 'Lit brethren, includes all born-again believers: men, women, and children.'
  - type: text
    content: 'brothers and sisters, that many times I have planned to come to you, (and have been prevented so far) so that I may have some fruit [of my labors] among you, even as '
  - type: text
