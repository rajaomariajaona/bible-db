document_id: ROM.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Gospel Exalted
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a person in bondage. One who belongs to another.
      marker-yv: yv-n
    - type: text
      text: 'bond-servant of Christ Jesus, called as an apostle (special messenger, personally chosen representative), set apart for [preaching] the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient Greece the word translated as “good news” or “gospel” was used to denote, among other things, success in a battle.
      marker-yv: yv-n
    - type: text
      text: 'gospel of God [the good news of salvation], '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'in my prayers; always pleading that somehow, by God’s will, I may now at last come to you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For I long to see you so that I may share with you some spiritual gift, to strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establish you; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that is, that we may be mutually encouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comforted by each other’s faith, both yours and mine. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I do not want you to be unaware, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren,
        - type: text
          text: ' includes all born-again believers: men, women, and children.'
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, that many times I have planned to come to you, (and have been prevented so far) so that I may have some fruit [of my labors] among you, even as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I have
    - type: text
      text: ' among the rest of the Gentiles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I have a duty to perform '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a debt to pay both to Greeks and to barbarians [the cultured and the uncultured], both to the wise and to the foolish. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So, for my part, I am ready '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eager to preach the gospel also to you who are in Rome.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I am not ashamed of the gospel, for it is the power of God for salvation [from His wrath and punishment] to everyone who believes [in Christ as Savior], to the Jew first and also to the Greek. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For in the gospel the righteousness of God is revealed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both springing
    - type: text
      text: ' from faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and leading
    - type: text
      text: ' to faith [disclosed in a way that awakens more faith]. As it is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever remains written, “T'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he just
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: upright shall live by faith
    - type: text
      text: .” [Hab 2:4]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Unbelief and Its Consequences
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For [God does not overlook sin and] the wrath of God is revealed from heaven against all ungodliness and unrighteousness of men who in their wickedness suppress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stifle the truth, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'because that which is known about God is evident within them [in their inner consciousness], for God made it evident to them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'which He promised beforehand through His prophets in the sacred Scriptures— '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For ever since the creation of the world His invisible attributes, His eternal power and divine nature, have been clearly seen, being understood through His workmanship [all His creation, the wonderful things that He has made], so that they [who fail to believe and trust in Him] are without excuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' without defense. [Ps 19:1-4; Eph 2:10] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For even though '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Anyone who attributes the existence of the world to chance or to a different creator is already guilty of deliberately rejecting God, because to deny the true God one must set aside common sense.
      marker-yv: yv-n
    - type: text
      text: 'they knew God [as the Creator], they did not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: glorify.
      marker-yv: yv-n
    - type: text
      text: 'honor Him as God or give thanks [for His wondrous creation]. On the contrary, they became worthless in their thinking [godless, with pointless reasonings, and silly speculations], and their foolish heart was darkened. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Claiming to be wise, they became fools, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and exchanged the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excellence of the immortal God for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul’s indictment of idolatry (images) is logical and devastating. He emphasizes that idols are essentially copies of living creatures, whether in human form (as, for example, in ancient Greek myth) or otherwise (as in Egyptian idolatry and metaphysics). These lifeless images are clearly powerless, and even the living creatures which they supposedly represent are either nonexistent hybrids and monsters, or else ordinary creatures on earth who could hardly create so much as a grain of sand.
      marker-yv: yv-n
    - type: text
      text: an image [worthless idols] in the shape of mortal man and birds and four-footed animals and reptiles.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Therefore God gave them over in the lusts of their own hearts to [sexual] impurity, so that their bodies would be dishonored among them [abandoning them to the degrading power of sin], '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: because [by choice] they exchanged the truth of God for a lie, and worshiped and served the creature rather than the Creator, who is blessed forever! Amen. [Jer 2:11]
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For this reason God gave them over to degrading '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vile passions; for their women exchanged the natural function for that which is unnatural [a function contrary to nature], '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and in the same way also the men turned away from the natural function of the woman and were consumed with their desire toward one another, men with men committing shameful acts and in return receiving in their own bodies the inevitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appropriate penalty for their wrongdoing.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And since they did not see fit to acknowledge God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' consider Him worth knowing [as their Creator], God gave them over to a depraved mind, to do things which are improper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repulsive, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'until they were filled (permeated, saturated) with every kind of unrighteousness, wickedness, greed, evil; full of envy, murder, strife, deceit, malice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mean-spiritedness. They are gossips [spreading rumors], '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '[the good news] regarding His Son, who, as to the flesh [His human nature], was born a descendant of David [to fulfill the covenant promises], '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'slanderers, haters of God, insolent, arrogant, boastful, inventors [of new forms] of evil, disobedient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disrespectful to parents, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'without understanding, untrustworthy, unloving, unmerciful [without pity]. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Although they know God’s righteous decree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His judgment, that those who do such things deserve death, yet they not only do them, but they even [enthusiastically] approve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tolerate others who practice them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and [as to His divine nature] according to the Spirit of holiness was openly designated to be the Son of God with power [in a triumphant and miraculous way] by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' resurrection from the dead: Jesus Christ our Lord. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It is through Him that we have received grace and [our] apostleship to promote obedience to the faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make disciples for His name’s sake among all the Gentiles, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and you also are among those who are called of Jesus Christ to belong to Him;
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '[I am writing] to all who are beloved of God in Rome, called to be saints (God’s people) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart for a sanctified life, [that is, set apart for God and His purpose]: Grace to you and peace [inner calm and spiritual well-being] from God our Father and from the Lord Jesus Christ.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'First, I thank my God through Jesus Christ for all of you, because your faith [your trust and confidence in His power, wisdom, and goodness] is being proclaimed in all the world. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For God, whom I serve with my spirit by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: preaching
    - type: text
      text: ' the gospel of His Son, is my witness as to how continuously I mention you '
