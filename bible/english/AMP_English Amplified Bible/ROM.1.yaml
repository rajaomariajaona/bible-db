  - type: text
    content: 'I have a duty to perform '
  - type: text
    content: and
  - type: text
    content: ' a debt to pay both to Greeks and to barbarians [the cultured and the uncultured], both to the wise and to the foolish. '
  '15':
  - type: text
    content: 'So, for my part, I am ready '
  - type: text
    content: and
  - type: text
    content: ' eager to preach the gospel also to you who are in Rome.'
  '16':
  - type: text
    content: 'I am not ashamed of the gospel, for it is the power of God for salvation [from His wrath and punishment] to everyone who believes [in Christ as Savior], to the Jew first and also to the Greek. '
  '17':
  - type: text
    content: 'For in the gospel the righteousness of God is revealed, '
  - type: text
