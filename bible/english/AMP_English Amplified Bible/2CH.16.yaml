document_id: 2CH.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asa Wars against Baasha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that this refers to the number of years since the kingdom was divided, not the actual year of Asa’s reign.
    marker-yv: yv-n
  - type: text
    text: 'thirty-sixth year of Asa’s reign Baasha king of Israel came up against Judah and fortified Ramah in order to prevent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone
  - type: text
    text: ' from going out or coming in to [meet with] Asa king of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then Asa brought out silver and gold from the treasuries of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and from the king’s house, and sent them to Ben-hadad king of Aram (Syria), who lived in Damascus, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Let there be
  - type: text
    text: ' a treaty between you and me, as there was between my father and your father. Look, I am sending you silver and gold; go, break your treaty with Baasha king of Israel, so that he will withdraw from me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ben-hadad listened to King Asa and sent the commanders of his armies against the cities of Israel; and they attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquered Ijon, Dan, Abel-maim, and all the storage cities of Naphtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Baasha heard about it, he ceased fortifying Ramah and stopped his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then King Asa brought all Judah, and they carried away the stones of Ramah and its timber with which Baasha had been building, and with them he fortified Geba and Mizpah.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asa Imprisons the Prophet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: At that time Hanani the seer came to Asa king of Judah and said to him, “Because you relied on the king of Aram (Syria) and did not rely on the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, the army of the king of Aram (Syria) has escaped out of your hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Were not the Ethiopians and Lubim a huge army with a great number of chariots and horsemen? Yet because you relied on the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', He placed them in your hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' move to and fro throughout the earth so that He may support those whose heart is completely His. You have acted foolishly in this; therefore, from now on you will have wars.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then Asa was angry with the seer and put him in prison [in the stocks], for he was enraged with him because of this. And at the same time Asa oppressed some of the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now the acts of Asa, from the first to the last, are written in the Book of the Kings of Judah and Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 1.
    marker-yv: yv-n
  - type: text
    text: thirty-ninth year of his reign Asa developed a disease in his feet. His disease was severe, yet even in his illness he did not seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', but [relied only on] the physicians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Asa slept with his fathers [in death], dying in the forty-first year of his reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They buried him in his own tomb which he had cut out for himself in the City of David, and they laid him on a bier which he had filled with various kinds of spices blended by the perfumers’ art; and they made a very great fire in his honor.
