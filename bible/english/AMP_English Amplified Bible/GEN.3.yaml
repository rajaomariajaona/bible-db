          text: The relationship between Satan and the serpent is not made clear, but Satan is identified with the serpent later in Rev 12:9, 14, 15, and 20:2. It seems difficult to believe that Eve would not have been suspicious of a talking creature, but at this point in time Eve probably knew next to nothing about animals; and in any case, the serpent, as it existed before the curse (v 14), was a very different creature from the reptile that is familiar to us today.
