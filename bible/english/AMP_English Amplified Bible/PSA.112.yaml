document_id: PSA.112,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 112
  - type: heading
    content: Prosperity of the One Who Fears the Lord.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  - type: text
    content: Blessed [fortunate, prosperous, and favored by God] is the man who fears the L
  - type: heading
    content: ord
  - type: text
    content: ' [with awe-inspired reverence and worships Him with obedience],'
  - type: text
    content: Who delights greatly in His commandments. [Deut 10:12]
  '10':
  - type: text
    content: ¶The wicked will see it and be angered,
  - type: text
    content: He will gnash his teeth and melt away [in despair and death];
  - type: text
    content: 'The desire of the wicked will perish '
  - type: text
    content: and
  - type: text
    content: ' come to nothing.'
  '2':
  - type: text
    content: His descendants will be mighty on earth;
  - type: text
    content: The generation of the upright will be blessed.
  '3':
  - type: text
    content: Wealth and riches are in his house,
  - type: text
    content: And his righteousness endures forever.
  '4':
  - type: text
    content: Light arises in the darkness for the upright;
  - type: text
    content: He is gracious and compassionate and righteous (upright—in right standing with God).
  '5':
  - type: text
    content: It is well with the man who is gracious and lends;
  - type: text
    content: He conducts his affairs with justice. [Ps 37:26; Luke 6:35; Col 4:5]
  '6':
  - type: text
    content: He will never be shaken;
  - type: text
    content: The righteous will be remembered forever. [Prov 10:7]
  '7':
  - type: text
    content: ¶He will not fear bad news;
  - type: text
    content: His heart is steadfast, trusting [confidently relying on and believing] in the L
  - type: heading
    content: ord
  - type: text
    content: .
  '8':
  - type: text
    content: His heart is upheld, he will not fear
  - type: text
    content: While he looks [with satisfaction] on his adversaries.
  '9':
  - type: text
    content: He has given freely to the poor;
  - type: text
    content: His righteousness endures forever;
  - type: text
    content: His horn will be exalted in honor. [2 Cor 9:9]
