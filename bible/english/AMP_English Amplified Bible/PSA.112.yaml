  children:
  - type: text
    text: Psalm 112
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prosperity of the One Who Fears the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: .
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed [fortunate, prosperous, and favored by God] is the man who fears the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with awe-inspired reverence and worships Him with obedience],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who delights greatly in His commandments. [Deut 10:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: His descendants will be mighty on earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The generation of the upright will be blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Wealth and riches are in his house,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his righteousness endures forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Light arises in the darkness for the upright;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is gracious and compassionate and righteous (upright—in right standing with God).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It is well with the man who is gracious and lends;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He conducts his affairs with justice. [Ps 37:26; Luke 6:35; Col 4:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He will never be shaken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The righteous will be remembered forever. [Prov 10:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶He will not fear bad news;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His heart is steadfast, trusting [confidently relying on and believing] in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: His heart is upheld, he will not fear
- type: usfm
  marker: q1
  children:
  - type: text
    text: While he looks [with satisfaction] on his adversaries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He has given freely to the poor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His righteousness endures forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His horn will be exalted in honor. [2 Cor 9:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶The wicked will see it and be angered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will gnash his teeth and melt away [in despair and death];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The desire of the wicked will perish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to nothing.'
