document_id: AMO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Basket of Fruit and Israel’s Captivity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Thus the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' showed me [a vision], and behold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there was
  - type: text
    text: ' a basket of [overripe] summer fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And He said, “Amos, what do you see?” And I said, “A basket of summer fruit.” Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “The end has come for My people Israel. I will spare them no longer [for the nation is ripe for judgment]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In that day, the songs of the palace shall turn to wailing,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: . “There will be many dead bodies; in [sacred] silence they will throw them everywhere.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hear this, you who trample down the needy, and do away with the poor of the land, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When will the New Moon [festival] be over
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that we may sell grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the Sabbath ended so that we may open the wheat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: market,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Making the ephah [measure] smaller and the shekel bigger [that is, selling less for a higher price]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to cheat by falsifying the scales,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So that we may buy the poor [as slaves] for silver [since they are unable to support themselves]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See 2:6.
    marker-yv: yv-n
  - type: text
    text: needy for a pair of sandals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that we may sell the leftovers of the wheat [as if it were a good grade of grain]?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has sworn [an oath] by the pride of Jacob,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Surely I shall never forget [nor leave unpunished] any of their [rebellious] acts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Because of this [coming judgment] will the land not quake
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everyone mourn who dwells in it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, all of it shall rise up like the Nile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will be tossed around [from the impact of judgment]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [afterward] subside again like the Nile of Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “It shall come about in that day,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “That I shall cause the sun to go down at noon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I shall darken the earth in broad daylight. [Ezek 32:7-10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“And I shall turn your festivals '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feasts into mourning'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all your songs into dirges (funeral poems to be sung);
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I shall cause sackcloth to be put on everyone’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The midsection of the body between the lower ribs and the thighs.
    marker-yv: yv-n
  - type: text
    text: loins
- type: usfm
  marker: q1
  children:
  - type: text
    text: And baldness on every head [shaved for mourning].
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I shall make that time like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a time of
  - type: text
    text: ' mourning for an only son [who has died],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the end of it shall be like a bitter day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶“Behold, the days are coming,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I will send hunger over the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not hunger for bread or a thirst for water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But rather [a hunger] for hearing the words of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “People shall stagger from sea to sea [to the very ends of the earth]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the north even to the east;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will roam here and there to seek the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [longing for it as essential for life],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they will not find it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “In that day the beautiful virgins
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [even the vigorous] young men shall faint from thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Those who swear [their oaths] by the sin (guilt) of Samaria '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' Ashimah (a pagan goddess),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say, ‘By the life of your god [the golden calf], O Dan!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [swear], ‘By the life of the way of [idolatrous] Beersheba,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shall fall and not rise again.”
