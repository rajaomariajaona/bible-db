  - type: text
    text: Psalm 55
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer for the Destruction of the Treacherous.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician; with stringed instruments. A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem, of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to my prayer, O God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not hide Yourself from my plea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Listen to me and answer me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am restless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distraught in my complaint and distracted'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Because of the voice of the enemy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the pressure of the wicked;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they bring down trouble on me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in anger they persecute me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶My heart is in anguish within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the terrors of death have fallen upon me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fear and trembling have come upon me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horror has overwhelmed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And I say, “Oh, that I had wings like a dove!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I would fly away and be at rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I would wander far away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I would lodge in the [peace of the] wilderness. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I would hurry to my refuge [my tranquil shelter far away]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the stormy wind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from the tempest.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: swallow up
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Confuse [my enemies], O Lord, divide their tongues [destroying their schemes],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have seen violence and strife in the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Day and night they go around her walls;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wickedness and mischief are in her midst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Destruction is within her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oppression and deceit do not depart from her streets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' market places.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶For it is not an enemy who taunts me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I could bear it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is it one who has hated me who insolently exalts himself against me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I could hide from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But it is you, a man my equal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my counsel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My companion and my familiar friend;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'We who had sweet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: counsel;
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: intimacy
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: fellowship together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who walked to the house of God in company.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let death come deceitfully upon them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them go down alive to Sheol (the nether world, the place of the dead),
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For evil [of every kind] is in their dwelling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in their hearts, in their midst.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶As for me, I shall call upon God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will save me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Evening and morning and at noon I will complain and murmur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will hear my voice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He has redeemed my life in peace from the battle that was against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For there were many against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God will hear and humble them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Even He who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: abides
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'sits enthroned from old— '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because in them there has been no change [of heart],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they do not fear God [at all].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He [my companion] has put out his hands against those who were at peace with him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He has '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: profaned
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: broken his covenant [of friendship and loyalty].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The words of his mouth were smoother than butter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But his heart was hostile;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His words were softer than oil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet they were drawn swords.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶Cast your burden on the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [release it] and He will sustain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uphold you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will never allow the righteous to be shaken (slip, fall, fail). [1 Pet 5:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But You, O God, will bring down the wicked to the pit of destruction;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Men of blood and treachery will not live out half their days.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I will [boldly and unwaveringly] trust in You.
