document_id: PSA.55,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 55
  - type: heading
    content: Prayer for the Destruction of the Treacherous.
  - type: text
    content: 'To the Chief Musician; with stringed instruments. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem, of David.'
  - type: text
    content: Listen to my prayer, O God,
  - type: text
    content: And do not hide Yourself from my plea.
  '10':
  - type: text
    content: Day and night they go around her walls;
  - type: text
    content: Wickedness and mischief are in her midst.
  '11':
  - type: text
    content: Destruction is within her;
  - type: text
    content: 'Oppression and deceit do not depart from her streets '
  - type: text
    content: and
  - type: text
    content: ' market places.'
  '12':
  - type: text
    content: ¶For it is not an enemy who taunts me—
  - type: text
    content: Then I could bear it;
  - type: text
    content: Nor is it one who has hated me who insolently exalts himself against me—
  - type: text
    content: Then I could hide from him.
  '13':
  - type: text
    content: 'But it is you, a man my equal '
  - type: text
    content: and
  - type: text
    content: ' my counsel,'
  - type: text
    content: My companion and my familiar friend;
  '14':
  - type: text
    content: 'We who had sweet '
  - type: note
    content: Lit counsel; or intimacy.
  - type: text
    content: fellowship together,
  - type: text
    content: Who walked to the house of God in company.
  '15':
  - type: text
    content: Let death come deceitfully upon them;
  - type: text
    content: Let them go down alive to Sheol (the nether world, the place of the dead),
  - type: text
    content: 'For evil [of every kind] is in their dwelling '
  - type: text
    content: and
  - type: text
    content: ' in their hearts, in their midst.'
  '16':
  - type: text
    content: ¶As for me, I shall call upon God,
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will save me.'
  '17':
  - type: text
    content: Evening and morning and at noon I will complain and murmur,
  - type: text
    content: And He will hear my voice.
  '18':
  - type: text
    content: He has redeemed my life in peace from the battle that was against me,
  - type: text
    content: For there were many against me.
  '19':
  - type: text
    content: God will hear and humble them,
  - type: text
    content: 'Even He who '
  - type: note
    content: Or abides.
  - type: text
    content: 'sits enthroned from old— '
  - type: text
    content: Selah.
  - type: text
    content: Because in them there has been no change [of heart],
  - type: text
    content: And they do not fear God [at all].
  '2':
  - type: text
    content: Listen to me and answer me;
  - type: text
    content: 'I am restless '
  - type: text
    content: and
  - type: text
    content: ' distraught in my complaint and distracted'
  '20':
  - type: text
    content: He [my companion] has put out his hands against those who were at peace with him;
  - type: text
    content: 'He has '
  - type: note
    content: Lit profaned.
  - type: text
    content: broken his covenant [of friendship and loyalty].
  '21':
  - type: text
    content: The words of his mouth were smoother than butter,
  - type: text
    content: But his heart was hostile;
  - type: text
    content: His words were softer than oil,
  - type: text
    content: Yet they were drawn swords.
  '22':
  - type: text
    content: ¶Cast your burden on the L
  - type: heading
    content: ord
  - type: text
    content: ' [release it] and He will sustain '
  - type: text
    content: and
  - type: text
    content: ' uphold you;'
  - type: text
    content: He will never allow the righteous to be shaken (slip, fall, fail). [1 Pet 5:7]
  '23':
  - type: text
    content: But You, O God, will bring down the wicked to the pit of destruction;
  - type: text
    content: Men of blood and treachery will not live out half their days.
  - type: text
    content: But I will [boldly and unwaveringly] trust in You.
  '3':
  - type: text
    content: Because of the voice of the enemy,
  - type: text
    content: Because of the pressure of the wicked;
  - type: text
    content: For they bring down trouble on me,
  - type: text
    content: And in anger they persecute me.
  '4':
  - type: text
    content: ¶My heart is in anguish within me,
  - type: text
    content: And the terrors of death have fallen upon me.
  '5':
  - type: text
    content: Fear and trembling have come upon me;
  - type: text
    content: Horror has overwhelmed me.
  '6':
  - type: text
    content: And I say, “Oh, that I had wings like a dove!
  - type: text
    content: I would fly away and be at rest.
  '7':
  - type: text
    content: “I would wander far away,
  - type: text
    content: 'I would lodge in the [peace of the] wilderness. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: “I would hurry to my refuge [my tranquil shelter far away]
  - type: text
    content: 'From the stormy wind '
  - type: text
    content: and
  - type: text
    content: ' from the tempest.”'
  '9':
  - type: text
    content: ¶
  - type: note
    content: Lit swallow up.
  - type: text
    content: Confuse [my enemies], O Lord, divide their tongues [destroying their schemes],
  - type: text
    content: For I have seen violence and strife in the city.
