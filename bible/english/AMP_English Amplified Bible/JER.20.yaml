document_id: JER.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Pashhur Persecutes Jeremiah
  - type: text
    content: Now Pashhur the son of Immer, the priest, who was [also] chief officer in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', heard Jeremiah prophesying these things. '
  '10':
  - type: text
    content: 'For I have heard the whispering '
  - type: text
    content: and
  - type: text
    content: ' defaming words of many,'
  - type: text
    content: “Terror on every side!
  - type: text
    content: Denounce him! Let us denounce him!”
  - type: text
    content: 'All my familiar '
  - type: text
    content: and
  - type: text
    content: ' trusted friends,'
  - type: text
    content: '[Those who are] watching for my fall, say,'
  - type: text
    content: '“Perhaps he will be persuaded '
  - type: text
    content: and
  - type: text
    content: ' deceived; then we will overcome him,'
  - type: text
    content: And take our revenge on him.”
  '11':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' is with me as a dread champion [one to be greatly feared];'
  - type: text
    content: Therefore my persecutors will stumble and not overcome [me].
  - type: text
    content: 'They will be completely shamed, for they have not acted wisely '
  - type: text
    content: and
  - type: text
    content: ' have failed [in their schemes];'
  - type: text
    content: Their eternal dishonor will never be forgotten.
  '12':
  - type: text
    content: But, O L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, You who examine the righteous,'
  - type: text
    content: Who see the heart and the mind,
  - type: text
    content: Let me see Your vengeance on them;
  - type: text
    content: For to You I have committed my cause.
  '13':
  - type: text
    content: Sing to the L
  - type: heading
    content: ord
  - type: text
    content: '! Praise the L'
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: For He has rescued the life of the needy one
  - type: text
    content: From the hand of evildoers.
  '14':
  - type: text
    content: ¶Cursed be the day on which I was born;
  - type: text
    content: Do not bless the day on which my mother gave birth to me!
  '15':
  - type: text
    content: Cursed be the man who brought the news
  - type: text
    content: To my father, saying,
  - type: text
    content: “A son has been born to you!”
  - type: text
    content: Making him very glad.
  '16':
  - type: text
    content: And let that man be like the cities
  - type: text
    content: Which the L
  - type: heading
    content: ord
  - type: text
    content: ' overthrew without regret.'
  - type: text
    content: Let him hear an outcry in the morning
  - type: text
    content: And a shout of alarm at noon;
  '17':
  - type: text
    content: Because he did not kill me before my birth,
  - type: text
    content: So that my mother might have been my grave,
  - type: text
    content: And her womb always pregnant.
  '18':
  - type: text
    content: Why did I come out of the womb
  - type: text
    content: To see trouble and sorrow,
  - type: text
    content: So that my days have been filled with shame?
  '2':
  - type: text
    content: Then Pashhur beat Jeremiah the prophet and put him in the stocks that were at the upper Benjamin Gate by the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. [Jer 1:19; 15:15] '
  '3':
  - type: text
    content: And the next day Pashhur brought Jeremiah out of the stocks. Then Jeremiah said to him, “The L
  - type: heading
    content: ord
  - type: text
    content: ' does not call your name Pashhur, but Magor-missabib (terror on every side). '
  '4':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Behold, I will make you a terror to yourself and to all your friends; they will fall by the sword of their enemies while you look on. And I will give all Judah into the hand of the king of Babylon; he will carry them away to Babylon as captives and will slaughter them with the sword. '
  '5':
  - type: text
    content: 'Moreover, I will hand over all the riches of this city, all the result of its labor, all its precious things; even all the treasures of the kings of Judah I will hand over to their enemies, and they will plunder them, and take them away and carry them to Babylon. '
  '6':
  - type: text
    content: And you, Pashhur, and all who live in your house will go into captivity; you will go to Babylon, and there you will die and be buried, you and all your friends to whom you have falsely prophesied.’ ”
  - type: heading
    content: Jeremiah’s Complaint
  '7':
  - type: text
    content: ¶[Jeremiah said,] O L
  - type: heading
    content: ord
  - type: text
    content: ', You have persuaded me and I was deceived;'
  - type: text
    content: You are stronger than I and You have prevailed.
  - type: text
    content: I am a laughingstock all day long;
  - type: text
    content: Everyone mocks me.
  '8':
  - type: text
    content: For whenever I speak, I must shout out;
  - type: text
    content: I shout violence and destruction,
  - type: text
    content: Because the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' has become to me'
  - type: text
    content: 'A reprimand and a mockery '
  - type: text
    content: and
  - type: text
    content: ' has brought me insult all day long.'
  '9':
  - type: text
    content: If I say, “I will not remember Him
  - type: text
    content: Or speak His name anymore,”
  - type: text
    content: Then my heart becomes a burning fire
  - type: text
    content: Shut up in my bones.
  - type: text
    content: 'And I am weary of enduring '
  - type: text
    content: and
  - type: text
    content: ' holding it in;'
  - type: text
    content: I cannot endure it [nor contain it any longer].
