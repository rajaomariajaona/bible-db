document_id: JER.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pashhur Persecutes Jeremiah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now Pashhur the son of Immer, the priest, who was [also] chief officer in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', heard Jeremiah prophesying these things. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For I have heard the whispering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defaming words of many,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Terror on every side!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Denounce him! Let us denounce him!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All my familiar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted friends,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Those who are] watching for my fall, say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Perhaps he will be persuaded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceived; then we will overcome him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take our revenge on him.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is with me as a dread champion [one to be greatly feared];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore my persecutors will stumble and not overcome [me].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will be completely shamed, for they have not acted wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have failed [in their schemes];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their eternal dishonor will never be forgotten.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, You who examine the righteous,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who see the heart and the mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me see Your vengeance on them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For to You I have committed my cause.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! Praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has rescued the life of the needy one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the hand of evildoers.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶Cursed be the day on which I was born;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not bless the day on which my mother gave birth to me!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Cursed be the man who brought the news
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To my father, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A son has been born to you!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making him very glad.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And let that man be like the cities
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' overthrew without regret.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him hear an outcry in the morning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a shout of alarm at noon;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Because he did not kill me before my birth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that my mother might have been my grave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her womb always pregnant.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Why did I come out of the womb
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To see trouble and sorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that my days have been filled with shame?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then Pashhur beat Jeremiah the prophet and put him in the stocks that were at the upper Benjamin Gate by the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Jer 1:19; 15:15] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And the next day Pashhur brought Jeremiah out of the stocks. Then Jeremiah said to him, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does not call your name Pashhur, but Magor-missabib (terror on every side). '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘Behold, I will make you a terror to yourself and to all your friends; they will fall by the sword of their enemies while you look on. And I will give all Judah into the hand of the king of Babylon; he will carry them away to Babylon as captives and will slaughter them with the sword. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moreover, I will hand over all the riches of this city, all the result of its labor, all its precious things; even all the treasures of the kings of Judah I will hand over to their enemies, and they will plunder them, and take them away and carry them to Babylon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And you, Pashhur, and all who live in your house will go into captivity; you will go to Babylon, and there you will die and be buried, you and all your friends to whom you have falsely prophesied.’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah’s Complaint
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶[Jeremiah said,] O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You have persuaded me and I was deceived;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are stronger than I and You have prevailed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am a laughingstock all day long;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone mocks me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For whenever I speak, I must shout out;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shout violence and destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has become to me'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A reprimand and a mockery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has brought me insult all day long.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If I say, “I will not remember Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or speak His name anymore,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then my heart becomes a burning fire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shut up in my bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I am weary of enduring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' holding it in;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cannot endure it [nor contain it any longer].
