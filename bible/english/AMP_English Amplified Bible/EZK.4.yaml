document_id: EZK.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Siege of Jerusalem Predicted
  - type: text
    content: '“Now you, son of man, take a brick, place it before you and inscribe on it [a diagram of] the city of Jerusalem. '
  '10':
  - type: text
    content: 'The food you eat each day '
  - type: text
    content: shall be
  - type: text
    content: ' [measured] by weight, '
  - type: note
    content: About a half pound.
  - type: text
    content: 'twenty shekels, to be eaten daily at a set time. '
  '11':
  - type: text
    content: 'You shall drink water by measure also, '
  - type: note
    content: About a quart.
  - type: text
    content: 'the sixth part of a hin; you shall drink daily at a set time. '
  '12':
  - type: text
    content: 'You shall eat your food as barley cakes, having baked it in their sight over human dung.” '
  '13':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Thus the children of Israel will eat their bread unclean '
  - type: text
    content: and
  - type: text
    content: ' defiled among the nations where I will banish them.” [Hos 9:3] '
  '14':
  - type: text
    content: But I said, “Ah, Lord G
  - type: heading
    content: od
  - type: text
    content: '! Behold (hear me), I have never been defiled; for from my youth until now I have never eaten what died on its own or was torn by beasts, nor has any unclean meat ever entered my mouth.” [Acts 10:14] '
  '15':
  - type: text
    content: 'Then He said to me, “See, I will let you use cow’s dung instead of human dung over which you shall prepare your food.” '
  '16':
  - type: text
    content: 'Moreover, He said to me, “Son of man, behold (listen carefully), I am going to break the staff of bread [that supports life] in Jerusalem; and they shall eat bread [rationed] by weight and [eat it] with anxiety '
  - type: text
    content: and
  - type: text
    content: ' fear, and drink water by measure and [drink it] in horror [of the impending starvation], [Lev 26:26; Ps 105:16; Is 3:1] '
  '17':
  - type: text
    content: because bread and water will be scarce; and they will look at one another in dismay and waste away [in punishment] for their wickedness.
  '2':
  - type: text
    content: 'Then lay siege against it, build a siege wall, raise a ramp against it; set up [enemy] camps and place battering rams all around it. '
  '3':
  - type: text
    content: Further, take an iron plate and place it as an iron wall between you and the city, and set your face toward it so that it is under siege, and besiege it. This is a sign to the house of Israel.
  '4':
  - type: text
    content: '“Then lie down on your left side (toward the north) to bear [symbolically] the wickedness '
  - type: text
    content: and
  - type: text
    content: ' punishment of the '
  - type: note
    content: I.e. the ten tribes of the Northern Kingdom.
  - type: text
    content: 'house of Israel. You shall bear their wickedness '
  - type: text
    content: and
  - type: text
    content: ' punishment for the number of days that you lie on your side. '
  '5':
  - type: text
    content: 'For I have assigned you the years of their wickedness '
  - type: text
    content: and
  - type: text
    content: ' punishment, according to the number of the days, three hundred and ninety days [representing three hundred and ninety years]; in this way you shall bear [symbolically] the wickedness '
  - type: text
    content: and
  - type: text
    content: ' punishment of the house of Israel. '
  '6':
  - type: text
    content: 'When you have completed these [days for Israel], lie down again, but on your right side (toward the south), and you shall bear the wickedness '
  - type: text
    content: and
  - type: text
    content: ' punishment of the '
  - type: note
    content: I.e. the two tribes of the Southern Kingdom.
  - type: text
    content: 'house of Judah forty days. I have assigned you one day for each year. '
  '7':
  - type: text
    content: 'Then you shall set your face toward the siege of Jerusalem with your arm bared and prophesy against it. '
  '8':
  - type: text
    content: Now behold, I will put ropes on you so that you cannot turn from one side to the other until you have completed the days of your siege.
  - type: heading
    content: Defiled Bread
  '9':
  - type: text
    content: '“But as for you, take wheat, barley, beans, lentils, millet, and spelt, and put them into one vessel and make them into bread for yourself. You shall eat it according to the number of the days that you lie on your side, three hundred and ninety days. '
