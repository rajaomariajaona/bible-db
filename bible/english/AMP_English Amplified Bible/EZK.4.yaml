document_id: EZK.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Siege of Jerusalem Predicted
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now you, son of man, take a brick, place it before you and inscribe on it [a diagram of] the city of Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The food you eat each day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' [measured] by weight, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About a half pound.
      marker-yv: yv-n
    - type: text
      text: 'twenty shekels, to be eaten daily at a set time. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'You shall drink water by measure also, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About a quart.
      marker-yv: yv-n
    - type: text
      text: 'the sixth part of a hin; you shall drink daily at a set time. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'You shall eat your food as barley cakes, having baked it in their sight over human dung.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Thus the children of Israel will eat their bread unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiled among the nations where I will banish them.” [Hos 9:3] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But I said, “Ah, Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '! Behold (hear me), I have never been defiled; for from my youth until now I have never eaten what died on its own or was torn by beasts, nor has any unclean meat ever entered my mouth.” [Acts 10:14] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then He said to me, “See, I will let you use cow’s dung instead of human dung over which you shall prepare your food.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Moreover, He said to me, “Son of man, behold (listen carefully), I am going to break the staff of bread [that supports life] in Jerusalem; and they shall eat bread [rationed] by weight and [eat it] with anxiety '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear, and drink water by measure and [drink it] in horror [of the impending starvation], [Lev 26:26; Ps 105:16; Is 3:1] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: because bread and water will be scarce; and they will look at one another in dismay and waste away [in punishment] for their wickedness.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then lay siege against it, build a siege wall, raise a ramp against it; set up [enemy] camps and place battering rams all around it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Further, take an iron plate and place it as an iron wall between you and the city, and set your face toward it so that it is under siege, and besiege it. This is a sign to the house of Israel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Then lie down on your left side (toward the north) to bear [symbolically] the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the ten tribes of the Northern Kingdom.
      marker-yv: yv-n
    - type: text
      text: 'house of Israel. You shall bear their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment for the number of days that you lie on your side. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For I have assigned you the years of their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment, according to the number of the days, three hundred and ninety days [representing three hundred and ninety years]; in this way you shall bear [symbolically] the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment of the house of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When you have completed these [days for Israel], lie down again, but on your right side (toward the south), and you shall bear the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the two tribes of the Southern Kingdom.
      marker-yv: yv-n
    - type: text
      text: 'house of Judah forty days. I have assigned you one day for each year. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then you shall set your face toward the siege of Jerusalem with your arm bared and prophesy against it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Now behold, I will put ropes on you so that you cannot turn from one side to the other until you have completed the days of your siege.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Defiled Bread
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“But as for you, take wheat, barley, beans, lentils, millet, and spelt, and put them into one vessel and make them into bread for yourself. You shall eat it according to the number of the days that you lie on your side, three hundred and ninety days. '
