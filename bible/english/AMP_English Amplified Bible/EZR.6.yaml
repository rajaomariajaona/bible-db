  '3':
  - type: text
    content: 'In the first year of King Cyrus, Cyrus the king issued a decree: ‘'
  - type: text
    content: Concerning
  - type: text
    content: ' the house of God in Jerusalem, let the temple (house), the place where sacrifices are offered, be rebuilt and let its foundations be strongly laid, its height and its width each 60 cubits, '
  '4':
  - type: text
    content: 'with three layers of huge stones and one layer of timbers. Let the cost be paid from the royal treasury. '
  '5':
  - type: text
    content: Also let the gold and silver utensils of the house of God, which Nebuchadnezzar took from the temple in Jerusalem and brought to Babylon, be returned and brought back to their [proper] places in the temple in Jerusalem; and you shall put them in the house of God.’
  '6':
  - type: text
    content: '“Now '
  - type: text
    content: therefore,
  - type: text
    content: ' Tattenai, governor of '
  - type: text
    content: the province
  - type: text
    content: ' '
  - type: note
    content: Lit beyond and so throughout.
  - type: text
    content: 'west of the [Euphrates] River, Shethar-bozenai and your associates, the officials who are west of the River, keep far away from there. '
  '7':
  - type: text
    content: 'Leave the work on this house of God alone; let the governor of the Jews and the Jewish elders rebuild this house of God on its site. '
  '8':
  - type: text
    content: 'Also, I issue a decree as to what you are to do for these Jewish elders for the rebuilding of this house of God: the full cost is to be paid to these people from the royal treasury out of the taxes of '
  - type: text
    content: the provinces
  - type: text
    content: ' west of the River, and that without delay. '
  '9':
  - type: text
    content: 'Whatever is needed, including young bulls, rams, and lambs for the burnt offerings to the God of heaven, and wheat, salt, wine, and anointing oil, according to the request of the priests at Jerusalem, let it all be given to them daily without fail, '
