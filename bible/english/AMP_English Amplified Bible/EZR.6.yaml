  '14':
  - type: text
    content: 'And the Jewish elders built and prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. They finished their building as commanded by the God of Israel and in accordance with the decree of Cyrus and Darius and Artaxerxes king of Persia. '
  '15':
  - type: text
    content: 'This temple was finished on the third day of the month of Adar, in the '
  - type: note
    content: I.e. 516 b.c.
  - type: text
    content: sixth year of the reign of King Darius.
  '16':
  - type: text
    content: 'And all Israel—the priests, the Levites, and the rest of the [former] exiles—celebrated the dedication of this house of God with joy. '
  '17':
  - type: text
    content: 'They offered at the dedication of this house of God 100 bulls, 200 rams, 400 lambs, and, as a sin offering for all Israel, 12 male goats, according to the number of Israel’s tribes. '
  '18':
  - type: text
    content: Then they appointed the priests to their divisions and the Levites in their orders for the service of God at Jerusalem, as it is written in the book of Moses.
  - type: heading
    content: The Passover Observed
  '19':
  - type: text
    content: 'The [former] exiles kept the Passover on the fourteenth [day] of the first month. '
  '2':
  - type: text
    content: 'In Ecbatana in the fortress (palace) in the province of Media, a scroll was found on which this was recorded: “Memorandum— '
  '20':
