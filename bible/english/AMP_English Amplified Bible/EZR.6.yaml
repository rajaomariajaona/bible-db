document_id: EZR.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Darius Finds Cyrus’ Decree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then King Darius issued a decree, and a search was conducted in Babylon in the archives where the treasures [and records] were stored. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In Ecbatana in the fortress (palace) in the province of Media, a scroll was found on which this was recorded: “Memorandum— '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In the first year of King Cyrus, Cyrus the king issued a decree: ‘'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Concerning
  - type: text
    text: ' the house of God in Jerusalem, let the temple (house), the place where sacrifices are offered, be rebuilt and let its foundations be strongly laid, its height and its width each 60 cubits, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'with three layers of huge stones and one layer of timbers. Let the cost be paid from the royal treasury. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Also let the gold and silver utensils of the house of God, which Nebuchadnezzar took from the temple in Jerusalem and brought to Babylon, be returned and brought back to their [proper] places in the temple in Jerusalem; and you shall put them in the house of God.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: therefore,
  - type: text
    text: ' Tattenai, governor of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the province
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: beyond
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'west of the [Euphrates] River, Shethar-bozenai and your associates, the officials who are west of the River, keep far away from there. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leave the work on this house of God alone; let the governor of the Jews and the Jewish elders rebuild this house of God on its site. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also, I issue a decree as to what you are to do for these Jewish elders for the rebuilding of this house of God: the full cost is to be paid to these people from the royal treasury out of the taxes of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the provinces
  - type: text
    text: ' west of the River, and that without delay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Whatever is needed, including young bulls, rams, and lambs for the burnt offerings to the God of heaven, and wheat, salt, wine, and anointing oil, according to the request of the priests at Jerusalem, let it all be given to them daily without fail, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'so that they may offer pleasing (sweet-smelling) sacrifices to the God of heaven and pray for the life of the king and his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I have also issued a decree that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if there is
  - type: text
    text: ' any man who violates this edict, a beam of timber shall be pulled from his house [and set up]; then he shall be impaled on it, and his house shall be turned into a refuse heap for this [violation]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'May the God who has caused His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Deut 12:5.
    marker-yv: yv-n
  - type: text
    text: 'Name to dwell there overthrow any king or people who attempts to alter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this command,
  - type: text
    text: ' so as to destroy this house of God in Jerusalem. I, Darius, have issued this decree; let it be carried out quickly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with due diligence.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Temple Completed and Dedicated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Tattenai, governor of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the province
  - type: text
    text: ' west of the [Euphrates] River, with Shethar-bozenai and their associates carried out the decree with due diligence, just as King Darius had sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the Jewish elders built and prospered through the prophesying of Haggai the prophet and Zechariah the son of Iddo. They finished their building as commanded by the God of Israel and in accordance with the decree of Cyrus and Darius and Artaxerxes king of Persia. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This temple was finished on the third day of the month of Adar, in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I.e. 516 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: sixth year of the reign of King Darius.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And all Israel—the priests, the Levites, and the rest of the [former] exiles—celebrated the dedication of this house of God with joy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They offered at the dedication of this house of God 100 bulls, 200 rams, 400 lambs, and, as a sin offering for all Israel, 12 male goats, according to the number of Israel’s tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then they appointed the priests to their divisions and the Levites in their orders for the service of God at Jerusalem, as it is written in the book of Moses.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Passover Observed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The [former] exiles kept the Passover on the fourteenth [day] of the first month. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the priests and the Levites had purified themselves together; all of them were [ceremonially] clean. So they slaughtered the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lamb
  - type: text
    text: ' for all the exiles, for their brothers the priests, and for themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Passover
  - type: text
    text: ' was eaten by the sons (descendants) of Israel (Jacob) who returned from exile and by all those who had separated themselves from the [ceremonial] uncleanness of the nations of the land to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: join
  - type: text
    text: ' them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in order
  - type: text
    text: ' to seek the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They observed the Feast of Unleavened Bread for seven days with joy, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had caused them to rejoice and had turned the heart of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the many titles of Darius king of Persia, in the sense that Persia had conquered territories that were previously Assyrian.
    marker-yv: yv-n
  - type: text
    text: 'the king of Assyria toward them, so that he encouraged them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened their hands in the work of the house of God, the God of Israel.'
