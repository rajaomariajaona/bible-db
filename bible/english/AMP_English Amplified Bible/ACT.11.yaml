  '1':
  - type: heading
    content: Peter Reports at Jerusalem
  - type: text
    content: 'Now the apostles and the believers who were throughout Judea heard [with astonishment] that the Gentiles also had received '
  - type: text
    content: and
  - type: text
    content: ' accepted the word of God [the message concerning salvation through Christ]. '
  '10':
  - type: text
    content: 'This happened three times, and everything was drawn up again into heaven. '
  '11':
  - type: text
    content: 'And right then the three men who had been sent to me from Caesarea arrived at the house where we were '
  - type: text
    content: staying
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'The Spirit told me to go with them without the slightest hesitation. So these six brothers also went with me and we went to the man’s house. '
  '13':
  - type: text
    content: 'And Cornelius told us how he had seen the angel standing in his house, saying, ‘Send '
  - type: text
    content: word
  - type: text
    content: ' to Joppa and have Simon, who is also called Peter, brought here; '
  '14':
  - type: text
    content: 'he will bring a message to you by which you will be saved [and granted eternal life], you and all your household.’ '
  '15':
  - type: text
    content: 'When I began to speak, the Holy Spirit fell on them just as '
  - type: text
    content: He did
  - type: text
    content: ' on us at the beginning [at Pentecost]. [Acts 2:1-4] '
  '16':
  - type: text
    content: 'Then I remembered the word of the Lord, how He used to say, '
  - type: text
    content: ‘John baptized with water, but you will be baptized with the Holy Spirit.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So, if God gave Gentiles the same gift [equally] as He gave us after we accepted '
  - type: text
    content: and
  - type: text
    content: ' believed '
  - type: text
    content: and
  - type: text
    content: ' trusted in the Lord Jesus Christ [as Savior], who was I to interfere '
  - type: text
    content: or
  - type: text
    content: ' stand in God’s way?” '
  '18':
  - type: text
    content: 'When they heard this, they quieted down and glorified '
  - type: text
    content: and
  - type: text
    content: ' praised God, saying, “Then God has also granted to the Gentiles repentance '
  - type: text
    content: that leads
  - type: text
    content: ' to '
  - type: text
    content: eternal
  - type: text
    content: ' life [that is, real life after earthly death].”'
  - type: heading
    content: The Church at Antioch
  '19':
  - type: text
    content: 'So then [since they were unaware of these developments] those who were scattered because of the persecution that occurred in connection with [the stoning of] Stephen traveled as far as Phoenicia and Cyprus and Antioch, without telling the message [of salvation through Christ] to anyone except Jews. '
  '2':
  - type: text
    content: 'So when Peter went up to Jerusalem, those of the circumcision [certain Jewish believers who followed the Law] took issue with him [for violating Jewish customs], '
  '20':
  - type: text
    content: 'But there were some of them, men of Cyprus and Cyrene, who came to Antioch and '
  - type: text
    content: began
  - type: text
    content: ' speaking to the Greeks as well, proclaiming [to them] the good news about the Lord Jesus. '
  '21':
  - type: text
    content: 'And the hand (the power and presence) of the Lord was with them, and a great number who believed turned to the Lord [for salvation, accepting and drawing near to Jesus as Messiah and Savior]. '
  '22':
  - type: text
    content: 'The news of this reached the ears of the church in Jerusalem, and they sent Barnabas to Antioch. '
  '23':
  - type: text
    content: 'When he arrived and saw the grace of God [that was bestowed on them], he rejoiced and '
  - type: text
    content: began
  - type: text
    content: ' to encourage them all with an unwavering heart to stay true '
  - type: text
    content: and
  - type: text
    content: ' devoted to the Lord. '
  '24':
  - type: text
    content: 'For Barnabas was a good man [privately and publicly—his godly character benefited both himself and others] and '
  - type: text
    content: he was
  - type: text
    content: ' full of the Holy Spirit and full of faith [in Jesus the Messiah, through whom believers have everlasting life]. And a great number of people were brought to the Lord. '
  '25':
  - type: text
    content: 'And Barnabas left for Tarsus to search for Saul; '
  '26':
  - type: text
    content: and when he found him, he brought him back to Antioch. For an entire year they met [with others] in the church and instructed large numbers; and it was in Antioch that the disciples were first called Christians. [Acts 26:28; 1 Pet 4:16]
  '27':
  - type: text
    content: 'Now at this time some prophets came down from Jerusalem to Antioch. '
  '28':
  - type: text
    content: 'One of them named Agabus stood up and prophesied through the [Holy] Spirit that a severe famine would come on the '
  - type: note
    content: I.e. beyond the region.
  - type: text
    content: 'entire world. And this did happen during the reign of '
  - type: note
    content: Claudius Caesar was the fourth Roman Emperor (a.d. 41-54). He came to the throne after the assassination of his nephew, Caligula. He was succeeded by his adopted son, Nero.
  - type: text
    content: 'Claudius. '
  '29':
  - type: text
    content: 'So the disciples decided to send '
  - type: text
    content: a contribution,
  - type: text
    content: ' each according to his individual ability, to the believers who lived in Judea. '
  '3':
  - type: text
    content: 'saying, “You went to uncircumcised men and [even] ate with them!” '
  '30':
  - type: text
    content: And this they did, sending the contribution to the elders by Barnabas and Saul.
  '4':
  - type: text
    content: 'But Peter began [at the beginning] and explained [the events] to them step by step, saying, '
  '5':
  - type: text
    content: '“I was in the city of Joppa praying; and in a trance I saw a vision of an object coming down from heaven, like a huge sheet being lowered by the four corners; and [it descended until] it came right down to me, '
  '6':
  - type: text
    content: 'and looking closely at it, I saw '
  - type: text
    content: all kinds of
  - type: text
    content: ' the four-footed animals of the earth and the wild beasts and the crawling creatures and the birds of the air [both clean and unclean according to the Law], '
  '7':
  - type: text
    content: 'and I also heard a voice saying to me, ‘Get up, Peter; kill and eat.’ '
  '8':
  - type: text
    content: 'But I said, ‘Not at all, Lord; for nothing common (unholy) or [ceremonially] unclean has ever entered my mouth.’ '
  '9':
  - type: text
    content: 'But the voice from heaven answered a second time, ‘What God has cleansed '
  - type: text
    content: and
  - type: text
    content: ' pronounced clean, no longer consider common (unholy).’ '
