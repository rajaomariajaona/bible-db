document_id: ACT.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peter Reports at Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the apostles and the believers who were throughout Judea heard [with astonishment] that the Gentiles also had received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accepted the word of God [the message concerning salvation through Christ]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'This happened three times, and everything was drawn up again into heaven. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And right then the three men who had been sent to me from Caesarea arrived at the house where we were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: staying
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The Spirit told me to go with them without the slightest hesitation. So these six brothers also went with me and we went to the man’s house. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Cornelius told us how he had seen the angel standing in his house, saying, ‘Send '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Joppa and have Simon, who is also called Peter, brought here; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'he will bring a message to you by which you will be saved [and granted eternal life], you and all your household.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When I began to speak, the Holy Spirit fell on them just as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He did
    - type: text
      text: ' on us at the beginning [at Pentecost]. [Acts 2:1-4] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then I remembered the word of the Lord, how He used to say, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘John baptized with water, but you will be baptized with the Holy Spirit.’
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So, if God gave Gentiles the same gift [equally] as He gave us after we accepted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted in the Lord Jesus Christ [as Savior], who was I to interfere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' stand in God’s way?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When they heard this, they quieted down and glorified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised God, saying, “Then God has also granted to the Gentiles repentance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that leads
    - type: text
      text: ' to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eternal
    - type: text
      text: ' life [that is, real life after earthly death].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Church at Antioch
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So then [since they were unaware of these developments] those who were scattered because of the persecution that occurred in connection with [the stoning of] Stephen traveled as far as Phoenicia and Cyprus and Antioch, without telling the message [of salvation through Christ] to anyone except Jews. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So when Peter went up to Jerusalem, those of the circumcision [certain Jewish believers who followed the Law] took issue with him [for violating Jewish customs], '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But there were some of them, men of Cyprus and Cyrene, who came to Antioch and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' speaking to the Greeks as well, proclaiming [to them] the good news about the Lord Jesus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the hand (the power and presence) of the Lord was with them, and a great number who believed turned to the Lord [for salvation, accepting and drawing near to Jesus as Messiah and Savior]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The news of this reached the ears of the church in Jerusalem, and they sent Barnabas to Antioch. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When he arrived and saw the grace of God [that was bestowed on them], he rejoiced and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to encourage them all with an unwavering heart to stay true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devoted to the Lord. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For Barnabas was a good man [privately and publicly—his godly character benefited both himself and others] and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he was
    - type: text
      text: ' full of the Holy Spirit and full of faith [in Jesus the Messiah, through whom believers have everlasting life]. And a great number of people were brought to the Lord. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And Barnabas left for Tarsus to search for Saul; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: and when he found him, he brought him back to Antioch. For an entire year they met [with others] in the church and instructed large numbers; and it was in Antioch that the disciples were first called Christians. [Acts 26:28; 1 Pet 4:16]
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now at this time some prophets came down from Jerusalem to Antioch. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'One of them named Agabus stood up and prophesied through the [Holy] Spirit that a severe famine would come on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. beyond the region.
      marker-yv: yv-n
    - type: text
      text: 'entire world. And this did happen during the reign of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Claudius Caesar was the fourth Roman Emperor (
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 41-54). He came to the throne after the assassination of his nephew, Caligula. He was succeeded by his adopted son, Nero.
      marker-yv: yv-n
    - type: text
      text: 'Claudius. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So the disciples decided to send '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a contribution,
    - type: text
      text: ' each according to his individual ability, to the believers who lived in Judea. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'saying, “You went to uncircumcised men and [even] ate with them!” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And this they did, sending the contribution to the elders by Barnabas and Saul.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But Peter began [at the beginning] and explained [the events] to them step by step, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“I was in the city of Joppa praying; and in a trance I saw a vision of an object coming down from heaven, like a huge sheet being lowered by the four corners; and [it descended until] it came right down to me, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and looking closely at it, I saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all kinds of
    - type: text
      text: ' the four-footed animals of the earth and the wild beasts and the crawling creatures and the birds of the air [both clean and unclean according to the Law], '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and I also heard a voice saying to me, ‘Get up, Peter; kill and eat.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But I said, ‘Not at all, Lord; for nothing common (unholy) or [ceremonially] unclean has ever entered my mouth.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But the voice from heaven answered a second time, ‘What God has cleansed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pronounced clean, no longer consider common (unholy).’ '
