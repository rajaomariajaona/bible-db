type_code: eng
verses:
  '1':
  - type: heading
    content: Ezra Reads the Law
  - type: text
    content: Then all the people gathered together as one man at the open square in front of the Water Gate; and they asked Ezra the scribe to bring the Book of the Law of Moses which the L
  - type: heading
    content: ord
  - type: text
    content: ' had given to Israel. '
  '10':
  - type: text
    content: 'Then Ezra said to them, “Go [your way], eat the rich festival food, drink the sweet '
  - type: text
    content: drink,
  - type: text
    content: ' and send portions to him for whom nothing is prepared; for this day is holy to our Lord. And do not be worried, for the joy of the L'
  - type: heading
    content: ord
  - type: text
    content: ' is your strength '
  - type: text
    content: and
  - type: text
    content: ' your stronghold.” '
  '11':
  - type: text
    content: 'So the Levites quieted all the people, saying, “Be still, for the day is holy; do not be worried.” '
  '12':
  - type: text
    content: 'Then all the people went on their way to eat, to drink, to send portions [of food to others] and to celebrate a great festival, because they understood the words which had been '
  - type: note
    content: Lit made known.
  - type: text
    content: communicated to them.
  - type: heading
    content: Feast of Booths Restored
  '13':
  - type: text
    content: 'On the second day, all of the heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of all the people, the priests, and the Levites, were gathered before Ezra the scribe to gain insight into the words of '
  - type: note
    content: See note Ezra 3:2.
  - type: text
    content: 'the Law (divine instruction). '
  '14':
  - type: text
    content: They found written in the Law how the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded through Moses that the Israelites should live in booths (huts) during the feast of the seventh month. '
  '15':
  - type: text
    content: 'So they proclaimed and published an announcement in all their cities and in Jerusalem, saying, “Go out to the hills and bring olive branches, wild olive, myrtle, palm, and other leafy branches to make booths, as it is written.” [Lev 23:39, 40] '
  '16':
  - type: text
    content: 'So the people went out and brought them and made booths for themselves, each on the roof '
  - type: text
    content: of his house,
  - type: text
    content: ' and in their courtyards and the courtyards of God’s house, and in the open square of the Water Gate and in the square of the Gate of Ephraim. '
  '17':
  - type: text
    content: 'The entire assembly of those who had returned from the captivity made booths and lived in them. Indeed since the days of Joshua the son of Nun until that '
  - type: text
    content: very
  - type: text
    content: ' day, the Israelites had not done so. And there was great rejoicing '
  - type: text
    content: and
  - type: text
    content: ' celebration. '
  '18':
  - type: text
    content: 'Every day, from the first day to the last, Ezra read from the Book of the Law of God. They celebrated the feast for seven days; on the eighth day '
  - type: text
    content: there was
  - type: text
    content: ' a [closing] solemn assembly in accordance with the ordinance.'
  '2':
  - type: text
    content: 'So Ezra the priest brought the Law before the assembly of men, women and all who '
  - type: text
    content: could
  - type: text
    content: ' listen with understanding, on the first day of the seventh month. '
  '3':
  - type: text
    content: 'Then he read from it, in front of the open square which was in front of the Water Gate, from '
  - type: note
    content: Lit the light.
  - type: text
    content: 'early morning until midday, in the presence of the men and women, those who could understand; and '
  - type: note
    content: Lit in the ears of all the people.
  - type: text
    content: 'all the people listened carefully to the Book of the Law. '
  '4':
  - type: text
    content: 'Ezra the scribe stood on a [large] wooden platform which they had constructed for this purpose. And beside him [on the platform] stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah on his right; and Pedaiah, Mishael, Malchijah, Hashum, Hashbaddanah, Zechariah, and Meshullam on his left. '
  '5':
  - type: text
    content: 'Ezra opened the book in the sight of all the people, for he was standing above them; and when he opened it, all the people stood up. '
  '6':
  - type: text
    content: Then Ezra blessed the L
  - type: heading
    content: ord
  - type: text
    content: ', the great God. And all the people answered, “Amen, Amen!” while lifting up their hands; and they knelt down and worshiped the L'
  - type: heading
    content: ord
  - type: text
    content: ' with '
  - type: text
    content: their
  - type: text
    content: ' faces toward the ground. '
  '7':
  - type: text
    content: 'Also Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah, and the Levites, explained the Law to the people, and the people '
  - type: text
    content: remained
  - type: text
    content: ' in their places. '
  '8':
  - type: text
    content: So they read from the Book of the Law of God, translating and explaining it so that the people understood the reading.
  - type: heading
    content: “This Day Is Holy”
  '9':
  - type: text
    content: Then Nehemiah, who was the governor, and Ezra the priest and scribe, and the Levites who taught the people said to all the people, “This day is holy to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; do not mourn or weep.” For all the people were weeping when they heard the words of the Law. '
