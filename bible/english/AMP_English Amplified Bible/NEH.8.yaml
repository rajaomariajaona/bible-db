document_id: NEH.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ezra Reads the Law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the people gathered together as one man at the open square in front of the Water Gate; and they asked Ezra the scribe to bring the Book of the Law of Moses which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given to Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra said to them, “Go [your way], eat the rich festival food, drink the sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: drink,
    - type: text
      text: ' and send portions to him for whom nothing is prepared; for this day is holy to our Lord. And do not be worried, for the joy of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is your strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your stronghold.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Levites quieted all the people, saying, “Be still, for the day is holy; do not be worried.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the people went on their way to eat, to drink, to send portions [of food to others] and to celebrate a great festival, because they understood the words which had been '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: made known
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: communicated to them.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Feast of Booths Restored
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the second day, all of the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of all the people, the priests, and the Levites, were gathered before Ezra the scribe to gain insight into the words of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Ezra 3:2.
      marker-yv: yv-n
    - type: text
      text: 'the Law (divine instruction). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They found written in the Law how the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded through Moses that the Israelites should live in booths (huts) during the feast of the seventh month. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they proclaimed and published an announcement in all their cities and in Jerusalem, saying, “Go out to the hills and bring olive branches, wild olive, myrtle, palm, and other leafy branches to make booths, as it is written.” [Lev 23:39, 40] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people went out and brought them and made booths for themselves, each on the roof '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of his house,
    - type: text
      text: ' and in their courtyards and the courtyards of God’s house, and in the open square of the Water Gate and in the square of the Gate of Ephraim. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entire assembly of those who had returned from the captivity made booths and lived in them. Indeed since the days of Joshua the son of Nun until that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' day, the Israelites had not done so. And there was great rejoicing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebration. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every day, from the first day to the last, Ezra read from the Book of the Law of God. They celebrated the feast for seven days; on the eighth day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' a [closing] solemn assembly in accordance with the ordinance.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ezra the priest brought the Law before the assembly of men, women and all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: could
    - type: text
      text: ' listen with understanding, on the first day of the seventh month. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he read from it, in front of the open square which was in front of the Water Gate, from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the light
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'early morning until midday, in the presence of the men and women, those who could understand; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the ears of all the people
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'all the people listened carefully to the Book of the Law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezra the scribe stood on a [large] wooden platform which they had constructed for this purpose. And beside him [on the platform] stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah on his right; and Pedaiah, Mishael, Malchijah, Hashum, Hashbaddanah, Zechariah, and Meshullam on his left. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezra opened the book in the sight of all the people, for he was standing above them; and when he opened it, all the people stood up. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ezra blessed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the great God. And all the people answered, “Amen, Amen!” while lifting up their hands; and they knelt down and worshiped the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' faces toward the ground. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, Pelaiah, and the Levites, explained the Law to the people, and the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: remained
    - type: text
      text: ' in their places. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they read from the Book of the Law of God, translating and explaining it so that the people understood the reading.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “This Day Is Holy”
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Nehemiah, who was the governor, and Ezra the priest and scribe, and the Levites who taught the people said to all the people, “This day is holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God; do not mourn or weep.” For all the people were weeping when they heard the words of the Law. '
