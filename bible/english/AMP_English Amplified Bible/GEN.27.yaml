document_id: GEN.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob’s Deception
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Isaac was old and his eyes were too dim to see, he called his elder [and favorite] son Esau and said to him, “My son.” And Esau answered him, “Here I am.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Isaac said, “See here, I am old; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaac lived another forty-three years after this blessing was given to Jacob (35:27-29).
    marker-yv: yv-n
  - type: text
    text: 'I do not know '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the day of my death
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'when I may die. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So now, please take your [hunting] gear, your quiver [of arrows] and your bow, and go out into the open country and hunt game for me; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and make me a savory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delicious dish [of meat], the kind I love, and bring it to me to eat, so that my soul may bless you [as my firstborn son] before I die.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Rebekah overheard what Isaac said to Esau his son; and when Esau had gone to the open country to hunt for game that he might bring back, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rebekah said to Jacob her [younger and favorite] son, “Listen carefully: I heard your father saying to Esau your brother, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘Bring me some game and make me a savory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delicious dish [of meat], so that I may eat it, and declare my blessing on you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The patriarch’s formal blessing, offered before the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ', was equivalent to an inalterable command and prophecy, whose outcome was assured. For that reason it had great importance and tangible value, especially for the firstborn son. When Esau sold his birthright (25:33), he did not imagine that, as a consequence, he would actually lose the blessing to which he had originally been entitled as the firstborn.'
    marker-yv: yv-n
  - type: text
    text: in the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' before my death.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So now, my son, listen [carefully] to me [and do exactly] as I command you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Go now to the flock and bring me two good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suitable young goats, and I will make them into a savory dish [of meat] for your father, the kind he loves [to eat]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then you shall bring it to your father to eat, so that he may bless you before his death.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jacob said to Rebekah his mother, “Listen, Esau my brother is a hairy man and I am a smooth [skinned] man. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Suppose my father touches me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feels my skin; then I will be seen by him as a cheat (imposter), and I will bring his curse on me and not a blessing.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But his mother said to him, “May your curse be on me, my son; only listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey me, and go, bring the young goats to me.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Jacob went and got the two young goats, and brought them to his mother; and his mother prepared a delicious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dish of
  - type: text
    text: ' food [with a delightful aroma], the kind his father loved [to eat]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Rebekah took her elder son Esau’s best clothes, which were with her in her house, and put them on Jacob her younger son. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And she put the skins of the young goats on his hands and on the smooth part of his neck. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then she gave her son Jacob the delicious meat and the bread which she had prepared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So he went to his father and said, “My father.” And Isaac said, “Here I am. Who are you, my son?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jacob said to his father, “I am Esau your firstborn; I have done what you told me to do. Now please, sit up and eat some of my game, so that you may bless me.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Isaac said to his son, “How is it that you have found the game so quickly, my son?” And he said, “Because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God caused it to come to me.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But Isaac [wondered and] said to Jacob, “Please come close [to me] so that I may touch you, my son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' determine if you are really my son Esau or not.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Jacob approached Isaac, and his father touched him and said, “The voice is Jacob’s voice, but the hands are the hands of Esau.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He could not recognize him [as Jacob], because his hands were hairy like his brother Esau’s hands; so he blessed him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But he said, “Are you really my son Esau?” Jacob answered, “I am.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Isaac said, “Bring the food to me, and I will eat some of my son’s game, so that I may bless you.” He brought it to him, and he ate; and he brought him wine and he drank. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then his father Isaac said to him, “Please come, my son, and kiss me.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So he came and kissed him; and Isaac smelled his clothing and blessed him and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The scent of my son [Esau]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is like the aroma of a field which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has blessed;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Now may God give you of the dew of heaven [to water your land],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of the fatness (fertility) of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And an abundance of grain and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word refers to wine that is in the first stage of fermentation, still in the vat. Some of the rabbis said that the first stage takes three days, and that wine does not have a strong appeal to the senses until it is 40 days old (according to the Talmud).
    marker-yv: yv-n
  - type: text
    text: new wine; [Gen 27:39; Deut 33:13, 28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: May peoples serve you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And nations bow down to you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Be lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' master over your brothers,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And may your mother’s sons bow down to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May those who curse you be cursed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And may those who bless you be blessed.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Stolen Blessing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now as soon as Isaac had finished blessing Jacob, and Jacob had scarcely left the presence of Isaac his father, Esau his brother came in from his hunting. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Esau also made a delicious dish [of meat] and brought it to his father and said to him, “Let my father get up and eat some of his son’s game, so that you may bless me.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Isaac his father said to him, “Who are you?” And he replied, “I am your son, your firstborn, Esau.” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then Isaac trembled violently, and he said, “Then who was the one [who was just here] who hunted game and brought it to me? I ate all of it before you came, and I blessed him. Yes, and he [in fact] shall be (shall remain) blessed.” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When Esau heard the words of his father, he cried out with a great and extremely bitter cry and said to his father, “Bless me, even me also, O my father!” [Heb 12:16, 17] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Isaac said, “Your brother came deceitfully and has [fraudulently] taken away your blessing [for himself].” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Esau replied, “Is he not rightly named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 25:26.
    marker-yv: yv-n
  - type: text
    text: 'Jacob (the supplanter)? For he has supplanted me these two times: he took away my birthright, and now he has taken away my blessing. Have you not reserved a blessing for me?” '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But Isaac replied to Esau, “Listen carefully: I have made Jacob your lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' master; I have given him all his brothers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relatives as servants; and I have sustained him with grain and new wine. What then, can I do for you, my son?” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Esau said to his father, “Have you only one blessing, my father? Bless me, even me also, O my father.” Then Esau [no longer able to restrain himself] raised his voice and wept [loudly].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Then Isaac his father answered and [prophesied and] said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your dwelling shall be away from the fertility of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: And away from the dew of heaven above;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But you shall live by your sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And serve your brother;
- type: usfm
  marker: q1
  children:
  - type: text
    text: However it shall come to pass when you break loose [from your anger and hatred],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you will tear his yoke off your neck [and you will be free of him].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So Esau hated Jacob because of the blessing with which his father blessed him; and Esau said in his heart, “The days of mourning for my father are very near; then I will kill my brother Jacob.” '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'When these words of her elder son Esau were repeated to Rebekah, she sent for Jacob her younger son, and said to him, “Listen carefully, your brother Esau is comforting himself concerning you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by planning
  - type: text
    text: ' to kill you. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So now, my son, listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do what I say; go, escape to my brother Laban in Haran! '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Stay with him for a while, until your brother’s anger subsides. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When your brother’s anger toward you subsides and he forgets what you did to him, then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rebekah never saw her son Jacob again. He was well over forty and probably fifty-seven years old when he fled from Esau to Haran, and he stayed there at least twenty years.
    marker-yv: yv-n
  - type: text
    text: I will send and bring you back from there. Why should I be deprived of you both in a single day?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Then Rebekah said to Isaac, “I am tired of living because of the daughters of Heth [these insolent wives of Esau]. If Jacob takes a wife from the daughters of Heth, like these daughters of the land, what good will my life be to me?” [Gen 26:34]
