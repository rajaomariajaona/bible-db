  '1':
  - type: heading
    content: Jacob’s Deception
  - type: text
    content: 'Now when Isaac was old and his eyes were too dim to see, he called his elder [and favorite] son Esau and said to him, “My son.” And Esau answered him, “Here I am.” '
  '10':
  - type: text
    content: 'Then you shall bring it to your father to eat, so that he may bless you before his death.” '
  '11':
  - type: text
    content: 'Jacob said to Rebekah his mother, “Listen, Esau my brother is a hairy man and I am a smooth [skinned] man. '
  '12':
  - type: text
    content: 'Suppose my father touches me '
  - type: text
    content: and
  - type: text
    content: ' feels my skin; then I will be seen by him as a cheat (imposter), and I will bring his curse on me and not a blessing.” '
  '13':
  - type: text
    content: 'But his mother said to him, “May your curse be on me, my son; only listen '
  - type: text
    content: and
  - type: text
    content: ' obey me, and go, bring the young goats to me.” '
  '14':
  - type: text
    content: 'So Jacob went and got the two young goats, and brought them to his mother; and his mother prepared a delicious '
  - type: text
    content: dish of
  - type: text
    content: ' food [with a delightful aroma], the kind his father loved [to eat]. '
  '15':
  - type: text
    content: 'Then Rebekah took her elder son Esau’s best clothes, which were with her in her house, and put them on Jacob her younger son. '
  '16':
  - type: text
    content: 'And she put the skins of the young goats on his hands and on the smooth part of his neck. '
  '17':
  - type: text
    content: Then she gave her son Jacob the delicious meat and the bread which she had prepared.
  '18':
  - type: text
    content: 'So he went to his father and said, “My father.” And Isaac said, “Here I am. Who are you, my son?” '
  '19':
  - type: text
    content: 'Jacob said to his father, “I am Esau your firstborn; I have done what you told me to do. Now please, sit up and eat some of my game, so that you may bless me.” '
  '2':
  - type: text
    content: 'Isaac said, “See here, I am old; '
  - type: note
    content: Isaac lived another forty-three years after this blessing was given to Jacob (35:27-29).
  - type: text
    content: 'I do not know '
  - type: note
    content: Lit the day of my death.
  - type: text
    content: 'when I may die. '
  '20':
  - type: text
    content: Isaac said to his son, “How is it that you have found the game so quickly, my son?” And he said, “Because the L
  - type: heading
    content: ord
  - type: text
    content: ' your God caused it to come to me.” '
  '21':
  - type: text
    content: 'But Isaac [wondered and] said to Jacob, “Please come close [to me] so that I may touch you, my son, '
  - type: text
    content: and
  - type: text
    content: ' determine if you are really my son Esau or not.” '
  '22':
  - type: text
    content: 'So Jacob approached Isaac, and his father touched him and said, “The voice is Jacob’s voice, but the hands are the hands of Esau.” '
  '23':
  - type: text
    content: 'He could not recognize him [as Jacob], because his hands were hairy like his brother Esau’s hands; so he blessed him. '
  '24':
  - type: text
    content: 'But he said, “Are you really my son Esau?” Jacob answered, “I am.” '
  '25':
  - type: text
    content: 'Then Isaac said, “Bring the food to me, and I will eat some of my son’s game, so that I may bless you.” He brought it to him, and he ate; and he brought him wine and he drank. '
  '26':
  - type: text
    content: 'Then his father Isaac said to him, “Please come, my son, and kiss me.” '
  '27':
  - type: text
    content: So he came and kissed him; and Isaac smelled his clothing and blessed him and said,
  - type: text
    content: “The scent of my son [Esau]
  - type: text
    content: Is like the aroma of a field which the L
  - type: heading
    content: ord
  - type: text
    content: ' has blessed;'
  '28':
  - type: text
    content: Now may God give you of the dew of heaven [to water your land],
  - type: text
    content: And of the fatness (fertility) of the earth,
  - type: text
    content: 'And an abundance of grain and '
  - type: note
    content: The Hebrew word refers to wine that is in the first stage of fermentation, still in the vat. Some of the rabbis said that the first stage takes three days, and that wine does not have a strong appeal to the senses until it is 40 days old (according to the Talmud).
  - type: text
    content: new wine; [Gen 27:39; Deut 33:13, 28]
  '29':
  - type: text
    content: May peoples serve you,
  - type: text
    content: And nations bow down to you;
  - type: text
    content: 'Be lord '
  - type: text
    content: and
  - type: text
    content: ' master over your brothers,'
  - type: text
    content: And may your mother’s sons bow down to you.
  - type: text
    content: May those who curse you be cursed,
  - type: text
    content: And may those who bless you be blessed.”
  - type: heading
    content: The Stolen Blessing
  '3':
  - type: text
    content: 'So now, please take your [hunting] gear, your quiver [of arrows] and your bow, and go out into the open country and hunt game for me; '
  '30':
  - type: text
    content: 'Now as soon as Isaac had finished blessing Jacob, and Jacob had scarcely left the presence of Isaac his father, Esau his brother came in from his hunting. '
  '31':
  - type: text
    content: 'Esau also made a delicious dish [of meat] and brought it to his father and said to him, “Let my father get up and eat some of his son’s game, so that you may bless me.” '
  '32':
  - type: text
    content: 'Isaac his father said to him, “Who are you?” And he replied, “I am your son, your firstborn, Esau.” '
  '33':
  - type: text
    content: 'Then Isaac trembled violently, and he said, “Then who was the one [who was just here] who hunted game and brought it to me? I ate all of it before you came, and I blessed him. Yes, and he [in fact] shall be (shall remain) blessed.” '
  '34':
  - type: text
    content: 'When Esau heard the words of his father, he cried out with a great and extremely bitter cry and said to his father, “Bless me, even me also, O my father!” [Heb 12:16, 17] '
  '35':
  - type: text
    content: 'Isaac said, “Your brother came deceitfully and has [fraudulently] taken away your blessing [for himself].” '
  '36':
  - type: text
    content: 'Esau replied, “Is he not rightly named '
  - type: note
    content: See note 25:26.
  - type: text
    content: 'Jacob (the supplanter)? For he has supplanted me these two times: he took away my birthright, and now he has taken away my blessing. Have you not reserved a blessing for me?” '
  '37':
  - type: text
    content: 'But Isaac replied to Esau, “Listen carefully: I have made Jacob your lord '
  - type: text
    content: and
  - type: text
    content: ' master; I have given him all his brothers '
  - type: text
    content: and
  - type: text
    content: ' relatives as servants; and I have sustained him with grain and new wine. What then, can I do for you, my son?” '
  '38':
  - type: text
    content: Esau said to his father, “Have you only one blessing, my father? Bless me, even me also, O my father.” Then Esau [no longer able to restrain himself] raised his voice and wept [loudly].
  '39':
  - type: text
    content: Then Isaac his father answered and [prophesied and] said to him,
  - type: text
    content: “Your dwelling shall be away from the fertility of the earth
  - type: text
    content: And away from the dew of heaven above;
  '4':
  - type: text
    content: 'and make me a savory '
  - type: text
    content: and
  - type: text
    content: ' delicious dish [of meat], the kind I love, and bring it to me to eat, so that my soul may bless you [as my firstborn son] before I die.”'
  '40':
  - type: text
    content: But you shall live by your sword,
  - type: text
    content: And serve your brother;
  - type: text
    content: However it shall come to pass when you break loose [from your anger and hatred],
  - type: text
    content: That you will tear his yoke off your neck [and you will be free of him].”
  '41':
  - type: text
    content: 'So Esau hated Jacob because of the blessing with which his father blessed him; and Esau said in his heart, “The days of mourning for my father are very near; then I will kill my brother Jacob.” '
  '42':
  - type: text
    content: 'When these words of her elder son Esau were repeated to Rebekah, she sent for Jacob her younger son, and said to him, “Listen carefully, your brother Esau is comforting himself concerning you '
  - type: text
    content: by planning
  - type: text
    content: ' to kill you. '
  '43':
  - type: text
    content: 'So now, my son, listen '
  - type: text
    content: and
  - type: text
    content: ' do what I say; go, escape to my brother Laban in Haran! '
  '44':
  - type: text
    content: 'Stay with him for a while, until your brother’s anger subsides. '
  '45':
  - type: text
    content: 'When your brother’s anger toward you subsides and he forgets what you did to him, then '
  - type: note
    content: Rebekah never saw her son Jacob again. He was well over forty and probably fifty-seven years old when he fled from Esau to Haran, and he stayed there at least twenty years.
  - type: text
    content: I will send and bring you back from there. Why should I be deprived of you both in a single day?”
  '46':
  - type: text
    content: Then Rebekah said to Isaac, “I am tired of living because of the daughters of Heth [these insolent wives of Esau]. If Jacob takes a wife from the daughters of Heth, like these daughters of the land, what good will my life be to me?” [Gen 26:34]
  '5':
  - type: text
    content: 'But Rebekah overheard what Isaac said to Esau his son; and when Esau had gone to the open country to hunt for game that he might bring back, '
  '6':
  - type: text
    content: 'Rebekah said to Jacob her [younger and favorite] son, “Listen carefully: I heard your father saying to Esau your brother, '
  '7':
  - type: text
    content: '‘Bring me some game and make me a savory '
  - type: text
    content: and
  - type: text
    content: ' delicious dish [of meat], so that I may eat it, and declare my blessing on you '
  - type: note
    content: The patriarch’s formal blessing, offered before the Lord, was equivalent to an inalterable command and prophecy, whose outcome was assured. For that reason it had great importance and tangible value, especially for the firstborn son. When Esau sold his birthright (25:33), he did not imagine that, as a consequence, he would actually lose the blessing to which he had originally been entitled as the firstborn.
  - type: text
    content: in the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' before my death.’ '
  '8':
  - type: text
    content: 'So now, my son, listen [carefully] to me [and do exactly] as I command you. '
  '9':
  - type: text
    content: 'Go now to the flock and bring me two good '
  - type: text
    content: and
  - type: text
    content: ' suitable young goats, and I will make them into a savory dish [of meat] for your father, the kind he loves [to eat]. '
