segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Samson Burns Philistine Crops
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But after a while, in the time of wheat harvest, Samson went to visit his wife with a young goat [as a gift of reconciliation]; and he said, “I will go in to my wife in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her
  - type: text
    text: ' room.” But her father would not allow him to go in. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Her father said, “I really thought you utterly hated her; so I gave her to your companion. Is her younger sister not more beautiful than she? Please take her [as your wife] instead.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samson said to them, “This time I shall be blameless in regard to the Philistines when I do them harm.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Samson went and caught three hundred foxes, and took torches and turning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the foxes
  - type: text
    text: ' tail to tail, he put a torch between each pair of tails. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When he had set the torches ablaze, he let the foxes go into the standing grain of the Philistines, and he burned up the heap of sheaves and the standing grain, along with the vineyards and olive groves. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the Philistines said, “Who did this?” And they were told, “Samson, the son-in-law of the Timnite, because he took Samson’s wife and gave her to his [chief] companion [at the wedding feast].” So the Philistines came up and burned her and her father with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson said to them, “If this is the way you act, be certain that I will take revenge on you, and [only] after that I will stop.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then he struck them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: leg on thigh
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: without mercy, a great slaughter; and he went down and lived in the cleft of the rock of Etam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the [army of the] Philistines came up and camped in [the tribal territory of] Judah, and overran Lehi (Jawbone). '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The men of Judah said, “Why have you come up against us?” And they answered, “We have come up to bind Samson, in order to do to him as he has done to us.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then three thousand men of Judah went down to the cleft of the rock of Etam and said to Samson, “Have you not known that the Philistines are rulers over us? What is this that you have done to us?” He said to them, “As they did to me, so I have done to them.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They said to him, “We have come down to bind you, so that we may hand you over to the Philistines.” And Samson said to them, “Swear to me that you will not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fall upon
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'kill me.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So they said to him, “No, we will [only] bind you securely and place you into their hands; but we certainly will not kill you.” So they bound him with two new ropes and brought him up from the rock [of Etam].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When he came to Lehi, the Philistines came shouting to meet him. And the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came upon him mightily, and the ropes on his arms were like flax (linen) that had been burned, and his bonds '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: melted
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'dropped off his hands. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He found a fresh jawbone of a donkey, so he reached out his hand and took it and killed a thousand men with it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Samson said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With the jawbone of a donkey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heaps upon heaps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the jawbone of a donkey
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have struck down a thousand men.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When he finished speaking, he threw the jawbone from his hand; and he named that place Ramath-lehi (hill of the jawbone). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Samson was very thirsty, and he called out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, “You have given this great victory through the hand of Your servant, and now am I to die of thirst and fall into the hands of the uncircumcised (pagans)?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So God split open the hollow place that was at Lehi, and water came out of it. When Samson drank, his spirit (strength) returned and he was revived. Therefore he named it En-hakkore (spring which is calling), which is at Lehi to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And Samson judged Israel in the days of [occupation by] the Philistines for twenty years. [Judg 17:6]
