  - type: text
    content: .
  '19':
  - type: text
    content: '“Then you shall take the other ram, and Aaron and his sons shall lay their hands on the head of the ram. '
  '2':
  - type: text
    content: 'and unleavened bread and unleavened cakes mixed with oil, and unleavened wafers spread with oil; you shall make them of fine wheat flour. '
  '20':
  - type: text
    content: 'Then you shall kill the ram, and take some of its blood and put it on the tip of the right ears of Aaron and his sons and on the thumbs of their right hands and on the big toes of their right feet, and sprinkle the [rest of the] blood around on the altar [of burnt offering]. '
  '21':
  - type: text
    content: Then you shall take some of the blood that is on the altar and some of the anointing oil, and sprinkle it on Aaron and his garments and on his sons and their garments. Now Aaron and his garments and his sons and their garments shall be consecrated (dedicated, made holy, declared sacred for God’s purpose).
  '22':
  - type: text
    content: '“You shall also take the fat of the ram, the fat tail, the fat that covers the intestines, the lobe of the liver, the two kidneys with the fat that is on them, and the right thigh; (for it is a ram of ordination), '
  '23':
  - type: text
    content: and one loaf of bread and one cake of oiled bread and one wafer out of the basket of the unleavened bread that is before the L
  - type: heading
    content: ord
  - type: text
    content: '; '
  '24':
  - type: text
    content: 'and you shall put all these in the hands of Aaron and his sons, and wave them as a '
  - type: note
    content: The wave (undulation, wavelike) offering and the heave (lifted up, raised) offering were named after their manner of presentation. These were either voluntary gifts or contributions required for a specific religious purpose such as the atonement offering. It was understood that God received these offerings and then designated them for a religious purpose such as the support of the priests and their families, or the preparation and maintenance of the tabernacle.
  - type: text
    content: wave offering before the L
