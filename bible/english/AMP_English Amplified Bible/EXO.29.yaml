  '26':
  - type: text
    content: “Then you shall take the breast of the ram of Aaron’s ordination, and wave it as a wave offering before the L
  - type: heading
    content: ord
  - type: text
    content: '; and it shall be your (Moses) portion. '
  '27':
  - type: text
    content: 'You shall consecrate the waved breast offering [of the ram] used in the ordination and the waved thigh offering of the priests’ portion, since it is [a contribution] for Aaron and for his sons. '
  '28':
  - type: text
    content: 'It shall be for Aaron and his sons as their due portion from the Israelites forever, for it is a '
  - type: note
    content: See note v 24.
  - type: text
    content: heave offering. It shall be a heave offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' from the Israelites from the sacrifices of their peace offerings.'
  '29':
  - type: text
    content: '“The holy garments of Aaron shall be for his sons after him, to be anointed and ordained in them. '
  '3':
  - type: text
    content: 'You shall put them in one basket, and present them in the basket along with the bull and the two rams. '
  '30':
  - type: text
    content: That son who is [high] priest in his place shall put them on [each day for] seven days when he comes into the Tent of Meeting to minister in the Holy Place.
  - type: heading
    content: Food of the Priests
  '31':
  - type: text
    content: '“You shall take the ram of the ordination and boil its meat in a holy place. '
  '32':
  - type: text
    content: 'Aaron and his sons shall eat the meat of the ram and the bread in the basket, at the doorway of the Tent of Meeting. '
  '33':
  - type: text
    content: 'They shall eat those things by which atonement was made at their ordination and consecration; but a layman shall not eat them, because they are holy [that is, set apart to the worship of God]. '
  '34':
  - type: text
    content: And if any of the meat of ordination or the bread remains until morning, you shall burn it in the fire; it shall not be eaten, because it is holy.
  '35':
  - type: text
    content: '“So you shall do to Aaron and to his sons in accordance with all I have commanded you; during seven days you are to ordain them. '
  '36':
  - type: text
    content: 'You shall offer a bull every day as a sin offering for atonement. You shall cleanse the altar '
  - type: text
    content: from sin
  - type: text
    content: ' when you make atonement for it, and you shall anoint it to consecrate it [for God’s sacred purpose]. '
  '37':
  - type: text
    content: For seven days you shall make atonement for the altar [of burnt offering] and consecrate it; then the altar shall be most holy. Whatever touches the altar must be holy (set apart for God’s service).
  '38':
  - type: text
    content: '“Now this is what you shall offer on the altar: two one year old lambs shall be offered each day, continuously. '
  '39':
  - type: text
    content: 'One lamb you shall offer in the morning and the other lamb '
  - type: note
    content: See note 12:6.
  - type: text
    content: 'at twilight; '
  '4':
  - type: text
    content: 'Then bring Aaron and his sons to the doorway of the Tent of Meeting [out where the basin is] and wash them with water. '
  '40':
  - type: text
    content: 'and with the one lamb there shall be one-tenth of '
  - type: text
    content: a measure
  - type: text
    content: ' of fine flour mixed with one-fourth of a hin of beaten [olive] oil, and one-fourth of a hin of wine for a drink offering [to be poured out]. '
  '41':
  - type: text
    content: 'And the other lamb you shall offer at twilight, and do with it as with the grain offering of the morning and with the drink offering, for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma [to appease God], an offering by fire to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '42':
  - type: text
    content: This will be a continual burnt offering throughout your generations at the doorway of the Tent of Meeting before the L
  - type: heading
    content: ord
  - type: text
    content: ', where I will meet with you, to speak to you there. '
  '43':
  - type: text
    content: 'There I will meet with the Israelites, and the Tent of Meeting shall be '
  - type: note
    content: Only God can sanctify (set apart) something for His divine purpose. Man can consecrate (dedicate) something as sacred, that is, declare it separated from secular use.
  - type: text
    content: 'sanctified by My glory [the '
  - type: note
    content: This Hebrew word is not found in the Bible, but was used by the rabbis to describe the presence of God. Its basic meaning is “royal residence.” Among other things, the rabbis said that the Shekinah is present where ten people pray together, or where three people are sitting as a court of judges.
  - type: text
    content: 'Shekinah, God’s dwelling presence]. '
  '44':
  - type: text
    content: 'I will sanctify the Tent of Meeting and the altar [of burnt offering]; also I will sanctify Aaron and his sons to serve as priests to Me. '
  '45':
  - type: text
    content: 'I will dwell among the sons of Israel and be their God. '
  '46':
  - type: text
    content: 'They shall know [from personal experience] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God who brought them out of the land of Egypt so that I might dwell among them; I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God.'
  '5':
  - type: text
    content: 'Then you shall take the garments, and put on Aaron the tunic and the robe of the ephod and the ephod and the breastpiece, and wrap him with the skillfully woven sash of the ephod; '
  '6':
  - type: text
    content: 'and you shall put the turban on his head and put the holy crown on the turban. '
  '7':
  - type: text
    content: 'Then you shall take the anointing oil and pour it on his head and anoint him. '
  '8':
  - type: text
    content: 'You shall bring his sons and put tunics on them. '
  '9':
  - type: text
    content: And you shall wrap them with sashes, Aaron and his sons, and put the [ornamental] caps on them; and the priest’s office shall be theirs by a perpetual statute. So you shall ordain Aaron and his sons.
  - type: heading
    content: The Sacrifices
