  '1':
  - type: heading
    content: Consecration of the Priests
  - type: text
    content: '“This is what you shall do to consecrate Aaron and his sons so that they may serve Me as priests: take one young bull and two rams, without blemish, '
  '10':
  - type: text
    content: '“Then you shall bring the bull before the Tent of Meeting, and Aaron and his sons shall '
  - type: note
    content: By laying his hands on the head of the sacrifice the offerer identified himself with it and through its death it became an atonement or covering for his sin. Because the sacrifice “covered” his sin it placed the offerer in a right relationship with God, just as later under the new covenant the perfection and sacrifice of the Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
  - type: text
    content: 'lay their hands on the bull’s head. '
  '11':
  - type: text
    content: Then you shall kill the bull before the L
  - type: heading
    content: ord
  - type: text
    content: ' by the doorway of the Tent of Meeting. '
  '12':
  - type: text
    content: 'And you shall take some of the blood of the bull and with your finger put it on the horns of the altar [of burnt offering], and you shall pour out the remainder of the blood at the base of the altar. '
  '13':
  - type: text
    content: 'You shall take all the fat that covers the intestines and the lobe of the liver, and the two kidneys and the fat that is on them, and offer them up in smoke on the altar. '
  '14':
  - type: text
    content: But the meat of the bull, its hide, and the contents of its intestines you shall burn in the fire outside the camp; it is a sin offering. [Heb 13:11-13]
  '15':
  - type: text
    content: '“And you shall take one of the rams, and Aaron and his sons shall lay their hands on the head of the ram; '
  '16':
  - type: text
    content: 'then you shall kill the ram and you shall take its blood and sprinkle it around the altar [of burnt offering]. '
  '17':
  - type: text
    content: 'Then you shall cut the ram into pieces, and wash its intestines and legs, and place them with its pieces and its head, '
  '18':
  - type: text
    content: and you shall burn the whole ram on the altar. It is a burnt offering to the L
  - type: heading
    content: ord
