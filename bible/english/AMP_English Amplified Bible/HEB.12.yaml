  '2':
  - type: text
    content: '[looking away from all that will distract us and] focusing our eyes on Jesus, who is the Author and Perfecter of faith [the first incentive for our belief and the One who brings our faith to maturity], who for the joy [of accomplishing the goal] set before Him endured the cross, '
  - type: note
    content: 'Sometimes the public shame of the cross is overlooked when one thinks of the pain and agony inflicted by it, but in the Roman Empire crucifixion was a shameful and disgraceful way to die, a form of capital punishment from which Roman citizens were exempt; and in Roman comedy it was used in a curse: “Go to a bad cross!”'
  - type: text
