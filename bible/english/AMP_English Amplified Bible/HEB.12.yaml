    - type: text
      text: Jesus, the Example
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, since we are surrounded by so great a cloud of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the people commended for their faith in ch 11. See 11:2, 39.
    marker-yv: yv-n
  - type: text
    text: 'witnesses [who by faith have testified to the truth of God’s absolute faithfulness], stripping off every unnecessary weight and the sin which so easily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleverly entangles us, let us run with endurance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' active persistence the race that is set before us, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '[looking away from all that will distract us and] focusing our eyes on Jesus, who is the Author and Perfecter of faith [the first incentive for our belief and the One who brings our faith to maturity], who for the joy [of accomplishing the goal] set before Him endured the cross, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sometimes the public shame of the cross is overlooked when one thinks of the pain and agony inflicted by it, but in the Roman Empire crucifixion was a shameful and disgraceful way to die, a form of capital punishment from which Roman citizens were exempt; and in Roman comedy it was used in a curse: “Go to a bad cross!”'
    marker-yv: yv-n
  - type: text
    text: disregarding the shame, and sat down at the right hand of the throne of God [revealing His deity, His authority, and the completion of His work]. [Ps 110:1]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Just consider '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' meditate on Him who endured from sinners such bitter hostility against Himself [consider it all in comparison with your trials], so that you will not grow weary and lose heart.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Father’s Discipline
  marker-yv: yv-h
- type: usfm
