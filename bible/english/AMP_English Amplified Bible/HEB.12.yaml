- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'You must submit to [correction for the purpose of] discipline; God is dealing with you as with sons; for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: who is a son whom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'what son is there whom his father does not discipline? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now if you are exempt from correction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without discipline, in which all [of God’s children] share, then you are illegitimate children and not sons [at all]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moreover, we have had earthly fathers who disciplined us, and we submitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respected them [for training us]; shall we not much more willingly submit to the Father of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning seems to be that God is the Father of that which is spiritual as well as that which is physical.
    marker-yv: yv-n
  - type: text
    text: 'spirits, and live [by learning from His discipline]? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For our earthly fathers disciplined us for only a short time as seemed best to them; but He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: disciplines us
  - type: text
    text: ' for our good, so that we may share His holiness. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the time being no discipline brings joy, but seems sad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' painful; yet to those who have been trained by it, afterwards it yields the peaceful fruit of righteousness [right standing with God and a lifestyle and attitude that seeks conformity to God’s will and purpose].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So then, strengthen hands that are weak and knees that tremble. [Is 35:3] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cut through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make smooth, straight paths for your feet [that are safe and go in the right direction], so that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the leg
  - type: text
    text: ' which is lame may not be put out of joint, but rather may be healed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Continually
  - type: text
    text: ' pursue peace with everyone, and the sanctification without which no one will [ever] see the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'See to it that no one falls short of God’s grace; that no root of resentment springs up and causes trouble, and by it many be defiled; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and [see to it] that no one is immoral or godless like Esau, who sold his own birthright for a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: single
  - type: text
    text: ' meal. [Gen 25:29-34] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For you know that later on, when he wanted [to regain title to] his inheritance of the blessing, he was rejected, for he found no opportunity for repentance [there was no way to repair what he had done, no chance to recall the choice he had made], even though he sought for it with [bitter] tears. [Gen 27:30-40]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast of Sinai and Zion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For you have not come [as did the Israelites in the wilderness] to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a mountain
  - type: text
    text: ' that can be touched and to a blazing fire, and to gloom and darkness and a raging windstorm, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and to the blast of a trumpet and a sound of words [such that] those who heard it begged that nothing more be said to them. [Ex 19:12-22; 20:18-21; Deut 4:11, 12; 5:22-27] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For they could not bear the command, “I
  - type: usfm
    marker: sc
    children:
    - type: text
      text: f even a wild animal touches the mountain
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: it will be stoned
  - type: text
    text: ' [to death].” [Ex 19:12, 13] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In fact, so terrifying was the sight, that Moses said, “I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: am filled with fear
  - type: text
    text: ' and trembling.” [Deut 9:19] '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But you have come to Mount Zion and to the city of the living God, the heavenly Jerusalem, and to myriads of angels [in festive gathering], '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and to the general assembly and assembly of the firstborn who are registered [as citizens] in heaven, and to God, who is Judge of all, and to the spirits of the righteous (the redeemed in heaven) who have been made perfect [bringing them to their final glory], '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and to Jesus, the Mediator of a new covenant [uniting God and man], and to the sprinkled blood, which speaks [of mercy], a better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nobler '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more gracious message than '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the blood
  - type: text
    text: ' of Abel [which cried out for vengeance]. [Gen 4:10]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Unshaken Kingdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'See to it that you do not refuse [to listen to] Him who is speaking [to you now]. For if those [sons of Israel] did not escape when they refused [to listen to] him who warned them on earth [revealing God’s will], how much less will we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: escape
  - type: text
    text: ' if we turn our backs on Him who warns from heaven? [Heb 2:1-4] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: His voice shook the earth [at Mount Sinai] then, but now He has given a promise, saying, “Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: et once more
  - type: text
    text: ' I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: will shake not only the earth
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: but also the
  - type: text
    text: ' [starry] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: heaven
  - type: text
    text: '.” [Hag 2:6] '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now this [expression], “Yet once more,” indicates the removal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' final transformation of all those things which can be shaken—that is, of that which has been created—so that those things which cannot be shaken may remain. [Ps 102:26] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore, since we receive a kingdom which cannot be shaken, let us show gratitude, and offer to God pleasing service '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acceptable worship with reverence and awe; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: for our God is [indeed] a consuming fire. [Deut 4:24]
