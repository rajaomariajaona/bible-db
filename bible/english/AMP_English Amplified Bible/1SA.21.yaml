      - type: text
        text: David Takes Consecrated Bread
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David went to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The city of the priests was located on Mt. Scopus about a mile northeast of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Nob to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahimelech was also known as Ahijah.
      marker-yv: yv-n
    - type: text
      text: 'Ahimelech the priest; and Ahimelech came trembling [in fear] to meet David and said to him, “Why are you alone, and no one with you?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David arose and fled from Saul that day, and went to Achish king of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a dangerous place to go since it was not only one of the Philistine’s five major cities, but also the former home of Goliath.
      marker-yv: yv-n
    - type: text
      text: 'Gath. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The servants of Achish said to him, “Is this not David the king of the land? Did they not sing in praise of this one as they danced, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Saul has slain his thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And David his ten thousands’?”
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'David took these words to heart and was greatly afraid of Achish king of Gath. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So [fearing for his life] he changed his behavior in their sight, and acted insanely in their hands, and he scribbled on the doors of the gate, and drooled on his beard. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Achish said to his servants, “Look, you see that the man is insane. Why have you brought him to me? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Do I lack madmen, that you bring this one to behave like a madman in my presence? Shall this one come into my house?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Ahimelech the priest, “The king has commissioned me with a matter and has told me, ‘Let no one know anything about the matter for which I am sending you and with which I have commissioned you. I have directed the young men to a certain place.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now what [food] do you have on hand? Give me five loaves of bread, or whatever can be found.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest answered David, “There is no ordinary (unconsecrated) bread on hand, but there is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the bread of the Presence (showbread) was an offering dedicated to God and was to be eaten only by the priests. The ancient rabbis maintained that any law may be superseded to save life, and that David’s life was in danger from hunger.
      marker-yv: yv-n
    - type: text
      text: 'consecrated bread; [you may have it] if only the young men have kept themselves from women.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David answered the priest, “Be assured that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. intimate contact with women.
      marker-yv: yv-n
    - type: text
      text: 'women have been kept from us in these three days since I set out, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: vessels,
        - type: text
          text: ' a euphemism for the human body.'
      marker-yv: yv-n
    - type: text
      text: 'bodies of the young men were consecrated (ceremonially clean), although it was an ordinary (unconsecrated) journey; so how much more will their vessels be holy today?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priest gave him the consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bread;
    - type: text
      text: ' for there was no bread there except the bread of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Face.
      marker-yv: yv-n
    - type: text
      text: Presence which was removed from before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in order to put hot bread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in its place
    - type: text
      text: ' when it was taken away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now one of Saul’s servants was there that day, detained before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; his name was Doeg the Edomite, the chief of Saul’s shepherds.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Ahimelech, “Do you not have a sword or spear here on hand? For I brought neither my sword nor my [other] weapons with me, because the king’s business was urgent.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the priest said, “The sword of Goliath the Philistine, whom you killed in the Valley of Elah, is here wrapped in a cloth behind the ephod; if you would take it for yourself, do so. For there is no other here except for it.” And David said, “There is none like that; give it to me.”
