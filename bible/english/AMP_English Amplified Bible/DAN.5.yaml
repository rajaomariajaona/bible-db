verses:
  '1':
  - type: heading
    content: Belshazzar’s Feast
  - type: text
    content: 'Belshazzar the king [who was a descendant of Nebuchadnezzar] gave a great feast for a thousand of his nobles, and he was drinking his wine in the presence of the thousand [guests]. '
  '10':
  - type: text
    content: 'Now the queen [mother], overhearing the [excited] words of the king and his nobles, came into the banquet area. The queen [mother] spoke and said, “O king, live forever! Do not be alarmed at your thoughts or let your face be changed. '
  '11':
  - type: text
    content: 'There is a man in your kingdom in whom is '
  - type: note
    content: Or possibly the Spirit of the Holy God, and so throughout the chapter.
  - type: text
    content: 'a spirit of the holy gods; and in the days of your father, illumination, understanding and wisdom like the wisdom of the gods were found in him. And '
  - type: note
    content: Twenty-three years have passed since Nebuchadnezzar’s death in 562 b.c.
  - type: text
    content: 'King Nebuchadnezzar, your father—your father the king, appointed him chief of the magicians, enchanters, Chaldeans and diviners. '
  '12':
  - type: text
    content: It was because an extraordinary spirit, knowledge and insight, the ability to interpret dreams, clarify riddles, and solve complex problems were found in this Daniel, whom the king named Belteshazzar. Now let Daniel be called and he will give the interpretation.”
  - type: heading
    content: Daniel Interprets Handwriting on the Wall
  '13':
  - type: text
    content: 'Then Daniel was brought in before the king. And the king said to Daniel, “Are you that Daniel who is one of the sons of the exiles of Judah, whom my father the king brought from Judah? '
  '14':
  - type: text
    content: 'I have heard of you, that a spirit of the gods is in you, and that illumination, insight, and extraordinary wisdom have been found in you. '
  '15':
  - type: text
    content: 'Now the wise men and the enchanters, were brought in before me so that they might read this writing and reveal its meaning to me, but they could not give the interpretation of the message. '
  '16':
  - type: text
    content: 'But I personally have heard about you, that you are able to make interpretations and solve complex problems. Now if you are able to read the writing and reveal its interpretation to me, you shall be clothed with purple and have a chain of gold put around your neck, and you shall have authority as the third '
  - type: text
    content: ruler
  - type: text
    content: ' in the kingdom.”'
  '17':
  - type: text
    content: 'Then Daniel answered and said before the king, “Keep your gifts for yourself and give your rewards to someone else; however, I will read the writing to the king and reveal the interpretation to him. '
  '18':
  - type: text
    content: 'O king, the Most High God gave Nebuchadnezzar your father a kingdom and greatness and glory and majesty; '
  '19':
  - type: text
    content: 'and because of the greatness that He gave him, all the peoples, nations, and '
  - type: text
    content: speakers of every
  - type: text
    content: ' language trembled and feared him. Whomever he wished he killed, and whomever he wished he kept alive; whomever he wished he promoted and whomever he wished he humbled. '
  '2':
  - type: text
    content: 'Belshazzar, as he tasted the wine, gave a command to bring in the gold and silver vessels which his '
  - type: note
    content: This Aramaic word (see note 2:4) may also mean “ancestor” (see vv 11, 13, 18).
  - type: text
    content: 'father Nebuchadnezzar had taken out of the '
  - type: note
    content: Gold utensils had been used in the temple building itself, and silver utensils had originally been stored in the “treasuries of the house of God” (2 Chr 5:1).
  - type: text
    content: 'temple which was in Jerusalem, so that the king and his nobles, his wives and his '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubines might drink from them. '
  '20':
  - type: text
    content: 'But when his heart was lifted up and his spirit became so proud that he behaved arrogantly, he was deposed from his royal throne and his glory was taken away from him. '
  '21':
  - type: text
    content: 'He was also driven from mankind, and his mind was made like that of an animal, and his dwelling place was with the wild donkeys. He was given grass to eat like cattle, and his body was wet with the dew of heaven until he came to know [without any doubt] that the Most High God rules over the kingdom of mankind and He appoints it to whomever He wills. '
  '22':
  - type: text
    content: 'And you, his '
  - type: note
    content: The Aramaic (see note 2:4) word may also mean “grandson” or “descendant.”
  - type: text
    content: 'son, O Belshazzar, have not humbled your heart (mind), even though you knew all this. '
  '23':
  - type: text
    content: 'And you have exalted yourself against the Lord of heaven, and the vessels of His house have been brought before you, and you and your nobles, your wives and your concubines have been drinking wine from them; and you have praised the gods of silver and gold, of bronze, iron, wood and stone, which do not see or hear or understand. But the God who holds in His hand your breath of life and your ways you have not honored '
  - type: text
    content: and
  - type: text
    content: ' glorified [but have dishonored and defied]. '
  '24':
  - type: text
    content: 'Then the hand was sent from the presence [of the Most High God], and this inscription was written:'
  '25':
