  '8':
  - type: text
    content: 'Then all the king’s wise men came in, but they could not '
  - type: note
    content: 'In light of what Daniel says in v 25, it is hard to escape the conclusion that for some reason the letters were unreadable to the wise men. The ancient rabbis speculated that the words were written in some kind of code that had to be deciphered. Among the suggestions were reversing the order of the letters (e.g. ENM for MENE etc.) and an elaborate puzzle in which the letters of each word were separated and spread out to form three senseless words: “MMTUS NNKFE EELRN” (“M…N…E” etc.).'
  - type: text
    content: 'read the writing or reveal to the king its interpretation. '
  '9':
  - type: text
    content: 'Then King Belshazzar was greatly perplexed, his face became even paler, and his nobles were bewildered '
  - type: text
    content: and
  - type: text
    content: ' alarmed.'
