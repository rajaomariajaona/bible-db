  - type: note
    content: These words are ordinary Aramaic from that time, so some commentators have speculated that the wise men recognized them but just could not put them into orderly sentences. Yet here Daniel seems to clearly “read” the words simply by pronouncing them in Aramaic (cf note v 8). His interpretation (vv 26-28) goes far beyond what the simple words mean by themselves.
