  '31':
  - type: text
    content: 'So '
  - type: note
    content: Some scholars believe “Darius” may be a title rather than a proper name and in this context refers either to Cyrus the Great, king of Persia, who conquered Babylon or (more likely) to Gubaru, Cyrus’ commander who led the nighttime attack on the city and was appointed governor of the Babylonian territories.
  - type: text
    content: Darius the Mede received the kingdom; he was about the age of sixty-two.
  '4':
  - type: text
    content: They drank the wine and praised the gods of gold and silver, of bronze, iron, wood and stone.
  '5':
  - type: text
    content: 'Suddenly the fingers of a man’s hand appeared and began writing opposite the lampstand on [a well-lit area of] the plaster of the wall of the king’s palace, and the king saw the part of the hand that did the writing. '
  '6':
  - type: text
    content: 'Then the king’s face grew pale, and his thoughts alarmed him; the joints '
  - type: text
    content: and
  - type: text
    content: ' muscles of his hips '
  - type: text
    content: and
  - type: text
    content: ' back weakened and his knees began knocking together. '
  '7':
  - type: text
    content: 'The king called aloud to bring in the enchanters (Magi), the Chaldeans [who were master astrologers] and the diviners. The king said to the wise men of Babylon, “Whoever can read this writing and explain its interpretation to me shall be clothed with purple and have a chain of gold put around his neck, and have authority as the '
  - type: note
    content: Nabonidus was first, Belshazzar, his son, was second.
  - type: text
