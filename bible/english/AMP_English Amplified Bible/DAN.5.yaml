document_id: DAN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Belshazzar’s Feast
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Belshazzar the king [who was a descendant of Nebuchadnezzar] gave a great feast for a thousand of his nobles, and he was drinking his wine in the presence of the thousand [guests]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Belshazzar, as he tasted the wine, gave a command to bring in the gold and silver vessels which his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Aramaic word (see note 2:4) may also mean “ancestor” (see vv 11, 13, 18).
    marker-yv: yv-n
  - type: text
    text: 'father Nebuchadnezzar had taken out of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gold utensils had been used in the temple building itself, and silver utensils had originally been stored in the “treasuries of the house of God” (2 Chr 5:1).
    marker-yv: yv-n
  - type: text
    text: 'temple which was in Jerusalem, so that the king and his nobles, his wives and his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubines might drink from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they brought in the gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' silver vessels that had been taken out of the temple, the house of God which was in Jerusalem; and the king and his nobles, his wives and his concubines drank from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They drank the wine and praised the gods of gold and silver, of bronze, iron, wood and stone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Suddenly the fingers of a man’s hand appeared and began writing opposite the lampstand on [a well-lit area of] the plaster of the wall of the king’s palace, and the king saw the part of the hand that did the writing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the king’s face grew pale, and his thoughts alarmed him; the joints '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' muscles of his hips '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' back weakened and his knees began knocking together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The king called aloud to bring in the enchanters (Magi), the Chaldeans [who were master astrologers] and the diviners. The king said to the wise men of Babylon, “Whoever can read this writing and explain its interpretation to me shall be clothed with purple and have a chain of gold put around his neck, and have authority as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nabonidus was first, Belshazzar, his son, was second.
    marker-yv: yv-n
  - type: text
    text: 'third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ruler
  - type: text
    text: ' in the kingdom.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then all the king’s wise men came in, but they could not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In light of what Daniel says in v 25, it is hard to escape the conclusion that for some reason the letters were unreadable to the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wise men.
      - type: text
        text: ' The ancient rabbis speculated that the words were written in some kind of code that had to be deciphered. Among the suggestions were reversing the order of the letters (e.g. ENM for MENE etc.) and an elaborate puzzle in which the letters of each word were separated and spread out to form three senseless words: “MMTUS NNKFE EELRN” (“M…N…E” etc.).'
    marker-yv: yv-n
  - type: text
    text: 'read the writing or reveal to the king its interpretation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then King Belshazzar was greatly perplexed, his face became even paler, and his nobles were bewildered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' alarmed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the queen [mother], overhearing the [excited] words of the king and his nobles, came into the banquet area. The queen [mother] spoke and said, “O king, live forever! Do not be alarmed at your thoughts or let your face be changed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There is a man in your kingdom in whom is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the Spirit of the Holy God,
      - type: text
        text: ' and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: 'a spirit of the holy gods; and in the days of your father, illumination, understanding and wisdom like the wisdom of the gods were found in him. And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Twenty-three years have passed since Nebuchadnezzar’s death in 562 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'King Nebuchadnezzar, your father—your father the king, appointed him chief of the magicians, enchanters, Chaldeans and diviners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It was because an extraordinary spirit, knowledge and insight, the ability to interpret dreams, clarify riddles, and solve complex problems were found in this Daniel, whom the king named Belteshazzar. Now let Daniel be called and he will give the interpretation.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Daniel Interprets Handwriting on the Wall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Daniel was brought in before the king. And the king said to Daniel, “Are you that Daniel who is one of the sons of the exiles of Judah, whom my father the king brought from Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard of you, that a spirit of the gods is in you, and that illumination, insight, and extraordinary wisdom have been found in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now the wise men and the enchanters, were brought in before me so that they might read this writing and reveal its meaning to me, but they could not give the interpretation of the message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But I personally have heard about you, that you are able to make interpretations and solve complex problems. Now if you are able to read the writing and reveal its interpretation to me, you shall be clothed with purple and have a chain of gold put around your neck, and you shall have authority as the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ruler
  - type: text
    text: ' in the kingdom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Daniel answered and said before the king, “Keep your gifts for yourself and give your rewards to someone else; however, I will read the writing to the king and reveal the interpretation to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O king, the Most High God gave Nebuchadnezzar your father a kingdom and greatness and glory and majesty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and because of the greatness that He gave him, all the peoples, nations, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: speakers of every
  - type: text
    text: ' language trembled and feared him. Whomever he wished he killed, and whomever he wished he kept alive; whomever he wished he promoted and whomever he wished he humbled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But when his heart was lifted up and his spirit became so proud that he behaved arrogantly, he was deposed from his royal throne and his glory was taken away from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He was also driven from mankind, and his mind was made like that of an animal, and his dwelling place was with the wild donkeys. He was given grass to eat like cattle, and his body was wet with the dew of heaven until he came to know [without any doubt] that the Most High God rules over the kingdom of mankind and He appoints it to whomever He wills. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And you, his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic (see note 2:4) word may also mean “grandson” or “descendant.”
    marker-yv: yv-n
  - type: text
    text: 'son, O Belshazzar, have not humbled your heart (mind), even though you knew all this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And you have exalted yourself against the Lord of heaven, and the vessels of His house have been brought before you, and you and your nobles, your wives and your concubines have been drinking wine from them; and you have praised the gods of silver and gold, of bronze, iron, wood and stone, which do not see or hear or understand. But the God who holds in His hand your breath of life and your ways you have not honored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified [but have dishonored and defied]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the hand was sent from the presence [of the Most High God], and this inscription was written:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“This is the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'These words are ordinary Aramaic from that time, so some commentators have speculated that the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wise men
      - type: text
        text: ' recognized them but just could not put them into orderly sentences. Yet here Daniel seems to clearly “read” the words simply by pronouncing them in Aramaic (cf note v 8). His '
      - type: usfm
        marker: it
        children:
        - type: text
          text: interpretation
      - type: text
        text: ' (vv 26-28) goes far beyond what the simple words mean by themselves.'
    marker-yv: yv-n
  - type: text
    text: inscription that was written, ‘
  - type: usfm
    marker: sc
    children:
    - type: text
      text: mene
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: mene
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: tekel
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: upharsin
  - type: text
    text: ' [numbered, numbered, weighed, and divided].’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This is the interpretation of the message: ‘'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: mene
  - type: text
    text: '’—God has numbered the days of your kingdom and put an end to it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ‘
  - type: usfm
    marker: sc
    children:
    - type: text
      text: tekel
  - type: text
    text: '’—you have been weighed on the scales [of righteousness] and found deficient; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ‘
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The singular of '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: upharsin
      - type: text
        text: ' (see v 25).'
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: peres
  - type: text
    text: ’—
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Foretold in Is 21:2, 5, 9.
    marker-yv: yv-n
  - type: text
    text: 'your kingdom has been divided and given over to the Medes and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aram '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Paras
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Persians.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Belshazzar gave the command, and Daniel was clothed with purple and a chain of gold was put around his neck, and a proclamation concerning him was issued [declaring] that he now had authority as the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ruler
  - type: text
    text: ' in the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'During that same '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The 16th of Tishri (October 12, 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .).
    marker-yv: yv-n
  - type: text
    text: 'night Belshazzar the [last] Chaldean king was slain [by troops of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Persian army had been outside the walls of Babylon for some time, but waited until this time of national feasting before invading.
    marker-yv: yv-n
  - type: text
    text: 'invading army]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe “Darius” may be a title rather than a proper name and in this context refers either to Cyrus the Great, king of Persia, who conquered Babylon or (more likely) to Gubaru, Cyrus’ commander who led the nighttime attack on the city and was appointed governor of the Babylonian territories.
    marker-yv: yv-n
  - type: text
    text: Darius the Mede received the kingdom; he was about the age of sixty-two.
