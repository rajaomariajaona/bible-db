document_id: ISA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaiah’s Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the year that King Uzziah died, I saw [in a vision] the Lord sitting on a throne, high and exalted, with the train of His royal robe filling the [most holy part of the] temple. [John 12:41] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Above Him seraphim (heavenly beings) stood; each one had six wings: with two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wings
  - type: text
    text: ' he covered his face, with two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wings
  - type: text
    text: ' he covered his feet, and with two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wings
  - type: text
    text: ' he flew. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And one called out to another, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Holy, Holy, Holy is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole earth is filled with His glory.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And the foundations of the thresholds trembled at the voice of him who called out, and the temple was filling with smoke. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then I said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Woe is me! For I am ruined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I am a man of [ceremonially] unclean lips,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I live among a people of unclean lips;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For my eyes have seen the King, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then one of the seraphim flew to me with a burning coal in his hand, which he had taken from the altar with tongs. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He touched my mouth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with it
  - type: text
    text: ' and said, “Listen carefully, this has touched your lips; your wickedness [your sin, your injustice, your wrongdoing] is taken away and your sin atoned for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forgiven.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaiah’s Commission
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then I heard the voice of the Lord, saying, “Whom shall I send, and who will go for Us?” Then I said, “Here am I. Send me!” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And He said, “Go, and tell this people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Keep on listening, but do not understand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep on looking, but do not comprehend.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Make the heart of this people insensitive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their ears dull,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their eyes dim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Otherwise they might see with their eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hear with their ears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Understand with their hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And return and be healed.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then I said, “Lord, how long?” And He answered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Until cities are devastated and without inhabitant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And houses are without people
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the land is utterly desolate,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has removed [His] people far away,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there are many deserted places in the midst of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “And though a tenth [of the people] remain in the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It will again be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: subject
  - type: text
    text: ' to destruction [consumed and burned],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a massive terebinth tree or like an oak
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose stump remains when it is chopped down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The holy seed [the elect remnant] is its stump [the substance of Israel].”
