    content: Isaiah’s Vision
  - type: text
    content: 'In the year that King Uzziah died, I saw [in a vision] the Lord sitting on a throne, high and exalted, with the train of His royal robe filling the [most holy part of the] temple. [John 12:41] '
  '10':
  - type: text
    content: “Make the heart of this people insensitive,
  - type: text
    content: Their ears dull,
  - type: text
    content: And their eyes dim,
  - type: text
    content: Otherwise they might see with their eyes,
  - type: text
    content: Hear with their ears,
  - type: text
    content: Understand with their hearts,
  - type: text
    content: And return and be healed.”
  '11':
  - type: text
    content: Then I said, “Lord, how long?” And He answered,
  - type: text
