document_id: ECC.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Men Are in the Hand of God
  - type: text
    content: 'For I have taken all this to heart, exploring '
  - type: text
    content: and
  - type: text
    content: ' examining it all, how the righteous (those in right standing with God) and the wise and their deeds are in the hands of God. No man knows whether it will be love or hatred; anything awaits him.'
  '10':
  - type: text
    content: Whatever your hand finds to do, do it with all your might; for there is no activity or planning or knowledge or wisdom in Sheol (the nether world, the place of the dead) where you are going.
  '11':
  - type: text
    content: 'I again saw under the sun that the race is not to the swift and the battle is not to the strong, and neither is bread to the wise nor riches to those of intelligence '
  - type: text
    content: and
  - type: text
    content: ' understanding nor favor to men of ability; but time and chance overtake them all. [Ps 33:16-19; Rom 9:16] '
  '12':
  - type: text
    content: For man also does not know his time [of death]; like fish caught in a treacherous net, and birds caught in the snare, so the sons of men are ensnared in an evil time when a dark cloud suddenly falls on them.
  '13':
  - type: text
    content: 'This [illustration of] wisdom I have also seen under the sun, and great it was to me: '
  '14':
  - type: text
    content: 'There was a little city with few men in it and a great king came against it and besieged it and built great battlements against it. '
  '15':
  - type: text
    content: 'But there was found in it a poor wise man, and by his wisdom he rescued the city. Yet no man [seriously] remembered that poor man. '
  '16':
  - type: text
    content: 'But I say that wisdom is better than strength, though the poor man’s wisdom is despised and his words are not heeded. '
  '17':
  - type: text
    content: 'The words of wise men heard in quietness are '
  - type: text
    content: better
  - type: text
    content: ' than the shouting of one who rules among fools. '
  '18':
  - type: text
    content: Wisdom is better than weapons of war, but one sinner destroys much good.
  '2':
  - type: text
    content: 'It is the same for all. There is one fate for the righteous and for the wicked; for the good, for the clean and for the unclean; for the man who offers sacrifices and for the one who does not sacrifice. As the good man is, so is the sinner; as he who swears '
  - type: text
    content: an oath
  - type: text
    content: ' is, so is he who is afraid to swear '
  - type: text
    content: an oath
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'This evil is in all that is done under the sun, that one fate comes to all. Also, the hearts of the sons of men are full of evil, and madness is in their hearts while they live, and afterwards they go to the dead. '
  '4':
  - type: text
    content: '[There is no exemption,] but whoever is joined with all the living, has hope; surely a live dog is better than a dead lion. '
  '5':
  - type: text
    content: 'For the living know that they will die; but the dead know nothing, and they no longer have a reward [here], for the memory of them is forgotten. '
  '6':
  - type: text
    content: Indeed their love, their hatred and their zeal have already perished, and they will no longer have a share [in this age] in anything that is done under the sun.
  '7':
  - type: text
    content: 'Go '
  - type: text
    content: your way,
  - type: text
    content: ' eat your bread with joy and drink your wine with a cheerful heart [if you are righteous, wise, and in the hands of God]; for God has already approved '
  - type: text
    content: and
  - type: text
    content: ' accepted your works. '
  '8':
  - type: text
    content: 'Let your clothes always be white [with purity], and do not let the oil [of gladness] be lacking on your head. '
  '9':
  - type: text
    content: 'Live joyfully with the wife whom you love all the days of your fleeting life which He has given you under the sun—all the days of vanity '
  - type: text
    content: and
  - type: text
    content: ' futility. For this is your reward in life and in your work in which you have labored under the sun.'
  - type: heading
    content: Whatever Your Hand Finds to Do
