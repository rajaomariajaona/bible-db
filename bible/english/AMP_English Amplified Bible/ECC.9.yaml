document_id: ECC.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Men Are in the Hand of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For I have taken all this to heart, exploring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examining it all, how the righteous (those in right standing with God) and the wise and their deeds are in the hands of God. No man knows whether it will be love or hatred; anything awaits him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'It is the same for all. There is one fate for the righteous and for the wicked; for the good, for the clean and for the unclean; for the man who offers sacrifices and for the one who does not sacrifice. As the good man is, so is the sinner; as he who swears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an oath
  - type: text
    text: ' is, so is he who is afraid to swear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an oath
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This evil is in all that is done under the sun, that one fate comes to all. Also, the hearts of the sons of men are full of evil, and madness is in their hearts while they live, and afterwards they go to the dead. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '[There is no exemption,] but whoever is joined with all the living, has hope; surely a live dog is better than a dead lion. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the living know that they will die; but the dead know nothing, and they no longer have a reward [here], for the memory of them is forgotten. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indeed their love, their hatred and their zeal have already perished, and they will no longer have a share [in this age] in anything that is done under the sun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your way,
  - type: text
    text: ' eat your bread with joy and drink your wine with a cheerful heart [if you are righteous, wise, and in the hands of God]; for God has already approved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepted your works. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let your clothes always be white [with purity], and do not let the oil [of gladness] be lacking on your head. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Live joyfully with the wife whom you love all the days of your fleeting life which He has given you under the sun—all the days of vanity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' futility. For this is your reward in life and in your work in which you have labored under the sun.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Whatever Your Hand Finds to Do
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whatever your hand finds to do, do it with all your might; for there is no activity or planning or knowledge or wisdom in Sheol (the nether world, the place of the dead) where you are going.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I again saw under the sun that the race is not to the swift and the battle is not to the strong, and neither is bread to the wise nor riches to those of intelligence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding nor favor to men of ability; but time and chance overtake them all. [Ps 33:16-19; Rom 9:16] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For man also does not know his time [of death]; like fish caught in a treacherous net, and birds caught in the snare, so the sons of men are ensnared in an evil time when a dark cloud suddenly falls on them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This [illustration of] wisdom I have also seen under the sun, and great it was to me: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There was a little city with few men in it and a great king came against it and besieged it and built great battlements against it. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But there was found in it a poor wise man, and by his wisdom he rescued the city. Yet no man [seriously] remembered that poor man. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But I say that wisdom is better than strength, though the poor man’s wisdom is despised and his words are not heeded. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The words of wise men heard in quietness are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: better
  - type: text
    text: ' than the shouting of one who rules among fools. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Wisdom is better than weapons of war, but one sinner destroys much good.
