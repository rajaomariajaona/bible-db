document_id: DEU.34,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Moses
  - type: text
    content: ' '
  - type: note
    content: The author of this final section regarding the death of Moses is uncertain.
  - type: text
    content: Now Moses went up from the plains of Moab to Mount Nebo, to the top of Pisgah, that is opposite Jericho. And the L
  - type: heading
    content: ord
  - type: text
    content: ' showed him all the land, from Gilead to Dan, '
  '10':
  - type: text
    content: Since that time no prophet has risen in Israel like Moses, whom the L
  - type: heading
    content: ord
  - type: text
    content: ' knew face to face, '
  '11':
  - type: text
    content: '[none equal to him] in all the signs and wonders which the L'
  - type: heading
    content: ord
  - type: text
    content: ' sent him to perform in the land of Egypt against Pharaoh, all his servants, and all his land, '
  '12':
  - type: text
    content: 'and in all the mighty power and all the great '
  - type: text
    content: and
  - type: text
    content: ' terrible deeds which Moses performed in the sight of all Israel.'
  '2':
  - type: text
    content: 'and all Naphtali and the land of Ephraim and Manasseh, and all the land of Judah to the western sea (Mediterranean Sea), '
  '3':
  - type: text
    content: 'and the Negev (South country) and the plain in the Valley of Jericho, the city of palm trees, as far as Zoar. '
  '4':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “This is the land which I swore to Abraham, Isaac, and Jacob, saying, ‘I will give it to your descendants.’ I have let you see it with your eyes, but you shall not go over there.” '
  '5':
  - type: text
    content: So Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' died there in the land of Moab, according to the word of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'And He buried him in the valley in the land of Moab, opposite Beth-peor; but no man knows where his burial place is to this day. '
  '7':
  - type: text
    content: 'Although Moses was a hundred and twenty years old when he died, his eyesight was not dim, nor his natural strength abated. [Deut 31:2] '
  '8':
  - type: text
    content: So the sons of Israel wept for Moses in the plains of Moab for thirty days; then the days of weeping and mourning for Moses were ended.
  '9':
  - type: text
    content: Now Joshua the son of Nun was filled with the spirit of wisdom, for Moses had laid his hands on him; so the sons of Israel listened to him and did as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses. '
