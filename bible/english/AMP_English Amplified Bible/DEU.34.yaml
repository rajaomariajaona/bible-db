document_id: DEU.34,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Death of Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The author of this final section regarding the death of Moses is uncertain.
      marker-yv: yv-n
    - type: text
      text: Now Moses went up from the plains of Moab to Mount Nebo, to the top of Pisgah, that is opposite Jericho. And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' showed him all the land, from Gilead to Dan, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Since that time no prophet has risen in Israel like Moses, whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' knew face to face, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[none equal to him] in all the signs and wonders which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent him to perform in the land of Egypt against Pharaoh, all his servants, and all his land, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in all the mighty power and all the great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrible deeds which Moses performed in the sight of all Israel.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all Naphtali and the land of Ephraim and Manasseh, and all the land of Judah to the western sea (Mediterranean Sea), '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the Negev (South country) and the plain in the Valley of Jericho, the city of palm trees, as far as Zoar. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “This is the land which I swore to Abraham, Isaac, and Jacob, saying, ‘I will give it to your descendants.’ I have let you see it with your eyes, but you shall not go over there.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' died there in the land of Moab, according to the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He buried him in the valley in the land of Moab, opposite Beth-peor; but no man knows where his burial place is to this day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Although Moses was a hundred and twenty years old when he died, his eyesight was not dim, nor his natural strength abated. [Deut 31:2] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the sons of Israel wept for Moses in the plains of Moab for thirty days; then the days of weeping and mourning for Moses were ended.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Joshua the son of Nun was filled with the spirit of wisdom, for Moses had laid his hands on him; so the sons of Israel listened to him and did as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded Moses. '
