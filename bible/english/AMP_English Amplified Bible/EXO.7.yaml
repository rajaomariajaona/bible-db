document_id: EXO.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “I Will Stretch Out My Hand”
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Now hear this: I make you as God to Pharaoh [to declare My will and purpose to him]; and your brother Aaron shall be your prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'You shall speak all that I command you, and your brother Aaron shall tell Pharaoh to let the children of Israel go out of his land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I will make Pharaoh’s heart hard, and multiply My signs and My wonders (miracles) in the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Pharaoh will not listen to you, and I shall lay My hand on Egypt and bring out My hosts [like a defensive army, tribe by tribe], My people the children of Israel, out of the land of Egypt by great acts of judgment (the plagues). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Egyptians shall know that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', when I stretch out My hand on Egypt and bring out the children of Israel from among them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And Moses and Aaron did so; just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded them, so they did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now Moses was eighty years old and Aaron eighty-three years old when they spoke to Pharaoh.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aaron’s Rod Becomes a Serpent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses and Aaron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“When Pharaoh says to you, ‘Work a miracle [to prove your authority],’ then you say to Aaron, ‘Take your staff and throw it down before Pharaoh, so that it may become a serpent.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So Moses and Aaron came to Pharaoh, and did just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded; Aaron threw down his staff before Pharaoh and his servants, and it became a serpent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Pharaoh called for the wise men [skilled in magic and omens] and the sorcerers [skilled in witchcraft], and they also, these magicians (soothsayer-priests) of Egypt, did the same with their secret arts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enchantments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For every '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jannes and Jambres may have been among this group of Egyptian sorcerers. See 2 Tim 3:8.
    marker-yv: yv-n
  - type: text
    text: 'man threw down his staff and they turned into serpents; but Aaron’s staff swallowed up their staffs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet Pharaoh’s heart was hardened and he would not listen to them, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Water Is Turned to Blood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Pharaoh’s heart is hard; he refuses to let the people go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Go to Pharaoh in the morning as he is going out to the water, and wait for him on the bank of the Nile; and you shall take in your hand the staff that was turned into a serpent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You shall say to him, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of the Hebrews, has sent me to you, saying, “Let My people go, so that they may serve Me in the wilderness. But behold, you have not listened until now.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “By this you shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': look, with the staff in my hand I will strike the water in the Nile, and it shall be turned to blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The fish in the Nile will die, and the Nile will become foul, and the Egyptians will not be able to drink water from the Nile.” ’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Say to Aaron, ‘Take your staff and stretch out your hand over the waters of Egypt, over their rivers, over their streams, over their pools, and over all their reservoirs of water, so that they may become blood; and there shall be blood throughout all the land of Egypt, in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: containers
  - type: text
    text: ' both of wood and of stone.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Moses and Aaron did as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded; Aaron lifted up the staff and struck the waters in the Nile, in the sight of Pharaoh and in the sight of his servants, and all the water that was in the Nile was turned into blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The fish in the Nile died, and the river became foul smelling, and the Egyptians could not drink its water, and there was blood throughout '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At least some of the ground water was spared, and the Egyptians were forced to dig for it (v 24).
    marker-yv: yv-n
  - type: text
    text: 'all the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the magicians of Egypt did the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps the priests were able to change a small quantity of the blood back into water or vice-versa. That would explain why Pharaoh took the problem so lightly (v 23).
    marker-yv: yv-n
  - type: text
    text: 'same by their secret arts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enchantments; so Pharaoh’s heart was hardened, and he did not listen to Moses and Aaron, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Pharaoh turned and went into his house, and he did not take even this [divine sign] to heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So all the Egyptians dug near the river for water to drink, because they could not drink the water of the Nile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Seven days passed after the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had struck the Nile.'
