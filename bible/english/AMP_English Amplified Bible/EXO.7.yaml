document_id: EXO.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: “I Will Stretch Out My Hand”
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Now hear this: I make you as God to Pharaoh [to declare My will and purpose to him]; and your brother Aaron shall be your prophet. '
  '10':
  - type: text
    content: So Moses and Aaron came to Pharaoh, and did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded; Aaron threw down his staff before Pharaoh and his servants, and it became a serpent. '
  '11':
  - type: text
    content: 'Then Pharaoh called for the wise men [skilled in magic and omens] and the sorcerers [skilled in witchcraft], and they also, these magicians (soothsayer-priests) of Egypt, did the same with their secret arts '
  - type: text
    content: and
  - type: text
    content: ' enchantments. '
  '12':
  - type: text
    content: 'For every '
  - type: note
    content: Jannes and Jambres may have been among this group of Egyptian sorcerers. See 2 Tim 3:8.
  - type: text
    content: 'man threw down his staff and they turned into serpents; but Aaron’s staff swallowed up their staffs. '
  '13':
  - type: text
    content: Yet Pharaoh’s heart was hardened and he would not listen to them, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had said.'
  - type: heading
    content: Water Is Turned to Blood
  '14':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Pharaoh’s heart is hard; he refuses to let the people go. '
  '15':
  - type: text
    content: 'Go to Pharaoh in the morning as he is going out to the water, and wait for him on the bank of the Nile; and you shall take in your hand the staff that was turned into a serpent. '
  '16':
  - type: text
    content: You shall say to him, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ', the God of the Hebrews, has sent me to you, saying, “Let My people go, so that they may serve Me in the wilderness. But behold, you have not listened until now.” '
  '17':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “By this you shall know '
  - type: text
    content: and
  - type: text
    content: ' recognize '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ': look, with the staff in my hand I will strike the water in the Nile, and it shall be turned to blood. '
  '18':
  - type: text
    content: 'The fish in the Nile will die, and the Nile will become foul, and the Egyptians will not be able to drink water from the Nile.” ’ ” '
  '19':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Say to Aaron, ‘Take your staff and stretch out your hand over the waters of Egypt, over their rivers, over their streams, over their pools, and over all their reservoirs of water, so that they may become blood; and there shall be blood throughout all the land of Egypt, in '
  - type: text
    content: containers
  - type: text
    content: ' both of wood and of stone.’ ”'
  '2':
  - type: text
    content: 'You shall speak all that I command you, and your brother Aaron shall tell Pharaoh to let the children of Israel go out of his land. '
  '20':
  - type: text
    content: So Moses and Aaron did as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded; Aaron lifted up the staff and struck the waters in the Nile, in the sight of Pharaoh and in the sight of his servants, and all the water that was in the Nile was turned into blood. '
  '21':
  - type: text
    content: 'The fish in the Nile died, and the river became foul smelling, and the Egyptians could not drink its water, and there was blood throughout '
  - type: note
    content: At least some of the ground water was spared, and the Egyptians were forced to dig for it (v 24).
  - type: text
    content: 'all the land of Egypt. '
  '22':
  - type: text
    content: 'But the magicians of Egypt did the '
  - type: note
    content: Perhaps the priests were able to change a small quantity of the blood back into water or vice-versa. That would explain why Pharaoh took the problem so lightly (v 23).
  - type: text
    content: 'same by their secret arts '
  - type: text
    content: and
  - type: text
    content: ' enchantments; so Pharaoh’s heart was hardened, and he did not listen to Moses and Aaron, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had said. '
  '23':
  - type: text
    content: 'Then Pharaoh turned and went into his house, and he did not take even this [divine sign] to heart. '
  '24':
  - type: text
    content: 'So all the Egyptians dug near the river for water to drink, because they could not drink the water of the Nile. '
  '25':
  - type: text
    content: Seven days passed after the L
  - type: heading
    content: ord
  - type: text
    content: ' had struck the Nile.'
  '3':
  - type: text
    content: 'And I will make Pharaoh’s heart hard, and multiply My signs and My wonders (miracles) in the land of Egypt. '
  '4':
  - type: text
    content: 'But Pharaoh will not listen to you, and I shall lay My hand on Egypt and bring out My hosts [like a defensive army, tribe by tribe], My people the children of Israel, out of the land of Egypt by great acts of judgment (the plagues). '
  '5':
  - type: text
    content: The Egyptians shall know that I am the L
  - type: heading
    content: ord
  - type: text
    content: ', when I stretch out My hand on Egypt and bring out the children of Israel from among them.” '
  '6':
  - type: text
    content: And Moses and Aaron did so; just as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded them, so they did. '
  '7':
  - type: text
    content: Now Moses was eighty years old and Aaron eighty-three years old when they spoke to Pharaoh.
  - type: heading
    content: Aaron’s Rod Becomes a Serpent
  '8':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses and Aaron, '
  '9':
  - type: text
    content: '“When Pharaoh says to you, ‘Work a miracle [to prove your authority],’ then you say to Aaron, ‘Take your staff and throw it down before Pharaoh, so that it may become a serpent.’ ” '
