    - type: text
      text: Peter’s Arrest and Escape
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now at that time '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Herod Agrippa I was the grandson of Herod the Great. Since he was of Hasmonean descent he was partly Jewish.
    marker-yv: yv-n
  - type: text
    text: 'Herod [Agrippa I] the king [of the Jews] arrested some who belonged to the church, intending to harm them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he had James the brother of John put to death with a sword; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and when he saw that it pleased the Jews, he proceeded to have Peter arrested as well. This was during the days of Unleavened Bread [the Passover week]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When he had seized Peter, he put him in prison, turning him over to four squads of soldiers of four each to guard him [in rotation throughout the night], planning after the Passover to bring him out before the people [for execution]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Peter was kept in prison, but fervent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persistent prayer for him was being made to God by the church.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The very night before Herod was to bring him forward, Peter was sleeping between two soldiers, bound with two chains, and sentries were in front of the door guarding the prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Suddenly, an angel of the Lord appeared [beside him] and a light shone in the cell. The angel struck Peter’s side and awakened him, saying, “Get up quickly!” And the chains fell off his hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The angel said to him, “Prepare yourself and strap on your sandals [to get ready for whatever may happen].” And he did so. Then the angel told him, “Put on your robe and follow me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Peter went out following '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the angel.
  - type: text
    text: ' He did not realize that what was being done by the angel was real, but thought he was seeing a vision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they had passed the first guard and the second, they came to the iron gate that leads into the city. Of its own accord it swung open for them; and they went out and went along one street, and at once the angel left him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When Peter came to his senses, he said, “Now I know for certain that the Lord has sent His angel and has rescued me from the hand of Herod and from all that the Jewish people were expecting [to do to me].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When he realized what had happened, he went to the house of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to Col 4:10 this Mary was the aunt of Barnabas, so her son John Mark and Barnabas were cousins.
    marker-yv: yv-n
  - type: text
    text: 'Mary the mother of John, who was also called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'John Mark wrote the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gospel of Mark
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mark, where many [believers] were gathered together and were praying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' [and had been praying all night]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When he knocked at the door of the gateway, a servant-girl named Rhoda came to answer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Recognizing Peter’s voice, in her joy she failed to open the gate, but ran in and announced that Peter was standing in front of the gateway. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They said to her, “You are out of your mind!” But she kept insisting that it was so. They kept saying, “It is his angel!” [Matt 18:10; Heb 1:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But [meanwhile] Peter continued knocking; and when they opened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the door
  - type: text
    text: ' and saw him, they were completely amazed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But motioning to them with his hand to be quiet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listen, he described how the Lord had led him out of the prison. And he said, “Report these things to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'James, the oldest of the Lord’s half-brothers, was the leader of the Jerusalem church and wrote the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Letter of James
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: James and the brothers and sisters.” Then he left and went to another place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now when day came, there was no small disturbance among the soldiers over what had become of Peter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When Herod had searched for him and could not find him, he interrogated the guards and commanded that they be led away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to execution
  - type: text
    text: . Then he went down from Judea to Caesarea [Maritima] and spent some time there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Death of Herod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now Herod [Agrippa I] was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nothing is known about the reason for Herod’s hatred. It may have had something to do with competition between Caesarea Maritima and the two northern cities, since all three were major sea ports.
    marker-yv: yv-n
  - type: text
    text: 'extremely angry with the people of Tyre and Sidon; and their delegates came to him in a united group, and after persuading Blastus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a trusted, highly regarded chief officer.
    marker-yv: yv-n
  - type: text
    text: 'the king’s chamberlain [to support their cause], they asked for peace, because their country was fed by [imports of grain and other goods from] the king’s country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On an appointed day Herod dressed himself in his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jewish historian Josephus describes this as a glittering silver garment.
    marker-yv: yv-n
  - type: text
    text: 'royal robes, sat on his throne (tribunal, rostrum) and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' delivering a speech to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The assembled people kept shouting, “It is the voice of a god and not of a man!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And at once an angel of the Lord struck him down because he did not give God the glory [and instead permitted himself to be worshiped], and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Herod’s painful death over a five day period in '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 44 is recorded by Josephus, the Jewish historian.
    marker-yv: yv-n
  - type: text
    text: he was eaten by worms and died [five days later].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But the word of the Lord [the good news about salvation through Christ] continued to grow and spread [increasing in effectiveness].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Barnabas and Saul came back '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two early mss read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to Jerusalem
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: from Jerusalem when they had completed their mission, bringing with them John, who was also called Mark. [Acts 11:28-30]
