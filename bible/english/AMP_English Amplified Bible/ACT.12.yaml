document_id: ACT.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter’s Arrest and Escape
  - type: text
    content: 'Now at that time '
  - type: note
    content: I.e. Herod Agrippa I was the grandson of Herod the Great. Since he was of Hasmonean descent he was partly Jewish.
  - type: text
    content: 'Herod [Agrippa I] the king [of the Jews] arrested some who belonged to the church, intending to harm them. '
  '10':
  - type: text
    content: 'When they had passed the first guard and the second, they came to the iron gate that leads into the city. Of its own accord it swung open for them; and they went out and went along one street, and at once the angel left him. '
  '11':
  - type: text
    content: 'When Peter came to his senses, he said, “Now I know for certain that the Lord has sent His angel and has rescued me from the hand of Herod and from all that the Jewish people were expecting [to do to me].” '
  '12':
  - type: text
    content: 'When he realized what had happened, he went to the house of '
  - type: note
    content: According to Col 4:10 this Mary was the aunt of Barnabas, so her son John Mark and Barnabas were cousins.
  - type: text
    content: 'Mary the mother of John, who was also called '
  - type: note
    content: John Mark wrote the Gospel of Mark.
  - type: text
    content: 'Mark, where many [believers] were gathered together and were praying '
  - type: text
    content: continually
  - type: text
    content: ' [and had been praying all night]. '
  '13':
  - type: text
    content: 'When he knocked at the door of the gateway, a servant-girl named Rhoda came to answer. '
  '14':
  - type: text
    content: 'Recognizing Peter’s voice, in her joy she failed to open the gate, but ran in and announced that Peter was standing in front of the gateway. '
  '15':
  - type: text
    content: 'They said to her, “You are out of your mind!” But she kept insisting that it was so. They kept saying, “It is his angel!” [Matt 18:10; Heb 1:14] '
  '16':
  - type: text
    content: 'But [meanwhile] Peter continued knocking; and when they opened '
  - type: text
    content: the door
  - type: text
    content: ' and saw him, they were completely amazed. '
  '17':
  - type: text
    content: 'But motioning to them with his hand to be quiet '
  - type: text
    content: and
  - type: text
    content: ' listen, he described how the Lord had led him out of the prison. And he said, “Report these things to '
  - type: note
    content: James, the oldest of the Lord’s half-brothers, was the leader of the Jerusalem church and wrote the Letter of James.
  - type: text
    content: James and the brothers and sisters.” Then he left and went to another place.
  '18':
  - type: text
    content: 'Now when day came, there was no small disturbance among the soldiers over what had become of Peter. '
  '19':
  - type: text
    content: 'When Herod had searched for him and could not find him, he interrogated the guards and commanded that they be led away '
  - type: text
    content: to execution
  - type: text
    content: . Then he went down from Judea to Caesarea [Maritima] and spent some time there.
  - type: heading
    content: Death of Herod
  '2':
  - type: text
    content: 'And he had James the brother of John put to death with a sword; '
  '20':
  - type: text
    content: 'Now Herod [Agrippa I] was '
  - type: note
    content: Nothing is known about the reason for Herod’s hatred. It may have had something to do with competition between Caesarea Maritima and the two northern cities, since all three were major sea ports.
  - type: text
    content: 'extremely angry with the people of Tyre and Sidon; and their delegates came to him in a united group, and after persuading Blastus, '
  - type: note
    content: I.e. a trusted, highly regarded chief officer.
  - type: text
    content: 'the king’s chamberlain [to support their cause], they asked for peace, because their country was fed by [imports of grain and other goods from] the king’s country. '
  '21':
  - type: text
    content: 'On an appointed day Herod dressed himself in his '
  - type: note
    content: The Jewish historian Josephus describes this as a glittering silver garment.
  - type: text
    content: 'royal robes, sat on his throne (tribunal, rostrum) and '
  - type: text
    content: began
  - type: text
    content: ' delivering a speech to the people. '
  '22':
  - type: text
    content: 'The assembled people kept shouting, “It is the voice of a god and not of a man!” '
  '23':
  - type: text
    content: 'And at once an angel of the Lord struck him down because he did not give God the glory [and instead permitted himself to be worshiped], and '
  - type: note
    content: Herod’s painful death over a five day period in a.d. 44 is recorded by Josephus, the Jewish historian.
  - type: text
    content: he was eaten by worms and died [five days later].
  '24':
  - type: text
    content: But the word of the Lord [the good news about salvation through Christ] continued to grow and spread [increasing in effectiveness].
  '25':
  - type: text
    content: 'Barnabas and Saul came back '
  - type: note
    content: Two early mss read to Jerusalem.
  - type: text
    content: from Jerusalem when they had completed their mission, bringing with them John, who was also called Mark. [Acts 11:28-30]
  '3':
  - type: text
    content: 'and when he saw that it pleased the Jews, he proceeded to have Peter arrested as well. This was during the days of Unleavened Bread [the Passover week]. '
  '4':
  - type: text
    content: 'When he had seized Peter, he put him in prison, turning him over to four squads of soldiers of four each to guard him [in rotation throughout the night], planning after the Passover to bring him out before the people [for execution]. '
  '5':
  - type: text
    content: 'So Peter was kept in prison, but fervent '
  - type: text
    content: and
  - type: text
    content: ' persistent prayer for him was being made to God by the church.'
  '6':
  - type: text
    content: 'The very night before Herod was to bring him forward, Peter was sleeping between two soldiers, bound with two chains, and sentries were in front of the door guarding the prison. '
  '7':
  - type: text
    content: 'Suddenly, an angel of the Lord appeared [beside him] and a light shone in the cell. The angel struck Peter’s side and awakened him, saying, “Get up quickly!” And the chains fell off his hands. '
  '8':
  - type: text
    content: 'The angel said to him, “Prepare yourself and strap on your sandals [to get ready for whatever may happen].” And he did so. Then the angel told him, “Put on your robe and follow me.” '
  '9':
  - type: text
    content: 'And Peter went out following '
  - type: text
    content: the angel.
  - type: text
    content: ' He did not realize that what was being done by the angel was real, but thought he was seeing a vision. '
