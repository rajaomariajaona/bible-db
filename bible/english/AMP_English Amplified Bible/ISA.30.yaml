      children:
      - type: text
        text: 'MT reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: For a people will dwell in Zion, in Jerusalem
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'O people in Zion, inhabitant in Jerusalem, you will weep no longer. He will most certainly be gracious to you at the sound of your cry for help; when He hears it, He will answer you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Though the Lord gives you the bread of adversity and the water of oppression, yet your Teacher will no longer hide Himself, but your eyes will [constantly] see your Teacher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Your ears will hear a word behind you, “This is the way, walk in it,” whenever you turn to the right or to the left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And you will defile your carved images overlaid with silver, and your cast images plated with gold. You will scatter them like a bloodstained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cloth,
  - type: text
    text: ' and will say to them, “Be gone!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then He will give you rain for the seed with which you sow the ground, and bread [grain] from the produce of the ground, and it will be rich and plentiful. In that day your livestock will graze in large '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' roomy pastures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Also the oxen and the young donkeys that work the ground will eat salted fodder, which has been winnowed with shovel and pitchfork. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: On every lofty mountain and on every high hill there will be streams of water on the day of the great slaughter (the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '), when the towers fall [and all His enemies are destroyed]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The light of the full moon will be like the light of the sun, and the light of the sun will be seven times '
  - type: usfm
    marker: it
    children:
    - type: text
      text: brighter,
  - type: text
    text: ' like the light of seven days [concentrated in one], in the day the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' binds up the fracture of His people and heals the wound He has inflicted [because of their sins].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '¶Now look, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The revelation of the power and glory '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' brilliance of God.'
    marker-yv: yv-n
  - type: text
    text: name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' comes from far away,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Burning with His anger, and heavy with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lifting up,
      - type: text
        text: ' possibly referring to clouds.'
    marker-yv: yv-n
  - type: text
    text: smoke;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His lips are full of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: cursing
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His tongue is like a consuming fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: His breath is like an overflowing river,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which reaches to the neck,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To sift the nations back and forth in a sieve [of disaster],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to put
  - type: text
    text: ' in the jaws of the peoples the bridle which leads to ruin.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: You will have a song as in the night when a holy feast is kept,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And joy of heart as when one marches [in procession] with a flute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To go to the [temple on the] mountain of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to the Rock of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will make His majestic voice heard,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And show the descending of His arm [striking] in [His] fierce anger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the flame of a devouring fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the crashing sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of heavy rain,
  - type: text
    text: ' cloudburst, and hailstones.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For at the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the Assyrians will be terrified,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: When
  - type: text
    text: ' He strikes [them] with the rod.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And every blow of the rod of punishment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will lay on them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will be to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the music of Israel’s
  - type: text
    text: ' tambourines and lyres;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in battles, brandishing weapons, He will fight Assyria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'For '
  - type: usfm
