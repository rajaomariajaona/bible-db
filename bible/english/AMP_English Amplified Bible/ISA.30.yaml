  - type: text
    text: ¶Therefore the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' waits [expectantly] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' longs to be gracious to you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And therefore He waits on high to have compassion on you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis posed the question of why God waits to bring in the kingdom, if both He and Israel desire it. Their answer was that God’s attribute of justice delays it, i.e. that Israel is not yet deserving of it. Nevertheless, they maintained, it is meritorious to look forward to it, and those who do will be blessed (rewarded).
    marker-yv: yv-n
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is a God of justice;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed (happy, fortunate) are all those who long for Him [since He will never fail them]. [John 14:3, 27; 2 Cor 12:9; Heb 12:2; 1 John 3:16; Rev 3:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:19 '
    - type: usfm
