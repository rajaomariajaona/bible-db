    marker-yv: yv-n
  - type: text
    text: 'where '
  - type: usfm
    marker: it
    children:
    - type: text
      text: come
  - type: text
    text: ' lioness and lion, viper and [fiery] flying serpent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They carry their riches on the shoulders of young donkeys
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their treasures on the humps of camels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To a people (Egyptians) who cannot benefit them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For Egypt’s help is worthless and good for nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I have called her
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Rahab Who Has Been Exterminated.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now, go, write it on a tablet before them
- type: usfm
  marker: q1
  children:
  - type: text
    text: And inscribe it on a scroll,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that it may serve in the time to come
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a witness [against them] forevermore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For this is a rebellious people, lying sons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sons who refuse to listen to
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The law '
  - type: usfm
    marker: it
    children:
    - type: text
