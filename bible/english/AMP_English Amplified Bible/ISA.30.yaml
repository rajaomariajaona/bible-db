- type: usfm
  marker: q1
  children:
  - type: text
    text: Through a land of trouble and anguish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
