    - type: text
      text: '10'
  - type: text
    text: 'Who say to the seers, “You must not see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: visions from God”;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the prophets, “You must not prophesy to us what is right!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Speak to us pleasant things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smooth words,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prophesy [deceitful] illusions [that we will enjoy].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Get out of the [true] way, turn aside from the path [of God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stop bothering us with the Holy One of Israel.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Therefore, the Holy One of Israel says this,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Because you have refused '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected this word [of Mine]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have put your trust in oppression and guile, and have relied on them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore this wickedness [this sin, this injustice, this wrongdoing] will be to you
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a crack [in a wall] about to fall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A bulge in a high wall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose collapse comes suddenly in an instant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Whose collapse is like the smashing of a potter’s jar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Crushed so savagely
- type: usfm
  marker: q1
  children:
  - type: text
    text: that there cannot be found among its pieces a potsherd [large enough]
- type: usfm
  marker: q1
  children:
  - type: text
    text: To take [coals of] fire from a fireplace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or to scoop water from a cistern.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', the Holy One of Israel has said this,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In returning [to Me] and rest you shall be saved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In quietness and confident trust is your strength.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you were not willing,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And you said, “No! We will flee on horses!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore you will flee [from your enemies]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [you said], “We will ride on swift horses!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore those who pursue you shall be swift.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A thousand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of you will flee
  - type: text
    text: ' at the threat of one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will flee at the threat of five,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until you are left like a flag on the top of a mountain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a signal on a hill.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Is Gracious and Just
  marker-yv: yv-h
- type: usfm
