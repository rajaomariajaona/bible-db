document_id: ISA.30,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah Warned against Egyptian Alliance
  - type: text
    content: “Woe (judgment is coming) to the rebellious children,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Who carry out a plan, but not Mine,
  - type: text
    content: And make an alliance [by pouring out a libation], but not of My Spirit,
  - type: text
    content: In order to add sin to sin;
  '10':
  - type: text
    content: 'Who say to the seers, “You must not see '
  - type: text
    content: visions from God”;
  - type: text
    content: And to the prophets, “You must not prophesy to us what is right!
  - type: text
    content: 'Speak to us pleasant things '
  - type: text
    content: and
  - type: text
    content: ' smooth words,'
  - type: text
    content: Prophesy [deceitful] illusions [that we will enjoy].
  '11':
  - type: text
    content: “Get out of the [true] way, turn aside from the path [of God],
  - type: text
    content: Stop bothering us with the Holy One of Israel.”
  '12':
  - type: text
    content: Therefore, the Holy One of Israel says this,
  - type: text
    content: '“Because you have refused '
  - type: text
    content: and
  - type: text
    content: ' rejected this word [of Mine]'
  - type: text
    content: And have put your trust in oppression and guile, and have relied on them,
  '13':
  - type: text
    content: Therefore this wickedness [this sin, this injustice, this wrongdoing] will be to you
  - type: text
    content: Like a crack [in a wall] about to fall,
  - type: text
    content: A bulge in a high wall,
  - type: text
    content: Whose collapse comes suddenly in an instant,
  '14':
  - type: text
    content: Whose collapse is like the smashing of a potter’s jar,
  - type: text
    content: Crushed so savagely
  - type: text
    content: that there cannot be found among its pieces a potsherd [large enough]
  - type: text
    content: To take [coals of] fire from a fireplace,
  - type: text
    content: Or to scoop water from a cistern.”
  '15':
  - type: text
    content: For the Lord G
  - type: heading
    content: od
  - type: text
    content: ', the Holy One of Israel has said this,'
  - type: text
    content: “In returning [to Me] and rest you shall be saved,
  - type: text
    content: In quietness and confident trust is your strength.”
  - type: text
    content: But you were not willing,
  '16':
  - type: text
    content: And you said, “No! We will flee on horses!”
  - type: text
    content: Therefore you will flee [from your enemies]!
  - type: text
    content: And [you said], “We will ride on swift horses!”
  - type: text
    content: Therefore those who pursue you shall be swift.
  '17':
  - type: text
    content: 'A thousand '
  - type: text
    content: of you will flee
  - type: text
    content: ' at the threat of one '
  - type: text
    content: man;
  - type: text
    content: You will flee at the threat of five,
  - type: text
    content: Until you are left like a flag on the top of a mountain,
  - type: text
    content: And like a signal on a hill.
  - type: heading
    content: God Is Gracious and Just
  '18':
  - type: text
    content: ¶Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' waits [expectantly] '
  - type: text
    content: and
  - type: text
    content: ' longs to be gracious to you,'
  - type: text
    content: And therefore He waits on high to have compassion on you.
  - type: note
    content: The ancient rabbis posed the question of why God waits to bring in the kingdom, if both He and Israel desire it. Their answer was that God’s attribute of justice delays it, i.e. that Israel is not yet deserving of it. Nevertheless, they maintained, it is meritorious to look forward to it, and those who do will be blessed (rewarded).
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is a God of justice;'
  - type: text
    content: Blessed (happy, fortunate) are all those who long for Him [since He will never fail them]. [John 14:3, 27; 2 Cor 12:9; Heb 12:2; 1 John 3:16; Rev 3:5]
  '19':
  - type: text
    content: ' '
  - type: note
    content: MT reads For a people will dwell in Zion, in Jerusalem.
  - type: text
    content: 'O people in Zion, inhabitant in Jerusalem, you will weep no longer. He will most certainly be gracious to you at the sound of your cry for help; when He hears it, He will answer you. '
  '2':
  - type: text
    content: Who proceed down to Egypt
  - type: text
    content: 'Without consulting '
  - type: note
    content: Lit My mouth.
  - type: text
    content: Me,
  - type: text
    content: To take refuge in the stronghold of Pharaoh
  - type: text
    content: And to take shelter in the shadow of Egypt!
  '20':
  - type: text
    content: 'Though the Lord gives you the bread of adversity and the water of oppression, yet your Teacher will no longer hide Himself, but your eyes will [constantly] see your Teacher. '
  '21':
  - type: text
    content: 'Your ears will hear a word behind you, “This is the way, walk in it,” whenever you turn to the right or to the left. '
  '22':
  - type: text
    content: 'And you will defile your carved images overlaid with silver, and your cast images plated with gold. You will scatter them like a bloodstained '
  - type: text
    content: cloth,
  - type: text
    content: ' and will say to them, “Be gone!”'
  '23':
  - type: text
    content: 'Then He will give you rain for the seed with which you sow the ground, and bread [grain] from the produce of the ground, and it will be rich and plentiful. In that day your livestock will graze in large '
  - type: text
    content: and
  - type: text
    content: ' roomy pastures. '
  '24':
  - type: text
    content: 'Also the oxen and the young donkeys that work the ground will eat salted fodder, which has been winnowed with shovel and pitchfork. '
  '25':
  - type: text
    content: On every lofty mountain and on every high hill there will be streams of water on the day of the great slaughter (the day of the L
  - type: heading
    content: ord
  - type: text
    content: '), when the towers fall [and all His enemies are destroyed]. '
  '26':
  - type: text
    content: 'The light of the full moon will be like the light of the sun, and the light of the sun will be seven times '
  - type: text
    content: brighter,
  - type: text
    content: ' like the light of seven days [concentrated in one], in the day the L'
  - type: heading
    content: ord
  - type: text
    content: ' binds up the fracture of His people and heals the wound He has inflicted [because of their sins].'
  '27':
  - type: text
    content: '¶Now look, the '
  - type: note
    content: The revelation of the power and glory and brilliance of God.
  - type: text
    content: name of the L
  - type: heading
    content: ord
  - type: text
    content: ' comes from far away,'
  - type: text
    content: 'Burning with His anger, and heavy with '
  - type: note
    content: Lit lifting up, possibly referring to clouds.
  - type: text
    content: smoke;
  - type: text
    content: 'His lips are full of '
  - type: note
    content: Lit cursing.
  - type: text
    content: indignation,
  - type: text
    content: And His tongue is like a consuming fire.
  '28':
  - type: text
    content: His breath is like an overflowing river,
  - type: text
    content: Which reaches to the neck,
  - type: text
    content: To sift the nations back and forth in a sieve [of disaster],
  - type: text
    content: 'And '
  - type: text
    content: to put
  - type: text
    content: ' in the jaws of the peoples the bridle which leads to ruin.'
  '29':
  - type: text
    content: You will have a song as in the night when a holy feast is kept,
  - type: text
    content: And joy of heart as when one marches [in procession] with a flute,
  - type: text
    content: To go to the [temple on the] mountain of the L
  - type: heading
    content: ord
  - type: text
    content: ', to the Rock of Israel.'
  '3':
  - type: text
    content: '“Therefore the safety '
  - type: text
    content: and
  - type: text
    content: ' protection of Pharaoh will be your shame'
  - type: text
    content: 'And the refuge in the shadow of Egypt, your humiliation '
  - type: text
    content: and
  - type: text
    content: ' disgrace.'
  '30':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will make His majestic voice heard,'
  - type: text
    content: And show the descending of His arm [striking] in [His] fierce anger,
  - type: text
    content: And in the flame of a devouring fire,
  - type: text
    content: 'In the crashing sound '
  - type: text
    content: of heavy rain,
  - type: text
    content: ' cloudburst, and hailstones.'
  '31':
  - type: text
    content: For at the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' the Assyrians will be terrified,'
  - type: text
    content: When
  - type: text
    content: ' He strikes [them] with the rod.'
  '32':
  - type: text
    content: And every blow of the rod of punishment,
  - type: text
    content: Which the L
  - type: heading
    content: ord
  - type: text
    content: ' will lay on them,'
  - type: text
    content: 'Will be to '
  - type: text
    content: the music of Israel’s
  - type: text
    content: ' tambourines and lyres;'
  - type: text
    content: And in battles, brandishing weapons, He will fight Assyria.
  '33':
  - type: text
    content: 'For '
  - type: note
    content: A pagan site where children were burned as sacrifices to Molech, a Semitic god.
  - type: text
    content: Topheth [in Hinnom] has long been ready;
  - type: text
    content: Indeed, it has been prepared for the [Assyrian] king.
  - type: text
    content: He has made it deep and wide,
  - type: text
    content: A pit of fire with plenty of wood;
  - type: text
    content: The breath of the L
  - type: heading
    content: ord
  - type: text
    content: ', like a river of brimstone (blazing sulfur), kindles '
  - type: text
    content: and
  - type: text
    content: ' fans it. [Jer 7:31, 32; Matt 5:22; 25:41]'
  '4':
  - type: text
    content: “For his princes are at Zoan
  - type: text
    content: And his ambassadors arrive at Hanes [in Egypt].
  '5':
  - type: text
    content: “All will be ashamed because of a people (the Egyptians) who cannot benefit them,
  - type: text
    content: Who are not a help or benefit, but a shame and also a disgrace.”
  '6':
  - type: text
    content: A [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning the beasts of the Negev (the South):'
  - type: text
    content: Through a land of trouble and anguish,
  - type: text
    content: 'From '
  - type: note
    content: Lit them.
  - type: text
    content: 'where '
  - type: text
    content: come
  - type: text
    content: ' lioness and lion, viper and [fiery] flying serpent,'
  - type: text
    content: They carry their riches on the shoulders of young donkeys
  - type: text
    content: And their treasures on the humps of camels,
  - type: text
    content: To a people (Egyptians) who cannot benefit them.
  '7':
  - type: text
    content: For Egypt’s help is worthless and good for nothing.
  - type: text
    content: Therefore, I have called her
  - type: text
    content: “Rahab Who Has Been Exterminated.”
  '8':
  - type: text
    content: Now, go, write it on a tablet before them
  - type: text
    content: And inscribe it on a scroll,
  - type: text
    content: So that it may serve in the time to come
  - type: text
    content: As a witness [against them] forevermore.
  '9':
  - type: text
    content: For this is a rebellious people, lying sons,
  - type: text
    content: Sons who refuse to listen to
  - type: text
    content: 'The law '
  - type: text
    content: and
  - type: text
    content: ' instruction of the L'
  - type: heading
    content: ord
  - type: text
    content: ;
