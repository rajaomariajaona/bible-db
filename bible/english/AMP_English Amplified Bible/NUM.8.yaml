document_id: NUM.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Seven Lamps
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and present the Levites before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the Israelites shall lay their hands on the Levites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: wave,
        - type: text
          text: ' and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: present the Levites before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' as a wave offering from the Israelites, so that they may perform the service of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Levites shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By laying his hands on the head of the sacrifice the offerer identified himself with it and through its death it became an atonement or covering for his sin. Because the sacrifice “covered” his sin, it placed the offerer in a right relationship with God, just as later under the new covenant the perfection and sacrifice of the Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
      marker-yv: yv-n
    - type: text
      text: lay their hands on the heads of the bulls, then you are to offer the one as a sin offering and the other as a burnt offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to make atonement for the Levites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall have the Levites stand before Aaron and his sons and present them as a wave offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus you shall separate the Levites from among the Israelites, and the Levites shall be Mine [in a very special sense]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then after that the Levites may go in to serve the Tent of Meeting (tabernacle), but you shall cleanse them [first] and present them as a wave offering; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for they are wholly given to Me from among the Israelites. I have taken them for Myself instead of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the first issue of every womb
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'all who are born first, the firstborn of all the Israelites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all the firstborn among the Israelites are Mine, among the men and among the animals; on the day that I struck down every firstborn in the land of Egypt, I sanctified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set the Israelites apart for Myself. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I have taken the Levites instead of every firstborn among the Israelites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have given the Levites as a gift to Aaron and to his sons from among the Israelites, to perform the service of the Israelites at the Tent of Meeting (tabernacle) and to make atonement for them, so that there will be no plague among the Israelites if they should approach the sanctuary.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to Aaron and say to him, ‘When you set up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' light the lamps, the seven lamps will shine in front of the lampstand.’ ” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus Moses and Aaron and all the congregation of the children of Israel did [these things] to the Levites; in accordance with all that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses concerning the Levites, so the Israelites did to them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Levites, too, purified themselves from sin and they washed their clothes; and Aaron presented them as a wave offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and Aaron made atonement for them to cleanse them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then after that the Levites went in to perform their service in the Tent of Meeting before Aaron and his sons; just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses concerning the Levites, so they did to them.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Retirement
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: applies
    - type: text
      text: ' to the Levites: from twenty-five years old and upward they shall enter to perform service in the work of the Tent of Meeting, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but at the age of fifty years, they shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: return
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'retire from the service of the [tabernacle] work and serve no longer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They may assist their brothers in the Tent of Meeting to keep an obligation, but they shall do no [heavy or difficult] work. Thus you shall deal with the Levites concerning their obligations.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Aaron did so; he set up the lamps at the front of the lampstand, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this was the workmanship of the lampstand: hammered work of gold; from its base to its flowers it was hammered work; according to the pattern which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had shown Moses, so he made the lampstand.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cleansing the Levites
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take the Levites from among the sons of Israel and cleanse them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what you shall do to them to [ceremonially] cleanse them: sprinkle the water of purification on them, and let them use a razor over their whole body and wash their clothes, and they will be clean. [Num 19:17, 18] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then let them take a young bull and its grain offering of fine flour mixed with oil, and you shall take another young bull as a sin offering. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall present the Levites before the Tent of Meeting (tabernacle), and you shall also assemble the whole congregation of the children of Israel, '
