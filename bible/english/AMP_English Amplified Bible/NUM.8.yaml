  '1':
  - type: heading
    content: The Seven Lamps
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: and present the Levites before the L
  - type: heading
    content: ord
  - type: text
    content: ', and the Israelites shall lay their hands on the Levites. '
  '11':
  - type: text
    content: 'Aaron shall '
  - type: note
    content: Lit wave, and so throughout the chapter.
  - type: text
    content: present the Levites before the L
  - type: heading
    content: ord
  - type: text
    content: ' as a wave offering from the Israelites, so that they may perform the service of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Then the Levites shall '
  - type: note
    content: By laying his hands on the head of the sacrifice the offerer identified himself with it and through its death it became an atonement or covering for his sin. Because the sacrifice “covered” his sin, it placed the offerer in a right relationship with God, just as later under the new covenant the perfection and sacrifice of the Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
  - type: text
    content: lay their hands on the heads of the bulls, then you are to offer the one as a sin offering and the other as a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ', to make atonement for the Levites. '
  '13':
  - type: text
    content: You shall have the Levites stand before Aaron and his sons and present them as a wave offering to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '14':
  - type: text
    content: '“Thus you shall separate the Levites from among the Israelites, and the Levites shall be Mine [in a very special sense]. '
  '15':
  - type: text
    content: 'Then after that the Levites may go in to serve the Tent of Meeting (tabernacle), but you shall cleanse them [first] and present them as a wave offering; '
  '16':
  - type: text
    content: 'for they are wholly given to Me from among the Israelites. I have taken them for Myself instead of '
  - type: note
    content: Lit the first issue of every womb.
  - type: text
    content: 'all who are born first, the firstborn of all the Israelites. '
  '17':
  - type: text
    content: 'For all the firstborn among the Israelites are Mine, among the men and among the animals; on the day that I struck down every firstborn in the land of Egypt, I sanctified '
  - type: text
    content: and
  - type: text
    content: ' set the Israelites apart for Myself. '
  '18':
  - type: text
    content: 'And I have taken the Levites instead of every firstborn among the Israelites. '
  '19':
  - type: text
    content: I have given the Levites as a gift to Aaron and to his sons from among the Israelites, to perform the service of the Israelites at the Tent of Meeting (tabernacle) and to make atonement for them, so that there will be no plague among the Israelites if they should approach the sanctuary.”
  '2':
  - type: text
    content: '“Speak to Aaron and say to him, ‘When you set up '
  - type: text
    content: and
  - type: text
    content: ' light the lamps, the seven lamps will shine in front of the lampstand.’ ” '
  '20':
  - type: text
    content: Thus Moses and Aaron and all the congregation of the children of Israel did [these things] to the Levites; in accordance with all that the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses concerning the Levites, so the Israelites did to them. '
  '21':
  - type: text
    content: The Levites, too, purified themselves from sin and they washed their clothes; and Aaron presented them as a wave offering before the L
  - type: heading
    content: ord
  - type: text
    content: ', and Aaron made atonement for them to cleanse them. '
  '22':
  - type: text
    content: Then after that the Levites went in to perform their service in the Tent of Meeting before Aaron and his sons; just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses concerning the Levites, so they did to them.'
  - type: heading
    content: Retirement
  '23':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“This is what '
  - type: text
    content: applies
  - type: text
    content: ' to the Levites: from twenty-five years old and upward they shall enter to perform service in the work of the Tent of Meeting, '
  '25':
  - type: text
    content: 'but at the age of fifty years, they shall '
  - type: note
    content: Lit return.
  - type: text
    content: 'retire from the service of the [tabernacle] work and serve no longer. '
  '26':
  - type: text
    content: They may assist their brothers in the Tent of Meeting to keep an obligation, but they shall do no [heavy or difficult] work. Thus you shall deal with the Levites concerning their obligations.”
  '3':
  - type: text
    content: And Aaron did so; he set up the lamps at the front of the lampstand, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses. '
  '4':
  - type: text
    content: 'Now this was the workmanship of the lampstand: hammered work of gold; from its base to its flowers it was hammered work; according to the pattern which the L'
  - type: heading
    content: ord
  - type: text
    content: ' had shown Moses, so he made the lampstand.'
  - type: heading
    content: Cleansing the Levites
  '5':
  - type: text
    content: Again the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '6':
  - type: text
    content: '“Take the Levites from among the sons of Israel and cleanse them. '
  '7':
  - type: text
    content: 'This is what you shall do to them to [ceremonially] cleanse them: sprinkle the water of purification on them, and let them use a razor over their whole body and wash their clothes, and they will be clean. [Num 19:17, 18] '
  '8':
  - type: text
    content: 'Then let them take a young bull and its grain offering of fine flour mixed with oil, and you shall take another young bull as a sin offering. '
  '9':
  - type: text
    content: 'You shall present the Levites before the Tent of Meeting (tabernacle), and you shall also assemble the whole congregation of the children of Israel, '
