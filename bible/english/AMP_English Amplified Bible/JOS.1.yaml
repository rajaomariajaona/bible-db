document_id: JOS.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Commission to Joshua
  - type: text
    content: Now it happened after the death of Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ', that the L'
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Joshua the son of Nun, Moses’ servant (attendant), saying, [Deut 34:4-8] '
  '10':
  - type: text
    content: 'Then Joshua commanded the officers of the people, saying, '
  '11':
  - type: text
    content: “Go throughout the camp and command the people, saying, ‘Prepare your provisions, for within three days you are to cross this [river] Jordan, to go in to take possession of the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you to possess [as an inheritance].’ ”'
  '12':
  - type: text
    content: 'To the Reubenites and to the Gadites and to the half-tribe of Manasseh, Joshua said, '
  '13':
  - type: text
    content: “Remember the word which Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded you, saying, ‘The L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you rest (peace) and will give you this land [east of the Jordan].’ '
  '14':
  - type: text
    content: 'Your wives, your '
  - type: note
    content: Lit little ones and so throughout.
  - type: text
    content: 'children, and your cattle shall [be allowed to] stay in the land which Moses gave you on this [eastern] side of the Jordan, but you shall go across [the river] before your brothers (the other tribes) armed for battle, all your brave warriors, and you shall help them [conquer and take possession of their land], '
  '15':
  - type: text
    content: until the L
  - type: heading
    content: ord
  - type: text
    content: ' gives your brothers rest, as '
  - type: text
    content: He has given
  - type: text
    content: ' you, and they also take possession of the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving them. Then you shall [be allowed to] return to your own land, and take possession of that which Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave you beyond the Jordan toward the sunrise.”'
  '16':
  - type: text
    content: ' '
  - type: note
    content: I.e. the Reubenites, Gadites, and the half tribe of Manasseh.
  - type: text
    content: 'They answered Joshua, saying, “All that you have commanded us we will do, and wherever you send us we will go. '
  '17':
  - type: text
    content: Just as we obeyed Moses in all things, so will we obey you; only may the L
  - type: heading
    content: ord
  - type: text
    content: ' your God be with you as He was with Moses. '
  '18':
  - type: text
    content: 'Any man who rebels against your '
  - type: note
    content: Lit mouth.
  - type: text
    content: command and does not obey everything that you command him, shall be put to death; only be strong and courageous.”
  '2':
  - type: text
    content: '“Moses My servant is dead; now therefore '
  - type: note
    content: The Hebrew verb “arise” is an instruction to get ready to fulfill a command, somewhat similar to the military command “attention.”
  - type: text
    content: 'arise [to take his place], cross over this Jordan, you and all this people, into the land which I am giving to them, to the '
  - type: note
    content: In general, sons (children) of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. A tribe of ancient people was identified by the name of its founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'sons of Israel. '
  '3':
  - type: text
    content: 'I have given you every place on which the sole of your foot treads, just as I promised to Moses. '
  '4':
  - type: text
    content: 'From the wilderness [of Arabia in the south] and this Lebanon [in the north], even as far as the great river, the river Euphrates [in the east], all the land of the '
  - type: note
    content: These Hittites are believed to be the descendants of Heth, a son of Canaan who was the youngest son of Ham. Canaan was cursed to a life of servitude by his grandfather Noah because of Ham’s act of disrespect for Noah. Gen 9:22-27.
  - type: text
    content: 'Hittites (Canaan), and as far as the Great [Mediterranean] Sea toward the west shall be your territory. '
  '5':
  - type: text
    content: 'No man will [be able to] stand before you [to oppose you] as long as you live. Just as I was [present] with Moses, so will I be with you; I will not fail you or abandon you. '
  '6':
  - type: text
    content: 'Be strong '
  - type: text
    content: and
  - type: text
    content: ' confident and courageous, for you will give this people as an inheritance the land which I swore to their fathers (ancestors) to give them. '
  '7':
  - type: text
    content: 'Only be strong and very courageous; be careful to do [everything] in accordance with the entire law which Moses My servant commanded you; do not turn from it to the right or to the left, so that you may prosper '
  - type: text
    content: and
  - type: text
    content: ' be successful wherever you go. '
  '8':
  - type: text
    content: 'This Book of the Law shall not depart from your mouth, but you shall read [and meditate on] it day and night, so that you may be careful to do [everything] in accordance with all that is written in it; for then you will make your way prosperous, and then you will be '
  - type: note
    content: God’s formula leading to Joshua’s success is clearly outlined in vv 5-9.
  - type: text
    content: 'successful. '
  '9':
  - type: text
    content: Have I not commanded you? Be strong and courageous! Do not be terrified or dismayed (intimidated), for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is with you wherever you go.”'
  - type: heading
    content: Joshua Assumes Command
