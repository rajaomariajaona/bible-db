document_id: JOS.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Commission to Joshua
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now it happened after the death of Moses the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Joshua the son of Nun, Moses’ servant (attendant), saying, [Deut 34:4-8] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua commanded the officers of the people, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go throughout the camp and command the people, saying, ‘Prepare your provisions, for within three days you are to cross this [river] Jordan, to go in to take possession of the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you to possess [as an inheritance].’ ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the Reubenites and to the Gadites and to the half-tribe of Manasseh, Joshua said, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Remember the word which Moses the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded you, saying, ‘The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you rest (peace) and will give you this land [east of the Jordan].’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your wives, your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: little ones
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'children, and your cattle shall [be allowed to] stay in the land which Moses gave you on this [eastern] side of the Jordan, but you shall go across [the river] before your brothers (the other tribes) armed for battle, all your brave warriors, and you shall help them [conquer and take possession of their land], '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: until the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gives your brothers rest, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He has given
    - type: text
      text: ' you, and they also take possession of the land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving them. Then you shall [be allowed to] return to your own land, and take possession of that which Moses the servant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave you beyond the Jordan toward the sunrise.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the Reubenites, Gadites, and the half tribe of Manasseh.
      marker-yv: yv-n
    - type: text
      text: 'They answered Joshua, saying, “All that you have commanded us we will do, and wherever you send us we will go. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Just as we obeyed Moses in all things, so will we obey you; only may the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God be with you as He was with Moses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any man who rebels against your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: command and does not obey everything that you command him, shall be put to death; only be strong and courageous.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Moses My servant is dead; now therefore '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb “arise” is an instruction to get ready to fulfill a command, somewhat similar to the military command “attention.”
      marker-yv: yv-n
    - type: text
      text: 'arise [to take his place], cross over this Jordan, you and all this people, into the land which I am giving to them, to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons (children) of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. A tribe of ancient people was identified by the name of its founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'sons of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have given you every place on which the sole of your foot treads, just as I promised to Moses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the wilderness [of Arabia in the south] and this Lebanon [in the north], even as far as the great river, the river Euphrates [in the east], all the land of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These Hittites are believed to be the descendants of Heth, a son of Canaan who was the youngest son of Ham. Canaan was cursed to a life of servitude by his grandfather Noah because of Ham’s act of disrespect for Noah. Gen 9:22-27.
      marker-yv: yv-n
    - type: text
      text: 'Hittites (Canaan), and as far as the Great [Mediterranean] Sea toward the west shall be your territory. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No man will [be able to] stand before you [to oppose you] as long as you live. Just as I was [present] with Moses, so will I be with you; I will not fail you or abandon you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident and courageous, for you will give this people as an inheritance the land which I swore to their fathers (ancestors) to give them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only be strong and very courageous; be careful to do [everything] in accordance with the entire law which Moses My servant commanded you; do not turn from it to the right or to the left, so that you may prosper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be successful wherever you go. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This Book of the Law shall not depart from your mouth, but you shall read [and meditate on] it day and night, so that you may be careful to do [everything] in accordance with all that is written in it; for then you will make your way prosperous, and then you will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s formula leading to Joshua’s success is clearly outlined in vv 5-9.
      marker-yv: yv-n
    - type: text
      text: 'successful. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Have I not commanded you? Be strong and courageous! Do not be terrified or dismayed (intimidated), for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is with you wherever you go.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua Assumes Command
    marker-yv: yv-h
