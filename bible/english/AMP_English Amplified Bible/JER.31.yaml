          text: Many times after the days of the Old Testament, Jerusalem was destroyed. Travelers in later centuries reported it to be an almost deserted city—its buildings were ruins filled with rubble, its inhabitants were few. Yet not only did God’s word declare that it would be rebuilt, but also drew a detailed word map of the outline the city would follow—from a well-known tower to the gate at a certain corner, then on over a particular hill, coming now outside the walls of the original city and taking in a large area marked by familiar landmarks. Eight recognizable details are given here, and Zechariah adds another (14:10). Also, the city’s expansion was to be toward the northwest. Twenty-five hundred years later, in 1935, the prophecy had been fulfilled, as if indeed with God’s “measuring line” (v 39). So unlikely seemed this prophecy’s fulfillment that some early commentators suggested that it should be interpreted spiritually.
      marker-yv: yv-n
