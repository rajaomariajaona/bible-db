document_id: 1SA.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonathan and David
  - type: text
    content: 'When David had finished speaking to Saul, the soul of Jonathan was bonded to the soul of David, and '
  - type: note
    content: David’s testimony before Saul and Jonathan’s response to hearing it established a friendship, admiration and loyalty that lasted beyond Jonathan’s death (2 Sam 9:1).
  - type: text
    content: 'Jonathan loved him as himself. '
  '10':
  - type: text
    content: 'Now it came about on the next day that an evil spirit from God came forcefully on Saul, and he raved [madly] inside his house, while David was playing '
  - type: text
    content: the harp
  - type: text
    content: ' with his hand, as usual; and there was a spear in Saul’s hand. '
  '11':
  - type: text
    content: Saul hurled the spear, for he thought, “I will pin David to the wall.” But David evaded him twice.
  '12':
  - type: text
    content: Now Saul was afraid of David, because the L
  - type: heading
    content: ord
  - type: text
    content: ' was with him, but had departed from Saul. '
  '13':
  - type: text
    content: 'So Saul had David removed from his presence and appointed him as his commander of a thousand; and he '
  - type: note
    content: Lit went out and came in before and so throughout the chapter.
  - type: text
    content: 'publicly associated with the people. '
  '14':
  - type: text
    content: 'David acted wisely '
  - type: text
    content: and
  - type: text
    content: ' prospered in all his ways, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' was with him. '
  '15':
  - type: text
    content: 'When Saul saw that he was prospering greatly, he was afraid of him. '
  '16':
  - type: text
    content: But all Israel and Judah loved David, because he publicly associated with them.
  '17':
  - type: text
    content: Then Saul said to David, “Behold I will give you my older daughter Merab as a wife; only be brave for me and fight the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' battles.” For Saul thought, “My hand shall not be against him, but let the hand of the Philistines be against him.” '
  '18':
  - type: text
    content: 'David said to Saul, “Who am I, and what is my life or my father’s family in Israel, that I should be the king’s son-in-law?” '
  '19':
  - type: text
    content: But at the time when Merab, Saul’s daughter, should have been given to David, she was [instead] given to Adriel the Meholathite as a wife.
  - type: heading
    content: David Marries Saul’s Daughter
  '2':
  - type: text
    content: 'Saul took David that day and did not let him return to his father’s house. '
  '20':
  - type: text
    content: 'Now Michal, Saul’s daughter, loved David; and when they told Saul, it pleased him. '
  '21':
  - type: text
    content: 'Saul said, “I will give her to him so that she may become a snare (bad influence, source of trouble) to him, and that the hand of the Philistines may be against him.” So Saul said to David for a second time, “You shall be my son-in-law today.” '
  '22':
  - type: text
    content: 'Then Saul commanded his servants, “Speak to David secretly, saying, ‘Listen, the king delights in you, and all his servants love you; now then, become the king’s son-in-law.’ ” '
  '23':
  - type: text
    content: 'So Saul’s servants spoke these words to David. But David said, “Is it a trivial thing in your sight to become a king’s son-in-law, seeing that I am a poor man and insignificant?” '
  '24':
  - type: text
    content: 'The servants of Saul told him what David said. '
  '25':
  - type: text
    content: 'Then Saul said, “This is what you shall say to David: ‘The king wants no dowry except a hundred foreskins of the Philistines, to take vengeance on the king’s enemies.’ ” Now Saul’s intention was to cause '
  - type: note
    content: Lit David to fall by.
  - type: text
    content: 'David’s death at the hand of the Philistines. '
  '26':
  - type: text
    content: 'When his servants told David these words, it pleased him to become the king’s son-in-law. Before the time [for the marriage] arrived, '
  '27':
  - type: text
    content: 'David arose and went, he and his men, and killed two hundred Philistine men, and David brought their foreskins [as proof of death] and presented '
  - type: note
    content: Lit in full number.
  - type: text
    content: 'every one of them to the king, so that he might become the king’s son-in-law. So Saul gave him Michal, his [younger] daughter, as a wife. '
  '28':
  - type: text
    content: When Saul saw and knew that the L
  - type: heading
    content: ord
  - type: text
    content: ' was with David, and that Michal, his daughter, loved him, '
  '29':
  - type: text
    content: Saul was even more afraid of David; and Saul became David’s constant enemy.
  '3':
  - type: text
    content: 'Then Jonathan made a covenant with David because he loved him as himself. '
  '30':
  - type: text
    content: 'Then the Philistine commanders (princes) came out '
  - type: text
    content: to battle,
  - type: text
    content: ' and it happened as often as they did, that David acted more wisely '
  - type: text
    content: and
  - type: text
    content: ' had more success than all Saul’s servants. So his name was highly esteemed.'
  '4':
  - type: text
    content: 'Jonathan stripped himself of the outer robe that he was wearing and gave it to David, with his armor, including his sword, his bow, and his belt. '
  '5':
  - type: text
    content: 'So David went out wherever Saul sent him, and he acted wisely '
  - type: text
    content: and
  - type: text
    content: ' prospered; and Saul appointed him over the men of war. And it pleased all the people and also Saul’s servants.'
  '6':
  - type: text
    content: 'As they were coming [home], when David returned from killing the Philistine, the women came out of all the cities of Israel, singing and dancing, to meet King Saul with tambourines, [songs of] joy, and '
  - type: note
    content: Lit three-stringed.
  - type: text
    content: 'musical instruments. '
  '7':
  - type: text
    content: 'The women sang as they played '
  - type: text
    content: and
  - type: text
    content: ' danced, saying,'
  - type: text
    content: “Saul has slain his thousands,
  - type: text
    content: And David his ten thousands.”
  '8':
  - type: text
    content: 'Then Saul became very angry, for this saying '
  - type: note
    content: Lit was evil in his eyes.
  - type: text
    content: 'displeased him; and he said, “They have ascribed to David ten thousands, but to me they have ascribed [only] thousands. Now what more can he have but the kingdom?” '
  '9':
  - type: text
    content: Saul looked at David with suspicion [and jealously] from that day forward.
  - type: heading
    content: Saul Turns against David
