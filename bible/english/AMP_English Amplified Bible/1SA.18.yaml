document_id: 1SA.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jonathan and David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When David had finished speaking to Saul, the soul of Jonathan was bonded to the soul of David, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David’s testimony before Saul and Jonathan’s response to hearing it established a friendship, admiration and loyalty that lasted beyond Jonathan’s death (2 Sam 9:1).
      marker-yv: yv-n
    - type: text
      text: 'Jonathan loved him as himself. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now it came about on the next day that an evil spirit from God came forcefully on Saul, and he raved [madly] inside his house, while David was playing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the harp
    - type: text
      text: ' with his hand, as usual; and there was a spear in Saul’s hand. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Saul hurled the spear, for he thought, “I will pin David to the wall.” But David evaded him twice.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Now Saul was afraid of David, because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with him, but had departed from Saul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So Saul had David removed from his presence and appointed him as his commander of a thousand; and he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: went out and came in before
        - type: text
          text: ' and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: 'publicly associated with the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'David acted wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prospered in all his ways, and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Saul saw that he was prospering greatly, he was afraid of him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But all Israel and Judah loved David, because he publicly associated with them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then Saul said to David, “Behold I will give you my older daughter Merab as a wife; only be brave for me and fight the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' battles.” For Saul thought, “My hand shall not be against him, but let the hand of the Philistines be against him.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'David said to Saul, “Who am I, and what is my life or my father’s family in Israel, that I should be the king’s son-in-law?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: But at the time when Merab, Saul’s daughter, should have been given to David, she was [instead] given to Adriel the Meholathite as a wife.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Marries Saul’s Daughter
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saul took David that day and did not let him return to his father’s house. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now Michal, Saul’s daughter, loved David; and when they told Saul, it pleased him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Saul said, “I will give her to him so that she may become a snare (bad influence, source of trouble) to him, and that the hand of the Philistines may be against him.” So Saul said to David for a second time, “You shall be my son-in-law today.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Saul commanded his servants, “Speak to David secretly, saying, ‘Listen, the king delights in you, and all his servants love you; now then, become the king’s son-in-law.’ ” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So Saul’s servants spoke these words to David. But David said, “Is it a trivial thing in your sight to become a king’s son-in-law, seeing that I am a poor man and insignificant?” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The servants of Saul told him what David said. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Saul said, “This is what you shall say to David: ‘The king wants no dowry except a hundred foreskins of the Philistines, to take vengeance on the king’s enemies.’ ” Now Saul’s intention was to cause '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: David to fall by
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David’s death at the hand of the Philistines. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When his servants told David these words, it pleased him to become the king’s son-in-law. Before the time [for the marriage] arrived, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'David arose and went, he and his men, and killed two hundred Philistine men, and David brought their foreskins [as proof of death] and presented '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in full number.
      marker-yv: yv-n
    - type: text
      text: 'every one of them to the king, so that he might become the king’s son-in-law. So Saul gave him Michal, his [younger] daughter, as a wife. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When Saul saw and knew that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with David, and that Michal, his daughter, loved him, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Saul was even more afraid of David; and Saul became David’s constant enemy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Jonathan made a covenant with David because he loved him as himself. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then the Philistine commanders (princes) came out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to battle,
    - type: text
      text: ' and it happened as often as they did, that David acted more wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' had more success than all Saul’s servants. So his name was highly esteemed.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jonathan stripped himself of the outer robe that he was wearing and gave it to David, with his armor, including his sword, his bow, and his belt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So David went out wherever Saul sent him, and he acted wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prospered; and Saul appointed him over the men of war. And it pleased all the people and also Saul’s servants.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'As they were coming [home], when David returned from killing the Philistine, the women came out of all the cities of Israel, singing and dancing, to meet King Saul with tambourines, [songs of] joy, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: three-stringed
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'musical instruments. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The women sang as they played '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' danced, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Saul has slain his thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And David his ten thousands.”
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Saul became very angry, for this saying '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: was evil in his eyes.
      marker-yv: yv-n
    - type: text
      text: 'displeased him; and he said, “They have ascribed to David ten thousands, but to me they have ascribed [only] thousands. Now what more can he have but the kingdom?” '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Saul looked at David with suspicion [and jealously] from that day forward.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul Turns against David
    marker-yv: yv-h
