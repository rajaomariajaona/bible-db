  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'It is a fearful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrifying thing to fall into the hands of the living God [incurring His judgment and wrath].'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'But remember the earlier days, when, after being [spiritually] enlightened, you [patiently] endured a great conflict of sufferings, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'sometimes by being made a spectacle, publicly exposed to insults and distress, and sometimes by becoming companions with those who were so treated. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'For you showed sympathy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deep concern for those who were imprisoned, and you joyfully accepted the [unjust] seizure of your belongings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the confiscation of your property, conscious of the fact that you have a better possession and a lasting one [prepared for you in heaven]. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Do not, therefore, fling away your [fearless] confidence, for it has a glorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great reward. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'For you have need of patient endurance [to bear up under difficult circumstances without compromising], so that when you have carried out the will of God, you may receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy to the full what is promised.'
  '37':
  - type: usfm
