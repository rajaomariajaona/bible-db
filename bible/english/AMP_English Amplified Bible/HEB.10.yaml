  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will remember no more
    - type: text
      text: ' [no longer holding their sins against them].” [Jer 31:33, 34]'
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now where there is [absolute] forgiveness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete cancellation of the penalty of these things, there is no longer any offering [to be made to atone] for sin.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A New and Living Way
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers, since we have confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' full freedom to enter the Holy Place [the place where God dwells] by [means of] the blood of Jesus, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For if it were otherwise, would not these sacrifices have stopped being offered? For the worshipers, having once [for all time] been cleansed, would no longer have a consciousness of sin. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'by this new and living way which He initiated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' opened for us through the veil [as in the Holy of Holies], that is, through His flesh, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and since we have a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderful Priest [Who rules] over the house of God, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'let us approach [God] with a true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sincere heart in unqualified assurance of faith, having had our hearts sprinkled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: clean
    - type: text
      text: ' from an evil conscience and our bodies washed with pure water. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Let us seize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hold tightly the confession of our hope without wavering, for He who promised is reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithful [to His word]; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and let us consider [thoughtfully] how we may encourage one another to love and to do good deeds, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'not forsaking our meeting together [as believers for worship and instruction], as is the habit of some, but encouraging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one another;
    - type: text
      text: ' and all the more [faithfully] as you see the day [of Christ’s return] approaching.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ or Judgment
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For if we go on willfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliberately sinning after receiving the knowledge of the truth, there no longer remains a sacrifice [to atone] for our sins [that is, no further offering to anticipate], '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'but a kind of awful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrifying expectation of [divine] judgment and '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: the fury of a fire
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: burning wrath which will consume the adversaries
    - type: text
      text: ' [those who put themselves in opposition to God]. [Is 26:11] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Anyone who has ignored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set aside the Law of Moses is put to death without mercy on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the testimony of
    - type: text
      text: ' two or three witnesses. [Deut 17:2-6] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'How much greater punishment do you think he will deserve who has rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trampled under foot the Son of God, and has considered unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' common the blood of the covenant that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All believers are sanctified, that is, set apart as holy for God and His purposes.
      marker-yv: yv-n
    - type: text
      text: 'sanctified him, and has insulted the Spirit of grace [who imparts the unmerited favor and blessing of God]? [Ex 24:8] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But [as it is] these [continual] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' bring a fresh reminder of sins [to be atoned for] year after year, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
