document_id: HEB.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: One Sacrifice of Christ Is Sufficient
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For since the Law has only a shadow [just a pale representation] of the good things to come—not the very image of those things—it can never, by offering the same sacrifices continually year after year, make '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. achieve the goal of perfection.
      marker-yv: yv-n
    - type: text
      text: 'perfect those who approach [its altars]. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And in accordance with this will [of God] we [who believe in the message of salvation] have been sanctified [that is, set apart as holy for God and His purposes] through the offering of the body of Jesus Christ (the Messiah, the Anointed) once for all.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Every priest stands [at his altar of service] ministering daily, offering the same sacrifices over and over, which are never able '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Emphatic in Greek with the sense “to deliver completely.”
      marker-yv: yv-n
    - type: text
      text: 'to strip away sins [that envelop and cover us]; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'whereas Christ, having offered the one sacrifice [the all-sufficient sacrifice of Himself] for sins for all time, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: sat down
    - type: text
      text: ' [signifying the completion of atonement for sin] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: at the right hand of
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' [the position of honor], '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'waiting from that time onward '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: until his enemies are made a footstool for
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is feet
    - type: text
      text: '. [Ps 110:1] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For by the one offering He has perfected forever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely cleansed those who are being sanctified [bringing each believer to spiritual completion and maturity]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And the Holy Spirit also adds His testimony to us [in confirmation of this]; for after having said,
