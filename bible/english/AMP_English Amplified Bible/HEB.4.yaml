    - type: text
      text: '6'
  - type: text
    text: 'Therefore, since the promise remains for some to enter His rest, and those who formerly had the good news preached to them failed to [grasp it and did not] enter because of [their unbelief evidenced by] disobedience, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He again sets a definite day, [a new] “Today,” [providing another opportunity to enter that rest by] saying through David after so long a time, just as has been said before [in the words already quoted],
