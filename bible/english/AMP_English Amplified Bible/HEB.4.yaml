- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '[This mention of a rest was not a reference to their entering into Canaan.] For if Joshua had given them rest, God would not speak about another day [of opportunity] after that. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So there remains a [full and complete] Sabbath rest for the people of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the one who has once entered His rest has also rested from [the weariness and pain of] his [human] labors, just as God rested from [those labors uniquely] His own. [Gen 2:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let us therefore make every effort to enter that rest [of God, to know and experience it for ourselves], so that no one will fall by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: following
  - type: text
    text: ' the same example of disobedience [as those who died in the wilderness]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the word of God is living and active '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full of power [making it operative, energizing, and effective]. It is sharper than any two-edged '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In addition to “sword,” the word in Greek was used for the knife used by the priests to slit the throats of the sacrificial lambs and for the knife (scalpel) used by a surgeon.
    marker-yv: yv-n
  - type: text
    text: 'sword, penetrating as far as the division of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “soul and spirit” used here to emphasize the whole person, not two separate entities as in other passages.
    marker-yv: yv-n
  - type: text
    text: 'soul and spirit [the completeness of a person], and of both joints and marrow [the deepest parts of our nature], exposing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judging the very thoughts and intentions of the heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And not a creature exists that is concealed from His sight, but all things are open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exposed, and revealed to the eyes of Him with whom we have to give account.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Inasmuch then as we [believers] have a great High Priest who has [already ascended and] passed through the heavens, Jesus the Son of God, let us hold fast our confession [of faith and cling tenaciously to our absolute trust in Him as Savior]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we do not have a High Priest who is unable to sympathize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand our weaknesses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' temptations, but One who has been tempted [knowing exactly how it feels to be human] in every respect as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we are, yet
  - type: text
    text: ' without [committing any] sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore let us [with privilege] approach the throne of grace [that is, the throne of God’s gracious favor] with confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without fear, so that we may receive mercy [for our failures] and find [His amazing] grace to help in time of need [an appropriate blessing, coming just at the right moment].'
