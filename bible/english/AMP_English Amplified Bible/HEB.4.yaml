        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God “rested” because everything that needed to be done was done—everything was complete, fully accomplished. In human terms this expression is used when a lawyer completes his presentation in a court of law; he “rests” his case—everything is in evidence, there is nothing left to present.
    marker-yv: yv-n
  - type: text
    text: completed from the foundation of the world [waiting for all who would believe]. [Ps 95:11]
