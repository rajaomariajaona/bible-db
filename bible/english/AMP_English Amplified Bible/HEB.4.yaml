  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, while the promise of entering His rest still remains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is freely offered today, let us fear, in case any one of you may seem to come short of reaching it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' think he has come too late. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For indeed we have had the good news [of salvation] preached to us, just as the Israelites also [when the good news of the promised land came to them]; but the message they heard did not benefit them, because it was not united with faith [in God] by those who heard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For we who believe [that is, we who personally trust and confidently rely on God] enter that rest [so we have His inner peace now because we are confident in our salvation, and assured of His power], just as He has said,
