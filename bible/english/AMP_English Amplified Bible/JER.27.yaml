  '1':
  - type: heading
    content: The Nations to Submit to Nebuchadnezzar
  - type: text
    content: In the beginning of the reign of Zedekiah the son of Josiah, king of Judah, this word came to Jeremiah from the L
  - type: heading
    content: ord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'For they prophesy a lie to you which will cause you to be removed far from your land; and I will drive you out and you will perish. '
  '11':
  - type: text
    content: But the nation which will bow its neck under the yoke of the king of Babylon and serve him, that nation I will let remain on its own land,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “to cultivate it and live in it.” ’ ”'
  '12':
  - type: text
    content: 'I spoke to Zedekiah king of Judah in the same way, saying, “Bring your necks under the yoke of the king of Babylon and serve him and his people, and live! '
  '13':
  - type: text
    content: Why will you die, you and your people, by the sword, by famine and by virulent disease, as the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken to any nation which will not serve the king of Babylon? '
  '14':
  - type: text
    content: 'Do not listen to '
  - type: text
    content: and
  - type: text
    content: ' believe the words of the [false] prophets who are saying to you, ‘You will not serve the king of Babylon,’ for they prophesy a lie to you; '
  '15':
  - type: text
    content: for I have not sent them,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “but they are prophesying falsely in My Name, in order that I may drive you out and that you may perish, you [together] with the [false] prophets who prophesy to you.”'
  '16':
  - type: text
    content: Then I said to the priests and to all these people, saying, “Thus says the L
  - type: heading
    content: ord
  - type: text
