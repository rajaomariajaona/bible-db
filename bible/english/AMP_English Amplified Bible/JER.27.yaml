document_id: JER.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Nations to Submit to Nebuchadnezzar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the beginning of the reign of Zedekiah the son of Josiah, king of Judah, this word came to Jeremiah from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to me, “Make for yourself bonds and yokes and put them on your neck, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and send word to the king of Edom, to the king of Moab, to the king of the sons of Ammon, to the king of Tyre, and to the king of Sidon by the messengers who come to Jerusalem to Zedekiah king of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Command them to go to their masters, saying, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, you shall say this to your masters: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“I have made the earth, the men and the animals that are on the face of the earth by My great power and by My outstretched arm, and I will give it to whomever pleases Me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now I have given all these lands into the hand of Nebuchadnezzar king of Babylon, My servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instrument, and I have also given the wild animals of the field to serve him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All nations shall serve him and his son and his grandson until the [appointed] time [of punishment] for his own land comes; then many nations and great kings shall make him their servant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But any nation or kingdom that will not serve this same Nebuchadnezzar king of Babylon and put its neck under the yoke of the king of Babylon, that nation I will punish,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “with the sword, with famine and with pestilence (virulent disease), until I have destroyed it by Nebuchadnezzar’s hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And as for you, do not listen to your [counterfeit] prophets, your diviners, your dreams '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dreamers, your soothsayers or your sorcerers, who say to you, ‘You will not serve the king of Babylon.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For they prophesy a lie to you which will cause you to be removed far from your land; and I will drive you out and you will perish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the nation which will bow its neck under the yoke of the king of Babylon and serve him, that nation I will let remain on its own land,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “to cultivate it and live in it.” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I spoke to Zedekiah king of Judah in the same way, saying, “Bring your necks under the yoke of the king of Babylon and serve him and his people, and live! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Why will you die, you and your people, by the sword, by famine and by virulent disease, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken to any nation which will not serve the king of Babylon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' believe the words of the [false] prophets who are saying to you, ‘You will not serve the king of Babylon,’ for they prophesy a lie to you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: for I have not sent them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “but they are prophesying falsely in My Name, in order that I may drive you out and that you may perish, you [together] with the [false] prophets who prophesy to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then I said to the priests and to all these people, saying, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': Do not listen to the words of your [false] prophets who are prophesying to you, saying, ‘Behold, the articles of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house will now shortly be brought '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nebuchadnezzar besieged Jerusalem three times. The second time was during the reign of King Jeconiah the son of Jehoiakim, whom he took captive with all the nobles of Judah and Jerusalem (27:20), at which time he carried away some of the sacred articles of the temple. The third siege was now imminent.
    marker-yv: yv-n
  - type: text
    text: 'back from Babylon’; for they are prophesying a lie to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Do not listen to them; serve the king of Babylon, and live! Why should this city become a ruin? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But if they are [true] prophets, and if the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is [really spoken] by them, let them now entreat the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts that the articles which are [still] left in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in the house of the king of Judah and in Jerusalem may not go to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts concerning the [bronze] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Each pillar stood about twenty-seven feet high.
    marker-yv: yv-n
  - type: text
    text: 'pillars, the [bronze] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the basin at which the priests washed their hands and feet before ministering at the altar.
    marker-yv: yv-n
  - type: text
    text: 'Sea, the [bronze] bases [of the ten basins in Solomon’s temple used for washing sacrificial animals], and the rest of the articles that are left in this city (Jerusalem), [1 Kin 7:23-37; 2 Chr 4:6; Jer 52:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'which Nebuchadnezzar king of Babylon did not take when he carried '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Also known as Jehoiachin and Coniah.
    marker-yv: yv-n
  - type: text
    text: 'Jeconiah the son of Jehoiakim, king of Judah, into exile from Jerusalem to Babylon, along with all the nobles of Judah and Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Yes, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, concerning the articles which remain in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in the house of the king of Judah and in Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '‘They will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This prophesy was fulfilled when the remaining sacred articles were carried to Babylon (2 Kin 25:13; 2 Chr 36:18; Jer 52:17-23), where they were kept for seventy years (2 Chr 36:21), the length of the captivity foretold by Jeremiah (Jer 29:10). They were then returned to Jerusalem (Ezra 1:7; 7:19).
    marker-yv: yv-n
  - type: text
    text: carried to Babylon and they will be there until the day that I visit them [with My favor],’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . ‘Then I will bring them back and restore them to this place.’ ”
