  - type: text
    content: ' house will now shortly be brought '
  - type: note
    content: Nebuchadnezzar besieged Jerusalem three times. The second time was during the reign of King Jeconiah the son of Jehoiakim, whom he took captive with all the nobles of Judah and Jerusalem (27:20), at which time he carried away some of the sacred articles of the temple. The third siege was now imminent.
  - type: text
    content: 'back from Babylon’; for they are prophesying a lie to you. '
  '17':
  - type: text
    content: 'Do not listen to them; serve the king of Babylon, and live! Why should this city become a ruin? '
  '18':
  - type: text
    content: But if they are [true] prophets, and if the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' is [really spoken] by them, let them now entreat the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts that the articles which are [still] left in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', in the house of the king of Judah and in Jerusalem may not go to Babylon. '
  '19':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts concerning the [bronze] '
  - type: note
    content: Each pillar stood about twenty-seven feet high.
  - type: text
    content: 'pillars, the [bronze] '
  - type: note
    content: This was the basin at which the priests washed their hands and feet before ministering at the altar.
  - type: text
    content: 'Sea, the [bronze] bases [of the ten basins in Solomon’s temple used for washing sacrificial animals], and the rest of the articles that are left in this city (Jerusalem), [1 Kin 7:23-37; 2 Chr 4:6; Jer 52:17] '
  '2':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' to me, “Make for yourself bonds and yokes and put them on your neck, '
  '20':
  - type: text
    content: 'which Nebuchadnezzar king of Babylon did not take when he carried '
  - type: note
    content: Also known as Jehoiachin and Coniah.
  - type: text
    content: 'Jeconiah the son of Jehoiakim, king of Judah, into exile from Jerusalem to Babylon, along with all the nobles of Judah and Jerusalem. '
  '21':
  - type: text
    content: Yes, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, concerning the articles which remain in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', in the house of the king of Judah and in Jerusalem, '
  '22':
  - type: text
    content: '‘They will be '
  - type: note
    content: This prophesy was fulfilled when the remaining sacred articles were carried to Babylon (2 Kin 25:13; 2 Chr 36:18; Jer 52:17-23), where they were kept for seventy years (2 Chr 36:21), the length of the captivity foretold by Jeremiah (Jer 29:10). They were then returned to Jerusalem (Ezra 1:7; 7:19).
  - type: text
    content: carried to Babylon and they will be there until the day that I visit them [with My favor],’ says the L
  - type: heading
    content: ord
  - type: text
    content: . ‘Then I will bring them back and restore them to this place.’ ”
  '3':
  - type: text
    content: 'and send word to the king of Edom, to the king of Moab, to the king of the sons of Ammon, to the king of Tyre, and to the king of Sidon by the messengers who come to Jerusalem to Zedekiah king of Judah. '
  '4':
  - type: text
    content: Command them to go to their masters, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, you shall say this to your masters: '
  '5':
  - type: text
    content: '“I have made the earth, the men and the animals that are on the face of the earth by My great power and by My outstretched arm, and I will give it to whomever pleases Me. '
  '6':
  - type: text
    content: 'Now I have given all these lands into the hand of Nebuchadnezzar king of Babylon, My servant '
  - type: text
    content: and
  - type: text
    content: ' instrument, and I have also given the wild animals of the field to serve him. '
  '7':
  - type: text
    content: All nations shall serve him and his son and his grandson until the [appointed] time [of punishment] for his own land comes; then many nations and great kings shall make him their servant.
  '8':
  - type: text
    content: “But any nation or kingdom that will not serve this same Nebuchadnezzar king of Babylon and put its neck under the yoke of the king of Babylon, that nation I will punish,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “with the sword, with famine and with pestilence (virulent disease), until I have destroyed it by Nebuchadnezzar’s hand. '
  '9':
  - type: text
    content: 'And as for you, do not listen to your [counterfeit] prophets, your diviners, your dreams '
  - type: text
    content: and
  - type: text
    content: ' dreamers, your soothsayers or your sorcerers, who say to you, ‘You will not serve the king of Babylon.’ '
