document_id: JER.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are [uncompromisingly] righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consistently just when I plead my case with You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet let me discuss issues of justice with You:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why has the way of the wicked prospered?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why are those who deal in treachery (deceit) at ease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thriving?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Many shepherds (invaders) have destroyed My vineyard (Judah),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have trampled My field underfoot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have made My pleasant field
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A desolate wilderness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They have made it a wasteland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desolate, it mourns before Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole land has been made a wasteland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because no man takes it to heart.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Destroyers have come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On all the caravan roads in the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sword of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' (Babylon) is devouring'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From one end of the land even to the other;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one has peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a way of escape.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They have planted wheat but have reaped thorns;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have exhausted themselves but without profit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So be ashamed of your harvest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raging anger of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' regarding all My evil neighbors (Gentile nations) who strike at the inheritance which I have granted to My people Israel, “Behold, I will uproot them from their land and I will uproot the house of Judah from among them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall come about that after I have uprooted them, I will return '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have compassion on them; and I will bring them back again, each one to his inheritance and each one to his land. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if these [neighboring nations] will diligently learn the ways of My people, to swear by My Name, saying, ‘As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives’—even as they taught My people to swear by Baal, then they will be built up among My people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if [any nation] will not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey, I will [completely] uproot and destroy that nation, says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have planted them, they have also taken root;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They grow, they have even produced fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: near their mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: honored by their [hypocritical] lips
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But [You are] far from their heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', know me [and understand my devotion to You];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You see me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And You examine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the attitude of
    - type: text
      text: ' my heart toward You.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drag out the faithless like sheep for the slaughter [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And set them apart for the day of slaughter.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long must the land mourn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the grass of the countryside wither?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hypocrisy of those who live in it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The beasts and the birds are consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are swept away [by the drought],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because men [mocking me] have said, “He will not [live long enough to] see [what happens at] our final end.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶[The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rebukes Jeremiah for his impatience, saying] “If you have raced with men on foot and they have tired you out,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then how can you compete with horses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you fall down in a land of peace [where you feel secure],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then how will you do [among the lions] in the [flooded] thicket beside the Jordan?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For even your [tribal] brothers and the household of your father,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even they have dealt treacherously (unfaithfully) with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed they are [like a pack of hounds] howling after you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not believe them, although they may say kind words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promise you good things.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Answer
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“I have abandoned My house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have given up My [precious] inheritance (Judah);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have given the [dearly] beloved of My life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into the hands of her enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My inheritance has become to Me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lion in the forest;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She has raised her voice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' roared against Me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I have come to [treat her as if I] hate her.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is My inheritance like a speckled bird of prey to Me [unlike the others]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are the birds of prey (enemies) surrounding her on every side?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go, gather all the [wild] beasts of the field;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring them to devour [her]!
