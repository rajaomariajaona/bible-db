document_id: JER.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Prayer
  - type: text
    content: You, O L
  - type: heading
    content: ord
  - type: text
    content: ' are [uncompromisingly] righteous '
  - type: text
    content: and
  - type: text
    content: ' consistently just when I plead my case with You;'
  - type: text
    content: 'Yet let me discuss issues of justice with You:'
  - type: text
    content: Why has the way of the wicked prospered?
  - type: text
    content: 'Why are those who deal in treachery (deceit) at ease '
  - type: text
    content: and
  - type: text
    content: ' thriving?'
  '10':
  - type: text
    content: “Many shepherds (invaders) have destroyed My vineyard (Judah),
  - type: text
    content: They have trampled My field underfoot;
  - type: text
    content: They have made My pleasant field
  - type: text
    content: A desolate wilderness.
  '11':
  - type: text
    content: “They have made it a wasteland,
  - type: text
    content: Desolate, it mourns before Me;
  - type: text
    content: The whole land has been made a wasteland,
  - type: text
    content: Because no man takes it to heart.
  '12':
  - type: text
    content: “Destroyers have come
  - type: text
    content: On all the caravan roads in the desert,
  - type: text
    content: For the sword of the L
  - type: heading
    content: ord
  - type: text
    content: ' (Babylon) is devouring'
  - type: text
    content: From one end of the land even to the other;
  - type: text
    content: 'No one has peace '
  - type: text
    content: or
  - type: text
    content: ' a way of escape.'
  '13':
  - type: text
    content: “They have planted wheat but have reaped thorns;
  - type: text
    content: They have exhausted themselves but without profit.
  - type: text
    content: So be ashamed of your harvest
  - type: text
    content: 'Because of the fierce '
  - type: text
    content: and
  - type: text
    content: ' raging anger of the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '14':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' regarding all My evil neighbors (Gentile nations) who strike at the inheritance which I have granted to My people Israel, “Behold, I will uproot them from their land and I will uproot the house of Judah from among them. '
  '15':
  - type: text
    content: 'And it shall come about that after I have uprooted them, I will return '
  - type: text
    content: and
  - type: text
    content: ' have compassion on them; and I will bring them back again, each one to his inheritance and each one to his land. '
  '16':
  - type: text
    content: And if these [neighboring nations] will diligently learn the ways of My people, to swear by My Name, saying, ‘As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives’—even as they taught My people to swear by Baal, then they will be built up among My people. '
  '17':
  - type: text
    content: 'But if [any nation] will not listen '
  - type: text
    content: and
  - type: text
    content: ' obey, I will [completely] uproot and destroy that nation, says the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '2':
  - type: text
    content: You have planted them, they have also taken root;
  - type: text
    content: They grow, they have even produced fruit.
  - type: text
    content: 'You are '
  - type: note
    content: Lit near their mouth.
  - type: text
    content: honored by their [hypocritical] lips
  - type: text
    content: 'But [You are] far from their heart '
  - type: text
    content: and
  - type: text
    content: ' mind.'
  '3':
  - type: text
    content: But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', know me [and understand my devotion to You];'
  - type: text
    content: You see me;
  - type: text
    content: 'And You examine '
  - type: text
    content: the attitude of
  - type: text
    content: ' my heart toward You.'
  - type: text
    content: Drag out the faithless like sheep for the slaughter [O L
  - type: heading
    content: ord
  - type: text
    content: ']'
  - type: text
    content: And set them apart for the day of slaughter.
  '4':
  - type: text
    content: How long must the land mourn
  - type: text
    content: And the grass of the countryside wither?
  - type: text
    content: 'Because of the wickedness '
  - type: text
    content: and
  - type: text
    content: ' hypocrisy of those who live in it,'
  - type: text
    content: 'The beasts and the birds are consumed '
  - type: text
    content: and
  - type: text
    content: ' are swept away [by the drought],'
  - type: text
    content: Because men [mocking me] have said, “He will not [live long enough to] see [what happens at] our final end.”
  '5':
  - type: text
    content: ¶[The L
  - type: heading
    content: ord
  - type: text
    content: ' rebukes Jeremiah for his impatience, saying] “If you have raced with men on foot and they have tired you out,'
  - type: text
    content: Then how can you compete with horses?
  - type: text
    content: If you fall down in a land of peace [where you feel secure],
  - type: text
    content: Then how will you do [among the lions] in the [flooded] thicket beside the Jordan?
  '6':
  - type: text
    content: “For even your [tribal] brothers and the household of your father,
  - type: text
    content: Even they have dealt treacherously (unfaithfully) with you;
  - type: text
    content: Indeed they are [like a pack of hounds] howling after you.
  - type: text
    content: 'Do not believe them, although they may say kind words '
  - type: text
    content: and
  - type: text
    content: ' promise you good things.”'
  - type: heading
    content: God’s Answer
  '7':
  - type: text
    content: ¶“I have abandoned My house,
  - type: text
    content: I have given up My [precious] inheritance (Judah);
  - type: text
    content: I have given the [dearly] beloved of My life
  - type: text
    content: Into the hands of her enemies.
  '8':
  - type: text
    content: “My inheritance has become to Me
  - type: text
    content: Like a lion in the forest;
  - type: text
    content: 'She has raised her voice '
  - type: text
    content: and
  - type: text
    content: ' roared against Me;'
  - type: text
    content: So I have come to [treat her as if I] hate her.
  '9':
  - type: text
    content: “Is My inheritance like a speckled bird of prey to Me [unlike the others]?
  - type: text
    content: Are the birds of prey (enemies) surrounding her on every side?
  - type: text
    content: Go, gather all the [wild] beasts of the field;
  - type: text
    content: Bring them to devour [her]!
