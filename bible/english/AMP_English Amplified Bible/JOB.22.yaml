document_id: JOB.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eliphaz Accuses and Exhorts Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Eliphaz the Temanite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Therefore snares surround you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And sudden dread terrifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelms you;'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Or darkness, so that you cannot see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a flood of water covers you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶“Is not God in the height of heaven?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And behold the distant stars, how high they are!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “You say, ‘What does God know [about me]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can He judge through the thick darkness?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ‘Thick clouds are a hiding place for Him, so that He cannot see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He walks on the vault (circle) of the heavens.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Will you keep to the ancient path
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That wicked men walked [in the time of Noah], [2 Pet 2:5]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Men who were snatched away before their time,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose foundations were poured out like a river?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “They said to God, ‘Depart from us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What can the Almighty do for us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' to us?’'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Yet He filled their houses with good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the counsel of the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ungodly is far from me.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The righteous see it and are glad;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the innocent mock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laugh at them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Can a vigorous man be of use to God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or a wise man be useful to himself? [Ps 16:2; Luke 17:10]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '‘Surely our adversaries are cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fire has consumed their abundance.’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '¶“Now yield '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' submit yourself to Him [agree with God and be conformed to His will] and be at peace;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In this way [you will prosper and great] good will come to you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Please receive the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruction from His mouth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And establish His words in your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep them. [Ps 119:11]'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “If you return to the Almighty [and submit and humble yourself before Him], you will be built up [and restored];
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: If
    - type: text
      text: ' you remove unrighteousness far from your tents,'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And place your gold in the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gold of
    - type: text
      text: ' Ophir among the stones of the brooks [considering it of little value],'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And make the Almighty your gold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your precious silver,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then you will have delight in the Almighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will lift up your face to God.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “You will pray to Him, and He will hear you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will pay your vows.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“You will also decide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decree a thing, and it will be established for you;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the light [of God’s favor] will shine upon your ways.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“When you are cast down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humbled, you will speak with confidence,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the humble person He will lift up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' save.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Is it any pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' joy to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai,
        - type: text
          text: ' also vv 17, 23, 25, 26.'
      marker-yv: yv-n
    - type: text
      text: the Almighty that you are righteous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or is it of benefit to Him that you make your ways perfect? [Is 62:3; Zech 2:8; Mal 3:17; Acts 20:28]
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “He will even rescue the one [for whom you intercede] who is not innocent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will be rescued through the cleanness of your hands.” [Job 42:7, 8]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Is it because of your fear of Him that He corrects you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That He enters into judgment against you?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Is not your wickedness great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your sins without end?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “For you have taken pledges of your brothers without cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And stripped men naked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “You have not given water to the weary to drink,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have withheld bread from the hungry. [Matt 25:42]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “But the land is possessed by the man with power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the favored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honorable man dwells in it.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “You have sent widows away empty-handed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the arms (strength) of the fatherless have been broken.
