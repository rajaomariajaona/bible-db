document_id: 1KI.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahab’s Third Campaign against Aram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aram (Syria) and Israel continued without war for three years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king of Israel and Jehoshaphat king of Judah were each sitting on his throne, dressed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' [royal] robes, [in an open place] at the threshing floor at the entrance of the gate of Samaria; and all the prophets were prophesying before them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Zedekiah the son of Chenaanah made for himself horns of iron and said, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': ‘With these you will gore the Arameans (Syrians) until they are destroyed.’ ” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the prophets were prophesying in the same way [to please Ahab], saying, “Go up to Ramoth-gilead and be successful, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will hand it over to the king.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Micaiah Predicts Defeat
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the messenger who went to summon Micaiah said to him, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Behold now
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Listen carefully, the words of the prophets are unanimously favorable to the king. Please let your words be like the word of one of them, and speak favorably.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Micaiah said, “As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, I will speak what the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says to me.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when he came to the king, the king said to him, “Micaiah, shall we go against Ramoth-gilead in battle, or shall we not?” And he answered him, “Go up and be successful, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will hand it over to the king.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the king [doubted him and] said to him, “How many times must I make you swear to tell me nothing but the truth in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I saw all Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scattered upon the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like sheep that have no shepherd.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘These have no master.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let each of them return to his house in peace.’ ”
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the king of Israel said to Jehoshaphat, “Did I not tell you that he would not prophesy good concerning me, but evil?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Micaiah said, “Therefore, hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . I saw the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sitting on His throne, and all the host (army) of heaven standing by Him on His right hand and on His left. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the third year Jehoshaphat king of Judah came down to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The writer often refers to Ahab as “the king of Israel,” without using his name. This is probably because of Ahab’s reputation as a wicked king.
      marker-yv: yv-n
    - type: text
      text: 'king of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, ‘Who will entice Ahab to go up and fall at Ramoth-gilead?’ And one said this, while another said that. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then a spirit came forward and stood before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and said, ‘I will entice him.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, ‘How?’ And he said, ‘I will go out and be a deceiving spirit in the mouth of all his prophets.’ Then the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, ‘You are to entice him and also succeed. Go and do so.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now then, behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has put a deceiving spirit in the mouth of all these prophets; and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has proclaimed disaster against you.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Zedekiah the son of Chenaanah approached and struck Micaiah on the cheek and said, “How did the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' pass from me to speak to you?” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Micaiah said, “Behold, you shall see on that day [of the king’s defeat] when you enter an inner room [looking for a place] to hide yourself.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Israel said, “Take Micaiah and return him to Amon, the governor of the city, and to Joash, the king’s son, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say, ‘Thus says the king, “Put this man in prison, and feed him sparingly with the bread and water until I return safely.” ’ ” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Micaiah said, “If you indeed return safely, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not spoken by me.” Then he said, “Listen, all you people.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Defeat and Death of Ahab
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So [Ahab] the king of Israel and Jehoshaphat the king of Judah went up to Ramoth-gilead. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king of Israel said to his servants, “Do you know that Ramoth in Gilead is ours, yet we are still doing nothing to take it from the hand of the king of Aram?” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Israel said to Jehoshaphat, “I will disguise myself and enter the battle, but you put on your [royal] clothing.” So the king of Israel disguised himself and went into the battle. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king of Aram (Syria) had commanded the thirty-two captains of his chariots, saying, “Do not fight with [anyone, either] small or great, but with [Ahab] the king of Israel alone.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the captains of the chariots saw Jehoshaphat, they said, “Surely it is the king of Israel.” They turned to fight against him, and Jehoshaphat shouted out [in fear]. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one man drew a bow at '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: innocently,
        - type: text
          text: ' i.e. not thinking that he would kill the king.'
      marker-yv: yv-n
    - type: text
      text: 'random and struck the king of Israel in a joint of the armor. So he said to the driver of his chariot, “Turn around and take me out of the fight, because I have been seriously wounded.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The battle raged that day, and [Ahab] the king was propped up in his chariot facing the Arameans (Syrians). And in the evening he died, and the blood from his wound ran down into the bottom of the chariot. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then about sundown a resounding cry passed throughout the army, saying, “Every man to his city and every man to his own country!”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king died and was brought to Samaria, and they buried the king in Samaria. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They washed the chariot by the pool [on the outskirts] of Samaria, where the prostitutes bathed, and the dogs licked up his blood, in accordance with the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He had spoken. [1 Kin 21:19] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of Ahab’s acts, and everything that he did, the ivory palace which he built and all the cities which he built, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Ahab said to Jehoshaphat, “Will you go with me to battle at Ramoth-gilead?” Jehoshaphat said to the king of Israel, “I am as you are, my people as your people, my horses as your horses.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ahab slept with his fathers [in death], and Ahaziah his son became king in his place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The New Rulers
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jehoshaphat the son of Asa became king over Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat was thirty-five years old when he became king, and he reigned twenty-five years in Jerusalem. His mother’s name was Azubah the daughter of Shilhi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He walked in all the ways of Asa his father, without turning from them, doing right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. However, the high places were not removed; the people still sacrificed and burned incense on the high places. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat also made peace with the king of Israel.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jehoshaphat, his might which he displayed and how he made war, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the remnant of the sodomites (male cult prostitutes) who remained in the days of his father Asa, Jehoshaphat expelled from the land.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was no king in Edom; a deputy (governor) was [serving as] king. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat had [large cargo] ships of Tarshish constructed to go to Ophir for gold, but they did not go, because the ships were wrecked at Ezion-geber. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ahaziah the son of Ahab said to Jehoshaphat, “Let my servants go with your servants in the ships,” But Jehoshaphat was unwilling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refused. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jehoshaphat said to the king of Israel, “Please inquire first for the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat slept with his fathers [in death] and was buried with his fathers in the city of his father David, and Jehoram his son became king in his place.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaziah the son of Ahab became king over Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah, and he reigned over Israel for two years. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and walked in the [idolatrous] way of his father [Ahab] and of his mother [Jezebel], and in the way of Jeroboam the son of Nebat, who made Israel sin. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He served Baal and worshiped him, and he provoked the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel to anger, in accordance with everything that his father [Ahab] had done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king of Israel gathered the prophets together, about four hundred men, and said to them, “Shall I go to battle against Ramoth-gilead, or should I not?” And they said, “Go up, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has handed it over to the king.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jehoshaphat [doubted and] said, “Is there not another prophet of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' here whom we may ask?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Israel said to Jehoshaphat, “There is one more man, Micaiah the son of Imlah, by whom we may inquire of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but I hate him, because he never prophesies good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: news
    - type: text
      text: ' for me, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' evil.” But Jehoshaphat said, “May the king not say that [Micaiah only tells bad news].” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Israel summoned an officer and said, “Bring quickly Micaiah the son of Imlah.” '
