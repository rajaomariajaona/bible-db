document_id: MRK.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gerasene Demoniac
  - type: text
    content: 'They came to the '
  - type: note
    content: The southeastern region of the Sea of Galilee.
  - type: text
    content: 'other side of the sea, to the region of the Gerasenes. [Matt 8:28-34; Luke 8:26-37] '
  '10':
  - type: text
    content: 'And he '
  - type: text
    content: began
  - type: text
    content: ' begging Him repeatedly not to send them out of the region. '
  '11':
  - type: text
    content: 'Now there was a large herd of pigs grazing there on the mountain. '
  '12':
  - type: text
    content: 'And '
  - type: text
    content: the demons
  - type: text
    content: ' begged Him, saying, “Send us to the pigs so that we may go into them!” '
  '13':
  - type: text
    content: Jesus gave them permission. And the unclean spirits came out [of the man] and entered the pigs. The herd, numbering about two thousand, rushed down the steep bank into the sea; and they were drowned [one after the other] in the sea.
  '14':
  - type: text
    content: 'The herdsmen [tending the pigs] ran away and reported it in the city and in the country. And '
  - type: text
    content: the people
  - type: text
    content: ' came to see what had happened. '
  '15':
  - type: text
    content: 'They came to Jesus and saw the man who had been demon-possessed sitting down, clothed and in his right mind, the man who had [previously] had the “legion” [of demons]; and they were frightened. '
  '16':
  - type: text
    content: 'Those who had seen it described [in detail] to the people what had happened to the demon-possessed man, and [told them all] about the pigs. '
  '17':
  - type: text
    content: 'So the people began to beg with Jesus to leave their region. '
  '18':
  - type: text
    content: 'As He was stepping into the boat, the [Gentile] man who had been demon-possessed was begging with Him [asking] that he might go with Him [as a disciple]. '
  '19':
  - type: text
    content: 'Jesus did not let him [come], but [instead] He said to him, '
  - type: text
    content: “Go home to your family and tell them all the great things that the Lord has done for you, and how He has had mercy on you.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'When Jesus got out of the boat, immediately a man from the tombs with an unclean spirit met Him, '
  '20':
  - type: text
    content: So he [obeyed and] went away and began to publicly proclaim in Decapolis [the region of the ten Hellenistic cities] all the great things that Jesus had done for him; and all the people were astonished.
  - type: heading
    content: Miracles and Healing
  '21':
  - type: text
    content: 'When Jesus had again crossed over in the boat to the other side [of the sea], a large crowd gathered around Him; and so He stayed by the seashore. '
  '22':
  - type: text
    content: 'One of the synagogue officials named Jairus came up; and seeing Him, fell at His feet [Matt 9:18-26; Luke 8:41-56] '
  '23':
  - type: text
    content: 'and begged anxiously with Him, saying, “My little daughter is at the point of death; [please] come and lay Your hands on her, so that she will be healed and live.” '
  '24':
  - type: text
    content: And Jesus went with him; and a large crowd followed Him and pressed in around Him [from all sides].
  '25':
  - type: text
    content: 'A woman [in the crowd] had [suffered from] a hemorrhage for twelve years, '
  '26':
  - type: text
    content: 'and had endured much [suffering] at the hands of many physicians. She had spent all that she had and was not helped at all, but instead had become worse. '
  '27':
  - type: text
    content: 'She had heard [reports] about Jesus, and she came up behind Him in the crowd and touched His outer robe. '
  '28':
  - type: text
    content: 'For she thought, “If I just touch His clothing, I will get well.” '
  '29':
  - type: text
    content: 'Immediately her flow of blood was dried up; and she felt in her body [and knew without any doubt] that she was healed of her suffering. '
  '3':
  - type: text
    content: 'and the man lived in the '
  - type: note
    content: These probably were burial places built above the ground, or natural caves in the hillside. Cave tombs often had two chambers, one of which remained empty as long as relatives were still alive. Such tombs frequently were used as shelter by lepers, demoniacs, and the poor.
  - type: text
    content: 'tombs, and no one could bind him anymore, not even with chains. '
  '30':
  - type: text
    content: 'Immediately Jesus, recognizing in Himself that power had gone out from Him, turned around in the crowd and asked, '
  - type: text
    content: “Who touched My clothes?”
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'His disciples said to Him, “You see the crowd pressing in around You [from all sides], and You ask, ‘Who touched Me?’ ” '
  '32':
  - type: text
    content: 'Still He kept looking around to see the woman who had done it. '
  '33':
  - type: text
    content: 'And the woman, though she was afraid and trembling, aware of what had happened to her, came and fell down before Him and told Him the whole truth. '
  '34':
  - type: text
    content: 'Then He said to her, '
  - type: text
    content: “Daughter, your faith
  - type: text
    content: ' [your personal trust and confidence in Me] '
  - type: text
    content: has restored you to health; go in peace and be
  - type: text
    content: ' [permanently] '
  - type: text
    content: healed from your suffering.”
  '35':
  - type: text
    content: 'While He was still speaking, some people came from the synagogue official’s house, saying [to Jairus], “Your daughter has died; why bother the Teacher any longer?” '
  '36':
  - type: text
    content: 'Overhearing what was being said, Jesus said to the synagogue official, '
  - type: text
    content: “Do not be afraid; only keep on believing
  - type: text
    content: ' [in Me and my power].” '
  '37':
  - type: text
    content: 'And He allowed no one to go with Him [as witnesses], except Peter and '
  - type: note
    content: The sons of Zebedee and Salome.
  - type: text
    content: 'James and John the brother of James. '
  '38':
  - type: text
    content: 'They came to the house of the synagogue official; and He looked [with understanding] at the uproar '
  - type: text
    content: and
  - type: text
    content: ' commotion, and people loudly weeping and wailing [in mourning]. '
  '39':
  - type: text
    content: 'When He had gone in, He said to them, '
  - type: text
    content: “Why make a commotion and weep? The child has not died, but is sleeping.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For he had often been bound with shackles [for the feet] and with chains, and he tore apart the chains and broke the shackles into pieces, and no one was strong enough to subdue '
  - type: text
    content: and
  - type: text
    content: ' tame him. '
  '40':
  - type: text
    content: 'They '
  - type: text
    content: began
  - type: text
    content: ' laughing [scornfully] at Him [because they knew the child was dead]. But He made them all '
  - type: note
    content: Their lack of faith in Him made them unworthy to witness the miracle of resurrection.
  - type: text
    content: 'go outside, and took along the child’s father and mother and His own [three] companions, and entered '
  - type: text
    content: the room
  - type: text
    content: ' where the child was. '
  '41':
  - type: text
    content: 'Taking the child’s hand, He said [tenderly] to her, '
  - type: text
    content: “Talitha kum!”
  - type: text
    content: '—which translated [from Aramaic] means, '
  - type: text
    content: “Little girl, I say to you, get up!”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'The little girl immediately got up and '
  - type: text
    content: began
  - type: text
    content: ' to walk, for she was twelve years old. And immediately they [who witnessed the child’s resurrection] were overcome with great wonder '
  - type: text
    content: and
  - type: text
    content: ' utter amazement. '
  '43':
  - type: text
    content: 'He gave strict orders that no one should know about this, and He told them to give her '
  - type: text
    content: something
  - type: text
    content: ' to eat.'
  '5':
  - type: text
    content: 'Night and day he was constantly screaming '
  - type: text
    content: and
  - type: text
    content: ' shrieking among the tombs and on the mountains, and cutting himself with [sharp] stones. '
  '6':
  - type: text
    content: 'Seeing Jesus from a distance, he ran up and bowed down before Him [in homage]; '
  '7':
  - type: text
    content: and screaming with a loud voice, he said, “
  - type: note
    content: See note 1:24.
  - type: text
    content: 'What business do we have in common with each other, Jesus, Son of the Most High God? I implore you by God [swear to me], do not torment me!” [Matt 8:29; Luke 4:34] '
  '8':
  - type: text
    content: 'For Jesus had been saying to him, '
  - type: text
    content: “Come out of the man, you unclean spirit!”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'He was asking him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: ' And he replied, “My name is Legion; for we are many.” '
