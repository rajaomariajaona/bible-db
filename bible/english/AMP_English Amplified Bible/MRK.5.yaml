document_id: MRK.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Gerasene Demoniac
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The southeastern region of the Sea of Galilee.
      marker-yv: yv-n
    - type: text
      text: 'other side of the sea, to the region of the Gerasenes. [Matt 8:28-34; Luke 8:26-37] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' begging Him repeatedly not to send them out of the region. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was a large herd of pigs grazing there on the mountain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the demons
    - type: text
      text: ' begged Him, saying, “Send us to the pigs so that we may go into them!” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus gave them permission. And the unclean spirits came out [of the man] and entered the pigs. The herd, numbering about two thousand, rushed down the steep bank into the sea; and they were drowned [one after the other] in the sea.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The herdsmen [tending the pigs] ran away and reported it in the city and in the country. And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people
    - type: text
      text: ' came to see what had happened. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came to Jesus and saw the man who had been demon-possessed sitting down, clothed and in his right mind, the man who had [previously] had the “legion” [of demons]; and they were frightened. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who had seen it described [in detail] to the people what had happened to the demon-possessed man, and [told them all] about the pigs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people began to beg with Jesus to leave their region. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As He was stepping into the boat, the [Gentile] man who had been demon-possessed was begging with Him [asking] that he might go with Him [as a disciple]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus did not let him [come], but [instead] He said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go home to your family and tell them all the great things that the Lord has done for you, and how He has had mercy on you.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus got out of the boat, immediately a man from the tombs with an unclean spirit met Him, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he [obeyed and] went away and began to publicly proclaim in Decapolis [the region of the ten Hellenistic cities] all the great things that Jesus had done for him; and all the people were astonished.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Miracles and Healing
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus had again crossed over in the boat to the other side [of the sea], a large crowd gathered around Him; and so He stayed by the seashore. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the synagogue officials named Jairus came up; and seeing Him, fell at His feet [Matt 9:18-26; Luke 8:41-56] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and begged anxiously with Him, saying, “My little daughter is at the point of death; [please] come and lay Your hands on her, so that she will be healed and live.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jesus went with him; and a large crowd followed Him and pressed in around Him [from all sides].
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A woman [in the crowd] had [suffered from] a hemorrhage for twelve years, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and had endured much [suffering] at the hands of many physicians. She had spent all that she had and was not helped at all, but instead had become worse. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She had heard [reports] about Jesus, and she came up behind Him in the crowd and touched His outer robe. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For she thought, “If I just touch His clothing, I will get well.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately her flow of blood was dried up; and she felt in her body [and knew without any doubt] that she was healed of her suffering. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the man lived in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These probably were burial places built above the ground, or natural caves in the hillside. Cave tombs often had two chambers, one of which remained empty as long as relatives were still alive. Such tombs frequently were used as shelter by lepers, demoniacs, and the poor.
      marker-yv: yv-n
    - type: text
      text: 'tombs, and no one could bind him anymore, not even with chains. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately Jesus, recognizing in Himself that power had gone out from Him, turned around in the crowd and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who touched My clothes?”
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His disciples said to Him, “You see the crowd pressing in around You [from all sides], and You ask, ‘Who touched Me?’ ” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Still He kept looking around to see the woman who had done it. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the woman, though she was afraid and trembling, aware of what had happened to her, came and fell down before Him and told Him the whole truth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Daughter, your faith
    - type: text
      text: ' [your personal trust and confidence in Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has restored you to health; go in peace and be
    - type: text
      text: ' [permanently] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: healed from your suffering.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While He was still speaking, some people came from the synagogue official’s house, saying [to Jairus], “Your daughter has died; why bother the Teacher any longer?” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Overhearing what was being said, Jesus said to the synagogue official, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not be afraid; only keep on believing
    - type: text
      text: ' [in Me and my power].” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He allowed no one to go with Him [as witnesses], except Peter and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The sons of Zebedee and Salome.
      marker-yv: yv-n
    - type: text
      text: 'James and John the brother of James. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came to the house of the synagogue official; and He looked [with understanding] at the uproar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commotion, and people loudly weeping and wailing [in mourning]. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He had gone in, He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why make a commotion and weep? The child has not died, but is sleeping.”
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he had often been bound with shackles [for the feet] and with chains, and he tore apart the chains and broke the shackles into pieces, and no one was strong enough to subdue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tame him. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' laughing [scornfully] at Him [because they knew the child was dead]. But He made them all '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Their lack of faith in Him made them unworthy to witness the miracle of resurrection.
      marker-yv: yv-n
    - type: text
      text: 'go outside, and took along the child’s father and mother and His own [three] companions, and entered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the room
    - type: text
      text: ' where the child was. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taking the child’s hand, He said [tenderly] to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Talitha kum!”
    - type: text
      text: '—which translated [from Aramaic] means, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Little girl, I say to you, get up!”
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The little girl immediately got up and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to walk, for she was twelve years old. And immediately they [who witnessed the child’s resurrection] were overcome with great wonder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utter amazement. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave strict orders that no one should know about this, and He told them to give her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' to eat.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Night and day he was constantly screaming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shrieking among the tombs and on the mountains, and cutting himself with [sharp] stones. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seeing Jesus from a distance, he ran up and bowed down before Him [in homage]; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and screaming with a loud voice, he said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:24.
      marker-yv: yv-n
    - type: text
      text: 'What business do we have in common with each other, Jesus, Son of the Most High God? I implore you by God [swear to me], do not torment me!” [Matt 8:29; Luke 4:34] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Jesus had been saying to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come out of the man, you unclean spirit!”
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was asking him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is your name?”
    - type: text
      text: ' And he replied, “My name is Legion; for we are many.” '
