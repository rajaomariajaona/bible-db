document_id: 2KI.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josiah Succeeds Amon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josiah was eight years old when he became king, and reigned for thirty-one years in Jerusalem. His mother’s name was Jedidah daughter of Adaiah of Bozkath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did what was right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and walked in all the ways of his father (ancestor) David, and did not turn aside to the right or to the left.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In the eighteenth year of King Josiah, the king sent Shaphan the son of Azaliah, the son of Meshullam the scribe to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Go up to Hilkiah the high priest, so that he may count the entire amount of money brought into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which the doorkeepers have collected from the people. [2 Kin 12:4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And have them deliver it to the hands of the workmen who have been appointed over the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and have them give it to the workmen who are in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to repair the damages of the house— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that is, [have them give the money] to the carpenters and the builders and the masons—and to buy timber and cut stones to repair the house (temple). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: However, no accounting shall be required of them for the money placed in their hands, because they act faithfully.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Lost Book
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hilkiah the high priest said to Shaphan the scribe, “I have found the Book of the Law in the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” Hilkiah gave the book to Shaphan, and he read it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shaphan the scribe came to the king and brought back word to him: “Your servants have emptied out the money that was found in the house, and have placed it in the hands of the workmen who have been appointed over the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then Shaphan the scribe told the king, “Hilkiah the priest has given me a book.” And Shaphan read it [aloud] before the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now when the king heard the words of the Book of the Law, he tore his clothes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the king commanded Hilkiah the priest, Ahikam the son of Shaphan, Achbor the son of Micaiah, Shaphan the scribe, and Asaiah the servant of the king, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Go, inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for my sake and for the sake of the people and for all Judah concerning the words of this book which has been found, for great is the wrath of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which has been kindled against us, because our fathers have not listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed the words of this book, so as to act in accordance with everything that is written concerning us.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Huldah Predicts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Hilkiah the priest, Ahikam, Achbor, Shaphan, and Asaiah went to Huldah the prophetess, the wife of Shallum the son of Tikvah, the son of Harhas, keeper of the wardrobe (she was living in Jerusalem, in the Second Quarter [the new part of the city]); and they spoke to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She said to them, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: ‘Tell the man who sent you to me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': “Behold, I am bringing a catastrophe on this place (Judah) and on its inhabitants, [according to] all the words of the book which the king of Judah has read. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Because they have abandoned (rejected) Me and have burned incense to other gods, that they might provoke Me to anger with all the work of their hands, therefore My wrath burns against this place, and it will not be quenched.” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But to the king of Judah who sent you to inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you shall say this to him: ‘Thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Regarding
  - type: text
    text: ' the words which you have heard, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: because your heart was tender (receptive, penitent) and you humbled yourself before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' when you heard what I said against this place and against its inhabitants, that they should become a desolation and a curse, and because you have torn your clothes and wept before Me, I have heard you,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Therefore, behold, [King Josiah,] I will gather you to your fathers, and you will be taken to your grave in peace, and your eyes will not see all the evil (catastrophe) which I will bring on this place.” ’ ” So they brought back word to the king.
