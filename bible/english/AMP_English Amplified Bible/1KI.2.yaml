    - type: text
      text: David’s Charge to Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When David’s time to die approached, he gave instructions to Solomon his son, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“I am going the way of all the earth [as dust to dust]. Be strong and prove yourself a man. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Keep the charge of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, [that is, fulfill your obligation to] walk in His ways, keep His statutes, His commandments, His precepts, and His testimonies, as it is written in the Law of Moses, so that you may succeed in everything that you do and wherever you turn, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: so that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' may fulfill His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: His word which He spoke.
    marker-yv: yv-n
  - type: text
    text: 'promise concerning me, saying, ‘If your sons are careful regarding their way [of life], to walk before Me in truth with all their heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind and with all their soul, you shall not fail to have a man (descendant) on the throne of Israel.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now you also know what Joab the son of Zeruiah [my sister] did to me, and what he did to the two commanders of the armies of Israel, to Abner the son of Ner and to Amasa the son of Jether, [both of] whom he murdered; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: he also shed
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'avenging the blood of war in [a time of] peace. And he put the [innocent] blood of war [of Abner and Amasa] on his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: girdle
      - type: text
        text: . The girdle was a band about six inches wide that had clasps or fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money, or other necessary things.
    marker-yv: yv-n
  - type: text
    text: 'belt that was around his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: loins
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'waist, and on his sandals on his feet. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So act in accordance with your wisdom, but do not let his gray head go down to Sheol (the place of the dead) in peace. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But be gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kind to the sons of Barzillai the Gileadite, and let them be among those who [have the honor to] eat at your table; for they met me [with kindness] when I fled from your brother Absalom. [2 Sam 17:27-29] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And look, you have with you Shimei the son of Gera, the Benjamite of Bahurim; he is the one who cursed me with a sinister curse the day I went to Mahanaim. But he came down to meet me at the Jordan [on my return], and I swore to him by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, ‘I will not put you to death with the sword.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But now do not let him go unpunished, for you are a wise man; and you will know what to do to him, and you will bring his gray head down to Sheol [covered] with blood.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Death of David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So David lay down with his fathers [in death] and was buried in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Not the walled city today called “Old Jerusalem” but a peninsula of land extending south from the “old city.”
    marker-yv: yv-n
  - type: text
    text: 'City of David. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The time that David reigned over Israel was forty years: he reigned seven years in Hebron and thirty-three years in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Solomon sat on the throne of David his father, and his kingdom was firmly established.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now Adonijah the son of [David and] Haggith came to Bathsheba the mother of Solomon. She said, “Do you come in peace?” And he said, “In peace.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he said, “I have something '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to say
  - type: text
    text: ' to you.” And she said, “Speak.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So he said, “You know that the kingdom belonged to me [as the eldest living son] and all Israel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: set their faces toward me
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'looked to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expected me to be king. However, the kingdom has passed [from me] and became my brother’s, for it was his from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So now I am making one request of you; do not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: turn away my face;
      - type: text
        text: ' similarly in the following verses.'
    marker-yv: yv-n
  - type: text
    text: 'refuse me.” And she said to him, “Speak.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He said, “Please speak to King Solomon, for he will not refuse you; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ask
  - type: text
    text: ' that he may give me Abishag the Shunammite as a wife.” [1 Kin 1:1-4] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Bathsheba replied, “Very well; I will speak to the king for you.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Adonijah Executed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Bathsheba went to King Solomon to speak to him for Adonijah. And the king rose to meet her, bowed before her, and sat down on his throne; then he had a throne set for her, the king’s mother, and she sat on his right. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then she said, “I am making one small request of you; do not refuse me.” And the king said to her, “Ask, my mother, for I will not refuse you.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So she said, “Let Abishag the Shunammite be given to your brother Adonijah as a wife.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'King Solomon answered and said to his mother, “And why are you asking for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Even though Abishag remained a virgin while attending David during his final days, no one was closer to him. Bathsheba evidently did not view Abishag’s status as David’s former nurse to be problematic, but Solomon immediately perceived marriage to Abishag as a claim to the throne, which was Adonijah’s true intention in making the request. Abishag would have been considered an inheritance from David.
    marker-yv: yv-n
  - type: text
    text: 'Abishag the Shunammite for Adonijah? Ask the kingdom for him also—since he is my older brother—[ask it] for him and for Abiathar the priest and Joab the son of Zeruiah [his supporters]!” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then King Solomon swore by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “May God do the same to me, and more also, if Adonijah has not requested this [deplorable] thing against his own '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'life. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So now, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, who has established me and set me on the throne of David my father, and who has made me a house as He promised, Adonijah shall indeed be put to death today.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So King Solomon sent Benaiah the son of Jehoiada, and he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fell upon
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: struck Adonijah and he died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the king said to Abiathar the priest, “Go to Anathoth to your own fields, for you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: are a man of death
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: certainly deserve to die; but I will not put you to death this day, because you carried the ark of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' before my father David, and you suffered everything that my father endured.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So Solomon dismissed Abiathar [a descendant of Eli] from being priest to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', fulfilling the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which He had spoken concerning the house (descendants) of Eli in Shiloh. [1 Sam 2:27-36]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joab Executed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now the news reached Joab, for Joab had supported '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' followed Adonijah, although he had not followed Absalom. So Joab fled to the [sacred] tent of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and took hold of the horns of the altar [to seek asylum]. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: King Solomon was told that Joab had fled to the tent of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and was at that moment beside the altar. Then Solomon sent Benaiah the son of Jehoiada, saying, “Go, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fall upon him.
    marker-yv: yv-n
  - type: text
    text: 'strike him down.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Benaiah came to the tent of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and told Joab, “This is what the king commands, ‘Come out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of there
  - type: text
    text: '.’ ” But Joab said, “No, for I will die here.” Then Benaiah brought word to the king again, saying, “This is what Joab said, and this is how he answered me.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The king said to him, “Do as he has said. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fall upon.
    marker-yv: yv-n
  - type: text
    text: 'Strike him down and bury him, so that you may remove from me and from my father’s house the innocent blood which Joab shed. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will return his bloody deeds upon his own head, because he struck down two men more righteous and honorable than he and killed them with the sword, without my father David knowing: Abner the son of Ner, commander of the army of Israel, and Amasa the son of Jether, commander of the army of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So shall their blood return on the head of Joab and the heads of his descendants forever. But for David, his descendants, his house, and his throne, may there be peace from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' forever.” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So Benaiah the son of Jehoiada went up [to the tabernacle] and struck and killed Joab, and he was buried at his own house in the wilderness [of Judah]. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The king appointed Benaiah the son of Jehoiada over the army in Joab’s place, and appointed Zadok the priest in place of Abiathar.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shimei Executed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Now the king sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and called for Shimei and said to him, “Build yourself a house in Jerusalem and live there. Do not go from there to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:36 '
    - type: usfm
      marker: ft
      children:
