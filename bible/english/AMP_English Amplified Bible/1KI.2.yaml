document_id: 1KI.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Charge to Solomon
  - type: text
    content: 'When David’s time to die approached, he gave instructions to Solomon his son, saying, '
  '10':
  - type: text
    content: 'So David lay down with his fathers [in death] and was buried in the '
  - type: note
    content: Not the walled city today called “Old Jerusalem” but a peninsula of land extending south from the “old city.”
  - type: text
    content: 'City of David. '
  '11':
  - type: text
    content: 'The time that David reigned over Israel was forty years: he reigned seven years in Hebron and thirty-three years in Jerusalem. '
  '12':
  - type: text
    content: Then Solomon sat on the throne of David his father, and his kingdom was firmly established.
  '13':
  - type: text
    content: 'Now Adonijah the son of [David and] Haggith came to Bathsheba the mother of Solomon. She said, “Do you come in peace?” And he said, “In peace.” '
  '14':
  - type: text
    content: 'Then he said, “I have something '
  - type: text
    content: to say
  - type: text
    content: ' to you.” And she said, “Speak.” '
  '15':
  - type: text
    content: 'So he said, “You know that the kingdom belonged to me [as the eldest living son] and all Israel '
  - type: note
    content: Lit set their faces toward me.
  - type: text
    content: 'looked to me '
  - type: text
    content: and
  - type: text
    content: ' expected me to be king. However, the kingdom has passed [from me] and became my brother’s, for it was his from the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'So now I am making one request of you; do not '
  - type: note
    content: Lit turn away my face; similarly in the following verses.
  - type: text
    content: 'refuse me.” And she said to him, “Speak.” '
  '17':
  - type: text
    content: 'He said, “Please speak to King Solomon, for he will not refuse you; '
  - type: text
    content: ask
  - type: text
    content: ' that he may give me Abishag the Shunammite as a wife.” [1 Kin 1:1-4] '
  '18':
  - type: text
    content: Bathsheba replied, “Very well; I will speak to the king for you.”
  - type: heading
    content: Adonijah Executed
  '19':
  - type: text
    content: 'So Bathsheba went to King Solomon to speak to him for Adonijah. And the king rose to meet her, bowed before her, and sat down on his throne; then he had a throne set for her, the king’s mother, and she sat on his right. '
  '2':
  - type: text
    content: '“I am going the way of all the earth [as dust to dust]. Be strong and prove yourself a man. '
  '20':
  - type: text
    content: 'Then she said, “I am making one small request of you; do not refuse me.” And the king said to her, “Ask, my mother, for I will not refuse you.” '
  '21':
  - type: text
    content: 'So she said, “Let Abishag the Shunammite be given to your brother Adonijah as a wife.” '
  '22':
  - type: text
    content: 'King Solomon answered and said to his mother, “And why are you asking for '
  - type: note
    content: Even though Abishag remained a virgin while attending David during his final days, no one was closer to him. Bathsheba evidently did not view Abishag’s status as David’s former nurse to be problematic, but Solomon immediately perceived marriage to Abishag as a claim to the throne, which was Adonijah’s true intention in making the request. Abishag would have been considered an inheritance from David.
  - type: text
    content: 'Abishag the Shunammite for Adonijah? Ask the kingdom for him also—since he is my older brother—[ask it] for him and for Abiathar the priest and Joab the son of Zeruiah [his supporters]!” '
  '23':
  - type: text
    content: Then King Solomon swore by the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “May God do the same to me, and more also, if Adonijah has not requested this [deplorable] thing against his own '
  - type: note
    content: Lit soul.
  - type: text
    content: 'life. '
  '24':
  - type: text
    content: So now, as the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, who has established me and set me on the throne of David my father, and who has made me a house as He promised, Adonijah shall indeed be put to death today.” '
  '25':
  - type: text
    content: 'So King Solomon sent Benaiah the son of Jehoiada, and he '
  - type: note
    content: Lit fell upon.
  - type: text
    content: struck Adonijah and he died.
  '26':
  - type: text
    content: 'Then the king said to Abiathar the priest, “Go to Anathoth to your own fields, for you '
  - type: note
    content: Lit are a man of death.
  - type: text
    content: certainly deserve to die; but I will not put you to death this day, because you carried the ark of the Lord G
  - type: heading
    content: od
  - type: text
    content: ' before my father David, and you suffered everything that my father endured.” '
  '27':
  - type: text
    content: So Solomon dismissed Abiathar [a descendant of Eli] from being priest to the L
  - type: heading
    content: ord
  - type: text
    content: ', fulfilling the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ', which He had spoken concerning the house (descendants) of Eli in Shiloh. [1 Sam 2:27-36]'
  - type: heading
    content: Joab Executed
  '28':
  - type: text
    content: 'Now the news reached Joab, for Joab had supported '
  - type: text
    content: and
  - type: text
    content: ' followed Adonijah, although he had not followed Absalom. So Joab fled to the [sacred] tent of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and took hold of the horns of the altar [to seek asylum]. '
  '29':
  - type: text
    content: King Solomon was told that Joab had fled to the tent of the L
  - type: heading
    content: ord
  - type: text
    content: ' and was at that moment beside the altar. Then Solomon sent Benaiah the son of Jehoiada, saying, “Go, '
  - type: note
    content: Lit fall upon him.
  - type: text
    content: 'strike him down.” '
  '3':
  - type: text
    content: Keep the charge of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, [that is, fulfill your obligation to] walk in His ways, keep His statutes, His commandments, His precepts, and His testimonies, as it is written in the Law of Moses, so that you may succeed in everything that you do and wherever you turn, '
  '30':
  - type: text
    content: So Benaiah came to the tent of the L
  - type: heading
    content: ord
  - type: text
    content: ' and told Joab, “This is what the king commands, ‘Come out '
  - type: text
    content: of there
  - type: text
    content: '.’ ” But Joab said, “No, for I will die here.” Then Benaiah brought word to the king again, saying, “This is what Joab said, and this is how he answered me.” '
  '31':
  - type: text
    content: 'The king said to him, “Do as he has said. '
  - type: note
    content: Lit fall upon.
  - type: text
    content: 'Strike him down and bury him, so that you may remove from me and from my father’s house the innocent blood which Joab shed. '
  '32':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will return his bloody deeds upon his own head, because he struck down two men more righteous and honorable than he and killed them with the sword, without my father David knowing: Abner the son of Ner, commander of the army of Israel, and Amasa the son of Jether, commander of the army of Judah. '
  '33':
  - type: text
    content: So shall their blood return on the head of Joab and the heads of his descendants forever. But for David, his descendants, his house, and his throne, may there be peace from the L
  - type: heading
    content: ord
  - type: text
    content: ' forever.” '
  '34':
  - type: text
    content: 'So Benaiah the son of Jehoiada went up [to the tabernacle] and struck and killed Joab, and he was buried at his own house in the wilderness [of Judah]. '
  '35':
  - type: text
    content: The king appointed Benaiah the son of Jehoiada over the army in Joab’s place, and appointed Zadok the priest in place of Abiathar.
  - type: heading
    content: Shimei Executed
  '36':
  - type: text
    content: 'Now the king sent '
  - type: text
    content: word
  - type: text
    content: ' and called for Shimei and said to him, “Build yourself a house in Jerusalem and live there. Do not go from there to '
  - type: note
    content: Lit here and there.
  - type: text
    content: 'any other place. '
  '37':
  - type: text
    content: 'For on the day you leave and cross over the '
  - type: note
    content: This was the border between the tribal territories of Judah and Benjamin, Shimei’s tribe. Confinement in Jerusalem would stop Shimei from plotting against Solomon.
  - type: text
    content: 'Brook Kidron, know for certain that you shall surely die; your blood shall be on your own head.” '
  '38':
  - type: text
    content: Shimei said to the king, “The word (ruling) is good. As my lord the king has said, so will your servant do.” So Shimei lived in Jerusalem for many days.
  '39':
  - type: text
    content: 'But it happened after three years, that two of Shimei’s servants ran away to Achish the son of Maacah, the king of '
  - type: note
    content: One of the five major cities of the Philistines.
  - type: text
    content: 'Gath. And Shimei was told, “Behold, your [runaway] servants are in Gath.” '
  '4':
  - type: text
    content: so that the L
  - type: heading
    content: ord
  - type: text
    content: ' may fulfill His '
  - type: note
    content: Lit His word which He spoke.
  - type: text
    content: 'promise concerning me, saying, ‘If your sons are careful regarding their way [of life], to walk before Me in truth with all their heart '
  - type: text
    content: and
  - type: text
    content: ' mind and with all their soul, you shall not fail to have a man (descendant) on the throne of Israel.’'
  '40':
  - type: text
    content: 'So Shimei arose, saddled his donkey, and went to Gath to [King] Achish to look for his servants. And Shimei went and brought them '
  - type: text
    content: back
  - type: text
    content: ' from Gath. '
  '41':
  - type: text
    content: 'Now Solomon was told that Shimei had gone from Jerusalem to Gath, and had returned. '
  '42':
  - type: text
    content: 'So the king sent '
  - type: text
    content: word
  - type: text
    content: ' and called for Shimei and said to him, “Did I not make you swear by the L'
  - type: heading
    content: ord
  - type: text
    content: ' and solemnly warn you, saying, ‘Know for certain that on the day you leave [Jerusalem] and go anywhere, you shall surely die’? And you said to me, ‘The word (ruling) I have heard is good.’ '
  '43':
  - type: text
    content: Why then have you not kept the oath of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the command which I gave you?” '
  '44':
  - type: text
    content: The king also said to Shimei, “You are aware in your own heart of all the evil you did to my father David; so the L
  - type: heading
    content: ord
  - type: text
    content: ' shall return your evil on your own head. '
  '45':
  - type: text
    content: But King Solomon shall be blessed, and the throne of David shall be established before the L
  - type: heading
    content: ord
  - type: text
    content: ' forever.” '
  '46':
  - type: text
    content: So the king commanded Benaiah the son of Jehoiada, and he went out and struck down Shimei, and he died.
  - type: text
    content: S
  - type: text
    content: o the kingdom was established in the hands of Solomon.
  '5':
  - type: text
    content: 'Now you also know what Joab the son of Zeruiah [my sister] did to me, and what he did to the two commanders of the armies of Israel, to Abner the son of Ner and to Amasa the son of Jether, [both of] whom he murdered; '
  - type: note
    content: Lit he also shed.
  - type: text
    content: 'avenging the blood of war in [a time of] peace. And he put the [innocent] blood of war [of Abner and Amasa] on his '
  - type: note
    content: Lit girdle. The girdle was a band about six inches wide that had clasps or fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money, or other necessary things.
  - type: text
    content: 'belt that was around his '
  - type: note
    content: Lit loins.
  - type: text
    content: 'waist, and on his sandals on his feet. '
  '6':
  - type: text
    content: 'So act in accordance with your wisdom, but do not let his gray head go down to Sheol (the place of the dead) in peace. '
  '7':
  - type: text
    content: 'But be gracious '
  - type: text
    content: and
  - type: text
    content: ' kind to the sons of Barzillai the Gileadite, and let them be among those who [have the honor to] eat at your table; for they met me [with kindness] when I fled from your brother Absalom. [2 Sam 17:27-29] '
  '8':
  - type: text
    content: And look, you have with you Shimei the son of Gera, the Benjamite of Bahurim; he is the one who cursed me with a sinister curse the day I went to Mahanaim. But he came down to meet me at the Jordan [on my return], and I swore to him by the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, ‘I will not put you to death with the sword.’ '
  '9':
  - type: text
    content: But now do not let him go unpunished, for you are a wise man; and you will know what to do to him, and you will bring his gray head down to Sheol [covered] with blood.”
  - type: heading
    content: Death of David
