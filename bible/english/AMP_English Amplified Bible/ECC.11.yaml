document_id: ECC.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Cast Your Bread on the Waters
  - type: text
    content: 'Cast your bread on the surface of the waters, [be diligently active, make thoughtful decisions], for you will '
  - type: note
    content: I.e. be richly rewarded.
  - type: text
    content: 'find it after many days. '
  '10':
  - type: text
    content: Therefore, remove sorrow and anger from your heart and put away pain from your body, for childhood and the prime of life are fleeting. [2 Cor 7:1; 2 Tim 2:22]
  '2':
  - type: text
    content: 'Give a portion to seven, or even [divide it] to eight, for you do not know what misfortune may occur on the earth. '
  '3':
  - type: text
    content: 'If the clouds are full [of rain], they empty themselves on the earth; and if a tree falls toward the south or toward the north, in the place where the tree falls, there it lies. '
  '4':
  - type: text
    content: 'He who watches the wind [waiting for all conditions to be perfect] will not sow [seed], and he who looks at the clouds will not reap [a harvest]. '
  '5':
  - type: text
    content: 'Just as you do not know the way '
  - type: text
    content: and
  - type: text
    content: ' path of the wind or how the bones '
  - type: text
    content: are formed
  - type: text
    content: ' in the womb of a pregnant woman, even so you do not know the activity of God who makes all things.'
  '6':
  - type: text
    content: Sow your seed in the morning and do not be idle with your hands in the evening, for you do not know whether morning or evening planting will succeed, whether this or that, or whether both alike will be good.
  '7':
  - type: text
    content: 'The light is sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasant, and it is good for the eyes to see the sun. '
  '8':
  - type: text
    content: Yes, if a man should live many years, let him rejoice in them all; yet let him remember the days of darkness, for they will be many. All that is to come will be futility.
  '9':
  - type: text
    content: 'Rejoice, young man, in your childhood, and let your heart be pleasant in the days of your young manhood. And walk in the ways of your heart and in the desires of your eyes, but know that God will bring you into judgment for all these things. '
