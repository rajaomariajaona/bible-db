document_id: 2CO.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Reveals His Heart
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Therefore, since we have these [great and wonderful] promises, beloved, let us cleanse ourselves from everything that contaminates body and spirit, completing holiness [living a consecrated life—a life set apart for God’s purpose] in the fear of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Make room for us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in your hearts;
  - type: text
    text: ' we have wronged no one, we have corrupted no one, we have cheated no one. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I do not say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' to condemn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you,
  - type: text
    text: ' for I have said before that you are [nested] in our hearts [and you will remain there] to die together and to live together [with us]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Great is my confidence in you; great is my pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boasting on your behalf. I am filled [to the brim] with comfort; I am overflowing with joy in spite of all our trouble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For even when we arrived in Macedonia our bodies had no rest, but we were oppressed at every turn—conflicts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disputes without, fears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread within. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But God, who comforts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourages the depressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the disquieted, comforted us by the arrival of Titus. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And not only by his arrival, but also by [his account of] the encouragement which he received in regard to you. He told us about your longing [for us], your mourning [over sin], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how eagerly you took my part and supported me, so that I rejoiced even more. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For even though I did grieve you with my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 2:3.
    marker-yv: yv-n
  - type: text
    text: 'letter, I do not regret it [now]; though I did regret it—for I see that the letter hurt you, though only for a little while— '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'yet I am glad now, not because you were hurt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made sorry, but because your sorrow led to repentance [and you turned back to God]; for you felt a grief such as God meant you to feel, so that you might not suffer loss in anything on our account. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For [godly] sorrow that is in accord with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the will of
  - type: text
    text: ' God produces a repentance without regret, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: leading
  - type: text
    text: ' to salvation; but worldly sorrow [the hopeless sorrow of those who do not believe] produces death. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For [you can look back and] see what an earnestness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authentic concern this godly sorrow has produced in you: what vindication of yourselves [against charges that you tolerate sin], what indignation [at sin], what fear [of offending God], what longing [for righteousness and justice], what passion [to do what is right], what readiness to punish [those who sin and those who tolerate sin]! At every point you have proved yourselves to be innocent in the matter. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So even though I wrote to you [as I did], it was not for the sake of the offender nor for the sake of the one offended, but in order to make evident to you before God how earnestly you do care for us [and your willingness to accept our authority]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'It is for this reason that we are comforted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraged.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: 'nd in addition to our comfort, we were especially delighted at the joy of Titus, because you have refreshed his spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if I have boasted to him at all concerning you, I was not disappointed. But just as everything we ever said to you was true, so our boasting [about you] to Titus has proved true also. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'His affection is greater than ever as he remembers the obedience [to his guidance] that all of you exhibited, and how you received him with the greatest respect. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I rejoice that in everything I have [perfect] confidence in you.
