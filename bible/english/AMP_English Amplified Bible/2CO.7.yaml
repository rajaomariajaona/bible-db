document_id: 2CO.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Reveals His Heart
  - type: text
    content: Therefore, since we have these [great and wonderful] promises, beloved, let us cleanse ourselves from everything that contaminates body and spirit, completing holiness [living a consecrated life—a life set apart for God’s purpose] in the fear of God.
  '10':
  - type: text
    content: 'For [godly] sorrow that is in accord with '
  - type: text
    content: the will of
  - type: text
    content: ' God produces a repentance without regret, '
  - type: text
    content: leading
  - type: text
    content: ' to salvation; but worldly sorrow [the hopeless sorrow of those who do not believe] produces death. '
  '11':
  - type: text
    content: 'For [you can look back and] see what an earnestness '
  - type: text
    content: and
  - type: text
    content: ' authentic concern this godly sorrow has produced in you: what vindication of yourselves [against charges that you tolerate sin], what indignation [at sin], what fear [of offending God], what longing [for righteousness and justice], what passion [to do what is right], what readiness to punish [those who sin and those who tolerate sin]! At every point you have proved yourselves to be innocent in the matter. '
  '12':
  - type: text
    content: 'So even though I wrote to you [as I did], it was not for the sake of the offender nor for the sake of the one offended, but in order to make evident to you before God how earnestly you do care for us [and your willingness to accept our authority]. '
  '13':
  - type: text
    content: 'It is for this reason that we are comforted '
  - type: text
    content: and
  - type: text
    content: ' encouraged.'
  - type: text
    content: A
  - type: text
    content: 'nd in addition to our comfort, we were especially delighted at the joy of Titus, because you have refreshed his spirit. '
  '14':
  - type: text
    content: 'For if I have boasted to him at all concerning you, I was not disappointed. But just as everything we ever said to you was true, so our boasting [about you] to Titus has proved true also. '
  '15':
  - type: text
    content: 'His affection is greater than ever as he remembers the obedience [to his guidance] that all of you exhibited, and how you received him with the greatest respect. '
  '16':
  - type: text
    content: I rejoice that in everything I have [perfect] confidence in you.
  '2':
  - type: text
    content: 'Make room for us '
  - type: text
    content: in your hearts;
  - type: text
    content: ' we have wronged no one, we have corrupted no one, we have cheated no one. '
  '3':
  - type: text
    content: 'I do not say '
  - type: text
    content: this
  - type: text
    content: ' to condemn '
  - type: text
    content: you,
  - type: text
    content: ' for I have said before that you are [nested] in our hearts [and you will remain there] to die together and to live together [with us]. '
  '4':
  - type: text
    content: 'Great is my confidence in you; great is my pride '
  - type: text
    content: and
  - type: text
    content: ' boasting on your behalf. I am filled [to the brim] with comfort; I am overflowing with joy in spite of all our trouble.'
  '5':
  - type: text
    content: 'For even when we arrived in Macedonia our bodies had no rest, but we were oppressed at every turn—conflicts '
  - type: text
    content: and
  - type: text
    content: ' disputes without, fears '
  - type: text
    content: and
  - type: text
    content: ' dread within. '
  '6':
  - type: text
    content: 'But God, who comforts '
  - type: text
    content: and
  - type: text
    content: ' encourages the depressed '
  - type: text
    content: and
  - type: text
    content: ' the disquieted, comforted us by the arrival of Titus. '
  '7':
  - type: text
    content: 'And not only by his arrival, but also by [his account of] the encouragement which he received in regard to you. He told us about your longing [for us], your mourning [over sin], '
  - type: text
    content: and
  - type: text
    content: ' how eagerly you took my part and supported me, so that I rejoiced even more. '
  '8':
  - type: text
    content: 'For even though I did grieve you with my '
  - type: note
    content: See note 2:3.
  - type: text
    content: 'letter, I do not regret it [now]; though I did regret it—for I see that the letter hurt you, though only for a little while— '
  '9':
  - type: text
    content: 'yet I am glad now, not because you were hurt '
  - type: text
    content: and
  - type: text
    content: ' made sorry, but because your sorrow led to repentance [and you turned back to God]; for you felt a grief such as God meant you to feel, so that you might not suffer loss in anything on our account. '
