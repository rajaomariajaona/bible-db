document_id: NAM.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nineveh’s Complete Ruin
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to the city of blood [guilty of murder and mayhem], completely full of lies and pillage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her prey never departs [alive]. [Ezek 24:6, 9, 10; Hab 2:12]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet she became an exile;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She went into captivity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young children were dashed to pieces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the head of every street;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cast lots for her honorable men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all her great men were bound with chains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You too [Nineveh] will become drunk [with the cup of God’s wrath];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be hidden.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You too [Nineveh] will search [in vain] for a refuge from the enemy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your fortresses are [nothing but] fig trees with ripe figs—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When shaken they fall into the mouth of the eater.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, your people are [as weak and helpless as] women in your midst!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of your land are opened wide to your enemies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire consumes the bars across your gates.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Draw water for a [long, continued] siege!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strengthen your fortresses!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go down to the clay pits, trample the mortar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare the brick kiln [to burn bricks for the rampart]!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there [in the very midst of these preparations] the fire will devour you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will cut you down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will devour you as the locust does.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: M
    - type: text
      text: ultiply yourself like the creeping locusts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multiply yourself like the swarming locusts.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have increased your traders more than the [visible] stars of heaven—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The creeping locust strips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroys and then flies away.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your guardsmen are like the swarming locusts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your marshals are like the hordes of grasshoppers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Settling in the stone walls on a cold day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the sun rises, they fly away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no one knows the place where they are.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your shepherds are asleep, O king of Assyria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your nobles are lying down [in death].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people are scattered on the mountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no one to gather them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is no relief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' healing for your hurt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wound is incurable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who hear the news about you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clap their hands over [what has happened to] you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For on whom has your [unceasing] evil not come continually?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The noise of the [cracking of the] whip,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The noise of the rattling of the wheel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Galloping horses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And rumbling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bounding chariots [in the assault of Nineveh]!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Horsemen charging,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swords flashing, spears gleaming,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many slain, a mass of corpses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No end of corpses—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The horsemen stumble over the corpses!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All because of the many acts of prostitution of [Nineveh] the prostitute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The charming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well-favored one, the mistress of sorceries,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who betrays nations by her acts of prostitution (idolatry)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And families by her sorceries.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I am against you,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And I will lift up your skirts over your face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will let the nations look at your nakedness [O Nineveh]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the kingdoms at your disgrace.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will throw filth on you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And make you vile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treat you with contempt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And set you up as a spectacle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And it will come about that all who see you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will shrink back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' run from you and say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Nineveh is completely ruined!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will grieve for her?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where will I seek comforters for you?”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Are you better than '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The city of the god, Amon, capital of Upper (southern) Egypt.
      marker-yv: yv-n
    - type: text
      text: Thebes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which was situated by the waters of the Nile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With water surrounding her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose defense was the sea (the Nile),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whose wall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: consisted
    - type: text
      text: ' of the sea?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ethiopia was her strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Egypt too, without limits.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps part of the area of modern Libya.
      marker-yv: yv-n
    - type: text
      text: Put and Lubim were among her helpers.
