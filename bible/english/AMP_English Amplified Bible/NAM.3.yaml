document_id: NAM.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Nineveh’s Complete Ruin
  - type: text
    content: Woe (judgment is coming) to the city of blood [guilty of murder and mayhem], completely full of lies and pillage;
  - type: text
    content: Her prey never departs [alive]. [Ezek 24:6, 9, 10; Hab 2:12]
  '10':
  - type: text
    content: Yet she became an exile;
  - type: text
    content: She went into captivity.
  - type: text
    content: Her young children were dashed to pieces
  - type: text
    content: At the head of every street;
  - type: text
    content: They cast lots for her honorable men,
  - type: text
    content: And all her great men were bound with chains.
  '11':
  - type: text
    content: You too [Nineveh] will become drunk [with the cup of God’s wrath];
  - type: text
    content: You will be hidden.
  - type: text
    content: You too [Nineveh] will search [in vain] for a refuge from the enemy.
  '12':
  - type: text
    content: All your fortresses are [nothing but] fig trees with ripe figs—
  - type: text
    content: When shaken they fall into the mouth of the eater.
  '13':
  - type: text
    content: Behold, your people are [as weak and helpless as] women in your midst!
  - type: text
    content: The gates of your land are opened wide to your enemies;
  - type: text
    content: Fire consumes the bars across your gates.
  '14':
  - type: text
    content: Draw water for a [long, continued] siege!
  - type: text
    content: Strengthen your fortresses!
  - type: text
    content: Go down to the clay pits, trample the mortar!
  - type: text
    content: Prepare the brick kiln [to burn bricks for the rampart]!
  '15':
  - type: text
    content: But there [in the very midst of these preparations] the fire will devour you;
  - type: text
    content: The sword will cut you down;
  - type: text
    content: It will devour you as the locust does.
  - type: text
    content: M
  - type: text
    content: ultiply yourself like the creeping locusts;
  - type: text
    content: Multiply yourself like the swarming locusts.
  '16':
  - type: text
    content: You have increased your traders more than the [visible] stars of heaven—
  - type: text
    content: 'The creeping locust strips '
  - type: text
    content: and
  - type: text
    content: ' destroys and then flies away.'
  '17':
  - type: text
    content: Your guardsmen are like the swarming locusts.
  - type: text
    content: Your marshals are like the hordes of grasshoppers
  - type: text
    content: Settling in the stone walls on a cold day.
  - type: text
    content: When the sun rises, they fly away,
  - type: text
    content: And no one knows the place where they are.
  '18':
  - type: text
    content: Your shepherds are asleep, O king of Assyria;
  - type: text
    content: Your nobles are lying down [in death].
  - type: text
    content: Your people are scattered on the mountains
  - type: text
    content: And there is no one to gather them.
  '19':
  - type: text
    content: 'There is no relief '
  - type: text
    content: and
  - type: text
    content: ' healing for your hurt;'
  - type: text
    content: Your wound is incurable.
  - type: text
    content: All who hear the news about you
  - type: text
    content: Clap their hands over [what has happened to] you.
  - type: text
    content: For on whom has your [unceasing] evil not come continually?
  '2':
  - type: text
    content: The noise of the [cracking of the] whip,
  - type: text
    content: The noise of the rattling of the wheel,
  - type: text
    content: Galloping horses
  - type: text
    content: 'And rumbling '
  - type: text
    content: and
  - type: text
    content: ' bounding chariots [in the assault of Nineveh]!'
  '3':
  - type: text
    content: Horsemen charging,
  - type: text
    content: Swords flashing, spears gleaming,
  - type: text
    content: Many slain, a mass of corpses,
  - type: text
    content: No end of corpses—
  - type: text
    content: The horsemen stumble over the corpses!
  '4':
  - type: text
    content: All because of the many acts of prostitution of [Nineveh] the prostitute,
  - type: text
    content: 'The charming '
  - type: text
    content: and
  - type: text
    content: ' well-favored one, the mistress of sorceries,'
  - type: text
    content: Who betrays nations by her acts of prostitution (idolatry)
  - type: text
    content: And families by her sorceries.
  '5':
  - type: text
    content: “Behold, I am against you,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “And I will lift up your skirts over your face,
  - type: text
    content: And I will let the nations look at your nakedness [O Nineveh]
  - type: text
    content: And the kingdoms at your disgrace.
  '6':
  - type: text
    content: “I will throw filth on you
  - type: text
    content: 'And make you vile '
  - type: text
    content: and
  - type: text
    content: ' treat you with contempt,'
  - type: text
    content: And set you up as a spectacle.
  '7':
  - type: text
    content: “And it will come about that all who see you
  - type: text
    content: 'Will shrink back '
  - type: text
    content: and
  - type: text
    content: ' run from you and say,'
  - type: text
    content: ‘Nineveh is completely ruined!
  - type: text
    content: Who will grieve for her?’
  - type: text
    content: Where will I seek comforters for you?”
  '8':
  - type: text
    content: '¶Are you better than '
  - type: note
    content: The city of the god, Amon, capital of Upper (southern) Egypt.
  - type: text
    content: Thebes,
  - type: text
    content: Which was situated by the waters of the Nile,
  - type: text
    content: With water surrounding her,
  - type: text
    content: Whose defense was the sea (the Nile),
  - type: text
    content: 'Whose wall '
  - type: text
    content: consisted
  - type: text
    content: ' of the sea?'
  '9':
  - type: text
    content: Ethiopia was her strength,
  - type: text
    content: And Egypt too, without limits.
  - type: note
    content: Perhaps part of the area of modern Libya.
  - type: text
    content: Put and Lubim were among her helpers.
