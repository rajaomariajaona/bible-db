document_id: NUM.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The People Complain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the people became like those who complain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whine about their hardships, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard it; and when the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard it, His anger was kindled, and the fire of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' burned among them and devoured those in the outlying parts of the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the people cried out to Moses, and when Moses prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the fire died out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He named that place Taberah (the place of burning), because the fire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' burned among them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A unique word found only here in the OT. It refers to the mixed multitude of non-Israelites who joined the exodus.
    marker-yv: yv-n
  - type: text
    text: 'rabble among them [who followed Israel from Egypt] had greedy desires [for familiar and delicious food], and the Israelites wept again and said, “Who will give us meat to eat? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'We remember the fish we ate freely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' without cost in Egypt, the cucumbers, melons, leeks, onions, and garlic. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But now our '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: our throat is dry
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'appetite is gone; there is nothing at all [in the way of food] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: for our eyes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: to be seen but this manna.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The manna was like coriander seed, and it looked like '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A gum resin obtained from various trees of the genus '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Commiphora
      - type: text
        text: . This resin was used as an ingredient to make incense or perfume, and was also used as a topical ointment.
    marker-yv: yv-n
  - type: text
    text: 'bdellium. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The people went about and gathered it, and ground it in mills or beat it in mortars, and boiled it in pots, and made cakes with it; and it tasted like cakes baked with fresh [olive] oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When the dew fell on the camp at night, the manna fell with it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Complaint of Moses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now Moses heard the people weeping [in self-pity] throughout their families, every man at the doorway of his tent; and the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' blazed hotly, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: it was evil in Moses’ sight
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Moses regarded their behavior as evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Moses said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Why have You been so hard on Your servant? And why have I not found favor in Your sight, that You have placed the burden of all these people on me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Was it I who conceived all these people? Was it I who brought them forth, that You should say to me, ‘Carry them in your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bosom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'arms as a nurse carries the nursing infant, to the land which You swore to their fathers’? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Where am I to get meat to give to all these people? For they weep before me and say, ‘Give us meat, so that we may eat.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I am not able to carry all these people alone, because the burden is too heavy for me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So if this is the way You are going to deal with me, please kill me at once, if I have found favor in your sight, and do not let me see my wretchedness.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Seventy Elders to Assist
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Accordingly, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Gather for Me '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A council of seventy elders had existed the year before this (Ex 24:9). It appears to be the source of the Sanhedrin, the highest Jewish assembly for government in the time of our Lord—usually translated “council.”
    marker-yv: yv-n
  - type: text
    text: 'seventy men from among the elders of Israel whom you know to be the elders of the people and their officers; bring them to the Tent of Meeting (tabernacle) and let them stand there with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then I will come down and speak with you there, and I will take away some of the Spirit who is upon you, and will put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' upon them; and they shall bear the burden of the people with you, so that you will not have to bear it all alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Say to the people, ‘Consecrate (separate as holy) yourselves for tomorrow, and you shall eat meat; for you have wept [in self-pity] in the ears of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “Who will give us meat to eat? For we were well-off in Egypt.” Therefore the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will give you meat, and you shall eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You shall eat, not one day, nor two days, nor five days, nor ten days, nor twenty days, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but a whole month—until it comes out of your nostrils and is disgusting to you—because you have rejected '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who is among you, and have wept [in self-pity] before Him, saying, “Why did we come out of Egypt?” ’ ” [Ps 106:13-15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But Moses said, “The people, among whom I am, are 600,000 [fighting men] on foot [besides all the women and children]; yet You have said, ‘I will give them meat, so that they may eat it for a whole month!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Should flocks and herds be slaughtered for them, to be sufficient for them? Or should all the fish of the sea be collected for them to be sufficient for them?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Is the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' hand (ability, power) limited (short, inadequate)? You shall see now whether My word will come to pass for you or not.” [Is 50:2]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So Moses went out and spoke to the people the words of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and he gathered seventy men from among the elders of the people and stationed them around the Tent (tabernacle). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came down in the cloud and spoke to him; and He took some of the Spirit who was upon Moses and put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' upon the seventy elders. When the Spirit rested upon them, they prophesied [praising God and declaring His will], but they did not do it again. [Num 11:29]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But two men had remained in the camp; one named Eldad and the other named Medad. The Spirit rested upon them (now they were among those who had been registered, but had not gone out to the Tent), and they prophesied in the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So a young man ran and told Moses and said, “Eldad and Medad are prophesying [extolling the praises of God and declaring His will] in the camp.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Joshua the son of Nun, the attendant of Moses from his youth, said, “My lord Moses, stop them!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But Moses said to him, “Are you jealous for my sake? Would that all the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' people were prophets and that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' would put His Spirit upon them!” [Luke 9:49, 50] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then Moses went back into the camp, he and the elders of Israel.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Quail and the Plague
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Now there went forth a wind from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and it brought quails from the sea, and let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' fall [so they flew low] beside the camp, about a day’s journey on this side and on the other side, all around the camp, about two cubits (three feet) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: deep
  - type: text
    text: ' on the surface of the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The people spent all that day and all night and all the next day and caught '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gathered the quail (the one who gathered least gathered ten homers) and they spread them out for themselves around the camp [to cure them by drying]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: While the meat was still between their teeth, before it was chewed, the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled against the people, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck them with a very severe plague. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So that place was named Kibroth-hattaavah (the graves of greediness), because there they buried the people who had been greedy [for more than the manna that God provided them]. [1 Cor 10:1-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: From Kibroth-hattaavah the people set out for Hazeroth, and they remained at Hazeroth.
