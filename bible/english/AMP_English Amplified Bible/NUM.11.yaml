  '1':
  - type: heading
    content: The People Complain
  - type: text
    content: 'Now the people became like those who complain '
  - type: text
    content: and
  - type: text
    content: ' whine about their hardships, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' heard it; and when the L'
  - type: heading
    content: ord
  - type: text
    content: ' heard it, His anger was kindled, and the fire of the L'
  - type: heading
    content: ord
  - type: text
    content: ' burned among them and devoured those in the outlying parts of the camp. '
  '10':
  - type: text
    content: Now Moses heard the people weeping [in self-pity] throughout their families, every man at the doorway of his tent; and the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' blazed hotly, and '
  - type: note
    content: Lit it was evil in Moses’ sight.
  - type: text
    content: 'Moses regarded their behavior as evil. '
  '11':
  - type: text
    content: So Moses said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “Why have You been so hard on Your servant? And why have I not found favor in Your sight, that You have placed the burden of all these people on me? '
  '12':
  - type: text
    content: 'Was it I who conceived all these people? Was it I who brought them forth, that You should say to me, ‘Carry them in your '
  - type: note
    content: Lit bosom.
  - type: text
    content: 'arms as a nurse carries the nursing infant, to the land which You swore to their fathers’? '
  '13':
  - type: text
    content: 'Where am I to get meat to give to all these people? For they weep before me and say, ‘Give us meat, so that we may eat.’ '
  '14':
  - type: text
    content: 'I am not able to carry all these people alone, because the burden is too heavy for me. '
  '15':
  - type: text
    content: So if this is the way You are going to deal with me, please kill me at once, if I have found favor in your sight, and do not let me see my wretchedness.”
  - type: heading
    content: Seventy Elders to Assist
  '16':
  - type: text
    content: Accordingly, the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Gather for Me '
  - type: note
    content: A council of seventy elders had existed the year before this (Ex 24:9). It appears to be the source of the Sanhedrin, the highest Jewish assembly for government in the time of our Lord—usually translated “council.”
  - type: text
    content: 'seventy men from among the elders of Israel whom you know to be the elders of the people and their officers; bring them to the Tent of Meeting (tabernacle) and let them stand there with you. '
  '17':
  - type: text
    content: 'Then I will come down and speak with you there, and I will take away some of the Spirit who is upon you, and will put '
  - type: text
    content: Him
  - type: text
    content: ' upon them; and they shall bear the burden of the people with you, so that you will not have to bear it all alone. '
  '18':
  - type: text
    content: Say to the people, ‘Consecrate (separate as holy) yourselves for tomorrow, and you shall eat meat; for you have wept [in self-pity] in the ears of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “Who will give us meat to eat? For we were well-off in Egypt.” Therefore the L'
  - type: heading
    content: ord
  - type: text
    content: ' will give you meat, and you shall eat. '
  '19':
  - type: text
    content: 'You shall eat, not one day, nor two days, nor five days, nor ten days, nor twenty days, '
  '2':
  - type: text
    content: So the people cried out to Moses, and when Moses prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ', the fire died out. '
  '20':
  - type: text
    content: 'but a whole month—until it comes out of your nostrils and is disgusting to you—because you have rejected '
  - type: text
    content: and
  - type: text
    content: ' despised the L'
  - type: heading
    content: ord
  - type: text
    content: ' who is among you, and have wept [in self-pity] before Him, saying, “Why did we come out of Egypt?” ’ ” [Ps 106:13-15] '
  '21':
  - type: text
    content: 'But Moses said, “The people, among whom I am, are 600,000 [fighting men] on foot [besides all the women and children]; yet You have said, ‘I will give them meat, so that they may eat it for a whole month!’ '
  '22':
  - type: text
    content: 'Should flocks and herds be slaughtered for them, to be sufficient for them? Or should all the fish of the sea be collected for them to be sufficient for them?” '
  '23':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Is the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' hand (ability, power) limited (short, inadequate)? You shall see now whether My word will come to pass for you or not.” [Is 50:2]'
  '24':
  - type: text
    content: So Moses went out and spoke to the people the words of the L
  - type: heading
    content: ord
  - type: text
    content: ', and he gathered seventy men from among the elders of the people and stationed them around the Tent (tabernacle). '
  '25':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' came down in the cloud and spoke to him; and He took some of the Spirit who was upon Moses and put '
  - type: text
    content: Him
  - type: text
    content: ' upon the seventy elders. When the Spirit rested upon them, they prophesied [praising God and declaring His will], but they did not do it again. [Num 11:29]'
  '26':
  - type: text
    content: 'But two men had remained in the camp; one named Eldad and the other named Medad. The Spirit rested upon them (now they were among those who had been registered, but had not gone out to the Tent), and they prophesied in the camp. '
  '27':
  - type: text
    content: 'So a young man ran and told Moses and said, “Eldad and Medad are prophesying [extolling the praises of God and declaring His will] in the camp.” '
  '28':
  - type: text
    content: 'Then Joshua the son of Nun, the attendant of Moses from his youth, said, “My lord Moses, stop them!” '
  '29':
  - type: text
    content: But Moses said to him, “Are you jealous for my sake? Would that all the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' people were prophets and that the L'
  - type: heading
    content: ord
  - type: text
    content: ' would put His Spirit upon them!” [Luke 9:49, 50] '
  '3':
  - type: text
    content: He named that place Taberah (the place of burning), because the fire of the L
  - type: heading
    content: ord
  - type: text
    content: ' burned among them.'
  '30':
  - type: text
    content: Then Moses went back into the camp, he and the elders of Israel.
  - type: heading
    content: The Quail and the Plague
  '31':
  - type: text
    content: Now there went forth a wind from the L
  - type: heading
    content: ord
  - type: text
    content: ' and it brought quails from the sea, and let '
  - type: text
    content: them
  - type: text
    content: ' fall [so they flew low] beside the camp, about a day’s journey on this side and on the other side, all around the camp, about two cubits (three feet) '
  - type: text
    content: deep
  - type: text
    content: ' on the surface of the ground. '
  '32':
  - type: text
    content: 'The people spent all that day and all night and all the next day and caught '
  - type: text
    content: and
  - type: text
    content: ' gathered the quail (the one who gathered least gathered ten homers) and they spread them out for themselves around the camp [to cure them by drying]. '
  '33':
  - type: text
    content: While the meat was still between their teeth, before it was chewed, the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled against the people, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' struck them with a very severe plague. '
  '34':
  - type: text
    content: 'So that place was named Kibroth-hattaavah (the graves of greediness), because there they buried the people who had been greedy [for more than the manna that God provided them]. [1 Cor 10:1-13] '
  '35':
  - type: text
    content: From Kibroth-hattaavah the people set out for Hazeroth, and they remained at Hazeroth.
  '4':
  - type: text
    content: 'The '
  - type: note
    content: A unique word found only here in the OT. It refers to the mixed multitude of non-Israelites who joined the exodus.
  - type: text
    content: 'rabble among them [who followed Israel from Egypt] had greedy desires [for familiar and delicious food], and the Israelites wept again and said, “Who will give us meat to eat? '
  '5':
  - type: text
    content: 'We remember the fish we ate freely '
  - type: text
    content: and
  - type: text
    content: ' without cost in Egypt, the cucumbers, melons, leeks, onions, and garlic. '
  '6':
  - type: text
    content: 'But now our '
  - type: note
    content: Lit our throat is dry.
  - type: text
    content: 'appetite is gone; there is nothing at all [in the way of food] '
  - type: note
    content: Lit for our eyes.
  - type: text
    content: to be seen but this manna.”
  '7':
  - type: text
    content: 'The manna was like coriander seed, and it looked like '
  - type: note
    content: A gum resin obtained from various trees of the genus Commiphora. This resin was used as an ingredient to make incense or perfume, and was also used as a topical ointment.
  - type: text
    content: 'bdellium. '
  '8':
  - type: text
    content: 'The people went about and gathered it, and ground it in mills or beat it in mortars, and boiled it in pots, and made cakes with it; and it tasted like cakes baked with fresh [olive] oil. '
  '9':
  - type: text
    content: When the dew fell on the camp at night, the manna fell with it.
  - type: heading
    content: The Complaint of Moses
