document_id: TIT.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Older and Younger
  - type: text
    content: 'But as for you, teach the things which are in agreement with sound doctrine [which produces men and women of good character whose lifestyle identifies them as true Christians]. '
  '10':
  - type: text
    content: 'not stealing [things, regardless of value], but proving themselves trustworthy, so that in every respect they will adorn '
  - type: text
    content: and
  - type: text
    content: ' do credit to the teaching of God our Savior.'
  '11':
  - type: text
    content: 'For the [remarkable, undeserved] grace of God that '
  - type: note
    content: Jesus is the source of salvation for all who believe and accept Him as Savior and Lord.
  - type: text
    content: 'brings salvation has appeared to all men. '
  '12':
  - type: text
    content: 'It teaches us to reject ungodliness and worldly (immoral) desires, and to live sensible, upright, and godly lives [with a purpose that reflects spiritual maturity] in this present age, '
  '13':
  - type: text
    content: 'awaiting '
  - type: text
    content: and
  - type: text
    content: ' confidently expecting the [fulfillment of our] blessed hope and the glorious appearing of our great God and Savior, Christ Jesus, '
  '14':
  - type: text
    content: 'who [willingly] gave Himself [to be crucified] on our behalf to redeem us '
  - type: text
    content: and
  - type: text
    content: ' purchase our freedom from all wickedness, and to purify for Himself a chosen '
  - type: text
    content: and
  - type: text
    content: ' very special people to be His own possession, '
  - type: text
    content: who are
  - type: text
    content: ' enthusiastic for doing what is good. [Deut 14:2; Ps 130:8; Ezek 37:23]'
  '15':
  - type: text
    content: 'Tell '
  - type: text
    content: them
  - type: text
    content: ' these things. Encourage and rebuke with full authority. Let no one disregard '
  - type: text
    content: or
  - type: text
    content: ' despise you [conduct yourself and your teaching so as to command respect].'
  '2':
  - type: text
    content: Older men are to be temperate, dignified, sensible, sound in faith, in love, in steadfastness [Christlike in character].
  '3':
  - type: text
    content: 'Older women similarly are to be reverent in their behavior, not malicious gossips nor addicted to much wine, teaching what is right '
  - type: text
    content: and
  - type: text
    content: ' good, '
  '4':
  - type: text
    content: 'so that they may encourage the young women to tenderly love their husbands and their children, '
  '5':
  - type: text
    content: to be sensible, pure, makers of a home [where God is honored], good-natured, being subject to their own husbands, so that the word of God will not be dishonored.
  '6':
  - type: text
    content: 'In a similar way urge the young men to be sensible '
  - type: text
    content: and
  - type: text
    content: ' self-controlled '
  - type: text
    content: and
  - type: text
    content: ' to behave wisely [taking life seriously]. '
  '7':
  - type: text
    content: 'And in all things show yourself to be an example of good works, with purity in doctrine [having the strictest regard for integrity and truth], dignified, '
  '8':
  - type: text
    content: 'sound '
  - type: text
    content: and
  - type: text
    content: ' beyond reproach in instruction, so that the opponent [of the faith] will be shamed, having nothing bad to say about us.'
  '9':
  - type: text
    content: 'Urge bond-servants to be subject to their own masters in everything, to be pleasing and not talk back, '
