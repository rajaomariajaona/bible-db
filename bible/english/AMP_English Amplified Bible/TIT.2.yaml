document_id: TIT.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of the Older and Younger
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But as for you, teach the things which are in agreement with sound doctrine [which produces men and women of good character whose lifestyle identifies them as true Christians]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'not stealing [things, regardless of value], but proving themselves trustworthy, so that in every respect they will adorn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do credit to the teaching of God our Savior.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the [remarkable, undeserved] grace of God that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus is the source of salvation for all who believe and accept Him as Savior and Lord.
      marker-yv: yv-n
    - type: text
      text: 'brings salvation has appeared to all men. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'It teaches us to reject ungodliness and worldly (immoral) desires, and to live sensible, upright, and godly lives [with a purpose that reflects spiritual maturity] in this present age, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'awaiting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently expecting the [fulfillment of our] blessed hope and the glorious appearing of our great God and Savior, Christ Jesus, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'who [willingly] gave Himself [to be crucified] on our behalf to redeem us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purchase our freedom from all wickedness, and to purify for Himself a chosen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' very special people to be His own possession, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are
    - type: text
      text: ' enthusiastic for doing what is good. [Deut 14:2; Ps 130:8; Ezek 37:23]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' these things. Encourage and rebuke with full authority. Let no one disregard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' despise you [conduct yourself and your teaching so as to command respect].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Older men are to be temperate, dignified, sensible, sound in faith, in love, in steadfastness [Christlike in character].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Older women similarly are to be reverent in their behavior, not malicious gossips nor addicted to much wine, teaching what is right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'so that they may encourage the young women to tenderly love their husbands and their children, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: to be sensible, pure, makers of a home [where God is honored], good-natured, being subject to their own husbands, so that the word of God will not be dishonored.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In a similar way urge the young men to be sensible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-controlled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to behave wisely [taking life seriously]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And in all things show yourself to be an example of good works, with purity in doctrine [having the strictest regard for integrity and truth], dignified, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'sound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond reproach in instruction, so that the opponent [of the faith] will be shamed, having nothing bad to say about us.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Urge bond-servants to be subject to their own masters in everything, to be pleasing and not talk back, '
