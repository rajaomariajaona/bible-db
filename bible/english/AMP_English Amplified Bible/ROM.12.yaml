document_id: ROM.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dedicated Service
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul now begins outlining for the believer the practical application of the theological truths taught in chs 1-11.
      marker-yv: yv-n
    - type: text
      text: 'Therefore I urge you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, by the mercies of God, to present your bodies [dedicating all of yourselves, set apart] as a living sacrifice, holy and well-pleasing to God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which is
    - type: text
      text: ' your rational (logical, intelligent) act of worship. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be devoted to one another with [authentic] brotherly affection [as members of one family], give preference to one another in honor; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'never lagging behind in diligence; aglow in the Spirit, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enthusiastically
    - type: text
      text: ' serving the Lord; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: constantly
    - type: text
      text: ' rejoicing in hope [because of our confidence in Christ], steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patient in distress, devoted to prayer [continually seeking wisdom, guidance, and strength], '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: contributing to the needs of God’s people, pursuing [the practice of] hospitality.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bless those who persecute you [who cause you harm or hardship]; bless and do not curse [them]. [Matt 5:44; Luke 6:28] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice with those who rejoice [sharing others’ joy], and weep with those who weep [sharing others’ grief]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Live in harmony with one another; do not be haughty [conceited, self-important, exclusive], but associate with humble people [those with a realistic self-view]. Do not overestimate yourself. [Prov 3:7] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Never repay anyone evil for evil. Take thought for what is right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proper in the sight of everyone. [Prov 20:22] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If possible, as far as it depends on you, live at peace with everyone. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beloved, never avenge yourselves, but leave the way open for God’s wrath [and His judicial righteousness]; for it is written [in Scripture], “V
    - type: usfm
      marker: sc
      children:
      - type: text
        text: engeance is
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ine
    - type: text
      text: ', I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will repay
    - type: text
      text: ',” says the Lord. [Deut 32:35] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not be conformed to this world [any longer with its superficial values and customs], but be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From the Greek word meaning “metamorphosis.” Refers to the process that leads to an outward, permanent change.
      marker-yv: yv-n
    - type: text
      text: 'transformed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' progressively changed [as you mature spiritually] by the renewing of your mind [focusing on godly values and ethical attitudes], so that you may prove [for yourselves] what the will of God is, that which is good and acceptable and perfect [in His plan and purpose for you].'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ut if your enemy is hungry
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: feed him
    - type: text
      text: '; '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: if he is thirsty
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: give him a drink
    - type: text
      text: '; '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: for by doing this you will heap
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may refer to an ancient Egyptian custom in which a penitent person carried a bowl of burning embers on his head to show his shame and guilt. By analogy, being kind to an enemy may lead him to shame and repentance.
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: burning coals on his head
    - type: text
      text: '.” [Prov 25:21, 22] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be overcome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conquered by evil, but overcome evil with good.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by the grace [of God] given to me I say to everyone of you not to think more highly of himself [and of his importance and ability] than he ought to think; but to think so as to have sound judgment, as God has apportioned to each a degree of faith [and a purpose designed for service]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For just as in one [physical] body we have many parts, and these parts do not all have the same function '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' special use, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so we, who are many, are [nevertheless just] one body in Christ, and individually [we are] parts one of another [mutually dependent on each other]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since we have gifts that differ according to the grace given to us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'each of us is to use them accordingly:'
    - type: text
      text: ' if [someone has the gift of] prophecy, [let him speak a new message from God to His people] in proportion to the faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: possessed;
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if service, in the act of serving; or he who teaches, in the act of teaching; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or he who encourages, in the act of encouragement; he who gives, with generosity; he who leads, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: without ulterior motives
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: with diligence; he who shows mercy [in caring for others], with cheerfulness.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Love is to be sincere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' active [the real thing—without guile and hypocrisy]. Hate what is evil [detest all ungodliness, do not tolerate wickedness]; hold on tightly to what is good. '
