document_id: ACT.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Conversion of Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Later known as Paul the Apostle.
    marker-yv: yv-n
  - type: text
    text: 'Saul, still breathing threats and murder against the disciples of the Lord [and relentless in his search for believers], went to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably Caiaphas, the son-in-law of Annas. See note 4:6.
    marker-yv: yv-n
  - type: text
    text: 'high priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and he asked for letters [of authority] from him to the synagogues at Damascus, so that if he found any men or women there belonging to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This term for Christianity may have originated from Jesus’ own words, “I am the Way…,” John 14:6.
    marker-yv: yv-n
  - type: text
    text: 'the Way [believers, followers of Jesus the Messiah], men and women alike, he could arrest them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring them bound [with chains] to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As he traveled he approached Damascus, and suddenly a light from heaven flashed around him [displaying the glory and majesty of Christ]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and he fell to the ground and heard a voice [from heaven] saying to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Saul, Saul, why are you persecuting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressing Me?”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And Saul said, “Who are You, Lord?” And He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: answered,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am Jesus whom you are persecuting,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: now get up and go into the city, and you will be told what you must do.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The men who were traveling with him [were terrified and] stood speechless, hearing the voice but seeing no one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saul got up from the ground, but though his eyes were open, he could see nothing; so they led him by the hand and brought him into Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And he was unable to see for three days, and he neither ate nor drank.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now in Damascus there was a disciple named Ananias; and the Lord said to him in a vision, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Ananias.”
  - type: text
    text: ' And he answered, “Here I am, Lord.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the Lord said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Get up and go to the street called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Latin '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Via Recta,
      - type: text
        text: ' a long, straight street built by the Romans that ran through the city from east to west.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Straight, and ask at the house of Judas for a man from Tarsus named Saul; for he is praying
  - type: text
    text: ' [there], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and in a vision he has seen a man named Ananias come in and place his hands on him, so that he may regain his sight.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Ananias answered, “Lord, I have heard from many people about this man, especially how much suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil he has brought on Your saints (God’s people) at Jerusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and here [in Damascus] he has authority from the high priests to put in chains all who call on Your name [confessing You as Savior].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Lord said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go, for this man is a
  - type: text
    text: ' [deliberately] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: chosen instrument of Mine, to bear My name before the Gentiles and kings and the sons of Israel;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for I will make clear to him how much he must suffer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endure for My name’s sake.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Ananias left and entered the house, and he laid his hands on Saul and said, “Brother Saul, the Lord Jesus, who appeared to you on the road as you came [to Damascus], has sent me so that you may regain your sight and be filled with the Holy Spirit [in order to proclaim Christ to both Jews and Gentiles].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Immediately something like scales fell from Saul’s eyes, and he regained his sight. Then he got up and was baptized; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and he took some food and was strengthened.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Saul Begins to Preach Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: F
  - type: text
    text: 'or several days [afterward] Saul remained with the disciples who were at Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And immediately he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' proclaiming Jesus in the synagogues, saying, “This Man is the Son of God [the promised Messiah]!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'All those who heard him continued to be amazed and said, “Is this not the man who in Jerusalem attacked those who called on this name [of Jesus], and had come here [to Damascus] for the express purpose of bringing them bound [with chains] before the chief priests?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Saul increased in strength more and more, and continued to perplex the Jews who lived in Damascus by examining [theological evidence] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proving [with Scripture] that this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus
  - type: text
    text: ' is the Christ (the Messiah, the Anointed).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After considerable time had passed [about three years or so], the Jews plotted together to kill him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but their plot became known to Saul. They were also watching the city’s gates day and night so they could kill him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'but his disciples took him at night and let him down through '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an opening in
  - type: text
    text: ' the wall, lowering him in a large basket.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When he arrived in Jerusalem, he tried to join the disciples; but they were all afraid of him, not believing that he really was a disciple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'However, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This name means '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Son of Encouragement
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Barnabas took him and brought him to the apostles, and described to them how Saul had seen the Lord on the road [to Damascus], and how He had spoken to him, and how at Damascus Saul had preached openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spoken confidently in the name of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So he was with them, moving around freely [as one among them] in Jerusalem, speaking out boldly in the name of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He was talking and arguing with the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 6:1.
    marker-yv: yv-n
  - type: text
    text: 'Hellenists (Greek-speaking Jews); but they were attempting to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When the brothers found out [about the plot], they brought him down to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 8:40.
    marker-yv: yv-n
  - type: text
    text: Caesarea [Maritima] and sent him off to Tarsus [his home town].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So the church throughout Judea and Galilee and Samaria enjoyed peace [without persecution], being built up [in wisdom, virtue, and faith]; and walking in the fear of the Lord and in the comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragement of the Holy Spirit, it continued to grow [in numbers].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peter’s Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now as Peter was traveling throughout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the land,
  - type: text
    text: ' he went down to [visit] the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. believers. All Christians are saints, set apart for God’s purpose.
    marker-yv: yv-n
  - type: text
    text: 'saints (God’s people) who lived at Lydda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'There he found a man named Aeneas, who had been bedridden for eight years and was paralyzed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Peter said to him, “Aeneas, Jesus Christ heals you. Get up and make your bed.” Immediately Aeneas got up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then all who lived at Lydda and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the plain of
  - type: text
    text: ' Sharon saw [what had happened to] him, and they turned to the Lord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Now in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A coastal suburb of Tel Aviv, known today as Jaffa.
    marker-yv: yv-n
  - type: text
    text: 'Joppa there was a disciple named Tabitha, (which translated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into Greek
  - type: text
    text: ' means Dorcas). She was rich in acts of kindness and charity which she continually did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'During that time it happened that she became sick and died; and when they had washed her body, they laid it in an upstairs room. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Since Lydda was near Joppa, the disciples, hearing that Peter was there, sent two men to him, urging him, “Come to us without delay.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So Peter got up [at once] and went with them. When he arrived, they brought him into the upstairs room; and all the widows stood beside him, weeping and showing [him] all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: inner garments
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'tunics and robes that Dorcas used to make while she was with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But Peter sent them all out [of the room] and knelt down and prayed; then turning to the body he said, “Tabitha, arise!” And she opened her eyes, and when she saw Peter, she sat up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And he gave her his hand and helped her up; and then he called in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: holy ones
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'saints (God’s people) and the widows, and he presented her [to them] alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'This became known all over Joppa, and many came to believe in the Lord [that is, to adhere to and trust in and rely on Jesus as Christ and Savior]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And so it was that Peter stayed in Joppa for many days with Simon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jews considered this occupation “unclean.”
    marker-yv: yv-n
  - type: text
    text: a tanner.
