document_id: ACT.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Conversion of Saul
  - type: text
    content: 'Now '
  - type: note
    content: Later known as Paul the Apostle.
  - type: text
    content: 'Saul, still breathing threats and murder against the disciples of the Lord [and relentless in his search for believers], went to the '
  - type: note
    content: Probably Caiaphas, the son-in-law of Annas. See note 4:6.
  - type: text
    content: 'high priest, '
  '10':
  - type: text
    content: 'Now in Damascus there was a disciple named Ananias; and the Lord said to him in a vision, '
  - type: text
    content: “Ananias.”
  - type: text
    content: ' And he answered, “Here I am, Lord.” '
  '11':
  - type: text
    content: 'And the Lord said to him, '
  - type: text
    content: '“Get up and go to the street called '
  - type: note
    content: Latin Via Recta, a long, straight street built by the Romans that ran through the city from east to west.
  - type: text
    content: Straight, and ask at the house of Judas for a man from Tarsus named Saul; for he is praying
  - type: text
    content: ' [there], '
  '12':
  - type: text
    content: and in a vision he has seen a man named Ananias come in and place his hands on him, so that he may regain his sight.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But Ananias answered, “Lord, I have heard from many people about this man, especially how much suffering '
  - type: text
    content: and
  - type: text
    content: ' evil he has brought on Your saints (God’s people) at Jerusalem; '
  '14':
  - type: text
    content: 'and here [in Damascus] he has authority from the high priests to put in chains all who call on Your name [confessing You as Savior].” '
  '15':
  - type: text
    content: 'But the Lord said to him, '
  - type: text
    content: “Go, for this man is a
  - type: text
    content: ' [deliberately] '
  - type: text
    content: chosen instrument of Mine, to bear My name before the Gentiles and kings and the sons of Israel;
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'for I will make clear to him how much he must suffer '
  - type: text
    content: and
  - type: text
    content: ' endure for My name’s sake.”'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So Ananias left and entered the house, and he laid his hands on Saul and said, “Brother Saul, the Lord Jesus, who appeared to you on the road as you came [to Damascus], has sent me so that you may regain your sight and be filled with the Holy Spirit [in order to proclaim Christ to both Jews and Gentiles].” '
  '18':
  - type: text
    content: 'Immediately something like scales fell from Saul’s eyes, and he regained his sight. Then he got up and was baptized; '
  '19':
  - type: text
    content: and he took some food and was strengthened.
  - type: heading
    content: Saul Begins to Preach Christ
  - type: text
    content: F
  - type: text
    content: 'or several days [afterward] Saul remained with the disciples who were at Damascus. '
  '2':
  - type: text
    content: 'and he asked for letters [of authority] from him to the synagogues at Damascus, so that if he found any men or women there belonging to '
  - type: note
    content: This term for Christianity may have originated from Jesus’ own words, “I am the Way…,” John 14:6.
  - type: text
    content: 'the Way [believers, followers of Jesus the Messiah], men and women alike, he could arrest them '
  - type: text
    content: and
  - type: text
    content: ' bring them bound [with chains] to Jerusalem. '
  '20':
  - type: text
    content: 'And immediately he '
  - type: text
    content: began
  - type: text
    content: ' proclaiming Jesus in the synagogues, saying, “This Man is the Son of God [the promised Messiah]!” '
  '21':
  - type: text
    content: 'All those who heard him continued to be amazed and said, “Is this not the man who in Jerusalem attacked those who called on this name [of Jesus], and had come here [to Damascus] for the express purpose of bringing them bound [with chains] before the chief priests?” '
  '22':
  - type: text
    content: 'But Saul increased in strength more and more, and continued to perplex the Jews who lived in Damascus by examining [theological evidence] '
  - type: text
    content: and
  - type: text
    content: ' proving [with Scripture] that this '
  - type: text
    content: Jesus
  - type: text
    content: ' is the Christ (the Messiah, the Anointed).'
  '23':
  - type: text
    content: 'After considerable time had passed [about three years or so], the Jews plotted together to kill him, '
  '24':
  - type: text
    content: 'but their plot became known to Saul. They were also watching the city’s gates day and night so they could kill him; '
  '25':
  - type: text
    content: 'but his disciples took him at night and let him down through '
  - type: text
    content: an opening in
  - type: text
    content: ' the wall, lowering him in a large basket.'
  '26':
  - type: text
    content: 'When he arrived in Jerusalem, he tried to join the disciples; but they were all afraid of him, not believing that he really was a disciple. '
  '27':
  - type: text
    content: 'However, '
  - type: note
    content: This name means Son of Encouragement.
  - type: text
    content: 'Barnabas took him and brought him to the apostles, and described to them how Saul had seen the Lord on the road [to Damascus], and how He had spoken to him, and how at Damascus Saul had preached openly '
  - type: text
    content: and
  - type: text
    content: ' spoken confidently in the name of Jesus. '
  '28':
  - type: text
    content: 'So he was with them, moving around freely [as one among them] in Jerusalem, speaking out boldly in the name of the Lord. '
  '29':
  - type: text
    content: 'He was talking and arguing with the '
  - type: note
    content: See note 6:1.
  - type: text
    content: 'Hellenists (Greek-speaking Jews); but they were attempting to kill him. '
  '3':
  - type: text
    content: 'As he traveled he approached Damascus, and suddenly a light from heaven flashed around him [displaying the glory and majesty of Christ]; '
  '30':
  - type: text
    content: 'When the brothers found out [about the plot], they brought him down to '
  - type: note
    content: See note 8:40.
  - type: text
    content: Caesarea [Maritima] and sent him off to Tarsus [his home town].
  '31':
  - type: text
    content: 'So the church throughout Judea and Galilee and Samaria enjoyed peace [without persecution], being built up [in wisdom, virtue, and faith]; and walking in the fear of the Lord and in the comfort '
  - type: text
    content: and
  - type: text
    content: ' encouragement of the Holy Spirit, it continued to grow [in numbers].'
  - type: heading
    content: Peter’s Ministry
  '32':
  - type: text
    content: 'Now as Peter was traveling throughout '
  - type: text
    content: the land,
  - type: text
    content: ' he went down to [visit] the '
  - type: note
    content: I.e. believers. All Christians are saints, set apart for God’s purpose.
  - type: text
    content: 'saints (God’s people) who lived at Lydda. '
  '33':
  - type: text
    content: 'There he found a man named Aeneas, who had been bedridden for eight years and was paralyzed. '
  '34':
  - type: text
    content: 'Peter said to him, “Aeneas, Jesus Christ heals you. Get up and make your bed.” Immediately Aeneas got up. '
  '35':
  - type: text
    content: 'Then all who lived at Lydda and '
  - type: text
    content: the plain of
  - type: text
    content: ' Sharon saw [what had happened to] him, and they turned to the Lord.'
  '36':
  - type: text
    content: 'Now in '
  - type: note
    content: A coastal suburb of Tel Aviv, known today as Jaffa.
  - type: text
    content: 'Joppa there was a disciple named Tabitha, (which translated '
  - type: text
    content: into Greek
  - type: text
    content: ' means Dorcas). She was rich in acts of kindness and charity which she continually did. '
  '37':
  - type: text
    content: 'During that time it happened that she became sick and died; and when they had washed her body, they laid it in an upstairs room. '
  '38':
  - type: text
    content: 'Since Lydda was near Joppa, the disciples, hearing that Peter was there, sent two men to him, urging him, “Come to us without delay.” '
  '39':
  - type: text
    content: 'So Peter got up [at once] and went with them. When he arrived, they brought him into the upstairs room; and all the widows stood beside him, weeping and showing [him] all the '
  - type: note
    content: Or inner garments.
  - type: text
    content: 'tunics and robes that Dorcas used to make while she was with them. '
  '4':
  - type: text
    content: 'and he fell to the ground and heard a voice [from heaven] saying to him, '
  - type: text
    content: '“Saul, Saul, why are you persecuting '
  - type: text
    content: and
  - type: text
    content: ' oppressing Me?”'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'But Peter sent them all out [of the room] and knelt down and prayed; then turning to the body he said, “Tabitha, arise!” And she opened her eyes, and when she saw Peter, she sat up. '
  '41':
  - type: text
    content: 'And he gave her his hand and helped her up; and then he called in the '
  - type: note
    content: Or holy ones.
  - type: text
    content: 'saints (God’s people) and the widows, and he presented her [to them] alive. '
  '42':
  - type: text
    content: 'This became known all over Joppa, and many came to believe in the Lord [that is, to adhere to and trust in and rely on Jesus as Christ and Savior]. '
  '43':
  - type: text
    content: 'And so it was that Peter stayed in Joppa for many days with Simon, '
  - type: note
    content: The Jews considered this occupation “unclean.”
  - type: text
    content: a tanner.
  '5':
  - type: text
    content: 'And Saul said, “Who are You, Lord?” And He '
  - type: text
    content: answered,
  - type: text
    content: ' '
  - type: text
    content: “I am Jesus whom you are persecuting,
  - type: text
    content: ' '
  '6':
  - type: text
    content: now get up and go into the city, and you will be told what you must do.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'The men who were traveling with him [were terrified and] stood speechless, hearing the voice but seeing no one. '
  '8':
  - type: text
    content: 'Saul got up from the ground, but though his eyes were open, he could see nothing; so they led him by the hand and brought him into Damascus. '
  '9':
  - type: text
    content: And he was unable to see for three days, and he neither ate nor drank.
