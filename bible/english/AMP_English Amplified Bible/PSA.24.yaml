    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require Him as their greatest need,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who seek Your face, even [as did] Jacob. [Ps 42:1] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Lift up your heads, O gates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And be lifted up, ancient doors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the King of glory may come in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who is the King of glory?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' strong and mighty,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' mighty in battle.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lift up your heads, O gates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lift them up, ancient doors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the King of glory may come in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who is [He then] this King of glory?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He is the King of glory [who rules over all creation with His heavenly armies]. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
