    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis taught that since the earth and everything it contains belongs to the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ', it is sacrilege to enjoy anything of the world without first saying a benediction for it.'
    marker-yv: yv-n
  - type: text
