  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For He has founded it upon the seas
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And established it upon the streams '
  - type: usfm
    marker: it
    children:
    - type: text
