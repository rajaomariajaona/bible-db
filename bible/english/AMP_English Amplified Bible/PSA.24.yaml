    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Mount Zion.
    marker-yv: yv-n
  - type: text
    text: mountain of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who may stand in His holy place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He who has clean hands and a pure heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has not lifted up his soul to what is false,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor has sworn [oaths] deceitfully. [Matt 5:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He shall receive a blessing from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And righteousness from the God of his salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is the generation (description) of those who diligently seek Him '
