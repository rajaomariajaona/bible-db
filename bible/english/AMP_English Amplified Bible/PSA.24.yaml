  '1':
  - type: heading
    content: Psalm 24
  - type: heading
    content: The King of Glory Entering Zion.
  - type: note
    content: In the Talmud it is said that the Levites sang a particular psalm for every day of the week, and this was the psalm for the first day.
  - type: text
    content: A Psalm of David.
  - type: text
    content: 'The earth '
  - type: note
    content: The ancient rabbis taught that since the earth and everything it contains belongs to the Lord, it is sacrilege to enjoy anything of the world without first saying a benediction for it.
  - type: text
    content: is the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ', and the fullness of it,'
  - type: text
    content: The world, and those who dwell in it. [1 Cor 10:26]
  '10':
  - type: text
    content: Who is [He then] this King of glory?
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: 'He is the King of glory [who rules over all creation with His heavenly armies]. '
  - type: text
    content: Selah.
  '2':
  - type: text
    content: For He has founded it upon the seas
  - type: text
    content: 'And established it upon the streams '
  - type: text
    content: and
  - type: text
    content: ' the rivers.'
  '3':
  - type: text
    content: 'Who may ascend onto the '
  - type: note
    content: I.e. Mount Zion.
  - type: text
    content: mountain of the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: And who may stand in His holy place?
  '4':
  - type: text
    content: He who has clean hands and a pure heart,
  - type: text
    content: Who has not lifted up his soul to what is false,
  - type: text
    content: Nor has sworn [oaths] deceitfully. [Matt 5:8]
  '5':
  - type: text
    content: He shall receive a blessing from the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And righteousness from the God of his salvation.
  '6':
  - type: text
    content: 'This is the generation (description) of those who diligently seek Him '
  - type: text
    content: and
  - type: text
    content: ' require Him as their greatest need,'
  - type: text
    content: 'Who seek Your face, even [as did] Jacob. [Ps 42:1] '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: ¶Lift up your heads, O gates,
  - type: text
    content: And be lifted up, ancient doors,
  - type: text
    content: That the King of glory may come in.
  '8':
  - type: text
    content: Who is the King of glory?
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' strong and mighty,'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' mighty in battle.'
  '9':
  - type: text
    content: Lift up your heads, O gates,
  - type: text
    content: And lift them up, ancient doors,
  - type: text
    content: That the King of glory may come in.
