    content: The Plague of Locusts
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Go to Pharaoh, for I have hardened his heart and the heart of his servants [making them determined and unresponsive], so that I may exhibit My signs [of divine power] '
  - type: note
    content: Lit in his midst.
  - type: text
    content: 'among them, '
  '10':
  - type: text
    content: Pharaoh said to them, “The L
  - type: heading
    content: ord
  - type: text
    content: ' be with you [to help you], if I ever let you go with your children [because you will never return]! Look [be forewarned], '
  - type: note
    content: Lit for evil is in front of your faces.
  - type: text
    content: 'you have an '
  - type: note
    content: Pharaoh was suspicious that Moses intended to lead Israel away from Egypt for good. He knew that as long as their children remained in Egypt, the Israelites would not attempt an escape to freedom.
  - type: text
    content: 'evil plan in mind. '
  '11':
  - type: text
    content: No! Go now, you who are men, [without your families] and serve the L
  - type: heading
    content: ord
  - type: text
    content: ', if that is what you want.” So Moses and Aaron were driven from Pharaoh’s presence.'
  '12':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Stretch out your hand over the land of Egypt for the locusts, so that they may come up on the land of Egypt and eat all the plants of the land, all that the hail has left.” '
  '13':
  - type: text
    content: So Moses stretched out his staff over the land of Egypt, and the L
  - type: heading
    content: ord
  - type: text
    content: ' brought an east wind on the land all that day and all that night; when it was morning, the east wind had brought the [swarms of] locusts. '
  '14':
  - type: text
    content: 'The locusts came up over all the land of Egypt and settled down in the whole territory, a very dreadful mass of them; never before were there such locusts as these, nor will there ever be again. '
  '15':
  - type: text
    content: 'For they covered the [visible] surface of the land, so that the ground was darkened; and they ate every plant of the land and all the fruit of the trees which the hail had left. There remained not a green thing on the trees or the plants of the field throughout all the land of Egypt. '
  '16':
  - type: text
    content: Then Pharaoh hurried to call for Moses and Aaron, and he said, “I have sinned against the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and against you. '
  '17':
  - type: text
    content: 'Now therefore, please forgive my sin only this once [more], and pray '
  - type: text
    content: and
  - type: text
    content: ' entreat the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, so that He will remove this [plague of] death from me.” '
  '18':
  - type: text
    content: Moses left Pharaoh and entreated the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '19':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' shifted '
  - type: text
    content: the wind
  - type: text
    content: ' to a violent west wind which lifted up the locusts and drove them into the '
  - type: note
    content: Lit Sea of Reeds (Hebrew) yam suph. The traditional name “Red Sea” comes from the Greek, which is based on the designation of the fifth-century b.c. Greek historian Herodotus. The famous historian, who was called the father of history, considered the sea part of the Indian Ocean, which he called the Red Sea. Later the term came to refer to the sea itself. The name “Red Sea” is used throughout the O.T. instead of “Sea of Reeds.”
  - type: text
    content: 'Red Sea; not one locust remained within the border of Egypt. '
  '2':
  - type: text
    content: 'and that you may recount '
  - type: text
    content: and
  - type: text
    content: ' explain in the hearing of your son, and your grandson, what I have done [repeatedly] to make a mockery of the Egyptians—My signs [of divine power] which I have done among them—so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' recognize [clearly] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '20':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' hardened Pharaoh’s heart [so that it was even more resolved and obstinate], and he did not let the Israelites go.'
  - type: heading
    content: Darkness over the Land
  '21':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Stretch out your hand toward the sky, so that '
  - type: note
    content: One of the primary gods of the Egyptians was Ra the sun-god. The darkness revealed his uselessness and prevented the daily rituals of pagan worship.
  - type: text
    content: 'darkness may come over the land of Egypt, a darkness which [is so awful that it] may be felt.” '
  '22':
  - type: text
    content: 'So Moses stretched out his hand toward the sky, and for three days a thick darkness was all over the land of Egypt [no sun, no moon, no stars]. '
  '23':
  - type: text
    content: 'The Egyptians could not see one another, nor did anyone leave his place for three days, but all the Israelites had [supernatural] light in their dwellings. '
  '24':
  - type: text
    content: Then Pharaoh called to Moses, and said, “Go, serve the L
  - type: heading
    content: ord
  - type: text
    content: '; only your flocks and your herds must be left behind. Even your children may go with you.” '
  '25':
  - type: text
    content: But Moses said, “You must also let us have sacrifices and burnt offerings, so that we may sacrifice them to the L
  - type: heading
    content: ord
  - type: text
    content: ' our God. '
  '26':
  - type: text
    content: Therefore, our livestock must also go with us; not one hoof shall be left behind, for we must take some of them to serve the L
  - type: heading
    content: ord
  - type: text
    content: ' our God. Even we do not know with what we will serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' until we arrive there.” '
  '27':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' hardened Pharaoh’s heart, and he was not willing to let them go. '
  '28':
  - type: text
    content: 'Then Pharaoh said to Moses, “Get away from me! See that you never enter my presence again, for on the day that you see my face again you will die!” '
  '29':
  - type: text
    content: Then Moses said, “You are correct; I will never see your face again!”
  '3':
  - type: text
    content: So Moses and Aaron went to Pharaoh and said to him, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of the Hebrews: ‘How long will you refuse to humble yourself before Me? Let My people go, so that they may serve Me. '
  '4':
  - type: text
    content: 'For if you refuse to let My people go, then hear this: tomorrow I will bring [migratory] locusts into your country. '
  '5':
  - type: text
    content: 'They shall cover the [visible] surface of the land, so that no one will be able to see the ground, and they will eat the rest of what has remained—that is, the '
  - type: text
    content: vegetation
  - type: text
    content: ' left after the hail—and they will eat every one of your trees that grows in the field; '
  '6':
  - type: text
    content: 'your houses and those of all your servants and of all the Egyptians shall be filled '
  - type: text
    content: with locusts
  - type: text
    content: ', as neither your fathers nor your grandfathers have seen, from their birth until this day.’ ” Then Moses turned and left Pharaoh. '
  '7':
  - type: text
    content: Pharaoh’s servants said to him, “How long shall this man be a trap to us? Let the men go, so that they may serve the L
  - type: heading
    content: ord
  - type: text
    content: ' their God. Do you not realize that Egypt is destroyed?” '
  '8':
  - type: text
    content: So Moses and Aaron were brought back to Pharaoh, and he said to them, “Go, serve the L
  - type: heading
    content: ord
  - type: text
    content: ' your God! Who specifically are the ones that are going?” '
  '9':
  - type: text
    content: Moses said, “We will go with our young and our old, with our sons and our daughters, with our flocks and our herds [all of us and all that we have], for we must hold a feast to the L
  - type: heading
    content: ord
  - type: text
    content: '.” '
