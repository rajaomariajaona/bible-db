document_id: EXO.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Plague of Locusts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Go to Pharaoh, for I have hardened his heart and the heart of his servants [making them determined and unresponsive], so that I may exhibit My signs [of divine power] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in his midst
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'among them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Pharaoh said to them, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be with you [to help you], if I ever let you go with your children [because you will never return]! Look [be forewarned], '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: for evil is in front of your faces
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'you have an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pharaoh was suspicious that Moses intended to lead Israel away from Egypt for good. He knew that as long as their children remained in Egypt, the Israelites would not attempt an escape to freedom.
      marker-yv: yv-n
    - type: text
      text: 'evil plan in mind. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: No! Go now, you who are men, [without your families] and serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', if that is what you want.” So Moses and Aaron were driven from Pharaoh’s presence.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Stretch out your hand over the land of Egypt for the locusts, so that they may come up on the land of Egypt and eat all the plants of the land, all that the hail has left.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So Moses stretched out his staff over the land of Egypt, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brought an east wind on the land all that day and all that night; when it was morning, the east wind had brought the [swarms of] locusts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The locusts came up over all the land of Egypt and settled down in the whole territory, a very dreadful mass of them; never before were there such locusts as these, nor will there ever be again. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For they covered the [visible] surface of the land, so that the ground was darkened; and they ate every plant of the land and all the fruit of the trees which the hail had left. There remained not a green thing on the trees or the plants of the field throughout all the land of Egypt. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then Pharaoh hurried to call for Moses and Aaron, and he said, “I have sinned against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God and against you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now therefore, please forgive my sin only this once [more], and pray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entreat the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, so that He will remove this [plague of] death from me.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Moses left Pharaoh and entreated the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shifted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the wind
    - type: text
      text: ' to a violent west wind which lifted up the locusts and drove them into the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Sea of Reeds
        - type: text
          text: ' (Hebrew) '
        - type: usfm
          marker: it
          children:
          - type: text
            text: yam suph
        - type: text
          text: '. The traditional name “Red Sea” comes from the Greek, which is based on the designation of the fifth-century '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Greek historian Herodotus. The famous historian, who was called the father of history, considered the sea part of the Indian Ocean, which he called the Red Sea. Later the term came to refer to the sea itself. The name “Red Sea” is used throughout the O.T. instead of “Sea of Reeds.”
      marker-yv: yv-n
    - type: text
      text: 'Red Sea; not one locust remained within the border of Egypt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and that you may recount '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain in the hearing of your son, and your grandson, what I have done [repeatedly] to make a mockery of the Egyptians—My signs [of divine power] which I have done among them—so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize [clearly] that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hardened Pharaoh’s heart [so that it was even more resolved and obstinate], and he did not let the Israelites go.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Darkness over the Land
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Stretch out your hand toward the sky, so that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the primary gods of the Egyptians was Ra the sun-god. The darkness revealed his uselessness and prevented the daily rituals of pagan worship.
      marker-yv: yv-n
    - type: text
      text: 'darkness may come over the land of Egypt, a darkness which [is so awful that it] may be felt.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Moses stretched out his hand toward the sky, and for three days a thick darkness was all over the land of Egypt [no sun, no moon, no stars]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The Egyptians could not see one another, nor did anyone leave his place for three days, but all the Israelites had [supernatural] light in their dwellings. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Then Pharaoh called to Moses, and said, “Go, serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; only your flocks and your herds must be left behind. Even your children may go with you.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But Moses said, “You must also let us have sacrifices and burnt offerings, so that we may sacrifice them to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Therefore, our livestock must also go with us; not one hoof shall be left behind, for we must take some of them to serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God. Even we do not know with what we will serve the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' until we arrive there.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hardened Pharaoh’s heart, and he was not willing to let them go. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then Pharaoh said to Moses, “Get away from me! See that you never enter my presence again, for on the day that you see my face again you will die!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Then Moses said, “You are correct; I will never see your face again!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So Moses and Aaron went to Pharaoh and said to him, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of the Hebrews: ‘How long will you refuse to humble yourself before Me? Let My people go, so that they may serve Me. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For if you refuse to let My people go, then hear this: tomorrow I will bring [migratory] locusts into your country. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They shall cover the [visible] surface of the land, so that no one will be able to see the ground, and they will eat the rest of what has remained—that is, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vegetation
    - type: text
      text: ' left after the hail—and they will eat every one of your trees that grows in the field; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'your houses and those of all your servants and of all the Egyptians shall be filled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with locusts
    - type: text
      text: ', as neither your fathers nor your grandfathers have seen, from their birth until this day.’ ” Then Moses turned and left Pharaoh. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Pharaoh’s servants said to him, “How long shall this man be a trap to us? Let the men go, so that they may serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God. Do you not realize that Egypt is destroyed?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So Moses and Aaron were brought back to Pharaoh, and he said to them, “Go, serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God! Who specifically are the ones that are going?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Moses said, “We will go with our young and our old, with our sons and our daughters, with our flocks and our herds [all of us and all that we have], for we must hold a feast to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
