document_id: LEV.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Consecration of Aaron and His Sons
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'Then Moses took the anointing oil and anointed the tabernacle and all that was in it, and consecrated them. '
  '11':
  - type: text
    content: 'He sprinkled some of the oil on the altar seven times and anointed the altar and all its utensils, and the basin and its stand, to consecrate them. '
  '12':
  - type: text
    content: 'Then he poured some of the anointing oil on Aaron’s head and anointed him, to consecrate him. '
  '13':
  - type: text
    content: Next Moses brought Aaron’s sons forward, put undertunics on them, belted them with sashes, and bound caps on them, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '14':
  - type: text
    content: 'Then he brought the bull for the sin offering, and Aaron and his sons laid their hands on the head of the bull. '
  '15':
  - type: text
    content: 'Next Moses killed it and took the blood and with his finger put '
  - type: text
    content: some of it
  - type: text
    content: ' around on the horns of the altar and purified it [from sin]. Then he poured out the '
  - type: text
    content: rest of the
  - type: text
    content: ' blood at the base of the altar and consecrated it, to make atonement for it. '
  '16':
  - type: text
    content: 'He took all the fat that was on the entrails, and the lobe of the liver, and the two kidneys with their fat, and Moses offered them up in smoke on the altar. '
  '17':
  - type: text
    content: But the bull (the sin offering) and its hide, its meat, and its refuse he burned in the fire outside the camp, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '18':
  - type: text
    content: 'He brought the ram for the burnt offering, and Aaron and his sons laid their hands on the head of the ram. '
  '19':
  - type: text
    content: 'Moses killed it and sprinkled the blood around on the altar. '
  '2':
  - type: text
    content: '“Take Aaron and his sons with him, and the garments [which are symbols of their office], and the anointing oil, and the bull for the sin offering, and the two rams, and the basket of unleavened bread; '
  '20':
  - type: text
    content: 'When he had cut the ram into pieces, Moses offered up the head, the pieces, and the fat in smoke. '
  '21':
  - type: text
    content: 'After he had washed the entrails and the legs in water, Moses offered up the whole ram in smoke on the altar. It was a burnt offering for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma, an offering by fire to the L'
  - type: heading
    content: ord
  - type: text
    content: ', just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: 'Then he brought the second ram, the ram of consecration (ordination), and Aaron and his sons laid their hands on the head of the ram. '
  '23':
  - type: text
    content: 'Moses killed it and took some of its blood and put it on the lobe of Aaron’s right ear, and on the thumb of his right hand, and on the big toe of his right foot. '
  '24':
  - type: text
    content: 'He also brought Aaron’s sons forward and put some of the blood on the lobes of their right ears, and the thumbs of their right hands, and the big toes of their right feet; and Moses sprinkled the '
  - type: text
    content: rest of the
  - type: text
    content: ' blood around on the altar. '
  '25':
  - type: text
    content: 'He took the fat, the fat tail, all the fat that was on the entrails, the lobe of the liver, and the two kidneys and their fat, and the right thigh; '
  '26':
  - type: text
    content: and from the basket of unleavened bread that was before the L
  - type: heading
    content: ord
  - type: text
    content: ', he took one unleavened cake, a cake of oiled bread, and one wafer and put them on the fat and on the right thigh; '
  '27':
  - type: text
    content: 'and he put all '
  - type: text
    content: these things
  - type: text
    content: ' in Aaron’s hands and his sons’ hands and presented them as a wave offering before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Then Moses took these things from their hands and offered them up in smoke on the altar with the burnt offering. They were a consecration (ordination) offering for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma, an offering by fire to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '29':
  - type: text
    content: Moses also took the breast and presented it as a wave offering before the L
  - type: heading
    content: ord
  - type: text
    content: ; it was Moses’ portion of the ram of consecration (ordination), just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: 'and assemble the entire congregation at the doorway of the Tent of Meeting.” '
  '30':
  - type: text
    content: So Moses took some of the anointing oil and some of the blood which was on the altar and sprinkled it on Aaron and his garments, and also on his sons and their garments with him; so Moses consecrated Aaron and his garments, and his sons and his sons’ garments with him.
  '31':
  - type: text
    content: 'Then Moses said to Aaron and to his sons, “Boil the meat at the doorway of the Tent of Meeting and eat it there together with the bread that is in the basket of the consecration (ordination) offering, just as I commanded, saying, ‘Aaron and his sons shall eat it.’ '
  '32':
  - type: text
    content: 'And what remains of the meat and of the bread you shall burn in the fire. '
  '33':
  - type: text
    content: 'You shall not go outside the doorway of the Tent of Meeting for seven days, until the days of your consecration (ordination) are ended; for it will take seven days to consecrate you. '
  '34':
  - type: text
    content: As has been done this day, so the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded to do for your atonement. '
  '35':
  - type: text
    content: 'You shall remain day and night for seven days at the doorway of the Tent of Meeting, doing what the Lord has required you to do, so that you will not die; for so I (Moses) have been commanded.” '
  '36':
  - type: text
    content: So Aaron and his sons did all the things which the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded through Moses.'
  '4':
  - type: text
    content: Moses did as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him, and the congregation was assembled at the doorway of the Tent of Meeting. '
  '5':
  - type: text
    content: Moses said to the congregation, “This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded us to do.”'
  '6':
  - type: text
    content: 'Then Moses brought Aaron and his sons and washed them with water. '
  '7':
  - type: text
    content: 'He put the undertunic on Aaron, tied the sash around him, clothed him in the robe, and put the '
  - type: note
    content: See Ex 28:6-8.
  - type: text
    content: 'ephod (an upper vestment) on him. He tied the [skillfully woven] band of the ephod around him, with which he secured it to Aaron. '
  '8':
  - type: text
    content: 'Moses then put the breastpiece on Aaron, and he put in the breastpiece the Urim and the Thummim [the sacred articles the high priest used when seeking God’s will concerning the nation]. '
  '9':
  - type: text
    content: He also put the turban on Aaron’s head, and on it, in the front, Moses placed the golden plate, the holy crown, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him.'
