document_id: LEV.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Consecration of Aaron and His Sons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses took the anointing oil and anointed the tabernacle and all that was in it, and consecrated them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He sprinkled some of the oil on the altar seven times and anointed the altar and all its utensils, and the basin and its stand, to consecrate them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he poured some of the anointing oil on Aaron’s head and anointed him, to consecrate him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next Moses brought Aaron’s sons forward, put undertunics on them, belted them with sashes, and bound caps on them, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought the bull for the sin offering, and Aaron and his sons laid their hands on the head of the bull. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next Moses killed it and took the blood and with his finger put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some of it
    - type: text
      text: ' around on the horns of the altar and purified it [from sin]. Then he poured out the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rest of the
    - type: text
      text: ' blood at the base of the altar and consecrated it, to make atonement for it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took all the fat that was on the entrails, and the lobe of the liver, and the two kidneys with their fat, and Moses offered them up in smoke on the altar. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the bull (the sin offering) and its hide, its meat, and its refuse he burned in the fire outside the camp, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought the ram for the burnt offering, and Aaron and his sons laid their hands on the head of the ram. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses killed it and sprinkled the blood around on the altar. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take Aaron and his sons with him, and the garments [which are symbols of their office], and the anointing oil, and the bull for the sin offering, and the two rams, and the basket of unleavened bread; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had cut the ram into pieces, Moses offered up the head, the pieces, and the fat in smoke. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he had washed the entrails and the legs in water, Moses offered up the whole ram in smoke on the altar. It was a burnt offering for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma, an offering by fire to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought the second ram, the ram of consecration (ordination), and Aaron and his sons laid their hands on the head of the ram. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses killed it and took some of its blood and put it on the lobe of Aaron’s right ear, and on the thumb of his right hand, and on the big toe of his right foot. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also brought Aaron’s sons forward and put some of the blood on the lobes of their right ears, and the thumbs of their right hands, and the big toes of their right feet; and Moses sprinkled the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rest of the
    - type: text
      text: ' blood around on the altar. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took the fat, the fat tail, all the fat that was on the entrails, the lobe of the liver, and the two kidneys and their fat, and the right thigh; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and from the basket of unleavened bread that was before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', he took one unleavened cake, a cake of oiled bread, and one wafer and put them on the fat and on the right thigh; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he put all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these things
    - type: text
      text: ' in Aaron’s hands and his sons’ hands and presented them as a wave offering before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses took these things from their hands and offered them up in smoke on the altar with the burnt offering. They were a consecration (ordination) offering for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma, an offering by fire to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses also took the breast and presented it as a wave offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; it was Moses’ portion of the ram of consecration (ordination), just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and assemble the entire congregation at the doorway of the Tent of Meeting.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses took some of the anointing oil and some of the blood which was on the altar and sprinkled it on Aaron and his garments, and also on his sons and their garments with him; so Moses consecrated Aaron and his garments, and his sons and his sons’ garments with him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron and to his sons, “Boil the meat at the doorway of the Tent of Meeting and eat it there together with the bread that is in the basket of the consecration (ordination) offering, just as I commanded, saying, ‘Aaron and his sons shall eat it.’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And what remains of the meat and of the bread you shall burn in the fire. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not go outside the doorway of the Tent of Meeting for seven days, until the days of your consecration (ordination) are ended; for it will take seven days to consecrate you. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As has been done this day, so the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded to do for your atonement. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall remain day and night for seven days at the doorway of the Tent of Meeting, doing what the Lord has required you to do, so that you will not die; for so I (Moses) have been commanded.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Aaron and his sons did all the things which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded through Moses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses did as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded him, and the congregation was assembled at the doorway of the Tent of Meeting. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said to the congregation, “This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded us to do.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses brought Aaron and his sons and washed them with water. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He put the undertunic on Aaron, tied the sash around him, clothed him in the robe, and put the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Ex 28:6-8.
      marker-yv: yv-n
    - type: text
      text: 'ephod (an upper vestment) on him. He tied the [skillfully woven] band of the ephod around him, with which he secured it to Aaron. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses then put the breastpiece on Aaron, and he put in the breastpiece the Urim and the Thummim [the sacred articles the high priest used when seeking God’s will concerning the nation]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also put the turban on Aaron’s head, and on it, in the front, Moses placed the golden plate, the holy crown, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded him.'
