document_id: JER.52
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Zedekiah was twenty-one years old when he became king, and he reigned eleven years in Jerusalem; and his mother’s name was Hamutal the daughter of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A different man from the prophet and author of this book.
    marker-yv: yv-n
  - type: text
    text: 'Jeremiah of Libnah. [2 Kin 24:18-25:21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did that which was evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' like all that Jehoiakim had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For all this came about in Jerusalem and Judah because of the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and [in the end] He cast them from His presence. And Zedekiah rebelled against the king of Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now it came about in the ninth year of his reign, in the tenth month, on the tenth day, Nebuchadnezzar king of Babylon came, he and all his army, against Jerusalem; and they camped against it and built moveable towers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' siege mounds all around it. [Jer 39:1-10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the city was besieged until the eleventh year of King Zedekiah. [2 Chr 36:11-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In the fourth month, on the ninth day of the month, the famine was so severe in the city that there was no food for the people of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the city was broken into, and all the soldiers fled. They left the city at night [as Ezekiel prophesied] passing through the gate between the two walls by the king’s garden, though the Chaldeans were all around the city. They fled by way of the Arabah (the Jordan Valley). [Ezek 12:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the army of the Chaldeans pursued the king and overtook Zedekiah in the plains of Jericho; and his entire army was scattered from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then they seized the king and brought him to the king of Babylon at Riblah in the [Syrian] land of Hamath [on the northern border of Israel], where he pronounced sentence on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The king of Babylon killed the sons of Zedekiah before his eyes; he also killed all the princes of Judah at Riblah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the king of Babylon blinded Zedekiah, bound him with bronze shackles and took him to Babylon and there he put him in prison '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52:11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Septuagint
      - type: text
        text: ' (Greek translation of the Old Testament) translates this word “mill.” This may imply that the Chaldeans treated Zedekiah in his old age to the same fate Samson suffered when he was a Philistine captive (Judg 16:21).'
    marker-yv: yv-n
  - type: text
    text: '[in a mill] until the day of his death. [Ezek 12:13]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now in the fifth month, on the tenth day, which was the nineteenth year of Nebuchadnezzar king of Babylon, Nebuzaradan captain of the guard, who served the king of Babylon, came to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He burned down the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the king’s palace and all the houses of Jerusalem; every great house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' important structure he set on fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So all the army of the Chaldeans who were with the captain of the guard broke down all the walls around Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Nebuzaradan the captain of the guard took away into exile some of the poorest of the people, those who were left in the city [at the time it was captured], along with those who deserted to join the king of Babylon [during the siege] and the rest of the artisans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Nebuzaradan the captain of the guard left some of the poorest of the land to be vinedressers and farmers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now the Chaldeans broke into pieces the pillars of bronze which belonged to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the bronze pedestals [which supported the ten basins] and the [enormous] bronze Sea, which were in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and carried all the bronze to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They also took away the pots [for carrying away ashes] and the shovels and the snuffers and the bowls and the spoons and all the bronze articles used in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: temple
  - type: text
    text: ' service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The captain of the guard also took away the [small] bowls and the firepans and the basins and the pots and the lampstands and the incense cups and the bowls for the drink offerings—whatever was made of fine gold and whatever was made of fine silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The two pillars, the one [enormous] Sea (basin), and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King Ahaz had previously removed the twelve bronze bulls (1 Kin 7:25) from under the big basin and had replaced them with a substructure of stone (2 Kin 16:17), but unfortunately he had not put them beyond the reach of the Chaldeans.
    marker-yv: yv-n
  - type: text
    text: the twelve bronze bulls under the Sea, and the stands, which King Solomon had made for the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '—the bronze of all these things was beyond weighing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Concerning the pillars, the height of each pillar was eighteen cubits (twenty-seven feet), and a line [an ornamental molding] of twelve cubits (eighteen feet) went around its circumference; it was four fingers thick, and [the pillar was] hollow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A capital of bronze was on [top of] it. The height of each capital was five cubits (seven and one-half feet), with a lattice-work and pomegranates around it, all of bronze. The second pillar also, with its pomegranates, was similar to these. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: There were ninety-six pomegranates on the sides; and a hundred pomegranates were on the lattice-work all around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the captain of the guard took [as prisoners] Seraiah the chief priest and Zephaniah the second priest and the three doorkeepers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He also took out of the city one official who was overseer of the soldiers, and seven of the king’s advisers who were found in the city, and the scribe of the commander of the army who mustered the people of the land, and sixty men who were still in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nebuzaradan the captain of the guard took them and brought them to the king of Babylon at Riblah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the king of Babylon struck them down and put them to death at Riblah in the land of Hamath. So Judah was led away into exile from its own land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This is the number of people whom Nebuchadnezzar took captive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exiled: in the seventh year, 3,023 Jews; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'in the eighteenth year of Nebuchadnezzar, [he took captive] 832 persons from Jerusalem; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: in the twenty-third year of Nebuchadnezzar, Nebuzaradan the captain of the [Babylonian] guard took captive 745 Jewish people; there were 4,600 persons in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now it came about in the thirty-seventh year of the exile of Jehoiachin [also called Coniah and Jeconiah] king of Judah, in the twelfth month, on the twenty-fifth of the month, Evil-merodach king of Babylon, in the first year of his reign, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lifted up the head of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'showed favor to Jehoiachin king of Judah and brought him out of prison. [2 Kin 25:27-30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He spoke kindly to him and gave him a throne above the thrones of the kings who were [captives] with him in Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jehoiachin changed his prison clothes, and he dined regularly at the king’s table all the days of his life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And his allowance, a regular allowance was given to him by the king of Babylon, a daily portion [according to his needs] until the day of his death, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The purpose of these last few words may be to avoid ending the book with the word “death.” The general purpose of the last four verses seems to have been to leave the reader with the comforting thought that even in exile the Lord remembered His people and softened the heart of the conqueror toward David’s descendant. Note also the contrast between Zedekiah, who remained in prison until his death (v 11), and Jehoiachin, who was set free and treated with honor until his death.
    marker-yv: yv-n
  - type: text
    text: all the days of his life.
