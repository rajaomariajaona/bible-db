  '7':
  - type: text
    content: 'In the days of His earthly life, Jesus offered up both [specific] petitions and [urgent] supplications [for that which He needed] with fervent crying and tears to the One who was [always] able to save Him from death, and He was heard because of His reverent submission toward God [His sinlessness and His unfailing determination to do the Father’s will]. '
  '8':
  - type: text
    content: 'Although He was a Son [who had never been disobedient to the Father], He learned [active, special] obedience through what He suffered. '
  '9':
  - type: text
    content: 'And having been made perfect [uniquely equipped and prepared as Savior and retaining His integrity amid opposition], He became the source of eternal salvation [an eternal inheritance] to all those who obey Him, [Is 45:17] '
