    children:
    - type: text
      text: The Perfect High Priest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For every high priest chosen from among men is appointed [to act] on behalf of men in things relating to God, so that he may offer both gifts and sacrifices for sins. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He is able to deal gently with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritually
  - type: text
    text: ' ignorant and misguided, since he is also subject to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: human
  - type: text
    text: ' weakness; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and because of this [human weakness] he is required to offer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' for sins, for himself as well as for the people. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And besides, one does not appropriate for himself the honor [of being high priest], but he who is called by God, just as Aaron was.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So too Christ did not glorify Himself so as to be made a high priest, but He [was exalted and appointed by the One] who said to Him,
