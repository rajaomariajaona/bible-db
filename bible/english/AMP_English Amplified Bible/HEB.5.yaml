  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Perfect High Priest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every high priest chosen from among men is appointed [to act] on behalf of men in things relating to God, so that he may offer both gifts and sacrifices for sins. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'being designated by God as High Priest according to the order of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 7:3.
      marker-yv: yv-n
    - type: text
      text: Melchizedek. [Ps 110:4]
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning this we have much to say, and it is hard to explain, since you have become dull '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sluggish in [your spiritual] hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disinclined to listen. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For though by this time you ought to be teachers [because of the time you have had to learn these truths], you actually need someone to teach you again the elementary principles of God’s word [from the beginning], and you have come to be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' in need of milk, not solid food. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For everyone who lives on milk is [doctrinally inexperienced and] unskilled in the word of righteousness, since he is a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' infant. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But solid food is for the [spiritually] mature, whose senses are trained by practice to distinguish between what is morally good and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what is
    - type: text
      text: ' evil.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is able to deal gently with the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritually
    - type: text
      text: ' ignorant and misguided, since he is also subject to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: human
    - type: text
      text: ' weakness; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and because of this [human weakness] he is required to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' for sins, for himself as well as for the people. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And besides, one does not appropriate for himself the honor [of being high priest], but he who is called by God, just as Aaron was.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So too Christ did not glorify Himself so as to be made a high priest, but He [was exalted and appointed by the One] who said to Him,
