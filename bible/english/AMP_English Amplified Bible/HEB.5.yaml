  '1':
  - type: heading
    content: The Perfect High Priest
  - type: text
    content: 'For every high priest chosen from among men is appointed [to act] on behalf of men in things relating to God, so that he may offer both gifts and sacrifices for sins. '
  '10':
  - type: text
    content: 'being designated by God as High Priest according to the order of '
  - type: note
    content: See note 7:3.
  - type: text
    content: Melchizedek. [Ps 110:4]
  '11':
  - type: text
    content: 'Concerning this we have much to say, and it is hard to explain, since you have become dull '
  - type: text
    content: and
  - type: text
    content: ' sluggish in [your spiritual] hearing '
  - type: text
    content: and
  - type: text
    content: ' disinclined to listen. '
  '12':
  - type: text
    content: 'For though by this time you ought to be teachers [because of the time you have had to learn these truths], you actually need someone to teach you again the elementary principles of God’s word [from the beginning], and you have come to be '
  - type: text
    content: continually
  - type: text
    content: ' in need of milk, not solid food. '
  '13':
  - type: text
    content: 'For everyone who lives on milk is [doctrinally inexperienced and] unskilled in the word of righteousness, since he is a '
  - type: text
    content: spiritual
  - type: text
    content: ' infant. '
  '14':
  - type: text
    content: 'But solid food is for the [spiritually] mature, whose senses are trained by practice to distinguish between what is morally good and '
  - type: text
    content: what is
  - type: text
    content: ' evil.'
  '2':
  - type: text
    content: 'He is able to deal gently with the '
  - type: text
    content: spiritually
  - type: text
    content: ' ignorant and misguided, since he is also subject to '
  - type: text
    content: human
  - type: text
    content: ' weakness; '
  '3':
  - type: text
    content: 'and because of this [human weakness] he is required to offer '
  - type: text
    content: sacrifices
  - type: text
    content: ' for sins, for himself as well as for the people. '
  '4':
  - type: text
    content: And besides, one does not appropriate for himself the honor [of being high priest], but he who is called by God, just as Aaron was.
