  - type: text
    text: M
  - type: usfm
    marker: sc
    children:
    - type: text
      text: elchizedek
  - type: text
    text: .” [Ps 110:4]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In the days of His earthly life, Jesus offered up both [specific] petitions and [urgent] supplications [for that which He needed] with fervent crying and tears to the One who was [always] able to save Him from death, and He was heard because of His reverent submission toward God [His sinlessness and His unfailing determination to do the Father’s will]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Although He was a Son [who had never been disobedient to the Father], He learned [active, special] obedience through what He suffered. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And having been made perfect [uniquely equipped and prepared as Savior and retaining His integrity amid opposition], He became the source of eternal salvation [an eternal inheritance] to all those who obey Him, [Is 45:17] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'being designated by God as High Priest according to the order of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 7:3.
    marker-yv: yv-n
  - type: text
    text: Melchizedek. [Ps 110:4]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Concerning this we have much to say, and it is hard to explain, since you have become dull '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sluggish in [your spiritual] hearing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disinclined to listen. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For though by this time you ought to be teachers [because of the time you have had to learn these truths], you actually need someone to teach you again the elementary principles of God’s word [from the beginning], and you have come to be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' in need of milk, not solid food. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For everyone who lives on milk is [doctrinally inexperienced and] unskilled in the word of righteousness, since he is a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritual
  - type: text
    text: ' infant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But solid food is for the [spiritually] mature, whose senses are trained by practice to distinguish between what is morally good and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what is
  - type: text
    text: ' evil.'
