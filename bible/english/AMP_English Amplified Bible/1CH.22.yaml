document_id: 1CH.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Prepares for Temple Building
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then David said, “This is the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, and this is the altar of burnt offering for Israel.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David gave orders to gather the foreigners who were in the land of Israel, and he assigned stonecutters to hew out stones to build the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David prepared large quantities of iron to make nails for the doors of the gates and for the clamps (trusses), and more bronze than could be weighed; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and cedar trees beyond number, for the Sidonians and Tyrians brought large quantities of cedar timber to David. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David said, “Solomon my son is young and inexperienced, and the house that is to be built for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall be exceedingly magnificent, famous, and an object of glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor throughout all lands [of the earth]. So now I will make preparations for it.” Therefore, David made ample preparations before his death.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Charged with the Task
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he called for Solomon his son and ordered him to build a house for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David said to Solomon, “My son, I had intended to build a house for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Deut 12:5.
    marker-yv: yv-n
  - type: text
    text: Name (Presence) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, ‘You have shed much blood and have waged great wars; you shall not build a house for My Name, because you have shed so much blood on the earth before me. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Behold, a son will be born to you, who will be a man of peace. I will give him rest from all his enemies on every side; for his name shall be Solomon, and I will give peace and quiet to Israel in his days. [2 Sam 12:24, 25] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He shall build a house for My Name (Presence). He shall be My son and I will be his father; and I will establish his royal throne over Israel forever.’ '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now, my son, may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be with you so that you may be successful and build the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, just as He has spoken concerning you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Only may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' give you wisdom and understanding, and give you charge over Israel, so that you may keep the law of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then you will prosper, if you are careful to observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfill the statutes and ordinances which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses concerning Israel. Be strong and courageous, do not fear nor be dismayed. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now listen, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in my affliction
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'with great trouble I have prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provided for the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' 100,000 talents of gold, 1,000,000 talents of silver, and bronze and iron beyond weighing, for they are great in quantity. I have also prepared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provided timber and stone, and you may add to them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Further, you have workmen in abundance: stonecutters and stonemasons and carpenters, and all men who are skillful in every kind of work. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: As for the gold, the silver, the bronze, and the iron, there is no limit. So arise and begin working, and may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David also commanded all the leaders of Israel to help Solomon his son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Is not the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with you? And has He not given you rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace on every side? For He has given the inhabitants of the land into my hand, and the land is subdued before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and before His people. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Now set your heart and your soul to seek (inquire of, require as your vital necessity) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. Arise and build the sanctuary of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, so that you may bring the ark of the covenant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the holy articles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utensils of God into the house built for the Name (Presence) of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
