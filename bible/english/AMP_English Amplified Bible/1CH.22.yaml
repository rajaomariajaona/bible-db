verses:
  '1':
  - type: heading
    content: David Prepares for Temple Building
  - type: text
    content: Then David said, “This is the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' God, and this is the altar of burnt offering for Israel.”'
  '10':
  - type: text
    content: 'He shall build a house for My Name (Presence). He shall be My son and I will be his father; and I will establish his royal throne over Israel forever.’ '
  '11':
  - type: text
    content: Now, my son, may the L
  - type: heading
    content: ord
  - type: text
    content: ' be with you so that you may be successful and build the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, just as He has spoken concerning you. '
  '12':
  - type: text
    content: Only may the L
  - type: heading
    content: ord
  - type: text
    content: ' give you wisdom and understanding, and give you charge over Israel, so that you may keep the law of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '13':
  - type: text
    content: 'Then you will prosper, if you are careful to observe '
  - type: text
    content: and
  - type: text
    content: ' fulfill the statutes and ordinances which the L'
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses concerning Israel. Be strong and courageous, do not fear nor be dismayed. '
  '14':
  - type: text
    content: 'Now listen, '
  - type: note
    content: Lit in my affliction.
  - type: text
    content: 'with great trouble I have prepared '
  - type: text
    content: and
  - type: text
    content: ' provided for the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' 100,000 talents of gold, 1,000,000 talents of silver, and bronze and iron beyond weighing, for they are great in quantity. I have also prepared '
  - type: text
    content: and
  - type: text
    content: ' provided timber and stone, and you may add to them. '
  '15':
  - type: text
    content: 'Further, you have workmen in abundance: stonecutters and stonemasons and carpenters, and all men who are skillful in every kind of work. '
  '16':
  - type: text
    content: As for the gold, the silver, the bronze, and the iron, there is no limit. So arise and begin working, and may the L
  - type: heading
    content: ord
  - type: text
    content: ' be with you.”'
  '17':
  - type: text
    content: 'David also commanded all the leaders of Israel to help Solomon his son, '
  - type: text
    content: saying,
  - type: text
    content: ' '
  '18':
  - type: text
    content: “Is not the L
  - type: heading
    content: ord
  - type: text
    content: ' your God with you? And has He not given you rest '
  - type: text
    content: and
  - type: text
    content: ' peace on every side? For He has given the inhabitants of the land into my hand, and the land is subdued before the L'
  - type: heading
    content: ord
  - type: text
    content: ' and before His people. '
  '19':
  - type: text
    content: Now set your heart and your soul to seek (inquire of, require as your vital necessity) the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. Arise and build the sanctuary of the L'
  - type: heading
    content: ord
  - type: text
    content: ' God, so that you may bring the ark of the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and the holy articles '
  - type: text
    content: and
  - type: text
    content: ' utensils of God into the house built for the Name (Presence) of the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'So David gave orders to gather the foreigners who were in the land of Israel, and he assigned stonecutters to hew out stones to build the house of God. '
  '3':
  - type: text
    content: 'David prepared large quantities of iron to make nails for the doors of the gates and for the clamps (trusses), and more bronze than could be weighed; '
  '4':
  - type: text
    content: 'and cedar trees beyond number, for the Sidonians and Tyrians brought large quantities of cedar timber to David. '
  '5':
  - type: text
    content: David said, “Solomon my son is young and inexperienced, and the house that is to be built for the L
  - type: heading
    content: ord
  - type: text
    content: ' shall be exceedingly magnificent, famous, and an object of glory '
  - type: text
    content: and
  - type: text
    content: ' splendor throughout all lands [of the earth]. So now I will make preparations for it.” Therefore, David made ample preparations before his death.'
  - type: heading
    content: Solomon Charged with the Task
  '6':
  - type: text
    content: Then he called for Solomon his son and ordered him to build a house for the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel. '
  '7':
  - type: text
    content: 'David said to Solomon, “My son, I had intended to build a house for the '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: Name (Presence) of the L
  - type: heading
    content: ord
  - type: text
    content: ' my God. '
  '8':
  - type: text
    content: But the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, ‘You have shed much blood and have waged great wars; you shall not build a house for My Name, because you have shed so much blood on the earth before me. '
  '9':
  - type: text
    content: 'Behold, a son will be born to you, who will be a man of peace. I will give him rest from all his enemies on every side; for his name shall be Solomon, and I will give peace and quiet to Israel in his days. [2 Sam 12:24, 25] '
