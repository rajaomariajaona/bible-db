type_code: eng
verses:
  '1':
  - type: heading
    content: Dirge for Pharaoh and Egypt
  - type: text
    content: In the twelfth year [after King Jehoiachin of Judah was taken into exile by the king of Babylon], in the twelfth month, on the first of the month, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'I will make many peoples appalled at you [at your judgment and your defeat], and their kings will be horribly afraid of you when I brandish My sword [of judgment] before them; they will tremble '
  - type: text
    content: and
  - type: text
    content: ' shudder every moment, every man for his own life, on the day of your downfall.”'
  '11':
  - type: text
    content: For thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “The sword of the king of Babylon will come on you. '
  '12':
  - type: text
    content: I will make your horde [of people] fall by the swords of the mighty—all of them are tyrants among the nations,
  - type: text
    content: 'And they will devastate the pride '
  - type: text
    content: and
  - type: text
    content: ' presumption of Egypt,'
  - type: text
    content: And all its hordes will be destroyed.
  '13':
  - type: text
    content: “I will also destroy all its cattle from beside its great waters;
  - type: text
    content: And the foot of man will not muddy them anymore
  - type: text
    content: Nor will the hoofs of the animals muddy them.
  '14':
  - type: text
    content: '“Then I will make their waters quiet '
  - type: text
    content: and
  - type: text
    content: ' clear;'
  - type: text
    content: I will make their rivers run [slowly and smoothly] like oil,”
  - type: text
    content: Says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '15':
  - type: text
    content: “When I make the land of Egypt desolate,
  - type: text
    content: 'And the country is stripped '
  - type: text
    content: and
  - type: text
    content: ' deprived of all that which filled it,'
  - type: text
    content: When I strike all those who live in it,
  - type: text
    content: Then they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '16':
  - type: text
    content: This is the dirge (funeral poem to be sung) and they shall sing it [for her]. The daughters of the nations shall sing it; for Egypt and for all her hordes they shall sing it,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '17':
  - type: text
    content: In the twelfth year [after King Jehoiachin of Judah was taken into exile], on the fifteenth of the month, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '18':
  - type: text
    content: '“Son of man, wail over the hordes of Egypt and cast them down, both her and the daughters of the powerful '
  - type: text
    content: and
  - type: text
    content: ' majestic nations, to the nether world (the place of the dead), with those who go down to the pit;'
  '19':
  - type: text
    content: ‘Whom [among them] do you surpass in beauty?
  - type: text
    content: Go down and make your bed with the uncircumcised (the barbaric, the boorish, the crude).’
  '2':
  - type: text
    content: “Son of man, take up a dirge (funeral poem to be sung) over Pharaoh king of Egypt and say to him,
  - type: text
    content: ‘You have compared yourself to a young lion among the nations,
  - type: text
    content: But you are like a monster in the seas;
  - type: text
    content: You burst into your rivers
  - type: text
    content: 'And disturbed '
  - type: text
    content: and
  - type: text
    content: ' muddied the waters with your feet'
  - type: text
    content: And fouled their rivers [the source of their prosperity].’ ”
  '20':
  - type: text
    content: 'They will fall among those who are slain by the sword. She (Egypt) is handed over to the sword; they have drawn her and all her hordes away [to judgment]. '
  '21':
  - type: text
    content: The strong among the mighty rulers will say of him (Pharaoh) and his allies from the midst of Sheol, ‘They have gone down [defeated]; they lie still, the uncircumcised, slain by the sword.’
  '22':
  - type: text
    content: '“Assyria is there with all her warriors; their graves are all around her. All of them are slain, fallen by the sword, '
  '23':
  - type: text
    content: whose graves are set in the remotest parts of the pit and her army is all around her grave. All of them are slain, fallen by the sword, who spread terror in the land of the living.
  '24':
  - type: text
    content: “
  - type: note
    content: Southwestern part of current day Iran.
  - type: text
    content: 'Elam [a conquest of Assyria] is there and all her hordes around her grave; all of them slain, fallen by the sword, who have gone down uncircumcised to the lower parts of the earth, who made their terror spread in the land of the living and bore their shame '
  - type: text
    content: and
  - type: text
    content: ' defeat with those who went down to the pit. '
  '25':
  - type: text
    content: They have made a bed for her among the slain with all her hordes. Her graves are around it; they are all uncircumcised (barbaric, boorish, crude), slain by the sword (for their terror had been spread in the land of the living), and they bore their disgrace with those who go down to the pit; they were laid among the slain.
  '26':
  - type: text
    content: '“Meshech, Tubal, and all their hordes are there; their graves '
  - type: note
    content: Lit are around him.
  - type: text
    content: 'surround them. All of them uncircumcised, slain by the sword, for they spread their terror in the land of the living. '
  '27':
  - type: text
    content: 'Nor do they lie beside the fallen heroes of the uncircumcised, who went down to Sheol with their weapons of war, whose swords were laid [with honors] under their heads. The punishment for their sins rested on their bones, for the terror of these heroes '
  - type: text
    content: was once
  - type: text
    content: ' in the land of the living. '
  '28':
  - type: text
    content: But you will be broken in the midst of the uncircumcised and you will lie [without honors] with those who are slain by the sword.
  '29':
  - type: text
    content: '“Edom is there also, her kings and all her princes, who for all their power '
  - type: text
    content: and
  - type: text
    content: ' strength are laid with those who were slain by the sword; they will lie [in shame and defeat] with the uncircumcised and with those who go down to the pit.'
  '3':
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “I will spread out My net over you
  - type: text
    content: With a company of many nations,
  - type: text
    content: And they will bring you up in My net.
  '30':
  - type: text
    content: “The princes of the north are there also, all of them, and all the Sidonians, who in spite of the terror resulting from their power, have gone down in shame with the slain. So they lay down uncircumcised with those slain by the sword and bore their disgrace with those who go down to the pit.
  '31':
  - type: text
    content: “Pharaoh will see them, and he will be comforted for all his hordes slain by the sword—Pharaoh and all his army,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: '. '
  '32':
  - type: text
    content: “Though I instilled a terror of him in the land of the living, yet he will be made to lie down among the uncircumcised along with those slain by the sword, even Pharaoh and all his hordes,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: . [Is 19; Jer 46; Zech 14:18, 19]
  '4':
  - type: text
    content: “Then I will leave you (Egypt) on the land;
  - type: text
    content: I will hurl you on the open field.
  - type: text
    content: And I will make all the birds of the sky dwell on you,
  - type: text
    content: And I will satisfy the animals of all the earth with you.
  '5':
  - type: text
    content: “And I will scatter your flesh on the mountains
  - type: text
    content: And fill the valleys with your debris [your corpses and their worms].
  '6':
  - type: text
    content: “I will also water the land with your flowing blood
  - type: text
    content: As far as the mountains,
  - type: text
    content: And the ravines will be full of you.
  '7':
  - type: text
    content: “And when I extinguish you,
  - type: text
    content: I will cover the heavens [of Egypt] and darken their stars;
  - type: text
    content: I will cover the sun with a cloud
  - type: text
    content: And the moon will not give its light.
  '8':
  - type: text
    content: “All the bright lights in the heavens
  - type: text
    content: I will darken over you
  - type: text
    content: And I will place darkness on your land,”
  - type: text
    content: Says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '9':
  - type: text
    content: '“I will also put fear into the hearts of many peoples when I bring your destruction [and captivity] among the nations, into countries which you have not known. '
