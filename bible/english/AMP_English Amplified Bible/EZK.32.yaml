document_id: EZK.32,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dirge for Pharaoh and Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the twelfth year [after King Jehoiachin of Judah was taken into exile by the king of Babylon], in the twelfth month, on the first of the month, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I will make many peoples appalled at you [at your judgment and your defeat], and their kings will be horribly afraid of you when I brandish My sword [of judgment] before them; they will tremble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shudder every moment, every man for his own life, on the day of your downfall.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “The sword of the king of Babylon will come on you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will make your horde [of people] fall by the swords of the mighty—all of them are tyrants among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they will devastate the pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' presumption of Egypt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all its hordes will be destroyed.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “I will also destroy all its cattle from beside its great waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the foot of man will not muddy them anymore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the hoofs of the animals muddy them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Then I will make their waters quiet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clear;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make their rivers run [slowly and smoothly] like oil,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “When I make the land of Egypt desolate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the country is stripped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deprived of all that which filled it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I strike all those who live in it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: This is the dirge (funeral poem to be sung) and they shall sing it [for her]. The daughters of the nations shall sing it; for Egypt and for all her hordes they shall sing it,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: In the twelfth year [after King Jehoiachin of Judah was taken into exile], on the fifteenth of the month, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Son of man, wail over the hordes of Egypt and cast them down, both her and the daughters of the powerful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majestic nations, to the nether world (the place of the dead), with those who go down to the pit;'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ‘Whom [among them] do you surpass in beauty?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go down and make your bed with the uncircumcised (the barbaric, the boorish, the crude).’
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Son of man, take up a dirge (funeral poem to be sung) over Pharaoh king of Egypt and say to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You have compared yourself to a young lion among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you are like a monster in the seas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You burst into your rivers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And disturbed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' muddied the waters with your feet'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fouled their rivers [the source of their prosperity].’ ”
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They will fall among those who are slain by the sword. She (Egypt) is handed over to the sword; they have drawn her and all her hordes away [to judgment]. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The strong among the mighty rulers will say of him (Pharaoh) and his allies from the midst of Sheol, ‘They have gone down [defeated]; they lie still, the uncircumcised, slain by the sword.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Assyria is there with all her warriors; their graves are all around her. All of them are slain, fallen by the sword, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: whose graves are set in the remotest parts of the pit and her army is all around her grave. All of them are slain, fallen by the sword, who spread terror in the land of the living.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Southwestern part of current day Iran.
      marker-yv: yv-n
    - type: text
      text: 'Elam [a conquest of Assyria] is there and all her hordes around her grave; all of them slain, fallen by the sword, who have gone down uncircumcised to the lower parts of the earth, who made their terror spread in the land of the living and bore their shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defeat with those who went down to the pit. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They have made a bed for her among the slain with all her hordes. Her graves are around it; they are all uncircumcised (barbaric, boorish, crude), slain by the sword (for their terror had been spread in the land of the living), and they bore their disgrace with those who go down to the pit; they were laid among the slain.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Meshech, Tubal, and all their hordes are there; their graves '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: are around him
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'surround them. All of them uncircumcised, slain by the sword, for they spread their terror in the land of the living. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nor do they lie beside the fallen heroes of the uncircumcised, who went down to Sheol with their weapons of war, whose swords were laid [with honors] under their heads. The punishment for their sins rested on their bones, for the terror of these heroes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was once
    - type: text
      text: ' in the land of the living. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But you will be broken in the midst of the uncircumcised and you will lie [without honors] with those who are slain by the sword.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“Edom is there also, her kings and all her princes, who for all their power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strength are laid with those who were slain by the sword; they will lie [in shame and defeat] with the uncircumcised and with those who go down to the pit.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will spread out My net over you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a company of many nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will bring you up in My net.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “The princes of the north are there also, all of them, and all the Sidonians, who in spite of the terror resulting from their power, have gone down in shame with the slain. So they lay down uncircumcised with those slain by the sword and bore their disgrace with those who go down to the pit.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Pharaoh will see them, and he will be comforted for all his hordes slain by the sword—Pharaoh and all his army,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “Though I instilled a terror of him in the land of the living, yet he will be made to lie down among the uncircumcised along with those slain by the sword, even Pharaoh and all his hordes,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: . [Is 19; Jer 46; Zech 14:18, 19]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Then I will leave you (Egypt) on the land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hurl you on the open field.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make all the birds of the sky dwell on you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will satisfy the animals of all the earth with you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “And I will scatter your flesh on the mountains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fill the valleys with your debris [your corpses and their worms].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I will also water the land with your flowing blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As far as the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the ravines will be full of you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “And when I extinguish you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cover the heavens [of Egypt] and darken their stars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cover the sun with a cloud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the moon will not give its light.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “All the bright lights in the heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will darken over you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will place darkness on your land,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“I will also put fear into the hearts of many peoples when I bring your destruction [and captivity] among the nations, into countries which you have not known. '
