    content: Parable of the Sower and Soils
  - type: text
    content: 'Again Jesus began to teach beside the sea [of Galilee]. And a very large crowd gathered around Him, so He got into a boat [anchoring it a short distance out] on the sea and sat down; and the whole crowd was by the sea on the shore. [Matt 13:1-15; Luke 8:4-15] '
