    children:
    - type: text
      text: 'picture the kingdom of God, or what parable shall we use to illustrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' explain it?'
  - type: text
    text: ' [Matt 13:31, 32; Luke 13:18, 19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'It is like a mustard seed, which, when it is sown on the ground, even though it is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient Israel the mustard seed was the smallest known seed, and in rabbinic teaching the mustard seed was used as an example of something very small (in the Talmud).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: smaller than all the
  - type: text
    text: ' [other] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: seeds that are
  - type: text
    text: ' [sown] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the soil,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'yet when it is sown, it grows up and becomes larger than all the garden herbs; and it puts out large branches, so that '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: the birds of the sky
    - type: text
      text: ' are able to '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: make nests
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: live under its shade
    - type: text
      text: .”
  - type: text
    text: ' [Ps 104:12; Ezek 17:23; 31:6]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'With many such parables, Jesus spoke the word to them, as they were able to hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and He did not say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything
  - type: text
    text: ' to them without [using] a parable; He did, however, explain everything privately to His own disciples.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Stills the Sea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On that [same] day, when evening had come, He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let us go over to the other side
  - type: text
    text: ' [of the Sea of Galilee].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So leaving the crowd, they took Him with them, just as He was, in the boat. And other boats were with Him. [Matt 8:23-27; Luke 8:22-25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Sea of Galilee is famous for its sudden and severe storms, produced by winds that funnel through the passes and canyons of the surrounding hills and create severe turbulence on the water. As experienced fishermen, the disciples knew that this was an almost constant risk in their profession.
    marker-yv: yv-n
  - type: text
    text: 'fierce windstorm began to blow, and waves were breaking over the boat, so that it was already being swamped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Jesus was in the stern, asleep [with His head] on the [sailor’s leather] cushion. And they woke Him and said to Him, “Teacher, do You not care that we are about to die?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And He got up and [sternly] rebuked the wind and said to the sea, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Hush, be still (muzzled)!”
  - type: text
    text: ' And the wind died down [as if it had grown weary] and there was [at once] a great calm [a perfect peacefulness]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
