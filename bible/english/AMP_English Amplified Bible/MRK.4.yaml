    - type: text
      text: Parable of the Sower and Soils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Again Jesus began to teach beside the sea [of Galilee]. And a very large crowd gathered around Him, so He got into a boat [anchoring it a short distance out] on the sea and sat down; and the whole crowd was by the sea on the shore. [Matt 13:1-15; Luke 8:4-15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And He taught them many things in parables, and in His teaching He said to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen! A sower went out to sow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and as he was sowing, some '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell by the road, and the birds came and ate it up.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell on rocks where there was not much soil; and immediately a plant sprang up '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In many parts of Israel a layer of limestone lies an inch or so beneath the surface of the ground. This layer traps the moisture, and for a brief period of time a plant growing there may appear to flourish. But as soon as a dry spell comes, the moisture quickly dissipates. Due to the layer of limestone, the plant cannot sink roots and soon withers and dies (v 6).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because the soil had no depth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And when the sun came up, the plant was scorched; and because it had no root, it dried up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withered away.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell among thorns, and the thorns came up and choked it, and it yielded no grain.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell into good soil, and as the plants grew and increased, they yielded a crop and produced thirty, sixty, and a hundred times'
  - type: text
    text: ' [as much as had been sown].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“He who has ears to hear, let him hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed My words.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As soon as He was alone, those who were around Him, together with the twelve [disciples], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' asking Him about [the interpretation of] the parables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The mystery of the kingdom of God has been given to you
  - type: text
    text: ' [who have teachable hearts], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but those who are outside
  - type: text
    text: ' [the unbelievers, the spiritually blind] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: get everything in parables,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'so that '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: they will continually look but not see
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and they will continually hear but not understand
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: otherwise they might turn
  - type: text
    text: ' [from their rejection of the truth] '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and be forgiven
    - type: text
      text: .”
  - type: text
    text: ' [Is 6:9, 10; Matt 13:11-15]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Explanation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Do you not understand this parable? How will you understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grasp the meaning of all the parables?'
  - type: text
    text: ' [Matt 13:18-23; Luke 8:11-15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The sower sows the word
  - type: text
    text: ' [of God, the good news regarding the way of salvation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: These
  - type: text
    text: ' [in the first group] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are the ones along the road where the word is sown; but when they hear, Satan immediately comes and takes away the word which has been sown in them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In a similar way these
  - type: text
    text: ' [in the second group] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are the ones on whom seed was sown on rocky ground, who, when they hear the word, immediately receive it with joy
  - type: text
    text: ' [but accept it only superficially]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they have no real root in themselves, so they endure only for a little while; then, when trouble or persecution comes because of the word, immediately they
  - type: text
    text: ' [are offended and displeased at being associated with Me and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall away.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And others are the ones on whom seed was sown among the thorns; these are the ones who have heard the word,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but the worries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cares of the world'
  - type: text
    text: ' [the distractions of this age with its worldly pleasures], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the deceitfulness
  - type: text
    text: ' [and the false security or glamour] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of wealth
  - type: text
    text: ' [or fame], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the passionate desires for all the other things creep in and choke out the word, and it becomes unfruitful.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And those
  - type: text
    text: ' [in the last group] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are the ones on whom seed was sown on the good soil; and they hear the word
  - type: text
    text: ' [of God, the good news regarding the way of salvation] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and accept it and bear fruit—thirty, sixty, and a hundred times as much
  - type: text
    text: ' [as was sown].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A lamp is not brought in to be put under a basket or under a bed, is it? Is it not
  - type: text
    text: ' [brought in] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to be put on the lampstand?
  - type: text
    text: ' [Matt 5:15; Luke 8:16; 11:33] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For nothing is hidden, except to be revealed; nor has anything been kept secret, but that it would come to light
  - type: text
    text: ' [that is, things are hidden only temporarily, until the appropriate time comes for them to be known]. [Matt 10:26-33; Luke 12:2-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If anyone has ears to hear, let him hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed My words.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Pay attention to what you hear. By your own standard of measurement
  - type: text
    text: ' [that is, to the extent that you study spiritual truth and apply godly wisdom] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it will be measured to you
  - type: text
    text: ' [and you will be given even greater ability to respond]'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: —and more will be given to you besides.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The person “who has” is one who is receptive to God’s word, while the one “who does not have” is the person who is blind to and has rejected the spiritual truth and godly wisdom already given to him. As a result, even what little he had previously understood about Jesus will no longer be clear to him.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: whoever has
  - type: text
    text: ' [a teachable heart], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
  - type: text
    text: ' [understanding] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be given; and whoever does not have
  - type: text
    text: ' [a yearning for truth], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even what he has will be taken away from him.”
  - type: text
    text: ' [Matt 13:12; 25:29; Luke 8:18]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Seed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The kingdom of God is like a man who throws seed on the ground;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and he goes to bed at night and gets up every day, and
  - type: text
    text: ' [in the meantime] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the seed sprouts and grows; how
  - type: text
    text: ' [it does this], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he does not know.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The earth produces crops by itself; first the blade, then the head
  - type: text
    text: ' [of grain], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: then the mature grain in the head.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when the crop ripens, he immediately puts in the sickle
  - type: text
    text: ' [to reap], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because
  - type: text
    text: ' [the time for] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the harvest has come.”
- type: usfm
  marker: s1
  children:
  - type: usfm
