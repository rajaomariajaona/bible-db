  '35':
  - type: text
    content: 'On that [same] day, when evening had come, He said to them, '
  - type: text
    content: “Let us go over to the other side
  - type: text
    content: ' [of the Sea of Galilee].” '
  '36':
  - type: text
    content: 'So leaving the crowd, they took Him with them, just as He was, in the boat. And other boats were with Him. [Matt 8:23-27; Luke 8:22-25] '
  '37':
  - type: text
    content: 'And a '
  - type: note
    content: The Sea of Galilee is famous for its sudden and severe storms, produced by winds that funnel through the passes and canyons of the surrounding hills and create severe turbulence on the water. As experienced fishermen, the disciples knew that this was an almost constant risk in their profession.
  - type: text
    content: 'fierce windstorm began to blow, and waves were breaking over the boat, so that it was already being swamped. '
  '38':
  - type: text
    content: 'But Jesus was in the stern, asleep [with His head] on the [sailor’s leather] cushion. And they woke Him and said to Him, “Teacher, do You not care that we are about to die?” '
  '39':
  - type: text
    content: 'And He got up and [sternly] rebuked the wind and said to the sea, '
  - type: text
    content: “Hush, be still (muzzled)!”
  - type: text
    content: ' And the wind died down [as if it had grown weary] and there was [at once] a great calm [a perfect peacefulness]. '
