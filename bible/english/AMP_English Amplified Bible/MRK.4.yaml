  - type: text
    content: seed
  - type: text
    content: ' fell on rocks where there was not much soil; and immediately a plant sprang up '
  - type: note
    content: In many parts of Israel a layer of limestone lies an inch or so beneath the surface of the ground. This layer traps the moisture, and for a brief period of time a plant growing there may appear to flourish. But as soon as a dry spell comes, the moisture quickly dissipates. Due to the layer of limestone, the plant cannot sink roots and soon withers and dies (v 6).
  - type: text
