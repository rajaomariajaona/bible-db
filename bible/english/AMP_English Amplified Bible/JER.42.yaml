document_id: JER.42,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Warning against Going to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then all the commanders of the forces, and Johanan the son of Kareah and Jezaniah (Azariah) the son of Hoshaiah, and all the people from the least to the greatest approached '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '‘If you will indeed remain in this land, then I will build you up and not tear you down, and I will plant you and not uproot you; for I will relent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be satisfied concerning the disaster that I have inflicted on you [as discipline, and I will replace judgment with compassion]. [Jer 31:4, 28] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Do not be afraid of the king of Babylon, whom you now fear [as if he were deity]; do not be afraid of him,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘for [he is a mere man, but I am the living, omniscient God and] I am with you [always] to protect you and to deliver you from his hand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And I will show you compassion, so that he will have compassion on you and restore you to your own land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But if you are going to say, “We will not stay in this land,” and [in so doing] do not listen to the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'saying, “No, but we will go to the land of Egypt, where we will not see war or hear the sound of the [warrior’s] trumpet or hunger for bread, and we will stay there,” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: then in that case listen to the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O remnant of Judah. Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “If you are really determined to go to Egypt and to reside there [temporarily], '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'then the sword, of which you are afraid, will overtake you there in the land of Egypt; and the famine of which you are afraid will follow closely after you in Egypt, and you will die there. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So all the men who set their mind to go to Egypt to reside there [temporarily] will die by the sword, by famine and by virulent disease; none of them will remain or survive the disaster that I am going to bring on them.” ’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “As My anger and My wrath have been poured out on the inhabitants of Jerusalem, so My wrath will be poured out on you when you enter Egypt. You will become detested, an object of horror, a curse and a people scorned; and you will no longer see this place.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken to you, O remnant of Judah, “Do not go into Egypt!” Know with certainty that I [Jeremiah] have warned you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testified to you this day '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and said to Jeremiah the prophet, “Please let our petition be presented before you, and pray to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God for us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' for all this remnant [of the people of Judah]; for we were once many, but now [only] a few of us are left, as you see with your own eyes, [so please pray] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: that you have deceived yourselves; for you sent me to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, saying, “Pray for us to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God; and whatever the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God says, declare it to us and we will do it.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And so I have told you today, but you have not listened to the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, in anything that He has sent me to tell you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Now therefore know for certain that you will die by the sword, by famine, and by virulent disease in the land [of Egypt] where you wish to reside [temporarily].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God may show us the way in which we should walk and the thing that we should do.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then Jeremiah the prophet said to them, “I have heard you. Now hear me, I will pray to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God in accordance with your words; and I will declare to you whatever message the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' answers; I will keep nothing back from you.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then they said to Jeremiah, “May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be a true and faithful witness against us if we fail to act in accordance with all the things that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God sends you to tell us. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Whether it is pleasant or unpleasant, we will listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God to whom we are sending you, so that it may go well with us when we listen to the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now after ten days [of prayer] had passed the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Jeremiah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then he called for Johanan the son of Kareah and all the commanders of the forces that were with him and all the people from the least to the greatest, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: and said to them, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, to whom you sent me to present your petition before Him: '
