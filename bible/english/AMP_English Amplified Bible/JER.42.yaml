document_id: JER.42,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning against Going to Egypt
  - type: text
    content: 'Then all the commanders of the forces, and Johanan the son of Kareah and Jezaniah (Azariah) the son of Hoshaiah, and all the people from the least to the greatest approached '
  '10':
  - type: text
    content: '‘If you will indeed remain in this land, then I will build you up and not tear you down, and I will plant you and not uproot you; for I will relent '
  - type: text
    content: and
  - type: text
    content: ' be satisfied concerning the disaster that I have inflicted on you [as discipline, and I will replace judgment with compassion]. [Jer 31:4, 28] '
  '11':
  - type: text
    content: Do not be afraid of the king of Babylon, whom you now fear [as if he were deity]; do not be afraid of him,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘for [he is a mere man, but I am the living, omniscient God and] I am with you [always] to protect you and to deliver you from his hand. '
  '12':
  - type: text
    content: 'And I will show you compassion, so that he will have compassion on you and restore you to your own land. '
  '13':
  - type: text
    content: But if you are going to say, “We will not stay in this land,” and [in so doing] do not listen to the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, '
  '14':
  - type: text
    content: 'saying, “No, but we will go to the land of Egypt, where we will not see war or hear the sound of the [warrior’s] trumpet or hunger for bread, and we will stay there,” '
  '15':
  - type: text
    content: then in that case listen to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', O remnant of Judah. Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “If you are really determined to go to Egypt and to reside there [temporarily], '
  '16':
  - type: text
    content: 'then the sword, of which you are afraid, will overtake you there in the land of Egypt; and the famine of which you are afraid will follow closely after you in Egypt, and you will die there. '
  '17':
  - type: text
    content: So all the men who set their mind to go to Egypt to reside there [temporarily] will die by the sword, by famine and by virulent disease; none of them will remain or survive the disaster that I am going to bring on them.” ’ ”
  '18':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “As My anger and My wrath have been poured out on the inhabitants of Jerusalem, so My wrath will be poured out on you when you enter Egypt. You will become detested, an object of horror, a curse and a people scorned; and you will no longer see this place.” '
  '19':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken to you, O remnant of Judah, “Do not go into Egypt!” Know with certainty that I [Jeremiah] have warned you '
  - type: text
    content: and
  - type: text
    content: ' testified to you this day '
  '2':
  - type: text
    content: and said to Jeremiah the prophet, “Please let our petition be presented before you, and pray to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God for us, '
  - type: text
    content: that is,
  - type: text
    content: ' for all this remnant [of the people of Judah]; for we were once many, but now [only] a few of us are left, as you see with your own eyes, [so please pray] '
  '20':
  - type: text
    content: that you have deceived yourselves; for you sent me to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, saying, “Pray for us to the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God; and whatever the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God says, declare it to us and we will do it.” '
  '21':
  - type: text
    content: And so I have told you today, but you have not listened to the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, in anything that He has sent me to tell you. '
  '22':
  - type: text
    content: Now therefore know for certain that you will die by the sword, by famine, and by virulent disease in the land [of Egypt] where you wish to reside [temporarily].
  '3':
  - type: text
    content: that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God may show us the way in which we should walk and the thing that we should do.” '
  '4':
  - type: text
    content: Then Jeremiah the prophet said to them, “I have heard you. Now hear me, I will pray to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in accordance with your words; and I will declare to you whatever message the L'
  - type: heading
    content: ord
  - type: text
    content: ' answers; I will keep nothing back from you.” '
  '5':
  - type: text
    content: Then they said to Jeremiah, “May the L
  - type: heading
    content: ord
  - type: text
    content: ' be a true and faithful witness against us if we fail to act in accordance with all the things that the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God sends you to tell us. '
  '6':
  - type: text
    content: 'Whether it is pleasant or unpleasant, we will listen to '
  - type: text
    content: and
  - type: text
    content: ' honor the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God to whom we are sending you, so that it may go well with us when we listen to the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God.”'
  '7':
  - type: text
    content: Now after ten days [of prayer] had passed the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Jeremiah. '
  '8':
  - type: text
    content: 'Then he called for Johanan the son of Kareah and all the commanders of the forces that were with him and all the people from the least to the greatest, '
  '9':
  - type: text
    content: and said to them, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, to whom you sent me to present your petition before Him: '
