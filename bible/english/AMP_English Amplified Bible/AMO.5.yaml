document_id: AMO.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “Seek Me that You May Live”
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear this word which I take up for you as a funeral song, O house of Israel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She has fallen, she will not rise again—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The virgin Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She lies neglected on her land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no one to raise her up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The city which goes forth a thousand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: strong
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will have a hundred left,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the one which goes forth a hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: strong
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will have ten left to the house of Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to the house of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Seek Me [search diligently for Me and regard Me as more essential than food] so that you may live. [2 Chr 15:2; Jer 29:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “But do not resort to Bethel [to worship the golden calf]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor enter [idolatrous] Gilgal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor cross over to Beersheba [and its idols];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For Gilgal will certainly go into captivity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exile,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Bethel will come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [search diligently for Him and long for Him as your most essential need] so that you may live,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or He will rush down like a [devouring] fire, O '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A reference to the ten tribes of Israel, the Northern Kingdom. The leading tribe in the north was Ephraim (descendants of Joseph’s second son).
    marker-yv: yv-n
  - type: text
    text: house of Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there will be no one to quench the flame for [idolatrous] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The center of pagan worship in the Northern Kingdom.
    marker-yv: yv-n
  - type: text
    text: Bethel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For those [shall be consumed] who turn justice into wormwood (bitterness)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cast righteousness down to the earth.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶He who made the [cluster of stars called] Pleiades and [the constellation] Orion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who turns deep darkness into the morning
- type: usfm
  marker: q1
  children:
  - type: text
    text: And darkens the day into night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who calls for the waters of the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pours them out on the surface of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is His name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It is He who causes [sudden] destruction to flash forth on the strong
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that destruction comes on the fortress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶They hate the one who reprimands [the unrighteous] in the [court held at the city] gate [regarding him as unreasonable and rejecting his reprimand],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they detest him who speaks [the truth] with integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honesty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore, because you impose heavy rent on the poor
- type: usfm
  marker: q1
  children:
  - type: text
    text: And demand a tribute (food-tax) of grain from them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though you have built [luxurious] houses of square stone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will not live in them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have planted beautiful vineyards, but you will not drink their wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For I know your transgressions are many and your sins are great (shocking, innumerable),
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who distress the righteous and take bribes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And turn away from the poor in the [court of the city] gate [depriving them of justice].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore, he who is prudent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has insight will keep silent at such a [corrupt and evil] time, for it is an evil time [when people will not listen to truth and will disregard those of good character].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶Seek (long for, require) good and not evil, that you may live;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts be with you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as you have said!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hate evil and love good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And establish justice in the [court of the city] gate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perhaps the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be gracious to the remnant of Joseph [that is, those who remain after God’s judgment].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts, the Lord,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There is wailing in all the public plazas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in all the streets they say, ‘Alas! Alas!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they call the farmers to mourning [for those who have died]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And professional mourners to wailing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“And in all vineyards '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there is
  - type: text
    text: ' wailing,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will pass through your midst [in judgment],” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Ex 12:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Woe (judgment is coming) to you who desire the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [expecting rescue from the Gentiles]!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you want the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is darkness (judgment) and not light [and rescue and prosperity];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It is as if a man runs from a lion [escaping one danger]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a bear meets him [so he dies anyway],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or goes home, and leans with his hand against the wall
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a snake bites him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Will not the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be darkness, instead of light,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even very dark with no brightness in it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '¶“I hate, I despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject your [sacred] feasts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I do not take delight in your solemn assemblies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Even though you offer Me your burnt offerings and your grain offerings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not accept them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will not even look at the peace offerings of your fattened animals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Take the noise of your songs away from Me [they are an irritation]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall not even listen to the melody of your harps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “But let justice run down like waters
- type: usfm
  marker: q1
  children:
  - type: text
    text: And righteousness like an ever-flowing stream [flowing abundantly].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Did you bring Me sacrifices and grain offerings during those forty years in the wilderness, O house of Israel? [Certainly not!] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'You carried along your king Sikkuth and Kayyun [your man-made gods of Saturn], your images of your star-god which you made for yourselves [but you brought Me none of the appointed sacrifices]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Therefore, I will send you to go into exile far beyond Damascus,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', whose name is the God of hosts. [Acts 7:42, 43]'
