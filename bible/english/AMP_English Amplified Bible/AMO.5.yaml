document_id: AMO.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: “Seek Me that You May Live”
  - type: text
    content: 'Hear this word which I take up for you as a funeral song, O house of Israel:'
  '10':
  - type: text
    content: ¶They hate the one who reprimands [the unrighteous] in the [court held at the city] gate [regarding him as unreasonable and rejecting his reprimand],
  - type: text
    content: 'And they detest him who speaks [the truth] with integrity '
  - type: text
    content: and
  - type: text
    content: ' honesty.'
  '11':
  - type: text
    content: Therefore, because you impose heavy rent on the poor
  - type: text
    content: And demand a tribute (food-tax) of grain from them,
  - type: text
    content: Though you have built [luxurious] houses of square stone,
  - type: text
    content: You will not live in them;
  - type: text
    content: You have planted beautiful vineyards, but you will not drink their wine.
  '12':
  - type: text
    content: For I know your transgressions are many and your sins are great (shocking, innumerable),
  - type: text
    content: You who distress the righteous and take bribes,
  - type: text
    content: And turn away from the poor in the [court of the city] gate [depriving them of justice].
  '13':
  - type: text
    content: 'Therefore, he who is prudent '
  - type: text
    content: and
  - type: text
    content: ' has insight will keep silent at such a [corrupt and evil] time, for it is an evil time [when people will not listen to truth and will disregard those of good character].'
  '14':
  - type: text
    content: ¶Seek (long for, require) good and not evil, that you may live;
  - type: text
    content: And so may the L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts be with you,'
  - type: text
    content: Just as you have said!
  '15':
  - type: text
    content: Hate evil and love good,
  - type: text
    content: And establish justice in the [court of the city] gate.
  - type: text
    content: Perhaps the L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts'
  - type: text
    content: Will be gracious to the remnant of Joseph [that is, those who remain after God’s judgment].
  '16':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts, the Lord,'
  - type: text
    content: “There is wailing in all the public plazas,
  - type: text
    content: And in all the streets they say, ‘Alas! Alas!’
  - type: text
    content: And they call the farmers to mourning [for those who have died]
  - type: text
    content: And professional mourners to wailing.
  '17':
  - type: text
    content: '“And in all vineyards '
  - type: text
    content: there is
  - type: text
    content: ' wailing,'
  - type: text
    content: For I will pass through your midst [in judgment],” says the L
  - type: heading
    content: ord
  - type: text
    content: . [Ex 12:12]
  '18':
  - type: text
    content: ¶Woe (judgment is coming) to you who desire the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' [expecting rescue from the Gentiles]!'
  - type: text
    content: Why would you want the day of the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: It is darkness (judgment) and not light [and rescue and prosperity];
  '19':
  - type: text
    content: It is as if a man runs from a lion [escaping one danger]
  - type: text
    content: And a bear meets him [so he dies anyway],
  - type: text
    content: Or goes home, and leans with his hand against the wall
  - type: text
    content: And a snake bites him.
  '2':
  - type: text
    content: She has fallen, she will not rise again—
  - type: text
    content: The virgin Israel.
  - type: text
    content: She lies neglected on her land;
  - type: text
    content: There is no one to raise her up.
  '20':
  - type: text
    content: Will not the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' be darkness, instead of light,'
  - type: text
    content: Even very dark with no brightness in it?
  '21':
  - type: text
    content: '¶“I hate, I despise '
  - type: text
    content: and
  - type: text
    content: ' reject your [sacred] feasts,'
  - type: text
    content: And I do not take delight in your solemn assemblies.
  '22':
  - type: text
    content: “Even though you offer Me your burnt offerings and your grain offerings,
  - type: text
    content: I will not accept them;
  - type: text
    content: And I will not even look at the peace offerings of your fattened animals.
  '23':
  - type: text
    content: “Take the noise of your songs away from Me [they are an irritation]!
  - type: text
    content: I shall not even listen to the melody of your harps.
  '24':
  - type: text
    content: “But let justice run down like waters
  - type: text
    content: And righteousness like an ever-flowing stream [flowing abundantly].
  '25':
  - type: text
    content: '“Did you bring Me sacrifices and grain offerings during those forty years in the wilderness, O house of Israel? [Certainly not!] '
  '26':
  - type: text
    content: 'You carried along your king Sikkuth and Kayyun [your man-made gods of Saturn], your images of your star-god which you made for yourselves [but you brought Me none of the appointed sacrifices]. '
  '27':
  - type: text
    content: Therefore, I will send you to go into exile far beyond Damascus,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', whose name is the God of hosts. [Acts 7:42, 43]'
  '3':
  - type: text
    content: For thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: '“The city which goes forth a thousand '
  - type: text
    content: strong
  - type: text
    content: Will have a hundred left,
  - type: text
    content: 'And the one which goes forth a hundred '
  - type: text
    content: strong
  - type: text
    content: Will have ten left to the house of Israel.”
  '4':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' to the house of Israel,'
  - type: text
    content: “Seek Me [search diligently for Me and regard Me as more essential than food] so that you may live. [2 Chr 15:2; Jer 29:13]
  '5':
  - type: text
    content: “But do not resort to Bethel [to worship the golden calf]
  - type: text
    content: Nor enter [idolatrous] Gilgal,
  - type: text
    content: Nor cross over to Beersheba [and its idols];
  - type: text
    content: 'For Gilgal will certainly go into captivity '
  - type: text
    content: and
  - type: text
    content: ' exile,'
  - type: text
    content: And Bethel will come to nothing.
  '6':
  - type: text
    content: “Seek the L
  - type: heading
    content: ord
  - type: text
    content: ' [search diligently for Him and long for Him as your most essential need] so that you may live,'
  - type: text
    content: 'Or He will rush down like a [devouring] fire, O '
  - type: note
    content: A reference to the ten tribes of Israel, the Northern Kingdom. The leading tribe in the north was Ephraim (descendants of Joseph’s second son).
  - type: text
    content: house of Joseph,
  - type: text
    content: 'And there will be no one to quench the flame for [idolatrous] '
  - type: note
    content: The center of pagan worship in the Northern Kingdom.
  - type: text
    content: Bethel,
  '7':
  - type: text
    content: For those [shall be consumed] who turn justice into wormwood (bitterness)
  - type: text
    content: And cast righteousness down to the earth.”
  '8':
  - type: text
    content: ¶He who made the [cluster of stars called] Pleiades and [the constellation] Orion,
  - type: text
    content: Who turns deep darkness into the morning
  - type: text
    content: And darkens the day into night,
  - type: text
    content: Who calls for the waters of the sea
  - type: text
    content: And pours them out on the surface of the earth,
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is His name.'
  '9':
  - type: text
    content: It is He who causes [sudden] destruction to flash forth on the strong
  - type: text
    content: So that destruction comes on the fortress.
