document_id: NEH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Work Is Ridiculed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 3:33 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: 'But when Sanballat heard that we were rebuilding the wall, he became furious, completely enraged, and he ridiculed the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He spoke before his brothers and the army of Samaria, “What are these feeble Jews doing? Can they restore it for themselves? Can they offer sacrifices? Can they finish in a day? Can they revive the stones from the heaps of dust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rubbish, even the ones that have been burned?” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Now Tobiah the Ammonite was beside him, and he said, “Even what they are building—if a fox should get up on it, he would break down their stone wall.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '[And Nehemiah prayed] Hear, O our God, how we are despised! Return their taunts on their own heads. Give them up as prey in a land of captivity. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not forgive their wrongdoing and do not let their sin be wiped out before You, for they have offended the builders [and provoked You].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So we built the wall and the entire wall was joined together to half its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: height,
  - type: text
    text: ' for the people had a heart to work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 4:1 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: 'But when Sanballat, Tobiah, the Arabs, the Ammonites, and the Ashdodites heard that the repair of the walls of Jerusalem went on, and that the breaches were being closed, they were very angry. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They all conspired together to come and to fight against Jerusalem, and to cause a disturbance in it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Discouragement Overcome
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But we prayed to our God, and because of them we set up a guard against them day and night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then [the leaders of] Judah said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The strength of the burden bearers is failing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is much rubble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We ourselves are unable
- type: usfm
  marker: q1
  children:
  - type: text
    text: To rebuild the wall.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Our enemies said, “They will not know or see us until we are among them, kill them and put a stop to the work.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the Jews who lived near them came, they said to us ten times (repeatedly), “From every place you turn, they will come up against us.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So I stationed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: armed men
  - type: text
    text: ' behind the wall in the lowest places, at the open positions [where it was least protected]; and I stationed the people in families with their swords, spears, and bows. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When I saw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their fear,
  - type: text
    text: ' I stood and said to the nobles and officials and the rest of the people: “Do not be afraid of them; [confidently] remember the Lord who is great and awesome, and [with courage from Him] fight for your brothers, your sons, your daughters, your wives, and for your homes.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now when our enemies heard that we knew about '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their plot against us,
  - type: text
    text: ' and that God had frustrated their plan, we all returned to the wall, each one to his work. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From that day on, half of my servants carried on the work while the other half held the spears, shields, bows, and breastplates; and the captains were behind the whole house of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Those who were rebuilding the wall and those who carried burdens loaded themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so that everyone
  - type: text
    text: ' worked with one hand and held a weapon with the other. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Every builder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had
  - type: text
    text: ' his sword secured at his side as he built. And the one who sounded the trumpet [to summon the troops] stood at my side. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I said to the nobles, the officials and the rest of the people, “The work is great and extensive, and we are separated on the wall, far from one another. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Wherever you hear the sound of the trumpet, gather to us there. Our God will fight for us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So we carried on with the work with half of them holding spears from dawn until the stars came out. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'At that time I also said to the people, “Let each man with his servant spend the night inside Jerusalem so that they may serve as a guard for us at night and a laborer during the day.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So neither I, my brothers (relatives), my servants, nor the men of the guard who followed me, none of us took off our clothes; each took his weapon [even] to the water.
