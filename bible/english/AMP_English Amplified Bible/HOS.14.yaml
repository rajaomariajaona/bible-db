document_id: HOS.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel’s Future Blessing
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israel, return [in repentance] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you have stumbled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fallen [visited by tragedy], because of your sin.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take the words [confessing your guilt] with you and return to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to Him, “Take away all our wickedness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Accept what is good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' receive us graciously,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that we may present the fruit of our lips (gratitude). [Heb 13:15]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Assyria will not save us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will not ride on horses [relying on military might],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will we say again to [the idols who are] the work of our hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You are our gods.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in You [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] the orphan finds love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy.”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶I will heal their apostasy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithlessness;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will love them freely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For My anger has turned away from Israel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I shall be like the dew to Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will blossom like the lily,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he will take root like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the cedars of
    - type: text
      text: ' Lebanon.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His shoots will sprout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his beauty will be like the olive tree
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his fragrance like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the cedars of
    - type: text
      text: ' Lebanon.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who live in his shadow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will again raise grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will blossom like the vine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His renown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' like the wine of Lebanon.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O Ephraim, what more have I to do with idols?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is I who have answered and will care for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watch over you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a luxuriant cypress tree;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With Me your fruit is found [which is to nourish you].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Whoever is [spiritually] wise, let him understand these things;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Whoever
    - type: text
      text: ' is [spiritually] discerning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding, let him know them.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the ways of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are right,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the righteous will walk in them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But transgressors will stumble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall in them. [Ps 107:43; Is 26:7; Jer 9:12; Dan 12:10]'
