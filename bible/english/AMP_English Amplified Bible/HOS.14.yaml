document_id: HOS.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Future Blessing
  - type: text
    content: O Israel, return [in repentance] to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: 'For you have stumbled '
  - type: text
    content: and
  - type: text
    content: ' fallen [visited by tragedy], because of your sin.'
  '2':
  - type: text
    content: Take the words [confessing your guilt] with you and return to the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: Say to Him, “Take away all our wickedness;
  - type: text
    content: 'Accept what is good '
  - type: text
    content: and
  - type: text
    content: ' receive us graciously,'
  - type: text
    content: So that we may present the fruit of our lips (gratitude). [Heb 13:15]
  '3':
  - type: text
    content: “Assyria will not save us;
  - type: text
    content: We will not ride on horses [relying on military might],
  - type: text
    content: Nor will we say again to [the idols who are] the work of our hands,
  - type: text
    content: ‘You are our gods.’
  - type: text
    content: For in You [O L
  - type: heading
    content: ord
  - type: text
    content: '] the orphan finds love '
  - type: text
    content: and
  - type: text
    content: ' compassion '
  - type: text
    content: and
  - type: text
    content: ' mercy.”'
  '4':
  - type: text
    content: '¶I will heal their apostasy '
  - type: text
    content: and
  - type: text
    content: ' faithlessness;'
  - type: text
    content: I will love them freely,
  - type: text
    content: For My anger has turned away from Israel.
  '5':
  - type: text
    content: I shall be like the dew to Israel;
  - type: text
    content: He will blossom like the lily,
  - type: text
    content: 'And he will take root like '
  - type: text
    content: the cedars of
  - type: text
    content: ' Lebanon.'
  '6':
  - type: text
    content: His shoots will sprout,
  - type: text
    content: And his beauty will be like the olive tree
  - type: text
    content: 'And his fragrance like '
  - type: text
    content: the cedars of
  - type: text
    content: ' Lebanon.'
  '7':
  - type: text
    content: Those who live in his shadow
  - type: text
    content: Will again raise grain,
  - type: text
    content: And they will blossom like the vine.
  - type: text
    content: 'His renown '
  - type: text
    content: will be
  - type: text
    content: ' like the wine of Lebanon.'
  '8':
  - type: text
    content: ¶O Ephraim, what more have I to do with idols?
  - type: text
    content: 'It is I who have answered and will care for you '
  - type: text
    content: and
  - type: text
    content: ' watch over you.'
  - type: text
    content: I am like a luxuriant cypress tree;
  - type: text
    content: With Me your fruit is found [which is to nourish you].
  '9':
  - type: text
    content: ¶Whoever is [spiritually] wise, let him understand these things;
  - type: text
    content: Whoever
  - type: text
    content: ' is [spiritually] discerning '
  - type: text
    content: and
  - type: text
    content: ' understanding, let him know them.'
  - type: text
    content: For the ways of the L
  - type: heading
    content: ord
  - type: text
    content: ' are right,'
  - type: text
    content: And the righteous will walk in them,
  - type: text
    content: 'But transgressors will stumble '
  - type: text
    content: and
  - type: text
    content: ' fall in them. [Ps 107:43; Is 26:7; Jer 9:12; Dan 12:10]'
