document_id: 2CH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Solomon said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said that He would dwell in the thick cloud.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have built You a lofty house,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place for You to dwell forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the king turned around and blessed the entire assembly of Israel, while they were all standing. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he said, “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who spoke with His mouth to my father David and has fulfilled with His hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what He promised,
  - type: text
    text: ' saying, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '‘Since the day that I brought My people out of the land of Egypt, I did not choose a city among all the tribes of Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in which
  - type: text
    text: ' to build a house so that My Name (Presence) might be there, nor did I choose any man to be a leader over My people Israel; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but I have chosen Jerusalem that My Name might be there, and I have chosen David to be over My people Israel.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now it was in the heart of my father David to build a house for the Name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to my father David, ‘Because it was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. your heartfelt desire.
    marker-yv: yv-n
  - type: text
    text: 'in your heart to build a house for My Name, you did well that it was in your heart. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nevertheless you shall not build the house, but your son who will be born to you, he shall build the house for My Name.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has fulfilled His word which He spoke; for I have risen in place of my father David and I sit on the throne of Israel, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' promised, and have built the house for the Name of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: There I have placed the ark [the symbol of His Presence] in which is the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [the Ten Commandments], which He made with the people (descendants) of Israel.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Prayer of Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Solomon stood before the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the presence of the entire assembly of Israel and spread out his hands. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For Solomon had made a bronze platform, five cubits square and three cubits high, and had set it in the midst of the courtyard; and he stood on it, and he knelt down on his knees in the presence of all the assembly of Israel and spread out his hands toward heaven, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and he said, “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', God of Israel, there is no god like You in heaven or on the earth, keeping covenant and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: showing
  - type: text
    text: ' mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness to Your servants who walk before You [in obedience] with all their heart, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '[You] who have kept Your promise to Your servant David, my father, that which You told him; You have spoken with Your mouth and have fulfilled it with Your hand, as it is today. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now therefore, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, keep with Your servant David, my father, that which You promised him, saying, ‘You shall not fail to have a man to sit on the throne of Israel, provided your sons are careful to walk in My law as you, [David,] have walked before Me.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now then, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, let Your word which You have spoken to Your servant David be confirmed (verified).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“But will God actually dwell with mankind on the earth? Behold, heaven and the highest heaven cannot contain You; how much less this house which I have built! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Yet have regard for the prayer of Your servant and for his supplication, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, to listen to the cry and to the prayer which Your servant prays before You, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that Your eyes may be open toward this house day and night, toward the place in which You have said that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: You would
  - type: text
    text: ' put Your Name (Presence), to listen to the prayer which Your servant shall pray toward this place. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So listen to the requests of Your servant and Your people Israel when they pray toward this place. Hear from Your dwelling place, from heaven; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when You
  - type: text
    text: ' hear, forgive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“If a man sins against his neighbor, and he is required to take an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By swearing the oath the man places himself under a curse if he is lying when he claims innocence.
    marker-yv: yv-n
  - type: text
    text: 'oath, and he comes and takes the oath before Your altar in this house, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: then hear from heaven and act and judge Your servants, punishing the wicked by bringing his conduct on his own head, and providing justice to the righteous by giving to him in accordance with his righteousness (innocence).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“If Your people Israel have been defeated by an enemy because they have sinned against You, and they return '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to You
  - type: text
    text: ' and confess Your name, and pray and make supplication before You in this house, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: then hear from heaven and forgive the sin of Your people Israel, and bring them again to the land which You gave to them and to their fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“When the heavens are shut up and there is no rain because Your people have sinned against You, and they pray toward this place and confess Your name, and turn from their sin when You afflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humble them; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: then hear in heaven and forgive the sin of Your servants and Your people Israel, indeed, teach them the good way in which they should walk. And send rain on Your land which You have given to Your people as an inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“If there is famine in the land, if there is pestilence, if there is blight or mildew, if there are [migratory] locusts or grasshoppers, if their enemies besiege them in the land of their cities, whatever plague or whatever sickness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there is,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'then whatever prayer or request is made by any man or all of Your people Israel, each knowing his own suffering and his own pain, and stretching out his hands toward this house, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'then hear from heaven, Your dwelling place, and forgive, and render to each '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. just as he deserves.
    marker-yv: yv-n
  - type: text
    text: 'in accordance with all his ways, whose heart You know; for You alone know the hearts of the sons of men, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: so that they may fear You, to walk in Your ways [in obedience to You] as long as they live in the land which You have given to our fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“Also in regard to the foreigner who is not from Your people Israel, but has come from a far country for the sake of Your great name and Your mighty power and Your outstretched arm—when they come and pray toward this house, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'then hear from heaven, from Your dwelling place, and do according to all for which the foreigner calls to You, so that all the peoples of the earth may know Your name, and fear You [reverently and worshipfully], as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' Your people Israel, and that they may know that this house which I have built is called by Your Name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“When Your people go out to war against their enemies, by the way that You send them, and they pray to You facing this city [Jerusalem] which You have chosen and the house which I have built for Your Name, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'then hear from heaven their prayer and their request, and maintain their cause '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do justice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“When they sin against You (for there is no man who does not sin) and You are angry with them and hand them over to an enemy, so that they take them away captive to a land far away or near, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'if they take it to heart in the land where they have been taken captive, and repent and pray to You in the land of their captivity, saying, ‘We have sinned, we have done wrong and have acted wickedly’; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'if they return to You with all their heart and with all their soul in the land of their captivity, and pray facing their land which You have given to their fathers and toward the city which You have chosen, and toward the house which I have built for Your Name; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'then hear from heaven, from Your dwelling place, their prayer and requests, and maintain their cause '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do justice and forgive Your people who have sinned against You.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Instead of concluding Solomon’s prayer of dedication as it is recorded in 1 Kin 8:50-53, the author of this book ends it with this quote from Ps 132:8-10.
    marker-yv: yv-n
  - type: text
    text: '“Now, O my God, I pray, let Your eyes be open and Your ears attentive to the prayer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: offered
  - type: text
    text: ' in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: “Now then arise, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, [and come] to Your resting place, You and the ark of Your strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power. Let Your priests, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, be clothed with salvation and let Your godly ones rejoice in [Your] goodness.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, do not turn away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject the face of Your anointed; remember '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness to Your servant David.”'
