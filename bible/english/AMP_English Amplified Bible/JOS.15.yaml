document_id: JOS.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Territory of Judah
  - type: text
    content: 'Now the lot (allotment) for the tribe of the sons of Judah according to their families reached [southward to] the border of Edom, southward to the wilderness of Zin at its most southern part. '
  '10':
  - type: text
    content: 'The border went around west from Baalah to Mount Seir, and passed along to the northern slope of Mount Jearim (that is, Chesalon), and went down to Beth-shemesh and then continued on through Timnah. '
  '11':
  - type: text
    content: 'The border proceeded to the slope [of the hill] of Ekron northward, then curved to Shikkeron and continued to Mount Baalah and proceeded to Jabneel. Then the border ended at the [Mediterranean] sea. '
  '12':
  - type: text
    content: The western border was at the Great Sea, with its coastline. This is the border around the tribe of the sons of Judah according to their families.
  '13':
  - type: text
    content: Now to Caleb the son of Jephunneh Joshua gave a portion among the sons of Judah, as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him, '
  - type: text
    content: namely,
  - type: text
    content: ' Kiriath-arba, '
  - type: text
    content: Arba being
  - type: text
    content: ' the father of Anak (that is, Hebron). '
  '14':
  - type: text
    content: 'So Caleb drove out from there the three sons of Anak: Sheshai and Ahiman and Talmai, the children of Anak. '
  '15':
  - type: text
    content: 'Then he went up from there against the people of Debir; Debir was formerly named Kiriath-sepher. '
  '16':
  - type: text
    content: 'Caleb said, “I will give Achsah my daughter as wife to the man who attacks Kiriath-sepher and captures it.” '
  '17':
  - type: text
    content: 'And Othniel the son of Kenaz, Caleb’s brother, captured it; so he gave him Achsah his daughter as a wife. '
  '18':
  - type: text
    content: 'Now it came about that when Achsah came '
  - type: text
    content: to Othniel,
  - type: text
    content: ' she persuaded him [to allow her] to ask her father for a field. Then she [rode up to Caleb and] dismounted from her donkey, and Caleb said to her, “What do you want?” '
  '19':
  - type: text
    content: Achsah answered, “Give me a blessing; since you have given me the [dry] land of the Negev (South country), give me springs of water, too.” So he gave her the upper springs and the lower springs.
  '2':
  - type: text
    content: 'Their southern border was from the lower end of the Salt (Dead) Sea, from the bay that turns southward. '
  '20':
  - type: text
    content: This is the inheritance of the tribe of the sons of Judah according to their families (clans).
  '21':
  - type: text
    content: 'The cities of the tribe of the sons of Judah in the extreme south toward the border of Edom were Kabzeel and Eder and Jagur, '
  '22':
  - type: text
    content: 'and Kinah and Dimonah and Adadah, '
  '23':
  - type: text
    content: 'and Kedesh and Hazor and Ithnan, '
  '24':
  - type: text
    content: 'Ziph and Telem and Bealoth, '
  '25':
  - type: text
    content: 'and Hazor-hadattah and Kerioth-hezron (that is, Hazor), '
  '26':
  - type: text
    content: 'Amam and Shema and Moladah, '
  '27':
  - type: text
    content: 'and Hazar-gaddah and Heshmon and Beth-pelet, '
  '28':
  - type: text
    content: 'and Hazar-shual and Beersheba and Biziothiah, '
  '29':
  - type: text
    content: 'Baalah and Iim and Ezem, '
  '3':
  - type: text
    content: 'Then it proceeded southward to the ascent of Akrabbim and continued along to Zin, and then went by the south of Kadesh-barnea and continued along to Hezron, and went up to Addar and turned about to Karka. '
  '30':
  - type: text
    content: 'and Eltolad and Chesil and Hormah, '
  '31':
  - type: text
    content: 'and Ziklag and Madmannah and Sansannah, '
  '32':
  - type: text
    content: and Lebaoth and Shilhim and Ain and Rimmon; in all twenty-nine cities with their villages.
  '33':
  - type: text
    content: 'In the lowland: Eshtaol and Zorah and Ashnah, '
  '34':
  - type: text
    content: 'and Zanoah and En-gannim, Tappuah and Enam, '
  '35':
  - type: text
    content: 'Jarmuth and Adullam, Socoh and Azekah, '
  '36':
  - type: text
    content: and Shaaraim and Adithaim and Gederah and Gederothaim; fourteen cities with their villages.
  '37':
  - type: text
    content: 'Zenan and Hadashah and Migdal-gad, '
  '38':
  - type: text
    content: 'and Dilean and Mizpeh and Joktheel, '
  '39':
  - type: text
    content: 'Lachish and Bozkath and Eglon, '
  '4':
  - type: text
    content: 'It continued along to Azmon and proceeded to the '
  - type: note
    content: Heb nachal, Arabic wadi. A dry river bed except in the rainy season.
  - type: text
    content: 'Brook of Egypt (Wadi el-Arish), and the border ended at the [Mediterranean] sea. This was their southern border. '
  '40':
  - type: text
    content: 'and Cabbon and Lahmas and Chitlish, '
  '41':
  - type: text
    content: and Gederoth, Beth-dagon and Naamah and Makkedah; sixteen cities with their villages.
  '42':
  - type: text
    content: 'Libnah and Ether and Ashan, '
  '43':
  - type: text
    content: 'and Iphtah and Ashnah and Nezib, '
  '44':
  - type: text
    content: and Keilah and Achzib and Mareshah; nine cities with their villages.
  '45':
  - type: text
    content: 'Ekron, with its '
  - type: note
    content: Lit daughters and so throughout the chapter.
  - type: text
    content: 'towns and villages; '
  '46':
  - type: text
    content: from Ekron even to the sea, all that were beside Ashdod, with their villages;
  '47':
  - type: text
    content: Ashdod, with its towns and its villages; Gaza, with its towns and its villages; as far as the Brook of Egypt (Wadi el-Arish) and the Great [Mediterranean] Sea with its coastline.
  '48':
  - type: text
    content: 'In the hill country: Shamir and Jattir and Socoh, '
  '49':
  - type: text
    content: 'and Dannah and Kiriath-sannah (that is, Debir), '
  '5':
  - type: text
    content: 'The eastern border was the Salt (Dead) Sea, as far as the mouth of the Jordan. The northern border was from the bay of the sea at the mouth of the Jordan. '
  '50':
  - type: text
    content: 'and Anab and Eshtemoh and Anim, '
  '51':
  - type: text
    content: and Goshen and Holon and Giloh; eleven cities with their villages.
  '52':
  - type: text
    content: 'Arab and Dumah and Eshan, '
  '53':
  - type: text
    content: 'and Janum and Beth-tappuah and Aphekah, '
  '54':
  - type: text
    content: and Humtah and Kiriath-arba (that is, Hebron), and Zior; nine cities with their villages.
  '55':
  - type: text
    content: 'Maon, Carmel and Ziph and Juttah, '
  '56':
  - type: text
    content: 'and Jezreel and Jokdeam and Zanoah, '
  '57':
  - type: text
    content: Kain, Gibeah and Timnah; ten cities with their villages.
  '58':
  - type: text
    content: 'Halhul, Beth-zur and Gedor, '
  '59':
  - type: text
    content: and Maarath and Beth-anoth and Eltekon; six cities with their villages.
  '6':
  - type: text
    content: 'Then the border went up to Beth-hoglah, and continued along north of Beth-arabah, and the border went up to the [landmark of the] stone of Bohan the son of Reuben. '
  '60':
  - type: text
    content: Kiriath-baal (that is, Kiriath-jearim), and Rabbah; two cities with their villages.
  '61':
  - type: text
    content: 'In the wilderness [that slopes downward toward the Dead Sea]: Beth-arabah, Middin and Secacah, '
  '62':
  - type: text
    content: 'and Nibshan and the '
  - type: note
    content: Perhaps Qumran.
  - type: text
    content: City of Salt and Engedi; six cities with their villages.
  '63':
  - type: text
    content: But as for the Jebusites, the inhabitants of Jerusalem, the [tribe of the] sons of Judah were not able to drive them out; so the Jebusites live with the sons of Judah in Jerusalem to this day.
  '7':
  - type: text
    content: 'The border went up to Debir from the Valley of Achor, and turned northward toward Gilgal which is opposite the ascent of Adummim, which is on the south side of the valley; and the border continued on to the waters of En-shemesh and ended at En-rogel. '
  '8':
  - type: text
    content: 'Then the border went up by the Valley of Ben-hinnom (son of Hinnom) at the southern slope of the Jebusite [city] (that is, Jerusalem); and the border went up to the top of the mountain that lies before the Valley of Hinnom to the west, which is at the northern end of the Valley of Rephaim. '
  '9':
  - type: text
    content: 'Then the border extended from the top of the mountain to the spring of the waters of Nephtoah and proceeded to the cities of Mount Ephron; then the border curved to Baalah (that is, Kiriath-jearim). '
