document_id: JOS.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Territory of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the lot (allotment) for the tribe of the sons of Judah according to their families reached [southward to] the border of Edom, southward to the wilderness of Zin at its most southern part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Their southern border was from the lower end of the Salt (Dead) Sea, from the bay that turns southward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then it proceeded southward to the ascent of Akrabbim and continued along to Zin, and then went by the south of Kadesh-barnea and continued along to Hezron, and went up to Addar and turned about to Karka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It continued along to Azmon and proceeded to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nachal,
      - type: text
        text: ' Arabic '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wadi
      - type: text
        text: . A dry river bed except in the rainy season.
    marker-yv: yv-n
  - type: text
    text: 'Brook of Egypt (Wadi el-Arish), and the border ended at the [Mediterranean] sea. This was their southern border. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The eastern border was the Salt (Dead) Sea, as far as the mouth of the Jordan. The northern border was from the bay of the sea at the mouth of the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the border went up to Beth-hoglah, and continued along north of Beth-arabah, and the border went up to the [landmark of the] stone of Bohan the son of Reuben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The border went up to Debir from the Valley of Achor, and turned northward toward Gilgal which is opposite the ascent of Adummim, which is on the south side of the valley; and the border continued on to the waters of En-shemesh and ended at En-rogel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the border went up by the Valley of Ben-hinnom (son of Hinnom) at the southern slope of the Jebusite [city] (that is, Jerusalem); and the border went up to the top of the mountain that lies before the Valley of Hinnom to the west, which is at the northern end of the Valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the border extended from the top of the mountain to the spring of the waters of Nephtoah and proceeded to the cities of Mount Ephron; then the border curved to Baalah (that is, Kiriath-jearim). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The border went around west from Baalah to Mount Seir, and passed along to the northern slope of Mount Jearim (that is, Chesalon), and went down to Beth-shemesh and then continued on through Timnah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The border proceeded to the slope [of the hill] of Ekron northward, then curved to Shikkeron and continued to Mount Baalah and proceeded to Jabneel. Then the border ended at the [Mediterranean] sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The western border was at the Great Sea, with its coastline. This is the border around the tribe of the sons of Judah according to their families.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now to Caleb the son of Jephunneh Joshua gave a portion among the sons of Judah, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: namely,
  - type: text
    text: ' Kiriath-arba, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Arba being
  - type: text
    text: ' the father of Anak (that is, Hebron). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Caleb drove out from there the three sons of Anak: Sheshai and Ahiman and Talmai, the children of Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then he went up from there against the people of Debir; Debir was formerly named Kiriath-sepher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Caleb said, “I will give Achsah my daughter as wife to the man who attacks Kiriath-sepher and captures it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And Othniel the son of Kenaz, Caleb’s brother, captured it; so he gave him Achsah his daughter as a wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now it came about that when Achsah came '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Othniel,
  - type: text
    text: ' she persuaded him [to allow her] to ask her father for a field. Then she [rode up to Caleb and] dismounted from her donkey, and Caleb said to her, “What do you want?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Achsah answered, “Give me a blessing; since you have given me the [dry] land of the Negev (South country), give me springs of water, too.” So he gave her the upper springs and the lower springs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: This is the inheritance of the tribe of the sons of Judah according to their families (clans).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The cities of the tribe of the sons of Judah in the extreme south toward the border of Edom were Kabzeel and Eder and Jagur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Kinah and Dimonah and Adadah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and Kedesh and Hazor and Ithnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ziph and Telem and Bealoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and Hazor-hadattah and Kerioth-hezron (that is, Hazor), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amam and Shema and Moladah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and Hazar-gaddah and Heshmon and Beth-pelet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Hazar-shual and Beersheba and Biziothiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Baalah and Iim and Ezem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and Eltolad and Chesil and Hormah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and Ziklag and Madmannah and Sansannah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: and Lebaoth and Shilhim and Ain and Rimmon; in all twenty-nine cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In the lowland: Eshtaol and Zorah and Ashnah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and Zanoah and En-gannim, Tappuah and Enam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jarmuth and Adullam, Socoh and Azekah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: and Shaaraim and Adithaim and Gederah and Gederothaim; fourteen cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zenan and Hadashah and Migdal-gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and Dilean and Mizpeh and Joktheel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lachish and Bozkath and Eglon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and Cabbon and Lahmas and Chitlish, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: and Gederoth, Beth-dagon and Naamah and Makkedah; sixteen cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Libnah and Ether and Ashan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and Iphtah and Ashnah and Nezib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: and Keilah and Achzib and Mareshah; nine cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ekron, with its '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: daughters
      - type: text
        text: ' and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: 'towns and villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: from Ekron even to the sea, all that were beside Ashdod, with their villages;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ashdod, with its towns and its villages; Gaza, with its towns and its villages; as far as the Brook of Egypt (Wadi el-Arish) and the Great [Mediterranean] Sea with its coastline.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'In the hill country: Shamir and Jattir and Socoh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'and Dannah and Kiriath-sannah (that is, Debir), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'and Anab and Eshtemoh and Anim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: and Goshen and Holon and Giloh; eleven cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Arab and Dumah and Eshan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'and Janum and Beth-tappuah and Aphekah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: and Humtah and Kiriath-arba (that is, Hebron), and Zior; nine cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Maon, Carmel and Ziph and Juttah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'and Jezreel and Jokdeam and Zanoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Kain, Gibeah and Timnah; ten cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Halhul, Beth-zur and Gedor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: and Maarath and Beth-anoth and Eltekon; six cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Kiriath-baal (that is, Kiriath-jearim), and Rabbah; two cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'In the wilderness [that slopes downward toward the Dead Sea]: Beth-arabah, Middin and Secacah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'and Nibshan and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:62 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps Qumran.
    marker-yv: yv-n
  - type: text
    text: City of Salt and Engedi; six cities with their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: But as for the Jebusites, the inhabitants of Jerusalem, the [tribe of the] sons of Judah were not able to drive them out; so the Jebusites live with the sons of Judah in Jerusalem to this day.
