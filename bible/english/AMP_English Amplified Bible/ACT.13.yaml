        children:
        - type: text
          text: This is Paul’s first recorded miracle.
      marker-yv: yv-n
    - type: text
      text: 'Now, watch! The hand of the Lord is on you, and you will be blind, [so blind that you will be] unable to see the sun for a time.” Immediately a mist and darkness fell upon him, and he groped around, seeking people to lead him by the hand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The proconsul believed [the message of salvation] when he saw what had happened, being astonished at the teaching concerning the Lord.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Paul and his companions sailed from Paphos and came to Perga in Pamphylia; but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John Mark and Barnabas were cousins and his departure caused a rift between Paul and Barnabas (15:37-39). The reason for his departure is not stated in Scripture.
      marker-yv: yv-n
    - type: text
      text: 'John [Mark] left them and went back to Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now they went on from Perga and arrived at Antioch in Pisidia, and on the Sabbath day they went into the synagogue and sat down. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
