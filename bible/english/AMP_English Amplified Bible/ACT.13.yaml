      children:
      - type: text
        text: or
    - type: text
      text: ' understand both Jesus and the voices of the prophets which are read every Sabbath, have fulfilled these [very prophecies] by condemning Him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And though they found no cause '
    - type: usfm
