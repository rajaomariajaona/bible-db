  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Paul and Barnabas were leaving [the synagogue], the people kept begging that these things might be spoken to them on the next Sabbath. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the congregation of the synagogue had been dismissed, many of the Jews and the devout converts to Judaism followed Paul and Barnabas, who, talking to them were urging them to continue in the grace of God.
