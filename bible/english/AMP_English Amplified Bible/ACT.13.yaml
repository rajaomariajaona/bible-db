      marker-yv: yv-n
    - type: text
      text: 'uplifted arm He led them out of there. [Ex 6:1, 6] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a period of about forty years He put up with their behavior in the wilderness. [Deut 1:31] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He had destroyed seven nations in the land of Canaan, He gave their land [to our ancestors] as an inheritance—this took about four hundred and fifty years. [Deut 7:1; Josh 14:1, 2] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were serving the Lord and fasting, the Holy Spirit said, “Set apart for Me Barnabas and Saul (Paul) for the work to which I have called them.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, He gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' judges until the prophet Samuel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they asked for a king, and God gave them Saul the son of Kish, a man of the tribe of Benjamin, for forty years. '
