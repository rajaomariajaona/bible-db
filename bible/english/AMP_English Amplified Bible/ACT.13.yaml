      - type: text
        text: or
    - type: text
      text: ' who do you think that I am? I am not He [the Christ]; but be aware, One is coming after me whose sandals I am not worthy to untie [even as His slave]!’'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Brothers, sons of Abraham’s family, and those among you who fear God, to us has been sent the message of this salvation [obtained through faith in Jesus Christ]. [Ps 107:20] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For those who live in Jerusalem, and their rulers, who failed to recognize '
    - type: usfm
