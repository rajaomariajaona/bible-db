      marker-yv: yv-n
    - type: text
      text: 'Before His coming John [the Baptist] had preached a baptism of repentance to all the people of Israel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as John was finishing his course [of ministry], he kept saying, ‘What '
    - type: usfm
