document_id: JDG.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philistines Oppress Again
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now Israel again did what was evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave them into the hands of the Philistines for forty years.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So the woman ran quickly and told her husband, “Behold, the Man who came to me the other day has appeared to me.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Manoah got up and followed his wife, and came to the Man and said to him, “Are you the Man who spoke to this woman?” He said, “I am.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And Manoah said, “Now when your words come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: true,
    - type: text
      text: ' what shall be the boy’s manner of life, and his vocation?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Manoah, “The woman must pay attention to everything that I said to her. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She may not eat anything that comes from the vine nor drink wine or [any other] intoxicating drink, nor eat anything [ceremonially] unclean. She shall observe everything that I commanded her.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then Manoah said to the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Please let us detain you and let us prepare a young goat for you [to eat].” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Manoah, “Though you detain me, I will not eat your food, but if you prepare a burnt offering, offer it to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” For Manoah did not know that he was the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Manoah said to the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “What is your name, so that when your words come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: true,
    - type: text
      text: ' we may honor you?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “Why do you ask my name, seeing it is wonderful (miraculous)?” [Is 9:6] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So Manoah took the young goat with the grain offering and offered it on the rock to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and He performed miracles while Manoah and his wife looked on. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And there was a certain man of Zorah, of the family of the Danites, whose name was Manoah; and his wife was infertile and had no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For when the flame went up toward heaven from the altar, the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' ascended in the altar flame. When Manoah and his wife saw this they fell on their faces to the ground.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did not appear again to Manoah or his wife. Then Manoah knew that he was the Angel of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Manoah said to his wife, “We will certainly die, because we have seen God.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But his [sensible] wife said to him, “If the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had desired to kill us, He would not have received a burnt offering and a grain offering from our hands, nor would He have shown us all these things, nor would He have announced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such things
    - type: text
      text: ' as these at this time.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So the woman [in due time] gave birth to a son and named him Samson; and the boy grew and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' blessed him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: And the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' began to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: trouble
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'stir him at times in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the camp of Dan.
      marker-yv: yv-n
    - type: text
      text: Mahaneh-dan, between Zorah and Eshtaol.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see v 22 and note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' appeared to the woman and said to her, “Behold, you are infertile and have no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children,
    - type: text
      text: ' but you shall conceive and give birth to a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Therefore, be careful not to drink wine or [any other] intoxicating drink, and do not eat anything [ceremonially] unclean. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For behold, you shall conceive and give birth to a son. No razor shall come upon his head, for the boy shall be a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The rules and regulations for a Nazirite are stated in Num 6:2-21. Ordinarily a person would take the vow of a Nazirite for a limited period of time as a voluntary act of dedication to God, but Samson’s was a special, divinely-ordained case.
      marker-yv: yv-n
    - type: text
      text: 'Nazirite [dedicated] to God from birth; and he shall begin to rescue Israel from the hands of the Philistines.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the woman went and told her husband, saying, “A Man of God came to me and his appearance was like the appearance of the Angel of God, very awesome. I did not ask Him where he came from, and he did not tell me his name. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But He said to me, ‘Behold, you shall conceive and give birth to a son, and now you shall not drink wine or [any other] intoxicating drink, nor eat anything [ceremonially] unclean, for the boy shall be a Nazirite to God from birth to the day of his death.’ ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then Manoah pleaded with the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and said, “O Lord, please let the Man of God whom You sent come again to us and teach us what we are to do for the boy who is to be born.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And God listened to the voice of Manoah; and the Angel of God came again to the woman as she sat in the field, but Manoah her husband was not with her. '
