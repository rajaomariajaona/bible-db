verses:
  '1':
  - type: heading
    content: Philistines Oppress Again
  - type: text
    content: Now Israel again did what was evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave them into the hands of the Philistines for forty years.'
  '10':
  - type: text
    content: 'So the woman ran quickly and told her husband, “Behold, the Man who came to me the other day has appeared to me.” '
  '11':
  - type: text
    content: 'Then Manoah got up and followed his wife, and came to the Man and said to him, “Are you the Man who spoke to this woman?” He said, “I am.” '
  '12':
  - type: text
    content: 'And Manoah said, “Now when your words come '
  - type: text
    content: true,
  - type: text
    content: ' what shall be the boy’s manner of life, and his vocation?” '
  '13':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Manoah, “The woman must pay attention to everything that I said to her. '
  '14':
  - type: text
    content: She may not eat anything that comes from the vine nor drink wine or [any other] intoxicating drink, nor eat anything [ceremonially] unclean. She shall observe everything that I commanded her.”
  '15':
  - type: text
    content: Then Manoah said to the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', “Please let us detain you and let us prepare a young goat for you [to eat].” '
  '16':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Manoah, “Though you detain me, I will not eat your food, but if you prepare a burnt offering, offer it to the L'
  - type: heading
    content: ord
  - type: text
    content: .” For Manoah did not know that he was the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '17':
  - type: text
    content: Manoah said to the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', “What is your name, so that when your words come '
  - type: text
    content: true,
  - type: text
    content: ' we may honor you?” '
  '18':
  - type: text
    content: But the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Why do you ask my name, seeing it is wonderful (miraculous)?” [Is 9:6] '
  '19':
  - type: text
    content: So Manoah took the young goat with the grain offering and offered it on the rock to the L
  - type: heading
    content: ord
  - type: text
    content: ', and He performed miracles while Manoah and his wife looked on. '
  '2':
  - type: text
    content: 'And there was a certain man of Zorah, of the family of the Danites, whose name was Manoah; and his wife was infertile and had no '
  - type: text
    content: children
  - type: text
    content: '. '
  '20':
  - type: text
    content: For when the flame went up toward heaven from the altar, the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' ascended in the altar flame. When Manoah and his wife saw this they fell on their faces to the ground.'
  '21':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' did not appear again to Manoah or his wife. Then Manoah knew that he was the Angel of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'So Manoah said to his wife, “We will certainly die, because we have seen God.” '
  '23':
  - type: text
    content: But his [sensible] wife said to him, “If the L
  - type: heading
    content: ord
  - type: text
    content: ' had desired to kill us, He would not have received a burnt offering and a grain offering from our hands, nor would He have shown us all these things, nor would He have announced '
  - type: text
    content: such things
  - type: text
    content: ' as these at this time.”'
  '24':
  - type: text
    content: So the woman [in due time] gave birth to a son and named him Samson; and the boy grew and the L
  - type: heading
    content: ord
  - type: text
    content: ' blessed him. '
  '25':
  - type: text
    content: And the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' began to '
  - type: note
    content: Or trouble.
  - type: text
    content: 'stir him at times in '
  - type: note
    content: I.e. the camp of Dan.
  - type: text
    content: Mahaneh-dan, between Zorah and Eshtaol.
  '3':
  - type: text
    content: 'And the '
  - type: note
    content: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see v 22 and note Gen 16:7).
  - type: text
    content: Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to the woman and said to her, “Behold, you are infertile and have no '
  - type: text
    content: children,
  - type: text
    content: ' but you shall conceive and give birth to a son. '
  '4':
  - type: text
    content: 'Therefore, be careful not to drink wine or [any other] intoxicating drink, and do not eat anything [ceremonially] unclean. '
  '5':
  - type: text
    content: 'For behold, you shall conceive and give birth to a son. No razor shall come upon his head, for the boy shall be a '
  - type: note
    content: The rules and regulations for a Nazirite are stated in Num 6:2-21. Ordinarily a person would take the vow of a Nazirite for a limited period of time as a voluntary act of dedication to God, but Samson’s was a special, divinely-ordained case.
  - type: text
    content: 'Nazirite [dedicated] to God from birth; and he shall begin to rescue Israel from the hands of the Philistines.” '
  '6':
  - type: text
    content: 'Then the woman went and told her husband, saying, “A Man of God came to me and his appearance was like the appearance of the Angel of God, very awesome. I did not ask Him where he came from, and he did not tell me his name. '
  '7':
  - type: text
    content: But He said to me, ‘Behold, you shall conceive and give birth to a son, and now you shall not drink wine or [any other] intoxicating drink, nor eat anything [ceremonially] unclean, for the boy shall be a Nazirite to God from birth to the day of his death.’ ”
  '8':
  - type: text
    content: Then Manoah pleaded with the L
  - type: heading
    content: ord
  - type: text
    content: ' and said, “O Lord, please let the Man of God whom You sent come again to us and teach us what we are to do for the boy who is to be born.” '
  '9':
  - type: text
    content: 'And God listened to the voice of Manoah; and the Angel of God came again to the woman as she sat in the field, but Manoah her husband was not with her. '
