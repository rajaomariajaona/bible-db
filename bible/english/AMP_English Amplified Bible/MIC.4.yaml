document_id: MIC.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peaceful Latter Days
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But it shall come about in the last days
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the mountain of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Shall be established as the highest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief of the mountains;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It shall be above the hills,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And peoples shall flow [like a river] to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And many nations shall come and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come, let us go up to the mountain of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the house of the God of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He may teach us about His ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that we may walk in His paths.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the law shall go forward from Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [the revelation about Him and His truth] from Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And He will judge between many peoples
- type: usfm
  marker: q1
  children:
  - type: text
    text: And render decisions for strong and distant nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they shall hammer their swords into plowshares
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their spears into pruning hooks [so that the implements of war may become the tools of agriculture];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation shall not lift up sword against nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor shall they ever again train for war. [Is 2:2-4; Joel 3:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Each of them shall sit [in security and peace] under his vine
- type: usfm
  marker: q1
  children:
  - type: text
    text: And under his fig tree,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With no one to make them afraid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the mouth of the [omnipotent] L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts has spoken it. [Zech 3:10]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For all the peoples [now] walk
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each in the name of his god [in a transient relationship],
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for us, we shall walk [securely]
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our [true] God forever and ever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶“In that day,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I shall assemble the lame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gather the outcasts [from foreign captivity],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even those whom I have caused pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I shall make the lame a [godly] remnant
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the outcasts a strong nation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall reign over them in Mount Zion'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From this time on and forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “As for you [Jerusalem], tower of the flock [of Israel],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stronghold of the Daughter of Zion (Jerusalem’s inhabitants),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To you the former dominion shall come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kingdom of the Daughter of Jerusalem [when the Messiah reigns in Jerusalem, and the times of the Gentiles are fulfilled]. [Luke 21:24]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶“Now, why do you cry out loudly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is there no king among you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has your counselor perished?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For agony has gripped you like a woman in childbirth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Writhe in pain and labor to give birth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Daughter of Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a woman in childbirth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For now you shall go out of the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Live in the field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And go to Babylon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There you will be rescued;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall redeem you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the hand of your enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Now many [conquering] nations are assembled against you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say, ‘Let her be profaned [through Gentile presence and the temple’s destruction],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let our eyes gaze on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gloat over Zion.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But they (Gentile nations) do not know the thoughts of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor do they understand His purpose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plan;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He has gathered them (Gentiles) like sheaves to the threshing floor [for destruction].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Arise and thresh, O Daughter of Zion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will make your horn iron
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will make your hoofs bronze;
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may beat many peoples in pieces [trampling down your enemies],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may devote to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their unjust gain (pagan possessions)'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their wealth to the Lord of all the earth. [Zech 12:1-8; 14:14]
