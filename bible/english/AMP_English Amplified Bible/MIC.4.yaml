verses:
  '1':
  - type: heading
    content: Peaceful Latter Days
  - type: text
    content: But it shall come about in the last days
  - type: text
    content: That the mountain of the house of the L
  - type: heading
    content: ord
  - type: text
    content: 'Shall be established as the highest '
  - type: text
    content: and
  - type: text
    content: ' chief of the mountains;'
  - type: text
    content: It shall be above the hills,
  - type: text
    content: And peoples shall flow [like a river] to it.
  '10':
  - type: text
    content: “Writhe in pain and labor to give birth,
  - type: text
    content: O Daughter of Zion,
  - type: text
    content: Like a woman in childbirth;
  - type: text
    content: For now you shall go out of the city,
  - type: text
    content: Live in the field,
  - type: text
    content: And go to Babylon.
  - type: text
    content: There you will be rescued;
  - type: text
    content: There the L
  - type: heading
    content: ord
  - type: text
    content: ' shall redeem you'
  - type: text
    content: From the hand of your enemies.
  '11':
  - type: text
    content: “Now many [conquering] nations are assembled against you,
  - type: text
    content: Who say, ‘Let her be profaned [through Gentile presence and the temple’s destruction],
  - type: text
    content: 'And let our eyes gaze on '
  - type: text
    content: and
  - type: text
    content: ' gloat over Zion.’'
  '12':
  - type: text
    content: “But they (Gentile nations) do not know the thoughts of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'Nor do they understand His purpose '
  - type: text
    content: and
  - type: text
    content: ' plan;'
  - type: text
    content: For He has gathered them (Gentiles) like sheaves to the threshing floor [for destruction].
  '13':
  - type: text
    content: “Arise and thresh, O Daughter of Zion!
  - type: text
    content: For I will make your horn iron
  - type: text
    content: And I will make your hoofs bronze;
  - type: text
    content: That you may beat many peoples in pieces [trampling down your enemies],
  - type: text
    content: That you may devote to the L
  - type: heading
    content: ord
  - type: text
    content: ' their unjust gain (pagan possessions)'
  - type: text
    content: And their wealth to the Lord of all the earth. [Zech 12:1-8; 14:14]
  '2':
  - type: text
    content: And many nations shall come and say,
  - type: text
    content: “Come, let us go up to the mountain of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: To the house of the God of Jacob,
  - type: text
    content: That He may teach us about His ways
  - type: text
    content: And that we may walk in His paths.”
  - type: text
    content: For the law shall go forward from Zion,
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' [the revelation about Him and His truth] from Jerusalem.'
  '3':
  - type: text
    content: And He will judge between many peoples
  - type: text
    content: And render decisions for strong and distant nations.
  - type: text
    content: Then they shall hammer their swords into plowshares
  - type: text
    content: And their spears into pruning hooks [so that the implements of war may become the tools of agriculture];
  - type: text
    content: Nation shall not lift up sword against nation,
  - type: text
    content: Nor shall they ever again train for war. [Is 2:2-4; Joel 3:10]
  '4':
  - type: text
    content: Each of them shall sit [in security and peace] under his vine
  - type: text
    content: And under his fig tree,
  - type: text
    content: With no one to make them afraid,
  - type: text
    content: For the mouth of the [omnipotent] L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has spoken it. [Zech 3:10]'
  '5':
  - type: text
    content: For all the peoples [now] walk
  - type: text
    content: Each in the name of his god [in a transient relationship],
  - type: text
    content: As for us, we shall walk [securely]
  - type: text
    content: In the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' our [true] God forever and ever.'
  '6':
  - type: text
    content: ¶“In that day,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “I shall assemble the lame,
  - type: text
    content: And gather the outcasts [from foreign captivity],
  - type: text
    content: Even those whom I have caused pain.
  '7':
  - type: text
    content: “I shall make the lame a [godly] remnant
  - type: text
    content: And the outcasts a strong nation;
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' shall reign over them in Mount Zion'
  - type: text
    content: From this time on and forever.
  '8':
  - type: text
    content: “As for you [Jerusalem], tower of the flock [of Israel],
  - type: text
    content: 'Hill '
  - type: text
    content: and
  - type: text
    content: ' stronghold of the Daughter of Zion (Jerusalem’s inhabitants),'
  - type: text
    content: To you the former dominion shall come,
  - type: text
    content: The kingdom of the Daughter of Jerusalem [when the Messiah reigns in Jerusalem, and the times of the Gentiles are fulfilled]. [Luke 21:24]
  '9':
  - type: text
    content: ¶“Now, why do you cry out loudly?
  - type: text
    content: Is there no king among you?
  - type: text
    content: Has your counselor perished?
  - type: text
    content: For agony has gripped you like a woman in childbirth.
