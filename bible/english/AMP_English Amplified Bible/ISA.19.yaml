document_id: ISA.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Message to Egypt
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning Egypt:'
  - type: text
    content: Listen carefully, the L
  - type: heading
    content: ord
  - type: text
    content: ' is riding on a swift cloud and is about to come to Egypt;'
  - type: text
    content: The idols of Egypt will tremble at His presence,
  - type: text
    content: And the heart of the Egyptians will melt within them.
  '10':
  - type: text
    content: '[Those who are] the pillars '
  - type: text
    content: and
  - type: text
    content: ' foundations '
  - type: text
    content: of Egypt
  - type: text
    content: ' will be crushed;'
  - type: text
    content: And all those who work for wages will be grieved in soul.
  '11':
  - type: text
    content: '¶The princes of '
  - type: note
    content: Or Tanis, an ancient capital of the Pharaohs.
  - type: text
    content: Zoan are complete fools;
  - type: text
    content: The counsel of the Pharaoh’s wisest advisors has become stupid.
  - type: text
    content: How can you say to Pharaoh,
  - type: text
    content: “I am a son of the wise, a son of ancient kings?”
  '12':
  - type: text
    content: Where then are your wise men?
  - type: text
    content: Please let them tell you,
  - type: text
    content: And let them understand what the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: Has purposed against Egypt [if they can].
  '13':
  - type: text
    content: The princes of Zoan have acted like fools,
  - type: text
    content: The princes of Memphis are deluded [and entertain false hope];
  - type: text
    content: Those who are
  - type: text
    content: ' the cornerstone of her tribes'
  - type: text
    content: Have led Egypt astray.
  '14':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has mixed a spirit of distortion within her;'
  - type: text
    content: Her leaders have caused Egypt to stagger in all that she does,
  - type: text
    content: As a drunken man staggers in his vomit.
  '15':
  - type: text
    content: There will be no work for Egypt
  - type: text
    content: Which head or tail, [high] palm branch or [low] bulrush, may do.
  '16':
  - type: text
    content: In that day the Egyptians will become like [helpless] women, and they will tremble and be frightened because of the waving of the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, which He is going to wave over them. '
  '17':
  - type: text
    content: The land of Judah [Assyria’s ally] will become a terror to the Egyptians; everyone to whom Judah is mentioned will be in dread of it, because of the purpose of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts which He is planning against Egypt.'
  '18':
  - type: text
    content: 'In that day five cities in the land of Egypt will speak the language of [the Hebrews of] Canaan and swear '
  - type: text
    content: allegiance
  - type: text
    content: ' to the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. One [of them] will be called the City of '
  - type: note
    content: A number of manuscripts read sun, so that the name is taken to be Heliopolis.
  - type: text
    content: Destruction.
  '19':
  - type: text
    content: In that day there will be an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ' in the midst of the land of Egypt, and a memorial stone to the L'
  - type: heading
    content: ord
  - type: text
    content: ' near its border. '
  '2':
  - type: text
    content: “So I will provoke Egyptians against Egyptians;
  - type: text
    content: And they will fight, each one against his brother and each one against his neighbor,
  - type: text
    content: City against city, kingdom against kingdom.
  '20':
  - type: text
    content: It will become a sign and a witness to the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts in the land of Egypt; for they will cry to the L'
  - type: heading
    content: ord
  - type: text
    content: ' because of oppressors, and He will send them a Savior, a [Great] Defender, and He will rescue them. [Judg 2:18; 3:9, 15] '
  '21':
  - type: text
    content: And so the L
  - type: heading
    content: ord
  - type: text
    content: ' will make Himself known to Egypt, and the Egyptians will know [heed, honor, and cherish] the L'
  - type: heading
    content: ord
  - type: text
    content: ' in that day. They will even worship with sacrifices [of animals] and offerings [of produce]; they will make a vow to the L'
  - type: heading
    content: ord
  - type: text
    content: ' and fulfill it. '
  '22':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will strike Egypt, striking but healing it; so they will return to the L'
  - type: heading
    content: ord
  - type: text
    content: ', and He will respond to them and heal them.'
  '23':
  - type: text
    content: 'In that day there will be a highway from Egypt to Assyria, and the Assyrians will come into Egypt and the Egyptians into Assyria; and the Egyptians will worship '
  - type: text
    content: and
  - type: text
    content: ' serve [the L'
  - type: heading
    content: ord
  - type: text
    content: '] with the Assyrians.'
  '24':
  - type: text
    content: 'In that day Israel will be the third '
  - type: text
    content: party
  - type: text
    content: ' with Egypt and with Assyria [in a Messianic league], a blessing in the midst of the earth, '
  '25':
  - type: text
    content: whom the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has blessed, saying, “Blessed is Egypt My people, and Assyria the work of My hands, and Israel My heritage.”'
  '3':
  - type: text
    content: '“Then the spirit of the Egyptians will become exhausted within them '
  - type: text
    content: and
  - type: text
    content: ' emptied out;'
  - type: text
    content: And I will confuse their strategy,
  - type: text
    content: So that they will consult the idols and the spirits of the dead,
  - type: text
    content: And mediums and soothsayers.
  '4':
  - type: text
    content: '“And I will hand over the Egyptians to a hard '
  - type: text
    content: and
  - type: text
    content: ' cruel master,'
  - type: text
    content: And a mighty king will rule over them,” declares the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts.'
  '5':
  - type: text
    content: ¶The waters from the sea will dry up,
  - type: text
    content: And the river will be parched and dry.
  '6':
  - type: text
    content: The canals will become foul-smelling,
  - type: text
    content: The streams of Egypt will thin out and dry up,
  - type: text
    content: The reeds and the rushes will rot away.
  '7':
  - type: text
    content: The meadows by the Nile, by the edge of the Nile,
  - type: text
    content: And all the sown fields of the Nile
  - type: text
    content: Will become dry, be blown away, and be no more.
  '8':
  - type: text
    content: The fishermen will lament (cry out in grief),
  - type: text
    content: And all those who cast a hook into the Nile will mourn,
  - type: text
    content: And those who spread nets upon the waters will languish.
  '9':
  - type: text
    content: Moreover, those who make linen from combed flax
  - type: text
    content: And those who weave white cloth will be ashamed.
