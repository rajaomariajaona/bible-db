document_id: ISA.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Message to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The [mournful, inspired] oracle (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an urgent message the prophet is under compulsion to proclaim.
      marker-yv: yv-n
    - type: text
      text: 'a burden to be carried) concerning Egypt:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is riding on a swift cloud and is about to come to Egypt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The idols of Egypt will tremble at His presence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the heart of the Egyptians will melt within them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '[Those who are] the pillars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foundations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Egypt
    - type: text
      text: ' will be crushed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all those who work for wages will be grieved in soul.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '¶The princes of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Tanis,
        - type: text
          text: ' an ancient capital of the Pharaohs.'
      marker-yv: yv-n
    - type: text
      text: Zoan are complete fools;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The counsel of the Pharaoh’s wisest advisors has become stupid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can you say to Pharaoh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am a son of the wise, a son of ancient kings?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Where then are your wise men?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please let them tell you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let them understand what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has purposed against Egypt [if they can].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The princes of Zoan have acted like fools,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princes of Memphis are deluded [and entertain false hope];
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Those who are
    - type: text
      text: ' the cornerstone of her tribes'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have led Egypt astray.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has mixed a spirit of distortion within her;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her leaders have caused Egypt to stagger in all that she does,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a drunken man staggers in his vomit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: There will be no work for Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which head or tail, [high] palm branch or [low] bulrush, may do.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: In that day the Egyptians will become like [helpless] women, and they will tremble and be frightened because of the waving of the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, which He is going to wave over them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The land of Judah [Assyria’s ally] will become a terror to the Egyptians; everyone to whom Judah is mentioned will be in dread of it, because of the purpose of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts which He is planning against Egypt.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'In that day five cities in the land of Egypt will speak the language of [the Hebrews of] Canaan and swear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allegiance
    - type: text
      text: ' to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. One [of them] will be called the City of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A number of manuscripts read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sun,
        - type: text
          text: ' so that the name is taken to be Heliopolis.'
      marker-yv: yv-n
    - type: text
      text: Destruction.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: In that day there will be an altar to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the midst of the land of Egypt, and a memorial stone to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' near its border. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “So I will provoke Egyptians against Egyptians;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will fight, each one against his brother and each one against his neighbor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: City against city, kingdom against kingdom.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: It will become a sign and a witness to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts in the land of Egypt; for they will cry to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' because of oppressors, and He will send them a Savior, a [Great] Defender, and He will rescue them. [Judg 2:18; 3:9, 15] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And so the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will make Himself known to Egypt, and the Egyptians will know [heed, honor, and cherish] the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in that day. They will even worship with sacrifices [of animals] and offerings [of produce]; they will make a vow to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and fulfill it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike Egypt, striking but healing it; so they will return to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and He will respond to them and heal them.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In that day there will be a highway from Egypt to Assyria, and the Assyrians will come into Egypt and the Egyptians into Assyria; and the Egyptians will worship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serve [the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] with the Assyrians.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'In that day Israel will be the third '
    - type: usfm
      marker: it
      children:
      - type: text
        text: party
    - type: text
      text: ' with Egypt and with Assyria [in a Messianic league], a blessing in the midst of the earth, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts has blessed, saying, “Blessed is Egypt My people, and Assyria the work of My hands, and Israel My heritage.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Then the spirit of the Egyptians will become exhausted within them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' emptied out;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will confuse their strategy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they will consult the idols and the spirits of the dead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And mediums and soothsayers.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“And I will hand over the Egyptians to a hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cruel master,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a mighty king will rule over them,” declares the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' of hosts.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶The waters from the sea will dry up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the river will be parched and dry.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The canals will become foul-smelling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The streams of Egypt will thin out and dry up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The reeds and the rushes will rot away.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The meadows by the Nile, by the edge of the Nile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the sown fields of the Nile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will become dry, be blown away, and be no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The fishermen will lament (cry out in grief),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all those who cast a hook into the Nile will mourn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who spread nets upon the waters will languish.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Moreover, those who make linen from combed flax
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who weave white cloth will be ashamed.
