    children:
    - type: text
      text: ord
  - type: text
    text: '. [Ex 3:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I appeared to Abraham, to Isaac, and to Jacob (Israel) as God Almighty [El Shaddai], but by My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 3:15.
    marker-yv: yv-n
  - type: text
    text: 'name, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
