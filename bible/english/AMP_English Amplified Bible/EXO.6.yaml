          children:
          - type: text
            text: with a strong hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: under compulsion he will [not only] let them go, but under compulsion he will drive them out of his land.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, tell Pharaoh king of Egypt to let the children of Israel go out of his land.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Moses said to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Look, [my own people] the Israelites have not listened to me; so how then will Pharaoh listen to me, for I am '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: uncircumcised of lips
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'unskilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inept in speech?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, and gave them a command concerning the Israelites and Pharaoh king of Egypt, to bring the Israelites out of the land of Egypt.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Heads of Israel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the heads of their fathers’ households. The sons of Reuben, Israel’s (Jacob’s) firstborn: Hanoch and Pallu, Hezron and Carmi; these are the families of Reuben. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman; these are the families of Simeon. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of the sons of Levi according to their births: Gershon, Kohath, and Merari; and Levi lived a hundred and thirty-seven years. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Gershon: Libni and Shimei, by their families. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amram (Moses’ father), Izhar, Hebron, and Uzziel; and Kohath lived a hundred and thirty-three years. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli and Mushi. These are the families of Levi according to their generations. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then God spoke further to Moses and said to him, “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Ex 3:14] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amram married his father’s sister Jochebed, and she gave birth to Aaron and Moses; and Amram lived a hundred and thirty-seven years. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Izhar: Korah, Nepheg, and Zichri. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Uzziel: Mishael, Elzaphan, and Sithri. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron married Elisheba, the daughter of Amminadab and the sister of Nahshon, and she gave birth to Nadab, Abihu, Eleazar, and Ithamar. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the [extended] families of the Korahites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eleazar, Aaron’s son, married one of the daughters of Putiel, and she gave birth to Phinehas. These are the heads of the fathers’ households of the Levites by their families. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are [the same] Aaron and Moses to whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Bring the children of Israel out of the land of Egypt by their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hosts
        - type: text
          text: . The Israelites left Egypt arranged by tribes as a quasi-army prepared to defend themselves, if necessary.
      marker-yv: yv-n
    - type: text
      text: 'armies.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were the ones who spoke to Pharaoh king of Egypt about bringing the Israelites out of Egypt; these are [the same] Moses and Aaron.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now it happened on the day when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses in the land of Egypt, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that He said, “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; tell Pharaoh king of Egypt everything that I say to you.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I appeared to Abraham, to Isaac, and to Jacob (Israel) as God Almighty [El Shaddai], but by My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 3:15.
      marker-yv: yv-n
    - type: text
      text: 'name, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH (Yahweh),
        - type: text
          text: ' usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ', i.e. the One who would redeem Israel.'
      marker-yv: yv-n
    - type: text
      text: L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I did not make Myself known to them [in acts and great miracles]. [Gen 17:1] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Moses said before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Look, I am '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: uncircumcised of lips
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'unskilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inept in speech; how then will Pharaoh listen to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to what I say?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also established My covenant with them, to give them the land of Canaan, the land in which they lived as strangers (temporary residents, foreigners). [Gen 12:1-3; 13:14-17; 15:18-21; 17:19; 26:3, 4; 28:13] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I have also heard the groaning of the sons of Israel, whom the Egyptians have enslaved, and I have [faithfully] remembered My covenant [with Abraham, Isaac, and Jacob]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, say to the children of Israel, ‘I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and I will bring you out from under the burdens of the Egyptians, and I will free you from their bondage. I will redeem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rescue you with an outstretched (vigorous, powerful) arm and with great acts of judgment [against Egypt]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I will take you for My people, and I will be your God; and you shall know that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who redeemed you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought you out from under the burdens of the Egyptians. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring you to the land which I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: lifted up My hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: swore to give to Abraham, Isaac, and Jacob (Israel); and I will give it to you as a possession. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [you have the promise of My changeless omnipotence and faithfulness].’ ” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses told this to the Israelites, but they did not listen to him because of their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shortness of spirit
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'impatience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despondency, and because of their forced labor.'
