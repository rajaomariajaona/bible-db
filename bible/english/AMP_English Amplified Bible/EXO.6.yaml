document_id: EXO.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God Promises Action
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Now you shall see what I will do to Pharaoh; for '
  - type: note
    content: Lit with a strong hand.
  - type: text
    content: under compulsion he will [not only] let them go, but under compulsion he will drive them out of his land.”
  '10':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '11':
  - type: text
    content: '“Go, tell Pharaoh king of Egypt to let the children of Israel go out of his land.” '
  '12':
  - type: text
    content: But Moses said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “Look, [my own people] the Israelites have not listened to me; so how then will Pharaoh listen to me, for I am '
  - type: note
    content: Lit uncircumcised of lips.
  - type: text
    content: 'unskilled '
  - type: text
    content: and
  - type: text
    content: ' inept in speech?” '
  '13':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, and gave them a command concerning the Israelites and Pharaoh king of Egypt, to bring the Israelites out of the land of Egypt.'
  - type: heading
    content: The Heads of Israel
  '14':
  - type: text
    content: 'These are the heads of their fathers’ households. The sons of Reuben, Israel’s (Jacob’s) firstborn: Hanoch and Pallu, Hezron and Carmi; these are the families of Reuben. '
  '15':
  - type: text
    content: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman; these are the families of Simeon. '
  '16':
  - type: text
    content: 'These are the names of the sons of Levi according to their births: Gershon, Kohath, and Merari; and Levi lived a hundred and thirty-seven years. '
  '17':
  - type: text
    content: 'The sons of Gershon: Libni and Shimei, by their families. '
  '18':
  - type: text
    content: 'The sons of Kohath: Amram (Moses’ father), Izhar, Hebron, and Uzziel; and Kohath lived a hundred and thirty-three years. '
  '19':
  - type: text
    content: 'The sons of Merari: Mahli and Mushi. These are the families of Levi according to their generations. '
  '2':
  - type: text
    content: Then God spoke further to Moses and said to him, “I am the L
  - type: heading
    content: ord
  - type: text
    content: '. [Ex 3:14] '
  '20':
  - type: text
    content: 'Amram married his father’s sister Jochebed, and she gave birth to Aaron and Moses; and Amram lived a hundred and thirty-seven years. '
  '21':
  - type: text
    content: 'The sons of Izhar: Korah, Nepheg, and Zichri. '
  '22':
  - type: text
    content: 'The sons of Uzziel: Mishael, Elzaphan, and Sithri. '
  '23':
  - type: text
    content: 'Aaron married Elisheba, the daughter of Amminadab and the sister of Nahshon, and she gave birth to Nadab, Abihu, Eleazar, and Ithamar. '
  '24':
  - type: text
    content: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the [extended] families of the Korahites. '
  '25':
  - type: text
    content: 'Eleazar, Aaron’s son, married one of the daughters of Putiel, and she gave birth to Phinehas. These are the heads of the fathers’ households of the Levites by their families. '
  '26':
  - type: text
    content: These are [the same] Aaron and Moses to whom the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Bring the children of Israel out of the land of Egypt by their '
  - type: note
    content: Or hosts. The Israelites left Egypt arranged by tribes as a quasi-army prepared to defend themselves, if necessary.
  - type: text
    content: 'armies.” '
  '27':
  - type: text
    content: They were the ones who spoke to Pharaoh king of Egypt about bringing the Israelites out of Egypt; these are [the same] Moses and Aaron.
  '28':
  - type: text
    content: Now it happened on the day when the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses in the land of Egypt, '
  '29':
  - type: text
    content: that He said, “I am the L
  - type: heading
    content: ord
  - type: text
    content: '; tell Pharaoh king of Egypt everything that I say to you.” '
  '3':
  - type: text
    content: 'I appeared to Abraham, to Isaac, and to Jacob (Israel) as God Almighty [El Shaddai], but by My '
  - type: note
    content: See note 3:15.
  - type: text
    content: 'name, '
  - type: note
    content: Heb YHWH (Yahweh), usually rendered Lord, i.e. the One who would redeem Israel.
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ', I did not make Myself known to them [in acts and great miracles]. [Gen 17:1] '
  '30':
  - type: text
    content: But Moses said before the L
  - type: heading
    content: ord
  - type: text
    content: ', “Look, I am '
  - type: note
    content: Lit uncircumcised of lips.
  - type: text
    content: 'unskilled '
  - type: text
    content: and
  - type: text
    content: ' inept in speech; how then will Pharaoh listen to me '
  - type: text
    content: and
  - type: text
    content: ' pay attention to what I say?”'
  '4':
  - type: text
    content: 'I also established My covenant with them, to give them the land of Canaan, the land in which they lived as strangers (temporary residents, foreigners). [Gen 12:1-3; 13:14-17; 15:18-21; 17:19; 26:3, 4; 28:13] '
  '5':
  - type: text
    content: 'And I have also heard the groaning of the sons of Israel, whom the Egyptians have enslaved, and I have [faithfully] remembered My covenant [with Abraham, Isaac, and Jacob]. '
  '6':
  - type: text
    content: Therefore, say to the children of Israel, ‘I am the L
  - type: heading
    content: ord
  - type: text
    content: ', and I will bring you out from under the burdens of the Egyptians, and I will free you from their bondage. I will redeem '
  - type: text
    content: and
  - type: text
    content: ' rescue you with an outstretched (vigorous, powerful) arm and with great acts of judgment [against Egypt]. '
  '7':
  - type: text
    content: Then I will take you for My people, and I will be your God; and you shall know that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who redeemed you '
  - type: text
    content: and
  - type: text
    content: ' brought you out from under the burdens of the Egyptians. '
  '8':
  - type: text
    content: 'I will bring you to the land which I '
  - type: note
    content: Lit lifted up My hand.
  - type: text
    content: swore to give to Abraham, Isaac, and Jacob (Israel); and I will give it to you as a possession. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' [you have the promise of My changeless omnipotence and faithfulness].’ ” '
  '9':
  - type: text
    content: 'Moses told this to the Israelites, but they did not listen to him because of their '
  - type: note
    content: Lit shortness of spirit.
  - type: text
    content: 'impatience '
  - type: text
    content: and
  - type: text
    content: ' despondency, and because of their forced labor.'
