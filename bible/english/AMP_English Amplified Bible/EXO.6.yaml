        children:
        - type: text
          text: ord
      - type: text
        text: ', i.e. the One who would redeem Israel.'
    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I did not make Myself known to them [in acts and great miracles]. [Gen 17:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I also established My covenant with them, to give them the land of Canaan, the land in which they lived as strangers (temporary residents, foreigners). [Gen 12:1-3; 13:14-17; 15:18-21; 17:19; 26:3, 4; 28:13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I have also heard the groaning of the sons of Israel, whom the Egyptians have enslaved, and I have [faithfully] remembered My covenant [with Abraham, Isaac, and Jacob]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore, say to the children of Israel, ‘I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and I will bring you out from under the burdens of the Egyptians, and I will free you from their bondage. I will redeem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rescue you with an outstretched (vigorous, powerful) arm and with great acts of judgment [against Egypt]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I will take you for My people, and I will be your God; and you shall know that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who redeemed you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brought you out from under the burdens of the Egyptians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will bring you to the land which I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lifted up My hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: swore to give to Abraham, Isaac, and Jacob (Israel); and I will give it to you as a possession. I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [you have the promise of My changeless omnipotence and faithfulness].’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moses told this to the Israelites, but they did not listen to him because of their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shortness of spirit
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'impatience '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despondency, and because of their forced labor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Go, tell Pharaoh king of Egypt to let the children of Israel go out of his land.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But Moses said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Look, [my own people] the Israelites have not listened to me; so how then will Pharaoh listen to me, for I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: uncircumcised of lips
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'unskilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inept in speech?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses and Aaron, and gave them a command concerning the Israelites and Pharaoh king of Egypt, to bring the Israelites out of the land of Egypt.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Heads of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These are the heads of their fathers’ households. The sons of Reuben, Israel’s (Jacob’s) firstborn: Hanoch and Pallu, Hezron and Carmi; these are the families of Reuben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Simeon: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul the son of a Canaanite woman; these are the families of Simeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are the names of the sons of Levi according to their births: Gershon, Kohath, and Merari; and Levi lived a hundred and thirty-seven years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Gershon: Libni and Shimei, by their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Kohath: Amram (Moses’ father), Izhar, Hebron, and Uzziel; and Kohath lived a hundred and thirty-three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Merari: Mahli and Mushi. These are the families of Levi according to their generations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amram married his father’s sister Jochebed, and she gave birth to Aaron and Moses; and Amram lived a hundred and thirty-seven years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Izhar: Korah, Nepheg, and Zichri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The sons of Uzziel: Mishael, Elzaphan, and Sithri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aaron married Elisheba, the daughter of Amminadab and the sister of Nahshon, and she gave birth to Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Korah: Assir, Elkanah, and Abiasaph. These are the [extended] families of the Korahites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eleazar, Aaron’s son, married one of the daughters of Putiel, and she gave birth to Phinehas. These are the heads of the fathers’ households of the Levites by their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: These are [the same] Aaron and Moses to whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “Bring the children of Israel out of the land of Egypt by their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hosts
      - type: text
        text: . The Israelites left Egypt arranged by tribes as a quasi-army prepared to defend themselves, if necessary.
    marker-yv: yv-n
  - type: text
    text: 'armies.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They were the ones who spoke to Pharaoh king of Egypt about bringing the Israelites out of Egypt; these are [the same] Moses and Aaron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Now it happened on the day when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses in the land of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: that He said, “I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; tell Pharaoh king of Egypt everything that I say to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But Moses said before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Look, I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: uncircumcised of lips
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'unskilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inept in speech; how then will Pharaoh listen to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to what I say?”'
