document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Whoever loves instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline loves knowledge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who hates reproof '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction is stupid.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A good man will obtain favor from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: But He will condemn a man who devises evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A man will not be established by wickedness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the root of the [consistently] righteous will not be moved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A virtuous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excellent wife [worthy of honor] is the crown of her husband,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But she who shames him [with her foolishness] is like rottenness in his bones. [Prov 31:23; 1 Cor 11:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purposes of the [consistently] righteous are just (honest, reliable),'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the counsels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' schemes of the wicked are deceitful.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The [malevolent] words of the wicked lie in wait for [innocent] blood [to slander],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the mouth of the upright will rescue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The wicked are overthrown [by their evil] and are no more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the house of the [consistently] righteous will stand [securely].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A man will be commended according to his insight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sound judgment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the one who is of a perverse mind will be despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first of many verses in Proverbs that use the “better…than” construction to emphasize contrasting positions.
    marker-yv: yv-n
  - type: text
    text: Better is he who is lightly esteemed and has a servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than he who [boastfully] honors himself [pretending to be what he is not] and lacks bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A righteous man has kind regard for the life of his animal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But even the compassion of the wicked is cruel. [Deut 25:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He who tills his land will have plenty of bread,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who follows worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things
  - type: text
    text: ' lacks common sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good judgment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The wicked desire the plunder of evil men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the root of the righteous yields '
  - type: usfm
    marker: it
    children:
    - type: text
      text: richer
  - type: text
    text: ' fruit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: An evil man is [dangerously] ensnared by the transgression of his lips,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the righteous will escape from trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A man will be satisfied with good from the fruit of his words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the deeds of a man’s hands will return to him [as a harvest].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The way of the [arrogant] fool [who rejects God’s wisdom] is right in his own eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But a wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prudent man is he who listens to counsel. [Prov 3:7; 9:9; 21:2]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The [arrogant] fool’s anger is quickly known [because he lacks self-control and common sense],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a prudent man ignores an insult.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He who speaks truth [when he testifies] tells what is right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a false witness utters deceit [in court].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: There is one who speaks rashly like the thrusts of a sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the tongue of the wise brings healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Truthful lips will be established forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a lying tongue is [credited] only for a moment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Deceit is in the heart of those who devise evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But counselors of peace have joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: No harm befalls the righteous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the wicked are filled with trouble. [Job 5:19; Ps 91:3; Prov 12:13; Is 46:4; Jer 1:8; Dan 6:27; 2 Tim 4:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lying lips are extremely disgusting to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: But those who deal faithfully are His delight. [Prov 6:17; 11:20; Rev 22:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A shrewd man is reluctant to display his knowledge [until the proper time],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the heart of [over-confident] fools proclaims foolishness. [Is 32:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The hand of the diligent will rule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the negligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lazy will be put to forced labor.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Anxiety in a man’s heart weighs it down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a good (encouraging) word makes it glad. [Is 50:4; Prov 15:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The righteous man is a guide to his neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the way of the wicked leads them astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The lazy man does not catch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' roast his prey,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the precious possession of a [wise] man is diligence [because he recognizes opportunities and seizes them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: In the way of righteousness is life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in its pathway there is no death [but immortality—eternal life]. [John 3:36; 4:36; 8:51; 11:26; 1 Cor 15:54; Gal 6:8]
