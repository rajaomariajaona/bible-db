document_id: PRO.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: 'Whoever loves instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline loves knowledge,'
  - type: text
    content: 'But he who hates reproof '
  - type: text
    content: and
  - type: text
    content: ' correction is stupid.'
  '10':
  - type: text
    content: A righteous man has kind regard for the life of his animal,
  - type: text
    content: But even the compassion of the wicked is cruel. [Deut 25:4]
  '11':
  - type: text
    content: He who tills his land will have plenty of bread,
  - type: text
    content: 'But he who follows worthless '
  - type: text
    content: things
  - type: text
    content: ' lacks common sense '
  - type: text
    content: and
  - type: text
    content: ' good judgment.'
  '12':
  - type: text
    content: The wicked desire the plunder of evil men,
  - type: text
    content: 'But the root of the righteous yields '
  - type: text
    content: richer
  - type: text
    content: ' fruit.'
  '13':
  - type: text
    content: An evil man is [dangerously] ensnared by the transgression of his lips,
  - type: text
    content: But the righteous will escape from trouble.
  '14':
  - type: text
    content: A man will be satisfied with good from the fruit of his words,
  - type: text
    content: And the deeds of a man’s hands will return to him [as a harvest].
  '15':
  - type: text
    content: The way of the [arrogant] fool [who rejects God’s wisdom] is right in his own eyes,
  - type: text
    content: 'But a wise '
  - type: text
    content: and
  - type: text
    content: ' prudent man is he who listens to counsel. [Prov 3:7; 9:9; 21:2]'
  '16':
  - type: text
    content: The [arrogant] fool’s anger is quickly known [because he lacks self-control and common sense],
  - type: text
    content: But a prudent man ignores an insult.
  '17':
  - type: text
    content: He who speaks truth [when he testifies] tells what is right,
  - type: text
    content: But a false witness utters deceit [in court].
  '18':
  - type: text
    content: There is one who speaks rashly like the thrusts of a sword,
  - type: text
    content: But the tongue of the wise brings healing.
  '19':
  - type: text
    content: Truthful lips will be established forever,
  - type: text
    content: But a lying tongue is [credited] only for a moment.
  '2':
  - type: text
    content: A good man will obtain favor from the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But He will condemn a man who devises evil.
  '20':
  - type: text
    content: Deceit is in the heart of those who devise evil,
  - type: text
    content: But counselors of peace have joy.
  '21':
  - type: text
    content: No harm befalls the righteous,
  - type: text
    content: But the wicked are filled with trouble. [Job 5:19; Ps 91:3; Prov 12:13; Is 46:4; Jer 1:8; Dan 6:27; 2 Tim 4:18]
  '22':
  - type: text
    content: Lying lips are extremely disgusting to the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But those who deal faithfully are His delight. [Prov 6:17; 11:20; Rev 22:15]
  '23':
  - type: text
    content: A shrewd man is reluctant to display his knowledge [until the proper time],
  - type: text
    content: But the heart of [over-confident] fools proclaims foolishness. [Is 32:6]
  '24':
  - type: text
    content: The hand of the diligent will rule,
  - type: text
    content: 'But the negligent '
  - type: text
    content: and
  - type: text
    content: ' lazy will be put to forced labor.'
  '25':
  - type: text
    content: Anxiety in a man’s heart weighs it down,
  - type: text
    content: But a good (encouraging) word makes it glad. [Is 50:4; Prov 15:13]
  '26':
  - type: text
    content: The righteous man is a guide to his neighbor,
  - type: text
    content: But the way of the wicked leads them astray.
  '27':
  - type: text
    content: 'The lazy man does not catch '
  - type: text
    content: and
  - type: text
    content: ' roast his prey,'
  - type: text
    content: But the precious possession of a [wise] man is diligence [because he recognizes opportunities and seizes them].
  '28':
  - type: text
    content: In the way of righteousness is life,
  - type: text
    content: And in its pathway there is no death [but immortality—eternal life]. [John 3:36; 4:36; 8:51; 11:26; 1 Cor 15:54; Gal 6:8]
  '3':
  - type: text
    content: A man will not be established by wickedness,
  - type: text
    content: But the root of the [consistently] righteous will not be moved.
  '4':
  - type: text
    content: 'A virtuous '
  - type: text
    content: and
  - type: text
    content: ' excellent wife [worthy of honor] is the crown of her husband,'
  - type: text
    content: But she who shames him [with her foolishness] is like rottenness in his bones. [Prov 31:23; 1 Cor 11:7]
  '5':
  - type: text
    content: 'The thoughts '
  - type: text
    content: and
  - type: text
    content: ' purposes of the [consistently] righteous are just (honest, reliable),'
  - type: text
    content: 'But the counsels '
  - type: text
    content: and
  - type: text
    content: ' schemes of the wicked are deceitful.'
  '6':
  - type: text
    content: The [malevolent] words of the wicked lie in wait for [innocent] blood [to slander],
  - type: text
    content: 'But the mouth of the upright will rescue '
  - type: text
    content: and
  - type: text
    content: ' protect them.'
  '7':
  - type: text
    content: The wicked are overthrown [by their evil] and are no more,
  - type: text
    content: But the house of the [consistently] righteous will stand [securely].
  '8':
  - type: text
    content: 'A man will be commended according to his insight '
  - type: text
    content: and
  - type: text
    content: ' sound judgment,'
  - type: text
    content: But the one who is of a perverse mind will be despised.
  '9':
  - type: text
    content: ' '
  - type: note
    content: This is the first of many verses in Proverbs that use the “better…than” construction to emphasize contrasting positions.
  - type: text
    content: Better is he who is lightly esteemed and has a servant,
  - type: text
    content: Than he who [boastfully] honors himself [pretending to be what he is not] and lacks bread.
