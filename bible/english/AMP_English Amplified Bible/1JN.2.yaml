document_id: 1JN.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Is Our Advocate
  - type: text
    content: 'My little children (believers, dear ones), I am writing you these things so that you will not sin '
  - type: text
    content: and
  - type: text
    content: ' violate God’s law. And if anyone sins, we have an Advocate [who will intercede for us] with the Father: Jesus Christ the righteous [the upright, the just One, who conforms to the Father’s will in every way—purpose, thought, and action]. '
  '10':
  - type: text
    content: 'The one who '
  - type: note
    content: The key to understanding this and other statements about love is to know that this love (the Greek word agape) is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.
  - type: text
    content: 'loves '
  - type: text
    content: and
  - type: text
    content: ' unselfishly seeks the best for his [believing] brother lives in the Light, and in him there is no occasion for stumbling '
  - type: text
    content: or
  - type: text
    content: ' offense [he does not hurt the cause of Christ or lead others to sin]. '
  '11':
  - type: text
    content: 'But the one who '
  - type: text
    content: habitually
  - type: text
    content: ' hates (works against) his brother [in Christ] is in [spiritual] darkness and is walking in the darkness, and does not know where he is going because the darkness has blinded his eyes.'
  '12':
  - type: text
    content: 'I am writing to you, little children (believers, dear ones), because your sins have been forgiven for His name’s sake [you have been pardoned and released from spiritual debt through His name because you have confessed His name, believing in Him as Savior]. '
  '13':
  - type: text
    content: 'I am writing to you, fathers [those believers who are spiritually mature], because you know Him who has existed from the beginning. I am writing to you, young men [those believers who are growing in spiritual maturity], because you have been victorious '
  - type: text
    content: and
  - type: text
    content: ' have overcome the evil one. I have written to you, children [those who are new believers, those spiritually immature], because you have come to know the Father. '
  '14':
  - type: text
    content: 'I have written to you, fathers, because you know Him who has existed from the beginning. I have written to you, young men, because you are strong '
  - type: text
    content: and
  - type: text
    content: ' vigorous, and the word of God remains [always] in you, and you have been victorious over the evil one [by accepting Jesus as Savior].'
  - type: heading
    content: Do Not Love the World
  '15':
  - type: text
    content: 'Do not love the world [of sin that opposes God and His precepts], nor the things that are in the world. If anyone loves the world, the love of the Father is not in him. '
  '16':
  - type: text
    content: 'For all that is in the world—the lust '
  - type: text
    content: and
  - type: text
    content: ' sensual craving of the flesh and the lust '
  - type: text
    content: and
  - type: text
    content: ' longing of the eyes and the boastful pride of life [pretentious confidence in one’s resources or in the stability of earthly things]—these do not come from the Father, but are from the world. '
  '17':
  - type: text
    content: 'The world is passing away, and with it its lusts [the shameful pursuits and ungodly longings]; but the one who does the will of God '
  - type: text
    content: and
  - type: text
    content: ' carries out His purposes lives forever.'
  '18':
  - type: text
    content: 'Children, it is the last hour [the end of this age]; and just as you heard that the antichrist is coming [the one who will oppose Christ and attempt to replace Him], even now many antichrists (false teachers) have appeared, which confirms our belief that it is the last hour. '
  '19':
  - type: text
    content: 'They went out from us [seeming at first to be Christians], but they were not '
  - type: text
    content: really
  - type: text
    content: ' of us [because they were not truly born again and spiritually transformed]; for if they had been of us, they would have remained with us; but '
  - type: text
    content: they went out
  - type: text
    content: ' [teaching false doctrine], so that it would be clearly shown that none of them are of us. '
  '2':
  - type: text
    content: And He [that same Jesus] is the propitiation for our sins [the atoning sacrifice that holds back the wrath of God that would otherwise be directed at us because of our sinful nature—our worldliness, our lifestyle]; and not for ours alone, but also for [the sins of all believers throughout] the whole world.
  '20':
  - type: text
    content: 'But you have an anointing from the Holy One [you have been set apart, specially gifted and prepared by the Holy Spirit], and all of you know [the truth because He teaches us, illuminates our minds, and guards us from error]. '
  '21':
  - type: text
    content: 'I have not written to you because you do not know the truth, but because you do know it, and because no lie [nothing false, no deception] is of the truth. '
  '22':
  - type: text
    content: 'Who is the liar but the one who denies that Jesus is the Christ (the Messiah, the Anointed)? This is the antichrist [the enemy and antagonist of Christ], the one who denies '
  - type: text
    content: and
  - type: text
    content: ' consistently refuses to acknowledge the Father and the Son. '
  '23':
  - type: text
    content: 'Whoever denies '
  - type: text
    content: and
  - type: text
    content: ' repudiates the Son does not have the Father; the one who confesses '
  - type: text
    content: and
  - type: text
    content: ' acknowledges the Son has the Father also. '
  '24':
  - type: text
    content: As for you, let that remain in you [keeping in your hearts that message of salvation] which you heard from the beginning. If what you heard from the beginning remains in you, you too will remain in the Son and in the Father [forever].
  - type: heading
    content: The Promise Is Eternal Life
  '25':
  - type: text
    content: This is the promise which He Himself promised us—eternal life.
  '26':
  - type: text
    content: 'These things I have written to you with reference to those who are trying to deceive you [seducing you and leading you away from the truth and sound doctrine]. '
  '27':
  - type: text
    content: 'As for you, the anointing [the special gift, the preparation] which you received from Him remains [permanently] in you, and you have no need for anyone to teach you. But just as His anointing teaches you [giving you insight through the presence of the Holy Spirit] about all things, and is true and is not a lie, and just as His anointing has taught you, '
  - type: note
    content: Or you are abiding.
  - type: text
    content: you must remain in Him [being rooted in Him, knit to Him].
  '28':
  - type: text
    content: 'Now, little children (believers, dear ones), remain in Him [with unwavering faith], so that when He appears [at His return], we may have [perfect] confidence and not be ashamed and shrink away from Him at His coming. '
  '29':
  - type: text
    content: 'If you know that He is '
  - type: text
    content: absolutely
  - type: text
    content: ' righteous, you know [for certain] that everyone who practices righteousness [doing what is right and conforming to God’s will] has been born of Him.'
  '3':
  - type: text
    content: 'And this is how we know [daily, by experience] that we have come to know Him [to understand Him and be more deeply acquainted with Him]: if we '
  - type: text
    content: habitually
  - type: text
    content: ' keep [focused on His precepts and obey] His commandments (teachings). '
  '4':
  - type: text
    content: 'Whoever says, “I have come to know Him,” but does not '
  - type: text
    content: habitually
  - type: text
    content: ' keep [focused on His precepts and obey] His commandments (teachings), is a liar, and the truth [of the divine word] is not in him. '
  '5':
  - type: text
    content: 'But whoever '
  - type: text
    content: habitually
  - type: text
    content: ' keeps His word '
  - type: text
    content: and
  - type: text
    content: ' obeys His precepts [and treasures His message in its entirety], in him the love of God has truly been perfected [it is completed and has reached maturity]. By this we know [for certain] that we are in Him: '
  '6':
  - type: text
    content: 'whoever says he lives in Christ [that is, whoever says he has accepted Him as God and Savior] ought [as a moral obligation] to walk '
  - type: text
    content: and
  - type: text
    content: ' conduct himself just as He walked '
  - type: text
    content: and
  - type: text
    content: ' conducted Himself.'
  '7':
  - type: text
    content: 'Beloved, I am not writing a new commandment to you, but an old commandment which you have had from the beginning; the old commandment is the message which you have heard [before from us]. [John 13:34, 35] '
  '8':
  - type: text
    content: 'On the other hand, I am writing a new commandment to you, which is true '
  - type: text
    content: and
  - type: text
    content: ' realized in Christ and in you, because the darkness [of moral blindness] is clearing away and the true Light [the revelation of God in Christ] is already shining. '
  '9':
  - type: text
    content: 'The one who says he is in the Light [in consistent fellowship with Christ] and yet '
  - type: note
    content: This focuses more on the self-centered, hateful actions (not the emotion) of someone who habitually cultivates an obstructionistic attitude, and ignores the command to act in a way that expresses unselfish Christian love (see note v 10).
  - type: text
    content: habitually
  - type: text
    content: ' hates (works against) his brother [in Christ] is in the darkness until now. '
