document_id: 1JN.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Christ Is Our Advocate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My little children (believers, dear ones), I am writing you these things so that you will not sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violate God’s law. And if anyone sins, we have an Advocate [who will intercede for us] with the Father: Jesus Christ the righteous [the upright, the just One, who conforms to the Father’s will in every way—purpose, thought, and action]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And He [that same Jesus] is the propitiation for our sins [the atoning sacrifice that holds back the wrath of God that would otherwise be directed at us because of our sinful nature—our worldliness, our lifestyle]; and not for ours alone, but also for [the sins of all believers throughout] the whole world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And this is how we know [daily, by experience] that we have come to know Him [to understand Him and be more deeply acquainted with Him]: if we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' keep [focused on His precepts and obey] His commandments (teachings). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Whoever says, “I have come to know Him,” but does not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' keep [focused on His precepts and obey] His commandments (teachings), is a liar, and the truth [of the divine word] is not in him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But whoever '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' keeps His word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeys His precepts [and treasures His message in its entirety], in him the love of God has truly been perfected [it is completed and has reached maturity]. By this we know [for certain] that we are in Him: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'whoever says he lives in Christ [that is, whoever says he has accepted Him as God and Savior] ought [as a moral obligation] to walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conduct himself just as He walked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conducted Himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Beloved, I am not writing a new commandment to you, but an old commandment which you have had from the beginning; the old commandment is the message which you have heard [before from us]. [John 13:34, 35] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On the other hand, I am writing a new commandment to you, which is true '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' realized in Christ and in you, because the darkness [of moral blindness] is clearing away and the true Light [the revelation of God in Christ] is already shining. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The one who says he is in the Light [in consistent fellowship with Christ] and yet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This focuses more on the self-centered, hateful actions (not the emotion) of someone who habitually cultivates an obstructionistic attitude, and ignores the command to act in a way that expresses unselfish Christian love (see note v 10).
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' hates (works against) his brother [in Christ] is in the darkness until now. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The one who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
    marker-yv: yv-n
  - type: text
    text: 'loves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unselfishly seeks the best for his [believing] brother lives in the Light, and in him there is no occasion for stumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' offense [he does not hurt the cause of Christ or lead others to sin]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the one who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: habitually
  - type: text
    text: ' hates (works against) his brother [in Christ] is in [spiritual] darkness and is walking in the darkness, and does not know where he is going because the darkness has blinded his eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I am writing to you, little children (believers, dear ones), because your sins have been forgiven for His name’s sake [you have been pardoned and released from spiritual debt through His name because you have confessed His name, believing in Him as Savior]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I am writing to you, fathers [those believers who are spiritually mature], because you know Him who has existed from the beginning. I am writing to you, young men [those believers who are growing in spiritual maturity], because you have been victorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have overcome the evil one. I have written to you, children [those who are new believers, those spiritually immature], because you have come to know the Father. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have written to you, fathers, because you know Him who has existed from the beginning. I have written to you, young men, because you are strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vigorous, and the word of God remains [always] in you, and you have been victorious over the evil one [by accepting Jesus as Savior].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Do Not Love the World
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Do not love the world [of sin that opposes God and His precepts], nor the things that are in the world. If anyone loves the world, the love of the Father is not in him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For all that is in the world—the lust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sensual craving of the flesh and the lust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' longing of the eyes and the boastful pride of life [pretentious confidence in one’s resources or in the stability of earthly things]—these do not come from the Father, but are from the world. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The world is passing away, and with it its lusts [the shameful pursuits and ungodly longings]; but the one who does the will of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carries out His purposes lives forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Children, it is the last hour [the end of this age]; and just as you heard that the antichrist is coming [the one who will oppose Christ and attempt to replace Him], even now many antichrists (false teachers) have appeared, which confirms our belief that it is the last hour. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They went out from us [seeming at first to be Christians], but they were not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: really
  - type: text
    text: ' of us [because they were not truly born again and spiritually transformed]; for if they had been of us, they would have remained with us; but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they went out
  - type: text
    text: ' [teaching false doctrine], so that it would be clearly shown that none of them are of us. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But you have an anointing from the Holy One [you have been set apart, specially gifted and prepared by the Holy Spirit], and all of you know [the truth because He teaches us, illuminates our minds, and guards us from error]. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I have not written to you because you do not know the truth, but because you do know it, and because no lie [nothing false, no deception] is of the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Who is the liar but the one who denies that Jesus is the Christ (the Messiah, the Anointed)? This is the antichrist [the enemy and antagonist of Christ], the one who denies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' consistently refuses to acknowledge the Father and the Son. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Whoever denies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repudiates the Son does not have the Father; the one who confesses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledges the Son has the Father also. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: As for you, let that remain in you [keeping in your hearts that message of salvation] which you heard from the beginning. If what you heard from the beginning remains in you, you too will remain in the Son and in the Father [forever].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Promise Is Eternal Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: This is the promise which He Himself promised us—eternal life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'These things I have written to you with reference to those who are trying to deceive you [seducing you and leading you away from the truth and sound doctrine]. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'As for you, the anointing [the special gift, the preparation] which you received from Him remains [permanently] in you, and you have no need for anyone to teach you. But just as His anointing teaches you [giving you insight through the presence of the Holy Spirit] about all things, and is true and is not a lie, and just as His anointing has taught you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: you are abiding
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: you must remain in Him [being rooted in Him, knit to Him].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now, little children (believers, dear ones), remain in Him [with unwavering faith], so that when He appears [at His return], we may have [perfect] confidence and not be ashamed and shrink away from Him at His coming. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'If you know that He is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: absolutely
  - type: text
    text: ' righteous, you know [for certain] that everyone who practices righteousness [doing what is right and conforming to God’s will] has been born of Him.'
