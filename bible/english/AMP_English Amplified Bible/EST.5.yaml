document_id: EST.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Plans a Banquet
  - type: text
    content: 'On the third day [of the fast] Esther put on her royal robes and stood in the inner court of the king’s palace opposite his [throne] room. The king was sitting on his royal throne, facing the [main] entrance of the palace. '
  '10':
  - type: text
    content: 'Nevertheless, Haman controlled himself and went home. There he sent for his friends and his wife Zeresh. '
  '11':
  - type: text
    content: 'Then Haman recounted to them the glory of his riches, the large number of his sons, and every '
  - type: text
    content: instance
  - type: text
    content: ' in which the king had magnified him and how he had promoted him over the officials and servants of the king. '
  '12':
  - type: text
    content: 'Haman also said, “Even Queen Esther let no one but me come with the king to the banquet she had prepared; and tomorrow also I am invited by her [together] with the king. '
  '13':
  - type: text
    content: 'Yet all of this does not satisfy me as long as I see Mordecai the Jew sitting at the king’s gate.” '
  '14':
  - type: text
    content: 'Then his wife Zeresh and all his friends said to him, “Have a gallows '
  - type: note
    content: I.e. about seventy-five feet. This may instead have been a pole or spike for impalement.
  - type: text
    content: fifty cubits high made, and in the morning ask the king to have Mordecai hanged on it; then go joyfully to the banquet with the king.” And the advice pleased Haman, so he had the gallows made.
  '2':
  - type: text
    content: 'When the king saw Esther the queen standing in the court, she found favor in his sight; and the king extended to her the golden scepter which was in his hand. So Esther approached and touched the top of the scepter. '
  '3':
  - type: text
    content: 'Then the king said to her, “What is '
  - type: text
    content: troubling
  - type: text
    content: ' you, Queen Esther? What is your request? It shall be given to you, '
  - type: note
    content: This was probably a common expression of great generosity, rather than a literal offer.
  - type: text
    content: 'up to half of the kingdom.” '
  '4':
  - type: text
    content: Esther said, “If it pleases the king, may the king and Haman come this day to the banquet that I have prepared for him.”
  '5':
  - type: text
    content: 'Then the king said, “Bring Haman quickly so that we may do as Esther says.” So the king and Haman came to the banquet which Esther had prepared. '
  '6':
  - type: text
    content: 'As they drank their wine at the banquet, the king said to Esther, “What is your '
  - type: note
    content: Having been sumptuously entertained at the banquet, the king was now obligated by tradition to grant Esther something better in return.
  - type: text
    content: 'petition? It shall be granted to you. And what is your request? Even to half of the kingdom it shall be done.” '
  '7':
  - type: text
    content: 'Then Esther replied, “My petition and my request is this: '
  '8':
  - type: text
    content: if I have found favor in the sight of the king, and if it pleases the king to grant my petition and to do as I request, may the king and Haman come to the banquet that I will prepare for them; and tomorrow I will do as the king says [and express my request].”
  - type: heading
    content: Haman’s Pride
  '9':
  - type: text
    content: 'Haman went away that day joyful and in good spirits. But when he saw Mordecai at the king’s gate refusing to stand up or show fear before him, he was filled with rage toward Mordecai. '
