document_id: EST.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther Plans a Banquet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the third day [of the fast] Esther put on her royal robes and stood in the inner court of the king’s palace opposite his [throne] room. The king was sitting on his royal throne, facing the [main] entrance of the palace. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When the king saw Esther the queen standing in the court, she found favor in his sight; and the king extended to her the golden scepter which was in his hand. So Esther approached and touched the top of the scepter. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the king said to her, “What is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: troubling
  - type: text
    text: ' you, Queen Esther? What is your request? It shall be given to you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was probably a common expression of great generosity, rather than a literal offer.
    marker-yv: yv-n
  - type: text
    text: 'up to half of the kingdom.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Esther said, “If it pleases the king, may the king and Haman come this day to the banquet that I have prepared for him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the king said, “Bring Haman quickly so that we may do as Esther says.” So the king and Haman came to the banquet which Esther had prepared. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As they drank their wine at the banquet, the king said to Esther, “What is your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Having been sumptuously entertained at the banquet, the king was now obligated by tradition to grant Esther something better in return.
    marker-yv: yv-n
  - type: text
    text: 'petition? It shall be granted to you. And what is your request? Even to half of the kingdom it shall be done.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Esther replied, “My petition and my request is this: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: if I have found favor in the sight of the king, and if it pleases the king to grant my petition and to do as I request, may the king and Haman come to the banquet that I will prepare for them; and tomorrow I will do as the king says [and express my request].”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Haman’s Pride
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haman went away that day joyful and in good spirits. But when he saw Mordecai at the king’s gate refusing to stand up or show fear before him, he was filled with rage toward Mordecai. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nevertheless, Haman controlled himself and went home. There he sent for his friends and his wife Zeresh. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Haman recounted to them the glory of his riches, the large number of his sons, and every '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instance
  - type: text
    text: ' in which the king had magnified him and how he had promoted him over the officials and servants of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Haman also said, “Even Queen Esther let no one but me come with the king to the banquet she had prepared; and tomorrow also I am invited by her [together] with the king. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet all of this does not satisfy me as long as I see Mordecai the Jew sitting at the king’s gate.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then his wife Zeresh and all his friends said to him, “Have a gallows '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about seventy-five feet. This may instead have been a pole or spike for impalement.
    marker-yv: yv-n
  - type: text
    text: fifty cubits high made, and in the morning ask the king to have Mordecai hanged on it; then go joyfully to the banquet with the king.” And the advice pleased Haman, so he had the gallows made.
