document_id: PRO.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Contrast the Upright and the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wise woman builds her house [on a foundation of godly precepts, and her household thrives],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the foolish one [who lacks spiritual insight] tears it down with her own hands [by ignoring godly principles].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart knows its own bitterness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no stranger shares its joy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The house of the wicked will be overthrown,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the tent of the upright will thrive.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is a way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which seems
    - type: text
      text: ' right to a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appears straight before him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But its end is the way of death.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in laughter the heart may be in pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the end of joy may be grief.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The backslider in heart will have his fill with his own [rotten] ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a good man will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be satisfied
    - type: text
      text: ' with his ways [the godly thought and action which his heart pursues and in which he delights].'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inexperienced person [is easily misled and] believes every word he hears,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the prudent man [is discreet and astute and] considers well where he is going.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise man suspects danger and cautiously avoids evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the fool is arrogant and careless.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A quick-tempered man acts foolishly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' without self-control,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a man of wicked schemes is hated.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The naive [are unsophisticated and easy to exploit and] inherit foolishness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the sensible [are thoughtful and far-sighted and] are crowned with knowledge.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The evil will bow down before the good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wicked [will bow down] at the gates of the righteous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who walks in uprightness [reverently] fears the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [and obeys and worships Him with profound respect],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who is devious in his ways despises Him.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor man is hated even by his neighbor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who love the rich are many.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who despises his neighbor sins [against God and his fellow man],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But happy [blessed and favored by God] is he who is gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciful to the poor.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do they not go astray who devise evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wander from the way of righteousness?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But kindness and truth will be to those who devise good.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In all labor there is profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But mere talk leads only to poverty.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crown of the wise is their wealth [of wisdom],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the foolishness of [closed-minded] fools is [nothing but] folly.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A truthful witness saves lives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who speaks lies is treacherous.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' there is strong confidence,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His children will [always] have a place of refuge.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that leads to obedience and worship] is a fountain of life,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that one may avoid the snares of death. [John 4:10, 14]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a multitude of people is a king’s glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in a lack of people is a [pretentious] prince’s ruin.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who is slow to anger has great understanding [and profits from his self-control],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who is quick-tempered exposes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalts his foolishness [for all to see]. [Prov 16:32; James 1:19]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the mouth of the [arrogant] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:7.
      marker-yv: yv-n
    - type: text
      text: fool [who rejects God] is a rod for his back,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the lips of the wise [when they speak with godly wisdom] will protect them.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A calm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peaceful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tranquil heart is life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' health to the body,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But passion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' envy are like rottenness to the bones.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who oppresses the poor taunts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insults his Maker,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who is kind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gracious to the needy honors Him. [Prov 17:5; Matt 25:40, 45]'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked is overthrown through his wrongdoing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the righteous has hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a refuge [with God] even in death.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom rests [silently] in the heart of one who has understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what is in the heart of [shortsighted] fools is made known. [Is 32:6]
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness [moral and spiritual integrity and virtuous character] exalts a nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But sin is a disgrace to any people.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The king’s favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' good will are toward a servant who acts wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discreetly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But his anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath are toward him who acts shamefully. [Matt 24:45, 47]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where there are no oxen, the manger is clean,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But much revenue [because of good crops] comes by the strength of the ox.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy witness will not lie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a false witness speaks lies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A scoffer seeks wisdom and finds none [for his ears are closed to wisdom],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But knowledge is easy for one who understands [because he is willing to learn].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave the presence of a [shortsighted] fool,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you will not find knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hear godly wisdom from his lips.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wisdom of the sensible is to understand his way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the foolishness of [shortsighted] fools is deceit.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools mock sin [but sin mocks the fools],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But among the upright there is good will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessing of God. [Prov 10:23]'
