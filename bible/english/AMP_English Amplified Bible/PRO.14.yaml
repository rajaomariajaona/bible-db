document_id: PRO.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: The wise woman builds her house [on a foundation of godly precepts, and her household thrives],
  - type: text
    content: But the foolish one [who lacks spiritual insight] tears it down with her own hands [by ignoring godly principles].
  '10':
  - type: text
    content: The heart knows its own bitterness,
  - type: text
    content: And no stranger shares its joy.
  '11':
  - type: text
    content: The house of the wicked will be overthrown,
  - type: text
    content: But the tent of the upright will thrive.
  '12':
  - type: text
    content: 'There is a way '
  - type: text
    content: which seems
  - type: text
    content: ' right to a man '
  - type: text
    content: and
  - type: text
    content: ' appears straight before him,'
  - type: text
    content: But its end is the way of death.
  '13':
  - type: text
    content: Even in laughter the heart may be in pain,
  - type: text
    content: And the end of joy may be grief.
  '14':
  - type: text
    content: The backslider in heart will have his fill with his own [rotten] ways,
  - type: text
    content: 'But a good man will '
  - type: text
    content: be satisfied
  - type: text
    content: ' with his ways [the godly thought and action which his heart pursues and in which he delights].'
  '15':
  - type: text
    content: 'The naive '
  - type: text
    content: or
  - type: text
    content: ' inexperienced person [is easily misled and] believes every word he hears,'
  - type: text
    content: But the prudent man [is discreet and astute and] considers well where he is going.
  '16':
  - type: text
    content: A wise man suspects danger and cautiously avoids evil,
  - type: text
    content: But the fool is arrogant and careless.
  '17':
  - type: text
    content: 'A quick-tempered man acts foolishly '
  - type: text
    content: and
  - type: text
    content: ' without self-control,'
  - type: text
    content: And a man of wicked schemes is hated.
  '18':
  - type: text
    content: The naive [are unsophisticated and easy to exploit and] inherit foolishness,
  - type: text
    content: But the sensible [are thoughtful and far-sighted and] are crowned with knowledge.
  '19':
  - type: text
    content: The evil will bow down before the good,
  - type: text
    content: And the wicked [will bow down] at the gates of the righteous.
  '2':
  - type: text
    content: He who walks in uprightness [reverently] fears the L
  - type: heading
    content: ord
  - type: text
    content: ' [and obeys and worships Him with profound respect],'
  - type: text
    content: But he who is devious in his ways despises Him.
  '20':
  - type: text
    content: The poor man is hated even by his neighbor,
  - type: text
    content: But those who love the rich are many.
  '21':
  - type: text
    content: He who despises his neighbor sins [against God and his fellow man],
  - type: text
    content: 'But happy [blessed and favored by God] is he who is gracious '
  - type: text
    content: and
  - type: text
    content: ' merciful to the poor.'
  '22':
  - type: text
    content: 'Do they not go astray who devise evil '
  - type: text
    content: and
  - type: text
    content: ' wander from the way of righteousness?'
  - type: text
    content: But kindness and truth will be to those who devise good.
  '23':
  - type: text
    content: In all labor there is profit,
  - type: text
    content: But mere talk leads only to poverty.
  '24':
  - type: text
    content: The crown of the wise is their wealth [of wisdom],
  - type: text
    content: But the foolishness of [closed-minded] fools is [nothing but] folly.
  '25':
  - type: text
    content: A truthful witness saves lives,
  - type: text
    content: But he who speaks lies is treacherous.
  '26':
  - type: text
    content: In the [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' there is strong confidence,'
  - type: text
    content: And His children will [always] have a place of refuge.
  '27':
  - type: text
    content: The [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that leads to obedience and worship] is a fountain of life,'
  - type: text
    content: So that one may avoid the snares of death. [John 4:10, 14]
  '28':
  - type: text
    content: In a multitude of people is a king’s glory,
  - type: text
    content: But in a lack of people is a [pretentious] prince’s ruin.
  '29':
  - type: text
    content: He who is slow to anger has great understanding [and profits from his self-control],
  - type: text
    content: 'But he who is quick-tempered exposes '
  - type: text
    content: and
  - type: text
    content: ' exalts his foolishness [for all to see]. [Prov 16:32; James 1:19]'
  '3':
  - type: text
    content: 'In the mouth of the [arrogant] '
  - type: note
    content: See note 1:7.
  - type: text
    content: fool [who rejects God] is a rod for his back,
  - type: text
    content: But the lips of the wise [when they speak with godly wisdom] will protect them.
  '30':
  - type: text
    content: 'A calm '
  - type: text
    content: and
  - type: text
    content: ' peaceful '
  - type: text
    content: and
  - type: text
    content: ' tranquil heart is life '
  - type: text
    content: and
  - type: text
    content: ' health to the body,'
  - type: text
    content: 'But passion '
  - type: text
    content: and
  - type: text
    content: ' envy are like rottenness to the bones.'
  '31':
  - type: text
    content: 'He who oppresses the poor taunts '
  - type: text
    content: and
  - type: text
    content: ' insults his Maker,'
  - type: text
    content: 'But he who is kind '
  - type: text
    content: and
  - type: text
    content: ' merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to the needy honors Him. [Prov 17:5; Matt 25:40, 45]'
  '32':
  - type: text
    content: The wicked is overthrown through his wrongdoing,
  - type: text
    content: 'But the righteous has hope '
  - type: text
    content: and
  - type: text
    content: ' confidence '
  - type: text
    content: and
  - type: text
    content: ' a refuge [with God] even in death.'
  '33':
  - type: text
    content: Wisdom rests [silently] in the heart of one who has understanding,
  - type: text
    content: But what is in the heart of [shortsighted] fools is made known. [Is 32:6]
  '34':
  - type: text
    content: Righteousness [moral and spiritual integrity and virtuous character] exalts a nation,
  - type: text
    content: But sin is a disgrace to any people.
  '35':
  - type: text
    content: 'The king’s favor '
  - type: text
    content: and
  - type: text
    content: ' good will are toward a servant who acts wisely '
  - type: text
    content: and
  - type: text
    content: ' discreetly,'
  - type: text
    content: 'But his anger '
  - type: text
    content: and
  - type: text
    content: ' wrath are toward him who acts shamefully. [Matt 24:45, 47]'
  '4':
  - type: text
    content: Where there are no oxen, the manger is clean,
  - type: text
    content: But much revenue [because of good crops] comes by the strength of the ox.
  '5':
  - type: text
    content: 'A faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy witness will not lie,'
  - type: text
    content: But a false witness speaks lies.
  '6':
  - type: text
    content: A scoffer seeks wisdom and finds none [for his ears are closed to wisdom],
  - type: text
    content: But knowledge is easy for one who understands [because he is willing to learn].
  '7':
  - type: text
    content: Leave the presence of a [shortsighted] fool,
  - type: text
    content: 'For you will not find knowledge '
  - type: text
    content: or
  - type: text
    content: ' hear godly wisdom from his lips.'
  '8':
  - type: text
    content: The wisdom of the sensible is to understand his way,
  - type: text
    content: But the foolishness of [shortsighted] fools is deceit.
  '9':
  - type: text
    content: Fools mock sin [but sin mocks the fools],
  - type: text
    content: 'But among the upright there is good will '
  - type: text
    content: and
  - type: text
    content: ' the favor '
  - type: text
    content: and
  - type: text
    content: ' blessing of God. [Prov 10:23]'
