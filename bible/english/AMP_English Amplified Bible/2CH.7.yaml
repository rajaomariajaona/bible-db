document_id: 2CH.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Shekinah Glory
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Solomon had finished praying, fire came down from heaven and consumed the burnt offering and the sacrifices, and the [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This term is not found in the Bible, but was used by the ancient rabbis to refer to the divine presence.
    marker-yv: yv-n
  - type: text
    text: 'Shekinah] glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' filled the house. [Lev 9:24] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The priests could not enter the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' because the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had filled the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When all the people of Israel saw how the fire came down and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saw
  - type: text
    text: ' the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' upon the house, they bowed down on the stone pavement with their faces to the ground, and they worshiped and praised the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “For He is good, for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness endure forever.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sacrifices Offered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the king and all the people offered a sacrifice before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'King Solomon offered a sacrifice of 22,000 oxen and 120,000 sheep. In this way the king and all the people dedicated God’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The priests stood at their posts [ready for service], and the Levites also, with the musical instruments of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which King David had made to praise the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “For His lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy endure forever,” whenever David offered praise through their ministry. The priests were opposite the Levites blowing the trumpets and all Israel was standing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moreover, Solomon consecrated the middle of the courtyard that was in front of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for it was there that he offered burnt offerings and the fat of the peace offerings because the bronze altar which he had made was not sufficient to hold the burnt offerings, the grain offerings, and the fat [all together].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Feast of Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'At that time Solomon observed the feast for seven days, and all Israel with him, a very large assembly, from the entrance of Hamath to the Brook of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On the eighth day they held a celebration, for they had observed the dedication of the altar for seven days, and the feast for seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And on the twenty-third day of the seventh month Solomon sent the people to their tents, rejoicing and happy in heart because of the goodness that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had shown to David, to Solomon, and to His people Israel.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Promise and Warning
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And so Solomon finished the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the palace of the king. He successfully accomplished all that he had planned to do in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and in his palace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared to Solomon by night and said to him: “I have heard your prayer and have chosen this place for Myself as a house of sacrifice. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If I shut up the heavens so that no rain falls, or if I command locusts to devour the land, or if I send pestilence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plague among My people, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and My people, who are called by My Name, humble themselves, and pray and seek (crave, require as a necessity) My face and turn from their wicked ways, then I will hear [them] from heaven, and forgive their sin and heal their land. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now My eyes will be open and My ears attentive to prayer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: offered
  - type: text
    text: ' in this place. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For now I have chosen and sanctified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart for My purpose this house that My Name may be here forever, and My eyes and My heart will be here perpetually. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'As for you [Solomon], if you will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. conduct yourself, live your life.
    marker-yv: yv-n
  - type: text
    text: 'walk before me as your father David walked, and do everything that I have commanded you, and observe My statutes and My ordinances, [1 Kin 11:1-11] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: then I will establish your royal throne just as I covenanted with your father David, saying, ‘You will not fail to have a man as ruler in Israel.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“But if you [people] turn away and abandon My statutes and My commandments which I have set before you, and you go and serve other gods and worship them, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'then I will uproot Israel from My land which I have given them; and I will cast this house, which I have consecrated for My Name, out of My sight, and will make it a proverb and an object of scorn among all nations. [Jer 24:9, 10] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And as for this house, which was so exalted, everyone who passes by it will be astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled and say, ‘Why has the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' done thus to this land and to this house?’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then people will say, ‘It is because they abandoned the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of their fathers, who brought them out of the land of Egypt, and they adopted other gods, and worshiped them and served them; therefore He has brought all this adversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil on them.’ ”'
