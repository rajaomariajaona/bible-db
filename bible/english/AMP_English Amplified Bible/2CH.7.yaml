    content: The Shekinah Glory
  - type: text
    content: When Solomon had finished praying, fire came down from heaven and consumed the burnt offering and the sacrifices, and the [
  - type: note
    content: This term is not found in the Bible, but was used by the ancient rabbis to refer to the divine presence.
  - type: text
    content: 'Shekinah] glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' filled the house. [Lev 9:24] '
  '10':
  - type: text
    content: And on the twenty-third day of the seventh month Solomon sent the people to their tents, rejoicing and happy in heart because of the goodness that the L
  - type: heading
    content: ord
  - type: text
    content: ' had shown to David, to Solomon, and to His people Israel.'
  - type: heading
    content: God’s Promise and Warning
  '11':
  - type: text
    content: And so Solomon finished the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the palace of the king. He successfully accomplished all that he had planned to do in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and in his palace.'
  '12':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to Solomon by night and said to him: “I have heard your prayer and have chosen this place for Myself as a house of sacrifice. '
  '13':
  - type: text
    content: 'If I shut up the heavens so that no rain falls, or if I command locusts to devour the land, or if I send pestilence '
  - type: text
    content: and
  - type: text
    content: ' plague among My people, '
  '14':
  - type: text
    content: 'and My people, who are called by My Name, humble themselves, and pray and seek (crave, require as a necessity) My face and turn from their wicked ways, then I will hear [them] from heaven, and forgive their sin and heal their land. '
  '15':
  - type: text
    content: 'Now My eyes will be open and My ears attentive to prayer '
  - type: text
    content: offered
  - type: text
    content: ' in this place. '
  '16':
  - type: text
    content: 'For now I have chosen and sanctified '
  - type: text
    content: and
  - type: text
    content: ' set apart for My purpose this house that My Name may be here forever, and My eyes and My heart will be here perpetually. '
  '17':
  - type: text
    content: 'As for you [Solomon], if you will '
  - type: note
    content: I.e. conduct yourself, live your life.
  - type: text
    content: 'walk before me as your father David walked, and do everything that I have commanded you, and observe My statutes and My ordinances, [1 Kin 11:1-11] '
  '18':
  - type: text
    content: then I will establish your royal throne just as I covenanted with your father David, saying, ‘You will not fail to have a man as ruler in Israel.’
  '19':
  - type: text
    content: '“But if you [people] turn away and abandon My statutes and My commandments which I have set before you, and you go and serve other gods and worship them, '
  '2':
  - type: text
    content: The priests could not enter the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' because the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' had filled the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house. '
  '20':
  - type: text
    content: 'then I will uproot Israel from My land which I have given them; and I will cast this house, which I have consecrated for My Name, out of My sight, and will make it a proverb and an object of scorn among all nations. [Jer 24:9, 10] '
  '21':
  - type: text
    content: 'And as for this house, which was so exalted, everyone who passes by it will be astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled and say, ‘Why has the L'
  - type: heading
    content: ord
  - type: text
    content: ' done thus to this land and to this house?’ '
  '22':
  - type: text
    content: Then people will say, ‘It is because they abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, who brought them out of the land of Egypt, and they adopted other gods, and worshiped them and served them; therefore He has brought all this adversity '
  - type: text
    content: and
  - type: text
    content: ' evil on them.’ ”'
  '3':
  - type: text
    content: 'When all the people of Israel saw how the fire came down and '
  - type: text
    content: saw
  - type: text
    content: ' the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' upon the house, they bowed down on the stone pavement with their faces to the ground, and they worshiped and praised the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  - type: text
    content: saying,
  - type: text
    content: ' “For He is good, for His mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness endure forever.”'
  - type: heading
    content: Sacrifices Offered
  '4':
  - type: text
    content: Then the king and all the people offered a sacrifice before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'King Solomon offered a sacrifice of 22,000 oxen and 120,000 sheep. In this way the king and all the people dedicated God’s house. '
  '6':
  - type: text
    content: The priests stood at their posts [ready for service], and the Levites also, with the musical instruments of the L
  - type: heading
    content: ord
  - type: text
    content: ' which King David had made to praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  - type: text
    content: saying,
  - type: text
    content: ' “For His lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' mercy endure forever,” whenever David offered praise through their ministry. The priests were opposite the Levites blowing the trumpets and all Israel was standing.'
  '7':
  - type: text
    content: Moreover, Solomon consecrated the middle of the courtyard that was in front of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', for it was there that he offered burnt offerings and the fat of the peace offerings because the bronze altar which he had made was not sufficient to hold the burnt offerings, the grain offerings, and the fat [all together].'
  - type: heading
    content: The Feast of Dedication
  '8':
  - type: text
    content: 'At that time Solomon observed the feast for seven days, and all Israel with him, a very large assembly, from the entrance of Hamath to the Brook of Egypt. '
  '9':
  - type: text
    content: 'On the eighth day they held a celebration, for they had observed the dedication of the altar for seven days, and the feast for seven days. '
