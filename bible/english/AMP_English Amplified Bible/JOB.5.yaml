document_id: JOB.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Is Just
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Call now—is there anyone who will answer you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to which of the holy ones (angels) will you turn?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “He gives rain upon the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sends waters upon the fields,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So that He sets on high those who are lowly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He lifts to safety those who mourn.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“He frustrates the devices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' schemes of the crafty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that their hands cannot attain success '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' achieve anything of [lasting] worth.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “He catches the [so-called] wise in their own shrewdness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the advice of the devious is quickly thwarted. [1 Cor 3:19, 20]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “In the daytime they meet in darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And at noon they grope as in the night.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “But God saves [the innocent] from the sword of the mouth of the devious,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the poor from the hand of the mighty.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “So the helpless have hope,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And injustice shuts its mouth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '¶“Behold, how happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortunate is the man whom God reproves,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So do not despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reject the discipline of the Almighty [subjecting you to trial and suffering].'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“For He inflicts pain, but He binds up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gives relief;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He wounds, but His hands also heal.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “He will rescue you from six troubles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in seven, evil will not touch you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “For anger slays the foolish man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And jealousy kills the simple (naive).
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “In famine He will redeem you from death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in war from the power of the sword.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “You will be hidden from the scourge of the tongue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will not be afraid of destruction when it comes.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “You will laugh at violence and famine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will not be afraid of the wild beasts of the earth.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “For you will be in harmony with the stones of the field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the beasts of the field will be at peace with you.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“You will know also that your tent is secure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' at peace,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will visit your dwelling and fear no loss [nor find anything amiss].
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “You will know also that your descendants will be many,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your offspring as the grass of the earth.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “You will come to your grave in old age,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the stacking of grain [on the threshing floor] in its season.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Behold this; we have investigated it, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' it is true.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed it, and know for yourself [for your own good].”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I have seen the foolish taking root [and outwardly prospering],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I cursed his dwelling immediately [for his destruction was certain].
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “His children are far from safety [and included in their father’s ruin],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are oppressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crushed in the [court of justice in the city’s] gate,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there is no '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: deliverer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'one to rescue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “The hungry devour his harvest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take it even [when it grows] among the thorns;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The trap opens for [his] wealth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “For affliction does not come forth from the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does trouble spring forth from the ground.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “For man is born for trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[As naturally] as sparks fly upward.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '¶“As for me, I would seek God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inquire of Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I would commit my cause to God;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Who does great and unsearchable things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marvelous things without number.
