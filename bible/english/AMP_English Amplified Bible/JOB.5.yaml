type_code: eng
verses:
  '1':
  - type: heading
    content: God Is Just
  - type: text
    content: “Call now—is there anyone who will answer you?
  - type: text
    content: And to which of the holy ones (angels) will you turn?
  '10':
  - type: text
    content: “He gives rain upon the earth
  - type: text
    content: And sends waters upon the fields,
  '11':
  - type: text
    content: So that He sets on high those who are lowly,
  - type: text
    content: And He lifts to safety those who mourn.
  '12':
  - type: text
    content: '“He frustrates the devices '
  - type: text
    content: and
  - type: text
    content: ' schemes of the crafty,'
  - type: text
    content: 'So that their hands cannot attain success '
  - type: text
    content: or
  - type: text
    content: ' achieve anything of [lasting] worth.'
  '13':
  - type: text
    content: “He catches the [so-called] wise in their own shrewdness,
  - type: text
    content: And the advice of the devious is quickly thwarted. [1 Cor 3:19, 20]
  '14':
  - type: text
    content: “In the daytime they meet in darkness,
  - type: text
    content: And at noon they grope as in the night.
  '15':
  - type: text
    content: “But God saves [the innocent] from the sword of the mouth of the devious,
  - type: text
    content: And the poor from the hand of the mighty.
  '16':
  - type: text
    content: “So the helpless have hope,
  - type: text
    content: And injustice shuts its mouth.
  '17':
  - type: text
    content: '¶“Behold, how happy '
  - type: text
    content: and
  - type: text
    content: ' fortunate is the man whom God reproves,'
  - type: text
    content: 'So do not despise '
  - type: text
    content: or
  - type: text
    content: ' reject the discipline of the Almighty [subjecting you to trial and suffering].'
  '18':
  - type: text
    content: '“For He inflicts pain, but He binds up '
  - type: text
    content: and
  - type: text
    content: ' gives relief;'
  - type: text
    content: He wounds, but His hands also heal.
  '19':
  - type: text
    content: “He will rescue you from six troubles;
  - type: text
    content: Even in seven, evil will not touch you.
  '2':
  - type: text
    content: “For anger slays the foolish man,
  - type: text
    content: And jealousy kills the simple (naive).
  '20':
  - type: text
    content: “In famine He will redeem you from death,
  - type: text
    content: And in war from the power of the sword.
  '21':
  - type: text
    content: “You will be hidden from the scourge of the tongue,
  - type: text
    content: And you will not be afraid of destruction when it comes.
  '22':
  - type: text
    content: “You will laugh at violence and famine,
  - type: text
    content: And you will not be afraid of the wild beasts of the earth.
  '23':
  - type: text
    content: “For you will be in harmony with the stones of the field,
  - type: text
    content: And the beasts of the field will be at peace with you.
  '24':
  - type: text
    content: '“You will know also that your tent is secure '
  - type: text
    content: and
  - type: text
    content: ' at peace,'
  - type: text
    content: And you will visit your dwelling and fear no loss [nor find anything amiss].
  '25':
  - type: text
    content: “You will know also that your descendants will be many,
  - type: text
    content: And your offspring as the grass of the earth.
  '26':
  - type: text
    content: “You will come to your grave in old age,
  - type: text
    content: Like the stacking of grain [on the threshing floor] in its season.
  '27':
  - type: text
    content: '“Behold this; we have investigated it, '
  - type: text
    content: and
  - type: text
    content: ' it is true.'
  - type: text
    content: 'Hear '
  - type: text
    content: and
  - type: text
    content: ' heed it, and know for yourself [for your own good].”'
  '3':
  - type: text
    content: “I have seen the foolish taking root [and outwardly prospering],
  - type: text
    content: But I cursed his dwelling immediately [for his destruction was certain].
  '4':
  - type: text
    content: “His children are far from safety [and included in their father’s ruin],
  - type: text
    content: 'They are oppressed '
  - type: text
    content: and
  - type: text
    content: ' crushed in the [court of justice in the city’s] gate,'
  - type: text
    content: 'And there is no '
  - type: note
    content: Lit deliverer.
  - type: text
    content: 'one to rescue '
  - type: text
    content: them
  - type: text
    content: .
  '5':
  - type: text
    content: “The hungry devour his harvest
  - type: text
    content: And take it even [when it grows] among the thorns;
  - type: text
    content: The trap opens for [his] wealth.
  '6':
  - type: text
    content: “For affliction does not come forth from the dust,
  - type: text
    content: Nor does trouble spring forth from the ground.
  '7':
  - type: text
    content: “For man is born for trouble,
  - type: text
    content: '[As naturally] as sparks fly upward.'
  '8':
  - type: text
    content: '¶“As for me, I would seek God '
  - type: text
    content: and
  - type: text
    content: ' inquire of Him,'
  - type: text
    content: And I would commit my cause to God;
  '9':
  - type: text
    content: Who does great and unsearchable things,
  - type: text
    content: Marvelous things without number.
