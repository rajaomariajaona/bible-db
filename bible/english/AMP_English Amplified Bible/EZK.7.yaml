type_code: eng
verses:
  '1':
  - type: heading
    content: Punishment for Wickedness Foretold
  - type: text
    content: Moreover, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: '‘Behold, the day! Behold, it is coming! Your doom has gone forth, the rod has blossomed, arrogance has sprouted. '
  '11':
  - type: text
    content: 'Violence has grown into a rod of wickedness; none of them (Israel) '
  - type: text
    content: will remain,
  - type: text
    content: ' none of their people, none of their wealth, nor anything eminent among them. '
  '12':
  - type: text
    content: 'The time has come, the day has arrived. Let not the buyer rejoice nor the seller mourn, for wrath is against all their multitude [of people]. '
  '13':
  - type: text
    content: 'For the seller will not regain '
  - type: text
    content: and
  - type: text
    content: ' return to '
  - type: note
    content: I.e. his inherited land.
  - type: text
    content: what he sold, even were they yet alive; for the vision [of punishment] regarding all the multitude [of people] will not be turned back, nor will any one of them sustain his life because of his sin.
  '14':
  - type: text
    content: '‘They have blown the trumpet and have made everything ready, but no one is going to the battle, for My wrath is against all their multitude [of people]. '
  '15':
  - type: text
    content: 'The sword is outside and virulent disease and famine are within. He who is in the field will die by the sword, and famine and disease will devour those in the city. '
  '16':
  - type: text
    content: 'Even when their survivors escape, they will be on the mountains like doves of the valleys, all of them moaning, each over his [punishment for] sin. '
  '17':
  - type: text
    content: 'All hands will hang limp and all knees will be as weak as water. [Is 13:7; Jer 6:24; Ezek 21:7] '
  '18':
  - type: text
    content: 'They will also cover themselves with sackcloth; horror will overwhelm them, and shame '
  - type: text
    content: will be
  - type: text
    content: ' on all faces and baldness on all their heads [as evidence of grief]. '
  '19':
  - type: text
    content: They will fling their silver into the streets and their gold will be [discarded] like something unclean; their silver and their gold shall not be able to save them in the day of the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: '. These [things] cannot satisfy their soul nor fill their stomachs, for they have become their stumbling block '
  - type: text
    content: and
  - type: text
    content: ' source of sin. [Prov 11:4; Zeph 1:18]'
  - type: heading
    content: The Temple Profaned
  '2':
  - type: text
    content: “Also, son of man, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ' to the land of Israel, ‘An end! The end is coming on the four corners of the land. [Ezek 11:13; Amos 8:2] '
  '20':
  - type: text
    content: 'As for the beauty of [gold for] ornaments, they turned it to pride and from it made the images of their repulsive things (idols) and of their vile things. Therefore I will make it an unclean thing to them. '
  '21':
  - type: text
    content: 'I will give it into the hands of strangers (Babylonians) as plunder and to the wicked of the earth as spoil, and they shall profane it. '
  '22':
  - type: text
    content: I will also turn My face away from them, and they will desecrate My secret treasure (the Jerusalem temple); and robbers will enter [irreverently] into it (the Holy of Holies) and violate it.
  '23':
  - type: text
    content: '‘Prepare the chain [for imprisonment], for the land is full of bloody crimes [murders committed under the pretense of civil justice] and the city is full of violence. '
  '24':
  - type: text
    content: 'Therefore, I will bring the worst of the [Gentile] nations, and they will take possession of their houses [those of the people of Judah]; I will also silence their pride, and their holy places will be profaned. '
  '25':
  - type: text
    content: 'When anguish comes, they [of Judah] shall seek peace, but there will be none. '
  '26':
  - type: text
    content: 'Disaster will come upon disaster and rumor will be '
  - type: text
    content: heaped
  - type: text
    content: ' on rumor; they will seek a vision from a prophet, but the law '
  - type: text
    content: and
  - type: text
    content: ' guidance will be lost from the priest and [wise] counsel [will cease] from the elders. [Ps 74:9; Lam 2:9] '
  '27':
  - type: text
    content: 'The king [of Judah] will mourn and the prince (Zedekiah) will be clothed with [garments of] despair '
  - type: text
    content: and
  - type: text
    content: ' anguish, and the hands of the people of the land shall tremble [in terror]. I will deal with them in accordance with their conduct, and by their judgments I will judge them. And they will know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: 'Now the end is upon you, and I will send My anger against you and will judge you in accordance with your ways and I will bring [retribution for] all your abominations upon you. '
  '4':
  - type: text
    content: For My eye will have no pity on you, nor will I spare you, but I will repay you for your evil ways, while your abominations are among you; and you will know (recognize, understand) [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .’
  '5':
  - type: text
    content: “Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘A disaster is coming, [one so destructive and injurious, so sudden and violent, that it stands alone,] a unique disaster, look it is coming! '
  '6':
  - type: text
    content: 'An end is coming; the end has come! It has awakened against you. Look, it has come! '
  '7':
  - type: text
    content: 'Your doom has come to you, O inhabitant of the land; the time has come, the day is near—tumult rather than joyful shouting on the mountains. '
  '8':
  - type: text
    content: 'Now I will soon pour out My wrath on you and spend My anger against you, and I will judge you in accordance with your ways and will repay you [with punishment] for all your outrageous acts. '
  '9':
  - type: text
    content: 'My eye will show no pity nor will I spare [you]. I will repay you in accordance with your ways, while your abominations are in your midst; then you will know '
  - type: text
    content: and
  - type: text
    content: ' understand that it is I, the L'
  - type: heading
    content: ord
  - type: text
    content: ', who strikes you.'
