document_id: EZK.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Punishment for Wickedness Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moreover, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Also, son of man, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' to the land of Israel, ‘An end! The end is coming on the four corners of the land. [Ezek 11:13; Amos 8:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the end is upon you, and I will send My anger against you and will judge you in accordance with your ways and I will bring [retribution for] all your abominations upon you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For My eye will have no pity on you, nor will I spare you, but I will repay you for your evil ways, while your abominations are among you; and you will know (recognize, understand) [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘A disaster is coming, [one so destructive and injurious, so sudden and violent, that it stands alone,] a unique disaster, look it is coming! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'An end is coming; the end has come! It has awakened against you. Look, it has come! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Your doom has come to you, O inhabitant of the land; the time has come, the day is near—tumult rather than joyful shouting on the mountains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now I will soon pour out My wrath on you and spend My anger against you, and I will judge you in accordance with your ways and will repay you [with punishment] for all your outrageous acts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My eye will show no pity nor will I spare [you]. I will repay you in accordance with your ways, while your abominations are in your midst; then you will know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand that it is I, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', who strikes you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '‘Behold, the day! Behold, it is coming! Your doom has gone forth, the rod has blossomed, arrogance has sprouted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Violence has grown into a rod of wickedness; none of them (Israel) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will remain,
  - type: text
    text: ' none of their people, none of their wealth, nor anything eminent among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The time has come, the day has arrived. Let not the buyer rejoice nor the seller mourn, for wrath is against all their multitude [of people]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the seller will not regain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. his inherited land.
    marker-yv: yv-n
  - type: text
    text: what he sold, even were they yet alive; for the vision [of punishment] regarding all the multitude [of people] will not be turned back, nor will any one of them sustain his life because of his sin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '‘They have blown the trumpet and have made everything ready, but no one is going to the battle, for My wrath is against all their multitude [of people]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sword is outside and virulent disease and famine are within. He who is in the field will die by the sword, and famine and disease will devour those in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Even when their survivors escape, they will be on the mountains like doves of the valleys, all of them moaning, each over his [punishment for] sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All hands will hang limp and all knees will be as weak as water. [Is 13:7; Jer 6:24; Ezek 21:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They will also cover themselves with sackcloth; horror will overwhelm them, and shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will be
  - type: text
    text: ' on all faces and baldness on all their heads [as evidence of grief]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They will fling their silver into the streets and their gold will be [discarded] like something unclean; their silver and their gold shall not be able to save them in the day of the wrath of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. These [things] cannot satisfy their soul nor fill their stomachs, for they have become their stumbling block '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' source of sin. [Prov 11:4; Zeph 1:18]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Temple Profaned
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As for the beauty of [gold for] ornaments, they turned it to pride and from it made the images of their repulsive things (idols) and of their vile things. Therefore I will make it an unclean thing to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will give it into the hands of strangers (Babylonians) as plunder and to the wicked of the earth as spoil, and they shall profane it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will also turn My face away from them, and they will desecrate My secret treasure (the Jerusalem temple); and robbers will enter [irreverently] into it (the Holy of Holies) and violate it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘Prepare the chain [for imprisonment], for the land is full of bloody crimes [murders committed under the pretense of civil justice] and the city is full of violence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore, I will bring the worst of the [Gentile] nations, and they will take possession of their houses [those of the people of Judah]; I will also silence their pride, and their holy places will be profaned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When anguish comes, they [of Judah] shall seek peace, but there will be none. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Disaster will come upon disaster and rumor will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heaped
  - type: text
    text: ' on rumor; they will seek a vision from a prophet, but the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guidance will be lost from the priest and [wise] counsel [will cease] from the elders. [Ps 74:9; Lam 2:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The king [of Judah] will mourn and the prince (Zedekiah) will be clothed with [garments of] despair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish, and the hands of the people of the land shall tremble [in terror]. I will deal with them in accordance with their conduct, and by their judgments I will judge them. And they will know [without any doubt] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’ ”
