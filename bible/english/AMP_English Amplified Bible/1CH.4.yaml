document_id: 1CH.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Judah
  - type: text
    content: 'The sons of Judah: Perez, Hezron, Carmi, Hur, and Shobal. '
  '10':
  - type: text
    content: Jabez cried out to the God of Israel, saying, “Oh that You would indeed bless me and enlarge my border [property], and that Your hand would be with me, and You would keep me from evil so that it does not hurt me!” And God granted his request.
  '11':
  - type: text
    content: 'Chelub the brother of Shuhah became the father of Mehir, the father of Eshton. '
  '12':
  - type: text
    content: Eshton became the father of Beth-rapha, Paseah, and Tehinnah the father of Ir-nahash. These are the men of Recah.
  '13':
  - type: text
    content: 'The sons of Kenaz: Othniel and Seraiah. The sons of Othniel: Hathath and Meonothai. '
  '14':
  - type: text
    content: 'Meonothai became the father of Ophrah, and Seraiah became the father of Joab the father of Ge-harashim [the Valley of Craftsmen, so named] because they were craftsmen. '
  '15':
  - type: text
    content: 'The sons of Caleb [Joshua’s companion] the son of Jephunneh: Iru, Elah, and Naam. The son of Elah: Kenaz. '
  '16':
  - type: text
    content: 'The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel. '
  '17':
  - type: text
    content: 'The sons of Ezrah: Jether, Mered, Epher, and Jalon. These are the sons of Bithia daughter of Pharaoh, whom Mered took: she conceived '
  - type: text
    content: and gave birth to
  - type: text
    content: ' Miriam, Shammai, and Ishbah the father of Eshtemoa. '
  '18':
  - type: text
    content: 'Mered’s Jewish wife gave birth to Jered the father of Gedor, Heber the father of Soco, and Jekuthiel the father of Zanoah. '
  '19':
  - type: text
    content: 'The sons of the wife of Hodiah, the sister of Naham, were: the fathers of Keilah the Garmite and Eshtemoa the Maacathite. '
  '2':
  - type: text
    content: 'Reaiah the son of Shobal became the father of Jahath, and Jahath became the father of Ahumai and Lahad. These were the families of the Zorathites. '
  '20':
  - type: text
    content: 'The sons of Shimon: Amnon, Rinnah, Benhanan, and Tilon. The sons of Ishi: Zoheth and Ben-zoheth. '
  '21':
  - type: text
    content: 'The sons of Shelah son of Judah: Er the father of Lecah and Laadah the father of Mareshah, and the families of the house of the linen workers at Beth-ashbea; '
  '22':
  - type: text
    content: 'and Jokim, the men of Cozeba, Joash, and Saraph, who ruled in Moab, and Jashubi-lehem. These are ancient words (genealogical records). '
  '23':
  - type: text
    content: These were the potters and those who lived [among plantations and hedges] at Netaim and Gederah; they lived there with the king for his work.
  - type: heading
    content: Descendants of Simeon
  '24':
  - type: text
    content: 'The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, and Shaul; '
  '25':
  - type: text
    content: 'Shallum was Shaul’s son, Mibsam his son, Mishma his son. '
  '26':
  - type: text
    content: 'The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son. '
  '27':
  - type: text
    content: 'Shimei had sixteen sons and six daughters; but his brothers did not have many sons, neither did all their family multiply like the sons of Judah. '
  '28':
  - type: text
    content: 'They lived at Beersheba, Moladah, Hazar-shual, '
  '29':
  - type: text
    content: 'Bilhah, Ezem, Tolad, '
  '3':
  - type: text
    content: 'These were the sons of '
  - type: note
    content: So with some ancient versions; Heb father.
  - type: text
    content: 'Etam: Jezreel, Ishma, and Idbash; and the name of their sister was Hazzelelponi. '
  '30':
  - type: text
    content: 'Bethuel, Hormah, Ziklag, '
  '31':
  - type: text
    content: 'Beth-marcaboth, Hazar-susim, Beth-biri, and at Shaaraim. These were their cities until the reign of David. '
  '32':
  - type: text
    content: These were
  - type: text
    content: ' their villages: Etam, Ain, Rimmon, Tochen, and Ashan—five cities— '
  '33':
  - type: text
    content: and all their villages that were around these towns as far as Baal. These were their settlements, and they have their genealogical record.
  '34':
  - type: text
    content: 'Meshobab, Jamlech, Joshah the son of Amaziah, '
  '35':
  - type: text
    content: 'Joel, Jehu the son of Joshibiah, the son of Seraiah, the son of Asiel, '
  '36':
  - type: text
    content: 'also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  '37':
  - type: text
    content: 'Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah; '
  '38':
  - type: text
    content: 'these mentioned by name were leaders in their families; and their fathers’ houses increased greatly [so they needed more land]. '
  '39':
  - type: text
    content: 'So they journeyed to the entrance of Gedor, to the east side of the valley, to seek pasture for their flocks. '
  '4':
  - type: text
    content: 'Penuel was the father of Gedor, and Ezer the father of Hushah. These were the sons of Hur, the eldest of Ephrathah (Ephrath), the father of Bethlehem. '
  '40':
  - type: text
    content: 'They found rich, good pasture, and the [cleared] land was wide, quiet, and peaceful; for those who had lived there previously came from Ham [and had left it a better place for those who came after them]. '
  '41':
  - type: text
    content: 'These, registered by name, came in the days of Hezekiah king of Judah, and they attacked their tents and the Meunites (foreigners) who were found there, and utterly destroyed them to this day; and they settled in their place, because there was pasture there for their flocks. '
  '42':
  - type: text
    content: 'From them, from the sons of Simeon, five hundred men went to Mount Seir, with Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi, as their leaders. '
  '43':
  - type: text
    content: They destroyed the remnant of the Amalekites who escaped, and they have lived there to this day (the date of this writing).
  '5':
  - type: text
    content: 'Ashhur, the father of Tekoa, had two wives, Helah and Naarah. '
  '6':
  - type: text
    content: 'Naarah bore him Ahuzzam, Hepher, Temeni and Haahashtari. These were Naarah’s sons. '
  '7':
  - type: text
    content: 'The sons of Helah: Zereth, Izhar, and Ethnan. '
  '8':
  - type: text
    content: 'Koz fathered Anub, Zobebah, and the families of Aharhel the son of Harum. '
  '9':
  - type: text
    content: 'Jabez was more honorable than his brothers; but his mother named him Jabez, saying, “Because I gave birth to him in pain.” '
