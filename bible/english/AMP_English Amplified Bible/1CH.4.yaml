document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sons of Judah: Perez, Hezron, Carmi, Hur, and Shobal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reaiah the son of Shobal became the father of Jahath, and Jahath became the father of Ahumai and Lahad. These were the families of the Zorathites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'These were the sons of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So with some ancient versions; Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: father
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Etam: Jezreel, Ishma, and Idbash; and the name of their sister was Hazzelelponi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Penuel was the father of Gedor, and Ezer the father of Hushah. These were the sons of Hur, the eldest of Ephrathah (Ephrath), the father of Bethlehem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ashhur, the father of Tekoa, had two wives, Helah and Naarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naarah bore him Ahuzzam, Hepher, Temeni and Haahashtari. These were Naarah’s sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Helah: Zereth, Izhar, and Ethnan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koz fathered Anub, Zobebah, and the families of Aharhel the son of Harum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jabez was more honorable than his brothers; but his mother named him Jabez, saying, “Because I gave birth to him in pain.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jabez cried out to the God of Israel, saying, “Oh that You would indeed bless me and enlarge my border [property], and that Your hand would be with me, and You would keep me from evil so that it does not hurt me!” And God granted his request.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chelub the brother of Shuhah became the father of Mehir, the father of Eshton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eshton became the father of Beth-rapha, Paseah, and Tehinnah the father of Ir-nahash. These are the men of Recah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Kenaz: Othniel and Seraiah. The sons of Othniel: Hathath and Meonothai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Meonothai became the father of Ophrah, and Seraiah became the father of Joab the father of Ge-harashim [the Valley of Craftsmen, so named] because they were craftsmen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Caleb [Joshua’s companion] the son of Jephunneh: Iru, Elah, and Naam. The son of Elah: Kenaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Jehallelel: Ziph, Ziphah, Tiria, and Asarel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Ezrah: Jether, Mered, Epher, and Jalon. These are the sons of Bithia daughter of Pharaoh, whom Mered took: she conceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and gave birth to
  - type: text
    text: ' Miriam, Shammai, and Ishbah the father of Eshtemoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mered’s Jewish wife gave birth to Jered the father of Gedor, Heber the father of Soco, and Jekuthiel the father of Zanoah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of the wife of Hodiah, the sister of Naham, were: the fathers of Keilah the Garmite and Eshtemoa the Maacathite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sons of Shimon: Amnon, Rinnah, Benhanan, and Tilon. The sons of Ishi: Zoheth and Ben-zoheth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Shelah son of Judah: Er the father of Lecah and Laadah the father of Mareshah, and the families of the house of the linen workers at Beth-ashbea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and Jokim, the men of Cozeba, Joash, and Saraph, who ruled in Moab, and Jashubi-lehem. These are ancient words (genealogical records). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: These were the potters and those who lived [among plantations and hedges] at Netaim and Gederah; they lived there with the king for his work.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Simeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Simeon: Nemuel, Jamin, Jarib, Zerah, and Shaul; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Shallum was Shaul’s son, Mibsam his son, Mishma his son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The sons of Mishma: Hammuel his son, Zaccur his son, Shimei his son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shimei had sixteen sons and six daughters; but his brothers did not have many sons, neither did all their family multiply like the sons of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They lived at Beersheba, Moladah, Hazar-shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Bilhah, Ezem, Tolad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Bethuel, Hormah, Ziklag, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beth-marcaboth, Hazar-susim, Beth-biri, and at Shaaraim. These were their cities until the reign of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: it
    children:
    - type: text
      text: These were
  - type: text
    text: ' their villages: Etam, Ain, Rimmon, Tochen, and Ashan—five cities— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: and all their villages that were around these towns as far as Baal. These were their settlements, and they have their genealogical record.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Meshobab, Jamlech, Joshah the son of Amaziah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joel, Jehu the son of Joshibiah, the son of Seraiah, the son of Asiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'these mentioned by name were leaders in their families; and their fathers’ houses increased greatly [so they needed more land]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So they journeyed to the entrance of Gedor, to the east side of the valley, to seek pasture for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'They found rich, good pasture, and the [cleared] land was wide, quiet, and peaceful; for those who had lived there previously came from Ham [and had left it a better place for those who came after them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'These, registered by name, came in the days of Hezekiah king of Judah, and they attacked their tents and the Meunites (foreigners) who were found there, and utterly destroyed them to this day; and they settled in their place, because there was pasture there for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'From them, from the sons of Simeon, five hundred men went to Mount Seir, with Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi, as their leaders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: They destroyed the remnant of the Amalekites who escaped, and they have lived there to this day (the date of this writing).
