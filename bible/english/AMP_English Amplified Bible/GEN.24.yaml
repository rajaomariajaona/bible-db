document_id: GEN.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Bride for Isaac
  - type: text
    content: Now Abraham was old, [well] advanced in age; and the L
  - type: heading
    content: ord
  - type: text
    content: ' had blessed Abraham in all things. '
  '10':
  - type: text
    content: 'Then the servant took ten of his master’s camels, and set out, taking some of his master’s good things with him; so he got up and journeyed to '
  - type: note
    content: Heb Aram Naharaim, “Aram of the two rivers.”
  - type: text
    content: 'Mesopotamia [between the Tigris and the Euphrates Rivers], to the city of Nahor [the home of Abraham’s brother]. '
  '11':
  - type: text
    content: 'He made the camels kneel down outside the city by the well of water at the time of the evening when women go out to draw water. '
  '12':
  - type: text
    content: And he said, “O L
  - type: heading
    content: ord
  - type: text
    content: ', God of my master Abraham, please grant me success today, and show lovingkindness (faithfulness) to my master Abraham. '
  '13':
  - type: text
    content: 'Behold, I stand here at the spring of water, and the daughters of the men of the city are coming out to draw water; '
  '14':
  - type: text
    content: 'now let it be that the girl to whom I say, ‘Please, let down your jar so that I may [have a] drink,’ and she replies, ‘Drink, and I will also give your camels water to drink’—may she '
  - type: text
    content: be the one
  - type: text
    content: ' whom You have selected [as a wife] for Your servant Isaac; and by this I will know that You have shown lovingkindness (faithfulness) to my master.”'
  - type: heading
    content: Rebekah Is Chosen
  '15':
  - type: text
    content: 'Before Eliezer had finished speaking (praying), Rebekah came out with her [water] jar on her shoulder. Rebekah was the daughter of Bethuel the '
  - type: note
    content: See 22:20-24.
  - type: text
    content: 'son of Milcah, who was the wife of Abraham’s brother Nahor. '
  '16':
  - type: text
    content: 'The girl was very beautiful, a virgin and unmarried; and she went down to the spring and filled her jar and came up. '
  '17':
  - type: text
    content: 'Then the servant ran to meet her, and said, “Please let me drink a little water from your jar.” '
  '18':
  - type: text
    content: 'And she said, “Drink, my lord”; and she quickly lowered her jar to her hand, and gave him a drink. '
  '19':
  - type: text
    content: 'When she had given Eliezer a drink, she said, “I will also draw water for your camels until they have finished drinking.” '
  '2':
  - type: text
    content: 'Abraham said to his servant [Eliezer of Damascus], the oldest of his household, who had charge over all that Abraham owned, “Please, put your hand under my thigh [as is customary for affirming a solemn oath], [Gen 15:2] '
  '20':
  - type: text
    content: 'So she quickly emptied her jar into the trough, and ran again to the well and drew water for all his camels. '
  '21':
  - type: text
    content: Meanwhile, the man stood gazing at Rebekah in [reverent] silence, [waiting] to know if the L
  - type: heading
    content: ord
  - type: text
    content: ' had made his trip successful or not.'
  '22':
  - type: text
    content: 'When the camels had finished drinking, Eliezer took a gold ring weighing a half-shekel and two bracelets for her hands weighing ten shekels in gold, '
  '23':
  - type: text
    content: 'and said, “Whose daughter are you? Please tell me, is there room in your father’s house for us to lodge?” '
  '24':
  - type: text
    content: 'And she said to him, “I am the daughter of Bethuel, Milcah’s son, whom she bore to [her husband] Nahor.” '
  '25':
  - type: text
    content: 'Again she said to him, “We have plenty of both straw and feed, and also room to lodge.” '
  '26':
  - type: text
    content: The man bowed his head and worshiped the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '27':
  - type: text
    content: He said, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of my master Abraham, who has not denied His lovingkindness and His truth to my master. As for me, the L'
  - type: heading
    content: ord
  - type: text
    content: ' led me to the house of my master’s brothers.”'
  '28':
  - type: text
    content: 'Then the girl ran and told her mother’s household what had happened. '
  '29':
  - type: text
    content: 'Now Rebekah had a brother whose name was Laban; and Laban ran out to the man at the well. '
  '3':
  - type: text
    content: and I will make you swear by the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of heaven and the God of earth, that you will not take a wife for my son from the daughters of the Canaanites, among whom I live, '
  '30':
  - type: text
    content: 'When he saw the ring and the bracelets on his sister’s arms, and when he heard Rebekah his sister, saying, “The man said this to me,” he went to Eliezer and found him standing by the camels at the spring. '
  '31':
  - type: text
    content: And Laban said, “Come in, blessed of the L
  - type: heading
    content: ord
  - type: text
    content: '! Why do you stand outside since I have made the house ready and have prepared a place for the camels?” '
  '32':
  - type: text
    content: 'So the man came into the house, and Laban unloaded his camels and gave them straw and feed, and [he gave] water to [Eliezer to] wash his feet and the feet of the men who were with him. '
  '33':
  - type: text
    content: 'But when food was set before him, he said, “I will not eat until I have stated my business.” And Laban said, “Speak on.” '
  '34':
  - type: text
    content: 'So he said, “I am Abraham’s servant. '
  '35':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has greatly blessed my master, and he has become great (wealthy, powerful); He has given him flocks and herds, and silver and gold, and servants and maids, and camels and donkeys. '
  '36':
  - type: text
    content: 'Now Sarah my master’s wife bore a son to my master when she was in her old age, and he has given everything that he has to him. '
  '37':
  - type: text
    content: 'My master made me swear [an oath], saying, ‘You must not take a wife for my son from the daughters of the Canaanites, in whose land I live; '
  '38':
  - type: text
    content: 'but you shall [instead] go to my father’s house and to my family and take a wife for my son [Isaac].’ '
  '39':
  - type: text
    content: 'Then I said to my master, ‘But suppose the woman will not follow me [back to this land].’ '
  '4':
  - type: text
    content: 'but you will [instead] go to my [former] country (Mesopotamia) and to my relatives, and take a wife for my son Isaac [the heir of the covenant promise].” '
  '40':
  - type: text
    content: He said to me, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ', before whom I walk [habitually and obediently], will send His angel with you to make your journey successful, and you will take a wife for my son from my relatives and from my father’s house; '
  '41':
  - type: text
    content: then you will be free of my oath, when you come to my relatives; and if they do not give her to you, you will [also] be free of my oath.’
  '42':
  - type: text
    content: “I came today to the spring, and said, ‘O L
  - type: heading
    content: ord
  - type: text
    content: ', God of my master Abraham, if now You will make my journey on which I go successful; '
  '43':
  - type: text
    content: 'please look, I am standing by the spring of water; now let it be that when the maiden [whom You have chosen for Isaac] comes out to draw [water], and to whom I say, “Please, give me a little water to drink from your jar”; '
  '44':
  - type: text
    content: and if she says to me, “You drink, and I will also draw [water] for your camels”; let that woman be the one whom the L
  - type: heading
    content: ord
  - type: text
    content: ' has selected '
  - type: text
    content: and
  - type: text
    content: ' chosen [as a wife] for my master’s son.’'
  '45':
  - type: text
    content: '“Before I had finished praying in my heart, behold, Rebekah came out with her [water] jar on her shoulder, and she went down to the spring and drew water. And I said to her, ‘Please, let me have a drink.’ '
  '46':
  - type: text
    content: 'And she quickly let down her jar from her '
  - type: text
    content: shoulder,
  - type: text
    content: ' and said, ‘Drink, and I will also water your camels’; so I drank, and she also watered the camels. '
  '47':
  - type: text
    content: 'Then I asked her, ‘Whose daughter are you?’ She said, ‘The daughter of Bethuel, Nahor’s son, whom Milcah bore to him’; and I '
  - type: note
    content: This was a customary act of admiration and respect; otherwise, Rebekah would not have accepted it.
  - type: text
    content: 'put the ring in her nose, and the bracelets on her arms. '
  '48':
  - type: text
    content: And I bowed down my head and worshiped the L
  - type: heading
    content: ord
  - type: text
    content: ', and blessed the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of my master Abraham, who had led me in the right way to take the daughter of my master’s brother to his son [as a wife]. '
  '49':
  - type: text
    content: So now if you are going to show kindness and truth to my master [being faithful to him], tell me; and if not, tell me, that I may turn to the right or to the left [and go on my way].”
  '5':
  - type: text
    content: 'The servant said to him, “Suppose the woman will not be willing to follow me back to this country; should I take your son back to the country from which you came?” '
  '50':
  - type: text
    content: Then Laban and Bethuel answered, “The matter has come from the L
  - type: heading
    content: ord
  - type: text
    content: '; so we dare not speak bad or good [to you about it—we cannot interfere]. '
  '51':
  - type: text
    content: Rebekah is before you; take her and go, and let her be the wife of your master’s son, as the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken.”'
  '52':
  - type: text
    content: When Abraham’s servant heard their words, he bowed himself to the ground [in worship] before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Then the servant brought out jewelry of silver, jewelry of gold, and articles of clothing, and gave them to Rebekah; he also gave precious things to her brother and her mother. '
  '54':
  - type: text
    content: 'Then he and the men who were with him ate and drank and spent the night [there]. In the morning when they got up, he said, “Now send me back to my master.” '
  '55':
  - type: text
    content: 'But Rebekah’s brother and mother said, “Let the girl stay with us a few days—at least ten; then she may go.” '
  '56':
  - type: text
    content: But Eliezer said to them, “Do not delay me, since the L
  - type: heading
    content: ord
  - type: text
    content: ' has prospered my way. Send me away, so that I may go back to my master.” '
  '57':
  - type: text
    content: 'And they said, “We will call the girl and ask her '
  - type: note
    content: Lit mouth.
  - type: text
    content: 'what she prefers.” '
  '58':
  - type: text
    content: 'So they called Rebekah and said, “Will you go with this man?” And she answered, “I will go.” '
  '59':
  - type: text
    content: 'So they sent off their sister Rebekah and her nurse [Deborah, as her attendant] and Abraham’s servant [Eliezer] and his men. '
  '6':
  - type: text
    content: 'Abraham said to him, “See to it that you do not take my son back there! '
  '60':
  - type: text
    content: They blessed Rebekah and said to her,
  - type: text
    content: “May you, our sister,
  - type: text
    content: Become [the mother of] thousands of ten thousands,
  - type: text
    content: And may your descendants possess (conquer)
  - type: text
    content: The [city] gate of those who hate them.”
  '61':
  - type: text
    content: 'Then Rebekah and her attendants '
  - type: note
    content: The Hebrew verb “to stand” or “arise” is often used as an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
  - type: text
    content: stood, and they mounted camels and followed the man. So the servant took Rebekah and went on his way.
  - type: heading
    content: Isaac Marries Rebekah
  '62':
  - type: text
    content: 'Now Isaac had returned from going to Beer-lahai-roi (Well of the Living One Who Sees Me), for he was living in the '
  - type: note
    content: The South country, south and west of the Dead Sea.
  - type: text
    content: 'Negev. [Gen 16:14] '
  '63':
  - type: text
    content: 'Isaac went out to bow down [in prayer] in the field in the [early] evening; he raised his eyes and looked, and camels were coming. '
  '64':
  - type: text
    content: 'Rebekah also raised her eyes '
  - type: text
    content: and
  - type: text
    content: ' looked, and when she saw Isaac, she dismounted from her camel. '
  '65':
  - type: text
    content: 'She said to the servant, “Who is that man there walking across the field to meet us?” And the servant said, “He is my master [Isaac].” So she took a veil and covered herself [as was customary]. '
  '66':
  - type: text
    content: 'The servant told Isaac everything that he had done. '
  '67':
  - type: text
    content: Then Isaac brought her into his mother Sarah’s tent, and he took Rebekah [in marriage], and she became his wife, and he loved her; therefore Isaac was comforted after his mother’s death.
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ', the God of heaven, who took me from my father’s house, from the land of my family '
  - type: text
    content: and
  - type: text
    content: ' my birth, who spoke to me and swore to me, saying, ‘To your descendants I will give this land’—He will send His angel before you [to guide you], and you will take a wife from there for my son [and bring her here]. '
  '8':
  - type: text
    content: 'If the woman is not willing to follow you [to this land], then you will be free from this my oath '
  - type: text
    content: and
  - type: text
    content: ' blameless; only you must never take my son back there.” '
  '9':
  - type: text
    content: So the servant put his hand under the thigh of Abraham his master, and swore to him concerning this matter.
