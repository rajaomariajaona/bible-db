    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'She said to the servant, “Who is that man there walking across the field to meet us?” And the servant said, “He is my master [Isaac].” So she took a veil and covered herself [as was customary]. '
