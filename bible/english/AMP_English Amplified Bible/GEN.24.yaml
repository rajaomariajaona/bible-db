document_id: GEN.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Bride for Isaac
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now Abraham was old, [well] advanced in age; and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had blessed Abraham in all things. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the servant took ten of his master’s camels, and set out, taking some of his master’s good things with him; so he got up and journeyed to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Aram Naharaim,
        - type: text
          text: ' “Aram of the two rivers.”'
      marker-yv: yv-n
    - type: text
      text: 'Mesopotamia [between the Tigris and the Euphrates Rivers], to the city of Nahor [the home of Abraham’s brother]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He made the camels kneel down outside the city by the well of water at the time of the evening when women go out to draw water. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And he said, “O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', God of my master Abraham, please grant me success today, and show lovingkindness (faithfulness) to my master Abraham. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Behold, I stand here at the spring of water, and the daughters of the men of the city are coming out to draw water; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'now let it be that the girl to whom I say, ‘Please, let down your jar so that I may [have a] drink,’ and she replies, ‘Drink, and I will also give your camels water to drink’—may she '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be the one
    - type: text
      text: ' whom You have selected [as a wife] for Your servant Isaac; and by this I will know that You have shown lovingkindness (faithfulness) to my master.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rebekah Is Chosen
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Before Eliezer had finished speaking (praying), Rebekah came out with her [water] jar on her shoulder. Rebekah was the daughter of Bethuel the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 22:20-24.
      marker-yv: yv-n
    - type: text
      text: 'son of Milcah, who was the wife of Abraham’s brother Nahor. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The girl was very beautiful, a virgin and unmarried; and she went down to the spring and filled her jar and came up. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the servant ran to meet her, and said, “Please let me drink a little water from your jar.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And she said, “Drink, my lord”; and she quickly lowered her jar to her hand, and gave him a drink. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When she had given Eliezer a drink, she said, “I will also draw water for your camels until they have finished drinking.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Abraham said to his servant [Eliezer of Damascus], the oldest of his household, who had charge over all that Abraham owned, “Please, put your hand under my thigh [as is customary for affirming a solemn oath], [Gen 15:2] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So she quickly emptied her jar into the trough, and ran again to the well and drew water for all his camels. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Meanwhile, the man stood gazing at Rebekah in [reverent] silence, [waiting] to know if the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had made his trip successful or not.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'When the camels had finished drinking, Eliezer took a gold ring weighing a half-shekel and two bracelets for her hands weighing ten shekels in gold, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and said, “Whose daughter are you? Please tell me, is there room in your father’s house for us to lodge?” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And she said to him, “I am the daughter of Bethuel, Milcah’s son, whom she bore to [her husband] Nahor.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Again she said to him, “We have plenty of both straw and feed, and also room to lodge.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The man bowed his head and worshiped the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He said, “Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of my master Abraham, who has not denied His lovingkindness and His truth to my master. As for me, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' led me to the house of my master’s brothers.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then the girl ran and told her mother’s household what had happened. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now Rebekah had a brother whose name was Laban; and Laban ran out to the man at the well. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and I will make you swear by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of heaven and the God of earth, that you will not take a wife for my son from the daughters of the Canaanites, among whom I live, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When he saw the ring and the bracelets on his sister’s arms, and when he heard Rebekah his sister, saying, “The man said this to me,” he went to Eliezer and found him standing by the camels at the spring. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And Laban said, “Come in, blessed of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! Why do you stand outside since I have made the house ready and have prepared a place for the camels?” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So the man came into the house, and Laban unloaded his camels and gave them straw and feed, and [he gave] water to [Eliezer to] wash his feet and the feet of the men who were with him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'But when food was set before him, he said, “I will not eat until I have stated my business.” And Laban said, “Speak on.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So he said, “I am Abraham’s servant. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has greatly blessed my master, and he has become great (wealthy, powerful); He has given him flocks and herds, and silver and gold, and servants and maids, and camels and donkeys. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Now Sarah my master’s wife bore a son to my master when she was in her old age, and he has given everything that he has to him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'My master made me swear [an oath], saying, ‘You must not take a wife for my son from the daughters of the Canaanites, in whose land I live; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'but you shall [instead] go to my father’s house and to my family and take a wife for my son [Isaac].’ '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then I said to my master, ‘But suppose the woman will not follow me [back to this land].’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'but you will [instead] go to my [former] country (Mesopotamia) and to my relatives, and take a wife for my son Isaac [the heir of the covenant promise].” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: He said to me, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', before whom I walk [habitually and obediently], will send His angel with you to make your journey successful, and you will take a wife for my son from my relatives and from my father’s house; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: then you will be free of my oath, when you come to my relatives; and if they do not give her to you, you will [also] be free of my oath.’
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: “I came today to the spring, and said, ‘O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', God of my master Abraham, if now You will make my journey on which I go successful; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'please look, I am standing by the spring of water; now let it be that when the maiden [whom You have chosen for Isaac] comes out to draw [water], and to whom I say, “Please, give me a little water to drink from your jar”; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: and if she says to me, “You drink, and I will also draw [water] for your camels”; let that woman be the one whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has selected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chosen [as a wife] for my master’s son.’'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: '“Before I had finished praying in my heart, behold, Rebekah came out with her [water] jar on her shoulder, and she went down to the spring and drew water. And I said to her, ‘Please, let me have a drink.’ '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'And she quickly let down her jar from her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shoulder,
    - type: text
      text: ' and said, ‘Drink, and I will also water your camels’; so I drank, and she also watered the camels. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Then I asked her, ‘Whose daughter are you?’ She said, ‘The daughter of Bethuel, Nahor’s son, whom Milcah bore to him’; and I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a customary act of admiration and respect; otherwise, Rebekah would not have accepted it.
      marker-yv: yv-n
    - type: text
      text: 'put the ring in her nose, and the bracelets on her arms. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: And I bowed down my head and worshiped the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and blessed the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of my master Abraham, who had led me in the right way to take the daughter of my master’s brother to his son [as a wife]. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: So now if you are going to show kindness and truth to my master [being faithful to him], tell me; and if not, tell me, that I may turn to the right or to the left [and go on my way].”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The servant said to him, “Suppose the woman will not be willing to follow me back to this country; should I take your son back to the country from which you came?” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Then Laban and Bethuel answered, “The matter has come from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; so we dare not speak bad or good [to you about it—we cannot interfere]. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Rebekah is before you; take her and go, and let her be the wife of your master’s son, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken.”'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: When Abraham’s servant heard their words, he bowed himself to the ground [in worship] before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Then the servant brought out jewelry of silver, jewelry of gold, and articles of clothing, and gave them to Rebekah; he also gave precious things to her brother and her mother. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Then he and the men who were with him ate and drank and spent the night [there]. In the morning when they got up, he said, “Now send me back to my master.” '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'But Rebekah’s brother and mother said, “Let the girl stay with us a few days—at least ten; then she may go.” '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: But Eliezer said to them, “Do not delay me, since the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has prospered my way. Send me away, so that I may go back to my master.” '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'And they said, “We will call the girl and ask her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:57 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'what she prefers.” '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'So they called Rebekah and said, “Will you go with this man?” And she answered, “I will go.” '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'So they sent off their sister Rebekah and her nurse [Deborah, as her attendant] and Abraham’s servant [Eliezer] and his men. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Abraham said to him, “See to it that you do not take my son back there! '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: They blessed Rebekah and said to her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May you, our sister,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Become [the mother of] thousands of ten thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may your descendants possess (conquer)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The [city] gate of those who hate them.”
  '61':
  - type: usfm
