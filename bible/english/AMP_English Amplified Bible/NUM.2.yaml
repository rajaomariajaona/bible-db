document_id: NUM.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Arrangement of the Camps
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: '“On the south side shall be the '
  - type: note
    content: The standard of the tribes headed by Reuben contained the picture of a man.
  - type: text
    content: 'standard of the camp of Reuben, by their armies; and Elizur the son of Shedeur shall lead the sons of Reuben, '
  '11':
  - type: text
    content: 'and his army as numbered totaled 46,500. '
  '12':
  - type: text
    content: 'Those who camp next to Reuben [on the south side] shall be the tribe of Simeon; and Shelumiel the son of Zurishaddai shall lead the sons of Simeon, '
  '13':
  - type: text
    content: 'and his army as numbered totaled 59,300. '
  '14':
  - type: text
    content: 'Then [completing the south side] the tribe of Gad; and Eliasaph the son of Reuel (Deuel) shall lead the sons of Gad, '
  '15':
  - type: text
    content: 'and his army as numbered totaled 45,650. '
  '16':
  - type: text
    content: The total of the numbered men [in the three tribes on the south side] in the camp of Reuben was 151,450, by their armies. They shall move out second [on the march].
  '17':
  - type: text
    content: “Then the Tent of Meeting (tabernacle) shall move out with the camp of the Levites in the middle of the [other] camps; just as they camp so shall they move out, every man in his place by their standards.
  '18':
  - type: text
    content: '“On the west side shall be the '
  - type: note
    content: The standard of the tribes headed by Ephraim contained the picture of an ox.
  - type: text
    content: 'standard of the camp of Ephraim, by their armies; and Elishama the son of Ammihud shall lead the sons of Ephraim, '
  '19':
  - type: text
    content: 'and his army as numbered totaled 40,500. '
  '2':
  - type: text
    content: '“The sons of Israel shall camp, each by his own standard, with the '
  - type: note
    content: Each of the twelve tribes had a colored banner. The tribes were organized into groups of three. The leading tribe in each triad had a standard representing their group.
  - type: text
    content: 'banners of their fathers’ households; they shall camp around the Tent of Meeting (tabernacle), but at a distance. '
  '20':
  - type: text
    content: 'Beside Ephraim [on the west side] shall be the tribe of Manasseh; and Gamaliel the son of Pedahzur shall lead the sons of Manasseh, '
  '21':
  - type: text
    content: 'and his army as numbered totaled 32,200. '
  '22':
  - type: text
    content: 'Then [completing the west side shall be] the tribe of Benjamin; and Abidan the son of Gideoni shall lead the sons of Benjamin, '
  '23':
  - type: text
    content: 'and his army as numbered totaled 35,400. '
  '24':
  - type: text
    content: The total of the numbered men [of the three tribes on the west side] in the camp of Ephraim was 108,100, by their armies. They shall move out in third place.
  '25':
  - type: text
    content: '“On the north side shall be the '
  - type: note
    content: The standard of the tribes headed by Dan contained the picture of an eagle.
  - type: text
    content: 'standard of the camp of Dan, by their armies; and Ahiezer the son of Ammishaddai shall lead the sons of Dan, '
  '26':
  - type: text
    content: 'and his army as numbered totaled 62,700. '
  '27':
  - type: text
    content: 'Encamped next to Dan [on the north side] shall be the tribe of Asher; and Pagiel the son of Ochran shall lead the sons of Asher, '
  '28':
  - type: text
    content: 'and his army as numbered totaled 41,500. '
  '29':
  - type: text
    content: 'Then [completing the north side] '
  - type: text
    content: comes
  - type: text
    content: ' the tribe of Naphtali; and Ahira the son of Enan shall lead the sons of Naphtali, '
  '3':
  - type: text
    content: 'Those who camp on the east side toward the sunrise '
  - type: text
    content: shall be
  - type: text
    content: ' of the '
  - type: note
    content: The standard of the tribes of Judah contained the picture of a lion.
  - type: text
    content: 'standard of the camp of Judah, by their armies; and Nahshon the son of Amminadab shall lead the sons of Judah, '
  '30':
  - type: text
    content: 'and his army as numbered totaled 53,400. '
  '31':
  - type: text
    content: 'The total of the numbered men [of the three tribes on the north side] in the camp of Dan was 157,600. They shall move out last, '
  - type: note
    content: The symbol on the various tribal standards seems important in view of the cherubim of Ezek 1:10, and in view of the living creatures of Rev 4:7. God was present in each of these settings.
  - type: text
    content: standard after standard.”
  '32':
  - type: text
    content: 'These are the men of the Israelites [twenty years old and upward] as numbered by their fathers’ households. The total of the numbered men of the camps by their armies, 603,550. '
  '33':
  - type: text
    content: But the Levites were not numbered with the [other] Israelites, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses. '
  '34':
  - type: text
    content: Thus the Israelites did [as ordered]; according to everything the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses, so they camped by their standards, and so they moved out, everyone with his family (clan), according to his fathers’ household.'
  '4':
  - type: text
    content: 'and his army as numbered totaled 74,600. '
  '5':
  - type: text
    content: 'Next to Judah [on the east side] the tribe of Issachar shall encamp; and Nethanel the son of Zuar shall lead the sons of Issachar, '
  '6':
  - type: text
    content: 'and his army as numbered totaled 54,400. '
  '7':
  - type: text
    content: 'Then [also on the east side] the tribe of Zebulun; and Eliab the son of Helon shall lead the sons of Zebulun, '
  '8':
  - type: text
    content: 'and his army as numbered totaled 57,400. '
  '9':
  - type: text
    content: The total of the numbered men [in the three tribes on the east side] in the camp of Judah was 186,400, by their armies. They shall move out first [on the march].
