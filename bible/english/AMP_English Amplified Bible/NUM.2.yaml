document_id: NUM.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Arrangement of the Camps
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“On the south side shall be the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The standard of the tribes headed by Reuben contained the picture of a man.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of Reuben, by their armies; and Elizur the son of Shedeur shall lead the sons of Reuben, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and his army as numbered totaled 46,500. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Those who camp next to Reuben [on the south side] shall be the tribe of Simeon; and Shelumiel the son of Zurishaddai shall lead the sons of Simeon, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and his army as numbered totaled 59,300. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then [completing the south side] the tribe of Gad; and Eliasaph the son of Reuel (Deuel) shall lead the sons of Gad, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and his army as numbered totaled 45,650. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The total of the numbered men [in the three tribes on the south side] in the camp of Reuben was 151,450, by their armies. They shall move out second [on the march].
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Then the Tent of Meeting (tabernacle) shall move out with the camp of the Levites in the middle of the [other] camps; just as they camp so shall they move out, every man in his place by their standards.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“On the west side shall be the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The standard of the tribes headed by Ephraim contained the picture of an ox.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of Ephraim, by their armies; and Elishama the son of Ammihud shall lead the sons of Ephraim, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and his army as numbered totaled 40,500. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“The sons of Israel shall camp, each by his own standard, with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Each of the twelve tribes had a colored banner. The tribes were organized into groups of three. The leading tribe in each triad had a standard representing their group.
      marker-yv: yv-n
    - type: text
      text: 'banners of their fathers’ households; they shall camp around the Tent of Meeting (tabernacle), but at a distance. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Beside Ephraim [on the west side] shall be the tribe of Manasseh; and Gamaliel the son of Pedahzur shall lead the sons of Manasseh, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and his army as numbered totaled 32,200. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then [completing the west side shall be] the tribe of Benjamin; and Abidan the son of Gideoni shall lead the sons of Benjamin, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'and his army as numbered totaled 35,400. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The total of the numbered men [of the three tribes on the west side] in the camp of Ephraim was 108,100, by their armies. They shall move out in third place.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“On the north side shall be the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The standard of the tribes headed by Dan contained the picture of an eagle.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of Dan, by their armies; and Ahiezer the son of Ammishaddai shall lead the sons of Dan, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and his army as numbered totaled 62,700. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Encamped next to Dan [on the north side] shall be the tribe of Asher; and Pagiel the son of Ochran shall lead the sons of Asher, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and his army as numbered totaled 41,500. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then [completing the north side] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' the tribe of Naphtali; and Ahira the son of Enan shall lead the sons of Naphtali, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Those who camp on the east side toward the sunrise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The standard of the tribes of Judah contained the picture of a lion.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of Judah, by their armies; and Nahshon the son of Amminadab shall lead the sons of Judah, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and his army as numbered totaled 53,400. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The total of the numbered men [of the three tribes on the north side] in the camp of Dan was 157,600. They shall move out last, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The symbol on the various tribal standards seems important in view of the cherubim of Ezek 1:10, and in view of the living creatures of Rev 4:7. God was present in each of these settings.
      marker-yv: yv-n
    - type: text
      text: standard after standard.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'These are the men of the Israelites [twenty years old and upward] as numbered by their fathers’ households. The total of the numbered men of the camps by their armies, 603,550. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: But the Levites were not numbered with the [other] Israelites, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Thus the Israelites did [as ordered]; according to everything the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses, so they camped by their standards, and so they moved out, everyone with his family (clan), according to his fathers’ household.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and his army as numbered totaled 74,600. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Next to Judah [on the east side] the tribe of Issachar shall encamp; and Nethanel the son of Zuar shall lead the sons of Issachar, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and his army as numbered totaled 54,400. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then [also on the east side] the tribe of Zebulun; and Eliab the son of Helon shall lead the sons of Zebulun, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and his army as numbered totaled 57,400. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The total of the numbered men [in the three tribes on the east side] in the camp of Judah was 186,400, by their armies. They shall move out first [on the march].
