document_id: SNG.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Bride’s Troubled Dream
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “On my bed night after night [I dreamed that] I sought the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom my soul loves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sought him but did not find him. [Is 26:9]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He made its posts of silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its back of gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its seat of purple cloth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The interior lovingly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intricately wrought'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the daughters of Jerusalem.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go forth, O daughters of Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gaze on King Solomon wearing the crown
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With which his mother [Bathsheba] has crowned him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day of his wedding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day of his gladness of heart.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: I said
    - type: text
      text: ' ‘So I must arise now and go out into the city;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into the streets and into the squares [places I do not know]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I must seek him whom my soul loves.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sought him but I did not find him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The watchmen who go around the city found me,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And I said
    - type: text
      text: ', ‘Have you seen him whom my soul loves?’'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Scarcely had I passed them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I found him whom my soul loves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I held on to him and would not let him go
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until I had brought him to my mother’s house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And into the chamber of her who conceived me.” [Rom 8:35; 1 Pet 2:25]
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Bridegroom)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“I command that you take an oath, O daughters of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the gazelles or by the does of the field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you do not rouse nor awaken my love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until she pleases.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon’s Wedding Day
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“What is this coming up from the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like [stately] pillars of smoke
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perfumed with myrrh and frankincense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With all the fragrant powders of the merchant?”
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Chorus)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, it is the couch (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A conveyance that was used in ancient times especially for the transport of one person, that consisted of an enclosed sedan chair usually in the form of a box with wooden shutters, and that is carried on the shoulders of men by means of projecting poles.
      marker-yv: yv-n
    - type: text
      text: palanquin) of Solomon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sixty mighty men around it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of the mighty men of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All of them handle the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All expert in war;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each man has his sword at his thigh,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Guarding
    - type: text
      text: ' against the terrors of the night.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “King Solomon has made for himself a palanquin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the [cedar] wood of Lebanon.
