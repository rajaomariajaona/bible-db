  '1':
  - type: heading
    content: The Bride’s Troubled Dream
  - type: heading
    content: (The Shulammite Bride)
  - type: text
    content: “On my bed night after night [I dreamed that] I sought the one
  - type: text
    content: Whom my soul loves;
  - type: text
    content: I sought him but did not find him. [Is 26:9]
  '10':
  - type: text
    content: “He made its posts of silver,
  - type: text
    content: Its back of gold,
  - type: text
    content: Its seat of purple cloth,
  - type: text
    content: 'The interior lovingly '
  - type: text
    content: and
  - type: text
    content: ' intricately wrought'
  - type: text
    content: By the daughters of Jerusalem.
  '11':
  - type: text
    content: “Go forth, O daughters of Zion,
  - type: text
    content: And gaze on King Solomon wearing the crown
  - type: text
    content: With which his mother [Bathsheba] has crowned him
  - type: text
    content: On the day of his wedding,
  - type: text
    content: On the day of his gladness of heart.”
  '2':
  - type: text
    content: “
  - type: text
    content: I said
  - type: text
    content: ' ‘So I must arise now and go out into the city;'
  - type: text
    content: Into the streets and into the squares [places I do not know]
  - type: text
    content: I must seek him whom my soul loves.’
  - type: text
    content: I sought him but I did not find him.
  '3':
  - type: text
    content: “The watchmen who go around the city found me,
  - type: text
    content: And I said
  - type: text
    content: ', ‘Have you seen him whom my soul loves?’'
  '4':
  - type: text
    content: “Scarcely had I passed them
  - type: text
    content: When I found him whom my soul loves.
  - type: text
    content: I held on to him and would not let him go
  - type: text
    content: Until I had brought him to my mother’s house,
  - type: text
    content: And into the chamber of her who conceived me.” [Rom 8:35; 1 Pet 2:25]
  - type: heading
    content: (The Bridegroom)
  '5':
  - type: text
    content: ¶“I command that you take an oath, O daughters of Jerusalem,
  - type: text
    content: By the gazelles or by the does of the field,
  - type: text
    content: That you do not rouse nor awaken my love
  - type: text
    content: Until she pleases.”
  - type: heading
    content: Solomon’s Wedding Day
  - type: heading
    content: (The Shulammite Bride)
  '6':
  - type: text
    content: ¶“What is this coming up from the wilderness
  - type: text
    content: Like [stately] pillars of smoke
  - type: text
    content: Perfumed with myrrh and frankincense,
  - type: text
    content: With all the fragrant powders of the merchant?”
  - type: heading
    content: (The Chorus)
  '7':
  - type: text
    content: “Behold, it is the couch (
  - type: note
    content: A conveyance that was used in ancient times especially for the transport of one person, that consisted of an enclosed sedan chair usually in the form of a box with wooden shutters, and that is carried on the shoulders of men by means of projecting poles.
  - type: text
    content: palanquin) of Solomon;
  - type: text
    content: Sixty mighty men around it,
  - type: text
    content: Of the mighty men of Israel.
  '8':
  - type: text
    content: “All of them handle the sword,
  - type: text
    content: All expert in war;
  - type: text
    content: Each man has his sword at his thigh,
  - type: text
    content: Guarding
  - type: text
    content: ' against the terrors of the night.'
  '9':
  - type: text
    content: “King Solomon has made for himself a palanquin
  - type: text
    content: From the [cedar] wood of Lebanon.
