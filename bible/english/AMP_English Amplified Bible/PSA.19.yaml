verses:
  '1':
  - type: heading
    content: Psalm 19
  - type: heading
    content: The Works and the Word of God.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: The heavens are telling of the glory of God;
  - type: text
    content: And the expanse [of heaven] is declaring the work of His hands. [Rom 1:20, 21]
  '10':
  - type: text
    content: They are more desirable than gold, yes, than much fine gold;
  - type: text
    content: Sweeter also than honey and the drippings of the honeycomb.
  '11':
  - type: text
    content: Moreover, by them Your servant is warned [reminded, illuminated, and instructed];
  - type: text
    content: In keeping them there is great reward.
  '12':
  - type: text
    content: 'Who can understand his errors '
  - type: text
    content: or
  - type: text
    content: ' omissions? Acquit me of hidden (unconscious, unintended) '
  - type: text
    content: faults
  - type: text
    content: .
  '13':
  - type: text
    content: 'Also keep back Your servant from presumptuous (deliberate, willful) '
  - type: text
    content: sins;
  - type: text
    content: 'Let them not rule '
  - type: text
    content: and
  - type: text
    content: ' have control over me.'
  - type: text
    content: Then I will be blameless (complete),
  - type: text
    content: And I shall be acquitted of great transgression.
  '14':
  - type: text
    content: Let the words of my mouth and the meditation of my heart
  - type: text
    content: 'Be acceptable '
  - type: text
    content: and
  - type: text
    content: ' pleasing in Your sight,'
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', my [firm, immovable] rock and my Redeemer.'
  '2':
  - type: text
    content: Day after day pours forth speech,
  - type: text
    content: And night after night reveals knowledge.
  '3':
  - type: text
    content: There is no speech, nor are there [spoken] words [from the stars];
  - type: text
    content: Their voice is not heard.
  '4':
  - type: text
    content: Yet their voice [in quiet evidence] has gone out through all the earth,
  - type: text
    content: Their words to the end of the world.
  - type: text
    content: 'In them '
  - type: text
    content: and
  - type: text
    content: ' in the heavens He has made a tent for the sun, [Rom 10:18]'
  '5':
  - type: text
    content: Which is as a bridegroom coming out of his chamber;
  - type: text
    content: It rejoices as a strong man to run his course.
  '6':
  - type: text
    content: The sun’s rising is from one end of the heavens,
  - type: text
    content: And its circuit to the other end of them;
  - type: text
    content: And there is nothing hidden from its heat.
  '7':
  - type: text
    content: ¶The law of the L
  - type: heading
    content: ord
  - type: text
    content: ' is perfect (flawless), restoring '
  - type: text
    content: and
  - type: text
    content: ' refreshing the soul;'
  - type: text
    content: The statutes of the L
  - type: heading
    content: ord
  - type: text
    content: ' are reliable '
  - type: text
    content: and
  - type: text
    content: ' trustworthy, making wise the simple.'
  '8':
  - type: text
    content: The precepts of the L
  - type: heading
    content: ord
  - type: text
    content: ' are right, bringing joy to the heart;'
  - type: text
    content: The commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' is pure, enlightening the eyes.'
  '9':
  - type: text
    content: The fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' is clean, enduring forever;'
  - type: text
    content: The judgments of the L
  - type: heading
    content: ord
  - type: text
    content: ' are true, they are righteous altogether.'
