document_id: PSA.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 19
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Works and the Word of God.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens are telling of the glory of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the expanse [of heaven] is declaring the work of His hands. [Rom 1:20, 21]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are more desirable than gold, yes, than much fine gold;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sweeter also than honey and the drippings of the honeycomb.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover, by them Your servant is warned [reminded, illuminated, and instructed];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In keeping them there is great reward.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who can understand his errors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' omissions? Acquit me of hidden (unconscious, unintended) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faults
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also keep back Your servant from presumptuous (deliberate, willful) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them not rule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have control over me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will be blameless (complete),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I shall be acquitted of great transgression.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the words of my mouth and the meditation of my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing in Your sight,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', my [firm, immovable] rock and my Redeemer.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day after day pours forth speech,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And night after night reveals knowledge.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no speech, nor are there [spoken] words [from the stars];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their voice is not heard.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet their voice [in quiet evidence] has gone out through all the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their words to the end of the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the heavens He has made a tent for the sun, [Rom 10:18]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which is as a bridegroom coming out of his chamber;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It rejoices as a strong man to run his course.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun’s rising is from one end of the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its circuit to the other end of them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is nothing hidden from its heat.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The law of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is perfect (flawless), restoring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refreshing the soul;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The statutes of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are reliable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy, making wise the simple.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The precepts of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are right, bringing joy to the heart;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is pure, enlightening the eyes.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is clean, enduring forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The judgments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are true, they are righteous altogether.'
