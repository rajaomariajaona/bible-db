  children:
  - type: text
    text: Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou will keep on seeing
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: but will not perceive
  - type: text
    text: ;
- type: usfm
