document_id: ACT.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Safe at Malta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After we were safe [on land], we found out that the island was called '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Melita,
        - type: text
          text: ' located about 60 miles south of Sicily and 600 miles west of Fair Havens, Crete.'
      marker-yv: yv-n
    - type: text
      text: 'Malta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They also gave us many honors [gifts and courtesies expressing respect]; and when we were setting sail, they supplied us with all the things we needed.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul Arrives at Rome
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of three months we set sail on a ship which had wintered at the island, an Alexandrian ship with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. sons of Zeus in Greek mythology.
      marker-yv: yv-n
    - type: text
      text: 'Twin Brothers [Castor and Pollux] as its figurehead. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We landed at Syracuse [on Sicily] and stayed there three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there we sailed around and arrived at Rhegium [on Italy’s southern tip]; and a day later a south wind came up, and on the second day we arrived at '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Located about 150 miles from Rome in the Bay of Naples, near Pompeii, this was Rome’s main seaport.
      marker-yv: yv-n
    - type: text
      text: 'Puteoli. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There we found some believers and were invited to stay with them for seven days. And so we came to Rome. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the brothers and sisters, having heard news about us, came from as far away as the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 43 miles from Rome.
      marker-yv: yv-n
    - type: text
      text: 'Forum of Appius and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 33 miles from Rome.
      marker-yv: yv-n
    - type: text
      text: Three Inns to meet us. When Paul saw them, he thanked God and was encouraged.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When we entered Rome, Paul was allowed to stay by himself [in rented quarters] with the soldier who was guarding him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three days later he called together the leaders of the Jews; and when they had gathered, he said to them, “Kinsmen, though I have done nothing against our people or against the customs of our fathers, yet I was turned over as a prisoner from Jerusalem into the hands of the Romans. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they had interrogated me, they were ready to release me because I was not guilty of any offense deserving death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Jews objected [to my release], I was forced to appeal to Caesar (Emperor Nero), not because I had any charge to make against my nation. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: barbaroi,
        - type: text
          text: ' referring to people who did not speak Greek.'
      marker-yv: yv-n
    - type: text
      text: 'natives showed us extraordinary kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hospitality; for they kindled a fire and welcomed us all, since it had begun to rain and was cold. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason I have asked to see you and talk with you, since it is for the sake of the hope of Israel (the Messiah, the resurrection) that I am bound with this chain.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, “We have not received [any] letters about you from Judea, nor have any of the [Jewish] brothers come here and reported or said anything bad about you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we would like to hear from you what your views are [that is, exactly what you believe]; for in regard to this sect (Christianity), we are fully aware that it is denounced everywhere.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had set a day for Paul, they came to his lodging in large numbers. And he carefully explained [Christianity] to them from morning until evening, solemnly testifying about the kingdom of God and trying to persuade them concerning Jesus, both from the Law of Moses and from the [writings of the] Prophets. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some were persuaded by what he said, but others would not believe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They disagreed among themselves and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to leave after Paul had made one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: last
    - type: text
      text: ' statement: “The Holy Spirit rightly spoke through Isaiah the prophet to your fathers, saying, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o to this people and say
    - type: text
