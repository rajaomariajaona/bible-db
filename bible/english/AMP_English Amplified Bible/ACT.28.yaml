  '28':
  - type: text
    content: 'Therefore let it be known to you that [this message of] the salvation of God has been sent to the Gentiles; they indeed will listen!” [Ps 67:2] '
  '29':
  - type: note
    content: Early mss do not contain this v.
  - type: text
    content: '[And when he had said these things, the Jews left, arguing among themselves.]'
  '3':
  - type: text
    content: 'But when Paul had gathered a bundle of sticks and laid them on the fire, a '
  - type: note
    content: Probably a sand viper (vipera ammodytes), whose venom is deadly and fast-acting.
  - type: text
    content: 'viper crawled out because of the heat and fastened itself on his hand. '
  '30':
  - type: text
    content: 'And Paul lived there for two full years [at his own expense] in his own rented lodging and welcomed all who came to him, '
  '31':
  - type: text
    content: 'preaching '
  - type: text
    content: and
  - type: text
    content: ' proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all openness '
  - type: text
    content: and
  - type: text
    content: ' boldness, unhindered '
  - type: text
    content: and
  - type: text
    content: ' unrestrained.'
  '4':
  - type: text
    content: 'When the natives saw the creature hanging from his hand, they '
  - type: text
    content: began
  - type: text
    content: ' saying to one another, “Undoubtedly this man is a murderer, and though he has been saved from the sea, Justice [the avenging goddess] has not permitted him to live.” '
  '5':
  - type: text
    content: 'Then Paul [simply] shook the creature off into the fire and suffered no ill effects. '
  '6':
  - type: text
    content: 'But they stood watching '
  - type: text
    content: and
  - type: text
    content: ' expecting him to swell up or suddenly drop dead. But after they had waited a long time and had seen nothing unusual happen to him, they changed their minds and '
  - type: text
    content: began
  - type: text
    content: ' saying that he was a god.'
  '7':
  - type: text
    content: 'In the vicinity of that place there were estates belonging to the leading man of the island, named Publius, who welcomed and entertained us hospitably for three days. '
  '8':
  - type: text
    content: 'And it happened that the father of Publius was sick [in bed] with recurring attacks of fever and dysentery; and Paul went to him, and after he had prayed, he laid his hands on him and healed him. '
  '9':
  - type: text
    content: 'After this occurred, the rest of the people on the island who had diseases were coming to him and being healed. '
