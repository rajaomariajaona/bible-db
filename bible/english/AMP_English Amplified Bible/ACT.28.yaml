    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or the heart
    - type: text
      text: ' (the understanding, the soul) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: of this people has become dull
    - type: text
      text: ' (calloused),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd with their ears they scarcely hear
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd they have shut their eyes
    - type: text
      text: ' [to the truth];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O
    - type: usfm
      marker: sc
      children:
      - type: text
        text: therwise they might see with their eyes
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd hear with their ears
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd understand with their heart and return
    - type: text
      text: ' [to Me],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: would heal them
    - type: text
      text: .” ’ [Is 6:9, 10]
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore let it be known to you that [this message of] the salvation of God has been sent to the Gentiles; they indeed will listen!” [Ps 67:2] '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early mss do not contain this v.
      marker-yv: yv-n
    - type: text
      text: '[And when he had said these things, the Jews left, arguing among themselves.]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Paul had gathered a bundle of sticks and laid them on the fire, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a sand viper (vipera ammodytes), whose venom is deadly and fast-acting.
      marker-yv: yv-n
    - type: text
      text: 'viper crawled out because of the heat and fastened itself on his hand. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Paul lived there for two full years [at his own expense] in his own rented lodging and welcomed all who came to him, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'preaching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all openness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldness, unhindered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unrestrained.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the natives saw the creature hanging from his hand, they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' saying to one another, “Undoubtedly this man is a murderer, and though he has been saved from the sea, Justice [the avenging goddess] has not permitted him to live.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul [simply] shook the creature off into the fire and suffered no ill effects. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they stood watching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expecting him to swell up or suddenly drop dead. But after they had waited a long time and had seen nothing unusual happen to him, they changed their minds and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' saying that he was a god.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the vicinity of that place there were estates belonging to the leading man of the island, named Publius, who welcomed and entertained us hospitably for three days. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it happened that the father of Publius was sick [in bed] with recurring attacks of fever and dysentery; and Paul went to him, and after he had prayed, he laid his hands on him and healed him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this occurred, the rest of the people on the island who had diseases were coming to him and being healed. '
