  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd with their ears they scarcely hear
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd they have shut their eyes
  - type: text
    text: ' [to the truth];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O
  - type: usfm
    marker: sc
    children:
    - type: text
      text: therwise they might see with their eyes
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd hear with their ears
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd understand with their heart and return
  - type: text
    text: ' [to Me],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd
  - type: text
    text: ' I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: would heal them
  - type: text
    text: .” ’ [Is 6:9, 10]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Therefore let it be known to you that [this message of] the salvation of God has been sent to the Gentiles; they indeed will listen!” [Ps 67:2] '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Early mss do not contain this v.
    marker-yv: yv-n
  - type: text
    text: '[And when he had said these things, the Jews left, arguing among themselves.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Paul lived there for two full years [at his own expense] in his own rented lodging and welcomed all who came to him, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'preaching '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all openness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boldness, unhindered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrestrained.'
