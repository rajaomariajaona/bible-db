document_id: ACT.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Safe at Malta
  - type: text
    content: 'After we were safe [on land], we found out that the island was called '
  - type: note
    content: Gr Melita, located about 60 miles south of Sicily and 600 miles west of Fair Havens, Crete.
  - type: text
    content: 'Malta. '
  '10':
  - type: text
    content: They also gave us many honors [gifts and courtesies expressing respect]; and when we were setting sail, they supplied us with all the things we needed.
  - type: heading
    content: Paul Arrives at Rome
  '11':
  - type: text
    content: 'At the end of three months we set sail on a ship which had wintered at the island, an Alexandrian ship with the '
  - type: note
    content: I.e. sons of Zeus in Greek mythology.
  - type: text
    content: 'Twin Brothers [Castor and Pollux] as its figurehead. '
  '12':
  - type: text
    content: 'We landed at Syracuse [on Sicily] and stayed there three days. '
  '13':
  - type: text
    content: 'From there we sailed around and arrived at Rhegium [on Italy’s southern tip]; and a day later a south wind came up, and on the second day we arrived at '
  - type: note
    content: Located about 150 miles from Rome in the Bay of Naples, near Pompeii, this was Rome’s main seaport.
  - type: text
    content: 'Puteoli. '
  '14':
  - type: text
    content: 'There we found some believers and were invited to stay with them for seven days. And so we came to Rome. '
  '15':
  - type: text
    content: 'And the brothers and sisters, having heard news about us, came from as far away as the '
  - type: note
    content: About 43 miles from Rome.
  - type: text
    content: 'Forum of Appius and '
  - type: note
    content: About 33 miles from Rome.
  - type: text
    content: Three Inns to meet us. When Paul saw them, he thanked God and was encouraged.
  '16':
  - type: text
    content: When we entered Rome, Paul was allowed to stay by himself [in rented quarters] with the soldier who was guarding him.
  '17':
  - type: text
    content: 'Three days later he called together the leaders of the Jews; and when they had gathered, he said to them, “Kinsmen, though I have done nothing against our people or against the customs of our fathers, yet I was turned over as a prisoner from Jerusalem into the hands of the Romans. '
  '18':
  - type: text
    content: 'After they had interrogated me, they were ready to release me because I was not guilty of any offense deserving death. '
  '19':
  - type: text
    content: 'But when the Jews objected [to my release], I was forced to appeal to Caesar (Emperor Nero), not because I had any charge to make against my nation. '
  '2':
  - type: text
    content: 'And the '
  - type: note
    content: Gr barbaroi, referring to people who did not speak Greek.
  - type: text
    content: 'natives showed us extraordinary kindness '
  - type: text
    content: and
  - type: text
    content: ' hospitality; for they kindled a fire and welcomed us all, since it had begun to rain and was cold. '
  '20':
  - type: text
    content: 'For this reason I have asked to see you and talk with you, since it is for the sake of the hope of Israel (the Messiah, the resurrection) that I am bound with this chain.” '
  '21':
  - type: text
    content: 'They said to him, “We have not received [any] letters about you from Judea, nor have any of the [Jewish] brothers come here and reported or said anything bad about you. '
  '22':
  - type: text
    content: But we would like to hear from you what your views are [that is, exactly what you believe]; for in regard to this sect (Christianity), we are fully aware that it is denounced everywhere.”
  '23':
  - type: text
    content: 'When they had set a day for Paul, they came to his lodging in large numbers. And he carefully explained [Christianity] to them from morning until evening, solemnly testifying about the kingdom of God and trying to persuade them concerning Jesus, both from the Law of Moses and from the [writings of the] Prophets. '
  '24':
  - type: text
    content: 'Some were persuaded by what he said, but others would not believe. '
  '25':
  - type: text
    content: 'They disagreed among themselves and they '
