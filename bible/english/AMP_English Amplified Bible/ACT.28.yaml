    children:
    - type: text
      text: '27'
  - type: text
    text: F
  - type: usfm
    marker: sc
    children:
    - type: text
      text: or the heart
  - type: text
    text: ' (the understanding, the soul) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: of this people has become dull
  - type: text
    text: ' (calloused),'
