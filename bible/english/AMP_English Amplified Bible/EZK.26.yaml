document_id: EZK.26,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment on Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now in the eleventh year, on the first [day] of the month [after the capture of King Jehoiachin], the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Because of the great number of his horses, their dust will cover you; your walls [O Tyre] will shake from the noise of the horsemen and the wagons and the chariots when he enters your gates as men enter a city that is breached. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'With the hoofs of his horses Nebuchadnezzar will trample all your streets; with the sword he will kill your people, and your strong pillars (obelisks) will fall to the ground. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Also they will take your riches as spoil and plunder your merchandise, and tear down your walls and your pleasant houses, and throw your stones and your timber and the debris [from your city] out in the water. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So I will silence your songs, and the sound of your lyres will no longer be heard. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will make you [Tyre] a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'According to Herodotus, Tyre’s recorded history began in 2750 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . It was a fortified city in Joshua’s time (Josh 19:29), and later became a great maritime commercial center (Is 23:8). Yet Jeremiah (Jer 27:2-7; 47:4) and Ezekiel (Ezek 26:3-21; 28:6-10) both foretold the destruction of ancient Tyre. Tyre was attacked repeatedly by various ancient powers including the Egyptians, the Babylonians, the Greeks, and the Romans.
      marker-yv: yv-n
    - type: text
      text: bare rock; you will be a dry place on which to spread nets. You will never be rebuilt, for I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' to Tyre, “Shall not the coastlands shake at the sound of your fall when the wounded groan, when the slaughter occurs in your midst? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then all the princes of the sea will go down from their thrones and remove their robes and take off their embroidered garments. They will clothe themselves with trembling; they will sit on the ground, tremble again and again, and be appalled at you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They will take up a dirge (funeral poem to be sung) for you and say to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘How you have perished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vanished, O renowned city,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the seas, O renowned city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which was mighty on the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She and her inhabitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who imposed her terror
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On all who lived there!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ‘Now the coastlands will tremble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day of your fall;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the coastlands which are by the sea
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be terrified at your departure.’ ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “When I make you a desolate city, like the cities which are not inhabited, when I bring up the deep over you and great waters cover you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, because '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tyre, the Phoenician capital, was a major trading port established on the Mediterranean coast (Lebanon). An adjoining city was built on an island about a half mile off shore. Nebuchadnezzar besieged Tyre, without success, for fifteen years (586-571 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '.). To prevent Nebuchadnezzar from getting their valuables, the people of Tyre moved to the island city. The conqueror destroyed the city on the mainland and left. More than two centuries later, Alexander the Great, in 332 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: ., used the ruins of the old city, even scraping up the dust, to make a causeway to the island (then home to about 30,000 people) during a seven-month siege. In the following decades sand, silt and debris collected over the causeway and the island was joined to the mainland. Its most famous export was the purple dye derived from the murex, a marine snail, found along its shores.
      marker-yv: yv-n
    - type: text
      text: 'Tyre has said against Jerusalem, ‘Aha! The gateway of the people is broken; she is open to me. I will be filled, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now that
    - type: text
      text: ' she is a desolate waste,’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'then I will bring you down with those who descend into the pit (the place of the dead), to the people of old, and I will make you [Tyre] live in the depths of the earth, like the ancient ruins, with those who go down to the pit, so that you will not be inhabited; but I will set glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor in the land of the living. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I will bring terrors on you and you will be no more. Though you will be sought, yet you will never be found again,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Behold, I am against you, O Tyre, and I will cause many nations to come up against you, as the sea makes its waves crest. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They will destroy the walls of Tyre and break down her towers; and I will scrape her dust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' debris from her and make her as bare as [the top of] a rock. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her island in the midst of the sea will become a dry place to spread nets, for I have spoken,’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘and she will become a prey '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a spoil for the nations. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Also Tyre’s daughters (towns, villages) '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the field
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: on the mainland will be killed by the sword, and they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Behold, I will bring upon Tyre from the north '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Jer 21:2.
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar the king of Babylon, king of kings, with horses and chariots and with horsemen and a great army. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He will kill your daughters on the mainland with the sword, and he shall make siege walls against you and build a siege ramp against you and raise [a roof of] large shields [as a defense] against you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He will direct the [shocking] blow of his battering rams against your walls, and he will tear down your towers with his crowbars. '
