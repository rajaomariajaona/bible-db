  '2':
  - type: text
    content: '“Son of man, because '
  - type: note
    content: Tyre, the Phoenician capital, was a major trading port established on the Mediterranean coast (Lebanon). An adjoining city was built on an island about a half mile off shore. Nebuchadnezzar besieged Tyre, without success, for fifteen years (586-571 b.c.). To prevent Nebuchadnezzar from getting their valuables, the people of Tyre moved to the island city. The conqueror destroyed the city on the mainland and left. More than two centuries later, Alexander the Great, in 332 b.c., used the ruins of the old city, even scraping up the dust, to make a causeway to the island (then home to about 30,000 people) during a seven-month siege. In the following decades sand, silt and debris collected over the causeway and the island was joined to the mainland. Its most famous export was the purple dye derived from the murex, a marine snail, found along its shores.
  - type: text
    content: 'Tyre has said against Jerusalem, ‘Aha! The gateway of the people is broken; she is open to me. I will be filled, '
