  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'Because of the great number of his horses, their dust will cover you; your walls [O Tyre] will shake from the noise of the horsemen and the wagons and the chariots when he enters your gates as men enter a city that is breached. '
  '11':
  - type: text
    content: 'With the hoofs of his horses Nebuchadnezzar will trample all your streets; with the sword he will kill your people, and your strong pillars (obelisks) will fall to the ground. '
  '12':
  - type: text
    content: 'Also they will take your riches as spoil and plunder your merchandise, and tear down your walls and your pleasant houses, and throw your stones and your timber and the debris [from your city] out in the water. '
  '13':
  - type: text
    content: 'So I will silence your songs, and the sound of your lyres will no longer be heard. '
  '14':
  - type: text
    content: 'I will make you [Tyre] a '
  - type: note
    content: According to Herodotus, Tyre’s recorded history began in 2750 b.c. It was a fortified city in Joshua’s time (Josh 19:29), and later became a great maritime commercial center (Is 23:8). Yet Jeremiah (Jer 27:2-7; 47:4) and Ezekiel (Ezek 26:3-21; 28:6-10) both foretold the destruction of ancient Tyre. Tyre was attacked repeatedly by various ancient powers including the Egyptians, the Babylonians, the Greeks, and the Romans.
  - type: text
