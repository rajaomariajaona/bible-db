document_id: HOS.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Response to God’s Rebuke
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come and let us return [in repentance] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has torn us, but He will heal us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has wounded us, but He will bandage us.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen a horrible thing [sins of every kind] in the house of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim’s prostitution (idolatry) is there; Israel has defiled itself.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also, O Judah, there is a harvest [of divine judgment] appointed for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I restore the fortunes of My people [who have been slaves to the misery of sin].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “After two days He will revive us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the third day He will raise us up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may live before Him. [Is 26:19; Ezek 37:1-10]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“So let us know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become personally acquainted with Him; let us press on to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand fully the [greatness of the] L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to honor, heed, and deeply cherish Him].'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His appearing is prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is as certain as the dawn,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will come to us [in salvation] like the [heavy] rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the spring rain watering the earth.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Reply of the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O Ephraim, what shall I do with you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Judah, what shall I do with you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For your [wavering] loyalty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindness are [transient] like the morning cloud'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like the dew that goes away early.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I have hewn them in pieces by [the words of] the prophets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have slain them by the words of My mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My judgments [pronounced upon them by the prophets] are like the light that shines forth [obvious to all].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I desire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in [steadfast] loyalty [faithfulness in the covenant relationship], rather than sacrifice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the knowledge of God more than burnt offerings. [Matt 9:13; 12:7]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they, like Adam, have transgressed the covenant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There they have dealt treacherously against Me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gilead is a city of wrongdoers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is tracked with bloody '
    - type: usfm
      marker: it
      children:
      - type: text
        text: footprints
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as bands of robbers [lie in] wait for a man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So a band of priests murder on the road toward '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shechem was the first capital city of the Kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: Shechem [covering their crimes in that city of refuge];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Certainly they have committed crimes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' outrages.'
