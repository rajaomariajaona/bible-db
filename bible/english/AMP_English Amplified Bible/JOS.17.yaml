document_id: JOS.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Territory of Manasseh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this was the lot (allotment) for the tribe of Manasseh, for he was the firstborn of Joseph. To Machir the firstborn of Manasseh, the father of Gilead, were allotted Gilead and Bashan, because he was a man of war. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The land on the south side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to Ephraim and that on the north side was Manasseh’s, and the sea was their border; they reached to [the territory of] Asher on the north and to [the territory of] Issachar on the east. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, in Issachar and in Asher, Manasseh had Beth-shean and its towns and Ibleam and its towns, and the inhabitants of Dor and its towns, and the inhabitants of En-dor and its towns, and the inhabitants of Taanach and its towns, and the inhabitants of Megiddo and its towns; the third is Napheth. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the sons of Manasseh were not able to [drive out the inhabitants and] take possession of these cities, because the Canaanites persisted in living in that land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Israelites became strong, they put the Canaanites to forced labor, but they did not drive them out completely.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The sons of Joseph spoke to Joshua, saying, “Why have you given us only one lot and one portion as an inheritance, when we are a numerous people whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has so far blessed?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua replied, “If you are a numerous people, go up to the forest and clear ground for yourselves there in the land of the Perizzites and the Rephaim, since the hill country of Ephraim is too narrow for you.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Joseph said, “The hill country is not enough for us, and all the Canaanites who live in the valley have iron chariots, both those who are in Beth-shean and its towns and those in the Valley of Jezreel.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said to the house of Joseph, to Ephraim and to Manasseh, “You are a numerous people and have great power; you shall not have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' one lot, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but the hill country shall be yours. For though it is a forest, you shall clear it and possess it to its farthest borders; for you shall drive out the Canaanites, even though they have iron chariots and though they are strong.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the lot
    - type: text
      text: ' was also made for the rest of the sons of Manasseh according to their families—for the sons of Abiezer and for the sons of Helek and for the sons of Asriel and for the sons of Shechem and for the sons of Hepher and for the sons of Shemida; these were the male descendants of Manasseh the son of Joseph according to their families (clans).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, had no sons, only daughters; and these are the names of his daughters: Mahlah and Noah, Hoglah, Milcah and Tirzah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came before Eleazar the priest and before Joshua the son of Nun and before the leaders and said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded Moses to give us an inheritance among our brothers.” So according to the command of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' Joshua gave them an inheritance among their father’s brothers. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So ten portions fell to Manasseh, besides the land of Gilead and Bashan, which is beyond the Jordan [on the east side of the river], '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because the daughters of [Zelophehad, a descendant of] Manasseh had received an inheritance among his [other] sons [whose inheritance went to their male descendants]. The land of Gilead belonged to the rest of the sons of Manasseh. [Num 36:5-12]
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The territory of Manasseh reached from Asher to Michmethath which was east of Shechem; then the border went southward to the inhabitants of En-tappuah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The land of Tappuah belonged to Manasseh, but [the city of] Tappuah on the border of Manasseh belonged to the sons of Ephraim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the border went down to the brook of Kanah, south of the brook (these cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to Ephraim, among the cities of Manasseh), and Manasseh’s border was on the north side of the brook and it ended at the sea. '
