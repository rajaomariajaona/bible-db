document_id: 1SA.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Flees to the Philistines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David said in his heart, “Now I will die one day by the hand of Saul. There is nothing better for me than to escape to the land of the Philistines. Then Saul will give up searching for me inside the borders of Israel, and I will escape from his hand [once and for all].” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Achish asked, “Where did you raid today?” David replied, “Against the Negev (the South country) of Judah, and against the Negev of the Jerahmeelites, and against the Negev of the Kenites.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David did not leave a man or a woman alive to bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: news
    - type: text
      text: ' to Gath, saying [to himself], “Otherwise they will tell about us, saying, ‘This is what David has done, and this has been his practice all the time that he has lived in the country of the Philistines.’ ” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achish believed David, saying, “He has certainly become hated by his people in Israel; so he will always be my servant.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David and the six hundred men who were with him arose and crossed over to Achish the son of Maoch, king of Gath. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David lived with Achish at Gath, he and his men, each man with his household, and David with his two wives, Ahinoam the Jezreelitess, and Abigail the Carmelitess, [who was] Nabal’s widow. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Saul was told that David had fled to Gath, he no longer searched for him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to Achish, “If I have found favor in your sight, let me be given a place [of my own] in one of the cities in the country, so that I may live there; for why should your servant live in the royal city with you?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Achish gave David [the town of] Ziklag that day. Therefore Ziklag has belonged to the kings of Judah to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the time of this writing.
      marker-yv: yv-n
    - type: text
      text: 'this day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The number of days that David lived in the country of the Philistines was a year and four months.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now David and his men went up and raided the Geshurites, the Girzites, and the Amalekites [the enemies of Israel that Joshua had failed to annihilate]; for they had inhabited the land from ancient times, as one comes to Shur even as far as the land of Egypt. [Deut 25:19; Josh 13:1, 2, 13] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David attacked the land and did not leave a man or a woman alive, but he took the sheep, the cattle, the donkeys, the camels, and the clothing, and returned to Achish. '
