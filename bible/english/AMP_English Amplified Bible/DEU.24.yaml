type_code: eng
verses:
  '1':
  - type: heading
    content: Law of Divorce
  - type: text
    content: '“When a man takes a wife and marries her, and it happens that she '
  - type: note
    content: Lit finds no favor in his eyes.
  - type: text
    content: 'loses his favor because he has found something indecent '
  - type: text
    content: or
  - type: text
    content: ' unacceptable about her, and he writes her a certificate of divorce, puts it in her hand and sends her out of his house, '
  '10':
  - type: text
    content: '“When you lend your neighbor anything, you shall not go into his house to get his pledge (security deposit). '
  '11':
  - type: text
    content: 'You shall stand outside, and the man to whom you lend shall bring the pledge out to you. '
  '12':
  - type: text
    content: 'If the man is poor, you shall not keep his '
  - type: note
    content: A poor man might have only an outer garment to offer as a pledge of repayment.
  - type: text
    content: 'pledge overnight. '
  '13':
  - type: text
    content: You shall certainly restore the pledge (security deposit) to him at sunset, so that he may sleep in his garment and bless you; and it will be credited to you as righteousness (right standing) before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '14':
  - type: text
    content: '“You shall not take advantage of a hired servant who is poor and needy, whether [he is] one of your countrymen or one of the strangers (resident aliens, foreigners) who is in your land inside your cities. '
  '15':
  - type: text
    content: 'You shall give him his wages on the day that he earns them before the sun sets—for he is poor and is '
  - type: note
    content: Lit sets his heart.
  - type: text
    content: counting on it—so that he does not cry out to the L
  - type: heading
    content: ord
  - type: text
    content: ' against you, and it becomes a sin for you.'
  '16':
  - type: text
    content: “The fathers shall not be put to death for [the sins of] their children, nor shall the children be put to death for their fathers; [only] for his own sin shall anyone be put to death.
  '17':
  - type: text
    content: '“You shall not pervert the justice due a stranger or an orphan, nor seize (impound) a widow’s garment as security [for a loan]. '
  '18':
  - type: text
    content: But you shall remember that you were a slave in Egypt, and the L
  - type: heading
    content: ord
  - type: text
    content: ' your God redeemed you from there; therefore I am commanding you to do this thing.'
  '19':
  - type: text
    content: “
  - type: note
    content: The divine laws for harvesting give a clear picture of how Israel was to provide for the feeding of the poor and destitute, in addition to charitable contributions which were required or expected of anyone who was able. The owner of a field or farm was entitled to everything he could harvest with a reasonable effort. God reserved any leftovers for the poor, who for their part had to put in their own efforts to glean the fields. These laws are examples of charity in cooperation with fairness and the work ethic.
  - type: text
    content: When you reap your harvest in your field and have forgotten a sheaf [of grain] in the field, you shall not go back to get it; it shall be for the stranger, for the orphan, and for the widow, so that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God may bless you in all the work of your hands. '
  '2':
  - type: text
    content: 'and after she leaves his house, she goes and becomes another man’s wife, '
  '20':
  - type: text
    content: When you beat [the olives off of] your olive tree, do not search through the branches again; [whatever is left] shall be for the stranger, for the orphan, and for the widow.
  '21':
  - type: text
    content: '“When you gather the grapes of your vineyard, you shall not glean it afterward; it shall be for the stranger, for the orphan, and for the widow. '
  '22':
  - type: text
    content: You shall [thoughtfully] remember [the fact] that you were a slave in the land of Egypt; therefore I am commanding you to do this thing.
  '3':
  - type: text
    content: 'and if the latter husband '
  - type: note
    content: Lit hates.
  - type: text
    content: 'turns against her and writes her a certificate of divorce, puts it in her hand, and sends her out of his house, or if the latter husband dies who took her as his wife, '
  '4':
  - type: text
    content: then her former husband who [first] sent her away may not take her again as his wife, since she has been defiled; for that is an outrage before the L
  - type: heading
    content: ord
  - type: text
    content: ', and you shall not bring sin on the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you as an inheritance.'
  '5':
  - type: text
    content: “When a man takes a new wife, he shall not go out [to fight] with the army nor be charged with any duty; he shall be free at home for one year and shall bring happiness to his wife whom he has taken.
  - type: heading
    content: Various Laws
  '6':
  - type: text
    content: “No one shall take a handmill or an upper millstone [used to grind grain into bread] as security [for a debt], for he would be taking a [person’s] life in pledge.
  '7':
  - type: text
    content: “If a man is caught kidnapping any of his countrymen from the sons of Israel, and he treats him violently or sells him [as a slave], then that thief shall die. So you shall remove the evil from among you.
  '8':
  - type: text
    content: '“Be careful during an outbreak of leprosy, that you diligently observe and do according to all that the Levitical priests teach you; just as I have commanded them, so you shall be careful to do. [Lev 13:14, 15] '
  '9':
  - type: text
    content: Remember [with thoughtful concern] what the L
  - type: heading
    content: ord
  - type: text
    content: ' your God did to Miriam on the road as you came out of Egypt. [Num 12:10]'
