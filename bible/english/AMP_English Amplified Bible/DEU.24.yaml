        children:
        - type: text
          text: finds no favor in his eyes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'loses his favor because he has found something indecent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unacceptable about her, and he writes her a certificate of divorce, puts it in her hand and sends her out of his house, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and after she leaves his house, she goes and becomes another man’s wife, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and if the latter husband '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hates
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'turns against her and writes her a certificate of divorce, puts it in her hand, and sends her out of his house, or if the latter husband dies who took her as his wife, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: then her former husband who [first] sent her away may not take her again as his wife, since she has been defiled; for that is an outrage before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and you shall not bring sin on the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you as an inheritance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “When a man takes a new wife, he shall not go out [to fight] with the army nor be charged with any duty; he shall be free at home for one year and shall bring happiness to his wife whom he has taken.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “No one shall take a handmill or an upper millstone [used to grind grain into bread] as security [for a debt], for he would be taking a [person’s] life in pledge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “If a man is caught kidnapping any of his countrymen from the sons of Israel, and he treats him violently or sells him [as a slave], then that thief shall die. So you shall remove the evil from among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Be careful during an outbreak of leprosy, that you diligently observe and do according to all that the Levitical priests teach you; just as I have commanded them, so you shall be careful to do. [Lev 13:14, 15] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Remember [with thoughtful concern] what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God did to Miriam on the road as you came out of Egypt. [Num 12:10]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“When you lend your neighbor anything, you shall not go into his house to get his pledge (security deposit). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You shall stand outside, and the man to whom you lend shall bring the pledge out to you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'If the man is poor, you shall not keep his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A poor man might have only an outer garment to offer as a pledge of repayment.
    marker-yv: yv-n
  - type: text
    text: 'pledge overnight. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You shall certainly restore the pledge (security deposit) to him at sunset, so that he may sleep in his garment and bless you; and it will be credited to you as righteousness (right standing) before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“You shall not take advantage of a hired servant who is poor and needy, whether [he is] one of your countrymen or one of the strangers (resident aliens, foreigners) who is in your land inside your cities. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You shall give him his wages on the day that he earns them before the sun sets—for he is poor and is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sets his heart
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: counting on it—so that he does not cry out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' against you, and it becomes a sin for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “The fathers shall not be put to death for [the sins of] their children, nor shall the children be put to death for their fathers; [only] for his own sin shall anyone be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“You shall not pervert the justice due a stranger or an orphan, nor seize (impound) a widow’s garment as security [for a loan]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But you shall remember that you were a slave in Egypt, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God redeemed you from there; therefore I am commanding you to do this thing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The divine laws for harvesting give a clear picture of how Israel was to provide for the feeding of the poor and destitute, in addition to charitable contributions which were required or expected of anyone who was able. The owner of a field or farm was entitled to everything he could harvest with a reasonable effort. God reserved any leftovers for the poor, who for their part had to put in their own efforts to glean the fields. These laws are examples of charity in cooperation with fairness and the work ethic.
    marker-yv: yv-n
  - type: text
    text: When you reap your harvest in your field and have forgotten a sheaf [of grain] in the field, you shall not go back to get it; it shall be for the stranger, for the orphan, and for the widow, so that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God may bless you in all the work of your hands. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When you beat [the olives off of] your olive tree, do not search through the branches again; [whatever is left] shall be for the stranger, for the orphan, and for the widow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“When you gather the grapes of your vineyard, you shall not glean it afterward; it shall be for the stranger, for the orphan, and for the widow. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You shall [thoughtfully] remember [the fact] that you were a slave in the land of Egypt; therefore I am commanding you to do this thing.
