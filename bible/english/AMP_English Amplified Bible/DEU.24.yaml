    children:
    - type: text
      text: '1'
  - type: text
    text: '“When a man takes a wife and marries her, and it happens that she '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
