document_id: EZR.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Altar and Sacrifices Restored
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When the seventh month came and the sons of Israel were in the cities, the people gathered together as one man to Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Now when the builders had laid the foundation of the temple of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the priests stood in their apparel with trumpets, and the Levites, the sons of Asaph, with their cymbals, to praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in accordance with the directions of David king of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They sang [responsively], praising and giving thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying
    - type: text
      text: ', “For He is good, for His lovingkindness (mercy) toward Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endures
    - type: text
      text: ' forever.” And all the people shouted with a great shout when they praised the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' because the foundation of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was laid. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But many of the priests and Levites and heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households,
    - type: text
      text: ' the old men who had seen the first house (temple), wept with a loud voice when the foundation of this house was laid before their eyes, while many shouted aloud for joy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: so that the people could not distinguish the sound of the shout of joy from the sound of the weeping of the people, for the people shouted with a loud shout, and the sound was heard far away.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Jeshua the son of Jozadak and his brothers the priests, and Zerubbabel the son of Shealtiel and his brothers arose, and they built the altar of the God of Israel, to offer burnt offerings on it, as it is written in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word here is '
        - type: usfm
          marker: it
          children:
          - type: text
            text: torah,
        - type: text
          text: ' usually translated “law.”'
      marker-yv: yv-n
    - type: text
      text: 'Law of Moses, the man of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So they set up the altar on its [old] foundation, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: for a state of terror was upon them
        - type: text
          text: . Some prefer “in spite of the hostility [or fear] upon them,” indicating that setting up the altar was an act of bravery in the face of external threats. But the real problem seems to be that they had delayed construction of the temple, even on the foundation (vv 6, 10), for fear of their neighbors. So now they conducted services in the open, with the bare minimum of the altar in its proper position. One can credit Zerubbabel and his associates (v 2) for taking the initiative to begin worship services and festivals, but having to do so with nothing more than the altar paints a pathetic picture, especially since the nation had the full support of Cyrus.
      marker-yv: yv-n
    - type: text
      text: for they were terrified because of the peoples of the lands; and they offered burnt offerings on it to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', morning and evening. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They celebrated the Feast of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Tabernacles
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Booths, as it is written, and offered the fixed number of daily burnt offerings, in accordance with the ordinances, as each day required; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and afterward, there was the continual burnt offering, the offering at the New Moons, and at all the appointed festivals of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that were consecrated, and the offerings of everyone who made a voluntary offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: From the first day of the seventh month they began to offer burnt offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but the foundation of the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had not been laid. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They gave money to the masons and to the carpenters, and gave food, drink, and [olive] oil to the people from Sidon and Tyre, to bring cedar wood from Lebanon to the seaport of Joppa, in accordance with the authorization they had from Cyrus king of Persia.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Temple Restoration Begun
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In the second year of their coming to God’s house at Jerusalem, in the second month, Zerubbabel the son of Shealtiel and Jeshua the son of Jozadak began [the work], with the rest of their brothers—the priests and Levites and all who came to Jerusalem from the captivity. They appointed the Levites, from twenty years old and upward, to oversee the work of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then Jeshua with his sons and brothers stood united with Kadmiel and his sons, the sons of Judah and the sons of Henadad with their sons and brothers the Levites, to oversee the workmen in the house of God.
