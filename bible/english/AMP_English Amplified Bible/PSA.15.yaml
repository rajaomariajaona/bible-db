  '1':
  - type: heading
    content: Psalm 15
  - type: heading
    content: Description of a Citizen of Zion.
  - type: text
    content: A Psalm of David.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', who may lodge [as a guest] in Your tent?'
  - type: text
    content: Who may dwell [continually] on Your holy hill?
  '2':
  - type: text
    content: 'He who walks with integrity '
  - type: text
    content: and
  - type: text
    content: ' strength of character, and works righteousness,'
  - type: text
    content: 'And speaks '
  - type: text
    content: and
  - type: text
    content: ' holds truth in his heart.'
  '3':
  - type: text
    content: He does not slander with his tongue,
  - type: text
    content: Nor does evil to his neighbor,
  - type: text
    content: Nor takes up a reproach against his friend;
  '4':
  - type: text
    content: In his eyes an evil person is despised,
  - type: text
    content: But he honors those who fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [and obediently worship Him with awe-inspired reverence and submissive wonder].'
  - type: text
    content: He keeps his word even to his own disadvantage and does not change it [for his own benefit];
  '5':
  - type: text
    content: He does not put out his money at interest [to a fellow Israelite],
  - type: text
    content: And does not take a bribe against the innocent.
  - type: text
    content: He who does these things will never be shaken. [Ex 22:25, 26]
