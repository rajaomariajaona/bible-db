    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', who may lodge [as a guest] in Your tent?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who may dwell [continually] on Your holy hill?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He who walks with integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength of character, and works righteousness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And speaks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' holds truth in his heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He does not slander with his tongue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does evil to his neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor takes up a reproach against his friend;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In his eyes an evil person is despised,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he honors those who fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [and obediently worship Him with awe-inspired reverence and submissive wonder].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He keeps his word even to his own disadvantage and does not change it [for his own benefit];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He does not put out his money at interest [to a fellow Israelite],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does not take a bribe against the innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who does these things will never be shaken. [Ex 22:25, 26]
