  - type: text
    content: And be like a clan in Judah,
  - type: text
    content: 'And Ekron will be like one of the '
  - type: note
    content: An ancient tribal people who lived in the area around Jerusalem before it was captured by King David. They were absorbed by other tribes and lost their identity in Israel.
  - type: text
