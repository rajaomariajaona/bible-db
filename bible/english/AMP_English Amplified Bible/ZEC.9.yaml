    marker-yv: yv-n
  - type: text
    text: oracle (a burdensome message) of the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is against the land of Hadrach [in Syria], with Damascus as its resting place (for the eyes of men, especially of all the tribes of Israel, are toward the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
