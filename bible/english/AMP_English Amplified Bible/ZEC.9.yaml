  '9':
  - type: text
    content: Rejoice greatly, O Daughter of Zion!
  - type: text
    content: Shout aloud, O Daughter of Jerusalem!
  - type: text
    content: Behold, your King (Messianic King) is coming to you;
  - type: text
    content: He is righteous and endowed with salvation,
  - type: note
    content: Quoted in the NT to describe the triumphal entry of Jesus into Jerusalem, see Matt 21:1-11; Mark 11:1-11; Luke 19:28-38; John 12:14-16.
  - type: text
    content: 'Humble '
  - type: text
    content: and
  - type: text
    content: ' unassuming [in submission to the will of the Father] and riding on a '
  - type: note
    content: As a matter of discussion, the ancient rabbis noted an apparent contradiction between the coming of the Messiah with the clouds of heaven in Dan 7:13, and his riding on a donkey as prophesied here. Their solution was that Messiah would come with the clouds if Israel was worthy, but on a donkey if Israel was not.
  - type: text
    content: donkey,
  - type: text
    content: Upon a colt, the foal of a donkey.
