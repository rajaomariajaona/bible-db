    children:
    - type: text
      text: '2'
  - type: text
    text: And Hamath also, which borders on it (Damascus),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tyre and Sidon, though they are very wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For Tyre built herself an [impregnable] stronghold [on an island offshore],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And she has heaped up silver like dust
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gold like the mire of the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Behold, the Lord will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In 332 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . after a siege lasting seven months, Tyre was conquered by Alexander the Great. At that time Tyre consisted of two urban sites, one on the mainland and the other on the island a half mile from the shore. In order to conquer Tyre Alexander built a causeway from the mainland to the island. History records that he killed everyone except those who fled to the temples, then he ordered the houses to be set afire. The modern city of Sur, Lebanon, is near the site of ancient Tyre.
    marker-yv: yv-n
  - type: text
    text: dispossess her
- type: usfm
  marker: q1
  children:
  - type: text
    text: And throw her wealth into the sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Tyre will be devoured by fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ashkelon, one of the five major Philistine cities (Josh 13:3) was the birthplace of Herod the Great, and the home of his sister, Salome. Gath and Ashdod are the major Philistine cities not named in this verse. Zechariah’s prophecy about Ashkelon’s total destruction was fulfilled during the time of the Crusades, (about '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 1260-1270), when Sultan Baibars, who was fighting against the Crusaders, reduced the site of ancient Ashkelon to ruins and filled the harbor with stones.
    marker-yv: yv-n
  - type: text
    text: Ashkelon will see it and fear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaza will writhe in pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And Ekron, for her hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation, has been ruined.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The king will perish from Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Ashkelon will not be inhabited.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And a mongrel race will live in Ashdod,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will put an end to the pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogance of the Philistines.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will take the blood from their mouths
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their detestable things from between their teeth [those repulsive, idolatrous sacrifices eaten with the blood].
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they too will be a remnant for our God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And be like a clan in Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And Ekron will be like one of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ancient tribal people who lived in the area around Jerusalem before it was captured by King David. They were absorbed by other tribes and lost their identity in Israel.
    marker-yv: yv-n
  - type: text
    text: Jebusites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then I will camp around My house [as a guard] because of an army,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of him who passes by and returns;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And no oppressor will again overrun them (Israel),
- type: usfm
  marker: q1
  children:
  - type: text
    text: For now My eyes are upon them [providentially protecting them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Rejoice greatly, O Daughter of Zion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout aloud, O Daughter of Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, your King (Messianic King) is coming to you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is righteous and endowed with salvation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Quoted in the NT to describe the triumphal entry of Jesus into Jerusalem, see Matt 21:1-11; Mark 11:1-11; Luke 19:28-38; John 12:14-16.
    marker-yv: yv-n
  - type: text
    text: 'Humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unassuming [in submission to the will of the Father] and riding on a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As a matter of discussion, the ancient rabbis noted an apparent contradiction between the coming of the Messiah with the clouds of heaven in Dan 7:13, and his riding on a donkey as prophesied here. Their solution was that Messiah would come with the clouds if Israel was worthy, but on a donkey if Israel was not.
    marker-yv: yv-n
  - type: text
    text: donkey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon a colt, the foal of a donkey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I will cut off the [war] chariot from Ephraim
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the [war] horse from Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the bow of war will be cut off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will speak [words of] peace to the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His dominion shall be from sea to sea [absolutely endless],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the River [Euphrates] to the ends of the earth. [Ps 72:8]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Salvation of Judah and Ephraim
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶As for you also, because of the blood of My covenant with you [My chosen people, the covenant that was sealed with blood]
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have freed your prisoners from the waterless pit. [Gen 37:24; Ex 24:4-8; Heb 9:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Return to the stronghold [of security and prosperity], O prisoners who have the hope;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even today I am declaring that I will restore double [your former prosperity] to you [as firstborn among nations]. [Ps 40:2; Is 40:2]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For I will bend Judah as My bow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will fit the bow with Ephraim [as My arrow].
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will stir up your sons, O Zion, against your sons, O Greece,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will make you [Israel] like the sword of a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be seen [hovering] over them [protecting His people],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His arrow will go forth like lightning;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' will blow the trumpet'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will march in the windstorms of the south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts shall defend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will devour [the enemy] and trample down the slingstones [that have missed their mark],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will drink [of victory] and be boisterous as with wine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they shall be filled like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrificial
  - type: text
    text: ' bowls [used to catch the blood],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Drenched
  - type: text
    text: ' like the corners of the [sacrificial] altar.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God shall save them on that day'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the flock of His people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they are like the [precious] jewels of a crown,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Displayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glittering in His land.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For how great is God’s goodness and how great is His beauty! And how great [He will make Israel’s] goodliness and [Israel’s] beauty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grain and new wine will make the young men and virgins flourish.
