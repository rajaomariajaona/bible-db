  '3':
  - type: text
    content: For Tyre built herself an [impregnable] stronghold [on an island offshore],
  - type: text
    content: And she has heaped up silver like dust
  - type: text
    content: And gold like the mire of the streets.
  '4':
  - type: text
    content: 'Behold, the Lord will '
  - type: note
    content: In 332 b.c. after a siege lasting seven months, Tyre was conquered by Alexander the Great. At that time Tyre consisted of two urban sites, one on the mainland and the other on the island a half mile from the shore. In order to conquer Tyre Alexander built a causeway from the mainland to the island. History records that he killed everyone except those who fled to the temples, then he ordered the houses to be set afire. The modern city of Sur, Lebanon, is near the site of ancient Tyre.
  - type: text
    content: dispossess her
  - type: text
    content: And throw her wealth into the sea;
  - type: text
    content: And Tyre will be devoured by fire.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ashkelon, one of the five major Philistine cities (Josh 13:3) was the birthplace of Herod the Great, and the home of his sister, Salome. Gath and Ashdod are the major Philistine cities not named in this verse. Zechariah’s prophecy about Ashkelon’s total destruction was fulfilled during the time of the Crusades, (about a.d. 1260-1270), when Sultan Baibars, who was fighting against the Crusaders, reduced the site of ancient Ashkelon to ruins and filled the harbor with stones.
  - type: text
    content: Ashkelon will see it and fear;
  - type: text
    content: Gaza will writhe in pain,
  - type: text
    content: 'And Ekron, for her hope '
  - type: text
    content: and
  - type: text
    content: ' expectation, has been ruined.'
  - type: text
    content: The king will perish from Gaza,
  - type: text
    content: And Ashkelon will not be inhabited.
  '6':
