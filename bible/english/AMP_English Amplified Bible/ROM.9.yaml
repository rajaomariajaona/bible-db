    content: who are Israelites, to whom belongs the adoption as sons, the glory (
  - type: note
    content: The Hebrew word “Shekinah” (“divine presence”) does not appear in Scripture, but has been used by both Christians and Jews to describe the visible Presence of God (the brilliant light of the divine), in such things as the burning bush, the cloud and the pillar of fire that led the Hebrews in the wilderness, and the Presence of God that rested between the cherubim over the mercy seat of the ark. It is said in the Talmud that the Emperor Hadrian once told a rabbi, “I want to see your God.” The rabbi replied, “You cannot see him.” “Indeed,” said the Emperor, “I will see him.” So the rabbi took the Emperor and positioned him to face the sun during the summer solstice, and said to him, “Look at it.” He replied, “I am not able to.” The rabbi said, “If you are not able to look at the sun, which is merely one of the servants that attend the Holy One—blessed be He—then how can you presume to look at the divine presence!”
  - type: text
    content: 'Shekinah), the [special] covenants [with Abraham, Moses, and David], the giving of the Law, the [system of temple] worship, and the [original] promises. [Ex 4:22; Hos 11:1] '
