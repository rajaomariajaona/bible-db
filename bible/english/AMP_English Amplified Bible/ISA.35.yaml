    - type: text
      text: Zion’s Joyful Future
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The wilderness and the dry land will be glad;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Arabah (desert) will shout in exultation and blossom
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: asphodel
      - type: text
        text: ' (lily).'
    marker-yv: yv-n
  - type: text
    text: autumn crocus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It will blossom abundantly
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rejoice with joy and singing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The glory of Lebanon will be given to it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The majesty of [Mount] Carmel and [the plain] of Sharon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will see the glory of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor of our God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Encourage the exhausted, and make staggering knees firm. [Heb 12:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Say to those with an anxious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' panic-stricken heart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Be strong, fear not!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, your God will come with vengeance [for the ungodly];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The retribution of God will come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But He will save you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the eyes of the blind will be opened
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the ears of the deaf will be unstopped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the lame will leap like a deer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the tongue of the mute will shout for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For waters will break forth in the wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And streams in the desert. [Matt 11:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the burning sand (mirage) will become a pool [of water]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the thirsty ground springs of water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the haunt of jackals, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: its resting place
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: where they lay resting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Grass becomes reeds and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: papyrus
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: rushes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A highway will be there, and a roadway;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will be called the Holy Way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The unclean will not travel on it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it will be for those who walk on the way [the redeemed];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And fools will not wander '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on it
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: No lion will be there,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will any predatory animal come up on it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will not be found there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the redeemed will walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the ransomed of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will return'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come to Zion with shouts of jubilation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everlasting joy will be upon their heads;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will find joy and gladness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sorrow and sighing will flee away.
