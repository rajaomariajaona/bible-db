type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham and the Covenant of Circumcision
  - type: text
    content: 'When Abram was ninety-nine years old, the '
  - type: note
    content: Heb YHWH (Yahweh).
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to him and said,'
  - type: text
    content: '“I am '
  - type: note
    content: Heb El Shaddai; God is the All-Sufficient One; He gives life; He nurtures; He pours out His blessings.
  - type: text
    content: God Almighty;
  - type: text
    content: 'Walk [habitually] before Me [with integrity, knowing that you are always in My presence], and be blameless '
  - type: text
    content: and
  - type: text
    content: ' complete [in obedience to Me].'
  '10':
  - type: text
    content: 'This is [the sign of] My covenant, which you shall keep '
  - type: text
    content: and
  - type: text
    content: ' faithfully obey, between Me and you and your descendants after you: Every male among you shall be circumcised. '
  '11':
  - type: text
    content: 'And you shall be circumcised in the flesh of your foreskins, and it shall be the sign (symbol, memorial) of the covenant between Me and you. '
  '12':
  - type: text
    content: 'Every male among you who is eight days old shall be circumcised throughout your generations, [including] a '
  - type: text
    content: servant
  - type: text
    content: ' whether born in the house or one who is purchased with [your] money from any foreigner, who is not of your descendants. '
  '13':
  - type: text
    content: 'A '
  - type: text
    content: servant
  - type: text
    content: ' who is born in your house or one who is purchased with your money must be circumcised; and [the sign of] My covenant shall be in your flesh for an everlasting covenant. '
  '14':
  - type: text
    content: And the male who is not circumcised in the flesh of his foreskin, that person shall be cut off from his people; he has broken My covenant.”
  '15':
  - type: text
    content: Then God said to Abraham, “As for Sarai your wife, you shall not call her name Sarai (my princess), but her name will be Sarah (
  - type: note
    content: 'The difference in the names can perhaps be seen in a comment made by the rabbis: “At first she became a princess to her own people, but later she became a princess to the entire world” (as quoted from the Talmud).'
  - type: text
    content: 'Princess). '
  '16':
  - type: text
    content: 'I will bless her, and indeed I will also give you a son by her. Yes, I will bless her, and she shall be a '
  - type: text
    content: mother of
  - type: text
    content: ' nations; kings of peoples will come from her.” '
  '17':
  - type: text
    content: 'Then Abraham fell on his face and laughed, and said in his heart, “Shall a child be born to a man who is a hundred years old? And shall Sarah, who is ninety years old, bear '
  - type: text
    content: a child?”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'And Abraham said to God, “Oh, that Ishmael [my firstborn] might live before You!” '
  '19':
  - type: text
    content: 'But God said, “No, Sarah your wife shall bear you a son indeed, and you shall name him Isaac (laughter); and I will establish My covenant with him for an everlasting covenant and with his descendants after him. '
  '2':
  - type: text
    content: “I will establish My covenant (everlasting promise) between Me and you,
  - type: text
    content: And I will multiply you exceedingly [through your descendants].”
  '20':
  - type: text
    content: 'As for Ishmael, I have heard '
  - type: text
    content: and
  - type: text
    content: ' listened to you; behold, I will bless him, and will make him fruitful and will greatly multiply him [through his descendants]. He will be the father of twelve princes (chieftains, sheiks), and I will make him a great nation. [Gen 25:12-18] '
  '21':
  - type: text
    content: 'But My covenant [My promise, My solemn pledge], I will establish with Isaac, whom Sarah will bear to you at this time next year.” '
  '22':
  - type: text
    content: And God finished speaking with him and went up from Abraham.
  '23':
  - type: text
    content: 'Then Abraham took Ishmael his son, and all '
  - type: text
    content: the servants
  - type: text
    content: ' who were born in his house and all who were purchased with his money, every male among the men of Abraham’s household, and circumcised the flesh of their foreskin the very same day, as God had said to him. '
  '24':
  - type: text
    content: 'So Abraham was ninety-nine years old when he was circumcised. '
  '25':
  - type: text
    content: 'And Ishmael his son was thirteen years old when he was circumcised. '
  '26':
  - type: text
    content: 'On the very same day Abraham was circumcised, as well as Ishmael his son. '
  '27':
  - type: text
    content: All the men [servants] of his household, both those born in the house and those purchased with money from a foreigner, were circumcised along with him [as the sign of God’s covenant with Abraham].
  '3':
  - type: text
    content: Then Abram fell on his face [in worship], and God spoke with him, saying,
  '4':
  - type: text
    content: “As for Me, behold, My covenant is with you,
  - type: text
    content: And [as a result] you shall be the father of many nations.
  '5':
  - type: text
    content: “No longer shall your name be Abram (exalted father),
  - type: text
    content: But your name shall be Abraham (father of a multitude);
  - type: text
    content: For I will make you the father of many nations.
  '6':
  - type: text
    content: 'I will make you exceedingly fruitful, and I will make nations of you, and '
  - type: note
    content: This prophecy and promise has been literally fulfilled countless times—for example, by all of the kings of Israel and Judah.
  - type: text
    content: 'kings will come from you. '
  '7':
  - type: text
    content: 'I will establish My covenant between Me and you and your descendants after you throughout their generations for an everlasting covenant, to be God to you and to your descendants after you. [Gal 3:16] '
  '8':
  - type: text
    content: I will give to you and to your descendants after you the land in which you are a stranger [moving from place to place], all the land of Canaan, as an everlasting possession [of property]; and I will be their God.” [Acts 7:5]
  '9':
  - type: text
    content: 'Further, God said to Abraham, “As for you [your part of the agreement], you shall keep '
  - type: text
    content: and
  - type: text
    content: ' faithfully obey [the terms of] My covenant, you and your descendants after you throughout their generations. '
