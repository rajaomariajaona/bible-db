document_id: GEN.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abraham and the Covenant of Circumcision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Abram was ninety-nine years old, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH (Yahweh).
    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared to him and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai;
      - type: text
        text: ' God is the All-Sufficient One; He gives life; He nurtures; He pours out His blessings.'
    marker-yv: yv-n
  - type: text
    text: God Almighty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Walk [habitually] before Me [with integrity, knowing that you are always in My presence], and be blameless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete [in obedience to Me].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I will establish My covenant (everlasting promise) between Me and you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will multiply you exceedingly [through your descendants].”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Abram fell on his face [in worship], and God spoke with him, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “As for Me, behold, My covenant is with you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [as a result] you shall be the father of many nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “No longer shall your name be Abram (exalted father),
- type: usfm
  marker: q1
  children:
  - type: text
    text: But your name shall be Abraham (father of a multitude);
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will make you the father of many nations.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will make you exceedingly fruitful, and I will make nations of you, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This prophecy and promise has been literally fulfilled countless times—for example, by all of the kings of Israel and Judah.
    marker-yv: yv-n
  - type: text
    text: 'kings will come from you. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will establish My covenant between Me and you and your descendants after you throughout their generations for an everlasting covenant, to be God to you and to your descendants after you. [Gal 3:16] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will give to you and to your descendants after you the land in which you are a stranger [moving from place to place], all the land of Canaan, as an everlasting possession [of property]; and I will be their God.” [Acts 7:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Further, God said to Abraham, “As for you [your part of the agreement], you shall keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfully obey [the terms of] My covenant, you and your descendants after you throughout their generations. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This is [the sign of] My covenant, which you shall keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfully obey, between Me and you and your descendants after you: Every male among you shall be circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you shall be circumcised in the flesh of your foreskins, and it shall be the sign (symbol, memorial) of the covenant between Me and you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Every male among you who is eight days old shall be circumcised throughout your generations, [including] a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: servant
  - type: text
    text: ' whether born in the house or one who is purchased with [your] money from any foreigner, who is not of your descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A '
  - type: usfm
    marker: it
    children:
    - type: text
      text: servant
  - type: text
    text: ' who is born in your house or one who is purchased with your money must be circumcised; and [the sign of] My covenant shall be in your flesh for an everlasting covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the male who is not circumcised in the flesh of his foreskin, that person shall be cut off from his people; he has broken My covenant.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then God said to Abraham, “As for Sarai your wife, you shall not call her name Sarai (my princess), but her name will be Sarah (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The difference in the names can perhaps be seen in a comment made by the rabbis: “At first she became a princess to her own people, but later she became a princess to the entire world” (as quoted from the Talmud).'
    marker-yv: yv-n
  - type: text
    text: 'Princess). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will bless her, and indeed I will also give you a son by her. Yes, I will bless her, and she shall be a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mother of
  - type: text
    text: ' nations; kings of peoples will come from her.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Abraham fell on his face and laughed, and said in his heart, “Shall a child be born to a man who is a hundred years old? And shall Sarah, who is ninety years old, bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a child?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Abraham said to God, “Oh, that Ishmael [my firstborn] might live before You!” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But God said, “No, Sarah your wife shall bear you a son indeed, and you shall name him Isaac (laughter); and I will establish My covenant with him for an everlasting covenant and with his descendants after him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As for Ishmael, I have heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listened to you; behold, I will bless him, and will make him fruitful and will greatly multiply him [through his descendants]. He will be the father of twelve princes (chieftains, sheiks), and I will make him a great nation. [Gen 25:12-18] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But My covenant [My promise, My solemn pledge], I will establish with Isaac, whom Sarah will bear to you at this time next year.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And God finished speaking with him and went up from Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Abraham took Ishmael his son, and all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the servants
  - type: text
    text: ' who were born in his house and all who were purchased with his money, every male among the men of Abraham’s household, and circumcised the flesh of their foreskin the very same day, as God had said to him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Abraham was ninety-nine years old when he was circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And Ishmael his son was thirteen years old when he was circumcised. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On the very same day Abraham was circumcised, as well as Ishmael his son. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: All the men [servants] of his household, both those born in the house and those purchased with money from a foreigner, were circumcised along with him [as the sign of God’s covenant with Abraham].
