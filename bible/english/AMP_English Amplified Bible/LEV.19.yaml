document_id: LEV.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Idolatry Forbidden
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Say to all the congregation of the children of Israel, ‘You shall be holy, for I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God am holy. [1 Pet 1:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Each of you shall '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fear;
      - type: text
        text: ' the Hebrew can refer to respect or reverence as essentially healthy forms of fear.'
    marker-yv: yv-n
  - type: text
    text: respect his mother and his father, and you shall keep My Sabbaths; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do not turn to idols or make for yourselves molten gods (images cast in metal); I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘Now when you offer a sacrifice of peace offerings to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you shall offer it so that you may be accepted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'It shall be eaten the same day you offer it and on the day following; and if anything remains until the third day, it shall be burned in the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But if it is eaten at all on the third day, it is repulsive; it will not be accepted [by God as an offering]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Everyone who eats it will bear [the responsibility for] his wickedness, for he has profaned a holy thing of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and that person shall be cut off from his people [excluding him from the atonement made for them].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '‘Now when you reap the harvest of your land, you shall not reap to the very corners of your field, nor shall you gather the gleanings (grain left after reaping) of your harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And you shall not glean your vineyard, nor shall you gather its fallen grapes; you shall leave them for the poor and for the stranger. I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '‘You shall not steal, nor deal deceptively, nor lie to one another. [Col 3:9, 10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You shall not swear [an oath] falsely by My name, so as to profane the name of your God; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘You shall not oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' exploit your neighbor, nor rob him. You shall not withhold the wages of a hired man overnight until morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You shall not curse a deaf man nor put a stumbling block before the blind, but you shall fear your God [with profound reverence]; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '‘You shall not do injustice in judgment; you shall not be partial to the poor nor show a preference for the great, but judge your neighbor fairly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You shall not go around as a gossip among your people, and you are not to act against the life of your neighbor [with slander or false testimony]; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘You shall not hate your brother in your heart; you may most certainly rebuke your neighbor, but shall not incur sin because of him. [Gal 6:1; 1 John 2:9, 11; 3:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You shall not take revenge nor bear any grudge against the sons of your people, but you shall love your neighbor (acquaintance, associate, companion) as yourself; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Matt 5:43-46; Rom 12:17, 19]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘You are to keep My statutes. You shall not breed together two kinds of your cattle; you shall not sow your field with two kinds of seed, nor wear clothing of two kinds of material mixed together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '‘Now if a man has intimate relations with a woman who is a slave acquired for [marriage to] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' man, but who has not been redeemed nor given her freedom, there shall be punishment [after an investigation]; they shall not be put to death, because she was not free; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: but he shall bring his guilt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to the doorway of the Tent of Meeting, a ram as a guilt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The priest shall make atonement for him with the ram of the guilt offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for his sin which he has committed; and he shall be forgiven for his sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘When you enter the land and plant all kinds of trees for food, then you shall consider their fruit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: uncircumcised
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'forbidden. For three years the fruit shall be forbidden to you; it shall not be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: In the fourth year all the fruit shall be holy, an offering of praise to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In the fifth year you may eat the fruit [of the trees], this is so that their yield may increase for you; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '‘You shall not eat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything
  - type: text
    text: ' with the blood, nor practice divination [using omens or witchcraft] or soothsaying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'You shall not trim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' round off the side-growth of [the hair on] your heads, nor mar the edges of your beard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You shall not make any cuts on your body [in mourning] for the dead, nor make any tattoo marks on yourselves; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '‘Do not profane your daughter by making her a prostitute, so that the land will not fall to prostitution and become full of wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: You shall keep My Sabbaths and revere My sanctuary. I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ‘Do not turn to mediums [who pretend to consult the dead] or to spiritists [who have spirits of divination]; do not seek them out to be defiled by them. I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ‘You shall rise before the gray-headed and honor the aged, and you shall fear your God [with profound reverence]; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '‘When a stranger resides with you in your land, you shall not oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' mistreat him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: But the stranger who resides with you shall be to you like someone native-born among you; and you shall love him as yourself, for you were strangers in the land of Egypt; I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '‘You shall do no wrong in judgment, in measurement of weight or quantity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'You shall have just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accurate balances, just weights, a just ephah, and a just '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Approx one gallon.
    marker-yv: yv-n
  - type: text
    text: hin. I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who brought you out of the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'You shall observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep all My statutes and all My ordinances and do them. I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’ ”
