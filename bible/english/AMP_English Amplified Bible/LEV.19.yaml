document_id: LEV.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatry Forbidden
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying,'
  '10':
  - type: text
    content: And you shall not glean your vineyard, nor shall you gather its fallen grapes; you shall leave them for the poor and for the stranger. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '11':
  - type: text
    content: '‘You shall not steal, nor deal deceptively, nor lie to one another. [Col 3:9, 10] '
  '12':
  - type: text
    content: You shall not swear [an oath] falsely by My name, so as to profane the name of your God; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '13':
  - type: text
    content: '‘You shall not oppress '
  - type: text
    content: or
  - type: text
    content: ' exploit your neighbor, nor rob him. You shall not withhold the wages of a hired man overnight until morning. '
  '14':
  - type: text
    content: You shall not curse a deaf man nor put a stumbling block before the blind, but you shall fear your God [with profound reverence]; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '15':
  - type: text
    content: '‘You shall not do injustice in judgment; you shall not be partial to the poor nor show a preference for the great, but judge your neighbor fairly. '
  '16':
  - type: text
    content: You shall not go around as a gossip among your people, and you are not to act against the life of your neighbor [with slander or false testimony]; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '17':
  - type: text
    content: '‘You shall not hate your brother in your heart; you may most certainly rebuke your neighbor, but shall not incur sin because of him. [Gal 6:1; 1 John 2:9, 11; 3:15] '
  '18':
  - type: text
    content: You shall not take revenge nor bear any grudge against the sons of your people, but you shall love your neighbor (acquaintance, associate, companion) as yourself; I am the L
  - type: heading
    content: ord
  - type: text
    content: . [Matt 5:43-46; Rom 12:17, 19]
  '19':
  - type: text
    content: ‘You are to keep My statutes. You shall not breed together two kinds of your cattle; you shall not sow your field with two kinds of seed, nor wear clothing of two kinds of material mixed together.
  '2':
  - type: text
    content: “Say to all the congregation of the children of Israel, ‘You shall be holy, for I the L
  - type: heading
    content: ord
  - type: text
    content: ' your God am holy. [1 Pet 1:15] '
  '20':
  - type: text
    content: '‘Now if a man has intimate relations with a woman who is a slave acquired for [marriage to] '
  - type: text
    content: another
  - type: text
    content: ' man, but who has not been redeemed nor given her freedom, there shall be punishment [after an investigation]; they shall not be put to death, because she was not free; '
  '21':
  - type: text
    content: but he shall bring his guilt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' to the doorway of the Tent of Meeting, a ram as a guilt offering. '
  '22':
  - type: text
    content: The priest shall make atonement for him with the ram of the guilt offering before the L
  - type: heading
    content: ord
  - type: text
    content: ' for his sin which he has committed; and he shall be forgiven for his sin.'
  '23':
  - type: text
    content: '‘When you enter the land and plant all kinds of trees for food, then you shall consider their fruit '
  - type: note
    content: Lit uncircumcised.
  - type: text
    content: 'forbidden. For three years the fruit shall be forbidden to you; it shall not be eaten. '
  '24':
  - type: text
    content: In the fourth year all the fruit shall be holy, an offering of praise to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '25':
  - type: text
    content: In the fifth year you may eat the fruit [of the trees], this is so that their yield may increase for you; I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '26':
  - type: text
    content: '‘You shall not eat '
  - type: text
    content: anything
  - type: text
    content: ' with the blood, nor practice divination [using omens or witchcraft] or soothsaying. '
  '27':
  - type: text
    content: 'You shall not trim '
  - type: text
    content: and
  - type: text
    content: ' round off the side-growth of [the hair on] your heads, nor mar the edges of your beard. '
  '28':
  - type: text
    content: You shall not make any cuts on your body [in mourning] for the dead, nor make any tattoo marks on yourselves; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '29':
  - type: text
    content: '‘Do not profane your daughter by making her a prostitute, so that the land will not fall to prostitution and become full of wickedness. '
  '3':
  - type: text
    content: 'Each of you shall '
  - type: note
    content: Lit fear; the Hebrew can refer to respect or reverence as essentially healthy forms of fear.
  - type: text
    content: respect his mother and his father, and you shall keep My Sabbaths; I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '30':
  - type: text
    content: You shall keep My Sabbaths and revere My sanctuary. I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '31':
  - type: text
    content: ‘Do not turn to mediums [who pretend to consult the dead] or to spiritists [who have spirits of divination]; do not seek them out to be defiled by them. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '32':
  - type: text
    content: ‘You shall rise before the gray-headed and honor the aged, and you shall fear your God [with profound reverence]; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '33':
  - type: text
    content: '‘When a stranger resides with you in your land, you shall not oppress '
  - type: text
    content: or
  - type: text
    content: ' mistreat him. '
  '34':
  - type: text
    content: But the stranger who resides with you shall be to you like someone native-born among you; and you shall love him as yourself, for you were strangers in the land of Egypt; I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '35':
  - type: text
    content: '‘You shall do no wrong in judgment, in measurement of weight or quantity. '
  '36':
  - type: text
    content: 'You shall have just '
  - type: text
    content: and
  - type: text
    content: ' accurate balances, just weights, a just ephah, and a just '
  - type: note
    content: Approx one gallon.
  - type: text
    content: hin. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who brought you out of the land of Egypt. '
  '37':
  - type: text
    content: 'You shall observe '
  - type: text
    content: and
  - type: text
    content: ' keep all My statutes and all My ordinances and do them. I am the L'
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '4':
  - type: text
    content: Do not turn to idols or make for yourselves molten gods (images cast in metal); I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: ‘Now when you offer a sacrifice of peace offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ', you shall offer it so that you may be accepted. '
  '6':
  - type: text
    content: 'It shall be eaten the same day you offer it and on the day following; and if anything remains until the third day, it shall be burned in the fire. '
  '7':
  - type: text
    content: 'But if it is eaten at all on the third day, it is repulsive; it will not be accepted [by God as an offering]. '
  '8':
  - type: text
    content: Everyone who eats it will bear [the responsibility for] his wickedness, for he has profaned a holy thing of the L
  - type: heading
    content: ord
  - type: text
    content: ; and that person shall be cut off from his people [excluding him from the atonement made for them].
  - type: heading
    content: Various Laws
  '9':
  - type: text
    content: '‘Now when you reap the harvest of your land, you shall not reap to the very corners of your field, nor shall you gather the gleanings (grain left after reaping) of your harvest. '
