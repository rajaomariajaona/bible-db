  '1':
  - type: heading
    content: The Ten Commandments Repeated
  - type: text
    content: 'Then Moses summoned all Israel and said to them:'
  - type: text
    content: “
  - type: text
    content: H
  - type: text
    content: 'ear, O Israel, the statutes and judgments (legal decisions) which I am speaking today in your hearing, so that you may learn them and observe them carefully. '
  '10':
  - type: text
    content: 'but '
  - type: note
    content: Lit doing.
  - type: text
    content: 'showing graciousness '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness to thousands [of generations] of those who love Me and keep My commandments.'
  '11':
  - type: text
    content: ‘You shall not take the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in vain [that is, irreverently, in false affirmations or in ways that impugn the character of God]; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' will not hold guiltless '
  - type: text
    content: nor
  - type: text
    content: ' leave unpunished the one who '
  - type: note
    content: Using the name of God in a casual, frivolous way establishes a mindset that diminishes and dishonors the omnipotent God. Using the name of God to abuse, manipulate, or deceive invites judgment.
  - type: text
    content: takes His name in vain [disregarding its reverence and its power].
  '12':
  - type: text
    content: ‘Observe the Sabbath day to keep it holy (set apart, dedicated to God), as the L
  - type: heading
    content: ord
  - type: text
    content: ' your God commanded you. '
  '13':
  - type: text
    content: 'Six days you shall labor and do all your work, '
  '14':
  - type: text
    content: but the seventh day is a Sabbath [a day of rest dedicated] to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; on that day you shall not do any work, you or your son or your daughter or your male servant or your female servant or your ox or your donkey or any of your livestock or the stranger who stays inside your [city] gates, so that your male servant and your female servant may rest as well as you. '
  '15':
  - type: text
    content: You shall remember [with thoughtful concern] that you were a slave in the land of Egypt, and that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God brought you out of there with a mighty hand and by an outstretched arm; therefore the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has commanded you to observe the Sabbath day.'
  '16':
  - type: text
    content: ‘Honor (respect, obey, care for) your father and your mother, as the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has commanded you, so that your days [on the earth] may be prolonged and so that it may go well with you in the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you.'
  '17':
  - type: text
    content: '‘You shall not '
  - type: note
    content: Or commit homicide. In general, prohibits one from acting on one’s own initiative to deliberately take or maliciously cause to be taken, the life of another.
  - type: text
    content: murder.
  '18':
  - type: text
    content: '‘You shall not commit '
  - type: note
    content: Jesus extended this commandment in Matt 5:27, 28. Not only is adultery forbidden, but also the act of looking at a woman with lustful (sexual) desire, which would include indulging oneself in pornography.
  - type: text
    content: adultery. [Prov 6:25, 26; Matt 5:27, 28; Rom 1:24; Eph 5:3]
  '19':
  - type: text
    content: ‘You shall not steal. [Prov 11:1; 16:8; 21:6; 22:16; Jer 17:11; Mal 3:8]
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' our God made a covenant with us at Horeb. '
  '20':
  - type: text
    content: ‘You shall not give false testimony [that is, lie, withhold, or manipulate the truth] against your neighbor (any person). [Ex 23:1; Prov 19:9; 24:28]
  '21':
  - type: text
    content: ‘You shall not covet [that is, desire and seek to acquire] your neighbor’s wife, nor desire your neighbor’s house, his field, his male servant or his female servant, his ox or his donkey or anything that belongs to your neighbor.’ [Luke 12:15; Col 3:5]
  - type: heading
    content: Moses Interceded
  '22':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke these words with a great voice to all your assembly at the mountain out of the midst of the fire, the cloud, and the thick darkness, and He added no more. He wrote these commandments on two tablets of stone and gave them to me. '
  '23':
  - type: text
    content: 'And when you heard the voice from the midst of the darkness, while the mountain was burning with fire, you approached me, all the leaders (heads) of your tribes and your elders; '
  '24':
  - type: text
    content: and you said, ‘Behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' our God has shown us His glory and His greatness, and we have heard His voice from the midst of the fire; we have seen today that God speaks with man, yet he [still] lives. '
  '25':
  - type: text
    content: Now then why should we die? For this great fire will consume us; if we hear the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God any longer, then we will die. '
  '26':
  - type: text
    content: 'For who is there of all flesh (mankind) who has heard the voice of the living God speaking from the midst of the fire, as we have, and lived? '
  '27':
  - type: text
    content: You, Moses, go near and listen to everything that the L
  - type: heading
    content: ord
  - type: text
    content: ' our God says; then speak to us everything that the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God speaks to you, and we will listen and do it.’'
  '28':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' heard your words when you spoke to me, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘I have heard the words of this people which they have spoken to you. They have done well in all that they have spoken. '
  '29':
  - type: text
    content: 'Oh that they had such a heart in them, that they would fear [and worship Me with awe-filled reverence and profound respect] and keep all My commandments always, so that it may go well with them and with their children forever! '
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' did not make this covenant with our fathers, but with us, all of us who are alive here today. '
  '30':
  - type: text
    content: 'Go and say to them, “Return to your tents.” '
  '31':
  - type: text
    content: 'But as for you, stand here by Me, and I will tell you all the commandments and the statutes and the judgments which you shall teach them, so that they may obey them in the land which I give them to possess.’ '
  '32':
  - type: text
    content: 'Therefore you shall pay attention '
  - type: text
    content: and
  - type: text
    content: ' be careful to do just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has commanded you; you shall not turn aside to the right or to the left [deviating from My commandments]. '
  '33':
  - type: text
    content: You shall walk [that is, live each and every day] in all the ways which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has commanded you, so that you may live and so that it may be well with you, and that you may live long in the land which you will possess.'
  '4':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke with you face to face at the mountain from the midst of the fire. '
  '5':
  - type: text
    content: I was standing between the L
  - type: heading
    content: ord
  - type: text
    content: ' and you at that time, to declare to you the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ; for you were afraid because of the fire and did not go up the mountain. He said,
  '6':
  - type: text
    content: ‘I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God who brought you out of the land of Egypt, out of the house of slavery.'
  '7':
  - type: text
    content: '‘You shall have no other gods '
  - type: note
    content: Or besides.
  - type: text
    content: before Me.
  '8':
  - type: text
    content: '‘You shall not make for yourself an idol [as an object to worship], or any likeness (form, manifestation) of what is in heaven above or on the earth beneath or in the water under the earth. '
  '9':
  - type: text
    content: You shall not worship them or serve them; for I, the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, am a '
  - type: note
    content: See note 4:24.
  - type: text
    content: 'jealous (impassioned) God [demanding what is rightfully and uniquely mine], visiting (avenging) the iniquity (sin, guilt) of the fathers on the children [that is, calling the children to account for the sins of their fathers], to the third and the fourth '
  - type: text
    content: generations
  - type: text
    content: ' of those who hate Me, [Is 42:8; 48:11] '
