document_id: DEU.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ten Commandments Repeated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Moses summoned all Israel and said to them:'
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: H
  - type: text
    text: 'ear, O Israel, the statutes and judgments (legal decisions) which I am speaking today in your hearing, so that you may learn them and observe them carefully. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God made a covenant with us at Horeb. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did not make this covenant with our fathers, but with us, all of us who are alive here today. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke with you face to face at the mountain from the midst of the fire. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I was standing between the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and you at that time, to declare to you the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; for you were afraid because of the fire and did not go up the mountain. He said,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ‘I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who brought you out of the land of Egypt, out of the house of slavery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘You shall have no other gods '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: besides
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: before Me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '‘You shall not make for yourself an idol [as an object to worship], or any likeness (form, manifestation) of what is in heaven above or on the earth beneath or in the water under the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You shall not worship them or serve them; for I, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, am a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 4:24.
    marker-yv: yv-n
  - type: text
    text: 'jealous (impassioned) God [demanding what is rightfully and uniquely mine], visiting (avenging) the iniquity (sin, guilt) of the fathers on the children [that is, calling the children to account for the sins of their fathers], to the third and the fourth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: generations
  - type: text
    text: ' of those who hate Me, [Is 42:8; 48:11] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doing
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'showing graciousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness to thousands [of generations] of those who love Me and keep My commandments.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘You shall not take the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in vain [that is, irreverently, in false affirmations or in ways that impugn the character of God]; for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will not hold guiltless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' leave unpunished the one who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Using the name of God in a casual, frivolous way establishes a mindset that diminishes and dishonors the omnipotent God. Using the name of God to abuse, manipulate, or deceive invites judgment.
    marker-yv: yv-n
  - type: text
    text: takes His name in vain [disregarding its reverence and its power].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ‘Observe the Sabbath day to keep it holy (set apart, dedicated to God), as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God commanded you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Six days you shall labor and do all your work, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: but the seventh day is a Sabbath [a day of rest dedicated] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; on that day you shall not do any work, you or your son or your daughter or your male servant or your female servant or your ox or your donkey or any of your livestock or the stranger who stays inside your [city] gates, so that your male servant and your female servant may rest as well as you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You shall remember [with thoughtful concern] that you were a slave in the land of Egypt, and that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God brought you out of there with a mighty hand and by an outstretched arm; therefore the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you to observe the Sabbath day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Honor (respect, obey, care for) your father and your mother, as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you, so that your days [on the earth] may be prolonged and so that it may go well with you in the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘You shall not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: commit homicide.
      - type: text
        text: ' In general, prohibits one from acting on one’s own initiative to deliberately take or maliciously cause to be taken, the life of another.'
    marker-yv: yv-n
  - type: text
    text: murder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘You shall not commit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus extended this commandment in Matt 5:27, 28. Not only is adultery forbidden, but also the act of looking at a woman with lustful (sexual) desire, which would include indulging oneself in pornography.
    marker-yv: yv-n
  - type: text
    text: adultery. [Prov 6:25, 26; Matt 5:27, 28; Rom 1:24; Eph 5:3]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘You shall not steal. [Prov 11:1; 16:8; 21:6; 22:16; Jer 17:11; Mal 3:8]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ‘You shall not give false testimony [that is, lie, withhold, or manipulate the truth] against your neighbor (any person). [Ex 23:1; Prov 19:9; 24:28]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ‘You shall not covet [that is, desire and seek to acquire] your neighbor’s wife, nor desire your neighbor’s house, his field, his male servant or his female servant, his ox or his donkey or anything that belongs to your neighbor.’ [Luke 12:15; Col 3:5]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses Interceded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke these words with a great voice to all your assembly at the mountain out of the midst of the fire, the cloud, and the thick darkness, and He added no more. He wrote these commandments on two tablets of stone and gave them to me. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when you heard the voice from the midst of the darkness, while the mountain was burning with fire, you approached me, all the leaders (heads) of your tribes and your elders; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and you said, ‘Behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God has shown us His glory and His greatness, and we have heard His voice from the midst of the fire; we have seen today that God speaks with man, yet he [still] lives. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Now then why should we die? For this great fire will consume us; if we hear the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God any longer, then we will die. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For who is there of all flesh (mankind) who has heard the voice of the living God speaking from the midst of the fire, as we have, and lived? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You, Moses, go near and listen to everything that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God says; then speak to us everything that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God speaks to you, and we will listen and do it.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard your words when you spoke to me, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘I have heard the words of this people which they have spoken to you. They have done well in all that they have spoken. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Oh that they had such a heart in them, that they would fear [and worship Me with awe-filled reverence and profound respect] and keep all My commandments always, so that it may go well with them and with their children forever! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Go and say to them, “Return to your tents.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But as for you, stand here by Me, and I will tell you all the commandments and the statutes and the judgments which you shall teach them, so that they may obey them in the land which I give them to possess.’ '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Therefore you shall pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be careful to do just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you; you shall not turn aside to the right or to the left [deviating from My commandments]. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: You shall walk [that is, live each and every day] in all the ways which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you, so that you may live and so that it may be well with you, and that you may live long in the land which you will possess.'
