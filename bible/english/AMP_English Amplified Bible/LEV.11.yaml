document_id: LEV.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laws about Animals for Food
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke again to Moses and Aaron, saying to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but whatever does not have fins and scales in the seas and in the rivers, of all the teeming life in the waters, and of all the living creatures that are in the waters, they are [to be considered] detestable to you. [1 Cor 8:8-13] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They shall be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: detestable things
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'hated things to you. You may not eat their meat; you shall detest their carcasses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Everything in the water that does not have fins and scales is detestable to you.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Avoid the Unclean
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '‘These you shall detest among the birds; they are not to be eaten, for they are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: detestable things
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'hated things: the eagle and the vulture and the buzzard, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'the kite, every kind of falcon, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'every kind of raven, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'the ostrich, the nighthawk, the sea gull, every species of hawk, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'the little owl and the cormorant and the great owl, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'the white owl, the pelican, the carrion vulture, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: the stork, all kinds of heron, the hoopoe, and the bat.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel, saying, ‘Among all the animals which are on the earth, these are the animals which you may eat. [Mark 7:15-19] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '‘All winged insects that walk on all fours are detestable to you; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'yet of all winged insects that walk on all fours you may eat those which have legs above their feet with which to leap on the ground. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Of these you may eat: the whole species of migratory locust, of bald locust, of cricket, and of grasshopper. [Matt 3:4] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But all other winged insects which are four footed are detestable to you.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '‘By [contact with] these you will become unclean; whoever touches their carcasses becomes unclean until the evening (dusk), '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and whoever picks up any of their carcasses shall wash his clothes and be unclean until the evening. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Concerning all the animals which divide the hoof, but do not have a split hoof, or which do not chew the cud, they are unclean to you; whoever touches them becomes unclean. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Also all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: animals
    - type: text
      text: ' that walk on their paws, among all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds of
    - type: text
      text: ' animals that walk on four '
    - type: usfm
      marker: it
      children:
      - type: text
        text: legs
    - type: text
      text: ', are unclean to you; whoever touches their carcasses becomes unclean until the evening, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: and the one who picks up their carcasses shall wash his clothes and be unclean until the evening; they are unclean to you.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '‘These also are unclean to you among the swarming things that crawl around on the ground [and multiply profusely]: the mole, the mouse, and any kind of great lizard, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You may eat any animal that has a divided hoof [that is, a hoof split into two parts especially at its distal extremity] and chews the cud. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'the gecko, the crocodile, the lizard, the sand reptile, and the chameleon. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'These [creatures] are unclean to you among all that swarm; whoever touches them when they are dead becomes unclean until evening. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Also anything on which one of them falls after dying becomes unclean, whether it is an article of wood or clothing, or a skin, or a sack—any article that is used—it must be put in water, and will be unclean until the evening; then it becomes clean. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'As for any earthenware container into which any of these [crawling things] falls, whatever is in it becomes unclean, and you shall break the container. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Any of the food which may be eaten, but on which [unclean] water falls, shall become unclean, and any liquid that may be drunk in every container shall become unclean. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Everything that part of their carcass falls on becomes unclean; an oven, or a small stove shall be smashed; they are unclean, and shall be unclean to you. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Nevertheless a spring or a cistern (reservoir) collecting water shall be clean; but whoever touches one of these carcasses shall be unclean. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'If a part of their carcass falls on any seed for sowing which is to be sown, it is clean; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: but if water is put on the seed and a part of their carcass falls on it, it is unclean to you.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '‘If one of the animals that you may eat dies [of natural causes], whoever touches its carcass becomes unclean until the evening. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nevertheless, you are not to eat these, among those which chew the cud or divide the hoof: the camel, because it chews the cud but does not divide the hoof; it is [ceremonially] unclean to you. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: And whoever eats some of its meat shall wash his clothes, and be unclean until evening; also whoever picks up its carcass shall wash his clothes, and be unclean until the evening.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: '‘Now everything that swarms on the ground is detestable; it is not to be eaten. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Whatever crawls on its belly, and whatever walks on all fours, and whatever has many feet among all things that swarm on the ground, you shall not eat; for they are detestable. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Do not make yourselves loathsome (impure, repulsive) by [eating] any swarming thing; you shall not make yourselves unclean by them so as to defile yourselves. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: For I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God; so consecrate yourselves and be holy, for I am holy. You shall not make yourselves unclean with any of the swarming things that swarm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' crawls on the ground. [1 Thess 4:7, 8] '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: For I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who brought you up from the land of Egypt to be your God; therefore you shall be holy, for I am holy.’ ” [1 Pet 1:14-16]'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'This is the law regarding the animal and the bird and every living thing that moves in the waters and everything that swarms on the earth, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: to make a distinction between the [ceremonially] unclean and the [ceremonially] clean, and between the animal that may be eaten and the animal that may not be eaten.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A small, shy fury animal '
        - type: usfm
          marker: it
          children:
          - type: text
            text: (Hyrax syriacus)
        - type: text
          text: ' found in the peninsula of the Sinai, northern Israel, and the region around the Dead Sea; KJV '
        - type: usfm
          marker: it
          children:
          - type: text
            text: coney
        - type: text
          text: ', original NASB '
        - type: usfm
          marker: it
          children:
          - type: text
            text: rock badger
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'shaphan, because it chews the cud but does not divide the hoof; it is unclean to you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the hare, because it chews the cud but does not divide the hoof; it is unclean to you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the swine, because it divides the hoof and makes a split hoof, but does not chew the cud; it is unclean to you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You shall not eat their meat nor touch their carcasses; they are unclean to you.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '‘These you may eat, whatever is in the water: whatever has fins and scales in the waters, in the seas, and in the rivers, these you may eat; '
