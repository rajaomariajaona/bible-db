document_id: 1TH.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Thanksgiving for These Believers
  - type: text
    content: Paul, Silvanus (Silas), and Timothy,
  - type: text
    content: T
  - type: text
    content: 'o the church of the Thessalonians in God the Father and the Lord Jesus Christ: Grace to you and peace [inner calm and spiritual well-being from God].'
  '10':
  - type: text
    content: and to [look forward and confidently] wait for [the coming of] His Son from heaven, whom He raised from the dead—Jesus, who [personally] rescues us from the coming wrath [and draws us to Himself, granting us all the privileges and rewards of a new life with Him].
  '2':
  - type: text
    content: 'We give thanks to God always for all of you, '
  - type: text
    content: continually
  - type: text
    content: ' mentioning you in our prayers; '
  '3':
  - type: text
    content: 'recalling unceasingly before our God and Father your work energized by faith, and your service motivated by love and unwavering hope in [the return of] our Lord Jesus Christ. [1 Thess 1:10] '
  '4':
  - type: note
    content: Lit Brethren.
  - type: text
    content: 'Brothers and sisters beloved by God, we know that He has chosen you; '
  '5':
  - type: text
    content: 'for our good news [regarding salvation] came to you not only in word, but also in [its inherent] power and in the Holy Spirit and with great conviction [on our part]. You know what kind of men we proved to be among you for your benefit. '
  '6':
  - type: text
    content: 'You became imitators of us and [through us] of the Lord, after you welcomed our message in [a time of] great trouble with the joy supplied by the Holy Spirit; '
  '7':
  - type: text
    content: 'so that you became an example to all the believers in '
  - type: note
    content: Greece was divided into two Roman provinces. The northern region was called Macedonia and the southern, Achaia. Thessalonica was an important seaport and was the capital city of Macedonia.
  - type: text
    content: 'Macedonia and in Achaia. '
  '8':
  - type: text
    content: 'For the word of the Lord has resounded from you '
  - type: text
    content: and
  - type: text
    content: ' has echoed [like thunder], not only in Macedonia and Achaia, but in every place [the news of] your [great] faith in God has spread, so that we never need to say anything about it. '
  '9':
  - type: text
    content: 'For they themselves report about us, '
  - type: text
    content: telling
  - type: text
    content: ' what kind of reception we had among you, and how you turned to God from idols to serve the living and true God, '
