document_id: 1TH.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thanksgiving for These Believers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul, Silvanus (Silas), and Timothy,
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o the church of the Thessalonians in God the Father and the Lord Jesus Christ: Grace to you and peace [inner calm and spiritual well-being from God].'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and to [look forward and confidently] wait for [the coming of] His Son from heaven, whom He raised from the dead—Jesus, who [personally] rescues us from the coming wrath [and draws us to Himself, granting us all the privileges and rewards of a new life with Him].
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'We give thanks to God always for all of you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' mentioning you in our prayers; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'recalling unceasingly before our God and Father your work energized by faith, and your service motivated by love and unwavering hope in [the return of] our Lord Jesus Christ. [1 Thess 1:10] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Brothers and sisters beloved by God, we know that He has chosen you; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for our good news [regarding salvation] came to you not only in word, but also in [its inherent] power and in the Holy Spirit and with great conviction [on our part]. You know what kind of men we proved to be among you for your benefit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You became imitators of us and [through us] of the Lord, after you welcomed our message in [a time of] great trouble with the joy supplied by the Holy Spirit; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'so that you became an example to all the believers in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Greece was divided into two Roman provinces. The northern region was called Macedonia and the southern, Achaia. Thessalonica was an important seaport and was the capital city of Macedonia.
      marker-yv: yv-n
    - type: text
      text: 'Macedonia and in Achaia. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For the word of the Lord has resounded from you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has echoed [like thunder], not only in Macedonia and Achaia, but in every place [the news of] your [great] faith in God has spread, so that we never need to say anything about it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For they themselves report about us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: telling
    - type: text
      text: ' what kind of reception we had among you, and how you turned to God from idols to serve the living and true God, '
