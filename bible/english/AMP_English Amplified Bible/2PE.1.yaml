      children:
      - type: text
        text: Growth in Christian Virtue
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two early manuscripts read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Simeon,
        - type: text
          text: ' the direct transliteration of the Hebrew. The only other place this spelling appears in the NT is in Acts 15:14.'
      marker-yv: yv-n
    - type: text
      text: Simon Peter, a bond-servant and apostle (special messenger, personally chosen representative) of Jesus Christ,
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o those who have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'From a Greek word meaning '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to obtain by lot,
        - type: text
          text: ' emphasizing the fact that salvation is not something gained because of personal effort, but is received as an undeserved gift because of God’s grace.'
      marker-yv: yv-n
    - type: text
      text: 'received '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' possess [by God’s will] a precious faith of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. equal in rank, honor and privilege.
      marker-yv: yv-n
    - type: text
      text: 'same kind as ours, by the righteousness of our God and Savior, Jesus Christ: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Therefore, believers, be all the more diligent to make certain about His calling and choosing you [be sure that your behavior reflects and confirms your relationship with God]; for by '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. developing the moral virtues outlined in vv 5-7.
      marker-yv: yv-n
    - type: text
      text: 'doing these things [actively developing these virtues], you will never stumble [in your spiritual growth and will live a life that leads others away from sin]; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: for in this way entry into the eternal kingdom of our Lord and Savior Jesus Christ will be abundantly provided to you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore, I will always be ready to remind you of these things, even though you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: already
    - type: text
      text: ' know them and are established in the truth which is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: present with you
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'held firmly in your grasp. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I think it right, as long as I am in this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: earthly
    - type: text
      text: ' tent, to inspire you by reminding you, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'knowing that the laying aside of this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: earthly
    - type: text
      text: ' tent of mine is imminent, as our Lord Jesus Christ has made clear to me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moreover, I will diligently endeavor [to see to it] that even after my departure you will be able, at all times, to call these things to mind.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eyewitnesses
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For we did not follow cleverly devised stories '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' myths when we made known to you the power and coming of our Lord Jesus Christ, but we were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference to the transfiguration (Matt 17:1ff).
      marker-yv: yv-n
    - type: text
      text: 'eyewitnesses of His majesty [His grandeur, His authority, His sovereignty]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For when He was invested with honor and [the radiance of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word “Shekinah” does not appear in Scripture, but has been used by both Christians and Jews to describe the visible divine Presence of God (the brilliant light of the divine), in such things as the burning bush, the cloud and the pillar of fire that led the Hebrews in the wilderness, and the Presence of God that rested between the cherubim over the mercy seat of the ark.
      marker-yv: yv-n
    - type: text
      text: 'Shekinah] glory from God the Father, such a voice as this came to Him from the [splendid] Majestic Glory [in the bright cloud that overshadowed Him, saying], '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: With these words God affirms the deity of Jesus and His divine essence.
      marker-yv: yv-n
    - type: text
      text: '“This is My Son, My Beloved Son in whom I am well-pleased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delighted”— [Matt 17:5] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: and we [actually] heard this voice made from heaven when we were together with Him on the holy mountain. [Matt 17:6]
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So we have the prophetic word made more certain. You do well to pay [close] attention to it as to a lamp shining in a dark place, until the day dawns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' light breaks through the gloom and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: light-bringer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'morning star arises in your hearts. [Num 24:17] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Grace and peace [that special sense of spiritual well-being] be multiplied to you in the [true, intimate] knowledge of God and of Jesus our Lord. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: For you know
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'But understand this first of all, that no prophecy of Scripture is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a matter
    - type: text
      text: ' of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' comes from one’s own [personal or special] interpretation, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: for no prophecy was ever made by an act of human will, but men moved by the Holy Spirit spoke from God.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For His divine power has bestowed on us [absolutely] everything necessary for [a dynamic spiritual] life and godliness, through '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is no “secret knowledge” or “better way” or alternative belief system which God has revealed to some unique group or teacher. The truth is available to everyone.
      marker-yv: yv-n
    - type: text
      text: 'true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' personal knowledge of Him who called us by His own glory and excellence. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For by these He has bestowed on us His precious and magnificent promises [of inexpressible value], so that by them you may escape from the immoral freedom that is in the world because of disreputable desire, and become sharers of the divine nature. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For this very reason, applying your diligence [to the divine promises], make every effort in [exercising] your faith to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: supply
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'develop moral excellence, and in moral excellence, knowledge (insight, understanding), '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' knowledge, self-control, and in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' self-control, steadfastness, and in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' steadfastness, godliness, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' godliness, brotherly affection, and in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' brotherly affection, [develop Christian] love [that is, learn to unselfishly seek the best for others and to do things for their benefit]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For as these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: qualities
    - type: text
      text: ' are yours and are increasing [in you as you grow toward spiritual maturity], they will keep you from being useless and unproductive in regard to the true knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greater understanding of our Lord Jesus Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For whoever lacks these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: qualities
    - type: text
      text: ' is blind—shortsighted [closing his spiritual eyes to the truth], having become oblivious to the fact that he was cleansed from his old sins. '
