document_id: PRO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rewards of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My son, do not forget my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: law
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: teaching,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But let your heart keep my commandments;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For length of days and years of life [worth living]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And tranquility '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity [the wholeness of life’s blessings] they will add to you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Do not let mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness and truth leave you [instead let these qualities define you];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bind them [securely] around your neck,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Write them on the tablet of your heart. [Col 3:9-12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So find favor and high esteem
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the sight of God and man. [Luke 2:52]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely confidently on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with all your heart'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And do not rely on your own insight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understanding.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the ancient rabbis said that all the essence of the Torah (Law) depends on this verse.
    marker-yv: yv-n
  - type: text
    text: 'In all your ways know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recognize Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He will make your paths straight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' smooth [removing obstacles that block your way].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Do not be wise in your own eyes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with reverent awe and obedience] and turn [entirely] away from evil. [Prov 8:13]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: It will be health to your body [your marrow, your nerves, your sinews, your muscles—all your inner parts]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And refreshment (physical well-being) to your bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Honor the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with your wealth'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the first fruits of all your crops (income); [Deut 26:2; Mal 3:10; Luke 14:13, 14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then your barns will be abundantly filled
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your vats will overflow with new wine. [Deut 28:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My son, do not reject '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' take lightly the discipline of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [learn from your mistakes and the testing that comes from His correction through discipline];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor despise His rebuke, [Ps 94:12; Heb 12:5, 6; Rev 3:19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For those whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' loves He corrects,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Even as a father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: corrects
  - type: text
    text: ' the son in whom he delights.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Happy [blessed, considered fortunate, to be admired] is the man who finds [skillful and godly] wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the man who gains understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insight [learning from God’s word and life’s experiences],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For wisdom’s profit is better than the profit of silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her gain is better than fine gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She is more precious than rubies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And nothing you can wish for compares with her [in value]. [Job 28:12-18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Long life is in her right hand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In her left hand are riches and honor. [Prov 8:12-21; 1 Tim 4:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Her ways are highways of pleasantness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all her paths are peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: She is a tree of life to those who take hold of her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And happy [blessed, considered fortunate, to be admired] is everyone who holds her tightly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by His wisdom has founded the earth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By His understanding He has established the heavens. [Col 1:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: By His knowledge the deeps were broken up
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the clouds drip with dew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: My son, let them not escape from your sight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But keep sound wisdom and discretion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And they will be life to your soul (your inner self)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a gracious adornment to your neck (your outer self).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then you will walk on your way [of life] securely
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your foot will not stumble. [Ps 91:11, 12; Prov 10:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When you lie down, you will not be afraid;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you lie down, your sleep will be sweet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not be afraid of sudden fear
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor of the storm of the wicked when it comes [since you will be blameless];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be your confidence, firm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strong,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will keep your foot from being caught [in a trap].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ¶
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Using this verse as a proof text, the ancient rabbis offered the example of an employer who tells his foreman to hire workers at four '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zuz
      - type: text
        text: ' (small silver coins) each to do a job, and the foreman hires them at three instead. Even though they accepted the terms, the rabbis rule that they have the right to complain. Compare this with the parable of the landowner who hires workers for a denarius each. The difference there is that the first group receives a fair wage, while the last is overpaid as a matter of generosity (Matt 20:15).'
    marker-yv: yv-n
  - type: text
    text: Do not withhold good from those to whom it is due [its rightful recipients],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When it is in your power to do it. [Rom 13:7; Gal 6:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Do not say to your neighbor, “Go, and come back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tomorrow I will give it,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you have it with you. [Lev 19:13; Deut 24:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do not devise evil against your neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who lives securely beside you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Do not quarrel with a man without cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If he has done you no harm. [Rom 12:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do not envy a man of violence
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not choose any of his ways. [Ps 37:1; 73:3; Prov 24:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For the devious are repulsive to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His private counsel is with the upright [those with spiritual integrity and moral courage]. [Ps 25:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The curse of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is on the house of the wicked,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But He blesses the home of the just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous. [Ps 37:22; Zech 5:4; Mal 2:2]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Though He scoffs at the scoffers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scorns the scorners,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet He gives His grace [His undeserved favor] to the humble [those who give up self-importance]. [James 4:6; 1 Pet 5:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The wise will inherit honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But dishonor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shame is conferred on fools. [Is 32:6]'
