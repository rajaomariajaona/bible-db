  '7':
  - type: text
    content: Do not be wise in your own eyes;
  - type: text
    content: Fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [with reverent awe and obedience] and turn [entirely] away from evil. [Prov 8:13]'
  '8':
