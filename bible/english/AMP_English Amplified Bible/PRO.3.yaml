  '1':
  - type: heading
    content: The Rewards of Wisdom
  - type: text
    content: 'My son, do not forget my '
  - type: note
    content: Or law.
  - type: text
    content: teaching,
  - type: text
    content: But let your heart keep my commandments;
  '10':
  - type: text
    content: Then your barns will be abundantly filled
  - type: text
    content: And your vats will overflow with new wine. [Deut 28:8]
  '11':
  - type: text
    content: 'My son, do not reject '
  - type: text
    content: or
  - type: text
    content: ' take lightly the discipline of the L'
  - type: heading
    content: ord
  - type: text
    content: ' [learn from your mistakes and the testing that comes from His correction through discipline];'
  - type: text
    content: Nor despise His rebuke, [Ps 94:12; Heb 12:5, 6; Rev 3:19]
  '12':
  - type: text
    content: For those whom the L
  - type: heading
    content: ord
  - type: text
    content: ' loves He corrects,'
  - type: text
    content: 'Even as a father '
  - type: text
    content: corrects
  - type: text
    content: ' the son in whom he delights.'
  '13':
  - type: text
    content: ¶Happy [blessed, considered fortunate, to be admired] is the man who finds [skillful and godly] wisdom,
  - type: text
    content: 'And the man who gains understanding '
  - type: text
    content: and
  - type: text
    content: ' insight [learning from God’s word and life’s experiences],'
  '14':
  - type: text
    content: For wisdom’s profit is better than the profit of silver,
  - type: text
    content: And her gain is better than fine gold.
  '15':
  - type: text
    content: She is more precious than rubies;
  - type: text
    content: And nothing you can wish for compares with her [in value]. [Job 28:12-18]
  '16':
  - type: text
    content: Long life is in her right hand;
  - type: text
    content: In her left hand are riches and honor. [Prov 8:12-21; 1 Tim 4:8]
  '17':
  - type: text
    content: 'Her ways are highways of pleasantness '
  - type: text
    content: and
  - type: text
    content: ' favor,'
  - type: text
    content: And all her paths are peace.
  '18':
  - type: text
    content: She is a tree of life to those who take hold of her,
  - type: text
    content: And happy [blessed, considered fortunate, to be admired] is everyone who holds her tightly.
  '19':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' by His wisdom has founded the earth;'
  - type: text
    content: By His understanding He has established the heavens. [Col 1:16]
  '2':
  - type: text
    content: For length of days and years of life [worth living]
  - type: text
    content: 'And tranquility '
  - type: text
    content: and
  - type: text
    content: ' prosperity [the wholeness of life’s blessings] they will add to you.'
  '20':
  - type: text
    content: By His knowledge the deeps were broken up
  - type: text
    content: And the clouds drip with dew.
  '21':
  - type: text
    content: My son, let them not escape from your sight,
  - type: text
    content: But keep sound wisdom and discretion,
  '22':
  - type: text
    content: And they will be life to your soul (your inner self)
  - type: text
    content: And a gracious adornment to your neck (your outer self).
  '23':
  - type: text
    content: Then you will walk on your way [of life] securely
  - type: text
    content: And your foot will not stumble. [Ps 91:11, 12; Prov 10:9]
  '24':
  - type: text
    content: When you lie down, you will not be afraid;
  - type: text
    content: When you lie down, your sleep will be sweet.
  '25':
  - type: text
    content: Do not be afraid of sudden fear
  - type: text
    content: Nor of the storm of the wicked when it comes [since you will be blameless];
  '26':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will be your confidence, firm '
  - type: text
    content: and
  - type: text
    content: ' strong,'
  - type: text
    content: And will keep your foot from being caught [in a trap].
  '27':
  - type: text
    content: ¶
  - type: note
    content: Using this verse as a proof text, the ancient rabbis offered the example of an employer who tells his foreman to hire workers at four zuz (small silver coins) each to do a job, and the foreman hires them at three instead. Even though they accepted the terms, the rabbis rule that they have the right to complain. Compare this with the parable of the landowner who hires workers for a denarius each. The difference there is that the first group receives a fair wage, while the last is overpaid as a matter of generosity (Matt 20:15).
  - type: text
    content: Do not withhold good from those to whom it is due [its rightful recipients],
  - type: text
    content: When it is in your power to do it. [Rom 13:7; Gal 6:10]
  '28':
  - type: text
    content: Do not say to your neighbor, “Go, and come back,
  - type: text
    content: And tomorrow I will give it,”
  - type: text
    content: When you have it with you. [Lev 19:13; Deut 24:15]
  '29':
  - type: text
    content: Do not devise evil against your neighbor,
  - type: text
    content: Who lives securely beside you.
  '3':
  - type: text
    content: 'Do not let mercy '
  - type: text
    content: and
  - type: text
    content: ' kindness and truth leave you [instead let these qualities define you];'
  - type: text
    content: Bind them [securely] around your neck,
  - type: text
    content: Write them on the tablet of your heart. [Col 3:9-12]
  '30':
  - type: text
    content: Do not quarrel with a man without cause,
  - type: text
    content: If he has done you no harm. [Rom 12:18]
  '31':
  - type: text
    content: Do not envy a man of violence
  - type: text
    content: And do not choose any of his ways. [Ps 37:1; 73:3; Prov 24:1]
  '32':
  - type: text
    content: For the devious are repulsive to the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: But His private counsel is with the upright [those with spiritual integrity and moral courage]. [Ps 25:14]
  '33':
  - type: text
    content: The curse of the L
  - type: heading
    content: ord
  - type: text
    content: ' is on the house of the wicked,'
  - type: text
    content: 'But He blesses the home of the just '
  - type: text
    content: and
  - type: text
    content: ' righteous. [Ps 37:22; Zech 5:4; Mal 2:2]'
  '34':
  - type: text
    content: 'Though He scoffs at the scoffers '
  - type: text
    content: and
  - type: text
    content: ' scorns the scorners,'
  - type: text
    content: Yet He gives His grace [His undeserved favor] to the humble [those who give up self-importance]. [James 4:6; 1 Pet 5:5]
  '35':
  - type: text
    content: 'The wise will inherit honor '
  - type: text
    content: and
  - type: text
    content: ' glory,'
  - type: text
    content: 'But dishonor '
  - type: text
    content: and
  - type: text
    content: ' shame is conferred on fools. [Is 32:6]'
  '4':
  - type: text
    content: So find favor and high esteem
  - type: text
    content: In the sight of God and man. [Luke 2:52]
  '5':
  - type: text
    content: 'Trust in '
  - type: text
    content: and
  - type: text
    content: ' rely confidently on the L'
  - type: heading
    content: ord
  - type: text
    content: ' with all your heart'
  - type: text
    content: 'And do not rely on your own insight '
  - type: text
    content: or
  - type: text
    content: ' understanding.'
  '6':
  - type: text
    content: ' '
