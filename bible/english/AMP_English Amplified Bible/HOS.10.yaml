document_id: HOS.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Retribution for Israel’s Sin
  - type: text
    content: 'Israel is a luxuriant '
  - type: text
    content: and
  - type: text
    content: ' prolific vine;'
  - type: text
    content: He produces fruit for himself.
  - type: text
    content: The more his fruit,
  - type: text
    content: The more altars he made [to Baal];
  - type: text
    content: The richer his land,
  - type: text
    content: The better he made the [idolatrous] pillars.
  '10':
  - type: text
    content: When it is my desire [to defend My righteousness], I will chastise them;
  - type: text
    content: And [hostile] peoples will be gathered against them
  - type: text
    content: 'When they are bound '
  - type: text
    content: and
  - type: text
    content: ' punished for their double guilt [their revolt against the L'
  - type: heading
    content: ord
  - type: text
    content: ' and their worship of idols]. [Jer 2:13; Lam 3:31-33]'
  '11':
  - type: text
    content: ¶Ephraim is a trained heifer that loves to tread out the grain,
  - type: text
    content: 'But I will come over her fair neck '
  - type: text
    content: with a heavy yoke
  - type: text
    content: ' [for hard field work].'
  - type: text
    content: I will harness Ephraim;
  - type: text
    content: 'Judah will plow and Jacob will harrow '
  - type: text
    content: and
  - type: text
    content: ' rake for himself.'
  '12':
  - type: text
    content: Sow with a view to righteousness [that righteousness, like seed, may germinate];
  - type: text
    content: 'Reap in accordance with mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness.'
  - type: text
    content: Break up your uncultivated ground,
  - type: text
    content: 'For it is time to seek '
  - type: text
    content: and
  - type: text
    content: ' search diligently for the L'
  - type: heading
    content: ord
  - type: text
    content: ' [and to long for His blessing]'
  - type: text
    content: 'Until He comes to rain righteousness '
  - type: text
    content: and
  - type: text
    content: ' His gift of salvation on you. [2 Cor 9:10]'
  '13':
  - type: text
    content: 'You have plowed '
  - type: text
    content: and
  - type: text
    content: ' planted wickedness, you have reaped the [willful] injustice [of oppressors],'
  - type: text
    content: You have eaten the fruit of lies.
  - type: text
    content: 'Because you have trusted in your own way '
  - type: text
    content: and
  - type: text
    content: ' your chariots, and in your many warriors,'
  '14':
  - type: text
    content: Therefore an uproar will arise among your people,
  - type: text
    content: And all your fortresses will be destroyed,
  - type: text
    content: As Shalman destroyed Beth-arbel on the day of battle,
  - type: text
    content: When mothers were dashed in pieces with their children. [2 Kin 17:3]
  '15':
  - type: text
    content: In this way it will be done to you at [idolatrous] Bethel because of your great wickedness;
  - type: text
    content: At daybreak the king of Israel will be completely cut off.
  '2':
  - type: text
    content: Their heart is divided (faithless);
  - type: text
    content: 'Now they must bear their guilt '
  - type: text
    content: and
  - type: text
    content: ' punishment.'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will break down [the horns of] their altars;'
  - type: text
    content: 'He will destroy their '
  - type: text
    content: idolatrous
  - type: text
    content: ' pillars.'
  '3':
  - type: text
    content: ¶Surely now they will say [in despair], “We have no [true] king,
  - type: text
    content: For we do not revere the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: And as for the king, what can he do for us [to rescue us]?”
  '4':
  - type: text
    content: 'They have spoken '
  - type: text
    content: empty (disingenuous)
  - type: text
    content: ' words,'
  - type: text
    content: Swearing falsely to make covenants [they intend to break];
  - type: text
    content: Therefore, judgment springs up like poisonous weeds in the furrows of the field.
  '5':
  - type: text
    content: 'The people of Samaria will fear '
  - type: text
    content: and
  - type: text
    content: ' tremble'
  - type: text
    content: 'For the [idolatrous] calf of '
  - type: note
    content: Jeroboam was the king who established the worship of the golden calf at Bethel (House of God), later known as Beth-aven (1 Kin 12:28-33).
  - type: text
    content: Beth-aven (House of Wickedness).
  - type: text
    content: Indeed, its people will mourn over it
  - type: text
    content: 'And its idolatrous priests will cry out '
  - type: text
    content: and
  - type: text
    content: ' wail over it,'
  - type: text
    content: Over its glory, because the glory [of their calf god] has departed from it.
  '6':
  - type: text
    content: The golden calf itself will be carried to Assyria
  - type: text
    content: As tribute to King Jareb;
  - type: text
    content: Ephraim will be seized with shame
  - type: text
    content: And Israel will be ashamed of his own counsel [to worship the calf and separate Israel from Judah].
  '7':
  - type: text
    content: 'As for Samaria, her king will be cut off '
  - type: text
    content: and
  - type: text
    content: ' float away'
  - type: text
    content: Like a twig on the surface of the water.
  '8':
  - type: text
    content: Also the high places of Aven (Beth-aven), the sin of Israel, will be destroyed;
  - type: text
    content: The thorn and the thistle will grow on their [pagan] altars,
  - type: text
    content: And [in despair] they will say to the mountains,
  - type: text
    content: “Cover us!” And to the hills, “Fall on us!” [Luke 23:30; Rev 6:16; 9:6]
  '9':
  - type: text
    content: O Israel, you have [willfully] sinned since the days of Gibeah;
  - type: text
    content: There they (Israel) stand!
  - type: text
    content: Will not the battle against the sons of wickedness overtake them at Gibeah? [Judg 20]
