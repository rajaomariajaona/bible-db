document_id: HOS.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Retribution for Israel’s Sin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Israel is a luxuriant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prolific vine;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He produces fruit for himself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more his fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more altars he made [to Baal];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The richer his land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The better he made the [idolatrous] pillars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Their heart is divided (faithless);
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now they must bear their guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will break down [the horns of] their altars;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will destroy their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: idolatrous
  - type: text
    text: ' pillars.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶Surely now they will say [in despair], “We have no [true] king,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For we do not revere the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as for the king, what can he do for us [to rescue us]?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They have spoken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: empty (disingenuous)
  - type: text
    text: ' words,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Swearing falsely to make covenants [they intend to break];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, judgment springs up like poisonous weeds in the furrows of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The people of Samaria will fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tremble'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the [idolatrous] calf of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jeroboam was the king who established the worship of the golden calf at Bethel (House of God), later known as Beth-aven (1 Kin 12:28-33).
    marker-yv: yv-n
  - type: text
    text: Beth-aven (House of Wickedness).
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, its people will mourn over it
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And its idolatrous priests will cry out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wail over it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Over its glory, because the glory [of their calf god] has departed from it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The golden calf itself will be carried to Assyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: As tribute to King Jareb;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim will be seized with shame
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel will be ashamed of his own counsel [to worship the calf and separate Israel from Judah].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As for Samaria, her king will be cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' float away'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a twig on the surface of the water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Also the high places of Aven (Beth-aven), the sin of Israel, will be destroyed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The thorn and the thistle will grow on their [pagan] altars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [in despair] they will say to the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cover us!” And to the hills, “Fall on us!” [Luke 23:30; Rev 6:16; 9:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Israel, you have [willfully] sinned since the days of Gibeah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There they (Israel) stand!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will not the battle against the sons of wickedness overtake them at Gibeah? [Judg 20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When it is my desire [to defend My righteousness], I will chastise them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [hostile] peoples will be gathered against them
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When they are bound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished for their double guilt [their revolt against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and their worship of idols]. [Jer 2:13; Lam 3:31-33]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Ephraim is a trained heifer that loves to tread out the grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I will come over her fair neck '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with a heavy yoke
  - type: text
    text: ' [for hard field work].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will harness Ephraim;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Judah will plow and Jacob will harrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rake for himself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sow with a view to righteousness [that righteousness, like seed, may germinate];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Reap in accordance with mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Break up your uncultivated ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For it is time to seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' search diligently for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [and to long for His blessing]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until He comes to rain righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His gift of salvation on you. [2 Cor 9:10]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You have plowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' planted wickedness, you have reaped the [willful] injustice [of oppressors],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have eaten the fruit of lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because you have trusted in your own way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your chariots, and in your many warriors,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore an uproar will arise among your people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all your fortresses will be destroyed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As Shalman destroyed Beth-arbel on the day of battle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When mothers were dashed in pieces with their children. [2 Kin 17:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: In this way it will be done to you at [idolatrous] Bethel because of your great wickedness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: At daybreak the king of Israel will be completely cut off.
