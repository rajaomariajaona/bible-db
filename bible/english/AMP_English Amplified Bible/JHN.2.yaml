  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His mother said to the servants, “Whatever He says to you, do it.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there were six stone waterpots set there for the Jewish custom of purification (ceremonial washing), containing twenty or thirty gallons each. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to the servants, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Fill the waterpots with water.”
    - type: text
      text: ' So they filled them up to the brim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Draw '
      - type: usfm
        marker: it
        children:
        - type: text
          text: some
      - type: text
        text: ' out now and take it to the headwaiter'
    - type: text
      text: ' [of the banquet].” So they took it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to him.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the headwaiter tasted the water which had turned into wine, not knowing where it came from (though the servants who had drawn the water knew) he called the bridegroom, '
