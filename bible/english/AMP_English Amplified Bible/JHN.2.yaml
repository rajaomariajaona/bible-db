      - type: text
        text: First Passover—Cleansing the Temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Passover of the Jews was approaching, so Jesus went up to Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the temple [enclosure] He found the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were vendors profiting from the sale of certain animals for sacrifice, or from the exchange of foreign or pagan coins for temple currency (money approved by the priests to present as offerings).
      marker-yv: yv-n
    - type: text
      text: 'people who were selling oxen and sheep and doves, and the money changers sitting '
    - type: usfm
