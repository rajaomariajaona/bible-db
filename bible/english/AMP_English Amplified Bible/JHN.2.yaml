      children:
      - type: text
        text: at their tables
    - type: text
      text: '. [Matt 21:12ff; Mark 11:15, 17] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made a whip of cords, and drove them all out of the temple, with the sheep and the oxen; and He scattered the coins of the money changers and overturned their tables; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then to those who sold the doves He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take these things away! Stop making My Father’s house a place of commerce!”
    - type: text
      text: ' [Ps 93:5] '
