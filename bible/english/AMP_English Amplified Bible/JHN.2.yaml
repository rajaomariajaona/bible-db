  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This, the first of His signs (attesting miracles), Jesus did in Cana of Galilee, and revealed His glory [displaying His deity and His great power openly], and His disciples believed [confidently] in Him [as the Messiah—they adhered to, trusted in, and relied on Him]. [Deut 5:24; Ps 72:19]
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After this He went down to Capernaum, He and His mother and brothers and His disciples; and they stayed there a few days.
  - type: usfm
