        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To fail to provide for the wedding guests would bring disgrace on the groom.
      marker-yv: yv-n
    - type: text
      text: 'They have no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: ' wine.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, “[Dear] '
    - type: usfm
      marker: wj
      children:
