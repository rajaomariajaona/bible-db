  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Jews retorted, “What sign (attesting miracle) can You show us as [proof of] your authority for doing these things?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Destroy this temple, and in three days I will raise it up.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and both Jesus and His disciples were invited to the wedding. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Jews replied, “It took forty-six years to build this temple, and You will raise it up in three days?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He was speaking of the temple which was His body. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when He had risen from the dead, His disciples remembered what He had said. And they believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on the Scripture and the words that Jesus had spoken. [Ps 16:10]'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when He was in Jerusalem at the Passover feast, many believed in His name [identifying themselves with Him] after seeing His signs (attesting miracles) which He was doing. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, for His part, did not entrust Himself to them, because He knew all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' [and understood the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For some people this display of “belief” was not an abiding trust or true faith in Jesus as Savior (Messiah), but merely a temporary belief based on the excitement caused by witnessing His miracles. These people, whose belief was fleeting and superficial, were representative of the followers who abandoned Him later.
      marker-yv: yv-n
    - type: text
      text: 'superficiality and fickleness of human nature], '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and He did not need anyone to testify concerning man [and human nature], for He Himself knew what was in man [in their hearts—in the very core of their being]. [1 Sam 16:7]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the wine was all gone, the mother of Jesus said to Him, “
    - type: usfm
