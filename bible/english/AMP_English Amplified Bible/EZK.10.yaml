document_id: EZK.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vision of God’s Glory Departing from the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I looked, and behold, in the expanse (firmament) that was over the heads of the cherubim there appeared something [glorious and brilliant] above them looking like a [huge] sapphire stone, formed to resemble a throne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to the man (seventh angel) clothed in linen and said, “Go between the whirling wheels under the cherubim; fill your hands with coals of fire from between the cherubim and scatter them over the city.” And he entered as I watched. [Rev 8:5]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the cherubim were standing on the right side of the temple when the man entered; and a cloud [the Shekinah glory of God] filled the inner courtyard. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' moved upward from the cherubim to [rest over] the threshold of the temple; and the temple was filled with the cloud and the courtyard was filled with the brightness of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' glory. [1 Kin 8:10, 11; Ezek 43:5] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the sound of the wings of the cherubim was heard [even] as far as the outer courtyard, like the voice of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: God Almighty when He speaks. [Ps 29:3, 4]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'It came about when He commanded the man clothed in linen, saying, “Take fire from between the whirling wheels, from between the cherubim,” the man entered and stood beside a wheel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then a cherub stretched out his hand from between the cherubim to the fire that was between [the four of] them, and took some [of it] and put it into the hands of the man clothed in linen, who took it and departed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Beneath their wings the cherubim seemed to have [something in] the form of a man’s hand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I looked and behold, [there were] four wheels beside the cherubim, one wheel beside one cherub and another wheel beside each other cherub; and the appearance of the wheels was like a sparkling Tarshish stone (beryl). '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As for their appearance, all four looked alike, as if one wheel were within another wheel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When they moved, they went in any of their four directions without turning as they went; but they followed in the direction which they faced, without turning as they went. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their whole body, their backs, their hands, their wings, and the wheels were full of eyes all around, even the wheels belonging to all four of them. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Regarding the wheels [attached to them], I heard them called, “the whirling (rolling, revolving) wheels.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And each one had four faces: the first face was the face of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In 1:10, this face was described as that of an ox.
    marker-yv: yv-n
  - type: text
    text: cherub, the second the face of a man, the third the face of a lion, and the fourth the face of an eagle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the cherubim rose upward. They are the [same four] living beings [regarded as one] that I saw by the River Chebar [in Babylonia]. [Ezek 1:5] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now when the cherubim moved, the wheels would go beside them; and when the cherubim lifted up their wings to rise from the earth, the wheels would remain beside them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When the cherubim stood still, the wheels would stand still; and when they rose upward, the wheels would rise with them, for the spirit of the living beings was in these [wheels]. [Ezek 1:21]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the [Shekinah] glory of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' departed from the threshold of the temple and rested over the cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As I looked at them, the cherubim lifted up their wings and rose up from the earth, they departed with the wheels beside them; and they stood still at the entrance of the east gate of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the God of Israel hovered over them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These are the living beings that I saw beneath the God of Israel by the River Chebar; and I knew that they were cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Each one had four faces and each one had four wings, and beneath their wings was the form of human hands. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: As for the likeness of their faces, they were the same faces whose appearance I had seen by the River Chebar. Each one went straight forward.
