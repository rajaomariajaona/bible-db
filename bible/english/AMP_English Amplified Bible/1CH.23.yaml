document_id: 1CH.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon Reigns
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David reached old age, he made his son Solomon king over Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Shimei: Jahath, Zina (Zizah), Jeush, and Beriah. These were the four sons of Shimei. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jahath was the first and Zizah the second; but Jeush and Beriah did not have many sons [not enough for a father’s house or clan], so they were [counted together] as one father’s household, one working group.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kohathites
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Kohath: Amram, Izhar, Hebron, and Uzziel—four '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Amram: Aaron and Moses. Aaron was set apart to consecrate him as most holy, he and his sons forever, to burn incense before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', attend to His service, and to bless [worshipers] in His name forever. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for Moses the man of God, his sons were counted among the tribe of Levi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Moses: Gershom and Eliezer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Gershom: Shebuel the chief. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Eliezer was Rehabiah the chief. Eliezer had no other sons, but Rehabiah’s sons were very many [in number]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Izhar: Shelomith the chief. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Hebron: Jeriah the first, Amariah the second, Jahaziel the third, and Jekameam the fourth. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he assembled together all the leaders of Israel with the priests and Levites.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Offices of the Levites
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Uzziel: Micah the first and Isshiah the second.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Merarites
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Merari: Mahli and Mushi. The sons of Mahli: Eleazar and Kish. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eleazar died and had no sons, but daughters only, and their relatives, the sons of Kish, took them as wives. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Mushi: Mahli, Eder, and Jeremoth—three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties Revised
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the Levites by their fathers’ households, the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of those registered, according to the number of names of the individuals who were the servants of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from twenty years old and upward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For David said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, has given peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest to His people, and He dwells in Jerusalem forever. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, the Levites will no longer need to carry the tabernacle and all its utensils for its service.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by the last words of David, the Levites from twenty years old and above were counted. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For their duty is to assist [the priests] the sons of Aaron in the service of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in [caring for] the courtyards, the chambers, the purifying of all holy things, and any work of the service of the house of God, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with the showbread, and the fine flour for a grain offering, and unleavened wafers, or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what is baked in
    - type: text
      text: ' the pan or what is well-mixed, and all measures of volume and size [as the Law of Moses required]. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Levites thirty years old and upward were counted, and their number man by man was 38,000. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are to stand every morning to thank and praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and likewise at evening, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and to offer all burnt sacrifices to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the Sabbaths, the new moons, and the festivals by number according to the ordinance concerning them, continually before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they shall be responsible for the Tent of Meeting, the Holy Place, and the sons of Aaron their relatives, for the service of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Of these '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This number might seem high if the situation is not clarified. There are several important factors to consider: 1. The Levites were divided into 24 rotating divisions (1 Chr 24:6-19). 2. It is plausible that 1,000 Levites were on duty at any one time for Solomon’s temple, considering the many purposes and required maintenance of the building, its ornate ritual, and the scale of the work. 3. In the wilderness, the worshiper would kill the animal he brought for an offering, skin it, cut it in pieces, and wash the entrails and legs. But now all these tasks were the duty of the Levites or Nethinim (servants of the temple); in addition, the number of worshipers had greatly increased, requiring a large number of Levites.'
      marker-yv: yv-n
    - type: text
      text: '24,000 were to oversee '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inspect the work of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and 6,000 were to be administrators and judges, '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and 4,000 were gatekeepers, and 4,000 [musicians] were to praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with the instruments which David made for giving praise. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And David organized them into divisions according to the sons of Levi: Gershon, Kohath, and Merari.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gershonites
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Gershonites: Ladan (Libni) and Shimei. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Ladan: Jehiel the first and Zetham and Joel—three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Shimei: Shelomoth, Haziel, and Haran—three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. These were the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of Ladan. '
