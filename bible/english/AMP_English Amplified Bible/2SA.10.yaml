type_code: eng
verses:
  '1':
  - type: heading
    content: Ammon and Aram Defeated
  - type: text
    content: 'Now it happened later that [Nahash] the king of the Ammonites died, and his son Hanun became king in his place. '
  '10':
  - type: text
    content: 'But he placed the rest of the men in the hand of his brother Abishai, and he placed them in battle formation to meet the Ammonites. '
  '11':
  - type: text
    content: 'Joab said [to Abishai], “If the Arameans are too strong for me, then you shall help me; but if the Ammonites are too strong for you, I will come to help you. '
  '12':
  - type: text
    content: Be courageous, and let us show ourselves courageous for the benefit of our people and the cities of our God. And may the L
  - type: heading
    content: ord
  - type: text
    content: ' do what is good in His sight.” '
  '13':
  - type: text
    content: 'So Joab and the people who were with him approached the battle against the Arameans, and they fled before him. '
  '14':
  - type: text
    content: 'When the Ammonites saw that the Arameans had fled, they also fled before Abishai and entered the city. So Joab returned from '
  - type: text
    content: battling
  - type: text
    content: ' against the Ammonites and came to Jerusalem.'
  '15':
  - type: text
    content: 'When the Arameans saw that they were defeated by Israel, they gathered together. '
  '16':
  - type: text
    content: 'Hadadezer sent '
  - type: text
    content: word
  - type: text
    content: ' and brought out the Arameans who were beyond the River [Euphrates]; and they came to Helam; and Shobach the commander of the army of Hadadezer led them. '
  '17':
  - type: text
    content: 'When David was informed, he gathered all Israel together and crossed the Jordan, and came to Helam. Then the Arameans assembled in battle formation to meet David and fought against him. '
  '18':
  - type: text
    content: 'But the Arameans fled before Israel, and David killed 700 Aramean charioteers and 40,000 horsemen, and struck Shobach the commander of their army, and he died there. '
  '19':
  - type: text
    content: When all the kings serving Hadadezer saw that they had been defeated by Israel, they made peace with Israel and served them. So the Arameans (Syrians) were afraid to help the Ammonites anymore.
  '2':
  - type: text
    content: 'Then David said, “I will show kindness to Hanun the son of Nahash, just as his father did to me.” So David sent [a letter along with] some of his servants to console him in regard to his father’s death; and David’s servants came into the land of the Ammonites. '
  '3':
  - type: text
    content: 'But the princes of the Ammonites [were suspicious and] said to Hanun their lord, “Do you think that David is honoring your father because he has sent comforters to you? Has David not sent his servants to you in order to search the city, to spy it out and overthrow it?” '
  '4':
  - type: text
    content: 'So Hanun took David’s servants and shaved off half their beards, and cut off their robes in the middle as far as their hips, and sent them away. '
  '5':
  - type: text
    content: 'When David was informed, he sent [messengers] to meet them [before they reached Jerusalem], for the men were greatly ashamed '
  - type: text
    content: and
  - type: text
    content: ' humiliated. And the king said, “Stay at Jericho until your beards grow, and '
  - type: text
    content: then
  - type: text
    content: ' return.”'
  '6':
  - type: text
    content: 'When the Ammonites saw that they had become an object of hatred to David, they sent '
  - type: text
    content: word
  - type: text
    content: ' and hired the Arameans (Syrians) of Beth-rehob and the Arameans of Zobah, 20,000 foot soldiers, and the king of Maacah with 1,000 men, and the men of Tob with 12,000 men [to fight for them]. '
  '7':
  - type: text
    content: 'When David heard about it, he sent Joab and the entire army, the strong '
  - type: text
    content: and
  - type: text
    content: ' brave men. '
  '8':
  - type: text
    content: The Ammonites came out and lined up for battle at the entrance of the [city] gate, but the Arameans of Zobah and Rehob and the men of Tob and Maacah were [stationed] by themselves in the field.
  '9':
  - type: text
    content: 'Now when Joab saw that the battlefront was against him in front and in the rear, he selected some of all the choice men in Israel and set them in battle formation to meet the Arameans (Syrians). '
