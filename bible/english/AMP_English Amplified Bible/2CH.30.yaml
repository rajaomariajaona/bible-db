document_id: 2CH.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: All Israel Invited to the Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to all Israel and to Judah and also wrote letters to Ephraim and Manasseh to come to the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' at Jerusalem to celebrate the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Feast
    - type: text
      text: ' to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the runners (couriers) passed from city to city through the country of Ephraim and Manasseh, as far as Zebulun; but the people laughed at them with scorn and mocked them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some of
    - type: text
      text: ' the men of Asher, Manasseh, and Zebulun humbled themselves and came to Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also the hand of God was on Judah to give them one heart to do that which the king and the officials had commanded by the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Passover Reinstituted
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now many people were gathered at Jerusalem to celebrate the Feast of Unleavened Bread in the second month; it was a very large assembly. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took action and removed the [pagan] altars which were in Jerusalem; they also removed all the incense altars and threw them into the Brook Kidron [the dumping place for the ashes of such repulsive things]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they slaughtered the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lambs
    - type: text
      text: ' on the fourteenth day of the second month. And the priests and the Levites were ashamed of themselves, and consecrated themselves and brought burnt offerings to the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They stood at their accustomed stations, in accordance with the Law of Moses, the man of God. The priests sprinkled the blood [which they received] from the hand of the Levites [on the altar]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For there were many in the assembly who had not consecrated themselves [that is, become ceremonially clean and free from all sin]; so the Levites had to slaughter the Passover '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lambs
    - type: text
      text: ' for everyone who was not clean, in order to make them holy for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the majority of the people, many from Ephraim and Manasseh, Issachar and Zebulun, had not purified themselves, and yet they ate the Passover contrary to what had been prescribed. For Hezekiah had prayed for them, saying, “May the good L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' pardon '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: everyone who sets his heart to seek God—the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of his fathers—even though it is not in accordance with the [ceremonial] purification [rules] of the sanctuary.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the king and his officials and all the assembly in Jerusalem had decided to celebrate the Passover in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Passover was usually celebrated in the first month; however, there was an exception to the rule that allowed certain individuals to celebrate it in the second month. In this case the exception was extended to the entire population.
      marker-yv: yv-n
    - type: text
      text: 'second month, [Num 9:10, 11] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' listened to Hezekiah and healed the people [of their uncleanness]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Israelites who were present in Jerusalem celebrated the Feast of Unleavened Bread for seven days with great joy. The Levites and priests praised the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' day after day, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: singing
    - type: text
      text: ' to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with loud instruments. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah spoke '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to the heart of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'encouragingly to all the Levites who showed good understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the things
    - type: text
      text: ' of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . So the people ate for the appointed seven days, sacrificing peace offerings and giving thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of their fathers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole assembly decided to celebrate [the feast] for another seven days; and they celebrated it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' seven days with joy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Hezekiah king of Judah gave to the assembly 1,000 bulls and 7,000 sheep, and the officials gave the assembly 1,000 bulls and 10,000 sheep. And a large number of priests consecrated themselves [for service]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the assembly of Judah rejoiced, with the priests and the Levites and all the assembly that came from Israel, both the sojourners (resident aliens, foreigners) who came from the land of Israel and those living in Judah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was great joy in Jerusalem, because there had been nothing like this in Jerusalem since the time of Solomon the son of David, king of Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the priests and Levites stood and blessed the people; and their voice was heard and their prayer came up to His holy dwelling place, to heaven.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'since they could not celebrate it at that time because a sufficient number of priests had not consecrated themselves, nor had the people assembled at Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus the [decision to set a] new time pleased the king and the entire assembly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they decided to circulate a proclamation throughout Israel, from Beersheba to Dan, that the people were to come to celebrate the Passover to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, at Jerusalem. For they had not celebrated it in great numbers as it was prescribed [for a long time]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the runners went throughout Israel and Judah with the letters from the hand of the king and his officials, in accordance with the command of the king, saying, “O sons (descendants) of Israel, return to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Abraham, Isaac, and Israel (Jacob), so that He will return to those of you who escaped and are left from the hand (power) of the kings of Assyria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not be like your fathers and your brothers, who were unfaithful to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of their fathers, so that He made them a horror (lifeless, desolate), just as you see. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now do not stiffen your neck [becoming obstinate] like your fathers, but yield to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and come to His sanctuary which He has sanctified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart forever, and serve the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, so that His burning anger will turn away from you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if you return to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your brothers (relatives) and your children will find compassion in the presence of those who led them away captive and will return to this land. For the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is gracious and merciful, and He will not turn His face away from you if you return to Him.”'
