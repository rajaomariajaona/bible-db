segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zaccheus Converted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus entered Jericho and was passing through. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And there was a man called Zaccheus; he was a chief tax collector [a superintendent to whom others reported], and he was rich. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Zaccheus was trying to see who Jesus was, but he could not see '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from the crowd
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'because of the crowd, for he was short in stature. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So he ran on ahead [of the crowd] and climbed up in a sycamore tree in order to see Him, for He was about to pass through that way. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus reached the place, He looked up and said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Zaccheus, hurry and come down, for today I must stay at your house.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Zaccheus hurried and came down, and welcomed Jesus with joy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the people saw it, they all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' muttering [in discontent], “He has gone to be the guest of a man who is a [notorious] sinner.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Zaccheus stopped and said to the Lord, “See, Lord, I am [now] giving half of my possessions to the poor, and if I have cheated anyone out of anything, I will give back four times as much.” [Ex 22:1; Lev 6:5; Num 5:6, 7] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Today salvation has come to this household, because he, too, is a
  - type: text
    text: ' ['
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By changing both his old way of thinking and his behavior Zaccheus proved that his faith in God was real.
    marker-yv: yv-n
  - type: text
    text: 'spiritual] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: son of Abraham;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the Son of Man has come to seek and to save that which was lost.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of Money Usage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'While they were listening to these things, Jesus went on to tell a parable, because He was near Jerusalem, and they assumed that the kingdom of God was going to appear immediately [as soon as He reached the city]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A nobleman went to a distant country to obtain for himself a kingdom, and
  - type: text
    text: ' [then] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to return.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he called ten of his servants, and gave them ten minas
  - type: text
    text: ' [one apiece, each equal to about a hundred days’ wages] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and said to them, ‘Do business
  - type: text
    text: ' [with this] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until I return.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But his citizens
  - type: text
    text: ' [the residents of his new kingdom] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: hated him and sent a delegation after him, saying, ‘We do not want this man to be a king over us.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When he returned, after receiving the kingdom, he ordered that these servants, to whom he had given the money, be called to him, that he might find out what business they had done.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The first one came before him and said, ‘Lord, your mina has made ten more minas.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he said to him, ‘Well done, good servant! Because you proved yourself faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy in a very little thing, you shall'
  - type: text
    text: ' [now] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: have authority over ten cities
  - type: text
    text: ' [in my kingdom].’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The second one came and said, ‘Lord, your mina has made five minas.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he said to him also, ‘And you shall take charge over five cities.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then another came and said, ‘Lord, here is your mina, which I have kept laid up in a handkerchief
  - type: text
    text: ' [for safekeeping]. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I was
  - type: text
    text: ' [always] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afraid of you, because you are a stern man; you pick up what you did not lay down and you reap what you did not sow.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He said to the servant, ‘I will judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemn you by your own words, you worthless servant! Did you'
  - type: text
    text: ' [really] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: know that I was a stern man, picking up what I did not lay down and reaping what I did not sow?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then why did you not
  - type: text
    text: ' [at the very least] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: put my money in a bank? Then on my return, I would have collected it with interest.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then he said to the bystanders, ‘Take the mina away from him and give it to the one who has the ten minas.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And they said to him, ‘Lord, he has ten minas '
    - type: usfm
      marker: it
      children:
      - type: text
        text: already!
    - type: text
      text: ’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '[Jesus explained,] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I tell you that to everyone who has
  - type: text
    text: ' [because he valued his gifts from God and has used them wisely], '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
    - type: text
      text: ' will be given; but from the one who does not have'
  - type: text
    text: ' [because he disregarded his gifts from God], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even what he has will be taken away.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '[The king ended by saying,] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘But as for these enemies of mine who did not want me to be king over them, bring them here and kill them in my presence.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Triumphal Entry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: After saying these things, Jesus went on ahead [of them], going up to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When He approached Bethphage and Bethany, at the mount that is called Olivet, He sent two of the disciples, [Matt 21:1-9; Mark 11:1-10; John 12:12-15] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go into the village ahead of you; there, as you enter, you will find a
  - type: text
    text: ' [donkey’s] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A colt that had not been ridden was considered holy by the Jews and was fit to carry a king.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: colt tied, on which no one has ever sat. Untie it and bring it here.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anybody asks you, ‘Why are you untying the colt?’ you will say, ‘The Lord needs it.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So those who were sent left and found the colt just as He had told them. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'As they were untying the colt, its owners asked them, “Why are you untying the colt?” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'They said, “The Lord needs it.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They brought it to Jesus, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A sign of homage and recognition of Jesus’ kingship.
    marker-yv: yv-n
  - type: text
    text: 'they threw their robes over the colt and put Jesus on it. [Zech 9:9] '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'As He rode along, people were spreading their coats on the road [as an act of homage before a king]. [2 Kin 9:13] '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'As soon as He was approaching [Jerusalem], near the descent of the Mount of Olives, the entire multitude of the disciples [all those who were or claimed to be His followers] began praising God [adoring Him enthusiastically and] joyfully with loud voices for all the miracles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' works of power that they had seen, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: shouting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “B
  - type: usfm
    marker: sc
    children:
    - type: text
      text: lessed
  - type: text
    text: ' (celebrated, praised) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: is the
  - type: text
    text: ' K'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ing who comes in the name of the
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peace in heaven and glory (majesty, splendor) in the highest [heaven]!” [Ps 118:26]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Some of the Pharisees from the crowd said to Him, “Teacher, rebuke Your disciples [for shouting these Messianic praises].” '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you, if these
  - type: text
    text: ' [people] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: keep silent, the stones will cry out
  - type: text
    text: ' [in praise]!” [Hab 2:11]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'As He approached '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jerusalem,
  - type: text
    text: ' He saw the city and wept over it [and the spiritual ignorance of its people], '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If
  - type: text
    text: ' [only] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you had known on this day
  - type: text
    text: ' [of salvation], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even you, the things which make for peace
  - type: text
    text: ' [and on which peace depends]! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But now they have been hidden from your eyes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For a time
  - type: text
    text: ' [of siege] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is coming when your enemies will put up a barricade
  - type: text
    text: ' [with pointed stakes] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: against you, and surround you
  - type: text
    text: ' [with armies] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and hem you in on every side,
  - type: text
    text: ' [Is 29:3; Jer 6:6; Ezek 4:2] '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they will level you to the ground, you
  - type: text
    text: ' [Jerusalem] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and your children within you. They will not leave in you one stone on another, all because you did not
  - type: text
    text: ' [come progressively to] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: recognize
  - type: text
    text: ' [from observation and personal experience] '
  - type: usfm
    marker: wj
