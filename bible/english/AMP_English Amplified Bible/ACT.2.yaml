          text: Pentecost (Feast of Weeks) was observed at the time of the grain harvest and the offering of the first fruits, and was one of the three great annual Jewish festivals, along with Passover and the Feast of Tabernacles (Booths). Just as Jesus’ sacrifice was the fulfillment of Passover, the coming of the Holy Spirit was the fulfillment of Pentecost.
