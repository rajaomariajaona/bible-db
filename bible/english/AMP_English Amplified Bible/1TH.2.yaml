document_id: 1TH.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul’s Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you know, brothers and sisters, that our coming to you has not been ineffective (fruitless, in vain), '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are witnesses, and so is God, how unworldly and just and blameless was our behavior toward you who believe [in our Lord Jesus Christ]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you know how we were exhorting and encouraging and imploring each one of you just as a father does [in dealing with] his own children, [guiding you] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to live lives [of honor, moral courage, and personal integrity] worthy of the God who [saves you and] calls you into His own kingdom and glory.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we also thank God continually for this, that when you received the word of God [concerning salvation] which you heard from us, you welcomed it not as the word of [mere] men, but as it truly is, the word of God, which is effectually at work in you who believe [exercising its inherent, supernatural power in those of faith]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, became imitators of the churches of God in Christ Jesus that are in Judea, because you too suffered the same [kind of] persecution from your own countrymen, as they did from the Jews, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus Christ willingly gave up His life for our salvation by allowing Himself to be tortured and killed.
      marker-yv: yv-n
    - type: text
      text: 'killed both the Lord Jesus and the prophets, and harassed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drove us out; and [they] continue to be highly displeasing to God and [to show themselves] hostile to all people, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: forbidding us from speaking to the Gentiles (non-Jews) so that they may be saved. So, as always, they fill up [to the brim] the measure of their sins [allotted to them by God]. But [God’s] wrath has come upon them at last [completely and forever]. [Gen 15:16]
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But since we were taken away from you, believers, for a little while—in person, but not in heart—we endeavored, with great longing to see you face to face. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we wanted to come to you—I, Paul, again and again [wanted to come], but Satan hindered us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who is [the object of] our hope or joy or our victor’s wreath of triumphant celebration [when we stand] in the presence of our Lord Jesus at His coming? Is it not you? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but after we had already suffered and been outrageously treated in Philippi, as you know, yet in [the strength of] our God we summoned the courage to proclaim boldly to you the good news of God [regarding salvation] amid great opposition. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For you are [indeed] our glory and our joy!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For our appeal does not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' from delusion or impure motives, nor [is it motivated] by deceit [our message is complete, accurate, and based on the truth—it does not change]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But just as we have been approved by God to be entrusted with the gospel [that tells the good news of salvation through faith in Christ], so we speak, not as [if we were trying] to please people [to gain power and popularity], but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to please
    - type: text
      text: ' God who examines our hearts [expecting our best]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as you well know, we never came with words of flattery nor with a pretext for greed—God is our witness— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor did we seek glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor from people, neither from you nor from anyone else, though as apostles of Christ we had the power to assert our authority. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we behaved gently when we were among you, like a devoted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mother
    - type: text
      text: ' tenderly caring for her own children. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having such a deep affection for you, we '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: resolved to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: were delighted to share with you not only God’s good news but also our own lives, because you had become so very dear to us.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you remember, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers, our labor and hardship. We worked night and day [practicing our trade] in order not to be a [financial] burden to any of you while we proclaimed the gospel of God to you. '
