document_id: 1TH.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Ministry
  - type: text
    content: 'For you know, brothers and sisters, that our coming to you has not been ineffective (fruitless, in vain), '
  '10':
  - type: text
    content: 'You are witnesses, and so is God, how unworldly and just and blameless was our behavior toward you who believe [in our Lord Jesus Christ]. '
  '11':
  - type: text
    content: 'For you know how we were exhorting and encouraging and imploring each one of you just as a father does [in dealing with] his own children, [guiding you] '
  '12':
  - type: text
    content: to live lives [of honor, moral courage, and personal integrity] worthy of the God who [saves you and] calls you into His own kingdom and glory.
  '13':
  - type: text
    content: 'And we also thank God continually for this, that when you received the word of God [concerning salvation] which you heard from us, you welcomed it not as the word of [mere] men, but as it truly is, the word of God, which is effectually at work in you who believe [exercising its inherent, supernatural power in those of faith]. '
  '14':
  - type: text
    content: 'For you, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters, became imitators of the churches of God in Christ Jesus that are in Judea, because you too suffered the same [kind of] persecution from your own countrymen, as they did from the Jews, '
  '15':
  - type: text
    content: 'who '
  - type: note
    content: Jesus Christ willingly gave up His life for our salvation by allowing Himself to be tortured and killed.
  - type: text
    content: 'killed both the Lord Jesus and the prophets, and harassed '
  - type: text
    content: and
  - type: text
    content: ' drove us out; and [they] continue to be highly displeasing to God and [to show themselves] hostile to all people, '
  '16':
  - type: text
    content: forbidding us from speaking to the Gentiles (non-Jews) so that they may be saved. So, as always, they fill up [to the brim] the measure of their sins [allotted to them by God]. But [God’s] wrath has come upon them at last [completely and forever]. [Gen 15:16]
  '17':
  - type: text
    content: 'But since we were taken away from you, believers, for a little while—in person, but not in heart—we endeavored, with great longing to see you face to face. '
  '18':
  - type: text
    content: 'For we wanted to come to you—I, Paul, again and again [wanted to come], but Satan hindered us. '
  '19':
  - type: text
    content: 'For who is [the object of] our hope or joy or our victor’s wreath of triumphant celebration [when we stand] in the presence of our Lord Jesus at His coming? Is it not you? '
  '2':
  - type: text
    content: 'but after we had already suffered and been outrageously treated in Philippi, as you know, yet in [the strength of] our God we summoned the courage to proclaim boldly to you the good news of God [regarding salvation] amid great opposition. '
  '20':
  - type: text
    content: For you are [indeed] our glory and our joy!
  '3':
  - type: text
    content: 'For our appeal does not '
  - type: text
    content: come
  - type: text
    content: ' from delusion or impure motives, nor [is it motivated] by deceit [our message is complete, accurate, and based on the truth—it does not change]. '
  '4':
  - type: text
    content: 'But just as we have been approved by God to be entrusted with the gospel [that tells the good news of salvation through faith in Christ], so we speak, not as [if we were trying] to please people [to gain power and popularity], but '
  - type: text
    content: to please
  - type: text
    content: ' God who examines our hearts [expecting our best]. '
  '5':
  - type: text
    content: 'For as you well know, we never came with words of flattery nor with a pretext for greed—God is our witness— '
  '6':
  - type: text
    content: 'nor did we seek glory '
  - type: text
    content: and
  - type: text
    content: ' honor from people, neither from you nor from anyone else, though as apostles of Christ we had the power to assert our authority. '
  '7':
  - type: text
    content: 'But we behaved gently when we were among you, like a devoted '
  - type: text
    content: mother
  - type: text
    content: ' tenderly caring for her own children. '
  '8':
  - type: text
    content: 'Having such a deep affection for you, we '
  - type: note
    content: Or resolved to.
  - type: text
    content: were delighted to share with you not only God’s good news but also our own lives, because you had become so very dear to us.
  '9':
  - type: text
    content: 'For you remember, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, our labor and hardship. We worked night and day [practicing our trade] in order not to be a [financial] burden to any of you while we proclaimed the gospel of God to you. '
