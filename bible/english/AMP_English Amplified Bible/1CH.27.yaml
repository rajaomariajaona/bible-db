document_id: 1CH.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Commanders of the Army
  - type: text
    content: 'This is the list of the sons (descendants) of Israel, the heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ', the commanders of thousands and of hundreds, and their officers who served the king in all matters of the divisions which came in and went out month by month throughout the year, each division '
  - type: text
    content: numbering
  - type: text
    content: ' 24,000:'
  '10':
  - type: text
    content: 'The seventh, for the seventh month was Helez the Pelonite of the sons of Ephraim; and in his division were 24,000. '
  '11':
  - type: text
    content: 'The eighth, for the eighth month was Sibbecai the Hushathite of the Zerahites; and in his division were 24,000. '
  '12':
  - type: text
    content: 'The ninth, for the ninth month was Abiezer of Anathoth, a Benjamite; and in his division were 24,000. '
  '13':
  - type: text
    content: 'The tenth, for the tenth month was Maharai from Netophah of the Zerahites; and in his division were 24,000. '
  '14':
  - type: text
    content: 'The eleventh, for the eleventh month was Benaiah the Pirathonite of the sons of Ephraim; and in his division were 24,000. '
  '15':
  - type: text
    content: The twelfth, for the twelfth month was Heldai the Netophathite of Othniel; and in his division were 24,000.
  - type: heading
    content: Chief Officers of the Tribes
  '16':
  - type: text
    content: 'Now in charge of the tribes of Israel [were the following]: chief officer of the Reubenites was Eliezer the son of Zichri; of the Simeonites, Shephatiah the son of Maacah; '
  '17':
  - type: text
    content: 'of Levi, Hashabiah the son of Kemuel; of Aaron, Zadok; '
  '18':
  - type: text
    content: 'of Judah, Elihu, one of David’s brothers; of Issachar, Omri the son of Michael; '
  '19':
  - type: text
    content: 'of Zebulun, Ishmaiah the son of Obadiah; of Naphtali, Jeremoth the son of Azriel; '
  '2':
  - type: text
    content: 'Jashobeam the son of Zabdiel was in charge of the first division for the first month; and in his division were 24,000. '
  '20':
  - type: text
    content: 'of the Ephraimites, Hoshea the son of Azaziah; of the half-tribe of Manasseh, Joel the son of Pedaiah; '
  '21':
  - type: text
    content: 'of the half-tribe of Manasseh in Gilead, Iddo the son of Zechariah; of Benjamin, Jaasiel the son of Abner; '
  '22':
  - type: text
    content: 'of Dan, Azarel the son of Jeroham. These were the leaders of the tribes of Israel. '
  '23':
  - type: text
    content: But David did not count those twenty years of age and under, for the L
  - type: heading
    content: ord
  - type: text
    content: ' had said he would multiply Israel as the stars of heaven. '
  '24':
  - type: text
    content: Joab the son of Zeruiah began a census but did not finish; and because of this, [God’s] wrath came on Israel, and the number was not recorded in the chronicles of King David.
  - type: heading
    content: Various Overseers
  '25':
  - type: text
    content: 'Azmaveth the son of Adiel was in charge of the king’s storerooms; and Jonathan the son of Uzziah was in charge of the storehouses in the country, in the cities, in the villages, and in the towers. '
  '26':
  - type: text
    content: 'Ezri the son of Chelub was in charge of those who did the work of the field, tilling the soil. '
  '27':
  - type: text
    content: 'Shimei the Ramathite was in charge of the vineyards; Zabdi the Shiphmite was in charge of the produce of the vineyards for the wine cellars. '
  '28':
  - type: text
    content: 'Baal-hanan the Gederite was in charge of the olive and '
  - type: note
    content: This tree, ficus sycomorus, is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.
  - type: text
    content: 'sycamore trees in Shephelah (the lowlands); and Joash was in charge of the stores of [olive] oil. '
  '29':
  - type: text
    content: 'Shitrai the Sharonite was in charge of the cattle grazing in Sharon; Shaphat the son of Adlai was in charge of the cattle in the valleys. '
  '3':
  - type: text
    content: He was
  - type: text
    content: ' descended from Perez, '
  - type: text
    content: and was
  - type: text
    content: ' chief of all the commanders of the army for the first month. '
  '30':
  - type: text
    content: 'Obil the Ishmaelite was in charge of the camels; and Jehdeiah the Meronothite was in charge of the donkeys. '
  '31':
  - type: text
    content: 'Jaziz the Hagrite was in charge of the flocks. All these were overseers '
  - type: text
    content: and
  - type: text
    content: ' stewards of the property which belonged to King David.'
  - type: heading
    content: Counselors
  '32':
  - type: text
    content: 'Also Jonathan, David’s uncle, was a counselor '
  - type: text
    content: and
  - type: text
    content: ' advisor, a man of understanding '
  - type: text
    content: and
  - type: text
    content: ' wisdom, and a scribe; and Jehiel the son of Hachmoni attended (tutored) the king’s sons. [2 Kin 10:6] '
  '33':
  - type: text
    content: 'Ahithophel was counselor to the king; and Hushai the Archite was the king’s companion '
  - type: text
    content: and
  - type: text
    content: ' friend. '
  '34':
  - type: text
    content: Ahithophel was succeeded by Jehoiada the son of Benaiah and by Abiathar; and Joab was the commander of the king’s army.
  '4':
  - type: text
    content: 'Dodai the Ahohite and his division was in charge of the division for the second month, Mikloth was the chief officer; and in his division were 24,000. '
  '5':
  - type: text
    content: 'The third commander of the army for the third month was Benaiah, the son of Jehoiada the priest, as chief; and in his division were 24,000. '
  '6':
  - type: text
    content: 'This is the Benaiah who was the mighty man of the thirty and was in charge of the thirty; and Ammizabad his son was '
  - type: text
    content: over
  - type: text
    content: ' his division. '
  '7':
  - type: text
    content: 'The fourth, for the fourth month was Asahel the brother of Joab, and Zebadiah his son after him; and in his division were 24,000. '
  '8':
  - type: text
    content: 'The fifth, for the fifth month was the commander Shamhuth the Izrahite; and in his division were 24,000. '
  '9':
  - type: text
    content: 'The sixth, for the sixth month was Ira the son of Ikkesh the Tekoite; and in his division were 24,000. '
