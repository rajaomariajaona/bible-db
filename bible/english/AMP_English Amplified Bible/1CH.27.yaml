document_id: 1CH.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Commanders of the Army
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is the list of the sons (descendants) of Israel, the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ', the commanders of thousands and of hundreds, and their officers who served the king in all matters of the divisions which came in and went out month by month throughout the year, each division '
    - type: usfm
      marker: it
      children:
      - type: text
        text: numbering
    - type: text
      text: ' 24,000:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The seventh, for the seventh month was Helez the Pelonite of the sons of Ephraim; and in his division were 24,000. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The eighth, for the eighth month was Sibbecai the Hushathite of the Zerahites; and in his division were 24,000. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The ninth, for the ninth month was Abiezer of Anathoth, a Benjamite; and in his division were 24,000. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The tenth, for the tenth month was Maharai from Netophah of the Zerahites; and in his division were 24,000. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The eleventh, for the eleventh month was Benaiah the Pirathonite of the sons of Ephraim; and in his division were 24,000. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The twelfth, for the twelfth month was Heldai the Netophathite of Othniel; and in his division were 24,000.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Chief Officers of the Tribes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now in charge of the tribes of Israel [were the following]: chief officer of the Reubenites was Eliezer the son of Zichri; of the Simeonites, Shephatiah the son of Maacah; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'of Levi, Hashabiah the son of Kemuel; of Aaron, Zadok; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'of Judah, Elihu, one of David’s brothers; of Issachar, Omri the son of Michael; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'of Zebulun, Ishmaiah the son of Obadiah; of Naphtali, Jeremoth the son of Azriel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jashobeam the son of Zabdiel was in charge of the first division for the first month; and in his division were 24,000. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'of the Ephraimites, Hoshea the son of Azaziah; of the half-tribe of Manasseh, Joel the son of Pedaiah; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'of the half-tribe of Manasseh in Gilead, Iddo the son of Zechariah; of Benjamin, Jaasiel the son of Abner; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'of Dan, Azarel the son of Jeroham. These were the leaders of the tribes of Israel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But David did not count those twenty years of age and under, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said he would multiply Israel as the stars of heaven. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Joab the son of Zeruiah began a census but did not finish; and because of this, [God’s] wrath came on Israel, and the number was not recorded in the chronicles of King David.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Various Overseers
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Azmaveth the son of Adiel was in charge of the king’s storerooms; and Jonathan the son of Uzziah was in charge of the storehouses in the country, in the cities, in the villages, and in the towers. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ezri the son of Chelub was in charge of those who did the work of the field, tilling the soil. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Shimei the Ramathite was in charge of the vineyards; Zabdi the Shiphmite was in charge of the produce of the vineyards for the wine cellars. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Baal-hanan the Gederite was in charge of the olive and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This tree, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: ficus sycomorus,
        - type: text
          text: ' is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.'
      marker-yv: yv-n
    - type: text
      text: 'sycamore trees in Shephelah (the lowlands); and Joash was in charge of the stores of [olive] oil. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Shitrai the Sharonite was in charge of the cattle grazing in Sharon; Shaphat the son of Adlai was in charge of the cattle in the valleys. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: He was
    - type: text
      text: ' descended from Perez, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and was
    - type: text
      text: ' chief of all the commanders of the army for the first month. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Obil the Ishmaelite was in charge of the camels; and Jehdeiah the Meronothite was in charge of the donkeys. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jaziz the Hagrite was in charge of the flocks. All these were overseers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stewards of the property which belonged to King David.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Counselors
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Also Jonathan, David’s uncle, was a counselor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advisor, a man of understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom, and a scribe; and Jehiel the son of Hachmoni attended (tutored) the king’s sons. [2 Kin 10:6] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ahithophel was counselor to the king; and Hushai the Archite was the king’s companion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' friend. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ahithophel was succeeded by Jehoiada the son of Benaiah and by Abiathar; and Joab was the commander of the king’s army.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dodai the Ahohite and his division was in charge of the division for the second month, Mikloth was the chief officer; and in his division were 24,000. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The third commander of the army for the third month was Benaiah, the son of Jehoiada the priest, as chief; and in his division were 24,000. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This is the Benaiah who was the mighty man of the thirty and was in charge of the thirty; and Ammizabad his son was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' his division. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The fourth, for the fourth month was Asahel the brother of Joab, and Zebadiah his son after him; and in his division were 24,000. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The fifth, for the fifth month was the commander Shamhuth the Izrahite; and in his division were 24,000. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The sixth, for the sixth month was Ira the son of Ikkesh the Tekoite; and in his division were 24,000. '
