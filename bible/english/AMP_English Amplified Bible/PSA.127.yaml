      marker-yv: yv-n
    - type: text
      text: Ascents. Of Solomon.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Unless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' builds the house,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They labor in vain who build it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' guards the city,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The watchman keeps awake in vain. [Ps 121:1, 3, 5]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is vain for you to rise early,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To retire late,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To eat the bread of anxious labors—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He gives [blessings] to His beloved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even in his
    - type: text
      text: ' sleep.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '¶Behold, children are a heritage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gift from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fruit of the womb a reward. [Deut 28:4]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Like arrows in the hand of a warrior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So are the children of one’s youth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: How blessed [happy and fortunate] is the man whose quiver is filled with them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will not be ashamed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they speak with their enemies [in gatherings] at the [city] gate.
