document_id: REV.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lamb and the 144,000 on Mount Zion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I looked, and this is what I saw: the Lamb stood [firmly established] on Mount Zion, and with Him a hundred and forty-four thousand who had His name and His Father’s name inscribed on their foreheads [signifying God’s own possession]. [Joel 2:32] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he too will [have to] drink of the wine of the wrath of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient times it was customary to mix wine with an equal or larger quantity of water to prevent intoxication at ordinary meals. Here, the mixing is ironic because the “wine of the wrath” is to be consumed at full strength.
      marker-yv: yv-n
    - type: text
      text: 'mixed undiluted into the cup of His anger; and he will be tormented with fire and brimstone (flaming sulfur) in the presence of the holy angels and in the presence of the Lamb (Christ). [Gen 19:24; Jer 25:15, 16; Luke 12:9] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the smoke of their torment ascends forever and ever; and they have no rest day and night—those who worship the beast and his image, and whoever receives the mark of his name.” [Is 34:10; Mark 9:48] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is [encouragement for] the steadfast endurance of the saints (God’s people), those who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' keep God’s commandments and their faith in Jesus.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard [the distinct words of] a voice from heaven, saying, “Write, ‘
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the second of the seven promised blessings. See note 1:3.
      marker-yv: yv-n
    - type: text
      text: 'Blessed (happy, prosperous, to be admired) are the dead who die in the Lord from now on!’ ” “Yes, [blessed indeed],” says the Spirit, “so that they may rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have relief from their labors, for their deeds do follow them.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Reapers
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again I looked, and this is what I saw: a white cloud, and sitting on the cloud was One like the Son of Man, with a crown of gold on His head and a sharp sickle [of swift judgment] in His hand. [Dan 7:13, 14; Matt 13:30, 40-42] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And another angel came out of the temple, calling with a loud voice to Him who was sitting upon the cloud, “Put in Your sickle and reap [at once], for the hour to reap [in judgment] has arrived, because the earth’s harvest is fully ripened.” [Joel 3:13] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So He who was sitting on the cloud cast His sickle over the earth, and the earth was reaped (judged).
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then another angel came out of the temple (sanctuary) in heaven, and he also had a sharp sickle. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And another angel came from the altar, the one who has power over fire; and he called with a loud voice to him who had the sharp sickle, saying, “Put in your sharp sickle and reap the clusters of grapes from the vine of the earth, because her grapes are ripe [for judgment].” [Luke 9:54] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the angel swung his sickle to the earth and harvested the grapevine of the earth, and threw the grapes into the great wine press of the wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation of God [as judgment of the rebellious world]. [Is 63:3] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard a voice from heaven, like the sound of great waters and like the rumbling of mighty thunder; and the voice that I heard [seemed like music and] was like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the sound
    - type: text
      text: ' of harpists playing on their harps. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the grapes in
    - type: text
      text: ' the wine press were trampled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crushed outside the city, and blood poured from the wine press, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reaching
    - type: text
      text: ' up to the horses’ bridles, for a distance of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About two hundred miles.
      marker-yv: yv-n
    - type: text
      text: sixteen hundred stadia. [Joel 3:13; Heb 13:12]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they sang a new song before the throne [of God] and before the four living creatures and the elders; and no one could learn the song except the hundred and forty-four thousand who had been purchased (ransomed, redeemed) from the earth. [Rev 7:4-8] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the ones who have not been defiled [by relations] with women, for they are celibate. These are the ones who follow the Lamb wherever He goes. These have been purchased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' redeemed from among men [of Israel] as the first fruits [sanctified and set apart for special service] for God and the Lamb. [Mark 8:34] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No lie was found in their mouth, for they are blameless (spotless, untainted, beyond reproach).
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Angel with the Gospel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw another angel flying in midheaven, with an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This term likely refers to the message of God’s impending righteous judgment and a final call to repentance and faith in the risen Lord.
      marker-yv: yv-n
    - type: text
      text: 'eternal gospel to preach to the inhabitants of the earth, to every nation and tribe and language and people; [Rom 1:1-4; 1 Cor 15:3-5; Gal 1:6, 7] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he said with a loud voice, “Fear God [with awe and reverence], and give Him glory [and honor and praise in worship], because the hour of His judgment has come; [with all your heart] worship Him who created the heaven and the earth, the sea and the springs of water.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Doom for Proud Babylon
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then another angel, a second one, followed, saying, “Fallen, fallen is Babylon the great, she who has made all nations drink the wine of the passion of her immorality [corrupting them with idolatry].” [Is 21:9; Dan 4:30, 31; Rev 17:2]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Doom for Worshipers of the Beast
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then another angel, a third one, followed them, saying with a loud voice, “Whoever worships the beast and his image and receives the mark [of the beast] on his forehead or on his hand, '
