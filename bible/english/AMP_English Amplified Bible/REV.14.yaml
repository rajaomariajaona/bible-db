document_id: REV.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb and the 144,000 on Mount Zion
  - type: text
    content: 'Then I looked, and this is what I saw: the Lamb stood [firmly established] on Mount Zion, and with Him a hundred and forty-four thousand who had His name and His Father’s name inscribed on their foreheads [signifying God’s own possession]. [Joel 2:32] '
  '10':
  - type: text
    content: 'he too will [have to] drink of the wine of the wrath of God, '
  - type: note
    content: In ancient times it was customary to mix wine with an equal or larger quantity of water to prevent intoxication at ordinary meals. Here, the mixing is ironic because the “wine of the wrath” is to be consumed at full strength.
  - type: text
    content: 'mixed undiluted into the cup of His anger; and he will be tormented with fire and brimstone (flaming sulfur) in the presence of the holy angels and in the presence of the Lamb (Christ). [Gen 19:24; Jer 25:15, 16; Luke 12:9] '
  '11':
  - type: text
    content: 'And the smoke of their torment ascends forever and ever; and they have no rest day and night—those who worship the beast and his image, and whoever receives the mark of his name.” [Is 34:10; Mark 9:48] '
  '12':
  - type: text
    content: 'Here is [encouragement for] the steadfast endurance of the saints (God’s people), those who '
  - type: text
    content: habitually
  - type: text
    content: ' keep God’s commandments and their faith in Jesus.'
  '13':
  - type: text
    content: Then I heard [the distinct words of] a voice from heaven, saying, “Write, ‘
  - type: note
    content: This is the second of the seven promised blessings. See note 1:3.
  - type: text
    content: 'Blessed (happy, prosperous, to be admired) are the dead who die in the Lord from now on!’ ” “Yes, [blessed indeed],” says the Spirit, “so that they may rest '
  - type: text
    content: and
  - type: text
    content: ' have relief from their labors, for their deeds do follow them.”'
  - type: heading
    content: The Reapers
  '14':
  - type: text
    content: 'Again I looked, and this is what I saw: a white cloud, and sitting on the cloud was One like the Son of Man, with a crown of gold on His head and a sharp sickle [of swift judgment] in His hand. [Dan 7:13, 14; Matt 13:30, 40-42] '
  '15':
  - type: text
    content: 'And another angel came out of the temple, calling with a loud voice to Him who was sitting upon the cloud, “Put in Your sickle and reap [at once], for the hour to reap [in judgment] has arrived, because the earth’s harvest is fully ripened.” [Joel 3:13] '
  '16':
  - type: text
    content: So He who was sitting on the cloud cast His sickle over the earth, and the earth was reaped (judged).
  '17':
  - type: text
    content: 'Then another angel came out of the temple (sanctuary) in heaven, and he also had a sharp sickle. '
  '18':
  - type: text
    content: 'And another angel came from the altar, the one who has power over fire; and he called with a loud voice to him who had the sharp sickle, saying, “Put in your sharp sickle and reap the clusters of grapes from the vine of the earth, because her grapes are ripe [for judgment].” [Luke 9:54] '
  '19':
  - type: text
    content: 'So the angel swung his sickle to the earth and harvested the grapevine of the earth, and threw the grapes into the great wine press of the wrath '
  - type: text
    content: and
  - type: text
    content: ' indignation of God [as judgment of the rebellious world]. [Is 63:3] '
  '2':
  - type: text
    content: 'And I heard a voice from heaven, like the sound of great waters and like the rumbling of mighty thunder; and the voice that I heard [seemed like music and] was like '
  - type: text
    content: the sound
  - type: text
    content: ' of harpists playing on their harps. '
  '20':
  - type: text
    content: 'And '
  - type: text
    content: the grapes in
  - type: text
    content: ' the wine press were trampled '
  - type: text
    content: and
  - type: text
    content: ' crushed outside the city, and blood poured from the wine press, '
  - type: text
    content: reaching
  - type: text
    content: ' up to the horses’ bridles, for a distance of '
  - type: note
    content: About two hundred miles.
  - type: text
    content: sixteen hundred stadia. [Joel 3:13; Heb 13:12]
  '3':
  - type: text
    content: 'And they sang a new song before the throne [of God] and before the four living creatures and the elders; and no one could learn the song except the hundred and forty-four thousand who had been purchased (ransomed, redeemed) from the earth. [Rev 7:4-8] '
  '4':
  - type: text
    content: 'These are the ones who have not been defiled [by relations] with women, for they are celibate. These are the ones who follow the Lamb wherever He goes. These have been purchased '
  - type: text
    content: and
  - type: text
    content: ' redeemed from among men [of Israel] as the first fruits [sanctified and set apart for special service] for God and the Lamb. [Mark 8:34] '
  '5':
  - type: text
    content: No lie was found in their mouth, for they are blameless (spotless, untainted, beyond reproach).
  - type: heading
    content: The Angel with the Gospel
  '6':
  - type: text
    content: 'Then I saw another angel flying in midheaven, with an '
  - type: note
    content: This term likely refers to the message of God’s impending righteous judgment and a final call to repentance and faith in the risen Lord.
  - type: text
    content: 'eternal gospel to preach to the inhabitants of the earth, to every nation and tribe and language and people; [Rom 1:1-4; 1 Cor 15:3-5; Gal 1:6, 7] '
  '7':
  - type: text
    content: and he said with a loud voice, “Fear God [with awe and reverence], and give Him glory [and honor and praise in worship], because the hour of His judgment has come; [with all your heart] worship Him who created the heaven and the earth, the sea and the springs of water.”
  - type: heading
    content: Doom for Proud Babylon
  '8':
  - type: text
    content: Then another angel, a second one, followed, saying, “Fallen, fallen is Babylon the great, she who has made all nations drink the wine of the passion of her immorality [corrupting them with idolatry].” [Is 21:9; Dan 4:30, 31; Rev 17:2]
  - type: heading
    content: Doom for Worshipers of the Beast
  '9':
  - type: text
    content: 'Then another angel, a third one, followed them, saying with a loud voice, “Whoever worships the beast and his image and receives the mark [of the beast] on his forehead or on his hand, '
