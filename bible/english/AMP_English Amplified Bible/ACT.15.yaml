  '19':
  - type: text
    content: 'Therefore it is my judgment that we do not trouble '
  - type: text
    content: and
  - type: text
    content: ' make it difficult for those who are turning to God among the Gentiles [by putting obstacles in their way], '
  '2':
  - type: text
    content: 'Paul and Barnabas disagreed greatly and debated with them, so it was determined that Paul and Barnabas and some of the others from their group would go up to Jerusalem to the apostles and the elders [and confer with them] concerning this issue. '
  '20':
  - type: text
    content: 'but that we write to them that they are to abstain from '
  - type: note
    content: Lit the pollutions of idols.
  - type: text
    content: 'anything that has been contaminated by [being offered to] idols and from sexual impurity and from [eating the meat of] what has been strangled and from [the consumption of] '
  - type: note
    content: For the OT prohibition against eating blood, and the reasons for it, see Lev 17:10-14. There, in v 13, hunters are instructed to pour out the blood of an animal before eating it.
  - type: text
    content: 'blood. '
  '21':
  - type: text
    content: 'For from ancient generations [the writing of] Moses has been preached in every city, since '
  - type: note
    content: I.e. the first five books of the OT, Gen through Deut.
  - type: text
    content: 'he is read '
  - type: text
    content: aloud
  - type: text
    content: ' in the synagogues every Sabbath.”'
  '22':
  - type: text
    content: 'Then the apostles and the elders, together with the whole church, decided to select some of their men to go to Antioch with Paul and Barnabas—Judas, who was called Barsabbas, and Silas [also called Silvanus, both], leading men among the brothers. '
  '23':
  - type: text
    content: 'With them they sent the following letter:'
  - type: text
    content: “The apostles and the brothers who are the elders, to the brothers and sisters who are from the Gentiles in Antioch, Syria, and Cilicia, Greetings.
  '24':
  - type: text
    content: 'Since we have heard that some of our men have troubled you with '
  - type: text
    content: their
  - type: text
    content: ' teachings, causing distress '
  - type: text
    content: and
  - type: text
    content: ' confusion—men to whom we gave no '
  - type: text
    content: such
  - type: text
    content: ' orders '
  - type: text
    content: or
  - type: text
    content: ' instructions—'
  '25':
  - type: text
    content: it has been decided by us, having met together, to select men and send them to you with our beloved Barnabas and Paul,
  '26':
  - type: text
    content: men who have risked their lives for the name of our Lord Jesus Christ.
  '27':
  - type: text
    content: So we have sent Judas and Silas, who will report by word of mouth the same things [that we decided in our meeting].
  '28':
  - type: text
    content: 'For it seemed good to the Holy Spirit and to us not to place on you any greater burden than these essentials:'
  '29':
  - type: text
    content: that you abstain from things sacrificed to idols, and from [consuming] blood, and from [eating the meat of] things that have been strangled, and from sexual impurity. If you keep yourselves from these things, you will do well. Farewell.”
  '3':
  - type: text
    content: 'So, after being supplied '
  - type: text
    content: and
  - type: text
    content: ' sent on their way by the church, they went through both Phoenicia and Samaria telling in detail the conversion of the Gentiles, and they brought great joy to all the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers. '
  '30':
  - type: text
    content: 'So when they were sent off, they went down to Antioch; and after assembling the congregation, they delivered the letter. '
  '31':
  - type: text
    content: 'And when they had read it, the people rejoiced greatly at the encouragement '
  - type: text
    content: and
  - type: text
    content: ' comfort [it brought them]. '
  '32':
  - type: text
    content: 'Judas and Silas, who were themselves prophets (divinely inspired spokesmen), encouraged and strengthened the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers with many words. '
  '33':
  - type: text
    content: 'After spending some time there, they were sent back by the brothers with [the greeting of] peace to those who had sent them. '
  '34':
  - type: note
    content: Early mss do not contain this v.
  - type: text
    content: '[However, Silas decided to stay there.] '
  '35':
  - type: text
    content: But Paul and Barnabas remained in Antioch, and with many others also continued teaching and proclaiming the good news, the word of the Lord [concerning eternal salvation through faith in Christ].
  - type: heading
    content: Paul’s Second Missionary Journey
  '36':
  - type: text
    content: 'After some time Paul said to Barnabas, “Let us go back and visit the brothers and sisters (believers) in every city where we preached the message of the Lord, and see how they are doing.” '
  '37':
  - type: text
    content: 'Now Barnabas wanted to take [his cousin] John, who was called Mark, along with them. '
  '38':
  - type: text
    content: 'But Paul kept insisting that they should not take along with them the one who had quit '
  - type: text
    content: and
  - type: text
    content: ' deserted them in Pamphylia and had not gone on with them to the work. '
  '39':
  - type: text
    content: 'And it became such a sharp disagreement that they separated from one another, and Barnabas took [John] Mark with him and sailed away to Cyprus. '
  '4':
  - type: text
    content: 'When they arrived in Jerusalem, they were received warmly by the church and the apostles and the elders, and they reported to them all the things that God had accomplished through them. '
  '40':
  - type: text
    content: 'But Paul chose Silas [who was again in Antioch] and set out [on his second journey], commended by the brothers to the grace '
  - type: text
    content: and
  - type: text
    content: ' favor of the Lord. '
  '41':
  - type: text
    content: And he traveled through Syria and Cilicia, strengthening the churches.
  '5':
  - type: text
    content: But some from the sect of the Pharisees who had believed [in Jesus as the Messiah] stood up and said, “It is necessary to circumcise the Gentile converts and to direct them to observe the Law of Moses.”
  '6':
  - type: text
    content: 'The apostles and the elders came together to consider this matter. '
  '7':
  - type: text
    content: 'After a long debate, Peter got up and said to them, “Brothers, you know that in the early days God made a choice among you, that by my mouth the Gentiles would hear the message of the gospel and believe. '
  '8':
  - type: text
    content: 'And God, who knows '
  - type: text
    content: and
  - type: text
    content: ' understands the heart, testified to them, giving them the Holy Spirit, just as He also did to us; '
  '9':
  - type: text
    content: 'and He made no distinction between us and them, cleansing their hearts by faith [in Jesus]. '
