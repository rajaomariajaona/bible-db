      text: ho has been making these things known from long ago
  - type: text
    text: . [Is 45:21; Jer 12:15; Amos 9:11, 12]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore it is my judgment that we do not trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make it difficult for those who are turning to God among the Gentiles [by putting obstacles in their way], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but that we write to them that they are to abstain from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the pollutions of idols
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'anything that has been contaminated by [being offered to] idols and from sexual impurity and from [eating the meat of] what has been strangled and from [the consumption of] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the OT prohibition against eating blood, and the reasons for it, see Lev 17:10-14. There, in v 13, hunters are instructed to pour out the blood of an animal before eating it.
    marker-yv: yv-n
  - type: text
    text: 'blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For from ancient generations [the writing of] Moses has been preached in every city, since '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the first five books of the OT, Gen through Deut.
    marker-yv: yv-n
  - type: text
    text: 'he is read '
  - type: usfm
    marker: it
    children:
    - type: text
      text: aloud
  - type: text
    text: ' in the synagogues every Sabbath.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the apostles and the elders, together with the whole church, decided to select some of their men to go to Antioch with Paul and Barnabas—Judas, who was called Barsabbas, and Silas [also called Silvanus, both], leading men among the brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'With them they sent the following letter:'
- type: usfm
  marker: lim1
  children:
  - type: text
    text: “The apostles and the brothers who are the elders, to the brothers and sisters who are from the Gentiles in Antioch, Syria, and Cilicia, Greetings.
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Since we have heard that some of our men have troubled you with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' teachings, causing distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confusion—men to whom we gave no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such
  - type: text
    text: ' orders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' instructions—'
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: it has been decided by us, having met together, to select men and send them to you with our beloved Barnabas and Paul,
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: men who have risked their lives for the name of our Lord Jesus Christ.
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So we have sent Judas and Silas, who will report by word of mouth the same things [that we decided in our meeting].
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For it seemed good to the Holy Spirit and to us not to place on you any greater burden than these essentials:'
- type: usfm
  marker: lim1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: that you abstain from things sacrificed to idols, and from [consuming] blood, and from [eating the meat of] things that have been strangled, and from sexual impurity. If you keep yourselves from these things, you will do well. Farewell.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So when they were sent off, they went down to Antioch; and after assembling the congregation, they delivered the letter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And when they had read it, the people rejoiced greatly at the encouragement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comfort [it brought them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Judas and Silas, who were themselves prophets (divinely inspired spokesmen), encouraged and strengthened the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers with many words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'After spending some time there, they were sent back by the brothers with [the greeting of] peace to those who had sent them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Early mss do not contain this v.
    marker-yv: yv-n
  - type: text
    text: '[However, Silas decided to stay there.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But Paul and Barnabas remained in Antioch, and with many others also continued teaching and proclaiming the good news, the word of the Lord [concerning eternal salvation through faith in Christ].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul’s Second Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'After some time Paul said to Barnabas, “Let us go back and visit the brothers and sisters (believers) in every city where we preached the message of the Lord, and see how they are doing.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now Barnabas wanted to take [his cousin] John, who was called Mark, along with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Paul kept insisting that they should not take along with them the one who had quit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserted them in Pamphylia and had not gone on with them to the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And it became such a sharp disagreement that they separated from one another, and Barnabas took [John] Mark with him and sailed away to Cyprus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But Paul chose Silas [who was again in Antioch] and set out [on his second journey], commended by the brothers to the grace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: And he traveled through Syria and Cilicia, strengthening the churches.
