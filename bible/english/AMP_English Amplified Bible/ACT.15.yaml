  - type: heading
    content: The Council at Jerusalem
  - type: text
    content: 'Some men came down from Judea and '
  - type: text
    content: began
  - type: text
    content: ' teaching the brothers, “Unless you are circumcised in accordance with the custom of Moses, you cannot be saved.” [Gen 17:9-14] '
  '10':
  - type: text
    content: 'Now then, why are you testing God by placing a yoke on the neck of the disciples which neither our fathers nor we have been able to endure? '
  '11':
  - type: text
    content: But we believe that we are saved through the [precious, undeserved] grace of the Lord Jesus [which makes us free of the guilt of sin and grants us eternal life], in just the same way as they are.”
  '12':
  - type: text
    content: All the people remained silent, and they listened [attentively] to Barnabas and Paul as they described all the signs and wonders (attesting miracles) that God had done through them among the Gentiles.
  - type: heading
    content: James’ Judgment
  '13':
  - type: text
    content: 'When they had finished speaking, '
  - type: note
    content: Jesus’ half-brother, James, was leader of the church in Jerusalem.
  - type: text
    content: 'James replied, “Brothers, listen to me. '
  '14':
  - type: note
    content: This Greek transliteration of Peter’s Hebrew name is also used in 2 Pet 1:1.
  - type: text
    content: 'Simeon (Simon Peter) has described how God first concerned Himself about taking from among the Gentiles a people for His name [to honor Him and be identified with Him]. '
  '15':
  - type: text
    content: The words of the Prophets agree with this, just as it is written [in Scripture],
