    - type: text
      text: The Council at Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some men came down from Judea and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' teaching the brothers, “Unless you are circumcised in accordance with the custom of Moses, you cannot be saved.” [Gen 17:9-14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Paul and Barnabas disagreed greatly and debated with them, so it was determined that Paul and Barnabas and some of the others from their group would go up to Jerusalem to the apostles and the elders [and confer with them] concerning this issue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So, after being supplied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sent on their way by the church, they went through both Phoenicia and Samaria telling in detail the conversion of the Gentiles, and they brought great joy to all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When they arrived in Jerusalem, they were received warmly by the church and the apostles and the elders, and they reported to them all the things that God had accomplished through them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But some from the sect of the Pharisees who had believed [in Jesus as the Messiah] stood up and said, “It is necessary to circumcise the Gentile converts and to direct them to observe the Law of Moses.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The apostles and the elders came together to consider this matter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'After a long debate, Peter got up and said to them, “Brothers, you know that in the early days God made a choice among you, that by my mouth the Gentiles would hear the message of the gospel and believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And God, who knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understands the heart, testified to them, giving them the Holy Spirit, just as He also did to us; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and He made no distinction between us and them, cleansing their hearts by faith [in Jesus]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now then, why are you testing God by placing a yoke on the neck of the disciples which neither our fathers nor we have been able to endure? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But we believe that we are saved through the [precious, undeserved] grace of the Lord Jesus [which makes us free of the guilt of sin and grants us eternal life], in just the same way as they are.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All the people remained silent, and they listened [attentively] to Barnabas and Paul as they described all the signs and wonders (attesting miracles) that God had done through them among the Gentiles.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: James’ Judgment
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When they had finished speaking, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus’ half-brother, James, was leader of the church in Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'James replied, “Brothers, listen to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Greek transliteration of Peter’s Hebrew name is also used in 2 Pet 1:1.
    marker-yv: yv-n
  - type: text
    text: 'Simeon (Simon Peter) has described how God first concerned Himself about taking from among the Gentiles a people for His name [to honor Him and be identified with Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The words of the Prophets agree with this, just as it is written [in Scripture],
