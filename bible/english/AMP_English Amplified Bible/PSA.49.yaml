document_id: PSA.49,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 49
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Folly of Trusting in Riches.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear this, all peoples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, all inhabitants of the world,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶For he sees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that even
    - type: text
      text: ' wise men die;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fool and the stupid alike perish
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leave their wealth to others. [Eccl 2:12-16]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their inward thought is that their houses will continue forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their dwelling places to all generations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have named their lands after their own names [ignoring God].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But man, with all his [self] honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pomp, will not endure;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is like the beasts that perish.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶This is the fate of those who are foolishly confident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And of those after them who approve [and are influenced by] their words. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like sheep they are appointed for Sheol (the nether world, the place of the dead);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death will be their shepherd;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the upright shall rule over them in the morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their form '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beauty shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient rabbis read this as “will wear out Sheol,” which also matches the Hebrew, and interpreted it as referring to unending punishment, i.e. punishment even outlasting Gehinnom (hell).
      marker-yv: yv-n
    - type: text
      text: be for Sheol to consume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they have no dwelling [on earth].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God will redeem my life from the power of Sheol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He will receive me. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Be not afraid when [an ungodly] man becomes rich,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the wealth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of his house are increased;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when he dies he will carry nothing away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His glory will not descend after him.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though while he lives he counts himself happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperous—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And though people praise you when you do well for yourself—
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall go to the generation of his fathers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall never again see the light.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both low and high,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rich and poor together:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man [who is held] in honor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet who lacks [spiritual] understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a teachable heart, is like the beasts that perish.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mouth will speak wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the meditation of my heart will be understanding.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will incline my ear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consent to a proverb;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the lyre I will unfold my riddle.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Why should I fear in the days of evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the wickedness of those who would betray me surrounds me [on every side],
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even those who trust in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rely on their wealth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And boast of the abundance of their riches?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: None of them can by any means redeem [either himself or] his brother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor give to God a ransom for him—
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the ransom of his soul is too costly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he should cease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trying
    - type: text
      text: ' forever—'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that he should live on eternally,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That he should never see the pit (grave) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undergo decay.'
