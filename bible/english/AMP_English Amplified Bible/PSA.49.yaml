document_id: PSA.49,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 49
  - type: heading
    content: The Folly of Trusting in Riches.
  - type: text
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: Hear this, all peoples;
  - type: text
    content: Listen carefully, all inhabitants of the world,
  '10':
  - type: text
    content: '¶For he sees '
  - type: text
    content: that even
  - type: text
    content: ' wise men die;'
  - type: text
    content: The fool and the stupid alike perish
  - type: text
    content: And leave their wealth to others. [Eccl 2:12-16]
  '11':
  - type: text
    content: Their inward thought is that their houses will continue forever,
  - type: text
    content: And their dwelling places to all generations;
  - type: text
    content: They have named their lands after their own names [ignoring God].
  '12':
  - type: text
    content: 'But man, with all his [self] honor '
  - type: text
    content: and
  - type: text
    content: ' pomp, will not endure;'
  - type: text
    content: He is like the beasts that perish.
  '13':
  - type: text
    content: ¶This is the fate of those who are foolishly confident,
  - type: text
    content: 'And of those after them who approve [and are influenced by] their words. '
  - type: text
    content: Selah.
  '14':
  - type: text
    content: Like sheep they are appointed for Sheol (the nether world, the place of the dead);
  - type: text
    content: Death will be their shepherd;
  - type: text
    content: And the upright shall rule over them in the morning,
  - type: text
    content: 'And their form '
  - type: text
    content: and
  - type: text
    content: ' beauty shall '
  - type: note
    content: The ancient rabbis read this as “will wear out Sheol,” which also matches the Hebrew, and interpreted it as referring to unending punishment, i.e. punishment even outlasting Gehinnom (hell).
  - type: text
    content: be for Sheol to consume,
  - type: text
    content: So that they have no dwelling [on earth].
  '15':
  - type: text
    content: But God will redeem my life from the power of Sheol,
  - type: text
    content: 'For He will receive me. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: ¶Be not afraid when [an ungodly] man becomes rich,
  - type: text
    content: 'When the wealth '
  - type: text
    content: and
  - type: text
    content: ' glory of his house are increased;'
  '17':
  - type: text
    content: For when he dies he will carry nothing away;
  - type: text
    content: His glory will not descend after him.
  '18':
  - type: text
    content: 'Though while he lives he counts himself happy '
  - type: text
    content: and
  - type: text
    content: ' prosperous—'
  - type: text
    content: And though people praise you when you do well for yourself—
  '19':
  - type: text
    content: He shall go to the generation of his fathers;
  - type: text
    content: They shall never again see the light.
  '2':
  - type: text
    content: Both low and high,
  - type: text
    content: 'Rich and poor together:'
  '20':
  - type: text
    content: A man [who is held] in honor,
  - type: text
    content: 'Yet who lacks [spiritual] understanding '
  - type: text
    content: and
  - type: text
    content: ' a teachable heart, is like the beasts that perish.'
  '3':
  - type: text
    content: My mouth will speak wisdom,
  - type: text
    content: And the meditation of my heart will be understanding.
  '4':
  - type: text
    content: 'I will incline my ear '
  - type: text
    content: and
  - type: text
    content: ' consent to a proverb;'
  - type: text
    content: On the lyre I will unfold my riddle.
  '5':
  - type: text
    content: ¶Why should I fear in the days of evil,
  - type: text
    content: When the wickedness of those who would betray me surrounds me [on every side],
  '6':
  - type: text
    content: 'Even those who trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on their wealth'
  - type: text
    content: And boast of the abundance of their riches?
  '7':
  - type: text
    content: None of them can by any means redeem [either himself or] his brother,
  - type: text
    content: Nor give to God a ransom for him—
  '8':
  - type: text
    content: For the ransom of his soul is too costly,
  - type: text
    content: 'And he should cease '
  - type: text
    content: trying
  - type: text
    content: ' forever—'
  '9':
  - type: text
    content: So that he should live on eternally,
  - type: text
    content: 'That he should never see the pit (grave) '
  - type: text
    content: and
  - type: text
    content: ' undergo decay.'
