document_id: PSA.108,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 108
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise and Supplication to God for Victory.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, my heart is steadfast [with confident faith];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing, I will sing praises, even with my soul.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Who will bring me into the fortified city [of Petra]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will lead me to Edom?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Have You not rejected us, O God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will You not go out, O God, with our armies?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Give us help against the adversary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For deliverance by man is in vain [a worthless hope].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: In
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Through
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: With God we will do valiantly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is He who will trample down our enemies. [Ps 60:5-12]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Awake, harp and lyre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will awaken the dawn!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', among the people;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will sing praises to You among the nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For Your lovingkindness is great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' higher than the heavens;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reaches
    - type: text
      text: ' to the skies. [Ps 57:7-11]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Be exalted [in majesty], O God, above the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your glory above all the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: That Your beloved [ones] may be rescued,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save with Your right hand, and answer me!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶God has spoken in His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sanctuary
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'holiness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will rejoice, I will portion out Shechem [as I divide Canaan among My people],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And measure out the Valley of Succoth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Gilead is Mine, Manasseh is Mine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim also is the helmet of My head [My stronghold, My defense];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judah is My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: lawgiver
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: scepter. [Gen 49:10]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Moab is My washbowl;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over Edom I will throw My shoe [to show Edom is Mine];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over Philistia I will shout [in triumph].”
