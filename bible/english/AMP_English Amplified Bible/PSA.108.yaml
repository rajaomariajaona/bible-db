  '1':
  - type: heading
    content: Psalm 108
  - type: heading
    content: Praise and Supplication to God for Victory.
  - type: text
    content: A Song. A Psalm of David.
  - type: text
    content: O God, my heart is steadfast [with confident faith];
  - type: text
    content: I will sing, I will sing praises, even with my soul.
  '10':
  - type: text
    content: ¶Who will bring me into the fortified city [of Petra]?
  - type: text
    content: Who will lead me to Edom?
  '11':
  - type: text
    content: Have You not rejected us, O God?
  - type: text
    content: And will You not go out, O God, with our armies?
  '12':
  - type: text
    content: Give us help against the adversary,
  - type: text
    content: For deliverance by man is in vain [a worthless hope].
  '13':
  - type: text
    content: ' '
  - type: note
    content: Or In or Through.
  - type: text
    content: With God we will do valiantly,
  - type: text
    content: For it is He who will trample down our enemies. [Ps 60:5-12]
  '2':
  - type: text
    content: Awake, harp and lyre;
  - type: text
    content: I will awaken the dawn!
  '3':
  - type: text
    content: 'I will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O L'
  - type: heading
    content: ord
  - type: text
    content: ', among the people;'
  - type: text
    content: And I will sing praises to You among the nations.
  '4':
  - type: text
    content: 'For Your lovingkindness is great '
  - type: text
    content: and
  - type: text
    content: ' higher than the heavens;'
  - type: text
    content: 'Your truth '
  - type: text
    content: reaches
  - type: text
    content: ' to the skies. [Ps 57:7-11]'
  '5':
  - type: text
    content: Be exalted [in majesty], O God, above the heavens,
  - type: text
    content: And Your glory above all the earth.
  '6':
  - type: text
    content: That Your beloved [ones] may be rescued,
  - type: text
    content: Save with Your right hand, and answer me!
  '7':
  - type: text
    content: '¶God has spoken in His '
  - type: note
    content: Or sanctuary.
  - type: text
    content: 'holiness:'
  - type: text
    content: “I will rejoice, I will portion out Shechem [as I divide Canaan among My people],
  - type: text
    content: And measure out the Valley of Succoth.
  '8':
  - type: text
    content: “Gilead is Mine, Manasseh is Mine;
  - type: text
    content: Ephraim also is the helmet of My head [My stronghold, My defense];
  - type: text
    content: 'Judah is My '
  - type: note
    content: Or lawgiver.
  - type: text
    content: scepter. [Gen 49:10]
  '9':
  - type: text
    content: “Moab is My washbowl;
  - type: text
    content: Over Edom I will throw My shoe [to show Edom is Mine];
  - type: text
    content: Over Philistia I will shout [in triumph].”
