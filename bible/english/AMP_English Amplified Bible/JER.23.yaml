document_id: JER.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'The Coming Messiah: the Righteous Branch'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Woe to the shepherds (civil leaders, rulers) who are destroying and scattering the sheep of My pasture!” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, in regard to the shepherds who care for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feed My people: “You have scattered My flock and driven them away, and have not attended to them; hear this, I am about to visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attend to you for the evil of your deeds,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Then I will gather the remnant of My flock out of all the countries to which I have driven them and bring them back to their folds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pastures; and they will be fruitful and multiply. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will set up shepherds over them who will feed them. And they will not be afraid any longer, nor be terrified, nor will any be missing,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶“Behold (listen closely), the days are coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I will raise up for David a righteous Branch;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will reign as King and act wisely
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will do [those things that accomplish] justice and righteousness in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “In His days Judah will be saved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel will dwell safely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now this is His name by which He will be called;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Our Righteousness.’ [Matt 1:21-23; Rom 3:22]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Therefore behold, the days are coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “when they will no longer say, ‘As the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, who brought up the children of Israel from the land of Egypt,’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: but [they will say], ‘As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, who brought up and led back the descendants of the house of Israel from the north country and from all the countries to which I had driven them.’ Then they will live in their own land.” [Jer 16:14, 15]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: False Prophets Denounced
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶Concerning the prophets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart [says Jeremiah] is broken within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All my bones shake;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have become like a drunken man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A man whom wine has overcome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because of His holy words [declared against unfaithful leaders].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the land is full of adulterers (unfaithful to God);
- type: usfm
  marker: q1
  children:
  - type: text
    text: The land mourns because of the curse [of God upon it].
- type: usfm
  marker: q1
  children:
  - type: text
    text: The pastures of the wilderness have dried up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The course of action [of the false prophets] is evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they rush into wickedness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their power is not right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “For both [false] prophet and priest are ungodly (profane, polluted);
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even in My house I have found their wickedness,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Therefore their way will be to them like slippery paths
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the dark; they will be pushed and fall into them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will bring disaster on them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the year of their punishment,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '¶“And I have seen a foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an offensive thing in the prophets of Samaria:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They prophesied by Baal and caused My people Israel to go astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Also I have seen a horrible thing in the prophets of Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They commit adultery and walk in lies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They encourage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen the hands of evildoers,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that no one has turned back from his wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them have become like Sodom to Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her inhabitants like Gomorrah.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts in regard to the prophets,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Behold, I am going to feed them [the bitterness of] wormwood
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make them drink the poisonous water [of gall],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For from the [counterfeit] prophets of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Profaneness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ungodliness have spread into all the land.’ ”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not listen to the words of the [false] prophets who prophesy to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are teaching you worthless things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are leading you into futility;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They speak a vision of their own mind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' imagination'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And not [truth] from the mouth of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “They are continually saying to those who despise Me [and My word],
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The Lord has said, “You will have peace” ’;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they say to everyone who walks after the stubbornness of his own heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘No evil will come on you.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But who [among them] has stood in the council of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: That he would perceive and hear His word?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has marked His word [noticing and observing and paying attention to it] and has [actually] heard it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Behold, the tempest of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has gone forth in wrath,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A whirling tempest;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It will whirl '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burst on the heads of the wicked.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “The anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will not turn back'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until He has set in motion and accomplished the thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intentions of His heart;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the last days you will clearly understand it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “I did not send [these counterfeit] prophets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet they ran;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I did not speak to them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet they prophesied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “But if they had stood in My council,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they would have caused My people to hear My words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they would have turned My people from their evil way
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And from the evil of their decisions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶“Am I a God who is at hand,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “And not a God far away?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Can anyone hide himself in secret places
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that I cannot see him?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do I not fill heaven and earth?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“I have heard what the prophets have said who prophesy lies in My Name, saying, ‘I have dreamed, I have dreamed [visions when on my bed at night].’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'How long [shall this state of affairs continue]? Is there anything in the hearts of the prophets who prophesy falsehood, even these prophets of the deception of their own heart, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'who think that they can make My people forget My Name by their [contrived] dreams which each one tells another, just as their fathers forgot My Name because of Baal? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The prophet who has a dream may tell his dream; but he who has My word, let him speak My word faithfully. What has straw in common with wheat [for nourishment]?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Is not My word like fire [that consumes all that cannot endure the test]?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “and like a hammer that breaks the [most stubborn] rock [in pieces]? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Therefore behold (hear this), I am against the [counterfeit] prophets,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “[I am descending on them with punishment, these prophets] who steal My words from one another [imitating the words of the true prophets]. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Hear this, I am against the prophets,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “who use their [own deceitful] tongues and say, ‘Thus says '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Lord.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hear this, I am against those who have prophesied false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made-up dreams,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “and have told them and have made My people err '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go astray by their lies and by their reckless boasting; yet I did not send them or command them nor do they benefit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enhance [the life of] these people in the slightest way,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“Now when this people or a prophet or a priest asks you [in jest], ‘What is the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the true prophet of God is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: oracle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [the burden to be lifted up and carried]?’ Then you shall say to them, ‘What oracle [besides the one that declares you people to be the burden]!’ The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says, ‘I will unburden Myself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I will abandon you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And as for the prophet, the priest, or [any of] the people, whoever says, ‘The oracle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ',’ [as if he knows God’s will], I will punish that man and his household. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '[For the future, in speaking of the words of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] thus each of you shall say to his neighbor and to his brother, ‘What has the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered?’ or, ‘What has the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoken?’ '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: For you will no longer remember the oracle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', because every man’s own word will become the oracle, [for as they mockingly call all prophecies oracles, whether good or bad, so will it prove to be to them; God will take them at their own word]; and you have perverted the words [not of a lifeless idol, but] of the living God, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, our God. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Thus you will [reverently] say to the prophet, ‘What has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered you?’ and, ‘What has the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoken?’ '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: For if you say, ‘The oracle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!’ surely thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Because you said this word, “The oracle of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!” when I have also sent to you, saying, “You shall not say, ‘The oracle of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!’ ” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Therefore behold, I, even I, will assuredly forget you and send you away from My presence, you and the city (Jerusalem) which I gave to you and to your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And I will bring an everlasting disgrace on you and a perpetual humiliation (shame) which will not be forgotten.”
