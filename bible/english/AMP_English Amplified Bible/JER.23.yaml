document_id: JER.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Coming Messiah: the Righteous Branch'
  - type: text
    content: “Woe to the shepherds (civil leaders, rulers) who are destroying and scattering the sheep of My pasture!” says the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '10':
  - type: text
    content: For the land is full of adulterers (unfaithful to God);
  - type: text
    content: The land mourns because of the curse [of God upon it].
  - type: text
    content: The pastures of the wilderness have dried up.
  - type: text
    content: 'The course of action [of the false prophets] is evil '
  - type: text
    content: and
  - type: text
    content: ' they rush into wickedness;'
  - type: text
    content: And their power is not right.
  '11':
  - type: text
    content: “For both [false] prophet and priest are ungodly (profane, polluted);
  - type: text
    content: Even in My house I have found their wickedness,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '12':
  - type: text
    content: “Therefore their way will be to them like slippery paths
  - type: text
    content: In the dark; they will be pushed and fall into them;
  - type: text
    content: For I will bring disaster on them,
  - type: text
    content: In the year of their punishment,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '13':
  - type: text
    content: '¶“And I have seen a foolish '
  - type: text
    content: and
  - type: text
    content: ' an offensive thing in the prophets of Samaria:'
  - type: text
    content: They prophesied by Baal and caused My people Israel to go astray.
  '14':
  - type: text
    content: '“Also I have seen a horrible thing in the prophets of Jerusalem:'
  - type: text
    content: They commit adultery and walk in lies;
  - type: text
    content: 'They encourage '
  - type: text
    content: and
  - type: text
    content: ' strengthen the hands of evildoers,'
  - type: text
    content: So that no one has turned back from his wickedness.
  - type: text
    content: All of them have become like Sodom to Me,
  - type: text
    content: And her inhabitants like Gomorrah.
  '15':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts in regard to the prophets,'
  - type: text
    content: ‘Behold, I am going to feed them [the bitterness of] wormwood
  - type: text
    content: And make them drink the poisonous water [of gall],
  - type: text
    content: For from the [counterfeit] prophets of Jerusalem
  - type: text
    content: 'Profaneness '
  - type: text
    content: and
  - type: text
    content: ' ungodliness have spread into all the land.’ ”'
  '16':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “Do not listen to the words of the [false] prophets who prophesy to you.
  - type: text
    content: 'They are teaching you worthless things '
  - type: text
    content: and
  - type: text
    content: ' are leading you into futility;'
  - type: text
    content: 'They speak a vision of their own mind '
  - type: text
    content: and
  - type: text
    content: ' imagination'
  - type: text
    content: And not [truth] from the mouth of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '17':
  - type: text
    content: “They are continually saying to those who despise Me [and My word],
  - type: text
    content: ‘The Lord has said, “You will have peace” ’;
  - type: text
    content: And they say to everyone who walks after the stubbornness of his own heart,
  - type: text
    content: ‘No evil will come on you.’
  '18':
  - type: text
    content: “But who [among them] has stood in the council of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: That he would perceive and hear His word?
  - type: text
    content: Who has marked His word [noticing and observing and paying attention to it] and has [actually] heard it?
  '19':
  - type: text
    content: “Behold, the tempest of the L
  - type: heading
    content: ord
  - type: text
    content: ' has gone forth in wrath,'
  - type: text
    content: A whirling tempest;
  - type: text
    content: 'It will whirl '
  - type: text
    content: and
  - type: text
    content: ' burst on the heads of the wicked.'
  '2':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, in regard to the shepherds who care for '
  - type: text
    content: and
  - type: text
    content: ' feed My people: “You have scattered My flock and driven them away, and have not attended to them; hear this, I am about to visit '
  - type: text
    content: and
  - type: text
    content: ' attend to you for the evil of your deeds,” says the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '20':
  - type: text
    content: “The anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' will not turn back'
  - type: text
    content: 'Until He has set in motion and accomplished the thoughts '
  - type: text
    content: and
  - type: text
    content: ' intentions of His heart;'
  - type: text
    content: In the last days you will clearly understand it.
  '21':
  - type: text
    content: “I did not send [these counterfeit] prophets,
  - type: text
    content: Yet they ran;
  - type: text
    content: I did not speak to them,
  - type: text
    content: Yet they prophesied.
  '22':
  - type: text
    content: “But if they had stood in My council,
  - type: text
    content: Then they would have caused My people to hear My words,
  - type: text
    content: Then they would have turned My people from their evil way
  - type: text
    content: 'And from the evil of their decisions '
  - type: text
    content: and
  - type: text
    content: ' deeds.'
  '23':
  - type: text
    content: ¶“Am I a God who is at hand,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “And not a God far away?”
  '24':
  - type: text
    content: “Can anyone hide himself in secret places
  - type: text
    content: So that I cannot see him?” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: “Do I not fill heaven and earth?” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '25':
  - type: text
    content: '“I have heard what the prophets have said who prophesy lies in My Name, saying, ‘I have dreamed, I have dreamed [visions when on my bed at night].’ '
  '26':
  - type: text
    content: 'How long [shall this state of affairs continue]? Is there anything in the hearts of the prophets who prophesy falsehood, even these prophets of the deception of their own heart, '
  '27':
  - type: text
    content: 'who think that they can make My people forget My Name by their [contrived] dreams which each one tells another, just as their fathers forgot My Name because of Baal? '
  '28':
  - type: text
    content: The prophet who has a dream may tell his dream; but he who has My word, let him speak My word faithfully. What has straw in common with wheat [for nourishment]?” says the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '29':
  - type: text
    content: “Is not My word like fire [that consumes all that cannot endure the test]?” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “and like a hammer that breaks the [most stubborn] rock [in pieces]? '
  '3':
  - type: text
    content: '“Then I will gather the remnant of My flock out of all the countries to which I have driven them and bring them back to their folds '
  - type: text
    content: and
  - type: text
    content: ' pastures; and they will be fruitful and multiply. '
  '30':
  - type: text
    content: Therefore behold (hear this), I am against the [counterfeit] prophets,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “[I am descending on them with punishment, these prophets] who steal My words from one another [imitating the words of the true prophets]. '
  '31':
  - type: text
    content: Hear this, I am against the prophets,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “who use their [own deceitful] tongues and say, ‘Thus says '
  - type: text
    content: the Lord.’
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Hear this, I am against those who have prophesied false '
  - type: text
    content: and
  - type: text
    content: ' made-up dreams,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “and have told them and have made My people err '
  - type: text
    content: and
  - type: text
    content: ' go astray by their lies and by their reckless boasting; yet I did not send them or command them nor do they benefit '
  - type: text
    content: and
  - type: text
    content: ' enhance [the life of] these people in the slightest way,” says the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '33':
  - type: text
    content: '“Now when this people or a prophet or a priest asks you [in jest], ‘What is the '
  - type: note
    content: I.e. an urgent message the true prophet of God is under compulsion to proclaim.
  - type: text
    content: oracle of the L
  - type: heading
    content: ord
  - type: text
    content: ' [the burden to be lifted up and carried]?’ Then you shall say to them, ‘What oracle [besides the one that declares you people to be the burden]!’ The L'
  - type: heading
    content: ord
  - type: text
    content: ' says, ‘I will unburden Myself '
  - type: text
    content: and
  - type: text
    content: ' I will abandon you.’ '
  '34':
  - type: text
    content: And as for the prophet, the priest, or [any of] the people, whoever says, ‘The oracle of the L
  - type: heading
    content: ord
  - type: text
    content: ',’ [as if he knows God’s will], I will punish that man and his household. '
  '35':
  - type: text
    content: '[For the future, in speaking of the words of the L'
  - type: heading
    content: ord
  - type: text
    content: '] thus each of you shall say to his neighbor and to his brother, ‘What has the L'
  - type: heading
    content: ord
  - type: text
    content: ' answered?’ or, ‘What has the L'
  - type: heading
    content: ord
  - type: text
    content: ' spoken?’ '
  '36':
  - type: text
    content: For you will no longer remember the oracle of the L
  - type: heading
    content: ord
  - type: text
    content: ', because every man’s own word will become the oracle, [for as they mockingly call all prophecies oracles, whether good or bad, so will it prove to be to them; God will take them at their own word]; and you have perverted the words [not of a lifeless idol, but] of the living God, the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, our God. '
  '37':
  - type: text
    content: Thus you will [reverently] say to the prophet, ‘What has the L
  - type: heading
    content: ord
  - type: text
    content: ' answered you?’ and, ‘What has the L'
  - type: heading
    content: ord
  - type: text
    content: ' spoken?’ '
  '38':
  - type: text
    content: For if you say, ‘The oracle of the L
  - type: heading
    content: ord
  - type: text
    content: '!’ surely thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', ‘Because you said this word, “The oracle of the L'
  - type: heading
    content: ord
  - type: text
    content: '!” when I have also sent to you, saying, “You shall not say, ‘The oracle of the L'
  - type: heading
    content: ord
  - type: text
    content: '!’ ” ’ '
  '39':
  - type: text
    content: 'Therefore behold, I, even I, will assuredly forget you and send you away from My presence, you and the city (Jerusalem) which I gave to you and to your fathers. '
  '4':
  - type: text
    content: I will set up shepherds over them who will feed them. And they will not be afraid any longer, nor be terrified, nor will any be missing,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '40':
  - type: text
    content: And I will bring an everlasting disgrace on you and a perpetual humiliation (shame) which will not be forgotten.”
  '5':
  - type: text
    content: ¶“Behold (listen closely), the days are coming,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “When I will raise up for David a righteous Branch;
  - type: text
    content: And He will reign as King and act wisely
  - type: text
    content: And will do [those things that accomplish] justice and righteousness in the land.
  '6':
  - type: text
    content: “In His days Judah will be saved,
  - type: text
    content: And Israel will dwell safely;
  - type: text
    content: Now this is His name by which He will be called;
  - type: text
    content: ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' Our Righteousness.’ [Matt 1:21-23; Rom 3:22]'
  '7':
  - type: text
    content: “Therefore behold, the days are coming,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “when they will no longer say, ‘As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives, who brought up the children of Israel from the land of Egypt,’ '
  '8':
  - type: text
    content: but [they will say], ‘As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, who brought up and led back the descendants of the house of Israel from the north country and from all the countries to which I had driven them.’ Then they will live in their own land.” [Jer 16:14, 15]'
  - type: heading
    content: False Prophets Denounced
  '9':
  - type: text
    content: '¶Concerning the prophets:'
  - type: text
    content: My heart [says Jeremiah] is broken within me,
  - type: text
    content: All my bones shake;
  - type: text
    content: I have become like a drunken man,
  - type: text
    content: A man whom wine has overcome,
  - type: text
    content: Because of the L
  - type: heading
    content: ord
  - type: text
    content: And because of His holy words [declared against unfaithful leaders].
