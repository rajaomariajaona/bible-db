    content: The Torment of Separation
  - type: heading
    content: (The Bridegroom)
  - type: text
    content: “I have come into my garden, my sister, my [promised] bride;
  - type: text
    content: 'I have gathered my myrrh along with my balsam '
  - type: text
    content: and
  - type: text
    content: ' spice [from your sweet words].'
  - type: text
    content: I have eaten my honeycomb with my honey;
  - type: text
    content: I have drunk my wine with my milk.
  - type: text
    content: Eat, friends;
  - type: text
    content: Drink and drink deeply, O lovers.” [John 16:33]
  - type: heading
    content: (The Shulammite Bride)
  '10':
  - type: text
    content: ¶“My beloved is exquisitely handsome and ruddy,
  - type: text
    content: Outstanding among ten thousand. [Ps 45:2; John 1:14]
  '11':
  - type: text
    content: '“His head is '
  - type: text
    content: like
  - type: text
    content: ' [precious] gold, pure gold;'
  - type: text
    content: 'His hair is [curly] '
  - type: text
    content: like
  - type: text
    content: ' clusters of dates'
  - type: text
    content: And black as a raven.
  '12':
  - type: text
    content: “His eyes are like doves
  - type: text
    content: Beside streams of water,
  - type: text
    content: Bathed in milk
  - type: text
    content: And reposed in their setting.
  '13':
  - type: text
    content: “His cheeks are like a bed of balsam,
  - type: text
    content: Banks of sweet, fragrant herbs.
  - type: text
    content: His lips are lilies
  - type: text
    content: 'Dripping '
  - type: text
    content: sweet-scented
  - type: text
    content: ' myrrh.'
  '14':
  - type: text
    content: “His hands are rods of gold
  - type: text
    content: Set with beryl;
  - type: text
    content: His abdomen is a figure of carved ivory
  - type: text
    content: Inlaid with sapphires.
  '15':
  - type: text
    content: “His legs are [strong and steady] pillars of alabaster
  - type: text
    content: Set upon pedestals of fine gold.
  - type: text
    content: His appearance is like Lebanon,
  - type: text
    content: 'Stately '
  - type: text
    content: and
  - type: text
    content: ' choice as the cedars.'
  '16':
  - type: text
    content: '“His mouth is '
  - type: text
    content: full of
  - type: text
    content: ' sweetness;'
  - type: text
    content: 'Yes, he is altogether lovely '
  - type: text
    content: and
  - type: text
    content: ' desirable.'
  - type: text
    content: This is my beloved and this is my friend,
  - type: text
    content: O daughters of Jerusalem.” [Ps 92:15; Col 1:15]
  '2':
  - type: text
    content: ¶“I was asleep, but my heart was awake.
  - type: text
    content: 'A voice [in my dream]! My beloved was knocking:'
  - type: text
    content: ‘Open to me, my sister, my darling,
  - type: text
    content: My dove, my perfect one!
  - type: text
    content: For my head is drenched with the [heavy night] dew;
  - type: text
    content: My hair [is covered] with the dampness of the night.’ [Job 11:13-15]
  '3':
  - type: text
    content: “I had taken off my dress,
  - type: text
    content: 'How can I put it on '
  - type: text
    content: again?
  - type: text
    content: I had washed my feet,
  - type: text
    content: 'How could I get them dirty '
  - type: text
    content: again?
  - type: text
    content: ' [Is 32:9; Heb 3:15]'
  '4':
  - type: text
    content: “My beloved extended his hand through the opening [of the door],
  - type: text
    content: And my feelings were aroused for him.
  '5':
  - type: text
    content: “I arose to open for my beloved;
  - type: text
    content: And my hands dripped with myrrh,
  - type: text
    content: And my fingers with liquid [sweet-scented] myrrh,
  - type: text
    content: On the handles of the bolt.
  '6':
  - type: text
    content: “I opened for my beloved,
  - type: text
    content: But my beloved had turned away and was gone.
  - type: text
    content: 'My heart went out '
  - type: text
    content: to him
  - type: text
    content: ' when he spoke.'
  - type: text
    content: I searched for him, but I could not find him;
  - type: text
    content: I called him, but he did not answer me.
  '7':
  - type: text
    content: “The watchmen who make the rounds in the city found me.
  - type: text
    content: They struck me, they wounded me;
  - type: text
    content: The guardsmen of the walls took my shawl from me.
  '8':
  - type: text
    content: “I command that you take an oath, O daughters of Jerusalem,
  - type: text
    content: If you find my beloved,
  - type: text
    content: As to what you tell him—
  - type: text
    content: '[Say that] I am sick from love [sick from being without him].” [Ps 63:1]'
  - type: heading
    content: (The Chorus)
  '9':
  - type: text
    content: ¶“What is your beloved more than another beloved,
  - type: text
    content: O most beautiful among women?
  - type: text
    content: What is your beloved more than another beloved,
  - type: text
    content: That you should so command us to take an oath?” [John 10:26]
  - type: heading
    content: Admiration by the Bride
  - type: heading
    content: (The Shulammite Bride)
