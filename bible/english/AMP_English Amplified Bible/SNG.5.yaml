document_id: SNG.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Torment of Separation
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Bridegroom)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have come into my garden, my sister, my [promised] bride;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have gathered my myrrh along with my balsam '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spice [from your sweet words].'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have eaten my honeycomb with my honey;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have drunk my wine with my milk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eat, friends;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drink and drink deeply, O lovers.” [John 16:33]
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“My beloved is exquisitely handsome and ruddy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Outstanding among ten thousand. [Ps 45:2; John 1:14]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“His head is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' [precious] gold, pure gold;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His hair is [curly] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' clusters of dates'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And black as a raven.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His eyes are like doves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beside streams of water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bathed in milk
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And reposed in their setting.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His cheeks are like a bed of balsam,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Banks of sweet, fragrant herbs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His lips are lilies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dripping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sweet-scented
    - type: text
      text: ' myrrh.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His hands are rods of gold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set with beryl;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His abdomen is a figure of carved ivory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Inlaid with sapphires.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His legs are [strong and steady] pillars of alabaster
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set upon pedestals of fine gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His appearance is like Lebanon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Stately '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' choice as the cedars.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“His mouth is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: full of
    - type: text
      text: ' sweetness;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, he is altogether lovely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desirable.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is my beloved and this is my friend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O daughters of Jerusalem.” [Ps 92:15; Col 1:15]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“I was asleep, but my heart was awake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A voice [in my dream]! My beloved was knocking:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Open to me, my sister, my darling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My dove, my perfect one!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my head is drenched with the [heavy night] dew;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My hair [is covered] with the dampness of the night.’ [Job 11:13-15]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I had taken off my dress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How can I put it on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I had washed my feet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How could I get them dirty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again?
    - type: text
      text: ' [Is 32:9; Heb 3:15]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My beloved extended his hand through the opening [of the door],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my feelings were aroused for him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I arose to open for my beloved;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my hands dripped with myrrh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my fingers with liquid [sweet-scented] myrrh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the handles of the bolt.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I opened for my beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my beloved had turned away and was gone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart went out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to him
    - type: text
      text: ' when he spoke.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I searched for him, but I could not find him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I called him, but he did not answer me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The watchmen who make the rounds in the city found me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They struck me, they wounded me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The guardsmen of the walls took my shawl from me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I command that you take an oath, O daughters of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you find my beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As to what you tell him—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Say that] I am sick from love [sick from being without him].” [Ps 63:1]'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Chorus)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“What is your beloved more than another beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O most beautiful among women?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is your beloved more than another beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you should so command us to take an oath?” [John 10:26]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Admiration by the Bride
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
