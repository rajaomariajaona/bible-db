document_id: JER.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Ruined Waistband
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Go and buy yourself a linen waistband and put it on your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The midsection of the body between the lower ribs and the hips.
      marker-yv: yv-n
    - type: text
      text: 'loins, but do not put it in water.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' malevolent people, who refuse to listen to My words, who walk in the stubborn way of their heart and have followed other gods [which are nothing—just man-made carvings] to serve them and to worship them, let them be just like this waistband which is completely worthless. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For as the waistband clings to the body of a man, so I caused the whole house of Israel and the whole house of Judah to cling to Me,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘that they might be for Me a people, a name, a praise, and a glory; but they did not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey.’'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Captivity Threatened
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Therefore you are to speak this word to them, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, “Every jar should be filled with wine.” ’ The people will say to you, ‘Do we not already know that every jar should be filled with wine?’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then say to them, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Behold, I am about to fill with drunkenness all the people of this land, even the kings who sit on David’s throne, the priests, the prophets and all the people of Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will smash them one against another, both the fathers and the sons together,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . “I shall destroy them [nothing will restrain Me]; I will not show pity nor be sorry nor have compassion.” ’ ”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Listen and pay close attention, do not be haughty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overconfident,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken [says Jeremiah].'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give glory to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before He brings darkness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And before your feet stumble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On the dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shadowy mountains,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And while you are longing for light
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turns it into the shadow of death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes it into thick darkness.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But if you will not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul will weep in secret for your pride;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes will weep bitterly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And flow with tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' flock has been taken captive.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to the king and the queen mother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Humble yourselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take a lowly seat,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your beautiful crown [the crown of your glory]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has come down from your head.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cities of the South (the Negev) have been closed up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no one to open them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All Judah has been carried into exile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Completely carried away into exile.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I bought the waistband according to the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and put it on my loins. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Lift up your eyes and see
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those coming from the north.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is the flock that was given to you [to shepherd],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your beautiful flock?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What will you say [O Jerusalem] when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' appoints [foreign nations to rule] over you—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those former friends and allies whom you have encouraged [to be your companions]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will not pain seize you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like [that of] a woman in childbirth?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And if you [wonder and] say in your heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Why have these things happened to me?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is because of the greatness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nature of your sin'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That your skirts have been '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Using the expression for the violation of a woman, the writer describes how the Babylonians would deal with Judah.
      marker-yv: yv-n
    - type: text
      text: pulled away [subjecting you to public disgrace]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [like a barefoot slave] your heels have been wounded.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can the Ethiopian change his skin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the leopard his spots?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you also can do good
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who are accustomed to evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' even trained to do it.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore I will scatter you like drifting straw
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Driven away] by the desert wind.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is your destiny, the portion [of judgment] measured to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Me,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you have forgotten Me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And trusted in [pagan] lies [the counterfeit gods, and the pretense of alliance].”
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So I Myself will throw your skirts up over your face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That your shame may be exposed [publicly].
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I have seen your vile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' detestable acts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even your adulteries and your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lustful
    - type: text
      text: ' neighings [after idols],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the lewdness of your prostitution
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the hills in the fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to you, O Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you remain unclean [by ignoring My precepts]?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me a second time, saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Get up and take the waistband that you have bought, which is [wrapped] around your loins, and go to the [river] Euphrates and hide it there in a crevice of the rock.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I went and hid it by the Euphrates, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after many days the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Get up, go to the Euphrates and get the waistband which I commanded you to hide there.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I went to the Euphrates and dug, and I took the waistband from the place where I had hidden it. And behold, the waistband was decayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined; it was completely worthless.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘In this same way I shall destroy the pride of Judah and the great pride of Jerusalem. '
