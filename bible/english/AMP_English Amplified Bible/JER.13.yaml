verses:
  '1':
  - type: heading
    content: The Ruined Waistband
  - type: text
    content: Thus the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Go and buy yourself a linen waistband and put it on your '
  - type: note
    content: The midsection of the body between the lower ribs and the hips.
  - type: text
    content: 'loins, but do not put it in water.” '
  '10':
  - type: text
    content: 'These wicked '
  - type: text
    content: and
  - type: text
    content: ' malevolent people, who refuse to listen to My words, who walk in the stubborn way of their heart and have followed other gods [which are nothing—just man-made carvings] to serve them and to worship them, let them be just like this waistband which is completely worthless. '
  '11':
  - type: text
    content: For as the waistband clings to the body of a man, so I caused the whole house of Israel and the whole house of Judah to cling to Me,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘that they might be for Me a people, a name, a praise, and a glory; but they did not listen '
  - type: text
    content: and
  - type: text
    content: ' obey.’'
  - type: heading
    content: Captivity Threatened
  '12':
  - type: text
    content: “Therefore you are to speak this word to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, “Every jar should be filled with wine.” ’ The people will say to you, ‘Do we not already know that every jar should be filled with wine?’ '
  '13':
  - type: text
    content: Then say to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I am about to fill with drunkenness all the people of this land, even the kings who sit on David’s throne, the priests, the prophets and all the people of Jerusalem. '
  '14':
  - type: text
    content: I will smash them one against another, both the fathers and the sons together,” says the L
  - type: heading
    content: ord
  - type: text
    content: . “I shall destroy them [nothing will restrain Me]; I will not show pity nor be sorry nor have compassion.” ’ ”
  '15':
  - type: text
    content: '¶Listen and pay close attention, do not be haughty '
  - type: text
    content: and
  - type: text
    content: ' overconfident,'
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken [says Jeremiah].'
  '16':
  - type: text
    content: Give glory to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: Before He brings darkness
  - type: text
    content: And before your feet stumble
  - type: text
    content: 'On the dark '
  - type: text
    content: and
  - type: text
    content: ' shadowy mountains,'
  - type: text
    content: And while you are longing for light
  - type: text
    content: He turns it into the shadow of death,
  - type: text
    content: And makes it into thick darkness.
  '17':
  - type: text
    content: 'But if you will not listen '
  - type: text
    content: and
  - type: text
    content: ' obey,'
  - type: text
    content: My soul will weep in secret for your pride;
  - type: text
    content: My eyes will weep bitterly
  - type: text
    content: And flow with tears,
  - type: text
    content: Because the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' flock has been taken captive.'
  '18':
  - type: text
    content: Say to the king and the queen mother,
  - type: text
    content: '“Humble yourselves '
  - type: text
    content: and
  - type: text
    content: ' take a lowly seat,'
  - type: text
    content: For your beautiful crown [the crown of your glory]
  - type: text
    content: Has come down from your head.”
  '19':
  - type: text
    content: The cities of the South (the Negev) have been closed up,
  - type: text
    content: And there is no one to open them;
  - type: text
    content: All Judah has been carried into exile,
  - type: text
    content: Completely carried away into exile.
  '2':
  - type: text
    content: So I bought the waistband according to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' and put it on my loins. '
  '20':
  - type: text
    content: ¶“Lift up your eyes and see
  - type: text
    content: Those coming from the north.
  - type: text
    content: Where is the flock that was given to you [to shepherd],
  - type: text
    content: Your beautiful flock?
  '21':
  - type: text
    content: “What will you say [O Jerusalem] when the L
  - type: heading
    content: ord
  - type: text
    content: ' appoints [foreign nations to rule] over you—'
  - type: text
    content: Those former friends and allies whom you have encouraged [to be your companions]—
  - type: text
    content: Will not pain seize you
  - type: text
    content: Like [that of] a woman in childbirth?
  '22':
  - type: text
    content: “And if you [wonder and] say in your heart,
  - type: text
    content: ‘Why have these things happened to me?’
  - type: text
    content: 'It is because of the greatness '
  - type: text
    content: and
  - type: text
    content: ' nature of your sin'
  - type: text
    content: 'That your skirts have been '
  - type: note
    content: Using the expression for the violation of a woman, the writer describes how the Babylonians would deal with Judah.
  - type: text
    content: pulled away [subjecting you to public disgrace]
  - type: text
    content: And [like a barefoot slave] your heels have been wounded.
  '23':
  - type: text
    content: “Can the Ethiopian change his skin
  - type: text
    content: Or the leopard his spots?
  - type: text
    content: Then you also can do good
  - type: text
    content: 'Who are accustomed to evil '
  - type: text
    content: and
  - type: text
    content: ' even trained to do it.'
  '24':
  - type: text
    content: “Therefore I will scatter you like drifting straw
  - type: text
    content: '[Driven away] by the desert wind.'
  '25':
  - type: text
    content: “This is your destiny, the portion [of judgment] measured to you
  - type: text
    content: From Me,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Because you have forgotten Me
  - type: text
    content: And trusted in [pagan] lies [the counterfeit gods, and the pretense of alliance].”
  '26':
  - type: text
    content: “So I Myself will throw your skirts up over your face,
  - type: text
    content: That your shame may be exposed [publicly].
  '27':
  - type: text
    content: '“I have seen your vile '
  - type: text
    content: and
  - type: text
    content: ' detestable acts,'
  - type: text
    content: 'Even your adulteries and your '
  - type: text
    content: lustful
  - type: text
    content: ' neighings [after idols],'
  - type: text
    content: And the lewdness of your prostitution
  - type: text
    content: On the hills in the fields.
  - type: text
    content: Woe (judgment is coming) to you, O Jerusalem!
  - type: text
    content: How long will you remain unclean [by ignoring My precepts]?”
  '3':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me a second time, saying, '
  '4':
  - type: text
    content: '“Get up and take the waistband that you have bought, which is [wrapped] around your loins, and go to the [river] Euphrates and hide it there in a crevice of the rock.” '
  '5':
  - type: text
    content: So I went and hid it by the Euphrates, as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded me. '
  '6':
  - type: text
    content: And after many days the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Get up, go to the Euphrates and get the waistband which I commanded you to hide there.” '
  '7':
  - type: text
    content: 'Then I went to the Euphrates and dug, and I took the waistband from the place where I had hidden it. And behold, the waistband was decayed '
  - type: text
    content: and
  - type: text
    content: ' ruined; it was completely worthless.'
  '8':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '9':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘In this same way I shall destroy the pride of Judah and the great pride of Jerusalem. '
