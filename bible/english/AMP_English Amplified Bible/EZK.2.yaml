document_id: EZK.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prophet’s Call
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then He said to me, “Son of man, stand on your feet and I will speak to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then as He spoke to me the Spirit entered me and set me on my feet; and I heard Him speaking to me. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And He said to me, “I am sending you, son of man, to the children of Israel, to a rebellious people [in both the north and the south] that have rebelled against Me; they and their fathers have sinned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revolted against Me to this very day. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I am sending you to them who are stubborn and obstinate children, and you shall say to them, ‘Thus says the Lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH
      - type: text
        text: ', usually rendered L'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '.’ '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As for them, whether they listen or refuse [to listen]—for they are a rebellious house—yet they will know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be fully aware of the fact that there has been a prophet among them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And you, son of man, neither fear them nor fear their words; though briars and thorns are all around you and you sit among scorpions, neither fear their words nor be dismayed at their presence, for they are a rebellious house. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But you shall speak My words to them whether they will listen or refuse [to listen], for they are [most] rebellious.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“As for you, son of man, listen to what I say to you; do not be rebellious like that rebellious house; open your mouth and eat what I am giving you.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then I looked, and I saw a hand stretched out toward me; and behold, a scroll of a book was in it. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And He spread it before me, and it was written on the front and on the back, and written on it were [words of] lamentation (funeral songs) and mourning and woe.
