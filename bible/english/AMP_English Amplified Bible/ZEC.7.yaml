  - type: text
    content: '.). '
  '10':
  - type: text
    content: 'and do not oppress '
  - type: text
    content: or
  - type: text
    content: ' exploit the widow or the fatherless, the stranger or the poor; and do not devise '
  - type: text
    content: or
  - type: text
    content: ' even imagine evil in your hearts against one another.’ '
  '11':
  - type: text
    content: 'But they refused to listen '
  - type: text
    content: and
  - type: text
    content: ' pay attention and turned a stubborn shoulder [stiffening themselves in resistance] and stopped up their ears. '
  '12':
  - type: text
    content: They made their hearts [hard] like flint, so that they could not hear the law and the words which the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts had sent by His Spirit through the former prophets. Therefore great wrath came from the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '13':
  - type: text
    content: And just as He called and they would not listen, so they called and I would not listen,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts; '
  '14':
  - type: text
    content: '“but I scattered them with a storm wind among all the nations whom they have not known. Thus the land was desolate after they had gone, so that no one passed through or returned, for they [by their sins] had made the pleasant land desolate '
  - type: text
    content: and
  - type: text
    content: ' deserted.”'
  '2':
  - type: text
    content: Now the people of Bethel had sent Sharezer and Regem-melech and their men to seek the favor of the L
  - type: heading
    content: ord
  - type: text
    content: ', '
  '3':
  - type: text
    content: speaking to the priests who belong to the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts and to the prophets, saying, “[Now that I am returned from exile] shall I weep in the fifth month [mourning the destruction of the temple], and fast as I have done these many years [in Babylon]?” '
  '4':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts came to me (Zechariah), saying, '
  '5':
  - type: text
    content: '“Speak to all the people of the land and to the priests, saying, ‘When you fasted and mourned in the fifth and seventh months these seventy years [that you were in exile], was it actually for Me that you fasted? '
  '6':
  - type: text
    content: 'When you eat and when you drink, do you not eat for yourselves and do you not drink for yourselves [to satisfy your own needs]? '
  '7':
  - type: text
    content: Should you not hear the words which the L
  - type: heading
    content: ord
  - type: text
    content: ' proclaimed by the former prophets, when Jerusalem was inhabited and prosperous along with her cities around her, and the South (the Negev) and the foothills were inhabited?’ ”'
  '8':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Zechariah, saying, '
  '9':
  - type: text
    content: “Thus has the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts said, ‘Dispense true justice and practice kindness and compassion, to each other; '
