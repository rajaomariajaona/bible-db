    content: Hearts like Flint
  - type: text
    content: In the fourth year of [the reign of] King Darius [of Persia], the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Zechariah on the fourth day of the ninth month, '
  - type: text
    content: which is
  - type: text
    content: ' Chislev (Dec 7, 518 '
  - type: heading
    content: b
  - type: text
    content: .
  - type: heading
