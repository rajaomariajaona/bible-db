document_id: ZEC.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hearts like Flint
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the fourth year of [the reign of] King Darius [of Persia], the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Zechariah on the fourth day of the ninth month, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which is
    - type: text
      text: ' Chislev (Dec 7, 518 '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: b
    - type: text
      text: .
    - type: usfm
      marker: sc
      children:
      - type: text
        text: c
    - type: text
      text: '.). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and do not oppress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' exploit the widow or the fatherless, the stranger or the poor; and do not devise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' even imagine evil in your hearts against one another.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they refused to listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention and turned a stubborn shoulder [stiffening themselves in resistance] and stopped up their ears. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They made their hearts [hard] like flint, so that they could not hear the law and the words which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts had sent by His Spirit through the former prophets. Therefore great wrath came from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And just as He called and they would not listen, so they called and I would not listen,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“but I scattered them with a storm wind among all the nations whom they have not known. Thus the land was desolate after they had gone, so that no one passed through or returned, for they [by their sins] had made the pleasant land desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deserted.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the people of Bethel had sent Sharezer and Regem-melech and their men to seek the favor of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: speaking to the priests who belong to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts and to the prophets, saying, “[Now that I am returned from exile] shall I weep in the fifth month [mourning the destruction of the temple], and fast as I have done these many years [in Babylon]?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts came to me (Zechariah), saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to all the people of the land and to the priests, saying, ‘When you fasted and mourned in the fifth and seventh months these seventy years [that you were in exile], was it actually for Me that you fasted? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you eat and when you drink, do you not eat for yourselves and do you not drink for yourselves [to satisfy your own needs]? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Should you not hear the words which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' proclaimed by the former prophets, when Jerusalem was inhabited and prosperous along with her cities around her, and the South (the Negev) and the foothills were inhabited?’ ”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Zechariah, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus has the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts said, ‘Dispense true justice and practice kindness and compassion, to each other; '
