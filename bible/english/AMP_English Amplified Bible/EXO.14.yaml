document_id: EXO.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pharaoh in Pursuit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Tell the sons of Israel to turn back and camp in front of Pi-hahiroth, between Migdol and the sea. You shall camp in front of Baal-zephon, opposite it, by the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Pharaoh will say of the Israelites, ‘They are wandering aimlessly in the land; the wilderness has shut them in.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will harden (make stubborn, defiant) Pharaoh’s heart, so that he will pursue them; and I will be glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored through Pharaoh and all his army, and the Egyptians shall know [without any doubt] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” And they did so.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the king of Egypt was told that the people had fled, Pharaoh and his servants had a change of heart toward the people, and they said, “What is this that we have done? We have let Israel go from serving us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Pharaoh harnessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: horses to
  - type: text
    text: ' his war-chariots [for battle] and took his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: people
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'army with him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and he took six hundred chosen war-chariots, and all the other war-chariots of Egypt with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or perhaps '
      - type: usfm
        marker: it
        children:
        - type: text
          text: three-man teams
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fighting charioteers over all of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' hardened the heart of Pharaoh, king of Egypt, and he pursued the Israelites, as they were leaving confidently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defiantly. [Acts 13:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Egyptians chased them with all the horses and war-chariots of Pharaoh, his horsemen and his army, and they overtook them as they camped by the sea, beside Pi-hahiroth, in front of Baal-zephon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As Pharaoh approached, the Israelites looked up and saw the Egyptians marching after them, and they were very frightened; so the Israelites cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they said to Moses, “Is it because there are no graves in Egypt that you have taken us away to die in the wilderness? What is this that you have done to us by bringing us out of Egypt? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Did we not say to you in Egypt, ‘Leave us alone; let us serve the Egyptians?’ For it would have been better for us to serve the Egyptians [as slaves] than to die in the wilderness.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sea Is Divided
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Moses said to the people, “Do not be afraid! Take your stand [be firm and confident and undismayed] and see the salvation of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which He will accomplish for you today; for those Egyptians whom you have seen today, you will never see again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will fight for you while you [only need to] keep silent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remain calm.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Why do you cry to Me? Tell the sons of Israel to move forward [toward the sea]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As for you, lift up your staff and stretch out your hand over the sea and divide it, so that the sons of Israel may go through the middle of the sea on dry land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'As for Me, hear this: I will harden the hearts of the Egyptians, and they will go in [the sea] after them; and I will be glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored through Pharaoh and all his army, and his war-chariots and his horsemen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And the Egyptians shall know [without any doubt] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', when I am glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored through Pharaoh, through his war-chariots and his charioteers.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 16:7.
    marker-yv: yv-n
  - type: text
    text: 'angel of God, who had been going in front of the camp of Israel, moved and went behind them. The pillar of the cloud moved from in front and stood behind them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So it came between the camp of Egypt and the camp of Israel. It was a cloud along with darkness [even by day to the Egyptians], but it gave light by night [to the Israelites]; so one [army] did not come near the other all night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Moses stretched out his hand over the sea; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' swept the sea back by a strong east wind all that night and turned the seabed into dry land, and the waters were divided. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The Israelites went into the middle of the sea on dry land, and the waters formed a wall to them on their right hand and on their left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the Egyptians pursued them into the middle of the sea, even all Pharaoh’s horses, his war-chariots and his charioteers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So it happened at the early morning watch [before dawn], that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' looked down on the army of the Egyptians through the pillar of fire and cloud and put them in a state of confusion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He made their chariot wheels hard to turn, and the chariots difficult to drive; so the Egyptians said, “Let us flee from Israel, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is fighting for them against the Egyptians.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Stretch out your hand over the sea so that the waters may come back over the Egyptians, on their war-chariots and their charioteers.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So Moses stretched out his hand over the sea, and the sea returned to its normal flow at sunrise; and the Egyptians retreated right into it [being met by the returning water]; so the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' overthrew the Egyptians '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tossed them into the midst of the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The waters returned and covered the chariots and the charioteers, and all the army of Pharaoh that had gone into the sea after them; not even one of them survived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But the Israelites walked on dry land in the middle of the sea, and the waters formed a wall to them on their right hand and on their left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' saved Israel that day from the hand of the Egyptians, and Israel saw the Egyptians [lying] dead on the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the lip of the sea
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'seashore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: When Israel saw the great power which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had used against the Egyptians, they feared the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with reverence and awe-filled respect], and they believed in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and in His servant Moses.'
