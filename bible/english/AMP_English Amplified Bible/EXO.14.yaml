document_id: EXO.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh in Pursuit
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: As Pharaoh approached, the Israelites looked up and saw the Egyptians marching after them, and they were very frightened; so the Israelites cried out to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Then they said to Moses, “Is it because there are no graves in Egypt that you have taken us away to die in the wilderness? What is this that you have done to us by bringing us out of Egypt? '
  '12':
  - type: text
    content: Did we not say to you in Egypt, ‘Leave us alone; let us serve the Egyptians?’ For it would have been better for us to serve the Egyptians [as slaves] than to die in the wilderness.”
  - type: heading
    content: The Sea Is Divided
  '13':
  - type: text
    content: Then Moses said to the people, “Do not be afraid! Take your stand [be firm and confident and undismayed] and see the salvation of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He will accomplish for you today; for those Egyptians whom you have seen today, you will never see again. '
  '14':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will fight for you while you [only need to] keep silent '
  - type: text
    content: and
  - type: text
    content: ' remain calm.”'
  '15':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Why do you cry to Me? Tell the sons of Israel to move forward [toward the sea]. '
  '16':
  - type: text
    content: 'As for you, lift up your staff and stretch out your hand over the sea and divide it, so that the sons of Israel may go through the middle of the sea on dry land. '
  '17':
  - type: text
    content: 'As for Me, hear this: I will harden the hearts of the Egyptians, and they will go in [the sea] after them; and I will be glorified '
  - type: text
    content: and
  - type: text
    content: ' honored through Pharaoh and all his army, and his war-chariots and his horsemen. '
  '18':
  - type: text
    content: 'And the Egyptians shall know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ', when I am glorified '
  - type: text
    content: and
  - type: text
    content: ' honored through Pharaoh, through his war-chariots and his charioteers.”'
  '19':
  - type: text
    content: 'The '
  - type: note
    content: See note Gen 16:7.
  - type: text
    content: 'angel of God, who had been going in front of the camp of Israel, moved and went behind them. The pillar of the cloud moved from in front and stood behind them. '
  '2':
  - type: text
    content: '“Tell the sons of Israel to turn back and camp in front of Pi-hahiroth, between Migdol and the sea. You shall camp in front of Baal-zephon, opposite it, by the sea. '
  '20':
  - type: text
    content: So it came between the camp of Egypt and the camp of Israel. It was a cloud along with darkness [even by day to the Egyptians], but it gave light by night [to the Israelites]; so one [army] did not come near the other all night.
  '21':
  - type: text
    content: Then Moses stretched out his hand over the sea; and the L
  - type: heading
    content: ord
  - type: text
    content: ' swept the sea back by a strong east wind all that night and turned the seabed into dry land, and the waters were divided. '
  '22':
  - type: text
    content: 'The Israelites went into the middle of the sea on dry land, and the waters formed a wall to them on their right hand and on their left. '
  '23':
  - type: text
    content: 'Then the Egyptians pursued them into the middle of the sea, even all Pharaoh’s horses, his war-chariots and his charioteers. '
  '24':
  - type: text
    content: So it happened at the early morning watch [before dawn], that the L
  - type: heading
    content: ord
  - type: text
    content: ' looked down on the army of the Egyptians through the pillar of fire and cloud and put them in a state of confusion. '
  '25':
  - type: text
    content: He made their chariot wheels hard to turn, and the chariots difficult to drive; so the Egyptians said, “Let us flee from Israel, for the L
  - type: heading
    content: ord
  - type: text
    content: ' is fighting for them against the Egyptians.”'
  '26':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Stretch out your hand over the sea so that the waters may come back over the Egyptians, on their war-chariots and their charioteers.” '
  '27':
  - type: text
    content: So Moses stretched out his hand over the sea, and the sea returned to its normal flow at sunrise; and the Egyptians retreated right into it [being met by the returning water]; so the L
  - type: heading
    content: ord
  - type: text
    content: ' overthrew the Egyptians '
  - type: text
    content: and
  - type: text
    content: ' tossed them into the midst of the sea. '
  '28':
  - type: text
    content: 'The waters returned and covered the chariots and the charioteers, and all the army of Pharaoh that had gone into the sea after them; not even one of them survived. '
  '29':
  - type: text
    content: But the Israelites walked on dry land in the middle of the sea, and the waters formed a wall to them on their right hand and on their left.
  '3':
  - type: text
    content: 'For Pharaoh will say of the Israelites, ‘They are wandering aimlessly in the land; the wilderness has shut them in.’ '
  '30':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' saved Israel that day from the hand of the Egyptians, and Israel saw the Egyptians [lying] dead on the '
  - type: note
    content: Lit the lip of the sea.
  - type: text
    content: 'seashore. '
  '31':
  - type: text
    content: When Israel saw the great power which the L
  - type: heading
    content: ord
  - type: text
    content: ' had used against the Egyptians, they feared the L'
  - type: heading
    content: ord
  - type: text
    content: ' [with reverence and awe-filled respect], and they believed in the L'
  - type: heading
    content: ord
  - type: text
    content: ', and in His servant Moses.'
  '4':
  - type: text
    content: 'I will harden (make stubborn, defiant) Pharaoh’s heart, so that he will pursue them; and I will be glorified '
  - type: text
    content: and
  - type: text
    content: ' honored through Pharaoh and all his army, and the Egyptians shall know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I am the L'
  - type: heading
    content: ord
  - type: text
    content: .” And they did so.
  '5':
  - type: text
    content: 'When the king of Egypt was told that the people had fled, Pharaoh and his servants had a change of heart toward the people, and they said, “What is this that we have done? We have let Israel go from serving us!” '
  '6':
  - type: text
    content: 'So Pharaoh harnessed '
  - type: text
    content: horses to
  - type: text
    content: ' his war-chariots [for battle] and took his '
  - type: note
    content: Lit people.
  - type: text
    content: 'army with him; '
  '7':
  - type: text
    content: 'and he took six hundred chosen war-chariots, and all the other war-chariots of Egypt with '
  - type: note
    content: Or perhaps three-man teams.
  - type: text
    content: 'fighting charioteers over all of them. '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' hardened the heart of Pharaoh, king of Egypt, and he pursued the Israelites, as they were leaving confidently '
  - type: text
    content: and
  - type: text
    content: ' defiantly. [Acts 13:17] '
  '9':
  - type: text
    content: The Egyptians chased them with all the horses and war-chariots of Pharaoh, his horsemen and his army, and they overtook them as they camped by the sea, beside Pi-hahiroth, in front of Baal-zephon.
