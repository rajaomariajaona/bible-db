document_id: JOB.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Says God Seems to Ignore Wrongs
  - type: text
    content: “Why does the Almighty not set seasons for judgment?
  - type: text
    content: Why do those who know Him not see His days [for punishment of the wicked]? [Acts 1:7]
  '10':
  - type: text
    content: '“They cause '
  - type: text
    content: the poor
  - type: text
    content: ' to go about naked without clothing,'
  - type: text
    content: And they take away the sheaves [of grain] from the hungry.
  '11':
  - type: text
    content: “Within the walls [of the wicked] the poor make [olive] oil;
  - type: text
    content: They tread [the grapes in] the wine presses, but thirst.
  '12':
  - type: text
    content: “From the [populous and crowded] city men groan,
  - type: text
    content: And the souls of the wounded cry out for help;
  - type: text
    content: Yet God [seemingly] does not pay attention to the wrong [done to them].
  '13':
  - type: text
    content: ¶“Others have been with those who rebel against the light;
  - type: text
    content: They do not want to know its ways
  - type: text
    content: Nor stay in its paths.
  '14':
  - type: text
    content: “The murderer rises at dawn;
  - type: text
    content: He kills the poor and the needy,
  - type: text
    content: And at night he becomes a thief.
  '15':
  - type: text
    content: “The eye of the adulterer waits for the twilight,
  - type: text
    content: Saying, ‘No eye will see me,’
  - type: text
    content: And he covers his face.
  '16':
  - type: text
    content: “In the dark they dig into [the penetrable walls of] houses;
  - type: text
    content: They shut themselves up by day;
  - type: text
    content: They do not know the light [of day].
  '17':
  - type: text
    content: “For the morning is the same to him as the thick darkness [of midnight];
  - type: text
    content: For he is familiar with the terrors of thick darkness.
  '18':
  - type: text
    content: ¶“They are insignificant on the surface of the water;
  - type: text
    content: Their portion is cursed on the earth;
  - type: text
    content: They do not turn toward the vineyards.
  '19':
  - type: text
    content: “Drought and heat consume the snow waters;
  - type: text
    content: So does
  - type: text
    content: ' Sheol (the nether world, the place of the dead) [consume] '
  - type: text
    content: those who
  - type: text
    content: ' have sinned.'
  '2':
  - type: text
    content: “Some remove the landmarks;
  - type: text
    content: They [violently] seize and pasture flocks [appropriating land and flocks openly].
  '20':
  - type: text
    content: “A mother will forget him;
  - type: text
    content: The worm feeds on him until he is no longer remembered.
  - type: text
    content: And wickedness will be broken like a tree [which cannot be restored]. [Prov 10:7]
  '21':
  - type: text
    content: “He preys on the barren (childless) woman
  - type: text
    content: And does no good for the widow.
  '22':
  - type: text
    content: “Yet God draws away the mighty by His power;
  - type: text
    content: He rises, but no one has assurance of life.
  '23':
  - type: text
    content: “God gives them security, and they are supported;
  - type: text
    content: And His eyes are on their ways.
  '24':
  - type: text
    content: “They are exalted for a little while, and then they are gone;
  - type: text
    content: 'Moreover, they are brought low and like everything [they are] gathered up '
  - type: text
    content: and
  - type: text
    content: ' taken out of the way;'
  - type: text
    content: Even like the heads of grain they are cut off.
  '25':
  - type: text
    content: “And if this is not so, who can prove me a liar
  - type: text
    content: And make my speech worthless?”
  '3':
  - type: text
    content: “They drive away the donkeys of the orphans;
  - type: text
    content: They take the widow’s ox for a pledge.
  '4':
  - type: text
    content: “They crowd the needy off the road;
  - type: text
    content: The poor of the land all hide themselves.
  '5':
  - type: text
    content: “Behold, as wild donkeys in the desert,
  - type: text
    content: The poor go to their work, diligently seeking food;
  - type: text
    content: As bread for their children in the desert.
  '6':
  - type: text
    content: “They harvest their fodder in a field [that is not their own],
  - type: text
    content: And glean the vineyard of the wicked.
  '7':
  - type: text
    content: “They spend the night naked, without clothing,
  - type: text
    content: And have no covering against the cold.
  '8':
  - type: text
    content: “They are wet from the rain of the mountains
  - type: text
    content: And cling to the rock for lack of shelter.
  '9':
  - type: text
    content: “Others snatch the fatherless [infants] from the breast [to sell or make them slaves],
  - type: text
    content: And against the poor they take a pledge [of clothing].
