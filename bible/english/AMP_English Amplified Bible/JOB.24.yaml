document_id: JOB.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says God Seems to Ignore Wrongs
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Why does the Almighty not set seasons for judgment?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do those who know Him not see His days [for punishment of the wicked]? [Acts 1:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Some remove the landmarks;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They [violently] seize and pasture flocks [appropriating land and flocks openly].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “They drive away the donkeys of the orphans;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They take the widow’s ox for a pledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “They crowd the needy off the road;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The poor of the land all hide themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Behold, as wild donkeys in the desert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The poor go to their work, diligently seeking food;
- type: usfm
  marker: q1
  children:
  - type: text
    text: As bread for their children in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “They harvest their fodder in a field [that is not their own],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And glean the vineyard of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “They spend the night naked, without clothing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have no covering against the cold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “They are wet from the rain of the mountains
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cling to the rock for lack of shelter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Others snatch the fatherless [infants] from the breast [to sell or make them slaves],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against the poor they take a pledge [of clothing].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“They cause '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the poor
  - type: text
    text: ' to go about naked without clothing,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they take away the sheaves [of grain] from the hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Within the walls [of the wicked] the poor make [olive] oil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They tread [the grapes in] the wine presses, but thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “From the [populous and crowded] city men groan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the souls of the wounded cry out for help;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet God [seemingly] does not pay attention to the wrong [done to them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“Others have been with those who rebel against the light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not want to know its ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor stay in its paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The murderer rises at dawn;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He kills the poor and the needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And at night he becomes a thief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “The eye of the adulterer waits for the twilight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘No eye will see me,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he covers his face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “In the dark they dig into [the penetrable walls of] houses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shut themselves up by day;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not know the light [of day].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “For the morning is the same to him as the thick darkness [of midnight];
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he is familiar with the terrors of thick darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶“They are insignificant on the surface of the water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their portion is cursed on the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not turn toward the vineyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Drought and heat consume the snow waters;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: So does
  - type: text
    text: ' Sheol (the nether world, the place of the dead) [consume] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those who
  - type: text
    text: ' have sinned.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “A mother will forget him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The worm feeds on him until he is no longer remembered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And wickedness will be broken like a tree [which cannot be restored]. [Prov 10:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “He preys on the barren (childless) woman
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does no good for the widow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Yet God draws away the mighty by His power;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rises, but no one has assurance of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “God gives them security, and they are supported;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His eyes are on their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “They are exalted for a little while, and then they are gone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moreover, they are brought low and like everything [they are] gathered up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken out of the way;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even like the heads of grain they are cut off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “And if this is not so, who can prove me a liar
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make my speech worthless?”
