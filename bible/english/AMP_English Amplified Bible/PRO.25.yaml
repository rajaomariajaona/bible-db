  '23':
  - type: text
    content: The north wind brings forth rain;
  - type: text
    content: And a backbiting tongue, an angry countenance.
  '24':
  - type: text
    content: It is better to live in a corner of the housetop [on the flat roof, exposed to the weather]
  - type: text
    content: Than in a house shared with a quarrelsome (contentious) woman. [Prov 21:9]
  '25':
  - type: text
    content: Like cold water to a thirsty soul,
  - type: text
    content: So is good news from a distant land.
  '26':
  - type: text
    content: Like a muddied fountain and a polluted spring
  - type: text
    content: 'Is a righteous man who yields '
  - type: text
    content: and
  - type: text
    content: ' compromises his integrity before the wicked.'
  '27':
  - type: text
    content: It is not good to eat much honey,
  - type: text
    content: Nor is it glorious to seek one’s own glory.
  '28':
  - type: text
    content: Like a city that is broken down and without walls [leaving it unprotected]
  - type: text
    content: Is a man who has no self-control over his spirit [and sets himself up for trouble]. [Prov 16:32]
  '3':
  - type: text
    content: As the heavens for height and the earth for depth,
  - type: text
    content: 'So the hearts '
  - type: text
    content: and
  - type: text
    content: ' minds of kings are '
  - type: note
    content: The ancient rabbis explained this as a reference to the countless details of government that are a king’s responsibility.
  - type: text
