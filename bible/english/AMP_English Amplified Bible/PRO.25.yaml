  '4':
  - type: text
    content: Take away the dross from the silver,
  - type: text
    content: And there comes out [the pure metal for] a vessel for the silversmith [to shape]. [2 Tim 2:21]
  '5':
  - type: text
    content: Take away the wicked from before the king,
  - type: text
    content: And his throne will be established in righteousness.
  '6':
  - type: text
    content: 'Do not be boastfully ambitious '
  - type: text
    content: and
  - type: text
    content: ' claim honor in the presence of the king,'
  - type: text
    content: And do not stand in the place of great men;
  '7':
  - type: text
    content: For it is better that it be said to you, “Come up here,”
  - type: text
    content: Than for you to be placed lower in the presence of the prince,
  - type: text
    content: Whom your eyes have seen. [Luke 14:8-10]
  '8':
  - type: text
    content: '¶Do not rush out to argue '
  - type: text
    content: your
  - type: text
    content: ' case [before magistrates or judges];'
  - type: text
    content: Otherwise what will you do in the end [when your case is lost and]
  - type: text
    content: When your neighbor (opponent) humiliates you? [Prov 17:14; Matt 5:25]
  '9':
  - type: text
    content: Argue your case with your neighbor himself [before you go to court];
  - type: text
    content: And do not reveal another’s secret, [Matt 18:15]
