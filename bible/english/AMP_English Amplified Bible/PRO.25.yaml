    content: Similitudes, Instructions
  - type: text
    content: 'These are also the proverbs of Solomon, which the men of Hezekiah king of Judah copied: [1 Kin 4:32]'
  '10':
  - type: text
    content: Or he who hears it will shame you
  - type: text
    content: And the rumor about you [and your action in court] will have no end.
  '11':
  - type: text
    content: ¶Like apples of gold in settings of silver
  - type: text
    content: Is a word spoken at the right time. [Prov 15:23; Is 50:4]
  '12':
  - type: text
    content: Like an earring of gold and an ornament of fine gold
  - type: text
    content: 'Is a wise reprover to an ear that listens '
  - type: text
    content: and
  - type: text
    content: ' learns.'
  '13':
  - type: text
    content: Like the cold of snow [brought from the mountains] in the time of harvest,
  - type: text
    content: So is a faithful messenger to those who send him;
  - type: text
    content: For he refreshes the life of his masters.
  '14':
  - type: text
    content: Like clouds and wind without rain
  - type: text
    content: Is a man who boasts falsely of gifts [he does not give]. [Jude 12]
  '15':
  - type: text
    content: 'By patience '
  - type: text
    content: and
  - type: text
    content: ' a calm spirit a ruler may be persuaded,'
  - type: text
    content: 'And a soft '
  - type: text
    content: and
  - type: text
    content: ' gentle tongue breaks the bone [of resistance]. [Gen 32:4; 1 Sam 25:24; Prov 15:1; 16:14]'
  '16':
  - type: text
    content: Have you found [pleasure sweet like] honey? Eat only as much as you need,
  - type: text
    content: Otherwise, being filled excessively, you vomit it.
  '17':
  - type: text
    content: Let your foot seldom be in your neighbor’s house,
  - type: text
    content: Or he will become tired of you and hate you.
  '18':
  - type: text
    content: Like a club and a sword and a piercing arrow
  - type: text
    content: Is a man who testifies falsely against his neighbor (acquaintance).
  '19':
  - type: text
    content: Like a broken tooth or an unsteady foot
  - type: text
    content: Is confidence in an unfaithful man in time of trouble.
  '2':
  - type: text
    content: ¶It is the glory of God to conceal a matter,
  - type: text
    content: But the glory of kings is to search out a matter. [Deut 29:29; Rom 11:33]
  '20':
  - type: text
    content: Like one who takes off a garment in cold weather, or like [a reactive, useless mixture of] vinegar on soda,
  - type: text
    content: Is he who [thoughtlessly] sings [joyful] songs to a heavy heart. [Dan 6:18; Rom 12:15]
  '21':
  - type: text
    content: If your enemy is hungry, give him bread to eat;
  - type: text
    content: And if he is thirsty, give him water to drink; [Matt 5:44; Rom 12:20]
