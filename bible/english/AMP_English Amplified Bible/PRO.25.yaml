document_id: PRO.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Similitudes, Instructions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are also the proverbs of Solomon, which the men of Hezekiah king of Judah copied: [1 Kin 4:32]'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or he who hears it will shame you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rumor about you [and your action in court] will have no end.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Like apples of gold in settings of silver
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a word spoken at the right time. [Prov 15:23; Is 50:4]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an earring of gold and an ornament of fine gold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is a wise reprover to an ear that listens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learns.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the cold of snow [brought from the mountains] in the time of harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is a faithful messenger to those who send him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he refreshes the life of his masters.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like clouds and wind without rain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a man who boasts falsely of gifts [he does not give]. [Jude 12]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By patience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a calm spirit a ruler may be persuaded,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a soft '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gentle tongue breaks the bone [of resistance]. [Gen 32:4; 1 Sam 25:24; Prov 15:1; 16:14]'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you found [pleasure sweet like] honey? Eat only as much as you need,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise, being filled excessively, you vomit it.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your foot seldom be in your neighbor’s house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or he will become tired of you and hate you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a club and a sword and a piercing arrow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a man who testifies falsely against his neighbor (acquaintance).
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a broken tooth or an unsteady foot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is confidence in an unfaithful man in time of trouble.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶It is the glory of God to conceal a matter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the glory of kings is to search out a matter. [Deut 29:29; Rom 11:33]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like one who takes off a garment in cold weather, or like [a reactive, useless mixture of] vinegar on soda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is he who [thoughtlessly] sings [joyful] songs to a heavy heart. [Dan 6:18; Rom 12:15]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your enemy is hungry, give him bread to eat;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if he is thirsty, give him water to drink; [Matt 5:44; Rom 12:20]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For in doing so, you will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This expression may refer to an Egyptian custom in which a penitent man carried a pan of coals on his head as a sign of repentance. The message of these verses is the admonition to return good for evil in the hope that your enemy will be moved to repentance.
      marker-yv: yv-n
    - type: text
      text: heap coals of fire upon his head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will reward you.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The north wind brings forth rain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a backbiting tongue, an angry countenance.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is better to live in a corner of the housetop [on the flat roof, exposed to the weather]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than in a house shared with a quarrelsome (contentious) woman. [Prov 21:9]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like cold water to a thirsty soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is good news from a distant land.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a muddied fountain and a polluted spring
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is a righteous man who yields '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compromises his integrity before the wicked.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is not good to eat much honey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor is it glorious to seek one’s own glory.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a city that is broken down and without walls [leaving it unprotected]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a man who has no self-control over his spirit [and sets himself up for trouble]. [Prov 16:32]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the heavens for height and the earth for depth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So the hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' minds of kings are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient rabbis explained this as a reference to the countless details of government that are a king’s responsibility.
      marker-yv: yv-n
    - type: text
      text: unsearchable.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take away the dross from the silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there comes out [the pure metal for] a vessel for the silversmith [to shape]. [2 Tim 2:21]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take away the wicked from before the king,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his throne will be established in righteousness.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not be boastfully ambitious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' claim honor in the presence of the king,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not stand in the place of great men;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is better that it be said to you, “Come up here,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than for you to be placed lower in the presence of the prince,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom your eyes have seen. [Luke 14:8-10]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Do not rush out to argue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' case [before magistrates or judges];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise what will you do in the end [when your case is lost and]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When your neighbor (opponent) humiliates you? [Prov 17:14; Matt 5:25]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Argue your case with your neighbor himself [before you go to court];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not reveal another’s secret, [Matt 18:15]
