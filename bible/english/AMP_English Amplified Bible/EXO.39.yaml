document_id: EXO.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Priestly Garments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moreover, from the blue and purple and scarlet fabric, they made finely woven garments for serving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ministering in the Holy Place; they made the holy garments for Aaron, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bezalel made the ephod of gold, and of blue, purple, and scarlet fabric, and fine twisted linen. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Bezalel and Oholiab hammered the gold [into thin sheets] and cut it into threads to work into the blue, purple, and scarlet fabric, and into the fine linen, the work of a skilled craftsman. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They made attaching shoulder pieces for the ephod; it was attached at its two [upper] edges. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The skillfully woven sash with which to bind it, which was on the ephod [to hold it in place], was like its workmanship, of the same material: of gold and of blue, purple, and scarlet fabric, and fine twisted linen, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They made the onyx stones, set in settings of gold filigree; they were engraved as signets are engraved, with the names of [the twelve tribes of] the sons of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And he put them on the shoulder pieces of the ephod to be memorial stones (a remembrance) for the sons of Israel (Jacob), just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bezalel made the breastpiece, the work of a skillful craftsman, like the workmanship of the ephod: of gold and of blue, purple, and scarlet fabric, and fine twisted linen. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It was square; they made the breastpiece folded double, a [hand’s] span long and a [hand’s] span wide when folded double. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they mounted four rows of stones on it. The first row was a row of ruby, topaz, and emerald; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the second row, a turquoise, a sapphire, and a diamond; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the third row, a jacinth, an agate, and an amethyst; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and the fourth row, a beryl, an onyx, and a jasper; they were mounted in settings of gold filigree. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The stones corresponded to the names of the sons of Israel; they were twelve [in all], corresponding to their names, engraved like a signet, each with its name, for the twelve tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And they made on the breastpiece twisted chains like cords of pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They made two settings of gold filigree and two gold rings, and put the two rings on the two ends of the breastpiece. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then they put the two twisted cords of gold in the two rings on the ends of the breastpiece. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They put the [other] two ends of the two cords on the two filigree settings, and put them on the shoulder pieces of the ephod at the front of it. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They made two rings of gold and put them on the two ends of the breastpiece, on its inner edge which was next to the ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Furthermore, they made two [other] gold rings and attached them to the bottom of the two shoulder pieces of the ephod, at the front of it, close to the place where it is joined, above the woven sash of the ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They bound the breastpiece by its rings to the rings of the ephod with a blue cord, so that it would lie on the woven sash of the ephod, and so that the breastpiece would not come loose from the ephod, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Bezalel made the robe of the ephod of woven work, all of blue; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'there was an opening [for the head] in the middle of the robe, like the opening in a coat of armor, with a hem around it, so that it would not be frayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' torn. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On the hem of the robe they made pomegranates of blue, purple, and scarlet fabric, and fine twisted linen. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They also made bells of pure gold, and put the bells between the pomegranates around the hem of the robe; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'a bell and a pomegranate, a bell and a pomegranate, all [the way] around the hem of the robe, for service '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ministering, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And they made tunics of finely woven linen for Aaron and his sons, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and the turban of fine linen, and the ornamental caps of fine linen, and the linen undergarments of fine twisted linen, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: and the sash of fine twisted linen, and blue, purple, and scarlet fabric, the work of an embroiderer, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They made the plate of the holy crown of pure gold, and wrote on it an inscription, like the engravings of a signet, “Holy to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” [Ex 28:36] '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They tied a blue cord to it, to fasten it on the turban above, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Thus all the work of the tabernacle of the Tent of Meeting was finished; and the Israelites did according to all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses; that is what they did. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They brought the tabernacle to Moses [for him to inspect]: the tent and all its furnishings, its hooks, its [frame] boards, its bars, its support poles, its sockets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' bases; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and the covering of rams’ skins dyed red, and the covering of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
    marker-yv: yv-n
  - type: text
    text: 'porpoise skins, and the veil (partition) of the screen (curtain); '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the ark of the Testimony, its carrying poles and the mercy seat; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the table and all its utensils and the bread of the Presence (showbread); '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gold
  - type: text
    text: ' lampstand and its lamps, with the lamps placed in order, all its utensils, and the oil for the light; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'the golden altar [of incense], the anointing oil and the fragrant incense, and the [hanging] veil for the doorway of the tent; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'the bronze altar [of burnt offering] and its grating of bronze, its poles and all its utensils, the basin and its base; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the curtains of the courtyard, its support poles and sockets, and the screen (curtain) for the courtyard gate, its cords and pegs, and all the utensils for the service of the tabernacle, for the Tent of Meeting [of God with His people]; [Ex 29:42, 43] '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the [finely] woven garments for serving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ministering in the Holy Place, the holy garments for Aaron the priest, and the garments of his sons to minister as priests. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: So the Israelites did all the work according to all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And Moses [carefully] inspected all the work, and behold, they had done it; just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded, so had they done it. So Moses blessed them.'
