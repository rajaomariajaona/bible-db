segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mordecai’s Greatness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'King Ahasuerus (Xerxes) imposed a tax on the land and on the coastlands of the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And all the accomplishments of his authority and strength, and the full account of the greatness of Mordecai to which the king had raised him, are they not written in the Book of the Chronicles of the Kings of Media and Persia? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Mordecai the Jew was second only to King Ahasuerus, and great among the Jews and in favor with his many fellow people, for he worked for the good of his people and spoke for the welfare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace of his whole nation.'
