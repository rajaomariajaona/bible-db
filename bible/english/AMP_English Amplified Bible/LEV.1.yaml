document_id: LEV.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Law of Burnt Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Before this God had spoken to Moses from the mountain, but now God dwelt among His people in fellowship with them and talked with His servant Moses “from the Tent of Meeting.” The people were entering into a new relationship with God.
      marker-yv: yv-n
    - type: text
      text: 'called to Moses and spoke to him from the Tent of Meeting, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '‘But if his offering is from the flock, of the sheep or of the goats, as a burnt offering, he shall offer a male without blemish. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He shall kill it on the north side of the altar before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and Aaron’s sons the priests shall sprinkle its blood around on the altar. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He shall cut it into pieces, with its head and its fat, and the priest shall arrange them on the wood which is on the fire that is on the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But he shall wash the entrails and legs with water. The priest shall offer all of it, and offer it up in smoke on the altar. It is a burnt offering, an offering by fire, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ‘But if his offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is a burnt offering of birds, then he shall bring turtledoves or young pigeons as his offering. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The priest shall bring it to the altar, and wring off its head, and offer it up in smoke on the altar; and its blood is to be drained out on the side of the altar. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He shall remove its '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An enlargement of the gullet that serves as a receptacle for food.
      marker-yv: yv-n
    - type: text
      text: 'crop with its feathers and throw it next to the east side of the altar, in the place for ashes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he shall tear it open by its wings, but shall not sever it. And the priest shall offer it up in smoke on the altar, on the wood that is on the fire. It is a burnt offering, an offering by fire, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons (children) of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' by God). In verses concerning things such as warfare or circumcision '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: children of Israel and say to them, ‘When any one of you brings an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you shall bring your offering of [domestic] animals from the herd (cattle, oxen) or from the flock (sheep, goats). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: If his offering is a burnt offering from the herd, he shall offer a male without blemish; he shall offer it at the doorway of the Tent of Meeting so that he may be accepted before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Rom 12:1; Phil 1:20] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He shall lay his hand on the head of the burnt offering [transferring symbolically his guilt to the sacrifice], that it may be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By laying his hands on the head of the sacrifice the offerer identified himself with it and through its death it became an atonement or covering for his sin. Because the unblemished sacrifice “covered” his sin it placed the offerer in a right relationship with God, just as later under the new covenant the perfection and sacrifice of the Christ would cover the imperfection and sin of those who identified with Him and accepted Him as Savior.
      marker-yv: yv-n
    - type: text
      text: 'accepted for him to make atonement on his behalf. [Heb 13:15, 16; 1 Pet 1:2] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He shall kill the young bull before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and Aaron’s sons the priests shall present the blood and sprinkle the blood around on the altar that is at the doorway of the Tent of Meeting. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then he shall skin the burnt offering and cut it into pieces. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The sons of Aaron the [high] priest shall put fire on the altar [of burnt offering] and arrange wood on the fire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Aaron’s sons the priests shall arrange the pieces, the head and the fat, on the wood which is on the fire that is on the altar. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But he shall wash its entrails and its legs with water. The priest shall offer all of it up in smoke on the altar as a burnt offering. It is an offering by fire, a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Eph 5:2; Phil 4:18; 1 Pet 2:5]
