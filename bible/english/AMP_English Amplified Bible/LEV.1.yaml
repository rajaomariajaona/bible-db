  '3':
  - type: text
    content: If his offering is a burnt offering from the herd, he shall offer a male without blemish; he shall offer it at the doorway of the Tent of Meeting so that he may be accepted before the L
  - type: heading
    content: ord
  - type: text
    content: '. [Rom 12:1; Phil 1:20] '
  '4':
  - type: text
    content: 'He shall lay his hand on the head of the burnt offering [transferring symbolically his guilt to the sacrifice], that it may be '
  - type: note
    content: By laying his hands on the head of the sacrifice the offerer identified himself with it and through its death it became an atonement or covering for his sin. Because the unblemished sacrifice “covered” his sin it placed the offerer in a right relationship with God, just as later under the new covenant the perfection and sacrifice of the Christ would cover the imperfection and sin of those who identified with Him and accepted Him as Savior.
  - type: text
    content: 'accepted for him to make atonement on his behalf. [Heb 13:15, 16; 1 Pet 1:2] '
