  '2':
  - type: text
    content: '“Speak to the '
  - type: note
    content: In general, sons (children) of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
