verses:
  '1':
  - type: heading
    content: Israel Demands a King
  - type: text
    content: 'And it came about when Samuel was old that he appointed his sons as judges over Israel. '
  '10':
  - type: text
    content: So Samuel told all the words of the L
  - type: heading
    content: ord
  - type: text
    content: ' to the people who were asking him for a king. '
  '11':
  - type: text
    content: 'He said, “These will be the ways of the king who will reign over you: he will take your sons and appoint them for himself to his chariots and among his horsemen and they will run before his chariots. '
  '12':
  - type: text
    content: 'He will appoint them for himself to be commanders over thousands and over fifties, and '
  - type: text
    content: some
  - type: text
    content: ' to do his plowing and to reap his harvest and to make his implements of war and equipment for his chariots. '
  '13':
  - type: text
    content: 'He will take your daughters to be perfumers, cooks, and bakers. '
  '14':
  - type: text
    content: 'He will take the best of your fields, your vineyards, and your olive groves, and give them to his servants. '
  '15':
  - type: text
    content: 'He will take a tenth of your grain and of your vineyards and give it to his officers and to his servants. '
  '16':
  - type: text
    content: 'He will take your male servants and your female servants and your best young men and your donkeys and use them for his work. '
  '17':
  - type: text
    content: 'He will take a tenth of your flocks, and you yourselves shall be his servants. '
  '18':
  - type: text
    content: Then you will cry out on that day because of your king whom you have chosen for yourselves, but the L
  - type: heading
    content: ord
  - type: text
    content: ' will not answer you on that day [because you have rejected Him as King].”'
  '19':
  - type: text
    content: 'Nevertheless, the people refused to listen to the voice of Samuel, and they said, “No, but there shall be a king over us, '
  '2':
  - type: text
    content: 'Now the name of his firstborn was Joel, and the name of his second, Abijah; they were judging in Beersheba. '
  '20':
  - type: text
    content: 'so that we too may be like all the nations [around us], that our king may judge [and govern] us and go out before us and fight our battles.” '
  '21':
  - type: text
    content: 'Samuel had heard all the words of the people and repeated them '
  - type: note
    content: Lit in the Lord’s hearing.
  - type: text
    content: to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '22':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Samuel, “Listen to their '
  - type: note
    content: Lit voice.
  - type: text
    content: request and appoint a king for them.” So Samuel said to the men of Israel, “Go, each man to his own city.”
  '3':
  - type: text
    content: His sons, however, did not walk in his ways, but turned aside after dishonest gain, took bribes, and perverted justice.
  '4':
  - type: text
    content: 'Then all the elders of Israel gathered together and came to Samuel at Ramah '
  '5':
  - type: text
    content: 'and said to him, “Look, you have grown old, and your sons do not walk in your ways. Now appoint us a king to judge us [and rule over us] like all the other nations.” '
  '6':
  - type: text
    content: 'But their demand '
  - type: note
    content: Lit was evil in the eyes of.
  - type: text
    content: 'displeased Samuel when they said, “Give us a king to judge '
  - type: text
    content: and
  - type: text
    content: ' rule over us.” So Samuel prayed to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Samuel, “Listen to the voice of the people in regard to all that they say to you, for they have not rejected you, but they have rejected Me from being King over them. '
  '8':
  - type: text
    content: 'Like all the deeds which they have done since the day that I brought them up from Egypt even to this day—in that they have abandoned (rejected) Me and served other gods—so they are doing to you also. '
  '9':
  - type: text
    content: So now listen to their voice; only solemnly warn them and tell them the ways of the king who will reign over them.”
  - type: heading
    content: Warning concerning a King
