document_id: 1SA.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Demands a King
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And it came about when Samuel was old that he appointed his sons as judges over Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So Samuel told all the words of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to the people who were asking him for a king. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He said, “These will be the ways of the king who will reign over you: he will take your sons and appoint them for himself to his chariots and among his horsemen and they will run before his chariots. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He will appoint them for himself to be commanders over thousands and over fifties, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' to do his plowing and to reap his harvest and to make his implements of war and equipment for his chariots. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He will take your daughters to be perfumers, cooks, and bakers. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He will take the best of your fields, your vineyards, and your olive groves, and give them to his servants. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He will take a tenth of your grain and of your vineyards and give it to his officers and to his servants. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He will take your male servants and your female servants and your best young men and your donkeys and use them for his work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He will take a tenth of your flocks, and you yourselves shall be his servants. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then you will cry out on that day because of your king whom you have chosen for yourselves, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not answer you on that day [because you have rejected Him as King].”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nevertheless, the people refused to listen to the voice of Samuel, and they said, “No, but there shall be a king over us, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the name of his firstborn was Joel, and the name of his second, Abijah; they were judging in Beersheba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'so that we too may be like all the nations [around us], that our king may judge [and govern] us and go out before us and fight our battles.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Samuel had heard all the words of the people and repeated them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the L
          - type: usfm
            marker: sc
            children:
            - type: usfm
              marker: it
              children:
              - type: text
                text: ord’s
          - type: text
            text: ' hearing.'
      marker-yv: yv-n
    - type: text
      text: to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Samuel, “Listen to their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: voice
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: request and appoint a king for them.” So Samuel said to the men of Israel, “Go, each man to his own city.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: His sons, however, did not walk in his ways, but turned aside after dishonest gain, took bribes, and perverted justice.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then all the elders of Israel gathered together and came to Samuel at Ramah '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and said to him, “Look, you have grown old, and your sons do not walk in your ways. Now appoint us a king to judge us [and rule over us] like all the other nations.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But their demand '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: was evil in the eyes of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'displeased Samuel when they said, “Give us a king to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rule over us.” So Samuel prayed to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Samuel, “Listen to the voice of the people in regard to all that they say to you, for they have not rejected you, but they have rejected Me from being King over them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Like all the deeds which they have done since the day that I brought them up from Egypt even to this day—in that they have abandoned (rejected) Me and served other gods—so they are doing to you also. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So now listen to their voice; only solemnly warn them and tell them the ways of the king who will reign over them.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Warning concerning a King
    marker-yv: yv-h
