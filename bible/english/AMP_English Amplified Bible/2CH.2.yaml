document_id: 2CH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Will Build a Temple and Palace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 1:18 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: Now Solomon decided to build a house (temple) for the Name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and a royal palace for himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 2:1 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: So Solomon assigned 70,000 men to carry loads, 80,000 men to quarry stone in the mountains, and 3,600 to supervise them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Solomon sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Huram
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Hiram king of Tyre, saying, “As you dealt with my father David and sent him cedars to build himself a house in which to live, [please] do the same for me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Observe, I am about to build a house for the Name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, dedicated to Him, to burn fragrant incense [of sweet spices] before Him, to set out the showbread continually, and to offer burnt offerings morning and evening, on Sabbaths, New Moons, and on the festivals of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ordained
  - type: text
    text: ' forever in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The house I am going to build will be great, for our God is greater than all the gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But who is able to build a house for Him, since the heavens and [even] the highest heavens cannot contain Him? Who am I to build a house for Him, except [as a place] to burn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: incense
  - type: text
    text: ' before Him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now send me a man who is skilled to work in gold, silver, bronze, and iron, and in purple, crimson, and blue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fabrics,
  - type: text
    text: ' and who knows how to make engravings, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to work
  - type: text
    text: ' with the skilled men who are with me in Judah and Jerusalem, whom my father David provided. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Send me also cedar, cypress, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: almug
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'algum timber, for I know that your servants know how to cut timber in Lebanon. And indeed my servants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will work
  - type: text
    text: ' with your servants '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'to prepare for me an abundance of timber, because the house I am about to build will be great and wonderful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I will give to your servants who cut timber, 20,000 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kors,
      - type: text
        text: ' about 10 bu.'
    marker-yv: yv-n
  - type: text
    text: measures of crushed wheat and 20,000 measures of barley, and 20,000 baths of wine and 20,000 baths of [olive] oil.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hiram to Assist
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Hiram, king of Tyre replied in a letter sent to Solomon: “Because the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' loves His people, He has made you king over them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hiram said also, “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who made heaven and earth, who has given King David a wise son, endowed with discretion and understanding, who will build a house for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and a royal palace for himself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Now I am sending a skilled man, endowed with understanding, Huram-abi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the son of a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Kin 7:14 says that this woman was of the tribe of Naphtali. Most likely her mother’s marriage united her with a tribe of which she was not a native.
    marker-yv: yv-n
  - type: text
    text: 'Danite woman and a Tyrian father. He is trained to work in gold, silver, bronze, iron, stone, and wood; in purple, blue, and crimson fabrics, and in fine linen. He is able to make any kind of engraving and to carry out any design given him. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He will work
  - type: text
    text: ' with your skilled men and those of my lord, David your father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now then, let my lord send to his servants the wheat, the barley, the oil, and the wine of which he has spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: We will cut whatever timber you need from Lebanon and bring it to you on rafts by sea to Joppa, so that you may take it up to Jerusalem.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Solomon took a count of all the aliens in the land of Israel, like the census that his father David had taken; and they were found to be 153,600. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He assigned 70,000 of them to carry loads and 80,000 to quarry stone in the mountain, and 3,600 as overseers to make the people work.
