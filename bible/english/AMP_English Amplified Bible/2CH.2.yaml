document_id: 2CH.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Will Build a Temple and Palace
  - type: text
    content: ' '
  - type: note
    content: Ch 1:18 in Hebrew.
  - type: text
    content: Now Solomon decided to build a house (temple) for the Name of the L
  - type: heading
    content: ord
  - type: text
    content: ', and a royal palace for himself. '
  '10':
  - type: text
    content: 'And I will give to your servants who cut timber, 20,000 '
  - type: note
    content: Lit kors, about 10 bu.
  - type: text
    content: measures of crushed wheat and 20,000 measures of barley, and 20,000 baths of wine and 20,000 baths of [olive] oil.”
  - type: heading
    content: Hiram to Assist
  '11':
  - type: text
    content: 'Then Hiram, king of Tyre replied in a letter sent to Solomon: “Because the L'
  - type: heading
    content: ord
  - type: text
    content: ' loves His people, He has made you king over them.” '
  '12':
  - type: text
    content: Hiram said also, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who made heaven and earth, who has given King David a wise son, endowed with discretion and understanding, who will build a house for the L'
  - type: heading
    content: ord
  - type: text
    content: ' and a royal palace for himself.'
  '13':
  - type: text
    content: '“Now I am sending a skilled man, endowed with understanding, Huram-abi, '
  '14':
  - type: text
    content: 'the son of a '
  - type: note
    content: 1 Kin 7:14 says that this woman was of the tribe of Naphtali. Most likely her mother’s marriage united her with a tribe of which she was not a native.
  - type: text
    content: 'Danite woman and a Tyrian father. He is trained to work in gold, silver, bronze, iron, stone, and wood; in purple, blue, and crimson fabrics, and in fine linen. He is able to make any kind of engraving and to carry out any design given him. '
  - type: text
    content: He will work
  - type: text
    content: ' with your skilled men and those of my lord, David your father. '
  '15':
  - type: text
    content: 'Now then, let my lord send to his servants the wheat, the barley, the oil, and the wine of which he has spoken. '
  '16':
  - type: text
    content: We will cut whatever timber you need from Lebanon and bring it to you on rafts by sea to Joppa, so that you may take it up to Jerusalem.”
  '17':
  - type: text
    content: 'Then Solomon took a count of all the aliens in the land of Israel, like the census that his father David had taken; and they were found to be 153,600. '
  '18':
  - type: text
    content: He assigned 70,000 of them to carry loads and 80,000 to quarry stone in the mountain, and 3,600 as overseers to make the people work.
  '2':
  - type: note
    content: Ch 2:1 in Hebrew.
  - type: text
    content: So Solomon assigned 70,000 men to carry loads, 80,000 men to quarry stone in the mountains, and 3,600 to supervise them.
  '3':
  - type: text
    content: 'Then Solomon sent '
  - type: text
    content: word
  - type: text
    content: ' to '
  - type: note
    content: Heb Huram.
  - type: text
    content: 'Hiram king of Tyre, saying, “As you dealt with my father David and sent him cedars to build himself a house in which to live, [please] do the same for me. '
  '4':
  - type: text
    content: Observe, I am about to build a house for the Name of the L
  - type: heading
    content: ord
  - type: text
    content: ' my God, dedicated to Him, to burn fragrant incense [of sweet spices] before Him, to set out the showbread continually, and to offer burnt offerings morning and evening, on Sabbaths, New Moons, and on the festivals of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God, as '
  - type: text
    content: ordained
  - type: text
    content: ' forever in Israel. '
  '5':
  - type: text
    content: 'The house I am going to build will be great, for our God is greater than all the gods. '
  '6':
  - type: text
    content: 'But who is able to build a house for Him, since the heavens and [even] the highest heavens cannot contain Him? Who am I to build a house for Him, except [as a place] to burn '
  - type: text
    content: incense
  - type: text
    content: ' before Him? '
  '7':
  - type: text
    content: 'Now send me a man who is skilled to work in gold, silver, bronze, and iron, and in purple, crimson, and blue '
  - type: text
    content: fabrics,
  - type: text
    content: ' and who knows how to make engravings, '
  - type: text
    content: to work
  - type: text
    content: ' with the skilled men who are with me in Judah and Jerusalem, whom my father David provided. '
  '8':
  - type: text
    content: 'Send me also cedar, cypress, and '
  - type: note
    content: Or almug.
  - type: text
    content: 'algum timber, for I know that your servants know how to cut timber in Lebanon. And indeed my servants '
  - type: text
    content: will work
  - type: text
    content: ' with your servants '
  '9':
  - type: text
    content: 'to prepare for me an abundance of timber, because the house I am about to build will be great and wonderful. '
