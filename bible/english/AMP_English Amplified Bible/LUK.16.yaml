  - type: text
    text: ' [of my affairs], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you can no longer be
  - type: text
    text: ' [my] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: manager.’
  - type: text
    text: ' '
