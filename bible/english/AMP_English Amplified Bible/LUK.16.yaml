  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the sons of this age
  - type: text
    text: ' [the non-believers] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are shrewder in relation to their own kind
  - type: text
    text: ' [that is, to the ways of the secular world] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: than are the sons of light
  - type: text
    text: ' [the believers]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I tell you
  - type: text
    text: ' [learn from this], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: make friends for yourselves
  - type: text
    text: ' [for eternity] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'by means of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mamona,
      - type: text
        text: ' from Aram '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mammon,
      - type: text
        text: ' signifying riches, wealth, etc., personified as an object of worship.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: wealth of unrighteousness
  - type: text
    text: ' [that is, use material resources as a way to further the work of God], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that when it runs out, they will welcome you into the eternal dwellings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
