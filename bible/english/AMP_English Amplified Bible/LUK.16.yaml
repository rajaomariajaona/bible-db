      text: '1'
  - type: text
    text: 'Now Jesus was also saying to the disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There was a certain rich man who had a manager
  - type: text
    text: ' [of his estate], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and accusations
  - type: text
    text: ' [against this man] '
  - type: usfm
    marker: wj
    children:
    - type: text
