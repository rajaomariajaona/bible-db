  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And his master commended the unjust manager
  - type: text
    text: ' [not for his misdeeds, but] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because he had acted shrewdly
  - type: text
