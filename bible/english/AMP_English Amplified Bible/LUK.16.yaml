    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The manager
  - type: text
    text: ' [of the estate] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: said to himself, ‘What will I do, since my master is taking the management away from me? I am not strong enough to dig
  - type: text
    text: ' [for a living], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I am ashamed to beg.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
