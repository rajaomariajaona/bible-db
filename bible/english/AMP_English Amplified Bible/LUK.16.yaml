  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “He who is faithful in a very little thing is also faithful in much; and he who is dishonest in a very little thing is also dishonest in much.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Therefore if you have not been faithful in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: use of
    - type: text
      text: ' earthly wealth, who will entrust the true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: riches
    - type: text
      text: ' to you?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And if you have not been faithful in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the use of
    - type: text
      text: ' that'
  - type: text
    text: ' [earthly wealth] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: which belongs to another
  - type: text
    text: ' [whether God or man, and of which you are a trustee], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who will give you that which is your own?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'No servant can serve two masters; for either he will hate the one and love the other, or he will stand devotedly by the one and despise the other. You cannot serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' God and mammon'
  - type: text
    text: ' [that is, your earthly possessions or anything else you trust in and rely on instead of God].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now the Pharisees, who were lovers of money, were listening to all these things and were sneering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ridiculing Him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“You are the ones who declare yourselves just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright in the sight of men, but God knows your hearts'
  - type: text
    text: ' [your thoughts, your desires, your secrets]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for that which is highly esteemed among men is detestable in the sight of God.
  - type: text
    text: ' [1 Sam 16:7; Prov 21:2]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Law and the
  - type: text
    text: ' [writings of the] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Prophets were proclaimed until John; since then the gospel of the kingdom of God has been '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continues to be preached, and everyone tries forcefully to go into it.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yet it is easier for heaven and earth to pass away than for a single stroke of a letter of the Law to fail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become void.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever divorces his wife and marries another commits adultery, and he who marries one who is divorced from her husband commits adultery.
  - type: text
    text: ' [Matt 5:31, 32]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rich Man and Lazarus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Now there was a certain rich man who was habitually dressed in expensive purple and fine linen, and celebrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lived joyously in splendor every day.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And a poor man named Lazarus, was laid at his gate, covered with sores.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He
  - type: text
    text: ' [eagerly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'longed to eat the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: crumbs
    - type: text
      text: ' which fell from the rich man’s table. Besides, even the dogs were coming and licking his sores.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Now it happened that the poor man died and his spirit was carried away by the angels to Abraham’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lap
      - type: text
        text: . The Greek word basically means a fold, and could refer either to the fold of a robe over the chest or to the fold of a lap, formed when the legs are placed together. In either case, being “in Abraham’s bosom” (v 23) is an image reflecting a blissful place of comfort and security.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bosom (paradise); and the rich man also died and was buried.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In Hades (the realm of the dead), being in torment, he looked up and saw Abraham far away and Lazarus in his bosom (paradise).
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he cried out, ‘Father Abraham, have mercy on me, and send Lazarus so that he may dip the tip of his finger in water and cool my tongue, because I am in severe agony in this flame.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But Abraham said, ‘Son, remember that in your lifetime you received your good things
  - type: text
    text: ' [all the comforts and delights], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and Lazarus likewise bad things
  - type: text
    text: ' [all the discomforts and distresses]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but now he is comforted here
  - type: text
    text: ' [in paradise], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: while you are in severe agony.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And besides all this, between us and you
  - type: text
    text: ' [people] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: a great chasm has been fixed, so that those who want to come over from here to you will not be able, and none may cross over from there to us.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the rich man said, ‘Then, father
  - type: text
    text: ' [Abraham], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I beg you to send Lazarus to my father’s house—
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for I have five brothers—in order that he may '
    - type: usfm
      marker: it
      children:
      - type: text
        text: solemnly
    - type: text
      text: ' warn them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' witness to them, so that they too will not come to this place of torment.’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But Abraham said, ‘They have
  - type: text
    text: ' [the Scriptures given by] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moses and the
  - type: text
    text: ' [writings of the] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prophets; let them listen to them.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He replied, ‘No, father Abraham, but if someone from the dead goes to them, they will repent
  - type: text
    text: ' [they will change their old way of thinking and seek God and His righteousness].’ '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he said to him, ‘If they do not listen to
  - type: text
    text: ' [the messages of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moses and the Prophets, they will not be persuaded even if someone rises from the dead.’ ”
