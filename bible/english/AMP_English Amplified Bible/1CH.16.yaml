document_id: 1CH.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Tent for the Ark
  - type: text
    content: 'So they brought the ark of God and set it inside the tent which David had pitched for it, and they offered burnt offerings and peace offerings before God. '
  '10':
  - type: text
    content: Glory in His holy name;
  - type: text
    content: Let the hearts of those who seek the L
  - type: heading
    content: ord
  - type: text
    content: ' rejoice.'
  '11':
  - type: text
    content: Seek the L
  - type: heading
    content: ord
  - type: text
    content: ' and His strength;'
  - type: text
    content: Seek His face continually [longing to be in His presence].
  '12':
  - type: text
    content: Remember [with gratitude] His marvelous deeds which He has done,
  - type: text
    content: His miracles and the judgments from His mouth,
  '13':
  - type: text
    content: O seed of Israel His servant,
  - type: note
    content: Lit sons.
  - type: text
    content: Children of Jacob, His chosen ones!
  '14':
  - type: text
    content: He is the L
  - type: heading
    content: ord
  - type: text
    content: ' our God;'
  - type: text
    content: His judgments are in all the earth.
  '15':
  - type: text
    content: Be mindful of His covenant forever,
  - type: text
    content: 'The promise which He commanded '
  - type: text
    content: and
  - type: text
    content: ' established to a thousand generations,'
  '16':
  - type: text
    content: ' '
  - type: text
    content: The covenant
  - type: text
    content: ' which He made with Abraham,'
  - type: text
    content: And His oath (sworn promise) to Isaac.
  '17':
  - type: text
    content: He confirmed it as a statute to Jacob,
  - type: text
    content: And to Israel as an everlasting covenant, [Gen 35:11, 12]
  '18':
  - type: text
    content: Saying, “To you I will give the land of Canaan,
  - type: text
    content: 'As the portion of your possession '
  - type: text
    content: and
  - type: text
    content: ' inheritance.”'
  '19':
  - type: text
    content: When you were few in number,
  - type: text
    content: Even a very few, and strangers in it,
  '2':
  - type: text
    content: When David had finished offering the burnt offerings and the peace offerings, he blessed the people in the name of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '20':
  - type: text
    content: When they wandered from nation to nation,
  - type: text
    content: 'And from '
  - type: text
    content: one
  - type: text
    content: ' kingdom to another people,'
  '21':
  - type: text
    content: 'He allowed no man to oppress '
  - type: text
    content: or
  - type: text
    content: ' exploit them,'
  - type: text
    content: 'And, He reproved '
  - type: text
    content: and
  - type: text
    content: ' punished kings for their sakes, '
  - type: text
    content: saying
  - type: text
    content: ', [Gen 12:17; 20:3; Ex 7:15-18]'
  '22':
  - type: text
    content: “Do not touch My anointed ones,
  - type: text
    content: And do My prophets no harm.” [Gen 20:7]
  '23':
  - type: text
    content: Sing to the L
  - type: heading
    content: ord
  - type: text
    content: ', all the earth;'
  - type: text
    content: Proclaim the good news of His salvation from day to day.
  '24':
  - type: text
    content: Declare His glory among the nations,
  - type: text
    content: His marvelous works among all peoples.
  '25':
  - type: text
    content: For great is the L
  - type: heading
    content: ord
  - type: text
    content: ', and greatly to be praised;'
  - type: text
    content: He is also to be feared [with awe-filled reverence] above all gods.
  '26':
  - type: text
    content: For all the gods of the peoples are [lifeless] idols,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' made the heavens.'
  '27':
  - type: text
    content: Splendor and majesty are [found] in His presence;
  - type: text
    content: Strength and joy are [found] in His place (sanctuary).
  '28':
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ', O families of the peoples,'
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' glory '
  - type: text
    content: and
  - type: text
    content: ' honor and strength.'
  '29':
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' the glory '
  - type: text
    content: and
  - type: text
    content: ' honor due His name;'
  - type: text
    content: Bring an offering [of thanksgiving], and come before Him;
  - type: text
    content: Worship the L
  - type: heading
    content: ord
  - type: text
    content: ' in the splendor of holiness.'
  '3':
  - type: text
    content: 'He distributed to everyone in Israel, both man and woman, to everyone a loaf of bread, a portion '
  - type: text
    content: of meat,
  - type: text
    content: ' and a raisin cake.'
  '30':
  - type: text
    content: Tremble [reverently] before Him, all the earth;
  - type: text
    content: The world is firmly established, it will not be moved.
  '31':
  - type: text
    content: Let the heavens be glad, and let the earth rejoice;
  - type: text
    content: And let them say among the nations, “The L
  - type: heading
    content: ord
  - type: text
    content: ' reigns.”'
  '32':
  - type: text
    content: Let the sea roar, and all the things that fill it;
  - type: text
    content: Let the field rejoice, and all that is in it.
  '33':
  - type: text
    content: Then the trees of the forest will sing for joy before the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: 'For He comes to judge '
  - type: text
    content: and
  - type: text
    content: ' govern the earth.'
  '34':
  - type: text
    content: O give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', for '
  - type: text
    content: He is
  - type: text
    content: ' good;'
  - type: text
    content: For His lovingkindness endures forever.
  '35':
  - type: text
    content: Then say, “Save us, O God of our salvation;
  - type: text
    content: Gather us together and rescue us from the nations,
  - type: text
    content: That we may give thanks to Your holy name,
  - type: text
    content: And glory in Your praise.”
  '36':
  - type: text
    content: Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: Forever and ever.
  - type: text
    content: And all the people said, “Amen,” and praised the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: heading
    content: Worship before the Ark
  '37':
  - type: text
    content: So David left Asaph and his relatives there before the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' to minister before the ark continually, as each day’s work required; '
  '38':
  - type: text
    content: 'and Obed-edom with his sixty-eight relatives; also Obed-edom the son of Jeduthun, and Hosah, were to be gatekeepers. '
  '39':
  - type: text
    content: David left
  - type: text
    content: ' Zadok the priest and his relatives the priests before the dwelling place (tabernacle) of the L'
  - type: heading
    content: ord
  - type: text
    content: ' in the high place which was at Gibeon, [1 Chr 21:29] '
  '4':
  - type: text
    content: He appointed some of the Levites to minister before the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' and to profess [God’s name] and to '
  - type: note
    content: Lit praise, a Hebrew word that is the root of the name “Judah.”
  - type: text
    content: thank and praise the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel: '
  '40':
  - type: text
    content: to offer burnt offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ' on the altar of burnt offering continually, morning and evening, in accordance with all that is written in the Law of the L'
  - type: heading
    content: ord
  - type: text
    content: ', which He commanded Israel. '
  '41':
  - type: text
    content: With them were Heman and Jeduthun, and the rest who were chosen and designated by name, to give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', for His lovingkindness endures forever. '
  '42':
  - type: text
    content: 'With them were Heman and Jeduthun '
  - type: text
    content: with
  - type: text
    content: ' trumpets and cymbals for those who '
  - type: text
    content: were to
  - type: text
    content: ' sound aloud, and instruments for [accompanying] the songs of God. And the sons of Jeduthun were to be at the gate.'
  '43':
  - type: text
    content: Then all the people departed, each to his house, and David returned [home] to bless his household.
  '5':
  - type: text
    content: 'Asaph the chief, and second to him Zechariah, '
  - type: text
    content: then
  - type: text
    content: ' Jeiel (Jaaziel), Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel with musical instruments, harps and lyres; also Asaph '
  - type: text
    content: played
  - type: text
    content: ' loud-sounding cymbals; '
  '6':
  - type: text
    content: 'and Benaiah and Jahaziel the priests '
  - type: text
    content: blew
  - type: text
    content: ' trumpets continually before the ark of the covenant of God.'
  '7':
  - type: text
    content: Then on that day David first entrusted to Asaph and his relatives to give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ' [as their chief task].'
  - type: heading
    content: Psalm of Thanksgiving
  '8':
  - type: text
    content: O give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', call on His name;'
  - type: text
    content: Make His deeds known among the peoples.
  '9':
  - type: text
    content: Sing to Him, sing praises to Him;
  - type: text
    content: Speak of all His wonders.
