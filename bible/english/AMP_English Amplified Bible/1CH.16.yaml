document_id: 1CH.16,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Tent for the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'So they brought the ark of God and set it inside the tent which David had pitched for it, and they offered burnt offerings and peace offerings before God. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Glory in His holy name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the hearts of those who seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rejoice.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and His strength;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek His face continually [longing to be in His presence].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Remember [with gratitude] His marvelous deeds which He has done,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His miracles and the judgments from His mouth,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O seed of Israel His servant,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Children of Jacob, His chosen ones!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His judgments are in all the earth.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Be mindful of His covenant forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The promise which He commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established to a thousand generations,'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The covenant
    - type: text
      text: ' which He made with Abraham,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His oath (sworn promise) to Isaac.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He confirmed it as a statute to Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to Israel as an everlasting covenant, [Gen 35:11, 12]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Saying, “To you I will give the land of Canaan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As the portion of your possession '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inheritance.”'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When you were few in number,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even a very few, and strangers in it,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When David had finished offering the burnt offerings and the peace offerings, he blessed the people in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When they wandered from nation to nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' kingdom to another people,'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'He allowed no man to oppress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' exploit them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And, He reproved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punished kings for their sakes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying
    - type: text
      text: ', [Gen 12:17; 20:3; Ex 7:15-18]'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Do not touch My anointed ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do My prophets no harm.” [Gen 20:7]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all the earth;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclaim the good news of His salvation from day to day.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Declare His glory among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His marvelous works among all peoples.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For great is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and greatly to be praised;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is also to be feared [with awe-filled reverence] above all gods.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For all the gods of the peoples are [lifeless] idols,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made the heavens.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Splendor and majesty are [found] in His presence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strength and joy are [found] in His place (sanctuary).
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ascribe to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O families of the peoples,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ascribe to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor and strength.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ascribe to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor due His name;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring an offering [of thanksgiving], and come before Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Worship the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the splendor of holiness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He distributed to everyone in Israel, both man and woman, to everyone a loaf of bread, a portion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of meat,
    - type: text
      text: ' and a raisin cake.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tremble [reverently] before Him, all the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The world is firmly established, it will not be moved.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Let the heavens be glad, and let the earth rejoice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let them say among the nations, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' reigns.”'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Let the sea roar, and all the things that fill it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the field rejoice, and all that is in it.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Then the trees of the forest will sing for joy before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He comes to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' govern the earth.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: O give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He is
    - type: text
      text: ' good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Then say, “Save us, O God of our salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather us together and rescue us from the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may give thanks to Your holy name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And glory in Your praise.”
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forever and ever.
  - type: usfm
    marker: m
    children:
    - type: text
      text: And all the people said, “Amen,” and praised the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Worship before the Ark
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: So David left Asaph and his relatives there before the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to minister before the ark continually, as each day’s work required; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'and Obed-edom with his sixty-eight relatives; also Obed-edom the son of Jeduthun, and Hosah, were to be gatekeepers. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: it
      children:
      - type: text
        text: David left
    - type: text
      text: ' Zadok the priest and his relatives the priests before the dwelling place (tabernacle) of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the high place which was at Gibeon, [1 Chr 21:29] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He appointed some of the Levites to minister before the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and to profess [God’s name] and to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: praise,
        - type: text
          text: ' a Hebrew word that is the root of the name “Judah.”'
      marker-yv: yv-n
    - type: text
      text: thank and praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: to offer burnt offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the altar of burnt offering continually, morning and evening, in accordance with all that is written in the Law of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', which He commanded Israel. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: With them were Heman and Jeduthun, and the rest who were chosen and designated by name, to give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for His lovingkindness endures forever. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'With them were Heman and Jeduthun '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' trumpets and cymbals for those who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were to
    - type: text
      text: ' sound aloud, and instruments for [accompanying] the songs of God. And the sons of Jeduthun were to be at the gate.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Then all the people departed, each to his house, and David returned [home] to bless his household.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Asaph the chief, and second to him Zechariah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' Jeiel (Jaaziel), Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-edom, and Jeiel with musical instruments, harps and lyres; also Asaph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: played
    - type: text
      text: ' loud-sounding cymbals; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and Benaiah and Jahaziel the priests '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blew
    - type: text
      text: ' trumpets continually before the ark of the covenant of God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then on that day David first entrusted to Asaph and his relatives to give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [as their chief task].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm of Thanksgiving
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', call on His name;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make His deeds known among the peoples.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sing to Him, sing praises to Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Speak of all His wonders.
