document_id: AMO.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “Those at Ease in Zion”
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Woe (judgment is coming) to those who are at ease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carefree in Zion (Judah)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to those on the mountain of Samaria who feel secure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The distinguished men of the foremost of nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To whom the house of Israel comes. [Luke 6:24, 25]
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then one’s uncle, or his undertaker, shall come to bring the [disease-infected] body out of the house, [to cremate it], and he will say to another in the farthest part of the house, “Is there anyone else with you?” And that one will say, “No one.” Then he will respond, “Hush! Keep quiet! For the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is not to be mentioned [even casually, for fear that we might invoke even more punishment].” [1 Sam 31:12] '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is going to command that the great house be smashed to pieces and the small house to fragments.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶Do horses run on rocks?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do men plow rocks with oxen? [Of course not!]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you have turned justice into poison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fruit of righteousness into wormwood (bitterness),
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'You who [self-confidently] rejoice in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a thing of nothing
        - type: text
          text: . Lo-debar and Karnaim apparently were Aramean sites that had been captured by Israel. Amos uses the meanings of these names in a play on words to rebuke Israel.
      marker-yv: yv-n
    - type: text
      text: Lo-debar (Nothing),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who say, “Have we not by our own strength taken '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a pair of horns
        - type: text
          text: . The horns of animals were regarded as symbols of power. Amos condemns Israel for claiming that their victories were achieved without God’s help.
      marker-yv: yv-n
    - type: text
      text: Karnaim (Strength) for ourselves?”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “For behold, I am going to stir up a nation against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O house of Israel,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“And they will afflict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torment you [to the entire limits of Israel] from the entrance of Hamath [in the north]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the brook of the Arabah [in the south].”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Go over to Calneh [in Babylonia] and look,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from there go [north of Damascus] to the great city of Hamath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then go down to Gath of the Philistines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are they better than these kingdoms [of yours],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or is their territory greater than yours?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do you put off the day of punishment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet cause the seat of violence to come near?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶Those who lie on [luxurious] beds of ivory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lounge around out on their couches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And eat lambs from the flock
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And calves from the midst of the stall,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Who improvise to the sound of the harp—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like David they have composed songs for themselves— [1 Chr 23:5]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Who drink wine from sacrificial bowls
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And anoint themselves with the finest oils [reflecting their unrestrained celebration];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they are not grieved over the ruin of Joseph (Israel). [Gen 49:22, 23]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore, they will now go into exile with the first of the captives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the cultic revelry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' banqueting of those who lounge around [on their luxurious couches] will pass away.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '¶The Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: ', usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' has sworn [an oath] by Himself—the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I loathe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reject the [self-centered] arrogance of Jacob (Israel),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I hate his palaces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' citadels;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I shall hand over the [idolatrous] city [of Samaria] with all that it contains [to the Assyrian invaders].”
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And it shall come to pass that if there remain ten men in one house, they shall die [by the pestilence that comes with war]. '
