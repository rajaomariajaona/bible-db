document_id: AMO.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: “Those at Ease in Zion”
  - type: text
    content: 'Woe (judgment is coming) to those who are at ease '
  - type: text
    content: and
  - type: text
    content: ' carefree in Zion (Judah)'
  - type: text
    content: And to those on the mountain of Samaria who feel secure,
  - type: text
    content: The distinguished men of the foremost of nations,
  - type: text
    content: To whom the house of Israel comes. [Luke 6:24, 25]
  '10':
  - type: text
    content: Then one’s uncle, or his undertaker, shall come to bring the [disease-infected] body out of the house, [to cremate it], and he will say to another in the farthest part of the house, “Is there anyone else with you?” And that one will say, “No one.” Then he will respond, “Hush! Keep quiet! For the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' is not to be mentioned [even casually, for fear that we might invoke even more punishment].” [1 Sam 31:12] '
  '11':
  - type: text
    content: For behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' is going to command that the great house be smashed to pieces and the small house to fragments.'
  '12':
  - type: text
    content: ¶Do horses run on rocks?
  - type: text
    content: Do men plow rocks with oxen? [Of course not!]
  - type: text
    content: Yet you have turned justice into poison
  - type: text
    content: And the fruit of righteousness into wormwood (bitterness),
  '13':
  - type: text
    content: 'You who [self-confidently] rejoice in '
  - type: note
    content: Lit a thing of nothing. Lo-debar and Karnaim apparently were Aramean sites that had been captured by Israel. Amos uses the meanings of these names in a play on words to rebuke Israel.
  - type: text
    content: Lo-debar (Nothing),
  - type: text
    content: 'Who say, “Have we not by our own strength taken '
  - type: note
    content: Lit a pair of horns. The horns of animals were regarded as symbols of power. Amos condemns Israel for claiming that their victories were achieved without God’s help.
  - type: text
    content: Karnaim (Strength) for ourselves?”
  '14':
  - type: text
    content: “For behold, I am going to stir up a nation against you,
  - type: text
    content: O house of Israel,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of hosts,'
  - type: text
    content: '“And they will afflict '
  - type: text
    content: and
  - type: text
    content: ' torment you [to the entire limits of Israel] from the entrance of Hamath [in the north]'
  - type: text
    content: To the brook of the Arabah [in the south].”
  '2':
  - type: text
    content: Go over to Calneh [in Babylonia] and look,
  - type: text
    content: And from there go [north of Damascus] to the great city of Hamath;
  - type: text
    content: Then go down to Gath of the Philistines.
  - type: text
    content: Are they better than these kingdoms [of yours],
  - type: text
    content: Or is their territory greater than yours?
  '3':
  - type: text
    content: Do you put off the day of punishment,
  - type: text
    content: Yet cause the seat of violence to come near?
  '4':
  - type: text
    content: ¶Those who lie on [luxurious] beds of ivory
  - type: text
    content: And lounge around out on their couches,
  - type: text
    content: And eat lambs from the flock
  - type: text
    content: And calves from the midst of the stall,
  '5':
  - type: text
    content: Who improvise to the sound of the harp—
  - type: text
    content: Like David they have composed songs for themselves— [1 Chr 23:5]
  '6':
  - type: text
    content: Who drink wine from sacrificial bowls
  - type: text
    content: And anoint themselves with the finest oils [reflecting their unrestrained celebration];
  - type: text
    content: Yet they are not grieved over the ruin of Joseph (Israel). [Gen 49:22, 23]
  '7':
  - type: text
    content: Therefore, they will now go into exile with the first of the captives,
  - type: text
    content: 'And the cultic revelry '
  - type: text
    content: and
  - type: text
    content: ' banqueting of those who lounge around [on their luxurious couches] will pass away.'
  '8':
  - type: text
    content: '¶The Lord '
  - type: note
    content: Heb YHWH, usually rendered Lord.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ' has sworn [an oath] by Himself—the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts, says:'
  - type: text
    content: '“I loathe '
  - type: text
    content: and
  - type: text
    content: ' reject the [self-centered] arrogance of Jacob (Israel),'
  - type: text
    content: 'And I hate his palaces '
  - type: text
    content: and
  - type: text
    content: ' citadels;'
  - type: text
    content: Therefore, I shall hand over the [idolatrous] city [of Samaria] with all that it contains [to the Assyrian invaders].”
  '9':
  - type: text
    content: 'And it shall come to pass that if there remain ten men in one house, they shall die [by the pestilence that comes with war]. '
