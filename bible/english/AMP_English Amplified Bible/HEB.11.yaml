document_id: HEB.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumphs of Faith
  - type: text
    content: 'Now faith is the assurance (title deed, confirmation) of things hoped for (divinely guaranteed), and the evidence of things not seen [the conviction of their reality—faith comprehends as fact what cannot be experienced by the physical senses]. '
  '10':
  - type: text
    content: 'For he was [waiting expectantly and confidently] looking forward to the city which has foundations, [an eternal, heavenly city] whose architect and builder is God. '
  '11':
  - type: text
    content: 'By faith even Sarah herself received the ability to conceive [a child], even [when she was long] past the normal age for it, because she considered Him who had given her the promise to be reliable '
  - type: text
    content: and
  - type: text
    content: ' true [to His word]. [Gen 17:19; 18:11-14; 21:2] '
  '12':
  - type: text
    content: 'So from one man, though he was [physically] as good as dead, were born '
  - type: text
    content: as many descendants
  - type: text
    content: ' '
  - type: heading
    content: as the stars of heaven in number
  - type: text
    content: ', '
  - type: heading
    content: and innumerable as the sand on the seashore
  - type: text
    content: . [Gen 15:5, 6; 22:17; 32:12]
  '13':
  - type: text
    content: 'All these died in faith [guided and sustained by it], without receiving the [tangible fulfillment of God’s] promises, only having seen (anticipated) them and having welcomed them from a distance, and having acknowledged that they were strangers and exiles on the earth. [Gen 23:4; Ps 39:12] '
  '14':
  - type: text
    content: 'Now those who say such things make it clear that they are looking for a country of their own. '
  '15':
  - type: text
    content: 'And if they had been thinking of that '
  - type: text
    content: country
  - type: text
    content: ' from which they departed [as their true home], they would have had [a continuing] opportunity to return. '
  '16':
  - type: text
    content: But the truth is that they were longing for a better country, that is, a heavenly one. For that reason God is not ashamed [of them or] to be called their God [even to be surnamed their God—the God of Abraham, Isaac, and Jacob]; for He has prepared a city for them. [Ex 3:6, 15; 4:5]
  '17':
  - type: text
    content: 'By faith Abraham, when he was tested [that is, as the testing of his faith was still in progress], '
  - type: note
    content: Lit has offered. Even though Abraham did not follow through with the sacrifice per the fact that it was a test from God, from Abraham’s perspective the offering was completed although he did not physically offer Isaac.
  - type: text
    content: 'offered up Isaac, and he who had received the promises [of God] was ready to sacrifice his only son [of promise]; [Gen 22:1-10] '
  '18':
  - type: text
    content: to whom it was said, “T
  - type: heading
    content: hrough
  - type: text
    content: ' I'
  - type: heading
    content: saac your descendants shall be called
  - type: text
    content: '.” [Gen 21:12] '
  '19':
  - type: text
    content: 'For he considered [it reasonable to believe] that God was able to raise '
  - type: text
    content: Isaac
  - type: text
    content: ' even from among the dead. [Indeed, in the sense that he was prepared to sacrifice Isaac in obedience to God] Abraham did receive him back [from the dead] figuratively speaking. '
  '2':
  - type: text
    content: 'For by this [kind of] faith the '
  - type: note
    content: I.e. those men and women who were faithful to God before the old covenant and those faithful to God after its establishment, those mentioned in this chapter.
  - type: text
    content: men of old gained [divine] approval.
  '20':
  - type: text
    content: 'By faith Isaac blessed Jacob and Esau [believing what God revealed to him], even regarding things to come. [Gen 27:27-29, 39, 40] '
  '21':
  - type: text
    content: 'By faith Jacob, as he was dying, blessed each of the sons of Joseph, and bowed in worship, '
  - type: text
    content: leaning
  - type: text
    content: ' on the top of his staff. [Gen 48] '
  '22':
  - type: text
    content: By faith Joseph, when he was dying, referred to [the promise of God for] the exodus of the sons of Israel [from Egypt], and gave instructions concerning [the burial of] his bones [in the land of the promise]. [Gen 50:24, 25; Ex 13:19]
  '23':
  - type: text
    content: 'By faith Moses, after his birth, was hidden for three months by his parents, because they saw he was a beautiful '
  - type: text
    content: and
  - type: text
    content: ' divinely favored child; and they were not afraid of the king’s (Pharaoh’s) decree. [Ex 1:22; 2:2; Acts 7:20] '
  '24':
  - type: text
    content: 'By faith Moses, when he had grown up, refused to be called the son of Pharaoh’s daughter, [Ex 2:10, 15] '
  '25':
  - type: text
    content: 'because he preferred to endure the hardship of the people of God rather than to enjoy the passing pleasures of sin. '
  '26':
  - type: text
    content: 'He considered the reproach of the '
  - type: note
    content: 'The author is probably suggesting two things here: 1) Moses’ reproach was like what was endured by Jesus in His suffering and death, and 2) Moses’ reproach was for the sake of Christ. Whether typology is involved here is debated.'
  - type: text
    content: 'Christ [that is, the rebuke he would suffer for his faithful obedience to God] to be greater wealth than all the treasures of Egypt; for he looked ahead to the reward [promised by God]. '
  '27':
  - type: text
    content: 'By faith he left Egypt, being unafraid of the wrath of the king; for he endured [steadfastly], as seeing Him who is unseen. [Ex 2:15] '
  '28':
  - type: text
    content: 'By faith he kept the Passover and the sprinkling of the blood [on the doorposts], so that the destroyer of the firstborn would not touch them (the firstborn of Israel). [Ex 12:21-30] '
  '29':
  - type: text
    content: 'By faith the people [of Israel] crossed the Red Sea as though '
  - type: text
    content: they were passing
  - type: text
    content: ' through dry land; but when the Egyptians attempted it they were drowned. [Ex 14:21-31]'
  '3':
  - type: text
    content: 'By faith [that is, with an inherent trust and enduring confidence in the power, wisdom and goodness of God] we understand that the worlds (universe, ages) were framed '
  - type: text
    content: and
  - type: text
    content: ' created [formed, put in order, and equipped for their intended purpose] by the word of God, so that what is seen was not made out of things which are visible. '
  '30':
  - type: text
    content: 'By faith the walls of Jericho fell down after they had been encircled for seven days [by Joshua and the sons of Israel]. [Josh 6:12-21] '
  '31':
  - type: text
    content: By faith Rahab the prostitute was not destroyed along with those who were disobedient, because she had welcomed the spies [sent by the sons of Israel] in peace. [Josh 2:1-21; 6:22-25]
  '32':
  - type: text
    content: 'And what more shall I say? For time will fail me if I tell of Gideon, Barak, Samson, Jephthah, of David and Samuel and the prophets, [Judg 4; 5; 6-8; 11; 12; 13-16; 1 Sam 1-30; 2 Sam 1-24; 1 Kin 1; 2; Acts 3:24] '
  '33':
  - type: text
    content: 'who by faith [that is, with an enduring trust in God and His promises] subdued kingdoms, administered justice, obtained promised blessings, closed the mouths of lions, [Dan 6] '
  '34':
  - type: text
    content: 'extinguished the power of [raging] fire, escaped the edge of the sword, out of weakness were made strong, became mighty '
  - type: text
    content: and
  - type: text
    content: ' unbeatable in battle, putting enemy forces to flight. [Dan 3] '
  '35':
  - type: text
    content: 'Women received back their dead by resurrection; and others were tortured [to death], refusing to accept release [offered on the condition of denying their faith], so that they would be resurrected to a better life; [1 Kin 17:17-24; 2 Kin 4:25-37] '
  '36':
  - type: text
    content: 'and others experienced the trial of mocking and scourging [amid torture], and even chains and imprisonment. '
  '37':
  - type: text
    content: 'They were stoned [to death], they were sawn in two, they were lured with tempting offers [to renounce their faith], they were put to death by the sword; they went about wrapped in the skins of sheep and goats, utterly destitute, oppressed, cruelly treated '
  '38':
  - type: text
    content: (people of whom the world was not worthy), wandering in deserts and mountains and [living in] caves and holes in the ground.
  '39':
  - type: text
    content: 'And all of these, though they gained [divine] approval through their faith, did not receive [the fulfillment of] what was promised, '
  '4':
  - type: text
    content: 'By faith Abel offered to God a more acceptable sacrifice than Cain, through which it was testified of him that he was righteous (upright, in right standing with God), and God testified by accepting his gifts. And though he died, yet through [this act of] faith he still speaks. [Gen 4:3-10] '
  '40':
  - type: text
    content: 'because God had us in mind '
  - type: text
    content: and
  - type: text
    content: ' had something better for us, so that they [these men and women of authentic faith] would not be made perfect [that is, completed in Him] apart from us.'
  '5':
  - type: text
    content: 'By faith [that pleased God] Enoch was caught up '
  - type: text
    content: and
  - type: text
    content: ' taken to heaven so that he would not have a glimpse of death; '
  - type: heading
    content: and he was not found because
  - type: text
    content: ' G'
  - type: heading
    content: od had taken him
  - type: text
    content: '; for even before he was taken [to heaven], he received the testimony [still on record] that he had walked with God '
  - type: text
    content: and
  - type: text
    content: ' pleased Him. [Gen 5:21-24] '
  '6':
  - type: text
    content: 'But without faith it is impossible to [walk with God and] please Him, for whoever comes [near] to God must [necessarily] believe that God exists and that He rewards those who [earnestly and diligently] seek Him. '
  '7':
  - type: text
    content: 'By faith [with confidence in God and His word] Noah, being warned '
  - type: text
    content: by God
  - type: text
    content: ' about events not yet seen, in reverence prepared an ark for the salvation of his family. By this [act of obedience] he condemned the world and became an heir of the righteousness which comes by faith. [Gen 6:13-22]'
  '8':
  - type: text
    content: 'By faith Abraham, when he was called [by God], obeyed by going to a place which he was to receive as an inheritance; and he went, not knowing where he was going. '
  '9':
  - type: text
    content: 'By faith he lived as a foreigner in the promised land, as in a strange '
  - type: text
    content: land,
  - type: text
    content: ' living in tents [as nomads] with Isaac and Jacob, who were fellow heirs of the same promise. [Gen 12:1-8] '
