    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then Abraham said [to Him], “Oh, may the Lord not be angry, and I will speak; suppose thirty [righteous people] are found there?” And He said, “I will not do it if I find thirty there.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And he said, “Now behold, I have decided to speak to the Lord [again]. Suppose [only] twenty [righteous people] are found there?” And the Lord said, “I will not destroy it for the sake of the twenty.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then Abraham said, “Oh may the Lord not be angry [with me], and I will speak only this once; suppose ten [righteous people] are found there?” And He said, “I will not destroy it for the sake of the ten.” '
  '33':
