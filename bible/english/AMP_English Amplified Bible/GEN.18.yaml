    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When he raised his eyes and looked up, behold, three men were standing [a little distance] from him. When he saw them, he ran from the tent door to meet them and bowed down [with his face] to the ground, '
