    content: 'Abraham answered, “Now behold, I who am but dust [in origin] and ashes have decided to speak to the Lord. [Gen 3:19; Job 30:19] '
  '28':
  - type: text
    content: 'If five of the fifty righteous are lacking, will You destroy the entire city for lack of five?” And He said, “If I find [at least] forty-five [righteous people] there, I will not destroy it.” '
  '29':
  - type: text
    content: 'Abraham spoke to Him yet again and said, “Suppose [only] forty are found there.” And He said, “I will not do it for the sake of the forty [who are righteous].” '
  '3':
  - type: text
    content: 'and Abraham said, “My '
  - type: note
    content: At some point during this encounter, Abraham understood that one of the three men was actually God appearing as a man (or as an angel; cf note 16:7), and he addressed Him as such in v 14. Verse 13 confirms that it was the Lord who spoke to him. The other two men were angels.
  - type: text
    content: 'lord, if now I have found favor in your sight, please do not pass by your servant [without stopping to visit]. '
  '30':
  - type: text
    content: 'Then Abraham said [to Him], “Oh, may the Lord not be angry, and I will speak; suppose thirty [righteous people] are found there?” And He said, “I will not do it if I find thirty there.” '
  '31':
  - type: text
    content: 'And he said, “Now behold, I have decided to speak to the Lord [again]. Suppose [only] twenty [righteous people] are found there?” And the Lord said, “I will not destroy it for the sake of the twenty.” '
  '32':
  - type: text
    content: 'Then Abraham said, “Oh may the Lord not be angry [with me], and I will speak only this once; suppose ten [righteous people] are found there?” And He said, “I will not destroy it for the sake of the ten.” '
