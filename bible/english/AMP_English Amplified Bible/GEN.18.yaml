    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'If five of the fifty righteous are lacking, will You destroy the entire city for lack of five?” And He said, “If I find [at least] forty-five [righteous people] there, I will not destroy it.” '
