  '6':
  - type: text
    content: 'So Abraham hurried into the tent to Sarah, and said, “Quickly, get ready three '
  - type: note
    content: Heb seim, plural of seah; since one seah equals about nine quarts, this was a large quantity. However, Abraham was asking Sarah to make cakes of bread which actually could be baked quickly because they were similar to pizza dough, that is, large, round, and flat. Together with the other food that Abraham provided (vv 7, 8), his promise of “a piece of bread” in v 5 was greatly understated, and the generous meal reflected the respect that he held for his special visitors.
  - type: text
    content: 'measures of fine meal, knead it and bake cakes.” '
