  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Abraham spoke to Him yet again and said, “Suppose [only] forty are found there.” And He said, “I will not do it for the sake of the forty [who are righteous].” '
  '3':
  - type: usfm
