    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Abraham answered, “Now behold, I who am but dust [in origin] and ashes have decided to speak to the Lord. [Gen 3:19; Job 30:19] '
  '28':
