        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' who spoke to him. The other two men were angels.'
      marker-yv: yv-n
    - type: text
      text: 'lord, if now I have found favor in your sight, please do not pass by your servant [without stopping to visit]. '
