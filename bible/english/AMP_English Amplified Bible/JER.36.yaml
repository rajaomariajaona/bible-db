document_id: JER.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah’s Scroll Read in the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the fourth year of Jehoiakim the son of Josiah, king of Judah, this word came to Jeremiah from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then Baruch read to all the people the words of Jeremiah from the scroll of the book in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in the chamber of Gemariah the son of Shaphan the scribe, in the upper court, at the entry of the New Gate of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When Micaiah the son of Gemariah, the son of Shaphan, had heard all the words of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from the scroll, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'he went down to the king’s house, into the scribe’s chamber; and behold, all the princes were sitting there: Elishama the scribe, Delaiah the son of Shemaiah, Elnathan the son of Achbor, Gemariah the son of Shaphan, Zedekiah the son of Hananiah, and all the [other] princes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Micaiah declared to them all the words that he had heard when Baruch read from the scroll to all the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Therefore all the princes sent Jehudi the son of Nethaniah, the son of Shelemiah, the son of Cushi, to Baruch, saying, “Take in your hand the scroll from which you have read to the people and come [to us].” So Baruch the son of Neriah took the scroll in his hand and went to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they said to him, “Sit down now and read it to us.” So Baruch read it to them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now when they had heard all the words, they turned one to another in fear and said to Baruch, “We must surely report all these words to the king.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And they asked Baruch, “Tell us now, how did you write all these words? At his (Jeremiah’s) dictation?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Baruch answered them, “He dictated all these words to me, and I wrote them with ink on the scroll.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then the princes said to Baruch, “Go and hide, you and Jeremiah, and do not let anyone know where you are.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Scroll Is Burned
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Take a scroll [of parchment] and write on it all the words which I have spoken to you concerning Israel and Judah, and all the nations, from the day I [first] spoke to you in the days of [King] Josiah until this day. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then they went into the court to the king, but they [first] put the scroll in the chamber of Elishama the scribe; then they reported all the words to the king. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So the king sent Jehudi to get the scroll, and he took it out of the chamber of Elishama the scribe. And Jehudi read it to the king and all the princes who stood beside the king. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Now it was the ninth month, and the king was sitting in the winter house, with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a fire
    - type: text
      text: ' burning there in the brazier before him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And after Jehudi had read three or four columns [of the scroll], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: King Jehoiakim
    - type: text
      text: ' would cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that portion
    - type: text
      text: ' with a scribe’s knife and throw it into the fire that was in the brazier, until the [entire] scroll was consumed by the fire. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Yet the king and all his servants who heard all these words were not afraid, nor did they tear their clothes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Even though Elnathan and Delaiah and Gemariah pleaded with the king not to burn the scroll, he would not listen to them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And the king commanded Jerahmeel the king’s son, Seraiah the son of Azriel, and Shelemiah the son of Abdeel to seize Baruch the scribe and Jeremiah the prophet, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hid them.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Scroll Is Replaced
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Jeremiah after the king had burned the scroll containing the words which Baruch had written at the dictation of Jeremiah: '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“Take another scroll and write on it all the former words that were on the first scroll which Jehoiakim the king of Judah burned. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And concerning Jehoiakim king of Judah you shall say, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “You have burned this scroll, saying, ‘Why have you written on it that the king of Babylon will certainly come and destroy this land, and will cut off man and beast from it?’ ” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: It may be that the house of Judah will hear all the disaster which I plan to bring on them, so that each one will turn from his evil way, that I may forgive their wickedness and their sin.” [Jer 18:7-10; 26:3]
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' concerning Jehoiakim king of Judah, “'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy concerning King Jehoiakim was fulfilled several years after these events. The king rebelled against Babylon (2 Kin 24:1) and was attacked by armies from various nations controlled by Babylon (2 Kin 24:2). He suffered a violent death and a disgraceful burial just as Jeremiah had foretold (Jer 22:13-19). In that passage, after scathing censure of the king, the Lord foretells through his prophet that Jehoiakim will be buried like a donkey—that is, with his body thrown outside the gates of Jerusalem (22:19).
      marker-yv: yv-n
    - type: text
      text: 'He shall have no heir to sit on the throne of David, and his dead body shall be thrown out to the heat of the day and to the frost of the night. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I will also punish him and his descendants and his servants for their wickedness, and I will bring on them and the inhabitants of Jerusalem and the men of Judah all the destruction that I have declared against them—but they would not listen.” ’ ”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Then Jeremiah took another scroll and gave it to Baruch the scribe, the son of Neriah, who wrote on it at the dictation of Jeremiah all the words of the scroll which Jehoiakim king of Judah had burned in the fire; and many similar words were added to them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then Jeremiah called Baruch the son of Neriah, and Baruch wrote on the scroll of the book all the words which Jeremiah dictated, [words] which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had spoken to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Jeremiah commanded Baruch, saying, “I am [in hiding, virtually] restrained; I cannot go into the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So you go to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house on a day of fasting and read from the scroll the words of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to the people which you have written as I dictated. And also you shall read them to all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people of
    - type: text
      text: ' Judah who come from their cities. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: It may be that their supplication [for mercy] will come before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and everyone will turn from his evil way, for great is the anger and the wrath that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has pronounced against this people.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Baruch the son of Neriah did everything that Jeremiah the prophet commanded him, reading from [Jeremiah’s scroll] the words of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now in the fifth year of Jehoiakim the son of Josiah, king of Judah, in the ninth month, a fast was proclaimed before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for all the people in Jerusalem and all the people who came to Jerusalem from the cities of Judah. '
