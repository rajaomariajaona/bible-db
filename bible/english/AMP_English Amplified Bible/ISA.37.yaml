document_id: ISA.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Seeks Isaiah’s Help
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And when King Hezekiah heard this, he tore his clothes and covered himself with sackcloth and went into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [2 Kin 19:1-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he sent Eliakim, who was in charge of the [royal] household, and Shebna the scribe, and the elders of the priests, covered with sackcloth, to Isaiah the prophet, the son of Amoz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They said to him, “This is what Hezekiah says, ‘This day is a day of distress, rebuke and disgrace; for children have come to birth, and there is no strength to deliver them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It may be that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will hear the words of the Rabshakeh [the commander], whom his master the king of Assyria has sent to taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God, and will avenge the words which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has heard. Therefore, offer a prayer for the remnant [of His people] that is left.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the servants of King Hezekiah came to Isaiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Isaiah said to them, “You shall say the following to your master: ‘This is what the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says, “Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have blasphemed Me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Listen carefully, I will put a spirit in him so that he will hear a rumor and return to his own land. And I will make him fall by the sword in his own land.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the Rabshakeh returned and found the king of Assyria fighting against Libnah [a fortified city of Judah], for he had heard that the king had left Lachish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And Sennacherib king of Assyria, heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' say concerning Tirhakah king of Cush (Ethiopia), “He has come out to fight against you.” And when he heard it, he sent messengers to Hezekiah, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“You shall say to Hezekiah king of Judah, ‘Do not let your God in whom you trust deceive you, saying, “Jerusalem will not be given into the hand of the king of Assyria.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Listen carefully, you have heard what the kings of Assyria have done to all lands, utterly destroying them. So will you be rescued? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Did the gods of the nations which my fathers destroyed rescue them—
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The place-names in this verse are all found on the Assyrian monuments. For further information, see E.S. Schrader, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Cuneiform Inscriptions and the Old Testament,
      - type: text
        text: ' and his comments on 2 Kin 19:12.'
    marker-yv: yv-n
  - type: text
    text: 'Gozan, Haran [of Mesopotamia], Rezeph, and the sons of Eden who were in Telassar? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Where is the king of Hamath, the king of Arpad [of northern Syria], the king of the city of Sepharvaim, [the king of] Hena, or [the king of] Ivvah?’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah’s Prayer in the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Hezekiah took the letter from the hand of the messengers and read it, and he went up to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and spread it out before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [2 Kin 19:14-19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And Hezekiah prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, God of Israel, who is enthroned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: above
  - type: text
    text: ' the cherubim, You are the God, You alone, of all the kingdoms of the earth. You have made heaven and earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Incline Your ear, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and hear; open Your eyes, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and see; and hear all the words of Sennacherib that he has sent to taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It is true, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that the kings of Assyria have laid waste all the countries and their lands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and have cast the gods [of those peoples] into the fire, for they were not gods but the work of men’s hands, wood and stone. Therefore they have destroyed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, save us from his hand so that all the kingdoms of the earth may know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fully realize that You alone, L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So DSS and 2 Kin 19:19; MT omits '
      - type: usfm
        marker: it
        children:
        - type: text
          text: God
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: God.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Answers through Isaiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Isaiah son of Amoz sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Hezekiah, saying, “For the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel says this, ‘Because you have prayed to Me about Sennacherib king of Assyria, [2 Kin 19:20-37; 2 Chr 32:20, 21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: this is the word that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken against him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “She has shown contempt for you and mocked you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Virgin Daughter of Zion (Jerusalem);
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has shaken her head behind you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Daughter of Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Whom have you taunted and blasphemed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against whom have you raised your voice
- type: usfm
  marker: q1
  children:
  - type: text
    text: And haughtily lifted up your eyes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against the Holy One of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Through your servants you have taunted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defied the Lord,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you have said, ‘With my many chariots I have gone up to the heights of the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the remotest parts of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cut down its tallest cedars and its choicest cypress trees;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will go to its remotest height, its most luxuriant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thickest forest.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '‘I dug '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wells
  - type: text
    text: ' and drank [foreign] waters,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the sole of my feet I dried up
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the canals [of the Nile] of Egypt.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Have you not heard [says the God of Israel]
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I did it long ago,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I planned it in ancient times?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I have brought it to pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you [king of Assyria] would [be My instrument to] turn fortified cities into ruinous heaps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Therefore their inhabitants had little power,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were terrorized and shamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were like the grass of the field and the green vegetation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like grass on the housetops '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' like a field [of grain] scorched before it is grown.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “But I know your sitting down
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your going out and your coming in [every detail of your life],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your raging against Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Because your raging against Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your arrogance has come up to My ears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put My hook in your nose
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And My bridle in your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lips
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will turn you back by the way you came.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“This shall be the sign [of these things] to you [Hezekiah]: you are to eat this year '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Called “second growth,” this ordinarily referred to uncultivated produce that grew during the Sabbath year (when sowing was forbidden) from seed that fell outside the boundaries of the field the preceding year.
    marker-yv: yv-n
  - type: text
    text: 'what grows of itself, and in the second year that which springs from the same, and in the third year you are to sow and harvest, and plant vineyards and eat their fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The surviving remnant of the house of Judah will again take root downward and bear fruit upward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For out of Jerusalem will come a remnant and from Mount Zion a band of survivors. The zeal of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will do this.” ’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “Therefore, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says this concerning the king of Assyria, ‘He will not come into this city or shoot an arrow there, or come before it with shield, or raise an assault ramp against it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: By the way that he came, by the same way he will return, and he will not come into this city,’ declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ‘For I will defend this city to save it, for My own sake and for the sake of My servant David.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Assyrians Destroyed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 16:7.
    marker-yv: yv-n
  - type: text
    text: angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' went out and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the fulfillment of the prophecy made in Is 31:8, 9. See also 10:33, 34; 14:25; 17:14; 30:31.
    marker-yv: yv-n
  - type: text
    text: 'struck 185,000 in the camp of the Assyrians; and when the [surviving] men got up early the next morning, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they saw
  - type: text
    text: ' all the dead. [2 Kin 19:35] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'So Sennacherib king of Assyria departed and returned and lived at Nineveh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: It came to pass as he was worshiping in the house of Nisroch his god, that Adrammelech and Sharezer his sons killed him with the sword; and they escaped into the land of Ararat [in Armenia]. And Esarhaddon his son became king in his place.
