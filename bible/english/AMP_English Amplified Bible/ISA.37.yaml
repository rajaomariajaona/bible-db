verses:
  '1':
  - type: heading
    content: Hezekiah Seeks Isaiah’s Help
  - type: text
    content: And when King Hezekiah heard this, he tore his clothes and covered himself with sackcloth and went into the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. [2 Kin 19:1-13] '
  '10':
  - type: text
    content: '“You shall say to Hezekiah king of Judah, ‘Do not let your God in whom you trust deceive you, saying, “Jerusalem will not be given into the hand of the king of Assyria.” '
  '11':
  - type: text
    content: 'Listen carefully, you have heard what the kings of Assyria have done to all lands, utterly destroying them. So will you be rescued? '
  '12':
  - type: text
    content: Did the gods of the nations which my fathers destroyed rescue them—
  - type: note
    content: The place-names in this verse are all found on the Assyrian monuments. For further information, see E.S. Schrader, Cuneiform Inscriptions and the Old Testament, and his comments on 2 Kin 19:12.
  - type: text
    content: 'Gozan, Haran [of Mesopotamia], Rezeph, and the sons of Eden who were in Telassar? '
  '13':
  - type: text
    content: Where is the king of Hamath, the king of Arpad [of northern Syria], the king of the city of Sepharvaim, [the king of] Hena, or [the king of] Ivvah?’ ”
  - type: heading
    content: Hezekiah’s Prayer in the Temple
  '14':
  - type: text
    content: Then Hezekiah took the letter from the hand of the messengers and read it, and he went up to the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and spread it out before the L'
  - type: heading
    content: ord
  - type: text
    content: '. [2 Kin 19:14-19] '
  '15':
  - type: text
    content: And Hezekiah prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' saying, '
  '16':
  - type: text
    content: “O L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, God of Israel, who is enthroned '
  - type: text
    content: above
  - type: text
    content: ' the cherubim, You are the God, You alone, of all the kingdoms of the earth. You have made heaven and earth. '
  '17':
  - type: text
    content: Incline Your ear, O L
  - type: heading
    content: ord
  - type: text
    content: ', and hear; open Your eyes, O L'
  - type: heading
    content: ord
  - type: text
    content: ', and see; and hear all the words of Sennacherib that he has sent to taunt '
  - type: text
    content: and
  - type: text
    content: ' defy the living God. '
  '18':
  - type: text
    content: It is true, O L
  - type: heading
    content: ord
  - type: text
    content: ', that the kings of Assyria have laid waste all the countries and their lands, '
  '19':
  - type: text
    content: 'and have cast the gods [of those peoples] into the fire, for they were not gods but the work of men’s hands, wood and stone. Therefore they have destroyed them. '
  '2':
  - type: text
    content: 'Then he sent Eliakim, who was in charge of the [royal] household, and Shebna the scribe, and the elders of the priests, covered with sackcloth, to Isaiah the prophet, the son of Amoz. '
  '20':
  - type: text
    content: Now, O L
  - type: heading
    content: ord
  - type: text
    content: ' our God, save us from his hand so that all the kingdoms of the earth may know '
  - type: text
    content: and
  - type: text
    content: ' fully realize that You alone, L'
  - type: heading
    content: ord
  - type: text
    content: ', are '
  - type: note
    content: So DSS and 2 Kin 19:19; MT omits God.
  - type: text
    content: God.”
  - type: heading
    content: God Answers through Isaiah
  '21':
  - type: text
    content: 'Then Isaiah son of Amoz sent '
  - type: text
    content: word
  - type: text
    content: ' to Hezekiah, saying, “For the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel says this, ‘Because you have prayed to Me about Sennacherib king of Assyria, [2 Kin 19:20-37; 2 Chr 32:20, 21] '
  '22':
  - type: text
    content: this is the word that the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken against him:'
  - type: text
    content: “She has shown contempt for you and mocked you,
  - type: text
    content: The Virgin Daughter of Zion (Jerusalem);
  - type: text
    content: She has shaken her head behind you,
  - type: text
    content: The Daughter of Jerusalem!
  '23':
  - type: text
    content: “Whom have you taunted and blasphemed?
  - type: text
    content: And against whom have you raised your voice
  - type: text
    content: And haughtily lifted up your eyes?
  - type: text
    content: Against the Holy One of Israel!
  '24':
  - type: text
    content: '“Through your servants you have taunted '
  - type: text
    content: and
  - type: text
    content: ' defied the Lord,'
  - type: text
    content: And you have said, ‘With my many chariots I have gone up to the heights of the mountains,
  - type: text
    content: To the remotest parts of Lebanon.
  - type: text
    content: I cut down its tallest cedars and its choicest cypress trees;
  - type: text
    content: 'And I will go to its remotest height, its most luxuriant '
  - type: text
    content: and
  - type: text
    content: ' thickest forest.'
  '25':
  - type: text
    content: '‘I dug '
  - type: text
    content: wells
  - type: text
    content: ' and drank [foreign] waters,'
  - type: text
    content: And with the sole of my feet I dried up
  - type: text
    content: All the canals [of the Nile] of Egypt.’
  '26':
  - type: text
    content: “Have you not heard [says the God of Israel]
  - type: text
    content: That I did it long ago,
  - type: text
    content: That I planned it in ancient times?
  - type: text
    content: Now I have brought it to pass,
  - type: text
    content: That you [king of Assyria] would [be My instrument to] turn fortified cities into ruinous heaps.
  '27':
  - type: text
    content: “Therefore their inhabitants had little power,
  - type: text
    content: They were terrorized and shamed;
  - type: text
    content: They were like the grass of the field and the green vegetation,
  - type: text
    content: 'Like grass on the housetops '
  - type: text
    content: and
  - type: text
    content: ' like a field [of grain] scorched before it is grown.'
  '28':
  - type: text
    content: “But I know your sitting down
  - type: text
    content: And your going out and your coming in [every detail of your life],
  - type: text
    content: And your raging against Me.
  '29':
  - type: text
    content: “Because your raging against Me
  - type: text
    content: And your arrogance has come up to My ears,
  - type: text
    content: I will put My hook in your nose
  - type: text
    content: 'And My bridle in your '
  - type: note
    content: Lit lips.
  - type: text
    content: mouth,
  - type: text
    content: And I will turn you back by the way you came.
  '3':
  - type: text
    content: 'They said to him, “This is what Hezekiah says, ‘This day is a day of distress, rebuke and disgrace; for children have come to birth, and there is no strength to deliver them. '
  '30':
  - type: text
    content: '“This shall be the sign [of these things] to you [Hezekiah]: you are to eat this year '
  - type: note
    content: Called “second growth,” this ordinarily referred to uncultivated produce that grew during the Sabbath year (when sowing was forbidden) from seed that fell outside the boundaries of the field the preceding year.
  - type: text
    content: 'what grows of itself, and in the second year that which springs from the same, and in the third year you are to sow and harvest, and plant vineyards and eat their fruit. '
  '31':
  - type: text
    content: 'The surviving remnant of the house of Judah will again take root downward and bear fruit upward. '
  '32':
  - type: text
    content: For out of Jerusalem will come a remnant and from Mount Zion a band of survivors. The zeal of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will do this.” ’'
  '33':
  - type: text
    content: “Therefore, the L
  - type: heading
    content: ord
  - type: text
    content: ' says this concerning the king of Assyria, ‘He will not come into this city or shoot an arrow there, or come before it with shield, or raise an assault ramp against it. '
  '34':
  - type: text
    content: By the way that he came, by the same way he will return, and he will not come into this city,’ declares the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '35':
  - type: text
    content: ‘For I will defend this city to save it, for My own sake and for the sake of My servant David.’ ”
  - type: heading
    content: Assyrians Destroyed
  '36':
  - type: text
    content: 'And the '
  - type: note
    content: See note Gen 16:7.
  - type: text
    content: angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' went out and '
  - type: note
    content: This is the fulfillment of the prophecy made in Is 31:8, 9. See also 10:33, 34; 14:25; 17:14; 30:31.
  - type: text
    content: 'struck 185,000 in the camp of the Assyrians; and when the [surviving] men got up early the next morning, '
  - type: text
    content: they saw
  - type: text
    content: ' all the dead. [2 Kin 19:35] '
  '37':
  - type: text
    content: 'So Sennacherib king of Assyria departed and returned and lived at Nineveh. '
  '38':
  - type: text
    content: It came to pass as he was worshiping in the house of Nisroch his god, that Adrammelech and Sharezer his sons killed him with the sword; and they escaped into the land of Ararat [in Armenia]. And Esarhaddon his son became king in his place.
  '4':
  - type: text
    content: It may be that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will hear the words of the Rabshakeh [the commander], whom his master the king of Assyria has sent to taunt '
  - type: text
    content: and
  - type: text
    content: ' defy the living God, and will avenge the words which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has heard. Therefore, offer a prayer for the remnant [of His people] that is left.’ ”'
  '5':
  - type: text
    content: 'So the servants of King Hezekiah came to Isaiah. '
  '6':
  - type: text
    content: 'Isaiah said to them, “You shall say the following to your master: ‘This is what the L'
  - type: heading
    content: ord
  - type: text
    content: ' says, “Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have blasphemed Me. '
  '7':
  - type: text
    content: Listen carefully, I will put a spirit in him so that he will hear a rumor and return to his own land. And I will make him fall by the sword in his own land.” ’ ”
  '8':
  - type: text
    content: 'So the Rabshakeh returned and found the king of Assyria fighting against Libnah [a fortified city of Judah], for he had heard that the king had left Lachish. '
  '9':
  - type: text
    content: 'And Sennacherib king of Assyria, heard '
  - type: text
    content: them
  - type: text
    content: ' say concerning Tirhakah king of Cush (Ethiopia), “He has come out to fight against you.” And when he heard it, he sent messengers to Hezekiah, saying, '
