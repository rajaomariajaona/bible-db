        - type: text
          text: mystery
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'testimony of God [concerning salvation through Christ], I did not come with superiority of speech or of wisdom [no lofty words of eloquence or of philosophy as a Greek orator might do]; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'for I made the decision to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In reality, Paul was a highly-trained student of the Old Testament writings, Jewish law, and of logic and rhetoric; and evidently he was conversant in Roman law as well. When preaching the gospel, however, he focused on the message itself and the power of God, and not on rhetorical techniques of persuasion (see vv 4, 5; cf 1:17).
    marker-yv: yv-n
  - type: text
    text: 'know nothing [that is, to forego philosophical or theological discussions regarding inconsequential things and opinions while] among you except Jesus Christ, and Him crucified [and the meaning of His redemptive, substitutionary death and His resurrection]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I came to you in [a state of] weakness and fear and great trembling. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And my message and my preaching were not in persuasive words of wisdom [using clever rhetoric], but [they were delivered] in demonstration of the [Holy] Spirit [operating through me] and of [His] power [stirring the minds of the listeners and persuading them], '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'so that your faith would not rest on the wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rhetoric of men, but on the power of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet we do speak wisdom among those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritually
  - type: text
    text: ' mature [believers who have teachable hearts and a greater understanding]; but [it is a higher] wisdom not [the wisdom] of this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: present
  - type: text
    text: ' age nor of the rulers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaders of this age, who are passing away; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but we speak God’s wisdom in a mystery, the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wisdom
  - type: text
    text: ' once hidden [from man, but now revealed to us by God, that wisdom] which God predestined before the ages to our glory [to lift us into the glory of His presence]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'None of the rulers of this age recognized '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understood this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wisdom;
  - type: text
    text: ' for if they had, they would not have crucified the Lord of glory; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
