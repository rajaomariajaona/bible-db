  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For God has unveiled them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' revealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to us through the [Holy] Spirit; for the Spirit searches all things [diligently], even [sounding and measuring] the [profound] depths of God [the divine counsels and things far beyond human understanding]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For what person knows the thoughts and motives of a man except the man’s spirit within him? So also no one knows the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thoughts
  - type: text
    text: ' of God except the Spirit of God. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now we have received, not the spirit of the world, but the [Holy] Spirit who is from God, so that we may know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand the [wonderful] things freely given to us by God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We also speak of these things, not in words taught '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' supplied by human wisdom, but in those taught by the Spirit, combining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpreting spiritual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thoughts
  - type: text
    text: ' with spiritual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: words
  - type: text
    text: ' [for those being guided by the Holy Spirit].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the natural [unbelieving] man does not accept the things [the teachings and revelations] of the Spirit of God, for they are foolishness [absurd and illogical] to him; and he is incapable of understanding them, because they are spiritually discerned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appreciated, [and he is unqualified to judge spiritual matters]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the spiritual man [the spiritually mature Christian] judges all things [questions, examines and applies what the Holy Spirit reveals], yet is himself judged by no one [the unbeliever cannot judge and understand the believer’s spiritual nature]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
