document_id: 2CH.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Passover Observed Again
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Josiah celebrated the Passover to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in Jerusalem; they slaughtered the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lambs
  - type: text
    text: ' on the fourteenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He appointed the priests to their positions and encouraged them in the service of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: To the Levites who taught all Israel and were holy to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' he said, “Put the holy ark in the house (temple) which Solomon the son of David king of Israel built; it shall not be a burden [carried] on your shoulders any longer. Now serve the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and His people Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yourselves
  - type: text
    text: ' according to your fathers’ (ancestors’) households by your divisions, in accordance with the instructions of David king of Israel, and the instructions of his son Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And stand in the holy place [of the priests] according to the sections of the fathers’ households of your fellow kinsmen the lay people, and according to the Levites, by division of [the families of] a father’s household. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Slaughter the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lambs
  - type: text
    text: ' and consecrate yourselves, and prepare for your fellow countrymen to carry out (obey) the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' by Moses.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Josiah contributed to the lay people, to all who were present, flocks of lambs and young goats numbering 30,000, all as Passover offerings, and 3,000 bulls—these were from the king’s property. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'His officers also contributed a voluntary offering to the people, the priests and the Levites. Hilkiah, Zechariah, and Jehiel, the officials of the house of God, gave to the priests for the Passover offerings 2,600 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from the flocks
  - type: text
    text: ' [of lambs and young goats], and 300 bulls. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Conaniah also, and Shemaiah and Nethanel, his brothers, and Hashabiah and Jeiel and Jozabad, officers of the Levites, contributed to the Levites for the Passover offerings 5,000 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from the flocks
  - type: text
    text: ' [of lambs and young goats], and 500 bulls.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the service was ready, the priests stood in their [assigned] places and the Levites by their divisions, in accordance with the king’s command. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They slaughtered the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lambs,
  - type: text
    text: ' and while the priests sprinkled the blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: received
  - type: text
    text: ' from their hand, the Levites skinned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the animals
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then they removed the burnt offerings, to distribute them to the sections of the fathers’ households of the lay people to offer to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', as it is written in the Book of Moses. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: They did
  - type: text
    text: ' the same with the bulls. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they roasted the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lambs
  - type: text
    text: ' on the fire according to the ordinance; and they cooked the holy offerings in pots, in kettles, and in pans, and quickly brought them to all the lay people. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Afterward the Levites prepared for themselves and for the priests, because the priests, the sons of Aaron, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were busy
  - type: text
    text: ' offering the burnt offerings and the fat until night; so the Levites prepared for themselves and for the priests, the sons of Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The singers, the sons of Asaph, were also in their places in accordance with the command of David, Asaph, Heman, and Jeduthun the king’s seer; and the gatekeepers at each gate did not need to leave their service, because their kinsmen the Levites prepared for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So all the service of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was prepared on that day to celebrate the Passover, and to offer burnt offerings on the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with the command of King Josiah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thus the sons of Israel who were present celebrated the Passover at that time, and the Feast of Unleavened Bread for seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'No Passover like it had been celebrated in Israel since the days of Samuel the prophet; nor had any of the kings of Israel celebrated such a Passover as Josiah did with the priests, the Levites, all Judah and Israel who were present, and the inhabitants of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In the eighteenth year of Josiah’s reign this Passover was celebrated.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josiah Dies in Battle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After all this, when Josiah had prepared the temple, Neco king of Egypt came up to make war at Carchemish on the Euphrates, and Josiah went out to meet him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But Neco sent messengers to Josiah, saying, “What business do we have with each other, O King of Judah? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I am
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: coming
  - type: text
    text: ' against you today, but against the house with which I am at war, and God has ordered me to hurry. Stop for your own sake from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: interfering with
  - type: text
    text: ' God who is with me, so that He will not destroy you.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Yet Josiah would not turn away from him, but disguised himself in order to fight against him. He did not listen to the words of Neco from the mouth of God, but came to fight against him on the plain of Megiddo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The archers shot King Josiah, and the king said to his servants, “Take me away, for I am badly wounded.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So his servants took him out of the chariot and carried him in the second chariot which he had, and brought him to Jerusalem where he died and was buried in the tombs of his fathers. All Judah and Jerusalem mourned for Josiah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Jeremiah sung a lament (funeral song) for Josiah, and all the male and female singers have spoken about Josiah in their laments to this day. They made the songs an ordinance in Israel; behold, they are written in the Lamentations. [Lam 4:20] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the rest of the acts of Josiah and his deeds of devotion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' godly achievements as written in the Law of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: and his acts, from the first to the last, behold, they are written in the Book of the Kings of Israel and Judah.
