document_id: 2CH.35,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover Observed Again
  - type: text
    content: Josiah celebrated the Passover to the L
  - type: heading
    content: ord
  - type: text
    content: ' in Jerusalem; they slaughtered the Passover '
  - type: text
    content: lambs
  - type: text
    content: ' on the fourteenth '
  - type: text
    content: day
  - type: text
    content: ' of the first month. '
  '10':
  - type: text
    content: 'When the service was ready, the priests stood in their [assigned] places and the Levites by their divisions, in accordance with the king’s command. '
  '11':
  - type: text
    content: 'They slaughtered the Passover '
  - type: text
    content: lambs,
  - type: text
    content: ' and while the priests sprinkled the blood '
  - type: text
    content: received
  - type: text
    content: ' from their hand, the Levites skinned '
  - type: text
    content: the animals
  - type: text
    content: '. '
  '12':
  - type: text
    content: Then they removed the burnt offerings, to distribute them to the sections of the fathers’ households of the lay people to offer to the L
  - type: heading
    content: ord
  - type: text
    content: ', as it is written in the Book of Moses. '
  - type: text
    content: They did
  - type: text
    content: ' the same with the bulls. '
  '13':
  - type: text
    content: 'So they roasted the Passover '
  - type: text
    content: lambs
  - type: text
    content: ' on the fire according to the ordinance; and they cooked the holy offerings in pots, in kettles, and in pans, and quickly brought them to all the lay people. '
  '14':
  - type: text
    content: 'Afterward the Levites prepared for themselves and for the priests, because the priests, the sons of Aaron, '
  - type: text
    content: were busy
  - type: text
    content: ' offering the burnt offerings and the fat until night; so the Levites prepared for themselves and for the priests, the sons of Aaron. '
  '15':
  - type: text
    content: The singers, the sons of Asaph, were also in their places in accordance with the command of David, Asaph, Heman, and Jeduthun the king’s seer; and the gatekeepers at each gate did not need to leave their service, because their kinsmen the Levites prepared for them.
  '16':
  - type: text
    content: So all the service of the L
  - type: heading
    content: ord
  - type: text
    content: ' was prepared on that day to celebrate the Passover, and to offer burnt offerings on the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with the command of King Josiah. '
  '17':
  - type: text
    content: 'Thus the sons of Israel who were present celebrated the Passover at that time, and the Feast of Unleavened Bread for seven days. '
  '18':
  - type: text
    content: 'No Passover like it had been celebrated in Israel since the days of Samuel the prophet; nor had any of the kings of Israel celebrated such a Passover as Josiah did with the priests, the Levites, all Judah and Israel who were present, and the inhabitants of Jerusalem. '
  '19':
  - type: text
    content: In the eighteenth year of Josiah’s reign this Passover was celebrated.
  - type: heading
    content: Josiah Dies in Battle
  '2':
  - type: text
    content: He appointed the priests to their positions and encouraged them in the service of the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'After all this, when Josiah had prepared the temple, Neco king of Egypt came up to make war at Carchemish on the Euphrates, and Josiah went out to meet him. '
  '21':
  - type: text
    content: 'But Neco sent messengers to Josiah, saying, “What business do we have with each other, O King of Judah? '
  - type: text
    content: I am
  - type: text
    content: ' not '
  - type: text
    content: coming
  - type: text
    content: ' against you today, but against the house with which I am at war, and God has ordered me to hurry. Stop for your own sake from '
  - type: text
    content: interfering with
  - type: text
    content: ' God who is with me, so that He will not destroy you.” '
  '22':
  - type: text
    content: 'Yet Josiah would not turn away from him, but disguised himself in order to fight against him. He did not listen to the words of Neco from the mouth of God, but came to fight against him on the plain of Megiddo. '
  '23':
  - type: text
    content: 'The archers shot King Josiah, and the king said to his servants, “Take me away, for I am badly wounded.” '
  '24':
  - type: text
    content: 'So his servants took him out of the chariot and carried him in the second chariot which he had, and brought him to Jerusalem where he died and was buried in the tombs of his fathers. All Judah and Jerusalem mourned for Josiah. '
  '25':
  - type: text
    content: 'Then Jeremiah sung a lament (funeral song) for Josiah, and all the male and female singers have spoken about Josiah in their laments to this day. They made the songs an ordinance in Israel; behold, they are written in the Lamentations. [Lam 4:20] '
  '26':
  - type: text
    content: 'Now the rest of the acts of Josiah and his deeds of devotion '
  - type: text
    content: and
  - type: text
    content: ' godly achievements as written in the Law of the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  '27':
  - type: text
    content: and his acts, from the first to the last, behold, they are written in the Book of the Kings of Israel and Judah.
  '3':
  - type: text
    content: To the Levites who taught all Israel and were holy to the L
  - type: heading
    content: ord
  - type: text
    content: ' he said, “Put the holy ark in the house (temple) which Solomon the son of David king of Israel built; it shall not be a burden [carried] on your shoulders any longer. Now serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and His people Israel. '
  '4':
  - type: text
    content: 'Prepare '
  - type: text
    content: yourselves
  - type: text
    content: ' according to your fathers’ (ancestors’) households by your divisions, in accordance with the instructions of David king of Israel, and the instructions of his son Solomon. '
  '5':
  - type: text
    content: 'And stand in the holy place [of the priests] according to the sections of the fathers’ households of your fellow kinsmen the lay people, and according to the Levites, by division of [the families of] a father’s household. '
  '6':
  - type: text
    content: 'Slaughter the Passover '
  - type: text
    content: lambs
  - type: text
    content: ' and consecrate yourselves, and prepare for your fellow countrymen to carry out (obey) the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: text
    content: given
  - type: text
    content: ' by Moses.”'
  '7':
  - type: text
    content: 'Then Josiah contributed to the lay people, to all who were present, flocks of lambs and young goats numbering 30,000, all as Passover offerings, and 3,000 bulls—these were from the king’s property. '
  '8':
  - type: text
    content: 'His officers also contributed a voluntary offering to the people, the priests and the Levites. Hilkiah, Zechariah, and Jehiel, the officials of the house of God, gave to the priests for the Passover offerings 2,600 '
  - type: text
    content: from the flocks
  - type: text
    content: ' [of lambs and young goats], and 300 bulls. '
  '9':
  - type: text
    content: 'Conaniah also, and Shemaiah and Nethanel, his brothers, and Hashabiah and Jeiel and Jozabad, officers of the Levites, contributed to the Levites for the Passover offerings 5,000 '
  - type: text
    content: from the flocks
  - type: text
    content: ' [of lambs and young goats], and 500 bulls.'
