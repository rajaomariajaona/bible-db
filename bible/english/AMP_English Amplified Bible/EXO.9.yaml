document_id: EXO.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Egyptian Livestock Die
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Go to Pharaoh and tell him, ‘Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of the Hebrews: “Let My people go, so that they may serve Me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took soot from the kiln, and stood before Pharaoh; and Moses threw it toward the sky, and it became boils erupting in sores on man and animal. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The magicians (soothsayer-priests) could not stand before Moses because of the boils, for the boils were on the magicians as well as on all the Egyptians. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' hardened the heart of Pharaoh, and he did not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pay attention to them, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had told Moses.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Get up early in the morning and stand before Pharaoh and say to him, ‘Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of the Hebrews, “Let My people go, so that they may serve Me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this time I will send all My plagues '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to your heart
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on you [in full force,] and on your servants and on your people, so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge that there is no one like Me in all the earth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by now I could have put out My hand and struck you and your people with a pestilence, and you would then have been cut off (obliterated) from the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But indeed for this very reason I have allowed you to live, in order to show you My power and in order that My name may be proclaimed throughout all the earth. [Rom 9:17-24]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Plague of Hail
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Since you are still [arrogantly] exalting yourself [in defiance] against My people by not letting them go, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'hear this: tomorrow about this time I will send a very heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dreadful hail, such as has not been seen in Egypt from the day it was founded until now. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now therefore send [a message], bring your livestock and whatever you have in the field to safety. Every man and animal that is in the field and is not brought home shall be struck by the hail and shall die.” ’ ” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you refuse to let them go and continue to hold them, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then everyone among the servants of Pharaoh who feared the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made his servants and his livestock flee into the houses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shelters; '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but everyone who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: did not set his heart on
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ignored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' did not take seriously the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' left his servants and his livestock in the field.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Stretch out your hand [with your staff] toward the sky, so that there may be hail in all the land of Egypt, on man and on animal and on all the vegetation of the field, throughout the land of Egypt.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses stretched out his staff toward the sky, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent thunder and hail, and lightning (fireballs) ran down to the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' along the ground. And the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rained hail on the land of Egypt. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So there was hail, and lightning (fireballs) flashing intermittently in the midst of the extremely heavy hail, such as had not been in all the land of Egypt since it became a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hail struck down everything that was in the field throughout all the land of Egypt, both man and animal; the hail struck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beat down all the plants in the field and shattered every tree in the field. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only in the land of Goshen, where the children of Israel lived, was there no hail.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh sent for Moses and Aaron, and said to them, “I have sinned this time; the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is righteous, and I and my people are wicked. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entreat the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for there has been enough of God’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sounds
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'thunder and hail; I will let you go, and you shall stay here no longer.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said to him, “As soon as I leave the city, I will stretch out my hands to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; the thunder will cease and there will be no more hail, so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge that the earth is the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'now hear this: the hand of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will fall on your livestock which are out in the field, on the horses, the donkeys, the camels, the herds, and the flocks—a horrible plague shall come. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as for you and your servants, I know that you do not yet fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Now the flax and the barley were battered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined [by the hail], because the barley was in the ear (ripe, but soft) and the flax was in bud, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the wheat and spelt (coarse wheat) were not battered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined, because they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ripen
    - type: text
      text: ' late in the season.) '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses left the city and Pharaoh, and stretched out his hands to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; then the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sounds
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'thunder and hail ceased, and rain no longer poured on the earth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Pharaoh saw that the rain and the hail and the thunder had ceased, he sinned again and hardened his heart, both he and his servants. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh’s heart was hardened, and he did not let the Israelites go, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said through Moses. [Ex 4:21]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will make a distinction between the livestock of Israel and the livestock of Egypt, so that nothing that belongs to the Israelites will die.” ’ ” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' set a [definite] time, saying, “Tomorrow the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will do this thing in the land.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did this thing the next day, and all [kinds of] the livestock of Egypt died; but of the livestock of the Israelites, not one died. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh sent [men to investigate], and not even one of the livestock of the Israelites had died. But the heart of Pharaoh was hardened [and his mind was firmly set], and he did not let the people go.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Plague of Boils
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses and Aaron, “Take handfuls of soot from the brick kiln, and let Moses throw it toward the sky in the sight of Pharaoh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It will become fine dust over the entire land of Egypt, and it will become boils breaking out in sores on man and animal in all the land [occupied by the Egyptians].” '
