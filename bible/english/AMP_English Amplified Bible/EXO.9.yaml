  '1':
  - type: heading
    content: Egyptian Livestock Die
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Go to Pharaoh and tell him, ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of the Hebrews: “Let My people go, so that they may serve Me. '
  '10':
  - type: text
    content: 'So they took soot from the kiln, and stood before Pharaoh; and Moses threw it toward the sky, and it became boils erupting in sores on man and animal. '
  '11':
  - type: text
    content: 'The magicians (soothsayer-priests) could not stand before Moses because of the boils, for the boils were on the magicians as well as on all the Egyptians. '
  '12':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' hardened the heart of Pharaoh, and he did not listen '
  - type: text
    content: or
  - type: text
    content: ' pay attention to them, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had told Moses.'
  '13':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Get up early in the morning and stand before Pharaoh and say to him, ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of the Hebrews, “Let My people go, so that they may serve Me. '
  '14':
  - type: text
    content: 'For this time I will send all My plagues '
  - type: note
    content: Lit to your heart.
  - type: text
    content: 'on you [in full force,] and on your servants and on your people, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that there is no one like Me in all the earth. '
  '15':
  - type: text
    content: 'For by now I could have put out My hand and struck you and your people with a pestilence, and you would then have been cut off (obliterated) from the earth. '
  '16':
  - type: text
    content: But indeed for this very reason I have allowed you to live, in order to show you My power and in order that My name may be proclaimed throughout all the earth. [Rom 9:17-24]
  - type: heading
    content: The Plague of Hail
  '17':
  - type: text
    content: 'Since you are still [arrogantly] exalting yourself [in defiance] against My people by not letting them go, '
  '18':
  - type: text
    content: 'hear this: tomorrow about this time I will send a very heavy '
  - type: text
    content: and
  - type: text
    content: ' dreadful hail, such as has not been seen in Egypt from the day it was founded until now. '
  '19':
  - type: text
    content: 'Now therefore send [a message], bring your livestock and whatever you have in the field to safety. Every man and animal that is in the field and is not brought home shall be struck by the hail and shall die.” ’ ” '
  '2':
  - type: text
    content: 'But if you refuse to let them go and continue to hold them, '
  '20':
  - type: text
    content: Then everyone among the servants of Pharaoh who feared the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' made his servants and his livestock flee into the houses '
  - type: text
    content: and
  - type: text
    content: ' shelters; '
  '21':
  - type: text
    content: 'but everyone who '
  - type: note
    content: Lit did not set his heart on.
  - type: text
    content: 'ignored '
  - type: text
    content: and
  - type: text
    content: ' did not take seriously the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' left his servants and his livestock in the field.'
  '22':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Stretch out your hand [with your staff] toward the sky, so that there may be hail in all the land of Egypt, on man and on animal and on all the vegetation of the field, throughout the land of Egypt.” '
  '23':
  - type: text
    content: Moses stretched out his staff toward the sky, and the L
  - type: heading
    content: ord
  - type: text
    content: ' sent thunder and hail, and lightning (fireballs) ran down to the earth '
  - type: text
    content: and
  - type: text
    content: ' along the ground. And the L'
  - type: heading
    content: ord
  - type: text
    content: ' rained hail on the land of Egypt. '
  '24':
  - type: text
    content: 'So there was hail, and lightning (fireballs) flashing intermittently in the midst of the extremely heavy hail, such as had not been in all the land of Egypt since it became a nation. '
  '25':
  - type: text
    content: 'The hail struck down everything that was in the field throughout all the land of Egypt, both man and animal; the hail struck '
  - type: text
    content: and
  - type: text
    content: ' beat down all the plants in the field and shattered every tree in the field. '
  '26':
  - type: text
    content: Only in the land of Goshen, where the children of Israel lived, was there no hail.
  '27':
  - type: text
    content: Then Pharaoh sent for Moses and Aaron, and said to them, “I have sinned this time; the L
  - type: heading
    content: ord
  - type: text
    content: ' is righteous, and I and my people are wicked. '
  '28':
  - type: text
    content: 'Pray '
  - type: text
    content: and
  - type: text
    content: ' entreat the L'
  - type: heading
    content: ord
  - type: text
    content: ', for there has been enough of God’s '
  - type: note
    content: Lit sounds.
  - type: text
    content: 'thunder and hail; I will let you go, and you shall stay here no longer.” '
  '29':
  - type: text
    content: Moses said to him, “As soon as I leave the city, I will stretch out my hands to the L
  - type: heading
    content: ord
  - type: text
    content: '; the thunder will cease and there will be no more hail, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that the earth is the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'now hear this: the hand of the L'
  - type: heading
    content: ord
  - type: text
    content: ' will fall on your livestock which are out in the field, on the horses, the donkeys, the camels, the herds, and the flocks—a horrible plague shall come. '
  '30':
  - type: text
    content: But as for you and your servants, I know that you do not yet fear the L
  - type: heading
    content: ord
  - type: text
    content: ' God.” '
  '31':
  - type: text
    content: '(Now the flax and the barley were battered '
  - type: text
    content: and
  - type: text
    content: ' ruined [by the hail], because the barley was in the ear (ripe, but soft) and the flax was in bud, '
  '32':
  - type: text
    content: 'but the wheat and spelt (coarse wheat) were not battered '
  - type: text
    content: and
  - type: text
    content: ' ruined, because they '
  - type: text
    content: ripen
  - type: text
    content: ' late in the season.) '
  '33':
  - type: text
    content: So Moses left the city and Pharaoh, and stretched out his hands to the L
  - type: heading
    content: ord
  - type: text
    content: '; then the '
  - type: note
    content: Lit sounds.
  - type: text
    content: 'thunder and hail ceased, and rain no longer poured on the earth. '
  '34':
  - type: text
    content: 'But when Pharaoh saw that the rain and the hail and the thunder had ceased, he sinned again and hardened his heart, both he and his servants. '
  '35':
  - type: text
    content: Pharaoh’s heart was hardened, and he did not let the Israelites go, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had said through Moses. [Ex 4:21]'
  '4':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' will make a distinction between the livestock of Israel and the livestock of Egypt, so that nothing that belongs to the Israelites will die.” ’ ” '
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' set a [definite] time, saying, “Tomorrow the L'
  - type: heading
    content: ord
  - type: text
    content: ' will do this thing in the land.” '
  '6':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' did this thing the next day, and all [kinds of] the livestock of Egypt died; but of the livestock of the Israelites, not one died. '
  '7':
  - type: text
    content: Then Pharaoh sent [men to investigate], and not even one of the livestock of the Israelites had died. But the heart of Pharaoh was hardened [and his mind was firmly set], and he did not let the people go.
  - type: heading
    content: The Plague of Boils
  '8':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses and Aaron, “Take handfuls of soot from the brick kiln, and let Moses throw it toward the sky in the sight of Pharaoh. '
  '9':
  - type: text
    content: 'It will become fine dust over the entire land of Egypt, and it will become boils breaking out in sores on man and animal in all the land [occupied by the Egyptians].” '
