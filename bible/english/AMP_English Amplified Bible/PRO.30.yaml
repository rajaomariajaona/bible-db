document_id: PRO.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Words of Agur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identity of Agur, author of this chapter, is uncertain.
      marker-yv: yv-n
    - type: text
      text: 'Agur the son of Jakeh, the oracle:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'he man says to Ithiel, to Ithiel and to Ucal:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Do not slander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' malign a servant before his master [stay out of another’s personal life],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or he will curse you [for your interference], and you will be found guilty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶There is a generation (class of people) that curses its father
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not bless its mother.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a generation (class of people) that is pure in its own eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet is not washed from its filthiness.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a generation (class of people)—oh, how lofty are their eyes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their eyelids are raised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in arrogance.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a generation (class of people) whose teeth are like swords
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose jaw teeth are like knives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To devour the afflicted from the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the needy from among men.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The leech has two daughters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Give, give!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are three things that are never satisfied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Four that do not say, “It is enough”:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hades, the nether world, the place of the dead.
      marker-yv: yv-n
    - type: text
      text: Sheol, and the barren womb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth that is never satisfied with water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fire that never says, “It is enough.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eye that mocks a father
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And scorns a mother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ravens of the valley will pick it out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the young vultures will devour it. [Lev 20:9; Prov 20:20; 23:22]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶There are three things which are too astounding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unexpectedly wonderful for me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Four which I do not understand:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of an eagle in the air,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of a serpent on a rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The way of a ship in the middle of the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the way of a man with a maid.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be viewed as either a sarcastic response to an unknown critic, or simply the sincere reflections of a humble man.
      marker-yv: yv-n
    - type: text
      text: 'I am more brutish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stupid than any man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I do not have the understanding of a man [for I do not know what I do not know].
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the way of an adulterous woman:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She eats and wipes her mouth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And says, “I have done no wrong.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Under three things the earth is disquieted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' quakes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And under four it cannot bear up:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Under a servant when he reigns,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Under
    - type: text
      text: ' a [spiritually blind] fool when he is filled with food,'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Under an unloved woman when she gets married,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: under
    - type: text
      text: ' a maidservant when she supplants her mistress.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶There are four things that are small on the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But they are exceedingly wise:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ants are not a strong people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they prepare their food in the summer; [Prov 6:6]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Small, shy, furry animals, (
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hyrax syriacus)
        - type: text
          text: ' found in the peninsula of the Sinai, northern Israel, and in the region around the Dead Sea; KJV '
        - type: usfm
          marker: it
          children:
          - type: text
            text: coney,
        - type: text
          text: ' orig NASB '
        - type: usfm
          marker: it
          children:
          - type: text
            text: badgers
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: shephanim are not a mighty folk,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they make their houses in the rocks; [Ps 104:18]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The locusts have no king,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet all of them go out in groups;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You may grasp the lizard with your hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet it is in kings’ palaces.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶There are three things which are stately in step,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even four which are stately in their stride:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not learned [skillful and godly] wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor do I have knowledge of the Holy One [who is the source of wisdom].
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lion, which is mighty among beasts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not turn back before any;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: girt in the loins.
        - type: text
          text: ' The meaning of the Hebrew is unclear. Other translations propose '
        - type: usfm
          marker: it
          children:
          - type: text
            text: greyhound
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: strutting rooster, the male goat also,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when his
    - type: text
      text: ' army is with him.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶If you have foolishly exalted yourself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or if you have plotted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evil, put your
    - type: text
      text: ' hand on your mouth. [Job 21:5; 40:4]'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely the churning of milk produces butter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wringing the nose produces blood;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the churning of anger produces strife.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has ascended into heaven and descended?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has gathered the wind in His fists?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has bound the waters in His garment?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has established all the ends of the earth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is His name, and what is His Son’s name?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certainly you know! [John 3:13; Rev 19:12]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Every word of God is tested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refined [like silver];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is a shield to those who trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge in Him. [Ps 18:30; 84:11; 115:9-11]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not add to His words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or He will reprove you, and you will be found a liar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Two things I have asked of You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not deny them to me before I die:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep deception and lies far from me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me neither poverty nor riches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feed me with the food that is my portion,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that I will not be full and deny You and say, “Who is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or that I will not be poor and steal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so profane the name of my God. [Deut 8:12, 14, 17; Neh 9:25, 26; Job 31:24; Hos 13:6]
