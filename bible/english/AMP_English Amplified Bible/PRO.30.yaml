verses:
  '1':
  - type: heading
    content: The Words of Agur
  - type: text
    content: 'The words of '
  - type: note
    content: The identity of Agur, author of this chapter, is uncertain.
  - type: text
    content: 'Agur the son of Jakeh, the oracle:'
  - type: text
    content: T
  - type: text
    content: 'he man says to Ithiel, to Ithiel and to Ucal:'
  '10':
  - type: text
    content: '¶Do not slander '
  - type: text
    content: or
  - type: text
    content: ' malign a servant before his master [stay out of another’s personal life],'
  - type: text
    content: Or he will curse you [for your interference], and you will be found guilty.
  '11':
  - type: text
    content: ¶There is a generation (class of people) that curses its father
  - type: text
    content: And does not bless its mother.
  '12':
  - type: text
    content: There is a generation (class of people) that is pure in its own eyes,
  - type: text
    content: Yet is not washed from its filthiness.
  '13':
  - type: text
    content: There is a generation (class of people)—oh, how lofty are their eyes!
  - type: text
    content: 'And their eyelids are raised '
  - type: text
    content: in arrogance.
  '14':
  - type: text
    content: There is a generation (class of people) whose teeth are like swords
  - type: text
    content: And whose jaw teeth are like knives,
  - type: text
    content: To devour the afflicted from the earth
  - type: text
    content: And the needy from among men.
  '15':
  - type: text
    content: ¶The leech has two daughters,
  - type: text
    content: “Give, give!”
  - type: text
    content: There are three things that are never satisfied,
  - type: text
    content: 'Four that do not say, “It is enough”:'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Hades, the nether world, the place of the dead.
  - type: text
    content: Sheol, and the barren womb,
  - type: text
    content: Earth that is never satisfied with water,
  - type: text
    content: And fire that never says, “It is enough.”
  '17':
  - type: text
    content: The eye that mocks a father
  - type: text
    content: And scorns a mother,
  - type: text
    content: The ravens of the valley will pick it out,
  - type: text
    content: And the young vultures will devour it. [Lev 20:9; Prov 20:20; 23:22]
  '18':
  - type: text
    content: '¶There are three things which are too astounding '
  - type: text
    content: and
  - type: text
    content: ' unexpectedly wonderful for me,'
  - type: text
    content: 'Four which I do not understand:'
  '19':
  - type: text
    content: The way of an eagle in the air,
  - type: text
    content: The way of a serpent on a rock,
  - type: text
    content: The way of a ship in the middle of the sea,
  - type: text
    content: And the way of a man with a maid.
  '2':
  - type: text
    content: 'Surely '
  - type: note
    content: This may be viewed as either a sarcastic response to an unknown critic, or simply the sincere reflections of a humble man.
  - type: text
    content: 'I am more brutish '
  - type: text
    content: and
  - type: text
    content: ' stupid than any man,'
  - type: text
    content: And I do not have the understanding of a man [for I do not know what I do not know].
  '20':
  - type: text
    content: 'This is the way of an adulterous woman:'
  - type: text
    content: She eats and wipes her mouth
  - type: text
    content: And says, “I have done no wrong.”
  '21':
  - type: text
    content: '¶Under three things the earth is disquieted '
  - type: text
    content: and
  - type: text
    content: ' quakes,'
  - type: text
    content: 'And under four it cannot bear up:'
  '22':
  - type: text
    content: Under a servant when he reigns,
  - type: text
    content: Under
  - type: text
    content: ' a [spiritually blind] fool when he is filled with food,'
  '23':
  - type: text
    content: Under an unloved woman when she gets married,
  - type: text
    content: 'And '
  - type: text
    content: under
  - type: text
    content: ' a maidservant when she supplants her mistress.'
  '24':
  - type: text
    content: ¶There are four things that are small on the earth,
  - type: text
    content: 'But they are exceedingly wise:'
  '25':
  - type: text
    content: The ants are not a strong people,
  - type: text
    content: Yet they prepare their food in the summer; [Prov 6:6]
  '26':
  - type: text
    content: 'The '
  - type: note
    content: Small, shy, furry animals, (Hyrax syriacus) found in the peninsula of the Sinai, northern Israel, and in the region around the Dead Sea; KJV coney, orig NASB badgers.
  - type: text
    content: shephanim are not a mighty folk,
  - type: text
    content: Yet they make their houses in the rocks; [Ps 104:18]
  '27':
  - type: text
    content: The locusts have no king,
  - type: text
    content: Yet all of them go out in groups;
  '28':
  - type: text
    content: You may grasp the lizard with your hands,
  - type: text
    content: Yet it is in kings’ palaces.
  '29':
  - type: text
    content: ¶There are three things which are stately in step,
  - type: text
    content: 'Even four which are stately in their stride:'
  '3':
  - type: text
    content: I have not learned [skillful and godly] wisdom,
  - type: text
    content: Nor do I have knowledge of the Holy One [who is the source of wisdom].
  '30':
  - type: text
    content: The lion, which is mighty among beasts
  - type: text
    content: And does not turn back before any;
  '31':
  - type: text
    content: 'The '
  - type: note
    content: Lit girt in the loins. The meaning of the Hebrew is unclear. Other translations propose greyhound.
  - type: text
    content: strutting rooster, the male goat also,
  - type: text
    content: 'And the king '
  - type: text
    content: when his
  - type: text
    content: ' army is with him.'
  '32':
  - type: text
    content: ¶If you have foolishly exalted yourself,
  - type: text
    content: 'Or if you have plotted '
  - type: text
    content: evil, put your
  - type: text
    content: ' hand on your mouth. [Job 21:5; 40:4]'
  '33':
  - type: text
    content: Surely the churning of milk produces butter,
  - type: text
    content: And wringing the nose produces blood;
  - type: text
    content: So the churning of anger produces strife.
  '4':
  - type: text
    content: Who has ascended into heaven and descended?
  - type: text
    content: Who has gathered the wind in His fists?
  - type: text
    content: Who has bound the waters in His garment?
  - type: text
    content: Who has established all the ends of the earth?
  - type: text
    content: What is His name, and what is His Son’s name?
  - type: text
    content: Certainly you know! [John 3:13; Rev 19:12]
  '5':
  - type: text
    content: '¶Every word of God is tested '
  - type: text
    content: and
  - type: text
    content: ' refined [like silver];'
  - type: text
    content: 'He is a shield to those who trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge in Him. [Ps 18:30; 84:11; 115:9-11]'
  '6':
  - type: text
    content: Do not add to His words,
  - type: text
    content: Or He will reprove you, and you will be found a liar.
  '7':
  - type: text
    content: ¶Two things I have asked of You;
  - type: text
    content: 'Do not deny them to me before I die:'
  '8':
  - type: text
    content: Keep deception and lies far from me;
  - type: text
    content: Give me neither poverty nor riches;
  - type: text
    content: Feed me with the food that is my portion,
  '9':
  - type: text
    content: So that I will not be full and deny You and say, “Who is the L
  - type: heading
    content: ord
  - type: text
    content: ?”
  - type: text
    content: Or that I will not be poor and steal,
  - type: text
    content: And so profane the name of my God. [Deut 8:12, 14, 17; Neh 9:25, 26; Job 31:24; Hos 13:6]
