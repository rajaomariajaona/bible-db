    - type: text
      text: Zophar Rebukes Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Zophar the Naamathite answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Shall a multitude of words not be answered?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And should a talkative man [making such a long-winded defense] be acquitted?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Should your boasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' babble silence men?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shall you scoff and no one put you to shame?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “For you have said, ‘My teaching (doctrine) [that God knowingly afflicts the righteous] is pure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I am innocent in your eyes.’ [Job 10:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “But oh, that God would speak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And open His lips [to speak] against you,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And [that He would] show you the secrets of wisdom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For sound wisdom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: is double
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: has two sides.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Know therefore that God forgets a part of your wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Can you discover the depths of God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can you [by searching] discover the limits of the Almighty [ascend to His heights, extend to His widths, and comprehend His infinite perfection]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: His wisdom
  - type: text
    text: ' is as high as the heights of heaven. What can you do?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is deeper than Sheol (the nether world, the place of the dead). What can you know?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “It is longer in measure [and scope] than the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And broader than the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “If God passes by or arrests,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or calls an assembly [of judgment], who can restrain Him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[If He is against a man, who can call Him to account for it?]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“For He recognizes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knows false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless men,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He sees wickedness, will He not consider it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“But a hollow (empty-headed) man will become intelligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Only] when the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: male donkey
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: colt of a wild donkey is born as a man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“If you direct your heart [on the right path]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And stretch out your hands to Him,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If sin is in your hand, put it far away [from you],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not let wrongdoing dwell in your tents;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then, indeed, you could lift up your face [to Him] without '
  - type: usfm
    marker: it
    children:
    - type: text
      text: moral
  - type: text
    text: ' defect,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you would be firmly established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secure and not fear.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “For you would forget your trouble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You would remember it as waters that have passed by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“And your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lifespan
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: life would be brighter than the noonday;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Darkness [then] would be like the morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Then you would trust [with confidence], because there is hope;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You would look around you and rest securely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “You would lie down with no one to frighten you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And many would entreat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek your favor.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “But the eyes of the wicked will fail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will not escape [the justice of God];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their hope is to breathe their last [and die].”
