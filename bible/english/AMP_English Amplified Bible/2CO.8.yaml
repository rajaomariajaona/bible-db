document_id: 2CO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Great Generosity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, brothers and sisters, we want to tell you about the grace of God which has been evident in the churches of Macedonia [awakening in them a longing to contribute]; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'for during an ordeal of severe distress, their abundant joy and their deep poverty [together] overflowed in the wealth of their lavish generosity. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I testify that according to their ability, and beyond their ability, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they gave
  - type: text
    text: ' voluntarily, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'begging us insistently for the privilege of participating in the service for [the support of] the saints [in Jerusalem]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Not only [did they give materially] as we had hoped, but first they gave themselves to the Lord and to us [as His representatives] by the will of God [disregarding their personal interests and giving as much as they possibly could]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So we urged Titus that, as he began it, he should also complete this gracious work among you as well.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But just as you excel in everything, [and lead the way] in faith, in speech, in knowledge, in genuine concern, and in your love for us, see that you excel in this gracious work [of giving] also. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I am not saying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' as a command [to dictate to you], but to prove, by [pointing out] the enthusiasm of others, the sincerity of your love as well. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For you are recognizing [more clearly] the grace of our Lord Jesus Christ [His astonishing kindness, His generosity, His gracious favor], that though He was rich, yet for your sake He became poor, so that by His poverty you might become rich (abundantly blessed). '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I give you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my
  - type: text
    text: ' opinion in this matter: this is to your advantage, who were the first to begin a year ago not only to take action [to help the believers in Jerusalem], but also [the first] to desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to do it
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So now finish this, so that your eagerness in desiring it may be equaled by your completion of it, according to your ability. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For if the eagerness [to give] is there, it is acceptable according to what one has, not according to what he does not have. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it is not [intended] that others be relieved [of their responsibility] and that you be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: afflicted
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'burdened [unfairly], but '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from equality
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'that there be equality [in sharing the burden]— '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'at this present time your surplus [over necessities] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is going
  - type: text
    text: ' to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: supply
  - type: text
    text: ' their need, so that [at some other time] their surplus may be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: supply
  - type: text
    text: ' your need, that there may be equality; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: as it is written [in Scripture], “H
  - type: usfm
    marker: sc
    children:
    - type: text
      text: e who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gathered
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: much did not have too much
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and he who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gathered
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: little did not lack
  - type: text
    text: .” [Ex 16:18]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But thanks be to God who puts the same genuine concern for you in the heart of Titus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For Titus not only accepted our appeal, but was so very interested in you that he has gone to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: visit
  - type: text
    text: ' you of his own accord. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And we have sent along with him the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identity of this man is unknown—perhaps it was Luke.
    marker-yv: yv-n
  - type: text
    text: 'brother who is praised in the gospel [ministry] throughout all the churches; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and not only '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this,
  - type: text
    text: ' but he has also been appointed by the churches to travel with us in regard to this gracious offering which we are administering for the glory of the Lord Himself, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to show
  - type: text
    text: ' our eagerness [as believers to help one another]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We are taking precaution so that no one will [find anything with which to] discredit us in our administration of this generous gift. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For we have regard for what is honorable [and above suspicion], not only in the sight of the Lord, but also in the sight of men. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'We have sent with them our brother, whom we have often tested and found to be diligent in many things, but who is now even more diligent [than ever] because of his great confidence in you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'As for Titus, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he is
  - type: text
    text: ' my partner and fellow worker in your service; and as for the [other two] brothers, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they are
  - type: text
    text: ' [special] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apostles,
      - type: text
        text: ' but not a reference to the original apostles.'
    marker-yv: yv-n
  - type: text
    text: 'messengers of the churches, a glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' credit to Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Therefore, show these men, in the sight of the churches, the proof of your love and our reason for being proud of you.
