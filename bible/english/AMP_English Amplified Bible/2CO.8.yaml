  - type: text
    content: to do it
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'So now finish this, so that your eagerness in desiring it may be equaled by your completion of it, according to your ability. '
  '12':
  - type: text
    content: 'For if the eagerness [to give] is there, it is acceptable according to what one has, not according to what he does not have. '
  '13':
