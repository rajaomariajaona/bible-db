  - type: text
    content: 'brother who is praised in the gospel [ministry] throughout all the churches; '
  '19':
  - type: text
    content: 'and not only '
  - type: text
    content: this,
  - type: text
    content: ' but he has also been appointed by the churches to travel with us in regard to this gracious offering which we are administering for the glory of the Lord Himself, and '
  - type: text
    content: to show
  - type: text
    content: ' our eagerness [as believers to help one another]. '
  '2':
  - type: text
    content: 'for during an ordeal of severe distress, their abundant joy and their deep poverty [together] overflowed in the wealth of their lavish generosity. '
  '20':
  - type: text
    content: 'We are taking precaution so that no one will [find anything with which to] discredit us in our administration of this generous gift. '
  '21':
  - type: text
    content: 'For we have regard for what is honorable [and above suspicion], not only in the sight of the Lord, but also in the sight of men. '
  '22':
  - type: text
    content: 'We have sent with them our brother, whom we have often tested and found to be diligent in many things, but who is now even more diligent [than ever] because of his great confidence in you. '
  '23':
  - type: text
    content: 'As for Titus, '
  - type: text
    content: he is
  - type: text
    content: ' my partner and fellow worker in your service; and as for the [other two] brothers, '
  - type: text
    content: they are
  - type: text
