  - type: text
    content: ' credit to Christ. '
  '24':
  - type: text
    content: Therefore, show these men, in the sight of the churches, the proof of your love and our reason for being proud of you.
  '3':
  - type: text
    content: 'For I testify that according to their ability, and beyond their ability, '
  - type: text
    content: they gave
  - type: text
    content: ' voluntarily, '
  '4':
  - type: text
    content: 'begging us insistently for the privilege of participating in the service for [the support of] the saints [in Jerusalem]. '
  '5':
  - type: text
    content: 'Not only [did they give materially] as we had hoped, but first they gave themselves to the Lord and to us [as His representatives] by the will of God [disregarding their personal interests and giving as much as they possibly could]. '
  '6':
  - type: text
    content: So we urged Titus that, as he began it, he should also complete this gracious work among you as well.
  '7':
  - type: text
    content: 'But just as you excel in everything, [and lead the way] in faith, in speech, in knowledge, in genuine concern, and in your love for us, see that you excel in this gracious work [of giving] also. '
  '8':
  - type: text
    content: 'I am not saying '
  - type: text
    content: this
  - type: text
    content: ' as a command [to dictate to you], but to prove, by [pointing out] the enthusiasm of others, the sincerity of your love as well. '
  '9':
  - type: text
    content: 'For you are recognizing [more clearly] the grace of our Lord Jesus Christ [His astonishing kindness, His generosity, His gracious favor], that though He was rich, yet for your sake He became poor, so that by His poverty you might become rich (abundantly blessed). '
