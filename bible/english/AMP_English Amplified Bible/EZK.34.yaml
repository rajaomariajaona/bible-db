document_id: EZK.34,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecy against the Shepherds of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Behold, I am against the shepherds, and I will demand My flock from them and make them stop tending the flock, so that the shepherds cannot feed themselves anymore. I will rescue My flock from their mouth, so that they will not be food for them.” ’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Restoration of Israel
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Behold, I Myself will search for My flock and seek them out. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'As a shepherd cares for his sheep on the day that he is among his scattered flock, so I will care for My sheep; and I will rescue them from all the places to which they were scattered on a cloudy and gloomy day. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I will bring them out from the nations and gather them from the countries and bring them to their own land; and I will feed them on the mountains of Israel, by the streams, and in all the inhabited places of the land. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will feed them in a good pasture, and their grazing ground will be on the mountain heights of Israel. There they will lie down on good grazing ground and feed in rich pasture on the mountains of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will feed My flock and I will let them lie down [to rest],” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“I will seek the lost, bring back the scattered, bandage the crippled, and strengthen the weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the sick; but I will destroy the fat and the strong [who have become hard-hearted and perverse]. I will feed them with judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment. [Luke 19:10]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “And as for you, My flock, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Behold, I judge between one sheep and another, between the rams and the male goats [between the righteous and the unrighteous]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Is it too little a thing for you that you [unrighteous ones who are well-fed] feed in the best pasture, yet you must trample down with your feet [of wickedness] the rest of your pastures? Or that you drink clear [still] water, yet you must muddy with your feet [of wickedness] the rest [of the water]? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: As for My flock (the righteous), they must feed on what you trample with your feet and drink what you muddy with your feet!’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Son of man, prophesy against the shepherds of Israel. Prophesy and say to them, the [spiritual] shepherds, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Woe (judgment is coming) to the [spiritual] shepherds of Israel who have been feeding themselves! Should not the shepherds feed the flock? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Therefore thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' to them, “Behold, I Myself will judge between the [well-fed] fat sheep and the lean sheep. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Because you push with side and shoulder, and gore with your horns all those that have become weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sick until you have scattered them away, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: therefore, I will rescue My flock, and they shall no longer be prey; and I will judge between one sheep [ungodly] and another [godly].
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Then I will appoint over them one shepherd and he will feed them, [a ruler like] My servant '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name of David is used here as in Ezek 34:24; 37:24, 25; Jer 30:9; Hos 3:5, to represent the Messiah, not the man, David king of Israel. It is believed that this Messianic prophecy would have been understood by Ezekiel’s audience.
      marker-yv: yv-n
    - type: text
      text: 'David; he will feed them and be their shepherd. [Ezek 37:24; John 10:14-18] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be their God, and My servant David will be a prince among them; I the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“I will make a covenant of peace with them and will eliminate the predatory animals from the land so that they may live securely in the wilderness and sleep [safely] in the woods. [Ps 127:2; Is 11:6-9; John 14:27; 16:33] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I will make them and the places around My hill (Jerusalem, Zion) a blessing. And I will make showers come down in their season; there will be [abundant] showers of blessing (divine favor). '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Also the tree of the field will yield its fruit and the earth will yield its produce; and My people will be secure on their land. Then they will know [with confidence] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I have broken the bars of their yoke and have rescued them from the hand of those who made them slaves. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They will no longer be prey to the nations, and the predators of the earth will not devour them; but they will live safely, and no one will make them afraid [in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One day when Jesus visited the synagogue in Nazareth (Luke 4:16-21), He was handed the roll of the book of Isaiah to read aloud. He turned to Is 61, which tells what His coming to the world would mean. Jesus read only a few lines of the chapter, stopping in the middle of a sentence, and said, “Today this Scripture has been fulfilled in your hearing” (Luke 4:21). He had just read of His coming to preach the Gospel, to proclaim release to the captives, to give sight to the blind, to set free the bruised, and to proclaim the acceptable year of the Lord. He stopped there, for the rest of the chapter could not be fulfilled until His second coming, of which Isaiah’s prophecy tells. The following section in Ezekiel (vv 24-31) is telling about the same Messianic reign of which so many Scripture passages speak, the Messianic reign for which Jesus promised to return to earth (Matt 24:30; 25:31-34; Rev 1:7, 8; see also Luke 1:32, 33; Acts 1:10, 11).
      marker-yv: yv-n
    - type: text
      text: 'day of the Messiah’s reign]. [Is 60:21; 61:3] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'I will prepare for them a place renowned for planting [crops], and they will not again be victims of famine in the land, and they will not endure the insults of the nations any longer. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You eat the fat [the choicest of meat], and clothe yourselves with the wool, you slaughter the best of the livestock, but you do not feed the flock. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then they will know [with assurance] that I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God, am with them and that they, the house of Israel, are My people,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “As for you, My flock, the flock of My pasture, you are men, and I am your God,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You have not strengthened those who are weak, you have not healed the sick, you have not bandaged the crippled, you have not brought back those gone astray, you have not looked for the lost; but you have ruled them with force and violence. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They were scattered because there was no shepherd, and when they were scattered they became food for all the predators of the field. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: My flock wandered through all the mountains and on every high hill; My flock was scattered over all the face of the earth and no one searched or sought them.” ’ ” [Matt 9:36]
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore, you [spiritual] shepherds, hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “As I live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “certainly because My flock has become prey, My flock has even become food for every predator of the field for lack of a shepherd, and My shepherds did not search for My flock, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rather
    - type: text
      text: ' the shepherds fed themselves and did not feed My flock; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: therefore, you [spiritual] shepherds, hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': '
