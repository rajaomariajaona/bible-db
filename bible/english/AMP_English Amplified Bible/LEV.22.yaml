document_id: LEV.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Various Rules for Priests
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '‘No layman [that is, someone outside of Aaron’s family] is to eat the holy '
  - type: text
    content: gift
  - type: text
    content: ' [which has been offered to God]; a foreigner residing with the priest or a hired man shall not eat the holy thing. '
  '11':
  - type: text
    content: 'But if a priest buys a slave as his property with his money, the slave may eat the holy thing, and those who are born in the priest’s house; they may eat his food. '
  '12':
  - type: text
    content: 'If a priest’s daughter is married to a layman [one not part of the priestly tribe], she shall not eat the offering of the holy things. '
  '13':
  - type: text
    content: 'But if a priest’s daughter is a widow or divorced, and has no child, and returns to her father’s house as in her youth, she shall eat her father’s food; but no layman shall eat it. '
  '14':
  - type: text
    content: 'But if a person unknowingly eats a holy '
  - type: text
    content: gift
  - type: text
    content: ' [which has been offered to God], then he shall add one-fifth of its value to it and give the holy '
  - type: text
    content: gift
  - type: text
    content: ' to the priest. '
  '15':
  - type: text
    content: The priests shall not profane the holy things the Israelites offer to the L
  - type: heading
    content: ord
  - type: text
    content: ', '
  '16':
  - type: text
    content: 'and so cause them [by neglect of any essential observance] to bear the '
  - type: note
    content: Lit iniquity.
  - type: text
    content: punishment of guilt when they eat their holy things; for I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who sanctifies them.’ ”'
  - type: heading
    content: Flawless Animals for Sacrifice
  '17':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '18':
  - type: text
    content: '“Speak to Aaron and his sons and to all the Israelites and say to them, ‘Any man of the house of Israel or any stranger in Israel who presents his offering, whether to '
  - type: text
    content: fulfill
  - type: text
    content: ' any of their vows or as any of their freewill (voluntary) offerings which they presented to the L'
  - type: heading
    content: ord
  - type: text
    content: ' as a burnt offering— '
  '19':
  - type: text
    content: 'so that you may be accepted—it must be a male without blemish from the cattle, the sheep, or the goats. '
  '2':
  - type: text
    content: “Tell Aaron and his sons to be careful with the holy things (offerings, gifts) which the children of Israel dedicate to Me, so that they do not profane My holy name; I am the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'You shall not offer anything which has a blemish, because it will not be accepted for you. [1 Pet 1:19] '
  '21':
  - type: text
    content: Whoever offers a sacrifice of peace offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ' to fulfill a special vow to the L'
  - type: heading
    content: ord
  - type: text
    content: ' or as a freewill offering from the herd or from the flock, it must be perfect to be accepted; there shall be no blemish in it. '
  '22':
  - type: text
    content: 'Animals '
  - type: text
    content: that are
  - type: text
    content: ' blind or fractured or mutilated, or have a sore or a running wound or an itch or scabs, you shall not offer to the L'
  - type: heading
    content: ord
  - type: text
    content: ' nor make an offering of them by fire on the altar to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'For a freewill offering you may offer either a bull or a lamb which has an overgrown or stunted member (deformity), but for [the payment of] a vow it will not be accepted. '
  '24':
  - type: text
    content: You shall not offer to the L
  - type: heading
    content: ord
  - type: text
    content: ' any animal which has its testicles bruised or crushed or torn or cut off, or sacrifice it in your land. '
  '25':
  - type: text
    content: 'Nor shall you offer as the food of your God any such [animals obtained] from a foreigner, because their corruption '
  - type: text
    content: and
  - type: text
    content: ' blemish makes them unfit; there is a defect in them, they shall not be accepted for you.’ ”'
  '26':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '27':
  - type: text
    content: “When a bull or a sheep or a goat is born, it shall remain for seven days with its mother; and after the eighth day it shall be accepted as an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'And whether [the mother] is a cow or a sheep, you shall not kill both it and its young in one day. '
  '29':
  - type: text
    content: When you sacrifice an offering of thanksgiving to the L
  - type: heading
    content: ord
  - type: text
    content: ', you shall sacrifice it so that you may be accepted. '
  '3':
  - type: text
    content: Say to them, ‘Any one of your descendants throughout your generations who approaches the holy things which the Israelites dedicate to the L
  - type: heading
    content: ord
  - type: text
    content: ', while he is [ceremonially] unclean, that person shall be cut off from My presence '
  - type: text
    content: and
  - type: text
    content: ' excluded from the sanctuary; I am the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'It shall be eaten on the same day; you shall leave none of it until '
  - type: text
    content: the next
  - type: text
    content: ' morning; I am the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '31':
  - type: text
    content: So you shall keep My commandments and do them; I am the L
  - type: heading
    content: ord
  - type: text
    content: .
  '32':
  - type: text
    content: “You shall not profane My holy name [using it to honor an idol, or treating it with irreverence or contempt or as a byword]; but I will be sanctified (set apart as holy) among the Israelites. I am the L
  - type: heading
    content: ord
  - type: text
    content: ', who sanctifies '
  - type: text
    content: and
  - type: text
    content: ' declares you holy, '
  '33':
  - type: text
    content: who brought you out of the land of Egypt to be your God; I am the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'No man of the descendants of Aaron who is a leper or has a discharge may eat the holy things [the offerings and the showbread] until he is clean. And whoever touches any person '
  - type: text
    content: or
  - type: text
    content: ' thing made unclean by '
  - type: text
    content: contact with
  - type: text
    content: ' a corpse or a man who has had a seminal emission, '
  '5':
  - type: text
    content: 'or whoever touches any crawling thing by which he is made unclean, or any person by whom he is made unclean, whatever it may be, [Lev 11:24-28] '
  '6':
  - type: text
    content: 'the person who touches any such thing shall be unclean until evening and shall not eat the holy things unless he has bathed his body in water. [Heb 10:22] '
  '7':
  - type: text
    content: 'When the sun sets, he will be clean, and afterward he may eat the holy things, for it is his food. '
  '8':
  - type: text
    content: He shall not eat that which dies [of natural causes] or is torn by a predator, becoming unclean by it; I am the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '9':
  - type: text
    content: Therefore the priests shall observe My ordinance, so that they will not bear sin because of it and die if they profane it; I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who sanctifies them.'
