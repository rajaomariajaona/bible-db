document_id: LEV.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Various Rules for Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '‘No layman [that is, someone outside of Aaron’s family] is to eat the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: ' [which has been offered to God]; a foreigner residing with the priest or a hired man shall not eat the holy thing. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But if a priest buys a slave as his property with his money, the slave may eat the holy thing, and those who are born in the priest’s house; they may eat his food. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If a priest’s daughter is married to a layman [one not part of the priestly tribe], she shall not eat the offering of the holy things. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But if a priest’s daughter is a widow or divorced, and has no child, and returns to her father’s house as in her youth, she shall eat her father’s food; but no layman shall eat it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But if a person unknowingly eats a holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: ' [which has been offered to God], then he shall add one-fifth of its value to it and give the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: ' to the priest. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The priests shall not profane the holy things the Israelites offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and so cause them [by neglect of any essential observance] to bear the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: iniquity
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: punishment of guilt when they eat their holy things; for I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who sanctifies them.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Flawless Animals for Sacrifice
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Speak to Aaron and his sons and to all the Israelites and say to them, ‘Any man of the house of Israel or any stranger in Israel who presents his offering, whether to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fulfill
    - type: text
      text: ' any of their vows or as any of their freewill (voluntary) offerings which they presented to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' as a burnt offering— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'so that you may be accepted—it must be a male without blemish from the cattle, the sheep, or the goats. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Tell Aaron and his sons to be careful with the holy things (offerings, gifts) which the children of Israel dedicate to Me, so that they do not profane My holy name; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You shall not offer anything which has a blemish, because it will not be accepted for you. [1 Pet 1:19] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Whoever offers a sacrifice of peace offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to fulfill a special vow to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' or as a freewill offering from the herd or from the flock, it must be perfect to be accepted; there shall be no blemish in it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Animals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that are
    - type: text
      text: ' blind or fractured or mutilated, or have a sore or a running wound or an itch or scabs, you shall not offer to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' nor make an offering of them by fire on the altar to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For a freewill offering you may offer either a bull or a lamb which has an overgrown or stunted member (deformity), but for [the payment of] a vow it will not be accepted. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You shall not offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' any animal which has its testicles bruised or crushed or torn or cut off, or sacrifice it in your land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nor shall you offer as the food of your God any such [animals obtained] from a foreigner, because their corruption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blemish makes them unfit; there is a defect in them, they shall not be accepted for you.’ ”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “When a bull or a sheep or a goat is born, it shall remain for seven days with its mother; and after the eighth day it shall be accepted as an offering by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And whether [the mother] is a cow or a sheep, you shall not kill both it and its young in one day. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When you sacrifice an offering of thanksgiving to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you shall sacrifice it so that you may be accepted. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Say to them, ‘Any one of your descendants throughout your generations who approaches the holy things which the Israelites dedicate to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', while he is [ceremonially] unclean, that person shall be cut off from My presence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excluded from the sanctuary; I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'It shall be eaten on the same day; you shall leave none of it until '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the next
    - type: text
      text: ' morning; I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So you shall keep My commandments and do them; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “You shall not profane My holy name [using it to honor an idol, or treating it with irreverence or contempt or as a byword]; but I will be sanctified (set apart as holy) among the Israelites. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who sanctifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' declares you holy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: who brought you out of the land of Egypt to be your God; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'No man of the descendants of Aaron who is a leper or has a discharge may eat the holy things [the offerings and the showbread] until he is clean. And whoever touches any person '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' thing made unclean by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: contact with
    - type: text
      text: ' a corpse or a man who has had a seminal emission, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'or whoever touches any crawling thing by which he is made unclean, or any person by whom he is made unclean, whatever it may be, [Lev 11:24-28] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'the person who touches any such thing shall be unclean until evening and shall not eat the holy things unless he has bathed his body in water. [Heb 10:22] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When the sun sets, he will be clean, and afterward he may eat the holy things, for it is his food. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He shall not eat that which dies [of natural causes] or is torn by a predator, becoming unclean by it; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Therefore the priests shall observe My ordinance, so that they will not bear sin because of it and die if they profane it; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who sanctifies them.'
