document_id: PSA.83,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 83
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Implored to Confound His Enemies.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song. A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not keep silent, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hold Your peace or be still, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who were destroyed at En-dor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who became like dung for the earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make their nobles like Oreb and Zeeb
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all their princes like Zebah and Zalmunna, [Judg 7:23-25; 8:10-21]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who said, “Let us possess for ourselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pastures of God.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶O my God, make them like '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '83:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: tumbleweed
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: whirling dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like chaff before the wind [worthless and without substance].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like fire consumes the forest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like the flame sets the mountains on fire,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So pursue them with Your tempest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And terrify them with [the violence of] Your storm.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fill their faces with shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they may [persistently] seek Your name, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be ashamed and dismayed forever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, let them be humiliated and perish,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they may know that You alone, whose name is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are the Most High over all the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For behold, Your enemies are in tumult,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who hate You have raised their heads [in hatred of You]. [Acts 4:25, 26]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They concoct crafty schemes against Your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And conspire together against Your hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' precious ones.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have said, “Come, and let us wipe them out as a nation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the name of Israel be remembered no more.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have conspired together with one mind;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against You they make a covenant—
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tents of Edom and the Ishmaelites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of Moab and the Hagrites,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gebal and Ammon and Amalek,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Philistia with the inhabitants of Tyre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assyria also has joined with them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have helped the children of Lot [the Ammonites and the Moabites] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have been an arm [of strength] to them. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Deal with them as [You did] with Midian,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As with Sisera and Jabin at the brook of Kishon, [Judg 4:12-24]
