verses:
  '1':
  - type: heading
    content: Psalm 83
  - type: heading
    content: God Implored to Confound His Enemies.
  - type: text
    content: A Song. A Psalm of Asaph.
  - type: text
    content: Do not keep silent, O God;
  - type: text
    content: Do not hold Your peace or be still, O God.
  '10':
  - type: text
    content: Who were destroyed at En-dor,
  - type: text
    content: Who became like dung for the earth.
  '11':
  - type: text
    content: Make their nobles like Oreb and Zeeb
  - type: text
    content: And all their princes like Zebah and Zalmunna, [Judg 7:23-25; 8:10-21]
  '12':
  - type: text
    content: Who said, “Let us possess for ourselves
  - type: text
    content: The pastures of God.”
  '13':
  - type: text
    content: '¶O my God, make them like '
  - type: note
    content: Or tumbleweed.
  - type: text
    content: whirling dust,
  - type: text
    content: Like chaff before the wind [worthless and without substance].
  '14':
  - type: text
    content: Like fire consumes the forest,
  - type: text
    content: And like the flame sets the mountains on fire,
  '15':
  - type: text
    content: So pursue them with Your tempest
  - type: text
    content: And terrify them with [the violence of] Your storm.
  '16':
  - type: text
    content: 'Fill their faces with shame '
  - type: text
    content: and
  - type: text
    content: ' disgrace,'
  - type: text
    content: That they may [persistently] seek Your name, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '17':
  - type: text
    content: Let them be ashamed and dismayed forever;
  - type: text
    content: Yes, let them be humiliated and perish,
  '18':
  - type: text
    content: That they may know that You alone, whose name is the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Are the Most High over all the earth.
  '2':
  - type: text
    content: For behold, Your enemies are in tumult,
  - type: text
    content: And those who hate You have raised their heads [in hatred of You]. [Acts 4:25, 26]
  '3':
  - type: text
    content: They concoct crafty schemes against Your people,
  - type: text
    content: 'And conspire together against Your hidden '
  - type: text
    content: and
  - type: text
    content: ' precious ones.'
  '4':
  - type: text
    content: They have said, “Come, and let us wipe them out as a nation;
  - type: text
    content: Let the name of Israel be remembered no more.”
  '5':
  - type: text
    content: For they have conspired together with one mind;
  - type: text
    content: Against You they make a covenant—
  '6':
  - type: text
    content: The tents of Edom and the Ishmaelites,
  - type: text
    content: Of Moab and the Hagrites,
  '7':
  - type: text
    content: Gebal and Ammon and Amalek,
  - type: text
    content: Philistia with the inhabitants of Tyre.
  '8':
  - type: text
    content: Assyria also has joined with them;
  - type: text
    content: 'They have helped the children of Lot [the Ammonites and the Moabites] '
  - type: text
    content: and
  - type: text
    content: ' have been an arm [of strength] to them. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: ¶Deal with them as [You did] with Midian,
  - type: text
    content: As with Sisera and Jabin at the brook of Kishon, [Judg 4:12-24]
