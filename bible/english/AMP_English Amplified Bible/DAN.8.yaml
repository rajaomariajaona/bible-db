document_id: DAN.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vision of the Ram and Goat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The events recorded in ch 8 precede the feast recorded in ch 5.
      marker-yv: yv-n
    - type: text
      text: 'third year of the reign of King Belshazzar a [second] vision appeared to me, Daniel, [this was two years] after the one that first appeared to me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And [in my vision] this '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This horn of vv 9-12 is not to be confused with the “little horn” of 7:8. The near fulfillment of the prophecy most likely pertains to Antiochus IV Epiphanes, who came out of one of the four dynasties (the Seleucid Empire) into which Alexander’s empire was divided, and became a great conqueror, ruling from 175-164 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Hating God, he profaned the temple, persecuted God’s people, the Jews (represented in this passage by “host” and “stars”) and attempted to destroy the Jewish faith (see note 11:21). The far fulfillment of the prophecy in vv 23-25 most likely pertains to the Antichrist and the period of tribulation (Rev 13:4-9).
      marker-yv: yv-n
    - type: text
      text: 'horn grew up to the host of heaven, and caused some of the host and some of the stars to fall to the earth, and it trampled on them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, it magnified itself to be equal with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Prince,
        - type: text
          text: ' i.e. God.'
      marker-yv: yv-n
    - type: text
      text: 'Commander of the host [of heaven]; and it took away from Him the daily sacrifice (burnt offering), and the place of His sanctuary was thrown down (profaned). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of the transgression [of God’s people—their irreverence and ungodliness] the host will be given over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the wicked horn,
    - type: text
      text: ' along with the regular sacrifice; and righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truth will be flung to the ground, and the horn will do as it pleases [by divine permission] and prosper. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I heard a holy one (angel) speaking, and another holy one said to the one who was speaking, “How much time will be required to complete the vision regarding the regular sacrifice, the transgression that brings horror, and the trampling underfoot of both the sanctuary and the host [of the people]?” [Luke 21:24] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me, “For 2,300 evenings and mornings; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish celebration of the Feast of Lights (Hanukkah) in December commemorates the recapture of Jerusalem by the army of Judas Maccabeus and the purification of the sanctuary.
      marker-yv: yv-n
    - type: text
      text: 'then the sanctuary will be cleansed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' properly restored.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Interpretation of the Vision
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I, Daniel, had seen the vision, I sought to understand it; then behold, standing before me was one who looked like a man. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard the voice of a man between '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the banks of
    - type: text
      text: ' the Ulai, which called out and said, “Gabriel, give this man (Daniel) an understanding of the vision.” [Dan 9:21; Luke 1:19, 26] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he came near where I was standing, and when he came I was frightened and fell face downward; but he said to me, “Understand, son of man, that the [fulfillment of the] vision pertains to [events that will occur in] the time of the end.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as he (Gabriel) was speaking with me, I drifted into a deep sleep (unconsciousness) with my face to the ground; but he touched me and made me stand [where I had stood before]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “Behold, I am going to let you know what will happen during the final time of the indignation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath [of God upon the ungodly], for it concerns the appointed time of the end.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Ram’s Identity
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked in the vision and it seemed that I was at the citadel of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shushan
        - type: text
          text: . This once great city, located about 250 miles east of Babylon, was the winter home of the Persian kings, and is the ancient site where the Code of Hammurabi was discovered in 1901.
      marker-yv: yv-n
    - type: text
      text: 'Susa, [the capital of Persia], which is in the province of Elam; and I looked in the vision and I saw myself by the Ulai Canal. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The ram which you saw with the two horns represents the kings of Media and Persia.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Goat
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The shaggy (rough-coated) male goat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: represents
    - type: text
      text: ' the kingdom of Greece, and the great horn between his eyes is the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Alexander the Great, who consolidated the empire.
      marker-yv: yv-n
    - type: text
      text: 'first king. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Regarding
    - type: text
      text: ' the shattered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horn
    - type: text
      text: ' and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The four generals who divided the empire established by Alexander were: Seleucus (the north—Syria, Israel, Mesopotamia); Ptolemy (the south—Egypt, parts of Asia Minor); Lysimachus (the east—Thrace, parts of Asia Minor); and Cassander (the west—Greece, Macedonia).'
      marker-yv: yv-n
    - type: text
      text: 'four '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others that
    - type: text
      text: ' arose in its place, four kingdoms will rise from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' (Alexander’s) nation, although not with his power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heritage.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At the latter period of their reign,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the transgressors have finished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Antiochus IV Epiphanes acquired the throne of Seleucia by murdering his brother, the rightful heir.
      marker-yv: yv-n
    - type: text
      text: king will arise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Insolent and skilled in intrigue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cunning.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His power will be mighty, but not by his own power;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he will corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy in an astonishing manner'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [he will] prosper and do exactly as he wills;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He shall corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy mighty men and the holy people. [Dan 8:9-12; 2 Thess 2:3-10; Rev 13:4-10]'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And through his shrewdness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will cause deceit to succeed by his hand (influence);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will magnify himself in his mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will corrupt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy many who enjoy a false sense of security.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will also stand up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppose the Prince of princes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he will be broken, and that by no human hand [but by the hand of God]. [Rev 19:19, 20]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The vision of the evenings and the mornings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which has been told [to you] is true.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But keep the vision a secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For it has to do with many days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the now distant future.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I, Daniel, was exhausted and was sick for [several] days. Afterward I got up and continued with the king’s business; but I was astounded at the vision, and there was no one who could explain it.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I raised my eyes and looked, and behold, there in front of the canal stood a [lone] ram (the Medo-Persian Empire) which had two horns. The two horns were high, but one (Persia) was higher than the other (Media), and the higher one came up last. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw the ram (Medo-Persia) charging westward and northward and southward; no beast could stand before him, nor was there anyone who could rescue [anything] from his power, but he did as he pleased and magnified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: . [Dan 8:20]
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I was observing [this], behold, a male goat (Greece) was coming from the west [rushing] across the face of the whole earth without touching the ground; and the goat had a conspicuous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remarkable horn (Alexander the Great) between his eyes. [Dan 8:21] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He came up to the ram that had the two horns, which I had seen standing in front of the canal, and charged at him in [the fury of] his power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrath. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[In my vision] I saw him come close to the ram (Medo-Persia), and he was filled with rage toward him; and the goat (Greece) struck the ram and shattered his two horns, and the ram had no strength to stand before him. So the goat threw him to the ground and trampled on him, and there was no one who could rescue the ram from his power. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the male goat magnified himself exceedingly, and when he was [young and] strong, the great horn (Alexander) was [suddenly] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Alexander the Great died unexpectedly at the height of his power, and his empire was divided into four parts—east, west, north, and south—ruled over by his four generals.
      marker-yv: yv-n
    - type: text
      text: 'broken; and in its place there came up four prominent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horns
    - type: text
      text: ' [among whom the kingdom was divided, one] toward [each of] the four winds of heaven.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Little Horn
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out of one of them (Antiochus IV Epiphanes) came forth a rather small horn [but one of irreverent presumption and profane pride] which grew exceedingly powerful toward the south, toward the east, and toward the Beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Land
    - type: text
      text: ' (Israel). [Dan 8:23] '
