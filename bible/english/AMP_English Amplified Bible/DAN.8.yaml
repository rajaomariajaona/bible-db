  '27':
  - type: text
    content: And I, Daniel, was exhausted and was sick for [several] days. Afterward I got up and continued with the king’s business; but I was astounded at the vision, and there was no one who could explain it.
  '3':
  - type: text
    content: 'Then I raised my eyes and looked, and behold, there in front of the canal stood a [lone] ram (the Medo-Persian Empire) which had two horns. The two horns were high, but one (Persia) was higher than the other (Media), and the higher one came up last. '
  '4':
  - type: text
    content: 'I saw the ram (Medo-Persia) charging westward and northward and southward; no beast could stand before him, nor was there anyone who could rescue [anything] from his power, but he did as he pleased and magnified '
  - type: text
    content: himself
  - type: text
    content: . [Dan 8:20]
  '5':
  - type: text
    content: 'As I was observing [this], behold, a male goat (Greece) was coming from the west [rushing] across the face of the whole earth without touching the ground; and the goat had a conspicuous '
  - type: text
    content: and
  - type: text
    content: ' remarkable horn (Alexander the Great) between his eyes. [Dan 8:21] '
  '6':
  - type: text
    content: 'He came up to the ram that had the two horns, which I had seen standing in front of the canal, and charged at him in [the fury of] his power '
  - type: text
    content: and
  - type: text
    content: ' wrath. '
  '7':
  - type: text
    content: '[In my vision] I saw him come close to the ram (Medo-Persia), and he was filled with rage toward him; and the goat (Greece) struck the ram and shattered his two horns, and the ram had no strength to stand before him. So the goat threw him to the ground and trampled on him, and there was no one who could rescue the ram from his power. '
  '8':
  - type: text
    content: 'Then the male goat magnified himself exceedingly, and when he was [young and] strong, the great horn (Alexander) was [suddenly] '
  - type: note
    content: Alexander the Great died unexpectedly at the height of his power, and his empire was divided into four parts—east, west, north, and south—ruled over by his four generals.
  - type: text
    content: 'broken; and in its place there came up four prominent '
  - type: text
    content: horns
  - type: text
    content: ' [among whom the kingdom was divided, one] toward [each of] the four winds of heaven.'
  - type: heading
    content: The Little Horn
  '9':
  - type: text
    content: 'Out of one of them (Antiochus IV Epiphanes) came forth a rather small horn [but one of irreverent presumption and profane pride] which grew exceedingly powerful toward the south, toward the east, and toward the Beautiful '
  - type: text
