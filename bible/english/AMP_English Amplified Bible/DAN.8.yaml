  '13':
  - type: text
    content: 'Then I heard a holy one (angel) speaking, and another holy one said to the one who was speaking, “How much time will be required to complete the vision regarding the regular sacrifice, the transgression that brings horror, and the trampling underfoot of both the sanctuary and the host [of the people]?” [Luke 21:24] '
  '14':
  - type: text
    content: 'He said to me, “For 2,300 evenings and mornings; '
  - type: note
    content: The Jewish celebration of the Feast of Lights (Hanukkah) in December commemorates the recapture of Jerusalem by the army of Judas Maccabeus and the purification of the sanctuary.
  - type: text
    content: 'then the sanctuary will be cleansed '
  - type: text
    content: and
  - type: text
    content: ' properly restored.”'
  - type: heading
    content: Interpretation of the Vision
  '15':
  - type: text
    content: 'When I, Daniel, had seen the vision, I sought to understand it; then behold, standing before me was one who looked like a man. '
  '16':
  - type: text
    content: 'And I heard the voice of a man between '
  - type: text
    content: the banks of
  - type: text
    content: ' the Ulai, which called out and said, “Gabriel, give this man (Daniel) an understanding of the vision.” [Dan 9:21; Luke 1:19, 26] '
  '17':
  - type: text
    content: So he came near where I was standing, and when he came I was frightened and fell face downward; but he said to me, “Understand, son of man, that the [fulfillment of the] vision pertains to [events that will occur in] the time of the end.”
  '18':
  - type: text
    content: 'Now as he (Gabriel) was speaking with me, I drifted into a deep sleep (unconsciousness) with my face to the ground; but he touched me and made me stand [where I had stood before]. '
  '19':
  - type: text
    content: 'He said, “Behold, I am going to let you know what will happen during the final time of the indignation '
  - type: text
    content: and
  - type: text
    content: ' wrath [of God upon the ungodly], for it concerns the appointed time of the end.'
  - type: heading
    content: The Ram’s Identity
  '2':
  - type: text
    content: 'I looked in the vision and it seemed that I was at the citadel of '
  - type: note
    content: Heb Shushan. This once great city, located about 250 miles east of Babylon, was the winter home of the Persian kings, and is the ancient site where the Code of Hammurabi was discovered in 1901.
  - type: text
    content: 'Susa, [the capital of Persia], which is in the province of Elam; and I looked in the vision and I saw myself by the Ulai Canal. '
  '20':
  - type: text
    content: The ram which you saw with the two horns represents the kings of Media and Persia.
  - type: heading
