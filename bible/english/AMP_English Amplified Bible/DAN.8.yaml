  - type: text
    content: 'In the '
  - type: note
    content: The events recorded in ch 8 precede the feast recorded in ch 5.
  - type: text
    content: 'third year of the reign of King Belshazzar a [second] vision appeared to me, Daniel, [this was two years] after the one that first appeared to me. '
  '10':
  - type: text
    content: 'And [in my vision] this '
  - type: note
    content: This horn of vv 9-12 is not to be confused with the “little horn” of 7:8. The near fulfillment of the prophecy most likely pertains to Antiochus IV Epiphanes, who came out of one of the four dynasties (the Seleucid Empire) into which Alexander’s empire was divided, and became a great conqueror, ruling from 175-164 b.c. Hating God, he profaned the temple, persecuted God’s people, the Jews (represented in this passage by “host” and “stars”) and attempted to destroy the Jewish faith (see note 11:21). The far fulfillment of the prophecy in vv 23-25 most likely pertains to the Antichrist and the period of tribulation (Rev 13:4-9).
  - type: text
    content: 'horn grew up to the host of heaven, and caused some of the host and some of the stars to fall to the earth, and it trampled on them. '
  '11':
  - type: text
    content: 'Indeed, it magnified itself to be equal with the '
  - type: note
    content: Or Prince, i.e. God.
  - type: text
    content: 'Commander of the host [of heaven]; and it took away from Him the daily sacrifice (burnt offering), and the place of His sanctuary was thrown down (profaned). '
  '12':
  - type: text
    content: 'Because of the transgression [of God’s people—their irreverence and ungodliness] the host will be given over '
  - type: text
    content: to the wicked horn,
  - type: text
