document_id: ROM.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Believers United to Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you not know, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters (for I am speaking to those who know the Law), that the Law has jurisdiction [to rule] over a person as long as he lives? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' commandment which was intended to bring life, actually proved to bring death for me. [Lev 18:5] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For sin, seizing its opportunity through the commandment, beguiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely deceived me, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: through it killed me
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'using it as a weapon killed me [separating me from God]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, the Law is holy, and the commandment is holy and righteous and good.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Did that which is good [the Law], then become death to me? Certainly not! But sin, in order that it might be revealed as sin, was producing death in me by [using] this good thing [as a weapon], so that through the commandment sin would become exceedingly sinful.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Conflict of Two Natures
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that the Law is spiritual, but I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a creature
    - type: text
      text: ' of the flesh [worldly, self-reliant—carnal and unspiritual], sold into slavery to sin [and serving under its control]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I do not understand my own actions [I am baffled and bewildered by them]. I do not practice what I want '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to do,
    - type: text
      text: ' but I am doing the very thing I hate [and yielding to my human nature, my worldliness—my sinful capacity]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' do what I do not want to do, [that means] I agree with the Law, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: confessing
    - type: text
      text: ' that it is good (morally excellent). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now [if that is the case, then] it is no longer I who do it [the disobedient thing which I despise], but the sin [nature] which lives in me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that nothing good lives in me, that is, in my flesh [my human nature, my worldliness—my sinful capacity]. For the willingness [to do good] is present in me, but the doing of good is not. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the good that I want to do, I do not do, but I practice the very evil that I do not want. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the married woman [as an example] is bound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remains bound by law to her husband while he lives; but if her husband dies, she is released '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exempt from the law concerning her husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if I am doing the very thing I do not want to do, I am no longer the one doing it [that is, it is not me that acts], but the sin [nature] which lives in me.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it to be
    - type: text
      text: ' the law [of my inner self], that evil is present in me, the one who wants to do good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I joyfully delight in the law of God in my inner self [with my new nature], [Ps 1:2] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I see a different law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rule of action in the members of my body [in its appetites and desires], waging war against the law of my mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' subduing me and making me a prisoner of the law of sin which is within my members. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wretched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' miserable man that I am! Who will [rescue me and] set me free from this body of death [this corrupt, mortal existence]? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thanks be to God [for my deliverance] through Jesus Christ our Lord! So then, on the one hand I myself with my mind serve the law of God, but on the other, with my flesh [my human nature, my worldliness, my sinful capacity—I serve] the law of sin.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Accordingly, she will be designated as an adulteress if she '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: becomes another man’s,
        - type: text
          text: ' probably referring to an illicit, sexual relationship. Paul uses the same language at the end of the verse, but there he probably means sexual intimacy within a new marriage.'
      marker-yv: yv-n
    - type: text
      text: unites herself to another man while her husband is alive. But if her husband dies, she is free from the law [regarding marriage], so that she is not an adulteress if she marries another man.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'fellow believers, you too died to the Law through the [crucified] body of Christ, so that you may belong to another, to Him who was raised from the dead, in order that we may bear fruit for God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When we were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: living
    - type: text
      text: ' in the flesh [trapped by sin], the sinful passions, which were awakened by [that which] the Law [identifies as sin], were at work in our body to bear fruit for death [since the willingness to sin led to death and separation from God]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now we have been released from the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its penalty, having died [through Christ] to that by which we were held captive, so that we serve [God] in the newness of the Spirit and not in the oldness of the letter [of the Law].'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What shall we say then? Is the Law sin? Certainly not! On the contrary, if it had not been for the Law, I would not have recognized sin. For I would not have known [for example] about coveting [what belongs to another, and would have had no sense of guilt] if the Law had not [repeatedly] said, “Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall not covet
    - type: text
      text: '.” [Ex 20:17; Deut 5:21] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But sin, finding an opportunity through the commandment [to express itself] produced in me every kind of coveting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' selfish desire. For without the Law sin is dead [the recognition of sin is inactive]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was once alive without [knowledge of] the Law; but when the commandment came [and I understood its meaning], sin became alive and I died [since the Law sentenced me to death]. [Ps 73:22] '
