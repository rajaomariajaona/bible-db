document_id: ROM.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Believers United to Christ
  - type: text
    content: 'Or do you not know, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters (for I am speaking to those who know the Law), that the Law has jurisdiction [to rule] over a person as long as he lives? '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: very
  - type: text
    content: ' commandment which was intended to bring life, actually proved to bring death for me. [Lev 18:5] '
  '11':
  - type: text
    content: 'For sin, seizing its opportunity through the commandment, beguiled '
  - type: text
    content: and
  - type: text
    content: ' completely deceived me, and '
  - type: note
    content: Lit through it killed me.
  - type: text
    content: 'using it as a weapon killed me [separating me from God]. '
  '12':
  - type: text
    content: So then, the Law is holy, and the commandment is holy and righteous and good.
  '13':
  - type: text
    content: Did that which is good [the Law], then become death to me? Certainly not! But sin, in order that it might be revealed as sin, was producing death in me by [using] this good thing [as a weapon], so that through the commandment sin would become exceedingly sinful.
  - type: heading
    content: The Conflict of Two Natures
  '14':
  - type: text
    content: 'We know that the Law is spiritual, but I am '
  - type: text
    content: a creature
  - type: text
    content: ' of the flesh [worldly, self-reliant—carnal and unspiritual], sold into slavery to sin [and serving under its control]. '
  '15':
  - type: text
    content: 'For I do not understand my own actions [I am baffled and bewildered by them]. I do not practice what I want '
  - type: text
    content: to do,
  - type: text
    content: ' but I am doing the very thing I hate [and yielding to my human nature, my worldliness—my sinful capacity]. '
  '16':
  - type: text
    content: 'Now if I '
  - type: text
    content: habitually
  - type: text
    content: ' do what I do not want to do, [that means] I agree with the Law, '
  - type: text
    content: confessing
  - type: text
    content: ' that it is good (morally excellent). '
  '17':
  - type: text
    content: 'So now [if that is the case, then] it is no longer I who do it [the disobedient thing which I despise], but the sin [nature] which lives in me. '
  '18':
  - type: text
    content: 'For I know that nothing good lives in me, that is, in my flesh [my human nature, my worldliness—my sinful capacity]. For the willingness [to do good] is present in me, but the doing of good is not. '
  '19':
  - type: text
    content: 'For the good that I want to do, I do not do, but I practice the very evil that I do not want. '
  '2':
  - type: text
    content: 'For the married woman [as an example] is bound '
  - type: text
    content: and
  - type: text
    content: ' remains bound by law to her husband while he lives; but if her husband dies, she is released '
  - type: text
    content: and
  - type: text
    content: ' exempt from the law concerning her husband. '
  '20':
  - type: text
    content: But if I am doing the very thing I do not want to do, I am no longer the one doing it [that is, it is not me that acts], but the sin [nature] which lives in me.
  '21':
  - type: text
    content: 'So I find '
  - type: text
    content: it to be
  - type: text
    content: ' the law [of my inner self], that evil is present in me, the one who wants to do good. '
  '22':
  - type: text
    content: 'For I joyfully delight in the law of God in my inner self [with my new nature], [Ps 1:2] '
  '23':
  - type: text
    content: 'but I see a different law '
  - type: text
    content: and
  - type: text
    content: ' rule of action in the members of my body [in its appetites and desires], waging war against the law of my mind '
  - type: text
    content: and
  - type: text
    content: ' subduing me and making me a prisoner of the law of sin which is within my members. '
  '24':
  - type: text
    content: 'Wretched '
  - type: text
    content: and
  - type: text
    content: ' miserable man that I am! Who will [rescue me and] set me free from this body of death [this corrupt, mortal existence]? '
  '25':
  - type: text
    content: Thanks be to God [for my deliverance] through Jesus Christ our Lord! So then, on the one hand I myself with my mind serve the law of God, but on the other, with my flesh [my human nature, my worldliness, my sinful capacity—I serve] the law of sin.
  '3':
  - type: text
    content: 'Accordingly, she will be designated as an adulteress if she '
  - type: note
    content: Lit becomes another man’s, probably referring to an illicit, sexual relationship. Paul uses the same language at the end of the verse, but there he probably means sexual intimacy within a new marriage.
  - type: text
    content: unites herself to another man while her husband is alive. But if her husband dies, she is free from the law [regarding marriage], so that she is not an adulteress if she marries another man.
  '4':
  - type: text
    content: 'Therefore, my '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'fellow believers, you too died to the Law through the [crucified] body of Christ, so that you may belong to another, to Him who was raised from the dead, in order that we may bear fruit for God. '
  '5':
  - type: text
    content: 'When we were '
  - type: text
    content: living
  - type: text
    content: ' in the flesh [trapped by sin], the sinful passions, which were awakened by [that which] the Law [identifies as sin], were at work in our body to bear fruit for death [since the willingness to sin led to death and separation from God]. '
  '6':
  - type: text
    content: 'But now we have been released from the Law '
  - type: text
    content: and
  - type: text
    content: ' its penalty, having died [through Christ] to that by which we were held captive, so that we serve [God] in the newness of the Spirit and not in the oldness of the letter [of the Law].'
  '7':
  - type: text
    content: What shall we say then? Is the Law sin? Certainly not! On the contrary, if it had not been for the Law, I would not have recognized sin. For I would not have known [for example] about coveting [what belongs to another, and would have had no sense of guilt] if the Law had not [repeatedly] said, “Y
  - type: heading
    content: ou shall not covet
  - type: text
    content: '.” [Ex 20:17; Deut 5:21] '
  '8':
  - type: text
    content: 'But sin, finding an opportunity through the commandment [to express itself] produced in me every kind of coveting '
  - type: text
    content: and
  - type: text
    content: ' selfish desire. For without the Law sin is dead [the recognition of sin is inactive]. '
  '9':
  - type: text
    content: 'I was once alive without [knowledge of] the Law; but when the commandment came [and I understood its meaning], sin became alive and I died [since the Law sentenced me to death]. [Ps 73:22] '
