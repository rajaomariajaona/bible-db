document_id: JER.25,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy of the Captivity
  - type: text
    content: 'The word that came to Jeremiah in regard to all the people of Judah in the fourth year of the reign of Jehoiakim the son of Josiah, king of Judah (that was the first year of the reign of Nebuchadnezzar king of Babylon), '
  '10':
  - type: text
    content: 'Moreover, I will take from them the voice of joy and the voice of gladness, the voice of the bridegroom and the voice of the bride, the sound of the millstones [grinding meal] and the light of the lamp [to light the night]. [Jer 7:34] '
  '11':
  - type: text
    content: 'This whole land will be a waste and a horror, and these nations will serve the king of Babylon '
  - type: note
    content: As history shows, this prophecy was fulfilled, whether it refers to the duration of the Babylonian Empire (from the beginning of Nebuchadnezzar’s reign in 605 b.c. until its downfall in 539 b.c.), or to the length of the Jewish captivity in Babylon (with the first deportation in 605 b.c. and the first return in 538 b.c.). For the fulfillment of specific details concerning the destruction and perpetual desolation of Babylon, see notes Is 13:22; 14:23.
  - type: text
    content: seventy years. [2 Chr 36:20-23; Jer 4:27; 12:11, 12; Dan 9:2]
  - type: heading
    content: Babylon Will Be Judged
  '12':
  - type: text
    content: ‘Then when seventy years are completed, I will punish the king of Babylon and that nation, the land of the Chaldeans (Babylonia),’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘for their wickedness, and will make the land [of the Chaldeans] a perpetual waste. [Jer 29:10] '
  '13':
  - type: text
    content: 'I will bring on that land all My words which I have pronounced against it, all that is written in this book which Jeremiah has prophesied against all the nations. '
  '14':
  - type: text
    content: (For many nations and great kings will make slaves of them, even the Chaldeans [who enslaved other nations]; and I will repay [all of] them according to their deeds and according to the work of their [own] hands.)’ ”
  '15':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, to me, “Take this cup of the wine of wrath from My hand and cause all the nations to whom I send you to drink it. '
  '16':
  - type: text
    content: They will drink and stagger and go mad because of the sword that I will send among them.”
  '17':
  - type: text
    content: Then I (Jeremiah) took the cup from the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' hand and made all the nations to whom the L'
  - type: heading
    content: ord
  - type: text
    content: ' had sent me drink it: '
  '18':
  - type: text
    content: 'Jerusalem and the cities of Judah [being most guilty because their privileges were greatest], its kings and princes, to make them a horror, a ruin, a hissing and a curse, as it is to this day; [1 Pet 4:17] '
  '19':
  - type: text
    content: 'Pharaoh king of Egypt, his servants, his princes, all his people, '
  '2':
  - type: text
    content: 'which Jeremiah the prophet spoke to all the people of Judah and to all the inhabitants of Jerusalem, saying, '
  '20':
  - type: text
    content: 'and all the foreign (mixed) population, all the kings of the land of Uz, and all the kings of the land of the Philistines (and [their cities of] Ashkelon, Gaza, Ekron, and the remnant of Ashdod); '
  '21':
  - type: text
    content: 'Edom, Moab, and the children of Ammon; '
  '22':
  - type: text
    content: 'all the kings of Tyre, all the kings of Sidon, and the kings of the islands '
  - type: text
    content: and
  - type: text
    content: ' the coastlands across the [Mediterranean] Sea; '
  '23':
  - type: text
    content: 'Dedan, Tema, Buz [the neighboring tribes north of Arabia], and all who clip off the side-growth '
  - type: text
    content: of their hair;
  - type: text
    content: ' [Lev 19:27; Jer 9:26] '
  '24':
  - type: text
    content: 'all the kings of Arabia and all the kings of the foreign population who live in the desert; '
  '25':
  - type: text
    content: 'all the kings of Zimri, all the kings of Elam (Persia), and all the kings of Media; '
  '26':
  - type: text
    content: all the kings of the north, far and near, one after another—and all the kingdoms of the world which are on the face of the earth. And the king of Sheshach (Babylon) shall drink after them.
  '27':
  - type: text
    content: “Then you shall say to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Drink, be drunk, vomit, and fall to rise no more because of the sword which I will send among you.” ’ '
  '28':
  - type: text
    content: And if they refuse to take the cup from your hand to drink, then you will say to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “You shall surely drink! '
  '29':
  - type: text
    content: For behold, I am beginning to work disaster in the city which is called by My Name, and shall you go unpunished? You will not be exempt from punishment, for I am calling for a sword against all the inhabitants of the earth,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts.’ [Jer 7:10]'
  '3':
  - type: text
    content: “For these twenty-three years—from the thirteenth year of Josiah the son of Amon, king of Judah, even to this day—the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' has come to me and I have spoken to you over and over again, but you have not listened. '
  '30':
  - type: text
    content: '“Therefore prophesy all these words against them and say to them:'
  - type: text
    content: ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' will roar from on high'
  - type: text
    content: And utter His voice from His holy dwelling;
  - type: text
    content: 'He will roar mightily against His fold '
  - type: text
    content: and
  - type: text
    content: ' pasture.'
  - type: text
    content: 'He will jubilantly shout like those who tread '
  - type: text
    content: the grapes
  - type: text
    content: ' [in the wine press],'
  - type: text
    content: Against all the inhabitants of the earth.
  '31':
  - type: text
    content: ‘A noise has come to the end of the earth,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has a controversy with '
  - type: text
    content: and
  - type: text
    content: ' an indictment against the nations.'
  - type: text
    content: He is entering into judgment with all mankind;
  - type: text
    content: As for the wicked, He has given them to the sword,’ says the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '32':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “Behold, evil is going forth
  - type: text
    content: From nation to nation,
  - type: text
    content: And a great whirling tempest is rising
  - type: text
    content: From the remotest part of the earth.
  '33':
  - type: text
    content: “And those slain by the L
  - type: heading
    content: ord
  - type: text
    content: ' on that day will be from one end of the earth to the other end of the earth. They will not be lamented (mourned over with expressions of grief) or gathered or buried; they will be like dung on the ground. [Jer 8:2; 16:4]'
  '34':
  - type: text
    content: “Wail, you shepherds, and cry;
  - type: text
    content: And roll in ashes, you masters of the flock.
  - type: text
    content: For the days of your slaughter and of your dispersions have come in full,
  - type: text
    content: 'And you will fall '
  - type: text
    content: and
  - type: text
    content: ' be broken into pieces like a choice vessel.'
  '35':
  - type: text
    content: “The shepherds will have no way to flee,
  - type: text
    content: Nor the masters of the flock any [way of] escape.
  '36':
  - type: text
    content: “A voice! The cry of the shepherds
  - type: text
    content: And the wailing of the masters of the flock!
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is destroying their pasture,'
  '37':
  - type: text
    content: 'And the peaceful folds are devastated '
  - type: text
    content: and
  - type: text
    content: ' made silent'
  - type: text
    content: Because of the fierce anger of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '38':
  - type: text
    content: “He has left His lair like the lion;
  - type: text
    content: For their land has become a horror
  - type: text
    content: Because of the fierceness of the oppressor
  - type: text
    content: And because of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' fierce anger.”'
  '4':
  - type: text
    content: Although the L
  - type: heading
    content: ord
  - type: text
    content: ' has persistently sent to you all His servants the prophets, you have not listened nor [even] inclined your ear to hear [His message], '
  '5':
  - type: text
    content: saying, ‘Turn now everyone from his evil way and the evil of your actions [that you may not forfeit the right to] live in the land that the L
  - type: heading
    content: ord
  - type: text
    content: ' has given to you and your forefathers forever and ever; '
  '6':
  - type: text
    content: 'and do not go after other gods to serve them and to worship them, and do not provoke Me to anger with the work of your hands, and I will do you no harm.’ '
  '7':
  - type: text
    content: Yet you have not listened to Me,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “so that you have provoked Me to anger with the work (idols) of your hands to your own harm.'
  '8':
  - type: text
    content: “Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘Because you have not obeyed My words, '
  '9':
  - type: text
    content: behold (hear this), I will send for all the families of the north,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘and '
  - type: text
    content: I will send
  - type: text
    content: ' for Nebuchadnezzar king of Babylon, My servant [to enact My plan], and I will bring them against this land and against its inhabitants and against all these surrounding nations; and I will utterly destroy them and make them a horror and a hissing [that is, an object of warning and ridicule] and an everlasting desolation. '
