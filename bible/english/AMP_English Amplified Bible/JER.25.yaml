document_id: JER.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy of the Captivity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word that came to Jeremiah in regard to all the people of Judah in the fourth year of the reign of Jehoiakim the son of Josiah, king of Judah (that was the first year of the reign of Nebuchadnezzar king of Babylon), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'which Jeremiah the prophet spoke to all the people of Judah and to all the inhabitants of Jerusalem, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “For these twenty-three years—from the thirteenth year of Josiah the son of Amon, king of Judah, even to this day—the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has come to me and I have spoken to you over and over again, but you have not listened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Although the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has persistently sent to you all His servants the prophets, you have not listened nor [even] inclined your ear to hear [His message], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: saying, ‘Turn now everyone from his evil way and the evil of your actions [that you may not forfeit the right to] live in the land that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given to you and your forefathers forever and ever; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and do not go after other gods to serve them and to worship them, and do not provoke Me to anger with the work of your hands, and I will do you no harm.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet you have not listened to Me,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “so that you have provoked Me to anger with the work (idols) of your hands to your own harm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, ‘Because you have not obeyed My words, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: behold (hear this), I will send for all the families of the north,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will send
  - type: text
    text: ' for Nebuchadnezzar king of Babylon, My servant [to enact My plan], and I will bring them against this land and against its inhabitants and against all these surrounding nations; and I will utterly destroy them and make them a horror and a hissing [that is, an object of warning and ridicule] and an everlasting desolation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moreover, I will take from them the voice of joy and the voice of gladness, the voice of the bridegroom and the voice of the bride, the sound of the millstones [grinding meal] and the light of the lamp [to light the night]. [Jer 7:34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This whole land will be a waste and a horror, and these nations will serve the king of Babylon '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As history shows, this prophecy was fulfilled, whether it refers to the duration of the Babylonian Empire (from the beginning of Nebuchadnezzar’s reign in 605 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. until its downfall in 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '.), or to the length of the Jewish captivity in Babylon (with the first deportation in 605 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. and the first return in 538 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .). For the fulfillment of specific details concerning the destruction and perpetual desolation of Babylon, see notes Is 13:22; 14:23.
    marker-yv: yv-n
  - type: text
    text: seventy years. [2 Chr 36:20-23; Jer 4:27; 12:11, 12; Dan 9:2]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Babylon Will Be Judged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ‘Then when seventy years are completed, I will punish the king of Babylon and that nation, the land of the Chaldeans (Babylonia),’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘for their wickedness, and will make the land [of the Chaldeans] a perpetual waste. [Jer 29:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will bring on that land all My words which I have pronounced against it, all that is written in this book which Jeremiah has prophesied against all the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: (For many nations and great kings will make slaves of them, even the Chaldeans [who enslaved other nations]; and I will repay [all of] them according to their deeds and according to the work of their [own] hands.)’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, to me, “Take this cup of the wine of wrath from My hand and cause all the nations to whom I send you to drink it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They will drink and stagger and go mad because of the sword that I will send among them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then I (Jeremiah) took the cup from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' hand and made all the nations to whom the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had sent me drink it: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jerusalem and the cities of Judah [being most guilty because their privileges were greatest], its kings and princes, to make them a horror, a ruin, a hissing and a curse, as it is to this day; [1 Pet 4:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pharaoh king of Egypt, his servants, his princes, all his people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and all the foreign (mixed) population, all the kings of the land of Uz, and all the kings of the land of the Philistines (and [their cities of] Ashkelon, Gaza, Ekron, and the remnant of Ashdod); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Edom, Moab, and the children of Ammon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'all the kings of Tyre, all the kings of Sidon, and the kings of the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the coastlands across the [Mediterranean] Sea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dedan, Tema, Buz [the neighboring tribes north of Arabia], and all who clip off the side-growth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of their hair;
  - type: text
    text: ' [Lev 19:27; Jer 9:26] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'all the kings of Arabia and all the kings of the foreign population who live in the desert; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'all the kings of Zimri, all the kings of Elam (Persia), and all the kings of Media; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: all the kings of the north, far and near, one after another—and all the kingdoms of the world which are on the face of the earth. And the king of Sheshach (Babylon) shall drink after them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Then you shall say to them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, “Drink, be drunk, vomit, and fall to rise no more because of the sword which I will send among you.” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And if they refuse to take the cup from your hand to drink, then you will say to them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “You shall surely drink! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For behold, I am beginning to work disaster in the city which is called by My Name, and shall you go unpunished? You will not be exempt from punishment, for I am calling for a sword against all the inhabitants of the earth,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.’ [Jer 7:10]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Therefore prophesy all these words against them and say to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will roar from on high'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And utter His voice from His holy dwelling;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will roar mightily against His fold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pasture.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will jubilantly shout like those who tread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the grapes
  - type: text
    text: ' [in the wine press],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against all the inhabitants of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ‘A noise has come to the end of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has a controversy with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an indictment against the nations.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is entering into judgment with all mankind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for the wicked, He has given them to the sword,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, evil is going forth
- type: usfm
  marker: q1
  children:
  - type: text
    text: From nation to nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a great whirling tempest is rising
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the remotest part of the earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “And those slain by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on that day will be from one end of the earth to the other end of the earth. They will not be lamented (mourned over with expressions of grief) or gathered or buried; they will be like dung on the ground. [Jer 8:2; 16:4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Wail, you shepherds, and cry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And roll in ashes, you masters of the flock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the days of your slaughter and of your dispersions have come in full,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you will fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be broken into pieces like a choice vessel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “The shepherds will have no way to flee,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor the masters of the flock any [way of] escape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “A voice! The cry of the shepherds
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the wailing of the masters of the flock!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is destroying their pasture,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'And the peaceful folds are devastated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' made silent'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the fierce anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “He has left His lair like the lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For their land has become a horror
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the fierceness of the oppressor
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' fierce anger.”'
