  - type: text
    content: 'Can a land '
  - type: note
    content: As foretold here and in Ezek 37:21, 22, Israel became a recognized nation, actually “born in one day.” After being away from their homeland for almost 2,000 years, the Jews were given a national homeland in Palestine by the Balfour Declaration in November 1917. In 1922, the League of Nations gave Great Britain the mandate over Palestine. On May 14, 1948, Great Britain withdrew her mandate, and immediately Israel was declared a sovereign state, and her growth and importance among nations was astonishing.
