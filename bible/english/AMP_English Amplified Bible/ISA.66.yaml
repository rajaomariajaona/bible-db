  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Heaven Is God’s Throne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Heaven is My throne and the earth is My footstool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where, then, is a house that you could build for Me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where will My resting place be? [Acts 17:24]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “For all these things My hand has made,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So all these things came into being [by and for Me],” declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “But to this one I will look [graciously],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To him who is humble and contrite in spirit, and who [reverently] trembles at My word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honors My commands. [John 4:24]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hypocrisy Rebuked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶“He who kills an ox [for pagan sacrifice] is [as guilty] as one who kills a man;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who sacrifices a lamb, as one who breaks a dog’s neck;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He who offers a grain offering, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as one who offers
  - type: text
    text: ' swine’s blood;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who offers incense, as one who blesses an idol.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such people have chosen their own ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their soul delights in their repulsive acts;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So I will choose their punishments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will bring the things they dread upon them
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I called, but no one answered;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I spoke, but they did not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obey.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they did evil in My sight
- type: usfm
  marker: q1
  children:
  - type: text
    text: And chose that in which I did not delight.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you who tremble [with awe-filled reverence] at His word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your brothers who hate you, who exclude you for My Name’s sake,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have said, ‘Let the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be glorified, that we may see your joy.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they will be put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “The sound of an uproar from the city! A voice from the temple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', providing retribution to His enemies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Before she (Zion) was in labor, she gave birth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before her labor pain came, she gave birth to a boy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Who has heard of such a thing? Who has seen such things?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Can a land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As foretold here and in Ezek 37:21, 22, Israel became a recognized nation, actually “born in one day.” After being away from their homeland for almost 2,000 years, the Jews were given a national homeland in Palestine by the Balfour Declaration in November 1917. In 1922, the League of Nations gave Great Britain the mandate over Palestine. On May 14, 1948, Great Britain withdrew her mandate, and immediately Israel was declared a sovereign state, and her growth and importance among nations was astonishing.
    marker-yv: yv-n
  - type: text
    text: be born in one day?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or can a nation be brought forth in a moment?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As soon as Zion was in labor, she also brought forth her sons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Shall I bring to the moment of birth and not give delivery?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Or shall I who gives delivery shut '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the womb?
  - type: text
    text: ” says your God.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joy in Jerusalem’s Future
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Rejoice with Jerusalem and be glad for her, all you who love her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rejoice greatly with her, all you who mourn over her,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: That you may nurse and be satisfied with her comforting breasts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may drink deeply and be delighted with her bountiful bosom.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says this, “Behold, I extend peace to her (Jerusalem) like a river,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the glory of the nations like an overflowing stream;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you will be nursed, you will be carried on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her
  - type: text
    text: ' hip and [playfully] rocked on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her
  - type: text
    text: ' knees.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “As one whom his mother comforts, so I will comfort you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will be comforted in Jerusalem.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When you see this, your heart will rejoice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your bones will flourish like new grass.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the [powerful] hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be revealed to His servants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His indignation will be toward His enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For indeed, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will come in fire'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His chariots will be like the stormy wind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To render His anger with rage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His rebuke with flames of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will execute judgment by fire'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by His sword on all mankind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those slain by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be many.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Those who [vainly attempt to] sanctify and cleanse themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to go
  - type: text
    text: ' to the gardens [to sacrifice to idols],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Following after '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps referring to the image of the Syrian god Adad. Some commentators also suggest that this may refer to the cultic leader in the center who shows by his example how to conduct the ceremonies.
    marker-yv: yv-n
  - type: text
    text: one in the center,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who eat swine’s flesh, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may refer to a reptile of some kind.
    marker-yv: yv-n
  - type: text
    text: detestable things and mice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will come to an end together,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“For I know their works and their thoughts. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The time
  - type: text
    text: ' is coming to gather all nations and languages, and they will come and see My glory. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I will set up a [miraculous] sign among them, and from them I will send survivors to the nations: Tarshish, Pul (Put), Lud, Meshech, Tubal and Javan, to the distant islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands that have not heard of My fame nor seen My glory. And they will declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaim My glory among the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then they shall bring all your countrymen (children of Israel) from all the nations as a grain offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: —on horses, in chariots, in litters, on mules and on camels—to My holy mountain Jerusalem,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “just as the sons of Israel bring their grain offering in a clean vessel to the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will also take some of them as priests and Levites,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “For just as the new heavens and the new earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Which I make will remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure before Me,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“So your offspring and your name will remain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “And it shall be that from New Moon to New Moon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from Sabbath to Sabbath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All mankind will come to bow down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship before Me,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Then they will go forth and look
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon the dead bodies of the [rebellious] men
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have transgressed against Me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For their worm (maggot) will not die,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their fire will not go out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will be an abhorrence to all mankind.”
