verses:
  '1':
  - type: heading
    content: Be Imitators of God
  - type: text
    content: 'Therefore become imitators of God [copy Him and follow His example], as well-beloved children [imitate their father]; '
  '10':
  - type: text
    content: 'trying to learn [by experience] what is pleasing to the Lord [and letting your lifestyles be examples of what is most acceptable to Him—your behavior expressing gratitude to God for your salvation]. '
  '11':
  - type: text
    content: 'Do not participate in the worthless '
  - type: text
    content: and
  - type: text
    content: ' unproductive deeds of darkness, but instead expose them [by exemplifying personal integrity, moral courage, and godly character]; '
  '12':
  - type: text
    content: 'for it is disgraceful even to mention the things that such people practice in secret. '
  '13':
  - type: text
    content: 'But all things become visible when they are exposed by the light [of God’s precepts], for '
  - type: note
    content: Paul, who was privileged to study under the brilliant Gamaliel (Acts 22:3), is probably speaking from the viewpoint of ancient Greek science. Even the philosopher Plato maintained that vision essentially is the process of light forming an image of an object it touches and conveying that image to the eyes. So Paul may mean that what is actually seen is an image composed of light (like the photographic process), and since light is always reliable and its physical properties are constant, nothing exposed to light escapes being revealed. Spiritually speaking, to the extent that a believer functions as Light (v 8), he will expose the sins of unbelievers simply by his presence, just as it is the nature of light to expose whatever it touches.
  - type: text
    content: 'it is light that makes everything visible. '
  '14':
  - type: text
    content: For this reason He says,
  - type: text
    content: “Awake, sleeper,
  - type: text
    content: And arise from the dead,
  - type: text
    content: 'And Christ will shine [as dawn] upon you '
  - type: text
    content: and
  - type: text
    content: ' give you light.” [Is 26:19; 51:17; 52:1; 60:1, 2]'
  '15':
  - type: text
    content: 'Therefore see that you walk carefully [living life with honor, purpose, and courage; shunning those who tolerate and enable evil], not as the unwise, but as wise [sensible, intelligent, discerning people], '
  '16':
  - type: note
    content: The Greek word in this verse means “buy up at the market place.” Opportunity is regarded as a commodity to be used by believers.
  - type: text
    content: 'making the very most of your time [on earth, recognizing and taking advantage of each opportunity and using it with wisdom and diligence], because the days are [filled with] evil. '
  '17':
  - type: text
    content: 'Therefore do not be foolish '
  - type: text
    content: and
  - type: text
    content: ' thoughtless, but understand '
  - type: text
    content: and
  - type: text
    content: ' firmly grasp what the will of the Lord is. '
  '18':
  - type: text
    content: 'Do not get drunk with wine, for that is wickedness (corruption, stupidity), but be filled with the [Holy] Spirit '
  - type: text
    content: and
  - type: text
    content: ' constantly guided by Him. [Prov 23:20] '
  '19':
  - type: note
    content: The Greeks had a tradition of holding drinking parties (called, in the singular, a symposium) where the object was to sing the praises of the pagan gods while becoming drunk. Perhaps with this tradition in mind, Paul instructs believers to “be filled” instead with the Holy Spirit and to sing meaningful praises to God.
  - type: text
    content: 'Speak to one another in psalms and hymns and spiritual songs, [offering praise by] singing and making melody with your heart to the Lord; '
  '2':
  - type: text
    content: 'and walk '
  - type: text
    content: continually
  - type: text
    content: ' in love [that is, value one another—practice empathy and compassion, unselfishly seeking the best for others], just as Christ also loved you and gave Himself up for us, an offering and sacrifice to God [slain for you, so that it became] a sweet fragrance. [Ezek 20:41]'
  '20':
  - type: text
    content: 'always giving thanks to God the Father for all things, in the name of our Lord Jesus Christ; '
  '21':
