  - type: text
    content: ' '
  - type: note
    content: The wife to her husband, not to men in general; not as inferior to him, nor in violation of her Christian ethics, but honoring her husband as protector and head of the home, respecting the responsibility of his position and his accountability to God.
  - type: text
