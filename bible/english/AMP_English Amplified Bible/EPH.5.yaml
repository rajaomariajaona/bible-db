document_id: EPH.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Be Imitators of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore become imitators of God [copy Him and follow His example], as well-beloved children [imitate their father]; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' in love [that is, value one another—practice empathy and compassion, unselfishly seeking the best for others], just as Christ also loved you and gave Himself up for us, an offering and sacrifice to God [slain for you, so that it became] a sweet fragrance. [Ezek 20:41]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But sexual immorality and all [moral] impurity [indecent, offensive behavior] or greed must not even be hinted at among you, as is proper among saints [for as believers our way of life, whether in public or in private, reflects the validity of our faith]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Let there be no filthiness and silly talk, or coarse [obscene or vulgar] joking, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: because
  - type: text
    text: ' such things are not appropriate [for believers]; but instead speak of your thankfulness [to God]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For be sure of this: no immoral, impure, or greedy person—for that one is [in effect] an idolater—has any inheritance in the kingdom of Christ and God [for such a person places a higher value on something other than God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Let no one deceive you with empty arguments [that encourage you to sin], for because of these things the wrath of God comes upon the sons of disobedience [those who habitually sin]. [Lev 18:24, 25] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So do not participate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' even associate with them [in the rebelliousness of sin]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For once you were darkness, but now you are light in the Lord; walk as children of Light [live as those who are native-born to the Light] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(for the fruit [the effect, the result] of the Light consists in all goodness and righteousness and truth), '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'trying to learn [by experience] what is pleasing to the Lord [and letting your lifestyles be examples of what is most acceptable to Him—your behavior expressing gratitude to God for your salvation]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Do not participate in the worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unproductive deeds of darkness, but instead expose them [by exemplifying personal integrity, moral courage, and godly character]; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'for it is disgraceful even to mention the things that such people practice in secret. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But all things become visible when they are exposed by the light [of God’s precepts], for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul, who was privileged to study under the brilliant Gamaliel (Acts 22:3), is probably speaking from the viewpoint of ancient Greek science. Even the philosopher Plato maintained that vision essentially is the process of light forming an image of an object it touches and conveying that image to the eyes. So Paul may mean that what is actually seen is an image composed of light (like the photographic process), and since light is always reliable and its physical properties are constant, nothing exposed to light escapes being revealed. Spiritually speaking, to the extent that a believer functions as Light (v 8), he will expose the sins of unbelievers simply by his presence, just as it is the nature of light to expose whatever it touches.
    marker-yv: yv-n
  - type: text
    text: 'it is light that makes everything visible. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For this reason He says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Awake, sleeper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And arise from the dead,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And Christ will shine [as dawn] upon you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give you light.” [Is 26:19; 51:17; 52:1; 60:1, 2]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore see that you walk carefully [living life with honor, purpose, and courage; shunning those who tolerate and enable evil], not as the unwise, but as wise [sensible, intelligent, discerning people], '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word in this verse means “buy up at the market place.” Opportunity is regarded as a commodity to be used by believers.
    marker-yv: yv-n
  - type: text
    text: 'making the very most of your time [on earth, recognizing and taking advantage of each opportunity and using it with wisdom and diligence], because the days are [filled with] evil. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore do not be foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughtless, but understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' firmly grasp what the will of the Lord is. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Do not get drunk with wine, for that is wickedness (corruption, stupidity), but be filled with the [Holy] Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' constantly guided by Him. [Prov 23:20] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greeks had a tradition of holding drinking parties (called, in the singular, a symposium) where the object was to sing the praises of the pagan gods while becoming drunk. Perhaps with this tradition in mind, Paul instructs believers to “be filled” instead with the Holy Spirit and to sing meaningful praises to God.
    marker-yv: yv-n
  - type: text
    text: 'Speak to one another in psalms and hymns and spiritual songs, [offering praise by] singing and making melody with your heart to the Lord; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'always giving thanks to God the Father for all things, in the name of our Lord Jesus Christ; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: being subject to one another out of reverence for Christ.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Marriage Like Christ and the Church
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Wives, be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: subject
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The wife to her husband, not to men in general; not as inferior to him, nor in violation of her Christian ethics, but honoring her husband as protector and head of the home, respecting the responsibility of his position and his accountability to God.
    marker-yv: yv-n
  - type: text
    text: 'to your own husbands, as [a service] to the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the husband is head of the wife, as Christ is head of the church, Himself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' the Savior of the body. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But as the church is subject to Christ, so also wives should be subject to their husbands in everything [respecting both their position as protector and their responsibility to God as head of the house].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Husbands, love your wives [seek the highest good for her and surround her with a caring, unselfish love], just as Christ also loved the church and gave Himself up for her, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'so that He might sanctify the church, having cleansed her by the washing of water with the word [of God], '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'so that [in turn] He might present the church to Himself in glorious splendor, without spot or wrinkle or any such thing; but that she would be holy [set apart for God] and blameless. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Even so husbands should '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are morally obligated to love their own wives as [being in a sense] their own bodies. He who loves his own wife loves himself. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For no one ever hated his own body, but [instead] he nourishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protects and cherishes it, just as Christ does the church, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'because we are members (parts) of His body. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: F
  - type: usfm
    marker: sc
    children:
    - type: text
      text: or this reason a man shall leave his father and his mother and shall be joined
  - type: text
    text: ' [and be faithfully devoted] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: to his wife
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and the two shall become
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The bond between husband and wife supersedes all other relationships.
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: one flesh
  - type: text
    text: '. [Gen 2:24] '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'This mystery [of two becoming one] is great; but I am speaking with reference to [the relationship of] Christ and the church. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'However, each man among you [without exception] is to love his wife as his very own self [with behavior worthy of respect and esteem, always seeking the best for her with an attitude of lovingkindness], and the wife [must see to it] that she respects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delights in her husband [that she notices him and prefers him and treats him with loving concern, treasuring him, honoring him, and holding him dear]. [1 Pet 3:2]'
