    content: But as the church is subject to Christ, so also wives should be subject to their husbands in everything [respecting both their position as protector and their responsibility to God as head of the house].
  '25':
  - type: text
    content: 'Husbands, love your wives [seek the highest good for her and surround her with a caring, unselfish love], just as Christ also loved the church and gave Himself up for her, '
  '26':
  - type: text
    content: 'so that He might sanctify the church, having cleansed her by the washing of water with the word [of God], '
  '27':
