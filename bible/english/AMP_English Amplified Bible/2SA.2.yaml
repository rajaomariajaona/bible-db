document_id: 2SA.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Made King over Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So it happened after this that David inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “Shall I go up into one of the cities of Judah?” And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, “Go up.” David asked, “Where shall I go?” And He said, “To Hebron.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David went up there [to Hebron] with his two wives also, Ahinoam of Jezreel and Abigail the widow of Nabal of Carmel [in Judah]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And David brought up his men who were with him, each one with his household; and they lived in the cities of Hebron. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the men of Judah came and there they anointed David king over the house of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'hen they told David, “It was the men of Jabesh-gilead who buried Saul.” [1 Sam 31:11-13] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So David sent messengers to the men of Jabesh-gilead, and said to them, “May you be blessed by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' because you showed this graciousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loyalty to Saul your lord (king), and buried him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' show lovingkindness and truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness to you. I too will show this goodness to you, because you have done this thing. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So now, let your hands be strong and be valiant; for your lord Saul is dead, and also the house of Judah has anointed me king over them.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ish-bosheth Made King over Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now [Saul’s cousin] Abner the son of Ner, commander of Saul’s army, had taken Ish-bosheth the son of Saul and brought him over to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A fortified city in Gilead east of the river Jordan.
    marker-yv: yv-n
  - type: text
    text: 'Mahanaim. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He made him king over Gilead, over the Ashurites, over Jezreel, over Ephraim, over Benjamin, even over all Israel [except Judah]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ish-bosheth, Saul’s son, was forty years old when he became king over Israel, and he reigned for two years. But the house of Judah followed David. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the time that David was king in Hebron over the house of Judah was seven years and six months.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Civil War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now Abner the son of Ner and the servants of Ish-bosheth the son of Saul went out from Mahanaim to Gibeon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Joab [David’s nephew] the son of Zeruiah and the servants of David also went out and met them by the pool of Gibeon. They sat down, with one group on one side of the pool and the other group on the other side of the pool. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Abner said to Joab, “Let the young men now stand and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: make sport
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'have a contest before us.” And Joab said, “Let them stand.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they stood up and went over by number, twelve for Benjamin and Ish-bosheth the son of Saul, and twelve of the servants of David. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Each one of them seized his opponent by the head and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: thrust
  - type: text
    text: ' his sword into his opponents side; so they fell down together. Therefore that place was called Helkath-hazzurim [that is, the Field of Sides], which is in Gibeon. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: There was a very fierce battle that day, and Abner and the men of Israel were beaten before the servants of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Three sons of Zeruiah [the half-sister of David] were there: Joab, Abishai, and Asahel. Now Asahel was as light '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swift-footed as one of the [wild] gazelles in the field. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Asahel pursued Abner and did not turn to the right or to the left as he followed him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Abner looked behind him and said, “Is that you, Asahel?” He answered, “It is I.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So Abner said to him, “Turn to your right or to your left, and grab one of the young men and take his armor for yourself.” But Asahel was not willing to turn away from pursuing Abner. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abner repeated again, “Turn away from following me. Why should I have to strike you to the ground? How would I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lift up my face
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'be able to face Joab your brother [and look him in the eye]?” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But Asahel refused to turn away; so Abner struck him in the abdomen with the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abner’s strength was legendary—there was a saying in Jewish tradition that it was easier to move a wall six cubits (nine feet) thick than to move one of Abner’s limbs.
    marker-yv: yv-n
  - type: text
    text: butt end of his spear, and the spear came out his back; and he fell there and died on that spot. And it came about that everyone who came to the place where Asahel fell and died, stood still [and reflected].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But Joab and Abishai [Asahel’s brothers] pursued Abner. When the sun was going down, they came to the hill of Ammah, which is in front of Giah on the way to the wilderness of Gibeon. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the sons of [the tribe of] Benjamin gathered together behind Abner and became one troop, and took their stand on the top of a hill. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Abner called to Joab, “Must the sword devour forever? Do you not know that it will be bitter in the end? How long [will it be] before you tell the people to stop pursuing their brothers?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Joab said, “As God lives, if you had not spoken, then the people certainly would have stopped pursuing their brothers in the morning.” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Joab blew the trumpet; and all the people halted and no longer pursued Israel, nor did they fight anymore. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then Abner and his men went through the Arabah (desert region) all that night, crossed the Jordan, went through Bithron and walked the whole morning and came to Mahanaim [where Ish-bosheth ruled Israel].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joab returned from pursuing Abner; and when he had gathered all the people together, nineteen of David’s servants were missing, besides Asahel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But the servants of David had struck down many of Benjamin and Abner’s men; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so that
  - type: text
    text: ' three hundred and sixty men died. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And they picked up [the body of] Asahel and buried him in the tomb of his father in Bethlehem. Then Joab and his men walked all night and they arrived in Hebron at daybreak.
