document_id: 2SA.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David Made King over Judah
  - type: text
    content: So it happened after this that David inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “Shall I go up into one of the cities of Judah?” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Go up.” David asked, “Where shall I go?” And He said, “To Hebron.” '
  '10':
  - type: text
    content: 'Ish-bosheth, Saul’s son, was forty years old when he became king over Israel, and he reigned for two years. But the house of Judah followed David. '
  '11':
  - type: text
    content: And the time that David was king in Hebron over the house of Judah was seven years and six months.
  - type: heading
    content: Civil War
  '12':
  - type: text
    content: 'Now Abner the son of Ner and the servants of Ish-bosheth the son of Saul went out from Mahanaim to Gibeon. '
  '13':
  - type: text
    content: 'Joab [David’s nephew] the son of Zeruiah and the servants of David also went out and met them by the pool of Gibeon. They sat down, with one group on one side of the pool and the other group on the other side of the pool. '
  '14':
  - type: text
    content: 'Then Abner said to Joab, “Let the young men now stand and '
  - type: note
    content: Lit make sport.
  - type: text
    content: 'have a contest before us.” And Joab said, “Let them stand.” '
  '15':
  - type: text
    content: 'So they stood up and went over by number, twelve for Benjamin and Ish-bosheth the son of Saul, and twelve of the servants of David. '
  '16':
  - type: text
    content: 'Each one of them seized his opponent by the head and '
  - type: text
    content: thrust
  - type: text
    content: ' his sword into his opponents side; so they fell down together. Therefore that place was called Helkath-hazzurim [that is, the Field of Sides], which is in Gibeon. '
  '17':
  - type: text
    content: There was a very fierce battle that day, and Abner and the men of Israel were beaten before the servants of David.
  '18':
  - type: text
    content: 'Three sons of Zeruiah [the half-sister of David] were there: Joab, Abishai, and Asahel. Now Asahel was as light '
  - type: text
    content: and
  - type: text
    content: ' swift-footed as one of the [wild] gazelles in the field. '
  '19':
  - type: text
    content: 'Asahel pursued Abner and did not turn to the right or to the left as he followed him. '
  '2':
  - type: text
    content: 'So David went up there [to Hebron] with his two wives also, Ahinoam of Jezreel and Abigail the widow of Nabal of Carmel [in Judah]. '
  '20':
  - type: text
    content: 'Then Abner looked behind him and said, “Is that you, Asahel?” He answered, “It is I.” '
  '21':
  - type: text
    content: 'So Abner said to him, “Turn to your right or to your left, and grab one of the young men and take his armor for yourself.” But Asahel was not willing to turn away from pursuing Abner. '
  '22':
  - type: text
    content: 'Abner repeated again, “Turn away from following me. Why should I have to strike you to the ground? How would I '
  - type: note
    content: Lit lift up my face.
  - type: text
    content: 'be able to face Joab your brother [and look him in the eye]?” '
  '23':
  - type: text
    content: 'But Asahel refused to turn away; so Abner struck him in the abdomen with the '
  - type: note
    content: Abner’s strength was legendary—there was a saying in Jewish tradition that it was easier to move a wall six cubits (nine feet) thick than to move one of Abner’s limbs.
  - type: text
    content: butt end of his spear, and the spear came out his back; and he fell there and died on that spot. And it came about that everyone who came to the place where Asahel fell and died, stood still [and reflected].
  '24':
  - type: text
    content: 'But Joab and Abishai [Asahel’s brothers] pursued Abner. When the sun was going down, they came to the hill of Ammah, which is in front of Giah on the way to the wilderness of Gibeon. '
  '25':
  - type: text
    content: 'And the sons of [the tribe of] Benjamin gathered together behind Abner and became one troop, and took their stand on the top of a hill. '
  '26':
  - type: text
    content: 'Then Abner called to Joab, “Must the sword devour forever? Do you not know that it will be bitter in the end? How long [will it be] before you tell the people to stop pursuing their brothers?” '
  '27':
  - type: text
    content: 'Joab said, “As God lives, if you had not spoken, then the people certainly would have stopped pursuing their brothers in the morning.” '
  '28':
  - type: text
    content: 'So Joab blew the trumpet; and all the people halted and no longer pursued Israel, nor did they fight anymore. '
  '29':
  - type: text
    content: Then Abner and his men went through the Arabah (desert region) all that night, crossed the Jordan, went through Bithron and walked the whole morning and came to Mahanaim [where Ish-bosheth ruled Israel].
  '3':
  - type: text
    content: 'And David brought up his men who were with him, each one with his household; and they lived in the cities of Hebron. '
  '30':
  - type: text
    content: 'Joab returned from pursuing Abner; and when he had gathered all the people together, nineteen of David’s servants were missing, besides Asahel. '
  '31':
  - type: text
    content: 'But the servants of David had struck down many of Benjamin and Abner’s men; '
  - type: text
    content: so that
  - type: text
    content: ' three hundred and sixty men died. '
  '32':
  - type: text
    content: And they picked up [the body of] Asahel and buried him in the tomb of his father in Bethlehem. Then Joab and his men walked all night and they arrived in Hebron at daybreak.
  '4':
  - type: text
    content: Then the men of Judah came and there they anointed David king over the house of Judah.
  - type: text
    content: T
  - type: text
    content: 'hen they told David, “It was the men of Jabesh-gilead who buried Saul.” [1 Sam 31:11-13] '
  '5':
  - type: text
    content: So David sent messengers to the men of Jabesh-gilead, and said to them, “May you be blessed by the L
  - type: heading
    content: ord
  - type: text
    content: ' because you showed this graciousness '
  - type: text
    content: and
  - type: text
    content: ' loyalty to Saul your lord (king), and buried him. '
  '6':
  - type: text
    content: Now may the L
  - type: heading
    content: ord
  - type: text
    content: ' show lovingkindness and truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness to you. I too will show this goodness to you, because you have done this thing. '
  '7':
  - type: text
    content: So now, let your hands be strong and be valiant; for your lord Saul is dead, and also the house of Judah has anointed me king over them.”
  - type: heading
    content: Ish-bosheth Made King over Israel
  '8':
  - type: text
    content: 'Now [Saul’s cousin] Abner the son of Ner, commander of Saul’s army, had taken Ish-bosheth the son of Saul and brought him over to '
  - type: note
    content: A fortified city in Gilead east of the river Jordan.
  - type: text
    content: 'Mahanaim. '
  '9':
  - type: text
    content: 'He made him king over Gilead, over the Ashurites, over Jezreel, over Ephraim, over Benjamin, even over all Israel [except Judah]. '
