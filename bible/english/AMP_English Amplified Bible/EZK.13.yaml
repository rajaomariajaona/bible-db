document_id: EZK.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: False Prophets Condemned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Son of man, prophesy against the prophets of Israel who prophesy, and say to those who prophesy from their own inspiration, ‘Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Woe (judgment is coming) to the foolish prophets who are following their own spirit [claiming to have seen things] but have [in fact] seen nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O Israel, your prophets have been like '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis said that foxes look in ruins to see where they can escape if they see people coming; so the false prophets only cared about saving themselves.
    marker-yv: yv-n
  - type: text
    text: 'foxes among the ruins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You have not gone up into the gaps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' breaches, nor built the wall around the house of Israel that it might stand in the battle on the day of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They have seen falsehood and lying divination, saying, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says,’ but the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has not sent them. Yet they hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make men to hope for the confirmation of their word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Did you not see (make up) a false vision and speak a lying divination when you said, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' declares,’ but it is not I who have spoken?” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Because you have spoken empty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delusive words and have seen lies, therefore behold, I am against you,” says the Lord God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“So My hand will be against the [counterfeit] prophets who see (make up) empty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delusive visions and who give lying prophecies. They will have no place in the [secret] council of My people, nor will they be recorded in the register of the house of Israel, nor will they enter into the land of Israel, that you may know [without any doubt] that I am the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'It is definitely because they have seduced My people, saying, ‘Peace,’ when there is no peace, and because when one builds a [flimsy] wall, behold, these [lying] prophets plaster it over with whitewash; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'so tell those who plaster it with whitewash, that it will fall! A flooding rain [of judgment] will come, and you, O [great] hailstones, will fall; and a violent wind will tear the wall apart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Behold, when the wall has fallen, will you not be asked, ‘Where is the coating with which you [prophets] plastered it?’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “I will make a violent wind break out in My wrath, and there will be in My anger an overwhelming rain and great hailstones to destroy [that wall] in wrath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So I will tear down the wall which you have plastered with whitewash and bring it down to the ground, so that its foundations will be exposed; when it falls, you will perish in its midst. And you shall know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand fully that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Thus I will expend My wrath on the wall and on those who have plastered it with whitewash and I will say to you, ‘The wall is gone and its plasterers are gone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: along with
  - type: text
    text: ' the [false] prophets of Israel who prophesy [deceitfully] to Jerusalem, and who see [false] visions of peace for her when there is no peace,’ says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Now you, son of man, set your face against the daughters of your people who are prophesying out of [the wishful thinking of] their own mind (inspiration). Prophesy against them '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Woe to the women who fasten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: magic
  - type: text
    text: ' (protective) charms on all wrists and make veils for the heads of those of every stature to capture [human] lives! Will you capture the lives of My people but keep your own? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You have profaned Me among My people [in payment] for handfuls of barley and for pieces of bread, killing people who should not die and giving [a guarantee of] life to those who should not live, because of your lies to My people who pay attention to lies.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Behold, I am against your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: magic
  - type: text
    text: ' bands [and veils] by which you hunt [human] lives as birds and I will tear them from your arms; and I will let the lives you hunt go free, even those lives whom you hunt as birds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will also tear off your [pagan] veils and rescue My people from your hands, and they will no longer be in your grip to be hunted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trapped. Then you will know [without any doubt] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Because you disheartened the righteous with falsehood when I did not cause him grief, but have encouraged the wicked not to turn from his wicked way and preserve his life, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: therefore, you women will no longer see false visions or practice divinations, and I will rescue My people from your hand. Then you will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
