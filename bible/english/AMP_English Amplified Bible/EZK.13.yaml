document_id: EZK.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: False Prophets Condemned
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me saying, '
  '10':
  - type: text
    content: 'It is definitely because they have seduced My people, saying, ‘Peace,’ when there is no peace, and because when one builds a [flimsy] wall, behold, these [lying] prophets plaster it over with whitewash; '
  '11':
  - type: text
    content: 'so tell those who plaster it with whitewash, that it will fall! A flooding rain [of judgment] will come, and you, O [great] hailstones, will fall; and a violent wind will tear the wall apart. '
  '12':
  - type: text
    content: 'Behold, when the wall has fallen, will you not be asked, ‘Where is the coating with which you [prophets] plastered it?’ ” '
  '13':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “I will make a violent wind break out in My wrath, and there will be in My anger an overwhelming rain and great hailstones to destroy [that wall] in wrath. '
  '14':
  - type: text
    content: 'So I will tear down the wall which you have plastered with whitewash and bring it down to the ground, so that its foundations will be exposed; when it falls, you will perish in its midst. And you shall know '
  - type: text
    content: and
  - type: text
    content: ' understand fully that I am the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Thus I will expend My wrath on the wall and on those who have plastered it with whitewash and I will say to you, ‘The wall is gone and its plasterers are gone, '
  '16':
  - type: text
    content: along with
  - type: text
    content: ' the [false] prophets of Israel who prophesy [deceitfully] to Jerusalem, and who see [false] visions of peace for her when there is no peace,’ says the Lord G'
  - type: heading
    content: od
  - type: text
    content: .
  '17':
  - type: text
    content: '“Now you, son of man, set your face against the daughters of your people who are prophesying out of [the wishful thinking of] their own mind (inspiration). Prophesy against them '
  '18':
  - type: text
    content: and say, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Woe to the women who fasten '
  - type: text
    content: magic
  - type: text
    content: ' (protective) charms on all wrists and make veils for the heads of those of every stature to capture [human] lives! Will you capture the lives of My people but keep your own? '
  '19':
  - type: text
    content: You have profaned Me among My people [in payment] for handfuls of barley and for pieces of bread, killing people who should not die and giving [a guarantee of] life to those who should not live, because of your lies to My people who pay attention to lies.” ’ ”
  '2':
  - type: text
    content: “Son of man, prophesy against the prophets of Israel who prophesy, and say to those who prophesy from their own inspiration, ‘Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: '! '
  '20':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I am against your '
  - type: text
    content: magic
  - type: text
    content: ' bands [and veils] by which you hunt [human] lives as birds and I will tear them from your arms; and I will let the lives you hunt go free, even those lives whom you hunt as birds. '
  '21':
  - type: text
    content: 'I will also tear off your [pagan] veils and rescue My people from your hands, and they will no longer be in your grip to be hunted '
  - type: text
    content: and
  - type: text
    content: ' trapped. Then you will know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Because you disheartened the righteous with falsehood when I did not cause him grief, but have encouraged the wicked not to turn from his wicked way and preserve his life, '
  '23':
  - type: text
    content: therefore, you women will no longer see false visions or practice divinations, and I will rescue My people from your hand. Then you will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '3':
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Woe (judgment is coming) to the foolish prophets who are following their own spirit [claiming to have seen things] but have [in fact] seen nothing. '
  '4':
  - type: text
    content: 'O Israel, your prophets have been like '
  - type: note
    content: The ancient rabbis said that foxes look in ruins to see where they can escape if they see people coming; so the false prophets only cared about saving themselves.
  - type: text
    content: 'foxes among the ruins. '
  '5':
  - type: text
    content: 'You have not gone up into the gaps '
  - type: text
    content: or
  - type: text
    content: ' breaches, nor built the wall around the house of Israel that it might stand in the battle on the day of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: They have seen falsehood and lying divination, saying, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' says,’ but the L'
  - type: heading
    content: ord
  - type: text
    content: ' has not sent them. Yet they hope '
  - type: text
    content: and
  - type: text
    content: ' make men to hope for the confirmation of their word. '
  '7':
  - type: text
    content: Did you not see (make up) a false vision and speak a lying divination when you said, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' declares,’ but it is not I who have spoken?” ’ ”'
  '8':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Because you have spoken empty '
  - type: text
    content: and
  - type: text
    content: ' delusive words and have seen lies, therefore behold, I am against you,” says the Lord God. '
  '9':
  - type: text
    content: '“So My hand will be against the [counterfeit] prophets who see (make up) empty '
  - type: text
    content: and
  - type: text
    content: ' delusive visions and who give lying prophecies. They will have no place in the [secret] council of My people, nor will they be recorded in the register of the house of Israel, nor will they enter into the land of Israel, that you may know [without any doubt] that I am the Lord G'
  - type: heading
    content: od
  - type: text
    content: '. '
