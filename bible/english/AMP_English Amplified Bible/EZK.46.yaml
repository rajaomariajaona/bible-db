document_id: EZK.46,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prince’s Offerings
  - type: text
    content: ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “The gate of the inner courtyard that faces east shall be shut during the six working days, but it shall be opened on the Sabbath day and opened on the day of the New Moon. '
  '10':
  - type: text
    content: When they go in, the prince shall go in among them; and when they go out, he shall go out.
  '11':
  - type: text
    content: '“At the feasts and the appointed festivals the grain offering shall be an ephah with a bull and an ephah with a ram, and with the lambs '
  - type: note
    content: Lit a gift of his hand.
  - type: text
    content: 'as much as one is able to give, and a hin of oil with an ephah. '
  '12':
  - type: text
    content: When the prince provides a freewill offering, a burnt offering, or peace offerings voluntarily to the L
  - type: heading
    content: ord
  - type: text
    content: ', the gate that faces east shall be opened for him, and he shall provide his burnt offering and his peace offerings as he does on the Sabbath day. Then he shall go out, and after he goes out the gate shall be shut.'
  '13':
  - type: text
    content: “And you [priests] shall provide a lamb a year old without blemish as a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' each day; morning by morning you shall provide it. '
  '14':
  - type: text
    content: Also you shall provide a grain offering with it morning by morning, one-sixth of an ephah with one-third of a hin of oil to sprinkle on the finely-milled flour. This is a perpetual ordinance for a continual grain offering to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '15':
  - type: text
    content: Thus they shall provide the lamb, the grain offering and the oil every morning as a continual burnt offering.”
  '16':
  - type: text
    content: ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “If the prince gives a gift to any of his sons from his inheritance, it shall belong to his sons [permanently]; it is their possession by inheritance. '
  '17':
  - type: text
    content: 'But if he gives a gift from his inheritance to one of his servants, then it shall be his until the year of liberty [the Year of Jubilee]; after that it shall be returned to the prince. His inheritance '
  - type: text
    content: shall be
  - type: text
    content: ' only his sons’ [permanently]; it shall belong to them. '
  '18':
  - type: text
    content: 'Moreover, the prince shall not take from the people’s inheritance by oppression '
  - type: text
    content: and
  - type: text
    content: ' by evicting them from their property; he shall give his sons an inheritance from his own possession, so that My people will not be scattered, anyone from his possession.” ’ ”'
  - type: heading
    content: The Boiling Places
  '19':
  - type: text
    content: 'Then he [my guide] brought me through the entrance, which was at the side of the gate, into the holy chambers for the priests, which faced the north; and behold, a place was there at their extreme westward end. '
  '2':
  - type: text
    content: 'The prince shall enter by the porch (portico) of the gate from outside and stand by the post of the gate. The priests shall prepare '
  - type: text
    content: and
  - type: text
    content: ' provide his burnt offering and his peace offerings, and he shall worship '
  - type: note
    content: Only the priests will be allowed in the inner courtyard.
  - type: text
    content: 'at the threshold of the gate and then go out; but the gate shall not be shut until evening. '
  '20':
  - type: text
    content: He said to me, “This is the place where the priests shall boil (cook) the guilt offering and the sin offering, and where they shall bake the grain offering, so that they do not bring them out into the outer courtyard to transmit holiness to the people.”
  '21':
  - type: text
    content: 'Then he brought me out into the outer courtyard and led me across to the four corners of the courtyard; and behold, in every corner of the courtyard '
  - type: text
    content: there was a small
  - type: text
    content: ' courtyard. '
  '22':
  - type: text
    content: 'In the four corners of the courtyard '
  - type: text
    content: there were
  - type: text
    content: ' enclosed courtyards, forty '
  - type: text
    content: cubits
  - type: text
    content: ' long and thirty wide; these four in the corners were the same size. '
  '23':
  - type: text
    content: There was
  - type: text
    content: ' a row '
  - type: text
    content: of masonry
  - type: text
    content: ' all around inside them, around [each of] the four courtyards, and it was made with cooking hearths under the rows all around. '
  '24':
  - type: text
    content: 'Then he said to me, “These are the '
  - type: note
    content: Lit houses.
  - type: text
    content: kitchens of the cooks, where the ministers (Levites) of the temple shall boil (cook) the sacrifices of the people.”
  '3':
  - type: text
    content: The people of the land shall also worship at the entrance of that gate before the L
  - type: heading
    content: ord
  - type: text
    content: ' on the Sabbaths and on the New Moons. '
  '4':
  - type: text
    content: The burnt offering which the prince shall offer to the L
  - type: heading
    content: ord
  - type: text
    content: ' on the Sabbath day shall be six lambs without blemish and a ram without blemish. '
  '5':
  - type: text
    content: 'The grain offering shall be an ephah with the ram, and the grain offering with the lambs as much as he is able to give, and a hin of oil with an ephah. '
  '6':
  - type: text
    content: 'On the day of the New Moon '
  - type: text
    content: he shall offer
  - type: text
    content: ' a young bull without blemish, also six lambs and a ram, without blemish. '
  '7':
  - type: text
    content: 'And he shall provide a grain offering, an ephah with the bull and an ephah with the ram, and with the lambs as much as he is able, and a hin of oil with an ephah. '
  '8':
  - type: text
    content: 'When the prince enters, he shall enter by way of the porch of the gate and go out by the same way. '
  '9':
  - type: text
    content: But when the people of the land come before the L
  - type: heading
    content: ord
  - type: text
    content: ' at the appointed feasts, he who enters by way of the north gate to worship shall go out by way of the south gate. And he who enters by way of the south gate shall go out by way of the north gate. No one shall return by way of the gate through which he entered, but shall go out straight ahead [through the opposite gate]. [Phil 3:13] '
