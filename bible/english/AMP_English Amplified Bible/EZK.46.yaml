document_id: EZK.46,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Prince’s Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “The gate of the inner courtyard that faces east shall be shut during the six working days, but it shall be opened on the Sabbath day and opened on the day of the New Moon. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they go in, the prince shall go in among them; and when they go out, he shall go out.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At the feasts and the appointed festivals the grain offering shall be an ephah with a bull and an ephah with a ram, and with the lambs '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a gift of his hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'as much as one is able to give, and a hin of oil with an ephah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the prince provides a freewill offering, a burnt offering, or peace offerings voluntarily to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the gate that faces east shall be opened for him, and he shall provide his burnt offering and his peace offerings as he does on the Sabbath day. Then he shall go out, and after he goes out the gate shall be shut.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And you [priests] shall provide a lamb a year old without blemish as a burnt offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' each day; morning by morning you shall provide it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also you shall provide a grain offering with it morning by morning, one-sixth of an ephah with one-third of a hin of oil to sprinkle on the finely-milled flour. This is a perpetual ordinance for a continual grain offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus they shall provide the lamb, the grain offering and the oil every morning as a continual burnt offering.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “If the prince gives a gift to any of his sons from his inheritance, it shall belong to his sons [permanently]; it is their possession by inheritance. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he gives a gift from his inheritance to one of his servants, then it shall be his until the year of liberty [the Year of Jubilee]; after that it shall be returned to the prince. His inheritance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' only his sons’ [permanently]; it shall belong to them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, the prince shall not take from the people’s inheritance by oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by evicting them from their property; he shall give his sons an inheritance from his own possession, so that My people will not be scattered, anyone from his possession.” ’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Boiling Places
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he [my guide] brought me through the entrance, which was at the side of the gate, into the holy chambers for the priests, which faced the north; and behold, a place was there at their extreme westward end. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The prince shall enter by the porch (portico) of the gate from outside and stand by the post of the gate. The priests shall prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provide his burnt offering and his peace offerings, and he shall worship '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Only the priests will be allowed in the inner courtyard.
      marker-yv: yv-n
    - type: text
      text: 'at the threshold of the gate and then go out; but the gate shall not be shut until evening. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to me, “This is the place where the priests shall boil (cook) the guilt offering and the sin offering, and where they shall bake the grain offering, so that they do not bring them out into the outer courtyard to transmit holiness to the people.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought me out into the outer courtyard and led me across to the four corners of the courtyard; and behold, in every corner of the courtyard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was a small
    - type: text
      text: ' courtyard. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the four corners of the courtyard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' enclosed courtyards, forty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long and thirty wide; these four in the corners were the same size. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There was
    - type: text
      text: ' a row '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of masonry
    - type: text
      text: ' all around inside them, around [each of] the four courtyards, and it was made with cooking hearths under the rows all around. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me, “These are the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: houses
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: kitchens of the cooks, where the ministers (Levites) of the temple shall boil (cook) the sacrifices of the people.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people of the land shall also worship at the entrance of that gate before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the Sabbaths and on the New Moons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The burnt offering which the prince shall offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the Sabbath day shall be six lambs without blemish and a ram without blemish. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The grain offering shall be an ephah with the ram, and the grain offering with the lambs as much as he is able to give, and a hin of oil with an ephah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the day of the New Moon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he shall offer
    - type: text
      text: ' a young bull without blemish, also six lambs and a ram, without blemish. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall provide a grain offering, an ephah with the bull and an ephah with the ram, and with the lambs as much as he is able, and a hin of oil with an ephah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the prince enters, he shall enter by way of the porch of the gate and go out by the same way. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the people of the land come before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' at the appointed feasts, he who enters by way of the north gate to worship shall go out by way of the south gate. And he who enters by way of the south gate shall go out by way of the north gate. No one shall return by way of the gate through which he entered, but shall go out straight ahead [through the opposite gate]. [Phil 3:13] '
