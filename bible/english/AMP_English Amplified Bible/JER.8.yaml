segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sin and Treachery of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “At that time,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “they [the Babylonian army] will bring out from their graves the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The graves were opened to get any treasure they might contain, but the bones were scattered in order to humiliate and intimidate the Jews.
    marker-yv: yv-n
  - type: text
    text: 'bones of the kings of Judah, the bones of its princes, the bones of the priests, the bones of the prophets, and the bones of the inhabitants of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They will [carelessly scatter and] spread them out before the sun and the moon and all the host of heaven, which the dead have loved and which they have served, and which they have walked after and which they have sought, and which they have worshiped. They will not be gathered or be buried; they will be like '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The man-made gods of the stars and the moon and the sun were of no help to their worshipers.
    marker-yv: yv-n
  - type: text
    text: 'dung on the face of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And death will be chosen rather than life by all the remnant of those who remain of this evil family (nation), who remain in all the places to which I have driven them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Moreover [Jeremiah], you shall say to them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do men fall and not rise up again?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does one turn away [from God] and not repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return [to Him]?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Why then has this people of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turned away with a perpetual turning away [from Me]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They hold tightly to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Idolatry is deceitful because in their idolatry men and women worship that which is false and worthless. It deludes the worshipers and causes them to believe a lie.
    marker-yv: yv-n
  - type: text
    text: deceit (idolatry);
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They refuse to repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' return [to God].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I have listened and heard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they have spoken what is not right;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No man repented of his wickedness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘What have I done?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone turns to his [individual] course,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the horse rushes like a torrent into battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Even the stork in the sky
- type: usfm
  marker: q1
  children:
  - type: text
    text: Knows her seasons [of migration],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the turtledove, the swallow and the crane
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observe the time of their return.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But My people do not know
- type: usfm
  marker: q1
  children:
  - type: text
    text: The law of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“How can you say, ‘We are wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the law of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is with us [and we are learned in its language and teachings]’?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, [the truth is that] the lying pen of the scribes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has made the law into a lie [a mere code of ceremonial observances]. [Mark 7:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The wise men are shamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are dismayed and caught.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, they have [manipulated and] rejected the [truth in the] word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And what kind of wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insight do they have?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Therefore I will give their wives to others
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their fields to new owners;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because from the least even to the greatest
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone is greedy for [unjust] gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the prophet even to the priest
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Everyone practices deceit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deals in corruption.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “For they have treated the brokenness of the daughter of My people superficially,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘Peace, peace,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: When there is no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Were they ashamed because of the extremely disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shamefully vile things they had done?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were not at all ashamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they did not know how to blush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, they shall fall among those who fall;
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the time of their punishment they shall be overthrown,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Jer 6:12-15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '¶“I will gather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' snatch them away [utterly consuming them],” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There will be no grapes on the vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor figs on the fig tree,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even the leaf will wither;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the things that I have given them will pass away [by the hand of those whom I have appointed].” ’ ” [Matt 21:18, 19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why are we sitting still [the people wonder]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assemble yourselves, and let us enter the fortified cities
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let us die there,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God has decreed our ruin'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And given us bitter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poisonous water to drink,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because we have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'We waited for peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' salvation, but no good came,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for a time of healing, but behold, terror!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The snorting of [Nebuchadnezzar’s] horses is heard from Dan [on Palestine’s northern border].
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the sound of the neighing of his strong stallions
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole land quakes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they come and devour the land and all that is in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city and those who live in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “For behold, I am sending serpents among you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vipers which cannot be charmed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will bite you,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Oh, that I (Jeremiah) could find comfort from my sorrow [for my grief is beyond healing],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My heart is sick '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faint '
  - type: usfm
    marker: it
    children:
    - type: text
      text: within me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Behold, [hear the sound of] the cry of the daughter of my people from the distant land [of Babylon]:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is not the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in Zion? Is not her King within her?”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[But the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answers] “Why have they provoked Me to anger with their carved images and with foreign idols?”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“The harvest is past, the summer has ended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the gathering of fruit is over,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But we are not saved,” [comes the voice of the people again].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the brokenness of the daughter of my people I (Jeremiah) am broken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I mourn, anxiety has gripped me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Is there no balm in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A scenic, fertile mountain region east of the Jordan River famous for its medicinal herbs and spices.
    marker-yv: yv-n
  - type: text
    text: Gilead?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is there no physician there?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then has not the [spiritual] health of the daughter of my people been restored?
