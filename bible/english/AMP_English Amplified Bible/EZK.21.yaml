document_id: EZK.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Sword of the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face toward Jerusalem, and direct your [prophetic] word against the sanctuaries; prophesy against the land of Israel '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say to the land of Israel, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Behold, I am against you and will draw My sword out of its sheath and I will cut off from you both the righteous and the wicked. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Because I will cut off from you both the righteous and the wicked, therefore My sword will go from its sheath against all flesh from south to north, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and all living will know [without any doubt] that I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have drawn My sword out of its sheath; it will not be sheathed again.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As for you, son of man, groan with breaking heart and bitter grief, groan in their sight. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when they say to you, ‘Why do you sigh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groan?’ you shall answer, ‘Because of the news that is coming; and every heart will melt and all hands will be frail, and every spirit will faint and all knees will be weak as water. Behold, it comes and it will happen,’ says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Again the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Son of man, prophesy and say, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .’ Say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘A sword, a sword [from Babylon] is sharpened
- type: usfm
  marker: q1
  children:
  - type: text
    text: And also polished!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ‘It is sharpened to make a slaughter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Polished to flash '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glimmer like lightning!’'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Shall we then rejoice [when such a disaster approaches]? But it rejects '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' views with contempt the scepter of My son [Judah]. [Gen 49:9, 10; 2 Sam 7:23] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sword [of Babylon] is ready to be polished so that it may be handled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put to use; the sword is sharpened and polished to be put in the hand of the slayer (Nebuchadnezzar). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cry out and wail, son of man, for it is against My people; it is against all the princes of Israel. They are thrown to the sword along with My [terrified] people. Therefore strike your thigh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strike your chest [in grief]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For this sword has been tested [on others]; and what if it views with contempt the scepter [of Judah]? The scepter shall be no more [but shall be swept away],” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Therefore, son of man, prophesy and strike your hands together; and let the sword be doubled the third time [in intensity], the sword for the slain. It is the sword for the great slaughter which surrounds them [so that no one can escape, even by hiding in their inner rooms], '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so that hearts may melt, and many will fall at their gates. I have given the glittering sword. Ah! It is made [to flash] like lightning; it is pointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sharpened for slaughter. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Turn O sword and cut right or cut left, whichever way your thirst for blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your edge direct you. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will also strike My hands together, and I will cause My wrath to rest. I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have spoken.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Instrument of God’s Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“As for you, son of man, mark out two ways for the sword of the king of Babylon to come, both starting from the same land. And make a signpost; place it at the head of the way to the city. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You shall point out a way for the [Babylonian] sword to come to Rabbah [the capital] of the sons of Ammon, and to Judah into fortified Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the king of Babylon stands at the parting of the way, at the fork of the two ways, to use divination. He shakes the arrows, he consults the teraphim (household idols), he looks at the liver [of an animal for an omen]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In his right hand is the lot marked for Jerusalem: to set battering rams, to open the mouth calling for destruction, to lift up the voice with a war cry, to set battering rams against the gates, to put up assault ramps, and to build siege walls. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: It will seem like a false divination in their eyes, those who have sworn solemn oaths [of allegiance to Nebuchadnezzar]. But he will remind them of their guilt [by rebelling and violating their oath], that they may be caught. [2 Chr 36:10, 13; Ezek 17:15, 18-21]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Because you have caused your guilt to be remembered, in that your rebellion is uncovered, so that your sins appear in everything that you do—because you have come to mind, you will be seized with the hand [of the enemy]. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And you, O dishonored and wicked one [Zedekiah], the prince of Israel, whose day has come, whose time of final punishment is here,’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Remove the turban and take off the crown; things shall not remain as they have been. Exalt that which is low and abase the high. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A ruin, a ruin, I will make it a ruin! It shall no longer exist until He comes whose right it is [to reign], and I will give it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Him.’
  - type: text
    text: ' [Gen 49:10; Is 9:6, 7; 11:1-4; Dan 7:14; Luke 1:31-33]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “And you, son of man, prophesy and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' concerning the sons of Ammon and concerning their reproach (disgrace),’ and say: ‘A sword, a sword is drawn for the slaughter; it is sharpened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' polished to put an end [to everything], and to flash like lightning, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'while they (Ammonite prophets) see false visions [of peace] for you, while they divine lies [of escape] for you—to place you [of Ammon] on the headless bodies of the wicked who are slain, whose day has come, whose time of the final punishment is here. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Return the sword to its sheath. In the place where you were created, in the land of your origin (birth), I will judge you. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I will pour out My indignation on you [sons of Ammon]; I will blow on you with the fire of My wrath, and I will place you in the hand of brutal men, skilled in destruction. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: You will be fuel for the fire; your blood will be in the midst of the land. You will not be remembered, for I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have spoken.’ ” [Jer 49:1-6; Ezek 25:1-7; Amos 1:13-15; Zeph 2:8-11]'
