    content: The Healing at Bethesda
  - type: text
    content: Later on there was a Jewish feast (festival), and Jesus went up to Jerusalem.
  '10':
  - type: text
    content: 'So the Jews kept saying to the man who had been healed, “It is the Sabbath, and you are not '
  - type: note
    content: The complex Jewish restrictions regarding work on the Sabbath were man-made rules and most were not supported by OT Scripture.
  - type: text
    content: 'permitted to pick up your pallet [because it is unlawful].” '
  '11':
  - type: text
    content: 'He answered them, “The Man who healed me '
  - type: text
    content: and
  - type: text
    content: ' gave me back my strength was the One who said to me, '
  - type: text
    content: ‘Pick up your pallet and walk.’ ”
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'They asked him, “Who is the Man who told you, '
  - type: text
    content: '‘Pick up '
  - type: text
    content: your pallet
  - type: text
    content: ' and walk’?”'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Now the man who had been healed did not know who it was, for Jesus had slipped away [unnoticed] since there was a crowd in that place. '
  '14':
  - type: text
    content: 'Afterward, Jesus found him in the temple and said to him, '
  - type: text
    content: “See, you are well! Stop sinning or something worse may happen to you.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The man went away and told the Jews that it was Jesus who had made him well. '
  '16':
  - type: text
    content: 'For this reason the Jews began to persecute Jesus '
  - type: text
    content: continually
  - type: text
    content: ' because He was doing these things on the Sabbath. '
  '17':
  - type: text
    content: 'But Jesus answered them, '
  - type: text
    content: “My Father has been working until now
  - type: text
    content: ' [He has never ceased working], '
  - type: text
    content: and I too am working.”
  - type: heading
    content: Jesus’ Equality with God
  '18':
  - type: text
    content: This made the Jews more determined than ever to kill Him, for not only was He breaking the Sabbath [from their viewpoint], but He was also calling God His own Father, making Himself equal with God.
  '19':
  - type: text
    content: 'So Jesus answered them by saying, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, the Son '
  - type: note
    content: Jesus uses the analogy of a son learning a trade from his father to show the religious leaders that when they condemn what He does, they are condemning the Father as well.
  - type: text
    content: can do nothing of Himself
  - type: text
    content: ' [of His own accord], '
  - type: text
    content: unless it is something He sees the Father doing; for whatever things the Father does, the Son
  - type: text
    content: ' [in His turn] '
  - type: text
    content: also does in the same way.
  - type: text
    content: ' '
