document_id: JHN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Healing at Bethesda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Later on there was a Jewish feast (festival), and Jesus went up to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now in Jerusalem, near the Sheep Gate, there is a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In 1888, the location of this pool with its porticoes, as described in this verse, was uncovered.
    marker-yv: yv-n
  - type: text
    text: 'pool, which is called in Hebrew (Jewish Aramaic) Bethesda, having five porticoes (alcoves, colonnades). '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: porticoes
  - type: text
    text: ' lay a great number of people who were sick, blind, lame, withered, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Early mss do not contain the remainder of v 3, nor v 4.
    marker-yv: yv-n
  - type: text
    text: '[waiting for the stirring of the water; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for an angel of the Lord went down into the pool at appointed seasons and stirred up the water; the first one to go in after the water was stirred was healed of his disease.] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'There was a certain man there who had been ill for thirty-eight years. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Jesus noticed him lying there [helpless], knowing that he had been '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in that condition
  - type: text
    text: ' a long time, He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you want to get well?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The invalid answered, “Sir, I have no one to put me in the pool when the water is stirred up, and while I am coming [to get into it myself], someone else steps down ahead of me.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up; pick up your pallet and walk.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Immediately the man was healed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' recovered his strength, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Under Jewish tradition regarding the Sabbath, the man could have been stoned to death for this act.
    marker-yv: yv-n
  - type: text
    text: picked up his pallet and walked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'ow that day was the Sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the Jews kept saying to the man who had been healed, “It is the Sabbath, and you are not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The complex Jewish restrictions regarding work on the Sabbath were man-made rules and most were not supported by OT Scripture.
    marker-yv: yv-n
  - type: text
    text: 'permitted to pick up your pallet [because it is unlawful].” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He answered them, “The Man who healed me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gave me back my strength was the One who said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Pick up your pallet and walk.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They asked him, “Who is the Man who told you, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘Pick up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your pallet
    - type: text
      text: ' and walk’?”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now the man who had been healed did not know who it was, for Jesus had slipped away [unnoticed] since there was a crowd in that place. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Afterward, Jesus found him in the temple and said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “See, you are well! Stop sinning or something worse may happen to you.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The man went away and told the Jews that it was Jesus who had made him well. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For this reason the Jews began to persecute Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' because He was doing these things on the Sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father has been working until now
  - type: text
    text: ' [He has never ceased working], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I too am working.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus’ Equality with God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: This made the Jews more determined than ever to kill Him, for not only was He breaking the Sabbath [from their viewpoint], but He was also calling God His own Father, making Himself equal with God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Jesus answered them by saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, the Son '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus uses the analogy of a son learning a trade from his father to show the religious leaders that when they condemn what He does, they are condemning the Father as well.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: can do nothing of Himself
  - type: text
    text: ' [of His own accord], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: unless it is something He sees the Father doing; for whatever things the Father does, the Son
  - type: text
    text: ' [in His turn] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: also does in the same way.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For the Father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dearly
    - type: text
      text: ' loves the Son and shows Him everything that He Himself is doing; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Father
    - type: text
      text: ' will show Him greater works than these, so that you will be filled with wonder.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Just as the Father raises the dead and gives them life
  - type: text
    text: ' [and allows them to live on], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even so the Son also gives life to whom He wishes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Father judges no one, but has given all judgment
  - type: text
    text: ' [that is, the prerogative of judging] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the Son
  - type: text
    text: ' [placing it entirely into His hands], '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that all will give honor (reverence, homage) to the Son just as they give honor to the Father.
  - type: text
    text: ' [In fact] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the one who does not honor the Son does not honor the Father who has sent Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, the person who hears My word'
  - type: text
    text: ' [the one who heeds My message], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and believes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusts in Him who sent Me, has (possesses now) eternal life'
  - type: text
    text: ' [that is, eternal life actually begins—the believer is transformed], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and does not come into judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemnation, but has passed'
  - type: text
    text: ' [over] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from death into life.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Two Resurrections
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, a time is coming and is'
  - type: text
    text: ' [here] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: now, when the dead will hear the voice of the Son of God, and those who hear it will live.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For just as the Father has life in Himself
  - type: text
    text: ' [and is self-existent], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even so He has given to the Son to have life in Himself
  - type: text
    text: ' [and be self-existent]. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And He has given Him authority to execute judgment, because He is a Son of Man
  - type: text
    text: ' [sinless humanity, qualifying Him to sit in judgment over mankind]. [Dan 7:13, 14] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do not be surprised at this; for a time is coming when all those who are in the tombs will hear His voice,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they will come out—those who did good things
  - type: text
    text: ' [will come out] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to a resurrection of
  - type: text
    text: ' [new] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: life, but those who did evil things
  - type: text
    text: ' [will come out] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to a resurrection of judgment
  - type: text
    text: ' [that is, to be sentenced]. [Dan 12:2; Rev 20:11-15]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I can do nothing on my own initiative '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' authority. Just as I hear, I judge; and My judgment is just (fair, righteous, unbiased), because I do not seek My own will, but only the will of Him who sent Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“If I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone
    - type: text
      text: ' testify about Myself, My testimony is not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. admissible as legal evidence.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: valid.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There is another
  - type: text
    text: ' [My Father] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who testifies about Me, and I know
  - type: text
    text: ' [without any doubt] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'that His testimony on My behalf is true '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' valid.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Testimony of John
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You have sent
  - type: text
    text: ' [an inquiry] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All references to “John” in this Gospel refer to John the Baptist. See note 1:6.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: John
  - type: text
    text: ' [the Baptist] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and he has testified
  - type: text
    text: ' [as an eyewitness] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the truth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the testimony I receive is not from man
  - type: text
    text: ' [a merely human witness]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but I say these things so that you may be saved
  - type: text
    text: ' [that is, have eternal life]. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: John was the lamp that kept on burning and shining
  - type: text
    text: ' [to show you the way], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and you were willing for a while to rejoice in his light.
  - type: text
    text: ' [John 1:23-25]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Testimony of Works
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But the testimony which I have is far greater than '
    - type: usfm
