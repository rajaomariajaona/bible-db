    children:
    - type: text
      text: Psalm 84
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Longing for the Temple Worship.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician; set to a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A technical musical term, meaning uncertain.
      marker-yv: yv-n
    - type: text
      text: Philistine lute. A Psalm of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How lovely are Your dwelling places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For a day in Your courts is better than a thousand [anywhere else];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would rather stand [as a doorkeeper] at the threshold of the house of my God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than to live [at ease] in the tents of wickedness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God is a sun and shield;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' bestows grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor and honor;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No good thing will He withhold from those who walk uprightly.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greatly favored is the man who trusts in You [believing in You, relying on You, and committing himself to You with confident hope and expectation].'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My soul (my life, my inner self) longs for and greatly desires the courts of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart and my flesh sing for joy to the living God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The bird has found a house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the swallow a nest for herself, where she may lay her young—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even Your altars, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My King and my God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greatly favored are those who dwell in Your house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Your presence;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will be singing Your praises all the day long. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '¶Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' greatly favored is the man whose strength is in You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: their
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'whose heart are the highways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Zion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Passing through the Valley of Weeping (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly a kind of plant.
      marker-yv: yv-n
    - type: text
      text: Baca), they make it a place of springs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The early rain also covers it with blessings.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They go from strength to strength [increasing in victorious power];
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Each of them
    - type: text
      text: ' appears before God in Zion.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts, hear my prayer;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, O God of Jacob! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: See our shield, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And look at the face of Your anointed [the king as Your representative].
