  '1':
  - type: heading
    content: Ephraim Reminded
  - type: text
    content: Ephraim feeds on the [emptiness of the] wind
  - type: text
    content: And [continually] pursues the [parching] east wind [which brings destruction];
  - type: text
    content: Every day he multiplies lies and violence.
  - type: text
    content: Further, he makes a covenant with Assyria
  - type: text
    content: And (olive) oil is carried to Egypt [to seek alliances]. [Is 30:6, 7]
  '10':
  - type: text
    content: I have also spoken to [you through] the prophets,
  - type: text
    content: And I gave [them] many visions [to make My will known],
  - type: text
    content: And through the prophets I gave parables [to appeal to your sense of right and wrong].
  '11':
  - type: text
    content: Is there wickedness (idolatry) in Gilead?
  - type: text
    content: Surely the people there are worthless.
  - type: text
    content: In Gilgal [they defy Me when] they sacrifice bulls,
  - type: text
    content: Yes, [after My judgment] their [pagan] altars are like the stone heaps
  - type: text
    content: In the furrows of the fields.
