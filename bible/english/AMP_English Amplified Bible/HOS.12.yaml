document_id: HOS.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ephraim Reminded
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ephraim feeds on the [emptiness of the] wind
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [continually] pursues the [parching] east wind [which brings destruction];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every day he multiplies lies and violence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Further, he makes a covenant with Assyria
- type: usfm
  marker: q1
  children:
  - type: text
    text: And (olive) oil is carried to Egypt [to seek alliances]. [Is 30:6, 7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' also has a dispute [a legal complaint and an indictment] with Judah,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will punish Jacob in accordance with his ways;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will repay him in accordance with his deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their mother’s
  - type: text
    text: ' womb he took his brother by the heel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in his maturity he contended with God. [Gen 25:26; 27:36]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He wrestled with the angel and prevailed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wept [in repentance] and sought His favor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He met Him at Bethel
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there God spoke with [him and through him with] us— [Gen 28:12-19; 32:28; 35:1-15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The name of Him [who spoke with Jacob] is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore, return [in repentance] to your God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' highly regard kindness and justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And wait [expectantly] for your God continually.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A merchant, in whose hand are false '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fraudulent balances;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He loves to oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exploit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ephraim said, “I have indeed become rich [and powerful as a nation];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have found wealth for myself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In all my labors they will not find in me
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Any wickedness that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: would be
  - type: text
    text: ' sin.” [Rev 3:17]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have been
  - type: text
    text: ' the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God since [you became a nation in] the land of Egypt;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make you live in tents again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As in the days of the appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solemn '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the Feast of Booths (Tabernacles).
    marker-yv: yv-n
  - type: text
    text: festival. [Lev 23:39-43]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have also spoken to [you through] the prophets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I gave [them] many visions [to make My will known],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And through the prophets I gave parables [to appeal to your sense of right and wrong].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Is there wickedness (idolatry) in Gilead?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely the people there are worthless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Gilgal [they defy Me when] they sacrifice bulls,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, [after My judgment] their [pagan] altars are like the stone heaps
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the furrows of the fields.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Now Jacob (Israel) fled into the open country of Aram (Paddan-aram), [Gen 28:2, 5]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [there] Israel (Jacob) worked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' served for a wife,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And for a wife he kept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sheep
  - type: text
    text: . [Gen 29:18-20; 30:31; 31:38-41]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And by a prophet (Moses) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought Israel up from Egypt,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by a prophet Israel was preserved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ephraim has provoked most bitter anger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So his Lord will leave his bloodguilt on him [invoking punishment]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And bring back to him his shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonor.'
