document_id: EZK.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Dirge for Tyre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me again, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Now you, son of man, take up a dirge (funeral poem to be sung) for Tyre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say to Tyre, who lives at the entrance to the sea, merchant of the peoples to many coastlands, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “O Tyre, you have said, ‘I am perfect in beauty.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Your borders are in the heart of the seas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your builders have perfected your beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“They have made all your planks of fir trees from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A peak of Mount Hermon.
    marker-yv: yv-n
  - type: text
    text: Senir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have taken a cedar from Lebanon to make a mast for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Of the oaks of Bashan they have made your oars;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have made your deck of boxwood from the coastlands of Cyprus, inlaid with ivory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Your sail was of fine embroidered linen from Egypt
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that it became your distinguishing mark (insignia);
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your [ship’s] awning [which covered you] was blue and purple from the coasts of Elishah [of Asia Minor].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “The inhabitants of Sidon and [the island] of Arvad were your oarsmen;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Your skilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise men, O Tyre, were with you; they were your pilots.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“The elders of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A city north of Sidon.
    marker-yv: yv-n
  - type: text
    text: 'Gebal and its skilled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wise men were with you, repairing your leaks;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the ships of the sea with their mariners were with you to deal in your merchandise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Persia and Lud and Put (Libya) were in your army as your men of war. They hung the shield and the helmet on you; they gave you splendor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The men of Arvad with your army were upon your walls, all around, and the Gammadim (men of valor) were in your towers. They hung their shields on your walls, all around; they perfected your beauty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Tarshish [in Spain] was your customer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' traded with you because of the abundance of your riches of all kinds; with silver, iron, tin, and lead they paid for your wares. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Javan (Greece), Tubal and Meshech (Asia Minor) traded with you; with the lives of men [taken as slaves] and vessels of bronze they paid for your merchandise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Those from Beth-togarmah (Armenia) traded for your wares with [chariot] horses, war horses, and mules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The men of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first Dedanites to settle in Arabia may have sailed to Arabia from the island of Rhodes.
    marker-yv: yv-n
  - type: text
    text: 'Dedan were your traders. Many coastlands were your markets; ivory tusks and ebony they brought to you in payment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' as gifts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The people of the kingdom of Aram were descendants of Aram, the son of Shem, son of Noah (Gen 10:22, 23). The territory of the Arameans also included areas later identified as Syria and Mesopotamia.
    marker-yv: yv-n
  - type: text
    text: 'Aram traded with you because of the abundance of the goods you made. They paid for your merchandise with emeralds, purple, embroidered work, fine linen, coral, and rubies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Judah and the land of Israel, they were your traders; with the wheat of Minnith [in Ammon], cakes, honey, oil, and balm they paid for your goods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The capital city of Aram.
    marker-yv: yv-n
  - type: text
    text: 'Damascus traded with you because of the abundance of your handiworks and the immense wealth of every kind, with the wine of Helbon [Aleppo] and the white wool [of Sachar in Syria]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vedan and Javan traded with yarn from Uzal [in Arabia] for your wares; wrought iron, cassia, and sweet cane were among your merchandise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dedan traded with you in saddle blankets for riding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Arabia and all the princes of Kedar, they were your customers for lambs, rams, and goats [favored by you]; for these they were your customers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The merchants of Sheba and Raamah [in Arabia], they traded with you; they paid for your wares with the choicest of all kinds of spices and all kinds of precious stones and gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Haran and Canneh and Eden [in Mesopotamia], the merchants of Sheba [on the Euphrates], Asshur and Chilmad traded with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They traded with you in choice fabrics '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' garments, in clothes of blue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' violet and embroidered work, and in [treasures of] multi-colored damask '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knotted carpets bound with tightly wound cords, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which were
  - type: text
    text: ' among your merchandise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The ships of Tarshish were the caravans for your merchandise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you [Tyre] were replenished and very glorious [heavily laden with an imposing fleet]
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the heart of the seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶“Your rowers have brought you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Into great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deep waters;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The east wind has broken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shipwrecked you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the heart of the seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Your riches, your wares, your merchandise
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your oarsmen and your pilots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your caulkers, your dealers in merchandise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all your men of war who are with you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With all your company that is in your midst,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will sink in the heart of the seas
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the day of your ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“The pasture lands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the countryside will shake'
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the [piercing] sound of the [hopeless, wailing] cry of your pilots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “All who handle the oar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mariners and all the pilots of the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will come down from their ships;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will stand on the shore,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And they will make their voice heard [as they wail loudly] over you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will cry bitterly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will throw dust on their heads;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will wallow in ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “And they will make themselves [completely] bald for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And wrap themselves in sackcloth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in bitterness of soul they will weep for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With bitter mourning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wailing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “In their wailing they will take up a dirge (funeral poem to be sung) for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And sing a dirge for you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who is like Tyre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like her who is silent [destroyed] in the midst of the sea?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ‘When your wares went out to the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You met the desire, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the demand, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the necessities of many people;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You enriched the kings of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: With your abundant wealth and merchandise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ‘Now you are shattered by the seas
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the depths of the waters;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your merchandise and all your crew
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have gone down with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ‘All the inhabitants of the coastlands
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Are aghast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled at you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And their kings are horribly frightened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudder;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their faces twitch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pale.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ‘The merchants among the people hiss at you [with malicious joy];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have become a horror '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a source of terrors.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You will cease to be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As late as the thirteenth century '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . the grandeur of the ancient city of Tyre was still visible. As time passed a large part of the western section of “the island” became covered by the sea, and early travelers told of seeing “houses, towers, and streets far down in the deep.” The site gradually disappeared; however, sporadic excavations (subject to the political climate) began in 1947, and many sections of the ancient city have been uncovered. Tyre is located about 50 miles south of Beirut.
    marker-yv: yv-n
  - type: text
    text: forever.’ ” ’ ”
