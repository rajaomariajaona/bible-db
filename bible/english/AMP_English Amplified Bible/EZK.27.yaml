  '16':
  - type: note
    content: The people of the kingdom of Aram were descendants of Aram, the son of Shem, son of Noah (Gen 10:22, 23). The territory of the Arameans also included areas later identified as Syria and Mesopotamia.
  - type: text
    content: 'Aram traded with you because of the abundance of the goods you made. They paid for your merchandise with emeralds, purple, embroidered work, fine linen, coral, and rubies. '
  '17':
  - type: text
    content: 'Judah and the land of Israel, they were your traders; with the wheat of Minnith [in Ammon], cakes, honey, oil, and balm they paid for your goods. '
  '18':
  - type: note
    content: The capital city of Aram.
  - type: text
    content: 'Damascus traded with you because of the abundance of your handiworks and the immense wealth of every kind, with the wine of Helbon [Aleppo] and the white wool [of Sachar in Syria]. '
  '19':
  - type: text
    content: 'Vedan and Javan traded with yarn from Uzal [in Arabia] for your wares; wrought iron, cassia, and sweet cane were among your merchandise. '
