  - type: note
    content: As late as the thirteenth century a.d. the grandeur of the ancient city of Tyre was still visible. As time passed a large part of the western section of “the island” became covered by the sea, and early travelers told of seeing “houses, towers, and streets far down in the deep.” The site gradually disappeared; however, sporadic excavations (subject to the political climate) began in 1947, and many sections of the ancient city have been uncovered. Tyre is located about 50 miles south of Beirut.
