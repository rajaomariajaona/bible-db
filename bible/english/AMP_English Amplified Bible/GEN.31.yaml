    - type: text
      text: '22'
  - type: text
    text: 'On the third day [after his departure] Laban was told that Jacob had fled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So he took his relatives with him and pursued him for seven days, and they overtook him in the hill country of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: God came to Laban the Aramean in a dream at night and said to him, “Be careful that you do not speak to Jacob, either good or bad.”
- type: usfm
  marker: p
