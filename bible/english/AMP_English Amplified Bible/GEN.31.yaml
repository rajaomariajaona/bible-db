      - type: text
        text: Laban was upset because possession of the father’s household gods played an important role in inheritance. In the region where Laban lived, a son-in-law who possessed the family gods could appear before a judge and make a claim to the estate of his father-in-law. Since Jacob’s possession of the household gods implied the right to inherit Laban’s wealth, one can understand why he followed Jacob to recover the idols.
    marker-yv: yv-n
  - type: text
