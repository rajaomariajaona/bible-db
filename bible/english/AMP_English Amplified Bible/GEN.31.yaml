  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The one with whom you find your gods shall not live; in the presence of our relatives [search my possessions and] point out whatever you find that belongs to you and take it.” For Jacob did not know that Rachel had stolen the idols.
- type: usfm
