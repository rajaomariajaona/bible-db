    marker-yv: yv-n
  - type: text
    text: 'Angel of God said to me in the dream, ‘Jacob.’ And I said, ‘Here I am.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He said, ‘Look up and see, all the rams which are mating [with the flock] are streaked, speckled, and spotted; for I have seen all that Laban has been doing to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I am the God of Bethel, where you anointed the pillar, and where you made a vow to Me; now stand up, leave this land, and return to the land of your birth.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rachel and Leah answered him, “Is there still any portion or inheritance for us in our father’s house? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Are we not counted by him as foreigners? For he sold us [to you in marriage], and has also entirely used up our purchase price. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Surely all the riches which God has taken from our father are ours and our children’s. Now then, whatever God has told you to do, do it.”
