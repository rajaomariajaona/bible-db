    children:
    - type: text
      text: have been
  - type: text
    text: ' with you; your ewes and your female goats have not lost their young, nor have I eaten the rams of your flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'I did not bring you the torn carcasses [of the animals attacked by predators]; I [personally] took the loss. You required of me [to make good] everything that was stolen, whether it occurred by day or night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
