    - type: text
      text: '36'
  - type: text
    text: 'Then Jacob became angry and argued with Laban. And he said to Laban, “What is my fault? What is my sin that you pursued me like this? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Although you have searched through all my possessions, what have you found of your household goods? Put it here before my relatives and your relatives, so that they may decide [who has done right] between the two of us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
