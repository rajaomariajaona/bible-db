  - type: text
    text: 'Laban said to Jacob, “Look at this mound [of stones] and look at this pillar which I have set up between you and me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'This mound is a witness, and this pillar is a witness, that I will not pass by this mound to harm you, and that you will not pass by this mound and this pillar to harm me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'The God of Abraham [your father] and the God of Nahor [my father], and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Here “god” is put in lowercase because Joshua later declared that Terah, the father of Abraham and Nahor, was an idolater, serving “other gods” (Josh 24:2). The wording of the Hebrew here indicates that Laban equated the God of Abraham and Nahor with the god of Terah. Whether Laban actually made no distinction in his mind between the true God and false gods, or simply committed an oversight, is not clear. Jacob evidently recognized the ambiguity in Laban’s statement as well, so to avoid any possibility of swearing allegiance to a false god, he swore his own oath by the God of Isaac.
    marker-yv: yv-n
  - type: text
    text: 'god [the image of worship] of their father [Terah, an idolater], judge between us.” But Jacob swore [only] by [the one true God] the Fear of his father Isaac. [Josh 24:2] '
