  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Laban overtook Jacob. Now Jacob had pitched his tent on the hill, and Laban with his relatives camped on the same hill of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Laban said to Jacob, “What do you mean by deceiving me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leaving without my knowledge, and carrying off my daughters as if [they were] captives of the sword? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Why did you run away secretly and deceive me and not tell me, so that [otherwise] I might have sent you away with joy and with songs, with [music on the] tambourine and lyre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And why did you not allow me to kiss my '
