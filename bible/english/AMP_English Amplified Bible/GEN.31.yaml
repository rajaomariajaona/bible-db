  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You know that I have served your father with all my strength. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Yet your father has cheated me [as often as possible] and changed my wages ten times; but God did not allow him to hurt me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If he said, ‘The speckled shall be your wages,’ then the entire flock gave birth to speckled [young]; and if he said, ‘The streaked shall be your wages,’ then the entire flock gave birth to streaked [young]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thus God has taken away the flocks of your father and given them to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And it happened at the time when the flock conceived that I looked up and saw in a dream that the rams which mated [with the female goats] were streaked, speckled, and spotted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
