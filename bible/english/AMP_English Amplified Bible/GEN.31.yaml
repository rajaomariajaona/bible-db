    - type: text
      text: '33'
  - type: text
    text: 'So Laban went into Jacob’s tent and into Leah’s tent and the tent of the two maids, but he did not find them. Then he came out of Leah’s tent and entered Rachel’s tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now Rachel had taken the household idols and put them in the camel’s saddlebag and sat on them. Laban searched through all her tent, but did not find them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So Rachel said to her father, “Do not be displeased, my lord, that I cannot rise before you, for the manner of women is on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
