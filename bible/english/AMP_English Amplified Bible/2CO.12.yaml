document_id: 2CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul’s Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It is necessary to boast, though nothing is gained by it; but I will go on to visions and revelations of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I know a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul had this experience prior to beginning his missionary journeys.
    marker-yv: yv-n
  - type: text
    text: 'man in Christ who fourteen years ago—whether in the body I do not know, or out of the body I do not know, [only] God knows—such a man was caught up to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The dwelling place of God, called Paradise by Jesus and also by Paul (v 4).
    marker-yv: yv-n
  - type: text
    text: 'third heaven. [Luke 23:43] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I know that such a man—whether in the body or out of the body I do not know, [only] God knows— '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'was caught up into '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul apparently uses “Paradise” as an equivalent of the third heaven, the dwelling place of God (cf Luke 23:43).
    marker-yv: yv-n
  - type: text
    text: 'Paradise and heard inexpressible words which man is not permitted to speak [words too sacred to tell]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On behalf of such a man [and his experiences] I will boast; but in my own behalf I will not boast, except in regard to my weaknesses. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If I wish to boast, I will not be foolish, because I will be speaking the truth. But I abstain [from it], so that no one will credit me with more than [is justified by what] he sees in me or hears from me.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Thorn in the Flesh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Because of the surpassing greatness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extraordinary nature of the revelations [which I received from God], for this reason, to keep me from thinking of myself as important, a thorn in the flesh was given to me, a messenger of Satan, to torment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harass me—to keep me from exalting myself! [Job 2:6] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Concerning this I pleaded with the Lord three times that it might leave me; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but He has said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My grace is sufficient for you
  - type: text
    text: ' [My lovingkindness and My mercy are more than enough—always available—regardless of the situation]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for
  - type: text
    text: ' [My] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: power is being perfected
  - type: text
    text: ' [and is completed and shows itself most effectively] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in
  - type: text
    text: ' [your] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: weakness.”
  - type: text
    text: ' Therefore, I will all the more gladly boast in my weaknesses, so that the power of Christ [may completely enfold me and] may dwell in me. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So I am well pleased with weaknesses, with insults, with distresses, with persecutions, and with difficulties, for the sake of Christ; for when I am weak [in human strength], then I am strong [truly able, truly powerful, truly drawing from God’s strength].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now I have become foolish; you have forced me [by questioning my apostleship]. Actually I should have been commended by you [instead of being treated disdainfully], for I was not inferior to those '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 11:5. If the false teachers were degrading Paul’s apostleship, they may have wrongly ascribed a “super-apostleship” to the Twelve, especially James, Cephas (Peter), and John. See Gal 2:9.
    marker-yv: yv-n
  - type: text
    text: 'super-apostles, even if I am nobody. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The signs that indicate a genuine apostle were performed among you fully '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' most patiently—signs and wonders and miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For in what respect were you treated as inferior to the rest of the churches, except [for the fact] that I did not burden you [with my financial support]? Forgive me [for doing you] this injustice!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now for the third time I am ready to visit you. I will not burden you [financially], because I do not want what is yours [not your money or your possessions], but you. For children are not responsible to save up for their parents, but parents for their children. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But I will very gladly spend [my own resources] and be utterly spent for your souls. If I love you greatly, am I to be loved less [by you]? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But be that as it may, I did not burden you [with my support]. But [some say that] I was sly and took you by trickery. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Did I take advantage of you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' make any money off you through any of the messengers I sent you? [Certainly not!] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I urged Titus to go, and I sent the brother with him. Titus did not take advantage of you, did he? [No!] Did we not conduct ourselves in the same spirit and walk in the same steps? [Of course!]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All this time you have been thinking that we are [merely] defending ourselves to you. It is in the sight of God that we have been speaking [as one] in Christ; and everything, dearly beloved, is to strengthen you [spiritually]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For I am afraid that perhaps when I come I may find you not to be as I wish, and that you may find me not as you wish—that perhaps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there may be
  - type: text
    text: ' strife, jealousy, angry tempers, disputes, slander, gossip, arrogance and disorder; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I am afraid that when I come again my God may humiliate me before you, and I may mourn over many of those who have sinned in the past and not repented of the impurity, sexual immorality and decadence which they formerly practiced.
