document_id: HOS.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ephraim’s Sin
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I would heal Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sin (guilt) of Ephraim is uncovered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the wickedness of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Samaria became the capital city of the Kingdom of Israel (the ten northern tribes) during the reign of King Omri (see 1 Kin 16:24).
      marker-yv: yv-n
    - type: text
      text: Samaria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they practice false dealing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The thief enters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bandits ravage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raid outside.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the pride of Israel testifies against him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they do not return [in repentance] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' search for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' desire Him [as essential] in spite of all this.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraim also is like a silly dove, without heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' good sense;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They call to Egypt [for help], they go to Assyria.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they go, I will spread My net over them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring them down like birds of the heavens [into Assyrian captivity].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will chastise them in accordance with the proclamation (prophecy) to their congregation. [Lev 26:14-39; Deut 28:15-68]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to them, for they have wandered away from Me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Devastation is theirs, because they have rebelled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trespassed against Me!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would redeem them, but they speak lies against Me.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not cry out to Me from their heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they wail on their beds [in unbelieving despair];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the sake of grain and new wine they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or with Greek and many ancient mss '
        - type: usfm
          marker: it
          children:
          - type: text
            text: gash themselves.
      marker-yv: yv-n
    - type: text
      text: assemble themselves [as if worshiping Baal];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rebel against Me.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although I trained and strengthened their arms [for victory over their enemies],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they devise evil against Me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They turn, but they do not turn upward to the Most High.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like a poorly crafted bow [that misses the mark];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their princes shall fall by the sword
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the insolence of their tongue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cause for their mockery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disdain in the land of Egypt.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they do not consider in their hearts (minds)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I remember [always] all their wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now their deeds surround '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entangle them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are before My face.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They make the king glad with their wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the princes with their lies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all adulterers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the heat of an oven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the baker ceases to stir '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the fire,
    - type: text
      text: ' [their passion smolders]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the kneading of the dough until it is leavened.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the [special] day of our king, the princes became sick with the heat of wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king stretched out his hand [in association] with scoffers (lawless people).
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As they approach their plotting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their mind burns [with intrigue] like an oven [while they lie in wait].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their anger smolders all night;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning it blazes like a flaming fire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all hot like an oven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they consume their judges (rulers);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their kings have fallen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one among them who calls to Me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Ephraim mixes himself with the [Gentile] nations [seeking favor with one country, then another];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is a cake not turned [worthless; ready to be thrown away].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strangers have devoured his strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he does not know it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gray hairs are sprinkled on him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he does not know.
