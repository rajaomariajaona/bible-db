  '6':
  - type: text
    content: As they approach their plotting,
  - type: text
    content: Their mind burns [with intrigue] like an oven [while they lie in wait].
  - type: text
    content: Their anger smolders all night;
  - type: text
    content: In the morning it blazes like a flaming fire.
  '7':
  - type: text
    content: They are all hot like an oven
  - type: text
    content: And they consume their judges (rulers);
  - type: text
    content: All their kings have fallen.
  - type: text
    content: There is no one among them who calls to Me.
  '8':
  - type: text
    content: ¶Ephraim mixes himself with the [Gentile] nations [seeking favor with one country, then another];
  - type: text
    content: Ephraim is a cake not turned [worthless; ready to be thrown away].
  '9':
  - type: text
    content: Strangers have devoured his strength,
  - type: text
    content: Yet he does not know it;
  - type: text
    content: Gray hairs are sprinkled on him,
  - type: text
    content: Yet he does not know.
