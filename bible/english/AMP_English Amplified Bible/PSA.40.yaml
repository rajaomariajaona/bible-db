document_id: PSA.40
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 40
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Sustains His Servant.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I waited patiently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectantly for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He inclined to me and heard my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He brought me up out of a horrible pit [of tumult and of destruction], out of the miry clay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He set my feet upon a rock, steadying my footsteps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establishing my path.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He put a new song in my mouth, a song of praise to our God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many will see and fear [with great reverence]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will trust confidently in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Ps 5:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Blessed [fortunate, prosperous, and favored by God] is the man who makes the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his trust,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does not regard the proud nor those who lapse into lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Many, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, are the wonderful works which You have done,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your thoughts toward us;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is none to compare with You.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If I would declare and speak of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your wonders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They would be too many to count.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '¶Sacrifice and meal offering You do not desire, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' do You delight in them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have opened my ears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' given me the capacity to hear [and obey Your word];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burnt offerings and sin offerings You do not require. [Mic 6:6-8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I said, “Behold, I come [to the throne];
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the scroll of the book it is written of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I delight to do Your will, O my God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your law is within my heart.” [Jer 31:33; Heb 10:5-9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶I have proclaimed good news of righteousness [and the joy that comes from obedience to You] in the great assembly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, I will not restrain my lips [from proclaiming Your righteousness],
- type: usfm
  marker: q1
  children:
  - type: text
    text: As You know, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have not concealed Your righteousness within my heart;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have proclaimed Your faithfulness and Your salvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not concealed Your lovingkindness and Your truth from the great assembly. [Acts 20:20, 27]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '¶Do not withhold Your compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tender mercy from me, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your lovingkindness and Your truth will continually preserve me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For innumerable evils have encompassed me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My sins have overtaken me, so that I am not able to see.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are more numerous than the hairs of my head,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my heart has failed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Be pleased, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to save me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', make haste to help me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let those be ashamed and humiliated together
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who seek my life to destroy it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let those be turned back [in defeat] and dishonored
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who delight in my hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Let those be appalled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolate because of their shame'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say to me, “Aha, aha [rejoicing in my misfortune]!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let all who seek You rejoice and be glad in You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let those who love Your salvation say continually,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be magnified!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Even though I am afflicted and needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Still the Lord takes thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is mindful of me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my help and my rescuer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my God, do not delay. [Ps 70:1-5; 1 Pet 5:7]
