  '1':
  - type: heading
    content: Psalm 40
  - type: heading
    content: God Sustains His Servant.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: 'I waited patiently '
  - type: text
    content: and
  - type: text
    content: ' expectantly for the L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: And He inclined to me and heard my cry.
  '10':
  - type: text
    content: I have not concealed Your righteousness within my heart;
  - type: text
    content: I have proclaimed Your faithfulness and Your salvation.
  - type: text
    content: I have not concealed Your lovingkindness and Your truth from the great assembly. [Acts 20:20, 27]
  '11':
  - type: text
    content: '¶Do not withhold Your compassion '
  - type: text
    content: and
  - type: text
    content: ' tender mercy from me, O L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Your lovingkindness and Your truth will continually preserve me.
  '12':
  - type: text
    content: For innumerable evils have encompassed me;
  - type: text
    content: My sins have overtaken me, so that I am not able to see.
  - type: text
    content: They are more numerous than the hairs of my head,
  - type: text
    content: And my heart has failed me.
  '13':
  - type: text
    content: ¶Be pleased, O L
  - type: heading
    content: ord
  - type: text
    content: ', to save me;'
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', make haste to help me.'
  '14':
  - type: text
    content: Let those be ashamed and humiliated together
  - type: text
    content: Who seek my life to destroy it;
  - type: text
    content: Let those be turned back [in defeat] and dishonored
  - type: text
    content: Who delight in my hurt.
  '15':
  - type: text
    content: 'Let those be appalled '
  - type: text
    content: and
  - type: text
    content: ' desolate because of their shame'
  - type: text
    content: Who say to me, “Aha, aha [rejoicing in my misfortune]!”
  '16':
  - type: text
    content: Let all who seek You rejoice and be glad in You;
  - type: text
    content: Let those who love Your salvation say continually,
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' be magnified!”'
  '17':
  - type: text
    content: Even though I am afflicted and needy,
  - type: text
    content: 'Still the Lord takes thought '
  - type: text
    content: and
  - type: text
    content: ' is mindful of me.'
  - type: text
    content: You are my help and my rescuer.
  - type: text
    content: O my God, do not delay. [Ps 70:1-5; 1 Pet 5:7]
  '2':
  - type: text
    content: He brought me up out of a horrible pit [of tumult and of destruction], out of the miry clay,
  - type: text
    content: 'And He set my feet upon a rock, steadying my footsteps '
  - type: text
    content: and
  - type: text
    content: ' establishing my path.'
  '3':
  - type: text
    content: He put a new song in my mouth, a song of praise to our God;
  - type: text
    content: Many will see and fear [with great reverence]
  - type: text
    content: And will trust confidently in the L
  - type: heading
    content: ord
  - type: text
    content: . [Ps 5:11]
  '4':
  - type: text
    content: ¶Blessed [fortunate, prosperous, and favored by God] is the man who makes the L
  - type: heading
    content: ord
  - type: text
    content: ' his trust,'
  - type: text
    content: And does not regard the proud nor those who lapse into lies.
  '5':
  - type: text
    content: Many, O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, are the wonderful works which You have done,'
  - type: text
    content: And Your thoughts toward us;
  - type: text
    content: There is none to compare with You.
  - type: text
    content: 'If I would declare and speak of '
  - type: text
    content: your wonders,
  - type: text
    content: They would be too many to count.
  '6':
  - type: text
    content: '¶Sacrifice and meal offering You do not desire, '
  - type: text
    content: nor
  - type: text
    content: ' do You delight in them;'
  - type: text
    content: 'You have opened my ears '
  - type: text
    content: and
  - type: text
    content: ' given me the capacity to hear [and obey Your word];'
  - type: text
    content: Burnt offerings and sin offerings You do not require. [Mic 6:6-8]
  '7':
  - type: text
    content: Then I said, “Behold, I come [to the throne];
  - type: text
    content: In the scroll of the book it is written of me.
  '8':
  - type: text
    content: “I delight to do Your will, O my God;
  - type: text
    content: Your law is within my heart.” [Jer 31:33; Heb 10:5-9]
  '9':
  - type: text
    content: ¶I have proclaimed good news of righteousness [and the joy that comes from obedience to You] in the great assembly;
  - type: text
    content: Behold, I will not restrain my lips [from proclaiming Your righteousness],
  - type: text
    content: As You know, O L
  - type: heading
    content: ord
  - type: text
    content: .
