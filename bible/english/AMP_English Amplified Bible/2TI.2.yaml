document_id: 2TI.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Be Strong
  - type: text
    content: 'So you, my son, be strong [constantly strengthened] '
  - type: text
    content: and
  - type: text
    content: ' empowered in the grace that is [to be found only] in Christ Jesus. '
  '10':
  - type: text
    content: 'For this reason I [am ready to] patiently endure all things for the sake of those who are the elect (God’s chosen ones), so that they too may obtain the salvation which is in Christ Jesus and with it the reward of eternal glory. '
  '11':
  - type: text
    content: 'This is a faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy saying:'
  - type: text
    content: If we died with Him, we will also live with Him;
  '12':
  - type: text
    content: If we endure, we will also reign with Him;
  - type: text
    content: If we deny Him, He will also deny us;
  '13':
  - type: text
    content: If we are faithless, He remains faithful [true to His word and His righteous character], for He cannot deny Himself.
  - type: heading
    content: An Unashamed Workman
  '14':
  - type: text
    content: 'Remind '
  - type: text
    content: the people
  - type: text
    content: ' of these facts, and solemnly charge '
  - type: text
    content: them
  - type: text
    content: ' in the presence of God to avoid petty controversy over words, which does no good, and [upsets and undermines and] ruins [the faith of] those who listen. '
  '15':
  - type: text
    content: 'Study '
  - type: text
    content: and
  - type: text
    content: ' do your best to present yourself to God approved, a workman [tested by trial] who has no reason to be ashamed, accurately handling '
  - type: text
    content: and
  - type: text
    content: ' skillfully teaching the word of truth. '
  '16':
  - type: text
    content: 'But avoid all irreverent babble and godless chatter [with its profane, empty words], for it will lead to further ungodliness, '
  '17':
  - type: text
    content: 'and their teaching will spread like gangrene. So it is with Hymenaeus and Philetus, '
  '18':
  - type: text
    content: 'who have deviated from the truth. They claim that the resurrection has already taken place, and they undermine the faith of some. '
  '19':
  - type: text
    content: 'Nevertheless, the firm foundation of God [which He has laid] stands [sure and unshaken despite attacks], bearing this seal: “The Lord knows those who are His,” and, “Let everyone who names the name of the Lord stand apart from wickedness '
  - type: text
    content: and
  - type: text
    content: ' withdraw from wrongdoing.” [Num 16:5; Is 26:13]'
  '2':
  - type: text
    content: 'The things [the doctrine, the precepts, the admonitions, the sum of my ministry] which you have heard me teach '
  - type: note
    content: Lit through.
  - type: text
    content: 'in the presence of many witnesses, entrust [as a treasure] to reliable '
  - type: text
    content: and
  - type: text
    content: ' faithful men who will also be capable '
  - type: text
    content: and
  - type: text
    content: ' qualified to teach others. '
  '20':
  - type: text
    content: 'Now in a large house there are not only '
  - type: note
    content: Like Rom 9:20-23, the analogy here has its roots in OT poetry (e.g. Ps 31:12; Prov 26:23) and prophecy (e.g. Is 45:9; Jer 18:2-6). Paul speaks of believers and unbelievers in Rom 9, but here he seems to be describing God’s household or family, in which all the vessels (containers, utensils) represent believers. While the objects in Rom 9:21 do not change, the vessels here are capable of changing their status and the use to which God puts them by keeping themselves from sinful behavior and influences (v 21).
  - type: text
    content: 'vessels '
  - type: text
    content: and
  - type: text
    content: ' objects of gold and silver, but also vessels '
  - type: text
    content: and
  - type: text
    content: ' objects of wood and of earthenware, and some are for honorable (noble, good) use and some for dishonorable (ignoble, common). '
  '21':
  - type: text
    content: 'Therefore, if anyone cleanses himself from these '
  - type: text
    content: things
  - type: text
    content: ' [which are dishonorable—disobedient, sinful], he will be a vessel for honor, sanctified [set apart for a special purpose and], useful to the Master, prepared for every good work. '
  '22':
  - type: text
    content: 'Run away from youthful lusts—pursue righteousness, faith, love, and peace with those [believers] who call on the Lord out of a pure heart. '
  '23':
  - type: text
    content: 'But have nothing to do with foolish and ignorant speculations [useless disputes over unedifying, stupid controversies], since you know that they produce strife '
  - type: text
    content: and
  - type: text
    content: ' give birth to quarrels. '
  '24':
  - type: text
    content: 'The servant of the Lord must not participate in quarrels, but must be kind to everyone [even-tempered, preserving peace, and he must be], skilled in teaching, patient '
  - type: text
    content: and
  - type: text
    content: ' tolerant when wronged. '
  '25':
  - type: text
    content: 'He must correct those who are in opposition with courtesy '
  - type: text
    content: and
  - type: text
    content: ' gentleness in the hope that God may grant that they will repent and be led to the knowledge of the truth [accurately understanding and welcoming it], '
  '26':
  - type: text
    content: 'and that they may come to their senses and '
  - type: text
    content: escape
  - type: text
    content: ' from the trap of the devil, having been held captive by him to do his will.'
  '3':
  - type: text
    content: 'Take with me your share of hardship [passing through the difficulties which you are called to endure], like a good soldier of Christ Jesus. '
  '4':
  - type: text
    content: 'No soldier in active service gets entangled in the [ordinary business] affairs of civilian life; [he avoids them] so that he may please the one who enlisted him to serve. '
  '5':
  - type: text
    content: 'And if anyone competes as an athlete [in competitive games], he is not crowned [with the wreath of victory] unless he competes according to the rules. '
  '6':
  - type: text
    content: 'The hard-working farmer [who labors to produce crops] ought to be the first to receive his share of the crops. '
  '7':
  - type: text
    content: 'Think over the things I am saying [grasp their application], for the Lord will grant you insight '
  - type: text
    content: and
  - type: text
    content: ' understanding in everything.'
  '8':
  - type: text
    content: 'Remember Jesus Christ [the ever-living Lord who has] risen from the dead, [as the prophesied King] descended from David [king of Israel], according to my gospel [the good news that I preach], [Ps 16:10] '
  '9':
  - type: text
    content: 'for that [gospel] I am suffering even to [the point of] wearing chains like a criminal; but the word of God is not chained '
  - type: text
    content: or
  - type: text
    content: ' imprisoned! '
