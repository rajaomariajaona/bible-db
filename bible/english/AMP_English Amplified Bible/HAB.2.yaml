document_id: HAB.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God Answers the Prophet
  - type: text
    content: I will stand at my guard post
  - type: text
    content: And station myself on the tower;
  - type: text
    content: And I will keep watch to see what He will say to me,
  - type: text
    content: And what answer I will give [as His spokesman] when I am reproved.
  '10':
  - type: text
    content: “You have devised a shameful thing for your house
  - type: text
    content: 'By cutting off '
  - type: text
    content: and
  - type: text
    content: ' putting an end to many peoples;'
  - type: text
    content: 'So you are sinning against your own life '
  - type: text
    content: and
  - type: text
    content: ' forfeiting it.'
  '11':
  - type: text
    content: “For the stone will cry out from the wall [to accuse you—built in sin!]
  - type: text
    content: And the rafter will answer it out of the woodwork.
  '12':
  - type: text
    content: ¶“Woe (judgment is coming) to him who builds a city with bloodshed
  - type: text
    content: And establishes a town by violence!
  '13':
  - type: text
    content: “Is it not indeed from the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: That peoples labor [only] for the fire [that will destroy their work],
  - type: text
    content: And nations grow weary for nothing [that is, things which have no lasting value]?
  '14':
  - type: text
    content: “But [the time is coming when] the earth shall be filled
  - type: text
    content: With the knowledge of the glory of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: As the waters cover the sea. [Is 11:9]
  '15':
  - type: text
    content: ¶“Woe (judgment is coming) to you who make your neighbors drink,
  - type: text
    content: Who mix in your venom to make them drunk
  - type: text
    content: So that you may look at their nakedness!
  '16':
  - type: text
    content: “You will be filled with disgrace instead of honor.
  - type: text
    content: Now drink and expose your own nakedness!
  - type: text
    content: The cup [of wrath] in the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' right hand will come around to you [O destroyer],'
  - type: text
    content: And utter disgrace will be on your own glory. [Rev 16:19]
  '17':
  - type: text
    content: “For the violence done to Lebanon will overwhelm you;
  - type: text
    content: The destruction of the animals will terrify you
  - type: text
    content: On account of human bloodshed and the violence done to the land,
  - type: text
    content: To the city and all its inhabitants.
  '18':
  - type: text
    content: ¶“What profit is the carved image when its maker has formed it?
  - type: text
    content: It is only a cast image, and a teacher of lies.
  - type: text
    content: For its maker trusts in his own creation [as his god]
  - type: text
    content: When he makes speechless idols.
  '19':
  - type: text
    content: “Woe (judgment is coming) to him who says to the wooden image, ‘Awake!’
  - type: text
    content: And to the speechless stone, ‘Arise!’
  - type: text
    content: And that is your teacher?
  - type: text
    content: Look, it is overlaid with gold and silver,
  - type: text
    content: And there is no breath at all inside it.
  '2':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' answered me and said,'
  - type: text
    content: “Write the vision
  - type: text
    content: And engrave it plainly on [clay] tablets
  - type: text
    content: So that the one who reads it will run.
  '20':
  - type: text
    content: “But the L
  - type: heading
    content: ord
  - type: text
    content: ' is in His holy temple.'
  - type: text
    content: 'Let all the earth hush '
  - type: text
    content: and
  - type: text
    content: ' be silent before Him.” [Zeph 1:7; Zech 2:13]'
  '3':
  - type: text
    content: “For the vision is yet for the appointed [future] time
  - type: text
    content: It hurries toward the goal [of fulfillment]; it will not fail.
  - type: text
    content: Even though it delays, wait [patiently] for it,
  - type: text
    content: Because it will certainly come; it will not delay. [Heb 10:37, 38]
  '4':
  - type: text
    content: ¶“Look at the proud one,
  - type: text
    content: His soul is not right within him,
  - type: text
    content: But the righteous will live by his faith [in the true God]. [Rom 1:17; Gal 3:11]
  '5':
  - type: text
    content: '“Moreover, wine is treacherous '
  - type: text
    content: and
  - type: text
    content: ' betrays the arrogant man,'
  - type: text
    content: So that he does not stay at home.
  - type: text
    content: His appetite is large like Sheol,
  - type: text
    content: And he is like death, never satisfied.
  - type: text
    content: He gathers to himself all nations
  - type: text
    content: And collects to himself all peoples [as if he owned them].
  '6':
  - type: text
    content: ¶“Will all these [victims of his greed] not take up a taunting song against him,
  - type: text
    content: And in mocking derision against him
  - type: text
    content: Say, ‘
  - type: note
    content: The taunting song of the five woes pronounced against Babylon begins in v 6 and concludes at the end of the chapter.
  - type: text
    content: Woe (judgment is coming) to him who increases that which is not his—
  - type: text
    content: How long [will he possess it]?
  - type: text
    content: And [woe to him who] makes himself wealthy with loans.’
  '7':
  - type: text
    content: “Will your creditors not rise up suddenly,
  - type: text
    content: And those who collect from you awaken?
  - type: text
    content: Then you will become plunder for them.
  '8':
  - type: text
    content: “Because you [king of Babylon] have looted many nations,
  - type: text
    content: All peoples who are left will loot you—
  - type: text
    content: Because of human bloodshed and for the violence done to the land,
  - type: text
    content: To the city and all its inhabitants.
  '9':
  - type: text
    content: ¶“Woe (judgment is coming) to him who obtains wicked gain for his house [and thinks by so doing]
  - type: text
    content: To set his nest on high,
  - type: text
    content: That he may be rescued from the hand of evil.
