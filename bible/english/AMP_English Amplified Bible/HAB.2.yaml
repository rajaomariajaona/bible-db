document_id: HAB.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Answers the Prophet
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I will stand at my guard post
- type: usfm
  marker: q1
  children:
  - type: text
    text: And station myself on the tower;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will keep watch to see what He will say to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what answer I will give [as His spokesman] when I am reproved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered me and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Write the vision
- type: usfm
  marker: q1
  children:
  - type: text
    text: And engrave it plainly on [clay] tablets
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that the one who reads it will run.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “For the vision is yet for the appointed [future] time
- type: usfm
  marker: q1
  children:
  - type: text
    text: It hurries toward the goal [of fulfillment]; it will not fail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though it delays, wait [patiently] for it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because it will certainly come; it will not delay. [Heb 10:37, 38]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶“Look at the proud one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His soul is not right within him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the righteous will live by his faith [in the true God]. [Rom 1:17; Gal 3:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Moreover, wine is treacherous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' betrays the arrogant man,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that he does not stay at home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His appetite is large like Sheol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he is like death, never satisfied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gathers to himself all nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And collects to himself all peoples [as if he owned them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶“Will all these [victims of his greed] not take up a taunting song against him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in mocking derision against him
- type: usfm
  marker: q1
  children:
  - type: text
    text: Say, ‘
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The taunting song of the five woes pronounced against Babylon begins in v 6 and concludes at the end of the chapter.
    marker-yv: yv-n
  - type: text
    text: Woe (judgment is coming) to him who increases that which is not his—
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long [will he possess it]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [woe to him who] makes himself wealthy with loans.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Will your creditors not rise up suddenly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who collect from you awaken?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you will become plunder for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Because you [king of Babylon] have looted many nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All peoples who are left will loot you—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of human bloodshed and for the violence done to the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the city and all its inhabitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶“Woe (judgment is coming) to him who obtains wicked gain for his house [and thinks by so doing]
- type: usfm
  marker: q1
  children:
  - type: text
    text: To set his nest on high,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That he may be rescued from the hand of evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “You have devised a shameful thing for your house
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By cutting off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' putting an end to many peoples;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So you are sinning against your own life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' forfeiting it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “For the stone will cry out from the wall [to accuse you—built in sin!]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the rafter will answer it out of the woodwork.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Woe (judgment is coming) to him who builds a city with bloodshed
- type: usfm
  marker: q1
  children:
  - type: text
    text: And establishes a town by violence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Is it not indeed from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That peoples labor [only] for the fire [that will destroy their work],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And nations grow weary for nothing [that is, things which have no lasting value]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “But [the time is coming when] the earth shall be filled
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the knowledge of the glory of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the waters cover the sea. [Is 11:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶“Woe (judgment is coming) to you who make your neighbors drink,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who mix in your venom to make them drunk
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that you may look at their nakedness!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “You will be filled with disgrace instead of honor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now drink and expose your own nakedness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cup [of wrath] in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' right hand will come around to you [O destroyer],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And utter disgrace will be on your own glory. [Rev 16:19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “For the violence done to Lebanon will overwhelm you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The destruction of the animals will terrify you
- type: usfm
  marker: q1
  children:
  - type: text
    text: On account of human bloodshed and the violence done to the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the city and all its inhabitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶“What profit is the carved image when its maker has formed it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is only a cast image, and a teacher of lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For its maker trusts in his own creation [as his god]
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he makes speechless idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Woe (judgment is coming) to him who says to the wooden image, ‘Awake!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the speechless stone, ‘Arise!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that is your teacher?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look, it is overlaid with gold and silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no breath at all inside it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is in His holy temple.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let all the earth hush '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be silent before Him.” [Zeph 1:7; Zech 2:13]'
