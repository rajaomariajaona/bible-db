document_id: ISA.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: War against Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass in the days of Ahaz the son of Jotham, the son of Uzziah, king of Judah, that Rezin king of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The people of the kingdom of Aram were descended from Aram, the youngest son of Shem, the son of Noah (Gen 10:22, 23). The territory of the Arameans also included the areas later identified as Syria and Mesopotamia.
      marker-yv: yv-n
    - type: text
      text: 'Aram (Syria) and Pekah the son of Remaliah, king of Israel, went up to Jerusalem to wage war against it, but they could not conquer it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke again to [King] Ahaz, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Ask a sign for yourself from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God [one that will convince you that God has spoken and will keep His word]; make your request as deep as Sheol or as high as heaven.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Ahaz said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a misplaced sense of faithfulness on Ahaz’s part. It is wise not to ask God for a sign, unless He offers one as He did to Ahaz.
      marker-yv: yv-n
    - type: text
      text: I will not ask, nor will I test the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Isaiah said, “Hear then, O house of David! Is it too small a thing for you to try the patience of men, but will you try the patience of my God as well? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Lord Himself will give you a sign: Listen carefully, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This prophecy of the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: virgin
        - type: text
          text: ' is declared in Matt 1:22, 23 to be fulfilled in the birth of Jesus. There has been a great deal of discussion over the Hebrew word found here for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: virgin
        - type: text
          text: ' ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah)
        - type: text
          text: ' and the word that Matthew uses ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: parthenos)
        - type: text
          text: . The latter refers unambiguously to a virgin, while the former (
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah)
        - type: text
          text: ' has been said to refer to a young woman, in contrast to the Hebrew word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bethulah
        - type: text
          text: ', which is the equivalent of the Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: parthenos
        - type: text
          text: '. It has also been noted that the Septuagint, the Greek translation of the Hebrew OT, has '
        - type: usfm
          marker: it
          children:
          - type: text
            text: parthenos
        - type: text
          text: ' here for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah,
        - type: text
          text: ' and that Matt 1:23 is taken from the Septuagint. Some have wondered why the Septuagint translators used the more specific word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: parthenos
        - type: text
          text: '. It is fair to say that this question is the result of oversimplifying the vocabulary and misinterpreting the distinctions. The Hebrew words '
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah
        - type: text
          text: ' and '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bethulah
        - type: text
          text: ' can actually refer to the same kind of woman; '
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah
        - type: text
          text: ' is a youthful woman of marriageable age, one who has not yet had her first child, while '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bethulah
        - type: text
          text: ' is one who has not been touched in an intimate way. Furthermore, in the present context it would be unthinkable to infer that the woman might have had sexual relations outside of marriage. So the well-known translation of “young woman” for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah,
        - type: text
          text: ' while technically not incorrect, can be viewed as too ambiguous for the Hebrew word and the context. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Parthenos
        - type: text
          text: ' was an appropriate choice in the Greek. Another word, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: kore
        - type: text
          text: ' (for “girl”) could have been used, but it has a wider range of meaning than the Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: almah
        - type: text
          text: ' (Mark uses a related word, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: korasion,
        - type: text
          text: ' to translate Jesus’ Aramaic word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: talitha)
        - type: text
          text: '. It should also be acknowledged from a theological perspective that when Matthew cites the verse with '
        - type: usfm
          marker: it
          children:
          - type: text
            text: parthenos,
        - type: text
          text: ' he thereby authenticates it as inspired.'
      marker-yv: yv-n
    - type: text
      text: 'virgin will conceive and give birth to a son, and she will call his name Immanuel (God with us). [Is 9:6; Jer 31:22; Mic 5:3-5; Matt 1:22, 23] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will eat curds and honey when he knows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enough
    - type: text
      text: ' to refuse evil and choose good. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For before the child will know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enough
    - type: text
      text: ' to refuse evil and choose good, the land (Canaan) whose two kings you dread will be deserted [both Ephraim and Aram]. [Is 7:2]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Trials to Come for Judah
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will bring on you, on your people, and on your father’s house such days as have not come since the day that Ephraim (the ten northern tribes) separated from Judah—[He will call for] the king of Assyria.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will whistle for the fly that is in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: end
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mouth of the rivers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' canals of Egypt and for the bee that is in the land of Assyria. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These [armies, like flies and bees] will all come and settle on the steep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rugged ravines and in the clefts of the rocks, and on all the thorn bushes and in all the watering places.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the house of David (Judah) was told, “Aram is allied with Ephraim (Israel),” the hearts of Ahaz and his people trembled as the trees of the forest tremble in the wind.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day [when foreign armies swarm the land] the Lord will shave with a razor, hired from the regions beyond the Euphrates (
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' with the king of Assyria), [that razor will shave] the head and the hair of the legs; and it will also remove the beard [leaving Judah stripped, shamed and scorned]. [2 Kin 16:7, 8; 18:13-16]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in that day [because of the poverty caused by the invaders] a man will keep alive only a young milk cow and two sheep; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and because of the abundance of milk produced he will eat curds, for everyone that is left in the land will eat [only] curds and [wild] honey.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it will come to pass in that day, in every place where there used to be a thousand vines, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worth
    - type: text
      text: ' a thousand silver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels,
    - type: text
      text: ' there will be briars and thorns. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People will come there [to hunt] with arrows and with bows because all the land will be briars and thorns. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for all the hills which used to be cultivated with the pick '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the hoe, you will no longer go there for fear of briars and thorns; but they will become a place where oxen are pastured and where sheep tread.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Isaiah, “Go out to meet Ahaz [king of Judah], you and your son '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A prophetic name meaning '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a remnant shall return
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Shear-jashub, at the end of the aqueduct of the Upper Pool, on the highway to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A field where freshly washed clothes were spread out to bleach and dry in the sun.
      marker-yv: yv-n
    - type: text
      text: 'Fuller’s Field; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say to him, ‘Take care and be calm, do not fear and be weak-hearted because of these two stumps of smoldering logs, on account of the fierce anger of [King] Rezin and Aram and of the son of Remaliah (Pekah, usurper of the throne of Israel). '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because Aram, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: along with
    - type: text
      text: ' Ephraim (Israel) and the son of Remaliah, have planned evil against you (Judah), saying, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Let us go up against Judah and terrorize it; and let us breach its wall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tear it apart [each of us taking a portion] and set up the son of Tabeel over it as its [puppet] king,” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for this is what the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' says, “It shall not stand nor shall it happen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the head (capital) of Aram is Damascus and the head of Damascus is [King] Rezin (now within sixty-five years Ephraim will be broken to pieces and will no longer be a people). '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the head (capital) of Ephraim is Samaria, and the head of Samaria is Remaliah’s son [King Pekah]. If you will not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The same Hebrew word is used both for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: believe
        - type: text
          text: ' and '
        - type: usfm
          marker: it
          children:
          - type: text
            text: be established
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: believe [and trust in God and His message], be assured that you will not be established.” ’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Child Immanuel
    marker-yv: yv-h
