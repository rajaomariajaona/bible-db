  '12':
  - type: text
    content: Do not give me up to the will of my adversaries,
  - type: text
    content: For false witnesses have come against me;
  - type: text
    content: They breathe out violence.
  '13':
  - type: text
    content: ' '
  - type: text
    content: I would have despaired
  - type: text
    content: ' had I not believed that I would see the goodness of the L'
  - type: heading
    content: ord
  - type: text
    content: In the land of the living.
  '14':
  - type: text
    content: 'Wait for '
  - type: text
    content: and
  - type: text
    content: ' confidently expect the L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Be strong and let your heart take courage;
  - type: text
    content: 'Yes, wait for '
  - type: text
    content: and
  - type: text
    content: ' confidently expect the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '2':
  - type: text
    content: When the wicked came against me to eat up my flesh,
  - type: text
    content: My adversaries and my enemies, they stumbled and fell.
  '3':
  - type: text
    content: Though an army encamp against me,
  - type: text
    content: My heart will not fear;
  - type: text
    content: Though war arise against me,
  - type: text
    content: Even in this I am confident.
  '4':
  - type: text
    content: ¶One thing I have asked of the L
  - type: heading
    content: ord
  - type: text
    content: ', and that I will seek:'
  - type: text
    content: That I may dwell in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' [in His presence] all the days of my life,'
  - type: text
    content: To gaze upon the beauty [the delightful loveliness and majestic grandeur] of the L
  - type: heading
    content: ord
  - type: text
    content: And to meditate in His temple. [Ps 16:11; 18:6; 65:4; Luke 2:37]
  '5':
  - type: text
    content: For in the day of trouble He will hide me in His shelter;
  - type: text
    content: In the secret place of His tent He will hide me;
  - type: text
    content: He will lift me up on a rock.
  '6':
  - type: text
    content: And now my head will be lifted up above my enemies around me,
  - type: text
    content: In His tent I will offer sacrifices with shouts of joy;
  - type: text
    content: I will sing, yes, I will sing praises to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: ¶Hear, O L
  - type: heading
    content: ord
  - type: text
    content: ', when I cry aloud;'
  - type: text
    content: 'Be gracious '
  - type: text
    content: and
  - type: text
    content: ' compassionate to me and answer me.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: When You said,
  - type: text
    content: ' “Seek My face [in prayer, require My presence as your greatest need],” my heart said to You,'
  - type: text
    content: “Your face, O L
  - type: heading
    content: ord
  - type: text
    content: ', I will seek [on the authority of Your word].”'
  '9':
  - type: text
    content: Do not hide Your face from me,
  - type: text
    content: Do not turn Your servant away in anger;
  - type: text
    content: You have been my help;
  - type: text
    content: 'Do not abandon me nor '
  - type: note
