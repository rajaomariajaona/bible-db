document_id: PSA.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 27
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm of Fearless Trust in God.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is my light and my salvation—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom shall I fear?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is the refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortress of my life—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom shall I dread?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Although my father and my mother have abandoned me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will take me up [adopt me as His child]. [Ps 22:10]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶Teach me Your way, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lead me on a level path
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of my enemies [who lie in wait].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Do not give me up to the will of my adversaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For false witnesses have come against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They breathe out violence.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I would have despaired
    - type: text
      text: ' had I not believed that I would see the goodness of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the land of the living.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Wait for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently expect the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be strong and let your heart take courage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, wait for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently expect the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When the wicked came against me to eat up my flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My adversaries and my enemies, they stumbled and fell.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Though an army encamp against me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart will not fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though war arise against me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in this I am confident.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶One thing I have asked of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and that I will seek:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may dwell in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [in His presence] all the days of my life,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To gaze upon the beauty [the delightful loveliness and majestic grandeur] of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to meditate in His temple. [Ps 16:11; 18:6; 65:4; Luke 2:37]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For in the day of trouble He will hide me in His shelter;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the secret place of His tent He will hide me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will lift me up on a rock.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And now my head will be lifted up above my enemies around me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In His tent I will offer sacrifices with shouts of joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing, yes, I will sing praises to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶Hear, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I cry aloud;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassionate to me and answer me.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: When You said,
    - type: text
      text: ' “Seek My face [in prayer, require My presence as your greatest need],” my heart said to You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your face, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I will seek [on the authority of Your word].”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not hide Your face from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not turn Your servant away in anger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been my help;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not abandon me nor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsake
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: leave me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God of my salvation!
