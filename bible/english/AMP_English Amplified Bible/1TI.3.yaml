document_id: 1TI.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Overseers and Deacons
  - type: text
    content: 'This is a faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy saying: if any man [eagerly] seeks the office of '
  - type: note
    content: Or bishop.
  - type: text
    content: 'overseer (bishop, superintendent), he desires an excellent task. '
  '10':
  - type: text
    content: 'These men must first be tested; then if they are found to be blameless '
  - type: text
    content: and
  - type: text
    content: ' beyond reproach [in their Christian lives], let them serve as deacons. '
  '11':
  - type: note
    content: In Greek, the same word is used for both woman and wife. This verse may refer specifically to either deacons’ wives or deaconesses, rather than the congregation in general.
  - type: text
    content: 'Women must likewise be worthy of respect, not malicious gossips, but self-controlled, [thoroughly] trustworthy in all things. '
  '12':
  - type: text
    content: 'Deacons must be husbands of '
  - type: text
    content: only
  - type: text
    content: ' one wife, and good managers of '
  - type: text
    content: their
  - type: text
    content: ' children and their own households. '
  '13':
  - type: text
    content: For those who have served well as deacons gain a high standing [having a good reputation among the congregation], and great confidence in the faith which is [founded on and centered] in Christ Jesus.
  '14':
  - type: text
    content: 'I hope to come to you before long, but I am writing these instructions to you '
  '15':
  - type: text
    content: 'in case I am delayed, so that you will know how people ought to conduct themselves in the household of God, which is the church of the living God, the pillar and foundation of the truth. '
  '16':
  - type: text
    content: 'And great, we confess, is the mystery [the hidden truth] of godliness:'
  - type: text
    content: He (Jesus Christ) who was revealed in human flesh,
  - type: text
    content: 'Was justified '
  - type: text
    content: and
  - type: text
    content: ' vindicated in the Spirit,'
  - type: text
    content: Seen by angels,
  - type: text
    content: Preached among the nations,
  - type: text
    content: Believed on in the world,
  - type: text
    content: Taken up in glory.
  '2':
  - type: text
    content: 'Now an overseer must be blameless '
  - type: text
    content: and
  - type: text
    content: ' beyond reproach, the husband of one wife, self-controlled, sensible, respectable, hospitable, able to teach, '
  '3':
  - type: text
    content: 'not addicted to wine, not '
  - type: note
    content: I.e. like a bully.
  - type: text
    content: 'a bully '
  - type: text
    content: nor
  - type: text
    content: ' quick-tempered '
  - type: text
    content: and
  - type: text
    content: ' hot-headed, but gentle '
  - type: text
    content: and
  - type: text
    content: ' considerate, free from the love of money [not greedy for wealth and its inherent power—financially ethical]. '
  '4':
  - type: text
    content: He must
  - type: text
    content: ' manage his own household well, keeping his children under control with all dignity [keeping them respectful and well-behaved] '
  '5':
  - type: text
    content: '(for if a man does not know how to manage his own household, how will he take care of the church of God?). '
  '6':
  - type: text
    content: 'and '
  - type: text
    content: He must
  - type: text
    content: ' not be a new convert, so that he will not [behave stupidly and] become conceited [by appointment to this high office] and fall into the [same] condemnation incurred by the devil [for his arrogance and pride]. [Is 14:12-14] '
  '7':
  - type: text
    content: 'And he must have a good reputation '
  - type: text
    content: and
  - type: text
    content: ' be well thought of by those outside '
  - type: text
    content: the church,
  - type: text
    content: ' so that he will not be discredited and fall into the devil’s trap.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Though the Greek word for “deacon” does not occur in Acts (only Paul uses it), it is generally thought that the origin of the office or ministry is found in Acts 6:1-6, where Luke reports that seven men were appointed to assist the church leaders in serving and ministering to members of the congregation.
  - type: text
    content: 'Deacons likewise '
  - type: text
    content: must be
  - type: text
    content: ' men worthy of respect [honorable, financially ethical, of good character], not double-tongued [speakers of half-truths], not addicted to wine, not greedy for dishonest gain, '
  '9':
  - type: text
    content: 'but upholding '
  - type: text
    content: and
  - type: text
    content: ' fully understanding the mystery [that is, the true doctrine] of the [Christian] faith with a clear conscience [resulting from behavior consistent with spiritual maturity]. '
