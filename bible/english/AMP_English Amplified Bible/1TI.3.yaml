document_id: 1TI.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Overseers and Deacons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is a faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy saying: if any man [eagerly] seeks the office of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bishop
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'overseer (bishop, superintendent), he desires an excellent task. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men must first be tested; then if they are found to be blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond reproach [in their Christian lives], let them serve as deacons. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In Greek, the same word is used for both '
        - type: usfm
          marker: it
          children:
          - type: text
            text: woman
        - type: text
          text: ' and '
        - type: usfm
          marker: it
          children:
          - type: text
            text: wife
        - type: text
          text: . This verse may refer specifically to either deacons’ wives or deaconesses, rather than the congregation in general.
      marker-yv: yv-n
    - type: text
      text: 'Women must likewise be worthy of respect, not malicious gossips, but self-controlled, [thoroughly] trustworthy in all things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deacons must be husbands of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' one wife, and good managers of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' children and their own households. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For those who have served well as deacons gain a high standing [having a good reputation among the congregation], and great confidence in the faith which is [founded on and centered] in Christ Jesus.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hope to come to you before long, but I am writing these instructions to you '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in case I am delayed, so that you will know how people ought to conduct themselves in the household of God, which is the church of the living God, the pillar and foundation of the truth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And great, we confess, is the mystery [the hidden truth] of godliness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He (Jesus Christ) who was revealed in human flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Was justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicated in the Spirit,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seen by angels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Preached among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Believed on in the world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taken up in glory.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now an overseer must be blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond reproach, the husband of one wife, self-controlled, sensible, respectable, hospitable, able to teach, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not addicted to wine, not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. like a bully.
      marker-yv: yv-n
    - type: text
      text: 'a bully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' quick-tempered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hot-headed, but gentle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' considerate, free from the love of money [not greedy for wealth and its inherent power—financially ethical]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He must
    - type: text
      text: ' manage his own household well, keeping his children under control with all dignity [keeping them respectful and well-behaved] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for if a man does not know how to manage his own household, how will he take care of the church of God?). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He must
    - type: text
      text: ' not be a new convert, so that he will not [behave stupidly and] become conceited [by appointment to this high office] and fall into the [same] condemnation incurred by the devil [for his arrogance and pride]. [Is 14:12-14] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he must have a good reputation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be well thought of by those outside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the church,
    - type: text
      text: ' so that he will not be discredited and fall into the devil’s trap.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Though the Greek word for “deacon” does not occur in Acts (only Paul uses it), it is generally thought that the origin of the office or ministry is found in Acts 6:1-6, where Luke reports that seven men were appointed to assist the church leaders in serving and ministering to members of the congregation.
      marker-yv: yv-n
    - type: text
      text: 'Deacons likewise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: must be
    - type: text
      text: ' men worthy of respect [honorable, financially ethical, of good character], not double-tongued [speakers of half-truths], not addicted to wine, not greedy for dishonest gain, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but upholding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fully understanding the mystery [that is, the true doctrine] of the [Christian] faith with a clear conscience [resulting from behavior consistent with spiritual maturity]. '
