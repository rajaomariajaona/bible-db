document_id: NUM.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Law of Inheritance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the [five] daughters of Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: families
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'tribes of Manasseh [who was] the son of Joseph, approached [with a request]. These are the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If a man has no brothers, then you shall give his inheritance to his father’s brothers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If his father has no brothers, then you shall give his inheritance to his nearest relative in his own family, and he shall take possession of it. It shall be a statute and ordinance to the Israelites, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded Moses.’ ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Go up to this mountain (Nebo) [in the] Abarim [range] and look at the land I have given to the sons of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When you have seen it, you too will be gathered to your people [in death], just as Aaron your brother was gathered; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: because in the Wilderness of Zin, during the strife of the congregation, you rebelled against My command to treat me as holy [by following My instruction] before their eyes at the water.” (These are the waters of Meribah in Kadesh in the Wilderness of Zin.) [Num 20:10-12]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua to Succeed Moses
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then Moses spoke to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In his humility and godliness, Moses never complained to God about the severity of his punishment. His only concern was to protect the people whom he had reluctantly led, who had so often exasperated and disappointed him.
      marker-yv: yv-n
    - type: text
      text: Let the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of the spirits of all flesh, appoint a man over the congregation '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: who will go out and come in before them, and will lead them out and bring them in, so that the congregation of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not be as sheep without a shepherd.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Take Joshua the son of Nun, a man in whom is the Spirit, and lay your hand on him; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and have him stand before Eleazar the priest and before the whole congregation, and give him a commission in their sight. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They stood before Moses, Eleazar the priest, the leaders, and all the congregation at the doorway of the Tent of Meeting (tabernacle), saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You shall put some of your authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor on him, so that all the congregation of the Israelites will obey him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He shall stand before Eleazar the priest, who shall inquire before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for him by the judgment (decision) of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of two articles (used like lots) in the priest’s breastpiece worn when inquiring of the Lord for the people (Ex 28:30).
      marker-yv: yv-n
    - type: text
      text: 'Urim. At Joshua’s command the people shall go out and at his command they shall come in, he and all the congregation of Israel with him.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moses did as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded him. He took Joshua and had him stand before Eleazar the priest and the whole congregation, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: and Moses laid his hands on Joshua and commissioned him, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded through Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Our father died in the wilderness. He was not among those who assembled together against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the company of Korah, but he died for his own sin [as did all those who rebelled at Kadesh], and he had no sons. [Num 14:26-35] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Why should the name of our father be removed from his family because he had no son? Give to us a possession (land) among our father’s brothers.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So Moses brought their case before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“The request of the daughters of Zelophehad is justified. You shall certainly give them a possession as an inheritance among their father’s brothers, and you shall transfer their father’s inheritance to them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Further, you shall say to the Israelites, ‘If a man dies and has no son, you shall transfer his inheritance to his daughter. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If a man has no daughter, then you shall give his inheritance to his brothers. '
