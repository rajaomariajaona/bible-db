document_id: NUM.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Law of Inheritance
  - type: text
    content: 'Then the [five] daughters of Zelophehad the son of Hepher, the son of Gilead, the son of Machir, the son of Manasseh, from the '
  - type: note
    content: Lit families.
  - type: text
    content: 'tribes of Manasseh [who was] the son of Joseph, approached [with a request]. These are the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '10':
  - type: text
    content: 'If a man has no brothers, then you shall give his inheritance to his father’s brothers. '
  '11':
  - type: text
    content: If his father has no brothers, then you shall give his inheritance to his nearest relative in his own family, and he shall take possession of it. It shall be a statute and ordinance to the Israelites, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded Moses.’ ”'
  '12':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Go up to this mountain (Nebo) [in the] Abarim [range] and look at the land I have given to the sons of Israel. '
  '13':
  - type: text
    content: 'When you have seen it, you too will be gathered to your people [in death], just as Aaron your brother was gathered; '
  '14':
  - type: text
    content: because in the Wilderness of Zin, during the strife of the congregation, you rebelled against My command to treat me as holy [by following My instruction] before their eyes at the water.” (These are the waters of Meribah in Kadesh in the Wilderness of Zin.) [Num 20:10-12]
  - type: heading
    content: Joshua to Succeed Moses
  '15':
  - type: text
    content: Then Moses spoke to the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, '
  '16':
  - type: text
    content: “
  - type: note
    content: In his humility and godliness, Moses never complained to God about the severity of his punishment. His only concern was to protect the people whom he had reluctantly led, who had so often exasperated and disappointed him.
  - type: text
    content: Let the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of the spirits of all flesh, appoint a man over the congregation '
  '17':
  - type: text
    content: who will go out and come in before them, and will lead them out and bring them in, so that the congregation of the L
  - type: heading
    content: ord
  - type: text
    content: ' will not be as sheep without a shepherd.” '
  '18':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Take Joshua the son of Nun, a man in whom is the Spirit, and lay your hand on him; '
  '19':
  - type: text
    content: 'and have him stand before Eleazar the priest and before the whole congregation, and give him a commission in their sight. '
  '2':
  - type: text
    content: 'They stood before Moses, Eleazar the priest, the leaders, and all the congregation at the doorway of the Tent of Meeting (tabernacle), saying, '
  '20':
  - type: text
    content: 'You shall put some of your authority '
  - type: text
    content: and
  - type: text
    content: ' honor on him, so that all the congregation of the Israelites will obey him. '
  '21':
  - type: text
    content: He shall stand before Eleazar the priest, who shall inquire before the L
  - type: heading
    content: ord
  - type: text
    content: ' for him by the judgment (decision) of the '
  - type: note
    content: One of two articles (used like lots) in the priest’s breastpiece worn when inquiring of the Lord for the people (Ex 28:30).
  - type: text
    content: 'Urim. At Joshua’s command the people shall go out and at his command they shall come in, he and all the congregation of Israel with him.” '
  '22':
  - type: text
    content: Moses did as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. He took Joshua and had him stand before Eleazar the priest and the whole congregation, '
  '23':
  - type: text
    content: and Moses laid his hands on Joshua and commissioned him, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded through Moses.'
  '3':
  - type: text
    content: “Our father died in the wilderness. He was not among those who assembled together against the L
  - type: heading
    content: ord
  - type: text
    content: ' in the company of Korah, but he died for his own sin [as did all those who rebelled at Kadesh], and he had no sons. [Num 14:26-35] '
  '4':
  - type: text
    content: 'Why should the name of our father be removed from his family because he had no son? Give to us a possession (land) among our father’s brothers.” '
  '5':
  - type: text
    content: So Moses brought their case before the L
  - type: heading
    content: ord
  - type: text
    content: .
  '6':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '7':
  - type: text
    content: '“The request of the daughters of Zelophehad is justified. You shall certainly give them a possession as an inheritance among their father’s brothers, and you shall transfer their father’s inheritance to them. '
  '8':
  - type: text
    content: 'Further, you shall say to the Israelites, ‘If a man dies and has no son, you shall transfer his inheritance to his daughter. '
  '9':
  - type: text
    content: 'If a man has no daughter, then you shall give his inheritance to his brothers. '
