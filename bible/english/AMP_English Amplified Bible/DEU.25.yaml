document_id: DEU.25,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Various Laws
  - type: text
    content: '“If there is a controversy between men, and they go to court, and the judges decide [the issue] between them, and they judge in favor of the innocent and condemn the guilty, '
  '10':
  - type: text
    content: In Israel his [family] name shall be, ‘The house of him whose sandal was removed.’
  '11':
  - type: text
    content: '“If [two] men, a man and his countryman, are fighting and the wife of one approaches to rescue her husband from the man who is striking him, and she reaches out with her hand and grabs the aggressor’s genitals, '
  '12':
  - type: text
    content: then you shall cut off her hand; you shall not show pity [for her].
  '13':
  - type: text
    content: '“You shall not have in your bag inaccurate weights, a heavy and a light [so you can cheat others]. '
  '14':
  - type: text
    content: 'You shall not have in your house inaccurate measures, a large and a small. '
  '15':
  - type: text
    content: You shall have a perfect (full) and just weight, and a perfect and just measure, so that your days may be long in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you. '
  '16':
  - type: text
    content: For everyone who does such things, everyone who acts unjustly [without personal integrity] is utterly repulsive to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '17':
  - type: text
    content: '“Remember what Amalek did to you along the road when you came from Egypt, '
  '18':
  - type: text
    content: 'how he met you along the road and attacked all the stragglers at your rear when you were tired and weary; and he did not '
  - type: note
    content: Or reverence.
  - type: text
    content: 'fear God. [Ex 17:14] '
  '19':
  - type: text
    content: Therefore when the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you rest from all your surrounding enemies, in the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you as an inheritance to possess, you shall wipe out the memory of Amalek from under heaven; you must not forget.'
  '2':
  - type: text
    content: 'then it shall be that if the guilty man deserves to be beaten, the judge shall make him lie down and be beaten in his presence with a [certain] number of stripes in proportion to his offense. '
  '3':
  - type: text
    content: He may have him beaten forty times, but no more. He is not to be beaten with more stripes than these and he is not to be degraded [that is, treated like an animal] in your sight.
  '4':
  - type: text
    content: “You shall not muzzle the ox while he is threshing [to prevent him from eating any of the grain]. [1 Cor 9:9, 10; 1 Tim 5:17, 18]
  '5':
  - type: text
    content: '“If brothers are living together and one of them dies without a son, the widow of the deceased shall not be '
  - type: text
    content: married
  - type: text
    content: ' outside '
  - type: text
    content: the family
  - type: text
    content: ' to a stranger. Her husband’s brother shall be intimate with her after taking her as his wife and perform the duty of a husband’s brother to her. '
  '6':
  - type: text
    content: 'It shall be that her firstborn [son] will '
  - type: note
    content: Lit stand on.
  - type: text
    content: 'be given the name of the dead brother, so that his name will not be blotted out of Israel. '
  '7':
  - type: text
    content: 'But if the man does not want to marry his brother’s [widowed] wife, then she shall go up to the gate [of the city, where court is held] to the elders, and say, ‘My brother-in-law refuses to continue his brother’s name in Israel; he is not willing to perform the duty of a husband’s brother.’ '
  '8':
  - type: text
    content: 'Then the elders of his city will summon him and speak to him. And if he stands firm and says, ‘I do not want to marry her,’ '
  '9':
  - type: text
    content: 'then his brother’s widow shall approach him in the presence of the elders, and pull his sandal off his foot and spit in his face; and she shall answer and say, ‘So it is done to that man who does not build up his brother’s household.’ '
