document_id: DEU.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“If there is a controversy between men, and they go to court, and the judges decide [the issue] between them, and they judge in favor of the innocent and condemn the guilty, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'then it shall be that if the guilty man deserves to be beaten, the judge shall make him lie down and be beaten in his presence with a [certain] number of stripes in proportion to his offense. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He may have him beaten forty times, but no more. He is not to be beaten with more stripes than these and he is not to be degraded [that is, treated like an animal] in your sight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “You shall not muzzle the ox while he is threshing [to prevent him from eating any of the grain]. [1 Cor 9:9, 10; 1 Tim 5:17, 18]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“If brothers are living together and one of them dies without a son, the widow of the deceased shall not be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: married
  - type: text
    text: ' outside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the family
  - type: text
    text: ' to a stranger. Her husband’s brother shall be intimate with her after taking her as his wife and perform the duty of a husband’s brother to her. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'It shall be that her firstborn [son] will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stand on
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'be given the name of the dead brother, so that his name will not be blotted out of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But if the man does not want to marry his brother’s [widowed] wife, then she shall go up to the gate [of the city, where court is held] to the elders, and say, ‘My brother-in-law refuses to continue his brother’s name in Israel; he is not willing to perform the duty of a husband’s brother.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the elders of his city will summon him and speak to him. And if he stands firm and says, ‘I do not want to marry her,’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'then his brother’s widow shall approach him in the presence of the elders, and pull his sandal off his foot and spit in his face; and she shall answer and say, ‘So it is done to that man who does not build up his brother’s household.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In Israel his [family] name shall be, ‘The house of him whose sandal was removed.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“If [two] men, a man and his countryman, are fighting and the wife of one approaches to rescue her husband from the man who is striking him, and she reaches out with her hand and grabs the aggressor’s genitals, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: then you shall cut off her hand; you shall not show pity [for her].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You shall not have in your bag inaccurate weights, a heavy and a light [so you can cheat others]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall not have in your house inaccurate measures, a large and a small. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You shall have a perfect (full) and just weight, and a perfect and just measure, so that your days may be long in the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For everyone who does such things, everyone who acts unjustly [without personal integrity] is utterly repulsive to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Remember what Amalek did to you along the road when you came from Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'how he met you along the road and attacked all the stragglers at your rear when you were tired and weary; and he did not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: reverence
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fear God. [Ex 17:14] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Therefore when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given you rest from all your surrounding enemies, in the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you as an inheritance to possess, you shall wipe out the memory of Amalek from under heaven; you must not forget.'
