    content: Or seen the back of Him who sees me, which would suggest that at some point in their conversation Hagar requested to see the divine Angel (see note v 7) and, as in Moses’ encounter with God (Ex 33:18-23), was granted the privilege of seeing His back. The wording of the Hebrew is not clear enough to further narrow the possibilities.
