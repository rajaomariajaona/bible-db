    content: 'So Hagar gave birth to Abram’s son; and Abram named his son, to whom Hagar gave birth, '
  - type: note
    content: 'Ishmael was the first person whom God named before his birth (Gen 16:11). Others were: Isaac (Gen 17:19); Josiah (1 Kin 13:2); Solomon (1 Chr 22:9); Jesus (Matt 1:21); and John the Baptist (Luke 1:13).'
