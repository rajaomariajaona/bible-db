  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He went in to [the bed of] Hagar, and she conceived; and when she realized that she had conceived, she looked with contempt on her mistress [regarding Sarai as insignificant because of her infertility]. '
  - type: usfm
    marker: v
    metadata:
