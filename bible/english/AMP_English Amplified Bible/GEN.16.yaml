  '3':
  - type: text
    content: 'After Abram had lived in the land of Canaan ten years, Abram’s wife Sarai took Hagar the Egyptian [maid], and gave her to her husband Abram to be his [secondary] wife. '
  '4':
  - type: text
    content: 'He went in to [the bed of] Hagar, and she conceived; and when she realized that she had conceived, she looked with contempt on her mistress [regarding Sarai as insignificant because of her infertility]. '
  '5':
  - type: text
    content: 'Then Sarai said to Abram, “May [the responsibility for] the wrong done to me [by the arrogant behavior of Hagar] be upon you. I gave my maid into your arms, and when she realized that she had conceived, I was despised '
