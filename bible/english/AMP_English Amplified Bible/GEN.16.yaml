  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Sarai said to Abram, “May [the responsibility for] the wrong done to me [by the arrogant behavior of Hagar] be upon you. I gave my maid into your arms, and when she realized that she had conceived, I was despised '
  - type: usfm
    marker: it
