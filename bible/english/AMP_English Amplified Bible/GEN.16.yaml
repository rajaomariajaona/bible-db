  '7':
  - type: text
    content: 'But '
  - type: note
    content: This is the first occurrence of “Angel of the Lord (YHWH)” in Scripture. The Hebrew word for “angel” means “messenger” (an angel of God is a special messenger from God who speaks for and is closely identified with Him) and context determines whether the messenger is an angel or a human. The same is true for Greek, and the word “angel” is an English form (transliteration) of the Gr aggelos. The Angel of the Lord can be a special case, however. Many Bible scholars believe that this Angel may be a theophany, that is, a physical manifestation of God, in which case the word Angel is capitalized. The Angel of the Lord may, based on context, be the pre-incarnate Christ, the Son of God.
  - type: text
    content: the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' found her by a spring of water in the wilderness, on the road to [Egypt by way of] Shur. '
  '8':
