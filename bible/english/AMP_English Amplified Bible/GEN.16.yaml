  - type: text
    text: 'After Abram had lived in the land of Canaan ten years, Abram’s wife Sarai took Hagar the Egyptian [maid], and gave her to her husband Abram to be his [secondary] wife. '
  - type: usfm
    marker: v
    metadata:
