  - type: note
    content: This must have been an acceptable practice in that time and culture, based on the idea that the children of such a union would belong to the owner of the slave-girl. Abram undoubtedly had informed Sarai of God’s promise to him, and Sarai perhaps thought that this was necessary in order to bring about God’s plan for them.
  - type: text
