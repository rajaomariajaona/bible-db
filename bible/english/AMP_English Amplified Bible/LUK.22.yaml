document_id: LUK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Preparing the Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Festival of Unleavened Bread, which is called the Passover, was approaching. [Lev 23:4, 5; Ezek 45:21; Matt 26:2-5; Mark 14:1, 2] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The chief priests and the scribes were looking for a way to put Him to death; for they were afraid of the people [who listened devotedly to His teaching, and who respected His spiritual wisdom].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Satan entered Judas, the one called Iscariot, who was one of the twelve [disciples]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he went away and discussed with the chief priests and officers how he might betray Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hand Him over to them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were delighted and agreed with him to give him money. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So he consented, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' looking for a good opportunity to betray Jesus to them [at a time when He was] separated from the crowd [because the people might riot or stop them from seizing Him].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then came the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: preparation
  - type: text
    text: ' day of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This remembrance lasted eight days. The Passover lambs were selected on the tenth of Nisan (March/April) and sacrificed on the fourteenth of Nisan (the first day of the feast). The Passover meal was eaten that same night (15 Nisan). This was immediately followed by the Feast of Unleavened Bread (15-21 Nisan). The terms “Passover” and “The Feast of Unleavened Bread” were used interchangeably.
    marker-yv: yv-n
  - type: text
    text: 'Unleavened Bread on which the Passover '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lamb
  - type: text
    text: ' had to be sacrificed. [Ex 12:18-20; Deut 16:5-8; Matt 26:17-19; Mark 14:12-16] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Jesus sent Peter and John, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and prepare the Passover meal for us, so that we may eat it.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They asked Him, “Where do You want us to prepare it?” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“When you have entered the city, a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It would have been unusual to see a manservant carrying a jar of water, because that was considered a woman’s task.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'man carrying an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: earthen
    - type: text
      text: ' jar of water will meet you; follow him into the house that he enters.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And say to the owner of the house, ‘The Teacher asks, “Where is the guest room in which I may eat the Passover with My disciples?” ’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then he will show you a large upstairs room, furnished
  - type: text
    text: ' [with carpets and dining couches]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: prepare the meal there.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They left and found it just as He had told them; and they prepared the Passover.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Lord’s Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the hour [for the meal] had come, Jesus reclined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the table,
  - type: text
    text: ' and the apostles with Him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have earnestly wanted to eat this Passover with you before I suffer;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I say to you, I will not eat it again until it is fulfilled in the kingdom of God.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when He had taken a cup and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Giving thanks consisted of two benedictions, one over the wine (Blessed are You, Lord our God, who has created the fruit of the vine!) and one for the return of the Feast Day with all it implied, as well as being allowed once more to witness it.
    marker-yv: yv-n
  - type: text
    text: 'given thanks, He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take this and share it among yourselves;
  - type: text
    text: ' [Matt 26:26-29; Mark 14:22-25; 1 Cor 11:23-25] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I say to you, I will not drink of the fruit of the vine from now on until the kingdom of God comes.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when He had taken bread and given thanks, He broke it and gave it to them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is My body which is given for you; do this in remembrance of Me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And in the same way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He took
  - type: text
    text: ' the cup after they had eaten, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This cup, which is poured out for you, is the new covenant
  - type: text
    text: ' [ratified] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in My blood.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But listen, the hand of the one betraying Me is with Mine on the table.
  - type: text
    text: ' [Ps 41:9] '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For indeed, the Son of Man is going as it has been determined; but woe (judgment is coming) to that man by whom He is betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handed over!”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And they began to discuss among themselves which one of them it might be who was going to do this.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Who Is Greatest?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now a dispute also arose among them as to which of them was regarded to be the greatest. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The kings of the Gentiles have absolute power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lord it over them; and those in authority over them are called ‘Benefactors.’'
  - type: text
    text: ' [Matt 20:25-28; Mark 10:42-45] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But it is not to be this way with you; on the contrary, the one who is the greatest among you must become like the youngest
  - type: text
    text: ' [and least privileged], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the
  - type: text
    text: ' [one who is the] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: leader, like the servant.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For who is the greater, the one who reclines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' or the one who serves? Is it not the one who reclines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table?
    - type: text
      text: ' But I am among you as the one who serves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“You are those who have remained '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have stood by Me in My trials;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and just as My Father has granted Me a kingdom, I grant you
  - type: text
    text: ' [the privilege] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that you may eat and drink at My table in My kingdom, and you will sit on thrones judging the twelve tribes of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Simon, Simon (Peter), listen! Satan has demanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: permission
    - type: text
      text: ' to sift'
  - type: text
    text: ' [all of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you like grain;
  - type: text
    text: ' [Job 1:6-12; Amos 9:9] '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but I have prayed
  - type: text
    text: ' [especially] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you
  - type: text
    text: ' [Peter], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that your faith
  - type: text
    text: ' [and confidence in Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: may not fail; and you, once you have turned back again
  - type: text
    text: ' [to Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' support your brothers'
  - type: text
    text: ' [in the faith].” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And Peter said to Him, “Lord, I am ready to go with You both to prison and to death!” [Matt 26:33-35; Mark 14:29-31; John 13:37, 38] '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I say to you, Peter, before the rooster crows today, you will
  - type: text
    text: ' [utterly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: deny three times that you know Me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When I sent you out without a money belt and
  - type: text
    text: ' [provision] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bag and
  - type: text
    text: ' [extra] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sandals, did you lack anything?”
  - type: text
    text: ' They answered, “Nothing.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But now, he who has a money belt is to take it along, and also his
  - type: text
    text: ' [provision] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bag, and he who has no sword is to sell his coat and buy one.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I tell you that this
  - type: text
    text: ' [Scripture] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'which is written must be completed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fulfilled in Me: ‘A'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e was counted with the criminals
    - type: text
      text: ’; for that which refers to Me has its fulfillment
  - type: text
    text: ' [and is settled].” [Is 53:12] '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'They said, “Lord, look, here are two swords.” And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is enough.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Garden of Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And He came out and went, as was His habit, to the Mount of Olives; and the disciples followed Him. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'When He arrived at the place [called Gethsemane], He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Pray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' that you may not fall into temptation.”'
  - type: text
    text: ' [Matt 26:36-46; Mark 14:32-42] '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And He withdrew from them about a stone’s throw, and knelt down and prayed, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, if You are willing, remove this cup
  - type: text
    text: ' [of divine wrath] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from Me; yet not My will, but
  - type: text
    text: ' [always] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yours be done.”
  - type: text
    text: ' '
  - type: usfm
