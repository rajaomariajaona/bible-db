  - type: note
    content: This remembrance lasted eight days. The Passover lambs were selected on the tenth of Nisan (March/April) and sacrificed on the fourteenth of Nisan (the first day of the feast). The Passover meal was eaten that same night (15 Nisan). This was immediately followed by the Feast of Unleavened Bread (15-21 Nisan). The terms “Passover” and “The Feast of Unleavened Bread” were used interchangeably.
