document_id: JER.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Satire on Idolatry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear the word which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' speaks to you, O house of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not learn the way of the [pagan] nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And do not be terrified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed by the signs of the heavens'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Although the pagans are terrified by them;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the customs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decrees of the peoples are [mere] delusion [exercises in futility];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is only wood which one cuts from the forest [to make a god],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The work of the hands of the craftsman with the axe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' cutting tool.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “They adorn the idol with silver and with gold;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They fasten it with hammers and nails
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that it will not fall apart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “They are like scarecrows in a cucumber field;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cannot speak;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have to be carried,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they cannot walk!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid of them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For they can do no harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' evil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor can they do any good.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶There is none like You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are great, and great is Your mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who would not fear You, O King of the nations?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For it is appropriate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' it is Your due!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For among all the wise men of the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in all their kingdoms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is none like You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But they are altogether irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid and foolish'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: In their
  - type: text
    text: ' discipline of delusion—their idol is [only] wood [it is ridiculous, empty and worthless]!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Silver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that has been
  - type: text
    text: ' beaten [into plates] is brought from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps a reference to an ancient refinery located on the island of Sardinia.
    marker-yv: yv-n
  - type: text
    text: Tarshish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And gold from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The location of this gold mining region is unknown.
    marker-yv: yv-n
  - type: text
    text: Uphaz,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The work of the craftsman and of the hand of the goldsmith;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Violet and purple are their clothing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are all the work of skilled men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is the true God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the God who is Truth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is the living God and the everlasting King.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The earth quakes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudders at His wrath,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the nations are not able to endure His indignation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In this manner you shall say to them, “The gods that did not make the heavens and the earth will perish from the earth and from under the heavens.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶God made the earth by His power;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He established the world by His wisdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And by His understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill He has stretched out the heavens.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When He utters His voice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there is
  - type: text
    text: ' a tumult of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some ancient people believed that the sky was a canopy over the earth and that God stored rainwater behind it. Therefore, it rained only when God opened the windows of heaven.
    marker-yv: yv-n
  - type: text
    text: waters in the heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He causes the clouds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the mist to ascend from the end of the earth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He makes lightning for the rain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And brings out the wind from His treasuries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from His storehouses.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Every man has become [like a brute] irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid, without knowledge [of God];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every goldsmith is shamed by his carved idols;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For his molten images are frauds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no breath in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They are worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoid of promise, a work of delusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mockery;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their time of [trial and] punishment they will perish [without hope].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The Portion of Jacob [the true God on whom Israel has a claim] is not like these;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For He is the Designer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Maker of all things,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel is the tribe of His inheritance [and He will not fail them]—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts is His name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Gather up your bundle [of goods] from the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who live under siege.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am slinging out at this time the people of this land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will cause them [great] distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they may find it [to be as I have said].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶“Woe to me because of my [spiritual] brokenness!” [says Jeremiah, speaking for the nation.]
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My wound is incurable.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I said, “Surely this sickness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grief are mine,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I must bear it.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My tent is destroyed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all my [tent] cords are broken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My children have been taken from me [as captives] and are no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no one to stretch out my tent again
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to set up my [tent] curtains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the shepherds [of the people] have become [like brutes,] irrational '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have not searched for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' asked about Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' realized their need for Him;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore they have not been wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have not prospered,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all their flocks are scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The sound of a report! Behold, [the invader] comes—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A great commotion from the country of the north (Babylonia)—
- type: usfm
  marker: q1
  children:
  - type: text
    text: To make the cities of Judah
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A desolation, a haunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dwelling place of jackals.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I know that the path of [life of] a man is not in himself;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is not within [the limited ability of] man [even one at his best] to choose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direct his steps [in life]. [Ps 37:23; Prov 20:24]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', correct me [along with Your people], but with mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in just measure—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Not in Your anger, or You will crush me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring me to nothing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pour out Your wrath on the nations that do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' recognize You'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the families that do not call Your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they have devoured Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have devoured him and consumed him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And made his land a desolate waste.
