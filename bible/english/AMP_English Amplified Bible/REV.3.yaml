  - type: text
    content: '“To the angel (divine messenger) of the church in '
  - type: note
    content: Sardis (modern Sart, Turkey), in Roman times, was a wealthy city known for the manufacture and dyeing of woolen fabric and carpets. Originally, it was the capital of the ancient Lydian Empire and was the first city to mint coinage (600 b.c.). A stream that flowed through its market place carried gold dust from a nearby mountain. King Croesus of Lydia (560-546 b.c.) financed the building of the great Temple of Artemis in Ephesus (550 b.c.). The city was conquered twice, under Cyrus the Great and under Antiochus, due to lack of adequate watchfulness.
