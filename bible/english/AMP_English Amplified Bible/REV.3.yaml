        text: 'Laodicea, located beside the Lycus River, was a prosperous city about forty miles south of Philadelphia. It had a well-respected financial center, thriving textile production industry (specializing in black wool), and a leading medical school that produced a famous eye salve. Two other cities were in this general area: Colossae, known for its mountain spring of cold, fresh water; and Hierapolis, a site famous for its hot, therapeutic mineral springs.'
