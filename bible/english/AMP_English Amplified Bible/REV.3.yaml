  - type: note
    content: Philadelphia (modern Alashehir, Turkey) was a commercial center located on elevated ground overlooking the fertile plain of the Hermus (Gediz) River. In 189 b.c. the king of Pergamum established Philadelphia and named the city to honor his brother.
