document_id: EST.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Banquets of the King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It was in the days of Ahasuerus (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ahasuerus’ Greek name was Xerxes (I), his Persian name was '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Khshayarshan
      - type: text
        text: '. Xerxes I (also known as Xerxes the Great the son of Darius the Great), ruled 486-465 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. He is the Xerxes who invaded Greece, was stopped temporarily at Thermopylae, defeated at the naval battle at Salamis, and nearly annihilated at Plataea (479 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .). The French excavations at Susa in 1880-1890 uncovered the great palace of Xerxes, where Esther would have lived. The building covered two and one-half acres. The finds at Susa from this period were so astonishing that the Louvre in Paris devoted two large rooms to the exhibition of the treasures. Xerxes’ tomb (looted in antiquity) is believed to be among the rock-cut tombs located at Naqsh-e Rajab, an archeological site in Iran about ten miles northwest of the site of ancient Persepolis.
    marker-yv: yv-n
  - type: text
    text: 'Xerxes) who reigned from India to Ethiopia (Cush) over 127 provinces, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in those days when King Ahasuerus sat on his royal throne which was at the citadel in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Susa was located about a hundred and fifty miles east of the Tigris River. The site, now modern day Shush, Iran, is considered to be one of the world’s oldest continuously inhabited cities. An ancient tomb presumed to be that of Daniel is located in the area.
    marker-yv: yv-n
  - type: text
    text: 'Susa [the capital of the Persian Empire], '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in the third year of his reign he held a banquet for all his officials and his attendants. The army '
  - type: usfm
    marker: it
    children:
    - type: text
      text: officers
  - type: text
    text: ' of Persia and Media, the nobles and the officials of the provinces were there in his presence. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he displayed the riches of his glorious kingdom and the splendor of his great majesty for many days, 180 days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in all
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When these days were completed, the king held a banquet for all the people who were present at the citadel in Susa [the capital], from the greatest [in importance] to the least, a seven-day feast in the courtyard of the garden of the king’s palace. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There were curtains
  - type: text
    text: ' (draperies) of fine white and violet linen fastened with cords of fine purple linen to silver rings and marble columns. The couches of gold and silver '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rested
  - type: text
    text: ' on a mosaic floor of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An Egyptian rock of feldspar crystals embedded in a dark red or purple groundmass used as flooring.
    marker-yv: yv-n
  - type: text
    text: 'porphyry, marble, mother-of-pearl, and precious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: colored
  - type: text
    text: ' stones. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Drinks were served in various kinds of golden goblets, and the royal wine was plentiful, in accordance with the generosity of the king. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The drinking was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: carried on
  - type: text
    text: ' in accordance with the law; no one was compelled [to drink], for the king had directed each official of his household to comply with each guest’s wishes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Queen Vashti also held a [separate] banquet for the women in the palace of King Ahasuerus.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Queen Vashti’s Refusal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the seventh day, when the king’s heart was joyful with wine (in high spirits), he commanded Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Carkas, the seven '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eunuchs were the men who were placed in charge of the king’s harem, and for that reason had been castrated.
    marker-yv: yv-n
  - type: text
    text: 'eunuchs who served in the presence of King Ahasuerus [as his attendants], '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'to bring Queen Vashti before the king, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to Jewish tradition Ahasuerus’ guests demanded that Vashti be naked, except for her royal turban to confirm that she was the queen and not just a servant-girl. She pleaded with Ahasuerus using several arguments, one of which was that if the guests found her beautiful, they would want to ravish her and kill him; and if not, her lack of beauty would disgrace him.
    marker-yv: yv-n
  - type: text
    text: 'wearing her royal crown (high turban), to display her beauty before the people and the officials, for she was lovely to see. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But Queen Vashti refused to come at the king’s command, which was delivered [to her] by the eunuchs. So the king became extremely angry and burned with rage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the king spoke to the wise men who understood the times [asking for their advice]—for it was the custom of the king '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to speak
  - type: text
    text: ' before all those who were familiar with law and legal matters— '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and who were close to him [as advisors]: Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan, the seven officials of Persia and Media who had access to the king and were ranked highest in the kingdom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '[He said,] “According to the law, what is to be done with Queen Vashti because she did not obey the command of King Ahasuerus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which was conveyed
  - type: text
    text: ' by the eunuchs?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Memucan answered in the presence of the king and the officials, “Vashti the queen has not only wronged the king but [also] all the officials (royal representatives) and all the peoples who are in all the provinces of King Ahasuerus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the queen’s conduct will become known to all women, causing them to look on their husbands with contempt (disrespect), since they will say, ‘King Ahasuerus commanded Queen Vashti to be brought before him, but she did not come.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This [very] day the ladies of Persia and Media who have heard of the queen’s refusal will speak [in the same way] to all the king’s officials, and there will be plenty of contempt and anger. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If it pleases the king, let a royal command be issued by him and let it be written in the laws of the Persians and Medes so that it cannot be repealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' modified, that Vashti is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The intent may have been simply to confine Vashti to the king’s harem and put another wife on the throne. The ancient rabbis said, however, that when the king accepted the advice, he ordered that Vashti be beheaded and her head brought to him on a platter.
    marker-yv: yv-n
  - type: text
    text: 'no longer to come before King Ahasuerus; and let the king give her royal position to another who is better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more worthy than she. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So when the king’s great decree is proclaimed throughout his [extensive] kingdom, all women will give honor to their husbands, from the great to the insignificant.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This statement (advice) pleased the king and the officials, and the king did what Memucan proposed. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So he sent letters to all the royal provinces, to each province in its own script and to each people in their own language, saying that every man should be the master '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rule in his own home and that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In recognition of the position of her husband a foreign-born wife was to speak his language.
    marker-yv: yv-n
  - type: text
    text: he should speak [in the household] in the language of his own people.
