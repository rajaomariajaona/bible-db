  '20':
  - type: text
    content: So when the king’s great decree is proclaimed throughout his [extensive] kingdom, all women will give honor to their husbands, from the great to the insignificant.”
  '21':
  - type: text
    content: 'This statement (advice) pleased the king and the officials, and the king did what Memucan proposed. '
  '22':
  - type: text
    content: 'So he sent letters to all the royal provinces, to each province in its own script and to each people in their own language, saying that every man should be the master '
  - type: text
