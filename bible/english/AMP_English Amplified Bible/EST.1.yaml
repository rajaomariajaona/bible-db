  - type: text
    content: ' modified, that Vashti is '
  - type: note
    content: The intent may have been simply to confine Vashti to the king’s harem and put another wife on the throne. The ancient rabbis said, however, that when the king accepted the advice, he ordered that Vashti be beheaded and her head brought to him on a platter.
  - type: text
    content: 'no longer to come before King Ahasuerus; and let the king give her royal position to another who is better '
  - type: text
    content: and
  - type: text
    content: ' more worthy than she. '
