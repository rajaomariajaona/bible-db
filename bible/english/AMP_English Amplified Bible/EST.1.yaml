    content: 'On the seventh day, when the king’s heart was joyful with wine (in high spirits), he commanded Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar, and Carkas, the seven '
  - type: note
    content: Eunuchs were the men who were placed in charge of the king’s harem, and for that reason had been castrated.
  - type: text
