    content: 'to bring Queen Vashti before the king, '
  - type: note
    content: According to Jewish tradition Ahasuerus’ guests demanded that Vashti be naked, except for her royal turban to confirm that she was the queen and not just a servant-girl. She pleaded with Ahasuerus using several arguments, one of which was that if the guests found her beautiful, they would want to ravish her and kill him; and if not, her lack of beauty would disgrace him.
  - type: text
    content: 'wearing her royal crown (high turban), to display her beauty before the people and the officials, for she was lovely to see. '
  '12':
  - type: text
    content: But Queen Vashti refused to come at the king’s command, which was delivered [to her] by the eunuchs. So the king became extremely angry and burned with rage.
  '13':
  - type: text
    content: 'Then the king spoke to the wise men who understood the times [asking for their advice]—for it was the custom of the king '
  - type: text
    content: to speak
  - type: text
    content: ' before all those who were familiar with law and legal matters— '
  '14':
  - type: text
    content: 'and who were close to him [as advisors]: Carshena, Shethar, Admatha, Tarshish, Meres, Marsena, and Memucan, the seven officials of Persia and Media who had access to the king and were ranked highest in the kingdom. '
  '15':
  - type: text
    content: '[He said,] “According to the law, what is to be done with Queen Vashti because she did not obey the command of King Ahasuerus '
  - type: text
    content: which was conveyed
  - type: text
    content: ' by the eunuchs?” '
  '16':
  - type: text
    content: 'And Memucan answered in the presence of the king and the officials, “Vashti the queen has not only wronged the king but [also] all the officials (royal representatives) and all the peoples who are in all the provinces of King Ahasuerus. '
  '17':
  - type: text
    content: 'For the queen’s conduct will become known to all women, causing them to look on their husbands with contempt (disrespect), since they will say, ‘King Ahasuerus commanded Queen Vashti to be brought before him, but she did not come.’ '
  '18':
  - type: text
    content: 'This [very] day the ladies of Persia and Media who have heard of the queen’s refusal will speak [in the same way] to all the king’s officials, and there will be plenty of contempt and anger. '
  '19':
  - type: text
    content: 'If it pleases the king, let a royal command be issued by him and let it be written in the laws of the Persians and Medes so that it cannot be repealed '
  - type: text
