    content: The Banquets of the King
  - type: text
    content: It was in the days of Ahasuerus (
  - type: note
    content: Ahasuerus’ Greek name was Xerxes (I), his Persian name was Khshayarshan. Xerxes I (also known as Xerxes the Great the son of Darius the Great), ruled 486-465 b.c. He is the Xerxes who invaded Greece, was stopped temporarily at Thermopylae, defeated at the naval battle at Salamis, and nearly annihilated at Plataea (479 b.c.). The French excavations at Susa in 1880-1890 uncovered the great palace of Xerxes, where Esther would have lived. The building covered two and one-half acres. The finds at Susa from this period were so astonishing that the Louvre in Paris devoted two large rooms to the exhibition of the treasures. Xerxes’ tomb (looted in antiquity) is believed to be among the rock-cut tombs located at Naqsh-e Rajab, an archeological site in Iran about ten miles northwest of the site of ancient Persepolis.
  - type: text
    content: 'Xerxes) who reigned from India to Ethiopia (Cush) over 127 provinces, '
