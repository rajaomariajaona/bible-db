document_id: REV.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Scene of Heaven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw another sign in heaven, great and wonderful [a warning of terrifying and horrible events]: seven angels who had seven plagues (afflictions, calamities), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which are
    - type: text
      text: ' the last, because with them the wrath of God is finished [that is, it is completely expressed and reaches its zenith]. [Lev 26:21]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw something like a sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' large expanse of glass mixed with fire, and those who were victorious over the beast and over his image and over the number corresponding to his name were standing on the sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' large expanse of glass, holding harps of God [worshiping Him]. [Rev 4:6; 7:9-17] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At the end, the old covenant that came through Moses is seen to be in complete unity with the new covenant in Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: sang the song of Moses, the bond-servant of God, and the song of the Lamb, saying,
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: G
    - type: text
      text: 'reat and wonderful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awe-inspiring are Your works [in judgment],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord God, the Almighty [the Omnipotent, the Ruler of all];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteous and true are Your ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O King of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two early mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: ages
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: nations! [Ex 15:1-8; Ps 145:17]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who will not fear [reverently] and glorify Your name, O Lord [giving You honor and praise in worship]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You alone are holy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: all the nations shall come and worship before
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our righteous acts
    - type: text
      text: ' [Your just decrees and judgments] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: have been revealed
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: displayed
    - type: text
      text: .” [Ps 86:9; Jer 10:7; Phil 2:9-11]
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things I looked, and the temple (sanctuary) of the tabernacle of the testimony in heaven was opened, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the seven angels who had the seven plagues (afflictions, calamities) came out of the temple, arrayed in linen, pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gleaming, and wrapped around their chests were golden sashes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the four living creatures gave to the seven angels seven golden bowls full of the wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indignation of God, who lives forever and ever. [Rev 4:6] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the temple was filled with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The awe-inspiring manifestation of God’s '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shekinah
        - type: text
          text: ' glory was seen in the tabernacle, then when Solomon’s temple was dedicated, and the prophets said it would be seen again at the end.'
      marker-yv: yv-n
    - type: text
      text: 'smoke from the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' radiance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor of God and from His power; and no one was able to enter the temple until the seven plagues of the seven angels were finished. [Ex 33:9, 10; 1 Kin 8:10, 11; Is 6:4; Ezek 44:4]'
