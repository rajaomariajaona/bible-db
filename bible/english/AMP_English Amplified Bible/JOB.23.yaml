document_id: JOB.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says He Longs for God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Even today my complaint is contentious;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His hand is heavy despite my groaning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Oh, that I knew where I might find Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I might [even] come to His seat!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I would present my cause before Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fill my mouth with arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I would learn the words which He would answer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And understand what He would say to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Would He contend against me with His great power?
- type: usfm
  marker: q1
  children:
  - type: text
    text: No, surely He would give attention to me. [Is 27:4, 5; 57:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “There the righteous and upright could reason with Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I would be acquitted forever by my Judge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Behold, I go forward (to the east), but He is not there;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I go backward (to the west), but I cannot perceive Him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: To the left (north) He turns, but I cannot behold Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turns to the right hand (south), but I cannot see Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “But He knows the way that I take [and He pays attention to it].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: When
  - type: text
    text: ' He has tried me, I will come forth as [refined] gold [pure and luminous]. [Ps 17:3; 66:10; James 1:12]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “My feet have carefully followed His steps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have kept His ways and not turned aside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I have not departed from the commandment of His lips;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have kept the words of His mouth more than my necessary food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“But He is unique '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unchangeable, and who can turn Him?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what
  - type: text
    text: ' His soul desires, that He does.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “For He performs what is planned (appointed) for me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He is mindful of many such things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Therefore I would be terrified at His presence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: When
  - type: text
    text: ' I consider [all of this], I tremble in dread of Him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “For God has made my heart faint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Almighty has terrified me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But I am not silenced by the darkness [of these woes that fell on me],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor by the thick darkness which covers my face.
