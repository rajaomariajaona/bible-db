document_id: JOB.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Says He Longs for God
  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: “But He knows the way that I take [and He pays attention to it].
  - type: text
    content: When
  - type: text
    content: ' He has tried me, I will come forth as [refined] gold [pure and luminous]. [Ps 17:3; 66:10; James 1:12]'
  '11':
  - type: text
    content: “My feet have carefully followed His steps;
  - type: text
    content: I have kept His ways and not turned aside.
  '12':
  - type: text
    content: “I have not departed from the commandment of His lips;
  - type: text
    content: I have kept the words of His mouth more than my necessary food.
  '13':
  - type: text
    content: '“But He is unique '
  - type: text
    content: and
  - type: text
    content: ' unchangeable, and who can turn Him?'
  - type: text
    content: 'And '
  - type: text
    content: what
  - type: text
    content: ' His soul desires, that He does.'
  '14':
  - type: text
    content: “For He performs what is planned (appointed) for me,
  - type: text
    content: And He is mindful of many such things.
  '15':
  - type: text
    content: “Therefore I would be terrified at His presence;
  - type: text
    content: When
  - type: text
    content: ' I consider [all of this], I tremble in dread of Him.'
  '16':
  - type: text
    content: “For God has made my heart faint,
  - type: text
    content: And the Almighty has terrified me,
  '17':
  - type: text
    content: But I am not silenced by the darkness [of these woes that fell on me],
  - type: text
    content: Nor by the thick darkness which covers my face.
  '2':
  - type: text
    content: “Even today my complaint is contentious;
  - type: text
    content: His hand is heavy despite my groaning.
  '3':
  - type: text
    content: “Oh, that I knew where I might find Him,
  - type: text
    content: That I might [even] come to His seat!
  '4':
  - type: text
    content: “I would present my cause before Him
  - type: text
    content: And fill my mouth with arguments.
  '5':
  - type: text
    content: “I would learn the words which He would answer,
  - type: text
    content: And understand what He would say to me.
  '6':
  - type: text
    content: “Would He contend against me with His great power?
  - type: text
    content: No, surely He would give attention to me. [Is 27:4, 5; 57:16]
  '7':
  - type: text
    content: “There the righteous and upright could reason with Him;
  - type: text
    content: So I would be acquitted forever by my Judge.
  '8':
  - type: text
    content: ¶“Behold, I go forward (to the east), but He is not there;
  - type: text
    content: I go backward (to the west), but I cannot perceive Him;
  '9':
  - type: text
    content: To the left (north) He turns, but I cannot behold Him;
  - type: text
    content: He turns to the right hand (south), but I cannot see Him.
