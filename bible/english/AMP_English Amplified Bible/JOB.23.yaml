document_id: JOB.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Says He Longs for God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But He knows the way that I take [and He pays attention to it].
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' He has tried me, I will come forth as [refined] gold [pure and luminous]. [Ps 17:3; 66:10; James 1:12]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My feet have carefully followed His steps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have kept His ways and not turned aside.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have not departed from the commandment of His lips;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have kept the words of His mouth more than my necessary food.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But He is unique '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unchangeable, and who can turn Him?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' His soul desires, that He does.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For He performs what is planned (appointed) for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He is mindful of many such things.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore I would be terrified at His presence;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' I consider [all of this], I tremble in dread of Him.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For God has made my heart faint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Almighty has terrified me,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am not silenced by the darkness [of these woes that fell on me],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor by the thick darkness which covers my face.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even today my complaint is contentious;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His hand is heavy despite my groaning.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that I knew where I might find Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I might [even] come to His seat!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I would present my cause before Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fill my mouth with arguments.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I would learn the words which He would answer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And understand what He would say to me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Would He contend against me with His great power?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, surely He would give attention to me. [Is 27:4, 5; 57:16]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There the righteous and upright could reason with Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I would be acquitted forever by my Judge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Behold, I go forward (to the east), but He is not there;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I go backward (to the west), but I cannot perceive Him;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the left (north) He turns, but I cannot behold Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turns to the right hand (south), but I cannot see Him.
