document_id: LEV.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Law of Sin Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '(just as these are removed from the ox of the sacrifice of peace offerings), and the priest is to offer them up in smoke on the altar of burnt offering. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But the hide of the bull and all its meat, with its head, its legs, its entrails, and its refuse, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that is, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all the rest of
    - type: text
      text: ' the bull, he is to bring outside the camp to a clean place where the ashes are poured out, and burn it on a fire of wood. Where the ashes are poured out it shall be burned. [Heb 13:11-13]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ‘Now if the whole congregation of Israel sins unintentionally, and the matter escapes the notice of the assembly, and they have done any one of the things which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded not to be done, and they become guilty; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'when the sin which they have committed becomes known, then the congregation shall offer a young bull of the herd as a sin offering and bring it before the Tent of Meeting. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the elders of the congregation shall lay their hands on the head of the bull before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to transfer symbolically the congregation’s guilt to the sacrifice], and they shall kill the bull before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The anointed priest is to bring some of the bull’s blood to the Tent of Meeting, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: and the priest shall dip his finger in the blood, and sprinkle it seven times before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in front of the veil [which screens off the Holy of Holies and the ark of the covenant]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He shall put some of the blood on the horns of the altar [of incense] which is before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the Tent of Meeting; and he shall pour out all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' the blood at the base of the altar of burnt offering which is at the doorway of the Tent of Meeting. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He shall remove all its fat from the bull and offer it up in smoke on the altar. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Speak to the children of Israel, ‘If a person sins unintentionally in any of the things which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded not to be done, and commits any of them— '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He shall also do with the bull just as he did with the bull of the sin offering; that is what he shall do with this. So the priest shall make atonement for [the sin of] the people, and they will be forgiven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the priest is to bring the bull outside the camp and burn it as he burned the first bull; it is the sin offering for the congregation.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘When a ruler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' leader sins and unintentionally does any one of the things the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God has commanded not to be done, and he becomes guilty, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'if his sin which he has committed is made known to him, he shall bring a goat, a male without blemish as his offering. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He shall lay his hand on the head of the male goat [transferring symbolically his guilt to the sacrifice], and kill it in the place where they kill the burnt offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; it is a sin offering. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then the priest is to take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' its blood he shall pour out at the base of the altar of burnt offering. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And he shall offer all its fat up in smoke on the altar like the fat from the sacrifice of peace offerings; so the priest shall make atonement for him in regard to his sin, and he will be forgiven.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ‘If anyone of the common people sins unintentionally by doing any of the things the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded not to be done, and becomes guilty, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'if his sin which he has committed is made known to him, then he shall bring a goat, a female without blemish as his offering for the sin which he has committed. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'He shall lay his hand on the head of the sin offering [transferring symbolically his guilt to the sacrifice], and kill it at the place of the burnt offering. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: if the anointed priest sins, bringing guilt on the people, then he shall offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' a young bull without blemish as a sin offering for the sin he has committed. [Heb 7:27, 28] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The priest shall take some of its blood with his finger and put it on the horns of the altar of burnt offering and shall pour out all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' its blood at the base of the altar. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then he shall remove all its fat, just as the fat was removed from the sacrifice of peace offerings; and the priest shall offer it up in smoke on the altar as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . In this way the priest shall make atonement for him, and he will be forgiven.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '‘If he brings a lamb as his offering for a sin offering, he shall bring a female without blemish. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He shall lay his hand on the head of the sin offering [transferring symbolically his guilt to the sacrifice], and kill it as a sin offering in the place where they kill the burnt offering. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The priest is to take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' the blood of the lamb he shall pour out at the base of the altar. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Then he shall remove all its fat, just as the fat of the lamb is removed from the sacrifice of the peace offerings, and the priest shall offer it up in smoke on the altar, on the offerings by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . In this way the priest shall make atonement for him in regard to the sin which he has committed, and he will be forgiven. [Heb 9:13, 14]
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He shall bring the bull to the doorway of the Tent of Meeting before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and shall lay his hand on the bull’s head [transferring symbolically his guilt to the sacrifice] and kill the bull before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the anointed priest is to take some of the bull’s blood and bring it into the Tent of Meeting; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and the priest shall dip his finger in the blood and sprinkle some of it seven times before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in front of the veil (curtain) of the sanctuary. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The priest shall also put some of the blood on the horns of the altar of fragrant incense which is before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the Tent of Meeting. All the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rest of the
    - type: text
      text: ' blood of the bull he shall pour out at the base of the altar of the burnt offering which is at the doorway of the Tent of Meeting. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He shall remove all the fat from the bull of the sin offering—the fat that covers the entrails, and all the fat which is on the entrails, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and the two kidneys with the fat that is on them at the loins, and the lobe of the liver, which he shall remove with the kidneys '
