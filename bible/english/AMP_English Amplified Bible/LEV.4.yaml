document_id: LEV.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law of Sin Offerings
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '(just as these are removed from the ox of the sacrifice of peace offerings), and the priest is to offer them up in smoke on the altar of burnt offering. '
  '11':
  - type: text
    content: 'But the hide of the bull and all its meat, with its head, its legs, its entrails, and its refuse, '
  '12':
  - type: text
    content: 'that is, '
  - type: text
    content: all the rest of
  - type: text
    content: ' the bull, he is to bring outside the camp to a clean place where the ashes are poured out, and burn it on a fire of wood. Where the ashes are poured out it shall be burned. [Heb 13:11-13]'
  '13':
  - type: text
    content: ‘Now if the whole congregation of Israel sins unintentionally, and the matter escapes the notice of the assembly, and they have done any one of the things which the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded not to be done, and they become guilty; '
  '14':
  - type: text
    content: 'when the sin which they have committed becomes known, then the congregation shall offer a young bull of the herd as a sin offering and bring it before the Tent of Meeting. '
  '15':
  - type: text
    content: Then the elders of the congregation shall lay their hands on the head of the bull before the L
  - type: heading
    content: ord
  - type: text
    content: ' [to transfer symbolically the congregation’s guilt to the sacrifice], and they shall kill the bull before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'The anointed priest is to bring some of the bull’s blood to the Tent of Meeting, '
  '17':
  - type: text
    content: and the priest shall dip his finger in the blood, and sprinkle it seven times before the L
  - type: heading
    content: ord
  - type: text
    content: ', in front of the veil [which screens off the Holy of Holies and the ark of the covenant]. '
  '18':
  - type: text
    content: He shall put some of the blood on the horns of the altar [of incense] which is before the L
  - type: heading
    content: ord
  - type: text
    content: ' in the Tent of Meeting; and he shall pour out all '
  - type: text
    content: the rest of
  - type: text
    content: ' the blood at the base of the altar of burnt offering which is at the doorway of the Tent of Meeting. '
  '19':
  - type: text
    content: 'He shall remove all its fat from the bull and offer it up in smoke on the altar. '
  '2':
  - type: text
    content: “Speak to the children of Israel, ‘If a person sins unintentionally in any of the things which the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded not to be done, and commits any of them— '
  '20':
  - type: text
    content: 'He shall also do with the bull just as he did with the bull of the sin offering; that is what he shall do with this. So the priest shall make atonement for [the sin of] the people, and they will be forgiven. '
  '21':
  - type: text
    content: Then the priest is to bring the bull outside the camp and burn it as he burned the first bull; it is the sin offering for the congregation.
  '22':
  - type: text
    content: '‘When a ruler '
  - type: text
    content: or
  - type: text
    content: ' leader sins and unintentionally does any one of the things the L'
  - type: heading
    content: ord
  - type: text
    content: ' his God has commanded not to be done, and he becomes guilty, '
  '23':
  - type: text
    content: 'if his sin which he has committed is made known to him, he shall bring a goat, a male without blemish as his offering. '
  '24':
  - type: text
    content: He shall lay his hand on the head of the male goat [transferring symbolically his guilt to the sacrifice], and kill it in the place where they kill the burnt offering before the L
  - type: heading
    content: ord
  - type: text
    content: '; it is a sin offering. '
  '25':
  - type: text
    content: 'Then the priest is to take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering; and '
  - type: text
    content: the rest of
  - type: text
    content: ' its blood he shall pour out at the base of the altar of burnt offering. '
  '26':
  - type: text
    content: And he shall offer all its fat up in smoke on the altar like the fat from the sacrifice of peace offerings; so the priest shall make atonement for him in regard to his sin, and he will be forgiven.
  '27':
  - type: text
    content: ‘If anyone of the common people sins unintentionally by doing any of the things the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded not to be done, and becomes guilty, '
  '28':
  - type: text
    content: 'if his sin which he has committed is made known to him, then he shall bring a goat, a female without blemish as his offering for the sin which he has committed. '
  '29':
  - type: text
    content: 'He shall lay his hand on the head of the sin offering [transferring symbolically his guilt to the sacrifice], and kill it at the place of the burnt offering. '
  '3':
  - type: text
    content: if the anointed priest sins, bringing guilt on the people, then he shall offer to the L
  - type: heading
    content: ord
  - type: text
    content: ' a young bull without blemish as a sin offering for the sin he has committed. [Heb 7:27, 28] '
  '30':
  - type: text
    content: 'The priest shall take some of its blood with his finger and put it on the horns of the altar of burnt offering and shall pour out all '
  - type: text
    content: the rest of
  - type: text
    content: ' its blood at the base of the altar. '
  '31':
  - type: text
    content: 'Then he shall remove all its fat, just as the fat was removed from the sacrifice of peace offerings; and the priest shall offer it up in smoke on the altar as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: . In this way the priest shall make atonement for him, and he will be forgiven.
  '32':
  - type: text
    content: '‘If he brings a lamb as his offering for a sin offering, he shall bring a female without blemish. '
  '33':
  - type: text
    content: 'He shall lay his hand on the head of the sin offering [transferring symbolically his guilt to the sacrifice], and kill it as a sin offering in the place where they kill the burnt offering. '
  '34':
  - type: text
    content: 'The priest is to take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and all '
  - type: text
    content: the rest of
  - type: text
    content: ' the blood of the lamb he shall pour out at the base of the altar. '
  '35':
  - type: text
    content: Then he shall remove all its fat, just as the fat of the lamb is removed from the sacrifice of the peace offerings, and the priest shall offer it up in smoke on the altar, on the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: . In this way the priest shall make atonement for him in regard to the sin which he has committed, and he will be forgiven. [Heb 9:13, 14]
  '4':
  - type: text
    content: He shall bring the bull to the doorway of the Tent of Meeting before the L
  - type: heading
    content: ord
  - type: text
    content: ', and shall lay his hand on the bull’s head [transferring symbolically his guilt to the sacrifice] and kill the bull before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Then the anointed priest is to take some of the bull’s blood and bring it into the Tent of Meeting; '
  '6':
  - type: text
    content: and the priest shall dip his finger in the blood and sprinkle some of it seven times before the L
  - type: heading
    content: ord
  - type: text
    content: ' in front of the veil (curtain) of the sanctuary. '
  '7':
  - type: text
    content: The priest shall also put some of the blood on the horns of the altar of fragrant incense which is before the L
  - type: heading
    content: ord
  - type: text
    content: ' in the Tent of Meeting. All the '
  - type: text
    content: rest of the
  - type: text
    content: ' blood of the bull he shall pour out at the base of the altar of the burnt offering which is at the doorway of the Tent of Meeting. '
  '8':
  - type: text
    content: 'He shall remove all the fat from the bull of the sin offering—the fat that covers the entrails, and all the fat which is on the entrails, '
  '9':
  - type: text
    content: 'and the two kidneys with the fat that is on them at the loins, and the lobe of the liver, which he shall remove with the kidneys '
