document_id: ROM.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Escape from Bondage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore there is now no condemnation [no guilty verdict, no punishment] for those who are in Christ Jesus [who believe in Him as personal Lord and Savior]. [John 3:18] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If Christ lives in you, though your [natural] body is dead because of sin, your spirit is alive because of righteousness [which He provides]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And if the Spirit of Him who raised Jesus from the dead lives in you, He who raised Christ Jesus from the dead will also give life to your mortal bodies through His Spirit, who lives in you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So then, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, we have an obligation, but not to our flesh [our human nature, our worldliness, our sinful capacity], to live according to the [impulses of the] flesh [our nature without the Holy Spirit]— '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'for if you are living according to the [impulses of the] flesh, you are going to die. But if [you are living] by the [power of the Holy] Spirit you are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' putting to death the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sinful
    - type: text
      text: ' deeds of the body, you will [really] live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: forever
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For all who are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allowing themselves to
    - type: text
      text: ' be led by the Spirit of God are sons of God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For you have not received a spirit of slavery leading again to fear [of God’s judgment], but you have received the Spirit of adoption as sons [the Spirit producing sonship] by which we [joyfully] cry, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An Aramaic word used by young children when addressing their fathers, but not used by Jews in prayer because it implies a sense of familiarity. Jesus’ use of the word emphasized his Father-Son relationship with God.
      marker-yv: yv-n
    - type: text
      text: 'Abba! Father!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The Spirit Himself testifies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confirms together with our spirit [assuring us] that we [believers] are children of God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And if [we are His] children, [then we are His] heirs also: heirs of God and fellow heirs with Christ [sharing His spiritual blessing and inheritance], if indeed we share in His suffering so that we may also share in His glory. [John 17:24; Gal 3:29; 4:7; Eph 1:3, 11; 3:6; Heb 6:12]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For I consider [from the standpoint of faith] that the sufferings of the present life are not worthy to be compared with the glory that is about to be revealed to us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in us! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For [even the whole] creation [all nature] waits eagerly for the children of God to be revealed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the law of the Spirit of life [which is] in Christ Jesus [the law of our new being] has set you free from the law of sin and of death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For the creation was subjected to frustration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' futility, not willingly [because of some intentional fault on its part], but by the will of Him who subjected it, in hope [Eccl 1:2] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'that the creation itself will also be freed from its bondage to decay [and gain entrance] into the glorious freedom of the children of God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For we know that the whole creation has been moaning together as in the pains of childbirth until now. [Jer 12:4, 11] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And not only this, but we too, who have the first fruits of the Spirit [a joyful indication of the blessings to come], even we groan inwardly, as we wait eagerly for [the sign of] our adoption as sons—the redemption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' transformation of our body [at the resurrection]. [2 Cor 5:2, 4; Eph 4:30] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For in this hope we were saved [by faith]. But hope [the object of] which is seen is not hope. For who hopes for what he already sees? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But if we hope for what we do not see, we wait eagerly for it with patience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' composure.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Our Victory in Christ
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'In the same way the Spirit [comes to us and] helps us in our weakness. We do not know what prayer to offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' how to offer it as we should, but the Spirit Himself [knows our need and at the right time] intercedes on our behalf with sighs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' groanings too deep for words. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And He who searches the hearts knows what the mind of the Spirit is, because the Spirit intercedes [before God] on behalf of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the saints
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: God’s people in accordance with God’s will. [Ps 139:1, 2]
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And we know [with great confidence] that God [who is deeply concerned about us] causes all things to work together [as a plan] for good for those who love God, to those who are called according to His plan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For those whom He foreknew [and loved and chose beforehand], He also predestined to be conformed to the image of His Son [and ultimately share in His complete sanctification], so that He would be the firstborn [the most beloved and honored] among many believers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For what the Law could not do [that is, overcome sin and remove its penalty, its power] being weakened by the flesh [man’s nature without the Holy Spirit], God did: He sent His own Son in the likeness of sinful man as an offering for sin. And He condemned sin in the flesh [subdued it and overcame it in the person of His own Son], [Lev 7:37] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And those whom He predestined, He also called; and those whom He called, He also justified [declared free of the guilt of sin]; and those whom He justified, He also glorified [raising them to a heavenly dignity].
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'What then shall we say to all these things? If God is for us, who can be [successful] against us? [Ps 118:6] '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'He who did not spare [even] His own Son, but gave Him up for us all, how will He not also, along with Him, graciously give us all things? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Who will bring any charge against God’s elect (His chosen ones)? It is God who justifies us [declaring us blameless and putting us in a right relationship with Himself]. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Who is the one who condemns us? Christ Jesus is the One who died [to pay our penalty], and more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: than that,
    - type: text
      text: ' who was raised [from the dead], and who is at the right hand of God interceding [with the Father] for us. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Who shall ever separate us from the love of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two early mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: God
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Christ? Will tribulation, or distress, or persecution, or famine, or nakedness, or danger, or sword? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Just as it is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever remains written,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our sake we are put to death all day long
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: W
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e are regarded as sheep for the slaughter
    - type: text
      text: .” [Ps 44:22]
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Yet in all these things we are more than conquerors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gain an overwhelming victory through Him who loved us [so much that He died for us]. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'For I am convinced [and continue to be convinced—beyond any doubt] that neither death, nor life, nor angels, nor principalities, nor things present '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' threatening, nor things to come, nor powers, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: nor height, nor depth, nor any other created thing, will be able to separate us from the [unlimited] love of God, which is in Christ Jesus our Lord.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'so that the [righteous and just] requirement of the Law might be fulfilled in us who do not live our lives in the ways of the flesh [guided by worldliness and our sinful nature], but [live our lives] in the ways of the Spirit [guided by His power]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For those who are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: living
    - type: text
      text: ' according to the flesh set their minds on the things of the flesh [which gratify the body], but those who are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: living
    - type: text
      text: ' according to the Spirit, [set their minds on] the things of the Spirit [His will and purpose]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now the mind of the flesh is death [both now and forever—because it pursues sin]; but the mind of the Spirit is life and peace [the spiritual well-being that comes from walking with God—both now and forever]; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'the mind of the flesh [with its sinful pursuits] is actively hostile to God. It does not submit itself to God’s law, since it cannot, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: and those who are in the flesh [living a life that caters to sinful appetites and impulses] cannot please God.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'However, you are not [living] in the flesh [controlled by the sinful nature] but in the Spirit, if in fact the Spirit of God lives in you [directing and guiding you]. But if anyone does not have the Spirit of Christ, he does not belong to Him [and is not a child of God]. [Rom 8:14] '
