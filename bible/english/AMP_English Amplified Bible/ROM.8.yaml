document_id: ROM.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Escape from Bondage
  - type: text
    content: 'Therefore there is now no condemnation [no guilty verdict, no punishment] for those who are in Christ Jesus [who believe in Him as personal Lord and Savior]. [John 3:18] '
  '10':
  - type: text
    content: 'If Christ lives in you, though your [natural] body is dead because of sin, your spirit is alive because of righteousness [which He provides]. '
  '11':
  - type: text
    content: And if the Spirit of Him who raised Jesus from the dead lives in you, He who raised Christ Jesus from the dead will also give life to your mortal bodies through His Spirit, who lives in you.
  '12':
  - type: text
    content: 'So then, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters, we have an obligation, but not to our flesh [our human nature, our worldliness, our sinful capacity], to live according to the [impulses of the] flesh [our nature without the Holy Spirit]— '
  '13':
  - type: text
    content: 'for if you are living according to the [impulses of the] flesh, you are going to die. But if [you are living] by the [power of the Holy] Spirit you are '
  - type: text
    content: habitually
  - type: text
    content: ' putting to death the '
  - type: text
    content: sinful
  - type: text
    content: ' deeds of the body, you will [really] live '
  - type: text
    content: forever
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'For all who are '
  - type: text
    content: allowing themselves to
  - type: text
    content: ' be led by the Spirit of God are sons of God. '
  '15':
  - type: text
    content: For you have not received a spirit of slavery leading again to fear [of God’s judgment], but you have received the Spirit of adoption as sons [the Spirit producing sonship] by which we [joyfully] cry, “
  - type: note
    content: An Aramaic word used by young children when addressing their fathers, but not used by Jews in prayer because it implies a sense of familiarity. Jesus’ use of the word emphasized his Father-Son relationship with God.
  - type: text
    content: 'Abba! Father!” '
  '16':
  - type: text
    content: 'The Spirit Himself testifies '
  - type: text
    content: and
  - type: text
    content: ' confirms together with our spirit [assuring us] that we [believers] are children of God. '
  '17':
  - type: text
    content: 'And if [we are His] children, [then we are His] heirs also: heirs of God and fellow heirs with Christ [sharing His spiritual blessing and inheritance], if indeed we share in His suffering so that we may also share in His glory. [John 17:24; Gal 3:29; 4:7; Eph 1:3, 11; 3:6; Heb 6:12]'
  '18':
  - type: text
    content: 'For I consider [from the standpoint of faith] that the sufferings of the present life are not worthy to be compared with the glory that is about to be revealed to us '
  - type: text
    content: and
  - type: text
    content: ' in us! '
  '19':
  - type: text
    content: 'For [even the whole] creation [all nature] waits eagerly for the children of God to be revealed. '
  '2':
  - type: text
    content: 'For the law of the Spirit of life [which is] in Christ Jesus [the law of our new being] has set you free from the law of sin and of death. '
  '20':
  - type: text
    content: 'For the creation was subjected to frustration '
  - type: text
    content: and
  - type: text
    content: ' futility, not willingly [because of some intentional fault on its part], but by the will of Him who subjected it, in hope [Eccl 1:2] '
  '21':
  - type: text
    content: 'that the creation itself will also be freed from its bondage to decay [and gain entrance] into the glorious freedom of the children of God. '
  '22':
  - type: text
    content: 'For we know that the whole creation has been moaning together as in the pains of childbirth until now. [Jer 12:4, 11] '
  '23':
  - type: text
    content: 'And not only this, but we too, who have the first fruits of the Spirit [a joyful indication of the blessings to come], even we groan inwardly, as we wait eagerly for [the sign of] our adoption as sons—the redemption '
  - type: text
    content: and
  - type: text
    content: ' transformation of our body [at the resurrection]. [2 Cor 5:2, 4; Eph 4:30] '
  '24':
  - type: text
    content: 'For in this hope we were saved [by faith]. But hope [the object of] which is seen is not hope. For who hopes for what he already sees? '
  '25':
  - type: text
    content: 'But if we hope for what we do not see, we wait eagerly for it with patience '
  - type: text
    content: and
  - type: text
    content: ' composure.'
  - type: heading
    content: Our Victory in Christ
  '26':
  - type: text
    content: 'In the same way the Spirit [comes to us and] helps us in our weakness. We do not know what prayer to offer '
  - type: text
    content: or
  - type: text
    content: ' how to offer it as we should, but the Spirit Himself [knows our need and at the right time] intercedes on our behalf with sighs '
  - type: text
    content: and
  - type: text
    content: ' groanings too deep for words. '
  '27':
  - type: text
    content: 'And He who searches the hearts knows what the mind of the Spirit is, because the Spirit intercedes [before God] on behalf of '
  - type: note
    content: Lit the saints.
  - type: text
    content: God’s people in accordance with God’s will. [Ps 139:1, 2]
  '28':
  - type: text
    content: 'And we know [with great confidence] that God [who is deeply concerned about us] causes all things to work together [as a plan] for good for those who love God, to those who are called according to His plan '
  - type: text
    content: and
  - type: text
    content: ' purpose. '
  '29':
  - type: text
    content: 'For those whom He foreknew [and loved and chose beforehand], He also predestined to be conformed to the image of His Son [and ultimately share in His complete sanctification], so that He would be the firstborn [the most beloved and honored] among many believers. '
  '3':
  - type: text
    content: 'For what the Law could not do [that is, overcome sin and remove its penalty, its power] being weakened by the flesh [man’s nature without the Holy Spirit], God did: He sent His own Son in the likeness of sinful man as an offering for sin. And He condemned sin in the flesh [subdued it and overcame it in the person of His own Son], [Lev 7:37] '
  '30':
  - type: text
    content: And those whom He predestined, He also called; and those whom He called, He also justified [declared free of the guilt of sin]; and those whom He justified, He also glorified [raising them to a heavenly dignity].
  '31':
  - type: text
    content: 'What then shall we say to all these things? If God is for us, who can be [successful] against us? [Ps 118:6] '
  '32':
  - type: text
    content: 'He who did not spare [even] His own Son, but gave Him up for us all, how will He not also, along with Him, graciously give us all things? '
  '33':
  - type: text
    content: 'Who will bring any charge against God’s elect (His chosen ones)? It is God who justifies us [declaring us blameless and putting us in a right relationship with Himself]. '
  '34':
  - type: text
    content: 'Who is the one who condemns us? Christ Jesus is the One who died [to pay our penalty], and more '
  - type: text
    content: than that,
  - type: text
    content: ' who was raised [from the dead], and who is at the right hand of God interceding [with the Father] for us. '
  '35':
  - type: text
    content: 'Who shall ever separate us from the love of '
  - type: note
    content: Two early mss read God.
  - type: text
    content: 'Christ? Will tribulation, or distress, or persecution, or famine, or nakedness, or danger, or sword? '
  '36':
  - type: text
    content: 'Just as it is written '
  - type: text
    content: and
  - type: text
    content: ' forever remains written,'
  - type: text
    content: “F
  - type: heading
