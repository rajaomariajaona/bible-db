  - type: text
    content: .” [Ps 44:22]
  '37':
  - type: text
    content: 'Yet in all these things we are more than conquerors '
  - type: text
    content: and
  - type: text
    content: ' gain an overwhelming victory through Him who loved us [so much that He died for us]. '
  '38':
  - type: text
    content: 'For I am convinced [and continue to be convinced—beyond any doubt] that neither death, nor life, nor angels, nor principalities, nor things present '
  - type: text
    content: and
  - type: text
    content: ' threatening, nor things to come, nor powers, '
  '39':
  - type: text
    content: nor height, nor depth, nor any other created thing, will be able to separate us from the [unlimited] love of God, which is in Christ Jesus our Lord.
  '4':
  - type: text
    content: 'so that the [righteous and just] requirement of the Law might be fulfilled in us who do not live our lives in the ways of the flesh [guided by worldliness and our sinful nature], but [live our lives] in the ways of the Spirit [guided by His power]. '
  '5':
  - type: text
    content: 'For those who are '
  - type: text
    content: living
  - type: text
    content: ' according to the flesh set their minds on the things of the flesh [which gratify the body], but those who are '
  - type: text
    content: living
  - type: text
    content: ' according to the Spirit, [set their minds on] the things of the Spirit [His will and purpose]. '
  '6':
  - type: text
    content: 'Now the mind of the flesh is death [both now and forever—because it pursues sin]; but the mind of the Spirit is life and peace [the spiritual well-being that comes from walking with God—both now and forever]; '
  '7':
  - type: text
    content: 'the mind of the flesh [with its sinful pursuits] is actively hostile to God. It does not submit itself to God’s law, since it cannot, '
  '8':
  - type: text
    content: and those who are in the flesh [living a life that caters to sinful appetites and impulses] cannot please God.
  '9':
  - type: text
    content: 'However, you are not [living] in the flesh [controlled by the sinful nature] but in the Spirit, if in fact the Spirit of God lives in you [directing and guiding you]. But if anyone does not have the Spirit of Christ, he does not belong to Him [and is not a child of God]. [Rom 8:14] '
