document_id: 1SA.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rescue from the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the men of Kiriath-jearim came and took up the ark of the Lord and brought it into the house of Abinadab on the hill, and they consecrated Eleazar his son to care for the ark of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And from that day the ark remained in Kiriath-jearim for a very long time, for it was twenty years [until the reign of King David]; and all the house of Israel lamented (wailed) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grieved after the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [2 Sam 6:3, 4; 1 Chr 13:5-7]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Samuel said to all the house of Israel, “If you are returning to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with all your heart, remove the foreign gods and the Ashtaroth (pagan goddesses) from among you and direct your hearts to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and serve Him only; and He will rescue you from the hand of the Philistines.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So the Israelites removed the Baals and the Ashtaroth and served the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' alone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Samuel said, “Gather all Israel together at Mizpah and I will pray to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for you.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So they gathered at Mizpah, and drew water and poured it out before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and fasted on that day and said there, “We have sinned against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” And Samuel judged the Israelites at Mizpah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when the Philistines heard that the Israelites had gathered at Mizpah, the lords (governors) of the Philistines went up against Israel. And when the Israelites heard it, they were afraid of the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the sons of Israel said to Samuel, “Do not cease to cry out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God for us, so that He may save us from the hand of the Philistines.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Samuel took a nursing lamb and offered it as a whole burnt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and Samuel cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for Israel and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As Samuel was offering up the burnt offering, the Philistines approached for the battle against Israel. Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' thundered with a great voice that day against the Philistines and threw them into confusion, and they were defeated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fled before Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the men of Israel came out of Mizpah and pursued the Philistines, and struck them down as far as [the territory] below Beth-car.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Samuel took a stone and set it between Mizpah and Shen, and he named it Ebenezer (stone of help), saying, “Thus far the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has helped us.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So the Philistines were subdued and they did not come anymore into Israelite territory. And the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was against the Philistines all the days of Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The cities which the Philistines had taken from Israel were restored to Israel, from Ekron to Gath; and Israel recovered the cities’ territory from the Philistines. Also there was peace between Israel and the Amorites.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Samuel’s Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now Samuel judged Israel all the days of his life. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He used to go annually on a circuit to Bethel, Gilgal, and Mizpah, and he judged Israel in all these places. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then he would return to Ramah, because his home was there; and there he judged Israel, and there he built an altar to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
