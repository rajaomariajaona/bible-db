document_id: 1SA.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Rescue from the Philistines
  - type: text
    content: 'So the men of Kiriath-jearim came and took up the ark of the Lord and brought it into the house of Abinadab on the hill, and they consecrated Eleazar his son to care for the ark of the Lord. '
  '10':
  - type: text
    content: As Samuel was offering up the burnt offering, the Philistines approached for the battle against Israel. Then the L
  - type: heading
    content: ord
  - type: text
    content: ' thundered with a great voice that day against the Philistines and threw them into confusion, and they were defeated '
  - type: text
    content: and
  - type: text
    content: ' fled before Israel. '
  '11':
  - type: text
    content: And the men of Israel came out of Mizpah and pursued the Philistines, and struck them down as far as [the territory] below Beth-car.
  '12':
  - type: text
    content: Then Samuel took a stone and set it between Mizpah and Shen, and he named it Ebenezer (stone of help), saying, “Thus far the L
  - type: heading
    content: ord
  - type: text
    content: ' has helped us.” '
  '13':
  - type: text
    content: So the Philistines were subdued and they did not come anymore into Israelite territory. And the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was against the Philistines all the days of Samuel. '
  '14':
  - type: text
    content: The cities which the Philistines had taken from Israel were restored to Israel, from Ekron to Gath; and Israel recovered the cities’ territory from the Philistines. Also there was peace between Israel and the Amorites.
  - type: heading
    content: Samuel’s Ministry
  '15':
  - type: text
    content: 'Now Samuel judged Israel all the days of his life. '
  '16':
  - type: text
    content: 'He used to go annually on a circuit to Bethel, Gilgal, and Mizpah, and he judged Israel in all these places. '
  '17':
  - type: text
    content: Then he would return to Ramah, because his home was there; and there he judged Israel, and there he built an altar to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '2':
  - type: text
    content: 'And from that day the ark remained in Kiriath-jearim for a very long time, for it was twenty years [until the reign of King David]; and all the house of Israel lamented (wailed) '
  - type: text
    content: and
  - type: text
    content: ' grieved after the L'
  - type: heading
    content: ord
  - type: text
    content: . [2 Sam 6:3, 4; 1 Chr 13:5-7]
  '3':
  - type: text
    content: Then Samuel said to all the house of Israel, “If you are returning to the L
  - type: heading
    content: ord
  - type: text
    content: ' with all your heart, remove the foreign gods and the Ashtaroth (pagan goddesses) from among you and direct your hearts to the L'
  - type: heading
    content: ord
  - type: text
    content: ' and serve Him only; and He will rescue you from the hand of the Philistines.” '
  '4':
  - type: text
    content: So the Israelites removed the Baals and the Ashtaroth and served the L
  - type: heading
    content: ord
  - type: text
    content: ' alone.'
  '5':
  - type: text
    content: Samuel said, “Gather all Israel together at Mizpah and I will pray to the L
  - type: heading
    content: ord
  - type: text
    content: ' for you.” '
  '6':
  - type: text
    content: So they gathered at Mizpah, and drew water and poured it out before the L
  - type: heading
    content: ord
  - type: text
    content: ', and fasted on that day and said there, “We have sinned against the L'
  - type: heading
    content: ord
  - type: text
    content: .” And Samuel judged the Israelites at Mizpah.
  '7':
  - type: text
    content: 'Now when the Philistines heard that the Israelites had gathered at Mizpah, the lords (governors) of the Philistines went up against Israel. And when the Israelites heard it, they were afraid of the Philistines. '
  '8':
  - type: text
    content: And the sons of Israel said to Samuel, “Do not cease to cry out to the L
  - type: heading
    content: ord
  - type: text
    content: ' our God for us, so that He may save us from the hand of the Philistines.” '
  '9':
  - type: text
    content: So Samuel took a nursing lamb and offered it as a whole burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ; and Samuel cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' for Israel and the L'
  - type: heading
    content: ord
  - type: text
    content: ' answered him. '
