  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Leah conceived and gave birth to a son and named him Reuben (See, a son!), for she said, “Because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has seen my humiliation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffering; now my husband will love me [since I have given him a son].” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then she conceived again and gave birth to a son and said, “Because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard that I am unloved, He has given me this son also.” So she named him Simeon (God hears). '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'She conceived again and gave birth to a son and said, “Now this time my husband will become attached to me [as a companion], for I have given him three sons.” Therefore he was named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The exact meaning is uncertain, perhaps '
      - type: usfm
        marker: it
        children:
        - type: text
          text: companion
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: attached
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: joined
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Again she conceived and gave birth to a [fourth] son, and she said, “Now I will praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” So she named him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:35 '
    - type: usfm
