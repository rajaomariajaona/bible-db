    marker-yv: yv-n
  - type: text
    text: 'went on his way and came to the land of the people of the East [near Haran]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As he looked, he saw a well in the field, and three flocks of sheep lying there [resting] beside it because the flocks were watered from that well. Now the stone on the mouth of the well [that covered and protected it] was large, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and when all the flocks were gathered there, the shepherds would roll the stone from the mouth of the well, water the sheep, and [afterward] replace the stone on the mouth of the well.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jacob said to them, “My brothers, where are you from?” And they said, “We are from Haran.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So he said to them, “Do you know Laban the grandson of Nahor [Abraham’s brother]?” And they replied, “We know him.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And he asked them, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Is peace
      - type: text
        text: ' (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shalom) to him?
    marker-yv: yv-n
  - type: text
    text: 'Is it well with him?” And they said, “He is doing well; look, here comes his daughter Rachel with the sheep!” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jacob said, “Look, the sun is still high [overhead]; it is a long time before the flocks need to be gathered [in their folds for the night]. Water the sheep, and go, and return them to their pasture.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But they said, “We cannot [leave] until all the flocks are gathered together, and the shepherds roll the stone from the mouth of the well; then we will water the sheep.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'While he was still speaking with them, Rachel came with her father’s sheep, for she was a shepherdess. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Jacob saw [his cousin] Rachel, the daughter of Laban, his mother’s brother, and Laban’s sheep, he came up and rolled the stone away from the mouth of the well and watered the flock of Laban, his uncle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Jacob kissed Rachel [in greeting], and he raised his voice and wept. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jacob told Rachel he was her father’s relative, Rebekah’s son; and she ran and told her father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Laban heard of the arrival of Jacob, his sister’s son, he ran to meet him, and embraced and kissed him and brought him to his house. Then he told Laban all these things. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Laban said to him, “You are my bone and my flesh.” And Jacob stayed with him a month.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Laban said to Jacob, “Just because you are my relative, should you work for me for nothing? Tell me, what should your wages be?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now Laban had two daughters; the name of the older was Leah, and the name of the younger was Rachel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Leah’s eyes were weak, but Rachel was beautiful in form and appearance. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jacob loved Rachel, so he said, “I will serve you [as a hired workman] for seven years [in return] for [the privilege of marrying] Rachel your younger daughter.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Laban said, “It is better that I give her [in marriage] to you than give her to another man. Stay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' work with me.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Jacob served [Laban] for seven years for [the right to marry] Rachel, but they seemed like only a few days to him because of his love for her.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Laban’s Treachery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Finally, Jacob said to Laban, “Give me my wife, for my time [of service] is completed, so that I may take her to me [as my wife].” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Laban gathered together all the men of the place and prepared a [wedding] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The wedding feast was usually a lavish event lasting seven days. A wide variety of food was served along with wine, which was sometimes fortified with spices.
    marker-yv: yv-n
  - type: text
    text: 'feast [with wine]. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But in the evening he took Leah his daughter and brought her to Jacob, and Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Laban must have made sure that Jacob was thoroughly intoxicated before he attempted to switch the daughters.
    marker-yv: yv-n
  - type: text
    text: 'went in to [consummate the marriage with] her. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Laban also gave Zilpah his maid to his daughter Leah as a maid. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But in the morning [when Jacob awoke], it was Leah [who was with him]! And he said to Laban, “What is this that you have done to me? Did I not work for you [for seven years] for Rachel? Why have you deceived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' betrayed me [like this]?” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Laban only said, “It is not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: done this way in
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the tradition here to give the younger [daughter in marriage] before the older. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Finish the week [of the wedding feast] for Leah; then we will give you Rachel also, and in return you shall work for me for seven more years.” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Jacob complied and fulfilled Leah’s week [of celebration]; then Laban gave him his daughter Rachel as his [second] wife. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Laban also gave Bilhah his maid to his daughter Rachel as a maid. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Jacob consummated his marriage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lived with Rachel [as his wife], and he loved Rachel more than Leah, and he served with Laban for another seven years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Now when the L
