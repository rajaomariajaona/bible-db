    children:
    - type: text
      text: ord
  - type: text
    text: ' saw that Leah was unloved, He '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:31 '
    - type: usfm
