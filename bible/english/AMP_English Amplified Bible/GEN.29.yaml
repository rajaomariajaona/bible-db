type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Meets Rachel
  - type: text
    content: 'Then Jacob '
  - type: note
    content: Lit raised his feet.
  - type: text
    content: 'went on his way and came to the land of the people of the East [near Haran]. '
  '10':
  - type: text
    content: 'When Jacob saw [his cousin] Rachel, the daughter of Laban, his mother’s brother, and Laban’s sheep, he came up and rolled the stone away from the mouth of the well and watered the flock of Laban, his uncle. '
  '11':
  - type: text
    content: 'Then Jacob kissed Rachel [in greeting], and he raised his voice and wept. '
  '12':
  - type: text
    content: Jacob told Rachel he was her father’s relative, Rebekah’s son; and she ran and told her father.
  '13':
  - type: text
    content: 'When Laban heard of the arrival of Jacob, his sister’s son, he ran to meet him, and embraced and kissed him and brought him to his house. Then he told Laban all these things. '
  '14':
  - type: text
    content: Then Laban said to him, “You are my bone and my flesh.” And Jacob stayed with him a month.
  '15':
  - type: text
    content: 'Then Laban said to Jacob, “Just because you are my relative, should you work for me for nothing? Tell me, what should your wages be?” '
  '16':
  - type: text
    content: 'Now Laban had two daughters; the name of the older was Leah, and the name of the younger was Rachel. '
  '17':
  - type: text
    content: 'Leah’s eyes were weak, but Rachel was beautiful in form and appearance. '
  '18':
  - type: text
    content: 'Jacob loved Rachel, so he said, “I will serve you [as a hired workman] for seven years [in return] for [the privilege of marrying] Rachel your younger daughter.” '
  '19':
  - type: text
    content: 'Laban said, “It is better that I give her [in marriage] to you than give her to another man. Stay '
  - type: text
    content: and
  - type: text
    content: ' work with me.” '
  '2':
  - type: text
    content: 'As he looked, he saw a well in the field, and three flocks of sheep lying there [resting] beside it because the flocks were watered from that well. Now the stone on the mouth of the well [that covered and protected it] was large, '
  '20':
  - type: text
    content: So Jacob served [Laban] for seven years for [the right to marry] Rachel, but they seemed like only a few days to him because of his love for her.
  - type: heading
    content: Laban’s Treachery
  '21':
  - type: text
    content: 'Finally, Jacob said to Laban, “Give me my wife, for my time [of service] is completed, so that I may take her to me [as my wife].” '
  '22':
  - type: text
    content: 'So Laban gathered together all the men of the place and prepared a [wedding] '
  - type: note
    content: The wedding feast was usually a lavish event lasting seven days. A wide variety of food was served along with wine, which was sometimes fortified with spices.
  - type: text
    content: 'feast [with wine]. '
  '23':
  - type: text
    content: 'But in the evening he took Leah his daughter and brought her to Jacob, and Jacob '
  - type: note
    content: Laban must have made sure that Jacob was thoroughly intoxicated before he attempted to switch the daughters.
  - type: text
    content: 'went in to [consummate the marriage with] her. '
  '24':
  - type: text
    content: 'Laban also gave Zilpah his maid to his daughter Leah as a maid. '
  '25':
  - type: text
    content: 'But in the morning [when Jacob awoke], it was Leah [who was with him]! And he said to Laban, “What is this that you have done to me? Did I not work for you [for seven years] for Rachel? Why have you deceived '
  - type: text
    content: and
  - type: text
    content: ' betrayed me [like this]?” '
  '26':
  - type: text
    content: 'But Laban only said, “It is not '
  - type: note
    content: Lit done this way in.
  - type: text
    content: 'the tradition here to give the younger [daughter in marriage] before the older. '
  '27':
  - type: text
    content: 'Finish the week [of the wedding feast] for Leah; then we will give you Rachel also, and in return you shall work for me for seven more years.” '
  '28':
  - type: text
    content: 'So Jacob complied and fulfilled Leah’s week [of celebration]; then Laban gave him his daughter Rachel as his [second] wife. '
  '29':
  - type: text
    content: 'Laban also gave Bilhah his maid to his daughter Rachel as a maid. '
  '3':
  - type: text
    content: and when all the flocks were gathered there, the shepherds would roll the stone from the mouth of the well, water the sheep, and [afterward] replace the stone on the mouth of the well.
  '30':
  - type: text
    content: 'So Jacob consummated his marriage '
  - type: text
    content: and
  - type: text
    content: ' lived with Rachel [as his wife], and he loved Rachel more than Leah, and he served with Laban for another seven years.'
  '31':
  - type: text
    content: Now when the L
  - type: heading
    content: ord
  - type: text
    content: ' saw that Leah was unloved, He '
  - type: note
    content: Lit opened her womb.
  - type: text
    content: 'made her able to bear children, but Rachel was barren. '
  '32':
  - type: text
    content: Leah conceived and gave birth to a son and named him Reuben (See, a son!), for she said, “Because the L
  - type: heading
    content: ord
  - type: text
    content: ' has seen my humiliation '
  - type: text
    content: and
  - type: text
    content: ' suffering; now my husband will love me [since I have given him a son].” '
  '33':
  - type: text
    content: Then she conceived again and gave birth to a son and said, “Because the L
  - type: heading
    content: ord
  - type: text
    content: ' heard that I am unloved, He has given me this son also.” So she named him Simeon (God hears). '
  '34':
  - type: text
    content: 'She conceived again and gave birth to a son and said, “Now this time my husband will become attached to me [as a companion], for I have given him three sons.” Therefore he was named '
  - type: note
    content: The exact meaning is uncertain, perhaps companion or attached or joined.
  - type: text
    content: 'Levi. '
  '35':
  - type: text
    content: Again she conceived and gave birth to a [fourth] son, and she said, “Now I will praise the L
  - type: heading
    content: ord
  - type: text
    content: '.” So she named him '
  - type: note
    content: Possibly an abbreviation of “Praise YHWH.”
  - type: text
    content: Judah; then [for a time] she stopped bearing [children].
  '4':
  - type: text
    content: 'Jacob said to them, “My brothers, where are you from?” And they said, “We are from Haran.” '
  '5':
  - type: text
    content: 'So he said to them, “Do you know Laban the grandson of Nahor [Abraham’s brother]?” And they replied, “We know him.” '
  '6':
  - type: text
    content: And he asked them, “
  - type: note
    content: Lit Is peace (Heb shalom) to him?
  - type: text
    content: 'Is it well with him?” And they said, “He is doing well; look, here comes his daughter Rachel with the sheep!” '
  '7':
  - type: text
    content: 'Jacob said, “Look, the sun is still high [overhead]; it is a long time before the flocks need to be gathered [in their folds for the night]. Water the sheep, and go, and return them to their pasture.” '
  '8':
  - type: text
    content: But they said, “We cannot [leave] until all the flocks are gathered together, and the shepherds roll the stone from the mouth of the well; then we will water the sheep.”
  '9':
  - type: text
    content: 'While he was still speaking with them, Rachel came with her father’s sheep, for she was a shepherdess. '
