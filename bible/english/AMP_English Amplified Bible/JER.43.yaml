document_id: JER.43,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: In Egypt Jeremiah Warns of Judgment
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now it happened when Jeremiah, whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God had sent, had finished telling all the people all the words of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God—that is, all these words— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and say to them, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Behold, I am going to send and get '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 21:2.
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar the king of Babylon, My servant, and I am going to set his throne over these stones that I have hidden; and his [majestic, royal] canopy will be spread over them. [Ezek 29:19, 20] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He will also come and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nebuchadnezzar invaded Egypt in 568-567 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . during the reign of Pharaoh Amasis.
      marker-yv: yv-n
    - type: text
      text: 'strike the land of Egypt, giving those who are [destined] for death, to death, and those who are [destined] for captivity, to captivity, and those who are [destined] for the sword, to the sword. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And [through him] I will set fire to the temples of the gods of Egypt, and he will burn them and take them (Egyptian idols) captive. He will wrap himself with the land of Egypt as a shepherd wraps himself with his garment, and he will go away from there safely. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nebuchadnezzar will also break the images '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shatter the obelisks of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Beth-shemesh;
        - type: text
          text: ' i.e. the house of the sun-god. The site was famous for its tall (70’) “sacred” pillars.'
      marker-yv: yv-n
    - type: text
      text: Heliopolis in the land of Egypt; and he will burn down the temples of the gods of Egypt.” ’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Azariah the son of Hoshaiah and Johanan the son of Kareah and all the proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolent men said to Jeremiah, “You are not telling the truth! The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God has not sent you to say, ‘Do not go into Egypt to live there.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But Baruch the son of Neriah is inciting you against us to hand us over to the Chaldeans, so they may [either] put us to death or exile us to Babylon.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Johanan the son of Kareah and all the commanders of the forces and all the people disobeyed the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [which told them] to stay in the land of Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But Johanan the son of Kareah and all the commanders of the forces took all the remnant of Judah who had returned to live in the land of Judah from all the nations to which they had been driven— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'the men, women, and children, the king’s daughters (ladies of the court), and every person whom Nebuzaradan the captain of the bodyguard had left with Gedaliah the son of Ahikam, the son of Shaphan; he also took Jeremiah the prophet and Baruch the son of Neriah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So they entered the land of Egypt (for they did not obey the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ') and they went in as far as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 2:16.
      marker-yv: yv-n
    - type: text
      text: Tahpanhes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then came the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Jeremiah in Tahpanhes, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Take some large stones in your hands and hide them in the mortar in the brickwork [of the terrace] which is at the entrance of Pharaoh’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A secondary palace.
      marker-yv: yv-n
    - type: text
      text: 'house in Tahpanhes, in the sight of some of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men of
    - type: text
      text: ' Judah; '
