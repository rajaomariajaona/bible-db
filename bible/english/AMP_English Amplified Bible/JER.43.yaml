document_id: JER.43,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: In Egypt Jeremiah Warns of Judgment
  - type: text
    content: Now it happened when Jeremiah, whom the L
  - type: heading
    content: ord
  - type: text
    content: ' their God had sent, had finished telling all the people all the words of the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God—that is, all these words— '
  '10':
  - type: text
    content: and say to them, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Behold, I am going to send and get '
  - type: note
    content: See note 21:2.
  - type: text
    content: 'Nebuchadnezzar the king of Babylon, My servant, and I am going to set his throne over these stones that I have hidden; and his [majestic, royal] canopy will be spread over them. [Ezek 29:19, 20] '
  '11':
  - type: text
    content: 'He will also come and '
  - type: note
    content: Nebuchadnezzar invaded Egypt in 568-567 b.c. during the reign of Pharaoh Amasis.
  - type: text
    content: 'strike the land of Egypt, giving those who are [destined] for death, to death, and those who are [destined] for captivity, to captivity, and those who are [destined] for the sword, to the sword. '
  '12':
  - type: text
    content: 'And [through him] I will set fire to the temples of the gods of Egypt, and he will burn them and take them (Egyptian idols) captive. He will wrap himself with the land of Egypt as a shepherd wraps himself with his garment, and he will go away from there safely. '
  '13':
  - type: text
    content: 'Nebuchadnezzar will also break the images '
  - type: text
    content: and
  - type: text
    content: ' shatter the obelisks of '
  - type: note
    content: Heb Beth-shemesh; i.e. the house of the sun-god. The site was famous for its tall (70’) “sacred” pillars.
  - type: text
    content: Heliopolis in the land of Egypt; and he will burn down the temples of the gods of Egypt.” ’ ”
  '2':
  - type: text
    content: 'Azariah the son of Hoshaiah and Johanan the son of Kareah and all the proud '
  - type: text
    content: and
  - type: text
    content: ' insolent men said to Jeremiah, “You are not telling the truth! The L'
  - type: heading
    content: ord
  - type: text
    content: ' our God has not sent you to say, ‘Do not go into Egypt to live there.’ '
  '3':
  - type: text
    content: 'But Baruch the son of Neriah is inciting you against us to hand us over to the Chaldeans, so they may [either] put us to death or exile us to Babylon.” '
  '4':
  - type: text
    content: So Johanan the son of Kareah and all the commanders of the forces and all the people disobeyed the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' [which told them] to stay in the land of Judah. '
  '5':
  - type: text
    content: 'But Johanan the son of Kareah and all the commanders of the forces took all the remnant of Judah who had returned to live in the land of Judah from all the nations to which they had been driven— '
  '6':
  - type: text
    content: 'the men, women, and children, the king’s daughters (ladies of the court), and every person whom Nebuzaradan the captain of the bodyguard had left with Gedaliah the son of Ahikam, the son of Shaphan; he also took Jeremiah the prophet and Baruch the son of Neriah. '
  '7':
  - type: text
    content: So they entered the land of Egypt (for they did not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ') and they went in as far as '
  - type: note
    content: See note 2:16.
  - type: text
    content: Tahpanhes.
  '8':
  - type: text
    content: Then came the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Jeremiah in Tahpanhes, saying, '
  '9':
  - type: text
    content: '“Take some large stones in your hands and hide them in the mortar in the brickwork [of the terrace] which is at the entrance of Pharaoh’s '
  - type: note
    content: A secondary palace.
  - type: text
    content: 'house in Tahpanhes, in the sight of some of the '
  - type: text
    content: men of
  - type: text
    content: ' Judah; '
