document_id: ISA.40,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Greatness of God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Comfort, O comfort My people,” says your God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' will come with might,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His arm will rule for Him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Most certainly His reward is with Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His restitution accompanies Him. [Rev 22:7, 12]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will protect His flock like a shepherd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will gather the lambs in His arm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will carry them in His bosom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will gently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carefully lead those nursing their young.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Who has measured the waters in the hollow of His hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And marked off the heavens with a span [of the hand],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And calculated the dust of the earth with a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: third
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: measure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And weighed the mountains in a balance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the hills in a pair of scales?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has directed the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or has taught Him as His counselor? [Rom 11:34]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With whom did He consult and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' enlightened Him?'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Who
    - type: text
      text: ' taught Him the path of justice and taught Him knowledge'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And informed Him of the way of understanding?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In fact, the nations are like a drop from a bucket,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And are regarded as a speck of dust on the scales;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now look, He lifts up the islands like fine dust.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [the forests of] Lebanon cannot supply sufficient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fuel
    - type: text
      text: ' to start a fire,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor are its wild beasts enough for a burnt offering [worthy of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '].'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations are as nothing before Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are regarded by Him as less than nothing and meaningless.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶To whom then will you liken God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or with what likeness will you compare Him? [Acts 17:29]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: As for
    - type: text
      text: ' the cast image (idol), a metalworker casts it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A goldsmith overlays it with gold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a silversmith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: casts its
    - type: text
      text: ' silver chains.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Speak '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to the heart of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: tenderly to Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And call out to her, that her time of compulsory service in warfare is finished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That her wickedness has been taken away [since her punishment is sufficient],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That she has received from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' hand'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Double [punishment] for all her sins.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who is too impoverished for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such
    - type: text
      text: ' an offering [to give to his god]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chooses a tree that will not rot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He seeks out for himself a skillful craftsman
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To [carve and] set up an idol that will not totter.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Do you [who worship idols] not know? Have you not heard?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has it not been told to you from the beginning?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you not understood from the foundations of the earth [the omnipotence of God and the stupidity of bowing to idols]? [Rom 1:20, 21]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is He who sits above the circle of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its inhabitants are like grasshoppers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[It is He] who stretches out the heavens like a veil'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And spreads them out like a tent to dwell in.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is He who reduces dignitaries to nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who makes the judges (rulers) of the earth meaningless (useless).
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scarcely have they been planted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scarcely have they been sown,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scarcely has their stock taken root in the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He merely blows on them, and they wither,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a strong wind carries them away like stubble.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To whom then will you compare Me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I would be his equal?” says the Holy One.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your eyes on high
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And see who has created these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: heavenly bodies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The One who brings out their host by number,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He calls them all by name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the greatness of His might and the strength of His power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one is missing.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Why, O Jacob, do you say, and declare, O Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My way is hidden from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the justice due me escapes the notice of my God”?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you not know? Have you not heard?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Everlasting God, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the Creator of the ends of the earth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does not become tired or grow weary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no searching of His understanding.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives strength to the weary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to him who has no might He increases power. [2 Cor 12:9]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶A voice of one is calling out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Clear the way for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the wilderness [remove the obstacles];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make straight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' smooth in the desert a highway for our God. [Mark 1:3]'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even youths grow weary and tired,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And vigorous young men stumble badly,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who wait for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [who expect, look for, and hope in Him]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will gain new strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renew their power;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will lift up their wings [and rise up close to God] like eagles [rising toward the sun];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will run and not become weary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will walk and not grow tired. [Heb 12:1-3]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Every valley shall be raised,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every mountain and hill be made low;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the rough ground become a plain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rugged places a broad valley.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“And the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be revealed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all humanity shall see it together;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the mouth of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken it.” [Luke 3:5, 6]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A voice says, “Call out [prophesy].”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he answered, “What shall I call out?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[The voice answered:] All humanity is [as frail as] grass, and all that makes it attractive [its charm, its loveliness] is [momentary] like the flower of the field.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grass withers, the flower fades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the breath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' blows upon it;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Most certainly [all] the people are [like] grass.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grass withers, the flower fades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the word of our God stands forever. [James 1:10, 11; 1 Pet 1:24, 25]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O Zion, herald of good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get up on a high mountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem, herald of good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your voice with strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift it up, do not fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say to the cities of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here is your God!” [Acts 10:36; Rom 10:15]
