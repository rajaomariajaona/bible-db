document_id: JOB.42
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job’s Confession
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I know that You can do all things,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And that no thought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purpose of Yours can be restrained.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“[You said to me] ‘Who is this that darkens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obscures counsel [by words] without knowledge?’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore [I now see] I have [rashly] uttered that which I did not understand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Things too wonderful for me, which I did not know. [Job 38:2]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘Hear, please, and I will speak;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will ask You, and You instruct [and answer] me.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I had heard of You [only] by the hearing of the ear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now my [spiritual] eye sees You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Therefore I retract [my words and hate myself]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I repent in dust and ashes.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Displeased with Job’s Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It came about that after the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had spoken these words to Job, that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Eliphaz the Temanite, “My wrath is kindled against you and against your two friends, for you have not spoken of Me what is right, as My servant Job has. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now therefore, take for yourselves seven bulls and seven rams, and go to My servant Job, and offer up a burnt offering for yourselves, and My servant Job will pray for you. For I will accept him [and his prayer] so that I may not deal with you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according to your
  - type: text
    text: ' folly, because you have not spoken of Me the thing that is right, as My servant Job has.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Eliphaz the Temanite and Bildad the Shuhite and Zophar the Naamathite went and did as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' told them; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' accepted Job’s prayer.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Restores Job’s Fortunes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' restored the fortunes of Job when he prayed for his friends, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave Job twice as much as he had before. [Deut 30:1-3; Ps 126:1, 2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then all his brothers and sisters and all who had known him before came to him, and they ate bread with him in his house; and they consoled him and comforted him over all the [distressing] adversities that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had brought on him. And each one gave him a piece of money, and each a ring of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' blessed the latter days of Job more than his beginning; for he had 14,000 sheep, 6,000 camels, 1,000 yoke of oxen, and 1,000 female donkeys. [Job 1:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He had seven sons and three daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And he called the name of the first [daughter] Jemimah, and the name of the second Keziah, and the name of the third Keren-happuch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In all the land there were found no women so fair as the daughters of Job; and their father gave them an inheritance among their brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'After this, Job lived 140 years, and saw his sons and his grandsons, four generations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Job died, an old man and full of days. [James 5:11]
