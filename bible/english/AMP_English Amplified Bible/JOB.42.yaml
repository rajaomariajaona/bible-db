  '1':
  - type: heading
    content: Job’s Confession
  - type: text
    content: Then Job answered the L
  - type: heading
    content: ord
  - type: text
    content: ' and said,'
  '10':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' restored the fortunes of Job when he prayed for his friends, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave Job twice as much as he had before. [Deut 30:1-3; Ps 126:1, 2] '
  '11':
  - type: text
    content: Then all his brothers and sisters and all who had known him before came to him, and they ate bread with him in his house; and they consoled him and comforted him over all the [distressing] adversities that the L
  - type: heading
    content: ord
  - type: text
    content: ' had brought on him. And each one gave him a piece of money, and each a ring of gold. '
  '12':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' blessed the latter days of Job more than his beginning; for he had 14,000 sheep, 6,000 camels, 1,000 yoke of oxen, and 1,000 female donkeys. [Job 1:3] '
  '13':
  - type: text
    content: 'He had seven sons and three daughters. '
  '14':
  - type: text
    content: 'And he called the name of the first [daughter] Jemimah, and the name of the second Keziah, and the name of the third Keren-happuch. '
  '15':
  - type: text
    content: 'In all the land there were found no women so fair as the daughters of Job; and their father gave them an inheritance among their brothers. '
  '16':
  - type: text
    content: 'After this, Job lived 140 years, and saw his sons and his grandsons, four generations. '
  '17':
  - type: text
    content: So Job died, an old man and full of days. [James 5:11]
  '2':
  - type: text
    content: “I know that You can do all things,
  - type: text
    content: 'And that no thought '
  - type: text
    content: or
  - type: text
    content: ' purpose of Yours can be restrained.'
  '3':
  - type: text
    content: '“[You said to me] ‘Who is this that darkens '
  - type: text
    content: and
  - type: text
    content: ' obscures counsel [by words] without knowledge?’'
  - type: text
    content: Therefore [I now see] I have [rashly] uttered that which I did not understand,
  - type: text
    content: Things too wonderful for me, which I did not know. [Job 38:2]
  '4':
  - type: text
    content: ‘Hear, please, and I will speak;
  - type: text
    content: I will ask You, and You instruct [and answer] me.’
  '5':
  - type: text
    content: “I had heard of You [only] by the hearing of the ear,
  - type: text
    content: But now my [spiritual] eye sees You.
  '6':
  - type: text
    content: “Therefore I retract [my words and hate myself]
  - type: text
    content: And I repent in dust and ashes.”
  - type: heading
    content: God Displeased with Job’s Friends
  '7':
  - type: text
    content: It came about that after the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken these words to Job, that the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to Eliphaz the Temanite, “My wrath is kindled against you and against your two friends, for you have not spoken of Me what is right, as My servant Job has. '
  '8':
  - type: text
    content: 'Now therefore, take for yourselves seven bulls and seven rams, and go to My servant Job, and offer up a burnt offering for yourselves, and My servant Job will pray for you. For I will accept him [and his prayer] so that I may not deal with you '
  - type: text
    content: according to your
  - type: text
    content: ' folly, because you have not spoken of Me the thing that is right, as My servant Job has.” '
  '9':
  - type: text
    content: So Eliphaz the Temanite and Bildad the Shuhite and Zophar the Naamathite went and did as the L
  - type: heading
    content: ord
  - type: text
    content: ' told them; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' accepted Job’s prayer.'
  - type: heading
    content: God Restores Job’s Fortunes
