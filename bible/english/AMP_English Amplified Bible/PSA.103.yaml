  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise for the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Mercies.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affectionately praise the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O my soul,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all that is [deep] within me, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bless
  - type: text
    text: ' His holy name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affectionately praise the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O my soul,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not forget any of His benefits;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Who forgives all your sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who heals all your diseases;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who redeems your life from the pit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who crowns you [lavishly] with lovingkindness and tender mercy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who satisfies your years with good things,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that your youth is renewed like the [soaring] eagle. [Is 40:31]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' executes righteousness'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And justice for all the oppressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He made known His ways [of righteousness and justice] to Moses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His acts to the children of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is merciful and gracious,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Slow to anger and abounding in compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness. [James 5:11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He will not always strive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor will He keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His anger
  - type: text
    text: ' forever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He has not dealt with us according to our sins [as we deserve],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor rewarded us [with punishment] according to our wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For as the heavens are high above the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So great is His lovingkindness toward those who fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him [with awe-filled respect and deepest reverence].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: As far as the east is from the west,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So far has He removed our transgressions from us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Just as a father loves his children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' loves those who fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him [with awe-filled respect and deepest reverence].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For He knows our [mortal] frame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He remembers that we are [merely] dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶As for man, his days are like grass;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a flower of the field, so he flourishes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the wind passes over it and it is no more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its place knows it no longer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But the lovingkindness of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is from everlasting to everlasting on those who [reverently] fear Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His righteousness to children’s children, [Deut 10:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'To those who honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep His covenant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And remember to do His commandments [imprinting His word on their hearts].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has established His throne in the heavens,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His sovereignty rules over all [the universe].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you His angels,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You mighty ones who do His commandments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Obeying the voice of His word!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all you His hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who serve Him and do His will.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all you works of His, in all places of His dominion;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' affectionately praise the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O my soul!'
