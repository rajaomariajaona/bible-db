document_id: PSA.103,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 103
  - type: heading
    content: Praise for the Lord’s Mercies.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: 'Bless '
  - type: text
    content: and
  - type: text
    content: ' affectionately praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', O my soul,'
  - type: text
    content: 'And all that is [deep] within me, '
  - type: text
    content: bless
  - type: text
    content: ' His holy name.'
  '10':
  - type: text
    content: He has not dealt with us according to our sins [as we deserve],
  - type: text
    content: Nor rewarded us [with punishment] according to our wickedness.
  '11':
  - type: text
    content: For as the heavens are high above the earth,
  - type: text
    content: 'So great is His lovingkindness toward those who fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with awe-filled respect and deepest reverence].'
  '12':
  - type: text
    content: As far as the east is from the west,
  - type: text
    content: So far has He removed our transgressions from us.
  '13':
  - type: text
    content: Just as a father loves his children,
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' loves those who fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with awe-filled respect and deepest reverence].'
  '14':
  - type: text
    content: For He knows our [mortal] frame;
  - type: text
    content: He remembers that we are [merely] dust.
  '15':
  - type: text
    content: ¶As for man, his days are like grass;
  - type: text
    content: Like a flower of the field, so he flourishes.
  '16':
  - type: text
    content: For the wind passes over it and it is no more,
  - type: text
    content: And its place knows it no longer.
  '17':
  - type: text
    content: But the lovingkindness of the L
  - type: heading
    content: ord
  - type: text
    content: ' is from everlasting to everlasting on those who [reverently] fear Him,'
  - type: text
    content: And His righteousness to children’s children, [Deut 10:12]
  '18':
  - type: text
    content: 'To those who honor '
  - type: text
    content: and
  - type: text
    content: ' keep His covenant,'
  - type: text
    content: And remember to do His commandments [imprinting His word on their hearts].
  '19':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' has established His throne in the heavens,'
  - type: text
    content: And His sovereignty rules over all [the universe].
  '2':
  - type: text
    content: 'Bless '
  - type: text
    content: and
  - type: text
    content: ' affectionately praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', O my soul,'
  - type: text
    content: And do not forget any of His benefits;
  '20':
  - type: text
    content: Bless the L
  - type: heading
    content: ord
  - type: text
    content: ', you His angels,'
  - type: text
    content: You mighty ones who do His commandments,
  - type: text
    content: Obeying the voice of His word!
  '21':
  - type: text
    content: Bless the L
  - type: heading
    content: ord
  - type: text
    content: ', all you His hosts,'
  - type: text
    content: You who serve Him and do His will.
  '22':
  - type: text
    content: Bless the L
  - type: heading
    content: ord
  - type: text
    content: ', all you works of His, in all places of His dominion;'
  - type: text
    content: 'Bless '
  - type: text
    content: and
  - type: text
    content: ' affectionately praise the L'
  - type: heading
    content: ord
  - type: text
    content: ', O my soul!'
  '3':
  - type: text
    content: Who forgives all your sins,
  - type: text
    content: Who heals all your diseases;
  '4':
  - type: text
    content: Who redeems your life from the pit,
  - type: text
    content: Who crowns you [lavishly] with lovingkindness and tender mercy;
  '5':
  - type: text
    content: Who satisfies your years with good things,
  - type: text
    content: So that your youth is renewed like the [soaring] eagle. [Is 40:31]
  '6':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' executes righteousness'
  - type: text
    content: And justice for all the oppressed.
  '7':
  - type: text
    content: He made known His ways [of righteousness and justice] to Moses,
  - type: text
    content: His acts to the children of Israel.
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is merciful and gracious,'
  - type: text
    content: 'Slow to anger and abounding in compassion '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness. [James 5:11]'
  '9':
  - type: text
    content: 'He will not always strive '
  - type: text
    content: with us,
  - type: text
    content: 'Nor will He keep '
  - type: text
    content: His anger
  - type: text
    content: ' forever.'
