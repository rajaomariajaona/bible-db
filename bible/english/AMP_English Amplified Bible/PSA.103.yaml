document_id: PSA.103,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 103
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise for the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ’
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: s
      - type: text
        text: ' Mercies.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all that is [deep] within me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bless
    - type: text
      text: ' His holy name.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has not dealt with us according to our sins [as we deserve],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor rewarded us [with punishment] according to our wickedness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For as the heavens are high above the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So great is His lovingkindness toward those who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him [with awe-filled respect and deepest reverence].'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As far as the east is from the west,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So far has He removed our transgressions from us.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as a father loves his children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' loves those who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him [with awe-filled respect and deepest reverence].'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He knows our [mortal] frame;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He remembers that we are [merely] dust.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶As for man, his days are like grass;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a flower of the field, so he flourishes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wind passes over it and it is no more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its place knows it no longer.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the lovingkindness of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is from everlasting to everlasting on those who [reverently] fear Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His righteousness to children’s children, [Deut 10:12]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To those who honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep His covenant,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remember to do His commandments [imprinting His word on their hearts].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has established His throne in the heavens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His sovereignty rules over all [the universe].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not forget any of His benefits;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you His angels,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You mighty ones who do His commandments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Obeying the voice of His word!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all you His hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who serve Him and do His will.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bless the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all you works of His, in all places of His dominion;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affectionately praise the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who forgives all your sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who heals all your diseases;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who redeems your life from the pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who crowns you [lavishly] with lovingkindness and tender mercy;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who satisfies your years with good things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that your youth is renewed like the [soaring] eagle. [Is 40:31]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' executes righteousness'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And justice for all the oppressed.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made known His ways [of righteousness and justice] to Moses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His acts to the children of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is merciful and gracious,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Slow to anger and abounding in compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness. [James 5:11]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will not always strive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor will He keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His anger
    - type: text
      text: ' forever.'
