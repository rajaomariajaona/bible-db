document_id: JER.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament over Zion
  - type: text
    content: Oh that my head were waters
  - type: text
    content: And my eyes a fountain of tears,
  - type: text
    content: That I might weep day and night
  - type: text
    content: For the slain of the daughter of my people!
  '10':
  - type: text
    content: ¶“I will take up a weeping and wailing for the mountains,
  - type: text
    content: And a [funeral] dirge for the pastures of the wilderness,
  - type: text
    content: 'Because they are burned up '
  - type: text
    content: and
  - type: text
    content: ' desolated so that no one passes through [them];'
  - type: text
    content: Nor can anyone hear the lowing of cattle.
  - type: text
    content: Both the birds of the air and the beasts have fled; they are gone.
  '11':
  - type: text
    content: “I will make Jerusalem a heap of ruins,
  - type: text
    content: 'A haunt '
  - type: text
    content: and
  - type: text
    content: ' dwelling place of jackals;'
  - type: text
    content: And I will make the cities of Judah a desolation, without inhabitant.”
  '12':
  - type: text
    content: Who is the wise man who may understand this [without any doubt]? To whom has the mouth of the L
  - type: heading
    content: ord
  - type: text
    content: ' spoken, so that he may declare it? Why is the land ruined, laid waste like a wilderness, so that no one passes through? '
  '13':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Because they have '
  - type: note
    content: Lit forsaken.
  - type: text
    content: 'turned away from My law which I set before them, and have not listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed My voice nor walked in accordance with it, '
  '14':
  - type: text
    content: 'but have walked stubbornly after their [own] heart and after the Baals, as their fathers taught them,” '
  '15':
  - type: text
    content: therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “behold, I will feed them, this people, with wormwood and give them bitter '
  - type: text
    content: and
  - type: text
    content: ' poisonous water to drink. '
  '16':
  - type: text
    content: I will [also] scatter them among nations that neither they nor their fathers have known, and I will send the sword after them until I have annihilated them.”
  '17':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “Consider and call for the mourning women to come;
  - type: text
    content: Send for the wailing women to come.
  '18':
  - type: text
    content: “Let them hurry and take up a wailing for us,
  - type: text
    content: That our eyes may shed tears
  - type: text
    content: And our eyelids flow with water.
  '19':
  - type: text
    content: '“For a sound of wailing is heard [coming] from Zion:'
  - type: text
    content: ‘How we are ruined!
  - type: text
    content: 'We are greatly perplexed '
  - type: text
    content: and
  - type: text
    content: ' utterly shamed,'
  - type: text
    content: Because we have left the land,
  - type: text
    content: Because they have torn down our dwellings.’ ”
  '2':
  - type: text
    content: Oh that I had in the wilderness
  - type: text
    content: A lodging place (a mere shelter) for wayfaring men,
  - type: text
    content: That I might leave my people
  - type: text
    content: And go away from them!
  - type: text
    content: For they are all adulterers [worshiping idols instead of the L
  - type: heading
    content: ord
  - type: text
    content: '],'
  - type: text
    content: '[They are] an assembly of treacherous men [of weak character, men without integrity].'
  '20':
  - type: text
    content: Now hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', O you women,'
  - type: text
    content: And let your ear hear the word of His mouth;
  - type: text
    content: Teach your daughters a song of mourning,
  - type: text
    content: And each one [teach] her neighbor a dirge.
  '21':
  - type: text
    content: For death has come up through our windows;
  - type: text
    content: It has entered our palaces,
  - type: text
    content: Cutting off the children from the streets
  - type: text
    content: And the young men from the town squares.
  '22':
  - type: text
    content: Speak, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘The dead bodies of men will fall like dung on the open field,
  - type: text
    content: And like sheaves [of grain] behind the reaper,
  - type: text
    content: And no one will gather them.’ ” [Jer 8:2]
  '23':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Let not the one who is wise '
  - type: text
    content: and
  - type: text
    content: ' skillful boast in his insight; let not the one who is mighty '
  - type: text
    content: and
  - type: text
    content: ' powerful boast in his strength; let not the one who is rich boast in his [temporal satisfactions and earthly] abundance; '
  '24':
  - type: text
    content: but let the one who boasts boast in this, that he understands and knows Me [and acknowledges Me and honors Me as God and recognizes without any doubt], that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who practices lovingkindness, justice and righteousness on the earth, for in these things I delight,” says the L'
  - type: heading
    content: ord
  - type: text
    content: . [1 Cor 1:31; 2 Cor 10:17]
  '25':
  - type: text
    content: “Behold, the days are coming,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “when I will punish all who are circumcised [physically] and yet uncircumcised [spiritually]— [Rom 2:25-29] '
  '26':
  - type: note
    content: All these nations are related to one another, except Egypt.
  - type: text
    content: Egypt and Judah, and Edom and the sons of Ammon, and Moab and all those who live in the desert who clip off the hair on their temples; for all these nations are uncircumcised (sinful, impure), and all the house of Israel are uncircumcised in heart.”
  '3':
  - type: text
    content: “They bend their tongue like their bow;
  - type: text
    content: '[Their] lies and not truth prevail '
  - type: text
    content: and
  - type: text
    content: ' grow strong in the land;'
  - type: text
    content: For they proceed from evil to evil,
  - type: text
    content: 'And they do not know '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' acknowledge Me,” says the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: “Let everyone beware of his neighbor
  - type: text
    content: And do not trust any brother.
  - type: text
    content: For every brother is a supplanter [like Jacob, a deceiver, ready to grab his brother’s heel],
  - type: text
    content: And every neighbor goes around as a slanderer. [Gen 25:26]
  '5':
  - type: text
    content: '“Everyone deceives '
  - type: text
    content: and
  - type: text
    content: ' mocks his neighbor'
  - type: text
    content: And does not speak the truth.
  - type: text
    content: They have taught their tongue to speak lies;
  - type: text
    content: 'They exhaust themselves with sin '
  - type: text
    content: and
  - type: text
    content: ' cruelty.'
  '6':
  - type: text
    content: “Your dwelling is in the midst of deceit [oppression upon oppression and deceit upon deceit];
  - type: text
    content: Through deceit they refuse to know (understand) Me,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “Behold, I will refine them [through suffering] and test them;
  - type: text
    content: For how else should I deal with the daughter of My people?
  '8':
  - type: text
    content: “Their tongue is a murderous arrow;
  - type: text
    content: It speaks deceit;
  - type: text
    content: With his mouth one speaks peace to his neighbor,
  - type: text
    content: 'But in his heart he lays traps '
  - type: text
    content: and
  - type: text
    content: ' waits in ambush for him.'
  '9':
  - type: text
    content: “Shall I not punish them for these things?” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: “Shall I not avenge Myself
  - type: text
    content: On such a nation as this?
