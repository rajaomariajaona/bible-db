document_id: JER.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Lament over Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oh that my head were waters
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my eyes a fountain of tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I might weep day and night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the slain of the daughter of my people!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶“I will take up a weeping and wailing for the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a [funeral] dirge for the pastures of the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they are burned up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desolated so that no one passes through [them];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor can anyone hear the lowing of cattle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both the birds of the air and the beasts have fled; they are gone.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “I will make Jerusalem a heap of ruins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A haunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dwelling place of jackals;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make the cities of Judah a desolation, without inhabitant.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Who is the wise man who may understand this [without any doubt]? To whom has the mouth of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoken, so that he may declare it? Why is the land ruined, laid waste like a wilderness, so that no one passes through? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Because they have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsaken
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'turned away from My law which I set before them, and have not listened to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obeyed My voice nor walked in accordance with it, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'but have walked stubbornly after their [own] heart and after the Baals, as their fathers taught them,” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “behold, I will feed them, this people, with wormwood and give them bitter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' poisonous water to drink. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I will [also] scatter them among nations that neither they nor their fathers have known, and I will send the sword after them until I have annihilated them.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Consider and call for the mourning women to come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send for the wailing women to come.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Let them hurry and take up a wailing for us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That our eyes may shed tears
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our eyelids flow with water.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“For a sound of wailing is heard [coming] from Zion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘How we are ruined!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We are greatly perplexed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utterly shamed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because we have left the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have torn down our dwellings.’ ”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oh that I had in the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lodging place (a mere shelter) for wayfaring men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I might leave my people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And go away from them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are all adulterers [worshiping idols instead of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[They are] an assembly of treacherous men [of weak character, men without integrity].'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Now hear the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O you women,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let your ear hear the word of His mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach your daughters a song of mourning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And each one [teach] her neighbor a dirge.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For death has come up through our windows;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has entered our palaces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cutting off the children from the streets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the young men from the town squares.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Speak, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The dead bodies of men will fall like dung on the open field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like sheaves [of grain] behind the reaper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no one will gather them.’ ” [Jer 8:2]
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Let not the one who is wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' skillful boast in his insight; let not the one who is mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful boast in his strength; let not the one who is rich boast in his [temporal satisfactions and earthly] abundance; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: but let the one who boasts boast in this, that he understands and knows Me [and acknowledges Me and honors Me as God and recognizes without any doubt], that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who practices lovingkindness, justice and righteousness on the earth, for in these things I delight,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [1 Cor 1:31; 2 Cor 10:17]
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Behold, the days are coming,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “when I will punish all who are circumcised [physically] and yet uncircumcised [spiritually]— [Rom 2:25-29] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All these nations are related to one another, except Egypt.
      marker-yv: yv-n
    - type: text
      text: Egypt and Judah, and Edom and the sons of Ammon, and Moab and all those who live in the desert who clip off the hair on their temples; for all these nations are uncircumcised (sinful, impure), and all the house of Israel are uncircumcised in heart.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “They bend their tongue like their bow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Their] lies and not truth prevail '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grow strong in the land;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they proceed from evil to evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge Me,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Let everyone beware of his neighbor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not trust any brother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For every brother is a supplanter [like Jacob, a deceiver, ready to grab his brother’s heel],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every neighbor goes around as a slanderer. [Gen 25:26]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Everyone deceives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mocks his neighbor'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not speak the truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have taught their tongue to speak lies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They exhaust themselves with sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cruelty.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Your dwelling is in the midst of deceit [oppression upon oppression and deceit upon deceit];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through deceit they refuse to know (understand) Me,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I will refine them [through suffering] and test them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For how else should I deal with the daughter of My people?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Their tongue is a murderous arrow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It speaks deceit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With his mouth one speaks peace to his neighbor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But in his heart he lays traps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' waits in ambush for him.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Shall I not punish them for these things?” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shall I not avenge Myself
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On such a nation as this?
