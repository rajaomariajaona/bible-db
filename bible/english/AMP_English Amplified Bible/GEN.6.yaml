  - type: text
    content: 'Make yourself an '
  - type: note
    content: The word “ark” comes from a Latin word (arca) for a box or chest. The design of the ark matched its purpose, which was not to travel through the water efficiently, but to be stable and have the greatest possible capacity for cargo. Also, such a vessel could be constructed relatively quickly, because there would be no need to form the wood used for the hull into efficient curves to maximize speed.
  - type: text
    content: 'ark of '
  - type: note
    content: The type of wood is unknown. The name of the wood is a transliteration—not a translation—of the Hebrew, with no connection to the English word “gopher.”
  - type: text
    content: 'gopher wood; make in it rooms (stalls, pens, coops, nests, cages, compartments) and '
  - type: note
    content: This prevented water from seeping into the ark through the seams between the wooden planks, and may also have served to protect the wood from becoming saturated with water. Coating the ark with pitch on the outside as well as the inside was very practical. One of the worst jobs on the old wooden ships was to re-coat the inside bottom of the hull when water had seeped in, because the crewman had to quickly pave hot pitch on the hull under the water, which cooled the pitch as he worked and made the job all the more difficult—thus the nautical saying, “the devil (referring to the seam in the hull planking) to pay (i.e. pave with pitch).” The problem was eliminated or minimized on the ark, but Noah, due to his complete inexperience with sea-going vessels, would not even have known about the potential problem himself. It was imperative for him to have absolute faith in God, and to follow God’s directions word for word.
  - type: text
    content: 'coat it inside and out with pitch (bitumen). '
