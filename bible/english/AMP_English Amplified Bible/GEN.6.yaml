verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Corruption of Mankind
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened, when men began to multiply on the face of the land, and daughters were born to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Noah became the father of three sons: Shem, Ham, and Japheth.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The [population of the] earth was corrupt [absolutely depraved—spiritually and morally putrid] in God’s sight, and the land was filled with violence [desecration, infringement, outrage, assault, and lust for power]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God looked on the earth and saw how debased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' degenerate it was, for all humanity had corrupted their way on the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lost their true direction.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God said to Noah, “I intend to make an end of all that lives, for through men the land is filled with violence; and behold, I am about to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Enoch (the descendant of Seth, not Cain) had warned these people (Jude 14, 15); Noah had preached righteousness to them (2 Pet 2:5); and God’s Spirit had been struggling with them (Gen 6:3). Yet they had rejected God.
      marker-yv: yv-n
    - type: text
      text: 'destroy them together with the land. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make yourself an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word “ark” comes from a Latin word (
        - type: usfm
          marker: it
          children:
          - type: text
            text: arca)
        - type: text
          text: ' for a box or chest. The design of the ark matched its purpose, which was not to travel through the water efficiently, but to be stable and have the greatest possible capacity for cargo. Also, such a vessel could be constructed relatively quickly, because there would be no need to form the wood used for the hull into efficient curves to maximize speed.'
      marker-yv: yv-n
    - type: text
      text: 'ark of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The type of wood is unknown. The name of the wood is a transliteration—not a translation—of the Hebrew, with no connection to the English word “gopher.”
      marker-yv: yv-n
    - type: text
      text: 'gopher wood; make in it rooms (stalls, pens, coops, nests, cages, compartments) and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prevented water from seeping into the ark through the seams between the wooden planks, and may also have served to protect the wood from becoming saturated with water. Coating the ark with pitch on the outside as well as the inside was very practical. One of the worst jobs on the old wooden ships was to re-coat the inside bottom of the hull when water had seeped in, because the crewman had to quickly pave hot pitch on the hull under the water, which cooled the pitch as he worked and made the job all the more difficult—thus the nautical saying, “the devil (referring to the seam in the hull planking) to pay (i.e. pave with pitch).” The problem was eliminated or minimized on the ark, but Noah, due to his complete inexperience with sea-going vessels, would not even have known about the potential problem himself. It was imperative for him to have absolute faith in God, and to follow God’s directions word for word.
      marker-yv: yv-n
    - type: text
      text: 'coat it inside and out with pitch (bitumen). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the way you are to make it: the length of the ark shall be three hundred cubits, its width fifty cubits, and its height thirty cubits (450’ x 75’ x 45’). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall make a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: roof
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'window [for light and ventilation] for the ark, and finish it to at least a cubit (eighteen inches) from the top—and set the [entry] door of the ark in its side; and you shall make it with lower, second and third decks. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For behold, I, even I, will bring a flood of waters on the earth, to destroy all life under the heavens in which there is the breath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spirit of life; everything that is on the land shall die. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will establish My covenant (solemn promise, formal agreement) with you; and you shall come into the ark—you and your [three] sons and your wife, and your sons’ wives with you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And of every living thing [found on land], you shall bring two of every kind into the ark, to keep them alive with you; they shall be male and female. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This phrase has been interpreted as a reference to: (a) royalty or rulers possessed by fallen angels, (b) the descendants of Seth who called upon the Lord (see 4:26), or (c) fallen angels (cf Job 1:6).'
      marker-yv: yv-n
    - type: text
      text: 'sons of God saw that the daughters of men were beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desirable; and they took wives for themselves, whomever they chose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desired. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of fowls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' birds according to their kind, of animals according to their kind, of every crawling thing of the ground according to its kind—two of every kind shall come to you to keep them alive. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also take with you every kind of food that is edible, and you shall collect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' store it; and it shall be food for you and for them.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Noah did this; according to all that God commanded him, that is what he did.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “My Spirit shall not strive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remain with man forever, because he is indeed flesh [sinful, corrupt—given over to sensual appetites]; nevertheless his days shall yet be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may refer to the time given man to repent before the flood, or to the normative human life span after the flood.
      marker-yv: yv-n
    - type: text
      text: 'a hundred and twenty years.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were Nephilim (men of stature, notorious men) on the earth in those days—and also afterward—when the sons of God lived with the daughters of men, and they gave birth to their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children
    - type: text
      text: . These were the mighty men who were of old, men of renown (great reputation, fame). [Num 13:33]
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saw that the wickedness (depravity) of man was great on the earth, and that every imagination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' intent of the thoughts of his heart were only evil continually. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The expressions of regret and grief seen here do not mean that God acknowledged the creation of man as a mistake on His part. God is omniscient, knowing all things (Ps 139:16) and He knew that mankind would come into sin and wickedness. God grieved over the sin of man because it was appropriate for Him to do so.
      marker-yv: yv-n
    - type: text
      text: 'regretted that He had made mankind on the earth, and He was [deeply] grieved in His heart. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “I will destroy (annihilate) mankind whom I have created from the surface of the earth—not only man, but the animals and the crawling things and the birds of the air—because it [deeply] grieves Me [to see mankind’s sin] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I regret that I have made them.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Noah found favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grace in the eyes of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the generations (family history) of Noah. Noah was a righteous man [one who was just and had right standing with God], blameless in his [evil] generation; Noah walked (lived) [in habitual fellowship] with God. '
