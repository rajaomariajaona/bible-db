  - type: note
    content: Enoch (the descendant of Seth, not Cain) had warned these people (Jude 14, 15); Noah had preached righteousness to them (2 Pet 2:5); and God’s Spirit had been struggling with them (Gen 6:3). Yet they had rejected God.
