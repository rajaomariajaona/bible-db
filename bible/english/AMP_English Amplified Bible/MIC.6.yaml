document_id: MIC.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Indictment of His People
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear now what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Arise, plead your case before the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the hills [as witnesses] hear your voice.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Are there not still treasures gained by wickedness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the house of the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a short (inaccurate) measure [for grain] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is
    - type: text
      text: ' cursed? [Deut 25:14-16]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Can I [be guiltless and] justify deceptive scales
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a bag of dishonest weights? [1 Thess 4:6]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “For the rich men of the city are full of violence [of every kind];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her inhabitants speak lies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their tongue is deceitful in their mouth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “So also I will make you sick, striking you down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Desolating '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devastating you, because of your sins.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “You shall eat, but you will not be satisfied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or possibly '
        - type: usfm
          marker: it
          children:
          - type: text
            text: garbage
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: vileness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: emptiness shall be among you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will [try to] remove [your goods and those you love] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for safekeeping
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you will fail to save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what you do save I shall give to the sword.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “You shall sow but you shall not reap;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shall tread olives, but shall not anoint yourself with oil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [you will extract juice from] the grapes, but you shall not drink the wine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “For [you have kept] the statutes of Omri [the idolatrous king],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the works of the [wicked] house (dynasty) of Ahab;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you walk in their counsels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' policies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, I shall hand you over for destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' horror'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your [city’s] inhabitants for ridicule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you shall bear the rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorn of My people.”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Hear, O mountains, the indictment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you enduring foundations of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has a case (a legal complaint) against His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will dispute (challenge) Israel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “O My people, what have I done to you [since you have turned away from Me]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And how have I wearied you? Answer Me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “For I brought you up from the land of Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ransomed you from the house of slavery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I sent before you Moses [to lead you], Aaron [the high priest], and Miriam [the prophetess].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “My people, remember now
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What Balak king of Moab devised [with his evil plan against Israel]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what Balaam the son of Beor answered him [turning the curse into blessing for Israel],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Remember what the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did for you] from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God reminds His people of His gracious acts in their behalf—how Balak tried to oppose Israel through pagan rites, sending for Balaam to put a curse on the Israelites; how God saved Israel by causing Balaam to bless instead of curse them; and how God later led them across the Jordan River into the promised land, from Shittim (Josh 3:1) to Gilgal (Josh 4:19).
      marker-yv: yv-n
    - type: text
      text: Shittim to Gilgal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that you may know the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saving acts [displaying the power] of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” [Num 23:7-24; 24:3-24; Josh 3:1; 4:19]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: What God Requires of Man
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶With what shall I come before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to honor Him]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And bow myself before God on high?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I come before Him with burnt offerings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With yearling calves?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Will the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be delighted with thousands of rams,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or with ten thousand rivers of oil?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I present my firstborn for my acts of rebellion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fruit of my body for the sin of my soul?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He has told you, O man, what is good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what does the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' require of you'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Except to be just, and to love [and to diligently practice] kindness (compassion),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to walk humbly with your God [setting aside any overblown sense of importance or self-righteousness]? [Deut 10:12, 13]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶The voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall call to the city [of Jerusalem]—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it is sound wisdom to heed [solemnly] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear Your name [with awe-filled reverence];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear, O tribe [the rod of punishment]. Who has appointed its time?
