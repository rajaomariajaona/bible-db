document_id: EZK.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pharaoh Warned of Assyria’s Fate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the eleventh year [after King Jehoiachin was taken captive to Babylon], in the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' on the first of the month, the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Son of man, say to Pharaoh king of Egypt and to his hordes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Whom are you like in your greatness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘Behold (listen carefully), Assyria was a cedar in Lebanon
- type: usfm
  marker: q1
  children:
  - type: text
    text: With beautiful branches and with forest shade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of high stature,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With its top among the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘The waters nourished it, the deep [underground waters] made it grow tall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its rivers ran all around the place where it was planted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sending out its streams to all the trees (other nations) of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘Therefore it towered higher than all the trees of the forest
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its boughs multiplied and its branches grew long;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because there was so much water they spread outward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ‘All the birds of the sky made their nests in its twigs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And under its branches all the animals of the field gave birth [to their young],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all of the great nations lived under its shadow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ‘So it was beautiful in its greatness, in the length of its branches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For its roots extended [downward] to great waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '‘The cedars in the garden of God could not hide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' rival it;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cypress trees did not have boughs like it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This enormous tree may grow to a height of a hundred feet. The diameter of its base may vary from six to ten feet.
    marker-yv: yv-n
  - type: text
    text: plane trees did not have branches like it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No tree in the garden of God was like it in its beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘I made it beautiful with the great mass of its branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that all the trees of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The traditional site of Eden was within the general area of the Assyrian Empire. However, this does not imply that Assyria was in the garden of God described in Gen 2:8.
    marker-yv: yv-n
  - type: text
    text: Eden which were in the garden of God were jealous of it (Assyria).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ‘Therefore thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Because it is high in stature and has set its top among the thick boughs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the clouds, and its heart is proud of its height, [2 Kin 18:31-35] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The significance of comparing Egypt and Assyria becomes clear when it is remembered that Assyria had conquered and held Egypt in servitude, and had then been conquered and destroyed about twenty-five years before the date of this prophecy by an alliance of Media and Babylon, which at that time was ruled by Nebuchadnezzar’s father Nabopolassar. Now Babylon, under Nebuchadnezzar, is predicted to bring judgment on Egypt. Egypt could not realistically expect victory over the conqueror of her conqueror.
    marker-yv: yv-n
  - type: text
    text: 'hand it over to a mighty one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a mighty one of the nations; he will most certainly deal with it. I have driven it away in accordance with its wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alien tyrants of the nations have cut it down and left it; its foliage has fallen on the mountains and in all the valleys and its branches have been broken in all the ravines of the land. And all the nations of the earth have come from under its shade and have left it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All the birds of the sky will nest in its ruins, and all the animals of the field will rest on its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fallen
  - type: text
    text: ' branches '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: so that none of the trees by the waters may exalt themselves because of their height, nor set their top among the clouds, nor their well-watered mighty ones stand [arrogantly] in their height. For they have all been handed over to death, to the earth beneath, among the sons of men, with those who go down to the pit (the grave).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “On the day when Assyria went down to Sheol (the place of the dead) I caused mourning; I closed the deep [subterranean waters] over it and restrained its rivers. And the many waters [that contributed to its prosperity] were held back; and I made [the heart of] Lebanon mourn for it, and all the trees of the field wilted away because of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I made the nations quake at the sound of its fall when I cast it down to Sheol with those who descend into the pit; and all the well-watered trees of Eden, the choicest and the best of Lebanon, will be comforted in the earth beneath [at Assyria’s downfall]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They also went down to Sheol with it to those who were slain by the sword; those who were its strength lived under its shade among the nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Which among the trees of Eden do you equal in glory and in greatness [O Egypt]? Yet you [also] will be brought down with the trees of Eden to the earth beneath (nether world). You will lie among the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'There were other circumcised nations besides the Hebrews, notably the Egyptians (as early as 3000 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .), Thus here the term has a general pejorative sense, not the specific meaning that it would have had for an Israelite.
    marker-yv: yv-n
  - type: text
    text: 'uncircumcised (the barbaric, the boorish, the crude) with those who were slain by the sword. This is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: how it shall be
  - type: text
    text: ' with Pharaoh and all his hordes!” ’ says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .” [Ezek 28:10; 32:19]
