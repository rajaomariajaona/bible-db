  - type: note
    content: The significance of comparing Egypt and Assyria becomes clear when it is remembered that Assyria had conquered and held Egypt in servitude, and had then been conquered and destroyed about twenty-five years before the date of this prophecy by an alliance of Media and Babylon, which at that time was ruled by Nebuchadnezzar’s father Nabopolassar. Now Babylon, under Nebuchadnezzar, is predicted to bring judgment on Egypt. Egypt could not realistically expect victory over the conqueror of her conqueror.
