segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Meets Esau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jacob looked up, and saw Esau coming with four hundred men. So he divided the children among Leah and Rachel and the two maids. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He put the maids and their children in front, Leah and her children after them, and Rachel and Joseph last of all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Jacob crossed over [the stream] ahead of them and bowed himself to the ground seven times [bowing and moving forward each time], until he approached his brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Esau ran to meet him and embraced him, and hugged his neck and kissed him, and they wept [for joy]. [Luke 15:20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Esau looked up and saw the women and the children, and said, “Who are these with you?” So Jacob replied, “They are the children whom God has graciously given your servant.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the maids approached with their children, and they bowed down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leah also approached with her children, and they bowed down. Afterward Joseph and Rachel approached, and they bowed down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Esau asked, “What do you mean by all this company which I have met?” And he answered, “[These are] to find favor in the sight of my lord.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Esau said, “I have plenty, my brother; keep what you have for yourself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jacob replied, “No, please, if now I have found favor in your sight, then accept my gift [as a blessing] from my hand, for I see your face as if I had seen the face of God, and you have received me favorably. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Please accept my blessing (gift) which has been brought to you, for God has dealt graciously with me and I have everything [that I could possibly want].” So Jacob kept urging him and Esau accepted it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Esau said, “Let us get started on our journey and I will go in front of you [to lead the way].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Jacob replied, “You know, my lord, that the children are frail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' need gentle care, and the nursing flocks and herds [with young] are of concern to me; for if the men should drive them hard for a single day, all the flocks will die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Please let my lord go on ahead of his servant, and I will move on slowly, governed by the pace of the livestock that are in front of me and according to the endurance of the children, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob must have been concerned about traveling through Edom and used this excuse to avoid following Esau to Seir. Indeed, he heads in the opposite direction.
    marker-yv: yv-n
  - type: text
    text: until I come to my lord in Seir [in Edom].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Esau said, “Please let me leave with you some of the people who are with me.” But Jacob said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Why this?
    marker-yv: yv-n
  - type: text
    text: 'What need is there [for it]? Let me find favor in the sight of my lord.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Esau turned back [toward the south] that day on his way to Seir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Jacob journeyed [north] to Succoth, and built himself a house and made shelters for his livestock; so the name of the place is Succoth (huts, shelters).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Settles in Shechem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Jacob came from Paddan-aram, he arrived safely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in peace at the city of Shechem, in the land of Canaan, and camped in front of the [walled] city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he bought the piece of land on which he had pitched his tents from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the hand of the sons
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the sons of Hamor, Shechem’s father, for a hundred '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qesitah,
      - type: text
        text: ' an uncertain measure of weight; a rabbi once reported hearing the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ma’ah,
      - type: text
        text: ' a small coin worth 1/12 of a shekel, called a '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qesitah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'pieces of money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'There he erected an altar and called it '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. God, the mighty God of Israel.
    marker-yv: yv-n
  - type: text
    text: El-Elohe-Israel.
