document_id: JHN.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Death and Resurrection of Lazarus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now a certain man named Lazarus was sick. He was from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Two cities named Bethany are mentioned in the NT. This one is located on the east side of the Mount of Olives, about two miles from Jerusalem, on the road to Jericho; the other city is “Bethany across the Jordan” (1:28) in Perea.
    marker-yv: yv-n
  - type: text
    text: 'Bethany, the village where Mary and her sister Martha lived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'It was the Mary who anointed the Lord with perfume and wiped His feet with her hair, whose brother Lazarus was sick. [John 12:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So the sisters sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Him, saying, “Lord, he [our brother and Your friend] whom You love is sick.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When Jesus heard this, He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This sickness will not end in death; but
  - type: text
    text: ' [on the contrary it is] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor of God, so that the Son of God may be glorified by it.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now Jesus loved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' was concerned about Martha and her sister and Lazarus [and considered them dear friends]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The delay by Jesus was to assure everyone that Lazarus was truly dead, as the context which follows makes clear.
    marker-yv: yv-n
  - type: text
    text: 'So [even] when He heard that Lazarus was sick, He stayed in the same place two more days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then He said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let us go back to Judea.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The disciples said to Him, “Rabbi (Teacher), the Jews were only recently going to stone You, and You are [thinking of] going back there again?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are there not twelve hours
  - type: text
    text: ' [of light] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the day? Anyone who walks in the daytime does not stumble, because he sees
  - type: text
    text: ' [by] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the light of this world.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if anyone walks in the night, he stumbles, because there is no light in him.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said this, and after that said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Our friend Lazarus has fallen asleep; but I am going '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' to wake him.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The disciples answered, “Lord, if he has fallen asleep, he will recover.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'However, Jesus had spoken of his death, but they thought that He was referring to natural sleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So then Jesus told them plainly, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Lazarus is dead.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And for your sake I am glad that I was not there, so that you may believe. But let us go to him.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Thomas, who was called Didymus (the twin), said to his fellow disciples, “Let us go too, that we may die with Him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So when Jesus arrived, He found that Lazarus had already been in the tomb '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus purposefully stayed away for four days after Lazarus’ death. The Jews believed the soul hovered around the body for three days during which there was still hope. After four days all hope was gone.
    marker-yv: yv-n
  - type: text
    text: 'four days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Bethany was near Jerusalem, about two miles away; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and many of the Jews had come to see Martha and Mary, to comfort them concerning [the loss of] their brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So when Martha heard that Jesus was coming, she went to meet Him, while Mary remained sitting in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Martha said to Jesus, “Lord, if You had been here, my brother would not have died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Even now I know that whatever You ask of God, God will give to You.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus told her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your brother will rise
  - type: text
    text: ' [from the dead].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Martha replied, “I know that he will rise [from the dead] in the resurrection on the last day.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The fifth of the memorable “I am” statements. See note 6:35.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Resurrection and the Life. Whoever believes in (adheres to, trusts in, relies on) Me
  - type: text
    text: ' [as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will live even if he dies;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and everyone who lives and believes in Me
  - type: text
    text: ' [as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will never die. Do you believe this?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'She said to Him, “Yes, Lord; I have believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continue to believe that You are the Christ (the Messiah, the Anointed), the Son of God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Coming One was a Messianic title.
    marker-yv: yv-n
  - type: text
    text: He who was [destined and promised] to come into the world [and it is for You that the world has waited].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'After she had said this, she left and called her sister Mary, privately whispering [to her], “The Teacher is here and is asking for you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And when she heard this, she got up quickly and went to Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now Jesus had not yet entered the village, but was still at the place where Martha had met Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So when the Jews who were with her in the house comforting her, saw how quickly Mary got up and left, they followed her, assuming that she was going to the tomb to weep there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'When Mary came [to the place] where Jesus was and saw Him, she fell at His feet, saying to Him, “Lord, if You had been here, my brother would not have died.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When Jesus saw her sobbing, and the Jews who had come with her also sobbing, He was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Greek this term suggests an emotional indignation or sternness. Jesus was angry at the sorrow caused by death. It occurs four more times in the NT in reference to Jesus’ words or His feelings. See Matt 9:30; Mark 1:43; John 11:38; 13:21.
    marker-yv: yv-n
  - type: text
    text: 'deeply moved in spirit [to the point of anger at the sorrow caused by death] and was troubled, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Where have you laid him?”
  - type: text
    text: ' They said, “Lord, come and see.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So the Jews were saying, “See how He loved him [as a close friend]!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: But some of them said, “Could not this Man, who opened the blind man’s eyes, have kept this man from dying?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So Jesus, again deeply moved within [to the point of anger], approached the tomb. It was a cave, and a boulder was lying against it [to cover the entrance]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take away the stone.”
  - type: text
    text: ' Martha, the sister of the dead man, said to Him, “Lord, by this time there will be an offensive odor, for he has been '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dead
  - type: text
    text: ' four days! [It is hopeless!]” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jesus said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Did I not say to you that if you believe
  - type: text
    text: ' [in Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will see the glory of God
  - type: text
    text: ' [the expression of His excellence]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So they took away the stone. And Jesus raised His eyes [toward heaven] and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, I thank You that You have heard Me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I knew that You always hear Me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listen to Me; but I have said this because of the people standing around, so that they may believe that You have sent Me'
  - type: text
    text: ' [and that You have made Me Your representative].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'When He had said this, He shouted with a loud voice, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Lazarus, come out!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Out came the man who had been dead, his hands and feet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tightly
  - type: text
    text: ' wrapped in burial cloths (linen strips), and with a [burial] cloth wrapped around his face. Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Unwrap him and release him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'So then, many of the Jews who had come to [be with] Mary and who were eyewitnesses to what Jesus had done, believed in Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: But some of them went back to the Pharisees and told them what Jesus had done.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Conspiracy to Kill Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'So the chief priests and Pharisees convened a council [of the leaders in Israel], and said, “What are we doing? For this man performs many signs (attesting miracles). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'If we let Him go on like this, everyone will believe in Him, and the Romans will come and take away both our [holy] place (the temple) and our nation.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But one of them, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'High priest from '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '. 18-36. Annas, his father-in-law, was officially high priest only from '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 7-14, but he exercised great influence and power during the term of Caiaphas.
    marker-yv: yv-n
  - type: text
    text: 'Caiaphas, who was the high priest that year [the year of Christ’s crucifixion], said to them, “You know nothing at all! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nor do you understand that it is expedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' politically advantageous for you that one man die for the people, and that the whole nation not perish.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Now he did not say this [simply] on his own initiative; but being the high priest that year, he [was unknowingly used by God and] prophesied that Jesus was going to die for the nation, [Is 53:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'and not only for the nation, but also for the purpose of gathering together into one body the children of God who have been scattered abroad. [Is 49:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: So from that day on they planned together to kill Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'For that reason Jesus no longer walked openly among the Jews, but left there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' went to the district that borders on the uninhabited wilderness, to a town called Ephraim; and He stayed there with the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Now the Passover of the Jews was approaching, and many from the country went up to Jerusalem before Passover to purify themselves [ceremonially, so that they would be able to participate in the feast]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'So they were looking for Jesus as they stood in the temple [area], and saying among themselves, “What do you think? Will He not come to the feast at all?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Now the chief priests and Pharisees had given orders that if anyone knew where He was, he was to report it so that they might arrest Him.
