document_id: JHN.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death and Resurrection of Lazarus
  - type: text
    content: 'Now a certain man named Lazarus was sick. He was from '
  - type: note
    content: Two cities named Bethany are mentioned in the NT. This one is located on the east side of the Mount of Olives, about two miles from Jerusalem, on the road to Jericho; the other city is “Bethany across the Jordan” (1:28) in Perea.
  - type: text
    content: 'Bethany, the village where Mary and her sister Martha lived. '
  '10':
  - type: text
    content: But if anyone walks in the night, he stumbles, because there is no light in him.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'He said this, and after that said, '
  - type: text
    content: '“Our friend Lazarus has fallen asleep; but I am going '
  - type: text
    content: there
  - type: text
    content: ' to wake him.”'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'The disciples answered, “Lord, if he has fallen asleep, he will recover.” '
  '13':
  - type: text
    content: 'However, Jesus had spoken of his death, but they thought that He was referring to natural sleep. '
  '14':
  - type: text
    content: 'So then Jesus told them plainly, '
  - type: text
    content: “Lazarus is dead.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And for your sake I am glad that I was not there, so that you may believe. But let us go to him.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: Then Thomas, who was called Didymus (the twin), said to his fellow disciples, “Let us go too, that we may die with Him.”
  '17':
  - type: text
    content: 'So when Jesus arrived, He found that Lazarus had already been in the tomb '
  - type: note
    content: Jesus purposefully stayed away for four days after Lazarus’ death. The Jews believed the soul hovered around the body for three days during which there was still hope. After four days all hope was gone.
  - type: text
    content: 'four days. '
  '18':
  - type: text
    content: 'Bethany was near Jerusalem, about two miles away; '
  '19':
  - type: text
    content: 'and many of the Jews had come to see Martha and Mary, to comfort them concerning [the loss of] their brother. '
  '2':
  - type: text
    content: 'It was the Mary who anointed the Lord with perfume and wiped His feet with her hair, whose brother Lazarus was sick. [John 12:3] '
  '20':
  - type: text
    content: 'So when Martha heard that Jesus was coming, she went to meet Him, while Mary remained sitting in the house. '
  '21':
  - type: text
    content: 'Then Martha said to Jesus, “Lord, if You had been here, my brother would not have died. '
  '22':
  - type: text
    content: 'Even now I know that whatever You ask of God, God will give to You.” '
  '23':
  - type: text
    content: 'Jesus told her, '
  - type: text
    content: “Your brother will rise
  - type: text
    content: ' [from the dead].” '
  '24':
  - type: text
    content: 'Martha replied, “I know that he will rise [from the dead] in the resurrection on the last day.” '
  '25':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “
  - type: note
    content: The fifth of the memorable “I am” statements. See note 6:35.
  - type: text
    content: I am the Resurrection and the Life. Whoever believes in (adheres to, trusts in, relies on) Me
  - type: text
    content: ' [as Savior] '
  - type: text
    content: will live even if he dies;
  - type: text
    content: ' '
  '26':
  - type: text
    content: and everyone who lives and believes in Me
  - type: text
    content: ' [as Savior] '
  - type: text
    content: will never die. Do you believe this?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'She said to Him, “Yes, Lord; I have believed '
  - type: text
    content: and
  - type: text
    content: ' continue to believe that You are the Christ (the Messiah, the Anointed), the Son of God, '
  - type: note
    content: The Coming One was a Messianic title.
  - type: text
    content: He who was [destined and promised] to come into the world [and it is for You that the world has waited].”
  '28':
  - type: text
    content: 'After she had said this, she left and called her sister Mary, privately whispering [to her], “The Teacher is here and is asking for you.” '
  '29':
  - type: text
    content: And when she heard this, she got up quickly and went to Him.
  '3':
  - type: text
    content: 'So the sisters sent '
  - type: text
    content: word
  - type: text
    content: ' to Him, saying, “Lord, he [our brother and Your friend] whom You love is sick.” '
  '30':
  - type: text
    content: 'Now Jesus had not yet entered the village, but was still at the place where Martha had met Him. '
  '31':
  - type: text
    content: 'So when the Jews who were with her in the house comforting her, saw how quickly Mary got up and left, they followed her, assuming that she was going to the tomb to weep there. '
  '32':
  - type: text
    content: 'When Mary came [to the place] where Jesus was and saw Him, she fell at His feet, saying to Him, “Lord, if You had been here, my brother would not have died.” '
  '33':
  - type: text
    content: 'When Jesus saw her sobbing, and the Jews who had come with her also sobbing, He was '
  - type: note
    content: In Greek this term suggests an emotional indignation or sternness. Jesus was angry at the sorrow caused by death. It occurs four more times in the NT in reference to Jesus’ words or His feelings. See Matt 9:30; Mark 1:43; John 11:38; 13:21.
  - type: text
    content: 'deeply moved in spirit [to the point of anger at the sorrow caused by death] and was troubled, '
  '34':
  - type: text
    content: 'and said, '
  - type: text
    content: “Where have you laid him?”
  - type: text
    content: ' They said, “Lord, come and see.” '
  '35':
  - type: text
    content: 'Jesus wept. '
  '36':
  - type: text
    content: 'So the Jews were saying, “See how He loved him [as a close friend]!” '
  '37':
  - type: text
    content: But some of them said, “Could not this Man, who opened the blind man’s eyes, have kept this man from dying?”
  '38':
  - type: text
    content: 'So Jesus, again deeply moved within [to the point of anger], approached the tomb. It was a cave, and a boulder was lying against it [to cover the entrance]. '
  '39':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Take away the stone.”
  - type: text
    content: ' Martha, the sister of the dead man, said to Him, “Lord, by this time there will be an offensive odor, for he has been '
  - type: text
    content: dead
  - type: text
    content: ' four days! [It is hopeless!]” '
  '4':
  - type: text
    content: 'When Jesus heard this, He said, '
  - type: text
    content: “This sickness will not end in death; but
  - type: text
    content: ' [on the contrary it is] '
  - type: text
    content: 'for the glory '
  - type: text
    content: and
  - type: text
    content: ' honor of God, so that the Son of God may be glorified by it.”'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Did I not say to you that if you believe
  - type: text
    content: ' [in Me], '
  - type: text
    content: you will see the glory of God
  - type: text
    content: ' [the expression of His excellence]?” '
  '41':
  - type: text
    content: 'So they took away the stone. And Jesus raised His eyes [toward heaven] and said, '
  - type: text
    content: “Father, I thank You that You have heard Me.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'I knew that You always hear Me '
  - type: text
    content: and
  - type: text
    content: ' listen to Me; but I have said this because of the people standing around, so that they may believe that You have sent Me'
  - type: text
    content: ' [and that You have made Me Your representative].” '
  '43':
  - type: text
    content: 'When He had said this, He shouted with a loud voice, '
  - type: text
    content: “Lazarus, come out!”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Out came the man who had been dead, his hands and feet '
  - type: text
    content: tightly
  - type: text
    content: ' wrapped in burial cloths (linen strips), and with a [burial] cloth wrapped around his face. Jesus said to them, '
  - type: text
    content: “Unwrap him and release him.”
  '45':
  - type: text
    content: 'So then, many of the Jews who had come to [be with] Mary and who were eyewitnesses to what Jesus had done, believed in Him. '
  '46':
  - type: text
    content: But some of them went back to the Pharisees and told them what Jesus had done.
  - type: heading
    content: Conspiracy to Kill Jesus
  '47':
  - type: text
    content: 'So the chief priests and Pharisees convened a council [of the leaders in Israel], and said, “What are we doing? For this man performs many signs (attesting miracles). '
  '48':
  - type: text
    content: 'If we let Him go on like this, everyone will believe in Him, and the Romans will come and take away both our [holy] place (the temple) and our nation.” '
  '49':
  - type: text
    content: 'But one of them, '
  - type: note
    content: High priest from a.d. 18-36. Annas, his father-in-law, was officially high priest only from a.d. 7-14, but he exercised great influence and power during the term of Caiaphas.
  - type: text
    content: 'Caiaphas, who was the high priest that year [the year of Christ’s crucifixion], said to them, “You know nothing at all! '
  '5':
  - type: text
    content: 'Now Jesus loved '
  - type: text
    content: and
  - type: text
    content: ' was concerned about Martha and her sister and Lazarus [and considered them dear friends]. '
  '50':
  - type: text
    content: 'Nor do you understand that it is expedient '
  - type: text
    content: and
  - type: text
    content: ' politically advantageous for you that one man die for the people, and that the whole nation not perish.” '
  '51':
  - type: text
    content: 'Now he did not say this [simply] on his own initiative; but being the high priest that year, he [was unknowingly used by God and] prophesied that Jesus was going to die for the nation, [Is 53:8] '
  '52':
  - type: text
    content: 'and not only for the nation, but also for the purpose of gathering together into one body the children of God who have been scattered abroad. [Is 49:6] '
  '53':
  - type: text
    content: So from that day on they planned together to kill Him.
  '54':
  - type: text
    content: 'For that reason Jesus no longer walked openly among the Jews, but left there '
  - type: text
    content: and
  - type: text
    content: ' went to the district that borders on the uninhabited wilderness, to a town called Ephraim; and He stayed there with the disciples.'
  '55':
  - type: text
    content: 'Now the Passover of the Jews was approaching, and many from the country went up to Jerusalem before Passover to purify themselves [ceremonially, so that they would be able to participate in the feast]. '
  '56':
  - type: text
    content: 'So they were looking for Jesus as they stood in the temple [area], and saying among themselves, “What do you think? Will He not come to the feast at all?” '
  '57':
  - type: text
    content: Now the chief priests and Pharisees had given orders that if anyone knew where He was, he was to report it so that they might arrest Him.
  '6':
  - type: note
    content: The delay by Jesus was to assure everyone that Lazarus was truly dead, as the context which follows makes clear.
  - type: text
    content: 'So [even] when He heard that Lazarus was sick, He stayed in the same place two more days. '
  '7':
  - type: text
    content: 'Then He said to His disciples, '
  - type: text
    content: “Let us go back to Judea.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'The disciples said to Him, “Rabbi (Teacher), the Jews were only recently going to stone You, and You are [thinking of] going back there again?” '
  '9':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Are there not twelve hours
  - type: text
    content: ' [of light] '
  - type: text
    content: in the day? Anyone who walks in the daytime does not stumble, because he sees
  - type: text
    content: ' [by] '
  - type: text
    content: the light of this world.
  - type: text
    content: ' '
