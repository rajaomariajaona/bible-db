document_id: PSA.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 28
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Prayer for Help, and Praise for Its Answer.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To you I call, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My rock, do not be deaf to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For if You are silent to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will become like those who go down to the pit (grave).
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the voice of my supplication (specific requests, humble entreaties) as I cry to You for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As I lift up my hands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heart toward Your innermost sanctuary (Holy of Holies).'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not drag me away with the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with those who do evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who speak peace with their neighbors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'While malice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mischief are in their hearts.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repay them according to their work and according to the evil of their practices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repay them according to the deeds of their hands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repay them what they deserve. [2 Tim 4:14; Rev 18:6]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have no regard for the works of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the deeds of His hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will tear them down and not rebuild them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because He has heard the voice of my supplication.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is my strength and my [impenetrable] shield;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart trusts [with unwavering confidence] in Him, and I am helped;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore my heart greatly rejoices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And with my song I shall thank Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise Him.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is their [unyielding] strength,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He is the fortress of salvation to His anointed.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save Your people and bless Your inheritance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be their shepherd also, and carry them forever.
