document_id: PSA.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 28
  - type: heading
    content: A Prayer for Help, and Praise for Its Answer.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: To you I call, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: My rock, do not be deaf to me,
  - type: text
    content: For if You are silent to me,
  - type: text
    content: I will become like those who go down to the pit (grave).
  '2':
  - type: text
    content: Hear the voice of my supplication (specific requests, humble entreaties) as I cry to You for help,
  - type: text
    content: 'As I lift up my hands '
  - type: text
    content: and
  - type: text
    content: ' heart toward Your innermost sanctuary (Holy of Holies).'
  '3':
  - type: text
    content: Do not drag me away with the wicked
  - type: text
    content: And with those who do evil,
  - type: text
    content: Who speak peace with their neighbors,
  - type: text
    content: 'While malice '
  - type: text
    content: and
  - type: text
    content: ' mischief are in their hearts.'
  '4':
  - type: text
    content: Repay them according to their work and according to the evil of their practices;
  - type: text
    content: Repay them according to the deeds of their hands;
  - type: text
    content: Repay them what they deserve. [2 Tim 4:14; Rev 18:6]
  '5':
  - type: text
    content: Because they have no regard for the works of the L
  - type: heading
    content: ord
  - type: text
    content: Nor the deeds of His hands,
  - type: text
    content: He will tear them down and not rebuild them.
  '6':
  - type: text
    content: ¶Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Because He has heard the voice of my supplication.
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is my strength and my [impenetrable] shield;'
  - type: text
    content: My heart trusts [with unwavering confidence] in Him, and I am helped;
  - type: text
    content: Therefore my heart greatly rejoices,
  - type: text
    content: 'And with my song I shall thank Him '
  - type: text
    content: and
  - type: text
    content: ' praise Him.'
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is their [unyielding] strength,'
  - type: text
    content: And He is the fortress of salvation to His anointed.
  '9':
  - type: text
    content: Save Your people and bless Your inheritance;
  - type: text
    content: Be their shepherd also, and carry them forever.
