document_id: PRO.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Wisdom’s Invitation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Wisdom has built her [spacious and sufficient] house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She has hewn out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set up her seven pillars.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, worshiping Him and regarding Him as truly awesome] is the beginning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the preeminent part of wisdom [its starting point and its essence],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the knowledge of the Holy One is understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual insight.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For by me (wisdom from God) your days will be multiplied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And years of life shall be increased.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If you are wise, you are wise for yourself [for your own benefit];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you scoff [thoughtlessly ridicule and disdain], you alone will pay the penalty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '¶The foolish woman is restless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noisy;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She is naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' easily misled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtless, and knows nothing at all [of eternal value].'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She sits at the doorway of her house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On a seat by the high '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conspicuous places of the city,'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Calling to those who pass by,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who are making their paths straight:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Whoever is naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inexperienced, let him turn in here!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to him who lacks understanding (common sense), she says,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Stolen waters (pleasures) are sweet [because they are forbidden];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And bread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eaten
    - type: text
      text: ' in secret is pleasant.” [Prov 20:17]'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But he does not know that the spirits of the dead are there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that her guests are [already] in the depths of Sheol (the nether world, the place of the dead).
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: She has prepared her food, she has mixed her wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has also set her table. [Matt 22:2-4]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: She has sent out her maidens, she calls
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the highest places of the city:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Whoever is naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inexperienced, let him turn in here!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for him who lacks understanding, she says,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Come, eat my food
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And drink the wine I have mixed [and accept my gifts]. [Is 55:1; John 6:27]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Leave [behind] your foolishness [and the foolish] and live,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And walk in the way of insight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding.”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶He who corrects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructs a scoffer gets dishonor for himself,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who rebukes a wicked man gets insults for himself.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The ancient rabbis took this to have the force of a commandment: never give a rebuke that is sure to be ignored.'
      marker-yv: yv-n
    - type: text
      text: Do not correct a scoffer [who foolishly ridicules and takes no responsibility for his error] or he will hate you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Correct a wise man [who learns from his error], and he will love you. [Ps 141:5]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instruction
    - type: text
      text: ' to a wise man and he will become even wiser;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach a righteous man and he will increase his learning.
