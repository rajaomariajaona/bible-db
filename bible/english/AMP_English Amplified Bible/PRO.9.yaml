document_id: PRO.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom’s Invitation
  - type: text
    content: Wisdom has built her [spacious and sufficient] house;
  - type: text
    content: 'She has hewn out '
  - type: text
    content: and
  - type: text
    content: ' set up her seven pillars.'
  '10':
  - type: text
    content: The [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that is, worshiping Him and regarding Him as truly awesome] is the beginning '
  - type: text
    content: and
  - type: text
    content: ' the preeminent part of wisdom [its starting point and its essence],'
  - type: text
    content: 'And the knowledge of the Holy One is understanding '
  - type: text
    content: and
  - type: text
    content: ' spiritual insight.'
  '11':
  - type: text
    content: For by me (wisdom from God) your days will be multiplied,
  - type: text
    content: And years of life shall be increased.
  '12':
  - type: text
    content: If you are wise, you are wise for yourself [for your own benefit];
  - type: text
    content: If you scoff [thoughtlessly ridicule and disdain], you alone will pay the penalty.
  '13':
  - type: text
    content: '¶The foolish woman is restless '
  - type: text
    content: and
  - type: text
    content: ' noisy;'
  - type: text
    content: 'She is naive '
  - type: text
    content: and
  - type: text
    content: ' easily misled '
  - type: text
    content: and
  - type: text
    content: ' thoughtless, and knows nothing at all [of eternal value].'
  '14':
  - type: text
    content: She sits at the doorway of her house,
  - type: text
    content: 'On a seat by the high '
  - type: text
    content: and
  - type: text
    content: ' conspicuous places of the city,'
  '15':
  - type: text
    content: Calling to those who pass by,
  - type: text
    content: 'Who are making their paths straight:'
  '16':
  - type: text
    content: '“Whoever is naive '
  - type: text
    content: or
  - type: text
    content: ' inexperienced, let him turn in here!”'
  - type: text
    content: And to him who lacks understanding (common sense), she says,
  '17':
  - type: text
    content: “Stolen waters (pleasures) are sweet [because they are forbidden];
  - type: text
    content: 'And bread '
  - type: text
    content: eaten
  - type: text
    content: ' in secret is pleasant.” [Prov 20:17]'
  '18':
  - type: text
    content: But he does not know that the spirits of the dead are there,
  - type: text
    content: And that her guests are [already] in the depths of Sheol (the nether world, the place of the dead).
  '2':
  - type: text
    content: She has prepared her food, she has mixed her wine;
  - type: text
    content: She has also set her table. [Matt 22:2-4]
  '3':
  - type: text
    content: She has sent out her maidens, she calls
  - type: text
    content: 'From the highest places of the city:'
  '4':
  - type: text
    content: '“Whoever is naive '
  - type: text
    content: or
  - type: text
    content: ' inexperienced, let him turn in here!”'
  - type: text
    content: As for him who lacks understanding, she says,
  '5':
  - type: text
    content: “Come, eat my food
  - type: text
    content: And drink the wine I have mixed [and accept my gifts]. [Is 55:1; John 6:27]
  '6':
  - type: text
    content: “Leave [behind] your foolishness [and the foolish] and live,
  - type: text
    content: 'And walk in the way of insight '
  - type: text
    content: and
  - type: text
    content: ' understanding.”'
  '7':
  - type: text
    content: '¶He who corrects '
  - type: text
    content: and
  - type: text
    content: ' instructs a scoffer gets dishonor for himself,'
  - type: text
    content: And he who rebukes a wicked man gets insults for himself.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'The ancient rabbis took this to have the force of a commandment: never give a rebuke that is sure to be ignored.'
  - type: text
    content: Do not correct a scoffer [who foolishly ridicules and takes no responsibility for his error] or he will hate you;
  - type: text
    content: Correct a wise man [who learns from his error], and he will love you. [Ps 141:5]
  '9':
  - type: text
    content: 'Give '
  - type: text
    content: instruction
  - type: text
    content: ' to a wise man and he will become even wiser;'
  - type: text
    content: Teach a righteous man and he will increase his learning.
