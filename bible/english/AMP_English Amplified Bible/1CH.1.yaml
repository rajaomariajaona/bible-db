    content: Genealogy from Adam
  - type: text
    content: 'Adam [his genealogical line], Seth, Enosh, '
  '10':
  - type: text
    content: Cush became the father of Nimrod; he began to be a mighty one upon the earth.
  '11':
  - type: text
    content: 'Mizraim became the father of the people of '
  - type: note
    content: There are numerous variations in the spelling of some of the Hebrew names. In some cases an alternate spelling is given in parentheses or a footnote may be added for clarity. In general, one spelling is given for each name.
  - type: text
    content: 'Lud, Anam, Lehab, Naphtuh, '
  '12':
  - type: text
    content: Pathrus, and Casluh, from whom came the Philistines, and Caphtor.
  '13':
  - type: text
    content: 'Canaan became the father of Sidon his firstborn, and Heth, '
  '14':
  - type: text
    content: 'the Jebusites, Amorites, Girgashites, '
  '15':
  - type: text
    content: 'Hivites, Arkites, Sinites, '
  '16':
  - type: text
    content: Arvadites, Zemarites, and Hamathites.
  '17':
  - type: text
    content: 'The sons of Shem: Elam, Asshur, Arpachshad, Lud, Aram, Uz, Hul, Gether, and Meshech. '
  '18':
  - type: text
    content: 'Arpachshad became the father of Shelah, and Shelah became the father of Eber. '
  '19':
  - type: text
    content: 'To Eber were born two sons: the name of the one was Peleg, because in his days [the population of] the earth was divided [according to its languages], and his brother’s name was Joktan. '
  '2':
  - type: text
    content: 'Kenan, Mahalalel, Jared, '
  '20':
  - type: text
    content: 'Joktan became the father of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: text
    content: 'Ebal, Abimael, Sheba, '
  '23':
  - type: text
    content: Ophir, Havilah, and Jobab. All these were the sons of Joktan.
  '24':
  - type: text
    content: 'Shem [his genealogical line], Arpachshad, Shelah, '
  '25':
  - type: text
    content: 'Eber, Peleg, Reu, '
  '26':
  - type: text
    content: 'Serug, Nahor, Terah, '
  '27':
  - type: text
    content: Abram, the same as Abraham.
  - type: heading
    content: Descendants of Abraham
  '28':
  - type: text
    content: 'The sons of Abraham: Isaac [by his wife Sarah] and Ishmael [by Hagar her maid]. '
  '29':
  - type: text
    content: 'These are their descendants: The firstborn of Ishmael, Nebaioth; then Kedar, Adbeel, Mibsam, '
  '3':
  - type: text
    content: 'Enoch, Methuselah, Lamech, '
  '30':
  - type: text
    content: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: text
    content: 'Jetur, Naphish, and Kedemah. These are the sons of Ishmael. '
  '32':
  - type: text
    content: 'Now the sons of Keturah, Abraham’s '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubine: she gave birth to Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. The sons of Jokshan: Sheba and Dedan. '
  '33':
  - type: text
    content: 'The sons of Midian: Ephah, Epher, Hanoch, Abida, and Eldaah. All these are the sons [and grandsons] of Keturah.'
  '34':
  - type: text
    content: 'Abraham became the father of Isaac. The sons of Isaac: Esau and Israel (Jacob). '
  '35':
  - type: text
    content: 'The sons of Esau: Eliphaz, Reuel, Jeush, Jalam, and Korah. '
  '36':
  - type: text
    content: 'The sons of Eliphaz: Teman, Omar, Zephi, Gatam, Kenaz, Timna, and Amalek. '
  '37':
  - type: text
    content: 'The sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. '
  '38':
  - type: text
    content: 'The sons of Seir: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. '
  '39':
  - type: text
    content: 'The sons of Lotan: Hori and Homam; and Timna was Lotan’s sister. '
  '4':
  - type: text
    content: Noah, [and his sons] Shem, Ham, and Japheth.
  '40':
  - type: text
    content: 'The sons of Shobal: Alian, Manahath, Ebal, Shephi, and Onam. The sons of Zibeon: Aiah and Anah. '
  '41':
  - type: text
    content: 'The son of Anah: Dishon. The sons of Dishon: Hamran, Eshban, Ithran, and Cheran. '
  '42':
  - type: text
    content: 'The sons of Ezer: Bilhan, Zaavan, and Jaakan. The sons of Dishan: Uz and Aran.'
  '43':
  - type: text
    content: 'These are the kings who reigned in the land of Edom before any king reigned over the '
  - type: note
    content: In general, sons of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'sons (descendants) of Israel (Jacob): Bela the son of Beor; the name of his city was Dinhabah. '
  '44':
  - type: text
    content: 'When Bela died, Jobab the son of Zerah of Bozrah became king in his place. '
  '45':
  - type: text
    content: 'When Jobab died, Husham of the land of the Temanites became king in his place. '
  '46':
  - type: text
    content: 'When Husham died, Hadad [I of Edom] the son of Bedad, who defeated Midian in the field of Moab, became king in his place; the name of his city was Avith. '
  '47':
  - type: text
    content: 'When Hadad [I] died, Samlah of Masrekah became king in his place. '
  '48':
  - type: text
    content: 'When Samlah died, Shaul of Rehoboth on the River [Euphrates] became king in his place. '
  '49':
  - type: text
    content: 'When Shaul died, Baal-hanan the son of Achbor became king in his place. '
  '5':
  - type: text
    content: 'The sons (descendants) of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras. '
  '50':
  - type: text
    content: 'When Baal-hanan died, Hadad [II] became king in his place; the name of his city was Pai; his wife’s name was Mehetabel daughter of Matred, the daughter of Mezahab. '
  '51':
  - type: text
    content: Hadad died also.
  - type: text
    content: T
  - type: text
    content: 'he chiefs of Edom were: chiefs Timna, Aliah, Jetheth, '
  '52':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: text
    content: Magdiel, and Iram. These are the chiefs of Edom.
  '6':
  - type: text
    content: 'The sons of Gomer: Ashkenaz, '
  - type: note
    content: In Gen 10:3 Riphath.
  - type: text
    content: 'Diphath, and Togarmah. '
  '7':
  - type: text
    content: 'The sons of Javan: Elishah, Tarshish, Kittim, and '
  - type: note
    content: In Gen 10:4 Dodanim.
  - type: text
    content: Rodanim.
  '8':
  - type: text
    content: 'The sons of Ham: Cush, Mizraim, Put, and Canaan. '
  '9':
  - type: text
    content: 'The sons of Cush: Seba, Havilah, Sabta, Raama, and Sabteca. The sons of Raama: Sheba and Dedan. '
