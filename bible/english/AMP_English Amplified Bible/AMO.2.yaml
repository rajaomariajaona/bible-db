  '8':
  - type: text
    content: “They stretch out beside every [pagan] altar on clothes taken in pledge [to secure a loan, disregarding God’s command],
  - type: text
    content: And in the house of their God [in contempt of Him] they frivolously drink the wine [which has been] taken from those who have been fined. [Ex 22:26; Deut 24:12, 13]
  '9':
  - type: text
    content: ¶“Yet it was I [not the false gods] who destroyed the Amorite before them,
  - type: text
    content: Though his height was like the height of the cedars,
  - type: text
    content: And he was as strong as the oaks;
  - type: text
    content: I even destroyed his fruit above and his root below.
