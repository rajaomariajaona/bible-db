document_id: AMO.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment on Moab
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For three transgressions of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Descendants of Moab, the son born to Lot and his elder daughter (Gen 19:30-38).
      marker-yv: yv-n
    - type: text
      text: Moab and for four (multiplied delinquencies)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will not reverse its punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoke My word concerning it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he burned the bones of the king of Edom [Esau’s descendant] into lime [and used it to plaster a Moabite house].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Also it was I who brought you up out of the land of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I led you forty years through the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you might possess the land of the Amorite.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Then I raised up some of your sons to be prophets [who gave you My revelation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And some of your young men to be Nazirites (dedicated ones).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is this not true, O you children of Israel?” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Num 6:1-8]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “But you gave the Nazirites wine to drink [despite their vows]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And commanded the prophets, saying, ‘You shall not prophesy!’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Behold, I am weighted down beneath you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a cart that is weighted down when it is full of sheaves.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Flight will be lost to the swift [so they will be unable to escape],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the strong shall not strengthen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' maintain his power,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor shall the mighty man save his own life.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“He who handles the bow will not stand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who is swift of foot will not escape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will he who rides the horse save his life [from the invading army].
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Even the bravest among the warriors shall flee naked on that day,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “So I will send a fire [of war, conquest, and destruction] upon Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it shall devour the strongholds of Kerioth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Moab shall die amid tumult '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uproar,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With war cries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouts of alarm and the sound of the trumpet.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“I will also cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy the ruler from its midst'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And slay all the princes with him,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment on Judah
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For three transgressions of Judah and for four (multiplied delinquencies)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will not reverse its punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoke My word concerning it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have rejected the law of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [the sum of God’s instruction to His people]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not kept His commandments;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their lies [and their idols], after which their fathers walked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Caused them to go astray.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “So I will send a fire [of war, conquest, and destruction by the Babylonians] upon Judah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it will devour the strongholds of Jerusalem.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment on Israel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For three transgressions of Israel and for four (multiplied delinquencies)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will not reverse its punishment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoke My word concerning it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they sell the righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innocent for silver'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the needy for the price of a pair of sandals.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “These who pant after (long to see) the dust of the earth on the head of the helpless [as sign of their grief and distress]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also turn aside the way of the humble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a man and his father will go to the same '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly a temple prostitute.
      marker-yv: yv-n
    - type: text
      text: girl
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that My holy name is profaned.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “They stretch out beside every [pagan] altar on clothes taken in pledge [to secure a loan, disregarding God’s command],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the house of their God [in contempt of Him] they frivolously drink the wine [which has been] taken from those who have been fined. [Ex 22:26; Deut 24:12, 13]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶“Yet it was I [not the false gods] who destroyed the Amorite before them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though his height was like the height of the cedars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he was as strong as the oaks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I even destroyed his fruit above and his root below.
