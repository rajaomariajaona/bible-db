segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prophecy from Peor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Balaam saw that it pleased the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to bless Israel, he did not go as he had done each time before [superstitiously] to seek omens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' signs [in the natural world], but he set his face toward the wilderness (desert). '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Balaam raised his eyes and he saw Israel living '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in their tents
  - type: text
    text: ' tribe by tribe; and the Spirit of God came on him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He took up his [third] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The oracle of Balaam the son of Beor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the oracle of the man whose eye is opened [at last, to see clearly the purpose and will of God],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The oracle of one who hears the words of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who sees the vision of the Almighty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Falling down, but having his eyes open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncovered,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: How fair are your tents, O Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your tabernacles, O Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Like valleys that stretch out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like gardens beside the river,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like aloes planted by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like cedars beside the waters. [Ps 1:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Water [that is, great blessings] will flow from his buckets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his offspring '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will live
  - type: text
    text: ' by many waters,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his king will be higher than '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Agag” was the title of the Amalekite kings, and here it represents the kingdom of the Gentiles. The Amalekites at that time were the most powerful of all the desert tribes (Num 24:20).
    marker-yv: yv-n
  - type: text
    text: Agag,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his kingdom shall be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “God brought Israel out of Egypt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Israel has '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: horns
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: strength like the wild ox;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will devour [Gentile] nations, his adversaries (enemies),
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will crush their bones in pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shatter them with his arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “He bowed down [to rest], he lies down as a lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as a lioness, who dares to rouse him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed [of God] is he who blesses you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cursed [of God] is he who curses you.” [Matt 25:40]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Balak’s anger was kindled against Balaam, and he struck his hands together; and Balak said to Balaam, “I called you to curse my enemies, but behold, you have done nothing but bless them these three times. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore now flee to your place! I had intended to honor you greatly, but behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has held you back from honor.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam said to Balak, “Did I not tell your messengers whom you had sent to me, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ‘Even if Balak would give me his house full of silver and gold, I could not go beyond the command of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to do either good or bad of my own accord. What the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' speaks, that I will speak?’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And now, look, I am going to my people; come, I will advise you as to what this people [Israel] will do to your people [Moab] in the days to come.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He took up his [fourth] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The oracle of Balaam the son of Beor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The oracle of the man whose eye is opened,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The oracle of him who hears the words of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And knows the knowledge of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Elyon
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Most High,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who sees the vision of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Almighty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Falling down, but having his eyes open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncovered:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I see Him, but not now;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I behold Him, but not near.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A star shall come forth from [the descendants of] Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A scepter shall rise out of [the descendants of] Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shall crush the forehead of Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroy all the sons of Sheth. [Matt 2:2; Rom 15:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Edom shall be [taken as] a possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Mount] Seir, Israel’s enemies, also will be a possession,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: While Israel performs valiantly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “One from [the descendants of] Jacob shall have dominion
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will destroy the remnant from the city.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Balaam looked at Amalek and took up his [fifth] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Amalek was the first of the [neighboring] nations [to oppose the Israelites after they left Egypt],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But his end shall be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: After the time of David, who was forced to rescue two of his wives from Amalekite bandits (1 Sam 30:18), the Amalekites are mentioned again only in Hezekiah’s time (1 Chr 4:43).
    marker-yv: yv-n
  - type: text
    text: destruction.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And Balaam looked at the Kenites and took up his [sixth] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Strong is your dwelling place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you set your nest in the cliff.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Nevertheless the Kenites will be consumed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will Asshur (Assyria) keep you (Israel) captive?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he took up his [seventh] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Alas, who can live unless God has ordained it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“But ships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall come
  - type: text
    text: ' from the coast of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cyprus and the greater part of the Mediterranean’s east coast.
    marker-yv: yv-n
  - type: text
    text: Kittim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And shall afflict Asshur (Assyria) and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrews, certain Arabs, and descendants of Nahor.
    marker-yv: yv-n
  - type: text
    text: Eber;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So they (the victors) also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will come
  - type: text
    text: ' to destruction.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Balaam arose and departed and returned to his place, and Balak also went on his way.
