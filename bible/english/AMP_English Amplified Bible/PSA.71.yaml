document_id: PSA.71
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 71
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer of an Old Man for Rescue.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In you, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I have put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently taken refuge;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let me never be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '71:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. have my expectations in Your goodness be disappointed.
    marker-yv: yv-n
  - type: text
    text: put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In Your righteousness deliver me and rescue me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline Your ear to me and save me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be to me a rock of refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a sheltering stronghold to which I may continually come;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have given the commandment to save me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are my rock and my fortress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rescue me, O my God, from the hand of the wicked (godless),
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the grasp of the unrighteous and ruthless man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For You are my hope;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: You are
  - type: text
    text: ' my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the source of my confidence from my youth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Upon You have I relied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' been sustained from my birth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are He who took me from my mother’s womb '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' You have been my benefactor from that day.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My praise is continually of You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶I am as a wonder to many,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are my strong refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My mouth is filled with Your praise
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with Your glory all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do not cast me off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' send me away in the time of old age;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not abandon me when my strength fails '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I am weak.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For my enemies have spoken against me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who watch for my life have consulted together,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Saying, “God has abandoned him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pursue and seize him, for there is no one to rescue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶O God, do not be far from me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my God, come quickly to help me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let those who attack my life be ashamed and consumed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be covered with reproach and dishonor, who seek to injure me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But as for me, I will wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope continually,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will praise You yet more and more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My mouth shall tell of Your righteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of Your [deeds of] salvation all day long,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For their number is more than I know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will come with the mighty acts of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' [and in His strength];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make mention of Your righteousness, Yours alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶O God, You have taught me from my youth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I still declare Your wondrous works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miraculous deeds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And even when I am old and gray-headed, O God, do not abandon me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I declare Your [mighty] strength to this generation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your power to all who are to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Your righteousness, O God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reaches
  - type: text
    text: ' to the [height of the] heavens,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who have done great things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O God, who is like You, [who is Your equal]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You who have shown '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '71:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Another reading is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: us
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: me many troubles and distresses
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will revive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renew me again,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will bring me up again from the depths of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: May You increase my greatness (honor)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And turn to comfort me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶I will also praise You with the harp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Your truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness, O my God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To You I will sing praises with the lyre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: My lips will shout for joy when I sing praises to You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my soul, which You have redeemed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: My tongue also will speak of Your righteousness all day long;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they are ashamed, for they are humiliated who seek my injury.
