document_id: REV.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Woman, Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And a great sign [warning of an ominous and frightening future event] appeared in heaven: a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The woman represents the nation of Israel. The sun refers to Jacob (also called Israel, the name divinely bestowed on Jacob at Peniel Gen 32:28), and the moon to Rachel, while the twelve stars refer to the twelve tribes of Israel, originating with the sons of Jacob and Rachel (Gen 37:9-11).
    marker-yv: yv-n
  - type: text
    text: 'woman clothed with the sun, with the moon beneath her feet, and on her head a crown of twelve stars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She was with child (the Messiah) and she cried out, being in labor and in pain to give birth. [Rom 9:4, 5]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Red Dragon, Satan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then another sign [of warning] was seen in heaven: behold, a great fiery red dragon (Satan) with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: it
        children:
        - type: text
          text: seven heads and ten horns
      - type: text
        text: ' correspond to the heads and horns of the beast in 17:3 ff, and to those of the beast in Dan 7:7 ff as well. Daniel’s description reveals that the ten horns are ten kings who temporarily reign with the Antichrist during the Great Tribulation (cf 17:12).'
    marker-yv: yv-n
  - type: text
    text: 'seven heads and ten horns, and on his heads were seven royal crowns (diadems). [Dan 7:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And his tail swept [across the sky] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dragged away a third of the stars of heaven and flung them to the earth. And the dragon stood in front of the woman who was about to give birth, so that when she gave birth he might devour her child. [Dan 8:10; Rev 12:9]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Male Child, Christ
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And she gave birth to a Son, a male '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Child,
  - type: text
    text: ' who is destined to rule (shepherd) all the nations with a rod of iron; and her Child was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This refers to the ascension of Christ to heaven following His death and resurrection.
    marker-yv: yv-n
  - type: text
    text: 'caught up to God and to His throne. [Ps 2:8, 9; 110:1, 2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the woman fled into the wilderness where she had a place prepared by God, so that she would be nourished there for a thousand two hundred and sixty days (forty-two months; three and one-half years).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Angel, Michael
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And war broke out in heaven, Michael [the archangel] and his angels waging war with the dragon. The dragon and his angels fought, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but they were not strong enough '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' did not prevail, and there was no longer a place found for them in heaven. [2 Pet 2:4; Jude 6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the great dragon was thrown down, the age-old serpent who is called the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
      - type: usfm
        marker: it
        children:
        - type: text
          text: devil
      - type: text
        text: ' is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: diabolos,
      - type: text
        text: ' which is actually a translation of '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Satan,
      - type: text
        text: ' a Hebrew word meaning “adversary” or “accuser.” The Greek word additionally carries with it the concept of “slanderer.” See note v 10.'
    marker-yv: yv-n
  - type: text
    text: 'devil and Satan, he who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' deceives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seduces the entire inhabited world; he was thrown down to the earth, and his angels were thrown down with him. [Gen 3:1, 14, 15; Zech 3:1; John 13:2; 2 Cor 11:3; Rev 20:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then I heard a loud voice in heaven, saying,
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'ow the salvation, and the power, and the kingdom (dominion, reign) of our God, and the authority of His Christ have come; for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the activity of Satan from which he has earned his name (see note v 9). The activity is most clearly seen in Job 1-2 and in Zech 3.
    marker-yv: yv-n
  - type: text
    text: 'accuser of our [believing] brothers and sisters has been thrown down [at last], he who accuses them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keeps bringing charges [of sinful behavior] against them before our God day and night. [Job 1:6-11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And they overcame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquered him because of the blood of the Lamb and because of the word of their testimony, for they did not love their life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' renounce their faith even when faced with death. [Zech 3:1-10; Rom 8:33, 34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore rejoice, O heavens and you who dwell in them [in the presence of God]. Woe to the earth and the sea, because the devil has come down to you in great wrath, knowing that he has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' a short time [remaining]!” [Is 44:23; 49:13]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when the dragon saw that he was thrown down to the earth, he persecuted the woman who had given birth to the male '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Child
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the two wings of the great eagle were given to the woman, so that she could fly into the wilderness to her place, where she was nourished for a time and times and half a time (three and one-half years), away from the presence of the serpent (Satan). [Ex 19:4; Deut 32:10, 11; Is 40:31; Dan 7:25; 12:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the serpent hurled water like a river out of his mouth after the woman, so that he might cause her to be swept away with the flood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the earth helped the woman, and the earth opened its mouth and swallowed up the river which the dragon had hurled out of his mouth. [Ex 15:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the dragon was enraged with the woman, and he went off to wage war on the rest of her children (seed), those who keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey the commandments of God and have the testimony of Jesus [holding firmly to it and bearing witness to Him].'
