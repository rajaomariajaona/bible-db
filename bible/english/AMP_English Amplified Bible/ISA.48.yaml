document_id: ISA.48,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel’s Obstinacy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear this, O house of Jacob, you who are called by the name of Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And who come from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: waters
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: seed of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who swear [allegiance] by the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And invoke the God of Israel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' not in truth (sincerity) nor in righteousness [with moral and spiritual integrity].'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Indeed, I have refined you, but not as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The melting of silver requires a relatively low heat.
      marker-yv: yv-n
    - type: text
      text: silver;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have tested '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chosen you in the furnace of affliction.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For My own sake, for My own sake, I will do it [I refrain and do not completely destroy you];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For how can '
    - type: usfm
      marker: it
      children:
      - type: text
        text: My Name
    - type: text
      text: ' be defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profaned [as it would if My chosen people were completely destroyed]?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will not give My glory to another [by permitting the worshipers of idols to triumph over you].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: End of Captivity Promised
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Listen to Me, O Jacob, and Israel, whom I called;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am He, I am the First, I am the Last. [Is 41:4]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“My hand founded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My right hand spread out the heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I call to them, they stand together [in obedience to carry out My decrees].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Assemble, all of you, and listen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who among them [the idols and Chaldean astrologers] has declared these things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' loves him (Cyrus of Persia); he will do His pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose against Babylon,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his arm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be against
    - type: text
      text: ' the Chaldeans [who reign in Babylon].'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I, even I, have spoken; indeed, I have called Cyrus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have brought him, and will make his way successful.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Come near to Me, listen to this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the beginning I have not spoken in secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the time that it happened, I was there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' has sent Me, and His [Holy] Spirit.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your Redeemer, the Holy One of Israel says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who teaches you to profit (benefit),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who leads you in the way that you should go.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that you had paid attention to My commandments!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then your peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperity would have been like a [flowing] river,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your righteousness [the holiness and purity of the nation] like the [abundant] waves of the sea.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your offspring would have been like the sand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your descendants [in number] like the grains of sand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their name would never be cut off or destroyed from My presence.” [Gen 13:16; Jer 33:22; Luke 19:42]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For they call themselves [citizens of Jerusalem] after the holy city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And depend on the God of Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is His name.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Get out of Babylon! Flee from the Chaldeans [who reign there]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare with a voice of jubilation, proclaim this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send it out to the end of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Say, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has redeemed His servant Jacob.”'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not thirst when He led them through the deserts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made the waters flow out of the rock for them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He split the rock and the waters flowed.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There is no peace for the wicked,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have declared the former things [which happened to Israel] in times past;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They went forth from My mouth and I proclaimed them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Suddenly I acted, and they came to pass.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because I know that you are obstinate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your neck is an iron tendon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your brow is bronze [both unyielding],
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have declared them to you long ago;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before they came to pass I announced them to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you could not say, ‘My idol has done them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my carved image and my cast image have commanded them.’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have heard [these things foretold]; look at all this [that has been fulfilled].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, will you not declare it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I proclaim to you [specific] new things from this time,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: protected
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: hidden things which you have not known.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They are created now [called into being by the prophetic word] and not long ago;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And before today you have not heard of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you will not say, ‘Oh yes! I knew them.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have not heard, you have not known;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even from long ago your ear has not been open.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] knew that you [Israel] would act very treacherously;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have been called a transgressor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a rebel from birth.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For the sake of My Name I refrain from My wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' My praise I restrain Myself from you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that I do not cut you off.
