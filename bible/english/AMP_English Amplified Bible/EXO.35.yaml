    content: 'to devise artistic designs to work in gold, silver, and bronze, '
  '33':
  - type: text
    content: 'and in the cutting of stones for setting and in the carving of wood, for work in every skilled craft. '
  '34':
  - type: text
    content: 'He has also put in Bezalel’s heart [the willingness] to teach [others the same skills], both he and Oholiab, son of Ahisamach, of the tribe of Dan. '
  '35':
  - type: text
    content: He has filled them with skill to do the work of an engraver, of a designer, and of an embroiderer, in blue, purple, and scarlet fabric, and in fine linen, and of a weaver; makers of every work and embroiderers of [excellent] designs.
