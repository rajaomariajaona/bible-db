  - type: heading
    content: ord
  - type: text
    content: ' has commanded: '
  '11':
  - type: text
    content: 'the tabernacle (sacred dwelling of God), its tent and its covering, its hooks, its boards, its bars, its pillars, and its sockets; '
  '12':
  - type: text
    content: 'the ark [of the covenant] and its carrying poles, with the '
  - type: note
    content: See note 25:17.
  - type: text
    content: 'mercy seat and the veil (partition curtain) of the screen [to hang between the Holy Place and the Holy of Holies]; '
  '13':
  - type: text
    content: 'the table and its carrying poles, and all its utensils, and the bread of the [divine] Presence (showbread); '
  '14':
  - type: text
    content: 'the lampstand also for the light and its utensils and its lamps, and the oil for the light; '
  '15':
  - type: text
    content: 'and the altar of incense and its carrying poles, the anointing oil and the fragrant incense, the screen (curtain) for the doorway at the entrance of the tabernacle; '
  '16':
  - type: text
    content: 'the altar of burnt offering with its bronze grating, its carrying poles, and all its utensils, the wash basin and its base (stand); '
  '17':
  - type: text
    content: 'the court’s curtains, its support poles and their sockets, and the curtain for the gate of the courtyard; '
  '18':
  - type: text
    content: 'the pegs of the tabernacle and the pegs of the court and their cords; '
  '19':
  - type: text
    content: the finely-woven garments for ministering in the Holy Place, the holy garments for Aaron the priest and the garments for his sons, to minister as priests.’ ”
  - type: heading
    content: Gifts Received
  '2':
